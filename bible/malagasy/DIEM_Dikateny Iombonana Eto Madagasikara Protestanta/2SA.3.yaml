document_id: 2SA.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Naharitra ela ny adin’ny mpomba an’i Saoly sy ny mpomba an’i Davida. Nihanahery hatrany anefa i Davida fa tsy nitsaha-nikorosy kosa ny taranak’i Saoly.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo zanakalahin’i Davida teraka tao Hebrôna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 3.1-4)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Zanakalahy maro no naterak’i Davida tao Hebrôna. Ny voalohany tamin’izany dia i Amnôna zanany tamin’i Ahinôhama avy any Jizrehela; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ny faharoa dia i Kilàba tamin’i Abigaîla vadin’i Nabala avy any Karmela; ny fahatelo dia i Absalôma zanakalahin’i Mahekà zanakavavin’i Talmay, mpanjakan’i Gesora
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gesora: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.37-38 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ny fahefatra dia i Adônià zanakalahin’i Hagita; ny fahadimy dia i Sefatià zanakalahin’i Abitala; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary ny fahenina dia i Jitrehama zanany tamin’i Heglà izay vadin’i Davida koa. Ireo avy no zanakalahy naterak’i Davida tao Hebrôna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tapaka ny fihavanan’i Abinera sy i Isbôsèta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha mbola niady hatrany ireo mpomba an’i Saoly sy ireo mpomba an’i Davida, dia nanamafy ny heriny i Abinera teo amin’ny mpomba an’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary i Saoly nanana vaditsindrano natao hoe Ritsepà zanakavavin’i Aià. Ka hoy i Isbôseta tamin’i Abinera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ianao no nandry tamin’ny vaditsindranon-draiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Io fihetsika io dia milaza tena ho manana fahefà-mpanjaka. Ampit 16.21-22; 1 Mp 2.22.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tezitra mafy i Abinera noho izany tenin’i Isbôseta izany ka nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Alikalahy miandany amin’i Joda angaha aho? Mandraka ankehitriny dia naneho fitiavana ny fianakavian’i Saoly rainao sy ny rahalahiny ary ny sakaizany aho, ka tsy nanolotra anao ho eo an-tanan’i Davida, nefa ianao indray izao no manameloka ahy noho ny hadisoako tamin’iny vehivavy iny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hosazin’Andriamanitra mafy tokoa anie izaho Abinera, raha tsy hataoko amin’i Davida izay nianianan’ny TOMPO taminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia ny hanaisotra ny fanjakana amin’ny fianakavian’i Saoly ka hampitoetra ny sezafiandrianan’i Davida amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy amin’i Joda hatrany Dana ka hatratỳ Beriseba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hanaisotra... fianakavian’i Saoly: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 15.28. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Beriseba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toerana any amin’ny farany avaratra sy farany atsimo amin’ny tanin’i Israely.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy hitan’i Isbôsèta intsony izay havaly an’i Abinera noho ny fahatahorany azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Abinera miara-dia amin’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Naniraka olona amin’ny anarany nankany amin’i Davida i Abinera hanontany azy izay tompon’ny tany ka nanao hoe: «Manaova fanekena amiko fa hanampy anao aho hahatonga an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' manontolo hiara-dia aminao.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Davida namaly azy: «Eny àry fa hanao fanekena aminao aho, saingy izao kosa no mba hangatahiko aminao: Aza miseho amiko raha tsy entinao atỳ i Mikàla'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mikàla: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 18.20-30; 25:44.
    marker-yv: yv-n
  - type: text
    text: ' zanakavavin’i Saoly.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia naniraka olona nankany amin’i Isbôsèta zanakalahin’i Saoly i Davida hanao aminy hoe: «Omeo ahy i Mikàla vadiko izay efa azoko ho takalon’ireo tsitsy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsitsy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe FAMORANA.
    marker-yv: yv-n
  - type: text
    text: ' zaton’ny Filistinina.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary i Isbôsèta nampaka an’i Mikàla tany amin’i Paltiela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Paltiela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: antsoina hoe Palty ao amin’ny 1 Sam 25.44.
    marker-yv: yv-n
  - type: text
    text: ' vadiny sady zanakavavin’i Laîsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nanaraka azy hatrany Bahorima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bahorima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra mazava tsara nefa dia an-kilaometatra vitsivitsy fotsiny ao atsinanan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' i Paltiela sady nitomany. Kanefa hoy i Abinera taminy: «Mandehana mody amin’izay!»; ary dia niverina izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Avy eo nifampidinihan’i Abinera ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ela izay nanirianareo an’i Davida ho mpanjakanareo izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa tanteraho izany ankehitriny, satria ny TOMPO efa nilaza tamin’i Davida hoe: «Amin’ny alalan’i Davida mpanompoko no hanafahako ny Israely vahoakako amin’ny herin’ny Filistinina sy ny fahavalony rehetra.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Niresaka izany tamin’ny Benjaminita koa i Abinera; ary avy eo nankany Hebrôna izy mba hilaza amin’i Davida ny faneken’ny Benjaminita sy ny Israelita hafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny faneken’ny Benjaminita dia zava-dehibe satria mifamatotra manokana tamin’ny fianakavian’i Saoly izay Benjaminita rahateo ireo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia tonga tany amin’i Davida tao Hebrôna i Abinera niaraka tamin’ny lehilahy roapolo, ka nanaovan’i Davida fanasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy i Abinera tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handeha aho, tompoko, ka hamory ny Israelita rehetra ho eo aminao. Hanao fanekena aminao izy ireo ary dia hanjaka hatraiza hatraiza araka izay sitrakao ianao.
- type: usfm
  marker: p
  children:
  - type: text
    text: Navelan’i Davida handeha i Abinera, ka lasa soa aman-tsara.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Najedak’i Jôaba i Abinera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Taorian’izay dia tonga avy nandranto ady ny mpanompon’i Davida sy i Jôaba, ka nitondra babo maro. Tsy tao amin’i Davida tao Hebrôna intsony i Abinera fa efa navelany handeha soa aman-tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha vantany vao tonga teo i Jôaba sy ny tariny rehetra, dia nisy nampandre an’i Jôaba hoe: «Tonga tao amin’ny mpanjaka i Abinera zanakalahin’i Nera ka navelany handeha soa aman-tsara.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nankao amin’ny mpanjaka i Jôaba ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fa inona izany nataonao izany? Tonga teo aminao i Abinera, ka nahoana no navelanao handeha fotsiny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fantatrao tsara anefa i Abinera zanakalahin’i Nera, fa ny hamitaka anao sy hitsikilo izay alehanao ary hahalala izay ataonao rehetra no nahatongavany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nivoaka avy tao amin’i Davida i Jôaba ary naniraka olona hanaraka an’i Abinera. Avy teo amin’ny lavaka famorian-drano atao hoe Sirà no nitondran’ireo azy niverina; nefa tsy fantatr’i Davida velively izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Rehefa tafaverina tao Hebrôna i Abinera, dia notaomin’i Jôaba hankeny am-bavahady toy ny hiresaka mangina aminy izy, kanjo notrobarany teo amin’ny kibony izy ka maty ho valin’ny nahafatesan’i Asahela rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Rehefa ren’i Davida izany tatỳ aoriana, dia hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Afa-tsiny mandrakizay eo anatrehan’ny TOMPO izaho sy ny fanjakako ny amin’ny nahafatesan’i Abinera zanakalahin’i Nera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hivaly eo an-dohan’i Jôaba sy ny fianakaviany manontolo anie izany, ary tsy ho foana ao amin’ny taranak’i Jôaba koa anie ny olona marary mitsika na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: marary hoditra
  - type: text
    text: ' sy ny lehilahy kilemaina manao asam-behivavy, ary ny lehilahy matin-tsabatra na tsy ampy sakafo!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Toy izany no namonoan’i Jôaba sy i Abisay rahalahiny an’i Abinera ho faty noho ny namonoany an’i Asahela rahalahiny tamin’ny ady tao Gibehôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.18-23.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy i Davida tamin’i Jôaba sy ny olona rehetra niaraka taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Triatriaro ny akanjonareo
  - type: text
    text: ', ka mitafia gony ary aoka hanao fisaonana an’i Abinera ianareo.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nanaraka taorian’ny tranovorona i Davida mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nalevina tao Hebrôna i Abinera. Nigogogogo nitomany teo amin’ny fasan’i Abinera ny mpanjaka; ary nitomany toy izany koa ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nanao izao hira fisaonana an’i Abinera izao ny mpanjaka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no tahaka ny fahafatesan’ny adala
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nahafatesanao, ry Abinera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tsy nifatotra tongotra aman-tanana ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa maty toy ny olona matin’ny jiolahy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia mbola nitomany azy indray ny vahoaka rehetra teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Raha mbola antoandro ny andro dia nanatona avokoa ireo mba hampihinan-kanina an’i Davida, nefa izy kosa nianiana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hataon’Andriamanitra amiko anie ny famaizana mafy indrindra raha manendry hanina na zavatra hafa aho mandra-pilentiky ny masoandro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary azon’ny vahoaka rehetra ny hevitr’izany ka nankasitrahiny; sady izay rehetra nataon’ny mpanjaka moa dia nankasitrahin’ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Koa fantatry ny vahoakan’i Joda manontolo sy ny Israelita rehetra tamin’io andro io fa tsy baiko avy amin’ny mpanjaka mihitsy no nahafaty an’i Abinera zanakalahin’i Nera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary hoy koa ny mpanjaka tamin’ireo mpanompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy fantatrareo va fa komandy sady lehilahy malaza teo amin’i Israely no maty androany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Fa izaho, na dia mpanjaka efa voahosotra aza, dia mahatsiaro ny tenako ho mbola malemy ankehitriny; ary ireo zanakalahin’i Tseroià ireo dia mahery setra loatra miohatra amiko. Ny TOMPO anie hanafay azy araka ny ratsy nataony.
