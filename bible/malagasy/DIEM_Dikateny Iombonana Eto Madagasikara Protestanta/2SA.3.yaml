document_id: 2SA.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naharitra ela ny adin’ny mpomba an’i Saoly sy ny mpomba an’i Davida. Nihanahery hatrany anefa i Davida fa tsy nitsaha-nikorosy kosa ny taranak’i Saoly.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo zanakalahin’i Davida teraka tao Hebrôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 3.1-4)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia ny hanaisotra ny fanjakana amin’ny fianakavian’i Saoly ka hampitoetra ny sezafiandrianan’i Davida amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' sy amin’i Joda hatrany Dana ka hatratỳ Beriseba'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
