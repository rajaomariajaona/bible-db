document_id: ZEC.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: NY FAHITAN’I ZAKARIA
  - type: heading
    content: Miantso ny Israelita hiverina aminy ny Tompo
  - type: text
    content: 'Tamin’ny volana fahavalon’ny taona faharoa nanjakan’i Dariôsa dia nisy tenin’ny TOMPO tamin’i Zakarià '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Berekià sady zafikelin’i Hidào'
  - type: note
    content: 'Tamin’ny volana fahavalon’ny taona faharoa: izany hoe tamin’ny oktôbra–nôvambra 520 tal J.K. –i Dariôsa no mpanjakan’i Persia nanomboka tamin’ny taona 522 ka hatramin’ny taona 486 tal J.K. –i Zakarià (izay anarana midika hoe ny Tompo mahatsiaro) dia mpisorona ihany koa araka ny Neh 12.16.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ary ilay lehilahy nijanona teo anivon’ny hazo mirta dia niteny hoe: «Nirahin’ny TOMPO ireo mba hitety ny tany.» '
  '11':
  - type: text
    content: 'Dia namaly ilay anjelin’ny TOMPO ireo mpitaingin-tsoavaly ka nanao hoe: «Efa notetezinay ny tany manontolo, ka hitanay fa milamina sy mandry feizay.»'
  '12':
  - type: text
    content: 'Dia hoy ilay anjely hoe: «Ry TOMPOn’izao rehetra izao ô, indro fitopolo taona'
  - type: note
    content: 'fitopolo taona: jereo Jer 25.11; 29.10.'
  - type: text
    content: ' izao no nirehetan’ny fahatezeranao tamin’i Jerosalema sy tamin’ny tanàna hafa ao Joda. Mandra-pahoviana no mbola tsy hamindranao fo amin’izy ireo?»'
  '13':
  - type: text
    content: Ary teny mahafinaritra sy mampionona no nataon’ny TOMPO tamin’ilay anjely niresaka tamiko.
  - type: heading
    content: Hifidy indray an’i Jerosalema ny Tompo
  '14':
  - type: text
    content: 'Ary ilay '
  - type: text
    content: anjely
  - type: text
    content: ' izay niresaka tamiko dia nandidy ahy hanambara hoe:'
  - type: text
    content: '«Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: ‹Miredaredam-pitiavana an’i Jerosalema
  - type: text
    content: 'sy ny tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' Aho,'
  '15':
  - type: text
    content: kanefa kosa mirehi-pahatezerana mafy
  - type: text
    content: amin’ireo firenen-kafa matoky tena loatra;
  - type: text
    content: satria fony Aho mbola tezitra kely tamin’i Israely,
  - type: text
    content: no nampitombo fahoriana azy kosa ireo.
  '16':
  - type: text
    content: 'Koa Izaho TOMPOn’izao rehetra izao dia milaza hoe:'
  - type: text
    content: Haneho indrafo no iverenako eto Jerosalema.
  - type: text
    content: 'Ho voaorina eto indray ny '
  - type: text
    content: tranoko
  - type: text
    content: ;
  - type: text
    content: ary ho voavoatra indray ny tanàna.›
  - type: text
    content: Izaho TOMPOn’izao rehetra izao
  - type: text
    content: dia miteny hentitra ny amin’izany. »
  '17':
  - type: text
    content: 'Avy eo ilay anjely dia nandidy ahy hanambara koa hoe:'
  - type: text
    content: '«Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: Mbola hihoa-pampana indray
  - type: text
    content: ny fanambinana ireo tanànako;
  - type: text
    content: sady Izaho TOMPO mihitsy
  - type: text
    content: no mbola hampionona an’i Tsiôna indray
  - type: text
    content: ary mbola hifidy an’i Jerosalema indray.»
  '2':
  - type: text
    content: 'Ary nasain’ny TOMPO nilaza izany tamin’ny Israelita i Zakarià nanao hoe: «Izaho TOMPO dia tezitra mafy tamin’ny razanareo. '
  '3':
  - type: text
    content: 'Kanefa hoy Izaho TOMPOn’izao rehetra izao hoe: Miverena amiko ianareo, dia mba hiverina aminareo Aho. Izaho TOMPOn’izao rehetra izao no manao izany teny hentitra izany. '
  '4':
  - type: text
    content: 'Aza manahaka ny razanareo. Fa efa nantsoin’ny mpaminany fahiny tamin’ny anarako ireo mba hiala amin’ny toetra sy ny asa ratsiny, kanefa tsy nety nihaino sy nankato Ahy. Izaho TOMPOn’izao rehetra izao no manao izany teny hentitra izany. '
  '5':
  - type: text
    content: 'Fantatrareo fa tsy eo intsony ny razanareo ary tsy velona eo mandrakizay ny mpaminany. '
  '6':
  - type: text
    content: Nefa ny teny sy ny didy izay nomeko ny mpaminany mpanompoko dia mba nandresy lahatra ny razanareo ihany; ka niala tamin’ny ratsy izy ary niaiky fa Izaho TOMPOn’izao rehetra izao no efa nitondra azy araka izay notapahiko, dia araka izay sahaza ny toetrany sy ny asany.»
  - type: heading
    content: 'Fahitana voalohany: ny soavaly'
  '7':
  - type: text
    content: Tamin’ny taona faharoa nanjakan’i Dariôsa, fony andro faha-24 tamin’ny volana faha-11 na volana Sebata
  - type: note
    content: Izany hoe tany amin’ny tapatapaky ny febroary 519 tal J.K.
  - type: text
    content: ', dia nisy hafatry ny TOMPO tamin’i Zakarià '
  - type: text
    content: mpaminany
  - type: text
    content: ', zanakalahin’i Berekià sady zafikelin’i Hidao; ka toy izao no fitantaràn’i Zakarià izany: '
  '8':
  - type: text
    content: Alina no nahitako fa indro nisy lehilahy mitaingin-tsoavaly mena ka nijanona teo anivon’ny hazo mirta
  - type: note
    content: Ny mirta dia hazokely maitso mandrakariva izay maniry amin’ny faritra manodidina ny Ranomasina Mediteranea.
  - type: text
    content: ' teny an-dohasaha lalina; ary teo aoriany nisy soavaly mena sy sadamena ary fotsy sy mainty. '
  '9':
  - type: text
    content: 'Dia nanontaniako izy hoe: «Tompoko, inona moa no dikan’ireo soavaly ireo?» Dia hoy ny navalin’ilay '
  - type: text
    content: anjely
  - type: text
    content: ' niresaka tamiko: «Hohazavaiko anao ny amin’ireo.»'
