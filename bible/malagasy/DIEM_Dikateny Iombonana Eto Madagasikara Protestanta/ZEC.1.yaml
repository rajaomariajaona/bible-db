          text: i Zakarià
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (izay anarana midika hoe ny Tompo mahatsiaro) dia mpisorona ihany koa araka ny Neh 12.16.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay lehilahy nijanona teo anivon’ny hazo mirta dia niteny hoe: «Nirahin’ny TOMPO ireo mba hitety ny tany.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ilay anjelin’ny TOMPO ireo mpitaingin-tsoavaly ka nanao hoe: «Efa notetezinay ny tany manontolo, ka hitanay fa milamina sy mandry feizay.»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ilay anjely hoe: «Ry TOMPOn’izao rehetra izao ô, indro fitopolo taona'
    - type: usfm
      marker: f
      children:
      - type: usfm
