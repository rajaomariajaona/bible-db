  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nasain’ny TOMPO nilaza izany tamin’ny Israelita i Zakarià nanao hoe: «Izaho TOMPO dia tezitra mafy tamin’ny razanareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa hoy Izaho TOMPOn’izao rehetra izao hoe: Miverena amiko ianareo, dia mba hiverina aminareo Aho. Izaho TOMPOn’izao rehetra izao no manao izany teny hentitra izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manahaka ny razanareo. Fa efa nantsoin’ny mpaminany fahiny tamin’ny anarako ireo mba hiala amin’ny toetra sy ny asa ratsiny, kanefa tsy nety nihaino sy nankato Ahy. Izaho TOMPOn’izao rehetra izao no manao izany teny hentitra izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatrareo fa tsy eo intsony ny razanareo ary tsy velona eo mandrakizay ny mpaminany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa ny teny sy ny didy izay nomeko ny mpaminany mpanompoko dia mba nandresy lahatra ny razanareo ihany; ka niala tamin’ny ratsy izy ary niaiky fa Izaho TOMPOn’izao rehetra izao no efa nitondra azy araka izay notapahiko, dia araka izay sahaza ny toetrany sy ny asany.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fahitana voalohany: ny soavaly'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taona faharoa nanjakan’i Dariôsa, fony andro faha-24 tamin’ny volana faha-11 na volana Sebata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izany hoe tany amin’ny tapatapaky ny febroary 519 tal J.K.
      marker-yv: yv-n
    - type: text
      text: ', dia nisy hafatry ny TOMPO tamin’i Zakarià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ', zanakalahin’i Berekià sady zafikelin’i Hidao; ka toy izao no fitantaràn’i Zakarià izany: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alina no nahitako fa indro nisy lehilahy mitaingin-tsoavaly mena ka nijanona teo anivon’ny hazo mirta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mirta '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia hazokely maitso mandrakariva izay maniry amin’ny faritra manodidina ny Ranomasina Mediteranea.
      marker-yv: yv-n
    - type: text
      text: ' teny an-dohasaha lalina; ary teo aoriany nisy soavaly mena sy sadamena ary fotsy sy mainty. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontaniako izy hoe: «Tompoko, inona moa no dikan’ireo soavaly ireo?» Dia hoy ny navalin’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' niresaka tamiko: «Hohazavaiko anao ny amin’ireo.»'
