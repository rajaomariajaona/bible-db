          text: jereo Jer 25.11; 29.10.
      marker-yv: yv-n
    - type: text
      text: ' izao no nirehetan’ny fahatezeranao tamin’i Jerosalema sy tamin’ny tanàna hafa ao Joda. Mandra-pahoviana no mbola tsy hamindranao fo amin’izy ireo?»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary teny mahafinaritra sy mampionona no nataon’ny TOMPO tamin’ilay anjely niresaka tamiko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hifidy indray an’i Jerosalema ny Tompo
    marker-yv: yv-h
