document_id: EST.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Resin’ny Jiosy ny fahavalony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nigadona ny andro faha-13 tamin’ny volana faha-12 na volana Adara. Io andro io no natao hampiharana ny teny aman-didin’ny amperôra ary nantenain’ireo fahavalon’ny Jiosy haharesena azy. Kanjo nivadika ny rasa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nigadona ny andro... nivadika ny rasa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 3.13.
    marker-yv: yv-n
  - type: text
    text: ', ka ny Jiosy indray no naharesy ny mpankahala azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tany amin’ny faritany rehetra manerana ny fanjakan’ny amperôra Kserksesa, dia nivory tao an-tanànany avy ny Jiosy mba hamely izay nitady hanisy ratsy azy; ary tsy nisy olona nahatohitra azy, satria nanindry ny olona rehetra ny fahatahorana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanampy ny Jiosy koa ny mpitondra rehetra isam-paritany sy ny solotenan’ny amperôra ary ny governora mbamin’ny mpandraharaha, satria nanindry azy ny fahatahorana an’i Môrdôkay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ambony toerana tao an-dapa manko i Môrdôkay sady niely laza eran’ny faritany rehetra, satria nisondrotra hatrany ny lehilahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nasian’ny Jiosy ny fahavalony rehetra ka nokapainy sabatra sy novonoiny ary naringany; nataony araka izay sitraky ny fony tokoa ireo mpankahala azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tao Sosany renivohitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sosany renivohitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' aza dia dimanjato lahy no maty naringan’ny Jiosy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: 'Novonoiny koa izy folo lahy zanak’i Hamàna, ilay zanakalahin’i Hamedatà sady fahavalon’ny Jiosy: dia ry i Parsandatà sy i Dalfôna ary i Aspatà, i Pôratà sy i Adalià ary i Aridatà, i Parmastà sy i Arisay ary i Ariday sy i Vaiezatà. Kanefa ny fananany tsy mba norobainy tsy akory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Androtr’izay ihany dia nambara tamin’ny amperôra ny isan’ny voavono tao Sosany renivohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny amperôra tamin’i Estera mpanjakavavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Teto Sosany renivohitra aza dia dimanjato lahy no maty naringan’ny Jiosy, ankoatran’izy folo lahy zanak’i Hamàna; ka ho toy inona no nataony tany amin’ny faritany sisa? Kanefa raha mbola misy zavatra angatahinao sy tadiavinao, dia homeko anao sy hotanterahiko izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Estera hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha sitrakao, ry Andriamanjaka, dia aoka ny Jiosy eto Sosany homen-dalana hanao toy ny nataony androany koa rahampitso, ary aoka hahantona amin’ny hazo ireo fatin’izy folo lahy zanak’i Hamàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zanak’i Hamàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia efa novonoina (jereo and 7-10), saingy ny fanantonana ny fatiny dia mahatonga ny fahafatesany hanana endrika mahafa-baràka.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nasain’ny amperôra natao izany ary navoaka tao Sosany ny didy; ka dia nahantona izy folo lahy zanak’i Hamàna. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nivory indray ny Jiosy tao Sosany iny andro faha-14 tamin’ny volana Adara iny ka namono olona telon-jato lahy tao an-tanàna. Kanefa ny fananany tsy mba norobainy tsy akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'Ny Jiosy hafa, nonina tany amin’ny faritany isan-tokony manerana ny fanjakan’ny amperôra, dia nivory koa hiaro ny ainy, rehefa nigadona ny andro faha-13 tamin’ny volana Adara; afaka tamin’ny fahavalony izy ary 75 000 no matiny kanefa ny fananany tsy mba norobainy tsy akory. Ary nitsahatra izy tamin’ny andro faha-14 ka nataony ho andro fanasana sy firavoravoana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ny Jiosy tao Sosany kosa nivory hamono fahavalo tamin’ny andro faha-13 sy faha-14; ary nitsahatra izy tamin’ny andro faha-15, ka dia io no nataony ho andro fanasana sy firavoravoana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa, noho izany, ny Jiosy izay nitoetra tamin’ny tanàna madinika tany ambanivohitra dia nanao ny andro faha-14 amin’ny volana Adara ho firavoravoana sy fanasana ary fikoranana ka hifanateran-panomezana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanorenana fety fahatsiarovana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nanoratra ny tantaran’izany zava-nitranga izany i Môrdôkay, ary nampitondra taratasy ho any amin’ny Jiosy rehetra izay nonina tany amin’ny faritany isan-tokony, na akaiky na lavitra, manerana ny fanjakan’ny amperôra Kserksesa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Niangavian’i Môrdôkay ry zareo mba hankalaza isan-taona ny andro faha-14 sy faha-15 amin’ny volana Adara. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ireo manko no andro nahafahan’ny Jiosy tamin’ny fahavalony, ary io no volana nampodiana ny alahelony ho fifaliana sy ny fisaonany ho fikoranana; dia hataony ho andro fanasana sy firavoravoana ireo andro ireo ka hifanaterany fanomezana sy hahafoizany zavatra ho an’ny mahantra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nanaraka izay nosoratan’i Môrdôkay ny Jiosy ary nandraikitra ho fanao izany fety efa nankalazainy indray mandeha izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa izao no voasoratr’i Môrdôkay: i Hamàna, zanakalahin’i Hamedatà sady taranak’i Agaga, dia fahavalon’ny Jiosy rehetra ka nihevitra handringana azy. Efa nanao ny antsapaka (atao hoe Porîma) izy mba hahafantarana ny fotoanandro hamelezany azy sy handringanany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Saingy nankeo anatrehan’i Kserksesa i Estera, ka namoaka didy an-tsoratra ny amperôra mba hafotitra amin’i Hamàna ihany ny hevi-dratsy nokasainy hampiharina amin’ny Jiosy ary mba hahantona amin’ny hazo ny tenany sy ny zanany lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izany no iantsoana ireo andro ireo hoe «Porîma», avy amin’ny voambolana «Pora» izay midika hoe antsapaka.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny zavatra rehetra izay raketin’io taratasy io ary koa izay hitan’ny Jiosy sy nihatra taminy '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'no nahatonga azy ireo hampijoro sy handraikitra izany fanao izany ho an’ny tenany sy ny taranany ary izay rehetra miray aminy: dia ny hankalaza isan-taona ireo andro roa ireo araka ny voasoratr’i Môrdôkay sy araka ny fotoana voatendry. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tsy maintsy hotsarovana sy hankalazaina ireo andro ireo amin’ny taranaka mifandimby rehetra isam-pianakaviana sy isan-tanàna ary isam-paritany; tsy azo foanana ireo andro Porîma ireo ary tsy hitsahatra ny fahatsiarovana azy eo amin’ny Jiosy sy ny taranany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I Estera, mpanjakavavy sady zanak’i Abihaîla, ary koa i Môrdôkay ilay Jiosy dia nanoratra fanindroany tamim-pahefana tokoa mba hanamafy izany taratasy momba ny Porîma izany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Io taratasy faharoa io dia nalefa ho an’ny Jiosy rehetra any amin’ny faritany 127 manerana ny fanjakan’i Kserksesa. Firariana hiadana sy handry fahalemana no raketiny; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ary ireo andro Porîma ireo, miaraka amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fifadian-kanina
  - type: text
    text: ' sy fidradradradràna momba azy, no asainy ankalazaina amin’ny fotoana voatendry, araka izay fanamafisana nataon’i Môrdôkay ilay Jiosy sy i Estera mpanjakavavy; nohamafisin’izy mianaka izany ho an’ny Jiosy ary koa ho an’ny taranany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny baikon’i Estera no nampijoro ireo zavatra fanao amin’ny Porîma ireo, ary voasoratra tao amin’ny boky izany.
