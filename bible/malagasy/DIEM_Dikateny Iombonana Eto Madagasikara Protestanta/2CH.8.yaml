document_id: 2CH.8,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Asa samihafa nataon’i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 9.10-28)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka ny roapolo taona nanorenan’i Salômôna ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' sy ny lapa ho an’ny tenany, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny isan’ireo mpanara-maso ny asa nampanaovin’i Salômôna dia nisy 250 lahy izay nanam-pahefana tamin’ny olona mpiasa.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nasain’i Salômôna niakatra avy any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: ' ho ao amin’ny trano izay nataony ho azy ny zanakavavin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: '; fa hoy i Salômôna anakampony hoe: «Na dia ny vadiko aza tsy hitoetra ao an-dapan’i Davida mpanjakan’i Israely, satria masina ireo toerana izay efa nidiran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasin’ny TOMPO
    - type: text
      text: .»
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay i Salômôna dia nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo ho an’ny TOMPO teo ambonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' izay naoriny ho Azy teo anoloan’ny vavahadin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny didin’i Mosesy dia nanatitra izay fanao isan’andro i Salômôna tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' sy ny voaloham-bolana ary ny fety lehibe telo isan-taona, izany hoe ny fety fihinanana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mofo tsy misy leviora
    - type: text
      text: ', ny fetin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pentekôsta
    - type: text
      text: ' ary ny fetin’ny Tranotomboka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ireo fety ireo, jereo ny FTS ao amin’ny voambolana hoe FANISANANDRO. Jereo koa Nom 28–29.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny fandaharan’i Davida rainy, dia notendren’i Salômôna ny antokon’ny mpisorona ho amin’ny fanompoany avy ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ho amin’ny raharahany, dia ny hidera ny Tompo sy hanampy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' amin’ny fanompoam-pivavahana fanao isan’andro; notendreny koa ny mpiandry varavarana, araka ny antokony amin’ny isam-bavahady. Izany rahateo no nandidian’i Davida olon’Andriamanitra azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny fitsinjarana asa ao anatin’ireo antokona mpisorona sy levita ary mpiandry varavarana, jereo 1 Tan 23–26.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy nialan’ireo ny didin’i Davida mpanjaka momba ny mpisorona sy ny levita na amin’inona na amin’inona, indrindra fa ny amin’ny fitahirizan-drakitra.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no nahatontosana ny asa rehetra nokasain’i Salômôna, hatramin’ny andro nanorenana ny tranon’ny TOMPO ka ambaram-pahavitany; ka dia lavorary ny tranon’ny TOMPO.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay i Salômôna dia nankany Hetsiôny-Gebera sy Elôta eo amoron’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ranomasin’ny Volotara
    - type: text
      text: ' any amin’ny tany Edôma. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandefa sambo sy matilò mahay ranomasina i Hirama, tamin’ny alalan’ireo tandapany; ary nandeha niaraka tamin’ny tantsambon’i Salômôna ho any Ôfira ireo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 9.28 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ka nahazo volamena 13 taonina mahery ary nitondra izany ho an’i Salômôna mpanjaka.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia namboariny ny tanàna izay nomen’i Hirama azy ka namponenany ny Israelita.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanafika an’i Hamata-Tsôbà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Araka ny 2 Sam 8.3,9; 1 Tan 18.3, i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tsôbà sy i Hamata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tanàna sady fanjakana anankiroa samy hafa.'
      marker-yv: yv-n
    - type: text
      text: ' i Salômôna ka naharesy azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Namboariny ny tanànan’i Tadmôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tadmôra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tanàna any amin’ny taniefitr’i Siria ka i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Palmira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no fiantso azy ankehitriny izao.'
      marker-yv: yv-n
    - type: text
      text: ' tany an-taniefitra sy ny tanàna izay efa naoriny fahiny tao amin’ny faritr’i Hamata mba ho fitahirizam-bokatra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Namboariny koa i Bety-Hôrôna ambony sy i Bety-Hôrôna ambany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Bety-Hôrôna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ambony sy i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bety-Hôrôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ambany dia tanàna tokony ho 20 km ao avaratra andrefan’i Jerosalema no misy azy.'
      marker-yv: yv-n
    - type: text
      text: ', izay samy tanàna mafy mimanda sady misy vavahady tsara hidy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: toraka izany ihany koa i Bahalato
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bahalato: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna tokony ho 50 km ao andrefan’i Jerosalema no misy azy.
      marker-yv: yv-n
    - type: text
      text: ' sy ny tanàna rehetra fitahirizam-bokatra na fitobian-kalesy na fitoeran-tsoavaly. Natsangan’i Salômôna avokoa izay rehetra tiany haorina tao Jerosalema sy tany Libano ary manerana ny tany nofeheziny.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola nisy sisa tavela teo amin’ny tany ireo antokon’olona isan-karazany, dia ny Hetita sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' mbamin’ny Perizita sy Hivita ary Jebosita, izay samy tsy anisan’ny Israelita. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola nisy tavela teo tokoa ny taranak’ireo fa tsy naringan’ny Israelita, ka dia nampanaovin’i Salômôna asa fanompoana izay tohiziny mandraka androany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Israelita kosa tsy mba nampanaovin’i Salômôna izany, fa narotsany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny Israelita... narotsany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny stf hebreo vitsivitsy sy ireo dkt tranainy ary ny rijan-teny mirazotra ao amin’ny 1 Mp 9.22.
      marker-yv: yv-n
    - type: text
      text: ' ho miaramila na ho manamboninahitra na ho mpitondra kalesy na ho mpitaingin-tsoavaly. '
