document_id: 2CH.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Asa samihafa nataon’i Salômôna
  - type: heading
    content: (Jereo 1 Mp 9.10-28)
  - type: text
    content: 'Nony afaka ny roapolo taona nanorenan’i Salômôna ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sy ny lapa ho an’ny tenany, '
  '10':
  - type: text
    content: Ary ny isan’ireo mpanara-maso ny asa nampanaovin’i Salômôna dia nisy 250 lahy izay nanam-pahefana tamin’ny olona mpiasa.
  '11':
  - type: text
    content: Nasain’i Salômôna niakatra avy any an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ' ho ao amin’ny trano izay nataony ho azy ny zanakavavin’ny '
  - type: text
    content: Farao
  - type: text
    content: '; fa hoy i Salômôna anakampony hoe: «Na dia ny vadiko aza tsy hitoetra ao an-dapan’i Davida mpanjakan’i Israely, satria masina ireo toerana izay efa nidiran’ny '
  - type: text
    content: Vatamasin’ny TOMPO
  - type: text
    content: .»
  '12':
  - type: text
    content: 'Tamin’izay i Salômôna dia nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho an’ny TOMPO teo ambonin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' izay naoriny ho Azy teo anoloan’ny vavahadin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Araka ny didin’i Mosesy dia nanatitra izay fanao isan’andro i Salômôna tamin’ny '
  - type: text
    content: sabata
  - type: text
    content: ' sy ny voaloham-bolana ary ny fety lehibe telo isan-taona, izany hoe ny fety fihinanana '
  - type: text
    content: mofo tsy misy leviora
  - type: text
    content: ', ny fetin’ny '
  - type: text
    content: Pentekôsta
  - type: text
    content: ' ary ny fetin’ny Tranotomboka'
  - type: note
    content: Momba ireo fety ireo, jereo ny FTS ao amin’ny voambolana hoe FANISANANDRO. Jereo koa Nom 28–29.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Araka ny fandaharan’i Davida rainy, dia notendren’i Salômôna ny antokon’ny mpisorona ho amin’ny fanompoany avy ary ny '
  - type: text
    content: levita
  - type: text
    content: ' ho amin’ny raharahany, dia ny hidera ny Tompo sy hanampy ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' amin’ny fanompoam-pivavahana fanao isan’andro; notendreny koa ny mpiandry varavarana, araka ny antokony amin’ny isam-bavahady. Izany rahateo no nandidian’i Davida olon’Andriamanitra azy'
  - type: note
    content: Momba ny fitsinjarana asa ao anatin’ireo antokona mpisorona sy levita ary mpiandry varavarana, jereo 1 Tan 23–26.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Ary tsy nialan’ireo ny didin’i Davida mpanjaka momba ny mpisorona sy ny levita na amin’inona na amin’inona, indrindra fa ny amin’ny fitahirizan-drakitra.
  '16':
  - type: text
    content: Toy izany no nahatontosana ny asa rehetra nokasain’i Salômôna, hatramin’ny andro nanorenana ny tranon’ny TOMPO ka ambaram-pahavitany; ka dia lavorary ny tranon’ny TOMPO.
  '17':
  - type: text
    content: 'Tamin’izay i Salômôna dia nankany Hetsiôny-Gebera sy Elôta eo amoron’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' any amin’ny tany Edôma. '
  '18':
  - type: text
    content: Dia nandefa sambo sy matilò mahay ranomasina i Hirama, tamin’ny alalan’ireo tandapany; ary nandeha niaraka tamin’ny tantsambon’i Salômôna ho any Ôfira ireo
  - type: note
    content: Jereo 1 Mp 9.28 sy nta.
  - type: text
    content: ', ka nahazo volamena 13 taonina mahery ary nitondra izany ho an’i Salômôna mpanjaka.'
  '2':
  - type: text
    content: dia namboariny ny tanàna izay nomen’i Hirama azy ka namponenany ny Israelita.
  '3':
  - type: text
    content: Dia nanafika an’i Hamata-Tsôbà
  - type: note
    content: Araka ny 2 Sam 8.3,9; 1 Tan 18.3, i Tsôbà sy i Hamata dia tanàna sady fanjakana anankiroa samy hafa.
  - type: text
    content: ' i Salômôna ka naharesy azy. '
  '4':
  - type: text
    content: Namboariny ny tanànan’i Tadmôra
  - type: note
    content: 'Tadmôra: tanàna any amin’ny taniefitr’i Siria ka i Palmira no fiantso azy ankehitriny izao.'
  - type: text
    content: ' tany an-taniefitra sy ny tanàna izay efa naoriny fahiny tao amin’ny faritr’i Hamata mba ho fitahirizam-bokatra. '
  '5':
  - type: text
    content: Namboariny koa i Bety-Hôrôna ambony sy i Bety-Hôrôna ambany
  - type: note
    content: I Bety-Hôrôna ambony sy i Bety-Hôrôna ambany dia tanàna tokony ho 20 km ao avaratra andrefan’i Jerosalema no misy azy.
  - type: text
    content: ', izay samy tanàna mafy mimanda sady misy vavahady tsara hidy; '
  '6':
  - type: text
    content: toraka izany ihany koa i Bahalato
  - type: note
    content: 'Bahalato: tanàna tokony ho 50 km ao andrefan’i Jerosalema no misy azy.'
  - type: text
    content: ' sy ny tanàna rehetra fitahirizam-bokatra na fitobian-kalesy na fitoeran-tsoavaly. Natsangan’i Salômôna avokoa izay rehetra tiany haorina tao Jerosalema sy tany Libano ary manerana ny tany nofeheziny.'
  '7':
  - type: text
    content: 'Mbola nisy sisa tavela teo amin’ny tany ireo antokon’olona isan-karazany, dia ny Hetita sy '
  - type: text
    content: Amôrita
  - type: text
    content: ' mbamin’ny Perizita sy Hivita ary Jebosita, izay samy tsy anisan’ny Israelita. '
  '8':
  - type: text
    content: 'Mbola nisy tavela teo tokoa ny taranak’ireo fa tsy naringan’ny Israelita, ka dia nampanaovin’i Salômôna asa fanompoana izay tohiziny mandraka androany. '
  '9':
  - type: text
    content: Ny Israelita kosa tsy mba nampanaovin’i Salômôna izany, fa narotsany
  - type: note
    content: 'Ny Israelita... narotsany: araka ny stf hebreo vitsivitsy sy ireo dkt tranainy ary ny rijan-teny mirazotra ao amin’ny 1 Mp 9.22.'
  - type: text
    content: ' ho miaramila na ho manamboninahitra na ho mpitondra kalesy na ho mpitaingin-tsoavaly. '
