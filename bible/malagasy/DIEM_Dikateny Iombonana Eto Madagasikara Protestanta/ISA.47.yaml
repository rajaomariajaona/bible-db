document_id: ISA.47,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana farany an’i Babilôna
  - type: text
    content: Midîna ambany ka mipetraha amin’ny vovoka,
  - type: text
    content: 'ry vahoaka mponin’i '
  - type: text
    content: Babilôna
  - type: text
    content: ', hoy ny TOMPO;'
  - type: text
    content: mipetraha amin’ny tany, ry renivohitry ny Kaldeanina
  - type: text
    content: fa tsy misy sezafiandrianana ho anao intsony,
  - type: text
    content: 'satria ianao tsy hantsoina intsony hoe:'
  - type: text
    content: «Babilôna
  - type: note
    content: 'Babilôna: jereo 13.1 sy nta.'
  - type: text
    content: ' tsara tarehy» na «Babilôna mirenty».'
  '10':
  - type: text
    content: Natoky ireo ody ratsy fanefitrao ianao,
  - type: text
    content: 'ka nanao hoe: «Tsy misy mahita ahy.»'
  - type: text
    content: Nefa ny fahendrena sy ny fahalalana
  - type: text
    content: nihamboanao hananana ihany
  - type: text
    content: no nampivadika atidoha anao,
  - type: text
    content: 'ka nampiteny anao anakampo hoe:'
  - type: text
    content: «Izaho dia tsy manan-tsahala!»
  '11':
  - type: text
    content: Koa indro hihatra aminao ny loza
  - type: text
    content: izay tsy hainao avily hidify anao;
  - type: text
    content: indro hiantonta aminao ny fahavoazana
  - type: text
    content: izay tsy azonao iarovan-tena;
  - type: text
    content: eny, hihatra tampoka aminao ny faharavana,
  - type: text
    content: dia faharavana izay tsy ampoizinao.
  '12':
  - type: text
    content: Tohizo ihany àry ny fankatòvanao
  - type: text
    content: sy ny ody maro fampiàsanao
  - type: text
    content: izay efa niezahanao hatry ny fahatanoranao;
  - type: text
    content: angamba hahazoanao tombontsoa izany
  - type: text
    content: na koa hampitahoranao izay mananontanona anao.
  '13':
  - type: text
    content: Vizana manontany ireo mpanandro ianao.
  - type: text
    content: Aoka hiseho sy ho avy hamonjy anao
  - type: text
    content: ireo mpamariparitra ny lanitra
  - type: text
    content: sy ireo mpandinindinika ny kintana
  - type: text
    content: ka mampahafantatra isaky ny tsinam-bolana
  - type: text
    content: izay zavatra tsy maintsy ho tonga aminao!
  '14':
  - type: text
    content: 'Ho toy ny mololo no hanjo ireo mpanandro ireo:'
  - type: text
    content: ho main’ny afo izy ka tsy hahavonjy tena
  - type: text
    content: ho afaka amin’ny herin’izany lelafo izany;
  - type: text
    content: fa tsy ho vainafo kely hanendasa-mofo izany
  - type: text
    content: na ho fatan’afo tsotra natao hamindroana!
  '15':
  - type: text
    content: Izany, ry Babilôna, no hanjo ireo mpimasinao
  - type: text
    content: izay efa nisasaranao nanontaniana
  - type: text
    content: hatry ny fony ianao mbola tanora.
  - type: text
    content: Samy handeha amin’izay halehany izy,
  - type: text
    content: fa tsy hisy na dia iray aza hahavonjy anao.
  '2':
  - type: text
    content: 'Makà '
  - type: text
    content: vato fikoseham-bary
  - type: text
    content: ' ka mitotoa koba.'
  - type: text
    content: Asehoy ny randranao, akaro ny morontongotr’akanjonao,
  - type: text
    content: asehoy ny ranjonao, hahazoanao mita ny renirano.
  '3':
  - type: text
    content: Aoka hiseho ny fitanjahanao
  - type: text
    content: ary ho hita izay mahamenatra anao.
  - type: text
    content: Hanao valifaty tokoa Aho
  - type: text
    content: ka tsy misy mahasakana Ahy
  - type: note
    content: Ny asa hataon’ny Babilônianina sy ny fietrena hihatra aminy dia ny an’ireo mpanompo andevozina.
  - type: text
    content: ','
  '4':
  - type: text
    content: hoy Ilay Mpanavotra anay.
  - type: text
    content: Ny TOMPOn’izao rehetra izao no anarany,
  - type: text
    content: dia Ilay Masin’i Israely.
  '5':
  - type: text
    content: Mipetraha mangina ianao
  - type: text
    content: ary misitriha any amin’ny maizina,
  - type: text
    content: ry renivohitry ny Kaldeanina,
  - type: text
    content: 'satria ianao tsy hantsoina intsony hoe:'
  - type: text
    content: «tompovavin’ny fanjakana maro».
  '6':
  - type: text
    content: Tezitra mafy tamin’ny vahoakako Aho,
  - type: text
    content: ka navelako hovetavetaina ilay anjara fananako.
  - type: text
    content: Natolotro teo an-tananao izy,
  - type: text
    content: kanefa tsy mba namindranao fo
  - type: text
    content: 'fa nampitondrainao '
  - type: text
    content: zioga
  - type: text
    content: ' mavesatra'
  - type: text
    content: hatramin’ny be antitra aza.
  '7':
  - type: text
    content: Nihambo haharitra mandrakizay ianao
  - type: text
    content: ka ho tompovavin’izao tontolo izao hatrany,
  - type: text
    content: fa tsy noeritreretinao akory izay niseho
  - type: text
    content: ary tsy noheverinao akory izay ho avy aoriana.
  '8':
  - type: text
    content: Ry tanàna tia fahafinaretana
  - type: text
    content: sady mipetraka tsy manana ahiahy,
  - type: text
    content: 'ianao miteny anakampo hoe:'
  - type: text
    content: «Izaho dia tsy manan-tsahala!
  - type: text
    content: Tsy ho mpitondratena mihitsy aho
  - type: text
    content: ary tsy ho faty anaka na oviana na oviana.»
  - type: text
    content: 'Fa ankehitriny henoinao kosa izao:'
  '9':
  - type: text
    content: Amin’ny indray andro monja
  - type: text
    content: 'dia hihatra tampoka aminao ireto loza roa ireto:'
  - type: text
    content: ho faty zanaka ianao sady hanjary mpitondratena
  - type: note
    content: Ampit Apôk 18.7-8.
  - type: text
    content: .
  - type: text
    content: Eny, hihatra aminao avokoa ireo,
  - type: text
    content: na dia maro aza ny ody fampiàsanao
  - type: text
    content: ary na dia zavontany aza ny fankatòvanao.
