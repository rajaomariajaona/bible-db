document_id: ISA.47,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana farany an’i Babilôna
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Midîna ambany ka mipetraha amin’ny vovoka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ry vahoaka mponin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: text
      text: ', hoy ny TOMPO;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mipetraha amin’ny tany, ry renivohitry ny Kaldeanina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy sezafiandrianana ho anao intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'satria ianao tsy hantsoina intsony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Babilôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Babilôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 13.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' tsara tarehy» na «Babilôna mirenty».'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Natoky ireo ody ratsy fanefitrao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka nanao hoe: «Tsy misy mahita ahy.»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ny fahendrena sy ny fahalalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nihamboanao hananana ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nampivadika atidoha anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka nampiteny anao anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izaho dia tsy manan-tsahala!»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa indro hihatra aminao ny loza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy hainao avily hidify anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro hiantonta aminao ny fahavoazana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy azonao iarovan-tena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hihatra tampoka aminao ny faharavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia faharavana izay tsy ampoizinao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tohizo ihany àry ny fankatòvanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny ody maro fampiàsanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa niezahanao hatry ny fahatanoranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: angamba hahazoanao tombontsoa izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa hampitahoranao izay mananontanona anao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Vizana manontany ireo mpanandro ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiseho sy ho avy hamonjy anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo mpamariparitra ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ireo mpandinindinika ny kintana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampahafantatra isaky ny tsinam-bolana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay zavatra tsy maintsy ho tonga aminao!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ho toy ny mololo no hanjo ireo mpanandro ireo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho main’ny afo izy ka tsy hahavonjy tena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho afaka amin’ny herin’izany lelafo izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho vainafo kely hanendasa-mofo izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho fatan’afo tsotra natao hamindroana!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izany, ry Babilôna, no hanjo ireo mpimasinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa nisasaranao nanontaniana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatry ny fony ianao mbola tanora.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy handeha amin’izay halehany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hisy na dia iray aza hahavonjy anao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Makà '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vato fikoseham-bary
    - type: text
      text: ' ka mitotoa koba.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asehoy ny randranao, akaro ny morontongotr’akanjonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asehoy ny ranjonao, hahazoanao mita ny renirano.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aoka hiseho ny fitanjahanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho hita izay mahamenatra anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanao valifaty tokoa Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy mahasakana Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny asa hataon’ny Babilônianina sy ny fietrena hihatra aminy dia ny an’ireo mpanompo andevozina.
      marker-yv: yv-n
    - type: text
      text: ','
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: hoy Ilay Mpanavotra anay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPOn’izao rehetra izao no anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ilay Masin’i Israely.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mipetraha mangina ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misitriha any amin’ny maizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry renivohitry ny Kaldeanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'satria ianao tsy hantsoina intsony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «tompovavin’ny fanjakana maro».
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tezitra mafy tamin’ny vahoakako Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka navelako hovetavetaina ilay anjara fananako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Natolotro teo an-tananao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy mba namindranao fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa nampitondrainao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zioga
    - type: text
      text: ' mavesatra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny be antitra aza.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nihambo haharitra mandrakizay ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tompovavin’izao tontolo izao hatrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy noeritreretinao akory izay niseho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy noheverinao akory izay ho avy aoriana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ry tanàna tia fahafinaretana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mipetraka tsy manana ahiahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ianao miteny anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izaho dia tsy manan-tsahala!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho mpitondratena mihitsy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho faty anaka na oviana na oviana.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa ankehitriny henoinao kosa izao:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Amin’ny indray andro monja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hihatra tampoka aminao ireto loza roa ireto:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho faty zanaka ianao sady hanjary mpitondratena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Apôk 18.7-8.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hihatra aminao avokoa ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia maro aza ny ody fampiàsanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia zavontany aza ny fankatòvanao.
