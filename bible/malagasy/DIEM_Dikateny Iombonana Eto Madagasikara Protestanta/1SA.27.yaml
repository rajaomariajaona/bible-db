document_id: 1SA.27,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida mialokaloka any amin’ny Filistinina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Davida anakampo: «Ho fatin’ny tanan’i Saoly ihany aho indray andro any. Koa ny tsara indrindra amiko dia tsy misy afa-tsy ny mandositra any amin’ny tanin’ny Filistinina. Hatsahatr’i Saoly ny fitadiavany ahy manerana ny faritanin’i Israely, ka dia ho afa-doza aminy aho.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka nony nanontany azy i Akisy hoe: «Taiza avy no nanafihanareo androany?», dia novaliany hoe: «Tany amin’ny faritra atsimon’i Joda» na «Tany amin’ny faritra atsimon’ny Jerahimeelita» na koa «Tany amin’ny faritra atsimon’ny Kenita'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jerahimeelita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kenita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia firenena mifanila amin’i Joda sady mpiray dina aminy. Ireo valintenin’i Davida ireo dia natao hampino ny Filistinina fa fahavalon’i Joda sy ireo mpiray dina aminy izy.'
      marker-yv: yv-n
    - type: text
      text: '». '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nasian’i Davida lehilahy na vehivavy iray velona hoentina any Gata, sao dia hisy hiampanga azy hoe: «Izao no nataon’i Davida.» Toy izany hatrany no fanaon’i Davida nandritra ny fotoana nitoerany tany amin’ny tanin’ny Filistinina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natoky an’i Davida i Akisy, satria nihevitra hoe: «Efa nanamaimbo tena tamin’ny Israelita mpiray firenena aminy izy, ka dia ho mpanompoko mandrakizay.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa lasa i Davida mbamin’ny eninjato lahy mpiara-dia aminy, nankany amin’i Akisy, zanakalahin’i Mahôka sady mpanjakan’i Gata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 5.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitoetra tao amin’i Akisy tany Gata i Davida sy ny olony nombàm-pianakaviana avy, mbamin’ireo vadin’i Davida roa, dia Ahinôhama avy any Jizrehela sy i Abigaîla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ahinôhama: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 25.43. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Abigaîla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 25.14-42.'
      marker-yv: yv-n
    - type: text
      text: ' vady navelan’i Nabala avy any Karmela. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa ren’i Saoly fa nandositra any Gata i Davida, dia nijanona tsy nitady azy intsony izy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro dia hoy i Davida tamin’i Akisy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha tsara fo amiko tokoa ianao, dia aoka aho mba homena toerana iray amin’ny tanàna any ambanivohitra hipetrahako. Fa mpanomponao aho ka nahoana no dia hiara-mitoetra aminao ato amin’ny renivohi-panjakàna?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iny andro iny ihany dia nomen’i Akisy azy ny tanànan’i Tsiklàga. Izany no nahatonga an’i Tsiklàga
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsiklàga: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna toa tokony ho 50 km ao atsimo andrefan’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny mpanjakan’i Joda mandraka androany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Herintaona sy efa-bolana no nitoeran’i Davida tao amin’ny tanin’ny Filistinina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy tao i Davida sy ny olony no niakatra nanafika ny Gesôrita sy ny Girzita ary ny Hamalekita; fa ireo no mponina hatrizay tamin’izany faritra izany, dia hatrany Sora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gesôrita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: firenena nifanila tamin’ny Filistinina (jereo Jos 13.2). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Girzita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': firenena tsy fantatra mazava. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hamalekita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Eks 17.8 sy nta. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Sora
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Eks 15.22 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' ka tafapaka any amin’ny sisin-tanin’i Ejipta. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nosimban’i Davida ny taniny, ka tsy nisy lehilahy sy vehivavy niangana na iray aza. Nobaboiny ny ondry aman’osy, ny omby mbamin’ny boriky sy ny rameva, ary ny fitafiana; dia niverina tany amin’i Akisy izy. '
