document_id: 1SA.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida mialokaloka any amin’ny Filistinina
  - type: text
    content: 'Hoy i Davida anakampo: «Ho fatin’ny tanan’i Saoly ihany aho indray andro any. Koa ny tsara indrindra amiko dia tsy misy afa-tsy ny mandositra any amin’ny tanin’ny Filistinina. Hatsahatr’i Saoly ny fitadiavany ahy manerana ny faritanin’i Israely, ka dia ho afa-doza aminy aho.» '
  '10':
  - type: text
    content: 'Ka nony nanontany azy i Akisy hoe: «Taiza avy no nanafihanareo androany?», dia novaliany hoe: «Tany amin’ny faritra atsimon’i Joda» na «Tany amin’ny faritra atsimon’ny Jerahimeelita» na koa «Tany amin’ny faritra atsimon’ny Kenita'
  - type: note
    content: Ny Jerahimeelita sy ny Kenita dia firenena mifanila amin’i Joda sady mpiray dina aminy. Ireo valintenin’i Davida ireo dia natao hampino ny Filistinina fa fahavalon’i Joda sy ireo mpiray dina aminy izy.
  - type: text
    content: '». '
  '11':
  - type: text
    content: 'Tsy nasian’i Davida lehilahy na vehivavy iray velona hoentina any Gata, sao dia hisy hiampanga azy hoe: «Izao no nataon’i Davida.» Toy izany hatrany no fanaon’i Davida nandritra ny fotoana nitoerany tany amin’ny tanin’ny Filistinina. '
  '12':
  - type: text
    content: 'Natoky an’i Davida i Akisy, satria nihevitra hoe: «Efa nanamaimbo tena tamin’ny Israelita mpiray firenena aminy izy, ka dia ho mpanompoko mandrakizay.»'
  '2':
  - type: text
    content: Koa lasa i Davida mbamin’ny eninjato lahy mpiara-dia aminy, nankany amin’i Akisy, zanakalahin’i Mahôka sady mpanjakan’i Gata
  - type: note
    content: 'Gata: jereo 5.8 sy nta.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: Nitoetra tao amin’i Akisy tany Gata i Davida sy ny olony nombàm-pianakaviana avy, mbamin’ireo vadin’i Davida roa, dia Ahinôhama avy any Jizrehela sy i Abigaîla
  - type: note
    content: 'Ahinôhama: jereo 25.43. –Abigaîla: jereo 25.14-42.'
  - type: text
    content: ' vady navelan’i Nabala avy any Karmela. '
  '4':
  - type: text
    content: Rehefa ren’i Saoly fa nandositra any Gata i Davida, dia nijanona tsy nitady azy intsony izy.
  '5':
  - type: text
    content: 'Indray andro dia hoy i Davida tamin’i Akisy:'
  - type: text
    content: –Raha tsara fo amiko tokoa ianao, dia aoka aho mba homena toerana iray amin’ny tanàna any ambanivohitra hipetrahako. Fa mpanomponao aho ka nahoana no dia hiara-mitoetra aminao ato amin’ny renivohi-panjakàna?
  '6':
  - type: text
    content: Iny andro iny ihany dia nomen’i Akisy azy ny tanànan’i Tsiklàga. Izany no nahatonga an’i Tsiklàga
  - type: note
    content: 'Tsiklàga: tanàna toa tokony ho 50 km ao atsimo andrefan’i Jerosalema.'
  - type: text
    content: ' ho an’ny mpanjakan’i Joda mandraka androany.'
  '7':
  - type: text
    content: 'Herintaona sy efa-bolana no nitoeran’i Davida tao amin’ny tanin’ny Filistinina. '
  '8':
  - type: text
    content: Avy tao i Davida sy ny olony no niakatra nanafika ny Gesôrita sy ny Girzita ary ny Hamalekita; fa ireo no mponina hatrizay tamin’izany faritra izany, dia hatrany Sora
  - type: note
    content: 'Gesôrita: firenena nifanila tamin’ny Filistinina (jereo Jos 13.2). –Girzita: firenena tsy fantatra mazava. –Hamalekita: jereo Eks 17.8 sy nta. –Sora: jereo Eks 15.22 sy nta.'
  - type: text
    content: ' ka tafapaka any amin’ny sisin-tanin’i Ejipta. '
  '9':
  - type: text
    content: 'Nosimban’i Davida ny taniny, ka tsy nisy lehilahy sy vehivavy niangana na iray aza. Nobaboiny ny ondry aman’osy, ny omby mbamin’ny boriky sy ny rameva, ary ny fitafiana; dia niverina tany amin’i Akisy izy. '
