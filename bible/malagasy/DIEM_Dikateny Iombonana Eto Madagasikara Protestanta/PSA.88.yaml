document_id: PSA.88,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Voatondro roa no tsy nahafaty ahy
  - type: text
    content: ' '
  - type: text
    content: Tononkira. Salamo nataon’ny terak’i Kôra. Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hohiraina amin’ny feo malahelohelo. Tononkalo fananarana avy amin’i Hemàna zanakalahin’i Zerà
  - type: note
    content: 'Hemàna zanakalahin’i Zerà: jereo 1 Tan 6.18-22; 25.1,4; Sal 89.1; 1 Mp 5.11.'
  - type: text
    content: .
  '10':
  - type: text
    content: Jembin’ny alahelo ny masoko.
  - type: text
    content: TOMPO ô, miantso vonjy aminao isan’andro aho
  - type: text
    content: ka manandra-tanana hivavaka aminao
  - type: note
    content: Jereo Sal 28.2 sy nta.
  - type: text
    content: .
  '11':
  - type: text
    content: Hanao zava-mahagaga ho an’ny maty ve Ianao?
  - type: text
    content: Hitsangana indray ve ireny mba hidera Anao?
  - type: text
    content: Fiatoana
  '12':
  - type: text
    content: Ny fitiavanao ve hotantaraina any amin’ny maty
  - type: text
    content: ary ny fahamarinanao hovisavisaina
  - type: text
    content: any amin’ny toeram-pahaverezana?
  '13':
  - type: text
    content: Ny zava-mahagaga vitanao ve
  - type: text
    content: ho fantatra any amin’ny haizina?
  - type: text
    content: Ary ny fitandroanao ny rariny ve
  - type: text
    content: ho fantatra any amin’ny tany fanadinoana?
  '14':
  - type: text
    content: Izaho kosa, TOMPO ô, miantso vonjy aminao;
  - type: text
    content: 'vao maraina dia efa eo anatrehanao ny tarainako:'
  '15':
  - type: text
    content: TOMPO ô, nahoana no nanary ahy Ianao
  - type: text
    content: ka tsy mety mijery ahy akory?
  '16':
  - type: text
    content: Hatramin’ny fahazazàko
  - type: text
    content: dia nahantra saika maty aho
  - type: text
    content: ary very hevitra dia very hevitra
  - type: text
    content: itambesaran’ny fampihorohoroanao.
  '17':
  - type: text
    content: Safotry ny fahatezeranao aho
  - type: text
    content: ary reraky ny fampitahoranao;
  '18':
  - type: text
    content: toy ny rano nandifotra ahy isan’andro ireny
  - type: text
    content: ka indray nanemitra ahy hatraiza hatraiza.
  '19':
  - type: text
    content: Nampanalavirinao ahy ireo sakaizako
  - type: text
    content: ka ny haizina sisa no hany namako.
  '2':
  - type: text
    content: Ry TOMPO Andriamanitra mpamonjiko ô,
  - type: text
    content: miantso vonjy aminao aho na andro na alina.
  '3':
  - type: text
    content: Aoka ho tonga eo anatrehanao ny fivavako;
  - type: text
    content: atongilano ny sofinao hihaino ny tarainako.
  '4':
  - type: text
    content: Eny, tofoky ny fahoriana aho,
  - type: text
    content: ary efa ambavahaona ny aiko.
  '5':
  - type: text
    content: Heverina ho isan’ireo afaka aina
  - type: text
    content: izay efa midina mankany am-pasana aho
  - type: text
    content: sady tahaka ny olona tsy manan-kery intsony.
  '6':
  - type: text
    content: Any amin’ny maty no anjara toerako
  - type: text
    content: toy ireo faty mitsitra ao am-pasana,
  - type: text
    content: izay tsy tsaroanao intsony
  - type: text
    content: sady tsy ombàn’ny fiarovanao.
  '7':
  - type: text
    content: Napetrakao any am-paran’ny lavaka aho,
  - type: text
    content: any amin’ny haizina tsy hita noanoa.
  '8':
  - type: text
    content: Nanindry mafy ahy ny fahatezeranao
  - type: text
    content: toy ny onjan-drano nanotofanao ahy.
  - type: text
    content: Fiatoana
  '9':
  - type: text
    content: Nampanalavirinao ahy ireo namako;
  - type: text
    content: izaho dia nataonao nankaloiloy azy.
  - type: text
    content: Voahidy tao amin’ny fahoriako aho,
  - type: text
    content: ka tsy tafavoaka intsony.
