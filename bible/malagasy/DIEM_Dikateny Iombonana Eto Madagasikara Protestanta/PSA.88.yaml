  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Jembin’ny alahelo ny masoko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, miantso vonjy aminao isan’andro aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manandra-tanana hivavaka aminao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 28.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hanao zava-mahagaga ho an’ny maty ve Ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsangana indray ve ireny mba hidera Anao?
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny fitiavanao ve hotantaraina any amin’ny maty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinanao hovisavisaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny toeram-pahaverezana?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny zava-mahagaga vitanao ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fantatra any amin’ny haizina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fitandroanao ny rariny ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fantatra any amin’ny tany fanadinoana?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izaho kosa, TOMPO ô, miantso vonjy aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'vao maraina dia efa eo anatrehanao ny tarainako:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: TOMPO ô, nahoana no nanary ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mety mijery ahy akory?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hatramin’ny fahazazàko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahantra saika maty aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary very hevitra dia very hevitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: itambesaran’ny fampihorohoroanao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Safotry ny fahatezeranao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary reraky ny fampitahoranao;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: toy ny rano nandifotra ahy isan’andro ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka indray nanemitra ahy hatraiza hatraiza.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nampanalavirinao ahy ireo sakaizako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny haizina sisa no hany namako.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ry TOMPO Andriamanitra mpamonjiko ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miantso vonjy aminao aho na andro na alina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aoka ho tonga eo anatrehanao ny fivavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atongilano ny sofinao hihaino ny tarainako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Eny, tofoky ny fahoriana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa ambavahaona ny aiko.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Heverina ho isan’ireo afaka aina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa midina mankany am-pasana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tahaka ny olona tsy manan-kery intsony.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Any amin’ny maty no anjara toerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ireo faty mitsitra ao am-pasana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy tsaroanao intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy ombàn’ny fiarovanao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Napetrakao any am-paran’ny lavaka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny haizina tsy hita noanoa.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nanindry mafy ahy ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny onjan-drano nanotofanao ahy.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nampanalavirinao ahy ireo namako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izaho dia nataonao nankaloiloy azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voahidy tao amin’ny fahoriako aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy tafavoaka intsony.
