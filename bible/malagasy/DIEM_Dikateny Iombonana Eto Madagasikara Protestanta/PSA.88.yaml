    - type: usfm
      marker: it
      children:
      - type: text
        text: Tononkira. Salamo nataon’ny terak’i Kôra. Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hohiraina amin’ny feo malahelohelo. Tononkalo fananarana avy amin’i Hemàna zanakalahin’i Zerà
    - type: usfm
