document_id: MRK.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanaon-drazana jiosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 15.1-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia tafavory teo amin’i Jesoa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' sy ny sasantsasany tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' avy any Jerosalema, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary nahatsikaritra fa ny sasany tamin’ny mpianatr’i Jesoa dia nihinan-kanina tamin’ny tanana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ', izany hoe tsy voasasa araka ny fombam-pivavahana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny Farisianina ary koa ny Jiosy rehetra dia tsy mihinan-kanina raha tsy avy misasa tanana amin’ny fomba manokana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lk 11.38.
    marker-yv: yv-n
  - type: text
    text: ', satria nifikitra tamin’ny fanao nampitain’ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary rehefa avy any an-tsena ry zareo, dia tsy mihinan-kanina raha tsy avy midio tsara araka ny fombam-pivavahana. Maro koa ny fanao hafa nolovany ka nifikirany, toy ny manasa ny zinga fisotroana, ny siny, ny fanaka varahina ary ny farafara fisakafoana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ary rehefa avy... midio tsara araka ny fombam-pivavahana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ary tsy mihinana zavatra avy eny an-tsena ry zareo raha tsy efa voadiony tsara araka ny fomba ara-pivavahana –ary ny farafara fisakafoana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy stf sasany tsy ahitana ireo teny ireo.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanontany an’i Jesoa ny Farisianina sy ny mpahay lalàna nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ireto mpianatrao no tsy manaraka ny fanao nampitain’ny razantsika, fa tanana maloto izao no ihinanany hanina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Marina tokoa ny naminanian’i Isaià anareo mpihatsaravelatsihy, araka ny voalazan’ny Soratra Masina hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Ity vahoaka ity, hoy Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tendro-molotra no anajany Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fony kosa lavitra Ahy mihitsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka poaka àty ny fivavahana ataony amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria didin’olombelona no ambarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fampianarako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 29.13, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny didin’Andriamanitra avelanareo, fa ny fomba amam-panao nampitain’olombelona kosa tananareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy koa i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Dia arianareo tsotra izao ny didin’Andriamanitra, mba hitandremanareo ny fomba amam-panaonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy i Mosesy: «Hajao ny rainao sy ny reninao», ary koa: «Izay miteny ratsy ny rainy na ny reniny dia hatao maty tokoa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.12 sy Deot 5.16; Eks 21.17 sy Lev 20.9.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ianareo kosa manambara fa raha misy olona milaza amin’ny rainy na ny reniny hoe: «Efa nataoko kôrbana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kôrbana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voambolana aramianina.
    marker-yv: yv-n
  - type: text
    text: ', izany hoe fanatitra ho an’Andriamanitra, ny zavatra tokony hanasoavako anao», '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia tsy avelanareo hanao na inona na inona intsony amin’ny rainy na amin’ny reniny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa ny fomba amam-panao ifandovanareo no anafoananareo ny tenin’Andriamanitra; ary mbola maro koa ny zavatra tahatahaka izany ataonareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zavatra tena mahaloto ny olona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 15.10-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nantsoin’i Jesoa hankeo aminy indray ny vahoaka sady nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mihainoa Ahy ianareo rehetra ka mahafantara. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy misy zavatra avy etỳ ivelany miditra ao anatin’ny olona ka mahaloto azy, fa izay mipoitra avy ao anatin’ny olona no mahaloto azy. [ '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay manan-tsofina hihainoana, aoka hihaino!]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa niala teo amin’ny vahoaka i Jesoa ka niditra tao an-trano, dia nanontany Azy momba io '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' io ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hay ve ianareo koa mba tsy mahafantatra? Tsy takatrareo ve fa izay rehetra avy etỳ ivelany ka miditra ao amin’ny olona dia tsy mahaloto azy, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: satria tsy miditra ao am-pony fa ao an-kibony ihany, ka alefa any amin’ny fanariana azy.
- type: usfm
  marker: p
  children:
  - type: text
    text: '(Izany no nentin’i Jesoa nanambara fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: ' avokoa ny hanina rehetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 10.9-16.
    marker-yv: yv-n
  - type: text
    text: ).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy koa i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny zavatra mipoitra avy ao amin’ny olona, izany no mahaloto ny olona; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'satria avy ao anaty, avy ao am-pon’ny olona no ipoiran’ny sain-dratsy mahatonga azy hijangajanga, hangalatra, hamono olona, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'haka vadin’olona, ho tia harena, hasiaka, hanambaka, haloto fitondrantena, hialona, hanao vava ratsy, hiavonavona, ho adala toetra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ireo zava-dratsy rehetra ireo no mipoitra avy ao anatin’ny olona ka mahaloto azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay vehivavy sirôfenisianina manam-pinoana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 15.21-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niala teo i Jesoa ary lasa nankany amin’ny faritany akaikin’ny tanàna atao hoe Tiro; ary niditra tao an-trano anankiray Izy fa tsy te ho fantatry ny olona, kanefa tsy afa-niafina. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nisy vehivavy anankiray izay, nanan-janaka vavy azon’ny fanahy maloto; vao nandre momba an’i Jesoa ravehivavy, dia lasa nankao aminy ka niankohoka teo an-tongony. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Miteny grika ravehivavy sady Sirôfenisianina firazanana; ary niangavy an’i Jesoa izy handroaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' hiala tao amin-janany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avelao aloha ho voky ny zanaka nateraka, fa tsy tsara raha ny mofon-janaka no alaina ka atsipy ho an’ny amboa kely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia namaly ravehivavy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nefa, Tompoko, na ny amboakely ao ambany latabatra aza, dia mba mihinana ny sombintsombiny avy amin’ny mofon’ny ankizy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izany no teninao, ka dia modia fa efa niala tamin’ny zanakao ny demony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary rehefa niala teo ravehivavy ka tonga tany an-tranony, dia nahita ny zanany matory tsara eo am-pandriana, efa nialan’ny demony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay marenina sady raiki-dela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia niala tao amin’ny faritanin’i Tiro i Jesoa ka nandalo tany Sidôna ary niverina teo amin’ny farihin’i Galilea, rehefa avy namakivaky ny faritany atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Dekapôly
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nisy lehilahy sady marenina no raiki-dela, nentin’ny olona ho eo aminy ary niangaviany Azy hametrahany tanana. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nentin’i Jesoa nihataka irery lavitra ny vahoaka ralehilahy ka noharoniny tamin’ny rantsan-tanana ny sofiny, ary nokasihiny sady nasiany rora ny lelany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niandrandra ny lanitra i Jesoa sady nisento ary niteny tamin-dralehilahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efatà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Efatà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voambolana aramianina.
    marker-yv: yv-n
  - type: text
    text: '! (izany hoe: «misokafa!»).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary niaraka tamin’izay dia nisokatra ny sofin-dralehilahy ary nivaha ny fatoran’ny lelany, ka afaka niteny tsara izy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia namepetra ny olona teo i Jesoa tsy hitantara na amin’iza na amin’iza; kanefa arakaraka ny nameperan’i Jesoa azy no vao mainka koa nampielezany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary dia talanjona izaitsizy ny olona ka vaky vava hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsara avokoa no nanaovany ny zavatra rehetra, fa sady nampalady ny marenina Izy no nampiteny ny moana.
