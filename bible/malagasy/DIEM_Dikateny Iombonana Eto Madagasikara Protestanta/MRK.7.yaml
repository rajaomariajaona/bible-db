document_id: MRK.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanaon-drazana jiosy
  - type: heading
    content: (Jereo Mt 15.1-20)
  - type: text
    content: 'Dia tafavory teo amin’i Jesoa ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' sy ny sasantsasany tamin’ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' avy any Jerosalema, '
  '10':
  - type: text
    content: 'Fa hoy i Mosesy: «Hajao ny rainao sy ny reninao», ary koa: «Izay miteny ratsy ny rainy na ny reniny dia hatao maty tokoa'
  - type: note
    content: Jereo Eks 20.12 sy Deot 5.16; Eks 21.17 sy Lev 20.9.
  - type: text
    content: '.» '
  '11':
  - type: text
    content: 'Fa ianareo kosa manambara fa raha misy olona milaza amin’ny rainy na ny reniny hoe: «Efa nataoko kôrbana'
  - type: note
    content: 'kôrbana: voambolana aramianina.'
  - type: text
    content: ', izany hoe fanatitra ho an’Andriamanitra, ny zavatra tokony hanasoavako anao», '
  '12':
  - type: text
    content: 'dia tsy avelanareo hanao na inona na inona intsony amin’ny rainy na amin’ny reniny izy. '
  '13':
  - type: text
    content: Koa ny fomba amam-panao ifandovanareo no anafoananareo ny tenin’Andriamanitra; ary mbola maro koa ny zavatra tahatahaka izany ataonareo.
  - type: heading
    content: Ny zavatra tena mahaloto ny olona
  - type: heading
    content: (Jereo Mt 15.10-20)
  '14':
  - type: text
    content: 'Dia nantsoin’i Jesoa hankeo aminy indray ny vahoaka sady nilazany hoe:'
  - type: text
    content: '–Mihainoa Ahy ianareo rehetra ka mahafantara. '
  '15':
  - type: text
    content: 'Tsy misy zavatra avy etỳ ivelany miditra ao anatin’ny olona ka mahaloto azy, fa izay mipoitra avy ao anatin’ny olona no mahaloto azy. [ '
  '16':
  - type: text
    content: Izay manan-tsofina hihainoana, aoka hihaino!]
  '17':
  - type: text
    content: 'Ary rehefa niala teo amin’ny vahoaka i Jesoa ka niditra tao an-trano, dia nanontany Azy momba io '
  - type: text
    content: fanoharana
  - type: text
    content: ' io ny '
  - type: text
    content: mpianany
  - type: text
    content: '; '
  '18':
  - type: text
    content: 'ka hoy i Jesoa taminy:'
  - type: text
    content: '–Hay ve ianareo koa mba tsy mahafantatra? Tsy takatrareo ve fa izay rehetra avy etỳ ivelany ka miditra ao amin’ny olona dia tsy mahaloto azy, '
  '19':
  - type: text
    content: satria tsy miditra ao am-pony fa ao an-kibony ihany, ka alefa any amin’ny fanariana azy.
  - type: text
    content: '(Izany no nentin’i Jesoa nanambara fa '
  - type: text
    content: madio
  - type: text
    content: ' avokoa ny hanina rehetra'
  - type: note
    content: Ampit Asa 10.9-16.
  - type: text
    content: ).
  '2':
  - type: text
    content: 'ary nahatsikaritra fa ny sasany tamin’ny mpianatr’i Jesoa dia nihinan-kanina tamin’ny tanana '
  - type: text
    content: maloto
  - type: text
    content: ', izany hoe tsy voasasa araka ny fombam-pivavahana.'
  '20':
  - type: text
    content: 'Dia hoy koa i Jesoa:'
  - type: text
    content: '–Ny zavatra mipoitra avy ao amin’ny olona, izany no mahaloto ny olona; '
  '21':
  - type: text
    content: 'satria avy ao anaty, avy ao am-pon’ny olona no ipoiran’ny sain-dratsy mahatonga azy hijangajanga, hangalatra, hamono olona, '
  '22':
  - type: text
    content: 'haka vadin’olona, ho tia harena, hasiaka, hanambaka, haloto fitondrantena, hialona, hanao vava ratsy, hiavonavona, ho adala toetra. '
  '23':
  - type: text
    content: Ireo zava-dratsy rehetra ireo no mipoitra avy ao anatin’ny olona ka mahaloto azy.
  - type: heading
    content: Ilay vehivavy sirôfenisianina manam-pinoana
  - type: heading
    content: (Jereo Mt 15.21-28)
  '24':
  - type: text
    content: 'Dia niala teo i Jesoa ary lasa nankany amin’ny faritany akaikin’ny tanàna atao hoe Tiro; ary niditra tao an-trano anankiray Izy fa tsy te ho fantatry ny olona, kanefa tsy afa-niafina. '
  '25':
  - type: text
    content: 'Dia nisy vehivavy anankiray izay, nanan-janaka vavy azon’ny fanahy maloto; vao nandre momba an’i Jesoa ravehivavy, dia lasa nankao aminy ka niankohoka teo an-tongony. '
  '26':
  - type: text
    content: 'Miteny grika ravehivavy sady Sirôfenisianina firazanana; ary niangavy an’i Jesoa izy handroaka ny '
  - type: text
    content: demony
  - type: text
    content: ' hiala tao amin-janany. '
  '27':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Avelao aloha ho voky ny zanaka nateraka, fa tsy tsara raha ny mofon-janaka no alaina ka atsipy ho an’ny amboa kely.
  '28':
  - type: text
    content: 'Dia namaly ravehivavy ka nanao hoe:'
  - type: text
    content: –Nefa, Tompoko, na ny amboakely ao ambany latabatra aza, dia mba mihinana ny sombintsombiny avy amin’ny mofon’ny ankizy ihany.
  '29':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Izany no teninao, ka dia modia fa efa niala tamin’ny zanakao ny demony.
  '3':
  - type: text
    content: Fa ny Farisianina ary koa ny Jiosy rehetra dia tsy mihinan-kanina raha tsy avy misasa tanana amin’ny fomba manokana
  - type: note
    content: Ampit Lk 11.38.
  - type: text
    content: ', satria nifikitra tamin’ny fanao nampitain’ny razany. '
  '30':
  - type: text
    content: Ary rehefa niala teo ravehivavy ka tonga tany an-tranony, dia nahita ny zanany matory tsara eo am-pandriana, efa nialan’ny demony.
  - type: heading
    content: Sitranin’i Jesoa ilay marenina sady raiki-dela
  '31':
  - type: text
    content: 'Dia niala tao amin’ny faritanin’i Tiro i Jesoa ka nandalo tany Sidôna ary niverina teo amin’ny farihin’i Galilea, rehefa avy namakivaky ny faritany atao hoe '
  - type: text
    content: Dekapôly
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Dia nisy lehilahy sady marenina no raiki-dela, nentin’ny olona ho eo aminy ary niangaviany Azy hametrahany tanana. '
  '33':
  - type: text
    content: 'Dia nentin’i Jesoa nihataka irery lavitra ny vahoaka ralehilahy ka noharoniny tamin’ny rantsan-tanana ny sofiny, ary nokasihiny sady nasiany rora ny lelany. '
  '34':
  - type: text
    content: 'Dia niandrandra ny lanitra i Jesoa sady nisento ary niteny tamin-dralehilahy hoe:'
  - type: text
    content: –Efatà
  - type: note
    content: 'Efatà: voambolana aramianina.'
  - type: text
    content: '! (izany hoe: «misokafa!»).'
  '35':
  - type: text
    content: 'Ary niaraka tamin’izay dia nisokatra ny sofin-dralehilahy ary nivaha ny fatoran’ny lelany, ka afaka niteny tsara izy. '
  '36':
  - type: text
    content: 'Dia namepetra ny olona teo i Jesoa tsy hitantara na amin’iza na amin’iza; kanefa arakaraka ny nameperan’i Jesoa azy no vao mainka koa nampielezany izany. '
  '37':
  - type: text
    content: 'Ary dia talanjona izaitsizy ny olona ka vaky vava hoe:'
  - type: text
    content: –Tsara avokoa no nanaovany ny zavatra rehetra, fa sady nampalady ny marenina Izy no nampiteny ny moana.
  '4':
  - type: text
    content: Ary rehefa avy any an-tsena ry zareo, dia tsy mihinan-kanina raha tsy avy midio tsara araka ny fombam-pivavahana. Maro koa ny fanao hafa nolovany ka nifikirany, toy ny manasa ny zinga fisotroana, ny siny, ny fanaka varahina ary ny farafara fisakafoana
  - type: note
    content: 'Ary rehefa avy... midio tsara araka ny fombam-pivavahana: dkt hafa Ary tsy mihinana zavatra avy eny an-tsena ry zareo raha tsy efa voadiony tsara araka ny fomba ara-pivavahana –ary ny farafara fisakafoana: misy stf sasany tsy ahitana ireo teny ireo.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Dia nanontany an’i Jesoa ny Farisianina sy ny mpahay lalàna nanao hoe:'
  - type: text
    content: –Nahoana ireto mpianatrao no tsy manaraka ny fanao nampitain’ny razantsika, fa tanana maloto izao no ihinanany hanina?
  '6':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Marina tokoa ny naminanian’i Isaià anareo mpihatsaravelatsihy, araka ny voalazan’ny Soratra Masina hoe:'
  '7':
  - type: text
    content: «Ity vahoaka ity, hoy Andriamanitra,
  - type: text
    content: tendro-molotra no anajany Ahy
  - type: text
    content: fa ny fony kosa lavitra Ahy mihitsy;
  - type: text
    content: ka poaka àty ny fivavahana ataony amiko,
  - type: text
    content: satria didin’olombelona no ambarany
  - type: text
    content: ho fampianarako
  - type: note
    content: Is 29.13, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '8':
  - type: text
    content: Ny didin’Andriamanitra avelanareo, fa ny fomba amam-panao nampitain’olombelona kosa tananareo.
  '9':
  - type: text
    content: 'Ary hoy koa i Jesoa taminy:'
  - type: text
    content: '–Dia arianareo tsotra izao ny didin’Andriamanitra, mba hitandremanareo ny fomba amam-panaonareo. '
