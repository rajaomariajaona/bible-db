document_id: ISA.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voaloboky ny Tompo
  - type: text
    content: 'Avelao aho hihira ho an’ny sakaizako, dia ny hiran’ny sakaizako momba ny voalobony:'
  - type: text
    content: Nanana voaloboka iray ity sakaizako
  - type: text
    content: teo amin’izay tanety lonaka izay.
  '10':
  - type: text
    content: Ny tanimboaloboka telo hekitara
  - type: text
    content: tsy hamokatra afa-tsy divay dimampolo litatra;
  - type: text
    content: izay mamafy varim-bazaha zato kilao
  - type: text
    content: tsy hioty afa-tsy folo kilao monja.»
  '11':
  - type: text
    content: Lozan’ireo olona mifoha maraina mba hitady toaka
  - type: text
    content: sady midoroka divay mandra-paharivan’ny andro!
  '12':
  - type: text
    content: Miala liana amin’ny feom-baliha sy lokanga
  - type: text
    content: ombàn’ny ampongatapaka sy sodina ireo;
  - type: text
    content: fa izay ataon’ny TOMPO tsy ahoany
  - type: text
    content: ary ny asa vitany tsy jereny akory!
  '13':
  - type: text
    content: «Noho izany, hoy ny Tompo,
  - type: text
    content: dia hoentin-ko babo ny vahoakako,
  - type: text
    content: satria tsy mahalala na inona na inona;
  - type: text
    content: ho fatin’ny mosary ny olomanga eo aminy
  - type: text
    content: ary ho fatin-ketaheta ny sarambabeny.»
  '14':
  - type: text
    content: Koa nitanatana vava izaitsizy ny fonenan’ny maty
  - type: text
    content: sady nanitatra ny tendany hanao telimoka azy;
  - type: text
    content: any no hivarinan’ny olomanga
  - type: text
    content: sy ny sarambabem-bahoakan’i Jerosalema
  - type: text
    content: miaraka amin’ny tabatabam-pifaliany.
  '15':
  - type: text
    content: Noho izany dia tsy maintsy hihohoka
  - type: text
    content: sy haetry amin’ny tany ny olombelona;
  - type: text
    content: hitanondrika ny olona mpiandranandrana.
  '16':
  - type: text
    content: Hasandratra kosa ny TOMPOn’izao rehetra izao
  - type: text
    content: amin’ny fanaovany fitsarana ara-drariny.
  - type: text
    content: Hiseho koa ny maha Andriamanitra masina Azy
  - type: text
    content: amin’ny fanehoany ny fahamarinany.
  '17':
  - type: text
    content: Eny amin’ny tanàna rava eny
  - type: text
    content: no hiraofan’ny zanak’ondry
  - type: text
    content: toy ny any amin’ny tany fiandrasana azy;
  - type: text
    content: eny koa ny zanak’osy afahy
  - type: text
    content: no hitady ny sakafony.
  '18':
  - type: text
    content: Lozan’ireo olona voazioga toy ny omby
  - type: text
    content: ho valin’ny ratsy nataony!
  - type: text
    content: Toy ny itarihana sarety no hitarihany
  - type: text
    content: ny famaizana vokatry ny otany.
  '19':
  - type: text
    content: 'Fa hoy indrindra izy ireo hoe:'
  - type: text
    content: «Aoka ho tanteraka haingana dia haingana
  - type: text
    content: izay hataon’ny TOMPO, mba hojerenay!
  - type: text
    content: Aoka ho tonga amin’ny fotoany
  - type: text
    content: ny fikasan’Ilay Masin’i Israely
  - type: text
    content: fa tianay ho fantatra!»
  '2':
  - type: text
    content: Nasainy ny tany, nesoriny ny vato,
  - type: text
    content: ary voaloboka voafantina no namboleny tao.
  - type: text
    content: Nanao tilikambo teo afovoany izy
  - type: text
    content: ary koa nandavaka famiazam-boaloboka
  - type: note
    content: Jereo Mt 21.33; Mk 12.1; Lk 20.9.
  - type: text
    content: ;
  - type: text
    content: dia nanantena azy hamoa voaloboka tsara Izy
  - type: text
    content: kanjo namoa voalobo-dratsy.
  '20':
  - type: text
    content: Lozan’ireo olona milaza ny tsara hoe ratsy
  - type: text
    content: na milaza ny ratsy hoe tsara.
  - type: text
    content: Ny maizina lazainy ho mazava
  - type: text
    content: ary ny mazava lazainy ho maizina;
  - type: text
    content: ny mamy lazainy ho mangidy
  - type: text
    content: ary ny mangidy lazainy ho mamy.
  '21':
  - type: text
    content: Lozan’ireo olona mihevi-tena ho hendry
  - type: text
    content: sy milaza azy ho marani-tsaina!
  '22':
  - type: text
    content: Lozan’ireo olona mahery misotro divay
  - type: text
    content: sy kinga amin’ny fampifangaroharoana toaka!
  '23':
  - type: text
    content: Manamarina ny olon-dratsy
  - type: text
    content: amin’ny fandraisana tsolotra izy ireny
  - type: text
    content: ary manala ny rariny amin’ny olo-marina.
  '24':
  - type: text
    content: Noho izany, dia ho tahaka ny mololo voadoron’ny afo
  - type: text
    content: sy ho tahaka ny bozaka levonin’ny afo no hanjo azy.
  - type: text
    content: Ho lò avy any am-potony izy
  - type: text
    content: ka ho lasa vovoka ny voniny,
  - type: text
    content: satria nariany ny fampianarana
  - type: text
    content: naroson’ny TOMPOn’izao rehetra izao
  - type: text
    content: ary notsiratsirainy ny tenin’ilay Masin’i Israely.
  - type: heading
    content: Toa totohondry voavonkina ny fandrahonan’ny Tompo
  - type: heading
    content: (5.25; jereo 9.7-20)
  '25':
  - type: text
    content: Izany indrindra no nampirehitra
  - type: text
    content: ny fahatezeran’ny TOMPO tamin’ny vahoakany.
  - type: text
    content: Naninji-tanana taminy sy namely azy Izy,
  - type: text
    content: Nampihovitrovitra ny tendrombohitra izany;
  - type: text
    content: ary toy ny fako tavela eny an-dàlambe
  - type: text
    content: no niampatramparan’ny fatin’olona
  - type: note
    content: 'Fatin’olona nilaozana tsy voalevina: jereo Jer 8.2 sy nta.'
  - type: text
    content: .
  - type: text
    content: Saingy, na teo aza izany rehetra izany,
  - type: text
    content: dia tsy mbola afaka ny fahatezeran’ny TOMPO
  - type: text
    content: fa maninji-tanana mandrahona ihany Izy.
  '26':
  - type: text
    content: Faneva famantarana no natsangan’ny TOMPO
  - type: text
    content: ho an’ny firenena iray any lavitra any
  - type: note
    content: 'firenena iray any lavitra any: ampit Jer 5.15. Io firenena io dia heverina ho i Asiria izay 1000 km eo ho eo any avaratra atsinanan’i Palestinina sady mandrahona ny hanafika azy tamin’izay fotoana izay.'
  - type: text
    content: ;
  - type: text
    content: ka misioka ny Tompo mba hiantsoana azy
  - type: text
    content: avy any am-paran’ny tany.
  - type: text
    content: Indro izany firenena izany fa nilomay
  - type: text
    content: ka ho avy faingana dia faingana tokoa.
  '27':
  - type: text
    content: Tsy misy olona mahatsiaro vizana akory eo aminy,
  - type: text
    content: tsy misy mitari-tongotra na rendremana resin-tory,
  - type: text
    content: tsy misy miboraka na ny fehikibony na ny fehikapany.
  '28':
  - type: text
    content: Voaranitra ny zana-tsipîkany,
  - type: text
    content: ary voahenjana avokoa ny tsipîkany.
  - type: text
    content: Mafy toy ny vatoafo ny kitron-tsoavaliny,
  - type: text
    content: ary miriotra toy ny tadio ny kodiaran-kalesiny.
  '29':
  - type: text
    content: Tahaka ny liom-bavy mierona no fandrenesana azy,
  - type: text
    content: eny, toy ny tigra mandrahona mafy
  - type: text
    content: ka mipaoka ny hazany sy mitondra azy,
  - type: text
    content: ary tsy misy maharombaka izany intsony.
  '3':
  - type: text
    content: 'Koa hoy ilay sakaizako hoe:'
  - type: text
    content: «Ankehitriny, ry mponin’i Jerosalema
  - type: text
    content: sy ianareo olona eto Joda,
  - type: text
    content: mba tsaraonareo Aho sy ny voaloboko.
  '30':
  - type: text
    content: Kanefa indray andro any,
  - type: text
    content: dia hisy varatra hiraondraona
  - type: text
    content: toy ny firohondrohon’ny ranomasina
  - type: text
    content: mba hamely io firenena io.
  - type: text
    content: Hijery izany tany izany ny olona ka tsy hahita
  - type: text
    content: afa-tsy haizim-pahoriana;
  - type: text
    content: fa hohamaizinin’ny zavona matevina
  - type: text
    content: ny fahazavan’ny andro.
  '4':
  - type: text
    content: Inona indray moa no mbola tokony hataoko
  - type: text
    content: amin’izany voaloboko izany
  - type: text
    content: ka tsy efa nataoko taminy?
  - type: text
    content: Nanantena azy hamoa voaloboka tsara aho
  - type: text
    content: ka nahoana no namoa voalobo-dratsy izy?
  '5':
  - type: text
    content: Ankehitriny dia hampahafantariko anareo
  - type: text
    content: 'izay hataoko amin’izany voaloboko izany:'
  - type: text
    content: Hoesoriko ny fefy tsilo miaro azy,
  - type: text
    content: dia hiraofan’ny biby fiompy izy.
  - type: text
    content: Harodako ny rindrim-bato manodidina,
  - type: text
    content: dia ho voahitsakitsaky ny mpandalo izy.
  '6':
  - type: text
    content: Hataoko tany lava volo ilay voaloboko
  - type: text
    content: ka tsy hisy hanety sy hiava azy intsony,
  - type: text
    content: fa tsilo sy songosongo no hitsiry eo;
  - type: text
    content: ary horarako mafy ny rahona
  - type: text
    content: tsy handatsaka ranonorana aminy.»
  '7':
  - type: text
    content: Ny taranak’i Israely no voaloboky ny TOMPO,
  - type: text
    content: dia ilay TOMPOn’izao rehetra izao,
  - type: text
    content: ary ny olona eto Joda no voly tiany indrindra.
  - type: text
    content: Fitandroana ny rariny no nantenain’ny TOMPO
  - type: text
    content: kanjo ny tsy rariny no teo;
  - type: text
    content: ary fahamarinana no nandrandrainy,
  - type: text
    content: kanjo kiakiam-pitarainana no teo.
  - type: heading
    content: Loza enina ho an’ny olo-maventy ao Joda
  - type: heading
    content: (5.8-24; jereo 10.1-4)
  '8':
  - type: text
    content: Lozan’ireo olona mpangorona
  - type: text
    content: manangon-trano miampy trano
  - type: text
    content: sy mamory saha miampy saha,
  - type: text
    content: mandra-paha tsy hisy toerana ho an’ny hafa intsony,
  - type: text
    content: ka hahatonga azy ho toka-monina amin’ny tany!
  '9':
  - type: text
    content: Fa ny TOMPOn’izao rehetra izao
  - type: text
    content: 'dia reko nanao fianianana hoe:'
  - type: text
    content: «Tsy maintsy horavana ireo trano maro ireo;
  - type: text
    content: eny, na ny lehibe sy mamirapiratra aza,
  - type: text
    content: dia ho lao tsy hisy mpipetraka.
