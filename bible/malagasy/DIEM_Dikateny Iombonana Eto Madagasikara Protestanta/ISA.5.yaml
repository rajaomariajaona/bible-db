document_id: ISA.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voaloboky ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avelao aho hihira ho an’ny sakaizako, dia ny hiran’ny sakaizako momba ny voalobony:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanana voaloboka iray ity sakaizako
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’izay tanety lonaka izay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nasainy ny tany, nesoriny ny vato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voaloboka voafantina no namboleny tao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanao tilikambo teo afovoany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa nandavaka famiazam-boaloboka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 21.33; Mk 12.1; Lk 20.9.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanantena azy hamoa voaloboka tsara Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo namoa voalobo-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa hoy ilay sakaizako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ankehitriny, ry mponin’i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ianareo olona eto Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsaraonareo Aho sy ny voaloboko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Inona indray moa no mbola tokony hataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izany voaloboko izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy efa nataoko taminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanantena azy hamoa voaloboka tsara aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahoana no namoa voalobo-dratsy izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ankehitriny dia hampahafantariko anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay hataoko amin’izany voaloboko izany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoesoriko ny fefy tsilo miaro azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiraofan’ny biby fiompy izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Harodako ny rindrim-bato manodidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho voahitsakitsaky ny mpandalo izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hataoko tany lava volo ilay voaloboko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy hanety sy hiava azy intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsilo sy songosongo no hitsiry eo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary horarako mafy ny rahona
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy handatsaka ranonorana aminy.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny taranak’i Israely no voaloboky ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay TOMPOn’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny olona eto Joda no voly tiany indrindra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fitandroana ny rariny no nantenain’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo ny tsy rariny no teo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fahamarinana no nandrandrainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo kiakiam-pitarainana no teo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza enina ho an’ny olo-maventy ao Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (5.8-24; jereo 10.1-4)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lozan’ireo olona mpangorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: manangon-trano miampy trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mamory saha miampy saha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-paha tsy hisy toerana ho an’ny hafa intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahatonga azy ho toka-monina amin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia reko nanao fianianana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy maintsy horavana ireo trano maro ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, na ny lehibe sy mamirapiratra aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho lao tsy hisy mpipetraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny tanimboaloboka telo hekitara
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hamokatra afa-tsy divay dimampolo litatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mamafy varim-bazaha zato kilao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hioty afa-tsy folo kilao monja.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lozan’ireo olona mifoha maraina mba hitady toaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady midoroka divay mandra-paharivan’ny andro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Miala liana amin’ny feom-baliha sy lokanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ombàn’ny ampongatapaka sy sodina ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay ataon’ny TOMPO tsy ahoany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny asa vitany tsy jereny akory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: «Noho izany, hoy ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hoentin-ko babo ny vahoakako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy mahalala na inona na inona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fatin’ny mosary ny olomanga eo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fatin-ketaheta ny sarambabeny.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa nitanatana vava izaitsizy ny fonenan’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nanitatra ny tendany hanao telimoka azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: any no hivarinan’ny olomanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny sarambabem-bahoakan’i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: miaraka amin’ny tabatabam-pifaliany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Noho izany dia tsy maintsy hihohoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy haetry amin’ny tany ny olombelona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitanondrika ny olona mpiandranandrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hasandratra kosa ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fanaovany fitsarana ara-drariny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiseho koa ny maha Andriamanitra masina Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fanehoany ny fahamarinany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny amin’ny tanàna rava eny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hiraofan’ny zanak’ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny any amin’ny tany fiandrasana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny koa ny zanak’osy afahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitady ny sakafony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lozan’ireo olona voazioga toy ny omby
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho valin’ny ratsy nataony!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny itarihana sarety no hitarihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny famaizana vokatry ny otany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy indrindra izy ireo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aoka ho tanteraka haingana dia haingana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hataon’ny TOMPO, mba hojerenay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho tonga amin’ny fotoany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fikasan’Ilay Masin’i Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tianay ho fantatra!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lozan’ireo olona milaza ny tsara hoe ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na milaza ny ratsy hoe tsara.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny maizina lazainy ho mazava
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mazava lazainy ho maizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mamy lazainy ho mangidy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mangidy lazainy ho mamy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lozan’ireo olona mihevi-tena ho hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy milaza azy ho marani-tsaina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lozan’ireo olona mahery misotro divay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy kinga amin’ny fampifangaroharoana toaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Manamarina ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fandraisana tsolotra izy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manala ny rariny amin’ny olo-marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Noho izany, dia ho tahaka ny mololo voadoron’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho tahaka ny bozaka levonin’ny afo no hanjo azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lò avy any am-potony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho lasa vovoka ny voniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nariany ny fampianarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: naroson’ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary notsiratsirainy ny tenin’ilay Masin’i Israely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toa totohondry voavonkina ny fandrahonan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (5.25; jereo 9.7-20)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izany indrindra no nampirehitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahatezeran’ny TOMPO tamin’ny vahoakany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naninji-tanana taminy sy namely azy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampihovitrovitra ny tendrombohitra izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny fako tavela eny an-dàlambe
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niampatramparan’ny fatin’olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Fatin’olona nilaozana tsy voalevina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jer 8.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saingy, na teo aza izany rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mbola afaka ny fahatezeran’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa maninji-tanana mandrahona ihany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Faneva famantarana no natsangan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny firenena iray any lavitra any
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'firenena iray any lavitra any: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Jer 5.15. Io firenena io dia heverina ho i Asiria izay 1000 km eo ho eo any avaratra atsinanan’i Palestinina sady mandrahona ny hanafika azy tamin’izay fotoana izay.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka misioka ny Tompo mba hiantsoana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any am-paran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro izany firenena izany fa nilomay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho avy faingana dia faingana tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy misy olona mahatsiaro vizana akory eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy mitari-tongotra na rendremana resin-tory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy miboraka na ny fehikibony na ny fehikapany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Voaranitra ny zana-tsipîkany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voahenjana avokoa ny tsipîkany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mafy toy ny vatoafo ny kitron-tsoavaliny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miriotra toy ny tadio ny kodiaran-kalesiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tahaka ny liom-bavy mierona no fandrenesana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, toy ny tigra mandrahona mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mipaoka ny hazany sy mitondra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy maharombaka izany intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
