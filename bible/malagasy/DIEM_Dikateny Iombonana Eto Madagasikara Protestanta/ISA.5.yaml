  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny firohondrohon’ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamely io firenena io.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hijery izany tany izany ny olona ka tsy hahita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afa-tsy haizim-pahoriana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hohamaizinin’ny zavona matevina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahazavan’ny andro.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona indray moa no mbola tokony hataoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izany voaloboko izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy efa nataoko taminy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanantena azy hamoa voaloboka tsara aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahoana no namoa voalobo-dratsy izy?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia hampahafantariko anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay hataoko amin’izany voaloboko izany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoesoriko ny fefy tsilo miaro azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiraofan’ny biby fiompy izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harodako ny rindrim-bato manodidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho voahitsakitsaky ny mpandalo izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko tany lava volo ilay voaloboko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy hanety sy hiava azy intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsilo sy songosongo no hitsiry eo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horarako mafy ny rahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy handatsaka ranonorana aminy.»
  '7':
  - type: usfm
    marker: q1
    children:
