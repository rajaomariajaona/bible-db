document_id: EXO.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nobaikoin’Andriamanitra hanohy ny dia i Mosesy
  - type: text
    content: 'Nibaiko an’i Mosesy ny TOMPO hoe:'
  - type: text
    content: –Mandehana, mialà amin’ity toerana ity ianao sy ny vahoaka izay navoakanao hiala tany Ejipta, ka mankanesa any amin’ny tany izay nianianako tamin’i Abrahama sy i Itsehàka ary i Jakôba fa homeko ny taranany
  - type: note
    content: Jereo Gen 12.7; 26.3; 28.13.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Raha vao hitan’ny Israelita rehetra ny andry rahona nijanona teo am-baravaran’ny tranolay masina, dia samy niankohoka amin’ny tany teo am-baravaran’ny tranolay avy ny tsirairay. '
  '11':
  - type: text
    content: Ary ny TOMPO niteny nifanatrika tamin’i Mosesy tahaka ny olona miresaka amin’ny sakaizany. Taorian’izay dia niverina ho an-toby i Mosesy; fa i Josoa, zanakalahin’i Nona sady zatovo mpanompon’i Mosesy, no mbola nijanona tao anatin’ny tranolay masina.
  - type: heading
    content: Ny resaka ataon’ny Tompo amin’i Mosesy
  '12':
  - type: text
    content: 'Hoy i Mosesy tamin’ny TOMPO:'
  - type: text
    content: '–Jereo ange, TOMPO ô! Ianao nandidy ahy mba hitarika ity vahoaka ity, nefa tsy nanondro izay tianao halefa hanampy ahy. Ianao ihany no nilaza fa fantatrao mihitsy aho ary nahazo fanambinana teo imasonao. '
  '13':
  - type: text
    content: Koa raha mahazo fanambinana teo imasonao tokoa aho, dia mba ampahafantaro ahy izay fikasanao. Ho fantatro Ianao amin’izay; sady ho tena nahazo fanambinana teo imasonao aho. Tsarovy koa fa ity firenena ity dia vahoakanao.
  '14':
  - type: text
    content: 'Dia namaly ny TOMPO hoe:'
  - type: text
    content: –Izaho mihitsy no handeha hiaraka aminao, ka hanome anao fiadanana!
  '15':
  - type: text
    content: 'Fa hoy indray i Mosesy taminy:'
  - type: text
    content: '–Raha tsy Ianao mihitsy no handeha hiaraka aminay, dia aza mibaiko anay hiala eto. '
  '16':
  - type: text
    content: Raha toa manko tsy hiaraka aminay Ianao, ahoana no hahafantarana fa nahazo fanambinana teo imasonao ny tenako sy ny vahoakanao? Satria ny fiarahanao aminay ihany no mampiavaka anay amin’ireo vahoaka hafa rehetra eto ambonin’ny tany.
  '17':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Hotanterahiko na dia izay vao nolazainao teo aza. Nahazo fanambinana teo imasoko manko ianao sady efa fantatro mihitsy.
  '18':
  - type: text
    content: 'Hoy koa i Mosesy tamin’ny Tompo:'
  - type: text
    content: '–Avelao àry aho mba hahita ny '
  - type: text
    content: voninahitrao
  - type: text
    content: .
  '19':
  - type: text
    content: 'Dia novalian’ny TOMPO hoe:'
  - type: text
    content: –Handalo eo anatrehanao Aho ka haneho aminao ny hatsaram-poko manontolo sady hanambara ny anarako hoe «Ny TOMPO». Fa hiantra izay tiako hiantrana Aho, ary hamindrafo amin’izay tiako hamindrana fo
  - type: note
    content: Jereo Rm 9.15.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Hirahiko ny '
  - type: text
    content: anjeliko
  - type: text
    content: ' mba hitari-dàlana anareo; horoahiko ny Kanahanita sy ny '
  - type: text
    content: Amôrita
  - type: text
    content: ', ny Hetita sy ny Perizita, ary ny Hivita sy ny Jebosita. '
  '20':
  - type: text
    content: 'Kanefa ianao tsy mahazo mijery Ahy miatrika, satria tsy misy olona hijery Ahy miatrika ka ho velona. '
  '21':
  - type: text
    content: 'Fa eto akaikiko eto, hoy Izaho TOMPO, dia misy toerana an-karambato hijanonanao. '
  '22':
  - type: text
    content: 'Rehefa mandalo mamirapiratry ny voninahitro Aho, dia hafeniko eo an-tsefatsefaky ny harambato ianao, ary hosaronako amin’ny tanako mandra-pandaloko. '
  '23':
  - type: text
    content: Avy eo vao hoesoriko ny tanako, ka ho azonao jerena avy ao ivohoko Aho, satria tsy azo jerena ny tavako.
  '3':
  - type: text
    content: Amin’izay ianareo dia ho afaka hiditra amin’io tany izay tondra-dronono sy tantely io
  - type: note
    content: Jereo 3.8 sy nta.
  - type: text
    content: . Saingy tsy hiara-mandeha aminareo ny tenako, fandrao haringako eny an-dàlana ianareo satria vahoaka mafy hatoka.
  '4':
  - type: text
    content: 'Nony ren’ny vahoaka izany teny fandrahonana izany, dia nisaona izy, ka tsy nisy olona nitondra haingo intsony. '
  '5':
  - type: text
    content: 'Ny TOMPO manko efa nandidy an’i Mosesy mba hilaza amin’ny Israelita hoe: «Vahoaka maditra mafy hatoka ianareo rehetra! Koa raha hiara-mandeha aminareo Aho, na dia indray mipi-maso aza, dia handevona anareo. Koa esory aminareo aloha ireo haingonareo, dia ho fantatro amin’izay ny hataoko aminareo.» '
  '6':
  - type: text
    content: 'Noho izany, raha vao niala tao an-tendrombohitra '
  - type: text
    content: Hôreba
  - type: text
    content: ' ireo Israelita, dia nanaisotra ny haingony.'
  - type: heading
    content: Ny Tranolay fihaonana
  '7':
  - type: text
    content: 'Isak’izay nilasy an-toby ny Israelita, dia nalain’i Mosesy ny tranolay masina ka naoriny teny ivelan’ny toby, teny lavidavitra. Nantsoina hoe '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' izany, satria izay rehetra te hanontany ny TOMPO dia mivoaka ny toby ka mankao amin’izany tranolay izany. '
  '8':
  - type: text
    content: 'Rehefa mankany i Mosesy, dia mitsangana avokoa ny olona mankeo am-baravaran’ny tranolainy avy, ka mijery an’i Mosesy ambara-pidiny ao amin’ny tranolay masina. '
  '9':
  - type: text
    content: Rehefa tafiditra i Mosesy
  - type: note
    content: Jereo 13.21 sy nta.
  - type: text
    content: ', dia nidina ny andry rahona ka nijanona teo am-baravaran’ny Tranolay fihaonana ary niresaka tamin’i Mosesy ny TOMPO. '
