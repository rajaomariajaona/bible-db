document_id: EXO.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nobaikoin’Andriamanitra hanohy ny dia i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nibaiko an’i Mosesy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana, mialà amin’ity toerana ity ianao sy ny vahoaka izay navoakanao hiala tany Ejipta, ka mankanesa any amin’ny tany izay nianianako tamin’i Abrahama sy i Itsehàka ary i Jakôba fa homeko ny taranany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 12.7; 26.3; 28.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hirahiko ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeliko
  - type: text
    text: ' mba hitari-dàlana anareo; horoahiko ny Kanahanita sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ', ny Hetita sy ny Perizita, ary ny Hivita sy ny Jebosita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’izay ianareo dia ho afaka hiditra amin’io tany izay tondra-dronono sy tantely io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: . Saingy tsy hiara-mandeha aminareo ny tenako, fandrao haringako eny an-dàlana ianareo satria vahoaka mafy hatoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony ren’ny vahoaka izany teny fandrahonana izany, dia nisaona izy, ka tsy nisy olona nitondra haingo intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny TOMPO manko efa nandidy an’i Mosesy mba hilaza amin’ny Israelita hoe: «Vahoaka maditra mafy hatoka ianareo rehetra! Koa raha hiara-mandeha aminareo Aho, na dia indray mipi-maso aza, dia handevona anareo. Koa esory aminareo aloha ireo haingonareo, dia ho fantatro amin’izay ny hataoko aminareo.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noho izany, raha vao niala tao an-tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: text
    text: ' ireo Israelita, dia nanaisotra ny haingony.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Tranolay fihaonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Isak’izay nilasy an-toby ny Israelita, dia nalain’i Mosesy ny tranolay masina ka naoriny teny ivelan’ny toby, teny lavidavitra. Nantsoina hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' izany, satria izay rehetra te hanontany ny TOMPO dia mivoaka ny toby ka mankao amin’izany tranolay izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehefa mankany i Mosesy, dia mitsangana avokoa ny olona mankeo am-baravaran’ny tranolainy avy, ka mijery an’i Mosesy ambara-pidiny ao amin’ny tranolay masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Rehefa tafiditra i Mosesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 13.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', dia nidina ny andry rahona ka nijanona teo am-baravaran’ny Tranolay fihaonana ary niresaka tamin’i Mosesy ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha vao hitan’ny Israelita rehetra ny andry rahona nijanona teo am-baravaran’ny tranolay masina, dia samy niankohoka amin’ny tany teo am-baravaran’ny tranolay avy ny tsirairay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny TOMPO niteny nifanatrika tamin’i Mosesy tahaka ny olona miresaka amin’ny sakaizany. Taorian’izay dia niverina ho an-toby i Mosesy; fa i Josoa, zanakalahin’i Nona sady zatovo mpanompon’i Mosesy, no mbola nijanona tao anatin’ny tranolay masina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny resaka ataon’ny Tompo amin’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy i Mosesy tamin’ny TOMPO:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Jereo ange, TOMPO ô! Ianao nandidy ahy mba hitarika ity vahoaka ity, nefa tsy nanondro izay tianao halefa hanampy ahy. Ianao ihany no nilaza fa fantatrao mihitsy aho ary nahazo fanambinana teo imasonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa raha mahazo fanambinana teo imasonao tokoa aho, dia mba ampahafantaro ahy izay fikasanao. Ho fantatro Ianao amin’izay; sady ho tena nahazo fanambinana teo imasonao aho. Tsarovy koa fa ity firenena ity dia vahoakanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia namaly ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho mihitsy no handeha hiaraka aminao, ka hanome anao fiadanana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy indray i Mosesy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha tsy Ianao mihitsy no handeha hiaraka aminay, dia aza mibaiko anay hiala eto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha toa manko tsy hiaraka aminay Ianao, ahoana no hahafantarana fa nahazo fanambinana teo imasonao ny tenako sy ny vahoakanao? Satria ny fiarahanao aminay ihany no mampiavaka anay amin’ireo vahoaka hafa rehetra eto ambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hotanterahiko na dia izay vao nolazainao teo aza. Nahazo fanambinana teo imasoko manko ianao sady efa fantatro mihitsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy koa i Mosesy tamin’ny Tompo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avelao àry aho mba hahita ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voninahitrao
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia novalian’ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handalo eo anatrehanao Aho ka haneho aminao ny hatsaram-poko manontolo sady hanambara ny anarako hoe «Ny TOMPO». Fa hiantra izay tiako hiantrana Aho, ary hamindrafo amin’izay tiako hamindrana fo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 9.15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Kanefa ianao tsy mahazo mijery Ahy miatrika, satria tsy misy olona hijery Ahy miatrika ka ho velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa eto akaikiko eto, hoy Izaho TOMPO, dia misy toerana an-karambato hijanonanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa mandalo mamirapiratry ny voninahitro Aho, dia hafeniko eo an-tsefatsefaky ny harambato ianao, ary hosaronako amin’ny tanako mandra-pandaloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Avy eo vao hoesoriko ny tanako, ka ho azonao jerena avy ao ivohoko Aho, satria tsy azo jerena ny tavako.
