  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Raha misy manao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voady
  - type: text
    text: ' hanokana olona ho an’ny TOMPO; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia araka ny vola tombananao haloany no hanefany voady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Marsilia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy tao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kartazy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia nahitana sombina takela-bato misy tarehimarika voasokitra mitovy karazana amin’itony vola fandoa hanefana voady itony; tokony ho tamin’ny taona 200 tal. J.K. no nanaovana izany takela-bato voasokitra izany.'
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Olona roapolo taona ka hatramin’ny enimpolo taona: ho an’ny lehilahy, dia sekela volafotsy dimampolo, araka ny sekela fampiasa ao amin’ny Toeramasina; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ho an’ny vehivavy, dia sekela volafotsy telopolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Olona dimy taona ka hatramin’ny roapolo taona; ho an’ny zazalahy, dia sekela roapolo; ho an’ny zazavavy, dia sekela folo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Zazakely dimy volana ka hatramin’ny dimy taona: ho an’ny zazalahikely, dia sekela dimy; ho an’ny zazavavikely dia sekela telo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Olona enimpolo taona no ho miakatra: ho an’ny lehilahy, dia sekela 15; ho an’ny vehivavy, dia sekela folo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Raha mahantra kosa ilay olona nivoady ka tsy mahaloa izay vola voatombanao haloany, dia hoentina eo anatrehan’ny mpisorona ilay olona natokana ho an’ny Tompo; araka izay fari-pananan’ilay nivoady no hanombanan’ny mpisorona ny vola haloa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Raha biby fiompy anisan’ireo fanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ho an’ny TOMPO no atao voady, dia ho voatokana ho an’ny TOMPO avokoa ny biby rehetra omena amin’izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy azo ovàna na atakalo izany, na tsara no hasolo ny ratsy na ratsy no hasolo ny tsara. Kanefa raha sendra misy biby anankiray natakalo biby hafa, dia samy ho voatokana ho an’Andriamanitra izy roroa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Raha biby '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' tsy fanolotra sorona ho an’ny TOMPO kosa no atao voady, dia hoentina eo anatrehan’ny mpisorona ilay biby. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny mpisorona no hanombana ny vidiny araka ny hatsàrany na haratsiny; dia izay tombam-bidy nataony no harahina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha tian’ny tompony havotana ilay biby, dia ny tombam-bidiny tongoavina ampahadimy no haloany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Raha trano no avahana hatokana ho an’ny TOMPO, dia hotombanan’ny mpisorona ny vidin’ilay trano araka ny hatsàrany na haràtsiny, dia izay tombam-bidy nataony no harahina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha tian’ny tompony havotana ilay trano, dia ny tombam-bidiny tongoavina ampahadimy no haloany; dia ho azy ny trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Raha zara tany no avahana hatokana ho an’ny TOMPO, dia araka ny haben’ny voan-javatra famafy eo no hanombanana ny vidiny; ka ny voam-bary ôrza telonjato kilao dia tombanana ho sekela volafotsy dimampolo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raha manomboka amin’ny taona Jobily
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 25.8-22.
    marker-yv: yv-n
  - type: text
    text: ' no anavahana tany hatokana ho an’ny Tompo, dia izany tombam-bidy izany no harahina. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa raha aorian’ny taona Jobily kosa no anavahana tany hatokana ho an’ny Tompo, dia ny isan’ny taona sisa mandra-pahatongan’ny taona Jobily no hameran’ny mpisorona ny vidiny, ka dia hahenany araka izany ny tombam-bidiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: «Raha tian’ny tompony havotana ny taniny, dia ny tombam-bidy tongoavana ampahadimy no haloany; dia hapetraka ho azy ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Raha tsy avotan’ny tompony kosa ny tany fa amidiny amin’olon-kafa, dia tsy azony avotana intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa rehefa afaka teo an-tanan’ilay nividy azy io tany io amin’ny taona Jobily, dia voatokana ho an’ny TOMPO tahaka ny tany afoy ho Azy; ka ny mpisorona no hanjary tompony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '«Raha tany novidina fa tsy zara tany no avahana hatokana ho an’ny TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia araka ny isan’ny taona sisa mandra-pahatongan’ny taona Jobily no hameran’ny mpisorona ny tombam-bidiny; ary androtr’io ihany no handoavan’ilay olona izany, dia hatokana ho an’ny TOMPO io vola io. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Amin’ny taona Jobily kosa dia hiverina amin’ilay nividianana azy ny tany, izany hoe amin’ilay tompon-dova.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: «Ny tombam-bidy rehetra dia araka ny sekela fampiasa ao amin’ny Toeramasina no hanaovana azy; ka milanja folo grama ny sekela iray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 3.13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zavatra isan-karazany fanavaka ho an’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '«Noho ny voalohan-teraky ny biby fiompy efa voatokana rahateo ho an’ny TOMPO, dia mazava loatra fa tsy azo avahan’ny isam-batan’olona mba hatokana ho an’ny TOMPO izany; koa na omby na ondry na osy, rehefa voalohan-teraka, dia an’ny TOMPO izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha voalohan-teraka amina biby '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' no hatokana ho an’ny TOMPO, dia azon’ny tompony avotana ilay biby, araka ny tombam-bidy tongoavina ampahadimy; fa raha tsy havotan’ny tompony izy, dia hamidy amin’olon-kafa araka ny tombam-bidiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: «Ny zavatra rehetra avahan’ny olona mba hafoy ho an’ny TOMPO, amin’izay ananany na olona na biby fiompy na zara tany, dia tsy ho azo amidy na avotana; ny zavatra rehetra, izay hafoy toy izany, dia zavatra voatokana tanteraka ho an’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 18.24.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny olona rehetra, izay hafoy ho an’ny TOMPO, dia tsy misy azo avotana fa hatao maty tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '«Ny ampahafolon’ny vokatry ny tany, na avy amin’ny tanim-bary na avy amin’ny saha, dia an’ny TOMPO; voatokana ho AZY izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha misy tian’ny tompony havotana io ampahafolon’ny vokatra io, dia ny tombam-bidy tongoavina ampahadimy no haloany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny ampahafolon’ny biby fiompy, na omby na ondry na osy, izany hoe ny biby voamariky ny tehin’ny mpiandry azy, dia voatokana ho an’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rehefa homen’ny mpiandry biby fiompy ireo biby hatokana ho an’ny Tompo, dia ampandalovina tsirairay eo anoloany ny biby fiompy rehetra ary dia marihiny amina tehina voaloko mena hatrany hatrany ny biby tandrifin’ny laharana fahafolo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tsy ijerena ny tsara na ratsy izany sady tsy azo atakalo; kanefa raha sendra misy biby anankiray natakalo biby hafa, dia samy ho voatokana ho an’Andriamanitra izy roroa ka samy tsy misy azo avotana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.33 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 30-33:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 18.21; Deot 14.22-23.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ireo no didy nampitain’ny TOMPO tamin’i Mosesy ho an’ny Israelita, teo an-tendrombohitra Sinay.
