      - type: text
        text: maloto
    - type: text
      text: ' tsy fanolotra sorona ho an’ny TOMPO kosa no atao voady, dia hoentina eo anatrehan’ny mpisorona ilay biby. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpisorona no hanombana ny vidiny araka ny hatsàrany na haratsiny; dia izay tombam-bidy nataony no harahina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tian’ny tompony havotana ilay biby, dia ny tombam-bidiny tongoavina ampahadimy no haloany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha trano no avahana hatokana ho an’ny TOMPO, dia hotombanan’ny mpisorona ny vidin’ilay trano araka ny hatsàrany na haràtsiny, dia izay tombam-bidy nataony no harahina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tian’ny tompony havotana ilay trano, dia ny tombam-bidiny tongoavina ampahadimy no haloany; dia ho azy ny trano.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha zara tany no avahana hatokana ho an’ny TOMPO, dia araka ny haben’ny voan-javatra famafy eo no hanombanana ny vidiny; ka ny voam-bary ôrza telonjato kilao dia tombanana ho sekela volafotsy dimampolo. '
