verses:
  '1':
  - type: heading
    content: 'Fanampiny: Ny vola fandoa rehefa manao voady'
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: Tsy azo ovàna na atakalo izany, na tsara no hasolo ny ratsy na ratsy no hasolo ny tsara. Kanefa raha sendra misy biby anankiray natakalo biby hafa, dia samy ho voatokana ho an’Andriamanitra izy roroa.
  '11':
  - type: text
    content: '«Raha biby '
  - type: text
    content: maloto
  - type: text
    content: ' tsy fanolotra sorona ho an’ny TOMPO kosa no atao voady, dia hoentina eo anatrehan’ny mpisorona ilay biby. '
  '12':
  - type: text
    content: 'Ny mpisorona no hanombana ny vidiny araka ny hatsàrany na haratsiny; dia izay tombam-bidy nataony no harahina. '
  '13':
  - type: text
    content: Raha tian’ny tompony havotana ilay biby, dia ny tombam-bidiny tongoavina ampahadimy no haloany.
  '14':
  - type: text
    content: '«Raha trano no avahana hatokana ho an’ny TOMPO, dia hotombanan’ny mpisorona ny vidin’ilay trano araka ny hatsàrany na haràtsiny, dia izay tombam-bidy nataony no harahina. '
  '15':
  - type: text
    content: Raha tian’ny tompony havotana ilay trano, dia ny tombam-bidiny tongoavina ampahadimy no haloany; dia ho azy ny trano.
  '16':
  - type: text
    content: '«Raha zara tany no avahana hatokana ho an’ny TOMPO, dia araka ny haben’ny voan-javatra famafy eo no hanombanana ny vidiny; ka ny voam-bary ôrza telonjato kilao dia tombanana ho sekela volafotsy dimampolo. '
  '17':
  - type: text
    content: Raha manomboka amin’ny taona Jobily
  - type: note
    content: Jereo 25.8-22.
  - type: text
    content: ' no anavahana tany hatokana ho an’ny Tompo, dia izany tombam-bidy izany no harahina. '
  '18':
  - type: text
    content: Fa raha aorian’ny taona Jobily kosa no anavahana tany hatokana ho an’ny Tompo, dia ny isan’ny taona sisa mandra-pahatongan’ny taona Jobily no hameran’ny mpisorona ny vidiny, ka dia hahenany araka izany ny tombam-bidiny.
  '19':
  - type: text
    content: «Raha tian’ny tompony havotana ny taniny, dia ny tombam-bidy tongoavana ampahadimy no haloany; dia hapetraka ho azy ny tany.
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Raha misy manao '
  - type: text
    content: voady
  - type: text
    content: ' hanokana olona ho an’ny TOMPO; '
  '20':
  - type: text
    content: '«Raha tsy avotan’ny tompony kosa ny tany fa amidiny amin’olon-kafa, dia tsy azony avotana intsony. '
  '21':
  - type: text
    content: Fa rehefa afaka teo an-tanan’ilay nividy azy io tany io amin’ny taona Jobily, dia voatokana ho an’ny TOMPO tahaka ny tany afoy ho Azy; ka ny mpisorona no hanjary tompony.
  '22':
  - type: text
    content: '«Raha tany novidina fa tsy zara tany no avahana hatokana ho an’ny TOMPO, '
  '23':
  - type: text
    content: 'dia araka ny isan’ny taona sisa mandra-pahatongan’ny taona Jobily no hameran’ny mpisorona ny tombam-bidiny; ary androtr’io ihany no handoavan’ilay olona izany, dia hatokana ho an’ny TOMPO io vola io. '
  '24':
  - type: text
    content: Amin’ny taona Jobily kosa dia hiverina amin’ilay nividianana azy ny tany, izany hoe amin’ilay tompon-dova.
  '25':
  - type: text
    content: «Ny tombam-bidy rehetra dia araka ny sekela fampiasa ao amin’ny Toeramasina no hanaovana azy; ka milanja folo grama ny sekela iray
  - type: note
    content: Ampit Eks 3.13.
  - type: text
    content: .
  - type: heading
    content: Zavatra isan-karazany fanavaka ho an’ny Tompo
  '26':
  - type: text
    content: '«Noho ny voalohan-teraky ny biby fiompy efa voatokana rahateo ho an’ny TOMPO, dia mazava loatra fa tsy azo avahan’ny isam-batan’olona mba hatokana ho an’ny TOMPO izany; koa na omby na ondry na osy, rehefa voalohan-teraka, dia an’ny TOMPO izany. '
  '27':
  - type: text
    content: 'Raha voalohan-teraka amina biby '
  - type: text
    content: maloto
  - type: text
    content: ' no hatokana ho an’ny TOMPO, dia azon’ny tompony avotana ilay biby, araka ny tombam-bidy tongoavina ampahadimy; fa raha tsy havotan’ny tompony izy, dia hamidy amin’olon-kafa araka ny tombam-bidiny.'
  '28':
  - type: text
    content: «Ny zavatra rehetra avahan’ny olona mba hafoy ho an’ny TOMPO, amin’izay ananany na olona na biby fiompy na zara tany, dia tsy ho azo amidy na avotana; ny zavatra rehetra, izay hafoy toy izany, dia zavatra voatokana tanteraka ho an’ny TOMPO
  - type: note
    content: Jereo Nom 18.24.
  - type: text
    content: '. '
  '29':
  - type: text
    content: Ny olona rehetra, izay hafoy ho an’ny TOMPO, dia tsy misy azo avotana fa hatao maty tokoa.
  '3':
  - type: text
    content: dia araka ny vola tombananao haloany no hanefany voady
  - type: note
    content: Tao Marsilia sy tao Kartazy dia nahitana sombina takela-bato misy tarehimarika voasokitra mitovy karazana amin’itony vola fandoa hanefana voady itony; tokony ho tamin’ny taona 200 tal. J.K. no nanaovana izany takela-bato voasokitra izany.
  - type: text
    content: ;
  - type: text
    content: '«Olona roapolo taona ka hatramin’ny enimpolo taona: ho an’ny lehilahy, dia sekela volafotsy dimampolo, araka ny sekela fampiasa ao amin’ny Toeramasina; '
  '30':
  - type: text
    content: '«Ny ampahafolon’ny vokatry ny tany, na avy amin’ny tanim-bary na avy amin’ny saha, dia an’ny TOMPO; voatokana ho AZY izany. '
  '31':
  - type: text
    content: 'Raha misy tian’ny tompony havotana io ampahafolon’ny vokatra io, dia ny tombam-bidy tongoavina ampahadimy no haloany. '
  '32':
  - type: text
    content: Ny ampahafolon’ny biby fiompy, na omby na ondry na osy, izany hoe ny biby voamariky ny tehin’ny mpiandry azy, dia voatokana ho an’ny TOMPO
  - type: note
    content: Rehefa homen’ny mpiandry biby fiompy ireo biby hatokana ho an’ny Tompo, dia ampandalovina tsirairay eo anoloany ny biby fiompy rehetra ary dia marihiny amina tehina voaloko mena hatrany hatrany ny biby tandrifin’ny laharana fahafolo.
  - type: text
    content: '. '
  '33':
  - type: text
    content: Tsy ijerena ny tsara na ratsy izany sady tsy azo atakalo; kanefa raha sendra misy biby anankiray natakalo biby hafa, dia samy ho voatokana ho an’Andriamanitra izy roroa ka samy tsy misy azo avotana
  - type: note
    content: 'And 30-33: jereo Nom 18.21; Deot 14.22-23.'
  - type: text
    content: .»
  '34':
  - type: text
    content: Ireo no didy nampitain’ny TOMPO tamin’i Mosesy ho an’ny Israelita, teo an-tendrombohitra Sinay.
  '4':
  - type: text
    content: ho an’ny vehivavy, dia sekela volafotsy telopolo.
  '5':
  - type: text
    content: «Olona dimy taona ka hatramin’ny roapolo taona; ho an’ny zazalahy, dia sekela roapolo; ho an’ny zazavavy, dia sekela folo.
  '6':
  - type: text
    content: '«Zazakely dimy volana ka hatramin’ny dimy taona: ho an’ny zazalahikely, dia sekela dimy; ho an’ny zazavavikely dia sekela telo.'
  '7':
  - type: text
    content: '«Olona enimpolo taona no ho miakatra: ho an’ny lehilahy, dia sekela 15; ho an’ny vehivavy, dia sekela folo.'
  '8':
  - type: text
    content: «Raha mahantra kosa ilay olona nivoady ka tsy mahaloa izay vola voatombanao haloany, dia hoentina eo anatrehan’ny mpisorona ilay olona natokana ho an’ny Tompo; araka izay fari-pananan’ilay nivoady no hanombanan’ny mpisorona ny vola haloa.
  '9':
  - type: text
    content: '«Raha biby fiompy anisan’ireo fanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’ny TOMPO no atao voady, dia ho voatokana ho an’ny TOMPO avokoa ny biby rehetra omena amin’izany. '
