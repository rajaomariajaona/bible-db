    - type: text
      text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy azo ovàna na atakalo izany, na tsara no hasolo ny ratsy na ratsy no hasolo ny tsara. Kanefa raha sendra misy biby anankiray natakalo biby hafa, dia samy ho voatokana ho an’Andriamanitra izy roroa.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha biby '
    - type: usfm
