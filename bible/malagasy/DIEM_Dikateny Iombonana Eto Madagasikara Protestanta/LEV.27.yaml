    - type: text
      text: ' no anavahana tany hatokana ho an’ny Tompo, dia izany tombam-bidy izany no harahina. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha aorian’ny taona Jobily kosa no anavahana tany hatokana ho an’ny Tompo, dia ny isan’ny taona sisa mandra-pahatongan’ny taona Jobily no hameran’ny mpisorona ny vidiny, ka dia hahenany araka izany ny tombam-bidiny.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Raha tian’ny tompony havotana ny taniny, dia ny tombam-bidy tongoavana ampahadimy no haloany; dia hapetraka ho azy ny tany.
