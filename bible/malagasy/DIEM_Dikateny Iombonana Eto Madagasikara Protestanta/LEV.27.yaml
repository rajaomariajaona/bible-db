    children:
    - type: text
      text: Fa rehefa afaka teo an-tanan’ilay nividy azy io tany io amin’ny taona Jobily, dia voatokana ho an’ny TOMPO tahaka ny tany afoy ho Azy; ka ny mpisorona no hanjary tompony.
