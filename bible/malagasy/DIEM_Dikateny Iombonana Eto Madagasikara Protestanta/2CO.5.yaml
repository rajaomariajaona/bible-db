document_id: 2CO.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Eny, fantatsika fa raha rava ny tranolay itoerantsika eto an-tany (izany hoe ity vatantsika ity), dia manan-trano izay tsy nataon-tanan’olona fa narafitr’Andriamanitra isika, dia trano maharitra mandrakizay any an-danitra. '
  '10':
  - type: text
    content: 'satria tsy maintsy hiseho eo anatrehan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' mba hotsarainy isika rehetra, ka handraisan’ny tsirairay avy ny tandrify azy araka izay nataony na tsara na ratsy fony mbola velona tao amin’ity vatana ity'
  - type: note
    content: Ampit Rm 14.10.
  - type: text
    content: .
  - type: heading
    content: Nampihavanin’i Kristy amin’Andriamanitra
  '11':
  - type: text
    content: 'Fantatray ny atao hoe fahatahorana ny Tompo, ka miezaka hampanaiky ny olona izahay. Tena mahalala anay Andriamanitra, ary antenaiko fa mahalala ahy ao amin’ny fieritreretanareo koa ianareo. '
  '12':
  - type: text
    content: 'Tsy hoe midera tena indray aminareo izahay, fa manome anareo izay hahazoanareo mirehareha ny aminay; ka dia mba hisy havalinareo ny olona mirehareha amin’ny zavatra eto ivelany fa tsy amin’ny zavatra ao am-po. '
  '13':
  - type: text
    content: 'Raha marina fa very saina izahay, dia ho an’Andriamanitra izany; raha mitombin-tsaina izahay, dia ho anareo izany. '
  '14':
  - type: text
    content: 'Fa ny fitiavan’i Kristy no manery anay, satria izao no hevitray: maty hamonjy ny olona rehetra ny olona anankiray; noho izany, nandalo fahafatesana koa izy rehetra. '
  '15':
  - type: text
    content: Maty hamonjy ny olona rehetra ny olona anankiray, mba tsy ho velona ho an’ny tenany intsony ireo velona, fa ho an’Ilay efa maty sy nitsangana velona hamonjy azy.
  '16':
  - type: text
    content: 'Ka hatramin’ny naha kristianina anay, dia tsy mihevitra na iza na iza araka ny fisainan’olombelona intsony izahay. Na dia nihevitra an’i Kristy araka ny fisainan’olombelona aza izahay fahiny, dia tsy manao toy izany intsony ankehitriny. '
  '17':
  - type: text
    content: 'Raha misy olona tafaray amin’i Kristy, dia olom-baovao izy; efa lasa ny zavatra tranainy, ary efa mby eo ny zavatra vaovao. '
  '18':
  - type: text
    content: 'Izany rehetra izany dia avy amin’Andriamanitra, Izay nampihavana antsika aminy indray tamin’ny alalan’i Kristy sady nanome anay ny fanompoana hitaona ny hafa hihavana aminy. '
  '19':
  - type: text
    content: Eny, Andriamanitra tsy nitana ny fahotan’ny olona fa nampihavana ny olona rehetra aminy indray tamin’ny alalan’i Kristy
  - type: note
    content: 'Eny... tamin’ny alalan’i Kristy: dkt hafa Andriamanitra dia tao amin’i Kristy, ka nampihavana ny olona rehetra aminy indray ary tsy nitana ny fahotany.'
  - type: text
    content: ; ary efa napetrak’Andriamanitra taminay izany teny mitory fampihavanana izany.
  '2':
  - type: text
    content: Koa misento anatin’ity tranolay ity isika
  - type: note
    content: Ampit Rm 8.23.
  - type: text
    content: ' fa maniry mafy hitafy ny tranontsika, dia ilay trano avy any an-danitra; '
  '20':
  - type: text
    content: 'Koa dia iraka solotenan’i Kristy izahay, ka tahaka ny hoe Andriamanitra mihitsy no mananatra anareo amin’ny alalanay. Solotenan’i Kristy izahay no miangavy anareo hoe: meteza hampihavanina amin’Andriamanitra ianareo. '
  '21':
  - type: text
    content: Tsy mba nanota na oviana na oviana i Kristy, nefa ny otantsika dia nampitondrain’Andriamanitra Azy ho famonjena antsika, mba hahatonga antsika handray ny fahamarinana omen’Andriamanitra noho ny firaisana amin’i Kristy.
  '3':
  - type: text
    content: 'satria rehefa itafiantsika izany, dia ho hita ho manana vatana vaovao isika. '
  '4':
  - type: text
    content: 'Eny, raha mbola amin’ity tranolay ity isika, dia misento tahaka ny itambesaran’entana. Tsy hoe satrintsika hendahana ity vatana ity fa satrintsika ny hitafy ilay vatana vaovao, mba hatelin’ny fiainana ny mety maty. '
  '5':
  - type: text
    content: Andriamanitra mihitsy no manomana antsika ho amin’izany fanovana izany, ka nanome antsika ny Fanahiny ho antoky ny soa natokany ho antsika.
  '6':
  - type: text
    content: 'Koa feno toky mandrakariva isika, na dia fantatsika aza fa raha mbola mitoetra ao amin’ity vatana ity isika, dia lavitry ny fonenan’ny Tompo, '
  '7':
  - type: text
    content: '(satria finoana no andehanantsika fa tsy hoe efa mahita sahady). '
  '8':
  - type: text
    content: 'Feno toky isika, koa aleontsika ny miala amin’ity vatana ity mba hitoetra eo anilan’ny Tompo. '
  '9':
  - type: text
    content: 'Fa ny hankasitrahin’ny Tompo no irîntsika voalohany indrindra, na mbola mitoetra ao amin’ity vatana ity isika na miala ao; '
