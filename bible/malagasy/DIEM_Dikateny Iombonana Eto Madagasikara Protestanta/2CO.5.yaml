document_id: 2CO.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Eny, fantatsika fa raha rava ny tranolay itoerantsika eto an-tany (izany hoe ity vatantsika ity), dia manan-trano izay tsy nataon-tanan’olona fa narafitr’Andriamanitra isika, dia trano maharitra mandrakizay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa misento anatin’ity tranolay ity isika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 8.23.
    marker-yv: yv-n
  - type: text
    text: ' fa maniry mafy hitafy ny tranontsika, dia ilay trano avy any an-danitra; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'satria rehefa itafiantsika izany, dia ho hita ho manana vatana vaovao isika. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eny, raha mbola amin’ity tranolay ity isika, dia misento tahaka ny itambesaran’entana. Tsy hoe satrintsika hendahana ity vatana ity fa satrintsika ny hitafy ilay vatana vaovao, mba hatelin’ny fiainana ny mety maty. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andriamanitra mihitsy no manomana antsika ho amin’izany fanovana izany, ka nanome antsika ny Fanahiny ho antoky ny soa natokany ho antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa feno toky mandrakariva isika, na dia fantatsika aza fa raha mbola mitoetra ao amin’ity vatana ity isika, dia lavitry ny fonenan’ny Tompo, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '(satria finoana no andehanantsika fa tsy hoe efa mahita sahady). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Feno toky isika, koa aleontsika ny miala amin’ity vatana ity mba hitoetra eo anilan’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ny hankasitrahin’ny Tompo no irîntsika voalohany indrindra, na mbola mitoetra ao amin’ity vatana ity isika na miala ao; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'satria tsy maintsy hiseho eo anatrehan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' mba hotsarainy isika rehetra, ka handraisan’ny tsirairay avy ny tandrify azy araka izay nataony na tsara na ratsy fony mbola velona tao amin’ity vatana ity'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 14.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Nampihavanin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' amin’Andriamanitra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fantatray ny atao hoe fahatahorana ny Tompo, ka miezaka hampanaiky ny olona izahay. Tena mahalala anay Andriamanitra, ary antenaiko fa mahalala ahy ao amin’ny fieritreretanareo koa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy hoe midera tena indray aminareo izahay, fa manome anareo izay hahazoanareo mirehareha ny aminay; ka dia mba hisy havalinareo ny olona mirehareha amin’ny zavatra eto ivelany fa tsy amin’ny zavatra ao am-po. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha marina fa very saina izahay, dia ho an’Andriamanitra izany; raha mitombin-tsaina izahay, dia ho anareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny fitiavan’i Kristy no manery anay, satria izao no hevitray: maty hamonjy ny olona rehetra ny olona anankiray; noho izany, nandalo fahafatesana koa izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Maty hamonjy ny olona rehetra ny olona anankiray, mba tsy ho velona ho an’ny tenany intsony ireo velona, fa ho an’Ilay efa maty sy nitsangana velona hamonjy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ka hatramin’ny naha kristianina anay, dia tsy mihevitra na iza na iza araka ny fisainan’olombelona intsony izahay. Na dia nihevitra an’i Kristy araka ny fisainan’olombelona aza izahay fahiny, dia tsy manao toy izany intsony ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha misy olona tafaray amin’i Kristy, dia olom-baovao izy; efa lasa ny zavatra tranainy, ary efa mby eo ny zavatra vaovao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izany rehetra izany dia avy amin’Andriamanitra, Izay nampihavana antsika aminy indray tamin’ny alalan’i Kristy sady nanome anay ny fanompoana hitaona ny hafa hihavana aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eny, Andriamanitra tsy nitana ny fahotan’ny olona fa nampihavana ny olona rehetra aminy indray tamin’ny alalan’i Kristy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Eny... tamin’ny alalan’i Kristy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra dia tao amin’i Kristy, ka nampihavana ny olona rehetra aminy indray ary tsy nitana ny fahotany.
    marker-yv: yv-n
  - type: text
    text: ; ary efa napetrak’Andriamanitra taminay izany teny mitory fampihavanana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa dia iraka solotenan’i Kristy izahay, ka tahaka ny hoe Andriamanitra mihitsy no mananatra anareo amin’ny alalanay. Solotenan’i Kristy izahay no miangavy anareo hoe: meteza hampihavanina amin’Andriamanitra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy mba nanota na oviana na oviana i Kristy, nefa ny otantsika dia nampitondrain’Andriamanitra Azy ho famonjena antsika, mba hahatonga antsika handray ny fahamarinana omen’Andriamanitra noho ny firaisana amin’i Kristy.
