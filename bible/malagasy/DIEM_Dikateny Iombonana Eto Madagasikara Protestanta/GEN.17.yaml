document_id: GEN.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Niova ho Abrahama ny anaran’i Abrama
  - type: text
    content: 'Rehefa feno 99 taona i Abrama, dia nisehoan’ny TOMPO ka nitenenany hoe:'
  - type: text
    content: '–Izaho no Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: '; aoka handeha eo anatrehako ianao sady tsy hanan-tsiny; '
  '10':
  - type: text
    content: 'Izao no fepetra izay takîko hotandremanareo, dia ianao sy ny taranakao mandimby anao: '
  - type: text
    content: hoforana
  - type: text
    content: ' ny lehilahy rehetra eo aminareo. '
  '11':
  - type: text
    content: 'Ny famorana anareo no ho famantarana ny fanekempihavanana ifanaovako aminareo. '
  '12':
  - type: text
    content: 'Hoforana ny zazalahy rehetra eo aminareo isaky ny taranaka mifandimby, rehefa feno valo andro; tahaka izany koa ireo mpanompo teraka ao an-tranonao na novidînao vola ka tsy isan’ny fokonao. '
  '13':
  - type: text
    content: 'Hoforana ny mpanompo teraka tao aminao sy ireo novidînao vola mba hitoetra eo amin’ny nofonareo ho fanekempihavanana maharitra mandrakizay ny mariky ny fanekempihavanako. '
  '14':
  - type: text
    content: Fa izay lehilahy tsy voafora eo amin’ny nofony dia hoesorina tsy ho eo amin’ny fireneny, satria tsy nanaja ny fanekempihavanako.
  '15':
  - type: text
    content: 'Dia hoy koa Andriamanitra tamin’i Abrahama:'
  - type: text
    content: –I Saray vadinao dia tsy hantsoina intsony hoe Saray; fa hatao hoe Sarà
  - type: note
    content: 'Saray sy Sarà: anarana iray ihany izay aseho amin’ny endrika roa, ary ny heviny dia mpanjakavavy na andriambavy.'
  - type: text
    content: 'ny anarany. '
  '16':
  - type: text
    content: Hotahîko
  - type: text
    content: ' izy ary homeko zanakalahy avy aminy koa ianao. Hotahîko izy ka ho tonga razamben’ny firenena maro, ary hisy mpanjakam-pirenena avy amin’ny taranany.'
  '17':
  - type: text
    content: 'Dia niankohoka tamin’ny tany i Abrahama sady nihomehy, satria hoy izy anakampo hoe: «Moa mbola hisy zaza teraka avy amin’ny lehilahy zato taona ve? Ary i Sarà efa sivifolo taona ve dia mbola hiteraka?» '
  '18':
  - type: text
    content: 'Koa hoy i Abrahama tamin’Andriamanitra:'
  - type: text
    content: –Enga anie i Jismahela no ho velona eo anatrehanao!
  '19':
  - type: text
    content: 'Fa namaly Andriamanitra hoe:'
  - type: text
    content: –Tsia, fa i Sarà vadinao dia hiteraka zazalahy ho anao ka ny anarany hataonao hoe Itsehàka
  - type: note
    content: Amin’ny teny hebreo ny anarana hoe Itsehàka dia mampahatsiaro ny matoanteny izay nadika hoe mihomehy izy eo amin’ny and 17; ampit 18.12-15.
  - type: text
    content: '. Hotanako ny fanekempihavanako aminy sy amin’ny taranany mandimby azy ho fanekempihavanana maharitra mandrakizay. '
  '2':
  - type: text
    content: 'fa hotolorako ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' ianao, ary hohamaroiko fatratra.'
  '20':
  - type: text
    content: 'Ary ny momba an’i Jismahela dia efa nohenoiko ny hatakao; indro hotahîko izy, ka hataoko maro anaka ary hampitomboiko fatratra ny taranany. Hiteraka andriana 12 izy sady ho razamben’ny firenen-dehibe iray. '
  '21':
  - type: text
    content: Fa ny fanekempihavanako kosa dia haoriko amin’i Itsehàka, izay haterak’i Sarà ho anao amin’ny herintaona toy izao.
  '22':
  - type: text
    content: 'Rehefa vitan’Andriamanitra ny resaka nifanaovany tamin’i Abrahama, dia nandao azy Izy. '
  '23':
  - type: text
    content: 'Dia nalain’i Abrahama i Jismahela zanany lahy sy ireo mpanompony rehetra na izay teraka tao aminy na izay novidîny vola, dia ny lehilahy rehetra tao an-tranony; ka noforany avokoa ireo iny andro iny ihany araka izay nandidian’Andriamanitra azy. '
  '24':
  - type: text
    content: 'Efa 99 taona i Abrahama, raha noforana; '
  '25':
  - type: text
    content: 'ary i Jismahela kosa dia efa 13 taona. '
  '26':
  - type: text
    content: 'Andro iray ihany no namorana azy mianaka, '
  '27':
  - type: text
    content: mbamin’ny lehilahy rehetra tao an-tranon’i Abrahama, na ireo mpanompo teraka tao an-trano na ireo novidîny vola tamin’ny vahiny.
  '3':
  - type: text
    content: 'Dia niankohoka i Abrama; ary hoy indray Andriamanitra taminy:'
  '4':
  - type: text
    content: '–Amiko, dia izao no fanekempihavanako aminao: Hanjary razamben’ny firenena maro ianao. '
  '5':
  - type: text
    content: Tsy hatao hoe Abrama intsony ny anaranao fa hanjary Abrahama, satria hataoko razamben’ny firenena maro ianao
  - type: note
    content: Ny anarana hoe Abrahama amin’ny teny hebreo dia mampahatsiaro ny voambolana izay nadika hoe razamben’ny...maro eto; jereo Rm 4.17.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Hataoko maro taranaka fatratra ianao ka hanjary firenena maro, sady hisy mpanjaka hipoitra avy aminao. '
  '7':
  - type: text
    content: Hajoroko ny fanekempihavanako aminao mbamin’ny taranakao mandimby anao; ho fanekempihavanana maharitra mandrakizay izany, ka dia ho Andriamanitrao sy ny taranakao mandimby anao Aho
  - type: note
    content: Jereo Lk 1.55.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Homeko anao sy ny taranakao mandimby anao ny tany Kanahàna manontolo, dia izao tany ivahinianao izao, ho fananany mandrakizay; ary ho Andriamanitr’izy ireo Aho
  - type: note
    content: Jereo Asa 7.5.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Dia hoy koa Andriamanitra tamin’i Abrahama:'
  - type: text
    content: '–Hitandrina ny fanekempihavanako ianao sy ny taranakao mandimby anao hatrany hatrany. '
