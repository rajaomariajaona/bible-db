document_id: GEN.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niova ho Abrahama ny anaran’i Abrama
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa feno 99 taona i Abrama, dia nisehoan’ny TOMPO ka nitenenany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izaho no Andriamanitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsitoha
    - type: text
      text: '; aoka handeha eo anatrehako ianao sady tsy hanan-tsiny; '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izao no fepetra izay takîko hotandremanareo, dia ianao sy ny taranakao mandimby anao: '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hoforana
    - type: text
      text: ' ny lehilahy rehetra eo aminareo. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny famorana anareo no ho famantarana ny fanekempihavanana ifanaovako aminareo. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hoforana ny zazalahy rehetra eo aminareo isaky ny taranaka mifandimby, rehefa feno valo andro; tahaka izany koa ireo mpanompo teraka ao an-tranonao na novidînao vola ka tsy isan’ny fokonao. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hoforana ny mpanompo teraka tao aminao sy ireo novidînao vola mba hitoetra eo amin’ny nofonareo ho fanekempihavanana maharitra mandrakizay ny mariky ny fanekempihavanako. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa izay lehilahy tsy voafora eo amin’ny nofony dia hoesorina tsy ho eo amin’ny fireneny, satria tsy nanaja ny fanekempihavanako.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy koa Andriamanitra tamin’i Abrahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –I Saray vadinao dia tsy hantsoina intsony hoe Saray; fa hatao hoe Sarà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Saray
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sarà:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'anarana iray ihany izay aseho amin’ny endrika roa, ary ny heviny dia '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mpanjakavavy na andriambavy
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ny anarany. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hotahîko
    - type: text
      text: ' izy ary homeko zanakalahy avy aminy koa ianao. Hotahîko izy ka ho tonga razamben’ny firenena maro, ary hisy mpanjakam-pirenena avy amin’ny taranany.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia niankohoka tamin’ny tany i Abrahama sady nihomehy, satria hoy izy anakampo hoe: «Moa mbola hisy zaza teraka avy amin’ny lehilahy zato taona ve? Ary i Sarà efa sivifolo taona ve dia mbola hiteraka?» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa hoy i Abrahama tamin’Andriamanitra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Enga anie i Jismahela no ho velona eo anatrehanao!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa namaly Andriamanitra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, fa i Sarà vadinao dia hiteraka zazalahy ho anao ka ny anarany hataonao hoe Itsehàka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Itsehàka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia mampahatsiaro ny matoanteny izay nadika hoe '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mihomehy izy
        - type: text
          text: ' eo amin’ny and 17; ampit 18.12-15.'
      marker-yv: yv-n
    - type: text
      text: '. Hotanako ny fanekempihavanako aminy sy amin’ny taranany mandimby azy ho fanekempihavanana maharitra mandrakizay. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'fa hotolorako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' ianao, ary hohamaroiko fatratra.'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny momba an’i Jismahela dia efa nohenoiko ny hatakao; indro hotahîko izy, ka hataoko maro anaka ary hampitomboiko fatratra ny taranany. Hiteraka andriana 12 izy sady ho razamben’ny firenen-dehibe iray. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa ny fanekempihavanako kosa dia haoriko amin’i Itsehàka, izay haterak’i Sarà ho anao amin’ny herintaona toy izao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Rehefa vitan’Andriamanitra ny resaka nifanaovany tamin’i Abrahama, dia nandao azy Izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nalain’i Abrahama i Jismahela zanany lahy sy ireo mpanompony rehetra na izay teraka tao aminy na izay novidîny vola, dia ny lehilahy rehetra tao an-tranony; ka noforany avokoa ireo iny andro iny ihany araka izay nandidian’Andriamanitra azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Efa 99 taona i Abrahama, raha noforana; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ary i Jismahela kosa dia efa 13 taona. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Andro iray ihany no namorana azy mianaka, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: mbamin’ny lehilahy rehetra tao an-tranon’i Abrahama, na ireo mpanompo teraka tao an-trano na ireo novidîny vola tamin’ny vahiny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia niankohoka i Abrama; ary hoy indray Andriamanitra taminy:'
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '–Amiko, dia izao no fanekempihavanako aminao: Hanjary razamben’ny firenena maro ianao. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy hatao hoe Abrama intsony ny anaranao fa hanjary Abrahama, satria hataoko razamben’ny firenena maro ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abrahama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'amin’ny teny hebreo dia mampahatsiaro ny voambolana izay nadika hoe '
        - type: usfm
          marker: it
          children:
          - type: text
            text: razamben’ny...maro
        - type: text
          text: ' eto; jereo Rm 4.17.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hataoko maro taranaka fatratra ianao ka hanjary firenena maro, sady hisy mpanjaka hipoitra avy aminao. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hajoroko ny fanekempihavanako aminao mbamin’ny taranakao mandimby anao; ho fanekempihavanana maharitra mandrakizay izany, ka dia ho Andriamanitrao sy ny taranakao mandimby anao Aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 1.55.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Homeko anao sy ny taranakao mandimby anao ny tany Kanahàna manontolo, dia izao tany ivahinianao izao, ho fananany mandrakizay; ary ho Andriamanitr’izy ireo Aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 7.5.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy koa Andriamanitra tamin’i Abrahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hitandrina ny fanekempihavanako ianao sy ny taranakao mandimby anao hatrany hatrany. '
