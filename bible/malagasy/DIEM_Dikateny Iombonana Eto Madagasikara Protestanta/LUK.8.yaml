document_id: LUK.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo vehivavy niara-dia tamin’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany, lasa nitety tanàn-dehibe sy tanàna kely i Jesoa nitoriteny sy nanambara ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '. Niaraka tamin’i Jesoa ny 12 lahy '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary koa ireo vehivavy sasany izay nositraniny tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanahy maloto
  - type: text
    text: ' sy ny aretina: dia i Maria, antsoina hoe Magdalèna, izay nialana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' fito, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sy i Jôhanina, vadin’i Kozà mpitandrim-pananan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  - type: text
    text: ', ary i Sozanina sy ny maro hafa koa. Ireo vehivavy ireo dia samy nanampy an’i Jesoa sy ny mpianany tamin’ny fananany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny mpamafy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 13.1-9; Mk 4.1-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nirohotra avy any amin’ny tanàna samihafa ny olona hanatona an’i Jesoa, hany ka vahoaka betsaka no tafangona teo aminy. Dia niteny Izy nanao izao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' izao:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '–Niainga ity mpamafy hamafy voa. Nony namafy izy, ny voa sasany dia latsaka teny amoron-dalana ka voahosin’ny mpandalo ary lanin’ny voro-manidina; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ny voa sasany kosa latsaka teny ambony vatolampy, ka vao naniry dia nalazo satria tsy ampy hamandoana; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ny voa sasany indray latsaka tany anaty tsilo, ka niara-naniry tamin’ny tsilo dia voageja; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary ny voa sasany latsaka tamin’ny tany tsara, ka naniry ary namoa zato heny.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Avy nilaza izany i Jesoa, dia niantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izay manan-tsofina hihainoana, aoka hihaino!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anton’ny itenenan’i Jesoa am-panoharana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 13.10-17; Mk 4.10-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanontanian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ny dikan’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' i Jesoa, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka namaly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianareo no natao hahalala ny tsiambaratelo momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ; fa ho an’ny hafa kosa dia ankamantatra saro-pantarina no itenenana izany, hany ka
- type: usfm
  marker: q1
  children:
  - type: text
    text: «hijery izy fa tsy hahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hihaino fa tsy hahafantatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 6.9, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hazavain’i Jesoa ny fanoharana momba ny mpamafy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 13.18-23; Mk 4.13-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '–Koa izao àry no dikan’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' teo. Ny voa dia ny tenin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireny teo amoron-dalana dia izay mahaheno ihany; kanjo avy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ', ka manaisotra ny teny tao am-pony sao mino izy ka ho voavonjy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireny teo ambony vatolampy kosa dia izay mahaheno sady mandray ny teny an-kafaliana nefa tsy mandatsaka lalina izany ao aminy; mba mino vetivety ihany izy, kanjo mihemotra amin’ny fotoana fitsapana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny latsaka teo amin’ny tsilo indray dia izay mahaheno ihany koa; kanjo eny an-dalam-pivahiniana, voagejan’ny ahiahy sy ny harena ary ny fahafinaretan’ny fiainana mandalo ka tsy mahavanom-boa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny latsaka tamin’ny tany tsara kosa dia izay mahaheno ny teny amin’ny fo tsara sy lavorary, ka mitana azy, ary mamokatra amin’ny faharetana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny jiro
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 4.21-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: –Tsy misy mampirehitra jiro, ka manarona azy amin’ny siny na manitrika azy ao ambany farafara; fa eo ambony fitoeran-jiro no apetrany, hany ka izay miditra ao an-trano dia mahita ny hazavana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 5.15; Lk 11.33.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy misy takona izay tsy haseho na miafina izay tsy ho fantatra sy haharihary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa tandremo àry ny fomba fihainoanareo; satria izay manana no homena; ary izay tsy manana kosa, na izay kely heveriny ho ananany aza dia halàna aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tena fianakavian’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 12.46-50; Mk 3.31-35)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tonga hamangy an’i Jesoa ny reniny sy ny rahalahiny, nefa tsy afa-nanatona Azy noho ny hamaroan’ny olona; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia nilazana i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ao alatrano ao ny reninao sy ny rahalahinao te hihaona kely aminao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa hoy i Jesoa tamin’izay rehetra teo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny reniko sy ny rahalahiko dia izay mihaino ny tenin’Andriamanitra no sady manatanteraka azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampitsaharin’i Jesoa ny tafio-drivotra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 8.23-27; Mk 4.35-41)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Indray andro, niondrana an-tsambokely i Jesoa mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ', ka hoy Izy tamin’ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha isika hankeny ampitan’ny farihy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny farihin’i Galilea no tenenina eto. Karazan’olona tsy Jiosy fa hafa firenena no niorim-ponenana tamin’ny faritany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eny ampita atsinanan’ny farihy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niainga Izy mianakavy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Teny am-pandehanana, dia azon’ny torimaso i Jesoa. Ary nisy tafio-drivotra niantonta teo amin’ny farihy ka nila ho feno rano ny sambokely ary efa am-bava loza izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nohatonin’ny mpianany i Jesoa ary nofohaziny sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, Mpampianatra ô, ho faty isika!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia nifoha Izy ka niteny mafy ny rivotra sy ny onjan-drano; dia nitsahatra ireo ary nanjary tony tsara ny andro.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy i Jesoa tamin’ny mpianany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa aiza ny finoanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 65.8; 89.10; 107.23-32.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Izy ireo koa raiki-tahotra sy gaga sady nifampilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa ity? Fa baikoiny hatramin’ny rivotra sy ny rano, dia manaiky Azy!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay azon’ny demony tany Gergesà
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 8.28-34; Mk 5.1-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nitody teny amin’ny faritanin’i Gergesà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gergesà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gadarà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Mt 8.28 sy nta) ary misy ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gerasà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'tandrifin’i Galilea ry i Jesoa sy ny mpianany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vao niala tao an-tsambokely hankeo an-tanety i Jesoa, dia nisy lehilahy anankiray avy ao an-tanàna nitsena Azy. Azon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' ralehilahy ka hatry ny ela no manary lamba, sady tsy mahapetraka an-trano fa nonina teny amin’ny fasana. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vao nahatazana an’i Jesoa izy, dia nikiakiaka sady niankohoka teo anatrehany no niteny tamin’ny feo mahery hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa hataonao inona aho, ry Jesoa Zanak’Andriamanitra avo indrindra? Mihanta aminao aho, aza dia ampijalîna re!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I Jesoa manko efa nandidy ny fanahy maloto hiala tamin-dralehilahy. Efa imbetsaka io fanahy maloto io no namely azy; fatorana gadra tongotra aman-tanana izy no ambenana, kanefa manapaka fatorana ihany ary entin’ny demony miriorio any an-taniefitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy i Jesoa nanontany an-dralehilahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no anaranao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tafika no anarako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa maro tokoa ny demony tafiditra tao amin’ilay olona. Dia niangavy tamin’i Jesoa ireo demony mba tsy hodidiany hivarina any anaty '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hantsana
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary nisy kisoa maro, andiany iray, nandrasana teo amin’ny kisolosolon’ny havoana. Koa niangavy tamin’i Jesoa ny demony mba havelany hiditra amin’ireo kisoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kisoa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mk 5.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ireo, ary nekeny ny fangatahany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Rehefa niala tamin-dralehilahy ny demony, dia niditra tamin’ny kisoa; ary nirifatra ny andian-kisoa ka nivarimbarina tan-kilahila ho any anaty farihy, dia maty tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vao nahita ny zava-niseho ireo mpiandry kisoa, dia nandositra ary nilaza ny vaovao tao an-tanàna sy teny ambanivohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia lasa ny olona hijery ny zava-niseho; ka nony tonga teo akaikin’i Jesoa, dia nihoron-koditra nahita an-dralehilahy nialan’ny demony, mipetraka tsara eo an-tongotr’i Jesoa, mitafy lamba sady ary saina. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ry zareo nanatri-maso kosa nitantara tamin’ireo vao tonga ny nahasitranan’ilay azon’ny demony. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Raiki-tahotra mafy ny mponina rehetra, ka dia nangataka an’i Jesoa mba hiala teo amin’ny faritanin’i Gergesà. Dia niondrana an-tsambokely Izy ndeha hiverina. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Niangavy tamin’i Jesoa kosa ralehilahy nialan’ny demony mba hiaraka aminy, fa nampodîny nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: –Modia any an-tranonao, ka tantarao ny zava-dehibe nataon’Andriamanitra taminao.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia lasa ralehilahy nitory teny eran’ny tanàna ny zava-dehibe nataon’i Jesoa taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay vehivavy mitsi-dra sy ilay zanakavavin’i Jaîro
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 9.18-28; Mk 5.21-43)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nony tafaverina i Jesoa, dia noraisin’ny vahoaka tsara fa efa niandry Azy rahateo izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary indro nisy lehilahy atao hoe Jaîro, lehiben’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ', tonga niankohoka teo an-tongotr’i Jesoa sady niangavy Azy mba ho any an-tranony, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: fa nanan-janaka vavy tokana tokony ho 12 taona ity lehiben’ny sinagôga ary narary efa ho faty razazavavy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Teny an-dalana ho any amin’i Jaîro, dia nifanety tamin’i Jesoa ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary nisy vehivavy marary mitsi-dra hatramin’ny 12 taona, efa nandany ny fananany tamin’ny dokotera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany tsy ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: efa nandany fananany tamin’ny dokotera.
    marker-yv: yv-n
  - type: text
    text: 'nefa tsy nisy nahasitrana azy na iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nanatona an’i Jesoa avy ao ivoho ravehivavy ka vao nikasika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: somotraviavin-dambany
  - type: text
    text: ', dia nijanona avy hatrany ny ra mitsika tao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa no nikasika Ahy teo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Samy nandà avokoa izy rehetra, fa i Petera no niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mampianatra ô, vahoaka be anie no mifanety sy mifanizina aminao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa hoy indray i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nisy nikasika Ahy teo satria tsapako fa nisy hery niala avy amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ravehivavy kosa, nony nahita fa tsy afa-niafina, dia nangovitra no nankeo amin’i Jesoa; ary niankohoka teo anatrehany sady nanambara teo imason’ny olona rehetra izay anton’ny nikasihany Azy sy izay nahasitranany teo no ho eo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny finoanao, anaka, no nahasitrana anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.48 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nahasitrana anao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nahavonjy anao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Ndeha àry ka veloma finaritra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Raha mbola niteny i Jesoa, dia nisy iraka tonga avy any an-tranon’ity lehiben’ny sinagôga nanao tamin’i Jaîro hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa maty ny zanakao vavy, ka aza sahiraninao intsony ny Mpampianatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Henon’i Jesoa izany ka hoy Izy tamin’i Jaîro:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza matahotra; minoa fotsiny ihany, dia ho velona ny zanakao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Nony tonga tao an-trano i Jesoa, dia tsy nisy navelany hiara-miditra aminy afa-tsy i Petera sy i Jôhany ary i Jakôba mbamin’ny ray aman-drenin-drazazavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Nitomany sy nandondòn-tratra nisaona an-drazazavavy ny olona rehetra teo, ka hoy i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka izay ny ranomaso! Tsy maty akory izy fa matory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Dia nihomehezan’ny olona i Jesoa satria fantatr’izy rehetra fa efa maty razazavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'I Jesoa kosa nandray ny tanan-drazazavavy sady niantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Razazavavy, mifohaza!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Dia nody indray ny ainy ka niarina avy hatrany izy, ary nasain’i Jesoa nomena sakafo. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Talanjona tokoa ny ray aman-dreniny nefa nohafaran’i Jesoa tsy hilaza ny zava-nitranga na amin’iza na amin’iza.
