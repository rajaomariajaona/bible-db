document_id: LUK.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo vehivavy niara-dia tamin’i Jesoa
  - type: text
    content: 'Taorian’izany, lasa nitety tanàn-dehibe sy tanàna kely i Jesoa nitoriteny sy nanambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. Niaraka tamin’i Jesoa ny 12 lahy '
  '10':
  - type: text
    content: 'ka namaly hoe:'
  - type: text
    content: '–Ianareo no natao hahalala ny tsiambaratelo momba ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ; fa ho an’ny hafa kosa dia ankamantatra saro-pantarina no itenenana izany, hany ka
  - type: text
    content: «hijery izy fa tsy hahita
  - type: text
    content: ary hihaino fa tsy hahafantatra
  - type: note
    content: Is 6.9, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  - type: heading
    content: Hazavain’i Jesoa ny fanoharana momba ny mpamafy
  - type: heading
    content: (Jereo Mt 13.18-23; Mk 4.13-20)
  '11':
  - type: text
    content: '–Koa izao àry no dikan’ilay '
  - type: text
    content: fanoharana
  - type: text
    content: ' teo. Ny voa dia ny tenin’Andriamanitra. '
  '12':
  - type: text
    content: 'Ireny teo amoron-dalana dia izay mahaheno ihany; kanjo avy ny '
  - type: text
    content: devoly
  - type: text
    content: ', ka manaisotra ny teny tao am-pony sao mino izy ka ho voavonjy. '
  '13':
  - type: text
    content: 'Ireny teo ambony vatolampy kosa dia izay mahaheno sady mandray ny teny an-kafaliana nefa tsy mandatsaka lalina izany ao aminy; mba mino vetivety ihany izy, kanjo mihemotra amin’ny fotoana fitsapana. '
  '14':
  - type: text
    content: 'Ny latsaka teo amin’ny tsilo indray dia izay mahaheno ihany koa; kanjo eny an-dalam-pivahiniana, voagejan’ny ahiahy sy ny harena ary ny fahafinaretan’ny fiainana mandalo ka tsy mahavanom-boa. '
  '15':
  - type: text
    content: Ny latsaka tamin’ny tany tsara kosa dia izay mahaheno ny teny amin’ny fo tsara sy lavorary, ka mitana azy, ary mamokatra amin’ny faharetana.
  - type: heading
    content: Fanoharana momba ny jiro
  - type: heading
    content: (Jereo Mk 4.21-25)
  '16':
  - type: text
    content: –Tsy misy mampirehitra jiro, ka manarona azy amin’ny siny na manitrika azy ao ambany farafara; fa eo ambony fitoeran-jiro no apetrany, hany ka izay miditra ao an-trano dia mahita ny hazavana
  - type: note
    content: Ampit Mt 5.15; Lk 11.33.
  - type: text
    content: '. '
  '17':
  - type: text
    content: Tsy misy takona izay tsy haseho na miafina izay tsy ho fantatra sy haharihary.
  '18':
  - type: text
    content: Koa tandremo àry ny fomba fihainoanareo; satria izay manana no homena; ary izay tsy manana kosa, na izay kely heveriny ho ananany aza dia halàna aminy.
  - type: heading
    content: Ny tena fianakavian’i Jesoa
  - type: heading
    content: (Jereo Mt 12.46-50; Mk 3.31-35)
  '19':
  - type: text
    content: 'Tonga hamangy an’i Jesoa ny reniny sy ny rahalahiny, nefa tsy afa-nanatona Azy noho ny hamaroan’ny olona; '
  '2':
  - type: text
    content: 'ary koa ireo vehivavy sasany izay nositraniny tamin’ny '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' sy ny aretina: dia i Maria, antsoina hoe Magdalèna, izay nialana '
  - type: text
    content: demony
  - type: text
    content: ' fito, '
  '20':
  - type: text
    content: 'dia nilazana i Jesoa hoe:'
  - type: text
    content: –Ao alatrano ao ny reninao sy ny rahalahinao te hihaona kely aminao!
  '21':
  - type: text
    content: 'Fa hoy i Jesoa tamin’izay rehetra teo:'
  - type: text
    content: –Ny reniko sy ny rahalahiko dia izay mihaino ny tenin’Andriamanitra no sady manatanteraka azy.
  - type: heading
    content: Ampitsaharin’i Jesoa ny tafio-drivotra
  - type: heading
    content: (Jereo Mt 8.23-27; Mk 4.35-41)
  '22':
  - type: text
    content: 'Indray andro, niondrana an-tsambokely i Jesoa mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ', ka hoy Izy tamin’ireo:'
  - type: text
    content: –Andeha isika hankeny ampitan’ny farihy
  - type: note
    content: Ny farihin’i Galilea no tenenina eto. Karazan’olona tsy Jiosy fa hafa firenena no niorim-ponenana tamin’ny faritany eny ampita atsinanan’ny farihy.
  - type: text
    content: '!'
  - type: text
    content: 'Dia niainga Izy mianakavy. '
  '23':
  - type: text
    content: 'Teny am-pandehanana, dia azon’ny torimaso i Jesoa. Ary nisy tafio-drivotra niantonta teo amin’ny farihy ka nila ho feno rano ny sambokely ary efa am-bava loza izy ireo. '
  '24':
  - type: text
    content: 'Dia nohatonin’ny mpianany i Jesoa ary nofohaziny sady nataony hoe:'
  - type: text
    content: –Mpampianatra ô, Mpampianatra ô, ho faty isika!
  '25':
  - type: text
    content: Dia nifoha Izy ka niteny mafy ny rivotra sy ny onjan-drano; dia nitsahatra ireo ary nanjary tony tsara ny andro.
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: –Fa aiza ny finoanareo
  - type: note
    content: Ampit Sal 65.8; 89.10; 107.23-32.
  - type: text
    content: '?'
  - type: text
    content: 'Izy ireo koa raiki-tahotra sy gaga sady nifampilaza hoe:'
  - type: text
    content: –Iza moa ity? Fa baikoiny hatramin’ny rivotra sy ny rano, dia manaiky Azy!
  - type: heading
    content: Sitranin’i Jesoa ilay azon’ny demony tany Gergesà
  - type: heading
    content: (Jereo Mt 8.28-34; Mk 5.1-20)
  '26':
  - type: text
    content: Dia nitody teny amin’ny faritanin’i Gergesà
  - type: note
    content: 'Gergesà: misy stf ahitana hoe Gadarà (jereo Mt 8.28 sy nta) ary misy ahitana hoe Gerasà.'
  - type: text
    content: 'tandrifin’i Galilea ry i Jesoa sy ny mpianany. '
  '27':
  - type: text
    content: 'Vao niala tao an-tsambokely hankeo an-tanety i Jesoa, dia nisy lehilahy anankiray avy ao an-tanàna nitsena Azy. Azon’ny '
  - type: text
    content: demony
  - type: text
    content: ' ralehilahy ka hatry ny ela no manary lamba, sady tsy mahapetraka an-trano fa nonina teny amin’ny fasana. '
  '28':
  - type: text
    content: 'Vao nahatazana an’i Jesoa izy, dia nikiakiaka sady niankohoka teo anatrehany no niteny tamin’ny feo mahery hoe:'
  - type: text
    content: –Fa hataonao inona aho, ry Jesoa Zanak’Andriamanitra avo indrindra? Mihanta aminao aho, aza dia ampijalîna re!
  '29':
  - type: text
    content: I Jesoa manko efa nandidy ny fanahy maloto hiala tamin-dralehilahy. Efa imbetsaka io fanahy maloto io no namely azy; fatorana gadra tongotra aman-tanana izy no ambenana, kanefa manapaka fatorana ihany ary entin’ny demony miriorio any an-taniefitra.
  '3':
  - type: text
    content: 'sy i Jôhanina, vadin’i Kozà mpitandrim-pananan’i '
  - type: text
    content: Herôda
  - type: text
    content: ', ary i Sozanina sy ny maro hafa koa. Ireo vehivavy ireo dia samy nanampy an’i Jesoa sy ny mpianany tamin’ny fananany.'
  - type: heading
    content: Fanoharana momba ny mpamafy
  - type: heading
    content: (Jereo Mt 13.1-9; Mk 4.1-9)
  '30':
  - type: text
    content: 'Dia hoy i Jesoa nanontany an-dralehilahy:'
  - type: text
    content: –Iza no anaranao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Tafika no anarako.
  '31':
  - type: text
    content: 'Fa maro tokoa ny demony tafiditra tao amin’ilay olona. Dia niangavy tamin’i Jesoa ireo demony mba tsy hodidiany hivarina any anaty '
  - type: text
    content: hantsana
  - type: text
    content: .
  '32':
  - type: text
    content: Ary nisy kisoa maro, andiany iray, nandrasana teo amin’ny kisolosolon’ny havoana. Koa niangavy tamin’i Jesoa ny demony mba havelany hiditra amin’ireo kisoa
  - type: note
    content: 'kisoa: jereo Mk 5.1 sy nta.'
  - type: text
    content: ' ireo, ary nekeny ny fangatahany. '
  '33':
  - type: text
    content: Rehefa niala tamin-dralehilahy ny demony, dia niditra tamin’ny kisoa; ary nirifatra ny andian-kisoa ka nivarimbarina tan-kilahila ho any anaty farihy, dia maty tao.
  '34':
  - type: text
    content: 'Vao nahita ny zava-niseho ireo mpiandry kisoa, dia nandositra ary nilaza ny vaovao tao an-tanàna sy teny ambanivohitra. '
  '35':
  - type: text
    content: 'Dia lasa ny olona hijery ny zava-niseho; ka nony tonga teo akaikin’i Jesoa, dia nihoron-koditra nahita an-dralehilahy nialan’ny demony, mipetraka tsara eo an-tongotr’i Jesoa, mitafy lamba sady ary saina. '
  '36':
  - type: text
    content: 'Ry zareo nanatri-maso kosa nitantara tamin’ireo vao tonga ny nahasitranan’ilay azon’ny demony. '
  '37':
  - type: text
    content: 'Raiki-tahotra mafy ny mponina rehetra, ka dia nangataka an’i Jesoa mba hiala teo amin’ny faritanin’i Gergesà. Dia niondrana an-tsambokely Izy ndeha hiverina. '
  '38':
  - type: text
    content: 'Niangavy tamin’i Jesoa kosa ralehilahy nialan’ny demony mba hiaraka aminy, fa nampodîny nataony hoe:'
  '39':
  - type: text
    content: –Modia any an-tranonao, ka tantarao ny zava-dehibe nataon’Andriamanitra taminao.
  - type: text
    content: Dia lasa ralehilahy nitory teny eran’ny tanàna ny zava-dehibe nataon’i Jesoa taminy.
  - type: heading
    content: Ilay vehivavy mitsi-dra sy ilay zanakavavin’i Jaîro
  - type: heading
    content: (Jereo Mt 9.18-28; Mk 5.21-43)
  '4':
  - type: text
    content: 'Nirohotra avy any amin’ny tanàna samihafa ny olona hanatona an’i Jesoa, hany ka vahoaka betsaka no tafangona teo aminy. Dia niteny Izy nanao izao '
  - type: text
    content: fanoharana
  - type: text
    content: ' izao:'
  '40':
  - type: text
    content: 'Nony tafaverina i Jesoa, dia noraisin’ny vahoaka tsara fa efa niandry Azy rahateo izy rehetra. '
  '41':
  - type: text
    content: 'Ary indro nisy lehilahy atao hoe Jaîro, lehiben’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ', tonga niankohoka teo an-tongotr’i Jesoa sady niangavy Azy mba ho any an-tranony, '
  '42':
  - type: text
    content: fa nanan-janaka vavy tokana tokony ho 12 taona ity lehiben’ny sinagôga ary narary efa ho faty razazavavy.
  - type: text
    content: 'Teny an-dalana ho any amin’i Jaîro, dia nifanety tamin’i Jesoa ny vahoaka. '
  '43':
  - type: text
    content: Ary nisy vehivavy marary mitsi-dra hatramin’ny 12 taona, efa nandany ny fananany tamin’ny dokotera
  - type: note
    content: Misy stf sasany tsy ahitana ny hoe efa nandany fananany tamin’ny dokotera.
  - type: text
    content: 'nefa tsy nisy nahasitrana azy na iray aza. '
  '44':
  - type: text
    content: 'Nanatona an’i Jesoa avy ao ivoho ravehivavy ka vao nikasika ny '
  - type: text
    content: somotraviavin-dambany
  - type: text
    content: ', dia nijanona avy hatrany ny ra mitsika tao aminy. '
  '45':
  - type: text
    content: 'Ary hoy i Jesoa:'
  - type: text
    content: –Iza moa no nikasika Ahy teo?
  - type: text
    content: 'Samy nandà avokoa izy rehetra, fa i Petera no niteny hoe:'
  - type: text
    content: –Mampianatra ô, vahoaka be anie no mifanety sy mifanizina aminao!
  '46':
  - type: text
    content: 'Fa hoy indray i Jesoa:'
  - type: text
    content: –Nisy nikasika Ahy teo satria tsapako fa nisy hery niala avy amiko.
  '47':
  - type: text
    content: 'Ravehivavy kosa, nony nahita fa tsy afa-niafina, dia nangovitra no nankeo amin’i Jesoa; ary niankohoka teo anatrehany sady nanambara teo imason’ny olona rehetra izay anton’ny nikasihany Azy sy izay nahasitranany teo no ho eo ihany. '
  '48':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Ny finoanao, anaka, no nahasitrana anao
  - type: note
    content: nahasitrana anao na hoe nahavonjy anao.
  - type: text
    content: . Ndeha àry ka veloma finaritra!
  '49':
  - type: text
    content: 'Raha mbola niteny i Jesoa, dia nisy iraka tonga avy any an-tranon’ity lehiben’ny sinagôga nanao tamin’i Jaîro hoe:'
  - type: text
    content: –Efa maty ny zanakao vavy, ka aza sahiraninao intsony ny Mpampianatra.
  '5':
  - type: text
    content: '–Niainga ity mpamafy hamafy voa. Nony namafy izy, ny voa sasany dia latsaka teny amoron-dalana ka voahosin’ny mpandalo ary lanin’ny voro-manidina; '
  '50':
  - type: text
    content: 'Henon’i Jesoa izany ka hoy Izy tamin’i Jaîro:'
  - type: text
    content: –Aza matahotra; minoa fotsiny ihany, dia ho velona ny zanakao!
  '51':
  - type: text
    content: 'Nony tonga tao an-trano i Jesoa, dia tsy nisy navelany hiara-miditra aminy afa-tsy i Petera sy i Jôhany ary i Jakôba mbamin’ny ray aman-drenin-drazazavavy. '
  '52':
  - type: text
    content: 'Nitomany sy nandondòn-tratra nisaona an-drazazavavy ny olona rehetra teo, ka hoy i Jesoa hoe:'
  - type: text
    content: –Aoka izay ny ranomaso! Tsy maty akory izy fa matory.
  '53':
  - type: text
    content: 'Dia nihomehezan’ny olona i Jesoa satria fantatr’izy rehetra fa efa maty razazavavy. '
  '54':
  - type: text
    content: 'I Jesoa kosa nandray ny tanan-drazazavavy sady niantso hoe:'
  - type: text
    content: –Razazavavy, mifohaza!
  '55':
  - type: text
    content: 'Dia nody indray ny ainy ka niarina avy hatrany izy, ary nasain’i Jesoa nomena sakafo. '
  '56':
  - type: text
    content: Talanjona tokoa ny ray aman-dreniny nefa nohafaran’i Jesoa tsy hilaza ny zava-nitranga na amin’iza na amin’iza.
  '6':
  - type: text
    content: 'ny voa sasany kosa latsaka teny ambony vatolampy, ka vao naniry dia nalazo satria tsy ampy hamandoana; '
  '7':
  - type: text
    content: 'ny voa sasany indray latsaka tany anaty tsilo, ka niara-naniry tamin’ny tsilo dia voageja; '
  '8':
  - type: text
    content: ary ny voa sasany latsaka tamin’ny tany tsara, ka naniry ary namoa zato heny.
  - type: text
    content: 'Avy nilaza izany i Jesoa, dia niantso hoe:'
  - type: text
    content: –Izay manan-tsofina hihainoana, aoka hihaino!
  - type: heading
    content: Anton’ny itenenan’i Jesoa am-panoharana
  - type: heading
    content: (Jereo Mt 13.10-17; Mk 4.10-12)
  '9':
  - type: text
    content: 'Nanontanian’ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ny dikan’ilay '
  - type: text
    content: fanoharana
  - type: text
    content: ' i Jesoa, '
