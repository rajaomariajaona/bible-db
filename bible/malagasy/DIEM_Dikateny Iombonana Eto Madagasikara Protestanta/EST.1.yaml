document_id: EST.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanasambe ataon’ny amperôra Kserksesa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ity tantara ity dia nitranga tamin’ny andron’ny amperôra Kserksesa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny tenenina eto dia toa i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kserksesa 1°
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay nifehy ny fanjakana persianina (taona 486-464 tal J.K.). Fantatra koa amin’ny anarana hoe Ahasoerôsa io amperôra io.'
    marker-yv: yv-n
  - type: text
    text: ', izay nanjaka tamina faritany 127 hatreo India ka hatrany Etiôpia. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Tamin’ny taona fahatelo nanjakany, fony izy nitoetra tamin’ny sezafiandrianana maha andriamanjaka azy tao Sosany renivohitra, dia nanaovany fanasana ireo rehetra andriambaventiny sy mpandraharahany; tonga teo anatrehany koa ny filohan’ny tafik’i Persia sy i Media
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sosany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia anankiray amin’ireo renivohitra telo (i Sosany, i Ekbatàna na Akmeta (jereo Hez 6.2), ary i Babilôna*) nisy lapa sy sezafiandrianana ho an’ny amperôran’ny fanjakana persianina. Teo atsinanan’i Babilôna i Sosany ary fonenan-dririnina ho an’ireo amperôra persianina. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –ny tafik’i Persia sy i Media
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia nisy vondro-miaramila avy amin’ireo firenena isan-tokony ao anatin’ny fanjakana persianina.'
    marker-yv: yv-n
  - type: text
    text: ' ary ny governora sy ny mpitondra isam-paritany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nasehon’ny amperôra azy ny harena amam-boninahitry ny fanjakana ary ny harevaka aman-drentin’ny fahalehibiazany; ka enim-bolana no naharetan’izany lanonambe izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa tapitra ireo andro ireo, dia nanaovan’ny amperôra fanasana teo amin’ny kianja ao anatin’ny zaridainan’ny lapa koa ireo olona rehetra izay tao Sosany renivohitra, na ny lehibe na ny kely; ka herinandro no naharetan’ny lanonana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nisy lamba temitra fotsy na maitso na manga, ka tady rongony fotsy sy volomparasy no nihantonany tamina masom-bolafotsy na tamina andry vatokaranana; nisy farafara volamena sy volafotsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'farafara volamena sy volafotsy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: misakafo mandrimandry mihorirana eo ambony farafara ireo olona nasaina (jereo Ham 6.4). –Tsy azo antoka tsara ny hevitry ny voambolana hebreo maromaro eto amin’ity and ity.
    marker-yv: yv-n
  - type: text
    text: ' nalahatra teo ambony lampivato alabasitra sy vatokaranana fotsy ary hara sy vatokaranana mainty. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsatokaty volamena karazany samy hafa no nampisotroana ny olona ary nitobaka ny divay satria nalala-tanana tokoa ny amperôra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Araka ny fepetra dia samy nisotro tsy nisy naneritery azy ny olona; fa ny nandidian’ny amperôra ireo mpanompo rehetra ao an-dapany manko dia ny hanaovan’ny olona tsirairay araka izay sitrapony avy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tamin’izay i Vastỳ, vadin’ny amperôra, dia mba nanao fanasana ho an’ny vehivavy koa tao amin’ny lapan’i Kserksesa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anesorana an’i Vastỳ tsy ho mpanjakavavy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’ny andro fahafiton’izany fanasambe izany, dia falifaly i Kserksesa azon’ny divay nosotroiny. Koa nampiantsoiny ny tandapa fito lahy izay nanompo azy manokana, dia ry i Mehomàna sy i Bizetà, i Harbônà sy i Bigtà, i Abagtà sy i Zetara ary i Karkasa; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka nasainy hoentin’ireto tandapa ireto eo anatrehany i Vastỳ mpanjakavavy, misatroka ny satroboninahitra maha mpanjakavavy azy. Tiany haseho amin’ny manampahefana sy ny olon-kafa teo manko ny hatsaran-tarehin’i Vastỳ, satria maha te hizaha ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nampitain’izy fito lahy tamin’ny mpanjakavavy ny tenin’ny amperôra fa tsy nety nandeha mihitsy izy. Dia nisafoaka mafy ny amperôra ka nirehitra izaitsizy ny fahatezerany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nakany hevitra ireo olon-kendry lalim-pahaizana, satria ny raharahan’ny amperôra dia nalamina teo anatrehan’izay rehetra nahay lalàna sy fitsarana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny olon-kendry teo akaikin’ny amperôra indrindra dia ry i Karsenà sy i Setara, i Admatà sy i Tarsisy, i Meresa sy i Marsenà ary Memokàna, izay minisitra fito tamin’i Persia sy i Media
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Persia sy i Media: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; nitokiany ry zareo ka nitana toerana voalohany teo amin’ny fanjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy ny amperôra tamin’ireto olon-kendry:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy nankatoavin’i Vastỳ mpanjakavavy ny didiko nentin’ireo tandapako; ka, araka ny lalàna, dia inona no sazy tokony hampiharina aminy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia niteny teo anatrehan’ny amperôra sy ny minisitra i Memokàna ka namaly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy ny amperôra ihany no nanaovan’i Vastỳ mpanjakavavy izao fihetsika ratsy izao, fa ny manampahefana rehetra koa sy ny vahoaka tsivakivolo isan-tokony eran’ny fanjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hiely amin’ny vehivavy rehetra manko izao zavatra vitan’ny mpanjakavavy izao ka hahatonga azy samy hanao tsinontsinona ny vadiny sy hilaza hoe: «Ny amperôra Kserksesa aza nandidy ny hitondrana an’i Vastỳ mpanjakavavy eo anatrehany, nefa tsy nety nandeha izy!» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary na dia izao anio izao aza, dia handre ny nataon’ity mpanjakavavy ny vadin’ireo manampahefana manerana an’i Persia sy i Media ka samy hamalivaly ny vadiny avy; ary ny hatezeran’ny lehilahy no ho vokatr’izany famingavingan’ny vehivavy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa raha sitrakao, ry andriamanjaka, dia aoka hisy didy havoakanao hisakanana an’i Vastỳ tsy hiseho eo anatrehanao intsony ary hanomezana ny voninahitra maha mpanjakavavy ho ana vehivavy hafa mendrika izany kokoa noho izy; izany didy izany dia hosoratana ao amin’ny lalànan’i Persia sy i Media ka tsy ho azo ovàna. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rehefa ho tafaely eran’ity fanjakànao midadasika ity ny fanapahan-kevitra halainao, dia samy homen’ny vehivavy rehetra voninahitra ny vadiny, na lehibe na kely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Sitraky ny amperôra sy ireo minisitra ny torohevitr’i Memokàna, ka dia narahin’i Kserksesa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nandefasany taratasy ny faritany rehetra manerana ny fanjakany, dia taratasy araka ny fomba fiteny sy fanoratry ny firenena isan-tokony; notakina mba ho masi-mandidy ao an-tranony avy ny lehilahy rehetra ary mba ho ny fitenim-pireneny no hampisain’ny ankohonany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary mba... ankohonany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny dkt latinina tranainy dia ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary aoka haely amin’ny firenena tsirairay avy izany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
