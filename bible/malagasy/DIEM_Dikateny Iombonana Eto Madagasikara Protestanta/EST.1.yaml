document_id: EST.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanasambe ataon’ny amperôra Kserksesa
  - type: text
    content: Ity tantara ity dia nitranga tamin’ny andron’ny amperôra Kserksesa
  - type: note
    content: Ny tenenina eto dia toa i Kserksesa 1° izay nifehy ny fanjakana persianina (taona 486-464 tal J.K.). Fantatra koa amin’ny anarana hoe Ahasoerôsa io amperôra io.
  - type: text
    content: ', izay nanjaka tamina faritany 127 hatreo India ka hatrany Etiôpia. '
  '10':
  - type: text
    content: 'Tamin’ny andro fahafiton’izany fanasambe izany, dia falifaly i Kserksesa azon’ny divay nosotroiny. Koa nampiantsoiny ny tandapa fito lahy izay nanompo azy manokana, dia ry i Mehomàna sy i Bizetà, i Harbônà sy i Bigtà, i Abagtà sy i Zetara ary i Karkasa; '
  '11':
  - type: text
    content: 'ka nasainy hoentin’ireto tandapa ireto eo anatrehany i Vastỳ mpanjakavavy, misatroka ny satroboninahitra maha mpanjakavavy azy. Tiany haseho amin’ny manampahefana sy ny olon-kafa teo manko ny hatsaran-tarehin’i Vastỳ, satria maha te hizaha ravehivavy. '
  '12':
  - type: text
    content: 'Nampitain’izy fito lahy tamin’ny mpanjakavavy ny tenin’ny amperôra fa tsy nety nandeha mihitsy izy. Dia nisafoaka mafy ny amperôra ka nirehitra izaitsizy ny fahatezerany. '
  '13':
  - type: text
    content: 'Ary nakany hevitra ireo olon-kendry lalim-pahaizana, satria ny raharahan’ny amperôra dia nalamina teo anatrehan’izay rehetra nahay lalàna sy fitsarana. '
  '14':
  - type: text
    content: Ny olon-kendry teo akaikin’ny amperôra indrindra dia ry i Karsenà sy i Setara, i Admatà sy i Tarsisy, i Meresa sy i Marsenà ary Memokàna, izay minisitra fito tamin’i Persia sy i Media
  - type: note
    content: 'I Persia sy i Media: jereo 1.3 sy nta.'
  - type: text
    content: '; nitokiany ry zareo ka nitana toerana voalohany teo amin’ny fanjakana. '
  '15':
  - type: text
    content: 'Dia hoy ny amperôra tamin’ireto olon-kendry:'
  - type: text
    content: –Tsy nankatoavin’i Vastỳ mpanjakavavy ny didiko nentin’ireo tandapako; ka, araka ny lalàna, dia inona no sazy tokony hampiharina aminy?
  '16':
  - type: text
    content: 'Dia niteny teo anatrehan’ny amperôra sy ny minisitra i Memokàna ka namaly hoe:'
  - type: text
    content: '–Tsy ny amperôra ihany no nanaovan’i Vastỳ mpanjakavavy izao fihetsika ratsy izao, fa ny manampahefana rehetra koa sy ny vahoaka tsivakivolo isan-tokony eran’ny fanjakana. '
  '17':
  - type: text
    content: 'Hiely amin’ny vehivavy rehetra manko izao zavatra vitan’ny mpanjakavavy izao ka hahatonga azy samy hanao tsinontsinona ny vadiny sy hilaza hoe: «Ny amperôra Kserksesa aza nandidy ny hitondrana an’i Vastỳ mpanjakavavy eo anatrehany, nefa tsy nety nandeha izy!» '
  '18':
  - type: text
    content: 'Ary na dia izao anio izao aza, dia handre ny nataon’ity mpanjakavavy ny vadin’ireo manampahefana manerana an’i Persia sy i Media ka samy hamalivaly ny vadiny avy; ary ny hatezeran’ny lehilahy no ho vokatr’izany famingavingan’ny vehivavy izany. '
  '19':
  - type: text
    content: 'Koa raha sitrakao, ry andriamanjaka, dia aoka hisy didy havoakanao hisakanana an’i Vastỳ tsy hiseho eo anatrehanao intsony ary hanomezana ny voninahitra maha mpanjakavavy ho ana vehivavy hafa mendrika izany kokoa noho izy; izany didy izany dia hosoratana ao amin’ny lalànan’i Persia sy i Media ka tsy ho azo ovàna. '
  '2':
  - type: text
    content: Tamin’ny taona fahatelo nanjakany, fony izy nitoetra tamin’ny sezafiandrianana maha andriamanjaka azy tao Sosany renivohitra, dia nanaovany fanasana ireo rehetra andriambaventiny sy mpandraharahany; tonga teo anatrehany koa ny filohan’ny tafik’i Persia sy i Media
  - type: note
    content: I Sosany dia anankiray amin’ireo renivohitra telo (i Sosany, i Ekbatàna na Akmeta (jereo Hez 6.2), ary i Babilôna*) nisy lapa sy sezafiandrianana ho an’ny amperôran’ny fanjakana persianina. Teo atsinanan’i Babilôna i Sosany ary fonenan-dririnina ho an’ireo amperôra persianina. –ny tafik’i Persia sy i Media dia nisy vondro-miaramila avy amin’ireo firenena isan-tokony ao anatin’ny fanjakana persianina.
  - type: text
    content: ' ary ny governora sy ny mpitondra isam-paritany. '
  '20':
  - type: text
    content: Rehefa ho tafaely eran’ity fanjakànao midadasika ity ny fanapahan-kevitra halainao, dia samy homen’ny vehivavy rehetra voninahitra ny vadiny, na lehibe na kely.
  '21':
  - type: text
    content: 'Sitraky ny amperôra sy ireo minisitra ny torohevitr’i Memokàna, ka dia narahin’i Kserksesa. '
  '22':
  - type: text
    content: Nandefasany taratasy ny faritany rehetra manerana ny fanjakany, dia taratasy araka ny fomba fiteny sy fanoratry ny firenena isan-tokony; notakina mba ho masi-mandidy ao an-tranony avy ny lehilahy rehetra ary mba ho ny fitenim-pireneny no hampisain’ny ankohonany
  - type: note
    content: 'ary mba... ankohonany: ny dkt latinina tranainy dia ahitana hoe ary aoka haely amin’ny firenena tsirairay avy izany.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Nasehon’ny amperôra azy ny harena amam-boninahitry ny fanjakana ary ny harevaka aman-drentin’ny fahalehibiazany; ka enim-bolana no naharetan’izany lanonambe izany. '
  '5':
  - type: text
    content: 'Rehefa tapitra ireo andro ireo, dia nanaovan’ny amperôra fanasana teo amin’ny kianja ao anatin’ny zaridainan’ny lapa koa ireo olona rehetra izay tao Sosany renivohitra, na ny lehibe na ny kely; ka herinandro no naharetan’ny lanonana. '
  '6':
  - type: text
    content: Nisy lamba temitra fotsy na maitso na manga, ka tady rongony fotsy sy volomparasy no nihantonany tamina masom-bolafotsy na tamina andry vatokaranana; nisy farafara volamena sy volafotsy
  - type: note
    content: 'farafara volamena sy volafotsy: misakafo mandrimandry mihorirana eo ambony farafara ireo olona nasaina (jereo Ham 6.4). –Tsy azo antoka tsara ny hevitry ny voambolana hebreo maromaro eto amin’ity and ity.'
  - type: text
    content: ' nalahatra teo ambony lampivato alabasitra sy vatokaranana fotsy ary hara sy vatokaranana mainty. '
  '7':
  - type: text
    content: 'Tsatokaty volamena karazany samy hafa no nampisotroana ny olona ary nitobaka ny divay satria nalala-tanana tokoa ny amperôra. '
  '8':
  - type: text
    content: 'Araka ny fepetra dia samy nisotro tsy nisy naneritery azy ny olona; fa ny nandidian’ny amperôra ireo mpanompo rehetra ao an-dapany manko dia ny hanaovan’ny olona tsirairay araka izay sitrapony avy. '
  '9':
  - type: text
    content: Tamin’izay i Vastỳ, vadin’ny amperôra, dia mba nanao fanasana ho an’ny vehivavy koa tao amin’ny lapan’i Kserksesa.
  - type: heading
    content: Ny anesorana an’i Vastỳ tsy ho mpanjakavavy
