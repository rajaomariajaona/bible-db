  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia lasa izy ireo ka nanatanteraka araka izay rehetra nandidian’ny TOMPO an’i Mosesy sy i Aharôna.
  - type: usfm
