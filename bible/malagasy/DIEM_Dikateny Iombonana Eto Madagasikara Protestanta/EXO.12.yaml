document_id: EXO.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Fetin’ny Paska
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy sy Aharôna tany Ejipta hoe:'
  '10':
  - type: text
    content: 'Aza asiana sisa ho tra-maraina; fa raha misy sisa tavela, dia dory amin’ny afo. '
  '11':
  - type: text
    content: 'Ary toy izao no hataonareo rehefa mihinana azy: asio sikina ny akanjonareo, anaovy ny kapanareo ary ataovy an-tanana ny tehinareo, dia hano faingana izany fa '
  - type: text
    content: Paska
  - type: text
    content: ' ho an’ny TOMPO.'
  '12':
  - type: text
    content: '«Hamakivaky ao amin’ny tany Ejipta Aho amin’io alina io, ka hamono ny lahimatoa rehetra ao aminy manomboka amin’ny olona ka hatramin’ny biby fiompy. Hotanterahiko ny didim-pitsarana hamelezana ny andriamanitry ny Ejiptianina rehetra. Izaho no TOMPO. '
  '13':
  - type: text
    content: Fa ho anareo kosa, ny ra dia ho famantarana ny trano izay itoeranareo; koa raha mahita ny ra Aho, dia handalo fotsiny, ka ny areti-mandringana dia tsy hahazo anareo rehefa mamely an’i Ejipta Aho
  - type: note
    content: 'And 1-13: jereo Lev 23.5; Nom 9.1-5; 28.16; Deot 16.1-2.'
  - type: text
    content: .
  '14':
  - type: text
    content: '«Hotsarovana hatrany hatrany io andro io, ka hotandremanareo amin’ny alalan’ny fety manetriketrika ho fankalazana Ahy TOMPO: ho lalàna raikitra ho anareo izany.'
  - type: heading
    content: Ny fetin’ny mofo tsy misy leviora
  '15':
  - type: text
    content: '«Mandritra ny fito andro no hihinananareo ny mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: '. Raha vao amin’ny andro voalohany dia efa esory tsy ho ao an-tranonareo ny leviora. Fa na iza na iza mihinana mofo misy leviora, manomboka amin’ny andro voalohany ka hatramin’ny andro fahatelo, dia hofongorana tsy ho anisan’ny vahoaka israelita izy. '
  '16':
  - type: text
    content: Amin’ny andro voalohany sy ny andro fahafito dia manaova fivoriana masina ho anareo, ka aza manao raharaha mihitsy ianareo amin’izany afa tsy ny mamboatra izay hohanin’ny tsirairay ihany.
  '17':
  - type: text
    content: '«Hotandremanareo ny fetin’ny mofo tsy misy leviora ho fahatsiarovana fa tamin’io andro io mihitsy Aho no namoaka ny vahoakanareo hiala avy tany Ejipta. Hotandremanareo hatrany hatrany izany andro izany, ho lalàna raikitra ho anareo sy ny taranakareo. '
  '18':
  - type: text
    content: 'Manomboka ny harivan’ny andro faha-14 amin’ny volana voalohany ka hatramin’ny harivan’ny andro faha-21 amin’ny volana no hihinananareo ny mofo tsy misy leviora. '
  '19':
  - type: text
    content: 'Fito andro no tsy tokony hahitana leviora ao an-tranonareo; fa na iza na iza mihinana sakafo misy leviora, na vahiny na Israelita, dia hofongorana tsy ho anisan’ny fiangonan’i Israely izy. '
  '2':
  - type: text
    content: «Ity volana ity aminareo no ho volana voalohany, ka izy no hataonareo fiandohan’ny taona
  - type: note
    content: Araka ny 13.4 ny volana voalaza eto dia ny volana Abiba (na Aviva), izany hoe ny vanim-potoana faran’ny Marsa ka hatramin’ny fiandohan’ny Avrily eo; jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Koa tsy azonareo hanina ny sakafo misy ny leviora rehetra. Na aiza na aiza no hitoeranareo dia mofo tsy misy leviora no hohaninareo
  - type: note
    content: 'And 14-20: Jereo 23.15; 34.18; Lev 23.6-8; Nom 28.17-25; Deot 16.3-8.'
  - type: text
    content: .»
  - type: heading
    content: Fanomanana ny sakafon’ny Paska
  '21':
  - type: text
    content: 'Niantso ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely rehetra i Mosesy ka nanao taminy hoe:'
  - type: text
    content: '–Mandehana ianareo ka makà zanakondry na zanakosy ho an’ny fianakavianareo avy, dia vonoy ho sakafo '
  - type: text
    content: Paska
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Makà rantsana '
  - type: text
    content: hisôpa
  - type: text
    content: ' iray fihina ka atsobohy ao amin’ny ran’ny zanakondry ao anaty koveta, dia hosory ra ny tolàm-baravarana roa sy ny tataom-baravaran’ny tranonareo; ary aoka tsy hisy olona hivoaka ny tranony intsony ambara-pahamarainan’ny andro. '
  '23':
  - type: text
    content: Fa handalo mba hanafay ny Ejiptianina ny TOMPO; koa raha mahita ny ra eo amin’ny tataom-baravarana sy ny tolam-baravarana roa ny TOMPO dia handalo ny varavaranareo fotsiny fa tsy hamela ny areti-mandringana
  - type: note
    content: 'Areti-mandringana fandravana: toa heverina ho iraka avy any an-danitra hanatanteraka ny sitrapon’Andriamanitra izany (ampit Gen 19.23; 2 Sam 24.16; Heb 11.28).'
  - type: text
    content: ' hiditra ao an-tranonareo. '
  '24':
  - type: text
    content: 'Tandremo io zavatra io mba ho lalàna raikitra ho anareo sy ny taranakareo hatrany hatrany. '
  '25':
  - type: text
    content: 'Koa rehefa tafiditra ao amin’ny tany izay efa nampanantenain’ny TOMPO homena anareo ianareo, dia tandremo io fanompoam-pivavahana io. '
  '26':
  - type: text
    content: 'Ary raha manontany anareo ny anton’izany ny zanakareo, '
  '27':
  - type: text
    content: 'dia hovalianareo hoe: «'
  - type: text
    content: Sorona
  - type: text
    content: ' atolotra ny TOMPO amin’ny andro Paska io. Fony mbola tany Ejipta manko ny Israelita, dia nanafay ny Ejiptianina ny TOMPO, fa nandalo fotsiny kosa teo anoloan’ny tranonay ka nanafaka ny fianakavianay.»'
  - type: text
    content: 'Dia niankohoka ny vahoaka israelita mba hivavaka amin’ny TOMPO. '
  '28':
  - type: text
    content: Avy eo dia lasa izy ireo ka nanatanteraka araka izay rehetra nandidian’ny TOMPO an’i Mosesy sy i Aharôna.
  - type: heading
    content: 'Ny loza farany: fahafahatesan’ny lahimatoan’ny Ejiptianina rehetra'
  '29':
  - type: text
    content: 'Nony tamin’ny misasakalina dia namono ny lahimatoa rehetra tao amin’ny tany Ejipta ny TOMPO, nanomboka amin’ny lahimatoan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' izay nipetraka eo amin’ny sezafiandrianany ka hatramin’ny lahimatoan’ny babo tao an-tranomaizina mbamin’ny voalohan-teraky ny biby fiompy rehetra'
  - type: note
    content: Jereo 4.22-23.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ambarao amin’ny fiangonana israelita manontolo hoe: Amin’ny fahafolon’ity volana ity dia samia maka zanakondry iray avy isan-trano na isam-pianakaviana. '
  '30':
  - type: text
    content: 'Tamin’io alina io dia nifoha ny Farao sy ny tandapany ary ny Ejiptianina rehetra fa nisy fidradradradrana mafy nanerana an’i Ejipta, satria ny trano rehetra dia nisy maty avokoa. '
  '31':
  - type: text
    content: 'Koa tamin’io alina io ihany dia nampiantso an’i Mosesy sy i Aharôna ny Farao ka nanao taminy hoe:'
  - type: text
    content: '–Mandehana, mialà eto amin’ny taniko ianareo sy ny Israelita. Mandehana manao fanompoam-pivavahana amin’ny TOMPO araka izay efa nangatahinareo. '
  '32':
  - type: text
    content: Ento avokoa ny biby fiompinareo araka ny teninareo, ka mandehana any. Ary mba tsofy rano koa aho.
  '33':
  - type: text
    content: 'Nandodona ny Israelita ny Ejiptianina ka nandroaka azy hiala faingana teo amin’ny tany, satria nihevitra izy ireo fa ho faty avokoa. '
  '34':
  - type: text
    content: 'Noho izany, dia nentin’ny Israelita ny kobany efa voalona mbola tsy nisy leviora akory, ary nofonosiny lamba ny tavy mofo ka nataony an-tsoroka. '
  '35':
  - type: text
    content: 'Dia nanao araka izay nolazain’i Mosesy ny Israelita ka nangataka firavaka volafotsy sy volamena ary fitafiana tamin’ny Ejiptianina. '
  '36':
  - type: text
    content: Nataon’ny TOMPO nahazo sitraka tamin’ny Ejiptianina ka nahazo izay rehetra nangatahiny; ary nofoanan’izy ireo mihitsy ny teo an-tanan’ny Ejiptianina
  - type: note
    content: 'And 35-36: jereo 3.21-22.'
  - type: text
    content: .
  '37':
  - type: text
    content: Niala avy tao an-tanàna Rahamsesa ny Israelita ka nizotra ho any Sokôta
  - type: note
    content: 'Sokôta: tanàna toa an’i Rahamsesa, any amin’ny faritry ny vavaranon’i Neily, saingy tsy voatondro mazava ny misy azy (jereo 1.11 sy nta).'
  - type: text
    content: '; lehilahy mahery misy andiany eninjato eo ho eo no isany, afa-tsy ny zaza amam-behivavy sy ny antitra. '
  '38':
  - type: text
    content: 'Nisy koa olona maro hafa fiaviana niara-nandeha tamin’izy ireo. Ombàn’ny ondry aman’osy sy omby amin’andiany be dia be. '
  '39':
  - type: text
    content: Dia nendasiny ho mofo tsy misy leviora ny koba voalena izay nentiny nivoaka avy tany Ejipta; fa tsy mbola voaisy leviora akory ny koba dia noroahin’ny Ejiptianina ny Israelita, ka tsy afaka nitaredretra mba hanomana vatsy.
  '4':
  - type: text
    content: 'Raha vitsy loatra ny iray trano tsy mahalany zanakondry iray, dia hiarahanareo maka amin’ny fianakaviana mifanakaiky aminareo izay araka ny isan’ny olona. Fidionareo ny biby araka izay mety ho lanin’ny tsirairay. '
  '40':
  - type: text
    content: Nandritra ny 430 taona no nivahinian’ny vahoaka Israelita tany Ejipta
  - type: note
    content: Jereo Gen 15.13; Gal 3.17.
  - type: text
    content: '. '
  '41':
  - type: text
    content: Nony nifarana ny 430 taona, dia tamin’io andro io indrindra
  - type: note
    content: 'io andro io indrindra: dia ny andro faha-14 amin’ny volana voalohany; jereo and 2 sy nta, ary koa ny and 6.'
  - type: text
    content: ' no nivoaka am-pilaminana avy tao Ejipta ny vahoakan’ny TOMPO. '
  '42':
  - type: text
    content: Niari-tory ny TOMPO tamin’io alina io mba hamoahany ny vahoakany hiala tao Ejipta; koa tsy maintsy hiari-tory hatrany hatrany koa ny Israelita rehetra amin’io alina io, fa natokana ho an’ny TOMPO izany.
  - type: heading
    content: Fepetra momba ny fankalazana ny Paska
  '43':
  - type: text
    content: 'Ary hoy koa ny TOMPO tamin’i Mosesy sy i Aharôna:'
  - type: text
    content: '–Izao no fepetra momba ny fetin’ny '
  - type: text
    content: Paska
  - type: text
    content: ': «Tsy misy vahiny mahazo mihinana amin’ny sakafo.'
  '44':
  - type: text
    content: '«Ny mpanompo izay novidina dia mahazo mandray anjara amin’ny sakafo rehefa '
  - type: text
    content: voafora
  - type: text
    content: .
  '45':
  - type: text
    content: «Ny vahiny sy ny mpikarama isan’andro dia tsy mahazo mihinana aminy.
  '46':
  - type: text
    content: «Ao an-trano iray ihany no hihinana ny hena fa tsy azo avoaka any ivelany
  - type: note
    content: Jereo Nom 9.12; Jôh 19.36.
  - type: text
    content: .
  - type: text
    content: «Tsy hisy hotapahinareo ny taolan’ilay biby.
  '47':
  - type: text
    content: «Ny fiangonana israelita tsivakivolo no samy hankalaza ny fety Paska.
  '48':
  - type: text
    content: «Fa raha misy kosa vahiny valovotaka ao aminareo ka te hankalaza ny Paska ho an’ny TOMPO, dia tsy maintsy hoforana ny lehilahy rehetra ao aminy; avy eo dia mahazo mandray anjara amin’ny fankalazana ny Paska tahaka ny Israelita izy. Tsy misy mihitsy olona tsy voafora mahazo mihinana ny sakafo.
  '49':
  - type: text
    content: «Fepetra mitovy no ampiharina amin’ny Israelita sy ny vahiny valovotaka eo amin’ny taninareo.»
  '5':
  - type: text
    content: 'Zanakondry lahy na zanakosy lahy tsy misy kilema, herintaona, no halainareo. '
  '50':
  - type: text
    content: 'Dia nanatanteraka araka izay nandidian’ny TOMPO an’i Mosesy sy i Aharôna ny Israelita rehetra. '
  '51':
  - type: text
    content: Ka tamin’io andro io indrindra no navoakan’ny TOMPO tamim-pilaminana avy tany Ejipta ny Israelita
  - type: note
    content: Jereo ny and 2 sy nta, ary ny and 6 sy 41.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Hotehiriziko hatramin’ny andro faha-14 amin’ity volana ity izany, ka ny harivan’io andro io dia samy hamono azy ny fiangonana israelita manontolo. '
  '7':
  - type: text
    content: 'Hanalanareo ny rany ka hanosoranareo ny tolam-baravarana roa sy ny tataom-baravarana isan-trano hihinanana azy. '
  '8':
  - type: text
    content: 'Atsatsiho amin’ny afo ny hena, ary hano amin’io alina io miaraka amin’ny mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' sy ny anamafaitra. '
  '9':
  - type: text
    content: 'Aza haninareo manta na hahandroina ny hena, fa atsatsiho amin’ny afo manontolo miaraka amin’ny lohany sy ny tongony ary ny taovany. '
