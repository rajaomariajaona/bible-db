    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tamin’ny misasakalina dia namono ny lahimatoa rehetra tao amin’ny tany Ejipta ny TOMPO, nanomboka amin’ny lahimatoan’ny '
    - type: usfm
