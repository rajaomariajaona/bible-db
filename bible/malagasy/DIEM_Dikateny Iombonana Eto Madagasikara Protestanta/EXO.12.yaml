      text: '«Hamakivaky ao amin’ny tany Ejipta Aho amin’io alina io, ka hamono ny lahimatoa rehetra ao aminy manomboka amin’ny olona ka hatramin’ny biby fiompy. Hotanterahiko ny didim-pitsarana hamelezana ny andriamanitry ny Ejiptianina rehetra. Izaho no TOMPO. '
  '13':
