      children:
      - type: text
        text: leviora
    - type: text
      text: '. Raha vao amin’ny andro voalohany dia efa esory tsy ho ao an-tranonareo ny leviora. Fa na iza na iza mihinana mofo misy leviora, manomboka amin’ny andro voalohany ka hatramin’ny andro fahatelo, dia hofongorana tsy ho anisan’ny vahoaka israelita izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’ny andro voalohany sy ny andro fahafito dia manaova fivoriana masina ho anareo, ka aza manao raharaha mihitsy ianareo amin’izany afa tsy ny mamboatra izay hohanin’ny tsirairay ihany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hotandremanareo ny fetin’ny mofo tsy misy leviora ho fahatsiarovana fa tamin’io andro io mihitsy Aho no namoaka ny vahoakanareo hiala avy tany Ejipta. Hotandremanareo hatrany hatrany izany andro izany, ho lalàna raikitra ho anareo sy ny taranakareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manomboka ny harivan’ny andro faha-14 amin’ny volana voalohany ka hatramin’ny harivan’ny andro faha-21 amin’ny volana no hihinananareo ny mofo tsy misy leviora. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fito andro no tsy tokony hahitana leviora ao an-tranonareo; fa na iza na iza mihinana sakafo misy leviora, na vahiny na Israelita, dia hofongorana tsy ho anisan’ny fiangonan’i Israely izy. '
