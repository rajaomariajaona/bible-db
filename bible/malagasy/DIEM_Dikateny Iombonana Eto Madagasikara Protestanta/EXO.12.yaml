  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ambarao amin’ny fiangonana israelita manontolo hoe: Amin’ny fahafolon’ity volana ity dia samia maka zanakondry iray avy isan-trano na isam-pianakaviana. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’io alina io dia nifoha ny Farao sy ny tandapany ary ny Ejiptianina rehetra fa nisy fidradradradrana mafy nanerana an’i Ejipta, satria ny trano rehetra dia nisy maty avokoa. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tamin’io alina io ihany dia nampiantso an’i Mosesy sy i Aharôna ny Farao ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana, mialà eto amin’ny taniko ianareo sy ny Israelita. Mandehana manao fanompoam-pivavahana amin’ny TOMPO araka izay efa nangatahinareo. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ento avokoa ny biby fiompinareo araka ny teninareo, ka mandehana any. Ary mba tsofy rano koa aho.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandodona ny Israelita ny Ejiptianina ka nandroaka azy hiala faingana teo amin’ny tany, satria nihevitra izy ireo fa ho faty avokoa. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, dia nentin’ny Israelita ny kobany efa voalona mbola tsy nisy leviora akory, ary nofonosiny lamba ny tavy mofo ka nataony an-tsoroka. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao araka izay nolazain’i Mosesy ny Israelita ka nangataka firavaka volafotsy sy volamena ary fitafiana tamin’ny Ejiptianina. '
