  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa handalo mba hanafay ny Ejiptianina ny TOMPO; koa raha mahita ny ra eo amin’ny tataom-baravarana sy ny tolam-baravarana roa ny TOMPO dia handalo ny varavaranareo fotsiny fa tsy hamela ny areti-mandringana
