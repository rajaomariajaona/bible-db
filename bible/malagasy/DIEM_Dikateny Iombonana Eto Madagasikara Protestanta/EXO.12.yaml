    - type: text
      text: ' atolotra ny TOMPO amin’ny andro Paska io. Fony mbola tany Ejipta manko ny Israelita, dia nanafay ny Ejiptianina ny TOMPO, fa nandalo fotsiny kosa teo anoloan’ny tranonay ka nanafaka ny fianakavianay.»'
  - type: usfm
    marker: p
    children:
    - type: text
