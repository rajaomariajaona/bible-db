  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa rehefa tafiditra ao amin’ny tany izay efa nampanantenain’ny TOMPO homena anareo ianareo, dia tandremo io fanompoam-pivavahana io. '
  '26':
  - type: usfm
    marker: m
