document_id: JOB.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny bokin’i Jôba dia miantomboka amin’ny tantaran’olona iray (toko 1 sy 2) sady tsy azo kianina no manana ny ampy teo amin’ny fiainany. Fa raha nifikitra tamin’Andriamanitra izy, moa tsy noho izay tombontsoa izany? Indro noesorina taminy ny zavatra rehetra, dia ny fananany sy ireo zanany ary koa ny fahasalamàny. Mbola hahafikitra ihany amin’Andriamanitra ve izy amin’izao fahoriana lalina manjo azy izao?
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Fa iza moa Andriamanitra? Raha marina Izy, nahoana no mahavoa an’i Jôba izao loza izao? Ireo sakaizany telo lahy dia te handresy lahatra azy fa izao fahoriany izao dia tsy maintsy ho valin’ny fahadisoana nataony. Eo no miantomboka ny adihevitra lehibe misary poezia izay mameno ny ampahany be indrindra amin’ny boky (toko 3–31). Lohahevitra efa mahazatra ihany no velabelarin’ireo sakaizan’i Jôba, kanefa dia kianin’i Jôba mafy izany ka valiany amin’ny hoe: misy tsy rariny eo amin’ny fenitra maha olombelona. Mikomy amin’ilay endrik’Andriamanitra tohanan’ireo sakaizany i Jôba ka mamerimberina ny tsy fananany tsiny.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Olona vaovao no miditra an-tsehatra (32-37) dia i Eliho izay manazava koa ny tsy mahamarina ny foto-piainan’i Jôba. Araka ny heviny dia handefasan’Andriamanitra fahoriana ny olona mba hampitandremany azy; ary tsy misy olona afaka hanome tsiny an’Andriamanitra amin’izany mihitsy.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Farany dia Andriamanitra mihitsy no miditra an-tsehatra (toko 38.1–42.6). Kanefa tsy mamaly izay fanontaniana Izy fa manontany kosa. Fantatr’i Jôba tamin’izay ny fahadisoany, fa niteny momba an’Andriamanitra izy nefa tsy nahalala hoe iza marina moa Izy?
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Miverina amin’ny endrika tantara indray ny boky any amin’ny farany (42.7-17). Ambaran’Andriamanitra fa i Jôba irery no tena nilaza ny Aminy marina, koa naveriny avo roa heny taminy izay azy rehetra teo aloha.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Iza marina moa Andriamanitra? Fanontaniana tsy ahitam-baliny manerana ny boky izany, ary mbola itadiavam-baliny mandraka ankehitriny ka dia mahatonga ny fandinihina indray ireo zavatra maro efa ninoana? Ny bokin’i Jôba dia milaza indrindra amintsika hoe: «Izao no tsy Andriamanitra», ka afaka manampy antsika handrava ireo sampy na sary sandok’Andriamanitra izay mbola tohizintsika tefena. Miantso antsika koa ity boky ity tsy hampifangaro an’Andriamanitra amin’ny hevitra iheverantsika Azy. Farany, rehefa ravany ny hevi-disontsika, dia ampiany kosa isika hanala sakantsakana rehetra mba handraisana ilay hevi-baovao mahagaga entin’ny Filazantsara.'
