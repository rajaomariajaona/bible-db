document_id: SNG.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ny tononkira tsara indrindra amin’ny tononkira rehetra. Ao amin’ny rakitsoratr’i Salômôna
  - type: note
    content: 'Ny tononkira tsara... rehetra: araka ny hevitry ny teny hebreo miverina indroa izany. –rakitsoratr’i Salômôna: jereo 1 Mp 5.12.'
  - type: text
    content: .
  - type: heading
    content: 'Ralehilahy sy ravehivavy: Ny tafan’ny mpifankatia'
  - type: heading
    content: (Ravehivavy)
  '10':
  - type: text
    content: Mahatsara ny takolakao
  - type: text
    content: ireo kavina eo an-daniny avy;
  - type: text
    content: ary manendrika ny tenanao
  - type: text
    content: ny rado iambozonanao.
  - type: heading
    content: (Ny mpiandry ondry)
  '11':
  - type: text
    content: Rojo volamena voaravaka volafotsy
  - type: text
    content: no hampanaovinay ho anao.
  - type: heading
    content: (Ravehivavy)
  '12':
  - type: text
    content: Fony mbola eo amin’ny fanasàny
  - type: text
    content: no mipetraka ity mpanjakako,
  - type: text
    content: dia mamerovero aoka izany
  - type: text
    content: 'ny ilomanitro natao tamin’ny '
  - type: text
    content: narda
  - type: text
    content: .
  '13':
  - type: text
    content: Ny malalako amiko dia mamerovero
  - type: text
    content: 'tahaka ny '
  - type: text
    content: miora
  - type: text
    content: ' iray fonosana'
  - type: text
    content: izay mialina eo an-tratrako;
  '14':
  - type: text
    content: ny malalako amiko dia manimanitra
  - type: text
    content: tahaka ny voninkazo dia mamelana
  - type: text
    content: any an-tanimboalobok’i Haîna-Gedỳ
  - type: note
    content: 'Haîna-Gedỳ na hoe Loharanon’ny zanak’osy: faritra anirian-java-maniry eo anivon’ny taniefitra amin’ny morona andrefan’ny Ranomasina Maty.'
  - type: text
    content: .
  - type: heading
    content: (Ralehilahy)
  '15':
  - type: text
    content: Tsara tarehy ianao, rahavako,
  - type: text
    content: eny, tsara tarehy ianao;
  - type: text
    content: ny masonao dia mahafinaritra
  - type: text
    content: tahaka ny voromahailala.
  - type: heading
    content: (Ravehivavy)
  '16':
  - type: text
    content: Tsara tarehy koa ianao, ry malalako,
  - type: text
    content: sady mambabo tokoa.
  - type: text
    content: Ahi-maitso mavana no fandriantsika;
  '17':
  - type: text
    content: rantsana sedera no miendrika
  - type: text
    content: sakamandimby amin’ny tranontsika,
  - type: text
    content: ary hazo kipresy no toa peta-drindrina.
  '2':
  - type: text
    content: Hanoroka mafy ahy tokoa anie ianao!
  - type: text
    content: Fa ny safosafonao dia fy
  - type: text
    content: mihoatra noho ny divay
  '3':
  - type: text
    content: ary koa mamerovero
  - type: text
    content: mihoatra noho ireo ilomanitrao.
  - type: text
    content: Ianao dia mahasintona
  - type: text
    content: mihoatra noho ny ilomanitra voafantina;
  - type: text
    content: koa izany no itiavan’ireo zatovovavy anao.
  '4':
  - type: text
    content: Ento aho hanaraka anao,
  - type: text
    content: ary aoka isika hihazakazaka.
  - type: text
    content: Dia ianao mpanjakako
  - type: note
    content: 'mpanjakako: tsy hoe mpanjaka ara-bakiteny ilay olon-tian’ny ampakarina, fa hasohasoiny ho toy izany, satria izay tiana mitombo tarehy; jereo koa 1.12.'
  - type: text
    content: no hampiditra ahy an’efitranonao.
  - type: text
    content: Aoka isika, noho ny aminao,
  - type: text
    content: hiara-tsambatra sy hiara-paly;
  - type: text
    content: dia hankamamiantsika anie ny safosafonao
  - type: text
    content: izay fy mihoatra noho ny divay.
  - type: text
    content: Marina ny itiavan’ireo zatovovavy anao!
  '5':
  - type: text
    content: Ry tovovavin’i Jerosalema ô,
  - type: text
    content: zarazara hoditra aho nefa bikana;
  - type: text
    content: ny tarehiko dia mivalomainty
  - type: text
    content: toy ny lain’ireo mpifindrafindra lasy,
  - type: text
    content: nefa meva toy ny temitr’i Salômôna.
  '6':
  - type: text
    content: Aoka re aho mba tsy hojerenareo
  - type: text
    content: araka ny mahazarazara hoditra ahy,
  - type: text
    content: satria nodanihin’ny hainandro aho!
  - type: text
    content: Tezitra tamiko ireo anadahiko
  - type: text
    content: ka nanery ahy hiambina ny tanimboalobony;
  - type: text
    content: nefa ny tanimboaloboko,
  - type: text
    content: dia ny an’ny tenako manokana,
  - type: text
    content: tsy mba nambenako akory!
  '7':
  - type: text
    content: Ambarao ahy, ry ilay tiako,
  - type: text
    content: izay iandrasanao ny ondrinao
  - type: text
    content: sy izay ampialanao sasatra azy
  - type: text
    content: rehefa mitataovovonana
  - type: text
    content: mba tsy hivezivezeko
  - type: note
    content: 'hivezivezeko: amin’ny hebreo hisaronako voaly.'
  - type: text
    content: hitady anao
  - type: text
    content: eny amin’ny andiam-bibin’ireo namanao.
  - type: heading
    content: (Ny mpiandry* ondry)
  '8':
  - type: text
    content: Raha tsy fantatrao izany,
  - type: text
    content: ry vehivavy tsara tarehy indrindra,
  - type: text
    content: dia araho ny dian’ondry;
  - type: text
    content: ka tariho ny zanak’osinao
  - type: text
    content: hanakaiky ny lain’ireo mpiandry ondry.
  - type: heading
    content: (Ralehilahy)
  '9':
  - type: text
    content: Amiko ianao, rahavako, dia meva
  - type: text
    content: tahaka ny soavaly mpanao matso
  - type: text
    content: 'izay mitarika ny kalesin’ny '
  - type: text
    content: Farao
  - type: text
    content: .
