document_id: ISA.54
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy ilaozana intsony i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miravoravoa ianao, ry Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay momba tsy niteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao izay tsy nihetsi-jaza akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manaova horakora-pifaliana ka mihobia
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'satria hoy ny TOMPO aminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ry ilay mpitondratena, maro ny zanakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny zanaky ny manam-bady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: And voatsiahy ao amin’ny Gal 4.27.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Halalaho ny faritry ny lay fonenanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: asio fanitarana ny ambain’ny lainao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aza anaovana fitsitsiana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Halavao ny tadin-dainao ka hamafiso ny tsatòka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'satria miely miankavanana sy miankavia ianao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny taranakao hahazo indray ny tanin’ny firenen-kafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa hipetraka indray amin’ireo tanànanao efa haolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aza matahotra satria tsy ho menatra intsony ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza mivoara mena fa tsy ho afa-baràka intsony ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hohadinonao ny henatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fahatanoranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hotsarovanao intsony ny fahafaham-baràka
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny naha mpitondratena anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa ilay mpanao anao no ho vadinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny TOMPOn’izao rehetra izao no anarany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay Masin’i Israely no mpanavotra anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay antsoina hoe «Andriamanitry ny tany tontolo.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tahaka ny vady nariana ka ory am-panahy ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa nampodîn’ny TOMPO indray.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa hoy ny Andriamanitrao aminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ahoana no hanariana tanteraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vadin’ny fahatanorana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vetivety foana no nanariako anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa amin’ny indrafo lehibe no hampodîko anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tamin’ny firongatry ny hatezerako
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nandavako vetivety tsy hijery anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa amin’ny fitiavana mandrakizay kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anehoako indrafo aminao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho TOMPO mpanavotra anao no milaza izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tamin’ny andron’i Noà, dia nianiana Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hanafotra ny tany intsony ny rano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 9.8-17.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mianiana toy izany koa Aho ankehitriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hisafoaka aminao na handrahona anao intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa na dia hifindra hiala aza ny tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia hihozongozona aza ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hiala aminao ny fitiavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hihozongozona ny fanekempihavanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mikendry ny hampiadam-pinaritra anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho TOMPO mpamindra fo aminao no milaza izany.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jerosalema amin’ny hoavy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ry ilay Jerosalema ory ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nasafotofoton’ny tafio-drivotra ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy tsy nisy olona nampahery!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hoy ny teny hentitry ny TOMPO aminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro Aho hanangana anao amin’ny vato miloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamboatra ny fanorenanao amin’ny vato safira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hataoko vato robisa ny tilikambo madinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-tampon’ny mandanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataoko vato kristaly ny vavahadinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataoko vatosoa ny manda
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manodidina anao manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.12 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: safira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'robisa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vatosoa sarobidy izay miloko manga ny voalohany ary miloko mena ny faharoa. –
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 11-12:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Apôk 21.18-21.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho TOMPO no hahatonga
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny zanakao rehetra ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: And voatsiahy ao amin’ny Jôh 6.45.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiadam-pinaritra fatratra ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hitombina mafy amin’ny fahamarinana ianao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampanalaviriko anao ny famoretana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hatahotra na inona na inona intsony ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampanalaviriko anao ny fampihorohoroana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hananontanona anao intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na dia misy miara-mioko aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy avy amiko izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady na iza na iza miara-mioko hamely anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho lavo eo anoloanao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jereo fa Izaho ihany no nahary ny mpanefy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mifofotra ny afon’arina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahavita fitaovam-piadiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampiasaina amin’izay ilana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa Izaho ihany koa no nahary ny mpandrava
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hamotika izany fitaovam-piadiana izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fiadiana isan-karazany
- type: usfm
  marker: q1
  children:
  - type: text
    text: tefena hamelezana anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hahomby mihitsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny olona rehetra izay miampanga anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anoloan’ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia horesenao lahatra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no ho anjaran’ireo mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izany no rariny hananany avy amiko.»
