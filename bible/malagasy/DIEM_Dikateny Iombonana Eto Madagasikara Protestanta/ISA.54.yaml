document_id: ISA.54,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy ilaozana intsony i Jerosalema
  - type: text
    content: Miravoravoa ianao, ry Jerosalema
  - type: text
    content: izay momba tsy niteraka;
  - type: text
    content: ianao izay tsy nihetsi-jaza akory,
  - type: text
    content: manaova horakora-pifaliana ka mihobia
  - type: text
    content: 'satria hoy ny TOMPO aminao:'
  - type: text
    content: «Ry ilay mpitondratena, maro ny zanakao
  - type: text
    content: noho ny zanaky ny manam-bady
  - type: note
    content: And voatsiahy ao amin’ny Gal 4.27.
  - type: text
    content: .»
  '10':
  - type: text
    content: Fa na dia hifindra hiala aza ny tendrombohitra
  - type: text
    content: ary na dia hihozongozona aza ny havoana,
  - type: text
    content: dia tsy hiala aminao ny fitiavako
  - type: text
    content: ary tsy hihozongozona ny fanekempihavanako
  - type: text
    content: mikendry ny hampiadam-pinaritra anao.
  - type: text
    content: Izaho TOMPO mpamindra fo aminao no milaza izany.»
  - type: heading
    content: I Jerosalema amin’ny hoavy
  '11':
  - type: text
    content: Ry ilay Jerosalema ory ô,
  - type: text
    content: nasafotofoton’ny tafio-drivotra ianao
  - type: text
    content: saingy tsy nisy olona nampahery!
  - type: text
    content: 'Ka hoy ny teny hentitry ny TOMPO aminao:'
  - type: text
    content: «Indro Aho hanangana anao amin’ny vato miloko,
  - type: text
    content: ary hamboatra ny fanorenanao amin’ny vato safira.
  '12':
  - type: text
    content: Hataoko vato robisa ny tilikambo madinika
  - type: text
    content: eny an-tampon’ny mandanao,
  - type: text
    content: hataoko vato kristaly ny vavahadinao
  - type: text
    content: ary hataoko vatosoa ny manda
  - type: text
    content: izay manodidina anao manontolo
  - type: note
    content: 'safira, robisa: vatosoa sarobidy izay miloko manga ny voalohany ary miloko mena ny faharoa. –And 11-12: ampit Apôk 21.18-21.'
  - type: text
    content: .
  '13':
  - type: text
    content: Izaho TOMPO no hahatonga
  - type: text
    content: 'ny zanakao rehetra ho '
  - type: text
    content: mpianatro
  - type: note
    content: And voatsiahy ao amin’ny Jôh 6.45.
  - type: text
    content: ','
  - type: text
    content: ka hiadam-pinaritra fatratra ireo.
  '14':
  - type: text
    content: 'Hitombina mafy amin’ny fahamarinana ianao:'
  - type: text
    content: hampanalaviriko anao ny famoretana,
  - type: text
    content: ka tsy hatahotra na inona na inona intsony ianao;
  - type: text
    content: hampanalaviriko anao ny fampihorohoroana,
  - type: text
    content: ka tsy hananontanona anao intsony.
  '15':
  - type: text
    content: Na dia misy miara-mioko aza,
  - type: text
    content: dia tsy avy amiko izany;
  - type: text
    content: sady na iza na iza miara-mioko hamely anao,
  - type: text
    content: dia ho lavo eo anoloanao izy.
  '16':
  - type: text
    content: Jereo fa Izaho ihany no nahary ny mpanefy
  - type: text
    content: izay mifofotra ny afon’arina
  - type: text
    content: ka mahavita fitaovam-piadiana
  - type: text
    content: hampiasaina amin’izay ilana azy;
  - type: text
    content: nefa Izaho ihany koa no nahary ny mpandrava
  - type: text
    content: izay hamotika izany fitaovam-piadiana izany.
  '17':
  - type: text
    content: Ny fiadiana isan-karazany
  - type: text
    content: tefena hamelezana anao
  - type: text
    content: dia tsy hahomby mihitsy;
  - type: text
    content: ary ny olona rehetra izay miampanga anao
  - type: text
    content: eo anoloan’ny fitsarana
  - type: text
    content: dia horesenao lahatra.
  - type: text
    content: Izany no ho anjaran’ireo mpanompoko,
  - type: text
    content: ary izany no rariny hananany avy amiko.»
  '2':
  - type: text
    content: Halalaho ny faritry ny lay fonenanao,
  - type: text
    content: asio fanitarana ny ambain’ny lainao,
  - type: text
    content: ka aza anaovana fitsitsiana.
  - type: text
    content: Halavao ny tadin-dainao ka hamafiso ny tsatòka,
  '3':
  - type: text
    content: 'satria miely miankavanana sy miankavia ianao:'
  - type: text
    content: ny taranakao hahazo indray ny tanin’ny firenen-kafa,
  - type: text
    content: ary koa hipetraka indray amin’ireo tanànanao efa haolo.
  '4':
  - type: text
    content: Aza matahotra satria tsy ho menatra intsony ianao;
  - type: text
    content: aza mivoara mena fa tsy ho afa-baràka intsony ianao;
  - type: text
    content: eny, hohadinonao ny henatra
  - type: text
    content: tamin’ny fahatanoranao,
  - type: text
    content: ary tsy hotsarovanao intsony ny fahafaham-baràka
  - type: text
    content: tamin’ny naha mpitondratena anao.
  '5':
  - type: text
    content: Fa ilay mpanao anao no ho vadinao;
  - type: text
    content: ny TOMPOn’izao rehetra izao no anarany.
  - type: text
    content: Ilay Masin’i Israely no mpanavotra anao,
  - type: text
    content: dia ilay antsoina hoe «Andriamanitry ny tany tontolo.»
  '6':
  - type: text
    content: Fa tahaka ny vady nariana ka ory am-panahy ianao
  - type: text
    content: nefa nampodîn’ny TOMPO indray.
  - type: text
    content: 'Fa hoy ny Andriamanitrao aminao:'
  - type: text
    content: «Ahoana no hanariana tanteraka
  - type: text
    content: ny vadin’ny fahatanorana?
  '7':
  - type: text
    content: Vetivety foana no nanariako anao,
  - type: text
    content: fa amin’ny indrafo lehibe no hampodîko anao.
  '8':
  - type: text
    content: Tamin’ny firongatry ny hatezerako
  - type: text
    content: no nandavako vetivety tsy hijery anao;
  - type: text
    content: fa amin’ny fitiavana mandrakizay kosa
  - type: text
    content: no anehoako indrafo aminao.
  - type: text
    content: Izaho TOMPO mpanavotra anao no milaza izany.
  '9':
  - type: text
    content: Tamin’ny andron’i Noà, dia nianiana Aho
  - type: text
    content: fa tsy hanafotra ny tany intsony ny rano
  - type: note
    content: Ampit Gen 9.8-17.
  - type: text
    content: ;
  - type: text
    content: mianiana toy izany koa Aho ankehitriny
  - type: text
    content: fa tsy hisafoaka aminao na handrahona anao intsony.
