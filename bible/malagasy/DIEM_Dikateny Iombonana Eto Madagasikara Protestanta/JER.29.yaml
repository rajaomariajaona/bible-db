    children:
    - type: text
      text: 'Nandefa taratasy avy tao Jerosalema i Jeremià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ho an’ireo loholona rehetra sy mpisorona ary mpaminany mbamin’ireo vahoaka rehetra izay nentin’i Nebokadnetsara ho babo avy tao Jerosalema hankany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: text
      text: '. Ny nandefasana io taratasy io '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao koa no lazain’ny TOMPO: ‹Rehefa naharitra fitopolo taona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 25.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ny fanjakan’i Babilôna, dia hirotsaka an-tsehatra Aho noho ny aminareo; ka hotanterahiko ny soa nampantenaiko anareo: haveriko eto Jerosalema ianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho manko no mahalala ny hevitra omaniko ho anareo, dia hevitra hahatonga fiadanana fa tsy loza. Teny hentitra avy amiko TOMPO izany. Hoavy azo antoka no homeko anareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny hoavy izay antenainareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', izany hoe ny fiverenany amin’ny Tany Nampanantenaina.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay raha miantso Ahy ianareo ka mivavaka amiko, dia hihaino anareo Aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mikatsaka Ahy ianareo, dia hahita Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Deot 4.29.
      marker-yv: yv-n
    - type: text
      text: '. Izaho TOMPO dia manao teny hentitra aminareo hoe: Raha tadiavinareo amin’ny fonareo manontolo Aho, dia hanaiky ho hitanareo. Hanova izay manjo anareo Aho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hanova izay manjo anareo Aho: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: haveriko ireo babonareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ka havoakako avy any amin’ny firenen-kafa ianareo. Hangoniko ianareo ka haveriko eto amin’ny toerana izay nandefasako anareo ho babo, hoy ny teny hentitra avy amiko TOMPO.›'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Noho ianareo mihambo ho nananganan’ny TOMPO mpaminany atỳ Babilôna,
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ny amin’ny mpanjaka izay mipetraka eo amin’ny sezafiandrianan’i Davida sy ny amin’ny vahoaka rehetra izay mbola mipetraka eto Jerosalema, izany hoe ireo mpiray firenena tsy mba nentina ho babo niaraka taminareo, dia izao no lazain’ny Tompo, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izao no ambaran’ny TOMPOn’izao rehetra izao: ‹Handefa ady sy mosary ary areti-mandringana hamely azy Aho. Hataoko tonga tahaka ny aviavy lò izay tsy azo hanina noho ny haratsiny izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoenjehiko amin’ny ady sy ny mosary ary ny areti-mandringana izy, ka ho raiki-tahotra ny fanjakana rehetra ambonin’ny tany raha mahita azy. Any amin’ny firenen-kafa rehetra izay hampielezako azy, dia horaisina ho ohatra izy hoenti-manozona sy hoenti-milaza zava-mahatahotra sy mampihoron-koditra na mahamenatra; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria tsy nohenoiny akory izay nolazaiko taminy, hoy ny teny hentitra avy amiko TOMPO. Tsy nitsahatra nandefa ireo mpaminany mpanompoko tany aminy Aho, fa tsy nihaino ireny izy, hoy ny teny hentitra avy amiko TOMPO.›
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia fony niala tao Jerosalema i Jekonià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jekonià: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny naoty momba 22.24.
      marker-yv: yv-n
    - type: text
      text: ' mpanjaka sy ny renin’ny mpanjaka, ireo tandapa sy ireo mpiasam-panjakana ambony tao Joda sy Jerosalema mbamin’ireo mpahay taozavatra sy mpahay taovỳ. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Ianareo kosa, ry babo rehetra izay nasain’ny Tompo nentina avy eto Jerosalema hankatỳ Babilôna, mihainoa ny tenin’ny TOMPO.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no lazain’ny TOMPOn’izao rehetra izao sady ilay Andriamanitr’i Israely ny amin’i Ahaba zanakalahin’i Kôlaià sy ny amin’i Tsidekià, zanakalahin’i Mahaseià: Na dia mihambo haminany amin’ny anarako aza izy roa lahy, dia mpilaza lainga. Indro hatolotro eo an-tanan’i Nebokadnetsara mpanjakan’i Babilôna izy ka hampamonoiny ho faty eo imasonareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Jodeanina rehetra izay nentina ho babo atỳ Babilôna dia hampiasa ny anaran’izy roa lahy ho oha-panozonana ka hilaza hoe: Hataon’ny TOMPO tahaka izay nanjo an’i Tsedekià sy i Ahaba izay nodoran’ny mpanjakan’i Babilôna tamin’ny afo anie ianao! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hihatra amin’izy roa lahy izany noho ny nanaovany zavatra fady teo amin’i Israely; fa naka ny vadin’ny namany izy sady nilaza lainga kanefa nihambo ho niteny tamin’ny anarako, na dia tsy nomeko baiko aza hanao izany. Izaho TOMPO kosa dia mahalala ny zava-drehetra sady vavolombelon’izany, hoy ny teny hentitra avy amiko.› »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taratasin’i Semahià
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Tompon’izao rehetra izao sady ilay Andriamanitr’i Israely no nanainga an’i Jeremià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hilaza hafatra ny amin’i Semahià avy any Nehelama. Fa io Semahià io efa nandefa taratasy tamin’ny anaran’ny tenany ihany ho an’i Tsefanià mpisorona, zanakalahin’i Mahaseià ary koa ho an’ireo mpisorona hafa sy ho an’izay vahoaka rehetra tafajanona tao Jerosalema; ka nanoratra tamin’i Tsefanià izy nanao hoe: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Satria ny TOMPO efa nametraka anao ho mpisorona hisolo an’i Jôiadà, dia ianao no mpiandraikitra ny tranon’ny TOMPO ka tokony hanara-maso izay rehetra misary adala milaza azy ho mpaminany sy hampamatotra azy amin’ny gadra vy na rojo vy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana àry ianao no tsy nihetsika nanohitra an’i Jeremià avy any Hanatôta, izay mihambo haminany aminareo? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa hadisoanao mihitsy raha toa izy afaka nandefa taratasy tatỳ aminay atỳ Babilôna mba hilaza aminay fa hijanona maharitra ho babo atỳ izahay. Nasainy hanorina trano aza izahay mba hipetrahanay ary nasainy hamboly zaridaina mba hihinananay ny vokatra avy aminy.»
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa novakin’i Tsefanià tamin’i Jeremià ilay taratasy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Tsedekià mpanjakan’i Joda efa naniraka an’i Elehasà, zanakalahin’i Safàna sy an’i Gemarià zanakalahin’i Hilkià hankany Babilôna ho any amin’i Nebokadnetsara mpanjaka. Koa nampitondrain’i Jeremià azy roa lahy ny taratasy milaza hoe:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nisy baikon’ny TOMPO tamin’i Jeremià nanao hoe: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Maniraha ho any amin’ireo babo mba hiteny aminy hoe: Izao no lazain’ny TOMPO ny amin’i Semahià avy any Nehelama: Mihambo ho mpaminany aminareo i Semahià nefa Izaho tsy naniraka azy akory. Satria mampiantehitra anareo amin’ny lainga izy, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia Izaho TOMPO no manamafy fa hirotsaka an-tsehatra hamely an’i Semahià sy ny taranany Aho: Tsy hisy na iray aza amin’ny fianakaviany ho tafajanona eo anivonareo mba hahita ny soa hataoko amin’ny vahoakako; satria nanosika anareo vahoakako hikomy amiko TOMPO izy. Teny hentitra avy amiko TOMPO izany.› »'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao no lazain’ny TOMPOn’izao rehetra izao sady ilay Andriamanitr’i Israely, ho an’izay rehetra natolony ho babo avy tao Jerosalema ho any Babilôna:'
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '‹Manorena trano ho anareo ka ipetraho; voleo ny tanimboly ka hano izay vokatra avy aminy. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Manambadia ka miteraha zanakalahy sy zanakavavy; akao vady ny zanakareo lahy ary ampanambadio ny zanakareo vavy mba hiteraka koa izy. Hihamaro anie ianareo, fa tsy hihavitsy! '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Katsaho izay hampisy fiadanana any amin’ny tanàna izay nandefasako anareo ho babo, ka mivavaha amiko ho azy, fa arakaraky ny hampiadana azy no hiadananareo koa.›
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao koa no lazain’ny TOMPOn’izao rehetra izao sady ilay Andriamanitr’i Israely: ‹Aza manaiky hofitahin’ireo mpaminany izay eo anivonareo na ireo mpisikidy. Aza mihaino ireo mpilaza nofy izay manazava ny nofinareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tamin’ny andron’i Jeremià dia maro ireo kalazalahy nihambo ho nahalala ny sitrapon’Andriamanitra amin’ny famoahana ny hevitry ny nofy: jereo 27.9.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa mihambo ho maminany amin’ny anarako izy nefa lainga izany, fa tsy naniraka azy akory Aho, hoy ny teny hentitra avy amiko TOMPO.›
