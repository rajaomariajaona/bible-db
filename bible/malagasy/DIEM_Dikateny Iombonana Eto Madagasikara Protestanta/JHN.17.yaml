  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny anaranao dia nampahafantariko ireo olona navahanao tamin’izao tontolo izao sy nomenao Ahy; Anao ireo ka nomenao Ahy, ary ny teninao efa notandremany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantany ankehitriny fa avy taminao ny zavatra rehetra nomenao Ahy, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria ny teny izay nomenao Ahy dia efa nomeko azy ireo ary noraisiny; ka fantany marina fa nivoaka avy any aminao Aho, ary ninoany fa Ianao no naniraka Ahy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
