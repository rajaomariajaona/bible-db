  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankehitriny mankany aminao Aho; ka izany teny izany no lazaiko dieny mbola eto aminao Aho; ka izany teny izany no lazaiko dieny mbola eto amin’izao tontolo izao Aho, mba hananan’ireo ny hafaliako tanteraka ao aminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nomeko ny teninao ireo, ka ankahalain’izao tontolo izao: satria tsy naman’izao tontolo izao ireo, tahaka ny tsy maha naman’izao tontolo izao Ahy. '
