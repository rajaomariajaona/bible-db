  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atokàny ho Anao araka ny hafatra marim-pototra ireo: ny teninao no hafatra marim-pototra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny nanirahanao Ahy ho eo amin’izao tontolo izao no nanirahako azy ho eo amin’izao tontolo izao koa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho azy ireo no anokanako tena aminao, mba ho voatokana ho Anao araka ny hafatra marim-pototra koa ireo.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Araka ny nanomezanao Azy fahefana amin’ny olombelona rehetra, dia omeo voninahitra ny Zanakao mba hanomezany aina maharitra mandrakizay an’izay rehetra nomenao Azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy ho an’ireto ihany no ivavahako, fa ho an’izay mino Ahy koa noho ny teniny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mivavaka Aho mba ho iray izy rehetra: Ray ô, enga anie ho ao anatintsika izy rehetra tahaka Anao ato anatiko ary Izaho ao anatinao, mba hinoan’izao tontolo izao fa Ianao no naniraka Ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nomeko azy ireo ny voninahitra nomenao Ahy mba ho iray izy tahaka ny maha iray antsika: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho ao anatiny, Ianao ato anatiko, hany ka ho iray tanteraka izy, dia ho fantatr’izao tontolo izao fa Ianao no naniraka Ahy sady Ianao efa tia azy ireo tahaka ny nitiavanao Ahy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ray ô, tiako hiaraka amiko any amin’izay misy Ahy ireo nomenao Ahy mba hahita ny voninahitra nomenao Ahy noho Ianao efa tia Ahy talohan’ny nahariana izao tontolo izao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ray ô, mandala ny rariny Ianao, ka tsy nahalala Anao izao tontolo izao, fa Izaho no nahalala Anao, ary ireto efa nahalala fa Ianao no naniraka Ahy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nampahafantariko azy ireo ny anaranao sady mbola hampahafantariko hatrany, mba ho ao amin’ireo ny fitiavana izay nitiavanao Ahy ary mba ho ao anatiny koa Aho.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary izao no aina maharitra mandrakizay: dia ny mahalala Anao hany Andriamanitra tokana sady marina sy ny mahalala an’i Jesoa Kristy Ilay nirahinao. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Efa nanome voninahitra Anao Aho tetỳ ambonin’ny tany; vitako ny asa nomenao hataoko. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ray ô, omeo voninahitra eo anilanao kosa Aho ankehitriny; eny, omeo Ahy ilay voninahitra niarahako nanana taminao, fony tsy mbola ary '
    - type: usfm
