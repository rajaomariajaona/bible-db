document_id: JHN.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mivavaka ho an’ny mpianany i Jesoa
  - type: text
    content: 'Avy nilaza izany i Jesoa, dia nanandratra ny masony any an-danitra ka nanao hoe:'
  - type: text
    content: '–Ray ô, tonga ny fotoanandro. Omeo voninahitra ny Zanakao mba hanomezan’ny Zanaka voninahitra Anao. '
  '10':
  - type: text
    content: 'fa izay rehetra Ahy dia Anao ary izay rehetra Anao dia Ahy, sady efa nahazo voninahitra teo aminy Aho. '
  '11':
  - type: text
    content: Tsy ho eto amin’izao tontolo izao intsony Aho; ireo no ho eto amin’izao tontolo izao, fa Izaho kosa mankany aminao. Ray ô, masina Ianao, ka ilay anaranao efa nomenao Ahy hampahafantariko no itahirizo azy ireo
  - type: note
    content: 'ilay anaranao... itahirizo azy ireo: misy stf sasany ahitana hoe ilay anaranao no itahirizo ireo efa nomenao Ahy.'
  - type: text
    content: ', mba ho iray izy tahaka ny maha iray antsika. '
  '12':
  - type: text
    content: 'Fony mbola teo aminy Aho, dia ny anaranao efa nomenao Ahy hampahafantariko no nitahirizako azy; ary narovako ireo, ka tsy nisy very na dia iray aza, afa-tsy ilay nirona amin’ny fahaverezana, mba hahatanteraka ny '
  - type: text
    content: Soratra Masina
  - type: note
    content: 'dia ny anaranao... nitahirizako azy: misy stf sasany ahitana hoe dia ny anaranao no nitahirizako ireo efa nomenao Ahy; misy koa ahitana fotsiny hoe dia ny anaranao no nitahirizako azy. –mba hahatanteraka ny Soratra Masina: jereo Sal 41.10; Jôh 13.18.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ankehitriny mankany aminao Aho; ka izany teny izany no lazaiko dieny mbola eto aminao Aho; ka izany teny izany no lazaiko dieny mbola eto amin’izao tontolo izao Aho, mba hananan’ireo ny hafaliako tanteraka ao aminy. '
  '14':
  - type: text
    content: 'Efa nomeko ny teninao ireo, ka ankahalain’izao tontolo izao: satria tsy naman’izao tontolo izao ireo, tahaka ny tsy maha naman’izao tontolo izao Ahy. '
  '15':
  - type: text
    content: Tsy ny hanesoranao azy amin’izao tontolo izao no ivavahako, fa ny hiarovanao azy amin’
  - type: text
    content: ilay Ratsy
  - type: note
    content: Ampit Mt 6.13.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Tsy naman’izao tontolo izao ireo, tahaka ny tsy maha naman’izao tontolo izao Ahy. '
  '17':
  - type: text
    content: 'Atokàny ho Anao araka ny hafatra marim-pototra ireo: ny teninao no hafatra marim-pototra. '
  '18':
  - type: text
    content: 'Tahaka ny nanirahanao Ahy ho eo amin’izao tontolo izao no nanirahako azy ho eo amin’izao tontolo izao koa. '
  '19':
  - type: text
    content: Ho azy ireo no anokanako tena aminao, mba ho voatokana ho Anao araka ny hafatra marim-pototra koa ireo.
  '2':
  - type: text
    content: 'Araka ny nanomezanao Azy fahefana amin’ny olombelona rehetra, dia omeo voninahitra ny Zanakao mba hanomezany aina maharitra mandrakizay an’izay rehetra nomenao Azy. '
  '20':
  - type: text
    content: 'Tsy ho an’ireto ihany no ivavahako, fa ho an’izay mino Ahy koa noho ny teniny. '
  '21':
  - type: text
    content: 'Mivavaka Aho mba ho iray izy rehetra: Ray ô, enga anie ho ao anatintsika izy rehetra tahaka Anao ato anatiko ary Izaho ao anatinao, mba hinoan’izao tontolo izao fa Ianao no naniraka Ahy. '
  '22':
  - type: text
    content: 'Efa nomeko azy ireo ny voninahitra nomenao Ahy mba ho iray izy tahaka ny maha iray antsika: '
  '23':
  - type: text
    content: Izaho ao anatiny, Ianao ato anatiko, hany ka ho iray tanteraka izy, dia ho fantatr’izao tontolo izao fa Ianao no naniraka Ahy sady Ianao efa tia azy ireo tahaka ny nitiavanao Ahy.
  '24':
  - type: text
    content: 'Ray ô, tiako hiaraka amiko any amin’izay misy Ahy ireo nomenao Ahy mba hahita ny voninahitra nomenao Ahy noho Ianao efa tia Ahy talohan’ny nahariana izao tontolo izao. '
  '25':
  - type: text
    content: 'Ray ô, mandala ny rariny Ianao, ka tsy nahalala Anao izao tontolo izao, fa Izaho no nahalala Anao, ary ireto efa nahalala fa Ianao no naniraka Ahy. '
  '26':
  - type: text
    content: Efa nampahafantariko azy ireo ny anaranao sady mbola hampahafantariko hatrany, mba ho ao amin’ireo ny fitiavana izay nitiavanao Ahy ary mba ho ao anatiny koa Aho.
  '3':
  - type: text
    content: 'Ary izao no aina maharitra mandrakizay: dia ny mahalala Anao hany Andriamanitra tokana sady marina sy ny mahalala an’i Jesoa Kristy Ilay nirahinao. '
  '4':
  - type: text
    content: 'Efa nanome voninahitra Anao Aho tetỳ ambonin’ny tany; vitako ny asa nomenao hataoko. '
  '5':
  - type: text
    content: 'Ray ô, omeo voninahitra eo anilanao kosa Aho ankehitriny; eny, omeo Ahy ilay voninahitra niarahako nanana taminao, fony tsy mbola ary '
  - type: text
    content: izao tontolo izao
  - type: note
    content: Ampit 1.1-2.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Ny anaranao dia nampahafantariko ireo olona navahanao tamin’izao tontolo izao sy nomenao Ahy; Anao ireo ka nomenao Ahy, ary ny teninao efa notandremany. '
  '7':
  - type: text
    content: 'Fantany ankehitriny fa avy taminao ny zavatra rehetra nomenao Ahy, '
  '8':
  - type: text
    content: satria ny teny izay nomenao Ahy dia efa nomeko azy ireo ary noraisiny; ka fantany marina fa nivoaka avy any aminao Aho, ary ninoany fa Ianao no naniraka Ahy.
  '9':
  - type: text
    content: 'Ho azy ireo no ivavahako; tsy ho an’izao tontolo izao no ivavahako, fa ho an’ireo nomenao Ahy: satria Anao ireo, '
