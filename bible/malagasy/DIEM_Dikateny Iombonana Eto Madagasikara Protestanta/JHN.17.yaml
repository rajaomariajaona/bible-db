document_id: JHN.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mivavaka ho an’ny mpianany i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy nilaza izany i Jesoa, dia nanandratra ny masony any an-danitra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ray ô, tonga ny fotoanandro. Omeo voninahitra ny Zanakao mba hanomezan’ny Zanaka voninahitra Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Araka ny nanomezanao Azy fahefana amin’ny olombelona rehetra, dia omeo voninahitra ny Zanakao mba hanomezany aina maharitra mandrakizay an’izay rehetra nomenao Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izao no aina maharitra mandrakizay: dia ny mahalala Anao hany Andriamanitra tokana sady marina sy ny mahalala an’i Jesoa Kristy Ilay nirahinao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Efa nanome voninahitra Anao Aho tetỳ ambonin’ny tany; vitako ny asa nomenao hataoko. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ray ô, omeo voninahitra eo anilanao kosa Aho ankehitriny; eny, omeo Ahy ilay voninahitra niarahako nanana taminao, fony tsy mbola ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1.1-2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny anaranao dia nampahafantariko ireo olona navahanao tamin’izao tontolo izao sy nomenao Ahy; Anao ireo ka nomenao Ahy, ary ny teninao efa notandremany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fantany ankehitriny fa avy taminao ny zavatra rehetra nomenao Ahy, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: satria ny teny izay nomenao Ahy dia efa nomeko azy ireo ary noraisiny; ka fantany marina fa nivoaka avy any aminao Aho, ary ninoany fa Ianao no naniraka Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ho azy ireo no ivavahako; tsy ho an’izao tontolo izao no ivavahako, fa ho an’ireo nomenao Ahy: satria Anao ireo, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa izay rehetra Ahy dia Anao ary izay rehetra Anao dia Ahy, sady efa nahazo voninahitra teo aminy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy ho eto amin’izao tontolo izao intsony Aho; ireo no ho eto amin’izao tontolo izao, fa Izaho kosa mankany aminao. Ray ô, masina Ianao, ka ilay anaranao efa nomenao Ahy hampahafantariko no itahirizo azy ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay anaranao... itahirizo azy ireo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay anaranao no itahirizo ireo efa nomenao Ahy.
    marker-yv: yv-n
  - type: text
    text: ', mba ho iray izy tahaka ny maha iray antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fony mbola teo aminy Aho, dia ny anaranao efa nomenao Ahy hampahafantariko no nitahirizako azy; ary narovako ireo, ka tsy nisy very na dia iray aza, afa-tsy ilay nirona amin’ny fahaverezana, mba hahatanteraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'dia ny anaranao... nitahirizako azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia ny anaranao no nitahirizako ireo efa nomenao Ahy;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy koa ahitana fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia ny anaranao no nitahirizako azy. –mba hahatanteraka ny Soratra Masina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Sal 41.10; Jôh 13.18.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ankehitriny mankany aminao Aho; ka izany teny izany no lazaiko dieny mbola eto aminao Aho; ka izany teny izany no lazaiko dieny mbola eto amin’izao tontolo izao Aho, mba hananan’ireo ny hafaliako tanteraka ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Efa nomeko ny teninao ireo, ka ankahalain’izao tontolo izao: satria tsy naman’izao tontolo izao ireo, tahaka ny tsy maha naman’izao tontolo izao Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsy ny hanesoranao azy amin’izao tontolo izao no ivavahako, fa ny hiarovanao azy amin’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ilay Ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 6.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy naman’izao tontolo izao ireo, tahaka ny tsy maha naman’izao tontolo izao Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Atokàny ho Anao araka ny hafatra marim-pototra ireo: ny teninao no hafatra marim-pototra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tahaka ny nanirahanao Ahy ho eo amin’izao tontolo izao no nanirahako azy ho eo amin’izao tontolo izao koa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ho azy ireo no anokanako tena aminao, mba ho voatokana ho Anao araka ny hafatra marim-pototra koa ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy ho an’ireto ihany no ivavahako, fa ho an’izay mino Ahy koa noho ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mivavaka Aho mba ho iray izy rehetra: Ray ô, enga anie ho ao anatintsika izy rehetra tahaka Anao ato anatiko ary Izaho ao anatinao, mba hinoan’izao tontolo izao fa Ianao no naniraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Efa nomeko azy ireo ny voninahitra nomenao Ahy mba ho iray izy tahaka ny maha iray antsika: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izaho ao anatiny, Ianao ato anatiko, hany ka ho iray tanteraka izy, dia ho fantatr’izao tontolo izao fa Ianao no naniraka Ahy sady Ianao efa tia azy ireo tahaka ny nitiavanao Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ray ô, tiako hiaraka amiko any amin’izay misy Ahy ireo nomenao Ahy mba hahita ny voninahitra nomenao Ahy noho Ianao efa tia Ahy talohan’ny nahariana izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ray ô, mandala ny rariny Ianao, ka tsy nahalala Anao izao tontolo izao, fa Izaho no nahalala Anao, ary ireto efa nahalala fa Ianao no naniraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Efa nampahafantariko azy ireo ny anaranao sady mbola hampahafantariko hatrany, mba ho ao amin’ireo ny fitiavana izay nitiavanao Ahy ary mba ho ao anatiny koa Aho.
