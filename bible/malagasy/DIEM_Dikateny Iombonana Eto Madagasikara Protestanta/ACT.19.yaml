document_id: ACT.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga tao Efeso i Paoly
  - type: text
    content: 'Raha mbola tany Kôrinto i Apôlao, dia namakivaky ny havoana lembalemban’i Azia Minôra kosa i Paoly ka tonga tao Efeso. '
  - type: text
    content: Mpianatra
  - type: text
    content: ' vitsivitsy no hitan’i Paoly tao '
  '10':
  - type: text
    content: 'Naharitra roa taona mahery izany, ka nandre ny tenin’ny Tompo avokoa ny mponina manerana ny faritany Azia, na Jiosy na '
  - type: text
    content: hafa firenena
  - type: text
    content: .
  - type: heading
    content: Ny zanakalahin’i Sevà
  '11':
  - type: text
    content: 'Ary asa mahagaga misongadina no nataon’Andriamanitra tamin’ny alalan’i Paoly. '
  '12':
  - type: text
    content: 'Hatramin’ny tapa-damba isan-karazany nakasika an’i Paoly no nentina teo amin’ny marary, ka nahafaka ny aretina ary nampiala ny fanahy ratsy taminy. '
  '13':
  - type: text
    content: 'Nisy Jiosy sasantsasany koa nivezivezy nandroaka ny fanahy ratsy tamin’ny marary ary nanandrana nampiasa ny anaran’i Jesoa Tompo. Fa hoy ry zareo tamin’ny fanahy ratsy:'
  - type: text
    content: –Amin’ny anaran’ilay Jesoa torîn’i Paoly no andidiako anareo hiala!
  '14':
  - type: text
    content: '(Ny mpanao izany dia izy fito mirahalahy zanaky ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' jiosy atao hoe Sevà). '
  '15':
  - type: text
    content: 'Fa namaly azy ireo kosa ny fanahy ratsy nanao hoe:'
  - type: text
    content: –Fantatro i Jesoa, ary tsy vahiny amiko i Paoly; fa mba iza kosa ianareo?
  '16':
  - type: text
    content: 'Dia niantoraka tamin’ireto zanakalahin’i Sevà ralehilahy itoeram-panahy ratsy ka nahery noho izy rehetra; nasiany mafy izy fito lahy, ka vaky nandositra ary niboridana sady naratra no niala tao an-tranon-dralehilahy. '
  '17':
  - type: text
    content: 'Ren’ny mponina tao Efeso izany, na Jiosy na '
  - type: text
    content: hafa firenena
  - type: text
    content: ', ka raiki-tahotra izy rehetra ary nankalaza ny anaran’i Jesoa Tompo. '
  '18':
  - type: text
    content: 'Tamin’ireo tonga mpino, dia maro no niaiky sy nanambara ampahibemaso izay nataony. '
  '19':
  - type: text
    content: 'Betsaka ny mpanao majîka no nitondra ny bokiny ka nandoro izany teo imason’ny olona rehetra. Rehefa natambatra ny tombam-bidin’ireo boky ireo, dia tafakatra 50.000 '
  - type: text
    content: denàry
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'ka nanontaniany hoe:'
  - type: text
    content: –Efa nandray ny Fanahy Masina ve ianareo fony vao nino?
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –Tsy renay akory aza fa misy ny Fanahy Masina.
  '20':
  - type: text
    content: Niely tsy azo tohaina toy izany ny tenin’ny Tompo
  - type: note
    content: 'Niely... ny tenin’ny Tompo: misy stf sasany ahitana hoe noho ny herin’ny Tompo dia niely ny teny.'
  - type: text
    content: ary nanaporofo ny heriny.
  - type: heading
    content: Tabataba tao Efeso
  '21':
  - type: text
    content: Taorian’ny nitrangan’izany zavatra izany, dia tapa-kevitra
  - type: note
    content: 'Tapa-kevitra: dkt hafa notarihin’ny Fanahy Masina ka nanapa-kevitra.'
  - type: text
    content: 'i Paoly fa hamakivaky an’i Masedônia sy i Akaîa ary hankany Jerosalema, sady hoy izy:'
  - type: text
    content: –Rehefa tonga any aho, dia tsy maintsy ho hitako ihany koa i Rôma.
  '22':
  - type: text
    content: Nirahin’i Paoly ho any Masedônia ny roa lahy tamin’ireo mpanampy azy, dia i Timôty sy i Erasta, fa ny tenany kosa dia mbola nisy fotoana nijanonany tany Azia.
  '23':
  - type: text
    content: 'Tanatin’izany fotoana izany no nipoiran’ny tabataba be ny amin’ny lalana nosoritan’ny Tompo. '
  '24':
  - type: text
    content: Nisy lehilahy mpanefy volafotsy natao hoe Demètry; ilay tempolin’ny andriamanibavy Artemida
  - type: note
    content: 'Artemida: anaran’ilay andriamanibavin’ny havokarana amin’ny teny grika nivavahana indrindra tany Azia Minôra. I Diana no fiantso azy amin’ny teny latinina.'
  - type: text
    content: ' no nanaovany sary madinidinika vita volafotsy ka niteraka loharanom-bola be ho an’ny mpiasany. '
  '25':
  - type: text
    content: 'Dia nantsoin’i Demètry ireo mpiasany sy izay rehetra mpanao asan-tanana tahaka azy ka nilazany hoe:'
  - type: text
    content: '–Tompokolahy, fantatrareo fa izao asan-tanana izao no antoky ny harentsika. '
  '26':
  - type: text
    content: 'Kanefa hitanareo sy renareo izay ataon’ity Paoly ity: ambarany fa tsy andriamanitra ireo andriamanitra nataon-tanan’ny olombelona; ary olona maro no voataonany, tsy eto Efeso ihany, fa saiky manerana an’i Azia. '
  '27':
  - type: text
    content: Ny loza ahina amin’izany, tsy hoe ny haharatsy laza ny raharahantsika ihany, fa koa ny hanaovana tsinontsinona ny tempolin’i Artemida, andriamanibavy lehibe, ka ho very hasina ilay andriamanibavy ivavahana manerana ny faritany Azia sy izao tontolo izao.
  '28':
  - type: text
    content: 'Raha nandre izany teny izany ny vahoaka, dia tezitra izaitsizy ka nihorakoraka hoe:'
  - type: text
    content: –Lehibe i Artemida, andriamanitry ny Efesianina!
  '29':
  - type: text
    content: Nitatra eran’ny tanàna ny fisavorovoroana. Ary voapaokan’ny olona ry i Gaio sy i Aristarka, lehilahy masedônianina mpiara-dia tamin’i Paoly, ka nentiny niara-nirohotra nankao amin’ny kianja filalaovana teatra
  - type: note
    content: Nidadasika be ilay kianja filalaovana tao Efeso; tombanana ho nisy toerana 26 000 eo ho eo azo ipetrahana tamin’ny ambaratonga. Nanaovana teatra tao, nefa nanaovana fivoriana koa.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ka hoy indray i Paoly nanontany hoe:'
  - type: text
    content: –
  - type: text
    content: Batisa
  - type: text
    content: n’iza moa no voarainareo?
  - type: text
    content: 'Dia nataon’ireo hoe:'
  - type: text
    content: –Ny batisan’i Jôhany.
  '30':
  - type: text
    content: 'Te hiseho vahoaka i Paoly, nefa tsy navelan’ny '
  - type: text
    content: mpianatra
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Nisy koa lehibem-paritany sasany tany Azia, izay sakaizan’i Paoly, nandrara azy mba tsy hiditra any amin’ny kianja filalaovana teatra. '
  '32':
  - type: text
    content: 'Tamin’izay dia nisy fifanjevoana be tao am-pivoriana: zavatra samy hafa no antsointsoin’ny olona, satria ny ankamaroany tsy mahalala akory izay anton’ny nahatafavory teo. '
  '33':
  - type: text
    content: 'Nisy olona avy amin’ny vahoaka nampahalala ny toe-javatra tamin’i Aleksandra, izay natosiky ny Jiosy hiteny. Nanofahofa tanana hampangina ny vahoaka i Aleksandra ka nikasa hikabary. '
  '34':
  - type: text
    content: 'Kanjo nony nahafantatra ny olona fa hay Jiosy i Aleksandra, dia indray niredona izy rehetra nihorakoraka hoe:'
  - type: text
    content: –Lehibe i Artemida, andriamanitry ny Efesianina!
  - type: text
    content: 'Naharitra tokony ho adiny roa izany horakoraka izany; '
  '35':
  - type: text
    content: 'kanefa nampilamina ny vahoaka ihany ilay mpanoratry ny tanàna, ka niteny hoe:'
  - type: text
    content: '–Ry Efesianina, fantatry ny olona rehetra fa ny tanànan’i Efeso dia mpitahiry ny tempolin’i Artemida lehibe sy ny sariny izay nilatsaka avy tany an-danitra. '
  '36':
  - type: text
    content: 'Tsy azo lavina izany, ka tokony hilamina tsara ianareo fa tsy hanaonao foana. '
  '37':
  - type: text
    content: 'Ireto lehilahy ireto manko dia nentinareo eto, kanefa tsy nandroba tempoly na niteny ratsy ny andriamanibavintsika. '
  '38':
  - type: text
    content: 'Raha manana fiampangana olona hatao i Demètry sy ny mpiasany, dia aoka hampiakatra fitarainana fa misy ny andro voatokana hitsarana ary misy koa ny manampahefana. '
  '39':
  - type: text
    content: 'Ary raha mbola nisy zavatra hafa tianareo haroso, dia hodinihina amin’ny fivoriana ara-dalàna izany. '
  '4':
  - type: text
    content: 'Ary hoy i Paoly taminy:'
  - type: text
    content: –I Jôhany dia nanao batisa ny olona nanaiky hiala tamin’ny toe-dratsy
  - type: note
    content: Jereo Mt 3.11; Mk 1.4, 7-8.
  - type: text
    content: ' ary nilaza tamin’ny vahoaka mba hino an’Ilay ho tamy aoriany, izany hoe i Jesoa.'
  '40':
  - type: text
    content: Mety hampangaina ho mpikomy isika noho izay nitranga androany; fa tsy misy antony anamarinana izao fivoriana izao ary tsy misy fanazavana mahafa-po azontsika atolotra.
  '41':
  - type: text
    content: Rehefa avy niteny ilay mpanoratry ny tanàna, dia nampirava ny olona vory teo.
  '5':
  - type: text
    content: 'Raha nahare izany teny izany ireto mpianatra, dia nangataka hatao batisa amin’ny anaran’i Jesoa Tompo. '
  '6':
  - type: text
    content: 'Nametrahan’i Paoly tanana izy rehetra ka nahazo ny Fanahy Masina, ary dia niteny tamin’ny fiteny tsy fantatra sady nilaza hafatra avy amin’Andriamanitra. '
  '7':
  - type: text
    content: Lehilahy avokoa ireo mpianatra ireo ary tokony ho 12 no isany.
  '8':
  - type: text
    content: 'Dia nankao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Paoly, ka niteny tamim-pahasahiana; nandritra ny telo volana izy dia nifanakalo hevitra sady niezaka handresy lahatra ny amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. '
  '9':
  - type: text
    content: Maro anefa no nikiribiby tsy nety nino sady naniratsira teo imason’ny besinimaro ny lalana nosoritan’ny Tompo. Dia niala teo amin-dry zareo i Paoly ary nitondra mpianatra niaraka taminy, ka nitoriteny isan’andro tao amin’ny sekolin’i Tirano
  - type: note
    content: Misy stf sasany manampy sy manondro fotoana marina hoe hatramin’ny 11 maraina ka hatramin’ny 4 tolakandro.
  - type: text
    content: '. '
