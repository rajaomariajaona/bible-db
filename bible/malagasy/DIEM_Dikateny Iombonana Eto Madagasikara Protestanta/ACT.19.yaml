document_id: ACT.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tonga tao Efeso i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha mbola tany Kôrinto i Apôlao, dia namakivaky ny havoana lembalemban’i Azia Minôra kosa i Paoly ka tonga tao Efeso. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpianatra
  - type: text
    text: ' vitsivitsy no hitan’i Paoly tao '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nandray ny Fanahy Masina ve ianareo fony vao nino?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy renay akory aza fa misy ny Fanahy Masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka hoy indray i Paoly nanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Batisa
  - type: text
    text: n’iza moa no voarainareo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nataon’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny batisan’i Jôhany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy i Paoly taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –I Jôhany dia nanao batisa ny olona nanaiky hiala tamin’ny toe-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 3.11; Mk 1.4, 7-8.
    marker-yv: yv-n
  - type: text
    text: ' ary nilaza tamin’ny vahoaka mba hino an’Ilay ho tamy aoriany, izany hoe i Jesoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha nahare izany teny izany ireto mpianatra, dia nangataka hatao batisa amin’ny anaran’i Jesoa Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nametrahan’i Paoly tanana izy rehetra ka nahazo ny Fanahy Masina, ary dia niteny tamin’ny fiteny tsy fantatra sady nilaza hafatra avy amin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lehilahy avokoa ireo mpianatra ireo ary tokony ho 12 no isany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nankao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' i Paoly, ka niteny tamim-pahasahiana; nandritra ny telo volana izy dia nifanakalo hevitra sady niezaka handresy lahatra ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Maro anefa no nikiribiby tsy nety nino sady naniratsira teo imason’ny besinimaro ny lalana nosoritan’ny Tompo. Dia niala teo amin-dry zareo i Paoly ary nitondra mpianatra niaraka taminy, ka nitoriteny isan’andro tao amin’ny sekolin’i Tirano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany manampy sy manondro fotoana marina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hatramin’ny 11 maraina ka hatramin’ny 4 tolakandro.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Naharitra roa taona mahery izany, ka nandre ny tenin’ny Tompo avokoa ny mponina manerana ny faritany Azia, na Jiosy na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zanakalahin’i Sevà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary asa mahagaga misongadina no nataon’Andriamanitra tamin’ny alalan’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hatramin’ny tapa-damba isan-karazany nakasika an’i Paoly no nentina teo amin’ny marary, ka nahafaka ny aretina ary nampiala ny fanahy ratsy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nisy Jiosy sasantsasany koa nivezivezy nandroaka ny fanahy ratsy tamin’ny marary ary nanandrana nampiasa ny anaran’i Jesoa Tompo. Fa hoy ry zareo tamin’ny fanahy ratsy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Amin’ny anaran’ilay Jesoa torîn’i Paoly no andidiako anareo hiala!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '(Ny mpanao izany dia izy fito mirahalahy zanaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ' jiosy atao hoe Sevà). '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa namaly azy ireo kosa ny fanahy ratsy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fantatro i Jesoa, ary tsy vahiny amiko i Paoly; fa mba iza kosa ianareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia niantoraka tamin’ireto zanakalahin’i Sevà ralehilahy itoeram-panahy ratsy ka nahery noho izy rehetra; nasiany mafy izy fito lahy, ka vaky nandositra ary niboridana sady naratra no niala tao an-tranon-dralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ren’ny mponina tao Efeso izany, na Jiosy na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ', ka raiki-tahotra izy rehetra ary nankalaza ny anaran’i Jesoa Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tamin’ireo tonga mpino, dia maro no niaiky sy nanambara ampahibemaso izay nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Betsaka ny mpanao majîka no nitondra ny bokiny ka nandoro izany teo imason’ny olona rehetra. Rehefa natambatra ny tombam-bidin’ireo boky ireo, dia tafakatra 50.000 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denàry
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Niely tsy azo tohaina toy izany ny tenin’ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Niely... ny tenin’ny Tompo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: noho ny herin’ny Tompo dia niely ny teny.
    marker-yv: yv-n
  - type: text
    text: ary nanaporofo ny heriny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tabataba tao Efeso
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Taorian’ny nitrangan’izany zavatra izany, dia tapa-kevitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tapa-kevitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: notarihin’ny Fanahy Masina ka nanapa-kevitra.
    marker-yv: yv-n
  - type: text
    text: 'i Paoly fa hamakivaky an’i Masedônia sy i Akaîa ary hankany Jerosalema, sady hoy izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rehefa tonga any aho, dia tsy maintsy ho hitako ihany koa i Rôma.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nirahin’i Paoly ho any Masedônia ny roa lahy tamin’ireo mpanampy azy, dia i Timôty sy i Erasta, fa ny tenany kosa dia mbola nisy fotoana nijanonany tany Azia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tanatin’izany fotoana izany no nipoiran’ny tabataba be ny amin’ny lalana nosoritan’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nisy lehilahy mpanefy volafotsy natao hoe Demètry; ilay tempolin’ny andriamanibavy Artemida
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Artemida: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'anaran’ilay andriamanibavin’ny havokarana amin’ny teny grika nivavahana indrindra tany Azia Minôra. I '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Diana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no fiantso azy amin’ny teny latinina.'
    marker-yv: yv-n
  - type: text
    text: ' no nanaovany sary madinidinika vita volafotsy ka niteraka loharanom-bola be ho an’ny mpiasany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nantsoin’i Demètry ireo mpiasany sy izay rehetra mpanao asan-tanana tahaka azy ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tompokolahy, fantatrareo fa izao asan-tanana izao no antoky ny harentsika. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Kanefa hitanareo sy renareo izay ataon’ity Paoly ity: ambarany fa tsy andriamanitra ireo andriamanitra nataon-tanan’ny olombelona; ary olona maro no voataonany, tsy eto Efeso ihany, fa saiky manerana an’i Azia. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny loza ahina amin’izany, tsy hoe ny haharatsy laza ny raharahantsika ihany, fa koa ny hanaovana tsinontsinona ny tempolin’i Artemida, andriamanibavy lehibe, ka ho very hasina ilay andriamanibavy ivavahana manerana ny faritany Azia sy izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha nandre izany teny izany ny vahoaka, dia tezitra izaitsizy ka nihorakoraka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lehibe i Artemida, andriamanitry ny Efesianina!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nitatra eran’ny tanàna ny fisavorovoroana. Ary voapaokan’ny olona ry i Gaio sy i Aristarka, lehilahy masedônianina mpiara-dia tamin’i Paoly, ka nentiny niara-nirohotra nankao amin’ny kianja filalaovana teatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nidadasika be ilay kianja filalaovana tao Efeso; tombanana ho nisy toerana 26 000 eo ho eo azo ipetrahana tamin’ny ambaratonga. Nanaovana teatra tao, nefa nanaovana fivoriana koa.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Te hiseho vahoaka i Paoly, nefa tsy navelan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nisy koa lehibem-paritany sasany tany Azia, izay sakaizan’i Paoly, nandrara azy mba tsy hiditra any amin’ny kianja filalaovana teatra. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tamin’izay dia nisy fifanjevoana be tao am-pivoriana: zavatra samy hafa no antsointsoin’ny olona, satria ny ankamaroany tsy mahalala akory izay anton’ny nahatafavory teo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nisy olona avy amin’ny vahoaka nampahalala ny toe-javatra tamin’i Aleksandra, izay natosiky ny Jiosy hiteny. Nanofahofa tanana hampangina ny vahoaka i Aleksandra ka nikasa hikabary. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Kanjo nony nahafantatra ny olona fa hay Jiosy i Aleksandra, dia indray niredona izy rehetra nihorakoraka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lehibe i Artemida, andriamanitry ny Efesianina!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Naharitra tokony ho adiny roa izany horakoraka izany; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'kanefa nampilamina ny vahoaka ihany ilay mpanoratry ny tanàna, ka niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Efesianina, fantatry ny olona rehetra fa ny tanànan’i Efeso dia mpitahiry ny tempolin’i Artemida lehibe sy ny sariny izay nilatsaka avy tany an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tsy azo lavina izany, ka tokony hilamina tsara ianareo fa tsy hanaonao foana. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ireto lehilahy ireto manko dia nentinareo eto, kanefa tsy nandroba tempoly na niteny ratsy ny andriamanibavintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Raha manana fiampangana olona hatao i Demètry sy ny mpiasany, dia aoka hampiakatra fitarainana fa misy ny andro voatokana hitsarana ary misy koa ny manampahefana. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary raha mbola nisy zavatra hafa tianareo haroso, dia hodinihina amin’ny fivoriana ara-dalàna izany. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mety hampangaina ho mpikomy isika noho izay nitranga androany; fa tsy misy antony anamarinana izao fivoriana izao ary tsy misy fanazavana mahafa-po azontsika atolotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Rehefa avy niteny ilay mpanoratry ny tanàna, dia nampirava ny olona vory teo.
