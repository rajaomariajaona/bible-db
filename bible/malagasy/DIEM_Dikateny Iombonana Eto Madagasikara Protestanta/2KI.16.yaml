document_id: 2KI.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Ahaza mpanjakan’i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 28.1-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona faha-17 nanjakan’i Peka zanakalahin’i Remalià tamin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' no tonga mpanjakan’i Joda i Ahaza zanakalahin’i Jôtama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Feno roapolo taona izy fony vao nanjaka; ary naharitra 12 taona no nanjakany tao Jerosalema. Nefa tsy nanao izay mahitsy eo imason’ny TOMPO Andriamaniny tahaka ny nataon’i Davida razambeny izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: fa ny toetran’ireo mpanjakan’i Israely no narahiny. Ka nanao sorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fanaovana sorona zaza dia voararan’ny lalànan’Andriamanitra mafy; jereo Lev 20.2-5; Deot 12.31; 18.10.
    marker-yv: yv-n
  - type: text
    text: ' ilay zanany lahy aza izy, araka ny fomba maharikoriko fanaon’ny hafa firenena izay noroahin’ny TOMPO teo anoloan’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nanolotra sorona biby sy nandoro azy hanetona teny amin’ny toeram-panasinana izy ary koa teny amin’ny havoana sy teny ambany hazo maitso midoroboka rehetra teny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tamin’izany dia tonga hanafika an’i Jerosalema i Retsina mpanjakan’i Siria sy i Peka zanakalahin’i Remalià sady mpanjakan’i Israely; ary nanao fahirano an’i Ahaza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 7–8.
    marker-yv: yv-n
  - type: text
    text: ' izy roa tonta, nefa tsy naharesy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tamin’izany fotoana izany ihany dia naverin’i Retsina mpanjakan’i Siria tamin’ny Edômita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Edômita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny RM eto dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sirianina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fa tsy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Edômita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': amin’ny teny hebreo ireo anarana roa dia misy itovizany betsaka; nefa ny faran’ny andininy dia mampiseho fa ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Edômita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tokoa no ambara. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: rehefa avy nandroaka ny Jodeanina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 14.22 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' ny tanànan’i Elata, rehefa avy nandroaka ny Jodeanina hiala tao izy; ary niverina nonina tao Elata ny Edômita ka nipetraka tao ary mbola ao mandraka ankehitriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’izay i Ahaza no nandefa iraka ho amin’i Tiglato-Pilesera mpanjakan’i Asiria hilaza hoe: «Izaho dia mpanomponao sy zanakao; koa tongava hanafaka ahy amin’ny mpanjakan’i Siria sy i Israely izay nanafika ahy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia naka izay volafotsy sy volamena hitany tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' sy tao amin’ny tahirin-dapa i Ahaza ka nandefa izany ho fanomezana ho an’ny mpanjakan’i Asiria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa nihaino ny teniny ny mpanjakan’i Asiria, dia nanafika ny tanànan’i Damasy ka nahazo azy; ary nataony sesitany tany Kira ny mponina, fa novonoiny ho faty kosa i Retsina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nankany Damasy i Ahaza mpanjaka mba hihaona amin’i Tiglato-Pilesera mpanjakan’i Asiria. Nony nahita ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitaran
  - type: text
    text: '’ilay tempolin’i Damasy izy, dia nandefa ny sariny mbamin’ny drafitra antsipiriany rehetra tamin’i Orià mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nanao alitara vaovao i Orià, araka ny toromarika rehetra nampitondrain’i Ahaza mpanjaka azy avy tany Damasy; ary izany dia ho vonona alohan’ny hiverenan’i Ahaza avy any Damasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa tafaverina ny mpanjaka, dia nahita ny alitara ka nanatona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary nanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo teo miaraka amin’ny fanatitra lafarinina sy divay; ary nararany teo ambonin’ny alitara ny ran’ny sorom-pihavanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nesoriny hiala teo anoloan’ny tempoly ny alitara halimo izay voatokana ho an’ny TOMPO; io alitara io dia teo anelanelan’ny alitara vaovao sy ny tranon’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny alitara...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 8.64; 2 Tan 4.1.
    marker-yv: yv-n
  - type: text
    text: ', ka nafindrany hipetraka eo avaratry ny alitara vaovao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nanome izao baiko izao an’i Orià mpisorona i Ahaza nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny alitara lehibe no hampiasainao: eo no hanoloranao ny sorona dorana manontolo isa-maraina sy ny fanatitra lafarinina isan-kariva, ny sorona dorana manontolo sy ny fanatitra lafarinina entin’ny mpanjaka ary ny sorona dorana manontolo mbamin’ny fanatitra lafarinina sy divay entin’ny vahoaka rehetra; hararakao eo koa ny ran’ireo biby natao sorona. Fa ny amin’ny alitara halimo kosa dia mbola handraisako fanapahan-kevitra manokana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Notanterahin’i Orià mpisorona avokoa ny baikon’i Ahaza mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa novakin’i Ahaza koa ny takelaka halimo izay nipetaka tamin’ireo kalesy tao an-Tempoly; nesoriny ny kovetabe teo ambonin’ireo kalesy ireo; ary ilay fitobian-drano goavana boribory dia nampidininy hiala tamin’ireo ombilahy halimo ka nataony teo ambony lampivato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kalesy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo 1 Mp 7.27-39; momba '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay fitobian-drano goavana,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 1 Mp 7.23-26.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mba hahafaly ny mpanjakan’i Asiria, dia nofoanan’i Ahaza ny «alo-baravaran-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tsabata
  - type: text
    text: », izay naorina tao an-tranon’ny TOMPO, sy ny «Fidiran’ny Mpanjaka» izay tany ivelany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Ahaza ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Joda.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany i Ahaza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 14.28.
    marker-yv: yv-n
  - type: text
    text: ', dia nalevina tao amin’ny fasam-pianakaviany tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tanànan’i Davida
  - type: text
    text: ; ary i Hezekià zanany lahy no nanjaka nandimby azy.
