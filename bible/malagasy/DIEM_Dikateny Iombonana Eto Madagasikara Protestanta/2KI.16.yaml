document_id: 2KI.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Ahaza mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 28.1-27)
  - type: text
    content: 'Tamin’ny taona faha-17 nanjakan’i Peka zanakalahin’i Remalià tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Ahaza zanakalahin’i Jôtama. '
  '10':
  - type: text
    content: 'Dia nankany Damasy i Ahaza mpanjaka mba hihaona amin’i Tiglato-Pilesera mpanjakan’i Asiria. Nony nahita ny '
  - type: text
    content: alitaran
  - type: text
    content: '’ilay tempolin’i Damasy izy, dia nandefa ny sariny mbamin’ny drafitra antsipiriany rehetra tamin’i Orià mpisorona. '
  '11':
  - type: text
    content: 'Nanao alitara vaovao i Orià, araka ny toromarika rehetra nampitondrain’i Ahaza mpanjaka azy avy tany Damasy; ary izany dia ho vonona alohan’ny hiverenan’i Ahaza avy any Damasy. '
  '12':
  - type: text
    content: 'Rehefa tafaverina ny mpanjaka, dia nahita ny alitara ka nanatona '
  '13':
  - type: text
    content: 'ary nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo teo miaraka amin’ny fanatitra lafarinina sy divay; ary nararany teo ambonin’ny alitara ny ran’ny sorom-pihavanany. '
  '14':
  - type: text
    content: Dia nesoriny hiala teo anoloan’ny tempoly ny alitara halimo izay voatokana ho an’ny TOMPO; io alitara io dia teo anelanelan’ny alitara vaovao sy ny tranon’ny TOMPO
  - type: note
    content: 'ny alitara...: jereo 1 Mp 8.64; 2 Tan 4.1.'
  - type: text
    content: ', ka nafindrany hipetraka eo avaratry ny alitara vaovao. '
  '15':
  - type: text
    content: 'Ary nanome izao baiko izao an’i Orià mpisorona i Ahaza nanao hoe:'
  - type: text
    content: '–Ny alitara lehibe no hampiasainao: eo no hanoloranao ny sorona dorana manontolo isa-maraina sy ny fanatitra lafarinina isan-kariva, ny sorona dorana manontolo sy ny fanatitra lafarinina entin’ny mpanjaka ary ny sorona dorana manontolo mbamin’ny fanatitra lafarinina sy divay entin’ny vahoaka rehetra; hararakao eo koa ny ran’ireo biby natao sorona. Fa ny amin’ny alitara halimo kosa dia mbola handraisako fanapahan-kevitra manokana.'
  '16':
  - type: text
    content: 'Notanterahin’i Orià mpisorona avokoa ny baikon’i Ahaza mpanjaka. '
  '17':
  - type: text
    content: Fa novakin’i Ahaza koa ny takelaka halimo izay nipetaka tamin’ireo kalesy tao an-Tempoly; nesoriny ny kovetabe teo ambonin’ireo kalesy ireo; ary ilay fitobian-drano goavana boribory dia nampidininy hiala tamin’ireo ombilahy halimo ka nataony teo ambony lampivato
  - type: note
    content: Momba ny kalesy, jereo 1 Mp 7.27-39; momba ilay fitobian-drano goavana, jereo 1 Mp 7.23-26.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Mba hahafaly ny mpanjakan’i Asiria, dia nofoanan’i Ahaza ny «alo-baravaran-
  - type: text
    content: tsabata
  - type: text
    content: », izay naorina tao an-tranon’ny TOMPO, sy ny «Fidiran’ny Mpanjaka» izay tany ivelany.
  '19':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Ahaza ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Feno roapolo taona izy fony vao nanjaka; ary naharitra 12 taona no nanjakany tao Jerosalema. Nefa tsy nanao izay mahitsy eo imason’ny TOMPO Andriamaniny tahaka ny nataon’i Davida razambeny izy; '
  '20':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Ahaza
  - type: note
    content: Jereo Is 14.28.
  - type: text
    content: ', dia nalevina tao amin’ny fasam-pianakaviany tao an-'
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ; ary i Hezekià zanany lahy no nanjaka nandimby azy.
  '3':
  - type: text
    content: fa ny toetran’ireo mpanjakan’i Israely no narahiny. Ka nanao sorona
  - type: note
    content: Ny fanaovana sorona zaza dia voararan’ny lalànan’Andriamanitra mafy; jereo Lev 20.2-5; Deot 12.31; 18.10.
  - type: text
    content: ' ilay zanany lahy aza izy, araka ny fomba maharikoriko fanaon’ny hafa firenena izay noroahin’ny TOMPO teo anoloan’ny Israelita. '
  '4':
  - type: text
    content: Nanolotra sorona biby sy nandoro azy hanetona teny amin’ny toeram-panasinana izy ary koa teny amin’ny havoana sy teny ambany hazo maitso midoroboka rehetra teny.
  '5':
  - type: text
    content: Tamin’izany dia tonga hanafika an’i Jerosalema i Retsina mpanjakan’i Siria sy i Peka zanakalahin’i Remalià sady mpanjakan’i Israely; ary nanao fahirano an’i Ahaza
  - type: note
    content: Jereo Is 7–8.
  - type: text
    content: ' izy roa tonta, nefa tsy naharesy azy. '
  '6':
  - type: text
    content: Tamin’izany fotoana izany ihany dia naverin’i Retsina mpanjakan’i Siria tamin’ny Edômita
  - type: note
    content: 'Edômita: ny RM eto dia manao hoe Sirianina fa tsy Edômita: amin’ny teny hebreo ireo anarana roa dia misy itovizany betsaka; nefa ny faran’ny andininy dia mampiseho fa ny Edômita tokoa no ambara. –rehefa avy nandroaka ny Jodeanina: jereo 14.22 sy nta.'
  - type: text
    content: ' ny tanànan’i Elata, rehefa avy nandroaka ny Jodeanina hiala tao izy; ary niverina nonina tao Elata ny Edômita ka nipetraka tao ary mbola ao mandraka ankehitriny.'
  '7':
  - type: text
    content: 'Tamin’izay i Ahaza no nandefa iraka ho amin’i Tiglato-Pilesera mpanjakan’i Asiria hilaza hoe: «Izaho dia mpanomponao sy zanakao; koa tongava hanafaka ahy amin’ny mpanjakan’i Siria sy i Israely izay nanafika ahy.» '
  '8':
  - type: text
    content: Dia naka izay volafotsy sy volamena hitany tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sy tao amin’ny tahirin-dapa i Ahaza ka nandefa izany ho fanomezana ho an’ny mpanjakan’i Asiria. '
  '9':
  - type: text
    content: Koa nihaino ny teniny ny mpanjakan’i Asiria, dia nanafika ny tanànan’i Damasy ka nahazo azy; ary nataony sesitany tany Kira ny mponina, fa novonoiny ho faty kosa i Retsina.
