document_id: PSA.22,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Antso ataon’ny efa trotraka
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hohiraina araka ny feon’ny hoe «Ny dieravavy, fony mazavatsinanana». Salamo nataon’i Davida.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, Tompo ô, no namoaka ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiala avy tao an-kibon-dreniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampandry ahy teo an-trotroany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao teraka aho, dia nankinina taminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbola tany am-bohoka aho, efa Andriamanitro Ianao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa aza manalavitra ahy fa akaiky izao ny loza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay hamonjy ahy dia tsy misy mihitsy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo fahavaloko no mitangorona amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa ombilahy maro manemitra ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'toa ombilahy masiaka avy any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Basàna
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misanasana vava hamely ahy ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mova tsy liona mandrotika sy mierona.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Very hery toy ny rano mihanaka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mivahavaha ny taolako rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa savoka ny foko ka miempo ato anatiko.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maina toy ny tavim-bilany ny tendako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miraikitra amin’ny lanilaniko ny lelako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toa ao amin’ny vovoky ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa ametrahan’ny fahavaloko ahy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andian’olon-dratsy no mitangorona amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa alika maromaro manodidina ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nafatotr’ireo ny tongotra aman-tanako.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taolako rehetra no sisa hita, satria mahia aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka jeren’ireo fotsiny sady angarihany;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ifampizaràny ny fitafiako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataony antsapaka ny akanjoko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 27.35; Mk 15.24; Lk 23.34; Jôh 19.24.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro ô, Andriamanitro ô
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahoana no dia nilaozanao aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fiandohan’ny and 2 dia voatsiahin’i Jesoa voahombo teo ambony hazofijaliana araka ny Mt 27.46; Mk 15.34.
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mijanona eny lavitra eny Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mamonjy ahy na mihaino ny tarainako?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao kosa, TOMPO ô, aza manalavitra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, ry heriko, faingàna re hamonjy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho tsy ho ritra tankina ny aiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arovy aho tsy ho rembin’ireo alika,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo tsy ho rotidrotiky ny liona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho voan’ireo tandrok’ombimanga.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia namaly ny vavaka nataoko Ianao!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa hanambara ny lazanao amin’ireo namako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hidera Anao, rehefa miangona izahay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: And voatsiahy ao amin’ny Heb 2.12.
      marker-yv: yv-n
    - type: text
      text: ':'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Miderà ny TOMPO, ianareo mpanaja Azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hanome voninahitra Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo rehetra taranak’i Jakôba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hangovitra eo anatrehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo rehetra taranak’i Israely!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy nohamavoiny na notebahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ity mahantra izay vesaram-pahoriana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nandà ny hifanatri-tava aminy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nihaino tokoa ny tarainany.»
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, Ianao no ahazoako midera Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa tafangona maro ny vahoakanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’ireo mpanaja Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanefako ny voadiko taminao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hasaiko amin’ny sakafon-tsorona ny ory:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihinana anie izy ka ho voky!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera ny TOMPO anie ireo mitady Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho finaritra ho ela velona!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny vahoaka hatrany am-paran’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahatsiaro ny TOMPO ka hiverina aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ny fianakaviamben’ny firenen-drehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy ho tonga hiankohoka eo anatrehany!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny TOMPO no mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no manapaka amin’ireo firenena.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandritra ny andro aho miantso Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy tsy valianao, Andriamanitro ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miantso koa aho amin’ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy tsy mahazo fiononana.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hiankohoka eo anoloany aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo rehetra matory ao ambanin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ireo rehetra... tany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Dan 12.2.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handohalika avokoa eo anatrehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra miverina ho vovoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa tsy nisy aina intsony.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanompo Azy ny taranak’ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny taranaka manaraka hilazana ny Tompo.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo olona vao ho teraka hitantarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nataony hanafahana ny vahoakany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa mipetraka an-tsezafiandrianana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, ry ilay Andriamanitra masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay fidèran’i Israely vahoakanao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitoky taminao ireo razanay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natoky Anao izy ka tsy diso fanantenana,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niantso vonjy taminao ka nafahanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natoky Anao ka tsy diso fanantenana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa toy ny kankana aho fa tsy olona intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka sady voaompa no lavin’ny vahoaka;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mahita ahy dia maneso avokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manondro molotra, mihifikifi-doha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 27.39; Mk 15.29; ampit Sal 109.25.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hoy izy ireo ny amiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny TOMPO no itokiany ka aoka hanavotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny tia azy Izy, ka aoka hanafaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny and manontolo, jereo Mt 27.43.
      marker-yv: yv-n
    - type: text
      text: '!»'
