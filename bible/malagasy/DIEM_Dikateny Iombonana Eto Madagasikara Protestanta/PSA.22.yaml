segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Antso ataon’ny efa trotraka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tao amin’ny tahirin-kiran’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hohiraina araka ny feon’ny hoe «Ny dieravavy, fony mazavatsinanana». Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitro ô, Andriamanitro ô
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahoana no dia nilaozanao aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fiandohan’ny and 2 dia voatsiahin’i Jesoa voahombo teo ambony hazofijaliana araka ny Mt 27.46; Mk 15.34.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no mijanona eny lavitra eny Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mamonjy ahy na mihaino ny tarainako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandritra ny andro aho miantso Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy tsy valianao, Andriamanitro ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miantso koa aho amin’ny alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy tsy mahazo fiononana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kanefa mipetraka an-tsezafiandrianana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao, ry ilay Andriamanitra masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay fidèran’i Israely vahoakanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nitoky taminao ireo razanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: natoky Anao izy ka tsy diso fanantenana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: niantso vonjy taminao ka nafahanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: natoky Anao ka tsy diso fanantenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa toy ny kankana aho fa tsy olona intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sady voaompa no lavin’ny vahoaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: izay mahita ahy dia maneso avokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manondro molotra, mihifikifi-doha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 27.39; Mk 15.29; ampit Sal 109.25.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ka hoy izy ireo ny amiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny TOMPO no itokiany ka aoka hanavotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny tia azy Izy, ka aoka hanafaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and manontolo, jereo Mt 27.43.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ianao, Tompo ô, no namoaka ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hiala avy tao an-kibon-dreniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampandry ahy teo an-trotroany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vao teraka aho, dia nankinina taminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbola tany am-bohoka aho, efa Andriamanitro Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa aza manalavitra ahy fa akaiky izao ny loza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay hamonjy ahy dia tsy misy mihitsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ireo fahavaloko no mitangorona amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: toa ombilahy maro manemitra ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'toa ombilahy masiaka avy any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Misanasana vava hamely ahy ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mova tsy liona mandrotika sy mierona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Very hery toy ny rano mihanaka aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mivahavaha ny taolako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toa savoka ny foko ka miempo ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maina toy ny tavim-bilany ny tendako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miraikitra amin’ny lanilaniko ny lelako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toa ao amin’ny vovoky ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no efa ametrahan’ny fahavaloko ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Andian’olon-dratsy no mitangorona amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: toa alika maromaro manodidina ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nafatotr’ireo ny tongotra aman-tanako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny taolako rehetra no sisa hita, satria mahia aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka jeren’ireo fotsiny sady angarihany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ifampizaràny ny fitafiako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataony antsapaka ny akanjoko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 27.35; Mk 15.24; Lk 23.34; Jôh 19.24.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ianao kosa, TOMPO ô, aza manalavitra ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao, ry heriko, faingàna re hamonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Afaho tsy ho ritra tankina ny aiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: arovy aho tsy ho rembin’ireo alika,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: vonjeo tsy ho rotidrotiky ny liona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho voan’ireo tandrok’ombimanga.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia namaly ny vavaka nataoko Ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Koa hanambara ny lazanao amin’ireo namako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hidera Anao, rehefa miangona izahay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: And voatsiahy ao amin’ny Heb 2.12.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: «Miderà ny TOMPO, ianareo mpanaja Azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hanome voninahitra Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo rehetra taranak’i Jakôba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hangovitra eo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo rehetra taranak’i Israely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa tsy nohamavoiny na notebahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ity mahantra izay vesaram-pahoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nandà ny hifanatri-tava aminy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nihaino tokoa ny tarainany.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tompo ô, Ianao no ahazoako midera Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tafangona maro ny vahoakanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’ireo mpanaja Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanefako ny voadiko taminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hasaiko amin’ny sakafon-tsorona ny ory:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hihinana anie izy ka ho voky!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hidera ny TOMPO anie ireo mitady Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho finaritra ho ela velona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aoka ny vahoaka hatrany am-paran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahatsiaro ny TOMPO ka hiverina aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ny fianakaviamben’ny firenen-drehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy ho tonga hiankohoka eo anatrehany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa ny TOMPO no mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no manapaka amin’ireo firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Eny, hiankohoka eo anoloany aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo rehetra matory ao ambanin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo rehetra... tany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Dan 12.2.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: handohalika avokoa eo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra miverina ho vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa tsy nisy aina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Hanompo Azy ny taranak’ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny taranaka manaraka hilazana ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ireo olona vao ho teraka hitantarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nataony hanafahana ny vahoakany.
