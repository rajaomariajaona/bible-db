document_id: PSA.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Antso ataon’ny efa trotraka
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hohiraina araka ny feon’ny hoe «Ny dieravavy, fony mazavatsinanana». Salamo nataon’i Davida.
  '10':
  - type: text
    content: Ianao, Tompo ô, no namoaka ahy
  - type: text
    content: mba hiala avy tao an-kibon-dreniko
  - type: text
    content: ka nampandry ahy teo an-trotroany.
  '11':
  - type: text
    content: Vao teraka aho, dia nankinina taminao;
  - type: text
    content: mbola tany am-bohoka aho, efa Andriamanitro Ianao.
  '12':
  - type: text
    content: Koa aza manalavitra ahy fa akaiky izao ny loza;
  - type: text
    content: ary izay hamonjy ahy dia tsy misy mihitsy.
  '13':
  - type: text
    content: Ireo fahavaloko no mitangorona amiko
  - type: text
    content: toa ombilahy maro manemitra ahy,
  - type: text
    content: 'toa ombilahy masiaka avy any '
  - type: text
    content: Basàna
  - type: text
    content: .
  '14':
  - type: text
    content: Misanasana vava hamely ahy ireny,
  - type: text
    content: mova tsy liona mandrotika sy mierona.
  '15':
  - type: text
    content: Very hery toy ny rano mihanaka aho,
  - type: text
    content: ary mivahavaha ny taolako rehetra;
  - type: text
    content: toa savoka ny foko ka miempo ato anatiko.
  '16':
  - type: text
    content: Maina toy ny tavim-bilany ny tendako;
  - type: text
    content: miraikitra amin’ny lanilaniko ny lelako.
  - type: text
    content: Toa ao amin’ny vovoky ny fahafatesana
  - type: text
    content: no efa ametrahan’ny fahavaloko ahy.
  '17':
  - type: text
    content: Andian’olon-dratsy no mitangorona amiko
  - type: text
    content: toa alika maromaro manodidina ahy;
  - type: text
    content: nafatotr’ireo ny tongotra aman-tanako.
  '18':
  - type: text
    content: Ny taolako rehetra no sisa hita, satria mahia aho
  - type: text
    content: ka jeren’ireo fotsiny sady angarihany;
  '19':
  - type: text
    content: ifampizaràny ny fitafiako
  - type: text
    content: ary ataony antsapaka ny akanjoko
  - type: note
    content: Jereo Mt 27.35; Mk 15.24; Lk 23.34; Jôh 19.24.
  - type: text
    content: .
  '2':
  - type: text
    content: Andriamanitro ô, Andriamanitro ô
  - type: text
    content: nahoana no dia nilaozanao aho
  - type: note
    content: Ny fiandohan’ny and 2 dia voatsiahin’i Jesoa voahombo teo ambony hazofijaliana araka ny Mt 27.46; Mk 15.34.
  - type: text
    content: '?'
  - type: text
    content: Nahoana no mijanona eny lavitra eny Ianao
  - type: text
    content: ka tsy mamonjy ahy na mihaino ny tarainako?
  '20':
  - type: text
    content: Ianao kosa, TOMPO ô, aza manalavitra ahy;
  - type: text
    content: Ianao, ry heriko, faingàna re hamonjy.
  '21':
  - type: text
    content: Afaho tsy ho ritra tankina ny aiko,
  - type: text
    content: arovy aho tsy ho rembin’ireo alika,
  '22':
  - type: text
    content: vonjeo tsy ho rotidrotiky ny liona,
  - type: text
    content: ary tsy ho voan’ireo tandrok’ombimanga.
  - type: text
    content: Dia namaly ny vavaka nataoko Ianao!
  '23':
  - type: text
    content: Koa hanambara ny lazanao amin’ireo namako aho
  - type: text
    content: ary hidera Anao, rehefa miangona izahay
  - type: note
    content: And voatsiahy ao amin’ny Heb 2.12.
  - type: text
    content: ':'
  '24':
  - type: text
    content: «Miderà ny TOMPO, ianareo mpanaja Azy.
  - type: text
    content: Aoka hanome voninahitra Azy
  - type: text
    content: ianareo rehetra taranak’i Jakôba;
  - type: text
    content: aoka hangovitra eo anatrehany
  - type: text
    content: ianareo rehetra taranak’i Israely!
  '25':
  - type: text
    content: Fa tsy nohamavoiny na notebahiny
  - type: text
    content: ity mahantra izay vesaram-pahoriana;
  - type: text
    content: tsy nandà ny hifanatri-tava aminy Izy,
  - type: text
    content: fa nihaino tokoa ny tarainany.»
  '26':
  - type: text
    content: Tompo ô, Ianao no ahazoako midera Anao
  - type: text
    content: rehefa tafangona maro ny vahoakanao;
  - type: text
    content: eo anatrehan’ireo mpanaja Anao
  - type: text
    content: no hanefako ny voadiko taminao.
  '27':
  - type: text
    content: 'Hasaiko amin’ny sakafon-tsorona ny ory:'
  - type: text
    content: hihinana anie izy ka ho voky!
  - type: text
    content: Hidera ny TOMPO anie ireo mitady Azy
  - type: text
    content: ka ho finaritra ho ela velona!
  '28':
  - type: text
    content: Aoka ny vahoaka hatrany am-paran’ny tany
  - type: text
    content: hahatsiaro ny TOMPO ka hiverina aminy;
  - type: text
    content: aoka ny fianakaviamben’ny firenen-drehetra
  - type: text
    content: samy ho tonga hiankohoka eo anatrehany!
  '29':
  - type: text
    content: Fa ny TOMPO no mpanjaka,
  - type: text
    content: Izy no manapaka amin’ireo firenena.
  '3':
  - type: text
    content: Mandritra ny andro aho miantso Anao
  - type: text
    content: saingy tsy valianao, Andriamanitro ô;
  - type: text
    content: ary miantso koa aho amin’ny alina,
  - type: text
    content: saingy tsy mahazo fiononana.
  '30':
  - type: text
    content: Eny, hiankohoka eo anoloany aza
  - type: text
    content: ireo rehetra matory ao ambanin’ny tany
  - type: note
    content: 'ireo rehetra... tany: jereo Dan 12.2.'
  - type: text
    content: ':'
  - type: text
    content: handohalika avokoa eo anatrehany
  - type: text
    content: izay rehetra miverina ho vovoka
  - type: text
    content: satria efa tsy nisy aina intsony.
  '31':
  - type: text
    content: Hanompo Azy ny taranak’ireny;
  - type: text
    content: ny taranaka manaraka hilazana ny Tompo.
  '32':
  - type: text
    content: Ireo olona vao ho teraka hitantarana
  - type: text
    content: izay nataony hanafahana ny vahoakany.
  '4':
  - type: text
    content: Kanefa mipetraka an-tsezafiandrianana
  - type: text
    content: Ianao, ry ilay Andriamanitra masina
  - type: text
    content: Izay fidèran’i Israely vahoakanao.
  '5':
  - type: text
    content: Nitoky taminao ireo razanay;
  - type: text
    content: natoky Anao izy ka tsy diso fanantenana,
  '6':
  - type: text
    content: niantso vonjy taminao ka nafahanao,
  - type: text
    content: natoky Anao ka tsy diso fanantenana.
  '7':
  - type: text
    content: Efa toy ny kankana aho fa tsy olona intsony,
  - type: text
    content: ka sady voaompa no lavin’ny vahoaka;
  '8':
  - type: text
    content: izay mahita ahy dia maneso avokoa,
  - type: text
    content: manondro molotra, mihifikifi-doha
  - type: note
    content: Jereo Mt 27.39; Mk 15.29; ampit Sal 109.25.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Ka hoy izy ireo ny amiko hoe:'
  - type: text
    content: «Ny TOMPO no itokiany ka aoka hanavotra;
  - type: text
    content: eny tia azy Izy, ka aoka hanafaka
  - type: note
    content: Momba ny and manontolo, jereo Mt 27.43.
  - type: text
    content: '!»'
