document_id: MAT.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay lehilahy tao Kafarnahòma
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 2.1-12; Lk 5.17-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia niondrana an-tsambokely i Jesoa ary niampita indray ka tonga tao an-tanànany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Araka ny voalazan’ny Mk 2.1, dia i Kafarnahòma no raisina ho tanànan’i Jesoa eto. Jereo koa Mt 4.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary indro nisy lehilahy malemy nilamaka am-pandriana, nentin’olona teo aminy. Hitan’i Jesoa ny finoan’ireto olona, ka hoy Izy tamin’ilay malemy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mahereza, anaka; voavela ny helokao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’izay ny sasany tamin’ny mpahay lalàna dia nanao anakampo hoe: «Manevateva an’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lev 24.16.
    marker-yv: yv-n
  - type: text
    text: ' ilay io!» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fantatr’i Jesoa ny eritreritry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' ka hoy Izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana ianareo no mieritreri-dratsy ao am-ponareo? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa inona moa no tsotsotra kokoa, ny milaza hoe: «Voavela ny helokao», sa ny milaza hoe: «Mitsangàna ka mandehana»? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ho fantatrareo fa ny Zanak’olona eto an-tany dia manam-pahefana hamela heloka!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’izay dia hoy i Jesoa tamin’ilay malemy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitsangàna, batao ny fandrianao ka ndeha mody!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nitsangana ralehilahy ka lasa nody. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Natahotra ny vahoaka nony nahita izany ary nanome voninahitra an’Andriamanitra Izay nanolotra fahefana hamela heloka toy izany tamin’ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antsoin’i Jesoa ho mpianany i Matio
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 2.13-17; Lk 5.27-32)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha niala teo i Jesoa, dia nahita lehilahy atao hoe Matio nipetraka teo amin’ny birao famorian-ketra, ka hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia hiaraka amiko.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nitsangana i Matio ka nandeha niaraka taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary raha nisakafo tao an-tranon’i Matio
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny rijan-teny grika fototra dia milaza fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tranony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; kanefa tokony ho '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tranon’i Matio
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fa tsy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tranon’i Jesoa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no ambara amin’izany.'
    marker-yv: yv-n
  - type: text
    text: ' i Jesoa, dia maro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpamory hetra
  - type: text
    text: ' sy ny mpanota no tonga niara-nihinana tamin’Izy sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nahita izany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' ka nilaza tamin’ny mpianatr’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ny Mpampianatrareo no dia miara-misakafo amin’ny mpamory hetra sy ny mpanota
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit ny and 10.11 sy Lk 15.1-2.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hoy i Jesoa raha nandre izany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy ny salama no mila dokotera fa ny marary. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ndeha mba ianaro ny hevitr’ilay tenin’ny Soratra Masina hoe: «Ny hamindranareo fo amin’ny namana no sitrako, hoy Andriamanitra, fa tsy ny hanateranareo sorona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hôs 6.6.
    marker-yv: yv-n
  - type: text
    text: .» Tsy hiantso ny olo-marina no nahatongavako fa hiantso ny mpanota.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifadian-kanina ary ny tonta sy ny vao
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 2.18-22; Lk 5.33-39)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tamin’izay dia nanatona an’i Jesoa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatr
  - type: text
    text: '’i Jôhany Mpanao batisa ka nanontany Azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ahoana izahay sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mifady hanina
  - type: text
    text: ' matetika, fa ny mpianatrao kosa tsy mba mifady?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa azon’ireo mpanotrona ny mpampaka-bady atao ve ny misaona raha mbola miaraka aminy eo ny mpampakatra? Tsia. Fa ho avy ny andro hanesorana ny mpampakatra eo aminy, ka amin’izay andro izay vao hifady hanina ireo mpanotrona.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: –Tsy misy olona manampina fitafiana tonta amin’ny tapa-damba vaovao; fa handrirotra ny fitafiana tonta ilay tapa-damba natampina, ary vao mainka hitatra ny rovitra.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '–Tsy mba '
  - type: usfm
    marker: w
    children:
    - type: text
      text: siny hoditra
  - type: text
    text: ' tranainy no itahirizana divay vaovao; fa raha izany, dia ho rotika ny siny hoditra; ka ny divay ho raraka, ny siny hoditra hafoy. Fa siny hoditra vaovao no itahirizana divay vaovao, dia miara-maharitra izy roroa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay zanakavavina manampahefana jiosy sy ilay vehivavy mitsi-dra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 5.21-43; Lk 8.40-56)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha mbola niteny izany tamin’ny mpianatr’i Jôhany Mpanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' i Jesoa, dia indro tonga ity manampahefana jiosy anankiray niankohoka teo anatrehany sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Maty vao izao ny zanako vavy; ka andeha re hametraka ny tananao aminy dia ho velona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nitsangana nandeha nanaraka azy i Jesoa mbamin’ny mpianany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa indro nisy vehivavy mitsi-dra efa nandritra ny 12 taona, nanatona an’i Jesoa avy eo ivoho ary nikasika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: somotraviavin-dambany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 15.38-41; Eks 22.12; Mt 23.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'fa hoy izy anakampony: «Na dia ny lambany fotsiny aza no voakasiko, dia ho sitrana aho.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nitodika i Jesoa ka nahita azy ary niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mahereza, anaka; ny finoanao no nahasitrana anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nahasitrana anao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nahavonjy anao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nanomboka tamin’io ora io dia sitrana ravehivavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nony tonga tany an-tranon’ilay manampahefana i Jesoa ka nahita ny mpitsoka sodina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny mpitsoka sodina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpiangaly zava-maneno
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia manampy ireo mpitomany mandritra ny fomba fisaonana mikotaba fanaon’ny Jiosy rehefa misy fahoriana.'
    marker-yv: yv-n
  - type: text
    text: ' sy ny vahoaka nitabataba '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mialà ianareo! Tsy maty akory razazavavy fa matory!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nihomehezan’ny olona i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nony efa navoaka tany alatrano kosa ny vahoaka, dia niditra i Jesoa ka nandray ny tanan-drazazavavy ary dia niarina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary niely eran’io faritany io ny lazan’izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ireo jamba roa lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha niala teo i Jesoa, dia nisy jamba roa lahy nanaraka Azy sady niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’i Davida
  - type: text
    text: ' ô, mamindrà fo aminay!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary rehefa niditra tao an-trano i Jesoa, dia nohatonin’ireo jamba; ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mino ve ianareo fa haiko atao izany?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’izy roa lahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, Tompoko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin’izay dia nokasihin’i Jesoa ny mason’ireto jamba sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ho tonga aminareo araka ny finoanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nahiratra ny mason’izy roa lahy, fa i Jesoa namepetra azy mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tandremo sao fantatr’olona izao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Kanjo nony lasa ireo, dia nampiely ny lazan’i Jesoa manerana io faritany io.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay lehilahy moana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nony lasa izy roa lahy ireo, dia indro nentin’olona teo amin’i Jesoa ity lehilahy azon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' mampahamoana. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa voaroakan’i Jesoa ny demony, dia niteny ilay moana; ary gaga ny vahoaka sady vaky vava hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mbola nisy zava-nitranga toy izao teto amin’i Israely!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
