document_id: MAT.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitranin’i Jesoa ilay lehilahy tao Kafarnahòma
  - type: heading
    content: (Jereo Mk 2.1-12; Lk 5.17-26)
  - type: text
    content: Dia niondrana an-tsambokely i Jesoa ary niampita indray ka tonga tao an-tanànany
  - type: note
    content: Araka ny voalazan’ny Mk 2.1, dia i Kafarnahòma no raisina ho tanànan’i Jesoa eto. Jereo koa Mt 4.13.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ary raha nisakafo tao an-tranon’i Matio
  - type: note
    content: Ny rijan-teny grika fototra dia milaza fotsiny hoe ny tranony; kanefa tokony ho ny tranon’i Matio fa tsy ny tranon’i Jesoa no ambara amin’izany.
  - type: text
    content: ' i Jesoa, dia maro ny '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' sy ny mpanota no tonga niara-nihinana tamin’Izy sy ny '
  - type: text
    content: mpianany
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Nahita izany ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' ka nilaza tamin’ny mpianatr’i Jesoa hoe:'
  - type: text
    content: –Nahoana ny Mpampianatrareo no dia miara-misakafo amin’ny mpamory hetra sy ny mpanota
  - type: note
    content: Ampit ny and 10.11 sy Lk 15.1-2.
  - type: text
    content: '?'
  '12':
  - type: text
    content: 'Fa hoy i Jesoa raha nandre izany:'
  - type: text
    content: '–Tsy ny salama no mila dokotera fa ny marary. '
  '13':
  - type: text
    content: 'Ndeha mba ianaro ny hevitr’ilay tenin’ny Soratra Masina hoe: «Ny hamindranareo fo amin’ny namana no sitrako, hoy Andriamanitra, fa tsy ny hanateranareo sorona'
  - type: note
    content: Hôs 6.6.
  - type: text
    content: .» Tsy hiantso ny olo-marina no nahatongavako fa hiantso ny mpanota.
  - type: heading
    content: Ny fifadian-kanina ary ny tonta sy ny vao
  - type: heading
    content: (Jereo Mk 2.18-22; Lk 5.33-39)
  '14':
  - type: text
    content: 'Tamin’izay dia nanatona an’i Jesoa ny '
  - type: text
    content: mpianatr
  - type: text
    content: '’i Jôhany Mpanao batisa ka nanontany Azy hoe:'
  - type: text
    content: '–Ahoana izahay sy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' no '
  - type: text
    content: mifady hanina
  - type: text
    content: ' matetika, fa ny mpianatrao kosa tsy mba mifady?'
  '15':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Moa azon’ireo mpanotrona ny mpampaka-bady atao ve ny misaona raha mbola miaraka aminy eo ny mpampakatra? Tsia. Fa ho avy ny andro hanesorana ny mpampakatra eo aminy, ka amin’izay andro izay vao hifady hanina ireo mpanotrona.
  '16':
  - type: text
    content: –Tsy misy olona manampina fitafiana tonta amin’ny tapa-damba vaovao; fa handrirotra ny fitafiana tonta ilay tapa-damba natampina, ary vao mainka hitatra ny rovitra.
  '17':
  - type: text
    content: '–Tsy mba '
  - type: text
    content: siny hoditra
  - type: text
    content: ' tranainy no itahirizana divay vaovao; fa raha izany, dia ho rotika ny siny hoditra; ka ny divay ho raraka, ny siny hoditra hafoy. Fa siny hoditra vaovao no itahirizana divay vaovao, dia miara-maharitra izy roroa.'
  - type: heading
    content: Ilay zanakavavina manampahefana jiosy sy ilay vehivavy mitsi-dra
  - type: heading
    content: (Jereo Mk 5.21-43; Lk 8.40-56)
  '18':
  - type: text
    content: 'Raha mbola niteny izany tamin’ny mpianatr’i Jôhany Mpanao '
  - type: text
    content: batisa
  - type: text
    content: ' i Jesoa, dia indro tonga ity manampahefana jiosy anankiray niankohoka teo anatrehany sady nanao hoe:'
  - type: text
    content: –Maty vao izao ny zanako vavy; ka andeha re hametraka ny tananao aminy dia ho velona izy.
  '19':
  - type: text
    content: 'Dia nitsangana nandeha nanaraka azy i Jesoa mbamin’ny mpianany. '
  '2':
  - type: text
    content: 'Ary indro nisy lehilahy malemy nilamaka am-pandriana, nentin’olona teo aminy. Hitan’i Jesoa ny finoan’ireto olona, ka hoy Izy tamin’ilay malemy:'
  - type: text
    content: –Mahereza, anaka; voavela ny helokao!
  '20':
  - type: text
    content: 'Fa indro nisy vehivavy mitsi-dra efa nandritra ny 12 taona, nanatona an’i Jesoa avy eo ivoho ary nikasika ny '
  - type: text
    content: somotraviavin-dambany
  - type: note
    content: Jereo Nom 15.38-41; Eks 22.12; Mt 23.5 sy nta.
  - type: text
    content: '; '
  '21':
  - type: text
    content: 'fa hoy izy anakampony: «Na dia ny lambany fotsiny aza no voakasiko, dia ho sitrana aho.»'
  '22':
  - type: text
    content: 'Dia nitodika i Jesoa ka nahita azy ary niteny hoe:'
  - type: text
    content: –Mahereza, anaka; ny finoanao no nahasitrana anao
  - type: note
    content: nahasitrana anao na hoe nahavonjy anao.
  - type: text
    content: '!'
  - type: text
    content: Ary nanomboka tamin’io ora io dia sitrana ravehivavy.
  '23':
  - type: text
    content: Nony tonga tany an-tranon’ilay manampahefana i Jesoa ka nahita ny mpitsoka sodina
  - type: note
    content: Ny mpitsoka sodina na mpiangaly zava-maneno dia manampy ireo mpitomany mandritra ny fomba fisaonana mikotaba fanaon’ny Jiosy rehefa misy fahoriana.
  - type: text
    content: ' sy ny vahoaka nitabataba '
  '24':
  - type: text
    content: 'dia nanao hoe:'
  - type: text
    content: –Mialà ianareo! Tsy maty akory razazavavy fa matory!
  - type: text
    content: 'Dia nihomehezan’ny olona i Jesoa. '
  '25':
  - type: text
    content: 'Nony efa navoaka tany alatrano kosa ny vahoaka, dia niditra i Jesoa ka nandray ny tanan-drazazavavy ary dia niarina izy. '
  '26':
  - type: text
    content: Ary niely eran’io faritany io ny lazan’izany.
  - type: heading
    content: Sitranin’i Jesoa ireo jamba roa lahy
  '27':
  - type: text
    content: 'Raha niala teo i Jesoa, dia nisy jamba roa lahy nanaraka Azy sady niantsoantso hoe:'
  - type: text
    content: '–Ry '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: ' ô, mamindrà fo aminay!'
  '28':
  - type: text
    content: 'Ary rehefa niditra tao an-trano i Jesoa, dia nohatonin’ireo jamba; ka hoy i Jesoa taminy:'
  - type: text
    content: –Mino ve ianareo fa haiko atao izany?
  - type: text
    content: 'Dia novalian’izy roa lahy hoe:'
  - type: text
    content: –Eny, Tompoko!
  '29':
  - type: text
    content: 'Tamin’izay dia nokasihin’i Jesoa ny mason’ireto jamba sady nataony hoe:'
  - type: text
    content: –Aoka ho tonga aminareo araka ny finoanareo.
  '3':
  - type: text
    content: 'Tamin’izay ny sasany tamin’ny mpahay lalàna dia nanao anakampo hoe: «Manevateva an’Andriamanitra'
  - type: note
    content: Ampit Lev 24.16.
  - type: text
    content: ' ilay io!» '
  '30':
  - type: text
    content: 'Dia nahiratra ny mason’izy roa lahy, fa i Jesoa namepetra azy mafy hoe:'
  - type: text
    content: –Tandremo sao fantatr’olona izao!
  '31':
  - type: text
    content: Kanjo nony lasa ireo, dia nampiely ny lazan’i Jesoa manerana io faritany io.
  - type: heading
    content: Sitranin’i Jesoa ilay lehilahy moana
  '32':
  - type: text
    content: 'Nony lasa izy roa lahy ireo, dia indro nentin’olona teo amin’i Jesoa ity lehilahy azon’ny '
  - type: text
    content: demony
  - type: text
    content: ' mampahamoana. '
  '33':
  - type: text
    content: 'Rehefa voaroakan’i Jesoa ny demony, dia niteny ilay moana; ary gaga ny vahoaka sady vaky vava hoe:'
  - type: text
    content: –Tsy mbola nisy zava-nitranga toy izao teto amin’i Israely!
  '34':
  - type: text
    content: 'Ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' kosa niteny hoe:'
  - type: text
    content: –Fahefana avy amin’ny filohan’ny demony ange no androahany ny demony e
  - type: note
    content: Ampit Mt 12.24.
  - type: text
    content: '!'
  - type: heading
    content: Mangoraka ny vahoaka i Jesoa
  '35':
  - type: text
    content: 'Ary nitety tanàn-dehibe sy tanàna kely rehetra i Jesoa, ka nampianatra tany amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: 'n-dry zareo sy nanao antso avo ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' ary nanasitrana ny aretina mbamin’ny rofy rehetra. '
  '36':
  - type: text
    content: 'Onena Izy nahita ny vahoaka, satria niferinaina ireo sady nafoy toy ny ondry tsy misy '
  - type: text
    content: mpiandry
  - type: note
    content: Ampit Nom 27.27; 1 Mp 22.17.
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'Dia hoy Izy tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: '–Be ny vokatra, fa ny mpiasa hamory no vitsy. '
  '38':
  - type: text
    content: Koa angataho ny Tompom-bokatra mba haniraka mpiasa hamory ny vokany.
  '4':
  - type: text
    content: 'Fantatr’i Jesoa ny eritreritry ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' ka hoy Izy:'
  - type: text
    content: '–Nahoana ianareo no mieritreri-dratsy ao am-ponareo? '
  '5':
  - type: text
    content: 'Fa inona moa no tsotsotra kokoa, ny milaza hoe: «Voavela ny helokao», sa ny milaza hoe: «Mitsangàna ka mandehana»? '
  '6':
  - type: text
    content: Aoka ho fantatrareo fa ny Zanak’olona eto an-tany dia manam-pahefana hamela heloka!
  - type: text
    content: 'Tamin’izay dia hoy i Jesoa tamin’ilay malemy:'
  - type: text
    content: –Mitsangàna, batao ny fandrianao ka ndeha mody!
  '7':
  - type: text
    content: 'Dia nitsangana ralehilahy ka lasa nody. '
  '8':
  - type: text
    content: Natahotra ny vahoaka nony nahita izany ary nanome voninahitra an’Andriamanitra Izay nanolotra fahefana hamela heloka toy izany tamin’ny olona.
  - type: heading
    content: Antsoin’i Jesoa ho mpianany i Matio
  - type: heading
    content: (Jereo Mk 2.13-17; Lk 5.27-32)
  '9':
  - type: text
    content: 'Raha niala teo i Jesoa, dia nahita lehilahy atao hoe Matio nipetraka teo amin’ny birao famorian-ketra, ka hoy Izy taminy:'
  - type: text
    content: –Avia hiaraka amiko.
  - type: text
    content: 'Dia nitsangana i Matio ka nandeha niaraka taminy. '
