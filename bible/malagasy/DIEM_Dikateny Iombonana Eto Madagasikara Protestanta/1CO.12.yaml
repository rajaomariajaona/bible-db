document_id: 1CO.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo fanomezan’ny Fanahy Masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izaho kosa, ry havako, ny amin’ireo fanomezan’ny Fanahy Masina: Irîko ny hahalalanareo ireo fanomezana ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatrareo fa fony mbola tsy kristianina ianareo, dia voasintona tany amin’ny sampy moa araka izay nitaomana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa ampahafantariko anareo fa tsy misy olona tarihin’ny Fanahin’Andriamanitra ka hiteny hanao hoe: «Voaozona i Jesoa!» Ary tsy misy koa afaka hilaza hoe: «I Jesoa no Tompo», raha tsy tarihin’ny Fanahy Masina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voazarazara ho samy hafa ny fanomezam-pahasoavana, nefa ny Fanahy Masina dia iray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voazarazara ho samy hafa ny fanompoana, nefa ny Tompo dia iray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voazarazara ho samy hafa ny asa, nefa Andriamanitra dia iray ihany, loharano ipoiran’ny asa rehetra ao amin’ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Samy omena fanomezana maneho ny Fanahy Masina ny olona tsirairay ho fanasoavana ny daholobe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny anankiray dia omen’ny Fanahy teny feno fahendrena; ary ny anankiray omen’izany Fanahy izany teny feno fahalalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny anankiray omen’izany Fanahy izany finoana; ary ny anankiray omen’izany Fanahy izany fanomezam-pahasoavana hanasitrana marary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny anankiray, hanao asa mahagaga; ny anankiray, hilaza hafatra avy amin’Andriamanitra; ny anankiray, hahay manavaka ny Fanahy Masina sy ny fanahy manodoka; ny anankiray, hiteny amin’ny fiteny samy hafa tsy fantatra; ary ny anankiray, hanazava ny fiteny tsy fantatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izany Fanahy iray izany ihany no loharano ipoiran’ireo fanomezana rehetra ireo, ka mizarazara azy, araka izay sitrapony, amin’ny olona tsirairay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 4-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Rm 12.6-8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Iray ny tena saingy maro ny zavatra ao aminy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, iray ny tena kanefa misy zavatra maro ao aminy: dia toy izany koa i Kristy. Fa ireo zavatra rehetra anisan’ny tena ireo, na maro aza, dia tena iray ihany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 12.4-5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Isika rehetra manko, na Jiosy na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ', na mpanompo na tsy mpanompo, dia iray ny Fanahy Masina nanaovana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' antsika mba ho tena iray ihany isika; ary iray ny Fanahy Masina nampisotroana antsika rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Eny, ny tena dia tsy zavatra karazana iray monja no mamorona azy fa maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha ny tongotra hanao hoe: «Tsy tanana aho ka tsy mba isan’ny tena», dia tsy izay akory no tsy haha isan’ny tena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha ny sofina hanao hoe: «Tsy maso aho, ka tsy mba isan’ny tena», dia tsy izay akory no tsy haha isan’ny tena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha maso ny tena manontolo, ahoana no handrenesany? Ary raha sofina ny tena manontolo, ahoana no hanamboloany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Eny, efa voalahatr’Andriamanitra araka izay nitiavany azy avy eo amin’ny tena ireo zavatra anisan’ny tena ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy ho nisy ny tena, raha karazana iray monja ny zavatra rehetra anisan’ny tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eny, maro ny zavatra anisan’ny tena, kanefa ny tena dia iray ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny maso tsy afaka hilaza amin’ny tanana ila hoe: «Tsy ilaiko ianao!» Ary ny loha tsy afaka hilaza amin’ny tongotra roa hoe: «Tsy ilaiko ianareo!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa vao mainka aza ireo heverina ho osa kokoa amin’ny zavatra anisan’ny tena no ilaina kokoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ireo zavatra anisan’ny tena heverintsika ho kely voninahitra kokoa no omentsika voninahitra kokoa; ary ny tsy misy haja amin’ny zavatra anisan’ny tenantsika no hajaintsika kokoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa ny misy haja amin’ny zavatra anisan’ny tenantsika dia tsy mila izany. Fa tamin’ny nanamboaran’Andriamanitra ny tenantsika, dia izay kely voninahitra kokoa amin’ny zavatra anisan’ny tena no efa nataony homem-boninahitra kokoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'hany ka tsy misy fisaratsarahana eo amin’ny tena, fa mifampiahy avokoa ny zavatra rehetra anisan’ny tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Koa raha mijaly ny zavatra anankiray anisan’ny tena, dia miara-mijaly avokoa ny zavatra rehetra anisan’ny tena; fa raha omem-boninahitra ny zavatra anankiray anisan’ny tena, dia miara-mifaly avokoa ny zavatra rehetra anisan’ny tena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ianareo rehetra no tenan’i Kristy; ianareo tsirairay kosa dia anisan’io tenany io araka ny anjaranareo avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ao amin’ny Fiangonana dia izao no nandaharan’Andriamanitra ny olona: voalohany, ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ; faharoa, ireo mpilaza hafatra avy amin’Andriamanitra; fahatelo, ireo mpampianatra; manaraka izany, ireo mandray fanomezam-pahasoavana hanao asa mahagaga, hanasitrana marary, hanampy olona, hitondra olona ary hiteny fiteny samy hafa tsy fantatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ampit Ef 4.11. –Ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpampianatra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia mpiangona miandraikitra ny fampianarana momba ny finoana.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izy rehetra tsy akory tsy hoe apôstôly avokoa na mpilaza hafatra avy amin’Andriamanitra, na mpampianatra. Izy rehetra tsy akory tsy hoe nandray fanomezam-pahasoavana hanao asa mahagaga avokoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'na hiteny amin’ny fiteny tsy fantatra na hanazava izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Kanefa ireo fanomezam-pahasoavana lehibe indrindra no irio fatratra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitiavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary dia ny lalana faran’izay tsara indrindra no hatoroko anareo izao:'
