document_id: 1CO.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo fanomezan’ny Fanahy Masina
  - type: text
    content: 'Izaho kosa, ry havako, ny amin’ireo fanomezan’ny Fanahy Masina: Irîko ny hahalalanareo ireo fanomezana ireo. '
  '10':
  - type: text
    content: 'Ny anankiray, hanao asa mahagaga; ny anankiray, hilaza hafatra avy amin’Andriamanitra; ny anankiray, hahay manavaka ny Fanahy Masina sy ny fanahy manodoka; ny anankiray, hiteny amin’ny fiteny samy hafa tsy fantatra; ary ny anankiray, hanazava ny fiteny tsy fantatra. '
  '11':
  - type: text
    content: Izany Fanahy iray izany ihany no loharano ipoiran’ireo fanomezana rehetra ireo, ka mizarazara azy, araka izay sitrapony, amin’ny olona tsirairay
  - type: note
    content: 'And 4-11: ampit Rm 12.6-8.'
  - type: text
    content: .
  - type: heading
    content: Iray ny tena saingy maro ny zavatra ao aminy
  '12':
  - type: text
    content: 'Eny, iray ny tena kanefa misy zavatra maro ao aminy: dia toy izany koa i Kristy. Fa ireo zavatra rehetra anisan’ny tena ireo, na maro aza, dia tena iray ihany'
  - type: note
    content: Ampit Rm 12.4-5.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Isika rehetra manko, na Jiosy na '
  - type: text
    content: hafa firenena
  - type: text
    content: ', na mpanompo na tsy mpanompo, dia iray ny Fanahy Masina nanaovana '
  - type: text
    content: batisa
  - type: text
    content: ' antsika mba ho tena iray ihany isika; ary iray ny Fanahy Masina nampisotroana antsika rehetra.'
  '14':
  - type: text
    content: 'Eny, ny tena dia tsy zavatra karazana iray monja no mamorona azy fa maro. '
  '15':
  - type: text
    content: 'Raha ny tongotra hanao hoe: «Tsy tanana aho ka tsy mba isan’ny tena», dia tsy izay akory no tsy haha isan’ny tena azy. '
  '16':
  - type: text
    content: 'Raha ny sofina hanao hoe: «Tsy maso aho, ka tsy mba isan’ny tena», dia tsy izay akory no tsy haha isan’ny tena azy. '
  '17':
  - type: text
    content: 'Raha maso ny tena manontolo, ahoana no handrenesany? Ary raha sofina ny tena manontolo, ahoana no hanamboloany? '
  '18':
  - type: text
    content: 'Eny, efa voalahatr’Andriamanitra araka izay nitiavany azy avy eo amin’ny tena ireo zavatra anisan’ny tena ireo. '
  '19':
  - type: text
    content: 'Tsy ho nisy ny tena, raha karazana iray monja ny zavatra rehetra anisan’ny tena. '
  '2':
  - type: text
    content: 'Fantatrareo fa fony mbola tsy kristianina ianareo, dia voasintona tany amin’ny sampy moa araka izay nitaomana anareo. '
  '20':
  - type: text
    content: Eny, maro ny zavatra anisan’ny tena, kanefa ny tena dia iray ihany.
  '21':
  - type: text
    content: 'Ny maso tsy afaka hilaza amin’ny tanana ila hoe: «Tsy ilaiko ianao!» Ary ny loha tsy afaka hilaza amin’ny tongotra roa hoe: «Tsy ilaiko ianareo!» '
  '22':
  - type: text
    content: 'Fa vao mainka aza ireo heverina ho osa kokoa amin’ny zavatra anisan’ny tena no ilaina kokoa; '
  '23':
  - type: text
    content: 'ireo zavatra anisan’ny tena heverintsika ho kely voninahitra kokoa no omentsika voninahitra kokoa; ary ny tsy misy haja amin’ny zavatra anisan’ny tenantsika no hajaintsika kokoa; '
  '24':
  - type: text
    content: 'fa ny misy haja amin’ny zavatra anisan’ny tenantsika dia tsy mila izany. Fa tamin’ny nanamboaran’Andriamanitra ny tenantsika, dia izay kely voninahitra kokoa amin’ny zavatra anisan’ny tena no efa nataony homem-boninahitra kokoa; '
  '25':
  - type: text
    content: 'hany ka tsy misy fisaratsarahana eo amin’ny tena, fa mifampiahy avokoa ny zavatra rehetra anisan’ny tena. '
  '26':
  - type: text
    content: Koa raha mijaly ny zavatra anankiray anisan’ny tena, dia miara-mijaly avokoa ny zavatra rehetra anisan’ny tena; fa raha omem-boninahitra ny zavatra anankiray anisan’ny tena, dia miara-mifaly avokoa ny zavatra rehetra anisan’ny tena.
  '27':
  - type: text
    content: 'Ianareo rehetra no tenan’i Kristy; ianareo tsirairay kosa dia anisan’io tenany io araka ny anjaranareo avy. '
  '28':
  - type: text
    content: 'Ary ao amin’ny Fiangonana dia izao no nandaharan’Andriamanitra ny olona: voalohany, ireo '
  - type: text
    content: apôstôly
  - type: text
    content: ; faharoa, ireo mpilaza hafatra avy amin’Andriamanitra; fahatelo, ireo mpampianatra; manaraka izany, ireo mandray fanomezam-pahasoavana hanao asa mahagaga, hanasitrana marary, hanampy olona, hitondra olona ary hiteny fiteny samy hafa tsy fantatra
  - type: note
    content: Ampit Ef 4.11. –Ny hoe mpampianatra eto dia mpiangona miandraikitra ny fampianarana momba ny finoana.
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Izy rehetra tsy akory tsy hoe apôstôly avokoa na mpilaza hafatra avy amin’Andriamanitra, na mpampianatra. Izy rehetra tsy akory tsy hoe nandray fanomezam-pahasoavana hanao asa mahagaga avokoa, '
  '3':
  - type: text
    content: 'Koa ampahafantariko anareo fa tsy misy olona tarihin’ny Fanahin’Andriamanitra ka hiteny hanao hoe: «Voaozona i Jesoa!» Ary tsy misy koa afaka hilaza hoe: «I Jesoa no Tompo», raha tsy tarihin’ny Fanahy Masina.'
  '30':
  - type: text
    content: 'na hiteny amin’ny fiteny tsy fantatra na hanazava izany. '
  '31':
  - type: text
    content: Kanefa ireo fanomezam-pahasoavana lehibe indrindra no irio fatratra.
  - type: heading
    content: Ny fitiavana
  - type: text
    content: 'Ary dia ny lalana faran’izay tsara indrindra no hatoroko anareo izao:'
  '4':
  - type: text
    content: 'Voazarazara ho samy hafa ny fanomezam-pahasoavana, nefa ny Fanahy Masina dia iray ihany. '
  '5':
  - type: text
    content: 'Voazarazara ho samy hafa ny fanompoana, nefa ny Tompo dia iray ihany. '
  '6':
  - type: text
    content: 'Voazarazara ho samy hafa ny asa, nefa Andriamanitra dia iray ihany, loharano ipoiran’ny asa rehetra ao amin’ny olona rehetra. '
  '7':
  - type: text
    content: 'Samy omena fanomezana maneho ny Fanahy Masina ny olona tsirairay ho fanasoavana ny daholobe. '
  '8':
  - type: text
    content: 'Ny anankiray dia omen’ny Fanahy teny feno fahendrena; ary ny anankiray omen’izany Fanahy izany teny feno fahalalana. '
  '9':
  - type: text
    content: 'Ny anankiray omen’izany Fanahy izany finoana; ary ny anankiray omen’izany Fanahy izany fanomezam-pahasoavana hanasitrana marary. '
