document_id: ECC.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tokony ho sahy hidi-kizo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Atsipazo eny ambony rano ny mofonao, fa ho hitanao ihany izy indray andro any
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny dikan’izany teny an’ohatra izany dia hoe tokony ho sahy hanao zavatra na dia hanaovana vy very ny aina aza. Izay sahy mitaingina bisikileta ihany no hahay handeha bisikileta...
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Halaviro izay mety hampalahelo sy hampaharary, fa ny fahatanorana sy ny hery dia mihelina samy zava-poana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ampiasao amina sehatr’asa maro ny volanao, fa tsy fantatrao mihitsy izay loza mety hitranga eto ambonin’ny tany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na aiza na aiza toerana ianjeran’ny hazo, dia eo amin’izay nianjerany ihany no ijanonany. Raha mavesatra ny rahona, dia handatsaka orana amin’ny tany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mataho-drivotra na manahy ny oran-ko avy dia tsy mba hamafy na hijinja.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy ny tsy ahafantaranao ny fiforonan’ny aina ao an-kibon’ny vehivavy bevohòka no tsy hahatakaranao ny fomba fiasan’Andriamanitra mpanao izao rehetra izao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany dia afafazo vao maraina ny voanao ary aza mitsahatra miasa mandra-paharivan’ny andro, fa tsy fantatrao izay ho vanona na ny teo aloha na ny tafara na koa samy ho vanona avokoa izy roa tonta.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanto ny fahazavàn’ny andro, ary mahafinaritra ny maso ny fahitana ny masoandro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na dia ela velona aza ny olona, dia tokony hifaly amin’ny taona tsirairay omena azy. Nefa aoka hotsarovany fa ho maro ny andro manjombona, satria izay rehetra ho avy dia zava-poana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Torohevitra ho an’ny tanora
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifalia, ry zatovo, amin’izao fahatanoranao izao; eny, miravoravoa mandritra izany fotoanandro izany. Ataovy izay mahadiavolana ny fonao sy izay mahafinaritra ny masonao. Nefa aoka ho fantatrao fa amin’izany rehetra izany dia hotsarain’Andriamanitra ianao. '
