document_id: JDG.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ady nifanoheran’i Jiftà tamin’ny Efraîmita
  - type: text
    content: Nifamory ny vatan-dehilahin’i Efraîma, dia niampita an’i Jôrdàna ary tonga tao Tsafôna
  - type: note
    content: 'Tsafôna: tanàna gadita eo avaratry ny renirano Jabôka.'
  - type: text
    content: ', ka niteny tamin’i Jiftà hoe:'
  - type: text
    content: –Nahoana no nandeha niady tamin’ny Hamônita ianao, nefa tsy mba niantso anay handeha hiaraka aminao? Hodoranay aman-trano ianao anio.
  '10':
  - type: text
    content: avy eo dia maty izy ka nalevina tao Betlehema.
  '11':
  - type: text
    content: 'I Elôna avy tamin’ny fokon’i Zebolòna no nandimby an’i Ibitsàna ka nitondra ny Israelita nandritra ny folo taona. '
  '12':
  - type: text
    content: Avy eo dia maty izy ka nalevina tao Aialôna, ao amin’ny faritanin’i Zebolòna.
  '13':
  - type: text
    content: I Habdôna, zanakalahin’i Hilela avy tao Pirehatôna
  - type: note
    content: 'Pirehatôna: tanàna eo amin’ny 12 km ao atsimo andrefan’i Sekema.'
  - type: text
    content: ', no nandimby an’i Elôna ka nitondra ny Israelita. '
  '14':
  - type: text
    content: Nanan-janaka efapolo lahy sy zafikely telopolo lahy i Habdôna; ka samy nitaingina boriky
  - type: note
    content: Jereo 5.10 sy nta; jereo 10.4.
  - type: text
    content: ' iray avy ireo. Nitondra ny Israelita nandritra ny valo taona i Habdôna; '
  '15':
  - type: text
    content: avy eo dia maty izy, ka nalevina tao Pirehatôna, any amin’ny faritanin’i Efraîma, eo amin’ilay hoe tendrombohitry ny Hamalekita.
  '2':
  - type: text
    content: 'Fa namaly azy i Jiftà ka nanao hoe:'
  - type: text
    content: '–Nisy disadisa be tamiko sy ny vahoakako ary ny Hamônita. Dia niantso vonjy taminareo aho, nefa tsy nafahanareo teo an-tanan’ireny. '
  '3':
  - type: text
    content: Koa rehefa hitako fa tsy tonga hanafaka ahy ianareo, dia nanao vy very ny aiko aho, ka nandeha nanafika ny Hamônita; ary natolotry ny TOMPO teo an-tanako izy. Koa nahoana ianareo no miakatra àty amiko anio mba hila ady amiko?
  '4':
  - type: text
    content: 'Dia namory ny vatan-dehilahy rehetra tao Gilehada i Jiftà, ka niady tamin’ny Efraîmita; ary nandresy azy ny Gilehadita, satria ireo Efraîmita ireo indrindra no naneso hoe: «Ianareo olon’i Gilehada dia tsy inona akory fa mpitsoaka an-daharana tao aminay Efraîmita ihany; avy tao anivonay Efraîmita ianareo no nankao anivon’ny Manasita.» '
  '5':
  - type: text
    content: 'Ary nobahanan’ny Gilehadita ireo fitàna ny ony Jôrdàna hankany Efraîma. Koa isaky ny misy mpandositra te hiampita, dia nanontaniana hoe:'
  - type: text
    content: –Efraîmita va ianao?
  - type: text
    content: 'Koa raha namaly izy hoe «Tsia», '
  '6':
  - type: text
    content: dia nasaina notononiny ny teny hoe «Shibôleta»; ary satria tsy hainy notononina izany fa ataony hoe «Sibôleta»
  - type: note
    content: Io voambolana midika hoe salohim-bary io dia tsy mitovy fanonona teo amin’ny foko rehetra. Nisy firokiana nampiavaka ny faritra samihafa.
  - type: text
    content: ', dia noraisim-potsiny izy ary novonoina ho faty teo akaikin’ny toerana fitàna ny ony Jôrdàna. Nahatratra andian-tafika 42 ny lehilahy Efraîmita maty tamin’izany fotoana izany.'
  '7':
  - type: text
    content: Koa i Jiftà, ilay Gilehadita, no nitondra ny Israelita nandritra ny folo taona; avy eo dia maty izy ka nalevina tao amin’ny tanàna izay nahabe azy, tany Gilehada.
  - type: heading
    content: I Ibitsàna sy i Elôna ary i Habdôna
  '8':
  - type: text
    content: I Ibitsàna avy any Betlehema
  - type: note
    content: 'Betlehema: jereo Jos 19.15 sy nta.'
  - type: text
    content: ' no nandimby an’i Jiftà ka nitondra ny Israelita. '
  '9':
  - type: text
    content: 'Nanana zanakalahy telopolo sy zanakavavy telopolo izy, ka nampanambady ny zanany vavy tany ivelan’ny fokony sady nampakatra vinantovavy telopolo avy any ivelany koa. Ary nitondra ny Israelita nandritra ny fito taona i Ibitsàna; '
