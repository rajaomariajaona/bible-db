document_id: JDG.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady nifanoheran’i Jiftà tamin’ny Efraîmita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nifamory ny vatan-dehilahin’i Efraîma, dia niampita an’i Jôrdàna ary tonga tao Tsafôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsafôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna gadita eo avaratry ny renirano Jabôka.
    marker-yv: yv-n
  - type: text
    text: ', ka niteny tamin’i Jiftà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no nandeha niady tamin’ny Hamônita ianao, nefa tsy mba niantso anay handeha hiaraka aminao? Hodoranay aman-trano ianao anio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa namaly azy i Jiftà ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nisy disadisa be tamiko sy ny vahoakako ary ny Hamônita. Dia niantso vonjy taminareo aho, nefa tsy nafahanareo teo an-tanan’ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa rehefa hitako fa tsy tonga hanafaka ahy ianareo, dia nanao vy very ny aiko aho, ka nandeha nanafika ny Hamônita; ary natolotry ny TOMPO teo an-tanako izy. Koa nahoana ianareo no miakatra àty amiko anio mba hila ady amiko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia namory ny vatan-dehilahy rehetra tao Gilehada i Jiftà, ka niady tamin’ny Efraîmita; ary nandresy azy ny Gilehadita, satria ireo Efraîmita ireo indrindra no naneso hoe: «Ianareo olon’i Gilehada dia tsy inona akory fa mpitsoaka an-daharana tao aminay Efraîmita ihany; avy tao anivonay Efraîmita ianareo no nankao anivon’ny Manasita.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nobahanan’ny Gilehadita ireo fitàna ny ony Jôrdàna hankany Efraîma. Koa isaky ny misy mpandositra te hiampita, dia nanontaniana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efraîmita va ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Koa raha namaly izy hoe «Tsia», '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia nasaina notononiny ny teny hoe «Shibôleta»; ary satria tsy hainy notononina izany fa ataony hoe «Sibôleta»
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Io voambolana midika hoe salohim-bary io dia tsy mitovy fanonona teo amin’ny foko rehetra. Nisy firokiana nampiavaka ny faritra samihafa.
    marker-yv: yv-n
  - type: text
    text: ', dia noraisim-potsiny izy ary novonoina ho faty teo akaikin’ny toerana fitàna ny ony Jôrdàna. Nahatratra andian-tafika 42 ny lehilahy Efraîmita maty tamin’izany fotoana izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa i Jiftà, ilay Gilehadita, no nitondra ny Israelita nandritra ny folo taona; avy eo dia maty izy ka nalevina tao amin’ny tanàna izay nahabe azy, tany Gilehada.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Ibitsàna sy i Elôna ary i Habdôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I Ibitsàna avy any Betlehema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Betlehema: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 19.15 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' no nandimby an’i Jiftà ka nitondra ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanana zanakalahy telopolo sy zanakavavy telopolo izy, ka nampanambady ny zanany vavy tany ivelan’ny fokony sady nampakatra vinantovavy telopolo avy any ivelany koa. Ary nitondra ny Israelita nandritra ny fito taona i Ibitsàna; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: avy eo dia maty izy ka nalevina tao Betlehema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I Elôna avy tamin’ny fokon’i Zebolòna no nandimby an’i Ibitsàna ka nitondra ny Israelita nandritra ny folo taona. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Avy eo dia maty izy ka nalevina tao Aialôna, ao amin’ny faritanin’i Zebolòna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I Habdôna, zanakalahin’i Hilela avy tao Pirehatôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Pirehatôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo amin’ny 12 km ao atsimo andrefan’i Sekema.
    marker-yv: yv-n
  - type: text
    text: ', no nandimby an’i Elôna ka nitondra ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nanan-janaka efapolo lahy sy zafikely telopolo lahy i Habdôna; ka samy nitaingina boriky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 5.10 sy nta; jereo 10.4.
    marker-yv: yv-n
  - type: text
    text: ' iray avy ireo. Nitondra ny Israelita nandritra ny valo taona i Habdôna; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: avy eo dia maty izy, ka nalevina tao Pirehatôna, any amin’ny faritanin’i Efraîma, eo amin’ilay hoe tendrombohitry ny Hamalekita.
