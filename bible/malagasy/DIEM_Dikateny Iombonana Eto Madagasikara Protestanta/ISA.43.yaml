document_id: ISA.43,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ankehitriny kosa izao no lazain’ny TOMPO
  - type: text
    content: Izay nahary anao, ry firenen’i Jakôba
  - type: text
    content: 'sy namorona anao, ry vahoaka Israely:'
  - type: text
    content: «Aza matahotra ianao, fa efa navotako;
  - type: text
    content: ny anaranao no efa niantsoako anao, ka Ahy ianao.
  '10':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: Ianareo vahoakako no vavolombeloko,
  - type: text
    content: ianareo no mpanompoko izay nofidiko
  - type: text
    content: mba hahafantaranareo sy hitokianareo Ahy
  - type: text
    content: ary hahatakaranareo ny maha Izaho Ahy;
  - type: text
    content: talohako dia tsy nisy Andriamanitra
  - type: text
    content: ary tsy hisy handimby Ahy aoriako.
  '11':
  - type: text
    content: Izaho dia Izaho ihany no TOMPO,
  - type: text
    content: ka tsy misy mpamonjy afa-tsy Izaho.
  '12':
  - type: text
    content: Izaho no nanambara sy nanome ny famonjena
  - type: text
    content: ka nampahafantatra izany rahateo,
  - type: text
    content: fa tsy nisy andriamani-kafa tao aminareo.
  - type: text
    content: Koa ianareo no vavolombeloko,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO;
  - type: text
    content: ary Izaho no Andriamanitra.
  '13':
  - type: text
    content: Eny, hatrizay hatrizay
  - type: text
    content: dia izany no maha Izaho Ahy.
  - type: text
    content: Tsy misy maharombaka izay eo an-tanako,
  - type: text
    content: ary tsy misy mahaova izay ataoko.
  - type: heading
    content: Manomana ny fodian’ny vahoakany ny Tompo
  '14':
  - type: text
    content: Izao no lazain’ny TOMPO mpanavotra anareo,
  - type: text
    content: 'dia ilay Masin’i Israely:'
  - type: text
    content: «Noho ny fitiavako anareo
  - type: text
    content: 'dia haniraka olona hankany '
  - type: text
    content: Babilôna
  - type: text
    content: ' Aho,'
  - type: text
    content: mba hamaha ny hidy rehetra.
  '15':
  - type: text
    content: Izaho no TOMPO, ilay Masinareo,
  - type: text
    content: Mpahary an’i Israely sady mpanjakanareo.»
  - type: heading
    content: Lalam-baovao any an-taniefitra
  '16':
  - type: text
    content: Izao no lazain’ny TOMPO,
  - type: text
    content: ilay nanokatra lalana tany an-dranomasina
  - type: text
    content: sy nitari-dalana teo anivon’ny rano manonja,
  '17':
  - type: text
    content: Ilay nampamoaka ny kalesy sy ny soavaly
  - type: text
    content: ary ny miaramila sy ny andian-tafika mahery,
  - type: text
    content: dia indray lavo ireo ka tsy tafarina intsony,
  - type: text
    content: sempotra ka maty toy ny lahin-jiro milofika;
  - type: text
    content: 'eny, izao no lazain’ny TOMPO ankehitriny:'
  '18':
  - type: text
    content: «Aza tsaroanareo intsony
  - type: text
    content: ny zava-niseho voalohany
  - type: note
    content: Jereo 41.22 sy nta.
  - type: text
    content: ','
  - type: text
    content: aza itodihana intsony ny lasa.
  '19':
  - type: text
    content: Fa hanao zavatra vaovao Aho;
  - type: text
    content: ary ankehitriny efa mipoitra sahady izany,
  - type: text
    content: ka ho hainareo fantarina tokoa.
  - type: text
    content: Eny, hisava lalana any an-taniefitra Aho
  - type: text
    content: sady hampandriaka ony an-tany karakaina.
  '2':
  - type: text
    content: Raha mamakivaky ny rano ianao,
  - type: text
    content: dia homba anao Aho;
  - type: text
    content: raha miampita ny ony ianao,
  - type: text
    content: dia tsy hanafotra anao ireny;
  - type: text
    content: raha mandeha eo anivon’ny afo ianao,
  - type: text
    content: dia tsy ho may akory
  - type: text
    content: fa tsy handoro anao ny lelafo.
  '20':
  - type: text
    content: Dia hanome voninahitra Ahy ny bibidia
  - type: text
    content: mbamin’ny amboahaolo sy ny vorombe,
  - type: text
    content: satria manisy rano any an-taniefitra Aho
  - type: text
    content: sy nampandriaka ony an-tany karakaina
  - type: text
    content: mba hampisotroako ny vahoaka nofidiko,
  '21':
  - type: text
    content: dia ilay vahoaka noforoniko ho Ahy
  - type: text
    content: ka hitantara ny antony hiderany Ahy.»
  - type: heading
    content: Fifandaharan’ny Tompo sy i Israely
  '22':
  - type: text
    content: 'Dia izao koa no lazain’ny Tompo:'
  - type: text
    content: «Tsy Izaho no nantsoinao, ry firenen’i Jakôba,
  - type: text
    content: ary efa sasatra tamiko aza ianao, ry vahoaka Israely.
  '23':
  - type: text
    content: Tsy ho Ahy no nitondranao zanak’ondry
  - type: text
    content: hatao sorona dorana manontolo,
  - type: text
    content: ary tsy ho fanomezam-boninahitra Ahy ny soronao.
  - type: text
    content: Tsy nampanompo anao tamin’ny fitakiana fanatitra Aho
  - type: text
    content: 'na nanasatra anao tamin’ny fitakiana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: .
  '24':
  - type: text
    content: Tsy ho Ahy no namoizanao volafotsy
  - type: text
    content: mba hividianana veromanitra;
  - type: text
    content: ary tsy Izaho no novokisanao
  - type: text
    content: tamin’ny jaboran’ny soronao.
  - type: text
    content: Fa ianao no nampanompo Ahy tamin’ny fahotanao
  - type: text
    content: sy nanasatra Ahy tamin’ny helokao.
  '25':
  - type: text
    content: Kanefa Izaho dia Izaho mihitsy
  - type: text
    content: no mamela ny fahadisoanao
  - type: text
    content: noho ny amin’ny tenako ihany,
  - type: text
    content: ka tsy hotsarovako intsony ny fahotanao.
  '26':
  - type: text
    content: Ampahatsiarovy Ahy hoe ny fanakiananao Ahy,
  - type: text
    content: dia avia hifandahatra momba izany isika;
  - type: text
    content: ka ianao no aoka hanao famisavisana
  - type: text
    content: mba hahitana ny mahamarina anao!
  '27':
  - type: text
    content: Ilay razanao voalohany efa nanota,
  - type: text
    content: ary ireo mpitondrateninao efa nikomy tamiko
  - type: note
    content: 'Ilay razanao voalohany: i Jakôba no lazaina amin’izany; jereo Gen 25.26; 27.36; Hôs 12.4. –ireo mpitondrateninao: ny mpisorona ratsy sy ny mpaminany sandoka kosa no ambara amin’izany.'
  - type: text
    content: .
  '28':
  - type: text
    content: Koa dia nataoko afa-baràka
  - type: text
    content: ireo mpiandraikitra ny Toeramasina,
  - type: text
    content: natolotro haringana ny firenen’i Jakôba
  - type: text
    content: ary navelako holatsaina ny vahoaka Israely.
  '3':
  - type: text
    content: Satria Izaho no TOMPO Andriamanitrao,
  - type: text
    content: ilay Masin’i Israely mpamonjy anao.
  - type: text
    content: Nomeko hanavotana anao i Ejipta;
  - type: text
    content: ary nataoko solonao i Etiôpia sy i Sebà.
  '4':
  - type: text
    content: Satria sarobidy eo imasoko ianao,
  - type: text
    content: manan-danja amiko sady tiako.
  - type: text
    content: Koa nanome olona ho solonao Aho
  - type: text
    content: sy firenena maro ho takalon’ny ainao.
  '5':
  - type: text
    content: Aza matahotra fa momba anao Aho.
  - type: text
    content: Avy any atsinanana no hamerenako ny taranakao,
  - type: text
    content: avy any andrefana no hanangonako ireo olonao.
  '6':
  - type: text
    content: 'Hoy Aho amin’ny avaratra: ‹Omeo Ahy ireo›,'
  - type: text
    content: 'ary amin’ny atsimo: ‹Aza hazonina izy!›'
  - type: text
    content: Avereno amiko ny zanako lahy avy any lavitra
  - type: text
    content: sy ny zanako vavy avy any am-paran’ny tany,
  '7':
  - type: text
    content: dia izay rehetra mitondra ny anarako
  - type: text
    content: sady noarîko sy novolavolaiko
  - type: text
    content: mba hanome voninahitra Ahy.
  - type: heading
    content: Ianareo no vavolombeloko
  '8':
  - type: text
    content: Avoahy ny olona mana-maso nefa jamba,
  - type: text
    content: ary manan-tsofina nefa marenina.
  '9':
  - type: text
    content: Aoka hiangona ny firenena rehetra
  - type: text
    content: ary hivory ny olombelona!
  - type: text
    content: Iza amin’ireo andriamanitrareo
  - type: text
    content: no mahalaza aminay ny zava-nitranga?
  - type: text
    content: Aoka izy hanambara aminay
  - type: text
    content: ny zava-niseho voalohany
  - type: note
    content: Jereo 41.22 sy nta.
  - type: text
    content: .
  - type: text
    content: Aoka hasehony ny vavolombelony
  - type: text
    content: mba haneho ny fahamarinany;
  - type: text
    content: ary aoka ny vavolombelony hihaino azy
  - type: text
    content: 'ka hanamafy hoe: «Marina izany!»'
