document_id: ISA.43,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ankehitriny kosa izao no lazain’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nahary anao, ry firenen’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy namorona anao, ry vahoaka Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aza matahotra ianao, fa efa navotako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny anaranao no efa niantsoako anao, ka Ahy ianao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo vahoakako no vavolombeloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo no mpanompoko izay nofidiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahafantaranareo sy hitokianareo Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahatakaranareo ny maha Izaho Ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: talohako dia tsy nisy Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy handimby Ahy aoriako.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izaho dia Izaho ihany no TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy mpamonjy afa-tsy Izaho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izaho no nanambara sy nanome ny famonjena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampahafantatra izany rahateo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy nisy andriamani-kafa tao aminareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ianareo no vavolombeloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitra avy amiko TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho no Andriamanitra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eny, hatrizay hatrizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izany no maha Izaho Ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy maharombaka izay eo an-tanako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy mahaova izay ataoko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomana ny fodian’ny vahoakany ny Tompo
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izao no lazain’ny TOMPO mpanavotra anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ilay Masin’i Israely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Noho ny fitiavako anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia haniraka olona hankany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: text
      text: ' Aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamaha ny hidy rehetra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izaho no TOMPO, ilay Masinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpahary an’i Israely sady mpanjakanareo.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalam-baovao any an-taniefitra
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izao no lazain’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay nanokatra lalana tany an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nitari-dalana teo anivon’ny rano manonja,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ilay nampamoaka ny kalesy sy ny soavaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny miaramila sy ny andian-tafika mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia indray lavo ireo ka tsy tafarina intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sempotra ka maty toy ny lahin-jiro milofika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'eny, izao no lazain’ny TOMPO ankehitriny:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: «Aza tsaroanareo intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zava-niseho voalohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 41.22 sy nta.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza itodihana intsony ny lasa.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa hanao zavatra vaovao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ankehitriny efa mipoitra sahady izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho hainareo fantarina tokoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hisava lalana any an-taniefitra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hampandriaka ony an-tany karakaina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raha mamakivaky ny rano ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia homba anao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha miampita ny ony ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hanafotra anao ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mandeha eo anivon’ny afo ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho may akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy handoro anao ny lelafo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia hanome voninahitra Ahy ny bibidia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny amboahaolo sy ny vorombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria manisy rano any an-taniefitra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nampandriaka ony an-tany karakaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampisotroako ny vahoaka nofidiko,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: dia ilay vahoaka noforoniko ho Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitantara ny antony hiderany Ahy.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fifandaharan’ny Tompo sy i Israely
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia izao koa no lazain’ny Tompo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy Izaho no nantsoinao, ry firenen’i Jakôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa sasatra tamiko aza ianao, ry vahoaka Israely.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tsy ho Ahy no nitondranao zanak’ondry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatao sorona dorana manontolo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho fanomezam-boninahitra Ahy ny soronao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nampanompo anao tamin’ny fitakiana fanatitra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na nanasatra anao tamin’ny fitakiana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tsy ho Ahy no namoizanao volafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hividianana veromanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy Izaho no novokisanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny jaboran’ny soronao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianao no nampanompo Ahy tamin’ny fahotanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanasatra Ahy tamin’ny helokao.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Kanefa Izaho dia Izaho mihitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mamela ny fahadisoanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny amin’ny tenako ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hotsarovako intsony ny fahotanao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ampahatsiarovy Ahy hoe ny fanakiananao Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia avia hifandahatra momba izany isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ianao no aoka hanao famisavisana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahitana ny mahamarina anao!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ilay razanao voalohany efa nanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ireo mpitondrateninao efa nikomy tamiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ilay razanao voalohany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i Jakôba no lazaina amin’izany; jereo Gen 25.26; 27.36; Hôs 12.4. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ireo mpitondrateninao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny mpisorona ratsy sy ny mpaminany sandoka kosa no ambara amin’izany.
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Koa dia nataoko afa-baràka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo mpiandraikitra ny Toeramasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natolotro haringana ny firenen’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary navelako holatsaina ny vahoaka Israely.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Satria Izaho no TOMPO Andriamanitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Masin’i Israely mpamonjy anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nomeko hanavotana anao i Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nataoko solonao i Etiôpia sy i Sebà.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Satria sarobidy eo imasoko ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manan-danja amiko sady tiako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nanome olona ho solonao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy firenena maro ho takalon’ny ainao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aza matahotra fa momba anao Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any atsinanana no hamerenako ny taranakao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any andrefana no hanangonako ireo olonao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hoy Aho amin’ny avaratra: ‹Omeo Ahy ireo›,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary amin’ny atsimo: ‹Aza hazonina izy!›'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avereno amiko ny zanako lahy avy any lavitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zanako vavy avy any am-paran’ny tany,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: dia izay rehetra mitondra ny anarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady noarîko sy novolavolaiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanome voninahitra Ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ianareo no vavolombeloko
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Avoahy ny olona mana-maso nefa jamba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manan-tsofina nefa marenina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aoka hiangona ny firenena rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hivory ny olombelona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza amin’ireo andriamanitrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mahalaza aminay ny zava-nitranga?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hanambara aminay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zava-niseho voalohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 41.22 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hasehony ny vavolombelony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba haneho ny fahamarinany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny vavolombelony hihaino azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hanamafy hoe: «Marina izany!»'
