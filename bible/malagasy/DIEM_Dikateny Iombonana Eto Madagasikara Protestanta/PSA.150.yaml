verses:
  '1':
  - type: heading
    content: SALAMO Derao ny Tompo
  - type: text
    content: ' '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  - type: text
    content: 'Miderà an’Andriamanitra eo amin’ny '
  - type: text
    content: Toeramasiny
  - type: text
    content: ','
  - type: text
    content: Miderà Azy eo amin’ny habakabaka isehoan’ny fahefàny.
  '2':
  - type: text
    content: Miderà Azy noho ny asany mahery,
  - type: text
    content: Miderà Azy noho ny halehibeny tapitra ohatra.
  '3':
  - type: text
    content: Miderà Azy amin’ny fitsofana anjomara
  - type: note
    content: 'fitsofana anjomara: jereo Sal 81.4.'
  - type: text
    content: ','
  - type: text
    content: Miderà Azy amim-baliha sy lokanga.
  '4':
  - type: text
    content: Miderà Azy amin’amponga sy dihy,
  - type: text
    content: Miderà Azy amin’ny jejilava sy sodina.
  '5':
  - type: text
    content: Miderà Azy amin’ny kipantsona madinika,
  - type: text
    content: Miderà Azy amin’ny kipantsona vaventy.
  '6':
  - type: text
    content: Aoka ny mananaina rehetra
  - type: text
    content: samy hidera ny TOMPO!
  - type: text
    content: Haleloià!
