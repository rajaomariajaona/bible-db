document_id: ROM.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famangiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Anafatrafarako anareo fa i Feba havantsika, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diakôni
  - type: text
    text: n’ny Fiangonana any Senkrea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Senkrea: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 18.18 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Noho ianareo tafaray amin’ny Tompo, dia raiso tsara izy araka izay mendrika ny samy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ', ary ampio amin’izay raharaha ilàny anareo; fa izy rahateo dia mpiahy ny maro mbamin’ny tenako manokana aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Veloma any amin-dry i Prisila sy i Akoilà, mpiara-miasa tamiko teo amin’ny fanompoana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny anaran’ireo kristianina ataon’i Paoly veloma dia mampiharihary fa maro fiaviana (grika, rômanina, jiosy) sady samihafa saranga (manampahefana, mpanompo na mpanompo afaka) izy ireo. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ry i Prisila sy i Akoilà:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Asa 18.2.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanao vy very ny ainy hamonjena ahy izy mivady, ary tsy izaho ihany no misaotra azy roa fa ny Fiangonana rehetra any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Veloma any amin’ny Fiangonana mivory ao an-tranony. Veloma any amin’i Epeneto malalako, izay kristianina voalohany tany Azia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Veloma any amin’i Maria izay nisahirana fatratra ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Veloma any amin-dry i Andrônìka sy i Jonià havako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jonià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jolia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 16.15). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'havako:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny teny grika ampiasaina eto dia malalaka tokoa ary azo ampiharina amin’ny iray fianakaviana, iray foibe iasana, iray foko sy iray firenena (jereo 9.3; 16.11, 21).'
    marker-yv: yv-n
  - type: text
    text: ' niara-nigadra tamiko, izay sady tsara laza eo amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' no tonga kristianina talohako aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Veloma any amin’i Ampliato malalako, izay tafaray amin’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Veloma any amin’i Orbano, mpiara-miasa taminay teo amin’ny fanompoana an’i Kristy, ary koa any amin’i Staky malalako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Veloma any amin’i Apelà, mpiasa azo antoka amin’ny fanompoana an’i Kristy. Veloma any amin’ny ankohonan’i Aristôbola. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Veloma any amin’i Herôdiôna havako. Veloma any amin’ireo tafaray amin’ny Tompo ao amin’ny ankohonan’i Narsisy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Veloma any amin-dry i Trifèna sy i Trifôsa izay misahirana ho an’ny Tompo. Veloma any amin’i Persida malala izay nisahirana fatratra ho an’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Veloma any amin’i Rofosy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Rofosy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mk 15.21.
    marker-yv: yv-n
  - type: text
    text: ', izay namiratra tokoa tamin’ny fanompoana ny Tompo, ary any amin’ny reniny izay reny ho ahy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Veloma any amin’i Asinkrito, i Flegôna, i Hermesy, i Patrôba, i Hermà, mbamin’ny havana mpino miaraka amin’izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Veloma any amin’i Filôlôgo sy i Jolia, i Nerea sy ny anabaviny, ary i Ôlimpà, mbamin’izay rehetra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' miaraka amin’izy ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mifanaova veloma amin’ny fanoroham-pihavanana. Manao veloma anareo avokoa ny Fiangonan’i Kristy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatra farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Manainga anareo aho, ry havana, hitandrin-tena amin’ireo mahatonga fisarahana sy mitaona amin’ny ratsy ka manohitra ny fampianarana noraisinareo; halaviro ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Satria tsy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika no tompoin’ny toy ireny, fa izay danin’ny kibony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Fil 3.19.
    marker-yv: yv-n
  - type: text
    text: ', ary teny malefaka sy tsara lahatra no amitahany an’ireo tso-po. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Efa malaza amin’ny olona rehetra manko fa manaiky an’i Kristy ianareo; ary faly aminareo aho, ka ny irîko ho toetranareo dia izao: ho kinga raha ny amin’ny tsara ary tsy hiray petsapetsa amin’ny ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ilay Andriamanitra loharanon’ny fiadanana kosa hanorotoro faingana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' eo ambany tongotrareo!'
- type: usfm
  marker: p
  children:
  - type: text
    text: Homba anareo anie ny fahasoavan’i Jesoa Tompontsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany tsy ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Momba anareo... Tompontsika.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Manao veloma anareo i Timôty mpiara-miasa amiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 16.1-3.
    marker-yv: yv-n
  - type: text
    text: ; manao veloma anareo i Losio sy i Jasôna ary i Sôsipatera izay samy havako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Noho isika tafaray amin’ny Tompo, izaho Tersy izay nanao an-tsoratra ity taratasy ity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tersy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: no mpitantsoratra kristianina nasain’i Paoly nanoratra ity taratasy ity.
    marker-yv: yv-n
  - type: text
    text: ' dia manao veloma anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Manao veloma anareo i Gaio, ilay mampiantrano ahy sady ivorian’ny Fiangonana manontolo. Manao veloma anareo i Erasta mpitahiry ny volam-panjakana eto an-tanàna; ary manao veloma anareo i Koarta havantsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gaio: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 19.29; 1Kôr 1.14. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ahy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mpisolo anarana manondro an’i Paoly fa tsy i Tersy. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Erasta:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 2 Tim 4.20.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: '[ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Homba anareo rehetra anie ny fahasoavan’i Jesoa Kristy Tompontsika! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: .]
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiderana an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ho an’Andriamanitra anie ny voninahitra! Fa Izy no mahay mampahery anareo araka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' ambarako, araka ny hafatra torîko momba an’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', araka ny fanehoana tamiko ny tsiambaratelo takona hatrizay tao amin’Izy Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ankehitriny kosa, izany tsiambaratelo izany dia naharihary tamin’ny alalan’ny soratr’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ', araka ny didin’ilay Andriamanitra mandrakizay, ary nampahafantarina ny firenen-drehetra mba hitarihana azy ireo hino sy hanaiky an’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eny, ho an’Andriamanitra hany manam-pahendrena anie ny voninahitra, amin’ny alalan’i Jesoa Kristy, mandrakizay mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny and 25-27: eto ihany no ahitana azy ao amin’ireo stf tranainy maro; kanefa misy stf sasany ahitana azy amin’ny toerana roa, dia eto sy aorian’ny 14.23; misy stf anankiray ahitana azy aorian’ny 15.33; ary misy stf vitsivitsy tena tsy ahitana azy mihitsy.'
    marker-yv: yv-n
  - type: text
    text: .
