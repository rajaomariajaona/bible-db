document_id: ROM.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Famangiana
  - type: text
    content: 'Anafatrafarako anareo fa i Feba havantsika, '
  - type: text
    content: diakôni
  - type: text
    content: n’ny Fiangonana any Senkrea
  - type: note
    content: 'Senkrea: jereo Asa 18.18 sy nta.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Veloma any amin’i Apelà, mpiasa azo antoka amin’ny fanompoana an’i Kristy. Veloma any amin’ny ankohonan’i Aristôbola. '
  '11':
  - type: text
    content: 'Veloma any amin’i Herôdiôna havako. Veloma any amin’ireo tafaray amin’ny Tompo ao amin’ny ankohonan’i Narsisy. '
  '12':
  - type: text
    content: 'Veloma any amin-dry i Trifèna sy i Trifôsa izay misahirana ho an’ny Tompo. Veloma any amin’i Persida malala izay nisahirana fatratra ho an’ny Tompo. '
  '13':
  - type: text
    content: Veloma any amin’i Rofosy
  - type: note
    content: 'Rofosy: jereo Mk 15.21.'
  - type: text
    content: ', izay namiratra tokoa tamin’ny fanompoana ny Tompo, ary any amin’ny reniny izay reny ho ahy koa. '
  '14':
  - type: text
    content: 'Veloma any amin’i Asinkrito, i Flegôna, i Hermesy, i Patrôba, i Hermà, mbamin’ny havana mpino miaraka amin’izy ireo. '
  '15':
  - type: text
    content: 'Veloma any amin’i Filôlôgo sy i Jolia, i Nerea sy ny anabaviny, ary i Ôlimpà, mbamin’izay rehetra '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' miaraka amin’izy ireo.'
  '16':
  - type: text
    content: Mifanaova veloma amin’ny fanoroham-pihavanana. Manao veloma anareo avokoa ny Fiangonan’i Kristy.
  - type: heading
    content: Anatra farany
  '17':
  - type: text
    content: 'Manainga anareo aho, ry havana, hitandrin-tena amin’ireo mahatonga fisarahana sy mitaona amin’ny ratsy ka manohitra ny fampianarana noraisinareo; halaviro ireny. '
  '18':
  - type: text
    content: 'Satria tsy i '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika no tompoin’ny toy ireny, fa izay danin’ny kibony'
  - type: note
    content: Ampit Fil 3.19.
  - type: text
    content: ', ary teny malefaka sy tsara lahatra no amitahany an’ireo tso-po. '
  '19':
  - type: text
    content: 'Efa malaza amin’ny olona rehetra manko fa manaiky an’i Kristy ianareo; ary faly aminareo aho, ka ny irîko ho toetranareo dia izao: ho kinga raha ny amin’ny tsara ary tsy hiray petsapetsa amin’ny ratsy. '
  '2':
  - type: text
    content: 'Noho ianareo tafaray amin’ny Tompo, dia raiso tsara izy araka izay mendrika ny samy '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ', ary ampio amin’izay raharaha ilàny anareo; fa izy rahateo dia mpiahy ny maro mbamin’ny tenako manokana aza.'
  '20':
  - type: text
    content: 'Ilay Andriamanitra loharanon’ny fiadanana kosa hanorotoro faingana an’i '
  - type: text
    content: Satàna
  - type: text
    content: ' eo ambany tongotrareo!'
  - type: text
    content: Homba anareo anie ny fahasoavan’i Jesoa Tompontsika
  - type: note
    content: Misy stf sasany tsy ahitana ny hoe Momba anareo... Tompontsika.
  - type: text
    content: '!'
  '21':
  - type: text
    content: Manao veloma anareo i Timôty mpiara-miasa amiko
  - type: note
    content: Jereo Asa 16.1-3.
  - type: text
    content: ; manao veloma anareo i Losio sy i Jasôna ary i Sôsipatera izay samy havako.
  '22':
  - type: text
    content: Noho isika tafaray amin’ny Tompo, izaho Tersy izay nanao an-tsoratra ity taratasy ity
  - type: note
    content: I Tersy no mpitantsoratra kristianina nasain’i Paoly nanoratra ity taratasy ity.
  - type: text
    content: ' dia manao veloma anareo.'
  '23':
  - type: text
    content: Manao veloma anareo i Gaio, ilay mampiantrano ahy sady ivorian’ny Fiangonana manontolo. Manao veloma anareo i Erasta mpitahiry ny volam-panjakana eto an-tanàna; ary manao veloma anareo i Koarta havantsika
  - type: note
    content: 'Gaio: jereo Asa 19.29; 1Kôr 1.14. –ahy: mpisolo anarana manondro an’i Paoly fa tsy i Tersy. –Erasta: jereo 2 Tim 4.20.'
  - type: text
    content: .
  - type: text
    content: '[ '
  '24':
  - type: text
    content: 'Homba anareo rehetra anie ny fahasoavan’i Jesoa Kristy Tompontsika! '
  - type: text
    content: Amen
  - type: text
    content: .]
  - type: heading
    content: Fiderana an’Andriamanitra
  '25':
  - type: text
    content: 'Ho an’Andriamanitra anie ny voninahitra! Fa Izy no mahay mampahery anareo araka ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' ambarako, araka ny hafatra torîko momba an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ', araka ny fanehoana tamiko ny tsiambaratelo takona hatrizay tao amin’Izy Andriamanitra. '
  '26':
  - type: text
    content: 'Ankehitriny kosa, izany tsiambaratelo izany dia naharihary tamin’ny alalan’ny soratr’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ', araka ny didin’ilay Andriamanitra mandrakizay, ary nampahafantarina ny firenen-drehetra mba hitarihana azy ireo hino sy hanaiky an’i Kristy. '
  '27':
  - type: text
    content: 'Eny, ho an’Andriamanitra hany manam-pahendrena anie ny voninahitra, amin’ny alalan’i Jesoa Kristy, mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: note
    content: 'Momba ny and 25-27: eto ihany no ahitana azy ao amin’ireo stf tranainy maro; kanefa misy stf sasany ahitana azy amin’ny toerana roa, dia eto sy aorian’ny 14.23; misy stf anankiray ahitana azy aorian’ny 15.33; ary misy stf vitsivitsy tena tsy ahitana azy mihitsy.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Veloma any amin-dry i Prisila sy i Akoilà, mpiara-miasa tamiko teo amin’ny fanompoana an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa'
  - type: note
    content: 'Ny anaran’ireo kristianina ataon’i Paoly veloma dia mampiharihary fa maro fiaviana (grika, rômanina, jiosy) sady samihafa saranga (manampahefana, mpanompo na mpanompo afaka) izy ireo. –ry i Prisila sy i Akoilà: jereo Asa 18.2.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Nanao vy very ny ainy hamonjena ahy izy mivady, ary tsy izaho ihany no misaotra azy roa fa ny Fiangonana rehetra any amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' koa. '
  '5':
  - type: text
    content: 'Veloma any amin’ny Fiangonana mivory ao an-tranony. Veloma any amin’i Epeneto malalako, izay kristianina voalohany tany Azia. '
  '6':
  - type: text
    content: 'Veloma any amin’i Maria izay nisahirana fatratra ho anareo. '
  '7':
  - type: text
    content: Veloma any amin-dry i Andrônìka sy i Jonià havako
  - type: note
    content: 'Jonià: misy stf sasany ahitana hoe Jolia (jereo 16.15). –havako: ny teny grika ampiasaina eto dia malalaka tokoa ary azo ampiharina amin’ny iray fianakaviana, iray foibe iasana, iray foko sy iray firenena (jereo 9.3; 16.11, 21).'
  - type: text
    content: ' niara-nigadra tamiko, izay sady tsara laza eo amin’ireo '
  - type: text
    content: apôstôly
  - type: text
    content: ' no tonga kristianina talohako aza.'
  '8':
  - type: text
    content: 'Veloma any amin’i Ampliato malalako, izay tafaray amin’ny Tompo. '
  '9':
  - type: text
    content: 'Veloma any amin’i Orbano, mpiara-miasa taminay teo amin’ny fanompoana an’i Kristy, ary koa any amin’i Staky malalako. '
