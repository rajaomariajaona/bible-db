document_id: ECC.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: KOHELETA
  - type: heading
    content: Zava-poana izao rehetra izao
  - type: text
    content: Izao no tenin’i Kôheleta, zanakalahin’i Davida sady mpanjaka tao Jerosalema
  - type: note
    content: Ny hoe Kôheleta dia fanagasiana ny teny hebreo izay mbola mampisalasala ny heviny. Ny dikanteny grikan’ny T.T dia nanao azy hoe Mpandahateny na Mpikabary amin’ny fivoriam-bahoaka. Ny bokin’i Kôheleta dia napetraka eo ambany fahefàn’ilay zanakalahin’i Davida, izany hoe i Salômôna, izay nalaza tamin’ny fahendreny, jereo 1 Mp 5.9-14.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Raha misy zavatra lazaina hoe: «Jereo fa zava-baovao ity!», dia izay efa nisy ela talohantsika ihany izany. '
  '11':
  - type: text
    content: Fa nohadinointsika kosa ireo razantsika fahagola. Ary ireo olona handimby antsika koa dia tsy hotsarovan’izay handimby azy.
  - type: heading
    content: Ny traikefan’ny Olon-kendry
  '12':
  - type: text
    content: 'Izaho Kôheleta dia nanjaka teo amin’ny vahoakan’i Israely tao Jerosalema. '
  '13':
  - type: text
    content: 'Tsy niroa fo tokoa aho nikaroka sy namantatra amim-pahendrena ny zava-drehetra atao etỳ ambonin’ny tany. Asa mafy ampanaovin’Andriamanitra ny olona izany. '
  '14':
  - type: text
    content: 'Efa hitako ny zava-drehetra atao etỳ ambonin’ny tany, fa zava-poana sy manenji-drivotra ihany izany rehetra izany. '
  '15':
  - type: text
    content: Satria izay mibiloka dia tsy azo ahitsy intsony; ary ny tsy misy tsy azo isaina.
  '16':
  - type: text
    content: 'Hoy aho anakampoko: «Indro aho fa nahangom-pahendrena mihoatra noho ireo mpanjaka rehetra nodimbiasako teto Jerosalema.» Ary nanankarem-pahendrena amam-pahalalana momba ny fiainana aho. '
  '17':
  - type: text
    content: 'Tsy niroa fo aho hahay manavaka ny fahendrena sy ny hadalana, ary koa manavaka ny fahalalana sy ny fahaverezan-tsaina. Tsapako fa ny manenji-drivotra ihany koa izany. '
  '18':
  - type: text
    content: Fa arakaraka ny mahabe fahendrena no mahabe fahasahiranana; ary izay mitombo fahalalana, dia mitombo fahoriana.
  '2':
  - type: text
    content: 'Hoy i Kôheleta hoe: «Zava-poana dia zava-poana izao rehetra izao, eny, zava-poana ny zava-drehetra.» '
  '3':
  - type: text
    content: 'Miasa mafy ny olona etỳ ambonin’ny tany, nefa tsy misy voka-tsoa azony amin’izany. '
  '4':
  - type: text
    content: 'Lasa ny taranaka iray, dia tonga ny iray hafa mandimby azy; nefa izao tontolo izao mbola maharitra hatrany. '
  '5':
  - type: text
    content: 'Miposaka ny masoandro, milentika ny masoandro, ary maika erỳ hiverina any amin’izay niaingany. '
  '6':
  - type: text
    content: 'Mbetika ny rivotra mitsoka mianatsimo, mbetika mitsoka mianavaratra. Mitsoka ny rivotra dia mitambolina ary mamerina ny fihodinany indray. '
  '7':
  - type: text
    content: 'Mivarina any an-dranomasina ny ony rehetra, nefa tsy mety feno ny ranomasina, na dia tsy an-kiato aza no ivarinan’ny ony amin’izany toerana izany. '
  '8':
  - type: text
    content: 'Tsy misy mihitsy afaka hilaza hoe hatraiza izany fitamberimberenan’ny zava-drehetra izany: fa ny maso tsy mba monai-mijery ary ny sofina tsy mba leon’ny mihaino. '
  '9':
  - type: text
    content: 'Izay efa teo ihany no mbola ho tonga indray, ary izay efa natao ihany no mbola hatao indray. Fa tsy misy zava-baovao akory izay rehetra mitranga etỳ ambonin’ny tany. '
