document_id: ECC.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: KOHELETA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zava-poana izao rehetra izao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izao no tenin’i Kôheleta, zanakalahin’i Davida sady mpanjaka tao Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kôheleta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia fanagasiana ny teny hebreo izay mbola mampisalasala ny heviny. Ny dikanteny grikan’ny T.T dia nanao azy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Mpandahateny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na Mpikabary amin’ny fivoriam-bahoaka. Ny bokin’i Kôheleta dia napetraka eo ambany fahefàn’ilay '
      - type: usfm
        marker: it
        children:
        - type: text
          text: zanakalahin’i Davida
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', izany hoe i Salômôna, izay nalaza tamin’ny fahendreny, jereo 1 Mp 5.9-14.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy zavatra lazaina hoe: «Jereo fa zava-baovao ity!», dia izay efa nisy ela talohantsika ihany izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa nohadinointsika kosa ireo razantsika fahagola. Ary ireo olona handimby antsika koa dia tsy hotsarovan’izay handimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny traikefan’ny Olon-kendry
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho Kôheleta dia nanjaka teo amin’ny vahoakan’i Israely tao Jerosalema. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy niroa fo tokoa aho nikaroka sy namantatra amim-pahendrena ny zava-drehetra atao etỳ ambonin’ny tany. Asa mafy ampanaovin’Andriamanitra ny olona izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa hitako ny zava-drehetra atao etỳ ambonin’ny tany, fa zava-poana sy manenji-drivotra ihany izany rehetra izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Satria izay mibiloka dia tsy azo ahitsy intsony; ary ny tsy misy tsy azo isaina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy aho anakampoko: «Indro aho fa nahangom-pahendrena mihoatra noho ireo mpanjaka rehetra nodimbiasako teto Jerosalema.» Ary nanankarem-pahendrena amam-pahalalana momba ny fiainana aho. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy niroa fo aho hahay manavaka ny fahendrena sy ny hadalana, ary koa manavaka ny fahalalana sy ny fahaverezan-tsaina. Tsapako fa ny manenji-drivotra ihany koa izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa arakaraka ny mahabe fahendrena no mahabe fahasahiranana; ary izay mitombo fahalalana, dia mitombo fahoriana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Kôheleta hoe: «Zava-poana dia zava-poana izao rehetra izao, eny, zava-poana ny zava-drehetra.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miasa mafy ny olona etỳ ambonin’ny tany, nefa tsy misy voka-tsoa azony amin’izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lasa ny taranaka iray, dia tonga ny iray hafa mandimby azy; nefa izao tontolo izao mbola maharitra hatrany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miposaka ny masoandro, milentika ny masoandro, ary maika erỳ hiverina any amin’izay niaingany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbetika ny rivotra mitsoka mianatsimo, mbetika mitsoka mianavaratra. Mitsoka ny rivotra dia mitambolina ary mamerina ny fihodinany indray. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mivarina any an-dranomasina ny ony rehetra, nefa tsy mety feno ny ranomasina, na dia tsy an-kiato aza no ivarinan’ny ony amin’izany toerana izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy misy mihitsy afaka hilaza hoe hatraiza izany fitamberimberenan’ny zava-drehetra izany: fa ny maso tsy mba monai-mijery ary ny sofina tsy mba leon’ny mihaino. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay efa teo ihany no mbola ho tonga indray, ary izay efa natao ihany no mbola hatao indray. Fa tsy misy zava-baovao akory izay rehetra mitranga etỳ ambonin’ny tany. '
