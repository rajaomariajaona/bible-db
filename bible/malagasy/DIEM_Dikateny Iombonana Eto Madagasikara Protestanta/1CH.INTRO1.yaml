    - type: text
      text: –Ny boky voalohany sy boky faharoan’ny
  - type: text
    text: ' Tantara '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dia heverina fa samy nipoitra avy amin’ny antokon’olona atao hoe mpisorona teo amin’ny vahoaka Israely sady miravona ho lahatsoratra sy sangan’asa tokana ihany. Tahaka ny sary lehibe anankiray izany sangan’asa izany, ka amin’ny fomba miavaka no amisavisany ny tantaran’ny vahoaka Israely, manomboka hatrany am-piandohany ka miafara amin’ny nanaovana sesitany azy tany Babilôna.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Izany tantara izany dia tsy aroso araka ny fomba fijerina mpitantara fotsiny, fa araka ny fomba fijerina teôlôjianina sy mpitoriteny te hampita fampianarana. Be dia be no ampiasain’ilay mpanoratra amin’ireo loharanon-tantara efa nisy talohany, indrindra indrindra ireo bokin’i Samoela sy ireo bokin’ny Mpanjaka; kanefa ny sivana ataony sy ny safidy raisiny eo anatrehan’ireo loharanon-tantara ireo dia mampiseho ny fampianarana tena ankamamiany:'
  - type: text
    text: ' Andriamanitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: irery no tsy maintsy mifehy ny vahoaka Israely; ireo mpanjaka dia mpanompon’Andriamanitra fotsiny, ka misolotena Azy eo amin’ny fahefàny tafapaka hatrany amin’ny lafim-piainana rehetra. Araka izany fomba fijery izany, dia i
  - type: text
    text: ' Davida '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'no mpanjaka tena mahafatra-po sy mahatoky: izy no nanafika sy nahazo an’i'
  - type: text
    text: ' Jerosalema '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izay nanjary tanàna masina tatỳ aoriana noho ny fiorenan’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tao; izy koa no nitantana ny fiainam-pirenena sy nandamina ny ara-pivavahana teo amin’ny vahoaka Israely. Taorian’ny nahafatesan’izany mpanjaka fakàn-tahaka izany, dia mifantoka amin’ireo taranany izay nitondra ny fanjakan’i
  - type: text
    text: ' Joda '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny mpanoratra.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny
  - type: text
    text: ' Boky voalohan’ny Tantara, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fizaràna voalohany (toko 1–9), dia mampahatsiaro amin’ny fomba voafintimpintina ny tantara manontolo manomboka hatreo amin’i Adama ka mipaka hatrany amin’i Davida, araka ny endrika tetiarana. Ny fizaràna faharoa (toko 10–29) dia voatokana hitantarana ny fanjakan’i Davida, saingy tsy idiran’ny mpanoratra ny sombin-tantara maro momba izany; ny fahatanoran’i Davida, ny fiainany mirenireny, ny fifanoherany tamin’i Saoly, ny sombin-tantara momba an’i Baty-Seba, ny fiodinan’i Absalôma, sns... Ny velabelarin’ny mpanoratra kosa dia ny toe-javatra rehetra nahatonga an’i Davida hitsinjo mialoha sy hanomana ny fanorenana ilay tempolin’i Jerosalema; eo ny famerenana ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina mirakitra ny Fanekempihavanana
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: eo ny fanapahan-kevitra tsy manambina hanisa ny vahoaka Israely, eo ny fanorenana
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'anankiray tandrifin’ny toerana hisy ny Tempoly, ary farany eo ny fandaminana sokajin’olona isan-tokony notendreny hanao fanompoana ao amin’izany tempoly izany: dia ny mpisorona, ny levîta, ny mpiventy hira, ny mpiandry vavahady, sns...'
