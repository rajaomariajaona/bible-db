document_id: ACT.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mizotra mankany Jerosalema i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nataonay veloma ireto '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ', ary dia niondrana izahay ka nanitsy nivantana tany Kôsy; tonga tany Rôdo izahay ny ampitson’iny ary niala tao indray nankany Patara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Teo izahay no nahita sambo hiampita ho any Fenisia, ka dia niondrana tamin’io ary lasa nandeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nahatsinjo an’i Sipra izahay ary dia nizotra tamin’iny atsimon’ny nosy iny hankany Siria. Nitody tao Tiro izahay fa tao no nametrahan’ny sambo ny entana notateriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nahita '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' tao izahay ka nijanona herinandro teo aminy. Nohazavain’ny Fanahy Masina ireo mpianatra ireo ka nandrara an’i Paoly tsy hiakatra any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nony lany anefa izany herinandro izany, dia lasa nanohy ny dia izahay. Nanatitra anay hatrany ivelan’ny tanàna izy rehetra ombàm-bady aman-janaka; dia niara-nandohalika teo amin’ny torapasika izahay ka nivavaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nony vita ny fifanaovam-beloma, dia niondrana izahay; fa ry zareo kosa nandeha nody.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tapitra hatreo ny dianay an-tsambo, fony izahay niala tao Tiro ka tody tany Ptôlemaîda. Dia niarahaba ny havana iray finoana tao Ptôlemaîda izahay ka nijanona indray andro teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Niainga indray izahay ny ampitso ka tonga tany Kesaria; ary dia nandroso tao an-tranon’i Filipo mpitory Vaovao Mahafaly, ka nitoetra teo aminy. I Filipo dia anankiray tamin’ireo fito lahy voafidy tany Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kesaria '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàn-dehibe tamin’ny morontsirak’i Jodea, nitoeran’ireo governora rômanina. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Filipo...ireo fito lahy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 6.5; 8.5.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary nanan-janaka efatra mirahavavy, samy mbola mpitovy, izay nanana fanomezam-pahasoavana nilaza hafatra avy amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Efa nitoetra tao andro maro izahay no nidina avy tany Jodea ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anankiray, atao hoe Hagabo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hagabo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 11.28.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehefa tonga teo aminay i Hagabo, dia noraisiny ny fehikibon’i Paoly, ka nifatorany tongotra aman-tanana sady hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny Fanahy Masina: Ny lehilahy tompon’ity fehikibo ity, dia hafatotry ny Jiosy toy izao rehefa mby any Jerosalema ary hatolony eo an-tanan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony nandre izany teny izany izahay sy ny havana iray finoana tao Kesaria, dia niangavy an’i Paoly tsy hiakatra any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanefa dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no mitomany ianareo, ka mitady hanakivy ahy. Izaho dia tsy vonon-kifatotra ihany, fa vonon-ko faty koa any Jerosalema mba ho voninahitr’i Jesoa Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy naharesy lahatra azy izahay fa niala maina ka nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hatao anie izay sitraky ny Tompo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony afaka izany andro izany, dia nifehy entana izahay ka niakatra hankany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nisy mpianatra sasany avy ao Kesaria niara-dia taminay ary nitondra anay tao amin’ilay olona tokony hiantranoanay, dia i Menasôna avy any Sipra, izay efa mpino hatry ny ela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamangy an’i Jakôba i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony tonga tao Jerosalema izahay, dia faly nandray anay ny havana iray finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny ampitso ihany dia niaraka tamin’i Paoly izahay nitsidika an’i Jakôba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny rahalahin’ny Tompo, tahaka ny ao amin’ny and 12.17 sy 15.13.
    marker-yv: yv-n
  - type: text
    text: ' ary tafavory tao avokoa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholom-piangonana
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Niarahaba azy rehetra i Paoly ary nitanisa ny asa vitan’Andriamanitra tamin’ny alalan’ny fanompoany teo anivon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nony avy nandre izany izy rehetra, dia nanome voninahitra an’Andriamanitra ary nanao tamin’i Paoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry rahalahy, hitanao izao fa an’aliny maro ny Jiosy tonga mpino, kanefa samy fatra-pitandro ny lalàna izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ren-dry zareo fa ianao, hono, dia mampianatra ny Jiosy any am-pielezana hihataka amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy ary mandrara azy ireo tsy hamora ny zanany na hanaraka ny fomban-drazana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ka inona àry no hatao? Tsy maintsy ho henon-dry zareo fa tonga eto ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Koa ataovy izao lazainay aminao izao. Misy olona efa-dahy raiki-
  - type: usfm
    marker: w
    children:
    - type: text
      text: boady
  - type: text
    text: ' eto aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aoka ianao hitondra azy efa-dahy ka hiaraka aminy manatanteraka ny fombam-pivavahana fidiovana. Aloavinao mihitsy aza ny vola mety holanîny hanaratana ny lohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 18.18 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. Dia ho fantatry ny olona rehetra amin’izay fa endrikendrika ranofotsiny izay voalaza ny aminao, satria ianao koa aza dia manaraka sady mitandrina ny lalànan’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa ny hafa firenena izay tonga mpino dia efa nanoratanay ny fanapahan-kevitray: tsy hihinana ny hena natao sorona tamin’ny sampy; hifady ny ra; tsy hihinana ny henam-biby tsy nosomindaina; ary tsy hanao fifandraisana mamoafady ara- '
  - type: usfm
    marker: w
    children:
    - type: text
      text: panambadiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 15.20 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny ampitson’iny, dia nitondra azy efa-dahy i Paoly ary niaraka taminy nanatanteraka ny fombam-pivavahana fidiovana. Avy eo dia nankao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' i Paoly ka nanambara ny hahataperan’ny andro fidiovana mba hahazoana manolotra ny fanatitra tandrify azy dimy lahy tsirairay avy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Kôr 9.20.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voasambotra tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' i Paoly'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hitan’ny Jiosy avy amin’ny faritany Azia tao an-kianjan’ny tempoly i Paoly nony efa ho tapitra ny herinandro fidiovana. Nampikotaba ny vahoaka manontolo ireo Jiosy ireo; ka sady nisambotra an’i Paoly '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'no niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israelita
  - type: text
    text: ', avia fa intỳ eto ilay lehilahy mampianatra ny olona rehetra hatraiza hatraiza hanohitra ny firenen’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy mbamin’ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' ity. Nampidirany hafa firenena aza ny tempoly ka nataony very hasina ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeramasina
  - type: text
    text: ' ity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: (Niteny izany ry zareo satria hitany tafaraka tamin’i Paoly tao an-tanàna i Trôfimo izay avy any Efeso; ka noheveriny fa efa notarihin’i Paoly niditra tao an-tempoly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.29 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 28 sy 29:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Ezek 44.7. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Trôfimo:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 20.4.'
    marker-yv: yv-n
  - type: text
    text: '). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nisavorovoro ny tanàna manontolo, ka indray nirohotra ny olona. Dia nobedain-dry zareo i Paoly ka notaritaritiny ho any ivelan’ny tempoly, ary nohidiny teo no ho eo ihany ireo vavahadin’ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Efa ndeha hovonoina i Paoly no nisy nampiaka-teny tany amin’ny komandin’ny andian-tafika rômanina, nampandre fa mihotakotaka i Jerosalema iray vohitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Niaraka tamin’izay dia naka miaramila sy kapiteny ity komandy ka nihazakazaka nankany amin’ireo vahoaka. Nahita ny komandy sy ny miaramila ry zareo vao nijanona tsy nikapoka an’i Paoly intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nanatona an’i Paoly ny komandy ka nampisambotra azy ary nanome baiko hamatorana azy amin’ny gadra vy anankiroa, sady nanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa io? Ary inona no nataony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Zavatra samy hafa anefa no nantsoantsoin’ny vahoaka. Tsy nahalala izay tena marina ny komandy noho izany fifanjevoana izany, ka dia nanome baiko hitondrana an’i Paoly any amin’ny toby
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny nampiasaina ho '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tobin’ny
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' miaramila rômanina dia ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trano mimanda Antônià,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay naorin’i Herôda Lehibe, teo an-joro avaratra andrefan’ny kianjan’ny tempoly.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nony mby teo amin’ny tohatoha-bato, dia nobetain’ny miaramila i Paoly satria nahery setra ny vahoaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'fa olona marobe no nanaraka sady nihoraka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vonoy izy e!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manao lahateny fiarovan-tena i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nony efa hampidirina tao an-toby i Paoly, dia niteny tamin’ny komandy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Azoko atao ve ny mba milaza zavatra aminao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanontany azy ilay komandy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mahay teny grika ve ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tsy ianao izany ilay Ejiptianina nampikomy vahoaka farany teo, ka nitarika mpampihorohoro efatra arivo lahy tany an-taniefitra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa novalian’i Paoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho dia Jiosy, teraka tany Tarsa any Silisia, mba isan’ny mponina ao amin’ny tanàna anankiray fanta-daza ihany. Azafady, mba avelao hiteny amin’ny vahoaka aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia navelan’ny komandy hiteny izy. Ary nitsangana teo amin’ny tohatoha-bato i Paoly ka nanofahofa tanana hampangina ny vahoaka. Rehefa nangina tsara izy rehetra dia nitenenan’i Paoly tamin’ny teny aramianina hoe:'
