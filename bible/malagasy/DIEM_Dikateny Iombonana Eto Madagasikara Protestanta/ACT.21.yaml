document_id: ACT.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mizotra mankany Jerosalema i Paoly
  - type: text
    content: 'Nataonay veloma ireto '
  - type: text
    content: loholona
  - type: text
    content: ', ary dia niondrana izahay ka nanitsy nivantana tany Kôsy; tonga tany Rôdo izahay ny ampitson’iny ary niala tao indray nankany Patara. '
  '10':
  - type: text
    content: 'Efa nitoetra tao andro maro izahay no nidina avy tany Jodea ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' anankiray, atao hoe Hagabo'
  - type: note
    content: 'Hagabo: jereo 11.28.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Rehefa tonga teo aminay i Hagabo, dia noraisiny ny fehikibon’i Paoly, ka nifatorany tongotra aman-tanana sady hoy izy hoe:'
  - type: text
    content: '–Izao no lazain’ny Fanahy Masina: Ny lehilahy tompon’ity fehikibo ity, dia hafatotry ny Jiosy toy izao rehefa mby any Jerosalema ary hatolony eo an-tanan’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: .
  '12':
  - type: text
    content: 'Nony nandre izany teny izany izahay sy ny havana iray finoana tao Kesaria, dia niangavy an’i Paoly tsy hiakatra any Jerosalema. '
  '13':
  - type: text
    content: 'Kanefa dia novaliany hoe:'
  - type: text
    content: –Nahoana no mitomany ianareo, ka mitady hanakivy ahy. Izaho dia tsy vonon-kifatotra ihany, fa vonon-ko faty koa any Jerosalema mba ho voninahitr’i Jesoa Tompo.
  '14':
  - type: text
    content: 'Tsy naharesy lahatra azy izahay fa niala maina ka nilaza hoe:'
  - type: text
    content: –Hatao anie izay sitraky ny Tompo!
  '15':
  - type: text
    content: 'Nony afaka izany andro izany, dia nifehy entana izahay ka niakatra hankany Jerosalema. '
  '16':
  - type: text
    content: Nisy mpianatra sasany avy ao Kesaria niara-dia taminay ary nitondra anay tao amin’ilay olona tokony hiantranoanay, dia i Menasôna avy any Sipra, izay efa mpino hatry ny ela.
  - type: heading
    content: Mamangy an’i Jakôba i Paoly
  '17':
  - type: text
    content: 'Nony tonga tao Jerosalema izahay, dia faly nandray anay ny havana iray finoana. '
  '18':
  - type: text
    content: Ny ampitso ihany dia niaraka tamin’i Paoly izahay nitsidika an’i Jakôba
  - type: note
    content: Ny rahalahin’ny Tompo, tahaka ny ao amin’ny and 12.17 sy 15.13.
  - type: text
    content: ' ary tafavory tao avokoa ny '
  - type: text
    content: loholom-piangonana
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Niarahaba azy rehetra i Paoly ary nitanisa ny asa vitan’Andriamanitra tamin’ny alalan’ny fanompoany teo anivon’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Teo izahay no nahita sambo hiampita ho any Fenisia, ka dia niondrana tamin’io ary lasa nandeha. '
  '20':
  - type: text
    content: 'Nony avy nandre izany izy rehetra, dia nanome voninahitra an’Andriamanitra ary nanao tamin’i Paoly hoe:'
  - type: text
    content: '–Ry rahalahy, hitanao izao fa an’aliny maro ny Jiosy tonga mpino, kanefa samy fatra-pitandro ny lalàna izy rehetra. '
  '21':
  - type: text
    content: 'Ren-dry zareo fa ianao, hono, dia mampianatra ny Jiosy any am-pielezana hihataka amin’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy ary mandrara azy ireo tsy hamora ny zanany na hanaraka ny fomban-drazana. '
  '22':
  - type: text
    content: 'Ka inona àry no hatao? Tsy maintsy ho henon-dry zareo fa tonga eto ianao. '
  '23':
  - type: text
    content: Koa ataovy izao lazainay aminao izao. Misy olona efa-dahy raiki-
  - type: text
    content: boady
  - type: text
    content: ' eto aminay. '
  '24':
  - type: text
    content: Aoka ianao hitondra azy efa-dahy ka hiaraka aminy manatanteraka ny fombam-pivavahana fidiovana. Aloavinao mihitsy aza ny vola mety holanîny hanaratana ny lohany
  - type: note
    content: Jereo 18.18 sy nta.
  - type: text
    content: '. Dia ho fantatry ny olona rehetra amin’izay fa endrikendrika ranofotsiny izay voalaza ny aminao, satria ianao koa aza dia manaraka sady mitandrina ny lalànan’i Mosesy. '
  '25':
  - type: text
    content: 'Fa ny hafa firenena izay tonga mpino dia efa nanoratanay ny fanapahan-kevitray: tsy hihinana ny hena natao sorona tamin’ny sampy; hifady ny ra; tsy hihinana ny henam-biby tsy nosomindaina; ary tsy hanao fifandraisana mamoafady ara- '
  - type: text
    content: panambadiana
  - type: note
    content: Jereo 15.20 sy nta.
  - type: text
    content: .
  '26':
  - type: text
    content: Ny ampitson’iny, dia nitondra azy efa-dahy i Paoly ary niaraka taminy nanatanteraka ny fombam-pivavahana fidiovana. Avy eo dia nankao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Paoly ka nanambara ny hahataperan’ny andro fidiovana mba hahazoana manolotra ny fanatitra tandrify azy dimy lahy tsirairay avy'
  - type: note
    content: Ampit 1Kôr 9.20.
  - type: text
    content: .
  - type: heading
    content: Voasambotra tao an-kianjan’ny tempoly i Paoly
  '27':
  - type: text
    content: 'Hitan’ny Jiosy avy amin’ny faritany Azia tao an-kianjan’ny tempoly i Paoly nony efa ho tapitra ny herinandro fidiovana. Nampikotaba ny vahoaka manontolo ireo Jiosy ireo; ka sady nisambotra an’i Paoly '
  '28':
  - type: text
    content: 'no niantsoantso hoe:'
  - type: text
    content: '–Ry vahoaka '
  - type: text
    content: israelita
  - type: text
    content: ', avia fa intỳ eto ilay lehilahy mampianatra ny olona rehetra hatraiza hatraiza hanohitra ny firenen’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy mbamin’ity '
  - type: text
    content: tempoly
  - type: text
    content: ' ity. Nampidirany hafa firenena aza ny tempoly ka nataony very hasina ity '
  - type: text
    content: toeramasina
  - type: text
    content: ' ity.'
  '29':
  - type: text
    content: (Niteny izany ry zareo satria hitany tafaraka tamin’i Paoly tao an-tanàna i Trôfimo izay avy any Efeso; ka noheveriny fa efa notarihin’i Paoly niditra tao an-tempoly
  - type: note
    content: 'And 28 sy 29: ampit Ezek 44.7. –Trôfimo: jereo 20.4.'
  - type: text
    content: '). '
  '3':
  - type: text
    content: 'Nahatsinjo an’i Sipra izahay ary dia nizotra tamin’iny atsimon’ny nosy iny hankany Siria. Nitody tao Tiro izahay fa tao no nametrahan’ny sambo ny entana notateriny. '
  '30':
  - type: text
    content: 'Nisavorovoro ny tanàna manontolo, ka indray nirohotra ny olona. Dia nobedain-dry zareo i Paoly ka notaritaritiny ho any ivelan’ny tempoly, ary nohidiny teo no ho eo ihany ireo vavahadin’ny tempoly. '
  '31':
  - type: text
    content: 'Efa ndeha hovonoina i Paoly no nisy nampiaka-teny tany amin’ny komandin’ny andian-tafika rômanina, nampandre fa mihotakotaka i Jerosalema iray vohitra. '
  '32':
  - type: text
    content: 'Niaraka tamin’izay dia naka miaramila sy kapiteny ity komandy ka nihazakazaka nankany amin’ireo vahoaka. Nahita ny komandy sy ny miaramila ry zareo vao nijanona tsy nikapoka an’i Paoly intsony. '
  '33':
  - type: text
    content: 'Dia nanatona an’i Paoly ny komandy ka nampisambotra azy ary nanome baiko hamatorana azy amin’ny gadra vy anankiroa, sady nanontany hoe:'
  - type: text
    content: –Iza moa io? Ary inona no nataony?
  '34':
  - type: text
    content: Zavatra samy hafa anefa no nantsoantsoin’ny vahoaka. Tsy nahalala izay tena marina ny komandy noho izany fifanjevoana izany, ka dia nanome baiko hitondrana an’i Paoly any amin’ny toby
  - type: note
    content: Ny nampiasaina ho tobin’ny miaramila rômanina dia ilay trano mimanda Antônià, izay naorin’i Herôda Lehibe, teo an-joro avaratra andrefan’ny kianjan’ny tempoly.
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Nony mby teo amin’ny tohatoha-bato, dia nobetain’ny miaramila i Paoly satria nahery setra ny vahoaka, '
  '36':
  - type: text
    content: 'fa olona marobe no nanaraka sady nihoraka hoe:'
  - type: text
    content: –Vonoy izy e!
  - type: heading
    content: Manao lahateny fiarovan-tena i Paoly
  '37':
  - type: text
    content: 'Nony efa hampidirina tao an-toby i Paoly, dia niteny tamin’ny komandy hoe:'
  - type: text
    content: –Azoko atao ve ny mba milaza zavatra aminao?
  - type: text
    content: 'Dia nanontany azy ilay komandy hoe:'
  - type: text
    content: '–Mahay teny grika ve ianao? '
  '38':
  - type: text
    content: Tsy ianao izany ilay Ejiptianina nampikomy vahoaka farany teo, ka nitarika mpampihorohoro efatra arivo lahy tany an-taniefitra?
  '39':
  - type: text
    content: 'Fa novalian’i Paoly hoe:'
  - type: text
    content: –Izaho dia Jiosy, teraka tany Tarsa any Silisia, mba isan’ny mponina ao amin’ny tanàna anankiray fanta-daza ihany. Azafady, mba avelao hiteny amin’ny vahoaka aho.
  '4':
  - type: text
    content: 'Nahita '
  - type: text
    content: mpianatra
  - type: text
    content: ' tao izahay ka nijanona herinandro teo aminy. Nohazavain’ny Fanahy Masina ireo mpianatra ireo ka nandrara an’i Paoly tsy hiakatra any Jerosalema. '
  '40':
  - type: text
    content: 'Dia navelan’ny komandy hiteny izy. Ary nitsangana teo amin’ny tohatoha-bato i Paoly ka nanofahofa tanana hampangina ny vahoaka. Rehefa nangina tsara izy rehetra dia nitenenan’i Paoly tamin’ny teny aramianina hoe:'
  '5':
  - type: text
    content: 'Nony lany anefa izany herinandro izany, dia lasa nanohy ny dia izahay. Nanatitra anay hatrany ivelan’ny tanàna izy rehetra ombàm-bady aman-janaka; dia niara-nandohalika teo amin’ny torapasika izahay ka nivavaka. '
  '6':
  - type: text
    content: Nony vita ny fifanaovam-beloma, dia niondrana izahay; fa ry zareo kosa nandeha nody.
  '7':
  - type: text
    content: 'Tapitra hatreo ny dianay an-tsambo, fony izahay niala tao Tiro ka tody tany Ptôlemaîda. Dia niarahaba ny havana iray finoana tao Ptôlemaîda izahay ka nijanona indray andro teo aminy. '
  '8':
  - type: text
    content: Niainga indray izahay ny ampitso ka tonga tany Kesaria; ary dia nandroso tao an-tranon’i Filipo mpitory Vaovao Mahafaly, ka nitoetra teo aminy. I Filipo dia anankiray tamin’ireo fito lahy voafidy tany Jerosalema
  - type: note
    content: 'I Kesaria dia tanàn-dehibe tamin’ny morontsirak’i Jodea, nitoeran’ireo governora rômanina. –I Filipo...ireo fito lahy: jereo 6.5; 8.5.'
  - type: text
    content: ', '
  '9':
  - type: text
    content: 'ary nanan-janaka efatra mirahavavy, samy mbola mpitovy, izay nanana fanomezam-pahasoavana nilaza hafatra avy amin’Andriamanitra. '
