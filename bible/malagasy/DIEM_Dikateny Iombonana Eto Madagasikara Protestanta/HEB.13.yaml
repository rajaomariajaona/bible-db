document_id: HEB.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanompoana sitrak’Andriamanitra
  - type: text
    content: 'Mifankatiava hatrany toy ny mpiray tampo ao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ireo mpanaraka fanompoam-pivavahana ao amin’ny toeram-pivavahana jiosy dia tsy mahazo mihinana amin’izay sorona atao eo amin’ny '
  - type: text
    content: alitarantsika
  - type: note
    content: Dia ny alitaran’ny Toeramasina Indrindra any an-danitra. Ampit 9.11-14.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Entin’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' ao amin’ny '
  - type: text
    content: Toeramasina Indrindra
  - type: text
    content: ' ny ran’ny biby hatao sorona ho fanalana ny ota; fa ny fatin’ireo biby ireo kosa dia dorana any ivelan’ny toby'
  - type: note
    content: Jereo Fisor 16.27.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Izany koa no anton’ny nahafatesan’i Jesoa tany ivelan’ny tanàna
  - type: note
    content: Jereo Jôh 19.17, 20.
  - type: text
    content: ', mba hanadio ny vahoaka amin’ny ra nafoiny. '
  '13':
  - type: text
    content: 'Aoka àry isika hivoaka ny toby hankeo amin’i Jesoa, ka hiara-mizaka aminy ny fandatsana nozakainy. '
  '14':
  - type: text
    content: Fa tsy manana tanàna maharitra eto an-tany isika; fa ilay tanàna ho avy no katsahintsika
  - type: note
    content: Ampit 11.10, 16.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Koa amin’ny alalan’i Jesoa aoka hatolotsika ho sorona ho an’Andriamanitra mandrakariva ny fideràntsika Azy, dia fiderana ventesin’ny molotr’ireo olona miaiky an’Andriamanitra ho Tompo. '
  '16':
  - type: text
    content: Aza hadinoina ny fanaovan-tsoa sy ny fifanampiana, fa sorona toy izany no sitrak’Andriamanitra.
  '17':
  - type: text
    content: Manoava an’ireo mpitarika anareo ara-pivavahana, ka maneke azy. Fa ireo no miambina hatrany ny fanahinareo, toy ny olona mbola hampamoahin’Andriamanitra ny amin’izany. Raha manoa ianareo, dia amin’ny hafaliana no hanaovan’ireo ny raharahany; fa raha tsy manoa ianareo, dia amin’ny fisentoana no hanaovany azy ka tsy hahasoa anareo izany.
  '18':
  - type: text
    content: 'Mivavaha ho anay; satria matoky izahay fa mahitsy fieritreretana, ka satrinay tokoa ny hanana fitondrantena tsara amin’ny zavatra rehetra. '
  '19':
  - type: text
    content: Iangaviako manokana ianareo hangataka amin’Andriamanitra mba hamerenany ahy faingampaingana atỳ aminareo
  - type: note
    content: Tsy milaza mazava izay anton-javatra mahasampona azy ny mpanoratra.
  - type: text
    content: .
  - type: heading
    content: Vavaka famaranana
  '2':
  - type: text
    content: 'Tsarovy ny fampiantranoam-bahiny. Nisy tokoa izay mahavatra nanao izany ka hay '
  - type: text
    content: anjely
  - type: text
    content: ' aza no nampandrosoiny nefa tsy fantany'
  - type: note
    content: Jereo Gen 18.1-8; 19.1-3.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Andriamanitra dia efa nitondra an’i Jesoa Tompontsika hiala amin’ny fahafatesana, i Jesoa Tompontsika Izay Mpiandry lehibe miahy ny ondry noho ny ra nafoiny ho antoky ny '
  - type: text
    content: Fanekempihavanana
  - type: text
    content: ' mandrakizay. '
  '21':
  - type: text
    content: 'Andriamanitra loharanon’ny fiadanana anie hahatonga anareo ho vonon-kanao ny asa soa rehetra mba hanatanterahanareo ny sitrapony; ka hataony ao anatintsika amin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' anie izay sitrany. Ho an’i Jesoa Kristy anie ny voninahitra mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  - type: heading
    content: Hafatra sy fanaovam-beloma
  '22':
  - type: text
    content: 'Mangataka aminareo aho, ry havana; raiso tsara izany lahateny fampaherezana izany, fa teny fohifohy ihany no andefasako azy an-tsoratra aminareo. '
  '23':
  - type: text
    content: Aoka ho fantatrareo fa efa afaka i Timôty havantsika
  - type: note
    content: Jereo Asa 16.1.
  - type: text
    content: ', koa raha tàhiny tonga faingampaingana izy, dia hiaraka aminy hamangy anareo aho.'
  '24':
  - type: text
    content: Veloma any amin’izay rehetra mpitarika anareo ara-pivavahana sy any amin’ny havana rehetra iray finoana. Manao veloma anareo ny havana avy any Italia
  - type: note
    content: 'havana avy any Italia: kristianina avy any Italia fa sendra mandalo na miara-monina any an-toeran-kafa ivelan’i Italia ao amin’ny fanjakambe rômanina; na koa jiosy kristianina voaroaka avy any Italia.'
  - type: text
    content: .
  '25':
  - type: text
    content: Homba anareo rehetra anie ny fahasoavan’Andriamanitra!
  '3':
  - type: text
    content: Tsarovy ny voafonja, ka hevero ho toy ny miaraka voafonja aminy koa ny tenanareo; tsarovy ny ampahorîna, ka hevero ho toy ny ampahorîna tahaka azy ireo koa ny tenanareo.
  '4':
  - type: text
    content: 'Aoka samy hanaja ny fanambadiana, ary aoka tsy hifanitsakitsaka ny mpivady; fa hohelohin’Andriamanitra ny mpijangajanga sy mpaka vadin’olona. '
  '5':
  - type: text
    content: 'Aza avela hahazo laka amin’ny fiainanareo ny fitiavam-bola; aoka ianareo hianina amin’izay anananareo, fa hoy Andriamanitra: «Tsy handao anao mihitsy Aho, ary tsy hahafoy anao velively'
  - type: note
    content: Izany teny izany dia miainga avy amin’ny andinin-tSoratra Masina toy ny Fifan 31.6, 8; Jos 1.5.
  - type: text
    content: '.» '
  '6':
  - type: text
    content: 'Ka dia sahintsika ny manao hoe:'
  - type: text
    content: «Ny Tompo no mpanampy ahy,
  - type: text
    content: ka tsy hatahotra aho.
  - type: text
    content: Inona no ho azon’olona atao amiko?»
  '7':
  - type: text
    content: Tsarovy ireo mpitarika anareo ara-pivavahana, izay efa nitory ny tenin’Andriamanitra taminareo; hevero izay niafaran’ny fiainany
  - type: note
    content: 'Ny niafaran’ny fiainany: misy mihevitra fa mampahatsiaro ny nanaovana martiora ireo mpitarika ara-pivavahana ireo izany. Ampit 10.32-35.'
  - type: text
    content: ' ka alao tahaka ny finoany. '
  '8':
  - type: text
    content: 'I Jesoa Kristy no tsy miova omaly sy anio ary mandrakizay. '
  '9':
  - type: text
    content: Aza mety havilivilin’ny fampianarana samihafa tsy araka an’i Kristy ianareo; tsara manko raha ampaherezina amin’ny fahasoavan’Andriamanitra ny fonareo, fa tsy amina fitsipika momba ny hanina izay tsy mahasoa ireo mahavatra azy
  - type: note
    content: Ampit Rm 14.2-23; 1Kôr 8.8; Kôl 2.16-22; 1Tim 4.3.
  - type: text
    content: .
