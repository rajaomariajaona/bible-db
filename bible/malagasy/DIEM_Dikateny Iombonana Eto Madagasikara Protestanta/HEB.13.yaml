document_id: HEB.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanompoana sitrak’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mifankatiava hatrany toy ny mpiray tampo ao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ireo mpanaraka fanompoam-pivavahana ao amin’ny toeram-pivavahana jiosy dia tsy mahazo mihinana amin’izay sorona atao eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitarantsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia ny alitaran’ny Toeramasina Indrindra any an-danitra. Ampit 9.11-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Entin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorombe
    - type: text
      text: ' ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina Indrindra
    - type: text
      text: ' ny ran’ny biby hatao sorona ho fanalana ny ota; fa ny fatin’ireo biby ireo kosa dia dorana any ivelan’ny toby'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Fisor 16.27.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izany koa no anton’ny nahafatesan’i Jesoa tany ivelan’ny tanàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôh 19.17, 20.
      marker-yv: yv-n
    - type: text
      text: ', mba hanadio ny vahoaka amin’ny ra nafoiny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Aoka àry isika hivoaka ny toby hankeo amin’i Jesoa, ka hiara-mizaka aminy ny fandatsana nozakainy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa tsy manana tanàna maharitra eto an-tany isika; fa ilay tanàna ho avy no katsahintsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 11.10, 16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa amin’ny alalan’i Jesoa aoka hatolotsika ho sorona ho an’Andriamanitra mandrakariva ny fideràntsika Azy, dia fiderana ventesin’ny molotr’ireo olona miaiky an’Andriamanitra ho Tompo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Aza hadinoina ny fanaovan-tsoa sy ny fifanampiana, fa sorona toy izany no sitrak’Andriamanitra.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Manoava an’ireo mpitarika anareo ara-pivavahana, ka maneke azy. Fa ireo no miambina hatrany ny fanahinareo, toy ny olona mbola hampamoahin’Andriamanitra ny amin’izany. Raha manoa ianareo, dia amin’ny hafaliana no hanaovan’ireo ny raharahany; fa raha tsy manoa ianareo, dia amin’ny fisentoana no hanaovany azy ka tsy hahasoa anareo izany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mivavaha ho anay; satria matoky izahay fa mahitsy fieritreretana, ka satrinay tokoa ny hanana fitondrantena tsara amin’ny zavatra rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Iangaviako manokana ianareo hangataka amin’Andriamanitra mba hamerenany ahy faingampaingana atỳ aminareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy milaza mazava izay anton-javatra mahasampona azy ny mpanoratra.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka famaranana
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tsarovy ny fampiantranoam-bahiny. Nisy tokoa izay mahavatra nanao izany ka hay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' aza no nampandrosoiny nefa tsy fantany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 18.1-8; 19.1-3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Andriamanitra dia efa nitondra an’i Jesoa Tompontsika hiala amin’ny fahafatesana, i Jesoa Tompontsika Izay Mpiandry lehibe miahy ny ondry noho ny ra nafoiny ho antoky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanekempihavanana
    - type: text
      text: ' mandrakizay. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Andriamanitra loharanon’ny fiadanana anie hahatonga anareo ho vonon-kanao ny asa soa rehetra mba hanatanterahanareo ny sitrapony; ka hataony ao anatintsika amin’ny alalan’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' anie izay sitrany. Ho an’i Jesoa Kristy anie ny voninahitra mandrakizay mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatra sy fanaovam-beloma
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mangataka aminareo aho, ry havana; raiso tsara izany lahateny fampaherezana izany, fa teny fohifohy ihany no andefasako azy an-tsoratra aminareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Aoka ho fantatrareo fa efa afaka i Timôty havantsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 16.1.
      marker-yv: yv-n
    - type: text
      text: ', koa raha tàhiny tonga faingampaingana izy, dia hiaraka aminy hamangy anareo aho.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Veloma any amin’izay rehetra mpitarika anareo ara-pivavahana sy any amin’ny havana rehetra iray finoana. Manao veloma anareo ny havana avy any Italia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'havana avy any Italia: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kristianina avy any Italia fa sendra mandalo na miara-monina any an-toeran-kafa ivelan’i Italia ao amin’ny fanjakambe rômanina; na koa jiosy kristianina voaroaka avy any Italia.
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Homba anareo rehetra anie ny fahasoavan’Andriamanitra!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsarovy ny voafonja, ka hevero ho toy ny miaraka voafonja aminy koa ny tenanareo; tsarovy ny ampahorîna, ka hevero ho toy ny ampahorîna tahaka azy ireo koa ny tenanareo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka samy hanaja ny fanambadiana, ary aoka tsy hifanitsakitsaka ny mpivady; fa hohelohin’Andriamanitra ny mpijangajanga sy mpaka vadin’olona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Aza avela hahazo laka amin’ny fiainanareo ny fitiavam-bola; aoka ianareo hianina amin’izay anananareo, fa hoy Andriamanitra: «Tsy handao anao mihitsy Aho, ary tsy hahafoy anao velively'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izany teny izany dia miainga avy amin’ny andinin-tSoratra Masina toy ny Fifan 31.6, 8; Jos 1.5.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ka dia sahintsika ny manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny Tompo no mpanampy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hatahotra aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no ho azon’olona atao amiko?»
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsarovy ireo mpitarika anareo ara-pivavahana, izay efa nitory ny tenin’Andriamanitra taminareo; hevero izay niafaran’ny fiainany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'niafaran’ny fiainany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misy mihevitra fa mampahatsiaro ny nanaovana martiora ireo mpitarika ara-pivavahana ireo izany. Ampit 10.32-35.
      marker-yv: yv-n
    - type: text
      text: ' ka alao tahaka ny finoany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I Jesoa Kristy no tsy miova omaly sy anio ary mandrakizay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza mety havilivilin’ny fampianarana samihafa tsy araka an’i Kristy ianareo; tsara manko raha ampaherezina amin’ny fahasoavan’Andriamanitra ny fonareo, fa tsy amina fitsipika momba ny hanina izay tsy mahasoa ireo mahavatra azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Rm 14.2-23; 1Kôr 8.8; Kôl 2.16-22; 1Tim 4.3.
      marker-yv: yv-n
    - type: text
      text: .
