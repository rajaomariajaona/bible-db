document_id: MIC.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Teny nampitain’ny TOMPO tamin’i Mikà izay avy any Môreseta, fony mpanjaka tao Joda ry i Jôtama sy i Ahaza ary i Hezekià. Fahitana no nampahafantaran’ny Tompo azy ny teniny momba ny tanàna Samaria sy Jerosalema
  - type: note
    content: 'Môreseta: tanàna tokony ho 35 km ao atsimo andrefan’i Jerosalema, ao Joda faritr’i Sefelà*. –mpanjaka tao Joda ry i Jôtama sy i Ahaza ary i Hezekià: jereo Is 1.1 sy nta. –Samaria: renivohitry ny fanjakan’i Israely; azon’ny Asirianina io tanàna io tamin’ny taona 722 na 721 tal. J.K. –Jerosalema: renivohitry ny fanjakan’i Joda. Ireo renivohitra roa ireo eto no misolotena ny fanjakana roa tonta dia ny fanjakan’i Israely sy ny fanjakan’i Joda.'
  - type: text
    content: .
  - type: heading
    content: Miampanga ny vahoakany ny Tompo
  '10':
  - type: text
    content: Aza ambara any Gata izany
  - type: text
    content: fa tazony ny ranomasonareo
  - type: note
    content: 'tazony ny ranomasonareo: tsy mazava ny RM eo amin’ny and 10 sy 11. Misy ny mihevitra fa ny RM dia tokony ho vakîna hoe ao Akô tazony ny ranomasonareo; misy kosa ny tsy mahita anaran-tanàna eto fa mamaky fotsiny hoe mitomania. –Ao amin’ny and 10-15 dia manao karazana tsilalaon-teny ny mpaminany amin’ireo anaran-tanàna lazainy. Ireo tanàna rehetra ireo dia any Joda avokoa, ary tandindomin’ny fandravana hataon’ny Asirianina.'
  - type: text
    content: '!'
  - type: text
    content: Ry mponina ao Bety-Hafrà,
  - type: text
    content: mihosinkosena amin’ny vovoka ianareo.
  '11':
  - type: text
    content: Ry mponina ao Safira,
  - type: text
    content: mandehana hatao sesi-tany
  - type: text
    content: ombàn-kenatra sady tsy mitafy.
  - type: text
    content: Tsy mahavoaka ny tanàna ireo mponina eo Tsanàna.
  - type: text
    content: Misaona ny ao Bety-Etsela,
  - type: text
    content: ka tsy azo ampiasaina hierena intsony.
  '12':
  - type: text
    content: Mangovitra ny amin’ireo tombon-tsoany
  - type: text
    content: ny mponina ao Marôta,
  - type: text
    content: satria efa nidina ho ao am-bavahadin’i Jerosalema
  - type: text
    content: ny loza avy tamin’ny TOMPO.
  '13':
  - type: text
    content: Ry mponina ao Lakisy,
  - type: text
    content: rohizo amin’ny soavaly haingam-pandeha
  - type: text
    content: ny kalesy handosiranareo;
  - type: text
    content: 'satria naka tahaka ny fahadisoan’i '
  - type: text
    content: Israely
  - type: text
    content: ' ianareo,'
  - type: text
    content: 'ka nahatonga ny mponina ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' hanota.'
  '14':
  - type: text
    content: Noho izany, ry mponina ao Tsiôna,
  - type: text
    content: afoizo i Môreseta-Gata;
  - type: text
    content: ny tanàna Akziba dia toky manodoka
  - type: text
    content: ho an’ny mpanjakan’i Israely.
  '15':
  - type: text
    content: Mpanafika handresy anareo
  - type: text
    content: no halefan’ny TOMPO aminareo,
  - type: text
    content: ry mponina ao Maresà,
  - type: text
    content: ka hisitrika hatrany an-johin’i Hadolama
  - type: text
    content: ireo filoha tabihan’i Israely.
  '16':
  - type: text
    content: Hetezo ny volonareo ary kakaso ny lohanareo,
  - type: text
    content: ry mponina ao Tsiôna;
  - type: text
    content: halehibiazo ho tahaka ny an’ny fanindry
  - type: note
    content: 'kakaso ny lohanareo: jereo ny naoty tandrifin’ny Ezek 7.18. Mangadihady ny tenda sy ny lohan’ny fanindry ka mampahatsiahy ny loha nokakasana noho ny fisaonana. Ny fanindry dia karazana papango.'
  - type: text
    content: ny sola eo an-dohanareo,
  - type: text
    content: 'noho ny amin’ireo zanaka malalanareo:'
  - type: text
    content: satria nentina ho babo lavitra anao izy.
  '2':
  - type: text
    content: Mihainoa ianareo, ry firenena rehetra.
  - type: text
    content: Mandrenesa tsara, ry tany sy izay rehetra ao aminy!
  - type: text
    content: Ny Tompo ANDRIANANAHARY no ho tonga eo anivonareo
  - type: text
    content: mba ho vavolombelona hiampanga,
  - type: text
    content: dia ny Tompo avy ao amin’ny tempoliny masina.
  '3':
  - type: text
    content: Fa indro ny TOMPO mivoaka ny toerany,
  - type: text
    content: ary midina ka mandeha eny am-paratampon’ny tany;
  '4':
  - type: text
    content: miempo eo ambany tongony ny tendrombohitra
  - type: text
    content: tahaka ny savoka taninin’ny afo;
  - type: text
    content: ary loadoaka ny lohasaha
  - type: text
    content: tahaka ny rehefa misy riaka
  - type: text
    content: mivarimbarina eny an-kilahila.
  '5':
  - type: text
    content: Nikomy tamin’Andriamanitra ny taranak’i Jakôba,
  - type: text
    content: 'eny, nanota ny vahoakan’i '
  - type: text
    content: Israely
  - type: note
    content: 'Ny taranak’i Jakôba, vahoakan’i Israely: eto dia ny Israelita rehetra na ny tao amin’ny fanjakana avaratra na ny tao amin’ny fanjakana atsimo.'
  - type: text
    content: ','
  - type: text
    content: ka mahatonga izany rehetra izany.
  - type: text
    content: Fa iza no nampikomy ny taranak’i Jakôba?
  - type: text
    content: Moa tsy i Samaria renivohiny ve?
  - type: text
    content: Ary iza no toeram-panasinana ao Joda?
  - type: text
    content: Moa tsy i Jerosalema renivohiny ve?
  '6':
  - type: text
    content: 'Noho izany, dia hoy ny Tompo hoe:'
  - type: text
    content: «Hataoko antontan-korontam-bato eny an-tsaha i Samaria,
  - type: text
    content: hataoko tany fambolena voaloboka;
  - type: text
    content: ary havariko any an-dohasaha ny vatony,
  - type: text
    content: ka hampihanjahanjaiko ny fototra iorenany.
  '7':
  - type: text
    content: Hotorotoroina ny sampiny voasokitra rehetra
  - type: text
    content: hodorana amin’ny afo ny tamby rehetra azony
  - type: text
    content: ary hopotehiko ny sarin-tsampiny rehetra;
  - type: text
    content: satria tambin’ny vehivavy janga
  - type: note
    content: 'tambin’ny vehivavy janga: fanomezana izay natao ho karaman’ireo vehivavy mpijangajanga tao amin’ny tempolin’i Bahala* (jereo Hôs 1.2 sy nta) ka nentina nandravaka ireny tempoly ireny, indrindra amin’ny fanaovana sarin-tsampy vaovao.'
  - type: text
    content: no nanangonany azy,
  - type: text
    content: dia hanambazana vehivavy janga
  - type: text
    content: any an-kafa indray ireny.»
  - type: heading
    content: Mahatratra an’i Jerosalema ny loza
  '8':
  - type: text
    content: 'Hoy kosa i Mikà hoe:'
  - type: text
    content: Noho izany, dia hitomany sy hidradradradra aho,
  - type: text
    content: ary handeha tsy mitafy sady tsy mikiraro.
  - type: text
    content: Hikonainaina toy ny amboadia aho
  - type: text
    content: ary hikiakiaka toy ny vorombe;
  '9':
  - type: text
    content: satria tsy mety sitrana ny ratran’i Samaria
  - type: text
    content: fa mitatra hatrany Joda aza,
  - type: text
    content: ka tonga hatreo am-bavahadin’i Jerosalema
  - type: text
    content: izay tanànan’ny mpiray firenena amiko.
