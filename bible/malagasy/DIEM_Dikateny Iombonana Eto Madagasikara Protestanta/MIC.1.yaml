  - type: text
    text: Teny nampitain’ny TOMPO tamin’i Mikà izay avy any Môreseta, fony mpanjaka tao Joda ry i Jôtama sy i Ahaza ary i Hezekià. Fahitana no nampahafantaran’ny Tompo azy ny teniny momba ny tanàna Samaria sy Jerosalema
  - type: usfm
    marker: f
    children:
