    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Môreseta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna tokony ho 35 km ao atsimo andrefan’i Jerosalema, ao Joda faritr’i Sefelà*. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –mpanjaka tao Joda ry i Jôtama sy i Ahaza ary i Hezekià
