  - type: text
    text: Mihainoa ianareo, ry firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrenesa tsara, ry tany sy izay rehetra ao aminy!
- type: usfm
  marker: q1
  children:
