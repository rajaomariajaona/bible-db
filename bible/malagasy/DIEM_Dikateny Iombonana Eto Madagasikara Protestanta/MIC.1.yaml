      children:
      - type: text
        text: Jerosalema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': renivohitry ny fanjakan’i Joda. Ireo renivohitra roa ireo eto no misolotena ny fanjakana roa tonta dia ny fanjakan’i Israely sy ny fanjakan’i Joda.'
