document_id: DAN.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fotoana mampahory sy ny fitsanganan-ko velona
  - type: text
    content: '«Hoy koa ilay '
  - type: text
    content: anjely
  - type: text
    content: ' tamiko: ‹Amin’izany fotoana izany dia hitsangana i Mikaela'
  - type: note
    content: 'Mikaela: jereo 10.13 sy nta.'
  - type: text
    content: ', ilay filoha lehibe, izay mijoro homba ny firenenao; ary hisy fotoana mampahory'
  - type: note
    content: 'fotoana mampahory: jereo Mt 24.21; Mk 13.19.'
  - type: text
    content: ' tsy mbola nisy toy izany hatrizay nisiam-pirenena ka hatramin’io fotoana io. Ary amin’izany fotoana izany dia ho voavonjy ny olona rehetra anisan’ny firenenao, ka hita voasoratra ao amin’ny boky'
  - type: note
    content: 'boky: jereo Eks 32.32; Sal 69.29 sy nta; Apôk 3.5 fa Andriamanitra dia mitana boky izay anoratany ny anaran’ny mpivavaka mahatoky.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Maro no '
  - type: text
    content: hodiovina
  - type: text
    content: ' sy hofotsiana ary hosedraina'
  - type: note
    content: 'hodiovina, hofotsiana, hosedraina: jereo 11.35.'
  - type: text
    content: ; ny olon-dratsy
  - type: note
    content: 'ny olon-dratsy... hendry no hahafantatra: ampit Apôk 22.11.'
  - type: text
    content: ' kosa tsy hisy hahafantatra ny heviny ka mbola hanao ratsy ihany, fa ny hendry no hahafantatra. '
  '11':
  - type: text
    content: 'Ary manomboka amin’ny fotoana hampitsaharana ny '
  - type: text
    content: sorona
  - type: text
    content: ' fanao isan’andro ka hampidirana ilay fanimbazimbana mahatsiravina dia hisy 1 290 andro'
  - type: note
    content: Jereo 11.31 sy nta.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Sambatra izay hiandry ka hahatratra ny 1 335 andro. '
  '13':
  - type: text
    content: Fa ianao, ry Daniela, mizora hatramin’ny farany; dia hiala sasatra ianao ka hitsangana handray ny valisoanao amin’ny andro farany.› »
  '2':
  - type: text
    content: 'Ary olona marobe izay matory ao amin’ny vovoka ao am-pasana no hifoha: ny sasany ho amin’ny fiainana mandrakizay ary ny sasany ho amin’ny henatra sy ny zava-mahatsiravina mandrakizay'
  - type: note
    content: Jereo Mt 25.46; Jôh 5.29.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Ary ireo hendry dia hamirapiratra toy ny famirapiratry ny lanitra; ary izay nampianatra ny maro ho marina dia hamirapiratra tahaka ny kintana mandrakizay mandrakizay.
  '4':
  - type: text
    content: «Ry Daniela, ahorony hiafina ireo teny ireo ka asio tombo-kase tsy ho azo sokafana ity boky ity ambara-pahatongan’ny fotoana farany; ho maro amin’izay no hamaky azy ka hitombo fahalalana
  - type: note
    content: Ampit Apôk 22.10.
  - type: text
    content: .
  - type: heading
    content: Zava-miafina ny fotoana farany
  '5':
  - type: text
    content: '«Izaho Daniela dia nijery hatrany ilay fahitana ka indro nisy olona roa hafa nitsangana, ny anankiray teto amoron’ny ony an-kilany ary ny anankiray terỳ amoron’ny ony andaniny. '
  '6':
  - type: text
    content: Ary ny anankiray tamin’ireo no niteny tamin’ilay lehilahy nitafy rongony fotsy
  - type: note
    content: Jereo Apôk 10.5-6.
  - type: text
    content: ' teo ambonin’ny ranon’ny ony ka nanao hoe: ‹Rahoviana no hifarana ireo zava-mahagaga ireo?› '
  '7':
  - type: text
    content: 'Ary ilay lehilahy nitafy rongony fotsy teo ambonin’ny ranon’ny ony nanangana ny tanany ankavanana sy ankavia ho amin’ny lanitra ka reko niteny hoe: ‹Amin’Ilay Andriamanitra velona mandrakizay no ianianako fa telo taona sy tapany'
  - type: note
    content: 'telo taona sy tapany: jereo 7.25; Apôk 12.14; 13.5-6.'
  - type: text
    content: no haharetan’ireo zavatra ireo; ary hifarana ireo rehefa ho montsana tanteraka ny herin’ilay vahoakan’Andriamanitra.›
  '8':
  - type: text
    content: '«Izaho Daniela dia nandre izany nefa tsy nahafantatra ny heviny, ka nanontany hoe: ‹Tompoko, hanao ahoana no hiafaran’ireo zavatra ireo?› '
  '9':
  - type: text
    content: 'Fa namaly izy hoe: ‹Ry Daniela, mandehana fa efa voahorona hiafina ireo teny ireo sady voaisy tombokase tsy ho azo sokafana mandra-piavin’ny fotoana farany. '
