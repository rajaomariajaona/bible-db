    - type: usfm
      marker: fk
      children:
      - type: text
        text: hofotsiana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hosedraina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 11.35.
    marker-yv: yv-n
  - type: text
    text: ; ny olon-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny olon-dratsy... hendry no hahafantatra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Apôk 22.11.
    marker-yv: yv-n
  - type: text
    text: ' kosa tsy hisy hahafantatra ny heviny ka mbola hanao ratsy ihany, fa ny hendry no hahafantatra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary manomboka amin’ny fotoana hampitsaharana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanao isan’andro ka hampidirana ilay fanimbazimbana mahatsiravina dia hisy 1 290 andro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 11.31 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Sambatra izay hiandry ka hahatratra ny 1 335 andro. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ianao, ry Daniela, mizora hatramin’ny farany; dia hiala sasatra ianao ka hitsangana handray ny valisoanao amin’ny andro farany.› »
