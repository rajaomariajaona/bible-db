    children:
    - type: text
      text: '1'
  - type: text
    text: '«Hoy koa ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' tamiko: ‹Amin’izany fotoana izany dia hitsangana i Mikaela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mikaela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 10.13 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ilay filoha lehibe, izay mijoro homba ny firenenao; ary hisy fotoana mampahory'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fotoana mampahory: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 24.21; Mk 13.19.
    marker-yv: yv-n
  - type: text
    text: ' tsy mbola nisy toy izany hatrizay nisiam-pirenena ka hatramin’io fotoana io. Ary amin’izany fotoana izany dia ho voavonjy ny olona rehetra anisan’ny firenenao, ka hita voasoratra ao amin’ny boky'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1d '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'boky: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 32.32; Sal 69.29 sy nta; Apôk 3.5 fa Andriamanitra dia mitana boky izay anoratany ny anaran’ny mpivavaka mahatoky.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary olona marobe izay matory ao amin’ny vovoka ao am-pasana no hifoha: ny sasany ho amin’ny fiainana mandrakizay ary ny sasany ho amin’ny henatra sy ny zava-mahatsiravina mandrakizay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 25.46; Jôh 5.29.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ireo hendry dia hamirapiratra toy ny famirapiratry ny lanitra; ary izay nampianatra ny maro ho marina dia hamirapiratra tahaka ny kintana mandrakizay mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Ry Daniela, ahorony hiafina ireo teny ireo ka asio tombo-kase tsy ho azo sokafana ity boky ity ambara-pahatongan’ny fotoana farany; ho maro amin’izay no hamaky azy ka hitombo fahalalana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Apôk 22.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zava-miafina ny fotoana farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Izaho Daniela dia nijery hatrany ilay fahitana ka indro nisy olona roa hafa nitsangana, ny anankiray teto amoron’ny ony an-kilany ary ny anankiray terỳ amoron’ny ony andaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny anankiray tamin’ireo no niteny tamin’ilay lehilahy nitafy rongony fotsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Apôk 10.5-6.
    marker-yv: yv-n
  - type: text
    text: ' teo ambonin’ny ranon’ny ony ka nanao hoe: ‹Rahoviana no hifarana ireo zava-mahagaga ireo?› '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ilay lehilahy nitafy rongony fotsy teo ambonin’ny ranon’ny ony nanangana ny tanany ankavanana sy ankavia ho amin’ny lanitra ka reko niteny hoe: ‹Amin’Ilay Andriamanitra velona mandrakizay no ianianako fa telo taona sy tapany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'telo taona sy tapany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 7.25; Apôk 12.14; 13.5-6.
    marker-yv: yv-n
  - type: text
    text: no haharetan’ireo zavatra ireo; ary hifarana ireo rehefa ho montsana tanteraka ny herin’ilay vahoakan’Andriamanitra.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Izaho Daniela dia nandre izany nefa tsy nahafantatra ny heviny, ka nanontany hoe: ‹Tompoko, hanao ahoana no hiafaran’ireo zavatra ireo?› '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa namaly izy hoe: ‹Ry Daniela, mandehana fa efa voahorona hiafina ireo teny ireo sady voaisy tombokase tsy ho azo sokafana mandra-piavin’ny fotoana farany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maro no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hodiovina
  - type: text
    text: ' sy hofotsiana ary hosedraina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: hodiovina
    - type: usfm
      marker: ft
      children:
      - type: text
