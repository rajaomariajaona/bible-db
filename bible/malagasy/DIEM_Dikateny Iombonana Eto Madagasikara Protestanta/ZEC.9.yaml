document_id: ZEC.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I ISRAELY SY NY FIRENEN-KAFA
  - type: heading
    content: Fitsarana sy famonjena ireo vahoaka mpifanolo-bodirindrina amin’i Israely
  - type: text
    content: Hafatry ny TOMPO.
  - type: text
    content: Any amin’ny tanin’i Hadràka
  - type: note
    content: 'Hadràka: tanàna iray any avaratr’i Siria–Damasy no renivohitr’i Siria.'
  - type: text
    content: no tafapaka ny teniny,
  - type: text
    content: ka niato tao Damasy;
  - type: text
    content: satria samy an’ny TOMPO na ireo tanànan’i Arama
  - type: text
    content: na ny fitambaran’ireo fokon’ny Israely.
  '10':
  - type: text
    content: Hofoanany tsy ho ao Efraîma intsony ny kalesy
  - type: text
    content: ary tsy ho ao Jerosalema ny soavaly fitondra miady
  - type: text
    content: Hopotehiny ny tsipîkan’ady
  - type: text
    content: ary hilaza fiadanana amin’ny firenena Izy.
  - type: text
    content: Ny fifehezany dia hatreo amin’ny ranomasina iray
  - type: text
    content: ka hatrany amin’ny ranomasina iray hafa,
  - type: text
    content: ary hatreo amin’ny onin’i Eofrata
  - type: text
    content: ka hatrany am-paran’ny tany
  - type: note
    content: 'Hofoanany: araka ny dkt tranainy grika; hebreo RM: hofoanako. I Efraîma eto dia milaza ny fitambaran’ny fanjakan’i Israely na ny fanjakana avaratra. hatreo amin’ny... iray hafa: izany hoe hatreo amin’ny Ranomasina Maty ka hatrany amin’ny Ranomasina Mediteranea.'
  - type: text
    content: .
  - type: heading
    content: Ny fanafahana ireo mpigadra
  '11':
  - type: text
    content: 'Dia hoy ny Tompo hoe:'
  - type: text
    content: «Ny aminareo kosa, ry mponin’i Tsiôna,
  - type: text
    content: 'noho ianareo nanaovako '
  - type: text
    content: fanekempihavanana
  - type: text
    content: izay nohamafisina tamin’ny ran-
  - type: text
    content: tsorona
  - type: text
    content: ','
  - type: text
    content: no efa namoahako ny mpigadranao
  - type: text
    content: toy ny avy tao an-davaka tsisy rano.
  '12':
  - type: text
    content: Miverena ao an-tanàna mimanda,
  - type: text
    content: ry mpigadra manam-panantenana!
  - type: text
    content: 'Anio no anambaràko aminareo hoe:'
  - type: text
    content: Fanambinana avo roa heny
  - type: text
    content: no hanonerako ny fahorianareo.
  '13':
  - type: text
    content: Hampiasaiko toy ny tsipîkan’ady i Joda,
  - type: text
    content: ka i Efraîma
  - type: note
    content: 'i Efraîma: jereo 9.10 sy nta.'
  - type: text
    content: ' no ho tahaka ny zana-tsipîkany.'
  - type: text
    content: 'Ry '
  - type: text
    content: Tsiôna
  - type: text
    content: ', hotairiko ny vatan-dehilahinao'
  - type: text
    content: hiady amin’ireo vatan-dehilahy grika;
  - type: text
    content: toy ny sabatry ny mpiady mahery
  - type: text
    content: no hampiasako ireo vatan-dehilahinao.»
  '14':
  - type: text
    content: Ary ny Tompo hiseho
  - type: text
    content: eo ambonin’ny vahoakany;
  - type: text
    content: ka hipoitra toy ny tselatra
  - type: text
    content: ny zana-tsipîkany
  - type: text
    content: Hitsoka anjomara ny Tompo ANDRIANANAHARY
  - type: text
    content: ka ho tonga miaraka amin’ny tafio-drivotra atsimo.
  '15':
  - type: text
    content: Ny Tompon’izao rehetra izao hiaro ny vahoakany;
  - type: text
    content: ka havandra vaventy no halefany
  - type: text
    content: hamotika sy hanorotoro ny fahavalony;
  - type: text
    content: dia hataony mikoriana ny ran’ireo
  - type: text
    content: ka hampiely ny ran’ny fahavalony
  - type: text
    content: mova tsy tahaka ny divay,
  - type: text
    content: na koa tahaka ny ram-biby atao sorona
  - type: text
    content: izay mameno ny tsangambava famafazana
  - type: text
    content: 'sy mandrakotra ny zoron’ny '
  - type: text
    content: alitara
  - type: note
    content: 'tsangambava famafazana: jereo 1 Mp 7.45. –ny zoron’ny alitara: jereo Eks 27.2 sy 29.12.'
  - type: text
    content: .
  '16':
  - type: text
    content: Amin’izany andro izany ny vahoakany
  - type: text
    content: dia hovonjen’ny Tompo Andriamaniny,
  - type: text
    content: 'ka toy ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' mamonjy ny ondriny Izy;'
  - type: text
    content: ary ho toy ny vaton-tsatroboninahitra
  - type: text
    content: no hamirapiratany eo amin’ny taniny.
  '17':
  - type: text
    content: Akory ny fahasambarany!
  - type: text
    content: Ary akory ny hatsaran-tarehiny!
  - type: text
    content: Vary sy divay vaovao
  - type: text
    content: no hampaharoroka finaritra
  - type: text
    content: ireo zatovolahy sy zatovovavy.
  '2':
  - type: text
    content: Azy toraka izany ihany koa
  - type: text
    content: i Hamata akaikin’i Damasy
  - type: text
    content: ary ny tanànan’i Tiro sy i Tsidôna
  - type: note
    content: 'i Tiro sy i Tsidôna: jereo nta Is 23.1.'
  - type: text
    content: izay misy olona kinga tokoa.
  '3':
  - type: text
    content: Ary i Tiro nanao manda mafy ho azy;
  - type: text
    content: volafotsy matevina tahaka ny vovoka no voaangony
  - type: text
    content: ary koa volamena mivongana toy ny fotaka eny an-dalambe.
  '4':
  - type: text
    content: Kanefa halain’ny Tompo aminy ireny,
  - type: text
    content: hazerany any an-dranomasina ny màndany
  - type: text
    content: ary ho levon’ny afo ny tanàna.
  '5':
  - type: text
    content: Hahita izany ny tanànan’i Askelôna,
  - type: text
    content: ka dia ho raiki-tahotra,
  - type: text
    content: i Gazà koa ho tora-kovitra,
  - type: text
    content: ary i Hekrôna ho very fanantenana.
  - type: text
    content: Tsy hisy mpanjaka intsony ao Gazà,
  - type: text
    content: ary tsy hisy mponina intsony ao Askelôna
  - type: note
    content: 'Askelôna, Gazà, Hekrôna ary i Asdôda: tanàn-dehibe tany Filistia.'
  - type: text
    content: ;
  '6':
  - type: text
    content: mponina safiotra no hipetraka ao Asdôda.
  - type: text
    content: 'Ka hoy ny Tompo Andriamanitra hoe:'
  - type: text
    content: Toy izany no hanafoanako
  - type: text
    content: ny fireharehan’ny Filistinina.
  '7':
  - type: text
    content: Hoesoriko eny am-bavany
  - type: text
    content: ny hena tsy nalatsa-dra
  - type: text
    content: na naterina tamin’ny sampy.
  - type: text
    content: Ary ny sisa velona amin’ny vahoakany
  - type: text
    content: dia hanana Ahy koa ho Andriamanitra,
  - type: text
    content: ka hitovy amin’ny iray tarika
  - type: text
    content: ao anatin’ny fokon’i Joda.
  - type: text
    content: I Hekrôna koa hiditra ho vahoakako
  - type: text
    content: toy ny nataon’ireo Jebôsita
  - type: note
    content: Taorian’ny nahazoan’i Davida an’i Jerosalema, izay nantsoina hoe Jebosa tamin’izany (2 S 5.6-9), ny Jebosita dia niara-nipetraka tamim-piadanana tamin’ny Israelita (Jereo Jos 15.63).
  - type: text
    content: .
  '8':
  - type: text
    content: Hiambina manodidina ny taniko Aho
  - type: text
    content: mba hiaro azy amin’ireo tafika
  - type: text
    content: izay mihaodihaody mandalo;
  - type: text
    content: ka tsy hisy intsony hamaky eo
  - type: text
    content: hampahory ny vahoakako
  - type: text
    content: fa efa hitako ankehitriny ny fahoriany.»
  - type: heading
    content: Ilay mpanjaka izay hampitoetra ny fiadanana
  '9':
  - type: text
    content: 'Mifalia dia mifalia, ry mponin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: '!'
  - type: text
    content: Manaova fihobiana, ry vahoakan’i Jerosalema!
  - type: text
    content: Indro ny Mpanjakanareo avy aty aminareo;
  - type: text
    content: marina sady mandresy Izy,
  - type: text
    content: feno halemem-panahy sady mitaingina boriky,
  - type: text
    content: dia boriky tanora zana-borikivavy
  - type: note
    content: Ity and ity dia voalaza ampahany ao amin’ny Mt 21.5 sy Jôh 12.15.
  - type: text
    content: .
