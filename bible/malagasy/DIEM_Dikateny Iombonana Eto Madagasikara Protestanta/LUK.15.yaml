document_id: LUK.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay ondry very ka hita indray
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 18.12-14)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fatra-panatona an’i Jesoa avokoa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpamory hetra
    - type: text
      text: ' sy ny mpanota mba hihaino Azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany koa, hoy Aho aminareo, hisy hafaliana ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjelin’Andriamanitra
    - type: text
      text: ' amin’ny mpanota anankiray monja miala amin’ny toetra ratsiny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay faralahy very ka hita indray
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy indray i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nanan-janaka mirahalahy ity lehilahy anankiray. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary hoy ilay zandriny tamin-drainy: «Omeo ahy, ry dada, ny anjara fananana tandrify ahy.» Dia nozarainy tamin’izy mirahalahy ny fananany. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nony afaka andro vitsivitsy, dia nivarotra ny anjarany manontolo ilay zandriny, ary lasa nitondra ny vola azony nankany an-tany lavitra ka nandanilany foana ny fananany tamin’ny filibàna. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Rehefa tapitra avokoa izay teo am-pelatanany, dia nisy mosary mafy tamin’izany tany izany, ary tsy nanan-koraisina intsony ny anao. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Lasa izy niasa tamin’ny tompon-tany anankiray ka nalefan’ilay niasany hiandry kisoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mk 5.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' tany an-tsahany. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Satrin’ity zatovo hameno kibo amin’ny voan-javatra fihinan’ny kisoa, saingy tsy nisy nanome azy. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izay vao nody ny sainy ka hoy izy anakampo: «Ireo mpikaraman’i dada rehetra any izao manan-tsakafo be dia be daholo, fa izaho kosa ity maty mosary atỳ! '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ndeha hody any amin’i dada aho ka hilaza aminy hoe: Dada ô, nanota tamin’Andriamanitra sy taminao aho, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ka tsy mendrika intsony ny hatao hoe zanakao; fa mba ataovy toy ny anankiray amin’ny mpikaramanao aho!» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hany ka nimonomonona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Rangahy io ny mpanota no ifandraisany sy iarahany misakafo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Araka ireo fepetran’ny mpampianatra jiosy, dia manjary maloto izay miara-misakafo amin’ireo malaza ho mpanotabe.
      marker-yv: yv-n
    - type: text
      text: '!'
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia lasa tokoa izy nody any amin-drainy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola lavitra ny trano ilay zatovo, dia tazan-drainy. Onena azy tokoa irainy ka nihazakazaka nitsena, ary namihina ny vozony sy nanoroka azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ity zanany taminy: «Dada ô, nanota tamin’Andriamanitra sy taminao aho, ka tsy mendrika intsony ny hatao hoe zanakao!» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa irainy tamin’ireo mpiasa: «Ento atỳ faingana ny akanjo tsara indrindra ka ampiakanjoy azy; asio peratra ny rantsan-tanany ary asio kapa ny tongony. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alaovy ilay zanak’omby mifahy ka vonoy; ary aoka isika hanao fihinanam-be, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria ity zanako ity: efa maty no velona indray, ary efa very no hita indray!» Dia nanomboka ny fihinanam-be aman-korana izy rehetra.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sendra tany an-tsaha ilay zanany lahimatoa tamin’izay. Nony efa nody izy ka nanakaiky ny trano, dia nandre feon-java-maneno sy olona mandihy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nantsoiny ny mpiasa anankiray ka nanontaniany ny anton’izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’ilay mpiasa hoe: «Tonga ao ny rahalahinao ka nasain-drainao novonoina ilay zanak’omby nafahy satria tafaverina soa aman-tsara eto aminy ny zanany lahy!» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tezitra mafy ny lahimatoa sady tsy nety niditra an-trano. Ka ny rainy mihitsy no lasa tany alatrano hiangavy azy handroso. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izy tamin-drainy: «Jereo ange! Taona firifiry moa izay no nanompoako anao ary tsy mbola nandika ny didinao na oviana na oviana aho; kanefa dia nofy izany hoe mba nomenao zanak’osy iray hiarahako mihinana sy mifaly amin’ny sakaizako. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ho azy Farisianina sy mpahay lalàna no nanaovan’i Jesoa ity fanoharana ity:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony tonga kosa io zanakao io, izay nahafongana ny fanananao tamin’ny vehivavy mpivarotena, dia amonoanao ny zanak’omby nafahy.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny rainy taminy: «Ianao anie, anaka, dia eto amiko mandrakariva ary anao avokoa izay rehetra ahy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy maintsy atao ny fihinanam-be aman-korana, satria io rahalahinao io: efa maty no velona indray, ary efa very no hita indray.»'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lehilahy iza moa, araka ny hevitrareo, no manana ondry zato nahaverezana anankiray, ka tsy hamela eny an-kijàna ny 99 ary hiezaka hitady ilay tokana very mandra-pahitany azy? '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary rehefa hitany, dia entiny eo an-tsoroka an-kafaliana. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia lasa izy mody any an-trano ary vorîny ireo sakaiza sy mpiara-monina ka ilazany hoe: «Miaraha mifaly amiko fa ilay ondriko very dia hitako indray!» '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Toy izany koa, hoy Aho aminareo, hisy hafaliana any an-danitra amin’ny mpanota anankiray monja miala amin’ny toe-dratsiny fa tsy amin’ny olo-marina 99 tsy mila fialana amin’ny toe-dratsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay firavaka very ka hita indray
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Sa vehivavy iza moa no manana vola firavaka folo nahaverezana anankiray, ka tsy hampirehitra jiro sy hamafa trano ary hikaroka tsara mandra-pahitany azy? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hitany, dia vorîny ireo sakaiza sy mpiara-monina ka ilazany hoe: «Miaraha mifaly amiko fa ilay vola firavako very dia hitako indray!» '
