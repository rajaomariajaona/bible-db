    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Manaova voady amin’ny TOMPO Andriamanitrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efao aminy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo firenen-drehetra manodidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitondrà fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ilay Andriamanitra mahatahotra;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
