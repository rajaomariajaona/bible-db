document_id: PSA.76,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Natsahatr’Andriamanitra tao Tsiôna ny ady
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hampiarahina amin’ny valiha. Salamo nataon’i Asafa. Tononkira.
  '10':
  - type: text
    content: fony Ianao nitsangana hilaza ny fanapahan-kevitrao
  - type: text
    content: hamonjy ny malahelo rehetra eto amin’ny tany.
  - type: text
    content: Fiatoana
  '11':
  - type: text
    content: Na dia ny fahatezeran’i Edôma aza
  - type: text
    content: dia hanjary fiderana Anao;
  - type: text
    content: ary ny olona sisa tavela any Hamata
  - type: text
    content: dia hataonao manaiky Anao.
  '12':
  - type: text
    content: Manaova voady amin’ny TOMPO Andriamanitrareo,
  - type: text
    content: ary efao aminy izany;
  - type: text
    content: ianareo firenen-drehetra manodidina,
  - type: text
    content: mitondrà fanatitra
  - type: text
    content: ho an’ilay Andriamanitra mahatahotra;
  '13':
  - type: text
    content: fa Izy no mampiato ny reharehan’ireo andriana
  - type: text
    content: sady mampahatahotra an’ireo mpanjakan’ny tany.
  '2':
  - type: text
    content: Fantatra eo amin’i Joda Andriamanitra;
  - type: text
    content: lehibe eo amin’i Israely ny lazany.
  '3':
  - type: text
    content: Ao Salema
  - type: note
    content: 'Salema: anaran’i Jerosalema nohafohezina; jereo Gen 14.18.'
  - type: text
    content: ' ny trano itoerany'
  - type: text
    content: 'ary ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny fonenany.'
  '4':
  - type: text
    content: Tao no namotehany ny fitaovam-piadiana,
  - type: text
    content: dia ny tsipîka manelatra sy ny ampinga ary ny sabatra.
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Andriamanitra ô, mahatahotra Ianao,
  - type: text
    content: avo manerinerina noho ny tendrombohitra fahagola
  - type: note
    content: Ampit Gen 49.26; Deot 33.15; Hab 3.6.
  - type: text
    content: .
  '6':
  - type: text
    content: Voaroba mbamin’ny miaramila mahery fo,
  - type: text
    content: satria renoky ny torimaso ireo;
  - type: text
    content: ankona tsy nahahetsika avokoa
  - type: text
    content: ireny lehilahy matanjaka ireny
  - type: note
    content: Ampit 2 Mp 19.35.
  - type: text
    content: .
  '7':
  - type: text
    content: Ry Andriamanitr’i Jakôba ô, nandrahona Ianao
  - type: text
    content: ka nitsatoka teo ny soavaly sy ny mpitaingina azy.
  '8':
  - type: text
    content: Eny, mahatahotra tokoa Ianao!
  - type: text
    content: Ka iza no hahajanona eo anoloanao,
  - type: text
    content: rehefa mipoaka ny fahatezeranao?
  '9':
  - type: text
    content: Avy any an-danitra no amoahanao didim-pitsarana;
  - type: text
    content: Andriamanitra ô, raiki-tahotra ny tany ka mangina,
