    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Eny, mahatahotra tokoa Ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka iza no hahajanona eo anoloanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mipoaka ny fahatezeranao?
  '9':
