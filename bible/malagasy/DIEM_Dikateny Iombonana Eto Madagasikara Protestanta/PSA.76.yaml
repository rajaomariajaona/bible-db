      - type: text
        text: '11'
    - type: text
      text: Na dia ny fahatezeran’i Edôma aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanjary fiderana Anao;
  - type: usfm
    marker: q1
