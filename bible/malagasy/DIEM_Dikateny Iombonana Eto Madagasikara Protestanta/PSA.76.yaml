        text: '7'
    - type: text
      text: Ry Andriamanitr’i Jakôba ô, nandrahona Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nitsatoka teo ny soavaly sy ny mpitaingina azy.
  '8':
