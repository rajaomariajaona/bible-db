document_id: EPH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Efa maty isika no velona indray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fahiny ianareo dia maty ara-panahy noho ny fahadisoanareo sy ny fahotanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Niaina araka ny fomban’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' ianareo; narahinareo ilay mpanapaka ny fahefana mifehy eny amin’ny rivotra, dia ilay fanahy izay miasa ankehitriny ao amin’ireo olona tsy manaiky an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izahay rehetra koa dia anisan’ireo olona ireo, fa nanao fitondrantena araka ny filàndratsin’ny maha olona mpanota izahay fahiny ka nanao izay danin’ny kibo sy saim-pantatra. Noho izany toetranay izany, dia natao hiharan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: ' tahaka ny hafa koa izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Kanefa lehibe tokoa ny famindrampon’Andriamanitra, satria fatratra ny fitiavana asehony amintsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka fony mbola maty ara-panahy isika noho ny fahadisoantsika, dia novelominy indray niaraka tamin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. Fahasoavan’Andriamanitra no namonjena anareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa noho isika efa tafaray amin’i Kristy Jesoa, dia niara-natsangan’Andriamanitra ho velona isika sy niara-napetrany any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nataony izany mba hanehoany amin’ny andro ho avy rehetra ny harem-pahasoavany mihoa-pampana, satria mora fo tamintsika Izy tao amin’i Kristy Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny, fahasoavan’Andriamanitra no namonjena anareo, tamin’ny alalan’ny finoana! Ary tsy avy aminareo izany famonjena izany, fa fanomezan’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tsy vokatry ny ezaka vita, fandrao hisy hirehareha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa asan’Andriamanitra isika; Izy no nahary antsika ho tafaray amin’i Kristy Jesoa, mba hanao asa tsara izay voaoman’Andriamanitra rahateo hotontosaintsika amin’ny fiainantsika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Iray ao amin’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ianareo izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ', – dia ianareo antsoin’ny Jiosy hoe «tsy voafora», fa izy ireo miantso ny tenany hoe «voafora» (ilazana famantarana ataon’ny olona amin’ny nofony) –, tsarovy izay nanjo anareo fahiny: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'lavitra an’i Kristy ianareo tamin’izany andro izany; tsy mba navela ho anisan’ilay firenena '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' voafidin’Andriamanitra; tsy mba tao anatin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' izay niorina tamin’ny fampanantenàn’Andriamanitra; velona teto amin’izao tontolo izao ianareo, kanefa sady tsy nanan-kantenaina no tsy nanana an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ankehitriny kosa, ao amin’i Kristy Jesoa, ianareo izay lavitra fahiny dia efa tonga akaiky, noho ny ra nafoin’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Satria i Kristy mihitsy no nampihavana antsika roa tonta, ka nahatonga ny Jiosy sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' ho iray; fa tamin’ny nanoloran’i Kristy ny tenany, dia narodany ny rindrina izay nampisaraka antsika sy nahatonga antsika hifankahala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nofoanan’i Kristy ny lalàna jiosy mbamin’ny didy amam-pitsipiny mba hampiraisany antsika roa tonta amin’ny tenany ka hanaovany antsika ho olom-baovao tokana: toy izany no ahavitan’i Kristy fampihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny nahafatesany teo amin’ny hazofijaliana dia nanafoana ny fifankahalana, ka nanambatra antsika roa tonta ho tena iray ihany sady nampihavana antsika tamin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izany no nahatongavan’i Kristy nitory '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' fampihavanana taminareo hafa firenena izay lavitra an’Andriamanitra sy taminay Jiosy izay akaiky Azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 57.19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa dia amin’ny alalan’i Kristy no ahazoantsika roa tonta manatona an’Andriamanitra Ray noho ny asan’ny Fanahy Masina iray ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Noho izany, tsy olon-ko azy na vahiny intsony ianareo hafa firenena, fa iray zo sy andraikitra amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' sady anisan’ny ankohonan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Taotrano najoron’Andriamanitra ianareo, ka ny fanorenana dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Taotrano... mpaminany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Taotrano arafitra eo ambonin’ny fanorenana vitan’ny apôstôly sy ny mpaminany ianareo.
    marker-yv: yv-n
  - type: text
    text: '; ary i Kristy Jesoa mihitsy no vato fehizoro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ao amin’i Kristy no azo antoka ho mafy ny taotrano manontolo ka misondrotra hatrany mba ho tonga tempoly masina ao amin’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ao amin’i Kristy koa no arafitra miaraka aminay ianareo mba ho tonga trano fonenan’Andriamanitra noho ny asan’ny Fanahy Masina.
