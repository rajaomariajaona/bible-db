document_id: EPH.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Efa maty isika no velona indray
  - type: text
    content: 'Fahiny ianareo dia maty ara-panahy noho ny fahadisoanareo sy ny fahotanareo. '
  '10':
  - type: text
    content: Fa asan’Andriamanitra isika; Izy no nahary antsika ho tafaray amin’i Kristy Jesoa, mba hanao asa tsara izay voaoman’Andriamanitra rahateo hotontosaintsika amin’ny fiainantsika.
  - type: heading
    content: Iray ao amin’i Jesoa Kristy
  '11':
  - type: text
    content: 'Ianareo izay '
  - type: text
    content: hafa firenena
  - type: text
    content: ', – dia ianareo antsoin’ny Jiosy hoe «tsy voafora», fa izy ireo miantso ny tenany hoe «voafora» (ilazana famantarana ataon’ny olona amin’ny nofony) –, tsarovy izay nanjo anareo fahiny: '
  '12':
  - type: text
    content: 'lavitra an’i Kristy ianareo tamin’izany andro izany; tsy mba navela ho anisan’ilay firenena '
  - type: text
    content: Israely
  - type: text
    content: ' voafidin’Andriamanitra; tsy mba tao anatin’ireo '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' izay niorina tamin’ny fampanantenàn’Andriamanitra; velona teto amin’izao tontolo izao ianareo, kanefa sady tsy nanan-kantenaina no tsy nanana an’Andriamanitra. '
  '13':
  - type: text
    content: 'Fa ankehitriny kosa, ao amin’i Kristy Jesoa, ianareo izay lavitra fahiny dia efa tonga akaiky, noho ny ra nafoin’i Kristy. '
  '14':
  - type: text
    content: 'Satria i Kristy mihitsy no nampihavana antsika roa tonta, ka nahatonga ny Jiosy sy ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' ho iray; fa tamin’ny nanoloran’i Kristy ny tenany, dia narodany ny rindrina izay nampisaraka antsika sy nahatonga antsika hifankahala. '
  '15':
  - type: text
    content: 'Nofoanan’i Kristy ny lalàna jiosy mbamin’ny didy amam-pitsipiny mba hampiraisany antsika roa tonta amin’ny tenany ka hanaovany antsika ho olom-baovao tokana: toy izany no ahavitan’i Kristy fampihavanana. '
  '16':
  - type: text
    content: 'Ny nahafatesany teo amin’ny hazofijaliana dia nanafoana ny fifankahalana, ka nanambatra antsika roa tonta ho tena iray ihany sady nampihavana antsika tamin’Andriamanitra. '
  '17':
  - type: text
    content: 'Izany no nahatongavan’i Kristy nitory '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' fampihavanana taminareo hafa firenena izay lavitra an’Andriamanitra sy taminay Jiosy izay akaiky Azy'
  - type: note
    content: Ampit Is 57.19.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Koa dia amin’ny alalan’i Kristy no ahazoantsika roa tonta manatona an’Andriamanitra Ray noho ny asan’ny Fanahy Masina iray ihany.
  '19':
  - type: text
    content: 'Noho izany, tsy olon-ko azy na vahiny intsony ianareo hafa firenena, fa iray zo sy andraikitra amin’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' sady anisan’ny ankohonan’Andriamanitra. '
  '2':
  - type: text
    content: Niaina araka ny fomban’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' ianareo; narahinareo ilay mpanapaka ny fahefana mifehy eny amin’ny rivotra, dia ilay fanahy izay miasa ankehitriny ao amin’ireo olona tsy manaiky an’Andriamanitra. '
  '20':
  - type: text
    content: 'Taotrano najoron’Andriamanitra ianareo, ka ny fanorenana dia ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' sy ny '
  - type: text
    content: mpaminany
  - type: note
    content: 'Taotrano... mpaminany: dkt hafa Taotrano arafitra eo ambonin’ny fanorenana vitan’ny apôstôly sy ny mpaminany ianareo.'
  - type: text
    content: '; ary i Kristy Jesoa mihitsy no vato fehizoro. '
  '21':
  - type: text
    content: 'Ao amin’i Kristy no azo antoka ho mafy ny taotrano manontolo ka misondrotra hatrany mba ho tonga tempoly masina ao amin’ny Tompo. '
  '22':
  - type: text
    content: Ao amin’i Kristy koa no arafitra miaraka aminay ianareo mba ho tonga trano fonenan’Andriamanitra noho ny asan’ny Fanahy Masina.
  '3':
  - type: text
    content: 'Izahay rehetra koa dia anisan’ireo olona ireo, fa nanao fitondrantena araka ny filàndratsin’ny maha olona mpanota izahay fahiny ka nanao izay danin’ny kibo sy saim-pantatra. Noho izany toetranay izany, dia natao hiharan’ny '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' tahaka ny hafa koa izahay.'
  '4':
  - type: text
    content: 'Kanefa lehibe tokoa ny famindrampon’Andriamanitra, satria fatratra ny fitiavana asehony amintsika; '
  '5':
  - type: text
    content: 'ka fony mbola maty ara-panahy isika noho ny fahadisoantsika, dia novelominy indray niaraka tamin’i '
  - type: text
    content: Kristy
  - type: text
    content: '. Fahasoavan’Andriamanitra no namonjena anareo! '
  '6':
  - type: text
    content: 'Fa noho isika efa tafaray amin’i Kristy Jesoa, dia niara-natsangan’Andriamanitra ho velona isika sy niara-napetrany any an-danitra. '
  '7':
  - type: text
    content: 'Nataony izany mba hanehoany amin’ny andro ho avy rehetra ny harem-pahasoavany mihoa-pampana, satria mora fo tamintsika Izy tao amin’i Kristy Jesoa. '
  '8':
  - type: text
    content: 'Eny, fahasoavan’Andriamanitra no namonjena anareo, tamin’ny alalan’ny finoana! Ary tsy avy aminareo izany famonjena izany, fa fanomezan’Andriamanitra; '
  '9':
  - type: text
    content: 'tsy vokatry ny ezaka vita, fandrao hisy hirehareha. '
