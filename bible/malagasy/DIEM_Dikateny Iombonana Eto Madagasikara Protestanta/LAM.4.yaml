document_id: LAM.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zava-doza tamin’ny fanafihana an’i Jerosalema
  - type: text
    content: Indrisy! Nihavasoka ny volamena;
  - type: text
    content: efa nihamatroka ilay metaly tsara;
  - type: text
    content: ireo vatosoa voatokana ho an’ny Tompo
  - type: note
    content: 'vatosoa... Tompo: misy mihevitra fa ireo vatosoa voarakitra tao amin’ny tempoly no lazaina eto. Anisan’ny maneho ny voninahitra nananan’i Jerosalema teo aloha ireny vatosoa sy volamena ireny.'
  - type: text
    content: dia niparitaka teny an-dalambe rehetra teny.
  '10':
  - type: text
    content: Ny reny tokony ho feno fitiavana aza
  - type: text
    content: no nirotsaka nahandro ny zanany;
  - type: text
    content: dia izany no nataony sakafo
  - type: text
    content: tamin’ny fandringanana nahazo ny vahoakako
  - type: note
    content: Jereo 2.20; Deot 28.57; Ezek 5.10.
  - type: text
    content: .
  - type: heading
    content: '*'
  '11':
  - type: text
    content: Nanampatra havinirana ny TOMPO
  - type: text
    content: ka nampitosaka ny fahatezerany mirehitra.
  - type: text
    content: 'Namelona hain-trano tao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' Izy'
  - type: text
    content: handevonana ny fanorenany.
  '12':
  - type: text
    content: Tsy nanampo na ny mpanjakan’ny tany
  - type: text
    content: na ny mponina rehetra amin’izao tontolo izao
  - type: text
    content: fa hiditra ao an-tanànan’i Jerosalema
  - type: text
    content: ny fahavalony ama-mpandrafy azy.
  '13':
  - type: text
    content: 'Fahotan’ny '
  - type: text
    content: mpaminaniny
  - type: text
    content: ' sy heloky ny mpisorony'
  - type: text
    content: izay nahafaty ny mpivavaka marina tao an-tanàna
  - type: text
    content: no nahatonga izany fahavoazana izany.
  '14':
  - type: text
    content: Toy ny jamba eny an-dalambe ry zareo
  - type: text
    content: no niraparapa fandeha sady voahosin-dra;
  - type: text
    content: hany ka voarara ny mikasika ny fitafiany
  - type: note
    content: voarara ny mikasika ny fitafiany; mba ho fanajana ny fitsipika mikasika ny madio sy ny maloto (jereo ny FTS amin’ireo Voambolana roa farany ireo sy ny Nom 35.33).
  - type: text
    content: .
  '15':
  - type: text
    content: 'Rehefa tonga izy, dia misy miantsoantso hoe:'
  - type: text
    content: 'Mihataha ianareo fa '
  - type: text
    content: maloto
  - type: text
    content: ' izy,'
  - type: text
    content: mihataha fa aza manatona azy.
  - type: text
    content: Raha mandositra izy nefa tsy mahita izay haleha
  - type: text
    content: 'dia hoy ny firenen-kafa hoe:'
  - type: text
    content: «Tsy mahazo mijanona ela atỳ amintsika ireo!»
  '16':
  - type: text
    content: Ny TOMPO mihitsy no nampiely azy
  - type: text
    content: fa tsy te hahita azy intsony.
  - type: text
    content: Koa tsy nohajaina ny mpisorona
  - type: text
    content: ary tsy niantrana ny zokiolona.
  - type: heading
    content: '*'
  '17':
  - type: text
    content: Mbola vizana ny masonay
  - type: text
    content: miandry foana ny famonjena.
  - type: text
    content: Nitazana teo an-tilikambo izahay
  - type: text
    content: nanantena firenena tsy hahavonjy.
  '18':
  - type: text
    content: 'Arahi-maso ny fihetsikay:'
  - type: text
    content: Tsy afa-mankeny an-kianjanay akory izahay.
  - type: text
    content: Manakaiky ny fiafaranay, tapitra ny andronay;
  - type: text
    content: eny, migadona ny fiafaranay.
  '19':
  - type: text
    content: Ny mpanenjika anay kosa haingam-pandeha
  - type: text
    content: noho ny voromahery eny an-danitra.
  - type: text
    content: Manenjika anay hatrany an-tendrombohitra izy,
  - type: text
    content: ary manotrika hamely anay any an-taniefitra.
  '2':
  - type: text
    content: 'Indrisy! Ireo vaton’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' izay sarobidy'
  - type: text
    content: sady manan-danja toy ny volamena madio
  - type: text
    content: dia tonga mitovy vidy amin’ny siny tany,
  - type: text
    content: asan-tanan’ny mpanefy tanimanga?
  '20':
  - type: text
    content: Ilay niankinan’ny fiainanay,
  - type: text
    content: ilay mpanjaka nohosoran’ny TOMPO
  - type: text
    content: 'ka mba efa nilazanay hoe:'
  - type: text
    content: «Eo ambany fiarovanao no hanananay toerana
  - type: text
    content: eo anivon’ny firenen-kafa»,
  - type: text
    content: dia indro voafandriky ny longoam-pahavalo
  - type: note
    content: Momba ny fandosirana sy ny fisamborana an’i Tsedekià, mpanjaka farany tao Jerosalema, jereo 2 Mp 25.1; Jer 39.4-5; 52.7-9.
  - type: text
    content: '!'
  - type: heading
    content: '*'
  '21':
  - type: text
    content: Mifalia sy miravoa ianareo,
  - type: text
    content: ry mponin’i Edôma,
  - type: text
    content: izay mitoetra ao amin’ny tanin’i Hotsy;
  - type: text
    content: saingy handalo aminareo koa
  - type: text
    content: ny tsangambavam-panamelohana
  - type: note
    content: 'Tamin’ny naharavan’i Jerosalema ny taona 587 tal J.K. dia mba nandroba tao koa ny Edômita; jereo Ezek 25.12-14; 35; Jl 4.19; Hôb 10.15; Sal 137.7. –Hotsy voalaza koa ao Jôb 1.1, toerana tokony ho any avaratra andrefan’ny saikanosy Arabia. tsangambavam-panamelohana: jereo Jer 25.15-21; Sal 75.9.'
  - type: text
    content: ka ho mamo sy hiboridana ianareo!
  '22':
  - type: text
    content: Efa tapitra ny famaizana anao, ry Tsiôna,
  - type: text
    content: ka tsy hoentina ho babo intsony ianao.
  - type: text
    content: Fa ianao kosa, ry Edôma,
  - type: text
    content: hovalian’ny Tompo ny fahadisoanao,
  - type: text
    content: hovakiny bantsilana ny helokao.
  '3':
  - type: text
    content: Na ny amboadia aza dia manolotra nono
  - type: text
    content: mba hampinonoana ny zanany;
  - type: text
    content: fa ny zanakavavin’ny fireneko kosa tsy mifaditra ovana
  - type: text
    content: tahaka ny vorombe
  - type: note
    content: ny vorombe dia malaza ho reny ratsy satria tsy mba mikotrika fa mamela ny atodiny ho foy taninin’ny hainandro fotsiny; ampit Jôb 39.14-16.
  - type: text
    content: ' any an-taniefitra.'
  '4':
  - type: text
    content: Main’ny hetaheta ireo zaza minono
  - type: text
    content: ka miraikitra amin’ny lanilany ny lelany.
  - type: text
    content: Mitaky mofo ireo ankizy madinika
  - type: text
    content: nefa tsy misy mizara ho azy.
  '5':
  - type: text
    content: Ireo mpihinana hanim-py
  - type: text
    content: dia mitofezaka eny an-dalambe.
  - type: text
    content: Ireo nobeazina tamin’ny fitafiana jaky
  - type: text
    content: dia mihosinkosina eny an-tobim-pako.
  '6':
  - type: text
    content: Lehibe noho ny heloky ny tao Sôdôma
  - type: text
    content: ny fahotan’ny vahoakako;
  - type: text
    content: nefa noravana indray mipi-maso io tanàna io
  - type: note
    content: Momba ny faharavan’i Sôdôma, jereo Gen 19.24-25; Is 1.7,10; Jer 2.3-14.
  - type: text
    content: ka tsy nisy nihetsehana akory.
  '7':
  - type: text
    content: Ny printsiny dia nangatsakatsaka noho ny oram-panala;
  - type: text
    content: fotsy noho ny ronono ny fihodirany,
  - type: text
    content: mavokely noho ny akoran-driaka ny tenany,
  - type: text
    content: ary manga toy ny safira ny lalan-drany.
  '8':
  - type: text
    content: Fa izao kosa dia mainty noho ny arina ny endriny;
  - type: text
    content: ka tsy fantatra intsony izy eny an-dalambe.
  - type: text
    content: Miraikitra amin’ny taolany ny hodiny,
  - type: text
    content: dia hoditra maina toy ny kitay.
  '9':
  - type: text
    content: Aleo lavitra aza matin-tsabatra
  - type: text
    content: toy izay matin’ny mosary
  - type: text
    content: sy mitofezaky ny harerahana
  - type: text
    content: satria tsy misy vokatry ny saha.
