document_id: LAM.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zava-doza tamin’ny fanafihana an’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Nihavasoka ny volamena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nihamatroka ilay metaly tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo vatosoa voatokana ho an’ny Tompo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'vatosoa... Tompo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misy mihevitra fa ireo vatosoa voarakitra tao amin’ny tempoly no lazaina eto. Anisan’ny maneho ny voninahitra nananan’i Jerosalema teo aloha ireny vatosoa sy volamena ireny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia niparitaka teny an-dalambe rehetra teny.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny reny tokony ho feno fitiavana aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nirotsaka nahandro ny zanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izany no nataony sakafo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny fandringanana nahazo ny vahoakako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.20; Deot 28.57; Ezek 5.10.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanampatra havinirana ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampitosaka ny fahatezerany mirehitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Namelona hain-trano tao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' Izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handevonana ny fanorenany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nanampo na ny mpanjakan’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny mponina rehetra amin’izao tontolo izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hiditra ao an-tanànan’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahavalony ama-mpandrafy azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fahotan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminaniny
    - type: text
      text: ' sy heloky ny mpisorony'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nahafaty ny mpivavaka marina tao an-tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahatonga izany fahavoazana izany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny jamba eny an-dalambe ry zareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no niraparapa fandeha sady voahosin-dra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hany ka voarara ny mikasika ny fitafiany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'voarara ny mikasika ny fitafiany; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mba ho fanajana ny fitsipika mikasika ny madio sy ny maloto (jereo ny FTS amin’ireo Voambolana roa farany ireo sy ny Nom 35.33).
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rehefa tonga izy, dia misy miantsoantso hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mihataha ianareo fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihataha fa aza manatona azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mandositra izy nefa tsy mahita izay haleha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hoy ny firenen-kafa hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy mahazo mijanona ela atỳ amintsika ireo!»
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO mihitsy no nampiely azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy te hahita azy intsony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy nohajaina ny mpisorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy niantrana ny zokiolona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola vizana ny masonay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miandry foana ny famonjena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitazana teo an-tilikambo izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanantena firenena tsy hahavonjy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arahi-maso ny fihetsikay:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy afa-mankeny an-kianjanay akory izahay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manakaiky ny fiafaranay, tapitra ny andronay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, migadona ny fiafaranay.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanenjika anay kosa haingam-pandeha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny voromahery eny an-danitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manenjika anay hatrany an-tendrombohitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manotrika hamely anay any an-taniefitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indrisy! Ireo vaton’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' izay sarobidy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manan-danja toy ny volamena madio
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga mitovy vidy amin’ny siny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asan-tanan’ny mpanefy tanimanga?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay niankinan’ny fiainanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay mpanjaka nohosoran’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka mba efa nilazanay hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Eo ambany fiarovanao no hanananay toerana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anivon’ny firenen-kafa»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia indro voafandriky ny longoam-pahavalo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny fandosirana sy ny fisamborana an’i Tsedekià, mpanjaka farany tao Jerosalema, jereo 2 Mp 25.1; Jer 39.4-5; 52.7-9.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifalia sy miravoa ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponin’i Edôma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitoetra ao amin’ny tanin’i Hotsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy handalo aminareo koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tsangambavam-panamelohana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tamin’ny naharavan’i Jerosalema ny taona 587 tal J.K. dia mba nandroba tao koa ny Edômita; jereo Ezek 25.12-14; 35; Jl 4.19; Hôb 10.15; Sal 137.7. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –Hotsy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' voalaza koa ao Jôb 1.1, toerana tokony ho any avaratra andrefan’ny saikanosy Arabia. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'tsangambavam-panamelohana:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Jer 25.15-21; Sal 75.9.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho mamo sy hiboridana ianareo!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tapitra ny famaizana anao, ry Tsiôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hoentina ho babo intsony ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianao kosa, ry Edôma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovalian’ny Tompo ny fahadisoanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovakiny bantsilana ny helokao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny amboadia aza dia manolotra nono
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampinonoana ny zanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny zanakavavin’ny fireneko kosa tsy mifaditra ovana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny vorombe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny vorombe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia malaza ho reny ratsy satria tsy mba mikotrika fa mamela ny atodiny ho foy taninin’ny hainandro fotsiny; ampit Jôb 39.14-16.
      marker-yv: yv-n
    - type: text
      text: ' any an-taniefitra.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Main’ny hetaheta ireo zaza minono
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miraikitra amin’ny lanilany ny lelany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitaky mofo ireo ankizy madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy misy mizara ho azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo mpihinana hanim-py
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mitofezaka eny an-dalambe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo nobeazina tamin’ny fitafiana jaky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mihosinkosina eny an-tobim-pako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe noho ny heloky ny tao Sôdôma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahotan’ny vahoakako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa noravana indray mipi-maso io tanàna io
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny faharavan’i Sôdôma, jereo Gen 19.24-25; Is 1.7,10; Jer 2.3-14.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nisy nihetsehana akory.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny printsiny dia nangatsakatsaka noho ny oram-panala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fotsy noho ny ronono ny fihodirany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mavokely noho ny akoran-driaka ny tenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manga toy ny safira ny lalan-drany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izao kosa dia mainty noho ny arina ny endriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy fantatra intsony izy eny an-dalambe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miraikitra amin’ny taolany ny hodiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hoditra maina toy ny kitay.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo lavitra aza matin-tsabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay matin’ny mosary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mitofezaky ny harerahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy misy vokatry ny saha.
