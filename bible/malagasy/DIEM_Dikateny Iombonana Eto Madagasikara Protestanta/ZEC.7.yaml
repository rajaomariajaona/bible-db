document_id: ZEC.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifadian-kanina fahatsiarovana ny faharavàn’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary tamin’ny taona fahefatra nanjakan’i Dariôsa, fony andro fahefatry ny volana fahasivy na ny volana Kisleo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe tamin’ny novambra 518 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', no nisy hafatry ny TOMPO tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny mponin’i Betela dia efa naniraka an’i Saretsera sy i Regema Melèka mbamin’ny olony hifona amin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ireo no voatendry hanontany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' niasa tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: 'n’izao rehetra izao ary hanontany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mbola hitomany sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hifady hanina
  - type: text
    text: ' amin’ny volana fahadimy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny solotena izay tonga tany Jerosalema dia tsy maintsy nanontany ireo mpisorona mikasika ny fifadian-kanina (and 5) tanterahina isan-taona tamin’ny volana fahadimy, izany hoe tamin’ny fitsingerenan’ny nandravana ny tempoly (2 Mp 25.8-9). Ireo asa fanamboarana dia efa nanomboka (Hag 2.18; Zak 4.7,9), koa mbola ilaina ve ny hitanana ny fanao amin’io fahatsiarovana io (jereo nta Hag 2.11).
    marker-yv: yv-n
  - type: text
    text: ' toy ny efa fanaonay hatramin’ny ela ihany va izahay?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa nisy baikon’ny TOMPOn’izao rehetra izao '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'nampitondra ahy ny valin-teniny ho an’ny mpisorona sy ho an’ny mponina rehetra teo amin’ny tany nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hatramin’izay fitopolo taona izay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha nifady hanina sy nitomany
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny volana fahadimy sy fahafito
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'tamin’ny volana fahafito:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe ny fitsingerenan’ny namonoana an’i Gedalià (2 Mp 25.25); Jer 41.1-3.
    marker-yv: yv-n
  - type: text
    text: ' ianareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa ho Ahy va no nanaovanareo izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary raha nihinana sy nisotro ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa tsy ho an’ny tenanareo va
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanaovanareo izany?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fahiny efa niteny toy izany tamin’ny alalan’ireo mpaminany ny TOMPO, fony mbola nandry fahalemana ny mponin’i Jerosalema sy ny tanàna manodidina, ary mbola nonenana koa ny faritany atsimo sy ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Ary nisy baikon’ny TOMPOn’izao rehetra izao mba hampahatsiahivako izay efa nambarany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Manaova fitsarana marina ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samia mifankatia sy mifamindrafo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary aza mampahory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpitondratena na ny kamboty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na koa ny vahiny na ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mba mihevitra hanisy ratsy ny namany.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa tsy nety nihaino izany ny olona; fa nanainga soroka ho fandavana izy sady nanentsin-tadiny mba tsy handre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, nanao ny fony ho mafy toy ny diamondra izy ka tsy nety nihaino ny fampianaran’ilay TOMPOn’izao rehetra izao, dia ny teny izay nampilazan’ny Fanahiny tamin’alalan’ny mpaminany fahiny. Noho izany tezitra mafy ny Tompon’izao rehetra izao, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Satria tsy nety nihaino izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mba nanao antso avo taminy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mba nihaino azy kosa Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mba niantso vonjy tamiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa naeliko ho any amin’ny firenena isan-tokony
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsy fantany akory izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tany lao no sisa navelany taoriany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nivezivezen’olona intsony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ilay taniny nahafinaritra iny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nataony tonga taniefitra.»
