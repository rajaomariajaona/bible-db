document_id: ZEC.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fifadian-kanina fahatsiarovana ny faharavàn’i Jerosalema
  - type: text
    content: Ary tamin’ny taona fahefatra nanjakan’i Dariôsa, fony andro fahefatry ny volana fahasivy na ny volana Kisleo
  - type: note
    content: Izany hoe tamin’ny novambra 518 tal J.K.
  - type: text
    content: ', no nisy hafatry ny TOMPO tamiko. '
  '10':
  - type: text
    content: Ary aza mampahory
  - type: text
    content: ny mpitondratena na ny kamboty,
  - type: text
    content: na koa ny vahiny na ny mahantra.
  - type: text
    content: Aza mba mihevitra hanisy ratsy ny namany.»
  '11':
  - type: text
    content: 'Kanefa tsy nety nihaino izany ny olona; fa nanainga soroka ho fandavana izy sady nanentsin-tadiny mba tsy handre. '
  '12':
  - type: text
    content: 'Eny, nanao ny fony ho mafy toy ny diamondra izy ka tsy nety nihaino ny fampianaran’ilay TOMPOn’izao rehetra izao, dia ny teny izay nampilazan’ny Fanahiny tamin’alalan’ny mpaminany fahiny. Noho izany tezitra mafy ny Tompon’izao rehetra izao, '
  '13':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: «Satria tsy nety nihaino izy
  - type: text
    content: rehefa mba nanao antso avo taminy Aho,
  - type: text
    content: dia tsy mba nihaino azy kosa Aho
  - type: text
    content: rehefa mba niantso vonjy tamiko izy.
  '14':
  - type: text
    content: Fa naeliko ho any amin’ny firenena isan-tokony
  - type: text
    content: izay tsy fantany akory izy.
  - type: text
    content: Tany lao no sisa navelany taoriany,
  - type: text
    content: ka tsy nivezivezen’olona intsony.
  - type: text
    content: Ary ilay taniny nahafinaritra iny
  - type: text
    content: dia nataony tonga taniefitra.»
  '2':
  - type: text
    content: 'Ny mponin’i Betela dia efa naniraka an’i Saretsera sy i Regema Melèka mbamin’ny olony hifona amin’ny TOMPO. '
  '3':
  - type: text
    content: 'Ireo no voatendry hanontany ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' niasa tao amin’ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: 'n’izao rehetra izao ary hanontany ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: '–Mbola hitomany sy '
  - type: text
    content: hifady hanina
  - type: text
    content: ' amin’ny volana fahadimy'
  - type: note
    content: Ny solotena izay tonga tany Jerosalema dia tsy maintsy nanontany ireo mpisorona mikasika ny fifadian-kanina (and 5) tanterahina isan-taona tamin’ny volana fahadimy, izany hoe tamin’ny fitsingerenan’ny nandravana ny tempoly (2 Mp 25.8-9). Ireo asa fanamboarana dia efa nanomboka (Hag 2.18; Zak 4.7,9), koa mbola ilaina ve ny hitanana ny fanao amin’io fahatsiarovana io (jereo nta Hag 2.11).
  - type: text
    content: ' toy ny efa fanaonay hatramin’ny ela ihany va izahay?'
  '4':
  - type: text
    content: 'Koa nisy baikon’ny TOMPOn’izao rehetra izao '
  '5':
  - type: text
    content: 'nampitondra ahy ny valin-teniny ho an’ny mpisorona sy ho an’ny mponina rehetra teo amin’ny tany nanao hoe:'
  - type: text
    content: «Hatramin’izay fitopolo taona izay,
  - type: text
    content: raha nifady hanina sy nitomany
  - type: text
    content: tamin’ny volana fahadimy sy fahafito
  - type: note
    content: 'tamin’ny volana fahafito: izany hoe ny fitsingerenan’ny namonoana an’i Gedalià (2 Mp 25.25); Jer 41.1-3.'
  - type: text
    content: ' ianareo,'
  - type: text
    content: moa ho Ahy va no nanaovanareo izany?
  '6':
  - type: text
    content: Ary raha nihinana sy nisotro ianareo,
  - type: text
    content: moa tsy ho an’ny tenanareo va
  - type: text
    content: no nanaovanareo izany?»
  '7':
  - type: text
    content: 'Fahiny efa niteny toy izany tamin’ny alalan’ireo mpaminany ny TOMPO, fony mbola nandry fahalemana ny mponin’i Jerosalema sy ny tanàna manodidina, ary mbola nonenana koa ny faritany atsimo sy ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: .
  '8':
  - type: text
    content: 'Ary nisy baikon’ny TOMPOn’izao rehetra izao mba hampahatsiahivako izay efa nambarany hoe:'
  - type: text
    content: «Manaova fitsarana marina ianareo,
  - type: text
    content: samia mifankatia sy mifamindrafo.
