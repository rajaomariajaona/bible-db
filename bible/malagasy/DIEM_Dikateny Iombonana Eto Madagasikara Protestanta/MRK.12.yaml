document_id: MRK.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana ny amin’ilay tompo-tanimboaloboka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 21.33-46; Lk 20.9-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' indray no nitenenan’i Jesoa tamin’ireo lohandoha-mpisorona sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ', ka hoy Izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nisy lehilahy nanamboatra tanimboaloboka sy namefy azy manodidina ary nanao lavaka famiazam-bokatra sy tilikambo fiambenana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 5.1-2.
    marker-yv: yv-n
  - type: text
    text: ', dia nampanofa azy tamina mpamboly ary lasa nankany an-tany hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony tonga ny taom-piotazana, dia nanirahany mpiasa ireo mpamboly handray ny ampaham-bokatry ny tanimboaloboka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa nosamborin’ireo ilay mpiasa dia nokapohiny ary nalefany nody maina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanirahany mpiasa iray hafa indray ireo mpamboly; fa io koa nokapohin’ireo ny lohany sady nalany baràka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia mbola nanirahany iray hafa indray; fa io kosa novonoiny ho faty. Ary nisy mpiasa maro hafa koa nirahiny, fa ny sasany nokapohin-dry zareo, ary ny sasany novonoiny ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Olona iray sisa teo amin’ilay tompon’ny tanimboaloboka, dia ny zanany malalany; ka nirahiny tany koa io nony farany, fa hoy ilay tompon’ny tanimboaloboka hoe: «Hananan’ireo hena-maso ny zanako!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saingy nifampiresaka ireo mpamboly nanao hoe: «Ny mpandova ity, ka ndeha hovonoina, dia ho antsika ny lova.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nosamborin’ireo mpamboly izy ka novonoiny ho faty ary natsipiny tany ivelan’ny tanimboaloboka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nofaranan’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona àry no hataon’ilay tompon’ny tanimboaloboka? Ho avy izy ka ny mpamboly haringany ary ny tanimboaloboka homeny olon-kafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy novakînareo angaha ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny vato nolavin’ny mpanao trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanjary vato fehizoro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avy amin’ny Tompo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary dia zava-mahagaga eto ambany masontsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 118.22-23.
    marker-yv: yv-n
  - type: text
    text: »?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nitady hisambotra an’i Jesoa ry zareo, satria nahatsapa ho niantefan’izany fanoharana nataony izany; saingy ny vahoaka no natahorany ka navelany teo i Jesoa fa lasa ry zareo nandeha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fandoavan-ketra ho an’ny amperôra rômanina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 22.15-22; Lk 20.20-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nisy iraka sasantsasany avy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôdianina
  - type: text
    text: ' nankeo amin’i Jesoa hamandrika Azy amin’ny fanontaniana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka nony tonga teo ry zareo, dia nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, fantatray fa milaza ny marina Ianao sady tsy mampaninona anao izay mety ho hevitry ny hafa, ary tsy mizaha tavan’olona Ianao fa mampianatra tsotra ny lalana soritan’Andriamanitra. Koa azonay atao ve ny mandoa hetra ho an’ny amperôra rômanina sa tsia? Tokony handoa izahay sa tsy handoa?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fantatr’i Jesoa anefa ny fihatsarambelatsihin’ireo, ka hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no maka fanahy Ahy ianareo? Itondray vola '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denàry
  - type: text
    text: ' anankiray Aho hojereko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nitondrany, ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sarin’iza io ary anaran’iza?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –An’ny amperôra rômanina!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avereno amin’ny amperôra rômanina izay an’ny amperôra rômanina ary amin’Andriamanitra izay an’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia gaga tamin’i Jesoa ireto iraka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anontaniana momba ny fitsanganan’ny maty ho velona i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 22.23-33; Lk 20.27-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsadoseanina
  - type: text
    text: ', izay milaza fa tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitsanganan’ny maty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 23.8.
    marker-yv: yv-n
  - type: text
    text: ' ho velona, dia mba nisy nanatona an’i Jesoa ka nanontany Azy hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '–Mpampianatra ô, izao no didy voasoratra nomen’i Mosesy antsika: «Raha misy lehilahy maty namela vady nefa tsy namela taranaka, dia aoka ny rahalahiny hampakatra an-dravehivavy, mba hiteraka hamela solofo ho an’ny maty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 25.5-6.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa nisy àry olona fito mirahalahy. Nampaka-bady ny lahimatoa, kanjo maty tsy namela solofo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nampakatra an-dravehivavy ny faharoa, kanjo maty tsy namela solofo; dia toy izany koa ny fahatelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia samy tsy nisy namela solofo izy fito mirahalahy. Taorian’izy rehetra dia maty koa ravehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Amin’ny fitsanganan’ny maty àry, [raha hitsangana velona tokoa ny maty], mba ho vadin’iza ravehivavy fa efa samy nanambady azy avokoa izy fito mirahalahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Jesoa tamin’ireo Tsadoseanina:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy izany tokoa ve no mahadiso hevitra anareo, fa tsy misy fantatrareo na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' na ny herin’Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa hitsangana velona ny maty, dia tsy hisy olona hampaka-bady na hampakarina intsony, fa samy hitovy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' any an-danitra avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny amin’ny hoe hitsangana ho velona ny maty, moa tsy novakînareo ao amin’ny bokin’i Mosesy ve ny toko momba ny Roimemy? Fa ao no nitenenan’Andriamanitra tamin’i Mosesy hoe: «Izaho no Andriamanitr’i Abrahama sy Andriamanitr’i Itsehàka ary Andriamanitr’i Jakôba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 3.2,6.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy Andriamanitry ny maty Izy fa Andriamanitry ny velona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe na ireo maty manana an’Andriamanitra aza dia velona tokoa.
    marker-yv: yv-n
  - type: text
    text: . Koa tena diso hevitra ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny didy lehibe indrindra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 22.34-40; Lk 10.25-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' anankiray nahare izany ady hevitra izany sady nahita fa namaly tsara an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsadoseanina
  - type: text
    text: ' i Jesoa. Dia nanatona an’i Jesoa ity mpahay lalàna ka nanontany Azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no voalohany amin’ny didy rehetra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no voalohany: «Mihainoa, ry Israely: ny Tompo Andriamanitsika no Tompo tokana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny Tompo... Tompo tokana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny Tompo no Andriamanitsika, ny Tompo irery ihany.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa tiavo ny Tompo Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo, amin’ny sainao manontolo, ary amin’ny herinao manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deot 6.4-5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary izao no faharoa: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lev 19.18.
    marker-yv: yv-n
  - type: text
    text: .» Tsy misy didy hafa lehibe noho ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ka hoy ilay mpahay lalàna tamin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, tsara izany ary marina ny filàzanao fa tokana Andriamanitra ary tsy misy afa-tsy Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 4.35.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ka ny mitia Azy amin’ny fo manontolo sy amin’ny saina manontolo ary amin’ny hery manontolo, sy ny mitia namana tahaka ny itiavana ny tena dia manoatra lavitra noho ny biby dorana eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' sy ny sorona isan-karazany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Hôs 6.6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nony hitan’i Jesoa fa namaly tamim-pahendrena ilay mpahay lalàna, dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy lavitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ' ianao!'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary dia tsy nisy sahy nanontany Azy intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanontaniana ny amin’ny hoe «Zanak’i Davida»
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 22.41-46; Lk 20.41-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Raha ilay nampianatra teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' iny i Jesoa, dia niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ahoana no ilazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' fa hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’i Davida
  - type: text
    text: ' ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Kanefa tenan’i Davida, rehefa nohazavain’ny Fanahy Masina, no nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny Tompo Andriamanitra dia niteny hentitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tamin’ny Mpanjaka Tompoko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha amin’ny sezafiandrianana eto ankavanako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho kosa hanao ny fahavalonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fitoeran-tongotrao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.36 '
