document_id: MRK.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ilay tompo-tanimboaloboka
  - type: heading
    content: (Jereo Mt 21.33-46; Lk 20.9-19)
  - type: text
    content: 'Ary dia '
  - type: text
    content: fanoharana
  - type: text
    content: ' indray no nitenenan’i Jesoa tamin’ireo lohandoha-mpisorona sy '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' ary '
  - type: text
    content: loholona
  - type: text
    content: ', ka hoy Izy:'
  - type: text
    content: –Nisy lehilahy nanamboatra tanimboaloboka sy namefy azy manodidina ary nanao lavaka famiazam-bokatra sy tilikambo fiambenana
  - type: note
    content: Ampit Is 5.1-2.
  - type: text
    content: ', dia nampanofa azy tamina mpamboly ary lasa nankany an-tany hafa. '
  '10':
  - type: text
    content: 'Tsy novakînareo angaha ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' manao hoe:'
  - type: text
    content: «Ny vato nolavin’ny mpanao trano
  - type: text
    content: no nanjary vato fehizoro;
  '11':
  - type: text
    content: Avy amin’ny Tompo izao,
  - type: text
    content: ary dia zava-mahagaga eto ambany masontsika
  - type: note
    content: Sal 118.22-23.
  - type: text
    content: »?
  '12':
  - type: text
    content: Ary nitady hisambotra an’i Jesoa ry zareo, satria nahatsapa ho niantefan’izany fanoharana nataony izany; saingy ny vahoaka no natahorany ka navelany teo i Jesoa fa lasa ry zareo nandeha.
  - type: heading
    content: Ny fandoavan-ketra ho an’ny amperôra rômanina
  - type: heading
    content: (Jereo Mt 22.15-22; Lk 20.20-26)
  '13':
  - type: text
    content: 'Nisy iraka sasantsasany avy amin’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' sy ny '
  - type: text
    content: Herôdianina
  - type: text
    content: ' nankeo amin’i Jesoa hamandrika Azy amin’ny fanontaniana; '
  '14':
  - type: text
    content: 'ka nony tonga teo ry zareo, dia nanao taminy hoe:'
  - type: text
    content: –Mpampianatra ô, fantatray fa milaza ny marina Ianao sady tsy mampaninona anao izay mety ho hevitry ny hafa, ary tsy mizaha tavan’olona Ianao fa mampianatra tsotra ny lalana soritan’Andriamanitra. Koa azonay atao ve ny mandoa hetra ho an’ny amperôra rômanina sa tsia? Tokony handoa izahay sa tsy handoa?
  '15':
  - type: text
    content: 'Fantatr’i Jesoa anefa ny fihatsarambelatsihin’ireo, ka hoy Izy taminy:'
  - type: text
    content: '–Nahoana no maka fanahy Ahy ianareo? Itondray vola '
  - type: text
    content: denàry
  - type: text
    content: ' anankiray Aho hojereko.'
  '16':
  - type: text
    content: 'Dia nitondrany, ka hoy i Jesoa taminy:'
  - type: text
    content: –Sarin’iza io ary anaran’iza?
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –An’ny amperôra rômanina!
  '17':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: –Avereno amin’ny amperôra rômanina izay an’ny amperôra rômanina ary amin’Andriamanitra izay an’Andriamanitra.
  - type: text
    content: Dia gaga tamin’i Jesoa ireto iraka.
  - type: heading
    content: Anontaniana momba ny fitsanganan’ny maty ho velona i Jesoa
  - type: heading
    content: (Jereo Mt 22.23-33; Lk 20.27-40)
  '18':
  - type: text
    content: 'Ireo '
  - type: text
    content: Tsadoseanina
  - type: text
    content: ', izay milaza fa tsy misy '
  - type: text
    content: fitsanganan’ny maty
  - type: note
    content: Ampit Asa 23.8.
  - type: text
    content: ' ho velona, dia mba nisy nanatona an’i Jesoa ka nanontany Azy hoe:'
  '19':
  - type: text
    content: '–Mpampianatra ô, izao no didy voasoratra nomen’i Mosesy antsika: «Raha misy lehilahy maty namela vady nefa tsy namela taranaka, dia aoka ny rahalahiny hampakatra an-dravehivavy, mba hiteraka hamela solofo ho an’ny maty'
  - type: note
    content: Jereo Deot 25.5-6.
  - type: text
    content: '.» '
  '2':
  - type: text
    content: 'Nony tonga ny taom-piotazana, dia nanirahany mpiasa ireo mpamboly handray ny ampaham-bokatry ny tanimboaloboka. '
  '20':
  - type: text
    content: 'Koa nisy àry olona fito mirahalahy. Nampaka-bady ny lahimatoa, kanjo maty tsy namela solofo. '
  '21':
  - type: text
    content: 'Dia nampakatra an-dravehivavy ny faharoa, kanjo maty tsy namela solofo; dia toy izany koa ny fahatelo. '
  '22':
  - type: text
    content: 'Dia samy tsy nisy namela solofo izy fito mirahalahy. Taorian’izy rehetra dia maty koa ravehivavy. '
  '23':
  - type: text
    content: Amin’ny fitsanganan’ny maty àry, [raha hitsangana velona tokoa ny maty], mba ho vadin’iza ravehivavy fa efa samy nanambady azy avokoa izy fito mirahalahy?
  '24':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ireo Tsadoseanina:'
  - type: text
    content: '–Tsy izany tokoa ve no mahadiso hevitra anareo, fa tsy misy fantatrareo na ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' na ny herin’Andriamanitra? '
  '25':
  - type: text
    content: 'Rehefa hitsangana velona ny maty, dia tsy hisy olona hampaka-bady na hampakarina intsony, fa samy hitovy amin’ny '
  - type: text
    content: anjely
  - type: text
    content: ' any an-danitra avokoa. '
  '26':
  - type: text
    content: 'Ary ny amin’ny hoe hitsangana ho velona ny maty, moa tsy novakînareo ao amin’ny bokin’i Mosesy ve ny toko momba ny Roimemy? Fa ao no nitenenan’Andriamanitra tamin’i Mosesy hoe: «Izaho no Andriamanitr’i Abrahama sy Andriamanitr’i Itsehàka ary Andriamanitr’i Jakôba'
  - type: note
    content: Jereo Eks 3.2,6.
  - type: text
    content: '!» '
  '27':
  - type: text
    content: Tsy Andriamanitry ny maty Izy fa Andriamanitry ny velona
  - type: note
    content: Izany hoe na ireo maty manana an’Andriamanitra aza dia velona tokoa.
  - type: text
    content: . Koa tena diso hevitra ianareo.
  - type: heading
    content: Ny didy lehibe indrindra
  - type: heading
    content: (Jereo Mt 22.34-40; Lk 10.25-28)
  '28':
  - type: text
    content: 'Ary nisy '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' anankiray nahare izany ady hevitra izany sady nahita fa namaly tsara an’ireo '
  - type: text
    content: Tsadoseanina
  - type: text
    content: ' i Jesoa. Dia nanatona an’i Jesoa ity mpahay lalàna ka nanontany Azy hoe:'
  - type: text
    content: –Inona no voalohany amin’ny didy rehetra?
  '29':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Izao no voalohany: «Mihainoa, ry Israely: ny Tompo Andriamanitsika no Tompo tokana'
  - type: note
    content: 'Ny Tompo... Tompo tokana: dkt hafa Ny Tompo no Andriamanitsika, ny Tompo irery ihany.'
  - type: text
    content: '.» '
  '3':
  - type: text
    content: 'Fa nosamborin’ireo ilay mpiasa dia nokapohiny ary nalefany nody maina. '
  '30':
  - type: text
    content: Koa tiavo ny Tompo Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo, amin’ny sainao manontolo, ary amin’ny herinao manontolo
  - type: note
    content: Deot 6.4-5.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Ary izao no faharoa: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: note
    content: Lev 19.18.
  - type: text
    content: .» Tsy misy didy hafa lehibe noho ireo.
  '32':
  - type: text
    content: 'Ka hoy ilay mpahay lalàna tamin’i Jesoa:'
  - type: text
    content: –Mpampianatra ô, tsara izany ary marina ny filàzanao fa tokana Andriamanitra ary tsy misy afa-tsy Izy
  - type: note
    content: Ampit Deot 4.35.
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Ka ny mitia Azy amin’ny fo manontolo sy amin’ny saina manontolo ary amin’ny hery manontolo, sy ny mitia namana tahaka ny itiavana ny tena dia manoatra lavitra noho ny biby dorana eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' sy ny sorona isan-karazany'
  - type: note
    content: Ampit Hôs 6.6.
  - type: text
    content: .
  '34':
  - type: text
    content: 'Nony hitan’i Jesoa fa namaly tamim-pahendrena ilay mpahay lalàna, dia nilazany hoe:'
  - type: text
    content: '–Tsy lavitra ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' ianao!'
  - type: text
    content: Ary dia tsy nisy sahy nanontany Azy intsony.
  - type: heading
    content: Fanontaniana ny amin’ny hoe «Zanak’i Davida»
  - type: heading
    content: (Jereo Mt 22.41-46; Lk 20.41-44)
  '35':
  - type: text
    content: Raha ilay nampianatra teo an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' iny i Jesoa, dia niteny hoe:'
  - type: text
    content: '–Ahoana no ilazan’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' fa hoe '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: ' ny '
  - type: text
    content: Mesia
  - type: text
    content: '? '
  '36':
  - type: text
    content: 'Kanefa tenan’i Davida, rehefa nohazavain’ny Fanahy Masina, no nanao hoe:'
  - type: text
    content: «Ny Tompo Andriamanitra dia niteny hentitra
  - type: text
    content: 'tamin’ny Mpanjaka Tompoko hoe:'
  - type: text
    content: Mipetraha amin’ny sezafiandrianana eto ankavanako;
  - type: text
    content: Izaho kosa hanao ny fahavalonao
  - type: text
    content: ho fitoeran-tongotrao
  - type: note
    content: Sal 110.1.
  - type: text
    content: .»
  '37':
  - type: text
    content: Tenan’i Davida izany no manao ny Mesia hoe «Tompoko», ka ahoana no maha Zanak’i Davida Azy?
  - type: text
    content: Ary faly ny vahoaka maro nihaino an’i Jesoa.
  - type: heading
    content: Mampitandrina ny amin’ny mpahay lalàna i Jesoa
  - type: heading
    content: (Jereo Mt 23.1-36; Lk 20.45-47)
  '38':
  - type: text
    content: 'Hoy koa i Jesoa tamin’ny fampianarany hoe:'
  - type: text
    content: '–Mitandrema amin’ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: '. Ny tiany dia ny mandehandeha eny amin’ny '
  - type: text
    content: lala-mitafo
  - type: text
    content: 'n’ny tempoly sy ny arahabaina eny an-kianja, '
  '39':
  - type: text
    content: 'ny mipetraka eny aloha ao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' ary ny maka toeram-boninahitra any amin’ny fanasana. '
  '4':
  - type: text
    content: 'Dia nanirahany mpiasa iray hafa indray ireo mpamboly; fa io koa nokapohin’ireo ny lohany sady nalany baràka. '
  '40':
  - type: text
    content: 'Ataony tapitra ny fananan’ny mpitondratena, ary vavaka lavareny no mody ataony hisehosehoana: ireny olona ireny dia hohelohina mafimafy kokoa.'
  - type: heading
    content: Ny fanomezan’ilay vehivavy mpitondratena
  - type: heading
    content: (Jereo Lk 21.1-4)
  '41':
  - type: text
    content: 'Nipetraka nanandrify ny vata fitoeran-drakitra i Jesoa nandinika ny fomba fandrotsahan’ny vahoaka vola tao; ary maro ny mpanankarena nandrotsaka betsaka. '
  '42':
  - type: text
    content: Dia tonga ity vehivavy mpitondratena mahantra, nandrotsaka vola madinika roa ankevitry ny ariary anankiroa
  - type: note
    content: 'Leptoa anankiroa, hoy ny rijan-teny grika fototra: ny leptoa no vola farany madinika fahizany.'
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Dia nantsoin’i Jesoa ireo '
  - type: text
    content: mpianany
  - type: text
    content: ' ka nilazany hoe:'
  - type: text
    content: '–Lazaiko marina aminareo fa io vehivavy mpitondratena mahantra io no nandrotsaka be indrindra tamin’ny olona nandrotsa-bola tao amin’ny vata fitoeran-drakitra. '
  '44':
  - type: text
    content: Satria ireo rehetra ireo dia nandrotsaka ny ambim-bavany; fa ravehivavy io kosa, na fadiranovana toy inona aza, dia nandrotsaka izay rehetra nananany, izany hoe ny fivelomany manontolo.
  '5':
  - type: text
    content: 'Dia mbola nanirahany iray hafa indray; fa io kosa novonoiny ho faty. Ary nisy mpiasa maro hafa koa nirahiny, fa ny sasany nokapohin-dry zareo, ary ny sasany novonoiny ho faty. '
  '6':
  - type: text
    content: 'Olona iray sisa teo amin’ilay tompon’ny tanimboaloboka, dia ny zanany malalany; ka nirahiny tany koa io nony farany, fa hoy ilay tompon’ny tanimboaloboka hoe: «Hananan’ireo hena-maso ny zanako!» '
  '7':
  - type: text
    content: 'Saingy nifampiresaka ireo mpamboly nanao hoe: «Ny mpandova ity, ka ndeha hovonoina, dia ho antsika ny lova.» '
  '8':
  - type: text
    content: Dia nosamborin’ireo mpamboly izy ka novonoiny ho faty ary natsipiny tany ivelan’ny tanimboaloboka.
  '9':
  - type: text
    content: 'Dia nofaranan’i Jesoa hoe:'
  - type: text
    content: '–Inona àry no hataon’ilay tompon’ny tanimboaloboka? Ho avy izy ka ny mpamboly haringany ary ny tanimboaloboka homeny olon-kafa. '
