  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tenan’i Davida izany no manao ny Mesia hoe «Tompoko», ka ahoana no maha Zanak’i Davida Azy?
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary faly ny vahoaka maro nihaino an’i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampitandrina ny amin’ny mpahay lalàna i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 23.1-36; Lk 20.45-47)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hoy koa i Jesoa tamin’ny fampianarany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mitandrema amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: '. Ny tiany dia ny mandehandeha eny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lala-mitafo
  - type: text
    text: 'n’ny tempoly sy ny arahabaina eny an-kianja, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ny mipetraka eny aloha ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' ary ny maka toeram-boninahitra any amin’ny fanasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ataony tapitra ny fananan’ny mpitondratena, ary vavaka lavareny no mody ataony hisehosehoana: ireny olona ireny dia hohelohina mafimafy kokoa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanomezan’ilay vehivavy mpitondratena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 21.1-4)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Nipetraka nanandrify ny vata fitoeran-drakitra i Jesoa nandinika ny fomba fandrotsahan’ny vahoaka vola tao; ary maro ny mpanankarena nandrotsaka betsaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Dia tonga ity vehivavy mpitondratena mahantra, nandrotsaka vola madinika roa ankevitry ny ariary anankiroa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.42 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Leptoa anankiroa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hoy ny rijan-teny grika fototra: ny leptoa no vola farany madinika fahizany.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia nantsoin’i Jesoa ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina aminareo fa io vehivavy mpitondratena mahantra io no nandrotsaka be indrindra tamin’ny olona nandrotsa-bola tao amin’ny vata fitoeran-drakitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Satria ireo rehetra ireo dia nandrotsaka ny ambim-bavany; fa ravehivavy io kosa, na fadiranovana toy inona aza, dia nandrotsaka izay rehetra nananany, izany hoe ny fivelomany manontolo.
