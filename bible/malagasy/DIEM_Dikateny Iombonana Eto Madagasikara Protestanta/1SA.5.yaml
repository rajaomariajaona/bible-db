document_id: 1SA.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Any amin’ny Filistinina ny Vatamasina
  - type: text
    content: 'Azon’ny Filistinina àry ny '
  - type: text
    content: Vatamasin’Andriamanitra
  - type: text
    content: ' ka nentiny nankany Asdôda avy tao Ebena-Hezera'
  - type: note
    content: 'Ebena-Hezera: jereo 4.1 sy nta. Asdôda: iray amin’ireo tanàn-dehibe dimy an’ny Filistinina, ao atsimon’i Jerosalema sady akaikin’ny morontsiraka mediteraneanina.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Dia nalefany nankany Hekrôna ny Vatamasin’Andriamanitra; nefa nony tonga tany izany, dia niantsoantso mafy ny mponin’i Hekrôna hoe
  - type: note
    content: 'Hekrôna: mbola iray amin’ireo tanàn-dehibe dimy an’ny Filistinina, tokony ho 45 km ao andrefan’i Jerosalema.'
  - type: text
    content: ':'
  - type: text
    content: –Nafindra atỳ aminay mba hahafaty anay mianakavy ny Vatamasin’ilay Andriamanitr’i Israely.
  '11':
  - type: text
    content: 'Mba nampiantsoan’izy ireo koa ireo andriana filohan’ny Filistinina ka nilazany hoe:'
  - type: text
    content: –Avereno any amin’izay toerana nisy azy any ny Vatamasin’ilay Andriamanitr’i Israely sao dia hahafaty anay rehetra.
  - type: text
    content: 'Fa hotakotaka mahatsiravina no tao an-tanàna satria mafy dia mafy koa no nafitsoky ny herin’ny Tompo tao; '
  '12':
  - type: text
    content: 'ka izay tsy maty dia voan’ny kitso, ary niakatra ny '
  - type: text
    content: lanitra
  - type: text
    content: ' ny kiakia-pahoriany.'
  '2':
  - type: text
    content: 'Dia nalainy ny Vatamasina ka nampidiriny tao amin’ny tempolin’i Dagôna andriamaniny ary napetrany teo anilan’ny sarivongan’i Dagôna. '
  '3':
  - type: text
    content: 'Ny ampitso, rehefa nifoha ny mponin’i Asdôda, dia nahita ny sarivongan’i Dagôna nidaboka nihohoka tamin’ny tany teo anoloan’ny Vatamasin’ny TOMPO; natsangan’izy ireo izy ka napetrany indray tamin’ny toerany. '
  '4':
  - type: text
    content: Ny ampitso maraina manaraka dia hitan’ny olona fa mbola nidaboka tamin’ny tany teo anoloan’ny Vatamasin’ny TOMPO indray ilay sarivongana; tapaka teo an-tokonam-baravarana ny lohany sy ny tanany roa, fa ny vatabeny ihany no tsy nanohinana.
  '5':
  - type: text
    content: –Izany no tsy anitsahan’ny mpisoron’i Dagôna sy izay rehetra miditra ao amin’ny tempoliny, ao Asdôda, ny tokonam-baravaran’i Dagôna mandraka androany.
  '6':
  - type: text
    content: 'Tsy zakan’ny mponin’i Asdôda ny famaizana nafitsoky ny herin’ny TOMPO, fa sady nampitondra faisana azy izany no nahavoan-kitso azy mbamin’ireo mponina manodidina. '
  '7':
  - type: text
    content: 'Rehefa nahita ny nahazo azy ny mponin’i Asdôda, dia nanambara hoe:'
  - type: text
    content: –Aoka tsy hitoetra eto amintsika ny Vatamasin’ilay Andriamanitr’i Israely, fa ny nafitsoky ny heriny efa nampitondra ny mafy antsika sy an’i Dagôna andriamanitsika!
  '8':
  - type: text
    content: 'Dia nampiantso ireo andriana dimy filohan’ny Filistinina izy ireo mba hivory any aminy ka nanontany azy hoe:'
  - type: text
    content: –Hataonay ahoana ny Vatamasin’ilay Andriamanitr’i Israely?
  - type: text
    content: 'Dia hoy ireo filoha taminy:'
  - type: text
    content: –Aoka hafindra hankany Gata
  - type: note
    content: 'Gata: isan’ireo tanàn-dehibe dimy an’ny Filistinina, tokony ho 45 km ao atsimo andrefan’i Jerosalema.'
  - type: text
    content: ' izany!'
  - type: text
    content: 'Dia nafindra nankany Gata ilay Vatamasina; '
  '9':
  - type: text
    content: 'nefa vantany vao tonga tany izany, dia namely ny mponina tao an-tanàna ny herin’ny TOMPO ka nahatonga hotakotaka goavana. Nasian’ny Tompo izy rehetra ka voan’ny kitso avokoa, nanomboka tamin’ny kely indrindra ka hatramin’ny lehibe indrindra. '
