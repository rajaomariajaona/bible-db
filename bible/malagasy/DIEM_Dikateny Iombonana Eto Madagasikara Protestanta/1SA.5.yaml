document_id: 1SA.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Any amin’ny Filistinina ny Vatamasina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Azon’ny Filistinina àry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasin’Andriamanitra
  - type: text
    text: ' ka nentiny nankany Asdôda avy tao Ebena-Hezera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ebena-Hezera: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 4.1 sy nta. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Asdôda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': iray amin’ireo tanàn-dehibe dimy an’ny Filistinina, ao atsimon’i Jerosalema sady akaikin’ny morontsiraka mediteraneanina.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nalainy ny Vatamasina ka nampidiriny tao amin’ny tempolin’i Dagôna andriamaniny ary napetrany teo anilan’ny sarivongan’i Dagôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny ampitso, rehefa nifoha ny mponin’i Asdôda, dia nahita ny sarivongan’i Dagôna nidaboka nihohoka tamin’ny tany teo anoloan’ny Vatamasin’ny TOMPO; natsangan’izy ireo izy ka napetrany indray tamin’ny toerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny ampitso maraina manaraka dia hitan’ny olona fa mbola nidaboka tamin’ny tany teo anoloan’ny Vatamasin’ny TOMPO indray ilay sarivongana; tapaka teo an-tokonam-baravarana ny lohany sy ny tanany roa, fa ny vatabeny ihany no tsy nanohinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: –Izany no tsy anitsahan’ny mpisoron’i Dagôna sy izay rehetra miditra ao amin’ny tempoliny, ao Asdôda, ny tokonam-baravaran’i Dagôna mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy zakan’ny mponin’i Asdôda ny famaizana nafitsoky ny herin’ny TOMPO, fa sady nampitondra faisana azy izany no nahavoan-kitso azy mbamin’ireo mponina manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa nahita ny nahazo azy ny mponin’i Asdôda, dia nanambara hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka tsy hitoetra eto amintsika ny Vatamasin’ilay Andriamanitr’i Israely, fa ny nafitsoky ny heriny efa nampitondra ny mafy antsika sy an’i Dagôna andriamanitsika!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nampiantso ireo andriana dimy filohan’ny Filistinina izy ireo mba hivory any aminy ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hataonay ahoana ny Vatamasin’ilay Andriamanitr’i Israely?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ireo filoha taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hafindra hankany Gata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gata: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: isan’ireo tanàn-dehibe dimy an’ny Filistinina, tokony ho 45 km ao atsimo andrefan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' izany!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nafindra nankany Gata ilay Vatamasina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'nefa vantany vao tonga tany izany, dia namely ny mponina tao an-tanàna ny herin’ny TOMPO ka nahatonga hotakotaka goavana. Nasian’ny Tompo izy rehetra ka voan’ny kitso avokoa, nanomboka tamin’ny kely indrindra ka hatramin’ny lehibe indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nalefany nankany Hekrôna ny Vatamasin’Andriamanitra; nefa nony tonga tany izany, dia niantsoantso mafy ny mponin’i Hekrôna hoe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hekrôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mbola iray amin’ireo tanàn-dehibe dimy an’ny Filistinina, tokony ho 45 km ao andrefan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nafindra atỳ aminay mba hahafaty anay mianakavy ny Vatamasin’ilay Andriamanitr’i Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mba nampiantsoan’izy ireo koa ireo andriana filohan’ny Filistinina ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avereno any amin’izay toerana nisy azy any ny Vatamasin’ilay Andriamanitr’i Israely sao dia hahafaty anay rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hotakotaka mahatsiravina no tao an-tanàna satria mafy dia mafy koa no nafitsoky ny herin’ny Tompo tao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka izay tsy maty dia voan’ny kitso, ary niakatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: ' ny kiakia-pahoriany.'
