document_id: LUK.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ny mpitandrim-pananana kinga
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hoy kosa i Jesoa tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nisy mpanankarena anankiray nanana mpitandrim-pananana, izay notorîn’ny olona taminy fa mandanilany foana ny fananany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izay mahatoky amin’ny zava-madinika, dia mahatoky koa amin’ny zava-dehibe; ary izay tsy marina amin’ny zava-madinika, dia tsy marina koa amin’ny zava-dehibe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Raha tsy azo itokiana amin’ny haren’izao tontolo izao ianareo, iza no hametraka aminareo ny tena harena; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ary raha tsy azo itokiana amin’izay tsy anareo ianareo, iza no hanome anareo ny fananana tena anareo?
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tsy misy mpanompo mahay manompo tompo roa: satria na ny anankiray ho hàlany ary ny anankiray ho tiany, na ny anankiray hombany ary ny anankiray hohamavoiny. Tsy hainareo atao ny sady manompo an’Andriamanitra no manompo ny harena'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 6.24.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lalànan’i Mosesy manoloana ny Fanjakàn’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 11.12-13; 5.31-32; Mk 10.11-12)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fatra-pitia vola ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' ka naneso an’i Jesoa nony nandre izany teny rehetra izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianareo miseho ho marina eo imason’ny olona, kanefa fantatr’Andriamanitra ny fonareo. Fa izay heverin’ny olona ho ambony, dia maharikoriko eo imason’Andriamanitra.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Miafara amin’i Jôhany Mpanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' ny andron’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: '’i Mosesy sy ny bokin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '. Fa manomboka hatreo kosa dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' torîna, ary samy miezaka hiditra ao ny olona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Kanefa moramora kokoa ny hahalevona ny tany amana habakabaka noho ny hoe hahafoana ny zavatra faran’izay madinika indrindra ao amin’ny lalànan’i Mosesy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Izay rehetra manary vady ka mampakatra vehivavy hafa, dia manitsakitsaka ny vadiny taloha; ary izay mampakatra vehivavy nariam-bady, dia maka vadin’olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ilay mpanankarena sy i Lazara
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nisy mpanankarena anankiray nanao fitafiana tsara tarehy sady lafo vidy ary nanaram-po tamin’ny hanim-py isan’andro. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nampiantsoin’ilay tompony izy ka nanontaniany hoe: «Inona izany henoko momba anao izany? Avoahy hoe ny fitandremanao fa tsy hahazo hitandrina ny fananako intsony ianao!» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nisy kosa mahantra ferena anankiray atao hoe Lazara nivalandotra teo anoloan’ny vavahadin’ilay mpanankarena. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Satriny tokoa ny mba hivoky amin’ny sombintsombin-tsakafo latsaka avy amin’ny latabatr’ilay mpanankarena, saingy ny alika kosa no tonga nilelaka ny feriny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Maty ilay mahantra, ka nentin’ny anjely ho eo anilan’i Abrahama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 13.28.
      marker-yv: yv-n
    - type: text
      text: '; maty koa ilay mpanankarena, dia nalevina. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Raha ilay niferinaina tany amin’ny toeran’ny maty iny ilay mpanankarena, dia niandrandra ka tazany terỳ lavitra terỳ i Abrahama sy i Lazara teo anilany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia niantso izy nanao hoe: «Ry ikaky Abrahama ô, mamindrà fo amiko, iraho kely re i Lazara mba hanatsoboka ny loha fanondrony amin’ny rano hampangatsiatsiahany ny lelako, fa mijaly aho ato anaty lelafo ato.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa hoy i Abrahama hoe: «Anaka, tsarovy fa ampoky ny soa ianao fahavelonao, i Lazara kosa niaritra fahoriana; ankehitriny mandray fiononana izy atỳ ankoatra, ary ianao kosa mijaly. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Sady izao koa, misy hantsam-be manelanelana antsika, hany ka izay te hiala etỳ hankeny aminareo tsy afa-manoatra, ary izay te hiala eny hanketỳ aminay tsy afa-miampita.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia hoy ilay mpanankarena hoe: «Miangavy anao àry aho, ry ikaky, mba iraho i Lazara ho any aminay, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'fa misy dimy lahy iray tampo amiko any. Aoka i Lazara hananatra azy mafy, mba tsy hahatonga azy koa amin’ity toeram-pijaliana ity!» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa novalian’i Abrahama hoe: «Manana an’i Mosesy sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' izy, koa aoka ireo no hohenoiny.» '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ka hoy ilay mpitandrim-pananana anakampony hoe: «Esorin’ny tompoko amin’ny asako aho ity, ka inona re no hataoko? Ny miasa tany, tsy vitako; ny mangataka, mahamenatra ahy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia hoy ilay mpanankarena: «Tsy izany re, ry ikaky Abrahama, fa raha misy olona avy atỳ amin’ny maty miverina any aminy, dia hialan’izy dimy mirahalahy ny toe-dratsy!» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa hoy i Abrahama: «Raha i Mosesy sy ny mpaminany tsy henoiny, dia tsy hiaiky izy na misy olona mitsangana velona avy any amin’ny maty aza.»'
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka fa fantatro izay hataoko, mba handraisan’ny olona ahy any an-tranony, rehefa voaroaka amin’ny asako aho.» '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nampiantsoin’ilay mpitandrim-pananana tsirairay ireo olona nitrosa tamin’ny tompony. Ka hoy izy tamin’ilay voalohany: «Ananan’ny tompoko hoatrinona ianao?» '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy ilay mpitrosa hoe: «Menaka efatra arivo litatra.» Ary hoy ny mpitandrim-pananana taminy: «Intỳ ny taratasinao, mipetraha faingana ka soraty hoe roa arivo.» '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nisy hafa koa nilazany hoe: «Ary ianao, ananan’ny tompoko hoatrinona ianao?» Dia hoy ilay mpitrosa hoe: «Vary zato kitapo.» Ary hoy ny mpitandrim-pananana taminy: «Intỳ ny taratasinao, ka soraty hoe valopolo.» '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Noderain’ny tompony ilay mpitandrim-pananana tsy marina, satria niseho ho kinga; fa amin’ny raharaha ifanaovany avy, dia kinga kokoa ny olona miaina araka izao tontolo izao noho ny olona miaina araka ny fahazavan’Andriamanitra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ka hoy Aho aminareo mpianatro: ampiasao ny haren’izao tontolo izao hananan-kavana handray anareo any amin’ny fonenana mandrakizay, rehefa tonga ilay andro hamoizana ireny harena ireny. '
