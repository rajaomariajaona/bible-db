document_id: LUK.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana momba ny mpitandrim-pananana kinga
  - type: text
    content: 'Hoy kosa i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: '–Nisy mpanankarena anankiray nanana mpitandrim-pananana, izay notorîn’ny olona taminy fa mandanilany foana ny fananany. '
  '10':
  - type: text
    content: 'Izay mahatoky amin’ny zava-madinika, dia mahatoky koa amin’ny zava-dehibe; ary izay tsy marina amin’ny zava-madinika, dia tsy marina koa amin’ny zava-dehibe. '
  '11':
  - type: text
    content: 'Raha tsy azo itokiana amin’ny haren’izao tontolo izao ianareo, iza no hametraka aminareo ny tena harena; '
  '12':
  - type: text
    content: ary raha tsy azo itokiana amin’izay tsy anareo ianareo, iza no hanome anareo ny fananana tena anareo?
  '13':
  - type: text
    content: 'Tsy misy mpanompo mahay manompo tompo roa: satria na ny anankiray ho hàlany ary ny anankiray ho tiany, na ny anankiray hombany ary ny anankiray hohamavoiny. Tsy hainareo atao ny sady manompo an’Andriamanitra no manompo ny harena'
  - type: note
    content: Ampit Mt 6.24.
  - type: text
    content: .
  - type: heading
    content: Ny lalànan’i Mosesy manoloana ny Fanjakàn’Andriamanitra
  - type: heading
    content: (Jereo Mt 11.12-13; 5.31-32; Mk 10.11-12)
  '14':
  - type: text
    content: 'Fatra-pitia vola ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' ka naneso an’i Jesoa nony nandre izany teny rehetra izany. '
  '15':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Ianareo miseho ho marina eo imason’ny olona, kanefa fantatr’Andriamanitra ny fonareo. Fa izay heverin’ny olona ho ambony, dia maharikoriko eo imason’Andriamanitra.
  '16':
  - type: text
    content: 'Miafara amin’i Jôhany Mpanao '
  - type: text
    content: batisa
  - type: text
    content: ' ny andron’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy sy ny bokin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: '. Fa manomboka hatreo kosa dia ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' no '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' torîna, ary samy miezaka hiditra ao ny olona. '
  '17':
  - type: text
    content: Kanefa moramora kokoa ny hahalevona ny tany amana habakabaka noho ny hoe hahafoana ny zavatra faran’izay madinika indrindra ao amin’ny lalànan’i Mosesy.
  '18':
  - type: text
    content: Izay rehetra manary vady ka mampakatra vehivavy hafa, dia manitsakitsaka ny vadiny taloha; ary izay mampakatra vehivavy nariam-bady, dia maka vadin’olona.
  - type: heading
    content: Fanoharana momba ilay mpanankarena sy i Lazara
  '19':
  - type: text
    content: 'Nisy mpanankarena anankiray nanao fitafiana tsara tarehy sady lafo vidy ary nanaram-po tamin’ny hanim-py isan’andro. '
  '2':
  - type: text
    content: 'Dia nampiantsoin’ilay tompony izy ka nanontaniany hoe: «Inona izany henoko momba anao izany? Avoahy hoe ny fitandremanao fa tsy hahazo hitandrina ny fananako intsony ianao!» '
  '20':
  - type: text
    content: 'Nisy kosa mahantra ferena anankiray atao hoe Lazara nivalandotra teo anoloan’ny vavahadin’ilay mpanankarena. '
  '21':
  - type: text
    content: 'Satriny tokoa ny mba hivoky amin’ny sombintsombin-tsakafo latsaka avy amin’ny latabatr’ilay mpanankarena, saingy ny alika kosa no tonga nilelaka ny feriny. '
  '22':
  - type: text
    content: Maty ilay mahantra, ka nentin’ny anjely ho eo anilan’i Abrahama
  - type: note
    content: Ampit 13.28.
  - type: text
    content: '; maty koa ilay mpanankarena, dia nalevina. '
  '23':
  - type: text
    content: 'Raha ilay niferinaina tany amin’ny toeran’ny maty iny ilay mpanankarena, dia niandrandra ka tazany terỳ lavitra terỳ i Abrahama sy i Lazara teo anilany. '
  '24':
  - type: text
    content: 'Dia niantso izy nanao hoe: «Ry ikaky Abrahama ô, mamindrà fo amiko, iraho kely re i Lazara mba hanatsoboka ny loha fanondrony amin’ny rano hampangatsiatsiahany ny lelako, fa mijaly aho ato anaty lelafo ato.» '
  '25':
  - type: text
    content: 'Fa hoy i Abrahama hoe: «Anaka, tsarovy fa ampoky ny soa ianao fahavelonao, i Lazara kosa niaritra fahoriana; ankehitriny mandray fiononana izy atỳ ankoatra, ary ianao kosa mijaly. '
  '26':
  - type: text
    content: 'Sady izao koa, misy hantsam-be manelanelana antsika, hany ka izay te hiala etỳ hankeny aminareo tsy afa-manoatra, ary izay te hiala eny hanketỳ aminay tsy afa-miampita.» '
  '27':
  - type: text
    content: 'Dia hoy ilay mpanankarena hoe: «Miangavy anao àry aho, ry ikaky, mba iraho i Lazara ho any aminay, '
  '28':
  - type: text
    content: 'fa misy dimy lahy iray tampo amiko any. Aoka i Lazara hananatra azy mafy, mba tsy hahatonga azy koa amin’ity toeram-pijaliana ity!» '
  '29':
  - type: text
    content: 'Fa novalian’i Abrahama hoe: «Manana an’i Mosesy sy ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' izy, koa aoka ireo no hohenoiny.» '
  '3':
  - type: text
    content: 'Ka hoy ilay mpitandrim-pananana anakampony hoe: «Esorin’ny tompoko amin’ny asako aho ity, ka inona re no hataoko? Ny miasa tany, tsy vitako; ny mangataka, mahamenatra ahy. '
  '30':
  - type: text
    content: 'Dia hoy ilay mpanankarena: «Tsy izany re, ry ikaky Abrahama, fa raha misy olona avy atỳ amin’ny maty miverina any aminy, dia hialan’izy dimy mirahalahy ny toe-dratsy!» '
  '31':
  - type: text
    content: 'Fa hoy i Abrahama: «Raha i Mosesy sy ny mpaminany tsy henoiny, dia tsy hiaiky izy na misy olona mitsangana velona avy any amin’ny maty aza.»'
  '4':
  - type: text
    content: 'Aoka fa fantatro izay hataoko, mba handraisan’ny olona ahy any an-tranony, rehefa voaroaka amin’ny asako aho.» '
  '5':
  - type: text
    content: 'Dia nampiantsoin’ilay mpitandrim-pananana tsirairay ireo olona nitrosa tamin’ny tompony. Ka hoy izy tamin’ilay voalohany: «Ananan’ny tompoko hoatrinona ianao?» '
  '6':
  - type: text
    content: 'Dia hoy ilay mpitrosa hoe: «Menaka efatra arivo litatra.» Ary hoy ny mpitandrim-pananana taminy: «Intỳ ny taratasinao, mipetraha faingana ka soraty hoe roa arivo.» '
  '7':
  - type: text
    content: 'Nisy hafa koa nilazany hoe: «Ary ianao, ananan’ny tompoko hoatrinona ianao?» Dia hoy ilay mpitrosa hoe: «Vary zato kitapo.» Ary hoy ny mpitandrim-pananana taminy: «Intỳ ny taratasinao, ka soraty hoe valopolo.» '
  '8':
  - type: text
    content: Noderain’ny tompony ilay mpitandrim-pananana tsy marina, satria niseho ho kinga; fa amin’ny raharaha ifanaovany avy, dia kinga kokoa ny olona miaina araka izao tontolo izao noho ny olona miaina araka ny fahazavan’Andriamanitra.
  '9':
  - type: text
    content: 'Ka hoy Aho aminareo mpianatro: ampiasao ny haren’izao tontolo izao hananan-kavana handray anareo any amin’ny fonenana mandrakizay, rehefa tonga ilay andro hamoizana ireny harena ireny. '
