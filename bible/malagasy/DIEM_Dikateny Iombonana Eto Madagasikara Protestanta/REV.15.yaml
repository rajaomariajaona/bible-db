    - type: text
      text: haviniran
  - type: text
    text: ’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitako nisy toa ranomasina fitaratra miharo afo; ka izay olona naharesy an’ilay biby sy ny sariny ary ny isa mifandraika amin’ny anarany dia nijoro teo amoron’io ranomasina fitaratra io sady nitana ny lokanga nomen’Andriamanitra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary miventy ny hiran’i Mosesy mpanompon’Andriamanitra sy ny hiran’ny Zanakondry izy ireo manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Lehibe sy mahagaga ny asanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Tompo Andriamanitra Tsitoha!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ara-drariny sy mahitsy ny fandaharanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Mpanjakan’ny firenena!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza no tsy hanaja Anao, ry Tompo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no tsy hanome voninahitra Anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria Ianao irery no masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho avy ny firenena rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiankohoka eo anatrehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa naharihary ny fitsaranao ara-drariny
  - type: usfm
