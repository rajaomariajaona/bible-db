  - type: text
    text: 'Ary hitako nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' anankiray hafa tany an-danitra, famantarana sady lehibe no mahagaga: dia anjely fito izay nanana ny loza fito farany, satria amin’ireo loza ireo no hiseho faran’izay mafy indrindra ny '
  - type: usfm
