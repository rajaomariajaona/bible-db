document_id: REV.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo anjely mitondra ny loza farany
  - type: text
    content: 'Ary hitako nisy '
  - type: text
    content: famantarana
  - type: text
    content: ' anankiray hafa tany an-danitra, famantarana sady lehibe no mahagaga: dia anjely fito izay nanana ny loza fito farany, satria amin’ireo loza ireo no hiseho faran’izay mafy indrindra ny '
  - type: text
    content: haviniran
  - type: text
    content: ’Andriamanitra.
  '2':
  - type: text
    content: 'Ary hitako nisy toa ranomasina fitaratra miharo afo; ka izay olona naharesy an’ilay biby sy ny sariny ary ny isa mifandraika amin’ny anarany dia nijoro teo amoron’io ranomasina fitaratra io sady nitana ny lokanga nomen’Andriamanitra azy. '
  '3':
  - type: text
    content: 'Ary miventy ny hiran’i Mosesy mpanompon’Andriamanitra sy ny hiran’ny Zanakondry izy ireo manao hoe:'
  - type: text
    content: «Lehibe sy mahagaga ny asanao,
  - type: text
    content: ry Tompo Andriamanitra Tsitoha!
  - type: text
    content: Ara-drariny sy mahitsy ny fandaharanao
  - type: text
    content: ry Mpanjakan’ny firenena!
  '4':
  - type: text
    content: Iza no tsy hanaja Anao, ry Tompo?
  - type: text
    content: Iza no tsy hanome voninahitra Anao?
  - type: text
    content: Satria Ianao irery no masina,
  - type: text
    content: ka ho avy ny firenena rehetra
  - type: text
    content: hiankohoka eo anatrehanao,
  - type: text
    content: fa efa naharihary ny fitsaranao ara-drariny
  - type: note
    content: 'And 3: jereo Eks 15.1. –Mpanjakan’ny firenena: misy stf sasany ahitana hoe Mpanjakan’ny taona rehetra. –And 4: jereo Jer 10.7; Sal 86.91.'
  - type: text
    content: .»
  '5':
  - type: text
    content: 'Taorian’izany, dia hitako novohàna tany an-danitra ny '
  - type: text
    content: tempoly
  - type: text
    content: ' nisy ilay fonena-masina itahirizana ny raki-tsoratry ny fanekempihavanana'
  - type: note
    content: Ampit Eks 38.21.
  - type: text
    content: '; '
  '6':
  - type: text
    content: 'ary ny anjely fito izay nitana ny loza fito dia nivoaka avy tao amin’ny tempoly; akanjo madio mangatsakatsaka natao tamin’ny kiran-drongony no niakanjoany ary fehikibo volamena no nietrany. '
  '7':
  - type: text
    content: 'Dia nomen’ny anankiray tamin’ny zava-miaina efatra an’ireo anjely fito ny lovia volamena fito, feno ny haviniran’ilay Andriamanitra velona mandrakizay mandrakizay. '
  '8':
  - type: text
    content: Ary ny tempoly dia feno setroka avy amin’ny voninahitr’Andriamanitra sy ny heriny
  - type: note
    content: Ampit Eks 40.34-35; 1 Mp 8.10-11; Is 6.4.
  - type: text
    content: ; ka tsy nisy afaka niditra tao amin’ny tempoly, mandra-pahatapitry ny loza fito nentin’ny anjely fito.
