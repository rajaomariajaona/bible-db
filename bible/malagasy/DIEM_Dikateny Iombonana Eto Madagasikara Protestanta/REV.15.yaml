  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary ny anjely fito izay nitana ny loza fito dia nivoaka avy tao amin’ny tempoly; akanjo madio mangatsakatsaka natao tamin’ny kiran-drongony no niakanjoany ary fehikibo volamena no nietrany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nomen’ny anankiray tamin’ny zava-miaina efatra an’ireo anjely fito ny lovia volamena fito, feno ny haviniran’ilay Andriamanitra velona mandrakizay mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny tempoly dia feno setroka avy amin’ny voninahitr’Andriamanitra sy ny heriny
  - type: usfm
    marker: f
    children:
