    - type: usfm
      marker: it
      children:
      - type: text
        text: Samoela izany. Amin’ny fizarany ho boky roa ankehitriny, ny 2 Samoela dia mitantara ny nanjakàn’i Davida, ilay mpanjaka voalohany sy lehibe indrindra tamin’i Israely manontolo.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny boky dia manomboka amin’ny tononkalo fisaonana izay nataon’i Davida rehefa nandre ny nahafatesan’i Saoly sy i Jônatàna zanany izy; dia ambarany avy eo ny nahatonga an’i Davida ho mpanjakan’i Joda (toko 1–4). Nisy zanakalahin’i Saoly natao hoe Isbôseta nanjaka tapany tamin’ny foko avaratra; ka rehefa maty izy, dia nanaraka an’i Davida ireo foko ireo ary nifidy azy ho mpanjaka. Koa hatramin’izay dia nanjaka feno tamin’ny foko 12 i Davida (toko 5–20). Ny toko 21 ka hatramin’ny 24 dia fitantarana samihafa momba ny nanjakàn’i Davida, saingy tsy hita kosa tany amin’ireo toko teo aloha.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aseho amintsika araka izay tena maha izy azy i Davida mpanjaka. Ny 2 Samoela dia mampiseho ny fahalehibiazany sy ny heriny, kanefa dia tsy manafina ihany koa ireo fahalemeny ary tsy misalasala milaza ireo toe-javatra nampalahelo izay nanamaloka ny fiainam-pianakaviany. Hita ny tena naha olombelona an’i Davida, saingy maneho herimpo goavana koa izy rehefa miaiky ny fahadisoany sy mangata-pamelana amin’Andriamanitra.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Tatỳ aoriana, indrindra tamin’ireo fotoan-tsarotra ho an’i Israely dia i Davida no ho tonga ohatr’ilay mpanjaka mpamonjy izay nampanantenain’Andriamanitra fa halefany ho an’ny vahoakany. Hotsaroan’i Israely tsara ny teny fampanantenàn’Andriamanitra nampitondrainy an’i Davida tamin’ny alalan’i Natàna mpaminany hoe: hisy anankiray amin’ny taranakao hanjaka handimby anao (toko 7). Izany matetika no antony anondroana an’i Jesoa, ilay mpamonjy nirahin’Andriamanitra, ho ny «Zanak’i Davida» ao amin’ny Testamenta Vaovao (jereo Mt 20.29-34; 21.9).'
