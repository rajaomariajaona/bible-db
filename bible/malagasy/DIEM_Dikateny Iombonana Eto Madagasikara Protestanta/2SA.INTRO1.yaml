      - type: text
        text: –Tamin’ny voalohany ity boky ity sy ny teo aloha dia nitambatra ho boky tokana ihany, izay fantatra tamin’ny anaran’ilay olona malaza indrindra voalaza ao, dia ny
    - type: text
