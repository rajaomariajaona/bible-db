document_id: 2KI.22,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jôsià mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 34.1-2)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Feno valo taona i Jôsià fony tonga mpanjaka ary naharitra 31 taona no nanjakany tao Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 3.6.
      marker-yv: yv-n
    - type: text
      text: '. Ny anaran-dreniny dia Jedidà zanakavavin’i Hadaià avy any Bôtsekàta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nilazan’i Safàna koa ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Misy boky nomen’i Hilkià mpisorombe ahy ity!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary novakiny teo anatrehan’ny mpanjaka izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naka hevitra tamin’i Holdà mpaminanivavy i Jôsià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 34.19-28)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nony ren’i Jôsià mpanjaka ny teny tao amin’ilay Bokin’ny Lalàna, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra fitafiana
    - type: text
      text: ' izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nomeny baiko i Hilkià mpisorombe sy i Ahikama zanakalahin’i Safàna mbamin’i Hakbôra zanakalahin’i Mikaià mbamin’i Safàna mpitantsoratra sy i Hasaià mpandraharahany ka nilazany hoe:'
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: –Ndeha anontanio ny TOMPO ho ahy sy ho an’ny vahoaka manerana an’i Joda manontolo ny amin’ny teny raketin’ity boky vao hita ity. Ireo razantsika manko tsy nihaino ny tenin’ity boky ity sady tsy nanao araka izay rehetra voasoratra ao anatiny, hany ka hirehitra mafy amintsika ny fahatezeran’ny TOMPO.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia lasa nankany amin’i Holdà '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminanivavy
    - type: text
      text: ' i Hilkià mpisorona sy i Ahikama mbamin’i Hakbôra sy i Safàna ary i Hasaià. I Holdà, izay nonina tao Antanambaon’i Jerosalema, dia vadin’i Saloma zanakalahin’i Tikvà sy zafikelin’i Harahasa sady mpitahiry ny fanamiana masina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny mpandray anjara amin’ny fanompoam-pivavahana amin’ny ankapobeny dia mitondra akanjo natao manokana ho amin’izany. Ampit 10.22.
      marker-yv: yv-n
    - type: text
      text: ' tao an-tempoly. Koa rehefa niresaka tamin-dravehivavy ry i Hilkià, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'dia nasainy miteny amin’ny mpaniraka hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '«Izao no lazain’ny TOMPO Andriamanitr’i Israely: ‹Indro Aho hahatonga loza amin’ity tanàna ity sy ny mponiny, dia araka izay rehetra voalaza ao anatin’ilay boky novakin’ny mpanjakan’i Joda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Efa nandao Ahy manko ny mponin’i Jerosalema sady efa nampanetona srona ho an’ny andriamani-kafa, ary nampahatezitra Ahy tamin’ny sampy rehetra nataon’ny tanany. Izany no nirehetan’ny fahatezerako tamin’ity tanàna ity, ka tsy mbola itoniany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa ny mpanjakan’i Joda, izay naniraka anareo hanatona Ahy TOMPO, dia anambarao fa Izaho TOMPO Andriamanitr’i Israely dia milaza izao: Ny amin’ny teny izay efa renao, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'dia nino anatra ianao ka nanetry tena teo anatrehako, rehefa nihaino izay voalazako momba ny hanjo ity tanàna ity sy ny mponiny, dia ny hanaovana azy ho lao sy ho oha-panozonana; eny, nandriatra fitafiana ianao sady nitomany teo anatrehako, ka dia efa nihaino anao koa Aho; teny hentitra avy amiko TOMPO izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nanao izay mahitsy eo imason’ny TOMPO i Jôsià; ka narahiny avokoa ny toetran’i Davida razambeny fa tsy mba nivily hiala tamin’izany izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahitan’ny mpisorombe ny Bokin’ny Lalàna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 34.8-18)
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Indro hangoniko any amin’ny razanao ianao ary ho voapetraka am-pasanao hombàm-piadanana, ka tsy hahita maso ny loza rehetra hamelezako an’i Jerosalema.› »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanavao ny fanekempihavanana tamin’Andriamanitra i Jôsià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 34.29-32)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitondra izany valinteny izany ho an’ny mpanjaka i Hilkià sy ireo namany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tamin’ny taona faha-18 nanjakan’i Jôsià mpanjaka no nanirahany an’i Safàna mpitantsoratra zanakalahin’i Atsalià ary zafikelin’i Mesolama ho any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' sady nilazany hoe:'
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: –Mankanesa any amin’i Hilkià mpisorombe, ka asaivo angoniny ny vola izay naterin’ny olona tao an-tranon’ny TOMPO na noraisin’ny mpiandry varavarana taminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 12.9-10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'Aoka hatolotra ny mpandraharaha voatendry hanamboatra ny tranon’ny TOMPO izany vola izany mba hanomezany ny karaman’ny mpandrafitra sy ny mpandatsa-bato ary ireo mpiasa hafa, ary koa hividianany hazo sy vato voapaika ilaina amin’izany fanamboarana ny simba izany. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Kanefa aza ampamoahina ny amin’ny vola natolotra azy izy, satria mahatoky amin’ny asany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Rehefa voarain’i Hilkià mpisorombe izany hafatra izany, dia nanambara tamin’i Safàna mpitantsoratra koa izy ny nahitany ny Bokin’ny Lalàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ity '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bokin’ny Lalàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ity no mety mirakitra ny ampahany afovoany amin’ny Deoterônômy ankehitriny. Ny sasany aza dia mihevitra fa mety ho ny fitambaran’ny boky dimy voalohan’ny Baiboly (na Pentateoka) izany.'
      marker-yv: yv-n
    - type: text
      text: ' tao an-tranon’ny TOMPO; ary natolony azy ny boky ka novakiny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Avy eo dia niverina nanao tatitra tamin’ny mpanjaka i Safàna nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa nangonin’ireo mpisorona ny vola azo tao an-tempoly ary natolony ny mpandraharaha voatendry hanao ny fanamboarana.
