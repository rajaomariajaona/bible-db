document_id: 2KI.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jôsià mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 34.1-2)
  - type: text
    content: Feno valo taona i Jôsià fony tonga mpanjaka ary naharitra 31 taona no nanjakany tao Jerosalema
  - type: note
    content: Jereo Jer 3.6.
  - type: text
    content: '. Ny anaran-dreniny dia Jedidà zanakavavin’i Hadaià avy any Bôtsekàta. '
  '10':
  - type: text
    content: 'Dia nilazan’i Safàna koa ny mpanjaka hoe:'
  - type: text
    content: –Misy boky nomen’i Hilkià mpisorombe ahy ity!
  - type: text
    content: Ary novakiny teo anatrehan’ny mpanjaka izany.
  - type: heading
    content: Naka hevitra tamin’i Holdà mpaminanivavy i Jôsià
  - type: heading
    content: (Jereo 2 Tan 34.19-28)
  '11':
  - type: text
    content: 'Nony ren’i Jôsià mpanjaka ny teny tao amin’ilay Bokin’ny Lalàna, dia '
  - type: text
    content: nandriatra fitafiana
  - type: text
    content: ' izy. '
  '12':
  - type: text
    content: 'Ary nomeny baiko i Hilkià mpisorombe sy i Ahikama zanakalahin’i Safàna mbamin’i Hakbôra zanakalahin’i Mikaià mbamin’i Safàna mpitantsoratra sy i Hasaià mpandraharahany ka nilazany hoe:'
  '13':
  - type: text
    content: –Ndeha anontanio ny TOMPO ho ahy sy ho an’ny vahoaka manerana an’i Joda manontolo ny amin’ny teny raketin’ity boky vao hita ity. Ireo razantsika manko tsy nihaino ny tenin’ity boky ity sady tsy nanao araka izay rehetra voasoratra ao anatiny, hany ka hirehitra mafy amintsika ny fahatezeran’ny TOMPO.
  '14':
  - type: text
    content: 'Dia lasa nankany amin’i Holdà '
  - type: text
    content: mpaminanivavy
  - type: text
    content: ' i Hilkià mpisorona sy i Ahikama mbamin’i Hakbôra sy i Safàna ary i Hasaià. I Holdà, izay nonina tao Antanambaon’i Jerosalema, dia vadin’i Saloma zanakalahin’i Tikvà sy zafikelin’i Harahasa sady mpitahiry ny fanamiana masina'
  - type: note
    content: Ny mpandray anjara amin’ny fanompoam-pivavahana amin’ny ankapobeny dia mitondra akanjo natao manokana ho amin’izany. Ampit 10.22.
  - type: text
    content: ' tao an-tempoly. Koa rehefa niresaka tamin-dravehivavy ry i Hilkià, '
  '15':
  - type: text
    content: 'dia nasainy miteny amin’ny mpaniraka hoe: '
  '16':
  - type: text
    content: '«Izao no lazain’ny TOMPO Andriamanitr’i Israely: ‹Indro Aho hahatonga loza amin’ity tanàna ity sy ny mponiny, dia araka izay rehetra voalaza ao anatin’ilay boky novakin’ny mpanjakan’i Joda. '
  '17':
  - type: text
    content: 'Efa nandao Ahy manko ny mponin’i Jerosalema sady efa nampanetona srona ho an’ny andriamani-kafa, ary nampahatezitra Ahy tamin’ny sampy rehetra nataon’ny tanany. Izany no nirehetan’ny fahatezerako tamin’ity tanàna ity, ka tsy mbola itoniany. '
  '18':
  - type: text
    content: 'Fa ny mpanjakan’i Joda, izay naniraka anareo hanatona Ahy TOMPO, dia anambarao fa Izaho TOMPO Andriamanitr’i Israely dia milaza izao: Ny amin’ny teny izay efa renao, '
  '19':
  - type: text
    content: 'dia nino anatra ianao ka nanetry tena teo anatrehako, rehefa nihaino izay voalazako momba ny hanjo ity tanàna ity sy ny mponiny, dia ny hanaovana azy ho lao sy ho oha-panozonana; eny, nandriatra fitafiana ianao sady nitomany teo anatrehako, ka dia efa nihaino anao koa Aho; teny hentitra avy amiko TOMPO izany. '
  '2':
  - type: text
    content: Nanao izay mahitsy eo imason’ny TOMPO i Jôsià; ka narahiny avokoa ny toetran’i Davida razambeny fa tsy mba nivily hiala tamin’izany izy.
  - type: heading
    content: Ny nahitan’ny mpisorombe ny Bokin’ny Lalàna
  - type: heading
    content: (Jereo 2 Tan 34.8-18)
  '20':
  - type: text
    content: Indro hangoniko any amin’ny razanao ianao ary ho voapetraka am-pasanao hombàm-piadanana, ka tsy hahita maso ny loza rehetra hamelezako an’i Jerosalema.› »
  - type: heading
    content: Nanavao ny fanekempihavanana tamin’Andriamanitra i Jôsià
  - type: heading
    content: (Jereo 2 Tan 34.29-32)
  - type: text
    content: Dia nitondra izany valinteny izany ho an’ny mpanjaka i Hilkià sy ireo namany.
  '3':
  - type: text
    content: Tamin’ny taona faha-18 nanjakan’i Jôsià mpanjaka no nanirahany an’i Safàna mpitantsoratra zanakalahin’i Atsalià ary zafikelin’i Mesolama ho any an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sady nilazany hoe:'
  '4':
  - type: text
    content: –Mankanesa any amin’i Hilkià mpisorombe, ka asaivo angoniny ny vola izay naterin’ny olona tao an-tranon’ny TOMPO na noraisin’ny mpiandry varavarana taminy
  - type: note
    content: Jereo 12.9-10.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Aoka hatolotra ny mpandraharaha voatendry hanamboatra ny tranon’ny TOMPO izany vola izany mba hanomezany ny karaman’ny mpandrafitra sy ny mpandatsa-bato ary ireo mpiasa hafa, ary koa hividianany hazo sy vato voapaika ilaina amin’izany fanamboarana ny simba izany. '
  '7':
  - type: text
    content: Kanefa aza ampamoahina ny amin’ny vola natolotra azy izy, satria mahatoky amin’ny asany.
  '8':
  - type: text
    content: Rehefa voarain’i Hilkià mpisorombe izany hafatra izany, dia nanambara tamin’i Safàna mpitantsoratra koa izy ny nahitany ny Bokin’ny Lalàna
  - type: note
    content: Ity Bokin’ny Lalàna ity no mety mirakitra ny ampahany afovoany amin’ny Deoterônômy ankehitriny. Ny sasany aza dia mihevitra fa mety ho ny fitambaran’ny boky dimy voalohan’ny Baiboly (na Pentateoka) izany.
  - type: text
    content: ' tao an-tranon’ny TOMPO; ary natolony azy ny boky ka novakiny. '
  '9':
  - type: text
    content: 'Avy eo dia niverina nanao tatitra tamin’ny mpanjaka i Safàna nilaza hoe:'
  - type: text
    content: –Efa nangonin’ireo mpisorona ny vola azo tao an-tempoly ary natolony ny mpandraharaha voatendry hanao ny fanamboarana.
