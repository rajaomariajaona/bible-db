document_id: HOS.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny teny izay nampitain’ny TOMPO tamin’i Hôsea zanakalahin’i Beerỳ tamin’ny andron’i Hozià sy i Jôtama sy i Ahaza ary i Hezekià mpanjakan’i Joda, sy tamin’ny andron’i Jerôbohama zanakalahin’i Jôasy sady mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Israely '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'raha ampitahaina amin’i Joda eto dia manondro ny fanjakana israelita avaratra izay naorin’i Jerôbohama I taorian’ny nahafatesan’i Salômôna (jereo 1 Mp 12.16-20). Ny mpanjaka Jerôbohama voalaza eto dia ny mitondra ny laharana faha-II izay nanjaka tamin’i Israely tamin’ny 787 ka hatramin’ny 747 tal J.K. (Jereo 2 Mp 14.23-29.) –Hozià: jereo nta amin’ny Ham 1.1. –Jôtama: 2 Mp 15.32-38; 2 Tan 27.1-3, 7-9. –Ahaza: 2 Mp 16.1-20; 2 Tan 28.1-27. –Hezekià: 2 Mp 18-20; 2 Tan 29-32.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vady aman-janak’i Hôsea
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fony nanomboka niteny tamin’ny alalan’i Hôsea ny TOMPO, dia nanao taminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mandehana maka vady mpivarotena tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy zanaka avy amin’ny fivarotan-tenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mivarotena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny andriamanitra Bahala* sy ny andriamanibavy Hastôreta* izay nivavahan’ny Kanahanita sy ny Israelita maro niara-belona tamin’i Hôsea, dia ninoana ho mampahavokatra ny tany sy mampiteraka be dia be ny biby fiompy na ny olona koa (jereo 2.7). Ny fanompoam-pivavahana izay atao ho fanomezam-boninahitra azy ireo dia nisy fombam-pivavahana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fivarotan-tena
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo 4.12-14).'
      marker-yv: yv-n
    - type: text
      text: ' miala amin’ny TOMPO'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ataon’ny mponina eto amin’ny tany.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha naka an’i Gômera zanakavavin’i Diblaîma i Hôsea; ary nitoe-jaza taminy ravehivavy ka niteraka zazalahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Hôsea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ataovy hoe Jizrehèla ny anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy ho ela ny hanafaizako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny taranak’i Jehò
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny ra latsaka tao Jizrehèla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Teny mampahatsiaro ny fandringanan’i Jehò ny fianakavian’i Ahaba araka ny 2 Mp 9-10. I Jerôbohama II dia isan’ny taranak’i Jehò.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hofaranako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny fanjakan’ny taranak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia homontsaniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny lemak’i Jizrehèla
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny herin’i Israely ara-tafika.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitoe-jaza indray i Gômera ka niteraka zazavavy; ary hoy ny TOMPO tamin’i Hôsea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ataovy hoe Lô-Rohamà ny anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy haneho fitiavana intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny taranak’i Israely Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hotsoahiko aminy tanteraka ny fitiavako.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hotiaviko kosa ny taranak’i Joda ka hovonjeko. Izaho TOMPO Andriamaniny no hamonjy azy, nefa tsy amin’ny tsipîka na amin’ny sabatra na amin’ny ady, na koa amin’ny soavaly na amin’ny mpitaingin-tsoavaly, fa amin’ny anarako.»
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nisara-nono i Lô-Rohamà, dia nitoe-jaza indray i Gômera ka niteraka zazalahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Hôsea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ataovy hoe Lô-Hamỳ ny anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy vahoakako ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsinontsinona Aho aminareo.»
