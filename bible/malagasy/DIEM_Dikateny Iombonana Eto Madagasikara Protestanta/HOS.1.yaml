document_id: HOS.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ny teny izay nampitain’ny TOMPO tamin’i Hôsea zanakalahin’i Beerỳ tamin’ny andron’i Hozià sy i Jôtama sy i Ahaza ary i Hezekià mpanjakan’i Joda, sy tamin’ny andron’i Jerôbohama zanakalahin’i Jôasy sady mpanjakan’i '
  - type: text
    content: Israely
  - type: note
    content: 'I Israely raha ampitahaina amin’i Joda eto dia manondro ny fanjakana israelita avaratra izay naorin’i Jerôbohama I taorian’ny nahafatesan’i Salômôna (jereo 1 Mp 12.16-20). Ny mpanjaka Jerôbohama voalaza eto dia ny mitondra ny laharana faha-II izay nanjaka tamin’i Israely tamin’ny 787 ka hatramin’ny 747 tal J.K. (Jereo 2 Mp 14.23-29.) –Hozià: jereo nta amin’ny Ham 1.1. –Jôtama: 2 Mp 15.32-38; 2 Tan 27.1-3, 7-9. –Ahaza: 2 Mp 16.1-20; 2 Tan 28.1-27. –Hezekià: 2 Mp 18-20; 2 Tan 29-32.'
  - type: text
    content: .
  - type: heading
    content: Ny vady aman-janak’i Hôsea
  '2':
  - type: text
    content: 'Fony nanomboka niteny tamin’ny alalan’i Hôsea ny TOMPO, dia nanao taminy hoe:'
  - type: text
    content: «Mandehana maka vady mpivarotena tokoa
  - type: text
    content: sy zanaka avy amin’ny fivarotan-tenany;
  - type: text
    content: fa ny mivarotena
  - type: note
    content: Ny andriamanitra Bahala* sy ny andriamanibavy Hastôreta* izay nivavahan’ny Kanahanita sy ny Israelita maro niara-belona tamin’i Hôsea, dia ninoana ho mampahavokatra ny tany sy mampiteraka be dia be ny biby fiompy na ny olona koa (jereo 2.7). Ny fanompoam-pivavahana izay atao ho fanomezam-boninahitra azy ireo dia nisy fombam-pivavahana fivarotan-tena (jereo 4.12-14).
  - type: text
    content: ' miala amin’ny TOMPO'
  - type: text
    content: no ataon’ny mponina eto amin’ny tany.»
  '3':
  - type: text
    content: 'Dia nandeha naka an’i Gômera zanakavavin’i Diblaîma i Hôsea; ary nitoe-jaza taminy ravehivavy ka niteraka zazalahy. '
  '4':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Hôsea:'
  - type: text
    content: «Ataovy hoe Jizrehèla ny anarany,
  - type: text
    content: satria tsy ho ela ny hanafaizako
  - type: text
    content: ny taranak’i Jehò
  - type: text
    content: noho ny ra latsaka tao Jizrehèla
  - type: note
    content: Teny mampahatsiaro ny fandringanan’i Jehò ny fianakavian’i Ahaba araka ny 2 Mp 9-10. I Jerôbohama II dia isan’ny taranak’i Jehò.
  - type: text
    content: ;
  - type: text
    content: ary hofaranako
  - type: text
    content: 'ny fanjakan’ny taranak’i '
  - type: text
    content: Israely
  - type: text
    content: .
  '5':
  - type: text
    content: Amin’izany andro izany dia homontsaniko
  - type: text
    content: eo amin’ny lemak’i Jizrehèla
  - type: text
    content: ny herin’i Israely ara-tafika.
  '6':
  - type: text
    content: 'Nitoe-jaza indray i Gômera ka niteraka zazavavy; ary hoy ny TOMPO tamin’i Hôsea:'
  - type: text
    content: «Ataovy hoe Lô-Rohamà ny anarany,
  - type: text
    content: satria tsy haneho fitiavana intsony
  - type: text
    content: amin’ny taranak’i Israely Aho;
  - type: text
    content: eny, hotsoahiko aminy tanteraka ny fitiavako.
  '7':
  - type: text
    content: Fa hotiaviko kosa ny taranak’i Joda ka hovonjeko. Izaho TOMPO Andriamaniny no hamonjy azy, nefa tsy amin’ny tsipîka na amin’ny sabatra na amin’ny ady, na koa amin’ny soavaly na amin’ny mpitaingin-tsoavaly, fa amin’ny anarako.»
  '8':
  - type: text
    content: 'Rehefa nisara-nono i Lô-Rohamà, dia nitoe-jaza indray i Gômera ka niteraka zazalahy. '
  '9':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Hôsea:'
  - type: text
    content: «Ataovy hoe Lô-Hamỳ ny anarany,
  - type: text
    content: satria tsy vahoakako ianareo,
  - type: text
    content: ary tsinontsinona Aho aminareo.»
