document_id: 2SA.19,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Niontam-po ny mpanjaka, ka lasa niakatra nankao amin’ny efitrano teo ambony vavahady mba hitomany. Hoy izy teny am-pandehanana:'
  - type: text
    content: –Ry Absalôma zanako ô, ry zanako! Ry Absalôma zanako ô! Inay anie aho no maty nisolo anao! Ry Absalôma zanako ô, ry zanako!
  '10':
  - type: text
    content: 'Nisy ady hevitra nafana tany amin’ny foko israelita rehetra ka nifampilazana hoe: «Namonjy antsika tamin’ny tanan’ny fahavalontsika ny mpanjaka, izy no nanafaka antsika teo an-tanan’ny Filistinina; ary ankehitriny, noho ny amin’i Absalôma, dia voatery nandositra ny taniny izy. '
  '11':
  - type: text
    content: Fa i Absalôma izay natsangantsika ho filohantsika kosa dia efa maty tamin’ny ady. Koa inona indray no andrasantsika tsy hamerenana ny mpanjaka?»
  '12':
  - type: text
    content: 'Fa i Davida kosa naniraka olona hilaza amin’i Tsadôka sy i Abiatara mpisorona hoe: «Mitenena amin’ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Joda ianareo ka manontania azy hoe: ‹Nahoana no ianareo indray no ho farany amin’ny fampodiana ny mpanjaka any an-tranony, nefa izay nolazain’ireo Israelita hafa rehetra dia efa tonga any amin’ny mpanjaka! '
  '13':
  - type: text
    content: 'Mpiray foko amin’ny mpanjaka ianareo, ary havany sy tapany, koa nahoana no ianareo indray no ho farany amin’ny fampodiana azy?› '
  '14':
  - type: text
    content: 'Izao kosa no hafatro holazainareo amin’i Hamasà: ‹Moa tsy havako sy tapako va ianao? Hataon’Andriamanitra amiko anie ny sazy faran’izay henjana, raha tsy ianao no tonga filohan’ny tafiko ho solon’i Jôaba!› »'
  '15':
  - type: text
    content: 'Nandresy lahatra ny lehilahin’i Joda rehetra ny tenin’i Davida, ka dia toy ny olona iray ihany izy rehetra no naniraka hilaza amin’ny mpanjaka hoe: «Modia re ianao sy ny mpanomponao rehetra!» '
  '16':
  - type: text
    content: Dia nody ny mpanjaka ka tonga tao Jôrdàna.
  - type: heading
    content: Tsimbinin’i Davida i Simehỳ
  - type: text
    content: Tonga tao Gilgala
  - type: note
    content: Anaran-toerana maro any Israely izany; ny Gilgala eto dia mety ilay any akaikin’i Jerikao (jereo Jos 3-4).
  - type: text
    content: ' tamin’izay ny olon’i Joda mba hitsena ny mpanjaka sady hampita azy an’i Jôrdàna. '
  '17':
  - type: text
    content: Ary i Simehỳ
  - type: note
    content: Simehỳ jereo 16.5-14.
  - type: text
    content: ' zanakalahin’i Gerà sady Benjaminita avy any Bahorima, dia mba dodona nidina niaraka tamin’ny lehilahin’i Joda hitsena an’i Davida mpanjaka. '
  '18':
  - type: text
    content: 'Nisy Benjaminita arivo lahy nanaraka azy; toraka izany koa i Tsibà, mpanompon’ny fianakavian’i Saoly sy ireo zanany dimy ambin’ny folo mbamin’ny mpanompony roapolo lahy. Nidodododo nankany Jôrdàna hitsena ny mpanjaka ry i Tsibà, '
  '19':
  - type: text
    content: fony namaky ny renirano ny zahatra, satria ireo no nanao izay hampitana ny fianakavian’ny mpanjaka sy hanatanterahana izay sitrany.
  - type: text
    content: 'Rehefa tafita an’i Jôrdàna ny mpanjaka, dia niantoraka nitehi-tany teo anatrehan’ny mpanjaka i Simehỳ zanakalahin’i Gerà '
  '2':
  - type: text
    content: 'Ary nampandrenesina i Jôaba hoe:'
  - type: text
    content: '–Indro fa mitomany sy malahelo an’i Absalôma ny mpanjaka. '
  '20':
  - type: text
    content: 'sady niteny taminy hoe:'
  - type: text
    content: '–Aza isainao heloka aho, ry andriamanjaka. Aza tsaroanao ny fahadisoako tamin’ny andro nandaozanao an’i Jerosalema. Aoka tsy hataonao am-po izany! '
  '21':
  - type: text
    content: Fa izaho mpanomponao dia mahafantatra fa nanota tokoa; kanefa ankehitriny dia tonga aho, nialoha ny taranak’i Jôsefa rehetra mba hidina hitsena anao, ry andriamanjaka.
  '22':
  - type: text
    content: 'Fa namaly i Abisay, zanakalahin’i Tseroià ka nanao hoe:'
  - type: text
    content: –Maivana raha izany no antony tsy hahafaty an’i Simehỳ, satria efa nanozona ny mpanjaka voahosotry ny TOMPO izy.
  '23':
  - type: text
    content: 'Hoy kosa i Davida hoe:'
  - type: text
    content: –Tsy raharahanareo izany, ry zanakalahin’i Tseroià. Fa ahoana moa no anoheranareo ahy ankehitriny? Tsy tokony hisy olona hatao maty eto amin’i Israely anio, satria fantatro fa amin’izao andro izao no tena mpanjakan’i Israely aho.
  '24':
  - type: text
    content: 'Ka hoy ny mpanjaka tamin’i Simehỳ:'
  - type: text
    content: –Tsy ho faty tsy akory ianao. Ny tenako no mianiana izany aminao.
  - type: heading
    content: I Davida mihavana indray amin’i Mefibôseta
  '25':
  - type: text
    content: Tonga nitsena ny mpanjaka ihany koa i Mefibôseta
  - type: note
    content: 'Mefibôseta: jereo 9.1-13; 16.1-4.'
  - type: text
    content: ' zafikelin’i Saoly! Tsy nanasa tongotra na nanala volombava na nanasa ny fitafiany izy hatramin’ny andro nahalasanan’ny mpanjaka ka hatramin’izao niverenany tsy maty fo aman’aina izao. '
  '26':
  - type: text
    content: 'Rehefa tonga tao Jerosalema hitsena ny mpanjaka izy, dia hoy ny mpanjaka taminy:'
  - type: text
    content: –Nahoana ianao, ry Mefibôseta, no tsy mba nandeha niaraka tamiko?
  '27':
  - type: text
    content: 'Fa hoy ny navaliny:'
  - type: text
    content: '–Voafitaky ny mpanompoko aho, ry andriamanjaka. Fa hoy aho anakampoko: «Noho izaho mandringa, dia hanisy lasely ny boriky vavy aho hitaingenako mba hanarahako ny mpanjaka.» '
  '28':
  - type: text
    content: 'Nefa nendrikendrehiny taminao aho. Fa toy ny '
  - type: text
    content: anjeli
  - type: text
    content: n’Andriamanitra
  - type: note
    content: Jereo 16.1-4.
  - type: text
    content: ' kosa ianao, ry andriamanjaka; koa ataovy izay sitrakao. '
  '29':
  - type: text
    content: Olona mendrika ny ho faty avokoa ny fianakavian-draiko teo anatrehanao, kanefa ianao nandray ahy mpanomponao ho isan’ny mpiray latabatra aminao. Koa zo inona indray no mbola ananako hangatahana tombontsoa hafa aminao?
  '3':
  - type: text
    content: 'Niova ho fisaonana ho an’ny tafika manontolo tamin’io andro io ny fandresena, satria tamin’io no nandrenesany fa nalahelo mafy ny zanany ny mpanjaka. '
  '30':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy:'
  - type: text
    content: –Ahoana indray no mbola ilazanao izany? Ambarako fa ianao sy i Tsibà no hifampizara ny tanin’i Saoly.
  '31':
  - type: text
    content: 'Hoy kosa i Mefibôseta tamin’ny mpanjaka:'
  - type: text
    content: –Aoka ho azy avokoa ny tany rehetra, fa efa tafaverina tsy maty fo aman’aina ihany ianao, ry andriamanjaka.
  - type: heading
    content: I Davida mamaly fitia an’i Barzilay
  '32':
  - type: text
    content: Nidina avy tany Rôgelima i Barzilay
  - type: note
    content: Momba an’i Barzilay, dia jereo 17.27-29.
  - type: text
    content: ' izay Gilehadita. Niara-nita an’i Jôrdàna tamin’ny mpanjaka izy mba hanao veloma azy erỳ am-pitan’ny rano. '
  '33':
  - type: text
    content: 'Lahy antitra efa valopolo taona i Barzilay; mpanankarena izy ka nanome sakafo ny mpanjaka izay nisitaka tany Mahanaîma. '
  '34':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’i Barzilay:'
  - type: text
    content: –Andao hanaraka ahy any Jerosalema ianao fa hataoko tsara karakara tokoa.
  '35':
  - type: text
    content: 'Fa hoy i Barzilay tamin’ny mpanjaka:'
  - type: text
    content: '–Firy taona sisa hahavelomako no hiara-miakatra aminao any Jerosalema aho! '
  '36':
  - type: text
    content: 'Efa valopolo taona aho izao; ary tsy ho haiko intsony ny manavaka ny tsara sy ny ratsy, na ny mahatsapa ny tsiron’izay haniko sy sotroiko, na koa ny mankafy ny feon’ny lehilahy sy vehivavy mpihira. Koa nahoana indray izaho mpanomponao no ho enta-mavesatra ho anao, ry andriamanjaka? '
  '37':
  - type: text
    content: 'Zara raha afaka hiampita an’i Jôrdàna miaraka aminao aho; koa nahoana no hanehoanao amiko fankasitrahana toy izany? '
  '38':
  - type: text
    content: Aoka aho mpanomponao hody ihany ary aoka aho ho faty ao an-tanànako eo anilan’ny fasan’ny raiko sy ny reniko. Fa indro i Kimihama zanako lahy; aoka izy no hiaraka aminao ry andriamanjaka, ary hanaovanao izay sitrakao.
  '39':
  - type: text
    content: 'Dia hoy ny mpanjaka:'
  - type: text
    content: '–Aoka àry hiaraka amiko i Kimihama, ka hanaovako izay sitrakao; ary ny zavatra rehetra hangatahinao amiko, dia hataoko ho anao. '
  '4':
  - type: text
    content: 'Ny miaramila, tamin’io andro io, dia niditra mangingina tao an-tanàna, tahaka ireny olona menatra satria mandositra an’ady ireny. '
  '40':
  - type: text
    content: 'Nita an’i Jôrdàna ny vahoaka rehetra, rehefa tafita ny mpanjaka; dia norohan’i Davida sy '
  - type: text
    content: notsofiny rano
  - type: text
    content: ' i Barzilay, vao lasa nody any amin’ny fonenany. '
  '41':
  - type: text
    content: Nandroso nankany Gilgala
  - type: note
    content: Jereo and 16 sy nta.
  - type: text
    content: ' kosa ny mpanjaka, ary niarahan’i Kimihama.'
  - type: heading
    content: Fifandiran’ny Israelita sy ny Jodeanina
  - type: text
    content: 'Nanara-dia ny mpanjaka ny Jodeanina rehetra sy ny antsasak’ireo Israelita avaratra. '
  '42':
  - type: text
    content: 'Ary indreo nankeo amin’ny mpanjaka avokoa ny lehilahy israelita, ka nanao taminy hoe:'
  - type: text
    content: –Nahoana ireo lehilahy jodeanina rahalahinay no naka an-keriny anao, ry Davida mpanjaka, mba hitondra ny tenanao sy ny fianakavianao hiampita an’i Jôrdàna, nefa dia tafaraka taminao ny miaramilanao rehetra.
  '43':
  - type: text
    content: 'Namaly ny lehilahy israelita kosa ny lehilahy jodeanina rehetra ka nanao hoe:'
  - type: text
    content: –Satria havana akaiky aminay ny mpanjaka! Koa ahoana no mahatezitra anareo amin’izany? Mba nihinan-javatra avy tamin’ny mpanjaka va izahay? Na mba nanome zavatra anay akory va izy?
  '44':
  - type: text
    content: 'Fa hoy indray ny lehilahy israelita tamin’ireo lehilahy jodeanina:'
  - type: text
    content: –Impolo heny amin’ny anareo ny zonay amin’ny mpanjaka
  - type: note
    content: folo no isan’ny foko avaratra, kanefa foko tokana kosa i Joda.
  - type: text
    content: ; eny, manana anjara mihoatra noho ianareo amin’i Davida izahay. Koa nahoana ianareo no nanao tsinontsinona anay? Tsy izahay va no niteny voalohany hamerina ny mpanjakanay!
  - type: text
    content: Fa lozaloza kokoa noho ny tenin’ireo israelita ny an’ireo lehilahy jodeanina.
  '5':
  - type: text
    content: 'Fa nanaron-tava ny mpanjaka sady mbola nikiakiaka mafy hoe:'
  - type: text
    content: –Ry Absalôma zanako ô! Ry Absalôma zanako ô! Ry zanako ô!
  '6':
  - type: text
    content: 'Dia nankao amin’ny mpanjaka i Jôaba ka nanao taminy hoe:'
  - type: text
    content: '–Norakofanao henatra androany ny miaramilanao rehetra izay namonjy aina anao sy ny zanakao lahy aman-janakao vavy ary ny vadinao sy ny vaditsindranonao. '
  '7':
  - type: text
    content: 'Ny mankahala anao manko no tianao, fa ny mitia anao kosa halanao. Nasehonao androany ny mahatsinontsinona eo anatrehanao ny manamboninahitra sy ny miaramila. Eny, fantatro izao fa raha i Absalôma no velona teo ary izahay rehetra kosa no maty, dia ho faly tokoa ianao. '
  '8':
  - type: text
    content: Ry andriamanjaka ô, mitsangana re ianao ankehitriny, dia mandehana ampaherezo ny fon’ny miaramilanao; raha tsy mankany kosa ianao, dia ianianako amin’ny anaran’ny TOMPO ianao fa tsy hisy olona hitoetra eto aminao intsony anio alina; ary dia ho ratsy lavitra izany noho izay loza rehetra efa nanjo anao hatramin’ny fahatanoranao ka mandraka ankehitriny.
  '9':
  - type: text
    content: Dia nitsangana ny mpanjaka ka nipetraka teo am-bavahady. Ary nambara tamin’ny miaramila fa mipetraka eo am-bavahady ny mpanjaka; koa dia nitangorona teo amin’ny mpanjaka izy rehetra.
  - type: heading
    content: Nasaina hiditra ao Jerosalema i Davida
  - type: text
    content: 'Efa nandositra nody tany an-tranony avy ny Israelitan’i Absalôma. '
