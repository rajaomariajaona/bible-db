document_id: 2SA.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niontam-po ny mpanjaka, ka lasa niakatra nankao amin’ny efitrano teo ambony vavahady mba hitomany. Hoy izy teny am-pandehanana:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Absalôma zanako ô, ry zanako! Ry Absalôma zanako ô! Inay anie aho no maty nisolo anao! Ry Absalôma zanako ô, ry zanako!
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy ady hevitra nafana tany amin’ny foko israelita rehetra ka nifampilazana hoe: «Namonjy antsika tamin’ny tanan’ny fahavalontsika ny mpanjaka, izy no nanafaka antsika teo an-tanan’ny Filistinina; ary ankehitriny, noho ny amin’i Absalôma, dia voatery nandositra ny taniny izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Absalôma izay natsangantsika ho filohantsika kosa dia efa maty tamin’ny ady. Koa inona indray no andrasantsika tsy hamerenana ny mpanjaka?»
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Davida kosa naniraka olona hilaza amin’i Tsadôka sy i Abiatara mpisorona hoe: «Mitenena amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’i Joda ianareo ka manontania azy hoe: ‹Nahoana no ianareo indray no ho farany amin’ny fampodiana ny mpanjaka any an-tranony, nefa izay nolazain’ireo Israelita hafa rehetra dia efa tonga any amin’ny mpanjaka! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpiray foko amin’ny mpanjaka ianareo, ary havany sy tapany, koa nahoana no ianareo indray no ho farany amin’ny fampodiana azy?› '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao kosa no hafatro holazainareo amin’i Hamasà: ‹Moa tsy havako sy tapako va ianao? Hataon’Andriamanitra amiko anie ny sazy faran’izay henjana, raha tsy ianao no tonga filohan’ny tafiko ho solon’i Jôaba!› »'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandresy lahatra ny lehilahin’i Joda rehetra ny tenin’i Davida, ka dia toy ny olona iray ihany izy rehetra no naniraka hilaza amin’ny mpanjaka hoe: «Modia re ianao sy ny mpanomponao rehetra!» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nody ny mpanjaka ka tonga tao Jôrdàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsimbinin’i Davida i Simehỳ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tonga tao Gilgala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Anaran-toerana maro any Israely izany; ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gilgala
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto dia mety ilay any akaikin’i Jerikao (jereo Jos 3-4).'
      marker-yv: yv-n
    - type: text
      text: ' tamin’izay ny olon’i Joda mba hitsena ny mpanjaka sady hampita azy an’i Jôrdàna. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Simehỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Simehỳ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 16.5-14.
      marker-yv: yv-n
    - type: text
      text: ' zanakalahin’i Gerà sady Benjaminita avy any Bahorima, dia mba dodona nidina niaraka tamin’ny lehilahin’i Joda hitsena an’i Davida mpanjaka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy Benjaminita arivo lahy nanaraka azy; toraka izany koa i Tsibà, mpanompon’ny fianakavian’i Saoly sy ireo zanany dimy ambin’ny folo mbamin’ny mpanompony roapolo lahy. Nidodododo nankany Jôrdàna hitsena ny mpanjaka ry i Tsibà, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fony namaky ny renirano ny zahatra, satria ireo no nanao izay hampitana ny fianakavian’ny mpanjaka sy hanatanterahana izay sitrany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tafita an’i Jôrdàna ny mpanjaka, dia niantoraka nitehi-tany teo anatrehan’ny mpanjaka i Simehỳ zanakalahin’i Gerà '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampandrenesina i Jôaba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indro fa mitomany sy malahelo an’i Absalôma ny mpanjaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza isainao heloka aho, ry andriamanjaka. Aza tsaroanao ny fahadisoako tamin’ny andro nandaozanao an’i Jerosalema. Aoka tsy hataonao am-po izany! '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa izaho mpanomponao dia mahafantatra fa nanota tokoa; kanefa ankehitriny dia tonga aho, nialoha ny taranak’i Jôsefa rehetra mba hidina hitsena anao, ry andriamanjaka.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly i Abisay, zanakalahin’i Tseroià ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Maivana raha izany no antony tsy hahafaty an’i Simehỳ, satria efa nanozona ny mpanjaka voahosotry ny TOMPO izy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy raharahanareo izany, ry zanakalahin’i Tseroià. Fa ahoana moa no anoheranareo ahy ankehitriny? Tsy tokony hisy olona hatao maty eto amin’i Israely anio, satria fantatro fa amin’izao andro izao no tena mpanjakan’i Israely aho.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny mpanjaka tamin’i Simehỳ:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy ho faty tsy akory ianao. Ny tenako no mianiana izany aminao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida mihavana indray amin’i Mefibôseta
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tonga nitsena ny mpanjaka ihany koa i Mefibôseta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mefibôseta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 9.1-13; 16.1-4.
      marker-yv: yv-n
    - type: text
      text: ' zafikelin’i Saoly! Tsy nanasa tongotra na nanala volombava na nanasa ny fitafiany izy hatramin’ny andro nahalasanan’ny mpanjaka ka hatramin’izao niverenany tsy maty fo aman’aina izao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga tao Jerosalema hitsena ny mpanjaka izy, dia hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana ianao, ry Mefibôseta, no tsy mba nandeha niaraka tamiko?
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Voafitaky ny mpanompoko aho, ry andriamanjaka. Fa hoy aho anakampoko: «Noho izaho mandringa, dia hanisy lasely ny boriky vavy aho hitaingenako mba hanarahako ny mpanjaka.» '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nefa nendrikendrehiny taminao aho. Fa toy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeli
    - type: text
      text: n’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.1-4.
      marker-yv: yv-n
    - type: text
      text: ' kosa ianao, ry andriamanjaka; koa ataovy izay sitrakao. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Olona mendrika ny ho faty avokoa ny fianakavian-draiko teo anatrehanao, kanefa ianao nandray ahy mpanomponao ho isan’ny mpiray latabatra aminao. Koa zo inona indray no mbola ananako hangatahana tombontsoa hafa aminao?
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Niova ho fisaonana ho an’ny tafika manontolo tamin’io andro io ny fandresena, satria tamin’io no nandrenesany fa nalahelo mafy ny zanany ny mpanjaka. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana indray no mbola ilazanao izany? Ambarako fa ianao sy i Tsibà no hifampizara ny tanin’i Saoly.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Mefibôseta tamin’ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka ho azy avokoa ny tany rehetra, fa efa tafaverina tsy maty fo aman’aina ihany ianao, ry andriamanjaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida mamaly fitia an’i Barzilay
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nidina avy tany Rôgelima i Barzilay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba an’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Barzilay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dia jereo 17.27-29.'
      marker-yv: yv-n
    - type: text
      text: ' izay Gilehadita. Niara-nita an’i Jôrdàna tamin’ny mpanjaka izy mba hanao veloma azy erỳ am-pitan’ny rano. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lahy antitra efa valopolo taona i Barzilay; mpanankarena izy ka nanome sakafo ny mpanjaka izay nisitaka tany Mahanaîma. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Barzilay:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andao hanaraka ahy any Jerosalema ianao fa hataoko tsara karakara tokoa.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Barzilay tamin’ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Firy taona sisa hahavelomako no hiara-miakatra aminao any Jerosalema aho! '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Efa valopolo taona aho izao; ary tsy ho haiko intsony ny manavaka ny tsara sy ny ratsy, na ny mahatsapa ny tsiron’izay haniko sy sotroiko, na koa ny mankafy ny feon’ny lehilahy sy vehivavy mpihira. Koa nahoana indray izaho mpanomponao no ho enta-mavesatra ho anao, ry andriamanjaka? '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Zara raha afaka hiampita an’i Jôrdàna miaraka aminao aho; koa nahoana no hanehoanao amiko fankasitrahana toy izany? '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Aoka aho mpanomponao hody ihany ary aoka aho ho faty ao an-tanànako eo anilan’ny fasan’ny raiko sy ny reniko. Fa indro i Kimihama zanako lahy; aoka izy no hiaraka aminao ry andriamanjaka, ary hanaovanao izay sitrakao.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka àry hiaraka amiko i Kimihama, ka hanaovako izay sitrakao; ary ny zavatra rehetra hangatahinao amiko, dia hataoko ho anao. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny miaramila, tamin’io andro io, dia niditra mangingina tao an-tanàna, tahaka ireny olona menatra satria mandositra an’ady ireny. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nita an’i Jôrdàna ny vahoaka rehetra, rehefa tafita ny mpanjaka; dia norohan’i Davida sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: notsofiny rano
    - type: text
      text: ' i Barzilay, vao lasa nody any amin’ny fonenany. '
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nandroso nankany Gilgala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo and 16 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' kosa ny mpanjaka, ary niarahan’i Kimihama.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fifandiran’ny Israelita sy ny Jodeanina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanara-dia ny mpanjaka ny Jodeanina rehetra sy ny antsasak’ireo Israelita avaratra. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indreo nankeo amin’ny mpanjaka avokoa ny lehilahy israelita, ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana ireo lehilahy jodeanina rahalahinay no naka an-keriny anao, ry Davida mpanjaka, mba hitondra ny tenanao sy ny fianakavianao hiampita an’i Jôrdàna, nefa dia tafaraka taminao ny miaramilanao rehetra.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly ny lehilahy israelita kosa ny lehilahy jodeanina rehetra ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Satria havana akaiky aminay ny mpanjaka! Koa ahoana no mahatezitra anareo amin’izany? Mba nihinan-javatra avy tamin’ny mpanjaka va izahay? Na mba nanome zavatra anay akory va izy?
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy indray ny lehilahy israelita tamin’ireo lehilahy jodeanina:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Impolo heny amin’ny anareo ny zonay amin’ny mpanjaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.44 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'folo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: no isan’ny foko avaratra, kanefa foko tokana kosa i Joda.
      marker-yv: yv-n
    - type: text
      text: ; eny, manana anjara mihoatra noho ianareo amin’i Davida izahay. Koa nahoana ianareo no nanao tsinontsinona anay? Tsy izahay va no niteny voalohany hamerina ny mpanjakanay!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa lozaloza kokoa noho ny tenin’ireo israelita ny an’ireo lehilahy jodeanina.
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa nanaron-tava ny mpanjaka sady mbola nikiakiaka mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Absalôma zanako ô! Ry Absalôma zanako ô! Ry zanako ô!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankao amin’ny mpanjaka i Jôaba ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Norakofanao henatra androany ny miaramilanao rehetra izay namonjy aina anao sy ny zanakao lahy aman-janakao vavy ary ny vadinao sy ny vaditsindranonao. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny mankahala anao manko no tianao, fa ny mitia anao kosa halanao. Nasehonao androany ny mahatsinontsinona eo anatrehanao ny manamboninahitra sy ny miaramila. Eny, fantatro izao fa raha i Absalôma no velona teo ary izahay rehetra kosa no maty, dia ho faly tokoa ianao. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ry andriamanjaka ô, mitsangana re ianao ankehitriny, dia mandehana ampaherezo ny fon’ny miaramilanao; raha tsy mankany kosa ianao, dia ianianako amin’ny anaran’ny TOMPO ianao fa tsy hisy olona hitoetra eto aminao intsony anio alina; ary dia ho ratsy lavitra izany noho izay loza rehetra efa nanjo anao hatramin’ny fahatanoranao ka mandraka ankehitriny.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitsangana ny mpanjaka ka nipetraka teo am-bavahady. Ary nambara tamin’ny miaramila fa mipetraka eo am-bavahady ny mpanjaka; koa dia nitangorona teo amin’ny mpanjaka izy rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nasaina hiditra ao Jerosalema i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nandositra nody tany an-tranony avy ny Israelitan’i Absalôma. '
