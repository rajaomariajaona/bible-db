document_id: 1KI.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Navelan’i Ahaba mpanjaka hovonoina ho faty i Nabôta.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Taorian’izany dia izao no nitranga: nisy lehilahy natao hoe Nabôta tao Jizrehela, izay nanana tanimboaloboka teo akaikin’ny lapan’i Ahaba mpanjakan’i Samaria. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mifanatrika aminy eo kosa dia asio roa lahy mba hiampanga lainga azy ho nanozona an’Andriamanitra sy ny mpanjaka. Ary ento any ivelan’ny tanàna izy ka torahy vato ho faty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Izay meloka fa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nanozona an’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (Lev 24.10-16) na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny mpanjaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (2 Sam 19.22) dia hatao maty.'
      marker-yv: yv-n
    - type: text
      text: ».
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny loholona sy ny manampahefana tao an-tanànan’i Nabôta dia nanao araka ny baikon’i Jezebela tamin’ny taratasy nalefany ho azy ireo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Niantso andro fifadian-kanina izy ka i Nabôta no nasainy nitarika ny vahoaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia niroso teo anoloan’i Nabôta ireo tsivalahara roa lahy ka niampanga lainga azy teo anatrehan’ny olona hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nanozona an’Andriamanitra sy ny mpanjaka i Nabôta!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia nentin’ny olona tany ivelan’ny tanàna izy ary notorahany vato mandra-pahafatiny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary naniraka olona hilaza amin’i Jezebela ny manampahefana tao an-tanàna fa notoraham-bato i Nabôta ka maty. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Rehefa ren’i Jezebela fa maty notoraham-bato i Nabôta, dia hoy izy tamin’i Ahaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitsangàna ka alao ho anao ny tanimboaloboka izay tsy neken’i Nabôta hamidy taminao, satria tsy isan’ny velona intsony izy fa efa maty.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Rehefa ren’i Ahaba fa maty i Nabôta, dia lasa izy nankany amin’ny tanimboalobok’i Nabôta ilay Jizrehelita mba haka izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nomelohin’Andriamanitra ny nataon’i Ahaba sy i Jezebela
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa nisy tenin’ny TOMPO tamin’i Elià avy any Tisbe nanao hoe:'
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '–Midîna mankany amin’i Ahaba mpanjakan’i Israely izay ao Samaria. Ao an-tanimboalobok’i Nabôta izy izao, satria lasa nankao izy mba haka izany. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa teneno izy hoe: Izao no lazain’ny TOMPO: «Rehefa avy nahafaty olona ve ianao, dia mbola haka ny fananany koa!» Ary teneno indray izy hoe: Izao no lazain’ny TOMPO: «Eo amin’ny toerana izay nilelafan’ny alika ny ran’i Nabôta no hilelafan’ny alika ihany koa ny ranao.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niteny tamin’i Nabôta i Ahaba indray andro nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Omeo ahy ny tanimboalobokao hataoko zaridaina fambolena anana, satria mba akaikin’ny lapako izy; homeko tanimboaloboka tsara kokoa noho io ianao ho takalony, na koa homeko izay vola tokom-bidiny raha izany no mety aminao.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy i Ahaba tamin’i Elià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mbola hitanao ihany va aho, ry ilay fahavaloko?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Eny, mbola hitako ihany ianao satria efa nitolo-tena hanao izay ratsy eo imason’ny TOMPO; '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'fa izao no nambarany: «Hahatonga loza aminao Aho ka handringana anao tanteraka, hofongorako ny lehilahy rehetra amin’ny fianakavianao, na zaza izy na olon-dehibe. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hataoko tahaka izay nanjo ny taranak’i Jerôbohama zanakalahin’i Nebata sy ny taranak’i Bahasà zanakalahin’i Ahià ny taranakao, noho ny nampahaviniranao Ahy sy ny nampanotanao an’i Israely.» '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Niteny momba an’i Jezebela koa ny TOMPO ka nanao hoe: «Ary i Jezebela dia hohanin’ny alika eo akaikin’ny mandan’i Jizrehela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 9.36.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Izay taminganao, ry Ahaba, ka maty ao an-tanàna dia hohanin’ny alika, ary izay maty any an-tsaha kosa dia hohanin’ny voro-manidina.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa tsy nisy mihitsy olona tahaka an’i Ahaba izay nitolo-tena hanao izay ratsy eo imason’ny TOMPO, satria nampirisihin’i Jezebela vadiny izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Zava-maharikoriko loatra no vitany tamin’ny nanarahany ny sampy tahaka ny nataon’ny Amôrita izay noroahin’ny TOMPO teo anoloan’ny Israelita.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fietren’i Ahaba
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Rehefa ren’i Ahaba izany, dia norovitiny ny fitafiany, ka gony no nanaovany manolo-koditra; dia nifady hanina izy sady nandry tamin’ilay gony ary namindra miadana dia miadana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa nisy tenin’ny TOMPO tamin’i Elià avy any Tisbe nanao hoe:'
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: –Moa hitanao izao fietren-tenan’i Ahaba eto anatrehako izao? Satria nanao izany izy, dia tsy hahatonga loza amin’ny fianakaviany amin’ny androny Aho, fa amin’ny andron-janany kosa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa hoy i Nabôta tamin’i Ahaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Sanatria amiko eo anatrehan’ny TOMPO raha izay hanome anao ny lova avy amin’ny razako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tamin’ny andro faha-mpanjaka dia izay manana ny tanim-pianakaviany ihany no Israelita tsy misy fangarony. –Ampit Lev 25.23.
      marker-yv: yv-n
    - type: text
      text: '!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nalahelo sady tezitra i Ahaba no niverina tao an-tranony, satria nilazan’i Nabôta avy ao Jizrehela hoe: «Tsy homeko anao ny lova avy amin’ny razako.» Dia nandry teo am-parafarany izy ka nitodika tany amin’ny rindrina ary tsy nety nihinan-kanina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa nanatona azy i Jezebela vadiny ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no manjonitra toy izao ianao ka tsy mety mihinan-kanina?
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy ny navaliny azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nitenenako i Nabôta avy ao Jizrehela hoe: «Omeo ahy ny tanimboalobokao hovidiko na koa hatakaloko tanimboaloboka hafa, raha izany no mety aminao»; fa namaly izy hoe: «Tsy homeko anao ny tanimboaloboko».'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy i Jezebela vadiny taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny tenanao no manjaka amin’i Israely; koa miarena, dia mihinàna, ary aoka hifaly ny fonao, fa ny tenako mihitsy no hanome anao ny tanimboalobok’i Nabôta ilay Jizrehelita.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia tamin’ny anaran’i Ahaba no nanoratan’i Jezebela taratasy, ka nasiany tombon-kasem-panjakana ireny ary nalefany ho an’ny loholona sy ny manampahefana tao an-tanàna nonenan’i Nabôta. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izao no voasorany tao amin’ny taratasy: «Miantsoa andro fifadian-kanina ka i Nabôta no asaivo mitarika ny vahoaka amin’izany. '
