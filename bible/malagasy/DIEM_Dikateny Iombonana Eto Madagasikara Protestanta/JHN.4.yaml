document_id: JHN.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Resak’i Jesoa amin’ilay vehivavy samaritanina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Tamin’izay dia ren’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' fa maro kokoa noho ny an’i Jôhany ireo olona tongan’i Jesoa ho mpianatra sy nataony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: '; (kanefa tsy ny tenan’i Jesoa no nanao batisa fa ireo mpianany). Nony fantatry ny Tompo hoe ren’ny Farisianina izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia niala tao Jodea Izy ary lasa nankany Galilea indray, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ka tsy maintsy namakivaky ny faritany Samaria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia tonga tao amin’ny tanàna anankiray any Samaria i Jesoa. I Sikara no anaran’ilay tanàna, izay teo akaikin’ny saha nomen’i Jakôba an’i Jôsefa zanany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 33.19; Jos 24.32.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: teo no nisy ny fantsakan’i Jakôba. Ary i Jesoa tamin’izay efa sasatry ny dia nataony, ka nipetraka teo amoron’ny fantsakana, tokony ho tamin’ny 12 antoandro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nisy vehivavy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: samaritanina
  - type: text
    text: ' anankiray tonga hantsaka rano, ka nitenenan’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba omeo rano Aho hosotroiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ireo mpianany efa lasa nankany an-tanàna hividy sakafo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy ilay vehivavy samaritanina tamin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Jiosy Ianao, ka nahoana no mangataka rano hosotroina amiko, nefa aho vehivavy samaritanina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lk 9.52-53.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa tsy mifandray amin’ny Samaritanina manko ny Jiosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ka izao no navalin’i Jesoa an-dravehivavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha mba fantatrao ny fanomezan’Andriamanitra ka fantatrao Ilay miteny aminao hoe: «mba omeo rano Aho hosotroiko», dia ianao no ho nangataka taminy ka homeny ranovelona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ranovelona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy karazana tsilalaon-teny ihany eto, satria ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ranovelona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay tenenin’i Jesoa dia ilay manome ny aina maharitra mandrakizay (jereo and 14).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy ravehivavy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy manana fanovozana Ianao, Tompoko, sady lalina ny fantsakana; koa avy aiza no ahazoanao izany ranovelona izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I Jakôba razantsika no nanome anay ity fantsakana ity ary nisotro rano teto avokoa ny tenany sy ny zanany mbamin’ny biby fiompiny. Fa Ianao angaha lehibe noho i Jakôba razantsika?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izay rehetra misotro amin’ity rano ity dia mbola hangetaheta hatrany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa na iza na iza hisotro amin’ny rano izay homeko azy dia tsy hangetaheta na oviana na oviana; satria ny rano izay homeko azy dia hanjary loharano ao anatiny ka hiboiboika ho aina maharitra mandrakizay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 12.3; Jer 2.13; 17.13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy ravehivavy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba omeo amin’izany rano izany aho, Tompoko, dia tsy hangetaheta intsony ary koa tsy hankatỳ hantsaka intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I Jesoa kosa niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha antsoy ny vadinao, ka miverena atỳ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa novalian-dravehivavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy manam-bady aho!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Marina ny filàzanao hoe tsy manam-bady ianao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: efa nanam-bady indimy ianao, ary tsy vadinao ilay itoeranao ankehitriny. Koa marina izany voalazanao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ravehivavy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hitako, Tompoko, fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' Ianao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ireo razanay Samaritanina dia nivavaka teto amin’ity tendrombohitra ity; fa ianareo Jiosy kosa milaza fa any Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voailika tsy ho anisan’ny ankohonambe jiosy intsony ny Samaritanina ka nanorina tempoly teo amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tendrombohitra Gerizîma,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tendrombohitra akaikin’i Sekema renivohitra taloha. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'any Jerosalema:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Sal 122.1-4.'
    marker-yv: yv-n
  - type: text
    text: ' no tsy maintsy ivavahana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa izao no tenin’i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Minoa Ahy ianao, ramatoa! Avy ny andro izay tsy hivavahana amin’ny Ray eto amin’ity tendrombohitra ity na any Jerosalema intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ianareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritanina
  - type: text
    text: ' dia mivavaka amin’izay tsy fantatrareo; fa izahay Jiosy kosa mivavaka amin’izay fantatray, satria mipoitra avy amin’ny Jiosy ny famonjena'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 2.3; Rm 9.3-4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa, ho an’ireo tena mpivavaka, dia avy ary efa tonga sahady aza ny andro izay hivavahany amin’ny Ray araka ny fanentanan’ny Fanahy Masina sy araka ny tena fivavahana marina; satria ny mpivavaka aminy araka izany no tadiavin’ny Ray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Andriamanitra dia Fanahy, ary ny mpivavaka aminy dia tsy maintsy mivavaka araka ny fanentanan’ny Fanahy Masina sy araka ny tena fivavahana marina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy ravehivavy tamin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fantatro fa misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ' anankiray ho avy, dia Ilay atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '! Ka rehefa tonga Izy, dia hambarany amintsika ny zavatra rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I Jesoa kosa nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho Izay miresaka aminao no Izy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’izay indrindra no tafaverina ny mpianany, ka gaga satria vehivavy no niresahany; saingy tsy nisy nanao hoe: «Inona no tadiavinao?» na hoe «Ahoana no iresahanao aminy?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nandao ny sininy ravehivavy, ka lasa nankany an-tanàna hilaza amin’ny olona hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: –Ndao ianareo hizaha Lehilahy anankiray, Izay nilaza tamiko ny nataoko rehetra; izao angaha no ilay Mesia?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia nivoaka ny tanàna ny olona ka nankeo amin’i Jesoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha tsy mbola tonga ny olona, dia niangavian’ny mpianany hisakafo i Jesoa ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, hano re ny sakafo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho dia manana sakafo izay tsy fantatrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin’izay ny mpianany dia nifampilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nisy olona nitondra zavatra hohaniny angaha?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Izao kosa no navalin’i Jesoa azy ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny sakafoko dia ny manao ny sitrapon’Ilay naniraka Ahy sy ny manatanteraka ny asa nampanaoviny Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tsy ianareo ve no milaza fa efa-bolana sisa dia ho tonga ny taom-pijinjana? Indro kosa Aho milaza aminareo hoe: atopazy ny masonareo ka jereo ny eny an-tsaha, fa masaka ny vary sady efa fijinja! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Izay mijinja dia mandray karama sahady ary mamory vokatra ho an’ny fiaina-maharitra mandrakizay; hany ka hiara-mifaly ny mpamafy sy ny mpijinja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Amin’izany manko dia marina ilay ohabolana hoe: «Ny iray mamafy ary ny iray kosa mijinja.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Izaho no naniraka anareo hijinja izay tsy nisasaranareo: olon-kafa no nisasatra, ary ianareo kosa nanohy eo amin’izay nisasarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Maro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritanina
  - type: text
    text: ' tamin’izany tanàna izany no nino an’i Jesoa noho ny tenin-dravehivavy nanambara hoe: «Nolazainy tamiko avokoa ny nataoko rehetra.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Koa rehefa tonga teo amin’i Jesoa ny Samaritanina, dia niangavy Azy hitoetra tao aminy; ary dia nitoetra tao indroa andro i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Vao mainka maro aza no nino Azy noho ny teny nataony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'ka hoy ireo tamin-dravehivavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy noho ny filàzanao ihany no inoanay fa ny tenanay no nandre, ka fantatray fa Izy tokoa no Mpamonjy an’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ny zanakalahin’ilay tandapa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 8.5; Lk 7.1-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nony afaka ny indro andro, dia niala teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritanina
  - type: text
    text: ' i Jesoa mba hankany Galilea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'ny tenan’i Jesoa manko no efa nanambara fa «tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hajaina eo amin’ny tany nahabe Azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 13.57; Mk 6.4; Lk 4.24. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tany nahabe Azy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' toa i Jodea no ambara amin’izany eto satria tanindrazan’i Jesoa sy toerana nahaterahany ary nibeazany ara-pivavahana (jereo 4.1-3).'
    marker-yv: yv-n
  - type: text
    text: '». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Koa rehefa tonga tany Galilea Izy, dia noraisin’ny Galileanina; satria niakatra tany Jerosalema koa ry zareo tamin’ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ', hany ka nahita izay rehetra nataon’i Jesoa tany nandritra ny fankalazana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.23.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Tamin’izay i Jesoa dia nankany Kanà tanànan’i Galilea indray, tany amin’ilay nanovany ny rano ho divay. Ary nisy tandapa anankiray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.46 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nanovany ny rano ho divay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2.1-11. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tandapa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny voambolana grika dia manondro manamboninahitra miasa ho an’ny mpanjaka Herôda Antipasy.'
    marker-yv: yv-n
  - type: text
    text: ' nanan-janaka lahy narary tany Kafarnahòma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Rehefa reny fa hoe tonga ao Galilea avy tany Jodea i Jesoa, dia nanatona Azy ilay tandapa ary niangavy Azy mba hidina any Kafarnahòma hanasitrana ny zanany lahy efa ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tsy mahita famantarana sy zava-mahagaga ianareo, dia tsy mba hety hino mihitsy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Fa novalian’ilay tandapa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Midîna re, Tompoko, dieny mbola tsy maty ny zanako!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha mody, fa velona soa aman-tsara ny zanakao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nino ny teny voalazan’i Jesoa taminy ralehilahy, ka lasa nody. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Efa teny an-dalana midina ho any Kafarnahòma izy no tamy nitsena azy ny mpanompony ka nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Velona soa aman-tsara ny zanakao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary nanontaniany azy ireo ny ora nahasitranany ka hoy ireo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Omaly tamin’ny iray tolakandro no nialan’ny tazo taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Koa fantatry ny rain-drazazalahy fa tamin’izany ora izany indrindra no nanaovan’i Jesoa taminy hoe: «Velona soa aman-tsara ny zanakao»; dia nino izy mbamin’ny ankohonany rehetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.53 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 11.14; 16.14-15,31.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Izany no famantarana faharoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2.11.
    marker-yv: yv-n
  - type: text
    text: ' nataon’i Jesoa, dia fony Izy tonga tao Galilea avy tany Jodea.'
