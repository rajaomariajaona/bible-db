document_id: JHN.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Resak’i Jesoa amin’ilay vehivavy samaritanina
  - type: text
    content: 'Tamin’izay dia ren’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' fa maro kokoa noho ny an’i Jôhany ireo olona tongan’i Jesoa ho mpianatra sy nataony '
  - type: text
    content: batisa
  - type: text
    content: '; (kanefa tsy ny tenan’i Jesoa no nanao batisa fa ireo mpianany). Nony fantatry ny Tompo hoe ren’ny Farisianina izany, '
  '10':
  - type: text
    content: 'Ka izao no navalin’i Jesoa an-dravehivavy:'
  - type: text
    content: '–Raha mba fantatrao ny fanomezan’Andriamanitra ka fantatrao Ilay miteny aminao hoe: «mba omeo rano Aho hosotroiko», dia ianao no ho nangataka taminy ka homeny ranovelona'
  - type: note
    content: 'ranovelona: misy karazana tsilalaon-teny ihany eto, satria ny ranovelona izay tenenin’i Jesoa dia ilay manome ny aina maharitra mandrakizay (jereo and 14).'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Dia hoy ravehivavy taminy:'
  - type: text
    content: '–Tsy manana fanovozana Ianao, Tompoko, sady lalina ny fantsakana; koa avy aiza no ahazoanao izany ranovelona izany? '
  '12':
  - type: text
    content: I Jakôba razantsika no nanome anay ity fantsakana ity ary nisotro rano teto avokoa ny tenany sy ny zanany mbamin’ny biby fiompiny. Fa Ianao angaha lehibe noho i Jakôba razantsika?
  '13':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Izay rehetra misotro amin’ity rano ity dia mbola hangetaheta hatrany. '
  '14':
  - type: text
    content: Fa na iza na iza hisotro amin’ny rano izay homeko azy dia tsy hangetaheta na oviana na oviana; satria ny rano izay homeko azy dia hanjary loharano ao anatiny ka hiboiboika ho aina maharitra mandrakizay
  - type: note
    content: Ampit Is 12.3; Jer 2.13; 17.13.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Ary hoy ravehivavy taminy:'
  - type: text
    content: –Mba omeo amin’izany rano izany aho, Tompoko, dia tsy hangetaheta intsony ary koa tsy hankatỳ hantsaka intsony.
  '16':
  - type: text
    content: 'I Jesoa kosa niteny taminy hoe:'
  - type: text
    content: –Ndeha antsoy ny vadinao, ka miverena atỳ?
  '17':
  - type: text
    content: 'Fa novalian-dravehivavy hoe:'
  - type: text
    content: –Tsy manam-bady aho!
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: '–Marina ny filàzanao hoe tsy manam-bady ianao; '
  '18':
  - type: text
    content: efa nanam-bady indimy ianao, ary tsy vadinao ilay itoeranao ankehitriny. Koa marina izany voalazanao izany.
  '19':
  - type: text
    content: 'Dia hoy ravehivavy taminy:'
  - type: text
    content: '–Hitako, Tompoko, fa '
  - type: text
    content: mpaminany
  - type: text
    content: ' Ianao! '
  '20':
  - type: text
    content: Ireo razanay Samaritanina dia nivavaka teto amin’ity tendrombohitra ity; fa ianareo Jiosy kosa milaza fa any Jerosalema
  - type: note
    content: 'Voailika tsy ho anisan’ny ankohonambe jiosy intsony ny Samaritanina ka nanorina tempoly teo amin’ny tendrombohitra Gerizîma, tendrombohitra akaikin’i Sekema renivohitra taloha. –any Jerosalema: ampit Sal 122.1-4.'
  - type: text
    content: ' no tsy maintsy ivavahana.'
  '21':
  - type: text
    content: 'Fa izao no tenin’i Jesoa taminy:'
  - type: text
    content: '–Minoa Ahy ianao, ramatoa! Avy ny andro izay tsy hivavahana amin’ny Ray eto amin’ity tendrombohitra ity na any Jerosalema intsony. '
  '22':
  - type: text
    content: 'Ianareo '
  - type: text
    content: Samaritanina
  - type: text
    content: ' dia mivavaka amin’izay tsy fantatrareo; fa izahay Jiosy kosa mivavaka amin’izay fantatray, satria mipoitra avy amin’ny Jiosy ny famonjena'
  - type: note
    content: Ampit Is 2.3; Rm 9.3-4.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Kanefa, ho an’ireo tena mpivavaka, dia avy ary efa tonga sahady aza ny andro izay hivavahany amin’ny Ray araka ny fanentanan’ny Fanahy Masina sy araka ny tena fivavahana marina; satria ny mpivavaka aminy araka izany no tadiavin’ny Ray. '
  '24':
  - type: text
    content: Andriamanitra dia Fanahy, ary ny mpivavaka aminy dia tsy maintsy mivavaka araka ny fanentanan’ny Fanahy Masina sy araka ny tena fivavahana marina.
  '25':
  - type: text
    content: 'Dia hoy ravehivavy tamin’i Jesoa:'
  - type: text
    content: '–Fantatro fa misy '
  - type: text
    content: Mesia
  - type: text
    content: ' anankiray ho avy, dia Ilay atao hoe '
  - type: text
    content: Kristy
  - type: text
    content: '! Ka rehefa tonga Izy, dia hambarany amintsika ny zavatra rehetra.'
  '26':
  - type: text
    content: 'I Jesoa kosa nilaza taminy hoe:'
  - type: text
    content: –Izaho Izay miresaka aminao no Izy!
  '27':
  - type: text
    content: 'Tamin’izay indrindra no tafaverina ny mpianany, ka gaga satria vehivavy no niresahany; saingy tsy nisy nanao hoe: «Inona no tadiavinao?» na hoe «Ahoana no iresahanao aminy?»'
  '28':
  - type: text
    content: 'Dia nandao ny sininy ravehivavy, ka lasa nankany an-tanàna hilaza amin’ny olona hoe:'
  '29':
  - type: text
    content: –Ndao ianareo hizaha Lehilahy anankiray, Izay nilaza tamiko ny nataoko rehetra; izao angaha no ilay Mesia?
  '3':
  - type: text
    content: 'dia niala tao Jodea Izy ary lasa nankany Galilea indray, '
  '30':
  - type: text
    content: Dia nivoaka ny tanàna ny olona ka nankeo amin’i Jesoa.
  '31':
  - type: text
    content: 'Raha tsy mbola tonga ny olona, dia niangavian’ny mpianany hisakafo i Jesoa ka nataony hoe:'
  - type: text
    content: –Mpampianatra ô, hano re ny sakafo!
  '32':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Izaho dia manana sakafo izay tsy fantatrareo.
  '33':
  - type: text
    content: 'Tamin’izay ny mpianany dia nifampilaza hoe:'
  - type: text
    content: –Nisy olona nitondra zavatra hohaniny angaha?
  '34':
  - type: text
    content: 'Izao kosa no navalin’i Jesoa azy ireo:'
  - type: text
    content: '–Ny sakafoko dia ny manao ny sitrapon’Ilay naniraka Ahy sy ny manatanteraka ny asa nampanaoviny Ahy. '
  '35':
  - type: text
    content: 'Tsy ianareo ve no milaza fa efa-bolana sisa dia ho tonga ny taom-pijinjana? Indro kosa Aho milaza aminareo hoe: atopazy ny masonareo ka jereo ny eny an-tsaha, fa masaka ny vary sady efa fijinja! '
  '36':
  - type: text
    content: 'Izay mijinja dia mandray karama sahady ary mamory vokatra ho an’ny fiaina-maharitra mandrakizay; hany ka hiara-mifaly ny mpamafy sy ny mpijinja. '
  '37':
  - type: text
    content: 'Amin’izany manko dia marina ilay ohabolana hoe: «Ny iray mamafy ary ny iray kosa mijinja.» '
  '38':
  - type: text
    content: 'Izaho no naniraka anareo hijinja izay tsy nisasaranareo: olon-kafa no nisasatra, ary ianareo kosa nanohy eo amin’izay nisasarany.'
  '39':
  - type: text
    content: 'Maro ny '
  - type: text
    content: Samaritanina
  - type: text
    content: ' tamin’izany tanàna izany no nino an’i Jesoa noho ny tenin-dravehivavy nanambara hoe: «Nolazainy tamiko avokoa ny nataoko rehetra.» '
  '4':
  - type: text
    content: ka tsy maintsy namakivaky ny faritany Samaria.
  '40':
  - type: text
    content: 'Koa rehefa tonga teo amin’i Jesoa ny Samaritanina, dia niangavy Azy hitoetra tao aminy; ary dia nitoetra tao indroa andro i Jesoa. '
  '41':
  - type: text
    content: 'Vao mainka maro aza no nino Azy noho ny teny nataony; '
  '42':
  - type: text
    content: 'ka hoy ireo tamin-dravehivavy:'
  - type: text
    content: –Tsy noho ny filàzanao ihany no inoanay fa ny tenanay no nandre, ka fantatray fa Izy tokoa no Mpamonjy an’
  - type: text
    content: izao tontolo izao
  - type: text
    content: .
  - type: heading
    content: Sitranin’i Jesoa ny zanakalahin’ilay tandapa
  - type: heading
    content: (Jereo Mt 8.5; Lk 7.1-10)
  '43':
  - type: text
    content: 'Nony afaka ny indro andro, dia niala teo amin’ny '
  - type: text
    content: Samaritanina
  - type: text
    content: ' i Jesoa mba hankany Galilea; '
  '44':
  - type: text
    content: 'ny tenan’i Jesoa manko no efa nanambara fa «tsy misy '
  - type: text
    content: mpaminany
  - type: text
    content: ' hajaina eo amin’ny tany nahabe Azy'
  - type: note
    content: 'Jereo Mt 13.57; Mk 6.4; Lk 4.24. –tany nahabe Azy: toa i Jodea no ambara amin’izany eto satria tanindrazan’i Jesoa sy toerana nahaterahany ary nibeazany ara-pivavahana (jereo 4.1-3).'
  - type: text
    content: '». '
  '45':
  - type: text
    content: 'Koa rehefa tonga tany Galilea Izy, dia noraisin’ny Galileanina; satria niakatra tany Jerosalema koa ry zareo tamin’ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ', hany ka nahita izay rehetra nataon’i Jesoa tany nandritra ny fankalazana'
  - type: note
    content: Jereo 2.23.
  - type: text
    content: .
  '46':
  - type: text
    content: Tamin’izay i Jesoa dia nankany Kanà tanànan’i Galilea indray, tany amin’ilay nanovany ny rano ho divay. Ary nisy tandapa anankiray
  - type: note
    content: 'nanovany ny rano ho divay: jereo 2.1-11. –tandapa: ny voambolana grika dia manondro manamboninahitra miasa ho an’ny mpanjaka Herôda Antipasy.'
  - type: text
    content: ' nanan-janaka lahy narary tany Kafarnahòma. '
  '47':
  - type: text
    content: 'Rehefa reny fa hoe tonga ao Galilea avy tany Jodea i Jesoa, dia nanatona Azy ilay tandapa ary niangavy Azy mba hidina any Kafarnahòma hanasitrana ny zanany lahy efa ho faty. '
  '48':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: –Raha tsy mahita famantarana sy zava-mahagaga ianareo, dia tsy mba hety hino mihitsy!
  '49':
  - type: text
    content: 'Fa novalian’ilay tandapa hoe:'
  - type: text
    content: –Midîna re, Tompoko, dieny mbola tsy maty ny zanako!
  '5':
  - type: text
    content: Dia tonga tao amin’ny tanàna anankiray any Samaria i Jesoa. I Sikara no anaran’ilay tanàna, izay teo akaikin’ny saha nomen’i Jakôba an’i Jôsefa zanany
  - type: note
    content: Jereo Gen 33.19; Jos 24.32.
  - type: text
    content: '; '
  '50':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: –Ndeha mody, fa velona soa aman-tsara ny zanakao!
  - type: text
    content: 'Nino ny teny voalazan’i Jesoa taminy ralehilahy, ka lasa nody. '
  '51':
  - type: text
    content: 'Efa teny an-dalana midina ho any Kafarnahòma izy no tamy nitsena azy ny mpanompony ka nilaza hoe:'
  - type: text
    content: –Velona soa aman-tsara ny zanakao!
  '52':
  - type: text
    content: 'Ary nanontaniany azy ireo ny ora nahasitranany ka hoy ireo taminy:'
  - type: text
    content: –Omaly tamin’ny iray tolakandro no nialan’ny tazo taminy.
  '53':
  - type: text
    content: 'Koa fantatry ny rain-drazazalahy fa tamin’izany ora izany indrindra no nanaovan’i Jesoa taminy hoe: «Velona soa aman-tsara ny zanakao»; dia nino izy mbamin’ny ankohonany rehetra'
  - type: note
    content: Ampit Asa 11.14; 16.14-15,31.
  - type: text
    content: .
  '54':
  - type: text
    content: Izany no famantarana faharoa
  - type: note
    content: Ampit 2.11.
  - type: text
    content: ' nataon’i Jesoa, dia fony Izy tonga tao Galilea avy tany Jodea.'
  '6':
  - type: text
    content: teo no nisy ny fantsakan’i Jakôba. Ary i Jesoa tamin’izay efa sasatry ny dia nataony, ka nipetraka teo amoron’ny fantsakana, tokony ho tamin’ny 12 antoandro.
  '7':
  - type: text
    content: 'Nisy vehivavy '
  - type: text
    content: samaritanina
  - type: text
    content: ' anankiray tonga hantsaka rano, ka nitenenan’i Jesoa hoe:'
  - type: text
    content: –Mba omeo rano Aho hosotroiko!
  '8':
  - type: text
    content: 'Fa ireo mpianany efa lasa nankany an-tanàna hividy sakafo. '
  '9':
  - type: text
    content: 'Dia hoy ilay vehivavy samaritanina tamin’i Jesoa:'
  - type: text
    content: –Jiosy Ianao, ka nahoana no mangataka rano hosotroina amiko, nefa aho vehivavy samaritanina
  - type: note
    content: Ampit Lk 9.52-53.
  - type: text
    content: '?'
  - type: text
    content: 'Fa tsy mifandray amin’ny Samaritanina manko ny Jiosy. '
