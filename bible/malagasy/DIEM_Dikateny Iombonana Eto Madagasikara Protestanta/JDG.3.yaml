document_id: JDG.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ireo firenen-kafa ireo moa no navelan’ny TOMPO haharitra teo amin’ny tany dia mba hizahany toetra ny Israelita rehetra izay tsy mbola nandray anjara tamin’ny ady nahazoana an’i Kanahàna; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tian’ny Tompo mba hianatra hiady manko ny taranaka vaovao izay tsy mbola nahalala ady. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa ireto avy àry ireo firenen-kafa ireo: ny mponina tamin’ny fanjakana dimin’ny Filistinina, ny Kanahanita rehetra, ny Tsidônianina, ary ny Hivita izay nipetraka tany amin’ny tendrombohitra Libano, manomboka hatreo an-tendrombohitra Bahala-Hermôna ka hatrany Lebô-Hamata. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ireo no nizahan’ny TOMPO toetra ny Israelita mba hahafantarany na hankatò ny didy izay nomeny ny razany tamin’ny alalan’i Mosesy izy na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Toy izany no nahatonga ny Israelita honina teo anivon’ny Kanahanita sy ny Hetita ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' mbamin’ny Perizita sy ny Hivita ary ny Jebosita. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary naka ny zanakavavin’ireny ho vadiny izy sady nanome ny zanany vavy ho vadin’ny zanakalahin’ireny, ka nanompo ny andriamani-tsiizy nifikirany.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: IREO MPITSARA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Hôtniela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nanao izay ratsy eo imason’ny TOMPO ny Israelita fa nanadino ny TOMPO Andriamaniny ka nanompo ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Aserà '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia andriamani-bavy kanahanita izay ampiarahin’ny Baiboly matetika koa amin’i Bahala. Amin’ny toeram-pivavahana fanompoan-tsampy dia tsatokazo mariky ny fahavokarana no anehoana azy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nirehi-pahatezerana tamin’ny Israelita ny TOMPO ka nanolotra azy teo an-tanan’i Kosàna-Risehataîma, mpanjakan’i Mezôpôtamia; ary nandritra ny valo taona no nanompoany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa niantso vonjy tamin’ny TOMPO ny Israelita; ary IZY nanangana mpamonjy izay hanafaka ny Israelita, dia i Hôtniela, zanakalahin’i Kenaza izay zandrin’i Kaleba. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nitoetra tao aminy ny Fanahin’ny TOMPO, ka nitondra ny Israelita izy. Ary niainga hiady i Hôtniela; dia natolotry ny TOMPO teo an-tanany i Kosàna-Risehataîma mpanjakan’i Mezôpôtamia ka resiny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nandry fahalemana ny tany nandritra ny efapolo taona; avy eo dia maty i Hôtniela, zanakalahin’i Kenaza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Ehoda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nanao izay ratsy eo imason’ny TOMPO indray ny Israelita. Noho izany dia nampirisihin’ny TOMPO hamely azy i Heglôna, mpanjakan’i Môaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Môaba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 19.37 sy nta. Ny fanjakana môabita, izay niorina tamin’ny taonjato faha-13 tal J.K., dia nitatra hatrany Jerikao tamin’ny andron’i Ehoda.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary i Heglôna nivondrona tamin’ny Hamônita sy ny Hamalekita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hamônita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo Gen 19.38 sy nta. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hamalekita:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Eks 17.8 sy nta. Tamin’ny andron’ireo Mpitsara, dia ny Hamalekita no tena fahavalon’ireo foko israelita (jereo 6.3,33; 7.12; 10.12).'
    marker-yv: yv-n
  - type: text
    text: ' ka nandeha nanafika ny Israelita, ary nahazo ny tanàna Jerikao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nanompo an’i Heglôna, mpanjakan’i Môaba, ny Israelita nandritra ny 18 taona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Niantso vonjy tamin’ny TOMPO ny Israelita ka nanirahany mpamonjy, dia i Ehoda, lehilahy kavia, izay zanak’i Gerà avy amin’ny fokon’i Benjamîna.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nalefan’ny Israelita i Ehoda mba hitondra fanomezana ho an’i Heglôna, mpanjakan’i Môaba. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nanamboatra sabatra maranitra roa lela i Ehoda, dia sabatra ankevitry ny antsasa-metatra izay nafeniny tao anaty akanjony nanolotra ny feny ankavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nandeha izy nanatitra fanomezana ho an’i Heglôna izay lehilahy matavibe. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa vitany ny fanolorana ny fanomezana ho an’i Heglôna, dia lasa izy niara-nody tamin’ireo vahoaka nitondra ny fanomezana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Kanjo nony efa tonga teo akaikin’ny tsangambaton-tsampy tao Gilgala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gilgala: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 4.19 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Ehoda, dia niverina ka nilaza tamin’i Heglôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Misy hafatra miafina holazaiko aminao, ry mpanjaka ô.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nandidy ny mpanompony teo ny mpanjaka mba hamela azy mitokana; koa nivoaka ny trano izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny mpanjaka tamin’izay dia nipetraka tao amin’ny efitrano fihatsiatsiahana izay natokana ho azy teo an-tampontrano. Ary nanatona azy i Ehoda ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Misy teny avy amin’Andriamanitra nentiko ho anao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nitsangana niala teo amin’ny sezany ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nalain’i Ehoda tamin’ny tanany havia ilay sabatra nanolotra ny feny ankavanana, ka natsatony tamin’ny kibon’i Heglôna. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Difotra mbamin’ny zarany sady voasaron’ny tavin’ity mpanjaka ny lelan-tsabatra, satria tsy notsoahin’i Ehoda teo amin’ny kibony. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Taorian’izany, rehefa avy nandrindrina sy nanidy ny varavaran’ilay efitrano i Ehoda, dia nivoaka avy teo am-baravarankely. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nony tafavoaka izy, dia tonga ireo mpanompon’ny mpanjaka izay nahita fa mihidy ny efitrano fihatsiatsiahana; koa noheveriny fa mbola miavela ao ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Niandry teo ivelany izy ireo ambara-pahavelon’ahiahy azy, kinanjo tsy mbola nisy namoha ihany ny varavarana. Dia naka ny fanalahidy ireo ka namoha ny trano, ary indro ny tompony maty mitsitra eo amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa raha mbola variana tao ireo, dia efa nitsoaka i Ehoda, ka efa tafahoatra ny tsangambaton-tsampy ary nandositra tany Sehirà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sehirà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: faritra izay toa eo avaratr’i Jerikao no azo ametrahana azy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vao tonga tany Sehirà izy; dia nitsoka trompetra teny amin’ny faritra be tendrombohitra any Efraîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny faritra be tendrombohitra any Efraîma '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia eo avaratr’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' hamory ny Israelita; avy teo izy dia nitarika ireo Israelita ireo ka niara-nidina taminy avy teny an-tendrombohitra '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'sady nanainga azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manaraha ahy fa efa natolotry ny TOMPO eo an-tanantsika ny Môabita fahavalontsika.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanaraka an’i Ehoda ireo, ka nandeha nibahana ny toerana fitàna ny ony Jôrdàna, ary tsy nisy Môabita navelany hita na iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin’izay andro izay dia Môabita sahabo ho andiany folo no matiny, dia vatan-dehilahy tomady sy mahery fo avokoa; ka tsy nisy afa-nitsoaka ireny na iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tamin’izany andro izany dia nietry teo ambany fahefàn’ny Israelita ny Môabita; ka nandry fahalemana ny tany nandritra ny valopolo taona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Samgary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary i Samgary, zanakalahin’i Hanata, no nandimby an’i Ehoda. Nahafaty ny Filistinina eninjato lahy tamin’ny fanindronan’omby
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay fampiasa handroahana omby, dia tehina nasiana vy maranitra teo an-tendrony.
    marker-yv: yv-n
  - type: text
    text: ' izy, ka nanafaka ny Israelita ihany koa.'
