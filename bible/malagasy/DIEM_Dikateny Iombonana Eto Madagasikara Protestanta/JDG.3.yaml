document_id: JDG.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ireo firenen-kafa ireo moa no navelan’ny TOMPO haharitra teo amin’ny tany dia mba hizahany toetra ny Israelita rehetra izay tsy mbola nandray anjara tamin’ny ady nahazoana an’i Kanahàna; '
  '10':
  - type: text
    content: 'Dia nitoetra tao aminy ny Fanahin’ny TOMPO, ka nitondra ny Israelita izy. Ary niainga hiady i Hôtniela; dia natolotry ny TOMPO teo an-tanany i Kosàna-Risehataîma mpanjakan’i Mezôpôtamia ka resiny. '
  '11':
  - type: text
    content: Dia nandry fahalemana ny tany nandritra ny efapolo taona; avy eo dia maty i Hôtniela, zanakalahin’i Kenaza.
  - type: heading
    content: I Ehoda
  '12':
  - type: text
    content: Ary nanao izay ratsy eo imason’ny TOMPO indray ny Israelita. Noho izany dia nampirisihin’ny TOMPO hamely azy i Heglôna, mpanjakan’i Môaba
  - type: note
    content: 'Môaba: jereo Gen 19.37 sy nta. Ny fanjakana môabita, izay niorina tamin’ny taonjato faha-13 tal J.K., dia nitatra hatrany Jerikao tamin’ny andron’i Ehoda.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Ary i Heglôna nivondrona tamin’ny Hamônita sy ny Hamalekita
  - type: note
    content: 'Hamônita: jereo Gen 19.38 sy nta. Hamalekita: jereo Eks 17.8 sy nta. Tamin’ny andron’ireo Mpitsara, dia ny Hamalekita no tena fahavalon’ireo foko israelita (jereo 6.3,33; 7.12; 10.12).'
  - type: text
    content: ' ka nandeha nanafika ny Israelita, ary nahazo ny tanàna Jerikao. '
  '14':
  - type: text
    content: 'Dia nanompo an’i Heglôna, mpanjakan’i Môaba, ny Israelita nandritra ny 18 taona. '
  '15':
  - type: text
    content: Niantso vonjy tamin’ny TOMPO ny Israelita ka nanirahany mpamonjy, dia i Ehoda, lehilahy kavia, izay zanak’i Gerà avy amin’ny fokon’i Benjamîna.
  - type: text
    content: 'Dia nalefan’ny Israelita i Ehoda mba hitondra fanomezana ho an’i Heglôna, mpanjakan’i Môaba. '
  '16':
  - type: text
    content: 'Ary nanamboatra sabatra maranitra roa lela i Ehoda, dia sabatra ankevitry ny antsasa-metatra izay nafeniny tao anaty akanjony nanolotra ny feny ankavanana. '
  '17':
  - type: text
    content: 'Dia nandeha izy nanatitra fanomezana ho an’i Heglôna izay lehilahy matavibe. '
  '18':
  - type: text
    content: 'Ary rehefa vitany ny fanolorana ny fanomezana ho an’i Heglôna, dia lasa izy niara-nody tamin’ireo vahoaka nitondra ny fanomezana. '
  '19':
  - type: text
    content: Kanjo nony efa tonga teo akaikin’ny tsangambaton-tsampy tao Gilgala
  - type: note
    content: 'Gilgala: jereo Jos 4.19 sy nta.'
  - type: text
    content: ' i Ehoda, dia niverina ka nilaza tamin’i Heglôna hoe:'
  - type: text
    content: –Misy hafatra miafina holazaiko aminao, ry mpanjaka ô.
  - type: text
    content: 'Dia nandidy ny mpanompony teo ny mpanjaka mba hamela azy mitokana; koa nivoaka ny trano izy rehetra. '
  '2':
  - type: text
    content: 'tian’ny Tompo mba hianatra hiady manko ny taranaka vaovao izay tsy mbola nahalala ady. '
  '20':
  - type: text
    content: 'Ny mpanjaka tamin’izay dia nipetraka tao amin’ny efitrano fihatsiatsiahana izay natokana ho azy teo an-tampontrano. Ary nanatona azy i Ehoda ka nanao hoe:'
  - type: text
    content: –Misy teny avy amin’Andriamanitra nentiko ho anao.
  - type: text
    content: 'Dia nitsangana niala teo amin’ny sezany ny mpanjaka. '
  '21':
  - type: text
    content: 'Ary nalain’i Ehoda tamin’ny tanany havia ilay sabatra nanolotra ny feny ankavanana, ka natsatony tamin’ny kibon’i Heglôna. '
  '22':
  - type: text
    content: 'Difotra mbamin’ny zarany sady voasaron’ny tavin’ity mpanjaka ny lelan-tsabatra, satria tsy notsoahin’i Ehoda teo amin’ny kibony. '
  '23':
  - type: text
    content: 'Taorian’izany, rehefa avy nandrindrina sy nanidy ny varavaran’ilay efitrano i Ehoda, dia nivoaka avy teo am-baravarankely. '
  '24':
  - type: text
    content: 'Ary nony tafavoaka izy, dia tonga ireo mpanompon’ny mpanjaka izay nahita fa mihidy ny efitrano fihatsiatsiahana; koa noheveriny fa mbola miavela ao ny mpanjaka. '
  '25':
  - type: text
    content: 'Niandry teo ivelany izy ireo ambara-pahavelon’ahiahy azy, kinanjo tsy mbola nisy namoha ihany ny varavarana. Dia naka ny fanalahidy ireo ka namoha ny trano, ary indro ny tompony maty mitsitra eo amin’ny tany. '
  '26':
  - type: text
    content: Fa raha mbola variana tao ireo, dia efa nitsoaka i Ehoda, ka efa tafahoatra ny tsangambaton-tsampy ary nandositra tany Sehirà
  - type: note
    content: 'Sehirà: faritra izay toa eo avaratr’i Jerikao no azo ametrahana azy.'
  - type: text
    content: '. '
  '27':
  - type: text
    content: Vao tonga tany Sehirà izy; dia nitsoka trompetra teny amin’ny faritra be tendrombohitra any Efraîma
  - type: note
    content: Ny faritra be tendrombohitra any Efraîma dia eo avaratr’i Jerosalema.
  - type: text
    content: ' hamory ny Israelita; avy teo izy dia nitarika ireo Israelita ireo ka niara-nidina taminy avy teny an-tendrombohitra '
  '28':
  - type: text
    content: 'sady nanainga azy hoe:'
  - type: text
    content: –Manaraha ahy fa efa natolotry ny TOMPO eo an-tanantsika ny Môabita fahavalontsika.
  - type: text
    content: 'Dia nanaraka an’i Ehoda ireo, ka nandeha nibahana ny toerana fitàna ny ony Jôrdàna, ary tsy nisy Môabita navelany hita na iray aza. '
  '29':
  - type: text
    content: 'Tamin’izay andro izay dia Môabita sahabo ho andiany folo no matiny, dia vatan-dehilahy tomady sy mahery fo avokoa; ka tsy nisy afa-nitsoaka ireny na iray aza. '
  '3':
  - type: text
    content: 'Koa ireto avy àry ireo firenen-kafa ireo: ny mponina tamin’ny fanjakana dimin’ny Filistinina, ny Kanahanita rehetra, ny Tsidônianina, ary ny Hivita izay nipetraka tany amin’ny tendrombohitra Libano, manomboka hatreo an-tendrombohitra Bahala-Hermôna ka hatrany Lebô-Hamata. '
  '30':
  - type: text
    content: Tamin’izany andro izany dia nietry teo ambany fahefàn’ny Israelita ny Môabita; ka nandry fahalemana ny tany nandritra ny valopolo taona.
  - type: heading
    content: I Samgary
  '31':
  - type: text
    content: Ary i Samgary, zanakalahin’i Hanata, no nandimby an’i Ehoda. Nahafaty ny Filistinina eninjato lahy tamin’ny fanindronan’omby
  - type: note
    content: izay fampiasa handroahana omby, dia tehina nasiana vy maranitra teo an-tendrony.
  - type: text
    content: ' izy, ka nanafaka ny Israelita ihany koa.'
  '4':
  - type: text
    content: 'Ireo no nizahan’ny TOMPO toetra ny Israelita mba hahafantarany na hankatò ny didy izay nomeny ny razany tamin’ny alalan’i Mosesy izy na tsia. '
  '5':
  - type: text
    content: 'Toy izany no nahatonga ny Israelita honina teo anivon’ny Kanahanita sy ny Hetita ary ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' mbamin’ny Perizita sy ny Hivita ary ny Jebosita. '
  '6':
  - type: text
    content: Ary naka ny zanakavavin’ireny ho vadiny izy sady nanome ny zanany vavy ho vadin’ny zanakalahin’ireny, ka nanompo ny andriamani-tsiizy nifikirany.
  - type: heading
    content: IREO MPITSARA
  - type: heading
    content: I Hôtniela
  '7':
  - type: text
    content: 'Ary nanao izay ratsy eo imason’ny TOMPO ny Israelita fa nanadino ny TOMPO Andriamaniny ka nanompo ireo '
  - type: text
    content: Bahala
  - type: text
    content: ' sy ireo '
  - type: text
    content: Aserà
  - type: note
    content: Aserà dia andriamani-bavy kanahanita izay ampiarahin’ny Baiboly matetika koa amin’i Bahala. Amin’ny toeram-pivavahana fanompoan-tsampy dia tsatokazo mariky ny fahavokarana no anehoana azy.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Dia nirehi-pahatezerana tamin’ny Israelita ny TOMPO ka nanolotra azy teo an-tanan’i Kosàna-Risehataîma, mpanjakan’i Mezôpôtamia; ary nandritra ny valo taona no nanompoany azy. '
  '9':
  - type: text
    content: 'Koa niantso vonjy tamin’ny TOMPO ny Israelita; ary IZY nanangana mpamonjy izay hanafaka ny Israelita, dia i Hôtniela, zanakalahin’i Kenaza izay zandrin’i Kaleba. '
