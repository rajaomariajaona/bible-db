    children:
    - type: text
      text: 'Izao, ry havana, dia miteny amin’olona mahalala ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' aho. Fantatrareo tsara fa raha mbola velona ny olona no fehezin’ny lalàna. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa izaho kosa maty; hany ka ny didy izay natao hahazoana fiainana
    - type: usfm
