document_id: ROM.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Afaka amin’ny lalàna isika
  - type: text
    content: 'Izao, ry havana, dia miteny amin’olona mahalala ny '
  - type: text
    content: lalàna
  - type: text
    content: ' aho. Fantatrareo tsara fa raha mbola velona ny olona no fehezin’ny lalàna. '
  '10':
  - type: text
    content: fa izaho kosa maty; hany ka ny didy izay natao hahazoana fiainana
  - type: note
    content: Ampit Lev 18.5; Eks 4.1; 5.33; Ezek 20.11.
  - type: text
    content: ' no tonga nahazoako fahafatesana, '
  '11':
  - type: text
    content: satria nohararaotin’ny fahotana ny didy hamitahana
  - type: note
    content: Ampit Gen 3.13.
  - type: text
    content: ' ahy sy hamonoana ahy.'
  '12':
  - type: text
    content: 'Noho izany, dia masina ny lalàna; masina koa ny didy, ary ara-drariny sady tsara. '
  '13':
  - type: text
    content: Koa ny zavatra tsara àry ve izany no nahatonga fahafatesana ho ahy? Sanatria! Fa ny fahotana, mba hihariharian’ny maha fahotana azy, no nahafaty ahy tamin’ny alalan’ny zavatra tsara; hany ka ny fahotana dia hita ho tena fahotana hiringiriny, amin’ny alalan’ny didy.
  - type: heading
    content: Voagejan’ny ratsy ny olona amin’ny maha mpanota azy
  '14':
  - type: text
    content: 'Fantatsika tokoa fa ara-panahy ny '
  - type: text
    content: lalàna
  - type: text
    content: '; izaho anefa dia miaina araka ny maha olona mpanota ahy ary namidy ho andevon’ny fahotana. '
  '15':
  - type: text
    content: 'Tsy fantatro be ihany izay ataoko: tsy izay sitrako no ataoko, fa izay hàlako no tanterahiko. '
  '16':
  - type: text
    content: 'Raha izay tsy sitrako no tanterahiko, dia miaiky ny lalàna ho tsara aho; '
  '17':
  - type: text
    content: 'kanefa tsy izaho intsony no manao ny tsy sitrako, fa ny fahotana izay monina ato anatiko. '
  '18':
  - type: text
    content: 'Satria ny tsara, fantatro fa tsy monina ato anatiko, izany hoe ao amin’ny maha olona mpanota ahy. Mba misy ato amiko ihany ny fikasana hanao ny tsara, fa ny fanatanterahana azy no tsy misy: '
  '19':
  - type: text
    content: 'satria tsy ny tsara izay sitrako no tanterahiko, fa ny ratsy izay tsy sitrako no ataoko. '
  '2':
  - type: text
    content: 'Ohatra: ny vehivavy manambady dia fehezin’ny lalàna mba ho an’ny vadiny, raha mbola velona ny lahy; fa rehefa maty kosa ny lahy, dia afaka amin’ny lalàna mamehy azy amin’ny lahy izy. '
  '20':
  - type: text
    content: Kanefa raha ny tsy sitrako no tanterahiko, dia tsy izaho intsony no manao azy fa ny fahotana izay monina ato anatiko.
  '21':
  - type: text
    content: 'Izao toe-javatra izao àry no tsapako: na sitrako aza ny hanao ny tsara, dia ny ratsy no mahazo laka ao amiko. '
  '22':
  - type: text
    content: 'Fa raha ny ao anatiko ao, dia mahafinaritra ahy ny lalànan’Andriamanitra; '
  '23':
  - type: text
    content: 'nefa misy toe-javatra hafa hitako ao amin’ireo zavatra anisan’ny tenako, dia toe-javatra manohitra ny lalàna ankatoavin’ny saiko sady toe-javatra mahatonga ahy ho voafatotry ny fanapahan’ny fahotana izay miasa ao amin’ireo zavatra anisan’ny tenako. '
  '24':
  - type: text
    content: 'Indrisy olona fadiranovana aho! Iza no hanafaka ahy amin’ity tenako izay mampirona ahy amin’ny fahafatesana ity? '
  '25':
  - type: text
    content: 'Kanefa isaorana Andriamanitra Izay hanafaka ahy amin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika!'
  - type: text
    content: Koa manompo ny lalànan’Andriamanitra izany aho amin’ny saiko, fa andevozin’ny fanapahan’ny fahotana kosa amin’ny maha olona mpanota ahy!
  '3':
  - type: text
    content: 'Koa raha manambady olon-kafa ravehivavy fahavelon’ny lahy, dia atao hoe mpanitsakitsa-bady; fa rehefa maty ny lahy vao afaka amin’ny lalàna izy, ka tsy mpanitsakitsa-bady intsony raha manambady olon-kafa. '
  '4':
  - type: text
    content: 'Toy izany koa ianareo, ry havako, tamin’ny alalan’ny tenan’i Kristy dia nanjary maty ianareo raha ny amin’ny lalàna mba hanjary ho an’olon-kafa, dia Ilay natsangana ho velona avy tany amin’ny maty, mba hahavokarantsika asa soa ho an’Andriamanitra. '
  '5':
  - type: text
    content: 'Fa fony isika niaina araka ny naha olona mpanota antsika, dia ny filàn’ny fahotana, izay nohetsehin’ny lalàna, no niasa tao amin’ireo zavatra anisan’ny tenantsika, mba hahavokarantsika asa mahatonga fahafatesana. '
  '6':
  - type: text
    content: Ankehitriny kosa dia afaka amin’ny lalàna isika, fa maty tamin’izay namehezana antsika; hany ka fomba vaovao araka ny Fanahy Masina no anompoantsika an’Andriamanitra fa tsy fomba tranainy araka ny lalàna voasoratra.
  - type: heading
    content: Ny lalàna sy ny fahotana
  '7':
  - type: text
    content: 'Inona àry no holazaintsika? Fahotana ve ny '
  - type: text
    content: lalàna
  - type: text
    content: '? Sanatria izany! Nefa tsy ho nahafantatra ny fahotana aho raha tsy tamin’ny alalan’ny lalàna. Ohatra: tsy ho nahafantatra ny fitsiriritana aho, raha tsy ny lalàna no nanao hoe: «Aza mitsiriritra.» '
  '8':
  - type: text
    content: Saingy nohararaotin’ny fahotana ny didy hampihetsika ny fitsiriritana rehetra ato amiko, fa maty ny fahotana raha tsy misy lalàna
  - type: note
    content: Eks 20.17; Deot 5.21.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Taloha, fony tsy mbola nisy ny lalàna, dia velona aho; fa nony tonga ny didy, dia ny fahotana no velona, '
