document_id: GEN.34,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro dia nivoaka ny tanàna i Dinà, zanakavavin’i Leà tamin’i Jakôba, mba hitsidika zazavavy tao amin’ny faritany. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hiara-monina aminay ianareo, ka hanjary ho anareo ny faritany eo anoloanareo; koa mitoera sy mivarota, ary manàna zaratany eto.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Sekema mihitsy no tonga niteny tamin’ny rain’i Dinà sy ny anadahiny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mba amindrao fo aho fa homeko anareo izay takînareo amiko. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Na dia harena be sy zavatra betsaka aza no takînareo amiko, dia homeko ihany, raha omenareo ho vadiko razazavavy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Sekema sy i Hamôra rainy tamin’ny hafetsena ireo zanakalahin’i Jakôba, satria nandoto an’i Dinà anabaviny izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ireto taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy azonay atao ny hanome ny anabavinay ho vadin’ny lehilahy tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voafora
    - type: text
      text: ', fa manala baràka anay izany. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izao anefa: ekenay ny hevitrareo, raha hoforana mitovy aminay ny lehilahy rehetra eo aminareo. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Amin’izay dia homenay ho vadinareo ny tovovavinay, ary ny anareo kosa halainay ho vadinay; dia hiara-monina isika, ary hanjary firenena iray ihany. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa raha tsy manaiky hoforàna kosa ianareo, dia halainay ny anabavinay ary handeha izahay.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sitrak’i Hamôra sy i Sekema zanany lahy ny soso-kevitra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tsy nitaredretra akory ilay tovolahy nanatanteraka izany zavatra izany, satria raiki-pitia tamin’ny zanakavavin’i Jakôba izy; ary izy no to teny indrindra tao amin’ny fianakaviany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nahita an’i Dinà i Sekema zanakalahin’i Hamôra izay hivita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ny FTS amin’ny voambolana hoe AMÔRITA.
      marker-yv: yv-n
    - type: text
      text: ' lehiben’ny faritany, ka naka azy an-keriny sy nandry taminy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nankeo amin’ny toerana teo am-bavahadin’ny tanàna i Hamôra sy i Sekema, ary nikabary tamin’ireo olona tao an-tanànany nanao hoe:'
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mampiseho fihavanana amintsika ireo olona ireo, koa avelao izy honina eto amin’ny faritany sady hivarotra; fa mivoha malalaka ho azy ireo ny tany eo anoloany. Amin’izay dia hahazo manambady ireo tovovaviny isika, ary ny antsika kosa ho vadiny. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Manaiky hiara-monina amintsika ireo olona ireo, raha tàhiny ny lehilahy rehetra ato amintsika hoforana tahaka ny azy. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha manaiky ny teniny isika, dia hiara-mipetraka amintsika izy ireo, ka ho lasantsika miandalana koa ny biby fiompiny sy ny fananany ary ny biby rehetra mpitondra ny entany.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy nanaiky ny soso-kevitr’i Hamôra sy i Sekema ny olona rehetra teo am-bavahady, koa noforàna avokoa ny lehilahy rehetra tao an-tanàna. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro fahatelo taorian’izany, raha mbola nararim-pery mafy iny ireo lehilahy ireo, dia nandray sabatra ny zanakalahin’i Jakôba, dia i Simehôna sy i Levỳ anadahin’i Dinà, ka niditra an-tsokosoko tao an-tanàna, ary nandringana ny lehilahy rehetra tao; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka anisan’izany koa ry i Hamôra sy i Sekema zanany lahy. Dia naka an’i Dinà tao an-tranon’i Sekema izy roa lahy, ka lasa nandeha.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo zanakalahin’i Jakôba hafa kosa nanendaka ireo faty sy nandroba ny tanàna noho ny nandotoana ny anabaviny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalainy avokoa ny ondry aman’osiny ary ny ombiny sy ny borikiny, dia ny tao an-tanàna sy tany an-tsaha. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nobaboiny ny hareny rehetra mbamin’ny zaza amam-behivavy, ka nofaohiny avokoa ny zavatra tao an-trano.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nifikitra tamin’i Dinà zanakavavin’i Jakôba izy fa tia azy, ka nanao teny nambabo ny fony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jakôba tamin’i Simehôna sy i Levỳ:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nampidi-doza ahy ianareo fa nahatonga ahy ho mangidy hoditra amin’ny mponina tompon-tany, dia ny Kanahanita sy ny Perizita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ny FTS amin’ny voambolana hoe AMÔRITA.
      marker-yv: yv-n
    - type: text
      text: . Hitambatra hamely ahy ireo, dia handresy ahy satria olom-bitsy no eto amiko; ka ho fongotra ny tenako sy ny fianakaviako.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no ho toy ny vehivavy mpivaro-tena no anaovany ny anabavinay?
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamin’i Hamôra rainy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Alaovy ho ahy iny zazavavy iny mba ho vadiko.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ren’i Jakôba fa nolotoin’i Sekema i Dinà zanany vavy, kanefa tany an-tsaha niandry ny biby fiompy ireo zanany lahy, koa tsy nanao na inona na inona izy ambara-pahatongan’ireo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niainga ho any amin’i Jakôba i Hamôra rain’i Sekema mba hiresaka aminy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga avy tany an-tsaha ireo zanakalahin’i Jakôba ka nandre ny vaovao, dia nahatsiaro ny tenany ho afa-baràka sady nirehi-pahatezerana mafy, satria zava-pady ny nandrian’i Sekema an-keriny tamin’ny zanakavavin’i Jakôba; fa zavatra tsy fanao izany tao Israely. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Hamôra anefa dia nilaza tamin’izy ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raiki-pitia amin-drazazavavy i Sekema zanako lahy. Koa mba omeo ho vadiny re izy! '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hifanaraka isika ka ny zanakareo vavy homenareo ho anay ary ny zanakay vavy kosa halainareo ho anareo. '
