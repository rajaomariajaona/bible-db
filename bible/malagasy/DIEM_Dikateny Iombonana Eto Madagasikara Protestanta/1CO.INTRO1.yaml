document_id: 1CO.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: I Kôrinto dia renivohitr’i Akaîa, faritany rômanina tao Gresy fahizany. Tamin’ny fitetezan-tany faharoa nitorian’i Paoly ny Vaovao Mahafaly no nandaniany herintaona sy tapany tao. Nanorina Fiangonana tao Kôrinto i Paoly ary kristianina tanatin’izany Fiangonana izany dia olona tsy mpino teo alohan sady tsotsotra ara-pivelomana.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tanàna lehibe nifaneraserana mponina maro karazana i Kôrinto tamin’izay, sady nandroso fatratra noho izy nanan-tseranana anankiroa (i Senkrea teo atsinanana, ary i Lekea teo andrefana); niroborobo ny varotra sy ny kolon-tsaina, niely ireo firehan-kevitra filôzôfika, kanefa nahazo vahana koa ny haratsiam-pitondrantena mbamin’ny fivavahana fanompoan-tsampy isan-tokony. Ireo tarehin-javatra rehetra ireo dia nisy fiantraikany tamin’ireo kristianina tao Kôrinto ka nanahiran-tsaina mafy an’i Paoly.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Rehefa lasa i Paoly dia matetika nandray vaovao mampanahy momba ireo kristianina tao Kôrinto; ka izany no nahatonga an’i Paoly hanoratra taratasy farahafakeliny efatra ho azy ireo. Ny taratasy anankiroa dia voatahiry ao amin’ny Test. V.; fa ny taratasy anankiroa hafa dia ireo voatsiahy ao amin’ny 1 Kôr 5.9-13 sy 2 Kôr 2.3; 7.8. Ireo taratasy anankiroa voatahiry dia nalefan’i Paoly nandritra ny dia na fitetezan-tany fahatelo nataony: ka ny voalohany avy ao Efeso (jereo 1 Kôr 16.8); ary ny faharoa dia mety avy ao Efeso ihany koa na avy any Masedônia.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ato amin’ity Taratasy voalohany ho an’ny Kôrintianina ity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'rehefa avy nanao fiarahabana sy vavaka fisaorana (1.1-9) i Paoly dia manainga ireo olona anoratany hanafoana ny fisaraham-bazana (1.10–4.21) sy hamongotra ny fitondrantena ratsy (toko 5) ary tsy haka mpitsara tsy mpino amin’ny fifanolanan’ny samy kristianina (6.1-11). Ambarany mazava ihany koa ny fomba mendrika tokony hampiasan’ny kristianina ny tenany tsirairay avy (6.12-20); ary avy eo dia ireo fanontaniana maro naroso taminy no omeny valiny:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –ny fanambadiana (toko 7),
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –ny fihinanan-kena natao sorona tamin’ny sampy sy ny toe-panahy tokony hijoroana manoloana ny fanompoan-tsampy (8.1–11.1),
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –ny fiaraha-miangona sy ny Fanasan’ny Tompo (11.2-34),
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –ny fanomezam-pahasoavana avy amin’ny Fanahy Masina (toko. 12–14),
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –ny fitsanganan’ny maty ho velona (toko 15).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vaovao vitsivitsy (famoriam-bola ho an’ny vahoakan’Andriamanitra any Jerosalema; zava-kasain’i Paoly hatao) ary koa anatra farany sy famangiana no amaranan’i Paoly ny taratasiny (toko 16).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amin’ireo olam-piainana rehetra ireo, dia tsy fitsipika henjana ara-pitondrantena loatra no antitranterin’i Paoly. Asehony kosa fa ny iraiketam-po amin’i Kristy no ahitana vaha olana; ary dia tsy misy lalana tsara indrindra ohatra ny fitiava-namana (toko 13).
