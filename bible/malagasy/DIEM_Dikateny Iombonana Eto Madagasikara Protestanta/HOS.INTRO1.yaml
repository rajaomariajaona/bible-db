  - type: text
    content: an-tsehatra; ka ara-potokevitra kokoa no nanasokajiana izany fa tsy araka ny fotoana nitrangany.
  - type: text
    content: 'Toko 1–3: ny fanambadian’i Hôsea sy ny hafany.'
  - type: text
    content: '4.1–9.9: ny toe-draharahan’i Israely sy ny dikany ara-panahy.'
  - type: text
    content: '9.10–14.1: ireo anton-javatra hatry ny ela ifotoran’ny fivadihan’ny vahoakan’Andriamanitra.'
  - type: text
    content: '14.2-10: ny fitiavan’Andriamanitra ihany no mahery indrindra.'
