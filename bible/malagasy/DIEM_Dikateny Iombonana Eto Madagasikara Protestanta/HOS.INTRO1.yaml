verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: –Tonga mpitondratenin’Andriamanitra tao amin’ny fanjakan’i Israely i Hôsea folo taona taorian’i Hamôsa, tokony ho tamin’ny taona 750 tal. J.K.. Haharitra roapolo taona eo ho eo amin’izany izy, izany hoe saika hatramin’ny nahazoan’ny Asirianina an’i Samaria sy ny faharavàn’ny fanjakan’i Israely tamin’ny taona 722-721.
  - type: text
    content: 'Nandritra izany fotoana izany (jereo 2 Mp 14.23–17.23), dia tao anaty fikorosiana tanteraka ny fanjakana: taorian’ny nanjakàn’i Jerôbohama II (jereo 1.1; 1.4 sy nta), mandrahona hamely ny hery asirianina. Nifandimby tao Samaria ny fanonganam-panjakana nametrahana teo amin’ny fitondrana olona izay manana pôlitika mifanohitra be ihany. Vao mainka niharatsy ny tsy fitoviana ara-tsôsialy efa nodradradradrain’i Hamôsa. Ary indrindra tojo fahasahiranana mafy ny finoan’ny vahoakan’Andriamanitra, satria nahasintona olona maro ny fivavahana kanahanita (jereo naoty momba 1.2).'
  - type: text
    content: Olam-panambadiana no niainan’i Hôsea izany toe-javatra izany sy ny vokany. Ny ratram-pitiavany no akon’ilay fahorian’Andriamanitra manoloana ny fivadihan’ny vahoakany (karazana fivarotan-tena), nefa miantso koa ilay fanantenàm-pahasitranana sy ilay fanantenàm-pitiavana tafaverina indray ary ifampizaràna (14.2-10). Ny fametrahan’i Hôsea ny fitiavana eo anivon’ny fifandraisan’Andriamanitra sy ny olona dia mampiditra azy sahady ao amin’ny lalan’ny Filazantsara na ny Vaovao Mahafaly (Mt 9.13; 12.7).
  - type: text
    content: Ny fizaràn’ny boky dia mampiseho ny fidiran’i Hôsea
