  - type: text
    text: 'Tsy navela hanao ny fitafian’ny mpigadra intsony i Jôiakina; ary niara-nisakafo isan’andro tamin’ny mpanjakan’i Babilôna izy nandritra ny andro sisa rehetra niainany. '
