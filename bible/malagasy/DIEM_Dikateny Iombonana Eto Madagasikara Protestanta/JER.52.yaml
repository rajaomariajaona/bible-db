document_id: JER.52,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nataon’i Nebokadnetsara sambo-belona i Tsedekià
  - type: heading
    content: (Jereo 39.4-7; 2 Mp 24.18–25.7)
  - type: text
    content: Feno 21 taona i Tsedekià fony tonga mpanjakan’i Joda; ary naharitra 11 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Hamotala zanakavavin’i Jeremià avy ao Libnà
  - type: note
    content: 'Libnà: jereo 2 Mp 8.22.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Novonoina ho faty teo imason-drainy ireo zanakalahin’i Tsedekià; ary tao Riblà koa no namonoana ho faty ireo mpiasam-panjakana jodeanina. '
  '11':
  - type: text
    content: Avy teo dia nasain’i Nebokadnetsara nopotsirina ny mason’i Tsedekià; ary nasainy nafatotra gadra halimo sy nentina ho any Babilôna izy mba hatao an-tranomaizina ka nahibony tao ambara-pahafatiny
  - type: note
    content: 'Ny fampijaliana nihatra tamin’i Tsedekià: jereo Ezek 12.13.'
  - type: text
    content: .
  - type: heading
    content: I Nebozaradàna no namarana ny fandravana an’i Jerosalema
  - type: heading
    content: (Jereo 39.8-10; 2 Mp 25.8-21)
  '12':
  - type: text
    content: Tamin’ny taona faha-19 nanjakàn’i Nebokadnetsara, nony andro fahafolon’ny volana fahadimy
  - type: note
    content: Izany hoe ny volana Aogositra 587 tal J.K.
  - type: text
    content: ', dia tafiditra tao Jerosalema i Nebozaradàna, filohan’ny mpiambina sady manamboninahitry ny mpanjakan’i Babilôna. '
  '13':
  - type: text
    content: Izy no nandoro ny tranon’ny TOMPO
  - type: note
    content: 'Faharavàn’ny tempoly: ampit 1 Mp 7.47-50.'
  - type: text
    content: ' sy ny lapan’ny mpanjaka ary ireo trano tao an-tanàna, indrindra ny an’ny olona ambony rehetra. '
  '14':
  - type: text
    content: Ny manda manodidina an’i Jerosalema dia narodan’ny miaramila babilônianina rehetra izay niaraka tamin’ny filohan’ny mpiambina.
  '15':
  - type: text
    content: Ary nentin’i Nebozaradàna ho babo ireo mponina sisa tao an-tanàna, dia ireo fianakaviana mahantra vitsivitsy sy ireo olona nitolo-batana tamin’ny mpanjakan’i Babilôna ary ny sisa tamin’ireo mpahay taozavatra
  - type: note
    content: Jereo 39.3 sy nta.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Kanefa dia nisy ampahan’ny vahoaka mahantra navelany mba hamboly ny tanimboaloboka sy ny saha.
  '17':
  - type: text
    content: Nopotehin’ny Babilônianina ireo andry halimo tao an-tranon’ny TOMPO mbamin’ireo kalesy ary ilay fitobian-drano halimo goavana teo an-kianja
  - type: note
    content: 'andry halimo: jereo 1 Mp 7.15-22. –kalesy: jereo 1 Mp 7.27-37. –fitobian-drano halimo goavana: jereo 1 Mp 7.23-26.'
  - type: text
    content: '; dia nentiny nankany Babilôna avokoa ny halimo. '
  '18':
  - type: text
    content: 'Nalainy koa ny fanaka halimo rehetra fampiasa tamin’ny fanompoam-pivavahana, dia ny vilany fasian-davenona sy ny sotron’afo mbamin’ny antsy sy ny tsatokaty famafazana ary ireo lovia madinika. '
  '19':
  - type: text
    content: 'Nentin’ny filohan’ny mpiambina koa ny fitaovana volamena sy volafotsy rehetra: ny lovia, ny fandoroana zava-manitra, ny tsatokaty famafazana, ny fandraofan-davenona, ny fitoeran-jiro ary ny kaopy sy ny tavoara'
  - type: note
    content: 'Momba ireo fanaka halimo, volafotsy na volamena fampiasa teo amin’ny fanompoam-pivavahana: jereo 1 Mp 7.45-50.'
  - type: text
    content: .
  '2':
  - type: text
    content: Ary nanao izay ratsy eo imason’ny TOMPO izy tahaka izay rehetra nataon’i Jôiakima.
  '20':
  - type: text
    content: 'Tsy hita lanja ny halimo tamin’ireo fanaka rehetra izay namboarin’i Salômôna ho an’ny tranon’ny TOMPO: dia ireo andry anankiroa sy ilay fitobian-drano goavana miaraka amin’ireo ombilahy halimo 12 mitondra azy, ary ireo kalesy. '
  '21':
  - type: text
    content: 'Ny andry tsirairay dia sivy metatra ny haavony ary enina metatra ny manodidina. Poakaty izy nefa misy valo santimetatra ny hatevin’ny metaly. '
  '22':
  - type: text
    content: 'Misy lohany halimo tsirairay avy ny andry ka mahatratra roa metatra sy sasany ny haavony sady voaravaka harato sy ampongabendanitra halimo ny manodidina azy. Mitovy ireo andry roa sy ny ravaka natao taminy. '
  '23':
  - type: text
    content: Miisa 96 ireo ampongabendanitra teo amin’ny lafiny efatra, izany hoe ampongabendanitra zato no tontaliny tamin’ny manodidina ny harato
  - type: note
    content: Mety ho azo tsara ihany ny ravaky ny andohalambony izay mizara ho 24 voany avy isaky ny ilany (24 x 4 =96), miampy iray isaky ny zorony efatra. Ny fanehoana antsipiriany omena ao 1 Mp 7.17-21, 41-42 dia milaza fa misy 200 ny ampongabendanitra isaky ny andry.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Nosamborin’ny filohan’ny mpiambina i Seraià mpisorombe sy i Tsefanià lefiny ary ireo mpisorona telo lahy mpiandry varavarana. '
  '25':
  - type: text
    content: 'Nosamboriny koa ny mpiasam-panjakana iray mpiandraikitra ny miaramila sy ny olona fito lahy mpanolotsainan’ny mpanjaka, sy ny mpitantsoratr’ilay manamboninahitra misahana ny fiantsoana ho miaramila, ary ny teratany jodeanina miisa enimpolo lahy; fa samy hitany tao Jerosalema avokoa ireo. '
  '26':
  - type: text
    content: 'Nentin’i Nebozaradàna ho any amin’ny mpanjakan’i Babilôna tao Riblà anatin’ny faritr’i Hamata izy rehetra '
  '27':
  - type: text
    content: ary nasain’ny mpanjakan’i Babilôna novonoina ho faty tao ihany. Toy izany no nitondrana ny vahoaka jodeanina ho babo lavitry ny taniny.
  '28':
  - type: text
    content: 'Ireto no isan’ireo olona nasain’i Nebokadnetsara nentina ho babo: tamin’ny taona fahafito nanjakany'
  - type: note
    content: 'ny taona fahafito nanjakany: nanjakàn’i Nebokadnetsara no tiany holazaina, izany hoe 598 na 597 tal J.K, mifanandrify amin’ireo zava-nitranga voatatitra ao 2 Mp 24.10-17.'
  - type: text
    content: ', Jodeanina 3 023; '
  '29':
  - type: text
    content: tamin’ny taona faha-18 nanjakany
  - type: note
    content: Izany hoe tamin’ny 587 na 586 tal J.K.
  - type: text
    content: ', olona 832 avy tao Jerosalema.'
  '3':
  - type: text
    content: Fa ny fahatezeran’ny TOMPO no nahatonga izany loza izany tamin’i Jerosalema sy tamin’i Joda, ka niafara tamin’ny fandroahany an’ireo Jodeanina hiala teo anatrehany.
  - type: text
    content: 'Ary nikomy tamin’i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' i Tsedekià. '
  '30':
  - type: text
    content: Tamin’ny taona faha-23 nanjakany
  - type: note
    content: Izany hoe tamin’ny 582 na 581 tal J.K. Ao amin’ny Baiboly dia eto ihany no voalaza io fahababoana fanintelony io.
  - type: text
    content: ', dia mbola nitondra Jodeanina 745 ho babo ihany i Nebozaradàna filohan’ny mpiambina. Koa ny tontalin’izy rehetra dia 6 400.'
  - type: heading
    content: Nomen’ny mpanjakan’i Babilôna famotsoran-keloka i Jôiakina.
  - type: heading
    content: (Jereo 2 Mp 25.27-30)
  '31':
  - type: text
    content: Fony 37 taona taorian’ny fanaovana sesitany an’i Jôiakina mpanjakan’i Joda, dia i Evila-Merôdaky no tonga mpanjakan’i Babilôna. Koa tamin’ny volana faha-12 tao anatin’io taona io, nony andro faha-27,
  - type: note
    content: 'Momba ny nanaovana sesitany an’i Jôiakina, jereo 2 Mp 24.10-17; Jer 22.24-27. –afaka 37 taorian’ny nanaovana sesitany an’i Jôiakina: izany hoe 562 na 561 tal J.K. –ny volana faha-12: izany hoe tapaky ny volana Marsa any ho any; jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
  - type: text
    content: ', dia nomeny famotsoran-keloka i Jôiakina ka nasainy navoaka ny tranomaizina. '
  '32':
  - type: text
    content: 'Dia nanaovany teny mamy izy, ary nomeny toerana ambony kokoa noho ny an’ireo mpanjaka niaraka taminy tao Babilôna. '
  '33':
  - type: text
    content: 'Tsy navela hanao ny fitafian’ny mpigadra intsony i Jôiakina; ary niara-nisakafo isan’andro tamin’ny mpanjakan’i Babilôna izy nandritra ny andro sisa rehetra niainany. '
  '34':
  - type: text
    content: Izany koa no nahazoan’i Jôiakina tamin’ny mpanjakan’i Babilôna ny zavatra nilainy araka ny sahaza azy isan’andro mandra-pahafatiny.
  '4':
  - type: text
    content: Koa tonga tao Jerosalema niaraka tamin’ny tafiny manontolo i Nebokadnetsara. Nitoby manoloana ny tanàna ireo miaramilany, ary nanao tovon-tany manodidina an’i Jerosalema. Taona fahasivy nanjakan’i Tsedekià tamin’izay, ary andro fahafolon’ny volana fahafolo
  - type: note
    content: Izany hoe tamin’ny faramparan’ny volana Desambra 589 tal J.K. Jereo ny FTS amin’ny voambolana hoe FANISANANDRO. Ampit Ezek 24.1.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Naharitra hatramin’ny taona faha-11 nanjakàn’i Tsedekià ny fanaovana fahirano
  - type: note
    content: Izany hoe fiandohan’ny lohataona 587 tal J.K.
  - type: text
    content: .
  '6':
  - type: text
    content: Mafy dia mafy ny mosary tao an-tanàna fa tsy nanan-kohanina ny mponina. Ary tamin’ny andro fahasivin’ny volana fahefatra
  - type: note
    content: Faran’ny volana Jona 587 tal J.K.
  - type: text
    content: ', '
  '7':
  - type: text
    content: dia nisy noloahan’ireo Babilônianina ny mandan’ny tanàna. Koa nony alina dia nitsoaka nandositra ny miaramila jodeanina rehetra. Na dia voahodidin’ny Babilônianina aza ny tanàna, dia niala tao Jerosalema ihany ireo, ka nandalo ny vavahady tanelanelan’ny manda roa sady takaikin’ny sahan’ny mpanjaka
  - type: note
    content: 'nandositra ny miaramila jodeanina rehetra: tahaka izay voalazan’ny and 8 sy ny andalana mitovy ao amin’ny 39.4 dia nandositra ireo miaramila izay niaraka tamin’i Tsedekià mpanjaka. –ny vavahady tanelanelan’ny manda roa: dia eo atsimon’ny tanàna. –faharavan’i Jerosalema: jereo Ezek 33.21.'
  - type: text
    content: ', ary nihazo ny lalana mankany amin’ny lohasahan’i Jôrdàna. '
  '8':
  - type: text
    content: 'Kanjo nenjehin’ny miaramila babilônianina i Tsedekià mpanjaka ary tratrany teo amin’ny lemak’i Jerikao; dia nihahaka nandao an’i Tsedekià ny tafiny manontolo. '
  '9':
  - type: text
    content: Rehefa voasambotra ny mpanjaka, dia nentina tany amin’ny mpanjakan’i Babilôna izay tao Riblà anatin’ny faritr’i Hamata
  - type: note
    content: Jereo 39.5 sy nta.
  - type: text
    content: '; ary namoahan’i Nebokadnetsara didim-pitsarana tao izy. '
