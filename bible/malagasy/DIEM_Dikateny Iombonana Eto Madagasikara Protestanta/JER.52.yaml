document_id: JER.52
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nataon’i Nebokadnetsara sambo-belona i Tsedekià
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 39.4-7; 2 Mp 24.18–25.7)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Feno 21 taona i Tsedekià fony tonga mpanjakan’i Joda; ary naharitra 11 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Hamotala zanakavavin’i Jeremià avy ao Libnà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Libnà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Mp 8.22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nanao izay ratsy eo imason’ny TOMPO izy tahaka izay rehetra nataon’i Jôiakima.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny fahatezeran’ny TOMPO no nahatonga izany loza izany tamin’i Jerosalema sy tamin’i Joda, ka niafara tamin’ny fandroahany an’ireo Jodeanina hiala teo anatrehany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nikomy tamin’i Nebokadnetsara mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' i Tsedekià. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa tonga tao Jerosalema niaraka tamin’ny tafiny manontolo i Nebokadnetsara. Nitoby manoloana ny tanàna ireo miaramilany, ary nanao tovon-tany manodidina an’i Jerosalema. Taona fahasivy nanjakan’i Tsedekià tamin’izay, ary andro fahafolon’ny volana fahafolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe tamin’ny faramparan’ny volana Desambra 589 tal J.K. Jereo ny FTS amin’ny voambolana hoe FANISANANDRO. Ampit Ezek 24.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Naharitra hatramin’ny taona faha-11 nanjakàn’i Tsedekià ny fanaovana fahirano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe fiandohan’ny lohataona 587 tal J.K.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mafy dia mafy ny mosary tao an-tanàna fa tsy nanan-kohanina ny mponina. Ary tamin’ny andro fahasivin’ny volana fahefatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Faran’ny volana Jona 587 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia nisy noloahan’ireo Babilônianina ny mandan’ny tanàna. Koa nony alina dia nitsoaka nandositra ny miaramila jodeanina rehetra. Na dia voahodidin’ny Babilônianina aza ny tanàna, dia niala tao Jerosalema ihany ireo, ka nandalo ny vavahady tanelanelan’ny manda roa sady takaikin’ny sahan’ny mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nandositra ny miaramila jodeanina rehetra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tahaka izay voalazan’ny and 8 sy ny andalana mitovy ao amin’ny 39.4 dia nandositra ireo miaramila izay niaraka tamin’i Tsedekià mpanjaka. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny vavahady tanelanelan’ny manda roa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dia eo atsimon’ny tanàna. –faharavan’i Jerosalema: jereo Ezek 33.21.'
    marker-yv: yv-n
  - type: text
    text: ', ary nihazo ny lalana mankany amin’ny lohasahan’i Jôrdàna. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanjo nenjehin’ny miaramila babilônianina i Tsedekià mpanjaka ary tratrany teo amin’ny lemak’i Jerikao; dia nihahaka nandao an’i Tsedekià ny tafiny manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Rehefa voasambotra ny mpanjaka, dia nentina tany amin’ny mpanjakan’i Babilôna izay tao Riblà anatin’ny faritr’i Hamata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 39.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; ary namoahan’i Nebokadnetsara didim-pitsarana tao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Novonoina ho faty teo imason-drainy ireo zanakalahin’i Tsedekià; ary tao Riblà koa no namonoana ho faty ireo mpiasam-panjakana jodeanina. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avy teo dia nasain’i Nebokadnetsara nopotsirina ny mason’i Tsedekià; ary nasainy nafatotra gadra halimo sy nentina ho any Babilôna izy mba hatao an-tranomaizina ka nahibony tao ambara-pahafatiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny fampijaliana nihatra tamin’i Tsedekià: jereo Ezek 12.13.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Nebozaradàna no namarana ny fandravana an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 39.8-10; 2 Mp 25.8-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tamin’ny taona faha-19 nanjakàn’i Nebokadnetsara, nony andro fahafolon’ny volana fahadimy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe ny volana Aogositra 587 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', dia tafiditra tao Jerosalema i Nebozaradàna, filohan’ny mpiambina sady manamboninahitry ny mpanjakan’i Babilôna. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izy no nandoro ny tranon’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Faharavàn’ny tempoly: ampit 1 Mp 7.47-50.'
    marker-yv: yv-n
  - type: text
    text: ' sy ny lapan’ny mpanjaka ary ireo trano tao an-tanàna, indrindra ny an’ny olona ambony rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny manda manodidina an’i Jerosalema dia narodan’ny miaramila babilônianina rehetra izay niaraka tamin’ny filohan’ny mpiambina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nentin’i Nebozaradàna ho babo ireo mponina sisa tao an-tanàna, dia ireo fianakaviana mahantra vitsivitsy sy ireo olona nitolo-batana tamin’ny mpanjakan’i Babilôna ary ny sisa tamin’ireo mpahay taozavatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 39.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Kanefa dia nisy ampahan’ny vahoaka mahantra navelany mba hamboly ny tanimboaloboka sy ny saha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nopotehin’ny Babilônianina ireo andry halimo tao an-tranon’ny TOMPO mbamin’ireo kalesy ary ilay fitobian-drano halimo goavana teo an-kianja
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andry halimo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 7.15-22. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: kalesy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 1 Mp 7.27-37. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: fitobian-drano halimo goavana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 1 Mp 7.23-26.'
    marker-yv: yv-n
  - type: text
    text: '; dia nentiny nankany Babilôna avokoa ny halimo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nalainy koa ny fanaka halimo rehetra fampiasa tamin’ny fanompoam-pivavahana, dia ny vilany fasian-davenona sy ny sotron’afo mbamin’ny antsy sy ny tsatokaty famafazana ary ireo lovia madinika. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nentin’ny filohan’ny mpiambina koa ny fitaovana volamena sy volafotsy rehetra: ny lovia, ny fandoroana zava-manitra, ny tsatokaty famafazana, ny fandraofan-davenona, ny fitoeran-jiro ary ny kaopy sy ny tavoara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ireo fanaka halimo, volafotsy na volamena fampiasa teo amin’ny fanompoam-pivavahana: jereo 1 Mp 7.45-50.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy hita lanja ny halimo tamin’ireo fanaka rehetra izay namboarin’i Salômôna ho an’ny tranon’ny TOMPO: dia ireo andry anankiroa sy ilay fitobian-drano goavana miaraka amin’ireo ombilahy halimo 12 mitondra azy, ary ireo kalesy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny andry tsirairay dia sivy metatra ny haavony ary enina metatra ny manodidina. Poakaty izy nefa misy valo santimetatra ny hatevin’ny metaly. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Misy lohany halimo tsirairay avy ny andry ka mahatratra roa metatra sy sasany ny haavony sady voaravaka harato sy ampongabendanitra halimo ny manodidina azy. Mitovy ireo andry roa sy ny ravaka natao taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Miisa 96 ireo ampongabendanitra teo amin’ny lafiny efatra, izany hoe ampongabendanitra zato no tontaliny tamin’ny manodidina ny harato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mety ho azo tsara ihany ny ravaky ny andohalambony izay mizara ho 24 voany avy isaky ny ilany (24 x 4 =96), miampy iray isaky ny zorony efatra. Ny fanehoana antsipiriany omena ao 1 Mp 7.17-21, 41-42 dia milaza fa misy 200 ny ampongabendanitra isaky ny andry.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nosamborin’ny filohan’ny mpiambina i Seraià mpisorombe sy i Tsefanià lefiny ary ireo mpisorona telo lahy mpiandry varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nosamboriny koa ny mpiasam-panjakana iray mpiandraikitra ny miaramila sy ny olona fito lahy mpanolotsainan’ny mpanjaka, sy ny mpitantsoratr’ilay manamboninahitra misahana ny fiantsoana ho miaramila, ary ny teratany jodeanina miisa enimpolo lahy; fa samy hitany tao Jerosalema avokoa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nentin’i Nebozaradàna ho any amin’ny mpanjakan’i Babilôna tao Riblà anatin’ny faritr’i Hamata izy rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ary nasain’ny mpanjakan’i Babilôna novonoina ho faty tao ihany. Toy izany no nitondrana ny vahoaka jodeanina ho babo lavitry ny taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ireto no isan’ireo olona nasain’i Nebokadnetsara nentina ho babo: tamin’ny taona fahafito nanjakany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny taona fahafito nanjakany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanjakàn’i Nebokadnetsara no tiany holazaina, izany hoe 598 na 597 tal J.K, mifanandrify amin’ireo zava-nitranga voatatitra ao 2 Mp 24.10-17.
    marker-yv: yv-n
  - type: text
    text: ', Jodeanina 3 023; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: tamin’ny taona faha-18 nanjakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe tamin’ny 587 na 586 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', olona 832 avy tao Jerosalema.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tamin’ny taona faha-23 nanjakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe tamin’ny 582 na 581 tal J.K. Ao amin’ny Baiboly dia eto ihany no voalaza io fahababoana fanintelony io.
    marker-yv: yv-n
  - type: text
    text: ', dia mbola nitondra Jodeanina 745 ho babo ihany i Nebozaradàna filohan’ny mpiambina. Koa ny tontalin’izy rehetra dia 6 400.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nomen’ny mpanjakan’i Babilôna famotsoran-keloka i Jôiakina.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 25.27-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fony 37 taona taorian’ny fanaovana sesitany an’i Jôiakina mpanjakan’i Joda, dia i Evila-Merôdaky no tonga mpanjakan’i Babilôna. Koa tamin’ny volana faha-12 tao anatin’io taona io, nony andro faha-27,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny nanaovana sesitany an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôiakina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo 2 Mp 24.10-17; Jer 22.24-27. '
    - type: usfm
      marker: it
      children:
