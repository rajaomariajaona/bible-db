document_id: JHN.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tafatsangana velona i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 28.1-10; Mk 16.1-8; Lk 24.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny andro alahady, dia nandeha maraina be mbola maizimaizina i Maria Magdalena hankany amin’ny fasana, ka nahita ny vato efa voaesotra lavitry ny fasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia lasa izy nihazakazaka nankany amin’i Simôna Petera sy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' tian’i Jesoa, ka nanao tamin’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nalain’olona tao am-pasana ny Tompo, ka tsy fantatray izay nametrahany Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niainga i Petera sy ilay mpianatra anankiray nankany amin’ny fasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Niara-nihazakazaka izy roa lahy, saingy nihazakazaka faingana kokoa noho i Petera ilay mpianatra anankiray, ka tonga taloha teo amin’ny fasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niondrika nitsirika izy, ka nahita ny lambam-paty nipetraka teo, nefa tsy niditra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tonga koa i Simôna Petera nanaraka azy, dia niditra tao am-pasana, ka nijery ny lambam-paty nipetraka teo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'sy ny lambakely nasarona ny lohany, tsy niara-nipetraka tamin’ny lambam-paty fa voavalona mitokana terỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’izay dia niditra koa ilay mpianatra tonga taloha teo amin’ny fasana, ary nahita ka nino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy mbola fantatr’ireo mpianatra manko ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' manambara fa i Jesoa dia tsy maintsy hitsangana velona avy any amin’ny maty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 16.10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia lasa izy roa lahy nody tany aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisehoan’i Jesoa amin’i Maria Magdalena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 28.9-10; Mk 16.9-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I Maria kosa nijanona nitomany teo ivelan’ny fasana. Ary raha nitomany izy, dia niondrika nitsirika tao am-pasana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka nahita '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' roa niakanjo fotsy, nipetraka teo amin’izay nandrian’ny vatan’i Jesoa: ny iray teo an-doha, ary ny iray teo an-tongotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy ireo anjely tamin’i Maria:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ianao no mitomany?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nalain’olona ny Tompoko, ka tsy fantatro izay nametrahany Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nitodika i Maria nony avy nilaza izany, ka nahita an’i Jesoa nijoro teo, saingy tsy fantany hoe i Jesoa io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ianao, ramatoa, no mitomany? Iza no tadiavinao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Noheverin’i Maria ho mpiandry saha io, ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha Ianao re, Tompoko, no naka Azy, mba lazao amiko izay nametrahanao Azy, hangalako Azy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Maria!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nitodika ravehivavy ka niteny aramianina taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rabonỳ (izany hoe Mpampianatra)!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy kosa i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ianao tsy hitazona Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Aoka ianao tsy hitazona Ahy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aza mikasika Ahy.
    marker-yv: yv-n
  - type: text
    text: ', satria tsy mbola niakatra tany amin’ny Ray Aho. Fa mandehana mankany amin’ny rahalahiko, ka lazao aminy hoe: Miakatra ho any amin’ilay Raiko sady Rainareo Aho, ary ho any amin’ilay Andriamanitro sady Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia lasa i Maria Magdalena ka nanambara tamin’ny mpianatra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nahita ny Tompo aho!
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nambarany koa ireo hafatra nambaran’i Jesoa taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisehoan’i Jesoa amin’ireo mpianatra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 28.16-20; Mk 16.14-18; Lk 24.36-49)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny harivan’io alahady io ihany, dia vory tao amin’ny trano iray ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: '; ary noho izy ireo natahotra ny manampahefana jiosy, dia voahidy avokoa ny varavarana. Kanefa tonga i Jesoa nijoro teo afovoan’ny mpianatra ary nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho ao aminareo anie ny fiadanana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rehefa nilaza izany i Jesoa, dia nasehony azy ireo ny tanany sy ny fony, ka faly ny mpianatra fa nahita ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tanany sy ny fony no ahitana ny diam-pantsika aman-defona (jereo 19.18,34).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy indray i Jesoa taminy:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ho ao aminareo anie ny fiadanana! Tahaka ny nanirahan’ny Ray Ahy no anirahako anareo koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa nilaza izany Izy, dia nitsoka taminy ary nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raiso ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Na iza na iza avelanareo heloka, dia voavela; ary na iza na iza tsy avelanareo heloka, dia tsy voavela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 16.19; 18.18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisehoan’i Jesoa tamin’i Tômà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa i Tômà, ilay atao hoe Ikambana, anankiray tamin’ny 12 lahy, dia tsy mba tafaraka tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' fony tonga i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ka hoy ny mpianatra sasany tamin’i Tômà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nahita ny Tompo izahay!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy i Tômà taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tsy hitako eo amin’ny tanany roa ny loaky ny fantsika, ka atsofoko eo amin’ny loaky ny fantsika ny rantsan-tanako, ary atsofoko eo amin’ny fony ny tanako, dia tsy mba hino aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 20.20 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nony afaka herinandro, dia vory tao an-trano indray ny mpianatr’i Jesoa; ary tafaraka tamin’ireo koa i Tômà. Voahidy avokoa ny varavarana, kanefa dia tonga i Jesoa nijoro teo afovoan’ny mpianatra ary nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho ao aminareo anie ny fiadanana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Avy eo dia hoy Izy tamin’i Tômà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Arosoy eto ny rantsan-tananao ka jereo ny tanako roa; arosoy koa ny tananao ka atsofoy eto amin’ny foko; ary aza malain-kino, fa minoa!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia namaly i Tômà ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompoko sy Andriamanitro!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Noho ianao nahita Ahy, dia nino; sambatra kosa izay tsy nahita, nefa nino
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Pt 1.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny kendren’ity boky ity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Maro koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' hafa nataon’i Jesoa teo imason’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' no tsy voasoratra amin’ity boky ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa voasoratra ireo famantarana ireo mba hinoanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mba hinoanareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mba hinoanareo hatrany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit 19.35).'
    marker-yv: yv-n
  - type: text
    text: ' fa i Jesoa no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ', ary mba hahavelona aina anareo amin’ny alalany, raha mino Azy ianareo.'
