document_id: JHN.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tafatsangana velona i Jesoa
  - type: heading
    content: (Jereo Mt 28.1-10; Mk 16.1-8; Lk 24.1-12)
  - type: text
    content: 'Ny andro alahady, dia nandeha maraina be mbola maizimaizina i Maria Magdalena hankany amin’ny fasana, ka nahita ny vato efa voaesotra lavitry ny fasana. '
  '10':
  - type: text
    content: Dia lasa izy roa lahy nody tany aminy.
  - type: heading
    content: Fisehoan’i Jesoa amin’i Maria Magdalena
  - type: heading
    content: (Jereo Mt 28.9-10; Mk 16.9-11)
  '11':
  - type: text
    content: 'I Maria kosa nijanona nitomany teo ivelan’ny fasana. Ary raha nitomany izy, dia niondrika nitsirika tao am-pasana, '
  '12':
  - type: text
    content: 'ka nahita '
  - type: text
    content: anjely
  - type: text
    content: ' roa niakanjo fotsy, nipetraka teo amin’izay nandrian’ny vatan’i Jesoa: ny iray teo an-doha, ary ny iray teo an-tongotra. '
  '13':
  - type: text
    content: 'Dia hoy ireo anjely tamin’i Maria:'
  - type: text
    content: –Nahoana ianao no mitomany?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Nalain’olona ny Tompoko, ka tsy fantatro izay nametrahany Azy.
  '14':
  - type: text
    content: 'Dia nitodika i Maria nony avy nilaza izany, ka nahita an’i Jesoa nijoro teo, saingy tsy fantany hoe i Jesoa io. '
  '15':
  - type: text
    content: 'Dia hoy Jesoa taminy:'
  - type: text
    content: –Nahoana ianao, ramatoa, no mitomany? Iza no tadiavinao?
  - type: text
    content: 'Noheverin’i Maria ho mpiandry saha io, ka nataony hoe:'
  - type: text
    content: –Raha Ianao re, Tompoko, no naka Azy, mba lazao amiko izay nametrahanao Azy, hangalako Azy!
  '16':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Ry Maria!
  - type: text
    content: 'Dia nitodika ravehivavy ka niteny aramianina taminy hoe:'
  - type: text
    content: –Rabonỳ (izany hoe Mpampianatra)!
  '17':
  - type: text
    content: 'Hoy kosa i Jesoa taminy:'
  - type: text
    content: –Aoka ianao tsy hitazona Ahy
  - type: note
    content: 'Aoka ianao tsy hitazona Ahy: dkt hafa aza mikasika Ahy.'
  - type: text
    content: ', satria tsy mbola niakatra tany amin’ny Ray Aho. Fa mandehana mankany amin’ny rahalahiko, ka lazao aminy hoe: Miakatra ho any amin’ilay Raiko sady Rainareo Aho, ary ho any amin’ilay Andriamanitro sady Andriamanitrareo.'
  '18':
  - type: text
    content: 'Dia lasa i Maria Magdalena ka nanambara tamin’ny mpianatra hoe:'
  - type: text
    content: –Efa nahita ny Tompo aho!
  - type: text
    content: Ary nambarany koa ireo hafatra nambaran’i Jesoa taminy.
  - type: heading
    content: Fisehoan’i Jesoa amin’ireo mpianatra
  - type: heading
    content: (Jereo Mt 28.16-20; Mk 16.14-18; Lk 24.36-49)
  '19':
  - type: text
    content: 'Ny harivan’io alahady io ihany, dia vory tao amin’ny trano iray ny '
  - type: text
    content: mpianatra
  - type: text
    content: '; ary noho izy ireo natahotra ny manampahefana jiosy, dia voahidy avokoa ny varavarana. Kanefa tonga i Jesoa nijoro teo afovoan’ny mpianatra ary nanao taminy hoe:'
  - type: text
    content: –Ho ao aminareo anie ny fiadanana!
  '2':
  - type: text
    content: 'Dia lasa izy nihazakazaka nankany amin’i Simôna Petera sy ilay '
  - type: text
    content: mpianatra
  - type: text
    content: ' tian’i Jesoa, ka nanao tamin’ireo hoe:'
  - type: text
    content: –Nalain’olona tao am-pasana ny Tompo, ka tsy fantatray izay nametrahany Azy.
  '20':
  - type: text
    content: Rehefa nilaza izany i Jesoa, dia nasehony azy ireo ny tanany sy ny fony, ka faly ny mpianatra fa nahita ny Tompo
  - type: note
    content: Ny tanany sy ny fony no ahitana ny diam-pantsika aman-defona (jereo 19.18,34).
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Dia hoy indray i Jesoa taminy:'
  - type: text
    content: Ho ao aminareo anie ny fiadanana! Tahaka ny nanirahan’ny Ray Ahy no anirahako anareo koa.
  '22':
  - type: text
    content: 'Rehefa nilaza izany Izy, dia nitsoka taminy ary nanao hoe:'
  - type: text
    content: '–Raiso ny Fanahy Masina. '
  '23':
  - type: text
    content: Na iza na iza avelanareo heloka, dia voavela; ary na iza na iza tsy avelanareo heloka, dia tsy voavela
  - type: note
    content: Ampit Mt 16.19; 18.18.
  - type: text
    content: .
  - type: heading
    content: Fisehoan’i Jesoa tamin’i Tômà
  '24':
  - type: text
    content: 'Fa i Tômà, ilay atao hoe Ikambana, anankiray tamin’ny 12 lahy, dia tsy mba tafaraka tamin’ireo '
  - type: text
    content: mpianatra
  - type: text
    content: ' fony tonga i Jesoa. '
  '25':
  - type: text
    content: 'Ka hoy ny mpianatra sasany tamin’i Tômà:'
  - type: text
    content: –Efa nahita ny Tompo izahay!
  - type: text
    content: 'Fa hoy i Tômà taminy:'
  - type: text
    content: –Raha tsy hitako eo amin’ny tanany roa ny loaky ny fantsika, ka atsofoko eo amin’ny loaky ny fantsika ny rantsan-tanako, ary atsofoko eo amin’ny fony ny tanako, dia tsy mba hino aho
  - type: note
    content: Jereo 20.20 sy nta.
  - type: text
    content: .
  '26':
  - type: text
    content: 'Nony afaka herinandro, dia vory tao an-trano indray ny mpianatr’i Jesoa; ary tafaraka tamin’ireo koa i Tômà. Voahidy avokoa ny varavarana, kanefa dia tonga i Jesoa nijoro teo afovoan’ny mpianatra ary nanao hoe:'
  - type: text
    content: –Ho ao aminareo anie ny fiadanana!
  '27':
  - type: text
    content: 'Avy eo dia hoy Izy tamin’i Tômà:'
  - type: text
    content: –Arosoy eto ny rantsan-tananao ka jereo ny tanako roa; arosoy koa ny tananao ka atsofoy eto amin’ny foko; ary aza malain-kino, fa minoa!
  '28':
  - type: text
    content: 'Dia namaly i Tômà ka nanao taminy hoe:'
  - type: text
    content: –Tompoko sy Andriamanitro!
  '29':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Noho ianao nahita Ahy, dia nino; sambatra kosa izay tsy nahita, nefa nino
  - type: note
    content: Ampit 1Pt 1.8.
  - type: text
    content: .
  - type: heading
    content: Ny kendren’ity boky ity
  '3':
  - type: text
    content: 'Dia niainga i Petera sy ilay mpianatra anankiray nankany amin’ny fasana. '
  '30':
  - type: text
    content: 'Maro koa ny '
  - type: text
    content: famantarana
  - type: text
    content: ' hafa nataon’i Jesoa teo imason’ny '
  - type: text
    content: mpianany
  - type: text
    content: ' no tsy voasoratra amin’ity boky ity. '
  '31':
  - type: text
    content: Fa voasoratra ireo famantarana ireo mba hinoanareo
  - type: note
    content: 'mba hinoanareo: misy stf sasany ahitana hoe mba hinoanareo hatrany (ampit 19.35).'
  - type: text
    content: ' fa i Jesoa no ilay '
  - type: text
    content: Mesia
  - type: text
    content: ', ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ', ary mba hahavelona aina anareo amin’ny alalany, raha mino Azy ianareo.'
  '4':
  - type: text
    content: 'Niara-nihazakazaka izy roa lahy, saingy nihazakazaka faingana kokoa noho i Petera ilay mpianatra anankiray, ka tonga taloha teo amin’ny fasana. '
  '5':
  - type: text
    content: 'Dia niondrika nitsirika izy, ka nahita ny lambam-paty nipetraka teo, nefa tsy niditra. '
  '6':
  - type: text
    content: 'Tonga koa i Simôna Petera nanaraka azy, dia niditra tao am-pasana, ka nijery ny lambam-paty nipetraka teo '
  '7':
  - type: text
    content: 'sy ny lambakely nasarona ny lohany, tsy niara-nipetraka tamin’ny lambam-paty fa voavalona mitokana terỳ. '
  '8':
  - type: text
    content: 'Tamin’izay dia niditra koa ilay mpianatra tonga taloha teo amin’ny fasana, ary nahita ka nino. '
  '9':
  - type: text
    content: 'Tsy mbola fantatr’ireo mpianatra manko ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' manambara fa i Jesoa dia tsy maintsy hitsangana velona avy any amin’ny maty'
  - type: note
    content: Jereo Sal 16.10.
  - type: text
    content: '. '
