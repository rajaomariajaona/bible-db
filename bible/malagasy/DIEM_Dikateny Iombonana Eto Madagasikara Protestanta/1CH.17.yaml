document_id: 1CH.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny fampanantenana nataon’Andriamanitra ho an’i Davida sy ny taranany
  - type: heading
    content: (Jereo 2 Sam 7.1-17)
  - type: text
    content: 'Taorian’izany i Davida dia nipetraka tao amin’ny lapany; ka hoy izy tamin’i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: ':'
  - type: text
    content: '–Indro aho ity mipetraka amin’ny lapa vita hazo sedera kanefa ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ' kosa ao anaty tranolay'
  - type: note
    content: 'lapa vita hazo sedera: jereo 2 Sam 5.11. –anaty tranolay: jereo 2 Sam 6.17.'
  - type: text
    content: '!'
  '10':
  - type: text
    content: dia tamin’ny andro izay nanendreko ny mpitsara hifehy ny Israely vahoakako; ary haetriko ny fahavalonao. Ambarako aminao koa fa Izaho TOMPO no hanome taranaka ho anao
  - type: note
    content: 'Eo amin’ny and 4-10 ny teny hebreo izay nadika araka ny mahazatra hoe «trano» dia sady milaza trano no milaza taranaka. Jereo 2 Sam 7.11 sy nta. –hanome taranaka ho anao: dkt hafa hanao trano ho anao.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Ary rehefa tapitra ny andronao ka lasa any amin’ny razanao ianao, dia hatsangako handimby anao ny anankiray amin’ireo zanakalahy naterakao ka haoriko mafy ny fanjakany
  - type: note
    content: Jereo 1 Mp 2.12, 46.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Izy no hanao trano ho Ahy
  - type: note
    content: Jereo 1 Mp 6.
  - type: text
    content: ', ary haoriko mafy mandrakizay ny sezafiandrianany. '
  '13':
  - type: text
    content: Izaho ho rainy, ary izy ho zanako; ka tsy hanesotra aminy na oviana na oviana ny fitiavako Aho tahaka ny nanesorako izany tamin’ilay mpanjaka talohanao
  - type: note
    content: 'Izaho... ho zanako: jereo 2Kôr 6.18; Heb 1.5. –ilay mpanjaka talohanao: dia i Saoly; jereo 1 Sam 15.28.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Hataoko maharitra mandrakizay ao amin’ny tempoliko sy eo amin’ny fanjakako izy; ary ny sezafiandrianany tsy ho voahozongozona mandrakizay.»
  '15':
  - type: text
    content: Dia nambaran’i Natàna tamin’i Davida avokoa izay rehetra nolazain’Andriamanitra azy nandritra io fahitana io.
  - type: heading
    content: Vavak’i Davida
  - type: heading
    content: (Jereo 2 Sam 7.18-29)
  '16':
  - type: text
    content: 'Ary nankeo anatrehan’ny TOMPO tao an-tranolay i Davida mpanjaka, ka nipetraka sady nivavaka hoe:'
  - type: text
    content: –Ry TOMPO Andriamanitro ô, mba iza moa aho; ary mba inona ny fianakaviako no tonganao amin’ny toerana misy ahy izao
  - type: note
    content: no nentinao hatratỳ aho? dkt hafa araka ny Septoazinta no dia notiavinao mandrakizay aho?
  - type: text
    content: '? '
  '17':
  - type: text
    content: 'Kanefa mbola kely izany eo imasonao, Andriamanitra ô, ka efa nanaovanao fampanantenana koa hatramin’ny taranako mbola any aoriana lavitra any; ary dia noheverinao ho olona ambony saranga aho. Ry TOMPO Andriamanitro ô, '
  '18':
  - type: text
    content: 'inona no mbola azoko lazaina aminao momba ny voninahitra nomenao ahy satria Ianao no mahalala ahy mpanomponao? '
  '19':
  - type: text
    content: 'TOMPO ô, noho ny amiko mpanomponao sy araka ny sitraponao no nanaovanao izao asa lehibe manontolo izao mba hampahalalanao ny zava-dehibe rehetra vitanao. '
  '2':
  - type: text
    content: 'Dia hoy i Natàna namaly an’i Davida:'
  - type: text
    content: –Tanteraho avokoa izay noeritreretinao hatao; fa momba anao Andriamanitra.
  '20':
  - type: text
    content: 'TOMPO ô, tsy misy tahaka Anao, ary tsy misy Andriamanitra afa-tsy Ianao, araka izay rehetra ren’ny sofinay. '
  '21':
  - type: text
    content: 'Ary iza moa no firenena hafa eto ambonin’ny tany tahaka ny Israely vahoakanao, ka nandehananao Andriamanitra mba havotanao ho vahoakanao? Eny, nampalaza Anao ireo zava-mahagaga sy mahatahotra vitanao mba handroahanao ny firenena hafa tsy ho eo anatrehan’ny vahoakanao izay navotanao avy tany Ejipta. '
  '22':
  - type: text
    content: 'Ny Israely vahoakanao dia nataonao ho vahoakanao mandrakizay; ary Ianao kosa, TOMPO ô, no efa tonga Andriamaniny. '
  '23':
  - type: text
    content: 'Ankehitriny, ry TOMPO, ny fampanantenana nolazainao momba ahy sy ny taranako dia aoka ho tanteraka hatrany hatrany, ka ataovy araka izay efa nampanantenainao. '
  '24':
  - type: text
    content: 'Eny, aoka ho tanteraka izany, dia halaza mandrakizay ny anaranao, ka hatao hoe: «Ny TOMPOn’izao rehetra izao no Andriamanitra ho an’i Israely!»; ary aoka ny taranako haharitra tsy azo hozongozonina eo anatrehanao. '
  '25':
  - type: text
    content: 'Satria Ianao, Andriamanitro ô, efa nanambara tamiko fa hanome taranaka ho ahy; koa izany no maha eto ahy mba hivavaka manatrika anao. '
  '26':
  - type: text
    content: 'TOMPO ô, Ianao mihitsy no Andriamanitra, ary izaho mpanomponao no efa nampanantenainao izany zava-tsoa izany. '
  '27':
  - type: text
    content: 'Koa dia ho sitrakao ny '
  - type: text
    content: hitahy
  - type: text
    content: ' ireo taranako mba hitohy mandrakizay eo anatrehanao; satria raha Ianao no mitahy, TOMPO ô, dia ho voatahy mandrakizay izy'
  - type: note
    content: 'satria raha... izy: dkt hafa satria Ianao no mitahy azy, Tompo ô, dia ho voatahy mandrakizay ny mpanjaka na satria Ianao no mitahy, Tompo ô, ka hankalazaina mandrakizay anie Ianao!'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Tamin’ny alina iny ihany dia nisy tenin’Andriamanitra tamin’i Natàna nanao hoe:'
  '4':
  - type: text
    content: '–Ndeha lazao amin’i Davida mpanompoko fa Izaho TOMPO dia manambara izao hafatro izao: ‹Tsy ianao no hanao '
  - type: text
    content: tempoly
  - type: text
    content: ' hitoerako. '
  '5':
  - type: text
    content: 'Fa tsy mbola nitoetra an-tempoly aho hatramin’ny andro nampiakarako ny Israelita avy any Ejipta ka mandraka androany; fa Izaho dia nifindrafindra lay ary nifindrafindra fonenana. '
  '6':
  - type: text
    content: 'Nandritra ny fotoana rehetra nifindrafindrako manerana an’i Israely, dia nanendry ireo mpitsaran’i Israely Aho mba ho mpiandry ny vahoakako; kanefa tsy nisy nomeko tsiny na dia anankiray tamin’ireo mpitsara ireo aza ka nilazako hoe: Nahoana Aho no tsy nanaovanareo trano vita hazo sedera?›'
  '7':
  - type: text
    content: '«Noho izany, lazao koa amin’i Davida mpanompoko fa Izaho TOMPOn’izao rehetra izao no mampita hafatra hoe: Izaho no naka anao tao am-piandrasana ondry tany an-kijàna mba hataoko mpanapaka eo amin’ny Israely'
  - type: note
    content: 'tany an-kijàna: jereo 1 Sam 16.11. –mpanapaka eo amin’ny Israely: jereo 2 Sam 5.2.'
  - type: text
    content: ' vahoakako. '
  '8':
  - type: text
    content: 'Nomba anao Aho tamin’izay rehetra nalehanao, ka nandripaka ny fahavalonao rehetra teo anoloanao; ary hataoko lehibe ny lazanao tahaka ny an’ireo olona ambony eto an-tany. '
  '9':
  - type: text
    content: 'Ary handraiketako toerana iray hampiorenako azy ny Israely vahoakako, ka dia honina tsy hanana ahiahy amin’izany izy. Fa tsy hisy firenen-dozabe hampahory azy intsony tahaka ny taloha, '
