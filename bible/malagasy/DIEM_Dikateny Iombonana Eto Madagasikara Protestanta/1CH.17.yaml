document_id: 1CH.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny fampanantenana nataon’Andriamanitra ho an’i Davida sy ny taranany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 7.1-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany i Davida dia nipetraka tao amin’ny lapany; ka hoy izy tamin’i Natàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro aho ity mipetraka amin’ny lapa vita hazo sedera kanefa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    text: ' kosa ao anaty tranolay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lapa vita hazo sedera: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 5.11. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: anaty tranolay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 2 Sam 6.17.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Natàna namaly an’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tanteraho avokoa izay noeritreretinao hatao; fa momba anao Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny alina iny ihany dia nisy tenin’Andriamanitra tamin’i Natàna nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '–Ndeha lazao amin’i Davida mpanompoko fa Izaho TOMPO dia manambara izao hafatro izao: ‹Tsy ianao no hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' hitoerako. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa tsy mbola nitoetra an-tempoly aho hatramin’ny andro nampiakarako ny Israelita avy any Ejipta ka mandraka androany; fa Izaho dia nifindrafindra lay ary nifindrafindra fonenana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nandritra ny fotoana rehetra nifindrafindrako manerana an’i Israely, dia nanendry ireo mpitsaran’i Israely Aho mba ho mpiandry ny vahoakako; kanefa tsy nisy nomeko tsiny na dia anankiray tamin’ireo mpitsara ireo aza ka nilazako hoe: Nahoana Aho no tsy nanaovanareo trano vita hazo sedera?›'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Noho izany, lazao koa amin’i Davida mpanompoko fa Izaho TOMPOn’izao rehetra izao no mampita hafatra hoe: Izaho no naka anao tao am-piandrasana ondry tany an-kijàna mba hataoko mpanapaka eo amin’ny Israely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tany an-kijàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 16.11. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: mpanapaka eo amin’ny Israely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 2 Sam 5.2.'
    marker-yv: yv-n
  - type: text
    text: ' vahoakako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nomba anao Aho tamin’izay rehetra nalehanao, ka nandripaka ny fahavalonao rehetra teo anoloanao; ary hataoko lehibe ny lazanao tahaka ny an’ireo olona ambony eto an-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary handraiketako toerana iray hampiorenako azy ny Israely vahoakako, ka dia honina tsy hanana ahiahy amin’izany izy. Fa tsy hisy firenen-dozabe hampahory azy intsony tahaka ny taloha, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia tamin’ny andro izay nanendreko ny mpitsara hifehy ny Israely vahoakako; ary haetriko ny fahavalonao. Ambarako aminao koa fa Izaho TOMPO no hanome taranaka ho anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eo amin’ny and 4-10 ny teny hebreo izay nadika araka ny mahazatra hoe «trano» dia sady milaza trano no milaza taranaka. Jereo 2 Sam 7.11 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: hanome taranaka ho anao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hanao trano ho anao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary rehefa tapitra ny andronao ka lasa any amin’ny razanao ianao, dia hatsangako handimby anao ny anankiray amin’ireo zanakalahy naterakao ka haoriko mafy ny fanjakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 2.12, 46.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izy no hanao trano ho Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 6.
    marker-yv: yv-n
  - type: text
    text: ', ary haoriko mafy mandrakizay ny sezafiandrianany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho ho rainy, ary izy ho zanako; ka tsy hanesotra aminy na oviana na oviana ny fitiavako Aho tahaka ny nanesorako izany tamin’ilay mpanjaka talohanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izaho... ho zanako: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2Kôr 6.18; Heb 1.5. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ilay mpanjaka talohanao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dia i Saoly; jereo 1 Sam 15.28.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hataoko maharitra mandrakizay ao amin’ny tempoliko sy eo amin’ny fanjakako izy; ary ny sezafiandrianany tsy ho voahozongozona mandrakizay.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nambaran’i Natàna tamin’i Davida avokoa izay rehetra nolazain’Andriamanitra azy nandritra io fahitana io.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavak’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 7.18-29)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nankeo anatrehan’ny TOMPO tao an-tranolay i Davida mpanjaka, ka nipetraka sady nivavaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry TOMPO Andriamanitro ô, mba iza moa aho; ary mba inona ny fianakaviako no tonganao amin’ny toerana misy ahy izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: no nentinao hatratỳ aho?
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa araka ny Septoazinta '
    - type: usfm
      marker: it
      children:
      - type: text
        text: no dia notiavinao mandrakizay aho
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '?'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Kanefa mbola kely izany eo imasonao, Andriamanitra ô, ka efa nanaovanao fampanantenana koa hatramin’ny taranako mbola any aoriana lavitra any; ary dia noheverinao ho olona ambony saranga aho. Ry TOMPO Andriamanitro ô, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'inona no mbola azoko lazaina aminao momba ny voninahitra nomenao ahy satria Ianao no mahalala ahy mpanomponao? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'TOMPO ô, noho ny amiko mpanomponao sy araka ny sitraponao no nanaovanao izao asa lehibe manontolo izao mba hampahalalanao ny zava-dehibe rehetra vitanao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'TOMPO ô, tsy misy tahaka Anao, ary tsy misy Andriamanitra afa-tsy Ianao, araka izay rehetra ren’ny sofinay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary iza moa no firenena hafa eto ambonin’ny tany tahaka ny Israely vahoakanao, ka nandehananao Andriamanitra mba havotanao ho vahoakanao? Eny, nampalaza Anao ireo zava-mahagaga sy mahatahotra vitanao mba handroahanao ny firenena hafa tsy ho eo anatrehan’ny vahoakanao izay navotanao avy tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny Israely vahoakanao dia nataonao ho vahoakanao mandrakizay; ary Ianao kosa, TOMPO ô, no efa tonga Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ankehitriny, ry TOMPO, ny fampanantenana nolazainao momba ahy sy ny taranako dia aoka ho tanteraka hatrany hatrany, ka ataovy araka izay efa nampanantenainao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Eny, aoka ho tanteraka izany, dia halaza mandrakizay ny anaranao, ka hatao hoe: «Ny TOMPOn’izao rehetra izao no Andriamanitra ho an’i Israely!»; ary aoka ny taranako haharitra tsy azo hozongozonina eo anatrehanao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Satria Ianao, Andriamanitro ô, efa nanambara tamiko fa hanome taranaka ho ahy; koa izany no maha eto ahy mba hivavaka manatrika anao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'TOMPO ô, Ianao mihitsy no Andriamanitra, ary izaho mpanomponao no efa nampanantenainao izany zava-tsoa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa dia ho sitrakao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hitahy
  - type: text
    text: ' ireo taranako mba hitohy mandrakizay eo anatrehanao; satria raha Ianao no mitahy, TOMPO ô, dia ho voatahy mandrakizay izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria raha... izy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: satria Ianao no mitahy azy, Tompo ô, dia ho voatahy mandrakizay ny mpanjaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: satria Ianao no mitahy, Tompo ô, ka hankalazaina mandrakizay anie Ianao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '!'
    marker-yv: yv-n
  - type: text
    text: .
