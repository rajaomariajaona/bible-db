  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nambaran’i Natàna tamin’i Davida avokoa izay rehetra nolazain’Andriamanitra azy nandritra io fahitana io.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavak’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Sam 7.18-29)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nankeo anatrehan’ny TOMPO tao an-tranolay i Davida mpanjaka, ka nipetraka sady nivavaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry TOMPO Andriamanitro ô, mba iza moa aho; ary mba inona ny fianakaviako no tonganao amin’ny toerana misy ahy izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: bd
