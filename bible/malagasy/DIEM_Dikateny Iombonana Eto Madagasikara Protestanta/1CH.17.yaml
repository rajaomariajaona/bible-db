          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: satria Ianao no mitahy azy, Tompo ô, dia ho voatahy mandrakizay ny mpanjaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: satria Ianao no mitahy, Tompo ô, ka hankalazaina mandrakizay anie Ianao
      - type: usfm
