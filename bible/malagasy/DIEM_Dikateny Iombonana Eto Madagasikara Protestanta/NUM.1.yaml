document_id: NUM.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I ISRAELY TAO AN’EFITR’I SINAY
  - type: heading
    content: Fanisana voalohany ny fokon’i Israely
  - type: text
    content: 'Izao no nolazain’ny TOMPO tamin’i Mosesy tany an-taniefitr’i Sinay, tao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', ny andro voalohan’ny volana faharoa tamin’ny taona faharoa nialan’ny Israelita tany Ejipta:'
  '10':
  - type: text
    content: i Elisamà zanak’i Hamihoda no avy amin’ny fokon’i Efraîma zanak’i Jôsefa;
  - type: text
    content: i Gamaliela zanak’i Pedahatsoro no avy amin’ny fokon’i Manase zanak’i Jôsefa;
  '11':
  - type: text
    content: I Abidàha zanak’i Gidehônỳ no avy amin’ny fokon’i Benjamîna;
  '12':
  - type: text
    content: i Ahihezera zanak’i Hamisaday no avy amin’ny fokon’i Dana;
  '13':
  - type: text
    content: i Pagihiela zanak’i Hôkrana no avy amin’ny fokon’i Asera;
  '14':
  - type: text
    content: i Eliasafa zanak’i Dehoela no avy amin’ny fokon’i Gada;
  '15':
  - type: text
    content: Ahira zanak’i Henàna no avy amin’ny fokon’i Naftalỳ.
  '16':
  - type: text
    content: 'Ireo no filoham-pianakaviana voafidin’ny fiangonana sady filohan’ny miaramilan’i Israely ihany koa. '
  '17':
  - type: text
    content: 'Nalain’i Mosesy sy i Aharôna ho lefiny ireo olona voatonona anarana ireo, '
  '18':
  - type: text
    content: ka novoriny ny fiangonana manontolo tamin’ny andro voalohan’ny volana faharoa, dia nosoratany ny anaran’ny lehilahy israelita rehetra feno roapolo taona no ho miakatra araka ny fianakaviany sy ny fokony avy
  - type: note
    content: Ny lisitra ara-pirazanana toy izao no porofo maha anisan’ny vahoakan’Andriamanitra; jereo Hez 2.61-63.
  - type: text
    content: ', '
  '19':
  - type: text
    content: mifanaraka amin’ny nandidian’ny TOMPO an’i Mosesy. Tao an-taniefitr’i Sinay no nanaovany ny fanisana.
  '2':
  - type: text
    content: –Ataovy ny fanisana
  - type: note
    content: 'fanisana: jereo 26.1-51.'
  - type: text
    content: ' ny fiangonan’ny Israelita rehetra araka ny fokony sy ny fianakaviany avy, ka raiso tsirairay ny anaran’ny lehilahy rehetra, '
  '20':
  - type: text
    content: 'Ny isam-pokon’i Israely no nanaovam-panisana araka ny tarika sy ny fianakaviany avy, ka nanoratana ny anaran’ny lehilahy rehetra feno roapolo taona no ho miakatra ka mahatam-piadiana. Natomboka tamin’ny fokon’i Reobena lahimatoan’i Jakôba izany. Toy izao manaraka izao ny isa azo:'
  - type: note
    content: Toy izay hoe 46 500 na 59 300 sns..., dia toa ny hoe andiany 46 misy vatan-dehilahy 500 na andiany 59 misy vatan-dehilahy 300 sns... no mitombina kokoa.
  - type: text
    content: 'Ny fokon’i Reobena:'
  - type: text
    content: 46 500
  - type: text
    content: 'Ny fokon’i Simehôna:'
  - type: text
    content: 59 300
  - type: text
    content: 'Ny fokon’i Gada:'
  - type: text
    content: 45 650
  - type: text
    content: 'Ny fokon’i Joda:'
  - type: text
    content: 74 600
  - type: text
    content: 'Ny fokon’i Jisakara:'
  - type: text
    content: 54 400
  - type: text
    content: 'Ny fokon’i Zebolòna:'
  - type: text
    content: 57 400
  - type: text
    content: 'Ny fokon’i Efraîma zanakalahin’i Jôsefa:'
  - type: text
    content: 40 500
  - type: text
    content: 'Ny fokon’i Manase zanakalahin’i Jôsefa:'
  - type: text
    content: 32 200
  - type: text
    content: 'Ny fokon’i Benjamîna:'
  - type: text
