      - type: text
        text: andiany 598 misy vatan-dehilahy 5 550
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jereo koa 2.32; 11.21.
    marker-yv: yv-n
  - type: text
    text: ' no fitambarany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andraikitra manokana nosahanin’ny fokon’i Levỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Fa tsy mba natao fanisana niaraka tamin’ny Israelita hafa ny Levita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny taranak’i Levỳ izay tsy mba nanao miaramila dia hoisaina manokana, jereo toko faha-3 sy 4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Hoy manko ny TOMPO tamin’i Mosesy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: '«Aza isaina ny fokon’i Levỳ, ary aza anaovana fanisana miaraka amin’ny Israelita hafa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa ampiandraiketo azy kosa ny fitandremana ny Fonena-masina izay nametrahana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny fanekempihavanana
  - type: text
    text: ' ary koa ny fanaka sy ny kojakoja rehetra momba azy. Ireo no hitondra ny Fonena-masina mbamin’ny fanaka rehetra momba azy sy hanao fanompoam-pivavahana ao aminy ary hitoby manodidina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Rehefa hiainga kosa ny Fonena-masina, dia ny Levita no hangorona azy; ary rehefa hijanona ny Fonena-masina, dia ny Levita no hanangana azy. Fa izay olon-kafa mitady hanatona eo dia hatao maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ny Israelita dia samy hitoby eo amin’ny tobiny avy sy eo akaikin’ny vondron-tafiny avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Fa ny Levita kosa dia hitoby manodidina ny Fonena-masina mba tsy hirehitra amin’ny fiangonan’ny Israelita ny fahatezerako.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Notanterahin’ny Israelita avokoa izany, araka izay efa nandidian’ny TOMPO an’i Mosesy.
