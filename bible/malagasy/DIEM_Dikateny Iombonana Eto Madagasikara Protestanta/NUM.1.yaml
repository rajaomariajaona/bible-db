  - type: text
    text: I ISRAELY TAO AN’EFITR’I SINAY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanisana voalohany ny fokon’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no nolazain’ny TOMPO tamin’i Mosesy tany an-taniefitr’i Sinay, tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ', ny andro voalohan’ny volana faharoa tamin’ny taona faharoa nialan’ny Israelita tany Ejipta:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Ataovy ny fanisana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanisana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 26.1-51.
    marker-yv: yv-n
  - type: text
    text: ' ny fiangonan’ny Israelita rehetra araka ny fokony sy ny fianakaviany avy, ka raiso tsirairay ny anaran’ny lehilahy rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia izay vatan-dehilahy feno roapolo taona no ho miakatra ka mahatam-piadiana. Ianao sy i Aharôna no hanisa ireo araka ny tafika misy azy avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aoka hisy lehilahy anankiray isam-poko, dia lehilahy izay tokony ho filoham-pianakaviana, mba hanampy anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ireto avy ny anaran’ireo lehilahy hanampy anareo:'
- type: usfm
  marker: p
  children:
  - type: text
    text: i Elitsora zanak’i Sedeòra no avy amin’ny fokon’i Reobena;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: i Selomiela zanak’i Tsorisaday no avy amin’ny fokon’i Simehôna;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: i Nahasôna zanak’i Haminadaba no avy amin’ny fokon’i Joda;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: i Natanaela zanak’i Tsohara no avy amin’ny fokon’i Jisakara;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I Eliaba zanak’i Helôna no avy amin’ny fokon’i Zebolòna;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: i Elisamà zanak’i Hamihoda no avy amin’ny fokon’i Efraîma zanak’i Jôsefa;
- type: usfm
  marker: p
  children:
  - type: text
    text: i Gamaliela zanak’i Pedahatsoro no avy amin’ny fokon’i Manase zanak’i Jôsefa;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I Abidàha zanak’i Gidehônỳ no avy amin’ny fokon’i Benjamîna;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: i Ahihezera zanak’i Hamisaday no avy amin’ny fokon’i Dana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: i Pagihiela zanak’i Hôkrana no avy amin’ny fokon’i Asera;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: i Eliasafa zanak’i Dehoela no avy amin’ny fokon’i Gada;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ahira zanak’i Henàna no avy amin’ny fokon’i Naftalỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ireo no filoham-pianakaviana voafidin’ny fiangonana sady filohan’ny miaramilan’i Israely ihany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nalain’i Mosesy sy i Aharôna ho lefiny ireo olona voatonona anarana ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ka novoriny ny fiangonana manontolo tamin’ny andro voalohan’ny volana faharoa, dia nosoratany ny anaran’ny lehilahy israelita rehetra feno roapolo taona no ho miakatra araka ny fianakaviany sy ny fokony avy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny lisitra ara-pirazanana toy izao no porofo maha anisan’ny vahoakan’Andriamanitra; jereo Hez 2.61-63.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: mifanaraka amin’ny nandidian’ny TOMPO an’i Mosesy. Tao an-taniefitr’i Sinay no nanaovany ny fanisana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-43
  - type: text
    text: 'Ny isam-pokon’i Israely no nanaovam-panisana araka ny tarika sy ny fianakaviany avy, ka nanoratana ny anaran’ny lehilahy rehetra feno roapolo taona no ho miakatra ka mahatam-piadiana. Natomboka tamin’ny fokon’i Reobena lahimatoan’i Jakôba izany. Toy izao manaraka izao ny isa azo:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Toy izay hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 46 500
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 59 300
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sns..., dia toa ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: andiany 46 misy vatan-dehilahy 500
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: andiany 59 misy vatan-dehilahy 300
    - type: usfm
