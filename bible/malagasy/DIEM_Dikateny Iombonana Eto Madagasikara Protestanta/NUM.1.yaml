    marker-yv: yv-n
- type: text
  text: Ny fokon’i Reobena:46 500Ny fokon’i Simehôna:59 300Ny fokon’i Gada:45 650Ny fokon’i Joda:74 600Ny fokon’i Jisakara:54 400Ny fokon’i Zebolòna:57 400Ny fokon’i Efraîma zanakalahin’i Jôsefa:40 500Ny fokon’i Manase zanakalahin’i Jôsefa:32 200Ny fokon’i Benjamîna:35 400Ny fokon’i Dana:62 700Ny fokon’i Asera:41 500Ny fokon’i Naftalỳ:53 400
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ireo no vokatry ny fanisam-bahoaka izay nataon’i Mosesy sy i Aharôna ary izy roambinifolo lahy filoham-pianakaviana solotenan’ny fokony avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ka ny lehilahy israelita voaisa, feno roapolo taona no ho miakatra ka mahatam-piadiana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: dia 603 550
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Raha arahina ny naoty etsy aloha, dia tsy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 603 550
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fa '
    - type: usfm
