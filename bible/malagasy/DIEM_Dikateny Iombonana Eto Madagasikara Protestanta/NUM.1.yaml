  - type: text
    content: 53 400
  '3':
  - type: text
    content: 'dia izay vatan-dehilahy feno roapolo taona no ho miakatra ka mahatam-piadiana. Ianao sy i Aharôna no hanisa ireo araka ny tafika misy azy avy. '
  '4':
  - type: text
    content: 'Aoka hisy lehilahy anankiray isam-poko, dia lehilahy izay tokony ho filoham-pianakaviana, mba hanampy anareo. '
  '44':
  - type: text
    content: 'Ireo no vokatry ny fanisam-bahoaka izay nataon’i Mosesy sy i Aharôna ary izy roambinifolo lahy filoham-pianakaviana solotenan’ny fokony avy. '
  '45':
  - type: text
    content: 'Ka ny lehilahy israelita voaisa, feno roapolo taona no ho miakatra ka mahatam-piadiana, '
  '46':
  - type: text
    content: dia 603 550
  - type: note
    content: Raha arahina ny naoty etsy aloha, dia tsy hoe 603 550 fa andiany 598 misy vatan-dehilahy 5 550. Jereo koa 2.32; 11.21.
  - type: text
    content: ' no fitambarany.'
  - type: heading
    content: Ny andraikitra manokana nosahanin’ny fokon’i Levỳ
  '47':
  - type: text
    content: Fa tsy mba natao fanisana niaraka tamin’ny Israelita hafa ny Levita
  - type: note
    content: Ny taranak’i Levỳ izay tsy mba nanao miaramila dia hoisaina manokana, jereo toko faha-3 sy 4.
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Hoy manko ny TOMPO tamin’i Mosesy: '
  '49':
  - type: text
    content: '«Aza isaina ny fokon’i Levỳ, ary aza anaovana fanisana miaraka amin’ny Israelita hafa izy. '
  '5':
  - type: text
    content: 'Ireto avy ny anaran’ireo lehilahy hanampy anareo:'
  - type: text
    content: i Elitsora zanak’i Sedeòra no avy amin’ny fokon’i Reobena;
  '50':
  - type: text
    content: 'Fa ampiandraiketo azy kosa ny fitandremana ny Fonena-masina izay nametrahana ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: ' ary koa ny fanaka sy ny kojakoja rehetra momba azy. Ireo no hitondra ny Fonena-masina mbamin’ny fanaka rehetra momba azy sy hanao fanompoam-pivavahana ao aminy ary hitoby manodidina azy. '
  '51':
  - type: text
    content: 'Rehefa hiainga kosa ny Fonena-masina, dia ny Levita no hangorona azy; ary rehefa hijanona ny Fonena-masina, dia ny Levita no hanangana azy. Fa izay olon-kafa mitady hanatona eo dia hatao maty. '
  '52':
  - type: text
    content: 'Ny Israelita dia samy hitoby eo amin’ny tobiny avy sy eo akaikin’ny vondron-tafiny avy. '
  '53':
  - type: text
    content: Fa ny Levita kosa dia hitoby manodidina ny Fonena-masina mba tsy hirehitra amin’ny fiangonan’ny Israelita ny fahatezerako.»
  '54':
  - type: text
    content: Notanterahin’ny Israelita avokoa izany, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '6':
  - type: text
    content: i Selomiela zanak’i Tsorisaday no avy amin’ny fokon’i Simehôna;
  '7':
  - type: text
    content: i Nahasôna zanak’i Haminadaba no avy amin’ny fokon’i Joda;
  '8':
  - type: text
    content: i Natanaela zanak’i Tsohara no avy amin’ny fokon’i Jisakara;
  '9':
  - type: text
    content: I Eliaba zanak’i Helôna no avy amin’ny fokon’i Zebolòna;
