document_id: ISA.36,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandrahona an’i Jerosalema ny mpanjakan’i Asiria
  - type: heading
    content: (Jereo 2 Mp 18.13, 17-37)
  - type: text
    content: Tamin’ny taona faha-14 nanjakàn’i Hezekià no nahatongavan’i Saneheriba mpanjakan’i Asiria hanafika ny tanànamimanda rehetra tany Joda ka nahazoany ireny
  - type: note
    content: Ny fanafihan’ny Asirianina ny fanjakan’i Joda dia tamin’ny taona 701 tal J.K.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ary ankehitriny, moa hamely sy handrava ity tany ity ve ilay mpanjaka tompoiko raha tsy sitraky ny TOMPO izany? Tsia, fa ny TOMPO mihitsy no nanome baiko azy hamely sy handrava ity tany ity
  - type: note
    content: Jereo 7.20; 10.5-6.
  - type: text
    content: .»
  '11':
  - type: text
    content: 'Dia hoy i Eliakima dekà tamin’ilay asirianina: «Mba teny aramianina re atao aminay'
  - type: note
    content: Jereo 2 Mp 18.26 sy nta.
  - type: text
    content: ', satria azonay ihany izany; fa aza itenenana hebreo izahay noho ny amin’ireo olona eny ambony manda mihaino antsika.»'
  '12':
  - type: text
    content: 'Fa hoy ny navalin’ilay dekà hoe: «Moa ho an’ny tomponao sy ho anao ihany va no nanirahan’ny tompoko ahy hilaza izany teny izany fa tsy ho an’ny olona izay mipetraka eny ambony manda koa? Fa ho voatery tahaka anareo izy hihinana ny dikiny sy hisotro ny fivalanandranony'
  - type: note
    content: Jereo 2 Mp 18.27 sy nta.
  - type: text
    content: '.» '
  '13':
  - type: text
    content: 'Dia nijaridina ilay dekà, ka nihiaka mafy tamin’ny teny hebreo hoe: «Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria, '
  '14':
  - type: text
    content: 'fa izao no lazainy: ‹Aza mety hofitahin’i Hezekià ianareo, fa tsy afaka hamonjy anareo izy tsy akory. '
  '15':
  - type: text
    content: 'Ary aza mety hotarihiny hitoky amin’ny TOMPO raha ilazany fa ny TOMPO no hamonjy anareo ka hisakana ahy tsy haka ity tanàna ity. '
  '16':
  - type: text
    content: 'Aza mihaino an’i Hezekià ianareo, fa izaho mpanjakan’i Asiria kosa miteny aminareo hoe: Manaova fanekempihavanana amiko ianareo ary samia mibaboka atỳ amiko; dia samy hihinana ny voalobony sy ny aviaviny ary samy hisotro ny rano avy ao amin’ny lava-pantsakany avy, '
  '17':
  - type: text
    content: 'Ho avy aho atsy ho atsy hitondra anareo ho any amin’ny tany tahaka ny anareo, dia tany be varim-bazaha hanaova-mofo sy tany be voaloboka hanaovan-divay. '
  '18':
  - type: text
    content: 'Koa aza mety ho voafitak’i Hezekià fotsiny ianareo amin’ny hoe hamonjy anareo ny TOMPO. Moa nahavonjy ny taniny tamin’ny tanako ve ireo andriamanitry ny firenen-kafa? '
  '19':
  - type: text
    content: Aiza ny andriamanitr’i Hamata sy i Arpada? Aiza ny andriamanitr’i Sefarvaîma? Moa nisy nahavonjy an’i Samaria tamin’ny tanako va ireo andriamaniny
  - type: note
    content: 'Hamata, Arpada... Samaria: jereo ao amin’ny 2 Mp 17.24 ny lisitra anankiray somary hafa kely momba ireo tanàna azon’i Saneheriba.'
  - type: text
    content: '? '
  '2':
  - type: text
    content: Ary ny mpanjakan’i Asiria izay tao Lakisy, dia naniraka ny dekàny notronin’ny miaramila marobe hankany amin’i Hezekià mpanjaka, any Jerosalema. Nijanona takaikin’ny lakan-drano mankany amin’ny dobo ambony ilay iraka, teo amin’ny lalana mankamin’ny sahan’ny Mpanasa lamba
  - type: note
    content: 'Lakisy: jereo 2 Mp 14.19 sy nta. –dobo ambony, sahan’ny Mpanasa lamba : jereo Is 7.3; 2 Mp 18.17 sy nta.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: Tsy nisy tamin’ny andriamanitr’ireo tany ireo nahavonjy ny taniny tsy ho azon’ny tanako, koa ahoana no hahafahan’ny TOMPO hamonjy an’i Jerosalema tsy ho azon’ny tanako?› »
  '21':
  - type: text
    content: 'Fa nangina ny olona izay teo ka tsy nisy namaly an’ilay lehiben’ny toby asirianina akory na dia teny indraim-bava aza, satria izany no baikon’i Hezekià mpanjaka. '
  '22':
  - type: text
    content: 'Ary i Eliakima zanakalahin’i Hilkià sady lehiben’ny lapa sy i Sebnà mpitantsoratra ary i Jôà zanakalahin’i Asafa sady mpitondratenin’ny mpanjaka dia niverina nankany amin’i Hezekià, rehefa avy '
  - type: text
    content: nandriatra fitafiana
  - type: text
    content: ', ka nitatitra taminy ny tenin’ilay lehiben’ny toby asirianina.'
  '3':
  - type: text
    content: 'Dia i Eliakima, zanakalahin’i Hilkià sady mpiandraikitra ny lapa, no niainga hitsena azy niaraka tamin’i Sebnà mpitantsoratra ary i Jôà, zanakalahin’i Asafa sady mpitondratenin’ny mpanjaka. '
  '4':
  - type: text
    content: 'Dia hoy ilay dekà tamin’izy telo lahy: «Ndeha lazaonareo amin’i Hezekià ny hafatry ny mpanjaka lehibe, dia ny mpanjakan’i Asiria, manao hoe:'
  - type: text
    content: '–Mba inona moa izao toky ianteheranao izao? '
  '5':
  - type: text
    content: Noheveriko
  - type: note
    content: 'Noheveriko: misy stf sasany manao hoe heverinao; ampit 2 Mp 18.20.'
  - type: text
    content: ' fa vitan’ny kobaka am-bava ny anao ny tetika sy herim-po hoenti-miady! Koa iza no itokianao mba sahy mikomy amiko izato ianao? '
  '6':
  - type: text
    content: I Ejipta ve? Io volotara vaky manindrona sy mandrobaka ny tanan’izay mitehina aminy io ve
  - type: note
    content: Ampit Ezek 29.6-7.
  - type: text
    content: '? Fa toy izany ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta amin’izay rehetra matoky azy. '
  '7':
  - type: text
    content: 'Angamba ianao hamaly ahy fa ny TOMPO Andriamanitrareo no itokianareo. Kanefa dia ianao indrindra, ry Hezekià, no nanafoana ny '
  - type: text
    content: toeram-pisoronana
  - type: text
    content: ' aman’'
  - type: text
    content: alitarany
  - type: text
    content: ' ka nandidy ny mponin’i Joda sy Jerosalema mba tsy hiankohoka afa-tsy eo anoloan’ny alitaran’i Jerosalema ihany?»'
  '8':
  - type: text
    content: '«Koa aoka hifanamby amin’ny andriamanjakan’i Asiria izay tompoiko ianao, fa homeko soavaly roa arivo ianao raha manana olona afaka hitaingina ireo. '
  '9':
  - type: text
    content: 'Hataonao ahoana moa no hampandositra ny komandy anankiray amin’ireo manamboninahitry ny tompoko ireo, na dia izay bitika indrindra aza, raha tàhiny ka i Ejipta no itokianao hahazoana kalesy sy mpitaingin-tsoavaly? '
