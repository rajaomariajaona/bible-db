document_id: ISA.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandrahona an’i Jerosalema ny mpanjakan’i Asiria
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 18.13, 17-37)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona faha-14 nanjakàn’i Hezekià no nahatongavan’i Saneheriba mpanjakan’i Asiria hanafika ny tanànamimanda rehetra tany Joda ka nahazoany ireny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fanafihan’ny Asirianina ny fanjakan’i Joda dia tamin’ny taona 701 tal J.K.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ny mpanjakan’i Asiria izay tao Lakisy, dia naniraka ny dekàny notronin’ny miaramila marobe hankany amin’i Hezekià mpanjaka, any Jerosalema. Nijanona takaikin’ny lakan-drano mankany amin’ny dobo ambony ilay iraka, teo amin’ny lalana mankamin’ny sahan’ny Mpanasa lamba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lakisy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Mp 14.19 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dobo ambony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: sahan’ny Mpanasa lamba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Is 7.3; 2 Mp 18.17 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia i Eliakima, zanakalahin’i Hilkià sady mpiandraikitra ny lapa, no niainga hitsena azy niaraka tamin’i Sebnà mpitantsoratra ary i Jôà, zanakalahin’i Asafa sady mpitondratenin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ilay dekà tamin’izy telo lahy: «Ndeha lazaonareo amin’i Hezekià ny hafatry ny mpanjaka lehibe, dia ny mpanjakan’i Asiria, manao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mba inona moa izao toky ianteheranao izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noheveriko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Noheveriko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: heverinao;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit 2 Mp 18.20.'
    marker-yv: yv-n
  - type: text
    text: ' fa vitan’ny kobaka am-bava ny anao ny tetika sy herim-po hoenti-miady! Koa iza no itokianao mba sahy mikomy amiko izato ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I Ejipta ve? Io volotara vaky manindrona sy mandrobaka ny tanan’izay mitehina aminy io ve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ezek 29.6-7.
    marker-yv: yv-n
  - type: text
    text: '? Fa toy izany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' mpanjakan’i Ejipta amin’izay rehetra matoky azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Angamba ianao hamaly ahy fa ny TOMPO Andriamanitrareo no itokianareo. Kanefa dia ianao indrindra, ry Hezekià, no nanafoana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-pisoronana
  - type: text
    text: ' aman’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitarany
  - type: text
    text: ' ka nandidy ny mponin’i Joda sy Jerosalema mba tsy hiankohoka afa-tsy eo anoloan’ny alitaran’i Jerosalema ihany?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Koa aoka hifanamby amin’ny andriamanjakan’i Asiria izay tompoiko ianao, fa homeko soavaly roa arivo ianao raha manana olona afaka hitaingina ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hataonao ahoana moa no hampandositra ny komandy anankiray amin’ireo manamboninahitry ny tompoko ireo, na dia izay bitika indrindra aza, raha tàhiny ka i Ejipta no itokianao hahazoana kalesy sy mpitaingin-tsoavaly? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ankehitriny, moa hamely sy handrava ity tany ity ve ilay mpanjaka tompoiko raha tsy sitraky ny TOMPO izany? Tsia, fa ny TOMPO mihitsy no nanome baiko azy hamely sy handrava ity tany ity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 7.20; 10.5-6.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy i Eliakima dekà tamin’ilay asirianina: «Mba teny aramianina re atao aminay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 18.26 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', satria azonay ihany izany; fa aza itenenana hebreo izahay noho ny amin’ireo olona eny ambony manda mihaino antsika.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hoy ny navalin’ilay dekà hoe: «Moa ho an’ny tomponao sy ho anao ihany va no nanirahan’ny tompoko ahy hilaza izany teny izany fa tsy ho an’ny olona izay mipetraka eny ambony manda koa? Fa ho voatery tahaka anareo izy hihinana ny dikiny sy hisotro ny fivalanandranony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 18.27 sy nta.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nijaridina ilay dekà, ka nihiaka mafy tamin’ny teny hebreo hoe: «Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asiria, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa izao no lazainy: ‹Aza mety hofitahin’i Hezekià ianareo, fa tsy afaka hamonjy anareo izy tsy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary aza mety hotarihiny hitoky amin’ny TOMPO raha ilazany fa ny TOMPO no hamonjy anareo ka hisakana ahy tsy haka ity tanàna ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza mihaino an’i Hezekià ianareo, fa izaho mpanjakan’i Asiria kosa miteny aminareo hoe: Manaova fanekempihavanana amiko ianareo ary samia mibaboka atỳ amiko; dia samy hihinana ny voalobony sy ny aviaviny ary samy hisotro ny rano avy ao amin’ny lava-pantsakany avy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ho avy aho atsy ho atsy hitondra anareo ho any amin’ny tany tahaka ny anareo, dia tany be varim-bazaha hanaova-mofo sy tany be voaloboka hanaovan-divay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa aza mety ho voafitak’i Hezekià fotsiny ianareo amin’ny hoe hamonjy anareo ny TOMPO. Moa nahavonjy ny taniny tamin’ny tanako ve ireo andriamanitry ny firenen-kafa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aiza ny andriamanitr’i Hamata sy i Arpada? Aiza ny andriamanitr’i Sefarvaîma? Moa nisy nahavonjy an’i Samaria tamin’ny tanako va ireo andriamaniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hamata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Arpada... Samaria:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ao amin’ny 2 Mp 17.24 ny lisitra anankiray somary hafa kely momba ireo tanàna azon’i Saneheriba.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy nisy tamin’ny andriamanitr’ireo tany ireo nahavonjy ny taniny tsy ho azon’ny tanako, koa ahoana no hahafahan’ny TOMPO hamonjy an’i Jerosalema tsy ho azon’ny tanako?› »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa nangina ny olona izay teo ka tsy nisy namaly an’ilay lehiben’ny toby asirianina akory na dia teny indraim-bava aza, satria izany no baikon’i Hezekià mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary i Eliakima zanakalahin’i Hilkià sady lehiben’ny lapa sy i Sebnà mpitantsoratra ary i Jôà zanakalahin’i Asafa sady mpitondratenin’ny mpanjaka dia niverina nankany amin’i Hezekià, rehefa avy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra fitafiana
  - type: text
    text: ', ka nitatitra taminy ny tenin’ilay lehiben’ny toby asirianina.'
