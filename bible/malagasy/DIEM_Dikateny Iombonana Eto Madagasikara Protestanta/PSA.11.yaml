    - type: text
      text: Tao amin’ny tahirin-kiran’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Ny TOMPO no fialofako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ahoana àry no ilazanareo amiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mandosira any an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fanaon’ny voronkely ianao?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Jereo ny olon-dratsy fa manenjana tsipîka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manandrify zana-tsipîka amin’ny tady
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitifitra ao amin’ny maizina ny mahitsy fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Rehefa potika ny fanorenan’ny fiaraha-monina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: inona indray moa no azon’ny olo-marina atao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '–Ny TOMPO anefa dia ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tempoliny
  - type: text
    text: ' masina'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady eo an-tsezafiandrianany any an-danitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arahiny maso ny olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka indray mijery dia voatombany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voatomban’ny TOMPO tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olo-marina sy ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hàlany ireto mpankamamy herisetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ho vainafo sy solifara
- type: usfm
  marker: q1
  children:
  - type: text
    text: no halatsany toa ranonorana
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo an-dohan’ireo olon-dratsy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tafio-drivotra mahamay
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anjara homeny azy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eny, marina ny TOMPO ka tia fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mahitsy fo no hifanatri-tava aminy.
