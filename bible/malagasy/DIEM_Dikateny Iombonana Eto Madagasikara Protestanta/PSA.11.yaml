document_id: PSA.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tompo no fialofana
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: –Ny TOMPO no fialofako.
  - type: text
    content: 'Ahoana àry no ilazanareo amiko hoe:'
  - type: text
    content: «Mandosira any an-tendrombohitra
  - type: text
    content: toy ny fanaon’ny voronkely ianao?»
  '2':
  - type: text
    content: –Jereo ny olon-dratsy fa manenjana tsipîka
  - type: text
    content: sy manandrify zana-tsipîka amin’ny tady
  - type: text
    content: mba hitifitra ao amin’ny maizina ny mahitsy fo.
  '3':
  - type: text
    content: Rehefa potika ny fanorenan’ny fiaraha-monina,
  - type: text
    content: inona indray moa no azon’ny olo-marina atao?
  '4':
  - type: text
    content: '–Ny TOMPO anefa dia ao amin’ny '
  - type: text
    content: Tempoliny
  - type: text
    content: ' masina'
  - type: text
    content: sady eo an-tsezafiandrianany any an-danitra.
  - type: text
    content: Arahiny maso ny olombelona
  - type: text
    content: ka indray mijery dia voatombany.
  '5':
  - type: text
    content: Voatomban’ny TOMPO tokoa
  - type: text
    content: ny olo-marina sy ny olon-dratsy
  - type: text
    content: ka hàlany ireto mpankamamy herisetra.
  '6':
  - type: text
    content: Aoka ho vainafo sy solifara
  - type: text
    content: no halatsany toa ranonorana
  - type: text
    content: eo an-dohan’ireo olon-dratsy!
  - type: text
    content: Dia tafio-drivotra mahamay
  - type: text
    content: no anjara homeny azy ireo.
  '7':
  - type: text
    content: Eny, marina ny TOMPO ka tia fahamarinana;
  - type: text
    content: ary ny mahitsy fo no hifanatri-tava aminy.
