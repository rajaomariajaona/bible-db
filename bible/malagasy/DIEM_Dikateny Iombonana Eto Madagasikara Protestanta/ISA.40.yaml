document_id: ISA.40,396
type_code: plt
verses:
  '1':
  - type: heading
    content: FIZARÀNA FAHAROA
  - type: heading
    content: Ny fampiononana an’i Israely
  - type: heading
    content: Ampaherezo ny vahoakako
  - type: text
    content: Ampaherezo, ampaherezo ny vahoakako,
  - type: text
    content: hoy ilay Andriamanitrareo
  - type: note
    content: Ny mpaminany no miteny eto, ka manainga ireo namany na ireo mpianany.
  - type: text
    content: .
  '10':
  - type: text
    content: Indro ny Tompo ANDRIANANAHARY tonga amin-kery
  - type: text
    content: sady manana ny fahefana hanjaka.
  - type: text
    content: Ny vahoaka, hoentiny miaraka aminy, no ho karamany
  - type: text
    content: sady eo anoloany ho valin-kasasarany
  - type: note
    content: Toa filazana ireo Jiosy voasesitany tao Babilônia izany. –Momba ny faran’ity and ity, dia jereo 62.11; Apôk 22.12.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Tahaka ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry'
  - type: text
    content: miandry ny andian’ondriny Izy
  - type: text
    content: ka manangona ireny amin’ny baikon-tanany;
  - type: text
    content: trotroiny eo an-tratrany ny zanak’ondry
  - type: text
    content: ary roahiny miadana ny ampianahany
  - type: note
    content: Ampit Ezek 34.15; Jôh 10.11.
  - type: text
    content: .»
  - type: heading
    content: Lehibe sy hendry ilay Tompon’izao rehetra izao
  '12':
  - type: text
    content: Iza no nahafatra ny ranomasina teo am-pelatanany
  - type: text
    content: na naharefy ny lanitra tamin’ny irain-jehiny?
  - type: text
    content: Iza no nahangona ny vovotany
  - type: text
    content: tamin’ny vata famarana tokana
  - type: text
    content: ary nandanja ny tendrombohitra sy ny havoana
  - type: text
    content: tamin’ny mizana anankiray monja?
  '13':
  - type: text
    content: Iza no naharefy ny Fanahin’ny TOMPO,
  - type: text
    content: iza no nahatakatra ny fikasany
  - type: note
    content: Ampit Rm 11.34; 1Kôr 2.16; jereo 46.11.
  - type: text
    content: '?'
  '14':
  - type: text
    content: Iza no nakany hevitra ka nampatsilo Azy
  - type: text
    content: na nampianatra Azy ny fahaiza-mitsara,
  - type: text
    content: sy nanoro Azy ny fahalalana
  - type: text
    content: ary nampahafantatra Azy ny fahaiza-manavaka?
  '15':
  - type: text
    content: Eo anatrehan’ny TOMPO, indreo ny firenena
  - type: text
    content: fa toy ny rano indray mitete avy amin’ny siny,
  - type: text
    content: na toy ny fasika madinika iray eo ambony mizana;
  - type: text
    content: ary indreo ny mponina any amin’ny nosy
  - type: text
    content: fa ingaina toy ny vovotany maivan-kely.
  '16':
  - type: text
    content: Ny biby fihaza ao Libano amin’ny TOMPO
  - type: text
    content: tsy ampy hatao sorona dorana manontolo;
  - type: text
    content: ary ny hazo ao anatin’ny alany
  - type: text
    content: tsy ampy hatao kitay amin’izany.
  '17':
  - type: text
    content: Toy ny tsinontsinona ny firenen-drehetra
  - type: text
    content: eo anatrehan’ny TOMPO;
  - type: text
    content: toy ny tsy misy sady zava-poana ireny aminy.
  - type: heading
    content: Tsy misy tahaka an’Andriamanitra
  '18':
  - type: text
    content: Koa ampitovînareo amin’iza moa Andriamanitra?
  - type: text
    content: Endrik’inona no ampanahafinareo Azy?
  '19':
  - type: text
    content: Raha ny sampy no tenenina
  - type: text
    content: dia mpanao taozavatra no nandrendrika azy,
  - type: text
    content: mpanefy firavaka no nandrakotra azy takela-bolamena
  - type: text
    content: ary nandrenty azy rojo volafotsy
  - type: note
    content: Ampit Asa 17.29.
  - type: text
    content: .
  '2':
  - type: text
    content: Omeo toky i Jerosalema
  - type: text
    content: ka antsoantsoy aminy
  - type: text
    content: fa tapitra ny asa an-terivozona
  - type: text
    content: sady vita ny sazy nahatra taminy;
  - type: text
    content: ary efa nandray indroa heny
  - type: note
    content: 'indroa heny: jereo Eks 22.3,6.8.'
  - type: text
    content: tamin’ny tanan’ny TOMPO izy
  - type: text
    content: ho avotry ny fahotana rehetra nataony.»
  '20':
  - type: text
    content: Ny mahantra izay tsy afaka mandany toy izany
  - type: text
    content: dia mifidy vatan-kazo tsy mety lo,
  - type: text
    content: ary mitady mpandrafitra mahay
  - type: text
    content: mba hanangana sampy tsy hihozongozona.
  '21':
  - type: text
    content: Moa tsy fantatrareo na efa renareo ve,
  - type: text
    content: moa tsy nambara taminareo
  - type: text
    content: hatrany am-piandohana ve,
  - type: text
    content: ary moa tsy noeritreretinareo ve
  - type: text
    content: ilay mpanangana ny fanorenan’ny tany?
  '22':
  - type: text
    content: Izy no mipetraka amin’ny sezafiandrianana
  - type: text
    content: eo ambonin’ny habakabaka izay andohalambon’ny tany;
  - type: text
    content: ka toy ny vitsika no fijeriny ny olona avy eny.
  - type: text
    content: Izy no nanenjana ny lanitra toy ny lambabe
  - type: text
    content: ary namelatra azy toy ny lay hitoerany.
  '23':
  - type: text
    content: Izy no mahatonga ny mpitondra ho tsinontsinona
  - type: text
    content: sy maha zava-poana ny mpifehy ny tany.
  '24':
  - type: text
    content: Vao tonga eo amin’ny toerany ireny,
  - type: text
    content: vao manomboka miely patrana,
  - type: text
    content: vao miorim-paka amin’ny tany,
  - type: text
    content: dia tsofin’ny fofonain’ny TOMPO ka mihamalazo;
  - type: text
    content: ary indreny fa voapaoka
  - type: text
    content: toy ny mololo indaosin’ny tadio.
  '25':
  - type: text
    content: «Koa hampitovînareo amin’iza Aho
  - type: text
    content: ary hoharinareo amin’iza,
  - type: text
    content: hoy ilay Andriamanitra masina?»
  '26':
  - type: text
    content: Atopazo eny an-danitra ny masonareo
  - type: text
    content: 'ka jereo: Iza no nahary ny kintana?'
  - type: text
    content: Tsy iza fa Ilay mamoaka azy isan-tokony
  - type: text
    content: toy ny andian-tafika hanao matso
  - type: text
    content: sy miantso azy rehetra amin’ny anarany avy.
  - type: text
    content: Lehibe loatra ny heriny
  - type: text
    content: ary tena hentitra ny fahefàny
  - type: text
    content: ka tsy misy mitsoaka an-daharana ireo.
  - type: heading
    content: Manavao ny herin’ny reraka ny Tompo
  '27':
  - type: text
    content: Ry vahoaka Israely, firenen’i Jakôba,
  - type: text
    content: 'nahoana ianao no miteny sy manamafy hoe:'
  - type: text
    content: «Tsy hitan’ny Tompo akory izay mahazo ahy,
  - type: text
    content: lalovan’Andriamanitra fotsiny ny zoko?»
  '28':
  - type: text
    content: Tsy fantatrao sady tsy efa renao va
  - type: text
    content: fa ny TOMPO dia Andriamanitra mandrakizay?
  - type: text
    content: Izy no namorona ny tany manontolo.
  - type: text
    content: Tsy mba reraka Izy na sasatra,
  - type: text
    content: ary tsy misy fetra ny fahalalàny.
  '29':
  - type: text
    content: Manome hery ny reraka Izy
  - type: text
    content: ary manatanjaka ny malemy.
  '3':
  - type: text
    content: 'Misy feo miantso hoe:'
  - type: text
    content: «Misavà lalana any an-taniefitra
  - type: text
    content: ho an’ny TOMPO,
  - type: text
    content: mamakia arabe any an-tany karakaina
  - type: text
    content: ho an’Andriamanitsika
  - type: note
    content: Ireo andalana ireo dia voatsiahy ao amin’ny Mt 3,3; Mk 1,3; Jôh 1,23 araka ny dkt grika tranainy.
  - type: text
    content: .
  '30':
  - type: text
    content: Ny tanora aza dia mihareraka sy mety sasatra,
  - type: text
    content: ny mahery tompon-daka aza dia mety ho solafaka.
  '31':
  - type: text
    content: Fa izay matoky ny TOMPO kosa
  - type: text
    content: dia hahazo hery vaovao hatrany,
  - type: text
    content: ka hisidina ambony toy ny voromahery.
  - type: text
    content: Hihazakazaka izy nefa tsy ho sasatra,
  - type: text
    content: handeha izy nefa tsy ho reraka.
  '4':
  - type: text
    content: Aoka hasondrotra ny lohasaha rehetra
  - type: text
    content: ary aoka haetry ny tendrombohitra
  - type: text
    content: sy ny havoana rehetra!
  - type: text
    content: Aoka hovana ho lembalemba ny tany be havoana
  - type: text
    content: ary ho saha midadasika ny tany mikitoantoana!
  '5':
  - type: text
    content: Dia hiseho ny voninahitry ny TOMPO,
  - type: text
    content: ka hiara-mahita izany ny olona rehetra.
  - type: text
    content: Fa ny vavan’ny TOMPO mihitsy no efa niteny
  - type: note
    content: 'And 3-5: jereo Lk 3,4-6.'
  - type: text
    content: .»
  '6':
  - type: text
    content: 'Misy feo manao hoe: «Miantsoa.»'
  - type: text
    content: 'fa hoy ny famaliko azy: «Inona no antso hataoko?»'
  - type: text
    content: 'Dia niteny indray izy hoe:'
  - type: text
    content: '«Izao no antso hataonao:'
  - type: text
    content: Mihelina toy ny ahitra ny olona rehetra,
  - type: text
    content: 'toy ny voninkazo eny an-tsaha ny faharetany:'
  '7':
  - type: text
    content: Mihamaina ny ahitra, mihamalazo ny voninkazo
  - type: text
    content: rehefa seranan’ny fofonain’ny TOMPO.
  - type: text
    content: –Mihelina toy ny ahitra tokoa ny olona–.
  '8':
  - type: text
    content: Eny, mihamaina ny ahitra,
  - type: text
    content: mihamalazo ny voninkazo,
  - type: text
    content: fa ny herin’ny tenin’Andriamanitsika
  - type: text
    content: no haharitra mandrakizay
  - type: note
    content: Ny and 6-8 dia voatsiahy ao amin’ny 1Pt 1,24-25 ny vontoatiny, araka ny dkt tranainy grika; ampit Jak 1.10-11.
  - type: text
    content: .»
  - type: heading
    content: Ny vaovao mahafaly hotorina
  '9':
  - type: text
    content: 'Ry vahoakan’i '
  - type: text
    content: Tsiôna
  - type: text
    content: nanankinana vaovao mahafaly ô,
  - type: text
    content: miakara eny an-tendrombohitra avo;
  - type: text
    content: ry vahoakan’i Jerosalema
  - type: text
    content: nanankinana vaovao mahafaly ô,
  - type: text
    content: ingao mafy ny feonao ka aza matahotra.
  - type: text
    content: 'Lazao amin’ireo ao tanànan’i Joda hoe:'
  - type: text
    content: «Indro Andriamanitrareo.
