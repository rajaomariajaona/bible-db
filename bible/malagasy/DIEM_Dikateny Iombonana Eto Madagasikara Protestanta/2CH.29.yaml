document_id: 2CH.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Hezekià. Ny nanadiovana ny tempoly
  - type: heading
    content: (Jereo 2 Mp 18.1-4)
  - type: text
    content: 'Feno 25 taona i Hezekià fony tonga mpanjaka; ary naharitra 29 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Abià, zanakavavin’i Zakarià. '
  '10':
  - type: text
    content: 'Koa nanapa-kevitra aho ny hanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' amin’ny TOMPO Andriamanitr’i '
  - type: text
    content: Israely
  - type: text
    content: ' mba hiala amintsika ny fahatezerany mirehitra. '
  '11':
  - type: text
    content: Ianareo kosa, manaova fanarenan-javatra ankehitriny ka aza malaina, satria ianareo no voafidin’ny TOMPO hiatrika Azy mba hanao fanompoam-pivavahana aminy sy ho mpandraharahany ary ho mpandoro vovo-javamanitra ho Azy.
  '12':
  - type: text
    content: 'Ireto avy ny levita tonga teo: tamin’ny terak’i Kehata dia i Mahata zanakalahin’i Hamasay ary i Jôela zanakalahin’i Hazarià; tamin’ny terak’i Merarỳ dia i Kisy zanakalahin’i Habdỳ ary i Hazarià zanakalahin’i Jehalaleela; tamin’ny Gersônita, dia i Jôa zanakalahin’i Zimà, ary i Hedera zanakalahin’i Jôà; '
  '13':
  - type: text
    content: 'tamin’ny terak’i Elitsafàna, dia i Simrỳ sy i Jehoela; tamin’ny terak’i Asafa, dia i Zakarià sy i Matanià; '
  '14':
  - type: text
    content: 'Tamin’ny terak’i Hemàna, dia i Jehiela sy i Simehỳ; ary tamin’ny terak’i Jedotòna, dia i Semahià sy i Hoziela. '
  '15':
  - type: text
    content: 'Dia namory ny mpiray tarika aminy avy izy ireo, ka samy nidio tena; avy eo dia niditra ny tranon’ny TOMPO mba hanadio izany, araka ny didin’ny mpanjaka mifototra amin’ny tenin’ny TOMPO. '
  '16':
  - type: text
    content: 'Ny mpisorona no niditra tao amin’ny '
  - type: text
    content: efitrano
  - type: text
    content: ' malalaka anatiny amin’ny tranon’ny Tompo mba hanadio izany ary namoaka ny fanaka maloto rehetra izay hitany tao amin’ny Toeramasin’ny TOMPO ho eo an-kianjan’ny tranon’ny TOMPO; ny levita kosa nandray ireny mba havoakany ho any amin’ny lohasahan-driaka Kidrôna. '
  '17':
  - type: text
    content: 'Tamin’ny andro voalohan’ny volana voalohany no nanombohana ny fanadiovana; ary tamin’ny andro fahavalon’io volana io no tafapaka teo amin’ny lalantsara fidirana ho ao an-tempoly izany. Valo andro koa no naharetan’ny fanadiovana ny tranon’ny TOMPO, ka andro faha-16 tamin’io volana voalohany io no vita tanteraka ny fanadiovana manontolo. '
  '18':
  - type: text
    content: 'Dia niditra tao an-tranon’i Hezekià mpanjaka ireto taranak’i Levỳ ka nanao hoe:'
  - type: text
    content: '–Efa voadionay avokoa, ry Andriamanjaka ô, ny tranon’ny TOMPO sy ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana mbamin’ny kojakoja rehetra momba azy ary ny latabatry ny mofo alahatra mbamin’ny kojakoja rehetra momba azy koa. '
  '19':
  - type: text
    content: Ary ny fanaka rehetra, izay nozimbazimbain’i Ahaza mpanjaka tamin’ny fahotana vitany nandritra ny nanjakany, dia nohavaozinay sy nodiovinay; koa indreo izy eo anoloan’ny alitaran’ny TOMPO.
  - type: heading
    content: Naverin’i Hezekià amin’ny laoniny ny fanompoam-pivavahana
  '2':
  - type: text
    content: Ary nanao izay mahitsy eo imason’ny TOMPO i Hezekià, tahaka izay rehetra nataon’i Davida razambeny.
  '20':
  - type: text
    content: Ny ampitso dia nifoha maraina koa i Hezekià mpanjaka, ka namory ny manampahefan’ny tanàna, dia niakatra ho ao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Ombilahy fito mbamin’ny ondrilahy fito sy zanak’ondry fito no nentina hatao sorona dorana manontolo, ary nisy koa osilahy fito hatao '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota ho an’ny ankohonan’ny mpanjaka sy ho an’ny vahoaka jodeanina sady hatao sorona fanadiovana ny tempoly; ka ny mpisorona, taranak’i Aharôna, no nasain’i Hezekià nanolotra ireo teo ambony '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO. '
  '22':
  - type: text
    content: 'Dia novonoina ny ombilahy, ary nalain’ny mpisorona ny ra ka nararany tamin’ny alitara; novonoina koa ny ondrilahy sy ny zanak’ondry ka samy nararaka tamin’ny alitara ny rany. '
  '23':
  - type: text
    content: 'Ary ny osilahy hatao sorona fanalana ny ota dia nentina teo anatrehan’ny mpanjaka sy ny vahoaka tafangona ka nametrahan’izy rehetra tanana; '
  '24':
  - type: text
    content: dia novonoin’ny mpisorona ireo osilahy ireo, ka ny rany no natolony teo amin’ny alitara araka ny fanao mba ho sorona famelan-keloka ho an’i Israely manontolo; fa nasain’ny mpanjaka natolotra ho an’i Israely manontolo na ny sorona dorana manontolo na ny sorona fanalana ny ota.
  '25':
  - type: text
    content: 'Ary napetraky ny mpanjaka tao an-tranon’ny TOMPO ireo '
  - type: text
    content: levita
  - type: text
    content: ' ombàn’ny kipantsona sy valiha ary lokanga, araka ny didy nataon’i Davida mpanjaka ary koa nataon’i Gada mpahitany sy i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: '; izany no didy nampitain’ny TOMPO tamin’ny alalan’ireo mpaminaniny. '
  '26':
  - type: text
    content: 'Dia naka toerana ny levita ombàn’ny zava-manenon’i Davida, ary koa ny mpisorona ombàn’ny trompetra. '
  '27':
  - type: text
    content: 'Avy eo nasain’i Hezekià natolotra teo ambony alitara ny sorona dorana manontolo; ka vantany vao natomboka izany fanoloran-tsorona izany, dia natomboka noredonina koa ny hira ho an’ny TOMPO sady narahin’ny feon-trompetra sy ny zava-manenon’i Davida mpanjakan’i Israely. '
  '28':
  - type: text
    content: 'Niankohoka avokoa ny vahoaka tafangona teo, fa ny mpihira kosa nihira hatrany ary ny mpanao mozika nitsoka trompetra, mandra-pahavitan’ny sorona dorana manontolo. '
  '29':
  - type: text
    content: 'Nony efa tapitra ny fanoloran-tsorona, dia nandohalika sy niankohoka ny mpanjaka mbamin’izay rehetra tafaraka taminy. '
  '3':
  - type: text
    content: 'Tamin’ny volana voalohan’ny taona voalohany nanjakany, dia novohany sady namboariny avy ny varavaran’ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '. '
  '30':
  - type: text
    content: Ary i Hezekià sy ny manampahefana dia nanainga ny levita mbola hidera ny Tompo tamin’ny tononkiran’i Davida sy ny an’i Asafa mpahita; ka nihira fiderana tamin-kafaliana izy, avy eo dia niondrika sy niankohoka hitsaoka ny TOMPO.
  '31':
  - type: text
    content: 'Ary niteny indray i Hezekià ka nanao tamin’ny vahoaka hoe:'
  - type: text
    content: –Ankehitriny ianareo izay vonon-kanao fanomezana ho an’ny TOMPO dia manatòna ary mitondrà sorom-pihavanana sy sorom-pisaorana ho ao an-tranon’ny TOMPO!
  - type: text
    content: Dia nitondra biby hatao sorom-pihavanana sy sorom-pisaorana ny vahoaka tafangona; ary izay rehetra malala-tanana dia nitondra sorona dorana manontolo
  - type: note
    content: Ny sorona dorana manontolo dia maneho toetra malala-tanana manokana; amin’ny karazan-tsorona hafa manko dia misy hena miverina amin’ny mpanati-tsorona.
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Ny isan’ny sorona dorana manontolo nentin’ny mpiangona dia omby fitopolo sy ondrilahy zato ary zanak’ondry roanjato; ka natolotra ho sorona dorana manontolo ho an’ny TOMPO ireo rehetra ireo. '
  '33':
  - type: text
    content: 'Ny sorona hafa kosa dia omby eninjato sy ondry aman’osy telo arivo. '
  '34':
  - type: text
    content: 'Vitsy loatra ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' teo ka tsy nahendaka ny hoditr’ireo biby rehetra natao sorona dorana manontolo, dia nanampy azy ny levita mpiray foko aminy mandra-pahavitan’ny raharaha; ary toy izany hatrany no natao mandra-pahavitan’ireo mpisorona sasany ny '
  - type: text
    content: fidiovan-tenany
  - type: text
    content: ', satria ny levita dia nazoto kokoa noho ny mpisorona tamin’ny fidiovan-tena. '
  '35':
  - type: text
    content: Ary be koa tetsy an-daniny, ankoatra ny sorona dorana manontolo maro, ny fanolorana ireo saboran’ny sorom-pihavanana sy ny fanolorana ireo fanatitra divay ampombaina ny sorona dorana manontolo.
  - type: text
    content: 'Toy izany no nanavaozana ny fanompoam-pivavahana tao an-tranon’ny TOMPO. '
  '36':
  - type: text
    content: Ary faly i Hezekià sy ny vahoaka rehetra noho ny amin’izay navelan’Andriamanitra hotanterahiny, satria tampotampoka izany raharaha izany.
  '4':
  - type: text
    content: 'Ary nasainy tonga ireo '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy '
  - type: text
    content: levita
  - type: text
    content: ' ka nangoniny teo amin’ny Kianja Atsinanana'
  - type: note
    content: Izany kianja Atsinanana izany dia tokony ho ilay teo anilan’ny vavahady atsinanana anankiray tamin’ny tanàna, ilay voateny ao amin’ny Neh 8 angamba. Misy kosa mihevitra fa ilay kianja teo anoloan’ny fidirana ao an-tempoly izany, kanefa vao mainka tsy azo antoka.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'ary nilazany hoe:'
  - type: text
    content: '–Henoinareo aho, ry taranak’i Levỳ! Ankehitriny '
  - type: text
    content: midiova
  - type: text
    content: ' tena ianareo, diovy koa ny tranon’ny TOMPO Andriamanitry ny razanareo, ary esory amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ny zavatra '
  - type: text
    content: maloto
  - type: text
    content: ' ara-pivavahana. '
  '6':
  - type: text
    content: 'Fa nivadika tamin’ny TOMPO Andriamanitsika ny razantsika sy nanao izay ratsy eo imasony ary nandao Azy; niamboho ny TOMPO ireo ka tsy niatri-maso ny fonenany intsony. '
  '7':
  - type: text
    content: 'Nohidiany ny varavarana amin’ny lalantsara fidirana, navelany ho faty ny jiro, ary tsy nandoroany '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' sady tsy nanolorany '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho an’Andriamanitr’i Israely intsony tao amin’ny tempoliny. '
  '8':
  - type: text
    content: 'Ka dia niharan’ny fahatezeran’ny TOMPO i Joda sy i Jerosalema; ary hataony ohatra hampihoron-koditra sy hampahonena ary hoenti-maneso, toy izao mbola hitanareo maso izao. '
  '9':
  - type: text
    content: 'He! matin’ny sabatra ireo vatan-dehilahy razantsika, ary ny vady aman-janany dia efa natao sambo-belona. '
