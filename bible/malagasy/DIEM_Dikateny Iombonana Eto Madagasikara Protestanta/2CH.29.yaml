document_id: 2CH.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakàn’i Hezekià. Ny nanadiovana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 18.1-4)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Feno 25 taona i Hezekià fony tonga mpanjaka; ary naharitra 29 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Abià, zanakavavin’i Zakarià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nanao izay mahitsy eo imason’ny TOMPO i Hezekià, tahaka izay rehetra nataon’i Davida razambeny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny volana voalohan’ny taona voalohany nanjakany, dia novohany sady namboariny avy ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nasainy tonga ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ka nangoniny teo amin’ny Kianja Atsinanana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Izany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kianja Atsinanana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany dia tokony ho ilay teo anilan’ny vavahady atsinanana anankiray tamin’ny tanàna, ilay voateny ao amin’ny Neh 8 angamba. Misy kosa mihevitra fa ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kianja
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' teo anoloan’ny fidirana ao an-tempoly izany, kanefa vao mainka tsy azo antoka.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Henoinareo aho, ry taranak’i Levỳ! Ankehitriny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: midiova
  - type: text
    text: ' tena ianareo, diovy koa ny tranon’ny TOMPO Andriamanitry ny razanareo, ary esory amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' ny zavatra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' ara-pivavahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nivadika tamin’ny TOMPO Andriamanitsika ny razantsika sy nanao izay ratsy eo imasony ary nandao Azy; niamboho ny TOMPO ireo ka tsy niatri-maso ny fonenany intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nohidiany ny varavarana amin’ny lalantsara fidirana, navelany ho faty ny jiro, ary tsy nandoroany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' sady tsy nanolorany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho an’Andriamanitr’i Israely intsony tao amin’ny tempoliny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ka dia niharan’ny fahatezeran’ny TOMPO i Joda sy i Jerosalema; ary hataony ohatra hampihoron-koditra sy hampahonena ary hoenti-maneso, toy izao mbola hitanareo maso izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He! matin’ny sabatra ireo vatan-dehilahy razantsika, ary ny vady aman-janany dia efa natao sambo-belona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa nanapa-kevitra aho ny hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' amin’ny TOMPO Andriamanitr’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' mba hiala amintsika ny fahatezerany mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ianareo kosa, manaova fanarenan-javatra ankehitriny ka aza malaina, satria ianareo no voafidin’ny TOMPO hiatrika Azy mba hanao fanompoam-pivavahana aminy sy ho mpandraharahany ary ho mpandoro vovo-javamanitra ho Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireto avy ny levita tonga teo: tamin’ny terak’i Kehata dia i Mahata zanakalahin’i Hamasay ary i Jôela zanakalahin’i Hazarià; tamin’ny terak’i Merarỳ dia i Kisy zanakalahin’i Habdỳ ary i Hazarià zanakalahin’i Jehalaleela; tamin’ny Gersônita, dia i Jôa zanakalahin’i Zimà, ary i Hedera zanakalahin’i Jôà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'tamin’ny terak’i Elitsafàna, dia i Simrỳ sy i Jehoela; tamin’ny terak’i Asafa, dia i Zakarià sy i Matanià; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tamin’ny terak’i Hemàna, dia i Jehiela sy i Simehỳ; ary tamin’ny terak’i Jedotòna, dia i Semahià sy i Hoziela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia namory ny mpiray tarika aminy avy izy ireo, ka samy nidio tena; avy eo dia niditra ny tranon’ny TOMPO mba hanadio izany, araka ny didin’ny mpanjaka mifototra amin’ny tenin’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny mpisorona no niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efitrano
  - type: text
    text: ' malalaka anatiny amin’ny tranon’ny Tompo mba hanadio izany ary namoaka ny fanaka maloto rehetra izay hitany tao amin’ny Toeramasin’ny TOMPO ho eo an-kianjan’ny tranon’ny TOMPO; ny levita kosa nandray ireny mba havoakany ho any amin’ny lohasahan-driaka Kidrôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’ny andro voalohan’ny volana voalohany no nanombohana ny fanadiovana; ary tamin’ny andro fahavalon’io volana io no tafapaka teo amin’ny lalantsara fidirana ho ao an-tempoly izany. Valo andro koa no naharetan’ny fanadiovana ny tranon’ny TOMPO, ka andro faha-16 tamin’io volana voalohany io no vita tanteraka ny fanadiovana manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niditra tao an-tranon’i Hezekià mpanjaka ireto taranak’i Levỳ ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa voadionay avokoa, ry Andriamanjaka ô, ny tranon’ny TOMPO sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fisoronana mbamin’ny kojakoja rehetra momba azy ary ny latabatry ny mofo alahatra mbamin’ny kojakoja rehetra momba azy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny fanaka rehetra, izay nozimbazimbain’i Ahaza mpanjaka tamin’ny fahotana vitany nandritra ny nanjakany, dia nohavaozinay sy nodiovinay; koa indreo izy eo anoloan’ny alitaran’ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naverin’i Hezekià amin’ny laoniny ny fanompoam-pivavahana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny ampitso dia nifoha maraina koa i Hezekià mpanjaka, ka namory ny manampahefan’ny tanàna, dia niakatra ho ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ombilahy fito mbamin’ny ondrilahy fito sy zanak’ondry fito no nentina hatao sorona dorana manontolo, ary nisy koa osilahy fito hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanalana ny ota ho an’ny ankohonan’ny mpanjaka sy ho an’ny vahoaka jodeanina sady hatao sorona fanadiovana ny tempoly; ka ny mpisorona, taranak’i Aharôna, no nasain’i Hezekià nanolotra ireo teo ambony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: 'n’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia novonoina ny ombilahy, ary nalain’ny mpisorona ny ra ka nararany tamin’ny alitara; novonoina koa ny ondrilahy sy ny zanak’ondry ka samy nararaka tamin’ny alitara ny rany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny osilahy hatao sorona fanalana ny ota dia nentina teo anatrehan’ny mpanjaka sy ny vahoaka tafangona ka nametrahan’izy rehetra tanana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: dia novonoin’ny mpisorona ireo osilahy ireo, ka ny rany no natolony teo amin’ny alitara araka ny fanao mba ho sorona famelan-keloka ho an’i Israely manontolo; fa nasain’ny mpanjaka natolotra ho an’i Israely manontolo na ny sorona dorana manontolo na ny sorona fanalana ny ota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary napetraky ny mpanjaka tao an-tranon’ny TOMPO ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ombàn’ny kipantsona sy valiha ary lokanga, araka ny didy nataon’i Davida mpanjaka ary koa nataon’i Gada mpahitany sy i Natàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: '; izany no didy nampitain’ny TOMPO tamin’ny alalan’ireo mpaminaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia naka toerana ny levita ombàn’ny zava-manenon’i Davida, ary koa ny mpisorona ombàn’ny trompetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Avy eo nasain’i Hezekià natolotra teo ambony alitara ny sorona dorana manontolo; ka vantany vao natomboka izany fanoloran-tsorona izany, dia natomboka noredonina koa ny hira ho an’ny TOMPO sady narahin’ny feon-trompetra sy ny zava-manenon’i Davida mpanjakan’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Niankohoka avokoa ny vahoaka tafangona teo, fa ny mpihira kosa nihira hatrany ary ny mpanao mozika nitsoka trompetra, mandra-pahavitan’ny sorona dorana manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nony efa tapitra ny fanoloran-tsorona, dia nandohalika sy niankohoka ny mpanjaka mbamin’izay rehetra tafaraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary i Hezekià sy ny manampahefana dia nanainga ny levita mbola hidera ny Tompo tamin’ny tononkiran’i Davida sy ny an’i Asafa mpahita; ka nihira fiderana tamin-kafaliana izy, avy eo dia niondrika sy niankohoka hitsaoka ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary niteny indray i Hezekià ka nanao tamin’ny vahoaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ankehitriny ianareo izay vonon-kanao fanomezana ho an’ny TOMPO dia manatòna ary mitondrà sorom-pihavanana sy sorom-pisaorana ho ao an-tranon’ny TOMPO!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nitondra biby hatao sorom-pihavanana sy sorom-pisaorana ny vahoaka tafangona; ary izay rehetra malala-tanana dia nitondra sorona dorana manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sorona dorana manontolo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia maneho toetra malala-tanana manokana; amin’ny karazan-tsorona hafa manko dia misy hena miverina amin’ny mpanati-tsorona.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny isan’ny sorona dorana manontolo nentin’ny mpiangona dia omby fitopolo sy ondrilahy zato ary zanak’ondry roanjato; ka natolotra ho sorona dorana manontolo ho an’ny TOMPO ireo rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny sorona hafa kosa dia omby eninjato sy ondry aman’osy telo arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vitsy loatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' teo ka tsy nahendaka ny hoditr’ireo biby rehetra natao sorona dorana manontolo, dia nanampy azy ny levita mpiray foko aminy mandra-pahavitan’ny raharaha; ary toy izany hatrany no natao mandra-pahavitan’ireo mpisorona sasany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fidiovan-tenany
  - type: text
    text: ', satria ny levita dia nazoto kokoa noho ny mpisorona tamin’ny fidiovan-tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary be koa tetsy an-daniny, ankoatra ny sorona dorana manontolo maro, ny fanolorana ireo saboran’ny sorom-pihavanana sy ny fanolorana ireo fanatitra divay ampombaina ny sorona dorana manontolo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Toy izany no nanavaozana ny fanompoam-pivavahana tao an-tranon’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary faly i Hezekià sy ny vahoaka rehetra noho ny amin’izay navelan’Andriamanitra hotanterahiny, satria tampotampoka izany raharaha izany.
