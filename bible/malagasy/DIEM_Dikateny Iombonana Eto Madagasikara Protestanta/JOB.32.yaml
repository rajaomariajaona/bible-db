document_id: JOB.32,396
type_code: plt
verses:
  '1':
  - type: heading
    content: FIROTSAHAN’I ELIHO AN-TSEHATRA
  - type: heading
    content: (32-37)
  - type: text
    content: 'Noho i Jôba nihevi-tena ho marina, dia nitsahatra tsy namaly azy intsony i Elifaza sy i Bildada ary i Tsôfara. '
  '10':
  - type: text
    content: Noho izany, mangataka anareo aho hihaino ahy
  - type: text
    content: fa hambarako aminareo koa izay mba fantatro.
  - type: heading
    content: '*'
  '11':
  - type: text
    content: Mba niandry izay kabarinareo aho
  - type: text
    content: ary nampandry sofina tamin’izay halahatrareo,
  - type: text
    content: mandra-pandinidinikareo izay holazaina.
  '12':
  - type: text
    content: Eny, nihaino tsara anareo aho,
  - type: text
    content: fa tsy nisy naharesy lahatra an’i Jôba ianareo.
  '13':
  - type: text
    content: 'Ary aza manao hoe: «Efa hitanay ny fahendrena:'
  - type: text
    content: Andriamanitra fa tsy olombelona no hamaly azy.»
  '14':
  - type: text
    content: Tsy nikabary hamely ahy anefa i Jôba,
  - type: text
    content: ary tsy ny teninareo no hamaliako azy.
  - type: heading
    content: '*'
  '15':
  - type: text
    content: Indro fa very hevitra izy telo lahy, ry Jôba,
  - type: text
    content: hany ka tsy mamaly anao intsony
  - type: text
    content: ary tsy mahita izay hotenenina.
  '16':
  - type: text
    content: Niandry foana aho fa tsy niteny izy
  - type: text
    content: sady nijanona tsy namaly intsony;
  '17':
  - type: text
    content: koa anjarako indray no miteny
  - type: text
    content: hanambara izay mba fantatro.
  '18':
  - type: text
    content: Fa feno izay tokony holazaina ny foko;
  - type: text
    content: fanoitra ato anatiko no manery ahy hiteny
  - type: note
    content: 'fanoitra ato anatiko: dkt hafa Fanahin’Andriamanitra ato amiko.'
  - type: text
    content: .
  '19':
  - type: text
    content: Mamorivory toa iotrehan-divay ny ato anatiko
  - type: text
    content: ka tahaka ny siny hoditra vaovao efa ho triatra.
  '2':
  - type: text
    content: Koa nirehi-pahatezerana noho izany i Elihò zanakalahin’i Barakela avy amin’ny fokon’i Boza
  - type: note
    content: 'fokon’i Boza: foko arabo (Jer 25.23).'
  - type: text
    content: ' sady anisan’ny tarik’i Rama; tamin’i Jôba no nirehetan’ny fahatezerany, satria mihambo ho marina i Jôba teo anoloan’Andriamanitra. '
  '20':
  - type: text
    content: Koa avelao aho hiteny hampahamaivana ahy;
  - type: text
    content: dia ho afaka hanoka-bava aho ka hamaly.
  '21':
  - type: text
    content: Tsy mba hizaha tavan’olona aho
  - type: text
    content: na handodoka na iza na iza;
  '22':
  - type: text
    content: fa tsy mahay mandodoka olona aho,
  - type: text
    content: sao hofoanan’ny Mpahariko tsy ho ela.
  '3':
  - type: text
    content: 'Nirehi-pahatezerana tamin’ny sakaizany telolahy koa i Elihò, satria sady tsy nahita valinteny ho an’i Jôba ireo no nanome tsiny an’Andriamanitra. '
  '4':
  - type: text
    content: 'Fa mbola niandry i Elihò vao niteny tamin’i Jôba, satria be taona kokoa noho izy ny hafa. '
  '5':
  - type: text
    content: Rehefa hitany anefa fa tsy nanan-kavaly intsony izy telolahy, dia nirehitra ny fahatezerany.
  - type: heading
    content: Manazava ny antony hirotsahany an-tsehatra i Elihò
  '6':
  - type: text
    content: 'Dia niteny i Elihò zanakalahin’i Barakela avy amin’ny fokon’i Boza ka nanao hoe:'
  - type: text
    content: Mbola tanora loatra aho fa ianareo kosa efa be taona
  - type: text
    content: koa dia natahotra aho aloha ary tsy sahy
  - type: text
    content: nanambara taminareo izay mba fantatro.
  '7':
  - type: text
    content: 'Fa hoy aho anakampoko hoe: «Aoka ny be taona hiteny,'
  - type: text
    content: ary ny anti-panahy hampianatra ny fahendrena.»
  '8':
  - type: text
    content: Kanefa ao amin’ny olombelona ao dia ny fanahy,
  - type: text
    content: na ny fofonain’ilay Tsitoha, no manome fahalalana azy.
  '9':
  - type: text
    content: Fa tsy hoe taona na traikefa ananana
  - type: text
    content: no mampahendry sy ahalalana ny marina.
