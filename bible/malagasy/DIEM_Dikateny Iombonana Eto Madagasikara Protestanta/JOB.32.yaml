document_id: JOB.32
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: FIROTSAHAN’I ELIHO AN-TSEHATRA
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: (32-37)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Noho i Jôba nihevi-tena ho marina, dia nitsahatra tsy namaly azy intsony i Elifaza sy i Bildada ary i Tsôfara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa nirehi-pahatezerana noho izany i Elihò zanakalahin’i Barakela avy amin’ny fokon’i Boza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fokon’i Boza: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: foko arabo (Jer 25.23).
    marker-yv: yv-n
  - type: text
    text: ' sady anisan’ny tarik’i Rama; tamin’i Jôba no nirehetan’ny fahatezerany, satria mihambo ho marina i Jôba teo anoloan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nirehi-pahatezerana tamin’ny sakaizany telolahy koa i Elihò, satria sady tsy nahita valinteny ho an’i Jôba ireo no nanome tsiny an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa mbola niandry i Elihò vao niteny tamin’i Jôba, satria be taona kokoa noho izy ny hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa hitany anefa fa tsy nanan-kavaly intsony izy telolahy, dia nirehitra ny fahatezerany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manazava ny antony hirotsahany an-tsehatra i Elihò
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niteny i Elihò zanakalahin’i Barakela avy amin’ny fokon’i Boza ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola tanora loatra aho fa ianareo kosa efa be taona
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa dia natahotra aho aloha ary tsy sahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanambara taminareo izay mba fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy aho anakampoko hoe: «Aoka ny be taona hiteny,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny anti-panahy hampianatra ny fahendrena.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanefa ao amin’ny olombelona ao dia ny fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny fofonain’ilay Tsitoha, no manome fahalalana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tsy hoe taona na traikefa ananana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mampahendry sy ahalalana ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Noho izany, mangataka anareo aho hihaino ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hambarako aminareo koa izay mba fantatro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mba niandry izay kabarinareo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nampandry sofina tamin’izay halahatrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pandinidinikareo izay holazaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, nihaino tsara anareo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy nisy naharesy lahatra an’i Jôba ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary aza manao hoe: «Efa hitanay ny fahendrena:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra fa tsy olombelona no hamaly azy.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy nikabary hamely ahy anefa i Jôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ny teninareo no hamaliako azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro fa very hevitra izy telo lahy, ry Jôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hany ka tsy mamaly anao intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahita izay hotenenina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Niandry foana aho fa tsy niteny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nijanona tsy namaly intsony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: koa anjarako indray no miteny
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanambara izay mba fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa feno izay tokony holazaina ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanoitra ato anatiko no manery ahy hiteny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanoitra ato anatiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Fanahin’Andriamanitra ato amiko
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mamorivory toa iotrehan-divay ny ato anatiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tahaka ny siny hoditra vaovao efa ho triatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa avelao aho hiteny hampahamaivana ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho afaka hanoka-bava aho ka hamaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy mba hizaha tavan’olona aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na handodoka na iza na iza;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: fa tsy mahay mandodoka olona aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sao hofoanan’ny Mpahariko tsy ho ela.
