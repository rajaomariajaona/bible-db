document_id: EXO.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny alitara fandoroana zava-manitra
  - type: text
    content: «
  - type: text
    content: Alitara
  - type: text
    content: ' iray no hamboarina amin’ny hazo mimôzà mba handoroana ny vovo-javamanitra. '
  '10':
  - type: text
    content: 'Indray mandeha isan-taona i Aharôna no '
  - type: text
    content: hanadio
  - type: text
    content: ' azy; hapetrany eo amin’ny tandroky ny alitara ny ra nalaina avy tamin’ny biby natao sorona ahazoana famelan-keloka. Havaozina isan-taona io lanonana io eo amin’ny taranaka mifandimby. Voatokana ho Ahy TOMPO io alitara io, ka hanan-kasina fatratra.»'
  - type: heading
    content: Ny hetra fandoa ho an’ny Toeramasina
  '11':
  - type: text
    content: 'Hoy indray ny TOMPO tamin’i Mosesy:'
  '12':
  - type: text
    content: '–Rehefa manao ny fanisam-bahoaka amin’ny Israelita ianao, dia samy handoa hetra ho AHY ny olona tsirairay hanavotana ny ainy, mba tsy hisy loza hanjo azy amin’ny fanisana. '
  '13':
  - type: text
    content: 'Izay rehetra voaisa dia samy hanome vola antsasaky ny sekela, araka ny lanja fampiasa ao amin’ny '
  - type: text
    content: Toeramasina
  - type: note
    content: Jereo 38.25-26; Mt 17.24.
  - type: text
    content: '. Io vola io dia haloa ho Ahy TOMPO, '
  '14':
  - type: text
    content: 'avy amin’ny Israelita rehetra voaisa ka roapolo taona no ho miakatra. '
  '15':
  - type: text
    content: 'Ny mpanankarena tsy handoa mihoatra antsasaky ny sekela, ary ny mahantra koa tsy handoa latsak’izany; fa ny tsirairay samy handoa ho AHY ny vola voatondro mba hanavotra ny ainy. '
  '16':
  - type: text
    content: 'Rehefa voaangonao avy amin’ny Israelita rehetra izany vola izany, dia hampiasainao hikojakojana ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: . Izany no hahatsiarovako ny Israelita ka hiarovako ny ainy.
  - type: heading
    content: Ny kovetabe fampiasa amin’ny fidiovana
  '17':
  - type: text
    content: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  '18':
  - type: text
    content: '–Momba ny '
  - type: text
    content: fidiovana
  - type: text
    content: ', dia hisy kovetabe'
  - type: note
    content: Jereo 38.8.
  - type: text
    content: ' iray ka halimo no hamboarana azy; hasiana faladiany halimo izany, ka hapetraka eo anelanelan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' sy ny '
  - type: text
    content: alitara
  - type: text
    content: ', sady hofenoina rano. '
  '19':
  - type: text
    content: 'Io rano io no hampiasain’i Aharôna sy ny zanany lahy, hanasany ny tongotra aman-tanany, '
  '2':
  - type: text
    content: 'Ho efamira izy io, ka hirefy dimampolo santimetatra ny lafiny tsirairay, ary iray metatra ny haavony. Hisy tandrony hatao miray aminy avy eo amin’ny zorony efatra ambony. '
  '20':
  - type: text
    content: 'alohan’ny hidirany ao amin’ny Tranolay fihaonana na hanatonany ny alitara mba handoro '
  - type: text
    content: sorona
  - type: text
    content: ' hanetona ho Ahy TOMPO. Amin’izay dia tsy ho faty izy ireo. '
  '21':
  - type: text
    content: Tsy maintsy misasa tongotra aman-tanana izy mba tsy ho faty. Fepetra hanan-kery hatrany eo aminy sy ny taranany izany.
  - type: heading
    content: Ny ilomasina
  '22':
  - type: text
    content: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  '23':
  - type: text
    content: '–Makà zava-manitra tsara indrindra: dia miora ranony dimy kilao, havozomanitra roa kilao sy sasany, kanelina manitra roa kilao sy sasany, '
  '24':
  - type: text
    content: ary kasia dimy kilao
  - type: note
    content: Ny miora, ny havozomanitra, ny kanelina, ny kasia dia zava-manitra avy amin’ny zavamaniry.
  - type: text
    content: ', araka ny lanja fampiasa ao amin’ny Toeramasina, miampy diloilon’ôliva enina litatra. '
  '25':
  - type: text
    content: 'Mpamboatra zava-manitra no hampifangaroharo azy hanjary ilomasina hampiasaina amin’ny lanonana fanokanana. '
  '26':
  - type: text
    content: Io no hampisaina mba hanokanana ny
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', ny Vatamasina misy ny raki-tsoratry ny fanekempihavanana, '
  '27':
  - type: text
    content: 'ny latabatra voatokana, ny fitoeran-jiro sy ny fitaovana miaraka aminy, ny '
  - type: text
    content: alitara
  - type: text
    content: ' fandoroana vovo-javamanitra, '
  '28':
  - type: text
    content: 'ny alitara fanaovana '
  - type: text
    content: sorona
  - type: text
    content: ' sy ny fitaovana miaraka aminy, ary ny kovetabe sy ny faladiany.'
  '29':
  - type: text
    content: 'Rehefa vita fanokanana ireo, dia ho voatokana ho Ahy tokoa, ka izay rehetra mikasika azy na olona na zavatra dia hiharan-doza. '
  '3':
  - type: text
    content: 'Horakofana takela-bolamena madio ny tampony sy ny lafiny manodidina ary ny tandrony, ary hasiana sisiny volamena manodidina. '
  '30':
  - type: text
    content: Horarahanao ilomasina koa i Aharôna sy ny zanany lahy ho fanokanana azy mba hanompo Ahy amin’ny maha mpisorona.
  '31':
  - type: text
    content: '«Aorian’izany dia hambaranao amin’ny Israelita hoe: Ity no ilomasina fampiasa amin’ny fanokanana. Fanompoana ny Tompo irery ihany no hampiasana azy eo amin’ny taranaka mifandimby. '
  '32':
  - type: text
    content: 'Koa tsy misy olona mahazo mampiasa azy mba hihosorany, ary tsy misy mahazo manamboatra ilomanitra mitovy aminy; fa voatokana izany, ka tsy maintsy hajaina ny maha voatokana azy. '
  '33':
  - type: text
    content: Fa raha misy maka tahaka manamboatra mitovy aminy, ka manosotra azy amin’ny tenan’ny olon-tsotra, dia hoesorina tsy ho anisan’ny firenena israelita izy.»
  - type: heading
    content: Ny fanamboarana vovo-javamanitra voatokana
  '34':
  - type: text
    content: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Makà zava-manitra ianao: dia natafa, ôniksa, galbanoma, ary ramy madio. Ataovy mitovy fatra ireo'
  - type: note
    content: Ny natafa, galbanoma, ramy dia avy amin’ny zavamaniry avokoa. Ny ôniksa (raha izany no tena hevitry ny voambolana hebreo) dia toa avy amin’ny biby.
  - type: text
    content: '. '
  '35':
  - type: text
    content: Mpamboatra zava-manitra no hampifangaroharo azy miaraka amin’ny sira
  - type: note
    content: ny sira dia toa hoe nanamora ny fandorana ny zava-manitra; saingy misy dkt tranainy nandika ny voambolana hebreo eto amin’ny hoe amim-pitandremana.
  - type: text
    content: 'mba hahatonga azy ho voatokana sy madio. '
  '36':
  - type: text
    content: 'Hotorotoroina ho vovoka madinika izany ka hampiasaina ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', manoloana ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' izay toerana hihaonako aminao. Hanan-kasina miavaka aminareo izany. '
  '37':
  - type: text
    content: 'Aza manamboatra zava-manitra mitovy aminy mba hampiasainareo ho anareo, fa aoka hoheverinareo ho voatokana ho Ahy TOMPO ihany izany. '
  '38':
  - type: text
    content: Fa raha misy manamboatra zava-manitra mitovy aminy hamofonany azy, dia hoesorina tsy ho anisan’ny firenena israelita izy
  - type: note
    content: 'And 22-38: jereo 37.29.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Hisy haba volamena roa avy hapetraka eo ambonin’ny sisiny an-daniny roa amin’ny alitara, ka hampidirana bao mba hilanjana azy. '
  '5':
  - type: text
    content: 'Hazo mimôzà no hanaovana ny bao ary horakofana takela-bolamena. '
  '6':
  - type: text
    content: 'Hapetraka eo anoloan’ny efitra lamba izay manafina ny '
  - type: text
    content: Vatamasina misy ny raki-tsoratry ny fanekempihavanana
  - type: note
    content: Dkt araka ny stf hebreo vitsivitsy sy ny dkt grika tranainy Septoazinta izany, fa ny RM eto dia manampy hoe eo anoloan’ny saron’ny Vatamasina.
  - type: text
    content: 'io alitara io, dia eo anoloan’ny saron’ny Vatamasina izay hihaonako aminao. '
  '7':
  - type: text
    content: 'Isa-maraina dia handoro vovo-javamanitra eo i Aharôna rehefa hanadio ny fitoeran-jiro ao amin’ny Toeramasina, '
  '8':
  - type: text
    content: 'ary koa isan-kariva rehefa handrehitra ny jiro izy. Handoroana vovo-javamanitra tsy tapaka eo ho fanomezam-boninahitra Ahy TOMPO. '
  '9':
  - type: text
    content: 'Aza manolotra vovo-javamanitra tsy sahaza eo, na '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo, na fanatitra vokatry ny tany; tsy handrarahana fanatitra divay koa eo ambonin’io alitara io. '
