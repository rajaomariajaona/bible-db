verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny alitara fandoroana zava-manitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: «
    - type: usfm
      marker: w
      children:
      - type: text
        text: Alitara
    - type: text
      text: ' iray no hamboarina amin’ny hazo mimôzà mba handoroana ny vovo-javamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray mandeha isan-taona i Aharôna no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hanadio
    - type: text
      text: ' azy; hapetrany eo amin’ny tandroky ny alitara ny ra nalaina avy tamin’ny biby natao sorona ahazoana famelan-keloka. Havaozina isan-taona io lanonana io eo amin’ny taranaka mifandimby. Voatokana ho Ahy TOMPO io alitara io, ka hanan-kasina fatratra.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hetra fandoa ho an’ny Toeramasina
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray ny TOMPO tamin’i Mosesy:'
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Rehefa manao ny fanisam-bahoaka amin’ny Israelita ianao, dia samy handoa hetra ho AHY ny olona tsirairay hanavotana ny ainy, mba tsy hisy loza hanjo azy amin’ny fanisana. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izay rehetra voaisa dia samy hanome vola antsasaky ny sekela, araka ny lanja fampiasa ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 38.25-26; Mt 17.24.
      marker-yv: yv-n
    - type: text
      text: '. Io vola io dia haloa ho Ahy TOMPO, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'avy amin’ny Israelita rehetra voaisa ka roapolo taona no ho miakatra. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny mpanankarena tsy handoa mihoatra antsasaky ny sekela, ary ny mahantra koa tsy handoa latsak’izany; fa ny tsirairay samy handoa ho AHY ny vola voatondro mba hanavotra ny ainy. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Rehefa voaangonao avy amin’ny Israelita rehetra izany vola izany, dia hampiasainao hikojakojana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: . Izany no hahatsiarovako ny Israelita ka hiarovako ny ainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny kovetabe fampiasa amin’ny fidiovana
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fidiovana
    - type: text
      text: ', dia hisy kovetabe'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 38.8.
      marker-yv: yv-n
    - type: text
      text: ' iray ka halimo no hamboarana azy; hasiana faladiany halimo izany, ka hapetraka eo anelanelan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ', sady hofenoina rano. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Io rano io no hampiasain’i Aharôna sy ny zanany lahy, hanasany ny tongotra aman-tanany, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho efamira izy io, ka hirefy dimampolo santimetatra ny lafiny tsirairay, ary iray metatra ny haavony. Hisy tandrony hatao miray aminy avy eo amin’ny zorony efatra ambony. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'alohan’ny hidirany ao amin’ny Tranolay fihaonana na hanatonany ny alitara mba handoro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' hanetona ho Ahy TOMPO. Amin’izay dia tsy ho faty izy ireo. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy maintsy misasa tongotra aman-tanana izy mba tsy ho faty. Fepetra hanan-kery hatrany eo aminy sy ny taranany izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ilomasina
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Makà zava-manitra tsara indrindra: dia miora ranony dimy kilao, havozomanitra roa kilao sy sasany, kanelina manitra roa kilao sy sasany, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary kasia dimy kilao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.24 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Ny miora, ny havozomanitra, ny kanelina, ny kasia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia zava-manitra avy amin’ny zavamaniry.
      marker-yv: yv-n
    - type: text
      text: ', araka ny lanja fampiasa ao amin’ny Toeramasina, miampy diloilon’ôliva enina litatra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpamboatra zava-manitra no hampifangaroharo azy hanjary ilomasina hampiasaina amin’ny lanonana fanokanana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Io no hampisaina mba hanokanana ny
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', ny Vatamasina misy ny raki-tsoratry ny fanekempihavanana, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny latabatra voatokana, ny fitoeran-jiro sy ny fitaovana miaraka aminy, ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' fandoroana vovo-javamanitra, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny alitara fanaovana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' sy ny fitaovana miaraka aminy, ary ny kovetabe sy ny faladiany.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vita fanokanana ireo, dia ho voatokana ho Ahy tokoa, ka izay rehetra mikasika azy na olona na zavatra dia hiharan-doza. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horakofana takela-bolamena madio ny tampony sy ny lafiny manodidina ary ny tandrony, ary hasiana sisiny volamena manodidina. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Horarahanao ilomasina koa i Aharôna sy ny zanany lahy ho fanokanana azy mba hanompo Ahy amin’ny maha mpisorona.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Aorian’izany dia hambaranao amin’ny Israelita hoe: Ity no ilomasina fampiasa amin’ny fanokanana. Fanompoana ny Tompo irery ihany no hampiasana azy eo amin’ny taranaka mifandimby. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tsy misy olona mahazo mampiasa azy mba hihosorany, ary tsy misy mahazo manamboatra ilomanitra mitovy aminy; fa voatokana izany, ka tsy maintsy hajaina ny maha voatokana azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha misy maka tahaka manamboatra mitovy aminy, ka manosotra azy amin’ny tenan’ny olon-tsotra, dia hoesorina tsy ho anisan’ny firenena israelita izy.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanamboarana vovo-javamanitra voatokana
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Makà zava-manitra ianao: dia natafa, ôniksa, galbanoma, ary ramy madio. Ataovy mitovy fatra ireo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.34 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Ny natafa, galbanoma, ramy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia avy amin’ny zavamaniry avokoa. Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ôniksa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (raha izany no tena hevitry ny voambolana hebreo) dia toa avy amin’ny biby.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mpamboatra zava-manitra no hampifangaroharo azy miaraka amin’ny sira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.35 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny sira '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia toa hoe nanamora ny fandorana ny zava-manitra; saingy misy dkt tranainy nandika ny voambolana hebreo eto amin’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amim-pitandremana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'mba hahatonga azy ho voatokana sy madio. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hotorotoroina ho vovoka madinika izany ka hampiasaina ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', manoloana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina
    - type: text
      text: ' izay toerana hihaonako aminao. Hanan-kasina miavaka aminareo izany. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Aza manamboatra zava-manitra mitovy aminy mba hampiasainareo ho anareo, fa aoka hoheverinareo ho voatokana ho Ahy TOMPO ihany izany. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa raha misy manamboatra zava-manitra mitovy aminy hamofonany azy, dia hoesorina tsy ho anisan’ny firenena israelita izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.38 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 22-38:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 37.29.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hisy haba volamena roa avy hapetraka eo ambonin’ny sisiny an-daniny roa amin’ny alitara, ka hampidirana bao mba hilanjana azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazo mimôzà no hanaovana ny bao ary horakofana takela-bolamena. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hapetraka eo anoloan’ny efitra lamba izay manafina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina misy ny raki-tsoratry ny fanekempihavanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dkt araka ny stf hebreo vitsivitsy sy ny dkt grika tranainy Septoazinta izany, fa ny RM eto dia manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: eo anoloan’ny saron’ny Vatamasina.
      marker-yv: yv-n
    - type: text
      text: 'io alitara io, dia eo anoloan’ny saron’ny Vatamasina izay hihaonako aminao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isa-maraina dia handoro vovo-javamanitra eo i Aharôna rehefa hanadio ny fitoeran-jiro ao amin’ny Toeramasina, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary koa isan-kariva rehefa handrehitra ny jiro izy. Handoroana vovo-javamanitra tsy tapaka eo ho fanomezam-boninahitra Ahy TOMPO. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manolotra vovo-javamanitra tsy sahaza eo, na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo, na fanatitra vokatry ny tany; tsy handrarahana fanatitra divay koa eo ambonin’io alitara io. '
