document_id: JER.37
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nila torohevitra tamin’i Jeremià i Tsedekià mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary i Nebokadnetsara mpanjakan’i Babilôna nampanjaka an’i Tsedekià, zanakalahin’i Josià tao Joda mba hisolo an’i Kônià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kônià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 22.24 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', zanakalahin’i Jôiakima. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Kanefa, na i Tsedekià na ireo tandapany na ireo vahoakan’i Joda, dia samy tsy nihaino ny fampitandremana izay nampitain’ny TOMPO tamin’ny alalan’i Jeremià mpaminany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I Tsedekià mpanjaka kosa dia naniraka an’i Jokaly, zanakalahin’i Selemià ary koa i Tsefanià mpisorona, zanakalahin’i Mahaseià ho any amin’i Jeremià mpaminany ihany hanao aminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miangavy anao aho mba hivavaka ho anay amin’ny TOMPO Andriamanitsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’izay fotoana izay dia tsy mbola voatana an-tranomaizina i Jeremià, ka afaka nivezivezy malalaka. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny tafiky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' dia efa niainga avy tany Ejipta rahateo; koa raha nandre izany ny Babilônianina, izay teo am-panaovana fahirano an’i Jerosalema, dia nihataka kely niala an’i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO ho an’i Jeremià mpaminany manao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Izao no lazain’ny TOMPO Andriamanitr’i Israely: ‹Ny mpanjakan’i Joda izay naniraka anareo hanontany Ahy dia ilazao hoe: Ny tafiky ny Farao, izay efa niainga mba hamonjy anareo, dia niverina ilalana ka nody any Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ho avy indray kosa ny Babilônianina hanafika ity tanàna ity ka hahazo azy sady handoro azy amin’ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izao koa no lazaiko aminareo: Aza mamita-tena foana ka hihevitra fa lasa tanteraka ny Babilônianina, satria tsy nandeha velively ireo! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary na dia ho resinareo aza ny tafika babilônianina manontolo izay miady aminareo, ka tsy misy tavela afa-tsy olona maratra, dia mbola hitsangana tsirairay avy ao an-dainy ireny ka ho avy handoro ity tanàna ity amin’ny afo.› »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Natao an-tranomaizina i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha mbola nihataka an’i Jerosalema ny tafika babilônianina mba hidify ny tafiky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia nivoaka ny tanàna i Jeremià hankany amin’ny faritanin’i Benjamîna mba handray anjara amin’ny fizaràn-tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fizaràn-tany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny andalan-teny maromaro toy ny Is 34.17; Sal 16.5-6, indrindra Mk 2.5 dia ahazoana mihevitra fa ny fizaràn-tany toy izao dia nitranga isaky ny vanim-potoana. Dkt hafa «hizara ny lova ao amin’ny fianakaviany.»
    marker-yv: yv-n
  - type: text
    text: ' ataon’ny fianakaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kanjo raha vao nandalo teo am-bavahadin’i Benjamîna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.13 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'vavahadin’i Benjamîna:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: iray amin’ny fivoahana mianavaratra avy ao Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' izy, dia nifanehatra tamin’ny lehiben’ny mpiambina atao hoe Jirià, zanakalahin’i Selemià sady zafikelin’i Hananià. Ary nosamborin’i Jirià i Jeremià mpaminany ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miandany amin’ny Babilônianina ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa novalian’i Jeremià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lainga izany, tsy miandany amin’ny Babilônianina aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nefa tsy nino izany i Jirià fa nisambotra an’i Jeremià ary nitondra azy ho any amin’ny lehibeny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tezitra tamin’i Jeremià kosa ireto ka nikapoka azy sady nanagadra azy tao an-tranon’i Jônatàna mpitantsora-panjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary naiditra tao amin’ilay efitra miendrika an-dohalambo i Jeremià.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Efa ela nitoerana tao amin’io tranomaizina io Jeremià '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'no nanirahan’i Tsedekià olona haka azy mba hanontaniany mangina tao an-dapany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa misy hafatry ny TOMPO tokoa va ho ahy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’i Jeremià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Eny, dia inty: «Hatolotra eo an-tanan’ny mpanjakan’i Babilôna ianao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy koa i Jeremià tamin’i Tsedekià mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona no heloka nataoko taminao na tamin’ny manamboninahitrao na tamin’ny mponina eto amin’ity tanàna ity no dia nataonareo an-tranomaizina aho? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nankaiza ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' izay naminany teo aminareo fa tsy ho tonga hanafika anareo na ity tanàna ity ny mpanjakan’i Babilôna?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nampian’i Jeremià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ankehitriny, ry andriamanjaka, miangavy anao aho mba hihaino ny fangatahana ataoko eo anatrehanao: Aza averina any an-tranon’i Jônatàna mpitantsora-panjakana intsony aho, fandrao maty ao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nanome baiko i Tsedekià mpanjaka mba hapetraka eo an-kianjan’ny trano fiambenana i Jeremià sady homena mofo boribory iray isan’andro avy ao amin’ny lalankelin’ny Mpanao mofo mandra-pahalanin’ny mofo rehetra ao an-tanàna. Toy izany no nijanonan’i Jeremià tao an-kianjan’ny trano fiambenana.
