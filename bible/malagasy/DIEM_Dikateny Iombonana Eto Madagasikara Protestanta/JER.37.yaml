document_id: JER.37,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nila torohevitra tamin’i Jeremià i Tsedekià mpanjaka
  - type: text
    content: Ary i Nebokadnetsara mpanjakan’i Babilôna nampanjaka an’i Tsedekià, zanakalahin’i Josià tao Joda mba hisolo an’i Kônià
  - type: note
    content: 'Kônià: jereo 22.24 sy nta.'
  - type: text
    content: ', zanakalahin’i Jôiakima. '
  '10':
  - type: text
    content: Ary na dia ho resinareo aza ny tafika babilônianina manontolo izay miady aminareo, ka tsy misy tavela afa-tsy olona maratra, dia mbola hitsangana tsirairay avy ao an-dainy ireny ka ho avy handoro ity tanàna ity amin’ny afo.› »
  - type: heading
    content: Natao an-tranomaizina i Jeremià
  '11':
  - type: text
    content: 'Fa raha mbola nihataka an’i Jerosalema ny tafika babilônianina mba hidify ny tafiky ny '
  - type: text
    content: Farao
  - type: text
    content: ', '
  '12':
  - type: text
    content: dia nivoaka ny tanàna i Jeremià hankany amin’ny faritanin’i Benjamîna mba handray anjara amin’ny fizaràn-tany
  - type: note
    content: 'fizaràn-tany: ny andalan-teny maromaro toy ny Is 34.17; Sal 16.5-6, indrindra Mk 2.5 dia ahazoana mihevitra fa ny fizaràn-tany toy izao dia nitranga isaky ny vanim-potoana. Dkt hafa «hizara ny lova ao amin’ny fianakaviany.»'
  - type: text
    content: ' ataon’ny fianakaviany. '
  '13':
  - type: text
    content: Kanjo raha vao nandalo teo am-bavahadin’i Benjamîna
  - type: note
    content: 'vavahadin’i Benjamîna: iray amin’ny fivoahana mianavaratra avy ao Jerosalema.'
  - type: text
    content: ' izy, dia nifanehatra tamin’ny lehiben’ny mpiambina atao hoe Jirià, zanakalahin’i Selemià sady zafikelin’i Hananià. Ary nosamborin’i Jirià i Jeremià mpaminany ka nataony hoe:'
  - type: text
    content: –Miandany amin’ny Babilônianina ianao.
  '14':
  - type: text
    content: 'Fa novalian’i Jeremià hoe:'
  - type: text
    content: –Lainga izany, tsy miandany amin’ny Babilônianina aho.
  - type: text
    content: 'Nefa tsy nino izany i Jirià fa nisambotra an’i Jeremià ary nitondra azy ho any amin’ny lehibeny. '
  '15':
  - type: text
    content: 'Tezitra tamin’i Jeremià kosa ireto ka nikapoka azy sady nanagadra azy tao an-tranon’i Jônatàna mpitantsora-panjakana. '
  '16':
  - type: text
    content: Ary naiditra tao amin’ilay efitra miendrika an-dohalambo i Jeremià.
  - type: text
    content: 'Efa ela nitoerana tao amin’io tranomaizina io Jeremià '
  '17':
  - type: text
    content: 'no nanirahan’i Tsedekià olona haka azy mba hanontaniany mangina tao an-dapany hoe:'
  - type: text
    content: –Moa misy hafatry ny TOMPO tokoa va ho ahy?
  - type: text
    content: 'Ka novalian’i Jeremià hoe:'
  - type: text
    content: '–Eny, dia inty: «Hatolotra eo an-tanan’ny mpanjakan’i Babilôna ianao.»'
  '18':
  - type: text
    content: 'Ary hoy koa i Jeremià tamin’i Tsedekià mpanjaka:'
  - type: text
    content: '–Inona no heloka nataoko taminao na tamin’ny manamboninahitrao na tamin’ny mponina eto amin’ity tanàna ity no dia nataonareo an-tranomaizina aho? '
  '19':
  - type: text
    content: 'Ary nankaiza ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' izay naminany teo aminareo fa tsy ho tonga hanafika anareo na ity tanàna ity ny mpanjakan’i Babilôna?'
  '2':
  - type: text
    content: Kanefa, na i Tsedekià na ireo tandapany na ireo vahoakan’i Joda, dia samy tsy nihaino ny fampitandremana izay nampitain’ny TOMPO tamin’ny alalan’i Jeremià mpaminany.
  '20':
  - type: text
    content: 'Dia nampian’i Jeremià hoe:'
  - type: text
    content: '–Ankehitriny, ry andriamanjaka, miangavy anao aho mba hihaino ny fangatahana ataoko eo anatrehanao: Aza averina any an-tranon’i Jônatàna mpitantsora-panjakana intsony aho, fandrao maty ao.'
  '21':
  - type: text
    content: Dia nanome baiko i Tsedekià mpanjaka mba hapetraka eo an-kianjan’ny trano fiambenana i Jeremià sady homena mofo boribory iray isan’andro avy ao amin’ny lalankelin’ny Mpanao mofo mandra-pahalanin’ny mofo rehetra ao an-tanàna. Toy izany no nijanonan’i Jeremià tao an-kianjan’ny trano fiambenana.
  '3':
  - type: text
    content: 'I Tsedekià mpanjaka kosa dia naniraka an’i Jokaly, zanakalahin’i Selemià ary koa i Tsefanià mpisorona, zanakalahin’i Mahaseià ho any amin’i Jeremià mpaminany ihany hanao aminy hoe:'
  - type: text
    content: –Miangavy anao aho mba hivavaka ho anay amin’ny TOMPO Andriamanitsika.
  '4':
  - type: text
    content: 'Tamin’izay fotoana izay dia tsy mbola voatana an-tranomaizina i Jeremià, ka afaka nivezivezy malalaka. '
  '5':
  - type: text
    content: 'Ny tafiky ny '
  - type: text
    content: Farao
  - type: text
    content: ' dia efa niainga avy tany Ejipta rahateo; koa raha nandre izany ny Babilônianina, izay teo am-panaovana fahirano an’i Jerosalema, dia nihataka kely niala an’i Jerosalema. '
  '6':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO ho an’i Jeremià mpaminany manao hoe: '
  '7':
  - type: text
    content: '«Izao no lazain’ny TOMPO Andriamanitr’i Israely: ‹Ny mpanjakan’i Joda izay naniraka anareo hanontany Ahy dia ilazao hoe: Ny tafiky ny Farao, izay efa niainga mba hamonjy anareo, dia niverina ilalana ka nody any Ejipta. '
  '8':
  - type: text
    content: 'Ho avy indray kosa ny Babilônianina hanafika ity tanàna ity ka hahazo azy sady handoro azy amin’ny afo. '
  '9':
  - type: text
    content: 'Ary izao koa no lazaiko aminareo: Aza mamita-tena foana ka hihevitra fa lasa tanteraka ny Babilônianina, satria tsy nandeha velively ireo! '
