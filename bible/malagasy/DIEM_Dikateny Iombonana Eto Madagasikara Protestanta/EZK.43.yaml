document_id: EZK.43,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miverina ao amin’ny tempoly Andriamanitra
  - type: text
    content: 'Ary nentin-dralehilahy hankeo amin’ny vavahady atsinanana aho. '
  '10':
  - type: text
    content: '«Ianao, ry ilay taranak’olombelona, visavisao amin’ny Israelita ny tempoly. Aoka ho menatra ny amin’ny helony izy ary handinika izao drafi-panorenana izao. '
  '11':
  - type: text
    content: 'Raha menatra ny amin’izay rehetra nataony tokoa izy, dia asehoy azy ny sarin’ny tempoly miaraka amin’ny fitsitokotokoan’ny trano ary koa ireo vavahady miditra sy mivoaka, izany hoe ny drafitra ankapobeny. Ataovy an-tsoratra eo ambany masony avokoa ny lalàna sy fepetra amam-pitsipika tsy maintsy arahiny mba hahafahany mitandrina sy mampihatra azy. '
  '12':
  - type: text
    content: 'Izao no foto-pitsipika momba ny tempoly: ny faritra manontolo eo an-tampon-tendrombohitra sy manodidina dia tena voatokana ho an’Andriamanitra. Eny, izany no foto-pitsipika momba ny tempoly.»'
  - type: heading
    content: Ny alitara sy ny sorona isan-karazany
  '13':
  - type: text
    content: 'Ireto avy no refin’ny '
  - type: text
    content: alitara
  - type: text
    content: ', araka ny fandrefesana fampiasa ankehitriny. Ny halalin’ny tatatra manodidina azy dia dimampolo santimetatra; ny velarany dia dimampolo santimetatra ary ny morony manodidina dia niavo 25 santimetatra. Izao kosa ny amin’ny haavon’ny alitara: '
  '14':
  - type: text
    content: 'nisy iray metatra manomboka eo am-potony ambony tatatra ka hatramin’ny marin-tampona ambany izay efamira dimampolo santimetatra avy ny lafiny tsirairay. Nisy roa metatra manomboka amin’io marin-tampona ambany io ka hatramin’ny marin-tampona manaraka izay efamira dimampolo santimetatra avy ny lafiny tsirairay. '
  '15':
  - type: text
    content: 'Ny fanambonin’ny alitara, izay misy ny fatana, dia roa metatra ny haavony, ka tandroka efatra no teo amin’ny zorony efatra. '
  '16':
  - type: text
    content: 'Efamira ny fatana ka enina metatra avy ny lafiny tsirairay. '
  '17':
  - type: text
    content: Efamira ihany koa ny marin-tampona ambony ka fito metatra avy ny lafiny tsirairay. Ny morony manodidina dia niavo 25 santimetatra; ary ny velaran’ny tatatra manodidina dia dimampolo santimetatra. Ny tohatohatra fiakarana eo dia manatrika ny atsinanana.
  '18':
  - type: text
    content: 'Ary hoy ralehilahy tamiko: «Ry ilay taranak’olombelona, izao no lazain’ny Tompo ANDRIANANAHARY: Ireto no lalàna arahina rehefa vita ny alitara mba hanolorana '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo eo ary hamafazana ram-biby aminy. '
  '19':
  - type: text
    content: Homenao ombilahy iray ny Levita mpisorona, taranak’i Tsadôka
  - type: note
    content: 'taranak’i Tsadôka: jereo ny naoty momba ny 40.46.'
  - type: text
    content: ', izay hany mahazo manompo Ahy; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Ho sorona fanalana ny ota io ombilahy io. '
  '2':
  - type: text
    content: Koa hitako tonga avy any atsinanana ny voninahitr’ilay Andriamanitr’i Israely
  - type: note
    content: Ny voninahitr’ilay Andriamanitra izay hitan’i Ezekiela nihataka nanalavitra niantsinanana (jereo 10.19; 11.23) dia efa niverina izao (and 4).
  - type: text
    content: '; narahina feo tahaka ny firohondrohon’ny ranomasina izany ary nanazava ny tany tamin’ny famirapiratany. '
  '20':
  - type: text
    content: 'Dia hangalanao ny rany ka hatentinao amin’ny tandroka efatry ny alitara sy amin’ny zorony efatry ny marin-tampona ambony ary amin’ny morony manodidina. Toy izany no '
  - type: text
    content: hanadiovanao
  - type: text
    content: ' ny alitara sy hanokananao azy. '
  '21':
  - type: text
    content: 'Avy eo dia halainao ny ombilahy natolotra ho sorona fanalana ny ota ka hodorana eo amin’ny faritra voatokana ho an’izany ao an-tempoly, any ivelan’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ny andro faharoa dia haka osilahy tsy misy kilema ianao ary hanolotra azy ho sorona fanalana ny ota ihany koa. Hataonao ny fanadiovana ny alitara tahaka izay efa nataonao tamin’ny ombilahy. '
  '23':
  - type: text
    content: 'Rehefa vita io sorona io, dia haka ombilahy iray sy ondrilahy iray tsy misy kilema ianao. '
  '24':
  - type: text
    content: Manoloana Ahy TOMPO no hitondranao ireo ka handrarahan’ny mpisorona sira eo amboniny
  - type: note
    content: Ny sira dia manadio (jereo Eks 30.35; 2 Mp 2.20) ary indraindray aza dia mariky ny fanekempihavanana (jereo Lev 2.13; Nom 18.19).
  - type: text
    content: ' ary hatolony ho sorona dorana manontolo ho Ahy TOMPO. '
  '25':
  - type: text
    content: 'Isan’andro isan’andro, mandritra ny herinandro, dia hanolotra osilahy iray ho sorona fanalana ny ota ianao ary koa ombilahy iray sy ondrilahy iray tsy misy kilema. '
  '26':
  - type: text
    content: 'Koa mandritra ny fito andro no hanaovam-panavotana ny alitara ka hanadiovana azy sy hanokanana azy. '
  '27':
  - type: text
    content: Rehefa tapitra ny herinandro ka mitehina ny andro fahavalo, dia hahazo manolotra sorona dorana manontolo sy sorom-pihavanana eo amin’ny alitara ny mpisorona. Amin’izay dia ho sitrako ianareo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '3':
  - type: text
    content: Io fahitana io dia mitovy amin’ireo fahitana hitako fony Andriamanitra tonga handrava an’i Jerosalema sy fony aho teo amoron’ny ony Kebara
  - type: note
    content: 'amoron’ny ony Kebara: jereo 1.1-3.'
  - type: text
    content: '; koa lavo nihohoka nitehi-tany aho. '
  '4':
  - type: text
    content: Ary ny voninahitry ny TOMPO dia niditra tao an-
  - type: text
    content: tempoly
  - type: text
    content: ' avy eo amin’ny vavahady atsinanana. '
  '5':
  - type: text
    content: 'Ary ny Fanahin’Andriamanitra nanainga ahy avy amin’ny tany ka nitondra ahy hankeo amin’ny kianja anatiny; ary hitako nameno ny tempoly ny voninahitry ny TOMPO. '
  '6':
  - type: text
    content: 'Dia reko nisy niteny tamiko avy tao an-tempoly, kanefa ilay lehilahy nitarika ahy dia teo anilako ihany. '
  '7':
  - type: text
    content: 'Ary hoy ny Tompo tamiko: «Ry ilay taranak’olombelona, ity toerana ity no misy ny sezafiandrianako, eto no fametrahako ny tongotro. Eto no honenako mandrakizay eo anivon’ny Israelita. Na ny vahoakan’i Israely na ny mpanjakany dia tsy hanala baràka ny anarako masina intsony amin’ny fanompoan-tsampy sy amin’ny fandevenana ny fatin’ireo mpanjakany eto'
  - type: note
    content: 'ny fandevenana ny fatin’ireo mpanjakany eto: ny fasan’ny mpanjaka tao Jerosalema dia tao anatin’ny tanàna (jereo 1 Mp 2.10; 11.43) tamin’ireo trano niankina tamin’ny lapan’ny mpanjaka izay mifanolotra amin’ny tempoly (jereo and 8 sy 1 Mp 7.12); dkt hafa ny fananganana tsangambato eto ho an’ireo mpanjakany maty.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Napetraky ny mpanjakany teo anilan’ny tokonana sy tolam-bavahadin’ny tempoliko ny tokonana sy tolam-bavahadin’ny lapany, hany ka rindrina iray sisa no nanelanelana ny tranony sy ny tranoko. Nanala baràka ny anarako tamin’ireo zavatra maharikoriko nataony izy, hany ka naringako tamim-pahatezerana. '
  '9':
  - type: text
    content: Ankehitriny kosa hariany lavitra Ahy ny fanompoan-tsampiny sy ny fatin’ireo mpanjakany; ka dia honina mandrakizay eo aminy Aho.
