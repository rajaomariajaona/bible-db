document_id: EZK.43
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miverina ao amin’ny tempoly Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nentin-dralehilahy hankeo amin’ny vavahady atsinanana aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa hitako tonga avy any atsinanana ny voninahitr’ilay Andriamanitr’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.2 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny voninahitr’ilay Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay hitan’i Ezekiela nihataka nanalavitra niantsinanana (jereo 10.19; 11.23) dia efa niverina izao (and 4).
    marker-yv: yv-n
  - type: text
    text: '; narahina feo tahaka ny firohondrohon’ny ranomasina izany ary nanazava ny tany tamin’ny famirapiratany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Io fahitana io dia mitovy amin’ireo fahitana hitako fony Andriamanitra tonga handrava an’i Jerosalema sy fony aho teo amoron’ny ony Kebara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'amoron’ny ony Kebara: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.1-3.
    marker-yv: yv-n
  - type: text
    text: '; koa lavo nihohoka nitehi-tany aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny voninahitry ny TOMPO dia niditra tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' avy eo amin’ny vavahady atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny Fanahin’Andriamanitra nanainga ahy avy amin’ny tany ka nitondra ahy hankeo amin’ny kianja anatiny; ary hitako nameno ny tempoly ny voninahitry ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia reko nisy niteny tamiko avy tao an-tempoly, kanefa ilay lehilahy nitarika ahy dia teo anilako ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny Tompo tamiko: «Ry ilay taranak’olombelona, ity toerana ity no misy ny sezafiandrianako, eto no fametrahako ny tongotro. Eto no honenako mandrakizay eo anivon’ny Israelita. Na ny vahoakan’i Israely na ny mpanjakany dia tsy hanala baràka ny anarako masina intsony amin’ny fanompoan-tsampy sy amin’ny fandevenana ny fatin’ireo mpanjakany eto'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny fandevenana ny fatin’ireo mpanjakany eto: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny fasan’ny mpanjaka tao Jerosalema dia tao anatin’ny tanàna (jereo 1 Mp 2.10; 11.43) tamin’ireo trano niankina tamin’ny lapan’ny mpanjaka izay mifanolotra amin’ny tempoly (jereo and 8 sy 1 Mp 7.12); dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny fananganana tsangambato eto ho an’ireo mpanjakany maty
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Napetraky ny mpanjakany teo anilan’ny tokonana sy tolam-bavahadin’ny tempoliko ny tokonana sy tolam-bavahadin’ny lapany, hany ka rindrina iray sisa no nanelanelana ny tranony sy ny tranoko. Nanala baràka ny anarako tamin’ireo zavatra maharikoriko nataony izy, hany ka naringako tamim-pahatezerana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ankehitriny kosa hariany lavitra Ahy ny fanompoan-tsampiny sy ny fatin’ireo mpanjakany; ka dia honina mandrakizay eo aminy Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Ianao, ry ilay taranak’olombelona, visavisao amin’ny Israelita ny tempoly. Aoka ho menatra ny amin’ny helony izy ary handinika izao drafi-panorenana izao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha menatra ny amin’izay rehetra nataony tokoa izy, dia asehoy azy ny sarin’ny tempoly miaraka amin’ny fitsitokotokoan’ny trano ary koa ireo vavahady miditra sy mivoaka, izany hoe ny drafitra ankapobeny. Ataovy an-tsoratra eo ambany masony avokoa ny lalàna sy fepetra amam-pitsipika tsy maintsy arahiny mba hahafahany mitandrina sy mampihatra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no foto-pitsipika momba ny tempoly: ny faritra manontolo eo an-tampon-tendrombohitra sy manodidina dia tena voatokana ho an’Andriamanitra. Eny, izany no foto-pitsipika momba ny tempoly.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alitara sy ny sorona isan-karazany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireto avy no refin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ', araka ny fandrefesana fampiasa ankehitriny. Ny halalin’ny tatatra manodidina azy dia dimampolo santimetatra; ny velarany dia dimampolo santimetatra ary ny morony manodidina dia niavo 25 santimetatra. Izao kosa ny amin’ny haavon’ny alitara: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'nisy iray metatra manomboka eo am-potony ambony tatatra ka hatramin’ny marin-tampona ambany izay efamira dimampolo santimetatra avy ny lafiny tsirairay. Nisy roa metatra manomboka amin’io marin-tampona ambany io ka hatramin’ny marin-tampona manaraka izay efamira dimampolo santimetatra avy ny lafiny tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny fanambonin’ny alitara, izay misy ny fatana, dia roa metatra ny haavony, ka tandroka efatra no teo amin’ny zorony efatra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Efamira ny fatana ka enina metatra avy ny lafiny tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Efamira ihany koa ny marin-tampona ambony ka fito metatra avy ny lafiny tsirairay. Ny morony manodidina dia niavo 25 santimetatra; ary ny velaran’ny tatatra manodidina dia dimampolo santimetatra. Ny tohatohatra fiakarana eo dia manatrika ny atsinanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy ralehilahy tamiko: «Ry ilay taranak’olombelona, izao no lazain’ny Tompo ANDRIANANAHARY: Ireto no lalàna arahina rehefa vita ny alitara mba hanolorana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo eo ary hamafazana ram-biby aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Homenao ombilahy iray ny Levita mpisorona, taranak’i Tsadôka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'taranak’i Tsadôka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny naoty momba ny 40.46.
    marker-yv: yv-n
  - type: text
    text: ', izay hany mahazo manompo Ahy; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Ho sorona fanalana ny ota io ombilahy io. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hangalanao ny rany ka hatentinao amin’ny tandroka efatry ny alitara sy amin’ny zorony efatry ny marin-tampona ambony ary amin’ny morony manodidina. Toy izany no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hanadiovanao
  - type: text
    text: ' ny alitara sy hanokananao azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Avy eo dia halainao ny ombilahy natolotra ho sorona fanalana ny ota ka hodorana eo amin’ny faritra voatokana ho an’izany ao an-tempoly, any ivelan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny andro faharoa dia haka osilahy tsy misy kilema ianao ary hanolotra azy ho sorona fanalana ny ota ihany koa. Hataonao ny fanadiovana ny alitara tahaka izay efa nataonao tamin’ny ombilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa vita io sorona io, dia haka ombilahy iray sy ondrilahy iray tsy misy kilema ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Manoloana Ahy TOMPO no hitondranao ireo ka handrarahan’ny mpisorona sira eo amboniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sira '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia manadio (jereo Eks 30.35; 2 Mp 2.20) ary indraindray aza dia mariky ny fanekempihavanana (jereo Lev 2.13; Nom 18.19).
    marker-yv: yv-n
  - type: text
    text: ' ary hatolony ho sorona dorana manontolo ho Ahy TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Isan’andro isan’andro, mandritra ny herinandro, dia hanolotra osilahy iray ho sorona fanalana ny ota ianao ary koa ombilahy iray sy ondrilahy iray tsy misy kilema. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa mandritra ny fito andro no hanaovam-panavotana ny alitara ka hanadiovana azy sy hanokanana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Rehefa tapitra ny herinandro ka mitehina ny andro fahavalo, dia hahazo manolotra sorona dorana manontolo sy sorom-pihavanana eo amin’ny alitara ny mpisorona. Amin’izay dia ho sitrako ianareo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
