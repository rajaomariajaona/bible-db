    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO Andriamanitra dia niteny hentitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’ny Mpanjaka Tompoko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mipetraha amin’ny sezafiandrianana eto ankavanako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa hanao ny fahavalonao ho fitoeran-tongotrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'eto ankavanako: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 16.11 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fitoeran-tongotra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Sal 99.5 sy nta; Sal 18.39 sy nta. –Ity and ity dia matetika voatsiahy ao amin’ny Test. V.: Mk 12.36; 14.62; 16.19; ary ao amin’ny and mirazotra raketin’ny Mt sy Lio; Asa 2.34-35; Rm 8.34; 1 Kôr 15.25; Ef 1.20; Kôl 3.1; Heb 1.3,13; 8.1; 10.12-13; 12.2.'
      marker-yv: yv-n
    - type: text
      text: .»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Avy eo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' anie ny TOMPO Andriamanitra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanitatra ny fahefàm-pitondranao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie hiharan’ny fanapahanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anivon’ireo fahavalonao manodidina Anao!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Miaramila voafantina no miaraka aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro amorianao ny tafikao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny amin’ny tendrombohitra masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanatona Anao ireo zatovolahinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ando napoitran’ny mazavatsinanana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nataon’ny TOMPO Andriamanitra taminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mba hiverenany intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izao tenim-pianianana izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao no Mpisorona mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny fomban’i Melkitsedèka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Melkitsedèka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 14.18; Heb 5.6,10; 6.20; 7.3,17.21.
      marker-yv: yv-n
    - type: text
      text: .»
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Andriamanitra ô, efa eo ankavananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Tompo Mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mpanjaka maro no haripany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro fahatezerany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hampiharany famaizana ireo firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hataony feno faty ny toeram-piadiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: filoha maro no haripany manerana ny tany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia ny sakeli-drano ao an-dohasaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hisotroan’ity Mpanjaka eny an-dalana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Toa mampahatsiaro fanokanana mpanjaka izany: jereo 1 Mp 1,9.33-35.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany sy izany no hampitraka Azy ho mpandresy.
