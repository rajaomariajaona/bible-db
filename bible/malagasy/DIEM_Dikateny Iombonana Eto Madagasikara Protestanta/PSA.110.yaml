document_id: PSA.110,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Sady mpanjaka no mpisorona
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: Ny TOMPO Andriamanitra dia niteny hentitra
  - type: text
    content: 'tamin’ny Mpanjaka Tompoko hoe:'
  - type: text
    content: «Mipetraha amin’ny sezafiandrianana eto ankavanako.
  - type: text
    content: Izaho kosa hanao ny fahavalonao ho fitoeran-tongotrao
  - type: note
    content: 'eto ankavanako: jereo Sal 16.11 sy nta. –fitoeran-tongotra: jereo Sal 99.5 sy nta; Sal 18.39 sy nta. –Ity and ity dia matetika voatsiahy ao amin’ny Test. V.: Mk 12.36; 14.62; 16.19; ary ao amin’ny and mirazotra raketin’ny Mt sy Lio; Asa 2.34-35; Rm 8.34; 1 Kôr 15.25; Ef 1.20; Kôl 3.1; Heb 1.3,13; 8.1; 10.12-13; 12.2.'
  - type: text
    content: .»
  '2':
  - type: text
    content: 'Avy eo '
  - type: text
    content: Tsiôna
  - type: text
    content: ' anie ny TOMPO Andriamanitra'
  - type: text
    content: no hanitatra ny fahefàm-pitondranao!
  - type: text
    content: Enga anie hiharan’ny fanapahanao
  - type: text
    content: eo anivon’ireo fahavalonao manodidina Anao!
  '3':
  - type: text
    content: Miaramila voafantina no miaraka aminao
  - type: text
    content: amin’ny andro amorianao ny tafikao.
  - type: text
    content: Eny amin’ny tendrombohitra masina
  - type: text
    content: no hanatona Anao ireo zatovolahinao
  - type: text
    content: toy ny ando napoitran’ny mazavatsinanana.
  '4':
  - type: text
    content: Nataon’ny TOMPO Andriamanitra taminao
  - type: text
    content: sady tsy mba hiverenany intsony
  - type: text
    content: 'izao tenim-pianianana izao:'
  - type: text
    content: «Ianao no Mpisorona mandrakizay
  - type: text
    content: araka ny fomban’i Melkitsedèka
  - type: note
    content: 'Melkitsedèka: jereo Gen 14.18; Heb 5.6,10; 6.20; 7.3,17.21.'
  - type: text
    content: .»
  '5':
  - type: text
    content: Andriamanitra ô, efa eo ankavananao
  - type: text
    content: ilay Tompo Mpanjaka;
  - type: text
    content: dia mpanjaka maro no haripany
  - type: text
    content: amin’ny andro fahatezerany.
  '6':
  - type: text
    content: Hampiharany famaizana ireo firenena
  - type: text
    content: ka hataony feno faty ny toeram-piadiana;
  - type: text
    content: filoha maro no haripany manerana ny tany.
  '7':
  - type: text
    content: Dia ny sakeli-drano ao an-dohasaha
  - type: text
    content: no hisotroan’ity Mpanjaka eny an-dalana
  - type: note
    content: 'Toa mampahatsiaro fanokanana mpanjaka izany: jereo 1 Mp 1,9.33-35.'
  - type: text
    content: .
  - type: text
    content: Izany sy izany no hampitraka Azy ho mpandresy.
