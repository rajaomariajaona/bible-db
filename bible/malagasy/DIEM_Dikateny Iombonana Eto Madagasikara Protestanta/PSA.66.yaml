document_id: PSA.66,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fiderana an’Andriamanitra mpanafaka
  - type: text
    content: ' '
  - type: text
    content: Tononkira tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Salamo.
  - type: text
    content: Mihobia an’Andriamanitra, ry mponina eran-tany.
  '10':
  - type: text
    content: Nozahanao toetra izahay, Andriamanitra ô,
  - type: text
    content: nosedrainao toa volafotsy anaty memy,
  '11':
  - type: text
    content: nampidirinao am-pandrika
  - type: text
    content: sy novesaranao fitsapana.
  '12':
  - type: text
    content: Olon-dratsy no navelanao hanosihosy anay;
  - type: text
    content: izahay dia voatery namaky afo sy rano,
  - type: text
    content: kanjo nafahanao ihany
  - type: text
    content: sy nampahazoinao aina.
  '13':
  - type: text
    content: 'Koa mitondra '
  - type: text
    content: sorona
  - type: text
    content: ' eto an-'
  - type: text
    content: tranonao
  - type: text
    content: ' aho'
  - type: text
    content: 'hanefako ny '
  - type: text
    content: voady
  - type: text
    content: ' nataoko taminao,'
  '14':
  - type: text
    content: dia izay voady notononiko
  - type: text
    content: fony izaho tao an-katerena.
  '15':
  - type: text
    content: Biby matavy no atolotro hodorana,
  - type: text
    content: ombilahy sy ondrilahy ary osilahy,
  - type: text
    content: ka dia handraraka tsara ny etony.
  - type: text
    content: Fiatoana
  '16':
  - type: text
    content: Ianareo mpanaja an’Andriamanitra,
  - type: text
    content: tongava daholo mba hihaino
  - type: text
    content: fa hotantaraiko izay nataony tamiko.
  '17':
  - type: text
    content: Vao nanomboka niantso Azy aho,
  - type: text
    content: dia fiderana sahady no nambarako.
  '18':
  - type: text
    content: Raha heloka no mamiko ka tsy nifonako,
  - type: text
    content: dia tsy ho nihaino ahy akory ny Tompo.
  '19':
  - type: text
    content: Kanefa nihaino Andriamanitra,
  - type: text
    content: tena reny tokoa ny fivavako.
  '2':
  - type: text
    content: Ihirao salamo Izy satria be voninahitra.
  - type: text
    content: Tolory voninahitra Izy amin’ny fiderànareo.
  '20':
  - type: text
    content: Hisaorana anie Andriamanitra,
  - type: text
    content: fa tsy mba nolaviny ny fivavako
  - type: text
    content: ary tsy nalany tamiko ny fitiavany!
  '3':
  - type: text
    content: 'Lazao amin’Andriamanitra hoe:'
  - type: text
    content: «Endrey mampitolagaga ny asanao!
  - type: text
    content: Lehibe dia lehibe tokoa ity herinao,
  - type: text
    content: ka indro fa ikoizan’ny fahavalonao.
  '4':
  - type: text
    content: Hiankohoka aminao anie ny mponina eran-tany,
  - type: text
    content: sy hihira salamo ho Anao Andriamanitra,
  - type: text
    content: eny, hihira salamo ho fanajana Anao!»
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Tongava hizaha ny asan’Andriamanitra;
  - type: text
    content: 'mitolagaga ny olombelona amin’ity ataony:'
  '6':
  - type: text
    content: ny ranomasina novany ho tany maina,
  - type: text
    content: nitan’ny razanay an-tongotra ny ony
  - type: note
    content: Jereo Sal 74.15; 78.13; 106.9; 114.3,5; Eks 14.16,21-22; Jos 3.15-16; Is 44.27; 50.2.
  - type: text
    content: .
  - type: text
    content: Aoka hifaliantsika eto izany asany izany!
  '7':
  - type: text
    content: Mahery Izy ka mifehy mandrakizay;
  - type: text
    content: arahiny maso ny firenena isan-tokony
  - type: text
    content: ka ny mpikomy dia tsy ho afa-mitraka.
  - type: text
    content: Fiatoana
  '8':
  - type: text
    content: Rey vahoaka, isaory ilay Andriamanitray,
  - type: text
    content: ataovy maredona ny fiderana Azy,
  '9':
  - type: text
    content: satria Izy no mahavelona aina anay;
  - type: text
    content: tsy navelany ho solafa-mamindra izahay.
