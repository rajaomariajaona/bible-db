    text: Raha heloka no mamiko ka tsy nifonako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho nihaino ahy akory ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Kanefa nihaino Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tena reny tokoa ny fivavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hisaorana anie Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mba nolaviny ny fivavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nalany tamiko ny fitiavany!
