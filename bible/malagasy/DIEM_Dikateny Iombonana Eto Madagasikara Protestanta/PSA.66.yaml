    - type: text
      text: '10'
  - type: text
    text: Nozahanao toetra izahay, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nosedrainao toa volafotsy anaty memy,
- type: usfm
  marker: q1
