      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny lehilahy mahery tsy afa-mamonjy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa dia eto afovoanay Ianao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izahay dia natokana ho Anao, koa aza arianao.
  - type: usfm
    marker: s1
