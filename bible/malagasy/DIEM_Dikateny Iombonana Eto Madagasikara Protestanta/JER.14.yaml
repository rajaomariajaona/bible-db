document_id: JER.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tamin’ny fotoanan’ny hain-tany
  - type: text
    content: Tenin’ny TOMPO tamin’i Jeremià noho ny hain-tany
  - type: note
    content: Io and io dia karazana lohahevitra ho an’ny 14.1–15.4.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Izao no lazain’ny TOMPO ny amin’ity vahoaka ity: «Eny, tia mirenireny izy ka tsy mahajanona ny tongony». Tsy sitraky ny TOMPO anefa ity vahoaka ity. Ankehitriny dia ampahatsiahiviny azy ny hadisoany ary valiany ny helony.'
  '11':
  - type: text
    content: 'Ary hoy ny TOMPO tamiko:'
  - type: text
    content: '–Aza mivavaka amiko mba hanasoa ity vahoaka ity intsony. '
  '12':
  - type: text
    content: 'Fa na dia '
  - type: text
    content: mifady hanina
  - type: text
    content: ' aza izy, dia tsy hihaino ny fangatahany Aho. Ary na manao sorona dorana manontolo sy fanatitra hanina aza izy, dia tsy sitrako fa haripako amin’ny ady sy ny mosary ary ny areti-mandringana'
  - type: note
    content: 'ady, mosary, areti-mandringana: jereo 21.7-9; 24.10; 27.8,13; 29.17-18; 32.24,36; 38.2; 42.17; ampit 5.12; 28.8.'
  - type: text
    content: .
  '13':
  - type: text
    content: 'Fa namaly aho hoe:'
  - type: text
    content: '–Indrisy, ry Tompo ANDRIANANAHARY ô! Indreo ny mpaminany milaza aminy hoe: «Tsy hiharan’ny ady na ny mosary ianareo, fa Andriamanitra mihitsy no hanome fiadanana marina ho anareo eto amin’ity toerana ity.»'
  '14':
  - type: text
    content: 'Dia hoy ny TOMPO tamiko:'
  - type: text
    content: '–Mandainga ireo mpaminany niteny tamin’ny anarako ireo, fa tsy naniraka na nandidy azy akory Aho ary tsy niteny taminy koa. Izay ambarany aminareo dia fahitana mandainga, vinavina tsy misy dikany, fitaka noforomporoniny. '
  '15':
  - type: text
    content: 'Koa Izaho TOMPO no milaza ny amin’ireo mpaminany ireo hoe: Tsy naniraka azy Aho nefa nihambo haminany amin’ny anarako izy fa tsy hisy ady na mosary na areti-mandringana eto amin’ity tany ity. Koa ny ady sy mosary tokoa no handringana azy hatramin’ny farany. '
  '16':
  - type: text
    content: Ary ny vahoaka izay naminaniany koa dia hitsitra eny an-dalamben’i Jerosalema noho ny ady sy ny mosary ka tsy hisy handevina ireo olona ireo, na ny vadiny na ny zanany lahy na ny zanany vavy. Izany no hanatsingerenako aminy ihany ny ratsy nataony.
  '17':
  - type: text
    content: 'Izao kosa no teny holazainao aminy:'
  - type: text
    content: Ny masoko anie hijononoka ranomaso
  - type: text
    content: andro aman’alina tsy an-kiato,
  - type: text
    content: satria goavana ny fahavoazan’ny vahoakako
  - type: text
    content: ary mafy dia mafy tokoa ny ratra nahazo azy.
  '18':
  - type: text
    content: Raha mivoaka eny an-tsaha aho,
  - type: text
    content: dia ireo matin-tsabatra no hitako;
  - type: text
    content: raha miditra an-tanàna aho,
  - type: text
    content: dia ireo matin’ny mosary no hitako.
  - type: text
    content: 'Ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy ny '
  - type: text
    content: mpisorona
  - type: text
    content: dia mivezivezy eo amin’ny tany,
  - type: text
    content: fa tsy mahalala na inona na inona.
  - type: heading
    content: (Ny vahoaka)
  '19':
  - type: text
    content: Tompo ô, efa narianao tokoa ve i Joda?
  - type: text
    content: 'Efa naharikoriko Anao ve i '
  - type: text
    content: Tsiôna
  - type: text
    content: '?'
  - type: text
    content: Nahoana no mikapoka mafy anay Ianao
  - type: text
    content: ka tsy misy mahasitrana anay?
  - type: text
    content: Nanantena fiadanana izahay
  - type: text
    content: kanjo tsy nisy soa akory,
  - type: text
    content: ary niandrandra fotoam-pahasitranana
  - type: text
    content: kanjo indro zava-mahatahotra.
  '2':
  - type: text
    content: Misaona ny vahoakan’i Joda,
  - type: text
    content: simba ireo tanàn-dehibeny;
  - type: text
    content: manjombona sy mipetraka amin’ny tany izy.
  - type: text
    content: Misandratra hatrany an-
  - type: text
    content: danitra
  - type: text
    content: ny fitarainan’i Jerosalema.
  '20':
  - type: text
    content: TOMPO ô, ekenay ny faharatsianay
  - type: text
    content: sy ny fahadisoan’ny razanay
  - type: text
    content: fa efa nanota taminao izahay.
  '21':
  - type: text
    content: Noho ny lazanao, dia aza hamavoina izahay
  - type: text
    content: ary noho ny sezafiandriananao be voninahitra
  - type: note
    content: 'sezafiandriananao be voninahitra: izay tsy isalasalana fa ny Vatamasina*. Jereo ny naoty momba ny Sal 99.5. Io fomba fiteny io anefa dia mety hilaza ny tempoly tao Jerosalema, na ny tanànan’i Jerosalema mihitsy aza.'
  - type: text
    content: dia aza atao tsinontsinona izahay.
  - type: text
    content: Tsarovy ka aza itsoahanao
  - type: text
    content: ny fanekempihavanana nataonao taminay.
  '22':
  - type: text
    content: Moa misy mahalatsaka orana ve
  - type: text
    content: ny sampin’ireo firenen-kafa?
  - type: text
    content: Moa ny lanitra va mampirotsaka oram-baratra
  - type: text
    content: fa tsy Ianao, ry TOMPO Andriamanitray?
  - type: text
    content: Koa mitoky aminao izahay
  - type: text
    content: satria Ianao no manao ireo rehetra ireo.
  '3':
  - type: text
    content: Irahin’ny lehibe mba haka rano
  - type: text
    content: ireo mpiasa madinika;
  - type: text
    content: tonga eo amin’ny lavaka fantsakana izy
  - type: text
    content: nefa tsy mahita rano intsony
  - type: text
    content: ka miverina mitondra siny foana,
  - type: text
    content: dia menatra sy mangaihay ary diso fanantenana.
  '4':
  - type: text
    content: Noho ny fangentan’ny tany
  - type: text
    content: fa tsy nisy orana latsaka taminy
  - type: text
    content: dia menatra sy diso fanantenana ny tantsaha.
  '5':
  - type: text
    content: Na ny dieravavy eny an-tsaha aza,
  - type: text
    content: dia mahafoy ny zanany vao teraka
  - type: text
    content: satria tsy misy ahi-maitso intsony.
  '6':
  - type: text
    content: Ny borikidia koa mijanona
  - type: text
    content: eny an-tendrombohitra mangadihady,
  - type: text
    content: ka mihanahana manambolo rivotra
  - type: text
    content: toy ny fanaon’ny amboadia.
  - type: text
    content: Jambena ny masony
  - type: text
    content: satria tsy misy ahitra intsony!
  - type: heading
    content: (Ny vahoaka)
  '7':
  - type: text
    content: TOMPO ô, miampanga anay ny fahadisoanay;
  - type: text
    content: nefa miasà Ianao ho voninahitry ny anaranao.
  - type: text
    content: Niodina taminao matetika izahay;
  - type: text
    content: taminao no nanotanay.
  '8':
  - type: text
    content: Ry fanantenàn’i Israely ô,
  - type: text
    content: ry mpamonjy azy amin’ny androm-pahoriana,
  - type: text
    content: nahoana no dia toy ny vahiny eo amin’ny tany Ianao
  - type: text
    content: sy toy ny mpandeha milasy indray alina monja?
  '9':
  - type: text
    content: Nahoana no tahaka ny olona ankona ianao
  - type: note
    content: Ankona na tsy misy hery; ny dkt grika tranainy dia ahitana hoe renoky ny torimaso.
  - type: text
    content: sy toy ny lehilahy mahery tsy afa-mamonjy?
  - type: text
    content: Kanefa dia eto afovoanay Ianao, TOMPO ô,
  - type: text
    content: ary izahay dia natokana ho Anao, koa aza arianao.
  - type: heading
    content: Tsy mahazo mivavaka ho an’ny vahoaka i Jeremià
