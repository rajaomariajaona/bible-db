        children:
        - type: text
          text: 'Ankona '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy misy hery
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; ny dkt grika tranainy dia ahitana hoe '
      - type: usfm
