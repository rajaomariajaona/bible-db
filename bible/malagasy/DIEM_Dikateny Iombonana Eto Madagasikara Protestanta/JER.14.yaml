  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa namaly aho hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indrisy, ry Tompo ANDRIANANAHARY ô! Indreo ny mpaminany milaza aminy hoe: «Tsy hiharan’ny ady na ny mosary ianareo, fa Andriamanitra mihitsy no hanome fiadanana marina ho anareo eto amin’ity toerana ity.»'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy ny TOMPO tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandainga ireo mpaminany niteny tamin’ny anarako ireo, fa tsy naniraka na nandidy azy akory Aho ary tsy niteny taminy koa. Izay ambarany aminareo dia fahitana mandainga, vinavina tsy misy dikany, fitaka noforomporoniny. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa Izaho TOMPO no milaza ny amin’ireo mpaminany ireo hoe: Tsy naniraka azy Aho nefa nihambo haminany amin’ny anarako izy fa tsy hisy ady na mosary na areti-mandringana eto amin’ity tany ity. Koa ny ady sy mosary tokoa no handringana azy hatramin’ny farany. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary ny vahoaka izay naminaniany koa dia hitsitra eny an-dalamben’i Jerosalema noho ny ady sy ny mosary ka tsy hisy handevina ireo olona ireo, na ny vadiny na ny zanany lahy na ny zanany vavy. Izany no hanatsingerenako aminy ihany ny ratsy nataony.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Izao kosa no teny holazainao aminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masoko anie hijononoka ranomaso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andro aman’alina tsy an-kiato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria goavana ny fahavoazan’ny vahoakako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mafy dia mafy tokoa ny ratra nahazo azy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha mivoaka eny an-tsaha aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo matin-tsabatra no hitako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha miditra an-tanàna aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo matin’ny mosary no hitako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mivezivezy eo amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mahalala na inona na inona.
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ny vahoaka)
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tompo ô, efa narianao tokoa ve i Joda?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Efa naharikoriko Anao ve i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mikapoka mafy anay Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy mahasitrana anay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanantena fiadanana izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo tsy nisy soa akory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary niandrandra fotoam-pahasitranana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo indro zava-mahatahotra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Misaona ny vahoakan’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: simba ireo tanàn-dehibeny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manjombona sy mipetraka amin’ny tany izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misandratra hatrany an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fitarainan’i Jerosalema.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: TOMPO ô, ekenay ny faharatsianay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fahadisoan’ny razanay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa nanota taminao izahay.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Noho ny lazanao, dia aza hamavoina izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary noho ny sezafiandriananao be voninahitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sezafiandriananao be voninahitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izay tsy isalasalana fa ny Vatamasina*. Jereo ny naoty momba ny Sal 99.5. Io fomba fiteny io anefa dia mety hilaza ny tempoly tao Jerosalema, na ny tanànan’i Jerosalema mihitsy aza.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aza atao tsinontsinona izahay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy ka aza itsoahanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanekempihavanana nataonao taminay.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moa misy mahalatsaka orana ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sampin’ireo firenen-kafa?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa ny lanitra va mampirotsaka oram-baratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy Ianao, ry TOMPO Andriamanitray?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mitoky aminao izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao no manao ireo rehetra ireo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Irahin’ny lehibe mba haka rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo mpiasa madinika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga eo amin’ny lavaka fantsakana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy mahita rano intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miverina mitondra siny foana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia menatra sy mangaihay ary diso fanantenana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Noho ny fangentan’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy nisy orana latsaka taminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia menatra sy diso fanantenana ny tantsaha.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Na ny dieravavy eny an-tsaha aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mahafoy ny zanany vao teraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy misy ahi-maitso intsony.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny borikidia koa mijanona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-tendrombohitra mangadihady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mihanahana manambolo rivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fanaon’ny amboadia.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jambena ny masony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy misy ahitra intsony!
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ny vahoaka)
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: TOMPO ô, miampanga anay ny fahadisoanay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa miasà Ianao ho voninahitry ny anaranao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niodina taminao matetika izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: taminao no nanotanay.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ry fanantenàn’i Israely ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mpamonjy azy amin’ny androm-pahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahoana no dia toy ny vahiny eo amin’ny tany Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny mpandeha milasy indray alina monja?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nahoana no tahaka ny olona ankona ianao
    - type: usfm
      marker: f
      children:
