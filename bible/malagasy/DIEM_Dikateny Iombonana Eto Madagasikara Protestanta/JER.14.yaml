    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tenin’ny TOMPO tamin’i Jeremià noho ny hain-tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Io and io dia karazana lohahevitra ho an’ny 14.1–15.4.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izao no lazain’ny TOMPO ny amin’ity vahoaka ity: «Eny, tia mirenireny izy ka tsy mahajanona ny tongony». Tsy sitraky ny TOMPO anefa ity vahoaka ity. Ankehitriny dia ampahatsiahiviny azy ny hadisoany ary valiany ny helony.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy ny TOMPO tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza mivavaka amiko mba hanasoa ity vahoaka ity intsony. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa na dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mifady hanina
    - type: text
      text: ' aza izy, dia tsy hihaino ny fangatahany Aho. Ary na manao sorona dorana manontolo sy fanatitra hanina aza izy, dia tsy sitrako fa haripako amin’ny ady sy ny mosary ary ny areti-mandringana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ady
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: mosary
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'areti-mandringana:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 21.7-9; 24.10; 27.8,13; 29.17-18; 32.24,36; 38.2; 42.17; ampit 5.12; 28.8.
      marker-yv: yv-n
    - type: text
