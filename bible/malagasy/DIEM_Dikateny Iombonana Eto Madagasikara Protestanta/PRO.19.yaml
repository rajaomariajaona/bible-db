document_id: PRO.19,396
type_code: plt
verses:
  '1':
  - type: text
    content: Aleo mahantra mizotra ho olom-banona
  - type: text
    content: toy izay mpanankarena milaza lainga.
  '10':
  - type: text
    content: Tsy mety ho an’ny adala ny miaina ao amin’ny renty,
  - type: text
    content: koa mainka ny hibaikoan’ny mpanompo ireo lehibeny.
  '11':
  - type: text
    content: Ny olona hendry mahafehy ny hatezerany,
  - type: text
    content: ary voninahitra ho azy ny manadino ny ratsy nozakainy.
  '12':
  - type: text
    content: Ny fahatezeran’ny mpanjaka
  - type: text
    content: dia mampatahotra toy ny fieron’ny liona;
  - type: text
    content: fa ny fitsimbinany kosa
  - type: text
    content: dia mahasoa toy ny ando amin’ny ahitra.
  '13':
  - type: text
    content: Ny zanaka adala dia fahoriana ho an’ny rainy;
  - type: text
    content: ny vehivavy tia ady kosa dia toy ny fantsona tsy mitsaha-mitete.
  '14':
  - type: text
    content: Trano aman-karena no lova avy amin-drazana;
  - type: text
    content: fa ny vady hendry kosa dia avy amin’ny TOMPO.
  '15':
  - type: text
    content: Ny hakamoana maharendremana,
  - type: text
    content: ka ny kibon’ny malaina ho noana.
  '16':
  - type: text
    content: Izay mitandro ny didy no miaro ny ainy;
  - type: text
    content: fa ho faty kosa izay tsy miraharaha ny toetrany.
  '17':
  - type: text
    content: Izay manome ny mahantra dia mampisambotra ny TOMPO,
  - type: text
    content: fa Izy ihany no hanonitra ny soa nataon’ilay mpiantra.
  '18':
  - type: text
    content: Faizo ny zanakao dieny mbola misy fanantenana;
  - type: text
    content: nefa aza sendaotra, fandrao mahafaty azy.
  '19':
  - type: text
    content: Mendrika handoa sazy ny olona lozabe;
  - type: text
    content: fa raha tsy atao izany izy, dia vao mainka hamerina indray.
  '2':
  - type: text
    content: Tsy tsara ny finiavana tsy ombàm-pahalalana;
  - type: text
    content: ary izay mirotoroto fandeha no ho tafintohina.
  '20':
  - type: text
    content: Henoy ny torohevitra ary raiso ny anatra
  - type: text
    content: mba hahatonga anao ho hendry any aoriana.
  '21':
  - type: text
    content: Maro ny tetika ao am-pon’ny olona,
  - type: text
    content: fa ny fikasan’ny TOMPO ihany no tanteraka.
  '22':
  - type: text
    content: Ny fitiavan-karenan’ny olona dia henatra ho azy;
  - type: text
    content: fa aleo mahantra toy izay mpandainga.
  '23':
  - type: text
    content: Ny fanajana ny TOMPO mitondra ho amin’ny fiainana,
  - type: text
    content: fa izany no hananam-piadanana sy tsy hahitan-doza
  - type: note
    content: Jereo 10.27 sy nta.
  - type: text
    content: .
  '24':
  - type: text
    content: Ny kamo mangarom-bilia amin’ny tanany,
  - type: text
    content: nefa tsy mahatonga izany ao am-bavany.
  '25':
  - type: text
    content: Kapohy ny mpaniratsira, dia ho hendry ny kely saina;
  - type: text
    content: anaro ny manan-tsaina fa ho takany ny fahalalana.
  '26':
  - type: text
    content: Ny zanaka mahamenatra sy manala baràka
  - type: text
    content: dia mampahory an-drainy sy mampidifidify an-dreniny.
  '27':
  - type: text
    content: Anaka, raha mitsahatra tsy mandray anatra ianao,
  - type: text
    content: dia hanadino faingana izay nianaranao.
  '28':
  - type: text
    content: Ny vavolombelona tsy vanona manevateva ny fitsarana,
  - type: text
    content: ary ny olon-dratsy dia fatra-pitelina haratsiana.
  '29':
  - type: text
    content: Ny famaizana dia natao ho an’ny mpaniratsira,
  - type: text
    content: ary ny kapoka ho amin’ny lamosin’ny adala.
  '3':
  - type: text
    content: Rehefa simban’ny hadalàny ny lalan’ny olona,
  - type: text
    content: dia ny TOMPO indray no itezeran’ny fony.
  '4':
  - type: text
    content: Ny mpanankarena dia manan-tsakaiza maro;
  - type: text
    content: fa ny mahantra kosa mety hilaozan’ilay hany sakaizany.
  '5':
  - type: text
    content: Tsy ho afa-maina ny vavolombelona mandainga;
  - type: text
    content: ary tsy ho dify famaizana ny mpamafy lainga.
  '6':
  - type: text
    content: Maro no mandokadoka ny olona ambony;
  - type: text
    content: ary ny besinimaro dia sakaizan’ny mpanome zavatra.
  '7':
  - type: text
    content: Ny ory tsy havan-drahalahy manana;
  - type: text
    content: koa mainka va tsy handao azy ny sakaizany?
  - type: text
    content: Fa na mbola miteny aminy aza ilay ory,
  - type: text
    content: dia efa tsy misy eo intsony ireo.
  '8':
  - type: text
    content: Izay mianatra misaina no tia ny tenany
  - type: text
    content: ary izay mitandro fahaiza-manavaka no hahita fahasambarana.
  '9':
  - type: text
    content: Tsy ho afa-maina ny vavolombelona mandainga,
  - type: text
    content: ary ho very ny mpamafy lainga.
