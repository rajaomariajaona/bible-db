document_id: PRO.19
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aleo mahantra mizotra ho olom-banona
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay mpanankarena milaza lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy tsara ny finiavana tsy ombàm-pahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mirotoroto fandeha no ho tafintohina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Rehefa simban’ny hadalàny ny lalan’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny TOMPO indray no itezeran’ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny mpanankarena dia manan-tsakaiza maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mahantra kosa mety hilaozan’ilay hany sakaizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy ho afa-maina ny vavolombelona mandainga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho dify famaizana ny mpamafy lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maro no mandokadoka ny olona ambony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny besinimaro dia sakaizan’ny mpanome zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny ory tsy havan-drahalahy manana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mainka va tsy handao azy ny sakaizany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa na mbola miteny aminy aza ilay ory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa tsy misy eo intsony ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mianatra misaina no tia ny tenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mitandro fahaiza-manavaka no hahita fahasambarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy ho afa-maina ny vavolombelona mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho very ny mpamafy lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy mety ho an’ny adala ny miaina ao amin’ny renty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mainka ny hibaikoan’ny mpanompo ireo lehibeny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny olona hendry mahafehy ny hatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary voninahitra ho azy ny manadino ny ratsy nozakainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fahatezeran’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mampatahotra toy ny fieron’ny liona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fitsimbinany kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mahasoa toy ny ando amin’ny ahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zanaka adala dia fahoriana ho an’ny rainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vehivavy tia ady kosa dia toy ny fantsona tsy mitsaha-mitete.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Trano aman-karena no lova avy amin-drazana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vady hendry kosa dia avy amin’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny hakamoana maharendremana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny kibon’ny malaina ho noana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay mitandro ny didy no miaro ny ainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho faty kosa izay tsy miraharaha ny toetrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay manome ny mahantra dia mampisambotra ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy ihany no hanonitra ny soa nataon’ilay mpiantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Faizo ny zanakao dieny mbola misy fanantenana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa aza sendaotra, fandrao mahafaty azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mendrika handoa sazy ny olona lozabe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha tsy atao izany izy, dia vao mainka hamerina indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Henoy ny torohevitra ary raiso ny anatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga anao ho hendry any aoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Maro ny tetika ao am-pon’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fikasan’ny TOMPO ihany no tanteraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fitiavan-karenan’ny olona dia henatra ho azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aleo mahantra toy izay mpandainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny fanajana ny TOMPO mitondra ho amin’ny fiainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izany no hananam-piadanana sy tsy hahitan-doza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 10.27 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny kamo mangarom-bilia amin’ny tanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy mahatonga izany ao am-bavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Kapohy ny mpaniratsira, dia ho hendry ny kely saina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: anaro ny manan-tsaina fa ho takany ny fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny zanaka mahamenatra sy manala baràka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mampahory an-drainy sy mampidifidify an-dreniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Anaka, raha mitsahatra tsy mandray anatra ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanadino faingana izay nianaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny vavolombelona tsy vanona manevateva ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny olon-dratsy dia fatra-pitelina haratsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny famaizana dia natao ho an’ny mpaniratsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny kapoka ho amin’ny lamosin’ny adala.
