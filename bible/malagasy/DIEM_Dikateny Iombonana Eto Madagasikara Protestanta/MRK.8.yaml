document_id: MRK.8,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omen’i Jesoa sakafo ny olona mihoatra ny efatra arivo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 15.32-39)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izany andro izany, dia vahoaka be indray no teo amin’i Jesoa ary tsy nanan-kohanina; ka nantsoin’i Jesoa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' ary nilazany hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ary raha vao vita izany, dia niondrana an-tsambokely Izy mbamin’ny mpianany ary lasa nankany amin’ny faritany atao hoe Dalmanotà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Dalmanotà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: faritany tsy dia fantatra mazava izay misy azy.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Angatahana famantarana i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 16.1-4)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia tonga ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' hiady hevitra amin’i Jesoa. Te hamandrika Azy ry zareo ka nangataka Azy hanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' ho porofo fa avy amin’Andriamanitra ny fahefany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nisento lalina i Jesoa ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana ny olona ankehitriny no mitady famantarana? Lazaiko marina aminareo fa tsy homena famantarana akory izy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia nandao azy ireo i Jesoa ary niondrana indray nankeny ampita.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny levioran’ny Farisianina sy ny an’i Herôda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 16.5-12)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hadinon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' ny nitondra mofo, ka tsy nisy afa-tsy mofo iray monja teo aminy tao an-tsambokely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia namepetra azy ireo i Jesoa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mbà malina ka mitandrema tsy ho voan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levioran’ny Farisianina
    - type: text
      text: ' sy ny levioran’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa iretsy mpianany kosa niady hevitra nifampilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Noho isika tsy nitondra mofo angaha izany!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tsikaritr’i Jesoa izany ka hoy Izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana ianareo no miady hevitra ny amin’ny tsy nitondranareo mofo? Mbola tsy takatrareo ary tsy fantatrareo foana ve? Fa dia mafy fo ve ianareo? '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mana-maso ianareo ka no tsy mahita, ary manan-tsofina ka no tsy mandre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jer 5.21; Ezek 12.2.
      marker-yv: yv-n
    - type: text
      text: '? Tsy tsaroanareo angaha? '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fony Aho nanapaka ireo mofo dimy haroso amin’ny vatan-dehilahy dimy arivo, sobika firy no voaangonareo feno ny tapa-mofo ambiny?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny navalin’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Sobika 12
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 6.35-44.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '–Mahonena Ahy ireto vahoaka, satria efa telo andro izao no teto amiko, ka tsy manan-kohanina intsony; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ary fony Aho nanapaka ireo mofo fito haroso amin’ny vatan-dehilahy efatra arivo, harona firy no voaangonareo feno ny tapa-mofo ambiny?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny navalin’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Harona fito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 8.1-9.
      marker-yv: yv-n
    - type: text
      text: '!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mbola tsy fantatrareo foana ve?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay jamba tao Betsaidà
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary tonga tao Betsaidà i Jesoa sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: '. Dia indreo nisy olona nitondra lehilahy jamba teo amin’i Jesoa, ka niangavy Azy hikasika ilay jamba. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia notantanan’i Jesoa ilay jamba, ka nentiny nankany ivelan’ny tanàna; dia nasiany rora ny mason’ilay jamba ary rehefa nametrahany tanana izy, dia nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mahita ve ianao?
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nitraka ralehilahy sady namaly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mahita aho, indreny ny olona fa tahaka ny hazo no ahitako azy, saingy izy mandehandeha.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia nametrahan’i Jesoa tanana fanindroany ny masony; ary nahiratry ralehilahy ny masony ka sitrana, ary dia nazava tsara no nahitany ny zavatra rehetra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nalefan’i Jesoa hody any an-tranony ralehilahy sady nilazany hoe: «Aza mankao an-tanàna!»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Petera ho Mesia i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 16.13-20; Lk 9.18-21)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia niainga i Jesoa sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' nankany amin’ireo tanàna kely manodidina an’i Kesaria-Filipo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kesaria-Filipo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna naorin’i Filipo Herôda, eo anilan’ny loharanon’i Jôrdàna, mba ho renivohitry ny fanjakany. I Banià no iantsoana azy ankehitriny.
      marker-yv: yv-n
    - type: text
      text: '; ary teny an-dalana, dia nanontany ny mpianany i Jesoa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa Aho, araka ny filazan’ny olona Ahy?
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy ny mpianany namaly Azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Misy manao hoe i Jôhany Mpanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: '; ny sasany kosa manao hoe i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Elià
    - type: text
      text: '; ary ny hafa indray manao hoe anankiray amin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminani
    - type: text
      text: n’Andriamanitra.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nanontany azy ireo indray i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa ianareo kosa, iza moa Aho aminareo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly i Petera ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianao no ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ary raha alefako mody tsy misakafo ireo, dia ho reraka eny an-dalana satria avy lavitra ny sasany.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nofeperan’i Jesoa ireo mpianany tsy hilazalaza momba Azy na amin’iza na amin’iza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa mialoha ny hahafatesany sy ny hitsanganany ho velona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 16.21-28; Lk 9.22-27)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia nanomboka nilaza tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy maintsy hijaly mafy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ', ka holavin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' sy ny lohandoha-mpisorona ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ', dia hovonoina ho faty; nefa andro fahatelo aorian’izany, dia hitsangana velona.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary mazava tsara no nanaovan’i Jesoa izany teny izany. Fa i Petera kosa nitondra Azy hihataka kely sady niteny Azy mafy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia nitodika i Jesoa nijery ny mpianatra ary niteny mafy an’i Petera nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mialà amiko, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: text
      text: ', satria tsy hevitr’Andriamanitra no ao an-tsainao fa hevitr’olombelona.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia nantsoin’i Jesoa niaraka tamin’ny mpianatra ny vahoaka hankeo aminy ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha misy te hiara-dia amiko, dia aoka izy handà ny tenany, ka hitondra ny hazofijaliany ary hiaraka amiko. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fa izay te hamonjy ny ainy no hahavery azy; ary izay hahafoy ny ainy, noho ny fitiavany Ahy sy fitiavana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ', no hahavonjy azy. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Fa inona no soa azon’ny olona raha eo am-pelatanany avokoa izao tontolo izao, kanefa ny ainy mitondra faisana? '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary inona no azon’ny olona omena ho takalon’ny ainy? '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Mpivadika amin’Andriamanitra sy mpanota ny olona ankehitriny! Ka na iza na iza menatra Ahy sy menatra ny teniko eo afovoan’ireo, dia ho menatra azy koa ny Zanak’olona, rehefa ho avy otronin’ny anjely masina sady ombàn’ny voninahitra homen’ny Rainy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy ny navalin’ny mpianatra Azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza no hahitana mofo hahavoky an’ireo olona ireo atỳ an-taniefitra atỳ.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nanontany i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Misy mofo firy any aminareo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ireo mpianany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fito!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nasain’i Jesoa nipetraka tamin’ny tany ireto vahoaka. Ary noraisin’i Jesoa ny mofo fito; ka rehefa avy nisaotra an’Andriamanitra Izy, dia nanapaka ny mofo sy nanome azy ny mpianany harosony; ary dia naroson’ireo tamin’ny vahoaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nisy trondro vitsivitsy koa tao, ka rehefa avy nisaoran’i Jesoa an’Andriamanitra, dia nasainy naroso. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nihinana ny olona ka voky; ary nangonina ny tapa-mofo aman-trondro ambiny, ka nisy fito harona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tokony ho efatra arivo anefa ny vatan-dehilahy teo. Dia nalefan’i Jesoa hody ny olona rehetra; '
