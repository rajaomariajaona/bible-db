document_id: MRK.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Omen’i Jesoa sakafo ny olona mihoatra ny efatra arivo
  - type: heading
    content: (Jereo Mt 15.32-39)
  - type: text
    content: 'Tamin’izany andro izany, dia vahoaka be indray no teo amin’i Jesoa ary tsy nanan-kohanina; ka nantsoin’i Jesoa ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ary nilazany hoe:'
  '10':
  - type: text
    content: ary raha vao vita izany, dia niondrana an-tsambokely Izy mbamin’ny mpianany ary lasa nankany amin’ny faritany atao hoe Dalmanotà
  - type: note
    content: 'Dalmanotà: faritany tsy dia fantatra mazava izay misy azy.'
  - type: text
    content: .
  - type: heading
    content: Angatahana famantarana i Jesoa
  - type: heading
    content: (Jereo Mt 16.1-4)
  '11':
  - type: text
    content: 'Dia tonga ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' hiady hevitra amin’i Jesoa. Te hamandrika Azy ry zareo ka nangataka Azy hanao '
  - type: text
    content: famantarana
  - type: text
    content: ' ho porofo fa avy amin’Andriamanitra ny fahefany. '
  '12':
  - type: text
    content: 'Dia nisento lalina i Jesoa ka niteny hoe:'
  - type: text
    content: –Nahoana ny olona ankehitriny no mitady famantarana? Lazaiko marina aminareo fa tsy homena famantarana akory izy.
  '13':
  - type: text
    content: Dia nandao azy ireo i Jesoa ary niondrana indray nankeny ampita.
  - type: heading
    content: Ny levioran’ny Farisianina sy ny an’i Herôda
  - type: heading
    content: (Jereo Mt 16.5-12)
  '14':
  - type: text
    content: 'Ary hadinon’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' ny nitondra mofo, ka tsy nisy afa-tsy mofo iray monja teo aminy tao an-tsambokely. '
  '15':
  - type: text
    content: 'Dia namepetra azy ireo i Jesoa nanao hoe:'
  - type: text
    content: '–Mbà malina ka mitandrema tsy ho voan’ny '
  - type: text
    content: levioran’ny Farisianina
  - type: text
    content: ' sy ny levioran’i '
  - type: text
    content: Herôda
  - type: text
    content: .
  '16':
  - type: text
    content: 'Fa iretsy mpianany kosa niady hevitra nifampilaza hoe:'
  - type: text
    content: –Noho isika tsy nitondra mofo angaha izany!
  '17':
  - type: text
    content: 'Tsikaritr’i Jesoa izany ka hoy Izy taminy:'
  - type: text
    content: '–Nahoana ianareo no miady hevitra ny amin’ny tsy nitondranareo mofo? Mbola tsy takatrareo ary tsy fantatrareo foana ve? Fa dia mafy fo ve ianareo? '
  '18':
  - type: text
    content: Mana-maso ianareo ka no tsy mahita, ary manan-tsofina ka no tsy mandre
  - type: note
    content: Ampit Jer 5.21; Ezek 12.2.
  - type: text
    content: '? Tsy tsaroanareo angaha? '
  '19':
  - type: text
    content: Fony Aho nanapaka ireo mofo dimy haroso amin’ny vatan-dehilahy dimy arivo, sobika firy no voaangonareo feno ny tapa-mofo ambiny?
  - type: text
    content: 'Hoy ny navalin’ireo hoe:'
  - type: text
    content: –Sobika 12
  - type: note
    content: Jereo 6.35-44.
  - type: text
    content: .
  '2':
  - type: text
    content: '–Mahonena Ahy ireto vahoaka, satria efa telo andro izao no teto amiko, ka tsy manan-kohanina intsony; '
  '20':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Ary fony Aho nanapaka ireo mofo fito haroso amin’ny vatan-dehilahy efatra arivo, harona firy no voaangonareo feno ny tapa-mofo ambiny?
  - type: text
    content: 'Hoy ny navalin’ireo hoe:'
  - type: text
    content: –Harona fito
  - type: note
    content: Jereo 8.1-9.
  - type: text
    content: '!'
  '21':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Mbola tsy fantatrareo foana ve?
  - type: heading
    content: Sitranin’i Jesoa ilay jamba tao Betsaidà
  '22':
  - type: text
    content: 'Ary tonga tao Betsaidà i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: '. Dia indreo nisy olona nitondra lehilahy jamba teo amin’i Jesoa, ka niangavy Azy hikasika ilay jamba. '
  '23':
  - type: text
    content: 'Dia notantanan’i Jesoa ilay jamba, ka nentiny nankany ivelan’ny tanàna; dia nasiany rora ny mason’ilay jamba ary rehefa nametrahany tanana izy, dia nanontaniany hoe:'
  - type: text
    content: –Mahita ve ianao?
  '24':
  - type: text
    content: 'Nitraka ralehilahy sady namaly hoe:'
  - type: text
    content: –Mahita aho, indreny ny olona fa tahaka ny hazo no ahitako azy, saingy izy mandehandeha.
  '25':
  - type: text
    content: 'Dia nametrahan’i Jesoa tanana fanindroany ny masony; ary nahiratry ralehilahy ny masony ka sitrana, ary dia nazava tsara no nahitany ny zavatra rehetra. '
  '26':
  - type: text
    content: 'Nalefan’i Jesoa hody any an-tranony ralehilahy sady nilazany hoe: «Aza mankao an-tanàna!»'
  - type: heading
    content: Ambaran’i Petera ho Mesia i Jesoa
  - type: heading
    content: (Jereo Mt 16.13-20; Lk 9.18-21)
  '27':
  - type: text
    content: 'Dia niainga i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' nankany amin’ireo tanàna kely manodidina an’i Kesaria-Filipo'
  - type: note
    content: 'Kesaria-Filipo: tanàna naorin’i Filipo Herôda, eo anilan’ny loharanon’i Jôrdàna, mba ho renivohitry ny fanjakany. I Banià no iantsoana azy ankehitriny.'
  - type: text
    content: '; ary teny an-dalana, dia nanontany ny mpianany i Jesoa nanao hoe:'
  - type: text
    content: –Iza moa Aho, araka ny filazan’ny olona Ahy?
  '28':
  - type: text
    content: 'Dia hoy ny mpianany namaly Azy:'
  - type: text
    content: '–Misy manao hoe i Jôhany Mpanao '
  - type: text
    content: batisa
  - type: text
    content: '; ny sasany kosa manao hoe i '
  - type: text
    content: Elià
  - type: text
    content: '; ary ny hafa indray manao hoe anankiray amin’ireo '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra.
  '29':
  - type: text
    content: 'Dia nanontany azy ireo indray i Jesoa hoe:'
  - type: text
    content: –Fa ianareo kosa, iza moa Aho aminareo?
  - type: text
    content: 'Namaly i Petera ka nanao taminy hoe:'
  - type: text
    content: '–Ianao no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '!'
  '3':
  - type: text
    content: ary raha alefako mody tsy misakafo ireo, dia ho reraka eny an-dalana satria avy lavitra ny sasany.
  '30':
  - type: text
    content: Dia nofeperan’i Jesoa ireo mpianany tsy hilazalaza momba Azy na amin’iza na amin’iza.
  - type: heading
    content: Ambaran’i Jesoa mialoha ny hahafatesany sy ny hitsanganany ho velona
  - type: heading
    content: (Jereo Mt 16.21-28; Lk 9.22-27)
  '31':
  - type: text
    content: 'Dia nanomboka nilaza tamin’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' i Jesoa hoe:'
  - type: text
    content: '–Tsy maintsy hijaly mafy ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', ka holavin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' sy ny lohandoha-mpisorona ary ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ', dia hovonoina ho faty; nefa andro fahatelo aorian’izany, dia hitsangana velona.'
  '32':
  - type: text
    content: 'Ary mazava tsara no nanaovan’i Jesoa izany teny izany. Fa i Petera kosa nitondra Azy hihataka kely sady niteny Azy mafy. '
  '33':
  - type: text
    content: 'Dia nitodika i Jesoa nijery ny mpianatra ary niteny mafy an’i Petera nanao hoe:'
  - type: text
    content: '–Mialà amiko, ry '
  - type: text
    content: Satàna
  - type: text
    content: ', satria tsy hevitr’Andriamanitra no ao an-tsainao fa hevitr’olombelona.'
  '34':
  - type: text
    content: 'Dia nantsoin’i Jesoa niaraka tamin’ny mpianatra ny vahoaka hankeo aminy ka nilazany hoe:'
  - type: text
    content: '–Raha misy te hiara-dia amiko, dia aoka izy handà ny tenany, ka hitondra ny hazofijaliany ary hiaraka amiko. '
  '35':
  - type: text
    content: 'Fa izay te hamonjy ny ainy no hahavery azy; ary izay hahafoy ny ainy, noho ny fitiavany Ahy sy fitiavana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', no hahavonjy azy. '
  '36':
  - type: text
    content: 'Fa inona no soa azon’ny olona raha eo am-pelatanany avokoa izao tontolo izao, kanefa ny ainy mitondra faisana? '
  '37':
  - type: text
    content: 'Ary inona no azon’ny olona omena ho takalon’ny ainy? '
  '38':
  - type: text
    content: Mpivadika amin’Andriamanitra sy mpanota ny olona ankehitriny! Ka na iza na iza menatra Ahy sy menatra ny teniko eo afovoan’ireo, dia ho menatra azy koa ny Zanak’olona, rehefa ho avy otronin’ny anjely masina sady ombàn’ny voninahitra homen’ny Rainy.
  '4':
  - type: text
    content: 'Dia hoy ny navalin’ny mpianatra Azy:'
  - type: text
    content: –Aiza no hahitana mofo hahavoky an’ireo olona ireo atỳ an-taniefitra atỳ.
  '5':
  - type: text
    content: 'Dia nanontany i Jesoa hoe:'
  - type: text
    content: –Misy mofo firy any aminareo?
  - type: text
    content: 'Ka hoy ireo mpianany hoe:'
  - type: text
    content: –Fito!
  '6':
  - type: text
    content: 'Dia nasain’i Jesoa nipetraka tamin’ny tany ireto vahoaka. Ary noraisin’i Jesoa ny mofo fito; ka rehefa avy nisaotra an’Andriamanitra Izy, dia nanapaka ny mofo sy nanome azy ny mpianany harosony; ary dia naroson’ireo tamin’ny vahoaka. '
  '7':
  - type: text
    content: 'Nisy trondro vitsivitsy koa tao, ka rehefa avy nisaoran’i Jesoa an’Andriamanitra, dia nasainy naroso. '
  '8':
  - type: text
    content: 'Dia nihinana ny olona ka voky; ary nangonina ny tapa-mofo aman-trondro ambiny, ka nisy fito harona. '
  '9':
  - type: text
    content: 'Tokony ho efatra arivo anefa ny vatan-dehilahy teo. Dia nalefan’i Jesoa hody ny olona rehetra; '
