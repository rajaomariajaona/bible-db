  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: «Aza mitsiriritra ny vadin’ny namanao, na ny tranony, na ny taniny, na ny mpanompony, na ny ombiny, na ny borikiny, na izay mety ho fananany.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ireo didy ireo no nampitain’ny TOMPO tamim-peo mahery tany an-tendrombohitra, avy tao anatin’ny afo sy ny setroka ary ny rahona mikitroka. Ianareo Israelita rehetra izay tafavondrona teo am-bodin’ny tendrombohitra no nampitany azy ary tsy nanampiany na inona na inona. Ireo didy ireo avy eo dia nosoratany tamin’ny takela-bato anankiroa izay natolony ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpitondratenin’Andriamanitra i Mosesy
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Rehefa renareo ilay feo avy tao anatin’ny haizina, fony nirehitra afo manontolo ny tendrombohitra, dia nanatona ahy ireo filohan’ny fokonareo sy ireo '
    - type: usfm
