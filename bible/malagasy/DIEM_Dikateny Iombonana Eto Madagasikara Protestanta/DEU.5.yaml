        text: '1'
    - type: text
      text: 'Dia novorîn’i Mosesy ny Israelita rehetra ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Israelita, henoy ny lalàna amam-pitsipika izay ampitaiko ho renareo anio; ianaro ireo àry imasoy ny fanatanterahana azy. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
