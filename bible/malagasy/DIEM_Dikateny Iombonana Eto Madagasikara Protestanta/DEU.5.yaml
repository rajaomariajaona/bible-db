document_id: DEU.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny didy folo
  - type: text
    content: 'Dia novorîn’i Mosesy ny Israelita rehetra ka nilazany hoe:'
  - type: text
    content: '–Ry Israelita, henoy ny lalàna amam-pitsipika izay ampitaiko ho renareo anio; ianaro ireo àry imasoy ny fanatanterahana azy. '
  '10':
  - type: text
    content: nefa kosa amin’izay tia Ahy sy mitandrina ny didiko, dia mamindrafo hatrany amin’ny taranaka faharivo Aho.
  '11':
  - type: text
    content: «Aza manonom-poana ny anarako ianao, fa Izaho TOMPO Andriamanitrao dia tsy hamela ho afa-potsiny izay manonom-poana ny anarako.
  '12':
  - type: text
    content: '«Mitandrema ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' mba hanokananao azy ho Ahy TOMPO Andriamanitrao, araka izay nandidiako anao. '
  '13':
  - type: text
    content: 'Enina andro no hiasanao sy hanaovanao ny raharahanao rehetra. '
  '14':
  - type: text
    content: 'Fa ny andro fahafito kosa dia sabata voatokana ho Ahy TOMPO Andriamanitrao; koa aza manao raharaha akory amin’izany, na ny tenanao, na ny zanakao, na ny mpanomponao, na ny ombinao na ny borikinao, na ny biby hafa rehetra fiompinao, na ny vahiny izay ao an-tranonao; aoka mba hitsahatra tahaka anao koa ireo mpanomponao. '
  '15':
  - type: text
    content: Ary tsarovy fa nandevozina tany Ejipta ianao ka fiarovana mahery sy fahefana tsy hay tohaina no nitondrako anao niala tany; izany no mahatonga Ahy TOMPO Andriamanitrao handidy anao hitandrina ny andro sabata.
  '16':
  - type: text
    content: «Manajà ny rainao sy ny reninao, araka izay nandidiako anao, mba ho maro andro iainana ianao ary mba hahita soa any amin’ny tany omeko anao.
  '17':
  - type: text
    content: «Aza mamono olona.
  '18':
  - type: text
    content: «Aza manitsakitsa-bady na maka vadin’olona.
  '19':
  - type: text
    content: «Aza mangalatra.
  '2':
  - type: text
    content: 'Nanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' tamintsika ny TOMPO Andriamanitsika, tany amin’ny tendrombohitra '
  - type: text
    content: Hôreba
  - type: text
    content: '. '
  '20':
  - type: text
    content: «Aza mety ho vavolombelona mandainga hamelezana ny namanao.
  '21':
  - type: text
    content: «Aza mitsiriritra ny vadin’ny namanao, na ny tranony, na ny taniny, na ny mpanompony, na ny ombiny, na ny borikiny, na izay mety ho fananany.»
  '22':
  - type: text
    content: Ireo didy ireo no nampitain’ny TOMPO tamim-peo mahery tany an-tendrombohitra, avy tao anatin’ny afo sy ny setroka ary ny rahona mikitroka. Ianareo Israelita rehetra izay tafavondrona teo am-bodin’ny tendrombohitra no nampitany azy ary tsy nanampiany na inona na inona. Ireo didy ireo avy eo dia nosoratany tamin’ny takela-bato anankiroa izay natolony ahy.
  - type: heading
    content: Mpitondratenin’Andriamanitra i Mosesy
  '23':
  - type: text
    content: 'Rehefa renareo ilay feo avy tao anatin’ny haizina, fony nirehitra afo manontolo ny tendrombohitra, dia nanatona ahy ireo filohan’ny fokonareo sy ireo '
  - type: text
    content: loholonareo
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'ka nitondra ny teninareo tamiko hoe: «Indro efa nampahitan’ny TOMPO Andriamanitsika ny '
  - type: text
    content: voninahiny
  - type: text
    content: ' sy ny fahalehibiazany izahay sady efa nandre ny feony avy tao anatin’ny afo; koa tsapanay androany fa itenenan’Andriamanitra ny olona saingy mbola velona aina ihany. '
  '25':
  - type: text
    content: 'Kanefa nahoana izahay no hitolo-batana holevonin’io afo lehibe io ka ho faty? Fa raha mbola mandre ny feon’ny TOMPO Andriamanitsika izahay, dia ho faty mihitsy. '
  '26':
  - type: text
    content: Satria iza moa tamin’ny olombelona rehetra no efa nandre tahaka anay ny feon’ilay Andriamanitra velona niteny avy tao anatin’ny afo, ka velona aina ihany
  - type: note
    content: Miaiky ny Israelita fa tsy mety hita Andriamanitra; ary mahafaty ny mifandray mivantana aminy (jereo ohatra 4.33; Mpits 13.22).
  - type: text
    content: '? '
  '27':
  - type: text
    content: Ianao no aoka hanatona ny TOMPO Andriamanitsika sy hihaino ny zavatra rehetra holazainy; avy eo vao hampitainao aminay ny zavatra rehetra nolazain’ny TOMPO Andriamanitsika taminao, ka hohenoinay sy hotanterahinay izany
  - type: note
    content: 'And 22-27: jereo Heb 12.18-19.'
  - type: text
    content: '.» '
  '28':
  - type: text
    content: 'Fony nambara tamiko ny teninareo, dia ren’ny TOMPO izany ka hoy Izy tamiko: «Efa reko ny teny nampitain’io vahoaka io taminao, ka tsara avokoa ny voalazany. '
  '29':
  - type: text
    content: 'Enga anie io vahoaka io mba ho tapa-kevitra mandrakariva toy izany hanaja Ahy sy hitandrina ny didiko rehetra, mba ho sambatra hatrany hatrany izy sy ny taranany. '
  '3':
  - type: text
    content: 'Tsy tamin’ireo razantsika ihany no nanaovan’ny TOMPO izany fanekempihavanana izany fa amintsika rehetra izay samy mbola velona eto anio koa. '
  '30':
  - type: text
    content: 'Ndeha asaovy miverina any an-dainy ireo. '
  '31':
  - type: text
    content: Fa ianao kosa, mijanona eto anilako ka holazaiko aminao ny didy sy lalàna amam-pitsipika rehetra izay hampianarinao azy mba hotanterahiny any amin’ny tany omeko azy ho fananany.»
  '32':
  - type: text
    content: 'Koa himasoanareo, hoy indray i Mosesy, ny hanatanteraka izay efa nandidian’ny TOMPO Andriamanitrareo anareo ary tsy hivily na amin’ny ankavanana na amin’ny ankavia ianareo. '
  '33':
  - type: text
    content: Fa ny lalana rehetra izay nosoritan’ny TOMPO Andriamanitrareo ho anareo no halehanareo mba ho velona ianareo ka hahita soa ary ho maro andro iainana any amin’ny tany izay halainareo ho fananana.
  '4':
  - type: text
    content: 'Tany an-tendrombohitra sady avy tao anatin’ny afo no niteny nifanatrika taminareo ny TOMPO. '
  '5':
  - type: text
    content: Izaho kosa teo anelanelan’ny TOMPO sy ianareo tamin’izany andro izany mba hanambara aminareo ny tenin’ny TOMPO, satria natahotra teo am-pahitana ilay afo manko ianareo ka tsy niakatra tao an-tendrombohitra. Fa hoy ny TOMPO hoe
  - type: note
    content: Ny didy folo dia voatahiry koa ao amin’ny Eks 20.1-7, saingy amin’ny endrika miova kely. Jereo ny naoty tandrifin’izany rijan-tenin’ny Eks izany.
  - type: text
    content: ':'
  '6':
  - type: text
    content: «Izaho no TOMPO Andriamanitrao, Izay namoaka anao hiala tany Ejipta, toera-nanandevozana anao.
  '7':
  - type: text
    content: «Aza manana andriamani-kafa ianao, fa Izaho ihany.
  '8':
  - type: text
    content: '«Aza manao sarin-tsampy voasokitra ho anao, ampisehoanao endri-javatra izay eny amin’ny habakabaka ambony na izay etỳ amin’ny tany ambany, na izay any amin’ny rano ambanin’ny tany. '
  '9':
  - type: text
    content: 'Aza miankohoka eo anatrehan’ireny sampy ireny ianao ary aza manompo azy, satria Izaho TOMPO Andriamanitrao dia saro-piaro amin’ny maha Andriamanitra Ahy. Raha misy olona meloka amin’izany ka mankahala Ahy, dia mamaly azy sy ny taranany hatrany amin’ny zafin-dohalika Aho; '
