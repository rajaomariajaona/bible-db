      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '«Mitandrema ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' mba hanokananao azy ho Ahy TOMPO Andriamanitrao, araka izay nandidiako anao. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Enina andro no hiasanao sy hanaovanao ny raharahanao rehetra. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ny andro fahafito kosa dia sabata voatokana ho Ahy TOMPO Andriamanitrao; koa aza manao raharaha akory amin’izany, na ny tenanao, na ny zanakao, na ny mpanomponao, na ny ombinao na ny borikinao, na ny biby hafa rehetra fiompinao, na ny vahiny izay ao an-tranonao; aoka mba hitsahatra tahaka anao koa ireo mpanomponao. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary tsarovy fa nandevozina tany Ejipta ianao ka fiarovana mahery sy fahefana tsy hay tohaina no nitondrako anao niala tany; izany no mahatonga Ahy TOMPO Andriamanitrao handidy anao hitandrina ny andro sabata.
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: «Manajà ny rainao sy ny reninao, araka izay nandidiako anao, mba ho maro andro iainana ianao ary mba hahita soa any amin’ny tany omeko anao.
  '17':
