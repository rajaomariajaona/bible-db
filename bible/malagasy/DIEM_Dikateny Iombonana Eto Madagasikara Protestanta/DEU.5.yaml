  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fony nambara tamiko ny teninareo, dia ren’ny TOMPO izany ka hoy Izy tamiko: «Efa reko ny teny nampitain’io vahoaka io taminao, ka tsara avokoa ny voalazany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Enga anie io vahoaka io mba ho tapa-kevitra mandrakariva toy izany hanaja Ahy sy hitandrina ny didiko rehetra, mba ho sambatra hatrany hatrany izy sy ny taranany. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tsy tamin’ireo razantsika ihany no nanaovan’ny TOMPO izany fanekempihavanana izany fa amintsika rehetra izay samy mbola velona eto anio koa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ndeha asaovy miverina any an-dainy ireo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa ianao kosa, mijanona eto anilako ka holazaiko aminao ny didy sy lalàna amam-pitsipika rehetra izay hampianarinao azy mba hotanterahiny any amin’ny tany omeko azy ho fananany.»
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Koa himasoanareo, hoy indray i Mosesy, ny hanatanteraka izay efa nandidian’ny TOMPO Andriamanitrareo anareo ary tsy hivily na amin’ny ankavanana na amin’ny ankavia ianareo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa ny lalana rehetra izay nosoritan’ny TOMPO Andriamanitrareo ho anareo no halehanareo mba ho velona ianareo ka hahita soa ary ho maro andro iainana any amin’ny tany izay halainareo ho fananana.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tany an-tendrombohitra sady avy tao anatin’ny afo no niteny nifanatrika taminareo ny TOMPO. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izaho kosa teo anelanelan’ny TOMPO sy ianareo tamin’izany andro izany mba hanambara aminareo ny tenin’ny TOMPO, satria natahotra teo am-pahitana ilay afo manko ianareo ka tsy niakatra tao an-tendrombohitra. Fa hoy ny TOMPO hoe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: didy folo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia voatahiry koa ao amin’ny Eks 20.1-7, saingy amin’ny endrika miova kely. Jereo ny naoty tandrifin’izany rijan-tenin’ny Eks izany.'
      marker-yv: yv-n
    - type: text
      text: ':'
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: «Izaho no TOMPO Andriamanitrao, Izay namoaka anao hiala tany Ejipta, toera-nanandevozana anao.
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: «Aza manana andriamani-kafa ianao, fa Izaho ihany.
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '«Aza manao sarin-tsampy voasokitra ho anao, ampisehoanao endri-javatra izay eny amin’ny habakabaka ambony na izay etỳ amin’ny tany ambany, na izay any amin’ny rano ambanin’ny tany. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aza miankohoka eo anatrehan’ireny sampy ireny ianao ary aza manompo azy, satria Izaho TOMPO Andriamanitrao dia saro-piaro amin’ny maha Andriamanitra Ahy. Raha misy olona meloka amin’izany ka mankahala Ahy, dia mamaly azy sy ny taranany hatrany amin’ny zafin-dohalika Aho; '
