      - type: text
        text: loholonareo
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ka nitondra ny teninareo tamiko hoe: «Indro efa nampahitan’ny TOMPO Andriamanitsika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahiny
    - type: text
      text: ' sy ny fahalehibiazany izahay sady efa nandre ny feony avy tao anatin’ny afo; koa tsapanay androany fa itenenan’Andriamanitra ny olona saingy mbola velona aina ihany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Kanefa nahoana izahay no hitolo-batana holevonin’io afo lehibe io ka ho faty? Fa raha mbola mandre ny feon’ny TOMPO Andriamanitsika izahay, dia ho faty mihitsy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Satria iza moa tamin’ny olombelona rehetra no efa nandre tahaka anay ny feon’ilay Andriamanitra velona niteny avy tao anatin’ny afo, ka velona aina ihany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Miaiky ny Israelita fa tsy mety hita Andriamanitra; ary mahafaty ny mifandray mivantana aminy (jereo ohatra 4.33; Mpits 13.22).
      marker-yv: yv-n
    - type: text
      text: '? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ianao no aoka hanatona ny TOMPO Andriamanitsika sy hihaino ny zavatra rehetra holazainy; avy eo vao hampitainao aminay ny zavatra rehetra nolazain’ny TOMPO Andriamanitsika taminao, ka hohenoinay sy hotanterahinay izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.27 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 22-27:'
      - type: usfm
