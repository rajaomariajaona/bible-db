document_id: 1TH.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avy amiko Paoly ity taratasy ity.
- type: usfm
  marker: p
  children:
  - type: text
    text: Mamangy anareo isan’ny Fiangonana atỳ Tesalônika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Silasy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 15.22. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Timôty:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Asa 16.1. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tesalônika:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salônika
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no anaran’io tanàna io ankehitriny; any amin’ny faritra avaratr’i Gresy no misy azy (jereo koa 2 Kôr 1.16 sy nta). Momba ny nitoeran’i Paoly tao voalohany, jereo Asa 17.1-9; 1 Tes 2.1-2.'
    marker-yv: yv-n
  - type: text
    text: ', izay tafaray amin’Andriamanitra Ray sy i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo, aho. Mamangy anareo koa i Silasy sy i Timôty. Ho aminareo anie ny fahasoavana sy ny fiadanana!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiainana ombàm-pinoana asehon’ny Tesalônisianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Velom-pisaorana mandrakariva an’Andriamanitra izahay ny aminareo rehetra, rehefa mahatsiaro amin’ny vavaka ataonay. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsaroanay tsy tapaka eo anatrehan’ilay Andriamanitsika sady Raintsika ny asa ateraky ny finoanareo, ny fikelezana aina asesiky ny fitiavanareo, ary ny faharetana vokatry ny fanantenanareo an’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'finoana... fitiavana... fanantenana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 1Kôr 13.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fantatray, ry havana, fa efa notiavin’Andriamanitra ianareo ary efa nofidiny mba ho Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' torînay dia tonganay tatỳ aminareo, tsy tamin’ny teny fotsiny ihany fa tamin’ny hery aman’asan’ny Fanahy Masina mbamin’ny fankatoavanay tanteraka ny Vaovao Mahafaly. Fantatrareo koa ny fiaimpiainanay fony izahay tatỳ aminareo ho fanasoavana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sady nanahaka anay sy ny Tompo ianareo; fa na dia be aza ny fahoriana nanjo anareo, dia nandray ny tenin’Andriamanitra tamin’ny hafaliana avy amin’ny Fanahy Masina ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 17.5-9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa dia tonga ohatra ho an’ny mpino rehetra eran’i Masedônia sy i Akaîa ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Masedônia: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2Kôr 1.16 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Akaîa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 2 Kôr 1.1 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nanako avy teo aminareo ny tenin’ny Tompo, ka tsy hoe nanerana an’i Masedônia sy i Akaîa ihany, fa niely hatraiza hatraiza koa ny lazan’ny finoanareo an’Andriamanitra; hany ka tsy mila ny hilazanay intsony ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izy rehetra dia milaza ny momba anay ka mitantara ny nidiranay tatỳ aminareo sy ny nialanareo tamin’ny sampinareo ka nitodihanareo tamin’Andriamanitra, mba hanompoanareo ilay Andriamanitra velona sady marina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Andrasanareo koa ny hahatongavan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ' avy any an-danitra, dia i Jesoa Izay efa natsangany ho velona avy tany amin’ny maty sady mpanafaka antsika amin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: ' ho avy.'
