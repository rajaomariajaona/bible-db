document_id: 1TH.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: Avy amiko Paoly ity taratasy ity.
  - type: text
    content: Mamangy anareo isan’ny Fiangonana atỳ Tesalônika
  - type: note
    content: 'Silasy: jereo Asa 15.22. –Timôty: jereo Asa 16.1. –Tesalônika: i Salônika no anaran’io tanàna io ankehitriny; any amin’ny faritra avaratr’i Gresy no misy azy (jereo koa 2 Kôr 1.16 sy nta). Momba ny nitoeran’i Paoly tao voalohany, jereo Asa 17.1-9; 1 Tes 2.1-2.'
  - type: text
    content: ', izay tafaray amin’Andriamanitra Ray sy i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo, aho. Mamangy anareo koa i Silasy sy i Timôty. Ho aminareo anie ny fahasoavana sy ny fiadanana!'
  - type: heading
    content: Ny fiainana ombàm-pinoana asehon’ny Tesalônisianina
  '10':
  - type: text
    content: 'Andrasanareo koa ny hahatongavan’ny '
  - type: text
    content: Zanany
  - type: text
    content: ' avy any an-danitra, dia i Jesoa Izay efa natsangany ho velona avy tany amin’ny maty sady mpanafaka antsika amin’ilay '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' ho avy.'
  '2':
  - type: text
    content: 'Velom-pisaorana mandrakariva an’Andriamanitra izahay ny aminareo rehetra, rehefa mahatsiaro amin’ny vavaka ataonay. '
  '3':
  - type: text
    content: 'Tsaroanay tsy tapaka eo anatrehan’ilay Andriamanitsika sady Raintsika ny asa ateraky ny finoanareo, ny fikelezana aina asesiky ny fitiavanareo, ary ny faharetana vokatry ny fanantenanareo an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika'
  - type: note
    content: 'finoana... fitiavana... fanantenana: ampit 1Kôr 13.13.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Fantatray, ry havana, fa efa notiavin’Andriamanitra ianareo ary efa nofidiny mba ho Azy. '
  '5':
  - type: text
    content: 'Eny, ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' torînay dia tonganay tatỳ aminareo, tsy tamin’ny teny fotsiny ihany fa tamin’ny hery aman’asan’ny Fanahy Masina mbamin’ny fankatoavanay tanteraka ny Vaovao Mahafaly. Fantatrareo koa ny fiaimpiainanay fony izahay tatỳ aminareo ho fanasoavana anareo. '
  '6':
  - type: text
    content: Sady nanahaka anay sy ny Tompo ianareo; fa na dia be aza ny fahoriana nanjo anareo, dia nandray ny tenin’Andriamanitra tamin’ny hafaliana avy amin’ny Fanahy Masina ianareo
  - type: note
    content: Jereo Asa 17.5-9.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Koa dia tonga ohatra ho an’ny mpino rehetra eran’i Masedônia sy i Akaîa ianareo
  - type: note
    content: 'Masedônia: jereo 2Kôr 1.16 sy nta. –Akaîa: jereo 2 Kôr 1.1 sy nta.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Nanako avy teo aminareo ny tenin’ny Tompo, ka tsy hoe nanerana an’i Masedônia sy i Akaîa ihany, fa niely hatraiza hatraiza koa ny lazan’ny finoanareo an’Andriamanitra; hany ka tsy mila ny hilazanay intsony ny olona. '
  '9':
  - type: text
    content: 'Fa izy rehetra dia milaza ny momba anay ka mitantara ny nidiranay tatỳ aminareo sy ny nialanareo tamin’ny sampinareo ka nitodihanareo tamin’Andriamanitra, mba hanompoanareo ilay Andriamanitra velona sady marina. '
