    - type: text
      text: '*'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantsoa ange raha misy hamaly anao e!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary iza amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' masina no hitodihanao?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mampilatsaka ny orana ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampandeha ny renirano hanondraka ny saha.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manandratra ny ambany ho amin’ny avo Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny malahelo dia ampiany hitraka.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mampandamoka ny tetiky ny fetsy ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tsinontsinona izay asan’ny tanany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hafetsen’ny hendry ihany no amandrihany azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lazain’ny apôstôly Paoly ao amin’ny 1Kôr 3.19 ny fiandohan’ny andininy.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataony maty momoka ny tolo-tsainy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tojo ny haizina amin’ny andro antoandro izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia amin’ny mitataovovonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no iraparapany toy ny amin’ny alina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa vonjen’Andriamanitra ny ketraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hianjadian’ny sabatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny ketraka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dkt mahazatra '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amin’ny vavany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mahantra mba tsy ho azon’ny mahery;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamelom-panantenana ny osa izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampikombom-bava ny ratsy fanahy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa sambatra ny olona izay anarin’Andriamanitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa aza hamaivanina, ry Jôba, ny famaizan’ilay Tsitoha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Ohab 3.11; Heb 12.5-6.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra dia mety mampijaly, raha mitsabo fery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tànany dia mety mandratra, raha manasitrana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Hos 6.1.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamonjy anao amin’ny fahoriana matetika Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka amin’ny farany tsy hahavoa anao intsony ny loza.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho voakikin’ny fahasosorany ny adala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho fatin’ny fahatezerany ny ketrina.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hamela anao ho faty Izy, raha avy ny mosary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: harovany tsy ho voan’ny sabatra ianao, raha avy ny ady.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voaaro amin’ny endrikendrika ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hatahotra raha tonga ny antambo.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihomehezanao fotsiny ny mosary aman’antambo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hatahoranao izay bibidia.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho vita fanekempihavanana mirindra ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny vato eny an-tsaha sy amin’ny bibidia,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiadam-pinaritra ao amin’ny fonenanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahita ny ondrinao tsy misy very
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa tonga hisafo azy any an-kijàna.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho hitanao hihamaro koa ny zanakao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taranakao dia hihabetsaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny ahitra eny an-tsaha.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tratra antitra nefa havitrika ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambara-piditrao any am-pasana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tahaka ny amboaram-bary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay akarina ho antontany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fotoam-pararano.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no izy rehefa nodinihinay, ry Jôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ankatoavy sy ekeo hahasoa anao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina tokoa fa efa nahita adala nambinina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa avy hatrany no nanozonako ny tranony hoe:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ho lavi-pamonjena anie ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hohelohina tsisy mpiaro amin’ny fitsarana!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny noana anie no hihinana izay nojinjainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka halainy izany na dia voafefy tsilo aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sahirana anie no ho tompon’ny hareny!»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy avy amin’ny tany akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ivoahan’ny tsy fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na itsimohan’ny fahoriana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa nateraka ho ory ny olombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny pitik’afo kosa natao hanidina miakatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny pitik’afo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny sasany milaza '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny voromahery
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha izaho ianao dia Andriamanitra no hanontaniako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Andriamanitra no hilazako ny momba ahy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe tsy takatry ny saina ny zavatra ataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zava-mahagaga tsy hay visavisaina.
