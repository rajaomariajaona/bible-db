document_id: JOB.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miantsoa ange raha misy hamaly anao e!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary iza amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' masina no hitodihanao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ho voakikin’ny fahasosorany ny adala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fatin’ny fahatezerany ny ketrina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Marina tokoa fa efa nahita adala nambinina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa avy hatrany no nanozonako ny tranony hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Ho lavi-pamonjena anie ny zanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hohelohina tsisy mpiaro amin’ny fitsarana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa ny noana anie no hihinana izay nojinjainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka halainy izany na dia voafefy tsilo aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sahirana anie no ho tompon’ny hareny!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy avy amin’ny tany akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ivoahan’ny tsy fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: na itsimohan’ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanefa nateraka ho ory ny olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny pitik’afo kosa natao hanidina miakatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny pitik’afo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny sasany milaza '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny voromahery
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha izaho ianao dia Andriamanitra no hanontaniako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Andriamanitra no hilazako ny momba ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lehibe tsy takatry ny saina ny zavatra ataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zava-mahagaga tsy hay visavisaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izy no mampilatsaka ny orana ambonin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampandeha ny renirano hanondraka ny saha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Manandratra ny ambany ho amin’ny avo Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny malahelo dia ampiany hitraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izy no mampandamoka ny tetiky ny fetsy ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tsinontsinona izay asan’ny tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny hafetsen’ny hendry ihany no amandrihany azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lazain’ny apôstôly Paoly ao amin’ny 1Kôr 3.19 ny fiandohan’ny andininy.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataony maty momoka ny tolo-tsainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tojo ny haizina amin’ny andro antoandro izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia amin’ny mitataovovonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no iraparapany toy ny amin’ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nefa vonjen’Andriamanitra ny ketraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hianjadian’ny sabatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny ketraka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt mahazatra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amin’ny vavany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mahantra mba tsy ho azon’ny mahery;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: mamelom-panantenana ny osa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampikombom-bava ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa sambatra ny olona izay anarin’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa aza hamaivanina, ry Jôba, ny famaizan’ilay Tsitoha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ohab 3.11; Heb 12.5-6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa Andriamanitra dia mety mampijaly, raha mitsabo fery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tànany dia mety mandratra, raha manasitrana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Hos 6.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hamonjy anao amin’ny fahoriana matetika Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka amin’ny farany tsy hahavoa anao intsony ny loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy hamela anao ho faty Izy, raha avy ny mosary;
- type: usfm
  marker: q1
  children:
  - type: text
    text: harovany tsy ho voan’ny sabatra ianao, raha avy ny ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ho voaaro amin’ny endrikendrika ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hatahotra raha tonga ny antambo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hihomehezanao fotsiny ny mosary aman’antambo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hatahoranao izay bibidia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ho vita fanekempihavanana mirindra ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny vato eny an-tsaha sy amin’ny bibidia,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: hiadam-pinaritra ao amin’ny fonenanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahita ny ondrinao tsy misy very
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tonga hisafo azy any an-kijàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho hitanao hihamaro koa ny zanakao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taranakao dia hihabetsaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny ahitra eny an-tsaha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ho tratra antitra nefa havitrika ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambara-piditrao any am-pasana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka ny amboaram-bary
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay akarina ho antontany
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fotoam-pararano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izany no izy rehefa nodinihinay, ry Jôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ankatoavy sy ekeo hahasoa anao.
