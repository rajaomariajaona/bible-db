document_id: JOB.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: '*'
  - type: text
    content: Miantsoa ange raha misy hamaly anao e!
  - type: text
    content: 'Ary iza amin’ny '
  - type: text
    content: anjely
  - type: text
    content: ' masina no hitodihanao?'
  '10':
  - type: text
    content: Izy no mampilatsaka ny orana ambonin’ny tany
  - type: text
    content: ary mampandeha ny renirano hanondraka ny saha.
  '11':
  - type: text
    content: Manandratra ny ambany ho amin’ny avo Izy;
  - type: text
    content: ary ny malahelo dia ampiany hitraka.
  '12':
  - type: text
    content: Izy no mampandamoka ny tetiky ny fetsy ratsy,
  - type: text
    content: ka ho tsinontsinona izay asan’ny tanany.
  '13':
  - type: text
    content: Ny hafetsen’ny hendry ihany no amandrihany azy
  - type: note
    content: Lazain’ny apôstôly Paoly ao amin’ny 1Kôr 3.19 ny fiandohan’ny andininy.
  - type: text
    content: ','
  - type: text
    content: ary ataony maty momoka ny tolo-tsainy.
  '14':
  - type: text
    content: Tojo ny haizina amin’ny andro antoandro izy;
  - type: text
    content: ka dia amin’ny mitataovovonana,
  - type: text
    content: no iraparapany toy ny amin’ny alina.
  '15':
  - type: text
    content: Nefa vonjen’Andriamanitra ny ketraka
  - type: text
    content: mba tsy hianjadian’ny sabatra
  - type: note
    content: 'ny ketraka: Dkt mahazatra amin’ny vavany.'
  - type: text
    content: ','
  - type: text
    content: ary ny mahantra mba tsy ho azon’ny mahery;
  '16':
  - type: text
    content: mamelom-panantenana ny osa izany,
  - type: text
    content: ary mampikombom-bava ny ratsy fanahy.
  '17':
  - type: text
    content: Fa sambatra ny olona izay anarin’Andriamanitra!
  - type: text
    content: Koa aza hamaivanina, ry Jôba, ny famaizan’ilay Tsitoha
  - type: note
    content: Ampit Ohab 3.11; Heb 12.5-6.
  - type: text
    content: .
  - type: heading
    content: '*'
  '18':
  - type: text
    content: Fa Andriamanitra dia mety mampijaly, raha mitsabo fery;
  - type: text
    content: ary ny tànany dia mety mandratra, raha manasitrana
  - type: note
    content: Ampit Hos 6.1.
  - type: text
    content: .
  '19':
  - type: text
    content: Hamonjy anao amin’ny fahoriana matetika Izy;
  - type: text
    content: ka amin’ny farany tsy hahavoa anao intsony ny loza.
  '2':
  - type: text
    content: Fa ho voakikin’ny fahasosorany ny adala;
  - type: text
    content: ary ho fatin’ny fahatezerany ny ketrina.
  '20':
  - type: text
    content: Tsy hamela anao ho faty Izy, raha avy ny mosary;
  - type: text
    content: harovany tsy ho voan’ny sabatra ianao, raha avy ny ady.
  '21':
  - type: text
    content: Ho voaaro amin’ny endrikendrika ianao,
  - type: text
    content: ka tsy hatahotra raha tonga ny antambo.
  '22':
  - type: text
    content: Hihomehezanao fotsiny ny mosary aman’antambo,
  - type: text
    content: ary tsy hatahoranao izay bibidia.
  '23':
  - type: text
    content: Ho vita fanekempihavanana mirindra ianao
  - type: text
    content: amin’ny vato eny an-tsaha sy amin’ny bibidia,
  '24':
  - type: text
    content: hiadam-pinaritra ao amin’ny fonenanao,
  - type: text
    content: ary hahita ny ondrinao tsy misy very
  - type: text
    content: rehefa tonga hisafo azy any an-kijàna.
  '25':
  - type: text
    content: Ho hitanao hihamaro koa ny zanakao;
  - type: text
    content: ary ny taranakao dia hihabetsaka
  - type: text
    content: tahaka ny ahitra eny an-tsaha.
  '26':
  - type: text
    content: Ho tratra antitra nefa havitrika ianao
  - type: text
    content: ambara-piditrao any am-pasana,
  - type: text
    content: dia ho tahaka ny amboaram-bary
  - type: text
    content: izay akarina ho antontany
  - type: text
    content: amin’ny fotoam-pararano.
  '27':
  - type: text
    content: Izany no izy rehefa nodinihinay, ry Jôba,
  - type: text
    content: koa ankatoavy sy ekeo hahasoa anao.
  '3':
  - type: text
    content: Marina tokoa fa efa nahita adala nambinina aho,
  - type: text
    content: 'nefa avy hatrany no nanozonako ny tranony hoe:'
  '4':
  - type: text
    content: «Ho lavi-pamonjena anie ny zanany,
  - type: text
    content: ka hohelohina tsisy mpiaro amin’ny fitsarana!
  '5':
  - type: text
    content: Fa ny noana anie no hihinana izay nojinjainy;
  - type: text
    content: ka halainy izany na dia voafefy tsilo aza;
  - type: text
    content: ary ny sahirana anie no ho tompon’ny hareny!»
  '6':
  - type: text
    content: Fa tsy avy amin’ny tany akory
  - type: text
    content: no ivoahan’ny tsy fahamarinana
  - type: text
    content: na itsimohan’ny fahoriana.
  '7':
  - type: text
    content: Kanefa nateraka ho ory ny olombelona,
  - type: text
    content: ary ny pitik’afo kosa natao hanidina miakatra
  - type: note
    content: 'ny pitik’afo: ny sasany milaza ny voromahery.'
  - type: text
    content: .
  - type: heading
    content: '*'
  '8':
  - type: text
    content: Raha izaho ianao dia Andriamanitra no hanontaniako;
  - type: text
    content: ary Andriamanitra no hilazako ny momba ahy.
  '9':
  - type: text
    content: Lehibe tsy takatry ny saina ny zavatra ataony,
  - type: text
    content: dia zava-mahagaga tsy hay visavisaina.
