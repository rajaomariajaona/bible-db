document_id: RUT.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahoriana nanjo ny fianakavian’i Elimelèka
  - type: text
    content: Tamin’ny andro nitondran’ny Mpitsara tao Israely, dia nisy mosary tao amin’ny tany. Koa nisy lehilahy iray avy ao amin’ny Betleheman’i Joda nandeha nifindra monina tany amin’ny faritr’i Môaba niaraka tamin’ny vadiny sy ny zanany roa lahy
  - type: note
    content: 'Tamin’ny andro nitondran’ny Mpitsara tao Israely: izany hoe tany amin’ny taona 1100 tal. J.K., jereo ny bokin’ny Mpitsara. Môaba: toerana mahavokatra any andrefan’ny ranomasina Maty.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'sady nanao taminy hoe:'
  - type: text
    content: –Mba hiaraka aminao hiverina ho any amin’ny firenenao izahay!
  '11':
  - type: text
    content: 'Fa novalian’i Nahômỳ hoe:'
  - type: text
    content: –Modia, rey anaka; nahoana no handeha hiaraka amiko ianareo? Moa ve aho mbola hiteraka zazalahy hanjary vady ho anareo
  - type: note
    content: Rehefa maty ny lehilahy, ka tsy manan-janaka, dia ny rahalahiny na raha tsy misy dia ny havana akaiky azy indrindra no tokony hanambady ilay mpitondra tena mba hisian’ny taranaky ny maty. Atao hoe «fitondran-doloha» ny anaran’izany fomba izany. Jereo Deot 25.5-10; Gen 38.6-8; Mt 22.24.
  - type: text
    content: '? '
  '12':
  - type: text
    content: 'Mandehana mody, rey anaka, satria efa antitra aho izao ka tsy hahazo vady intsony. Ary na dia hilaza aza aho hoe: «Mbola misy fanantenana ho ahy; fa rahalina ihany, dia hanambady aho ary hiteraka zazalahy koa!», '
  '13':
  - type: text
    content: moa ve hahandry azy mandra-pahalehibeny ianareo ka hahonon-tena tsy hanambady? Tsia, rey anaka, satria hampahory loatra anareo ny anjarako, fa hamely ahy no naninjiran’ny TOMPO ny tanany
  - type: note
    content: 'hampahory loatra anareo ny anjarako: dkt hafa: ao anatin’ny fahoriana lalina aho mieritreritra anareo.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Dia nanandram-peo nitomany indray izy roa vavy. Ary nanoroka an-drafozambaviny i Hôrpà ho fanaovam-beloma azy, fa i Rota kosa nifikitra teo aminy. '
  '15':
  - type: text
    content: 'Dia hoy i Nahômỳ tamin’i Rota:'
  - type: text
    content: –Indro ny rahavavinao nody any amin’ny fireneny sy ny andriamaniny, modia koa ianao miaraka aminy.
  '16':
  - type: text
    content: 'Fa novalian’i Rota hoe:'
  - type: text
    content: '–Aza terena handao anao sy hiala amin’ny fanarahana anao aho; fa any amin’izay halehanao no halehako, ao amin’izay honenanao no honenako, ny firenenao no ho fireneko, ny Andriamanitrao no ho Andriamanitro, '
  '17':
  - type: text
    content: ao amin’izay hahafatesanao no hahafatesako sady ao no hilevenako. Hataon’ny TOMPO amiko anie ny famaizana mafy indrindra raha tsy ny fahafatesana ihany no hampisaraka ahy aminao!
  '18':
  - type: text
    content: Ary rehefa hitan’i Nahômỳ fa tapa-kevitra ny handeha hiaraka aminy marina i Rota, dia nitsahatra tsy niteny azy intsony izy.
  '19':
  - type: text
    content: 'Dia nandeha niaraka izy mianaka mandra-pahatongany tany Betlehema. Rehefa tonga tao Betlehema izy ireo, dia taitra taminy avokoa ny tao an-tanàna rehetra, ka hoy ireo vehivavy hoe: «I Nahômỳ tokoa ve ity?» '
  '2':
  - type: text
    content: I Elimelèka no anaran-dralehilahy, i Nahômỳ no anaran’ny vadiny, ary ny anaran’ny zanany roa lahy kosa dia i Mahalôna sy i Kiliôna; Efratîta
  - type: note
    content: 'Efratîta: foko tao Joda tany amin’ny faritr’i Betlehema, tanàna kely kilaometatra vitsivitsy ao atsimon’i Betlehema.'
  - type: text
    content: ' avy ao Betleheman’i Joda izy efa-mianaka. Tonga tany amin’ny faritr’i Môaba izy ireo; fony izy mianakavy nonina tany '
  '20':
  - type: text
    content: 'fa novalian’i Nahômỳ hoe:'
  - type: text
    content: '–Aoka aho tsy antsoinareo intsony hoe Nahômỳ, ilay sambatra; fa aoka antsoinareo hoe Marà, ilay ory, satria Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: ' efa nampahory ahy loatra. '
  '21':
  - type: text
    content: Fa nanam-be aho fony niala teto, fa izao kosa nampodin’ny TOMPO tsy manana na inona na inona; koa aza antsoinareo intsony re aho satria efa namely ahy ny TOMPO Tsitoha ary efa nahatonga loza tamiko.
  '22':
  - type: text
    content: Dia toy izany no niverenan’i Nahômỳ avy any amin’ny faritr’i Môaba; ary niaraka taminy koa i Rota, vehivavy môabita vinantony. Tonga tany Betlehema izy mianaka tamin’ny fiandohan’ny fijinjana vary ôrza
  - type: note
    content: Ny fijinjana ny vary ôrza dia ny volana aprily-mey.
  - type: text
    content: .
  '3':
  - type: text
    content: 'no maty i Elimelèka vadin’i Nahômỳ, koa ravehivavy sy ny zanany roa lahy no sisa tavela. '
  '4':
  - type: text
    content: 'Samy naka vady tamin’ny vehivavy môabita izy mirahalahy ka i Hôrpa no anaran’ny anankiray ary i Rota kosa no anaran’ny anankiray. Ary tokony ho folo taona nipetrahana tany Môaba ry zareo, '
  '5':
  - type: text
    content: dia maty koa izy roa lahy, i Mahalôna sy i Kiliôna; koa ravehivavy irery no sisa nilaozan’ny vadiny sy ny zanany roa lahy.
  - type: heading
    content: Manaraka an’i Nahômỳ any Betlehema i Rota
  '6':
  - type: text
    content: 'Tany Môaba i Nahômỳ no nandre fa notahin’ny TOMPO ny vahoakany ka nomeny hanina. Noho izany, ry i Nahômỳ sy ny vinantovaviny dia nioman-kandao ny faritr’i Môaba. '
  '7':
  - type: text
    content: 'Ary niainga izy telo mianaka, dia nizotra ny lalana hiverina any amin’ny tanin’i Joda; ka teny an-dalana, '
  '8':
  - type: text
    content: 'dia hoy i Nahômỳ tamin’ireto vinantovaviny:'
  - type: text
    content: '–Mandehana mody any an-tranon-dray aman-dreninareo avy ianareo; hanasoa anareo anie ny TOMPO, araka izay efa nataonareo tamin’ireo maty sy tamiko koa. '
  '9':
  - type: text
    content: Homen’ny TOMPO vady anie ianareo, ka hahita fiadanana ao an-tranon’ny vadinareo avy!
  - type: text
    content: 'Dia norohan’i Nahômỳ ireto vinantovaviny; fa nanandram-peo nitomany izy roa vavy '
