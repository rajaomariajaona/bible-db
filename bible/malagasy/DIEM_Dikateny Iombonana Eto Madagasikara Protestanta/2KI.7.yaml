document_id: 2KI.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy ny navalin’i Elisà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO, koa henoinareo: «Rahampitso toy izao dia samy ho sekela iray ihany no vidin’ny lafarinina 12 kilao na ny vary ôrza 24 kilao eny an-tsena eo am-bavahadin’i Samaria.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny dekà, izay nianteheran’ny mpanjakan’i Israely, dia niteny tamin’ilay olon’Andriamanitra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Na dia handavaka ny lanitra aza ny TOMPO, mba ho tanteraka ve izay voalazanao teo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy i Elisà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho hitanao maso izany, saingy tsy mba hihinananao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lao ny tobin’ny Sirianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: marary hoditra
  - type: text
    text: ' efa-dahy teo ivelan’ny tanàna, akaikin’ny vavahady, ka nifampiresaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona no ijanonantsika hiandry fahafatesana eto? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha tapa-kevitra hankao an-tanàna isika, dia ho faty satria misy mosary ao; kanefa raha hijanona eto isika, dia ho faty ihany koa! Koa andeha isika hankany amin’ny tobin’ny Sirianina hitolo-batana aminy. Raha avelany ho velona aina isika, dia ho velona; fa raha vonoiny ho faty isika, dia tsy maintsy ho faty!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nankany amin’ny tobin’ny Sirianina izy efa-dahy, rehefa hariva ny andro; ary namakivaky azy hatrany amin’ny sisiny farany indrindra ireo, fa tsy nisy olona akory teo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny tobin’ny Sirianina manko efa nampandrenesan’ny Tompo firohondrohon-kalesy sy firiotran-tsoavaly ary firodorodon-tafika goavana. Dia nifampiresaka ny Sirianina nanao hoe: «Efa nokaramain’ny mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' ireo mpanjaka hetita sy ejiptianina mba hiady amintsika!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vao nisomambisamby ny andro, dia lasa nandositra nanavo-tena izy ka nilaozany fotsiny teo ny tobiny ary navelany avokoa ny lay sy ny soavaly amam-boriky.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tonga teo an-tsisiny farany indrindra amin’ny toby àry ireto marary hoditra efa-dahy. Dia niditra ny lay anankiray izy ka nihinana sy nisotro tamin’izay sakafo tao, avy eo naka volafotsy sy volamena ary fitafiana izy ka lasa nanafina izany; dia niditra ny lay anankiray hafa indray izy, ary naka zavatra isan-karazany ka lasa nanafina izany koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiafaràn’ny fahirano sy ny mosary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa nifampiresaka ireo marary hoditra efa-dahy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy tsara izao zavatra ataontsika izao. Androm-baovao mahafaly anio. Koa raha tanantsika ho antsika samirery izany ka iandrasantsika ny fahazavan’ny andro, dia hofaizin’Andriamanitra tokoa isika. Fa andeha isika hankao an-tanàna ary hampilaza izany vaovao izany ao an-dapan’ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niverina tany an-tanàna izy ka niantso ny mpiambina vavahady sady nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tonga tany an-tobin’ny Sirianina izahay; fa tsy misy olona intsony ao sady tsy nandrenesana feon’olona akory. Tsy nisy afa-tsy soavaly sy boriky mifatotra ary lay nilaozana fotsiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia niantso olona ny mpiambina hampita izany hafatra izany any an-dapan’ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nifoha mbola alina ny mpanjaka ka niteny tamin’ny minisitra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hampahafantariko anareo izay kotrehin’ny Sirianina amintsika. Fantany fa mosarena isika, ka izany no nandaozany ny tobiny sy niafenany any an-tsaha ary iandrasany izay hivoahantsika ny tanàna mba hanaovany sambo-belona antsika, dia hidirany amin’izay ny tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa namaly ny minisitra iray ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hakana dimy amin’ireo soavaly sisa tavela ato an-tanàna; fa efa tandindomim-paharinganana tahaka ny Israelita rehetra monina ato ireo; koa aoka hisy olona halefantsika hitaingina ireo ka hijery izay miseho any.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nalain’ny mpanjaka ireo soavaly sahaza kalesy roa; ary nisy miaramila mpisafo nirahiny hanara-dia ny tafika sirianina mba hijery izay miseho any. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa nanaraka ny diany hatrany Jôrdàna ny mpisafo, ary indreny hitany manerana ny arabe ny fitafiana sy fitaovana maro izay narian’ny Sirianina noho izy dodona handositra. Dia niverina nampandre ny mpanjaka ireto iraka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nivoaka ny tanàna ireo mponin’i Samaria ka nandroba ny tobin’ny Sirianina. Koa araka ny efa nambaran’ny TOMPO, ny vidin’ny lafarinina 12 kilao na ny vary ôrza 24 kilao dia samy sekela iray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nasain’ny mpanjaka hanara-maso ny tsena eo am-bavahady ny dekà izay nianteherany; nefa dia voahitsakin’ny olona teo izy ka maty araka ny efa nambaran’i Elisà '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ', raha nidina tany aminy ny mpanjaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tanteraka araka izany izay nolazain’ilay olon’Andriamanitra tamin’ny mpanjaka hoe: «Rahampitso toy izao eny an-tsena eo am-bavahadin’i Samaria, dia samy ho sekela iray ihany no vidin’ny vary ôrza 24 kilao na ny lafarinina 12 kilao.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy ny navalin’ilay dekàn’ny mpanjaka tamin’izay: «Na dia handavaka ny lanitra aza ny TOMPO, mba ho tanteraka ve izay voalazanao teo?» Ary hoy i Elisà: «Ho hitanao maso izany, saingy tsy mba hihinananao.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia tanteraka tamin’ilay dekà tokoa izany, fa voahosin’ny olona niantsena teo am-bavahadin’ny tanàna izy ka maty.
