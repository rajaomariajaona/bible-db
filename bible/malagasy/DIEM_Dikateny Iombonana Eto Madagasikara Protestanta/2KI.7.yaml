document_id: 2KI.7,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia hoy ny navalin’i Elisà:'
  - type: text
    content: '–Izao no lazain’ny TOMPO, koa henoinareo: «Rahampitso toy izao dia samy ho sekela iray ihany no vidin’ny lafarinina 12 kilao na ny vary ôrza 24 kilao eny an-tsena eo am-bavahadin’i Samaria.»'
  '10':
  - type: text
    content: 'Dia niverina tany an-tanàna izy ka niantso ny mpiambina vavahady sady nilaza taminy hoe:'
  - type: text
    content: –Tonga tany an-tobin’ny Sirianina izahay; fa tsy misy olona intsony ao sady tsy nandrenesana feon’olona akory. Tsy nisy afa-tsy soavaly sy boriky mifatotra ary lay nilaozana fotsiny.
  '11':
  - type: text
    content: Dia niantso olona ny mpiambina hampita izany hafatra izany any an-dapan’ny mpanjaka.
  '12':
  - type: text
    content: 'Nifoha mbola alina ny mpanjaka ka niteny tamin’ny minisitra hoe:'
  - type: text
    content: –Hampahafantariko anareo izay kotrehin’ny Sirianina amintsika. Fantany fa mosarena isika, ka izany no nandaozany ny tobiny sy niafenany any an-tsaha ary iandrasany izay hivoahantsika ny tanàna mba hanaovany sambo-belona antsika, dia hidirany amin’izay ny tanàna.
  '13':
  - type: text
    content: 'Fa namaly ny minisitra iray ka nanao hoe:'
  - type: text
    content: –Aoka hakana dimy amin’ireo soavaly sisa tavela ato an-tanàna; fa efa tandindomim-paharinganana tahaka ny Israelita rehetra monina ato ireo; koa aoka hisy olona halefantsika hitaingina ireo ka hijery izay miseho any.
  '14':
  - type: text
    content: 'Dia nalain’ny mpanjaka ireo soavaly sahaza kalesy roa; ary nisy miaramila mpisafo nirahiny hanara-dia ny tafika sirianina mba hijery izay miseho any. '
  '15':
  - type: text
    content: Koa nanaraka ny diany hatrany Jôrdàna ny mpisafo, ary indreny hitany manerana ny arabe ny fitafiana sy fitaovana maro izay narian’ny Sirianina noho izy dodona handositra. Dia niverina nampandre ny mpanjaka ireto iraka.
  '16':
  - type: text
    content: 'Ary nivoaka ny tanàna ireo mponin’i Samaria ka nandroba ny tobin’ny Sirianina. Koa araka ny efa nambaran’ny TOMPO, ny vidin’ny lafarinina 12 kilao na ny vary ôrza 24 kilao dia samy sekela iray ihany. '
  '17':
  - type: text
    content: 'Nasain’ny mpanjaka hanara-maso ny tsena eo am-bavahady ny dekà izay nianteherany; nefa dia voahitsakin’ny olona teo izy ka maty araka ny efa nambaran’i Elisà '
  - type: text
    content: mpaminany
  - type: text
    content: ', raha nidina tany aminy ny mpanjaka.'
  '18':
  - type: text
    content: 'Tanteraka araka izany izay nolazain’ilay olon’Andriamanitra tamin’ny mpanjaka hoe: «Rahampitso toy izao eny an-tsena eo am-bavahadin’i Samaria, dia samy ho sekela iray ihany no vidin’ny vary ôrza 24 kilao na ny lafarinina 12 kilao.» '
  '19':
  - type: text
    content: 'Fa hoy ny navalin’ilay dekàn’ny mpanjaka tamin’izay: «Na dia handavaka ny lanitra aza ny TOMPO, mba ho tanteraka ve izay voalazanao teo?» Ary hoy i Elisà: «Ho hitanao maso izany, saingy tsy mba hihinananao.» '
  '2':
  - type: text
    content: 'Fa ny dekà, izay nianteheran’ny mpanjakan’i Israely, dia niteny tamin’ilay olon’Andriamanitra ka nanao hoe:'
  - type: text
    content: –Na dia handavaka ny lanitra aza ny TOMPO, mba ho tanteraka ve izay voalazanao teo?
  - type: text
    content: 'Ary hoy i Elisà:'
  - type: text
    content: –Ho hitanao maso izany, saingy tsy mba hihinananao.
  - type: heading
    content: Lao ny tobin’ny Sirianina
  '20':
  - type: text
    content: Dia tanteraka tamin’ilay dekà tokoa izany, fa voahosin’ny olona niantsena teo am-bavahadin’ny tanàna izy ka maty.
  '3':
  - type: text
    content: 'Nisy '
  - type: text
    content: marary hoditra
  - type: text
    content: ' efa-dahy teo ivelan’ny tanàna, akaikin’ny vavahady, ka nifampiresaka hoe:'
  - type: text
    content: '–Inona no ijanonantsika hiandry fahafatesana eto? '
  '4':
  - type: text
    content: Raha tapa-kevitra hankao an-tanàna isika, dia ho faty satria misy mosary ao; kanefa raha hijanona eto isika, dia ho faty ihany koa! Koa andeha isika hankany amin’ny tobin’ny Sirianina hitolo-batana aminy. Raha avelany ho velona aina isika, dia ho velona; fa raha vonoiny ho faty isika, dia tsy maintsy ho faty!
  '5':
  - type: text
    content: Dia nankany amin’ny tobin’ny Sirianina izy efa-dahy, rehefa hariva ny andro; ary namakivaky azy hatrany amin’ny sisiny farany indrindra ireo, fa tsy nisy olona akory teo.
  '6':
  - type: text
    content: 'Ny tobin’ny Sirianina manko efa nampandrenesan’ny Tompo firohondrohon-kalesy sy firiotran-tsoavaly ary firodorodon-tafika goavana. Dia nifampiresaka ny Sirianina nanao hoe: «Efa nokaramain’ny mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' ireo mpanjaka hetita sy ejiptianina mba hiady amintsika!» '
  '7':
  - type: text
    content: Vao nisomambisamby ny andro, dia lasa nandositra nanavo-tena izy ka nilaozany fotsiny teo ny tobiny ary navelany avokoa ny lay sy ny soavaly amam-boriky.
  '8':
  - type: text
    content: Tonga teo an-tsisiny farany indrindra amin’ny toby àry ireto marary hoditra efa-dahy. Dia niditra ny lay anankiray izy ka nihinana sy nisotro tamin’izay sakafo tao, avy eo naka volafotsy sy volamena ary fitafiana izy ka lasa nanafina izany; dia niditra ny lay anankiray hafa indray izy, ary naka zavatra isan-karazany ka lasa nanafina izany koa.
  - type: heading
    content: Fiafaràn’ny fahirano sy ny mosary
  '9':
  - type: text
    content: 'Fa nifampiresaka ireo marary hoditra efa-dahy nanao hoe:'
  - type: text
    content: –Tsy tsara izao zavatra ataontsika izao. Androm-baovao mahafaly anio. Koa raha tanantsika ho antsika samirery izany ka iandrasantsika ny fahazavan’ny andro, dia hofaizin’Andriamanitra tokoa isika. Fa andeha isika hankao an-tanàna ary hampilaza izany vaovao izany ao an-dapan’ny mpanjaka.
