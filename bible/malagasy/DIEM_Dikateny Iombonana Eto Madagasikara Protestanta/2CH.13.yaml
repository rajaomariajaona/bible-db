document_id: 2CH.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Abià
  - type: heading
    content: (Jereo 1 Mp 15.1-8)
  - type: text
    content: 'Tamin’ny taona faha-18 nanjakàn’i Jerôbohama no tonga mpanjakan’i Joda i Abià; '
  '10':
  - type: text
    content: 'Fa ny aminay kosa, dia ny TOMPO no Andriamanitray, ka tsy mba nandao Azy izahay. Ny mpisorona izay manao fanompoam-pivavahana ho an’ny TOMPO dia ny taranak’i Aharôna; ary ny levita koa manana ny anjara raharahany. '
  '11':
  - type: text
    content: 'Isa-maraina sy isan-kariva ireo no mampanetona ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy ny vovo-javamanitra ho an’ny TOMPO na koa mandahatra eo amin’ny latabatra madio ny mofo atolotra ho an’Andriamanitra; ary isan-kariva ireo no mampirehitra ny jiro eo amin’ny fitoeran-jiro volamena. Izahay manko mitandrina izay nasain’ny TOMPO Andriamanitray'
  - type: note
    content: Jereo Lev 24.5-9.
  - type: text
    content: ' hotandremana; fa ianareo kosa nandao Azy. '
  '12':
  - type: text
    content: Indro miaraka aminay Andriamanitra mba ho mpitarika anay; ary indreo ny mpisorony vonona hitsoka ny trompetra avo faneno mba hanaingana hamely anareo
  - type: note
    content: Jereo Nom 10.9.
  - type: text
    content: . Koa aza miady amin’ny TOMPO Andriamanitry ny razanareo, ry Israelita tavaratra, fa tsy hahomby ange ianareo!»
  '13':
  - type: text
    content: 'Fa nasain’i Jerôbohama nandroso ny miaramila mpanotrika mba hamely tampoka ny fahavalo avy eo ivoho, hany ka ny tafika '
  - type: text
    content: israelita
  - type: text
    content: ' tavaratra no teo anoloan’ny Jodeanina ary ny mpanotrika no teo ivohony. '
  '14':
  - type: text
    content: 'Rehefa nijery manodidina azy ny Jodeanina, dia indreo teo anoloany sy teo ivohony ny fahavalo; ka niantso vonjy tamin’ny TOMPO izy. Vao nitsoka trompetra ny mpisorona, '
  '15':
  - type: text
    content: 'dia nanao akoran’ady ny miaramila jodeanina; koa tamin’izay no namelezan’Andriamanitra an’i Jerôbohama sy ny Israelita tavaratra rehetra teo anoloan’i Abià sy ny Jodeanina. '
  '16':
  - type: text
    content: 'Nandositra teo anoloan’ireto Jodeanina ny Israelita ka natolotr’Andriamanitra ho eo ambany fifehezany. '
  '17':
  - type: text
    content: 'Faharesena goavana no namaizan’i Abià sy ny tafiny azy, ka nataony niampatrampatra ny fatin’ireo miaramila israelita voafantina nisy andiany dimanjato. '
  '18':
  - type: text
    content: 'Tamin’izany fotoana izany no nampietrena ny Israelita; nandresy kosa ny Jodeanina satria niankina tamin’ny TOMPO Andriamanitry ny razany. '
  '19':
  - type: text
    content: Nanenjika an’i Jerôbohama i Abià ka nisy azony ny tanànany, dia i Betela sy i Jesanà ary i Hefrôna mbamin’ireo tanàna madinika manodidina azy avy.
  '2':
  - type: text
    content: ary naharitra telo taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Mikaià, zanakavavin’i Oriela
  - type: note
    content: Araka ny 11.20 kosa i Abià dia zanakalahin’i Mahekà izay zanakavavin’i Abisalôma (jereo 1 Mp 15.2). Mety olona nitaiza na nanangana an’i Abià ity Mikaià ity.
  - type: text
    content: ' avy any Gibehà.'
  - type: text
    content: 'Niady i Abià sy i Jerôbohama. '
  '20':
  - type: text
    content: 'Tamin’ny andron’i Abià, dia tsy nanan-kery intsony i Jerôbohama; ary namely azy ny TOMPO, ka maty izy. '
  '21':
  - type: text
    content: I Abià kosa nitombo fahefana; ary nanam-bady 14 izy, ka zazalahy 22 sy zazavavy 16 no naterany.
  '22':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Abià ary koa ny zava-bitany sy nataony dia efa voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Tsiahin’i Hidao
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: note
    content: Very io boky io fa tsy ananantsika intsony.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Abià
  - type: note
    content: Ao amin’ny dkt sasany ny and 13.23 dia voalahatra ho 14.1 ka manjary ho 14.2-15 ny and 14.1-14.
  - type: text
    content: ', dia nalevina tao an-'
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ; ary i Asà zanany lahy no nanjaka nandimby azy.
  '3':
  - type: text
    content: 'Ary i Abià no nanomboka izany ka nitondra miaramila maherifo, dia vatan-dehilahy voafantina nisy andiany efajato. I Jerôbohama kosa nandahatra ny azy hiady aminy, dia vatan-dehilahy voafantina nisy andiany valonjato sady samy maherifo avokoa. '
  '4':
  - type: text
    content: Teo an-tampon’i Tsemaraîma
  - type: note
    content: Io tampon-tendrombohitra io dia 30 km eo ho eo ao avaratr’i Jerosalema.
  - type: text
    content: ', tendrombohitr’i Efraîma, no nijoro i Abià ka niteny hoe: «Henoy aho, ry Jerôbohama sy ry Israelita rehetra! '
  '5':
  - type: text
    content: Tsy tokony ho fantatrareo ve fa ny TOMPO Andriamanitr’i Israely efa nanome mandrakizay ny fanjakàn’i Israely ho an’i Davida sy ny taranany? Eny, nataony fanekena tsy azo foanana izany
  - type: note
    content: 'fanekena tsy azo dikaina: izany no tian-kolazaina amin’ny fomba fiteny hebreo ara-bakiteny hoe Fanekena nasian-tsira; jereo Lev 2.13 sy nta.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Nefa kosa nitsangana i Jerôbohama, zanakalahin’i Nebata sady mpanompon’i Salômôna zanakalahin’i Davida, ka nikomy tamin’ny tompony. '
  '7':
  - type: text
    content: 'Nisy koa olom-poana, tena ratsy fanahy, tafangona teo amin’i Jerôbohama ka nampidrikina azy tamin’i Rehabohama zanakalahin’i Salômôna; fa mbola tanora sady marefo toetra i Rehabohama tamin’izay ka tsy nahatohitra azy. '
  '8':
  - type: text
    content: Ankehitriny ianareo dia mihambo hanohitra ny fanjakana izay napetraky ny TOMPO eo an-tanan’ny taranak’i Davida. Marobe tokoa ianareo sady tafaraka aminareo ny ombilahikely volamena izay nataon’i Jerôbohama ho andriamanitrareo
  - type: note
    content: Jereo 1 Mp 12.26-33.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Noroahinareo ny tena '
  - type: text
    content: mpisoron
  - type: text
    content: '’ny TOMPO, dia ny taranak’i Aharôna ary koa ny '
  - type: text
    content: levita
  - type: text
    content: '; fa nanendry mpisorona ho anareo kosa ianareo, tahaka ny fanaon’ny firenena any amin’ny tany hafa. Na iza na iza nitondra ombilahy iray sy ondrilahy fito hanokanana ny tenany, dia tonga mpisoron’ireny andriamani-tsiizy ireny. '
