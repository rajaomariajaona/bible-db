document_id: 2CH.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakàn’i Abià
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 15.1-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona faha-18 nanjakàn’i Jerôbohama no tonga mpanjakan’i Joda i Abià; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary naharitra telo taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Mikaià, zanakavavin’i Oriela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny 11.20 kosa i Abià dia zanakalahin’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mahekà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zanakavavin’i Abisalôma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 1 Mp 15.2). Mety olona nitaiza na nanangana an’i Abià ity Mikaià ity.'
    marker-yv: yv-n
  - type: text
    text: ' avy any Gibehà.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Niady i Abià sy i Jerôbohama. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary i Abià no nanomboka izany ka nitondra miaramila maherifo, dia vatan-dehilahy voafantina nisy andiany efajato. I Jerôbohama kosa nandahatra ny azy hiady aminy, dia vatan-dehilahy voafantina nisy andiany valonjato sady samy maherifo avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Teo an-tampon’i Tsemaraîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Io '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tampon-tendrombohitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io dia 30 km eo ho eo ao avaratr’i Jerosalema.'
    marker-yv: yv-n
  - type: text
    text: ', tendrombohitr’i Efraîma, no nijoro i Abià ka niteny hoe: «Henoy aho, ry Jerôbohama sy ry Israelita rehetra! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy tokony ho fantatrareo ve fa ny TOMPO Andriamanitr’i Israely efa nanome mandrakizay ny fanjakàn’i Israely ho an’i Davida sy ny taranany? Eny, nataony fanekena tsy azo foanana izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'fanekena tsy azo dikaina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izany no tian-kolazaina amin’ny fomba fiteny hebreo ara-bakiteny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Fanekena nasian-tsira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; jereo Lev 2.13 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa kosa nitsangana i Jerôbohama, zanakalahin’i Nebata sady mpanompon’i Salômôna zanakalahin’i Davida, ka nikomy tamin’ny tompony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nisy koa olom-poana, tena ratsy fanahy, tafangona teo amin’i Jerôbohama ka nampidrikina azy tamin’i Rehabohama zanakalahin’i Salômôna; fa mbola tanora sady marefo toetra i Rehabohama tamin’izay ka tsy nahatohitra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ankehitriny ianareo dia mihambo hanohitra ny fanjakana izay napetraky ny TOMPO eo an-tanan’ny taranak’i Davida. Marobe tokoa ianareo sady tafaraka aminareo ny ombilahikely volamena izay nataon’i Jerôbohama ho andriamanitrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 12.26-33.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Noroahinareo ny tena '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisoron
  - type: text
    text: '’ny TOMPO, dia ny taranak’i Aharôna ary koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '; fa nanendry mpisorona ho anareo kosa ianareo, tahaka ny fanaon’ny firenena any amin’ny tany hafa. Na iza na iza nitondra ombilahy iray sy ondrilahy fito hanokanana ny tenany, dia tonga mpisoron’ireny andriamani-tsiizy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny aminay kosa, dia ny TOMPO no Andriamanitray, ka tsy mba nandao Azy izahay. Ny mpisorona izay manao fanompoam-pivavahana ho an’ny TOMPO dia ny taranak’i Aharôna; ary ny levita koa manana ny anjara raharahany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Isa-maraina sy isan-kariva ireo no mampanetona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo sy ny vovo-javamanitra ho an’ny TOMPO na koa mandahatra eo amin’ny latabatra madio ny mofo atolotra ho an’Andriamanitra; ary isan-kariva ireo no mampirehitra ny jiro eo amin’ny fitoeran-jiro volamena. Izahay manko mitandrina izay nasain’ny TOMPO Andriamanitray'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 24.5-9.
    marker-yv: yv-n
  - type: text
    text: ' hotandremana; fa ianareo kosa nandao Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indro miaraka aminay Andriamanitra mba ho mpitarika anay; ary indreo ny mpisorony vonona hitsoka ny trompetra avo faneno mba hanaingana hamely anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 10.9.
    marker-yv: yv-n
  - type: text
    text: . Koa aza miady amin’ny TOMPO Andriamanitry ny razanareo, ry Israelita tavaratra, fa tsy hahomby ange ianareo!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa nasain’i Jerôbohama nandroso ny miaramila mpanotrika mba hamely tampoka ny fahavalo avy eo ivoho, hany ka ny tafika '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israelita
  - type: text
    text: ' tavaratra no teo anoloan’ny Jodeanina ary ny mpanotrika no teo ivohony. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa nijery manodidina azy ny Jodeanina, dia indreo teo anoloany sy teo ivohony ny fahavalo; ka niantso vonjy tamin’ny TOMPO izy. Vao nitsoka trompetra ny mpisorona, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia nanao akoran’ady ny miaramila jodeanina; koa tamin’izay no namelezan’Andriamanitra an’i Jerôbohama sy ny Israelita tavaratra rehetra teo anoloan’i Abià sy ny Jodeanina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nandositra teo anoloan’ireto Jodeanina ny Israelita ka natolotr’Andriamanitra ho eo ambany fifehezany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Faharesena goavana no namaizan’i Abià sy ny tafiny azy, ka nataony niampatrampatra ny fatin’ireo miaramila israelita voafantina nisy andiany dimanjato. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tamin’izany fotoana izany no nampietrena ny Israelita; nandresy kosa ny Jodeanina satria niankina tamin’ny TOMPO Andriamanitry ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nanenjika an’i Jerôbohama i Abià ka nisy azony ny tanànany, dia i Betela sy i Jesanà ary i Hefrôna mbamin’ireo tanàna madinika manodidina azy avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin’ny andron’i Abià, dia tsy nanan-kery intsony i Jerôbohama; ary namely azy ny TOMPO, ka maty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I Abià kosa nitombo fahefana; ary nanam-bady 14 izy, ka zazalahy 22 sy zazavavy 16 no naterany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Abià ary koa ny zava-bitany sy nataony dia efa voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tsiahin’i Hidao
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Very io boky io fa tsy ananantsika intsony.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany i Abià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ao amin’ny dkt sasany ny and 13.23 dia voalahatra ho 14.1 ka manjary ho 14.2-15 ny and 14.1-14.
    marker-yv: yv-n
  - type: text
    text: ', dia nalevina tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: ; ary i Asà zanany lahy no nanjaka nandimby azy.
