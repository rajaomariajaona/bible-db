    children:
    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Ny tantaran’i Rota dia mitondra antsika ho amin’ny fotoana izay nitondran’ireo antsoina hoe Mpitsara ny vahoaka Israely; saingy nosoratana tafara izany tamin’ny daty izay sarotra faritana mazava, kanefa toa taorian’ny fiverenan’ny Israelita avy tany Babilôna.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Anankiray amin’ny zava-kendren’ity boky izay mitantara momba an’i Rota ity, dia ny haneho ny fomba nidiran’ity vehivavy vahiny iray tao amin’ny vahoakan’Andriamanitra. Noho izany ny tantara dia manizingizina mafy ny firaiketam-po fakàn-tahaka nasehon’i Rota, vehivavy Môabita: firaiketam-po tamin’ny fianakaviam-badiny sy tamin’Ilay Andriamanitr’i Israely. Soritsoritany ny fomba namalian’Andriamanitra soa izany firaiketam-po izany: tanaty fahoriana i Rota sy i Nahômỳ rafozambaviny tany am-boalohany, dia miarina tsikelikely ho amin’ny fananana miavosa sy ny fahasambarana. Ny tantara izay nosoratana tamin’ny fahatsorana tokoa, dia mampiseho ohatra manintona momba ny tsy fivadihana eo amin’ny fifandraisan’ny samy olombelona sy momba ny fahatokiana an’Andriamanitra.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny nahaterahan’ny zanakalahin’i Rota anefa no tena faratampony amin’ny fitantarana, fa io zaza io no ho tonga raiben’i Davida mpanjaka. Ary satria anisan’ny razamben’i Davida i Rota vehivavy môabita, dia manana ny anjara toerany koa izy na dia ao amin’ny tetiaran’i Jesoa Kristy aza (Mt 1.5).
