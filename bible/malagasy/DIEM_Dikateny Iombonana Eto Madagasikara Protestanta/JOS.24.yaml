document_id: JOS.24,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanapahan-kevitr’i Israely hanompo ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Namory ny fokon’i Israely rehetra tao Sekema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny tanàna '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sekema
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay 50 km eo ho eo any avaratr’i Jerosalema, dia toeram-pivavahana iray ho an’ny fivoriamben’ny foko 12 ao amin’ny Israely.'
      marker-yv: yv-n
    - type: text
      text: ' i Josoa. Nantsoiny avokoa ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholony
    - type: text
      text: ' sy lehilahy ary mpitsarany sy manamboninahiny, ka tonga niseho teo anatrehan’Andriamanitra. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: nefa tsy nanaiky hihaino an’i Bilehama Aho, ka voatery nitsodrano anareo i Bilehama ary nafahako tsy ho azon’ny tanan’i Balàka ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 22–24.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia niampita an’i Jôrdàna ianareo ka tonga tao Jerikao; ary niady taminareo ny mponina tao Jerikao, toy izany koa ny Amôrita sy Perizita, ny Kanahanita sy Hetita, ny Girgasita sy Hivita ary Jebosita nefa samy natolotro tao an-tananareo ireny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.4-17; 6.1-21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary nandefasako takola-panenitra teo alohanareo ka ireny no nampandositra ireo mpanjaka amôrita anankiroa teo anoloanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'takola-panenitra... nampandositra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hakiviana teo anoloanareo ka izany no nampadositra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: mpanjaka amôrita anankiroa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 12.2-5.'
      marker-yv: yv-n
    - type: text
      text: ', fa tsy ny sabatrareo na ny tsipîkanareo velively. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nomeko tany izay tsy nasainareo ianareo, nomeko tanàna izay tsy naorinareo nefa onenanareo, nomeko tanim-boaloboka sy tanin’ôliva izay tsy nambolenareo nefa ihinananareo ny voany.»
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy ihany i Josoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Koa ankehitriny manajà ny TOMPO ka manompoa Azy amim-pahitsiana sy fahamarinana. Ario ny andriamanitra izay notompoin’ny razanareo tany ampitan’i Eofrata sy tany Ejipta, ka manompoa ny TOMPO. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nefa raha tàhiny tsy sitrakareo ny hanompo ny TOMPO, dia fidio anio izay hotompoinareo, na ny andriamanitra izay notompoin’ny razanareo tany ampitan’i Eofrata na ny andriamanitry ny Amôrita izay mponina teto amin’ny tany onenanareo; fa izaho sy ny ankohonako kosa dia hanompo ny TOMPO izahay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia namaly ny vahoaka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Sanatria anay ny handao ny TOMPO mba hanompo andriamani-kafa! '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Satria ny TOMPO Andriamanitsika ihany no nampakatra ny razantsika niala tamin’ny toerana fanandevozana tany Ejipta; Izy no nanao ireny famantarana lehibe fantatsika tsara ireny; Izy no niaro ny razantsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny razantsika: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'raha ara-bakiteny kokoa dia hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: antsika
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (manambara fiombonana eo amin’ny Israelita ankehitriny sy ireo razany). Jereo koa 24.5 ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny razanareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' toy izay '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ianareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'teny amin’ny lalana rehetra nalehany sy teny amin’ny firenena rehetra noteteziny. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: IZY no nandroaka ny firenena rehetra teo anoloantsika, indrindra ny Amôrita izay nonina teto amin’ity tany ity. Koa hanompo ny TOMPO ihany koa izahay fa Izy no Andriamanitray.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy i Josoa tamin’ny vahoaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy hainareo ny hanompo ny TOMPO; fa Andriamanitra masina Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 20.5.
      marker-yv: yv-n
    - type: text
      text: ', ka tsy hahazaka ny fahadisoanareo aman’otanareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hoy i Josoa tamin’ny vahoaka rehetra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: «Tany andafin’ny ony Eofrata no niorim-ponenana ny razambenareo fahiny, izany hoe ny fianakavian’i Tera, rain’i Abrahama sy i Nahôra; ary nanompo andriamani-kafa ry zareo. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Raha mandao ny TOMPO ianareo ka manompo andriamani-kafa, dia hisapotina hampahory anareo Izy Tompo ka hahafongana anareo rehefa avy nasiany soa.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa hoy ny vahoaka tamin’i Josoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, fa ny TOMPO ihany no hotompoinay.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy indray i Josoa tamin’ny vahoaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny tenanareo ihany no vavolombelona fa efa nifidy ny hanompo ny TOMPO ianareo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ny vahoaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, vavolombelon’izany izahay!
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nofaranan’i Josoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ankehitriny àry, esory ny andriamani-kafa izay eo anivonareo ka atodiho amin’ny TOMPO Andriamanitr’Israely ny fonareo.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ka niteny tamin’i Josoa ny vahoaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny TOMPO Andriamanitray no hotompoinay ary ny baikony no hankatoavinay.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tamin’izany andro izany dia nanao fanekempihavanana tamin’ny vahoaka tao Sekema i Josoa, ka nanome azy fepetra amam-pitsipika. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nosoratan’i Josoa tao amin’ny bokin’ny lalànan’Andriamanitra ireo teny ireo; ary naka vato lehibe iray izy ka nanangana azy teo am-pototry ny hazo oaka, izay toera-masin’ny TOMPO. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Avy eo dia hoy i Josoa tamin’ny vahoaka rehetra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Jereonareo ity vato ity fa izy no ho vavolombelona amintsika satria efa nandre ny teny rehetra nolazain’ny TOMPO tamintsika; ary ho vavolombelona aminareo koa izy mba tsy hivadihanareo amin’Andriamanitrareo!
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dia noravan’i Josoa ny vahoaka, ka samy niverina tany amin’ny zarataniny avy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Josoa
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Taorian’izany zavatra izany, dia maty teo amin’ny faha-110 taonany i Josoa zanakalahin’i Nona sady mpanompon’ny TOMPO. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa Izaho no naka an’i Abrahama razambenareo avy tany am-pitan’ny ony Eofrata ary nitondra azy namakivaky ny tany Kanahàna manontolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 12.1-7.
      marker-yv: yv-n
    - type: text
      text: ' sady nampahamaro ny taranany. Nomeko ho zanakalahin’i Abrahama i Itsehàka, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Koa nalevina teo amin’ny faritry ny zarataniny izy, dia tao Timnata-Sera, any amin’ny tendrombohitr’i Efraîma, eo avaratry ny tendrombohitra Gahasa. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Nandritra ny andro rehetra niainan’i Josoa, dia nanompo ny TOMPO ireo Israelita; ary taorian’ny nahafatesan’i Josoa, dia nitohy izany nandritra ny andro rehetra niainan’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' izay nahita maso ny asa rehetra nataon’ny TOMPO ho an’i Israely.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ny taolambalon’i Jôsefa, izay nampiakarin’ny Israelita avy tany Ejipta, dia naleviny tao Sekema, tao amin’ny sombin-tany izay novidin’i Jakôba volafotsy zato tamin’ny taranak’i Hamôra, ilay mpanorina an’i Sekema; ka nanjary nolovan’ny taranak’i Jôsefa izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 33.19 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Maty koa i Elehazara zanakalahin’i Aharôna ka nalevina tao amin’ny havoana izay nomena an’i Pinehasa zanany lahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Elehazara: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 14.1 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: tao amin’ny havoana izay nomena...
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tao Gibehà (tanàna) izay nomena...
      marker-yv: yv-n
    - type: text
      text: ', tany amin’ny tendrombohitr’i Efraîma.'
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ary nomeko ho zanakalahin’i Itsehàka kosa i Jakôba sy i Hesao. Natolotro ho fananan’i Hesao ny faritra havoan’i Sehîra; fa i Jakôba sy ny zanany kosa nidina tany Ejipta. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tatỳ aoriana, dia naniraka an’i Mosesy sy i Aharôna Aho ka namely an’i Ejipta araka izay efa nataoko teo aminy; rehefa izany vao nasaiko navoaka ny razanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 7–12.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nony navoakako avy tany Ejipta ny razanareo, dia tonga teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ranomasin’ny Volotara
    - type: text
      text: '; nefa ny Ejiptianina nanenjika azy hatreo an-kalesy sy an-tsoavaly. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tamin’izay ny razanareo no niantso vonjy tamiko TOMPO; koa nametrahako haizina mikitroka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'haizina mikitroka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 14.19 ary Eks 13.21 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' tanelanelan’ireo sy ny Ejiptianina sady nazerako tamin’ireto Ejiptianina ireto ny onjan-dranomasina ka nanafotra azy. Fantatrareo tsara izay efa nataoko hamelezana ny Ejiptianina! Avy teo dia nipetraka ela tany an-taniefitra ny razanareo. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rehefa izany vao nentiko ho any amin’ny tanin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' izay monina any ampita atsinanan’i Jôrdàna ianareo; niady taminareo ry zareo, nefa natolotro teo an-tananareo ka lasanareo ny taniny ary naringako teo anoloanareo izy. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nitsangana koa i Balàka, zanakalahin’i Tsipôra sady mpanjakan’i Môaba, ka niady taminareo. Nampiantso an’i Bilehama zanakalahin’i Behôra izy hanozona anareo; '
