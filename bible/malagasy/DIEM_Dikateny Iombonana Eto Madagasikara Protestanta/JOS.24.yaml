document_id: JOS.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanapahan-kevitr’i Israely hanompo ny Tompo
  - type: text
    content: Namory ny fokon’i Israely rehetra tao Sekema
  - type: note
    content: Ny tanàna Sekema izay 50 km eo ho eo any avaratr’i Jerosalema, dia toeram-pivavahana iray ho an’ny fivoriamben’ny foko 12 ao amin’ny Israely.
  - type: text
    content: ' i Josoa. Nantsoiny avokoa ireo '
  - type: text
    content: loholony
  - type: text
    content: ' sy lehilahy ary mpitsarany sy manamboninahiny, ka tonga niseho teo anatrehan’Andriamanitra. '
  '10':
  - type: text
    content: nefa tsy nanaiky hihaino an’i Bilehama Aho, ka voatery nitsodrano anareo i Bilehama ary nafahako tsy ho azon’ny tanan’i Balàka ianareo
  - type: note
    content: Jereo Nom 22–24.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Dia niampita an’i Jôrdàna ianareo ka tonga tao Jerikao; ary niady taminareo ny mponina tao Jerikao, toy izany koa ny Amôrita sy Perizita, ny Kanahanita sy Hetita, ny Girgasita sy Hivita ary Jebosita nefa samy natolotro tao an-tananareo ireny
  - type: note
    content: Jereo 3.4-17; 6.1-21.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ary nandefasako takola-panenitra teo alohanareo ka ireny no nampandositra ireo mpanjaka amôrita anankiroa teo anoloanareo
  - type: note
    content: 'takola-panenitra... nampandositra: dkt hafa hakiviana teo anoloanareo ka izany no nampadositra. –mpanjaka amôrita anankiroa: jereo 12.2-5.'
  - type: text
    content: ', fa tsy ny sabatrareo na ny tsipîkanareo velively. '
  '13':
  - type: text
    content: Nomeko tany izay tsy nasainareo ianareo, nomeko tanàna izay tsy naorinareo nefa onenanareo, nomeko tanim-boaloboka sy tanin’ôliva izay tsy nambolenareo nefa ihinananareo ny voany.»
  '14':
  - type: text
    content: 'Dia hoy ihany i Josoa hoe:'
  - type: text
    content: '–Koa ankehitriny manajà ny TOMPO ka manompoa Azy amim-pahitsiana sy fahamarinana. Ario ny andriamanitra izay notompoin’ny razanareo tany ampitan’i Eofrata sy tany Ejipta, ka manompoa ny TOMPO. '
  '15':
  - type: text
    content: Nefa raha tàhiny tsy sitrakareo ny hanompo ny TOMPO, dia fidio anio izay hotompoinareo, na ny andriamanitra izay notompoin’ny razanareo tany ampitan’i Eofrata na ny andriamanitry ny Amôrita izay mponina teto amin’ny tany onenanareo; fa izaho sy ny ankohonako kosa dia hanompo ny TOMPO izahay.
  '16':
  - type: text
    content: 'Dia namaly ny vahoaka nanao hoe:'
  - type: text
    content: '–Sanatria anay ny handao ny TOMPO mba hanompo andriamani-kafa! '
  '17':
  - type: text
    content: Satria ny TOMPO Andriamanitsika ihany no nampakatra ny razantsika niala tamin’ny toerana fanandevozana tany Ejipta; Izy no nanao ireny famantarana lehibe fantatsika tsara ireny; Izy no niaro ny razantsika
  - type: note
    content: 'ny razantsika: raha ara-bakiteny kokoa dia hoe antsika (manambara fiombonana eo amin’ny Israelita ankehitriny sy ireo razany). Jereo koa 24.5 ahitana hoe ny razanareo toy izay ianareo.'
  - type: text
    content: 'teny amin’ny lalana rehetra nalehany sy teny amin’ny firenena rehetra noteteziny. '
  '18':
  - type: text
    content: IZY no nandroaka ny firenena rehetra teo anoloantsika, indrindra ny Amôrita izay nonina teto amin’ity tany ity. Koa hanompo ny TOMPO ihany koa izahay fa Izy no Andriamanitray.
  '19':
  - type: text
    content: 'Dia hoy i Josoa tamin’ny vahoaka:'
  - type: text
    content: –Tsy hainareo ny hanompo ny TOMPO; fa Andriamanitra masina Izy
  - type: note
    content: Jereo Eks 20.5.
  - type: text
    content: ', ka tsy hahazaka ny fahadisoanareo aman’otanareo. '
  '2':
  - type: text
    content: 'Dia hoy i Josoa tamin’ny vahoaka rehetra:'
  - type: text
    content: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: «Tany andafin’ny ony Eofrata no niorim-ponenana ny razambenareo fahiny, izany hoe ny fianakavian’i Tera, rain’i Abrahama sy i Nahôra; ary nanompo andriamani-kafa ry zareo. '
  '20':
  - type: text
    content: Raha mandao ny TOMPO ianareo ka manompo andriamani-kafa, dia hisapotina hampahory anareo Izy Tompo ka hahafongana anareo rehefa avy nasiany soa.
  '21':
  - type: text
    content: 'Fa hoy ny vahoaka tamin’i Josoa:'
  - type: text
    content: –Tsia, fa ny TOMPO ihany no hotompoinay.
  '22':
  - type: text
    content: 'Dia hoy indray i Josoa tamin’ny vahoaka:'
  - type: text
    content: –Ny tenanareo ihany no vavolombelona fa efa nifidy ny hanompo ny TOMPO ianareo.
  - type: text
    content: 'Ka novalian’ny vahoaka hoe:'
  - type: text
    content: –Eny, vavolombelon’izany izahay!
  '23':
  - type: text
    content: 'Dia nofaranan’i Josoa hoe:'
  - type: text
    content: –Ankehitriny àry, esory ny andriamani-kafa izay eo anivonareo ka atodiho amin’ny TOMPO Andriamanitr’Israely ny fonareo.
  '24':
  - type: text
    content: 'Ka niteny tamin’i Josoa ny vahoaka hoe:'
  - type: text
    content: –Ny TOMPO Andriamanitray no hotompoinay ary ny baikony no hankatoavinay.
  '25':
  - type: text
    content: 'Tamin’izany andro izany dia nanao fanekempihavanana tamin’ny vahoaka tao Sekema i Josoa, ka nanome azy fepetra amam-pitsipika. '
  '26':
  - type: text
    content: 'Dia nosoratan’i Josoa tao amin’ny bokin’ny lalànan’Andriamanitra ireo teny ireo; ary naka vato lehibe iray izy ka nanangana azy teo am-pototry ny hazo oaka, izay toera-masin’ny TOMPO. '
  '27':
  - type: text
    content: 'Avy eo dia hoy i Josoa tamin’ny vahoaka rehetra:'
  - type: text
    content: –Jereonareo ity vato ity fa izy no ho vavolombelona amintsika satria efa nandre ny teny rehetra nolazain’ny TOMPO tamintsika; ary ho vavolombelona aminareo koa izy mba tsy hivadihanareo amin’Andriamanitrareo!
  '28':
  - type: text
    content: Dia noravan’i Josoa ny vahoaka, ka samy niverina tany amin’ny zarataniny avy.
  - type: heading
    content: Ny nahafatesan’i Josoa
  '29':
  - type: text
    content: 'Taorian’izany zavatra izany, dia maty teo amin’ny faha-110 taonany i Josoa zanakalahin’i Nona sady mpanompon’ny TOMPO. '
  '3':
  - type: text
    content: Fa Izaho no naka an’i Abrahama razambenareo avy tany am-pitan’ny ony Eofrata ary nitondra azy namakivaky ny tany Kanahàna manontolo
  - type: note
    content: Jereo Gen 12.1-7.
  - type: text
    content: ' sady nampahamaro ny taranany. Nomeko ho zanakalahin’i Abrahama i Itsehàka, '
  '30':
  - type: text
    content: 'Koa nalevina teo amin’ny faritry ny zarataniny izy, dia tao Timnata-Sera, any amin’ny tendrombohitr’i Efraîma, eo avaratry ny tendrombohitra Gahasa. '
  '31':
  - type: text
    content: 'Nandritra ny andro rehetra niainan’i Josoa, dia nanompo ny TOMPO ireo Israelita; ary taorian’ny nahafatesan’i Josoa, dia nitohy izany nandritra ny andro rehetra niainan’ireo '
  - type: text
    content: loholona
  - type: text
    content: ' izay nahita maso ny asa rehetra nataon’ny TOMPO ho an’i Israely.'
  '32':
  - type: text
    content: Ny taolambalon’i Jôsefa, izay nampiakarin’ny Israelita avy tany Ejipta, dia naleviny tao Sekema, tao amin’ny sombin-tany izay novidin’i Jakôba volafotsy zato tamin’ny taranak’i Hamôra, ilay mpanorina an’i Sekema; ka nanjary nolovan’ny taranak’i Jôsefa izany
  - type: note
    content: Jereo Gen 33.19 sy nta.
  - type: text
    content: .
  '33':
  - type: text
    content: Maty koa i Elehazara zanakalahin’i Aharôna ka nalevina tao amin’ny havoana izay nomena an’i Pinehasa zanany lahy
  - type: note
    content: 'Elehazara: jereo 14.1 sy nta. –tao amin’ny havoana izay nomena... na tao Gibehà (tanàna) izay nomena...'
  - type: text
    content: ', tany amin’ny tendrombohitr’i Efraîma.'
  '4':
  - type: text
    content: 'ary nomeko ho zanakalahin’i Itsehàka kosa i Jakôba sy i Hesao. Natolotro ho fananan’i Hesao ny faritra havoan’i Sehîra; fa i Jakôba sy ny zanany kosa nidina tany Ejipta. '
  '5':
  - type: text
    content: Tatỳ aoriana, dia naniraka an’i Mosesy sy i Aharôna Aho ka namely an’i Ejipta araka izay efa nataoko teo aminy; rehefa izany vao nasaiko navoaka ny razanareo
  - type: note
    content: Jereo Eks 7–12.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ary nony navoakako avy tany Ejipta ny razanareo, dia tonga teo amin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: '; nefa ny Ejiptianina nanenjika azy hatreo an-kalesy sy an-tsoavaly. '
  '7':
  - type: text
    content: Tamin’izay ny razanareo no niantso vonjy tamiko TOMPO; koa nametrahako haizina mikitroka
  - type: note
    content: 'haizina mikitroka: jereo Eks 14.19 ary Eks 13.21 sy nta.'
  - type: text
    content: ' tanelanelan’ireo sy ny Ejiptianina sady nazerako tamin’ireto Ejiptianina ireto ny onjan-dranomasina ka nanafotra azy. Fantatrareo tsara izay efa nataoko hamelezana ny Ejiptianina! Avy teo dia nipetraka ela tany an-taniefitra ny razanareo. '
  '8':
  - type: text
    content: 'Rehefa izany vao nentiko ho any amin’ny tanin’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' izay monina any ampita atsinanan’i Jôrdàna ianareo; niady taminareo ry zareo, nefa natolotro teo an-tananareo ka lasanareo ny taniny ary naringako teo anoloanareo izy. '
  '9':
  - type: text
    content: 'Nitsangana koa i Balàka, zanakalahin’i Tsipôra sady mpanjakan’i Môaba, ka niady taminareo. Nampiantso an’i Bilehama zanakalahin’i Behôra izy hanozona anareo; '
