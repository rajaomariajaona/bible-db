document_id: ISA.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Izay mandrava, dia horavana
  - type: text
    content: Lozanao
  - type: note
    content: 'Lozanao: toa miantefa amin’ny Asiria izany loza izany; ampit 10.5-19.'
  - type: text
    content: ', ry ilay tsy norobaina nefa mandroba'
  - type: text
    content: sy ry ilay tsy nofitahina nefa mamitaka.
  - type: text
    content: Rehefa mitsahatra mandrava ianao,
  - type: text
    content: dia mba horavana koa;
  - type: text
    content: ary rehefa mitsahatra mamitaka,
  - type: text
    content: dia mba hofitahina koa.
  '10':
  - type: text
    content: «Ankehitriny, hoy ny TOMPO,
  - type: text
    content: no hirotsaka an-tsehatra Aho;
  - type: text
    content: ankehitriny no hitraka Aho
  - type: text
    content: ary haneho ny fahalehibiazako.
  '11':
  - type: text
    content: Toy ny torontoronina vilona ianareo,
  - type: text
    content: ka miteraka mololo;
  - type: text
    content: koa ny fofonaiko no tahaka ny afo
  - type: text
    content: izay handevona anareo.
  '12':
  - type: text
    content: Ny firenen-kafa kosa
  - type: text
    content: hataon’ny afo lasa lavenon-tsokay;
  - type: text
    content: ho toy ny kirihitra tsilo voatomboka
  - type: text
    content: no handripahan’ny afo azy.
  '13':
  - type: text
    content: Ianareo lavitra, mihainoa izay nataoko;
  - type: text
    content: ianareo akaiky, fantaro ny heriko.»
  '14':
  - type: text
    content: 'Raiki-tahotra ny mpanota ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: 'mangovitra ireo mpihatsaravelatsihy:'
  - type: text
    content: «Iza amintsika, hoy izy, no hahajanona
  - type: text
    content: eo anilan’izao afo mandevona izao?
  - type: text
    content: Iza amintsika no hahatanty
  - type: text
    content: an’izao afo tsy misy farany izao?»
  '15':
  - type: text
    content: –Izay mandeha araka ny rariny
  - type: text
    content: ka miteny tsy misy olakolaka,
  - type: text
    content: izay mandà ny tombontsoa azo an-keriny
  - type: text
    content: sy manakifika ny tanany tsy handray tsolotra,
  - type: text
    content: izay manampin-tsofina tsy hihaino
  - type: text
    content: ny teny mampirisika hamono olona,
  - type: text
    content: izay manakimpy ny masony
  - type: text
    content: mba tsy hijery ny ratsy.
  '16':
  - type: text
    content: Izany olona izany no honina
  - type: text
    content: eny amin’ny toerana avo tsy hay anihina;
  - type: text
    content: ny harambato mafy no ho fialofany,
  - type: text
    content: homena hanina sahaza azy izy
  - type: text
    content: ary hiantohana rano hosotroiny.
  - type: heading
    content: Afaka i Jerosalema
  '17':
  - type: text
    content: Ny masonao no hijery ny mpanjaka
  - type: text
    content: ao anatin’ny famirapiratany,
  - type: text
    content: ary koa hahita ny tany
  - type: text
    content: araka ny velarany faran’izay midadasika;
  '18':
  - type: text
    content: hahatsiaro ilay natahoranao ianao
  - type: text
    content: 'ka ho velom-panontaniana hoe:'
  - type: text
    content: «Nankaiza àry ilay mpanisa
  - type: text
    content: sy mpanamarina ny hetra?
  - type: text
    content: Nankaiza ilay mpanao fisafoana
  - type: text
    content: eny amin’ny tilikambo?»
  '19':
  - type: text
    content: Tsy ho hitanao intsony
  - type: text
    content: ilay firenena misetrasetra
  - type: text
    content: sy mampiasa fiteny tsy fantatra
  - type: text
    content: sady miboredika tsy misy ahazoana azy.
  '2':
  - type: text
    content: TOMPO ô, iantrao izahay fa manantena Anao.
  - type: text
    content: Aoka Ianao no ho herinay isa-maraina
  - type: text
    content: sady ho mpamonjy anay amin’ny androm-pahoriana!
  '20':
  - type: text
    content: 'Ndeha topazonao maso i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: fankalazàntsika ny fety firavoravoana,
  - type: text
    content: dia ho hitanao i Jerosalema, fonenana tony tokoa
  - type: text
    content: toy ny lay tsy hahorona intsony,
  - type: text
    content: ka ny tsimatra aminy tsy hongotana
  - type: text
    content: ary ny kofehiny tsy hovahana intsony.
  '21':
  - type: text
    content: Eo no hanehoan’ny TOMPO
  - type: text
    content: ny fahalehibiazany amintsika.
  - type: text
    content: Ho faritra hisy renirano
  - type: text
    content: sy ony be velarana izany,
  - type: text
    content: kanefa tsy handehanan’ny sambo mpiady
  - type: note
    content: Ny sambo mpiady, tamin’izany fahagola izany, dia ny sambo voizina.
  - type: text
    content: na hivezivezen’ny sambo vaventy.
  '22':
  - type: text
    content: Ny TOMPO no ho mpitarika antsika,
  - type: text
    content: IZY no ho mpanao lalàna ho antsika;
  - type: text
    content: ny TOMPO no ho mpanjakantsika
  - type: text
    content: sy ho mpamonjy antsika.
  '23':
  - type: text
    content: Efa mivaha ny tadin-tsambonao,
  - type: text
    content: ka tsy mahatana ny andry intsony
  - type: text
    content: ary tsy ahazoana mampiakatra famantarana.
  - type: text
    content: Amin’izay no hifampizaràna
  - type: text
    content: ny zavatra betsaka nobaboina,
  - type: text
    content: ka na ny mandringa aza dia hahazo anjara.
  '24':
  - type: text
    content: Tsy hisy intsony amin’ny mponin’i Jerosalema
  - type: text
    content: 'hiteniteny hoe: «Marary aho!»'
  - type: text
    content: Ny vahoaka mitoetra ao amin’io tanàna io
  - type: text
    content: dia ho voavela heloka.
  '3':
  - type: text
    content: Mandositra ny vahoaka isan-tokony,
  - type: text
    content: rehefa mandre ny firotsahanao an-tsehatra;
  - type: text
    content: miparitaka ny hafa firenena,
  - type: text
    content: vantany vao miseho ny fahambonianao.
  '4':
  - type: text
    content: Miavosa toa fiavosam-balala ny remby;
  - type: text
    content: ary toa firohotr’andiam-balala
  - type: text
    content: no hirohotana mankeo aminy.
  '5':
  - type: text
    content: Manerinerina tokoa ny TOMPO,
  - type: text
    content: satria mitoetra any ambony any Izy.
  - type: text
    content: Nofenoiny rariny sy hitsiny ao Tsiôna.
  '6':
  - type: text
    content: Hiaina am-pahatokiana ianao, ry vahoakan’ny Tompo.
  - type: text
    content: Ny fahendrena amam-pahalalana
  - type: text
    content: no harem-pamonjena ho anao;
  - type: text
    content: ary ny fanajana ny TOMPO
  - type: text
    content: no raki-tsarobidy ho anao.
  - type: heading
    content: Mirotsaka an-tsehatra ny Tompo
  '7':
  - type: text
    content: Indreo ny mponin’i Ariela
  - type: note
    content: 'Ariela: anarana omena an’i Jerosalema ao amin’ny 29.1.'
  - type: text
    content: fa miantsoantso eny an-dalambe,
  - type: text
    content: satria ny iraka mpanambara fiadanana
  - type: text
    content: dia niveri-maina mitomany mafy.
  '8':
  - type: text
    content: Foana tanteraka ny arabe,
  - type: text
    content: tsy misy mpandeha intsony eny an-dalana.
  - type: text
    content: Nivadihan’ilay firenena mpanjakazaka
  - type: text
    content: ny fifanekena natao taminy;
  - type: text
    content: nolaviny ny vavolombelon’izany,
  - type: text
    content: ary tsy nasiany hasina ny olona.
  '9':
  - type: text
    content: Misaona ny tany ka milofika,
  - type: text
    content: menatra ny tendrombohitr’i Libano ka malazo,
  - type: text
    content: nanjary tany hay ny lemak’i Saròna,
  - type: text
    content: 'ringitra i '
  - type: text
    content: Basàna
  - type: text
    content: ' sy i Karmela'
  - type: note
    content: 'Libano: jereo 10.34 sy nta. –lemak’i Saròna: tany lemaka mahavokatra manamorona ny Ranomasina Mediteranea, eo atsimon’ny tendrombohitra Karmela.'
  - type: text
    content: .
