    - type: text
      text: Izay mandrava, dia horavana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lozanao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa miantefa amin’ny Asiria izany loza izany; ampit 10.5-19.
      marker-yv: yv-n
    - type: text
      text: ', ry ilay tsy norobaina nefa mandroba'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ry ilay tsy nofitahina nefa mamitaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa mitsahatra mandrava ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mba horavana koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa mitsahatra mamitaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mba hofitahina koa.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ankehitriny, hoy ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hirotsaka an-tsehatra Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ankehitriny no hitraka Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haneho ny fahalehibiazako.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny torontoronina vilona ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miteraka mololo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny fofonaiko no tahaka ny afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay handevona anareo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenen-kafa kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataon’ny afo lasa lavenon-tsokay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho toy ny kirihitra tsilo voatomboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no handripahan’ny afo azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo lavitra, mihainoa izay nataoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo akaiky, fantaro ny heriko.»
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raiki-tahotra ny mpanota ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mangovitra ireo mpihatsaravelatsihy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Iza amintsika, hoy izy, no hahajanona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anilan’izao afo mandevona izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza amintsika no hahatanty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an’izao afo tsy misy farany izao?»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Izay mandeha araka ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miteny tsy misy olakolaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mandà ny tombontsoa azo an-keriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manakifika ny tanany tsy handray tsolotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manampin-tsofina tsy hihaino
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny teny mampirisika hamono olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manakimpy ny masony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hijery ny ratsy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany olona izany no honina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny toerana avo tsy hay anihina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny harambato mafy no ho fialofany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: homena hanina sahaza azy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiantohana rano hosotroiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Afaka i Jerosalema
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonao no hijery ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao anatin’ny famirapiratany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa hahita ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny velarany faran’izay midadasika;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahatsiaro ilay natahoranao ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka ho velom-panontaniana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nankaiza àry ilay mpanisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mpanamarina ny hetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nankaiza ilay mpanao fisafoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny tilikambo?»
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho hitanao intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay firenena misetrasetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampiasa fiteny tsy fantatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miboredika tsy misy ahazoana azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, iantrao izahay fa manantena Anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka Ianao no ho herinay isa-maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho mpamonjy anay amin’ny androm-pahoriana!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ndeha topazonao maso i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fankalazàntsika ny fety firavoravoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho hitanao i Jerosalema, fonenana tony tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny lay tsy hahorona intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny tsimatra aminy tsy hongotana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny kofehiny tsy hovahana intsony.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo no hanehoan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahalehibiazany amintsika.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho faritra hisy renirano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ony be velarana izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy handehanan’ny sambo mpiady
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny sambo mpiady, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tamin’izany fahagola izany, dia ny sambo voizina.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hivezivezen’ny sambo vaventy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no ho mpitarika antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: IZY no ho mpanao lalàna ho antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO no ho mpanjakantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho mpamonjy antsika.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa mivaha ny tadin-tsambonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahatana ny andry intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ahazoana mampiakatra famantarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izay no hifampizaràna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zavatra betsaka nobaboina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka na ny mandringa aza dia hahazo anjara.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy intsony amin’ny mponin’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hiteniteny hoe: «Marary aho!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vahoaka mitoetra ao amin’io tanàna io
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho voavela heloka.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandositra ny vahoaka isan-tokony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mandre ny firotsahanao an-tsehatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miparitaka ny hafa firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vantany vao miseho ny fahambonianao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miavosa toa fiavosam-balala ny remby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toa firohotr’andiam-balala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hirohotana mankeo aminy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manerinerina tokoa ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mitoetra any ambony any Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofenoiny rariny sy hitsiny ao Tsiôna.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiaina am-pahatokiana ianao, ry vahoakan’ny Tompo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahendrena amam-pahalalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no harem-pamonjena ho anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanajana ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no raki-tsarobidy ho anao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mirotsaka an-tsehatra ny Tompo
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreo ny mponin’i Ariela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ariela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anarana omena an’i Jerosalema ao amin’ny 29.1.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa miantsoantso eny an-dalambe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny iraka mpanambara fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia niveri-maina mitomany mafy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foana tanteraka ny arabe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy mpandeha intsony eny an-dalana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nivadihan’ilay firenena mpanjakazaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fifanekena natao taminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nolaviny ny vavolombelon’izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nasiany hasina ny olona.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaona ny tany ka milofika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: menatra ny tendrombohitr’i Libano ka malazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanjary tany hay ny lemak’i Saròna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ringitra i '
    - type: usfm
