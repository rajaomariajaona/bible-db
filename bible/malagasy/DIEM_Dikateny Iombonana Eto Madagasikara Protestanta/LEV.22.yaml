    children:
    - type: text
      text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Aza avela hihinana zava-masina ny Israelita tsy anisan’ny fianakavia-mpisorona; na izay sendra mivahiny ao amin’ny mpisorona, na izay mpikarama, dia samy tsy mahazo mihinana zava-masina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy mpanompo novidin’ny mpisorona, dia hahazo mihinana amin’izany ihany izy; toy izany koa, ny mpanompo izay teraka tao an-tranon’ny mpisorona, dia mahazo mihinana izay fihinany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy zanakavavin’ny mpisorona manambady lehilahy israelita tsy anisan’ny fianakavia-mpisorona, dia tsy mahazo mihinana ny navahana tamin’ny zava-masina izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha maty vady na nariam-bady na tsy nanan-janaka ilay zanakavavin’ny mpisorona ka mody ao an-tranon-dray toy ny fony izy mbola kely, dia mahazo mihinana izay fihinan-drainy. Ankoatra ireo, ny Israelita tsy anisan’ny fianakavia-mpisorona dia aoka tsy hisy hihinana zava-masina.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Raha misy Israelita tsy anisan’ny fianakavia-mpisorona ka nahahinana tsy nahy tamin’ny zava-masina, dia honerany amin’ny mpisorona izay laniny ka hotongavany ny ampahadiminy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Aoka tsy hisy mpisorona hampanimbazimba ny zava-masina izay natokan’ny Israelita ho Ahy TOMPO; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: raha avelany hihinana izany ny Israelita tsy anisan’ny fianakavia-mpisorona, dia manjary itambesaran-keloka sy manonitra
