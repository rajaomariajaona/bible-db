document_id: LEV.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: d. Ny amin’ny fihinanana ireo fanatitra
  - type: heading
    content: natao tamin’Andriamanitra
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '10':
  - type: text
    content: '«Aza avela hihinana zava-masina ny Israelita tsy anisan’ny fianakavia-mpisorona; na izay sendra mivahiny ao amin’ny mpisorona, na izay mpikarama, dia samy tsy mahazo mihinana zava-masina. '
  '11':
  - type: text
    content: 'Fa raha misy mpanompo novidin’ny mpisorona, dia hahazo mihinana amin’izany ihany izy; toy izany koa, ny mpanompo izay teraka tao an-tranon’ny mpisorona, dia mahazo mihinana izay fihinany. '
  '12':
  - type: text
    content: 'Raha misy zanakavavin’ny mpisorona manambady lehilahy israelita tsy anisan’ny fianakavia-mpisorona, dia tsy mahazo mihinana ny navahana tamin’ny zava-masina izy. '
  '13':
  - type: text
    content: Fa raha maty vady na nariam-bady na tsy nanan-janaka ilay zanakavavin’ny mpisorona ka mody ao an-tranon-dray toy ny fony izy mbola kely, dia mahazo mihinana izay fihinan-drainy. Ankoatra ireo, ny Israelita tsy anisan’ny fianakavia-mpisorona dia aoka tsy hisy hihinana zava-masina.
  '14':
  - type: text
    content: «Raha misy Israelita tsy anisan’ny fianakavia-mpisorona ka nahahinana tsy nahy tamin’ny zava-masina, dia honerany amin’ny mpisorona izay laniny ka hotongavany ny ampahadiminy.
  '15':
  - type: text
    content: '«Aoka tsy hisy mpisorona hampanimbazimba ny zava-masina izay natokan’ny Israelita ho Ahy TOMPO; '
  '16':
  - type: text
    content: raha avelany hihinana izany ny Israelita tsy anisan’ny fianakavia-mpisorona, dia manjary itambesaran-keloka sy manonitra
  - type: note
    content: 'Aoka...manonitra: dkt hafa Aoka tsy hisy mpisorona hanimbazimba ny zava-masina izay natokan’ny Israelita ho an’ny Tompo; raha mihinana izany ny mpisorona, dia ny Israelita no manjary itambesaran-keloka sy manonitra.'
  - type: text
    content: . Fa Izaho no TOMPO Izay efa nanokana ireny zava-masina ireny.»
  - type: heading
    content: Fepetra hifidianana ny biby hatao sorona
  '17':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '18':
  - type: text
    content: 'mba hamepetra an’i Aharôna sy ny zanany mbamin’ny Israelita hoe:'
  - type: text
    content: '«Na iza na iza, Israelita na vahiny valovotaka eo aminy, te hanatitra zavatra amiko TOMPO ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo mba ho fanalàm-'
  - type: text
    content: boady
  - type: text
    content: ' na ho fanomezana an-tsitrapo, dia izao no hataony: '
  '19':
  - type: text
    content: 'lahy tsy misy kilema amin’ny omby na ondry na osy no aoka hateriny mba hahazoany sitraka. '
  '2':
  - type: text
    content: '«Lazao amin’i Aharôna sy ny zanany fa misy anton-javatra tsy maintsy hifadiany ny zava-masina atokan’ny Israelita ho Ahy, mba tsy hanalany baràka ny anarako masina. Izaho no TOMPO. '
  '20':
  - type: text
    content: Izay biby rehetra misy kilema dia tsy azonareo aterina, satria tsy hahazoanareo sitraka amiko izany
  - type: note
    content: 'And 18-20: jereo 1.3; Deot 17.1.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Raha misy olona manatitra omby na ondry na osy amiko TOMPO ho sorom-pihavanana mba ho fanalàm-boady na ho fanomezana an-tsitrapo, dia biby tsy misy kilema na kely akory aza no aoka hateriny mba hahazoany sitraka. '
  '22':
  - type: text
    content: Fa izay biby jamba, na mandringa, na kilemaina na ferena, na hatenina
  - type: note
    content: hatenina na hoe mivoaka nana.
  - type: text
    content: ', na kongonina, dia tsy haterinareo ho AHY na hataonareo sorona levonina amin’ny afo ao ambonin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ho AHY. '
  '23':
  - type: text
    content: 'Raha omby na ondry na osy no misy sampona, dia azo aterina ihany ho fanomezana an-tsitrapo; fa raha fanalàm-boady dia tsy hahazoana sitraka izany. '
  '24':
  - type: text
    content: 'Izay voaporitra na voatoro vihindahy ary koa voaombotra na voadidy vihindahy amin’ireo biby ireo, dia tsy azonareo aterina ho AHY; ary aza manao famosiram-biby ianareo, rehefa mby eo amin’ny taninareo. '
  '25':
  - type: text
    content: Raha misy biby vositra entin’olona hafa firenena, dia tsy azonareo aterina ho sakafo aroso ho Ahy Andriamanitrareo ireny; satria noho izy novosirina, dia misy kilema ka tsy hahazoanareo sitraka.»
  '26':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '27':
  - type: text
    content: '«Raha misy omby na ondry na osy vao teraka, dia hitoetra amin-dreniny mandritra ny fito andro izy; fa manomboka amin’ny andro fahavalo no ho miakatra, dia hahazoana sitraka izy raha atao sorona levonina amin’ny afo ho AHY. '
  '28':
  - type: text
    content: Kanefa ny ombivavy na ny ondrivavy na ny osivavy, dia aoka tsy hovonoinareo indray andro izy sy ny zanany
  - type: note
    content: Ireo fombafomba voarara, eto amin’ny and 27-28, dia angamba fanao mahazatra teo amin’ny fivavahan’ireo Kanahanita.
  - type: text
    content: .
  '29':
  - type: text
    content: '«Raha manolotra sorom-pisaorana amiko TOMPO ianareo, dia araka izay hahazoanareo sitraka no anolory azy. '
  '3':
  - type: text
    content: 'Ka lazao azy mianakavy hoe:'
  - type: text
    content: «Hatrany hatrany, izay lehilahy rehetra anisan’ny taranakareo, ka mbola manam-
  - type: text
    content: pahalotoana
  - type: text
    content: ' izy no manatona ny zava-masina atokan’ny Israelita ho AHY, dia hoesorina tsy hanompo eo anatrehako intsony. Izaho no TOMPO. '
  '30':
  - type: text
    content: Iny andro anolorana azy iny ihany no hihinanana azy, fa aza amelana ho tra-maraina. Izaho no TOMPO.
  '31':
  - type: text
    content: '«Imasoy hotanterahina ny didiko. Izaho no TOMPO. '
  '32':
  - type: text
    content: 'Aza manala baràka ny anarako masina, mba hanajana Ahy ho masina eo amin’ny Israelita. Izaho no TOMPO, Izay manokana anareo ho vahoakako. '
  '33':
  - type: text
    content: Izaho no namoaka anareo hiala tany Ejipta. Izaho no TOMPO.»
  '4':
  - type: text
    content: 'Ny mpisorona, voan’ny '
  - type: text
    content: aretin-koditra
  - type: text
    content: ' na marary mitsika eo amin’ny taovam-pilahiana, dia tsy mahazo mihinana amin’ny zava-masina mandra-pahadiony. Toy izany koa ny mpisorona izay nahakasika olona voaloto tamim-paty, na izay nandeha tsirinaina tsy nahy, '
  '5':
  - type: text
    content: 'na izay nahakasika biby mahaloto na olona mahaloto na inona na inona fahalotoany; '
  '6':
  - type: text
    content: 'ny mpisorona, izay nahakasika olona na zavatra mahaloto azy dia haloto mandra-paharivan’ny andro ka tsy hahazo mihinana amin’ny zava-masina, raha tsy efa nandro. '
  '7':
  - type: text
    content: 'Ary rehefa milentika ny masoandro, dia hadio ilay mpisorona; ka izay izy vao mahazo mihinana amin’ny zava-masina, satria izany no fihinany. '
  '8':
  - type: text
    content: Tsy hohanin’ny mpisorona koa ny henam-biby maty ho azy na voaviraviram-bibidia, mba tsy hahatonga azy ho voaloto. Izaho no TOMPO.
  '9':
  - type: text
    content: «Aoka ny mpisorona hitandrina izay fepetra nasaiko tandremany, fandrao hitambesaran-keloka ny amin’izany fanimbazimbana zava-masina izany izy ka ho faty. Izaho no TOMPO, Izay efa nanokana ny mpisorona hanompo Ahy.
