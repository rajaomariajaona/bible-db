    - type: text
      text: ' na ho fanomezana an-tsitrapo, dia izao no hataony: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lahy tsy misy kilema amin’ny omby na ondry na osy no aoka hateriny mba hahazoany sitraka. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Lazao amin’i Aharôna sy ny zanany fa misy anton-javatra tsy maintsy hifadiany ny zava-masina atokan’ny Israelita ho Ahy, mba tsy hanalany baràka ny anarako masina. Izaho no TOMPO. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay biby rehetra misy kilema dia tsy azonareo aterina, satria tsy hahazoanareo sitraka amiko izany
