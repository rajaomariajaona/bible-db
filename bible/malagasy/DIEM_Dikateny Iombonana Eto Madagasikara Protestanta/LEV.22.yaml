  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha omby na ondry na osy no misy sampona, dia azo aterina ihany ho fanomezana an-tsitrapo; fa raha fanalàm-boady dia tsy hahazoana sitraka izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay voaporitra na voatoro vihindahy ary koa voaombotra na voadidy vihindahy amin’ireo biby ireo, dia tsy azonareo aterina ho AHY; ary aza manao famosiram-biby ianareo, rehefa mby eo amin’ny taninareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy biby vositra entin’olona hafa firenena, dia tsy azonareo aterina ho sakafo aroso ho Ahy Andriamanitrareo ireny; satria noho izy novosirina, dia misy kilema ka tsy hahazoanareo sitraka.»
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy omby na ondry na osy vao teraka, dia hitoetra amin-dreniny mandritra ny fito andro izy; fa manomboka amin’ny andro fahavalo no ho miakatra, dia hahazoana sitraka izy raha atao sorona levonina amin’ny afo ho AHY. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa ny ombivavy na ny ondrivavy na ny osivavy, dia aoka tsy hovonoinareo indray andro izy sy ny zanany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ireo fombafomba voarara, eto amin’ny and 27-28, dia angamba fanao mahazatra teo amin’ny fivavahan’ireo Kanahanita.
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha manolotra sorom-pisaorana amiko TOMPO ianareo, dia araka izay hahazoanareo sitraka no anolory azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka lazao azy mianakavy hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Hatrany hatrany, izay lehilahy rehetra anisan’ny taranakareo, ka mbola manam-
    - type: usfm
      marker: w
      children:
      - type: text
        text: pahalotoana
    - type: text
      text: ' izy no manatona ny zava-masina atokan’ny Israelita ho AHY, dia hoesorina tsy hanompo eo anatrehako intsony. Izaho no TOMPO. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iny andro anolorana azy iny ihany no hihinanana azy, fa aza amelana ho tra-maraina. Izaho no TOMPO.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Imasoy hotanterahina ny didiko. Izaho no TOMPO. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manala baràka ny anarako masina, mba hanajana Ahy ho masina eo amin’ny Israelita. Izaho no TOMPO, Izay manokana anareo ho vahoakako. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho no namoaka anareo hiala tany Ejipta. Izaho no TOMPO.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpisorona, voan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: aretin-koditra
    - type: text
      text: ' na marary mitsika eo amin’ny taovam-pilahiana, dia tsy mahazo mihinana amin’ny zava-masina mandra-pahadiony. Toy izany koa ny mpisorona izay nahakasika olona voaloto tamim-paty, na izay nandeha tsirinaina tsy nahy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na izay nahakasika biby mahaloto na olona mahaloto na inona na inona fahalotoany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny mpisorona, izay nahakasika olona na zavatra mahaloto azy dia haloto mandra-paharivan’ny andro ka tsy hahazo mihinana amin’ny zava-masina, raha tsy efa nandro. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa milentika ny masoandro, dia hadio ilay mpisorona; ka izay izy vao mahazo mihinana amin’ny zava-masina, satria izany no fihinany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hohanin’ny mpisorona koa ny henam-biby maty ho azy na voaviraviram-bibidia, mba tsy hahatonga azy ho voaloto. Izaho no TOMPO.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Aoka ny mpisorona hitandrina izay fepetra nasaiko tandremany, fandrao hitambesaran-keloka ny amin’izany fanimbazimbana zava-masina izany izy ka ho faty. Izaho no TOMPO, Izay efa nanokana ny mpisorona hanompo Ahy.
