document_id: LEV.22
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: d. Ny amin’ny fihinanana ireo fanatitra
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: natao tamin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Lazao amin’i Aharôna sy ny zanany fa misy anton-javatra tsy maintsy hifadiany ny zava-masina atokan’ny Israelita ho Ahy, mba tsy hanalany baràka ny anarako masina. Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka lazao azy mianakavy hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Hatrany hatrany, izay lehilahy rehetra anisan’ny taranakareo, ka mbola manam-
  - type: usfm
    marker: w
    children:
    - type: text
      text: pahalotoana
  - type: text
    text: ' izy no manatona ny zava-masina atokan’ny Israelita ho AHY, dia hoesorina tsy hanompo eo anatrehako intsony. Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny mpisorona, voan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: aretin-koditra
  - type: text
    text: ' na marary mitsika eo amin’ny taovam-pilahiana, dia tsy mahazo mihinana amin’ny zava-masina mandra-pahadiony. Toy izany koa ny mpisorona izay nahakasika olona voaloto tamim-paty, na izay nandeha tsirinaina tsy nahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'na izay nahakasika biby mahaloto na olona mahaloto na inona na inona fahalotoany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ny mpisorona, izay nahakasika olona na zavatra mahaloto azy dia haloto mandra-paharivan’ny andro ka tsy hahazo mihinana amin’ny zava-masina, raha tsy efa nandro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa milentika ny masoandro, dia hadio ilay mpisorona; ka izay izy vao mahazo mihinana amin’ny zava-masina, satria izany no fihinany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy hohanin’ny mpisorona koa ny henam-biby maty ho azy na voaviraviram-bibidia, mba tsy hahatonga azy ho voaloto. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Aoka ny mpisorona hitandrina izay fepetra nasaiko tandremany, fandrao hitambesaran-keloka ny amin’izany fanimbazimbana zava-masina izany izy ka ho faty. Izaho no TOMPO, Izay efa nanokana ny mpisorona hanompo Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Aza avela hihinana zava-masina ny Israelita tsy anisan’ny fianakavia-mpisorona; na izay sendra mivahiny ao amin’ny mpisorona, na izay mpikarama, dia samy tsy mahazo mihinana zava-masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha misy mpanompo novidin’ny mpisorona, dia hahazo mihinana amin’izany ihany izy; toy izany koa, ny mpanompo izay teraka tao an-tranon’ny mpisorona, dia mahazo mihinana izay fihinany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha misy zanakavavin’ny mpisorona manambady lehilahy israelita tsy anisan’ny fianakavia-mpisorona, dia tsy mahazo mihinana ny navahana tamin’ny zava-masina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha maty vady na nariam-bady na tsy nanan-janaka ilay zanakavavin’ny mpisorona ka mody ao an-tranon-dray toy ny fony izy mbola kely, dia mahazo mihinana izay fihinan-drainy. Ankoatra ireo, ny Israelita tsy anisan’ny fianakavia-mpisorona dia aoka tsy hisy hihinana zava-masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Raha misy Israelita tsy anisan’ny fianakavia-mpisorona ka nahahinana tsy nahy tamin’ny zava-masina, dia honerany amin’ny mpisorona izay laniny ka hotongavany ny ampahadiminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Aoka tsy hisy mpisorona hampanimbazimba ny zava-masina izay natokan’ny Israelita ho Ahy TOMPO; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: raha avelany hihinana izany ny Israelita tsy anisan’ny fianakavia-mpisorona, dia manjary itambesaran-keloka sy manonitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.16 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Aoka...manonitra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aoka tsy hisy mpisorona hanimbazimba ny zava-masina izay natokan’ny Israelita ho an’ny Tompo; raha mihinana izany ny mpisorona, dia ny Israelita no manjary itambesaran-keloka sy manonitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Fa Izaho no TOMPO Izay efa nanokana ireny zava-masina ireny.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fepetra hifidianana ny biby hatao sorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'mba hamepetra an’i Aharôna sy ny zanany mbamin’ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Na iza na iza, Israelita na vahiny valovotaka eo aminy, te hanatitra zavatra amiko TOMPO ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo mba ho fanalàm-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: boady
  - type: text
    text: ' na ho fanomezana an-tsitrapo, dia izao no hataony: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'lahy tsy misy kilema amin’ny omby na ondry na osy no aoka hateriny mba hahazoany sitraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay biby rehetra misy kilema dia tsy azonareo aterina, satria tsy hahazoanareo sitraka amiko izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 18-20:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.3; Deot 17.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha misy olona manatitra omby na ondry na osy amiko TOMPO ho sorom-pihavanana mba ho fanalàm-boady na ho fanomezana an-tsitrapo, dia biby tsy misy kilema na kely akory aza no aoka hateriny mba hahazoany sitraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa izay biby jamba, na mandringa, na kilemaina na ferena, na hatenina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hatenina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mivoaka nana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', na kongonina, dia tsy haterinareo ho AHY na hataonareo sorona levonina amin’ny afo ao ambonin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ho AHY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha omby na ondry na osy no misy sampona, dia azo aterina ihany ho fanomezana an-tsitrapo; fa raha fanalàm-boady dia tsy hahazoana sitraka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay voaporitra na voatoro vihindahy ary koa voaombotra na voadidy vihindahy amin’ireo biby ireo, dia tsy azonareo aterina ho AHY; ary aza manao famosiram-biby ianareo, rehefa mby eo amin’ny taninareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Raha misy biby vositra entin’olona hafa firenena, dia tsy azonareo aterina ho sakafo aroso ho Ahy Andriamanitrareo ireny; satria noho izy novosirina, dia misy kilema ka tsy hahazoanareo sitraka.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Raha misy omby na ondry na osy vao teraka, dia hitoetra amin-dreniny mandritra ny fito andro izy; fa manomboka amin’ny andro fahavalo no ho miakatra, dia hahazoana sitraka izy raha atao sorona levonina amin’ny afo ho AHY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Kanefa ny ombivavy na ny ondrivavy na ny osivavy, dia aoka tsy hovonoinareo indray andro izy sy ny zanany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo fombafomba voarara, eto amin’ny and 27-28, dia angamba fanao mahazatra teo amin’ny fivavahan’ireo Kanahanita.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Raha manolotra sorom-pisaorana amiko TOMPO ianareo, dia araka izay hahazoanareo sitraka no anolory azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Iny andro anolorana azy iny ihany no hihinanana azy, fa aza amelana ho tra-maraina. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Imasoy hotanterahina ny didiko. Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aza manala baràka ny anarako masina, mba hanajana Ahy ho masina eo amin’ny Israelita. Izaho no TOMPO, Izay manokana anareo ho vahoakako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izaho no namoaka anareo hiala tany Ejipta. Izaho no TOMPO.»
