  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona manatitra omby na ondry na osy amiko TOMPO ho sorom-pihavanana mba ho fanalàm-boady na ho fanomezana an-tsitrapo, dia biby tsy misy kilema na kely akory aza no aoka hateriny mba hahazoany sitraka. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay biby jamba, na mandringa, na kilemaina na ferena, na hatenina
    - type: usfm
