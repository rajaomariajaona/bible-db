document_id: LUK.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Na hiala amin’ny toe-dratsy na ho faty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izay dia nisy olona tonga nitantara tamin’i Jesoa momba ireo Galileanina izay nanolotra sorona ho an’Andriamanitra iny indrindra no novonoin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pilato
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nampianatra tao amin’izay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' izay i Jesoa indray '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nisy vehivavy anankiray teo, azon’ny fanahy ratsy mahafarofy nandritra ny 18 taona ka nanjoko tsy nahatraka mihitsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: ka tsy naharitra mihitsy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ka tsy nahatraka tsara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Niantso azy i Jesoa nony nahita azy, ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ramatoa, afaka amin’ny rofinao ianao!
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nametrahan’i Jesoa tanana ravehivavy ary nitraka niaraka tamin’izay ka nanome voninahitra an’Andriamanitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tezitra ny lehiben’ny sinagôga satria andro sabata no nanaovan’i Jesoa fanasitranana. Nandray fitenenana ny lehiben’ny sinagôga ary nilaza tamin’ny vahoaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andro enina no tokony hiasana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 20.9-10; Deot 5.13-14.
      marker-yv: yv-n
    - type: text
      text: ; ka mandritra ireo andro ireo ianareo no tongava hositranina, fa tsy amin’ny andro sabata!
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa hoy ny navalin’ny Tompo azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mpihatsaravelatsihy raha ianareo! Amin’ny andro sabata, moa tsy samy mamaha ny ombiny na ny borikiny hiala amin’ny fihinanam-bilona avy ianareo ka mitondra azy hisotro rano? '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa ity vehivavy taranak’i Abrahama ity, 18 taona ngarangidina no voafatotr’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: text
      text: ', moa tsy tokony ho amin’ny andro sabata indrindra ve no hamahàna fatorana azy?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nangaihay izay rehetra mpanohitra an’i Jesoa noho izany valin-teniny izany, fa ny vahoaka manontolo kosa niravoravo noho ny zavatra malaza rehetra nataony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ny voan-tsinapy sy ny leviora
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 13.31-33; Mk 4.30-32)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tamin’izay dia hoy i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tahaka ny inona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '? Inona no hanoharako azy? '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voan-tsinapy
    - type: text
      text: ' nalain’ity lehilahy anankiray ary namboleny tao an-jaridaina; naniry ilay voan-tsinapy ka tonga hazo, ary nanaovan’ny voro-manidina akany tao amin’ny rantsany.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ka hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Heverinareo ve fa ireo Galileanina ireo, matoa nozoin-doza toy izany, dia mpanota mihoatra noho ny Galileanina rehetra? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy indray i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona koa no hanoharako ny Fanjakàn’Andriamanitra? '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: ' nalain’ity vehivavy anankiray ary nafangarony tamin’ny koba eran’ny kovetabe mandra-pibohaky ny koba manontolo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mikeleza aina hiditra amin’ny varavarana èty
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 7.13-14, 21-23)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nitety tanàn-dehibe sy tanàna kely i Jesoa nampianatra sady nandroso nankany Jerosalema. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nisy olona anankiray nanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa vitsy ve, ry Tompo, ny olona ho voavonjy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa tamin’ny vahoaka:'
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '–Ataovy mihitsy izay hahatafiditra eo amin’ny varavarana èty: fa maro, hoy Aho aminareo, no hitady hiditra nefa tsy ho afaka!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rehefa nitsangana nanidy varavarana ny tompon-trano no ianareo mbola any alatrano, dia handondòm-baravarana ianareo hanao hoe: «Mba vohay izahay, tompoko ô!» Fa hovaliany hoe: «Tsy fantatro izay fiavianareo.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Amin’izay ianareo, dia hanao hoe: «Olona niara-nihinana sy nisotro taminao izahay, ary nampianatra teny an-dalamben’ny tanànanay ianao!» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa mbola hovaliany hoe: «Tsy fantatro mihitsy izay fiavianareo; mialà amiko, ry mpanao ratsy isany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Fa mbola hovaliany hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana ho '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Fa hataony hoe: Lazaiko aminareo fa... –Mialà amiko, ry mpanao ratsy isany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit Sal 6.9.'
      marker-yv: yv-n
    - type: text
      text: '!» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Any tokoa ianareo no hitomany sy hikitro-nify, rehefa hitanareo ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' ry i Abrahama sy i Itsehàka ary i Jakôba mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' rehetra; fa ianareo kosa voaroaka any ivelany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ho tonga ny avy any atsinanana sy andrefana, ary ny avy any avaratra sy atsimo ka hipetraka hiara-misakafo ao amin’ny Fanjakàn’Andriamanitra; '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tsia, hoy Aho aminareo, fa raha tsy ialanareo ny toe-dratsinareo, dia ho ringana tahaka azy koa ianareo rehetra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ary indro misy farany ho voalohany ary misy voalohany ho farany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jerosalema mpamono ny mpaminany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 23.37-39)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Tamin’izay fotoana izay, dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' sasany nankeo amin’i Jesoa ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mialà teto ianao ka mandehana any an-kafa, satria fofoin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: ' ny ainao.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha ilazao ilay fosalahy iny hoe: «Indro Aho mandroaka demony sy manasitrana anio sy rahampitso; ary rahafakampitso dia hefaiko ny asako.» '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Kanefa tsy maintsy manohy ny diako ihany Aho anio sy rahampitso ary rahafakampitso, satria tsy mety raha mpaminany ka vonoina ivelan’i Jerosalema!
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '«Ry Jerosalema, ry Jerosalema, ianao izay mpamono ny mpaminany sy mpitora-bato ireo irahin’Andriamanitra aminao. Efa impiry moa Aho no nikasa hanangona ny mponina eto aminao tahaka ny reniakoho manomba ny zanany eo ambany elany, kanefa tsy nety ianareo! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Indro ny tempolinareo fa havela eo ho anareo. Ary lazaiko aminareo fa tsy ho hitanareo intsony Aho mandra-panaonareo hoe: ‹Hombàm-pitahiana amin’ny anaran’ny Tompo anie Ilay avy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.35 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Indro ny tempolinareo... ho anareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Jer 22.5. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mandra-panaonareo hoe:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mandra-pahatongan’ny fotoana hanaovanareo hoe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo Mt 23.39). –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hombàm-pitahiana... Ilay avy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Sal 118.26.'
      marker-yv: yv-n
    - type: text
      text: ›!»
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny olona 18 maty nianjeran’ny tilikambon’i Silôà, heverinareo ve fa diso mihoatra noho ny mponina hafa rehetra ao Jerosalema? '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsia, hoy Aho aminareo, fa raha tsy ialanareo ny toe-ratsinareo, dia ho ringana tahaka azy koa ianareo rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay aviavy tsy mamoa
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nanao ity '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' ity i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nisy aviavy naniry tao amin’ny tanimboalobok’ity lehilahy anankiray. Tonga izy indray mandeha nitady voa tamin’ilay hazo fa tsy nahita. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ka hoy izy tamin’ny mpikarakara ny tanimboaloboka: «Etsy ange! efa telo taona misesy izao no tonga nitady voa tamin’ity aviavy ity aho nefa tsy mahita. Kapao io, fa nahoana no mibahan-toerana foana eo?» '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niteny ilay mpiasa nanao taminy hoe: «Avelao ihany re izy, tompoko, amin’ity taona ity, fa hohadiko ny manodidina azy ary hasiako zezika; '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: angamba hamoa ihany izy amin’ny taona ho avy, fa hampikapainao raha tsy izany.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay vehivavy manjoko
    marker-yv: yv-h
