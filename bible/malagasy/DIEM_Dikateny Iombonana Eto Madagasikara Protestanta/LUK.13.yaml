document_id: LUK.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Na hiala amin’ny toe-dratsy na ho faty
  - type: text
    content: 'Tamin’izay dia nisy olona tonga nitantara tamin’i Jesoa momba ireo Galileanina izay nanolotra sorona ho an’Andriamanitra iny indrindra no novonoin’i '
  - type: text
    content: Pilato
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Nampianatra tao amin’izay '
  - type: text
    content: sinagôga
  - type: text
    content: ' izay i Jesoa indray '
  - type: text
    content: sabata
  - type: text
    content: '. '
  '11':
  - type: text
    content: Nisy vehivavy anankiray teo, azon’ny fanahy ratsy mahafarofy nandritra ny 18 taona ka nanjoko tsy nahatraka mihitsy
  - type: note
    content: ka tsy naharitra mihitsy na hoe ka tsy nahatraka tsara.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Niantso azy i Jesoa nony nahita azy, ka nanao taminy hoe:'
  - type: text
    content: –Ramatoa, afaka amin’ny rofinao ianao!
  '13':
  - type: text
    content: 'Dia nametrahan’i Jesoa tanana ravehivavy ary nitraka niaraka tamin’izay ka nanome voninahitra an’Andriamanitra. '
  '14':
  - type: text
    content: 'Tezitra ny lehiben’ny sinagôga satria andro sabata no nanaovan’i Jesoa fanasitranana. Nandray fitenenana ny lehiben’ny sinagôga ary nilaza tamin’ny vahoaka hoe:'
  - type: text
    content: –Andro enina no tokony hiasana
  - type: note
    content: Jereo Eks 20.9-10; Deot 5.13-14.
  - type: text
    content: ; ka mandritra ireo andro ireo ianareo no tongava hositranina, fa tsy amin’ny andro sabata!
  '15':
  - type: text
    content: 'Fa hoy ny navalin’ny Tompo azy:'
  - type: text
    content: '–Mpihatsaravelatsihy raha ianareo! Amin’ny andro sabata, moa tsy samy mamaha ny ombiny na ny borikiny hiala amin’ny fihinanam-bilona avy ianareo ka mitondra azy hisotro rano? '
  '16':
  - type: text
    content: 'Koa ity vehivavy taranak’i Abrahama ity, 18 taona ngarangidina no voafatotr’i '
  - type: text
    content: Satàna
  - type: text
    content: ', moa tsy tokony ho amin’ny andro sabata indrindra ve no hamahàna fatorana azy?'
  '17':
  - type: text
    content: Nangaihay izay rehetra mpanohitra an’i Jesoa noho izany valin-teniny izany, fa ny vahoaka manontolo kosa niravoravo noho ny zavatra malaza rehetra nataony.
  - type: heading
    content: Fanoharana momba ny voan-tsinapy sy ny leviora
  - type: heading
    content: (Jereo Mt 13.31-33; Mk 4.30-32)
  '18':
  - type: text
    content: 'Tamin’izay dia hoy i Jesoa hoe:'
  - type: text
    content: '–Tahaka ny inona ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '? Inona no hanoharako azy? '
  '19':
  - type: text
    content: 'Tahaka ny '
  - type: text
    content: voan-tsinapy
  - type: text
    content: ' nalain’ity lehilahy anankiray ary namboleny tao an-jaridaina; naniry ilay voan-tsinapy ka tonga hazo, ary nanaovan’ny voro-manidina akany tao amin’ny rantsany.'
  '2':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: '–Heverinareo ve fa ireo Galileanina ireo, matoa nozoin-doza toy izany, dia mpanota mihoatra noho ny Galileanina rehetra? '
  '20':
  - type: text
    content: 'Dia hoy indray i Jesoa hoe:'
  - type: text
    content: '–Inona koa no hanoharako ny Fanjakàn’Andriamanitra? '
  '21':
  - type: text
    content: 'Tahaka ny '
  - type: text
    content: leviora
  - type: text
    content: ' nalain’ity vehivavy anankiray ary nafangarony tamin’ny koba eran’ny kovetabe mandra-pibohaky ny koba manontolo.'
  - type: heading
    content: Mikeleza aina hiditra amin’ny varavarana èty
  - type: heading
    content: (Jereo Mt 7.13-14, 21-23)
  '22':
  - type: text
    content: 'Nitety tanàn-dehibe sy tanàna kely i Jesoa nampianatra sady nandroso nankany Jerosalema. '
  '23':
  - type: text
    content: 'Dia nisy olona anankiray nanontany Azy hoe:'
  - type: text
    content: –Moa vitsy ve, ry Tompo, ny olona ho voavonjy?
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny vahoaka:'
  '24':
  - type: text
    content: '–Ataovy mihitsy izay hahatafiditra eo amin’ny varavarana èty: fa maro, hoy Aho aminareo, no hitady hiditra nefa tsy ho afaka!'
  '25':
  - type: text
    content: 'Rehefa nitsangana nanidy varavarana ny tompon-trano no ianareo mbola any alatrano, dia handondòm-baravarana ianareo hanao hoe: «Mba vohay izahay, tompoko ô!» Fa hovaliany hoe: «Tsy fantatro izay fiavianareo.» '
  '26':
  - type: text
    content: 'Amin’izay ianareo, dia hanao hoe: «Olona niara-nihinana sy nisotro taminao izahay, ary nampianatra teny an-dalamben’ny tanànanay ianao!» '
  '27':
  - type: text
    content: 'Fa mbola hovaliany hoe: «Tsy fantatro mihitsy izay fiavianareo; mialà amiko, ry mpanao ratsy isany'
  - type: note
    content: 'Fa mbola hovaliany hoe: misy stf sasany ahitana ho Fa hataony hoe: Lazaiko aminareo fa... –Mialà amiko, ry mpanao ratsy isany: ampit Sal 6.9.'
  - type: text
    content: '!» '
  '28':
  - type: text
    content: 'Any tokoa ianareo no hitomany sy hikitro-nify, rehefa hitanareo ao amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' ry i Abrahama sy i Itsehàka ary i Jakôba mbamin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' rehetra; fa ianareo kosa voaroaka any ivelany. '
  '29':
  - type: text
    content: 'Ho tonga ny avy any atsinanana sy andrefana, ary ny avy any avaratra sy atsimo ka hipetraka hiara-misakafo ao amin’ny Fanjakàn’Andriamanitra; '
  '3':
  - type: text
    content: 'Tsia, hoy Aho aminareo, fa raha tsy ialanareo ny toe-dratsinareo, dia ho ringana tahaka azy koa ianareo rehetra. '
  '30':
  - type: text
    content: ary indro misy farany ho voalohany ary misy voalohany ho farany.
  - type: heading
    content: I Jerosalema mpamono ny mpaminany
  - type: heading
    content: (Jereo Mt 23.37-39)
  '31':
  - type: text
    content: 'Tamin’izay fotoana izay, dia nisy '
  - type: text
    content: Farisianina
  - type: text
    content: ' sasany nankeo amin’i Jesoa ka nanao taminy hoe:'
  - type: text
    content: '–Mialà teto ianao ka mandehana any an-kafa, satria fofoin’i '
  - type: text
    content: Herôda
  - type: text
    content: ' ny ainao.'
  '32':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Ndeha ilazao ilay fosalahy iny hoe: «Indro Aho mandroaka demony sy manasitrana anio sy rahampitso; ary rahafakampitso dia hefaiko ny asako.» '
  '33':
  - type: text
    content: Kanefa tsy maintsy manohy ny diako ihany Aho anio sy rahampitso ary rahafakampitso, satria tsy mety raha mpaminany ka vonoina ivelan’i Jerosalema!
  '34':
  - type: text
    content: '«Ry Jerosalema, ry Jerosalema, ianao izay mpamono ny mpaminany sy mpitora-bato ireo irahin’Andriamanitra aminao. Efa impiry moa Aho no nikasa hanangona ny mponina eto aminao tahaka ny reniakoho manomba ny zanany eo ambany elany, kanefa tsy nety ianareo! '
  '35':
  - type: text
    content: 'Indro ny tempolinareo fa havela eo ho anareo. Ary lazaiko aminareo fa tsy ho hitanareo intsony Aho mandra-panaonareo hoe: ‹Hombàm-pitahiana amin’ny anaran’ny Tompo anie Ilay avy'
  - type: note
    content: 'Indro ny tempolinareo... ho anareo: ampit Jer 22.5. –mandra-panaonareo hoe: misy stf sasany ahitana hoe mandra-pahatongan’ny fotoana hanaovanareo hoe (jereo Mt 23.39). –Hombàm-pitahiana... Ilay avy: Sal 118.26.'
  - type: text
    content: ›!»
  '4':
  - type: text
    content: 'Ary ny olona 18 maty nianjeran’ny tilikambon’i Silôà, heverinareo ve fa diso mihoatra noho ny mponina hafa rehetra ao Jerosalema? '
  '5':
  - type: text
    content: Tsia, hoy Aho aminareo, fa raha tsy ialanareo ny toe-ratsinareo, dia ho ringana tahaka azy koa ianareo rehetra.
  - type: heading
    content: Ilay aviavy tsy mamoa
  '6':
  - type: text
    content: 'Dia nanao ity '
  - type: text
    content: fanoharana
  - type: text
    content: ' ity i Jesoa:'
  - type: text
    content: '–Nisy aviavy naniry tao amin’ny tanimboalobok’ity lehilahy anankiray. Tonga izy indray mandeha nitady voa tamin’ilay hazo fa tsy nahita. '
  '7':
  - type: text
    content: 'Ka hoy izy tamin’ny mpikarakara ny tanimboaloboka: «Etsy ange! efa telo taona misesy izao no tonga nitady voa tamin’ity aviavy ity aho nefa tsy mahita. Kapao io, fa nahoana no mibahan-toerana foana eo?» '
  '8':
  - type: text
    content: 'Dia niteny ilay mpiasa nanao taminy hoe: «Avelao ihany re izy, tompoko, amin’ity taona ity, fa hohadiko ny manodidina azy ary hasiako zezika; '
  '9':
  - type: text
    content: angamba hamoa ihany izy amin’ny taona ho avy, fa hampikapainao raha tsy izany.»
  - type: heading
    content: Sitranin’i Jesoa ilay vehivavy manjoko
