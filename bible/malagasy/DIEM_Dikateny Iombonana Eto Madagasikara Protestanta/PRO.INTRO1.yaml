document_id: PRO.INTRO1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: –Ity boky ity dia ahitana amboaran’ohabolana na fampianarana maromaro voaangona momba ny fahendrena, ka ny fitambarany dia apetraka eo ambany fahefàn’i Salômôna mpanjaka, ilay noheverina ho nanam-pahendrena ambony indrindra teo amin’i Israely.
  - type: text
    content: Ny bokin’ny
  - type: text
    content: ' Ohabolana '
  - type: text
    content: 'dia anisan’ny karazan-dahatsoratra niroborobo nanerana ny faritra Atsinanana Tranainy iny; nanan-danja tamin’izany toerana izany manko ny mampitapita ny traikefa azo isaky ny taranaka mifandimby. Ireo amboara voatambatra anatin’ity boky ity dia avy tamin’ny fotoana samy hafa. Azo sokajina ho fizaràna telo lehibe izany:'
  - type: text
    content: Ny
  - type: text
    content: ' fizaràna voalohany '
  - type: text
    content: dia fitarihan-teny lava momba ny Ohabolana, ka miendrika famelabelarana mitohy anazavana ny andraikitra mavesa-danja tanan’ny fahendrena (toko 1–9). Imbetsaka ao no iheverana ny fahendrena ho toy ny olona; ary ao amin’ny pôezia tena kanto iray (8.12-31), dia izy mihitsy no mitonona ho mpiara-miasa amin’Andriamanitra.
  - type: text
    content: Ny
  - type: text
    content: ' fizaràna faharoa '
  - type: text
    content: no vontoatin’ny boky sady nanome azy ny lohateniny (toko 10–29). Amboaran’Ohabolan’i Salômôna no ao (10.1–22.16 sy 25.1–29.27), miampy amboara samihafa avy amin’olon-kendry hafa (22.17–24.23-34).
  - type: text
    content: Ny
  - type: text
    content: ' fizaràna fahatelo '
  - type: text
    content: (toko 30–31) dia ahitana ohabolana andiany efatra mahaleotena ka ny andiany roa no mampita amintsika ny eritreritra na torohevitry ny olon-kendry tsy israelita (30.1-14 sy 31.1-9).
