document_id: EPH.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny andraikitr’i Paoly manoloana ny hafa firenena
  - type: text
    content: 'Noho izany izaho Paoly, izay migadra noho ny amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa hanasoavana anareo hafa firenena, dia mangataka amin’Andriamanitra ho anareo. '
  '10':
  - type: text
    content: fa ankehitriny kosa naseho tamin’ny alalan’ny Fiangonana izany, ka tonga fantatr’ireo fanapahana sy ny fahefana eny ana habakabaka
  - type: note
    content: Jereo Kôl 1.16 sy nta.
  - type: text
    content: ' ny fahendren’Andriamanitra, dia fahendrena mahefa zavatra tsy tambo isaina. '
  '11':
  - type: text
    content: 'Izany rahateo no fandaharana hatrizay hatrizay ka notanterahin’Andriamanitra tamin’ny alalan’i Kristy Jesoa Tompontsika. '
  '12':
  - type: text
    content: 'Ary isika efa tafaray amin’i Kristy dia manana ny fahasahiana manatona an’Andriamanitra amim-pahatokiana, noho ny finoana niainan’i Kristy. '
  '13':
  - type: text
    content: Koa izany no angatahako anareo mba tsy ho ketraka amin’ny fahoriana manjo ahy hanasoavana anareo, fa misy vokany be voninahitra ho anareo izany.
  - type: heading
    content: Mba hahalalàna ny fitiavan’i Kristy
  '14':
  - type: text
    content: 'Noho izany no andohalehako eo anatrehan’Andriamanitra Ray, '
  '15':
  - type: text
    content: 'Izay antom-pisian’ny fianakaviana rehetra any an-danitra sy etỳ an-tany. '
  '16':
  - type: text
    content: 'Mangataka amin’Andriamanitra aho mba homeny anareo, araka ny haren’ny voninahiny, ny hohatanjahina fatratra ao anatinareo amin’ny herin’ny Fanahiny, '
  '17':
  - type: text
    content: 'ka hitoeran’i Kristy ao am-ponareo amin’ny finoana; dia hamahatra tsara sy ho mafy orina amin’ny fitiavana ianareo. '
  '18':
  - type: text
    content: 'Mangataka amin’Andriamanitra aho ny hahaizanareo mbamin’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra mahafantatra tsara ny fitiavan’i Kristy, dia izay sakany sy lavany ary haavony sy halaliny. '
  '19':
  - type: text
    content: Enga anie ho fantatrareo tokoa ny fitiavan’i Kristy – na dia tsy mety ho fantatra tanteraka na oviana na oviana aza izany –, mba hamenoana anareo ka hidiranareo ao amin’ny hafenoana rehetra ananan’Andriamanitra.
  '2':
  - type: text
    content: 'Matoky aho fa efa renareo ny andraikitra tontosaiko aminareo, noho ny tombon-tsoa nomen’Andriamanitra ahy. '
  '20':
  - type: text
    content: 'Ary ho an’Andriamanitra Izay mahay manao mihoatra noho ny zavatra rehetra, eny, mihoatra lavitra noho izay angatahintsika na heverintsika aza, araka ny heriny miasa ato amintsika, '
  '21':
  - type: text
    content: 'ho Azy anie ny voninahitra ao amin’ny Fiangonana sy ao amin’i Kristy Jesoa, manerana ny taranaka rehetra mifandimby sy mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  '3':
  - type: text
    content: 'Fanambarana avy tamin’Andriamanitra no nahalalako ny tsiambaratelony. (Efa nisy voasoratro fohifohy ihany momba izany tetsy aloha, '
  '4':
  - type: text
    content: 'ka raha mamaky ianareo, dia ho hainareo fantarina ny fahalalàko ilay tsiambaratelo momba an’i Kristy.) '
  '5':
  - type: text
    content: 'Tsy mbola nampahafantarina ny olombelona izany tsiambaratelo izany tamin’ny andro lasa; fa ireo '
  - type: text
    content: apôstôly
  - type: text
    content: ' sy '
  - type: text
    content: mpaminany
  - type: text
    content: ' voatokana ho an’Andriamanitra kosa no nanambarana azy ankehitriny noho ny asan’ny Fanahy Masina. '
  '6':
  - type: text
    content: 'Izao àry izany tsiambaratelo izany: amin’ny alalan’ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', ny hafa firenena dia natao hitambatra amin’ny Jiosy ka hiara-mandova ny zava-tsoa natokan’Andriamanitra ho an’ny '
  - type: text
    content: vahoakany
  - type: text
    content: ', sy ho tena iray ihany ary hiombona anjara amin’ny fampanantenàn’Andriamanitra ao amin’i Kristy Jesoa.'
  '7':
  - type: text
    content: 'Tonga mpanompon’ny Vaovao Mahafaly aho noho ny tombon-tsoa nomen’Andriamanitra ahy maimaimpoana, araka ny fiàsan’ny heriny. '
  '8':
  - type: text
    content: 'Kely noho izay bitika indrindra amin’ny vahoakan’Andriamanitra rehetra aho, kanefa nomen’Andriamanitra izany tombon-tsoa izany: dia ny hitory amin’ny hafa firenena ny Vaovao Mahafaly momba ny haren’i Kristy tsy hita lany, '
  '9':
  - type: text
    content: 'ary ny hampahazava amin’ny olona rehetra ny fomba hanatanterahan’Andriamanitra ny tsiambaratelony. Hatrizay hatrizay dia voaafina tao amin’Andriamanitra Mpahary ny zavatra rehetra, izany tsiambaratelo izany; '
