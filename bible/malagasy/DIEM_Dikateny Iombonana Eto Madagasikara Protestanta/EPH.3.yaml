document_id: EPH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny andraikitr’i Paoly manoloana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Noho izany izaho Paoly, izay migadra noho ny amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa hanasoavana anareo hafa firenena, dia mangataka amin’Andriamanitra ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Matoky aho fa efa renareo ny andraikitra tontosaiko aminareo, noho ny tombon-tsoa nomen’Andriamanitra ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fanambarana avy tamin’Andriamanitra no nahalalako ny tsiambaratelony. (Efa nisy voasoratro fohifohy ihany momba izany tetsy aloha, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka raha mamaky ianareo, dia ho hainareo fantarina ny fahalalàko ilay tsiambaratelo momba an’i Kristy.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy mbola nampahafantarina ny olombelona izany tsiambaratelo izany tamin’ny andro lasa; fa ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' voatokana ho an’Andriamanitra kosa no nanambarana azy ankehitriny noho ny asan’ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao àry izany tsiambaratelo izany: amin’ny alalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ', ny hafa firenena dia natao hitambatra amin’ny Jiosy ka hiara-mandova ny zava-tsoa natokan’Andriamanitra ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakany
  - type: text
    text: ', sy ho tena iray ihany ary hiombona anjara amin’ny fampanantenàn’Andriamanitra ao amin’i Kristy Jesoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tonga mpanompon’ny Vaovao Mahafaly aho noho ny tombon-tsoa nomen’Andriamanitra ahy maimaimpoana, araka ny fiàsan’ny heriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kely noho izay bitika indrindra amin’ny vahoakan’Andriamanitra rehetra aho, kanefa nomen’Andriamanitra izany tombon-tsoa izany: dia ny hitory amin’ny hafa firenena ny Vaovao Mahafaly momba ny haren’i Kristy tsy hita lany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary ny hampahazava amin’ny olona rehetra ny fomba hanatanterahan’Andriamanitra ny tsiambaratelony. Hatrizay hatrizay dia voaafina tao amin’Andriamanitra Mpahary ny zavatra rehetra, izany tsiambaratelo izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa ankehitriny kosa naseho tamin’ny alalan’ny Fiangonana izany, ka tonga fantatr’ireo fanapahana sy ny fahefana eny ana habakabaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Kôl 1.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ny fahendren’Andriamanitra, dia fahendrena mahefa zavatra tsy tambo isaina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izany rahateo no fandaharana hatrizay hatrizay ka notanterahin’Andriamanitra tamin’ny alalan’i Kristy Jesoa Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary isika efa tafaray amin’i Kristy dia manana ny fahasahiana manatona an’Andriamanitra amim-pahatokiana, noho ny finoana niainan’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa izany no angatahako anareo mba tsy ho ketraka amin’ny fahoriana manjo ahy hanasoavana anareo, fa misy vokany be voninahitra ho anareo izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Mba hahalalàna ny fitiavan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Noho izany no andohalehako eo anatrehan’Andriamanitra Ray, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay antom-pisian’ny fianakaviana rehetra any an-danitra sy etỳ an-tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mangataka amin’Andriamanitra aho mba homeny anareo, araka ny haren’ny voninahiny, ny hohatanjahina fatratra ao anatinareo amin’ny herin’ny Fanahiny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka hitoeran’i Kristy ao am-ponareo amin’ny finoana; dia hamahatra tsara sy ho mafy orina amin’ny fitiavana ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mangataka amin’Andriamanitra aho ny hahaizanareo mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' rehetra mahafantatra tsara ny fitiavan’i Kristy, dia izay sakany sy lavany ary haavony sy halaliny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Enga anie ho fantatrareo tokoa ny fitiavan’i Kristy – na dia tsy mety ho fantatra tanteraka na oviana na oviana aza izany –, mba hamenoana anareo ka hidiranareo ao amin’ny hafenoana rehetra ananan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ho an’Andriamanitra Izay mahay manao mihoatra noho ny zavatra rehetra, eny, mihoatra lavitra noho izay angatahintsika na heverintsika aza, araka ny heriny miasa ato amintsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ho Azy anie ny voninahitra ao amin’ny Fiangonana sy ao amin’i Kristy Jesoa, manerana ny taranaka rehetra mifandimby sy mandrakizay mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: .
