    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà hira vao ho an’ny TOMPO ianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera Azy anie ny fiangonan’ny mpivavaka!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hifaly anie ny vahoaka Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny Tompo no Mpanao azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hiravo anie ny terak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izy no mpanjakany!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoderaina amin-dihy anie ny anaran’ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hankalazaina amin’amponga sy lokanga
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sitraky ny TOMPO ny vahoakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ravahany fandresena ny ory!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpivavaka anie hientanentana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hanome '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitra
    - type: text
      text: v ny Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanao hobin-kafaliana anie ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia mandritra ny alina aza,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka am-bava hanandratra an’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an-tanana hanainga sabatra roa lela!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mamaly faty an’ireo hafa firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manao famaizana ny vahoakany,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mamatotra ireo mpanjakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy managadra ireo mpifehy azy,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mampihatra amin’ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny fitsarana voarakitra an-tsoratra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany sy izany no zavatra ireharehana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izay rehetra mpivavaka amin’ny Tompo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloià!
