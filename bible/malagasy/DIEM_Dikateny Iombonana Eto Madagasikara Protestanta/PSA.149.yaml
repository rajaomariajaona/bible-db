document_id: PSA.149,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny reharehan’ny mpivavaka
  - type: text
    content: ' '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  - type: text
    content: Mihirà hira vao ho an’ny TOMPO ianareo.
  - type: text
    content: Hidera Azy anie ny fiangonan’ny mpivavaka!
  '2':
  - type: text
    content: Hifaly anie ny vahoaka Israely,
  - type: text
    content: fa ny Tompo no Mpanao azy;
  - type: text
    content: 'hiravo anie ny terak’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: fa Izy no mpanjakany!
  '3':
  - type: text
    content: Hoderaina amin-dihy anie ny anaran’ny Tompo,
  - type: text
    content: ka hankalazaina amin’amponga sy lokanga
  '4':
  - type: text
    content: fa sitraky ny TOMPO ny vahoakany
  - type: text
    content: sady ravahany fandresena ny ory!
  '5':
  - type: text
    content: Ny mpivavaka anie hientanentana
  - type: text
    content: 'hanome '
  - type: text
    content: voninahitra
  - type: text
    content: v ny Tompo;
  - type: text
    content: hanao hobin-kafaliana anie ireo
  - type: text
    content: na dia mandritra ny alina aza,
  '6':
  - type: text
    content: ka am-bava hanandratra an’Andriamanitra,
  - type: text
    content: an-tanana hanainga sabatra roa lela!
  '7':
  - type: text
    content: Ny mamaly faty an’ireo hafa firenena
  - type: text
    content: sy manao famaizana ny vahoakany,
  '8':
  - type: text
    content: ny mamatotra ireo mpanjakany
  - type: text
    content: sy managadra ireo mpifehy azy,
  '9':
  - type: text
    content: ary ny mampihatra amin’ireny
  - type: text
    content: 'ny fitsarana voarakitra an-tsoratra:'
  - type: text
    content: izany sy izany no zavatra ireharehana
  - type: text
    content: ho an’izay rehetra mpivavaka amin’ny Tompo.
  - type: text
    content: Haleloià!
