type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny tanàna voalohany nitorian’i Paoly ny Vaovao Mahafaly tany Eorôpa dia i Filipy, tanàna tany Masedônia izay faritany rômanina fahizay (tao avaratra atsinanan’i Gresy). Nanorina Fiangonana tao i Paoly amin’ny diany faharoa (jereo Asa 16.12-40). Nony afaka taona vitsivitsy, fony i Paoly nigadra (tany Efeso hoy ny sasany, tany Kesaria na tany Rôma hoy ny hafa: jereo Fil 1.7), dia nanoratra taratasy mampihetsi-po fatratra ho an’ny Filipianina izy. Te hisaotra azy ireo i Paoly noho ny fanomezana nampitondrainy an’i Epafrôdito ho azy, tamin’ny fotoana nandiavany fahasahiranana sy fahoriana. Te hampirisika azy rehetra koa i Paoly mba hifikitra amin’i Kristy, ka tsy ho voafitaky ny fampianaran-diso izay nisoko mangina tao amin’ny Fiangonany.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vao manomboka i Paoly, dia manambara ny hafaliany sy ny fankasitrahany, rehefa mahatsiaro ny kristianina tao Filipy (1.1-11). Manaraka izany, dia milazalaza ny amin’ny tenany izy. Eo anatrehan’ny ho avy izay saro-pantarina, dia asehon’i Paoly ny fahatokiana tanteraka vokatry ny firaisany amin’i Jesoa Kristy (1.12-26). Ampirisihiny ny Filipianina mba hiorina mafy amin’ny finoana sady hiezaka hifanara-tsaina tsara, ka haneho ny fanetrentena sy ny toe-panahy vonon-kanompo izay samy avy amin’i Jesoa Kristy (1.27–2.18). Mandra-pifankahitana anefa, ny fifandraisan’i Paoly apôstôly sy ny Filipianina dia hiandraiketan’i Timôty mpiara-miasa amin’i Paoly (2.19-30).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Mampitandrin-tena mafy ny Filipianina i Paoly ny amin’ireo olona mivadika amin’ny tena Vaovao Mahafaly. Asainy maka tahaka azy ny Filipianina ka tsy hiroa saina amin’izay kendren’ny fiainana kristianina: dia ny hitovy amin’i Jesoa Kristy (toko 3). Fampirisihana sy fisaorana ary fanaovam-beloma no mamarana ny taratasy (toko 4).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ity taratasy ity dia natao hoe «taratasy momba ny hafaliana», satria ny hafaliana no foto-kevitra hita mivohitra ao hatramin’ny fanombohana ka hatramin’ny famaranana. Izany hafaliana izany dia mifamatotra amin’ny tsy fivadihana amin’i Kristy Izay manatontosa ny asa ankalazaina amin’ilay tononkira hita ao 2.6-11. Mba ho hitanao koa ve izany hafaliana izany?
