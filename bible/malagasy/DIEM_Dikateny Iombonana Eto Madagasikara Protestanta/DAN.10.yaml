document_id: DAN.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahatelo: ilay olona mitafy lamba rongony.'
  - type: text
    content: Tamin’ny taona fahatelo nanjakan’i Kirôsa mpanjakan’i Persia, dia nisy hafatra nambara tamin’i Daniela izay nantsoina koa hoe Beltesatsara. Izany hafatra izany dia azo antoka sady nilaza fa hisy fisedrana goavana
  - type: note
    content: 'Kirôsa: jereo 1.21; Hez 1.1 sy nta.'
  - type: text
    content: . Nodinihin’i Daniela izany hafatra izany; ary tamin’ny alalan’ny fahitana no nahafantarany ny heviny.
  '10':
  - type: text
    content: 'Dia indro nisy tanana nanohina sy nampiarina ahy handohalika sy hitehin-tanana. '
  '11':
  - type: text
    content: 'Ary hoy izy tamiko: ‹Ry Daniela, fatra-pitia anao Andriamanitra, ka fantaro izao teny ambarako anao izao; ary mijoroa eo amin’ny toeranao, satria nirahina hanketỳ aminao aho ankehitriny›. Rehefa voalazany tamiko izany teny izany, dia nitsangana aho nefa mbola nangozohozo ihany. '
  '12':
  - type: text
    content: 'Ary hoy koa izy tamiko: ‹Aza matahotra, ry Daniela, fa hatramin’ny andro voalohany nanoloranao ny fonao hahafantatra izay niseho sy nanetrenao tena teo anatrehan’Andriamanitra, dia nohenoina ny tonombavakao ka tonga aho hitondra ny valiny. '
  '13':
  - type: text
    content: 'Fa ny '
  - type: text
    content: anjely
  - type: text
    content: ' mpiaro ny fanjakan’i Persia dia nanohitra ahy nandritra ny 21 andro; nefa indro i Mikaela'
  - type: note
    content: 'Mikaela: anjely mpiaro an’i Israely; jereo and 21; Joda 9; Apôk 12.7.'
  - type: text
    content: ', anankiray amin’ireo anjely lohalaharana indrindra, no tonga hanampy ahy; ka dia izaho sisa tafajanona teo anilan’ireo mpanjakan’i Persia. '
  '14':
  - type: text
    content: Koa tonga aho ankehitriny hampahafantatra anao izay hanjo ny firenenao amin’ny andro farany, satria mbola hisy koa fahitana iray momba izany andro izany.›
  '15':
  - type: text
    content: '«Raha mbola nilaza ireo teny ireo tamiko izy, dia niondrika tamin’ny tany aho fa tsy nahateny. '
  '16':
  - type: text
    content: 'Fa indro nisy anankiray nanana endrik’olombelona nanendry ny molotro; dia nanoka-bava aho ka niteny tamin’ilay nitsangana teo anilako hoe: ‹Noho ny fahitana, tompoko, dia nitebiteby aho ka tsy nanan-kery intsony. '
  '17':
  - type: text
    content: 'Ahoana moa no hahafahako hiteny aminao, tompoko, kanefa izaho ankehitriny tsy manan-kery intsony sady tsy avy miaina?› '
  '18':
  - type: text
    content: 'Ary ilay nanana endrik’olombelona mbola nanendry ahy indray ka nampahery ahy '
  '19':
  - type: text
    content: 'sady nanao tamiko hoe: ‹Aza matahotra! Fara-pitia anao Andriamanitra, ka fiadanana ho anao! Mahereza ary mahatanjaha!› Koa arakaraky ny nitenenany tamiko no nampahatanjaka ahy, ka hoy aho taminy: ‹Aoka àry hiteny ianao, tompoko, satria efa nampahery ahy.› '
  '2':
  - type: text
    content: '«Tamin’izany andro izany, izaho Daniela dia nisaona nandritra ny telo herinandro. '
  '20':
  - type: text
    content: 'Dia hoy indray izy hoe: ‹Moa fantatrao ve ny antony nahatongavako atỳ aminao? Ny hanambara aminao izay voasoratra ao amin’ny bokin’ny fahamarinana. Fa ankehitriny hiverina hiady amin’ny anjely mpiaro an’i Persia aho; ary iny aho hanainga iny, dia indro avy ny anjely mpiaro an’i Gresy. Nefa tsy misy manampy ahy hanohitra azy anankiroa afa-tsy i Mikaela anjely mpiaro anareo.'
  '3':
  - type: text
    content: 'Tsy nihinana sakafo matsiro aho, ary tsy nanendry hena sy divay sady tsy nihosotra zava-manitra mandra-pahatapitr’ireo telo herinandro ireo. '
  '4':
  - type: text
    content: 'Ny tenako tamin’ny volana voalohany, fony andro faha-24, dia teo amoron’ny ony lehibe, izany hoe i Tigra. '
  '5':
  - type: text
    content: 'Ary nampifantoka ny masoko hijery aho ka nahita lehilahy iray niakanjo rongony fotsy sady nanao fehikibo volamena madio avy any Ofaza. '
  '6':
  - type: text
    content: Tahaka ny vatosoa no fijerena ny tenany ary tahaka ny tselatra no famirapiratry ny tarehiny, toy ny fanilo mirehitra ny masony, toy ny halimo manganohano ny tanany sy ny tongony, ary ny feony dia tahaka ny feon’olona marobe
  - type: note
    content: 'and 5-6: jereo Apôk 1.13-16; 2.18; 19.12.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ary izaho Daniela irery ihany no nahita ny fahitana, fa ireo olona izay niaraka tamiko dia tsy nahita izany; kanefa raiki-tahotra mafy izy ireo ka nandositra niery. '
  '8':
  - type: text
    content: 'Ary izaho irery sisa nijanona ka nahita io fahitana lehibe io; dia tsy nisy hery intsony tato amiko, nivaloarika sy nihasimba ny tarehiko, fa tsy nanan-kery intsony aho. '
  '9':
  - type: text
    content: 'Ary reko ihany ny tenin-dralehilahy; kanefa raha nandre ny feony aho, dia torana nihohoka tamin’ny tany. '
