document_id: DAN.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana fahatelo: ilay olona mitafy lamba rongony.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona fahatelo nanjakan’i Kirôsa mpanjakan’i Persia, dia nisy hafatra nambara tamin’i Daniela izay nantsoina koa hoe Beltesatsara. Izany hafatra izany dia azo antoka sady nilaza fa hisy fisedrana goavana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kirôsa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.21; Hez 1.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: . Nodinihin’i Daniela izany hafatra izany; ary tamin’ny alalan’ny fahitana no nahafantarany ny heviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Tamin’izany andro izany, izaho Daniela dia nisaona nandritra ny telo herinandro. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy nihinana sakafo matsiro aho, ary tsy nanendry hena sy divay sady tsy nihosotra zava-manitra mandra-pahatapitr’ireo telo herinandro ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny tenako tamin’ny volana voalohany, fony andro faha-24, dia teo amoron’ny ony lehibe, izany hoe i Tigra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nampifantoka ny masoko hijery aho ka nahita lehilahy iray niakanjo rongony fotsy sady nanao fehikibo volamena madio avy any Ofaza. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tahaka ny vatosoa no fijerena ny tenany ary tahaka ny tselatra no famirapiratry ny tarehiny, toy ny fanilo mirehitra ny masony, toy ny halimo manganohano ny tanany sy ny tongony, ary ny feony dia tahaka ny feon’olona marobe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and 5-6: jereo Apôk 1.13-16; 2.18; 19.12.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izaho Daniela irery ihany no nahita ny fahitana, fa ireo olona izay niaraka tamiko dia tsy nahita izany; kanefa raiki-tahotra mafy izy ireo ka nandositra niery. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izaho irery sisa nijanona ka nahita io fahitana lehibe io; dia tsy nisy hery intsony tato amiko, nivaloarika sy nihasimba ny tarehiko, fa tsy nanan-kery intsony aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary reko ihany ny tenin-dralehilahy; kanefa raha nandre ny feony aho, dia torana nihohoka tamin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia indro nisy tanana nanohina sy nampiarina ahy handohalika sy hitehin-tanana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy tamiko: ‹Ry Daniela, fatra-pitia anao Andriamanitra, ka fantaro izao teny ambarako anao izao; ary mijoroa eo amin’ny toeranao, satria nirahina hanketỳ aminao aho ankehitriny›. Rehefa voalazany tamiko izany teny izany, dia nitsangana aho nefa mbola nangozohozo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy koa izy tamiko: ‹Aza matahotra, ry Daniela, fa hatramin’ny andro voalohany nanoloranao ny fonao hahafantatra izay niseho sy nanetrenao tena teo anatrehan’Andriamanitra, dia nohenoina ny tonombavakao ka tonga aho hitondra ny valiny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' mpiaro ny fanjakan’i Persia dia nanohitra ahy nandritra ny 21 andro; nefa indro i Mikaela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mikaela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anjely mpiaro an’i Israely; jereo and 21; Joda 9; Apôk 12.7.
    marker-yv: yv-n
  - type: text
    text: ', anankiray amin’ireo anjely lohalaharana indrindra, no tonga hanampy ahy; ka dia izaho sisa tafajanona teo anilan’ireo mpanjakan’i Persia. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa tonga aho ankehitriny hampahafantatra anao izay hanjo ny firenenao amin’ny andro farany, satria mbola hisy koa fahitana iray momba izany andro izany.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Raha mbola nilaza ireo teny ireo tamiko izy, dia niondrika tamin’ny tany aho fa tsy nahateny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa indro nisy anankiray nanana endrik’olombelona nanendry ny molotro; dia nanoka-bava aho ka niteny tamin’ilay nitsangana teo anilako hoe: ‹Noho ny fahitana, tompoko, dia nitebiteby aho ka tsy nanan-kery intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ahoana moa no hahafahako hiteny aminao, tompoko, kanefa izaho ankehitriny tsy manan-kery intsony sady tsy avy miaina?› '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ilay nanana endrik’olombelona mbola nanendry ahy indray ka nampahery ahy '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sady nanao tamiko hoe: ‹Aza matahotra! Fara-pitia anao Andriamanitra, ka fiadanana ho anao! Mahereza ary mahatanjaha!› Koa arakaraky ny nitenenany tamiko no nampahatanjaka ahy, ka hoy aho taminy: ‹Aoka àry hiteny ianao, tompoko, satria efa nampahery ahy.› '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'Dia hoy indray izy hoe: ‹Moa fantatrao ve ny antony nahatongavako atỳ aminao? Ny hanambara aminao izay voasoratra ao amin’ny bokin’ny fahamarinana. Fa ankehitriny hiverina hiady amin’ny anjely mpiaro an’i Persia aho; ary iny aho hanainga iny, dia indro avy ny anjely mpiaro an’i Gresy. Nefa tsy misy manampy ahy hanohitra azy anankiroa afa-tsy i Mikaela anjely mpiaro anareo.'
