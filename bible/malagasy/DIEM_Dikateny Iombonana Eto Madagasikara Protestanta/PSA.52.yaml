  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Tononkalo fananarana nataon’i Davida,
  - type: text
    content: ' '
  '10':
  - type: text
    content: Izaho kosa, ao an-
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ','
  - type: text
    content: dia toa fototr’ôliva maitso mavana;
  - type: text
    content: ny fitiavany no itokiako
  - type: text
    content: mandrakizay mandrakizay.
  '11':
  - type: text
    content: Tompo ô, hoderaiko hatrany Ianao
  - type: text
    content: noho ny amin’izay nataonao;
  - type: text
    content: ary eo anatrehan’ny mpivavaka aminao
  - type: text
    content: no hanambarako fa tsara Ianao.
  '2':
  - type: text
    content: 'fony tonga i Dôega, ilay Edômita, ka nilaza tamin’i Saoly hoe: Nankany an-tranon’i Abimeleka i Davida'
  - type: note
    content: Jereo 1 Sam 21.8; 22.9-10.
  - type: text
    content: .
  '3':
  - type: text
    content: Ahoana ianao no mirehareha amin’ny ratsy,
  - type: text
    content: ry ilay mahery mamely ny mpivavaka marina.
  '4':
  - type: text
    content: Heloka hatrany no saininao;
  - type: text
    content: toa hareza maranitra ny lelanao,
  - type: text
    content: ka kinga tokoa raha hanendrikendrika;
  '5':
  - type: text
    content: tsy mba ny tsara no tianao fa ny ratsy,
  - type: text
    content: tsy mba ny marina fa ny lainga.
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Teny manimba avokoa
  - type: text
    content: no maminao, ry mpamitaka.
  '7':
  - type: text
    content: Andriamanitra kosa no hanongana anao mandrakizay;
  - type: text
    content: hisambotra sy hisarika anao hiala ny tranonao Izy
  - type: text
    content: ary hanongotra anao amin’ity tany ivelomantsika ity.
  - type: text
    content: Fiatoana
  '8':
  - type: text
    content: Ny olo-marina hahita izany ka hitolagaga
  - type: text
    content: 'ary dia haneso anao sy handatsalatsa hoe:'
  '9':
  - type: text
    content: «Indro ilay lehilahy mpiady,
  - type: text
    content: tsy nanao an’Andriamanitra ho heriny
  - type: text
    content: fa niantehitra tamin’ny harem-beny,
  - type: text
    content: nirehaka tamin’ny haratsiany.»
