  - type: text
    text: «Eo anatrehan’ireo mpahalala Ahy, hoy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no hotsarovako fa ny Ejiptianina sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilônianina
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny Filistinina sy ny Tirianina ary ny Etiôpianina
- type: usfm
