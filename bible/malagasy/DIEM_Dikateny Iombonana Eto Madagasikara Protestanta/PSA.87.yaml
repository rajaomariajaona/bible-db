  - type: text
    text: 'Ireo kosa mandihy sy mihira hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ao Tsiôna no loharano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ipoiran’ny fitahiana rehetra ho anay.»
