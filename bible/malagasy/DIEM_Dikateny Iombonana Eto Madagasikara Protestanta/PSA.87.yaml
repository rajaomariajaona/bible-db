document_id: PSA.87,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO I Tsiôna no tena tanindrazan’ny firenen-drehetra
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’ny terak’i Kôra. Tononkira.
  - type: text
    content: Teo an-tendrombohitra masina
  - type: text
    content: no nanorenan’ny TOMPO an’i Jerosalema.
  '2':
  - type: text
    content: 'Tiany tokoa ny tanànan’i '
  - type: text
    content: Tsiôna
  - type: text
    content: mihoatra noho ny toerana rehetra
  - type: text
    content: izay nonenan’ireo taranak’i Jakôba.
  '3':
  - type: text
    content: Ry ilay tanànan’Andriamanitra ô,
  - type: text
    content: 'zava-malaza no ambarany momba anao:'
  - type: text
    content: Fiatoana
  '4':
  - type: text
    content: «Eo anatrehan’ireo mpahalala Ahy, hoy Izy,
  - type: text
    content: 'no hotsarovako fa ny Ejiptianina sy ny '
  - type: text
    content: Babilônianina
  - type: text
    content: mbamin’ny Filistinina sy ny Tirianina ary ny Etiôpianina
  - type: text
    content: dia samy teraka tany amin’ny taniny avy.
  '5':
  - type: text
    content: 'Izao kosa no holazaiko momba an’i Tsiôna:'
  - type: text
    content: Ny olona tsirairay dia samy teraka tao;
  - type: text
    content: Ilay Avo Indrindra mihitsy
  - type: text
    content: no manamafy orina azy.»
  '6':
  - type: text
    content: Ny TOMPO manao lisitra ireo firenena
  - type: text
    content: 'ka manoratra ny isam-batan’olona hoe:'
  - type: text
    content: «Ity dia teraka tao Tsiôna.»
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: 'Ireo kosa mandihy sy mihira hoe:'
  - type: text
    content: «Ao Tsiôna no loharano
  - type: text
    content: ipoiran’ny fitahiana rehetra ho anay.»
