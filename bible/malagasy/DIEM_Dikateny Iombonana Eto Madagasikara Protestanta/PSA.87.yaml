  - type: text
    text: Ny TOMPO manao lisitra ireo firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka manoratra ny isam-batan’olona hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ity dia teraka tao Tsiôna.»
- type: usfm
  marker: qr
  children:
