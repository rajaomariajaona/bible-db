document_id: EZK.35,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Loza mananontanona an’ireo Edômita
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: '«Noho ny nitenenanao hoe: ‹Ndeha halaiko ho fananana ireo firenena roa sy tany roa, dia i '
  - type: text
    content: Israely
  - type: text
    content: ' sy i Joda izay samy onenan’ny TOMPO›, '
  '11':
  - type: text
    content: 'dia izao no lazaiko aminao: ‹Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa arakaraka ny herisetra sy ny fialonana ary ny fankahalana izay nasehonao tamin’ny Israelita ihany no hataoko aminao. Hampahafantariko ny Israelita ny maha Izaho Ahy, rehefa hanafay anao Aho. '
  '12':
  - type: text
    content: 'Amin’izay dia hoekenao fa Izaho TOMPO dia efa nandre ny teny fanarabiana nataonao hoe: ‹Anay ny tendrombohitr’i Israely! Efa rava ireny ka nomena anay hivelomanay!› '
  '13':
  - type: text
    content: Nanao teny miavonavona nankaloza Ahy ianao, ary efa reko ireo teny maro nanoheranao Ahy.›
  '14':
  - type: text
    content: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: Satria nifaly'
  - type: note
    content: nifaly tamin’ny nahazoan’ny Babilônianina an’i Jerosalema sy Joda manontolo (jereo and 15).
  - type: text
    content: ' ny taninao manontolo, ry Edôma, dia hataoko taniefitra ho anao izy. '
  '15':
  - type: text
    content: 'Faly ianao nahita ny zaratanin’ny vahoaka Israely tonga taniefitra, koa toy izay nanjo azy no hataoko aminao: ho taniefitra ianao, ry tendrombohitr’i Sehîra, izany hoe ry Edôma manontolo. Amin’izay dia hoekena fa Izaho no TOMPO.»'
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, mitodiha manatrika ny tendrombohitr’i Sehìra ianao
  - type: note
    content: 'tendrombohitr’i Sehìra: i Sehìra no anaran’ny tampon-tanety be tendrombohitra mitomandavana ao atsimon’ny Ranomasina Maty ary ampiasaina matetika hilazana an’i Edôma (jereo ohatra Gen 32.4; Nom 24.18). Momba ny and 2-15, dia jereo 25.12-14 sy ny naoty momba ny Is 34.5.'
  - type: text
    content: ', ka mijoroa ho mpaminany ny amin’ny hamelezako azy, '
  '3':
  - type: text
    content: 'ary ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hirotsaka an-tsehatra hamely anao Aho, ry tendrombohitra Sehîra. Hanamparako ny heriko ianao, ka hataoko rava sy lao. '
  '4':
  - type: text
    content: 'Hataoko tonga korontam-bato ireo tanànanao, ry Edôma, ary ho lao ny taninao; ka amin’izay dia hoekenao fa Izaho no TOMPO. '
  '5':
  - type: text
    content: Hatry ny ela no nankahalanao ny Israelita. Tamin’ny fotoana naharesy azy, fony nihoa-pampana ny heloka vitany
  - type: note
    content: 'Ny fankahalan’i Edôma an’i Israely dia efa hatramin’ny vanim-potoana nakana ny tanin’i Israely (jereo Nom 20.20). –nihoa-pampana ny heloka vitany: ny fandravan’ny Babilônianina an’i Jerosalema no famaizan’Andriamanitra ny heloky ny Israelita tao Joda; ary nohararaotin’ny andian-jirika edômita izany handrobana azy.'
  - type: text
    content: ', dia nataonao ripaky ny ady izy. '
  '6':
  - type: text
    content: 'Noho izany, velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa hampihosin-dra anao Aho satria fandatsahan-dra no setry hanjohy anao. Noho ianao tsy niahotra nandatsa-dra, dia fandatsahan-dra no setry hanjohy anao. '
  '7':
  - type: text
    content: 'Hataoko rava sy lao ianao, ry tendrombohitr’i Sehîra ary haringako izay mandalo any. '
  '8':
  - type: text
    content: 'Hofenoiko faty eny an-tendrombohitrao, ry Edôma, ary hiampatrampatra eny an-kavoananao sy eny an-dohasahanao sy eny amin’ny lalan-driakanao rehetra ireo maty an’ady. '
  '9':
  - type: text
    content: Hataoko taniefitra mandrakizay ny taninao, ka tsy honenana intsony ny tanànanao. Amin’izay dia hoekenao fa Izaho no TOMPO.›
