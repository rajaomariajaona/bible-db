document_id: EZK.35,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza mananontanona an’ireo Edômita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Noho ny nitenenanao hoe: ‹Ndeha halaiko ho fananana ireo firenena roa sy tany roa, dia i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' sy i Joda izay samy onenan’ny TOMPO›, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no lazaiko aminao: ‹Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa arakaraka ny herisetra sy ny fialonana ary ny fankahalana izay nasehonao tamin’ny Israelita ihany no hataoko aminao. Hampahafantariko ny Israelita ny maha Izaho Ahy, rehefa hanafay anao Aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay dia hoekenao fa Izaho TOMPO dia efa nandre ny teny fanarabiana nataonao hoe: ‹Anay ny tendrombohitr’i Israely! Efa rava ireny ka nomena anay hivelomanay!› '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanao teny miavonavona nankaloza Ahy ianao, ary efa reko ireo teny maro nanoheranao Ahy.›
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: Satria nifaly'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nifaly '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tamin’ny nahazoan’ny Babilônianina an’i Jerosalema sy Joda manontolo (jereo and 15).
      marker-yv: yv-n
    - type: text
      text: ' ny taninao manontolo, ry Edôma, dia hataoko taniefitra ho anao izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faly ianao nahita ny zaratanin’ny vahoaka Israely tonga taniefitra, koa toy izay nanjo azy no hataoko aminao: ho taniefitra ianao, ry tendrombohitr’i Sehîra, izany hoe ry Edôma manontolo. Amin’izay dia hoekena fa Izaho no TOMPO.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Ry ilay taranak’olombelona, mitodiha manatrika ny tendrombohitr’i Sehìra ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tendrombohitr’i Sehìra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i Sehìra no anaran’ny tampon-tanety be tendrombohitra mitomandavana ao atsimon’ny Ranomasina Maty ary ampiasaina matetika hilazana an’i Edôma (jereo ohatra Gen 32.4; Nom 24.18). Momba ny and 2-15, dia jereo 25.12-14 sy ny naoty momba ny Is 34.5.
      marker-yv: yv-n
    - type: text
      text: ', ka mijoroa ho mpaminany ny amin’ny hamelezako azy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hirotsaka an-tsehatra hamely anao Aho, ry tendrombohitra Sehîra. Hanamparako ny heriko ianao, ka hataoko rava sy lao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataoko tonga korontam-bato ireo tanànanao, ry Edôma, ary ho lao ny taninao; ka amin’izay dia hoekenao fa Izaho no TOMPO. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatry ny ela no nankahalanao ny Israelita. Tamin’ny fotoana naharesy azy, fony nihoa-pampana ny heloka vitany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fankahalan’i
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Edôma an’i Israely dia efa hatramin’ny vanim-potoana nakana ny tanin’i Israely (jereo Nom 20.20). –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: nihoa-pampana ny heloka vitany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ny fandravan’ny Babilônianina an’i Jerosalema no famaizan’Andriamanitra ny heloky ny Israelita tao Joda; ary nohararaotin’ny andian-jirika edômita izany handrobana azy.'
      marker-yv: yv-n
    - type: text
      text: ', dia nataonao ripaky ny ady izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa hampihosin-dra anao Aho satria fandatsahan-dra no setry hanjohy anao. Noho ianao tsy niahotra nandatsa-dra, dia fandatsahan-dra no setry hanjohy anao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataoko rava sy lao ianao, ry tendrombohitr’i Sehîra ary haringako izay mandalo any. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hofenoiko faty eny an-tendrombohitrao, ry Edôma, ary hiampatrampatra eny an-kavoananao sy eny an-dohasahanao sy eny amin’ny lalan-driakanao rehetra ireo maty an’ady. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hataoko taniefitra mandrakizay ny taninao, ka tsy honenana intsony ny tanànanao. Amin’izay dia hoekenao fa Izaho no TOMPO.›
