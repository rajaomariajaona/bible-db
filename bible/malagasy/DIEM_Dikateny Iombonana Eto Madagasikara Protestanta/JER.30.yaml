document_id: JER.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny fampanantenana momba ny fanjakan’i Israely
  - type: text
    content: 'Nisy baiko tamin’i Jeremià, dia baiko avy amin’ny TOMPO nanao hoe: '
  '10':
  - type: text
    content: «Koa aza matahotra ianareo,
  - type: text
    content: ry taranak’i Jakôba mpanompoko
  - type: note
    content: 'And 10-11: jereo 46.27-28.'
  - type: text
    content: ','
  - type: text
    content: hoy ny teny hentitry ny TOMPO;
  - type: text
    content: aza kivy ianao, ry firenena Israely,
  - type: text
    content: fa indro Aho hamonjy anao
  - type: text
    content: avy any amin’ny faritany lavitra any;
  - type: text
    content: indro Aho hamonjy ireo taranakareo
  - type: text
    content: avy any amin’ny tany izay nahababo azy.
  - type: text
    content: Hiverina ianareo, ry taranak’i Jakôba,
  - type: text
    content: ka hiadana sy handry feizay
  - type: text
    content: fa tsy hisy hanaitaitra intsony.
  '11':
  - type: text
    content: Fa miaraka aminareo Aho,
  - type: text
    content: mba hamonjy anareo;
  - type: text
    content: teny hentitry avy amiko TOMPO izany.
  - type: text
    content: Hofongorako ny firenen-kafa rehetra
  - type: text
    content: izay nanelezako anareo;
  - type: text
    content: ianareo kosa tsy mba hofongorako,
  - type: text
    content: na dia tsy maintsy faiziko
  - type: text
    content: araka ny hitsiny ihany aza
  - type: text
    content: fa tsy havelako ho afa-maina.»
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Izao no lazain’ny Tompo
  - type: note
    content: Ao amin’ny and 12-17 ny Tompo dia miteny amin’ny mponin’i Jerosalema toy ny amin’ny vehivavy iray maratra.
  - type: text
    content: ':'
  - type: text
    content: «Tsy azom-panafana ny fahavoazanao,
  - type: text
    content: tsy azo sitranina ny ratranao.
  '13':
  - type: text
    content: Tsy misy olona mihevitra ny ferinao
  - type: text
    content: ho mbola mety hotsaboina;
  - type: text
    content: fa tsy misy fanafodiny intsony.
  '14':
  - type: text
    content: Manadino anao avokoa ireo sakaizanao
  - type: text
    content: ary tsy misy miahy anao mihitsy;
  - type: text
    content: satria Izaho no nikapoka anao
  - type: text
    content: toy ny fahavalo namely anao,
  - type: text
    content: ka nofaiziko mafy ianao.
  '15':
  - type: text
    content: Nahoana no itarainanao ny fahavoazanao
  - type: text
    content: sy ny fanaintainanao tsy azo tonena?
  - type: text
    content: Ny halehiben’ny helokao
  - type: text
    content: sy ny hamaroan’ny otanao
  - type: text
    content: no nampiharako izany taminao.
  '16':
  - type: text
    content: Nefa izay rehetra mandripaka anao
  - type: text
    content: dia mba haripaka ihany koa;
  - type: text
    content: izay rehetra mankahala anao
  - type: text
    content: dia mba hatao sesitany ihany koa;
  - type: text
    content: izay mamabo anao
  - type: text
    content: dia mba hobaboina ihany koa;
  - type: text
    content: ary izay rehetra mandroba ny fanananao
  - type: text
    content: dia mba hatolotro horobaina ihany koa.
  '17':
  - type: text
    content: 'Satria ireo efa niantso anao hoe:'
  - type: text
    content: «Ry ilay tsy misy ilana azy,»
  - type: text
    content: '«ry '
  - type: text
    content: Tsiôna
  - type: text
    content: ' tsy misy miahy akory»,'
  - type: text
    content: koa hositraniko ny ratranao
  - type: text
    content: ary hohamainiko ny ferinao;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.».
  - type: heading
    content: '*'
  '18':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: Indro hovako ny anjaranareo,
  - type: text
    content: ry fianakavian’i Israely
  - type: text
    content: ka hiantrako ny tokantranonareo.
  - type: text
    content: Haorina indray eo amin’ny havoany.
  - type: text
    content: ireo tanàn-dehibe tsirairay avy
  - type: text
    content: ary eo amin’ny toerany taloha
  - type: text
    content: ireo trano tsara tarehy.
  '19':
  - type: text
    content: Re avy ao ny hira fiderana
  - type: text
    content: sy ny horakora-pifaliana.
  - type: text
    content: Tsy hihavitsy intsony ianareo,
  - type: text
    content: ry taranak’i Jakôba,
  - type: text
    content: fa hohamaroiko;
  - type: text
    content: tsy hatao tsinontsinona intsony ianareo,
  - type: text
    content: fa horakofako voninahitra.
  '2':
  - type: text
    content: '«Izao no lazain’ny TOMPO Andriamanitr’i Israely: Ataovy an-tsoratra izay hafatra rehetra efa nampitaiko taminao. '
  '20':
  - type: text
    content: Hanjary toy ny fahiny ianareo,
  - type: text
    content: 'ry taranak’i Jakôba:'
  - type: text
    content: hotohizinareo indray
  - type: text
    content: ny fivorianareo eo anatrehako,
  - type: text
    content: ary hirotsaka an-tsehatra Aho
  - type: text
    content: hamely ireo nampahory anareo.
  '21':
  - type: text
    content: Anankiray avy aminareo ihany no ho lehibenareo
  - type: text
    content: ary iray avy eto anivonareo ihany
  - type: text
    content: no ho mpitarika anareo.
  - type: text
    content: Havelako hanatona Ahy izy,
  - type: text
    content: fa tsy misy hamono tena hanatona Ahy
  - type: text
    content: raha tsy nasaiko hanao izany,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  '22':
  - type: text
    content: Amin’izay dia ho vahoakako indray ianareo
  - type: text
    content: ary Izaho ho Andriamanitrareo.»
  - type: heading
    content: '*'
  '23':
  - type: text
    content: Indro tamy ny rambon-danitra,
  - type: text
    content: dia ny fahatezeran’ny TOMPO.
  - type: text
    content: Toy ny rivo-doza mitambolimbolina
  - type: text
    content: no fiantontany eo an-dohan’ny olon-dratsy.
  '24':
  - type: text
    content: Tsy hitsahatra mirehitra
  - type: text
    content: ny fahatezeran’ny TOMPO,
  - type: text
    content: raha tsy efa nahatontosa sy nahatanteraka
  - type: text
    content: izay fandaharan-javatra notapahiny.
  - type: text
    content: Amin’ny andro any aoriana any
  - type: text
    content: vao tena ho takatrareo izany.
  '3':
  - type: text
    content: 'Fa teny hentitra avy amiko TOMPO izao: Ho avy ny andro izay hanovako ny anjaran’i Israely vahoakako ary koa ny an’i Joda'
  - type: note
    content: 'Israely sy Joda: jereo ny naoty momba ny 3.6. Ny fanjakan’i Israely (avaratra) dia lasan’ny Asirianina ankevitry ny zato taona eo ho eo talohan’ny andron’i Jeremià (jereo 2 Mp 17.1-6). Ny fanjakan’i Joda kosa dia ho lasan’ny Babilônianina alohan’ny fiafaràn’ny asan’i Jeremià (jereo Jer 39.1-10; 52).'
  - type: text
    content: . Haveriko ao amin’ny tany izay efa nomeko ny razany izy, hoy Aho, ka hizaka azy ho fananany indray.»
  '4':
  - type: text
    content: 'Izao no hafatra nampitain’ny TOMPO tamin’i Jeremià ho an’i Israely ary koa ho an’i Joda; eny, izao no lazain’ny TOMPO:'
  - type: text
    content: «Kiakiaka mahatsiravina no re,
  - type: text
    content: horohoro tsy misy mampitony.
  '6':
  - type: text
    content: Anontanio ka jereo
  - type: text
    content: raha misy lehilahy mihetsi-jaza.
  - type: text
    content: Ahoana àry Aho no mahita
  - type: text
    content: ny lehilahy rehetra mitan-kibo
  - type: text
    content: toy ny vehivavy mihetsi-jaza,
  - type: text
    content: ka hatsatra sy mivaloharika avokoa?
  '7':
  - type: text
    content: Loza ity! fa andro mampahatahotra,
  - type: text
    content: andro tsy misy toa azy;
  - type: text
    content: vanim-potoana mahory
  - type: text
    content: ho an’ny taranak’i Jakôba!
  - type: text
    content: Nefa ho afaka amin’izany ihany izy.»
  - type: heading
    content: '*'
  '8':
  - type: text
    content: '«Rehefa tonga izany andro izany, hoy ny teny hentitry ny TOMPOn’izao rehetra izao, dia hopotehiko ny '
  - type: text
    content: zioga
  - type: text
    content: ' mitambesatra eny am-bozony ary hotapahiko ny fatorany. Tsy hanompo ny vahiny intsony izy, '
  '9':
  - type: text
    content: fa hanompo Ahy TOMPO Andriamaniny sy hanompo an’i Davida izay hatsangako ho mpanjakany indray.»
  - type: heading
    content: '*'
