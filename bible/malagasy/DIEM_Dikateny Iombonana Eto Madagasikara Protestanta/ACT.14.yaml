document_id: ACT.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Paoly sy i Barnabà tao Ikôniôma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tao Ikôniôma dia niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' fivavahan’ny Jiosy ihany koa i Paoly sy i Barnabà; ary fatratra ny teny nataon’izy roa lahy, ka marobe ny Jiosy mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' no tonga mpino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny Jiosy izay tsy nety nino kosa nitaona sy nanome fo ny mpanompo sampy hanohitra ny havana iray finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nijanona elaela tao Ikôniôma i Paoly sy i Barnabà ary niteny tamim-pahasahiana satria ny Tompo no nitokiany. Io Tompo io no manome porofo hahamarina ny teny torîna momba ny fahasoavany ka nampanao azy roa lahy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' sy zava-mahagaga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nisara-tsaina ny olona marobe tao an-tanàna: tao ireo niandany tamin’ny Jiosy, ary tao ireo niandany tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Efa nivonombonona terỳ ny mpanompo sampy sy ny Jiosy mbamin’ny lehibeny hanala baràka an’i Paoly sy i Barnabà ary hamono azy amin’ny tora-bato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vao nahatsikaritra izany izy roa lahy, dia lasa nandositra tany Listra sy Derba, tanàna any Likaônia, ary tany amin’ny faritra manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia naharitra nitory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' tany izy roa lahy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Paoly sy i Barnabà tao Listra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tao Listra dia nisy lehilahy izay nitalapetraka foana satria malemy tongotra, kilemaina hatrany an-kibon-dreniny ka tsy mbola namindra hatrizay niainany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nihaino an’i Paoly nandaha-teny ralehilahy. Nibanjina azy i Paoly ka nahita fa manam-pinoana ny ho sitrana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nitenenany mafy izy nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitsangàna ka mijoroa mahitsy amin’ny tongotrao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Niantsambotra ralehilahy ary dia namindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehefa nahita izay vao nataon’i Paoly ny vahoaka, dia niantsoantso mafy tamin’ny fiteny likaônianina hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Naka endrik’olombelona ireo andriamanitra ka tafidina atỳ amintsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 28.6.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I Barnabà moa nataon’ny vahoaka hoe Jopitera; ary i Paoly kosa nataony hoe Hermesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ao amin’ny fivavahana grika (na rômanina) dia i Zeosy (na i Jopitera) no filohan’ireo andriamanitra sampy, ary i Hermesy (na i Merkiora) no mpitondra tenin’izy ireo.
    marker-yv: yv-n
  - type: text
    text: ' satria izy no mpandaha-teny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ilay mpisoron’i Jopitera izay nanana ny tempoliny teo am-bavahadin’ny tanàna dia efa nitondra ombilahy voaravaka fehiloha voninkazo teo am-bavahady satria nikasa hanao sorona tamin’i Barnabà sy i Paoly izy mbamin’ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa nony nandre izany ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ', dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra ny fitafiany
  - type: text
    text: ' ka nanao anjolofo nitsarapaka tao anaty vahoaka sady niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '–Adray rey olona! Nahoana no manao izao ianareo? Olombelona tahaka anareo ihany izahay! Manambara ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' aminareo izahay, ka manainga anareo handao ireto sampy tsy mahasoa ireto ary hitodika amin’ilay Andriamanitra velona, Izay nanao ny lanitra sy ny tany ary ny ranomasina mbamin’ny zavatra rehetra ao aminy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.11; Sal 146.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’ny andro lasa dia navelan’Andriamanitra samy hanaraka ny lalana mahadiavolana ny fony avy ny firenena rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'kanefa tsy navelan’Andriamanitra tsy hanana vavolombelona manambara Azy ny tenany amin’ny fanasoavana anareo: fa Izy no mandatsaka ranonorana avy eny amin’ny lanitra ho anareo hampahavokatra ny tany ara-potoana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 147.8; Jer 5.24.
    marker-yv: yv-n
  - type: text
    text: ' ary manome hanina anareo hameno fifaliana ny fonareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Na dia niteny toy izany aza izy roa lahy, dia nananosarotra vao nahasakana ny vahoaka tsy hanao sorona taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nisy Jiosy tonga avy tany Antiôkia any Pisidia sy avy tany Ikôniôma. Nahazo ny fom-bahoaka ry zareo ka nitora-bato hahafaty an’i Paoly, ary nitaritarika azy teo ivelan’ny tanàna satria nampoiziny ho efa maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Kanjo nony voahodidin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' teo i Paoly, dia nitsangana ka nody tao an-tanàna. Ary lasa nankany Derba izy mbamin’i Barnabà ny ampitson’iny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miverina any Antiôkia any Siria i Paoly sy i Barnabà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nitory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' tao an-tanànan’i Derba ry i Paoly sy i Barnabà ka betsaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' azony tao. Dia niverina indray izy roa lahy nankany Listra sy Ikôniôma ary Antiôkia any Pisidia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nampahery fo ny mpianatra i Paoly sy i Barnabà ary nampirisika azy ireo haharitra amin’ny finoana ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fahoriana be no tsy maintsy diavintsika mba hidirana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Isam-Piangonana dia nanendry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' izy roa lahy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nanendry loholona ho an’ny mpianatra izy roa lahy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nasain’izy roa lahy nanendrena loholona ho an’ny mpianatra.
    marker-yv: yv-n
  - type: text
    text: ', ary nony efa nivavaka sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nifady hanina
  - type: text
    text: ' dia nanankina ny iray Fiangonana tamin’ny Tompo Izay efa ninoan’izy rehetra rahateo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Taorian’izany, dia namakivaky ny faritany Pisidia ry i Paoly sy i Barnabà ka tonga tany Pamfilia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Pisidia: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.14. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Pamfilia:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' faritanin’i Perga (13.13 sy nta) sy i Atalia (and 25).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nitory ny tenin’Andriamanitra tao Perga izy roa lahy, ary lasa nankany Atalia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avy eo no niondranany an-tsambo ho any Antiôkia, dia ilay tanàna nanankinana azy roa lahy tamin’ny fahasoavan’Andriamanitra ho an’izao asa notontosainy izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nony tonga tao Antiôkia izy roa lahy, dia namory ny Fiangonana, ka nitantara ny zavatra rehetra nampanaovin’Andriamanitra azy ary koa nitantara ny namohan’Andriamanitra varavarana ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' mba hahazoany mino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary elaela ihany no niarahan’i Paoly sy i Barnabà nitoetra tamin’ny mpianatra tao Antiôkia.
