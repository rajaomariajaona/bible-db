document_id: ACT.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Paoly sy i Barnabà tao Ikôniôma
  - type: text
    content: 'Tao Ikôniôma dia niditra tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' fivavahan’ny Jiosy ihany koa i Paoly sy i Barnabà; ary fatratra ny teny nataon’izy roa lahy, ka marobe ny Jiosy mbamin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' no tonga mpino. '
  '10':
  - type: text
    content: 'Dia nitenenany mafy izy nataony hoe:'
  - type: text
    content: –Mitsangàna ka mijoroa mahitsy amin’ny tongotrao!
  - type: text
    content: 'Niantsambotra ralehilahy ary dia namindra. '
  '11':
  - type: text
    content: 'Rehefa nahita izay vao nataon’i Paoly ny vahoaka, dia niantsoantso mafy tamin’ny fiteny likaônianina hoe:'
  - type: text
    content: –Naka endrik’olombelona ireo andriamanitra ka tafidina atỳ amintsika
  - type: note
    content: Ampit 28.6.
  - type: text
    content: '!'
  '12':
  - type: text
    content: I Barnabà moa nataon’ny vahoaka hoe Jopitera; ary i Paoly kosa nataony hoe Hermesy
  - type: note
    content: Ao amin’ny fivavahana grika (na rômanina) dia i Zeosy (na i Jopitera) no filohan’ireo andriamanitra sampy, ary i Hermesy (na i Merkiora) no mpitondra tenin’izy ireo.
  - type: text
    content: ' satria izy no mpandaha-teny. '
  '13':
  - type: text
    content: 'Ary ilay mpisoron’i Jopitera izay nanana ny tempoliny teo am-bavahadin’ny tanàna dia efa nitondra ombilahy voaravaka fehiloha voninkazo teo am-bavahady satria nikasa hanao sorona tamin’i Barnabà sy i Paoly izy mbamin’ny vahoaka. '
  '14':
  - type: text
    content: 'Fa nony nandre izany ireo '
  - type: text
    content: apôstôly
  - type: text
    content: ', dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' ka nanao anjolofo nitsarapaka tao anaty vahoaka sady niantsoantso hoe:'
  '15':
  - type: text
    content: '–Adray rey olona! Nahoana no manao izao ianareo? Olombelona tahaka anareo ihany izahay! Manambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' aminareo izahay, ka manainga anareo handao ireto sampy tsy mahasoa ireto ary hitodika amin’ilay Andriamanitra velona, Izay nanao ny lanitra sy ny tany ary ny ranomasina mbamin’ny zavatra rehetra ao aminy'
  - type: note
    content: Jereo Eks 20.11; Sal 146.6.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Tamin’ny andro lasa dia navelan’Andriamanitra samy hanaraka ny lalana mahadiavolana ny fony avy ny firenena rehetra; '
  '17':
  - type: text
    content: 'kanefa tsy navelan’Andriamanitra tsy hanana vavolombelona manambara Azy ny tenany amin’ny fanasoavana anareo: fa Izy no mandatsaka ranonorana avy eny amin’ny lanitra ho anareo hampahavokatra ny tany ara-potoana'
  - type: note
    content: Ampit Sal 147.8; Jer 5.24.
  - type: text
    content: ' ary manome hanina anareo hameno fifaliana ny fonareo.'
  '18':
  - type: text
    content: Na dia niteny toy izany aza izy roa lahy, dia nananosarotra vao nahasakana ny vahoaka tsy hanao sorona taminy.
  '19':
  - type: text
    content: 'Nisy Jiosy tonga avy tany Antiôkia any Pisidia sy avy tany Ikôniôma. Nahazo ny fom-bahoaka ry zareo ka nitora-bato hahafaty an’i Paoly, ary nitaritarika azy teo ivelan’ny tanàna satria nampoiziny ho efa maty. '
  '2':
  - type: text
    content: 'Fa ny Jiosy izay tsy nety nino kosa nitaona sy nanome fo ny mpanompo sampy hanohitra ny havana iray finoana. '
  '20':
  - type: text
    content: 'Kanjo nony voahodidin’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' teo i Paoly, dia nitsangana ka nody tao an-tanàna. Ary lasa nankany Derba izy mbamin’i Barnabà ny ampitson’iny.'
  - type: heading
    content: Miverina any Antiôkia any Siria i Paoly sy i Barnabà
  '21':
  - type: text
    content: 'Nitory ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' tao an-tanànan’i Derba ry i Paoly sy i Barnabà ka betsaka ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' azony tao. Dia niverina indray izy roa lahy nankany Listra sy Ikôniôma ary Antiôkia any Pisidia. '
  '22':
  - type: text
    content: 'Nampahery fo ny mpianatra i Paoly sy i Barnabà ary nampirisika azy ireo haharitra amin’ny finoana ka nanao taminy hoe:'
  - type: text
    content: '–Fahoriana be no tsy maintsy diavintsika mba hidirana ao amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '!'
  '23':
  - type: text
    content: 'Isam-Piangonana dia nanendry '
  - type: text
    content: loholona
  - type: text
    content: ' ho an’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' izy roa lahy'
  - type: note
    content: 'nanendry loholona ho an’ny mpianatra izy roa lahy: dkt hafa nasain’izy roa lahy nanendrena loholona ho an’ny mpianatra.'
  - type: text
    content: ', ary nony efa nivavaka sy '
  - type: text
    content: nifady hanina
  - type: text
    content: ' dia nanankina ny iray Fiangonana tamin’ny Tompo Izay efa ninoan’izy rehetra rahateo.'
  '24':
  - type: text
    content: Taorian’izany, dia namakivaky ny faritany Pisidia ry i Paoly sy i Barnabà ka tonga tany Pamfilia
  - type: note
    content: 'Pisidia: jereo 13.14. –Pamfilia: faritanin’i Perga (13.13 sy nta) sy i Atalia (and 25).'
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Nitory ny tenin’Andriamanitra tao Perga izy roa lahy, ary lasa nankany Atalia. '
  '26':
  - type: text
    content: Avy eo no niondranany an-tsambo ho any Antiôkia, dia ilay tanàna nanankinana azy roa lahy tamin’ny fahasoavan’Andriamanitra ho an’izao asa notontosainy izao.
  '27':
  - type: text
    content: 'Nony tonga tao Antiôkia izy roa lahy, dia namory ny Fiangonana, ka nitantara ny zavatra rehetra nampanaovin’Andriamanitra azy ary koa nitantara ny namohan’Andriamanitra varavarana ho an’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' mba hahazoany mino. '
  '28':
  - type: text
    content: Ary elaela ihany no niarahan’i Paoly sy i Barnabà nitoetra tamin’ny mpianatra tao Antiôkia.
  '3':
  - type: text
    content: 'Nijanona elaela tao Ikôniôma i Paoly sy i Barnabà ary niteny tamim-pahasahiana satria ny Tompo no nitokiany. Io Tompo io no manome porofo hahamarina ny teny torîna momba ny fahasoavany ka nampanao azy roa lahy '
  - type: text
    content: famantarana
  - type: text
    content: ' sy zava-mahagaga. '
  '4':
  - type: text
    content: 'Dia nisara-tsaina ny olona marobe tao an-tanàna: tao ireo niandany tamin’ny Jiosy, ary tao ireo niandany tamin’ny '
  - type: text
    content: apôstôly
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Efa nivonombonona terỳ ny mpanompo sampy sy ny Jiosy mbamin’ny lehibeny hanala baràka an’i Paoly sy i Barnabà ary hamono azy amin’ny tora-bato. '
  '6':
  - type: text
    content: 'Vao nahatsikaritra izany izy roa lahy, dia lasa nandositra tany Listra sy Derba, tanàna any Likaônia, ary tany amin’ny faritra manodidina. '
  '7':
  - type: text
    content: 'Dia naharitra nitory ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' tany izy roa lahy.'
  - type: heading
    content: I Paoly sy i Barnabà tao Listra
  '8':
  - type: text
    content: 'Tao Listra dia nisy lehilahy izay nitalapetraka foana satria malemy tongotra, kilemaina hatrany an-kibon-dreniny ka tsy mbola namindra hatrizay niainany. '
  '9':
  - type: text
    content: 'Nihaino an’i Paoly nandaha-teny ralehilahy. Nibanjina azy i Paoly ka nahita fa manam-pinoana ny ho sitrana izy. '
