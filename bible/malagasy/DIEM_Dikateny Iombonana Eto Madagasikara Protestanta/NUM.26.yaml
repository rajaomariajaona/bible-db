document_id: NUM.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanisana faharoa ny fokon’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Taorian’io loza io, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'dia hoy ny TOMPO tamin’i Mosesy ary tamin’i Elehazara mpisorona sady zanakalahin’i Aharôna:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Manaova fanisàm-bahoaka isam-pianakaviana eo amin’ny Fiangonan’i Israely, dia izay lehilahy rehetra roapolo taona no ho miakatra ka mahatam-piadiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireo olona voalazan’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fanisana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny toko 1 dia maty avokoa (jereo 26.64-65).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Teo amin’ny lemak’i Môaba amoron’i Jôrdàna tandrifin’i Jerikao no nitenenan’i Mosesy sy i Elehazara mpisorona tamin’ireo Israelita ka nanambarany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: fa, araka izay nandidian’ny TOMPO an’i Mosesy, dia hanaovana fanisana ny lehilahy rehetra roapolo taona no ho miakatra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireto avy àry ireo Israelita izay niala tany Ejipta:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny taranak’i Reobena, lahimatoan’i Israely, dia nisy ireto tarika ireto: ny Hanôkita avy tamin’i Hanôka; ny Paloita avy tamin’i Palò; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ny Hetsirônita avy tamin’i Hetsirôna; ny Karmita avy tamin’i Karmỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ireo no tarika robenita; ary 43 730 no isan’ny lehilahy mahatam-piadiana tao aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny isa hita eto amin’ny and 7-51, dia jereo Nom 1 naoty d sy e ary f.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny zanakalahin’i Palò anankiray dia i Eliaba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'izay rain’i Nemoela sy i Datàna ary i Abirama. Ireo Datàna sy i Abirama ireo no solotenan’ny Fiangonana izay nanohitra an’i Mosesy sy i Aharôna; niaraka tamin’ny tarik’i Kôra izy roa lahy raha nikomy tamin’ny TOMPO izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nisokatra ny tany ka nitelina azy ireo mbamin’i Kôra, tamin’ny andro nahafatesan’ny tariny sy nandevonan’ny afo lehilahy 250 izay natao ho ohatra ho an’ny vahoaka sisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Kanefa ireo zanakalahin’i Kôra kosa tsy mba maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny taranak’i Simehôna, araka ny tarika tao aminy, dia izao: ny Nemoelita avy tamin’i Nemoela; ny Jaminita avy tamin’i Jamina; ny Jakinita avy tamin’i Jakina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny Tsôharita avy tamin’i Tsôhara; ny Saolita avy tamin’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ireo no tarika simehônita; ka nisy 22 200 ny lehilahy mahatam-piadiana tao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny taranak’i Gada, araka ny tarika tao aminy, dia izao: ny Tsefônita avy tamin’i Tsefôna; ny Hagita avy tamin’i Hagỳ; ny Sonita avy tamin’i Sonỳ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny Oznita avy tamin’i Oznỳ; ny Herîta avy tamin’i Herỳ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny Arôdita avy tamin’i Arôda; ny Arelîta avy tamin’i Arelỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ireo no tarika gadita; ka nisy 40 500 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'Ny taranak’i Joda, araka ny tarika tao aminy, dia: ny Selanita avy tamin’i Sela; ny Peritsita avy tamin’i Peretsa; ny Zerahita avy tamin’i Zerà. Ny taranak’i Peretsa dia nisy fianakaviambe anankiroa: ny Hetsirônita avy tamin’i Hetsirôna ary ny Hamôlita avy tamin’i Hamòla. Ny zanak’i Joda roa lahy, i Hera sy i Ônana, anefa dia maty tany Kanahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ireo no tarika tao amin’ny fokon’i Joda; ka nisy 76 500 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny taranak’i Jisakara, araka ny tarika tao aminy, dia izao: ny Tôlahita avy tamin’i Tôlà; ny Povanîta avy tamin’i Povà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ny Jasobita avy tamin’i Jasoba; ny Simrônita avy tamin’i Simrôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ireo no tarika isakarita; ka nisy 64 300 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny taranak’i Zebolòna, araka ny tarika tao aminy dia izao: ny Seredita avy tamin’i Sereda; ny Elônita avy tamin’i Elôna; ny Jahilielîta avy tamin’i Jahiliela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ireo no tarika zebolonita; ka nisy 60 500 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny taranak’i Jôsefa, araka ny fokony avy, dia ny Manasita sy ny Efraîmita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny fokon’i Manase dia nisy ireto tarika ireto: ny Makirita avy tamin’i Makira; ny Gilehadita avy tamin’i Gilehada zanakalahin’i Makira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny taranak’i Gilehada dia ireto fianakaviana ireto: ny Ihezerîta avy tamin’i Ihezera, ny Helekita avy tamin’i Heleka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ny Asrielita avy tamin’i Asriela, ny Sekemita avy tamin’i Sekema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ny Semidita avy tamin’i Semida, ary ny Heferita avy tamin’i Hefera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I Tselôfahàna zanakalahin’i Hefera, tsy mba nanan-janakalahy, fa zanakavavy ihany ka ireto avy no anarany: i Mahelà, Nôhà, Hôglà, Milkà ary Tiritsà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ireo no tarika manasita; ka nisy 52 700 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny fokon’i Efraîma, araka ny tarika tao aminy, dia izao: ny Sotelahita avy tamin’i Sotelà; ny Bekerita avy tamin’i Bekera; ny Tahanita avy tamin’i Tahàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny fianakaviamben’ny Heranita dia avy tamin’i Heràna, zanakalahin’i Sotelà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ireo no tarika efraimita; ka nisy 32 500 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy. Ireo no taranak’i Jôsefa, araka ny fokony avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ny taranak’i Benjamîna, araka ny tarika tao aminy, dia izao: ny Belahîta avy tamin’i Belà; ny Asbelita avy tamin’i Asbela; ny Ahiramita avy tamin’i Ahirama; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ny Sofamita avy tamin’i Sofama; ary ny Hofamita avy tamin’i Hofama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ny taranak’i Belà dia nisy fianakaviambe anankiroa: ny Ardita, avy tamin’i Arda, ary ny Nahamita avy tamin’i Nahamàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ireo no tarika benjaminita; ka nisy 45 600 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Tarika tokana ihany kosa ny taranak’i Dana, dia ny Sohamita avy tamin’i Sohama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ny tarika sohamita manontolo dia nisy 64 400 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ny taranak’i Asera, araka ny tarika tao aminy, dia izao: ny Jimnita avy tamin’i Jimnà; ny Jisvita avy tamin’i Jisvỳ; ny Berihîta avy tamin’i Berihà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ny fianakaviambe avy tamin’ny taranak’i Berihà dia ny Heberita avy tamin’i Hebera ary ny Malkielita avy tamin’i Malkiela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'I Asera dia nanan-janaka vavy natao hoe Serà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ireo no tarika aserita; ka nisy 53 400 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ny taranak’i Naftalỳ, araka ny tarika tao aminy, dia izao: ny Jahatsielîta avy tamin’i Jahatsiela; ny Gonita avy tamin’i Gonỳ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'ny Jetserîta avy tamin’i Jetsera; ary ny Silemita avy tamin’i Silema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Ireo no tarika naftalita; ka nisy 45 400 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Ny fitambaramben’ny lehilahy israelita mahatam-piadiana dia nahatratra 601 730.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Filazana ankapobeny momba ny fizarana ny tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: '–Hozaraina amin’ireo foko ireo ny tany arakaraka ny isan’ny olona ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ny foko izay maro an’isa dia homenao zaratany lehibe kokoa, fa izay vitsy kosa dia homenao kelikely kokoa; arakaraka ny isany ihany no hanomezanao ny zaratany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Antsapaka anefa no hizaràna ny tany, na dia araka ny habetsahan’ny olona isam-poko, aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Antsapaka izany no hanapahana izay faritra homena ny foko maro an’isa sy ny foko vitsy an’isa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.56 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 52-56:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 33.54; 34.13; Jos 14.1-2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanisana faharoa ny fokon’i Levỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Toy izao no voaisa ho taranak’i Levỳ, araka ny tarika tao aminy: ny Gersônita avy tamin’i Gersôna; ny Kehatita avy tamin’i Kehata; ny Merarita avy tamin’i Merarỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Toy izao ny fianakaviambe levita: ny Libnita sy ny Hebrônita, ny Mahalita sy ny Mosita ary ny Kôrahita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.58 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ireo razambe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Libnỳ, Hebrôna, Mahalỳ, Mosỳ ary Kôra,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Eks 6.17-19, 24.'
    marker-yv: yv-n
  - type: text
    text: '. I Kehata no niteraka an’i Hamrama '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'izay nanambady an’i Jôkebeda zanakavavy naterak’i Levỳ tany Ejipta. Io Jôkebeda io no nanome zanaka telo an’i Hamrama dia i Aharôna sy i Mosesy mirahalahy ary i Miriama anabaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: I Aharôna dia niteraka an’i Nadaba sy i Abihò ary i Elehazara sy i Itamara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.60 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.2; Eks 6.23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Fa i Nadaba sy i Abihò dia maty, fony nandoro vovo-javamanitra tsy sahaza teo anatrehan’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.61 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.4 sy nta; Lev 10.1-7.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Ny fitambaran’ny lehilahy levita rehetra nihoatra ny iray volana dia 23 000. Tsy niara-natao fanisana tamin’ny Israelita izy, satria tsy mba nomena zaratany teo anivon’ny Israelita.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fehin’ny fanisàm-bahoaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ireo no vokatry ny fanisàm-bahoaka nataon’i Mosesy sy i Elehazara mpisorona tamin’ny Israelita tao amin’ny lemak’i Môaba, amoron’i Jôrdàna tandrifin’i Jerikao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Tamin’izy ireo dia tsy nahitana na iray aza tamin’izay efa voaisan’i Mosesy sy i Aharôna mpisorona tamin’ny fanisàm-bahoaka natao tamin’ny Israelita tany an-taniefitr’i Sinay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: satria ny TOMPO efa nilaza fa ho faty any an-taniefitra ireo. Koa tsy nisy niangana tamin’ireo, afa-tsy i Kaleba zanakalahin’i Jefone ary i Josoa zanakalahin’i Nona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.65 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 14.26-38.
    marker-yv: yv-n
  - type: text
    text: .
