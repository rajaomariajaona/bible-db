document_id: NUM.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanisana faharoa ny fokon’i Israely
  - type: text
    content: 'Taorian’io loza io, '
  - type: text
    content: 'dia hoy ny TOMPO tamin’i Mosesy ary tamin’i Elehazara mpisorona sady zanakalahin’i Aharôna:'
  '10':
  - type: text
    content: 'Nisokatra ny tany ka nitelina azy ireo mbamin’i Kôra, tamin’ny andro nahafatesan’ny tariny sy nandevonan’ny afo lehilahy 250 izay natao ho ohatra ho an’ny vahoaka sisa. '
  '11':
  - type: text
    content: Kanefa ireo zanakalahin’i Kôra kosa tsy mba maty.
  '12':
  - type: text
    content: 'Ny taranak’i Simehôna, araka ny tarika tao aminy, dia izao: ny Nemoelita avy tamin’i Nemoela; ny Jaminita avy tamin’i Jamina; ny Jakinita avy tamin’i Jakina; '
  '13':
  - type: text
    content: 'ny Tsôharita avy tamin’i Tsôhara; ny Saolita avy tamin’i Saoly. '
  '14':
  - type: text
    content: Ireo no tarika simehônita; ka nisy 22 200 ny lehilahy mahatam-piadiana tao aminy.
  '15':
  - type: text
    content: 'Ny taranak’i Gada, araka ny tarika tao aminy, dia izao: ny Tsefônita avy tamin’i Tsefôna; ny Hagita avy tamin’i Hagỳ; ny Sonita avy tamin’i Sonỳ; '
  '16':
  - type: text
    content: 'ny Oznita avy tamin’i Oznỳ; ny Herîta avy tamin’i Herỳ; '
  '17':
  - type: text
    content: 'ny Arôdita avy tamin’i Arôda; ny Arelîta avy tamin’i Arelỳ. '
  '18':
  - type: text
    content: Ireo no tarika gadita; ka nisy 40 500 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '19':
  - type: text
    content: 'Ny taranak’i Joda, araka ny tarika tao aminy, dia: ny Selanita avy tamin’i Sela; ny Peritsita avy tamin’i Peretsa; ny Zerahita avy tamin’i Zerà. Ny taranak’i Peretsa dia nisy fianakaviambe anankiroa: ny Hetsirônita avy tamin’i Hetsirôna ary ny Hamôlita avy tamin’i Hamòla. Ny zanak’i Joda roa lahy, i Hera sy i Ônana, anefa dia maty tany Kanahana. '
  '2':
  - type: text
    content: –Manaova fanisàm-bahoaka isam-pianakaviana eo amin’ny Fiangonan’i Israely, dia izay lehilahy rehetra roapolo taona no ho miakatra ka mahatam-piadiana
  - type: note
    content: Ireo olona voalazan’ny fanisana ao amin’ny toko 1 dia maty avokoa (jereo 26.64-65).
  - type: text
    content: .
  '22':
  - type: text
    content: Ireo no tarika tao amin’ny fokon’i Joda; ka nisy 76 500 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '23':
  - type: text
    content: 'Ny taranak’i Jisakara, araka ny tarika tao aminy, dia izao: ny Tôlahita avy tamin’i Tôlà; ny Povanîta avy tamin’i Povà; '
  '24':
  - type: text
    content: 'ny Jasobita avy tamin’i Jasoba; ny Simrônita avy tamin’i Simrôna. '
  '25':
  - type: text
    content: Ireo no tarika isakarita; ka nisy 64 300 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '26':
  - type: text
    content: 'Ny taranak’i Zebolòna, araka ny tarika tao aminy dia izao: ny Seredita avy tamin’i Sereda; ny Elônita avy tamin’i Elôna; ny Jahilielîta avy tamin’i Jahiliela. '
  '27':
  - type: text
    content: Ireo no tarika zebolonita; ka nisy 60 500 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '28':
  - type: text
    content: 'Ny taranak’i Jôsefa, araka ny fokony avy, dia ny Manasita sy ny Efraîmita. '
  '29':
  - type: text
    content: 'Ny fokon’i Manase dia nisy ireto tarika ireto: ny Makirita avy tamin’i Makira; ny Gilehadita avy tamin’i Gilehada zanakalahin’i Makira. '
  '3':
  - type: text
    content: 'Teo amin’ny lemak’i Môaba amoron’i Jôrdàna tandrifin’i Jerikao no nitenenan’i Mosesy sy i Elehazara mpisorona tamin’ireo Israelita ka nanambarany '
  '30':
  - type: text
    content: 'Ny taranak’i Gilehada dia ireto fianakaviana ireto: ny Ihezerîta avy tamin’i Ihezera, ny Helekita avy tamin’i Heleka, '
  '31':
  - type: text
    content: 'ny Asrielita avy tamin’i Asriela, ny Sekemita avy tamin’i Sekema, '
  '32':
  - type: text
    content: 'ny Semidita avy tamin’i Semida, ary ny Heferita avy tamin’i Hefera. '
  '33':
  - type: text
    content: 'I Tselôfahàna zanakalahin’i Hefera, tsy mba nanan-janakalahy, fa zanakavavy ihany ka ireto avy no anarany: i Mahelà, Nôhà, Hôglà, Milkà ary Tiritsà. '
  '34':
  - type: text
    content: Ireo no tarika manasita; ka nisy 52 700 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '35':
  - type: text
    content: 'Ny fokon’i Efraîma, araka ny tarika tao aminy, dia izao: ny Sotelahita avy tamin’i Sotelà; ny Bekerita avy tamin’i Bekera; ny Tahanita avy tamin’i Tahàna. '
  '36':
  - type: text
    content: 'Ny fianakaviamben’ny Heranita dia avy tamin’i Heràna, zanakalahin’i Sotelà. '
  '37':
  - type: text
    content: Ireo no tarika efraimita; ka nisy 32 500 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy. Ireo no taranak’i Jôsefa, araka ny fokony avy.
  '38':
  - type: text
    content: 'Ny taranak’i Benjamîna, araka ny tarika tao aminy, dia izao: ny Belahîta avy tamin’i Belà; ny Asbelita avy tamin’i Asbela; ny Ahiramita avy tamin’i Ahirama; '
  '39':
  - type: text
    content: 'ny Sofamita avy tamin’i Sofama; ary ny Hofamita avy tamin’i Hofama. '
  '4':
  - type: text
    content: fa, araka izay nandidian’ny TOMPO an’i Mosesy, dia hanaovana fanisana ny lehilahy rehetra roapolo taona no ho miakatra.
  - type: text
    content: 'Ireto avy àry ireo Israelita izay niala tany Ejipta:'
  '40':
  - type: text
    content: 'Ny taranak’i Belà dia nisy fianakaviambe anankiroa: ny Ardita, avy tamin’i Arda, ary ny Nahamita avy tamin’i Nahamàna. '
  '41':
  - type: text
    content: Ireo no tarika benjaminita; ka nisy 45 600 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '42':
  - type: text
    content: 'Tarika tokana ihany kosa ny taranak’i Dana, dia ny Sohamita avy tamin’i Sohama. '
  '43':
  - type: text
    content: Ny tarika sohamita manontolo dia nisy 64 400 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '44':
  - type: text
    content: 'Ny taranak’i Asera, araka ny tarika tao aminy, dia izao: ny Jimnita avy tamin’i Jimnà; ny Jisvita avy tamin’i Jisvỳ; ny Berihîta avy tamin’i Berihà. '
  '45':
  - type: text
    content: 'Ny fianakaviambe avy tamin’ny taranak’i Berihà dia ny Heberita avy tamin’i Hebera ary ny Malkielita avy tamin’i Malkiela. '
  '46':
  - type: text
    content: 'I Asera dia nanan-janaka vavy natao hoe Serà. '
  '47':
  - type: text
    content: Ireo no tarika aserita; ka nisy 53 400 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '48':
  - type: text
    content: 'Ny taranak’i Naftalỳ, araka ny tarika tao aminy, dia izao: ny Jahatsielîta avy tamin’i Jahatsiela; ny Gonita avy tamin’i Gonỳ; '
  '49':
  - type: text
    content: 'ny Jetserîta avy tamin’i Jetsera; ary ny Silemita avy tamin’i Silema. '
  '5':
  - type: text
    content: 'Ny taranak’i Reobena, lahimatoan’i Israely, dia nisy ireto tarika ireto: ny Hanôkita avy tamin’i Hanôka; ny Paloita avy tamin’i Palò; '
  '50':
  - type: text
    content: Ireo no tarika naftalita; ka nisy 45 400 ny lehilahy mahatam-piadiana tao aminy, araka ny nanisana azy.
  '51':
  - type: text
    content: Ny fitambaramben’ny lehilahy israelita mahatam-piadiana dia nahatratra 601 730.
  - type: heading
    content: Filazana ankapobeny momba ny fizarana ny tany
  '52':
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '53':
  - type: text
    content: '–Hozaraina amin’ireo foko ireo ny tany arakaraka ny isan’ny olona ao aminy. '
  '54':
  - type: text
    content: 'Ny foko izay maro an’isa dia homenao zaratany lehibe kokoa, fa izay vitsy kosa dia homenao kelikely kokoa; arakaraka ny isany ihany no hanomezanao ny zaratany. '
  '55':
  - type: text
    content: 'Antsapaka anefa no hizaràna ny tany, na dia araka ny habetsahan’ny olona isam-poko, aza. '
  '56':
  - type: text
    content: Antsapaka izany no hanapahana izay faritra homena ny foko maro an’isa sy ny foko vitsy an’isa
  - type: note
    content: 'And 52-56: jereo 33.54; 34.13; Jos 14.1-2.'
  - type: text
    content: .
  - type: heading
    content: Fanisana faharoa ny fokon’i Levỳ
  '57':
  - type: text
    content: 'Toy izao no voaisa ho taranak’i Levỳ, araka ny tarika tao aminy: ny Gersônita avy tamin’i Gersôna; ny Kehatita avy tamin’i Kehata; ny Merarita avy tamin’i Merarỳ. '
  '58':
  - type: text
    content: 'Toy izao ny fianakaviambe levita: ny Libnita sy ny Hebrônita, ny Mahalita sy ny Mosita ary ny Kôrahita'
  - type: note
    content: Momba ireo razambe Libnỳ, Hebrôna, Mahalỳ, Mosỳ ary Kôra, jereo Eks 6.17-19, 24.
  - type: text
    content: '. I Kehata no niteraka an’i Hamrama '
  '59':
  - type: text
    content: 'izay nanambady an’i Jôkebeda zanakavavy naterak’i Levỳ tany Ejipta. Io Jôkebeda io no nanome zanaka telo an’i Hamrama dia i Aharôna sy i Mosesy mirahalahy ary i Miriama anabaviny. '
  '6':
  - type: text
    content: 'ny Hetsirônita avy tamin’i Hetsirôna; ny Karmita avy tamin’i Karmỳ. '
  '60':
  - type: text
    content: I Aharôna dia niteraka an’i Nadaba sy i Abihò ary i Elehazara sy i Itamara
  - type: note
    content: Jereo 3.2; Eks 6.23.
  - type: text
    content: '. '
  '61':
  - type: text
    content: Fa i Nadaba sy i Abihò dia maty, fony nandoro vovo-javamanitra tsy sahaza teo anatrehan’ny TOMPO
  - type: note
    content: Jereo 3.4 sy nta; Lev 10.1-7.
  - type: text
    content: '. '
  '62':
  - type: text
    content: Ny fitambaran’ny lehilahy levita rehetra nihoatra ny iray volana dia 23 000. Tsy niara-natao fanisana tamin’ny Israelita izy, satria tsy mba nomena zaratany teo anivon’ny Israelita.
  - type: heading
    content: Fehin’ny fanisàm-bahoaka
  '63':
  - type: text
    content: 'Ireo no vokatry ny fanisàm-bahoaka nataon’i Mosesy sy i Elehazara mpisorona tamin’ny Israelita tao amin’ny lemak’i Môaba, amoron’i Jôrdàna tandrifin’i Jerikao. '
  '64':
  - type: text
    content: 'Tamin’izy ireo dia tsy nahitana na iray aza tamin’izay efa voaisan’i Mosesy sy i Aharôna mpisorona tamin’ny fanisàm-bahoaka natao tamin’ny Israelita tany an-taniefitr’i Sinay, '
  '65':
  - type: text
    content: satria ny TOMPO efa nilaza fa ho faty any an-taniefitra ireo. Koa tsy nisy niangana tamin’ireo, afa-tsy i Kaleba zanakalahin’i Jefone ary i Josoa zanakalahin’i Nona
  - type: note
    content: Jereo 14.26-38.
  - type: text
    content: .
  '7':
  - type: text
    content: Ireo no tarika robenita; ary 43 730 no isan’ny lehilahy mahatam-piadiana tao aminy
  - type: note
    content: Momba ny isa hita eto amin’ny and 7-51, dia jereo Nom 1 naoty d sy e ary f.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Ny zanakalahin’i Palò anankiray dia i Eliaba, '
  '9':
  - type: text
    content: 'izay rain’i Nemoela sy i Datàna ary i Abirama. Ireo Datàna sy i Abirama ireo no solotenan’ny Fiangonana izay nanohitra an’i Mosesy sy i Aharôna; niaraka tamin’ny tarik’i Kôra izy roa lahy raha nikomy tamin’ny TOMPO izy ireo. '
