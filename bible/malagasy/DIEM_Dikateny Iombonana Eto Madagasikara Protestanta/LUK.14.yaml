document_id: LUK.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay marary manirano
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ', nandroso hisakafo tao an-tranon’izay lohandohan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' izay i Jesoa, ka notsikilovin-dry zareo fatratra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary indro nisy olona anankiray voan’ny aretina manirano teo anoloan’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niteny i Jesoa ka nanao tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' sy Farisianina hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Azo atao ve sa tsia ny manasitrana amin’ny andro sabata?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa tsy niteny tsy nivolana ry zareo. Nokasihin’i Jesoa kosa ilay marary, dia sitrana ary nalefany nody. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Jesoa tamin-dry zareo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa aminareo no manana zanaka na omby sendra latsaka anaty lavaka fantsakana, ka tsy hisintona azy faingana, na dia sabata aza ny andro?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy nanan-kavaly ry zareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Omen’i Jesoa anatra ny nasaina sy ny mpanasa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsikaritr’i Jesoa kosa fa samy nifidy ny toerana voalohandohany ireo olona nasaina. Ka ho azy ireo indrindra no nanaovany ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' ity:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '–Raha asain’olona hisakafo amin’ny fampakaram-bady ianao, dia aza mipetraka amin’ny toerana voalohany. Mety misy manko olona nasaina manan-kaja kokoa noho ianao, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka ny nanasa anareo ihany no ho avy hiteny aminao hoe: «Omeo an’ity olona ity ny toerana misy anao io»; izay ianao vao hangaihay hamonjy ny toerana farany indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha nasaina ianao, ny toerana farany indrindra no vonjeo ipetrahana; ka rehefa avy ilay nanasa anao, dia hiteny aminao hoe: «Mandrosoa etsy alohaloha kokoa, tompoko'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit ny and 8-10 sy Ohab 25.6-7.
    marker-yv: yv-n
  - type: text
    text: '»; izay ianao vao heni-kaja heni-boninahitra amin’ny mpiara-misakafo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa izay rehetra manandra-tena no haetry, ary izay manetry tena no hasandratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avy eo dia ilay nanasa Azy indray no nilazan’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha manasa olona hisakafo antoandro na hisakafo hariva ianao, aza mba ny sakaizanao na ny rahalahinao na ny havanao na ny mpanankarena iray tanàna aminao no asaina, fandrao hasainy koa ianao ka ho voavaliny izay nataonao taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha misy fanasana ataonao, ny mahantra, ny kilemaina, ny mandringa mbamin’ny jamba kosa asaina; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia ho sambatra ianao, satria tsy mba mahavaly ny vitanao ireo. Ary Andriamanitra hamaly soa anao rehefa mby amin’ny fitsanganan’ny olo-marina ho velona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ny fanasambe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 22.1-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nandre izany ny anankiray tamin’ireo mpiara-misakafo teo ka niteny tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sambatra izay handray anjara amin’ilay fanasambe any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nanao fanasambe ity olona anankiray ka maro no nasainy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nony fotoana fisakafoana, dia nirahiny ny mpiasany hilaza amin’ireo nasaina hoe: «Tongava, tompoko, fa efa vonona ny sakafo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efa vonona ny sakafo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: efa vonona ny zavatra rehetra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Mt 22.4).'
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Samy rafitra niala tsiny avokoa anefa izy rehetra. Ka hoy ny voalohany tamin’ilay mpiasa: «Misy saha vao novidiko izay, ka tsy maintsy handeha hijery azy aho; miangavy anao, aoka re mba tsy ho tsiniko!» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy kosa ny faharoa: «Misy omby folo vao novidiko izay, ka handeha hizaha azy aho; miangavy anao, aoka re mba tsy ho tsiniko!» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy indray ny fahatelo: «Vao avy nampaka-bady aho, ka noho izany tsy afaka mankany.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niverina ilay mpiasa ka nanambara izany tamin’ny tompony. Nisafoaka ilay tompom-panasana ka nanao tamin’ilay mpiasa hoe: «Mandehana faingana ianao mankeny amin’ireo kianja sy araben’ny tanàna, ka ampandrosoy atỳ ny mahantra sy ny kilemaina mbamin’ny jamba sy ny mandringa.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tsy ampy toy inona, dia hoy ilay mpiasa hoe: «Vita, tompoko, izay nodidianao hatao, kanefa mbola misy toerana ihany.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy ny tompom-panasana tamin’ilay mpiasany: «Ny lalan-kely sy ny sisim-boly indray àry aleha, ka ataovy izay hidiran’ny olona atỳ mba ho feno ny tranoko!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia ireo nasaina tonga no nitenenan’ny tompom-panasana hoe: Eny, lazaiko aminareo fa tsy hisy hanandrana ny sakafoko ireo olona nasaina voalohany ireo na dia iray aza!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mahafoy ny zava-drehetra izay te hiaraka amin’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 10.37-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nisy vahoaka marobe niara-dia tamin’i Jesoa. Dia nitodika niatrika azy ireo i Jesoa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '–Raha misy manatona Ahy, aoka ho tia Ahy mihoatra noho ny ray aman-dreniny sy ny vady aman-janany mbamin’ny mpiray tampo aminy, ary mihoatra noho ny tenany aza; fa raha tsy izany, tsy afaka ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatro
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay tsy mizaka ny hazofijaliany ary tsy miaraka amiko, dia tsy afaka ho mpianatro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha misy aminareo te hanorina tilikambo, dia hipetraka izy aloha hitetika tsara izay ho lany, hahitany raha misy vola hanefana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sao vita manko ny fototra vao tsy afa-manohy, ka holatsain’ny mpitazana rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'hoe: «Mba nanomboka nanorina rangahy io, nefa tsy nahatody!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary raha misy mpanjaka handeha hanafika mpanjaka hafa, dia hipetraka izy aloha handinika tsara, hahitany raha azony atao amin’ny miaramila iray alina ny hifanandrina amin’ny fahavalony manana miaramila roa alina. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha tsy azony atao manko, dieny mbola lavitra ilay fahavalo, dia handefasany iraka hanao raharaham-pihavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nofaranan’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Dia toy izany koa àry, na iza na iza aminareo tsy mahafoy izay rehetra ananany, dia tsy afaka ho mpianatro!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sira tonga matsatso
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 5.13; Mk 9.50)
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '–Zavatra tsara ny sira; kanefa raha ny sira no tonga matsatso, hatao ahoana indray no hanome hasina azy? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa sady tsy mahasoa tany no tsy mahasoa zezika intsony ka dia ariam-potsiny. Izay manan-tsofina hihainoana, aoka hihaino!
