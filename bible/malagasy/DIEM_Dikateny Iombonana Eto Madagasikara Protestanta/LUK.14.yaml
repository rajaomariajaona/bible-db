document_id: LUK.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitranin’i Jesoa ilay marary manirano
  - type: text
    content: 'Indray '
  - type: text
    content: sabata
  - type: text
    content: ', nandroso hisakafo tao an-tranon’izay lohandohan’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' izay i Jesoa, ka notsikilovin-dry zareo fatratra. '
  '10':
  - type: text
    content: 'Fa raha nasaina ianao, ny toerana farany indrindra no vonjeo ipetrahana; ka rehefa avy ilay nanasa anao, dia hiteny aminao hoe: «Mandrosoa etsy alohaloha kokoa, tompoko'
  - type: note
    content: Ampit ny and 8-10 sy Ohab 25.6-7.
  - type: text
    content: '»; izay ianao vao heni-kaja heni-boninahitra amin’ny mpiara-misakafo rehetra. '
  '11':
  - type: text
    content: Fa izay rehetra manandra-tena no haetry, ary izay manetry tena no hasandratra.
  '12':
  - type: text
    content: 'Avy eo dia ilay nanasa Azy indray no nilazan’i Jesoa hoe:'
  - type: text
    content: '–Raha manasa olona hisakafo antoandro na hisakafo hariva ianao, aza mba ny sakaizanao na ny rahalahinao na ny havanao na ny mpanankarena iray tanàna aminao no asaina, fandrao hasainy koa ianao ka ho voavaliny izay nataonao taminy. '
  '13':
  - type: text
    content: 'Fa raha misy fanasana ataonao, ny mahantra, ny kilemaina, ny mandringa mbamin’ny jamba kosa asaina; '
  '14':
  - type: text
    content: dia ho sambatra ianao, satria tsy mba mahavaly ny vitanao ireo. Ary Andriamanitra hamaly soa anao rehefa mby amin’ny fitsanganan’ny olo-marina ho velona.
  - type: heading
    content: Fanoharana momba ny fanasambe
  - type: heading
    content: (Jereo Mt 22.1-10)
  '15':
  - type: text
    content: 'Nandre izany ny anankiray tamin’ireo mpiara-misakafo teo ka niteny tamin’i Jesoa hoe:'
  - type: text
    content: '–Sambatra izay handray anjara amin’ilay fanasambe any amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '!'
  '16':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Nanao fanasambe ity olona anankiray ka maro no nasainy. '
  '17':
  - type: text
    content: 'Nony fotoana fisakafoana, dia nirahiny ny mpiasany hilaza amin’ireo nasaina hoe: «Tongava, tompoko, fa efa vonona ny sakafo'
  - type: note
    content: 'efa vonona ny sakafo: misy stf sasany ahitana hoe efa vonona ny zavatra rehetra (jereo Mt 22.4).'
  - type: text
    content: '.» '
  '18':
  - type: text
    content: 'Samy rafitra niala tsiny avokoa anefa izy rehetra. Ka hoy ny voalohany tamin’ilay mpiasa: «Misy saha vao novidiko izay, ka tsy maintsy handeha hijery azy aho; miangavy anao, aoka re mba tsy ho tsiniko!» '
  '19':
  - type: text
    content: 'Hoy kosa ny faharoa: «Misy omby folo vao novidiko izay, ka handeha hizaha azy aho; miangavy anao, aoka re mba tsy ho tsiniko!» '
  '2':
  - type: text
    content: 'Ary indro nisy olona anankiray voan’ny aretina manirano teo anoloan’i Jesoa. '
  '20':
  - type: text
    content: 'Ary hoy indray ny fahatelo: «Vao avy nampaka-bady aho, ka noho izany tsy afaka mankany.» '
  '21':
  - type: text
    content: 'Dia niverina ilay mpiasa ka nanambara izany tamin’ny tompony. Nisafoaka ilay tompom-panasana ka nanao tamin’ilay mpiasa hoe: «Mandehana faingana ianao mankeny amin’ireo kianja sy araben’ny tanàna, ka ampandrosoy atỳ ny mahantra sy ny kilemaina mbamin’ny jamba sy ny mandringa.» '
  '22':
  - type: text
    content: 'Tsy ampy toy inona, dia hoy ilay mpiasa hoe: «Vita, tompoko, izay nodidianao hatao, kanefa mbola misy toerana ihany.» '
  '23':
  - type: text
    content: 'Ary hoy ny tompom-panasana tamin’ilay mpiasany: «Ny lalan-kely sy ny sisim-boly indray àry aleha, ka ataovy izay hidiran’ny olona atỳ mba ho feno ny tranoko!»'
  '24':
  - type: text
    content: 'Dia ireo nasaina tonga no nitenenan’ny tompom-panasana hoe: Eny, lazaiko aminareo fa tsy hisy hanandrana ny sakafoko ireo olona nasaina voalohany ireo na dia iray aza!'
  - type: heading
    content: Mahafoy ny zava-drehetra izay te hiaraka amin’i Jesoa
  - type: heading
    content: (Jereo Mt 10.37-38)
  '25':
  - type: text
    content: 'Nisy vahoaka marobe niara-dia tamin’i Jesoa. Dia nitodika niatrika azy ireo i Jesoa ka nanao hoe:'
  '26':
  - type: text
    content: '–Raha misy manatona Ahy, aoka ho tia Ahy mihoatra noho ny ray aman-dreniny sy ny vady aman-janany mbamin’ny mpiray tampo aminy, ary mihoatra noho ny tenany aza; fa raha tsy izany, tsy afaka ho '
  - type: text
    content: mpianatro
  - type: text
    content: '. '
  '27':
  - type: text
    content: Izay tsy mizaka ny hazofijaliany ary tsy miaraka amiko, dia tsy afaka ho mpianatro.
  '28':
  - type: text
    content: 'Raha misy aminareo te hanorina tilikambo, dia hipetraka izy aloha hitetika tsara izay ho lany, hahitany raha misy vola hanefana izany. '
  '29':
  - type: text
    content: 'Sao vita manko ny fototra vao tsy afa-manohy, ka holatsain’ny mpitazana rehetra '
  '3':
  - type: text
    content: 'Dia niteny i Jesoa ka nanao tamin’ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy Farisianina hoe:'
  - type: text
    content: –Azo atao ve sa tsia ny manasitrana amin’ny andro sabata?
  '30':
  - type: text
    content: 'hoe: «Mba nanomboka nanorina rangahy io, nefa tsy nahatody!»'
  '31':
  - type: text
    content: 'Ary raha misy mpanjaka handeha hanafika mpanjaka hafa, dia hipetraka izy aloha handinika tsara, hahitany raha azony atao amin’ny miaramila iray alina ny hifanandrina amin’ny fahavalony manana miaramila roa alina. '
  '32':
  - type: text
    content: Raha tsy azony atao manko, dieny mbola lavitra ilay fahavalo, dia handefasany iraka hanao raharaham-pihavanana.
  '33':
  - type: text
    content: 'Ary nofaranan’i Jesoa hoe:'
  - type: text
    content: –Dia toy izany koa àry, na iza na iza aminareo tsy mahafoy izay rehetra ananany, dia tsy afaka ho mpianatro!
  - type: heading
    content: Ny sira tonga matsatso
  - type: heading
    content: (Jereo Mt 5.13; Mk 9.50)
  '34':
  - type: text
    content: '–Zavatra tsara ny sira; kanefa raha ny sira no tonga matsatso, hatao ahoana indray no hanome hasina azy? '
  '35':
  - type: text
    content: Fa sady tsy mahasoa tany no tsy mahasoa zezika intsony ka dia ariam-potsiny. Izay manan-tsofina hihainoana, aoka hihaino!
  '4':
  - type: text
    content: 'Fa tsy niteny tsy nivolana ry zareo. Nokasihin’i Jesoa kosa ilay marary, dia sitrana ary nalefany nody. '
  '5':
  - type: text
    content: 'Dia hoy i Jesoa tamin-dry zareo:'
  - type: text
    content: –Iza moa aminareo no manana zanaka na omby sendra latsaka anaty lavaka fantsakana, ka tsy hisintona azy faingana, na dia sabata aza ny andro?
  '6':
  - type: text
    content: Fa tsy nanan-kavaly ry zareo.
  - type: heading
    content: Omen’i Jesoa anatra ny nasaina sy ny mpanasa
  '7':
  - type: text
    content: 'Tsikaritr’i Jesoa kosa fa samy nifidy ny toerana voalohandohany ireo olona nasaina. Ka ho azy ireo indrindra no nanaovany ity '
  - type: text
    content: fanoharana
  - type: text
    content: ' ity:'
  '8':
  - type: text
    content: '–Raha asain’olona hisakafo amin’ny fampakaram-bady ianao, dia aza mipetraka amin’ny toerana voalohany. Mety misy manko olona nasaina manan-kaja kokoa noho ianao, '
  '9':
  - type: text
    content: 'ka ny nanasa anareo ihany no ho avy hiteny aminao hoe: «Omeo an’ity olona ity ny toerana misy anao io»; izay ianao vao hangaihay hamonjy ny toerana farany indrindra. '
