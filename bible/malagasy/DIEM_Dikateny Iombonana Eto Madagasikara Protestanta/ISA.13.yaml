document_id: ISA.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiafaràn’i Babilôna
  - type: text
    content: Hafatra momba an’i Babilôna
  - type: note
    content: Ny amin’i Babilôna dia jereo Is 21.1-10; 47.1-15; Jer 50–51; Apôk 17–18.
  - type: text
    content: ' araka ny fahitàn’i Isaià, zanakalahin’i Amôtsa.'
  '10':
  - type: text
    content: Ny kintana eny an-danitra, na ny telonohorefy aza,
  - type: text
    content: dia tsy hampamirapiratra ny fahazavàny intsony;
  - type: text
    content: vao miposaka ny masoandro dia ho maizina,
  - type: text
    content: ary ny volana tsy handefa ny tarany intsony
  - type: note
    content: Ampit Ezek 32.7; Mt 24.29; Mk 13.24-25; Lk 21.25; Apôk 6.12-13; 8.12.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Hoy ny Tompo hoe: «Hirotsaka an-tsehatra Aho'
  - type: text
    content: hamaly ny faharatsian’izao tontolo izao
  - type: text
    content: sy ny heloka vitan’ny olon-dratsy.
  - type: text
    content: Hatsahatro ny fireharehàn’ny mpiavonavona
  - type: text
    content: ary haetriko ny rehaky ny mpanao didy jadona.
  '12':
  - type: text
    content: Hataoko mahalana ny olombelona
  - type: text
    content: ka ho saro-tadiavina noho ny volamena madio,
  - type: text
    content: mahalana ka ho saro-tadiavina
  - type: text
    content: noho ny volamena avy any Ôfira aza
  - type: note
    content: Jereo 1 Mp 9.28 sy nta.
  - type: text
    content: .»
  '13':
  - type: text
    content: Ny lanitra dia hihozongozona
  - type: text
    content: ary ny tany hihovitrovitra eo amin’ny toerany
  - type: text
    content: noho ny fahatezeran’ny TOMPOn’izao rehetra izao,
  - type: text
    content: dia amin’ny andro hirehetan’ny fahavinirany.
  '14':
  - type: text
    content: Amin’izany ny olona ho tahaka ny gazela hazaina
  - type: text
    content: na ho tahaka ny ondry aman’osy tsy misy mpiandry,
  - type: text
    content: ka samy ho lasa any amin’ny fireneny avy
  - type: text
    content: sy handositra any amin’ny taniny avy.
  '15':
  - type: text
    content: Izay rehetra ho hita ao Babilôna
  - type: text
    content: dia ho gorobaky ny tsipîka,
  - type: text
    content: ary izay rehetra ho tratra ao
  - type: text
    content: dia hovonoina amin’ny sabatra.
  '16':
  - type: text
    content: Hotorotoroina eo imasony ny zanany madinika
  - type: text
    content: ary horobaina ny tranony sady hosavihina ny vadiny.
  '17':
  - type: text
    content: 'Hoy ny TOMPO hoe: «Indro hampirisihiko hamely azy'
  - type: text
    content: ny Medianina izay tsy tia volafotsy
  - type: text
    content: sady tsy mankamamy volamena.
  '18':
  - type: text
    content: Haringany amin’ny tsipîkany ny tanora,
  - type: text
    content: tsy hamindrany fo ny zaza vao teraka,
  - type: text
    content: ary tsy hiantrany akory ny ankizy.»
  '19':
  - type: text
    content: I Babilôna, izay ravaky ny fanjakana
  - type: text
    content: sady tabiha sy reharehan’ny Babilônianina,
  - type: text
    content: dia horavàn’Andriamanitra
  - type: text
    content: tahaka an’i Sôdôma sy i Gômôra
  - type: note
    content: Jereo 1.7 sy nta.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Hoy ny TOMPO hoe: «Manangàna faneva'
  - type: text
    content: eo an-tendrombohitra mangadihady.
  - type: text
    content: Ampandreneso amin’ny koka lava ireo mpiady.
  - type: text
    content: Hofahofay tanana izy mba hiditra
  - type: text
    content: amin’ny vavahadin’ny miaramila manolo-tena
  - type: note
    content: Ny vavahadin’ny miaramila manolo-tena dia heverina fa toerana dinganin’ireo miaramila manolo-tena ho mariky ny firotsahany an-tsitrapo (ampit Mpits 5.2,9).
  - type: text
    content: .
  '20':
  - type: text
    content: Tsy honenana intsony i Babilôna
  - type: text
    content: ary tsy hisy mponina mandrakizay.
  - type: text
    content: Tsy hanorin-day ao ny mpifindrafindra lasy
  - type: text
    content: 'ary tsy hampandry ondry ao ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry.'
  '21':
  - type: text
    content: Sakadia no hiorim-ponenana ao
  - type: text
    content: ary vorondolo no hameno ny tranony.
  - type: text
    content: Vorombe no hanao akany ao
  - type: text
    content: ary osidia no hifalihavanja ao
  - type: note
    content: Ampit Is 34.14; Tsef 2.14; Apôk 18.2.
  - type: text
    content: .
  '22':
  - type: text
    content: Ny fosa no hinaonaona ao an-tranobeny,
  - type: text
    content: ary ny amboadia no honina ao an-dapany.
  - type: text
    content: Akaiky ho tonga ny oran’i Babilôna;
  - type: text
    content: ary tsy hisy hataka andro intsony ho azy.
  '3':
  - type: text
    content: Izaho mihitsy no mibaiko ireo voatokana ho Ahy
  - type: text
    content: Izaho koa no niantso ireo mpiady mahery,
  - type: text
    content: dia ireo faly handresy ho voninahitro
  - type: text
    content: mba hanehoana ny fahatezerako.»
  '4':
  - type: text
    content: Henoy izany horakoraka any an-tendrombohitra
  - type: text
    content: fa toy ny feon’ny vahoaka marobe.
  - type: text
    content: Henoy izany fitabatabana
  - type: text
    content: 'ataon’ny fanjakana sy firenena maro tafavory:'
  - type: text
    content: ny TOMPOn’izao rehetra izao
  - type: text
    content: no misafo ny andian-tafika hiady.
  '5':
  - type: text
    content: Tonga avy any an-tany lavitra ireo,
  - type: text
    content: avy any am-paravodilanitra any
  - type: text
    content: 'hoenti-mandrava manontolo io tany io:'
  - type: text
    content: ny TOMPO sy ireo fitaovan’ny fahatezerany izany.
  '6':
  - type: text
    content: Manaova kiakiakam-pisaonana,
  - type: text
    content: satria akaiky ny andron’ny TOMPO;
  - type: text
    content: toy ny loza tsy hay tohaina no firongany
  - type: text
    content: avy amin’Andriamanitra Tsitoha
  - type: note
    content: Jl 1.15.
  - type: text
    content: .
  '7':
  - type: text
    content: Noho izany dia hiraviravy tanana ny besinimaro
  - type: text
    content: ary ho ketraka ny fon’ny olona rehetra.
  '8':
  - type: text
    content: Ho very hevitra tokoa izy
  - type: text
    content: noho ny fanaintainana sy ny fahoriana mahazo azy
  - type: text
    content: ka hiolanolana toy ny vehivavy hiteraka.
  - type: text
    content: Talanjona izy mifampijery
  - type: text
    content: ka mivaloarika ny tarehiny.
  '9':
  - type: text
    content: Indro avy ny andron’ny TOMPO,
  - type: text
    content: andro ombàm-pahatezerana tsy azo ivalozana
  - type: text
    content: sy isehoam-pahavinirana mirehitra,
  - type: text
    content: ka hahatonga izany tany izany ho hay
  - type: text
    content: sady handringanana ny mpanota tsy ho ao intsony.
