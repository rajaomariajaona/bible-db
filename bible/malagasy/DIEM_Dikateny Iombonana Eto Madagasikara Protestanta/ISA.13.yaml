type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiafaràn’i Babilôna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hafatra momba an’i Babilôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny amin’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Babilôna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia jereo Is 21.1-10; 47.1-15; Jer 50–51; Apôk 17–18.
      marker-yv: yv-n
    - type: text
      text: ' araka ny fahitàn’i Isaià, zanakalahin’i Amôtsa.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kintana eny an-danitra, na ny telonohorefy aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hampamirapiratra ny fahazavàny intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vao miposaka ny masoandro dia ho maizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny volana tsy handefa ny tarany intsony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Ezek 32.7; Mt 24.29; Mk 13.24-25; Lk 21.25; Apôk 6.12-13; 8.12.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ny Tompo hoe: «Hirotsaka an-tsehatra Aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamaly ny faharatsian’izao tontolo izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny heloka vitan’ny olon-dratsy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsahatro ny fireharehàn’ny mpiavonavona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haetriko ny rehaky ny mpanao didy jadona.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko mahalana ny olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho saro-tadiavina noho ny volamena madio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahalana ka ho saro-tadiavina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny volamena avy any Ôfira aza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 9.28 sy nta.
      marker-yv: yv-n
    - type: text
      text: .»
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lanitra dia hihozongozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany hihovitrovitra eo amin’ny toerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahatezeran’ny TOMPOn’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny andro hirehetan’ny fahavinirany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany ny olona ho tahaka ny gazela hazaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho tahaka ny ondry aman’osy tsy misy mpiandry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy ho lasa any amin’ny fireneny avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy handositra any amin’ny taniny avy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra ho hita ao Babilôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho gorobaky ny tsipîka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay rehetra ho tratra ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hovonoina amin’ny sabatra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotorotoroina eo imasony ny zanany madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horobaina ny tranony sady hosavihina ny vadiny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ny TOMPO hoe: «Indro hampirisihiko hamely azy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny Medianina izay tsy tia volafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mankamamy volamena.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haringany amin’ny tsipîkany ny tanora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hamindrany fo ny zaza vao teraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hiantrany akory ny ankizy.»
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Babilôna, izay ravaky ny fanjakana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tabiha sy reharehan’ny Babilônianina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia horavàn’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka an’i Sôdôma sy i Gômôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.7 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ny TOMPO hoe: «Manangàna faneva'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo an-tendrombohitra mangadihady.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampandreneso amin’ny koka lava ireo mpiady.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofahofay tanana izy mba hiditra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny vavahadin’ny miaramila manolo-tena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny vavahadin’ny miaramila manolo-tena '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia heverina fa toerana dinganin’ireo miaramila manolo-tena ho mariky ny firotsahany an-tsitrapo (ampit Mpits 5.2,9).
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy honenana intsony i Babilôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy mponina mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hanorin-day ao ny mpifindrafindra lasy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary tsy hampandry ondry ao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ' ondry.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sakadia no hiorim-ponenana ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vorondolo no hameno ny tranony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vorombe no hanao akany ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary osidia no hifalihavanja ao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 34.14; Tsef 2.14; Apôk 18.2.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fosa no hinaonaona ao an-tranobeny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny amboadia no honina ao an-dapany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akaiky ho tonga ny oran’i Babilôna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy hataka andro intsony ho azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho mihitsy no mibaiko ireo voatokana ho Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho koa no niantso ireo mpiady mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo faly handresy ho voninahitro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanehoana ny fahatezerako.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy izany horakoraka any an-tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa toy ny feon’ny vahoaka marobe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy izany fitabatabana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ataon’ny fanjakana sy firenena maro tafavory:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPOn’izao rehetra izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no misafo ny andian-tafika hiady.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga avy any an-tany lavitra ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any am-paravodilanitra any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hoenti-mandrava manontolo io tany io:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO sy ireo fitaovan’ny fahatezerany izany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova kiakiakam-pisaonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria akaiky ny andron’ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny loza tsy hay tohaina no firongany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’Andriamanitra Tsitoha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jl 1.15.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia hiraviravy tanana ny besinimaro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho ketraka ny fon’ny olona rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho very hevitra tokoa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fanaintainana sy ny fahoriana mahazo azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiolanolana toy ny vehivavy hiteraka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Talanjona izy mifampijery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mivaloarika ny tarehiny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro avy ny andron’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andro ombàm-pahatezerana tsy azo ivalozana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy isehoam-pahavinirana mirehitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahatonga izany tany izany ho hay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady handringanana ny mpanota tsy ho ao intsony.
