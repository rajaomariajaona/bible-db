document_id: PSA.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaka manoloana ny loza mitatao
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: TOMPO ô, miantso vonjy aminao aho.
  - type: text
    content: Ianao no Vatolampy fialofako
  - type: text
    content: ka aza manentsin-tadîny amiko;
  - type: text
    content: satria raha anginanao tsy valiana aho,
  - type: text
    content: dia ho tahaka an’ireo olona afaka aina
  - type: text
    content: izay efa midina mankany am-pasana.
  '2':
  - type: text
    content: Koa henoy àry izany fitalahoako,
  - type: text
    content: rehefa miantso vonjy aminao aho
  - type: text
    content: ka manandra-tanana
  - type: note
    content: 'manandra-tanana: Hez 9.5; Ne 9.6; jereo Sal 63.5; 134,2; 1 Mp 8.22; Is 1.15; 1Tim 2.8 sns.'
  - type: text
    content: ' hivavaka'
  - type: text
    content: 'mitodika amin’ny '
  - type: text
    content: Toeramasinao
  - type: text
    content: .
  '3':
  - type: text
    content: Aoka aho tsy hailikao tahaka ny olon-dratsy,
  - type: text
    content: dia ireo olona efa zatra manao heloka;
  - type: text
    content: fihavanana no resahiny amin’ny namany,
  - type: text
    content: kanjo fandozàna no mameno ny fony.
  '4':
  - type: text
    content: Valio araka ny asany tokoa ireny
  - type: text
    content: sy araka ny haratsian’izay nataony;
  - type: text
    content: eny, valio araka izay zava-bitany izy
  - type: text
    content: ka ny nataony no atsingereno aminy
  - type: note
    content: Jereo Apôk 22.12.
  - type: text
    content: .
  '5':
  - type: text
    content: Tsy nahoany ny asan’ny TOMPO
  - type: text
    content: mbamin’izay zavatra vitany.
  - type: text
    content: Koa horavan’ny Tompo anie ireo
  - type: text
    content: ary tsy havelany hijoro intsony!
  '6':
  - type: text
    content: Hisaorana anie ny TOMPO
  - type: text
    content: fa nohenoiny ny fitalahoako!
  '7':
  - type: text
    content: Miaro ahy IZY satria ampingako,
  - type: text
    content: ary nitokian’ny foko tokoa;
  - type: text
    content: voavonjy aho ka mientan-karavoana,
  - type: text
    content: ary dia mihira fiderana Azy.
  '8':
  - type: text
    content: Ny TOMPO no miaro ny vahoakany;
  - type: text
    content: Izy koa no manda famonjena
  - type: text
    content: ho an’ilay mpanjaka nohosorany.
  '9':
  - type: text
    content: Tompo ô, mba vonjeo sy tahio
  - type: text
    content: ity vahoakanao sady lovanao;
  - type: text
    content: 'ka meteza re Ianao ho '
  - type: text
    content: mpiandry
  - type: text
    content: ' azy'
  - type: text
    content: sy ho mpitandrina azy mandrakizay.
