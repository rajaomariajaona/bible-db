  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiaiky izay nataonao ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa toy ny ramevavavy mihazakazaka etsy sy eroa.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Toy ny borikivavidia zatra any an-taniefitra ianao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miandry lahy izy ka manimbolo rivotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady maimay erỳ ka tsy misy mahasakana azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy sahirana akory ireo lahy rehetra mitady azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahita azy amin’ny volana mahamaimay azy!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: «Atsaharo ny hazakazakao
