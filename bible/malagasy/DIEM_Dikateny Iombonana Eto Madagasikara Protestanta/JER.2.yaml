      text: 'fa hamaly anareo kosa Aho hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nankaiza ireo andriamanitrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nataonareo ho anareo?»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy hamonjy anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha afaka manao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny androm-pahorianareo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa maro tahaka ny isan’ny tanànanareo
  - type: usfm
    marker: q1
    children:
