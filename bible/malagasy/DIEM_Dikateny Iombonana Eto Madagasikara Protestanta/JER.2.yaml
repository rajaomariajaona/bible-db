  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa ny tapa-kazo itenenanareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao no raiko»;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny sarivongam-bato ilazanareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao no niteraka ahy».
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tokony hijery manatrika Ahy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa ny lamosina no atodikareo amiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saingy nony tra-pahoriana ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hiantso vonjy amiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Midira an-tsehatra ianao hamonjy anay»;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
