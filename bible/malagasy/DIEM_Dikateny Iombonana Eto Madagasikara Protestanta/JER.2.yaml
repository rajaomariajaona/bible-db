  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa ho maina ny tendanao.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nefa hoy ny navalinao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy mampiraika ahy izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tiako ny andriamani-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
