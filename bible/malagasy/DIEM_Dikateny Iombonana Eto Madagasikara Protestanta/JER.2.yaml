      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny lohasahan’i Hinôma ao atsimon’i Jerosalema no lazain’i Jeremià an-kolaka eto. Momba ireo fombafomba fanompoan-tsampy natao tao, jereo Jer 7.31-32; 32.35; 2 Mp 23.10 sy nta.
      marker-yv: yv-n
    - type: text
