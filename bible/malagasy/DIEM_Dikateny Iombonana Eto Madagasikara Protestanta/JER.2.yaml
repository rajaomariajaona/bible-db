document_id: JER.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Israely, vahoaka mpivadika
  - type: text
    content: 'Nisy tenin’ny TOMPO tamiko nanao hoe:'
  '10':
  - type: text
    content: Fa mba mandehana ange miampita
  - type: text
    content: any amin’ny nosy Kitima ka zahao,
  - type: text
    content: mba maniraha olona hanadihady
  - type: text
    content: any amin’ny Arabo ao Kedara
  - type: note
    content: 'ny nosy Kitima na ireo nosy Grika. –Kedara: any avaratry ny taniefitr’i Arabia, izany hoe any atsinanan’i Palestinina, mifanohitra amin’ny mankany amin’ireo nosy grika.'
  - type: text
    content: ','
  - type: text
    content: raha mahita toe-javatra tahaka izao any e!
  '11':
  - type: text
    content: Moa ve nisy firenena
  - type: text
    content: efa nanova ny andriamaniny,
  - type: text
    content: nefa tsy andriamanitra akory ireny!
  - type: text
    content: Fa ny vahoakako kosa efa nanakalo ny voninahiny
  - type: text
    content: tamin’ireo andriamanitra tsy mahasoa akory.
  '12':
  - type: text
    content: Koa aoka ho gaga ianareo any an-danitra
  - type: text
    content: ka samia raiki-tahotra sy mangorohoro;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
  '13':
  - type: text
    content: Faharatsiana roa sosona
  - type: text
    content: 'no nataon’ny vahoakako:'
  - type: text
    content: fa sady nahafoy Ahy loharano velona izy
  - type: text
    content: no nihady lava-drano ho azy,
  - type: text
    content: kanjo lava-drano mitriatra ireny
  - type: text
    content: ka tsy nahatan-drano.
  - type: heading
    content: Mangidy tokoa ny fandaozana ny Tompo
  '14':
  - type: text
    content: Mpanompo ve i Israely ankehitriny?
  - type: text
    content: Moa nateraka ho andevo ve izy?
  - type: text
    content: Tsia, koa nahoana izy
  - type: text
    content: no ho rembin’ny firenen-kafa?
  '15':
  - type: text
    content: Tahaka ny fieron’ny biby masiaka
  - type: text
    content: no fandrahonan’ireo azy;
  - type: text
    content: ka nahatonga ny taniny ho lao
  - type: text
    content: sy nandorana ny tanànany ho tsy azo onenana.
  '16':
  - type: text
    content: Na dia ny mponina tao Memfisa
  - type: text
    content: sy tao Tahapanehesa aza
  - type: text
    content: mba nanety ny lohanao hangadihady
  - type: note
    content: 'Tahapanehesa, Memfisa: tanàn-dehibe ejiptianina tany avaratr’i Ejipta. Memfisa no renivohitr’i Ejipta ambany tany aloha, ka tokony 20 km ao atsimon’i Kera ankehitriny. –hanety ny lohany hangadihady: fomba fampijaliana atao amin’ny babo an’ady (jereo Is 7.20).'
  - type: text
    content: ', ry Israely.'
  '17':
  - type: text
    content: Ny nahatonga izany taminao ve
  - type: text
    content: tsy noho ny nandaozanao
  - type: text
    content: ny TOMPO Andriamanitrao
  - type: text
    content: tamin’ny andro nitantanany anao
  - type: text
    content: teny an-dalana?
  '18':
  - type: text
    content: Ankehitriny, inona no soa ho anao
  - type: text
    content: amin’ny fankanesana any Ejipta?
  - type: text
    content: Hisotro ny ranon’i Neily ve?
  - type: text
    content: Ary inona no soa ho anao
  - type: text
    content: amin’ny fankanesana any Asiria?
  - type: text
    content: Hisotro ny ranon’i Eofrata ve?
  '19':
  - type: text
    content: Aoka ho voasazy ianao noho ny ratsy nataonao
  - type: text
    content: ary hofaizina noho ny fivadihanao!
  - type: text
    content: Ho fantatrao amin’izay fa mangidy sy ratsy
  - type: text
    content: ny nandaozanao Ahy TOMPO Andriamanitrao
  - type: text
    content: sy ny tsy anajanao Ahy intsony,
  - type: text
    content: hoy ny teny hentitry ny Tompo,
  - type: text
    content: ANDRIAMANITR’izao rehetra izao.
  - type: heading
    content: I Israely, vehivavy tsy mahatombin-tsiraka sy tsy mahatoky
  '2':
  - type: text
    content: '«Ndeha ataovy antso avo ao Jerosalema fa izao no lazaiko:'
  - type: text
    content: «Tsaroako ny toetranao fahiny, ry Israely.
  - type: text
    content: Endrey izany fifikiranao tamiko
  - type: text
    content: fony ianao mbola tanora!
  - type: text
    content: Endrey izany fitiavanao Ahy
  - type: text
    content: fony ianao mbola fofombadiko
  - type: note
    content: 'fofombadiko: amin’ity and ity, tahaka izay ao amin’ny 2.20-25 ary matetika amin’ny perikopa hafa, ny vahoakan’i Israely dia nomena endrik’olona zatovovavy iray na vehivavy herotrerony iray.'
  - type: text
    content: '!'
  - type: text
    content: Nanaraka Ahy hatrany an-taniefitra ianao,
  - type: text
    content: tany amin’ny faritany tsy nisy zava-maniry.
  '20':
  - type: text
    content: Hatramin’ny ela no efa nanapahanao ny zioganao
  - type: text
    content: ary namahanao ny fatoranao tamiko
  - type: text
    content: 'ka nilazanao hoe: «Tsy hanompo intsony aho».'
  - type: text
    content: Kinanjo teny amin’ny havoana rehetra
  - type: text
    content: sy teny am-pototry ny hazo maitso rehetra teny
  - type: text
    content: no nitsilailay toy ny vehivavy mpivaro-tena
  - type: note
    content: Ny fivarotan-tena masina no toetra mampiavaka ny fivavahana kanahanita; amin’izany fanao izany no nanantenàna ahazoan’ny fianakaviana sy ny biby fiompy fananahana ary ahazoan’ny saha fahavokarana. Io no antony nilazan’ny mpaminany ny fivadihan’i Israely tamin’ilay Andriamaniny ho fivarotan-tena. Jereo ohatra Jer 3.1; 5.7; 13.27 ets; Hos 4.13-14; jereo Jer 3.8 sy nta.
  - type: text
    content: ' ianao.'
  '21':
  - type: text
    content: Izaho anefa no namboly anao
  - type: text
    content: tahaka ny voaloboka tsara,
  - type: text
    content: dia rantsana tsara tokoa.
  - type: text
    content: Koa nahoana àry ianao
  - type: text
    content: no niova ho sampany ratsy
  - type: text
    content: sy tonga voaloboka hafa?
  '22':
  - type: text
    content: Na dia misasa ny tenanao
  - type: text
    content: toy ny fanasa lamba aza ianao
  - type: text
    content: ka hampiasa savony betsaka,
  - type: text
    content: dia tsy ho afaka ny fahadisoanao
  - type: text
    content: fa ho toy ny tseroka eo anatrehako,
  - type: text
    content: hoy ny teny hentitry ny Tompo ANDRIANANAHARY.
  '23':
  - type: text
    content: 'Ahoana no ahasahianao nilaza hoe:'
  - type: text
    content: '«Tsy '
  - type: text
    content: nandoto
  - type: text
    content: ' tena aho,'
  - type: text
    content: 'tsy nanaraka ny fivavahana tamin’i '
  - type: text
    content: Bahala
  - type: text
    content: ?»
  - type: text
    content: Jereo ange izay nataonao tao an-tsaha
  - type: note
    content: Ny lohasahan’i Hinôma ao atsimon’i Jerosalema no lazain’i Jeremià an-kolaka eto. Momba ireo fombafomba fanompoan-tsampy natao tao, jereo Jer 7.31-32; 32.35; 2 Mp 23.10 sy nta.
  - type: text
    content: ' e!'
  - type: text
    content: Aoka hiaiky izay nataonao ianao,
  - type: text
    content: fa toy ny ramevavavy mihazakazaka etsy sy eroa.
  '24':
  - type: text
    content: 'Toy ny borikivavidia zatra any an-taniefitra ianao:'
  - type: text
    content: Miandry lahy izy ka manimbolo rivotra,
  - type: text
    content: sady maimay erỳ ka tsy misy mahasakana azy.
  - type: text
    content: Tsy sahirana akory ireo lahy rehetra mitady azy,
  - type: text
    content: fa mahita azy amin’ny volana mahamaimay azy!
  '25':
  - type: text
    content: «Atsaharo ny hazakazakao
  - type: note
    content: Ny hazakazaka mankany amin’ny sampy ka analavirana ny Tompo izany.
  - type: text
    content: ', ry Israely,'
  - type: text
    content: fandrao haradratra ny tongotrao tsy mikapa
  - type: text
    content: ary koa ho maina ny tendanao.»
  - type: text
    content: 'Nefa hoy ny navalinao hoe:'
  - type: text
    content: «Tsy mampiraika ahy izany,
  - type: text
    content: fa tiako ny andriamani-kafa
  - type: text
    content: ka tsy maintsy miaraka aminy aho.»
  '26':
  - type: text
    content: Indray andro any anefa ianareo, ry mponin’i Israely
  - type: text
    content: na ianareo sarambabem-bahoaka,
  - type: text
    content: na ianareo mpanjaka sy mpitondra,
  - type: text
    content: 'na ianareo '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy '
  - type: text
    content: mpaminany
  - type: text
    content: ','
  - type: text
    content: dia samy ho menatra toy ny mpangalatra tra-tehaka.
  '27':
  - type: text
    content: 'Fa ny tapa-kazo itenenanareo hoe:'
  - type: text
    content: «Ianao no raiko»;
  - type: text
    content: 'ary ny sarivongam-bato ilazanareo hoe:'
  - type: text
    content: «Ianao no niteraka ahy».
  - type: text
    content: Tokony hijery manatrika Ahy ianareo,
  - type: text
    content: kanefa ny lamosina no atodikareo amiko.
  - type: text
    content: Saingy nony tra-pahoriana ianareo,
  - type: text
    content: 'dia hiantso vonjy amiko hoe:'
  - type: text
    content: «Midira an-tsehatra ianao hamonjy anay»;
  '28':
  - type: text
    content: 'fa hamaly anareo kosa Aho hoe:'
  - type: text
    content: «Nankaiza ireo andriamanitrareo
  - type: text
    content: izay nataonareo ho anareo?»
  - type: text
    content: Aoka izy hamonjy anareo
  - type: text
    content: raha afaka manao izany
  - type: text
    content: amin’ny androm-pahorianareo!
  - type: text
    content: Fa maro tahaka ny isan’ny tanànanareo
  - type: text
    content: no isan’ny sampinareo, ry mponin’i Joda.
  - type: heading
    content: '*'
  '29':
  - type: text
    content: Nahoana no mifandahatra amiko ianareo,
  - type: text
    content: hoy ny teny hentitry ny TOMPO,
  - type: text
    content: kanefa ianareo rehetra no nivadika tamiko?
  '3':
  - type: text
    content: Voatokana ho AHY irery ianao tamin’izay, ry Israely,
  - type: text
    content: toy ireo voaloham-bokatry ny tany.
  - type: text
    content: Izay rehetra nikasika anao
  - type: text
    content: dia nahita raharaha tamiko,
  - type: text
    content: ka niharan-doza avy hatrany.
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.
  '30':
  - type: text
    content: Nikapoka anareo toy ny zanako Aho,
  - type: text
    content: fa tsy nahoanareo akory izany;
  - type: text
    content: tsy zaka nanarina ianareo.
  - type: text
    content: Tahaka ny liona namiravira
  - type: text
    content: no namonoanareo ny mpaminany
  - type: text
    content: ho fatin’ny sabatrareo.
  '31':
  - type: text
    content: Aoka hodinihinareo ny tenin’ny TOMPO
  - type: text
    content: ry taranaka ankehitriny
  - type: note
    content: Toa teny natsofoka ho fampitandremana ny mpamaky no eto, tahaka izay hita ao amin’ny Mk 13.14 ohatra.
  - type: text
    content: '!'
  - type: text
    content: Moa ve efa nanjary mahatahotra toy ny taniefitra
  - type: text
    content: na toy ny tany ao anaty haizina Aho, ry Israely?
  - type: text
    content: 'Ry vahoakako, nahoana no ilazanareo hoe:'
  - type: text
    content: «Efa afaka izahay ka tsy hiverina aminao intsony?»
  '32':
  - type: text
    content: Moa manadino ny firàvany ve ny virijiny?
  - type: text
    content: sa manadino ny etrany voarandrana
  - type: note
    content: 'etrany voarandrana: ampit Is 3.20.'
  - type: text
    content: ' ve ny ampakarina?'
  - type: text
    content: Tsia, nefa ianareo vahoakako efa nanadino Ahy
  - type: text
    content: hatramin’ny andro maro tsy voaisa.
  - type: heading
    content: '*'
  '33':
  - type: text
    content: Endrey izany tetikao hitady fitia,
  - type: text
    content: hany ka nihazatra nanao heloka ianao!
  '34':
  - type: text
    content: Hatramin’ny fitafianao avy no nahitana
  - type: text
    content: ny ran’ny mahantra tsy manan-tsiny.
  - type: text
    content: Tsy nahatratra azy nanapitsoka
  - type: text
    content: ny varavaranao
  - type: note
    content: Momba ny famonoana ireo mpangalatra tra-tehaka eo am-pangalarana, jereo Eks 22.1.
  - type: text
    content: ' akory ianao!'
  - type: text
    content: Nefa na eo aza izany rehetra izany,
  '35':
  - type: text
    content: dia mihambo ho tsy manan-tsiny ianao,
  - type: text
    content: ary tsy ara-drariny ny itezerako anao.
  - type: text
    content: Koa noho ianao milaza ho tsy manao ratsy,
  - type: text
    content: dia hanenjika anao amin’ny fitsarana Aho.
  - type: heading
    content: '*'
  '36':
  - type: text
    content: Ahoana no nanovanao faingana ny tetikao?
  - type: text
    content: Kanefa ho diso fanantenana amin’i Ejipta ianao
  - type: text
    content: tahaka ny nahazo anao tamin’i Asiria.
  '37':
  - type: text
    content: Dia hialanao amin-kenatra koa i Ejipta
  - type: text
    content: ka hanaron-tava amin’ny tanana ianao;
  - type: text
    content: satria Izaho TOMPO tsy manaiky
  - type: text
    content: ny hitadiavanao io karazam-panampiana io,
  - type: text
    content: fa tsy hanambina anao izany.
  '4':
  - type: text
    content: Ry taranak’i Jakôba
  - type: text
    content: sy ry fokon’i Israely rehetra,
  - type: text
    content: henoy ny tenin’ny TOMPO
  '5':
  - type: text
    content: 'fa izao no lazainy aminareo:'
  - type: text
    content: Inona moa no hadisoana
  - type: text
    content: hitan’ny razanareo tamiko
  - type: text
    content: no dia nanalavitra Ahy TOMPO izy?
  - type: text
    content: Nandeha nanaraka zava-poana izy
  - type: text
    content: ka dia tonga zava-poana koa!
  '6':
  - type: text
    content: 'Tsy nanontany tena akory izy hoe:'
  - type: text
    content: Mba aiza àry izao ny TOMPO
  - type: text
    content: izay nitondra antsika niala tany Ejipta
  - type: text
    content: sy nitarika antsika namakivaky ny taniefitra,
  - type: text
    content: faritany karankaina sy be hantsana,
  - type: text
    content: tany mangentana sy mampahatahotra
  - type: text
    content: fa tsy andalovan’olona sady tsy misy mponina?
  '7':
  - type: text
    content: Izaho no nampiditra anareo
  - type: text
    content: ho ao amin’ny tany lonaka
  - type: text
    content: mba hihinananareo ny vokatra tsara avy aminy;
  - type: text
    content: kanjo rehefa tafiditra tao ianareo
  - type: text
    content: 'dia '
  - type: text
    content: nolotoinareo
  - type: text
    content: ' ny taniko'
  - type: text
    content: ary ny fananako nametrahanareo zava-maharikoriko.
  '8':
  - type: text
    content: 'Tsy nanontany akory ny mpisorona hoe:'
  - type: text
    content: «Mba aiza àry izao ny TOMPO?»
  - type: text
    content: 'Ny mpahay '
  - type: text
    content: lalàna
  - type: text
    content: ' kosa tsy nahalala Ahy,'
  - type: text
    content: ireo mpitarika nikomy tamiko,
  - type: text
    content: 'ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' niteny tamin’ny anaran’i '
  - type: text
    content: Bahala
  - type: text
    content: ','
  - type: text
    content: ary izy rehetra samy nifikitra
  - type: text
    content: tamin’ny andriamani-tsiizy sady tsy mahasoa.
  '9':
  - type: text
    content: Noho izany dia hifandahatra
  - type: text
    content: hiady aminareo Aho,
  - type: text
    content: ary hatrany amin’ny zafinareo no hiadiako;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
