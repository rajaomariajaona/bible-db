  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Ndeha ataovy antso avo ao Jerosalema fa izao no lazaiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsaroako ny toetranao fahiny, ry Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey izany fifikiranao tamiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony ianao mbola tanora!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey izany fitiavanao Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony ianao mbola fofombadiko
    - type: usfm
      marker: f
