  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nitsilailay toy ny vehivavy mpivaro-tena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fivarotan-tena masina no toetra mampiavaka ny fivavahana kanahanita; amin’izany fanao izany no nanantenàna ahazoan’ny fianakaviana sy ny biby fiompy fananahana ary ahazoan’ny saha fahavokarana. Io no antony nilazan’ny mpaminany ny fivadihan’i Israely tamin’ilay Andriamaniny ho fivarotan-tena. Jereo ohatra Jer 3.1; 5.7; 13.27 ets; Hos 4.13-14; jereo Jer 3.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ianao.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izaho anefa no namboly anao
  - type: usfm
