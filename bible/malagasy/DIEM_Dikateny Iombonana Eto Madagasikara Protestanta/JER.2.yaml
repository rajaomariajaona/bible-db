      children:
      - type: text
        text: '14'
    - type: text
      text: Mpanompo ve i Israely ankehitriny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa nateraka ho andevo ve izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, koa nahoana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho rembin’ny firenen-kafa?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tahaka ny fieron’ny biby masiaka
