        - type: text
          text: '2.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fofombadiko: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: amin’ity and ity, tahaka izay ao amin’ny 2.20-25 ary matetika amin’ny perikopa hafa, ny vahoakan’i Israely dia nomena endrik’olona zatovovavy iray na vehivavy herotrerony iray.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanaraka Ahy hatrany an-taniefitra ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tany amin’ny faritany tsy nisy zava-maniry.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hatramin’ny ela no efa nanapahanao ny zioganao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary namahanao ny fatoranao tamiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka nilazanao hoe: «Tsy hanompo intsony aho».'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kinanjo teny amin’ny havoana rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
