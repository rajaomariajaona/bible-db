  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny nandaozanao Ahy TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tsy anajanao Ahy intsony,
  - type: usfm
