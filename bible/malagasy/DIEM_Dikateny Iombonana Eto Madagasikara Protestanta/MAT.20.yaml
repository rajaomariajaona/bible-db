document_id: MAT.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’ny lanitra
    - type: text
      text: ' dia tahaka ny amin’ity lehilahy anankiray tompona tanimboaloboka. Niainga vao maraina be ralehilahy hanakarama mpiasa ho any an-tanimboalobony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga kosa ireo nilatsaka voalohany ary nanampo handray bebe kokoa, kanjo denàry anankiray avy ihany koa no voarainy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo am-pandraisana izany, dia nimonomonona tamin’ny tompon’ilay tanimboaloboka ireto mpiasa ireto '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nanao hoe: «Ireo nilatsaka farany ireo dia ora iray monja no niasany, kanefa nampitovînao karama aminay nisasatra nandritra ny andro sady niaritra ny hafanana.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’ilay tompon’ny tanimboaloboka ny anankiray tamin’ireo ka nilazany hoe: «Ry sakaiza, tsy manao zavatra tsy an-drariny aminao aho. Moa tsy denàry anankiray ve no nifanekenao tamiko? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raiso ny anao, dia mandehana; fa ilay nilatsaka farany dia tiako homena toraka ny anao koa. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy azoko anaovana izay tiako ve ny fananako? Sa mialona ianao satria mazava fo aho?»
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nofaranan’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Dia toy izany, ny farany ho voalohany ary ny voalohany ho farany!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa fanintelony ny hahafatesany sy ny hitsanganany ho velona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 10.32-34; Lk 18.31-34)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’i Jesoa niakatra ho any Jerosalema dia nalainy nitokana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' 12 lahy ka teny am-pandehanana no nilazany hoe:'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Indro miakatra ho any Jerosalema isika. Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' dia hatolotra an’ireo lohandoha-mpisorona sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' ka hohelohiny ho faty; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ry zareo kosa hanolotra Azy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' mba hoesoiny sy hokapohiny ary hohomboany amin’ny hazofijaliana. Kanefa hitsangana velona Izy amin’ny andro fahatelo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fangatahana nataon’ny renin-dry i Jakôba sy i Jôhany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 10.35-45)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka rehefa nifanekeny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denàry
    - type: text
      text: ' anankiray avy isan’andro ireo mpiasa, dia nirahiny hiasa any an-tanimboalobony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia nanatona an’i Jesoa ny vadin’i Zebedeo mbamin’ireo zanany lahy. Sady niankohoka nanoloana Azy ravehivavy no nangata-javatra taminy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Jesoa tamin-dravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no irînao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Omeo teny ireto zanako roa lahy ireto fa hipetraka eo ankavananao ny anankiray ary eo ankavianao ny anankiray, rehefa tonga mpanjaka Ianao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy fantatrareo mirahalahy izay angatahinareo; vitanareo ve ny hiaritra fijaliana tahaka ny hiaretako?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’izy mirahalahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Vitanay!
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa tamin’izy roa lahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny fijaliana hiaretako, dia hiaretanareo tokoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Novonoina martiora nalatsa-dra i Jakôba tamin’ny taona 44 eo ho eo tao Jerosalema (Asa 12.2); i Jôhany kosa dia tsy maty martiora nalatsa-dra, saingy nianjadian’ny fanenjehana isan-karazany.
      marker-yv: yv-n
    - type: text
      text: ; fa izany hoe hipetraka eo ankavanako sy eo ankaviako izany kosa dia tsy miankina amiko, fa ho an’izay nanomanan’ny Raiko azy!
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nandre izany izy folo lahy, dia tezitra tamin’i Jakôba sy i Jôhany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nantsoin’i Jesoa izy rehetra ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatrareo fa, eo amin’ny hafa firenena, ny filoha dia manjakazaka; ary ny lehibe dia manampatra fahefana. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy mba toy izany kosa eo aminareo; fa na iza na iza te ho lehibe eo aminareo dia ho mpanomponareo; '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary na iza na iza te ho voalohany eo aminareo dia ho mpiasanareo. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' izany: tsy hotompoina manko no nahatongavany fa hanompo ary hanolotra ny ainy ho fanavotana ny besinimaro'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 26.28; 1Tim 2.6.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ireo jamba roa lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 10.46-52; Lk 18.35-43)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niala tao Jerikao i Jesoa mbamin’ny mpianany, dia nisy vahoaka betsaka nanaraka an’i Jesoa. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niainga indray izy tamin’ny sivy maraina ka nahita mpiasa hafa nidonana-poana teo an-kianja '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indreo nisy jamba roa lahy nipetraka teo amoron-dalana. Reny fa hoe i Jesoa no nandalo, ka niantsoantso mafy izy roa lahy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Tompo, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’i Davida
    - type: text
      text: ' ô, mamindrà fo aminay!'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Norahonan’ny vahoaka izy roa lahy hangina, kanefa vao mainka koa niantsoantso mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Tompo, Zanak’i Davida ô, mamindrà fo aminay!
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijanona i Jesoa sady niantso azy roa lahy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no tianareo hataoko aminareo?
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, ny mba hampahiratra ny masonay!
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Onena i Jesoa ary nikasika ny mason’ireto jamba. Dia nahiratra niaraka tamin’izay izy roa lahy, ka lasa nanaraka an’i Jesoa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary niteny taminy hoe: «Ndeha koa ianareo miasa any an-tanimboaloboko fa homeko izay karama ara-drariny.» Dia nankany ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niainga koa izy tamin’ny 12 antoandro sy tamin’ny telo tolakandro, ary dia nanao toy izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niainga farany izy tamin’ny dimy hariva ka mbola nahita mpiasa hafa nidonana-poana ary nanontany azy hoe: «Nahoana ianareo no midonana-poana eto mandritra ny andro tontolo?» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ireo taminy: «Satria tsy nisy nanakarama anay!» Dia hoy ralehilahy taminy: «Ndeha koa ianareo miasa any amin’ny tanimboaloboko.»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Nony hariva ny andro, dia hoy ny tompon’ilay tanimboaloboka tamin’ny mpitandrim-pananany hoe: «Antsoy ny mpiasa ary aloavy ny karamany, ka aseseo avy amin’ireo nilatsaka farany ka hatramin’ireo nilatsaka voalohany.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga ireo nilatsaka tamin’ny dimy hariva ka nandray denàry anankiray avy. '
