document_id: EST.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voatery hanome voninahitra an’i Môrdôkay i Hamàna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nahita tory ny amperôra tamin’iny alina iny ka nampaka ny boky fitadidiana milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo amperôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'ny boky milohateny hoe Asan’ireo amperôra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2.23 sy nta.
      marker-yv: yv-n
    - type: text
      text: '; ary novakîna teo anatrehan’ny amperôra izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’i Hamàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Alaonao faingana àry ny fanamiana sy ny soavaly araka ny voalazanao; ka dia ataovy araka izany amin’i Môrdôkay, ilay Jiosy miasa eo am-bavahadin’ny lapa. Aza asiana latsaka izay rehetra voalazanao.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka ny fanamiana sy ny soavaly i Hamàna, ka nampiakanjo an’i Môrdôkay ny fanamiana ary nampitaingina azy tamin’ny soavaly; dia izy ihany no nitondra azy ho eny an-kianjan’ny tanàna sady niantso teo alohany hoe: «Toy izao no ataon’ny amperôra amin’izay lehilahy iriny homem-boninahitra!» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niverina nankeo am-bavahadin’ny lapa i Môrdôkay; fa i Hamàna kosa nody faingana ho any an-tranony sady nalahelo no nisaron-doha. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitantaran’i Hamàna ny zavatra nanjo azy i Zeresa vadiny sy ny sakaizany rehetra mpanolotsaina azy ka niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha taranaky ny Jiosy i Môrdôkay izay efa niantomboka nandavo anao teo anatrehany, dia tsy haharesy azy mihitsy ianao fa ho lavo eo anatrehany tokoa.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mbola niresaka amin’i Hamàna eo ry zareo no tonga ireo tandapa nirahin’ny amperôra ka nitondra faingana an’i Hamàna ho any amin’ny fanasana izay efa nomanin’i Estera.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka hita voasoratra tao fa i Môrdôkay no nanambara ny amin’i Bigtana sy i Taresa, roa lahy anisan’ny tandapan’ny amperôra, dia ireo mpiambina teo am-baravaran’ny efitranony kanefa nitady hamono an’i Kserksesa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.21-23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny amperôra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona moa no fisandratana sy voninahitra mba efa nomena an’i Môrdôkay noho izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’ireo mpanompo mpikarakara ny amperôra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mbola nisy nomena azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray ny amperôra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza no ao an-kianja ao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Hamàna kosa no efa sendra niditra tao an-kianja. Tonga izy hangataka amin’ny amperôra ny hanantonana an’i Môrdôkay amin’ilay hazo efa nomanina ho azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny mpanompon’ny amperôra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro fa i Hamàna no mitsangana ao an-kianja ao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny amperôra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Asaovy miditra izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra i Hamàna ka nanontanian’ny amperôra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no tokony hataoko amin’izay lehilahy iriko homem-boninahitra?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nihevitra anakampo i Hamàna fa tsy misy irin’ny amperôra homem-boninahitra afa-tsy ny tenany, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka dia namaly azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny amin’izay lehilahy irinao homem-boninahitra, ry andriamanjaka, '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia aoka halaina ny fanamiam-piandrianana efa niakanjoanao sy ny soavaly efa nitaingenanao sady voaisy satroboninahitra ny lohany. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hatolotra ny anankiray amin’ireo andriambaventy voatendrinao izany fanamiana sy soavaly izany; ary aoka izay lehilahy irinao homem-boninahitra hampiakanjoiny ny fanamianao sy hampitaingeniny amin’ny soavalinao. Dia io andriambaventy io ihany no hitondra azy eny an-kianjan’ny tanàna sady hiantso eo alohany hoe: «Toy izao no ataon’ny amperôra amin’izay lehilahy iriny homem-boninahitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny miakanjo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fanamian’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny amperôra sy mitaingina ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: soavaliny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mahatonga hiombona anjara amin’ny fiamboniany.'
      marker-yv: yv-n
    - type: text
      text: '!»'
