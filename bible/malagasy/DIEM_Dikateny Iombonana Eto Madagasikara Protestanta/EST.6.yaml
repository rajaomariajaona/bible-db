document_id: EST.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Voatery hanome voninahitra an’i Môrdôkay i Hamàna
  - type: text
    content: 'Tsy nahita tory ny amperôra tamin’iny alina iny ka nampaka ny boky fitadidiana milohateny hoe '
  - type: text
    content: Asan’ireo amperôra
  - type: note
    content: 'ny boky milohateny hoe Asan’ireo amperôra: jereo 2.23 sy nta.'
  - type: text
    content: '; ary novakîna teo anatrehan’ny amperôra izany. '
  '10':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’i Hamàna:'
  - type: text
    content: –Alaonao faingana àry ny fanamiana sy ny soavaly araka ny voalazanao; ka dia ataovy araka izany amin’i Môrdôkay, ilay Jiosy miasa eo am-bavahadin’ny lapa. Aza asiana latsaka izay rehetra voalazanao.
  '11':
  - type: text
    content: 'Dia naka ny fanamiana sy ny soavaly i Hamàna, ka nampiakanjo an’i Môrdôkay ny fanamiana ary nampitaingina azy tamin’ny soavaly; dia izy ihany no nitondra azy ho eny an-kianjan’ny tanàna sady niantso teo alohany hoe: «Toy izao no ataon’ny amperôra amin’izay lehilahy iriny homem-boninahitra!» '
  '12':
  - type: text
    content: 'Ary niverina nankeo am-bavahadin’ny lapa i Môrdôkay; fa i Hamàna kosa nody faingana ho any an-tranony sady nalahelo no nisaron-doha. '
  '13':
  - type: text
    content: 'Dia nitantaran’i Hamàna ny zavatra nanjo azy i Zeresa vadiny sy ny sakaizany rehetra mpanolotsaina azy ka niteny taminy hoe:'
  - type: text
    content: –Raha taranaky ny Jiosy i Môrdôkay izay efa niantomboka nandavo anao teo anatrehany, dia tsy haharesy azy mihitsy ianao fa ho lavo eo anatrehany tokoa.
  '14':
  - type: text
    content: Mbola niresaka amin’i Hamàna eo ry zareo no tonga ireo tandapa nirahin’ny amperôra ka nitondra faingana an’i Hamàna ho any amin’ny fanasana izay efa nomanin’i Estera.
  '2':
  - type: text
    content: Ka hita voasoratra tao fa i Môrdôkay no nanambara ny amin’i Bigtana sy i Taresa, roa lahy anisan’ny tandapan’ny amperôra, dia ireo mpiambina teo am-baravaran’ny efitranony kanefa nitady hamono an’i Kserksesa
  - type: note
    content: Jereo 2.21-23.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ary hoy ny amperôra hoe:'
  - type: text
    content: –Inona moa no fisandratana sy voninahitra mba efa nomena an’i Môrdôkay noho izany?
  - type: text
    content: 'Fa novalian’ireo mpanompo mpikarakara ny amperôra hoe:'
  - type: text
    content: –Tsy mbola nisy nomena azy.
  '4':
  - type: text
    content: 'Ary hoy indray ny amperôra hoe:'
  - type: text
    content: –Iza no ao an-kianja ao?
  - type: text
    content: 'I Hamàna kosa no efa sendra niditra tao an-kianja. Tonga izy hangataka amin’ny amperôra ny hanantonana an’i Môrdôkay amin’ilay hazo efa nomanina ho azy. '
  '5':
  - type: text
    content: 'Ka hoy ny mpanompon’ny amperôra hoe:'
  - type: text
    content: –Indro fa i Hamàna no mitsangana ao an-kianja ao.
  - type: text
    content: 'Ary hoy ny amperôra hoe:'
  - type: text
    content: –Asaovy miditra izy.
  '6':
  - type: text
    content: 'Dia niditra i Hamàna ka nanontanian’ny amperôra hoe:'
  - type: text
    content: –Inona no tokony hataoko amin’izay lehilahy iriko homem-boninahitra?
  - type: text
    content: 'Nihevitra anakampo i Hamàna fa tsy misy irin’ny amperôra homem-boninahitra afa-tsy ny tenany, '
  '7':
  - type: text
    content: 'ka dia namaly azy hoe:'
  - type: text
    content: '–Ny amin’izay lehilahy irinao homem-boninahitra, ry andriamanjaka, '
  '8':
  - type: text
    content: 'dia aoka halaina ny fanamiam-piandrianana efa niakanjoanao sy ny soavaly efa nitaingenanao sady voaisy satroboninahitra ny lohany. '
  '9':
  - type: text
    content: 'Hatolotra ny anankiray amin’ireo andriambaventy voatendrinao izany fanamiana sy soavaly izany; ary aoka izay lehilahy irinao homem-boninahitra hampiakanjoiny ny fanamianao sy hampitaingeniny amin’ny soavalinao. Dia io andriambaventy io ihany no hitondra azy eny an-kianjan’ny tanàna sady hiantso eo alohany hoe: «Toy izao no ataon’ny amperôra amin’izay lehilahy iriny homem-boninahitra'
  - type: note
    content: Ny miakanjo fanamian’ny amperôra sy mitaingina ny soavaliny dia mahatonga hiombona anjara amin’ny fiamboniany.
  - type: text
    content: '!»'
