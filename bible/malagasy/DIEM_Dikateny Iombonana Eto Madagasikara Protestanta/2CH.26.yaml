document_id: 2CH.26,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakàn’i Hozià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 14.21-22; 15.1-3)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vao 16 taona i Hozià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: I Hozià
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia antsoina hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hazarià
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' manerana ny rijan-teny mirazotra ao amin’ny 2 Mp.'
      marker-yv: yv-n
    - type: text
      text: ' no nalain’ny vahoaka jodeanina rehetra ka notendreny ho mpanjaka handimby an’i Amatsià rainy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nanao tilikambo fiambenana ihany koa izy tao an-taniefitra sady nihady lavaka maro ho famorian-drano, satria nanana omby aman’ondry betsaka izy teny amin’ny faritr’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sefelà
    - type: text
      text: ' sy teny amin’ny lemaka; ary nanana mpiasa tany teny an-kavoana sy mpamboly voaloboka teny an-tanimboaloboka koa ny mpanjaka, satria tia asa tany tokoa izy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nanana tafika i Hozià, dia tafika afa-mifanandrina amin’ny fahavalo sy vonona hiatrika ady; notsinjaraina ho vondro-miaramila izany, araka ny vokatry ny fanisana notontosain’i Jehiela mpitantsoratra sy i Mahaseià mpitantan-draharaha, sady napetraka ho eo ambany fifehezan’i Hananià izay anankiray tamin’ireo komandy voatendrin’ny mpanjaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Andiany roa nisy olona eninjato no filohan-tarika nibaiko ireo miaramila maherifo ireo; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary ny tafika matanjaka nofeheziny kosa dia antokony telonjato nisy vatan-dehilahy 7 500, izay nahery niady tokoa mba homba ny mpanjaka hamely ny fahavalony. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Isaky ny hiantafika ireo, dia efa nanomanan’i Hozià ampinga sy lefona, satro-by fiarovan-doha sy akanjo vy fiarovan-tratra, ary tsipîka sy vaton’antsamotady. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nanamboatra milina tao Jerosalema izy izay noforonina manokana mba hapetraka teny amin’ny tilikambo sy teny amin’ny zoron’ny manda ary mba handefasana zana-tsipîka na vato lehibe. Nahagaga ny nanampian’Andriamanitra an’i Hozià, ka tonga nahery tokoa izy sady niely lavitra ny lazany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Kanjo nampiavonavona am-po azy izany hery nananany izany, ka nitarika loza ho an’ny tenany. Nivadika tamin’ny TOMPO Andriamaniny izy ka niditra tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin’ny TOMPO
    - type: text
      text: ' mba handoro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' fanaovana izany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa mba niditra nanaraka azy kosa i Hazarià mpisorombe, niaraka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisoron
    - type: text
      text: '’ny TOMPO valopolo lahy izay samy mahery fo avokoa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nijoro teo anoloan’ny Hozià mpanjaka ireo ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy anjara raharahanao, ry Hozià, ny handoro vovo-javamanitra ho an’ny TOMPO; fa anjaran’ny mpisorona taranak’i Aharôna izay natokana hanao izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 3.10; 17.5; 18.7.
      marker-yv: yv-n
    - type: text
      text: . Mialà amin’ny Toeramasina ianao, satria manimbazimba an’Andriamanitra; ary tsy ho voninahitra ho anao eo anatrehan’ny TOMPO Andriamanitra izany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mbola teny an-tanan’i Hozià ny fitaovana fandoroana vovo-javamanitra no nisafoaka tamin’ireo mpisorona izy. Tamin’izay indrindra dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: aretin-koditra
    - type: text
      text: ' nipoitra teo amin’ny handriny raha izy mbola tao an-tranon’ny TOMPO iny, teo anatrehan’ny mpisorona sady teo anilan’ny alitara fandoroana vovo-javamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany kosa ity rainy, dia i Hozià no nampody ny seranana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 8.17.
      marker-yv: yv-n
    - type: text
      text: ' Elata ho an’ny fanjakan’i Joda sy nanamboatra azy indray.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary i Hazarià mpisorombe sy ireo mpisorona hafa rehetra dia nanatrika nijery azy ka nahita ny aretin-koditra teo amin’ny handriny. Dia noroahiny hiala ny Toeramasina izy; sady ny tenany koa mba nivoaka ny tempoly faingana ihany, satria tsapany efa namely azy ny TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiafaran’ny nanjakàn’i Hozià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 15.5-7)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nianjadian’izany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: aretin-koditra
    - type: text
      text: ' izany i Hozià mpanjaka ambara-pahafatiny; ary nitoetra mitokana tao amin’ny trano anankiray izy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 15.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', sady tsy nahazo niditra tao an-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' intsony. Ka dia i Jôtama zanany lahy, efa mpifehy ny tao an-dapan’ny mpanjaka, no nitondra ny tany sy ny fanjakana. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Hozià, na tamboalohany na tafara, dia nosoratan’i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' zanakalahin’i Amôtsa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy ananantsika intsony izany lahatsoratra izany.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany kosa i Hozià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 6.1.
      marker-yv: yv-n
    - type: text
      text: ', dia nalevina tao an-tsaha filevena-mpanjaka; kanefa tsy tao amin’ny fasan-drazana no nandevenana azy, satria hoy ny olona hoe: «Voan’ny aretin-koditra izy!» Ary i Jôtama zanany lahy no nanjaka nandimby azy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Feno 16 taona i Hozià fony tonga mpanjaka; ary naharitra 52 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Jekôlià izay avy ao Jerosalema ihany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nanao izay mahitsy eo imason’ny TOMPO i Hozià, tahaka izay rehetra nataon’i Amatsià rainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niraiki-po tamin’Andriamanitra aloha i Hozià, dia nivadika taminy
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I Hozià tamin’ny andro niainan’i Zakarià izay nampianatra azy hanaja an’Andriamanitra, dia nivavaka tokoa tamin’ny TOMPO Andriamanitra sady nomeny fanambinana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nandeha niady tamin’ny Filistinina i Hozià, ka nandrava ny mandan’i Gata sy ny an’i Jabne ary ny an’i Asdôda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Jabne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Asdôda:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna filistinina teo amoron-tsiraka, samy andrefan’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: '; avy eo izy dia nanamafy tanàna jodeanina takaikin’i Asdôda sy takaikin’ny Filistinina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary nanampy azy hatrany Andriamanitra hanohitra ny Filistinina sy ny Arabo nonina tao Gora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gora '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(araka ny RM, jereo 2 Mp 9, 27) na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gerara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (araka ny Targoma)? Kanefa samy tsy fantatra mazava ny misy ireo toerana ireo. Toa mety mitombina kokoa ny dkt tranainy grika izay milazà hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Petrà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ary ny Mehonita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mehonita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 20.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ireto Mehonita ireto aza dia nandoa hetra ho azy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga nahery fatratra i Hozià ka niely laza hatrany amin’ny sisin-tanin’i Ejipta. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nanao tilikambo tao Jerosalema izy, teo amin’ny Vavahadin’ny Zoro sy teo amin’ny Vavahady mankany an-dohasaha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Vavahadin’ny Zoro: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 25.23 sy nta; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Vavahady mankany an-dohasaha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': teo amin’ny manda lafiny andrefana izany.'
      marker-yv: yv-n
    - type: text
      text: ' sady nohamafisiny tsara. '
