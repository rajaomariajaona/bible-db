document_id: 2CH.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Hozià
  - type: heading
    content: (Jereo 2 Mp 14.21-22; 15.1-3)
  - type: text
    content: Vao 16 taona i Hozià
  - type: note
    content: I I Hozià dia antsoina hoe Hazarià manerana ny rijan-teny mirazotra ao amin’ny 2 Mp.
  - type: text
    content: ' no nalain’ny vahoaka jodeanina rehetra ka notendreny ho mpanjaka handimby an’i Amatsià rainy. '
  '10':
  - type: text
    content: 'Nanao tilikambo fiambenana ihany koa izy tao an-taniefitra sady nihady lavaka maro ho famorian-drano, satria nanana omby aman’ondry betsaka izy teny amin’ny faritr’i '
  - type: text
    content: Sefelà
  - type: text
    content: ' sy teny amin’ny lemaka; ary nanana mpiasa tany teny an-kavoana sy mpamboly voaloboka teny an-tanimboaloboka koa ny mpanjaka, satria tia asa tany tokoa izy.'
  '11':
  - type: text
    content: 'Nanana tafika i Hozià, dia tafika afa-mifanandrina amin’ny fahavalo sy vonona hiatrika ady; notsinjaraina ho vondro-miaramila izany, araka ny vokatry ny fanisana notontosain’i Jehiela mpitantsoratra sy i Mahaseià mpitantan-draharaha, sady napetraka ho eo ambany fifehezan’i Hananià izay anankiray tamin’ireo komandy voatendrin’ny mpanjaka. '
  '12':
  - type: text
    content: 'Andiany roa nisy olona eninjato no filohan-tarika nibaiko ireo miaramila maherifo ireo; '
  '13':
  - type: text
    content: 'ary ny tafika matanjaka nofeheziny kosa dia antokony telonjato nisy vatan-dehilahy 7 500, izay nahery niady tokoa mba homba ny mpanjaka hamely ny fahavalony. '
  '14':
  - type: text
    content: 'Isaky ny hiantafika ireo, dia efa nanomanan’i Hozià ampinga sy lefona, satro-by fiarovan-doha sy akanjo vy fiarovan-tratra, ary tsipîka sy vaton’antsamotady. '
  '15':
  - type: text
    content: Nanamboatra milina tao Jerosalema izy izay noforonina manokana mba hapetraka teny amin’ny tilikambo sy teny amin’ny zoron’ny manda ary mba handefasana zana-tsipîka na vato lehibe. Nahagaga ny nanampian’Andriamanitra an’i Hozià, ka tonga nahery tokoa izy sady niely lavitra ny lazany.
  '16':
  - type: text
    content: 'Kanjo nampiavonavona am-po azy izany hery nananany izany, ka nitarika loza ho an’ny tenany. Nivadika tamin’ny TOMPO Andriamaniny izy ka niditra tao amin’ny '
  - type: text
    content: Toeramasin’ny TOMPO
  - type: text
    content: ' mba handoro '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' teo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' fanaovana izany. '
  '17':
  - type: text
    content: 'Fa mba niditra nanaraka azy kosa i Hazarià mpisorombe, niaraka tamin’ny '
  - type: text
    content: mpisoron
  - type: text
    content: '’ny TOMPO valopolo lahy izay samy mahery fo avokoa. '
  '18':
  - type: text
    content: 'Dia nijoro teo anoloan’ny Hozià mpanjaka ireo ka nanao taminy hoe:'
  - type: text
    content: –Tsy anjara raharahanao, ry Hozià, ny handoro vovo-javamanitra ho an’ny TOMPO; fa anjaran’ny mpisorona taranak’i Aharôna izay natokana hanao izany
  - type: note
    content: Jereo Nom 3.10; 17.5; 18.7.
  - type: text
    content: . Mialà amin’ny Toeramasina ianao, satria manimbazimba an’Andriamanitra; ary tsy ho voninahitra ho anao eo anatrehan’ny TOMPO Andriamanitra izany.
  '19':
  - type: text
    content: 'Mbola teny an-tanan’i Hozià ny fitaovana fandoroana vovo-javamanitra no nisafoaka tamin’ireo mpisorona izy. Tamin’izay indrindra dia nisy '
  - type: text
    content: aretin-koditra
  - type: text
    content: ' nipoitra teo amin’ny handriny raha izy mbola tao an-tranon’ny TOMPO iny, teo anatrehan’ny mpisorona sady teo anilan’ny alitara fandoroana vovo-javamanitra. '
  '2':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany kosa ity rainy, dia i Hozià no nampody ny seranana
  - type: note
    content: Jereo 8.17.
  - type: text
    content: ' Elata ho an’ny fanjakan’i Joda sy nanamboatra azy indray.'
  '20':
  - type: text
    content: Ary i Hazarià mpisorombe sy ireo mpisorona hafa rehetra dia nanatrika nijery azy ka nahita ny aretin-koditra teo amin’ny handriny. Dia noroahiny hiala ny Toeramasina izy; sady ny tenany koa mba nivoaka ny tempoly faingana ihany, satria tsapany efa namely azy ny TOMPO.
  - type: heading
    content: Fiafaran’ny nanjakàn’i Hozià
  - type: heading
    content: (Jereo 2 Mp 15.5-7)
  '21':
  - type: text
    content: 'Dia nianjadian’izany '
  - type: text
    content: aretin-koditra
  - type: text
    content: ' izany i Hozià mpanjaka ambara-pahafatiny; ary nitoetra mitokana tao amin’ny trano anankiray izy'
  - type: note
    content: Jereo 2 Mp 15.5 sy nta.
  - type: text
    content: ', sady tsy nahazo niditra tao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' intsony. Ka dia i Jôtama zanany lahy, efa mpifehy ny tao an-dapan’ny mpanjaka, no nitondra ny tany sy ny fanjakana. '
  '22':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Hozià, na tamboalohany na tafara, dia nosoratan’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Amôtsa'
  - type: note
    content: Tsy ananantsika intsony izany lahatsoratra izany.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany kosa i Hozià
  - type: note
    content: Jereo Is 6.1.
  - type: text
    content: ', dia nalevina tao an-tsaha filevena-mpanjaka; kanefa tsy tao amin’ny fasan-drazana no nandevenana azy, satria hoy ny olona hoe: «Voan’ny aretin-koditra izy!» Ary i Jôtama zanany lahy no nanjaka nandimby azy.'
  '3':
  - type: text
    content: 'Feno 16 taona i Hozià fony tonga mpanjaka; ary naharitra 52 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Jekôlià izay avy ao Jerosalema ihany. '
  '4':
  - type: text
    content: Nanao izay mahitsy eo imason’ny TOMPO i Hozià, tahaka izay rehetra nataon’i Amatsià rainy.
  - type: heading
    content: Niraiki-po tamin’Andriamanitra aloha i Hozià, dia nivadika taminy
  '5':
  - type: text
    content: I Hozià tamin’ny andro niainan’i Zakarià izay nampianatra azy hanaja an’Andriamanitra, dia nivavaka tokoa tamin’ny TOMPO Andriamanitra sady nomeny fanambinana.
  '6':
  - type: text
    content: Nandeha niady tamin’ny Filistinina i Hozià, ka nandrava ny mandan’i Gata sy ny an’i Jabne ary ny an’i Asdôda
  - type: note
    content: 'Gata, Jabne, Asdôda: tanàna filistinina teo amoron-tsiraka, samy andrefan’i Jerosalema.'
  - type: text
    content: '; avy eo izy dia nanamafy tanàna jodeanina takaikin’i Asdôda sy takaikin’ny Filistinina. '
  '7':
  - type: text
    content: Ary nanampy azy hatrany Andriamanitra hanohitra ny Filistinina sy ny Arabo nonina tao Gora
  - type: note
    content: Gora (araka ny RM, jereo 2 Mp 9, 27) na Gerara (araka ny Targoma)? Kanefa samy tsy fantatra mazava ny misy ireo toerana ireo. Toa mety mitombina kokoa ny dkt tranainy grika izay milazà hoe Petrà.
  - type: text
    content: ary ny Mehonita
  - type: note
    content: 'Mehonita: jereo 20.1 sy nta.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: Ireto Mehonita ireto aza dia nandoa hetra ho azy.
  - type: text
    content: 'Tonga nahery fatratra i Hozià ka niely laza hatrany amin’ny sisin-tanin’i Ejipta. '
  '9':
  - type: text
    content: Nanao tilikambo tao Jerosalema izy, teo amin’ny Vavahadin’ny Zoro sy teo amin’ny Vavahady mankany an-dohasaha
  - type: note
    content: 'Vavahadin’ny Zoro: jereo 25.23 sy nta; Vavahady mankany an-dohasaha: teo amin’ny manda lafiny andrefana izany.'
  - type: text
    content: ' sady nohamafisiny tsara. '
