document_id: PRO.23,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha miara-misakafo amin’ny manampahefana ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia diniho tsara izay olona eo anoloanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dkt hafa: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: jereo tsara izay zavatra manoloana anao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mba mamindra ny baorina tranainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza maka amin’ny tanin’ny kamboty,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahery tokoa ilay mpiaro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hisahana ny adiny aminao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.11 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 10-11:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny lalàna dia mandrara ny famindrana baorina (jereo Deot 19.14). Andriamanitra dia mitaky ny fanajana izany fitsipika izany indrindra raha ny amin’ny olona tsy mana-mpiaro toy ny vahiny, ny kamboty ary ny mpitondratena (jereo 15.25 sy 22.28).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-11)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afantohy amin’ny fanabeazana ny sainao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny tenim-pahalalana ny sofinao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-12)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza misalasala manafay ny zanakao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy ho faty izy akory raha kapohinao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha mikapoka azy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fanahiny no ho voavonjinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho any amin’ny toeran’ny maty.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-13)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, raha hendry ny fonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho faly koa ny foko.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tretrika tokoa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha amim-pahitsiana no hitenenanao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-14)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mialona ny mpanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manajà ny TOMPO hatrany
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria azo antoka fa misy ny hoavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho foana ny fanantenànao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-15)
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ahy, anaka, ary hendre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mizora amin’ny lala-mahitsy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha toa ka tendan-kanina ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mba tsindrio ny fahazotoan-komanao.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mikambana amin’ny mpimamo divay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny mpiletra hena.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hihamahantra ny mpiboboka sy ny tendan-kanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria be torimaso ka hisaringo-boridamba.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-16)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ny rainao izay niteraka anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza manamavo ny reninao efa antitra.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manàna toetra mahatoky, ka aza amidy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza amidy koa ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fanabeazana ary ny fahaiza-manavaka.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ray niteraka olo-marina sy hendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hibita-karavoana sy hifaly aminy;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: omeo ny rainao sy ny reninao izany fifaliana izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, aoka hibita-karavoana ilay reny niteraka anao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-17)
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, aoka hatoky ahy ny fonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny masonao hifaly amin’ny sori-dalako.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mampidi-doza toy ny hady lalina ny mpivarotena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny lava-pantsakana ety ny vehivavy vadin’olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 5.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: ;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manotrika toy ny mpangalatra ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manamaro ny lehilahy mpanitsakitsa-bady.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-18)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’iza ny alahelo? Ho an’iza ny nenina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’iza ny fifandirana? Ho an’iza ny toloko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’iza ny ratra tsy amin’antony?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’iza ny maso mandroroa?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mitsiriritra ny hanim-piny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mety hanina mahavoafitaka izany.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra fahafito)
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’izay mitaraikiraiky amin’ny divay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho an’izay tsy mitsaha-manandrana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fisotro mifangaro misy alikaola.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mijery ny divay mena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manganohano ao anaty kaopy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hikoriana moramora ao an-tendanao izy,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa amin’ny farany hanaikitra toy ny bibilava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanindrona toy ny menarana misy poizina.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahita zavatra hafahafa ny masonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary resaka mifanjevo no avoakan’ny eritreritrao.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihevi-tena ho any afovoan’ny ranomasina ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho toy izay mandry eny an-tampon’ny lain-tsambo.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hoy ianao anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nisy nikapoka aho nefa tsy naharary!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisy nively aho nefa tsy tsaroako akory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha vantany vao taitra ange aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hangataka hisotro indray!»
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra faha-19)
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza misahirana hangoron-karena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza miana-kendry amin’izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho hitanao akory ny fahalaniany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria toy ny manana elatra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manidina toa voromahery eny an-danitra.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra fahavalo)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza miara-komana amin’ny kahihitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mitsiriritra ny hanim-piny;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa samy hafa ny am-pony sy ny voalazany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy izy aminao: «Mihinàna, misotroa»;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny fony tsy miandany aminao akory.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haloanao aza izay mba nohaninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho very maina ny teny mamy nataonao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra fahasivy)
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza miteny eo an-tsofin’ny olona adala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy horaharahainy akory ny tenim-pahendrenao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (anatra fahafolo)
    marker-yv: yv-h
