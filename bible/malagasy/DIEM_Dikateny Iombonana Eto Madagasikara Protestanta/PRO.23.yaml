document_id: PRO.23,396
type_code: plt
verses:
  '1':
  - type: text
    content: Raha miara-misakafo amin’ny manampahefana ianao,
  - type: text
    content: dia diniho tsara izay olona eo anoloanao
  - type: note
    content: 'Dkt hafa: jereo tsara izay zavatra manoloana anao.'
  - type: text
    content: .
  '10':
  - type: text
    content: Aza mba mamindra ny baorina tranainy
  - type: text
    content: ary aza maka amin’ny tanin’ny kamboty,
  '11':
  - type: text
    content: fa mahery tokoa ilay mpiaro azy
  - type: text
    content: ka hisahana ny adiny aminao
  - type: note
    content: 'And 10-11: ny lalàna dia mandrara ny famindrana baorina (jereo Deot 19.14). Andriamanitra dia mitaky ny fanajana izany fitsipika izany indrindra raha ny amin’ny olona tsy mana-mpiaro toy ny vahiny, ny kamboty ary ny mpitondratena (jereo 15.25 sy 22.28).'
  - type: text
    content: .
  - type: heading
    content: (anatra faha-11)
  '12':
  - type: text
    content: Afantohy amin’ny fanabeazana ny sainao
  - type: text
    content: ary amin’ny tenim-pahalalana ny sofinao.
  - type: heading
    content: (anatra faha-12)
  '13':
  - type: text
    content: Aza misalasala manafay ny zanakao,
  - type: text
    content: fa tsy ho faty izy akory raha kapohinao.
  '14':
  - type: text
    content: Fa raha mikapoka azy ianao,
  - type: text
    content: dia ny fanahiny no ho voavonjinao
  - type: text
    content: tsy ho any amin’ny toeran’ny maty.
  - type: heading
    content: (anatra faha-13)
  '15':
  - type: text
    content: Anaka, raha hendry ny fonao,
  - type: text
    content: dia ho faly koa ny foko.
  '16':
  - type: text
    content: Ho tretrika tokoa aho,
  - type: text
    content: raha amim-pahitsiana no hitenenanao.
  - type: heading
    content: (anatra faha-14)
  '17':
  - type: text
    content: Aza mialona ny mpanota,
  - type: text
    content: fa manajà ny TOMPO hatrany
  '18':
  - type: text
    content: satria azo antoka fa misy ny hoavy
  - type: text
    content: ary tsy ho foana ny fanantenànao.
  - type: heading
    content: (anatra faha-15)
  '19':
  - type: text
    content: Mihainoa ahy, anaka, ary hendre;
  - type: text
    content: ka mizora amin’ny lala-mahitsy.
  '2':
  - type: text
    content: Raha toa ka tendan-kanina ianao,
  - type: text
    content: dia mba tsindrio ny fahazotoan-komanao.
  '20':
  - type: text
    content: Aza mikambana amin’ny mpimamo divay
  - type: text
    content: na ny mpiletra hena.
  '21':
  - type: text
    content: Fa hihamahantra ny mpiboboka sy ny tendan-kanina,
  - type: text
    content: satria be torimaso ka hisaringo-boridamba.
  - type: heading
    content: (anatra faha-16)
  '22':
  - type: text
    content: Mihainoa ny rainao izay niteraka anao;
  - type: text
    content: ary aza manamavo ny reninao efa antitra.
  '23':
  - type: text
    content: Manàna toetra mahatoky, ka aza amidy izany;
  - type: text
    content: aza amidy koa ny fahendrena
  - type: text
    content: sy ny fanabeazana ary ny fahaiza-manavaka.
  '24':
  - type: text
    content: Ny ray niteraka olo-marina sy hendry;
  - type: text
    content: dia hibita-karavoana sy hifaly aminy;
  '25':
  - type: text
    content: omeo ny rainao sy ny reninao izany fifaliana izany;
  - type: text
    content: eny, aoka hibita-karavoana ilay reny niteraka anao.
  - type: heading
    content: (anatra faha-17)
  '26':
  - type: text
    content: Anaka, aoka hatoky ahy ny fonao
  - type: text
    content: ary aoka ny masonao hifaly amin’ny sori-dalako.
  '27':
  - type: text
    content: Fa mampidi-doza toy ny hady lalina ny mpivarotena
  - type: text
    content: ary toy ny lava-pantsakana ety ny vehivavy vadin’olona
  - type: note
    content: Jereo 5.5 sy nta.
  - type: text
    content: ;
  '28':
  - type: text
    content: manotrika toy ny mpangalatra ireo,
  - type: text
    content: ary manamaro ny lehilahy mpanitsakitsa-bady.
  - type: heading
    content: (anatra faha-18)
  '29':
  - type: text
    content: Ho an’iza ny alahelo? Ho an’iza ny nenina?
  - type: text
    content: Ho an’iza ny fifandirana? Ho an’iza ny toloko?
  - type: text
    content: Ho an’iza ny ratra tsy amin’antony?
  - type: text
    content: Ho an’iza ny maso mandroroa?
  '3':
  - type: text
    content: Aza mitsiriritra ny hanim-piny
  - type: text
    content: fa mety hanina mahavoafitaka izany.
  - type: heading
    content: (anatra fahafito)
  '30':
  - type: text
    content: Ho an’izay mitaraikiraiky amin’ny divay
  - type: text
    content: sy ho an’izay tsy mitsaha-manandrana
  - type: text
    content: fisotro mifangaro misy alikaola.
  '31':
  - type: text
    content: Aza mijery ny divay mena
  - type: text
    content: izay manganohano ao anaty kaopy.
  - type: text
    content: Hikoriana moramora ao an-tendanao izy,
  '32':
  - type: text
    content: nefa amin’ny farany hanaikitra toy ny bibilava
  - type: text
    content: ary hanindrona toy ny menarana misy poizina.
  '33':
  - type: text
    content: Hahita zavatra hafahafa ny masonao;
  - type: text
    content: ary resaka mifanjevo no avoakan’ny eritreritrao.
  '34':
  - type: text
    content: Hihevi-tena ho any afovoan’ny ranomasina ianao
  - type: text
    content: ka ho toy izay mandry eny an-tampon’ny lain-tsambo.
  '35':
  - type: text
    content: 'Dia hoy ianao anakampo hoe:'
  - type: text
    content: «Nisy nikapoka aho nefa tsy naharary!
  - type: text
    content: Nisy nively aho nefa tsy tsaroako akory!
  - type: text
    content: Raha vantany vao taitra ange aho,
  - type: text
    content: dia hangataka hisotro indray!»
  - type: heading
    content: (anatra faha-19)
  '4':
  - type: text
    content: Aza misahirana hangoron-karena
  - type: text
    content: ary aza miana-kendry amin’izany.
  '5':
  - type: text
    content: Tsy ho hitanao akory ny fahalaniany,
  - type: text
    content: satria toy ny manana elatra izy
  - type: text
    content: ka manidina toa voromahery eny an-danitra.
  - type: heading
    content: (anatra fahavalo)
  '6':
  - type: text
    content: Aza miara-komana amin’ny kahihitra
  - type: text
    content: ary aza mitsiriritra ny hanim-piny;
  '7':
  - type: text
    content: fa samy hafa ny am-pony sy ny voalazany.
  - type: text
    content: 'Hoy izy aminao: «Mihinàna, misotroa»;'
  - type: text
    content: nefa ny fony tsy miandany aminao akory.
  '8':
  - type: text
    content: Haloanao aza izay mba nohaninao
  - type: text
    content: ary ho very maina ny teny mamy nataonao.
  - type: heading
    content: (anatra fahasivy)
  '9':
  - type: text
    content: Aza miteny eo an-tsofin’ny olona adala
  - type: text
    content: fa tsy horaharahainy akory ny tenim-pahendrenao.
  - type: heading
    content: (anatra fahafolo)
