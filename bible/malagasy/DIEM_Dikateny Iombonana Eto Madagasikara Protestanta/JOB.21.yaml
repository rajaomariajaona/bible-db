document_id: JOB.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba: misy ny fiadanan’ny ratsy fanahy'
  - type: text
    content: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Ny ombilahiny manaraka ka mahavanona;
  - type: text
    content: ary ny ombivaviny tsy mba mamotsotra.
  '11':
  - type: text
    content: Mampiriaria ny zanany toy ny zanak’ondry izy
  - type: text
    content: ary mampifalihavanja ireo zafikeliny.
  '12':
  - type: text
    content: Mihira miaraka amin’ny amponga sy ny lokanga izy
  - type: text
    content: sady faly mandihy amin’ny feon-tsodina.
  '13':
  - type: text
    content: Rehefa niaina tamim-pahasambarana izy,
  - type: text
    content: dia midina miadana any amin’ny fonenan’ny maty,
  - type: heading
    content: '*'
  '14':
  - type: text
    content: 'Kanefa hoy ireo tamin’Andriamanitra: «Mialà aminay,'
  - type: text
    content: fa tsy te hahalala akory izay lalanao any izahay.
  '15':
  - type: text
    content: Zinona koa ilay Tsitoha no hotompoinay?
  - type: text
    content: Ary mitondra inona izay fivavahana aminy?»
  '16':
  - type: text
    content: Marina fa tsy tompon’ny fahasambarany izy.
  - type: text
    content: Ho lavitra ahy anie ny fisainan’ny olon-dratsy.
  '17':
  - type: text
    content: Matetika ve no maty tampoka
  - type: text
    content: ny jirom-piainan’ny olon-dratsy?
  - type: text
    content: Matetika ve izy no iharan-doza,
  - type: text
    content: na ianjadian’ny fahatezeran’Andriamanitra
  - type: text
    content: mba ho anjara sahaza azy?
  '18':
  - type: text
    content: Sa ho toy ny mololo entin-drivotra
  - type: text
    content: sy akofa indaosin-tadio araka ny fiteny?
  - type: heading
    content: '*'
  '19':
  - type: text
    content: 'Fa hoy ianareo hoe:'
  - type: text
    content: «Andriamanitra noho ny helo-dray,
  - type: text
    content: dia mbola hanasazy ny zanany.»
  - type: text
    content: Tsia! Fa aoka ilay meloka ihany
  - type: text
    content: no hosazin’Andriamanitra
  - type: text
    content: mba hahatonga saina azy.
  '2':
  - type: text
    content: Mba henoy tsara izay lazaiko,
  - type: text
    content: fa izany no hampiononanareo ahy.
  '20':
  - type: text
    content: Aoka ny olon-dratsy hahita maso ny fahoriany
  - type: text
    content: ka higoka ny fahatezeran’ilay Tsitoha.
  '21':
  - type: text
    content: Ahoan’ny meloka inona moa izay hanjo ny taranany,
  - type: text
    content: rehefa tapitra hatreo ny androm-piainany?
  '22':
  - type: text
    content: Andriamanitra va no hampianarina izany,
  - type: text
    content: 'nefa na ny '
  - type: text
    content: anjely
  - type: text
    content: ' aza eo ambany fifehezany?'
  - type: heading
    content: '*'
  '23':
  - type: text
    content: Ny olona sasany dia tomady tsara
  - type: text
    content: sady miadana no tsy manana ahiahy,
  - type: text
    content: mandra-piavin’ny fahafatesany;
  '24':
  - type: text
    content: mavesatry ny tavy ny kibony,
  - type: text
    content: ary vonton-tsoka ny taolany.
  '25':
  - type: text
    content: Fa ny olona sasany kosa maty
  - type: text
    content: ao anatin’ny ngidim-piainana,
  - type: text
    content: ka tsy mba nanandram-pahasambarana.
  '26':
  - type: text
    content: Samy mandry eo amin’ny vovoka
  - type: text
    content: ny tenan’izy roa tonta ireo,
  - type: text
    content: ka samy rakotry ny olitra.
  '27':
  - type: text
    content: Tandremo fa fantatro ny hevitrareo
  - type: text
    content: sy izay eritreretinareo ny amiko,
  '28':
  - type: text
    content: 'fony ianareo miteniteny hoe:'
  - type: text
    content: «Aiza izao ny tranon’ny mpampahory,
  - type: text
    content: aiza ny lay fonenan’ny olon-dratsy?»
  - type: heading
    content: '*'
  '29':
  - type: text
    content: Mba anontanio kosa ange ny mpitety tany,
  - type: text
    content: 'ary mahaiza mamantatra ny zavatra ambarany hoe:'
  '3':
  - type: text
    content: Mandefera amiko mba hahazoako miteny;
  - type: text
    content: fa rehefa tapitra ny teniko,
  - type: text
    content: dia afaka mananihany ianareo.
  '30':
  - type: text
    content: Raha avy ny loza, afaka ihany ny olon-dratsy,
  - type: text
    content: raha tonga ny fahatezerana, dia voaaro izy.
  '31':
  - type: text
    content: Zovy no mba sahy hitsikera ny toetrany
  - type: text
    content: na hampanonitra azy ny ratsy nataony?
  '32':
  - type: text
    content: Rehefa maty izy, dia entina halevina,
  - type: text
    content: ary mbola ambenina aza ny fasany.
  '33':
  - type: text
    content: Ho maivana aminy ny tany
  - type: text
    content: izay manototra azy ao an-dohasaha,
  - type: text
    content: fa vahoaka maro no nitanjozotra taoriany
  - type: text
    content: ary olona tsy hita isa no nisesy teo anoloany.
  - type: heading
    content: '*'
  '34':
  - type: text
    content: Koa tsy misy antony amiko izay fampiononanareo,
  - type: text
    content: fa lainga avokoa no raketin’ny valinteninareo.
  '4':
  - type: text
    content: Ny ataon’olombelona ve no itarainako?
  - type: text
    content: Tsia, koa nahoana aho no hahalefitra?
  '5':
  - type: text
    content: Mitodiha aty amiko, fa ho gaga ianareo
  - type: text
    content: ary hitampim-bava tsy hahaloa-peo.
  '6':
  - type: text
    content: Raha mieritreritra izany ny tenako,
  - type: text
    content: dia raiki-tahotra sady mari-koditra.
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Nahoana no mbola ahaveloman’ny olon-dratsy?
  - type: text
    content: Nahoana izy no tratra antitra sady be fahefana?
  '8':
  - type: text
    content: Ny taranany koa mipetraka tsara eo aminy,
  - type: text
    content: ary ny zafikeliny mitombo eo imasony.
  '9':
  - type: text
    content: Miadana ao an-tranony izy ka tsy matahotra
  - type: text
    content: ary ny fikapohan’Andriamanitra tsy mahavoa azy.
