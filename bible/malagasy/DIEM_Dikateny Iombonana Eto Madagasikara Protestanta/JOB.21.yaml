document_id: JOB.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Valintenin’i Jôba: misy ny fiadanan’ny ratsy fanahy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mba henoy tsara izay lazaiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izany no hampiononanareo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandefera amiko mba hahazoako miteny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rehefa tapitra ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia afaka mananihany ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny ataon’olombelona ve no itarainako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, koa nahoana aho no hahalefitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mitodiha aty amiko, fa ho gaga ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitampim-bava tsy hahaloa-peo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha mieritreritra izany ny tenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia raiki-tahotra sady mari-koditra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahoana no mbola ahaveloman’ny olon-dratsy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana izy no tratra antitra sady be fahefana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny taranany koa mipetraka tsara eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zafikeliny mitombo eo imasony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miadana ao an-tranony izy ka tsy matahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fikapohan’Andriamanitra tsy mahavoa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny ombilahiny manaraka ka mahavanona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ombivaviny tsy mba mamotsotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mampiriaria ny zanany toy ny zanak’ondry izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampifalihavanja ireo zafikeliny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihira miaraka amin’ny amponga sy ny lokanga izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady faly mandihy amin’ny feon-tsodina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rehefa niaina tamim-pahasambarana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia midina miadana any amin’ny fonenan’ny maty,
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa hoy ireo tamin’Andriamanitra: «Mialà aminay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy te hahalala akory izay lalanao any izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zinona koa ilay Tsitoha no hotompoinay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitondra inona izay fivavahana aminy?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Marina fa tsy tompon’ny fahasambarany izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lavitra ahy anie ny fisainan’ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Matetika ve no maty tampoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny jirom-piainan’ny olon-dratsy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matetika ve izy no iharan-doza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ianjadian’ny fahatezeran’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho anjara sahaza azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sa ho toy ny mololo entin-drivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy akofa indaosin-tadio araka ny fiteny?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy ianareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Andriamanitra noho ny helo-dray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola hanasazy ny zanany.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia! Fa aoka ilay meloka ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hosazin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatonga saina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aoka ny olon-dratsy hahita maso ny fahoriany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka higoka ny fahatezeran’ilay Tsitoha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ahoan’ny meloka inona moa izay hanjo ny taranany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tapitra hatreo ny androm-piainany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Andriamanitra va no hampianarina izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nefa na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' aza eo ambany fifehezany?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny olona sasany dia tomady tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady miadana no tsy manana ahiahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-piavin’ny fahafatesany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: mavesatry ny tavy ny kibony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vonton-tsoka ny taolany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa ny olona sasany kosa maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao anatin’ny ngidim-piainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba nanandram-pahasambarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Samy mandry eo amin’ny vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tenan’izy roa tonta ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka samy rakotry ny olitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tandremo fa fantatro ny hevitrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay eritreretinareo ny amiko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fony ianareo miteniteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aiza izao ny tranon’ny mpampahory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aiza ny lay fonenan’ny olon-dratsy?»
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mba anontanio kosa ange ny mpitety tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary mahaiza mamantatra ny zavatra ambarany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Raha avy ny loza, afaka ihany ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tonga ny fahatezerana, dia voaaro izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Zovy no mba sahy hitsikera ny toetrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hampanonitra azy ny ratsy nataony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Rehefa maty izy, dia entina halevina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mbola ambenina aza ny fasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ho maivana aminy ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manototra azy ao an-dohasaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa vahoaka maro no nitanjozotra taoriany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary olona tsy hita isa no nisesy teo anoloany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Koa tsy misy antony amiko izay fampiononanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa lainga avokoa no raketin’ny valinteninareo.
