document_id: JOB.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Valintenin’i Jôba: misy ny fiadanan’ny ratsy fanahy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ombilahiny manaraka ka mahavanona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ombivaviny tsy mba mamotsotra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampiriaria ny zanany toy ny zanak’ondry izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampifalihavanja ireo zafikeliny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihira miaraka amin’ny amponga sy ny lokanga izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady faly mandihy amin’ny feon-tsodina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa niaina tamim-pahasambarana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia midina miadana any amin’ny fonenan’ny maty,
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Kanefa hoy ireo tamin’Andriamanitra: «Mialà aminay,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy te hahalala akory izay lalanao any izahay.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zinona koa ilay Tsitoha no hotompoinay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitondra inona izay fivavahana aminy?»
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina fa tsy tompon’ny fahasambarany izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lavitra ahy anie ny fisainan’ny olon-dratsy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matetika ve no maty tampoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny jirom-piainan’ny olon-dratsy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matetika ve izy no iharan-doza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ianjadian’ny fahatezeran’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho anjara sahaza azy?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa ho toy ny mololo entin-drivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy akofa indaosin-tadio araka ny fiteny?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy ianareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Andriamanitra noho ny helo-dray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mbola hanasazy ny zanany.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia! Fa aoka ilay meloka ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hosazin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahatonga saina azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba henoy tsara izay lazaiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izany no hampiononanareo ahy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny olon-dratsy hahita maso ny fahoriany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka higoka ny fahatezeran’ilay Tsitoha.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahoan’ny meloka inona moa izay hanjo ny taranany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa tapitra hatreo ny androm-piainany?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra va no hampianarina izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nefa na ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' aza eo ambany fifehezany?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona sasany dia tomady tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miadana no tsy manana ahiahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-piavin’ny fahafatesany;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mavesatry ny tavy ny kibony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vonton-tsoka ny taolany.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny olona sasany kosa maty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao anatin’ny ngidim-piainana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba nanandram-pahasambarana.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy mandry eo amin’ny vovoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tenan’izy roa tonta ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy rakotry ny olitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo fa fantatro ny hevitrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay eritreretinareo ny amiko,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fony ianareo miteniteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aiza izao ny tranon’ny mpampahory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aiza ny lay fonenan’ny olon-dratsy?»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba anontanio kosa ange ny mpitety tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary mahaiza mamantatra ny zavatra ambarany hoe:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandefera amiko mba hahazoako miteny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa rehefa tapitra ny teniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia afaka mananihany ianareo.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha avy ny loza, afaka ihany ny olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tonga ny fahatezerana, dia voaaro izy.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zovy no mba sahy hitsikera ny toetrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hampanonitra azy ny ratsy nataony?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa maty izy, dia entina halevina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mbola ambenina aza ny fasany.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho maivana aminy ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manototra azy ao an-dohasaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa vahoaka maro no nitanjozotra taoriany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary olona tsy hita isa no nisesy teo anoloany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy misy antony amiko izay fampiononanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lainga avokoa no raketin’ny valinteninareo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ataon’olombelona ve no itarainako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, koa nahoana aho no hahalefitra?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitodiha aty amiko, fa ho gaga ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitampim-bava tsy hahaloa-peo.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mieritreritra izany ny tenako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia raiki-tahotra sady mari-koditra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mbola ahaveloman’ny olon-dratsy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana izy no tratra antitra sady be fahefana?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taranany koa mipetraka tsara eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zafikeliny mitombo eo imasony.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miadana ao an-tranony izy ka tsy matahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fikapohan’Andriamanitra tsy mahavoa azy.
