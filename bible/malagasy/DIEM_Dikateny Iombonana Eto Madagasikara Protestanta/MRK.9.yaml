document_id: MRK.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy koa i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina aminareo fa ny sasany amin’izay manatrika eto dia tsy ho faty, raha tsy efa mahita ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ' tonga amin-kery mahagaga.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiovàn’i Jesoa tarehy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 17.14-21; Lk 9.37-43a)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Enina andro taorian’izay, dia nalain’i Jesoa niaraka taminy ry i Petera sy i Jakôba ary i Jôhany, ka nentiny nitokana tany an-tendrombohitra avo. Dia niova tarehy teo anatrehan’izy telo lahy i Jesoa: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ny fitafiany niova namirapiratra sady fotsy nangatsakatsaka, ary tsy misy mpanasa lamba mahadio sy mahafotsy lamba toy izany etỳ ambonin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2Pt 1.16-18.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hitan’ireto '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' koa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià
  - type: text
    text: ' sy i Mosesy; ary niresaka tamin’i Jesoa izy roa lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Petera tamin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, tsara ho antsika ny mitoetra eto; koa hanao lay telo izahay; ny anankiray ho Anao, ny anankiray ho an’i Mosesy ary ny anankiray ho an’i Elià.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa tsy hitan’i Petera izay holazaina satria samy raiki-tahotra ireto mpianatra telo lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’izay dia nisy rahona nanarona azy rehetra, ary nisy feo avy tao amin’io rahona io nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ity no Zanako, ilay Malalako; henoy Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.11 sy nta.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary niaraka tamin’izay ireo mpianatra telo lahy dia nanopy maso manodidina, ka tsy nahita olona intsony teo aminy afa-tsy i Jesoa irery ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fony izy efa-mianaka nidina avy any an-tendrombohitra, dia izao no baiko nomen’i Jesoa azy telo lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza mitantara na amin’iza na amin’iza ny zavatra vao hitanareo, mandra-pitsangan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' ho velona avy any amin’ny maty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Notanan’izy telo lahy izany hafatra izany, kanefa nifampidinihany izay hevitry ny hoe «mitsangana velona avy any amin’ny maty».
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nanontany an’i Jesoa izy telo lahy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no lazain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' fa hoe tsy maintsy ho avy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mal 3.23.
    marker-yv: yv-n
  - type: text
    text: ', alohan’ny hahatongavan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy maintsy ho avy i Elià hampody ny zavatra rehetra amin’ny laoniny, alohan’ny hahatongavan’ny Mesia; fa ahoana kosa no ilazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' momba ny Zanak’olona fa hoe tsy maintsy hijaly mafy Izy ary hatao tsinontsinona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 53.3; Sal 22.1-18.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, hoy Aho aminareo, efa tonga tokoa i Elià sady nanaovan’ny sasany izay fampijaliana rehetra tiany hatao taminy araka ny voalazan’ny Soratra Masina momba azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay zazalahy azon’ny demony
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 17.14-21; Lk 9.37-43a)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony tafaverina teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' hafa ry i Jesoa efa-mianaka, dia nahita vahoaka maro nanodidina ireto mpianatra ary koa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' niady hevitra taminy teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha vao nahita an’i Jesoa ny vahoaka rehetra, dia talanjona sady faly ka nirohotra niarahaba Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nanontany ireto mpianatra i Jesoa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona izato iadianareo hevitra amin’ny mpahay lalàna?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa nisy olona iray tamin’ny vahoaka namaly Azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mpampianatra ô, nentiko eto aminao ny zanako lahy fa azon’ny fanahy mampahamoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary na aiza na aiza ahazoany azy, dia alavony amin’ny tany ilay zaza ary ataony mandoa vory sy mikitro-nify dia mihinjitra eo. Niangaviako ny mpianatrao handroaka ilay fanahy, kanefa tsy vitany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy i Jesoa tamin’ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Karazan’olona tsy mino ianareo! Mandra-pahoviana no hitoerako eto aminareo? Mandra-pahoviana no handeferako aminareo? Ento atỳ amiko ny zaza!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nentiny teo aminy izy. Raha vao nahita an’i Jesoa ilay fanahy, dia nataony mifanintontsintona ilay zaza ka nianjera tamin’ny tany ary niolanolana sy nandoa vory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nanontany ny rain-drazazalahy i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hatramin’ny oviana izao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny rainy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hatramin’ny fahakeliny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary matetika izy no nazeran’io fanahy io tany anaty afo sy tany anaty rano hamonoana azy; koa raha misy efanao re, dia mamindrà fo aminay ka vonjeo izahay!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy ny navalin’i Jesoa azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha misy efako hoe? Tsy misy tsy efan’izay mino!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Avy hatrany ilay rain’ilay zaza dia niantsoantso mafy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mino aho, nefa vonjeo fa tsy ampy finoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nahita ny vahoaka nitangorona teo i Jesoa, dia niteny mafy ilay fanahy maloto nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandidy anao Aho, ry fanahy mampahamoana sady mamparenina, mialà amin’io zaza io ary aza miverina ao aminy intsony!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia ninananana ilay fanahy sady nampifanintontsintona mafy ny zaza no niala taminy. Nitsitra toy ny maty ilay zaza ka nataon’ny maro hoe maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa noraisin’i Jesoa ny tanan’ilay zaza hanarenany azy; dia tafatsangana tokoa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Rehefa tonga tao an-trano i Jesoa, dia nanontany Azy manokana ny mpianany nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana izahay no tsy naharoaka azy iny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iny karazana iny dia tsy misy fomba azo amoahana azy afa-tsy ny fivavahana ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jesoa fanindroany ny hahafatesany sy ny hitsanganany ho velona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 17.22-23; Lk 9.43b-45)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia niala teo i Jesoa sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ka namakivaky ny faritany Galilea, ary tsy tian’i Jesoa hisy hahalala izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'fa nampianatra ny mpianany Izy ary nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hatolotra eo an-tanan’ny olona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' ka hovonoiny ho faty, ary andro fahatelo aorian’ny hahafatesany dia hitsangana velona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tsy azon’ny mpianany anefa izany teny izany, sady tsy sahiny nanontaniana an’i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Iza no lehibe indrindra?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 18.1-5; Lk 9.46-48)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia niditra tao Kafarnahòma i Jesoa sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '. Ary rehefa mby tao an-trano i Jesoa, dia nanontany ny mpianany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no niadianareo hevitra teny an-dalana teo iny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tsy niteny tsy nivolana ireo, satria ny niadiany hevitra teny an-dalana dia ny hoe iza no lehibe indrindra amin’izy samy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nipetraka i Jesoa ary niantso ny 12 lahy ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha misy te ho voalohany, aoka izy ho farany amin’ny olona rehetra ary ho mpanompon’ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia nandray zazakely i Jesoa, napetrany teo ampovoan’izy rehetra ary dia notrotroiny ka hoy Izy:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: –Na iza na iza mandray ny anankiray amin’itony zaza itony amin’ny anarako, dia Izaho no raisiny; ary na iza na iza mandray Ahy, dia tsy Izaho ihany no raisiny fa Ilay naniraka Ahy koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Izay tsy manohitra antsika dia momba antsika
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 9.49-50)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa hoy i Jôhany tamin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mpampianatra ô, nahita olona nandroaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' tamin’ny anaranao izahay, ka noraranay satria tsy namantsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza raràna; fa tsy misy olona hanao asa mahagaga amin’ny anarako, ka hahateny ratsy Ahy eo no ho eo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa izay tsy manohitra antsika dia momba antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary na iza na iza manome rano eran’ny kaopy hosotroinareo noho ny maha an’i Kristy anareo, dia lazaiko marina aminareo fa tsy ho diso valisoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zava-doza ny fahotana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 18.6-9; Lk 17.1-2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Na iza na iza mitarika ny anankiray amin’itony madinika mino Ahy itony hanao ratsy, dia aleo izy anantonana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vatobe fikoseham-bary
  - type: text
    text: ' eo amin’ny vozony ka hatsipy any anaty ranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Raha mitarika anao amin’ny ratsy ny tananao ila, dia tapaho; fa aleo ianao tokan-tanana nefa tafiditra any amin’ny fiainana toy izay ary tanan-droa nefa mivarina any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lohasahan’afo
  - type: text
    text: ', dia any amin’ny afo tsy mitsaha-mirehitra. [ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Any, «ny olitra mivoaka amin’ny tena, tsy maty; ary ny afo, tsy mitsaha-mirehitra.»] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Raha mitarika anao amin’ny ratsy ny tongotrao ila, dia tapaho; fa aleo ianao tokan-tongotra nefa tafiditra any amin’ny fiainana toy izay ary tongotra roa nefa atsipy any amin’ny lohasahan’afo. [ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Any, «ny olitra mivoaka amin’ny tena, tsy maty; ary ny afo, tsy mitsaha-mirehitra.»] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
