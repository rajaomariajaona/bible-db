document_id: MRK.9,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia hoy koa i Jesoa taminy:'
  - type: text
    content: '–Lazaiko marina aminareo fa ny sasany amin’izay manatrika eto dia tsy ho faty, raha tsy efa mahita ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' tonga amin-kery mahagaga.'
  - type: heading
    content: Ny fiovàn’i Jesoa tarehy
  - type: heading
    content: (Jereo Mt 17.14-21; Lk 9.37-43a)
  '10':
  - type: text
    content: Notanan’izy telo lahy izany hafatra izany, kanefa nifampidinihany izay hevitry ny hoe «mitsangana velona avy any amin’ny maty».
  '11':
  - type: text
    content: 'Dia nanontany an’i Jesoa izy telo lahy nanao hoe:'
  - type: text
    content: '–Nahoana no lazain’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' fa hoe tsy maintsy ho avy i '
  - type: text
    content: Elià
  - type: note
    content: Ampit Mal 3.23.
  - type: text
    content: ', alohan’ny hahatongavan’ny '
  - type: text
    content: Mesia
  - type: text
    content: '?'
  '12':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: '–Tsy maintsy ho avy i Elià hampody ny zavatra rehetra amin’ny laoniny, alohan’ny hahatongavan’ny Mesia; fa ahoana kosa no ilazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' momba ny Zanak’olona fa hoe tsy maintsy hijaly mafy Izy ary hatao tsinontsinona'
  - type: note
    content: Jereo Is 53.3; Sal 22.1-18.
  - type: text
    content: '? '
  '13':
  - type: text
    content: Eny, hoy Aho aminareo, efa tonga tokoa i Elià sady nanaovan’ny sasany izay fampijaliana rehetra tiany hatao taminy araka ny voalazan’ny Soratra Masina momba azy.
  - type: heading
    content: Sitranin’i Jesoa ilay zazalahy azon’ny demony
  - type: heading
    content: (Jereo Mt 17.14-21; Lk 9.37-43a)
  '14':
  - type: text
    content: 'Nony tafaverina teo amin’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' hafa ry i Jesoa efa-mianaka, dia nahita vahoaka maro nanodidina ireto mpianatra ary koa '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' niady hevitra taminy teo. '
  '15':
  - type: text
    content: 'Raha vao nahita an’i Jesoa ny vahoaka rehetra, dia talanjona sady faly ka nirohotra niarahaba Azy. '
  '16':
  - type: text
    content: 'Dia nanontany ireto mpianatra i Jesoa nanao hoe:'
  - type: text
    content: –Inona izato iadianareo hevitra amin’ny mpahay lalàna?
  '17':
  - type: text
    content: 'Fa nisy olona iray tamin’ny vahoaka namaly Azy hoe:'
  - type: text
    content: '–Mpampianatra ô, nentiko eto aminao ny zanako lahy fa azon’ny fanahy mampahamoana. '
  '18':
  - type: text
    content: Ary na aiza na aiza ahazoany azy, dia alavony amin’ny tany ilay zaza ary ataony mandoa vory sy mikitro-nify dia mihinjitra eo. Niangaviako ny mpianatrao handroaka ilay fanahy, kanefa tsy vitany.
  '19':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny vahoaka:'
  - type: text
    content: –Karazan’olona tsy mino ianareo! Mandra-pahoviana no hitoerako eto aminareo? Mandra-pahoviana no handeferako aminareo? Ento atỳ amiko ny zaza!
  '2':
  - type: text
    content: 'Enina andro taorian’izay, dia nalain’i Jesoa niaraka taminy ry i Petera sy i Jakôba ary i Jôhany, ka nentiny nitokana tany an-tendrombohitra avo. Dia niova tarehy teo anatrehan’izy telo lahy i Jesoa: '
  '20':
  - type: text
    content: 'Dia nentiny teo aminy izy. Raha vao nahita an’i Jesoa ilay fanahy, dia nataony mifanintontsintona ilay zaza ka nianjera tamin’ny tany ary niolanolana sy nandoa vory. '
  '21':
  - type: text
    content: 'Ary nanontany ny rain-drazazalahy i Jesoa hoe:'
  - type: text
    content: –Hatramin’ny oviana izao?
  - type: text
    content: 'Dia hoy ny rainy:'
  - type: text
    content: '–Hatramin’ny fahakeliny. '
  '22':
  - type: text
    content: Ary matetika izy no nazeran’io fanahy io tany anaty afo sy tany anaty rano hamonoana azy; koa raha misy efanao re, dia mamindrà fo aminay ka vonjeo izahay!
  '23':
  - type: text
    content: 'Fa hoy ny navalin’i Jesoa azy:'
  - type: text
    content: –Raha misy efako hoe? Tsy misy tsy efan’izay mino!
  '24':
  - type: text
    content: 'Avy hatrany ilay rain’ilay zaza dia niantsoantso mafy nanao hoe:'
  - type: text
    content: –Mino aho, nefa vonjeo fa tsy ampy finoana.
  '25':
  - type: text
    content: 'Nahita ny vahoaka nitangorona teo i Jesoa, dia niteny mafy ilay fanahy maloto nanao hoe:'
  - type: text
    content: –Mandidy anao Aho, ry fanahy mampahamoana sady mamparenina, mialà amin’io zaza io ary aza miverina ao aminy intsony!
  '26':
  - type: text
    content: 'Dia ninananana ilay fanahy sady nampifanintontsintona mafy ny zaza no niala taminy. Nitsitra toy ny maty ilay zaza ka nataon’ny maro hoe maty. '
  '27':
  - type: text
    content: Fa noraisin’i Jesoa ny tanan’ilay zaza hanarenany azy; dia tafatsangana tokoa izy.
  '28':
  - type: text
    content: 'Rehefa tonga tao an-trano i Jesoa, dia nanontany Azy manokana ny mpianany nanao hoe:'
  - type: text
    content: –Nahoana izahay no tsy naharoaka azy iny?
  '29':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Iny karazana iny dia tsy misy fomba azo amoahana azy afa-tsy ny fivavahana ihany.
  - type: heading
    content: Ambaran’i Jesoa fanindroany ny hahafatesany sy ny hitsanganany ho velona
  - type: heading
    content: (Jereo Mt 17.22-23; Lk 9.43b-45)
  '3':
  - type: text
    content: ny fitafiany niova namirapiratra sady fotsy nangatsakatsaka, ary tsy misy mpanasa lamba mahadio sy mahafotsy lamba toy izany etỳ ambonin’ny tany
  - type: note
    content: Ampit 2Pt 1.16-18.
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Dia niala teo i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ka namakivaky ny faritany Galilea, ary tsy tian’i Jesoa hisy hahalala izany; '
  '31':
  - type: text
    content: 'fa nampianatra ny mpianany Izy ary nilaza taminy hoe:'
  - type: text
    content: '–Hatolotra eo an-tanan’ny olona ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' ka hovonoiny ho faty, ary andro fahatelo aorian’ny hahafatesany dia hitsangana velona.'
  '32':
  - type: text
    content: Tsy azon’ny mpianany anefa izany teny izany, sady tsy sahiny nanontaniana an’i Jesoa.
  - type: heading
    content: Iza no lehibe indrindra?
  - type: heading
    content: (Jereo Mt 18.1-5; Lk 9.46-48)
  '33':
  - type: text
    content: 'Dia niditra tao Kafarnahòma i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: '. Ary rehefa mby tao an-trano i Jesoa, dia nanontany ny mpianany hoe:'
  - type: text
    content: –Inona no niadianareo hevitra teny an-dalana teo iny?
  '34':
  - type: text
    content: 'Tsy niteny tsy nivolana ireo, satria ny niadiany hevitra teny an-dalana dia ny hoe iza no lehibe indrindra amin’izy samy izy. '
  '35':
  - type: text
    content: 'Dia nipetraka i Jesoa ary niantso ny 12 lahy ka nanao taminy hoe:'
  - type: text
    content: –Raha misy te ho voalohany, aoka izy ho farany amin’ny olona rehetra ary ho mpanompon’ny olona rehetra.
  '36':
  - type: text
    content: 'Dia nandray zazakely i Jesoa, napetrany teo ampovoan’izy rehetra ary dia notrotroiny ka hoy Izy:'
  '37':
  - type: text
    content: –Na iza na iza mandray ny anankiray amin’itony zaza itony amin’ny anarako, dia Izaho no raisiny; ary na iza na iza mandray Ahy, dia tsy Izaho ihany no raisiny fa Ilay naniraka Ahy koa.
  - type: heading
    content: Izay tsy manohitra antsika dia momba antsika
  - type: heading
    content: (Jereo Lk 9.49-50)
  '38':
  - type: text
    content: 'Fa hoy i Jôhany tamin’i Jesoa:'
  - type: text
    content: '–Mpampianatra ô, nahita olona nandroaka '
  - type: text
    content: demony
  - type: text
    content: ' tamin’ny anaranao izahay, ka noraranay satria tsy namantsika.'
  '39':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Aza raràna; fa tsy misy olona hanao asa mahagaga amin’ny anarako, ka hahateny ratsy Ahy eo no ho eo. '
  '4':
  - type: text
    content: 'Hitan’ireto '
  - type: text
    content: mpianatra
  - type: text
    content: ' koa i '
  - type: text
    content: Elià
  - type: text
    content: ' sy i Mosesy; ary niresaka tamin’i Jesoa izy roa lahy. '
  '40':
  - type: text
    content: 'Fa izay tsy manohitra antsika dia momba antsika. '
  '41':
  - type: text
    content: Ary na iza na iza manome rano eran’ny kaopy hosotroinareo noho ny maha an’i Kristy anareo, dia lazaiko marina aminareo fa tsy ho diso valisoa.
  - type: heading
    content: Zava-doza ny fahotana
  - type: heading
    content: (Jereo Mt 18.6-9; Lk 17.1-2)
  '42':
  - type: text
    content: 'Na iza na iza mitarika ny anankiray amin’itony madinika mino Ahy itony hanao ratsy, dia aleo izy anantonana '
  - type: text
    content: vatobe fikoseham-bary
  - type: text
    content: ' eo amin’ny vozony ka hatsipy any anaty ranomasina. '
  '43':
  - type: text
    content: 'Raha mitarika anao amin’ny ratsy ny tananao ila, dia tapaho; fa aleo ianao tokan-tanana nefa tafiditra any amin’ny fiainana toy izay ary tanan-droa nefa mivarina any amin’ny '
  - type: text
    content: lohasahan’afo
  - type: text
    content: ', dia any amin’ny afo tsy mitsaha-mirehitra. [ '
  '44':
  - type: text
    content: 'Any, «ny olitra mivoaka amin’ny tena, tsy maty; ary ny afo, tsy mitsaha-mirehitra.»] '
  '45':
  - type: text
    content: 'Raha mitarika anao amin’ny ratsy ny tongotrao ila, dia tapaho; fa aleo ianao tokan-tongotra nefa tafiditra any amin’ny fiainana toy izay ary tongotra roa nefa atsipy any amin’ny lohasahan’afo. [ '
  '46':
  - type: text
    content: 'Any, «ny olitra mivoaka amin’ny tena, tsy maty; ary ny afo, tsy mitsaha-mirehitra.»] '
  '47':
  - type: text
    content: 'Ary raha mitarika anao amin’ny ratsy ny masonao ila, dia esory; fa aleo ianao toka-maso nefa tafiditra any amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' toy izay ary maso roa nefa atsipy any amin’ny lohasahan’afo. '
  '48':
  - type: text
    content: Any, «ny olitra mivoaka amin’ny tena, tsy maty; ary ny afo, tsy mitsaha-mirehitra
  - type: note
    content: Ampit Is 66.24.
  - type: text
    content: .»
  '49':
  - type: text
    content: 'Eny, hodiovina amin’ny alalan’ny afo avokoa ny olona rehetra tahaka ny anadiovana ny sorona rehetra amin’ny alalan’ny sira. '
  '5':
  - type: text
    content: 'Dia hoy i Petera tamin’i Jesoa:'
  - type: text
    content: –Mpampianatra ô, tsara ho antsika ny mitoetra eto; koa hanao lay telo izahay; ny anankiray ho Anao, ny anankiray ho an’i Mosesy ary ny anankiray ho an’i Elià.
  '50':
  - type: text
    content: Zava-tsoa manko ny sira; kanefa raha ny sira no tonga matsatso, hataonareo ahoana indray no hamerina ny tsirony? Aoka ianareo hanana sira ao aminareo, ary aoka hanjaka eo aminareo ny fihavanana.
  '6':
  - type: text
    content: 'Fa tsy hitan’i Petera izay holazaina satria samy raiki-tahotra ireto mpianatra telo lahy. '
  '7':
  - type: text
    content: 'Tamin’izay dia nisy rahona nanarona azy rehetra, ary nisy feo avy tao amin’io rahona io nanao hoe:'
  - type: text
    content: –Ity no Zanako, ilay Malalako; henoy Izy
  - type: note
    content: Jereo 1.11 sy nta.
  - type: text
    content: '!'
  '8':
  - type: text
    content: Ary niaraka tamin’izay ireo mpianatra telo lahy dia nanopy maso manodidina, ka tsy nahita olona intsony teo aminy afa-tsy i Jesoa irery ihany.
  '9':
  - type: text
    content: 'Fony izy efa-mianaka nidina avy any an-tendrombohitra, dia izao no baiko nomen’i Jesoa azy telo lahy:'
  - type: text
    content: '–Aza mitantara na amin’iza na amin’iza ny zavatra vao hitanareo, mandra-pitsangan’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' ho velona avy any amin’ny maty.'
