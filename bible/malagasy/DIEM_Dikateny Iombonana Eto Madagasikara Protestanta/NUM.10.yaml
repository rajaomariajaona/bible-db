document_id: NUM.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny trômpetra volafotsy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy indray ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Manaova trômpetra volafotsy roa tsara voatefy, izay hataonao fiantsoana ny fiangonana sy fampiaingana ny toby
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Toby samihafa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo toko 2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa tsofiny miaraka izy ireo, dia hiangona eo aminao eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' ny fiangonana iray manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha ny anankiray ihany no tsofina, dia ireo tompon’andraikitra mpifehy arivo amin’ny israelita ihany no hiangona eo aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha arahina hoby kosa ny fitsofana ny trômpetra, dia hiainga ireo izay nitoby teo atsinanan’ny Tranolay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha miverina fanindroany ny fitsofana trômpetra arahina hoby, dia izay nitoby teo atsimo no hiainga. Fitsofana trômpetra arahin-koby no mariky ny fiaingana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny dkt tranainy grika eto dia manambara ny fitsofana fahatelo sy fahefatra izay manome ny fiaingana ho an’ny toby andrefana sy avaratra.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary raha ny fiangonana kosa no antsoina hivory, dia fitsofana lavareny no atao fa tsy arahina hoby akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Ireo mpisorona taranak’i Aharôna ihany no hitsoka ny trômpetra; lalàna raikitra ho anareo sy ny taranakareo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Raha hiantafika hiady amin’ny fahavalo izay mamely eo amin’ny taninareo ianareo, dia hotsofina ny trômpetra sady arahina hoby mba hampahatsiarovanareo Ahy TOMPO Andriamanitrareo hitsimbinako anareo ka hamonjeko anareo ho afaka amin’ny fahavalonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary amin’ny andro fety sy ny andro fifaliana ary amin’ny andro voalohan’ny volana dia hotsofinareo ny trômpetra, rehefa manao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo sy sorom-pihavanana ianareo. Hataonareo izany ho fampahatsiarovana Ahy Andriamanitrareo hitsimbinako anareo. Izaho no TOMPO Andriamanitrareo.»'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: HATREO SINAY KA HATRANY AMIN’NY SISINTANIN’I MÔABA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiaingan’ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’ny andro faha-roapolon’ny volana faharoa, tamin’ny taona faharoa nialana tany Ejipta, dia niakatra ny rahona niala teo ambonin’ny Tranolay nitahirizana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny fanekempihavanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.15-23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary niainga tao amin’ny taniefitr’i Sinay ny Israelita. Tany an-taniefitr’i Paràna kosa no nijanona ny rahona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izany no fiaingana voalohany nataon’ny Israelita, araka ny baikon’ny TOMPO nampitain’i Mosesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo toko 2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny fanevan’i Joda mbamin’ny antokon-tafiny no niainga voalohany. Ny tafiky ny taranak’i Joda dia notarihin’i Nahasôna, zanakalahin’i Haminadaba; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny an’ny fokon’i Jisakara dia notarihin’i Natanaela, zanakalahin’i Tsohara; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ary ny an’ny fokon’i Zebolòna dia notarihin’i Eliaba, zanakalahin’i Helôna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nahorona ny Fonena-masina, dia niainga nitondra azy ny taranak’i Gersôna sy ny taranak’i Merarỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny fanevan’i Reobena mbamin’ny antokon-tafiny no nanainga nanaraka ireo: ny tafiky ny taranak’i Reobena dia notarihin’i Elitsora, zanakalahin’i Sedeora; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny an’ny fokon’i Simehôna dia notarihin’i Selomiela, zanakalahin’i Tsorisaday; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ny an’ny fokon’i Gada dia notarihin’i Eliasafa, zanakalahin’i Dehoela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny niainga manaraka dia ny Kehatita nitondra ny fitaovana masina; ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' sasany dia nanangana ny tranolay mandra-pahatongan’izy ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny fanevan’i Efraîma mbamin’ny antokon-tafiny no nanainga manaraka; ny tafiky ny taranak’i Efraîma dia notarihin’i Elisamà, zanakalahin’i Hamihoda; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ny an’ny fokon’i Manase dia notarihin’i Gamaliela, zanakalahin’i Pedahatsoro; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ny an’ny fokon’i Benjamîna dia notarihin’Abidàna, zanakalahin’i Gidehônỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny fanevan’i Dàna mbamin’ny antokon-tafiny no nanainga farany. Izy ireo no vodilaharana; ny tafiky ny taranak’i Dana dia notarihin’i Ahihezera, zanakalahin’i Hamisaday; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ny an’ny fokon’i Asera dia notarihin’i Pagihiela, zanakalahin’i Hôkràna; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ary ny an’ny fokon’i Naftalỳ dia notarihin’i Ahira, zanakalahin’i Henàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izany no filaharan’ny Israelita mbamin’ny antokon-tafiny avy, rehefa niainga izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nitady izay ho mpitari-dalana i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hoy i Mosesy tamin’i Hôbaba zanakalahin’i Rehoela izay terak’i Midiana sady rafozandahin’i Mosesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 2.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandeha hankany amin’ny tany izay nolazain’ny TOMPO homena anay izahay. Ndeha hiaraka aminay ianao fa homenay anjara amin’ny zava-tsoa nampanantenain’ny TOMPO ho an’i Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa hoy izy namaly azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy handeha aho, fa hody any amin’ny taniko sy ny havako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hoy i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza ilaozanao izahay, fa ianao mahafantatra izay toerana azonay itobiana any an-taniefitra, koa dia ho mpitari-dalana anay ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Raha miaraka aminay ianao, dia homenay anjara amin’ny zava-tsoa hatolotry ny TOMPO anay. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Niala tao an-tendrombohitry ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ampit Eks 3.1 sy nta. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Ny tendrombohitry ny Tompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tsy inona fa ny tendrombohitra Sinay.'
    marker-yv: yv-n
  - type: text
    text: ' ireo Israelita ka nandeha lalana telo andro. Nialoha azy ireo tamin’izany lalana telo andro izany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: ' mirakitra ny fanekempihavanan’ny TOMPO mba hitady izay toerana hahafahan’ny vahoaka mitoby. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Teo ambonin’ny Israelita mba hanaloka azy ny rahon’ny TOMPO nandritra ny andro, tamin’ny fotoana izay niaingany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Rehefa niainga ny Vatamasina, dia hoy i Mosesy hoe: «Mitsangàna, TOMPO ô, aoka hihahaka ny fahavalonao, ary handositra anao ny mpankahala'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 68.1.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rehefa nijanona kosa ny Vatamasina, dia hoy i Mosesy hoe: «TOMPO ô, miverena eo anivon’ny fianakaviana anarivoarivon’i Israely».'
