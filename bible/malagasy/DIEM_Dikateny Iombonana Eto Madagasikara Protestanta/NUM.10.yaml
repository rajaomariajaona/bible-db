document_id: NUM.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny trômpetra volafotsy
  - type: text
    content: 'Hoy indray ny TOMPO tamin’i Mosesy:'
  '10':
  - type: text
    content: 'Ary amin’ny andro fety sy ny andro fifaliana ary amin’ny andro voalohan’ny volana dia hotsofinareo ny trômpetra, rehefa manao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana ianareo. Hataonareo izany ho fampahatsiarovana Ahy Andriamanitrareo hitsimbinako anareo. Izaho no TOMPO Andriamanitrareo.»'
  - type: heading
    content: HATREO SINAY KA HATRANY AMIN’NY SISINTANIN’I MÔABA
  - type: heading
    content: Ny fiaingan’ny Israelita
  '11':
  - type: text
    content: 'Tamin’ny andro faha-roapolon’ny volana faharoa, tamin’ny taona faharoa nialana tany Ejipta, dia niakatra ny rahona niala teo ambonin’ny Tranolay nitahirizana ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: note
    content: Jereo 9.15-23.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ary niainga tao amin’ny taniefitr’i Sinay ny Israelita. Tany an-taniefitr’i Paràna kosa no nijanona ny rahona. '
  '13':
  - type: text
    content: Izany no fiaingana voalohany nataon’ny Israelita, araka ny baikon’ny TOMPO nampitain’i Mosesy
  - type: note
    content: Jereo toko 2.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Ny fanevan’i Joda mbamin’ny antokon-tafiny no niainga voalohany. Ny tafiky ny taranak’i Joda dia notarihin’i Nahasôna, zanakalahin’i Haminadaba; '
  '15':
  - type: text
    content: 'ny an’ny fokon’i Jisakara dia notarihin’i Natanaela, zanakalahin’i Tsohara; '
  '16':
  - type: text
    content: ary ny an’ny fokon’i Zebolòna dia notarihin’i Eliaba, zanakalahin’i Helôna.
  '17':
  - type: text
    content: Nahorona ny Fonena-masina, dia niainga nitondra azy ny taranak’i Gersôna sy ny taranak’i Merarỳ.
  '18':
  - type: text
    content: 'Ny fanevan’i Reobena mbamin’ny antokon-tafiny no nanainga nanaraka ireo: ny tafiky ny taranak’i Reobena dia notarihin’i Elitsora, zanakalahin’i Sedeora; '
  '19':
  - type: text
    content: 'ny an’ny fokon’i Simehôna dia notarihin’i Selomiela, zanakalahin’i Tsorisaday; '
  '2':
  - type: text
    content: –Manaova trômpetra volafotsy roa tsara voatefy, izay hataonao fiantsoana ny fiangonana sy fampiaingana ny toby
  - type: note
    content: 'Toby samihafa: jereo toko 2.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: ny an’ny fokon’i Gada dia notarihin’i Eliasafa, zanakalahin’i Dehoela.
  '21':
  - type: text
    content: 'Ny niainga manaraka dia ny Kehatita nitondra ny fitaovana masina; ny '
  - type: text
    content: levita
  - type: text
    content: ' sasany dia nanangana ny tranolay mandra-pahatongan’izy ireo.'
  '22':
  - type: text
    content: 'Ny fanevan’i Efraîma mbamin’ny antokon-tafiny no nanainga manaraka; ny tafiky ny taranak’i Efraîma dia notarihin’i Elisamà, zanakalahin’i Hamihoda; '
  '23':
  - type: text
    content: 'ny an’ny fokon’i Manase dia notarihin’i Gamaliela, zanakalahin’i Pedahatsoro; '
  '24':
  - type: text
    content: ny an’ny fokon’i Benjamîna dia notarihin’Abidàna, zanakalahin’i Gidehônỳ.
  '25':
  - type: text
    content: 'Ny fanevan’i Dàna mbamin’ny antokon-tafiny no nanainga farany. Izy ireo no vodilaharana; ny tafiky ny taranak’i Dana dia notarihin’i Ahihezera, zanakalahin’i Hamisaday; '
  '26':
  - type: text
    content: 'ny an’ny fokon’i Asera dia notarihin’i Pagihiela, zanakalahin’i Hôkràna; '
  '27':
  - type: text
    content: ary ny an’ny fokon’i Naftalỳ dia notarihin’i Ahira, zanakalahin’i Henàna.
  '28':
  - type: text
    content: Izany no filaharan’ny Israelita mbamin’ny antokon-tafiny avy, rehefa niainga izy.
  - type: heading
    content: Nitady izay ho mpitari-dalana i Mosesy
  '29':
  - type: text
    content: Hoy i Mosesy tamin’i Hôbaba zanakalahin’i Rehoela izay terak’i Midiana sady rafozandahin’i Mosesy
  - type: note
    content: Jereo Eks 2.16 sy nta.
  - type: text
    content: ':'
  - type: text
    content: –Mandeha hankany amin’ny tany izay nolazain’ny TOMPO homena anay izahay. Ndeha hiaraka aminay ianao fa homenay anjara amin’ny zava-tsoa nampanantenain’ny TOMPO ho an’i Israely.
  '3':
  - type: text
    content: 'Rehefa tsofiny miaraka izy ireo, dia hiangona eo aminao eo anoloan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ny fiangonana iray manontolo. '
  '30':
  - type: text
    content: 'Fa hoy izy namaly azy:'
  - type: text
    content: –Tsy handeha aho, fa hody any amin’ny taniko sy ny havako.
  '31':
  - type: text
    content: 'Dia hoy i Mosesy hoe:'
  - type: text
    content: '–Aza ilaozanao izahay, fa ianao mahafantatra izay toerana azonay itobiana any an-taniefitra, koa dia ho mpitari-dalana anay ianao. '
  '32':
  - type: text
    content: 'Raha miaraka aminay ianao, dia homenay anjara amin’ny zava-tsoa hatolotry ny TOMPO anay. '
  '33':
  - type: text
    content: Niala tao an-tendrombohitry ny TOMPO
  - type: note
    content: Ampit Eks 3.1 sy nta. –Ny tendrombohitry ny Tompo dia tsy inona fa ny tendrombohitra Sinay.
  - type: text
    content: ' ireo Israelita ka nandeha lalana telo andro. Nialoha azy ireo tamin’izany lalana telo andro izany ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' mirakitra ny fanekempihavanan’ny TOMPO mba hitady izay toerana hahafahan’ny vahoaka mitoby. '
  '34':
  - type: text
    content: Teo ambonin’ny Israelita mba hanaloka azy ny rahon’ny TOMPO nandritra ny andro, tamin’ny fotoana izay niaingany.
  '35':
  - type: text
    content: 'Rehefa niainga ny Vatamasina, dia hoy i Mosesy hoe: «Mitsangàna, TOMPO ô, aoka hihahaka ny fahavalonao, ary handositra anao ny mpankahala'
  - type: note
    content: Jereo Sal 68.1.
  - type: text
    content: '!» '
  '36':
  - type: text
    content: 'Rehefa nijanona kosa ny Vatamasina, dia hoy i Mosesy hoe: «TOMPO ô, miverena eo anivon’ny fianakaviana anarivoarivon’i Israely».'
  '4':
  - type: text
    content: 'Fa raha ny anankiray ihany no tsofina, dia ireo tompon’andraikitra mpifehy arivo amin’ny israelita ihany no hiangona eo aminao. '
  '5':
  - type: text
    content: 'Raha arahina hoby kosa ny fitsofana ny trômpetra, dia hiainga ireo izay nitoby teo atsinanan’ny Tranolay fihaonana. '
  '6':
  - type: text
    content: Raha miverina fanindroany ny fitsofana trômpetra arahina hoby, dia izay nitoby teo atsimo no hiainga. Fitsofana trômpetra arahin-koby no mariky ny fiaingana
  - type: note
    content: Ny dkt tranainy grika eto dia manambara ny fitsofana fahatelo sy fahefatra izay manome ny fiaingana ho an’ny toby andrefana sy avaratra.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Ary raha ny fiangonana kosa no antsoina hivory, dia fitsofana lavareny no atao fa tsy arahina hoby akory.
  '8':
  - type: text
    content: «Ireo mpisorona taranak’i Aharôna ihany no hitsoka ny trômpetra; lalàna raikitra ho anareo sy ny taranakareo izany.
  '9':
  - type: text
    content: '«Raha hiantafika hiady amin’ny fahavalo izay mamely eo amin’ny taninareo ianareo, dia hotsofina ny trômpetra sady arahina hoby mba hampahatsiarovanareo Ahy TOMPO Andriamanitrareo hitsimbinako anareo ka hamonjeko anareo ho afaka amin’ny fahavalonareo. '
