document_id: PSA.48,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny tanànan’ilay Mpanjaka lehibe
  - type: text
    content: ' '
  - type: text
    content: Tononkira. Salamo nataon’ireo terak’i Kôra
  - type: text
    content: ' '
  - type: note
    content: Jereo Sal 42.1 sy nta.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Eto anivon’ny '
  - type: text
    content: tempolinao
  - type: text
    content: ', Andriamanitra ô,'
  - type: text
    content: no ametsovetsoanay ny fitiavanao.
  '11':
  - type: text
    content: Hatrany am-paran’ny tany ny lazanao,
  - type: text
    content: ka hatrany koa no hiderana Anao.
  - type: text
    content: Feno fahamarinana ny tananao ankavanana;
  '12':
  - type: text
    content: ary, noho ny fitsarana ara-drariny navoakanao,
  - type: text
    content: dia aoka hifaly ny olona ao an-tendrombohitra Tsiôna,
  - type: text
    content: aoka hiravo ny mponina ao an-tanànan’i Joda!
  '13':
  - type: text
    content: Mitanjozora manodidina an’i Tsiôna
  - type: text
    content: ka isaonareo ny tilikambony,
  '14':
  - type: text
    content: banjino tsara ny màndany,
  - type: text
    content: ary diniho fatratra ny lapany;
  - type: text
    content: dia ho azonareo tantaraina
  - type: text
    content: amin’ny taranaka any aoriana
  '15':
  - type: text
    content: fa io Andriamanitra io no Andriamanitsika mandrakizay,
  - type: text
    content: ary Izy mihitsy no hitantana antsika hatrany hatrany.
  '2':
  - type: text
    content: Lehibe ny TOMPO Andriamanitsika,
  - type: text
    content: hany ka mendrika hoderaina fatratra
  - type: text
    content: ao an-tanànany, ao an-tendrombohiny masina
  - type: note
    content: Jereo Sal 2.6.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Tsara fideza ny tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: 'sady fifalian’ny vahoaka eran-tany:'
  - type: text
    content: tendrombohitra fonenan’ny Tompo
  - type: note
    content: 'tendrombohitra fonenan’ny Tompo: jereo Is 14.13 sy nta.'
  - type: text
    content: ','
  - type: text
    content: tanànan’ilay Mpanjaka lehibe
  - type: note
    content: Jereo Mt 5.35.
  - type: text
    content: .
  '4':
  - type: text
    content: Ao an-dapany ao Andriamanitra
  - type: text
    content: no miseho ho fiarovana avo.
  '5':
  - type: text
    content: Indreny mpanjaka mivorivory,
  - type: text
    content: dia miara-mandroso hamely an’i Tsiôna;
  '6':
  - type: text
    content: kanjo nahatazana, dia nidonàka,
  - type: text
    content: nangorohoro ka riatra nandositra.
  '7':
  - type: text
    content: Nihovotrovotra foana teo izy ireo,
  - type: text
    content: nanaintaina toa vehivavy hiteraka;
  '8':
  - type: text
    content: mova tsy ny rivotra avy any atsinanana,
  - type: text
    content: izay mahapotika sambo goavana,
  - type: text
    content: no nifofofofo nianjady taminy.
  '9':
  - type: text
    content: Araka ny henonay no mbola hitanay
  - type: text
    content: ao an-tanànan’ny TOMPOn’izao rehetra izao,
  - type: text
    content: ao an-tanànan’ilay Andriamanitray!
  - type: text
    content: Izy Andriamanitra no mampijoro azy hatrany.
  - type: text
    content: Fiatoana
