  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eto anivon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempolinao
    - type: text
      text: ', Andriamanitra ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ametsovetsoanay ny fitiavanao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatrany am-paran’ny tany ny lazanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatrany koa no hiderana Anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno fahamarinana ny tananao ankavanana;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary, noho ny fitsarana ara-drariny navoakanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka hifaly ny olona ao an-tendrombohitra Tsiôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hiravo ny mponina ao an-tanànan’i Joda!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitanjozora manodidina an’i Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka isaonareo ny tilikambony,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: banjino tsara ny màndany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary diniho fatratra ny lapany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho azonareo tantaraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny taranaka any aoriana
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa io Andriamanitra io no Andriamanitsika mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy mihitsy no hitantana antsika hatrany hatrany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe ny TOMPO Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hany ka mendrika hoderaina fatratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao an-tanànany, ao an-tendrombohiny masina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 2.6.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsara fideza ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady fifalian’ny vahoaka eran-tany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tendrombohitra fonenan’ny Tompo
    - type: usfm
      marker: f
      children:
      - type: usfm
