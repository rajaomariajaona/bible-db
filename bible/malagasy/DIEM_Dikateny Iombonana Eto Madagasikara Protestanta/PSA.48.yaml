  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao an-dapany ao Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no miseho ho fiarovana avo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreny mpanjaka mivorivory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miara-mandroso hamely an’i Tsiôna;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo nahatazana, dia nidonàka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nangorohoro ka riatra nandositra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihovotrovotra foana teo izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanaintaina toa vehivavy hiteraka;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mova tsy ny rivotra avy any atsinanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mahapotika sambo goavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nifofofofo nianjady taminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny henonay no mbola hitanay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao an-tanànan’ny TOMPOn’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao an-tanànan’ilay Andriamanitray!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy Andriamanitra no mampijoro azy hatrany.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
