  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ao an-dapany ao Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no miseho ho fiarovana avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indreny mpanjaka mivorivory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miara-mandroso hamely an’i Tsiôna;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: kanjo nahatazana, dia nidonàka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nangorohoro ka riatra nandositra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nihovotrovotra foana teo izy ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanaintaina toa vehivavy hiteraka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: mova tsy ny rivotra avy any atsinanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mahapotika sambo goavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nifofofofo nianjady taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Araka ny henonay no mbola hitanay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-tanànan’ny TOMPOn’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-tanànan’ilay Andriamanitray!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy Andriamanitra no mampijoro azy hatrany.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eto anivon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempolinao
  - type: text
    text: ', Andriamanitra ô,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ametsovetsoanay ny fitiavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hatrany am-paran’ny tany ny lazanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatrany koa no hiderana Anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feno fahamarinana ny tananao ankavanana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary, noho ny fitsarana ara-drariny navoakanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka hifaly ny olona ao an-tendrombohitra Tsiôna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka hiravo ny mponina ao an-tanànan’i Joda!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitanjozora manodidina an’i Tsiôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka isaonareo ny tilikambony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: banjino tsara ny màndany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary diniho fatratra ny lapany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho azonareo tantaraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny taranaka any aoriana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: fa io Andriamanitra io no Andriamanitsika mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy mihitsy no hitantana antsika hatrany hatrany.
