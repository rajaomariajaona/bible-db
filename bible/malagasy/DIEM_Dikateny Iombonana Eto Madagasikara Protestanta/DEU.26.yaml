document_id: DEU.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiekem-pinoana fanao amin’ny fanaterana voaloham-bokatra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rahatrizay ianareo tafiditra ao amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho anjaranareo ka hahazo azy ho fanananareo sy hiorim-ponenana eo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia makà ampahan’ny voaloham-bokatra rehetra azonareo avy amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo, ka ataovy an-tsobika izany. Dia mankanesa amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo mba hipetrahan’ny voninahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 23.19.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary samia ianareo manatona ny mpisorona mpanao raharaha amin’izany andro izany, ka milazà aminy hoe: «Manambara amin’ny TOMPO Andriamanitrao aho anio fa tonga eto amin’ny tany izay nianianan’ny TOMPO tamin’ny razambentsika homena antsika.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia horaisin’ilay mpisorona kosa ny sobika eny an-tananareo ka hapetrany eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: 'n’ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary samy hiteny eo anatrehan’ny TOMPO Andriamanitrareo ianareo ka hanao hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Aramianina mpanjenjena ilay razambeko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I Jakôba no ambara eto, jereo Gen 25.20; 28–31.
    marker-yv: yv-n
  - type: text
    text: '; nidina nankany Ejipta izy, dia nivahiny tany niaraka tamin’olom-bitsy; ka tany izy no tonga firenena lehibe sy mahery sady maro isa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ratsy fitondra anay ny Ejiptianina ka nampahory anay sy nampanao anay fanompoana mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nitarainanay ilay TOMPO Andriamanitry ny razambenay, ka nohenoiny ny feonay ary hitany fa nahantra sy nijaly sady nampahorîna izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fiarovana mahery sy fahefana tsy hay tohaina ombàn’ny fampatahorana goavana sy famantarana ary zava-mahagaga no namoahan’ny TOMPO anay hiala tany Ejipta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary nentiny hiditra teto amin’ity tany ity izahay ka nomeny anay ity tany ity, dia tany tondra-dronono sy tantely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa ankehitriny, TOMPO ô, intỳ aho mitondra ny voaloham-bokatr’ilay tany izay efa nomenao ahy.»
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia samy hametraka izany zavatra izany eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasin
  - type: text
    text: '’ny TOMPO Andriamanitrareo ianareo sady hiankohoka hitsaoka ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Avy eo noho ny soa rehetra izay nomen’ny TOMPO Andriamanitrareo anareo, dia hifaly ianareo miaraka amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ' sy ny vahiny eo aminareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahafolon-karena isaky ny telo taona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Isaky ny telo taona no fanangonana ny fahafolon-karena. Ka rehefa tapitra voaavakareo ny fahafolon-karena rehetra avy amin’ny vokatrareo, dia omeo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ' sy ny vahiny ary ny kamboty sy ny mpitondratena izany mba hananany hanin-kahavoky azy ao an-tanànanareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 14.28-29.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary samia ianareo miteny eo anatrehan’ny TOMPO Andriamanitrareo hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Efa navoakako niala ny tranoko, TOMPO ô, ny zavatra voatokana ho Anao ka nomeko ny Levita sy ny vahiny ary ny kamboty sy ny mpitondratena, araka ny didy manontolo izay nampitainao tamiko; tsy nisy nodikaiko na nohadinoiko ny didinao ny amin’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireo zavatra ireo tsy nisy nohaniko fony aho nisaona, na navoakako ny tranoko fony aho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: naloto
  - type: text
    text: ' ara-pivavahana, na nomeko hatao fanatitra noho ny maty; fa efa nihaino ny feonao aho, ry TOMPO Andriamanitro, ka nanao araka izay rehetra nandidianao ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsinjovy avy ao amin’ny fonenanao masina any an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: danitra
  - type: text
    text: ' ka tahio ilay Israely vahoakanao sy ilay tany izay nomenao anay araka ny fianianana nataonao tamin’ny razambenay, dia tany tondra-dronono sy tantely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Israely vahoakan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Anio no andidian’ny TOMPO Andriamanitrareo anareo hanatanteraka ireo lalàna amam-pitsipika ireo; koa himasoanareo hotanterahina amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Efa nampiteneninareo ny TOMPO androany fa ho Andriamanitrareo Izy, ary ianareo hanaraka ny sori-dàlany ka hitandrina ny lalànany sy didy amam-pitsipiny ary hihaino ny feony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Efa nampitenenin’ny TOMPO kosa ianareo androany fa ho vahoaka fananany sarobidy indrindra ianareo, araka izay nampanantenainy taminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 19.5; Tit 2.14; 1Pt 2.9.
    marker-yv: yv-n
  - type: text
    text: ', sady hitandrina ny didiny rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eny, tiany hasandratra ho ambonin’ny firenena rehetra izay nataony ianareo na amin’ny voninahitra na amin’ny laza na amin’ny famirapiratana; dia ho vahoaka voatokana ho an’ny TOMPO Andriamanitrareo ianareo, araka izay nampanantenainy.
