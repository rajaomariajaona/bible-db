document_id: DEU.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiekem-pinoana fanao amin’ny fanaterana voaloham-bokatra
  - type: text
    content: 'Rahatrizay ianareo tafiditra ao amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho anjaranareo ka hahazo azy ho fanananareo sy hiorim-ponenana eo, '
  '10':
  - type: text
    content: Koa ankehitriny, TOMPO ô, intỳ aho mitondra ny voaloham-bokatr’ilay tany izay efa nomenao ahy.»
  - type: text
    content: 'Dia samy hametraka izany zavatra izany eo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO Andriamanitrareo ianareo sady hiankohoka hitsaoka ny TOMPO Andriamanitrareo. '
  '11':
  - type: text
    content: 'Avy eo noho ny soa rehetra izay nomen’ny TOMPO Andriamanitrareo anareo, dia hifaly ianareo miaraka amin’ny '
  - type: text
    content: Levita
  - type: text
    content: ' sy ny vahiny eo aminareo.'
  - type: heading
    content: Ny fahafolon-karena isaky ny telo taona
  '12':
  - type: text
    content: 'Isaky ny telo taona no fanangonana ny fahafolon-karena. Ka rehefa tapitra voaavakareo ny fahafolon-karena rehetra avy amin’ny vokatrareo, dia omeo ny '
  - type: text
    content: Levita
  - type: text
    content: ' sy ny vahiny ary ny kamboty sy ny mpitondratena izany mba hananany hanin-kahavoky azy ao an-tanànanareo'
  - type: note
    content: Jereo 14.28-29.
  - type: text
    content: '; '
  '13':
  - type: text
    content: 'ary samia ianareo miteny eo anatrehan’ny TOMPO Andriamanitrareo hoe:'
  - type: text
    content: '«Efa navoakako niala ny tranoko, TOMPO ô, ny zavatra voatokana ho Anao ka nomeko ny Levita sy ny vahiny ary ny kamboty sy ny mpitondratena, araka ny didy manontolo izay nampitainao tamiko; tsy nisy nodikaiko na nohadinoiko ny didinao ny amin’izany. '
  '14':
  - type: text
    content: 'Ireo zavatra ireo tsy nisy nohaniko fony aho nisaona, na navoakako ny tranoko fony aho '
  - type: text
    content: naloto
  - type: text
    content: ' ara-pivavahana, na nomeko hatao fanatitra noho ny maty; fa efa nihaino ny feonao aho, ry TOMPO Andriamanitro, ka nanao araka izay rehetra nandidianao ahy. '
  '15':
  - type: text
    content: Tsinjovy avy ao amin’ny fonenanao masina any an-
  - type: text
    content: danitra
  - type: text
    content: ' ka tahio ilay Israely vahoakanao sy ilay tany izay nomenao anay araka ny fianianana nataonao tamin’ny razambenay, dia tany tondra-dronono sy tantely'
  - type: note
    content: Jereo Eks 3.8 sy nta.
  - type: text
    content: .»
  - type: heading
    content: I Israely vahoakan’Andriamanitra
  '16':
  - type: text
    content: 'Anio no andidian’ny TOMPO Andriamanitrareo anareo hanatanteraka ireo lalàna amam-pitsipika ireo; koa himasoanareo hotanterahina amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo ireo. '
  '17':
  - type: text
    content: 'Efa nampiteneninareo ny TOMPO androany fa ho Andriamanitrareo Izy, ary ianareo hanaraka ny sori-dàlany ka hitandrina ny lalànany sy didy amam-pitsipiny ary hihaino ny feony. '
  '18':
  - type: text
    content: Efa nampitenenin’ny TOMPO kosa ianareo androany fa ho vahoaka fananany sarobidy indrindra ianareo, araka izay nampanantenainy taminareo
  - type: note
    content: Jereo Eks 19.5; Tit 2.14; 1Pt 2.9.
  - type: text
    content: ', sady hitandrina ny didiny rehetra. '
  '19':
  - type: text
    content: Eny, tiany hasandratra ho ambonin’ny firenena rehetra izay nataony ianareo na amin’ny voninahitra na amin’ny laza na amin’ny famirapiratana; dia ho vahoaka voatokana ho an’ny TOMPO Andriamanitrareo ianareo, araka izay nampanantenainy.
  '2':
  - type: text
    content: dia makà ampahan’ny voaloham-bokatra rehetra azonareo avy amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo, ka ataovy an-tsobika izany. Dia mankanesa amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo mba hipetrahan’ny voninahiny
  - type: note
    content: Jereo Eks 23.19.
  - type: text
    content: '; '
  '3':
  - type: text
    content: 'ary samia ianareo manatona ny mpisorona mpanao raharaha amin’izany andro izany, ka milazà aminy hoe: «Manambara amin’ny TOMPO Andriamanitrao aho anio fa tonga eto amin’ny tany izay nianianan’ny TOMPO tamin’ny razambentsika homena antsika.» '
  '4':
  - type: text
    content: 'Dia horaisin’ilay mpisorona kosa ny sobika eny an-tananareo ka hapetrany eo anoloan’ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO Andriamanitrareo. '
  '5':
  - type: text
    content: 'Ary samy hiteny eo anatrehan’ny TOMPO Andriamanitrareo ianareo ka hanao hoe:'
  - type: text
    content: «Aramianina mpanjenjena ilay razambeko
  - type: note
    content: I Jakôba no ambara eto, jereo Gen 25.20; 28–31.
  - type: text
    content: '; nidina nankany Ejipta izy, dia nivahiny tany niaraka tamin’olom-bitsy; ka tany izy no tonga firenena lehibe sy mahery sady maro isa. '
  '6':
  - type: text
    content: 'Ratsy fitondra anay ny Ejiptianina ka nampahory anay sy nampanao anay fanompoana mafy. '
  '7':
  - type: text
    content: 'Dia nitarainanay ilay TOMPO Andriamanitry ny razambenay, ka nohenoiny ny feonay ary hitany fa nahantra sy nijaly sady nampahorîna izahay. '
  '8':
  - type: text
    content: 'Fiarovana mahery sy fahefana tsy hay tohaina ombàn’ny fampatahorana goavana sy famantarana ary zava-mahagaga no namoahan’ny TOMPO anay hiala tany Ejipta; '
  '9':
  - type: text
    content: ary nentiny hiditra teto amin’ity tany ity izahay ka nomeny anay ity tany ity, dia tany tondra-dronono sy tantely
  - type: note
    content: Jereo Eks 3.8 sy nta.
  - type: text
    content: '. '
