document_id: ROM.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aza mitsara na manameloka namana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Raiso ny malemy finoana, fa aza melohina ny heviny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Kôr 8.7-13; 10.23-33.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Misy manana finoana matotra ka mihinana ny zavatra rehetra; misy kosa malemy finoana ka tsy mihinana afa-tsy zavamaniry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izay mihinana ny zavatra rehetra, aoka tsy hanamavo izay mifady ny sasany; ary izay mifady kosa, aoka tsy hanameloka izay mihinana; fa Andriamanitra no efa nandray azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa iza moa ianao no manameloka ny mpanompon’olon-kafa? Na mijoro izy na lavo, dia raharahan’ny tompony ihany izany. Hijoro anefa izy satria mahay mampijoro azy ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Misy indray manavakavaka ny andro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fomba amam-panao avy amin’ny fivavahana jiosy izany tsahivin’i Paoly izany. Ampit Gal 4.10; Kôl 2.16.
    marker-yv: yv-n
  - type: text
    text: ', misy kosa manao ny andro rehetra ho mitovy: aoka samy hatoky tsara ny ao amin’ny sainy avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay mitandrina ny andro, dia ho an’ny Tompo no itandremany izany; izay mihinana, dia ho an’ny Tompo no ihinanany, satria misaotra an’Andriamanitra koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy misy amintsika velon-ko an’ny tenany ary tsy misy maty ho an’ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny, velona isika, dia velona ho an’ny Tompo; maty isika, dia maty ho an’ny Tompo: koa na velona isika na maty, dia mbola an’ny Tompo ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satria maty i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' dia velona indray, mba ho Tompon’ny maty sy ny velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ianao kosa, nahoana no melohinao ny namanao? Ary ianao, nahoana no hamavoinao ny namanao? Fa samy hiseho eo anoloan’ny fitsaran’Andriamanitra isika rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'satria izao no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Raha velona koa Aho, hoy ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handohalika eo anatrehako ny olombelona rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiloa-bava avokoa hiaiky Ahy ho Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 45.23, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Noho izany, dia samy hampamoahin’Andriamanitra ny amin’ny tenantsika avy isika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aoka tsy hahasolafaka namana amin’ny ratsy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aoka mba tsy hifampitsara intsony àry isika. Fa aoka ianareo ho tapa-kevitra hanao izay tsy hahasolafaka ny namana amin’ny ratsy na izay tsy hitaomana azy amin’ny fahotana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tafaray amin’i Jesoa Tompo aho ka fantatro ary azoko antoka fa tsy misy zavatra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' fotsiny amin’izao, fa izay heverin’ny olona ho maloto no maloto aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha miteraka alahelo ho an’ny namanao ny fihinananao zavatra, dia tsy mizotra araka ny fitiavana intsony ianao. Aza simbànao amin’ny fihinananao zavatra ilay namanao fa efa maty i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ho famonjena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka tsy hampiteny ratsy ny sasany izay heverinao ho soa ho anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ho anao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'betsaka ny stf ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho anareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na koa ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho antsika.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa tsy izay mihinana na misotro no manana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ', fa izay manao ny marina sy mikatsaka fiadanana ary mifaly ao amin’ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ka izay manompo an’i Kristy araka izany no sitrak’Andriamanitra sady ankatoavin’ny olombelona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay mampitombo ny fiadanana àry no aoka hokatsahintsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'no aoka hokatsahintsika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: no hokatsahintsika.
    marker-yv: yv-n
  - type: text
    text: ', mbamin’izay ifanampiantsika hiorina amin’ny finoana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa aza izay sakafo no handravanao ny asan’Andriamanitra. Eny, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: ' ka azo hanina avokoa ny zavatra rehetra, nefa kosa ratsy ny mihinan-javatra raha mahasolafaka namana amin’ny ratsy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny tsara dia ny tsy mihinan-kena na misotro divay na mikasika akory izay mahasolafaka ny namanao amin’ny ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tano ho anao eo anatrehan’Andriamanitra izay itokianao ho marina. Sambatra izay tsy melohin’ny eritreriny amin’ny zavatra ankatoaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa izay miahanahana dia melohin’Andriamanitra, raha mihinana, satria tsy vokatry ny finoana no ihinanany. Fa izay rehetra tsy vokatry ny finoana dia fahotana avokoa.
