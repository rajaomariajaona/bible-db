document_id: ROM.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Aza mitsara na manameloka namana
  - type: text
    content: Raiso ny malemy finoana, fa aza melohina ny heviny
  - type: note
    content: Ampit 1Kôr 8.7-13; 10.23-33.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ianao kosa, nahoana no melohinao ny namanao? Ary ianao, nahoana no hamavoinao ny namanao? Fa samy hiseho eo anoloan’ny fitsaran’Andriamanitra isika rehetra, '
  '11':
  - type: text
    content: 'satria izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Raha velona koa Aho, hoy ny Tompo,
  - type: text
    content: dia handohalika eo anatrehako ny olombelona rehetra
  - type: text
    content: ary hiloa-bava avokoa hiaiky Ahy ho Andriamanitra
  - type: note
    content: Is 45.23, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!»'
  '12':
  - type: text
    content: Noho izany, dia samy hampamoahin’Andriamanitra ny amin’ny tenantsika avy isika.
  - type: heading
    content: Aoka tsy hahasolafaka namana amin’ny ratsy
  '13':
  - type: text
    content: 'Aoka mba tsy hifampitsara intsony àry isika. Fa aoka ianareo ho tapa-kevitra hanao izay tsy hahasolafaka ny namana amin’ny ratsy na izay tsy hitaomana azy amin’ny fahotana. '
  '14':
  - type: text
    content: 'Tafaray amin’i Jesoa Tompo aho ka fantatro ary azoko antoka fa tsy misy zavatra '
  - type: text
    content: maloto
  - type: text
    content: ' fotsiny amin’izao, fa izay heverin’ny olona ho maloto no maloto aminy. '
  '15':
  - type: text
    content: 'Raha miteraka alahelo ho an’ny namanao ny fihinananao zavatra, dia tsy mizotra araka ny fitiavana intsony ianao. Aza simbànao amin’ny fihinananao zavatra ilay namanao fa efa maty i '
  - type: text
    content: Kristy
  - type: text
    content: ' ho famonjena azy. '
  '16':
  - type: text
    content: Aoka tsy hampiteny ratsy ny sasany izay heverinao ho soa ho anao
  - type: note
    content: 'ho anao: betsaka ny stf ahitana ny hoe ho anareo na koa ny hoe ho antsika.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Fa tsy izay mihinana na misotro no manana ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ', fa izay manao ny marina sy mikatsaka fiadanana ary mifaly ao amin’ny Fanahy Masina. '
  '18':
  - type: text
    content: Ka izay manompo an’i Kristy araka izany no sitrak’Andriamanitra sady ankatoavin’ny olombelona.
  '19':
  - type: text
    content: Izay mampitombo ny fiadanana àry no aoka hokatsahintsika
  - type: note
    content: 'no aoka hokatsahintsika: misy stf sasany ahitana hoe no hokatsahintsika.'
  - type: text
    content: ', mbamin’izay ifanampiantsika hiorina amin’ny finoana; '
  '2':
  - type: text
    content: 'Misy manana finoana matotra ka mihinana ny zavatra rehetra; misy kosa malemy finoana ka tsy mihinana afa-tsy zavamaniry. '
  '20':
  - type: text
    content: 'fa aza izay sakafo no handravanao ny asan’Andriamanitra. Eny, '
  - type: text
    content: madio
  - type: text
    content: ' ka azo hanina avokoa ny zavatra rehetra, nefa kosa ratsy ny mihinan-javatra raha mahasolafaka namana amin’ny ratsy izany. '
  '21':
  - type: text
    content: 'Ny tsara dia ny tsy mihinan-kena na misotro divay na mikasika akory izay mahasolafaka ny namanao amin’ny ratsy. '
  '22':
  - type: text
    content: 'Tano ho anao eo anatrehan’Andriamanitra izay itokianao ho marina. Sambatra izay tsy melohin’ny eritreriny amin’ny zavatra ankatoaviny. '
  '23':
  - type: text
    content: Fa izay miahanahana dia melohin’Andriamanitra, raha mihinana, satria tsy vokatry ny finoana no ihinanany. Fa izay rehetra tsy vokatry ny finoana dia fahotana avokoa.
  '3':
  - type: text
    content: 'Izay mihinana ny zavatra rehetra, aoka tsy hanamavo izay mifady ny sasany; ary izay mifady kosa, aoka tsy hanameloka izay mihinana; fa Andriamanitra no efa nandray azy. '
  '4':
  - type: text
    content: Fa iza moa ianao no manameloka ny mpanompon’olon-kafa? Na mijoro izy na lavo, dia raharahan’ny tompony ihany izany. Hijoro anefa izy satria mahay mampijoro azy ny Tompo.
  '5':
  - type: text
    content: Misy indray manavakavaka ny andro
  - type: note
    content: Fomba amam-panao avy amin’ny fivavahana jiosy izany tsahivin’i Paoly izany. Ampit Gal 4.10; Kôl 2.16.
  - type: text
    content: ', misy kosa manao ny andro rehetra ho mitovy: aoka samy hatoky tsara ny ao amin’ny sainy avy. '
  '6':
  - type: text
    content: 'Izay mitandrina ny andro, dia ho an’ny Tompo no itandremany izany; izay mihinana, dia ho an’ny Tompo no ihinanany, satria misaotra an’Andriamanitra koa izy. '
  '7':
  - type: text
    content: 'Fa tsy misy amintsika velon-ko an’ny tenany ary tsy misy maty ho an’ny tenany. '
  '8':
  - type: text
    content: 'Eny, velona isika, dia velona ho an’ny Tompo; maty isika, dia maty ho an’ny Tompo: koa na velona isika na maty, dia mbola an’ny Tompo ihany. '
  '9':
  - type: text
    content: 'Satria maty i '
  - type: text
    content: Kristy
  - type: text
    content: ' dia velona indray, mba ho Tompon’ny maty sy ny velona. '
