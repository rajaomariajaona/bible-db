document_id: 1KI.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niala tamin’ny Tompo i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ankoatra ny zanakavavin’ny Farao, dia nanambady vehivavy maro hafa firenena koa i Salômôna mpanjaka, dia vehivavy môabita sy hamônita sy edômita ary tsidônianina sy hetita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 19.17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ary nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Satria nanao izao fitondrantena izao ianao, ka tsy nitandrina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' sy ny didy izay nomeko anao, dia hoendahako aminao tokoa ny fanjakana ka homeko ny olom-pehezinao. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Kanefa, noho ny amin’i Davida rainao, dia tsy hataoko amin’ny andronao izany; fa rehefa mby amin’ny zanakao kosa vao hoendahako eo am-pelatanany ny fanjakana. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Saingy tsy hoendahako aminy avokoa akory ny fanjakana manontolo, fa hamelako foko iray ihany izy noho i Davida mpanompoko ary noho i Jerosalema izay nofidiko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo mpanohitra an’i Salômôna
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary nanangana olona iray hanohitra an’i Salômôna ny TOMPO, dia i Hadada izay Edômita taranaky ny mpanjakan’i Edôma.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tamin’ny fotoana niadian’i Davida tamin’ny fanjakan’i Edôma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Sam 8.13-14.
      marker-yv: yv-n
    - type: text
      text: ' no nitrangan’izany. Nandeha tany i Jôaba filohan-tafika handevina ny Israelita maty an’ady; ary avy eo izy dia nampandringana ny lehilahy edômita rehetra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa nitoetra enim-bolana tany Edôma i Jôaba sy ny tafik’i Israely manontolo mandra-pandringana ny lehilahy rehetra tany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Kanefa i Hadada, izay mbola tovolahy kely tamin’izay, dia afaka nandositra tany Ejipta niaraka tamin’ny Edômita sasany tandapan-drainy; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: nandao ny faritr’i Midiana ireo ka tonga tany an-taniefitra Paràna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Midiana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'faritra atsimo amin’ny fanjakan’i Edôma; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'taniefitra Paràna:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' faritany eo anelanelan’i Palestinina sy ny saikanosin’i Sinay.'
      marker-yv: yv-n
    - type: text
      text: '. Tao izy no nitondra lehilahy hiaraka aminy hankany Ejipta, ho ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' mpanjaka izay nanome azy trano sy tany ary nampanantena azy hanina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nahita fitia fatratra teo imason’ny Farao i Hadada, ka dia nomeny azy ho vady ny rahavavin’i Tahapenesa vadiny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ireo vehivavy ireo anefa dia avy amin’ny firenena izay nolazain’ny TOMPO tamin’ny Israelita hoe: «Aza miharoharo amin’ireo hafa firenena ireo ianareo ary aza avela hiharo aminareo koa izy, fa hitarika anareo hanaraka ny fanompoam-pivavahana fanaony amin’ireo andriamaniny izy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 34.15-16; Deot 7.3-4.
      marker-yv: yv-n
    - type: text
      text: '.» Nefa dia tamin’ireo no niraiketan’ny fitiavan’i Salômôna; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary nitera-dahy tamin’i Hadada ny rahavavin’i Tahapenesa, dia i Genôbata izay notezain’i Tahapanesa sady niara-nipetraka tamin’ny zanakalahin’ny Farao tao an-dapa.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Rehefa ren’i Hadada tany Ejipta fa maty i Davida sy i Jôaba filohan’ny tafika, dia hoy izy tamin’ny Farao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avelao aho hody any amin’ny taniko.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa ny Farao kosa niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no mahory anao eto amiko, no mitady hody any amin’ny taninao indray ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy misy na dia kely aza, saingy avelao ihany aho handeha!
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary nanangana olon-kafa koa Andriamanitra mba hanohitra an’i Salômôna, dia i Rezôna izay zanakalahin’i Eliadà sady efa nandositra an’i Hadadehezera tompony, mpanjakan’i Tsôbà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hadadehezera tompony, mpanjakan’i Tsôbà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Sam 8.3-8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tamin’ny fotoana nandringanan’i Davida ny tafik’i Hadadehezera, dia novorin’i Rezôna teo aminy ny vatan-dehilahy maro ka izy no nitsangana ho filohan’ireo; ary nankany Damasy izy sy ny namany ka nitoetra sy nanjaka tao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa nandritra ny androm-piainan’i Salômôna dia mpanohitra an’i Israely i Rezôna ka nanampy trotraka ny ratsy nataon’i Hadada. Nankahala an’i Israely izy fony nanjaka tamin’i Siria
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Siria: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'raha i Rezôna no lazaina; kanefa misy stf ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Edôma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ka i Hadada kosa no lazaina amin’izay.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fikomian’i Jerôbohama
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 9.29-31)
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-27
    - type: text
      text: 'Nisy koa ny fikomian’i Jerôbohama tamin’ny mpanjaka. Izao ny tantarany: I Jerôbohama, zanakalahin’i Nebata, dia Efraîmita avy any Tseredà; ny reniny dia mpitondratena nantsoina hoe Tserohà; ary izy dia mba mpanompon’i Salômôna saingy nikomy taminy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tamin’ny fotoana nanaovan’i Salômôna ny Milao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Milao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 9.15 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sy nanamboarana ny rimbona tamin’ny mandan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: ' rainy, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'dia tovolahy mahay sady mahavita tsara ny asany i Jerôbohama; koa nony hitan’i Salômôna izany, dia nataony mpifehy ireo mpiasan’ny fokon’i Efraîma sy i Manase izy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Indray andro raha nivoaka an’i Jerosalema i Jerôbohama, dia tafahaona tamin’i Ahià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' avy any Silao teny an-dalana. Nitafy lamba vaovao i Ahià, ary izy roa lahy ihany no tany an-tsaha. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'fa nanana vady andriambavy fitonjato sy vaditsindrano telonjato izy. Ireo vadiny ireo no nampivily ny fon’i Salômôna. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia noraisin’i Ahià ny lamba vaovao teny aminy ka notriatriariny ho tonga tapany 12; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ary hoy izy tamin’i Jerôbohama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raiso ho anao ny tapany folo, fa izao no lazain’ny TOMPO Andriamanitr’i Israely: Indro efa hoendahako eo an-tanan’i Salômôna ny fanjakana ka homeko anao ny foko folo, '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: fa ny foko iray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Efa hatry ny ela ny fokon’i Joda no nitelina miandalana ny fokon’i Simehôna akaiky azy sady kely. Nefa jereo koa 12.21 izay ahitana ny fifehezan’i Rehabohama ireo fokon’i Joda sy i Benjamîna.
      marker-yv: yv-n
    - type: text
      text: ' ihany sisa no havelako ho azy noho ny amin’i Davida mpanompoko sy i Jerosalema tanàna nofidiko tamin’ny foko israelita rehetra. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Hataoko izany satria efa nandao Ahy ireo ka niankohoka teo anatrehan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hastôreta
    - type: text
      text: ' andriamani-bavin’ny Tsidônianina, sy teo anatrehan’i Kemôsy andriamanitry ny Môabita, ary teo anatrehan’i Milkôma andriamanitry ny Hamônita; fa tsy mba ny sori-dalako no nizorany hanaovana izay mahitsy eo imasoko ary hitandremana ny lalàna amam-pitsipiko tahaka ny nataon’i Davida rain’i Salômôna. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Nefa tsy hoesoriko eo an-tanan’i Salômôna izany fanjakana manontolo izany fa efa nataoko ho filohan’ny vahoakako amin’ny andro rehetra iainany izy noho ny amin’i Davida mpanompoko izay nofidiko sady nitandrina ny didy aman-dalànako. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Saingy hoesoriko eo an-tanan-janany kosa ny fanjakana, ka homeko anao ny foko folo. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Homeko foko iray ihany ny zanakalahiny mba hisy mandrakariva, ho an’i Davida mpanompoko, taranaka iray hanjaka eo anatrehako any Jerosalema izay tanàna nofidiko hampitoerako ny voninahitro.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: '«Ianao kosa, ry Jerôbohama, no halaiko hanjaka amin’izay sehatra rehetra irinao ka ho mpanjaka amin’i Israely. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Raha henoinao izay rehetra andidiako anao ka izoranao ny sori-dalako ary ataonao izay mahitsy eo imasoko sady tandremanao ny lalànako sy ny didiko tahaka ny nataon’i Davida mpanompoko, dia hiaraka aminao Aho ka hampiorina taranaka maharitra ho anao tahaka izay nataoko tamin’i Davida; ary dia homeko anao i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Israely: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo foko folo any avaratra no ambara amin’izany.
      marker-yv: yv-n
    - type: text
      text: ', '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: mba hampietreko ny taranak’i Davida –nefa tsy ho mandrakizay akory izany.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rehefa antitra i Salômôna, dia notarihin’ny vadiny hanaraka andriamani-kafa; ka tsy tokam-po tamin’ny TOMPO Andriamaniny toa an’i Davida rainy intsony izy, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Koa nitady hahafaty an’i Jerôbohama i Salômôna; fa i Jerôbohama kosa lasa nandositra tany Ejipta ka nialokaloka tao amin’i Sisàka mpanjakan’io tany io mandra-pahafatin’i Salômôna.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Salômôna ary koa ny zavatra hafa rehetra nataony sy ny fahendreny dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’i Salômôna
    - type: text
      text: '. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ny nanjakàn’i Salômôna tao Jerosalema, tamin’i Israely manontolo, dia naharitra efapolo taona. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany i Salômôna, dia nalevina tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: ' rainy; ary i Rehabohama zanany lahy no nanjaka nandimby azy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'fa nanompo an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hastôreta
    - type: text
      text: ' andriamani-bavin’ny Tsidônianina sy nanompo an’i Milkôma andriamani-tsampin’ny Hamônita. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nanao izay ratsy eo imason’ny TOMPO izy, ka tsy nanaraka tanteraka AZY tahaka ny nataon’i Davida rainy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tamin’izany i Salômôna dia nanangana toeram-panasinana teo amin’ny havoana tandrifin’i Jerosalema mba ho an’i Kemôsy andriamani-tsampin’ny Môabita ary koa mba ho an’i Milkôma
