document_id: 1KI.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Niala tamin’ny Tompo i Salômôna
  - type: text
    content: Ankoatra ny zanakavavin’ny Farao, dia nanambady vehivavy maro hafa firenena koa i Salômôna mpanjaka, dia vehivavy môabita sy hamônita sy edômita ary tsidônianina sy hetita
  - type: note
    content: Jereo Deot 19.17.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'ary nilazany hoe:'
  - type: text
    content: '–Satria nanao izao fitondrantena izao ianao, ka tsy nitandrina ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' sy ny didy izay nomeko anao, dia hoendahako aminao tokoa ny fanjakana ka homeko ny olom-pehezinao. '
  '12':
  - type: text
    content: 'Kanefa, noho ny amin’i Davida rainao, dia tsy hataoko amin’ny andronao izany; fa rehefa mby amin’ny zanakao kosa vao hoendahako eo am-pelatanany ny fanjakana. '
  '13':
  - type: text
    content: Saingy tsy hoendahako aminy avokoa akory ny fanjakana manontolo, fa hamelako foko iray ihany izy noho i Davida mpanompoko ary noho i Jerosalema izay nofidiko.
  - type: heading
    content: Ireo mpanohitra an’i Salômôna
  '14':
  - type: text
    content: Ary nanangana olona iray hanohitra an’i Salômôna ny TOMPO, dia i Hadada izay Edômita taranaky ny mpanjakan’i Edôma.
  '15':
  - type: text
    content: Tamin’ny fotoana niadian’i Davida tamin’ny fanjakan’i Edôma
  - type: note
    content: Jereo 2 Sam 8.13-14.
  - type: text
    content: ' no nitrangan’izany. Nandeha tany i Jôaba filohan-tafika handevina ny Israelita maty an’ady; ary avy eo izy dia nampandringana ny lehilahy edômita rehetra. '
  '16':
  - type: text
    content: 'Fa nitoetra enim-bolana tany Edôma i Jôaba sy ny tafik’i Israely manontolo mandra-pandringana ny lehilahy rehetra tany. '
  '17':
  - type: text
    content: 'Kanefa i Hadada, izay mbola tovolahy kely tamin’izay, dia afaka nandositra tany Ejipta niaraka tamin’ny Edômita sasany tandapan-drainy; '
  '18':
  - type: text
    content: nandao ny faritr’i Midiana ireo ka tonga tany an-taniefitra Paràna
  - type: note
    content: 'Midiana: faritra atsimo amin’ny fanjakan’i Edôma; taniefitra Paràna: faritany eo anelanelan’i Palestinina sy ny saikanosin’i Sinay.'
  - type: text
    content: '. Tao izy no nitondra lehilahy hiaraka aminy hankany Ejipta, ho ao amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjaka izay nanome azy trano sy tany ary nampanantena azy hanina. '
  '19':
  - type: text
    content: 'Nahita fitia fatratra teo imason’ny Farao i Hadada, ka dia nomeny azy ho vady ny rahavavin’i Tahapenesa vadiny. '
  '2':
  - type: text
    content: 'Ireo vehivavy ireo anefa dia avy amin’ny firenena izay nolazain’ny TOMPO tamin’ny Israelita hoe: «Aza miharoharo amin’ireo hafa firenena ireo ianareo ary aza avela hiharo aminareo koa izy, fa hitarika anareo hanaraka ny fanompoam-pivavahana fanaony amin’ireo andriamaniny izy'
  - type: note
    content: Jereo Eks 34.15-16; Deot 7.3-4.
  - type: text
    content: '.» Nefa dia tamin’ireo no niraiketan’ny fitiavan’i Salômôna; '
  '20':
  - type: text
    content: Ary nitera-dahy tamin’i Hadada ny rahavavin’i Tahapenesa, dia i Genôbata izay notezain’i Tahapanesa sady niara-nipetraka tamin’ny zanakalahin’ny Farao tao an-dapa.
  '21':
  - type: text
    content: 'Rehefa ren’i Hadada tany Ejipta fa maty i Davida sy i Jôaba filohan’ny tafika, dia hoy izy tamin’ny Farao:'
  - type: text
    content: –Avelao aho hody any amin’ny taniko.
  '22':
  - type: text
    content: 'Fa ny Farao kosa niteny taminy hoe:'
  - type: text
    content: –Inona no mahory anao eto amiko, no mitady hody any amin’ny taninao indray ianao?
  - type: text
    content: 'Dia hoy ny navaliny:'
  - type: text
    content: –Tsy misy na dia kely aza, saingy avelao ihany aho handeha!
  '23':
  - type: text
    content: Ary nanangana olon-kafa koa Andriamanitra mba hanohitra an’i Salômôna, dia i Rezôna izay zanakalahin’i Eliadà sady efa nandositra an’i Hadadehezera tompony, mpanjakan’i Tsôbà
  - type: note
    content: 'Hadadehezera tompony, mpanjakan’i Tsôbà: jereo 2 Sam 8.3-8.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Tamin’ny fotoana nandringanan’i Davida ny tafik’i Hadadehezera, dia novorin’i Rezôna teo aminy ny vatan-dehilahy maro ka izy no nitsangana ho filohan’ireo; ary nankany Damasy izy sy ny namany ka nitoetra sy nanjaka tao. '
  '25':
  - type: text
    content: Fa nandritra ny androm-piainan’i Salômôna dia mpanohitra an’i Israely i Rezôna ka nanampy trotraka ny ratsy nataon’i Hadada. Nankahala an’i Israely izy fony nanjaka tamin’i Siria
  - type: note
    content: 'Siria: raha i Rezôna no lazaina; kanefa misy stf ahitana hoe Edôma, ka i Hadada kosa no lazaina amin’izay.'
  - type: text
    content: .
  - type: heading
    content: Ny fikomian’i Jerôbohama
  - type: heading
    content: (Jereo 2 Tan 9.29-31)
  '26':
  - type: text
    content: 'Nisy koa ny fikomian’i Jerôbohama tamin’ny mpanjaka. Izao ny tantarany: I Jerôbohama, zanakalahin’i Nebata, dia Efraîmita avy any Tseredà; ny reniny dia mpitondratena nantsoina hoe Tserohà; ary izy dia mba mpanompon’i Salômôna saingy nikomy taminy.'
  - type: text
    content: Fa tamin’ny fotoana nanaovan’i Salômôna ny Milao
  - type: note
    content: 'Milao: jereo 9.15 sy nta.'
  - type: text
    content: ' sy nanamboarana ny rimbona tamin’ny mandan’ny '
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ' rainy, '
  '28':
  - type: text
    content: 'dia tovolahy mahay sady mahavita tsara ny asany i Jerôbohama; koa nony hitan’i Salômôna izany, dia nataony mpifehy ireo mpiasan’ny fokon’i Efraîma sy i Manase izy. '
  '29':
  - type: text
    content: 'Indray andro raha nivoaka an’i Jerosalema i Jerôbohama, dia tafahaona tamin’i Ahià '
  - type: text
    content: mpaminany
  - type: text
    content: ' avy any Silao teny an-dalana. Nitafy lamba vaovao i Ahià, ary izy roa lahy ihany no tany an-tsaha. '
  '3':
  - type: text
    content: 'fa nanana vady andriambavy fitonjato sy vaditsindrano telonjato izy. Ireo vadiny ireo no nampivily ny fon’i Salômôna. '
  '30':
  - type: text
    content: 'Dia noraisin’i Ahià ny lamba vaovao teny aminy ka notriatriariny ho tonga tapany 12; '
  '31':
  - type: text
    content: 'ary hoy izy tamin’i Jerôbohama:'
  - type: text
    content: '–Raiso ho anao ny tapany folo, fa izao no lazain’ny TOMPO Andriamanitr’i Israely: Indro efa hoendahako eo an-tanan’i Salômôna ny fanjakana ka homeko anao ny foko folo, '
  '32':
  - type: text
    content: fa ny foko iray
  - type: note
    content: Efa hatry ny ela ny fokon’i Joda no nitelina miandalana ny fokon’i Simehôna akaiky azy sady kely. Nefa jereo koa 12.21 izay ahitana ny fifehezan’i Rehabohama ireo fokon’i Joda sy i Benjamîna.
  - type: text
    content: ' ihany sisa no havelako ho azy noho ny amin’i Davida mpanompoko sy i Jerosalema tanàna nofidiko tamin’ny foko israelita rehetra. '
  '33':
  - type: text
    content: 'Hataoko izany satria efa nandao Ahy ireo ka niankohoka teo anatrehan’i '
  - type: text
    content: Hastôreta
  - type: text
    content: ' andriamani-bavin’ny Tsidônianina, sy teo anatrehan’i Kemôsy andriamanitry ny Môabita, ary teo anatrehan’i Milkôma andriamanitry ny Hamônita; fa tsy mba ny sori-dalako no nizorany hanaovana izay mahitsy eo imasoko ary hitandremana ny lalàna amam-pitsipiko tahaka ny nataon’i Davida rain’i Salômôna. '
  '34':
  - type: text
    content: 'Nefa tsy hoesoriko eo an-tanan’i Salômôna izany fanjakana manontolo izany fa efa nataoko ho filohan’ny vahoakako amin’ny andro rehetra iainany izy noho ny amin’i Davida mpanompoko izay nofidiko sady nitandrina ny didy aman-dalànako. '
  '35':
  - type: text
    content: 'Saingy hoesoriko eo an-tanan-janany kosa ny fanjakana, ka homeko anao ny foko folo. '
  '36':
  - type: text
    content: Homeko foko iray ihany ny zanakalahiny mba hisy mandrakariva, ho an’i Davida mpanompoko, taranaka iray hanjaka eo anatrehako any Jerosalema izay tanàna nofidiko hampitoerako ny voninahitro.
  '37':
  - type: text
    content: '«Ianao kosa, ry Jerôbohama, no halaiko hanjaka amin’izay sehatra rehetra irinao ka ho mpanjaka amin’i Israely. '
  '38':
  - type: text
    content: Raha henoinao izay rehetra andidiako anao ka izoranao ny sori-dalako ary ataonao izay mahitsy eo imasoko sady tandremanao ny lalànako sy ny didiko tahaka ny nataon’i Davida mpanompoko, dia hiaraka aminao Aho ka hampiorina taranaka maharitra ho anao tahaka izay nataoko tamin’i Davida; ary dia homeko anao i Israely
  - type: note
    content: 'Israely: ireo foko folo any avaratra no ambara amin’izany.'
  - type: text
    content: ', '
  '39':
  - type: text
    content: mba hampietreko ny taranak’i Davida –nefa tsy ho mandrakizay akory izany.»
  '4':
  - type: text
    content: 'Rehefa antitra i Salômôna, dia notarihin’ny vadiny hanaraka andriamani-kafa; ka tsy tokam-po tamin’ny TOMPO Andriamaniny toa an’i Davida rainy intsony izy, '
  '40':
  - type: text
    content: Koa nitady hahafaty an’i Jerôbohama i Salômôna; fa i Jerôbohama kosa lasa nandositra tany Ejipta ka nialokaloka tao amin’i Sisàka mpanjakan’io tany io mandra-pahafatin’i Salômôna.
  '41':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Salômôna ary koa ny zavatra hafa rehetra nataony sy ny fahendreny dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’i Salômôna
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'Ny nanjakàn’i Salômôna tao Jerosalema, tamin’i Israely manontolo, dia naharitra efapolo taona. '
  '43':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Salômôna, dia nalevina tao an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ' rainy; ary i Rehabohama zanany lahy no nanjaka nandimby azy.'
  '5':
  - type: text
    content: 'fa nanompo an’i '
  - type: text
    content: Hastôreta
  - type: text
    content: ' andriamani-bavin’ny Tsidônianina sy nanompo an’i Milkôma andriamani-tsampin’ny Hamônita. '
  '6':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO izy, ka tsy nanaraka tanteraka AZY tahaka ny nataon’i Davida rainy. '
  '7':
  - type: text
    content: Tamin’izany i Salômôna dia nanangana toeram-panasinana teo amin’ny havoana tandrifin’i Jerosalema mba ho an’i Kemôsy andriamani-tsampin’ny Môabita ary koa mba ho an’i Milkôma
  - type: note
    content: 'Milkôma: araka ny and 5 sy 33, ary ny dkt tranainy grika; ny hebreo dia Môleka.'
  - type: text
    content: 'andriamani-tsampin’ny Hamônita. '
  '8':
  - type: text
    content: 'Nanaovany toy izany avokoa ireo andriamanitry ny vadiny hafa firenena mba hahazoany mandoro zava-manitra mifangaro sy manao sorona. '
  '9':
  - type: text
    content: Niseho indroa
  - type: note
    content: 'Indroa: jereo 3.4-15; 9.1-9.'
  - type: text
    content: ' tamin’i Salômôna ny TOMPO Andriamanitr’i Israely ka nandidy azy marimarina mba tsy hanaraka andriamani-kafa; kanefa tsy nitandrina izany i Salômôna fa nampivily fo hiala taminy. Koa dia nisafoahan’ny TOMPO i Salômôna '
