document_id: 2SA.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiverenan’i Absalôma tao Jerosalema
  - type: text
    content: 'Tsapan’i Jôaba zanakalahin’i Tseroià fa tezitra tamin’i Absalôma ny fon’ny mpanjaka. '
  '10':
  - type: text
    content: 'Dia hoy ny mpanjaka hoe:'
  - type: text
    content: –Raha mbola misy olona miteny anao, dia ento atỳ amiko, fa tsy hamerina izany intsony aminao izy.
  '11':
  - type: text
    content: 'Hoy ihany ravehivavy taminy:'
  - type: text
    content: –Ry andriamanjaka ô, mangataha amin’ny TOMPO Andriamanitrao mba tsy hampian’ny mpamaly faty
  - type: note
    content: 'ny mpamaly faty: jereo Nom 35.9-29; Deot 19.4-13; Jos 20.'
  - type: text
    content: ' intsony ny fandripahana, fandrao matiny ny zanako.'
  - type: text
    content: 'Ka novalian’ny mpanjaka hoe:'
  - type: text
    content: –Velona ny TOMPO ka mianiana aminao aho fa tsy hisy hanohintohina na dia ny singam-bolon’ny zanakao aza.
  '12':
  - type: text
    content: 'Dia hoy indray ravehivavy taminy:'
  - type: text
    content: –Ry andriamanjaka ô, mamelà ahy mbola hiteny kely indraim-bava aminao.
  - type: text
    content: 'Ary hoy izy hoe:'
  - type: text
    content: –Ento ny teninao.
  '13':
  - type: text
    content: 'Ka hoy ravehivavy taminy:'
  - type: text
    content: '–Nahoana ianao no nisaina zavatra toy izany tamin’ny vahoakan’Andriamanitra? Fa araka izay voalazanao teo, dia manameloka ny tenanao ianao satria tsy nampody ilay noroahinao. '
  '14':
  - type: text
    content: 'Eny, tsy maintsy ho faty isika rehetra, ka ho tahaka ny rano raraka an-tany tsy azo raofina intsony. Saingy tsy mbola izany no irîn’Andriamanitra ho an’i Absalôma izao; ny heveriny kosa dia mba tsy ho lavitra Azy ilay voaroaka. '
  '15':
  - type: text
    content: 'Koa raha tonga hilaza izany rehetra izany aminao aho, ry andriamanjaka, dia satria nisy olona nampitahotra ahy; kanefa hoy aho anakampoko hoe: «Hiteny amin’ny mpanjaka aho, fa angamba hanao izay holazaiko ihany izy; '
  '16':
  - type: text
    content: 'dia hoekeny ny hamonjy ahy ho afaka amin’ny tanan’ny lehilahy izay te hamongotra ahy sy ny zanako tsy ho anisan’ilay vahoaka fananan’Andriamanitra.» '
  '17':
  - type: text
    content: 'Ary hoy koa aho anakampoko hoe: «Hampitony anie ny tenin’ny andriamanjaka. Fa tahaka ny '
  - type: text
    content: anjeli
  - type: text
    content: n’Andriamanitra izy ka mahalala ny tsara sy ny ratsy.» Hiaraka aminao anie ny TOMPO Andriamanitrao.
  '18':
  - type: text
    content: 'Ary hoy ny mpanjaka namaly an-dravehivavy:'
  - type: text
    content: –Aza misy afenina ahy izay zavatra hanontaniako anao.
  - type: text
    content: 'Dia hoy ravehivavy hoe:'
  - type: text
    content: –Aoka ianao hiteny, ry andriamanjaka.
  '19':
  - type: text
    content: 'Ary hoy ny mpanjaka nanontany azy:'
  - type: text
    content: –Moa i Jôaba va no nampirisika anao tamin’izany rehetra izany?
  - type: text
    content: 'Dia hoy ny navalin-dravehivavy hoe:'
  - type: text
    content: '–Veloma ny ainao, ry andriamanjaka, fa marina tsy azo iolakolahana izay rehetra voalazanao. Eny, i Jôaba mpanomponao no nandidy sy nampiteny ahy izay hoteneniko. '
  '2':
  - type: text
    content: Nampiantso vehivavy fetsy iray avy any Tekôa
  - type: note
    content: 'Tekôa: toerana sahabo ho 15 km atsimon’i Jerosalema.'
  - type: text
    content: ' i Jôaba ka nilazany hoe:'
  - type: text
    content: '–Manaova sari-misaona ianao ka mitafia akanjo fisaonana; aza mihosotra ilomanitra, fa manaova toy ny vehivavy efa ela nisaonana olona maty iray. '
  '20':
  - type: text
    content: Hampivadika ny toe-draharaha no nanaovan’i Jôaba mpanomponao izany zavatra izany. Fa hendry toy ny anjelin’Andriamanitra ianao, tompoko, ka mahafantatra izay rehetra miseho eto ambonin’ny tany.
  '21':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’i Jôaba:'
  - type: text
    content: –Indro efa narahiko ny torohevitrao; koa ndeha alao i Absalôma zatovolahy ka ampodio eto.
  '22':
  - type: text
    content: 'Niankohoka hatreo amin’ny tany i Jôaba ka nisaotsaotra ny mpanjaka nanao hoe:'
  - type: text
    content: –Fantatro izao fa nahita fitia teo imasonao aho, ry andriamanjaka, tamin’ny nanarahanao ny torohevitro.
  '23':
  - type: text
    content: Dia niarina i Jôaba ka nankany Gesora
  - type: note
    content: Jereo 13.37-38 sy nta.
  - type: text
    content: ', ary nitondra an’i Absalôma hody any Jerosalema. '
  '24':
  - type: text
    content: 'Fa hoy ny mpanjaka hoe:'
  - type: text
    content: –Aoka hody any an-tranony izy, ary aoka tsy hahita ny tavako!
  - type: text
    content: Koa nody tany aminy i Absalôma ary tsy mba nahita tava ny mpanjaka.
  - type: heading
    content: I Davida mamitram-pihavanana amin’i Absalôma
  '25':
  - type: text
    content: 'Tamin’i Israely manontolo dia tsy nisy lehilahy tsara tarehy sy nodokafana fatratra tahaka an’i Absalôma; fa hatrany am-paladiany ka hatrany an-tampon-dohany dia tsy nisy tsiny izy. '
  '26':
  - type: text
    content: 'Isaky ny mifarana ny taona dia hetezany ny volon-dohany satria mavesatra loatra aminy. Koa rehefa lanjainy izany dia mahatratra roa kilao araka ny fandanjan’ny mpanjaka. '
  '27':
  - type: text
    content: Nanan-janakalahy telo sy zanakavavy iray natao hoe i Tamara i Absalôma. Tsara tarehy aoka izany ilay zazavavy.
  '28':
  - type: text
    content: 'Nipetraka roa taona tao Jerosalema tsy nahita tava ny mpanjaka i Absalôma. '
  '29':
  - type: text
    content: 'Nampiantso an’i Jôaba i Absalôma mba halefany any amin’ny mpanjaka, fa tsy nety nankany aminy izy. Mbola naniraka azy fanindroany i Absalôma fa tsy nety ihany izy. '
  '3':
  - type: text
    content: Mankanesa any amin’ny mpanjaka, ka lazao aminy araka izao.
  - type: text
    content: 'Dia nambaran’i Jôaba taminy izay teny hoteneniny. '
  '30':
  - type: text
    content: 'Koa hoy i Absalôma tamin’ny mpanompony:'
  - type: text
    content: –Hitanareo ilay sahan’i Jôaba mifanakaiky amin’ny ahy, ary misy ôrza! Mandehana doroy.
  - type: text
    content: 'Dia nodoran’ny mpanompon’i Absalôma ny saha. '
  '31':
  - type: text
    content: 'Niainga i Jôaba ka nankany an-tranon’i Absalôma ary nanao taminy hoe:'
  - type: text
    content: –Fa nahoana no nodoran’ny mpanomponao ny sahako?
  '32':
  - type: text
    content: 'Dia hoy i Absalôma tamin’i Jôaba:'
  - type: text
    content: '–Indro efa nampiantso anao hankatỳ amiko aho mba halefako any amin’ny mpanjaka hilaza aminy hoe: «Nahoana aho no niverina avy any Gesora? Naleoko mbola nijanona tany ihany.» Koa mba te hahita tava ny mpanjaka aho ankehitriny; fa raha toa ka meloka aho, dia aoka izy hamono ahy ho faty.'
  '33':
  - type: text
    content: Ary nankany amin’ny mpanjaka i Jôaba ka nilaza izany taminy. Nampiantsoin’ny mpanjaka i Absalôma, dia nankao aminy; ka niankohoka nitehi-tany izy teo anatrehany. Ary nanoroka an’i Absalôma ny mpanjaka.
  '4':
  - type: text
    content: 'Rehefa niteny tamin’ny mpanjaka àry ilay vehivavy avy any Tekôa, dia niankohoka nitehi-tany ho fanajana azy ary nanao hoe:'
  - type: text
    content: –Mba vonjeo aho, ry mpanjaka ô!
  '5':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy:'
  - type: text
    content: –Fa maninona ianao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: '–Indrisy mpitondratena aho fa maty ny vadiko. '
  '6':
  - type: text
    content: 'Nanan-janaka roa lahy aho; niady tany an-tsaha izy ireo ka maty ilay iray satria tsy nisy nampisaraka. '
  '7':
  - type: text
    content: 'Nitsangana hanohitra ahy ny fianakaviana manontolo ka nanao tamiko hoe: «Atolory anay ilay mpamono ny rahalahiny, fa hataonay maty koa izy satria nahafaty ny rahalahiny, ka dia hovonoinay ho faty koa ny mpandova.» Araka izany dia tian’izy ireo hofongorana ilay tapa-porohana sisa ato amiko mba tsy hahafahany hamelo-maso ny anaran-drainy eto an-tany.'
  '8':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin-dravehivavy:'
  - type: text
    content: –Modia fa hanome baiko hitsinjovana anao aho.
  '9':
  - type: text
    content: 'Hoy kosa ilay vehivavy avy any Tekôa taminy:'
  - type: text
    content: –Ry andriamanjaka ô, aoka ho ahy sy ho an’ny fianakavian-draiko ny fahadisoana fa tsy manan-tsiny akory ianao sy ny sezafiandriananao.
