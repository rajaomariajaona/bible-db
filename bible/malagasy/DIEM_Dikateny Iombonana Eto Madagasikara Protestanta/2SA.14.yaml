document_id: 2SA.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiverenan’i Absalôma tao Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tsapan’i Jôaba zanakalahin’i Tseroià fa tezitra tamin’i Absalôma ny fon’ny mpanjaka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha mbola misy olona miteny anao, dia ento atỳ amiko, fa tsy hamerina izany intsony aminao izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy ihany ravehivavy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry andriamanjaka ô, mangataha amin’ny TOMPO Andriamanitrao mba tsy hampian’ny mpamaly faty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny mpamaly faty: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 35.9-29; Deot 19.4-13; Jos 20.
      marker-yv: yv-n
    - type: text
      text: ' intsony ny fandripahana, fandrao matiny ny zanako.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO ka mianiana aminao aho fa tsy hisy hanohintohina na dia ny singam-bolon’ny zanakao aza.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy indray ravehivavy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry andriamanjaka ô, mamelà ahy mbola hiteny kely indraim-bava aminao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ento ny teninao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ka hoy ravehivavy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana ianao no nisaina zavatra toy izany tamin’ny vahoakan’Andriamanitra? Fa araka izay voalazanao teo, dia manameloka ny tenanao ianao satria tsy nampody ilay noroahinao. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Eny, tsy maintsy ho faty isika rehetra, ka ho tahaka ny rano raraka an-tany tsy azo raofina intsony. Saingy tsy mbola izany no irîn’Andriamanitra ho an’i Absalôma izao; ny heveriny kosa dia mba tsy ho lavitra Azy ilay voaroaka. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa raha tonga hilaza izany rehetra izany aminao aho, ry andriamanjaka, dia satria nisy olona nampitahotra ahy; kanefa hoy aho anakampoko hoe: «Hiteny amin’ny mpanjaka aho, fa angamba hanao izay holazaiko ihany izy; '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia hoekeny ny hamonjy ahy ho afaka amin’ny tanan’ny lehilahy izay te hamongotra ahy sy ny zanako tsy ho anisan’ilay vahoaka fananan’Andriamanitra.» '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary hoy koa aho anakampoko hoe: «Hampitony anie ny tenin’ny andriamanjaka. Fa tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeli
    - type: text
      text: n’Andriamanitra izy ka mahalala ny tsara sy ny ratsy.» Hiaraka aminao anie ny TOMPO Andriamanitrao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy ny mpanjaka namaly an-dravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza misy afenina ahy izay zavatra hanontaniako anao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka ianao hiteny, ry andriamanjaka.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy ny mpanjaka nanontany azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa i Jôaba va no nampirisika anao tamin’izany rehetra izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin-dravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Veloma ny ainao, ry andriamanjaka, fa marina tsy azo iolakolahana izay rehetra voalazanao. Eny, i Jôaba mpanomponao no nandidy sy nampiteny ahy izay hoteneniko. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nampiantso vehivavy fetsy iray avy any Tekôa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tekôa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana sahabo ho 15 km atsimon’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ' i Jôaba ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manaova sari-misaona ianao ka mitafia akanjo fisaonana; aza mihosotra ilomanitra, fa manaova toy ny vehivavy efa ela nisaonana olona maty iray. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hampivadika ny toe-draharaha no nanaovan’i Jôaba mpanomponao izany zavatra izany. Fa hendry toy ny anjelin’Andriamanitra ianao, tompoko, ka mahafantatra izay rehetra miseho eto ambonin’ny tany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Jôaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro efa narahiko ny torohevitrao; koa ndeha alao i Absalôma zatovolahy ka ampodio eto.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Niankohoka hatreo amin’ny tany i Jôaba ka nisaotsaotra ny mpanjaka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatro izao fa nahita fitia teo imasonao aho, ry andriamanjaka, tamin’ny nanarahanao ny torohevitro.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dia niarina i Jôaba ka nankany Gesora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 13.37-38 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ary nitondra an’i Absalôma hody any Jerosalema. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa hoy ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka hody any an-tranony izy, ary aoka tsy hahita ny tavako!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nody tany aminy i Absalôma ary tsy mba nahita tava ny mpanjaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida mamitram-pihavanana amin’i Absalôma
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tamin’i Israely manontolo dia tsy nisy lehilahy tsara tarehy sy nodokafana fatratra tahaka an’i Absalôma; fa hatrany am-paladiany ka hatrany an-tampon-dohany dia tsy nisy tsiny izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Isaky ny mifarana ny taona dia hetezany ny volon-dohany satria mavesatra loatra aminy. Koa rehefa lanjainy izany dia mahatratra roa kilao araka ny fandanjan’ny mpanjaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Nanan-janakalahy telo sy zanakavavy iray natao hoe i Tamara i Absalôma. Tsara tarehy aoka izany ilay zazavavy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nipetraka roa taona tao Jerosalema tsy nahita tava ny mpanjaka i Absalôma. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Nampiantso an’i Jôaba i Absalôma mba halefany any amin’ny mpanjaka, fa tsy nety nankany aminy izy. Mbola naniraka azy fanindroany i Absalôma fa tsy nety ihany izy. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mankanesa any amin’ny mpanjaka, ka lazao aminy araka izao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nambaran’i Jôaba taminy izay teny hoteneniny. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Koa hoy i Absalôma tamin’ny mpanompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hitanareo ilay sahan’i Jôaba mifanakaiky amin’ny ahy, ary misy ôrza! Mandehana doroy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nodoran’ny mpanompon’i Absalôma ny saha. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Niainga i Jôaba ka nankany an-tranon’i Absalôma ary nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa nahoana no nodoran’ny mpanomponao ny sahako?
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia hoy i Absalôma tamin’i Jôaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indro efa nampiantso anao hankatỳ amiko aho mba halefako any amin’ny mpanjaka hilaza aminy hoe: «Nahoana aho no niverina avy any Gesora? Naleoko mbola nijanona tany ihany.» Koa mba te hahita tava ny mpanjaka aho ankehitriny; fa raha toa ka meloka aho, dia aoka izy hamono ahy ho faty.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary nankany amin’ny mpanjaka i Jôaba ka nilaza izany taminy. Nampiantsoin’ny mpanjaka i Absalôma, dia nankao aminy; ka niankohoka nitehi-tany izy teo anatrehany. Ary nanoroka an’i Absalôma ny mpanjaka.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rehefa niteny tamin’ny mpanjaka àry ilay vehivavy avy any Tekôa, dia niankohoka nitehi-tany ho fanajana azy ary nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba vonjeo aho, ry mpanjaka ô!
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa maninona ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indrisy mpitondratena aho fa maty ny vadiko. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nanan-janaka roa lahy aho; niady tany an-tsaha izy ireo ka maty ilay iray satria tsy nisy nampisaraka. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nitsangana hanohitra ahy ny fianakaviana manontolo ka nanao tamiko hoe: «Atolory anay ilay mpamono ny rahalahiny, fa hataonay maty koa izy satria nahafaty ny rahalahiny, ka dia hovonoinay ho faty koa ny mpandova.» Araka izany dia tian’izy ireo hofongorana ilay tapa-porohana sisa ato amiko mba tsy hahafahany hamelo-maso ny anaran-drainy eto an-tany.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy ny mpanjaka tamin-dravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Modia fa hanome baiko hitsinjovana anao aho.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hoy kosa ilay vehivavy avy any Tekôa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry andriamanjaka ô, aoka ho ahy sy ho an’ny fianakavian-draiko ny fahadisoana fa tsy manan-tsiny akory ianao sy ny sezafiandriananao.
