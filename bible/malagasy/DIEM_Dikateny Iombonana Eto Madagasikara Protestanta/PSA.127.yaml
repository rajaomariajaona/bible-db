  - type: usfm
    marker: it
    children:
    - type: text
      text: Hira fiakarana. Natao ho an’i Salômôna.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy ny TOMPO no manorina ny trano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miasa foana ny mpanorina azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy ny TOMPO no miambina ny tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitily foana ny mpiambina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sasa-poana ianareo mifoha maraina sy miari-tory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misahirana tokoa ny amin’izay hohanina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany kosa dia omen’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’ireo olon-tiany mbola matory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indro fanomezan’ny Tompo ireo zanaka maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: valisoa tokoa ny zaza nateraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Toy ny zana-tsipîka an-tanan’ny mpiady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo zanaky ny fahatanorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra ny lehilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahafeno tranon-jana-tsipîka amin’ireo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy ho menatra izy, rehefa hifamaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: amim-pahavalo eo am-bavahadin-tanàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '127.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'eo am-bavahadin-tanàna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: no nanaovana ny fifampiraharahana (2 Mp 7.1) na koa ny fitsarana (Jôb 29.7-17).
