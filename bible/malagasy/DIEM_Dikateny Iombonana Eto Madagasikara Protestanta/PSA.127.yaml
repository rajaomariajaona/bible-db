document_id: PSA.127,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Raha tsy ny Tompo no manorina ny trano...
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana. Natao ho an’i Salômôna.
  - type: text
    content: Raha tsy ny TOMPO no manorina ny trano,
  - type: text
    content: dia miasa foana ny mpanorina azy.
  - type: text
    content: Raha tsy ny TOMPO no miambina ny tanàna,
  - type: text
    content: dia mitily foana ny mpiambina.
  '2':
  - type: text
    content: Sasa-poana ianareo mifoha maraina sy miari-tory,
  - type: text
    content: misahirana tokoa ny amin’izay hohanina.
  - type: text
    content: Izany kosa dia omen’ny TOMPO
  - type: text
    content: an’ireo olon-tiany mbola matory.
  '3':
  - type: text
    content: Indro fanomezan’ny Tompo ireo zanaka maro;
  - type: text
    content: valisoa tokoa ny zaza nateraka.
  '4':
  - type: text
    content: Toy ny zana-tsipîka an-tanan’ny mpiady
  - type: text
    content: ireo zanaky ny fahatanorana.
  '5':
  - type: text
    content: Sambatra ny lehilahy
  - type: text
    content: mahafeno tranon-jana-tsipîka amin’ireo!
  - type: text
    content: Fa tsy ho menatra izy, rehefa hifamaly
  - type: text
    content: amim-pahavalo eo am-bavahadin-tanàna
  - type: note
    content: eo am-bavahadin-tanàna no nanaovana ny fifampiraharahana (2 Mp 7.1) na koa ny fitsarana (Jôb 29.7-17).
  - type: text
    content: .
