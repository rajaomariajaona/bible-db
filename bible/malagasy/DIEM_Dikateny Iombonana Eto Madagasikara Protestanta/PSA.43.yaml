document_id: PSA.43,396
type_code: plt
verses:
  '1':
  - type: text
    content: Omeo rariny aho, Andriamanitra ô,
  - type: text
    content: iandanio hanohitra ny tsy mpivavaka,
  - type: text
    content: ataovy afaka amin’ny mpamitaka
  - type: text
    content: sy amin’ny mpanao ratsy.
  '2':
  - type: text
    content: Fa Andriamanitra mpiaro ahy Ianao,
  - type: text
    content: ka nahoana no dia mandao ahy?
  - type: text
    content: Nahoana aho no nampahorîn’ny fahavaloko,
  - type: text
    content: ka manjary miaina mijoretra toy izao?
  '3':
  - type: text
    content: Ny hazavanao sy ny fahamarinanao
  - type: text
    content: alefaso hitarika sy hitantana ahy
  - type: text
    content: hatrany an-tendrombohitrao masina
  - type: note
    content: Jereo Sal 2.6.
  - type: text
    content: ','
  - type: text
    content: hatrany amin’ny fonenanao.
  '4':
  - type: text
    content: 'Dia hankeo amin’ny '
  - type: text
    content: alitaranao
  - type: text
    content: ' aho, Andriamanitra ô,'
  - type: text
    content: eo aminao Andriamanitra fototry ny hafaliako;
  - type: text
    content: ka hidera Anao amin-dokanga,
  - type: text
    content: ry Andriamanitra Andriamanitro!
  '5':
  - type: text
    content: Nahoana re aho no mitanondrika
  - type: note
    content: Ampit Sal 42.6,12.
  - type: text
    content: sy mitoloko toy izao ato anatiko?
  - type: text
    content: Aoka Andriamanitra no hitokiako!
  - type: text
    content: Eny, mbola hoderaiko hatrany Izy,
  - type: text
    content: dia ilay Mpamonjiko sady Andriamanitro!
