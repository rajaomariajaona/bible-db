document_id: GEN.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Abrahama sy i Abimelèka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Niala teo i Abrahama nankany amin’ny faritany atsimo, ka nonina tao anelanelan’i Kadesy sy i Soro, ary nivahiny tao Gerara. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Inona, hoy aho, no kendrenao tamin’ny nanaovanao izao zavatra izao?
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Namaly kosa i Abrahama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nihevitra anakampo aho fa tsy misy olona matahotra an’Andriamanitra amin’ity toerana ity, koa hovonoin’ireo aho noho ny amin’ny vadiko. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Marina ihany anefa fa anabaviko izy, iray ray izahay; saingy tsy iray reny amiko izy, ka izany no nahatonga azy ho vadiko. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rehefa nasain’Andriamanitra nandao ny tranon-draiko aho, dia hoy aho tamin’ny vadiko: «Izao no rohim-pihavanana hampiasainao amiko: Any amin’ny toerana rehetra izay halehantsika dia lazao hoe anadahinao aho.»'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia naka ondry sy osy aman’omby ary mpanompolahy sy mpanompovavy i Abimelèka, ka nomeny an’i Abrahama; naveriny taminy koa i Sarà vadiny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy i Abimelèka tamin’i Abrahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro mivoha ho anao ny taniko, koa mipetraha amin’izay mahafinaritra ny masonao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hoy kosa izy tamin’i Sarà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hitanao fa nomeko volafotsy arivo ny anadahinao mba ho tampi-maso amin’izay rehetra havanao fa tsy manantsiny ianao amin’izao raharaha izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny tampi-maso eto dia karazana voaly isalobonan’ny vehivavy manambady, manaja ny vadiny. Koa ny fihetsik’i Abimelèka dia karazana famerenan-jo an’i Sarà.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: Nataon’ny TOMPO momba koa ny vehivavy rehetra tao an-tranon’i Abimelèka noho ilay raharahan’i Sarà vadin’i Abrahama. Dia nivavaka tamin’Andriamanitra i Abrahama; koa nositranin’Andriamanitra i Abimelèka sy ny vadiny ary ireo mpanompovaviny, ka afa-niteraka indray.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nolazain’i Abrahama fa anabaviny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 12.13; 26.7.
      marker-yv: yv-n
    - type: text
      text: ' i Sarà vadiny; koa naniraka haka an’i Sarà i Abimelèka, mpanjakan’i Gerara. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Niseho nofy tamin’i Abimelèka anefa Andriamanitra nony alina ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro ho faty ianao noho ny amin’ny vehivavy izay nalainao, fa manam-bady izy io.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I Abimelèka anefa tsy mbola nanatona akaiky an-dravehivavy akory, ka nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tompo ô, moa haringanao koa va ny tenako sy ny fireneko na dia tsy diso aza izahay? '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Moa tsy Abrahama va no nilaza tamiko an’i Sarà hoe anabaviny? Ary moa tsy ravehivavy io va no nilaza tamiko an’i Abrahama hoe anadahiny? Koa tamin’ny fo tsotra sy tanana madio no nanaovako izany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mbola tamin’io nofy io ihany no nilazan’Andriamanitra tamin’i Abimelèka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izaho koa dia mahalala fa tamin’ny fo tsotra no nanaovanao izany. Izaho ihany koa no nisakana anao tsy hanota amiko. Izany no tsy namelako anao hikasika azy. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa ankehitriny avereno amin’ny vadiny ravehivavy. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpaminany
    - type: text
      text: ' izy ka hivavaka ho anao, dia tsy ho faty ianao. Fa raha tsy averinao kosa izy, dia fantaro fa ho faty tokoa ianao sy izay rehetra anao.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nifoha vao maraina be i Abimelèka, ka niantso ny mpanompony rehetra ary nanambara ny zavatra rehetra taminy; dia raiki-tahotra mafy ireo olona ireo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nampiantso an’i Abrahama i Abimelèka, ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona izao nataonao anay izao? Inona no fahotana nataoko taminao no dia saika nampidiranao heloka lehibe toy izao ny tenako sy ny fanjakako? Zavatra tsy fanao no nataonao tamiko. '
