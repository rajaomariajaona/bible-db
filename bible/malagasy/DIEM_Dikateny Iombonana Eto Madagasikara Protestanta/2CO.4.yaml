document_id: 2CO.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Raki-tsoa anaty vilany tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izahay no manana izany fanompoana izany, dia noho ny indrafon’Andriamanitra taminay; koa tsy mety ketraka izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Efa nolavinay ny asa miafina mahamenatra, ka tsy manao zavatra amin-kafetsena izahay sady tsy manatsatso ny tenin’Andriamanitra; fa asehonay mazava tsara ny marina, ka eo imason’Andriamanitra dia tonga mendrika hitokian’ny fieritreretan’ny olona rehetra izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa raha saronan-javatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' torînay, dia saronan-javatra amin’izay ho very. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mino izy ireo, satria ny sainy efa nohajambain’i Satàna zanahary tompoin’izao tontolo izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ampit Jôh 12.31. Ity rijan-teny eto am-pelatanantsika ity no hany anomezana an’i Satàna anaram-boninahitra hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zanahary tompon’izao tontolo izao.
    marker-yv: yv-n
  - type: text
    text: '; hany ka voasakana izy ireo tsy hahita ny fahazavàn’ny Vaovao Mahafaly momba ny voninahitr’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', ilay tena endrik’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy ny tenanay manko no ambaranay rehefa mitoriteny izahay, fa i Jesoa Kristy Tompo; izahay kosa dia milaza ny tenanay ho mpanomponareo noho ny amin’i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa Andriamanitra, Izay nandidy hoe: «Aoka ny mazava hamirapiratra avy ao anaty haizina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 1.3.
    marker-yv: yv-n
  - type: text
    text: », no nampamirapiratra ny mazava ao am-ponay, mba hampisehoanay ny fahalalana ny voninahitr’Andriamanitra, izay hita eo amin’ny tavan’i Jesoa Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izahay mitondra izany raki-tsoa izany kosa dia toy ny vilany tany ihany, mba hahitana tsara fa izao hery tsy manan-tsahala izao dia an’Andriamanitra fa tsy anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ifandaharam-pahoriana izahay, nefa tsy voapotsitra; very hevitra, nefa tsy mamoy fo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'enjehin’olona, nefa tsy ilaozan’Andriamanitra; azera, nefa tsy maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Entinay mandrakariva ao amin’ny tenanay koa fa velona i Jesoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'satria, eo amin’ny fiainanay, dia ny fahafatesana no mananontanona anay lalandava noho ny amin’i Jesoa mba haseho ao amin’ny tenanay mety maty koa fa velona i Jesoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: hany ka ny fahafatesana no miasa ao aminay, fa ny fiainana no miasa ao aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ': «Nino aho, ka izany no nitenenako'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 116.10 araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '.» Noho izahay manana io finoana omen’ny Fanahy Masina io, dia mino koa izahay ka izany no itenenanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fantatray fa Andriamanitra, Izay nanangana an’i Jesoa Tompo ho velona, dia hanangana anay koa ho velona miaraka amin’i Jesoa, ary hametraka anay mbaminareo ho eo akaikiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eny, noho ny aminareo avokoa izany rehetra izany, ka dia mihamaro ny olona tratran’ny fahasoavana mba hitomboan’ny vavaka fisaorana ho voninahitr’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Velon’ny finoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izany no tsy mahaketraka anay, fa na dia mihalevona aza ny maha olona eto ivelany, dia mihavao isan’andro kosa ny maha olona ao anaty: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'satria ny fahoriana maivana sy mandalo mihatra aminay dia miasa manomana voninahitra lehibe mihoa-pampana sady maharitra mandrakizay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: raha tsy mibanjina ny hita izahay, fa ny tsy hita. Ny hita manko dia miserana ihany, fa ny tsy hita no maharitra mandrakizay.
