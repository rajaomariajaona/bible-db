document_id: 2CO.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Raki-tsoa anaty vilany tany
  - type: text
    content: 'Izahay no manana izany fanompoana izany, dia noho ny indrafon’Andriamanitra taminay; koa tsy mety ketraka izahay. '
  '10':
  - type: text
    content: 'Entinay mandrakariva ao amin’ny tenanay koa fa velona i Jesoa; '
  '11':
  - type: text
    content: 'satria, eo amin’ny fiainanay, dia ny fahafatesana no mananontanona anay lalandava noho ny amin’i Jesoa mba haseho ao amin’ny tenanay mety maty koa fa velona i Jesoa, '
  '12':
  - type: text
    content: hany ka ny fahafatesana no miasa ao aminay, fa ny fiainana no miasa ao aminareo.
  '13':
  - type: text
    content: 'Hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Nino aho, ka izany no nitenenako'
  - type: note
    content: Sal 116.10 araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '.» Noho izahay manana io finoana omen’ny Fanahy Masina io, dia mino koa izahay ka izany no itenenanay. '
  '14':
  - type: text
    content: 'Fantatray fa Andriamanitra, Izay nanangana an’i Jesoa Tompo ho velona, dia hanangana anay koa ho velona miaraka amin’i Jesoa, ary hametraka anay mbaminareo ho eo akaikiny. '
  '15':
  - type: text
    content: Eny, noho ny aminareo avokoa izany rehetra izany, ka dia mihamaro ny olona tratran’ny fahasoavana mba hitomboan’ny vavaka fisaorana ho voninahitr’Andriamanitra.
  - type: heading
    content: Velon’ny finoana
  '16':
  - type: text
    content: 'Izany no tsy mahaketraka anay, fa na dia mihalevona aza ny maha olona eto ivelany, dia mihavao isan’andro kosa ny maha olona ao anaty: '
  '17':
  - type: text
    content: 'satria ny fahoriana maivana sy mandalo mihatra aminay dia miasa manomana voninahitra lehibe mihoa-pampana sady maharitra mandrakizay, '
  '18':
  - type: text
    content: raha tsy mibanjina ny hita izahay, fa ny tsy hita. Ny hita manko dia miserana ihany, fa ny tsy hita no maharitra mandrakizay.
  '2':
  - type: text
    content: 'Efa nolavinay ny asa miafina mahamenatra, ka tsy manao zavatra amin-kafetsena izahay sady tsy manatsatso ny tenin’Andriamanitra; fa asehonay mazava tsara ny marina, ka eo imason’Andriamanitra dia tonga mendrika hitokian’ny fieritreretan’ny olona rehetra izahay. '
  '3':
  - type: text
    content: 'Fa raha saronan-javatra ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' torînay, dia saronan-javatra amin’izay ho very. '
  '4':
  - type: text
    content: Tsy mino izy ireo, satria ny sainy efa nohajambain’i Satàna zanahary tompoin’izao tontolo izao
  - type: note
    content: Ampit Jôh 12.31. Ity rijan-teny eto am-pelatanantsika ity no hany anomezana an’i Satàna anaram-boninahitra hoe zanahary tompon’izao tontolo izao.
  - type: text
    content: '; hany ka voasakana izy ireo tsy hahita ny fahazavàn’ny Vaovao Mahafaly momba ny voninahitr’i '
  - type: text
    content: Kristy
  - type: text
    content: ', ilay tena endrik’Andriamanitra. '
  '5':
  - type: text
    content: 'Tsy ny tenanay manko no ambaranay rehefa mitoriteny izahay, fa i Jesoa Kristy Tompo; izahay kosa dia milaza ny tenanay ho mpanomponareo noho ny amin’i Jesoa. '
  '6':
  - type: text
    content: 'Fa Andriamanitra, Izay nandidy hoe: «Aoka ny mazava hamirapiratra avy ao anaty haizina'
  - type: note
    content: Jereo Gen 1.3.
  - type: text
    content: », no nampamirapiratra ny mazava ao am-ponay, mba hampisehoanay ny fahalalana ny voninahitr’Andriamanitra, izay hita eo amin’ny tavan’i Jesoa Kristy.
  '7':
  - type: text
    content: 'Izahay mitondra izany raki-tsoa izany kosa dia toy ny vilany tany ihany, mba hahitana tsara fa izao hery tsy manan-tsahala izao dia an’Andriamanitra fa tsy anay. '
  '8':
  - type: text
    content: 'Ifandaharam-pahoriana izahay, nefa tsy voapotsitra; very hevitra, nefa tsy mamoy fo; '
  '9':
  - type: text
    content: 'enjehin’olona, nefa tsy ilaozan’Andriamanitra; azera, nefa tsy maty. '
