document_id: NAM.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ry vahoakan’i Joda, indro tamy eny an-tendrombohitra
  - type: text
    content: ny iraka mitondra vaovao mahafaly sy mitory fiadanana.
  - type: text
    content: 'Ankalazao ny fetinareo, efao ny '
  - type: text
    content: voadinareo
  - type: text
    content: '!'
  - type: text
    content: Fa tsy handalo eo aminareo intsony ilay olom-poana
  - type: note
    content: 'Ao amin’ny dkt latinina tranainy ary mbola arahin’ny dkt maoderina sasany, Nah 2.1 dia voalahatra ho 1.15. Araka izany koa ny 2.2 dia voalahatra ho 2.1... sns. –ilay olom-poana: tsy isalasalana fa ny mpanjakan’i Asiria izay efa voalaza tao amin’ny 1.11 izany.'
  - type: text
    content: ','
  - type: text
    content: satria efa fongotra tanteraka izy.
  '10':
  - type: text
    content: Aoka hobaboina ny volafotsy sy ny volamena
  - type: text
    content: fa tsy mety ritra ny hareny,
  - type: text
    content: dia ireo zava-tsarobidy miavosa!
  '11':
  - type: text
    content: Tsy misy afa-tsy fandrobana
  - type: text
    content: sy fandravana ary fanimbana no hita!
  - type: text
    content: Kivy ny fon’ny rehetra;
  - type: text
    content: mangozohozo ny lohalika,
  - type: text
    content: mangovitra ny vatana
  - type: text
    content: ary mivaloarika ny tarehy.
  - type: heading
    content: Toy ny liona resy i Ninive
  '12':
  - type: text
    content: Fa aiza ankehitriny ilay tanàna
  - type: text
    content: izay toy ny zohy fieren’ny liona
  - type: note
    content: Ny liona no marika famantarana an’i Ninive.
  - type: text
    content: sy fihinanan’ny zanany?
  - type: text
    content: Rehefa lasa miremby ny liona,
  - type: text
    content: dia tsy nisy sahy nanakotaba ny zanany.
  '13':
  - type: text
    content: Novonoin’ny liona sy noviravirainy ny hazany
  - type: text
    content: ho an’ny liom-bavy sy ny zanany.
  - type: text
    content: Ny lavaka fonenany nofenoiny remby,
  - type: text
    content: dia ny haza rehetra voaviravirany.
  '14':
  - type: text
    content: Koa izao no teny hentitra
  - type: text
    content: 'ataon’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Indro hamely anao Aho, ry Ninive,
  - type: text
    content: hodorako ho levona ny kalesinao
  - type: text
    content: ary hatolotro ho fatin-tsabatra ny tanoranao.
  - type: text
    content: Hofaranako hatreo ny fandrobanao teto an-tany,
  - type: text
    content: ka tsy ho re intsony ny fitakiana ataon’ny irakao.»
  '2':
  - type: text
    content: Miakatra hamely anao, ry Ninive, ireo mpandrava;
  - type: text
    content: koa ambeno ny manda, andraso ny lalana.
  - type: text
    content: Mivonòna hiady ary angony ny tafikao rehetra.
  '3':
  - type: text
    content: Fa efa ampodin’ny TOMPO indray
  - type: text
    content: ny voninahitry ny taranak’i Jakôba
  - type: text
    content: efa ampodiny indray ny voninahitr’i Israely,
  - type: text
    content: ilay voaloboka rava sady simban’ny mpandroba.
  - type: heading
    content: I Ninive voatafika sy voaroba
  '4':
  - type: text
    content: Ampinga miloko mena sy akanjo jaky midorehitra
  - type: text
    content: no entin’ny tafika fahavalonao, ry Ninive.
  - type: text
    content: Manjelatra toy ny afo ny kalesiny
  - type: text
    content: ary mirangaranga ny lefony,
  - type: text
    content: rehefa mivonon-kiady izy.
  '5':
  - type: text
    content: Miriotra mamakivaky ny arabe ny kalesiny,
  - type: text
    content: ary mifanaretsaka eny an-kianja malalaka;
  - type: text
    content: toy ny harendrina no fijery azy
  - type: text
    content: fa mitsoriaka tahaka ny tselatra.
  '6':
  - type: text
    content: Miantso ireo jeneraliny ny mpanjakan’i Asiria,
  - type: text
    content: kanjo tafintohina am-pandehanana ireny.
  - type: text
    content: Milomay manatona ny manda ny mpanani-bohitra
  - type: text
    content: ka maka toerana eo ambanin’ny fialofana
  - type: note
    content: 'eo ambanin’ny fialofana: amin’ny alalan’ny ampinga lehibe miaro ny mpanani-bohitra eo am-pototry ny manda.'
  - type: text
    content: .
  '7':
  - type: text
    content: Vaky tampoka ny vavahady manolotra ny ony,
  - type: text
    content: ary mirodana ny lapa
  - type: note
    content: 'Niorina teo amoron’ny ony roa i Ninive dia ny ony Tigra sy ny sampany antsoina hoe Kôsera. Ny lapan’andriamanjaka dia voaaron’io Kôsera io manodidina. –ary mirodana ny lapa: dkt hafa ka rera-tsaina ny ao an-dapa.'
  - type: text
    content: .
  '8':
  - type: text
    content: Azo ka nentin-ko babo ny sarin’ny andriamani-baviny
  - type: note
    content: 'ny sarin’ny andriamani-baviny: araka ny dkt grika tranainy izany. Ilay andriamani-bavy asirianina Istara no lazaina eto.'
  - type: text
    content: ','
  - type: text
    content: ary ny mpanompovaviny mitoloko toy ny voromahailala
  - type: text
    content: sady mandòn-tratra noho ny alahelo.
  '9':
  - type: text
    content: Fa hatrizay i Ninive dia tahaka ny siniben-drano,
  - type: text
    content: kanjo vaky izy ankehitriny.
  - type: text
    content: «Mijanòna! Mijanòna!» hoy ny hiaka
  - type: text
    content: nefa tsy nisy niherika na dia iray aza.
