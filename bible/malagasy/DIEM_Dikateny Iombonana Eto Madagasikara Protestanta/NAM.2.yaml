document_id: NAM.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ry vahoakan’i Joda, indro tamy eny an-tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny iraka mitondra vaovao mahafaly sy mitory fiadanana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ankalazao ny fetinareo, efao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voadinareo
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy handalo eo aminareo intsony ilay olom-poana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ao amin’ny dkt latinina tranainy ary mbola arahin’ny dkt maoderina sasany, Nah 2.1 dia voalahatra ho 1.15. Araka izany koa ny 2.2 dia voalahatra ho 2.1... sns. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ilay olom-poana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tsy isalasalana fa ny mpanjakan’i Asiria izay efa voalaza tao amin’ny 1.11 izany.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa fongotra tanteraka izy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aoka hobaboina ny volafotsy sy ny volamena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mety ritra ny hareny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo zava-tsarobidy miavosa!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tsy misy afa-tsy fandrobana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fandravana ary fanimbana no hita!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kivy ny fon’ny rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mangozohozo ny lohalika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mangovitra ny vatana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mivaloarika ny tarehy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Toy ny liona resy i Ninive
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa aiza ankehitriny ilay tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay toy ny zohy fieren’ny liona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: liona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no marika famantarana an’i Ninive.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fihinanan’ny zanany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa lasa miremby ny liona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy nisy sahy nanakotaba ny zanany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Novonoin’ny liona sy noviravirainy ny hazany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny liom-bavy sy ny zanany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lavaka fonenany nofenoiny remby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny haza rehetra voaviravirany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Koa izao no teny hentitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ataon’ny TOMPOn’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro hamely anao Aho, ry Ninive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hodorako ho levona ny kalesinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatolotro ho fatin-tsabatra ny tanoranao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofaranako hatreo ny fandrobanao teto an-tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho re intsony ny fitakiana ataon’ny irakao.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Miakatra hamely anao, ry Ninive, ireo mpandrava;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ambeno ny manda, andraso ny lalana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivonòna hiady ary angony ny tafikao rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa efa ampodin’ny TOMPO indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny voninahitry ny taranak’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa ampodiny indray ny voninahitr’i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay voaloboka rava sady simban’ny mpandroba.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Ninive voatafika sy voaroba
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ampinga miloko mena sy akanjo jaky midorehitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no entin’ny tafika fahavalonao, ry Ninive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manjelatra toy ny afo ny kalesiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mirangaranga ny lefony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mivonon-kiady izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Miriotra mamakivaky ny arabe ny kalesiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mifanaretsaka eny an-kianja malalaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny harendrina no fijery azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mitsoriaka tahaka ny tselatra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Miantso ireo jeneraliny ny mpanjakan’i Asiria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo tafintohina am-pandehanana ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milomay manatona ny manda ny mpanani-bohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka maka toerana eo ambanin’ny fialofana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'eo ambanin’ny fialofana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: amin’ny alalan’ny ampinga lehibe miaro ny mpanani-bohitra eo am-pototry ny manda.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Vaky tampoka ny vavahady manolotra ny ony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mirodana ny lapa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Niorina teo amoron’ny ony roa i Ninive dia ny ony Tigra sy ny sampany antsoina hoe Kôsera. Ny lapan’andriamanjaka dia voaaron’io Kôsera io manodidina. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ary mirodana ny lapa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ka rera-tsaina ny ao an-dapa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Azo ka nentin-ko babo ny sarin’ny andriamani-baviny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny sarin’ny andriamani-baviny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt grika tranainy izany. Ilay andriamani-bavy asirianina Istara no lazaina eto.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanompovaviny mitoloko toy ny voromahailala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mandòn-tratra noho ny alahelo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa hatrizay i Ninive dia tahaka ny siniben-drano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo vaky izy ankehitriny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mijanòna! Mijanòna!» hoy ny hiaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nisy niherika na dia iray aza.
