document_id: 2CO.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mpanompon’ny Fanekempihavanana Vaovao
  - type: text
    content: Manomboka midera tena indray ve izahay amin’izany?
  - type: text
    content: 'Sa kosa toy ny sasany izahay ka mila taratasy filazàn-tsoa momba anay ho anareo na avy aminareo? '
  '10':
  - type: text
    content: 'satria ny voninahitra namirapiratra fahiny dia tsinontsinona miohatra amin’ny voninahitra ankehitriny izay tena ambony lavitra. '
  '11':
  - type: text
    content: Eny, raha izay nihelina ihany aza nisy voninahitra, dia vao mainka ho heni-boninahitra kokoa izay maharitra mandrakizay.
  '12':
  - type: text
    content: 'Satria manana izany fanantenana izany izahay, dia be fahasahiana tokoa. '
  '13':
  - type: text
    content: Izahay dia tsy tahaka an’i Mosesy izay nisaron-tava mba tsy hahitan’ny vahoaka Israely ny fiafaran’ilay famirapiratany mihelina
  - type: note
    content: Jereo Eks 34.3.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Fa nihadonto ny sain’ny vahoaka Israely; ary mandraka androany dia tsy nesorina ny zava-manarona ny sainy, fa mbola ao ihany raha mamaky ny boky mirakitra ny Fanekempihavanana Taloha
  - type: note
    content: ny boky mirakitra ny Fampihavanana Taloha na mirakitra ny Testamenta Taloha.
  - type: text
    content: 'izy ireo; satria ho an’ny olona tafaray amin’i Kristy no foana izany sarona izany. '
  '15':
  - type: text
    content: 'Mandraka androany, isaky ny vakîna ny bokin’i Mosesy, dia mbola misarona ihany ny fon’ny vahoaka Israely. '
  '16':
  - type: text
    content: Fa isaky ny miverina amin’ny Tompo kosa ny olona, dia miesotra izany sarona izany
  - type: note
    content: 'isaky ny... izany sarona izany: dkt hafa isaky ny mitodika amin’ny Tompo izy (Mosesy), dia esoriny ny saron-tavany. Jereo Eks 34.34.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ka ny hoe Tompo eto dia ny Fanahy; fa ao amin’izay itoeran’ilay Fanahin’ny Tompo no misy fahafahana. '
  '18':
  - type: text
    content: Isika rehetra kosa dia tsy mba misaron-tava, fa toy ny fitaratra tarafin’ny voninahitry ny Tompo; ka dia miova endrika hanahaka ny Tompo isika, sady mitombo hatrany ny famirapiratantsika, araka ny asa tontosain’ilay Fanahin’ny Tompo.
  '2':
  - type: text
    content: 'Ianareo mihitsy no taratasinay, taratasy voasoratra ato am-ponay ka fantatry ny olona rehetra sady vakîny. '
  '3':
  - type: text
    content: 'Miharihary fa taratasy soratanan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ianareo, ary nampitondraina anay; kanefa tsy taratasy voasoratra tamina ranomainty fa tamin’ny alalan’ny Fanahin’ilay Andriamanitra velona, tsy taratasy voasokitra eo amina takela-bato fa ao am-pon’olombelona'
  - type: note
    content: Jereo Eks 24.12; Jer 31.33; Ezek 11.9; 36.26.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Milaza izany izahay satria Andriamanitra no itokianay tokoa amin’ny alalan’i Kristy. '
  '5':
  - type: text
    content: 'Izahay dia tsy mihambo hanana fahaleovana hahahevitra asa toy izany avy amin’ny tenanay; fa avy amin’Andriamanitra ny fahaleovana ananany. '
  '6':
  - type: text
    content: 'Eny, Andriamanitra no anananay fahaleovana ho mpanompon’ny Fanekempihavanana Vaovao, dia ilay Fanekempihavanana tsy miankina amin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ' voasoratra fa amin’ny Fanahy Masina. Mahafaty manko ny lalàna voasoratra fa ny Fanahy Masina no mahavelona'
  - type: note
    content: Ampit Jer 31.31.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Raha natao sokitra teo amina takela-bato ny lalàna, dia niseho ny voninahitr’Andriamanitra; ary namirapiratra ny tavan’i Mosesy, ka tsy tantin’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' nobanjinina ny tavany'
  - type: note
    content: Jereo Eks 34.29.
  - type: text
    content: ', na dia namirapiratra nihelina ihany aza. Koa raha heni-boninahitra toy izany àry ny fanompoana teo amin’ny lalàna izay mitondra fahafatesana, '
  '8':
  - type: text
    content: 'tsy vao mainka ho heni-boninahitra kokoa ve ny fanompoana ombàn’ny Fanahy Masina? '
  '9':
  - type: text
    content: 'Raha ny fanompoana nitondra fanamelohana ny olona aza nisy voninahitra, dia vao mainka hisy tombom-boninahitra kokoa ny fanompoana andraisan’ny olona ny fahamarinan’Andriamanitra; '
