document_id: 2CO.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Mpanompon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanekempihavanana Vaovao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manomboka midera tena indray ve izahay amin’izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa kosa toy ny sasany izahay ka mila taratasy filazàn-tsoa momba anay ho anareo na avy aminareo? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria ny voninahitra namirapiratra fahiny dia tsinontsinona miohatra amin’ny voninahitra ankehitriny izay tena ambony lavitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, raha izay nihelina ihany aza nisy voninahitra, dia vao mainka ho heni-boninahitra kokoa izay maharitra mandrakizay.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria manana izany fanantenana izany izahay, dia be fahasahiana tokoa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izahay dia tsy tahaka an’i Mosesy izay nisaron-tava mba tsy hahitan’ny vahoaka Israely ny fiafaran’ilay famirapiratany mihelina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 34.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa nihadonto ny sain’ny vahoaka Israely; ary mandraka androany dia tsy nesorina ny zava-manarona ny sainy, fa mbola ao ihany raha mamaky ny boky mirakitra ny Fanekempihavanana Taloha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny boky '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mirakitra ny Fampihavanana Taloha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mirakitra ny Testamenta Taloha.
      marker-yv: yv-n
    - type: text
      text: 'izy ireo; satria ho an’ny olona tafaray amin’i Kristy no foana izany sarona izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandraka androany, isaky ny vakîna ny bokin’i Mosesy, dia mbola misarona ihany ny fon’ny vahoaka Israely. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa isaky ny miverina amin’ny Tompo kosa ny olona, dia miesotra izany sarona izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'isaky ny... izany sarona izany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: isaky ny mitodika amin’ny Tompo izy (Mosesy), dia esoriny ny saron-tavany.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Jereo Eks 34.34.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka ny hoe Tompo eto dia ny Fanahy; fa ao amin’izay itoeran’ilay Fanahin’ny Tompo no misy fahafahana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isika rehetra kosa dia tsy mba misaron-tava, fa toy ny fitaratra tarafin’ny voninahitry ny Tompo; ka dia miova endrika hanahaka ny Tompo isika, sady mitombo hatrany ny famirapiratantsika, araka ny asa tontosain’ilay Fanahin’ny Tompo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianareo mihitsy no taratasinay, taratasy voasoratra ato am-ponay ka fantatry ny olona rehetra sady vakîny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miharihary fa taratasy soratanan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ianareo, ary nampitondraina anay; kanefa tsy taratasy voasoratra tamina ranomainty fa tamin’ny alalan’ny Fanahin’ilay Andriamanitra velona, tsy taratasy voasokitra eo amina takela-bato fa ao am-pon’olombelona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 24.12; Jer 31.33; Ezek 11.9; 36.26.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Milaza izany izahay satria Andriamanitra no itokianay tokoa amin’ny alalan’i Kristy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izahay dia tsy mihambo hanana fahaleovana hahahevitra asa toy izany avy amin’ny tenanay; fa avy amin’Andriamanitra ny fahaleovana ananany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, Andriamanitra no anananay fahaleovana ho mpanompon’ny Fanekempihavanana Vaovao, dia ilay Fanekempihavanana tsy miankina amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' voasoratra fa amin’ny Fanahy Masina. Mahafaty manko ny lalàna voasoratra fa ny Fanahy Masina no mahavelona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jer 31.31.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha natao sokitra teo amina takela-bato ny lalàna, dia niseho ny voninahitr’Andriamanitra; ary namirapiratra ny tavan’i Mosesy, ka tsy tantin’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' nobanjinina ny tavany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 34.29.
      marker-yv: yv-n
    - type: text
      text: ', na dia namirapiratra nihelina ihany aza. Koa raha heni-boninahitra toy izany àry ny fanompoana teo amin’ny lalàna izay mitondra fahafatesana, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy vao mainka ho heni-boninahitra kokoa ve ny fanompoana ombàn’ny Fanahy Masina? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ny fanompoana nitondra fanamelohana ny olona aza nisy voninahitra, dia vao mainka hisy tombom-boninahitra kokoa ny fanompoana andraisan’ny olona ny fahamarinan’Andriamanitra; '
