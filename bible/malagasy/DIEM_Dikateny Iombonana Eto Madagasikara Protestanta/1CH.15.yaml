  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao ny fomba fidiovana ny mpisorona sy ny levita mba hampakatra ny Vatamasin’ny TOMPO Andriamanitr’i Israely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nolanjain’ny levita teny an-tsorony tamin’ny hazo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
