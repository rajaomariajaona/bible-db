document_id: 1CH.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanomanan’i Davida ny fitondrana ny Vatamasina mirakitra ny Fanekempihavanana
  - type: text
    content: I Davida dia nanao trano ho an’ny tenany tao «an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: '», sady nanomana toerana sy nanorina tranolay teo ho an’ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’Andriamanitra
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'tamin’ny taranak’i Hoziela dia i Haminadaba lehibeny mbamin’ny namany 112 lahy. '
  '11':
  - type: text
    content: 'Nantsoin’i Davida ny mpisorona, dia ry i Tsadôka sy i Abiatara, nantsoiny koa ny levita, dia ry i Oriela sy i Hasaià ary i Jôela mbamin-dry i Semahià sy i Eliela ary i Haminadaba, '
  '12':
  - type: text
    content: 'ka nilazany hoe:'
  - type: text
    content: '–Ianareo loham-pianakaviana levita, manaova ny fomba '
  - type: text
    content: fidiovana
  - type: text
    content: ' ianareo sy ny namanareo, dia ampakaro ilay Vatamasin’ny TOMPO Andriamanitr’i Israely, ho eo amin’ny toerana izay efa namboariko ho azy. '
  '13':
  - type: text
    content: Fa tamin’ny nampiakarana azy voalohany, dia tsy teo ianareo; noho izany, dia nasian’ny TOMPO Andriamanitsika mafy izahay satria tsy nanontany Azy araka ny fitsipika
  - type: note
    content: 'voalohany: toe-javatra nitranga teo aloha voatantara ao amin’ny 13.9-11 no tsiahivina eto. –satria tsy...fitsipika: dkt hafa satria tsy nikarakara ny Vatamasina araka ny tokony ho izy izahay.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Dia nanao ny fomba fidiovana ny mpisorona sy ny levita mba hampakatra ny Vatamasin’ny TOMPO Andriamanitr’i Israely. '
  '15':
  - type: text
    content: Ary nolanjain’ny levita teny an-tsorony tamin’ny hazo
  - type: note
    content: 'ny levita: jereo Nom 4.1-15. –tamin’ny hazo: jereo Eks 25.13-14.'
  - type: text
    content: ' ny Vatamasina, araka izay didin’i Mosesy mifandraika amin’ny tenin’ny TOMPO. '
  '16':
  - type: text
    content: 'Ireo lehiben’ny levita kosa nasain’i Davida hanendry ny namany izay tokony hihira miaraka amin’ny zava-maneno, dia ny valiha sy ny lokanga ary ny kipantsona, ka hampanakoako ny feon-kira ho mariky ny firavoravoana. '
  '17':
  - type: text
    content: 'Dia notendren’ny levita i Hemàna zanakalahin’i Jôela, sy i Asafa zanakalahin’i Berekià sady naman’i Hemàna, ary i Etàna zanakalahin’i Kosaià avy amin’ny fokon’i Merarỳ sady naman-dry i Hemàna sy i Asafa. '
  '18':
  - type: text
    content: 'Miaraka amin’izy telo lahy, amin’ny laharana faharoa, ireto mpiandry vavahady namany ireto: dia i Zakarià zanakalahin’i..., i Jahaziela sy i Semiramôta, i Jehiela sy i Honỳ, i Eliaba sy i Benaià, i Mahaseià sy i Matitià, i Elifalà sy i Mikneià, i Hôbeda-Edôma sy i Jehiela ary i Hazazià'
  - type: note
    content: 'zanakalahin’i...: ny anaran-drainy dia tsy ao amin’ny RM. Azo adika hoe Bena, kanefa tsy hita etsy amin’ny 15.20 io anarana io. –i Hazazià: tsy hita ao amin’ny RM kanefa jereo ny dkt grika Septoazinta sy ny 15.21 etsy ambany.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'I Hemàna sy i Asafa ary i Etàna mpiventy hira dia nively ny kipantsona varahina; '
  '2':
  - type: text
    content: Tamin’izay i Davida dia nilaza hoe;
  - type: text
    content: '–Aza misy mitondra ilay Vatamasina afa-tsy ny '
  - type: text
    content: levita
  - type: text
    content: ' ihany, satria ireo no efa nofidin’ny TOMPO hitondra ny Vatamasiny sy hanao ny fanompoana momba izany'
  - type: note
    content: 'sy hanao... momba izany: dkt hafa sy hanompo Azy Tompo. –Jereo Deot 10.8.'
  - type: text
    content: ' hatrany hatrany.'
  '20':
  - type: text
    content: 'i Zakarià sy i Jahaziela, i Semiramôta sy i Jehiela, i Honỳ sy i Eliaba ary i Mahaseià sy i Benaià no nitendry tamin’ny valiha ireo gadom-peo ambony; '
  '21':
  - type: text
    content: i Matitià sy i Elifalà, i Mikneià sy i Hôbeda-Edôma ary i Jehiela sy i Hazazià kosa no nitendry tamin’ny lokanga ireo gadom-peo ambany
  - type: note
    content: 'ireo gadom-peo ambany: dkt hafa misy tadiny valo.'
  - type: text
    content: 'mba hanaingàn-kira. '
  '22':
  - type: text
    content: I Kenanià, lehiben’ny levita nisahana ny fitondrana ny Vatamasina, no nampianatra momba ny fitondrana
  - type: note
    content: 'ary i Kenanià... momba ny fitondrana: dkt hafa ary i Kenanià no lehiben’ny levita mpitendry zava-maneno, ka nanome ny feo.'
  - type: text
    content: 'azy satria nanavanana azy izany. '
  '23':
  - type: text
    content: 'I Berekià sy i Elkanà mpiandry vavahady no teo anilan’ny Vatamasina; '
  '24':
  - type: text
    content: toraka izany koa i Hôbeda-Edôma sy i Jehià mpiandry vavahady. Ary ireto mpisorona ireto kosa, dia i Sebanià sy i Jôsafata, i Natanaela sy i Hamasay mbamin’i Zakarià sy i Benaià ary i Elihezera, no nitsoka trompetra teo alohan’ny Vatamasin’Andriamanitra.
  - type: heading
    content: Ny fahatongavan’ny Vatamasina tao Jerosalema
  - type: heading
    content: (Jereo 2 Sam 6.12-19)
  '25':
  - type: text
    content: 'Feno fifaliana i Davida sy ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely mbamin’ny komandin-tafika mifehy arivo no nandeha hampakatra ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ', avy ao an-tranon’i Hôbeda-Edôma. '
  '26':
  - type: text
    content: 'Ary mba hanampian’Andriamanitra ny '
  - type: text
    content: levita
  - type: text
    content: ' izay nitondra ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO, dia notolorana '
  - type: text
    content: sorona
  - type: text
    content: ' ombilahy fito sy ondrilahy fito Izy. '
  '27':
  - type: text
    content: Akanjo rongony fotsy madinika no nanaovan’i Davida; niakanjo toy izany koa ny levita rehetra izay nitondra ny Vatamasina, sy ny mpiventy hira mbamin’i Kenanià lehiben’ny fitondrana ny Vatamasina
  - type: note
    content: 'fitondrana ny Vatamasina: na mpitendry zava-maneno.'
  - type: text
    content: '. Ary ankoatra izany i Davida dia nisalotra ny lambahoany rongony fanaon’ny mpisorona. '
  '28':
  - type: text
    content: I Israely lafy valo no nampakatra ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO ho any Jerosalema; ka tamin’ny horakora-pifaliana, ombàn’ny feon’anjombona aman-trompetra sy kipantsona miaraka amin’ny tendry valiha sy lokanga, no nampakarany azy.
  '29':
  - type: text
    content: Fa rehefa tonga tao an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ' ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO, dia nitsirika teo am-baravarankely i Mikala, zanakavavin’i Saoly; ka nony nahita an’i Davida mpanjaka nitotorebika nandihy izy, dia naneso azy anakampony.'
  '3':
  - type: text
    content: 'Dia novorin’i Davida tao Jerosalema i Israely lafy valo mba hampakatra ny Vatamasin’ny TOMPO ho eo amin’ny toerana izay efa namboarina ho azy. '
  '4':
  - type: text
    content: 'Novorin’i Davida koa ny taranak’i Aharôna sy ny levita. '
  '5':
  - type: text
    content: 'Ireto avy ny levita: tamin’ny taranak’i Kehata dia i Oriela lehibeny mbamin’ny namany 120 lahy; '
  '6':
  - type: text
    content: 'tamin’ny taranak’i Merarỳ dia i Hasaià lehibeny mbamin’ny namany 220 lahy; '
  '7':
  - type: text
    content: 'tamin’ny taranak’i Gersôna dia i Jôela lehibeny mbamin’ny namany 130 lahy; '
  '8':
  - type: text
    content: 'tamin’ny taranak’i Elitsafàna dia i Semahià lehibeny mbamin’ny namany roanjato lahy; '
  '9':
  - type: text
    content: 'tamin’ny taranak’i Hebrôna dia i Eliela lehibeny mbamin’ny namany valopolo lahy; '
