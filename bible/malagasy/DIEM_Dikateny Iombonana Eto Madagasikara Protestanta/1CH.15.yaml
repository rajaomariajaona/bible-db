    children:
    - type: text
      text: 'ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianareo loham-pianakaviana levita, manaova ny fomba '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fidiovana
    - type: text
      text: ' ianareo sy ny namanareo, dia ampakaro ilay Vatamasin’ny TOMPO Andriamanitr’i Israely, ho eo amin’ny toerana izay efa namboariko ho azy. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa tamin’ny nampiakarana azy voalohany, dia tsy teo ianareo; noho izany, dia nasian’ny TOMPO Andriamanitsika mafy izahay satria tsy nanontany Azy araka ny fitsipika
