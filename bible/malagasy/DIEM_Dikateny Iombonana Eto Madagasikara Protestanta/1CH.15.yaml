      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Hemàna sy i Asafa ary i Etàna mpiventy hira dia nively ny kipantsona varahina; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay i Davida dia nilaza hoe;
  - type: usfm
