      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fitondrana ny Vatamasina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpitendry zava-maneno
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Ary ankoatra izany i Davida dia nisalotra ny lambahoany rongony fanaon’ny mpisorona. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Israely lafy valo no nampakatra ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO ho any Jerosalema; ka tamin’ny horakora-pifaliana, ombàn’ny feon’anjombona aman-trompetra sy kipantsona miaraka amin’ny tendry valiha sy lokanga, no nampakarany azy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa rehefa tonga tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: ' ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO, dia nitsirika teo am-baravarankely i Mikala, zanakavavin’i Saoly; ka nony nahita an’i Davida mpanjaka nitotorebika nandihy izy, dia naneso azy anakampony.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novorin’i Davida tao Jerosalema i Israely lafy valo mba hampakatra ny Vatamasin’ny TOMPO ho eo amin’ny toerana izay efa namboarina ho azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorin’i Davida koa ny taranak’i Aharôna sy ny levita. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy ny levita: tamin’ny taranak’i Kehata dia i Oriela lehibeny mbamin’ny namany 120 lahy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny taranak’i Merarỳ dia i Hasaià lehibeny mbamin’ny namany 220 lahy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny taranak’i Gersôna dia i Jôela lehibeny mbamin’ny namany 130 lahy; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny taranak’i Elitsafàna dia i Semahià lehibeny mbamin’ny namany roanjato lahy; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny taranak’i Hebrôna dia i Eliela lehibeny mbamin’ny namany valopolo lahy; '
