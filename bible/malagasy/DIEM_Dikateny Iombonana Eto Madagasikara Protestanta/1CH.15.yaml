      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’Andriamanitra
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny taranak’i Hoziela dia i Haminadaba lehibeny mbamin’ny namany 112 lahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nantsoin’i Davida ny mpisorona, dia ry i Tsadôka sy i Abiatara, nantsoiny koa ny levita, dia ry i Oriela sy i Hasaià ary i Jôela mbamin-dry i Semahià sy i Eliela ary i Haminadaba, '
  '12':
  - type: usfm
