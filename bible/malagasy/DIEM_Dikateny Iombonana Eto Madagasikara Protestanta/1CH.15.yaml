      - type: usfm
        marker: fk
        children:
        - type: text
          text: tamin’ny hazo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Eks 25.13-14.'
      marker-yv: yv-n
    - type: text
      text: ' ny Vatamasina, araka izay didin’i Mosesy mifandraika amin’ny tenin’ny TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo lehiben’ny levita kosa nasain’i Davida hanendry ny namany izay tokony hihira miaraka amin’ny zava-maneno, dia ny valiha sy ny lokanga ary ny kipantsona, ka hampanakoako ny feon-kira ho mariky ny firavoravoana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notendren’ny levita i Hemàna zanakalahin’i Jôela, sy i Asafa zanakalahin’i Berekià sady naman’i Hemàna, ary i Etàna zanakalahin’i Kosaià avy amin’ny fokon’i Merarỳ sady naman-dry i Hemàna sy i Asafa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miaraka amin’izy telo lahy, amin’ny laharana faharoa, ireto mpiandry vavahady namany ireto: dia i Zakarià zanakalahin’i..., i Jahaziela sy i Semiramôta, i Jehiela sy i Honỳ, i Eliaba sy i Benaià, i Mahaseià sy i Matitià, i Elifalà sy i Mikneià, i Hôbeda-Edôma sy i Jehiela ary i Hazazià'
    - type: usfm
