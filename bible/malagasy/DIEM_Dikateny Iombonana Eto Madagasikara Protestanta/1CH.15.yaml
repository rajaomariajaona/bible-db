      children:
      - type: text
        text: sorona
    - type: text
      text: ' ombilahy fito sy ondrilahy fito Izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Akanjo rongony fotsy madinika no nanaovan’i Davida; niakanjo toy izany koa ny levita rehetra izay nitondra ny Vatamasina, sy ny mpiventy hira mbamin’i Kenanià lehiben’ny fitondrana ny Vatamasina
    - type: usfm
      marker: f
