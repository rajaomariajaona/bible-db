  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Berekià sy i Elkanà mpiandry vavahady no teo anilan’ny Vatamasina; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: toraka izany koa i Hôbeda-Edôma sy i Jehià mpiandry vavahady. Ary ireto mpisorona ireto kosa, dia i Sebanià sy i Jôsafata, i Natanaela sy i Hamasay mbamin’i Zakarià sy i Benaià ary i Elihezera, no nitsoka trompetra teo alohan’ny Vatamasin’Andriamanitra.
  - type: usfm
