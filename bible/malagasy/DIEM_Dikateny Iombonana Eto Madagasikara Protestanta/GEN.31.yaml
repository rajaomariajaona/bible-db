document_id: GEN.31,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ren’i Jakôba fa ny zanakalahin’i Labàna efa nilaza hoe: «Lasan’i Jakôba avokoa ny fananan-draintsika, ary avy tamin’izany fananan-draintsika izany no nananany izao harena rehetra izao.» '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tamin’ny fotoana nikambanan’ny biby dia hitako tamin’ny nofy fa ny lahy sadìka sy maramara ary sada no nikambana tamin’ny vavy. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ka nantsoin’ny anjelin’Andriamanitra tamin’ny nofy aho nataony hoe: «Ry Jakôba ô!», dia namaly aho hoe: «Inty aho.» '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ka hoy izy tamiko: «Jereo fa ny lahy rehetra izay mikambana amin’ny ondrivavy na osivavy, dia sadìka sy maramara ary sada avokoa, satria efa hitako izay rehetra nataon’i Labàna taminao. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izaho no Andriamanitra Izay niseho taminao tao Betela, ka nanosoranao tsangambato sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nivoadianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nivoadianao...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 28.18-22.
      marker-yv: yv-n
    - type: text
      text: . Miaingà ankehitriny, ilaozy ity tany ity ka miverena any amin’ny tany misy ny fianakavianao.»
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Jakôba i Leà sy i Rahely ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona intsony moa no anjaranay sy lovanay ato an-tranon’i dada? '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Moa tsy efa noheveriny ho toy ny vahiny ve izahay ka namidiny? Ary tsy efa nohaniny koa ve ny volanay? '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Noho izany, ny harena efa nesorin’Andriamanitra tamin’ny rainay dia ho anay sy ny zanakay. Koa ankehitriny, tanteraho izay rehetra nolazain’Andriamanitra taminao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niainga i Jakôba ka natainginy teny ambony rameva ireo vady aman-janany; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nentiny ny biby fiompiny rehetra sy ny fananany rehetra izay noharîny tany Mezôpôtamia ambony, dia nizotra hankany amin’i Itsehàka rainy, any amin’ny tany Kanahàna izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Labàna tamin’izay dia lasa nanety ny ondry aman’osiny; ka nangalarin’i Rahely ny sampin-drainy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitan’i Jakôba nisoritra teny amin’ny tarehin’i Labàna fa tsy toy ny teo aloha intsony ny fiarahany aminy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namitaka an’i Labàna aramianina i Jakôba fa nandositra tsy niteniteny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nandositra niaraka tamin’ny fananany rehetra izy, ka niampita faingana ny ony Eofrata ary nizotra hankany an-tendrombohitr’i Gilehada.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka telo andro, dia nisy nitantara tamin’i Labàna fa nandositra i Jakôba. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nentin’i Labàna niaraka taminy ny havany, dia nanenjika an’i Jakôba tokony ho lalana fito andro izy, ka nahatratra azy teo an-tendrombohitr’i Gilehada. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tany amin’i Labàna aramianina tamin’ny nofy anefa Andriamanitra nony alina ka nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mampitandrina anao Aho mba tsy hanao na inona na inona amin’i Jakôba!
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nahatratra an’i Jakôba i Labàna, fony i Jakôba efa nanorina ny lainy teo an-tendrombohitr’i Gilehada; ary i Labàna sy ny havany koa nanorina ny lainy teo '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nilaza tamin’i Jakôba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona izao nataonao izao? Nahoana no namitaka ahy ianao, ka nentinao mandositra toy ny babo an’ady ireo zanako vavy? '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nahoana no nandositra an-tsokosoko ianao ka namitaka ahy? Raha nampandre ahy anefa ianao, dia ho nateriko nombàn’ny hiram-pifaliana sy ny ampongatapaka ary ny lokanga. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Kanefa tsy navelanao hanoroka ny zanako aman-jafiko akory aho, koa dia efa nanao hadalana ianao. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Afaka manisy ratsy anao aho, kanefa Ilay Andriamanitry ny rainao dia nilaza tamiko halina hoe: «Mampitandrina anao Aho mba tsy hanao na inona na inona amin’i Jakôba.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hoy ny TOMPO tamin’i Jakôba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miverena any amin’ny tanin’ny razanao sy any amin’ny fianakavianao, fa homba anao Aho!
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ankehitriny mandeha mody tokoa ianao satria manina ny akanin-drainao, kanefa nahoana no nangalarinao ireo sampiko?
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly an’i Labàna kosa i Jakôba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Natahotra aho, dia niteny anakampo hoe: «Sao alainy an-keriny amiko ireo zanany vavy!» '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa raha misy ahatraranao ireo sampinao kosa ny oloko, dia aza velomina. Eto anatrehan’ireo havantsika, dia savao avokoa izay eto amiko, dia ento ny anao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Jakôba dia tsy nahalala velively hoe i Rahely no nangalatra ny sampy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nidiran’i Labàna ny lain’i Jakôba sy ny an’i Leà ary ny an’ireo mpanompovavy roa fa tsy nahita izy. Ary nivoaka avy tao amin’ny lain’i Leà izy, dia niditra tao amin’ny lain’i Rahely. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Rahely anefa no naka ireo sampy ka nametraka azy tao ambanin’ny laselin’ny rameva dia nipetraka teo amboniny. Ka rehefa nisava ny lay manontolo i Labàna, dia tsy nahita na inona na inona. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Rahely tamin’ny rainy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Azafady eo imasonao, tompoko, fa tsy afa-mitsangana eo anatrehanao aho fa tonga fotoana. Dia nikaroka i Labàna fa tsy nahita ireo sampy. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tezitra i Jakôba ka nifamaly tamin’i Labàna nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona no fahadisoako, ary inona no heloko no dia nilomay nanenjika ahy ianao? '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nosavanao ny entako rehetra, ka inona no hitanao? Asehoy eo imason’ny havanao sy ireo havako izany hitsarany antsika. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Roapolo taona izao no efa niarahako taminao, nefa ny ondrivavinao aman’osivavinao tsy mba namotsotra; sady tsy mbola nihinana ondrilahy tamin’ny andian’ondrinao na oviana na oviana aho. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy mbola nitondra ireo fatim-biby voaviraviran’ny bibidia tany aminao mihitsy aho, fa izaho no nanolo azy; teo am-pelatanako no nitadiavanao izay nangalarin’olona na tamin’ny andro na tamin’ny alina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 22.12; Ham 3.12. Ny mpiandry ondry, izay afaka mitondra ireo sisa tsy lanin’ny biby, dia tsy mizaka ny fahavoazana teo amin’ny zavatra very.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Jakôba nampiantso an’i Rahely sy i Leà ho any aminy tany an-tsaha izay nisy ny andian’ondry aman’osiny, '
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Niaritra ny hafanana amin’ny antoandro aho, ary jihitry ny hatsiaka amin’ny alina ka tsy nopizin-tory akory. '
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Efa roapolo taona izao no nanompoako anao: efatra ambin’ny folo taona no niasako mba hanambadiako ny zanakao roa vavy, ary enin-taona mba hahazoako ondry aman’osy, saingy efa impolo kely ianao no nanova ny karamako. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha tsy nomba ahy ny Andriamanitr’i Abrahama raibeko, ilay Andriamanitra nampihorohoro an’i Itsehàka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Anaram-boninahitra nomena an’Andriamanitra izany; dkt hafa: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ilay havan’i Itsehàka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', dia ho nalefanao nitondra tanam-polo aho ankehitriny. Fa nahita ny fijaliako sy ny hasasarako Andriamanitra ka nananatra anao halina.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Jakôba i Labàna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ireo zazavavy ireo dia zanako, ny zanak’ireo dia taranako, ny andian’ondry aman’osy dia ondry aman’osiko, ary izao rehetra hitanao izao dia ahy avokoa. Manomboka anio dia tsy misy na inona na inona azoko atao intsony ho an’ireto zanako vavy ireto na ho an’ireo zanakalahy izay naterany? '
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa andeha ankehitriny hanao fifanekena izaho sy ianao, ary aoka hisy vavolombelon’izany eo amintsika.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka vato anankiray i Jakôba ka nanangana azy ho tsangambato. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo nasain’i Jakôba nanangona vato iretsy havany an-daniny, dia naka vato ireo ka nanao antontany; ary nihinana teo ambonin’io antontam-bato io ny besinimaro. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nantsoin’i Labàna hoe Jegara-Sahadotà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.47 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jegara-Sahadotà '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia dikanteny aramianina tandrifin’ny teny hebreo Galehèda (antontam-bato vavolombelona).
      marker-yv: yv-n
    - type: text
      text: ' io toerana io, fa i Jakôba kosa nanao azy hoe Galeheda. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no nambaran’i Labàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ity antontam-bato ity dia vavolombelona eo amiko sy aminao androany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no niantsoana azy ho Galeheda, izany hoe antontam-bato vavolombelona. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nantsoina koa hoe Mitsepà, na toerana fanaraha-maso, satria i Labàna efa nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka ny TOMPO hanara-maso ahy sy ianao, rehefa tsy mifankahita isika! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nilaza tamin’izy mirahavavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hitako nisoritra teny amin’ny endriky ny rainareo fa tsy tahaka ny teo aloha intsony ny fifandraisany amiko, kanefa ilay Andriamanitry ny raiko efa nanambina ahy. '
  '50':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha mampijaly ny zanako vavy ianao, na maka vehivavy hafa ho vadinao, dia tandremo fa tsy olona no vavolombelontsika fa Andriamanitra mihitsy.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy teo dia hoy koa i Labàna tamin’i Jakôba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Jereo ity antontam-bato izay naoriko teo, jereo io tsangambato io. '
  '52':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ity antontam-bato ity sy io tsangambato io no vavolombelona amintsika, ka izaho mianiana tsy hihoatra hankany aminao hanisy ratsy anao ary ianao mianiana tsy hihoatra hankaty amiko hanisy ratsy
    - type: usfm
      marker: f
