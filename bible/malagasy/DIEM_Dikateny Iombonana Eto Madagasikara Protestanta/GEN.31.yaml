        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fandrao hiharan-doza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ahy. '
  '53':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Aoka Andriamanitr’i Abrahama sady Andriamanitr’i Nahôra no ho mpitsara antsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.53 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nahôra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'rahalahin’i Abrahama (Gen 11.26) sady raiben’i Labàna (Gen 24.24-29). Ny narahana eto dia ireo stf hebreo sasany sy ilay dikanteny tranainy grika izay tsy manisy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Andriamanitry ny razany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ilay Andriamanitra Izay nampihorohoro an’i Itsehàka rainy no nianianan’i Jakôba. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' teo an-tendrombohitra i Jakôba ka nanasa ireto havany hiara-misakafo aminy. Ary rehefa avy nisakafo ny besinimaro, dia nandry teo an-tendrombohitra tamin’ny alina.'
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fantatrareo fa tamin’ny heriko rehetra no nanompoako an-drainareo, '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'kanefa namitaka ahy izy fa efa nanova ny karamako impolo. Saingy tsy navelan’Andriamanitra hanisy ratsy ahy izy. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha nilaza izy hoe: «Ny biby maramara rehetra no ho karamanao,» dia niteraka maramara avokoa ny ondry aman’osy vavy rehetra. Ary raha hoy indray izy hoe: «Ny sadìka no karamanao,» dia niteraka sadìka avokoa ny ondry aman’osy vavy rehetra. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Andriamanitra mihitsy no nanaisotra ny fananan-drainareo mba homeny ahy. '
