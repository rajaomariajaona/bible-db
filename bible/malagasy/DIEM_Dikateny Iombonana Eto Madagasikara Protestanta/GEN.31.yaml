document_id: GEN.31,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Kanefa ren’i Jakôba fa ny zanakalahin’i Labàna efa nilaza hoe: «Lasan’i Jakôba avokoa ny fananan-draintsika, ary avy tamin’izany fananan-draintsika izany no nananany izao harena rehetra izao.» '
  '10':
  - type: text
    content: 'Tamin’ny fotoana nikambanan’ny biby dia hitako tamin’ny nofy fa ny lahy sadìka sy maramara ary sada no nikambana tamin’ny vavy. '
  '11':
  - type: text
    content: 'Ka nantsoin’ny anjelin’Andriamanitra tamin’ny nofy aho nataony hoe: «Ry Jakôba ô!», dia namaly aho hoe: «Inty aho.» '
  '12':
  - type: text
    content: 'Ka hoy izy tamiko: «Jereo fa ny lahy rehetra izay mikambana amin’ny ondrivavy na osivavy, dia sadìka sy maramara ary sada avokoa, satria efa hitako izay rehetra nataon’i Labàna taminao. '
  '13':
  - type: text
    content: 'Izaho no Andriamanitra Izay niseho taminao tao Betela, ka nanosoranao tsangambato sy '
  - type: text
    content: nivoadianao
  - type: note
    content: 'nivoadianao...: jereo Gen 28.18-22.'
  - type: text
    content: . Miaingà ankehitriny, ilaozy ity tany ity ka miverena any amin’ny tany misy ny fianakavianao.»
  '14':
  - type: text
    content: 'Dia namaly an’i Jakôba i Leà sy i Rahely ka nanao hoe:'
  - type: text
    content: '–Inona intsony moa no anjaranay sy lovanay ato an-tranon’i dada? '
  '15':
  - type: text
    content: 'Moa tsy efa noheveriny ho toy ny vahiny ve izahay ka namidiny? Ary tsy efa nohaniny koa ve ny volanay? '
  '16':
  - type: text
    content: Noho izany, ny harena efa nesorin’Andriamanitra tamin’ny rainay dia ho anay sy ny zanakay. Koa ankehitriny, tanteraho izay rehetra nolazain’Andriamanitra taminao.
  '17':
  - type: text
    content: 'Ary niainga i Jakôba ka natainginy teny ambony rameva ireo vady aman-janany; '
  '18':
  - type: text
    content: 'nentiny ny biby fiompiny rehetra sy ny fananany rehetra izay noharîny tany Mezôpôtamia ambony, dia nizotra hankany amin’i Itsehàka rainy, any amin’ny tany Kanahàna izy. '
  '19':
  - type: text
    content: 'I Labàna tamin’izay dia lasa nanety ny ondry aman’osiny; ka nangalarin’i Rahely ny sampin-drainy. '
  '2':
  - type: text
    content: 'Hitan’i Jakôba nisoritra teny amin’ny tarehin’i Labàna fa tsy toy ny teo aloha intsony ny fiarahany aminy. '
  '20':
  - type: text
    content: 'Namitaka an’i Labàna aramianina i Jakôba fa nandositra tsy niteniteny. '
  '21':
  - type: text
    content: Nandositra niaraka tamin’ny fananany rehetra izy, ka niampita faingana ny ony Eofrata ary nizotra hankany an-tendrombohitr’i Gilehada.
  '22':
  - type: text
    content: 'Nony afaka telo andro, dia nisy nitantara tamin’i Labàna fa nandositra i Jakôba. '
  '23':
  - type: text
    content: 'Nentin’i Labàna niaraka taminy ny havany, dia nanenjika an’i Jakôba tokony ho lalana fito andro izy, ka nahatratra azy teo an-tendrombohitr’i Gilehada. '
  '24':
  - type: text
    content: 'Tonga tany amin’i Labàna aramianina tamin’ny nofy anefa Andriamanitra nony alina ka nilaza taminy hoe:'
  - type: text
    content: –Mampitandrina anao Aho mba tsy hanao na inona na inona amin’i Jakôba!
  '25':
  - type: text
    content: 'Dia nahatratra an’i Jakôba i Labàna, fony i Jakôba efa nanorina ny lainy teo an-tendrombohitr’i Gilehada; ary i Labàna sy ny havany koa nanorina ny lainy teo '
  '26':
  - type: text
    content: 'ka nilaza tamin’i Jakôba hoe:'
  - type: text
    content: '–Inona izao nataonao izao? Nahoana no namitaka ahy ianao, ka nentinao mandositra toy ny babo an’ady ireo zanako vavy? '
  '27':
  - type: text
    content: 'Nahoana no nandositra an-tsokosoko ianao ka namitaka ahy? Raha nampandre ahy anefa ianao, dia ho nateriko nombàn’ny hiram-pifaliana sy ny ampongatapaka ary ny lokanga. '
  '28':
  - type: text
    content: 'Kanefa tsy navelanao hanoroka ny zanako aman-jafiko akory aho, koa dia efa nanao hadalana ianao. '
  '29':
  - type: text
    content: 'Afaka manisy ratsy anao aho, kanefa Ilay Andriamanitry ny rainao dia nilaza tamiko halina hoe: «Mampitandrina anao Aho mba tsy hanao na inona na inona amin’i Jakôba.» '
  '3':
  - type: text
    content: 'Koa hoy ny TOMPO tamin’i Jakôba:'
  - type: text
    content: –Miverena any amin’ny tanin’ny razanao sy any amin’ny fianakavianao, fa homba anao Aho!
  '30':
  - type: text
    content: Ary ankehitriny mandeha mody tokoa ianao satria manina ny akanin-drainao, kanefa nahoana no nangalarinao ireo sampiko?
  '31':
  - type: text
    content: 'Namaly an’i Labàna kosa i Jakôba hoe:'
  - type: text
    content: '–Natahotra aho, dia niteny anakampo hoe: «Sao alainy an-keriny amiko ireo zanany vavy!» '
  '32':
  - type: text
    content: Fa raha misy ahatraranao ireo sampinao kosa ny oloko, dia aza velomina. Eto anatrehan’ireo havantsika, dia savao avokoa izay eto amiko, dia ento ny anao.
  - type: text
    content: Fa i Jakôba dia tsy nahalala velively hoe i Rahely no nangalatra ny sampy.
  '33':
  - type: text
    content: 'Nidiran’i Labàna ny lain’i Jakôba sy ny an’i Leà ary ny an’ireo mpanompovavy roa fa tsy nahita izy. Ary nivoaka avy tao amin’ny lain’i Leà izy, dia niditra tao amin’ny lain’i Rahely. '
  '34':
  - type: text
    content: 'I Rahely anefa no naka ireo sampy ka nametraka azy tao ambanin’ny laselin’ny rameva dia nipetraka teo amboniny. Ka rehefa nisava ny lay manontolo i Labàna, dia tsy nahita na inona na inona. '
  '35':
  - type: text
    content: 'Dia hoy i Rahely tamin’ny rainy:'
  - type: text
    content: '–Azafady eo imasonao, tompoko, fa tsy afa-mitsangana eo anatrehanao aho fa tonga fotoana. Dia nikaroka i Labàna fa tsy nahita ireo sampy. '
  '36':
  - type: text
    content: 'Tezitra i Jakôba ka nifamaly tamin’i Labàna nanao hoe:'
  - type: text
    content: '–Inona no fahadisoako, ary inona no heloko no dia nilomay nanenjika ahy ianao? '
  '37':
  - type: text
    content: 'Nosavanao ny entako rehetra, ka inona no hitanao? Asehoy eo imason’ny havanao sy ireo havako izany hitsarany antsika. '
  '38':
  - type: text
    content: 'Roapolo taona izao no efa niarahako taminao, nefa ny ondrivavinao aman’osivavinao tsy mba namotsotra; sady tsy mbola nihinana ondrilahy tamin’ny andian’ondrinao na oviana na oviana aho. '
  '39':
  - type: text
    content: Tsy mbola nitondra ireo fatim-biby voaviraviran’ny bibidia tany aminao mihitsy aho, fa izaho no nanolo azy; teo am-pelatanako no nitadiavanao izay nangalarin’olona na tamin’ny andro na tamin’ny alina
  - type: note
    content: Ampit Eks 22.12; Ham 3.12. Ny mpiandry ondry, izay afaka mitondra ireo sisa tsy lanin’ny biby, dia tsy mizaka ny fahavoazana teo amin’ny zavatra very.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ary i Jakôba nampiantso an’i Rahely sy i Leà ho any aminy tany an-tsaha izay nisy ny andian’ondry aman’osiny, '
  '40':
  - type: text
    content: 'Niaritra ny hafanana amin’ny antoandro aho, ary jihitry ny hatsiaka amin’ny alina ka tsy nopizin-tory akory. '
  '41':
  - type: text
    content: 'Efa roapolo taona izao no nanompoako anao: efatra ambin’ny folo taona no niasako mba hanambadiako ny zanakao roa vavy, ary enin-taona mba hahazoako ondry aman’osy, saingy efa impolo kely ianao no nanova ny karamako. '
  '42':
  - type: text
    content: Raha tsy nomba ahy ny Andriamanitr’i Abrahama raibeko, ilay Andriamanitra nampihorohoro an’i Itsehàka
  - type: note
    content: 'Anaram-boninahitra nomena an’Andriamanitra izany; dkt hafa: ilay havan’i Itsehàka.'
  - type: text
    content: ', dia ho nalefanao nitondra tanam-polo aho ankehitriny. Fa nahita ny fijaliako sy ny hasasarako Andriamanitra ka nananatra anao halina.'
  '43':
  - type: text
    content: 'Dia namaly an’i Jakôba i Labàna hoe:'
  - type: text
    content: '–Ireo zazavavy ireo dia zanako, ny zanak’ireo dia taranako, ny andian’ondry aman’osy dia ondry aman’osiko, ary izao rehetra hitanao izao dia ahy avokoa. Manomboka anio dia tsy misy na inona na inona azoko atao intsony ho an’ireto zanako vavy ireto na ho an’ireo zanakalahy izay naterany? '
  '44':
  - type: text
    content: Koa andeha ankehitriny hanao fifanekena izaho sy ianao, ary aoka hisy vavolombelon’izany eo amintsika.
  '45':
  - type: text
    content: 'Dia naka vato anankiray i Jakôba ka nanangana azy ho tsangambato. '
  '46':
  - type: text
    content: 'Avy eo nasain’i Jakôba nanangona vato iretsy havany an-daniny, dia naka vato ireo ka nanao antontany; ary nihinana teo ambonin’io antontam-bato io ny besinimaro. '
  '47':
  - type: text
    content: Nantsoin’i Labàna hoe Jegara-Sahadotà
  - type: note
    content: Jegara-Sahadotà dia dikanteny aramianina tandrifin’ny teny hebreo Galehèda (antontam-bato vavolombelona).
  - type: text
    content: ' io toerana io, fa i Jakôba kosa nanao azy hoe Galeheda. '
  '48':
  - type: text
    content: 'Ary izao no nambaran’i Labàna:'
  - type: text
    content: –Ity antontam-bato ity dia vavolombelona eo amiko sy aminao androany.
  - type: text
    content: 'Izany no niantsoana azy ho Galeheda, izany hoe antontam-bato vavolombelona. '
  '49':
  - type: text
    content: 'Nantsoina koa hoe Mitsepà, na toerana fanaraha-maso, satria i Labàna efa nilaza hoe:'
  - type: text
    content: '–Aoka ny TOMPO hanara-maso ahy sy ianao, rehefa tsy mifankahita isika! '
  '5':
  - type: text
    content: 'ka nilaza tamin’izy mirahavavy hoe:'
  - type: text
    content: '–Hitako nisoritra teny amin’ny endriky ny rainareo fa tsy tahaka ny teo aloha intsony ny fifandraisany amiko, kanefa ilay Andriamanitry ny raiko efa nanambina ahy. '
  '50':
  - type: text
    content: Raha mampijaly ny zanako vavy ianao, na maka vehivavy hafa ho vadinao, dia tandremo fa tsy olona no vavolombelontsika fa Andriamanitra mihitsy.
  '51':
  - type: text
    content: 'Avy teo dia hoy koa i Labàna tamin’i Jakôba:'
  - type: text
    content: '–Jereo ity antontam-bato izay naoriko teo, jereo io tsangambato io. '
  '52':
  - type: text
    content: Ity antontam-bato ity sy io tsangambato io no vavolombelona amintsika, ka izaho mianiana tsy hihoatra hankany aminao hanisy ratsy anao ary ianao mianiana tsy hihoatra hankaty amiko hanisy ratsy
  - type: note
    content: 'hanisy ratsy: dkt hafa fandrao hiharan-doza.'
  - type: text
    content: 'ahy. '
  '53':
  - type: text
    content: Aoka Andriamanitr’i Abrahama sady Andriamanitr’i Nahôra no ho mpitsara antsika
  - type: note
    content: 'Nahôra: rahalahin’i Abrahama (Gen 11.26) sady raiben’i Labàna (Gen 24.24-29). Ny narahana eto dia ireo stf hebreo sasany sy ilay dikanteny tranainy grika izay tsy manisy hoe Andriamanitry ny razany.'
  - type: text
    content: '!'
  - type: text
    content: 'Dia ilay Andriamanitra Izay nampihorohoro an’i Itsehàka rainy no nianianan’i Jakôba. '
  '54':
  - type: text
    content: 'Ary nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' teo an-tendrombohitra i Jakôba ka nanasa ireto havany hiara-misakafo aminy. Ary rehefa avy nisakafo ny besinimaro, dia nandry teo an-tendrombohitra tamin’ny alina.'
  '6':
  - type: text
    content: 'Fantatrareo fa tamin’ny heriko rehetra no nanompoako an-drainareo, '
  '7':
  - type: text
    content: 'kanefa namitaka ahy izy fa efa nanova ny karamako impolo. Saingy tsy navelan’Andriamanitra hanisy ratsy ahy izy. '
  '8':
  - type: text
    content: 'Raha nilaza izy hoe: «Ny biby maramara rehetra no ho karamanao,» dia niteraka maramara avokoa ny ondry aman’osy vavy rehetra. Ary raha hoy indray izy hoe: «Ny sadìka no karamanao,» dia niteraka sadìka avokoa ny ondry aman’osy vavy rehetra. '
  '9':
  - type: text
    content: 'Andriamanitra mihitsy no nanaisotra ny fananan-drainareo mba homeny ahy. '
