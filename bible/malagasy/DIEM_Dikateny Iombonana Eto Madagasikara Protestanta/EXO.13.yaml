document_id: EXO.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fepetra hafa miankina amin’ny Paska
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Isan-taona isan-taona, amin’ny fotoana voatondro, no hitandremanareo io fepetra io.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy koa i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Rehefa hampidirin’ny TOMPO ao amin’ny tanin’ny Kanahanita ianareo, ka homeny anareo ny tany araka izay efa nianianany taminareo sy ny razanareo, '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dia atolory ho an’ny TOMPO ny voalohan-teraka rehetra; fa an’ny TOMPO ny lahy rehetra voalohan-teraky ny biby fiompinareo. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny voalohan-teraky ny boriky kosa dia soloy zanakondry lahy na zanakosy lahy; fa raha tsy izany, dia aolàny hatoka izy ho faty. Ny lahimatoa rehetra amin’ny olona eo amin’ny taranakareo kosa dia havotanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny boriky dia biby tsy madio, izany hoe tsy azo atolotra ho sorona ho an’Andriamanitra. –Momba ny fanavotana ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: zaza lahimatoa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dia jereo Nom 18.16.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa rehefa manontany anareo ny zanakareo any aoriana hoe: «Inona no anton’izao?», dia hovalianareo hoe: «Tamim-pahefana mahery no namoahan’ny TOMPO anay hiala tany Ejipta izay toera-nanandevozana anay. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Niziriziry tsy nety nandefa anay ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ', ka naringan’ny TOMPO ny lahimatoa rehetra tany Ejipta, nanomboka tamin’ny voalohan-teraky ny olona ka hatramin’ny voalohan-teraky ny biby fiompy. Izany no anoloranay ho sorona amin’ny TOMPO ny lahy voalohan-teraka rehetra eo amin’ny biby; fa ny lahimatoa eo amin’ny zanakay kosa dia havotanay.» '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ireo sorona ireo dia ho solon’ny marika eo amin’ny sandrinareo sy ny handrinareo, ka hampahatsiaro anareo fa ny TOMPO no namoaka anareo hiala tany Ejipta tamim-pahefana mahery.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tarihin’ny Tompo lalana ny vahoakany
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Rehefa nalefan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' ny Israelita, dia tsy notarihin’Andriamanitra lalana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lalana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'eto, izay manaraka ny moron’i Mediteranea, dia voaara-mason’ny tafika ejiptianina. Ny amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Filistinina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo Gen 26.1 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' hankany amin’ny tanin’ny Filistinina na dia akaiky aza io. Nanahy mantsy Andriamanitra fandrao hatahotra ny hahita ady ny vahoaka ka hiova hevitra, ary hiverina any Ejipta. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Izany no antony nitondrany azy amin’ny lalana mihodidina ny taniefitra, mankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ranomasin’ny Volotara
    - type: text
      text: . Voalamina tsara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Voalamina tsara '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary fitaovana.
      marker-yv: yv-n
    - type: text
      text: 'ny Israelita fony niala avy tany Ejipta. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nalain’i Mosesy ny taolambalon’i Jôsefa ka nentiny niaraka taminy satria efa nampianiana ny Israelita i Jôsefa hoe: «Ho avy hanafaka anareo tokoa Andriamanitra, koa mianiàna amiko ianareo fa hampakatra ny taolambaloko miaraka aminareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 50.25; Jos 24.32.
      marker-yv: yv-n
    - type: text
      text: .»
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: –Atokany ho ahy ny lahimatoa rehetra ao amin’ny Israelita, na olona na biby fiompy, fa Ahy ireny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 3.13; Lk 2.23.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Niala tao Sokôta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sokôta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 12.37 sy nta; '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Etama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': toerana tsy fantatra mazava ny misy azy.'
      marker-yv: yv-n
    - type: text
      text: ' ny Israelita, ka mandeha mitohy tao Etama, any an-tsisin’ny taniefitra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nialoha azy ireo ny TOMPO ka andry rahona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'rahona '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: setroka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia manambara ny fanatrehan’ny Tompo eo anilan’ny vahoakany; ary izany fanatrehany izany dia sady akaiky no miafina (jereo 19.9). Tamin’ny fanompoam-pivavahana tatỳ aoriana, io rahona io dia nambara tamin’ny alalan’ny setroky ny emboka manitra nodorana teo amin’ny alitara (jereo Lev 16.2, 13).'
      marker-yv: yv-n
    - type: text
      text: ' no nitarihany lalana azy nony antoandro, ary andry afo no nanazavàny azy nony alina, hany ka afaka nandeha andro aman’alina ny Israelita. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy nitsahatra mialoha azy ireo ny andry rahona tamin’ny antoandro, na ny andry afo tamin’ny alina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy i Mosesy tamin’ny vahoaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsarovy ity andro anio ity: Fa tamim-pahefana mahery no namoahan’ny TOMPO anareo hiala tany Ejipta izay toera-nanandevozana anareo. Koa rehefa mankalaza izany ianareo, dia aoka tsy hihinana mofo misy leviora. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: fa tahaka izao andro amin’ny volana Abiba izao no niainganareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa hotsarovanareo hatrany hatrany izany zavatra izany amin’io volana io rehefa izay ianareo hampidirin’ny TOMPO ao amin’ny tanin’ny Kanahanita sy ny Hetita mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' sy ny Hivita ary ny Jebosita. Tany izay nianian’ny TOMPO tamin’ny razanareo fa homena anareo izany, tany tondra-dronono sy tantely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mandritra ny fito andro no hihinananareo mofo tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: ', ary ny andro fahafito no hanaovanareo fety firavoravoana ho fanomezam-boninahitra ny TOMPO. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mandritra io fito andro io dia aoka tsy hihinana mofo misy leviora ianareo, aoka tsy ho hita eo amin’ny faritaninareo rehetra na ny mofo misy leviora na ny leviora. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mandritra io fety io no hitantaranareo amin’ny zanakareo hoe: «Izao no ataonay dia noho izay nataon’ny TOMPO taminay fony izahay niala tany Ejipta.» '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Io fankalazana io dia ho solon’ny marika eo amin’ny sandrinareo sy ny handrinareo, ka hampahatsiaro fa tokony hambaranareo ny lalànan’ny TOMPO satria IZY no namoaka anareo hiala tany Ejipta tamim-pahefana mahery. '
