document_id: 1PE.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mikarakara ny andianondrin’Andriamanitra
  - type: text
    content: 'Mananatra ny '
  - type: text
    content: loholom
  - type: text
    content: '-piangonana eo aminareo aho, dia izaho loholona tahaka azy ireo sy vavolombelon’ny fijalian’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ary koa mpiombona amin’ny voninahitra efa haseho. '
  '10':
  - type: text
    content: 'Rehefa avy niaritra fijaliana vetivety kosa ianareo, dia ilay Andriamanitra loharanon’ny fahasoavana rehetra, Izay niantso anareo ho amin’ny voninahiny mandrakizay ao amin’ny Kristy Jesoa, no handavorary sy hankahery anareo ary hanamafy sy hampiorina anareo. '
  '11':
  - type: text
    content: 'Ho Azy Andriamanitra anie ny fanjakana mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  - type: heading
    content: Fanaovam-beloma
  '12':
  - type: text
    content: Amin’ny alalan’i Silasy
  - type: note
    content: 'Silasy: jereo Asa 15.22, 40.'
  - type: text
    content: ', rahalahy mahatoky, no nanoratako fohifohy taminareo; mananatra anareo aho sy manambara aminareo fa izany no tena fahasoavan’Andriamanitra, ka tomoera tsara amin’izany.'
  '13':
  - type: text
    content: 'Manao veloma anareo ilay Fiangonana rahavavy eto '
  - type: text
    content: Babilôna
  - type: text
    content: ', ilay Fiangonana voafidin’Andriamanitra miaraka amin’ny anareo. Manao veloma anareo koa i Marka zanako'
  - type: note
    content: 'Babilôna: i Rôma, renivohitry ny fanjakana rômanina, no voatondro an’ohatra amin’izany (jereo Apôk 17.5). –Marka: jereo Asa 12.12, 25; 13.13; 15.37-39; Kôl 4.10; Fm 24. –zanako: amin’ny heviny ara-panahy (ampit 1 Tim 1.2).'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Mifanaova veloma amin’ny fanoroham-pifankatiavana.
  - type: text
    content: 'Ao aminareo rehetra tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ny fiadanana!'
  '2':
  - type: text
    content: Aoka ianareo ho mpiandry ny andianondry napetrak’Andriamanitra hiandraiketanareo
  - type: note
    content: Ampit Jôh 21.15-17.
  - type: text
    content: ', ka hitandrina azy tsy an-terivozona fa an-tsitrapo araka an’Andriamanitra: tsy amim-pitiavan-karena fa amin-jotom-po, '
  '3':
  - type: text
    content: 'tsy ho mpanjakazaka amin’ny anjara fiandrasana fa ho fakàn-tahaka harahin’ny andianondry; '
  '4':
  - type: text
    content: ka rehefa miseho ilay Filohan’ny mpiandry, dia hahazo ny satroboninahitra tsy mety simba ianareo.
  '5':
  - type: text
    content: 'Toy izany koa ianareo mbola tanora fanahy, maneke ny loholona. Ary ianareo rehetra, samia mitafy fanetrentena ka mifanompoa, fa hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Toherin’Andriamanitra ny mpiavonavona
  - type: text
    content: fa omeny fahasoavana kosa ny manetry tena
  - type: note
    content: Ohab 3.34, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '6':
  - type: text
    content: Koa manetre tena eo ambany tana-maherin’Andriamanitra, mba hanandratany anareo amin’ny fotoanandro voatendriny
  - type: note
    content: Ampit Mt 3.12; Lk 14.11; 18.14.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Apetraho aminy avokoa ny fanahianareo rehetra, fa Izy no miahy anareo
  - type: note
    content: Ampit Sal 55.23.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Mahonòna tena, ary miambena; fa ny '
  - type: text
    content: devoly
  - type: text
    content: ' fahavalonareo mandehandeha manodidina anareo tahaka ny liona mierona mitady izay harapany. '
  '9':
  - type: text
    content: Finoana mafy orina entina manohitra azy, satria fantatrareo fa fijaliana toraka izany koa no iaretan’ny havanareo mpino eran’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '. '
