document_id: 1PE.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mikarakara ny andianondrin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mananatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholom
    - type: text
      text: '-piangonana eo aminareo aho, dia izaho loholona tahaka azy ireo sy vavolombelon’ny fijalian’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ary koa mpiombona amin’ny voninahitra efa haseho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa avy niaritra fijaliana vetivety kosa ianareo, dia ilay Andriamanitra loharanon’ny fahasoavana rehetra, Izay niantso anareo ho amin’ny voninahiny mandrakizay ao amin’ny Kristy Jesoa, no handavorary sy hankahery anareo ary hanamafy sy hampiorina anareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho Azy Andriamanitra anie ny fanjakana mandrakizay mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanaovam-beloma
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’ny alalan’i Silasy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Silasy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Asa 15.22, 40.
      marker-yv: yv-n
    - type: text
      text: ', rahalahy mahatoky, no nanoratako fohifohy taminareo; mananatra anareo aho sy manambara aminareo fa izany no tena fahasoavan’Andriamanitra, ka tomoera tsara amin’izany.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manao veloma anareo ilay Fiangonana rahavavy eto '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: text
      text: ', ilay Fiangonana voafidin’Andriamanitra miaraka amin’ny anareo. Manao veloma anareo koa i Marka zanako'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Babilôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i Rôma, renivohitry ny fanjakana rômanina, no voatondro an’ohatra amin’izany (jereo Apôk 17.5). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Marka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Asa 12.12, 25; 13.13; 15.37-39; Kôl 4.10; Fm 24. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'zanako:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' amin’ny heviny ara-panahy (ampit 1 Tim 1.2).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifanaova veloma amin’ny fanoroham-pifankatiavana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao aminareo rehetra tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ny fiadanana!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka ianareo ho mpiandry ny andianondry napetrak’Andriamanitra hiandraiketanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 21.15-17.
      marker-yv: yv-n
    - type: text
      text: ', ka hitandrina azy tsy an-terivozona fa an-tsitrapo araka an’Andriamanitra: tsy amim-pitiavan-karena fa amin-jotom-po, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy ho mpanjakazaka amin’ny anjara fiandrasana fa ho fakàn-tahaka harahin’ny andianondry; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka rehefa miseho ilay Filohan’ny mpiandry, dia hahazo ny satroboninahitra tsy mety simba ianareo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany koa ianareo mbola tanora fanahy, maneke ny loholona. Ary ianareo rehetra, samia mitafy fanetrentena ka mifanompoa, fa hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Toherin’Andriamanitra ny mpiavonavona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa omeny fahasoavana kosa ny manetry tena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ohab 3.34, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa manetre tena eo ambany tana-maherin’Andriamanitra, mba hanandratany anareo amin’ny fotoanandro voatendriny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 3.12; Lk 14.11; 18.14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Apetraho aminy avokoa ny fanahianareo rehetra, fa Izy no miahy anareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 55.23.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahonòna tena, ary miambena; fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' fahavalonareo mandehandeha manodidina anareo tahaka ny liona mierona mitady izay harapany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finoana mafy orina entina manohitra azy, satria fantatrareo fa fijaliana toraka izany koa no iaretan’ny havanareo mpino eran’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: '. '
