- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hitan’i Balahama fa sitraky ny TOMPO ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hitsodrano
  - type: text
    text: ' an’ireo Israelita, dia tsy nandeha nisikidy toy ny teo aloha intsony izy, fa nitodika kosa nanatrika ny tany taniefitra fotsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rehefa niandrandra i Balahama, dia nahita ireo Israelita nitoby isaky ny fokony avy; ary notsindrian’ny Fanahin’Andriamanitra izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia nanao izao tononkalo izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Teny hentitr’i Balahama, zanakalahin’i Behôra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: teny hentitry ny lehilahy matsilo fijery
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: sady mandre ny tenin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no mahita izay asehon’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsitoha
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mahazo tsindrimandry avy aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tonga mahiratra fijery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Akory ny hatsàran’ny lainareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry taranak’i Jakôba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: endrey ny hasoan’ny fonenanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry vahoaka Israelita!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa toa ranon-driaka mihanaka izy ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandrobona tahaka ny zaridaina amoron’ny ony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: velombelona tahaka ny sahondra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sahondra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hazo manitra.
    marker-yv: yv-n
  - type: text
    text: ' na ny sedera'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nambolen’ny TOMPO teo amoron’ny sakeli-drano,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mitobaka toy ny rano avy amin’ny fanovozana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manondraka tsara ny saha voafafy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahery noho i Agaga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Agaga: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 15.
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjaka israelita'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihamatanjaka hatrany ny fanjakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nentin’Andriamanitra niala tany Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany vahoaka izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manan-kery tsy hay tohaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny an’ny omby dia.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandevona ny hafa firenena fahavalony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manapatapaka ny taolany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mandoadoaka azy amin’ny zana-tsipîka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mamita-mandry toy ny liona
- type: usfm
  marker: q1
  children:
  - type: text
    text: na tahakan’ny bibidia masiaka izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa zovy no sahy hanaitra azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Eny hotahîna anie izay hitsodrano anao, ry Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho voaozona kosa anie izay hanozona anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'toy ny liona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 49.9. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: hotahîna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '...: jereo Gen 12.3.'
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vinitra aoka izany tamin’i Balahama i Balàka ka niteha-tanana handrahona azy sady nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hanozona ny fahavaloko no niantsoako anao, kanefa fanintelony izao ianao no nitsodrano azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho izany, dia mandehana mody any amin’ny taninao any! Nampanantena aho ny hanome voninahitra mitafotafo anao, nefa indro ny TOMPO fa nisakana ny hahazoanao izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nambaran’i Balahama ny hoavy mamirapiratra ho an’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy i Balahama tamin’i Balàka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa voalazako tamin’ireo iraka nalefanao tany amiko '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa na dia homenao volafotsy sy volamena mahafeno ny tranonao aza aho, dia tsy afaka handika ny didin’ny TOMPO ka hitondra soa na loza araka izay nahim-poko; fa izay holazain’ny TOMPO ihany no holazaiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: koa ankehitriny, handeha aho hody any amin’ny fireneko. Nefa alohan’izany, dia avia fa tiako hampahafantarina anao izay hataon’ny Israelita amin’ny vahoakanao indray andro any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanao izao tononkalo manaraka izao i Balahàma:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Teny hentitr’i Balahama, zanakalahin’i Behôra,
- type: usfm
  marker: q1
  children:
  - type: text
