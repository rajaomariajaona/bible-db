  - type: text
    text: Kanefa holevon’ny afo ny fonenanareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Asirianina no hambabo anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Asirianina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny teny hebreo dia mety hilazana ihany koa ny fokon’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asorita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' voalaza ao amin’ny Gen 25.3.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia mbola nanonona izao teny izao indray i Balahama hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indrisy! zovy moa no afaka ho velona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa Andriamanitra no manao famaizana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hisy sambo avy any Kitîma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitondra olona hampahory ny Asirianina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampahory ny taranak’i Hebera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny 1 Tan 1.25-27, i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hebera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia razamben’i Abrahama, ary noho izany dia razamben’ny Hebreo.'
    marker-yv: yv-n
  - type: text
    text: ;
