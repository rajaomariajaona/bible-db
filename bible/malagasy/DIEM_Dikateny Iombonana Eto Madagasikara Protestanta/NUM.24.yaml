document_id: NUM.24,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Hitan’i Balahama fa sitraky ny TOMPO ny '
  - type: text
    content: hitsodrano
  - type: text
    content: ' an’ireo Israelita, dia tsy nandeha nisikidy toy ny teo aloha intsony izy, fa nitodika kosa nanatrika ny tany taniefitra fotsiny. '
  '10':
  - type: text
    content: 'Vinitra aoka izany tamin’i Balahama i Balàka ka niteha-tanana handrahona azy sady nanao taminy hoe:'
  - type: text
    content: '–Hanozona ny fahavaloko no niantsoako anao, kanefa fanintelony izao ianao no nitsodrano azy. '
  '11':
  - type: text
    content: Noho izany, dia mandehana mody any amin’ny taninao any! Nampanantena aho ny hanome voninahitra mitafotafo anao, nefa indro ny TOMPO fa nisakana ny hahazoanao izany.
  - type: heading
    content: Nambaran’i Balahama ny hoavy mamirapiratra ho an’i Israely
  '12':
  - type: text
    content: 'Dia hoy i Balahama tamin’i Balàka:'
  - type: text
    content: '–Efa voalazako tamin’ireo iraka nalefanao tany amiko '
  '13':
  - type: text
    content: 'fa na dia homenao volafotsy sy volamena mahafeno ny tranonao aza aho, dia tsy afaka handika ny didin’ny TOMPO ka hitondra soa na loza araka izay nahim-poko; fa izay holazain’ny TOMPO ihany no holazaiko. '
  '14':
  - type: text
    content: koa ankehitriny, handeha aho hody any amin’ny fireneko. Nefa alohan’izany, dia avia fa tiako hampahafantarina anao izay hataon’ny Israelita amin’ny vahoakanao indray andro any.
  '15':
  - type: text
    content: 'Dia nanao izao tononkalo manaraka izao i Balahàma:'
  - type: text
    content: «Teny hentitr’i Balahama, zanakalahin’i Behôra,
  - type: text
    content: teny hentitry ny lehilahy matsilo fijery
  - type: note
    content: Jereo and 3 sy nta.
  '16':
  - type: text
    content: sady mandre ny tenin’Andriamanitra
  - type: text
    content: 'no mahita izay asehon’ilay '
  - type: text
    content: Tsitoha
  - type: text
    content: ','
  - type: text
    content: rehefa mahazo tsindrimandry avy aminy.
  - type: text
    content: ka tonga mahiratra fijery.
  '17':
  - type: text
    content: «Izao no hitako,
  - type: text
    content: saingy tsy mbola ankehitriny no hisehoany;
  - type: text
    content: izao no tazako,
  - type: text
    content: saingy mbola any aoriana lavitra no hitrangany;
  - type: text
    content: Misy kintana mipoitra avy amin’ny taranak’i Jakôba,
  - type: text
    content: misy mpanjaka mipongatra avy amin’ny Israelita
  - type: text
    content: ka ny tehim-panjakàny no mamely ny fihirifan’ny Môabita
  - type: text
    content: sy ny lohan’ny mpanakorontana rehetra.
  '18':
  - type: text
    content: Lasan’io mpanjaka io koa i Sehîra,
  - type: text
    content: tanin’ny Edômita fahavalony.
  - type: text
    content: Maneho ny heriny kosa ny Israelita,
  '19':
  - type: text
    content: fa misy mpanapaka
  - type: text
    content: hiseho avy amin’ny taranak’i Jakôba
  - type: text
    content: ka handringana ny sisa velona
  - type: text
    content: afa-mandositra avy ao Sehîra.»
  - type: heading
    content: Nambaran’i Balahama ny faharavàn’ny fahavalon’i Israely
  '2':
  - type: text
    content: 'Rehefa niandrandra i Balahama, dia nahita ireo Israelita nitoby isaky ny fokony avy; ary notsindrian’ny Fanahin’Andriamanitra izy, '
  '20':
  - type: text
    content: 'Nahita ny Hamalekita i Balahama ka nanonona izao teny izao:'
  - type: text
    content: «Ny Hamalekita no lohalaharana
  - type: text
    content: amin’ny hafa firenena rehetra;
  - type: text
    content: fa ho lany ringana no hiafaràny.»
  '21':
  - type: text
    content: 'Nahita ny Kenita koa i Balahàma ka nanonona izao teny izao:'
  - type: text
    content: «Mafy orina ny fonenanareo, ry Kenita,
  - type: text
    content: ka azo antoka tahaka ny akanim-borona
  - type: text
    content: izay voavoatra ambony vatolampy
  - type: note
    content: Kilalaon-teny eo amin’ny fitovian’ny teny hebreo manondro ny Kenita sy akany.
  - type: text
    content: .
  '22':
  - type: text
    content: Kanefa holevon’ny afo ny fonenanareo;
  - type: text
    content: ary ny Asirianina no hambabo anareo
  - type: note
    content: 'Asirianina: ny teny hebreo dia mety hilazana ihany koa ny fokon’ny Asorita voalaza ao amin’ny Gen 25.3.'
  - type: text
    content: .»
  '23':
  - type: text
    content: 'Dia mbola nanonona izao teny izao indray i Balahama hoe:'
  - type: text
    content: «Indrisy! zovy moa no afaka ho velona,
  - type: text
    content: rehefa Andriamanitra no manao famaizana!
  '24':
  - type: text
    content: Hisy sambo avy any Kitîma,
  - type: text
    content: mitondra olona hampahory ny Asirianina
  - type: text
    content: sy hampahory ny taranak’i Hebera
  - type: note
    content: Araka ny 1 Tan 1.25-27, i Hebera dia razamben’i Abrahama, ary noho izany dia razamben’ny Hebreo.
  - type: text
    content: ;
  - type: text
    content: nefa ho lany ringana koa
  - type: text
    content: no hiafaran’ireo mpampahory ireo.»
  '25':
  - type: text
    content: Taorian’izany i Balahama dia niainga ka niverina nody tany aminy; fa i Balàka kosa nizotra lalan-kafa.
  '3':
  - type: text
    content: 'dia nanao izao tononkalo izao:'
  - type: text
    content: «Teny hentitr’i Balahama, zanakalahin’i Behôra,
  - type: text
    content: teny hentitry ny lehilahy matsilo fijery
  '4':
  - type: text
    content: sady mandre ny tenin’Andriamanitra
  - type: text
    content: 'no mahita izay asehon’ilay '
  - type: text
    content: Tsitoha
  - type: text
    content: ','
  - type: text
    content: rehefa mahazo tsindrimandry avy aminy
  - type: text
    content: ka tonga mahiratra fijery.
  '5':
  - type: text
    content: «Akory ny hatsàran’ny lainareo,
  - type: text
    content: ry taranak’i Jakôba;
  - type: text
    content: endrey ny hasoan’ny fonenanareo,
  - type: text
    content: ry vahoaka Israelita!
  '6':
  - type: text
    content: Fa toa ranon-driaka mihanaka izy ireny,
  - type: text
    content: mandrobona tahaka ny zaridaina amoron’ny ony,
  - type: text
    content: velombelona tahaka ny sahondra
  - type: note
    content: 'sahondra: hazo manitra.'
  - type: text
    content: ' na ny sedera'
  - type: text
    content: nambolen’ny TOMPO teo amoron’ny sakeli-drano,
  '7':
  - type: text
    content: mitobaka toy ny rano avy amin’ny fanovozana
  - type: text
    content: ka manondraka tsara ny saha voafafy.
  - type: text
    content: Mahery noho i Agaga
  - type: note
    content: 'Agaga: jereo 1 Sam 15.'
  - type: text
    content: ' ny mpanjaka israelita'
  - type: text
    content: ka hihamatanjaka hatrany ny fanjakany.
  '8':
  - type: text
    content: Nentin’Andriamanitra niala tany Ejipta
  - type: text
    content: izany vahoaka izany,
  - type: text
    content: ka manan-kery tsy hay tohaina
  - type: text
    content: tahaka ny an’ny omby dia.
  - type: text
    content: Mandevona ny hafa firenena fahavalony izy,
  - type: text
    content: ka manapatapaka ny taolany
  - type: text
    content: sy mandoadoaka azy amin’ny zana-tsipîka.
  '9':
  - type: text
    content: Mamita-mandry toy ny liona
  - type: text
    content: na tahakan’ny bibidia masiaka izy,
  - type: text
    content: koa zovy no sahy hanaitra azy?
  - type: text
    content: «Eny hotahîna anie izay hitsodrano anao, ry Israely,
  - type: text
    content: ary ho voaozona kosa anie izay hanozona anao
  - type: note
    content: 'toy ny liona: jereo Gen 49.9. –hotahîna...: jereo Gen 12.3.'
  - type: text
    content: '!»'
