    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Kilalaon-teny eo amin’ny fitovian’ny teny hebreo manondro ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kenita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
