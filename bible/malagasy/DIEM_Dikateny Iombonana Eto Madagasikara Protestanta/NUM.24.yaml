  - type: text
    text: rehefa mahazo tsindrimandry avy aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tonga mahiratra fijery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Izao no hitako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy tsy mbola ankehitriny no hisehoany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao no tazako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy mbola any aoriana lavitra no hitrangany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy kintana mipoitra avy amin’ny taranak’i Jakôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy mpanjaka mipongatra avy amin’ny Israelita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny tehim-panjakàny no mamely ny fihirifan’ny Môabita
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny lohan’ny mpanakorontana rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lasan’io mpanjaka io koa i Sehîra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tanin’ny Edômita fahavalony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maneho ny heriny kosa ny Israelita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: fa misy mpanapaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiseho avy amin’ny taranak’i Jakôba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handringana ny sisa velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-mandositra avy ao Sehîra.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nambaran’i Balahama ny faharavàn’ny fahavalon’i Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nahita ny Hamalekita i Balahama ka nanonona izao teny izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny Hamalekita no lohalaharana
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny hafa firenena rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho lany ringana no hiafaràny.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nahita ny Kenita koa i Balahàma ka nanonona izao teny izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mafy orina ny fonenanareo, ry Kenita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka azo antoka tahaka ny akanim-borona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay voavoatra ambony vatolampy
  - type: usfm
