document_id: 2KI.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nakarin’Andriamanitra i Elià. Nandimby azy i Elisà
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa hakarin’ny TOMPO any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: ' ao anatin’ny tadio i Elià, dia niala tao Gilgala niaraka tamin’i Elisà. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa i Elià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zava-tsarotra no angatahinao, kanefa raha voajerinao aho amin’iny hoesorina hiala aminao iny, dia ho azonao tokoa izany; fa raha tsy voajerinao kosa aho, dia tsy ho azonao izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola nanohy dia sy niresaka iny izy mianaka, dia indro nisy kalesy afo sy soavaly afo nampisaraka azy mianaka; ary i Elià dia nakarina tao anaty tadio ho any ana habakabaka any. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nijery izany i Elisà, dia niantsoantso hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry dada ô, ry dada ô, mahery noho ireo kalesin’i Israely sy ny mpitaingin-tsoavaliny ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 13.14.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tsy hitan’i Elisà intsony i Elià, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: notriariny
    - type: text
      text: ' roa ny fitafiany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nalainy ny akanjobe izay nilatsaka avy teny an-tsorok’i Elià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Io ilay '
      - type: usfm
        marker: it
        children:
        - type: text
          text: akanjobe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' natsipin’i Elià tamin’i Elisà (jereo 1 Mp 19.19) mba hitaomany azy hanohy ny asany. Raha toa ka tonga tompon’ilay akanjobe i Elisà ankehitriny, dia satria izy mendrika hisolo an’i Elià.'
      marker-yv: yv-n
    - type: text
      text: '; dia niverina izy ka nitsangana teo amoron’i Jôrdàna. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noraisin’i Elisà ilay akanjoben’i Elià ka nikapohany ny rano, sady nihiaka izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza ny TOMPO Andriamanitr’i Elià? Aiza Izy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mba nikapoka ny rano koa i Elisà, dia nisaraka roa izany ary niampita izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nahita izay nataon’i Elisà avy teny lavidavitra teny ny andia-mpaminanin’i Jerikao, dia nanao hoe: «Efa mipetraka amin’i Elisà ny fanahin’i Elià.» Ary lasa nitsena an’i Elisà ireo ka niankohoka nitehi-tany teo anatrehany, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manana lehilahy maherifo dimampolo izahay mpanomponao; koa aoka ireo handeha hitady ity mpampianatrao, fandrao naingain’ny Fanahin’ny TOMPO izy, ka nazerany any an-tendrombohitra na any an-dohasaha any.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa notenenin’i Elisà ny andia-mpaminany mba tsy haniraka. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa mbola nikiry mafy izy, ka farany dia nanaiky ihany i Elisà. Dia naniraka ireto maherifo dimampolo lahy izy mba hitady an’i Elià nandritra ny telo andro nefa tsy nahita azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola tao Jerikao ihany i Elisà no tafaverina ireo ka nitenenany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy efa nilazako ve ianareo mba tsy handeha hitady azy?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nodiovin’i Elisà ny loharanon’i Jerikao
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mponin’i Jerikao tamin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Araka izao ahitanao azy izao, tompoko, dia tsara toerana ity tanàna ity; saingy ratsy ny rano ary tsy mahavokatra ny tany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Elià tamin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mijanòna eto re ianao, fa irahin’ny TOMPO hankany Betela aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO ary velona ny ainao, koa mianiana aho fa tsy handao anao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niaraka nankany Betela izy mianaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Itondray sira amin’ny lovia vaovao aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitondrana izany izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niainga nankany amin’ilay loharano i Elisà, dia nanipy sira tao sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO: «Efa nodioviko ity rano ity, ka tsy hahatonga fahafatesana na tsy fahavokarana intsony izy.»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa dia nitoetra ho madio mandraka ankehitriny ny rano araka ny nambaran’i Elisà.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voasazin’Andriamanitra ireo ankizilahy nanaraby an’i Elisà
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tao Jerikao i Elisà, dia niakatra hankany Betela. Teny an-dalana anefa dia nisy ankizilahy nivoaka ny tanàna ka nanaraby azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miakara, ry Lesola! Miakara, ry Lesola!
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitodika i Elisà nijery azy ka nanozona azy tamin’ny anaran’ny TOMPO. Ary nisy orsa roa nivoaka avy tany an’ala namiravira ny 42 tamin’ireo ankizy ireo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala teo i Elisà ka dia nankany an-tendrombohitra Karmela, ary avy tao no niverenany ho any Samaria.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa niainga nankany amin’i Elisà ny andia-
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' tao Betela ka nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatrao va fa anio no hanesoran’ny TOMPO ity mpampianatrao ho lavitry ny tenanao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navaliny azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, fantatro koa izany fa mangina ianareo!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray i Elià tamin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mijanona eto re ianao, ry Elisà, fa irahin’ny TOMPO hankany Jerikao aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO ary velona ny ainao, koa mianiana aho fa tsy handao anao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niaraka nankany Jerikao izy mianaka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nanatona an’i Elisà ny andia-mpaminany tao Jerikao ka nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatrao va fa anio no hanesoran’ny TOMPO ity mpampianatrao ho lavitry ny tenanao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navaliny azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, fantatro koa izany fa mangina ianareo!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray i Elià tamin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mijanona eto re ianao, fa irahin’ny TOMPO hankany Jôrdàna aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO ary velona ny ainao, koa mianiana aho fa tsy handao anao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niara-nandeha izy mianaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy mpaminany dimampolo nanaraka lavidavitra an’i Elià sy i Elisà izay nijanona teo amoron’i Jôrdàna. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nalain’i Elià ny akanjobeny, dia nahorongorony ary nikapohany ny rano. Dia nisaraka roa ilay rano ka nita tamin’ny tany maina izy mianaka.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa samy tafita izy, dia hoy i Elià tamin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Angataho izay tianao hataoko aminao mialoha ny hanesorana ahy ho lavitra anao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba te hahazo anjara roa amin’ny fanahinao re aho.
