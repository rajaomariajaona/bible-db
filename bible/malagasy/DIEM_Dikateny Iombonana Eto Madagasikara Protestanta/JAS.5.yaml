document_id: JAS.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ny mpanankarena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mihaino ahy izao ianareo mpanankarena! Mitomania sy mitolokoa noho ny loza midona aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny harenareo efa lo ary ny fitafianareo efa lanin’ny kadradraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny volamena sy volafotsinareo efa harafesina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 2-3:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Mt 6.19.
    marker-yv: yv-n
  - type: text
    text: ', ary ny harafesiny dia vavolombelona hiampanga anareo sady handany ny nofonareo toy ny afo. Izao efa andro farany izao no nanangonanareo harena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy voaloanareo akory ny karaman’ireo mpiasa nijinja ny taninareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lev 19.13; Deot 24.14-15.
    marker-yv: yv-n
  - type: text
    text: ', ka mitaraina ireo; ary ny fitarainan’ireo mpijinja dia efa mby ao an-tsofin’ny Tompon’izao rehetra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Niampoka ny soa sady niliba ianareo fahavelonareo tetỳ an-tany, ka dia efa nanatavy tena mba hajedaka amin’ny andro voatendry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nohelohinareo ny olo-marina sady novonoinareo, nefa tsy manohitra anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny olo-marina...nefa tsy manohitra anareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny olo-marina, ka tsy toherin’Andriamanitra ve ianareo?
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faharetana sy vavaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa mahareta tsara àry, ry havana, mandra-piavin’ny Tompo. Jereo ny mpamboly miandry amim-paharetana izay vokatra sarobidy havoakan’ny tany, ka maharitra mandra-pahazony ny oram-pararano sy ny oran-dohataona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 11.14; Jl 2.23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mahareta koa ianareo; aoka ho feno herimpo, fa efa mby akaiky ny fiavian’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza mifampimonomonona ianareo, ry havana, mba tsy hanamelohan’Andriamanitra anareo. Indro ny mpitsara efa mijoro eo am-baravarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ry havana, aoka ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' izay niteny tamin’ny anaran’ny Tompo no hataonareo filamatry ny fifandeferana sy faharetana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro ataontsika hoe sambatra izay manam-paharetana. Efa renareo ny faharetan’i Jôba, ary fantatrareo izay nataon’ny Tompo ho azy tamin’ny farany, satria be fiantra sy be indrafo ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jôba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jôb 1.20-22; 2.10. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria... ny Tompo:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Sal 103.8.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary indrindra indrindra, ry havako, aza mianiana mihitsy ianareo, na amin’ny lanitra, na amin’ny tany, na amin’ny zavatra hafa; fa aoka hanao «eny» ianareo rehefa manaiky, ary hanao «tsia» rehefa mandà, fandrao hihatra aminareo ny fanamelohan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 5.34-37.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Misy ory ve ianareo? Aoka izy hivavaka. Misy finaritra ve? Aoka izy ho velon-kira fiderana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Misy marary ve ianareo? Aoka izy hampiantso ireo loholom-piangonana hivavaka eo aminy sady hanosotra diloilo azy amin’ny anaran’ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mk 6.13.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izany vavaka izany, rehefa atao amim-pinoana, dia hahavonjy ilay marary: hositranin’ny Tompo izy ary, raha nanota, dia havela ny helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa mieke heloka ianareo samy ianareo, ary mifampivavaha mba hahasitrana anareo; fa mahery fiasa tokoa ny fivavaky ny olo-marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Olona tahaka antsika izao ihany i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià
  - type: text
    text: '; fa nivavaka mafy izy mba tsy hilatsahan’ny ranonorana amin’ny tany, dia tsy nilatsaka ny ranonorana telo taona sy tapany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary nivavaka indray izy, dia nandatsaka ranonorana ny lanitra, ka nahavokatra ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 17-18:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 17.1; 18.1; 18.42-45.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ry havako, raha sendra misy aminareo miala amin’ny marina, ka misy mamerina azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia izao no tsarovy: izay namerin-dalana ny mpanota hiala amin’ny fahadisoany, dia namonjy ny fanahin’izany mpanota izany tsy ho faty sady mikosoka ny fahotana maro miavosa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny fanahin’...tsy ho faty: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny fanahin’ny tenany tsy ho faty.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: sady...miavosa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (fahotana ivalozan’ny andaniny sy ny ankilany): ampit Ohab 10.12; 1 Pt 4.8.'
    marker-yv: yv-n
  - type: text
    text: .
