document_id: JAS.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ny mpanankarena
  - type: text
    content: 'Mihaino ahy izao ianareo mpanankarena! Mitomania sy mitolokoa noho ny loza midona aminareo. '
  '10':
  - type: text
    content: 'Ry havana, aoka ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' izay niteny tamin’ny anaran’ny Tompo no hataonareo filamatry ny fifandeferana sy faharetana. '
  '11':
  - type: text
    content: Indro ataontsika hoe sambatra izay manam-paharetana. Efa renareo ny faharetan’i Jôba, ary fantatrareo izay nataon’ny Tompo ho azy tamin’ny farany, satria be fiantra sy be indrafo ny Tompo
  - type: note
    content: 'Jôba: jereo Jôb 1.20-22; 2.10. –satria... ny Tompo: ampit Sal 103.8.'
  - type: text
    content: .
  '12':
  - type: text
    content: Ary indrindra indrindra, ry havako, aza mianiana mihitsy ianareo, na amin’ny lanitra, na amin’ny tany, na amin’ny zavatra hafa; fa aoka hanao «eny» ianareo rehefa manaiky, ary hanao «tsia» rehefa mandà, fandrao hihatra aminareo ny fanamelohan’Andriamanitra
  - type: note
    content: Ampit Mt 5.34-37.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Misy ory ve ianareo? Aoka izy hivavaka. Misy finaritra ve? Aoka izy ho velon-kira fiderana. '
  '14':
  - type: text
    content: Misy marary ve ianareo? Aoka izy hampiantso ireo loholom-piangonana hivavaka eo aminy sady hanosotra diloilo azy amin’ny anaran’ny Tompo
  - type: note
    content: Ampit Mk 6.13.
  - type: text
    content: '? '
  '15':
  - type: text
    content: 'Fa izany vavaka izany, rehefa atao amim-pinoana, dia hahavonjy ilay marary: hositranin’ny Tompo izy ary, raha nanota, dia havela ny helony. '
  '16':
  - type: text
    content: 'Koa mieke heloka ianareo samy ianareo, ary mifampivavaha mba hahasitrana anareo; fa mahery fiasa tokoa ny fivavaky ny olo-marina. '
  '17':
  - type: text
    content: 'Olona tahaka antsika izao ihany i '
  - type: text
    content: Elià
  - type: text
    content: '; fa nivavaka mafy izy mba tsy hilatsahan’ny ranonorana amin’ny tany, dia tsy nilatsaka ny ranonorana telo taona sy tapany; '
  '18':
  - type: text
    content: ary nivavaka indray izy, dia nandatsaka ranonorana ny lanitra, ka nahavokatra ny tany
  - type: note
    content: 'And 17-18: jereo 1 Mp 17.1; 18.1; 18.42-45.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'Ry havako, raha sendra misy aminareo miala amin’ny marina, ka misy mamerina azy, '
  '2':
  - type: text
    content: 'Ny harenareo efa lo ary ny fitafianareo efa lanin’ny kadradraka. '
  '20':
  - type: text
    content: 'dia izao no tsarovy: izay namerin-dalana ny mpanota hiala amin’ny fahadisoany, dia namonjy ny fanahin’izany mpanota izany tsy ho faty sady mikosoka ny fahotana maro miavosa'
  - type: note
    content: 'ny fanahin’...tsy ho faty: dkt hafa ny fanahin’ny tenany tsy ho faty. –sady...miavosa (fahotana ivalozan’ny andaniny sy ny ankilany): ampit Ohab 10.12; 1 Pt 4.8.'
  - type: text
    content: .
  '3':
  - type: text
    content: Ny volamena sy volafotsinareo efa harafesina
  - type: note
    content: 'And 2-3: ampit Mt 6.19.'
  - type: text
    content: ', ary ny harafesiny dia vavolombelona hiampanga anareo sady handany ny nofonareo toy ny afo. Izao efa andro farany izao no nanangonanareo harena. '
  '4':
  - type: text
    content: Tsy voaloanareo akory ny karaman’ireo mpiasa nijinja ny taninareo
  - type: note
    content: Ampit Lev 19.13; Deot 24.14-15.
  - type: text
    content: ', ka mitaraina ireo; ary ny fitarainan’ireo mpijinja dia efa mby ao an-tsofin’ny Tompon’izao rehetra izao. '
  '5':
  - type: text
    content: 'Niampoka ny soa sady niliba ianareo fahavelonareo tetỳ an-tany, ka dia efa nanatavy tena mba hajedaka amin’ny andro voatendry. '
  '6':
  - type: text
    content: Nohelohinareo ny olo-marina sady novonoinareo, nefa tsy manohitra anareo
  - type: note
    content: 'ny olo-marina...nefa tsy manohitra anareo: dkt hafa ny olo-marina, ka tsy toherin’Andriamanitra ve ianareo?'
  - type: text
    content: .
  - type: heading
    content: Faharetana sy vavaka
  '7':
  - type: text
    content: Koa mahareta tsara àry, ry havana, mandra-piavin’ny Tompo. Jereo ny mpamboly miandry amim-paharetana izay vokatra sarobidy havoakan’ny tany, ka maharitra mandra-pahazony ny oram-pararano sy ny oran-dohataona
  - type: note
    content: Ampit Deot 11.14; Jl 2.23.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Mahareta koa ianareo; aoka ho feno herimpo, fa efa mby akaiky ny fiavian’ny Tompo. '
  '9':
  - type: text
    content: 'Aza mifampimonomonona ianareo, ry havana, mba tsy hanamelohan’Andriamanitra anareo. Indro ny mpitsara efa mijoro eo am-baravarana. '
