document_id: 1CH.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpiandry vavahady
  - type: text
    content: 'Ny amin’ny mpiandry vavahady, dia izao no fitsinjarana azy ho antokony:'
  - type: text
    content: Tamin’ny taranak’i Kôra dia i Meselemià zanakalahin’i Kôra sady zafin’i Abiasafa
  - type: note
    content: 'Abiasafa: araka 9.19; fa Asafa kosa no tenenin’ny TM eto.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ny an’i Hôsà, izay anisan’ireo taranak’i Merarỳ, dia nisy efa-dahy ny zanany: i Simrỳ no voalohany (tsy lahimatoa izy kanefa nataon-drainy lohalaharana), '
  '11':
  - type: text
    content: i Hilkià faharoa, i Tebalià fahatelo ary i Zakarià fahefatra. Ny an’i Hôsà dia nisy 13 lahy ny zanany sy ny havany rehetra no mpiandry vavahady.
  '12':
  - type: text
    content: Anjaran’ny antokon’ireo mpiandry vavahady sy anjaran’ny filohan’ireo vatan-dehilahy ireo ny manao fanompoana ao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ', teo anilan’ireo levita rahalahiny. '
  '13':
  - type: text
    content: Nanao antsapaka izy rehetra, na ny kely na ny lehibe, araka ny fianakaviany, ny amin’ny vavahady tsirairay avy.
  '14':
  - type: text
    content: Ny amin’ny vavahady atsinanana, dia azon’i Selemià
  - type: note
    content: I Selemià eto sy i Meselemià ao amin’ny and 1 sy 9 dia tsy misy hafa fa olona iray ihany.
  - type: text
    content: ' ny antsapaka. Ny amin’ny vavahady avaratra, dia i Zakarià zanany, izay mpanolotsaina hendry, no niantefan’ny antsapaka natao. '
  '15':
  - type: text
    content: 'Ny amin’ny vavahady atsimo, dia azon’i Hôbeda-Edôma, ary ny amin’ny trano fitahirizana entana, dia azon’ireo zanany. '
  '16':
  - type: text
    content: Ny amin’ny vavahady andrefana mbamin’ilay vavahady atao hoe Saleketa izay eo an-tampon’ny lala-miakatra dia azon’ny Hôsà.
  - type: text
    content: 'Nisy anjara fiambenana nifandimbiasana: '
  '17':
  - type: text
    content: 'ka tamin’ny vavahady atsinanana, nisy '
  - type: text
    content: levita
  - type: text
    content: ' enina isan’andro; tamin’ny vavahady avaratra, nisy levita efatra isan’andro; tamin’ny vavahady atsimo, nisy levita efatra isan’andro; tamin’ny trano fitahirizana entana, nisy sokajy anankiroa samy levita roa avy; '
  '18':
  - type: text
    content: tamin’ny trano fanampiny
  - type: note
    content: 'trano fanampiny: dkt tsy azo antoka loatra; ny voambolana hebreo dia mety manondro kianja na tokotany anankiray.'
  - type: text
    content: ', teo andrefana, nisy levita efatra ho an’ny lalana ary nisy levita roa ho an’ny trano.'
  '19':
  - type: text
    content: Dia ireo no antokon’ny mpiandry vavahady tamin’ny taranak’i Kôra sy tamin’ny taranak’i Merarỳ.
  - type: heading
    content: Raharaha manokana nataon’ny levita sasany
  '2':
  - type: text
    content: 'Nisy fito lahy ny an’io Meselemià io ny zanany: dia i Zakarià lahimatoa, i Jedihaela lahiaivo, i Zebadià fahatelo, i Jatniela fahefatra, '
  '20':
  - type: text
    content: 'Ny '
  - type: text
    content: levita
  - type: text
    content: ' naman’ireo'
  - type: note
    content: 'Ny levita naman’ireo: araka ny dkt grika tranainy Septoazinta; ny RM dia ahitana hoe ny levita Ahia.'
  - type: text
    content: kosa dia nisy mpiandraikitra ny zavatra sarobidy tao an-
  - type: text
    content: tempolin’Andriamanitra
  - type: text
    content: ', zavatra sarobidy izay voatokana ho an’Andriamanitra. '
  '21':
  - type: text
    content: 'Tamin’ny taranak’i Lahadàna, ilay Lahadàna zanakalahin’i Gersôna, dia i Jehielỳ '
  '22':
  - type: text
    content: 'sy ireo zanakalahin’i Jehielỳ, ary koa i Zetama sy i Jôela rahalahin’i Jehielỳ, samy loham-pianakaviany avy, no mpiandraikitra ny zavatra sarobidy tao an-tranon’ny TOMPO. '
  '23':
  - type: text
    content: 'Ho an’ny Hamramita sy Jitseharita ary Hebrônita sy Hozielita, '
  '24':
  - type: text
    content: 'dia i Sobaela, zanakalahin’i Gersôma sy zafin’i Mosesy, no mpiandraikitra ny zavatra sarobidy. '
  '25':
  - type: text
    content: 'Ny havan’i Sobaela, avy amin’i Elihezera (rahalahin’i Gersôma), dia ireto avy: i Rehabià zanakalahin’i Elihezera, i Jesahià zanakalahin’i Rehabià, i Jôrama zanakalahin’i Jesahià, i Zikrỳ zanakalahin’i Jôrama, ary i Selômôta zanakalahin’i Zikrỳ. '
  '26':
  - type: text
    content: 'Io Selômôta io sy ny havany no mpiandraikitra ny zavatra sarobidy voatokana ho an’Andriamanitra, dia ireo zavatra natokan’i Davida mpanjaka sy ireo loham-pianakaviany ary ny komandin-tafika mpifehy arivo sy mpifehy zato. '
  '27':
  - type: text
    content: 'Tamin’ny fitaovana azon’ireo tamin’ny ady mantsy no nisy nanokanany mba hoenti-miahy ny tranon’ny TOMPO. '
  '28':
  - type: text
    content: 'Ny zavatra rehetra, natokan’i Samoela '
  - type: text
    content: mpaminany
  - type: text
    content: ' manam-pahitana sy natokan’i Saoly zanakalahin’i Kisy ary natokan’Abnera zanakalahin’i Nera sy natokan’i Jôaba zanakalahin’i Tseroià ho an’Andriamanitra, dia i Selômôta sy ny havany no mpiandraikitra ny fitahirizana azy.'
  '29':
  - type: text
    content: Tamin’ny taranak’i Jitsehara, dia i Kenanià sy ny zanany no voatendry hanao ny raharaha fandaminana teo amin’i Israely, ka ho mpifehy sy mpitsara.
  '3':
  - type: text
    content: i Helama fahadimy, i Jôhanàna fahenina, ary i Eliôhenay faralahy.
  '30':
  - type: text
    content: 'Tamin’ny taranak’i Hebrôna, dia i Hasabià sy ny havany, izay nisy olom-banona 1 700 lahy, no mpifehy ny faritr’i Israely andrefan’i Jôrdàna amin’ny raharaha rehetra momba ny TOMPO sy momba ny fanompoana ny mpanjaka. '
  '31':
  - type: text
    content: Tamin’ny taranak’i Hebrôna, dia i Jerià no filoha; ny taona fahefapolo nanjakan’i Davida no nanaovana fikarohana ny amin’ny taranak’i Hebrôna araka ny tetiarana isam-pianakaviana, ka nahitana vatan-dehilahy olom-banona tao Jahizera any Gilehada
  - type: note
    content: 'Jahizera any Gilehada: tanàna tsy tena fantatra mazava ny aminy, kanefa ao anatin’ny faritr’i Ramôta no misy azy (jereo 6.62-66).'
  - type: text
    content: '. '
  '32':
  - type: text
    content: I Jerià mbamin’ny havany dia nisy 2 700 lahy, samy olom-banona loham-pianakaviany avy, ka notendren’i Davida mpanjaka hifehy ny Reobenita sy ny Gadita ary ny antsasam-pokon’i Manase amin’ny raharaha rehetra momba an’Andriamanitra sy momba ny mpanjaka.
  '4':
  - type: text
    content: 'Ny an’i Hôbeda-Edôma dia nisy valo lahy ny zanany: i Semahià lahimatoa, i Jôzabada lahiaivo, i Jôà fahatelo, i Sakara fahefatra, i Natanaela fahadimy, '
  '5':
  - type: text
    content: 'i Hamiela fahenina, i Jisakara fahafito, i Peholetahy faralahy; fa Andriamanitra efa '
  - type: text
    content: nitahy
  - type: text
    content: ' an’i Hôbeda-Edôma'
  - type: note
    content: 'And 4-5: jereo 13.14; 2 Sam 6.11.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'I Semahià zanany dia niteraka zazalahy maromaro izay samy olom-banona ka tonga mpanapaka tao amin’ny isam-pianakaviany avy. '
  '7':
  - type: text
    content: 'Ny zanakalahin’i Semahià dia i Hôtnỳ sy i Refaela ary i Hôbeda sy i Elzabada mbamin’ireo rahalahiny anankiroa izay samy olom-banona, dia i Elihò sy i Semakià. '
  '8':
  - type: text
    content: 'Anisan’ny taranak’i Hôbeda-Edôma ireo rehetra ireo. Ny taranaka ombàn-janaka sy havana dia nisy 62 lahy ny an’i Hôbeda-Edôma no mpiandry vavahady: samy olom-banona avokoa sady mahery fo amin’ny fanompoany.'
  '9':
  - type: text
    content: Ny an’i Meselemià
  - type: note
    content: Jereo and 1-3.
  - type: text
    content: ' dia nisy 18 lahy ny zanany sy ny havany no mpiandry vavahady: samy olom-banona avokoa.'
