document_id: 1CH.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpiandry vavahady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny amin’ny mpiandry vavahady, dia izao no fitsinjarana azy ho antokony:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’ny taranak’i Kôra dia i Meselemià zanakalahin’i Kôra sady zafin’i Abiasafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Abiasafa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka 9.19; fa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asafa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' kosa no tenenin’ny TM eto.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nisy fito lahy ny an’io Meselemià io ny zanany: dia i Zakarià lahimatoa, i Jedihaela lahiaivo, i Zebadià fahatelo, i Jatniela fahefatra, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: i Helama fahadimy, i Jôhanàna fahenina, ary i Eliôhenay faralahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny an’i Hôbeda-Edôma dia nisy valo lahy ny zanany: i Semahià lahimatoa, i Jôzabada lahiaivo, i Jôà fahatelo, i Sakara fahefatra, i Natanaela fahadimy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'i Hamiela fahenina, i Jisakara fahafito, i Peholetahy faralahy; fa Andriamanitra efa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nitahy
  - type: text
    text: ' an’i Hôbeda-Edôma'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 4-5:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.14; 2 Sam 6.11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I Semahià zanany dia niteraka zazalahy maromaro izay samy olom-banona ka tonga mpanapaka tao amin’ny isam-pianakaviany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny zanakalahin’i Semahià dia i Hôtnỳ sy i Refaela ary i Hôbeda sy i Elzabada mbamin’ireo rahalahiny anankiroa izay samy olom-banona, dia i Elihò sy i Semakià. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Anisan’ny taranak’i Hôbeda-Edôma ireo rehetra ireo. Ny taranaka ombàn-janaka sy havana dia nisy 62 lahy ny an’i Hôbeda-Edôma no mpiandry vavahady: samy olom-banona avokoa sady mahery fo amin’ny fanompoany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny an’i Meselemià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo and 1-3.
    marker-yv: yv-n
  - type: text
    text: ' dia nisy 18 lahy ny zanany sy ny havany no mpiandry vavahady: samy olom-banona avokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny an’i Hôsà, izay anisan’ireo taranak’i Merarỳ, dia nisy efa-dahy ny zanany: i Simrỳ no voalohany (tsy lahimatoa izy kanefa nataon-drainy lohalaharana), '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: i Hilkià faharoa, i Tebalià fahatelo ary i Zakarià fahefatra. Ny an’i Hôsà dia nisy 13 lahy ny zanany sy ny havany rehetra no mpiandry vavahady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Anjaran’ny antokon’ireo mpiandry vavahady sy anjaran’ny filohan’ireo vatan-dehilahy ireo ny manao fanompoana ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ', teo anilan’ireo levita rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nanao antsapaka izy rehetra, na ny kely na ny lehibe, araka ny fianakaviany, ny amin’ny vavahady tsirairay avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny amin’ny vavahady atsinanana, dia azon’i Selemià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Selemià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto sy i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Meselemià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny and 1 sy 9 dia tsy misy hafa fa olona iray ihany.'
    marker-yv: yv-n
  - type: text
    text: ' ny antsapaka. Ny amin’ny vavahady avaratra, dia i Zakarià zanany, izay mpanolotsaina hendry, no niantefan’ny antsapaka natao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny amin’ny vavahady atsimo, dia azon’i Hôbeda-Edôma, ary ny amin’ny trano fitahirizana entana, dia azon’ireo zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny amin’ny vavahady andrefana mbamin’ilay vavahady atao hoe Saleketa izay eo an-tampon’ny lala-miakatra dia azon’ny Hôsà.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nisy anjara fiambenana nifandimbiasana: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka tamin’ny vavahady atsinanana, nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' enina isan’andro; tamin’ny vavahady avaratra, nisy levita efatra isan’andro; tamin’ny vavahady atsimo, nisy levita efatra isan’andro; tamin’ny trano fitahirizana entana, nisy sokajy anankiroa samy levita roa avy; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: tamin’ny trano fanampiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'trano fanampiny: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt tsy azo antoka loatra; ny voambolana hebreo dia mety manondro '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kianja
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tokotany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' anankiray.'
    marker-yv: yv-n
  - type: text
    text: ', teo andrefana, nisy levita efatra ho an’ny lalana ary nisy levita roa ho an’ny trano.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia ireo no antokon’ny mpiandry vavahady tamin’ny taranak’i Kôra sy tamin’ny taranak’i Merarỳ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Raharaha manokana nataon’ny levita sasany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' naman’ireo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny levita naman’ireo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy Septoazinta; ny RM dia ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny levita Ahia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: kosa dia nisy mpiandraikitra ny zavatra sarobidy tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempolin’Andriamanitra
  - type: text
    text: ', zavatra sarobidy izay voatokana ho an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’ny taranak’i Lahadàna, ilay Lahadàna zanakalahin’i Gersôna, dia i Jehielỳ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'sy ireo zanakalahin’i Jehielỳ, ary koa i Zetama sy i Jôela rahalahin’i Jehielỳ, samy loham-pianakaviany avy, no mpiandraikitra ny zavatra sarobidy tao an-tranon’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ho an’ny Hamramita sy Jitseharita ary Hebrônita sy Hozielita, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia i Sobaela, zanakalahin’i Gersôma sy zafin’i Mosesy, no mpiandraikitra ny zavatra sarobidy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny havan’i Sobaela, avy amin’i Elihezera (rahalahin’i Gersôma), dia ireto avy: i Rehabià zanakalahin’i Elihezera, i Jesahià zanakalahin’i Rehabià, i Jôrama zanakalahin’i Jesahià, i Zikrỳ zanakalahin’i Jôrama, ary i Selômôta zanakalahin’i Zikrỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Io Selômôta io sy ny havany no mpiandraikitra ny zavatra sarobidy voatokana ho an’Andriamanitra, dia ireo zavatra natokan’i Davida mpanjaka sy ireo loham-pianakaviany ary ny komandin-tafika mpifehy arivo sy mpifehy zato. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ny fitaovana azon’ireo tamin’ny ady mantsy no nisy nanokanany mba hoenti-miahy ny tranon’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny zavatra rehetra, natokan’i Samoela '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' manam-pahitana sy natokan’i Saoly zanakalahin’i Kisy ary natokan’Abnera zanakalahin’i Nera sy natokan’i Jôaba zanakalahin’i Tseroià ho an’Andriamanitra, dia i Selômôta sy ny havany no mpiandraikitra ny fitahirizana azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tamin’ny taranak’i Jitsehara, dia i Kenanià sy ny zanany no voatendry hanao ny raharaha fandaminana teo amin’i Israely, ka ho mpifehy sy mpitsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tamin’ny taranak’i Hebrôna, dia i Hasabià sy ny havany, izay nisy olom-banona 1 700 lahy, no mpifehy ny faritr’i Israely andrefan’i Jôrdàna amin’ny raharaha rehetra momba ny TOMPO sy momba ny fanompoana ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tamin’ny taranak’i Hebrôna, dia i Jerià no filoha; ny taona fahefapolo nanjakan’i Davida no nanaovana fikarohana ny amin’ny taranak’i Hebrôna araka ny tetiarana isam-pianakaviana, ka nahitana vatan-dehilahy olom-banona tao Jahizera any Gilehada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jahizera any Gilehada: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tsy tena fantatra mazava ny aminy, kanefa ao anatin’ny faritr’i Ramôta no misy azy (jereo 6.62-66).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: I Jerià mbamin’ny havany dia nisy 2 700 lahy, samy olom-banona loham-pianakaviany avy, ka notendren’i Davida mpanjaka hifehy ny Reobenita sy ny Gadita ary ny antsasam-pokon’i Manase amin’ny raharaha rehetra momba an’Andriamanitra sy momba ny mpanjaka.
