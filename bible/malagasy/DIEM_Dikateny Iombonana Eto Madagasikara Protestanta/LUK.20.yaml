document_id: LUK.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Avy aiza ny fahefàn’i Jesoa?
  - type: heading
    content: (Jereo Mt 21.23-27; Mk 11.27-33)
  - type: text
    content: Indray andro, dia nampianatra ny vahoaka teo an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Jesoa sady nanambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' taminy. Tonga kosa ny lohandoha-mpisorona sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' mbamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Nony tonga ny taom-piotazana dia nanirahany mpiasa ireo mpamboly, hiangavy azy ireo hanome ampahany amin’ny vokatry ny tanimboaloboka; kanjo nokapohin’ireo mpamboly ilay mpiasa ary nalefany nody maina. '
  '11':
  - type: text
    content: 'Dia nanirahany mpiasa fanindroany, fa io koa nokapohin’ireo mpamboly sy notevatevainy ary nalefany nody maina. '
  '12':
  - type: text
    content: 'Dia mbola nanirahany mpiasa fanintelony; io indray koa nataon’ireo mpamboly naratra, izay vao noroahiny. '
  '13':
  - type: text
    content: 'Ary hoy ny tompon’ny tanimboaloboka: «Inona re no hataoko? Ndeha hirahiko ity zanako malalako, fa angamba izy hananan’ireo hena-maso!» '
  '14':
  - type: text
    content: 'Vao nahita azy kosa ireo mpamboly, dia niara-nidinika sady nifampiresaka hoe: «Ny mpandova ity; aoka hovonointsika mba hahazoantsika ny lova.» '
  '15':
  - type: text
    content: Dia natosiny tany ivelan’ny tanimboaloboka ilay io ka novonoiny.
  - type: text
    content: 'Dia nofaranan’i Jesoa hoe:'
  - type: text
    content: '–Inona àry no hataon’ny tompon’ny tanimboaloboka amin’ireo mpamboly? '
  '16':
  - type: text
    content: Ho avy izy ka haringany ireo mpamboly ireo ary homeny olon-kafa ny tanimboaloboka.
  - type: text
    content: 'Raha nandre izany ireo mpanohitra an’i Jesoa, dia niteny hoe:'
  - type: text
    content: –Sanatria izany!
  '17':
  - type: text
    content: 'Fa nojeren’i Jesoa ry zareo sady nataony hoe:'
  - type: text
    content: '–Inona àry no dikan’ity andinin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ity:'
  - type: text
    content: «Ny vato nolavin’ny mpanao trano
  - type: text
    content: no nanjary vato fehizoro
  - type: note
    content: Sal 118.22.
  - type: text
    content: »?
  '18':
  - type: text
    content: Izay rehetra mianjera amin’izany vato izany dia ho torotoro, ary izay ianjerany kosa ho montsamontsana.
  - type: heading
    content: Ny fandoavan-ketra ho an’ny amperôra rômanina
  - type: heading
    content: (Jereo Mt 22.15-22; Mk 12.13-17)
  '19':
  - type: text
    content: 'Nitady hisambotra an’i Jesoa tamin’izay ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy lohandoha-mpisorona, satria nahatsiaro tena ho niantefan’iny '
  - type: text
    content: fanoharana
  - type: text
    content: ' nataony iny. Saingy natahotra ny vahoaka ry zareo. '
  '2':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: '–Mba lazao kely hoe: fahefana ahoana moa no anaovanao an’izao zavatra izao? Iza no nanome Anao izao fahefana izao?'
  '20':
  - type: text
    content: 'Ary nataon’ireo mpanohitra Azy andrimaso i Jesoa. Olona mihatsaravelatsihy miseho ho olo-marina no nalefany hamandrika an’i Jesoa amin’ny teniny ka hanolorany Azy eo am-pelatanan’i '
  - type: text
    content: Pilato
  - type: text
    content: ' governora, mba hotsaraina sy hohelohina. '
  '21':
  - type: text
    content: 'Dia nanontanian’ireo iraka i Jesoa nataony hoe:'
  - type: text
    content: '–Mpampianatra ô, fantatray fa mahitsy fiteny sy fampianatra Ianao sady tsy mizaha tavan’olona fa mampianatra tsotra ny lalana soritan’Andriamanitra. '
  '22':
  - type: text
    content: Koa azonay atao ve ny mandoa hetra ho an’ny amperôra rômanina sa tsia?
  '23':
  - type: text
    content: 'Takatr’i Jesoa anefa ny hafetsen-dratsin’ireo ka hoy Izy taminy:'
  '24':
  - type: text
    content: '–Itondray vola '
  - type: text
    content: denàry
  - type: text
    content: ' anankiray aho! Sarin’iza ary anaran’iza no mipetaka eo?'
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –An’ny amperôra rômanina!
  '25':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: –Avereno amin’ny amperôra rômanina izay an’ny amperôra rômanina ary amin’Andriamanitra izay an’Andriamanitra.
  '26':
  - type: text
    content: Sady tsy afa-namandrika an’i Jesoa tamin’ny teny teo imason’ny vahoaka ireto iraka no gaga tamin’ny valin-teny nataony ka kepoka nangina.
  - type: heading
    content: Anontaniana momba ny fitsanganan’ny maty ho velona i Jesoa
  - type: heading
    content: (Jereo Mt 22.23-33; Mk 12.18-27)
  '27':
  - type: text
    content: 'Ireo '
  - type: text
    content: Tsadoseanina
  - type: text
    content: ', izay milaza fa tsy misy '
  - type: text
    content: fitsanganan’ny maty
  - type: note
    content: Ampit Asa 23.8.
  - type: text
    content: ' ho velona, dia mba nisy koa nanatona an’i Jesoa, ka nanontany Azy '
  '28':
  - type: text
    content: 'hoe:'
  - type: text
    content: '–Mpampianatra ô, izao no didy voasoratra nomen’i Mosesy antsika: «Raha misy lehilahy maty mbola velom-bady nefa tsy nanan-taranaka, dia aoka ny rahalahiny hampakatra an-dravehivavy, ka hiteraka hamela solofo ho an’ny maty'
  - type: note
    content: Jereo Deot 25.5-6.
  - type: text
    content: '.» '
  '29':
  - type: text
    content: 'Koa nisy àry olona fito mirahalahy. Nampaka-bady ny lahimatoa, kanjo maty tsy nanan-taranaka. '
  '3':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Izaho koa mba hanontany anareo zavatra anankiray, ka lazao kely hoe: '
  '30':
  - type: text
    content: 'Nampakatra an-dravehivavy ny faharoa, '
  '31':
  - type: text
    content: 'ary koa ny fahatelo; torak’izany avokoa izy fito mirahalahy, samy maty tsy namela taranaka. '
  '32':
  - type: text
    content: 'Farany maty koa ravehivavy. '
  '33':
  - type: text
    content: Amin’ny fitsanganan’ny maty ho velona àry, mba ho vadin’iza ravehivavy fa efa samy nanambady azy avokoa izy fito mirahalahy?
  '34':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ireo Tsadoseanina:'
  - type: text
    content: '–Ny olona amin’izao fiaina-mandalo izao no mampakatra sy ampakarina. '
  '35':
  - type: text
    content: 'Fa ireo nataon’Andriamanitra mendrika hitsangana velona avy any amin’ny maty sy handray anjara amin’ny fiainan-ko avy dia tsy mba mampakatra na ampakarina: '
  '36':
  - type: text
    content: 'tsy mety maty intsony manko fa tahaka ny '
  - type: text
    content: anjely
  - type: text
    content: '; sady zanak’Andriamanitra satria olona efa nataony mendrika hitsangana velona. '
  '37':
  - type: text
    content: 'Ny amin’ny hoe hitsangana velona ny maty dia efa nambaran’i Mosesy ao amin’ny toko momba ny Roimemy izany, fony izy niantso ny Tompo hoe: «Andriamanitr’i Abrahama sy Andriamanitr’i Itsehàka ary Andriamanitr’i Jakôba'
  - type: note
    content: Jereo Eks 3.2,6.
  - type: text
    content: '.» '
  '38':
  - type: text
    content: Ny Tompo dia tsy Andriamanitry ny maty fa Andriamanitry ny velona
  - type: note
    content: Jereo Mk 12.27 sy nta.
  - type: text
    content: ', satria ny Tompo no ahaveloman’izy rehetra.'
  '39':
  - type: text
    content: 'Dia niteny ny sasany tamin’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' nanao hoe:'
  - type: text
    content: –Mpampianatra ô, marina ny filàzanao!
  '4':
  - type: text
    content: 'iza no naniraka an’i Jôhany hanao '
  - type: text
    content: batisa
  - type: note
    content: Jereo 3.3,7.
  - type: text
    content: ', Andriamanitra sa olombelona?'
  '40':
  - type: text
    content: Ary tsy nisy olona sahy nanontany an’i Jesoa intsony.
  - type: heading
    content: Fanontaniana ny amin’ny hoe «Zanak’i Davida»
  - type: heading
    content: (Jereo Mt 22.42-46; Mk 12.35-37)
  '41':
  - type: text
    content: 'Hoy kosa i Jesoa tamin’ireto '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ':'
  - type: text
    content: '–Ahoana no ilazana fa hoe Zanak’i Davida ny '
  - type: text
    content: Mesia
  - type: text
    content: '? '
  '42':
  - type: text
    content: 'Ny tenan’i Davida manko no milaza ao amin’ny bokin’ny Salamo hoe:'
  - type: text
    content: «Ny Tompo Andriamanitra dia niteny hentitra
  - type: text
    content: 'tamin’ny Mpanjaka Tompoko hoe:'
  - type: text
    content: Mipetraha amin’ny sezafiandrianana eto ankavanako;
  '43':
  - type: text
    content: Izaho kosa hanao ny fahavalonao
  - type: text
    content: ho fitoeran-tongotrao
  - type: note
    content: Sal 110.1.
  - type: text
    content: .»
  '44':
  - type: text
    content: Antsoin’i Davida hoe Tompoko ny Mesia araka izany, ka ahoana no maha Zanany Azy?
  - type: heading
    content: Mampitandrina ny amin’ny mpahay lalàna i Jesoa
  - type: heading
    content: (Jereo Mt 23.1-36; Mk 12.38-40; Lk 11.37-54)
  '45':
  - type: text
    content: 'Raha mbola mihaino Azy eo ny vahoaka rehetra, dia hoy i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  '46':
  - type: text
    content: '–Mitandrema amin’ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: '. Ny tiany dia ny mandehandeha eny amin’ny '
  - type: text
    content: lala-mitafon’ny tempoly
  - type: text
    content: ', ny ankamamiany dia ny arahabaina eny an-kianja sy ny mipetraka eny aloha ao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' ary ny maka ny toeram-boninahitra any amin’ny fanasana. '
  '47':
  - type: text
    content: 'Ataony tapitra ny fananan’ny mpitondratena ary vavaka lavareny no mody ataony hisehosehoana: ireny olona ireny dia hohelohina mafimafy kokoa.'
  '5':
  - type: text
    content: 'Dia niara-niady hevitra ry zareo ka nifampiresaka hoe:'
  - type: text
    content: '–Raha lazaintsika hoe: «Andriamanitra no naniraka azy», dia hataony hoe: «Koa nahoana no tsy ninoanareo i Jôhany?» '
  '6':
  - type: text
    content: 'Raha lazaintsika hoe: «Olombelona no naniraka azy», dia indray hitora-bato hamono antsika ny vahoaka, satria nekeny ho '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra i Jôhany.
  '7':
  - type: text
    content: 'Ka hoy ny navaliny an’i Jesoa hoe:'
  - type: text
    content: –Tsy hitanay izay holazaina ny amin’izany!
  '8':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Izaho koa mba tsy hilaza aminareo izay fahefana anaovako an’izao zavatra izao.
  - type: heading
    content: Fanoharana ny amin’ilay tompon-tanimboaloboka
  - type: heading
    content: (Jereo Mt 21.33-46; Mk 12.1-12)
  '9':
  - type: text
    content: 'Dia nitodika tamin’ny vahoaka kosa i Jesoa nanao izao '
  - type: text
    content: fanoharana
  - type: text
    content: ' izao:'
  - type: text
    content: –Nisy lehilahy nanamboatra tanimboaloboka
  - type: note
    content: Ampit Is 5.1.
  - type: text
    content: ' ka nampanofa azy tamina mpamboly ary lasa niorim-ponenana any an-tany hafa. '
