        - type: text
          text: Ampit Asa 23.8.
      marker-yv: yv-n
    - type: text
      text: ' ho velona, dia mba nisy koa nanatona an’i Jesoa, ka nanontany Azy '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mpampianatra ô, izao no didy voasoratra nomen’i Mosesy antsika: «Raha misy lehilahy maty mbola velom-bady nefa tsy nanan-taranaka, dia aoka ny rahalahiny hampakatra an-dravehivavy, ka hiteraka hamela solofo ho an’ny maty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 25.5-6.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa nisy àry olona fito mirahalahy. Nampaka-bady ny lahimatoa, kanjo maty tsy nanan-taranaka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izaho koa mba hanontany anareo zavatra anankiray, ka lazao kely hoe: '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nampakatra an-dravehivavy ny faharoa, '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary koa ny fahatelo; torak’izany avokoa izy fito mirahalahy, samy maty tsy namela taranaka. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Farany maty koa ravehivavy. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Amin’ny fitsanganan’ny maty ho velona àry, mba ho vadin’iza ravehivavy fa efa samy nanambady azy avokoa izy fito mirahalahy?
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ireo Tsadoseanina:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny olona amin’izao fiaina-mandalo izao no mampakatra sy ampakarina. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ireo nataon’Andriamanitra mendrika hitsangana velona avy any amin’ny maty sy handray anjara amin’ny fiainan-ko avy dia tsy mba mampakatra na ampakarina: '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'tsy mety maty intsony manko fa tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: '; sady zanak’Andriamanitra satria olona efa nataony mendrika hitsangana velona. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny amin’ny hoe hitsangana velona ny maty dia efa nambaran’i Mosesy ao amin’ny toko momba ny Roimemy izany, fony izy niantso ny Tompo hoe: «Andriamanitr’i Abrahama sy Andriamanitr’i Itsehàka ary Andriamanitr’i Jakôba'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 3.2,6.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ny Tompo dia tsy Andriamanitry ny maty fa Andriamanitry ny velona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 12.27 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', satria ny Tompo no ahaveloman’izy rehetra.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny ny sasany tamin’ny '
    - type: usfm
