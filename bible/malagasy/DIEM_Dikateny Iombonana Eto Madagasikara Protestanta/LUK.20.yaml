verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avy aiza ny fahefàn’i Jesoa?
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 21.23-27; Mk 11.27-33)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indray andro, dia nampianatra ny vahoaka teo an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' i Jesoa sady nanambara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' taminy. Tonga kosa ny lohandoha-mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nony tonga ny taom-piotazana dia nanirahany mpiasa ireo mpamboly, hiangavy azy ireo hanome ampahany amin’ny vokatry ny tanimboaloboka; kanjo nokapohin’ireo mpamboly ilay mpiasa ary nalefany nody maina. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia nanirahany mpiasa fanindroany, fa io koa nokapohin’ireo mpamboly sy notevatevainy ary nalefany nody maina. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia mbola nanirahany mpiasa fanintelony; io indray koa nataon’ireo mpamboly naratra, izay vao noroahiny. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary hoy ny tompon’ny tanimboaloboka: «Inona re no hataoko? Ndeha hirahiko ity zanako malalako, fa angamba izy hananan’ireo hena-maso!» '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Vao nahita azy kosa ireo mpamboly, dia niara-nidinika sady nifampiresaka hoe: «Ny mpandova ity; aoka hovonointsika mba hahazoantsika ny lova.» '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia natosiny tany ivelan’ny tanimboaloboka ilay io ka novonoiny.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nofaranan’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona àry no hataon’ny tompon’ny tanimboaloboka amin’ireo mpamboly? '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ho avy izy ka haringany ireo mpamboly ireo ary homeny olon-kafa ny tanimboaloboka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nandre izany ireo mpanohitra an’i Jesoa, dia niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Sanatria izany!
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nojeren’i Jesoa ry zareo sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona àry no dikan’ity andinin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' ity:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny vato nolavin’ny mpanao trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanjary vato fehizoro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 118.22.
      marker-yv: yv-n
    - type: text
      text: »?
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay rehetra mianjera amin’izany vato izany dia ho torotoro, ary izay ianjerany kosa ho montsamontsana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandoavan-ketra ho an’ny amperôra rômanina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 22.15-22; Mk 12.13-17)
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitady hisambotra an’i Jesoa tamin’izay ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' sy lohandoha-mpisorona, satria nahatsiaro tena ho niantefan’iny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' nataony iny. Saingy natahotra ny vahoaka ry zareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mba lazao kely hoe: fahefana ahoana moa no anaovanao an’izao zavatra izao? Iza no nanome Anao izao fahefana izao?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nataon’ireo mpanohitra Azy andrimaso i Jesoa. Olona mihatsaravelatsihy miseho ho olo-marina no nalefany hamandrika an’i Jesoa amin’ny teniny ka hanolorany Azy eo am-pelatanan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pilato
    - type: text
      text: ' governora, mba hotsaraina sy hohelohina. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontanian’ireo iraka i Jesoa nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mpampianatra ô, fantatray fa mahitsy fiteny sy fampianatra Ianao sady tsy mizaha tavan’olona fa mampianatra tsotra ny lalana soritan’Andriamanitra. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa azonay atao ve ny mandoa hetra ho an’ny amperôra rômanina sa tsia?
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Takatr’i Jesoa anefa ny hafetsen-dratsin’ireo ka hoy Izy taminy:'
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Itondray vola '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denàry
    - type: text
      text: ' anankiray aho! Sarin’iza ary anaran’iza no mipetaka eo?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –An’ny amperôra rômanina!
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avereno amin’ny amperôra rômanina izay an’ny amperôra rômanina ary amin’Andriamanitra izay an’Andriamanitra.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sady tsy afa-namandrika an’i Jesoa tamin’ny teny teo imason’ny vahoaka ireto iraka no gaga tamin’ny valin-teny nataony ka kepoka nangina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anontaniana momba ny fitsanganan’ny maty ho velona i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 22.23-33; Mk 12.18-27)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo '
    - type: usfm
      marker: w
      children:
      - type: text
