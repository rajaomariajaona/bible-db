document_id: JER.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jeremià sy i Hananià mpaminany
  - type: text
    content: Tamin’iny taona iny ihany, izany hoe ny taona fahefatra nanjakàn’i Tsedekià mpanjakan’i Joda, andro iray tamin’ny volana fahadimy
  - type: note
    content: 'volana fahadimy: izany hoe ny volana Jolay-Aogositra 594 tal J.K; jereo ny FTS amin’ny voambolana hoe FANISANANDRO. –Momba ny fanjakan’i Tsedekià, jereo 27.1 sy nta.'
  - type: text
    content: ', dia nankao an-tranon’ny TOMPO i Hananià '
  - type: text
    content: mpaminany
  - type: text
    content: ', zanakalahin’i Hazora sady avy any Gibehôna. Niteny tamin’i Jeremià teo imason’ny mpisorona sy ny vahoaka rehetra teo izy, ka nanao hoe:'
  '10':
  - type: text
    content: 'Dia nesorin’i Hananià mpaminany ny zioga teo an-tsorok’i Jeremià mpaminany, ka nopotehiny. '
  '11':
  - type: text
    content: 'Avy eo dia hoy i Hananià teo imason’ny vahoaka rehetra teo: «Izao no lazain’ny TOMPO: ‹Alohan’ny roa taona androany, dia hopotehiko tahaka izao ny ziogam-pamoretana angejan’i Nebokadnetsara mpanjakan’i Babilôna ny firenena rehetra.› »'
  - type: text
    content: Dia lasa nandeha tamin’ny diany i Jeremià mpaminany.
  '12':
  - type: text
    content: 'Saingy taorian’ny nanapotehan’i Hananià mpaminany ny zioga izay nolanjain’i Jeremià teo an-tsorony, dia nisy baikon’ny TOMPO tamin’i Jeremià nanao hoe:'
  '13':
  - type: text
    content: '–Ndeha lazao amin’i Hananià izao hafatry ny TOMPO izao: «Satria nopotehinao ilay zioga hazo teo, dia zioga vy no hasolonao azy.»'
  '14':
  - type: text
    content: 'Sady nampian’i Jeremià hoe:'
  - type: text
    content: '–Izao manko no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Zioga vy no apetrako eny an-tsoroky ny firenena rehetra amin’ity faritany ity, ka hanompo an’i Nebokadnetsara mpanjakan’i Babilôna izy; eny, na dia ny bibidia aza dia hampanekeko azy koa.»'
  '15':
  - type: text
    content: 'Avy eo dia hoy koa i Jeremià tamin’i Hananià mpaminany:'
  - type: text
    content: '–Henoy tsara aho, ry Hananià: Tsy naniraka anao ny TOMPO, fa ianao no nanosika ity vahoaka ity hiantehitra amin’ny lainga. '
  '16':
  - type: text
    content: Koa lazain’ny TOMPO fa hoesoriny tsy ho eto ambonin’ny tany ianao; alohan’ny faran’ity taona ity, dia ho faty ianao satria nanosika ity firenena ity hikomy amin’ny TOMPO.
  '17':
  - type: text
    content: Dia maty tamin’ny volana fahafito tamin’iny taona iny tokoa i Hananià mpaminany
  - type: note
    content: 'volana fahafito: izany hoe Septambra-Oktôbra, jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
  - type: text
    content: .
  '2':
  - type: text
    content: '–Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely:'
  - type: text
    content: '«Hopotehiko ny '
  - type: text
    content: ziogam
  - type: text
    content: '-pamoretana angejan’ny mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' anareo. '
  '3':
  - type: text
    content: 'Ka alohan’ny roa taona manomboka androany, dia haveriko eto ireo fanaka rehetra tato an-tranoko, fanaka izay nalain’i Nebokadnetsara mpanjaka ka nentiny tany Babilôna. '
  '4':
  - type: text
    content: Haveriko eto koa i Jekonià, zanakalahin’i Jôiakima sady mpanjakan’i Joda, mbamin’ny Jodeanina rehetra izay nentina ho babo tany Babilôna, hoy ny teny hentitra avy amiko TOMPO. Eny, hopotehiko ny ziogam-pamoretana angejan’ny mpanjakan’i Babilôna anareo».
  '5':
  - type: text
    content: 'Fa namaly an’i Hananià mpaminany i Jeremià teo imason’ny mpisorona sy ny vahoaka rehetra izay tao an-tranon’ny TOMPO '
  '6':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: '–Eny, enga tokoa anie mba ho araka izay nolazainao no hataon’ny TOMPO! Hotanterahiny anie izay nambaranao ka haveriny avy any Babilôna hanketo indray ireo fanaka rehetra tao an-tranon’ny TOMPO miaraka amin’ny babo rehetra! '
  '7':
  - type: text
    content: 'Kanefa henoy tsara izao teny ataoko renao sy ren’ny vahoaka rehetra eto izao: '
  '8':
  - type: text
    content: 'Efa nisy tokoa mpaminany hatry ny ela talohanao sy talohako. Ireny mpaminany ireny dia manambara hafatra tamin’ireo tany matanjaka sy fanjakana malaza; nefa ady sy loza ary areti-mandringana no nambarany mazàna. '
  '9':
  - type: text
    content: Fa raha misy mpaminany iray milaza fahasambarana, ny ahalalana fa nirahin’ny TOMPO tokoa izy dia rehefa tanteraka izay nolazainy.
