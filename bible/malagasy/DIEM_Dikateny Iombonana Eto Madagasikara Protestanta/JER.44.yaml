          text: ': ampahan’ny lemak’i Neily ao atsimon’i Memfisa.'
      marker-yv: yv-n
    - type: text
      text: '. Ka hoy i Jeremià taminy: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandraka androany dia tsy mbola nisy na iray aza nanenina na nanaja Ahy ka nanaraka ny lalànako sy ny fitsipiko izay nomeko anareo sy ny razanareo.› »
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nofaranan’i Jeremià hoe: «Noho izany, dia izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: ‹Indro Aho manandrina anareo ka hahatonga loza handringana ny mponin’i Joda rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Halaiko ireo Jodeanina sisa tavela izay nanapa-kevitra handeha hialokaloka any Ejipta, ka ho lany ritra izy rehetra. Any amin’io tany io no hahalavoany sy hahalany ritra azy amin’ny ady sy ny mosary; eny, toy izany no hahafaty azy na ny kely na ny lehibe. Dia hatao ohatra filazàn-javatra maharikoriko sy mampivarahontsana na filazana ozona sy latsa ireo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hirotsaka an-tsehatra hamely izay monina any Ejipta Aho, tahaka izay namelezako ny mponina tao Jerosalema tamin’ny ady sy ny mosary ary ny areti-mandringana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ireo Jodeanina sisa tavela izay tonga hialokaloka tany Ejipta dia tsy hisy ho afa-mandositra na mitsoaka, tsy hisy ho tafaverina any Joda izay niriny fatratra hiverenana mba honenana; tsy hisy hiverina any Joda ireo, afa-tsy izay vitsivitsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo and 28.
      marker-yv: yv-n
    - type: text
      text: ' nieren-doza ihany.› »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny sorona ho an’i Hastôreta mpanjakavavin’ny lanitra
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo lehilahy rehetra izay nahalala fa manolotra zava-manitra mifangaro ho an’ireo andriamani-kafa ny vadiny, ary koa ireo vehivavy rehetra izay tafangona nanao fivoriam-be teo, izany hoe ireo olona rehetra izay nipetraka tany Ejipta tao Patrôsa, dia namaly an’i Jeremià hoe:'
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Na dia amin’ny anaran’ny TOMPO aza no ilazanao aminay izany teny izany, dia tsy hihaino anao izahay. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ny zavatra rehetra efa tapakay ihany no hataonay: dia ny hanolotra zava-manitra mifangaro sy divay ho an’ny andriamanibavy Hastôreta mpanjakavavin’ny lanitra, tahaka izay efa nataon’ny tenanay sy ny ray aman-dreninay sy ny mpanjakanay ary ireo mpitondra anay tany amin’ireo tanànan’i Joda sy teny amin’ny lalamben’i Jerosalema; fa voky hanina izahay tamin’izany sady nambinina ary tsy nidiran-doza. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nefa hatramin’izay tsy nanoloranay fanatitra zava-manitra mifangaro sy divay ho an’ny mpanjakavavin’ny lanitra izay, dia tsy manana na inona na inona intsony izahay sady matin’ny ady sy ny mosary.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanampy koa ireo vehivavy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ary raha nanolotra zava-manitra mifangaro ho an’i Hastôreta mpanjakavavin’ny lanitra izahay, moa tsy neken’ny vadinay ve izany? Fantany tsara fa manao mofo maneho ny sariny izahay sady manolotra fanatitra divay ho azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: ‹Hitanareo ny loza rehetra izay nampihariko tamin’i Jerosalema sy ireo tanàna hafa rehetra tany Joda. Ankehitriny ireny dia efa lao sady tsy misy mponina intsony ao aminy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jeremià tamin’ny vahoaka rehetra, dia ireo lehilahy sy vehivavy izay namaly azy teo:'
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Moa tsy efa nanolotra ireny fanatitra ireny tany an-tanànan’i Joda sy teny an-dalamben’i Jerosalema tokoa ve ny tenanareo sy ny ray aman-dreninareo ary ny mpanjakanareo sy ny mpitondra anareo mbamin’ny sarambabem-bahoaka? Koa heverinareo va fa tsy hitan’ny TOMPO sady hadinony ireny? '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsia, tsy lefitry ny TOMPO intsony ny fanao ratsy sy ny zavatra maharikoriko vitanareo. Noho izany, dia rava sy nampahonena ny taninareo ary tsy nisy mponina intsony, ka tonga oha-panozonana tahaka izay misy ankehitriny. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izao loza izao no mihatra aminareo dia noho ny nanoloranareo zava-manitra mifangaro ho an’ny andriamani-kafa sy nanotanareo tamin’ny TOMPO: tsy nihaino izay nolazainy taminareo manko ianareo sady tsy nanaraka ny lalànany sy ny didiny ary ny fampitandremany.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa i Jeremià tamin’ny vahoaka rehetra teo, indrindra tamin’ny vehivavy rehetra teo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Mihainoa ny tenin’ny TOMPO ianareo Jodeanina rehetra atỳ Ejipta. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Ny anareo vehivavy manokana, izay voalazanareo dia tanterahinareo; ka nilaza ianareo fa hanefa ny voady nataonareo tamin’i Hastôreta mpanjakavavin’ny lanitra ary hanolotra zava-manitra mifangaro sy divay ho azy. Koa efao ny voadinareo ary ataovy izay efa nampanantenainareo! '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Kanefa henoy tsara kosa izay ambarako aminareo, ry Jodeanina rehetra izay monina atỳ Ejipta, fa Izaho TOMPO no miteny izao: Indro mianiana amin’ny tenako Aho fa tsy hisy lehilahy jodeanina intsony manerana an’i Ejipta, hanonona ny anarako hoe: ‹Velona ny Tompo ANDRIANANAHARY, ka mianiana aho...!› '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Indro himasoako aminareo ny hahatonga loza fa tsy soa. Koa ny Jodeanina rehetra izay atỳ Ejipta dia ho ringan’ny ady sy ny mosary mandra-pahalany ritra azy. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Olom-bitsy no afaka hitsoaka amin’ny ady sy hiverina avy atỳ Ejipta ho any amin’ny tanin’i Joda. Koa izay sisa velona rehetra amin’ny Jodeanina tonga nialokaloka tatỳ Ejipta dia hahafantatra izay ho to teny na Izaho na izy. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Eto amin’ity toerana ity indrindra no hirotsahako an-tsehatra, hoy ny teny hentitra ambarako, ka hanomezako famantarana ho anareo. Ho fantatrareo amin’izay fa ho tanteraka tokoa ny loza nambarako taminareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria nampahasosotra Ahy ny mponina tao tamin’ireo ratsy nataony, fa nandeha nanao sorona sy nanompo ireo andriamani-kafa izay tsy misy ifandraisana aminy na aminareo na amin’ny razanareo akory izy. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary izao lazaiko izao no famantarana: Indro hatolotro eo an-tanan’ireo fahavalo mitady hahafaty azy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' Hôfrà mpanjakan’i Ejipta tahaka izay nanolorako an’i Tsedekià mpanjakan’i Joda ho eo an-tanan’i Nebokadnetsara mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tahaka... Tsedekià: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 39.5-7; 52.8-11; 2 Mp 25.5-7.
      marker-yv: yv-n
    - type: text
      text: ' izay fahavalo nitady hahafaty azy.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nitsaha-naniraka ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' mpanompoko tany aminareo Aho hiangavy anareo mba tsy hanao intsony ireny zavatra maharikoriko nankahalaiko ireny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tsy nihaino na nanongilan-tsofina akory ianareo hiala tamin’ny ratsy fanaonareo ka tsy hanolotra sorona amin’ireo andriamani-kafa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa natosako taminareo ny fahavinirako sy ny fahatezerako, ka nandoro ny tanànan’i Joda sy ny lalamben’i Jerosalema; eny, ho rava sy hampahonena ireny araka izay hita amin’izao andro izao.› »
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notohizan’i Jeremià hoe: «Ary ankehitriny dia izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: ‹Ahoana no dia anaovanareo ratsy lehibe hahavoa ny tenanareo? Moa tianareo haringana avokoa angaha ny vahoakan’i Joda mba tsy hisy sisa tavela na lehilahy na vehivavy na tanora na zaza madinika? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa mitady hampahasosotra Ahy va ianareo amin’ny asan-tananareo sy ny fanoloranareo sorona ho an’ireo andriamani-kafa ao amin’ny tany Ejipta izay ialokalofanareo? Sa tianareo haringana ny tenanareo ka ho tonga oha-panozonana sy oha-pandatsana any amin’ny firenen-kafa rehetra eran-tany! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadinonareo angaha ireo ratsy nataon’ny ray aman-dreninareo, nataon’ny mpanjaka sy ireo mpitondran’i Joda ary nataon’ny tenanareo sy ny vadinareo tao amin’ny tanin’i Joda sy teny an-dalamben’i Jerosalema? '
