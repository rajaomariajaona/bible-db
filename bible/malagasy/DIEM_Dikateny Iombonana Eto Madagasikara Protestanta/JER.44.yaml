    marker: p
    children:
    - type: text
      text: Nisy hafatra tonga tamin’i Jeremià ho an’ny Jodeanina rehetra izay nonina tany Ejipta tao an-tanànan’i Migdôla sy i Tahapanehesa sy i Memfisa ary tao amin’ny faritanin’i Patrôsa
    - type: usfm
      marker: f
