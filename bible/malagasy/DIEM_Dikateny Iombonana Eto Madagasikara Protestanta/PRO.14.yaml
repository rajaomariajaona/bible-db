document_id: PRO.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahendren’ny vehivavy no mahamafy tokantrano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahadalàny kosa maharava izany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Irery ao amin’ny alahelony sy ny fifaliany ny tsirairay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy olon-kafa afaka hiombona izany aminy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tranon’ny olon-dratsy horavana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fonenan’ny olo-mahitsy kosa hambinina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 10.27 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy toetra heverin’ny olona ho mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo mankany amin’ny fahafatesana no iafarany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mihomehy aza ny olona, dia mety ory fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny iafaran’ny fifaliana dia alahelo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpaniasia ho tsiravin’ny vokatry ny toetrany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tsara fanahy kosa ho ambony noho izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kely saina dia mino ny teny rehetra ambara aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny malina kosa mandinika, vao mandroso.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matahotra ny ratsy ny hendry ka mivily miala aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misafoaka kosa ny adala satria matoky tena loatra.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mora tezitra manao hadalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olona miteti-dratsy dia ankahalaina.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anjaran’ny kely saina dia fahadalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny voninahitry ny misaina kosa dia fahalalana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miondrika eo anatrehan’ny tsara fanahy ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitsatoka eo am-bavahadin’ny olo-marina ny olon-dratsy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mizotra amim-pahitsiana no manaja ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay maniasia kosa manamavo Azy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankahala ny mahantra na dia ny havany aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny manankarena kosa no maro sakaiza.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manamavo ny namany dia manota;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sambatra kosa izay miantra ny ory.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maniasia ny olona mikasa hanao ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fitiavana sy fihavanana kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho hitan’izay mikasa hanao soa.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ezaka tsara rehetra dia misy tombontsoa avokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fitsaontsaom-bava kosa miteraka fahantrana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hareny no satroboninahitry ny hendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hadalana kosa no ironan’ny adala.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavolombelona marina mahavonjy ain’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vavolombelona sandoka kosa dia fiasan’ny lainga.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manaja ny TOMPO dia manam-pialofana mahatoky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary misy fiarovana koa ho an’ny zanany.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanajana ny TOMPO dia loharanom-piainana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahazoana miala amin’ny fandrika mahafaty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.27 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 26-27:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 10.27 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hamaroam-bahoaka no voninahitry ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny havitsiany kosa no fietreny.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mahatsindry fo no tena manan-tsaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mora misendaotra mampiseho ny hadalany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’ny adala no itsimohan’ny fiavonavonana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny resaky ny hendry kosa fiarovana ho azy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiadanam-po dia mamelombelona ny vatana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fialonana kosa dia tahaka ny homamiadana.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mampahory ny mahantra dia manala baràka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an’ilay Andriamanitra Mpanao azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay miantra ny ory kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no manome voninahitra Azy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ratsy ataon’ny olon-dratsy no mahavery azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olo-marina kosa matoky satria tsy manan-tsiny.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitoetra ao am-pon’ny manan-tsaina ny fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa moa mba fantatra ao amin’ny olona adala ve izany?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinana manandratra avo ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahotana kosa dia henatra ho an’ny vahoaka.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankasitrahin’ny mpanjaka ny mpandraharaha kinga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tezerany kosa izay manala baràka.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy misy omby, dia foana ny efitrano fitahirizam-bary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny omby matanjaka no mampahazo vokatra betsaka.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavolombelona mahatoky tsy mba mandainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vavolombelona sandoka kosa milaza lainga.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba mitady fahendrena ny mpaniratsira, fa tsy mahita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay manan-tsaina kosa mora mahazo fahalalana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halaviro ny olona adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hahitanao teny fahalalana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitandrim-pitondrantena ny malina satria hendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Verin’ny hadalany kosa ny olona adala.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy miraharaha izay hanonitra fahadisoana ny adala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olo-mahitsy ihany no mahatsapa fahafaham-po.
