document_id: PRO.14,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ny fahendren’ny vehivavy no mahamafy tokantrano;
  - type: text
    content: fa ny fahadalàny kosa maharava izany.
  '10':
  - type: text
    content: Irery ao amin’ny alahelony sy ny fifaliany ny tsirairay;
  - type: text
    content: fa tsy misy olon-kafa afaka hiombona izany aminy.
  '11':
  - type: text
    content: Ny tranon’ny olon-dratsy horavana
  - type: text
    content: fa ny fonenan’ny olo-mahitsy kosa hambinina
  - type: note
    content: Jereo 10.27 sy nta.
  - type: text
    content: .
  '12':
  - type: text
    content: Misy toetra heverin’ny olona ho mahitsy,
  - type: text
    content: kanjo mankany amin’ny fahafatesana no iafarany.
  '13':
  - type: text
    content: Na mihomehy aza ny olona, dia mety ory fo;
  - type: text
    content: ary ny iafaran’ny fifaliana dia alahelo.
  '14':
  - type: text
    content: Ny mpaniasia ho tsiravin’ny vokatry ny toetrany;
  - type: text
    content: fa ny tsara fanahy kosa ho ambony noho izy.
  '15':
  - type: text
    content: Ny kely saina dia mino ny teny rehetra ambara aminy;
  - type: text
    content: fa ny malina kosa mandinika, vao mandroso.
  '16':
  - type: text
    content: Matahotra ny ratsy ny hendry ka mivily miala aminy,
  - type: text
    content: fa misafoaka kosa ny adala satria matoky tena loatra.
  '17':
  - type: text
    content: Izay mora tezitra manao hadalana,
  - type: text
    content: ary ny olona miteti-dratsy dia ankahalaina.
  '18':
  - type: text
    content: Ny anjaran’ny kely saina dia fahadalana,
  - type: text
    content: fa ny voninahitry ny misaina kosa dia fahalalana.
  '19':
  - type: text
    content: Miondrika eo anatrehan’ny tsara fanahy ny ratsy fanahy;
  - type: text
    content: ary mitsatoka eo am-bavahadin’ny olo-marina ny olon-dratsy.
  '2':
  - type: text
    content: Izay mizotra amim-pahitsiana no manaja ny TOMPO;
  - type: text
    content: fa izay maniasia kosa manamavo Azy.
  '20':
  - type: text
    content: Mankahala ny mahantra na dia ny havany aza;
  - type: text
    content: fa ny manankarena kosa no maro sakaiza.
  '21':
  - type: text
    content: Izay manamavo ny namany dia manota;
  - type: text
    content: fa sambatra kosa izay miantra ny ory.
  '22':
  - type: text
    content: Maniasia ny olona mikasa hanao ratsy;
  - type: text
    content: fa fitiavana sy fihavanana kosa
  - type: text
    content: no ho hitan’izay mikasa hanao soa.
  '23':
  - type: text
    content: Ny ezaka tsara rehetra dia misy tombontsoa avokoa,
  - type: text
    content: fa ny fitsaontsaom-bava kosa miteraka fahantrana.
  '24':
  - type: text
    content: Ny hareny no satroboninahitry ny hendry;
  - type: text
    content: fa hadalana kosa no ironan’ny adala.
  '25':
  - type: text
    content: Ny vavolombelona marina mahavonjy ain’olona,
  - type: text
    content: fa ny vavolombelona sandoka kosa dia fiasan’ny lainga.
  '26':
  - type: text
    content: Izay manaja ny TOMPO dia manam-pialofana mahatoky;
  - type: text
    content: ary misy fiarovana koa ho an’ny zanany.
  '27':
  - type: text
    content: Ny fanajana ny TOMPO dia loharanom-piainana,
  - type: text
    content: hahazoana miala amin’ny fandrika mahafaty
  - type: note
    content: 'And 26-27: jereo 10.27 sy nta.'
  - type: text
    content: .
  '28':
  - type: text
    content: Ny hamaroam-bahoaka no voninahitry ny mpanjaka;
  - type: text
    content: fa ny havitsiany kosa no fietreny.
  '29':
  - type: text
    content: Izay mahatsindry fo no tena manan-tsaina;
  - type: text
    content: fa izay mora misendaotra mampiseho ny hadalany.
  '3':
  - type: text
    content: Ny tenin’ny adala no itsimohan’ny fiavonavonana;
  - type: text
    content: fa ny resaky ny hendry kosa fiarovana ho azy.
  '30':
  - type: text
    content: Ny fiadanam-po dia mamelombelona ny vatana;
  - type: text
    content: fa ny fialonana kosa dia tahaka ny homamiadana.
  '31':
  - type: text
    content: Izay mampahory ny mahantra dia manala baràka
  - type: text
    content: an’ilay Andriamanitra Mpanao azy;
  - type: text
    content: fa izay miantra ny ory kosa
  - type: text
    content: no manome voninahitra Azy.
  '32':
  - type: text
    content: Ny ratsy ataon’ny olon-dratsy no mahavery azy;
  - type: text
    content: fa ny olo-marina kosa matoky satria tsy manan-tsiny.
  '33':
  - type: text
    content: Mitoetra ao am-pon’ny manan-tsaina ny fahendrena,
  - type: text
    content: fa moa mba fantatra ao amin’ny olona adala ve izany?
  '34':
  - type: text
    content: Ny fahamarinana manandratra avo ny firenena;
  - type: text
    content: fa ny fahotana kosa dia henatra ho an’ny vahoaka.
  '35':
  - type: text
    content: Ankasitrahin’ny mpanjaka ny mpandraharaha kinga;
  - type: text
    content: fa tezerany kosa izay manala baràka.
  '4':
  - type: text
    content: Raha tsy misy omby, dia foana ny efitrano fitahirizam-bary.
  - type: text
    content: Fa ny omby matanjaka no mampahazo vokatra betsaka.
  '5':
  - type: text
    content: Ny vavolombelona mahatoky tsy mba mandainga;
  - type: text
    content: fa ny vavolombelona sandoka kosa milaza lainga.
  '6':
  - type: text
    content: Mba mitady fahendrena ny mpaniratsira, fa tsy mahita;
  - type: text
    content: Fa izay manan-tsaina kosa mora mahazo fahalalana.
  '7':
  - type: text
    content: Halaviro ny olona adala,
  - type: text
    content: fa tsy hahitanao teny fahalalana.
  '8':
  - type: text
    content: Mitandrim-pitondrantena ny malina satria hendry;
  - type: text
    content: Verin’ny hadalany kosa ny olona adala.
  '9':
  - type: text
    content: Tsy miraharaha izay hanonitra fahadisoana ny adala;
  - type: text
    content: fa ny olo-mahitsy ihany no mahatsapa fahafaham-po.
