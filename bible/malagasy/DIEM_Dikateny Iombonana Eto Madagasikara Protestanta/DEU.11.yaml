document_id: DEU.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampahatsiarovana ny nataon’ny Tompo ho an’ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tiava ny TOMPO Andriamanitrareo, ka tandremo isan’andro izay asainy tandremana, dia ny lalànany sy ny fitsipiny ary ny didiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tsy ny zanakareo no itenenako izao fa ianareo. Tsy ny zanakareo manko fa ianareo no nahalala sy nahita ny fomba nitantanan’ny TOMPO Andriamanitrareo fahizany, dia ny fahalehibiazan’ny TOMPO sy ny fiarovany mahery ary ny fahefany tsy hay tohaina '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mbamin’ny famantarana sy asa nataony. Teo ny nataon’ny TOMPO tany Ejipta hamelezana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' mpanjakan’ny Ejiptianina sy hamelezana ny taniny manontolo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 7.14 –12.36.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'teo ny nataon’ny TOMPO hamelezana ny tafika ejiptianina sy ny soavaliny aman-kalesiny, dia ny nanaronany azy tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ranomasin’ny Volotara
  - type: text
    text: ' fony nanenjika anareo izy ka voaringana tsy hisy intsony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 14.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary teo ny nataony hanasoavana anareo tatỳ an-taniefitra mandra-pahatonganareo amin’izao toerana izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Teo koa ny namelezan’ny TOMPO an’i Datàna sy i Abirama izay samy zanakalahin’i Eliaba, taranak’i Reobena; teo afovoan’ny Israelita rehetra no nisokafan’ny tany sy nitelemany azy roa lahy mbamin’ny ankohonany sy ny lainy ary ny olona rehetra mpomba azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Nom 16. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –ary ny olona rehetra mpomba azy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary ny zava-miaina rehetra tafaraka taminy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eny, efa nahita maso ireny asa lehibe rehetra nataon’ny TOMPO ireny ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa tandremo avokoa ny didy izay ampitaiko aminareo anio mba hahery ianareo ka haka ho fanananareo ilay tany izay hiampitanareo sy hidiranareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary mba ho maro andro ianareo any amin’io tany io izay nianianan’ny TOMPO tamin’ny razambenareo homena azy sy ny taranany, dia tany izay tondra-dronono sy tantely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay tany voakarakaran’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny tany izay hidiranareo mba halainareo ho fananana azy manko dia tsy mba tahaka an’i Ejipta izay nialanareo. Tany Ejipta, rehefa namafy voan-javatra ianareo, dia nampiasa ny tongotrareo hampidiran-drano hanondrahana azy tahaka ny fanao amin’ny voly anana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny tany, izay hiampitanareo mba halainareo ho fananana, dia tany be tendrombohitra sy lohasaha sady vonton’ny ranonoran-danitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: tany izay voakarakaran’ny TOMPO Andriamanitrareo sady tsinjovin’ny masony mandrakariva hatreo amin’ny fiandohan’ny taona ka hatrany amin’ny fiafaràny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha tena hankatoavinareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 15.37 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ny didy izay ampitaiko aminareo anio, ka ny fonareo manontolo sy ny fanahinareo manontolo no hitiavanareo sy hanompoanareo Ahy TOMPO Andriamanitrareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia halatsako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Halatsany:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny rijan-teny samaritanina ary ny dkt grika sy latinina tranainy; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: halatsako
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', araka ny RM izay toa mampiteny mivantana an’Andriamanitra, kanefa i Mosesy no miteny eto. Mifandraika amin’izany koa ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hampanirîny
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' toy izany hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hampanirîko
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', eo amin’ny and manaraka.'
    marker-yv: yv-n
  - type: text
    text: ' eo amin’ny taninareo ny ranonorana amin’ny fotoanandrony, izany hoe ny loha-orana sy ny fara-orana, mba hanangonanareo vary sy divay ary menaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hampanirîko ahitra koa ny sahanareo ho an’ny biby fiompinareo; ary hihinan-kanina ianareo ka ho voky.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mitandrema ianareo fandrao ho voafitaka ny fonareo ka hivily hanompo andriamani-kafa ianareo sy hiankohoka eo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia hirehetan’ny fahatezeran’ny TOMPO ianareo, ka hanampina ny lanitra Izy mba tsy hisy ranonorana; ary tsy hahavokatra intsony ny tany, dia ho lany ringana ianareo any amin’ny tany soa izay homen’ny TOMPO anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.17 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 13-17:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 7.12.26; 28.1-14; Lev 26.3-5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa alatsaho ao amin’ny fo amam-panahinareo ireto didiko ireto; ary mba ho marika fampahatsiahivana azy anareo, dia ataovy anaty boaty famehy eny amin’ny hato-tananareo na eny an-kandrinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ampianaro ny zanakareo izany ary resaho na mipetraka ao an-tranonareo ianareo na mandeha eny an-dalana, na mandry ianareo na mifoha; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ary soraty eo amin’ny tolàm-baravaran’ny tranonareo sy eo amin’ny vavahadin’ny tanànanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 18-20:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 6.6-9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia ho maro andro ianareo sy ny taranakareo eny amin’ny tany izay nianianan’ny TOMPO tamin’ny razambenareo homena azy; eny, ho maro andro tahaka ny aharetan’ny lanitra eo ambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha tena imasoanareo hotanterahina avokoa izao didy ampitaiko aminareo izao ka hotiavinareo sy hifikiranareo ny TOMPO Andriamanitrareo ary hizoranareo ny sori-dàlany rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia horoahin’ny TOMPO ny firenena rehetra manoloana anareo ka ho voaroakanareo ny firenena maro izay lehibe sy mahery noho ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ho anareo avokoa ny toerana rehetra hodiavin’ny tongotrareo: ny faritaninareo dia hanomboka amin’ny taniefitra any atsimo ka hiafara any Libano any avaratra, ary hanomboka amin’ny ony Eofrata any atsinanana ka hiafara amin’ny Ranomasina Mediteranea any andrefana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy hisy hahatohitra anareo fa hataon’ny TOMPO Andriamanitrareo ho azon’ny tahotra sy horohoro anareo ny tany rehetra hodiavin’ny faladian-tongotrareo, araka ny nampanantenainy anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 24-25:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 1.3-5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Indro aho Mosesy mametraka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitahiana
  - type: text
    text: ' sy ozona hisafidiananareo anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hotahîna ianareo raha mankatò ireo didin’ny TOMPO Andriamanitrareo, izay ampitaiko aminareo anio; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ho voaozona kosa ianareo raha tsy mankatò ireo didin’ny TOMPO Andriamanitrareo fa mivily hiala ny lalana izay soritako ho anareo ka hanaraka andriamani-kafa tsy fantatrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Rahatrizay ny TOMPO Andriamanitrareo hahatafiditra anareo any amin’ny tany izay hidiranareo mba halainareo ho fananana, dia ny fitahiana no tonony eo an-tendrombohitra Gerizima, ary ny ozona kosa tonony ao an-tendrombohitra Hebala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tendrombohitra Gerizîma dia teo avaratr’i Sekema, ary ny tendrombohitra Hebala kosa dia teo atsimony; fahizany, dia nisy toeram-pivavahana israelita teo amin’ny tendrombohitra Hebala (jereo 27.4; Jos 8.30-33).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: (I Gerizima sy i Hebala dia tendrombohitra roa any an-dafy andrefan’ny ony Jôrdàna, any amparan’ny lalana miankandrefana, eo amin’ny tanin’ireo Kanahanîta monina ao amin’ny faritr’i Harabà; ireo tendrombohitra roa ireo dia eo akaikin’ny ôakan’i Môrà, tandrifin’i Gilgala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny toerana voatondro eto dia misy ampahany tsy mazava amintsika.
    marker-yv: yv-n
  - type: text
    text: '). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Efa hiampita an’i Jôrdàna ianareo ka hiditra haka ny tany izay omen’ny TOMPO Andriamanitrareo anareo; ary hahazo azy ho fanananareo ianareo ka honina eo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Koa imasoy hotanterahina avokoa ny lalàna amam-pitsipika izay apetrako eo anoloanareo anio.
