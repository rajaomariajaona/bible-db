document_id: DEU.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampahatsiarovana ny nataon’ny Tompo ho an’ny Israelita
  - type: text
    content: 'Tiava ny TOMPO Andriamanitrareo, ka tandremo isan’andro izay asainy tandremana, dia ny lalànany sy ny fitsipiny ary ny didiny. '
  '10':
  - type: text
    content: 'Ny tany izay hidiranareo mba halainareo ho fananana azy manko dia tsy mba tahaka an’i Ejipta izay nialanareo. Tany Ejipta, rehefa namafy voan-javatra ianareo, dia nampiasa ny tongotrareo hampidiran-drano hanondrahana azy tahaka ny fanao amin’ny voly anana. '
  '11':
  - type: text
    content: 'Fa ny tany, izay hiampitanareo mba halainareo ho fananana, dia tany be tendrombohitra sy lohasaha sady vonton’ny ranonoran-danitra, '
  '12':
  - type: text
    content: tany izay voakarakaran’ny TOMPO Andriamanitrareo sady tsinjovin’ny masony mandrakariva hatreo amin’ny fiandohan’ny taona ka hatrany amin’ny fiafaràny.
  '13':
  - type: text
    content: Raha tena hankatoavinareo
  - type: note
    content: Jereo Nom 15.37 sy nta.
  - type: text
    content: ' ny didy izay ampitaiko aminareo anio, ka ny fonareo manontolo sy ny fanahinareo manontolo no hitiavanareo sy hanompoanareo Ahy TOMPO Andriamanitrareo, '
  '14':
  - type: text
    content: dia halatsako
  - type: note
    content: 'Halatsany: araka ny rijan-teny samaritanina ary ny dkt grika sy latinina tranainy; halatsako, araka ny RM izay toa mampiteny mivantana an’Andriamanitra, kanefa i Mosesy no miteny eto. Mifandraika amin’izany koa ny hoe hampanirîny toy izany hoe hampanirîko, eo amin’ny and manaraka.'
  - type: text
    content: ' eo amin’ny taninareo ny ranonorana amin’ny fotoanandrony, izany hoe ny loha-orana sy ny fara-orana, mba hanangonanareo vary sy divay ary menaka. '
  '15':
  - type: text
    content: Hampanirîko ahitra koa ny sahanareo ho an’ny biby fiompinareo; ary hihinan-kanina ianareo ka ho voky.
  '16':
  - type: text
    content: 'Mitandrema ianareo fandrao ho voafitaka ny fonareo ka hivily hanompo andriamani-kafa ianareo sy hiankohoka eo anatrehany. '
  '17':
  - type: text
    content: Dia hirehetan’ny fahatezeran’ny TOMPO ianareo, ka hanampina ny lanitra Izy mba tsy hisy ranonorana; ary tsy hahavokatra intsony ny tany, dia ho lany ringana ianareo any amin’ny tany soa izay homen’ny TOMPO anareo
  - type: note
    content: 'And 13-17: jereo 7.12.26; 28.1-14; Lev 26.3-5.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Koa alatsaho ao amin’ny fo amam-panahinareo ireto didiko ireto; ary mba ho marika fampahatsiahivana azy anareo, dia ataovy anaty boaty famehy eny amin’ny hato-tananareo na eny an-kandrinareo. '
  '19':
  - type: text
    content: 'Ampianaro ny zanakareo izany ary resaho na mipetraka ao an-tranonareo ianareo na mandeha eny an-dalana, na mandry ianareo na mifoha; '
  '2':
  - type: text
    content: 'Tsy ny zanakareo no itenenako izao fa ianareo. Tsy ny zanakareo manko fa ianareo no nahalala sy nahita ny fomba nitantanan’ny TOMPO Andriamanitrareo fahizany, dia ny fahalehibiazan’ny TOMPO sy ny fiarovany mahery ary ny fahefany tsy hay tohaina '
  '20':
  - type: text
    content: ary soraty eo amin’ny tolàm-baravaran’ny tranonareo sy eo amin’ny vavahadin’ny tanànanareo
  - type: note
    content: 'And 18-20: jereo 6.6-9.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Dia ho maro andro ianareo sy ny taranakareo eny amin’ny tany izay nianianan’ny TOMPO tamin’ny razambenareo homena azy; eny, ho maro andro tahaka ny aharetan’ny lanitra eo ambonin’ny tany.
  '22':
  - type: text
    content: 'Fa raha tena imasoanareo hotanterahina avokoa izao didy ampitaiko aminareo izao ka hotiavinareo sy hifikiranareo ny TOMPO Andriamanitrareo ary hizoranareo ny sori-dàlany rehetra, '
  '23':
  - type: text
    content: 'dia horoahin’ny TOMPO ny firenena rehetra manoloana anareo ka ho voaroakanareo ny firenena maro izay lehibe sy mahery noho ianareo. '
  '24':
  - type: text
    content: 'Ho anareo avokoa ny toerana rehetra hodiavin’ny tongotrareo: ny faritaninareo dia hanomboka amin’ny taniefitra any atsimo ka hiafara any Libano any avaratra, ary hanomboka amin’ny ony Eofrata any atsinanana ka hiafara amin’ny Ranomasina Mediteranea any andrefana. '
  '25':
  - type: text
    content: Tsy hisy hahatohitra anareo fa hataon’ny TOMPO Andriamanitrareo ho azon’ny tahotra sy horohoro anareo ny tany rehetra hodiavin’ny faladian-tongotrareo, araka ny nampanantenainy anareo
  - type: note
    content: 'And 24-25: jereo Jos 1.3-5.'
  - type: text
    content: .
  '26':
  - type: text
    content: 'Indro aho Mosesy mametraka '
  - type: text
    content: fitahiana
  - type: text
    content: ' sy ozona hisafidiananareo anio. '
  '27':
  - type: text
    content: 'Hotahîna ianareo raha mankatò ireo didin’ny TOMPO Andriamanitrareo, izay ampitaiko aminareo anio; '
  '28':
  - type: text
    content: ho voaozona kosa ianareo raha tsy mankatò ireo didin’ny TOMPO Andriamanitrareo fa mivily hiala ny lalana izay soritako ho anareo ka hanaraka andriamani-kafa tsy fantatrareo.
  '29':
  - type: text
    content: Rahatrizay ny TOMPO Andriamanitrareo hahatafiditra anareo any amin’ny tany izay hidiranareo mba halainareo ho fananana, dia ny fitahiana no tonony eo an-tendrombohitra Gerizima, ary ny ozona kosa tonony ao an-tendrombohitra Hebala
  - type: note
    content: Ny tendrombohitra Gerizîma dia teo avaratr’i Sekema, ary ny tendrombohitra Hebala kosa dia teo atsimony; fahizany, dia nisy toeram-pivavahana israelita teo amin’ny tendrombohitra Hebala (jereo 27.4; Jos 8.30-33).
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'mbamin’ny famantarana sy asa nataony. Teo ny nataon’ny TOMPO tany Ejipta hamelezana ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’ny Ejiptianina sy hamelezana ny taniny manontolo'
  - type: note
    content: Jereo Eks 7.14 –12.36.
  - type: text
    content: '; '
  '30':
  - type: text
    content: (I Gerizima sy i Hebala dia tendrombohitra roa any an-dafy andrefan’ny ony Jôrdàna, any amparan’ny lalana miankandrefana, eo amin’ny tanin’ireo Kanahanîta monina ao amin’ny faritr’i Harabà; ireo tendrombohitra roa ireo dia eo akaikin’ny ôakan’i Môrà, tandrifin’i Gilgala
  - type: note
    content: Ny toerana voatondro eto dia misy ampahany tsy mazava amintsika.
  - type: text
    content: '). '
  '31':
  - type: text
    content: 'Efa hiampita an’i Jôrdàna ianareo ka hiditra haka ny tany izay omen’ny TOMPO Andriamanitrareo anareo; ary hahazo azy ho fanananareo ianareo ka honina eo. '
  '32':
  - type: text
    content: Koa imasoy hotanterahina avokoa ny lalàna amam-pitsipika izay apetrako eo anoloanareo anio.
  '4':
  - type: text
    content: 'teo ny nataon’ny TOMPO hamelezana ny tafika ejiptianina sy ny soavaliny aman-kalesiny, dia ny nanaronany azy tao amin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' fony nanenjika anareo izy ka voaringana tsy hisy intsony'
  - type: note
    content: Jereo Eks 14.
  - type: text
    content: '; '
  '5':
  - type: text
    content: 'ary teo ny nataony hanasoavana anareo tatỳ an-taniefitra mandra-pahatonganareo amin’izao toerana izao. '
  '6':
  - type: text
    content: Teo koa ny namelezan’ny TOMPO an’i Datàna sy i Abirama izay samy zanakalahin’i Eliaba, taranak’i Reobena; teo afovoan’ny Israelita rehetra no nisokafan’ny tany sy nitelemany azy roa lahy mbamin’ny ankohonany sy ny lainy ary ny olona rehetra mpomba azy
  - type: note
    content: 'Jereo Nom 16. –ary ny olona rehetra mpomba azy: dkt hafa ary ny zava-miaina rehetra tafaraka taminy.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Eny, efa nahita maso ireny asa lehibe rehetra nataon’ny TOMPO ireny ianareo. '
  '8':
  - type: text
    content: 'Koa tandremo avokoa ny didy izay ampitaiko aminareo anio mba hahery ianareo ka haka ho fanananareo ilay tany izay hiampitanareo sy hidiranareo, '
  '9':
  - type: text
    content: ary mba ho maro andro ianareo any amin’io tany io izay nianianan’ny TOMPO tamin’ny razambenareo homena azy sy ny taranany, dia tany izay tondra-dronono sy tantely
  - type: note
    content: Jereo Eks 3.8 sy nta.
  - type: text
    content: .
  - type: heading
    content: Ilay tany voakarakaran’Andriamanitra
