document_id: PSA.123,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanantenàn’ireo voatebaka sy voahosy
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: Aminao no anandratako ny masoko,
  - type: text
    content: ry Ilay mitoetra any an-danitra.
  '2':
  - type: text
    content: Indro toy ny fijerin’ny ankizilahy
  - type: text
    content: ny tanan’ny tompolahiny,
  - type: text
    content: ary toy ny fijerin’ny ankizivavy
  - type: text
    content: ny tanan’ny tompovaviny,
  - type: text
    content: no fijerinay ny TOMPO Andriamanitray
  - type: text
    content: mandra-piàntrany anay!
  '3':
  - type: text
    content: Iantrao izahay, TOMPO ô, iantrao
  - type: text
    content: fa tototry ny eso ela loatra;
  '4':
  - type: text
    content: Ela loatra no tototry ny tebak’ireo tretrika izahay,
  - type: text
    content: sy tototry ny eson’ireo mpiavonavona!
