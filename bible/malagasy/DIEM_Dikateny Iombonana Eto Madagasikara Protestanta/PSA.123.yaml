  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanantenàn’ireo voatebaka sy voahosy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hira fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aminao no anandratako ny masoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Ilay mitoetra any an-danitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro toy ny fijerin’ny ankizilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanan’ny tompolahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny fijerin’ny ankizivavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanan’ny tompovaviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no fijerinay ny TOMPO Andriamanitray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-piàntrany anay!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iantrao izahay, TOMPO ô, iantrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tototry ny eso ela loatra;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ela loatra no tototry ny tebak’ireo tretrika izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tototry ny eson’ireo mpiavonavona!
