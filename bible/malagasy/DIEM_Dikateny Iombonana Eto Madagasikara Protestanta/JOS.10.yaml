document_id: JOS.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandresena ireo mpanjakan’ny Amôrita
  - type: text
    content: 'Ren’i Adôny-Tsedèka, mpanjakan’i Jerosalema, fa azon’i Josoa ary nopotehiny tanteraka i Hay sady novonoiny ny mpanjakany; ka tahaka izay nataony tamin’i Jerikao sy ny mpanjakany no nataony tamin’i Hay. Reny koa fa ireo mponina tao Gibehôna dia efa nanao fanekempihavanana tamin’ny Israelita ka miara-monina aminy. '
  '10':
  - type: text
    content: 'Nakorontan’ny TOMPO teo anoloan’ny Israelita ny Amôrita, ka voan’ny faharesena lehibe teo akaikin’i Gibehôna. Dia nenjehin’ny Israelita teny am-piakarana ho any Bety-Hôrôna ireo, ka nasiany hatrany Hazekà sy hatrany Makedà. '
  '11':
  - type: text
    content: Fa iny nandositra teo anoloan’ny Israelita iny ry zareo, ka tonga teo am-pidinana avy ao Bety-Hôrôna, dia nandatsahan’ny TOMPO havandra vaventy avy tany an-danitra ambara-pahatongany tao Hazekà; ka be lavitra ny matin’ny havandra noho izay naripaky ny Israelita tamin’ny sabatra.
  '12':
  - type: text
    content: 'Tamin’ny andro nanomezan’ny TOMPO fandresena ho an’ny Israelita teo anoloan’ny Amôrita, dia nivavaka tamin’ny TOMPO i Josoa ka niteny teo imason’ny Israelita hoe:'
  - type: text
    content: –Ry masoandro, mijanona eo ambonin’ny lohasahan’i Aialôna!
  '13':
  - type: text
    content: Dia nijanona ny masoandro ary niato ny volana ambara-pandresin’ny firenena israelita ny fahavalony. Araka izay efa voasoratra tao amin’ny bokin’i Ilemahitsy
  - type: note
    content: Ny Bokin’i Ilemahitsy dia isan’ny firaketana poezia tranainy izay efa very tsy hita ankehitriny. Voatonona ao amin’ny 2 Sam 1.18 koa izy io.
  - type: text
    content: ', dia nijanona teo afovoan’ny lanitra tokoa ny masoandro, ka tsy nety hilentika indray andro manontolo. '
  '14':
  - type: text
    content: Ary tsy nisy andro tahaka iny, na taloha na taoriana, izay nihainoan’ny TOMPO hatak’olona; fa niady ho an’i Israely ny TOMPO.
  '15':
  - type: text
    content: Avy eo dia niverina ho any an-toby tany Gilgala i Josoa sy ny Israelita rehetra tafaraka taminy.
  - type: heading
    content: Novonoin’i Josoa ireo mpanjaka dimy resy
  '16':
  - type: text
    content: 'Kanjo nandositra ireo mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' dimy ka niafina tao amin’ny zohy tao Makedà'
  - type: note
    content: Jereo ny and 10.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Hita fa niafina tao ireo ka nambara tamin’i Josoa izany. '
  '18':
  - type: text
    content: 'Dia nanome baiko i Josoa hoe:'
  - type: text
    content: '–Anakodiavo vato lehibe eo am-bavazohy ary asio olona hiambina azy. '
  '19':
  - type: text
    content: Kanefa ianareo aza mijanona any, fa enjeho ny fahavalonareo ka asio avy ao ivohony; aza avela hiditra any an-tanànany, satria efa natolotry ny TOMPO Andriamanitrareo ao an-tananareo izy.
  '2':
  - type: text
    content: 'Dia raiki-tahotra mafy ny mponina tao Jerosalema satria i Gibehôna dia tanàna lehibe noho i Hay sady tahaka ny anankiray amin’ireo tanàna misy andriana, ary lehilahy mahery fo avokoa no tao aminy. '
  '20':
  - type: text
    content: 'Rehefa nasian’i Josoa sy ny Israelita ireo Amôrita, dia voan’ny faharesena lehibe tokoa tamin’ny farany, ary faharesena tanteraka; saingy nisy ihany afa-nandositra ka nitsofoka tao amin’ny tanànany mimanda. '
  '21':
  - type: text
    content: Avy teo dia niverina soa aman-tsara ho any amin’i Josoa tao an-toby tany Makedà ny tafiny manontolo. Ary tsy nisy olona sahy nanao vava ratsy tamin’ny Israelita intsony.
  '22':
  - type: text
    content: 'Taorian’izany, dia nasain’i Josoa novohana ny vavazohy ka havoaka tao ireo mpanjaka dimy mba hoentina eo aminy. '
  '23':
  - type: text
    content: 'Notanterahina izany ka nentina teo amin’i Josoa ireo mpanjakan’i Jerosalema sy i Hebrôna mbamin’ireo mpanjakan’i Jarmôta sy i Lakisy ary i Heglôna. '
  '24':
  - type: text
    content: 'Ary nony naseho teo anatrehan’i Josoa ireo mpanjaka ireo, dia namory ny lehilahy israelita rehetra i Josoa ka niteny tamin’ny mpitari-tafika niara-nikatroka taminy nanao hoe:'
  - type: text
    content: –Manatona ianareo, ka hitsaho ny vozon’ireo mpanjaka ireo
  - type: note
    content: Io fihetsika io dia anehoana fa resy tanteraka ny fahavalo (jereo Sal 110.1).
  - type: text
    content: '. Dia nanatona izy ka nanitsaka ny vozon’ireo mpanjaka ireo. '
  '25':
  - type: text
    content: 'Ary hoy i Josoa tamin’ny mpitari-tafika:'
  - type: text
    content: –Aza matahotra na mivadi-po! Aoka ho sahy sy hahery ianareo fa tahaka izao no hataon’ny TOMPO amin’ny fahavalo rehetra izay hiadianareo.
  '26':
  - type: text
    content: 'Taorian’izany, dia novonoin’i Josoa ho faty ireo mpanjaka ary nahantony tamin’ny hazo dimy ny fatiny sady navelany teo ambara-paharivan’ny andro. '
  '27':
  - type: text
    content: Tamin’ny filentehan’ny masoandro dia nasain’i Josoa nampidinina ny faty
  - type: note
    content: Jereo 8.29 sy nta.
  - type: text
    content: ', ka natsipy tao amin’ilay zohy efa nieren’ireo mpanjaka ireo ihany ny fatiny; ary vato vaventy mifanongoa no nanentsenana ny vavazohy, ka mbola ao ireny vato ireny mandraka androany.'
  - type: heading
    content: Azon’i Josoa ireo tanàna tao Kanahàna atsimo
  '28':
  - type: text
    content: Azon’i Josoa tamin’izany andro izany koa ny tanàna Makedà, ka nasainy novonoina tamin’ny sabatra ny mpanjakany sady nasainy naringana avokoa ny olona rehetra tao ka tsy nisy niangana. Tahaka izay nataon’i Josoa tamin’ny mpanjakan’i Jerikao no nataony tamin’ny mpanjakan’i Makedà.
  '29':
  - type: text
    content: 'Dia niala tao Makedà i Josoa sy ny Israelita rehetra niaraka taminy ka nankany Libnà sy nanafika azy. '
  '3':
  - type: text
    content: Noho izany, dia nandefasan’i Adôny-Tsedèka iraka i Hôkama mpanjakan’i Hebrôna, i Pireama mpanjakan’i Jarmôta, i Jafia mpanjakan’i Lakisy, ary i Debira mpanjakan’i Heglôna
  - type: note
    content: Ireo tanàna efatra nikambana tamin’i Jerosalema mba hiady amin’ny Gibehônita dia any atsimo andrefan’i Jerosalema no nisy azy.
  - type: text
    content: ', ka nilazany hoe:'
  '30':
  - type: text
    content: Natolotry ny TOMPO teo an-tanan’ny Israelita koa ny tanàna; dia novonoin’ireo tamin’ny sabatra ny mpanjakany sy ny olona rehetra tao ka tsy nisy niangana. Tahaka izay nataon’ny Israelita tamin’ny mpanjakan’i Jerikao no nataony tamin’ny mpanjakan’i Libnà.
  '31':
  - type: text
    content: 'Dia niala tao Libnà i Josoa sy ny Israelita rehetra niaraka taminy ka nankany Lakisy ary nanao fahirano azy sy nanafika azy. '
  '32':
  - type: text
    content: 'Natolotry ny TOMPO teo an-tanan’ny Israelita i Lakisy ka azony tamin’ny andro faharoa. Novonoin’ireo tamin’ny sabatra ny olona rehetra tao, tahaka izay nataony tamin’i Libnà. '
  '33':
  - type: text
    content: Tamin’izay dia tonga i Hôrama mpanjakan’i Gezera mba hanampy an’i Lakisy, nefa resin’i Josoa izay mbamin’ny tafiny ka tsy nisy niangana.
  '34':
  - type: text
    content: 'Dia niala tao Lakisy i Josoa sy ny Israelita rehetra niaraka taminy, ka nankany Heglôna ary dia nanao fahirano azy sy nanafika azy. '
  '35':
  - type: text
    content: Azony androtr’io ihany ny tanàna ka naringany sabatra avokoa ny olona rehetra tao; tahaka izay nataony tamin’i Lakisy ihany izany.
  '36':
  - type: text
    content: 'Dia niala tao Heglôna i Josoa sy ny Israelita niaraka taminy ka niakatra ho any Hebrôna, ary nanafika azy. '
  '37':
  - type: text
    content: Azony ny tanàna ka novonoiny tamin’ny sabatra ny mpanjakany sy ny olona rehetra tao. Azony koa ireo tanàna rehetra manodidina an’i Hebrôna, ary naringany avokoa ny olona rehetra tao ka tsy nisy niangana; tahaka izay nataony tamin’i Heglôna mihitsy izany.
  '38':
  - type: text
    content: 'Avy teo dia niverina ho any Debira i Josoa sy ny Israelita rehetra niaraka taminy ka nanafika azy. '
  '39':
  - type: text
    content: Azony ny tanàna sy ny mpanjakany mbamin’ireo tanàna manodidina an’i Debira. Naringany tamin’ny sabatra ny mponina rehetra tao ka tsy nisy niangana. Tahaka izay nataon’i Josoa tamin’i Hebrôna sy i Libnà mbamin’ny mpanjakany no nataon’i Josoa tamin’i Debira sy ny mpanjakany.
  '4':
  - type: text
    content: –Miakara hanampy ahy hamely an’i Gibehôna satria ny mponina ao aminy efa nanao fanekempihavanana tamin’i Josoa sy ny Israelita.
  '40':
  - type: text
    content: 'Nalain’i Josoa ny tany manontolo; noreseny avokoa ireo mpanjaka rehetra tany an-tendrombohitra sy ny faritra atsimo ary ny teny amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ' sy ny kisolosolo, ka tsy nisy niangana; naringany avokoa izay rehetra manana aina, araka ny didy nomen’ny TOMPO Andriamanitr’i Israely. '
  '41':
  - type: text
    content: Eny, nalain’i Josoa avokoa, nanomboka teo Kadesy-Barnea sy Gazà any atsimo, ka hatrany amin’ny faritanin’i Gôsena
  - type: note
    content: 'Gôsena: tanàna an-tendrombohitra any amin’i tanin’i Joda (Jos 15.51).'
  - type: text
    content: ' sy hatrany Gibehôna kosa any avaratra. '
  '42':
  - type: text
    content: 'Koa ny mpanjaka rehetra mbamin’ny taniny manontolo dia nalain’i Josoa tamin’ny famelezana indray mandeha ihany, satria ny TOMPO Andriamanitr’i Israely mihitsy no niady ho an’ny Israelita. '
  '43':
  - type: text
    content: Avy teo dia niverina ho an-toby tany Gilgala i Josoa sy ny Israelita rehetra niaraka taminy.
  '5':
  - type: text
    content: 'Dia nivondrona ireo mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' dimy lay, izany hoe ny mpanjaka tao Jerosalema sy Hebrôna mbamin’ny mpanjaka tao Jarmôta sy Lakisy ary Heglôna, ka niakatra niaraka tamin’ny tafiny rehetra hitoby tandrifin’i Gibehôna sy hanao fahirano azy. '
  '6':
  - type: text
    content: 'Nandefa iraka ho any amin’i Josoa tany an-tobin’i Gilgala kosa ny Gibehônita ka nanao hoe:'
  - type: text
    content: –Aza arianao izahay mpanomponao, fa miakara faingana hanampy anay ka afaho izahay! Ireo mpanjaka amôrita rehetra monina any an-tendrombohitra manko dia efa nivondrona hamely anay.
  '7':
  - type: text
    content: 'Dia niala tao Gilgala i Josoa sy ny tafika manontolo niaraka taminy, indrindra ny lehilahy mahery fo rehetra; '
  '8':
  - type: text
    content: 'fa hoy ny TOMPO tamin’i Josoa:'
  - type: text
    content: –Aza atahoranao ny mpanjaka amôrita satria hatolotro ho eo an-tananao ireo ka tsy hisy afaka hanohitra anao!
  '9':
  - type: text
    content: 'Dia nandeha nandritra ny alina avy tao Gilgala i Josoa sy ny tafiny ka namely tampoka an’ireo Amôrita. '
