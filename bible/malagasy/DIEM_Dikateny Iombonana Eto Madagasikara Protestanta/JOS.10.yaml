document_id: JOS.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresena ireo mpanjakan’ny Amôrita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ren’i Adôny-Tsedèka, mpanjakan’i Jerosalema, fa azon’i Josoa ary nopotehiny tanteraka i Hay sady novonoiny ny mpanjakany; ka tahaka izay nataony tamin’i Jerikao sy ny mpanjakany no nataony tamin’i Hay. Reny koa fa ireo mponina tao Gibehôna dia efa nanao fanekempihavanana tamin’ny Israelita ka miara-monina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia raiki-tahotra mafy ny mponina tao Jerosalema satria i Gibehôna dia tanàna lehibe noho i Hay sady tahaka ny anankiray amin’ireo tanàna misy andriana, ary lehilahy mahery fo avokoa no tao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho izany, dia nandefasan’i Adôny-Tsedèka iraka i Hôkama mpanjakan’i Hebrôna, i Pireama mpanjakan’i Jarmôta, i Jafia mpanjakan’i Lakisy, ary i Debira mpanjakan’i Heglôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo tanàna efatra nikambana tamin’i Jerosalema mba hiady amin’ny Gibehônita dia any atsimo andrefan’i Jerosalema no nisy azy.
    marker-yv: yv-n
  - type: text
    text: ', ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: –Miakara hanampy ahy hamely an’i Gibehôna satria ny mponina ao aminy efa nanao fanekempihavanana tamin’i Josoa sy ny Israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nivondrona ireo mpanjaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: amôrita
  - type: text
    text: ' dimy lay, izany hoe ny mpanjaka tao Jerosalema sy Hebrôna mbamin’ny mpanjaka tao Jarmôta sy Lakisy ary Heglôna, ka niakatra niaraka tamin’ny tafiny rehetra hitoby tandrifin’i Gibehôna sy hanao fahirano azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nandefa iraka ho any amin’i Josoa tany an-tobin’i Gilgala kosa ny Gibehônita ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza arianao izahay mpanomponao, fa miakara faingana hanampy anay ka afaho izahay! Ireo mpanjaka amôrita rehetra monina any an-tendrombohitra manko dia efa nivondrona hamely anay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niala tao Gilgala i Josoa sy ny tafika manontolo niaraka taminy, indrindra ny lehilahy mahery fo rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa hoy ny TOMPO tamin’i Josoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza atahoranao ny mpanjaka amôrita satria hatolotro ho eo an-tananao ireo ka tsy hisy afaka hanohitra anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nandeha nandritra ny alina avy tao Gilgala i Josoa sy ny tafiny ka namely tampoka an’ireo Amôrita. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nakorontan’ny TOMPO teo anoloan’ny Israelita ny Amôrita, ka voan’ny faharesena lehibe teo akaikin’i Gibehôna. Dia nenjehin’ny Israelita teny am-piakarana ho any Bety-Hôrôna ireo, ka nasiany hatrany Hazekà sy hatrany Makedà. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa iny nandositra teo anoloan’ny Israelita iny ry zareo, ka tonga teo am-pidinana avy ao Bety-Hôrôna, dia nandatsahan’ny TOMPO havandra vaventy avy tany an-danitra ambara-pahatongany tao Hazekà; ka be lavitra ny matin’ny havandra noho izay naripaky ny Israelita tamin’ny sabatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny andro nanomezan’ny TOMPO fandresena ho an’ny Israelita teo anoloan’ny Amôrita, dia nivavaka tamin’ny TOMPO i Josoa ka niteny teo imason’ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry masoandro, mijanona eo ambonin’ny lohasahan’i Aialôna!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nijanona ny masoandro ary niato ny volana ambara-pandresin’ny firenena israelita ny fahavalony. Araka izay efa voasoratra tao amin’ny bokin’i Ilemahitsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bokin’i Ilemahitsy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia isan’ny firaketana poezia tranainy izay efa very tsy hita ankehitriny. Voatonona ao amin’ny 2 Sam 1.18 koa izy io.'
    marker-yv: yv-n
  - type: text
    text: ', dia nijanona teo afovoan’ny lanitra tokoa ny masoandro, ka tsy nety hilentika indray andro manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary tsy nisy andro tahaka iny, na taloha na taoriana, izay nihainoan’ny TOMPO hatak’olona; fa niady ho an’i Israely ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Avy eo dia niverina ho any an-toby tany Gilgala i Josoa sy ny Israelita rehetra tafaraka taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Novonoin’i Josoa ireo mpanjaka dimy resy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanjo nandositra ireo mpanjaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: amôrita
  - type: text
    text: ' dimy ka niafina tao amin’ny zohy tao Makedà'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny and 10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hita fa niafina tao ireo ka nambara tamin’i Josoa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nanome baiko i Josoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Anakodiavo vato lehibe eo am-bavazohy ary asio olona hiambina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Kanefa ianareo aza mijanona any, fa enjeho ny fahavalonareo ka asio avy ao ivohony; aza avela hiditra any an-tanànany, satria efa natolotry ny TOMPO Andriamanitrareo ao an-tananareo izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa nasian’i Josoa sy ny Israelita ireo Amôrita, dia voan’ny faharesena lehibe tokoa tamin’ny farany, ary faharesena tanteraka; saingy nisy ihany afa-nandositra ka nitsofoka tao amin’ny tanànany mimanda. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Avy teo dia niverina soa aman-tsara ho any amin’i Josoa tao an-toby tany Makedà ny tafiny manontolo. Ary tsy nisy olona sahy nanao vava ratsy tamin’ny Israelita intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Taorian’izany, dia nasain’i Josoa novohana ny vavazohy ka havoaka tao ireo mpanjaka dimy mba hoentina eo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Notanterahina izany ka nentina teo amin’i Josoa ireo mpanjakan’i Jerosalema sy i Hebrôna mbamin’ireo mpanjakan’i Jarmôta sy i Lakisy ary i Heglôna. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nony naseho teo anatrehan’i Josoa ireo mpanjaka ireo, dia namory ny lehilahy israelita rehetra i Josoa ka niteny tamin’ny mpitari-tafika niara-nikatroka taminy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manatona ianareo, ka hitsaho ny vozon’ireo mpanjaka ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Io fihetsika io dia anehoana fa resy tanteraka ny fahavalo (jereo Sal 110.1).
    marker-yv: yv-n
  - type: text
    text: '. Dia nanatona izy ka nanitsaka ny vozon’ireo mpanjaka ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy i Josoa tamin’ny mpitari-tafika:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza matahotra na mivadi-po! Aoka ho sahy sy hahery ianareo fa tahaka izao no hataon’ny TOMPO amin’ny fahavalo rehetra izay hiadianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Taorian’izany, dia novonoin’i Josoa ho faty ireo mpanjaka ary nahantony tamin’ny hazo dimy ny fatiny sady navelany teo ambara-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tamin’ny filentehan’ny masoandro dia nasain’i Josoa nampidinina ny faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 8.29 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ka natsipy tao amin’ilay zohy efa nieren’ireo mpanjaka ireo ihany ny fatiny; ary vato vaventy mifanongoa no nanentsenana ny vavazohy, ka mbola ao ireny vato ireny mandraka androany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Azon’i Josoa ireo tanàna tao Kanahàna atsimo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Azon’i Josoa tamin’izany andro izany koa ny tanàna Makedà, ka nasainy novonoina tamin’ny sabatra ny mpanjakany sady nasainy naringana avokoa ny olona rehetra tao ka tsy nisy niangana. Tahaka izay nataon’i Josoa tamin’ny mpanjakan’i Jerikao no nataony tamin’ny mpanjakan’i Makedà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia niala tao Makedà i Josoa sy ny Israelita rehetra niaraka taminy ka nankany Libnà sy nanafika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Natolotry ny TOMPO teo an-tanan’ny Israelita koa ny tanàna; dia novonoin’ireo tamin’ny sabatra ny mpanjakany sy ny olona rehetra tao ka tsy nisy niangana. Tahaka izay nataon’ny Israelita tamin’ny mpanjakan’i Jerikao no nataony tamin’ny mpanjakan’i Libnà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia niala tao Libnà i Josoa sy ny Israelita rehetra niaraka taminy ka nankany Lakisy ary nanao fahirano azy sy nanafika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Natolotry ny TOMPO teo an-tanan’ny Israelita i Lakisy ka azony tamin’ny andro faharoa. Novonoin’ireo tamin’ny sabatra ny olona rehetra tao, tahaka izay nataony tamin’i Libnà. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tamin’izay dia tonga i Hôrama mpanjakan’i Gezera mba hanampy an’i Lakisy, nefa resin’i Josoa izay mbamin’ny tafiny ka tsy nisy niangana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niala tao Lakisy i Josoa sy ny Israelita rehetra niaraka taminy, ka nankany Heglôna ary dia nanao fahirano azy sy nanafika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Azony androtr’io ihany ny tanàna ka naringany sabatra avokoa ny olona rehetra tao; tahaka izay nataony tamin’i Lakisy ihany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia niala tao Heglôna i Josoa sy ny Israelita niaraka taminy ka niakatra ho any Hebrôna, ary nanafika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Azony ny tanàna ka novonoiny tamin’ny sabatra ny mpanjakany sy ny olona rehetra tao. Azony koa ireo tanàna rehetra manodidina an’i Hebrôna, ary naringany avokoa ny olona rehetra tao ka tsy nisy niangana; tahaka izay nataony tamin’i Heglôna mihitsy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Avy teo dia niverina ho any Debira i Josoa sy ny Israelita rehetra niaraka taminy ka nanafika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Azony ny tanàna sy ny mpanjakany mbamin’ireo tanàna manodidina an’i Debira. Naringany tamin’ny sabatra ny mponina rehetra tao ka tsy nisy niangana. Tahaka izay nataon’i Josoa tamin’i Hebrôna sy i Libnà mbamin’ny mpanjakany no nataon’i Josoa tamin’i Debira sy ny mpanjakany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nalain’i Josoa ny tany manontolo; noreseny avokoa ireo mpanjaka rehetra tany an-tendrombohitra sy ny faritra atsimo ary ny teny amin’ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: ' sy ny kisolosolo, ka tsy nisy niangana; naringany avokoa izay rehetra manana aina, araka ny didy nomen’ny TOMPO Andriamanitr’i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Eny, nalain’i Josoa avokoa, nanomboka teo Kadesy-Barnea sy Gazà any atsimo, ka hatrany amin’ny faritanin’i Gôsena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.41 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gôsena: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna an-tendrombohitra any amin’i tanin’i Joda (Jos 15.51).
    marker-yv: yv-n
  - type: text
    text: ' sy hatrany Gibehôna kosa any avaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Koa ny mpanjaka rehetra mbamin’ny taniny manontolo dia nalain’i Josoa tamin’ny famelezana indray mandeha ihany, satria ny TOMPO Andriamanitr’i Israely mihitsy no niady ho an’ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
