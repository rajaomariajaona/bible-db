      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voaparitaka amin’ny farango fikororohana.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andron’ilay fandringanana goavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa hianjera ireo tilikambo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy hisy renirano mikoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-tendrombohitra manerinerina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy eny amin’ny havoana miteronterona.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro hitsaboan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo ratra nanjo ny vahoakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanasitranany ny fery tamin’ny namelezana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahazavàn’ny volana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tahaka ny an’ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahazavàn’ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hamiratra ho impito heny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha oharina amin’ny hazavàny isan’andro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonga hanafay an’i Asiria ny Tompo
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro ny tenan’ny TOMPO mihitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tonga avy any lavitra any,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ombàn’ny fahatezerana mirehitra sady midonaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipololotra fahavinirana ny molony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka toy ny afo mandevona ny teniny.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny rano tondraka ny fofonainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manafotra hatreny an-bozona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga ny TOMPO hanivana ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny sivana fandravana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa hanisy lamboridy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny valanoranon’ny vahoaka.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ianareo ao Jerosalema kosa hihira toy ny fanao amin’ny alina fankalazana ny fety
    - type: usfm
