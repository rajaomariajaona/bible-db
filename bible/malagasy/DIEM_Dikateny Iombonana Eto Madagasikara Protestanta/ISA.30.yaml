  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozanareo zanaka maditra, hoy ny TOMPO!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao tetikasa ianareo, nefa tsy avy amiko ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manao fifanekena, nefa tsy araka ny Fanahiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heloka ampiana heloka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy manontany Ahy akory ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mandeha midina any Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mba hitady fiarovana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fialofana eo ambany alok’i Ejipta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hivadika ho henatra ho anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany fiarovan’ny Farao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fahafaham-baràkanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fialofana eo ambany alok’i Ejipta,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: na dia efa any Tsôhàna aza ny lehibenareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tonga hatrany Hanesy ny masoivohonareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsôhàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 19.11 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hanesy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' toa iray ihany amin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Heliôpôly '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (100 km eo ho eo ao atsimon’i Caire).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izy rehetra samy ho diso fanantenana
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’io firenena izay tsy hahasoa azy io,
- type: usfm
  marker: q1
  children:
  - type: text
    text: firenena tsy hahavonjy na hahasoa azy akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa handiso fanantenana sy hitondra latsa aza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mividy famonjena any Ejipta
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hafatra momba ny biby mivesatra entana any Negeba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faritra mampahory sy mampitebiteby
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady misy liona masiaka mierona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa menarana sy dragona manidina
- type: usfm
  marker: q1
  children:
  - type: text
    text: no indro vakivakîn’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka itondrany harena sy zava-tsoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-damosin’ny boriky
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy eny ambony trafon’ny rameva
- type: usfm
  marker: q1
  children:
  - type: text
    text: hankany amin’ny firenena tsy mahasoa azy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsinontsinona sy zava-poana ny famonjen’i Ejipta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'koa izany no iantsoako azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ilay be rehaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Anarana fanome an’i Ejipta tokoa indraindray ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rahaba na ilay be rehaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: tsy mahavita na inona na inona».
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ho an’ny ho avy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy kosa ny Tompo tamin’i Isaià:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ankehitriny, ndeha soraty amin’ny fafana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’ny mponin’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ataovy raki-tsoratra ho vavolombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: haharitra hatrany amin’ny andro ho avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa vahoaka maditra izy ireo, zanaka mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mety mihaino ny fampianaran’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy izy amin’ireo mpahita hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aza manam-pahitana ianareo»;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aza maminany zava-marina aminay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mahafaly anay ihany no lazao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maminania nofinofy aminay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mivilia lalana ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mialà amin’izay voasoritra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: atsaharo ny miteny eo anatrehanay
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’ilay Masin’i Israely».
- type: usfm
  marker: s1
  children:
  - type: text
    text: Firodanana tsy azom-panafana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa izao no lazain’ilay Masin’i Israely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Satria lavinareo izany teniko izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aleonareo mitoky amin’ny tsikombakomba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy miantehitra amin’ny hafetsifetsena,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia ho toy ny triatra amin’ny manda
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no haterak’izany heloka izany aminareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: miseho aloha ny mivohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tampotampoka eo dia mirodana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lasa potipotika ilay manda
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny vilanin’ny mpanefy tanimanga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay voadona ka montsamontsana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hahitana intsony na dia silany iray
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hangalana vainafo ao am-patana
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanovozan-drano ao an-kamory.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitonia ianareo ka matokia Ahy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izao no lazain’ny Tompo ANDRIANANAHARY,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ilay Masin’i Israely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho voavonjy ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha miverina amiko sady milamina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahery ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tony sy matoky Ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa tsy mety ianareo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fa mamaly hoe: «Tsia, fa hiriotra izahay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiriotra mitaingin-tsoavaly izahay.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa hitaingin-tsoavaly tokoa ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy hitsoaka handositra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy koa ianareo hoe: «Haingam-pandeha'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny kalesy hitaingenanay.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, kanefa ireo mpanenjika anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia vao mainka ho haingam-pandeha kokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fahavalo iray monja no mandrahona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hampandositra ny arivo aminareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha misy dimy aminy no mandrahona
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handositra avokoa ianareo rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka singantsingany no sisa ho velona aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny famantarana eny an-tampon-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: na tahaka ny faneva tavela eny amin’ny havoana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny androm-pamonjena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Na izany aza, mbola miandry fotoana ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahazoany miantra anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbola hirotsaka an-tsehatra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamindra fo aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Andriamanitra mitandro ny marina ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sambatra izay rehetra miandry Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ianao, ry vahoakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay monina ao Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hitomany intsony ianao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hiantra anao tokoa ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha vao mandre ny antsonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hamaly anao Izy raha vao mandre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Homen’ny Tompo anao ny mofo sy rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro ampahoriana sy amoretana anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy tokoa no mpampianatra anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hiafina aminao intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny masonao mihitsy no hahita Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa na handeha hiankavanana na hiankavia ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ho renao avy aoriana izao teny izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ity no lalana ka araho».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hoheverinao ho zava-maloto
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sampy voasokitra mifono volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny sarivongana voarakotra volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatsipinao toy ny zava-maharikoriko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hataonao hoe: «Mialà amiko!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Handrotsaka ranonorana ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny voa izay nafafinao any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny sakafo hovokarin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia sady ho betsaka no hatsiro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’izany andro izany, ny biby fiompinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiraoka amin’ny kijàna midadasika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny omby sy boriky miasa tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihinana vilona voaisy sira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ankamamian’ny biby fiompy tokoa ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vilona voaisy sira.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady voaparitaka amin’ny farango fikororohana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Amin’ny andron’ilay fandringanana goavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa hianjera ireo tilikambo,
- type: usfm
  marker: q1
  children:
