  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kapoka isanisany hamelezan’ny TOMPO azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiasa ho famaizana azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harahina ampongatapaka sy lokanga ary dihy koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hetsi-tanana hiadian’ny Tompo aminy.
  '33':
  - type: usfm
    marker: q1
