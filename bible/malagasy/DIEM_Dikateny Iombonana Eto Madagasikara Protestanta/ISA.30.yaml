      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fety lazaina eto dia toa ny fetin’ny Tranotomboka fankalàza amin’ny fararano mandritra ny alina anankiray (jereo ny FTS amin’ny voambolana hoe FANISANANDRO). Misy kosa mihevitra hoe ny PASKA* izany.
      marker-yv: yv-n
    - type: text
      text: ' ary hiravoravo am-po toy ny olona mandeha miaraka amin’ny feon-tsodina ho any an-tendrombohitry ny TOMPO, ilay Vatolampin’i Israely.'
  '3':
  - type: usfm
    marker: q1
