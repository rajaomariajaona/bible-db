  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataony hita ny fiantraikan’ny tanany mamely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mirehitra ny fahatezerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anivon’ny firedaredan’ny lelafo mandevona
  - type: usfm
    marker: q1
