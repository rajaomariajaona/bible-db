document_id: ISA.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Politika melohin’Andriamanitra
  - type: text
    content: Lozanareo zanaka maditra, hoy ny TOMPO!
  - type: text
    content: Manao tetikasa ianareo, nefa tsy avy amiko ireny;
  - type: text
    content: manao fifanekena, nefa tsy araka ny Fanahiko.
  - type: text
    content: Heloka ampiana heloka izany.
  '10':
  - type: text
    content: 'Hoy izy amin’ireo mpahita hoe:'
  - type: text
    content: «Aza manam-pahitana ianareo»;
  - type: text
    content: 'ary amin’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: «Aza maminany zava-marina aminay,
  - type: text
    content: fa izay mahafaly anay ihany no lazao.
  - type: text
    content: Maminania nofinofy aminay.
  '11':
  - type: text
    content: Mivilia lalana ianareo
  - type: text
    content: ary mialà amin’izay voasoritra;
  - type: text
    content: atsaharo ny miteny eo anatrehanay
  - type: text
    content: an’ilay Masin’i Israely».
  - type: heading
    content: Firodanana tsy azom-panafana
  '12':
  - type: text
    content: 'Koa izao no lazain’ilay Masin’i Israely:'
  - type: text
    content: «Satria lavinareo izany teniko izany
  - type: text
    content: fa aleonareo mitoky amin’ny tsikombakomba
  - type: text
    content: sy miantehitra amin’ny hafetsifetsena,
  '13':
  - type: text
    content: dia ho toy ny triatra amin’ny manda
  - type: text
    content: 'no haterak’izany heloka izany aminareo:'
  - type: text
    content: miseho aloha ny mivohitra,
  - type: text
    content: ary tampotampoka eo dia mirodana.
  '14':
  - type: text
    content: Lasa potipotika ilay manda
  - type: text
    content: toy ny vilanin’ny mpanefy tanimanga,
  - type: text
    content: 'izay voadona ka montsamontsana:'
  - type: text
    content: tsy hahitana intsony na dia silany iray
  - type: text
    content: mba hangalana vainafo ao am-patana
  - type: text
    content: na hanovozan-drano ao an-kamory.»
  - type: heading
    content: Mitonia ianareo ka matokia Ahy
  '15':
  - type: text
    content: Izao no lazain’ny Tompo ANDRIANANAHARY,
  - type: text
    content: 'dia ilay Masin’i Israely:'
  - type: text
    content: Ho voavonjy ianareo,
  - type: text
    content: raha miverina amiko sady milamina;
  - type: text
    content: hahery ianareo,
  - type: text
    content: raha tony sy matoky Ahy.
  - type: text
    content: Kanefa tsy mety ianareo,
  '16':
  - type: text
    content: 'fa mamaly hoe: «Tsia, fa hiriotra izahay,'
  - type: text
    content: hiriotra mitaingin-tsoavaly izahay.»
  - type: text
    content: Koa hitaingin-tsoavaly tokoa ianareo,
  - type: text
    content: saingy hitsoaka handositra.
  - type: text
    content: 'Hoy koa ianareo hoe: «Haingam-pandeha'
  - type: text
    content: ny kalesy hitaingenanay.»
  - type: text
    content: Eny, kanefa ireo mpanenjika anareo
  - type: text
    content: dia vao mainka ho haingam-pandeha kokoa.
  '17':
  - type: text
    content: Fahavalo iray monja no mandrahona,
  - type: text
    content: dia hampandositra ny arivo aminareo;
  - type: text
    content: ary raha misy dimy aminy no mandrahona
  - type: text
    content: dia handositra avokoa ianareo rehetra.
  - type: text
    content: Ka singantsingany no sisa ho velona aminareo,
  - type: text
    content: tahaka ny famantarana eny an-tampon-tendrombohitra
  - type: text
    content: na tahaka ny faneva tavela eny amin’ny havoana.
  - type: heading
    content: Ny androm-pamonjena
  '18':
  - type: text
    content: Na izany aza, mbola miandry fotoana ny TOMPO
  - type: text
    content: hahazoany miantra anareo,
  - type: text
    content: mbola hirotsaka an-tsehatra Izy
  - type: text
    content: hamindra fo aminareo,
  - type: text
    content: satria Andriamanitra mitandro ny marina ny TOMPO;
  - type: text
    content: sambatra izay rehetra miandry Azy.
  '19':
  - type: text
    content: 'Ary ianao, ry vahoakan’i '
  - type: text
    content: Tsiôna
  - type: text
    content: izay monina ao Jerosalema,
  - type: text
    content: tsy hitomany intsony ianao.
  - type: text
    content: Fa hiantra anao tokoa ny Tompo,
  - type: text
    content: raha vao mandre ny antsonao;
  - type: text
    content: eny, hamaly anao Izy raha vao mandre.
  '2':
  - type: text
    content: Tsy manontany Ahy akory ianareo
  - type: text
    content: nefa mandeha midina any Ejipta
  - type: text
    content: 'mba hitady fiarovana amin’ny '
  - type: text
    content: Farao
  - type: text
    content: sy fialofana eo ambany alok’i Ejipta.
  '20':
  - type: text
    content: Homen’ny Tompo anao ny mofo sy rano
  - type: text
    content: amin’ny andro ampahoriana sy amoretana anao;
  - type: text
    content: Izy tokoa no mpampianatra anao
  - type: text
    content: ka tsy hiafina aminao intsony,
  - type: text
    content: ary ny masonao mihitsy no hahita Azy.
  '21':
  - type: text
    content: Fa na handeha hiankavanana na hiankavia ianao,
  - type: text
    content: 'dia ho renao avy aoriana izao teny izao:'
  - type: text
    content: «Ity no lalana ka araho».
  '22':
  - type: text
    content: Hoheverinao ho zava-maloto
  - type: text
    content: ny sampy voasokitra mifono volafotsy
  - type: text
    content: sy ny sarivongana voarakotra volamena,
  - type: text
    content: ka hatsipinao toy ny zava-maharikoriko
  - type: text
    content: 'ary hataonao hoe: «Mialà amiko!»'
  '23':
  - type: text
    content: Handrotsaka ranonorana ny Tompo
  - type: text
    content: ho an’ny voa izay nafafinao any an-tsaha,
  - type: text
    content: ka ny sakafo hovokarin’ny tany
  - type: text
    content: dia sady ho betsaka no hatsiro.
  - type: text
    content: Amin’izany andro izany, ny biby fiompinao
  - type: text
    content: dia hiraoka amin’ny kijàna midadasika.
  '24':
  - type: text
    content: Ny omby sy boriky miasa tany
  - type: text
    content: dia hihinana vilona voaisy sira
  - type: note
    content: Ankamamian’ny biby fiompy tokoa ny vilona voaisy sira.
  - type: text
    content: sady voaparitaka amin’ny farango fikororohana.
  '25':
  - type: text
    content: Amin’ny andron’ilay fandringanana goavana,
  - type: text
    content: rehefa hianjera ireo tilikambo,
  - type: text
    content: dia samy hisy renirano mikoriana
  - type: text
    content: eny an-tendrombohitra manerinerina
  - type: text
    content: sy eny amin’ny havoana miteronterona.
  '26':
  - type: text
    content: Amin’ny andro hitsaboan’ny TOMPO
  - type: text
    content: ireo ratra nanjo ny vahoakany
  - type: text
    content: sy hanasitranany ny fery tamin’ny namelezana azy,
  - type: text
    content: ny fahazavàn’ny volana
  - type: text
    content: dia ho tahaka ny an’ny masoandro,
  - type: text
    content: ary ny fahazavàn’ny masoandro
  - type: text
    content: dia hamiratra ho impito heny
  - type: text
    content: raha oharina amin’ny hazavàny isan’andro.
  - type: heading
    content: Tonga hanafay an’i Asiria ny Tompo
  '27':
  - type: text
    content: Indro ny tenan’ny TOMPO mihitsy
  - type: text
    content: no tonga avy any lavitra any,
  - type: text
    content: ombàn’ny fahatezerana mirehitra sady midonaka.
  - type: text
    content: Mipololotra fahavinirana ny molony,
  - type: text
    content: ka toy ny afo mandevona ny teniny.
  '28':
  - type: text
    content: Toy ny rano tondraka ny fofonainy
  - type: text
    content: ka manafotra hatreny an-bozona.
  - type: text
    content: Tonga ny TOMPO hanivana ny firenena
  - type: text
    content: amin’ny sivana fandravana,
  - type: text
    content: ary koa hanisy lamboridy
  - type: text
    content: amin’ny valanoranon’ny vahoaka.
  '29':
  - type: text
    content: Fa ianareo ao Jerosalema kosa hihira toy ny fanao amin’ny alina fankalazana ny fety
  - type: note
    content: Ny fety lazaina eto dia toa ny fetin’ny Tranotomboka fankalàza amin’ny fararano mandritra ny alina anankiray (jereo ny FTS amin’ny voambolana hoe FANISANANDRO). Misy kosa mihevitra hoe ny PASKA* izany.
  - type: text
    content: ' ary hiravoravo am-po toy ny olona mandeha miaraka amin’ny feon-tsodina ho any an-tendrombohitry ny TOMPO, ilay Vatolampin’i Israely.'
  '3':
  - type: text
    content: Hivadika ho henatra ho anareo
  - type: text
    content: izany fiarovan’ny Farao izany,
  - type: text
    content: ary ho fahafaham-baràkanareo
  - type: text
    content: ny fialofana eo ambany alok’i Ejipta,
  '30':
  - type: text
    content: Hataon’ny TOMPO re tokoa
  - type: text
    content: ny feony heni-piandrianana
  - type: text
    content: ary hataony hita ny fiantraikan’ny tanany mamely,
  - type: text
    content: rehefa mirehitra ny fahatezerany
  - type: text
    content: eo anivon’ny firedaredan’ny lelafo mandevona
  - type: text
    content: ary ao anatin’ny ranonoram-baratra
  - type: text
    content: sy ny havandra vaventy mifafy.
  '31':
  - type: text
    content: Dia ho raiki-tahotra ny Asirianina,
  - type: text
    content: rehefa handre ny feon’ny TOMPO
  - type: text
    content: sady hokapohiny amin’ny tsorakazo.
  '32':
  - type: text
    content: Ny kapoka isanisany hamelezan’ny TOMPO azy
  - type: text
    content: dia hiasa ho famaizana azy.
  - type: text
    content: Harahina ampongatapaka sy lokanga ary dihy koa
  - type: text
    content: ny hetsi-tanana hiadian’ny Tompo aminy.
  '33':
  - type: text
    content: Fa efa voaomana hatry ny ela ny fandoroana,
  - type: text
    content: ary ho an’ny mpanjaka ihany koa izany.
  - type: text
    content: Faritra boribory, malalaka sady lalina,
  - type: text
    content: no namoriana kitay betsaka handrehetana afo;
  - type: text
    content: ary dia ny fofonain’ny TOMPO,
  - type: text
    content: izay toy ny riakan-
  - type: text
    content: tsolifara
  - type: text
    content: ' miredareda,'
  - type: text
    content: no hampirehitra izany toeram-pandoroana izany.
  '4':
  - type: text
    content: na dia efa any Tsôhàna aza ny lehibenareo
  - type: text
    content: ary tonga hatrany Hanesy ny masoivohonareo
  - type: note
    content: 'Tsôhàna: jereo 19.11 sy nta. –Hanesy: toa iray ihany amin’ny hoe Heliôpôly (100 km eo ho eo ao atsimon’i Caire).'
  - type: text
    content: .
  '5':
  - type: text
    content: Izy rehetra samy ho diso fanantenana
  - type: text
    content: amin’io firenena izay tsy hahasoa azy io,
  - type: text
    content: firenena tsy hahavonjy na hahasoa azy akory,
  - type: text
    content: fa handiso fanantenana sy hitondra latsa aza.
  - type: heading
    content: Ireo mividy famonjena any Ejipta
  '6':
  - type: text
    content: Hafatra momba ny biby mivesatra entana any Negeba.
  - type: text
    content: Faritra mampahory sy mampitebiteby
  - type: text
    content: sady misy liona masiaka mierona
  - type: text
    content: ary koa menarana sy dragona manidina
  - type: text
    content: no indro vakivakîn’ny olona
  - type: text
    content: ka itondrany harena sy zava-tsoa
  - type: text
    content: eny an-damosin’ny boriky
  - type: text
    content: sy eny ambony trafon’ny rameva
  - type: text
    content: hankany amin’ny firenena tsy mahasoa azy akory.
  '7':
  - type: text
    content: Tsinontsinona sy zava-poana ny famonjen’i Ejipta;
  - type: text
    content: 'koa izany no iantsoako azy hoe:'
  - type: text
    content: «Ilay be rehaka
  - type: note
    content: Anarana fanome an’i Ejipta tokoa indraindray ny hoe Rahaba na ilay be rehaka.
  - type: text
    content: tsy mahavita na inona na inona».
  - type: heading
    content: Fampitandremana ho an’ny ho avy
  '8':
  - type: text
    content: 'Hoy kosa ny Tompo tamin’i Isaià:'
  - type: text
    content: «Ankehitriny, ndeha soraty amin’ny fafana izany
  - type: text
    content: eo anatrehan’ny mponin’i Jerosalema,
  - type: text
    content: ka ataovy raki-tsoratra ho vavolombelona
  - type: text
    content: haharitra hatrany amin’ny andro ho avy.
  '9':
  - type: text
    content: Fa vahoaka maditra izy ireo, zanaka mandainga,
  - type: text
    content: tsy mety mihaino ny fampianaran’ny TOMPO.
