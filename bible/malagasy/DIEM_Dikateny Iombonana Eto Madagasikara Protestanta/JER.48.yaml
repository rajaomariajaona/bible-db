document_id: JER.48
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Môaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fanambaràna ny amin’i Môaba. Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Loza ity manjo ny tanànan’i Nebao, fa rava!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ketraka i Kiriataima, fa azo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Môaba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Is 15.1 sy nta. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Nebao, Kiriataima
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 1), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Madmena
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 2) ets: tanàn-dehibe tany Môaba.'
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ketraka izany tanànamimanda izany, fa mirodana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy misy intsony ny reharehan’i Môaba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamelezana an’i Hesbôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no nanaovana teti-dratsy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Andeha hofoanantsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho firenena intsony izy!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ringana koa ianao, ry Madmena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa manjohy anao ny ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Misy feo miantso vonjy avy any Hôrônaîma:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandravana sy fandringanana goavana moa izao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Potika i Môaba; ka hatrany Tsôhara
- type: usfm
  marker: q1
  children:
  - type: text
    text: no andrenesana ny antso vonjy ataony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hatrany Tsôhara: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy sy ny Is 15.5; ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ireo madinika ao aminy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tsôhara
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàn-dehiben’i Môaba voalaza eo amin’ny and 34; jereo Gen 13.10; heverina ho eo atsimon’ny Ranomasina Maty no misy azy.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mitomany ny sisa velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: miakatra ny fiakaran’i Lohita.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Re hatrany am-pidinan’i Hôrônaîma
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny kiakiaka ateraky ny fandringanana hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: «Mandosira, vonjeo ny ainareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mijanòna any an-taniefitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny borikidia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Toy ny borikidia: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Harôhera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (tanàna môabita).'
    marker-yv: yv-n
  - type: text
    text: ' ianareo.»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny zava-bitanao sy ny tahirin-karenao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nianteheranao, ry Môaba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo hay voa koa ianao ity!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indray lasan-ko babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: i Kemôsy andriamanitrao sy ny mpisorony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa ireo mpitondra anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitety ny tanàna rehetra ireo mpandrava;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy tanàna hidifiany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Simba avokoa ny lohasaha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ripaka ny lembalemba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no voalazan’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Anangano fasana i Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ho rava tokoa izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lao ireo tanànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy mponina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho voaozona anie izay manao tsirambina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny asa nampanaovin’ny TOMPO azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ho voaozona anie izay misakana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sabany tsy handatsa-dra!
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: «Tsy mba niaina tamin’ahiahy i Môaba
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatry ny fony izy mbola kely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mbola nentina ho babo mihitsy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nandry feizay am-pilaminana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny divay niotrika hitsihan’ny faikany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mbola naidina nafindra siny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitana tsiro sady tsy miova hanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Noho izany, hoy ny teny hentitry ny TOMPO, tonga ny andro izay handefasako olona mba hamindra siny azy. Hatotongany ho foana ny sinibe fitoeran-divay sady hotorotoroiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ho diso fanantenana i Môaba amin’i Kemôsy andriamaniny tahaka ny nahadiso fanantenana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' avaratra tamin’ny andriamanitr’i Betela izay nianteherany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ry olon’i Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ahoana no itenenanareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Lehilahy matanjaka izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady miaramila mahery an’ady»?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mananika ny tanànanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay mpandrava an’i Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampidina ho amin’ny famonoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo zatovonareo voafantina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitra ataon’ilay Mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay antsoina hoe «TOMPOn’izao rehetra izao.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Akaiky ho tonga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny loza hanjo an’i Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho avy haingana ny fahoriany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa ianareo rehetra mpifanila aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahalala ny lazany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia manehoa fiaraha-miory ka manaova hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ahoana no nahapotika ity hery màzana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ity fahefàna be voninahitra ity?»
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ry mponina mahonena ao Dibôna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: midìna avy eo amin’ny toeram-boninahitrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitoera ao anaty fako ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria miakatra hanafika anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay mpandrava an’i Môaba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandrodana ny mandanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ry mponina ao Harôhera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mijoroa eny an-dalambe ka miambena.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anontanio ireo nandositra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy izay sisa avotra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Inona no zavatra niseho?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: –Menatra sy ketraka i Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny navalin’ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova antsoantso sy kiakiaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambarao amin’ny faritra amoron’i Arnôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Arnôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: renirano mivarina any amin’ny ranomasina Maty, rehefa avy namakivaky ny faritanin’i Môaba.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rava i Môaba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tonga ny fitsaran’ny Tompo ka mamely ny faritra lembalemba sy ireto tanàna ireto: i Hôlôna sy i Jahatsa sy i Mefahàta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Dibôna sy i Nebao sy i Bèty-Diblataima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Kiriataima sy i Bèty-Gamòla sy i Bèty-Mehôna '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ary i Keriôta sy i Bôtsera. Koa iharan’izany avokoa ny tanàn-dehibe rehetra amin’ny tanin’i Môaba na ny lavitra na ny akaiky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Lefy ny herin’i Môaba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary potika ny fahefàny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitry ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nihevitra ho lehibe noho ny TOMPO i Môaba ka ataovy mamon’ny divainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny fahamamoana mariky ny fitsaràn’Andriamanitra dia jereo 25.15-29.
    marker-yv: yv-n
  - type: text
    text: ' sy mihosina amin’ny loany, ary ho tonga fihomehezana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsarovy, ry Môaba, fa efa nataonao fihomehezana i Israely. Toy ny mpangalatra azo no niheveranao azy, ka mihifikifi-doha maneso ianao isaky ny miresaka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ilaozy ny tanànanareo, ry mponin’i Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitoera eny amin’ny harambato.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ianareo hanahaka ny voromahailala
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manao akany eny am-pitan’ny hantsana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Efa renay ny avonavon’i Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay fatra-piaingitraingitra loatra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa renay ny fireharehany mihoa-pampana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny avonavony amam-piaingitrainginy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fizahozahoan’ny toe-tsainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.29 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 29-33:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Is 16.6-10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: «Fantatro ny fianjonanjony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fibedibediny foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitry ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsinontsinona izay ataony.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Noho izany dia hanao fitarainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’i Môaba aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiantso vonjy ho an’ny fireneny manontolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hitoloko noho ny amin’ny mponin’i Kira-Heresa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny mpaminany no miteny eto fa tsy ny Tompo, dia ny mpaminany izay mirotsaka ho isan’ny Môabita. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Kira-Heresa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': angamba ny renivohitr’i Môaba; ny heviny moa dia hoe tanànan’ny vakin-tavoara.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mihoatra noho ny fitomanian’ny mponina tao Jahizera
- type: usfm
  marker: q1
  children:
  - type: text
    text: no itomaniako anao, ry voly voaloboka any Sibmà,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny sampanao nandadilady
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrany ampitan’ny Ranomasina Maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tafapaka hatrany Jahizera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jahizera: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Is 16.8; dkt hafa «ranomasin’i Jazera».
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kinanjo ilay mpandrava nandripaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fiotazanao sy ny fijinjànao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nitsahatra ny koranam-pifaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy eny an-tanimboaloboka sy teny an-tsahan’i Môaba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy mpanosihosy voaloboka intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noritiko ny divay tao anaty barîka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: foana hatreo ny akoram-pifaliana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Miantso vonjy ny olon’i Hesbôna ka re hatrany Elehale. Eny, re hatrany Jahatsa ny feony; ary ny antso avy ao Tsôhara dia tonga hatrany Hôrônaîma sy Heglata-Selisià, satria ho ritra ihany koa na dia ny ranon’i Nimrima aza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.45 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nimrima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: angamba any an-tendrony atsimon’ny tany Môaba.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: «Hofoanako tsy hisy ao Môaba, hoy ny teny hentitry ny TOMPO, ireo miakatra amin’ny toeram-panasinana hanao sorona sy handoro zava-manitra mifangaro ho an’ny andriamaniny.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Izany no hanaovan’ny foko toloko ho an’i Môaba sy ny olon’i Kira-Heresa, dia toloko miendrika feon-tsodina, satria very ny harena azony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Samy nanety ny volon-dohany sy nanaratra ny volom-bavany avokoa ny lehilahy rehetra, sady nitetitetika ny tanany sy nitafy gony ho fisaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tsy misy afa-tsy hira fitomaniana no re eny an-tampon-trano rehetra ao Môaba sy eny an-kianja.
- type: usfm
  marker: m
  children:
  - type: text
    text: '–«Nopotehiko toy ny fanaka tsy ilaina i Môaba, hoy ny teny hentitry ny TOMPO.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '–Manaova hira fisaonana hoe: «Andray ity hakivian’i Môaba! Henatra moa izao fa niamboho ady izy.» Hanjary fihomehezana sy fampitahorana ho an’ireo firenena rehetra manodidina azy i Môaba.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro toy ny misy voromahery manidina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mikopaka elatra mipaoka an’i Môaba.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Azon’ny fahavalo ireo tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: azony ny toera-mimanda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ireo miaramila maherifon’i Môaba aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manaintaina toy ny vehivavy mihetsi-jaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ringana i Môaba ka tsy ho firenena intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nihevi-tena ho lehibe noho ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: «Fampihorohoroana sy longoa ary fandrika harato
- type: usfm
  marker: q1
  children:
  - type: text
    text: no miandry anareo, ry mponin’i Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitry ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Izay mandositra noho ny fampihorohoroana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho latsaka ao anatin’ny longoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay tafakatra avy ao amin’ny longoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho voan’ny fandrika harato.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no hampihariko amin’i Môaba
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa migadona ny taona hamaliako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitry ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Mitady fialokalofana ao Hesbôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mpandositra efa tena reraka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kinanjo misy afo mipoitra avy ao Hesbôna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, misy lelafo mivoaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy ao an-dapan’ny mpanjakan’i Sihôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.45 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sihôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpanjaka fahiny elabe izay nanjaka tao Hesbôna araka ny Deot 2.26; ampit Nom 21.28.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handevona an’i Môaba tanin’ireo mpitabataba ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny faritra misolampy na ny lembalemba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Loza ity mahazo anao, ry Môaba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Very ianareo, ry vahoakan’i Kemôsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria samy nentina ho babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zanakareo lahy sy ny zanakareo vavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Kanefa indray andro any kosa i Môaba
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola haveriko amin’ny laoniny indray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitry ny TOMPO.»
- type: usfm
  marker: p
  children:
  - type: text
    text: Mifarana eto ny didim-pitsarana momba an’i Môaba.
