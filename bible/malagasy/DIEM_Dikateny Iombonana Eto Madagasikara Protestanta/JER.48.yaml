document_id: JER.48,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Môaba
  - type: text
    content: 'Fanambaràna ny amin’i Môaba. Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely:'
  - type: text
    content: «Loza ity manjo ny tanànan’i Nebao, fa rava!
  - type: text
    content: Ketraka i Kiriataima, fa azo
  - type: note
    content: 'Momba an’i Môaba, jereo Is 15.1 sy nta. –Nebao, Kiriataima (and 1), Madmena (and 2) ets: tanàn-dehibe tany Môaba.'
  - type: text
    content: ':'
  - type: text
    content: ketraka izany tanànamimanda izany, fa mirodana!
  '10':
  - type: text
    content: Ho voaozona anie izay manao tsirambina
  - type: text
    content: ny asa nampanaovin’ny TOMPO azy;
  - type: text
    content: eny, ho voaozona anie izay misakana
  - type: text
    content: ny sabany tsy handatsa-dra!
  - type: heading
    content: '*'
  '11':
  - type: text
    content: «Tsy mba niaina tamin’ahiahy i Môaba
  - type: text
    content: hatry ny fony izy mbola kely,
  - type: text
    content: ary tsy mbola nentina ho babo mihitsy.
  - type: text
    content: Nandry feizay am-pilaminana izy
  - type: text
    content: toy ny divay niotrika hitsihan’ny faikany
  - type: text
    content: ary tsy mbola naidina nafindra siny
  - type: text
    content: ka mitana tsiro sady tsy miova hanitra.
  '12':
  - type: text
    content: 'Noho izany, hoy ny teny hentitry ny TOMPO, tonga ny andro izay handefasako olona mba hamindra siny azy. Hatotongany ho foana ny sinibe fitoeran-divay sady hotorotoroiny. '
  '13':
  - type: text
    content: 'Ho diso fanantenana i Môaba amin’i Kemôsy andriamaniny tahaka ny nahadiso fanantenana an’i '
  - type: text
    content: Israely
  - type: text
    content: ' avaratra tamin’ny andriamanitr’i Betela izay nianteherany.'
  '14':
  - type: text
    content: Ry olon’i Môaba,
  - type: text
    content: 'ahoana no itenenanareo hoe:'
  - type: text
    content: «Lehilahy matanjaka izahay
  - type: text
    content: sady miaramila mahery an’ady»?
  '15':
  - type: text
    content: Mananika ny tanànanareo
  - type: text
    content: ilay mpandrava an’i Môaba,
  - type: text
    content: ka nampidina ho amin’ny famonoana
  - type: text
    content: ireo zatovonareo voafantina.
  - type: text
    content: Izany no teny hentitra ataon’ilay Mpanjaka
  - type: text
    content: Izay antsoina hoe «TOMPOn’izao rehetra izao.»
  '16':
  - type: text
    content: Akaiky ho tonga
  - type: text
    content: ny loza hanjo an’i Môaba,
  - type: text
    content: ary ho avy haingana ny fahoriany.
  '17':
  - type: text
    content: Koa ianareo rehetra mpifanila aminy
  - type: text
    content: sady mahalala ny lazany
  - type: text
    content: 'dia manehoa fiaraha-miory ka manaova hoe:'
  - type: text
    content: «Ahoana no nahapotika ity hery màzana
  - type: text
    content: sy ity fahefàna be voninahitra ity?»
  - type: heading
    content: '*'
  '18':
  - type: text
    content: Ry mponina mahonena ao Dibôna,
  - type: text
    content: midìna avy eo amin’ny toeram-boninahitrareo
  - type: text
    content: ka mitoera ao anaty fako ianareo,
  - type: text
    content: satria miakatra hanafika anareo
  - type: text
    content: ilay mpandrava an’i Môaba
  - type: text
    content: ka mandrodana ny mandanareo.
  '19':
  - type: text
    content: Ry mponina ao Harôhera,
  - type: text
    content: mijoroa eny an-dalambe ka miambena.
  - type: text
    content: Anontanio ireo nandositra
  - type: text
    content: 'sy izay sisa avotra hoe:'
  - type: text
    content: «Inona no zavatra niseho?»
  '2':
  - type: text
    content: Tsy misy intsony ny reharehan’i Môaba!
  - type: text
    content: Hamelezana an’i Hesbôna
  - type: text
    content: 'no nanaovana teti-dratsy hoe:'
  - type: text
    content: «Andeha hofoanantsika
  - type: text
    content: tsy ho firenena intsony izy!»
  - type: text
    content: Ringana koa ianao, ry Madmena,
  - type: text
    content: fa manjohy anao ny ady.
  '20':
  - type: text
    content: –Menatra sy ketraka i Môaba,
  - type: text
    content: hoy ny navalin’ireo,
  - type: text
    content: Manaova antsoantso sy kiakiaka;
  - type: text
    content: ambarao amin’ny faritra amoron’i Arnôna
  - type: note
    content: 'Arnôna: renirano mivarina any amin’ny ranomasina Maty, rehefa avy namakivaky ny faritanin’i Môaba.'
  - type: text
    content: fa rava i Môaba.
  '21':
  - type: text
    content: 'Tonga ny fitsaran’ny Tompo ka mamely ny faritra lembalemba sy ireto tanàna ireto: i Hôlôna sy i Jahatsa sy i Mefahàta, '
  '22':
  - type: text
    content: 'i Dibôna sy i Nebao sy i Bèty-Diblataima, '
  '23':
  - type: text
    content: 'i Kiriataima sy i Bèty-Gamòla sy i Bèty-Mehôna '
  '24':
  - type: text
    content: ary i Keriôta sy i Bôtsera. Koa iharan’izany avokoa ny tanàn-dehibe rehetra amin’ny tanin’i Môaba na ny lavitra na ny akaiky.
  '25':
  - type: text
    content: Lefy ny herin’i Môaba
  - type: text
    content: ary potika ny fahefàny,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  '26':
  - type: text
    content: Nihevitra ho lehibe noho ny TOMPO i Môaba ka ataovy mamon’ny divainy
  - type: note
    content: Momba ny fahamamoana mariky ny fitsaràn’Andriamanitra dia jereo 25.15-29.
  - type: text
    content: ' sy mihosina amin’ny loany, ary ho tonga fihomehezana. '
  '27':
  - type: text
    content: Tsarovy, ry Môaba, fa efa nataonao fihomehezana i Israely. Toy ny mpangalatra azo no niheveranao azy, ka mihifikifi-doha maneso ianao isaky ny miresaka azy.
  '28':
  - type: text
    content: Ilaozy ny tanànanareo, ry mponin’i Môaba,
  - type: text
    content: ka mitoera eny amin’ny harambato.
  - type: text
    content: Aoka ianareo hanahaka ny voromahailala
  - type: text
    content: izay manao akany eny am-pitan’ny hantsana.
  - type: heading
    content: '*'
  '29':
  - type: text
    content: Efa renay ny avonavon’i Môaba,
  - type: text
    content: izay fatra-piaingitraingitra loatra.
  - type: text
    content: Efa renay ny fireharehany mihoa-pampana
  - type: text
    content: sy ny avonavony amam-piaingitrainginy
  - type: text
    content: ary ny fizahozahoan’ny toe-tsainy
  - type: note
    content: 'And 29-33: jereo Is 16.6-10.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Misy feo miantso vonjy avy any Hôrônaîma:'
  - type: text
    content: fandravana sy fandringanana goavana moa izao!
  '30':
  - type: text
    content: «Fantatro ny fianjonanjony
  - type: text
    content: sy ny fibedibediny foana,
  - type: text
    content: hoy ny teny hentitry ny TOMPO;
  - type: text
    content: tsinontsinona izay ataony.»
  '31':
  - type: text
    content: Noho izany dia hanao fitarainana
  - type: text
    content: noho ny amin’i Môaba aho,
  - type: text
    content: ka hiantso vonjy ho an’ny fireneny manontolo
  - type: text
    content: ary hitoloko noho ny amin’ny mponin’i Kira-Heresa
  - type: note
    content: 'Ny mpaminany no miteny eto fa tsy ny Tompo, dia ny mpaminany izay mirotsaka ho isan’ny Môabita. –Kira-Heresa: angamba ny renivohitr’i Môaba; ny heviny moa dia hoe tanànan’ny vakin-tavoara.'
  - type: text
    content: .
  '32':
  - type: text
    content: Mihoatra noho ny fitomanian’ny mponina tao Jahizera
  - type: text
    content: no itomaniako anao, ry voly voaloboka any Sibmà,
  - type: text
    content: fa ny sampanao nandadilady
  - type: text
    content: hatrany ampitan’ny Ranomasina Maty
  - type: text
    content: ka tafapaka hatrany Jahizera
  - type: note
    content: 'Jahizera: jereo Is 16.8; dkt hafa «ranomasin’i Jazera».'
  - type: text
    content: .
  - type: text
    content: Kinanjo ilay mpandrava nandripaka
  - type: text
    content: ny fiotazanao sy ny fijinjànao.
  '33':
  - type: text
    content: Nitsahatra ny koranam-pifaliana
  - type: text
    content: avy eny an-tanimboaloboka sy teny an-tsahan’i Môaba.
  - type: text
    content: Tsy misy mpanosihosy voaloboka intsony
  - type: text
    content: ary noritiko ny divay tao anaty barîka;
  - type: text
    content: foana hatreo ny akoram-pifaliana.
  '34':
  - type: text
    content: Miantso vonjy ny olon’i Hesbôna ka re hatrany Elehale. Eny, re hatrany Jahatsa ny feony; ary ny antso avy ao Tsôhara dia tonga hatrany Hôrônaîma sy Heglata-Selisià, satria ho ritra ihany koa na dia ny ranon’i Nimrima aza
  - type: note
    content: 'Nimrima: angamba any an-tendrony atsimon’ny tany Môaba.'
  - type: text
    content: .
  '35':
  - type: text
    content: «Hofoanako tsy hisy ao Môaba, hoy ny teny hentitry ny TOMPO, ireo miakatra amin’ny toeram-panasinana hanao sorona sy handoro zava-manitra mifangaro ho an’ny andriamaniny.»
  '36':
  - type: text
    content: 'Izany no hanaovan’ny foko toloko ho an’i Môaba sy ny olon’i Kira-Heresa, dia toloko miendrika feon-tsodina, satria very ny harena azony. '
  '37':
  - type: text
    content: 'Samy nanety ny volon-dohany sy nanaratra ny volom-bavany avokoa ny lehilahy rehetra, sady nitetitetika ny tanany sy nitafy gony ho fisaonana. '
  '38':
  - type: text
    content: Tsy misy afa-tsy hira fitomaniana no re eny an-tampon-trano rehetra ao Môaba sy eny an-kianja.
  - type: text
    content: '–«Nopotehiko toy ny fanaka tsy ilaina i Môaba, hoy ny teny hentitry ny TOMPO.» '
  '39':
  - type: text
    content: '–Manaova hira fisaonana hoe: «Andray ity hakivian’i Môaba! Henatra moa izao fa niamboho ady izy.» Hanjary fihomehezana sy fampitahorana ho an’ireo firenena rehetra manodidina azy i Môaba.'
  '4':
  - type: text
    content: Potika i Môaba; ka hatrany Tsôhara
  - type: text
    content: no andrenesana ny antso vonjy ataony
  - type: note
    content: 'hatrany Tsôhara: araka ny dkt grika tranainy sy ny Is 15.5; ny RM kosa manao hoe ireo madinika ao aminy. –Tsôhara: tanàn-dehiben’i Môaba voalaza eo amin’ny and 34; jereo Gen 13.10; heverina ho eo atsimon’ny Ranomasina Maty no misy azy.'
  - type: text
    content: .
  '40':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Indro toy ny misy voromahery manidina
  - type: text
    content: ka mikopaka elatra mipaoka an’i Môaba.»
  '41':
  - type: text
    content: Azon’ny fahavalo ireo tanàna,
  - type: text
    content: azony ny toera-mimanda.
  - type: text
    content: Ary amin’izany andro izany
  - type: text
    content: na dia ireo miaramila maherifon’i Môaba aza,
  - type: text
    content: dia manaintaina toy ny vehivavy mihetsi-jaza.
  '42':
  - type: text
    content: Ringana i Môaba ka tsy ho firenena intsony
  - type: text
    content: satria nihevi-tena ho lehibe noho ny TOMPO.
  '43':
  - type: text
    content: «Fampihorohoroana sy longoa ary fandrika harato
  - type: text
    content: no miandry anareo, ry mponin’i Môaba,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  '44':
  - type: text
    content: Izay mandositra noho ny fampihorohoroana
  - type: text
    content: dia ho latsaka ao anatin’ny longoa;
  - type: text
    content: ary izay tafakatra avy ao amin’ny longoa
  - type: text
    content: dia ho voan’ny fandrika harato.
  - type: text
    content: Izany no hampihariko amin’i Môaba
  - type: text
    content: rehefa migadona ny taona hamaliako azy,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  '45':
  - type: text
    content: Mitady fialokalofana ao Hesbôna
  - type: text
    content: ireo mpandositra efa tena reraka.
  - type: text
    content: Kinanjo misy afo mipoitra avy ao Hesbôna;
  - type: text
    content: eny, misy lelafo mivoaka
  - type: text
    content: avy ao an-dapan’ny mpanjakan’i Sihôna
  - type: note
    content: 'Sihôna: mpanjaka fahiny elabe izay nanjaka tao Hesbôna araka ny Deot 2.26; ampit Nom 21.28.'
  - type: text
    content: ','
  - type: text
    content: ka handevona an’i Môaba tanin’ireo mpitabataba ireo
  - type: text
    content: na ny faritra misolampy na ny lembalemba.
  '46':
  - type: text
    content: Loza ity mahazo anao, ry Môaba!
  - type: text
    content: Very ianareo, ry vahoakan’i Kemôsy,
  - type: text
    content: satria samy nentina ho babo
  - type: text
    content: ny zanakareo lahy sy ny zanakareo vavy.
  '47':
  - type: text
    content: Kanefa indray andro any kosa i Môaba
  - type: text
    content: dia mbola haveriko amin’ny laoniny indray,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.»
  - type: text
    content: Mifarana eto ny didim-pitsarana momba an’i Môaba.
  '5':
  - type: text
    content: Mitomany ny sisa velona
  - type: text
    content: miakatra ny fiakaran’i Lohita.
  - type: text
    content: Re hatrany am-pidinan’i Hôrônaîma
  - type: text
    content: 'ny kiakiaka ateraky ny fandringanana hoe:'
  '6':
  - type: text
    content: «Mandosira, vonjeo ny ainareo;
  - type: text
    content: ary mijanòna any an-taniefitra
  - type: text
    content: toy ny borikidia
  - type: note
    content: 'Toy ny borikidia: araka ny dkt grika izany; fa ny RM kosa manao hoe Harôhera (tanàna môabita).'
  - type: text
    content: ' ianareo.»'
  '7':
  - type: text
    content: Ny zava-bitanao sy ny tahirin-karenao
  - type: text
    content: no nianteheranao, ry Môaba.
  - type: text
    content: Kanjo hay voa koa ianao ity!
  - type: text
    content: Indray lasan-ko babo
  - type: text
    content: i Kemôsy andriamanitrao sy ny mpisorony
  - type: text
    content: ary koa ireo mpitondra anao.
  '8':
  - type: text
    content: Mitety ny tanàna rehetra ireo mpandrava;
  - type: text
    content: ary tsy misy tanàna hidifiany.
  - type: text
    content: Simba avokoa ny lohasaha
  - type: text
    content: ary ripaka ny lembalemba.
  - type: text
    content: Izany no voalazan’ny TOMPO.
  '9':
  - type: text
    content: Anangano fasana i Môaba,
  - type: text
    content: satria ho rava tokoa izy.
  - type: text
    content: Ho lao ireo tanànany,
  - type: text
    content: ka tsy hisy mponina intsony.
