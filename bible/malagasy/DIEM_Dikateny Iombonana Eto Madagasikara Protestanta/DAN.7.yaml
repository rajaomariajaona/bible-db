document_id: DAN.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny fahitana voalohany azon’i Daniela: ireo biby efatra.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona voalohany nanjakan’i Belsatsara tao Babilôna dia nanonofy i Daniela ary nahazo fahitana teo am-pandriany. Nosoratany ny nofy ary notantarainy araka izao manaraka izao:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ony afo no nipoitra sy nikoriana avy teo anatrehany. An-tapitrisa ireo nanompo azy ary an-jato tapitrisa no nitsangana teo anatrehany. Dia nipetraka ireo mpitsara ary nosokafana ny boky
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 5.11; 20.12.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '«Tamin’izay dia mbola nijery ihany aho noho ny fireondreon’ny teny avonavona mihoa-pampana navoakan’ilay tandroka kely; nefa raha mbola nijery aho, dia novonoina ho faty ilay biby fahefatra ka ny tenany dia natsipy sy nolevonina tao anaty afo mahamay aoka izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nesorina tamin’ireo biby hafa ny fanapahany, kanefa nohalavaina ihany ny fahavelomany mandritra ny fotoana voafetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: «Dia mbola nijery ny fahitana azoko tamin’ny alina ihany aho, ka indro nisy tahaka ny zanak’olona tonga teny amin’ny rahon’ny lanitra; ary nankeo amin’ilay Antidahy izy sady nampanakaikezina azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 24.30; 26.64; Mk 13.26; 14.62; Lk 21.27, Apôk 1.7,13; 14.14. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tahaka ny zanak’olona:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ny fiteny aramianina ara-bakiteny «zanak’olona iray» dia fomba fiteny niavian’ny hoe «zanak’olona» ao amin’ny Testamenta Vaovao.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary nomena azy ny fanapahana sy ny voninahitra ary ny fanjakana, mba hanompo azy ny foko sy firenena ary ny samy hafa fiteny rehetra. Ny fanapahany dia haharitra mandrakizay ka tsy hanam-petra, ary ny fanjakany tsy ho rava na oviana na oviana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 11.15.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hevitry ny fahitana voalohany
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: «Izaho Daniela dia nitebiteby hatramin’ny aty fanahiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hatramin’ny aty fanahiko: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy mazava ny teny aramianina ka tsy azo antoka ny dikanteny.
      marker-yv: yv-n
    - type: text
      text: ' fa nampitahotra mafy ahy ny fahitana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nanatona ny anankiray tamin’izay nitsangana teo aho ary nanontany azy ny tena hevitr’ireo rehetra ireo. Koa nambarany tamiko sady nampahafantariny ahy ny dikany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ireo biby efatra lehibe dia mampiseho fanjakana efatra hipoitra avy amin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny momba ireo fanjakana efatra ireo dia jereo ny naoty eo amin’ny 2.40.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Aorian’izany dia ho lasan’ny olo-masin’ny Avo Indrindra ny fanjakana ho fananany mandrakizay mandrakizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 22.5.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia niriko ho fantatra mazava ny amin’ilay biby fahefatra izay hafa noho ny rehetra sady nahatsiravina loatra fa nanana nify vy sy hoho halimo izay nihinanany sy namiravirany, ka ny tongony no nanosihosy izay sisa tsy laniny; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Hitako tamin’ny fahitana tamin’ny alina, fa indro ny rivotra avy amin’ny vazan-tany efatra nibosesika hampisamboaravoara ny ranomasina midadasika. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'niriko ho fantatra mazava ny amin’ireo tandroka folo teo an-dohany sy ilay tandroka iray izay nipoitra ka nampianjera ny telo teo anoloany; io tandroka io dia nanana maso sy nanana vava niteny avonavona mihoa-pampana ary ny fijery azy dia lehibe noho ny namany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mbola nijery ihany aho, ary hitako nanoto ny vahoakan’Andriamanitra io tandroka io ka nandresy azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 13.7.
      marker-yv: yv-n
    - type: text
      text: ', '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ambara-piavin’ilay Antidahy ka nanomezany rariny an’ilay vahoakan’ny Avo Indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'rariny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fahefà-mitsara.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Jereo Apôk 20.4.'
      marker-yv: yv-n
    - type: text
      text: . Rehefa tonga ny fotoanandro, dia ho azon’io vahoaka io ny fanjakana.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izao no nambarany: «Ny biby fahefatra dia fanjakana fahefatra eto an-tany izay hafa noho ireo fanjakana rehetra, fa hihinana ny tany tontolo izy ka hanosihosy sady hanorotoro azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary ny tandroka folo dia mampiseho mpanjaka folo izay hifandimby hifehy io fanjakana io; ary hisy mpanjaka iray hafa noho ireo teo alohany hitsangana manaraka an’ireo, rehefa avy handresy mpanjaka telo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jereo Apôk 17.12. Ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpanjaka folo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ireo dia mety ho ireo mpanjaka folo voalohany tao amin’ny fanjakana seleosida.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hilaza teny manohitra ny Avo Indrindra izy, hampahory ny vahoakan’ilay Avo Indrindra sady mihevitra hanova ny fankalazana sy ny lalàna; ary hatolotra eny an-tanany nandritra ny telo taona sy tapany io vahoakan’Andriamanitra io
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 12.7; Apôk 12.14; 13.5-6. Ny mpanjaka faha-11 (and 14) dia mety ho Antiôkôsa Epifàna (175-164 tal J.K.) izay nanenjika fatratra ny Jiosy, ka nandrara hatramin’ny fankalazana ny sabata* sy ny fety isan-karazany voarakitra tao amin’ny Kalendary jiosy. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'telo taona sy tapany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ny aramianina dia maneho io fe-potoana amin’ny fomba manjavozavo ihany amin’ny filazana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fotoana iray, fotoana roa, ary antsasa-potoana.
      marker-yv: yv-n
    - type: text
      text: 'ireo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Avy eo dia ho avy ny fitsarana any an-koatra ka hesorina amin’io biby io ny fiandrianany izay horavana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny fiandrianany izay horavana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny fiandrianany, ary ny tenany mihitsy no horavana.
      marker-yv: yv-n
    - type: text
      text: 'sy holevonina hatramin’ny farany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny fahefà-manjaka sy ny fiandrianana ary ny fahalehibiazan’ny fanjakana rehetra eny ambanin’ny lanitra dia homena ny vahoakan’ilay Andriamanitra Avo Indrindra; ka ny fahefà-manjakan’io vahoaka io dia haharitra mandrakizay ary ny fiandrianana rehetra dia hanompo sy hankato azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 20.4; 22.5.
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: «Mifarana eo ilay tantara. Fa ny amiko Daniela kosa dia nampitebiteby mafy ahy ny eritreritro ka nivaloarika ny tarehiko; nefa notehiriziko tao am-poko izany zavatra izany.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nisy biby efatra lehibe samy hafa niakatra avy tao amin’ny ranomasina.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 13.1; 17.8.
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny voalohany dia tahaka ny liona ary nanana elatry ny voromahery; saingy raha mbola nijery aho dia nesorina taminy ny elany, ary ningaina avy amin’ny tany izy ka nitsangana tamin’ny tongony tahaka ny olona, sady nomena fisainan’olombelona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary indro ny biby hafa faharoa mitovy amin’ny orsa, miainga ny ila-tenany, misy taolan-tehezana telo teo am-bavany tanelanelan’ny nifiny; dia nilazana izy hoe: «Mitsangàna ka mihinàna nofo be dia be.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Taorian’izany dia mbola nijery aho, ka indro nisy iray hafa koa tahaka ny leôparda, nanana ela-borona efatra tao an-damosiny. Nanana loha efatra ilay biby sady nomena azy ny fanapahana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and 4-6: jereo Apôk 13.2.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Taorian’izany dia mbola nijery ny fahitako tamin’ny alina ihany aho ka indro nisy biby fahefatra mahatahotra sy mahatsiravina sady matanjaka aoka izany. Nanana nify vy lehibe izay nihinanany sy namiravirany izy, fa izay sisa tsy laniny dia nohoseny; ary hafa noho ireo biby rehetra teo alohany izy fa nanana tandroka folo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 12.3; 13.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Raha mbola nandinika ireo tandrony aho, indro nisy tandroka kely hafa nipoitra teo anivon’ireo ka nahongotra ireo tandroka telo teo anoloany; io tandroka io dia nanana maso roa toy ny mason’olona sy nanana vava miteny avonavona mihoa-pampana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 13.5-6.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitsaran’Andriamanitra.
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: «Mbola nijery ihany aho, ka indreo nisy sezafiandrianana napetraka; ary nisy Antidahy iray tonga nipetraka. Ny fitafiany dia fotsy tahaka ny oram-panala; ny volon-dohany dia tahaka ny volon’ondry madio; ny sezafiandrianany dia lelafo; ary ny kodiarany dia afo mivaivay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny voambolana aramianina izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Antidahy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto dia enti-manondro an’Andriamanitra izay tsy manam-piandohana na fiafarana ny fisiany. Ny fahelan’ny taonany dia tsy inona akory fa enti-maneho ny fahendreny. –Jereo Apôk 1.14; 20.4.'
      marker-yv: yv-n
    - type: text
      text: '. '
