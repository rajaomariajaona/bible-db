document_id: DAN.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana voalohany azon’i Daniela: ireo biby efatra.'
  - type: text
    content: 'Tamin’ny taona voalohany nanjakan’i Belsatsara tao Babilôna dia nanonofy i Daniela ary nahazo fahitana teo am-pandriany. Nosoratany ny nofy ary notantarainy araka izao manaraka izao:'
  '10':
  - type: text
    content: Ony afo no nipoitra sy nikoriana avy teo anatrehany. An-tapitrisa ireo nanompo azy ary an-jato tapitrisa no nitsangana teo anatrehany. Dia nipetraka ireo mpitsara ary nosokafana ny boky
  - type: note
    content: Jereo Apôk 5.11; 20.12.
  - type: text
    content: .
  '11':
  - type: text
    content: '«Tamin’izay dia mbola nijery ihany aho noho ny fireondreon’ny teny avonavona mihoa-pampana navoakan’ilay tandroka kely; nefa raha mbola nijery aho, dia novonoina ho faty ilay biby fahefatra ka ny tenany dia natsipy sy nolevonina tao anaty afo mahamay aoka izany. '
  '12':
  - type: text
    content: Nesorina tamin’ireo biby hafa ny fanapahany, kanefa nohalavaina ihany ny fahavelomany mandritra ny fotoana voafetra.
  '13':
  - type: text
    content: «Dia mbola nijery ny fahitana azoko tamin’ny alina ihany aho, ka indro nisy tahaka ny zanak’olona tonga teny amin’ny rahon’ny lanitra; ary nankeo amin’ilay Antidahy izy sady nampanakaikezina azy
  - type: note
    content: 'Jereo Mt 24.30; 26.64; Mk 13.26; 14.62; Lk 21.27, Apôk 1.7,13; 14.14. –tahaka ny zanak’olona: ny fiteny aramianina ara-bakiteny «zanak’olona iray» dia fomba fiteny niavian’ny hoe «zanak’olona» ao amin’ny Testamenta Vaovao.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Ary nomena azy ny fanapahana sy ny voninahitra ary ny fanjakana, mba hanompo azy ny foko sy firenena ary ny samy hafa fiteny rehetra. Ny fanapahany dia haharitra mandrakizay ka tsy hanam-petra, ary ny fanjakany tsy ho rava na oviana na oviana.
  - type: note
    content: Jereo Apôk 11.15.
  - type: heading
    content: Ny hevitry ny fahitana voalohany
  '15':
  - type: text
    content: «Izaho Daniela dia nitebiteby hatramin’ny aty fanahiko
  - type: note
    content: 'hatramin’ny aty fanahiko: tsy mazava ny teny aramianina ka tsy azo antoka ny dikanteny.'
  - type: text
    content: ' fa nampitahotra mafy ahy ny fahitana. '
  '16':
  - type: text
    content: 'Dia nanatona ny anankiray tamin’izay nitsangana teo aho ary nanontany azy ny tena hevitr’ireo rehetra ireo. Koa nambarany tamiko sady nampahafantariny ahy ny dikany. '
  '17':
  - type: text
    content: Ireo biby efatra lehibe dia mampiseho fanjakana efatra hipoitra avy amin’ny tany
  - type: note
    content: Ny momba ireo fanjakana efatra ireo dia jereo ny naoty eo amin’ny 2.40.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Aorian’izany dia ho lasan’ny olo-masin’ny Avo Indrindra ny fanjakana ho fananany mandrakizay mandrakizay
  - type: note
    content: Jereo Apôk 22.5.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Dia niriko ho fantatra mazava ny amin’ilay biby fahefatra izay hafa noho ny rehetra sady nahatsiravina loatra fa nanana nify vy sy hoho halimo izay nihinanany sy namiravirany, ka ny tongony no nanosihosy izay sisa tsy laniny; '
  '2':
  - type: text
    content: '«Hitako tamin’ny fahitana tamin’ny alina, fa indro ny rivotra avy amin’ny vazan-tany efatra nibosesika hampisamboaravoara ny ranomasina midadasika. '
  '20':
  - type: text
    content: 'niriko ho fantatra mazava ny amin’ireo tandroka folo teo an-dohany sy ilay tandroka iray izay nipoitra ka nampianjera ny telo teo anoloany; io tandroka io dia nanana maso sy nanana vava niteny avonavona mihoa-pampana ary ny fijery azy dia lehibe noho ny namany. '
  '21':
  - type: text
    content: Mbola nijery ihany aho, ary hitako nanoto ny vahoakan’Andriamanitra io tandroka io ka nandresy azy
  - type: note
    content: Jereo Apôk 13.7.
  - type: text
    content: ', '
  '22':
  - type: text
    content: ambara-piavin’ilay Antidahy ka nanomezany rariny an’ilay vahoakan’ny Avo Indrindra
  - type: note
    content: 'rariny: dkt hafa fahefà-mitsara. Jereo Apôk 20.4.'
  - type: text
    content: . Rehefa tonga ny fotoanandro, dia ho azon’io vahoaka io ny fanjakana.
  '23':
  - type: text
    content: 'Izao no nambarany: «Ny biby fahefatra dia fanjakana fahefatra eto an-tany izay hafa noho ireo fanjakana rehetra, fa hihinana ny tany tontolo izy ka hanosihosy sady hanorotoro azy. '
  '24':
  - type: text
    content: Ary ny tandroka folo dia mampiseho mpanjaka folo izay hifandimby hifehy io fanjakana io; ary hisy mpanjaka iray hafa noho ireo teo alohany hitsangana manaraka an’ireo, rehefa avy handresy mpanjaka telo
  - type: note
    content: Jereo Apôk 17.12. Ireo mpanjaka folo ireo dia mety ho ireo mpanjaka folo voalohany tao amin’ny fanjakana seleosida.
  - type: text
    content: '. '
  '25':
  - type: text
    content: Hilaza teny manohitra ny Avo Indrindra izy, hampahory ny vahoakan’ilay Avo Indrindra sady mihevitra hanova ny fankalazana sy ny lalàna; ary hatolotra eny an-tanany nandritra ny telo taona sy tapany io vahoakan’Andriamanitra io
  - type: note
    content: 'Jereo 12.7; Apôk 12.14; 13.5-6. Ny mpanjaka faha-11 (and 14) dia mety ho Antiôkôsa Epifàna (175-164 tal J.K.) izay nanenjika fatratra ny Jiosy, ka nandrara hatramin’ny fankalazana ny sabata* sy ny fety isan-karazany voarakitra tao amin’ny Kalendary jiosy. –telo taona sy tapany: ny aramianina dia maneho io fe-potoana amin’ny fomba manjavozavo ihany amin’ny filazana hoe fotoana iray, fotoana roa, ary antsasa-potoana.'
  - type: text
    content: 'ireo. '
  '26':
  - type: text
    content: Avy eo dia ho avy ny fitsarana any an-koatra ka hesorina amin’io biby io ny fiandrianany izay horavana
  - type: note
    content: 'ny fiandrianany izay horavana: dkt hafa ny fiandrianany, ary ny tenany mihitsy no horavana.'
  - type: text
    content: 'sy holevonina hatramin’ny farany. '
  '27':
  - type: text
    content: Ny fahefà-manjaka sy ny fiandrianana ary ny fahalehibiazan’ny fanjakana rehetra eny ambanin’ny lanitra dia homena ny vahoakan’ilay Andriamanitra Avo Indrindra; ka ny fahefà-manjakan’io vahoaka io dia haharitra mandrakizay ary ny fiandrianana rehetra dia hanompo sy hankato azy
  - type: note
    content: Jereo Apôk 20.4; 22.5.
  - type: text
    content: .
  '28':
  - type: text
    content: «Mifarana eo ilay tantara. Fa ny amiko Daniela kosa dia nampitebiteby mafy ahy ny eritreritro ka nivaloarika ny tarehiko; nefa notehiriziko tao am-poko izany zavatra izany.»
  '3':
  - type: text
    content: Ary nisy biby efatra lehibe samy hafa niakatra avy tao amin’ny ranomasina.
  - type: note
    content: Jereo Apôk 13.1; 17.8.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Ny voalohany dia tahaka ny liona ary nanana elatry ny voromahery; saingy raha mbola nijery aho dia nesorina taminy ny elany, ary ningaina avy amin’ny tany izy ka nitsangana tamin’ny tongony tahaka ny olona, sady nomena fisainan’olombelona. '
  '5':
  - type: text
    content: 'Ary indro ny biby hafa faharoa mitovy amin’ny orsa, miainga ny ila-tenany, misy taolan-tehezana telo teo am-bavany tanelanelan’ny nifiny; dia nilazana izy hoe: «Mitsangàna ka mihinàna nofo be dia be.» '
  '6':
  - type: text
    content: Taorian’izany dia mbola nijery aho, ka indro nisy iray hafa koa tahaka ny leôparda, nanana ela-borona efatra tao an-damosiny. Nanana loha efatra ilay biby sady nomena azy ny fanapahana
  - type: note
    content: 'and 4-6: jereo Apôk 13.2.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Taorian’izany dia mbola nijery ny fahitako tamin’ny alina ihany aho ka indro nisy biby fahefatra mahatahotra sy mahatsiravina sady matanjaka aoka izany. Nanana nify vy lehibe izay nihinanany sy namiravirany izy, fa izay sisa tsy laniny dia nohoseny; ary hafa noho ireo biby rehetra teo alohany izy fa nanana tandroka folo
  - type: note
    content: Jereo Apôk 12.3; 13.1.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Raha mbola nandinika ireo tandrony aho, indro nisy tandroka kely hafa nipoitra teo anivon’ireo ka nahongotra ireo tandroka telo teo anoloany; io tandroka io dia nanana maso roa toy ny mason’olona sy nanana vava miteny avonavona mihoa-pampana
  - type: note
    content: Jereo Apôk 13.5-6.
  - type: text
    content: .
  - type: heading
    content: Ny fitsaran’Andriamanitra.
  '9':
  - type: text
    content: «Mbola nijery ihany aho, ka indreo nisy sezafiandrianana napetraka; ary nisy Antidahy iray tonga nipetraka. Ny fitafiany dia fotsy tahaka ny oram-panala; ny volon-dohany dia tahaka ny volon’ondry madio; ny sezafiandrianany dia lelafo; ary ny kodiarany dia afo mivaivay
  - type: note
    content: Ny voambolana aramianina izay nadika hoe Antidahy eto dia enti-manondro an’Andriamanitra izay tsy manam-piandohana na fiafarana ny fisiany. Ny fahelan’ny taonany dia tsy inona akory fa enti-maneho ny fahendreny. –Jereo Apôk 1.14; 20.4.
  - type: text
    content: '. '
