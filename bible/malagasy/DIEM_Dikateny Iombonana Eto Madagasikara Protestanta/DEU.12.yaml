document_id: DEU.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: NY LALÀNAN’NY TOMPO
  - type: text
    content: Ireto no lalàna amam-pitsipika izay himasoanareo hotanterahina any amin’ny tany izay homen’ny TOMPO, Andriamanitry ny razambenareo, ho fanananareo; amin’ny andro rehetra hiainanareo eto an-tany no himasoanareo hotanterahina ireo lalàna amam-pitsipika ireo.
  - type: heading
    content: Foibe tokana ho an’ny fanompoam-pivavahana
  '10':
  - type: text
    content: 'Fa rehefa tafita an’i Jôrdàna ianareo ka honina any amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo, dia homeny fitsaharana ianareo ka tsy hisotasotan’ny fahavalo manodidina anareo fa handry feizay. '
  '11':
  - type: text
    content: 'Amin’izay, ilay toerana hofidin’ny TOMPO Andriamanitrareo hipetrahan’ny voninahiny no hitondranareo ny zavatra rehetra nandidiako anareo: dia ny sorona dorana manontolo sy ny sorom-pihavanana ataonareo, ny fahafolon-karenareo, ny fitia tsy mba hetra foinareo, ny zavatra rehetra voafantinareo mba hanalana ny voadinareo tamin’ny TOMPO. '
  '12':
  - type: text
    content: 'Dia hifaly eo anoloan’ny Toeramasin’ilay TOMPO Andriamanitrareo ianareo mbamin’ny zanakareo sy ny mpanomponareo ary koa ny '
  - type: text
    content: Levita
  - type: text
    content: ' izay ao an-tanànanareo, satria tsy mba manana zaratany na anjara miaraka aminareo ny Levita'
  - type: note
    content: Jereo 10.8-9; Nom 18.20, 23.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Mitandrema mba tsy hanolotra sorona dorana manontolo eny amin’ny toeram-pivavahana rehetra hitanareo; '
  '14':
  - type: text
    content: 'fa ilay toerana nofidin’ny TOMPO amin’ny fokonareo anankiray ihany no hanoloranareo ireny, sady hanaovanareo koa ny zavatra rehetra nandidiako anareo. '
  '15':
  - type: text
    content: 'Kanefa, eny amin’ny tanàna rehetra onenanareo, dia mahazo mamono biby amin’izay fotoana tianareo ianareo sy mihinana ny henany, arakaraka ny fitahiana nomen’ny TOMPO anareo; na ny olona '
  - type: text
    content: maloto
  - type: text
    content: ' ara-pivavahana na ny '
  - type: text
    content: madio
  - type: text
    content: ', dia samy mahazo mihinana amin’izany, tahaka ny ahazoany mihinana gazela sy ombimanga'
  - type: note
    content: Ny biby azo tamin’ny haza dia azo hanina malalaka, tsy voafehin’ny fepetra momba ireo biby atolotra ho sorona.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Saingy ny ran’ilay biby no aza haninareo
  - type: note
    content: Jereo 15.23; Gen 9.4; Lev 7.26-27; 17.10-14.
  - type: text
    content: ', fa araraho amin’ny tany toy ny rano.'
  '17':
  - type: text
    content: 'Tsy azonareo hanina ao an-tanànanareo ny ampahafolon’ny vary sy divay ary menaka novokarinareo, ny voalohan-teraky ny omby sy ondry aman’osinareo, ny zavatra rehetra nataonareo voady, ny fanati-tsitraponareo ary ny fitia tsy mba hetra foinareo. '
  '18':
  - type: text
    content: 'Fa eo anoloan’ny Toeramasina, ao amin’ny faritra nofidian’ilay TOMPO Andriamanitrareo, no hihinana izany ianareo mbamin’ny zanakareo sy ny mpanomponareo ary koa ny Levita izay ao an-tanànanareo; eny, hifaly eo anoloan’ny Toeramasin’ilay TOMPO Andriamanitrareo ianareo amin’izay fiharian-karena rehetra nataonareo. '
  '19':
  - type: text
    content: Mitandrema mba tsy hanao tsirambina ny Levita ianareo amin’ny andro rehetra hiainanareo amin’ny taninareo.
  '2':
  - type: text
    content: 'Hopotehinareo mihitsy ny toerana fanompoan-tsampy rehetra eny an-tendrombohitra sy eny an-tampon-kavoana ary eny am-bodihazo maitso rehetra eny; amin’ireny toerana ireny manko ireo firenena horoahinareo no manompo ny andriamaniny. '
  '20':
  - type: text
    content: 'Rehefa hitarin’ny TOMPO Andriamanitrareo ny faritaninareo araka ny nampanantenainy taminareo, raha maniry mafy hihinan-kena ianareo, dia mahazo mihinana araka izay tianareo. '
  '21':
  - type: text
    content: 'Raha lavitra anareo loatra ny toerana hofidin’ny TOMPO Andriamanitrareo hipetrahan’ny voninahiny, dia azonareo amonoana ny omby sy ondry aman’osy nomen’ny TOMPO anareo, araka izay efa nandidiako anareo, ary hohaninareo ao an-tanànanareo araka izay tianareo izany. '
  '22':
  - type: text
    content: 'Eny, tahaka ny ahazoana mihinana gazela sy ombimanga no hahazoanareo mihinana amin’izany; na ny olona maloto ara-pivavahana na madio, dia samy mahazo mihinana azy. '
  '23':
  - type: text
    content: Kanefa tandremo mafy mba tsy hohaninareo ny ran’ilay biby, fa ny ra no aina
  - type: note
    content: Jereo Lev 17.10-14.
  - type: text
    content: '; ary tsy azonareo hanina ny aina amin’ny tena. '
  '24':
  - type: text
    content: 'Aza haninareo ny rany fa araraho amin’ny tany toy ny rano. '
  '25':
  - type: text
    content: Eny, aza haninareo izany mba ho sambatra ianareo sy ny taranaka amam-paranareo, satria izay mahitsy eo imason’ny TOMPO no hataonareo.
  '26':
  - type: text
    content: 'Kanefa ny zava-masinareo sy ny zavatra nataonareo voady dia ento mankany amin’ny toerana hofidin’ny TOMPO. '
  '27':
  - type: text
    content: 'Raha sorona dorana manontolo izany, dia atolory eo amin’ny alitaran’ilay TOMPO Andriamanitrareo ny henany sy ny rany; raha sorom-pihavanana kosa izany, dia araraho eo amin’ny alitaran’ilay TOMPO Andriamanitrareo ny rany, fa ny henany hohaninareo. '
  '28':
  - type: text
    content: Henoy sy tandremo ireo didy rehetra izay ampitaiko aminareo ireo, mba ho sambatra lalandava ianareo sy ny taranaka amam-paranareo, satria izay tsara sy mahitsy eo imason’ny TOMPO Andriamanitrareo no hotanterahinareo.
  - type: heading
    content: Teny mamely an’ireo andriamanitra kanahanîta
  '29':
  - type: text
    content: 'Rahatrizay ny TOMPO Andriamanitrareo dia handringana eo anoloanareo ireny firenena natao horesenareo any amin’ny tany izay hidiranareo ireny; handresy azy ianareo ary honina eo amin’ny taniny. '
  '3':
  - type: text
    content: 'Dia horavanareo ny '
  - type: text
    content: alitarany
  - type: text
    content: ', hovakivakînareo ny tsangambaton-tsampiny, hodoranareo ny tsato-kazo fanajany an’i '
  - type: text
    content: Aserà
  - type: text
    content: ', ary hokapainareo ny sarin-tsampy voasokitra izay andriamaniny; ka hofoananareo ny fahatsiarovana ireny andriamanitra sampy ireny eo amin’izany toerana izany'
  - type: note
    content: Jereo 7.5.
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Rehefa voaringana eo anoloanareo ireny, dia mitandrema fandrao ho voafandrika hanaraka ny fanaony ianareo; mitandrema fandrao hamotopototra ny amin’ny andriamaniny ianareo sy hanontany izay fomba nanompoany azy mba hanaovanareo toy izany koa. '
  '31':
  - type: text
    content: Aza anaovanareo fomba toy izany ilay TOMPO Andriamanitrareo, satria zavatra mahatsiravina sy halan’ny TOMPO no nataon-dry zareo tamin’ny andriamaniny fa hatramin’ny zanany lahy sy vavy aza dia nodorany forehitra tao anaty afo hanajana ny andriamaniny!
  '4':
  - type: text
    content: 'Aza anaovanareo fomba toy ireny ny TOMPO Andriamanitrareo; '
  '5':
  - type: text
    content: 'satria ilay toerana hofidiny eo amin’ny fokonareo rehetra mba honenany sy hipetrahan’ny voninahiny no hitadiavanareo Azy, ao ihany no halehanareo. '
  '6':
  - type: text
    content: 'Ao no hitondranareo ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy ny sorom-pihavanana ataonareo, ny fahafolon-karenareo, ny fitia tsy mba hetra foinareo, ny fanalàm-'
  - type: text
    content: boadinareo
  - type: text
    content: ', ny fanati-tsitraponareo, ary ny voalohan-teraky ny omby sy ondry aman’osinareo. '
  '7':
  - type: text
    content: 'Ao ianareo sy ny ankohonanareo no hanao sakafo sy hifaly eo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: ’ilay TOMPO Andriamanitrareo noho ny fiharian-karena rehetra nitahiany anareo.
  '8':
  - type: text
    content: 'Aza anaovanareo fomba toy izao ataontsika ankehitriny izao ny TOMPO, ka ny tsirairay no samy manao izay heveriny ho mety. '
  '9':
  - type: text
    content: 'Ianareo manko tsy mbola tonga any amin’ny toeram-pitsaharana, izay omen’ny TOMPO Andriamanitrareo ho fanananareo. '
