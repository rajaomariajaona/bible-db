document_id: DEU.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: NY LALÀNAN’NY TOMPO
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ireto no lalàna amam-pitsipika izay himasoanareo hotanterahina any amin’ny tany izay homen’ny TOMPO, Andriamanitry ny razambenareo, ho fanananareo; amin’ny andro rehetra hiainanareo eto an-tany no himasoanareo hotanterahina ireo lalàna amam-pitsipika ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Foibe tokana ho an’ny fanompoam-pivavahana
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa rehefa tafita an’i Jôrdàna ianareo ka honina any amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo, dia homeny fitsaharana ianareo ka tsy hisotasotan’ny fahavalo manodidina anareo fa handry feizay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Amin’izay, ilay toerana hofidin’ny TOMPO Andriamanitrareo hipetrahan’ny voninahiny no hitondranareo ny zavatra rehetra nandidiako anareo: dia ny sorona dorana manontolo sy ny sorom-pihavanana ataonareo, ny fahafolon-karenareo, ny fitia tsy mba hetra foinareo, ny zavatra rehetra voafantinareo mba hanalana ny voadinareo tamin’ny TOMPO. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hifaly eo anoloan’ny Toeramasin’ilay TOMPO Andriamanitrareo ianareo mbamin’ny zanakareo sy ny mpanomponareo ary koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Levita
    - type: text
      text: ' izay ao an-tanànanareo, satria tsy mba manana zaratany na anjara miaraka aminareo ny Levita'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 10.8-9; Nom 18.20, 23.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mitandrema mba tsy hanolotra sorona dorana manontolo eny amin’ny toeram-pivavahana rehetra hitanareo; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa ilay toerana nofidin’ny TOMPO amin’ny fokonareo anankiray ihany no hanoloranareo ireny, sady hanaovanareo koa ny zavatra rehetra nandidiako anareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Kanefa, eny amin’ny tanàna rehetra onenanareo, dia mahazo mamono biby amin’izay fotoana tianareo ianareo sy mihinana ny henany, arakaraka ny fitahiana nomen’ny TOMPO anareo; na ny olona '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' ara-pivavahana na ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ', dia samy mahazo mihinana amin’izany, tahaka ny ahazoany mihinana gazela sy ombimanga'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny biby azo tamin’ny haza dia azo hanina malalaka, tsy voafehin’ny fepetra momba ireo biby atolotra ho sorona.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Saingy ny ran’ilay biby no aza haninareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 15.23; Gen 9.4; Lev 7.26-27; 17.10-14.
      marker-yv: yv-n
    - type: text
      text: ', fa araraho amin’ny tany toy ny rano.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tsy azonareo hanina ao an-tanànanareo ny ampahafolon’ny vary sy divay ary menaka novokarinareo, ny voalohan-teraky ny omby sy ondry aman’osinareo, ny zavatra rehetra nataonareo voady, ny fanati-tsitraponareo ary ny fitia tsy mba hetra foinareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa eo anoloan’ny Toeramasina, ao amin’ny faritra nofidian’ilay TOMPO Andriamanitrareo, no hihinana izany ianareo mbamin’ny zanakareo sy ny mpanomponareo ary koa ny Levita izay ao an-tanànanareo; eny, hifaly eo anoloan’ny Toeramasin’ilay TOMPO Andriamanitrareo ianareo amin’izay fiharian-karena rehetra nataonareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mitandrema mba tsy hanao tsirambina ny Levita ianareo amin’ny andro rehetra hiainanareo amin’ny taninareo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hopotehinareo mihitsy ny toerana fanompoan-tsampy rehetra eny an-tendrombohitra sy eny an-tampon-kavoana ary eny am-bodihazo maitso rehetra eny; amin’ireny toerana ireny manko ireo firenena horoahinareo no manompo ny andriamaniny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Rehefa hitarin’ny TOMPO Andriamanitrareo ny faritaninareo araka ny nampanantenainy taminareo, raha maniry mafy hihinan-kena ianareo, dia mahazo mihinana araka izay tianareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Raha lavitra anareo loatra ny toerana hofidin’ny TOMPO Andriamanitrareo hipetrahan’ny voninahiny, dia azonareo amonoana ny omby sy ondry aman’osy nomen’ny TOMPO anareo, araka izay efa nandidiako anareo, ary hohaninareo ao an-tanànanareo araka izay tianareo izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Eny, tahaka ny ahazoana mihinana gazela sy ombimanga no hahazoanareo mihinana amin’izany; na ny olona maloto ara-pivavahana na madio, dia samy mahazo mihinana azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Kanefa tandremo mafy mba tsy hohaninareo ny ran’ilay biby, fa ny ra no aina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 17.10-14.
      marker-yv: yv-n
    - type: text
      text: '; ary tsy azonareo hanina ny aina amin’ny tena. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Aza haninareo ny rany fa araraho amin’ny tany toy ny rano. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Eny, aza haninareo izany mba ho sambatra ianareo sy ny taranaka amam-paranareo, satria izay mahitsy eo imason’ny TOMPO no hataonareo.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Kanefa ny zava-masinareo sy ny zavatra nataonareo voady dia ento mankany amin’ny toerana hofidin’ny TOMPO. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Raha sorona dorana manontolo izany, dia atolory eo amin’ny alitaran’ilay TOMPO Andriamanitrareo ny henany sy ny rany; raha sorom-pihavanana kosa izany, dia araraho eo amin’ny alitaran’ilay TOMPO Andriamanitrareo ny rany, fa ny henany hohaninareo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Henoy sy tandremo ireo didy rehetra izay ampitaiko aminareo ireo, mba ho sambatra lalandava ianareo sy ny taranaka amam-paranareo, satria izay tsara sy mahitsy eo imason’ny TOMPO Andriamanitrareo no hotanterahinareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teny mamely an’ireo andriamanitra kanahanîta
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Rahatrizay ny TOMPO Andriamanitrareo dia handringana eo anoloanareo ireny firenena natao horesenareo any amin’ny tany izay hidiranareo ireny; handresy azy ianareo ary honina eo amin’ny taniny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia horavanareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitarany
    - type: text
      text: ', hovakivakînareo ny tsangambaton-tsampiny, hodoranareo ny tsato-kazo fanajany an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserà
    - type: text
      text: ', ary hokapainareo ny sarin-tsampy voasokitra izay andriamaniny; ka hofoananareo ny fahatsiarovana ireny andriamanitra sampy ireny eo amin’izany toerana izany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 7.5.
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Rehefa voaringana eo anoloanareo ireny, dia mitandrema fandrao ho voafandrika hanaraka ny fanaony ianareo; mitandrema fandrao hamotopototra ny amin’ny andriamaniny ianareo sy hanontany izay fomba nanompoany azy mba hanaovanareo toy izany koa. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Aza anaovanareo fomba toy izany ilay TOMPO Andriamanitrareo, satria zavatra mahatsiravina sy halan’ny TOMPO no nataon-dry zareo tamin’ny andriamaniny fa hatramin’ny zanany lahy sy vavy aza dia nodorany forehitra tao anaty afo hanajana ny andriamaniny!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aza anaovanareo fomba toy ireny ny TOMPO Andriamanitrareo; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'satria ilay toerana hofidiny eo amin’ny fokonareo rehetra mba honenany sy hipetrahan’ny voninahiny no hitadiavanareo Azy, ao ihany no halehanareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ao no hitondranareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy ny sorom-pihavanana ataonareo, ny fahafolon-karenareo, ny fitia tsy mba hetra foinareo, ny fanalàm-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: boadinareo
    - type: text
      text: ', ny fanati-tsitraponareo, ary ny voalohan-teraky ny omby sy ondry aman’osinareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ao ianareo sy ny ankohonanareo no hanao sakafo sy hifaly eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin
    - type: text
      text: ’ilay TOMPO Andriamanitrareo noho ny fiharian-karena rehetra nitahiany anareo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aza anaovanareo fomba toy izao ataontsika ankehitriny izao ny TOMPO, ka ny tsirairay no samy manao izay heveriny ho mety. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ianareo manko tsy mbola tonga any amin’ny toeram-pitsaharana, izay omen’ny TOMPO Andriamanitrareo ho fanananareo. '
