document_id: NUM.22
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: I ISRAELY TAO AMIN’NY LEMAK’I MÔABA
  marker-yv: yv-h
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'Ny tantaran’i Balahama:'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny antson’i Balàka mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niainga indray ny Israelita ka nitoby tao amin’ny lemak’i Môaba, teo an-dafy atsinanan’i Jôrdàna tandrifin’i Jerikao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: 'I Balàka, zanakalahin’i Tsipôra, no mpanjakan’i Môaba tamin’izay fotoana izay. Fantany tsara izay rehetra nataon’ny Israelita tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: '; ka raiki-tahotra mafy izy sy ny Môabita sady nangorohoro nahita ny Israelita izay vahoaka marobe. Dia hoy ity mpanjaka tamin’ny loholon’ny Midîanîta:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ankehitriny ireto vahoaka marobe ireto dia hanimba ny faritra rehetra manodidina antsika, toy ny firaokan’ny omby ny ahitra eny an-tsaha!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia naniraka olona i Balàka hankany amin’i Balahama zanakalahin’i Behôra any Petôra amoron’ny ony Eofrata, any amin’ny tanin’ny Hamavita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Balahama: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2Pt 2.15-16; Joda 11. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Petôra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toerana tsy fantatra, mety ho any avaratr’i Siria ankehitriny. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny Hamavita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mponina tao Siria avaratra fahizany.'
    marker-yv: yv-n
  - type: text
    text: '; ka izao no teny nampitondrainy ho an’i Balahama: «Misy vahoaka niala tany Ejipta tonga eto amiko, ary mandrakotra ny taniko sady mitoby eto anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa mba tongava atỳ re ianao hanozona io vahoaka io, fa mahery noho izaho izy; angamba haharesy azy aho amin’izay ka haharoaka azy hiala amin’ny tany. Satria fantatro fa izay tsofinao rano dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voatsodrano
  - type: text
    text: ' ary izay ozoninao dia voaozona.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia lasa ireo loholona môabita sy midianita nitondra izay hanakaramana ilay mpanao fankatoavana. Rehefa tonga tany amin’i Balahama ireo, dia nilaza ny tenin’i Balàka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Balahama tamin’ny iraka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandria eto anio alina ianareo fa homeko valin-teny araka izay holazain’ny TOMPO amiko.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nijanona tao amin’i Balahama ireo olo-manan-kajan’i Môaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nankao amin’i Balahama kosa Andriamanitra ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa ireo lehilahy tonga ato aminao ireo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy i Balahama tamin’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–I Balàka zanakalahin’i Tsipôra sy mpanjakan’i Môaba no naniraka olona hiteny amiko hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: «Ilay vahoaka izay niala tany Ejipta dia mandrakotra ny taniko. Koa mba tongava atỳ re ianao, hanozona azy; angamba haharesy azy aho amin’izay ka haharoaka azy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Andriamanitra tamin’i Balahama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy handeha hiaraka aminy ianao ary tsy hanozona koa io vahoaka izay efa notahîko io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny ampitso maraina, rehefa nifoha i Balahama, dia niteny tamin’ireo olo-manan-kaja nirahin’i Balàka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miverena any amin’ny taninareo, fa tsy navelan’ny TOMPO hiaraka aminareo aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia lasa ireo olo-manan-kajan’i Môaba niverina tany amin’i Balàka, ka nilaza taminy hoe: «Tsy nety niaraka taminay i Balahama.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa mbola nandefa olo-manan-kaja hafa maro kokoa sady malaza noho ny teo aloha i Balàka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa tonga tany amin’i Balahama ireo, dia nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’i Balàka, zanakalahin’i Tsipôra: «Aoka re mba tsy holavinao ny hankanesanao atỳ amiko e! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa hitafotafo mihitsy ny voninahitra izay homeko anao, ary hataoko avokoa izay holazainao amiko rehetra. Koa mba tongava atỳ re ianao hanozona io vahoaka io.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy i Balahama namaly ireo mpanompon’i Balàka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Na dia homen’i Balàka volafotsy sy volamena mahafeno ny tranony aza aho, dia tsy afaka hanao zavatra na kely na lehibe izay mifanohitra amin’ny tenin’ny TOMPO Andriamanitro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nefa mijanòna ihany atỳ anio alina, hahafantarako sao mbola misy holazain’ny Tompo amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin’ny alina, dia nankao amin’i Balahama Andriamanitra ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha haka anao no nahatongavan’ireo olona ireo, dia mandehana miaraka aminy; kanefa izay holazaiko aminao ihany no hataonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny ampitso maraina dia nanisy lasely ny borikivaviny i Balahama ka niainga niaraka tamin’ireo olo-manan-kajan’i Môaba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny borikivavin’i Balahama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tezitra mafy tamin’i Balahama Andriamanitra raha nahita azy nandeha ihany; ary nijanona teo an-dalana hisakana azy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny TOMPO raha iny izy nizotra nitaingina ny borikiny sady narahin’ny mpanompony roa lahy iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hitan’ny boriky ilay anjelin’ny TOMPO nijanona teo amin’ny lalana sady nitana sabatra; dia nivily lalana ny boriky ka namantana tany amin’ny saha. Nokapohin’i Balahama ilay boriky mba hiverina amin’ny lalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ilay anjelin’ny TOMPO nijanona indray teo amin’ny lempona iray teo anelanelan’ny tanimboaloboka voafefy andaniny roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nony nahita ilay anjelin’ny TOMPO ity boriky dia nitampify teo amin’ny rindrina ka nanery ny tongotr’i Balahama teo. Dia nikapoka azy indray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mbola nihoatra azy ireo fanindroany ilay anjelin’ny TOMPO ka nijanona teo amin’ny lalan-tery tsy ahafahana mivily na miankavanana na miankavia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nony nahita ilay anjelin’ny TOMPO ity boriky, dia nandry teo ambanin’i Balahama. Vinitra aok’izany i Balahama ka nikapoka ny boriky tamin’ny tehina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nampitenenin’ny TOMPO ilay boriky ka nilaza tamin’i Balahama hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona loatra no nataoko taminao no dia nokapohinao intelo aho?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ka hoy ny navalin’i Balahama azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Satria namazivazy ahy ianao; fa raha nisy sabatra tetỳ amiko, dia efa novonoiko ho faty teo no ho eo ihany ianao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ilay boriky tamin’i Balahama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Boriky fitainginao hatramin’izay nanananao ahy aho, ka mba fanaoko ve ny manao toy izao aminao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy fanaonao izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin’izay dia nosokafan’ny TOMPO ny mason’i Balahama hahita ilay anjelin’ny TOMPO izay nijanona teo amin’ny lalana sady mitana sabatra. Dia niondrika i Balahama ka niankohoka tamin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hoy ilay anjelin’ny TOMPO taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no nokapohinao intelo ny borikinao? Tonga aho hisakan-dalana anao, satria heveriko fa mankamin’ny fahaverezana ny dianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nahita ahy ny boriky ka intelo nivily ahy. Fa raha toa ka tsy nivily ahy izy, dia ianao no ho novonoiko ho faty teo no ho eo, fa izy kosa notsimbiniko ny ainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy i Balahama tamin’ilay anjelin’ny TOMPO:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nanota aho satria tsy nahafantatra fa ianao no nisakan-dalana ahy. Koa ankehitriny raha tsy tianao ny hankanesako any, dia hiverina hody aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa hoy ny navalin’ilay anjelin’ny TOMPO azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia! Mandehana ihany miaraka amin’ireo olona ireo, saingy izay teny asaiko lazainao ihany no holazainao.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nanohy ny diany niaraka tamin’ireo irak’i Balàka i Balahama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fihaonan’i Balahama sy i Balàka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Rehefa ren’i Balàka fa tamy i Balahama, dia lasa izy nitsena azy tany Hiry-Môaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hiry-Môaba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna teo akaikin’i Harôhera.
    marker-yv: yv-n
  - type: text
    text: ' izay tanàna teo amin’ny sisin-tany voafaritr’i Arnôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary hoy i Balàka taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no tsy tonga ianao tamin’ireo iraka voalohany izay nalefako? Sao dia heverinao tsy ho haiko ny hanome voninahitra anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy i Balahàma tamin’i Balàka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro aho efa tonga eto aminao ankehitriny. Nefa inona moa no azoko lazaina aminao afa-tsy izay teny hataon’Andriamanitra ao am-bavako ihany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia lasa niaraka tamin’i Balàka nankany Kiriata-Hotsôta i Balahama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Namono omby aman’ondry hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' i Balàka, ka nampanaterany ho an’i Balahama sy ireo olo-manan-kaja niaraka taminy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Balahama nitsodrano ny vahoaka israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Nony maraina dia nalain’i Balàka i Balahama ka nentiny niakatra ho ao Bamôta-Bahala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.41 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bamôta-Bahala: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: angamba mety ho toerana iray ity sy ilay Bamôta ao amin’ny 21.19.
    marker-yv: yv-n
  - type: text
    text: ' izay nahatazanana ampahan’ny vahoaka israelita.'
