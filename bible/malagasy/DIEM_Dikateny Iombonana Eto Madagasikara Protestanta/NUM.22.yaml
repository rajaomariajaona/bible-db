document_id: NUM.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I ISRAELY TAO AMIN’NY LEMAK’I MÔABA
  - type: heading
    content: 'Ny tantaran’i Balahama:'
  - type: heading
    content: Ny antson’i Balàka mpanjaka
  - type: text
    content: 'Niainga indray ny Israelita ka nitoby tao amin’ny lemak’i Môaba, teo an-dafy atsinanan’i Jôrdàna tandrifin’i Jerikao. '
  '10':
  - type: text
    content: 'Dia hoy i Balahama tamin’Andriamanitra:'
  - type: text
    content: '–I Balàka zanakalahin’i Tsipôra sy mpanjakan’i Môaba no naniraka olona hiteny amiko hoe: '
  '11':
  - type: text
    content: «Ilay vahoaka izay niala tany Ejipta dia mandrakotra ny taniko. Koa mba tongava atỳ re ianao, hanozona azy; angamba haharesy azy aho amin’izay ka haharoaka azy.»
  '12':
  - type: text
    content: 'Ary hoy i Andriamanitra tamin’i Balahama:'
  - type: text
    content: –Tsy handeha hiaraka aminy ianao ary tsy hanozona koa io vahoaka izay efa notahîko io.
  '13':
  - type: text
    content: 'Ny ampitso maraina, rehefa nifoha i Balahama, dia niteny tamin’ireo olo-manan-kaja nirahin’i Balàka hoe:'
  - type: text
    content: –Miverena any amin’ny taninareo, fa tsy navelan’ny TOMPO hiaraka aminareo aho.
  '14':
  - type: text
    content: 'Dia lasa ireo olo-manan-kajan’i Môaba niverina tany amin’i Balàka, ka nilaza taminy hoe: «Tsy nety niaraka taminay i Balahama.» '
  '15':
  - type: text
    content: 'Nefa mbola nandefa olo-manan-kaja hafa maro kokoa sady malaza noho ny teo aloha i Balàka. '
  '16':
  - type: text
    content: 'Rehefa tonga tany amin’i Balahama ireo, dia nanao taminy hoe:'
  - type: text
    content: '–Izao no lazain’i Balàka, zanakalahin’i Tsipôra: «Aoka re mba tsy holavinao ny hankanesanao atỳ amiko e! '
  '17':
  - type: text
    content: Fa hitafotafo mihitsy ny voninahitra izay homeko anao, ary hataoko avokoa izay holazainao amiko rehetra. Koa mba tongava atỳ re ianao hanozona io vahoaka io.»
  '18':
  - type: text
    content: 'Fa hoy i Balahama namaly ireo mpanompon’i Balàka:'
  - type: text
    content: '–Na dia homen’i Balàka volafotsy sy volamena mahafeno ny tranony aza aho, dia tsy afaka hanao zavatra na kely na lehibe izay mifanohitra amin’ny tenin’ny TOMPO Andriamanitro. '
  '19':
  - type: text
    content: Nefa mijanòna ihany atỳ anio alina, hahafantarako sao mbola misy holazain’ny Tompo amiko.
  '2':
  - type: text
    content: 'I Balàka, zanakalahin’i Tsipôra, no mpanjakan’i Môaba tamin’izay fotoana izay. Fantany tsara izay rehetra nataon’ny Israelita tamin’ny '
  - type: text
    content: Amôrita
  - type: text
    content: '; ka raiki-tahotra mafy izy sy ny Môabita sady nangorohoro nahita ny Israelita izay vahoaka marobe. Dia hoy ity mpanjaka tamin’ny loholon’ny Midîanîta:'
  - type: text
    content: –Ankehitriny ireto vahoaka marobe ireto dia hanimba ny faritra rehetra manodidina antsika, toy ny firaokan’ny omby ny ahitra eny an-tsaha!
  '20':
  - type: text
    content: 'Tamin’ny alina, dia nankao amin’i Balahama Andriamanitra ka nanao taminy hoe:'
  - type: text
    content: –Raha haka anao no nahatongavan’ireo olona ireo, dia mandehana miaraka aminy; kanefa izay holazaiko aminao ihany no hataonao.
  '21':
  - type: text
    content: Ny ampitso maraina dia nanisy lasely ny borikivaviny i Balahama ka niainga niaraka tamin’ireo olo-manan-kajan’i Môaba.
  - type: heading
    content: Ny borikivavin’i Balahama
  '22':
  - type: text
    content: 'Tezitra mafy tamin’i Balahama Andriamanitra raha nahita azy nandeha ihany; ary nijanona teo an-dalana hisakana azy ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO raha iny izy nizotra nitaingina ny borikiny sady narahin’ny mpanompony roa lahy iny. '
  '23':
  - type: text
    content: 'Hitan’ny boriky ilay anjelin’ny TOMPO nijanona teo amin’ny lalana sady nitana sabatra; dia nivily lalana ny boriky ka namantana tany amin’ny saha. Nokapohin’i Balahama ilay boriky mba hiverina amin’ny lalana. '
  '24':
  - type: text
    content: 'Ary ilay anjelin’ny TOMPO nijanona indray teo amin’ny lempona iray teo anelanelan’ny tanimboaloboka voafefy andaniny roa. '
  '25':
  - type: text
    content: 'Nony nahita ilay anjelin’ny TOMPO ity boriky dia nitampify teo amin’ny rindrina ka nanery ny tongotr’i Balahama teo. Dia nikapoka azy indray izy. '
  '26':
  - type: text
    content: 'Mbola nihoatra azy ireo fanindroany ilay anjelin’ny TOMPO ka nijanona teo amin’ny lalan-tery tsy ahafahana mivily na miankavanana na miankavia. '
  '27':
  - type: text
    content: 'Nony nahita ilay anjelin’ny TOMPO ity boriky, dia nandry teo ambanin’i Balahama. Vinitra aok’izany i Balahama ka nikapoka ny boriky tamin’ny tehina. '
  '28':
  - type: text
    content: 'Dia nampitenenin’ny TOMPO ilay boriky ka nilaza tamin’i Balahama hoe:'
  - type: text
    content: –Fa inona loatra no nataoko taminao no dia nokapohinao intelo aho?
  '29':
  - type: text
    content: 'Ka hoy ny navalin’i Balahama azy:'
  - type: text
    content: –Satria namazivazy ahy ianao; fa raha nisy sabatra tetỳ amiko, dia efa novonoiko ho faty teo no ho eo ihany ianao!
  '30':
  - type: text
    content: 'Ary hoy ilay boriky tamin’i Balahama:'
  - type: text
    content: –Boriky fitainginao hatramin’izay nanananao ahy aho, ka mba fanaoko ve ny manao toy izao aminao?
  - type: text
    content: 'Dia hoy izy hoe:'
  - type: text
    content: –Tsy fanaonao izany!
  '31':
  - type: text
    content: 'Tamin’izay dia nosokafan’ny TOMPO ny mason’i Balahama hahita ilay anjelin’ny TOMPO izay nijanona teo amin’ny lalana sady mitana sabatra. Dia niondrika i Balahama ka niankohoka tamin’ny tany. '
  '32':
  - type: text
    content: 'Fa hoy ilay anjelin’ny TOMPO taminy:'
  - type: text
    content: '–Nahoana no nokapohinao intelo ny borikinao? Tonga aho hisakan-dalana anao, satria heveriko fa mankamin’ny fahaverezana ny dianao. '
  '33':
  - type: text
    content: Nahita ahy ny boriky ka intelo nivily ahy. Fa raha toa ka tsy nivily ahy izy, dia ianao no ho novonoiko ho faty teo no ho eo, fa izy kosa notsimbiniko ny ainy.
  '34':
  - type: text
    content: 'Dia hoy i Balahama tamin’ilay anjelin’ny TOMPO:'
  - type: text
    content: –Nanota aho satria tsy nahafantatra fa ianao no nisakan-dalana ahy. Koa ankehitriny raha tsy tianao ny hankanesako any, dia hiverina hody aho.
  '35':
  - type: text
    content: 'Fa hoy ny navalin’ilay anjelin’ny TOMPO azy:'
  - type: text
    content: –Tsia! Mandehana ihany miaraka amin’ireo olona ireo, saingy izay teny asaiko lazainao ihany no holazainao.
  - type: text
    content: Dia nanohy ny diany niaraka tamin’ireo irak’i Balàka i Balahama.
  - type: heading
    content: Fihaonan’i Balahama sy i Balàka
  '36':
  - type: text
    content: Rehefa ren’i Balàka fa tamy i Balahama, dia lasa izy nitsena azy tany Hiry-Môaba
  - type: note
    content: I Hiry-Môaba dia tanàna teo akaikin’i Harôhera.
  - type: text
    content: ' izay tanàna teo amin’ny sisin-tany voafaritr’i Arnôna. '
  '37':
  - type: text
    content: 'Ary hoy i Balàka taminy:'
  - type: text
    content: –Nahoana no tsy tonga ianao tamin’ireo iraka voalohany izay nalefako? Sao dia heverinao tsy ho haiko ny hanome voninahitra anao!
  '38':
  - type: text
    content: 'Dia hoy i Balahàma tamin’i Balàka:'
  - type: text
    content: –Indro aho efa tonga eto aminao ankehitriny. Nefa inona moa no azoko lazaina aminao afa-tsy izay teny hataon’Andriamanitra ao am-bavako ihany?
  '39':
  - type: text
    content: 'Dia lasa niaraka tamin’i Balàka nankany Kiriata-Hotsôta i Balahama. '
  '40':
  - type: text
    content: 'Namono omby aman’ondry hatao '
  - type: text
    content: sorona
  - type: text
    content: ' i Balàka, ka nampanaterany ho an’i Balahama sy ireo olo-manan-kaja niaraka taminy.'
  - type: heading
    content: I Balahama nitsodrano ny vahoaka israelita
  '41':
  - type: text
    content: Nony maraina dia nalain’i Balàka i Balahama ka nentiny niakatra ho ao Bamôta-Bahala
  - type: note
    content: 'Bamôta-Bahala: angamba mety ho toerana iray ity sy ilay Bamôta ao amin’ny 21.19.'
  - type: text
    content: ' izay nahatazanana ampahan’ny vahoaka israelita.'
  '5':
  - type: text
    content: Dia naniraka olona i Balàka hankany amin’i Balahama zanakalahin’i Behôra any Petôra amoron’ny ony Eofrata, any amin’ny tanin’ny Hamavita
  - type: note
    content: 'Balahama: jereo 2Pt 2.15-16; Joda 11. –Petôra: toerana tsy fantatra, mety ho any avaratr’i Siria ankehitriny. –ny Hamavita dia mponina tao Siria avaratra fahizany.'
  - type: text
    content: '; ka izao no teny nampitondrainy ho an’i Balahama: «Misy vahoaka niala tany Ejipta tonga eto amiko, ary mandrakotra ny taniko sady mitoby eto anatrehako. '
  '6':
  - type: text
    content: 'Koa mba tongava atỳ re ianao hanozona io vahoaka io, fa mahery noho izaho izy; angamba haharesy azy aho amin’izay ka haharoaka azy hiala amin’ny tany. Satria fantatro fa izay tsofinao rano dia '
  - type: text
    content: voatsodrano
  - type: text
    content: ' ary izay ozoninao dia voaozona.» '
  '7':
  - type: text
    content: 'Dia lasa ireo loholona môabita sy midianita nitondra izay hanakaramana ilay mpanao fankatoavana. Rehefa tonga tany amin’i Balahama ireo, dia nilaza ny tenin’i Balàka. '
  '8':
  - type: text
    content: 'Ary hoy i Balahama tamin’ny iraka:'
  - type: text
    content: –Mandria eto anio alina ianareo fa homeko valin-teny araka izay holazain’ny TOMPO amiko.
  - type: text
    content: 'Dia nijanona tao amin’i Balahama ireo olo-manan-kajan’i Môaba. '
  '9':
  - type: text
    content: 'Ary nankao amin’i Balahama kosa Andriamanitra ka nanontany azy hoe:'
  - type: text
    content: –Iza moa ireo lehilahy tonga ato aminao ireo?
