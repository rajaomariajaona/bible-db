      - type: text
        text: sinagôga
    - type: text
      text: ' izy ireo ary notereko hivadi-pinoana. Ary noho izaho tena romotra taminy no nanenjehako azy hatrany amin’ny tanànan’ny firenen-kafa'
    - type: usfm
      marker: f
