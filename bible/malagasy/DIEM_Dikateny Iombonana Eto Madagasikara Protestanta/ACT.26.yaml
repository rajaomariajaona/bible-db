document_id: ACT.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miaro tena eo anatrehan’i Agripà i Paoly
  - type: text
    content: Dia hoy kosa i Agripà
  - type: note
    content: 'Agripà: jereo 25.13 sy nta.'
  - type: text
    content: ' tamin’i Paoly:'
  - type: text
    content: –Mahazo miteny ianao hiarovanao tena.
  - type: text
    content: 'Dia naninjitra ny tanany i Paoly ka toy izao no fiarovan-tena nataony:'
  '10':
  - type: text
    content: 'Nataoko izany tao Jerosalema. Nandray fahefana manokana tamin’ny lohandohan’ny mpisorona aho, ka maro tamin’ireo voatokana ho vahoakan’Andriamanitra no naiditro am-ponja, ary dia mpankasitraka aho raha nohelohina ho faty ry zareo. '
  '11':
  - type: text
    content: 'Matetika dia nofaiziko tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' izy ireo ary notereko hivadi-pinoana. Ary noho izaho tena romotra taminy no nanenjehako azy hatrany amin’ny tanànan’ny firenen-kafa'
  - type: note
    content: 'And 9-11: jereo 8.3; 9.1-2; 22.4-5.'
  - type: text
    content: .
  - type: heading
    content: Tantarain’i Paoly ny niovany fo
  - type: heading
    content: (Jereo Asa 9.1-19; 22.6-16)
  '12':
  - type: text
    content: 'Izany no nahatonga ahy hankany Damasy, ombàn’ny fahefana sy ny baiko azoko avy tamin’ny lohandoha-mpisorona. '
  '13':
  - type: text
    content: 'Teny an-dalana aho, ry mpanjaka, raha tamin’ny mitataovovonana ny andro, dia nahita hazavana avy tany an-danitra, mahery lavitra noho ny hazavan’ny masoandro ka nanjelanjelatra manodidina ahy mbamin’ny mpiara-dia tamiko. '
  '14':
  - type: text
    content: 'Samy niankarapoka tamin’ny tany izahay, ary izaho dia nandre feo niteny tamiko tamin’ny teny aramianina hoe: «Saoly, Saoly, nahoana no manenjika Ahy ianao? Manimba tena ianao misetra lefona maranitra!» '
  '15':
  - type: text
    content: 'Izaho kosa nanontany hoe: «Iza moa Ianao, Tompoko?» Dia novalian’ny Tompo hoe: «Izaho no i Jesoa, Ilay enjehinao! '
  '16':
  - type: text
    content: 'Fa miarena ka mijoroa! Izao manko no nisehoako taminao: ny hanendry anao ho mpanompoko ary koa ho vavolombelona hanambara amin’ny hafa ny nahitanao Ahy androany'
  - type: note
    content: 'ny nahitanao Ahy: misy stf sasany ahitana hoe ny zavatra hitanao.'
  - type: text
    content: 'sy ny zavatra mbola hasehoko anao. '
  '17':
  - type: text
    content: 'Izaho no hanafaka anao amin’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' sy ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' izay anirahako anao. '
  '18':
  - type: text
    content: 'Hanirahako anao izy rehetra mba hampahiratinao maso, hahatonga azy hiala amin’ny haizina ho amin’ny mazava ary hiala amin’ny fahefàn’i Satàna ho amin’Andriamanitra, ka handraisany famelan-keloka noho ny finoana Ahy sy hahazoany anjara lova miaraka amin’ireo voatokana ho '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: .»
  - type: heading
    content: Tantarain’i Paoly ny asany
  '19':
  - type: text
    content: 'Ary amin’izany, ry Agripà mpanjaka, tsy notoheriko ny fahitana avy tany an-danitra. '
  '2':
  - type: text
    content: '–Ry Agripà mpanjaka, heveriko fa manan-jara aho afaka miaro tena eto anatrehanao momba ny zavatra rehetra iampangan’ny Jiosy ahy; '
  '20':
  - type: text
    content: 'Fa nitoriako aloha ny mponina tao Damasy ary koa ny tao Jerosalema, vao izay manerana ny faritany Jodea sy ny tanin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' ka nanainga azy rehetra aho hiala amin’ny toetra ratsiny sy hiverina amin’Andriamanitra ary hanao asa mampiharihary fa nialany tokoa ny toetra ratsiny'
  - type: note
    content: 'hiala amin’ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA. Jereo 9.20, 28-29; ampit Mt 3.8; Lk 3.8.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Izany no nisamboran’ny Jiosy ahy raha tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' aho, ary nitadiavany hamonoana ahy. '
  '22':
  - type: text
    content: 'Fa niaro ahy Andriamanitra mandraka androany ka mbola intỳ aho eto, mba hijoro ho vavolombelona amin’ny olona rehetra na ny kely na ny lehibe. Izay nambaran’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy i Mosesy fa ho avy no hany lazaiko izao: '
  '23':
  - type: text
    content: 'hijaly ny '
  - type: text
    content: Mesia
  - type: text
    content: ' ary Izy no ho voalohany hisantatra ny '
  - type: text
    content: fitsanganan’ny maty
  - type: text
    content: ' ka hitory fahazavana amin’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' sy amin’ny hafa firenena'
  - type: note
    content: Ampit 1Kôr 15.20; Is 42.6; 49.6.
  - type: text
    content: .
  - type: heading
    content: Taomin’i Paoly ho kristianina i Agripà
  '24':
  - type: text
    content: Raha mbola mandahatra hiarovan-tena araka izany i Paoly, dia niantso tamin’ny feo mahery kosa i Festo
  - type: note
    content: 'Festo: jereo 24.27 sy nta.'
  - type: text
    content: ' nanao hoe:'
  - type: text
    content: –Lasa adala ianao, ry Paoly! Ny fianarana be loatra vitanao no mahalasa adala anao!
  '25':
  - type: text
    content: 'Dia novalian’i Paoly hoe:'
  - type: text
    content: '–Tsy lasa adala akory aho, Andriamatoa governora hajaina, teny azo antoka sady voadinika izao lazaiko izao. '
  '26':
  - type: text
    content: 'Tsy vahiny amin’ny mpanjaka izany toe-javatra izany, ka dia miteny tsy mihambahamba eto anatrehany aho. Matoky aho fa tsy misy miafina aminy velively izany, satria tsy mba an-takontakona no nanaovana azy. '
  '27':
  - type: text
    content: 'Ry Agripà mpanjaka, inoanao ve izay voalazan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: '? Fantatro fa inoanao.'
  '28':
  - type: text
    content: 'Ary hoy i Agripà tamin’i Paoly:'
  - type: text
    content: –Heverinao moa fa dia ho tonganao kristianina haingana toy izany aho
  - type: note
    content: 'Heverinao... toy izany aho: dkt hafa kely sisa dia ho tonganao kristianina aho!'
  - type: text
    content: '?'
  '29':
  - type: text
    content: 'Dia novalian’i Paoly hoe:'
  - type: text
    content: –Na ho haingana na mbola ho ela, dia mivavaka amin’Andriamanitra aho mba tsy ianao ihany fa izay rehetra mihaino ahy androany no ho tonga tahaka ahy afa-tsy amin’ny maha mpifatotra ahy.
  '3':
  - type: text
    content: satria fantatrao tsara tokoa ny fomba amam-panao jiosy sy ny zavatra samihafa mahabe adihevitra eo amin’ny Jiosy. Koa mihanta aminao aho mba haharitra hihaino ahy.
  '30':
  - type: text
    content: 'Dia nitsangana ny mpanjaka sy ny governora ary i Berenîka mbamin’izay rehetra niara-nipetraka taminy; '
  '31':
  - type: text
    content: 'ka nony niala teo, dia nifampiresaka hoe:'
  - type: text
    content: –Tsy misy fahadisoana vitan’io lehilahy io, tokony hahamendrika azy ho voaheloka ho faty na hatao am-ponja.
  '32':
  - type: text
    content: 'Hoy kosa i Agripà tamin’i Festo:'
  - type: text
    content: –Azo nalefa ihany io lehilahy io raha tsy noho izy nampiakatra ny raharahany amin’ny amperôra rômanina.
  '4':
  - type: text
    content: 'Mahalala tsara ny fiainako avokoa ny Jiosy hatry ny fony aho tanora; satria hatrany am-piandohana, dia teo anivon’ny fireneko sy tao Jerosalema aho. '
  '5':
  - type: text
    content: 'Raha mety hijoro ho vavolombelona izy, dia fantany hatramin’ny ela hoe '
  - type: text
    content: Farisianina
  - type: note
    content: Jereo 23.6 sy nta; Fil 3.5.
  - type: text
    content: ' aho sady miaina araka ny antoko faran’izay sarotiny momba ny fivavahanay. '
  '6':
  - type: text
    content: 'Ankehitriny kosa mitsangana hotsaraina eto aho, satria manantena ny zavatra nampanantenain’Andriamanitra ny razanay. '
  '7':
  - type: text
    content: 'Ny foko 12 eo amin’ny firenenay dia samy manantena ny fahatanterahan’izany ka mafana fo amin’ny fanompoana an’Andriamanitra andro aman’alina. Ary izany fanantenana izany no iampangan’ny Jiosy ahy, ry mpanjaka. '
  '8':
  - type: text
    content: Fa nahoana moa, ry Jiosy, no dia tombananareo ho tsy azo inoana fa manangana ny maty ho velona Andriamanitra?
  '9':
  - type: text
    content: 'Izaho izao mihitsy no efa nisaintsaina fa tokony hotoheriko na amin’ny fomba inona na amin’ny fomba inona ny anaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' avy any Nazareta. '
