    - type: text
      text: (Jereo Asa 9.1-19; 22.6-16)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no nahatonga ahy hankany Damasy, ombàn’ny fahefana sy ny baiko azoko avy tamin’ny lohandoha-mpisorona. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teny an-dalana aho, ry mpanjaka, raha tamin’ny mitataovovonana ny andro, dia nahita hazavana avy tany an-danitra, mahery lavitra noho ny hazavan’ny masoandro ka nanjelanjelatra manodidina ahy mbamin’ny mpiara-dia tamiko. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy niankarapoka tamin’ny tany izahay, ary izaho dia nandre feo niteny tamiko tamin’ny teny aramianina hoe: «Saoly, Saoly, nahoana no manenjika Ahy ianao? Manimba tena ianao misetra lefona maranitra!» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho kosa nanontany hoe: «Iza moa Ianao, Tompoko?» Dia novalian’ny Tompo hoe: «Izaho no i Jesoa, Ilay enjehinao! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa miarena ka mijoroa! Izao manko no nisehoako taminao: ny hanendry anao ho mpanompoko ary koa ho vavolombelona hanambara amin’ny hafa ny nahitanao Ahy androany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny nahitanao Ahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny zavatra hitanao.
      marker-yv: yv-n
    - type: text
      text: 'sy ny zavatra mbola hasehoko anao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no hanafaka anao amin’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' izay anirahako anao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanirahako anao izy rehetra mba hampahiratinao maso, hahatonga azy hiala amin’ny haizina ho amin’ny mazava ary hiala amin’ny fahefàn’i Satàna ho amin’Andriamanitra, ka handraisany famelan-keloka noho ny finoana Ahy sy hahazoany anjara lova miaraka amin’ireo voatokana ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tantarain’i Paoly ny asany
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’izany, ry Agripà mpanjaka, tsy notoheriko ny fahitana avy tany an-danitra. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Agripà mpanjaka, heveriko fa manan-jara aho afaka miaro tena eto anatrehanao momba ny zavatra rehetra iampangan’ny Jiosy ahy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nitoriako aloha ny mponina tao Damasy ary koa ny tao Jerosalema, vao izay manerana ny faritany Jodea sy ny tanin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' ka nanainga azy rehetra aho hiala amin’ny toetra ratsiny sy hiverina amin’Andriamanitra ary hanao asa mampiharihary fa nialany tokoa ny toetra ratsiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.20 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'hiala amin’ny toe-dratsy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA. Jereo 9.20, 28-29; ampit Mt 3.8; Lk 3.8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no nisamboran’ny Jiosy ahy raha tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' aho, ary nitadiavany hamonoana ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa niaro ahy Andriamanitra mandraka androany ka mbola intỳ aho eto, mba hijoro ho vavolombelona amin’ny olona rehetra na ny kely na ny lehibe. Izay nambaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' sy i Mosesy fa ho avy no hany lazaiko izao: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hijaly ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: ' ary Izy no ho voalohany hisantatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitsanganan’ny maty
    - type: text
      text: ' ka hitory fahazavana amin’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' sy amin’ny hafa firenena'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.23 '
      - type: usfm
