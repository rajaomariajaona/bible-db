      text: 'Dia naninjitra ny tanany i Paoly ka toy izao no fiarovan-tena nataony:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataoko izany tao Jerosalema. Nandray fahefana manokana tamin’ny lohandohan’ny mpisorona aho, ka maro tamin’ireo voatokana ho vahoakan’Andriamanitra no naiditro am-ponja, ary dia mpankasitraka aho raha nohelohina ho faty ry zareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matetika dia nofaiziko tao amin’ny '
    - type: usfm
      marker: w
