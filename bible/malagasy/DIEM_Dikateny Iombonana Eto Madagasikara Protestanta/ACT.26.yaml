  - type: usfm
    marker: s1
    children:
    - type: text
      text: Taomin’i Paoly ho kristianina i Agripà
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mbola mandahatra hiarovan-tena araka izany i Paoly, dia niantso tamin’ny feo mahery kosa i Festo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Festo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 24.27 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lasa adala ianao, ry Paoly! Ny fianarana be loatra vitanao no mahalasa adala anao!
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Paoly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy lasa adala akory aho, Andriamatoa governora hajaina, teny azo antoka sady voadinika izao lazaiko izao. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy vahiny amin’ny mpanjaka izany toe-javatra izany, ka dia miteny tsy mihambahamba eto anatrehany aho. Matoky aho fa tsy misy miafina aminy velively izany, satria tsy mba an-takontakona no nanaovana azy. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ry Agripà mpanjaka, inoanao ve izay voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '? Fantatro fa inoanao.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Agripà tamin’i Paoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Heverinao moa fa dia ho tonganao kristianina haingana toy izany aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heverinao... toy izany aho: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kely sisa dia ho tonganao kristianina aho!
      marker-yv: yv-n
    - type: text
      text: '?'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Paoly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na ho haingana na mbola ho ela, dia mivavaka amin’Andriamanitra aho mba tsy ianao ihany fa izay rehetra mihaino ahy androany no ho tonga tahaka ahy afa-tsy amin’ny maha mpifatotra ahy.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: satria fantatrao tsara tokoa ny fomba amam-panao jiosy sy ny zavatra samihafa mahabe adihevitra eo amin’ny Jiosy. Koa mihanta aminao aho mba haharitra hihaino ahy.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana ny mpanjaka sy ny governora ary i Berenîka mbamin’izay rehetra niara-nipetraka taminy; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nony niala teo, dia nifampiresaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy misy fahadisoana vitan’io lehilahy io, tokony hahamendrika azy ho voaheloka ho faty na hatao am-ponja.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Agripà tamin’i Festo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azo nalefa ihany io lehilahy io raha tsy noho izy nampiakatra ny raharahany amin’ny amperôra rômanina.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahalala tsara ny fiainako avokoa ny Jiosy hatry ny fony aho tanora; satria hatrany am-piandohana, dia teo anivon’ny fireneko sy tao Jerosalema aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mety hijoro ho vavolombelona izy, dia fantany hatramin’ny ela hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 23.6 sy nta; Fil 3.5.
      marker-yv: yv-n
    - type: text
      text: ' aho sady miaina araka ny antoko faran’izay sarotiny momba ny fivavahanay. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankehitriny kosa mitsangana hotsaraina eto aho, satria manantena ny zavatra nampanantenain’Andriamanitra ny razanay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny foko 12 eo amin’ny firenenay dia samy manantena ny fahatanterahan’izany ka mafana fo amin’ny fanompoana an’Andriamanitra andro aman’alina. Ary izany fanantenana izany no iampangan’ny Jiosy ahy, ry mpanjaka. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa nahoana moa, ry Jiosy, no dia tombananareo ho tsy azo inoana fa manangana ny maty ho velona Andriamanitra?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho izao mihitsy no efa nisaintsaina fa tokony hotoheriko na amin’ny fomba inona na amin’ny fomba inona ny anaran’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' avy any Nazareta. '
