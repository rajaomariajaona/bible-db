document_id: ACT.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaro tena eo anatrehan’i Agripà i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia hoy kosa i Agripà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Agripà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 25.13 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' tamin’i Paoly:'
- type: usfm
  marker: p
  children:
  - type: text
    text: –Mahazo miteny ianao hiarovanao tena.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia naninjitra ny tanany i Paoly ka toy izao no fiarovan-tena nataony:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Ry Agripà mpanjaka, heveriko fa manan-jara aho afaka miaro tena eto anatrehanao momba ny zavatra rehetra iampangan’ny Jiosy ahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: satria fantatrao tsara tokoa ny fomba amam-panao jiosy sy ny zavatra samihafa mahabe adihevitra eo amin’ny Jiosy. Koa mihanta aminao aho mba haharitra hihaino ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mahalala tsara ny fiainako avokoa ny Jiosy hatry ny fony aho tanora; satria hatrany am-piandohana, dia teo anivon’ny fireneko sy tao Jerosalema aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha mety hijoro ho vavolombelona izy, dia fantany hatramin’ny ela hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 23.6 sy nta; Fil 3.5.
    marker-yv: yv-n
  - type: text
    text: ' aho sady miaina araka ny antoko faran’izay sarotiny momba ny fivavahanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ankehitriny kosa mitsangana hotsaraina eto aho, satria manantena ny zavatra nampanantenain’Andriamanitra ny razanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny foko 12 eo amin’ny firenenay dia samy manantena ny fahatanterahan’izany ka mafana fo amin’ny fanompoana an’Andriamanitra andro aman’alina. Ary izany fanantenana izany no iampangan’ny Jiosy ahy, ry mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa nahoana moa, ry Jiosy, no dia tombananareo ho tsy azo inoana fa manangana ny maty ho velona Andriamanitra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izaho izao mihitsy no efa nisaintsaina fa tokony hotoheriko na amin’ny fomba inona na amin’ny fomba inona ny anaran’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' avy any Nazareta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nataoko izany tao Jerosalema. Nandray fahefana manokana tamin’ny lohandohan’ny mpisorona aho, ka maro tamin’ireo voatokana ho vahoakan’Andriamanitra no naiditro am-ponja, ary dia mpankasitraka aho raha nohelohina ho faty ry zareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Matetika dia nofaiziko tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' izy ireo ary notereko hivadi-pinoana. Ary noho izaho tena romotra taminy no nanenjehako azy hatrany amin’ny tanànan’ny firenen-kafa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 9-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 8.3; 9.1-2; 22.4-5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tantarain’i Paoly ny niovany fo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Asa 9.1-19; 22.6-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izany no nahatonga ahy hankany Damasy, ombàn’ny fahefana sy ny baiko azoko avy tamin’ny lohandoha-mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Teny an-dalana aho, ry mpanjaka, raha tamin’ny mitataovovonana ny andro, dia nahita hazavana avy tany an-danitra, mahery lavitra noho ny hazavan’ny masoandro ka nanjelanjelatra manodidina ahy mbamin’ny mpiara-dia tamiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Samy niankarapoka tamin’ny tany izahay, ary izaho dia nandre feo niteny tamiko tamin’ny teny aramianina hoe: «Saoly, Saoly, nahoana no manenjika Ahy ianao? Manimba tena ianao misetra lefona maranitra!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izaho kosa nanontany hoe: «Iza moa Ianao, Tompoko?» Dia novalian’ny Tompo hoe: «Izaho no i Jesoa, Ilay enjehinao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa miarena ka mijoroa! Izao manko no nisehoako taminao: ny hanendry anao ho mpanompoko ary koa ho vavolombelona hanambara amin’ny hafa ny nahitanao Ahy androany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny nahitanao Ahy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny zavatra hitanao.
    marker-yv: yv-n
  - type: text
    text: 'sy ny zavatra mbola hasehoko anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izaho no hanafaka anao amin’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' izay anirahako anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hanirahako anao izy rehetra mba hampahiratinao maso, hahatonga azy hiala amin’ny haizina ho amin’ny mazava ary hiala amin’ny fahefàn’i Satàna ho amin’Andriamanitra, ka handraisany famelan-keloka noho ny finoana Ahy sy hahazoany anjara lova miaraka amin’ireo voatokana ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tantarain’i Paoly ny asany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary amin’izany, ry Agripà mpanjaka, tsy notoheriko ny fahitana avy tany an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa nitoriako aloha ny mponina tao Damasy ary koa ny tao Jerosalema, vao izay manerana ny faritany Jodea sy ny tanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' ka nanainga azy rehetra aho hiala amin’ny toetra ratsiny sy hiverina amin’Andriamanitra ary hanao asa mampiharihary fa nialany tokoa ny toetra ratsiny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.20 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'hiala amin’ny toe-dratsy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA. Jereo 9.20, 28-29; ampit Mt 3.8; Lk 3.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izany no nisamboran’ny Jiosy ahy raha tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' aho, ary nitadiavany hamonoana ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa niaro ahy Andriamanitra mandraka androany ka mbola intỳ aho eto, mba hijoro ho vavolombelona amin’ny olona rehetra na ny kely na ny lehibe. Izay nambaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sy i Mosesy fa ho avy no hany lazaiko izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'hijaly ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ' ary Izy no ho voalohany hisantatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitsanganan’ny maty
  - type: text
    text: ' ka hitory fahazavana amin’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy amin’ny hafa firenena'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Kôr 15.20; Is 42.6; 49.6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Taomin’i Paoly ho kristianina i Agripà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha mbola mandahatra hiarovan-tena araka izany i Paoly, dia niantso tamin’ny feo mahery kosa i Festo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Festo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 24.27 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lasa adala ianao, ry Paoly! Ny fianarana be loatra vitanao no mahalasa adala anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia novalian’i Paoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy lasa adala akory aho, Andriamatoa governora hajaina, teny azo antoka sady voadinika izao lazaiko izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tsy vahiny amin’ny mpanjaka izany toe-javatra izany, ka dia miteny tsy mihambahamba eto anatrehany aho. Matoky aho fa tsy misy miafina aminy velively izany, satria tsy mba an-takontakona no nanaovana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ry Agripà mpanjaka, inoanao ve izay voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: '? Fantatro fa inoanao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy i Agripà tamin’i Paoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Heverinao moa fa dia ho tonganao kristianina haingana toy izany aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heverinao... toy izany aho: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kely sisa dia ho tonganao kristianina aho!
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia novalian’i Paoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Na ho haingana na mbola ho ela, dia mivavaka amin’Andriamanitra aho mba tsy ianao ihany fa izay rehetra mihaino ahy androany no ho tonga tahaka ahy afa-tsy amin’ny maha mpifatotra ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nitsangana ny mpanjaka sy ny governora ary i Berenîka mbamin’izay rehetra niara-nipetraka taminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ka nony niala teo, dia nifampiresaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy misy fahadisoana vitan’io lehilahy io, tokony hahamendrika azy ho voaheloka ho faty na hatao am-ponja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hoy kosa i Agripà tamin’i Festo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Azo nalefa ihany io lehilahy io raha tsy noho izy nampiakatra ny raharahany amin’ny amperôra rômanina.
