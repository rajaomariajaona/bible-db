document_id: REV.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fideran’ny any an-danitra an’Andriamanitra
  - type: text
    content: 'Taorian’izany, dia indro hitako nisy varavarana nivoha tany an-danitra; ary ilay feo tany am-boalohany, izay efa reko niteny tamiko tahaka ny feon-trompetra, no nanao tamiko hoe:'
  - type: text
    content: –Miakara atỳ, dia hasehoko anao ny zavatra tsy maintsy ho avy manaraka.
  '10':
  - type: text
    content: 'dia miankohoka eo anoloan’Ilay mipetraka eo ambony sezafiandrianana afovoany koa ireo loholona 24, mitsaoka ilay Velona mandrakizay mandrakizay sady manipy ny satroboninahiny eo anoloan’ilay sezafiandrianana ka manao hoe:'
  '11':
  - type: text
    content: «Ianao, ry Tomponay sy Andriamanitray,
  - type: text
    content: no mendrika handray ny voninahitra sy ny haja ary ny hery.
  - type: text
    content: Fa Ianao no nahary ny zavatra rehetra,
  - type: text
    content: sady noho ny sitraponao no nisiany sy naha ary azy.»
  '2':
  - type: text
    content: 'Niaraka tamin’izay dia nahazo tsindrimandry avy amin’ny Fanahy Masina aho. Ka indro nisy sezafiandrianana anankiray tany an-danitra, ary nisy nipetraka teo ambonin’io sezafiandrianana io. '
  '3':
  - type: text
    content: Ny tarehin’Ilay nipetraka dia namiratra tahaka ny vatosoa jaspa sy sardoanina; ary avana miendrika vatosoa emeralda no nanodidina ilay sezafiandrianana
  - type: note
    content: 'And 2-3: ampit Ezek 1.26-28; 10.1. –vatosoa jaspa: jereo 21.11 sy nta. –vatosoa emeralda: jereo 21.19-20 sy nta.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Nanotrona io sezafiandrianana io dia nisy sezafiandrianana hafa 24; ary teo ambonin’ireo sezafiandrianana ireo dia nisy '
  - type: text
    content: loholona
  - type: text
    content: ' 24 nipetraka, niakanjo akanjo fotsy sady nisatroka satroboninahitra volamena. '
  '5':
  - type: text
    content: Tselatra sy feo ary kotro-baratra no nivoaka avy tamin’ilay sezafiandrianana afovoany; ary nisy jiro fito mirehitra teo anoloany, dia ny Fanahy Masina ombàm-panomezana fito avy amin’Andriamanitra
  - type: note
    content: Ampit Eks 19.16; Ezek 1.13; Za 4.2.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Teo anoloan’ilay sezafiandrianana afovoany dia nisy toa ranomasina fitaratra tahaka ny vatosoa kristaly.
  - type: text
    content: 'Namefy akaiky an’ilay sezafiandrianana afovoany isaky ny lafiny avy dia nisy zava-miaina efatra feno maso avokoa ny anoloany sy ny ivohony. '
  '7':
  - type: text
    content: Ny zava-miaina voalohany dia tahaka ny liona; ny zava-miaina faharoa dia tahaka ny vantotr’ombalahy; ny zava-miaina fahatelo dia manan-tava tahaka ny an’ny olona; ary ny zava-miaina fahefatra dia tahaka ny voromahery manidina
  - type: note
    content: 'And 6-7: ampit Ezek 1.22; 1.5-10; 10.14.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ireo zava-miaina efatra ireo dia samy manana elatra enina avy, sady feno maso ny tenany manontolo teo ivelany sy tao anatiny; ary tsy mitsahatra andro aman’alina izy efatra manao hoe:'
  - type: text
    content: «Masina, masina, masina
  - type: text
    content: ny Tompo Andriamanitra Tsitoha
  - type: text
    content: Ilay taloha sy ankehitriny ary avy
  - type: note
    content: Ampit Ezek 1.8; 10.12; Is 6.2-3.
  - type: text
    content: '!»'
  '9':
  - type: text
    content: 'Omen’ireo zava-miaina voninahitra sy haja ary saotra Ilay mipetraka eo ambonin’ny sezafiandrianana afovoany, dia ilay Velona mandrakizay mandrakizay. Ary isaky ny manao izany izy efatra, '
