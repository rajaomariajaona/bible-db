document_id: REV.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fideran’ny any an-danitra an’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany, dia indro hitako nisy varavarana nivoha tany an-danitra; ary ilay feo tany am-boalohany, izay efa reko niteny tamiko tahaka ny feon-trompetra, no nanao tamiko hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miakara atỳ, dia hasehoko anao ny zavatra tsy maintsy ho avy manaraka.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia miankohoka eo anoloan’Ilay mipetraka eo ambony sezafiandrianana afovoany koa ireo loholona 24, mitsaoka ilay Velona mandrakizay mandrakizay sady manipy ny satroboninahiny eo anoloan’ilay sezafiandrianana ka manao hoe:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao, ry Tomponay sy Andriamanitray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mendrika handray ny voninahitra sy ny haja ary ny hery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Ianao no nahary ny zavatra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady noho ny sitraponao no nisiany sy naha ary azy.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niaraka tamin’izay dia nahazo tsindrimandry avy amin’ny Fanahy Masina aho. Ka indro nisy sezafiandrianana anankiray tany an-danitra, ary nisy nipetraka teo ambonin’io sezafiandrianana io. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tarehin’Ilay nipetraka dia namiratra tahaka ny vatosoa jaspa sy sardoanina; ary avana miendrika vatosoa emeralda no nanodidina ilay sezafiandrianana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
