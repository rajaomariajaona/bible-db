  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Omen’ireo zava-miaina voninahitra sy haja ary saotra Ilay mipetraka eo ambonin’ny sezafiandrianana afovoany, dia ilay Velona mandrakizay mandrakizay. Ary isaky ny manao izany izy efatra, '
