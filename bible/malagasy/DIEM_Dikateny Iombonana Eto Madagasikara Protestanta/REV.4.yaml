  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanotrona io sezafiandrianana io dia nisy sezafiandrianana hafa 24; ary teo ambonin’ireo sezafiandrianana ireo dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' 24 nipetraka, niakanjo akanjo fotsy sady nisatroka satroboninahitra volamena. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tselatra sy feo ary kotro-baratra no nivoaka avy tamin’ilay sezafiandrianana afovoany; ary nisy jiro fito mirehitra teo anoloany, dia ny Fanahy Masina ombàm-panomezana fito avy amin’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 19.16; Ezek 1.13; Za 4.2.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Teo anoloan’ilay sezafiandrianana afovoany dia nisy toa ranomasina fitaratra tahaka ny vatosoa kristaly.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namefy akaiky an’ilay sezafiandrianana afovoany isaky ny lafiny avy dia nisy zava-miaina efatra feno maso avokoa ny anoloany sy ny ivohony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zava-miaina voalohany dia tahaka ny liona; ny zava-miaina faharoa dia tahaka ny vantotr’ombalahy; ny zava-miaina fahatelo dia manan-tava tahaka ny an’ny olona; ary ny zava-miaina fahefatra dia tahaka ny voromahery manidina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: bdit
