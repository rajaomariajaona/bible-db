        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Ezek 1.22; 1.5-10; 10.14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo zava-miaina efatra ireo dia samy manana elatra enina avy, sady feno maso ny tenany manontolo teo ivelany sy tao anatiny; ary tsy mitsahatra andro aman’alina izy efatra manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Masina, masina, masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny Tompo Andriamanitra Tsitoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay taloha sy ankehitriny ary avy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
