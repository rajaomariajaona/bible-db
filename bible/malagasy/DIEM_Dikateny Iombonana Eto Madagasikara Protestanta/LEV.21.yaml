document_id: LEV.21
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Fepetra momba ny mpisorona
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: a. Fiainan’ny mpisorona eo anivon’ny ankohonany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO mba hamepetra ny mpisorona, zanakalahin’i Aharôna hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Aoka ny mpisorona tsy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: handoto
  - type: text
    text: ' tena amin’ny fikasihana ny fatin’olona anisan’ny fianakaviany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'afa-tsy hoe havany akaiky dia akaiky, tahaka ny reniny sy ny rainy ary ireo zanany sy ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny amin’ny anabaviny, izay mpitovo ka mbola havany akaiky tokoa satria tsy mba nanambady, dia mahazo mandoto tena ny mpisorona amin’ny fikasihana ny fatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noho izy loham-pianakaviany, dia aoka ny mpisorona tsy handoto tena amin’ny fikasihana faty hafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Noho izy...faty hafa, satria: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'manjavozavo ny rijan-teny hebreo etoana; dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Na dia ho an’ny filoham-pireneny aza, dia aoka ny mpisorona tsy handoto tena amin’ny fikasiham-paty, satria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', satria manala baràka azy izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Rehefa misaona izy mpisorona, dia tsy hanasola ny tampon-dohany na hanàratra ny volon-tavany na handradratra ny tenany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 19.27-28 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voatokana hanompo Ahy izy, ka tsy hanala baràka ny anarako, satria izy no mpanolotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' levonina amin’ny afo, dia ny sakafo aroso ho Ahy TOMPO Andriamaniny; noho izany, tokony hitandro ny maha olona voatokana azy ny mpisorona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Aoka ny mpisorona tsy hanambady vehivavy mpijangajanga na novetaina na efa nariam-badiny, noho izy voatokana hanompo Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ianareo Israelita kosa dia aoka hihevitra ny mpisorona ho olona voatokana, satria ny sakafo aroso ho Ahy Andriamanitrareo no atolony. Eny, aminareo ny mpisorona dia ho olona voatokana; satria Izaho TOMPO, Izay nanokana anareo Israelita ho vahoakako, dia masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Raha ny zanakavavin’ny mpisorona no manala baràka tena amin’ny fijangajangana, dia manala baràka ny rainy koa izy, ka hodorana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Ny mpisorombe no filohan’ireo mpisorona rahalahiny. Nandrarahana ny menaka fanosorana teo an-dohany izy ka manan-jo hitafy ny fanamiana masina. Noho izany, rehefa misaona izy, dia aoka tsy hirakaraka volo na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: handriatra ny fitafiany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 10.6.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'na hiditra am-paty akory; tsy tokony handoto tena izy na dia amin’ny fahafatesan’ny ray aman-dreniny aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Noho izany, rehefa misaona izy, dia aoka tsy hiala ny faritra masina, fandao hanazimba ny Toeramasina onenako; satria ny menaka nahosotro azy no efa nanokanako azy hanompo Ahy. Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Aoka ho vehivavy virijiny no halain’ny mpisorombe ho vady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny vehivavy maty vady, na nariam-bady, na novetaina, na mpijangajanga, dia tsy azony alaina ho vady; fa vehivavy virijiny, anisan’ny fianakavia-mpisorona, no halain’ny mpisorombe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Amin’izay, dia tsy ho afa-baràka ny ankohonany eo anivon’ny fianakaviamben’ny mpisorona, Satria Izaho no TOMPO Izay efa nanokana ny mpisorombe hanompo Ahy.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: b. Anton-javatra tsy ahazoana manao ny asa maha mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'mba hamepetra an’i Aharôna hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Hatrany hatrany, izay taranakao misy kilema dia aoka tsy hanatona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' hanolotra ny sakafo aroso ho Ahy Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izay mpisorona misy kilema dia tsy mahazo manatona ny alitara hanao izany, na ny jamba, na ny mandringa, na ny manan-tarehy sampona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'na ny tapa-tongotra, na ny tapa-tanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'na ny vokoka na ny saozanina, na ny voan’aretin-koditra, na ny torotoro vihindahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izay mpisorona rehetra misy kilema, amin’ny taranakao, dia tsy mahazo manatona ny alitara mba hanolotra ho AHY ny sorona levonina amin’ny afo; noho izy misy kilema no tsy ahazoany manatona ny alitara hanolotra ny sakafo aroso ho Ahy Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Azony ihinanana ihany anefa ny zavatra atao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' amiko, na ny zavatra masina dia masina na ny zavatra masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa noho izy misy kilema, dia tsy mahazo mankeo amin’ny efitra lamba izy na manatona ny alitara; tsy tokony handoto ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' onenako izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efitra lamba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo Eks 26.31-35. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –ny Toeramasina onenako
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny zavatra voatokana ho Ahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny mpisorona hanompo Ahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: izany hanompoana Ahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', satria Izaho TOMPO efa nanokana ny mpisorona hanompo Ahy.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nampitain’i Mosesy tamin’i Aharôna sy ny zanany ary tamin’ny Israelita rehetra koa izany.
