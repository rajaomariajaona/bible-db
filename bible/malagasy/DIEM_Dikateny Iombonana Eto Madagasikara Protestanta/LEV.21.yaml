document_id: LEV.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fepetra momba ny mpisorona
  - type: heading
    content: a. Fiainan’ny mpisorona eo anivon’ny ankohonany
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO mba hamepetra ny mpisorona, zanakalahin’i Aharôna hoe:'
  - type: text
    content: '«Aoka ny mpisorona tsy '
  - type: text
    content: handoto
  - type: text
    content: ' tena amin’ny fikasihana ny fatin’olona anisan’ny fianakaviany, '
  '10':
  - type: text
    content: '«Ny mpisorombe no filohan’ireo mpisorona rahalahiny. Nandrarahana ny menaka fanosorana teo an-dohany izy ka manan-jo hitafy ny fanamiana masina. Noho izany, rehefa misaona izy, dia aoka tsy hirakaraka volo na '
  - type: text
    content: handriatra ny fitafiany
  - type: note
    content: Jereo 10.6.
  - type: text
    content: ', '
  '11':
  - type: text
    content: 'na hiditra am-paty akory; tsy tokony handoto tena izy na dia amin’ny fahafatesan’ny ray aman-dreniny aza. '
  '12':
  - type: text
    content: Noho izany, rehefa misaona izy, dia aoka tsy hiala ny faritra masina, fandao hanazimba ny Toeramasina onenako; satria ny menaka nahosotro azy no efa nanokanako azy hanompo Ahy. Izaho no TOMPO.
  '13':
  - type: text
    content: '«Aoka ho vehivavy virijiny no halain’ny mpisorombe ho vady. '
  '14':
  - type: text
    content: 'Ny vehivavy maty vady, na nariam-bady, na novetaina, na mpijangajanga, dia tsy azony alaina ho vady; fa vehivavy virijiny, anisan’ny fianakavia-mpisorona, no halain’ny mpisorombe. '
  '15':
  - type: text
    content: Amin’izay, dia tsy ho afa-baràka ny ankohonany eo anivon’ny fianakaviamben’ny mpisorona, Satria Izaho no TOMPO Izay efa nanokana ny mpisorombe hanompo Ahy.»
  - type: heading
    content: b. Anton-javatra tsy ahazoana manao ny asa maha mpisorona
  '16':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '17':
  - type: text
    content: 'mba hamepetra an’i Aharôna hoe:'
  - type: text
    content: '«Hatrany hatrany, izay taranakao misy kilema dia aoka tsy hanatona ny '
  - type: text
    content: alitara
  - type: text
    content: ' hanolotra ny sakafo aroso ho Ahy Andriamaniny. '
  '18':
  - type: text
    content: 'Izay mpisorona misy kilema dia tsy mahazo manatona ny alitara hanao izany, na ny jamba, na ny mandringa, na ny manan-tarehy sampona, '
  '19':
  - type: text
    content: 'na ny tapa-tongotra, na ny tapa-tanana, '
  '2':
  - type: text
    content: 'afa-tsy hoe havany akaiky dia akaiky, tahaka ny reniny sy ny rainy ary ireo zanany sy ny rahalahiny. '
  '20':
  - type: text
    content: 'na ny vokoka na ny saozanina, na ny voan’aretin-koditra, na ny torotoro vihindahy. '
  '21':
  - type: text
    content: 'Izay mpisorona rehetra misy kilema, amin’ny taranakao, dia tsy mahazo manatona ny alitara mba hanolotra ho AHY ny sorona levonina amin’ny afo; noho izy misy kilema no tsy ahazoany manatona ny alitara hanolotra ny sakafo aroso ho Ahy Andriamaniny. '
  '22':
  - type: text
    content: 'Azony ihinanana ihany anefa ny zavatra atao '
  - type: text
    content: sorona
  - type: text
    content: ' amiko, na ny zavatra masina dia masina na ny zavatra masina. '
  '23':
  - type: text
    content: 'Kanefa noho izy misy kilema, dia tsy mahazo mankeo amin’ny efitra lamba izy na manatona ny alitara; tsy tokony handoto ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' onenako izy'
  - type: note
    content: 'efitra lamba: jereo Eks 26.31-35. –ny Toeramasina onenako na hoe ny zavatra voatokana ho Ahy. –ny mpisorona hanompo Ahy: dkt hafa izany hanompoana Ahy.'
  - type: text
    content: ', satria Izaho TOMPO efa nanokana ny mpisorona hanompo Ahy.»'
  '24':
  - type: text
    content: Dia nampitain’i Mosesy tamin’i Aharôna sy ny zanany ary tamin’ny Israelita rehetra koa izany.
  '3':
  - type: text
    content: 'Ny amin’ny anabaviny, izay mpitovo ka mbola havany akaiky tokoa satria tsy mba nanambady, dia mahazo mandoto tena ny mpisorona amin’ny fikasihana ny fatiny. '
  '4':
  - type: text
    content: Noho izy loham-pianakaviany, dia aoka ny mpisorona tsy handoto tena amin’ny fikasihana faty hafa
  - type: note
    content: 'Noho izy...faty hafa, satria: manjavozavo ny rijan-teny hebreo etoana; dkt hafa Na dia ho an’ny filoham-pireneny aza, dia aoka ny mpisorona tsy handoto tena amin’ny fikasiham-paty, satria.'
  - type: text
    content: ', satria manala baràka azy izany.'
  '5':
  - type: text
    content: «Rehefa misaona izy mpisorona, dia tsy hanasola ny tampon-dohany na hanàratra ny volon-tavany na handradratra ny tenany
  - type: note
    content: Jereo 19.27-28 sy nta.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Voatokana hanompo Ahy izy, ka tsy hanala baràka ny anarako, satria izy no mpanolotra ny '
  - type: text
    content: sorona
  - type: text
    content: ' levonina amin’ny afo, dia ny sakafo aroso ho Ahy TOMPO Andriamaniny; noho izany, tokony hitandro ny maha olona voatokana azy ny mpisorona.'
  '7':
  - type: text
    content: '«Aoka ny mpisorona tsy hanambady vehivavy mpijangajanga na novetaina na efa nariam-badiny, noho izy voatokana hanompo Ahy. '
  '8':
  - type: text
    content: Ianareo Israelita kosa dia aoka hihevitra ny mpisorona ho olona voatokana, satria ny sakafo aroso ho Ahy Andriamanitrareo no atolony. Eny, aminareo ny mpisorona dia ho olona voatokana; satria Izaho TOMPO, Izay nanokana anareo Israelita ho vahoakako, dia masina.
  '9':
  - type: text
    content: «Raha ny zanakavavin’ny mpisorona no manala baràka tena amin’ny fijangajangana, dia manala baràka ny rainy koa izy, ka hodorana.
