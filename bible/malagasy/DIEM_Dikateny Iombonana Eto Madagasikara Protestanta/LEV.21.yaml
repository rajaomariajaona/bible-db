  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Aoka ny mpisorona tsy hanambady vehivavy mpijangajanga na novetaina na efa nariam-badiny, noho izy voatokana hanompo Ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ianareo Israelita kosa dia aoka hihevitra ny mpisorona ho olona voatokana, satria ny sakafo aroso ho Ahy Andriamanitrareo no atolony. Eny, aminareo ny mpisorona dia ho olona voatokana; satria Izaho TOMPO, Izay nanokana anareo Israelita ho vahoakako, dia masina.
  '9':
  - type: usfm
