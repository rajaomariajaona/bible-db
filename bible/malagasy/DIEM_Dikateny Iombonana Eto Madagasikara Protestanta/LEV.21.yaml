  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’ny anabaviny, izay mpitovo ka mbola havany akaiky tokoa satria tsy mba nanambady, dia mahazo mandoto tena ny mpisorona amin’ny fikasihana ny fatiny. '
  '4':
