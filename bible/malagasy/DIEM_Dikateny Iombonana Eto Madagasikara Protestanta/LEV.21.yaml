  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany, rehefa misaona izy, dia aoka tsy hiala ny faritra masina, fandao hanazimba ny Toeramasina onenako; satria ny menaka nahosotro azy no efa nanokanako azy hanompo Ahy. Izaho no TOMPO.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Aoka ho vehivavy virijiny no halain’ny mpisorombe ho vady. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vehivavy maty vady, na nariam-bady, na novetaina, na mpijangajanga, dia tsy azony alaina ho vady; fa vehivavy virijiny, anisan’ny fianakavia-mpisorona, no halain’ny mpisorombe. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’izay, dia tsy ho afa-baràka ny ankohonany eo anivon’ny fianakaviamben’ny mpisorona, Satria Izaho no TOMPO Izay efa nanokana ny mpisorombe hanompo Ahy.»
  - type: usfm
