document_id: EXO.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: MANAO FANEKEMPIHAVANANA AMIN’I ISRAELY ANDRIAMANITRA
  - type: heading
    content: Mandroso fanekempihavanana amin’i Israely ny TOMPO
  - type: text
    content: 'Ny andro voalohany tamin’ny volana fahatelo taorian’ny nialan’ny Israelita tany Ejipta no nahatongavany tao an-taniefitr’i Sinay. '
  '10':
  - type: text
    content: 'Hoy indray ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Miverena any amin’ny vahoaka, ka ilazao izy mba hanoman-tena anio sy rahampitso; ary ampanasao azy koa ny fitafiany. '
  '11':
  - type: text
    content: 'Aoka izy ho vonona ho amin’ny rahafakampitso, fa amin’io andro io dia ho hitan’ny vahoaka rehetra hidina eo an-tendrombohitra Sinay AHO. '
  '12':
  - type: text
    content: 'Farito ny manodidina ny tendrombohitra, ka asaovy mitandrina ny olona mba tsy hianika ny tendrombohitra na hanatona ny sisiny akory, fa izay rehetra manatona ny tendrombohitra dia hatao maty. '
  '13':
  - type: text
    content: Tsy havela ho velona na olona na biby; ary tsy hokasihina akory izy fa hotoraham-bato na hasiana tsipîka. Fa rehefa maneno ny anjombona, vao mahazo miakatra eny an-tendrombohitra ny olona sasany
  - type: note
    content: 'ny olona sasany: jereo 24.1, 9-11 –And 12-13: jereo Heb 12.18-20.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Dia nidina avy tao an-tendrombohitra ho eny amin’ny vahoaka indray i Mosesy. Nasainy nanoman-tena sy nanasa ny fitafiany ireo. '
  '15':
  - type: text
    content: 'Ary hoy izy taminy:'
  - type: text
    content: –Miomàna ianareo ho amin’ny rahafakampitso. Aza mikasika vehivavy akory!
  '16':
  - type: text
    content: Nony afakampitso, vao maraina be, dia nisy kotro-baratra sy tselatra ary rahona matevina teny an-tendrombohitra
  - type: note
    content: 'kotro-baratra sy tselatra: jereo Apôk 4.5. –rahona: jereo 13.21 sy nta.'
  - type: text
    content: '. Injany nisy feon’anjomara naneno mafy; koa tora-kovitra ny vahoaka rehetra tao an-toby. '
  '17':
  - type: text
    content: Nasain’i Mosesy nivoaka avy teo an-toby ny Israelita mba hihaona amin’Andriamanitra, ka nijanona teo am-pototry ny tendrombohitra ireo.
  '18':
  - type: text
    content: 'Nidona-tsetroka ny tendrombohitra Sinay satria tanaty afo no nidinan’ny TOMPO nankeo amboniny; ary ny setroka dia niakatra toy ny avy ao amin’ny lafaoro lehibe ka nihovitrovitra ny tendrombohitra manontolo. '
  '19':
  - type: text
    content: 'Nihamafy hatrany ny feon’ny anjomara sady nihalava reny. Ary rehefa niteny tamin’Andriamanitra i Mosesy, dia novaliany tao anaty kotroka. '
  '2':
  - type: text
    content: Niala tao Refidima
  - type: note
    content: 'Refidima: jereo 17.1 sy nta.'
  - type: text
    content: ' manko izy ireo ka nitsofoka tao an-taniefitr’i Sinay, dia nitoby tao an-taniefitra, tandrifin’ny tendrombohitra Sinay. '
  '20':
  - type: text
    content: 'Nidina nankeo an-tampon’ny tendrombohitra Sinay ny TOMPO, ary niantso an’i Mosesy hiakatra teo; dia niakatra i Mosesy. '
  '21':
  - type: text
    content: 'Ary hoy ny TOMPO taminy:'
  - type: text
    content: '–Ndeha midina ianao hampitandrina ny vahoaka fandrao hirohotra hijery AHY izy ka ho maro no ho faty aminy. '
  '22':
  - type: text
    content: Na dia ny mpisorona izay mahazo manatona AHY aza dia tsy maintsy hanoman-tena fandrao mahafaty azy AHO.
  '23':
  - type: text
    content: 'Ary hoy i Mosesy tamin’ny TOMPO:'
  - type: text
    content: –Tsy afaka hiakatra eto Sinay ny vahoaka, satria Ianao ihany no efa nandidy anay mba hamaritra ny tendrombohitra ka hanavaka azy.
  '24':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Ndeha midina ianao, ka ento miakatra miaraka aminao i Aharôna. Nefa aoka ireo mpisorona sy ny vahoaka tsy hirohotra hiakatra atỳ amiko, fandrao hamely azy ho faty Aho.
  '25':
  - type: text
    content: Dia nidina nankeo amin’ny vahoaka i Mosesy ary niteny taminy.
  '3':
  - type: text
    content: Ary niakatra ny tendrombohitra i Mosesy hihaona amin’Andriamanitra.
  - type: text
    content: 'Dia niantso an’i Mosesy avy tao an-tampon-tendrombohitra ny TOMPO ka nanao taminy hoe:'
  - type: text
    content: '–Izao no hambaranao amin’ny taranak’i Jakôba, dia ny Israelita. '
  '4':
  - type: text
    content: '«Efa hitanareo izay nanaovako ny Ejiptianina, efa hitanareo koa ny nitondrako anareo atỳ ho eto anilako toy ny itondran’ny voromahery ny zanany eo amin’ny elany. '
  '5':
  - type: text
    content: 'Koa ankehitriny, raha mihaino tsara izay lazaiko ianareo ka manaja ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ', dia hanjary vahoaka sarobidy manokana ho Ahy eo amin’ny firenena rehetra. Fa Ahy manko ny tany manontolo, '
  '6':
  - type: text
    content: saingy ianareo kosa dia ho fanjaka-mpisorona
  - type: note
    content: 'fanjaka-mpisorona dia enti-manondro vahoaka iray nampisahanina andraikitra maha mpisorona, izany hoe andraikitra maha mpanelanelana eo amin’Andriamanitra sy ireo firenen-kafa, na koa enti-milaza vahoaka iray tapahin’ny mpisorona fa tsy entin’ny mpanjaka. –And 5-6: jereo Deot 4.20; 7.6; 14.2; 26.18; Tit 2.14; 1 Pt 2.9; Apôk 1.6; 5.10.'
  - type: text
    content: ' ho Ahy, ho firenena voatokana hanompo Ahy.» Ireo no teny izay hambaranao amin’ny Israelita.'
  '7':
  - type: text
    content: 'Niverina teo an-toby i Mosesy, nampiantso ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely ary nampita tamin’izy ireo ny zavatra rehetra izay nandidian’ny TOMPO azy. '
  '8':
  - type: text
    content: 'Namaly indray miredona ny vahoaka manontolo nanao hoe:'
  - type: text
    content: –Izay rehetra nandidian’ny TOMPO dia hataonay!
  - type: text
    content: 'Dia notaterin’i Mosesy tamin’ny TOMPO ny valin-tenin’ny Israelita. '
  '9':
  - type: text
    content: 'Koa hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Indro hankeo aminao Aho, hiafina ao anatin’ny rahona
  - type: note
    content: 'rahona: jereo 13.21 sy nta.'
  - type: text
    content: ' matevina, mba handrenesan’ny Israelita Ahy miresaka aminao, ka hatokiany anao hatrany hatrany.'
  - type: text
    content: Dia naverin’i Mosesy teo anatrehan’ny TOMPO ny valin-tenin’ny vahoaka.
  - type: heading
    content: Mihaona amin’i Mosesy eo an-tendrombohitra Sinay ny TOMPO
