document_id: EXO.19
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: MANAO FANEKEMPIHAVANANA AMIN’I ISRAELY ANDRIAMANITRA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandroso fanekempihavanana amin’i Israely ny TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny andro voalohany tamin’ny volana fahatelo taorian’ny nialan’ny Israelita tany Ejipta no nahatongavany tao an-taniefitr’i Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Niala tao Refidima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Refidima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 17.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' manko izy ireo ka nitsofoka tao an-taniefitr’i Sinay, dia nitoby tao an-taniefitra, tandrifin’ny tendrombohitra Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary niakatra ny tendrombohitra i Mosesy hihaona amin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niantso an’i Mosesy avy tao an-tampon-tendrombohitra ny TOMPO ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no hambaranao amin’ny taranak’i Jakôba, dia ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Efa hitanareo izay nanaovako ny Ejiptianina, efa hitanareo koa ny nitondrako anareo atỳ ho eto anilako toy ny itondran’ny voromahery ny zanany eo amin’ny elany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa ankehitriny, raha mihaino tsara izay lazaiko ianareo ka manaja ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanako
  - type: text
    text: ', dia hanjary vahoaka sarobidy manokana ho Ahy eo amin’ny firenena rehetra. Fa Ahy manko ny tany manontolo, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: saingy ianareo kosa dia ho fanjaka-mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanjaka-mpisorona '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia enti-manondro vahoaka iray nampisahanina andraikitra maha mpisorona, izany hoe andraikitra maha mpanelanelana eo amin’Andriamanitra sy ireo firenen-kafa, na koa enti-milaza vahoaka iray tapahin’ny mpisorona fa tsy entin’ny mpanjaka. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –And 5-6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Deot 4.20; 7.6; 14.2; 26.18; Tit 2.14; 1 Pt 2.9; Apôk 1.6; 5.10.'
    marker-yv: yv-n
  - type: text
    text: ' ho Ahy, ho firenena voatokana hanompo Ahy.» Ireo no teny izay hambaranao amin’ny Israelita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Niverina teo an-toby i Mosesy, nampiantso ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely ary nampita tamin’izy ireo ny zavatra rehetra izay nandidian’ny TOMPO azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Namaly indray miredona ny vahoaka manontolo nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izay rehetra nandidian’ny TOMPO dia hataonay!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia notaterin’i Mosesy tamin’ny TOMPO ny valin-tenin’ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro hankeo aminao Aho, hiafina ao anatin’ny rahona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'rahona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' matevina, mba handrenesan’ny Israelita Ahy miresaka aminao, ka hatokiany anao hatrany hatrany.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia naverin’i Mosesy teo anatrehan’ny TOMPO ny valin-tenin’ny vahoaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihaona amin’i Mosesy eo an-tendrombohitra Sinay ny TOMPO
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy indray ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Miverena any amin’ny vahoaka, ka ilazao izy mba hanoman-tena anio sy rahampitso; ary ampanasao azy koa ny fitafiany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aoka izy ho vonona ho amin’ny rahafakampitso, fa amin’io andro io dia ho hitan’ny vahoaka rehetra hidina eo an-tendrombohitra Sinay AHO. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Farito ny manodidina ny tendrombohitra, ka asaovy mitandrina ny olona mba tsy hianika ny tendrombohitra na hanatona ny sisiny akory, fa izay rehetra manatona ny tendrombohitra dia hatao maty. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy havela ho velona na olona na biby; ary tsy hokasihina akory izy fa hotoraham-bato na hasiana tsipîka. Fa rehefa maneno ny anjombona, vao mahazo miakatra eny an-tendrombohitra ny olona sasany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny olona sasany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 24.1, 9-11 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –And 12-13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Heb 12.18-20.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nidina avy tao an-tendrombohitra ho eny amin’ny vahoaka indray i Mosesy. Nasainy nanoman-tena sy nanasa ny fitafiany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miomàna ianareo ho amin’ny rahafakampitso. Aza mikasika vehivavy akory!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nony afakampitso, vao maraina be, dia nisy kotro-baratra sy tselatra ary rahona matevina teny an-tendrombohitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kotro-baratra sy tselatra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Apôk 4.5. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: rahona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 13.21 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. Injany nisy feon’anjomara naneno mafy; koa tora-kovitra ny vahoaka rehetra tao an-toby. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nasain’i Mosesy nivoaka avy teo an-toby ny Israelita mba hihaona amin’Andriamanitra, ka nijanona teo am-pototry ny tendrombohitra ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nidona-tsetroka ny tendrombohitra Sinay satria tanaty afo no nidinan’ny TOMPO nankeo amboniny; ary ny setroka dia niakatra toy ny avy ao amin’ny lafaoro lehibe ka nihovitrovitra ny tendrombohitra manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nihamafy hatrany ny feon’ny anjomara sady nihalava reny. Ary rehefa niteny tamin’Andriamanitra i Mosesy, dia novaliany tao anaty kotroka. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nidina nankeo an-tampon’ny tendrombohitra Sinay ny TOMPO, ary niantso an’i Mosesy hiakatra teo; dia niakatra i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy ny TOMPO taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ndeha midina ianao hampitandrina ny vahoaka fandrao hirohotra hijery AHY izy ka ho maro no ho faty aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Na dia ny mpisorona izay mahazo manatona AHY aza dia tsy maintsy hanoman-tena fandrao mahafaty azy AHO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy i Mosesy tamin’ny TOMPO:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy afaka hiakatra eto Sinay ny vahoaka, satria Ianao ihany no efa nandidy anay mba hamaritra ny tendrombohitra ka hanavaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha midina ianao, ka ento miakatra miaraka aminao i Aharôna. Nefa aoka ireo mpisorona sy ny vahoaka tsy hirohotra hiakatra atỳ amiko, fandrao hamely azy ho faty Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia nidina nankeo amin’ny vahoaka i Mosesy ary niteny taminy.
