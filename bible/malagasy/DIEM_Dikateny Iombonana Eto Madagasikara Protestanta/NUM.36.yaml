document_id: NUM.36,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Lalàna momba ny fanambadian’ny vehivavy izay mandova
  - type: text
    content: 'Nisy nanatona an’i Mosesy sy ny filohan’ny foko israelita ireo taranak’i Jôsefa, dia ny loham-pianakaviana avy amin’ny tarik’i Gilehada zanakalahin’i Makira sady zafikelin’i Manase, '
  '10':
  - type: text
    content: 'Dia nataon’ny zanakavavin’i Tselôfehada araka izay nandidian’ny TOMPO an’i Mosesy izany, '
  '11':
  - type: text
    content: 'ka i Mahelà sy i Tiritsà, i Hôglà sy i Milkà ary i Nôhà dia samy nanambady ny zanakalahin-drahalahin-drainy avy; '
  '12':
  - type: text
    content: izany hoe lehilahy taranak’i Manase, zanakalahin’i Jôsefa, ihany no fanambadian’ireo; ka tafajanona tamin’ny fokon-drainy ihany ny zara tany izay nolovany.
  '13':
  - type: text
    content: Ireo no didy amam-pitsipika nomen’ny TOMPO ny Israelita tamin’ny alalan’i Mosesy tao amin’ny lemak’i Môaba, teo amoron’i Jôrdàna tandrifin’i Jerikao.
  '2':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: –Efa nodidian’ny TOMPO hizara antsapaka ny tany ho an’ny Israelita ianao, ry Mosesy, ary efa nodidiany ihany koa hanome ny zara tanin’i Tselôfehada rahalahinay ho an’ny zanakavaviny
  - type: note
    content: Jereo 27.1-11.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Raha manambady lehilahy avy amin’ny foko israelita hafa ireo vehivavy ireo, dia hoesorina amin’ny zara tanin-drazanay ny zara taniny ka hanampy ny anjaran’ny foko izay hidirany izany, ary dia hampihena ny anjara izay azonay tamin’ny antsapaka. '
  '4':
  - type: text
    content: Rehefa tonga manko ny taon-jôbily
  - type: note
    content: Jereo Lev 25.8-54.
  - type: text
    content: ' ho an’ny Israelita, ny zara tanin’ireo zanakavavin’i Tselôfehada dia hanampy ny an’ny foko izay hidirany, ary hoesorina tanteraka amin’ny zara tany azon’ny razanay.'
  '5':
  - type: text
    content: 'Dia nanome izao didy izao araka ny tenin’ny TOMPO i Mosesy ka nanao hoe:'
  - type: text
    content: '–Marina ny an’ireto taranak’i Jôsefa ireto. '
  '6':
  - type: text
    content: 'Izao no teny izay nandidian’ny TOMPO momba ny zanakavavin’i Tselôfehada: aoka izy hanambady izay tiany, nefa lehilahy ao amin’ny tarika nisy an-drainy ihany no hovadîny. '
  '7':
  - type: text
    content: 'Amin’izay dia tsy hisy zara tany hifindra foko eo amin’ny Israelita, fa samy ho eo amin’ny zara tany azon’ny fokon-drainy avy no hifikiran’ny Israelita. '
  '8':
  - type: text
    content: 'Ny tovovavy rehetra, izay handova eo amin’ny foko israelita anankiray, dia hanambady lehilahy ao amin’ny tarika nisy an-drainy ihany. Izay no hitazonan’ny Israelita tsirairay avy ny zara tany azon’ny razany; '
  '9':
  - type: text
    content: ary tsy hisy zara tany hifindra foko, fa samy ho eo amin’ny zara taniny avy no hifikiran’ny foko israelita.
