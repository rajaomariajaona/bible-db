document_id: NUM.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna momba ny fanambadian’ny vehivavy izay mandova
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy nanatona an’i Mosesy sy ny filohan’ny foko israelita ireo taranak’i Jôsefa, dia ny loham-pianakaviana avy amin’ny tarik’i Gilehada zanakalahin’i Makira sady zafikelin’i Manase, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nodidian’ny TOMPO hizara antsapaka ny tany ho an’ny Israelita ianao, ry Mosesy, ary efa nodidiany ihany koa hanome ny zara tanin’i Tselôfehada rahalahinay ho an’ny zanakavaviny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 27.1-11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha manambady lehilahy avy amin’ny foko israelita hafa ireo vehivavy ireo, dia hoesorina amin’ny zara tanin-drazanay ny zara taniny ka hanampy ny anjaran’ny foko izay hidirany izany, ary dia hampihena ny anjara izay azonay tamin’ny antsapaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rehefa tonga manko ny taon-jôbily
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 25.8-54.
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny Israelita, ny zara tanin’ireo zanakavavin’i Tselôfehada dia hanampy ny an’ny foko izay hidirany, ary hoesorina tanteraka amin’ny zara tany azon’ny razanay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanome izao didy izao araka ny tenin’ny TOMPO i Mosesy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Marina ny an’ireto taranak’i Jôsefa ireto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no teny izay nandidian’ny TOMPO momba ny zanakavavin’i Tselôfehada: aoka izy hanambady izay tiany, nefa lehilahy ao amin’ny tarika nisy an-drainy ihany no hovadîny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Amin’izay dia tsy hisy zara tany hifindra foko eo amin’ny Israelita, fa samy ho eo amin’ny zara tany azon’ny fokon-drainy avy no hifikiran’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny tovovavy rehetra, izay handova eo amin’ny foko israelita anankiray, dia hanambady lehilahy ao amin’ny tarika nisy an-drainy ihany. Izay no hitazonan’ny Israelita tsirairay avy ny zara tany azon’ny razany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary tsy hisy zara tany hifindra foko, fa samy ho eo amin’ny zara taniny avy no hifikiran’ny foko israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nataon’ny zanakavavin’i Tselôfehada araka izay nandidian’ny TOMPO an’i Mosesy izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka i Mahelà sy i Tiritsà, i Hôglà sy i Milkà ary i Nôhà dia samy nanambady ny zanakalahin-drahalahin-drainy avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: izany hoe lehilahy taranak’i Manase, zanakalahin’i Jôsefa, ihany no fanambadian’ireo; ka tafajanona tamin’ny fokon-drainy ihany ny zara tany izay nolovany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ireo no didy amam-pitsipika nomen’ny TOMPO ny Israelita tamin’ny alalan’i Mosesy tao amin’ny lemak’i Môaba, teo amoron’i Jôrdàna tandrifin’i Jerikao.
