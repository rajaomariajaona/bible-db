document_id: JOB.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valin-teny farany nataon’i Jôba: E! ireo andro soa fahiny!'
  - type: text
    content: 'Dia mbola nandahatra ihany i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Tankina koa ny feon’ireo mpanapaka
  - type: text
    content: ka toa niraikitra tamin’ny lanilany ny lelany.
  - type: heading
    content: '*'
  '11':
  - type: text
    content: Izay nandre dia nidera ahy;
  - type: text
    content: ary izay nahita dia samy nankasitraka.
  '12':
  - type: text
    content: Satria novonjeko ny mahantra
  - type: text
    content: izay nitaraina tamiko
  - type: text
    content: ary koa ny kamboty
  - type: text
    content: tsy nanan-kianteherana.
  '13':
  - type: text
    content: Tonga tamiko ny tsodranon’ny miala aina
  - type: text
    content: ary dia nampifalifaliako ny fon’ny mpitondratena.
  '14':
  - type: text
    content: Ny fahamarinana no akanjo fanaovako,
  - type: text
    content: ny fitandroako ny rariny no ihaingako
  - type: text
    content: tahaka ny lamba sy toy ny fehiloha.
  '15':
  - type: text
    content: Nanjary maso ho an’ny jamba aho
  - type: text
    content: ary tongotra ho an’ny malemy.
  '16':
  - type: text
    content: Eny efa tonga ray ho an’ny mahantra aho;
  - type: text
    content: ary nandray an-tanana ny olan’ireo vahiny.
  '17':
  - type: text
    content: Nomontsaniko ny valanoranon’ny olon-dratsy
  - type: text
    content: hanafahako izay voagejan’ny nifiny.
  '18':
  - type: text
    content: 'Dia hoy aho hoe: «Ato amin’ny akaniko'
  - type: text
    content: no hialako aina toy ny feniksa
  - type: note
    content: ny feniksa dia vorona fatratra loatra voalazan’ny angano fa niaina an-jato taona maro. Dia nodorana niaraka tamin’ny akaniny, kanefa afaka nitsangana indray tamin’ny lavenony. Ny tapany faharoa amin’ny andininy dia misy mandika hoe Ho maro tahaka ny fasika ny androko.
  - type: text
    content: ka hahamaro ny androm-piainako indray.
  '19':
  - type: text
    content: Tahaka ny hazo manana faka azon-drano aho,
  - type: text
    content: sady manana ny ravin-drantsana
  - type: text
    content: izay handrian’ny ando amin’ny alina.
  '2':
  - type: text
    content: Iza re no hamerina amiko indray ireny volana taloha
  - type: text
    content: izay niainako teo ambany fiarovan’Andriamanitra,
  '20':
  - type: text
    content: Hohavaozina tsy tapaka ny voninahitro
  - type: text
    content: ary ho toy ny tsipîka voahenjana ny heriko.»
  - type: heading
    content: '*'
  '21':
  - type: text
    content: Nihaino ahy tamim-panantenana ny olona,
  - type: text
    content: ka samy nangina teo am-pandraisana ny hevitro.
  '22':
  - type: text
    content: Rehefa niteny aho dia tsy nisy namaly intsony,
  - type: text
    content: ary nanenika azy tsikelikely ny teniko.
  '23':
  - type: text
    content: Niandry ahy toy ny fiandry ranonorana izy,
  - type: text
    content: ary toy ny mitanatana vava
  - type: text
    content: miandrandra ny oran-dohataona.
  '24':
  - type: text
    content: Raha nisy nila ho ketraky ny hakiviana ireo,
  - type: text
    content: dia notolorako tsiky fampaherezana
  - type: text
    content: ary tsy nahamaloka ny fahazavan’ny tavako.
  '25':
  - type: text
    content: Nitarika azy sy nanoro lalana azy aho,
  - type: text
    content: ka nahavatra niara-nitoetra taminy
  - type: text
    content: toy ny mpanjaka milasy miaraka amin’ny tafiny
  - type: text
    content: na toy ny olona mampionona ny tra-pahoriana.
  '3':
  - type: text
    content: fony mbola nirehitra teo ambony lohako ny jirony
  - type: text
    content: ka ny fahazavàny no nitari-dalana ahy tamin’ny alina?
  '4':
  - type: text
    content: Tao anatin’ny andro fanambinana aho tamin’izay
  - type: text
    content: ary narovan’ny fisakaizan’Andriamanitra ny fonenako,
  '5':
  - type: text
    content: fony mbola niaraka tamiko ilay Tsitoha
  - type: text
    content: ary nanodidina ahy ireo zanakalahiko.
  '6':
  - type: text
    content: Tamin’izay no nilomanosako
  - type: text
    content: tao anatin’ny harena miavosa
  - type: text
    content: sy nikorianan’ny diloilo ho ahy
  - type: text
    content: avy amin’ny vato famiazana ôliva.
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Raha nankeny am-bavahadin’ny tanàna aho
  - type: text
    content: ka nandray ny toerako teo an-kianja
  - type: note
    content: Ny filankevitry ny tanàna dia nipetraka teo an-kianja nanoloana ny vavahadin’ny tanàna, ka afa-manao asam-pitsarana izy.
  - type: text
    content: ','
  '8':
  - type: text
    content: dia nahita ahy ny tanora ka nitsoatsoaka,
  - type: text
    content: ary ny antitra nitsangana ka nijaridina teo.
  '9':
  - type: text
    content: Nangina tsy nahateny ny lehibe
  - type: text
    content: fa nitampim-bava fotsiny.
