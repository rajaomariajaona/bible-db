document_id: JOB.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Valin-teny farany nataon’i Jôba: E! ireo andro soa fahiny!'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia mbola nandahatra ihany i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Iza re no hamerina amiko indray ireny volana taloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay niainako teo ambany fiarovan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: fony mbola nirehitra teo ambony lohako ny jirony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny fahazavàny no nitari-dalana ahy tamin’ny alina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tao anatin’ny andro fanambinana aho tamin’izay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary narovan’ny fisakaizan’Andriamanitra ny fonenako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fony mbola niaraka tamiko ilay Tsitoha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanodidina ahy ireo zanakalahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tamin’izay no nilomanosako
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao anatin’ny harena miavosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nikorianan’ny diloilo ho ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny vato famiazana ôliva.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha nankeny am-bavahadin’ny tanàna aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandray ny toerako teo an-kianja
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny filankevitry ny tanàna dia nipetraka teo an-kianja nanoloana ny vavahadin’ny tanàna, ka afa-manao asam-pitsarana izy.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia nahita ahy ny tanora ka nitsoatsoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny antitra nitsangana ka nijaridina teo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nangina tsy nahateny ny lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nitampim-bava fotsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tankina koa ny feon’ireo mpanapaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka toa niraikitra tamin’ny lanilany ny lelany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay nandre dia nidera ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay nahita dia samy nankasitraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Satria novonjeko ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nitaraina tamiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa ny kamboty
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nanan-kianteherana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tonga tamiko ny tsodranon’ny miala aina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary dia nampifalifaliako ny fon’ny mpitondratena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fahamarinana no akanjo fanaovako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitandroako ny rariny no ihaingako
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny lamba sy toy ny fehiloha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nanjary maso ho an’ny jamba aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tongotra ho an’ny malemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eny efa tonga ray ho an’ny mahantra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandray an-tanana ny olan’ireo vahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nomontsaniko ny valanoranon’ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanafahako izay voagejan’ny nifiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy aho hoe: «Ato amin’ny akaniko'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hialako aina toy ny feniksa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny feniksa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia vorona fatratra loatra voalazan’ny angano fa niaina an-jato taona maro. Dia nodorana niaraka tamin’ny akaniny, kanefa afaka nitsangana indray tamin’ny lavenony. Ny tapany faharoa amin’ny andininy dia misy mandika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ho maro tahaka ny fasika ny androko.
    marker-yv: yv-n
  - type: text
    text: ka hahamaro ny androm-piainako indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tahaka ny hazo manana faka azon-drano aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manana ny ravin-drantsana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay handrian’ny ando amin’ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hohavaozina tsy tapaka ny voninahitro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho toy ny tsipîka voahenjana ny heriko.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nihaino ahy tamim-panantenana ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka samy nangina teo am-pandraisana ny hevitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rehefa niteny aho dia tsy nisy namaly intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanenika azy tsikelikely ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Niandry ahy toy ny fiandry ranonorana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny mitanatana vava
- type: usfm
  marker: q1
  children:
  - type: text
    text: miandrandra ny oran-dohataona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha nisy nila ho ketraky ny hakiviana ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia notolorako tsiky fampaherezana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nahamaloka ny fahazavan’ny tavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nitarika azy sy nanoro lalana azy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahavatra niara-nitoetra taminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny mpanjaka milasy miaraka amin’ny tafiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: na toy ny olona mampionona ny tra-pahoriana.
