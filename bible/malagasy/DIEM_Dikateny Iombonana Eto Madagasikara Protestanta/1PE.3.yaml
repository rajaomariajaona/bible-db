document_id: 1PE.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Andraikitry ny mpivady
  - type: text
    content: Toy izany koa, ianareo vehivavy, maneke ny vadinareo
  - type: note
    content: Ampit Ef 5.22; Kôl 3.18.
  - type: text
    content: '; ka raha tàhiny misy tsy mety mino ny tenin’Andriamanitra, dia mba ho voataonan’ny fitondrantenan’ny vavy izy; na tsy misy teny lazainareo aza, dia ho voataona izy '
  '10':
  - type: text
    content: 'Fa izao no tenin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Izay te hankamamy fiainana
  - type: text
    content: sy te hahita andro soa,
  - type: text
    content: aoka izy hitsaha-miteny ratsy
  - type: text
    content: ary hitsaha-milaza fitaka;
  '11':
  - type: text
    content: aoka izy hiala amin’ny ratsy ka hanao soa,
  - type: text
    content: aoka hitady fihavanana tsy an-kiato;
  '12':
  - type: text
    content: satria ny Tompo dia mitsinjo ny olo-marina
  - type: text
    content: sy mihaino ny fitarainany,
  - type: text
    content: fa tezitra kosa amin’ny mpanao ratsy
  - type: note
    content: 'And 10-12: Sal 34.13-17, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  - type: heading
    content: Eo anatrehan’ny fanenjehana
  '13':
  - type: text
    content: 'Iza no hanisy ratsy anareo, raha mazoto amin’ny tsara ianareo? '
  '14':
  - type: text
    content: Raha tàhiny manao ny marina aza ianareo no ampahorîna, dia sambatra
  - type: note
    content: 'Raha tàhiny... sambatra: ampit Mt 5.10. – And 14-15: ampit Is 8.12-13.'
  - type: text
    content: '. Aza matahotra izay fandrahonan’ny olona, ary aza mangorohoro amin’izany; '
  '15':
  - type: text
    content: 'fa i '
  - type: text
    content: Kristy
  - type: text
    content: ' no hajao ho Tompo ao am-ponareo. Aoka ho vonona mandrakariva ianareo hamaly izay rehetra manontany anareo ny amin’ny fanantenana ao anatinareo, '
  '16':
  - type: text
    content: 'saingy ataovy amin-kalemem-panahy sy amim-panajana izany. Manàna fieritreretana mahitsy; ka rehefa misy zavatra anendrikendrehana anareo, dia ho menatra izay mpanaratsy ny fitondrantena tsara anentanan’i Kristy anareo. '
  '17':
  - type: text
    content: 'Eny, raha izany no sitrapon’Andriamanitra, dia aleo mitondra fahoriana amin’ny fanaovan-tsoa toy izay amin’ny fanaovan-dratsy. '
  '18':
  - type: text
    content: 'Fa i Kristy koa dia efa maty indray mandeha monja ho fanalana ny ota: ny Marina no efa maty hamonjy ny tsy marina, mba hitondra antsika ho amin’Andriamanitra. Novonoina tao amin’ny nofo i Kristy, fa novelomina araka ny Fanahy Masina'
  - type: note
    content: 'efa maty: misy stf sasany ahitana hoe efa nijaly, ary misy koa manampy hoe ho anareo. –hitondra antsika: misy stf sasany ahitana hoe hitondra anareo. –araka ny Fanahy Masina: ampit Rm 1.4.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Nombàn’ny Fanahy Masina Izy ka lasa nitoriteny tamin’ireo fanahy voagadra, '
  '2':
  - type: text
    content: 'rehefa mahita ny fitondrantenanareo madio sy feno fanajana azy. '
  '20':
  - type: text
    content: dia ireo fanahin’ny olona tsy nanaiky an’Andriamanitra, fony Andriamanitra nampiseho ny fahari-pony tamin’ny andro nanamboaran’i Noà ny sambofiara. Olona vitsy ihany anefa, dia i Noà valo mianaka, no tafiditra tao anaty sambofiara ka voavonjy tamin’ny rano
  - type: note
    content: 'tamin’ny rano: jereo Gen 6.1–7.24.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Io rano io no tandindon’ny '
  - type: text
    content: batisa
  - type: text
    content: ' izay amonjena anareo ankehitriny; ka tsy fanesorana lotom-batana ny batisa, fa toky omen’ny fieritreretana madio hitodika amin’Andriamanitra'
  - type: note
    content: 'fa toky omen’ny fieritreretana madio hitodika amin’Andriamanitra: dkt hafa fa angatahana fieritreretana madio amin’Andriamanitra.'
  - type: text
    content: '. Ny batisa no amonjena anareo amin’ny alalan’i Jesoa Kristy tafatsangana ho velona, '
  '22':
  - type: text
    content: 'dia Ilay efa lasa any an-danitra sy mipetraka eo ankavanan’Andriamanitra, ka eken’ny '
  - type: text
    content: anjely
  - type: text
    content: ' sy ny fahefana ary ny hery.'
  '3':
  - type: text
    content: Aoka ny haingonareo tsy ho zavatra ivelany fotsiny, toy ny taovolo sy ny firava-bolamena ary ny didy akanjo
  - type: note
    content: Ampit 1Tim 2.9.
  - type: text
    content: '; '
  '4':
  - type: text
    content: 'fa aoka ny haingonareo ho zavatra miafina ao am-po, dia ny haingo tsy mety simba vokatry ny halemem-panahy sy ny toetra tony: izany no tena sarobidy eo imason’Andriamanitra. '
  '5':
  - type: text
    content: 'Tahaka izany manko ny fihaingon’ireo vehivavy fahiny anisan’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ': sady nanantena an’Andriamanitra izy no nanaiky ny vadiny; '
  '6':
  - type: text
    content: tahaka an’i Sarà izay nanaiky an’i Abrahama sy niantso azy hoe «tompoko
  - type: note
    content: Ampit Gen 18.12.
  - type: text
    content: ». Zanak’i Sarà ianareo, raha mba manao soa ka tsy matahotra izay fampitahorana na inona na inona.
  '7':
  - type: text
    content: Toy izany koa, ianareo lehilahy, mahaiza miara-mitoetra amin’ny vadinareo izay malemy paika kokoa noho ianareo araka ny efa fantatrareo; manehoa fanajana azy
  - type: note
    content: Ampit Ef 5.25; Kôl 3.19.
  - type: text
    content: ' fa mpiombona anjara amin’ilay fiainana nomen’Andriamanitra ianareo mivady. Izany atao, mba tsy hisy zavatra hanampontsampona ny fivavahanareo.'
  - type: heading
    content: Fifampitondran’ny samy iray Fiangonana
  '8':
  - type: text
    content: 'Farany, aoka hiray saina sy hiray fo ianareo rehetra: mifankatiava toy ny mpiray tampo, mahaiza mifangoraka, manetre tena. '
  '9':
  - type: text
    content: Aza mamaly ratsy ny ratsy na mamaly ompa ny ompa; aleo kosa mirary soa
  - type: note
    content: Ampit Mt 5.44.
  - type: text
    content: ', satria ianareo efa nantsoin’Andriamanitra hanana anjara amin’ny soa nampanantenainy. '
