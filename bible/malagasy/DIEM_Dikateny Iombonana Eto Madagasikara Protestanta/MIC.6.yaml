      children:
      - type: text
        text: '14'
    - type: text
      text: Hihinana ianareo nefa tsy ho voky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mbola eo aminareo ihany ny mosary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampirina ianareo nefa tsy hahatahiry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay voatahirinareo aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia holevoniko amin’ny ady.
  '15':
