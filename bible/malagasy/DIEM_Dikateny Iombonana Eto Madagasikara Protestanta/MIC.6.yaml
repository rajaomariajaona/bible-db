  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miampanga ny vahoakany ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: «Mitsangàna Ianao, ry TOMPO!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandahara eo anoloan’ny tendrombohitra.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ny adin’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo ry tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ianareo ry fanorena-matezan’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manana ady amin’ny vahoakany ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny Israelita no ifandaharany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Henoinareo àry izay lazain’ny TOMPO:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Moa hohadinoiko ve ny harena maloto
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nangonin’ny ratsy fanahy ao an-tranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny famarana tsy ampy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zavatra mahatsiravina izany!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Moa heveriko ho madio
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mampiasa mizana mandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mitondra an-kitapo ny vato tsy marina?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mpanao herisetra ny mpanan-karena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ity renivohitra ity;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandainga sy mamitaka ny hafa ireo mponina ao aminy.
  '13':
