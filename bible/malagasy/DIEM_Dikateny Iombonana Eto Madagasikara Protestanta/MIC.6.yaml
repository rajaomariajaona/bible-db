document_id: MIC.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miampanga ny vahoakany ny Tompo
  - type: text
    content: «Mitsangàna Ianao, ry TOMPO!
  - type: text
    content: Mandahara eo anoloan’ny tendrombohitra.»
  - type: text
    content: Mihainoa ny adin’ny TOMPO,
  - type: text
    content: ianareo ry tendrombohitra
  - type: text
    content: sy ianareo ry fanorena-matezan’ny tany,
  - type: text
    content: fa manana ady amin’ny vahoakany ny TOMPO;
  - type: text
    content: ny Israelita no ifandaharany.
  - type: text
    content: 'Henoinareo àry izay lazain’ny TOMPO:'
  '10':
  - type: text
    content: Moa hohadinoiko ve ny harena maloto
  - type: text
    content: nangonin’ny ratsy fanahy ao an-tranony
  - type: text
    content: sy ny famarana tsy ampy?
  - type: text
    content: Zavatra mahatsiravina izany!
  '11':
  - type: text
    content: Moa heveriko ho madio
  - type: text
    content: izay mampiasa mizana mandainga
  - type: text
    content: sy mitondra an-kitapo ny vato tsy marina?
  '12':
  - type: text
    content: Mpanao herisetra ny mpanan-karena
  - type: text
    content: amin’ity renivohitra ity;
  - type: text
    content: ary mandainga sy mamitaka ny hafa ireo mponina ao aminy.
  '13':
  - type: text
    content: Izaho kosa nanomboka nikapoka anareo,
  - type: text
    content: mba handringanana anareo noho ny fahotanareo
  - type: note
    content: 'Izaho... nikapoka anareo: araka ny dkt tranainy maro; fa araka ny TM dia hoe izaho koa nikapoka maharary anareo.'
  - type: text
    content: .
  '14':
  - type: text
    content: Hihinana ianareo nefa tsy ho voky,
  - type: text
    content: fa mbola eo aminareo ihany ny mosary,
  - type: text
    content: Hampirina ianareo nefa tsy hahatahiry;
  - type: text
    content: ary izay voatahirinareo aza
  - type: text
    content: dia holevoniko amin’ny ady.
  '15':
  - type: text
    content: Hamafy ianareo, nefa tsy hijinja;
  - type: text
    content: hanery ôliva, nefa tsy hihosotra menaka;
  - type: text
    content: hanosihosy voaloboka, nefa tsy hisotro divay.
  '16':
  - type: text
    content: Fa tandremanareo fatratra
  - type: text
    content: ny ohatra ratsy nasehon’i Hômrỳ mpanjaka
  - type: text
    content: sy ny fihetsiky ry i Ahaba mianakavy,
  - type: text
    content: ka narahinareo ny fomba amam-panaony.
  - type: text
    content: Noho izany, dia hatolotro horavana
  - type: text
    content: ity renivohitrareo ity
  - type: text
    content: ary ho fihomehezana ianareo mponina ao aminy;
  - type: text
    content: ka ianareo no hitondra ny latsa
  - type: text
    content: mianjady amin’ny vahoakako
  - type: note
    content: 'Hômrỳ: anankiray tamin’ireo mpanjaka tao amin’ny fanjakan’i Israely (1 Mp 16.23-28). Ny zanany lahy atao hoe Ahaba dia nalaza ratsy ho nampiroborobo ny fivavahana tamin’i Bahala (1 Mp 18.17-40). –mianjady amin’ny vahoakako: araka ny RM; fa araka ny Septoazinta dia hoe ataon’ny olona.'
  - type: text
    content: .»
  '3':
  - type: text
    content: «Ry vahoakako, inona moa no nataoko anareo?
  - type: text
    content: ary inona no nanasarako anareo? Valio Aho!
  '4':
  - type: text
    content: Fa nampiakariko avy tany Ejipta ianareo
  - type: text
    content: ary nafahako avy tamin’ny fanandevozana,
  - type: text
    content: ka nirahiko hitarika anareo
  - type: text
    content: i Mosesy sy i Aharôna ary i Miriama
  - type: note
    content: Jereo Eks 15.20-21.
  - type: text
    content: .
  '5':
  - type: text
    content: Ry vahoakako, mba tsarovy
  - type: text
    content: izay nokasain’i Balàka mpanjakan’i Môaba hatao
  - type: text
    content: sy ny navalin’i Bilehama zanakalahin’i Behôra azy,
  - type: text
    content: ary izay niseho hatreo Sitima ka hatrany Gilgala
  - type: note
    content: 'Balàka sy Bilehama: jereo Nom 22–24. –hatreo Sitima ka hatrany Gilgala: jereo Jos 3.1–4.24.'
  - type: text
    content: ','
  - type: text
    content: mba hahafantaranareo asa nanasoavako anareo.»
  - type: heading
    content: Izay takîn’ny Tompo amin’ny olombelona
  '6':
  - type: text
    content: «Inona àry no hoentiko,
  - type: text
    content: rehefa manatona aho hiankohoka
  - type: text
    content: eo anatrehan’ny TOMPO,
  - type: text
    content: Andriamanitra avo indrindra?
  - type: text
    content: Moa zanak’omby iray taona
  - type: text
    content: 'hatao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ve'
  - type: text
    content: no hoentiko rehefa manatona Azy aho?
  '7':
  - type: text
    content: Ho sitraky ny TOMPO ve ny ondrilahy an’arivony
  - type: text
    content: na ny menaka mikoriana toy ny renirano?
  - type: text
    content: Hatolotro Azy ve ny zazalahy voalohan-terako
  - type: text
    content: ho fanalana ny heloka amam-pahotàko?»
  '8':
  - type: text
    content: Tsia, ry olombelona, fa efa nampianarina anao
  - type: text
    content: ny fitondrantena tsara
  - type: text
    content: 'sy izay tadiavin’ny TOMPO aminao:'
  - type: text
    content: dia ny hanao ny rariny
  - type: text
    content: sy handala ny fitiavana
  - type: text
    content: ary ny hanaraka an’Andriamanitrao amim-panetrentena
  - type: note
    content: 'amim-panetrentena: dkt hafa amim-pitandremana.'
  - type: text
    content: .
  '9':
  - type: text
    content: Fahendrena ny manaja ny TOMPO!
  - type: text
    content: 'Miantso ny ao an-drenivohitra Izy manao hoe:'
  - type: text
    content: «Mihainoa, ianareo ry fokon’i Joda
  - type: text
    content: sy ry loholona mivory eto an-drenivohitra
  - type: note
    content: 'Fahendrena ny manaja ny Tompo: misy maizimaizina ihany ny hevitry ny RM. –loholona mivory eto an-drenivohitra notakarina avy amin’ny stf sasany mirakitra ny dkt tranainy grika, fa tsy mazava ny RM. –renivohitra: i Jerosalema izany satria ny fokon’i Joda no voateny eto. –Mihainoa... an-drenivohitra: misy mandika ny RM hoe Henoy ny fanambarana famaizana sy izay lazain’Ilay nanendry azy.'
  - type: text
    content: '!'
