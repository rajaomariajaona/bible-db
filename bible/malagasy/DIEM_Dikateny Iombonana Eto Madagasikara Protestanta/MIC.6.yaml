  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ohatra ratsy nasehon’i Hômrỳ mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fihetsiky ry i Ahaba mianakavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka narahinareo ny fomba amam-panaony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany, dia hatolotro horavana
  - type: usfm
    marker: q1
    children:
    - type: text
