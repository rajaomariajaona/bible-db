      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hamafy ianareo, nefa tsy hijinja;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanery ôliva, nefa tsy hihosotra menaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanosihosy voaloboka, nefa tsy hisotro divay.
  '16':
