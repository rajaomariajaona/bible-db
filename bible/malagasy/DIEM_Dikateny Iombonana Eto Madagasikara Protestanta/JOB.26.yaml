document_id: JOB.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba:'
  - type: heading
    content: famonjena mampalahelo loatra ity omenao ahy!
  - type: text
    content: 'Namaly i Jôba ka nanao tamin’i Bildada hoe:'
  '10':
  - type: text
    content: Hodidininy faribolana ny ranomasimbe,
  - type: text
    content: dia amin’izay mampisaraka ny mazava sy ny maizina.
  '11':
  - type: text
    content: Vao rahonany fotsiny ny andrin’ny lanitra
  - type: text
    content: dia mihozongozona sy tsiravina.
  '12':
  - type: text
    content: Ny heriny no namolahany ny ranomasina,
  - type: text
    content: ary ny fahendreny no handreseny an’i Rahaba
  - type: note
    content: Jereo 7.12 sy nta; ampit 9.13.
  - type: text
    content: .
  '13':
  - type: text
    content: Ny fofonainy no nampahazava ny lanitra,
  - type: text
    content: ary ny tanany no namantsika ilay bibilava mpandositra
  - type: note
    content: Ampit Is 27.1.
  - type: text
    content: .
  '14':
  - type: text
    content: Indreny no ampahany kely amin’ny asany
  - type: text
    content: ary ako malefak’izany no mba rentsika
  - type: text
    content: fa raha ny fikotrokotroky ny heriny,
  - type: text
    content: iza moa no hahatakatra izany?
  '2':
  - type: text
    content: Endrey ny fahaizanao manampy ny osa
  - type: text
    content: sy mampahatanjaka ny miraviravy tanana toa ahy!
  '3':
  - type: text
    content: Endrey ny fahaizanao manolo-tsaina
  - type: text
    content: sy mizara fahendrena mitafotafo
  - type: text
    content: amin’ny adala toy ny tenako izao!
  '4':
  - type: text
    content: Fa iza moa no nampandahatra anao ireo teninao ireo?
  - type: text
    content: Ary fanahin’iza no nampivolana anao toy izany?
  - type: heading
    content: 'Ny fahefàn’Andriamanitra manerana izao rehetra izaoNy and 5-14: dia mamerina ny fotokevitra ao amin’ny 25.2-6. Izany no ilazan’ny sasany fa tohin’ny tena nataon’i Bildada ihany ireo.'
  '5':
  - type: text
    content: Mipararetra ny matoatoa any ambany any,
  - type: text
    content: mihorohoro koa ny ranobe sy ny mponina ao aminy.
  '6':
  - type: text
    content: Mihanjahanja eo anatrehan’Andriamanitra ny toeran’ny maty,
  - type: text
    content: 'ary miharihary eo imasony ny '
  - type: text
    content: hantsam-pahaverezana
  - type: text
    content: .
  '7':
  - type: text
    content: Izy no mamelatra ny lanitra avaratra
  - type: text
    content: eny amin’ny babangoana ambony eny,
  - type: text
    content: ary mampihevaheva ny tany eny ana habakabaka.
  '8':
  - type: text
    content: Angoniny ao amin’ny rahony ny orana
  - type: text
    content: kanefa tsy mampitriatra ny fanambanin-drahona.
  '9':
  - type: text
    content: Takony tsy hitantsika ny tavan’ny volana fenomanana
  - type: note
    content: 'volana fenomanana: araka ny fandikana jiosy tranainy; ny sasany mandika hoe ny sezafiandrianany.'
  - type: text
    content: ','
  - type: text
    content: satria amelarany raho-matevina hanarona azy.
