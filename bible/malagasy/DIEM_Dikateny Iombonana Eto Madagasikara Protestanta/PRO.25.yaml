      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza maika ny hitondra izany am-pitsarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao tsy hitanao izay hatao amin’ny farany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa voaporofon’ny namanao fa ianao no diso.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alamino miaraka amin’ny namanao ny adinao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa aza tsikafonina ny tsiambaratelon’ny hafa;
