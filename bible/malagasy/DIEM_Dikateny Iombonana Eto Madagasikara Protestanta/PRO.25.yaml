  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Izay zavatra hitan’ny masonao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izay... hitan’ny masonao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ireo dkt tranainy izao fampiraisana azy amin’ny andalana manaraka izao. Ny RM dia mampitohy ity tapa-pehezanteny ity amin’ny and 7 ka azo adika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: manan-kaja izay hitan’ny masonao
      - type: usfm
        marker: ft
        children:
