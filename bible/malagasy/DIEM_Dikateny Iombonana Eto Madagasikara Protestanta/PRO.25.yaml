document_id: PRO.25,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indreto koa no ohabolan’i Salômôna voaangon’ny olon’i Hezekià mpanjakan’i Joda.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ohabolana isan-karazany
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: fandrao izay mandre hanome tsiny anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia ho afa-baràka mandrakizay ianao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Toy ny paoma volamena voahaingo volafotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hasarobidin’ny teny lazaina amin’ny ilàna azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Toy ny kavina sy rojo volamena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hasoan’ny anatry ny hendry amin’izay mihaino.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mamelombelona aina ny hatsiakan’ny rano mamanala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fotoam-pijinjana mafana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamelombelona aina toy izany koa ny iraka mahatoky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny tompony naniraka azy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tahaka ny rahona sy rivotra tsy mitondra orana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona mampanantena zavatra izay tsy homeny akory.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izay manam-paharetana no maharesy lahatra mpitsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny teny malefaka mampilefitra ny henjana.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Raha mahita tantely ianao, dia hano izay sahaza anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao ho leony ianao ka handoa azy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: aoka ianao tsy hateti-pankany an-tranon’ny namanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao tofoka aminao izy ka hankahala anao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mandratra toy ny langilangy na sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa zana-tsipîka maranitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona mijoro ho vavolombelona mandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanamelohana ny namany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toy ny mitsako amin’ny nify mihozongozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mihazakazaka amin-tongotra kilemaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny matoky olona mpamadika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny androm-pahoriana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Andriamanitra dia omem-boninahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho Izy manao zava-miafina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanjaka kosa dia omem-boninahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izy manazava ny zavatra ataony.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Toy ny manary lamba amin’ny andro mangatsiaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na toy ny manisy vinaingitra amin’ny fery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany koa izay mihira amin’olona malahelo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'manisy vinaingitra amin’ny fery: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt tranainy grika; ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: manampy vinaingitra amin’ny siran-tany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Raha noana ny fahavalonao, dia omeo hanina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mangetaheta izy, dia omeo rano hosotroiny;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: fa raha manao izany ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny manala vainafo eo an-dohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.22 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 21-22:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Rm 12.20 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny TOMPO no hamaly soa anao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny rivotra avy any avaratra mahatonga orana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanendrikendrehana olona mahavinitra endrika azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Aleo mitoetra amin’ny efitra kely ao an-tampon-trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay miray trano amin’ny vehivavy liana ady.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Toy ny rano mangatsiaka ho an’ny tenda main-ketaheta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vaovao mahafaly avy any an-tany lavitra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Toy ny loharano voaloto sy fantsakana voapoizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olo-marina milefitra eo anoloan’ny olon-dratsy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tsy tsara ny mihinana tantely be loatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa ny mitady hahazo voninahitra be loatra.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Toa tanàna rava tsy misy manda intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona izay tsy mahatsindry fo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny haavon’ny lanitra sy ny halalin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ao am-pon’ny mpanjaka dia samy tsy fantatsika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Esory amin’ny volafotsy ny lotony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fanaka sarobidy no havoakan’ny mpanefy;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: esory tsy ho eo amin’ny mpanjaka ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fahamarinana no hiorenan’ny fiandrianany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aza miedinedina eo anatrehan’ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na misolantsolana eny amin’ny toeran’ny lehibe;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'fa aleo ianao hilazana hoe: «Miakara etỳ»,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay mahita ny tenanao haetry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’ny manan-kaja
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
