document_id: PRO.25,396
type_code: plt
verses:
  '1':
  - type: text
    content: Indreto koa no ohabolan’i Salômôna voaangon’ny olon’i Hezekià mpanjakan’i Joda.
  - type: heading
    content: Ohabolana isan-karazany
  '10':
  - type: text
    content: fandrao izay mandre hanome tsiny anao
  - type: text
    content: ka dia ho afa-baràka mandrakizay ianao.
  '11':
  - type: text
    content: Toy ny paoma volamena voahaingo volafotsy,
  - type: text
    content: no hasarobidin’ny teny lazaina amin’ny ilàna azy.
  '12':
  - type: text
    content: Toy ny kavina sy rojo volamena
  - type: text
    content: no hasoan’ny anatry ny hendry amin’izay mihaino.
  '13':
  - type: text
    content: Mamelombelona aina ny hatsiakan’ny rano mamanala
  - type: text
    content: amin’ny fotoam-pijinjana mafana;
  - type: text
    content: mamelombelona aina toy izany koa ny iraka mahatoky
  - type: text
    content: amin’ny tompony naniraka azy.
  '14':
  - type: text
    content: Tahaka ny rahona sy rivotra tsy mitondra orana
  - type: text
    content: ny olona mampanantena zavatra izay tsy homeny akory.
  '15':
  - type: text
    content: Izay manam-paharetana no maharesy lahatra mpitsara;
  - type: text
    content: ary ny teny malefaka mampilefitra ny henjana.
  '16':
  - type: text
    content: Raha mahita tantely ianao, dia hano izay sahaza anao,
  - type: text
    content: fandrao ho leony ianao ka handoa azy;
  '17':
  - type: text
    content: aoka ianao tsy hateti-pankany an-tranon’ny namanao,
  - type: text
    content: fandrao tofoka aminao izy ka hankahala anao.
  '18':
  - type: text
    content: Mandratra toy ny langilangy na sabatra
  - type: text
    content: na koa zana-tsipîka maranitra
  - type: text
    content: ny olona mijoro ho vavolombelona mandainga
  - type: text
    content: mba hanamelohana ny namany.
  '19':
  - type: text
    content: Toy ny mitsako amin’ny nify mihozongozona
  - type: text
    content: na mihazakazaka amin-tongotra kilemaina
  - type: text
    content: ny matoky olona mpamadika
  - type: text
    content: amin’ny androm-pahoriana.
  '2':
  - type: text
    content: Andriamanitra dia omem-boninahitra
  - type: text
    content: noho Izy manao zava-miafina;
  - type: text
    content: ny mpanjaka kosa dia omem-boninahitra
  - type: text
    content: noho izy manazava ny zavatra ataony.
  '20':
  - type: text
    content: Toy ny manary lamba amin’ny andro mangatsiaka
  - type: text
    content: na toy ny manisy vinaingitra amin’ny fery,
  - type: text
    content: toy izany koa izay mihira amin’olona malahelo
  - type: note
    content: 'manisy vinaingitra amin’ny fery: araka ny dkt tranainy grika; ny RM kosa manao hoe manampy vinaingitra amin’ny siran-tany.'
  - type: text
    content: .
  '21':
  - type: text
    content: Raha noana ny fahavalonao, dia omeo hanina;
  - type: text
    content: raha mangetaheta izy, dia omeo rano hosotroiny;
  '22':
  - type: text
    content: fa raha manao izany ianao,
  - type: text
    content: dia toy ny manala vainafo eo an-dohany
  - type: note
    content: 'And 21-22: jereo Rm 12.20 sy nta.'
  - type: text
    content: .
  - type: text
    content: Ary ny TOMPO no hamaly soa anao.
  '23':
  - type: text
    content: Ny rivotra avy any avaratra mahatonga orana,
  - type: text
    content: ary ny fanendrikendrehana olona mahavinitra endrika azy.
  '24':
  - type: text
    content: Aleo mitoetra amin’ny efitra kely ao an-tampon-trano
  - type: text
    content: toy izay miray trano amin’ny vehivavy liana ady.
  '25':
  - type: text
    content: Toy ny rano mangatsiaka ho an’ny tenda main-ketaheta
  - type: text
    content: ny vaovao mahafaly avy any an-tany lavitra.
  '26':
  - type: text
    content: Toy ny loharano voaloto sy fantsakana voapoizina
  - type: text
    content: ny olo-marina milefitra eo anoloan’ny olon-dratsy.
  '27':
  - type: text
    content: Tsy tsara ny mihinana tantely be loatra
  - type: text
    content: na koa ny mitady hahazo voninahitra be loatra.
  '28':
  - type: text
    content: Toa tanàna rava tsy misy manda intsony
  - type: text
    content: ny olona izay tsy mahatsindry fo.
  '3':
  - type: text
    content: Ny haavon’ny lanitra sy ny halalin’ny tany
  - type: text
    content: ary ny ao am-pon’ny mpanjaka dia samy tsy fantatsika.
  '4':
  - type: text
    content: Esory amin’ny volafotsy ny lotony,
  - type: text
    content: dia fanaka sarobidy no havoakan’ny mpanefy;
  '5':
  - type: text
    content: esory tsy ho eo amin’ny mpanjaka ny olon-dratsy
  - type: text
    content: dia fahamarinana no hiorenan’ny fiandrianany.
  '6':
  - type: text
    content: Aza miedinedina eo anatrehan’ny mpanjaka
  - type: text
    content: na misolantsolana eny amin’ny toeran’ny lehibe;
  '7':
  - type: text
    content: 'fa aleo ianao hilazana hoe: «Miakara etỳ»,'
  - type: text
    content: toy izay mahita ny tenanao haetry
  - type: text
    content: eo anatrehan’ny manan-kaja
  - type: note
    content: 'And 6-7: jereo Lk 14.8-10.'
  - type: text
    content: .
  '8':
  - type: text
    content: Izay zavatra hitan’ny masonao
  - type: note
    content: 'izay... hitan’ny masonao: araka ireo dkt tranainy izao fampiraisana azy amin’ny andalana manaraka izao. Ny RM dia mampitohy ity tapa-pehezanteny ity amin’ny and 7 ka azo adika hoe manan-kaja izay hitan’ny masonao.'
  - type: text
    content: ','
  - type: text
    content: aza maika ny hitondra izany am-pitsarana,
  - type: text
    content: fandrao tsy hitanao izay hatao amin’ny farany
  - type: text
    content: rehefa voaporofon’ny namanao fa ianao no diso.
  '9':
  - type: text
    content: Alamino miaraka amin’ny namanao ny adinao aminy,
  - type: text
    content: nefa aza tsikafonina ny tsiambaratelon’ny hafa;
