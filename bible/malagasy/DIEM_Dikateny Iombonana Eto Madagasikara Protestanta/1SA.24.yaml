document_id: 1SA.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida mitsimbina ny ain’i Saoly
  - type: text
    content: Avy teo i Davida dia niakatra tany amin’ny toerana be harambato, tany Haîna-Gedỳ
  - type: note
    content: 'Haîna-Gedỳ: tanàna eo amin’ny morony andrefan’ny Ranomasina Maty.'
  - type: text
    content: ', ary nipetraka tao. '
  '10':
  - type: text
    content: 'Ary hoy i Davida tamin’i Saoly:'
  - type: text
    content: '–Nahoana ianao, ry mpanjaka, no dia mihaino izay vavan’olona milaza fa mitady hanisy ratsy anao aho? '
  '11':
  - type: text
    content: 'Kanefa ny masonao mihitsy no mahita androany, fa ny TOMPO efa nanolotra anao ho eo am-pelatanako tao an-johy. Nasain’ny olona hovonoin-ko faty ianao, nefa niantra anao aho, fa hoy aho hoe: Tsy haninji-tanana amin’ny mpanjakako aho, satria ny TOMPO no efa nifidy anao ho mpanjaka. '
  '12':
  - type: text
    content: 'Jereo koa, ry mpanjakako ô! Eny, jereo fa ity an-tanako ity ny morontongotr’akanjonao. Koa raha nanapaka ny akanjonao fotsiny aho fa tsy namono nahafaty anao, dia aoka ho fantatrao fa tsy olon-dratsy na mpikomy aho, ary tsy mba nanota taminao! Ianao no manao haza lambo ahy sady mifofo ny aiko. '
  '13':
  - type: text
    content: 'Ny TOMPO anie no hitsara ahy sy ianao, ka hamaly anao noho ny ratsy nataonao tamiko! Fa izaho kosa tsy haninji-tanana aminao. '
  '14':
  - type: text
    content: 'Araka ny lazain’ny ohabolan’ntaolo, dia «ny olon-dratsy no ipoiran’ny faharatsiam-panahy», fa izaho kosa tsy haninji-tanana aminao. '
  '15':
  - type: text
    content: 'Amin’iza moa no iadianao, ry mpanjakan’i Israely? Izaho izay amboa maty sy parasy kely ity ve no enjehinao? '
  '16':
  - type: text
    content: Aoka ny TOMPO no ho mpitsara ka dia hitsara ahy sy ianao! Aoka handinika ny amiko Izy ka hiaro ahy ary hanafaka ahy amin’ny fanenjehanao!
  '17':
  - type: text
    content: 'Rehefa vita izany tenin’i Davida tamin’i Saoly izany, dia nanontany azy i Saoly hoe:'
  - type: text
    content: –Feonao tokoa ve izany, ry Davida zanako ô!
  - type: text
    content: 'Ary dia nigogogogo nitomany i Saoly. '
  '18':
  - type: text
    content: 'Dia hoy indray izy tamin’i Davida:'
  - type: text
    content: '–Marina ny anao, anaka, fa izaho no tena diso, satria ianao nanao soa tamiko fa izaho kosa nanao izay ratsy taminao. '
  '19':
  - type: text
    content: 'Nasehonao tamiko androany ny hatsaram-ponao, fa tsy novonoinao ho faty aho na dia efa natolotry ny TOMPO teo an-tananao aza aho. '
  '2':
  - type: text
    content: 'Rehefa tafaverina avy niady tamin’ny Filistinina i Saoly, dia reny fa efa any an-taniefitr’i Haîna-Gedỳ i Davida. '
  '20':
  - type: text
    content: 'Raha misy olona mahatratra ny fahavalony, moa avelany handeha soa aman-tsara ve izy? Sanatria! Koa hamaly fitia anao anie ny Tompo noho izay nataonao tamiko androany. '
  '21':
  - type: text
    content: 'Ankehitriny, fantatro fa ianao no ho mpanjaka ary hitoetra eo an-tananao ny fanjakan’i Israely. '
  '22':
  - type: text
    content: 'Koa mianiàna amiko amin’ny TOMPO ianao ankehitriny, fa tsy handringana ny taranako mandimby ahy ianao ary tsy hamono ny anarako tsy ho isan’ny taranaky ny raiko. '
  '23':
  - type: text
    content: Dia nianiana izany tamin’i Saoly i Davida. Ary i Saoly nody tany aminy, fa i Davida sy ny olony kosa niverina niakatra tany amin’ny fiereny.
  '3':
  - type: text
    content: Ary i Saoly naka telo arivo lahy izay notsongaina tamin’i Israely manontolo, ka lasa nitady an’i Davida sy ny olony izay teo anoloan’ny Vatolampin’ny Osidia
  - type: note
    content: Ity Vatolampin’ny Osidia ity dia eny amin’ny manodidina an’i Haîna-Gedỳ, kanefa tsy fantatra mazava ny misy azy.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Raha tonga teo amin’ny valan’ondry nanamorona ny lalana i Saoly, dia sendra zohy
  - type: note
    content: 'zohy: jereo Sal 57.1; 142.1.'
  - type: text
    content: ', ka dia niditra tao mba hivoaka kely. Nefa i Davida sy ny olony dia efa tao anaty zohy tao. '
  '5':
  - type: text
    content: 'Dia hoy ny olon’i Davida taminy:'
  - type: text
    content: '–Izao no andro voalazan’ny TOMPO taminao hoe: «Indro hatolotro eo an-tananao ny fahavalonao, ka ataovy aminy izay fantatrao fa mety.»'
  - type: text
    content: 'Dia nitsangana i Davida ka nitsaitsaika nanapaka moramora ny moron-tongotr’akanjon’i Saoly. '
  '6':
  - type: text
    content: 'Nefa taorian’izany dia nidobodoboka mafy ny fon’i Davida noho ny nanapahany ny morotongotr’akanjon’i Saoly. '
  '7':
  - type: text
    content: 'Koa hoy izy tamin’ny olony:'
  - type: text
    content: –Ho sanatriaviko ary hisakanan’ny TOMPO ahy anie ny haninji-tanana amin’ny mpanjakako, satria Izy TOMPO ihany no efa nifidy azy ho mpanjaka.
  '8':
  - type: text
    content: Izany teny izany no nanakanan’i Davida ny olony ka tsy namelany azy ireo hamely an’i Saoly.
  - type: text
    content: 'Dia nandao ny zohy i Saoly ary nanohy ny diany. '
  '9':
  - type: text
    content: 'Taorian’izany dia nitsangana ihany koa i Davida, nivoaka ny zohy sady niantso mafy an’i Saoly hoe:'
  - type: text
    content: –Ry mpanjaka tompoko ô!
  - type: text
    content: 'Nitodika nijery i Saoly, dia niankohoka ho mari-panajana azy i Davida. '
