document_id: 1SA.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida mitsimbina ny ain’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avy teo i Davida dia niakatra tany amin’ny toerana be harambato, tany Haîna-Gedỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Haîna-Gedỳ: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo amin’ny morony andrefan’ny Ranomasina Maty.
    marker-yv: yv-n
  - type: text
    text: ', ary nipetraka tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rehefa tafaverina avy niady tamin’ny Filistinina i Saoly, dia reny fa efa any an-taniefitr’i Haîna-Gedỳ i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary i Saoly naka telo arivo lahy izay notsongaina tamin’i Israely manontolo, ka lasa nitady an’i Davida sy ny olony izay teo anoloan’ny Vatolampin’ny Osidia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vatolampin’ny Osidia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ity dia eny amin’ny manodidina an’i Haîna-Gedỳ, kanefa tsy fantatra mazava ny misy azy.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha tonga teo amin’ny valan’ondry nanamorona ny lalana i Saoly, dia sendra zohy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zohy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Sal 57.1; 142.1.
    marker-yv: yv-n
  - type: text
    text: ', ka dia niditra tao mba hivoaka kely. Nefa i Davida sy ny olony dia efa tao anaty zohy tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ny olon’i Davida taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no andro voalazan’ny TOMPO taminao hoe: «Indro hatolotro eo an-tananao ny fahavalonao, ka ataovy aminy izay fantatrao fa mety.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nitsangana i Davida ka nitsaitsaika nanapaka moramora ny moron-tongotr’akanjon’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa taorian’izany dia nidobodoboka mafy ny fon’i Davida noho ny nanapahany ny morotongotr’akanjon’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa hoy izy tamin’ny olony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho sanatriaviko ary hisakanan’ny TOMPO ahy anie ny haninji-tanana amin’ny mpanjakako, satria Izy TOMPO ihany no efa nifidy azy ho mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izany teny izany no nanakanan’i Davida ny olony ka tsy namelany azy ireo hamely an’i Saoly.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nandao ny zohy i Saoly ary nanohy ny diany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Taorian’izany dia nitsangana ihany koa i Davida, nivoaka ny zohy sady niantso mafy an’i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry mpanjaka tompoko ô!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nitodika nijery i Saoly, dia niankohoka ho mari-panajana azy i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy i Davida tamin’i Saoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana ianao, ry mpanjaka, no dia mihaino izay vavan’olona milaza fa mitady hanisy ratsy anao aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa ny masonao mihitsy no mahita androany, fa ny TOMPO efa nanolotra anao ho eo am-pelatanako tao an-johy. Nasain’ny olona hovonoin-ko faty ianao, nefa niantra anao aho, fa hoy aho hoe: Tsy haninji-tanana amin’ny mpanjakako aho, satria ny TOMPO no efa nifidy anao ho mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jereo koa, ry mpanjakako ô! Eny, jereo fa ity an-tanako ity ny morontongotr’akanjonao. Koa raha nanapaka ny akanjonao fotsiny aho fa tsy namono nahafaty anao, dia aoka ho fantatrao fa tsy olon-dratsy na mpikomy aho, ary tsy mba nanota taminao! Ianao no manao haza lambo ahy sady mifofo ny aiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny TOMPO anie no hitsara ahy sy ianao, ka hamaly anao noho ny ratsy nataonao tamiko! Fa izaho kosa tsy haninji-tanana aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Araka ny lazain’ny ohabolan’ntaolo, dia «ny olon-dratsy no ipoiran’ny faharatsiam-panahy», fa izaho kosa tsy haninji-tanana aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Amin’iza moa no iadianao, ry mpanjakan’i Israely? Izaho izay amboa maty sy parasy kely ity ve no enjehinao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka ny TOMPO no ho mpitsara ka dia hitsara ahy sy ianao! Aoka handinika ny amiko Izy ka hiaro ahy ary hanafaka ahy amin’ny fanenjehanao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa vita izany tenin’i Davida tamin’i Saoly izany, dia nanontany azy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Feonao tokoa ve izany, ry Davida zanako ô!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary dia nigogogogo nitomany i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy indray izy tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Marina ny anao, anaka, fa izaho no tena diso, satria ianao nanao soa tamiko fa izaho kosa nanao izay ratsy taminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nasehonao tamiko androany ny hatsaram-ponao, fa tsy novonoinao ho faty aho na dia efa natolotry ny TOMPO teo an-tananao aza aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha misy olona mahatratra ny fahavalony, moa avelany handeha soa aman-tsara ve izy? Sanatria! Koa hamaly fitia anao anie ny Tompo noho izay nataonao tamiko androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ankehitriny, fantatro fa ianao no ho mpanjaka ary hitoetra eo an-tananao ny fanjakan’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa mianiàna amiko amin’ny TOMPO ianao ankehitriny, fa tsy handringana ny taranako mandimby ahy ianao ary tsy hamono ny anarako tsy ho isan’ny taranaky ny raiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nianiana izany tamin’i Saoly i Davida. Ary i Saoly nody tany aminy, fa i Davida sy ny olony kosa niverina niakatra tany amin’ny fiereny.
