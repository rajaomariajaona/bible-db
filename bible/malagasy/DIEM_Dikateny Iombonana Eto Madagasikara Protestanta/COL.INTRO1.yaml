type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: 'I Kôlôsy dia tanàna tany Azia Minôra (i Torkia any Azia ankehitriny), sahabo ho 200 km atsinanan’i Efeso. Tsy mba i Paoly no nanorina ny Fiangonana tao Kôlôsy; kanefa noheveriny fa tao amin’ny faritany ananany andraikitra i Kôlôsy, ka dia nandefasany mpiasa avy tany Efeso: ny anankiray tamin’ireo mpiara-dia tamin’i Paoly, dia i Epafrà izay Kôlôsianina rahateo, no nitondra voalohany ny Vaovao Mahafaly tao amin’io tanàna io (Kôl 1.7; 4.12).'
  - type: text
    content: Tamin’ny fotoana nanoratan’i Paoly ity taratasy ity, dia nigadra izy (4.3, 10, 18) tokony ho tany Rôma. Tonga i Epafrà nanambara taminy fa andairan’ny fampianaran’ireo olona mpampiely foto-pinoana vaovao ny kristianina tany Kôlôsy. Nampianarin’ireo olona ireo fa na iza na iza te hahalala tsara an’Andriamanitra sady te ho voavonjy, dia tsy maintsy mivavaka amin’ireo hery ara-panahy sy manaraka fombafomba toy ny famorana ary mitandrina ny fitsipika henjana momba ny zava-pihinana sy zava-pisotro sns... Vantany vao nahafantatra izany toe-javatra mahavelom-panahiana izany i Paoly apôstôly, dia nanoratra faingana ho an’ny Kôlôsianina ka nampahatsiaro azy ireo fa ny famonjena omen’Andriamanitra amin’ny alalan’i Jesoa Kristy dia ampy tanteraka. Mety ho i Tisiko sy i Ônesimo no nampitondrain’i Paoly ny taratasy ho an-dry zareo (4.7,9).
  - type: text
    content: 'Toy izao no fizotran’ity taratasy ity amin’ny ankapobeny:'
  - type: text
    content: '–Aorian’ny fiarahabana sy ny vavaka fisaorana an’Andriamanitra (1.1-14) dia misy fizaràna voalohany izay mampivohitra ny maha mpanjaka feno fahefana an’i Kristy: ambony noho ny hery rehetra Izy sady filoha tokan’ny Fiangonana (1.15–2.3).'
  - type: text
    content: –Avy eo i Paoly apôstôly, ao amin’ny fizaràna faharoa, dia mampitandrina ny Kôlôsianina manoloana ireo hevi-diso aelin’olona sasany eo aminy (2.4-25).
  - type: text
    content: –Ny fizaràna fahatelo dia mampahatsiahy ny lafin-javatra fampiharana ny fiainam-baovao iombonana amin’i Kristy, eo anivon’ny Fiangonana sy ny ankohonana ary ny fiaraha-monina (3.1–4.6).
  - type: text
    content: Ny mamarana ity taratasy ity dia hafatra manokana vitsivitsy ary ny fanaovam-beloma soratanan’i Paoly (4.7-18).
  - type: text
    content: 'Ny endrika sy vontoatin’ireo fampianaran-diso dia mety hiovaova ihany arakaraka ny fotoana isehoany. Nefa izao mandrakariva no iraisany: mampivahavaha ny finoan’ny kristianina an’i Kristy irery ihany. Koa dia manan-kolazaina mandraka ankehitriny ny taratasy ho an’ny Kôlôsianina, satria ataony mivohitra tsara ny maha ambony indrindra an’i Kristy, Ilay manafaka amin’ny fanandevozana ara-panahy rehetra.'
