document_id: 2SA.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nikasa haka ny fahefana i Absalôma
  - type: text
    content: 'Taorian’izany i Absalôma dia nanomana kalesy iray sy soavaly, ary koa vatan-dehilahy dimampolo hihazakazaka eo alohany. '
  '10':
  - type: text
    content: 'Naniraka olona tany amin’ny foko israelita rehetra izy hilaza hoe: «Raha vao renareo ny feon’ny anjomara, dia miantsoantsoa hoe: ‹Manjaka ao Hebrôna i Absalôma.› » '
  '11':
  - type: text
    content: Lehilahy roanjato, nasain’i Absalôma no tonga niaraka taminy avy tany Jerosalema. Nefa nandeha tamim-pahatsorana ireo, fa tsy nahalala na inona na inona.
  '12':
  - type: text
    content: Raha teo am-panaterana sorona i Absalôma dia nampaka an’i Ahitôfèla mpanolotsain’i Davida, tao amin’ny tanànany any Gilao
  - type: note
    content: 'Gilao: toerana tokony ho 10 km avaratra atsinanan’i Hebrôna.'
  - type: text
    content: . Nihamafy hatrany ny fiokoana, ka nitombo ny isan’ireo mpomba an’i Absalôma.
  - type: heading
    content: Ny fandosiran’i Davida niala an’i Jerosalema
  '13':
  - type: text
    content: 'Nisy iraka nitatitra tamin’i Davida nanao hoe: «Efa babon’i Absalôma hanaraka azy ny fon’ny lehilahy amin’ny Israely» '
  '14':
  - type: text
    content: 'Hoy i Davida tamin’ireo minisitra rehetra izay nomba azy tao Jerosalema:'
  - type: text
    content: –Mitsangàna, aoka isika handositra fa tsy misy fomba hafa hialantsika amin’i Absalôma. Andao hiala faingana fandrao ho tratrany eto isika, ka hidiran-doza; ary hasiany amin’ny lelan-tsabatra ny mponina iray tanàna.
  '15':
  - type: text
    content: 'Ary hoy ireo minisitra taminy:'
  - type: text
    content: –Na inona na inona safidinao, ry andriamanjaka, dia vonona mandrakariva izahay.
  '16':
  - type: text
    content: Dia nivoaka nandeha an-tongotra ny mpanjaka, narahin’ny fianakaviany manontolo. Vehivavy folo tamin’ny vaditsindranony no sisa navelany hiandry trano.
  '17':
  - type: text
    content: 'Vao niala ny tanàna ny mpanjaka sy ny olona rehetra mpanaraka azy, dia nijanona teo akaikin’ny trano farany. '
  '18':
  - type: text
    content: Nilahatra teo anoloan’i Davida avokoa ny mpiambina azy, dia ny Keretita rehetra sy ny Peletita rehetra ary koa ny miaramila eninjato lahy izay nanaraka azy avy any Gata
  - type: note
    content: 'Gata: jereo 1 Sam 5.8 sy nta; 1 Sam 27.'
  - type: text
    content: '. Izy rehetra ireo no nilahatra teo anoloan’ny mpanjaka. '
  '19':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’i Itàhy filohan’ireo miaramila avy any Gata:'
  - type: text
    content: '–Nahoana ianao no hiaraka aminay koa? Miverena ka mitoera any amin’ny mpanjaka vaovao, satria vahiny ianao sady mpitsoa-ponenana. '
  '2':
  - type: text
    content: 'Vao maraina i Absalôma, dia mijoro eo amoron-dalana akaikin’ny vavahady. Ary isaky ny misy olona mandalo ka mankao amin’ny mpanjaka hitondra raharaha hotsaraina, dia nantsoin’i Absalôma ka nanontaniany hoe:'
  - type: text
    content: –Avy aiza moa ianao?
  - type: text
    content: 'Rehefa mamaly izy fa avy amin’ny fokon’i Israely anankiray, '
  '20':
  - type: text
    content: Vao omaly ve no nahatongavanao, ka anio ianao dia hoentiko hirenireny hiaraka aminay sahady, nefa izaho aza tsy mbola mahalala izay tany halehako! Koa miverena ihany any an-tanàna ary ento manaraka anao ireo mpiray firenena aminao. Homba anao anie ny fitiavana amam-pahamarinan’ny Tompo.
  '21':
  - type: text
    content: 'Fa hoy i Itàhy namaly ny mpanjaka:'
  - type: text
    content: –Velona ny TOMPO ka mianiana aminao aho fa na aiza na aiza hisy anao, ry andriamanjaka, na ho faty na ho velona, dia any koa no hitoerako.
  '22':
  - type: text
    content: 'Ary hoy i Davida tamin’i Itàhy:'
  - type: text
    content: –Ndeha àry mandroso.
  - type: text
    content: 'Dia nandroso i Itàhy niaraka tamin’ny miaramilany sy ny vady aman-janak’ireo. '
  '23':
  - type: text
    content: Nigogogogo nitomany mafy ny besinimaro raha nandalo ny miaramila. Niampita ny riakan’i Kidrôna
  - type: note
    content: ny riakan’i Kidrôna dia mikoriana tsitapatapaka (araka ny fisian’ny orana) eo am-pototry ny mandan’i Jerosalema lafiny atsinanana.
  - type: text
    content: ' ny mpanjaka sy ny olona rehetra mpanaraka azy, ka nandroso tamin’ny lalana mankany an-taniefitra. '
  '24':
  - type: text
    content: 'Tafaraka tamin’i Davida koa i Tsadôka sy ireo '
  - type: text
    content: Levita
  - type: text
    content: ' rehetra nitondra ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’Andriamanitra
  - type: text
    content: '. Napetrak’ireo ilay Vatamasina, ary nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' kosa i Abiatara mandra-pahatafavoaka ny olon-drehetra tao an-tanana. '
  '25':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’i Tsadôka:'
  - type: text
    content: '–Ento miverina any an-tanàna ny Vatamasin’Andriamanitra. Raha mahita fitia eo imason’ny TOMPO aho, dia mbola hoentiny miverina ihany, ka hampahitany indray ny Vatamasina sy ny fonena-masiny. '
  '26':
  - type: text
    content: Raha lazainy kosa fa tsy sitrany intsony aho, dia aoka Izy hanao izay tiany hatao amiko!
  '27':
  - type: text
    content: 'Ary hoy indray ny mpanjaka tamin’i Tsadôka mpisorona:'
  - type: text
    content: '–Tandrinao ve izao? Miverena ombàm-piadanana any an-tanàna miaraka amin’izy roalahy, dia i Ahimahàtsa zanakalahinao sy i Jônatàna zanakalahin’i Abiatara. '
  '28':
  - type: text
    content: Jereo fa hiandriandry eny amin’ny taniefitra akaikin’ny fitana an’i Jôrdàna aho mandra-pahazoako izay vaovao avy atỳ aminareo.
  '29':
  - type: text
    content: Dia nitondra ny Vatamasin’Andriamanitra niverina tany Jerosalema i Tsadôka sy i Abiatara, ka nitoetra tany.
  - type: heading
    content: Nalefan’i Davida hitsikilo an’i Absalôma i Hosay
  '3':
  - type: text
    content: 'dia hoy i Absalôma taminy:'
  - type: text
    content: –Tsara sady marina ny raharahanao, saingy tsy misy olona voatendrin’ny mpanjaka mba hihaino anao.
  '30':
  - type: text
    content: Nananika ny tendrombohitra Analanôliva
  - type: note
    content: ny tendrombohitra Analanôliva dia mifanatrika amin’i Jerosalema, eny an-dafin’i Kidrôna.
  - type: text
    content: ' tamin-dranomaso be i Davida, ka sady nisaron-doha izy no nandeha tsy nikiraro. Ny olona rehetra izay tafaraka taminy dia nisaron-doha avokoa, ka sady nananika ny tendrombohitra no nitomany. '
  '31':
  - type: text
    content: 'Nisy nanambara tamin’i Davida fa anisan’ireo mpiara-mioko tamin’i Absalôma koa i Ahitôfela; ka dia hoy i Davida hoe: «Mitalaho aminao aho, TOMPO ô, ataovy adala ny torohevitr’i Ahitôfela'
  - type: note
    content: 'Ahitôfela: jereo and 12.'
  - type: text
    content: '!» '
  '32':
  - type: text
    content: 'Rahefa tonga teny an-tampon-tendrombohitra teo amin’ilay ivavahan’ny olona amin’Andriamanitra iny i Davida, dia inty tamy nanatona azy i Hosay izay Arkita; '
  - type: text
    content: voatriatra ny fitafiany
  - type: text
    content: ' sady nihosim-bovoka ny lohany. '
  '33':
  - type: text
    content: 'Ary hoy i Davida taminy:'
  - type: text
    content: '–Raha miara-dia amiko ianao, dia ho vesatra ho ahy. '
  '34':
  - type: text
    content: 'Fa raha miverina any an-tanàna kosa ianao ka hanao amin’i Absalôma hoe: «Hanompo anao aho, ry mpanjaka. Efa mpanompon-drainao ihany aho taloha, fa ankehitriny kosa dia ianao no hotompoiko.» Izany no hahafahanao mamadika ho tombontsoako ny torohevitr’i Ahitôfela. '
  '35':
  - type: text
    content: 'Ho eo anilanao any koa i Tsadôka sy i Abiatara mpisorona. Koa izay zavatra rehetra renao avy ao an-tranon’ny mpanjaka, dia ambarao amin’i Tsadôka sy Abiatara. '
  '36':
  - type: text
    content: Eo anilan’izy ireo any koa ireo zanany roa lahy, dia i Ahimahatsa zanakalahin’i Tsadôka sy i Jônatàna zanakalahin’i Abiatara; izy roa lahy ireto no hampitanareo amiko izay rehetra renareo.
  '37':
  - type: text
    content: Ary tonga tao an-tanàna i Hosay sakaizan’i Davida tamin’ny fotoana nidiran’i Absalôma tao Jerosalema.
  '4':
  - type: text
    content: 'Ary hoy koa i Absalôma:'
  - type: text
    content: '–Raha izaho manko no mba voatendry ho mpitsara amin’ity tany ity, dia hankatỳ amiko avokoa ny olona rehetra manana ady sy raharaha hotsaraina, ka hotsaraiko ara-drariny. '
  '5':
  - type: text
    content: 'Ary rehefa misy manatona azy mba hiankohoka ho fanajana azy, dia atolony azy ny tanany; ary tazoniny sy orohany avy eo ilay olona. '
  '6':
  - type: text
    content: Toy izany no nataon’i Absalôma tamin’ny Israelita rehetra izay nankao amin’ny mpanjaka mba hangata-pitsarana, ka dia babony ny fon’ireo Israelita.
  '7':
  - type: text
    content: Nony afaka efa-taona
  - type: note
    content: 'efa-taona: araka ny dkt grika sy siriaka tranainy; araka ny hebreo efapolo taona. –Hebrôna: jereo 2.1-4; 2.2 sy nta.'
  - type: text
    content: ', dia hoy i Absalôma tamin’ny mpanjaka:'
  - type: text
    content: '–Avelao aho mba hankany Hebrôna hanefa ny voady efa nataoko tamin’ny TOMPO. '
  '8':
  - type: text
    content: Fa raha mbola nipetraka tany Gesora
  - type: note
    content: 'Gesora: jereo 13.37-38.'
  - type: text
    content: ' any Siria aho, dia nanao izao voady izao: «Raha hampodin’ny TOMPO any Jerosalema indray aho, dia hanompo AZY.»'
  '9':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy:'
  - type: text
    content: –Mandehana ombàm-piadanana.
  - type: text
    content: Ary niainga nankany Hebrôna izy.
