document_id: 2SA.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nikasa haka ny fahefana i Absalôma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany i Absalôma dia nanomana kalesy iray sy soavaly, ary koa vatan-dehilahy dimampolo hihazakazaka eo alohany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naniraka olona tany amin’ny foko israelita rehetra izy hilaza hoe: «Raha vao renareo ny feon’ny anjomara, dia miantsoantsoa hoe: ‹Manjaka ao Hebrôna i Absalôma.› » '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lehilahy roanjato, nasain’i Absalôma no tonga niaraka taminy avy tany Jerosalema. Nefa nandeha tamim-pahatsorana ireo, fa tsy nahalala na inona na inona.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha teo am-panaterana sorona i Absalôma dia nampaka an’i Ahitôfèla mpanolotsain’i Davida, tao amin’ny tanànany any Gilao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gilao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tokony ho 10 km avaratra atsinanan’i Hebrôna.
      marker-yv: yv-n
    - type: text
      text: . Nihamafy hatrany ny fiokoana, ka nitombo ny isan’ireo mpomba an’i Absalôma.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandosiran’i Davida niala an’i Jerosalema
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy iraka nitatitra tamin’i Davida nanao hoe: «Efa babon’i Absalôma hanaraka azy ny fon’ny lehilahy amin’ny Israely» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Davida tamin’ireo minisitra rehetra izay nomba azy tao Jerosalema:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitsangàna, aoka isika handositra fa tsy misy fomba hafa hialantsika amin’i Absalôma. Andao hiala faingana fandrao ho tratrany eto isika, ka hidiran-doza; ary hasiany amin’ny lelan-tsabatra ny mponina iray tanàna.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireo minisitra taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na inona na inona safidinao, ry andriamanjaka, dia vonona mandrakariva izahay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nivoaka nandeha an-tongotra ny mpanjaka, narahin’ny fianakaviany manontolo. Vehivavy folo tamin’ny vaditsindranony no sisa navelany hiandry trano.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao niala ny tanàna ny mpanjaka sy ny olona rehetra mpanaraka azy, dia nijanona teo akaikin’ny trano farany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nilahatra teo anoloan’i Davida avokoa ny mpiambina azy, dia ny Keretita rehetra sy ny Peletita rehetra ary koa ny miaramila eninjato lahy izay nanaraka azy avy any Gata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 5.8 sy nta; 1 Sam 27.
      marker-yv: yv-n
    - type: text
      text: '. Izy rehetra ireo no nilahatra teo anoloan’ny mpanjaka. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Itàhy filohan’ireo miaramila avy any Gata:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana ianao no hiaraka aminay koa? Miverena ka mitoera any amin’ny mpanjaka vaovao, satria vahiny ianao sady mpitsoa-ponenana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao maraina i Absalôma, dia mijoro eo amoron-dalana akaikin’ny vavahady. Ary isaky ny misy olona mandalo ka mankao amin’ny mpanjaka hitondra raharaha hotsaraina, dia nantsoin’i Absalôma ka nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy aiza moa ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa mamaly izy fa avy amin’ny fokon’i Israely anankiray, '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Vao omaly ve no nahatongavanao, ka anio ianao dia hoentiko hirenireny hiaraka aminay sahady, nefa izaho aza tsy mbola mahalala izay tany halehako! Koa miverena ihany any an-tanàna ary ento manaraka anao ireo mpiray firenena aminao. Homba anao anie ny fitiavana amam-pahamarinan’ny Tompo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Itàhy namaly ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO ka mianiana aminao aho fa na aiza na aiza hisy anao, ry andriamanjaka, na ho faty na ho velona, dia any koa no hitoerako.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida tamin’i Itàhy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha àry mandroso.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandroso i Itàhy niaraka tamin’ny miaramilany sy ny vady aman-janak’ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nigogogogo nitomany mafy ny besinimaro raha nandalo ny miaramila. Niampita ny riakan’i Kidrôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny riakan’i Kidrôna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia mikoriana tsitapatapaka (araka ny fisian’ny orana) eo am-pototry ny mandan’i Jerosalema lafiny atsinanana.
      marker-yv: yv-n
    - type: text
      text: ' ny mpanjaka sy ny olona rehetra mpanaraka azy, ka nandroso tamin’ny lalana mankany an-taniefitra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tafaraka tamin’i Davida koa i Tsadôka sy ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Levita
    - type: text
      text: ' rehetra nitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’Andriamanitra
    - type: text
      text: '. Napetrak’ireo ilay Vatamasina, ary nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' kosa i Abiatara mandra-pahatafavoaka ny olon-drehetra tao an-tanana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’i Tsadôka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ento miverina any an-tanàna ny Vatamasin’Andriamanitra. Raha mahita fitia eo imason’ny TOMPO aho, dia mbola hoentiny miverina ihany, ka hampahitany indray ny Vatamasina sy ny fonena-masiny. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha lazainy kosa fa tsy sitrany intsony aho, dia aoka Izy hanao izay tiany hatao amiko!
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray ny mpanjaka tamin’i Tsadôka mpisorona:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tandrinao ve izao? Miverena ombàm-piadanana any an-tanàna miaraka amin’izy roalahy, dia i Ahimahàtsa zanakalahinao sy i Jônatàna zanakalahin’i Abiatara. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jereo fa hiandriandry eny amin’ny taniefitra akaikin’ny fitana an’i Jôrdàna aho mandra-pahazoako izay vaovao avy atỳ aminareo.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitondra ny Vatamasin’Andriamanitra niverina tany Jerosalema i Tsadôka sy i Abiatara, ka nitoetra tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nalefan’i Davida hitsikilo an’i Absalôma i Hosay
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hoy i Absalôma taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsara sady marina ny raharahanao, saingy tsy misy olona voatendrin’ny mpanjaka mba hihaino anao.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nananika ny tendrombohitra Analanôliva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny tendrombohitra Analanôliva '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia mifanatrika amin’i Jerosalema, eny an-dafin’i Kidrôna.
      marker-yv: yv-n
    - type: text
      text: ' tamin-dranomaso be i Davida, ka sady nisaron-doha izy no nandeha tsy nikiraro. Ny olona rehetra izay tafaraka taminy dia nisaron-doha avokoa, ka sady nananika ny tendrombohitra no nitomany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy nanambara tamin’i Davida fa anisan’ireo mpiara-mioko tamin’i Absalôma koa i Ahitôfela; ka dia hoy i Davida hoe: «Mitalaho aminao aho, TOMPO ô, ataovy adala ny torohevitr’i Ahitôfela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ahitôfela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo and 12.
      marker-yv: yv-n
    - type: text
      text: '!» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rahefa tonga teny an-tampon-tendrombohitra teo amin’ilay ivavahan’ny olona amin’Andriamanitra iny i Davida, dia inty tamy nanatona azy i Hosay izay Arkita; '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voatriatra ny fitafiany
    - type: text
      text: ' sady nihosim-bovoka ny lohany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha miara-dia amiko ianao, dia ho vesatra ho ahy. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa raha miverina any an-tanàna kosa ianao ka hanao amin’i Absalôma hoe: «Hanompo anao aho, ry mpanjaka. Efa mpanompon-drainao ihany aho taloha, fa ankehitriny kosa dia ianao no hotompoiko.» Izany no hahafahanao mamadika ho tombontsoako ny torohevitr’i Ahitôfela. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ho eo anilanao any koa i Tsadôka sy i Abiatara mpisorona. Koa izay zavatra rehetra renao avy ao an-tranon’ny mpanjaka, dia ambarao amin’i Tsadôka sy Abiatara. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Eo anilan’izy ireo any koa ireo zanany roa lahy, dia i Ahimahatsa zanakalahin’i Tsadôka sy i Jônatàna zanakalahin’i Abiatara; izy roa lahy ireto no hampitanareo amiko izay rehetra renareo.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tonga tao an-tanàna i Hosay sakaizan’i Davida tamin’ny fotoana nidiran’i Absalôma tao Jerosalema.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa i Absalôma:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha izaho manko no mba voatendry ho mpitsara amin’ity tany ity, dia hankatỳ amiko avokoa ny olona rehetra manana ady sy raharaha hotsaraina, ka hotsaraiko ara-drariny. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary rehefa misy manatona azy mba hiankohoka ho fanajana azy, dia atolony azy ny tanany; ary tazoniny sy orohany avy eo ilay olona. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Toy izany no nataon’i Absalôma tamin’ny Israelita rehetra izay nankao amin’ny mpanjaka mba hangata-pitsarana, ka dia babony ny fon’ireo Israelita.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony afaka efa-taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'efa-taona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika sy siriaka tranainy; araka ny hebreo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: efapolo taona.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hebrôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 2.1-4; 2.2 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ', dia hoy i Absalôma tamin’ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Avelao aho mba hankany Hebrôna hanefa ny voady efa nataoko tamin’ny TOMPO. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa raha mbola nipetraka tany Gesora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gesora: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 13.37-38.
      marker-yv: yv-n
    - type: text
      text: ' any Siria aho, dia nanao izao voady izao: «Raha hampodin’ny TOMPO any Jerosalema indray aho, dia hanompo AZY.»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana ombàm-piadanana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niainga nankany Hebrôna izy.
