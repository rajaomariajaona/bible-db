document_id: LAM.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misy antony tokony hanantenana amin’ny fahoriana mangidy
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: text
    text: ALEFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lehilahy nahita fahoriana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny kapoky ny fahatezeran’ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Notarihiny aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Notarihiny... aho: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tahaka ny fanao amin’ny andian’ondry izany.
    marker-yv: yv-n
  - type: text
    text: ', ka nampandehaniny'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny maizina fa tsy tamin’ny mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho irery ihany no velesin’ny tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandritra ny andro manontolo.
- type: usfm
  marker: sp
  children:
  - type: text
    text: BETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nolazoiny ny nofoko sy ny hoditro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary notapatapahiny ny taolako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nampijoro tovon-tany hamelezana ahy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka zava-mangidy sy fahoriana no nataony manemitra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nampitoeriny tao amin’ny haizina aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ireo efa maty fahiny.
- type: usfm
  marker: sp
  children:
  - type: text
    text: GIMELA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nofefeny manodidina aho tsy ho afa-nivoaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nataony mavesatra ny gadrako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nikiakiaka niantso vonjy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nosakanany ny fivavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Notampenany rindrim-bato voapaika ny lalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary naolikoliny ny alehako.
- type: usfm
  marker: sp
  children:
  - type: text
    text: DALETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toa orsa manotrika hamely ahy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toa liona mamitsaka ao anaty kirihitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ka nampivily lalana ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary namiravira sy namela ahy ho potika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nanenjana ny tsipîkany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nikendry hitifitra ahy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zana-tsipîkany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanagorobahany ny voako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tonga fihomehezan’ny olona rehetra aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny olona rehetra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Jodeanina sy firenen-kafa) na ny vahoakako rehetra (Jodeanina ihany).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataony resaka fanarabiana isan’andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nobobohan’ny Tompo zava-mampalahelo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nomamoiny zava-mangidy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: VAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Notereny hikarepoka vatokely aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nohoseny tao anaty lavenona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noroahiny lavitry ny fiadanana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanadino izay atao hoe fahasambarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ka hoy aho hoe: Potika ny hoaviko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy fanantenàko ny TOMPO intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: text
    text: ZAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Poizi-mangidy ho ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mahatsiaro ny fahoriako sy firenireneko
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsaroako tokoa izany, eny, tsaroako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka trotraka aho tamin’ny nanjo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izao anefa no hoeritreretiko am-po
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sady antony hanantenako:'
- type: usfm
  marker: sp
  children:
  - type: text
    text: HETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy ritra ny mari-pitiavan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mitsahatra ny famindrampony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: vaovao isa-maraina ireny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fatratra ny toetranao mahatoky, Tompo ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hoy aho anakampo hoe: ny TOMPO no anjarako;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho izany, dia manantena Azy aho.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsara ny TOMPO amin’izay miandry Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny olona mitady Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsara ny manantena mangina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny famonjen’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsara ho an’ny lehilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny mitondra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zioga
  - type: text
    text: ' amin’ny fahatanorany.'
- type: usfm
  marker: sp
  children:
  - type: text
    text: JODA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aoka izy hipetraka mitokana sy hangina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mizaha toetra azy ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aoka hanohoka vava am-bovoka izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ndrao mba hisy fanantenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Aoka izy hanolotra ny takolany
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay mikapoka azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 5.39.
    marker-yv: yv-n
  - type: text
    text: ', ka ho voky latsa!'
- type: usfm
  marker: sp
  children:
  - type: text
    text: KAFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa tsy hanary mandrakizay ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa raha mampahory Izy, dia mamindrafo
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny halehiben’ny fitiavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa tsy sitrany ny mampahory
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mampijaly ny olombelona.
- type: usfm
  marker: sp
  children:
  - type: text
    text: LAMEDA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Rehefa hosihosena avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpigadra eo amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: rehefa ny zon’olombelona no hitsakitsahina
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehan’ilay Avo Indrindra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: rehefa ny rariny no avadika eo amin’ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho hitan’ny Tompo ve izany?
- type: usfm
  marker: sp
  children:
  - type: text
    text: MEMA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Iza moa no miteny, dia mampisy zavatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 33.9.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy ny Tompo va no mandidy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Moa tsy ny tenin’ilay Avo Indrindra ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mampisy ny loza sy ny soa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Koa inona àry no imenomenonan’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mbola velona sy tomady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia eo aza ny fahotany?
- type: usfm
  marker: sp
  children:
  - type: text
    text: NONA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dinihontsika sy fantaro ny fitondrantenantsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miverena amin’ny TOMPO isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Aoka hasandratsika miaraka ny fo aman-tanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.19 sy nta.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mivavaka amin’Andriamanitra any an-danitra isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Efa nanota sady nikomy izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Ianao, Tompo ô, tsy namela heloka anay.
- type: usfm
  marker: sp
  children:
  - type: text
    text: SAMEKA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Nisarom-pahatezerana Ianao no nanenjika anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandringana anay tsy nisy fiantrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Nisaron-drahona Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy ho takatry ny vavakay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Nataonao fakofako sy fanary
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo anivon’ny firenen-kafa izahay.
- type: usfm
  marker: sp
  children:
  - type: text
    text: PE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Nanoka-bava hamely anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahavalonay rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Horohoro sy fanina no mahavoa anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa fandringanana sy faharatrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Rano mandriaka no avoakan’ny masoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny faharatrana nanjo ny fireneko.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Mikoriana ranomaso tsy mety ritra ny masoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy misy fitsaharanay mihitsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Andrasako ny hitsinjovan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hijereny avy any an-danitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Fijaliana ho ahy ny mahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manjo ny zazavavy rehetra ao an-tanànako.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: text
    text: TSADE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ireo fahavaloko tsy amin’antony
- type: usfm
  marker: q1
  children:
  - type: text
    text: manenjika ahy toy ny fanenji-boronkely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Nanidy ahy velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao an-davaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanjera vato teo amboniko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.53 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nanjera vato teo amboniko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa: nitora-bato ahy.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Nandifotra ny lohako ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hoy aho hoe: «Very aho ity!»'
- type: usfm
  marker: sp
  children:
  - type: text
    text: KÔFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Avy tany am-paran’ny lava-drano aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niantso vonjy taminao, TOMPO ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Renao ny feoko manao hoe: «Aza anampenan-tsofina'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitarainako miantso vonjy aminao.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Nanatona Ianao tamin’ny andro niantsoako Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka nanao tamiko hoe: «Aza matahotra!»'
- type: usfm
  marker: sp
  children:
  - type: text
    text: RESA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Tompo ô, niady ho ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanavotra ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: TOMPO ô, hitanao ny fiangarana natao tamiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka notsarainao ara-drariny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Hitanao avokoa ny valifaty nataony tamiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay rehetra nokasainy hamelezana ahy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: SINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: TOMPO ô, efa renao ny latsa nataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay rehetra nokasainy hamelezana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Izay lazain’ny mpanohitra ahy sy eritreretiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia kendreny hamelezana ahy tontolo andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Jereo izy na mipetraka na mitsangana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho ihany no ambentin-dresany.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: TOMPO ô, araka izay nataony tamiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hamalianao azy koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Hataonao donto ny fisainany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiharan’ny ozonao ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Hoenjehinao amim-pahatezerana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka haringanao tsy ho etỳ ambonin’ny tany.
