  - type: usfm
    marker: sp
    children:
    - type: text
      text: HE
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny zana-tsipîkany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanagorobahany ny voako.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tonga fihomehezan’ny olona rehetra aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny olona rehetra '
      - type: usfm
        marker: ft
        children:
