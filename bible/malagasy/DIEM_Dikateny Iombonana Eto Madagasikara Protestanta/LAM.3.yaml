  - type: usfm
    marker: sp
    children:
    - type: text
      text: VAO
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Notereny hikarepoka vatokely aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nohoseny tao anaty lavenona.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Noroahiny lavitry ny fiadanana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanadino izay atao hoe fahasambarana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ka hoy aho hoe: Potika ny hoaviko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy fanantenàko ny TOMPO intsony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: ZAINA
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Poizi-mangidy ho ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mahatsiaro ny fahoriako sy firenireneko
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Notarihiny aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Notarihiny... aho: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tahaka ny fanao amin’ny andian’ondry izany.
      marker-yv: yv-n
    - type: text
      text: ', ka nampandehaniny'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny maizina fa tsy tamin’ny mazava.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsaroako tokoa izany, eny, tsaroako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka trotraka aho tamin’ny nanjo ahy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izao anefa no hoeritreretiko am-po
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady antony hanantenako:'
  - type: usfm
    marker: sp
    children:
    - type: text
      text: HETA
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy ritra ny mari-pitiavan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mitsahatra ny famindrampony;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: vaovao isa-maraina ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fatratra ny toetranao mahatoky, Tompo ô!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Hoy aho anakampo hoe: ny TOMPO no anjarako;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izany, dia manantena Azy aho.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: TETA
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tsara ny TOMPO amin’izay miandry Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny olona mitady Azy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
