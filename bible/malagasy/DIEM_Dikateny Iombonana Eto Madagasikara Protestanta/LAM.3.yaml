    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Ireo fahavaloko tsy amin’antony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manenjika ahy toy ny fanenji-boronkely.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
