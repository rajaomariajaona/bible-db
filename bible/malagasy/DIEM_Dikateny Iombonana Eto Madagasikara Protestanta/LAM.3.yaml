    marker-yv: yv-h
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Nisarom-pahatezerana Ianao no nanenjika anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandringana anay tsy nisy fiantrana.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
