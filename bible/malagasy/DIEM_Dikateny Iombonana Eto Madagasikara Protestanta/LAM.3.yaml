    marker-yv: yv-h
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Mikoriana ranomaso tsy mety ritra ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy misy fitsaharanay mihitsy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nampijoro tovon-tany hamelezana ahy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka zava-mangidy sy fahoriana no nataony manemitra ahy.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Andrasako ny hitsinjovan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hijereny avy any an-danitra.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
