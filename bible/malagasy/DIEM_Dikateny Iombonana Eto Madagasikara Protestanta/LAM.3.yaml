      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy ny Tompo va no mandidy?
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Moa tsy ny tenin’ilay Avo Indrindra ve
  - type: usfm
    marker: q1
    children:
