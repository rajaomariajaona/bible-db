  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Nataonao fakofako sy fanary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo anivon’ny firenen-kafa izahay.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: PE
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
