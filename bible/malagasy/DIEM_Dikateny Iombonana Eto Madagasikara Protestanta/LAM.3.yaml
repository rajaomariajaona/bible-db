  - type: usfm
    marker: sp
    children:
    - type: text
      text: JODA
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Aoka izy hipetraka mitokana sy hangina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mizaha toetra azy ny Tompo.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
