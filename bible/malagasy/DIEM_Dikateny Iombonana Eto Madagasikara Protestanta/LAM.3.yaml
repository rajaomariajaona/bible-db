    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lehilahy nahita fahoriana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny kapoky ny fahatezeran’ny Tompo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toa orsa manotrika hamely ahy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa liona mamitsaka ao anaty kirihitra,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
