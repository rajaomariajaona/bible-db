document_id: LAM.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Misy antony tokony hanantenana amin’ny fahoriana mangidy
  - type: heading
    content: ALEFA
  - type: text
    content: Lehilahy nahita fahoriana aho
  - type: text
    content: tamin’ny kapoky ny fahatezeran’ny Tompo.
  '10':
  - type: text
    content: Toa orsa manotrika hamely ahy Izy,
  - type: text
    content: toa liona mamitsaka ao anaty kirihitra,
  '11':
  - type: text
    content: ka nampivily lalana ahy
  - type: text
    content: ary namiravira sy namela ahy ho potika.
  '12':
  - type: text
    content: Nanenjana ny tsipîkany Izy
  - type: text
    content: ary nikendry hitifitra ahy.
  - type: heading
    content: HE
  '13':
  - type: text
    content: Ny zana-tsipîkany rehetra
  - type: text
    content: no nanagorobahany ny voako.
  '14':
  - type: text
    content: Tonga fihomehezan’ny olona rehetra aho
  - type: note
    content: ny olona rehetra (Jodeanina sy firenen-kafa) na ny vahoakako rehetra (Jodeanina ihany).
  - type: text
    content: ','
  - type: text
    content: ataony resaka fanarabiana isan’andro.
  '15':
  - type: text
    content: Nobobohan’ny Tompo zava-mampalahelo aho
  - type: text
    content: ary nomamoiny zava-mangidy.
  - type: heading
    content: VAO
  '16':
  - type: text
    content: Notereny hikarepoka vatokely aho
  - type: text
    content: ary nohoseny tao anaty lavenona.
  '17':
  - type: text
    content: Noroahiny lavitry ny fiadanana aho
  - type: text
    content: ka nanadino izay atao hoe fahasambarana.
  '18':
  - type: text
    content: 'Ka hoy aho hoe: Potika ny hoaviko,'
  - type: text
    content: ary tsy misy fanantenàko ny TOMPO intsony.
  - type: heading
    content: '*'
  - type: heading
    content: ZAINA
  '19':
  - type: text
    content: Poizi-mangidy ho ahy
  - type: text
    content: ny mahatsiaro ny fahoriako sy firenireneko
  '2':
  - type: text
    content: Notarihiny aho
  - type: note
    content: 'Notarihiny... aho: tahaka ny fanao amin’ny andian’ondry izany.'
  - type: text
    content: ', ka nampandehaniny'
  - type: text
    content: tamin’ny maizina fa tsy tamin’ny mazava.
  '20':
  - type: text
    content: Tsaroako tokoa izany, eny, tsaroako
  - type: text
    content: ka trotraka aho tamin’ny nanjo ahy.
  '21':
  - type: text
    content: Izao anefa no hoeritreretiko am-po
  - type: text
    content: 'sady antony hanantenako:'
  - type: heading
    content: HETA
  '22':
  - type: text
    content: Tsy ritra ny mari-pitiavan’ny TOMPO
  - type: text
    content: ary tsy mitsahatra ny famindrampony;
  '23':
  - type: text
    content: vaovao isa-maraina ireny.
  - type: text
    content: Fatratra ny toetranao mahatoky, Tompo ô!
  '24':
  - type: text
    content: 'Hoy aho anakampo hoe: ny TOMPO no anjarako;'
  - type: text
    content: noho izany, dia manantena Azy aho.
  - type: heading
    content: TETA
  '25':
  - type: text
    content: Tsara ny TOMPO amin’izay miandry Azy,
  - type: text
    content: dia amin’ny olona mitady Azy.
  '26':
  - type: text
    content: Tsara ny manantena mangina
  - type: text
    content: ny famonjen’ny TOMPO.
  '27':
  - type: text
    content: Tsara ho an’ny lehilahy
  - type: text
    content: 'ny mitondra '
  - type: text
    content: zioga
  - type: text
    content: ' amin’ny fahatanorany.'
  - type: heading
    content: JODA
  '28':
  - type: text
    content: Aoka izy hipetraka mitokana sy hangina,
  - type: text
    content: rehefa mizaha toetra azy ny Tompo.
  '29':
  - type: text
    content: Aoka hanohoka vava am-bovoka izy,
  - type: text
    content: ndrao mba hisy fanantenana.
  '3':
  - type: text
    content: Izaho irery ihany no velesin’ny tanany
  - type: text
    content: mandritra ny andro manontolo.
  - type: heading
    content: BETA
  '30':
  - type: text
    content: Aoka izy hanolotra ny takolany
  - type: text
    content: amin’izay mikapoka azy
  - type: note
    content: Ampit Mt 5.39.
  - type: text
    content: ', ka ho voky latsa!'
  - type: heading
    content: KAFA
  '31':
  - type: text
    content: Fa tsy hanary mandrakizay ny Tompo.
  '32':
  - type: text
    content: Fa raha mampahory Izy, dia mamindrafo
  - type: text
    content: araka ny halehiben’ny fitiavany.
  '33':
  - type: text
    content: Fa tsy sitrany ny mampahory
  - type: text
    content: na mampijaly ny olombelona.
  - type: heading
    content: LAMEDA
  '34':
  - type: text
    content: Rehefa hosihosena avokoa
  - type: text
    content: ny mpigadra eo amin’ny tany,
  '35':
  - type: text
    content: rehefa ny zon’olombelona no hitsakitsahina
  - type: text
    content: eo anatrehan’ilay Avo Indrindra,
  '36':
  - type: text
    content: rehefa ny rariny no avadika eo amin’ny fitsarana,
  - type: text
    content: dia tsy ho hitan’ny Tompo ve izany?
  - type: heading
    content: MEMA
  '37':
  - type: text
    content: Iza moa no miteny, dia mampisy zavatra
  - type: note
    content: Jereo Sal 33.9.
  - type: text
    content: '?'
  - type: text
    content: Moa tsy ny Tompo va no mandidy?
  '38':
  - type: text
    content: Moa tsy ny tenin’ilay Avo Indrindra ve
  - type: text
    content: no mampisy ny loza sy ny soa?
  '39':
  - type: text
    content: Koa inona àry no imenomenonan’ny olona
  - type: text
    content: izay mbola velona sy tomady,
  - type: text
    content: na dia eo aza ny fahotany?
  - type: heading
    content: NONA
  '4':
  - type: text
    content: Nolazoiny ny nofoko sy ny hoditro,
  - type: text
    content: ary notapatapahiny ny taolako.
  '40':
  - type: text
    content: Dinihontsika sy fantaro ny fitondrantenantsika,
  - type: text
    content: ka miverena amin’ny TOMPO isika.
  '41':
  - type: text
    content: Aoka hasandratsika miaraka ny fo aman-tanana
  - type: note
    content: Jereo 2.19 sy nta.
  - type: text
    content: ','
  - type: text
    content: rehefa mivavaka amin’Andriamanitra any an-danitra isika.
  '42':
  - type: text
    content: Efa nanota sady nikomy izahay;
  - type: text
    content: ary Ianao, Tompo ô, tsy namela heloka anay.
  - type: heading
    content: SAMEKA
  '43':
  - type: text
    content: Nisarom-pahatezerana Ianao no nanenjika anay,
  - type: text
    content: ka nandringana anay tsy nisy fiantrana.
  '44':
  - type: text
    content: Nisaron-drahona Ianao
  - type: text
    content: mba tsy ho takatry ny vavakay.
  '45':
  - type: text
    content: Nataonao fakofako sy fanary
  - type: text
    content: teo anivon’ny firenen-kafa izahay.
  - type: heading
    content: PE
  '46':
  - type: text
    content: Nanoka-bava hamely anay
  - type: text
    content: ny fahavalonay rehetra.
  '47':
  - type: text
    content: Horohoro sy fanina no mahavoa anay,
  - type: text
    content: ary koa fandringanana sy faharatrana.
  '48':
  - type: text
    content: Rano mandriaka no avoakan’ny masoko
  - type: text
    content: noho ny faharatrana nanjo ny fireneko.
  - type: heading
    content: HAINA
  '49':
  - type: text
    content: Mikoriana ranomaso tsy mety ritra ny masoko
  - type: text
    content: satria tsy misy fitsaharanay mihitsy.
  '5':
  - type: text
    content: Nampijoro tovon-tany hamelezana ahy Izy,
  - type: text
    content: ka zava-mangidy sy fahoriana no nataony manemitra ahy.
  '50':
  - type: text
    content: Andrasako ny hitsinjovan’ny TOMPO
  - type: text
    content: ka hijereny avy any an-danitra.
  '51':
  - type: text
    content: Fijaliana ho ahy ny mahita
  - type: text
    content: izay manjo ny zazavavy rehetra ao an-tanànako.
  - type: heading
    content: '*'
  - type: heading
    content: TSADE
  '52':
  - type: text
    content: Ireo fahavaloko tsy amin’antony
  - type: text
    content: manenjika ahy toy ny fanenji-boronkely.
  '53':
  - type: text
    content: Nanidy ahy velona
  - type: text
    content: tao an-davaka izy
  - type: text
    content: ary nanjera vato teo amboniko
  - type: note
    content: 'nanjera vato teo amboniko: dkt hafa: nitora-bato ahy.'
  - type: text
    content: .
  '54':
  - type: text
    content: Nandifotra ny lohako ny rano,
  - type: text
    content: 'ka hoy aho hoe: «Very aho ity!»'
  - type: heading
    content: KÔFA
  '55':
  - type: text
    content: Avy tany am-paran’ny lava-drano aho
  - type: text
    content: no niantso vonjy taminao, TOMPO ô.
  '56':
  - type: text
    content: 'Renao ny feoko manao hoe: «Aza anampenan-tsofina'
  - type: text
    content: ny fitarainako miantso vonjy aminao.»
  '57':
  - type: text
    content: Nanatona Ianao tamin’ny andro niantsoako Anao,
  - type: text
    content: 'ka nanao tamiko hoe: «Aza matahotra!»'
  - type: heading
    content: RESA
  '58':
  - type: text
    content: Tompo ô, niady ho ahy Ianao
  - type: text
    content: ka nanavotra ny aiko.
  '59':
  - type: text
    content: TOMPO ô, hitanao ny fiangarana natao tamiko
  - type: text
    content: ka notsarainao ara-drariny aho.
  '6':
  - type: text
    content: Nampitoeriny tao amin’ny haizina aho
  - type: text
    content: tahaka ireo efa maty fahiny.
  - type: heading
    content: GIMELA
  '60':
  - type: text
    content: Hitanao avokoa ny valifaty nataony tamiko,
  - type: text
    content: dia izay rehetra nokasainy hamelezana ahy.
  - type: heading
    content: SINA
  '61':
  - type: text
    content: TOMPO ô, efa renao ny latsa nataony,
  - type: text
    content: dia izay rehetra nokasainy hamelezana ahy.
  '62':
  - type: text
    content: Izay lazain’ny mpanohitra ahy sy eritreretiny
  - type: text
    content: dia kendreny hamelezana ahy tontolo andro.
  '63':
  - type: text
    content: Jereo izy na mipetraka na mitsangana
  - type: text
    content: fa izaho ihany no ambentin-dresany.
  - type: heading
    content: TAO
  '64':
  - type: text
    content: TOMPO ô, araka izay nataony tamiko
  - type: text
    content: no hamalianao azy koa.
  '65':
  - type: text
    content: Hataonao donto ny fisainany;
  - type: text
    content: ary hiharan’ny ozonao ireo.
  '66':
  - type: text
    content: Hoenjehinao amim-pahatezerana izy
  - type: text
    content: ka haringanao tsy ho etỳ ambonin’ny tany.
  '7':
  - type: text
    content: Nofefeny manodidina aho tsy ho afa-nivoaka;
  - type: text
    content: nataony mavesatra ny gadrako.
  '8':
  - type: text
    content: Nikiakiaka niantso vonjy aho;
  - type: text
    content: fa nosakanany ny fivavako.
  '9':
  - type: text
    content: Notampenany rindrim-bato voapaika ny lalako
  - type: text
    content: ary naolikoliny ny alehako.
  - type: heading
    content: DALETA
