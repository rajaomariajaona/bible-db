  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nanenjana ny tsipîkany Izy
  - type: usfm
    marker: q1
