  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tsara ho an’ny lehilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny mitondra '
    - type: usfm
      marker: w
      children:
      - type: text
