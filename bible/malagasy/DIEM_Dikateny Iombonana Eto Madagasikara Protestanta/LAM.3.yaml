      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataony resaka fanarabiana isan’andro.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nobobohan’ny Tompo zava-mampalahelo aho
  - type: usfm
    marker: q1
    children:
    - type: text
