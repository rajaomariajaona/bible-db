document_id: RUT.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mangataka mba harovan’i Bôhaza sy hataony loloha i Rota
  - type: text
    content: 'Indray andro dia hoy i Nahômỳ rafozambaviny tamin’i Rota:'
  - type: text
    content: '–Tsy maintsy mitady tokantrano misy fiadanana izay hahasoa anao aho anaka. '
  '10':
  - type: text
    content: 'Dia hoy i Bôhaza hoe:'
  - type: text
    content: –
  - type: text
    content: Hotahin
  - type: text
    content: '’ny TOMPO anie ianao, ry Rota! Ny firaiketam-po nasehonao tamin’ny fianakavian-drafozanao tamin’izao farany izao dia tsara lavitra noho ny tamin’ny voalohany; fa tsy nanaraka ireo tovolahy, na ny mahantra na ny manan-karena, ianao. '
  '11':
  - type: text
    content: 'Koa ankehitriny, aza matahotra ianao, fa izay rehetra lazainao dia hataoko ho anao satria fantatry ny olona rehetra eto an-tanàna, fa vehivavy mendri-kaja ianao. '
  '12':
  - type: text
    content: 'Marina tokoa fa izaho dia havana mahavotra anao, kanefa mbola misy havana akaiky kokoa noho izaho mahavotra anao. '
  '13':
  - type: text
    content: Mijanona eto ianao izao alina izao; fa anio maraina, raha hitondra loloha anao tokoa izy, dia tsara; aoka izy no hitondra loloha anao! Raha tsy tiany kosa ny hanao izany, dia izaho no hitondra loloha anao. Velona ny TOMPO ka eo anatrehany aho no mianiana hanao izany; fa matoria aloha ambara-paharainan’ny andro.
  '14':
  - type: text
    content: 'Dia natory teo an-tongotr’i Bôhaza ambara-paharainan’ny andro i Rota, kanefa nifoha raha mbola maizimaizina tsy ahafantaran’olona iny. I Bôhaza manko nanao anakampo hoe: «Tsy tokony hisy hahalala fa tonga tatỳ am-pamoloana ravehivavy!»; '
  '15':
  - type: text
    content: 'ka hoy izy tamin’i Rota:'
  - type: text
    content: –Ento etỳ iny lamba itafianao iny, ary hazony tsara. Rehefa nataony izany, dia nofenoin’i Bôhaza vary ôrza 15 kilao ka nampitondrainy azy. Dia lasa nody tany an-tanàna i Rota
  - type: note
    content: 'Lasa nody izy (vehivavy)...: araka ireo dkt taloha sy ny rijan-teny hebreo; ny rijan-teny hebreo nentin-drazana lasa nody izy (lehilahy)... 16 Nandeha namonjy...'
  - type: text
    content: '; '
  '16':
  - type: text
    content: 'ary nony tonga tany amin’ny rafozambaviny izy, dia nanontaniany hoe:'
  - type: text
    content: –Nanao ahoana ianao tany, anaka?
  - type: text
    content: 'Dia notantarain’i Rota azy avokoa izay nataon’i Bôhaza taminy, '
  '17':
  - type: text
    content: 'sady niteny koa izy hoe:'
  - type: text
    content: '–Nomeny ireto vary ôrza 15 kilao ireto aho, fa hoy izy tamiko: «Aza miverina mitondra tanam-polo mody fotsiny any amin’ny rafozambavinao!»'
  '18':
  - type: text
    content: 'Dia hoy i Nahômỳ hoe:'
  - type: text
    content: –Mipetraha eto, anaka, mandra-pahafantaranao izay hiafaran’ny raharaha; satria tsy hijanona i Bôhaza, raha tsy vitany anio ihany ny raharaha.
  '2':
  - type: text
    content: Fantatrao fa havantsika i Bôhaza sady ianao efa niara-niasa tamin’ny vehivavy mpiasany. Indro izy hikororoka vary ôrza ao am-pamoloana anio alina
  - type: note
    content: 'Famoloana: toerana fivelesana vary mba hisarahan’ny voany amin’ny fonony.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Koa mandroa ianao, mihosora zava-manitra, dia anaovy ny akanjonao tsara indrindra; avy eo dia midina any am-pamoloana, kanefa aza atao fantatr’i Bôhaza akory izany raha tsy efa avy nihinana sy nisotro izy. '
  '4':
  - type: text
    content: Rehefa handeha handry izy, dia fantaro ny toerana izay handriany; ary mankanesa eo, ka sokafy kely ny lamba eo an-tongony, dia mandria eo
  - type: note
    content: Io fihetsika ataon’i Rota io dia mitovy amin’ny fangatahana fiarovana. Jereo and.9.
  - type: text
    content: ; fa izy mihitsy no hanoro anao izay hataonao.
  '5':
  - type: text
    content: 'Dia hoy i Rota tamin’i Nahômỳ:'
  - type: text
    content: –Hataoko avokoa izay nolazainao tamiko.
  '6':
  - type: text
    content: 'Dia nidina nankany am-pamoloana izy ary nanao araka izay rehetra nodidian-drafozany azy. '
  '7':
  - type: text
    content: Ary rehefa avy nihinana sy nisotro i Bôhaza, dia faly ka lasa nandry teo antsisin’ny antontam-bary
  - type: note
    content: Natory teo an-tsisin’ny antontam-bary i Bôhaza mba hiambina izany mandritry ny alina.
  - type: text
    content: '; nanatona moramora kosa i Rota, dia nanokatra kely ny lamba teo an-tongotr’i Bôhaza ka nandry teo. '
  '8':
  - type: text
    content: Ary nony tamin’ny sasak’alina, dia taitra ralehilahy ary niondrika hijery, ka gaga dia gaga nahita vehivavy iray mandry eo an-tongony.
  '9':
  - type: text
    content: 'Dia nanontany i Bôhaza hoe:'
  - type: text
    content: –Fa iza moa ianao?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Izaho Rota ihany ity, tompoko! Mba raiso ho eo ambany fiarovanao aho satria ianao no havana mahavotra ahy
  - type: note
    content: 'Havana mahavotra: Jereo 2.20 sy nta.'
  - type: text
    content: .
