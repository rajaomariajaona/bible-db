document_id: RUT.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mangataka mba harovan’i Bôhaza sy hataony loloha i Rota
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Indray andro dia hoy i Nahômỳ rafozambaviny tamin’i Rota:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy maintsy mitady tokantrano misy fiadanana izay hahasoa anao aho anaka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy i Bôhaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hotahin
    - type: text
      text: '’ny TOMPO anie ianao, ry Rota! Ny firaiketam-po nasehonao tamin’ny fianakavian-drafozanao tamin’izao farany izao dia tsara lavitra noho ny tamin’ny voalohany; fa tsy nanaraka ireo tovolahy, na ny mahantra na ny manan-karena, ianao. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa ankehitriny, aza matahotra ianao, fa izay rehetra lazainao dia hataoko ho anao satria fantatry ny olona rehetra eto an-tanàna, fa vehivavy mendri-kaja ianao. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Marina tokoa fa izaho dia havana mahavotra anao, kanefa mbola misy havana akaiky kokoa noho izaho mahavotra anao. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mijanona eto ianao izao alina izao; fa anio maraina, raha hitondra loloha anao tokoa izy, dia tsara; aoka izy no hitondra loloha anao! Raha tsy tiany kosa ny hanao izany, dia izaho no hitondra loloha anao. Velona ny TOMPO ka eo anatrehany aho no mianiana hanao izany; fa matoria aloha ambara-paharainan’ny andro.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia natory teo an-tongotr’i Bôhaza ambara-paharainan’ny andro i Rota, kanefa nifoha raha mbola maizimaizina tsy ahafantaran’olona iny. I Bôhaza manko nanao anakampo hoe: «Tsy tokony hisy hahalala fa tonga tatỳ am-pamoloana ravehivavy!»; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ka hoy izy tamin’i Rota:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ento etỳ iny lamba itafianao iny, ary hazony tsara. Rehefa nataony izany, dia nofenoin’i Bôhaza vary ôrza 15 kilao ka nampitondrainy azy. Dia lasa nody tany an-tanàna i Rota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Lasa nody izy (vehivavy)...:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ireo dkt taloha sy ny rijan-teny hebreo; ny rijan-teny hebreo nentin-drazana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lasa nody izy (lehilahy)... 16 Nandeha namonjy...
      marker-yv: yv-n
    - type: text
      text: '; '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary nony tonga tany amin’ny rafozambaviny izy, dia nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nanao ahoana ianao tany, anaka?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notantarain’i Rota azy avokoa izay nataon’i Bôhaza taminy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'sady niteny koa izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nomeny ireto vary ôrza 15 kilao ireto aho, fa hoy izy tamiko: «Aza miverina mitondra tanam-polo mody fotsiny any amin’ny rafozambavinao!»'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia hoy i Nahômỳ hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mipetraha eto, anaka, mandra-pahafantaranao izay hiafaran’ny raharaha; satria tsy hijanona i Bôhaza, raha tsy vitany anio ihany ny raharaha.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fantatrao fa havantsika i Bôhaza sady ianao efa niara-niasa tamin’ny vehivavy mpiasany. Indro izy hikororoka vary ôrza ao am-pamoloana anio alina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Famoloana:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana fivelesana vary mba hisarahan’ny voany amin’ny fonony.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa mandroa ianao, mihosora zava-manitra, dia anaovy ny akanjonao tsara indrindra; avy eo dia midina any am-pamoloana, kanefa aza atao fantatr’i Bôhaza akory izany raha tsy efa avy nihinana sy nisotro izy. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rehefa handeha handry izy, dia fantaro ny toerana izay handriany; ary mankanesa eo, ka sokafy kely ny lamba eo an-tongony, dia mandria eo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Io fihetsika ataon’i Rota io dia mitovy amin’ny fangatahana fiarovana. Jereo and.9.
      marker-yv: yv-n
    - type: text
      text: ; fa izy mihitsy no hanoro anao izay hataonao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy i Rota tamin’i Nahômỳ:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hataoko avokoa izay nolazainao tamiko.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nidina nankany am-pamoloana izy ary nanao araka izay rehetra nodidian-drafozany azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary rehefa avy nihinana sy nisotro i Bôhaza, dia faly ka lasa nandry teo antsisin’ny antontam-bary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Natory teo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: an-tsisin’ny antontam-bary
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' i Bôhaza mba hiambina izany mandritry ny alina.'
      marker-yv: yv-n
    - type: text
      text: '; nanatona moramora kosa i Rota, dia nanokatra kely ny lamba teo an-tongotr’i Bôhaza ka nandry teo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary nony tamin’ny sasak’alina, dia taitra ralehilahy ary niondrika hijery, ka gaga dia gaga nahita vehivavy iray mandry eo an-tongony.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nanontany i Bôhaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa iza moa ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho Rota ihany ity, tompoko! Mba raiso ho eo ambany fiarovanao aho satria ianao no havana mahavotra ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Havana mahavotra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.20 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
