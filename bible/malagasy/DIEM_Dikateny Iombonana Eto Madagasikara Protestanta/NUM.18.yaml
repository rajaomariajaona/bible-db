document_id: NUM.18,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Aharôna:'
  - type: text
    content: '–Ianao sy ny taranakao ary ny taranak’i Levỳ razambenao no hitambesaran’ny heloka atao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: '. Fa ianao sy ny taranakao irery ihany no ho tompon’andraikitry ny heloka ataonareo amin’ny fisoronana. '
  '10':
  - type: text
    content: 'ka hataonareo sakafo. Ny lehilahy rehetra ao amin’ny ankohonanareo ihany no mahazo mihinana azy satria sakafo masina izany. '
  '11':
  - type: text
    content: 'Ary ireto koa dia ho anareo: ireo ampahany nalana tamin’ny fanomezan’ny Israelita, dia ny fanatitra rehetra ahevaheva; omeko ho anjara raikitra ho anao sy ny taranakao lahy sy vavy izany. Izay rehetra '
  - type: text
    content: madio
  - type: text
    content: ' ao amin’ny ankohonanareo dia mahazo mihinana izany. '
  '12':
  - type: text
    content: 'Homeko anareo koa ny tsara indrindra amin’ny menaka sy ny divay vaovao ary ny vary sy ny voamaina izay aterin’ny Israelita ho voaloham-bokatra ho Ahy TOMPO. '
  '13':
  - type: text
    content: 'Eny, ho anareo avokoa ny santa-bokatry ny taniny, izay hateriny amiko. Izay rehetra madio ao an-tranonareo dia afaka hihinana izany. '
  '14':
  - type: text
    content: Ny zavatra rehetra natokan’ny Israelita ho Ahy dia raikitra ho anareo koa
  - type: note
    content: Jereo Lev 27.28.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Farany dia ho anareo avokoa ny voalohan-teraka rehetra izay aterina ho Ahy TOMPO, na olona izany na biby; kanefa dia havotanareo ny voalohan-teraky ny olona sy ny voalohan-teraky ny biby maloto. '
  '16':
  - type: text
    content: 'Ny fanavotana ny zaza, izay azo aloa rehefa feno iray volana izy, dia vola sekela dimy araka ny sekela masina izay milanja folo grama. '
  '17':
  - type: text
    content: 'Fa tsy mba havotanao kosa ny voalohan-teraky ny omby na ny ondry na ny osy satria voatokana ho Ahy ireny. Hararakao eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ny rany ary hodoranao manontolo ny saborany ka hanetona ho hanitra ankasitrahina ho AHY izany. '
  '18':
  - type: text
    content: Avy eo ny henany dia ho anareo, tahaka ny maha anareo koa ny tratrany izay fanatitra ahevaheva sy ny feny havanana.
  '19':
  - type: text
    content: «Omeko ho anjara raikitra ho anao sy ny zanakao lahy ary ny zanakao vavy izay fanatitra masina rehetra avahan’ny Israelita ho Ahy TOMPO. Ho anao sy ho an’ny taranakao dia ho fanekempihavanana maharitra sady tsy azo ovana izany
  - type: note
    content: Ampit Lev 2.13; 2 Tan 13.5 sy nta.
  - type: text
    content: ' eo anatrehako.»'
  '2':
  - type: text
    content: 'Ento miaraka aminao koa ireo '
  - type: text
    content: levita
  - type: text
    content: ' mpiray foko aminao, fa izy ireo no ho mpanampy anao sy ho mpanomponao rehefa mankeo amin’ny Tranolay misy ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: ' ianao sy ny taranakao; '
  '20':
  - type: text
    content: 'Dia hoy indray ny TOMPO tamin’i Aharôna:'
  - type: text
    content: –Tsy mba hahazo fananana sy anjara ianao eo amin’ny tanin’ireo Israelita, fa Izaho no anjaranao sy fanananao eo anivon’ny Israelita hafa.
  - type: heading
    content: Ny karaman’ny levita
  '21':
  - type: text
    content: 'Ary hoy koa ny TOMPO hoe:'
  - type: text
    content: '–Ny '
  - type: text
    content: levita
  - type: text
    content: ' kosa dia omeko ny fahafolon-karena rehetra voaangona amin’ny Israelita noho ny asam-panompoany ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: note
    content: Jereo Lev 27.30-33; Deot 14.22-29.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Koa tsy mahazo manakaiky ny Tranolay fihaonana intsony ny Israelita fandrao hitambesaran-keloka hahafaty azy izy. '
  '23':
  - type: text
    content: Ny levita ihany no hanatanteraka ny fanompoana momba ny Tranolay fihaonana, ary izy ihany no itambesaran’ny hadisoana vitany ao. Ho lalàna raikitra eo amin’ny taranakareo hatrany izany. Tsy handray faritany ho lova eo anivon’ny Israelita ny levita
  - type: note
    content: Ampit 35.1-8.
  - type: text
    content: ', '
  '24':
  - type: text
    content: fa homeko ho anjarany kosa ny fahafolon-karena izay aterin’ny Israelita ho Ahy TOMPO; izany no nilazako taminy fa tsy handray faritany ho lova eo anivon’ny Israelita izy.
  '25':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '26':
  - type: text
    content: 'mba hamepetra ny levita hoe:'
  - type: text
    content: '–Rehefa mandray avy amin’ny Israelita ny fahafolon-karena izay efa homeko ho anjaranareo ianareo, dia anokany ampahafolony izany ho Ahy TOMPO. '
  '27':
  - type: text
    content: 'Izay hatokanareo dia hisaina mitovy amin’ny fanatitra avahan’ny olona ho Ahy amin’ny vary sy ny voamaina na ny divay vaovao. '
  '28':
  - type: text
    content: 'Toy izany no hanateranareo fanatitra ho Ahy TOMPO, avy amin’ny fahafolon-karena izay horaisinareo amin’ny Israelita. Koa haterinareo amin’i Aharôna mpisorona izany fanomezana ho AHY izany. '
  '29':
  - type: text
    content: 'Amin’ny zavatra rehetra azonareo no hanavahanareo tsy misy banga ny ampahany tsara indrindra izay hatokanareo ho Ahy TOMPO. '
  '3':
  - type: text
    content: 'hanompo anao sy hikarakara ny Tranolay manontolo izy, nefa tsy hanakaiky ny fanaky ny Toeramasina sy ny '
  - type: text
    content: alitara
  - type: text
    content: ' fandrao maty na ny tenany na ny tenanareo. '
  '30':
  - type: text
    content: 'Ary rehefa navahanareo izay ampahany tsara indrindra amin’izany rehetra izany, dia hotananareo ho anareo levita ny ambiny, tahaka ny itanan’ny Israelita hafa ny ambin’ny vokatra avy eo am-pamoloany sy ny vokatra avy eo amin’ny famiazany. '
  '31':
  - type: text
    content: 'Mahazo mihinana izany vokatra izany ianareo sy ny fianakavianareo amin’ny toerana izay tianareo, fa karamanareo izany noho ny asa fanompoanareo ao amin’ny Tranolay fihaonana. '
  '32':
  - type: text
    content: Tsy manota akory ianareo amin’izany, rehefa ny ampahany tsara indrindra aminy no navahanareo; tsy handoto ny fanatitra masina entin’ny Israelita akory ianareo, ka dia tsy ho faty.
  '4':
  - type: text
    content: 'Ho mpanampy anareo amin’ny fanompoana rehetra sy ny asa hatao ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' izy. Ary tsy hisy olon-kafa hanakaiky anareo. '
  '5':
  - type: text
    content: 'Hotanterahinareo ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' sy eo amin’ny alitara ny asa fanompoanareo mba tsy hirehetan’ny fahatezerako intsony amin’ny Israelita. '
  '6':
  - type: text
    content: 'Indro efa nofidiko tamin’ny Israelita ny Levita mpiray foko aminareo; koa dia Ahy TOMPO izy ireo ka hatolotro anareo mba hanao ny fanompoana ao amin’ny Tranolay fihaonana. '
  '7':
  - type: text
    content: Fa ianao sy ny taranakao kosa dia hanatanteraka ny fisoronanareo eo amin’ny alitara sy ao amin’ny Toeramasina Indrindra, ao ambadiky ny efitra lamba. Izaho no hanome anareo maimaimpoana izany asa fisoronana izany; raha misy olon-kafa manakaiky eo dia tsy maintsy maty izy.
  - type: heading
    content: Ny karaman’ny mpisorona
  '8':
  - type: text
    content: 'Niteny tamin’i Aharôna ny TOMPO ka nanao hoe:'
  - type: text
    content: '–Indro efa nampiandraiketiko anao ny fanatitra masina rehetra aterin’ny Israelita ho Ahy; omeko ho anjara raikitra ho anao sy ny taranakao izany. '
  '9':
  - type: text
    content: 'Ireto avy no horaisinareo amin’ny fanatitra masina indrindra, afa-tsy izay zavatra dorana: ny fanomezana rehetra hataon’ny Israelita amiko, izany hoe ny fanatitra lafarinina rehetra sy ny sorona rehetra fanalana ny ota ary ny sorom-panonerana rehetra; ireo fanatitra masina indrindra ireo dia ho anao sy ny taranakao, '
