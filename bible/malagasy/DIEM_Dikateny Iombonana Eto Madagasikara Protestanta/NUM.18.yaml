document_id: NUM.18
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy ny TOMPO tamin’i Aharôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianao sy ny taranakao ary ny taranak’i Levỳ razambenao no hitambesaran’ny heloka atao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: '. Fa ianao sy ny taranakao irery ihany no ho tompon’andraikitry ny heloka ataonareo amin’ny fisoronana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ento miaraka aminao koa ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' mpiray foko aminao, fa izy ireo no ho mpanampy anao sy ho mpanomponao rehefa mankeo amin’ny Tranolay misy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny fanekempihavanana
  - type: text
    text: ' ianao sy ny taranakao; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hanompo anao sy hikarakara ny Tranolay manontolo izy, nefa tsy hanakaiky ny fanaky ny Toeramasina sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fandrao maty na ny tenany na ny tenanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ho mpanampy anareo amin’ny fanompoana rehetra sy ny asa hatao ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' izy. Ary tsy hisy olon-kafa hanakaiky anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hotanterahinareo ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' sy eo amin’ny alitara ny asa fanompoanareo mba tsy hirehetan’ny fahatezerako intsony amin’ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indro efa nofidiko tamin’ny Israelita ny Levita mpiray foko aminareo; koa dia Ahy TOMPO izy ireo ka hatolotro anareo mba hanao ny fanompoana ao amin’ny Tranolay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ianao sy ny taranakao kosa dia hanatanteraka ny fisoronanareo eo amin’ny alitara sy ao amin’ny Toeramasina Indrindra, ao ambadiky ny efitra lamba. Izaho no hanome anareo maimaimpoana izany asa fisoronana izany; raha misy olon-kafa manakaiky eo dia tsy maintsy maty izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny karaman’ny mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Niteny tamin’i Aharôna ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro efa nampiandraiketiko anao ny fanatitra masina rehetra aterin’ny Israelita ho Ahy; omeko ho anjara raikitra ho anao sy ny taranakao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ireto avy no horaisinareo amin’ny fanatitra masina indrindra, afa-tsy izay zavatra dorana: ny fanomezana rehetra hataon’ny Israelita amiko, izany hoe ny fanatitra lafarinina rehetra sy ny sorona rehetra fanalana ny ota ary ny sorom-panonerana rehetra; ireo fanatitra masina indrindra ireo dia ho anao sy ny taranakao, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka hataonareo sakafo. Ny lehilahy rehetra ao amin’ny ankohonanareo ihany no mahazo mihinana azy satria sakafo masina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ireto koa dia ho anareo: ireo ampahany nalana tamin’ny fanomezan’ny Israelita, dia ny fanatitra rehetra ahevaheva; omeko ho anjara raikitra ho anao sy ny taranakao lahy sy vavy izany. Izay rehetra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: ' ao amin’ny ankohonanareo dia mahazo mihinana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Homeko anareo koa ny tsara indrindra amin’ny menaka sy ny divay vaovao ary ny vary sy ny voamaina izay aterin’ny Israelita ho voaloham-bokatra ho Ahy TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eny, ho anareo avokoa ny santa-bokatry ny taniny, izay hateriny amiko. Izay rehetra madio ao an-tranonareo dia afaka hihinana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny zavatra rehetra natokan’ny Israelita ho Ahy dia raikitra ho anareo koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 27.28.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Farany dia ho anareo avokoa ny voalohan-teraka rehetra izay aterina ho Ahy TOMPO, na olona izany na biby; kanefa dia havotanareo ny voalohan-teraky ny olona sy ny voalohan-teraky ny biby maloto. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny fanavotana ny zaza, izay azo aloa rehefa feno iray volana izy, dia vola sekela dimy araka ny sekela masina izay milanja folo grama. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa tsy mba havotanao kosa ny voalohan-teraky ny omby na ny ondry na ny osy satria voatokana ho Ahy ireny. Hararakao eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ny rany ary hodoranao manontolo ny saborany ka hanetona ho hanitra ankasitrahina ho AHY izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Avy eo ny henany dia ho anareo, tahaka ny maha anareo koa ny tratrany izay fanatitra ahevaheva sy ny feny havanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: «Omeko ho anjara raikitra ho anao sy ny zanakao lahy ary ny zanakao vavy izay fanatitra masina rehetra avahan’ny Israelita ho Ahy TOMPO. Ho anao sy ho an’ny taranakao dia ho fanekempihavanana maharitra sady tsy azo ovana izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lev 2.13; 2 Tan 13.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' eo anatrehako.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy indray ny TOMPO tamin’i Aharôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mba hahazo fananana sy anjara ianao eo amin’ny tanin’ireo Israelita, fa Izaho no anjaranao sy fanananao eo anivon’ny Israelita hafa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny karaman’ny levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy koa ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' kosa dia omeko ny fahafolon-karena rehetra voaangona amin’ny Israelita noho ny asam-panompoany ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 27.30-33; Deot 14.22-29.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa tsy mahazo manakaiky ny Tranolay fihaonana intsony ny Israelita fandrao hitambesaran-keloka hahafaty azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny levita ihany no hanatanteraka ny fanompoana momba ny Tranolay fihaonana, ary izy ihany no itambesaran’ny hadisoana vitany ao. Ho lalàna raikitra eo amin’ny taranakareo hatrany izany. Tsy handray faritany ho lova eo anivon’ny Israelita ny levita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 35.1-8.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: fa homeko ho anjarany kosa ny fahafolon-karena izay aterin’ny Israelita ho Ahy TOMPO; izany no nilazako taminy fa tsy handray faritany ho lova eo anivon’ny Israelita izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'mba hamepetra ny levita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Rehefa mandray avy amin’ny Israelita ny fahafolon-karena izay efa homeko ho anjaranareo ianareo, dia anokany ampahafolony izany ho Ahy TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izay hatokanareo dia hisaina mitovy amin’ny fanatitra avahan’ny olona ho Ahy amin’ny vary sy ny voamaina na ny divay vaovao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Toy izany no hanateranareo fanatitra ho Ahy TOMPO, avy amin’ny fahafolon-karena izay horaisinareo amin’ny Israelita. Koa haterinareo amin’i Aharôna mpisorona izany fanomezana ho AHY izany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Amin’ny zavatra rehetra azonareo no hanavahanareo tsy misy banga ny ampahany tsara indrindra izay hatokanareo ho Ahy TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary rehefa navahanareo izay ampahany tsara indrindra amin’izany rehetra izany, dia hotananareo ho anareo levita ny ambiny, tahaka ny itanan’ny Israelita hafa ny ambin’ny vokatra avy eo am-pamoloany sy ny vokatra avy eo amin’ny famiazany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mahazo mihinana izany vokatra izany ianareo sy ny fianakavianareo amin’ny toerana izay tianareo, fa karamanareo izany noho ny asa fanompoanareo ao amin’ny Tranolay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tsy manota akory ianareo amin’izany, rehefa ny ampahany tsara indrindra aminy no navahanareo; tsy handoto ny fanatitra masina entin’ny Israelita akory ianareo, ka dia tsy ho faty.
