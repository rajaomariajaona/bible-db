document_id: ECC.12,396
type_code: plt
verses:
  '1':
  - type: text
    content: Aza hadino Ilay nahary anao amin’ny androm-pahatanoranao
  - type: note
    content: 'Ilay nahary anao: ny teny hebreo ampiasaina eto dia azo adika koa hoe ny fasanao –Amin’ny dkt sasany ny 11.9-10 dia marihina 12.1-2, noho izany ny 12.1-14 dia lasa 12.3-16.'
  - type: text
    content: '. Tsarovy Izy dieny tsy mbola tonga ny androm-pahosanao ary tsy mbola mihatra ny taona izay hitenenanao hoe: «Mankaleo ahy ny miaina.» '
  '10':
  - type: text
    content: 'Fa niezaka ny hilazalaza ny zava-misy tamim-pahamarinana i Kôheleta no nanao izay hahitana teny mahaliana koa. '
  '11':
  - type: text
    content: Ny tenin’ny hendry dia manindrontsindrom-panahy tahaka ny fanjaitra; ary ireo mpanangona azy dia mamefy soritra tahaka ny tsatomarika. Fanomezana avy amin’ilay hany mpitarika
  - type: note
    content: 'ilay hany mpitarika: Andriamanitra izany, hoy ny sasany; i Mosesy na i Salômôna izany, hoy ny hafa.'
  - type: text
    content: ' avokoa ireny. '
  '12':
  - type: text
    content: Fanampin’izany koa, anaka, dia minoa anatra ianao. Fa tsy mba voafetra ny isan’ny boky azo soratana, ary mandrera-tena ny manokana fotoana maro hianarana.
  '13':
  - type: text
    content: 'Ary izao no fehin-teny momba izay rehetra voalaza: hajao Andriamanitra ary tandremo ny didiny, satria izany no andraikitry ny olona tsirairay. '
  '14':
  - type: text
    content: Fa hotsarain’Andriamanitra avokoa ny zavatra atao, dia ny amin’izay rehetra fonosiny na tsara izany na ratsy.
  '2':
  - type: text
    content: 'Amin’ny androm-pahosanao manko dia hihamatroka ny fahazavan’ny masoandro, hanjavozavo ny volana aman-kintana, ary hivangongo ny rahona mitondra orana. '
  '3':
  - type: text
    content: 'Amin’izay ny sandry aman-tanana fiarovanao tena dia hipararetra; ny ranjonao nijaridina dia hikolepaka; ny nifinao efa nihavitsy loatra dia tsy hahahota sakafo intsony; ary hihapahina ny masonao ka tsy hahita tsara intsony. '
  '4':
  - type: text
    content: 'Amin’ny androm-pahosanao koa dia hikombona ny molotrao satria hihareraka ny vodivazanao mihomokomoka ao anaty vavanao; ary ho donto ny sofinao, ka tsy ho tandrinao ny fikalom-boron-kely ary halefaka aminao avokoa ny feon’ny mpihira. '
  '5':
  - type: text
    content: Amin’izay koa dia hatahotra ny hiani-piakarana ianao ary ho be fanahiana rehefa mamindra; ny volon-dohanao hihafotsy toy ny voninkazo mamony fotsy; tsy ho mailaka fihetsika toy ny valala intsony ianao; ary tsy hahitanao tsirony intsony ny voan-tsiperifery
  - type: note
    content: 'Ny and 2-5 eto dia ilazana ny fahanterana miaraka amin’ny fahosana sy ny fahaketrahana rehetra momba azy. Ny fahazavan’ny masoandro sy volana aman-kintana dia enti-milaza ny saina sy fitadidiana amam-piniavana mavitrika. Ao amin’ny RM dia soritana fa an’ohatra no ilazana ny sandry aman-tanana (=mpiambina), ny tena (=trano), ny ranjo mijaridina (=lehilahy matanjaka), ny nify mihota (=mpanompovavy mpitoto), ny maso (=vehivavy mpitsiritsirika), ny molotra (=varavarana kopa-droa), ny vava (=lalambe), ny vazana (=vato fikosoham-bary); niniana nialana ny sarintsary aman’ohatra mba hampazava kokoa ny tian-kambara. –ho be fanahiana: izany hoe matahotra ny hianjera sy ho lavo ny beantitra eny am-pandehanana.'
  - type: text
    content: '. Isika olombelona tsy maintsy mankany amin’ny fonenana mandrakizay, ary ny mpisaona antsika kosa efa mihaodihaody eny an-dalambe. '
  '6':
  - type: text
    content: Dia ho tapaka ny kofehim-bolafotsin’ny fiainana; ho montsamontsana ny tavoara volamena; eny am-pantsakana no ho vaky ny siny; ho latsaka an-davaka famorian-drano ny fanovozana bolaky
  - type: note
    content: Teny an’ohatra enti-milaza ny vatan’olombelona ialan’ny aina avokoa izany.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Amin’izay no hiverina ho vovoka amin’ny tany nakana azy fahiny ny vatantsika fa ny fofonaina kosa hiverina amin’Andriamanitra Izay nanome antsika izany.
  '8':
  - type: text
    content: Zava-poana ny zava-drehetra, hoy i Kôheleta; eny, zava-poana dia zava-poana izany.
  - type: heading
    content: Famaranana
  '9':
  - type: text
    content: 'Ho fanampin’izany, tsy nitsahatra nampianatra ny olona ny zavatra fantany i Kôheleta satria hendry izy. Namorona ohabolana maro izy rehefa avy nandinika sy nandanjalanja. '
