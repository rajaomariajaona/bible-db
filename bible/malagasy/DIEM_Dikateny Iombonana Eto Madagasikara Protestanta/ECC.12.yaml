document_id: ECC.12
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza hadino Ilay nahary anao amin’ny androm-pahatanoranao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ilay nahary anao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny teny hebreo ampiasaina eto dia azo adika koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny fasanao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –Amin’ny dkt sasany ny 11.9-10 dia marihina 12.1-2, noho izany ny 12.1-14 dia lasa 12.3-16.'
    marker-yv: yv-n
  - type: text
    text: '. Tsarovy Izy dieny tsy mbola tonga ny androm-pahosanao ary tsy mbola mihatra ny taona izay hitenenanao hoe: «Mankaleo ahy ny miaina.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amin’ny androm-pahosanao manko dia hihamatroka ny fahazavan’ny masoandro, hanjavozavo ny volana aman-kintana, ary hivangongo ny rahona mitondra orana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Amin’izay ny sandry aman-tanana fiarovanao tena dia hipararetra; ny ranjonao nijaridina dia hikolepaka; ny nifinao efa nihavitsy loatra dia tsy hahahota sakafo intsony; ary hihapahina ny masonao ka tsy hahita tsara intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Amin’ny androm-pahosanao koa dia hikombona ny molotrao satria hihareraka ny vodivazanao mihomokomoka ao anaty vavanao; ary ho donto ny sofinao, ka tsy ho tandrinao ny fikalom-boron-kely ary halefaka aminao avokoa ny feon’ny mpihira. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Amin’izay koa dia hatahotra ny hiani-piakarana ianao ary ho be fanahiana rehefa mamindra; ny volon-dohanao hihafotsy toy ny voninkazo mamony fotsy; tsy ho mailaka fihetsika toy ny valala intsony ianao; ary tsy hahitanao tsirony intsony ny voan-tsiperifery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny and 2-5 eto dia ilazana ny fahanterana miaraka amin’ny fahosana sy ny fahaketrahana rehetra momba azy. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny fahazavan’ny masoandro sy volana aman-kintana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia enti-milaza ny saina sy fitadidiana amam-piniavana mavitrika. Ao amin’ny RM dia soritana fa an’ohatra no ilazana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny sandry aman-tanana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (=mpiambina), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tena
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (=trano), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny ranjo mijaridina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (=lehilahy matanjaka), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny nify mihota
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (=mpanompovavy mpitoto), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny maso
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (=vehivavy mpitsiritsirika), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny molotra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (=varavarana kopa-droa), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny vava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (=lalambe), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny vazana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (=vato fikosoham-bary); niniana nialana ny sarintsary aman’ohatra mba hampazava kokoa ny tian-kambara. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –ho be fanahiana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': izany hoe matahotra ny hianjera sy ho lavo ny beantitra eny am-pandehanana.'
    marker-yv: yv-n
  - type: text
    text: '. Isika olombelona tsy maintsy mankany amin’ny fonenana mandrakizay, ary ny mpisaona antsika kosa efa mihaodihaody eny an-dalambe. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia ho tapaka ny kofehim-bolafotsin’ny fiainana; ho montsamontsana ny tavoara volamena; eny am-pantsakana no ho vaky ny siny; ho latsaka an-davaka famorian-drano ny fanovozana bolaky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Teny an’ohatra enti-milaza ny vatan’olombelona ialan’ny aina avokoa izany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’izay no hiverina ho vovoka amin’ny tany nakana azy fahiny ny vatantsika fa ny fofonaina kosa hiverina amin’Andriamanitra Izay nanome antsika izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Zava-poana ny zava-drehetra, hoy i Kôheleta; eny, zava-poana dia zava-poana izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famaranana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ho fanampin’izany, tsy nitsahatra nampianatra ny olona ny zavatra fantany i Kôheleta satria hendry izy. Namorona ohabolana maro izy rehefa avy nandinika sy nandanjalanja. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa niezaka ny hilazalaza ny zava-misy tamim-pahamarinana i Kôheleta no nanao izay hahitana teny mahaliana koa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny tenin’ny hendry dia manindrontsindrom-panahy tahaka ny fanjaitra; ary ireo mpanangona azy dia mamefy soritra tahaka ny tsatomarika. Fanomezana avy amin’ilay hany mpitarika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay hany mpitarika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Andriamanitra izany, hoy ny sasany; i Mosesy na i Salômôna izany, hoy ny hafa.
    marker-yv: yv-n
  - type: text
    text: ' avokoa ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fanampin’izany koa, anaka, dia minoa anatra ianao. Fa tsy mba voafetra ny isan’ny boky azo soratana, ary mandrera-tena ny manokana fotoana maro hianarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izao no fehin-teny momba izay rehetra voalaza: hajao Andriamanitra ary tandremo ny didiny, satria izany no andraikitry ny olona tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa hotsarain’Andriamanitra avokoa ny zavatra atao, dia ny amin’izay rehetra fonosiny na tsara izany na ratsy.
