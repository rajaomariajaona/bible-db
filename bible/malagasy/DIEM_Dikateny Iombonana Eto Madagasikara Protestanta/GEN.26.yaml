document_id: GEN.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Itsehàka sy i Abimelèka
  - type: text
    content: Nisy mosary teo amin’ny tany, hafa noho izay niseho tamin’ny andron’i Abrahama; koa lasa i Itsehàka nankany amin’i Abimelèka mpanjakan’i Filistinina
  - type: note
    content: 'Ny mosary tamin’ny andron’i Abrahama: jereo Gen 12.10. –I Gerara izay nanjakan’i Abimelèka (ampit Gen 20.10) dia tsy mbola azo lazaina ho tanin’ny Filistinina akory eto, satria ny Filistinina izay avy any Kreta na Azia Minôra dia tsy mbola nipetraka teny amin’ny morontsirak’i Palestinina, teo anelanelan’i Jafà sy Gazà ankehitriny, raha tsy tamin’ny taonjato faha-12 tal J.K. Momba ny faritanin’ny Filistinina, dia ampit Jos 13.3-4.'
  - type: text
    content: 'tao Gerara. '
  '10':
  - type: text
    content: 'Dia hoy indray i Abimelèka hoe:'
  - type: text
    content: –Inona ity nataonao taminay? Efa nisy lehilahy anankiray tamin’ny vahoaka saika handry tamin’ny vadinao, ka ho nahatonga heloka taminay ianao.
  '11':
  - type: text
    content: 'Ary i Abimelèka mpanjaka nandidy ny vahoaka rehetra hoe:'
  - type: text
    content: –Izay mikasikasika an’ity lehilahy ity sy ny vadiny dia hovonoina ho faty tokoa.
  '12':
  - type: text
    content: 'Tamin’izany taona izany dia namafy tao amin’io tany io i Itsehàka, ka nahazo zato heny satria notahîn’ny TOMPO. '
  '13':
  - type: text
    content: 'Tsy nitsaha-nitombo ny fananany ka tonga mpanan-karena be izy. '
  '14':
  - type: text
    content: 'Nanana andian’ondry aman’osy sy andian’omby ary mpanompo maro izy, ka nialonan’ny Filistinina. '
  '15':
  - type: text
    content: Izany no antony nanotofan’izy ireo tany ny lavaka fantsakana izay nohadîn’ny mpanompon’i Abrahama rainy fony fahavelony.
  - type: heading
    content: Ny fifanekena nataon’i Itsehàka sy i Abimelèka
  '16':
  - type: text
    content: 'Dia niteny tamin’i Itsehàka i Abimelèka hoe:'
  - type: text
    content: –Mialà eto aminay satria efa tonga mahery lavitra noho izahay ianao izao.
  '17':
  - type: text
    content: 'Koa niala teo i Itsehàka, dia nanorin-day tao an-dohasahan’i Gerara ka nipetraka tao. '
  '18':
  - type: text
    content: 'Nasainy nosokafana ireo fantsakana izay voahady fony fahavelon’i Abrahama rainy fa nototofan’ny Filistinina taorian’ny nahafatesany. Ary naveriny tamin’ireny fantsakana ireny indray ny anarana izay efa nomen-drainy azy. '
  '19':
  - type: text
    content: 'Indray andro dia nihady lavaka fantsakana tao an-dohasaha ireo mpanompon’i Itsehàka ka nahita loharano velona. '
  '2':
  - type: text
    content: 'Niseho taminy ny TOMPO ka nanao hoe:'
  - type: text
    content: '–Aza mandeha midina any Ejipta, fa monena eo amin’ny tany izay hambarako anao. '
  '20':
  - type: text
    content: 'Dia niady tamin’ireo '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondrin’i Itsehàka ireo mpiandry ondry tao Gerara ka nanao hoe:'
  - type: text
    content: –Anay ny rano.
  - type: text
    content: 'Dia nantsoin’i Itsehàka hoe Hesèka izany hoe Fifandirana ny fantsakana, satria nifandiran’ireo izy. '
  '21':
  - type: text
    content: 'Dia nihady lavaka fantsakana hafa koa ireo mpanompon’i Itsehàka, nefa nilàn’ireo sotasota indray. Io fantsakana io dia nantsoina hoe Sitnà, izany hoe Sotasota. '
  '22':
  - type: text
    content: 'Koa niala tao izy ary nampandavaka fantsakana hafa indray; fa tsy mba niadian’ireo kosa io ka nantsoin’i Itsehàka hoe Rehôbôta na Fahalalahana, satria hoy izy hoe: «Ankehitriny ny TOMPO dia efa nanome toera-malalaka ho antsika mba hahazoantsika fahombiazana eto amin’ity tany ity.»'
  '23':
  - type: text
    content: 'Dia niala teo izy ka nankany Beera-Seba. '
  '24':
  - type: text
    content: 'Nisehoan’ny TOMPO izy nony alina ka nilazany hoe:'
  - type: text
    content: '–Izaho no Andriamanitr’i Abrahama rainao. Aza matahotra fa miaraka aminao Aho, ary '
  - type: text
    content: mitahy
  - type: text
    content: ' anao. Hampitomboiko ny taranakao noho ny fampanantenana efa nataoko tamin’i Abrahama mpanompoko.'
  '25':
  - type: text
    content: 'Nanorina '
  - type: text
    content: alitara
  - type: text
    content: ' teo i Itsehàka ka nivavaka tamin’Andriamanitra sady niantso Azy hoe TOMPO. Namelatra ny lainy izy ary nihady lavaka fantsakana hafa koa ireo mpanompony.'
  '26':
  - type: text
    content: 'Niainga avy tao Gerara i Abimelèka ka nankany amin’i Itsehàka niaraka tamin’i Ahozata sakaizany sy i Pikôla komandin’ny tafiny. '
  - type: note
    content: 'Abimelèka sy i Pikôla: jereo 21.22.'
  '27':
  - type: text
    content: 'Nanontany azy ireo i Itsehàka hoe:'
  - type: text
    content: –Inona moa no alehanareo aty amiko, kanefa ianareo nankahala sy nandroaka ahy?
  '28':
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: '–Tsapanay tokoa fa momba anao ny TOMPO; koa nihevitra izahay fa tokony hanao fifanekena ombàm-pianianana isika. '
  '29':
  - type: text
    content: Mianiàna àry aminay fa tsy hanisy ratsy anay ianao tahaka ny tsy nampijalianay anao. Tsy nisy afa-tsy ny soa no nataonay taminao ka nalefanay ombàm-piadanana ianao, izay efa notahîn’ny TOMPO ankehitriny.
  '3':
  - type: text
    content: 'Mivahinia eto amin’ity tany ity fa homba anao Aho ary '
  - type: text
    content: hitahy
  - type: text
    content: ' anao, satria ny taranakao no homeko ireo faritany rehetra ireo, fa hotanterahiko ny fampanantenana efa nianianako tamin’i Abrahama rainao. '
  '30':
  - type: text
    content: 'Dia nanao fanasana ho an’i Abimelèka i Itsehàka, ka nihinana sy nisotro izy. '
  '31':
  - type: text
    content: Nifoha maraina avy izy ireo ny ampitso ary samy nifanao velirano. Avy eo nalefan’i Itsehàka izy telo mianaka, ka lasa nody ombàm-piadanana.
  '32':
  - type: text
    content: 'Androtr’iny ihany dia tonga ireo mpanompon’i Itsehàka nanambara taminy ny vaovao momba ny fantsakana izay nolavahany ka nilaza hoe:'
  - type: text
    content: –Nahita rano izahay.
  '33':
  - type: text
    content: Nantsoin’i Itsehàka hoe Sibehà (na hoe Fianianana) ilay fantsakana. Izany no nanaovana ny anaran’ny tanàna hoe Beera-Seba na hoe Fantsakana fianianana mandraka androany.
  - type: heading
    content: Ny fanambadian’i Hesao
  '34':
  - type: text
    content: 'Feno 40 taona i Hesao raha nampakatra vehivavy hetita anankiroa ho vadiny, dia i Jehodita zanakavavin’i Bery sy i Basemàta zanakavavin’i Elôna. '
  '35':
  - type: text
    content: Nangidy hoditra tamin’i Itsehàka sy i Rebekà izy roa vavy ireo.
  '4':
  - type: text
    content: Hataoko marobe tahaka ny kintana eny an-danitra ny taranakao ary homeko ireto faritany rehetra ireto. Amin’ny alalan’ireo taranakao no hitahiako ny firenena rehetra eto ambonin’ny tany
  - type: note
    content: 'Momba ny and 3-4: jereo 22.16-18. –Amin’ny alalan’ireo taranakao no hitahiako: jereo 12.3 sy nta.'
  - type: text
    content: ', '
  '5':
  - type: text
    content: satria efa nihaino ny feoko i Abrahama, ka nitandrina ny baikoko sy ny didiko ary ny fitsipiko sy ny lalànako.
  '6':
  - type: text
    content: 'Nonina tao Gerara i Itsehàka. '
  '7':
  - type: text
    content: 'Nanontany azy momba ny vadiny ny olona tamin’izany toerana izany, fa novaliany hoe: «Anabaviko izy'
  - type: note
    content: Ampit Gen 12.13; 20.2.
  - type: text
    content: .» Natahotra ny hilaza azy hoe vadiny izy, fandrao hovonoin’ny olona tamin’izany toerana izany ho faty ny tenany noho ny amin’i Rebekà fa tsara tarehy loatra ravehivavy.
  '8':
  - type: text
    content: 'Ary rehefa ela no nitoeran’i Itsehàka tao, dia nitsirika teo am-baravarankely i Abimelèka indray andro ka nahita an’i Itsehàka nisangisangy an’i Rebekà vadiny. '
  '9':
  - type: text
    content: 'Nampanantsoin’i Abimelèka i Itsehàka ka nilazany hoe:'
  - type: text
    content: –Hay tena vadinao tokoa izy, koa nahoana no nolazainao hoe anabavinao?
  - type: text
    content: 'Hoy kosa ny navalin’i Itsehàka azy:'
  - type: text
    content: –Nilaza izany aho fandrao vonoina ho faty noho ny aminy.
