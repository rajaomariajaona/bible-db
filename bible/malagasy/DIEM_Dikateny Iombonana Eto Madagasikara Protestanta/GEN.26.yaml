document_id: GEN.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Itsehàka sy i Abimelèka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nisy mosary teo amin’ny tany, hafa noho izay niseho tamin’ny andron’i Abrahama; koa lasa i Itsehàka nankany amin’i Abimelèka mpanjakan’i Filistinina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Ny mosary tamin’ny andron’i Abrahama:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo Gen 12.10. –I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gerara '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay nanjakan’i Abimelèka (ampit Gen 20.10) dia tsy mbola azo lazaina ho tanin’ny Filistinina akory eto, satria ny Filistinina izay avy any Kreta na Azia Minôra dia tsy mbola nipetraka teny amin’ny morontsirak’i Palestinina, teo anelanelan’i Jafà sy Gazà ankehitriny, raha tsy tamin’ny taonjato faha-12 tal J.K. Momba ny faritanin’ny Filistinina, dia ampit Jos 13.3-4.
    marker-yv: yv-n
  - type: text
    text: 'tao Gerara. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niseho taminy ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza mandeha midina any Ejipta, fa monena eo amin’ny tany izay hambarako anao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mivahinia eto amin’ity tany ity fa homba anao Aho ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hitahy
  - type: text
    text: ' anao, satria ny taranakao no homeko ireo faritany rehetra ireo, fa hotanterahiko ny fampanantenana efa nianianako tamin’i Abrahama rainao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hataoko marobe tahaka ny kintana eny an-danitra ny taranakao ary homeko ireto faritany rehetra ireto. Amin’ny alalan’ireo taranakao no hitahiako ny firenena rehetra eto ambonin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.4 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Momba ny and 3-4:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 22.16-18. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Amin’ny alalan’ireo taranakao no hitahiako:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 12.3 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: satria efa nihaino ny feoko i Abrahama, ka nitandrina ny baikoko sy ny didiko ary ny fitsipiko sy ny lalànako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nonina tao Gerara i Itsehàka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nanontany azy momba ny vadiny ny olona tamin’izany toerana izany, fa novaliany hoe: «Anabaviko izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 12.13; 20.2.
    marker-yv: yv-n
  - type: text
    text: .» Natahotra ny hilaza azy hoe vadiny izy, fandrao hovonoin’ny olona tamin’izany toerana izany ho faty ny tenany noho ny amin’i Rebekà fa tsara tarehy loatra ravehivavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa ela no nitoeran’i Itsehàka tao, dia nitsirika teo am-baravarankely i Abimelèka indray andro ka nahita an’i Itsehàka nisangisangy an’i Rebekà vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nampanantsoin’i Abimelèka i Itsehàka ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hay tena vadinao tokoa izy, koa nahoana no nolazainao hoe anabavinao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy kosa ny navalin’i Itsehàka azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nilaza izany aho fandrao vonoina ho faty noho ny aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy indray i Abimelèka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona ity nataonao taminay? Efa nisy lehilahy anankiray tamin’ny vahoaka saika handry tamin’ny vadinao, ka ho nahatonga heloka taminay ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary i Abimelèka mpanjaka nandidy ny vahoaka rehetra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izay mikasikasika an’ity lehilahy ity sy ny vadiny dia hovonoina ho faty tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’izany taona izany dia namafy tao amin’io tany io i Itsehàka, ka nahazo zato heny satria notahîn’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy nitsaha-nitombo ny fananany ka tonga mpanan-karena be izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nanana andian’ondry aman’osy sy andian’omby ary mpanompo maro izy, ka nialonan’ny Filistinina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izany no antony nanotofan’izy ireo tany ny lavaka fantsakana izay nohadîn’ny mpanompon’i Abrahama rainy fony fahavelony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifanekena nataon’i Itsehàka sy i Abimelèka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia niteny tamin’i Itsehàka i Abimelèka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mialà eto aminay satria efa tonga mahery lavitra noho izahay ianao izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa niala teo i Itsehàka, dia nanorin-day tao an-dohasahan’i Gerara ka nipetraka tao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nasainy nosokafana ireo fantsakana izay voahady fony fahavelon’i Abrahama rainy fa nototofan’ny Filistinina taorian’ny nahafatesany. Ary naveriny tamin’ireny fantsakana ireny indray ny anarana izay efa nomen-drainy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Indray andro dia nihady lavaka fantsakana tao an-dohasaha ireo mpanompon’i Itsehàka ka nahita loharano velona. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia niady tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ondrin’i Itsehàka ireo mpiandry ondry tao Gerara ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Anay ny rano.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nantsoin’i Itsehàka hoe Hesèka izany hoe Fifandirana ny fantsakana, satria nifandiran’ireo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nihady lavaka fantsakana hafa koa ireo mpanompon’i Itsehàka, nefa nilàn’ireo sotasota indray. Io fantsakana io dia nantsoina hoe Sitnà, izany hoe Sotasota. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa niala tao izy ary nampandavaka fantsakana hafa indray; fa tsy mba niadian’ireo kosa io ka nantsoin’i Itsehàka hoe Rehôbôta na Fahalalahana, satria hoy izy hoe: «Ankehitriny ny TOMPO dia efa nanome toera-malalaka ho antsika mba hahazoantsika fahombiazana eto amin’ity tany ity.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia niala teo izy ka nankany Beera-Seba. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nisehoan’ny TOMPO izy nony alina ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no Andriamanitr’i Abrahama rainao. Aza matahotra fa miaraka aminao Aho, ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mitahy
  - type: text
    text: ' anao. Hampitomboiko ny taranakao noho ny fampanantenana efa nataoko tamin’i Abrahama mpanompoko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nanorina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' teo i Itsehàka ka nivavaka tamin’Andriamanitra sady niantso Azy hoe TOMPO. Namelatra ny lainy izy ary nihady lavaka fantsakana hafa koa ireo mpanompony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Niainga avy tao Gerara i Abimelèka ka nankany amin’i Itsehàka niaraka tamin’i Ahozata sakaizany sy i Pikôla komandin’ny tafiny. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Abimelèka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'i Pikôla:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 21.22.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nanontany azy ireo i Itsehàka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona moa no alehanareo aty amiko, kanefa ianareo nankahala sy nandroaka ahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsapanay tokoa fa momba anao ny TOMPO; koa nihevitra izahay fa tokony hanao fifanekena ombàm-pianianana isika. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mianiàna àry aminay fa tsy hanisy ratsy anay ianao tahaka ny tsy nampijalianay anao. Tsy nisy afa-tsy ny soa no nataonay taminao ka nalefanay ombàm-piadanana ianao, izay efa notahîn’ny TOMPO ankehitriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nanao fanasana ho an’i Abimelèka i Itsehàka, ka nihinana sy nisotro izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nifoha maraina avy izy ireo ny ampitso ary samy nifanao velirano. Avy eo nalefan’i Itsehàka izy telo mianaka, ka lasa nody ombàm-piadanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Androtr’iny ihany dia tonga ireo mpanompon’i Itsehàka nanambara taminy ny vaovao momba ny fantsakana izay nolavahany ka nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahita rano izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nantsoin’i Itsehàka hoe Sibehà (na hoe Fianianana) ilay fantsakana. Izany no nanaovana ny anaran’ny tanàna hoe Beera-Seba na hoe Fantsakana fianianana mandraka androany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanambadian’i Hesao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Feno 40 taona i Hesao raha nampakatra vehivavy hetita anankiroa ho vadiny, dia i Jehodita zanakavavin’i Bery sy i Basemàta zanakavavin’i Elôna. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nangidy hoditra tamin’i Itsehàka sy i Rebekà izy roa vavy ireo.
