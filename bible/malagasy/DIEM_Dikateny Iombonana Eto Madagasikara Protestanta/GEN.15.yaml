document_id: GEN.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanao fanekempihavanana tamin’i Abrama Andriamanitra
  - type: text
    content: 'Taorian’ireo zavatra ireo, dia niseho tamin’i Abrama ny TOMPO ka niteny taminy hoe:'
  - type: text
    content: –Aza matahotra ianao, ry Abrama, fa Izaho no mpiaro anao; ary ny valisoanao dia ho lehibe tokoa.
  '10':
  - type: text
    content: Dia nentin’i Abrama teo amin’ny TOMPO ireo rehetra ireo, ary nosasahiny teo afovoany afa-tsy ny vorona ka napetrany mifanatrika ny tapany avy
  - type: note
    content: Fomba fanaovana fanekempihavanana izany na fanamafisam-pifanekena amin’ny endrika manetriketrika. Heverina manko fa ny andaniny sy ny ankilany dia manaiky ny hiharan’ny fahavoazana toy ireo biby novonoina, raha sanatria ka mivadika ny fanekena. Ao amin’ny Jer 34.18 dia misy filazana an’ohatra ny fombafomba toy izay hita eto.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Ary nidina teo ambonin’ireo ny vorona mpihaza ka noroahin’i Abrama.
  '12':
  - type: text
    content: Nony efa hilentika ny masoandro, dia renoky ny torimaso lalina i Abrama, ka indro nisy haizina lehibe mampatahotra nanarona azy
  - type: note
    content: Jereo Jôb 4.13-14.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Abrama:'
  - type: text
    content: '–Aoka ho fantatrao tsara fa hivahiny any amin’ny tany izay tsy azy ireo taranakao, ka ho mpanompo any ary hampijalîna mandritra ny efajato taona. '
  '14':
  - type: text
    content: Avy eo kosa dia hofaiziko ny firenena izay notompoiny, ka hiainga mitondra fananam-be
  - type: note
    content: 'Ny fivoahana avy tany Ejipta: Eks 12.40-41; Asa 7.7.'
  - type: text
    content: 'avy any ireo taranakao. '
  '15':
  - type: text
    content: 'Ianao kosa ho faty amim-piadanana ka halevina, rehefa tratra antitra tsara. '
  '16':
  - type: text
    content: 'Amin’ny taranakao fahefatra vao hiverina eto izy ireo, satria mandraka androany dia tsy mbola feno ny heloky ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' handroahako azy.'
  '17':
  - type: text
    content: Nony efa nilentika ny masoandro, dia nisy haizim-be mikitroka; ary indro nisy fatana midona-tsetroka sy fanilo mirehitra
  - type: note
    content: Ny fatana midona-tsetroka sy ny fanilo mirehitra dia mariky ny fanatrehan’Andriamanitra.
  - type: text
    content: ' namaky teo anivon’ireo biby voasasaka. '
  '18':
  - type: text
    content: 'Tamin’izay andro izay ny TOMPO dia nanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' tamin’i Abrama, ka niteny hoe:'
  - type: text
    content: '–Omeko ny taranakao ity tany ity, manomboka eo amin’ny ranon-driakan’i Ejipta ka hatrany Eofrata ony lehibe '
  '19':
  - type: text
    content: 'izany hoe ny tany onenan’ireto foko ireto: ny Kenita sy ny Kenizita, ny Kadmônita '
  '2':
  - type: text
    content: 'Fa namaly i Abrama hoe:'
  - type: text
    content: '–Ry Tompo ANDRIANANAHARY ô, '
  '20':
  - type: text
    content: 'sy ny Hetita, ny Perizita sy ny Refaita, '
  '21':
  - type: text
    content: ny Amôrita sy ny Kanahanita ary ny Girgasita sy ny Jebosita.
  '3':
  - type: text
    content: inona no homenao ahy? Izaho ity ho faty tsy manan-taranaka; ary i Elihezera, mpitandrina ny ato an-tranoko, no handova ahy, satria ianao tsy nanome ahy taranaka.
  '4':
  - type: text
    content: 'Fa hoy ny TOMPO taminy:'
  - type: text
    content: –Tsy handova anao izy, fa ilay haterakao ihany no handova anao.
  '5':
  - type: text
    content: 'Dia nentin’ny TOMPO nivoaka teny ivelan’ny tranolay izy ka nilazany hoe:'
  - type: text
    content: –Jereo ange ny lanitra ary isao ny kintana, raha afaka manisa azy ianao
  - type: note
    content: Jereo Rom 4.18; Heb 11.12.
  - type: text
    content: '!'
  - type: text
    content: 'Dia mbola nampiany hoe:'
  - type: text
    content: –Ho toy izany ny taranakao!
  '6':
  - type: text
    content: Ary i Abrama nino ny TOMPO; dia naneken’ny TOMPO azy ho marina izany
  - type: note
    content: Jereo Rom 4.3; Gal 3.6; Jak 2.23.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ka hoy indray Izy taminy:'
  - type: text
    content: –Izaho TOMPO no nampivoaka anao avy tany Ora any Babilônia mba hanomezako anao ity tany ity ho fanananao.
  '8':
  - type: text
    content: 'Fa nanontany kosa i Abrama hoe:'
  - type: text
    content: –Ry Tompo ANDRIANANAHARY ô, amin’ny fomba ahoana moa no hahalalako fa ho lasako ity tany ity?
  '9':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Itondray vantotr’ombivavy iray sy osivavy iray sy ondrilahy iray samy telo taona Aho ary koa domohina sy voromahailala iray avy.
