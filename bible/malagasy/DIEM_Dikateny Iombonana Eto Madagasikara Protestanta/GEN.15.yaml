document_id: GEN.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanao fanekempihavanana tamin’i Abrama Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’ireo zavatra ireo, dia niseho tamin’i Abrama ny TOMPO ka niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza matahotra ianao, ry Abrama, fa Izaho no mpiaro anao; ary ny valisoanao dia ho lehibe tokoa.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentin’i Abrama teo amin’ny TOMPO ireo rehetra ireo, ary nosasahiny teo afovoany afa-tsy ny vorona ka napetrany mifanatrika ny tapany avy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fomba fanaovana fanekempihavanana izany na fanamafisam-pifanekena amin’ny endrika manetriketrika. Heverina manko fa ny andaniny sy ny ankilany dia manaiky ny hiharan’ny fahavoazana toy ireo biby novonoina, raha sanatria ka mivadika ny fanekena. Ao amin’ny Jer 34.18 dia misy filazana an’ohatra ny fombafomba toy izay hita eto.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nidina teo ambonin’ireo ny vorona mpihaza ka noroahin’i Abrama.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony efa hilentika ny masoandro, dia renoky ny torimaso lalina i Abrama, ka indro nisy haizina lehibe mampatahotra nanarona azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôb 4.13-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Abrama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka ho fantatrao tsara fa hivahiny any amin’ny tany izay tsy azy ireo taranakao, ka ho mpanompo any ary hampijalîna mandritra ny efajato taona. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Avy eo kosa dia hofaiziko ny firenena izay notompoiny, ka hiainga mitondra fananam-be
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny fivoahana avy tany Ejipta: Eks 12.40-41; Asa 7.7.'
      marker-yv: yv-n
    - type: text
      text: 'avy any ireo taranakao. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ianao kosa ho faty amim-piadanana ka halevina, rehefa tratra antitra tsara. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Amin’ny taranakao fahefatra vao hiverina eto izy ireo, satria mandraka androany dia tsy mbola feno ny heloky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' handroahako azy.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony efa nilentika ny masoandro, dia nisy haizim-be mikitroka; ary indro nisy fatana midona-tsetroka sy fanilo mirehitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fatana midona-tsetroka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fanilo mirehitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mariky ny fanatrehan’Andriamanitra.'
      marker-yv: yv-n
    - type: text
      text: ' namaky teo anivon’ireo biby voasasaka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay andro izay ny TOMPO dia nanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' tamin’i Abrama, ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Omeko ny taranakao ity tany ity, manomboka eo amin’ny ranon-driakan’i Ejipta ka hatrany Eofrata ony lehibe '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'izany hoe ny tany onenan’ireto foko ireto: ny Kenita sy ny Kenizita, ny Kadmônita '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly i Abrama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Tompo ANDRIANANAHARY ô, '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'sy ny Hetita, ny Perizita sy ny Refaita, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ny Amôrita sy ny Kanahanita ary ny Girgasita sy ny Jebosita.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: inona no homenao ahy? Izaho ity ho faty tsy manan-taranaka; ary i Elihezera, mpitandrina ny ato an-tranoko, no handova ahy, satria ianao tsy nanome ahy taranaka.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny TOMPO taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy handova anao izy, fa ilay haterakao ihany no handova anao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nentin’ny TOMPO nivoaka teny ivelan’ny tranolay izy ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Jereo ange ny lanitra ary isao ny kintana, raha afaka manisa azy ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rom 4.18; Heb 11.12.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola nampiany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho toy izany ny taranakao!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Abrama nino ny TOMPO; dia naneken’ny TOMPO azy ho marina izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rom 4.3; Gal 3.6; Jak 2.23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy indray Izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho TOMPO no nampivoaka anao avy tany Ora any Babilônia mba hanomezako anao ity tany ity ho fanananao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nanontany kosa i Abrama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Tompo ANDRIANANAHARY ô, amin’ny fomba ahoana moa no hahalalako fa ho lasako ity tany ity?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Itondray vantotr’ombivavy iray sy osivavy iray sy ondrilahy iray samy telo taona Aho ary koa domohina sy voromahailala iray avy.
