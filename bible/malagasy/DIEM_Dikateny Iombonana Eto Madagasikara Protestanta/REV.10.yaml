document_id: REV.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay anjely mitana horonamboky
  - type: text
    content: 'Dia hitako nisy '
  - type: text
    content: anjely
  - type: text
    content: ' anankiray hafa manan-kery, nidina avy tany an-danitra: ka rahona no toy ny lamba nisalorany; voahodidin’avana ny lohany; namiratra tahaka ny masoandro ny tavany; mivaivay tahaka ny andry afo ny tongony; '
  '10':
  - type: text
    content: Dia noraisiko ilay horonamboky kely teny an-tanan’ny anjely ka nateliko avokoa; ary mamy tahaka ny tantely izay tao am-bavako, nefa nony voateliko dia nangidy tao an-kiboko
  - type: note
    content: 'And 8-10: ampit Ezek 2.8–3.3.'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Tamin’izay dia nisy nilaza tamiko hoe:'
  - type: text
    content: –Tsy maintsy mitondra ny hafatr’Andriamanitra indray ianao ny amin’ny vahoaka maro sy firenena maro sy olona maro samy hafa fiteny ary mpanjaka maro.
  '2':
  - type: text
    content: 'ary nitana horonamboky kely mivelatra izy teny an-tanany. Nasabakan’io anjely io ny tongony, ka ny ankavanana napetrany teo amin’ny ranomasina ary ny ankavia napetrany teo amin’ny tany. '
  '3':
  - type: text
    content: 'Dia niantso tamin’ny feo mahery sahala amin’ny liona mierona izy; ka nony avy niantso izy, dia nirefodrefotra namaly azy ny kotro-baratra fito. '
  '4':
  - type: text
    content: 'Ary rehefa namaly azy ny kotro-baratra fito, dia ndeha hanoratra aho; kanjo reko nisy feo avy tany an-danitra nanao hoe:'
  - type: text
    content: –Tano ho anao izay voalazan’ny kotro-baratra fito, fa aza soratana!
  '5':
  - type: text
    content: 'Ary ny anjely, izay efa hitako nijoro teo amin’ny ranomasina sy teo amin’ny tany, dia nanangana ny tanany ankavanana ho amin’ny lanitra '
  '6':
  - type: text
    content: 'sady nianiana tamin’Ilay velona mandrakizay mandrakizay, dia Ilay nahary ny habakabaka mbamin’izay ao aminy, sy ny tany mbamin’izay ao aminy, ary ny ranomasina mbamin’izay ao aminy; ka hoy ilay anjely hoe:'
  - type: text
    content: '–Tsy hisy hataka andro intsony! '
  '7':
  - type: text
    content: 'Fa amin’ny andro hitsòfan’ilay anjely fahafito ny trompetrany, dia ho tanteraka ny zava-miafina nalahatr’Andriamanitra, araka ny teny soa nambarany tamin’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpanompony'
  - type: note
    content: 'And 5-7: ampit Eks 20.11; Deot 32.40; Dan 12.7; Ham 3.7.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ary niteny tamiko indray ilay feo efa reko avy tany an-danitra, nanao hoe:'
  - type: text
    content: –Mandehana, raiso ny horonamboky kely mivelatra eny an-tanan’ilay anjely mijoro eo amin’ny ranomasina sy eo amin’ny tany.
  '9':
  - type: text
    content: 'Dia nankeny amin’ilay anjely aho ka nanao taminy hoe:'
  - type: text
    content: –Mba omeo ahy iny horonamboky kely iny!
  - type: text
    content: 'Ary hoy izy tamiko:'
  - type: text
    content: –Raiso izy ka atelemo avokoa; hangidy ao an-kibonao izy, nefa ao am-bavanao dia ho mamy tahaka ny tantely.
