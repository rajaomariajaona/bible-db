document_id: REV.10,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay anjely mitana horonamboky
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia hitako nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' anankiray hafa manan-kery, nidina avy tany an-danitra: ka rahona no toy ny lamba nisalorany; voahodidin’avana ny lohany; namiratra tahaka ny masoandro ny tavany; mivaivay tahaka ny andry afo ny tongony; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia noraisiko ilay horonamboky kely teny an-tanan’ny anjely ka nateliko avokoa; ary mamy tahaka ny tantely izay tao am-bavako, nefa nony voateliko dia nangidy tao an-kiboko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 8-10:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Ezek 2.8–3.3.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tamin’izay dia nisy nilaza tamiko hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy maintsy mitondra ny hafatr’Andriamanitra indray ianao ny amin’ny vahoaka maro sy firenena maro sy olona maro samy hafa fiteny ary mpanjaka maro.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary nitana horonamboky kely mivelatra izy teny an-tanany. Nasabakan’io anjely io ny tongony, ka ny ankavanana napetrany teo amin’ny ranomasina ary ny ankavia napetrany teo amin’ny tany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia niantso tamin’ny feo mahery sahala amin’ny liona mierona izy; ka nony avy niantso izy, dia nirefodrefotra namaly azy ny kotro-baratra fito. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary rehefa namaly azy ny kotro-baratra fito, dia ndeha hanoratra aho; kanjo reko nisy feo avy tany an-danitra nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tano ho anao izay voalazan’ny kotro-baratra fito, fa aza soratana!
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny anjely, izay efa hitako nijoro teo amin’ny ranomasina sy teo amin’ny tany, dia nanangana ny tanany ankavanana ho amin’ny lanitra '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'sady nianiana tamin’Ilay velona mandrakizay mandrakizay, dia Ilay nahary ny habakabaka mbamin’izay ao aminy, sy ny tany mbamin’izay ao aminy, ary ny ranomasina mbamin’izay ao aminy; ka hoy ilay anjely hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy hisy hataka andro intsony! '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa amin’ny andro hitsòfan’ilay anjely fahafito ny trompetrany, dia ho tanteraka ny zava-miafina nalahatr’Andriamanitra, araka ny teny soa nambarany tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' mpanompony'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 5-7:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Eks 20.11; Deot 32.40; Dan 12.7; Ham 3.7.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary niteny tamiko indray ilay feo efa reko avy tany an-danitra, nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana, raiso ny horonamboky kely mivelatra eny an-tanan’ilay anjely mijoro eo amin’ny ranomasina sy eo amin’ny tany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nankeny amin’ilay anjely aho ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba omeo ahy iny horonamboky kely iny!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiso izy ka atelemo avokoa; hangidy ao an-kibonao izy, nefa ao am-bavanao dia ho mamy tahaka ny tantely.
