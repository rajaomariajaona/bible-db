document_id: EXO.25,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: NY PLANINA MOMBA NY TOERAMASINA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandraisana anjara ataon’ny Israelita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny TOMPO tamin’i Mosesy:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hisy Vatamasina hamboarina amin’ny hazo mimôzà; ka mirefy 125 santimetatra ny lavany, 75 santimetatra ny sakany ary 75 santimetatra ny haavony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horakofana takela-bolamena madio ny atiny sy ny ivelany ary hasiana sisiny volamena manodidina eo amboniny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haba volamena efatra no hotefena ka haraikitra eo amin’ny zorony efatry ny Vatamasina, dia samy roa an-daniny avy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hisy bao roa hatao amin’ny hazo mimôzà, ary horakofana takela-bolamena. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatsofoka ao amin’ireo haba ireo ny bao roa mba hilanjana ny Vatamasina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tafiditra amin’ny toerany ireo, dia tsy hoesorina intsony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao anatin’io Vatamasina io no hametrahanao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: raki-tsoratry ny fanekempihavanana
    - type: text
      text: ' izay homeko anao.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hanaovana sarony volamena madio ilay Vatamasina, ka io sarony io dia hirefy 125 santimetatra ny lavany ary 75 santimetatra ny sakany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanefena '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' roa volamena amin’ny sakany roa eo ambony saron’ny Vatamasina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hovoasana mitambatra amin’ny saron’ny Vatamasina ireo kerobima roa ireo, eo amin’ny sakany avy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Ilazao ny Israelita mba hanomana fanomezana ho Ahy, ka avy amin’ny olona rehetra manolotra an-tsitrapo no anangony azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hifanatrika ny kerobima roa sady manatrika ny saron’ny Vatamasina izay alofany amin’ny elany mivelatra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hapetraka eo ambony Vatamasina ny sarony rehefa tafiditra ao anatiny ao ny raki-tsoratry ny fanekempihavanana izay homeko anao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eo ambonin’ny Vatamasina, eo anelanelan’ny kerobima roa, no hisehoako aminao; eo no hanomezako anao ny baiko rehetra momba ny Israelita.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny latabatry ny mofo atolotra ho an’Andriamanitra
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hisy koa latabatra hamboarina amin’ny hazo mimôzà, ka hirefy iray metatra ny lavany, 50 santimetatra ny sakany ary 75 santimetatra ny haavony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horakofana takela-bolamena madio izany sady hasiana sisiny volamena manodidina. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanaovana fehivava mivelatra valo santimetatra manodidina azy sady hasiana sisiny volamena eo ambonin’io fehivava io. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hisy haba volamena efatra koa no hotefena, dia hapetraka eo amin’ny zorony efatra, mifanila amin’ny tongony efatra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatao eo akaikin’ny fehivavany ny haba ka hampidirana bao mba hitondrana ny latabatra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazo mimôzà no hanaovana ny bao roa, izay horakofana takela-bolamena; ary ireo no hilanjàna ny latabatra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hamboarina koa ny fitaovana fametraka eo ambonin’io latabatra io: dia lovia fisaka lehibe, kaopy, tavoara, tsatokaty ho an’ny fanatitra divay, ka samy hatao amin’ny volamena madio avokoa izy rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy no fanatitra izay hangoninareo: volamena, volafotsy, halimo, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eo ambonin’io latabatra io no hametrahana ny mofo atolotra ho Ahy, ka hisy tsy tapaka eo anatrehako izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.30 '
      - type: usfm
