  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanamboatra tranolay masina ho Ahy ny Israelita mba hitoerako eo aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Araka ny planina sy ny môdely izay hasehoko anao no handrafetanareo io fonena-masina io sy ny fanaka rehetra momba azy.
  - type: usfm
