  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hoditr’ondry miloko mena, hoditra mafy, hazo mimôza, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'solika hampiasaina amin’ny fitoeran-jiro, ilomanitra hafangaro amin’ny ilomasina fanokanana sy amin’ny vovo-javamanitra hodorana, '
  '7':
