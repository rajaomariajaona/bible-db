  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hasiana rantsana enina hivoaka avy amin’ny tahobeny, ka samy telo an-daniny avy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaky ny rantsana tsirairay dia hisy felam-boninkazo telo miendrika felam-paiso miaraka amin’ny bokony sy ny voniny. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eo amin’ilay tahobeny kosa dia hisy felam-boninkazo efatra miendrika felam-paiso miaraka amin’ny bokony sy ny voniny. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary eo ambanin’ny rantsana enina izay miainga avy amin’ny tahobeny dia hisy boko iray isaky ny rantsana tsiroaroa. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitambatra ho iray ihany amin’ny sisa rehetra ny boko sy ny rantsana, ka samy ho volamena madio avokoa izy rehetra. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jiro fito no hamboarina ka hapetraka eo amin’io fitoeran-jiro io mba hanazava ny anoloany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tandra sy ny fitoeran-davenon-jiro dia hatao volamena madio. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vongam-bolamena madio telopolo kilao no hampiasaina hanaovana ny fitoeran-jiro sy ny fitaovana rehetra miaraka aminy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'volon’ondry miloko volomparasy na mena na jaky, rongony madinika, volon’osy, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Imasoy, ry Mosesy, ny hanatanterahana ny asa araka ny môdely izay nasehoko anao teto an-tendrombohitra
    - type: usfm
