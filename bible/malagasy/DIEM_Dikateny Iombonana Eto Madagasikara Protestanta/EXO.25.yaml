    - type: text
      text: Ny fitoeran-jiro fito rantsana
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Hisy koa fitoeran-jiro volamena madio hamboarina; voasana no hanaovana azy, ka ny faladiany sy ny tahony, ny raviny sy ny bokony ary ny voniny dia hitambatra ho tena iray ihany
