document_id: EXO.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: NY PLANINA MOMBA NY TOERAMASINA
  - type: heading
    content: Ny fandraisana anjara ataon’ny Israelita
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  '10':
  - type: text
    content: '«Hisy Vatamasina hamboarina amin’ny hazo mimôzà; ka mirefy 125 santimetatra ny lavany, 75 santimetatra ny sakany ary 75 santimetatra ny haavony. '
  '11':
  - type: text
    content: 'Horakofana takela-bolamena madio ny atiny sy ny ivelany ary hasiana sisiny volamena manodidina eo amboniny. '
  '12':
  - type: text
    content: 'Haba volamena efatra no hotefena ka haraikitra eo amin’ny zorony efatry ny Vatamasina, dia samy roa an-daniny avy. '
  '13':
  - type: text
    content: 'Hisy bao roa hatao amin’ny hazo mimôzà, ary horakofana takela-bolamena. '
  '14':
  - type: text
    content: 'Hatsofoka ao amin’ireo haba ireo ny bao roa mba hilanjana ny Vatamasina. '
  '15':
  - type: text
    content: 'Rehefa tafiditra amin’ny toerany ireo, dia tsy hoesorina intsony. '
  '16':
  - type: text
    content: 'Ao anatin’io Vatamasina io no hametrahanao ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: ' izay homeko anao.'
  '17':
  - type: text
    content: '«Hanaovana sarony volamena madio ilay Vatamasina, ka io sarony io dia hirefy 125 santimetatra ny lavany ary 75 santimetatra ny sakany. '
  '18':
  - type: text
    content: 'Hanefena '
  - type: text
    content: kerobima
  - type: text
    content: ' roa volamena amin’ny sakany roa eo ambony saron’ny Vatamasina. '
  '19':
  - type: text
    content: 'Hovoasana mitambatra amin’ny saron’ny Vatamasina ireo kerobima roa ireo, eo amin’ny sakany avy. '
  '2':
  - type: text
    content: '–Ilazao ny Israelita mba hanomana fanomezana ho Ahy, ka avy amin’ny olona rehetra manolotra an-tsitrapo no anangony azy. '
  '20':
  - type: text
    content: 'Hifanatrika ny kerobima roa sady manatrika ny saron’ny Vatamasina izay alofany amin’ny elany mivelatra. '
  '21':
  - type: text
    content: 'Hapetraka eo ambony Vatamasina ny sarony rehefa tafiditra ao anatiny ao ny raki-tsoratry ny fanekempihavanana izay homeko anao. '
  '22':
  - type: text
    content: Eo ambonin’ny Vatamasina, eo anelanelan’ny kerobima roa, no hisehoako aminao; eo no hanomezako anao ny baiko rehetra momba ny Israelita.
  - type: heading
    content: Ny latabatry ny mofo atolotra ho an’Andriamanitra
  '23':
  - type: text
    content: '«Hisy koa latabatra hamboarina amin’ny hazo mimôzà, ka hirefy iray metatra ny lavany, 50 santimetatra ny sakany ary 75 santimetatra ny haavony. '
  '24':
  - type: text
    content: 'Horakofana takela-bolamena madio izany sady hasiana sisiny volamena manodidina. '
  '25':
  - type: text
    content: 'Hanaovana fehivava mivelatra valo santimetatra manodidina azy sady hasiana sisiny volamena eo ambonin’io fehivava io. '
  '26':
  - type: text
    content: 'Hisy haba volamena efatra koa no hotefena, dia hapetraka eo amin’ny zorony efatra, mifanila amin’ny tongony efatra. '
  '27':
  - type: text
    content: 'Hatao eo akaikin’ny fehivavany ny haba ka hampidirana bao mba hitondrana ny latabatra. '
  '28':
  - type: text
    content: 'Hazo mimôzà no hanaovana ny bao roa, izay horakofana takela-bolamena; ary ireo no hilanjàna ny latabatra. '
  '29':
  - type: text
    content: 'Hamboarina koa ny fitaovana fametraka eo ambonin’io latabatra io: dia lovia fisaka lehibe, kaopy, tavoara, tsatokaty ho an’ny fanatitra divay, ka samy hatao amin’ny volamena madio avokoa izy rehetra. '
  '3':
  - type: text
    content: 'Ireto avy no fanatitra izay hangoninareo: volamena, volafotsy, halimo, '
  '30':
  - type: text
    content: Eo ambonin’io latabatra io no hametrahana ny mofo atolotra ho Ahy, ka hisy tsy tapaka eo anatrehako izany
  - type: note
    content: Jereo Lev 24.5-9.
  - type: text
    content: .
  - type: heading
    content: Ny fitoeran-jiro fito rantsana
  '31':
  - type: text
    content: «Hisy koa fitoeran-jiro volamena madio hamboarina; voasana no hanaovana azy, ka ny faladiany sy ny tahony, ny raviny sy ny bokony ary ny voniny dia hitambatra ho tena iray ihany
  - type: note
    content: 'raviny, bokony, voniny: ny dkt momba ireo voambolana teknika hebreo eto dia tsy azo antoka. Toa niainga avy amin’ny tontolon’ny zava-maniry sy ny voninkazo ireto sary fandravahana ireto.'
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Hasiana rantsana enina hivoaka avy amin’ny tahobeny, ka samy telo an-daniny avy. '
  '33':
  - type: text
    content: 'Isaky ny rantsana tsirairay dia hisy felam-boninkazo telo miendrika felam-paiso miaraka amin’ny bokony sy ny voniny. '
  '34':
  - type: text
    content: 'Eo amin’ilay tahobeny kosa dia hisy felam-boninkazo efatra miendrika felam-paiso miaraka amin’ny bokony sy ny voniny. '
  '35':
  - type: text
    content: 'Ary eo ambanin’ny rantsana enina izay miainga avy amin’ny tahobeny dia hisy boko iray isaky ny rantsana tsiroaroa. '
  '36':
  - type: text
    content: 'Mitambatra ho iray ihany amin’ny sisa rehetra ny boko sy ny rantsana, ka samy ho volamena madio avokoa izy rehetra. '
  '37':
  - type: text
    content: 'Jiro fito no hamboarina ka hapetraka eo amin’io fitoeran-jiro io mba hanazava ny anoloany. '
  '38':
  - type: text
    content: 'Ny tandra sy ny fitoeran-davenon-jiro dia hatao volamena madio. '
  '39':
  - type: text
    content: 'Vongam-bolamena madio telopolo kilao no hampiasaina hanaovana ny fitoeran-jiro sy ny fitaovana rehetra miaraka aminy. '
  '4':
  - type: text
    content: 'volon’ondry miloko volomparasy na mena na jaky, rongony madinika, volon’osy, '
  '40':
  - type: text
    content: Imasoy, ry Mosesy, ny hanatanterahana ny asa araka ny môdely izay nasehoko anao teto an-tendrombohitra
  - type: note
    content: Jereo Asa 7.44; Heb 8.5.
  - type: text
    content: .
  '5':
  - type: text
    content: 'hoditr’ondry miloko mena, hoditra mafy, hazo mimôza, '
  '6':
  - type: text
    content: 'solika hampiasaina amin’ny fitoeran-jiro, ilomanitra hafangaro amin’ny ilomasina fanokanana sy amin’ny vovo-javamanitra hodorana, '
  '7':
  - type: text
    content: vato berila sy vatosoa hafa ho an’ny efôda sy ny saron-tratran’ny mpisorombe
  - type: note
    content: 'efôda: fanamiana aron’akanjo voatokana ho an’ny mpisorombe ary voavisavisa eo amin’ny 28.6-14; saron-tratra: karazana paosy lamba napetraka teo ambony tratran’ny mpisorombe, jereo 28.15-29.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Hanamboatra tranolay masina ho Ahy ny Israelita mba hitoerako eo aminy. '
  '9':
  - type: text
    content: Araka ny planina sy ny môdely izay hasehoko anao no handrafetanareo io fonena-masina io sy ny fanaka rehetra momba azy.
  - type: heading
    content: Ny Vatamasina mirakitra ny fanekempihavanana
