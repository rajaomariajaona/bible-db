document_id: LEV.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanaterana vokatry ny tany ho an’ny Tompo
  - type: text
    content: '«Raha misy te hanolotra fanatitra vokatry ny tany ho an’ny TOMPO, dia lafarinina tsara indrindra no aoka hatolony; ary handrarahany menaka sy hasiany '
  - type: text
    content: vovoka zava-manitra
  - type: text
    content: ' eo amboniny. '
  '10':
  - type: text
    content: Ny sisa amin’ny fanatitra kosa dia ho an’i Aharôna sy ny taranany; zava-masina dia masina izany sisa izany, satria ambin’ilay fanati-pahatsiarovana levonina amin’ny afo ho an’ny TOMPO.
  '11':
  - type: text
    content: «Ny fanatitra rehetra, izay atolotrao ho an’ny TOMPO, dia aza misy haroina leviora; fa ny leviora sy ny tantely
  - type: note
    content: Ny leviora sy ny tantely (ranom-boankazo voatanika ho marihitra; jereo ny naoty tandrifin’ny Eks 3.8), noho izy ireo mampibohaka ny zavatra asiana azy, dia mahatonga ny fanatitra ho maloto; ankoatra izany, mampahatsiaro ny fanatitra fanao mandritra ny fanompoam-pivavahan’ny mpanompo sampy ireo zavatra ireo.
  - type: text
    content: ' dia samy tsy ho azonareo dorana hanetona, ho fanatitra levonina amin’ny afo ho an’ny TOMPO. '
  '12':
  - type: text
    content: Ho fanatitra voaloham-bokatra ihany no hahazoanareo manolotra leviora na tantely ho an’ny TOMPO; kanefa tsy mba hakarina eo ambonin’ny alitara hanetona ho hanitra ankasitrahina izany.
  '13':
  - type: text
    content: «Samy asio sira
  - type: note
    content: Ny sira dia mitahiry sy manadio (jereo 2 Mp 2.19-22), fa tsy mba tahaka ny leviora izay miteraka fahalovana sy fahasimbana; ankoatra izany, dia soritan’ny sira fa maharitra mandrakizay ny fanekempihavanan’Andriamanitra.
  - type: text
    content: 'ny fanatitra rehetra atolotrao. Ny sira dia famantarana ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataon’ilay Andriamanitrao; ka aza avela tsy hisy sira ny fanatitrao, fa manolora sira miaraka amin’ny fanatitrao rehetra.'
  '14':
  - type: text
    content: '«Rehefa manolotra fanatitra voaloham-bokatra ho an’ny TOMPO ianao, dia salohim-bary no endaso amin’ny afo, ary totoy ho lango ny voam-bary voaendy; ka io lango io no hatolotrao ho fanatitra voaloham-bokatrao. Alohan’ny hanolorana azy, '
  '15':
  - type: text
    content: 'dia handrarahanao menaka sady hasianao ditin-kazo manitra eo amboniny: fanatitra vokatry ny tany izany. '
  '16':
  - type: text
    content: Ary hodoran’ny mpisorona hanetona ny fanati-pahatsiarovana, dia ny ampahan’ny lango voararaka menaka sy ny ditin-kazo manitra manontolo. Fanatitra levonina amin’ny afo ho an’ny TOMPO izany.»
  '2':
  - type: text
    content: 'Hoentiny ho amin’ireo mpisorona taranak’i Aharôna izany; dia handraoka eran-tanan’ila amin’ny lafarinina voararaka menaka sy handraoka manontolo ny vovoka zava-manitra ireo, ka handoro izany fanati-pahatsiarovana izany hanetona eo ambonin’ny '
  - type: text
    content: alitara
  - type: note
    content: Ny fanati-pahatsiarovana dia natao «hahatsiarovan’Andriamanitra» an’ilay olona nanatitra azy.
  - type: text
    content: '. Fanatitra levonina amin’ny afo izany ho hanitra ankasitrahina ho an’ny TOMPO. '
  '3':
  - type: text
    content: Ny sisa amin’ny fanatitra kosa dia ho an’i Aharôna sy ny taranany; zava-masina dia masina izany sisa izany, satria ambin’ilay fanati-pahatsiarovana levonina amin’ny afo ho an’ny TOMPO.
  '4':
  - type: text
    content: '«Raha fanatitra voaendy amin’ny lafaoro no atolotrao, dia aoka ho mofo vita amin’ny lafarinina tsara indrindra sady voaharo menaka no tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ', na kosa mofo manify sady tsy misy leviora no voahoso-menaka.'
  '5':
  - type: text
    content: '«Rehefa fanatitra voaendy amin’ny takela-by no atolotrao, dia aoka ho lafarinina tsara indrindra sady voahoso-menaka no tsy misy leviora. '
  '6':
  - type: text
    content: 'Hovakivakînao izany ho tapatapany izay handrarahanao menaka: fanatitra vokatry ny tany izany.'
  '7':
  - type: text
    content: «Rehefa fanatitra voahandro amin’ny lapoaly no atolotrao, dia aoka ho lafarinina tsara indrindra voaharo menaka.
  '8':
  - type: text
    content: '«Hoentinao any amin’ny TOMPO ilay fanatitra voavoatra tamin’ireo karazan-javatra ireo; ary rehefa voatolotra ny mpisorona izany, dia harosony eo ambonin’ny alitara. '
  '9':
  - type: text
    content: 'Hanavaka ny fanati-pahatsiarovana avy amin’izany izy ka handoro azy hanetona eo ambonin’ny alitara. Fanatitra levonina amin’ny afo izany ho hanitra ankasitrahina ho an’ny TOMPO. '
