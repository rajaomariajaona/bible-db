  '1':
  - type: heading
    content: Handatsaka ny Fanahiny amin’ny olona rehetra ny Tompo
  - type: text
    content: Dia hoy ny TOMPO hoe
  - type: note
    content: Amin’ny dkt sasany ny and 1-5 dia voalahatra ho 2.28-32.
  - type: text
    content: ':'
  - type: text
    content: «Rehefa afaka izany
  - type: text
    content: dia handatsaka ny Fanahiko
  - type: text
    content: amin’ny olombelona rehetra Aho,
  - type: text
    content: 'ka '
  - type: text
    content: haminany
  - type: text
    content: ' ny zanakalahinareo'
  - type: text
    content: mbamin’ny zanakavavinareo,
  - type: text
    content: hanonofy ny lahiantitrareo
  - type: text
    content: ary hisehoam-pahitana ny tanoranareo.
  '2':
  - type: text
    content: Na dia ny mpanompolahy
  - type: text
    content: sy ny mpanompovavy aza
  - type: text
    content: dia handatsahako ny Fanahiko
  - type: text
    content: amin’izany andro izany.
  '3':
  - type: text
    content: Hampiseho zava-mahagaga
  - type: text
    content: eny amin’ny lanitra
  - type: text
    content: sy etỳ amin’ny tany Aho,
  - type: text
    content: dia ra sy afo ary setroka mitambolina.
  '4':
  - type: text
    content: Ho maizina ny masoandro
  - type: text
    content: ary ho mena toy ny ra ny volana
  - type: text
    content: mialoha ny hiavian’ny andron’ny TOMPO
  - type: note
    content: 'ny andron’ny Tompo: jereo 1.15 sy nta.'
  - type: text
    content: izay andro lehibe sady mahatahotra.
  '5':
  - type: text
    content: Ary na iza na iza hiantso
  - type: text
    content: ny anaran’ny TOMPO
  - type: text
    content: dia ho voavonjy
  - type: note
    content: Ny rijan-teny amin’ny Jôela 3.1-5 dia tsiahivina ao amin’ny Asa 2.16-21, ao amin’ny toritenin’i Petera tamin’ny Pentekôsta.
  - type: text
    content: .
  - type: text
    content: 'Fa eo an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' sy ao Jerosalema'
  - type: text
    content: dia hisy sisa afaka, araka ny voalazan’ny TOMPO.
  - type: text
    content: Ary izay antsoin’ny TOMPO
  - type: text
    content: dia ho isan’ny afa-mandositra.
