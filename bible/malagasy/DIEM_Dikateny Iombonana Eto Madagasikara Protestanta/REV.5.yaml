document_id: REV.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny horonamboky voaisy tombokase sy ny Zanakondry
  - type: text
    content: Dia hitako nisy horonamboky teny an-tanana ankavanan’Ilay mipetraka eo ambony sezafiandrianana; ka io horonamboky io dia voasoratra anatiny sy ivohony sady voaisy tombokase fito
  - type: note
    content: Ampit Ezek 2.9-10; Is 29.11. Ny tombokase fahizany dia marika voasokitra amin’ny savoka na amin’ny tanimanga, ka apetaka amin’ny fitaovana anankiray mba hanambaràna fa misy tompony, na ampiasaina mba hanakombonana tsara ny boky anankiray izany miendrika taratasy nahorona fahizany.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ary nataonao fanjaka-mpisorona ireo
  - type: text
    content: mba hanompo an’Andriamanitsika
  - type: text
    content: sy hanjaka etỳ ambonin’ny tany.»
  '11':
  - type: text
    content: Dia nahita aho sady nandre ny anjely maro, miisa arivoarivo sy alinalina
  - type: note
    content: Ampit Dan 7.10.
  - type: text
    content: '. Nanodidina ilay sezafiandrianana sy ny zava-miaina ary ny loholona ireo, '
  '12':
  - type: text
    content: 'ka nanao tamin’ny feo mahery hoe:'
  - type: text
    content: «Ny Zanakondry, Izay efa voavono ho faty,
  - type: text
    content: no mendrika handray ny fahefana sy ny harena,
  - type: text
    content: ny fahendrena sy ny hery,
  - type: text
    content: ny haja sy ny voninahitra ary ny dera.»
  '13':
  - type: text
    content: 'Ary ny voaary tontolo eny ana habakabaka sy etỳ an-tany ary any ambanin’ny tany sy any an-dranomasina, izany hoe ny zavatra rehetra ao anatin’ireo, dia reko samy nanao hoe:'
  - type: text
    content: «An’Ilay mipetraka eo ambony sezafiandrianana
  - type: text
    content: sy an’ny Zanakondry
  - type: text
    content: ny dera sy ny haja ary ny voninahitra sy ny fanjakana
  - type: text
    content: mandrakizay mandrakizay!»
  '14':
  - type: text
    content: 'Dia novalian’ny zava-miaina efatra hoe: «'
  - type: text
    content: Amen
  - type: text
    content: '!» Ary ny loholona kosa niankohoka sy nitsaoka.'
  '2':
  - type: text
    content: 'Ary indro nisy '
  - type: text
    content: anjely
  - type: text
    content: ' manan-kery nanao antso avo tamin’ny feo mafy hoe:'
  - type: text
    content: –Iza no mendrika hamaha ireo tombokase sy hanokatra ny horonamboky?
  '3':
  - type: text
    content: Kanefa tsy nisy, na tany an-danitra, na tetỳ an-tany, na tany ambanin’ny tany
  - type: note
    content: Jereo Fil 2.10 sy nta.
  - type: text
    content: ', nahasokatra ny horonamboky na nahajery izay raketiny. '
  '4':
  - type: text
    content: 'Koa nitomany mafy aho, satria tsy hita izay mendrika hanokatra ny horonamboky sy hijery izay raketiny. '
  '5':
  - type: text
    content: 'Dia hoy ny anankiray tamin’ireo '
  - type: text
    content: loholona
  - type: text
    content: ' tamiko:'
  - type: text
    content: –Aoka izay ny ranomasonao! Indro ny liona avy amin’ny fokon’i Joda, dia ilay solofon’i Davida mpanjaka
  - type: note
    content: Ampit Gen 49.9; Is 11.1, 10; Apôk 3.7 sy nta, tapany faharoa.
  - type: text
    content: ', fa nahazo fandresena ka afaka hamaha ireo tombokase sy hanokatra ny horonamboky.'
  '6':
  - type: text
    content: Dia hitako nisy Zanakondry nijoro teo anelanelan’ilay sezafiandrianana mbamin’ny zava-miaina efatra ankilany sy ireo loholona an-daniny. Tahaka ny efa voavono ho faty io Zanakondry io, ary nanana tandroka fito sy maso fito, dia ny Fanahy Masina ombàm-panomezana fito avy amin’Andriamanitra, Izay efa nirahina hankany amin’ny tany tontolo
  - type: note
    content: Ampit Is 53.7; Za 4.10. –Ao amin’ny Baiboly, ny tandroka dia mazàna mariky ny hery; ary araka Za 4.10, ny maso dia mariky ny fahalalana sy fahafantarana ny zava-drehetra. Ny isa fito, raisina araka ny heviny an’ohatra, dia milaza fa hoe lavorary sy tapitra ohatra ary mahafaoka ny zavatra rehetra.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia nandroso ilay Zanakondry ka nandray ny horonamboky teny an-tanana ankavanan’Ilay mipetraka eo ambony sezafiandrianana. '
  '8':
  - type: text
    content: 'Rehefa nandray ny horonamboky Izy, dia niankohoka teo anoloan’ny Zanakondry ny zava-miaina efatra sy ny loholona 24. Samy nanana lokanga anankiray avy ny loholona ary koa lovia volamena feno vovo-javamanitra, dia ireo lovia tandindon’ny vavaka ataon’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: '. '
  '9':
  - type: note
    content: 'hira vaovao: jereo Sal 33.3; 98.1; Is 42.10. –ny ranao nafoinao, izany hoe ny nanaovanao sorona ny ainao: ampit Kôl 1.20 sy nta.'
  - type: text
    content: 'Ary nandredona hira vaovao ho an’ny Zanakondry ny loholona ka nanao hoe:'
  - type: text
    content: «Ianao no mendrika handray ny horonamboky
  - type: text
    content: sy hamaha ny tombokaseny.
  - type: text
    content: Efa voavono ho faty Ianao, ka ny ranao nafoinao
  - type: text
    content: no nanavotanao olona ho an’Andriamanitra,
  - type: text
    content: dia olona avy tamin’ny foko amam-piteny samy hafa
  - type: text
    content: sy avy tamin’ny vahoaka amam-pirenena samy hafa.
