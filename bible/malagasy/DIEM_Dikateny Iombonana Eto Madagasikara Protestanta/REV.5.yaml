document_id: REV.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny horonamboky voaisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: ' sy ny Zanakondry'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia hitako nisy horonamboky teny an-tanana ankavanan’Ilay mipetraka eo ambony sezafiandrianana; ka io horonamboky io dia voasoratra anatiny sy ivohony sady voaisy tombokase fito
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ampit Ezek 2.9-10; Is 29.11. Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tombokase
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fahizany dia marika voasokitra amin’ny savoka na amin’ny tanimanga, ka apetaka amin’ny fitaovana anankiray mba hanambaràna fa misy tompony, na ampiasaina mba hanakombonana tsara ny boky anankiray izany miendrika taratasy nahorona fahizany.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary indro nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' manan-kery nanao antso avo tamin’ny feo mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no mendrika hamaha ireo tombokase sy hanokatra ny horonamboky?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa tsy nisy, na tany an-danitra, na tetỳ an-tany, na tany ambanin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Fil 2.10 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', nahasokatra ny horonamboky na nahajery izay raketiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa nitomany mafy aho, satria tsy hita izay mendrika hanokatra ny horonamboky sy hijery izay raketiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ny anankiray tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka izay ny ranomasonao! Indro ny liona avy amin’ny fokon’i Joda, dia ilay solofon’i Davida mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 49.9; Is 11.1, 10; Apôk 3.7 sy nta, tapany faharoa.
    marker-yv: yv-n
  - type: text
    text: ', fa nahazo fandresena ka afaka hamaha ireo tombokase sy hanokatra ny horonamboky.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hitako nisy Zanakondry nijoro teo anelanelan’ilay sezafiandrianana mbamin’ny zava-miaina efatra ankilany sy ireo loholona an-daniny. Tahaka ny efa voavono ho faty io Zanakondry io, ary nanana tandroka fito sy maso fito, dia ny Fanahy Masina ombàm-panomezana fito avy amin’Andriamanitra, Izay efa nirahina hankany amin’ny tany tontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ampit Is 53.7; Za 4.10. –Ao amin’ny Baiboly, ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tandroka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mazàna mariky ny hery; ary araka Za 4.10, ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: maso
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mariky ny fahalalana sy fahafantarana ny zava-drehetra. Ny isa '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: fito,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' raisina araka ny heviny an’ohatra, dia milaza fa hoe lavorary sy tapitra ohatra ary mahafaoka ny zavatra rehetra.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandroso ilay Zanakondry ka nandray ny horonamboky teny an-tanana ankavanan’Ilay mipetraka eo ambony sezafiandrianana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehefa nandray ny horonamboky Izy, dia niankohoka teo anoloan’ny Zanakondry ny zava-miaina efatra sy ny loholona 24. Samy nanana lokanga anankiray avy ny loholona ary koa lovia volamena feno vovo-javamanitra, dia ireo lovia tandindon’ny vavaka ataon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hira vaovao:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Sal 33.3; 98.1; Is 42.10. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny ranao nafoinao,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany hoe ny nanaovanao sorona ny ainao: ampit Kôl 1.20 sy nta.'
    marker-yv: yv-n
  - type: text
    text: 'Ary nandredona hira vaovao ho an’ny Zanakondry ny loholona ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ianao no mendrika handray ny horonamboky
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamaha ny tombokaseny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa voavono ho faty Ianao, ka ny ranao nafoinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanavotanao olona ho an’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia olona avy tamin’ny foko amam-piteny samy hafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy avy tamin’ny vahoaka amam-pirenena samy hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nataonao fanjaka-mpisorona ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanompo an’Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanjaka etỳ ambonin’ny tany.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nahita aho sady nandre ny anjely maro, miisa arivoarivo sy alinalina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 7.10.
    marker-yv: yv-n
  - type: text
    text: '. Nanodidina ilay sezafiandrianana sy ny zava-miaina ary ny loholona ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka nanao tamin’ny feo mahery hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny Zanakondry, Izay efa voavono ho faty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mendrika handray ny fahefana sy ny harena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahendrena sy ny hery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny haja sy ny voninahitra ary ny dera.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny voaary tontolo eny ana habakabaka sy etỳ an-tany ary any ambanin’ny tany sy any an-dranomasina, izany hoe ny zavatra rehetra ao anatin’ireo, dia reko samy nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «An’Ilay mipetraka eo ambony sezafiandrianana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy an’ny Zanakondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny dera sy ny haja ary ny voninahitra sy ny fanjakana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandrakizay mandrakizay!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia novalian’ny zava-miaina efatra hoe: «'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: '!» Ary ny loholona kosa niankohoka sy nitsaoka.'
