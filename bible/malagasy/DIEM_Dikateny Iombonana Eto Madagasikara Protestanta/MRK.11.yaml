document_id: MRK.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miditra ao Jerosalema i Jesoa
  - type: heading
    content: (Jereo Mt 21.1-11; Lk 19.29-44; Jôh 12.12-19)
  - type: text
    content: 'Ary nanakaiky an’i Jerosalema i Jesoa mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ' sy ny vahoaka tafaraka taminy, ka mby tao amin’ny faritr’i Betifage sy i Betania, teo akaikin’ny tendrombohitra atao hoe Analanôliva'
  - type: note
    content: I Betifage dia tanàna kely, miorina eo amin’ny tendrombohitra Analanôliva, tehezany atsinanana, tsy lavitra an’i Jerosalema renivohitra. –i Betania dia tanàna kely hafa, mifanila amin’i Betifage. –Ny tendrombohitra Analanôliva dia havoana eo andafy atsinanan’i Jerosalema, ka ny lohasahan’i Kidrôna no hany manelanelana.
  - type: text
    content: '. Dia naniraka roa lahy tamin’ny mpianany i Jesoa '
  '10':
  - type: text
    content: Hombam-pitahiana anie ity Fanjakana tonga, dia ny Fanjakan’i Davida raintsika! Dera anie ho an’Andriamanitra any amin’ny avo indrindra
  - type: note
    content: 'Ampit Sal 118.25-26. –Dera (and 9) ...Dera (and 10): jereo Mt 21.9 sy nta.'
  - type: text
    content: '!'
  '11':
  - type: text
    content: Dia niditra tao Jerosalema i Jesoa ka namantana tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ; ary nony avy nijerijery ny zavatra rehetra Izy, sady efa hariva ny andro, dia lasa nankany Betania niaraka tamin’ny 12 lahy.
  - type: heading
    content: Tsy hamoa intsony ilay aviavy
  - type: heading
    content: (Jereo Mt 21.18-19)
  '12':
  - type: text
    content: 'Ny ampitson’iny, raha niala tao Betania i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: ', dia nahatsiaro noana i Jesoa. '
  '13':
  - type: text
    content: 'Nahatazana aviavy anankiray nandrobona Izy; ka lasa nankeo nizaha raha sendra nisy voany; kanjo nony tonga teo Izy, dia tsy nahita na inona na inona afa-tsy raviny fotsiny, satria tsy fotoanan’ny aviavy. '
  '14':
  - type: text
    content: 'Dia niteny i Jesoa ka nanao tamin’ilay aviavy hoe:'
  - type: text
    content: –Tsy hisy olona hihinana voa avy aminao intsony na oviana na oviana!
  - type: text
    content: Ary ren’ny mpianany izany.
  - type: heading
    content: Tandrovin’i Jesoa ny hajan’ny tempoly
  - type: heading
    content: (Jereo Mt 21.12-17; Lk 19.45-48; Jôh 2.13-22)
  '15':
  - type: text
    content: Dia tonga tao Jerosalema ry zareo. Ary namantana tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Jesoa; ka ireo mpivarotra sy mpividy teo noroahiny, ny latabatr’ireo mpanakalo vola'
  - type: note
    content: Ireo mpanakalo vola dia ahafahan’ireo Jiosy avy any am-pielezana manakalo vola vahiny mba hividianana fanatitra na handoavana ny hetran’ny tempoly.
  - type: text
    content: ' sy ny sezan’ireo mpivaro-boromahailala nazerany, '
  '16':
  - type: text
    content: 'ary tsy nisy olona navelany hitondra fitaovana hamakivaky ny kianjan’ny tempoly. '
  '17':
  - type: text
    content: 'Dia nampianatra ny olona i Jesoa ary nanao taminy hoe:'
  - type: text
    content: '–Tsy izao ve no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Ny tranoko dia hantsoina hoe trano fivavahana ho an’ny firenena rehetra»? Nefa he ity izy ataonareo zohy fieren’ny mpangalatra'
  - type: note
    content: Ampit Is 56.7; Jer 7.11.
  - type: text
    content: '!'
  '18':
  - type: text
    content: 'Ary nahare izany ny lohandoha-mpisorona sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ', ka nitady izay fomba hamonoana an’i Jesoa; fa natahotra Azy manko ry zareo satria nahatalanjona ny vahoaka rehetra ny fampianarany.'
  '19':
  - type: text
    content: Ary nony hariva
  - type: note
    content: 'Ary nony hariva: dkt hafa ary rehefa nihariva.'
  - type: text
    content: 'ny andro, dia niala tao an-tanàna i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: .
  - type: heading
    content: Fampianarana momba ilay aviavy
  - type: heading
    content: (Jereo Mt 21.20-22)
  '2':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: '–Mankanesa amin’itsy tanàna manoloana anareo itsy. Raha vao tafiditra ao ianareo, dia hahita zana-boriky mifatotra mbola tsy nitaingenan’olona; vahao izy dia ento atỳ. '
  '20':
  - type: text
    content: 'Nandalo teo amin’ilay aviavy ry zareo ny ampitso maraina, ka nahita ity hazo maina hatramin’ny fakany. '
  '21':
  - type: text
    content: 'Dia nahatsiahy i Petera ka nanao tamin’i Jesoa hoe:'
  - type: text
    content: –Mpampianatra ô, jereo fa maina ilay aviavy nozoninao!
  '22':
  - type: text
    content: 'Namaly i Jesoa ka nanao tamin’ireo '
  - type: text
    content: mpianany
  - type: text
    content: ' hoe:'
  - type: text
    content: '–Manàna finoana an’Andriamanitra! '
  '23':
  - type: text
    content: 'Lazaiko marina aminareo fa na iza na iza hilaza amin’ity tendrombohitra ity hoe: «Mialà eo, ary mianjerà any an-dranomasina», ka tsy misalasala ao am-po, fa mino hoe ho tonga izay lazainy, dia ho tanteraka aminy tokoa. '
  '24':
  - type: text
    content: 'Koa izao no teniko aminareo: na inona na inona hangatahinareo amin’ny vavaka ataonareo, inoy fa efa azonareo, dia hotanteraka aminareo tokoa. '
  '25':
  - type: text
    content: 'Ary raha mijoro mivavaka ianareo, ka misy olona anananareo alahelo dia mamelà ny hadisoany mba havelan’ny Rainareo Izay any an-danitra koa ny hadisoanareo. [ '
  '26':
  - type: text
    content: Fa raha tsy mamela ianareo, dia tsy havelan’ny Rainareo Izay any an-danitra koa ny hadisoanareo
  - type: note
    content: Jereo Mt 6.15.
  - type: text
    content: .]
  - type: heading
    content: Avy aiza ny fahefan’i Jesoa
  - type: heading
    content: (Jereo Mt 21.23-27; Lk 20.1-8)
  '27':
  - type: text
    content: 'Dia tonga tao Jerosalema indray i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: '. Ary nandehandeha teo an-kianjan’ny tempoly i Jesoa no nanatona Azy ny lohandoha-mpisorona sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' ary ny '
  - type: text
    content: loholona
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Dia hoy ireo taminy:'
  - type: text
    content: –Fahefana ahoana moa no anaovanao an’izao zavatra izao? Ary iza no nanome Anao izany fahefana izany, ka ahazoanao manao an’izao?
  '29':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Hanontany anareo zavatra anankiray monja aho ka valio, dia holazaiko anareo koa ny fahefana anaovako an’izao zavatra izao. '
  '3':
  - type: text
    content: 'Ary raha misy olona manontany anareo hoe: «Ahoana no anaovanareo izao?», dia valio hoe: «Misy ilàn’ny Tompo azy, fa vetivety foana dia haveriny eto'
  - type: note
    content: 'fa vetivety foana dia haveriny eto (haverin’i Jesoa Tompo): dkt hafa, araka ny stf sasany, ka avy hatrany dia havelan’ny tompony indray hoentina atỳ.'
  - type: text
    content: .»
  '30':
  - type: text
    content: 'Iza no naniraka an’i Jôhany hanao '
  - type: text
    content: batisa
  - type: note
    content: Jereo 1.4-5.
  - type: text
    content: ', Andriamanitra sa olombelona? Valio Aho!'
  '31':
  - type: text
    content: 'Dia velona ady hevitra ry zareo ka nifampiresaka hoe:'
  - type: text
    content: '–Raha lazaintsika hoe: «Andriamanitra no naniraka azy», dia hanontany Izy hoe: «Koa nahoana no tsy ninoanareo i Jôhany?» '
  '32':
  - type: text
    content: 'Raha lazaintsika hoe: «Olombelona no naniraka azy...»'
  - type: text
    content: '(Natahotra ny vahoaka ry zareo satria neken’ny olona rehetra fa '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra tokoa i Jôhany).
  '33':
  - type: text
    content: 'Koa dia izao no navaliny an’i Jesoa:'
  - type: text
    content: –Tsy hitanay izay holazaina!
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Izaho koa tsy hilaza aminareo ny fahefana anaovako an’izao zavatra izao.
  '4':
  - type: text
    content: 'Dia lasa izy roa lahy ka nahita zana-boriky mifatotra eo alatrano akaiky varavarana teo amoron-dalana, dia novahany. '
  '5':
  - type: text
    content: 'Fa ny sasany tamin’ny olona nijoro teo nanontany azy roa lahy hoe:'
  - type: text
    content: –Hataonareo inona no vahanareo ity zana-boriky?
  '6':
  - type: text
    content: 'Dia novaliany araka ny nanafaran’i Jesoa azy, ka navelan’ny olona. '
  '7':
  - type: text
    content: Nentin’izy roa lahy nankeo amin’i Jesoa ilay zana-boriky, ka nametrahan’ny mpianatra rehetra ny lambany teo amboniny ary dia nitaingenan’i Jesoa
  - type: note
    content: Ampit Za 9.9.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Maro ny olona namelatra ny lambany teny amin’ny lalana; ny an’ny sasany kosa rantsan-kazo tinapaka teny an-tsaha
  - type: note
    content: Karazana fomba fanomezam-boninahitra izany, tahaka ny hita ao amin’ny 2 Mp 9.13.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Ary ireo olona nialoha an’i Jesoa na ireo nanaraka Azy dia samy niantsoantso hoe:'
  - type: text
    content: '–Dera anie ho an’Andriamanitra! Hombam-pitahiana amin’ny anaran’ny Tompo anie Ilay avy! '
