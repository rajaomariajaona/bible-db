document_id: MRK.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miditra ao Jerosalema i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 21.1-11; Lk 19.29-44; Jôh 12.12-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nanakaiky an’i Jerosalema i Jesoa mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' sy ny vahoaka tafaraka taminy, ka mby tao amin’ny faritr’i Betifage sy i Betania, teo akaikin’ny tendrombohitra atao hoe Analanôliva'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Betifage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna kely, miorina eo amin’ny tendrombohitra Analanôliva, tehezany atsinanana, tsy lavitra an’i Jerosalema renivohitra. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: i Betania
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tanàna kely hafa, mifanila amin’i Betifage. –'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny tendrombohitra Analanôliva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia havoana eo andafy atsinanan’i Jerosalema, ka ny lohasahan’i Kidrôna no hany manelanelana.'
    marker-yv: yv-n
  - type: text
    text: '. Dia naniraka roa lahy tamin’ny mpianany i Jesoa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mankanesa amin’itsy tanàna manoloana anareo itsy. Raha vao tafiditra ao ianareo, dia hahita zana-boriky mifatotra mbola tsy nitaingenan’olona; vahao izy dia ento atỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha misy olona manontany anareo hoe: «Ahoana no anaovanareo izao?», dia valio hoe: «Misy ilàn’ny Tompo azy, fa vetivety foana dia haveriny eto'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fa vetivety foana dia haveriny eto '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(haverin’i Jesoa Tompo): dkt hafa, araka ny stf sasany, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ka avy hatrany dia havelan’ny tompony indray hoentina atỳ.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia lasa izy roa lahy ka nahita zana-boriky mifatotra eo alatrano akaiky varavarana teo amoron-dalana, dia novahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny sasany tamin’ny olona nijoro teo nanontany azy roa lahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hataonareo inona no vahanareo ity zana-boriky?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia novaliany araka ny nanafaran’i Jesoa azy, ka navelan’ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nentin’izy roa lahy nankeo amin’i Jesoa ilay zana-boriky, ka nametrahan’ny mpianatra rehetra ny lambany teo amboniny ary dia nitaingenan’i Jesoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Za 9.9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Maro ny olona namelatra ny lambany teny amin’ny lalana; ny an’ny sasany kosa rantsan-kazo tinapaka teny an-tsaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Karazana fomba fanomezam-boninahitra izany, tahaka ny hita ao amin’ny 2 Mp 9.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ireo olona nialoha an’i Jesoa na ireo nanaraka Azy dia samy niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Dera anie ho an’Andriamanitra! Hombam-pitahiana amin’ny anaran’ny Tompo anie Ilay avy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hombam-pitahiana anie ity Fanjakana tonga, dia ny Fanjakan’i Davida raintsika! Dera anie ho an’Andriamanitra any amin’ny avo indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 118.25-26. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 9) '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: '...Dera'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 10): jereo Mt 21.9 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia niditra tao Jerosalema i Jesoa ka namantana tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ; ary nony avy nijerijery ny zavatra rehetra Izy, sady efa hariva ny andro, dia lasa nankany Betania niaraka tamin’ny 12 lahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy hamoa intsony ilay aviavy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 21.18-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny ampitson’iny, raha niala tao Betania i Jesoa sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ', dia nahatsiaro noana i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nahatazana aviavy anankiray nandrobona Izy; ka lasa nankeo nizaha raha sendra nisy voany; kanjo nony tonga teo Izy, dia tsy nahita na inona na inona afa-tsy raviny fotsiny, satria tsy fotoanan’ny aviavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niteny i Jesoa ka nanao tamin’ilay aviavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy hisy olona hihinana voa avy aminao intsony na oviana na oviana!
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary ren’ny mpianany izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tandrovin’i Jesoa ny hajan’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 21.12-17; Lk 19.45-48; Jôh 2.13-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia tonga tao Jerosalema ry zareo. Ary namantana tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' i Jesoa; ka ireo mpivarotra sy mpividy teo noroahiny, ny latabatr’ireo mpanakalo vola'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ireo mpanakalo vola '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ahafahan’ireo Jiosy avy any am-pielezana manakalo vola vahiny mba hividianana fanatitra na handoavana ny hetran’ny tempoly.
    marker-yv: yv-n
  - type: text
    text: ' sy ny sezan’ireo mpivaro-boromahailala nazerany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary tsy nisy olona navelany hitondra fitaovana hamakivaky ny kianjan’ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nampianatra ny olona i Jesoa ary nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy izao ve no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ': «Ny tranoko dia hantsoina hoe trano fivavahana ho an’ny firenena rehetra»? Nefa he ity izy ataonareo zohy fieren’ny mpangalatra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 56.7; Jer 7.11.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nahare izany ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ', ka nitady izay fomba hamonoana an’i Jesoa; fa natahotra Azy manko ry zareo satria nahatalanjona ny vahoaka rehetra ny fampianarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary nony hariva
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ary nony hariva: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary rehefa nihariva.
    marker-yv: yv-n
  - type: text
    text: 'ny andro, dia niala tao an-tanàna i Jesoa sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampianarana momba ilay aviavy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 21.20-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nandalo teo amin’ilay aviavy ry zareo ny ampitso maraina, ka nahita ity hazo maina hatramin’ny fakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nahatsiahy i Petera ka nanao tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, jereo fa maina ilay aviavy nozoninao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Namaly i Jesoa ka nanao tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Manàna finoana an’Andriamanitra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lazaiko marina aminareo fa na iza na iza hilaza amin’ity tendrombohitra ity hoe: «Mialà eo, ary mianjerà any an-dranomasina», ka tsy misalasala ao am-po, fa mino hoe ho tonga izay lazainy, dia ho tanteraka aminy tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa izao no teniko aminareo: na inona na inona hangatahinareo amin’ny vavaka ataonareo, inoy fa efa azonareo, dia hotanteraka aminareo tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha mijoro mivavaka ianareo, ka misy olona anananareo alahelo dia mamelà ny hadisoany mba havelan’ny Rainareo Izay any an-danitra koa ny hadisoanareo. [ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa raha tsy mamela ianareo, dia tsy havelan’ny Rainareo Izay any an-danitra koa ny hadisoanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 6.15.
    marker-yv: yv-n
  - type: text
    text: .]
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avy aiza ny fahefan’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 21.23-27; Lk 20.1-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia tonga tao Jerosalema indray i Jesoa sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '. Ary nandehandeha teo an-kianjan’ny tempoly i Jesoa no nanatona Azy ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy ireo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fahefana ahoana moa no anaovanao an’izao zavatra izao? Ary iza no nanome Anao izany fahefana izany, ka ahazoanao manao an’izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hanontany anareo zavatra anankiray monja aho ka valio, dia holazaiko anareo koa ny fahefana anaovako an’izao zavatra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Iza no naniraka an’i Jôhany hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.4-5.
    marker-yv: yv-n
  - type: text
    text: ', Andriamanitra sa olombelona? Valio Aho!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia velona ady hevitra ry zareo ka nifampiresaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha lazaintsika hoe: «Andriamanitra no naniraka azy», dia hanontany Izy hoe: «Koa nahoana no tsy ninoanareo i Jôhany?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Raha lazaintsika hoe: «Olombelona no naniraka azy...»'
- type: usfm
  marker: p
  children:
  - type: text
    text: '(Natahotra ny vahoaka ry zareo satria neken’ny olona rehetra fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminani
  - type: text
    text: n’Andriamanitra tokoa i Jôhany).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa dia izao no navaliny an’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy hitanay izay holazaina!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho koa tsy hilaza aminareo ny fahefana anaovako an’izao zavatra izao.
