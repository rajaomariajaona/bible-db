document_id: MRK.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Entina eo anatrehan’i Pilato governora i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.1-2, 11-14; Lk 23.1-5; Jôh 18.28-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha vao maraina ny andro, dia nivory hanapa-kevitra ny lohandoha-mpisorona niaraka tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ', izany hoe ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fitsarana ambony
  - type: text
    text: ' manontolo; dia nampamatotra an’i Jesoa ry zareo sy nitondra Azy ary nanolotra Azy an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanontany an’i Jesoa i Pilato hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao ve no Mpanjakan’ny Jiosy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Anao izany teny izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy zavatra maro niampangan’ireo lohandoha-mpisorona Azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka nanontany Azy indray i Pilato nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mamaly akory ve Ianao? He ireto zavatra maro iampangany Anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tsy namaly na inona na inona intsony i Jesoa, ka gaga i Pilato.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaheloka ho faty i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.15-26; Lk 23.13-25; Jôh 18.39–19.16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Isaky ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' dia fombàn’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' ny mandefa mpigadra anankiray, izay angatahin’ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy lehilahy atao hoe Barabasy, niara-nigadra tamin’ireo mpikomy nahafaty olona tamin’ny fikomiana nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niakatra ny vahoaka, nangataka an’i Pilato hanao araka ny fanaony aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa novalian’i Pilato hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tianareo ve raha ny Mpanjakan’ny Jiosy no alefako ho anareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fantatr’i Pilato manko fa fialonana no nanoloran’ireo lohandoha-mpisorona an’i Jesoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'kanefa nampirisihin’ireo lohandoha-mpisorona ny vahoaka hangataka ny handefasana an’i Barabasy toy izay i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary dia niteny tamin’ny vahoaka indray i Pilato nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona àry no tianareo hataoko an’Ilay antsoinareo hoe Mpanjakan’ny Jiosy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy indray ny antsoantson’ny vahoaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Homboy amin’ny hazofijaliana ilay iny!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy i Pilato tamin’ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona àry no ratsy nataony?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa vao mainka koa niantsoantso mafy ny vahoaka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Homboy amin’ny hazofijaliana ilay iny!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Te hanome fahafaham-po ny vahoaka i Pilato, ka dia i Barabasy no nalefany ho azy; fa i Jesoa kosa nasainy nokapohina sy natolony hohomboana amin’ny hazofijaliana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esoin’ny miaramila rômanina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.27-31; Jôh 19.2-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nentin’ireo miaramila teo an-tokotany i Jesoa, izany hoe tao amin’ny lapan’ny governora, ary nantsoiny hankeo ny miaramila tarika iray manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia nampitafîn-dry zareo lamba jaky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lamba jaky '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sarobidy, miloko mena, natokana indrindra ho an’ny mpanjaka sy ny olona manan-kaja ambony.
    marker-yv: yv-n
  - type: text
    text: ' Izy ary nasiany fehiloha tsilo norandranina ny lohany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia noarahabainy Izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Arahaba, ry Mpanjakan’ny Jiosy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nokapohiny tamin’ny volotara ny lohany sady nororany Izy, dia nandohalihany sy niankohofany teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rehefa avy nanao Azy toy izany ry zareo, dia nesoriny ilay lamba jaky teny aminy ary nampanaoviny Azy indray ny akanjony; dia nentiny nivoaka ny lapa Izy hohomboana amin’ny hazofijaliana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Homboana amin’ny hazofijaliana i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.32-44; Lk 23.26-43; Jôh 19.17-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sendra nandalo avy any an-tsaha ity olona atao hoe Simôna, lehilahy sireneanina, rain-dry i Aleksandra sy i Rofosy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 16.13.
    marker-yv: yv-n
  - type: text
    text: ', ka noteren’ireo miaramila hitondra ny hazofijalian’i Jesoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tao amin’ny toerana atao hoe Gôlgôtà, izay midika hoe toerana sahala amin’ny karandoha, no nitondrany an’i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nomeny divay mifangaro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: miora
  - type: text
    text: ' i Jesoa fa tsy nety nisotro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nohomboany tamin’ny hazofijaliana Izy; ary nifampizarany ny fitafiany, ka nanaovany loka hahitana izay anjaran’ny tsirairay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 22.19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tamin’ny sivy maraina no nanomboana an’i Jesoa tamin’ny hazofijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny soratra napetraka hilaza ny nanamelohana Azy dia ny hoe: «Mpanjakan’ny Jiosy». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nisy jiolahy roa nohomboana tamin’ny hazofijaliana niaraka tamin’i Jesoa, ka ny anankiray teo ankavanany ary ny anankiray teo ankaviany. [ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa tanteraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' manao hoe: «Natao ho isan’ny mpanao ratsy Izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lk 22.37 sy Is 53.12.
    marker-yv: yv-n
  - type: text
    text: .»]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nanevateva an’i Jesoa ny mpandalo sady nanifikifi-doha ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sakoizay, ry Ilay hoe mandrava ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempolin’Andriamanitra
  - type: text
    text: ' ary manangana azy ao anatin’ny telo andro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 22.8; Mk 14.58; Jôh 2.19.
    marker-yv: yv-n
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Vonjeo ny tenanao, ka midîna avy eo amin’ny hazofijaliana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Naneso Azy toy izany koa ireo lohandoha-mpisorona mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' ka nifampilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Namonjy olon-kafa Izy, fa ny tenany tsy hainy vonjena! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aoka ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', Mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ', hidina avy eo amin’ny hazofijaliana ankehitriny, mba ho hitantsika ka hinoantsika!'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia naneso an’i Jesoa koa ireo niara-nohomboana taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miala aina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.45-56; Lk 23.44-49; Jôh 19.28-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin’ny mitataovovonana, dia rakotra haizina ny faritany manontolo, ka naharitra hatramin’ny telo tolakandro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary tamin’ny telo tolakandro i Jesoa dia niantso tamin’ny feo mahery nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Elôỳ, Elôỳ, lemà sabaktàny? (izany hoe raha adika: «Andriamanitro ô, Andriamanitro ô, nahoana no dia nilaozanao Aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 22.2, voatsiahy araka ny fiteny aramianina.
    marker-yv: yv-n
  - type: text
    text: ?»)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny sasany tamin’ireo olona nijanona teo, raha nandre izany, dia niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro fa niantso an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià
  - type: text
    text: ' ny anao!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Tamin’izay dia nisy olona anankiray nihazakazaka nanatsoboka spaonjy tao anaty vinaingitra; dia notohiziny volotara ilay spaonjy ka natohony an’i Jesoa mba hotsentsefiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sa 69.22.
    marker-yv: yv-n
  - type: text
    text: ', sady hoy izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avelao hoe hojerentsika raha ho avy hampidina Azy tokoa i Elià!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa i Jesoa kosa niantso tamin’ny feo mahery, dia niala aina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary nitriatra nizara roa hatrany ambony ka hatrany ambany ny efitra lamba tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 26.31-33.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Fa ilay kapiteny nijoro tandrifin’i Jesoa, raha nahita Azy niala aina toy izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.39 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'niala aina toy izany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany manampy kely hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: niala aina niantso mafy toy izany.
    marker-yv: yv-n
  - type: text
    text: ', dia loa-bolana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tena Zanak’Andriamanitra tokoa io Lehilahy io!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nisy vehivavy maromaro koa nitazana avy eny lavidavitra teny ka anisan’ireo i Maria avy any Magdalà, sy i Salôme ary i Maria renin-dry i Jakôba kely sy i Jôsèta mirahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Niaraka tamin’i Jesoa tany Galilea ireo vehivavy ireo, nanampy Azy tamin’izay nilainy; ary nisy vehivavy maro hafa koa izay niara-niakatra tamin’i Jesoa tany Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alevina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.57-61; Lk 23.50-56; Jôh 19.38-42)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: Efa hariva ny andro no tonga i Jôsefa avy any amin’ny tanàna atao hoe Harimatia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.42 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Harimatia: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 27.57 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. Lehilahy manan-kaja tao amin’ny Fitsarana ambony izy sady fatra-piandry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '. Andro fiomanana tamin’io, izany hoe andro mialoha ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: '; koa lasa i Jôsefa niditra tamim-pahasahiana tao an-tranon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' ary nangataka ny vatan’i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fa gaga i Pilato raha hoe maty sahady i Jesoa, ka dia nampiantso ny kapiteny ary nanontany azy raha efa ela no nahafatesany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Nony reny ny filàzan’ilay kapiteny, dia navelany homena an’i Jôsefa ny faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia nividy lamba sarobidy i Jôsefa, ary nampidininy avy teo amin’ny hazofijaliana ny vatan’i Jesoa ka nofonosiny lamba sarobidy ary napetrany tao amin’ny fasana nolavahana tamin’ny vatolampy; dia nanakodiavany vato teo amin’ny vavafasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ary nataon’i Maria avy any Magdalà sy i Maria renin’i Jôsèta tsara jery ny toerana nametrahan’i Jôsefa an’i Jesoa.
