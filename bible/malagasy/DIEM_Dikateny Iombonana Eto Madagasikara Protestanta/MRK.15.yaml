document_id: MRK.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Entina eo anatrehan’i Pilato governora i Jesoa
  - type: heading
    content: (Jereo Mt 27.1-2, 11-14; Lk 23.1-5; Jôh 18.28-38)
  - type: text
    content: 'Raha vao maraina ny andro, dia nivory hanapa-kevitra ny lohandoha-mpisorona niaraka tamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ', izany hoe ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ' manontolo; dia nampamatotra an’i Jesoa ry zareo sy nitondra Azy ary nanolotra Azy an’i '
  - type: text
    content: Pilato
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Fantatr’i Pilato manko fa fialonana no nanoloran’ireo lohandoha-mpisorona an’i Jesoa, '
  '11':
  - type: text
    content: 'kanefa nampirisihin’ireo lohandoha-mpisorona ny vahoaka hangataka ny handefasana an’i Barabasy toy izay i Jesoa. '
  '12':
  - type: text
    content: 'Ary dia niteny tamin’ny vahoaka indray i Pilato nanao hoe:'
  - type: text
    content: –Inona àry no tianareo hataoko an’Ilay antsoinareo hoe Mpanjakan’ny Jiosy?
  '13':
  - type: text
    content: 'Fa hoy indray ny antsoantson’ny vahoaka hoe:'
  - type: text
    content: –Homboy amin’ny hazofijaliana ilay iny!
  '14':
  - type: text
    content: 'Dia hoy i Pilato tamin’ny vahoaka:'
  - type: text
    content: –Fa inona àry no ratsy nataony?
  - type: text
    content: 'Fa vao mainka koa niantsoantso mafy ny vahoaka nanao hoe:'
  - type: text
    content: –Homboy amin’ny hazofijaliana ilay iny!
  '15':
  - type: text
    content: Te hanome fahafaham-po ny vahoaka i Pilato, ka dia i Barabasy no nalefany ho azy; fa i Jesoa kosa nasainy nokapohina sy natolony hohomboana amin’ny hazofijaliana.
  - type: heading
    content: Esoin’ny miaramila rômanina i Jesoa
  - type: heading
    content: (Jereo Mt 27.27-31; Jôh 19.2-3)
  '16':
  - type: text
    content: 'Nentin’ireo miaramila teo an-tokotany i Jesoa, izany hoe tao amin’ny lapan’ny governora, ary nantsoiny hankeo ny miaramila tarika iray manontolo. '
  '17':
  - type: text
    content: Dia nampitafîn-dry zareo lamba jaky
  - type: note
    content: lamba jaky sarobidy, miloko mena, natokana indrindra ho an’ny mpanjaka sy ny olona manan-kaja ambony.
  - type: text
    content: ' Izy ary nasiany fehiloha tsilo norandranina ny lohany, '
  '18':
  - type: text
    content: 'dia noarahabainy Izy hoe:'
  - type: text
    content: –Arahaba, ry Mpanjakan’ny Jiosy!
  '19':
  - type: text
    content: 'Ary nokapohiny tamin’ny volotara ny lohany sady nororany Izy, dia nandohalihany sy niankohofany teo anatrehany. '
  '2':
  - type: text
    content: 'Dia nanontany an’i Jesoa i Pilato hoe:'
  - type: text
    content: –Ianao ve no Mpanjakan’ny Jiosy?
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Anao izany teny izany!
  '20':
  - type: text
    content: Rehefa avy nanao Azy toy izany ry zareo, dia nesoriny ilay lamba jaky teny aminy ary nampanaoviny Azy indray ny akanjony; dia nentiny nivoaka ny lapa Izy hohomboana amin’ny hazofijaliana.
  - type: heading
    content: Homboana amin’ny hazofijaliana i Jesoa
  - type: heading
    content: (Jereo Mt 27.32-44; Lk 23.26-43; Jôh 19.17-27)
  '21':
  - type: text
    content: Sendra nandalo avy any an-tsaha ity olona atao hoe Simôna, lehilahy sireneanina, rain-dry i Aleksandra sy i Rofosy
  - type: note
    content: Ampit Rm 16.13.
  - type: text
    content: ', ka noteren’ireo miaramila hitondra ny hazofijalian’i Jesoa.'
  '22':
  - type: text
    content: 'Tao amin’ny toerana atao hoe Gôlgôtà, izay midika hoe toerana sahala amin’ny karandoha, no nitondrany an’i Jesoa. '
  '23':
  - type: text
    content: 'Nomeny divay mifangaro '
  - type: text
    content: miora
  - type: text
    content: ' i Jesoa fa tsy nety nisotro. '
  '24':
  - type: text
    content: Dia nohomboany tamin’ny hazofijaliana Izy; ary nifampizarany ny fitafiany, ka nanaovany loka hahitana izay anjaran’ny tsirairay
  - type: note
    content: Jereo Sal 22.19.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Tamin’ny sivy maraina no nanomboana an’i Jesoa tamin’ny hazofijaliana. '
  '26':
  - type: text
    content: 'Ary ny soratra napetraka hilaza ny nanamelohana Azy dia ny hoe: «Mpanjakan’ny Jiosy». '
  '27':
  - type: text
    content: 'Nisy jiolahy roa nohomboana tamin’ny hazofijaliana niaraka tamin’i Jesoa, ka ny anankiray teo ankavanany ary ny anankiray teo ankaviany. [ '
  '28':
  - type: text
    content: 'Koa tanteraka ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' manao hoe: «Natao ho isan’ny mpanao ratsy Izy'
  - type: note
    content: Jereo Lk 22.37 sy Is 53.12.
  - type: text
    content: .»]
  '29':
  - type: text
    content: 'Dia nanevateva an’i Jesoa ny mpandalo sady nanifikifi-doha ka nanao hoe:'
  - type: text
    content: '–Sakoizay, ry Ilay hoe mandrava ny '
  - type: text
    content: tempolin’Andriamanitra
  - type: text
    content: ' ary manangana azy ao anatin’ny telo andro'
  - type: note
    content: Jereo Sal 22.8; Mk 14.58; Jôh 2.19.
  - type: text
    content: '! '
  '3':
  - type: text
    content: 'Ary nisy zavatra maro niampangan’ireo lohandoha-mpisorona Azy; '
  '30':
  - type: text
    content: Vonjeo ny tenanao, ka midîna avy eo amin’ny hazofijaliana!
  '31':
  - type: text
    content: 'Naneso Azy toy izany koa ireo lohandoha-mpisorona mbamin’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' ka nifampilaza hoe:'
  - type: text
    content: '–Namonjy olon-kafa Izy, fa ny tenany tsy hainy vonjena! '
  '32':
  - type: text
    content: 'Aoka ilay '
  - type: text
    content: Mesia
  - type: text
    content: ', Mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ', hidina avy eo amin’ny hazofijaliana ankehitriny, mba ho hitantsika ka hinoantsika!'
  - type: text
    content: Dia naneso an’i Jesoa koa ireo niara-nohomboana taminy.
  - type: heading
    content: Miala aina i Jesoa
  - type: heading
    content: (Jereo Mt 27.45-56; Lk 23.44-49; Jôh 19.28-30)
  '33':
  - type: text
    content: 'Tamin’ny mitataovovonana, dia rakotra haizina ny faritany manontolo, ka naharitra hatramin’ny telo tolakandro izany. '
  '34':
  - type: text
    content: 'Ary tamin’ny telo tolakandro i Jesoa dia niantso tamin’ny feo mahery nanao hoe:'
  - type: text
    content: '–Elôỳ, Elôỳ, lemà sabaktàny? (izany hoe raha adika: «Andriamanitro ô, Andriamanitro ô, nahoana no dia nilaozanao Aho'
  - type: note
    content: Sal 22.2, voatsiahy araka ny fiteny aramianina.
  - type: text
    content: ?»)
  '35':
  - type: text
    content: 'Ny sasany tamin’ireo olona nijanona teo, raha nandre izany, dia niteny hoe:'
  - type: text
    content: '–Indro fa niantso an’i '
  - type: text
    content: Elià
  - type: text
    content: ' ny anao!'
  '36':
  - type: text
    content: Tamin’izay dia nisy olona anankiray nihazakazaka nanatsoboka spaonjy tao anaty vinaingitra; dia notohiziny volotara ilay spaonjy ka natohony an’i Jesoa mba hotsentsefiny
  - type: note
    content: Ampit Sa 69.22.
  - type: text
    content: ', sady hoy izy:'
  - type: text
    content: –Avelao hoe hojerentsika raha ho avy hampidina Azy tokoa i Elià!
  '37':
  - type: text
    content: Fa i Jesoa kosa niantso tamin’ny feo mahery, dia niala aina.
  '38':
  - type: text
    content: 'Ary nitriatra nizara roa hatrany ambony ka hatrany ambany ny efitra lamba tao amin’ny '
  - type: text
    content: Toeramasina
  - type: note
    content: Jereo Eks 26.31-33.
  - type: text
    content: '. '
  '39':
  - type: text
    content: Fa ilay kapiteny nijoro tandrifin’i Jesoa, raha nahita Azy niala aina toy izany
  - type: note
    content: 'niala aina toy izany: misy stf sasany manampy kely hoe niala aina niantso mafy toy izany.'
  - type: text
    content: ', dia loa-bolana hoe:'
  - type: text
    content: –Tena Zanak’Andriamanitra tokoa io Lehilahy io!
  '4':
  - type: text
    content: 'ka nanontany Azy indray i Pilato nanao hoe:'
  - type: text
    content: –Tsy mamaly akory ve Ianao? He ireto zavatra maro iampangany Anao!
  '40':
  - type: text
    content: 'Nisy vehivavy maromaro koa nitazana avy eny lavidavitra teny ka anisan’ireo i Maria avy any Magdalà, sy i Salôme ary i Maria renin-dry i Jakôba kely sy i Jôsèta mirahalahy. '
  '41':
  - type: text
    content: Niaraka tamin’i Jesoa tany Galilea ireo vehivavy ireo, nanampy Azy tamin’izay nilainy; ary nisy vehivavy maro hafa koa izay niara-niakatra tamin’i Jesoa tany Jerosalema.
  - type: heading
    content: Alevina i Jesoa
  - type: heading
    content: (Jereo Mt 27.57-61; Lk 23.50-56; Jôh 19.38-42)
  '42':
  - type: text
    content: Efa hariva ny andro no tonga i Jôsefa avy any amin’ny tanàna atao hoe Harimatia
  - type: note
    content: 'Harimatia: jereo Mt 27.57 sy nta.'
  - type: text
    content: '. Lehilahy manan-kaja tao amin’ny Fitsarana ambony izy sady fatra-piandry ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. Andro fiomanana tamin’io, izany hoe andro mialoha ny '
  - type: text
    content: sabata
  - type: text
    content: '; koa lasa i Jôsefa niditra tamim-pahasahiana tao an-tranon’i '
  - type: text
    content: Pilato
  - type: text
    content: ' ary nangataka ny vatan’i Jesoa. '
  '44':
  - type: text
    content: 'Fa gaga i Pilato raha hoe maty sahady i Jesoa, ka dia nampiantso ny kapiteny ary nanontany azy raha efa ela no nahafatesany. '
  '45':
  - type: text
    content: 'Nony reny ny filàzan’ilay kapiteny, dia navelany homena an’i Jôsefa ny faty. '
  '46':
  - type: text
    content: 'Dia nividy lamba sarobidy i Jôsefa, ary nampidininy avy teo amin’ny hazofijaliana ny vatan’i Jesoa ka nofonosiny lamba sarobidy ary napetrany tao amin’ny fasana nolavahana tamin’ny vatolampy; dia nanakodiavany vato teo amin’ny vavafasana. '
  '47':
  - type: text
    content: Ary nataon’i Maria avy any Magdalà sy i Maria renin’i Jôsèta tsara jery ny toerana nametrahan’i Jôsefa an’i Jesoa.
  '5':
  - type: text
    content: Fa tsy namaly na inona na inona intsony i Jesoa, ka gaga i Pilato.
  - type: heading
    content: Voaheloka ho faty i Jesoa
  - type: heading
    content: (Jereo Mt 27.15-26; Lk 23.13-25; Jôh 18.39–19.16)
  '6':
  - type: text
    content: 'Isaky ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ' dia fombàn’i '
  - type: text
    content: Pilato
  - type: text
    content: ' ny mandefa mpigadra anankiray, izay angatahin’ny olona. '
  '7':
  - type: text
    content: 'Ary nisy lehilahy atao hoe Barabasy, niara-nigadra tamin’ireo mpikomy nahafaty olona tamin’ny fikomiana nataony. '
  '8':
  - type: text
    content: 'Dia niakatra ny vahoaka, nangataka an’i Pilato hanao araka ny fanaony aminy. '
  '9':
  - type: text
    content: 'Fa novalian’i Pilato hoe:'
  - type: text
    content: –Tianareo ve raha ny Mpanjakan’ny Jiosy no alefako ho anareo?
