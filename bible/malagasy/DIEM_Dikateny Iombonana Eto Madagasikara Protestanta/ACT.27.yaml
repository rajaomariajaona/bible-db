document_id: ACT.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alefa any Rôma i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony tapaka fa handeha an-tsambo hankany Italia izahay, dia natolotra an’i Joly, kapiteny avy amin’ny andian-tafika atao hoe «Andian-tafiky ny amperôra», i Paoly sy ny mpifatotra sasany hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny niondrananay dia sambo anankiray avy any Adramita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Adramita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna amorontsirak’i Azia Minôra, akaiky an’i Trôasy.
    marker-yv: yv-n
  - type: text
    text: ' ndeha hitety ireo seranana tamin’ny faritany Azia, ka dia niainga izahay. Tafara-dia taminay i Aristarka, Masedônianina avy any Tesalônika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tonga tany Sidôna izahay ny ampitson’iny. Tsara ny nitondran’i Joly an’i Paoly fa navelany hankany amin’ny sakaizany handray izay zavatra ilainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Avy eo dia lasa indray izahay ka nanara-morona ny nosy Sipra, tamin’ny ilany atsimo izay takon-drivotra, satria nanoha rivotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Namakivaky ny ranomasina tsy lavitra an’i Silisia sy i Pamfilia izahay ka tonga tao Mira any Lisia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tao dia nahita sambo avy any Aleksandria hankany Italia ny kapiteny, ka nafindrany niondrana tamin’io izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nandritra ny andro maromaro, dia nihisatra ny fandehan’ny sambonay ka efa nananosarotra erỳ vao tonga tandrifin’ny tanànan’i Kinido. Tsy navelan’ny rivotra handroso hizotra hatrany intsony anefa izahay, ka nihazo ny tanjona Salmôna, ary dia nanara-morona ny nosy Kreta tamin’ny ilany atsimo izay takon-drivotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nihisatra tokoa ny dia nefa tonga ihany tamin’ny toerana anankiray atao hoe Antseranantsoa, akaikin’ny tanànan’i Lasea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nandany fotoana be tao izahay, ka hanjary hampidi-doza ny dia raha mbola hiroso ihany, satria efa lasa koa ny andro fankalazana ny Famelàn-keloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andro fankalazana ny Famelàn-keloka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: andro fifadian-kanina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (fararano): andro anateran’ny mpisorombe sorona ho fanalana ny fahotan’ny vahoaka Israely (jereo Lev 16.29-34), ka nankalazaina tamin’ny volana septambra na fiandohan’ny ôktôbra. Fotoana efa mety hampidi-doza ny dia an-tsambo amin’izay satria ratsy ny andro.'
    marker-yv: yv-n
  - type: text
    text: '. Izany no nanoroan’i Paoly hevitra amin’ireo mpiantsambo hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '–Hitako, ry sakaiza, fa hampidi-doza ity diantsika ity: tsy ny sambo sy ny entana ihany no hisy fahasimbana sy fatiantoka be, fa ny aintsika koa mety hanaraka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa moa dia naleon’ilay kapiteny nihaino ny hevitry ny mpitondra sambo mbamin’ny tompon-tsambo toy izay ny tenin’i Paoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy tsara hitoerana amin’ny ririnina rahateo koa ny seranan’i Lasea ka tapa-kevitra ny maro fa mety ny miala teo, sao mba hahatratra an’i Feniksa hijanonana mandritra ny ririnina. I Feniksa dia seranana any Kreta izay manatrika mianatsimo andrefana sy mianavaratra andrefana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tafio-drivotra mahery
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nitsoka malefaka ny rivotra avy any atsimo, ka noheverin’izy rehetra fa ho azony tanterahina izay nokasainy. Dia niainga ry zareo ka nizotra nanara-morona an’i Kreta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vetivety foana taorian’izay anefa, dia nifofofofo mafy nidina avy eny amin’ny tendrombohitry ny nosy ny rivo-mahery atao hoe Eorakilôna, avy any avaratra atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voapaokan’ny rivotra ny sambo ka tsy voatana hanoha rivotra intsony, fa dia izay nitondrany anay nitondrany anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nihazo atsimon’ny nosy kely atao hoe Kaoda izahay ka mba takontakon-drivotra. Tafakatra ihany ny salopy na dia nanoin-tsarotra mafy aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Avy nahatafakatra izany ireo matilò, dia namatotra ny sambo tamin’ny mahazaka hanamafisana azy. Natahotra ny hiantefa eny amin’ny fasika mandrevo manamorona an’i Libia ry zareo, ka nampidina ny lay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nampidina ny lay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'mandatsaka ny vatan-kazo mitsinkafona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io vatan-kazo lehibe io dia taritin’ny sambo hiarovana azy tsy havembenan’ny rivotra loatra. Izany ihany koa no kendrena amin’ny fampidinana ny lay.'
    marker-yv: yv-n
  - type: text
    text: ' ary dia namela ny sambo handeha ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mbola nasian’ny rivotra mafy ihany izahay; ka ny ampitson’iny, dia narian’ny matilò tany an-dranomasina ny entana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary ny afakampitso indray, dia ny tanan-dry zareo mihitsy no nanipy ny fitaovan’ny sambo tany ivelany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mandritra ny andro maro, dia tsy masoandro tsy kintana mba hita; ary ny tafio-drivotra moa namely mafy hatrany, ka very fanantenana tanteraka izahay raha ny hoe ho voavonjy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Efa ela tsy nihinan-kanina ireo olona tao an-tsambo. Dia nitsangana teo afovoan’izy rehetra i Paoly ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inay anie ianareo, ry sakaiza, mba nihaino ahy ihany ka tsy niala tao Kreta, dia tsy ho niharan’izao fahasimbana sy fatiantoka izao isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanefa izao no hevitra atoroko anareo: mahereza tsara, fa tsy misy ho faty tsy akory ianareo, fa ny sambo no hany ho very. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Halina manko dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ilay Andriamanitra Tompoko sady ivavahako tonga tamiko '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary nanao hoe: «Aza matahotra, ry Paoly, fa tsy maintsy hanatrika ny amperôra rômanina ianao. Ary Andriamanitra, noho ny fitiavany anao, dia hamonjy ny ain’ireto olona rehetra miray sambo aminao.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa noho izany, mahereza tsara, ry sakaiza, fa itokiako Andriamanitra; tsy ho raraka an-tany izay voalazany tamiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nefa tsy maintsy ho fefika ihany eo amin’ny nosy anankiray isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny alina faha-14, dia mbola navezivezin’ny rivotra tamin’ny ranomasina Mediteranea izahay. Nony tamin’ny sasakalina, dia nataon’ny matilò fa nanakaiky tany izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nanaka-drano tamin’ny tady lava ifatorana fonjam-by ry zareo ka nahita fa 37 metatra ny halalin’ny rano; ary nony nandrosoroso kokoa, dia nanaka-drano indray ny matilò, ka nahita fa 28 metatra ny halalin’ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Natahotra ry zareo fandrao midona amin’ny harambato ny sambonay, ka dia nandatsaka ny vatofantsika efatra teo am-bodisambo sady nirary mafy ny haharaina ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nitady handositra hiala teo amin’ny sambo ny matilò ka efa nampidina ny salopy ho eo amin’ny ranomasina, mody hoe handatsaka vatofantsika ao an-dohasambo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Kanefa hoy i Paoly tamin’ilay kapiteny rômanina sy ireo miaramila hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tsy mitoetra eto an-tsambo ireo olona ireo, dia tsy ho voavonjy ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tamin’izay dia notapahin’ny miaramila ny mahazaka nitana ny salopy ka navelany handeha fotsiny any ilay salopy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa hadiva haraina ny andro, dia niangavian’i Paoly izy rehetra mba hihinan-kanina ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Faha-14 andro niandrasanareo anio ary niaritra hanoanana tsy nihinan-kanina mihitsy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Koa miangavy anareo aho hihinan-kanina, fa isan’ny hamonjena anareo izany. Tsy ho very na dia singam-bolo ao an-dohany aza aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nony avy nilaza izany teny izany i Paoly, dia nandray mofo sy nisaotra an’Andriamanitra ary nanapaka ny mofo teo anatrehan’izy rehetra ka nihinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia nahazo toky indray izy rehetra ka nihinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Niisa 276
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.37 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: '276: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 275;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy koa stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sahabo ho 76.
    marker-yv: yv-n
  - type: text
    text: 'izahay rehetra tao an-tsambo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary nony samy voky izy rehetra, dia navarina tany an-dranomasina avokoa ny vary mba hahamaivana ny sambo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vaky ny sambo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary nony nazava ratsy ny andro, dia tsy fantatry ny matilò izay tany teo; fa helodrano iray misy torapasika no hitany ka dia nokasainy hampiantsonina teo ny sambo raha azo atao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nesorin’ireo matilò avokoa ny vatofantsika ary nalefany ho any an-dranomasina; novahany koa ny mahazakan’ny fanamoriana ary novelariny ny lay anoloana ho azon’ny rivotra. Dia nizotra nanatona ny torapasika ry zareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: kanjo mby teo amin’ny andilantany anankiray, ka dia niantsona teo ny sambo. Revo tao amin’ny fasika ny lohasambo ka nihizina teo, tsy nahahetsika; ary ny vodisambo kosa dia vaky azon’ny herin’ny onja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Saika hamono ny mpifatotra ireto miaramila fandrao hisy handositra hilomano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Kanefa te hamonjy an’i Paoly ilay kapiteny rômanina ka nisakana ny miaramila mba tsy hanao izany. Nomeny baiko izay miaramila mahery milomano hirotsaka anaty rano voalohany hankeny an-tanety; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: dia nanaraka ny sisa, samy nanao izay hahafaka azy na amina hazo fisaka na amin-javatra hafa teo amin’ny sambo. Ka dia toy izany no nahatafita ny olona rehetra soa aman-tsara teny an-tanety.
