document_id: ACT.27,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Alefa any Rôma i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tapaka fa handeha an-tsambo hankany Italia izahay, dia natolotra an’i Joly, kapiteny avy amin’ny andian-tafika atao hoe «Andian-tafiky ny amperôra», i Paoly sy ny mpifatotra sasany hafa. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hitako, ry sakaiza, fa hampidi-doza ity diantsika ity: tsy ny sambo sy ny entana ihany no hisy fahasimbana sy fatiantoka be, fa ny aintsika koa mety hanaraka.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa moa dia naleon’ilay kapiteny nihaino ny hevitry ny mpitondra sambo mbamin’ny tompon-tsambo toy izay ny tenin’i Paoly. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy tsara hitoerana amin’ny ririnina rahateo koa ny seranan’i Lasea ka tapa-kevitra ny maro fa mety ny miala teo, sao mba hahatratra an’i Feniksa hijanonana mandritra ny ririnina. I Feniksa dia seranana any Kreta izay manatrika mianatsimo andrefana sy mianavaratra andrefana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tafio-drivotra mahery
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitsoka malefaka ny rivotra avy any atsimo, ka noheverin’izy rehetra fa ho azony tanterahina izay nokasainy. Dia niainga ry zareo ka nizotra nanara-morona an’i Kreta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vetivety foana taorian’izay anefa, dia nifofofofo mafy nidina avy eny amin’ny tendrombohitry ny nosy ny rivo-mahery atao hoe Eorakilôna, avy any avaratra atsinanana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voapaokan’ny rivotra ny sambo ka tsy voatana hanoha rivotra intsony, fa dia izay nitondrany anay nitondrany anay. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nihazo atsimon’ny nosy kely atao hoe Kaoda izahay ka mba takontakon-drivotra. Tafakatra ihany ny salopy na dia nanoin-tsarotra mafy aza. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy nahatafakatra izany ireo matilò, dia namatotra ny sambo tamin’ny mahazaka hanamafisana azy. Natahotra ny hiantefa eny amin’ny fasika mandrevo manamorona an’i Libia ry zareo, ka nampidina ny lay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nampidina ny lay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'mandatsaka ny vatan-kazo mitsinkafona:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' io vatan-kazo lehibe io dia taritin’ny sambo hiarovana azy tsy havembenan’ny rivotra loatra. Izany ihany koa no kendrena amin’ny fampidinana ny lay.'
      marker-yv: yv-n
    - type: text
      text: ' ary dia namela ny sambo handeha ho azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola nasian’ny rivotra mafy ihany izahay; ka ny ampitson’iny, dia narian’ny matilò tany an-dranomasina ny entana; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny afakampitso indray, dia ny tanan-dry zareo mihitsy no nanipy ny fitaovan’ny sambo tany ivelany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny niondrananay dia sambo anankiray avy any Adramita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Adramita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna amorontsirak’i Azia Minôra, akaiky an’i Trôasy.
      marker-yv: yv-n
    - type: text
      text: ' ndeha hitety ireo seranana tamin’ny faritany Azia, ka dia niainga izahay. Tafara-dia taminay i Aristarka, Masedônianina avy any Tesalônika. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandritra ny andro maro, dia tsy masoandro tsy kintana mba hita; ary ny tafio-drivotra moa namely mafy hatrany, ka very fanantenana tanteraka izahay raha ny hoe ho voavonjy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa ela tsy nihinan-kanina ireo olona tao an-tsambo. Dia nitsangana teo afovoan’izy rehetra i Paoly ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inay anie ianareo, ry sakaiza, mba nihaino ahy ihany ka tsy niala tao Kreta, dia tsy ho niharan’izao fahasimbana sy fatiantoka izao isika. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Kanefa izao no hevitra atoroko anareo: mahereza tsara, fa tsy misy ho faty tsy akory ianareo, fa ny sambo no hany ho very. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Halina manko dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeli
    - type: text
      text: 'n’ilay Andriamanitra Tompoko sady ivavahako tonga tamiko '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary nanao hoe: «Aza matahotra, ry Paoly, fa tsy maintsy hanatrika ny amperôra rômanina ianao. Ary Andriamanitra, noho ny fitiavany anao, dia hamonjy ny ain’ireto olona rehetra miray sambo aminao.» '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa noho izany, mahereza tsara, ry sakaiza, fa itokiako Andriamanitra; tsy ho raraka an-tany izay voalazany tamiko. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nefa tsy maintsy ho fefika ihany eo amin’ny nosy anankiray isika.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny alina faha-14, dia mbola navezivezin’ny rivotra tamin’ny ranomasina Mediteranea izahay. Nony tamin’ny sasakalina, dia nataon’ny matilò fa nanakaiky tany izahay. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanaka-drano tamin’ny tady lava ifatorana fonjam-by ry zareo ka nahita fa 37 metatra ny halalin’ny rano; ary nony nandrosoroso kokoa, dia nanaka-drano indray ny matilò, ka nahita fa 28 metatra ny halalin’ny rano. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natahotra ry zareo fandrao midona amin’ny harambato ny sambonay, ka dia nandatsaka ny vatofantsika efatra teo am-bodisambo sady nirary mafy ny haharaina ny andro. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga tany Sidôna izahay ny ampitson’iny. Tsara ny nitondran’i Joly an’i Paoly fa navelany hankany amin’ny sakaizany handray izay zavatra ilainy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitady handositra hiala teo amin’ny sambo ny matilò ka efa nampidina ny salopy ho eo amin’ny ranomasina, mody hoe handatsaka vatofantsika ao an-dohasambo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa hoy i Paoly tamin’ilay kapiteny rômanina sy ireo miaramila hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha tsy mitoetra eto an-tsambo ireo olona ireo, dia tsy ho voavonjy ianareo.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay dia notapahin’ny miaramila ny mahazaka nitana ny salopy ka navelany handeha fotsiny any ilay salopy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hadiva haraina ny andro, dia niangavian’i Paoly izy rehetra mba hihinan-kanina ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Faha-14 andro niandrasanareo anio ary niaritra hanoanana tsy nihinan-kanina mihitsy ianareo. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa miangavy anareo aho hihinan-kanina, fa isan’ny hamonjena anareo izany. Tsy ho very na dia singam-bolo ao an-dohany aza aminareo.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony avy nilaza izany teny izany i Paoly, dia nandray mofo sy nisaotra an’Andriamanitra ary nanapaka ny mofo teo anatrehan’izy rehetra ka nihinana. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nahazo toky indray izy rehetra ka nihinana. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niisa 276
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.37 '
      - type: usfm
