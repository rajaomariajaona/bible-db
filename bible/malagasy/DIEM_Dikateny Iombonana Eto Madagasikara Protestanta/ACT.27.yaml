          text: sahabo ho 76.
      marker-yv: yv-n
    - type: text
      text: 'izahay rehetra tao an-tsambo. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony samy voky izy rehetra, dia navarina tany an-dranomasina avokoa ny vary mba hahamaivana ny sambo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vaky ny sambo
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nazava ratsy ny andro, dia tsy fantatry ny matilò izay tany teo; fa helodrano iray misy torapasika no hitany ka dia nokasainy hampiantsonina teo ny sambo raha azo atao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia lasa indray izahay ka nanara-morona ny nosy Sipra, tamin’ny ilany atsimo izay takon-drivotra, satria nanoha rivotra. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nesorin’ireo matilò avokoa ny vatofantsika ary nalefany ho any an-dranomasina; novahany koa ny mahazakan’ny fanamoriana ary novelariny ny lay anoloana ho azon’ny rivotra. Dia nizotra nanatona ny torapasika ry zareo, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: kanjo mby teo amin’ny andilantany anankiray, ka dia niantsona teo ny sambo. Revo tao amin’ny fasika ny lohasambo ka nihizina teo, tsy nahahetsika; ary ny vodisambo kosa dia vaky azon’ny herin’ny onja.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saika hamono ny mpifatotra ireto miaramila fandrao hisy handositra hilomano. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa te hamonjy an’i Paoly ilay kapiteny rômanina ka nisakana ny miaramila mba tsy hanao izany. Nomeny baiko izay miaramila mahery milomano hirotsaka anaty rano voalohany hankeny an-tanety; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nanaraka ny sisa, samy nanao izay hahafaka azy na amina hazo fisaka na amin-javatra hafa teo amin’ny sambo. Ka dia toy izany no nahatafita ny olona rehetra soa aman-tsara teny an-tanety.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namakivaky ny ranomasina tsy lavitra an’i Silisia sy i Pamfilia izahay ka tonga tao Mira any Lisia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tao dia nahita sambo avy any Aleksandria hankany Italia ny kapiteny, ka nafindrany niondrana tamin’io izahay.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandritra ny andro maromaro, dia nihisatra ny fandehan’ny sambonay ka efa nananosarotra erỳ vao tonga tandrifin’ny tanànan’i Kinido. Tsy navelan’ny rivotra handroso hizotra hatrany intsony anefa izahay, ka nihazo ny tanjona Salmôna, ary dia nanara-morona ny nosy Kreta tamin’ny ilany atsimo izay takon-drivotra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nihisatra tokoa ny dia nefa tonga ihany tamin’ny toerana anankiray atao hoe Antseranantsoa, akaikin’ny tanànan’i Lasea.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nandany fotoana be tao izahay, ka hanjary hampidi-doza ny dia raha mbola hiroso ihany, satria efa lasa koa ny andro fankalazana ny Famelàn-keloka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'andro fankalazana ny Famelàn-keloka '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: andro fifadian-kanina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (fararano): andro anateran’ny mpisorombe sorona ho fanalana ny fahotan’ny vahoaka Israely (jereo Lev 16.29-34), ka nankalazaina tamin’ny volana septambra na fiandohan’ny ôktôbra. Fotoana efa mety hampidi-doza ny dia an-tsambo amin’izay satria ratsy ny andro.'
      marker-yv: yv-n
    - type: text
      text: '. Izany no nanoroan’i Paoly hevitra amin’ireo mpiantsambo hoe:'
