verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: '–Ny tononkalo dimy amin’ity boky kely ity (izay lazain’ny lovantsofina fa an’i Jeremià) dia zavatra iray ihany no foto-dresany: ny faharavàn’i Jerosalema noho ny famelezana nataon’ny tafika babilônianina tamin’ny taona 587 tal J.K.. Izany loza izany no manamarika ny faran’ny fanjakana Joda amin’ny maha fanjakana mahaleotena azy. Nefa koa izany loza izany dia toa mampandainga ny teny fampanantenana natao tamin’i Davida fahiny hoe: «Hisy anankiray amin’ny taranakao hanjaka handimby anao hatrany hatrany, satria tsy ho voahozongozona ny fahefà-mpanjaka ao amin’ny fianakavianao.» (2 Sam 7.16).'
  - type: text
    content: 'Ireo olona sisa velona tamin’izany antambo izany dia mamerina mitadidy ireo zava-nitranga nahatsiravina izay nolalovany ary miezaka hahatakatra ny heviny: Iza no tompon’andraikitra tamin’ireny zava-doza ireny? Moa tsy nitondra tena tahaka ny fahavalon’ny vahoakany tokoa ve ny Tompo? Kanefa miaiky hadisoana ireo resy sady mahatsiaro fa «tsy ritra ny mari-pitiavan’ny Tompo» sady «fatratra ny toetrany mahatoky» (Fit 3.22-23). Koa eo no mitoetra ny loharanon’ny fanantenany na dia miharihary aza ny fahavoazana.'
