document_id: 1SA.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Misaotra ny Tompo i Hanà
  - type: text
    content: 'Ary i Hanà nanao tonom-bavaka toy izao:'
  - type: text
    content: Feno hafaliana ny foko noho ny amin’ny TOMPO;
  - type: text
    content: mitraka koa ny lohako noho ny aminy.
  - type: text
    content: ary ihomehezako ny fahavaloko.
  - type: text
    content: Faly aho satria novonjen’ny TOMPO;
  '10':
  - type: text
    content: Homontsanin’ny TOMPO ireo fahavalony;
  - type: text
    content: fa kotrokorana avy any an-
  - type: text
    content: danitra
  - type: text
    content: no indro hamelezany azy ireny,
  - type: text
    content: satria IZY no hitsara ny tany tontolo.
  - type: text
    content: Hanome hery ny mpanjakan’ny vahoakany Izy
  - type: text
    content: ary hampitombo fahefana an’ilay Mesiany
  - type: note
    content: 'And 1-10: ampit Lk 1.46-55.'
  - type: text
    content: .
  '11':
  - type: text
    content: Taorian’izany dia nody tany Ramà i Elkanà, fa i Samoela kely kosa nijanona tao Silao mba hanompo ny TOMPO teo anatrehan’i Helỳ mpisorona.
  - type: heading
    content: Ireo zanakalahin’i Helỳ
  '12':
  - type: text
    content: 'Ireo zanakalahin’i Helỳ dia olona ratsy fanahy tsy mba niraharaha akory ny TOMPO. '
  '13':
  - type: text
    content: 'Fa na dia mpisorona aza izy roa lahy, dia izao no fanaony tamin’ny vahoaka: raha nisy olona nanao '
  - type: text
    content: sorona
  - type: text
    content: ', dia avy ny mpanampy ny mpisorona ka manatona ny hena handroina, miaraka amin’ny fitrebika telo rantsana eny an-tanany; '
  '14':
  - type: text
    content: dia atsobony ao anaty vilany na saba ny nongo fahandroan-kena, ka izay rehetra azon’ny fitrebika dia alain’ny mpisorona ho azy. Ary izany no fanaon’ireo zanakalahin’i Helỳ tamin’ny Israelita rehetra izay tonga tao Silao.
  '15':
  - type: text
    content: Afa-tsy izany, raha tsy mbola voadoro ny tavin-kena
  - type: note
    content: Ny Lev 3 dia mamepetra ny handorana ireo jaboran’ny biby atao sorom-pihavanana raha vao voavono izy. Lehibe tokoa ny hadisoan’ireo zanakalahin’i Helỳ satria mitaky ny homena anjara alohan’ny Tompo izy roalahy.
  - type: text
    content: ', dia tonga ny mpanampy ny mpisorona ka milaza amin’ilay mpanao sorona hoe: «Omeo hena hatsatsika aho ho an’ny mpisorona; fa tsy hekeny ny hena masaka avy aminao, fa ny manta ihany.» '
  '16':
  - type: text
    content: 'Ary raha misy manao aminy hoe: «Aoka aloha hodorana ny taviny; izay ianao vao maka izay tianao», dia hoy ilay mpanampy ny mpisorona aminy: «Tsia, omeo ahy izao ankehitriny izao ihany; fa raha tsy izany, dia halaiko an-keriny.» '
  '17':
  - type: text
    content: Ka tena lehibe dia lehibe teo imason’ny TOMPO ny fahotan’ireo zanakalahin’i Helỳ, satria notsiratsirain’izy roa lahy ny sorona naterina ho AZY.
  '18':
  - type: text
    content: Fa i Samoela kely kosa nisalotra efôda rongony ka nanatanteraka ny fanompoam-pivavahana teo anatrehan’ny TOMPO.
  - type: heading
    content: Ny fianakavian’i Samoela
  '19':
  - type: text
    content: 'Isan-taona ny renin’i Samoela dia nanjaitra akanjo kely izay fentiny ho an-janany rehefa niaraka tamin’ny vadiny nankany Silao hanatitra ny '
  - type: text
    content: sorona
  - type: text
    content: ' fanao isan-taona izy. '
  '2':
  - type: text
    content: tsy misy masina tahaka AZY,
  - type: text
    content: ary tsy misy vatolampy
  - type: text
    content: tahaka an’Andriamanitsika.
  - type: text
    content: Eny, Izy irery ihany no TOMPO.
  '20':
  - type: text
    content: Nitsodrano
  - type: text
    content: ' an’i Elkanà mivady i Helỳ, ka hoy izy tamin’ny lahy:'
  - type: text
    content: –Ny TOMPO anie hanome taranaka anao avy amin’ity vehivavy ity, ho solon’ilay efa nomeny AZY!
  - type: text
    content: Dia lasa niverina nody izy mivady.
  '21':
  - type: text
    content: Ary notahin’ny TOMPO i Hanà, dia nanan-janaka ary niteraka lahy telo sy vavy roa.
  - type: text
    content: Fa i Samoela kosa tamin’izay dia nitombo teo anatrehan’ny TOMPO.
  - type: heading
    content: I Helỳ manakiana ireo zanany
  '22':
  - type: text
    content: 'Ary efa tena antitra be i Helỳ. Rehefa reny avokoa izay nataon-janany tamin’ny Israelita, indrindra fa ny nandriany tamin’ireo vehivavy niasa teo amin’ny fidirana ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' amin’Andriamanitra, '
  '23':
  - type: text
    content: 'dia hoy izy tamin-janany:'
  - type: text
    content: '–Nahoana ianareo no manao izany zavatra izany? Reko tamin’olona avokoa ange ny fitondrantena ratsy ataonareo. '
  '24':
  - type: text
    content: 'Atsaharonareo izany, rey anaka, fa tsy tsara mihitsy izay reko momba anareo amin’ny vahoakan’ny TOMPO. '
  '25':
  - type: text
    content: Raha diso amin’ny olona toa azy ny olona iray, dia Andriamanitra no hitsara ny adiny; fa raha diso amin’ny TOMPO kosa ny olona iray, dia mba iza àry no hitsara?
  - type: text
    content: Tsy noraharahain’izy ireo anefa izany tenin-drainy izany, satria efa sitraky ny TOMPO rahateo ny hahafaty azy.
  '26':
  - type: text
    content: Ary nitombo tena i Samoela kely sady nandroso nahatehotia tamin’ny TOMPO sy ny olona.
  - type: heading
    content: Ny famaizana an’i Helỳ sy ny fianakaviany
  '27':
  - type: text
    content: 'Ary tonga tao amin’i Helỳ ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' iray ka nanao taminy hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Raha mbola nandevozin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' tany Ejipta ny razanao, dia fantatrao tsara ny efa nisehoako taminy: '
  '28':
  - type: text
    content: 'eny, tamin’ny fokon’i Israely rehetra, dia ny razambenao Aharôna no nofidiko ho mpisoroko, hitondra ny '
  - type: text
    content: sorona
  - type: text
    content: ' eo amin’ny '
  - type: text
    content: alitarako
  - type: text
    content: ' ary handoro vovo-javamanitra ary hisalotra efôda hanontaniana Ahy. I Aharôna sy ny taranany aza dia nomeko anjara tamin’ny sorona naterin’ny Israelita'
  - type: note
    content: Jereo Eks 28.1; Lev 7.35-36.
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Koa nahoana no hitsakitsahinareo ny sorona sy ny fanatitra izay nodidiako hatao ao amin’ny Toeramasina fonenako. Ary nahoana ny zanakao indray no omenao voninahitra mihoatra noho Izaho, satria ianareo mampahatavy ny tenanareo amin’izay tsara indrindra amin’ny fanatitra rehetra ataon’ny Israelita vahoakako. '
  '3':
  - type: text
    content: Atsaharo ny teny an’avona
  - type: text
    content: sy ny vava tsy ambina rehetra,
  - type: text
    content: fa Andriamanitra mahalala
  - type: text
    content: ny zava-drehetra ny TOMPO;
  - type: text
    content: Izy no mitsara ny ataon’ny olona.
  '30':
  - type: text
    content: 'Noho izany, ny TOMPO Andriamanitr’i Israely dia miteny hentitra hoe: Efa nampanantenaiko fa ny fianakavianao sy ny tera-drainao no ho mpisoroko mandrakizay; nefa ankehitriny dia laviko tanteraka, teny hentitra avy amiko izany; fa izay manome voninahitra Ahy no homeko voninahitra, ary izay manimbazimba Ahy no ho afa-baràka. '
  '31':
  - type: text
    content: 'Eny, avy ny fotoana izay handringanako ny matanjaka eo amin’ny fianakavianao sy eo amin’ny tera-drainao, ka tsy hisy lahy ho tratra antitra intsony aminareo. '
  '32':
  - type: text
    content: 'Hahita mpandrafy hanao fandraharahana ao amin’ny Toeramasina fonenako ianao ary koa hahita ny soa rehetra hataony amin’i Israely; fa ny taranakao sisa rehetra kosa tsy hisy lahy ho tratra antitra intsony. '
  '33':
  - type: text
    content: Nefa dia hotanako ihany ny iray amin’ny taranakao ho eo anilan’ny alitarako mba hokikisan’ny fialonana sy ny fahoriam-panahy izy; fa ny sisa rehetra kosa dia ho faty tanora.
  '34':
  - type: text
    content: '«Ary ho porofon’ny teny voalazako taminao izay hanjo ny zanakao roa lahy, dia i Hôfnỳ sy i Pinehasa izany: andro iray ihany no hahafatesan’izy mirahalahy. '
  '35':
  - type: text
    content: 'Avy eo Aho dia hifidy mpisorona iray mahatoky ho Ahy, mpisorona izay hiasa araka ny sitrapoko; ary homeko taranaka izy mba ho mpisorona mifandimby tsy an-kijanona, eo anatrehan’ny mpanjaka voahosotro. '
  '36':
  - type: text
    content: 'Ary izay sisa amin’ny fianakavianao dia handohalika eo anatrehan’ny mpisorona mba hahazo vola kely sy tapa-mofo, ka hanao aminy hoe: ‹Mba miangavy re, tompoko, omeo izay asa azoko anampiana ny mpisorona aho, mba sitrany ahay mofokely hohaniko›.»'
  '4':
  - type: text
    content: Tapaka ny tsipîkan’ny mahery fo
  - type: text
    content: fa ny osa kosa efa mihamatanjaka.
  '5':
  - type: text
    content: Mikarama hahazoana mofo ireo voky taloha,
  - type: text
    content: fa ny noana kosa efa manan-kohanina.
  - type: text
    content: Impito niteraka ny vehivavy momba,
  - type: text
    content: fa ireo mpiteraka kosa nitsaha-jaza.
  '6':
  - type: text
    content: Ny TOMPO no mahafaty sy mahavelona;
  - type: text
    content: mampidina ny olona any amin’ny toeran’ny maty Izy
  - type: text
    content: sady manala azy avy any ihany koa.
  '7':
  - type: text
    content: Ny TOMPO no mampahantra sy mampanan-karena;
  - type: text
    content: mampietry ny olona Izy nefa koa manandratra azy.
  '8':
  - type: text
    content: Izy no manarina ny fadiranovana hiala amin’ny vovoka
  - type: text
    content: ary mampitsangana ny mahantra hiala amin’ny fako
  - type: text
    content: mba hanome azy toeram-boninahitra
  - type: text
    content: ka hampitoetra azy miaraka amin’ny mpitondra.
  - type: text
    content: Fa an’ny TOMPO ny tany tontolo
  - type: text
    content: satria Izy no nametraka azy
  - type: text
    content: eo amin’ny andry fiorenany.
  '9':
  - type: text
    content: Tsinjoviny ny fiainan’ireo mpivavaka aminy,
  - type: text
    content: fa ny olon-dratsy kosa hovereziny any amin’ny haizina;
  - type: text
    content: satria tsy amin’ny herin’ny tenany
  - type: text
    content: no hahazoan’ny olona fandresena.
