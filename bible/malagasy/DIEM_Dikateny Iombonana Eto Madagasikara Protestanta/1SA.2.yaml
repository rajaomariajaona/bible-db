document_id: 1SA.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misaotra ny Tompo i Hanà
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary i Hanà nanao tonom-bavaka toy izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feno hafaliana ny foko noho ny amin’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitraka koa ny lohako noho ny aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ihomehezako ny fahavaloko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faly aho satria novonjen’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: tsy misy masina tahaka AZY,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy vatolampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka an’Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Izy irery ihany no TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Atsaharo ny teny an’avona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny vava tsy ambina rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra mahalala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zava-drehetra ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no mitsara ny ataon’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tapaka ny tsipîkan’ny mahery fo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny osa kosa efa mihamatanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mikarama hahazoana mofo ireo voky taloha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny noana kosa efa manan-kohanina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Impito niteraka ny vehivavy momba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ireo mpiteraka kosa nitsaha-jaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny TOMPO no mahafaty sy mahavelona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampidina ny olona any amin’ny toeran’ny maty Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manala azy avy any ihany koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny TOMPO no mampahantra sy mampanan-karena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampietry ny olona Izy nefa koa manandratra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izy no manarina ny fadiranovana hiala amin’ny vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampitsangana ny mahantra hiala amin’ny fako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanome azy toeram-boninahitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampitoetra azy miaraka amin’ny mpitondra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa an’ny TOMPO ny tany tontolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izy no nametraka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny andry fiorenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsinjoviny ny fiainan’ireo mpivavaka aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-dratsy kosa hovereziny any amin’ny haizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy amin’ny herin’ny tenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hahazoan’ny olona fandresena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Homontsanin’ny TOMPO ireo fahavalony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa kotrokorana avy any an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: danitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no indro hamelezany azy ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria IZY no hitsara ny tany tontolo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanome hery ny mpanjakan’ny vahoakany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampitombo fahefana an’ilay Mesiany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 1-10:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Lk 1.46-55.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Taorian’izany dia nody tany Ramà i Elkanà, fa i Samoela kely kosa nijanona tao Silao mba hanompo ny TOMPO teo anatrehan’i Helỳ mpisorona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo zanakalahin’i Helỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireo zanakalahin’i Helỳ dia olona ratsy fanahy tsy mba niraharaha akory ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa na dia mpisorona aza izy roa lahy, dia izao no fanaony tamin’ny vahoaka: raha nisy olona nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ', dia avy ny mpanampy ny mpisorona ka manatona ny hena handroina, miaraka amin’ny fitrebika telo rantsana eny an-tanany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia atsobony ao anaty vilany na saba ny nongo fahandroan-kena, ka izay rehetra azon’ny fitrebika dia alain’ny mpisorona ho azy. Ary izany no fanaon’ireo zanakalahin’i Helỳ tamin’ny Israelita rehetra izay tonga tao Silao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Afa-tsy izany, raha tsy mbola voadoro ny tavin-kena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny Lev 3 dia mamepetra ny handorana ireo jaboran’ny biby atao sorom-pihavanana raha vao voavono izy. Lehibe tokoa ny hadisoan’ireo zanakalahin’i Helỳ satria mitaky ny homena anjara alohan’ny Tompo izy roalahy.
    marker-yv: yv-n
  - type: text
    text: ', dia tonga ny mpanampy ny mpisorona ka milaza amin’ilay mpanao sorona hoe: «Omeo hena hatsatsika aho ho an’ny mpisorona; fa tsy hekeny ny hena masaka avy aminao, fa ny manta ihany.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha misy manao aminy hoe: «Aoka aloha hodorana ny taviny; izay ianao vao maka izay tianao», dia hoy ilay mpanampy ny mpisorona aminy: «Tsia, omeo ahy izao ankehitriny izao ihany; fa raha tsy izany, dia halaiko an-keriny.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ka tena lehibe dia lehibe teo imason’ny TOMPO ny fahotan’ireo zanakalahin’i Helỳ, satria notsiratsirain’izy roa lahy ny sorona naterina ho AZY.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa i Samoela kely kosa nisalotra efôda rongony ka nanatanteraka ny fanompoam-pivavahana teo anatrehan’ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fianakavian’i Samoela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Isan-taona ny renin’i Samoela dia nanjaitra akanjo kely izay fentiny ho an-janany rehefa niaraka tamin’ny vadiny nankany Silao hanatitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanao isan-taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Nitsodrano
  - type: text
    text: ' an’i Elkanà mivady i Helỳ, ka hoy izy tamin’ny lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny TOMPO anie hanome taranaka anao avy amin’ity vehivavy ity, ho solon’ilay efa nomeny AZY!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia lasa niverina nody izy mivady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary notahin’ny TOMPO i Hanà, dia nanan-janaka ary niteraka lahy telo sy vavy roa.
- type: usfm
  marker: p
  children:
  - type: text
    text: Fa i Samoela kosa tamin’izay dia nitombo teo anatrehan’ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Helỳ manakiana ireo zanany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary efa tena antitra be i Helỳ. Rehefa reny avokoa izay nataon-janany tamin’ny Israelita, indrindra fa ny nandriany tamin’ireo vehivavy niasa teo amin’ny fidirana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' amin’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia hoy izy tamin-janany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana ianareo no manao izany zavatra izany? Reko tamin’olona avokoa ange ny fitondrantena ratsy ataonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Atsaharonareo izany, rey anaka, fa tsy tsara mihitsy izay reko momba anareo amin’ny vahoakan’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Raha diso amin’ny olona toa azy ny olona iray, dia Andriamanitra no hitsara ny adiny; fa raha diso amin’ny TOMPO kosa ny olona iray, dia mba iza àry no hitsara?
- type: usfm
  marker: p
  children:
  - type: text
    text: Tsy noraharahain’izy ireo anefa izany tenin-drainy izany, satria efa sitraky ny TOMPO rahateo ny hahafaty azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary nitombo tena i Samoela kely sady nandroso nahatehotia tamin’ny TOMPO sy ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana an’i Helỳ sy ny fianakaviany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary tonga tao amin’i Helỳ ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' iray ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO: «Raha mbola nandevozin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' tany Ejipta ny razanao, dia fantatrao tsara ny efa nisehoako taminy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'eny, tamin’ny fokon’i Israely rehetra, dia ny razambenao Aharôna no nofidiko ho mpisoroko, hitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitarako
  - type: text
    text: ' ary handoro vovo-javamanitra ary hisalotra efôda hanontaniana Ahy. I Aharôna sy ny taranany aza dia nomeko anjara tamin’ny sorona naterin’ny Israelita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 28.1; Lev 7.35-36.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa nahoana no hitsakitsahinareo ny sorona sy ny fanatitra izay nodidiako hatao ao amin’ny Toeramasina fonenako. Ary nahoana ny zanakao indray no omenao voninahitra mihoatra noho Izaho, satria ianareo mampahatavy ny tenanareo amin’izay tsara indrindra amin’ny fanatitra rehetra ataon’ny Israelita vahoakako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Noho izany, ny TOMPO Andriamanitr’i Israely dia miteny hentitra hoe: Efa nampanantenaiko fa ny fianakavianao sy ny tera-drainao no ho mpisoroko mandrakizay; nefa ankehitriny dia laviko tanteraka, teny hentitra avy amiko izany; fa izay manome voninahitra Ahy no homeko voninahitra, ary izay manimbazimba Ahy no ho afa-baràka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Eny, avy ny fotoana izay handringanako ny matanjaka eo amin’ny fianakavianao sy eo amin’ny tera-drainao, ka tsy hisy lahy ho tratra antitra intsony aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hahita mpandrafy hanao fandraharahana ao amin’ny Toeramasina fonenako ianao ary koa hahita ny soa rehetra hataony amin’i Israely; fa ny taranakao sisa rehetra kosa tsy hisy lahy ho tratra antitra intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nefa dia hotanako ihany ny iray amin’ny taranakao ho eo anilan’ny alitarako mba hokikisan’ny fialonana sy ny fahoriam-panahy izy; fa ny sisa rehetra kosa dia ho faty tanora.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '«Ary ho porofon’ny teny voalazako taminao izay hanjo ny zanakao roa lahy, dia i Hôfnỳ sy i Pinehasa izany: andro iray ihany no hahafatesan’izy mirahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Avy eo Aho dia hifidy mpisorona iray mahatoky ho Ahy, mpisorona izay hiasa araka ny sitrapoko; ary homeko taranaka izy mba ho mpisorona mifandimby tsy an-kijanona, eo anatrehan’ny mpanjaka voahosotro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary izay sisa amin’ny fianakavianao dia handohalika eo anatrehan’ny mpisorona mba hahazo vola kely sy tapa-mofo, ka hanao aminy hoe: ‹Mba miangavy re, tompoko, omeo izay asa azoko anampiana ny mpisorona aho, mba sitrany ahay mofokely hohaniko›.»'
