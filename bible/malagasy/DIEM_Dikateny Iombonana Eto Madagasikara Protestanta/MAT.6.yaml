  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Eny, raha mamela ny fahadisoan’ny olona ianareo, dia mba hamela anareo koa ny Rainareo Izay any an-danitra; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: fa raha tsy mamela ny olona kosa ianareo, dia mba tsy hamela ny fahadisoanareo koa ny Rainareo Izay any an-danitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mila dera amin’olombelona raha mifady hanina
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '–Rehefa mifady hanina ianareo, aza mba manahaka ny mpihatsaravelatsihy ka malahelo endrika. Ataon-dry zareo manjonitra ny tarehiny mba hahitan’ny olona azy hoe mifady hanina. Lazaiko marina aminareo fa efa azony ny valisoany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ianao kosa, rehefa mifady hanina, dia sasao ny tavanao ary amboary tsara ny volonao, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: hany ka tsy ny olona no hahita anao hoe mifady hanina fa ny Rainao Izay ao amin’ny miafina; ary ny Rainao Izay mahita ao amin’ny miafina no hamaly soa anao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahaiza mihary harena any an-danitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 12.33-34)
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '–Aza mangorona harena ho anareo etỳ an-tany, izay misy kadradraka sy harafesina manimba, sady misy mpangalatra mamaky trano sy mangalatra; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Koa rehefa manao fiantrana ianao, aza dia antsoantsoina ho ren’ny tany ama-monina, sahala amin’ny fanaon’ny mpihatsaravelatsihy any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' sy eny an-dalambe, mba hankalazan’ny olona azy. Lazaiko marina aminareo fa efa azony ny valisoany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'fa manangòna harena ho anareo any an-danitra, izay tsy misy kadradraka na harafesina manimba sady tsy misy mpangalatra mamaky trano na mangalatra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa izay misy ny harenao no hisy ny fonao koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny maso no toy ny jiron’ny tena
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 11.34-36)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '–Ny maso no toy ny jiron’ny tena: koa amin’izany raha mahiratra ny masonao, dia mazava ny tenanao manontolo; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: raha jamba kosa ny masonao, dia maizina ny tenanao manontolo. Eny, raha maizina ilay fahazavana ao anatinao, dia vao mainka haizim-pito no hisy anao!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Na Andriamanitra na ny harena
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 16.13)
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: –Tsy misy olona mahay manompo tompo roa; satria na ny anankiray ho hàlany ary ny anankiray ho tiany, na ny anankiray hombàny ary ny anankiray hohamavoiny. Tsy hainareo atao ny sady manompo an’Andriamanitra no manompo ny harena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aoka hatoky an’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 12.22-31)
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '–Noho izany indrindra no ilazako aminareo hoe: aza manahy ny amin’ny hanina sy fisotro izay tohan’ainareo, na ny amin’ny fitafiana izay ilain’ny tenanareo; moa tsy mihoatra ny hanina ve ny aina, ary tsy mihoatra ny fitafiana ve ny tena? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jereo ange ny voro-manidina: tsy mamafy na mijinja na manangona an-tsompitra manko izy ireny, kanefa fahanan’ny Rainareo Izay any an-danitra. Moa tsy sarobidy lavitra noho ireny ve ianareo? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa iza aminareo, na dia be fanahiana toy inona aza, no mahay manalava kely monja ny andro iainany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny andro iainany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny halavàny.
      marker-yv: yv-n
    - type: text
      text: '?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary ahoana no anahianareo ny amin’ny fitafiana? Diniho tsara ny fanirin’ny voninkazo eny an-tsaha: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: tsy misasatra na mamoly izy ireny, kanefa lazaiko aminareo fa na i Salômôna, teo amin’ny voninahiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 10.
      marker-yv: yv-n
    - type: text
      text: ' rehetra aza, dia tsy tsara fitafiana tahaka ny anankiray amin’izy ireny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ianao kosa, rehefa manao fiantrana, aoka na dia ny olona sakaizanao indrindra aza tsy hahalala izay ataonao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'aoka... izay ataonao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt ara-bakiteny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: aoka tsy ho fantatry ny tananao ankavia izay ataon’ny tananao ankavanana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (fomba fiteny izay midika fa tsy misy olona tokony hahalala ny asa soa ataonao afa-tsy Andriamanitra).'
      marker-yv: yv-n
    - type: text
      text: ', '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Tafîn’Andriamanitra toy izany ny ahitra any an-tsaha, izay eny anio nefa atsipy any am-patana rahampitso; tsy mainka ve ianareo no hampitafîny, ry kely finoana? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Noho izany, aza manahy ianareo ka manao hoe: inona no hohaninay? na hoe: inona no hosotroinay? na hoe: inona no hitafianay? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ireo mpanompo sampy manko no fatra-pikatsaka ireny rehetra ireny; fantatry ny Rainareo Izay any an-danitra kosa fa ilainareo avokoa izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Nefa katsaho aloha ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' sy ny hanao ny marina nosoritany, dia homeny anareo ho fanampiny ireny rehetra ireny. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Noho izany, aza manahy ny ho ampitso ianareo; satria ny ampitso hanahy ny ho azy, fa ampy ho an’ny andro anio ny fahoriana mitranga eo aminy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: hany ka miafina no anaovanao ny fiantrànao; ary ny Rainao Izay mahita ao amin’ny miafina no hamaly soa anao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mila dera amin’olombelona sady tsy maro teny raha mivavaka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 11.2-4)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: –Rehefa mivavaka ianareo, aza mba manahaka ny mpihatsaravelatsihy. Tian-dry zareo ny maka toerana ao amin’ny sinagôga sy eny amin’ny fihaonan-dalana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amin’ny vanim-potoana raikitra no tsy maintsy anatontosan’ny Jiosy tia vavaka ny tonom-bavaka fanaony, hany ka amin’ireny toerana ampahibemaso ireny no hararaotin’ny sasany hampisehoana fa tena mazoto ara-pivavahana izy. Ampit Lk 18.10-14.
      marker-yv: yv-n
    - type: text
      text: ' raha mivavaka, mba hahitan’ny olona azy. Lazaiko marina aminareo fa efa azony ny valisoany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ianao kosa, rehefa mivavaka, midira ao amin’ny efitranonao, hidio ny varavarana, dia mivavaha amin’ny Rainao Izay ao amin’ny miafina; ary ny Rainao Izay mahita ao amin’ny miafina no hamaly soa anao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa mivavaka ianareo, aza mba maro teny tahaka ny mpanompo sampy. Heverin’izy ireny fa rehefa maro teny izy, vao henon’Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa aza mba manahaka azy ianareo, satria fantatry ny Rainareo rahateo ny zavatra ilainareo, alohan’ny hangatahanareo izany aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa mivavaha toy izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny vavaka nampianarin’ny Tompo dia misy fitoviany amin’ny vavaka jiosy (indrindra ilay vavaka mirakitra fankalazana 18) na ny vontoatiny na ny endriny; saingy ny mampiavaka azy dia ny fiantsoana an’Andriamanitra amim-pahatsorana sy ny filaharan’ireo zavatra angatahina.
      marker-yv: yv-n
    - type: text
      text: ' àry ianareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ry Rainay any an-danitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hohamasinina anie ny anaranao;
