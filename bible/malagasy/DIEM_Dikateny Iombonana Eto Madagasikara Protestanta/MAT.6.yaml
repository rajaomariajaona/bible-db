document_id: MAT.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy mila dera amin’ny olombelona raha manao fiantrana
  - type: text
    content: –Tandremo ny manao adidy ara-pivavahana eo imason’ny olona mba ho hitany, sao ianareo tsy mahazo valisoa avy amin’ny Rainareo Izay any an-danitra.
  '10':
  - type: text
    content: ho tonga anie ny Fanjakanao;
  - type: text
    content: hatao anie ny sitraponao,
  - type: text
    content: eto an-tany tahaka ny any an-danitra.
  '11':
  - type: text
    content: Omeo anay anio ny hanina sahaza anay
  - type: note
    content: 'sahaza anay: dkt hafa ilainay na ho an’ity andro ity na ho an’ny rahampitso.'
  - type: text
    content: ','
  '12':
  - type: text
    content: avelao ny helokay,
  - type: text
    content: ary tahaka izany koa no amelanay izay meloka taminay;
  '13':
  - type: text
    content: aza avela ho azon’ny fakampanahy izahay,
  - type: text
    content: fa manafaha anay amin’
  - type: text
    content: ilay Ratsy
  - type: text
    content: '!'
  - type: text
    content: '[Anao ny fanjakana sy ny hery,'
  - type: text
    content: Anao ny voninahitra mandrakizay
  - type: note
    content: 'Anao... mandrakizay: jereo 1 Tan 29.11-13.'
  - type: text
    content: '! *Amen.]'
  '14':
  - type: text
    content: 'Eny, raha mamela ny fahadisoan’ny olona ianareo, dia mba hamela anareo koa ny Rainareo Izay any an-danitra; '
  '15':
  - type: text
    content: fa raha tsy mamela ny olona kosa ianareo, dia mba tsy hamela ny fahadisoanareo koa ny Rainareo Izay any an-danitra.
  - type: heading
    content: Tsy mila dera amin’olombelona raha mifady hanina
  '16':
  - type: text
    content: '–Rehefa mifady hanina ianareo, aza mba manahaka ny mpihatsaravelatsihy ka malahelo endrika. Ataon-dry zareo manjonitra ny tarehiny mba hahitan’ny olona azy hoe mifady hanina. Lazaiko marina aminareo fa efa azony ny valisoany. '
  '17':
  - type: text
    content: 'Fa ianao kosa, rehefa mifady hanina, dia sasao ny tavanao ary amboary tsara ny volonao, '
  '18':
  - type: text
    content: hany ka tsy ny olona no hahita anao hoe mifady hanina fa ny Rainao Izay ao amin’ny miafina; ary ny Rainao Izay mahita ao amin’ny miafina no hamaly soa anao.
  - type: heading
    content: Mahaiza mihary harena any an-danitra
  - type: heading
    content: (Jereo Lk 12.33-34)
  '19':
  - type: text
    content: '–Aza mangorona harena ho anareo etỳ an-tany, izay misy kadradraka sy harafesina manimba, sady misy mpangalatra mamaky trano sy mangalatra; '
  '2':
  - type: text
    content: 'Koa rehefa manao fiantrana ianao, aza dia antsoantsoina ho ren’ny tany ama-monina, sahala amin’ny fanaon’ny mpihatsaravelatsihy any amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' sy eny an-dalambe, mba hankalazan’ny olona azy. Lazaiko marina aminareo fa efa azony ny valisoany. '
  '20':
  - type: text
    content: 'fa manangòna harena ho anareo any an-danitra, izay tsy misy kadradraka na harafesina manimba sady tsy misy mpangalatra mamaky trano na mangalatra. '
  '21':
  - type: text
    content: Fa izay misy ny harenao no hisy ny fonao koa.
  - type: heading
    content: Ny maso no toy ny jiron’ny tena
  - type: heading
    content: (Jereo Lk 11.34-36)
  '22':
  - type: text
    content: '–Ny maso no toy ny jiron’ny tena: koa amin’izany raha mahiratra ny masonao, dia mazava ny tenanao manontolo; '
  '23':
  - type: text
    content: raha jamba kosa ny masonao, dia maizina ny tenanao manontolo. Eny, raha maizina ilay fahazavana ao anatinao, dia vao mainka haizim-pito no hisy anao!
  - type: heading
    content: Na Andriamanitra na ny harena
  - type: heading
    content: (Jereo Lk 16.13)
  '24':
  - type: text
    content: –Tsy misy olona mahay manompo tompo roa; satria na ny anankiray ho hàlany ary ny anankiray ho tiany, na ny anankiray hombàny ary ny anankiray hohamavoiny. Tsy hainareo atao ny sady manompo an’Andriamanitra no manompo ny harena.
  - type: heading
    content: Aoka hatoky an’Andriamanitra
  - type: heading
    content: (Jereo Lk 12.22-31)
  '25':
  - type: text
    content: '–Noho izany indrindra no ilazako aminareo hoe: aza manahy ny amin’ny hanina sy fisotro izay tohan’ainareo, na ny amin’ny fitafiana izay ilain’ny tenanareo; moa tsy mihoatra ny hanina ve ny aina, ary tsy mihoatra ny fitafiana ve ny tena? '
  '26':
  - type: text
    content: 'Jereo ange ny voro-manidina: tsy mamafy na mijinja na manangona an-tsompitra manko izy ireny, kanefa fahanan’ny Rainareo Izay any an-danitra. Moa tsy sarobidy lavitra noho ireny ve ianareo? '
  '27':
  - type: text
    content: Fa iza aminareo, na dia be fanahiana toy inona aza, no mahay manalava kely monja ny andro iainany
  - type: note
    content: 'ny andro iainany: dkt hafa ny halavàny.'
  - type: text
    content: '?'
  '28':
  - type: text
    content: 'Ary ahoana no anahianareo ny amin’ny fitafiana? Diniho tsara ny fanirin’ny voninkazo eny an-tsaha: '
  '29':
  - type: text
    content: tsy misasatra na mamoly izy ireny, kanefa lazaiko aminareo fa na i Salômôna, teo amin’ny voninahiny
  - type: note
    content: Jereo 1 Mp 10.
  - type: text
    content: ' rehetra aza, dia tsy tsara fitafiana tahaka ny anankiray amin’izy ireny. '
  '3':
  - type: text
    content: Fa ianao kosa, rehefa manao fiantrana, aoka na dia ny olona sakaizanao indrindra aza tsy hahalala izay ataonao
  - type: note
    content: 'aoka... izay ataonao: dkt ara-bakiteny aoka tsy ho fantatry ny tananao ankavia izay ataon’ny tananao ankavanana (fomba fiteny izay midika fa tsy misy olona tokony hahalala ny asa soa ataonao afa-tsy Andriamanitra).'
  - type: text
    content: ', '
  '30':
  - type: text
    content: 'Tafîn’Andriamanitra toy izany ny ahitra any an-tsaha, izay eny anio nefa atsipy any am-patana rahampitso; tsy mainka ve ianareo no hampitafîny, ry kely finoana? '
  '31':
  - type: text
    content: 'Noho izany, aza manahy ianareo ka manao hoe: inona no hohaninay? na hoe: inona no hosotroinay? na hoe: inona no hitafianay? '
  '32':
  - type: text
    content: 'Ireo mpanompo sampy manko no fatra-pikatsaka ireny rehetra ireny; fantatry ny Rainareo Izay any an-danitra kosa fa ilainareo avokoa izany. '
  '33':
  - type: text
    content: 'Nefa katsaho aloha ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' sy ny hanao ny marina nosoritany, dia homeny anareo ho fanampiny ireny rehetra ireny. '
  '34':
  - type: text
    content: Noho izany, aza manahy ny ho ampitso ianareo; satria ny ampitso hanahy ny ho azy, fa ampy ho an’ny andro anio ny fahoriana mitranga eo aminy.
  '4':
  - type: text
    content: hany ka miafina no anaovanao ny fiantrànao; ary ny Rainao Izay mahita ao amin’ny miafina no hamaly soa anao.
  - type: heading
    content: Tsy mila dera amin’olombelona sady tsy maro teny raha mivavaka
  - type: heading
    content: (Jereo Lk 11.2-4)
  '5':
  - type: text
    content: –Rehefa mivavaka ianareo, aza mba manahaka ny mpihatsaravelatsihy. Tian-dry zareo ny maka toerana ao amin’ny sinagôga sy eny amin’ny fihaonan-dalana
  - type: note
    content: Amin’ny vanim-potoana raikitra no tsy maintsy anatontosan’ny Jiosy tia vavaka ny tonom-bavaka fanaony, hany ka amin’ireny toerana ampahibemaso ireny no hararaotin’ny sasany hampisehoana fa tena mazoto ara-pivavahana izy. Ampit Lk 18.10-14.
  - type: text
    content: ' raha mivavaka, mba hahitan’ny olona azy. Lazaiko marina aminareo fa efa azony ny valisoany. '
  '6':
  - type: text
    content: Fa ianao kosa, rehefa mivavaka, midira ao amin’ny efitranonao, hidio ny varavarana, dia mivavaha amin’ny Rainao Izay ao amin’ny miafina; ary ny Rainao Izay mahita ao amin’ny miafina no hamaly soa anao.
  '7':
  - type: text
    content: 'Rehefa mivavaka ianareo, aza mba maro teny tahaka ny mpanompo sampy. Heverin’izy ireny fa rehefa maro teny izy, vao henon’Andriamanitra. '
  '8':
  - type: text
    content: 'Koa aza mba manahaka azy ianareo, satria fantatry ny Rainareo rahateo ny zavatra ilainareo, alohan’ny hangatahanareo izany aminy. '
  '9':
  - type: text
    content: Koa mivavaha toy izao
  - type: note
    content: Ny vavaka nampianarin’ny Tompo dia misy fitoviany amin’ny vavaka jiosy (indrindra ilay vavaka mirakitra fankalazana 18) na ny vontoatiny na ny endriny; saingy ny mampiavaka azy dia ny fiantsoana an’Andriamanitra amim-pahatsorana sy ny filaharan’ireo zavatra angatahina.
  - type: text
    content: ' àry ianareo:'
  - type: text
    content: «Ry Rainay any an-danitra ô,
  - type: text
    content: hohamasinina anie ny anaranao;
