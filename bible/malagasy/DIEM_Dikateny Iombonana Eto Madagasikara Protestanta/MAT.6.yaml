  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: avelao ny helokay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka izany koa no amelanay izay meloka taminay;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: aza avela ho azon’ny fakampanahy izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manafaha anay amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ilay Ratsy
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Anao ny fanjakana sy ny hery,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anao ny voninahitra mandrakizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Anao... mandrakizay: '
