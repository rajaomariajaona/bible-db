    children:
    - type: text
      text: Tsy mila dera amin’ny olombelona raha manao fiantrana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: –Tandremo ny manao adidy ara-pivavahana eo imason’ny olona mba ho hitany, sao ianareo tsy mahazo valisoa avy amin’ny Rainareo Izay any an-danitra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ho tonga anie ny Fanjakanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatao anie ny sitraponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eto an-tany tahaka ny any an-danitra.
  '11':
  - type: usfm
    marker: q1
