document_id: JAS.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy amiko Jakôba ity taratasy ity, dia izaho mpanompon’Andriamanitra sady mpanompon’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo. Miarahaba anareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' rehetra miely patrana eran-tany aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jakôba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 13.55; Mk 6.3; Asa 15.13; Gal 1.19. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: vahoakan’Andriamanitra rehetra miely patrana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'ny foko 12 miely patrana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' kristianina jiosy monina any ivelan’i Palestinina no anoratan’i Jakôba, na mety koa mahafaoka ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vahoakan’Andriamanitra rehetra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (dia ny kristianina rehetra, Israely vaovao) ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foko 12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Finoana sy fahendrena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry havako, ataovy ho tretrika tokoa ny tenanareo raha ifandafaran’ny fitsapana samihafa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'satria fantatrareo fa ny fisedrana ny finoanareo dia mahatonga faharetana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary aoka ny faharetanareo homban’asa tanteraka mba ho lavorary sy tonga ohatra ianareo, ka tsy ho orin-javatra na amin’inona na amin’inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Kanefa raha misy aminareo tsy manam-pahendrena, dia aoka izy hangataka amin’Andriamanitra fa homeny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ohab 2.3-6.
    marker-yv: yv-n
  - type: text
    text: '; satria manome malalaka ho an’ny olona rehetra Andriamanitra sady tsy mba mandatsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy maintsy mino tsara anefa izy rehefa mangataka, fa tsy hiahanahana; satria izay miahanahana dia toy ny alon-dranomasina tsofin’ny rivotra sy atopatopany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aoka tsy hanampo handray zavatra avy amin’ny Tompo ny olona toy izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: fa miroa saina sady mivadibadika amin’ny fiaimpiainany rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahantrana sy ny harena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aoka Andriamanitra manandratra azy no hataon’ny havana mahantra ho reharehany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary aoka Andriamanitra mampietry azy no hataon’ny havana mpanankarena ho reharehany, satria hihelina toy ny vonin’ireo ahitra eny an-tsaha ny mpanankarena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eny, niposaka ny masoandro ombàn’ny hafanana migaingaina, dia nampalazo ny ahitra; ka nihintsana ny voniny ary levona ny hatsaran-tarehiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 10-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mampahatsiaro ny Is 40.6-7, araka ny dkt grika tranainy Septoazinta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ombàn’ny hafanana migaingaina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ombàn’ny rivotra mafana avy any atsimo.
    marker-yv: yv-n
  - type: text
    text: '. Dia toy izany koa ny mpanankarena: ho levona eo anivon’ny lahasany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Sambatra ny olona izay maharitra ny fitsapana; fa rehefa voasedran’izany izy, dia ny fiainana efa nampanantenain’Andriamanitra ireo tia Azy no horaisiny ho satroboninahi-pandresena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha misy alaim-panahy, aoka izy tsy hanao hoe: «Andriamanitra no maka fanahy ahy»; satria tsy mba mety alaim-panahy hanao ratsy Andriamanitra sady tsy mba maka fanahy olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa samy alaim-panahy ny olona, rehefa mitaona azy sy mitady hamandrika azy ny filàndratsiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ka rehefa eken’ny olona ny filàndratsy, dia miteraka ota; ary rehefa mahazo bahana tanteraka ny ota, dia miteraka fahafatesana ara-panahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza mamita-tena, ry havako malala: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny fanomezan-tsoa rehetra sy ny fanomezana lavorary rehetra dia avy any ambony, ka midina avy amin’Andriamanitra Ray, mpahary ny fanazavana eny amin’ny habakabaka, Ilay tsy manam-piovaovana ary tsy misy aloka avy amin’ny fihodinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sitrapon’Andriamanitra Ray no niterahany antsika tamin’ny teny fahamarinana, mba ho santa-bokatra atolotra Azy eo amin’ny samy zavaboaariny isika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihaino sy manatanteraka ny tenin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Efa fantatrareo izany, ry havako malala; kanefa aoka ny isam-batan’olona samy ho dodona hihaino fa tsy ho maimaika hiteny na halaky tezitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Efa fantatrareo izany... samy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: noho izany, ry havako malala, aoka ny isam-batan’olona samy.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –'
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'tsy halaky tezitra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Mpitor 7.9.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'satria ny olona tezitra tsy mahefa izay marina soritan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Noho izany, ario avokoa ny fahalotoana sy ny haratsiam-panahy rehetra; raiso amin’ny fahalemem-panahy ny teny ambolen’Andriamanitra ao anatinareo sady mahavonjy ny tenanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aoka ianareo ho mpanatanteraka ny teny, fa tsy ho mpihaino fotsiny, ka mamita-tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Satria raha misy olona mpihaino ny teny, nefa tsy mpanatanteraka, dia tahaka ny mijery ny tarehiny ao anaty fitaratra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'eny, mahita ny tena endriny izy, dia lasa ka hadinony miaraka amin’izay ny toe-tarehiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa izay fatra-pandinika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: ' lavorary, dia ny lalàna mitondra fahafahana, ka maharitra amin’izany ary tsy ho mpihaino manadino fa mpanatanteraka an’asa, dia ho sambatra izy amin’izay asa tanterahiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha misy manao ny tenany ho mpivavaka saingy tsy mahafehy ny lelany, dia mamita-tena ka zava-poana ny fivavahan’izany olona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa amin’Andriamanitra Ray ny fivavahana madio sy tsy misy tsiny dia izao: ny miahy ny kamboty sy ny mpitondratena amin’ny fahoriana mahazo azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 1.17.
    marker-yv: yv-n
  - type: text
    text: ' ary ny miaro tena tsy ho voapentimpentin’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: .
