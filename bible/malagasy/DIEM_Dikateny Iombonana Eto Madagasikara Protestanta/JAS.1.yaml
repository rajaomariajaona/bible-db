document_id: JAS.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Jakôba ity taratasy ity, dia izaho mpanompon’Andriamanitra sady mpanompon’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo. Miarahaba anareo '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra miely patrana eran-tany aho'
  - type: note
    content: 'Jakôba: jereo Mt 13.55; Mk 6.3; Asa 15.13; Gal 1.19. –vahoakan’Andriamanitra rehetra miely patrana na hoe ny foko 12 miely patrana: kristianina jiosy monina any ivelan’i Palestinina no anoratan’i Jakôba, na mety koa mahafaoka ny vahoakan’Andriamanitra rehetra (dia ny kristianina rehetra, Israely vaovao) ny hoe foko 12.'
  - type: text
    content: .
  - type: heading
    content: Finoana sy fahendrena
  '10':
  - type: text
    content: 'ary aoka Andriamanitra mampietry azy no hataon’ny havana mpanankarena ho reharehany, satria hihelina toy ny vonin’ireo ahitra eny an-tsaha ny mpanankarena. '
  '11':
  - type: text
    content: Eny, niposaka ny masoandro ombàn’ny hafanana migaingaina, dia nampalazo ny ahitra; ka nihintsana ny voniny ary levona ny hatsaran-tarehiny
  - type: note
    content: 'And 10-11: mampahatsiaro ny Is 40.6-7, araka ny dkt grika tranainy Septoazinta. –ombàn’ny hafanana migaingaina: dkt hafa ombàn’ny rivotra mafana avy any atsimo.'
  - type: text
    content: '. Dia toy izany koa ny mpanankarena: ho levona eo anivon’ny lahasany izy.'
  '12':
  - type: text
    content: 'Sambatra ny olona izay maharitra ny fitsapana; fa rehefa voasedran’izany izy, dia ny fiainana efa nampanantenain’Andriamanitra ireo tia Azy no horaisiny ho satroboninahi-pandresena. '
  '13':
  - type: text
    content: 'Raha misy alaim-panahy, aoka izy tsy hanao hoe: «Andriamanitra no maka fanahy ahy»; satria tsy mba mety alaim-panahy hanao ratsy Andriamanitra sady tsy mba maka fanahy olona. '
  '14':
  - type: text
    content: 'Fa samy alaim-panahy ny olona, rehefa mitaona azy sy mitady hamandrika azy ny filàndratsiny; '
  '15':
  - type: text
    content: ka rehefa eken’ny olona ny filàndratsy, dia miteraka ota; ary rehefa mahazo bahana tanteraka ny ota, dia miteraka fahafatesana ara-panahy.
  '16':
  - type: text
    content: 'Aza mamita-tena, ry havako malala: '
  '17':
  - type: text
    content: 'ny fanomezan-tsoa rehetra sy ny fanomezana lavorary rehetra dia avy any ambony, ka midina avy amin’Andriamanitra Ray, mpahary ny fanazavana eny amin’ny habakabaka, Ilay tsy manam-piovaovana ary tsy misy aloka avy amin’ny fihodinana. '
  '18':
  - type: text
    content: Sitrapon’Andriamanitra Ray no niterahany antsika tamin’ny teny fahamarinana, mba ho santa-bokatra atolotra Azy eo amin’ny samy zavaboaariny isika.
  - type: heading
    content: Mihaino sy manatanteraka ny tenin’Andriamanitra
  '19':
  - type: text
    content: Efa fantatrareo izany, ry havako malala; kanefa aoka ny isam-batan’olona samy ho dodona hihaino fa tsy ho maimaika hiteny na halaky tezitra
  - type: note
    content: 'Efa fantatrareo izany... samy: misy stf sasany ahitana hoe noho izany, ry havako malala, aoka ny isam-batan’olona samy. –tsy halaky tezitra: ampit Mpitor 7.9.'
  - type: text
    content: ', '
  '2':
  - type: text
    content: 'Ry havako, ataovy ho tretrika tokoa ny tenanareo raha ifandafaran’ny fitsapana samihafa; '
  '20':
  - type: text
    content: 'satria ny olona tezitra tsy mahefa izay marina soritan’Andriamanitra. '
  '21':
  - type: text
    content: Noho izany, ario avokoa ny fahalotoana sy ny haratsiam-panahy rehetra; raiso amin’ny fahalemem-panahy ny teny ambolen’Andriamanitra ao anatinareo sady mahavonjy ny tenanareo.
  '22':
  - type: text
    content: 'Aoka ianareo ho mpanatanteraka ny teny, fa tsy ho mpihaino fotsiny, ka mamita-tena. '
  '23':
  - type: text
    content: 'Satria raha misy olona mpihaino ny teny, nefa tsy mpanatanteraka, dia tahaka ny mijery ny tarehiny ao anaty fitaratra: '
  '24':
  - type: text
    content: 'eny, mahita ny tena endriny izy, dia lasa ka hadinony miaraka amin’izay ny toe-tarehiny. '
  '25':
  - type: text
    content: 'Fa izay fatra-pandinika ny '
  - type: text
    content: lalàna
  - type: text
    content: ' lavorary, dia ny lalàna mitondra fahafahana, ka maharitra amin’izany ary tsy ho mpihaino manadino fa mpanatanteraka an’asa, dia ho sambatra izy amin’izay asa tanterahiny.'
  '26':
  - type: text
    content: 'Raha misy manao ny tenany ho mpivavaka saingy tsy mahafehy ny lelany, dia mamita-tena ka zava-poana ny fivavahan’izany olona izany. '
  '27':
  - type: text
    content: 'Fa amin’Andriamanitra Ray ny fivavahana madio sy tsy misy tsiny dia izao: ny miahy ny kamboty sy ny mpitondratena amin’ny fahoriana mahazo azy'
  - type: note
    content: Ampit Is 1.17.
  - type: text
    content: ' ary ny miaro tena tsy ho voapentimpentin’'
  - type: text
    content: izao tontolo izao
  - type: text
    content: .
  '3':
  - type: text
    content: 'satria fantatrareo fa ny fisedrana ny finoanareo dia mahatonga faharetana. '
  '4':
  - type: text
    content: 'Ary aoka ny faharetanareo homban’asa tanteraka mba ho lavorary sy tonga ohatra ianareo, ka tsy ho orin-javatra na amin’inona na amin’inona. '
  '5':
  - type: text
    content: Kanefa raha misy aminareo tsy manam-pahendrena, dia aoka izy hangataka amin’Andriamanitra fa homeny
  - type: note
    content: Ampit Ohab 2.3-6.
  - type: text
    content: '; satria manome malalaka ho an’ny olona rehetra Andriamanitra sady tsy mba mandatsa. '
  '6':
  - type: text
    content: 'Tsy maintsy mino tsara anefa izy rehefa mangataka, fa tsy hiahanahana; satria izay miahanahana dia toy ny alon-dranomasina tsofin’ny rivotra sy atopatopany. '
  '7':
  - type: text
    content: 'Aoka tsy hanampo handray zavatra avy amin’ny Tompo ny olona toy izany, '
  '8':
  - type: text
    content: fa miroa saina sady mivadibadika amin’ny fiaimpiainany rehetra.
  - type: heading
    content: Ny fahantrana sy ny harena
  '9':
  - type: text
    content: 'Aoka Andriamanitra manandratra azy no hataon’ny havana mahantra ho reharehany; '
