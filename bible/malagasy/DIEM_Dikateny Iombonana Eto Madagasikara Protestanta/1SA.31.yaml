document_id: 1SA.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 10.1-14)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary niady tamin’i Israely ny Filistinina; dia nandositra azy ny Israelita ka faty maro no nitsitsitra teny an-tendrombohitr’i Gilbôa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gilbôa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 28.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nilofo nanenjika an’i Saoly sy ireo zanany lahy ny Filistinina ka nahafaty an’i Jônatàna sy i Abinadaba ary i Melkisa, izay samy zanakalahin’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanindry an’i Saoly ny fanafihana ka sendra ny mpandefa tsipîka izy, ary natahotra mafy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy i Saoly tamin’ilay mpitondra ny fitaovam-piadiany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raiso ny sabatrao ka trobaro aho, fandrao ireo mpanompo sampy ireo indray no ho avy hitrobaka ahy, ka hanao ahy ho fihomehezana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa tsy nanaiky ilay mpitondra ny fitaovam-piadiany satria natahotra mafy. Koa nalain’i Saoly ny sabatra, dia nianjerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary rehefa hitan’ilay mpitondra ny fitaovam-piadiany fa maty i Saoly, dia mba nianjerany koa ny sabany, ka niara-maty taminy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andro iray ihany izany no nahafatesan’i Saoly mbamin’ireo zanany telo lahy sy ny mpitondra ny fitaovam-piadiany ary ny miaramilany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rehefa hitan’ny Israelita izay teny an-dafy andrefan’ny lohasaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lohasaha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' etoana dia ny lemak’i Jizrehela izay nitobian’ny Filistinina (28.4).'
    marker-yv: yv-n
  - type: text
    text: ' sy teny an-dafy andrefan’i Jôrdàna fa nandositra ny tafik’i Israely sady maty i Saoly sy ny zanany, dia nandao ny tanàna izy ka nandositra. Tonga kosa ny Filistinina ka nipetraka tao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny ampitso, nony tonga ny Filistinina haka ny zavatra teny amin’ny faty, dia nahita an’i Saoly sy ny zanany telo lahy nitsitra teo an-tendrombohitr’i Gilbôa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Notapahiny ny lohan’i Saoly sady nalainy ny fiadiany ka nalefany hitety ny tanin’ny Filistinina hanambaràna izany vaovao izany ao amin’ny Tempolin-tsampiny sy amin’ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Avy eo dia napetrany tao an-tempolin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hastôreta
  - type: text
    text: ' ny fitaovam-piadian’i Saoly; ary ny fatiny nahantony teo amin’ny mandan’i Bety-Seana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bety-Seana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo akaikin’ny ony Jôrdàna, tokony ho 75 km avy ao Jerosalema.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Rehefa ren’ny mponin’i Jabesy-Gilehada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jabesy-Gilehada: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 11.1 sy nta; io tanàna io dia 15 km ao atsimo atsinanan’i Bety-Seana.
    marker-yv: yv-n
  - type: text
    text: ' ny nataon’ny Filistinina tamin’i Saoly, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia niainga ny lehilahy maherifo rehetra ka nanao lava alina naka ny fatin’i Saoly sy ny fatin-janany teo amin’ny mandan’i Bety-Seana. Nony tafaverina tany Jabesy izy ireo, dia nodorany ny faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nangoniny ny taolambalony ka naleviny tao ambanin’ilay hazo tamariska tao Jabesy; ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nifady hanina
  - type: text
    text: ' nandritra ny fito andro ny olona mba ho fisaonana.'
