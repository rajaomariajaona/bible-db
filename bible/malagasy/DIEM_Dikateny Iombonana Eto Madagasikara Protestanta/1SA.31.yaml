document_id: 1SA.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Saoly
  - type: heading
    content: (Jereo 1 Tan 10.1-14)
  - type: text
    content: Ary niady tamin’i Israely ny Filistinina; dia nandositra azy ny Israelita ka faty maro no nitsitsitra teny an-tendrombohitr’i Gilbôa
  - type: note
    content: 'Gilbôa: jereo 28.4 sy nta.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Avy eo dia napetrany tao an-tempolin’ny '
  - type: text
    content: Hastôreta
  - type: text
    content: ' ny fitaovam-piadian’i Saoly; ary ny fatiny nahantony teo amin’ny mandan’i Bety-Seana'
  - type: note
    content: 'Bety-Seana: tanàna eo akaikin’ny ony Jôrdàna, tokony ho 75 km avy ao Jerosalema.'
  - type: text
    content: .
  '11':
  - type: text
    content: Rehefa ren’ny mponin’i Jabesy-Gilehada
  - type: note
    content: 'Jabesy-Gilehada: jereo 11.1 sy nta; io tanàna io dia 15 km ao atsimo atsinanan’i Bety-Seana.'
  - type: text
    content: ' ny nataon’ny Filistinina tamin’i Saoly, '
  '12':
  - type: text
    content: 'dia niainga ny lehilahy maherifo rehetra ka nanao lava alina naka ny fatin’i Saoly sy ny fatin-janany teo amin’ny mandan’i Bety-Seana. Nony tafaverina tany Jabesy izy ireo, dia nodorany ny faty. '
  '13':
  - type: text
    content: 'Nangoniny ny taolambalony ka naleviny tao ambanin’ilay hazo tamariska tao Jabesy; ary '
  - type: text
    content: nifady hanina
  - type: text
    content: ' nandritra ny fito andro ny olona mba ho fisaonana.'
  '2':
  - type: text
    content: 'Nilofo nanenjika an’i Saoly sy ireo zanany lahy ny Filistinina ka nahafaty an’i Jônatàna sy i Abinadaba ary i Melkisa, izay samy zanakalahin’i Saoly. '
  '3':
  - type: text
    content: 'Nanindry an’i Saoly ny fanafihana ka sendra ny mpandefa tsipîka izy, ary natahotra mafy azy. '
  '4':
  - type: text
    content: 'Dia hoy i Saoly tamin’ilay mpitondra ny fitaovam-piadiany:'
  - type: text
    content: –Raiso ny sabatrao ka trobaro aho, fandrao ireo mpanompo sampy ireo indray no ho avy hitrobaka ahy, ka hanao ahy ho fihomehezana.
  - type: text
    content: 'Fa tsy nanaiky ilay mpitondra ny fitaovam-piadiany satria natahotra mafy. Koa nalain’i Saoly ny sabatra, dia nianjerany. '
  '5':
  - type: text
    content: Ary rehefa hitan’ilay mpitondra ny fitaovam-piadiany fa maty i Saoly, dia mba nianjerany koa ny sabany, ka niara-maty taminy izy.
  '6':
  - type: text
    content: Andro iray ihany izany no nahafatesan’i Saoly mbamin’ireo zanany telo lahy sy ny mpitondra ny fitaovam-piadiany ary ny miaramilany rehetra.
  '7':
  - type: text
    content: Rehefa hitan’ny Israelita izay teny an-dafy andrefan’ny lohasaha
  - type: note
    content: Ny lohasaha etoana dia ny lemak’i Jizrehela izay nitobian’ny Filistinina (28.4).
  - type: text
    content: ' sy teny an-dafy andrefan’i Jôrdàna fa nandositra ny tafik’i Israely sady maty i Saoly sy ny zanany, dia nandao ny tanàna izy ka nandositra. Tonga kosa ny Filistinina ka nipetraka tao.'
  '8':
  - type: text
    content: 'Ny ampitso, nony tonga ny Filistinina haka ny zavatra teny amin’ny faty, dia nahita an’i Saoly sy ny zanany telo lahy nitsitra teo an-tendrombohitr’i Gilbôa. '
  '9':
  - type: text
    content: 'Notapahiny ny lohan’i Saoly sady nalainy ny fiadiany ka nalefany hitety ny tanin’ny Filistinina hanambaràna izany vaovao izany ao amin’ny Tempolin-tsampiny sy amin’ny vahoaka. '
