  - type: text
    content: Mikà dia avy any Môreseta-Gata, tanàna kely eo atsimo andrefan’i Jerosalema. Mpiara-belona amin’i Isaià mpaminany izy, manao ny asany tokony ho hatreo amin’ny taona 740 ka hatrany amin’ny taona 700 tal J.K. Toa an’i Isaià, dia ny mponina tao amin’ny fanjakan’i Joda no itenenany fony izy ireo tandindomin’ny fanafihana hataon’ny Asirianina.
  - type: text
    content: Mampitandrina ireo mpihaino azy i Mikà fa ny tanin’izy ireo, indrindra i Jerosalema renivohitra, dia hiharan-doza toy izay nanjo an’i Samaria, renivohitry ny fanjakan’i
  - type: text
    content: ' '
  - type: text
    content: Israely
  - type: text
    content: ', '
  - type: text
    content: 'rava tamin’ny 722-721 tal J.K. Lazainy mialoha koa fa ny loza ho avy dia vokatry ny fahotan’izy ireo, indrindra ny tsy fahamarinana eo amin’ny ara-piaraha-monina. Amin’izany i Mikà dia toy ny olona mpanao famotorana avy amin’Andriamanitra, ka manjary mifanandrina amin’ireo lehibe sy tompon’andraikitra ara-panjakana eo amin’ny firenena: isan’izany ireo tremalahy mpangoron-tany, ireo mpitarika, ireo mpitsara, ireo mpisorona. Ifanoherany koa ireo mpaminany sasany izay mamitaka ny vahoaka amin’ny teny fandrotsirotsiana sady tsy mitaona azy hiala amin’ny toetra ratsy. Ireo teny fampitandremana ataony no itarihan’i Mikà ny mpihaino azy hieritreritra sy haka safidy: dia ny hankatò ny sitrapon’Andriamanitra amin’ny alalan’ny fanajana sy fitiavana ny hafa (6.8). Ireo fampitandremana ireo dia arahin’ny fanambarana ny asam-pamonjena vaovao hataon’Andriamanitra amin’ny hoavy mba hanasoavana ny vahoakany.'
  - type: text
    content: 'Ny bokin’i Mikà dia mirafitra araka ny fifandimbiasan’ny karazana hafatra anankiroa mifampidipiditra: Andriamanitra dia milaza fa hitsara sady hanafay ny vahoakany (1–3; 6.1–7), nefa koa dia mampanantena fa hamonjy azy (1–5; 7.8-20) amin’ny hanarenany azy ka hametrahany azy eo ambany fitarihan’ny filoha iray hipoitra avy amin’ny taranak’i Davida.'
