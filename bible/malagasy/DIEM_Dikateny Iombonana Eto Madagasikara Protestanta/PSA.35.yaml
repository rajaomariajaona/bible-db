document_id: PSA.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Fitarainan’ny tsy manan-tsiny nakarina fitsarana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, tohero izay mpanohitra ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary iadio izay miady amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raiso ny ampinga kely sy lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka midira an-tsehatra hamonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Arangarangao ny lefona sy famaky
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sakano ireo mpanenjika ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary lazao ho tokin’aiko ny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izaho no ho mpamonjy anao!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho menatra sy ho afa-baràka anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay olona mitady hahafaty ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihemotra sy hangaihay anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mikasa hanao ratsy ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka ho toy ny akofa aelin-drivotra ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'rehefa handroaka azy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjelin
  - type: text
    text: ’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary aoka ho maizina sy halama ny lalany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa hanenjika azy ny anjelin’ny TOMPO!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Satria tsy misy antony mitombina akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanao fandrika hamelezana ahy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nihady longoa hamandrihana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ho voan’ny loza tsy ampoizina anie izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tratry ny fandrika nataony ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hianjera amin’ny longoa nohadîny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny nataon’ny TOMPO kosa no hifaliako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny amin’ny famonjeny no hiravoravoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny heriko tontolo no hilazako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «TOMPO ô, tsy misy tahaka Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria afahanao ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay matanjaka noho izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, afahanao ny malahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay mandroba azy.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vavolombelona mandainga no mitsangana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka zavatra tsy fantatro no iampangany ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Valiana ratsy ny soa nataoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hany ka mila hamoy fo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha narary izy ireo, dia nalahelo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nitafy lamba fisaonana ho marik’izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampijaly tena tamin’ny fifadian-kanina aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa niondrika hivavaka ho azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: fa toy ny namana na mpiray tampo
- type: usfm
  marker: q1
  children:
  - type: text
    text: no fitondràko azy tamin’izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanjombona sy valaketraka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny olona misaona ny reniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Kanjo nony lavo kosa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia faly ireo sady mivorivory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mivorivory mba hamely ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vahiny tsy fantatro akory aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tsy mitsaha-mivazavaza amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tahaka ny olona mihomehy lavo izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihidy vazana ho fankahalana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tompo ô, mbola ho ela ve Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitazam-potsiny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny aiko tokana avoty amin’ny mpamely ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa toa liona mierona mihitsy izy ireo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ka eo anivom-bahoakanao tafangona maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hiderako sy hankalazako Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aza avela hanesoeso ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mpandrafy tsy an-drariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy hifanao pi-maso ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mpankahala tsy amin’antony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 69.5; Jôh 15.25.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy mba miteny fihavanana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mamoron-dainga hamelezana
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’ireo bonaika eo amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nitsaontsaom-bava tamiko izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka nilaza hoe: «Akorinao izay!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masonay no nahita ny nataonao!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nefa Ianao, TOMPO ô, dia nahita izay niseho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aza mangina, aza manalavitra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ry Andriamanitro sady Tompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifohaza sy midira an-tsehatra Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanome rariny ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa mba hiaro ny zoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: TOMPO Andriamanitro ô, marina Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ambarao ho tsy manan-tsiny aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aza avelanao ho fanesom-pahavaloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aoka izy tsy hiteny anakampo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hià! Azonay izy, ka nataonay teli-moka!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ho menatra sy hangaihay avokoa anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay olona mifaly amin’ny fahavoazako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho safo-kenatra sy ho afa-baràka anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo manandra-tena mirehareha amiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa izay tia ny hahazoako rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka hanao horakora-pifaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ho falifaly hivolan-dava hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Lehibe tokoa ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny hiadanan’ny mpanompony
- type: usfm
  marker: q1
  children:
  - type: text
    text: no zavatra tiany!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izaho koa hankalaza ny fahamarinanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hidera Anao isan’andro isan’andro.
