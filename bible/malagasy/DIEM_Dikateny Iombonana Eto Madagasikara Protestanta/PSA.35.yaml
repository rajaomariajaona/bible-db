document_id: PSA.35,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fitarainan’ny tsy manan-tsiny nakarina fitsarana
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, tohero izay mpanohitra ahy
  - type: text
    content: ary iadio izay miady amiko.
  '10':
  - type: text
    content: 'Ny heriko tontolo no hilazako hoe:'
  - type: text
    content: «TOMPO ô, tsy misy tahaka Anao
  - type: text
    content: satria afahanao ny mahantra
  - type: text
    content: amin’izay matanjaka noho izy;
  - type: text
    content: eny, afahanao ny malahelo
  - type: text
    content: amin’izay mandroba azy.»
  '11':
  - type: text
    content: Vavolombelona mandainga no mitsangana,
  - type: text
    content: ka zavatra tsy fantatro no iampangany ahy.
  '12':
  - type: text
    content: Valiana ratsy ny soa nataoko,
  - type: text
    content: hany ka mila hamoy fo aho.
  '13':
  - type: text
    content: Raha narary izy ireo, dia nalahelo aho
  - type: text
    content: ka nitafy lamba fisaonana ho marik’izany;
  - type: text
    content: nampijaly tena tamin’ny fifadian-kanina aho
  - type: text
    content: ary koa niondrika hivavaka ho azy,
  '14':
  - type: text
    content: fa toy ny namana na mpiray tampo
  - type: text
    content: no fitondràko azy tamin’izany;
  - type: text
    content: nanjombona sy valaketraka aho
  - type: text
    content: toy ny olona misaona ny reniny.
  '15':
  - type: text
    content: Kanjo nony lavo kosa aho,
  - type: text
    content: dia faly ireo sady mivorivory,
  - type: text
    content: mivorivory mba hamely ahy;
  - type: text
    content: vahiny tsy fantatro akory aza
  - type: text
    content: no tsy mitsaha-mivazavaza amiko.
  '16':
  - type: text
    content: Tahaka ny olona mihomehy lavo izy,
  - type: text
    content: ka mihidy vazana ho fankahalana ahy.
  '17':
  - type: text
    content: Tompo ô, mbola ho ela ve Ianao
  - type: text
    content: no hitazam-potsiny?
  - type: text
    content: Ny aiko tokana avoty amin’ny mpamely ahy
  - type: text
    content: fa toa liona mierona mihitsy izy ireo;
  '18':
  - type: text
    content: ka eo anivom-bahoakanao tafangona maro
  - type: text
    content: no hiderako sy hankalazako Anao.
  '19':
  - type: text
    content: Aza avela hanesoeso ahy
  - type: text
    content: ireo mpandrafy tsy an-drariny;
  - type: text
    content: aoka tsy hifanao pi-maso ahy
  - type: text
    content: ireo mpankahala tsy amin’antony
  - type: note
    content: Ampit Sal 69.5; Jôh 15.25.
  - type: text
    content: '!'
  '2':
  - type: text
    content: Raiso ny ampinga kely sy lehibe
  - type: text
    content: ka midira an-tsehatra hamonjy ahy.
  '20':
  - type: text
    content: Tsy mba miteny fihavanana izy,
  - type: text
    content: fa mamoron-dainga hamelezana
  - type: text
    content: an’ireo bonaika eo amin’ny tany.
  '21':
  - type: text
    content: Nitsaontsaom-bava tamiko izy
  - type: text
    content: 'ka nilaza hoe: «Akorinao izay!'
  - type: text
    content: Ny masonay no nahita ny nataonao!»
  '22':
  - type: text
    content: Nefa Ianao, TOMPO ô, dia nahita izay niseho;
  - type: text
    content: koa aza mangina, aza manalavitra ahy.
  '23':
  - type: text
    content: Ry Andriamanitro sady Tompoko,
  - type: text
    content: mifohaza sy midira an-tsehatra Ianao
  - type: text
    content: mba hanome rariny ahy
  - type: text
    content: ary koa mba hiaro ny zoko.
  '24':
  - type: text
    content: TOMPO Andriamanitro ô, marina Ianao
  - type: text
    content: ka ambarao ho tsy manan-tsiny aho,
  - type: text
    content: fa aza avelanao ho fanesom-pahavaloko.
  '25':
  - type: text
    content: 'Aoka izy tsy hiteny anakampo hoe:'
  - type: text
    content: «Hià! Azonay izy, ka nataonay teli-moka!»
  '26':
  - type: text
    content: Ho menatra sy hangaihay avokoa anie
  - type: text
    content: izay olona mifaly amin’ny fahavoazako;
  - type: text
    content: ho safo-kenatra sy ho afa-baràka anie
  - type: text
    content: ireo manandra-tena mirehareha amiko!
  '27':
  - type: text
    content: Fa izay tia ny hahazoako rariny
  - type: text
    content: dia aoka hanao horakora-pifaliana
  - type: text
    content: 'sy ho falifaly hivolan-dava hoe:'
  - type: text
    content: «Lehibe tokoa ny TOMPO,
  - type: text
    content: fa ny hiadanan’ny mpanompony
  - type: text
    content: no zavatra tiany!»
  '28':
  - type: text
    content: Izaho koa hankalaza ny fahamarinanao
  - type: text
    content: sy hidera Anao isan’andro isan’andro.
  '3':
  - type: text
    content: Arangarangao ny lefona sy famaky
  - type: text
    content: ka sakano ireo mpanenjika ahy;
  - type: text
    content: 'ary lazao ho tokin’aiko ny hoe:'
  - type: text
    content: «Izaho no ho mpamonjy anao!»
  '4':
  - type: text
    content: Ho menatra sy ho afa-baràka anie
  - type: text
    content: izay olona mitady hahafaty ahy!
  - type: text
    content: Hihemotra sy hangaihay anie
  - type: text
    content: izay mikasa hanao ratsy ahy!
  '5':
  - type: text
    content: Aoka ho toy ny akofa aelin-drivotra ireo,
  - type: text
    content: 'rehefa handroaka azy ny '
  - type: text
    content: anjelin
  - type: text
    content: ’ny TOMPO;
  '6':
  - type: text
    content: ary aoka ho maizina sy halama ny lalany,
  - type: text
    content: rehefa hanenjika azy ny anjelin’ny TOMPO!
  '7':
  - type: text
    content: Satria tsy misy antony mitombina akory,
  - type: text
    content: dia nanao fandrika hamelezana ahy ireo
  - type: text
    content: ka nihady longoa hamandrihana ahy.
  '8':
  - type: text
    content: Ho voan’ny loza tsy ampoizina anie izy,
  - type: text
    content: ka ho tratry ny fandrika nataony ihany
  - type: text
    content: sy hianjera amin’ny longoa nohadîny!
  '9':
  - type: text
    content: Fa ny nataon’ny TOMPO kosa no hifaliako;
  - type: text
    content: ary ny amin’ny famonjeny no hiravoravoako.
