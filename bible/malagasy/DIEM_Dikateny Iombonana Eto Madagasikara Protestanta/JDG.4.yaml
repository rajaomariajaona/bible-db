document_id: JDG.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Debôrà sy i Baràka
  - type: text
    content: 'Ary rehefa maty i Ehoda, dia nanao izay ratsy eo imason’ny TOMPO indray ny Israelita. '
  '10':
  - type: text
    content: 'Nangonin’i Baràka tao ny vatan-dehilahy zebolonîta sy naftalita. Andiany folo no nanaraka azy teny an-tendrombohitra Tabôra, ary niakatra niaraka taminy koa i Debôrà. '
  '11':
  - type: text
    content: Tao akaikin’i Kedesa no nisy an’i Hebera lehilahy kenita. Noho izy tafasaraka tamin’ireo Kenita hafa taranak’i Hôbaba zaodahin’i Mosesy, dia nanorin-day teo akaikin’ny terebintan’i Tsahananîma
  - type: note
    content: 'zaodahin’i Mosesy: araka ny Nom 10.29. Tsahananîma: tanàna anaty faritra naftalita, voatsiahy koa ao amin’ny Jos 19.33.'
  - type: text
    content: ' izy.'
  '12':
  - type: text
    content: 'Dia notantaraina tamin’i Siserà fa niakatra any an-tendrombohitra Tabôra i Baràka, zanakalahin’i Abinôhama. '
  '13':
  - type: text
    content: Koa novoriny tao Harôseta-Gôima ny kalesiny vy sivinjato sy ny miaramilany rehetra; dia avy teo izy no nankany amin’ny renirano Kisôna.
  '14':
  - type: text
    content: 'Ary hoy i Debôrà tamin’i Baràka:'
  - type: text
    content: –Andao amin’izay fa anio no hanoloran’ny TOMPO an’i Siserà eo an-tananao. Ny TOMPO mihitsy no mandeha eo alohanao!
  - type: text
    content: 'Dia nidina avy teo an-tendrombohitra Tabôra i Baràka narahin’ireo vatan-dehilahiny nisy andiany folo. '
  '15':
  - type: text
    content: 'Tamin’izay no nataon’ny TOMPO nifanaritaka teo anoloany kosa i Siserà sy ny kalesiny mbamin’ny miaramilany rehetra. Niala tamin’ny kalesiny mihitsy aza i Siserà ka nandositra an-tongotra. '
  '16':
  - type: text
    content: Nanenjika ireo kalesy sy ny andian-tafiky ny fahavalony hatrany Harôseta-Gôima i Baràka; dia naringany tamin’ny sabatra avokoa ny miaramilan’i Siserà ka tsy nisy niangana na iray aza.
  '17':
  - type: text
    content: 'I Siserà dia nandositra an-tongotra hatrany amin’ny lain’i Jahela izay vadin’i Hebera lehilahy kenita, satria nihavana ny fianakavian’i Hebera sy i Jabîna mpanjakan’i Hatsôra. '
  '18':
  - type: text
    content: 'Ary niainga i Jahela mba hitsena an’i Siserà ka nanao taminy hoe:'
  - type: text
    content: –Midira, tompoko, midira ato amiko fa aza matahotra!
  - type: text
    content: 'Dia niditra tao an-dainy izy ka norakofany bodofotsy. '
  '19':
  - type: text
    content: 'Ary hoy izy tamin-dravehivavy:'
  - type: text
    content: –Mba omeo rano kely aho hosotroiko fa mangetaheta!
  - type: text
    content: 'Dia nanokatra ny '
  - type: text
    content: siny hoditra
  - type: text
    content: ' misy ronono i Jahela ka nampisotro azy; avy teo i Siserà dia norakofany bodofotsy indray. '
  '2':
  - type: text
    content: Koa natolotry ny TOMPO izy ho eo ambany fifehezan’i Jabîna, mpanjaka kanahanita, izay nanjaka tao Hatsôra. I Siserà, izay nonina tao Harôseta-Gôima
  - type: note
    content: 'Harôseta-Gôima: tanàna tsy fantatra mazava ny misy azy, kanefa angambaina ho ilay tanàna 15 km eo atsimo andrefan’i Haifà, eo anelanelan’ny renirano Kisôna (jereo 4.7 sy nta) sy ny fototry ny tendrombohitra Karmela.'
  - type: text
    content: ', no lehiben’ny tafiny. '
  '20':
  - type: text
    content: 'Ary hoy koa i Siserà taminy:'
  - type: text
    content: '–Mijanòna eo am-baravaran’ny tranolay; ka raha misy manontany anao hoe: «Misy olona ve ato?», dia valio hoe: «Tsia».'
  '21':
  - type: text
    content: 'Ary efa sasatra loatra i Siserà ka renoky ny torimaso. Dia naka tsimaday i Jahela, vadin’i Hebera, sady nandray tantanana ka nanatona moramora an’i Siserà. Ary natsatony teo amin’ny fihirifany ny tsimaday ka niboroaka hatramin’ny tany, dia maty i Siserà. '
  '22':
  - type: text
    content: 'Tamin’izay no tonga i Baràka izay nanenjika an’i Siserà; koa niainga hitsena azy i Jahela ary nanao taminy hoe:'
  - type: text
    content: –Avia, fa hasehoko anao ilay lehilahy tadiavinao.
  - type: text
    content: Dia niditra tao an-dainy izy, ka nahita an’i Siserà efa maty mitsitra eo amin’ny tany sady gorobaky ny tsimaday ny fihirifany.
  '23':
  - type: text
    content: 'Tamin’izany andro izany no naetrin’Andriamanitra teo anatrehan’ny Israelita i Jabîna mpanjaka kanahanita. '
  '24':
  - type: text
    content: Fa nihamafy hatrany ny famelezan’ny Israelita azy ambara-pahafatiny azy mihitsy.
  '3':
  - type: text
    content: Nanana kalesy vy
  - type: note
    content: 'kalesy vy: jereo Jos 17.16 sy nta.'
  - type: text
    content: ' sivinjato i Jabîna ary nampahory fatratra ny Israelita nandritra ny roapolo taona; koa niantso vonjy tamin’ny TOMPO ireo.'
  '4':
  - type: text
    content: 'Tamin’izany fotoana izany dia i Debôrà, '
  - type: text
    content: mpaminanivavy
  - type: text
    content: ' vadin’i Lapidôta, no mpitsara nitondra an’i Israely. '
  '5':
  - type: text
    content: Ny sezam-pitsarana nipetrahan’i Debôrà dia teo ambany hazo rofia, izay nantsoina tatỳ aoriana hoe «Hazo Rofian’i Debôrà», teo anelanelan’i Ramà
  - type: note
    content: 'Ramà: tanàna teo amin’ny km vitsivitsy avaratr’i Jerosalema.'
  - type: text
    content: ' sy i Betela, any amin’ny faritra be tendrombohitra any Efraîma. Niakatra tany ny Israelita rehefa hotsaraina. '
  '6':
  - type: text
    content: 'Indray andro i Debôrà dia nampiantso an’i Baràka zanakalahin’i Abinôhama; nampiantsoiny avy any Kedesa any amin’ny faritra naftalîta izy ka nilazany hoe:'
  - type: text
    content: '–Izao no andidian’ny TOMPO Andriamanitr’i Israely anao: Mandehana maka vatan-dehilahy andiany folo avy amin’ny fokon’i Naftalỳ sy i Zebolòna, ka tariho any an-tendrombohitra Tabôra'
  - type: note
    content: 'Ny tendrombohitra Tabôra: jereo ny naoty momba ny Jos 19.22.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Fa hoentaniko i Siserà lehiben’ny tafik’i Jabîna ho tonga eo amoron’ny renirano Kisôna
  - type: note
    content: Ny renirano Kisôna dia manaraka ny lafiny avaratra amin’ny tendrombohitra Karmela ary mivarina an-dranomasina eo akaikin’i Haifà.
  - type: text
    content: ' mba hanafika anao miaraka amin’ny kalesiny sy ny andian-tafiny; dia hatolotro eo an-tananao izy.'
  '8':
  - type: text
    content: 'Fa namaly an’i Debôrà i Baràka nanao hoe:'
  - type: text
    content: –Raha handeha hiaraka amiko ianao, dia handeha aho; fa raha tsy handeha hiaraka amiko kosa ianao, dia tsy handeha aho.
  '9':
  - type: text
    content: 'Ka hoy i Debôrà taminy:'
  - type: text
    content: –Handeha hiaraka aminao aho, saingy tsy hisy voninahitra ho anao izao dia halehanao izao, satria ho eo an-tanam-behivavy no hanoloran’ny TOMPO an’i Siserà.
  - type: text
    content: 'Dia nandeha ho any Kedesa niaraka tamin’i Baràka i Debôrà. '
