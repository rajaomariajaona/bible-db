document_id: JDG.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Debôrà sy i Baràka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa maty i Ehoda, dia nanao izay ratsy eo imason’ny TOMPO indray ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa natolotry ny TOMPO izy ho eo ambany fifehezan’i Jabîna, mpanjaka kanahanita, izay nanjaka tao Hatsôra. I Siserà, izay nonina tao Harôseta-Gôima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Harôseta-Gôima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tsy fantatra mazava ny misy azy, kanefa angambaina ho ilay tanàna 15 km eo atsimo andrefan’i Haifà, eo anelanelan’ny renirano Kisôna (jereo 4.7 sy nta) sy ny fototry ny tendrombohitra Karmela.
    marker-yv: yv-n
  - type: text
    text: ', no lehiben’ny tafiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nanana kalesy vy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kalesy vy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 17.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' sivinjato i Jabîna ary nampahory fatratra ny Israelita nandritra ny roapolo taona; koa niantso vonjy tamin’ny TOMPO ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’izany fotoana izany dia i Debôrà, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminanivavy
  - type: text
    text: ' vadin’i Lapidôta, no mpitsara nitondra an’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny sezam-pitsarana nipetrahan’i Debôrà dia teo ambany hazo rofia, izay nantsoina tatỳ aoriana hoe «Hazo Rofian’i Debôrà», teo anelanelan’i Ramà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ramà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna teo amin’ny km vitsivitsy avaratr’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' sy i Betela, any amin’ny faritra be tendrombohitra any Efraîma. Niakatra tany ny Israelita rehefa hotsaraina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indray andro i Debôrà dia nampiantso an’i Baràka zanakalahin’i Abinôhama; nampiantsoiny avy any Kedesa any amin’ny faritra naftalîta izy ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no andidian’ny TOMPO Andriamanitr’i Israely anao: Mandehana maka vatan-dehilahy andiany folo avy amin’ny fokon’i Naftalỳ sy i Zebolòna, ka tariho any an-tendrombohitra Tabôra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tendrombohitra Tabôra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny naoty momba ny Jos 19.22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa hoentaniko i Siserà lehiben’ny tafik’i Jabîna ho tonga eo amoron’ny renirano Kisôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny renirano Kisôna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia manaraka ny lafiny avaratra amin’ny tendrombohitra Karmela ary mivarina an-dranomasina eo akaikin’i Haifà.
    marker-yv: yv-n
  - type: text
    text: ' mba hanafika anao miaraka amin’ny kalesiny sy ny andian-tafiny; dia hatolotro eo an-tananao izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa namaly an’i Debôrà i Baràka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha handeha hiaraka amiko ianao, dia handeha aho; fa raha tsy handeha hiaraka amiko kosa ianao, dia tsy handeha aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ka hoy i Debôrà taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handeha hiaraka aminao aho, saingy tsy hisy voninahitra ho anao izao dia halehanao izao, satria ho eo an-tanam-behivavy no hanoloran’ny TOMPO an’i Siserà.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nandeha ho any Kedesa niaraka tamin’i Baràka i Debôrà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nangonin’i Baràka tao ny vatan-dehilahy zebolonîta sy naftalita. Andiany folo no nanaraka azy teny an-tendrombohitra Tabôra, ary niakatra niaraka taminy koa i Debôrà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tao akaikin’i Kedesa no nisy an’i Hebera lehilahy kenita. Noho izy tafasaraka tamin’ireo Kenita hafa taranak’i Hôbaba zaodahin’i Mosesy, dia nanorin-day teo akaikin’ny terebintan’i Tsahananîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zaodahin’i Mosesy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny Nom 10.29. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsahananîma:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tanàna anaty faritra naftalita, voatsiahy koa ao amin’ny Jos 19.33.'
    marker-yv: yv-n
  - type: text
    text: ' izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia notantaraina tamin’i Siserà fa niakatra any an-tendrombohitra Tabôra i Baràka, zanakalahin’i Abinôhama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa novoriny tao Harôseta-Gôima ny kalesiny vy sivinjato sy ny miaramilany rehetra; dia avy teo izy no nankany amin’ny renirano Kisôna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy i Debôrà tamin’i Baràka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andao amin’izay fa anio no hanoloran’ny TOMPO an’i Siserà eo an-tananao. Ny TOMPO mihitsy no mandeha eo alohanao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nidina avy teo an-tendrombohitra Tabôra i Baràka narahin’ireo vatan-dehilahiny nisy andiany folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin’izay no nataon’ny TOMPO nifanaritaka teo anoloany kosa i Siserà sy ny kalesiny mbamin’ny miaramilany rehetra. Niala tamin’ny kalesiny mihitsy aza i Siserà ka nandositra an-tongotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nanenjika ireo kalesy sy ny andian-tafiky ny fahavalony hatrany Harôseta-Gôima i Baràka; dia naringany tamin’ny sabatra avokoa ny miaramilan’i Siserà ka tsy nisy niangana na iray aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I Siserà dia nandositra an-tongotra hatrany amin’ny lain’i Jahela izay vadin’i Hebera lehilahy kenita, satria nihavana ny fianakavian’i Hebera sy i Jabîna mpanjakan’i Hatsôra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niainga i Jahela mba hitsena an’i Siserà ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Midira, tompoko, midira ato amiko fa aza matahotra!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niditra tao an-dainy izy ka norakofany bodofotsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy izy tamin-dravehivavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba omeo rano kely aho hosotroiko fa mangetaheta!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanokatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: siny hoditra
  - type: text
    text: ' misy ronono i Jahela ka nampisotro azy; avy teo i Siserà dia norakofany bodofotsy indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy koa i Siserà taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mijanòna eo am-baravaran’ny tranolay; ka raha misy manontany anao hoe: «Misy olona ve ato?», dia valio hoe: «Tsia».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary efa sasatra loatra i Siserà ka renoky ny torimaso. Dia naka tsimaday i Jahela, vadin’i Hebera, sady nandray tantanana ka nanatona moramora an’i Siserà. Ary natsatony teo amin’ny fihirifany ny tsimaday ka niboroaka hatramin’ny tany, dia maty i Siserà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’izay no tonga i Baràka izay nanenjika an’i Siserà; koa niainga hitsena azy i Jahela ary nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia, fa hasehoko anao ilay lehilahy tadiavinao.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia niditra tao an-dainy izy, ka nahita an’i Siserà efa maty mitsitra eo amin’ny tany sady gorobaky ny tsimaday ny fihirifany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’izany andro izany no naetrin’Andriamanitra teo anatrehan’ny Israelita i Jabîna mpanjaka kanahanita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa nihamafy hatrany ny famelezan’ny Israelita azy ambara-pahafatiny azy mihitsy.
