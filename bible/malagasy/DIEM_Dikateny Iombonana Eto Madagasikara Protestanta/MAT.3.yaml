document_id: MAT.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny asan’i Jôhany Mpanao batisa
  - type: heading
    content: (Jereo Mk 1.1-8; Lk 3.1-18; Jôh 1.19-28)
  - type: text
    content: Tamin’izany vaninandro izany, dia niseho tany an-taniefitr’i Jodea
  - type: note
    content: 'taniefitr’i Jodea: faritany tsy misy mponina firy teo anelanelan’i Jerosalema sy i Hebrôna ary ny Ranomasina Maty sy ny ony Jôrdàna tapany ambany.'
  - type: text
    content: ' i Jôhany Mpanao batisa, ary nanao antso avo hoe:'
  '10':
  - type: text
    content: 'Indro efa eo am-poto-kazo ny famaky: ka ny hazo rehetra tsy mamoa voa tsara dia hokapaina ary hatsipy ao anaty afo.'
  '11':
  - type: text
    content: 'Hoy koa i Jôhany:'
  - type: text
    content: '–Ny ahy, ao amin’ny rano no anaovako '
  - type: text
    content: batisa
  - type: text
    content: ' anareo ho mariky ny fialana amin’ny toetra ratsy. Fa Ilay tamy aoriako dia mahery noho izaho ary tsy mendrika hivimbina ny kapany akory aho; ny Azy dia ao amin’ny Fanahy Masina sy afo no hanaovany batisa anareo. '
  '12':
  - type: text
    content: Efa eny an-tanany ny fikororohana
  - type: note
    content: 'fikororohana: fitaovana mitovitovy amin’ny «fourche» ka ampiasaina hanavahana ny vary sy ny mololo eo am-pamoloana. Tsy mitovy velively amin’ny hoe fikororoham-bary atỳ amintsika.'
  - type: text
    content: ' ary hodioviny tanteraka ny vary eo am-pamoloana; ka ny vary moa hangoniny an-tsompitra, fa ny mololo kosa hodorany amin’ny afo tsy mitsaha-mirehitra.'
  - type: heading
    content: Ataon’i Jôhany batisa i Jesoa
  - type: heading
    content: (Jereo Mk 1.9-11; Lk 3.21-22)
  '13':
  - type: text
    content: 'Tamin’izay dia niseho i Jesoa; avy any Galilea Izy no nanatona an’i Jôhany teo amoron’i Jôrdàna mba hataony '
  - type: text
    content: batisa
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Nandà mafy i Jôhany ka nanao hoe:'
  - type: text
    content: –Izaho no tokony hataonao batisa, ka Ianao indray ve no mankatỳ amiko?
  '15':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Ekeo ihany aloha, fa izany no tsy maintsy anatontosantsika ny zavatra rehetra voasoritr’Andriamanitra.
  - type: text
    content: 'Izay vao nanaiky i Jôhany. '
  '16':
  - type: text
    content: 'Nony vita batisa i Jesoa, dia niala avy hatrany tao anaty rano. Ary indro nisokatra tamin’i Jesoa ny lanitra ka hitany ny Fanahin’Andriamanitra nidina tahaka ny voromahailala nankeo amboniny. '
  '17':
  - type: text
    content: 'Dia injany nisy feo avy tany an-danitra nanao hoe:'
  - type: text
    content: –Ity no Zanako, ilay Malalako; Izy no sitrako
  - type: note
    content: Ampit Sal 2.7; Is 42.1.
  - type: text
    content: '!'
  '2':
  - type: text
    content: –Ialao ny toe-dratsy
  - type: note
    content: 'Ialao ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ' fa efa akaiky ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: '!'
  '3':
  - type: text
    content: 'Izy no ilay voalazan’ny Tompo tamin’ny alalan’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: '«Injany misy feon’olona miantso mafy ao an-taniefitra hoe:'
  - type: text
    content: Amboary ny lalan’ny Tompo;
  - type: text
    content: ahitsio ny hizorany
  - type: note
    content: Is 40.3, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!»'
  '4':
  - type: text
    content: Akanjo volon-drameva ary fehikibo hoditra no fanaovan’i Jôhany; valala sy tantely remby no sakafony
  - type: note
    content: Jereo 2 Mp 1.8.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Tamin’izay dia nirohotra nankany amin’i Jôhany ny olona avy any Jerosalema sy avy any Jodea lafy valo mbamin’ny faritany rehetra amoron’ny ony Jôrdàna; '
  '6':
  - type: text
    content: ary niaiky heloka izy ireo ka dia nataon’i Jôhany batisa tao Jôrdàna.
  '7':
  - type: text
    content: 'Rehefa hitan’i Jôhany ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' sy ny '
  - type: text
    content: Tsadoseanina
  - type: text
    content: ' maro nanatona azy mba hataony '
  - type: text
    content: batisa
  - type: text
    content: ', dia nilazany hoe:'
  - type: text
    content: '–Ry tarana-menarana, iza no nanoro hevitra anareo mba handositra tsy ho tratra amin’ny hatezeran’Andriamanitra izay efa antomotra. '
  '8':
  - type: text
    content: 'Asehoy amin’ny fitondrantena mendrika fa nialanareo tokoa ny toe-dratsinareo. '
  '9':
  - type: text
    content: 'Ary aza mihambo anakampo hoe: manana an’i Abrahama ho razambenay izahay'
  - type: note
    content: Ampit Jôh 8.33,37,39.
  - type: text
    content: '! Satria lazaiko aminareo fa hain’Andriamanitra atao ny manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
