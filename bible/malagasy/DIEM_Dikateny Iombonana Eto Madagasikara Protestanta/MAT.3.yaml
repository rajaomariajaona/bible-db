document_id: MAT.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny asan’i Jôhany Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 1.1-8; Lk 3.1-18; Jôh 1.19-28)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tamin’izany vaninandro izany, dia niseho tany an-taniefitr’i Jodea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'taniefitr’i Jodea: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: faritany tsy misy mponina firy teo anelanelan’i Jerosalema sy i Hebrôna ary ny Ranomasina Maty sy ny ony Jôrdàna tapany ambany.
      marker-yv: yv-n
    - type: text
      text: ' i Jôhany Mpanao batisa, ary nanao antso avo hoe:'
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Indro efa eo am-poto-kazo ny famaky: ka ny hazo rehetra tsy mamoa voa tsara dia hokapaina ary hatsipy ao anaty afo.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy koa i Jôhany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny ahy, ao amin’ny rano no anaovako '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' anareo ho mariky ny fialana amin’ny toetra ratsy. Fa Ilay tamy aoriako dia mahery noho izaho ary tsy mendrika hivimbina ny kapany akory aho; ny Azy dia ao amin’ny Fanahy Masina sy afo no hanaovany batisa anareo. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Efa eny an-tanany ny fikororohana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fikororohana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fitaovana mitovitovy amin’ny «fourche» ka ampiasaina hanavahana ny vary sy ny mololo eo am-pamoloana. Tsy mitovy velively amin’ny hoe fikororoham-bary atỳ amintsika.
      marker-yv: yv-n
    - type: text
      text: ' ary hodioviny tanteraka ny vary eo am-pamoloana; ka ny vary moa hangoniny an-tsompitra, fa ny mololo kosa hodorany amin’ny afo tsy mitsaha-mirehitra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ataon’i Jôhany batisa i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 1.9-11; Lk 3.21-22)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tamin’izay dia niseho i Jesoa; avy any Galilea Izy no nanatona an’i Jôhany teo amoron’i Jôrdàna mba hataony '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nandà mafy i Jôhany ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho no tokony hataonao batisa, ka Ianao indray ve no mankatỳ amiko?
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ekeo ihany aloha, fa izany no tsy maintsy anatontosantsika ny zavatra rehetra voasoritr’Andriamanitra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay vao nanaiky i Jôhany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nony vita batisa i Jesoa, dia niala avy hatrany tao anaty rano. Ary indro nisokatra tamin’i Jesoa ny lanitra ka hitany ny Fanahin’Andriamanitra nidina tahaka ny voromahailala nankeo amboniny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia injany nisy feo avy tany an-danitra nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ity no Zanako, ilay Malalako; Izy no sitrako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 2.7; Is 42.1.
      marker-yv: yv-n
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: –Ialao ny toe-dratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ialao ny toe-dratsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
      marker-yv: yv-n
    - type: text
      text: ' fa efa akaiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’ny lanitra
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izy no ilay voalazan’ny Tompo tamin’ny alalan’i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Injany misy feon’olona miantso mafy ao an-taniefitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboary ny lalan’ny Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ahitsio ny hizorany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 40.3, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Akanjo volon-drameva ary fehikibo hoditra no fanaovan’i Jôhany; valala sy tantely remby no sakafony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 1.8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tamin’izay dia nirohotra nankany amin’i Jôhany ny olona avy any Jerosalema sy avy any Jodea lafy valo mbamin’ny faritany rehetra amoron’ny ony Jôrdàna; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ary niaiky heloka izy ireo ka dia nataon’i Jôhany batisa tao Jôrdàna.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa hitan’i Jôhany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsadoseanina
    - type: text
      text: ' maro nanatona azy mba hataony '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ', dia nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry tarana-menarana, iza no nanoro hevitra anareo mba handositra tsy ho tratra amin’ny hatezeran’Andriamanitra izay efa antomotra. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Asehoy amin’ny fitondrantena mendrika fa nialanareo tokoa ny toe-dratsinareo. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary aza mihambo anakampo hoe: manana an’i Abrahama ho razambenay izahay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 8.33,37,39.
      marker-yv: yv-n
    - type: text
      text: '! Satria lazaiko aminareo fa hain’Andriamanitra atao ny manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
