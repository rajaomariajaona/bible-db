document_id: 1KI.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tohin’ny fanjakan’i Jerôbohama I
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany, dia narary i Abià zanakalahin’i Jerôbohama. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany no hampiharako loza amin’ny fianakavianao, ry Jerôbohama; ka handringanako ny lehilahy rehetra amin’ny taminganao na zaza na olon-dehibe manerana an’i Israely, ary hofafako tanteraka toy ny famafa fako ny sisa amin’ny fianakavianao. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa izay taminganao maty ao an-tanàna dia hohanin’ny alika, ary izay maty any an-tsaha kosa dia hohanin’ny voro-manidina.» Izany no efa nambaran’ny TOMPO.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy indray i Ahià mpaminany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianao kosa, ry vadin’i Jerôbohama, mitsangàna ka modia any an-tranonao; fa raha vantany vao mandia ny tanàna ny tongotrao, dia ho faty io zanakao lahy io. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia hanaovan’ny vahoaka Israely rehetra fisaonana izy ka haleviny. Fa izy irery amin’ny taranak’i Jerôbohama rehetra no halevina am-pasana, satria izy irery ihany tamin’izany fianakaviana izany no mba nahitan’ny TOMPO Andriamanitr’i Israely zavatra tsara. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ny TOMPO dia hanangana ho an’i Israely mpanjaka vaovao, izay handringana ny taranak’i Jerôbohama. Amin’ity andro anio ity izany. Ahoana hoe? Izao ankehitriny izao ihany izany. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny TOMPO hamely ny Israelita ka hampipararetra azy toy ny volotara hetsiketsehan’ny rano sady hanongotra azy amin’ity tany soa izay nomeny ny razany ity ary hanely azy any an-dafin’ny ony Eofrata, satria nanao tsatokazo fanajana an’i Aserà izy ka nampahatezitra ny TOMPO. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hanolotra an’i Israely amim-pahavalo Izy noho ireo fahotana nataon’i Jerôbohama sady nampanaoviny an’i Israely.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana ny vadin’i Jerôbohama ka lasa ary tonga tany Tiritsà. Koa rehefa nanitsaka ny tokonam-baravaran’ny tranony izy, dia maty ilay zanany lahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nalevina io sady nanaovan’ny vahoaka Israely rehetra fisaonana, araka ny tenin’ny TOMPO tamin’ny alalan’i Ahià mpaminany mpanompony.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Jerôbohama ary koa ny ady nataony sy ny fomba nanjakany dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Israely
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jerôbohama tamin’ny vadiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha re miova endrika ianao mba tsy ho fantatr’olona ho vadiko; dia mankanesa any Silao izay misy an’i Ahià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ', ilay nilaza tamiko fa ho tonga mpanjakan’ity firenena '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' ity aho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny nanjakàn’i Jerôbohama dia naharitra 22 taona; ary rehefa lasa nodimandry any amin’ny razany izy, dia i Nadaba zanany lahy no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tohin’ny fanjakan’i Rehabohama mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 12.1-16)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Feno 41 taona i Rehabohama zanakalahin’i Salômôna fony vao nanjaka tamin’i Joda; ary naharitra 17 taona no nanjakany tao Jerosalema, dia ilay tanàna nofidin’ny TOMPO tamin’ireo fokon’i Israely rehetra mba hampitoerany ny voninahiny. Ny anaran-dreniny dia i Nahamà, izay hamônita. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy eo imason’ny TOMPO ny mponin’i Joda ka ny fahotana vitany nampahasaro-piaro Azy mihoatra noho ny fahotana vitan’ny razany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa nanorina toeram-panasinana koa izy sady nanao tsangambaton-tsampy sy tsatokazo fanajana an’i Aserà teny an-tampon-kavoana sy teny ambany hazo midoroboka rehetra teny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 17.9-10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy aza lehilahy sy vehivavy izay nitolo-tena hijangajanga ho fanompoan-tsampy teo amin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 23.17.
      marker-yv: yv-n
    - type: text
      text: ', ka narahiny avokoa ny zava-maharikoriko rehetra fanaon’ny firenena izay efa noroahin’ny TOMPO teo anoloan’ny Israelita.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny taona fahadimy nanjakan’i Rehabohama dia niakatra i Sisàka mpanjakan’i Ejipta mba hamely an’i Jerosalema, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka namabo ny raki-tsoa tao an-tranon’ny TOMPO sy tao an-dapan’ny mpanjaka; nobaboiny avokoa ireo, indrindra ny ampinga volamena rehetra nataon’i Salômôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 10.16-17; 2 Tan 9.15-16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho solon’ireny kosa dia nampanao ampinga halimo i Rehabohama; ka ny lehiben’ny mpiambina, izay niandry ireo varavaran’ny lapan’ny mpanjaka, no nanankinany azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na oviana na oviana nidiran’ny mpanjaka tao an-tranon’ny TOMPO, dia naka ireo ampinga ireo ny mpiambina ka avy eo namerina azy ho ao an’efitranon’ny mpiambina indray.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Rehabohama ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Joda
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mitondrà mofo folo sy mofomamy ary tantely iray tavoara, dia mankanesa ao aminy, fa hambarany aminao izay hanjo ity zanatsika ity.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy mandrakariva ny ady teo amin’i Rehabohama sy i Jerôbohama. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany i Rehabohama, dia nalevina am-pasan-drazana tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: . Ny anaran-dreniny dia Nahamà, izay Hamônita; ary i Abiama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Abiama: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny stf hebreo vitsivitsy sy ny dkt tranainy maro ary ny rijan-teny mirazotra aminy ao amin’ny 2 Tan 12.16 dia miantso io olona io hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abià
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: zanany lahy no nanjaka nandimby azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nataon’ny vadin’i Jerôbohama izany; ka niainga nankany Silao izy ary niditra tao an-tranon’i Ahià. Tsy nahita intsony anefa ny mason’i Ahià noho ny fahanterany; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saingy ny TOMPO kosa efa nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro ho avy hanontany anao ny momba an-janany marary ny vadin’i Jerôbohama; ka izao sy izao avy no holazainao aminy, satria hody olon-kafa izy rehefa tonga.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa rehefa ren’i Ahià ny fingodongodon’ny tongo-dravehivavy nandingana ny tokonam-baravarana, dia hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandrosoa, ry vadin’i Jerôbohama, fa nahoana ianao no mody olon-kafa? Nirahina hanambara vaovao ratsy aminao aho. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa mandehana ka lazao amin’i Jerôbohama fa izao no lazain’ny TOMPO Andriamanitr’i Israely: «Efa nasandratro avy tamin’ny sarambaben’olona ianao ary notendreko ho filohan’i Israely vahoakako; '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'efa nesoriko ny fanjakana ho afaka tamin’ny taranak’i Davida ka nomeko anao; nefa ianao tsy mba nanao tahaka an’i Davida mpanompoko izay nitandrina ny didiko sy nanaraka Ahy tamin’ny fony manontolo ka tsy nanao afa-tsy izay mahitsy eo imasoko. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ratsy kokoa noho izay vitan’ireo rehetra talohanao no nataonao, satria namboatra andriamani-kafa sy sarivongana voarendrika hampahatezitra Ahy ianao ary efa nanilika Ahy any ivohonao. '
