document_id: 1CH.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Voahosotra ho mpanjakan’i Israely i Davida
  - type: heading
    content: (Jereo 2 Sam 5.1-3)
  - type: text
    content: Dia nivory teo amin’i Davida tao Hebrôna
  - type: note
    content: 'Hebrôna: jereo 2 Sam 2.1-4.'
  - type: text
    content: ' i Israely manontolo ka nanao hoe:'
  - type: text
    content: '–Indreto izahay havanao sy tapakao. '
  '10':
  - type: text
    content: 'Ireto no filohan’ireo kalazan’i Davida, dia ireo kalaza nifikitra taminy nandritra ny nanjakany, ka efa niaraka tamin’i Israely lafy valo mba hampanjaka azy teo amin’i Israely araka ny tenin’ny TOMPO. '
  '11':
  - type: text
    content: Izao no lisitr’ireo kalazan’i Davida
  - type: note
    content: 'kalazan’i Davida: jereo 2 Sam 23.8 sy nta.'
  - type: text
    content: ':'
  - type: text
    content: I Isbahala, zanakalahin’i Hakmônỳ sady filohan’ny «Tariky ny telo lahy». Izy no ilay nampandihy lefona hamelezana fahavalo telonjato lahy ka nahafaty azy tamin’ny ady indray mandeha monja.
  '12':
  - type: text
    content: 'Manaraka azy dia i Elehazara, zanakalahin’i Dôday avy any Ahôa sady anisan’ny «Tariky ny telo lahy» kalaza. '
  '13':
  - type: text
    content: 'Niaraka tamin’i Davida izy tao Efesa-Damîna raha tafangona hiady tao ny Filistinina, ka vaky nandositra ny tafik’i Israely. Ary nisy tanimbary feno vary ôrza tao an-tsaha; '
  '14':
  - type: text
    content: koa nanotrika tao afovoan’ny tanimbary i Elehazara sy ny olony, ka sady nanavotra ny tanimbary no namely ny Filistinina. Dia nomen’ny TOMPO fandresena miezinezina i Israely
  - type: note
    content: I Samà no fahatelo (jereo 2 Sam 23.11-12) saingy toa voadingana eto.
  - type: text
    content: .
  '15':
  - type: text
    content: Indray andro, dia nisy telo lahy anisan’ny «andian’ny telopolo lahy» nidina ho eny amin’i Davida teo amin’ny harambato akaikin’ny zohin’i Hadolama, fa nisy tafiky ny Filistinina nitoby tao an-dohasahan’ny Refaîta
  - type: note
    content: 'Hadolama: jereo 1 Sam 22.1 sy nta. –ny lohasahan’ny Refaîta: jereo 2 Sam 5.18 sy nta.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary i Davida efa tao amin’ny fiereny raha mby tao Betlehema ny andia-miaramilan’ny Filistinina. '
  '17':
  - type: text
    content: 'Tamin’izay, dia velom-paniriana tampoka i Davida ka nanao hoe:'
  - type: text
    content: –Iza no hitondra rano hosotroiko avy amin’ilay fantsakana eo akaikin’ny vavahadin’i Betlehema?
  '18':
  - type: text
    content: 'Dia namakivaky ny tobin’ny Filistinina izy telo lahy ireto ka nanovo rano tamin’ilay fantsakana teo akaikin’ny vavahadin’i Betlehema, ary nitondra izany ho any amin’i Davida; kanjo tsy nety nisotro i Davida fa nanolotra izany ho an’ny TOMPO kosa ho fanatitra araraka, '
  '19':
  - type: text
    content: 'sady hoy izy hoe:'
  - type: text
    content: –Fady ahy eo anatrehan’Andriamanitra ny hisotro izany, fa midika ho misotro ny ran’ireo lehilahy nandeha nanao vy very ny ainy naka azy!
  - type: text
    content: Koa tsy nety nisotro i Davida.
  - type: text
    content: Izany no zava-bitan’ireo telo lahy maherifo ireo.
  '2':
  - type: text
    content: 'Fahiny, fony mbola nanjaka aza i Saoly, dia ianao ihany no mpitarika ny miaramilan’i Israely tamin’ny ady. Ary ny TOMPO Andriamanitrao efa nilaza taminao hoe: «Ianao no hitondra ilay Israely vahoakako, ary ianao no ho mpanapaka azy.»'
  '20':
  - type: text
    content: 'I Abisay, rahalahin’i Jôaba, no filohan’ny «andian’ny telopolo lahy». Izy no ilay nampandihy lefona hamelezana fahavalo telonjato lahy ka nahafaty azy, kanefa tsy tafiditra anarana tao anatin’ny «Tariky ny telo lahy». '
  '21':
  - type: text
    content: Nomen-kaja avo roa heny kosa i Abisay teo amin’ny «andian’ny telopolo lahy» ka lasa lehibeny; saingy tsy afaka nifaninana tamin’ny «Tariky ny telo lahy» izy.
  '22':
  - type: text
    content: 'I Benaià, avy any Kabitseela, dia zanakalahin’i Jôiadà sady zafikelin’ny miaramila anankiray maherifo. Nahavita asa goavana maro i Benaià: izy no nahafaty ireo Ariela roa lahy avy any Môaba; izy koa ilay nidina tanaty lavaka iray ka nahafaty liona tao tamin’ny indray andro nisy oram-panala. '
  '23':
  - type: text
    content: 'Mbola izy koa no nahafaty ilay Ejiptianina izay roa metatra sy sasany ny halàvany sady nirongo lefona lehibe toy ny voditenon’ny mpanenona. Tehina no namelezany azy, dia nosarihany teny an-tanan’ilay Ejiptianina ny lefony ka iny ihany no namonoany azy ho faty. '
  '24':
  - type: text
    content: 'Ireo no zava-bitan’i Benaià, zanakalahin’i Jôiadà; kanefa tsy tafiditra anarana tao anatin’ny «Tariky ny telo lahy» kalaza izy. '
  '25':
  - type: text
    content: Nomen-kaja i Benaià tao amin’ny «andian’ny telopolo lahy», kanefa tsy afaka nifaninana tamin’ny «Tariky ny telo lahy». Izy no voatendrin’i Davida hifehy ny mpiambina azy.
  '26':
  - type: text
    content: 'Ireto kosa ny kalaza maherifo hafa: i Hasahela, rahalahin’i Jôaba; i Elehanàna, zanakalahin’i Dôday, avy any Betlehema; '
  '27':
  - type: text
    content: i Samôta
  - type: note
    content: 'Samôta: antsoina koa hoe Samà ao amin’ny 2 Sam 23.25.'
  - type: text
    content: ', avy any Harôra; i Heletsa, avy any Palôna; '
  '28':
  - type: text
    content: 'i Hirà, zanakalahin’i Hikesy, avy any Tekôa; i Abihezera, avy any Hanatôta; '
  '29':
  - type: text
    content: 'i Sibekay, avy any Hosà; i Hilay, avy any Ahôa; '
  '3':
  - type: text
    content: 'Tonga tao amin’ny mpanjaka tao Hebrôna avokoa ny '
  - type: text
    content: loholon
  - type: text
    content: ’i Israely. Ary tao Hebrôna dia nanaovan’i Davida fanekempihavanana teo anatrehan’ny TOMPO ry zareo, ka nanosotra azy ho mpanjakan’i Israely araka ny tenin’ny TOMPO nampilazainy an’i Samoela.
  - type: heading
    content: Naka ny tanànan’i Jerosalema i Davida
  - type: heading
    content: (Jereo 2 Sam 5.6-10)
  '30':
  - type: text
    content: 'i Maheray, avy ao Netôfà; i Heleda, zanakalahin’i Bahanà, avy any Netôfà; '
  '31':
  - type: text
    content: 'i Itahy, zanakalahin’i Ribay, avy any Gibehà-n’ireo taranak’i Benjamîna; i Benaià, avy any Pirehatôna; '
  '32':
  - type: text
    content: i Horay, avy any amin’ny lohasahan-driakan’i Gahasa; i Abiela
  - type: note
    content: 'Abiela: tokony hoe Abibahala; ampit 2 Sam 23.31.'
  - type: text
    content: ', avy any Harabà; '
  '33':
  - type: text
    content: 'i Hazmavety, avy any Bahorîma; i Eliahabà, avy any Sahalbôna; '
  '34':
  - type: text
    content: 'i Hasema, avy any Gizôna; i Jônatàna, zanakalahin’i Sagè, avy any Harara; '
  '35':
  - type: text
    content: 'i Ahiama, zanakalahin’i Sakara, avy any Harara; i Elifala, zanakalahin’i Ora; '
  '36':
  - type: text
    content: 'i Hefera, avy any Mekerà; i Ahià, avy any Palôna; '
  '37':
  - type: text
    content: 'i Hetsirao, avy any Karmela; i Naharay, zanakalahin’i Ezbay; '
  '38':
  - type: text
    content: i Jôela, rahalahin’i Natàna; i Mibihara, zanakalahin’i Hagrỳ
  - type: note
    content: 'i Jôela... Hagrỳ: ampit 2 Sam 23.36 izay manao hoe i Jigala zanakalahin’i Natàna, avy any Tsôbà; i Banỳ avy amin’ny foko Gada.'
  - type: text
    content: '; '
  '39':
  - type: text
    content: 'i Tselèka, ilay Hamônita; i Naharay, avy any Beerôta, mpitondra ny fiadian’i Jôaba zanakalahin’i Tseroià; '
  '4':
  - type: text
    content: Ary nandeha i Davida sy ny Israelita rehetra hanao fahirano an’i Jerosalema, izay natao hoe Jebosa satria ny Jebosita
  - type: note
    content: 'Jebosita: jereo ny FTS amin’ny voambolana hoe AMÔRITA; jereo koa Jos 15.63; Mpits 1.21.'
  - type: text
    content: ', mponina tao amin’io faritany io, no nitoetra tao. '
  '40':
  - type: text
    content: 'i Hirà sy i Gareba, samy taranak’i Jetera; '
  '41':
  - type: text
    content: 'i Orià, ilay Hetita; i Zabada, zanakalahin’i Ahelay; '
  '42':
  - type: text
    content: 'i Hadinà, zanakalahin’i Sizà, anankiray amin’ireo lohandohan’ny foko robenita, sady ombàn’ny namany 30 lahy koa; '
  '43':
  - type: text
    content: 'i Hanàna, zanakalahin’i Mahekà; i Jôsafata, avy any Metèna; '
  '44':
  - type: text
    content: 'i Hozià, avy any Hastarôta; i Samà sy i Jehoela, samy zanakalahin’i Hôtama, avy any Harôhera; '
  '45':
  - type: text
    content: 'i Jedihaela, zanakalahin’i Simrỳ, sy i Jôhà rahalahiny, avy any Titsa; '
  '46':
  - type: text
    content: 'i Eliela, avy any Mahavà; i Jerihay sy i Jôsavià, zanakalahin’i Elnahama; i Jitmà, avy any Môaba; '
  '47':
  - type: text
    content: i Eliela sy Hôbeda ary i Jahasiela, avy any Tsôbà.
  '5':
  - type: text
    content: 'Dia hoy ireo mponina tao Jebosa tamin’i Davida:'
  - type: text
    content: –Tsy ho tafiditra ato an-tanànanay ianao!
  - type: text
    content: 'Kanjo azon’i Davida ihany ny tanànamimanda, dia i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' izay hatao hoe «'
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: '». '
  '6':
  - type: text
    content: 'Dia hoy i Davida: «Izay hamely voalohany ny Jebosita dia hatao filohan’ny tafika». Ary i Jôaba, zanakalahin’i Tseroià, no nanafika voalohany; koa izy no nanjary filohan’ny tafika.'
  '7':
  - type: text
    content: 'Ary nipetraka tao amin’ilay tanànamimanda i Davida, koa izany no niantsoana azy hoe «Tanànan’i Davida». '
  '8':
  - type: text
    content: Dia narafitr’i Davida ny tanàna manodidina, manomboka hatreo Milao
  - type: note
    content: 'Dia nanorina... sisa tamin’ny tanàna: tsy mazava ny RM eto, ka ampit 2 Sam 5.9 –Ny momba an’i Milao kosa dia jereo 1 Mp 9.15 sy nta.'
  - type: text
    content: ' ka miafara amin’ny trano fonenany; fa i Jôaba kosa no nanamboatra ny sisa tamin’ny tanàna.'
  '9':
  - type: text
    content: Dia nihanatanjaka hatrany i Davida, satria ny TOMPOn’izao rehetra izao no niaraka taminy.
  - type: heading
    content: Ireo kalazan’i Davida
  - type: heading
    content: (Jereo 2 Sam 23.8-39)
