document_id: 1CH.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voahosotra ho mpanjakan’i Israely i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 5.1-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia nivory teo amin’i Davida tao Hebrôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hebrôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 2.1-4.
    marker-yv: yv-n
  - type: text
    text: ' i Israely manontolo ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indreto izahay havanao sy tapakao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fahiny, fony mbola nanjaka aza i Saoly, dia ianao ihany no mpitarika ny miaramilan’i Israely tamin’ny ady. Ary ny TOMPO Andriamanitrao efa nilaza taminao hoe: «Ianao no hitondra ilay Israely vahoakako, ary ianao no ho mpanapaka azy.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tonga tao amin’ny mpanjaka tao Hebrôna avokoa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: ’i Israely. Ary tao Hebrôna dia nanaovan’i Davida fanekempihavanana teo anatrehan’ny TOMPO ry zareo, ka nanosotra azy ho mpanjakan’i Israely araka ny tenin’ny TOMPO nampilazainy an’i Samoela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naka ny tanànan’i Jerosalema i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 5.6-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary nandeha i Davida sy ny Israelita rehetra hanao fahirano an’i Jerosalema, izay natao hoe Jebosa satria ny Jebosita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jebosita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe AMÔRITA; jereo koa Jos 15.63; Mpits 1.21.
    marker-yv: yv-n
  - type: text
    text: ', mponina tao amin’io faritany io, no nitoetra tao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ireo mponina tao Jebosa tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ho tafiditra ato an-tanànanay ianao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Kanjo azon’i Davida ihany ny tanànamimanda, dia i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ' izay hatao hoe «'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: '». '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy i Davida: «Izay hamely voalohany ny Jebosita dia hatao filohan’ny tafika». Ary i Jôaba, zanakalahin’i Tseroià, no nanafika voalohany; koa izy no nanjary filohan’ny tafika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nipetraka tao amin’ilay tanànamimanda i Davida, koa izany no niantsoana azy hoe «Tanànan’i Davida». '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia narafitr’i Davida ny tanàna manodidina, manomboka hatreo Milao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Dia nanorina... sisa tamin’ny tanàna:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tsy mazava ny RM eto, ka ampit 2 Sam 5.9 –Ny momba an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Milao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' kosa dia jereo 1 Mp 9.15 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' ka miafara amin’ny trano fonenany; fa i Jôaba kosa no nanamboatra ny sisa tamin’ny tanàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nihanatanjaka hatrany i Davida, satria ny TOMPOn’izao rehetra izao no niaraka taminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo kalazan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 23.8-39)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ireto no filohan’ireo kalazan’i Davida, dia ireo kalaza nifikitra taminy nandritra ny nanjakany, ka efa niaraka tamin’i Israely lafy valo mba hampanjaka azy teo amin’i Israely araka ny tenin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izao no lisitr’ireo kalazan’i Davida
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kalazan’i Davida: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 23.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: p
  children:
  - type: text
    text: I Isbahala, zanakalahin’i Hakmônỳ sady filohan’ny «Tariky ny telo lahy». Izy no ilay nampandihy lefona hamelezana fahavalo telonjato lahy ka nahafaty azy tamin’ny ady indray mandeha monja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Manaraka azy dia i Elehazara, zanakalahin’i Dôday avy any Ahôa sady anisan’ny «Tariky ny telo lahy» kalaza. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Niaraka tamin’i Davida izy tao Efesa-Damîna raha tafangona hiady tao ny Filistinina, ka vaky nandositra ny tafik’i Israely. Ary nisy tanimbary feno vary ôrza tao an-tsaha; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: koa nanotrika tao afovoan’ny tanimbary i Elehazara sy ny olony, ka sady nanavotra ny tanimbary no namely ny Filistinina. Dia nomen’ny TOMPO fandresena miezinezina i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no fahatelo (jereo 2 Sam 23.11-12) saingy toa voadingana eto.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indray andro, dia nisy telo lahy anisan’ny «andian’ny telopolo lahy» nidina ho eny amin’i Davida teo amin’ny harambato akaikin’ny zohin’i Hadolama, fa nisy tafiky ny Filistinina nitoby tao an-dohasahan’ny Refaîta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hadolama: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 22.1 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny lohasahan’ny Refaîta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 2 Sam 5.18 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary i Davida efa tao amin’ny fiereny raha mby tao Betlehema ny andia-miaramilan’ny Filistinina. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’izay, dia velom-paniriana tampoka i Davida ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no hitondra rano hosotroiko avy amin’ilay fantsakana eo akaikin’ny vavahadin’i Betlehema?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia namakivaky ny tobin’ny Filistinina izy telo lahy ireto ka nanovo rano tamin’ilay fantsakana teo akaikin’ny vavahadin’i Betlehema, ary nitondra izany ho any amin’i Davida; kanjo tsy nety nisotro i Davida fa nanolotra izany ho an’ny TOMPO kosa ho fanatitra araraka, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sady hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fady ahy eo anatrehan’Andriamanitra ny hisotro izany, fa midika ho misotro ny ran’ireo lehilahy nandeha nanao vy very ny ainy naka azy!
- type: usfm
  marker: p
  children:
  - type: text
    text: Koa tsy nety nisotro i Davida.
- type: usfm
  marker: p
  children:
  - type: text
    text: Izany no zava-bitan’ireo telo lahy maherifo ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I Abisay, rahalahin’i Jôaba, no filohan’ny «andian’ny telopolo lahy». Izy no ilay nampandihy lefona hamelezana fahavalo telonjato lahy ka nahafaty azy, kanefa tsy tafiditra anarana tao anatin’ny «Tariky ny telo lahy». '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nomen-kaja avo roa heny kosa i Abisay teo amin’ny «andian’ny telopolo lahy» ka lasa lehibeny; saingy tsy afaka nifaninana tamin’ny «Tariky ny telo lahy» izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I Benaià, avy any Kabitseela, dia zanakalahin’i Jôiadà sady zafikelin’ny miaramila anankiray maherifo. Nahavita asa goavana maro i Benaià: izy no nahafaty ireo Ariela roa lahy avy any Môaba; izy koa ilay nidina tanaty lavaka iray ka nahafaty liona tao tamin’ny indray andro nisy oram-panala. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mbola izy koa no nahafaty ilay Ejiptianina izay roa metatra sy sasany ny halàvany sady nirongo lefona lehibe toy ny voditenon’ny mpanenona. Tehina no namelezany azy, dia nosarihany teny an-tanan’ilay Ejiptianina ny lefony ka iny ihany no namonoany azy ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ireo no zava-bitan’i Benaià, zanakalahin’i Jôiadà; kanefa tsy tafiditra anarana tao anatin’ny «Tariky ny telo lahy» kalaza izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nomen-kaja i Benaià tao amin’ny «andian’ny telopolo lahy», kanefa tsy afaka nifaninana tamin’ny «Tariky ny telo lahy». Izy no voatendrin’i Davida hifehy ny mpiambina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ireto kosa ny kalaza maherifo hafa: i Hasahela, rahalahin’i Jôaba; i Elehanàna, zanakalahin’i Dôday, avy any Betlehema; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: i Samôta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Samôta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'antsoina koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny 2 Sam 23.25.'
    marker-yv: yv-n
  - type: text
    text: ', avy any Harôra; i Heletsa, avy any Palôna; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'i Hirà, zanakalahin’i Hikesy, avy any Tekôa; i Abihezera, avy any Hanatôta; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'i Sibekay, avy any Hosà; i Hilay, avy any Ahôa; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'i Maheray, avy ao Netôfà; i Heleda, zanakalahin’i Bahanà, avy any Netôfà; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'i Itahy, zanakalahin’i Ribay, avy any Gibehà-n’ireo taranak’i Benjamîna; i Benaià, avy any Pirehatôna; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: i Horay, avy any amin’ny lohasahan-driakan’i Gahasa; i Abiela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Abiela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tokony hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abibahala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; ampit 2 Sam 23.31.
    marker-yv: yv-n
  - type: text
    text: ', avy any Harabà; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'i Hazmavety, avy any Bahorîma; i Eliahabà, avy any Sahalbôna; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'i Hasema, avy any Gizôna; i Jônatàna, zanakalahin’i Sagè, avy any Harara; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'i Ahiama, zanakalahin’i Sakara, avy any Harara; i Elifala, zanakalahin’i Ora; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'i Hefera, avy any Mekerà; i Ahià, avy any Palôna; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Hetsirao, avy any Karmela; i Naharay, zanakalahin’i Ezbay; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: i Jôela, rahalahin’i Natàna; i Mibihara, zanakalahin’i Hagrỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.38 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'i Jôela... Hagrỳ: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ampit 2 Sam 23.36 izay manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
