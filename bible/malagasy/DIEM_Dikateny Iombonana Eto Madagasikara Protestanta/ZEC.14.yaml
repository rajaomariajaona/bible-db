  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovana lemaka ny faritra manontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manodidina an’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manomboka any Gebà any avaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatrany Rimôna any atsimo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Jerosalema dia hisandratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambonin’ireo tany manodidina azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tanàna dia hitatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manomboka eo amin’ny vavahadin’i Benjamîna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatramin’ny vavahadin-joro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eo amin’ny toeran’ny vavahady tranainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa manomboka eo amin’ny tilikambon’i Hananehela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatramin’ireo famiazam-boaloboky ny mpanjaka
