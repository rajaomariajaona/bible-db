document_id: ZEC.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ady farany sy ny fahatongavan’ny Tompo
  - type: text
    content: Indro akaiky ny andron’ny Tompo
  - type: note
    content: 'Ny andron’ny Tompo: jereo Jl 1.15 sy nta.'
  - type: text
    content: .
  - type: text
    content: Ka eo imasonareo, ry mponin’i Jerosalema,
  - type: text
    content: no hifampizaràn’ny hafa ny fanananareo.
  '10':
  - type: text
    content: Hovana lemaka ny faritra manontolo
  - type: text
    content: manodidina an’i Jerosalema,
  - type: text
    content: manomboka any Gebà any avaratra
  - type: text
    content: ka hatrany Rimôna any atsimo.
  - type: text
    content: I Jerosalema dia hisandratra
  - type: text
    content: ambonin’ireo tany manodidina azy;
  - type: text
    content: ary ny tanàna dia hitatra
  - type: text
    content: manomboka eo amin’ny vavahadin’i Benjamîna
  - type: text
    content: ka hatramin’ny vavahadin-joro,
  - type: text
    content: dia eo amin’ny toeran’ny vavahady tranainy,
  - type: text
    content: ary koa manomboka eo amin’ny tilikambon’i Hananehela
  - type: text
    content: ka hatramin’ireo famiazam-boaloboky ny mpanjaka
  - type: note
    content: 'ny vavahadin’i Benjamîna: eo amin’ny lafy avaratry ny manda. –ny vavahadin-joro: ao amin’ny manda andrefan-tanàna. –ny tilikambon’i Hananehela: ao avaratr’atsinanan’ny tanàna. –famiazam-boaloboky ny mpanjaka: tokony ho ao amin’ny «zaridainan’ny mpanjaka» (2 Mp 25.4), izany hoe ao atsimo atsinanan’ny tanàna.'
  - type: text
    content: .
  '11':
  - type: text
    content: Ho azo ipetrahana fahizay ao an-tanàna,
  - type: text
    content: fa tsy hisy intsony ny fandravana azy;
  - type: text
    content: ary dia handry fahalemana i Jerosalema.
  '12':
  - type: text
    content: Ary izao no aretim-be hamelezan’ny Tompo
  - type: text
    content: 'ny firenen-drehetra izay niady tamin’i Jerosalema:'
  - type: text
    content: ho simba nofo dieny mbola velona ny olona,
  - type: text
    content: ho levona ho azy ao amin’ny fitoerany ny masony,
  - type: text
    content: ho tahaka izany koa ny lela ao am-bavany.
  '13':
  - type: text
    content: Amin’izany andro izany dia hasian’ny Tompo
  - type: text
    content: fifanjevoana tsy hifankahitana ao aminy,
  - type: text
    content: fa samy hanainga tanana hifamely izy.
  '14':
  - type: text
    content: Ny lehilahin’i Joda hiady mba hiaro an’i Jerosalema,
  - type: text
    content: 'ary haka ny haren’ny firenena rehetra manodidina:'
  - type: text
    content: koa dia hangoniny ny volamena sy ny volafotsy
  - type: text
    content: mbamin’ireo fitafiana marobe.
  '15':
  - type: text
    content: Ary hisy aretim-be toy izany koa
  - type: text
    content: hamely ny biby rehetra ao an-tobim-pahavalo,
  - type: text
    content: dia ny soavaly sy ny ampondra
  - type: text
    content: ary ny rameva sy ny boriky
  - type: text
    content: mbamin’ny biby fiompy hafa rehetra ao
  - type: note
    content: Jereo and 12.
  - type: text
    content: .
  '16':
  - type: text
    content: Amin’izany andro izany, ny sisa amin’ireo firenena,
  - type: text
    content: izay niady tamin’i Jerosalema,
  - type: text
    content: dia hiakatra isan-taona ao amin’io tanàna io
  - type: text
    content: hiankohoka eo anatrehan’ilay Mpanjaka,
  - type: text
    content: izany hoe ny Tompon’izao rehetra izao,
  - type: text
    content: ary koa hankalaza ny fetin’ny Tranotomboka
  - type: note
    content: 'fetin’ny Tranotomboka: jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
  - type: text
    content: .
  '17':
  - type: text
    content: Raha misy firenena amin’ny tany
  - type: text
    content: tsy mety hiakatra any Jerosalema
  - type: text
    content: mba hiankohoka eo anatrehan’ilay Mpanjaka,
  - type: text
    content: izany hoe ny Tompon’izao rehetra izao,
  - type: text
    content: dia tsy mba hisy orana hilatsaka eo amin’ny taniny.
  '18':
  - type: text
    content: Ary raha ny firenen’i Ejipta kosa
  - type: text
    content: no tsy tonga miakatra ao Jerosalema
  - type: text
    content: mba hankalaza ny fetin’ny Tranotomboka,
  - type: text
    content: dia tsy hisy koa ranonorana hilatsaka any aminy
  - type: text
    content: sady hanjo azy ny areti-mandoza
  - type: text
    content: izay namelezan’ny Tompo ireo firenena
  - type: text
    content: izay tsy niakatra nankalaza io fety io.
  '19':
  - type: text
    content: Izany no hanasaziana an’i Ejipta
  - type: text
    content: sy ny firenena hafa rehetra
  - type: text
    content: tsy mba hankalaza ny fetin’ny Tranotomboka.
  '2':
  - type: text
    content: Ary hangonin’ny Tompo ny firenen-drehetra
  - type: text
    content: hamely an’i Jerosalema;
  - type: text
    content: dia azon’ireo ny tanàna,
  - type: text
    content: ka horobainy ny trano
  - type: text
    content: ary hanaovany an-keriny ny vehivavy;
  - type: text
    content: ny antsasaky ny mponina dia ho lasan-ko babo
  - type: text
    content: fa ny vahoaka sisa kosa ho afa-mijanona ao an-tanàna.
  '20':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: na dia ny lakolosin-tsoavaly aza
  - type: text
    content: 'dia hisy soratra hoe: «Voatokana ho an’ny Tompo».'
  - type: text
    content: 'Ny vilany tsotra ao amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: dia hoheverina ho masina
  - type: text
    content: tahaka ny tsatokaty famafazana
  - type: text
    content: 'izay eo anoloan’ny '
  - type: text
    content: alitara
  - type: text
    content: .
  '21':
  - type: text
    content: Eny, ny vilany rehetra izay any Jerosalema sy Joda
  - type: text
    content: dia ho voatokana ho an’ny Tompon’izao rehetra izao.
  - type: text
    content: 'Ary izay rehetra tonga hanolotra '
  - type: text
    content: sorona
  - type: text
    content: no hampiasa ireny mba hahandroan-kena.
  - type: text
    content: Ary amin’izay fotoana izay
  - type: text
    content: dia tsy hisy mpivarotra intsony
  - type: text
    content: ao an-
  - type: text
    content: tranon’ny Tompo
  - type: text
    content: n’izao rehetra izao.
  '3':
  - type: text
    content: Dia hiainga hiady amin’ireny firenena ireny ny Tompo,
  - type: text
    content: ka hiady toy izay fanaony amin’ny andro fiadiana.
  '4':
  - type: text
    content: Amin’izany andro izany Izy dia hitsangana
  - type: text
    content: eo amin’ny tendrombohitra Analanôliva
  - type: text
    content: izay eo atsinanan’i Jerosalema.
  - type: text
    content: Ary hitresaka roa ny tendrombohitra Analanôliva
  - type: text
    content: ka hisy lohasaha lehibe iray hiseho eo afovoany,
  - type: text
    content: manomboka avy any atsinanana no miankandrefana;
  - type: text
    content: ny antsasaky ny tendrombohitra
  - type: text
    content: dia hifindra hianavaratra,
  - type: text
    content: fa ny antsasany kosa hianatsimo.
  '5':
  - type: text
    content: Dia io lohasaha nampivaky tendrombohitra io
  - type: text
    content: no lalana handosiranareo,
  - type: text
    content: satria hipaka hatrany Atsala
  - type: note
    content: 'Atsala: toerana tsy voafaritra, angamba ao atsinanana na atsimo atsinanan’i Jerosalema.'
  - type: text
    content: ' izany.'
  - type: text
    content: Eny, handositra ianareo,
  - type: text
    content: dia tahaka ny razanareo
  - type: text
    content: nandositra ny horohorontany
  - type: text
    content: tamin’ny andron’i Hozià mpanjakan’i Joda.
  - type: text
    content: Ary ho avy ny Tompo Andriamanitro
  - type: text
    content: 'miaraka amin’ireo '
  - type: text
    content: anjeliny
  - type: text
    content: ' rehetra.'
  '6':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: dia tsy hilaina intsony
  - type: text
    content: ny fahazavan’ny masoandro;
  - type: text
    content: tsy hisy intsony koa na ny hatsiaka na ny fanala.
  '7':
  - type: text
    content: Dia ho andro fahizay lalandava;
  - type: text
    content: ka tsy hisy andro sy alina miavaka intsony,
  - type: text
    content: fa hazava hatrany na dia ny alina aza.
  - type: text
    content: Ary ny Tompo irery no mahalala
  - type: text
    content: ny fotoana hisehoan’izany.
  '8':
  - type: text
    content: Ary amin’izany andro izany
  - type: text
    content: dia hisy loharano hifantsitsitra
  - type: text
    content: mandavantaona avy ao Jerosalema;
  - type: text
    content: ka ny antsasany hivarina any amin’ny Ranomasina Maty
  - type: text
    content: ary ny antsasany any amin’ny Ranomasina Mediteranea.
  '9':
  - type: text
    content: Amin’izany andro izany ny Tompo
  - type: text
    content: dia hanjaka amin’ny tany manontolo.
  - type: text
    content: Izy irery ihany no Andriamanitra hivavahana,
  - type: text
    content: ary ny anarany irery no hoeken’ny olon-drehetra.
