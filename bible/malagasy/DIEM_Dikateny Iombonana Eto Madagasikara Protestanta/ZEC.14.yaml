  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho azo ipetrahana fahizay ao an-tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hisy intsony ny fandravana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia handry fahalemana i Jerosalema.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izao no aretim-be hamelezan’ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny firenen-drehetra izay niady tamin’i Jerosalema:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho simba nofo dieny mbola velona ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho levona ho azy ao amin’ny fitoerany ny masony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka izany koa ny lela ao am-bavany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hasian’ny Tompo
  - type: usfm
    marker: q1
