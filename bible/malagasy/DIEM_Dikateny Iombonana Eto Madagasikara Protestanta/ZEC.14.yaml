    - type: text
      text: fifanjevoana tsy hifankahitana ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa samy hanainga tanana hifamely izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lehilahin’i Joda hiady mba hiaro an’i Jerosalema,
  - type: usfm
    marker: q1
