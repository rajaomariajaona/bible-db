document_id: JOS.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaratany nomena an’i Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no zaratany azon’ny foko taranak’i Joda tamin’ny antsapaka mba ho an’ireo tarika ao anatiny. Nitatra hatrany amin’ny sisin-tanin’i Edôma izany; ary ny taniefitr’i Tsina, any Negeba, no farany atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny sisin-tany ao atsimo dia manomboka eo amin’ny helodrano tendrony atsimo amin’ny Ranomasina Maty, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nivoaka eo atsimon’ny fiakaran’i Hakrabima ary mandalo an’i Tsina; dia miakatra eo atsimon’i Kadesy-Barnea, mihazo an’i Hetsirôna, miakatra hatrany Adara, vao miolaka ho any Karkà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: dia mandalo an’i Hatsimôna, mandroso hatrany amin’ny lohasahan-driakan’i Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lohasahan-driakan’i Ejipta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 34.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ary mihatra amin’ny Ranomasina Mediteranea. Izay ny amin’ny sisin-tanin’ny fokon’i Joda ao atsimo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny sisin-tany ao atsinanana kosa dia ny Ranomasina Maty, tafapaka hatrany amin’ny vavaranon’i Jôrdàna.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia manomboka eo amin’io vinany io ny sisin-tany ao avaratra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka niakatra hatrany Bety-Hôgla, mandalo eo avaratr’i Bety-Haraba, ary miakatra hatrany amin’ilay Vato atao hoe Vaton’i Bôhana (i Bôhana dia zanakalahin’i Reobena); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia mbola miakatra mankany Debira izany sisin-tany izany, ka mandalo ny lohasaha Hakôra, ary mihodina mianavaratra ho any Gilgala, dia ilay Gilgala manoloana ny fiakaran’i Adomima izay eo atsinanan’ny lohasahan-driaka; avy eo mandalo akaikin’ny loharano Haîna-Semesa ary nihatra tany Haîna-Rôgela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Debira: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna hafa noho ilay Debira eo akaikin’i Hebrôna voalaza ao amin’ny 10.38-39 sy 11.21 ary 12.13. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gilgala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toerana tsy fantatra no misy azy, hafa noho ilay Gilgala voalaza ao amin’ny 4.19-20; 5.9-10.'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia miakatra ny lohasahan’i Hinôma, amin’ny ilany atsimo manamorona ilay havoana misy ny Jebosita (dia i Jerosalema izany); dia mitohy miakatra ho any an-tampon’ilay tendrombohitra izay eo andrefan’ny lohasahan’i Hinôma sy eo amin’ny farany avaratry ny lohasahan’ny Refaîta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'avy eo mihodina ho any amin’ny loharano Neftôa, mihazo ireo tanàna any an-tendrombohitr’i Hefrôna, vao mihodina ho any Bahala izay antsoina koa hoe Kiriata-Jeharima; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia miolaka miankandrefana ho amin’ny tendrombohitra Sehira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tendrombohitr’i Sehira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ity dia hafa noho ilay any amin’ny faritanin’i Edôma.'
    marker-yv: yv-n
  - type: text
    text: ', mandalo ny ilany avaratry ny tendrombohitra Jeharima izay antsoina koa hoe Kesalôna, midina ho any Bety-Semesa, ary mandalo any Timnà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avy eo dia mandroso hatrany amin’ny ilany avaratry ny tanàna Hekrôna, ka mihodina ho any Sikarôna, mandalo ny tendrombohitra Bahala, dia mandroso hatrany Jabneela, ary mihatra amin’ny Ranomasina Mediteranea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny sisin-tany ao andrefana dia ny Ranomasina Mediteranea, izany hoe ny morontsiraka.
- type: usfm
  marker: p
  children:
  - type: text
    text: Izay no faritra manodidina ny zaratany azon’ny taranak’i Joda ho an’ireo tarika ao anatiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I Kaleba, zanakalahin’i Jefonè, dia nomena ampahany tao amin’ny tanin’ireo taranak’i Joda, araka izay efa nandidian’ny TOMPO an’i Josoa. Nomena azy i Kiriata-Arbà, na hoe tanànan’i Arbà razamben’ny Hanakita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'razamben’ny Hanakita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 14.12.
    marker-yv: yv-n
  - type: text
    text: '; i Kiriata-Arbà no natao hoe Hebrôna tatỳ aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia noroahin’i Kaleba hiala tao ireo tarika hanakita telo tonta, izany hoe ny tarik’i Sesay sy ny tarik’i Ahimana ary ny tarik’i Talmay, izay samy taranak’i Hanàka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Avy tao Hebrôna i Kaleba no niainga hamely ny mponina tao Debira izay nantsoina taloha hoe Kiriata-Sefera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy i Kaleba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izay olona mamely ka mahafaka an’i Kiriata-Sefera dia homeko azy i Haksa zanako vavy ho vadiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I Hôtniela, ilay zanakalahin’i Kenaza rahalahin’i Kaleba, no nahafaka ny tanàna; koa nomen’i Kaleba azy i Haksà zanany vavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony tonga teo amin’i Hôtniela razazavavy, dia nampirisika azy mba hangataka saha amin’i Kaleba rainy; avy eo i Haksà dia nidina niala tamin’ny borikiny. Nanontanian’i Kaleba an-drazazavavy kosa ny zavatra ilainy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba anaovy fanomezana aho! Ary satria ngazana ny tany nomenao ahy, dia mba omeo vovon-drano aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nomen’i Kaleba azy ny loharano teny ambony sy loharano teny ambany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izany no zaratany nolovan’ny foko taranak’i Joda ho an’ireo tarika ao anatiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Teo amin’ny foko taranak’i Joda dia ireto avy ireo tanàna tamin’ny ilany atsimo nanakaiky ny sisin-tanin’i Edôma: i Kabitseela, i Hedera, i Jagora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: i Kinà, i Dimôna, i Hadihadà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hadihadà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'angamba tokony hovakîna hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Harohera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit 1 Sam 30.28) ka ny heviny dia hoe miharihary na mangadihady.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Kedesa, i Hatsôra, i Jitnàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Zifa, i Telema, i Behalôta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Hatsôra-Hadatà, i Keriôta, i Hetsirôna izay nantsoina koa hoe Hatsôra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Amama, i Sema, i Môladà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Hatsôra-Gadà, i Hesmôna, i Bety-Peleta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: i Hatsara-Sohala, i Beera-Seba sy ireo tanàna kely mifanila aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo tanàna kely mifanila aminy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt grika tranainy Septoazinta fa ny TM eto dia mampiasa teny tsy mazava ny dikany.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'i Bahala, i Hijima, i Hatsema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'i Eltôlada, i Kenila, i Hôrmà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'i Tsiklaga, i Madmanà, i Sanesanà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: i Lebaôta, i Silehima, i Haîna, ary i Rimôna; izany hoe tanàna 29
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fitanisana dia manome tanàna 35 fa tsy 29. Koa ny azo anazavana io fahasamihafana io dia ny hoe angamba nisaina niaraka tamin’ny tanànan’i Joda koa ireo an’i Simehôna (jereo 19.9).
    marker-yv: yv-n
  - type: text
    text: ' samy miampy ny tanàna kely miankina aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ireto avy kosa ireo tanàna teo amin’ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: ': i Estaôla, i Tsôrehà, i Adenà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'i Zanôà, i Haîna-Ganima, i Tapoà, i Henama, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'i Jarmota, i Hadolama, i Sôkao, i Hazekà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'i Saharaîma, i Haditaîma, i Gedera, ary i Gederôtaîma; izany hoe tanàna 11 samy miampy ny tanàna kely miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ao koa i Tsenàna, i Hadasà, i Migdala-Gada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'i Dilehàna, i Mitsepà, i Jôkteela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'i Lakisy, i Bôtsekata, i Heglôna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'i Kabôna, i Lahemasa, i Kitlisa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'i Gederôta, i Bety-Dagôna, i Nahamà, ary i Makedà; izany hoe tanàna 16 samy miampy ny tanàna kely miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ankoatra ireo i Libnà, i Hetera, i Hasàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'i Jiftà, i Asenà, i Netsiba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'i Kehilà, i Akziba, ary i Maresà; izany hoe tanàna sivy samy miampy ireo tanàna kely miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ao koa i Hekrôna miampy ny tanàna kely sy zana-bohitra miankina aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'ireo tanàna kely sy zana-bohitra rehetra mifanila amin’i Asdôla ka eo anelanelan’i Hekrôna sy ny Ranomasina Mediteranea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: i Asdôda sy i Gazà samy miampy ireo tanàna kely sy zana-bohitra miankina aminy, hatrany amin’ny lohasahan-driakan’i Ejipta sy hatrany amoron’ny Ranomasina Mediteranea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ireo tanàna teny amin’ny faritra havoana kosa dia i Samira, i Jatira, i Sôkao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'i Danà, i Kiriata-Sanà izay nantsoina koa hoe Debira, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'i Hanaba, i Estemao, i Hanima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'i Gôsena, i Hôlôna, ary i Gilao; izany hoe tanàna 11 miampy ireo tanàna kely miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ankoatra ireo i Araba, i Domà, i Esihàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'i Janoma, i Bety-Tapoa, i Afekà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'i Hometà, i Kiriata-Arbà izay nantsoina koa hoe Hebrôna, ary i Tsihôra; izany hoe tanàna sivy miampy ireo tanàna kely miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Dia ao koa i Mahôna, i Karmela, i Zifa, i Jôtà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: i Jizrehela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.56 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jizrehela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna hafa noho ilay voalaza Jizrehela voalaza ao amin’ny 19.18.
    marker-yv: yv-n
  - type: text
    text: ', i Jôkdehama, i Zanôà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'i Kaîna, i Gibehà, ary i Timnà; izany hoe tanàna folo miampy ireo tanàna kely miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Farany ao koa i Halihola, i Bety-Tsora, i Gedôra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'i Maharata, i Bety-Hanôta, ary i Eltekôna; izany hoe tanàna enina miampy ireo tanàna kely miankina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Tao koa i Kiriata-Bahala izay nantsoina hoe Kiriata-Jeharîma, ary i Rabà; izany hoe tanàna roa miampy ireo tanàna kely miankina aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ireo tanàna tany an-taniefitra kosa dia i Bety-Harabà, i Midîna, i Sôkôta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: i Nibsana, ilay tanàna mpamokatra sira, ary i Haîna-Gedỳ; izany hoe tanàna enina miampy ireo tanàna kely miankina aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Ireo Jebosita izay mponina tao Jerosalema kosa dia tsy voaroakan’ny taranak’i Joda, ka mbola miara-monina aminy ao Jerosalema mandraka androany.
