document_id: JOS.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratany nomena an’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no zaratany azon’ny foko taranak’i Joda tamin’ny antsapaka mba ho an’ireo tarika ao anatiny. Nitatra hatrany amin’ny sisin-tanin’i Edôma izany; ary ny taniefitr’i Tsina, any Negeba, no farany atsimo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: dia miolaka miankandrefana ho amin’ny tendrombohitra Sehira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ity '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tendrombohitr’i Sehira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ity dia hafa noho ilay any amin’ny faritanin’i Edôma.'
      marker-yv: yv-n
    - type: text
      text: ', mandalo ny ilany avaratry ny tendrombohitra Jeharima izay antsoina koa hoe Kesalôna, midina ho any Bety-Semesa, ary mandalo any Timnà. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Avy eo dia mandroso hatrany amin’ny ilany avaratry ny tanàna Hekrôna, ka mihodina ho any Sikarôna, mandalo ny tendrombohitra Bahala, dia mandroso hatrany Jabneela, ary mihatra amin’ny Ranomasina Mediteranea.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny sisin-tany ao andrefana dia ny Ranomasina Mediteranea, izany hoe ny morontsiraka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay no faritra manodidina ny zaratany azon’ny taranak’i Joda ho an’ireo tarika ao anatiny.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I Kaleba, zanakalahin’i Jefonè, dia nomena ampahany tao amin’ny tanin’ireo taranak’i Joda, araka izay efa nandidian’ny TOMPO an’i Josoa. Nomena azy i Kiriata-Arbà, na hoe tanànan’i Arbà razamben’ny Hanakita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'razamben’ny Hanakita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 14.12.
      marker-yv: yv-n
    - type: text
      text: '; i Kiriata-Arbà no natao hoe Hebrôna tatỳ aoriana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia noroahin’i Kaleba hiala tao ireo tarika hanakita telo tonta, izany hoe ny tarik’i Sesay sy ny tarik’i Ahimana ary ny tarik’i Talmay, izay samy taranak’i Hanàka. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Avy tao Hebrôna i Kaleba no niainga hamely ny mponina tao Debira izay nantsoina taloha hoe Kiriata-Sefera. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hoy i Kaleba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay olona mamely ka mahafaka an’i Kiriata-Sefera dia homeko azy i Haksa zanako vavy ho vadiny.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'I Hôtniela, ilay zanakalahin’i Kenaza rahalahin’i Kaleba, no nahafaka ny tanàna; koa nomen’i Kaleba azy i Haksà zanany vavy ho vadiny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nony tonga teo amin’i Hôtniela razazavavy, dia nampirisika azy mba hangataka saha amin’i Kaleba rainy; avy eo i Haksà dia nidina niala tamin’ny borikiny. Nanontanian’i Kaleba an-drazazavavy kosa ny zavatra ilainy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba anaovy fanomezana aho! Ary satria ngazana ny tany nomenao ahy, dia mba omeo vovon-drano aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nomen’i Kaleba azy ny loharano teny ambony sy loharano teny ambany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny sisin-tany ao atsimo dia manomboka eo amin’ny helodrano tendrony atsimo amin’ny Ranomasina Maty, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Izany no zaratany nolovan’ny foko taranak’i Joda ho an’ireo tarika ao anatiny.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Teo amin’ny foko taranak’i Joda dia ireto avy ireo tanàna tamin’ny ilany atsimo nanakaiky ny sisin-tanin’i Edôma: i Kabitseela, i Hedera, i Jagora, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
