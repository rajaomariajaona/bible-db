document_id: JOS.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zaratany nomena an’i Joda
  - type: text
    content: 'Izao no zaratany azon’ny foko taranak’i Joda tamin’ny antsapaka mba ho an’ireo tarika ao anatiny. Nitatra hatrany amin’ny sisin-tanin’i Edôma izany; ary ny taniefitr’i Tsina, any Negeba, no farany atsimo. '
  '10':
  - type: text
    content: dia miolaka miankandrefana ho amin’ny tendrombohitra Sehira
  - type: note
    content: Ity tendrombohitr’i Sehira ity dia hafa noho ilay any amin’ny faritanin’i Edôma.
  - type: text
    content: ', mandalo ny ilany avaratry ny tendrombohitra Jeharima izay antsoina koa hoe Kesalôna, midina ho any Bety-Semesa, ary mandalo any Timnà. '
  '11':
  - type: text
    content: Avy eo dia mandroso hatrany amin’ny ilany avaratry ny tanàna Hekrôna, ka mihodina ho any Sikarôna, mandalo ny tendrombohitra Bahala, dia mandroso hatrany Jabneela, ary mihatra amin’ny Ranomasina Mediteranea.
  '12':
  - type: text
    content: Ny sisin-tany ao andrefana dia ny Ranomasina Mediteranea, izany hoe ny morontsiraka.
  - type: text
    content: Izay no faritra manodidina ny zaratany azon’ny taranak’i Joda ho an’ireo tarika ao anatiny.
  '13':
  - type: text
    content: I Kaleba, zanakalahin’i Jefonè, dia nomena ampahany tao amin’ny tanin’ireo taranak’i Joda, araka izay efa nandidian’ny TOMPO an’i Josoa. Nomena azy i Kiriata-Arbà, na hoe tanànan’i Arbà razamben’ny Hanakita
  - type: note
    content: 'razamben’ny Hanakita: jereo 14.12.'
  - type: text
    content: '; i Kiriata-Arbà no natao hoe Hebrôna tatỳ aoriana. '
  '14':
  - type: text
    content: 'Dia noroahin’i Kaleba hiala tao ireo tarika hanakita telo tonta, izany hoe ny tarik’i Sesay sy ny tarik’i Ahimana ary ny tarik’i Talmay, izay samy taranak’i Hanàka. '
  '15':
  - type: text
    content: 'Avy tao Hebrôna i Kaleba no niainga hamely ny mponina tao Debira izay nantsoina taloha hoe Kiriata-Sefera. '
  '16':
  - type: text
    content: 'Ary hoy i Kaleba hoe:'
  - type: text
    content: –Izay olona mamely ka mahafaka an’i Kiriata-Sefera dia homeko azy i Haksa zanako vavy ho vadiny.
  '17':
  - type: text
    content: 'I Hôtniela, ilay zanakalahin’i Kenaza rahalahin’i Kaleba, no nahafaka ny tanàna; koa nomen’i Kaleba azy i Haksà zanany vavy ho vadiny. '
  '18':
  - type: text
    content: 'Ary nony tonga teo amin’i Hôtniela razazavavy, dia nampirisika azy mba hangataka saha amin’i Kaleba rainy; avy eo i Haksà dia nidina niala tamin’ny borikiny. Nanontanian’i Kaleba an-drazazavavy kosa ny zavatra ilainy, '
  '19':
  - type: text
    content: 'ka novaliany hoe:'
  - type: text
    content: –Mba anaovy fanomezana aho! Ary satria ngazana ny tany nomenao ahy, dia mba omeo vovon-drano aho.
  - type: text
    content: Dia nomen’i Kaleba azy ny loharano teny ambony sy loharano teny ambany.
  '2':
  - type: text
    content: 'Ny sisin-tany ao atsimo dia manomboka eo amin’ny helodrano tendrony atsimo amin’ny Ranomasina Maty, '
  '20':
  - type: text
    content: Izany no zaratany nolovan’ny foko taranak’i Joda ho an’ireo tarika ao anatiny.
  '21':
  - type: text
    content: 'Teo amin’ny foko taranak’i Joda dia ireto avy ireo tanàna tamin’ny ilany atsimo nanakaiky ny sisin-tanin’i Edôma: i Kabitseela, i Hedera, i Jagora, '
  '22':
  - type: text
    content: i Kinà, i Dimôna, i Hadihadà
  - type: note
    content: 'Hadihadà: angamba tokony hovakîna hoe Harohera (ampit 1 Sam 30.28) ka ny heviny dia hoe miharihary na mangadihady.'
  - type: text
    content: ', '
  '23':
  - type: text
    content: 'i Kedesa, i Hatsôra, i Jitnàna, '
  '24':
  - type: text
    content: 'i Zifa, i Telema, i Behalôta, '
  '25':
  - type: text
    content: 'i Hatsôra-Hadatà, i Keriôta, i Hetsirôna izay nantsoina koa hoe Hatsôra, '
  '26':
  - type: text
    content: 'i Amama, i Sema, i Môladà, '
  '27':
  - type: text
    content: 'i Hatsôra-Gadà, i Hesmôna, i Bety-Peleta, '
  '28':
  - type: text
    content: i Hatsara-Sohala, i Beera-Seba sy ireo tanàna kely mifanila aminy
  - type: note
    content: 'ireo tanàna kely mifanila aminy: araka ny dkt grika tranainy Septoazinta fa ny TM eto dia mampiasa teny tsy mazava ny dikany.'
  - type: text
    content: ', '
  '29':
  - type: text
    content: 'i Bahala, i Hijima, i Hatsema, '
  '3':
  - type: text
    content: 'ka nivoaka eo atsimon’ny fiakaran’i Hakrabima ary mandalo an’i Tsina; dia miakatra eo atsimon’i Kadesy-Barnea, mihazo an’i Hetsirôna, miakatra hatrany Adara, vao miolaka ho any Karkà; '
  '30':
  - type: text
    content: 'i Eltôlada, i Kenila, i Hôrmà, '
  '31':
  - type: text
    content: 'i Tsiklaga, i Madmanà, i Sanesanà, '
  '32':
  - type: text
    content: i Lebaôta, i Silehima, i Haîna, ary i Rimôna; izany hoe tanàna 29
  - type: note
    content: Ny fitanisana dia manome tanàna 35 fa tsy 29. Koa ny azo anazavana io fahasamihafana io dia ny hoe angamba nisaina niaraka tamin’ny tanànan’i Joda koa ireo an’i Simehôna (jereo 19.9).
  - type: text
    content: ' samy miampy ny tanàna kely miankina aminy.'
  '33':
  - type: text
    content: 'Ireto avy kosa ireo tanàna teo amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ': i Estaôla, i Tsôrehà, i Adenà, '
  '34':
  - type: text
    content: 'i Zanôà, i Haîna-Ganima, i Tapoà, i Henama, '
  '35':
  - type: text
    content: 'i Jarmota, i Hadolama, i Sôkao, i Hazekà, '
  '36':
  - type: text
    content: 'i Saharaîma, i Haditaîma, i Gedera, ary i Gederôtaîma; izany hoe tanàna 11 samy miampy ny tanàna kely miankina aminy. '
  '37':
  - type: text
    content: 'Ao koa i Tsenàna, i Hadasà, i Migdala-Gada, '
  '38':
  - type: text
    content: 'i Dilehàna, i Mitsepà, i Jôkteela, '
  '39':
  - type: text
    content: 'i Lakisy, i Bôtsekata, i Heglôna, '
  '4':
  - type: text
    content: dia mandalo an’i Hatsimôna, mandroso hatrany amin’ny lohasahan-driakan’i Ejipta
  - type: note
    content: 'lohasahan-driakan’i Ejipta: jereo Nom 34.5 sy nta.'
  - type: text
    content: ', ary mihatra amin’ny Ranomasina Mediteranea. Izay ny amin’ny sisin-tanin’ny fokon’i Joda ao atsimo.'
  '40':
  - type: text
    content: 'i Kabôna, i Lahemasa, i Kitlisa, '
  '41':
  - type: text
    content: 'i Gederôta, i Bety-Dagôna, i Nahamà, ary i Makedà; izany hoe tanàna 16 samy miampy ny tanàna kely miankina aminy. '
  '42':
  - type: text
    content: 'Ankoatra ireo i Libnà, i Hetera, i Hasàna, '
  '43':
  - type: text
    content: 'i Jiftà, i Asenà, i Netsiba, '
  '44':
  - type: text
    content: 'i Kehilà, i Akziba, ary i Maresà; izany hoe tanàna sivy samy miampy ireo tanàna kely miankina aminy. '
  '45':
  - type: text
    content: 'Ao koa i Hekrôna miampy ny tanàna kely sy zana-bohitra miankina aminy; '
  '46':
  - type: text
    content: 'ireo tanàna kely sy zana-bohitra rehetra mifanila amin’i Asdôla ka eo anelanelan’i Hekrôna sy ny Ranomasina Mediteranea; '
  '47':
  - type: text
    content: i Asdôda sy i Gazà samy miampy ireo tanàna kely sy zana-bohitra miankina aminy, hatrany amin’ny lohasahan-driakan’i Ejipta sy hatrany amoron’ny Ranomasina Mediteranea.
  '48':
  - type: text
    content: 'Ireo tanàna teny amin’ny faritra havoana kosa dia i Samira, i Jatira, i Sôkao, '
  '49':
  - type: text
    content: 'i Danà, i Kiriata-Sanà izay nantsoina koa hoe Debira, '
  '5':
  - type: text
    content: Ny sisin-tany ao atsinanana kosa dia ny Ranomasina Maty, tafapaka hatrany amin’ny vavaranon’i Jôrdàna.
  - type: text
    content: 'Dia manomboka eo amin’io vinany io ny sisin-tany ao avaratra, '
  '50':
  - type: text
    content: 'i Hanaba, i Estemao, i Hanima, '
  '51':
  - type: text
    content: 'i Gôsena, i Hôlôna, ary i Gilao; izany hoe tanàna 11 miampy ireo tanàna kely miankina aminy. '
  '52':
  - type: text
    content: 'Ankoatra ireo i Araba, i Domà, i Esihàna, '
  '53':
  - type: text
    content: 'i Janoma, i Bety-Tapoa, i Afekà, '
  '54':
  - type: text
    content: 'i Hometà, i Kiriata-Arbà izay nantsoina koa hoe Hebrôna, ary i Tsihôra; izany hoe tanàna sivy miampy ireo tanàna kely miankina aminy. '
  '55':
  - type: text
    content: 'Dia ao koa i Mahôna, i Karmela, i Zifa, i Jôtà, '
  '56':
  - type: text
    content: i Jizrehela
  - type: note
    content: 'Jizrehela: tanàna hafa noho ilay voalaza Jizrehela voalaza ao amin’ny 19.18.'
  - type: text
    content: ', i Jôkdehama, i Zanôà, '
  '57':
  - type: text
    content: 'i Kaîna, i Gibehà, ary i Timnà; izany hoe tanàna folo miampy ireo tanàna kely miankina aminy. '
  '58':
  - type: text
    content: 'Farany ao koa i Halihola, i Bety-Tsora, i Gedôra, '
  '59':
  - type: text
    content: 'i Maharata, i Bety-Hanôta, ary i Eltekôna; izany hoe tanàna enina miampy ireo tanàna kely miankina aminy. '
  '6':
  - type: text
    content: 'ka niakatra hatrany Bety-Hôgla, mandalo eo avaratr’i Bety-Haraba, ary miakatra hatrany amin’ilay Vato atao hoe Vaton’i Bôhana (i Bôhana dia zanakalahin’i Reobena); '
  '60':
  - type: text
    content: Tao koa i Kiriata-Bahala izay nantsoina hoe Kiriata-Jeharîma, ary i Rabà; izany hoe tanàna roa miampy ireo tanàna kely miankina aminy.
  '61':
  - type: text
    content: 'Ireo tanàna tany an-taniefitra kosa dia i Bety-Harabà, i Midîna, i Sôkôta, '
  '62':
  - type: text
    content: i Nibsana, ilay tanàna mpamokatra sira, ary i Haîna-Gedỳ; izany hoe tanàna enina miampy ireo tanàna kely miankina aminy.
  '63':
  - type: text
    content: Ireo Jebosita izay mponina tao Jerosalema kosa dia tsy voaroakan’ny taranak’i Joda, ka mbola miara-monina aminy ao Jerosalema mandraka androany.
  '7':
  - type: text
    content: dia mbola miakatra mankany Debira izany sisin-tany izany, ka mandalo ny lohasaha Hakôra, ary mihodina mianavaratra ho any Gilgala, dia ilay Gilgala manoloana ny fiakaran’i Adomima izay eo atsinanan’ny lohasahan-driaka; avy eo mandalo akaikin’ny loharano Haîna-Semesa ary nihatra tany Haîna-Rôgela
  - type: note
    content: 'Debira: dia tanàna hafa noho ilay Debira eo akaikin’i Hebrôna voalaza ao amin’ny 10.38-39 sy 11.21 ary 12.13. –Gilgala: toerana tsy fantatra no misy azy, hafa noho ilay Gilgala voalaza ao amin’ny 4.19-20; 5.9-10.'
  - type: text
    content: '; '
  '8':
  - type: text
    content: 'dia miakatra ny lohasahan’i Hinôma, amin’ny ilany atsimo manamorona ilay havoana misy ny Jebosita (dia i Jerosalema izany); dia mitohy miakatra ho any an-tampon’ilay tendrombohitra izay eo andrefan’ny lohasahan’i Hinôma sy eo amin’ny farany avaratry ny lohasahan’ny Refaîta; '
  '9':
  - type: text
    content: 'avy eo mihodina ho any amin’ny loharano Neftôa, mihazo ireo tanàna any an-tendrombohitr’i Hefrôna, vao mihodina ho any Bahala izay antsoina koa hoe Kiriata-Jeharima; '
