document_id: 2SA.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida sy i Mefibôseta
  - type: text
    content: 'Hoy i Davida indray andro:'
  - type: text
    content: –Mbola misy olona sisa velona ve amin’ny fianakavian’i Saoly? Mba tiako ny hanisy soa azy noho ny amin’i Jônatàna
  - type: note
    content: Jereo 1 Sam 20.15-17.
  - type: text
    content: .
  '10':
  - type: text
    content: Koa ianao sy ireo zanakalahinao ary ireo mpanomponao no hiasa ny tany ho azy ka hanatitra izay hiveloman’ny fianakaviany. Fa i Mefibôseta zafikelin’ny tomponao kosa dia hisakafo isan’andro eo amin’ny latabatro.
  - type: text
    content: 'Nanana zanakalahy 15 sy mpanompo 20 i Tsibà, '
  '11':
  - type: text
    content: 'ka niteny tamin’ny mpanjaka hoe:'
  - type: text
    content: –Tompoko, araka izay rehetra nandidianao mpanjaka no hataoko. Kanefa i Mefibôseta dia hisakafo eo amin’ny latabatro toy ny anankiray amin’ireo zanakalahin’i Saoly mpanjaka.
  '12':
  - type: text
    content: 'Nanan-janakalahy tanora nantsoina hoe Mikà i Mefibôseta, ary ny olona rehetra tao an-tranon’i Tsibà dia nanompo an’i Mefibôseta avokoa. '
  '13':
  - type: text
    content: Fa na dia nalemy aza ny tongony roa, dia nonina tany Jerosalema i Mefibôseta satria nisakafo isan’andro teo amin’ny latabatry ny mpanjaka izy.
  '2':
  - type: text
    content: 'Fa nanana mpanompo iray nantsoina hoe Tsibà ny fianakavian’i Saoly; ary nampanantsoina hankeo amin’i Davida izy, ka nanontanian’ity mpanjaka hoe:'
  - type: text
    content: –Ianao va no Tsibà?
  - type: text
    content: 'Ary hoy izy namaly:'
  - type: text
    content: –Izaho, tompoko, no izy.
  '3':
  - type: text
    content: 'Dia nanontany indray ny mpanjaka hoe:'
  - type: text
    content: –Mbola misy olona sisa velona ve amin’ny fianakavian’i Saoly mba hasiako soa araka ny fanaon’Andriamanitra?
  - type: text
    content: 'Ka novalian’i Tsibà hoe:'
  - type: text
    content: –Mbola misy zanakalahin’i Jônatàna iray izay, nefa malemy tongotra izy
  - type: note
    content: Jereo 4.4.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy:'
  - type: text
    content: –Aiza izy?
  - type: text
    content: 'Dia hoy i Tsibà namaly ny mpanjaka:'
  - type: text
    content: –Ao an-tranon’i Makira
  - type: note
    content: 'Makira: jereo 17.27.'
  - type: text
    content: ' zanakalahin’i Hamiela ao Lô-Debàra izy'
  - type: note
    content: 'Lô-Debàra: toerana tokony ho 12 km atsimon’ny farihy Genesareta, atsinanan’i Jôrdàna.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Ary naniraka olona haka azy any an-tranon’i Makira zanakalahin’i Hamiela ao Lô-Debàra i Davida mpanjaka. '
  '6':
  - type: text
    content: Rehefa tonga teo amin’i Davida i Mefibôseta zanakalahin’i Jônatàna sady zafikelin’i Saoly, dia niankohoka tamin’ny tany ho fanajana azy.
  - type: text
    content: 'Ary hoy i Davida taminy:'
  - type: text
    content: –Mefibôseta!
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Inty aho, tompoko.
  '7':
  - type: text
    content: 'Dia hoy indray i Davida taminy:'
  - type: text
    content: –Aza matahotra fa te hanisy soa anao noho ny amin’i Jônatàna rainao aho, ka hamerina aminao ny tany rehetra izay an’i Saoly raibenao; ary ianao dia hisakafo isan’andro eo amin’ny latabatro.
  '8':
  - type: text
    content: 'Dia niankohoka izy sady namaly hoe:'
  - type: text
    content: –Zinona moa aho izay toa fatin’amboa ity no mba itodihanao, tompoko?
  '9':
  - type: text
    content: 'Nantsoin’ny mpanjaka i Tsibà mpanompon’i Saoly, ka nilazany hoe:'
  - type: text
    content: '–Nomeko an’i Mefibôseta, zafikelin’ny tomponao avokoa izay rehetra nananan’i Saoly sy ny fianakaviany. '
