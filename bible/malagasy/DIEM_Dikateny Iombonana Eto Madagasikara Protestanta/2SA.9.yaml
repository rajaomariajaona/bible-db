document_id: 2SA.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida sy i Mefibôseta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hoy i Davida indray andro:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mbola misy olona sisa velona ve amin’ny fianakavian’i Saoly? Mba tiako ny hanisy soa azy noho ny amin’i Jônatàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Sam 20.15-17.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa ianao sy ireo zanakalahinao ary ireo mpanomponao no hiasa ny tany ho azy ka hanatitra izay hiveloman’ny fianakaviany. Fa i Mefibôseta zafikelin’ny tomponao kosa dia hisakafo isan’andro eo amin’ny latabatro.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanana zanakalahy 15 sy mpanompo 20 i Tsibà, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ka niteny tamin’ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompoko, araka izay rehetra nandidianao mpanjaka no hataoko. Kanefa i Mefibôseta dia hisakafo eo amin’ny latabatro toy ny anankiray amin’ireo zanakalahin’i Saoly mpanjaka.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nanan-janakalahy tanora nantsoina hoe Mikà i Mefibôseta, ary ny olona rehetra tao an-tranon’i Tsibà dia nanompo an’i Mefibôseta avokoa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa na dia nalemy aza ny tongony roa, dia nonina tany Jerosalema i Mefibôseta satria nisakafo isan’andro teo amin’ny latabatry ny mpanjaka izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa nanana mpanompo iray nantsoina hoe Tsibà ny fianakavian’i Saoly; ary nampanantsoina hankeo amin’i Davida izy, ka nanontanian’ity mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao va no Tsibà?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy namaly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho, tompoko, no izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nanontany indray ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mbola misy olona sisa velona ve amin’ny fianakavian’i Saoly mba hasiako soa araka ny fanaon’Andriamanitra?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’i Tsibà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mbola misy zanakalahin’i Jônatàna iray izay, nefa malemy tongotra izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 4.4.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza izy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Tsibà namaly ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ao an-tranon’i Makira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Makira: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 17.27.
      marker-yv: yv-n
    - type: text
      text: ' zanakalahin’i Hamiela ao Lô-Debàra izy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lô-Debàra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tokony ho 12 km atsimon’ny farihy Genesareta, atsinanan’i Jôrdàna.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary naniraka olona haka azy any an-tranon’i Makira zanakalahin’i Hamiela ao Lô-Debàra i Davida mpanjaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Rehefa tonga teo amin’i Davida i Mefibôseta zanakalahin’i Jônatàna sady zafikelin’i Saoly, dia niankohoka tamin’ny tany ho fanajana azy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mefibôseta!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inty aho, tompoko.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy indray i Davida taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza matahotra fa te hanisy soa anao noho ny amin’i Jônatàna rainao aho, ka hamerina aminao ny tany rehetra izay an’i Saoly raibenao; ary ianao dia hisakafo isan’andro eo amin’ny latabatro.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niankohoka izy sady namaly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zinona moa aho izay toa fatin’amboa ity no mba itodihanao, tompoko?
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nantsoin’ny mpanjaka i Tsibà mpanompon’i Saoly, ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nomeko an’i Mefibôseta, zafikelin’ny tomponao avokoa izay rehetra nananan’i Saoly sy ny fianakaviany. '
