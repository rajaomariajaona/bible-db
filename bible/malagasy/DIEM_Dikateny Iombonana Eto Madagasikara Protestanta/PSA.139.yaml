document_id: PSA.139,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Tompo ô, fantatrao avokoa ny momba ahy
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, nandinika ahy Ianao
  - type: text
    content: ka fantatrao avokoa ny momba ahy.
  '10':
  - type: text
    content: dia mbola ny fiarovanao no mitondra ahy any
  - type: text
    content: ary mbola ny herinao koa no mihazona ahy.
  '11':
  - type: text
    content: 'Ka hoy aho hoe: «Aoka ny haizina hanarona ahy!'
  - type: text
    content: Aoka ny hazavana manodidina ahy hanjary alina!»
  '12':
  - type: text
    content: Na ny haizina aza tsy maizina aminao,
  - type: text
    content: 'ary ny alina koa dia mazava toy ny andro:'
  - type: text
    content: ny haizina dia toy ny hazavana ihany!
  '13':
  - type: text
    content: Ianao no nahary ny saina amam-panahiko
  - type: text
    content: sy namolavola ahy tao an-kibon-dreniko.
  '14':
  - type: text
    content: Midera Anao aho fa nataonao
  - type: text
    content: ho zava-mahatalanjona tokoa;
  - type: text
    content: zava-mahagaga ny asanao
  - type: text
    content: ary ekeko mihitsy izany.
  '15':
  - type: text
    content: Tsy misy takona taminao izany tenako,
  - type: text
    content: fony aho noforoninao tao amin’ny miafina
  - type: text
    content: ka notenominao tao an-kibon-dreniko.
  '16':
  - type: text
    content: Tsy mbola nisy endrika aho no efa hitanao;
  - type: text
    content: voasoratrao tao amin’ny bokinao avokoa
  - type: text
    content: ireo andro voatendrinao hiainako,
  - type: text
    content: talohan’ny tsy mbola nisiany akory.
  '17':
  - type: text
    content: Tsy haiko takarina velively ny hevitrao
  - type: text
    content: sady akory ity hamaroany, ry Andriamanitra ô!
  '18':
  - type: text
    content: Raha hanisa aho, dia maro noho ny fasika ireny;
  - type: text
    content: raha hahisa aza, dia mbola tsy hahatakatra Anao.
  '19':
  - type: text
    content: Andriamanitra ô, haringanao mihitsy anie
  - type: text
    content: ny olon-dratsy
  - type: text
    content: ary hohalavirinao ahy anie ny mpamono olona!
  '2':
  - type: text
    content: Fantatrao aho na mipetraka na mitsangana;
  - type: text
    content: elabe mialoha, dia efa tsinjonao ny hevitro.
  '20':
  - type: text
    content: Miresaka Anao amim-pihatsarambelatsihy
  - type: text
    content: ireo fahavalonao
  - type: text
    content: sady mitonona Anao mba hoenti-mamitaka.
  '21':
  - type: text
    content: Ankahalaiko ny mpankahala Anao, TOMPO ô;
  - type: text
    content: ary maharikoriko ahy ny mpanohitra Anao.
  '22':
  - type: text
    content: Hàlako dia hàlako tokoa ireo
  - type: text
    content: sady efa tonga fahavaloko.
  '23':
  - type: text
    content: Andriamanitra ô, diniho aho ka fantaro ny foko;
  - type: text
    content: zahao toetra aho ka fantaro eritreritra.
  '24':
  - type: text
    content: Jereo raha miroso amin’ny làla-mampidi-doza aho,
  - type: text
    content: dia tariho hizotra amin’ny sori-dàlanao hatrizay.
  '3':
  - type: text
    content: Voadinikao aho na mamindra na miato;
  - type: text
    content: ary tsy misy miafina aminao ny làlan-kalehako.
  '4':
  - type: text
    content: Tsy mbola eo am-bavako akory ny teny holazaiko,
  - type: text
    content: dia indro efa fantatrao avokoa, TOMPO ô.
  '5':
  - type: text
    content: Voambombanao aho na eo aloha na eo ivoho;
  - type: text
    content: ny fiarovanao no apetrakao amiko.
  '6':
  - type: text
    content: Mahagaga loatra amiko ny fahalalànao ahy;
  - type: text
    content: avo tokoa izany, ka tsy takatro velively.
  '7':
  - type: text
    content: Aiza no hialàko lavitra ny Fanahinao?
  - type: text
    content: Aiza no handosirako tsy ho eo anatrehanao?
  '8':
  - type: text
    content: Raha miakatra any an-
  - type: text
    content: danitra
  - type: text
    content: ' aho, any Ianao;'
  - type: text
    content: mandry any amin’ny toeran’ny maty aho, io koa Ianao.
  '9':
  - type: text
    content: Raha maka ny elatry ny mazavatsinanana aho
  - type: text
    content: na lasa honina any am-paran’ny ranomasina,
