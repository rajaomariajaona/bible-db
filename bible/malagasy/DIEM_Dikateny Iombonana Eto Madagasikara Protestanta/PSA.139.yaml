document_id: PSA.139,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Tompo ô, fantatrao avokoa ny momba ahy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, nandinika ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka fantatrao avokoa ny momba ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: dia mbola ny fiarovanao no mitondra ahy any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mbola ny herinao koa no mihazona ahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ka hoy aho hoe: «Aoka ny haizina hanarona ahy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny hazavana manodidina ahy hanjary alina!»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Na ny haizina aza tsy maizina aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny alina koa dia mazava toy ny andro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny haizina dia toy ny hazavana ihany!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ianao no nahary ny saina amam-panahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy namolavola ahy tao an-kibon-dreniko.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Midera Anao aho fa nataonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho zava-mahatalanjona tokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zava-mahagaga ny asanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ekeko mihitsy izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tsy misy takona taminao izany tenako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony aho noforoninao tao amin’ny miafina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka notenominao tao an-kibon-dreniko.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsy mbola nisy endrika aho no efa hitanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voasoratrao tao amin’ny bokinao avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo andro voatendrinao hiainako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: talohan’ny tsy mbola nisiany akory.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tsy haiko takarina velively ny hevitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady akory ity hamaroany, ry Andriamanitra ô!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha hanisa aho, dia maro noho ny fasika ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha hahisa aza, dia mbola tsy hahatakatra Anao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Andriamanitra ô, haringanao mihitsy anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hohalavirinao ahy anie ny mpamono olona!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fantatrao aho na mipetraka na mitsangana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elabe mialoha, dia efa tsinjonao ny hevitro.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Miresaka Anao amim-pihatsarambelatsihy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo fahavalonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mitonona Anao mba hoenti-mamitaka.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ankahalaiko ny mpankahala Anao, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maharikoriko ahy ny mpanohitra Anao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hàlako dia hàlako tokoa ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady efa tonga fahavaloko.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Andriamanitra ô, diniho aho ka fantaro ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zahao toetra aho ka fantaro eritreritra.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Jereo raha miroso amin’ny làla-mampidi-doza aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tariho hizotra amin’ny sori-dàlanao hatrizay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Voadinikao aho na mamindra na miato;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy miafina aminao ny làlan-kalehako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy mbola eo am-bavako akory ny teny holazaiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia indro efa fantatrao avokoa, TOMPO ô.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voambombanao aho na eo aloha na eo ivoho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiarovanao no apetrakao amiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mahagaga loatra amiko ny fahalalànao ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avo tokoa izany, ka tsy takatro velively.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aiza no hialàko lavitra ny Fanahinao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza no handosirako tsy ho eo anatrehanao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Raha miakatra any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: ' aho, any Ianao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandry any amin’ny toeran’ny maty aho, io koa Ianao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha maka ny elatry ny mazavatsinanana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na lasa honina any am-paran’ny ranomasina,
