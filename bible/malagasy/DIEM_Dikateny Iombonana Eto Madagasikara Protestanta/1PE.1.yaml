  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nasehon’Andriamanitra tamin’ireo mpaminany fa ny zavatra nomena horaharahainy dia tsy natao ho azy ireo fa natao ho anareo; ary izany zavatra izany dia nampandrenesina anareo ankehitriny, tamin’ny alalan’ireo olona izay nombàn’ny Fanahy Masina nirahina avy tany an-danitra ka nitory ny '
