  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay Andriamanitra, tsy mizaha tavan’olona fa mitsara ny tsirairay araka ny asany avy, dia antsoinareo hoe Ray; koa manàna fitondrantena feno fanajana Azy ianareo mandritra ny andro ivahinianareo etỳ an-tany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatrareo fa ny nanavotana anareo, ho afaka tamin’ny fitondrantena tsy mahasoa nentim-paharazana, dia tsy zavatra mety simba tahaka ny volafotsy na ny volamena; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny nanavotana anareo dia ny ra sarobidy nafoin’i Kristy, toy ny ran-janakondry tsy misy kilema ary tsy misy pentina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voafidy araka ny efa voatendrin’Andriamanitra Ray ianareo ary voatokana ho Azy noho ny asan’ny Fanahy Masina, mba hanaiky an’i Jesoa Kristy sy hanana anjara amin’ny famafazana ny rany
    - type: usfm
