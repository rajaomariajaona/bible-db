      - type: text
        text: mpaminany
    - type: text
      text: ' famotopotorana sy fikarohana fatratra, satria ireo no efa nilaza mialoha ny fahasoavana voatendrin’Andriamanitra ho anareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nokarohin’ny mpaminany tokoa izay vaninandro sy toe-javatra notondroin’ny Fanahin’i Kristy; fa tao anatin’izy ireo ny Fanahin’i Kristy ka nanambara mialoha ny fijaliana hanjo an’i Kristy sy ny voninahitra hanaraka izany
