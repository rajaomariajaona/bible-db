  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamangy anareo olom-boafidin’Andriamanitra aho, dia ianareo mpivahiny miely patrana any amin’ny faritany Pônto, Galatia, Kapadôsia, Azia sy Bitinia
    - type: usfm
