document_id: 1PE.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Petera ity taratasy ity, dia izaho apôstôlin’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: .
  - type: text
    content: Mamangy anareo olom-boafidin’Andriamanitra aho, dia ianareo mpivahiny miely patrana any amin’ny faritany Pônto, Galatia, Kapadôsia, Azia sy Bitinia
  - type: note
    content: 'miely patrana: ny voambolana mifanandrify amin’izany ao amin’ny rijan-teny grika fototra dia mazàna manondro ireo Jiosy ivelan’i Palestinina; eto kosa dia ampiharina amin’ireo kristianina niparitaka tamin’ny faritany maro (ampit Jak 1.1 sy nta). –Pônto... Bitinia: faritany dimy teo ambany fifehezana rômanina tao Azia Minôra (na Torkia any Azia, ankehitriny).'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ny amin’izany famonjena izany dia nanaovan’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' famotopotorana sy fikarohana fatratra, satria ireo no efa nilaza mialoha ny fahasoavana voatendrin’Andriamanitra ho anareo. '
  '11':
  - type: text
    content: Nokarohin’ny mpaminany tokoa izay vaninandro sy toe-javatra notondroin’ny Fanahin’i Kristy; fa tao anatin’izy ireo ny Fanahin’i Kristy ka nanambara mialoha ny fijaliana hanjo an’i Kristy sy ny voninahitra hanaraka izany
  - type: note
    content: Jereo Sal 22; Is 53; Lk 24.25-26.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Nasehon’Andriamanitra tamin’ireo mpaminany fa ny zavatra nomena horaharahainy dia tsy natao ho azy ireo fa natao ho anareo; ary izany zavatra izany dia nampandrenesina anareo ankehitriny, tamin’ny alalan’ireo olona izay nombàn’ny Fanahy Masina nirahina avy tany an-danitra ka nitory ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' taminareo. Eny, izany zavatra izany aza dia irîn’ireo '
  - type: text
    content: anjely
  - type: text
    content: ' hodinihina.'
  - type: heading
    content: Fanaingana ho masim-pitondrantena
  '13':
  - type: text
    content: 'Noho izany, dia aoka ho vonombonona lalandava ny fanahinareo; mahonòna tena, ka antenao tsara ny fahasoavana izay hatolotra anareo amin’ny andro hisehoan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Aoka ho fatra-panaiky an’Andriamanitra ianareo, ka aza manaraka ny filàndratsinareo fahiny, fony ianareo mbola tao anatin’ny tsy fahalalana. '
  '15':
  - type: text
    content: 'Fa '
  - type: text
    content: masina
  - type: text
    content: ' ilay Andriamanitra niantso anareo; noho izany, aoka ho masina tahaka Azy koa ianareo amin’ny lafim-pitondrantena rehetra, '
  '16':
  - type: text
    content: 'satria izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Aoka ho masina ianareo satria masina Aho'
  - type: note
    content: Lev 19.2.
  - type: text
    content: .»
  '17':
  - type: text
    content: 'Ilay Andriamanitra, tsy mizaha tavan’olona fa mitsara ny tsirairay araka ny asany avy, dia antsoinareo hoe Ray; koa manàna fitondrantena feno fanajana Azy ianareo mandritra ny andro ivahinianareo etỳ an-tany. '
  '18':
  - type: text
    content: 'Fantatrareo fa ny nanavotana anareo, ho afaka tamin’ny fitondrantena tsy mahasoa nentim-paharazana, dia tsy zavatra mety simba tahaka ny volafotsy na ny volamena; '
  '19':
  - type: text
    content: 'ny nanavotana anareo dia ny ra sarobidy nafoin’i Kristy, toy ny ran-janakondry tsy misy kilema ary tsy misy pentina. '
  '2':
  - type: text
    content: Voafidy araka ny efa voatendrin’Andriamanitra Ray ianareo ary voatokana ho Azy noho ny asan’ny Fanahy Masina, mba hanaiky an’i Jesoa Kristy sy hanana anjara amin’ny famafazana ny rany
  - type: note
    content: Ny vokatry ny fahafatesan’i Kristy dia voavisavisa etoana araka ny voambolana rômanina fampiasa amin’ny fisoronana ao amin’ny Test. T. Jereo Eks 24.3-8; Lev 16.14-15.
  - type: text
    content: .
  - type: text
    content: Hampitomboina ao aminareo anie ny fahasoavana sy ny fiadanana!
  - type: heading
    content: Fiderana an’Andriamanitra noho ny famonjeny
  '20':
  - type: text
    content: 'I Kristy dia efa voatendrin’Andriamanitra rahateo talohan’ny nahariana '
  - type: text
    content: izao tontolo izao
  - type: text
    content: ', saingy tamin’izao andro farany izao vao naseho noho ny aminareo; '
  '21':
  - type: text
    content: Izy no mahatonga anareo hino an’Andriamanitra, Ilay nanangana Azy ho velona avy any amin’ny maty sy nanome voninahitra Azy, mba hifantohan’ny finoanareo sy ny fanantenanareo amin’Andriamanitra.
  '22':
  - type: text
    content: Efa nandio ny fanahinareo ianareo tamin’ny nanekenareo ny fampianarana marim-pototra
  - type: note
    content: 'tamin’ny nanekenareo ny fampianarana marim-pototra: misy stf sasany ahitana hoe tamin’ny nanekenareo ny fampianarana marim-pototra vokatry ny asan’ny Fanahy Masina.'
  - type: text
    content: 'mba ho fitiavana tsy misy fihatsarambelatsihy no hitiavanareo ny havana iray finoana, koa mifankatiava fatratra amin’ny fonareo tokoa. '
  '23':
  - type: text
    content: 'Nateraka indray ianareo, tsy tamin’ny voa mety lo, fa tamin’ny voa tsy mety lo: dia ny tenin’Andriamanitra, izay teny velona sady maharitra. '
  '24':
  - type: text
    content: 'Fa hoy ny Soratra Masina:'
  - type: text
    content: «Ny olombelona rehetra dia tahaka ny ahitra
  - type: text
    content: 'ary ny voninahiny rehetra dia toy ny vonin’ny ahitra:'
  - type: text
    content: malazo ny ahitra, dia mihintsana ny voniny.
  '25':
  - type: text
    content: Fa ny tenin’ny Tompo no maharitra mandrakizay
  - type: note
    content: 'And 24-25: Is 40.6-8, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  - type: text
    content: 'Ary izany teny izany dia ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' notorîna taminareo.'
  '3':
  - type: text
    content: 'Hankalazaina anie ilay Andriamanitra sady Rain’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika! Be famindrampo tokoa Andriamanitra, ka niteraka antsika indray tamin’ny alalan’i Jesoa Kristy Izay natsangany ho velona avy any amin’ny maty. Izany no ananantsika fanantenana mivaivay '
  '4':
  - type: text
    content: 'fa hahazo ny lova tsy mety simba sady tsy azon-doto no tsy mety levona. Voatahiry any an-danitra io lova io mba ho anareo, '
  '5':
  - type: text
    content: dia ianareo izay arovan’ny herin’Andriamanitra amin’ny alalan’ny finoana mba handray ny famonjena efa vonona haseho amin’ny andro farany.
  '6':
  - type: text
    content: 'Izany koa no iravoravoanareo na dia mbola tsy maintsy hampahorîna vetivety amin’ny fitsapana samy hafa aza ianareo. '
  '7':
  - type: text
    content: Ny volamena dia sedraina amin’ny alalan’ny afo na dia zavatra mety simba aza; ary ny finoanareo, izay sarobidy lavitra noho ny volamena, dia sedraina amin’ny alalan’ireny fitsapana ireny ka ho hita fa hahazoan’Andriamanitra dera sy voninahitra ary haja
  - type: note
    content: 'hahazoan’Andriamanitra... haja: dkt hafa hahazoanareo... haja.'
  - type: text
    content: 'izany, amin’ny andro hisehoan’i Jesoa Kristy. '
  '8':
  - type: text
    content: Manam-pitiavana an’i Jesoa Kristy ianareo, na dia tsy nahita Azy aza; mino Azy ianareo, na dia tsy mahita Azy aza ankehitriny
  - type: note
    content: Ampit Jôh 20.29.
  - type: text
    content: ': izany no iravoravoanareo amin’ny hafaliana tsy hay lazaina sady be voninahitra, '
  '9':
  - type: text
    content: satria azonareo ilay zava-kendren’ny finoanareo, dia ny famonjena ny fanahinareo
  - type: note
    content: 'ny fanahinareo: mahafaoka ny maha olona manontolo.'
  - type: text
    content: .
