  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, dia aoka ho vonombonona lalandava ny fanahinareo; mahonòna tena, ka antenao tsara ny fahasoavana izay hatolotra anareo amin’ny andro hisehoan’i Jesoa '
    - type: usfm
