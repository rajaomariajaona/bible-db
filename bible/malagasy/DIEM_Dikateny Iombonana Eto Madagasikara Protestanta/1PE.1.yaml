  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy no mahatonga anareo hino an’Andriamanitra, Ilay nanangana Azy ho velona avy any amin’ny maty sy nanome voninahitra Azy, mba hifantohan’ny finoanareo sy ny fanantenanareo amin’Andriamanitra.
  '22':
  - type: usfm
