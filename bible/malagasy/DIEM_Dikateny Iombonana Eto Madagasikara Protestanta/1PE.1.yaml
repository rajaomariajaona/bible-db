  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho fatra-panaiky an’Andriamanitra ianareo, ka aza manaraka ny filàndratsinareo fahiny, fony ianareo mbola tao anatin’ny tsy fahalalana. '
