document_id: DEU.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: «Tiavo ny Tompo Andriamanitrareo»
  - type: text
    content: 'Izao no didy sy lalàna amam-pitsipika, nasain’ny TOMPO Andriamanitrareo hampianarina hotanterahinareo any amin’ny tany izay hiampitanareo mba halainareo ho fananana. '
  '10':
  - type: text
    content: 'Rehefa izay ianareo hampidirin’ny TOMPO Andriamanitrareo any amin’ny tany nianianany tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo fa homeny anareo, '
  '11':
  - type: text
    content: 'dia hahita tanàna lehibe sady tsara izay tsy ianareo no nanorina azy, sy lavaka famorian-drano izay tsy ianareo no nandavaka azy, ary saham-boaloboka aman’ôliva izay tsy ianareo no namboly azy; ka hihinana sy hivoky ianareo. '
  '12':
  - type: text
    content: 'Amin’izay, dia tandremonareo fandrao hadinoinareo ny TOMPO Izay nampiala anareo tany Ejipta, toera-nanandevozana anareo. '
  '13':
  - type: text
    content: 'Ilay TOMPO Andriamanitrareo ihany no hohajainareo, Izy no hotompoinareo, ary ny anarany no aoka hianiananareo. '
  '14':
  - type: text
    content: 'Aza manaraka andriamani-kafa amin’ireny andriamanitry ny firenena manodidina anareo ireny, '
  '15':
  - type: text
    content: 'satria Andriamanitra saro-piaro amin’ny maha Andriamanitra Azy ilay TOMPO Andriamanitrareo Izay eo afovoanareo. Koa tandremo fandrao hirehitra aminareo ny fahatezeran’ilay TOMPO Andriamanitrareo ka hofongorany tsy ho eto ambonin’ny tany ianareo. '
  '16':
  - type: text
    content: Aza maka fanahy ny TOMPO Andriamanitrareo ianareo, tahaka ny nataonareo tany Masà
  - type: note
    content: Jereo Eks 17.1-7; Mt 4.7; Lk 4.12.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Tandremo tsara ny didy sy baiko aman-dalàna izay efa nampitain’ny TOMPO Andriamanitrareo taminareo. '
  '18':
  - type: text
    content: 'Tanteraho izay mahitsy sady tsara eo imason’ny TOMPO mba ho sambatra ianareo sy hiditra hahazo ny tany soa izay tamim-pianianana no nampanantenan’ny TOMPO azy ny razambenareo; '
  '19':
  - type: text
    content: ary dia horoahinareo lavitra anareo avokoa ny fahavalonareo, araka izay voalazan’ny TOMPO.
  '2':
  - type: text
    content: 'Ny tanjona kendrena, ho an’ny andro rehetra iainanareo, dia ny hanajanareo ny TOMPO Andriamanitrareo ka hitandremanareo ny lalànany sy didiny rehetra izay ampitaiko aminareo sy amin’ny taranakareo mba ho maro andro ianareo. '
  '20':
  - type: text
    content: 'Rahatrizay ny zanakareo hanontany anareo hoe: «Inona no anton’ireo baiko sy lalàna amam-pitsipika izay efa nandidian’ny TOMPO Andriamanitsika anareo?», '
  '21':
  - type: text
    content: 'dia hovalianareo hoe: «Nandevozin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' tany Ejipta isika, ary fahefana mahery no nampialan’ny TOMPO antsika tany. '
  '22':
  - type: text
    content: 'Famantarana sy zava-mahagaga goavana sady mandoza no nataon’ny TOMPO teo imasontsika hamelezana ny Farao mbamin’ny ankohonany sy ny Ejiptianina. '
  '23':
  - type: text
    content: 'Isika kosa nampialany tany Ejipta mba hampidirina eto homena ilay tany izay nampanantenainy ny razambentsika tamim-pianianana. '
  '24':
  - type: text
    content: 'Nodidian’ny TOMPO isika hanatanteraka ireo lalàna rehetra ireo sy hanaja Azy TOMPO Andriamanitsika, mba ho sambatra lalandava sy ho velona aina tahaka ny amin’izao anio izao. '
  '25':
  - type: text
    content: Ary ho toetra marina ny antsika raha imasoantsika ny hanatanteraka manontolo izany didy izany eo anatrehan’ny TOMPO Andriamanitsika, araka izay nampitainy tamintsika
  - type: note
    content: Dkt hafa momba ny and 25; Ny adidintsika dia ny himasoantsika hanatanteraka manontolo izany...
  - type: text
    content: .
  '3':
  - type: text
    content: Henoy izany, ry vahoaka Israely, ary imasoy ny hanatanteraka azy, mba ho sambatra sy hitombo isa ianareo any amin’ilay tany tondra-dronono sy tantely
  - type: note
    content: Jereo Eks 3.8 sy nta.
  - type: text
    content: ', araka izay nampanantenain’ny TOMPO Andriamanitry ny razambenareo taminareo.'
  '4':
  - type: text
    content: '«Mihainoa, ry vahoaka Israely: Ny TOMPO Andriamanitsika no TOMPO tokana'
  - type: note
    content: 'Jereo Nom 15.37 sy nta. Ny Tompo Andriamanitsika no Tompo tokana: dkt hafa Ny Tompo, ny Tompo irery ihany no Andriamanitsika, jereo Mk 12.29.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: Koa tiavo ny TOMPO Andriamanitrao amin’ny fonao manontolo sy amin’ny fanahinao manontolo ary amin’ny herinao manontolo
  - type: note
    content: Jereo Mt 22.37; Mk 12.30; Lk 10.27.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Aoka haraikitrao ao am-ponao izao didy ampitaiko anao anio izao. '
  '7':
  - type: text
    content: 'Dia ampianaro tsara ny zanakao izany; ary resaho na mipetraka ao an-tranonao ianao na mandeha eny an-dalana, na mandry ianao na mifoha. '
  '8':
  - type: text
    content: 'Mba ho fampahatsiahivana anao, dia ataovy amin’ny boaty famehy eny amin’ny hato-tananao na eny an-kandrinao ireny, '
  '9':
  - type: text
    content: ary soraty eo amin’ny tolàm-baravaran’ny tranonao na eo amin’ny vavahadin’ny tanànanao
  - type: note
    content: 'And 6-9: jereo 11.18-20.'
  - type: text
    content: .»
  - type: heading
    content: Tsy tokony hohadinoin’i Israely ilay Andriamaniny
