document_id: DEU.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: «Tiavo ny Tompo Andriamanitrareo»
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no didy sy lalàna amam-pitsipika, nasain’ny TOMPO Andriamanitrareo hampianarina hotanterahinareo any amin’ny tany izay hiampitanareo mba halainareo ho fananana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny tanjona kendrena, ho an’ny andro rehetra iainanareo, dia ny hanajanareo ny TOMPO Andriamanitrareo ka hitandremanareo ny lalànany sy didiny rehetra izay ampitaiko aminareo sy amin’ny taranakareo mba ho maro andro ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Henoy izany, ry vahoaka Israely, ary imasoy ny hanatanteraka azy, mba ho sambatra sy hitombo isa ianareo any amin’ilay tany tondra-dronono sy tantely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', araka izay nampanantenain’ny TOMPO Andriamanitry ny razambenareo taminareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Mihainoa, ry vahoaka Israely: Ny TOMPO Andriamanitsika no TOMPO tokana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Nom 15.37 sy nta. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny Tompo Andriamanitsika no Tompo tokana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny Tompo, ny Tompo irery ihany no Andriamanitsika
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Mk 12.29.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa tiavo ny TOMPO Andriamanitrao amin’ny fonao manontolo sy amin’ny fanahinao manontolo ary amin’ny herinao manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 22.37; Mk 12.30; Lk 10.27.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aoka haraikitrao ao am-ponao izao didy ampitaiko anao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia ampianaro tsara ny zanakao izany; ary resaho na mipetraka ao an-tranonao ianao na mandeha eny an-dalana, na mandry ianao na mifoha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mba ho fampahatsiahivana anao, dia ataovy amin’ny boaty famehy eny amin’ny hato-tananao na eny an-kandrinao ireny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary soraty eo amin’ny tolàm-baravaran’ny tranonao na eo amin’ny vavahadin’ny tanànanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 6-9:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 11.18-20.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy tokony hohadinoin’i Israely ilay Andriamaniny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa izay ianareo hampidirin’ny TOMPO Andriamanitrareo any amin’ny tany nianianany tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo fa homeny anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia hahita tanàna lehibe sady tsara izay tsy ianareo no nanorina azy, sy lavaka famorian-drano izay tsy ianareo no nandavaka azy, ary saham-boaloboka aman’ôliva izay tsy ianareo no namboly azy; ka hihinana sy hivoky ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amin’izay, dia tandremonareo fandrao hadinoinareo ny TOMPO Izay nampiala anareo tany Ejipta, toera-nanandevozana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ilay TOMPO Andriamanitrareo ihany no hohajainareo, Izy no hotompoinareo, ary ny anarany no aoka hianiananareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Aza manaraka andriamani-kafa amin’ireny andriamanitry ny firenena manodidina anareo ireny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'satria Andriamanitra saro-piaro amin’ny maha Andriamanitra Azy ilay TOMPO Andriamanitrareo Izay eo afovoanareo. Koa tandremo fandrao hirehitra aminareo ny fahatezeran’ilay TOMPO Andriamanitrareo ka hofongorany tsy ho eto ambonin’ny tany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aza maka fanahy ny TOMPO Andriamanitrareo ianareo, tahaka ny nataonareo tany Masà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 17.1-7; Mt 4.7; Lk 4.12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tandremo tsara ny didy sy baiko aman-dalàna izay efa nampitain’ny TOMPO Andriamanitrareo taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tanteraho izay mahitsy sady tsara eo imason’ny TOMPO mba ho sambatra ianareo sy hiditra hahazo ny tany soa izay tamim-pianianana no nampanantenan’ny TOMPO azy ny razambenareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary dia horoahinareo lavitra anareo avokoa ny fahavalonareo, araka izay voalazan’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rahatrizay ny zanakareo hanontany anareo hoe: «Inona no anton’ireo baiko sy lalàna amam-pitsipika izay efa nandidian’ny TOMPO Andriamanitsika anareo?», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia hovalianareo hoe: «Nandevozin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' tany Ejipta isika, ary fahefana mahery no nampialan’ny TOMPO antsika tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Famantarana sy zava-mahagaga goavana sady mandoza no nataon’ny TOMPO teo imasontsika hamelezana ny Farao mbamin’ny ankohonany sy ny Ejiptianina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Isika kosa nampialany tany Ejipta mba hampidirina eto homena ilay tany izay nampanantenainy ny razambentsika tamim-pianianana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nodidian’ny TOMPO isika hanatanteraka ireo lalàna rehetra ireo sy hanaja Azy TOMPO Andriamanitsika, mba ho sambatra lalandava sy ho velona aina tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ho toetra marina ny antsika raha imasoantsika ny hanatanteraka manontolo izany didy izany eo anatrehan’ny TOMPO Andriamanitsika, araka izay nampitainy tamintsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa momba ny and 25; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny adidintsika dia ny himasoantsika hanatanteraka manontolo izany...
    marker-yv: yv-n
  - type: text
    text: .
