document_id: 2CH.32,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanafihan’i Saneheriba ny fanjakàn’i Joda
  - type: heading
    content: (Jereo 2 Mp 18.13; Is 36.1)
  - type: text
    content: 'Taorian’izany zava-nitranga sy fanehoam-piraiketam-po tamin’Andriamanitra izany, dia tonga tao Joda i Saneheriba mpanjakan’i Asiria ary nanao fahirano ny tanànamimanda ka nikendry haka azy. '
  '10':
  - type: text
    content: '–Izao no lazain’i Saneheriba mpanjakan’i Asiria: «Mba inona izao itokianareo izao no dia miaritra fahoriana ato Jerosalema ianareo? '
  '11':
  - type: text
    content: 'Tsy i Hezekià ihany va no manambosy anareo hanolo-tena ho faty mosary sy hetaheta ka milaza fa ny TOMPO Andriamanitrareo no hamonjy anareo tsy hiharan’ny fahefàko? '
  '12':
  - type: text
    content: 'Kanefa io Hezekià io koa no nandrava ireo '
  - type: text
    content: toeram-pisoronana
  - type: text
    content: ' aman’'
  - type: text
    content: alitarany
  - type: text
    content: ', ka nandidy ny mponin’i Joda sy i Jerosalema mba tsy hanao fanompoam-pivavahana afa-tsy eo anoloan’ny alitara tokana ary tsy handoro '
  - type: text
    content: sorona
  - type: text
    content: ' hanetona afa-tsy eo ihany? '
  '13':
  - type: text
    content: 'Tsy fantatrareo va izay nataon’ireo razako sy ny tenako tamin’ny firenena hafa rehetra eto an-tany? Moa nisy nahavonjy ny taniny tsy hiharan’ny fahefàko ve ireo andriamanitry ny firenen-kafa? '
  '14':
  - type: text
    content: 'Ny andriamanitr’ireo firenena efa naringan’ny razako ireo dia tsy nisy nahavonjy ny olony tsy hiharan’ny fahefàko, ka dia hahavonjy anareo tsy hiharan’ny fahefàko va ny Andriamanitrareo? '
  '15':
  - type: text
    content: Ankehitriny àry, aza mety hofitahin’i Hezekià na ho voasodokany tahaka izao ianareo; aza matoky azy ianareo. Tsy nisy manko andriamanitra, tany amin’ny firenena amam-panjakana isan-tokony, izay nahavonjy ny olony tsy hiharan’ny fahefàn’ireo razako na ny fahefàko; noho izany, ireo andriamanitrareo
  - type: note
    content: 'ireo andriamanitrareo: araka ny and 11 sy 14 ary 17 dia fantatr’i Saneheriba fa Andriamanitra tokana no ananan’ny Israelita; kanefa ity hoe ireo andriamanitrareo dia mety avy amin’ny hoe saika ny firenen-kafa fahizay no manompo andriamanitra maro; ny dkt tranainy rehetra dia manao hoe ilay Andriamanitrareo.'
  - type: text
    content: koa tsy hahavonjy anareo tsy hiharan’ny fahefàko.»
  '16':
  - type: text
    content: Ary ny manamboninahitra nirahin’i Saneheriba dia nanohy niteny ratsy nanohitra ny TOMPO Andriamanitra sy nanohitra an’i Hezekià mpanompony.
  - type: heading
    content: Notsiratsirain’i Saneheriba ny Tompo
  - type: heading
    content: (Jereo 2 Mp 19.14-19; Is 37.14-20)
  '17':
  - type: text
    content: 'Dia nanoratra taratasy koa ity mpanjakan’i Asiria mba hihantsiana ny TOMPO Andriamanitr’i Israely sy hanarabiana Azy. Ka hoy izy hoe: «Tsy nahavonjy ny olony tsy hiharan’ny fahefàko ny andriamanitr’ireo firenena hafa teto an-tany; noho izany, ny Andriamanitr’i Hezekià dia tsy hahavonjy koa ny olony tsy hiharan’ny fahefàko.»'
  '18':
  - type: text
    content: 'Ankoatra izany, ireto irak’i Saneheriba ireto dia niantso tamin’ny feo mahery sady araka ny fiteny jodeanina teo anatrehan’ny mponin’i Jerosalema izay teny ambonin’ny manda; ny hampitahorany sy hampangorohoroany azy mba hahazoany ny tanàna no anton’izany. '
  '19':
  - type: text
    content: Ary ny fitenenany an’ilay Andriamanitr’i Jerosalema koa dia toy ny fitenenany an’ireny andriamanitry ny firenena any an-tany hafa ireny, izay sarivongana asan-tanan’olona ihany.
  - type: heading
    content: Fandosiran’ny Asirianina sy fahafatesan’i Saneheriba
  - type: heading
    content: (Jereo 2 Mp 19.15, 35-37; Is 37.15, 36-38)
  '2':
  - type: text
    content: 'Rehefa hitan’i Hezekià fa tonga i Saneheriba ka nikasa hamely an’i Jerosalema, '
  '20':
  - type: text
    content: 'Noho izany toe-javatra izany dia nivavaka i Hezekià mpanjaka sy i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Amôtsa, ka niantso vonjy tamin’Andriamanitra. '
  '21':
  - type: text
    content: 'Ny TOMPO kosa naniraka '
  - type: text
    content: anjely
  - type: text
    content: ', izay nandringana ny miaramila maherifo rehetra sy ny manamboninahitra ary ny komandy teo an-tobin’ny mpanjakan’i Asiria. Ka dia lasa nody tamin-kenatra i Saneheriba; ary nony niditra tao an-tranon’ny andriamaniny izy, dia ireo zanany naterany ihany no namono nahafaty azy tao tamin’ny sabatra.'
  '22':
  - type: text
    content: 'Toy izany no namonjen’ny TOMPO an’i Hezekià sy ny mponin’i Jerosalema tsy ho azon’i Saneheriba mpanjakan’i Asiria na ho azon’ny fahavalo hafa rehetra; ary nanomezany azy fiadanana tamin’ny sisin-tany manodidina. '
  '23':
  - type: text
    content: Olona maro no nitondra fanatitra ho an’ny TOMPO tao Jerosalema ary koa fanomezana ho an’i Hezekià mpanjakan’i Joda; ka nanomboka tamin’izay i Hezekià no nalaza teo imason’ny firenen-drehetra manodidina.
  - type: heading
    content: Fiafaran’ny nanjakàn’i Hezekià
  - type: heading
    content: (Jereo 2 Mp 20.1-21; Is 38.1-8; 39)
  '24':
  - type: text
    content: 'Tamin’izany andro izany dia narary efa saiky maty i Hezekià; koa dia nivavaka tamin’ny TOMPO izy, ary novaliany sady nanaovany zava-mahagaga. '
  '25':
  - type: text
    content: 'I Hezekià kosa tsy mba namaly araka izay soa efa natao taminy; fa niavonavona am-po izy ka niharan’ny fahatezeran’Andriamanitra ny tenany mbamin’i Joda sy i Jerosalema. '
  '26':
  - type: text
    content: Kanefa, na dia efa niavonavona am-po aza ity mpanjaka, dia niaiky heloka izy mbamin’ny mponin’i Jerosalema; ka tsy niharan’ny fahatezeran’ny TOMPO ireo, fony fahavelon’i Hezekià.
  '27':
  - type: text
    content: Harena amam-boninahitra be dia be tokoa no nananan’i Hezekià. Ka nanao trano firaketana izy hametrahany ny volafotsy sy ny volamena, ny vatosoa sy ny zava-manitra ary ny ampinga
  - type: note
    content: Ny ampinga izay voalaza ho anisan’ny zavatra sarobidy dia toa fitaovana fandravahana vita volamena angamba (ampit 1 Mp 10.16-17).
  - type: text
    content: ' mbamin’ny fanaka sarobidy isan-karazany; '
  '28':
  - type: text
    content: 'nanao trano fitahirizam-bokatra izy, dia vokatra toy ny vary sy ny divay ary ny menaka; ary nanao trano fisoko izy ho an’ny biby fiompy samy hafa sy nanao trano ho an’ny ondry aman’osy. '
  '29':
  - type: text
    content: Nanao tanàna maro ho an’ny tenany koa i Hezekià sady nanana ondry aman’osy ary omby betsaka, satria nomen’Andriamanitra fananana be dia be izy.
  '3':
  - type: text
    content: 'dia niara-nidinika tamin’ny manampahefana sy ny mpitari-tafika izy ny amin’ny tokony hanampenana ny loharano rehetra any ivelan’ny tanàna; ka niandanian’ireo ny mpanjaka. '
  '30':
  - type: text
    content: 'I Hezekià ihany koa no nanampina ny lakan-drano ambony ao amin’ny loharanon’i Gihôna ka nampandeha azy ambanin’ny tany mba hidina mahitsy ho any andrefan’ny '
  - type: text
    content: Tanànan’i Davida
  - type: note
    content: Jereo 2 Mp 20.20 sy nta.
  - type: text
    content: .
  - type: text
    content: 'Nambinina tamin’ny asany rehetra i Hezekià. '
  '31':
  - type: text
    content: Noho izany, rehefa nandefasan’ny manampahefana babilônianina iraka izy mba hanontany momba ny zava-mahagaga nitranga teo amin’ny taniny
  - type: note
    content: Toa ilay zava-nitranga voatantara ao amin’ny 2 Mp 20.8-11 izany.
  - type: text
    content: ', dia navelan’Andriamanitra hanao saim-pantatra izy mba hisedrany azy ka hahalalany izay toetrany rehetra.'
  '32':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Hezekià sy ireo soa nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Fahitàn’i Isaià
