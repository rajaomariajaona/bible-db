document_id: 2CH.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanafihan’i Saneheriba ny fanjakàn’i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 18.13; Is 36.1)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany zava-nitranga sy fanehoam-piraiketam-po tamin’Andriamanitra izany, dia tonga tao Joda i Saneheriba mpanjakan’i Asiria ary nanao fahirano ny tanànamimanda ka nikendry haka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rehefa hitan’i Hezekià fa tonga i Saneheriba ka nikasa hamely an’i Jerosalema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia niara-nidinika tamin’ny manampahefana sy ny mpitari-tafika izy ny amin’ny tokony hanampenana ny loharano rehetra any ivelan’ny tanàna; ka niandanian’ireo ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia vory maro ny olona ka nanampina ny loharano rehetra sy ilay renirano mikoriana anaty lakan-drano ambanin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay renirano... tany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny loharanon’i Gihôna izay namoaka rano nankany amin’ny lohasahan-driaka Kidrôna (jereo 1 Mp 1.33 sy nta.). Notampenan’i Hezekià izany fandehanany mankany Kidrôna izany fa notarihiny hankao an-tanàna ny rano tamin’ny alalan’ny lakan-drano ambanin’ny tany (jereo and 30 ary koa 2 Mp 20.20 sy nta).
    marker-yv: yv-n
  - type: text
    text: '. Hoy manko ireo anakampony hoe: «Tsy tokony hahita izao rano be izao ny mpanjakan’i Asiria, rehefa tonga eto!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nentanin-kerimpo hatrany i Hezekià ka nampanamboatra izay rehetra rava tamin’ny manda sady nampanisy tilikambo teny amboniny sy manda hafa koa teo ivelany; nampanamafisiny ny toerana Milao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Milao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 9.15 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: ' ary lefona aman’ampinga betsaka no nampanefeny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nanendry mpitondra miaramila izy mba hifehy ny mponina tao an-drenivohitra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nasain’i Hezekià ny besinimaro hivory teo amin’ny toera-malalaka akaikin’ny vavahadin’ny tanàna ka nanaovany teny fampirisihana hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Mahereza ka matanjaha. Aza matahotra na mivadi-po eo anoloan’ny mpanjakan’i Asiria sy ny hamaroan’ny miaramila rehetra izay entiny; fa misy hery lehibe kokoa miaraka amintsika noho ny miaraka aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Herin’olombelona no miaraka aminy, fa ny TOMPO Andriamanitsika kosa no miaraka amintsika; Izy no hanampy antsika sy hisahana ny adintsika.»
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia izany tenin’i Hezekià mpanjakan’i Joda izany no nianteheran’ny mponina teo an-drenivohitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fihantsian’i Saneheriba ny mponin’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 18.17-37; Is 36.2-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Taorian’izay dia nanao fahirano an’i Lakisy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lakisy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Mp 14.19 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Saneheriba mpanjakan’i Asiria ary koa ny tafiny manontolo. Avy ao i Saneheriba no naniraka manamboninahitra hankany Jerosalema ho any amin’i Hezekià mpanjakan’i Joda sy ho any amin’ny Jodeanina rehetra nonina tao an-drenivohitra. Ka hoy ny hafatra nampitain’ireto iraka hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '–Izao no lazain’i Saneheriba mpanjakan’i Asiria: «Mba inona izao itokianareo izao no dia miaritra fahoriana ato Jerosalema ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy i Hezekià ihany va no manambosy anareo hanolo-tena ho faty mosary sy hetaheta ka milaza fa ny TOMPO Andriamanitrareo no hamonjy anareo tsy hiharan’ny fahefàko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanefa io Hezekià io koa no nandrava ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-pisoronana
  - type: text
    text: ' aman’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitarany
  - type: text
    text: ', ka nandidy ny mponin’i Joda sy i Jerosalema mba tsy hanao fanompoam-pivavahana afa-tsy eo anoloan’ny alitara tokana ary tsy handoro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' hanetona afa-tsy eo ihany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy fantatrareo va izay nataon’ireo razako sy ny tenako tamin’ny firenena hafa rehetra eto an-tany? Moa nisy nahavonjy ny taniny tsy hiharan’ny fahefàko ve ireo andriamanitry ny firenen-kafa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny andriamanitr’ireo firenena efa naringan’ny razako ireo dia tsy nisy nahavonjy ny olony tsy hiharan’ny fahefàko, ka dia hahavonjy anareo tsy hiharan’ny fahefàko va ny Andriamanitrareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankehitriny àry, aza mety hofitahin’i Hezekià na ho voasodokany tahaka izao ianareo; aza matoky azy ianareo. Tsy nisy manko andriamanitra, tany amin’ny firenena amam-panjakana isan-tokony, izay nahavonjy ny olony tsy hiharan’ny fahefàn’ireo razako na ny fahefàko; noho izany, ireo andriamanitrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo andriamanitrareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny and 11 sy 14 ary 17 dia fantatr’i Saneheriba fa Andriamanitra tokana no ananan’ny Israelita; kanefa ity hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ireo andriamanitrareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety avy amin’ny hoe saika ny firenen-kafa fahizay no manompo andriamanitra maro; ny dkt tranainy rehetra dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay Andriamanitrareo.
    marker-yv: yv-n
  - type: text
    text: koa tsy hahavonjy anareo tsy hiharan’ny fahefàko.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny manamboninahitra nirahin’i Saneheriba dia nanohy niteny ratsy nanohitra ny TOMPO Andriamanitra sy nanohitra an’i Hezekià mpanompony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Notsiratsirain’i Saneheriba ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 19.14-19; Is 37.14-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nanoratra taratasy koa ity mpanjakan’i Asiria mba hihantsiana ny TOMPO Andriamanitr’i Israely sy hanarabiana Azy. Ka hoy izy hoe: «Tsy nahavonjy ny olony tsy hiharan’ny fahefàko ny andriamanitr’ireo firenena hafa teto an-tany; noho izany, ny Andriamanitr’i Hezekià dia tsy hahavonjy koa ny olony tsy hiharan’ny fahefàko.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ankoatra izany, ireto irak’i Saneheriba ireto dia niantso tamin’ny feo mahery sady araka ny fiteny jodeanina teo anatrehan’ny mponin’i Jerosalema izay teny ambonin’ny manda; ny hampitahorany sy hampangorohoroany azy mba hahazoany ny tanàna no anton’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny fitenenany an’ilay Andriamanitr’i Jerosalema koa dia toy ny fitenenany an’ireny andriamanitry ny firenena any an-tany hafa ireny, izay sarivongana asan-tanan’olona ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandosiran’ny Asirianina sy fahafatesan’i Saneheriba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 19.15, 35-37; Is 37.15, 36-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Noho izany toe-javatra izany dia nivavaka i Hezekià mpanjaka sy i Isaià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' zanakalahin’i Amôtsa, ka niantso vonjy tamin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny TOMPO kosa naniraka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ', izay nandringana ny miaramila maherifo rehetra sy ny manamboninahitra ary ny komandy teo an-tobin’ny mpanjakan’i Asiria. Ka dia lasa nody tamin-kenatra i Saneheriba; ary nony niditra tao an-tranon’ny andriamaniny izy, dia ireo zanany naterany ihany no namono nahafaty azy tao tamin’ny sabatra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toy izany no namonjen’ny TOMPO an’i Hezekià sy ny mponin’i Jerosalema tsy ho azon’i Saneheriba mpanjakan’i Asiria na ho azon’ny fahavalo hafa rehetra; ary nanomezany azy fiadanana tamin’ny sisin-tany manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Olona maro no nitondra fanatitra ho an’ny TOMPO tao Jerosalema ary koa fanomezana ho an’i Hezekià mpanjakan’i Joda; ka nanomboka tamin’izay i Hezekià no nalaza teo imason’ny firenen-drehetra manodidina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiafaran’ny nanjakàn’i Hezekià
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 20.1-21; Is 38.1-8; 39)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tamin’izany andro izany dia narary efa saiky maty i Hezekià; koa dia nivavaka tamin’ny TOMPO izy, ary novaliany sady nanaovany zava-mahagaga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I Hezekià kosa tsy mba namaly araka izay soa efa natao taminy; fa niavonavona am-po izy ka niharan’ny fahatezeran’Andriamanitra ny tenany mbamin’i Joda sy i Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Kanefa, na dia efa niavonavona am-po aza ity mpanjaka, dia niaiky heloka izy mbamin’ny mponin’i Jerosalema; ka tsy niharan’ny fahatezeran’ny TOMPO ireo, fony fahavelon’i Hezekià.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Harena amam-boninahitra be dia be tokoa no nananan’i Hezekià. Ka nanao trano firaketana izy hametrahany ny volafotsy sy ny volamena, ny vatosoa sy ny zava-manitra ary ny ampinga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny ampinga '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay voalaza ho anisan’ny zavatra sarobidy dia toa fitaovana fandravahana vita volamena angamba (ampit 1 Mp 10.16-17).
    marker-yv: yv-n
  - type: text
    text: ' mbamin’ny fanaka sarobidy isan-karazany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'nanao trano fitahirizam-bokatra izy, dia vokatra toy ny vary sy ny divay ary ny menaka; ary nanao trano fisoko izy ho an’ny biby fiompy samy hafa sy nanao trano ho an’ny ondry aman’osy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nanao tanàna maro ho an’ny tenany koa i Hezekià sady nanana ondry aman’osy ary omby betsaka, satria nomen’Andriamanitra fananana be dia be izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I Hezekià ihany koa no nanampina ny lakan-drano ambony ao amin’ny loharanon’i Gihôna ka nampandeha azy ambanin’ny tany mba hidina mahitsy ho any andrefan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 20.20 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nambinina tamin’ny asany rehetra i Hezekià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Noho izany, rehefa nandefasan’ny manampahefana babilônianina iraka izy mba hanontany momba ny zava-mahagaga nitranga teo amin’ny taniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Toa ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zava-nitranga
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' voatantara ao amin’ny 2 Mp 20.8-11 izany.'
    marker-yv: yv-n
  - type: text
    text: ', dia navelan’Andriamanitra hanao saim-pantatra izy mba hisedrany azy ka hahalalany izay toetrany rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Hezekià sy ireo soa nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Fahitàn’i Isaià
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zanakalahin’i Amôtsa
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Fahitàn’i... Amôtsa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Is 1.1.
    marker-yv: yv-n
  - type: text
    text: 'ary ao amin’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Bokin’ireo mpanjakan’i Joda sy i
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 16.11 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany kosa i Hezekià, dia nalevina tao amin’ny faritra ambony eo amin’ny fasan’ireo taranak’i Davida; tamin’izay ny mponin’i Jerosalema sy ny Jodeanina hafa rehetra dia samy nanome voninahitra azy. Ary i Manase zanakalahin’i Hezekià no nanjaka nandimby azy.
