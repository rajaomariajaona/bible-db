  '33':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany kosa i Hezekià, dia nalevina tao amin’ny faritra ambony eo amin’ny fasan’ireo taranak’i Davida; tamin’izay ny mponin’i Jerosalema sy ny Jodeanina hafa rehetra dia samy nanome voninahitra azy. Ary i Manase zanakalahin’i Hezekià no nanjaka nandimby azy.
  '4':
  - type: text
    content: Dia vory maro ny olona ka nanampina ny loharano rehetra sy ilay renirano mikoriana anaty lakan-drano ambanin’ny tany
  - type: note
    content: 'ilay renirano... tany: ny loharanon’i Gihôna izay namoaka rano nankany amin’ny lohasahan-driaka Kidrôna (jereo 1 Mp 1.33 sy nta.). Notampenan’i Hezekià izany fandehanany mankany Kidrôna izany fa notarihiny hankao an-tanàna ny rano tamin’ny alalan’ny lakan-drano ambanin’ny tany (jereo and 30 ary koa 2 Mp 20.20 sy nta).'
  - type: text
    content: '. Hoy manko ireo anakampony hoe: «Tsy tokony hahita izao rano be izao ny mpanjakan’i Asiria, rehefa tonga eto!»'
  '5':
  - type: text
    content: Nentanin-kerimpo hatrany i Hezekià ka nampanamboatra izay rehetra rava tamin’ny manda sady nampanisy tilikambo teny amboniny sy manda hafa koa teo ivelany; nampanamafisiny ny toerana Milao
  - type: note
    content: 'Milao: jereo 1 Mp 9.15 sy nta.'
  - type: text
    content: ' tao an-'
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ' ary lefona aman’ampinga betsaka no nampanefeny. '
  '6':
  - type: text
    content: Dia nanendry mpitondra miaramila izy mba hifehy ny mponina tao an-drenivohitra.
  - type: text
    content: 'Ary nasain’i Hezekià ny besinimaro hivory teo amin’ny toera-malalaka akaikin’ny vavahadin’ny tanàna ka nanaovany teny fampirisihana hoe: '
  '7':
  - type: text
    content: '«Mahereza ka matanjaha. Aza matahotra na mivadi-po eo anoloan’ny mpanjakan’i Asiria sy ny hamaroan’ny miaramila rehetra izay entiny; fa misy hery lehibe kokoa miaraka amintsika noho ny miaraka aminy. '
  '8':
  - type: text
    content: Herin’olombelona no miaraka aminy, fa ny TOMPO Andriamanitsika kosa no miaraka amintsika; Izy no hanampy antsika sy hisahana ny adintsika.»
  - type: text
    content: Dia izany tenin’i Hezekià mpanjakan’i Joda izany no nianteheran’ny mponina teo an-drenivohitra.
  - type: heading
    content: Fihantsian’i Saneheriba ny mponin’i Jerosalema
  - type: heading
    content: (Jereo 2 Mp 18.17-37; Is 36.2-22)
  '9':
  - type: text
    content: Taorian’izay dia nanao fahirano an’i Lakisy
  - type: note
    content: 'Lakisy: jereo 2 Mp 14.19 sy nta.'
  - type: text
    content: ' i Saneheriba mpanjakan’i Asiria ary koa ny tafiny manontolo. Avy ao i Saneheriba no naniraka manamboninahitra hankany Jerosalema ho any amin’i Hezekià mpanjakan’i Joda sy ho any amin’ny Jodeanina rehetra nonina tao an-drenivohitra. Ka hoy ny hafatra nampitain’ireto iraka hoe:'
