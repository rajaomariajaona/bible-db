document_id: 1SA.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jônatàna miaro an’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nitsoaka avy tao Naiôta akaikin’i Ramà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Naiôta akaikin’i Ramà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 19.18 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Davida, ka nankany amin’i Jônatàna zanakalahin’i Saoly izay nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no nataoko an-drainao, inona no fahadisoako, ary inona no heloko teo anatrehany no dia mifofo ny aiko izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Jônatàna taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sanatria aminao izany, tsy ho faty akory ianao; fa ambaran-draiko amiko hatrany manko izay zavatra hataony na kely izany na lehibe; koa hataony ahoana no hanafina izany raharaha lehibe izany amiko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mbola nikiry nanao izao fianianana izao i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fantatry ny rainao tsara ny halehiben’ny fitiavanao ahy, ka hoy izy anakampony: «Aoka tsy ho fantatr’i Jônatàna izany fandrao hampalahelo azy.» Nefa velona ny TOMPO ary velona koa ny ainao, ka sahiko lazaina fa indray mandingana sisa no manelanelana ahy sy ny fahafatesana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy kosa i Jônatàna tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona àry no tianao hataoko aminao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ka novalian’i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fetin’ny tsinam-bolana rahampitso
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 28.11-15.
    marker-yv: yv-n
  - type: text
    text: '; ka tokony hiara-misakafo amin’ny mpanjaka aho. Nefa avelao aho hiery any an-tsaha hatramin’ny rahafakampitso hariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha tsikaritry ny rainao ny tsy maha eo ahy, dia lazao aminy hoe: «Niera tamiko i Davida mba hitselika kely any Betlehema tanàna fiaviany, hankalaza ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanao isan-taona miaraka amin’ny fianakaviany rehetra.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha ambarany fa tsara izany, dia tsy haninona ny mpanomponao; fa raha tezitra kosa izy, dia fantaro fa vonona ny hifofo ny aiko mihitsy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa asehoy amiko àry ny fitiavanao, satria dinam-pisakaizana amin’ny anaran’ny TOMPO no ifamatorantsika. Fa raha toa ka misy mahameloka ahy na amin’inona izany na amin’inona, dia aoka ho ianao mihitsy no hamono hahafaty ahy, toy izay aho hoentinao any amin-drainao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Jônatàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sanatria aminao izany! Raha fantatro tokoa fa vonona hanisy ratsy anao ny raiko, dia mianiana aho fa hilaza izany aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ka hoy i Davida tamin’i Jônatàna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza anefa no hilaza amiko, raha toa ka mamaly anao an-katezerana ny rainao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy ny navalin’i Jônatàna azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha isika hankany an-tsaha!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lasa nankany an-tsaha izy roa lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Jônatàna tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny TOMPO Andriamanitr’i Israely no vavolombelona fa hitsapa izay hevitry ny raiko aho, rahampitso na rahafakampitso amin’ny ora toy izao. Koa raha ny hahasoa anao no ao an-tsainy, dia tsy hampandre anao na inona na inona aho. Fa raha mihevitra hanisy ratsy anao kosa ny raiko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia enga anie hosazîn’ny TOMPO mafy tokoa aho raha tsy mampandre anao! Koa halefako ianao handeha tsy amin’ahiahy, ary dia homba anao tahaka ny nombàny ny raiko anie ny TOMPO! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha mbola velona aho any aoriana any, dia araka ny fitiavan’ny TOMPO no ataovy amiko. Raha maty kosa aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia mbola hasehonao amin’ny taranako hatrany hatrany ny fitiavanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 9.1.
    marker-yv: yv-n
  - type: text
    text: ', na dia ho voaringan’ny TOMPO tsirairay tsy ho etỳ ambonin’ny tany aza ny fahavalonao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nanao dinam-pisakaizana tamin’i Davida sy ny taranany i Jônatàna hoe: «...ary ny TOMPO anie hamalifaty ny fahavalon’i Davida!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary nampianiana an’i Davida koa i Jônatàna amin’ny anaran’ny fitiavany azy, satria tia azy tahaka ny itiavany ny tenany i Jônatàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy indray i Jônatàna tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Rahampitso ny fetin’ny tsinam-bolana, ka ho hitan’ny olona ny tsy fahatongavanao, satria ho banga ny toeranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rahafakampitso dia hidina hatrany amin’ilay toerana nierenao tamin’ny indray andro iny ianao ka hitoetra eo akaikin’ny vato Ezela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izaho kosa, handefa zana-tsipîka telo mankany, toy ny mikendry lasibatra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia haniraka ny zatovolahy aho hanangona ireny. Koa raha hoy aho amin’ilay zatovolahy hoe: «Jereo fa tsy lasa nihoatra anao ny zana-tsipîka, koa angony»; midika izany fa milamina ny raharaha, ka afaka miverina ianao. Velona ny TOMPO ka sahiko lazaina fa tsy hisy loza hanjo anao akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha hoy kosa aho amin’ilay zatovolahy hoe: «Lasa nihoatra anao ny zana-tsipîka», dia mandehana ianao, ry Davida fa sitraky ny TOMPO ny handehananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary momba ny dinam-pisakaizana nataontsika, dia ny TOMPO no hanelanelana antsika mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia lasa niery tany an-tsaha i Davida.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa tonga ny fetin’ny tsinam-bolana, dia nandray ny toerana fisakafoany ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nipetraka teo amin’ny toerana mahazatra azy akaikin’ny rindrina ny mpanjaka; ny jeneraly Abinera no teo anilany ary i Jônatàna no teo anoloany, fa banga kosa ny toeran’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tamin’io andro io dia tsy niteny na inona na inona i Saoly; noheveriny manko fa nisy sampona tsy nampoizina nahazo an’i Davida, ka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mampaloto
  - type: text
    text: ' azy ara-pivavahana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mampaloto azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny olona tsy madio dia tsy mahazo mandray anjara amin’ny sakafom-pety ara-pivavahana (jereo ohatra Lev 7.21).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nefa ny ampitso, andro faharoan’ny fety, rehefa hitan’i Saoly fa mbola banga indray ny toeran’i Davida, dia nanontany an’i Jônatàna zanany izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ny zanakalahin’i Jisay no tsy nitranga tamin’ny sakafo na ny omaly na ny androany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ka hoy i Jônatàna namaly an’i Saoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Niera sy nitalaho mafy tamiko i Davida mba hankany Betlehema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: «Avelao aho handeha, hoy izy, fa misy sorona ataon’ny fianakavianay any, ary ny rahalahiko anankiray mihitsy no mandidy ahy hanatrika izany. Koa raha tianao ihany aho, dia avelao aho hitsoriaka hamangy an’ireo rahalahiko.» Izany no tsy nahatongavan’i Davida teto amin’ity sakafo ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tezitra tamin’i Jônatàna i Saoly ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Zana-behivavy mpikomy ialahy! Fantatro izao fa miandany amin’ny zanakalahin’i Jisay ialahy ho henatra ho an’ialahy sy ny renin’ialahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa raha mbola velona eto ambonin’ny tany koa iny zanakalahin’i Jisay iny, dia tsy ho tonga mpanjaka na oviana na oviana amin’ity tany ity ialahy! Koa sambory izy ary ento atỳ amiko, fa mendrika azy ny ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa namaly an’i Saoly i Jônatàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no mendrika ho faty izy? Inona no ratsy nataony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Natorak’i Saoly tamin’i Jônatàna ny lefony mba hamelezany azy, ka dia fantany fa tena vonona hifofo ny ain’i Davida tokoa ny rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Nitsangana niala teo amin’ny sakafo tamim-pahatezerana mafy i Jônatàna, ary tsy nihinana na inona na inona ny andro faharoan’ny fety. Nalahelo mafy an’i Davida izy, satria niteny ratsy azy ny rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny ampitso maraina i Jônatàna dia lasa nankany an-tsaha ho any amin’ilay toerana nifanarahany tamin’i Davida. Nisy tovolahy iray niaraka tamin’i Jônatàna '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'sady nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mihazakazaha ianao erỳ aloha, ka tadiavo izay zana-tsipîka alefako.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa lasa ilay zatovolahy, dia nalefan’i Jônatàna hihoatra azy ny zana-tsipîka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nony nanatona ny toerana nitsatohan’ny zana-tsipîka ilehio, dia hoy i Jônatàna taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa ireo nihoatra anao ireo ny zana-tsipîka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Faingàna ianao fa aza mijanonjanona.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nangonin’ilay mpanompo ny zana-tsipîka, dia niverina hankeny amin’ny tompony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tsy nahalala ny dikan’izany anefa ilay tovolahy, fa i Jônatàna sy i Davida ihany no nahafantatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nomen’i Jônatàna ny mpanompony ny fitaovam-piadiany, dia nasainy nentina any an-tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Rehefa lasa ilay mpanompo, dia nivoaka avy tao amin’ny fiereny teo atsimon’ny antontam-bato i Davida, ary niankohoka intelo tamin’ny tany teo anatrehan’i Jônatàna. Dia nifanoroka izy roa lahy ka niara-nitomany mandra-pitsahatr’i Davida.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary hoy i Jônatàna tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandehana ombàm-piadanana, fa efa samy nianiana tamin’ny anaran’ny TOMPO isika hoe: «Ny TOMPO anie hanelanelana ahy sy ianao ary ny taranako sy ny taranakao mandrakizay!»'
