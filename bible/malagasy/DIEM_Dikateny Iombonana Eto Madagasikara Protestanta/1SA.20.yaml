document_id: 1SA.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jônatàna miaro an’i Davida
  - type: text
    content: Nitsoaka avy tao Naiôta akaikin’i Ramà
  - type: note
    content: 'Naiôta akaikin’i Ramà: jereo 19.18 sy nta.'
  - type: text
    content: ' i Davida, ka nankany amin’i Jônatàna zanakalahin’i Saoly izay nanontaniany hoe:'
  - type: text
    content: –Inona no nataoko an-drainao, inona no fahadisoako, ary inona no heloko teo anatrehany no dia mifofo ny aiko izy?
  '10':
  - type: text
    content: 'Ka hoy i Davida tamin’i Jônatàna:'
  - type: text
    content: –Iza anefa no hilaza amiko, raha toa ka mamaly anao an-katezerana ny rainao?
  '11':
  - type: text
    content: 'Fa hoy ny navalin’i Jônatàna azy:'
  - type: text
    content: –Andeha isika hankany an-tsaha!
  - type: text
    content: 'Dia lasa nankany an-tsaha izy roa lahy. '
  '12':
  - type: text
    content: 'Ary hoy i Jônatàna tamin’i Davida:'
  - type: text
    content: '–Ny TOMPO Andriamanitr’i Israely no vavolombelona fa hitsapa izay hevitry ny raiko aho, rahampitso na rahafakampitso amin’ny ora toy izao. Koa raha ny hahasoa anao no ao an-tsainy, dia tsy hampandre anao na inona na inona aho. Fa raha mihevitra hanisy ratsy anao kosa ny raiko, '
  '13':
  - type: text
    content: 'dia enga anie hosazîn’ny TOMPO mafy tokoa aho raha tsy mampandre anao! Koa halefako ianao handeha tsy amin’ahiahy, ary dia homba anao tahaka ny nombàny ny raiko anie ny TOMPO! '
  '14':
  - type: text
    content: 'Raha mbola velona aho any aoriana any, dia araka ny fitiavan’ny TOMPO no ataovy amiko. Raha maty kosa aho, '
  '15':
  - type: text
    content: dia mbola hasehonao amin’ny taranako hatrany hatrany ny fitiavanao
  - type: note
    content: Jereo 2 Sam 9.1.
  - type: text
    content: ', na dia ho voaringan’ny TOMPO tsirairay tsy ho etỳ ambonin’ny tany aza ny fahavalonao.'
  '16':
  - type: text
    content: 'Dia nanao dinam-pisakaizana tamin’i Davida sy ny taranany i Jônatàna hoe: «...ary ny TOMPO anie hamalifaty ny fahavalon’i Davida!» '
  '17':
  - type: text
    content: Ary nampianiana an’i Davida koa i Jônatàna amin’ny anaran’ny fitiavany azy, satria tia azy tahaka ny itiavany ny tenany i Jônatàna.
  '18':
  - type: text
    content: 'Ary hoy indray i Jônatàna tamin’i Davida:'
  - type: text
    content: '–Rahampitso ny fetin’ny tsinam-bolana, ka ho hitan’ny olona ny tsy fahatongavanao, satria ho banga ny toeranao. '
  '19':
  - type: text
    content: 'Rahafakampitso dia hidina hatrany amin’ilay toerana nierenao tamin’ny indray andro iny ianao ka hitoetra eo akaikin’ny vato Ezela. '
  '2':
  - type: text
    content: 'Dia hoy i Jônatàna taminy:'
  - type: text
    content: –Sanatria aminao izany, tsy ho faty akory ianao; fa ambaran-draiko amiko hatrany manko izay zavatra hataony na kely izany na lehibe; koa hataony ahoana no hanafina izany raharaha lehibe izany amiko?
  '20':
  - type: text
    content: 'Izaho kosa, handefa zana-tsipîka telo mankany, toy ny mikendry lasibatra; '
  '21':
  - type: text
    content: 'dia haniraka ny zatovolahy aho hanangona ireny. Koa raha hoy aho amin’ilay zatovolahy hoe: «Jereo fa tsy lasa nihoatra anao ny zana-tsipîka, koa angony»; midika izany fa milamina ny raharaha, ka afaka miverina ianao. Velona ny TOMPO ka sahiko lazaina fa tsy hisy loza hanjo anao akory. '
  '22':
  - type: text
    content: 'Fa raha hoy kosa aho amin’ilay zatovolahy hoe: «Lasa nihoatra anao ny zana-tsipîka», dia mandehana ianao, ry Davida fa sitraky ny TOMPO ny handehananao. '
  '23':
  - type: text
    content: Ary momba ny dinam-pisakaizana nataontsika, dia ny TOMPO no hanelanelana antsika mandrakizay.
  '24':
  - type: text
    content: Dia lasa niery tany an-tsaha i Davida.
  - type: text
    content: 'Rehefa tonga ny fetin’ny tsinam-bolana, dia nandray ny toerana fisakafoany ny mpanjaka. '
  '25':
  - type: text
    content: 'Nipetraka teo amin’ny toerana mahazatra azy akaikin’ny rindrina ny mpanjaka; ny jeneraly Abinera no teo anilany ary i Jônatàna no teo anoloany, fa banga kosa ny toeran’i Davida. '
  '26':
  - type: text
    content: 'Tamin’io andro io dia tsy niteny na inona na inona i Saoly; noheveriny manko fa nisy sampona tsy nampoizina nahazo an’i Davida, ka '
  - type: text
    content: mampaloto
  - type: text
    content: ' azy ara-pivavahana'
  - type: note
    content: 'mampaloto azy: ny olona tsy madio dia tsy mahazo mandray anjara amin’ny sakafom-pety ara-pivavahana (jereo ohatra Lev 7.21).'
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Nefa ny ampitso, andro faharoan’ny fety, rehefa hitan’i Saoly fa mbola banga indray ny toeran’i Davida, dia nanontany an’i Jônatàna zanany izy hoe:'
  - type: text
    content: –Nahoana ny zanakalahin’i Jisay no tsy nitranga tamin’ny sakafo na ny omaly na ny androany?
  '28':
  - type: text
    content: 'Ka hoy i Jônatàna namaly an’i Saoly:'
  - type: text
    content: '–Niera sy nitalaho mafy tamiko i Davida mba hankany Betlehema. '
  '29':
  - type: text
    content: «Avelao aho handeha, hoy izy, fa misy sorona ataon’ny fianakavianay any, ary ny rahalahiko anankiray mihitsy no mandidy ahy hanatrika izany. Koa raha tianao ihany aho, dia avelao aho hitsoriaka hamangy an’ireo rahalahiko.» Izany no tsy nahatongavan’i Davida teto amin’ity sakafo ity.
  '3':
  - type: text
    content: 'Mbola nikiry nanao izao fianianana izao i Davida hoe:'
  - type: text
    content: '–Fantatry ny rainao tsara ny halehiben’ny fitiavanao ahy, ka hoy izy anakampony: «Aoka tsy ho fantatr’i Jônatàna izany fandrao hampalahelo azy.» Nefa velona ny TOMPO ary velona koa ny ainao, ka sahiko lazaina fa indray mandingana sisa no manelanelana ahy sy ny fahafatesana.'
  '30':
  - type: text
    content: 'Tezitra tamin’i Jônatàna i Saoly ka nanao taminy hoe:'
  - type: text
    content: '–Zana-behivavy mpikomy ialahy! Fantatro izao fa miandany amin’ny zanakalahin’i Jisay ialahy ho henatra ho an’ialahy sy ny renin’ialahy. '
  '31':
  - type: text
    content: Fa raha mbola velona eto ambonin’ny tany koa iny zanakalahin’i Jisay iny, dia tsy ho tonga mpanjaka na oviana na oviana amin’ity tany ity ialahy! Koa sambory izy ary ento atỳ amiko, fa mendrika azy ny ho faty.
  '32':
  - type: text
    content: 'Fa namaly an’i Saoly i Jônatàna hoe:'
  - type: text
    content: –Nahoana no mendrika ho faty izy? Inona no ratsy nataony?
  '33':
  - type: text
    content: 'Natorak’i Saoly tamin’i Jônatàna ny lefony mba hamelezany azy, ka dia fantany fa tena vonona hifofo ny ain’i Davida tokoa ny rainy. '
  '34':
  - type: text
    content: Nitsangana niala teo amin’ny sakafo tamim-pahatezerana mafy i Jônatàna, ary tsy nihinana na inona na inona ny andro faharoan’ny fety. Nalahelo mafy an’i Davida izy, satria niteny ratsy azy ny rainy.
  '35':
  - type: text
    content: 'Ny ampitso maraina i Jônatàna dia lasa nankany an-tsaha ho any amin’ilay toerana nifanarahany tamin’i Davida. Nisy tovolahy iray niaraka tamin’i Jônatàna '
  '36':
  - type: text
    content: 'sady nilazany hoe:'
  - type: text
    content: –Mihazakazaha ianao erỳ aloha, ka tadiavo izay zana-tsipîka alefako.
  - type: text
    content: 'Rehefa lasa ilay zatovolahy, dia nalefan’i Jônatàna hihoatra azy ny zana-tsipîka. '
  '37':
  - type: text
    content: 'Nony nanatona ny toerana nitsatohan’ny zana-tsipîka ilehio, dia hoy i Jônatàna taminy:'
  - type: text
    content: '–Efa ireo nihoatra anao ireo ny zana-tsipîka. '
  '38':
  - type: text
    content: Faingàna ianao fa aza mijanonjanona.
  - type: text
    content: 'Nangonin’ilay mpanompo ny zana-tsipîka, dia niverina hankeny amin’ny tompony izy. '
  '39':
  - type: text
    content: 'Tsy nahalala ny dikan’izany anefa ilay tovolahy, fa i Jônatàna sy i Davida ihany no nahafantatra. '
  '4':
  - type: text
    content: 'Hoy kosa i Jônatàna tamin’i Davida:'
  - type: text
    content: –Inona àry no tianao hataoko aminao?
  '40':
  - type: text
    content: 'Nomen’i Jônatàna ny mpanompony ny fitaovam-piadiany, dia nasainy nentina any an-tanàna. '
  '41':
  - type: text
    content: Rehefa lasa ilay mpanompo, dia nivoaka avy tao amin’ny fiereny teo atsimon’ny antontam-bato i Davida, ary niankohoka intelo tamin’ny tany teo anatrehan’i Jônatàna. Dia nifanoroka izy roa lahy ka niara-nitomany mandra-pitsahatr’i Davida.
  '42':
  - type: text
    content: 'Ary hoy i Jônatàna tamin’i Davida:'
  - type: text
    content: '–Mandehana ombàm-piadanana, fa efa samy nianiana tamin’ny anaran’ny TOMPO isika hoe: «Ny TOMPO anie hanelanelana ahy sy ianao ary ny taranako sy ny taranakao mandrakizay!»'
  '5':
  - type: text
    content: 'Ka novalian’i Davida hoe:'
  - type: text
    content: –Fetin’ny tsinam-bolana rahampitso
  - type: note
    content: Jereo Nom 28.11-15.
  - type: text
    content: '; ka tokony hiara-misakafo amin’ny mpanjaka aho. Nefa avelao aho hiery any an-tsaha hatramin’ny rahafakampitso hariva. '
  '6':
  - type: text
    content: 'Raha tsikaritry ny rainao ny tsy maha eo ahy, dia lazao aminy hoe: «Niera tamiko i Davida mba hitselika kely any Betlehema tanàna fiaviany, hankalaza ny '
  - type: text
    content: sorona
  - type: text
    content: ' fanao isan-taona miaraka amin’ny fianakaviany rehetra.» '
  '7':
  - type: text
    content: 'Raha ambarany fa tsara izany, dia tsy haninona ny mpanomponao; fa raha tezitra kosa izy, dia fantaro fa vonona ny hifofo ny aiko mihitsy izy. '
  '8':
  - type: text
    content: Koa asehoy amiko àry ny fitiavanao, satria dinam-pisakaizana amin’ny anaran’ny TOMPO no ifamatorantsika. Fa raha toa ka misy mahameloka ahy na amin’inona izany na amin’inona, dia aoka ho ianao mihitsy no hamono hahafaty ahy, toy izay aho hoentinao any amin-drainao.
  '9':
  - type: text
    content: 'Dia hoy i Jônatàna hoe:'
  - type: text
    content: –Sanatria aminao izany! Raha fantatro tokoa fa vonona hanisy ratsy anao ny raiko, dia mianiana aho fa hilaza izany aminao.
