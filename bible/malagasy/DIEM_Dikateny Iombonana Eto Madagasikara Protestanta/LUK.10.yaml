document_id: LUK.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Irahin’i Jesoa ny mpianatra 72 lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Taorian’izany, dia nifidy 72 lahy hafa indray ny Tompo, ka nirahiny tsiroaroa hialoha Azy any amin’ny tanàna sy ny toerana rehetra mbola halehany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: '72 lahy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fitopolo lahy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Be ny vokatra fa ny mpiasa no vitsy. Angataho àry ny Tompom-bokatra haniraka mpiasa hamory ny vokany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mandehana! Indro irahiko ianareo, mova tsy zanak’ondry eo afovoan’amboadia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza mitondra kitapom-batsy na kapa, ary aza lany andro miarahaba olona eny an-dalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay trano androsoanareo dia voalohany indrindra ilazao hoe: «Ho ato amin’ity trano ity anie ny fiadanana!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha misy olona tia fiadanana ao, dia hirotsaka aminy ny fiadanana rarînareo; fa raha tsy misy kosa, dia hiverina aminareo ihany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitoera amin’izany trano izany, fa aza mifindrafindra trano; ary hano sy sotroy izay aroson’ny tompon-trano, fa ny mpiasa dia mendrika homena ny karamany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 10.10; 1Kôr 9.14; 1Tim 5.18.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha misy tanàna idiranareo ka mandray anareo ny olona, dia hano izay aroso anareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'sitrano izay marary ao ary ny mponina ilazao hoe: «Efa tonga eto aminareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha misy kosa tanàna idiranareo nefa tsy mandray anareo ny olona, dia mankanesa eny an-kianja milaza hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: «Na dia ny vovoky ny tanànanareo nanaraka ny tongotray aza, dia ahintsanay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.5; Mk 6.11 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' hiampanga anareo. Izao anefa no fantaro: efa tonga ny Fanjakàn’Andriamanitra.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lazaiko aminareo fa amin’ny andro fitsarana, dia ho azoazo kokoa ny sazy hihatra amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sôdôma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 19.24-28.
    marker-yv: yv-n
  - type: text
    text: ' noho ny hihatra amin’izany tanàna izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampalahelo ireo tanàna tsy mino an’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 11.20-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mampalahelo ianao, ry Kôrazìna! Mampalahelo ianao, ry Betsaidà! Raha i Tiro sy i Sidôna mantsy no nahavitana ireo asa mahagaga natao teo aminareo, dia efa ela ireo mponina ao aminy no nitafy lamba fisaonana ary nihosin-davenona hanambaràny fa nialany ny toetra ratsiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny amin’io andininy io dia jereo Mt 11.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amin’ny andro fitsarana, dia ho azoazo kokoa ny sazy hihatra amin’i Tiro sy i Sidôna noho ny hihatra aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ianao, ry Kafarnahòma, heverinao ve fa hasandratra hatrany an-danitra ianao? Tsia, haetry hatrany amin’ny toeran’ny maty ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 14.13-15.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy indray i Jesoa tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izay mihaino anareo, dia mihaino Ahy; izay manamavo anareo, dia manamavo Ahy; ary izay manamavo Ahy, dia manamavo Ilay naniraka Ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miverina ny mpianatra 72 lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Faly tokoa ny 72 lahy raha niverina sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tompo ô, nanaiky anay na dia ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' aza rehefa nodidianay tamin’ny anaranao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: '72 lahy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fitopolo lahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo and 1).'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hitako tokoa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' nilatsaka tahaka ny tselatra avy any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Indro ianareo efa nomeko fahefana hanitsaka bibilava sy maingoka sady hanamontsana ny hery rehetra ananan’ny fahavalo, ka tsy hisy hampaninona anareo akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kanefa aza dia ianareo eken’ny fanahy ratsy no ifaliana; fa mifalia noho ianareo efa voasoratra anarana any an-danitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifaly ao amin’ny Fanahy Masina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 11.25-27; 13.16-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tamin’izay fotoana izay indrindra, dia henika ny hafaliana tao amin’ny Fanahy Masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tao amin’ny Fanahy Masina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tao amin’ny Fanahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ary misy koa ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tao amin’ny atim-panahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'i Jesoa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ray ô, Tompon’ny tany aman-danitra Ianao, ka misaotra Anao Aho fa ireo zavatra nafeninao tamin’ny hendry sy ny manan-tsaina dia nasehonao tamin’ny madinika. Eny, Ray ô, izany tokoa no sitrakao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Efa natolotry ny Raiko ho Ahy ny zavatra rehetra; ary tsy misy olona mahalala ny Zanaka afa-tsy ny Ray, na mahalala ny Ray afa-tsy ny Zanaka mbamin’izay tian’ny Zanaka hanehoana Azy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nitodika tamin’ny mpianany i Jesoa ka niteny taminy manokana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sambatra ianareo mahita maso izao hitanareo izao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Eny, lazaiko aminareo fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sy mpanjaka maro no naniry hahita izay hitanareo nefa tsy nahita, ary hahare izay renareo nefa tsy nahare'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Pt 1.10-12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ilay Samaritanina tsara fanahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary indro tamy ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' anankiray ka nanao fanontaniana fandrika tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, inona no tokony hataoko hananako anjara amin’ny fiaina-maharitra mandrakizay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: '? Ahoana no fandraisanao ny heviny raha vakînao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–«Tiavo ny Tompo Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo, amin’ny herinao manontolo ary amin’ny sainao manontolo.» Ary koa: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deot 6.5; Lev 19.18.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsara ny valin-teninao. Ataovy izany, dia ho velona ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lev 18.5.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Te hanamarin-tena anefa ilay mpahay lalàna ka nanontany an’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa iza moa no namako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ka novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nisy lehilahy nidina avy tany Jerosalema ho any Jerikao, nasian’ny jiolahy ka nendahany fitafiana sy nodarofany kapoka; ary efa saika maty ralehilahy vao nilaozan’ireo jiolahy nandositra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Sendra nisy mpisorona nidina tamin’izany lalana izany; fa nony nahatazana an-dralehilahy izy, dia nidify lalana nandalo fotsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Toy izany koa no nataon’ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' anankiray; tonga teo amin’ilay toerana izy, nahatazana an-dralehilahy ary nidify lalana nandalo fotsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nisy kosa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritanina
  - type: text
    text: ' nivahiny tonga teo amin’ity tra-boina ary onena tokoa nahita azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Nohatonin’ilay Samaritanina izy ka nofeheziny ny feriny sady nandrarahany diloilo sy divay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'diloilo sy divay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanafody fampiasa fahizany mba hampitoniana ny fanaintainana (diloilo) sy handiovana ny fery (divay). Ampit Is 1.6.
    marker-yv: yv-n
  - type: text
    text: '; avy eo dia natainginy teo amin’ny ampondrany ralehilahy ary nentiny tany an-tranombahiny ka nokarakarainy tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny ampitson’iny, notolorany vola '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denàry
  - type: text
    text: ' anankiroa ny tompon-trano sady nataony hoe: «Karakarao ity olona ity; ary na hoatrinona na hoatrinona laninao mihoatra noho ireto, dia honerako rehefa miverina aho.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia nanontanian’i Jesoa ity mpahay lalàna nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza tamin’izy telo lahy ireo, araka ny hevitrao, no nanjary naman’ilay nasian’ny jiolahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ilay niantra azy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha àry, ka mba manaova torak’izany koa!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamangy an-dry i Marta sy i Maria i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Raha mbola nandeha ry i Jesoa sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ', dia niditra tao amin’ny tanàna anankiray i Jesoa ka izay vehivavy atao hoe Marta izay no nampiantrano Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: I Marta dia nanan-drahavavy antsoina hoe Maria. Naka toerana teo an-tongotry ny Tompo i Maria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.39 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Marta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: fk
      children:
      - type: text
