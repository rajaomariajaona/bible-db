document_id: LUK.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Irahin’i Jesoa ny mpianatra 72 lahy
  - type: text
    content: Taorian’izany, dia nifidy 72 lahy hafa indray ny Tompo, ka nirahiny tsiroaroa hialoha Azy any amin’ny tanàna sy ny toerana rehetra mbola halehany
  - type: note
    content: '72 lahy: misy stf ahitana hoe fitopolo lahy.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Fa raha misy kosa tanàna idiranareo nefa tsy mandray anareo ny olona, dia mankanesa eny an-kianja milaza hoe: '
  '11':
  - type: text
    content: «Na dia ny vovoky ny tanànanareo nanaraka ny tongotray aza, dia ahintsanay
  - type: note
    content: Jereo 9.5; Mk 6.11 sy nta.
  - type: text
    content: ' hiampanga anareo. Izao anefa no fantaro: efa tonga ny Fanjakàn’Andriamanitra.» '
  '12':
  - type: text
    content: 'Lazaiko aminareo fa amin’ny andro fitsarana, dia ho azoazo kokoa ny sazy hihatra amin’i '
  - type: text
    content: Sôdôma
  - type: note
    content: Jereo Gen 19.24-28.
  - type: text
    content: ' noho ny hihatra amin’izany tanàna izany.'
  - type: heading
    content: Mampalahelo ireo tanàna tsy mino an’i Jesoa
  - type: heading
    content: (Jereo Mt 11.20-24)
  '13':
  - type: text
    content: Mampalahelo ianao, ry Kôrazìna! Mampalahelo ianao, ry Betsaidà! Raha i Tiro sy i Sidôna mantsy no nahavitana ireo asa mahagaga natao teo aminareo, dia efa ela ireo mponina ao aminy no nitafy lamba fisaonana ary nihosin-davenona hanambaràny fa nialany ny toetra ratsiny
  - type: note
    content: Ny amin’io andininy io dia jereo Mt 11.21 sy nta.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Amin’ny andro fitsarana, dia ho azoazo kokoa ny sazy hihatra amin’i Tiro sy i Sidôna noho ny hihatra aminareo. '
  '15':
  - type: text
    content: Ary ianao, ry Kafarnahòma, heverinao ve fa hasandratra hatrany an-danitra ianao? Tsia, haetry hatrany amin’ny toeran’ny maty ianao
  - type: note
    content: Is 14.13-15.
  - type: text
    content: '!'
  '16':
  - type: text
    content: 'Ary hoy indray i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: –Izay mihaino anareo, dia mihaino Ahy; izay manamavo anareo, dia manamavo Ahy; ary izay manamavo Ahy, dia manamavo Ilay naniraka Ahy.
  - type: heading
    content: Miverina ny mpianatra 72 lahy
  '17':
  - type: text
    content: 'Faly tokoa ny 72 lahy raha niverina sady nanao hoe:'
  - type: text
    content: '–Tompo ô, nanaiky anay na dia ireo '
  - type: text
    content: demony
  - type: text
    content: ' aza rehefa nodidianay tamin’ny anaranao'
  - type: note
    content: '72 lahy: misy stf sasany ahitana hoe fitopolo lahy (jereo and 1).'
  - type: text
    content: '!'
  '18':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Hitako tokoa i '
  - type: text
    content: Satàna
  - type: text
    content: ' nilatsaka tahaka ny tselatra avy any an-danitra. '
  '19':
  - type: text
    content: 'Indro ianareo efa nomeko fahefana hanitsaka bibilava sy maingoka sady hanamontsana ny hery rehetra ananan’ny fahavalo, ka tsy hisy hampaninona anareo akory. '
  '2':
  - type: text
    content: 'Ary hoy Izy taminy:'
  - type: text
    content: '–Be ny vokatra fa ny mpiasa no vitsy. Angataho àry ny Tompom-bokatra haniraka mpiasa hamory ny vokany. '
  '20':
  - type: text
    content: Kanefa aza dia ianareo eken’ny fanahy ratsy no ifaliana; fa mifalia noho ianareo efa voasoratra anarana any an-danitra.
  - type: heading
    content: Mifaly ao amin’ny Fanahy Masina i Jesoa
  - type: heading
    content: (Jereo Mt 11.25-27; 13.16-17)
  '21':
  - type: text
    content: Tamin’izay fotoana izay indrindra, dia henika ny hafaliana tao amin’ny Fanahy Masina
  - type: note
    content: 'tao amin’ny Fanahy Masina: misy stf sasany ahitana fotsiny hoe tao amin’ny Fanahy ary misy koa ahitana hoe tao amin’ny atim-panahy.'
  - type: text
    content: 'i Jesoa ka nanao hoe:'
  - type: text
    content: –Ray ô, Tompon’ny tany aman-danitra Ianao, ka misaotra Anao Aho fa ireo zavatra nafeninao tamin’ny hendry sy ny manan-tsaina dia nasehonao tamin’ny madinika. Eny, Ray ô, izany tokoa no sitrakao!
  '22':
  - type: text
    content: Efa natolotry ny Raiko ho Ahy ny zavatra rehetra; ary tsy misy olona mahalala ny Zanaka afa-tsy ny Ray, na mahalala ny Ray afa-tsy ny Zanaka mbamin’izay tian’ny Zanaka hanehoana Azy!
  '23':
  - type: text
    content: 'Dia nitodika tamin’ny mpianany i Jesoa ka niteny taminy manokana hoe:'
  - type: text
    content: '–Sambatra ianareo mahita maso izao hitanareo izao! '
  '24':
  - type: text
    content: 'Eny, lazaiko aminareo fa '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy mpanjaka maro no naniry hahita izay hitanareo nefa tsy nahita, ary hahare izay renareo nefa tsy nahare'
  - type: note
    content: Ampit 1Pt 1.10-12.
  - type: text
    content: .
  - type: heading
    content: Fanoharana momba ilay Samaritanina tsara fanahy
  '25':
  - type: text
    content: 'Ary indro tamy ity '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' anankiray ka nanao fanontaniana fandrika tamin’i Jesoa hoe:'
  - type: text
    content: –Mpampianatra ô, inona no tokony hataoko hananako anjara amin’ny fiaina-maharitra mandrakizay?
  '26':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Inona no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ao amin’ny '
  - type: text
    content: lalàna
  - type: text
    content: '? Ahoana no fandraisanao ny heviny raha vakînao?'
  '27':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: '–«Tiavo ny Tompo Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo, amin’ny herinao manontolo ary amin’ny sainao manontolo.» Ary koa: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: note
    content: Deot 6.5; Lev 19.18.
  - type: text
    content: .»
  '28':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Tsara ny valin-teninao. Ataovy izany, dia ho velona ianao
  - type: note
    content: Ampit Lev 18.5.
  - type: text
    content: '!'
  '29':
  - type: text
    content: 'Te hanamarin-tena anefa ilay mpahay lalàna ka nanontany an’i Jesoa hoe:'
  - type: text
    content: –Fa iza moa no namako?
  '3':
  - type: text
    content: 'Mandehana! Indro irahiko ianareo, mova tsy zanak’ondry eo afovoan’amboadia. '
  '30':
  - type: text
    content: 'Ka novalian’i Jesoa hoe:'
  - type: text
    content: '–Nisy lehilahy nidina avy tany Jerosalema ho any Jerikao, nasian’ny jiolahy ka nendahany fitafiana sy nodarofany kapoka; ary efa saika maty ralehilahy vao nilaozan’ireo jiolahy nandositra. '
  '31':
  - type: text
    content: 'Sendra nisy mpisorona nidina tamin’izany lalana izany; fa nony nahatazana an-dralehilahy izy, dia nidify lalana nandalo fotsiny. '
  '32':
  - type: text
    content: 'Toy izany koa no nataon’ity '
  - type: text
    content: levita
  - type: text
    content: ' anankiray; tonga teo amin’ilay toerana izy, nahatazana an-dralehilahy ary nidify lalana nandalo fotsiny. '
  '33':
  - type: text
    content: 'Nisy kosa '
  - type: text
    content: Samaritanina
  - type: text
    content: ' nivahiny tonga teo amin’ity tra-boina ary onena tokoa nahita azy. '
  '34':
  - type: text
    content: Nohatonin’ilay Samaritanina izy ka nofeheziny ny feriny sady nandrarahany diloilo sy divay
  - type: note
    content: 'diloilo sy divay: fanafody fampiasa fahizany mba hampitoniana ny fanaintainana (diloilo) sy handiovana ny fery (divay). Ampit Is 1.6.'
  - type: text
    content: '; avy eo dia natainginy teo amin’ny ampondrany ralehilahy ary nentiny tany an-tranombahiny ka nokarakarainy tao. '
  '35':
  - type: text
    content: 'Ny ampitson’iny, notolorany vola '
  - type: text
    content: denàry
  - type: text
    content: ' anankiroa ny tompon-trano sady nataony hoe: «Karakarao ity olona ity; ary na hoatrinona na hoatrinona laninao mihoatra noho ireto, dia honerako rehefa miverina aho.»'
  '36':
  - type: text
    content: 'Dia nanontanian’i Jesoa ity mpahay lalàna nataony hoe:'
  - type: text
    content: –Iza tamin’izy telo lahy ireo, araka ny hevitrao, no nanjary naman’ilay nasian’ny jiolahy?
  '37':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Ilay niantra azy.
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Ndeha àry, ka mba manaova torak’izany koa!
  - type: heading
    content: Mamangy an-dry i Marta sy i Maria i Jesoa
  '38':
  - type: text
    content: 'Raha mbola nandeha ry i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: ', dia niditra tao amin’ny tanàna anankiray i Jesoa ka izay vehivavy atao hoe Marta izay no nampiantrano Azy. '
  '39':
  - type: text
    content: I Marta dia nanan-drahavavy antsoina hoe Maria. Naka toerana teo an-tongotry ny Tompo i Maria
  - type: note
    content: 'Marta sy Maria: jereo Jôh 11.1; 12.1-3.'
  - type: text
    content: ' ka nihaino ny teniny. '
  '4':
  - type: text
    content: 'Aza mitondra kitapom-batsy na kapa, ary aza lany andro miarahaba olona eny an-dalana. '
  '40':
  - type: text
    content: 'Fa i Marta kosa sahirana tamin’ny raharaha isan-karazany; dia niato izy ka nanao hoe:'
  - type: text
    content: –Moa tsy mampaninona Anao ve, ry Tompo, izao amelan’ny rahavaviko ahy hanao raharaha irery izao? Mba asaovy manampy ahy re izy!
  '41':
  - type: text
    content: 'Fa novalian’ny Tompo hoe:'
  - type: text
    content: '–Marta, Marta, maro ahina sy be herehina loatra ianao, '
  '42':
  - type: text
    content: nefa zavatra iray ihany no ilaina; ka i Maria no efa nifidy ny anjara soa indrindra, izay tsy halana aminy.
  '5':
  - type: text
    content: 'Izay trano androsoanareo dia voalohany indrindra ilazao hoe: «Ho ato amin’ity trano ity anie ny fiadanana!» '
  '6':
  - type: text
    content: 'Raha misy olona tia fiadanana ao, dia hirotsaka aminy ny fiadanana rarînareo; fa raha tsy misy kosa, dia hiverina aminareo ihany izany. '
  '7':
  - type: text
    content: Mitoera amin’izany trano izany, fa aza mifindrafindra trano; ary hano sy sotroy izay aroson’ny tompon-trano, fa ny mpiasa dia mendrika homena ny karamany
  - type: note
    content: Ampit Mt 10.10; 1Kôr 9.14; 1Tim 5.18.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Raha misy tanàna idiranareo ka mandray anareo ny olona, dia hano izay aroso anareo; '
  '9':
  - type: text
    content: 'sitrano izay marary ao ary ny mponina ilazao hoe: «Efa tonga eto aminareo ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '.» '
