document_id: PRO.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Loza ny fiantohana trosan’olona
  - type: text
    content: Anaka, niantoka trosan’ny namanao ve ianao
  - type: text
    content: ka nandray tanan’olon-kafa
  - type: note
    content: Ny fanaovana fiantohana voalaza eto dia fomba fanao tranainy teo amin’i Israely. Na dia tsy misy lalàna momba izany aza ao amin’ny Baiboly dia misy fitenenana azy ao amin’ny Gen 43.9; 44.32; Is 38.14; Sal 119.122. –Momba ny fandraisan-tanana dia jereo 2 Mp 10.15, Sir 29.14-20.
  - type: text
    content: ' ho marik’izany?'
  '10':
  - type: text
    content: Mbola hatory kely sy ho rendremana kely ianao
  - type: text
    content: ary hanohon-tanana kely eo am-pandriana ihany.
  '11':
  - type: text
    content: Amin’izay anefa dia hamely anao tampoka
  - type: text
    content: toy ny mpisodisody ny fahantrana
  - type: text
    content: ary toy ny jiolahy ny fahoriana.
  - type: heading
    content: Ny anjaran’ny ratsy fanahy
  '12':
  - type: text
    content: Tsy valahara sady tsy misy ilana azy
  - type: text
    content: ny olona mpamafy lainga.
  '13':
  - type: text
    content: Mipi-maso hamitaka ny hafa izy
  - type: text
    content: sady miantso amin’ny tongony
  - type: text
    content: no manao famantarana amin’ny rantsan-tanany.
  '14':
  - type: text
    content: Hafetsifetsena no mameno ny fony
  - type: text
    content: ka mampihevi-dratsy azy mandrakariva
  - type: text
    content: sy mahatonga azy hamafy ady.
  '15':
  - type: text
    content: Izany no hampiavy tampoka ny faharavàny;
  - type: text
    content: fa ho potika vetivety tsisy fanafana izy.
  - type: heading
    content: Izay ankahalain’ny Tompo
  '16':
  - type: text
    content: Misy zavatra enina izay halan’ny TOMPO
  - type: text
    content: 'ka tsy zakany mihitsy, dia ireto:'
  - type: text
    content: ny fijery miavonavona,
  - type: text
    content: ny fiteny mandainga,
  - type: text
    content: ny tanana mahafaty olon-tsy manan-tsiny,
  - type: text
    content: ny fo mamorona teti-dratsy,
  - type: text
    content: ny tongotra dodon-kihazakazaka hanao ratsy,
  - type: text
    content: ny vavolombelona mandainga sy manendrikendrika.
  - type: text
    content: Fa misy koa zavatra fahafito,
  - type: text
    content: dia ny olona mpamafy ady amin’ny rahalahiny.
  - type: heading
    content: Fampitandremana tsy hijangajanga haka vadin’olona
  '2':
  - type: text
    content: Namatotra sy naningotra anao ve
  - type: text
    content: ny teny sy fampanantenana voalazanao?
  '20':
  - type: text
    content: Anaka, tandremo ny didin-drainao
  - type: text
    content: ary aza lavina ny fampianaran-dreninao.
  '21':
  - type: text
    content: Araiketo mandrakariva ao am-ponao ireo,
  - type: text
    content: ary kajio toa firavaka fiambozonanao.
  '22':
  - type: text
    content: Hitari-dalana anao izy raha mandeha ianao,
  - type: text
    content: hiambina anao raha matory ianao
  - type: text
    content: ary hanoro hevitra anao raha mifoha ianao.
  '23':
  - type: text
    content: Fa tahaka ny jiro ny didy
  - type: text
    content: toy ny fanilo ny fampianarana,
  - type: text
    content: ary toy ny sori-dalam-piainana
  - type: text
    content: ireo famaizam-panabeazana,
  '24':
  - type: text
    content: ka hiaro anao amin’ny vehivavy ratsy fitondrantena
  - type: text
    content: sy amin’ny fanangolen’ny vehivavy vadin’olon-kafa
  - type: note
    content: Jereo 5.5 sy nta.
  - type: text
    content: .
  '25':
  - type: text
    content: Aza mitsiriritra ny hatsaran-tarehiny ianao
  - type: text
    content: ary aza babon’ny masony mitsipalopalotra.
  '26':
  - type: text
    content: Vidin-tapa-mofo no ahazoan-dehilahy
  - type: text
    content: ny vehivavy mpivarotena iray;
  - type: text
    content: fa mihaza remby lafo vidy kosa
  - type: text
    content: ny vehivavy mpanitsakitsa-bady.
  '27':
  - type: text
    content: Misy olona mitondra afo
  - type: text
    content: amin’ny paosin’akanjony ve
  - type: text
    content: ka tsy hirehitra akanjo?
  '28':
  - type: text
    content: Misy olona manitsaka vain’afo ve
  - type: text
    content: ka tsy ho may tongotra?
  '29':
  - type: text
    content: Dia toy izany fa tsy hieren-doza
  - type: text
    content: izay mandry amin’ny vadin’ny namany.
  '3':
  - type: text
    content: Raha eny, dia izao no ataovy, anaka,
  - type: text
    content: mba hahafaka ny tenanao
  - type: text
    content: 'izay efa mby eo an-tanan’ny namanao:'
  - type: text
    content: mandehana mitalaho mafy aminy.
  '30':
  - type: text
    content: Tsy omen-tsiny akory ny mpangalatra,
  - type: text
    content: raha toa ka mandroba hampitony hanoanana.
  '31':
  - type: text
    content: Fa raha tratra kosa izy, dia hanonitra impito heny
  - type: text
    content: ka hanome izay ananany rehetra ao an-tranony.
  '32':
  - type: text
    content: Adala izay lehilahy mangala-badin’olona;
  - type: text
    content: manimba tena ny manao izany.
  '33':
  - type: text
    content: Fa hijinja aretina sy fahafaham-baràka izy
  - type: text
    content: ka tsy ho afa-kenatra mandrakizay.
  '34':
  - type: text
    content: Satria ny fahasaro-piaro dia hampisafoaka
  - type: text
    content: ny vadin’izany vehivavy izany;
  - type: text
    content: ka tsy hiantra rafilahy izy
  - type: text
    content: amin’ny andro hamaliany faty.
  '35':
  - type: text
    content: Tsy hanaiky handray onitra izy
  - type: text
    content: ary tsy hety hilefitra mihitsy,
  - type: text
    content: na dia hotambazana fanomezana be aza.
  '4':
  - type: text
    content: Aza miala sasatra mihitsy na matory
  - type: text
    content: mandra-panaikin’io namanao io.
  '5':
  - type: text
    content: Afaho ny tenanao, ka tahafo ny gazela sy ny vorona
  - type: text
    content: izay afa-miala amin’ny fandrika nihazonana azy
  - type: note
    content: Momba ny and 1–5, dia jereo koa 20.16; 22.26-27.
  - type: text
    content: .
  - type: heading
    content: Ialao ny hakamoana
  '6':
  - type: text
    content: Mankanesa any amin’ny vitsika, ry ilay kamo
  - type: note
    content: Maro ny kolontsaina izay maka ny vitsika ho ohatra manambara ny fahazotoa-miasa sy ny fahaiza-mitsinjo mialoha.
  - type: text
    content: .
  - type: text
    content: Diniho ny fanaony, ka mba hendre
  - type: note
    content: 'And 10-11: jereo koa 24.33-34.'
  - type: text
    content: .
  '7':
  - type: text
    content: Tsy manana komandy
  - type: text
    content: na mpifehy na mpibaiko izy,
  '8':
  - type: text
    content: nefa mamory ny haniny raha fahavaratra
  - type: text
    content: ary manangona ny sakafony raha fararano.
  '9':
  - type: text
    content: Fa ianao kosa, ry ilay kamo,
  - type: text
    content: mandra-pahoviana no mbola handrianao?
  - type: text
    content: Rahoviana ihany ianao vao hifoha?
