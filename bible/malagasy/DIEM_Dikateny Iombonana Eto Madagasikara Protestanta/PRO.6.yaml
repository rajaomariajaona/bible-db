document_id: PRO.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza ny fiantohana trosan’olona
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Anaka, niantoka trosan’ny namanao ve ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandray tanan’olon-kafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fanaovana fiantohana voalaza eto dia fomba fanao tranainy teo amin’i Israely. Na dia tsy misy lalàna momba izany aza ao amin’ny Baiboly dia misy fitenenana azy ao amin’ny Gen 43.9; 44.32; Is 38.14; Sal 119.122. –Momba ny fandraisan-tanana dia jereo 2 Mp 10.15, Sir 29.14-20.
      marker-yv: yv-n
    - type: text
      text: ' ho marik’izany?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mbola hatory kely sy ho rendremana kely ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanohon-tanana kely eo am-pandriana ihany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Amin’izay anefa dia hamely anao tampoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny mpisodisody ny fahantrana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny jiolahy ny fahoriana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anjaran’ny ratsy fanahy
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy valahara sady tsy misy ilana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona mpamafy lainga.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mipi-maso hamitaka ny hafa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miantso amin’ny tongony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no manao famantarana amin’ny rantsan-tanany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hafetsifetsena no mameno ny fony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampihevi-dratsy azy mandrakariva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mahatonga azy hamafy ady.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izany no hampiavy tampoka ny faharavàny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho potika vetivety tsisy fanafana izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay ankahalain’ny Tompo
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-19
    - type: text
      text: Misy zavatra enina izay halan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka tsy zakany mihitsy, dia ireto:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fijery miavonavona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiteny mandainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanana mahafaty olon-tsy manan-tsiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fo mamorona teti-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tongotra dodon-kihazakazaka hanao ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vavolombelona mandainga sy manendrikendrika.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy koa zavatra fahafito,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny olona mpamafy ady amin’ny rahalahiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana tsy hijangajanga haka vadin’olona
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Namatotra sy naningotra anao ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny teny sy fampanantenana voalazanao?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Anaka, tandremo ny didin-drainao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza lavina ny fampianaran-dreninao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Araiketo mandrakariva ao am-ponao ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary kajio toa firavaka fiambozonanao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hitari-dalana anao izy raha mandeha ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiambina anao raha matory ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanoro hevitra anao raha mifoha ianao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa tahaka ny jiro ny didy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fanilo ny fampianarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny sori-dalam-piainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo famaizam-panabeazana,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ka hiaro anao amin’ny vehivavy ratsy fitondrantena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny fanangolen’ny vehivavy vadin’olon-kafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 5.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Aza mitsiriritra ny hatsaran-tarehiny ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza babon’ny masony mitsipalopalotra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Vidin-tapa-mofo no ahazoan-dehilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vehivavy mpivarotena iray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mihaza remby lafo vidy kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vehivavy mpanitsakitsa-bady.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Misy olona mitondra afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny paosin’akanjony ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hirehitra akanjo?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Misy olona manitsaka vain’afo ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho may tongotra?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia toy izany fa tsy hieren-doza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mandry amin’ny vadin’ny namany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Raha eny, dia izao no ataovy, anaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahafaka ny tenanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay efa mby eo an-tanan’ny namanao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandehana mitalaho mafy aminy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tsy omen-tsiny akory ny mpangalatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha toa ka mandroba hampitony hanoanana.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa raha tratra kosa izy, dia hanonitra impito heny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanome izay ananany rehetra ao an-tranony.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Adala izay lehilahy mangala-badin’olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manimba tena ny manao izany.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa hijinja aretina sy fahafaham-baràka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho afa-kenatra mandrakizay.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Satria ny fahasaro-piaro dia hampisafoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vadin’izany vehivavy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hiantra rafilahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro hamaliany faty.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Tsy hanaiky handray onitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hety hilefitra mihitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia hotambazana fanomezana be aza.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aza miala sasatra mihitsy na matory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-panaikin’io namanao io.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Afaho ny tenanao, ka tahafo ny gazela sy ny vorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay afa-miala amin’ny fandrika nihazonana azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny and 1–5, dia jereo koa 20.16; 22.26-27.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ialao ny hakamoana
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mankanesa any amin’ny vitsika, ry ilay kamo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Maro ny kolontsaina izay maka ny vitsika ho ohatra manambara ny fahazotoa-miasa sy ny fahaiza-mitsinjo mialoha.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Diniho ny fanaony, ka mba hendre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6b '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 10-11:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo koa 24.33-34.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy manana komandy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mpifehy na mpibaiko izy,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: nefa mamory ny haniny raha fahavaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manangona ny sakafony raha fararano.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa ianao kosa, ry ilay kamo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pahoviana no mbola handrianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahoviana ihany ianao vao hifoha?
