document_id: AMO.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana fahefatra: ny harona misy voankazo'
  - type: text
    content: 'Ary izao indray no nasehon’ny Tompo ANDRIANANAHARY ahy tamin’ny fahitana: indro nisy voankazo masaka iray harona. '
  '10':
  - type: text
    content: havadiko ho fisaonana ny fetinareo
  - type: text
    content: ary ho fitomaniana ny hiram-pifalianareo;
  - type: text
    content: hosikinako lamba gony ianareo rehetra
  - type: text
    content: sady hosolako loha
  - type: note
    content: Momba ireo marika famantarana fisaonana na alahelo lehibe dia jereo Jer 48.37 sy ny FTS amin’ny voambolana hoe MANDRIATRA FITAFIANA.
  - type: text
    content: ka hataoko tahaka ny olona misaona
  - type: text
    content: zanaka lahitokana;
  - type: text
    content: ary ho tahaka ny androm-pahoriana mangidy
  - type: text
    content: no fiafaran’izany.»
  '11':
  - type: text
    content: Ny Tompo ANDRIANANAHARY
  - type: text
    content: 'dia manao teny hentitra hoe:'
  - type: text
    content: «Indro avy ny andro
  - type: text
    content: 'izay handefasako mosary amin’ny tany:'
  - type: text
    content: tsy hoe ho mosarena mofo ny olona
  - type: text
    content: na hangetaheta rano
  - type: text
    content: fa haniry mafy handre ny teniko.
  '12':
  - type: text
    content: Dia hivezivezy avy any atsimo
  - type: text
    content: ka hatrany andrefana
  - type: text
    content: ary hitotototo avy any avaratra
  - type: text
    content: ka hatrany atsinanana ny olona
  - type: text
    content: mba hitady ny teniko, nefa tsy hahita.
  '13':
  - type: text
    content: Amin’izany andro izany, dia ho torana azon’ny hetaheta
  - type: text
    content: ireo tovovavy tsara tarehy mbamin’ny tovolahy.
  '14':
  - type: text
    content: Ireo mpianiana amin’ny sampin’i Samaria
  - type: text
    content: 'sy ireo mpiteny hoe: ‹Velona ny andriamanitrao, ry Dana!›'
  - type: text
    content: 'na hoe: ‹Velona ny andriamanitrao, ry Beera-Seba'
  - type: note
    content: 'Dana: toeram-pivavahana naorin’i Jerobohama I any avaratry ny fireneny (1 Mp 12.19-30). –Beera-Seba: jereo 5.5 sy nta. –Momba ny and 4-14: jereo Mi 6.9-14; Ohab 22.22-23.'
  - type: text
    content: '...!›'
  - type: text
    content: dia ho lavo ka tsy hiarina intsony.»
  '2':
  - type: text
    content: 'Dia nanontany ahy Izy hoe:'
  - type: text
    content: –Inona no hitanao, ry Hamôsa?
  - type: text
    content: 'Ka novaliako hoe:'
  - type: text
    content: –Voankazo masaka iray harona!
  - type: text
    content: 'Dia hoy ny TOMPO tamiko:'
  - type: text
    content: –Tonga ny farany ho an’ny Israely vahoakako, tsy holeferiko intsony ny fahadisoany
  - type: note
    content: 'Momba ny and 1-2: ampit Jer 1.11-12.'
  - type: text
    content: .
  '3':
  - type: text
    content: Amin’izany andro hiaviako izany,
  - type: text
    content: ireo vehivavy mpihira
  - type: note
    content: 'vehivavy mpihira: rijan-teny heverina ho mitombina; fa ny RM dia manao hoe hira.'
  - type: text
    content: ao an-dapa
  - type: text
    content: dia hanao hiram-pisaonana.
  - type: text
    content: ho marobe ny faty
  - type: text
    content: ka fahanginana no hanjaka hatraiza hatraiza.
  - type: text
    content: Izaho Tompo ANDRIANANAHARY
  - type: text
    content: no manao izany teny hentitra izany.
  - type: heading
    content: Ny filàn-tombony tafahoatra ataon’ireo mpijirika no mampidi-doza
  '4':
  - type: text
    content: Mihainoa izao ianareo te hitelina ny mahantra
  - type: text
    content: sy te hamongotra ny mpandefitra eto amin’ny tany,
  '5':
  - type: text
    content: 'ka velom-panontaniana anakampo hoe:'
  - type: text
    content: Rahoviana no hifarana ny fetin’ny tsinam-bolana
  - type: text
    content: ka hivarotantsika vary?
  - type: text
    content: 'Rahoviana no hifarana ny '
  - type: text
    content: sabata
  - type: text
    content: ','
  - type: text
    content: mba hanokafantsika ny sompitra?
  - type: text
    content: Hohakelezintsika ny zinga famarana,
  - type: text
    content: hampitombointsika ny vato fandanjana,
  - type: text
    content: mizàna mandainga no hampiasantsika,
  '6':
  - type: text
    content: ary hatramin’ny vary loha-kororoka
  - type: text
    content: no hamidintsika.
  - type: text
    content: Hovidintsika ho andevo ireo fadiranovana sy mahantra,
  - type: text
    content: noho izy tsy mahaloa na ny vidin-kapa iray lomisy aza.
  '7':
  - type: text
    content: Ny TOMPO, Izay reharehan’ny taranak’i Jakôba,
  - type: text
    content: 'dia nanao fianianana hoe:'
  - type: text
    content: «Tsy hisy hohadinoiko mandrakizay
  - type: text
    content: ny asa ratsy rehetra nataonareo!»
  '8':
  - type: text
    content: Noho izany, dia hihorohoro ny tany
  - type: text
    content: ary hisaona ny mponina rehetra ao aminy;
  - type: text
    content: eny, hihorohoro tokoa ny tany tontolo,
  - type: text
    content: ka hisondrotra sy hietry
  - type: text
    content: tahaka an’i Neily onin’i Ejipta
  - type: note
    content: Fampahatsiahivana miserana ny fahatondrahana sy fihenan’ny ony Neily.
  - type: text
    content: .
  '9':
  - type: text
    content: Ny Tompo ANDRIANANAHARY
  - type: text
    content: 'dia manao teny hentitra hoe:'
  - type: text
    content: '«Izao no hiseho amin’izany andro izany:'
  - type: text
    content: halentiko mitatao vovonana ny masoandro
  - type: text
    content: ary hohamaiziniko antoandro ny tany;
