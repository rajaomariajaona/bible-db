document_id: DEU.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy hoe mendrika noho ny firenen-kafa i Israely
  - type: text
    content: 'Mihainoa, ry vahoaka Israely ô! Efa hiampita an’i Jôrdàna ianareo izao, ary hiroso handroaka firenena maro izay lehibe sy mahery noho ianareo, sady hahafaka tanàna lehibe izay misy manda manakatra ny lanitra. '
  '10':
  - type: text
    content: Dia nomen’ny TOMPO ahy ny takela-bato anankiroa, voasoratry ny rantsan-tanan’Andriamanitra ka nirakitra ny didy rehetra nolazain’ny TOMPO taminareo; avy tao anatin’ny afo no nilazany an’ireny tao an-tendrombohitra fony ianareo vory ho fivondronambe.
  '11':
  - type: text
    content: 'Tapitra ny efapolo andro sy efapolo alina, vao nomen’ny TOMPO ahy ny takela-bato anankiroa, izany hoe ireo takela-bato nirakitra ny fanekempihavanana. '
  '12':
  - type: text
    content: 'Tamin’izay dia hoy ny TOMPO tamiko: «Mialà teto ianao, ka ndeha midina faingana; fa nihasimba ilay vahoaka izay nafahanao avy tany Ejipta, nalaky nivily niala tamin’ny sori-dàlana efa nasaiko nizorany ka nanao sarin-tsampy ho azy tamin’ny metaly nempoina!» '
  '13':
  - type: text
    content: 'Dia hoy koa ny TOMPO tamiko: «Efa hitako fa vahoaka mafy hatoka ity vahoaka ity! '
  '14':
  - type: text
    content: 'Avelao Aho handringana azy ka hanafoana ny fahatsiarovana azy eto amin’izao tontolo izao, fa ianao kosa no hataoko firenena mahery sy lehibe noho ity vahoaka ity.» '
  '15':
  - type: text
    content: 'Dia nihodina aho nidina niala teo amin’ny tendrombohitra izay toa nirehitra afo. Teny an-tanako roa ireo takela-bato anankiroa nirakitra ny fanekempihavanana. '
  '16':
  - type: text
    content: 'Nijery aho ka indreo tokoa fa nanota tamin’ny TOMPO ianareo, satria nanao ombilahikely tamin’ny metaly nempoina mba ho sampinareo ary nalaky nivily niala tamin’ny sori-dàlana izay efa nasain’ny TOMPO nizoranareo. '
  '17':
  - type: text
    content: Noho izany, dia noaingako mafy ireo takela-bato anankiroa ka nazerako avy teny an-tanako ho vakivaky teo imasonareo
  - type: note
    content: Jereo Eks 32.19.
  - type: text
    content: .
  - type: heading
    content: 'Ny ombilahikely volamena: manao fanelanelanana i Mosesy'
  '18':
  - type: text
    content: 'Ary niankohoka teo anatrehan’ny TOMPO efapolo andro sy efapolo alina tahaka ny teo aloha indray aho, tsy nihinan-kanina na nisotro rano. Ny fahotana rehetra vitanareo tamin’ny nanaovanareo izay ratsy teo imason’ny TOMPO ka nampahatezeranareo Azy no anton’izany. '
  '19':
  - type: text
    content: 'Fa natahotra aho nahita ny fahatezerana sy fahavinirana nirehetan’ny TOMPO taminareo ka saika handringanany anareo; saingy mbola nihaino ahy indray IZY tamin’izany andro izany. '
  '2':
  - type: text
    content: 'Soritana manokana ny Hanakîta, firenena lehibe sady olona ranjanana, izay fantatrareo sy renareo laza hoe: «Iza no hahatohitra ny taranak’i Hanàka'
  - type: note
    content: Jereo Nom 13.22 sy nta.
  - type: text
    content: '?» '
  '20':
  - type: text
    content: 'Tezitra mafy tamin’i Aharôna koa ny TOMPO ka saika handringana azy; saingy nifona ho an’i Aharôna koa aho tamin’izany andro izany. '
  '21':
  - type: text
    content: Ary nalaiko ny fahotana vitanareo, dia ilay ombilahikely volamena, ka nodorako dia notorotoroiko sy nomontsamontsaniko mandra-pahatongany ho vovoka; ary ny vovony dia nariako teo amin’ny ranon-driaka izay midina avy any amin’ny tendrombohitra.
  '22':
  - type: text
    content: Tao Tabeherà sy Masà ary Kibrôty-Taavà
  - type: note
    content: 'Tabeherà: jereo Nom 11.1-3. –Masà: jereo Eks 17.1-17. –Kibrôty-Taavà: jereo Nom 11.31-34.'
  - type: text
    content: ' dia nampahatezitra ny TOMPO koa ianareo. '
  '23':
  - type: text
    content: Ary fony nampandehanin’ny TOMPO niala tao Kadesy-Barnea
  - type: note
    content: 'Kadesy-Barnea: jereo 1.19-46; Nom 13.26.'
  - type: text
    content: ' ianareo ka nataony hoe: «Miakara ka alaovy ho fanananareo ny tany izay omeko anareo», dia nolavinareo ny tenin’ny TOMPO; fa tsy nino Azy ianareo na nihaino ny feony. '
  '24':
  - type: text
    content: Eny, hatramin’ny andro nahalalako anareo no ho mankatỳ
  - type: note
    content: 'nahalalako anareo: misy mandika hoe nahalalan’ny Tompo anareo, araka ny dkt grika tranainy.'
  - type: text
    content: ', dia niodina tamin’ny TOMPO hatrany ianareo.'
  '25':
  - type: text
    content: 'Noho ny TOMPO efa nilaza handringana anareo, dia niankohoka teo anatrehany aho ary tsy nitsahatra mihitsy nandritra izany efapolo andro sy efapolo alina izany. '
  '26':
  - type: text
    content: 'Nifona tamin’ny TOMPO aho ka nanao hoe: «Ry Tompo ANDRIANANAHARY ô, aza aringanao ny vahoaka fanananao, izay navotanao tamin’ny fahalehibiazanao sy navoakanao avy tany Ejipta tamin’ny fiarovanao mahery. '
  '27':
  - type: text
    content: 'Tsarovy i Abrahama sy i Itsehàka ary i Jakôba mpanomponao; fa aza jerenao ny ditran’ity vahoaka ity na ny haratsiam-panahiny na ny fahotany, '
  '28':
  - type: text
    content: 'fandrao izay monina any amin’ilay tany namoahanao anay hanao hoe: ‹Tsy hain’ny TOMPO ny nampiditra azy any amin’ny tany nampanantenainy azy; tsy tiany velively ireo, ka izany no namoahany azy mba hahafaty azy any an-taniefitra.› '
  '29':
  - type: text
    content: Kanefa, Tompo ô, ireo no vahoaka fanananao, izay navoakanao avy tany Ejipta tamin’ny herinao lehibe sy sandrinao nahinjitra.»
  '3':
  - type: text
    content: Ho tsapanareo anio fa ny TOMPO Andriamanitrareo no efa hiampita eo alohanareo tahaka ny afo mandevona, ka Izy mihitsy no handringana ireny firenena ireny sy hampietry azy eo anoloanareo; dia handroaka azy ianareo ka hamongotra azy faingana, araka izay nampanantenain’ny TOMPO taminareo.
  '4':
  - type: text
    content: 'Rehefa voatosiky ny TOMPO Andriamanitrareo teo anoloanareo ireny firenena ireny, dia aoka ianareo tsy hanao anakampo hoe: «Ny fahamarinanay no nampidiran’ny TOMPO anay haka ity tany ity ho fanananay!» Tsy izany, fa ny haratsiam-panahin’ireo no nandroahan’ny TOMPO azy teo anoloanareo. '
  '5':
  - type: text
    content: 'Tsy ny fahamarinanareo na ny hitsimponanareo no mahamendrika anareo hiditra haka ny taniny ho fanananareo; fa ny haratsiam-panahin’ireo firenena ireo no handroahan’ny TOMPO Andriamanitrareo azy eo anoloanareo, ary koa mba hahatò ny fampanantenana izay nianianan’ny TOMPO tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo. '
  '6':
  - type: text
    content: Koa aoka ho fantatrareo fa tsy ny fahamarinanareo no anomezan’ny TOMPO Andriamanitrareo izany tany soa izany ho fanananareo. Vahoaka mafy hatoka manko ianareo.
  - type: heading
    content: 'Ny ombilahikely volamena: ny hadisoana vitan’ny vahoaka israelita'
  '7':
  - type: text
    content: Tsarovy ny nampahatezeranareo ny TOMPO Andriamanitrareo; aza hadinoinareo mihitsy izany! Hatreo amin’ny andro nialanareo tany Ejipta ka hatramin’izao nahatongavanareo teto amin’ity toerana ity izao, dia tsy nitsahatra niodina tamin’ny TOMPO ianareo.
  '8':
  - type: text
    content: 'Tany '
  - type: text
    content: Hôreba
  - type: text
    content: ' aza, dia nampahatezitra mafy ny TOMPO tokoa ianareo ka saiky haringany. '
  '9':
  - type: text
    content: 'Niakatra tao an-tendrombohitra manko aho handray ny takela-bato, dia ireo takela-bato anankiroa nirakitra ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataon’ny TOMPO taminareo; ary nitoetra efapolo andro sy efapolo alina tao aho, tsy nihinan-kanina na nisotro rano'
  - type: note
    content: Jereo Eks 24.18.
