document_id: DEU.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy hoe mendrika noho ny firenen-kafa i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mihainoa, ry vahoaka Israely ô! Efa hiampita an’i Jôrdàna ianareo izao, ary hiroso handroaka firenena maro izay lehibe sy mahery noho ianareo, sady hahafaka tanàna lehibe izay misy manda manakatra ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Soritana manokana ny Hanakîta, firenena lehibe sady olona ranjanana, izay fantatrareo sy renareo laza hoe: «Iza no hahatohitra ny taranak’i Hanàka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 13.22 sy nta.
    marker-yv: yv-n
  - type: text
    text: '?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho tsapanareo anio fa ny TOMPO Andriamanitrareo no efa hiampita eo alohanareo tahaka ny afo mandevona, ka Izy mihitsy no handringana ireny firenena ireny sy hampietry azy eo anoloanareo; dia handroaka azy ianareo ka hamongotra azy faingana, araka izay nampanantenain’ny TOMPO taminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa voatosiky ny TOMPO Andriamanitrareo teo anoloanareo ireny firenena ireny, dia aoka ianareo tsy hanao anakampo hoe: «Ny fahamarinanay no nampidiran’ny TOMPO anay haka ity tany ity ho fanananay!» Tsy izany, fa ny haratsiam-panahin’ireo no nandroahan’ny TOMPO azy teo anoloanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy ny fahamarinanareo na ny hitsimponanareo no mahamendrika anareo hiditra haka ny taniny ho fanananareo; fa ny haratsiam-panahin’ireo firenena ireo no handroahan’ny TOMPO Andriamanitrareo azy eo anoloanareo, ary koa mba hahatò ny fampanantenana izay nianianan’ny TOMPO tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa aoka ho fantatrareo fa tsy ny fahamarinanareo no anomezan’ny TOMPO Andriamanitrareo izany tany soa izany ho fanananareo. Vahoaka mafy hatoka manko ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny ombilahikely volamena: ny hadisoana vitan’ny vahoaka israelita'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsarovy ny nampahatezeranareo ny TOMPO Andriamanitrareo; aza hadinoinareo mihitsy izany! Hatreo amin’ny andro nialanareo tany Ejipta ka hatramin’izao nahatongavanareo teto amin’ity toerana ity izao, dia tsy nitsahatra niodina tamin’ny TOMPO ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: text
    text: ' aza, dia nampahatezitra mafy ny TOMPO tokoa ianareo ka saiky haringany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Niakatra tao an-tendrombohitra manko aho handray ny takela-bato, dia ireo takela-bato anankiroa nirakitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' nataon’ny TOMPO taminareo; ary nitoetra efapolo andro sy efapolo alina tao aho, tsy nihinan-kanina na nisotro rano'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 24.18.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nomen’ny TOMPO ahy ny takela-bato anankiroa, voasoratry ny rantsan-tanan’Andriamanitra ka nirakitra ny didy rehetra nolazain’ny TOMPO taminareo; avy tao anatin’ny afo no nilazany an’ireny tao an-tendrombohitra fony ianareo vory ho fivondronambe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tapitra ny efapolo andro sy efapolo alina, vao nomen’ny TOMPO ahy ny takela-bato anankiroa, izany hoe ireo takela-bato nirakitra ny fanekempihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’izay dia hoy ny TOMPO tamiko: «Mialà teto ianao, ka ndeha midina faingana; fa nihasimba ilay vahoaka izay nafahanao avy tany Ejipta, nalaky nivily niala tamin’ny sori-dàlana efa nasaiko nizorany ka nanao sarin-tsampy ho azy tamin’ny metaly nempoina!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy koa ny TOMPO tamiko: «Efa hitako fa vahoaka mafy hatoka ity vahoaka ity! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avelao Aho handringana azy ka hanafoana ny fahatsiarovana azy eto amin’izao tontolo izao, fa ianao kosa no hataoko firenena mahery sy lehibe noho ity vahoaka ity.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nihodina aho nidina niala teo amin’ny tendrombohitra izay toa nirehitra afo. Teny an-tanako roa ireo takela-bato anankiroa nirakitra ny fanekempihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nijery aho ka indreo tokoa fa nanota tamin’ny TOMPO ianareo, satria nanao ombilahikely tamin’ny metaly nempoina mba ho sampinareo ary nalaky nivily niala tamin’ny sori-dàlana izay efa nasain’ny TOMPO nizoranareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noho izany, dia noaingako mafy ireo takela-bato anankiroa ka nazerako avy teny an-tanako ho vakivaky teo imasonareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 32.19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny ombilahikely volamena: manao fanelanelanana i Mosesy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niankohoka teo anatrehan’ny TOMPO efapolo andro sy efapolo alina tahaka ny teo aloha indray aho, tsy nihinan-kanina na nisotro rano. Ny fahotana rehetra vitanareo tamin’ny nanaovanareo izay ratsy teo imason’ny TOMPO ka nampahatezeranareo Azy no anton’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa natahotra aho nahita ny fahatezerana sy fahavinirana nirehetan’ny TOMPO taminareo ka saika handringanany anareo; saingy mbola nihaino ahy indray IZY tamin’izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tezitra mafy tamin’i Aharôna koa ny TOMPO ka saika handringana azy; saingy nifona ho an’i Aharôna koa aho tamin’izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nalaiko ny fahotana vitanareo, dia ilay ombilahikely volamena, ka nodorako dia notorotoroiko sy nomontsamontsaniko mandra-pahatongany ho vovoka; ary ny vovony dia nariako teo amin’ny ranon-driaka izay midina avy any amin’ny tendrombohitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tao Tabeherà sy Masà ary Kibrôty-Taavà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tabeherà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 11.1-3. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Masà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Eks 17.1-17. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Kibrôty-Taavà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Nom 11.31-34.'
    marker-yv: yv-n
  - type: text
    text: ' dia nampahatezitra ny TOMPO koa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary fony nampandehanin’ny TOMPO niala tao Kadesy-Barnea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kadesy-Barnea: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.19-46; Nom 13.26.
    marker-yv: yv-n
  - type: text
    text: ' ianareo ka nataony hoe: «Miakara ka alaovy ho fanananareo ny tany izay omeko anareo», dia nolavinareo ny tenin’ny TOMPO; fa tsy nino Azy ianareo na nihaino ny feony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Eny, hatramin’ny andro nahalalako anareo no ho mankatỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nahalalako anareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy mandika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nahalalan’ny Tompo anareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', araka ny dkt grika tranainy.'
    marker-yv: yv-n
  - type: text
    text: ', dia niodina tamin’ny TOMPO hatrany ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Noho ny TOMPO efa nilaza handringana anareo, dia niankohoka teo anatrehany aho ary tsy nitsahatra mihitsy nandritra izany efapolo andro sy efapolo alina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nifona tamin’ny TOMPO aho ka nanao hoe: «Ry Tompo ANDRIANANAHARY ô, aza aringanao ny vahoaka fanananao, izay navotanao tamin’ny fahalehibiazanao sy navoakanao avy tany Ejipta tamin’ny fiarovanao mahery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tsarovy i Abrahama sy i Itsehàka ary i Jakôba mpanomponao; fa aza jerenao ny ditran’ity vahoaka ity na ny haratsiam-panahiny na ny fahotany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fandrao izay monina any amin’ilay tany namoahanao anay hanao hoe: ‹Tsy hain’ny TOMPO ny nampiditra azy any amin’ny tany nampanantenainy azy; tsy tiany velively ireo, ka izany no namoahany azy mba hahafaty azy any an-taniefitra.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kanefa, Tompo ô, ireo no vahoaka fanananao, izay navoakanao avy tany Ejipta tamin’ny herinao lehibe sy sandrinao nahinjitra.»
