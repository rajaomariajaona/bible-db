document_id: REV.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny arivo taona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hitako nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' anankiray nidina avy tany an-danitra, izay nanana ny fanalahidin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hantsambe
    - type: text
      text: ' sy rojo vy lehibe teny an-tanany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' izay namitaka azy ireo dia natsipy tany amin’ny farihy afo aman-tsolifara, izay efa nanipazana ilay biby sy ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' sandoka; ary hampijalîna andro aman’alina mandrakizay mandrakizay izy telo ireo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitsarana farany
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hitako ity sezafiandrianana fotsy lehibe sy Ilay mipetraka eo amboniny. Ny tany amana habakabaka dia nandositra teo anatrehany, ka tsy hita intsony izay toerana nisy azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary hitako ny maty rehetra, na ny lehibe na ny kely, tafajoro teo anoloan’io sezafiandrianana io. Dia nisy horonamboky maro novelarina; ary nisy horonamboky iray hafa koa novelarina, dia ilay horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay; ka tamin’ny zavatra voasoratra tao anatin’ireo horonamboky ireo no nitsarana ny maty rehetra, araka ny asany avy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 11-12:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Dan 7.9-10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny ranomasina dia namoaka ny maty tao aminy; Rafahafatesana sy ny Toeran’ny maty koa namoaka ny maty tao aminy; ka samy notsaraina araka ny asany avy ny maty rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rafahafatesana sy ny Toeran’ny maty kosa natsipy tany amin’ny farihy afo. Izany farihy afo izany no fahafatesana faharoa; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ka raha nisy olona tsy hita voasoratra tao anatin’ilay horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay, dia natsipy tany amin’ny farihy afo izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nosamborin’io anjely io ny dràgona, dia ilay bibilava fahizay (izany hoe ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' na i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: text
      text: ), ka nafatony arivo taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 12.9 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dràgona:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 12.3 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: sy natsipiny tao amin’ny hantsambe. Dia nohidian’ilay anjely ny hantsambe ary nasiany tombokase teo amboniny, mba tsy hahazoan’ny dràgona mamitaka ireo firenena intsony mandra-pahatapitry ny arivo taona; fa tsy maintsy hovahana mandritra ny fotoana fohifohy izy aorian’izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia hitako nisy sezafiandrianana maro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Dan 7.9, 22.
      marker-yv: yv-n
    - type: text
      text: ', izay nipetrahan’olona nomem-pahefana hitsara. Ary hitako ny fanahin’ireo notapahin-doha satria nitana ny hafatra nijoroan’i Jesoa ho vavolombelona sy nitory ny tenin’Andriamanitra: tsy mba nivavaka tamin’ny biby na tamin’ny sarin’ny biby ireo, sady tsy mba nandray ny marik’ilay biby teo amin’ny handriny na teo amin’ny tanany; efa velona ireo ka niara-nanjaka tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' arivo taona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '(Fa ny sisa amin’ny maty dia tsy mbola velona, raha tsy efa tapitra ny arivo taona.) Izany no fitsanganana voalohany avy any amin’ny maty. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sambatra sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: masina
    - type: text
      text: ' izay manana anjara amin’izany fitsanganana voalohany izany; tsy mba ananan’ny fahafatesana faharoa fahefana ireo, fa ho mpisoron’Andriamanitra sy ho mpisoron’i Kristy, ka hiara-manjaka amin’i Kristy arivo taona.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Resy tanteraka i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa tapitra ny arivo taona, dia hovahana i Satàna hiala amin’ny fonja nitoerany, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'ka hivoaka hamitaka ireo firenena amin’ny vazan-tany efatra, mba hamory azy ho amin’ny ady: ireo firenena ireo dia i Gôga sy i Magôga'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'i Gôga sy i Magôga: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatramin’ny Ezek 38–39, dia toy izany no iantsoana ireo firenena mpanohitra ny vahoakan’Andriamanitra amin’ny andro farany.
      marker-yv: yv-n
    - type: text
      text: ', izay tahaka ny fasi-dranomasina ny isany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary niakatra nanerana ny lafin-tany izy rehetra, ka nanodidina ny toby nisy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: ' sady nanodidina ny tanàna lalain’Andriamanitra; kanjo nisy afo nidina avy tany an-danitra ka nandevona ireo firenena ireo. '
