document_id: REV.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny arivo taona
  - type: text
    content: 'Ary hitako nisy '
  - type: text
    content: anjely
  - type: text
    content: ' anankiray nidina avy tany an-danitra, izay nanana ny fanalahidin’ny '
  - type: text
    content: hantsambe
  - type: text
    content: ' sy rojo vy lehibe teny an-tanany. '
  '10':
  - type: text
    content: 'Ny '
  - type: text
    content: devoly
  - type: text
    content: ' izay namitaka azy ireo dia natsipy tany amin’ny farihy afo aman-tsolifara, izay efa nanipazana ilay biby sy ilay '
  - type: text
    content: mpaminany
  - type: text
    content: ' sandoka; ary hampijalîna andro aman’alina mandrakizay mandrakizay izy telo ireo.'
  - type: heading
    content: Ny fitsarana farany
  '11':
  - type: text
    content: 'Dia hitako ity sezafiandrianana fotsy lehibe sy Ilay mipetraka eo amboniny. Ny tany amana habakabaka dia nandositra teo anatrehany, ka tsy hita intsony izay toerana nisy azy. '
  '12':
  - type: text
    content: Ary hitako ny maty rehetra, na ny lehibe na ny kely, tafajoro teo anoloan’io sezafiandrianana io. Dia nisy horonamboky maro novelarina; ary nisy horonamboky iray hafa koa novelarina, dia ilay horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay; ka tamin’ny zavatra voasoratra tao anatin’ireo horonamboky ireo no nitsarana ny maty rehetra, araka ny asany avy
  - type: note
    content: 'And 11-12: ampit Dan 7.9-10.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ny ranomasina dia namoaka ny maty tao aminy; Rafahafatesana sy ny Toeran’ny maty koa namoaka ny maty tao aminy; ka samy notsaraina araka ny asany avy ny maty rehetra. '
  '14':
  - type: text
    content: 'Rafahafatesana sy ny Toeran’ny maty kosa natsipy tany amin’ny farihy afo. Izany farihy afo izany no fahafatesana faharoa; '
  '15':
  - type: text
    content: ka raha nisy olona tsy hita voasoratra tao anatin’ilay horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay, dia natsipy tany amin’ny farihy afo izy.
  '2':
  - type: text
    content: 'Nosamborin’io anjely io ny dràgona, dia ilay bibilava fahizay (izany hoe ny '
  - type: text
    content: devoly
  - type: text
    content: ' na i '
  - type: text
    content: Satàna
  - type: text
    content: ), ka nafatony arivo taona
  - type: note
    content: 'Ampit 12.9 sy nta. –dràgona: jereo 12.3 sy nta.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: sy natsipiny tao amin’ny hantsambe. Dia nohidian’ilay anjely ny hantsambe ary nasiany tombokase teo amboniny, mba tsy hahazoan’ny dràgona mamitaka ireo firenena intsony mandra-pahatapitry ny arivo taona; fa tsy maintsy hovahana mandritra ny fotoana fohifohy izy aorian’izany.
  '4':
  - type: text
    content: Dia hitako nisy sezafiandrianana maro
  - type: note
    content: Ampit Dan 7.9, 22.
  - type: text
    content: ', izay nipetrahan’olona nomem-pahefana hitsara. Ary hitako ny fanahin’ireo notapahin-doha satria nitana ny hafatra nijoroan’i Jesoa ho vavolombelona sy nitory ny tenin’Andriamanitra: tsy mba nivavaka tamin’ny biby na tamin’ny sarin’ny biby ireo, sady tsy mba nandray ny marik’ilay biby teo amin’ny handriny na teo amin’ny tanany; efa velona ireo ka niara-nanjaka tamin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' arivo taona. '
  '5':
  - type: text
    content: '(Fa ny sisa amin’ny maty dia tsy mbola velona, raha tsy efa tapitra ny arivo taona.) Izany no fitsanganana voalohany avy any amin’ny maty. '
  '6':
  - type: text
    content: 'Sambatra sy '
  - type: text
    content: masina
  - type: text
    content: ' izay manana anjara amin’izany fitsanganana voalohany izany; tsy mba ananan’ny fahafatesana faharoa fahefana ireo, fa ho mpisoron’Andriamanitra sy ho mpisoron’i Kristy, ka hiara-manjaka amin’i Kristy arivo taona.'
  - type: heading
    content: Resy tanteraka i Satàna
  '7':
  - type: text
    content: 'Rehefa tapitra ny arivo taona, dia hovahana i Satàna hiala amin’ny fonja nitoerany, '
  '8':
  - type: text
    content: 'ka hivoaka hamitaka ireo firenena amin’ny vazan-tany efatra, mba hamory azy ho amin’ny ady: ireo firenena ireo dia i Gôga sy i Magôga'
  - type: note
    content: 'i Gôga sy i Magôga: hatramin’ny Ezek 38–39, dia toy izany no iantsoana ireo firenena mpanohitra ny vahoakan’Andriamanitra amin’ny andro farany.'
  - type: text
    content: ', izay tahaka ny fasi-dranomasina ny isany. '
  '9':
  - type: text
    content: 'Ary niakatra nanerana ny lafin-tany izy rehetra, ka nanodidina ny toby nisy ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' sady nanodidina ny tanàna lalain’Andriamanitra; kanjo nisy afo nidina avy tany an-danitra ka nandevona ireo firenena ireo. '
