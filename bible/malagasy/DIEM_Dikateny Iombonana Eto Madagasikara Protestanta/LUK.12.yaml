document_id: LUK.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tokony tsy hihatsaravelatsihy
  - type: heading
    content: (Jereo Mt 10.26-27)
  - type: text
    content: 'Tamin’izay dia tafangona ny vahoaka alikisa nifanitsa-kitro. Kanefa ny mpianany aloha no nitenenan’i Jesoa hoe:'
  - type: text
    content: '–Mitandrema tena ianareo amin’ny '
  - type: text
    content: leviora
  - type: text
    content: 'n’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' dia ny fihatsarambelatsihy. '
  '10':
  - type: text
    content: Na iza na iza hanao teny manohitra ny Zanak’olona dia hahazo famelan-keloka; fa izay manevateva ny Fanahy Masina kosa dia tsy hahazo famelan-keloka.
  '11':
  - type: text
    content: 'Raha entina hotsaraina eo amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' na eo anatrehan’ny mpitondra sy ny manampahefana ianareo, dia aza manahy ny amin’izay havalinareo na izay holazainareo; '
  '12':
  - type: text
    content: fa ny Fanahy Masina no hampianatra anareo eo no ho eo ihany izay tokony holazainareo.
  - type: heading
    content: Fanoharana momba ilay mpanankarena tsy misaina
  '13':
  - type: text
    content: 'Nisy olona anankiray tamin’ny vahoaka vory teo nanao tamin’i Jesoa hoe:'
  - type: text
    content: –Mpampianatra ô, mba ilazao kely ny rahalahiko hifampizara ny lovanay amiko.
  '14':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Andriamatoa ô, iza moa no nanendry Ahy ho mpitsara ny raharahanareo na ho mpizara ny fanananareo?
  '15':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny vahoaka:'
  - type: text
    content: –Mitandrema! Aoka tsy ho voan’ny fangoronan-karena isan-karazany ianareo, fa ny ain’olona tsy miankina amin’ny habetsahan’ny fananany!
  '16':
  - type: text
    content: 'Ho azy ireo no nitantaran’i Jesoa ity fanoharana ity:'
  - type: text
    content: '–Nisy mpanankarena anankiray nanan-tany nahavokatra be, '
  '17':
  - type: text
    content: 'ka velon’eritreritra nanao anakampo hoe: «Inona re no hataoko fa tsy ampy intsony ny toerana hamoriako ny vokatra?» '
  '18':
  - type: text
    content: 'Dia hoy indray izy: «Izao no hataoko: horavako ny sompitra ankehitriny ka sompitra lehibe kokoa no hajoroko hamoriako ny variko sy ny fananako rehetra. '
  '19':
  - type: text
    content: 'Rehefa izany, dia izao no holazaiko anakampo amin’ny aiko: Ry aiko ô, manan-tahirim-pananana be tsy ho lany lanîna mandritra ny taona maro ianao; koa mialà sasatra, mihinàna, misotroa sy milibà.» '
  '2':
  - type: text
    content: 'Fa tsy misy afenina izay tsy haseho na takona izay tsy ho fantatra. '
  '20':
  - type: text
    content: 'Fa hoy Andriamanitra taminy: «Olona tsy misaina ianao! Anio alina ihany, dia halàko aminao ny ainao. Ka ho an’iza ireo zavatra navosanao?»'
  '21':
  - type: text
    content: 'Dia nofaranan’i Jesoa hoe:'
  - type: text
    content: –Toy izany àry no manjo izay manangon-karena ho an’ny tenany fotsiny fa tsy mba mihary harena ao amin’Andriamanitra
  - type: note
    content: Ampit Mt 6.20.
  - type: text
    content: '!'
  - type: heading
    content: Aoka hatoky an’Andriamanitra
  - type: heading
    content: (Jereo Mt 6.25-34)
  '22':
  - type: text
    content: 'Dia hoy indray i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: '–Izany indrindra no ilazako aminareo hoe: aza manahy ny amin’ny hanina izay tohan’ainareo, na ny amin’ny fitafiana izay ilain’ny vatanareo. '
  '23':
  - type: text
    content: 'Fa ny aina mihoatra noho ny hanina; ary ny vatana mihoatra noho ny fitafiana. '
  '24':
  - type: text
    content: 'Diniho ange ny goaika: tsy mamafy na mijinja izy ireny, tsy manana trano fitahirizana na sompitra, fa Andriamanitra no mamelona azy. Tsy sarobidy lavitra noho ny vorona ve ianareo? '
  '25':
  - type: text
    content: Iza moa ianareo no mahay manalava kely ny andro iainany
  - type: note
    content: 'ny andro iainany: dkt hafa ny halavàny.'
  - type: text
    content: 'na dia feno fanahiana toy inona aza? '
  '26':
  - type: text
    content: 'koa raha ny zavatra kely tsinontsinona aza tsy efanareo, ahoana no anahianareo ny sisa rehetra. '
  '27':
  - type: text
    content: 'Diniho koa ange ny fanirin’ny voninkazo: tsy miasa na mamoly izy ireny'
  - type: note
    content: 'Toy izay ny hoe tsy miasa na mamoly, dia misy stf sasany ahitana hoe tsy mamoly na manenona. –Salômôna... rehetra aza: jereo 1 Mp 10.'
  - type: text
    content: '; kanefa lazaiko aminareo fa na i Salômôna teo amin’ny voninahiny rehetra aza, dia tsy tsara fitafiana toy ny iray amin’izy ireny. '
  '28':
  - type: text
    content: 'Tafîn’Andriamanitra toy izany ny ahitra izay eny an-tsaha anio nefa atsipy any am-patana rahampitso, ka ianareo indray ve no tsy hampitafîny, ry kely finoana? '
  '29':
  - type: text
    content: 'Koa aza ny fikatsahana ny hohanina sy hosotroina no hany ilofosana ary aza mitebiteby foana ianareo. '
  '3':
  - type: text
    content: Noho izany, izay rehetra nolazainareo tao amin’ny maizina dia ho re ao amin’ny mazava; ary izay nobitsihinareo tao an’efitra mangina dia hantsoantsoina eny an-tampon-trano.
  - type: heading
    content: Ny hany tokony hatahorana
  - type: heading
    content: (Jereo Mt 10.28-31)
  '30':
  - type: text
    content: 'Ireo mpanompo sampy eo amin’izao tontolo izao dia fatra-pikatsaka ireny rehetra ireny; ianareo kosa, fantatry ny Rainareo fa ilainareo izany. '
  '31':
  - type: text
    content: 'Katsaho àry ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ', dia homena anareo ireny ho fanampiny!'
  - type: heading
    content: Mahaiza mihary harena any an-danitra
  - type: heading
    content: (Jereo Mt 6.19-21)
  '32':
  - type: text
    content: '–Aza matahotra, ry andian’ondry vitsy, fa efa sitraky ny Ray homena anareo ny '
  - type: text
    content: Fanjakany
  - type: text
    content: '! '
  '33':
  - type: text
    content: 'Amidio ny fanananareo ka ny vola azo, anaovy asa fiantrana. Kitapom-bola tsy mety tontan’ny ela atao ho anareo, dia harena tsy mety lany any an-danitra; any tsy mba misy mpangalatra mihaodihaody na kadradraka manimba. '
  '34':
  - type: text
    content: Fa izay misy ny harenareo no hisy ny fonareo koa!
  - type: heading
    content: Aoka ho vonona lalandava
  '35':
  - type: text
    content: '–Aoka ho vonona lalandava ka ny lambanareo sikino ary ny jironareo areheto. '
  '36':
  - type: text
    content: 'Manaova toy ny mpanompo miandry izay hiverenan’ny tompony avy any amin’ny fanasana; raha vao tonga sy mandondòna izy, dia vohain’ny mpanompony miaraka amin’izay. '
  '37':
  - type: text
    content: 'Sambatra ireo mpanompo hitan’ny tompony miari-tory raha tonga izy. Lazaiko marina aminareo fa hisikina lamba ny tompony ka hampipetraka azy hihinana ary handroso sakafo ho azy. '
  '38':
  - type: text
    content: 'Na misasakalina na maneno akoho no ahatongavan’ny tompony ka mahita ireo mpanompo miari-tory toy izany, dia sambatra ireo mpanompo ireo! '
  '39':
  - type: text
    content: 'Izao no ataovy an-tsaina: raha fantatry ny tompon-trano ny ora iavian’ny mpangalatra, dia tsy havelany hotamîna ny tranony! '
  '4':
  - type: text
    content: '–Izao no lazaiko aminareo sakaizako: aza matahotra ireo mahafaty ny vatana, kanefa tsy afa-manao mihoatra an’izany. '
  '40':
  - type: text
    content: 'Ianareo koa, aoka ho vonona hatrany, fa ho avy amin’ny ora tsy ampoizinareo ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: .
  - type: heading
    content: Mpanompo mahatoky sy mpanompo tsy mahatoky
  - type: heading
    content: (Jereo Mt 24.45-51)
  '41':
  - type: text
    content: 'Tamin’izay dia niteny i Petera nanao hoe:'
  - type: text
    content: '–Izahay ihany ve no ilazanao izany '
  - type: text
    content: fanoharana
  - type: text
    content: ' izany sa ny olona rehetra koa?'
  '42':
  - type: text
    content: 'Ka hoy ny Tompo hoe:'
  - type: text
    content: '–Iza moa no mpanompo mahatoky sy mato-tsaina notendren’ny tompony ho mpandraharaha hifehy ireo mpanompony sady hanome azy ireo ny anjara sakafony ara-potoana? '
  '43':
  - type: text
    content: 'Sambatra io mpanompo io raha tonga ny tompony ka mahatratra azy manao raharaha toy izany. '
  '44':
  - type: text
    content: 'Lazaiko marina aminareo fa hotendren’ny tompony hiadidy ny fananany rehetra izy. '
  '45':
  - type: text
    content: 'Raha tàhiny kosa io mpanompo io manao anakampo hoe: «Mbola ho ela vao tafaverina ny tompoko», ka mihetraketraka amin’ny mpanompo hafa na lahy na vavy sady manaram-po mihinana sy misotro ary mimamo, '
  '46':
  - type: text
    content: dia ho tonga ilay tompony amin’ny andro tsy ampoiziny sy amin’ny ora tsy fantany; hosazîny mafy tokoa io mpanompo io
  - type: note
    content: 'hosazîny mafy... mpanompo io: dkt hafa horoahiny tokoa io mpanompo io.'
  - type: text
    content: ary hataony miombona anjara amin’ny tsy mpino.
  '47':
  - type: text
    content: 'Fa ny mpanompo mahalala tsara ny sitrapon’ny tompony, nefa tsy mivonon-kanao ary tsy manatontosa, dia hahazo kapoka be. '
  '48':
  - type: text
    content: Izay tsy mahalala kosa, nefa manao zavatra tokony hikapohana azy, dia hahazo kapoka kely. Izay nomena be no hitakiana be; ary izy nanankinana be no hadinina bebe kokoa.
  - type: heading
    content: Mahatonga fisarahana i Jesoa
  - type: heading
    content: (Jereo Mt 10.34-36)
  '49':
  - type: text
    content: –Hanipy afo eto ambonin’ny tany
  - type: note
    content: Ampit Is 66.15-16.
  - type: text
    content: ' no nahatongavako, ka irîko dia irîko tokoa ny hirehetany sahady! '
  '5':
  - type: text
    content: 'Fa hasehoko anareo izay tokony hatahoranareo: matahora an’Andriamanitra Izay manam-pahefana hamarina anareo any amin’ny '
  - type: text
    content: lohasahan’afo
  - type: text
    content: ' rehefa novonoiny ianareo'
  - type: note
    content: Ampit Mt 10.28.
  - type: text
    content: ; eny, hoy Aho aminareo, Izy ihany no atahory.
  '50':
  - type: text
    content: 'Misy '
  - type: text
    content: batisa
  - type: text
    content: ' tsy maintsy hirosoako, ka may erỳ Aho miandry ny hahatanterahany! '
  '51':
  - type: text
    content: 'Heverinareo moa fa tonga eto an-tany Aho mba hampihavana? Tsia, hoy Aho aminareo, fa hampifanohitra. '
  '52':
  - type: text
    content: 'Eny, manomboka izao ny olona dimy iray trano dia hifanohitra: ny telo hanohitra ny roa ary ny roa hanohitra ny telo. '
  '53':
  - type: text
    content: Hifanohitra ny mpianakavy ka ny ray hanohitra ny zanany lahy, ary ny zanaka lahy hanohitra ny rainy; ny reny hanohitra ny zanany vavy, ary ny zanaka vavy hanohitra ny reniny; ny rafozam-bavy hanohitra ny vinantovaviny, ary ny vinantovavy hanohitra ny rafozam-baviny
  - type: note
    content: Jereo Mi 7.6.
  - type: text
    content: .
  - type: heading
    content: Tokony hahay mamantatra ny andro
  - type: heading
    content: (Jereo Mt 16.2-3)
  '54':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny vahoaka:'
  - type: text
    content: '–Raha vao hitanareo miakatra avy any andrefana ny rahona, dia hoy ianareo hoe: «Ho avy ny orana», ary izany tokoa! '
  '55':
  - type: text
    content: 'Ary raha mitsoka avy any atsimo ny rivotra, dia hoy ianareo hoe: «Hafana ny andro», ary izany tokoa! '
  '56':
  - type: text
    content: Ry mpihatsaravelatsihy, hainareo fantarina ny toetoetry ny tany aman-danitra, ka nahoana no tsy hainareo fantarina kosa izao andro diavintsika izao?
  - type: heading
    content: Mahaiza mihavana amin’izay manana ady aminao
  - type: heading
    content: (Jereo Mt 5.25-26)
  '57':
  - type: text
    content: 'Nahoana no tsy ny tenanareo ihany no mpitsara mahita izay rariny sy hitsiny? '
  '58':
  - type: text
    content: 'Dieny mbola miara-dalana hamonjy ny manampahefana ianao sy ilay manana ady aminao, dia ataovy izay hahafahanao aminy; fandrao entiny hanatrika ny mpitsara tokoa ianao, ka ny mpitsara hanolotra anao amin’ny mpamatotra ary ny mpamatotra hampiditra anao am-ponja. '
  '59':
  - type: text
    content: Lazaiko aminao fa tsy ho tafavoaka tao ianao mandra-panèfanao ny iraimbilanja farany.
  '6':
  - type: text
    content: 'Tsy ampahafolon’ny '
  - type: text
    content: denàry
  - type: text
    content: ' monja ve no vidin’ny fody dimy? Kanefa tsy misy hadinon’Andriamanitra izy ireny na iray aza. '
  '7':
  - type: text
    content: 'Na ny volon-dohanareo aza dia fantatr’Andriamanitra ny isany: koa aza matahotra, fa sarobidy noho ny fody maro ianareo!'
  - type: heading
    content: Manaiky na tsy manaiky ho mpiandany amin’i Jesoa
  - type: heading
    content: (Jereo Mt 10.32-33; 13.32; 10.19-20)
  '8':
  - type: text
    content: '–Izao no lazaiko aminareo: na iza na iza manaiky ho mpiandany amiko eo anatrehan’ny olona, ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' koa mba hanaiky ho mpiandany aminy eo anatrehan’ny '
  - type: text
    content: anjelin’Andriamanitra
  - type: text
    content: '! '
  '9':
  - type: text
    content: Fa izay mandà tsy ho mpiandany amiko eo anatrehan’ny olona
  - type: note
    content: Ampit 2Tim 2.12.
  - type: text
    content: ', ny Zanak’olona koa mba handà tsy ho mpiandany aminy eo anatrehan’ny anjelin’Andriamanitra.'
