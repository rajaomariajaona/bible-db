document_id: LUK.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tokony tsy hihatsaravelatsihy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 10.26-27)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia tafangona ny vahoaka alikisa nifanitsa-kitro. Kanefa ny mpianany aloha no nitenenan’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mitandrema tena ianareo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: 'n’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' dia ny fihatsarambelatsihy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na iza na iza hanao teny manohitra ny Zanak’olona dia hahazo famelan-keloka; fa izay manevateva ny Fanahy Masina kosa dia tsy hahazo famelan-keloka.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha entina hotsaraina eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' na eo anatrehan’ny mpitondra sy ny manampahefana ianareo, dia aza manahy ny amin’izay havalinareo na izay holazainareo; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny Fanahy Masina no hampianatra anareo eo no ho eo ihany izay tokony holazainareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ilay mpanankarena tsy misaina
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy olona anankiray tamin’ny vahoaka vory teo nanao tamin’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpampianatra ô, mba ilazao kely ny rahalahiko hifampizara ny lovanay amiko.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andriamatoa ô, iza moa no nanendry Ahy ho mpitsara ny raharahanareo na ho mpizara ny fanananareo?
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ny vahoaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitandrema! Aoka tsy ho voan’ny fangoronan-karena isan-karazany ianareo, fa ny ain’olona tsy miankina amin’ny habetsahan’ny fananany!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho azy ireo no nitantaran’i Jesoa ity fanoharana ity:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nisy mpanankarena anankiray nanan-tany nahavokatra be, '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ka velon’eritreritra nanao anakampo hoe: «Inona re no hataoko fa tsy ampy intsony ny toerana hamoriako ny vokatra?» '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia hoy indray izy: «Izao no hataoko: horavako ny sompitra ankehitriny ka sompitra lehibe kokoa no hajoroko hamoriako ny variko sy ny fananako rehetra. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Rehefa izany, dia izao no holazaiko anakampo amin’ny aiko: Ry aiko ô, manan-tahirim-pananana be tsy ho lany lanîna mandritra ny taona maro ianao; koa mialà sasatra, mihinàna, misotroa sy milibà.» '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa tsy misy afenina izay tsy haseho na takona izay tsy ho fantatra. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa hoy Andriamanitra taminy: «Olona tsy misaina ianao! Anio alina ihany, dia halàko aminao ny ainao. Ka ho an’iza ireo zavatra navosanao?»'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nofaranan’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Toy izany àry no manjo izay manangon-karena ho an’ny tenany fotsiny fa tsy mba mihary harena ao amin’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 6.20.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aoka hatoky an’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 6.25-34)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy indray i Jesoa tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izany indrindra no ilazako aminareo hoe: aza manahy ny amin’ny hanina izay tohan’ainareo, na ny amin’ny fitafiana izay ilain’ny vatanareo. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ny aina mihoatra noho ny hanina; ary ny vatana mihoatra noho ny fitafiana. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Diniho ange ny goaika: tsy mamafy na mijinja izy ireny, tsy manana trano fitahirizana na sompitra, fa Andriamanitra no mamelona azy. Tsy sarobidy lavitra noho ny vorona ve ianareo? '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Iza moa ianareo no mahay manalava kely ny andro iainany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny andro iainany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny halavàny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'na dia feno fanahiana toy inona aza? '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'koa raha ny zavatra kely tsinontsinona aza tsy efanareo, ahoana no anahianareo ny sisa rehetra. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Diniho koa ange ny fanirin’ny voninkazo: tsy miasa na mamoly izy ireny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Toy izay ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy miasa na mamoly
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dia misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy mamoly na manenona. –Salômôna... rehetra aza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 1 Mp 10.'
      marker-yv: yv-n
    - type: text
      text: '; kanefa lazaiko aminareo fa na i Salômôna teo amin’ny voninahiny rehetra aza, dia tsy tsara fitafiana toy ny iray amin’izy ireny. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tafîn’Andriamanitra toy izany ny ahitra izay eny an-tsaha anio nefa atsipy any am-patana rahampitso, ka ianareo indray ve no tsy hampitafîny, ry kely finoana? '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa aza ny fikatsahana ny hohanina sy hosotroina no hany ilofosana ary aza mitebiteby foana ianareo. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Noho izany, izay rehetra nolazainareo tao amin’ny maizina dia ho re ao amin’ny mazava; ary izay nobitsihinareo tao an’efitra mangina dia hantsoantsoina eny an-tampon-trano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hany tokony hatahorana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 10.28-31)
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ireo mpanompo sampy eo amin’izao tontolo izao dia fatra-pikatsaka ireny rehetra ireny; ianareo kosa, fantatry ny Rainareo fa ilainareo izany. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Katsaho àry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ', dia homena anareo ireny ho fanampiny!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahaiza mihary harena any an-danitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 6.19-21)
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Aza matahotra, ry andian’ondry vitsy, fa efa sitraky ny Ray homena anareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakany
    - type: text
      text: '! '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amidio ny fanananareo ka ny vola azo, anaovy asa fiantrana. Kitapom-bola tsy mety tontan’ny ela atao ho anareo, dia harena tsy mety lany any an-danitra; any tsy mba misy mpangalatra mihaodihaody na kadradraka manimba. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay misy ny harenareo no hisy ny fonareo koa!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aoka ho vonona lalandava
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Aoka ho vonona lalandava ka ny lambanareo sikino ary ny jironareo areheto. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaova toy ny mpanompo miandry izay hiverenan’ny tompony avy any amin’ny fanasana; raha vao tonga sy mandondòna izy, dia vohain’ny mpanompony miaraka amin’izay. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sambatra ireo mpanompo hitan’ny tompony miari-tory raha tonga izy. Lazaiko marina aminareo fa hisikina lamba ny tompony ka hampipetraka azy hihinana ary handroso sakafo ho azy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na misasakalina na maneno akoho no ahatongavan’ny tompony ka mahita ireo mpanompo miari-tory toy izany, dia sambatra ireo mpanompo ireo! '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no ataovy an-tsaina: raha fantatry ny tompon-trano ny ora iavian’ny mpangalatra, dia tsy havelany hotamîna ny tranony! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Izao no lazaiko aminareo sakaizako: aza matahotra ireo mahafaty ny vatana, kanefa tsy afa-manao mihoatra an’izany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianareo koa, aoka ho vonona hatrany, fa ho avy amin’ny ora tsy ampoizinareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpanompo mahatoky sy mpanompo tsy mahatoky
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 24.45-51)
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia niteny i Petera nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izahay ihany ve no ilazanao izany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' izany sa ny olona rehetra koa?'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Iza moa no mpanompo mahatoky sy mato-tsaina notendren’ny tompony ho mpandraharaha hifehy ireo mpanompony sady hanome azy ireo ny anjara sakafony ara-potoana? '
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Sambatra io mpanompo io raha tonga ny tompony ka mahatratra azy manao raharaha toy izany. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Lazaiko marina aminareo fa hotendren’ny tompony hiadidy ny fananany rehetra izy. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha tàhiny kosa io mpanompo io manao anakampo hoe: «Mbola ho ela vao tafaverina ny tompoko», ka mihetraketraka amin’ny mpanompo hafa na lahy na vavy sady manaram-po mihinana sy misotro ary mimamo, '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: dia ho tonga ilay tompony amin’ny andro tsy ampoiziny sy amin’ny ora tsy fantany; hosazîny mafy tokoa io mpanompo io
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.46 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hosazîny mafy... mpanompo io: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: horoahiny tokoa io mpanompo io.
      marker-yv: yv-n
    - type: text
      text: ary hataony miombona anjara amin’ny tsy mpino.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny mpanompo mahalala tsara ny sitrapon’ny tompony, nefa tsy mivonon-kanao ary tsy manatontosa, dia hahazo kapoka be. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay tsy mahalala kosa, nefa manao zavatra tokony hikapohana azy, dia hahazo kapoka kely. Izay nomena be no hitakiana be; ary izy nanankinana be no hadinina bebe kokoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahatonga fisarahana i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 10.34-36)
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: –Hanipy afo eto ambonin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 66.15-16.
      marker-yv: yv-n
    - type: text
      text: ' no nahatongavako, ka irîko dia irîko tokoa ny hirehetany sahady! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hasehoko anareo izay tokony hatahoranareo: matahora an’Andriamanitra Izay manam-pahefana hamarina anareo any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lohasahan’afo
    - type: text
      text: ' rehefa novonoiny ianareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 10.28.
      marker-yv: yv-n
    - type: text
      text: ; eny, hoy Aho aminareo, Izy ihany no atahory.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' tsy maintsy hirosoako, ka may erỳ Aho miandry ny hahatanterahany! '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Heverinareo moa fa tonga eto an-tany Aho mba hampihavana? Tsia, hoy Aho aminareo, fa hampifanohitra. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, manomboka izao ny olona dimy iray trano dia hifanohitra: ny telo hanohitra ny roa ary ny roa hanohitra ny telo. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hifanohitra ny mpianakavy ka ny ray hanohitra ny zanany lahy, ary ny zanaka lahy hanohitra ny rainy; ny reny hanohitra ny zanany vavy, ary ny zanaka vavy hanohitra ny reniny; ny rafozam-bavy hanohitra ny vinantovaviny, ary ny vinantovavy hanohitra ny rafozam-baviny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mi 7.6.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tokony hahay mamantatra ny andro
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 16.2-3)
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ny vahoaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha vao hitanareo miakatra avy any andrefana ny rahona, dia hoy ianareo hoe: «Ho avy ny orana», ary izany tokoa! '
  '55':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary raha mitsoka avy any atsimo ny rivotra, dia hoy ianareo hoe: «Hafana ny andro», ary izany tokoa! '
  '56':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ry mpihatsaravelatsihy, hainareo fantarina ny toetoetry ny tany aman-danitra, ka nahoana no tsy hainareo fantarina kosa izao andro diavintsika izao?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahaiza mihavana amin’izay manana ady aminao
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 5.25-26)
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana no tsy ny tenanareo ihany no mpitsara mahita izay rariny sy hitsiny? '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieny mbola miara-dalana hamonjy ny manampahefana ianao sy ilay manana ady aminao, dia ataovy izay hahafahanao aminy; fandrao entiny hanatrika ny mpitsara tokoa ianao, ka ny mpitsara hanolotra anao amin’ny mpamatotra ary ny mpamatotra hampiditra anao am-ponja. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
