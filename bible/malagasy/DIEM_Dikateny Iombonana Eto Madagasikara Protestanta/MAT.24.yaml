document_id: MAT.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jesoa ny handravana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 13.1-2; Lk 21.5-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia niala teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' i Jesoa ka lasa nandeha; fa nanatona Azy kosa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' hampizaha Azy ny rafitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary niteny i Jesoa nanao tamin’ny mpianany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hitanareo moa ireo rehetra ireo? Lazaiko marina aminareo fa tsy havela hisy vato mifanongoa eo ka tsy harodana!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza ny fanenjehana isan-karazany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 13.3-13; Lk 21.7-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nipetraka teo an-tendrombohitra Analanôliva i Jesoa; dia nanatona Azy manokana ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazao aminay izay fotoana hahatongavan’izany ary izay hamantarana ny fiavianao sy ny fiafaran’izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tandremo fandrao hisy hamitaka anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa maro no ho avy hisandoka ny anarako ary hiteny hoe: «Izaho no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '»; ary maro ny olona ho voafitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Handre ady sy filazana ady ianareo, koa fadio izay hatahotra; eny, tsy maintsy ho tonga izany, kanefa tsy mbola izany no farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hisy firenena hitsangana hamely firenena, hisy koa fanjakana hitsangana hamely fanjakana; ary hisy mosary sy horohorontany amin’ny toerana samihafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izany rehetra izany no toy ny santatry ny fanaintainam-piterahana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Amin’izany andro izany, dia hatolotry ny olona ianareo hampijalîna sy hovonoina; ary ho halan’ny firenen-drehetra ianareo, satria miandany amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Amin’izany andro izany koa, dia maro ny olona ho voatarika amin’ny ratsy ka hifampiampanga sy hifankahala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Betsaka ireo mpisandoka ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' no hijoro, ka hamitaka olona maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary dia hihanaka tokoa ny ratsy ka hihamangatsiaka ny fitiavana an’Andriamanitra ao am-pon’ny maro; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanefa izay maharitra hatramin’ny farany no ho voavonjy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary dia hatao antso avo eran’izao tontolo izao ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ' ity, mba ho vavolombelona amin’ny firenen-drehetra; izay vao ho tonga ny farany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay tebiteby lehibe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 13.13-23; Lk 21.20-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '–Ho hitanareo tafajoro ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' ilay fanimbazimbana mahatsiravina, voalazan’i Daniela '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminani
  - type: text
    text: n’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dan 9.27; 11.31; 12.11.
    marker-yv: yv-n
  - type: text
    text: '. (Aoka hahazo tsara izay mamaky!) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa amin’izany, izay any Jodea aoka handositra any an-tendrombohitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'izay any an-tampon-trano aoka tsy hidina haka izay zavatra ao an-tranony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'izay any an-tsaha, aoka tsy hiverina haka ny lambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Loza no hanjo ny bevohòka sy ny mitaiza kely amin’ireo andro ireo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mivavaha mba tsy ho amin’ny ririnina na ho amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' no handosiranareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Amin’izany mantsy, dia hisy fijaliana lehibe izay tsy mbola nisy toa azy hatramin’ny niandohan’izao tontolo izao ka mandraka ankehitriny, sady tsy hisy toa azy intsony koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 12.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha tsy efa nanapa-kevitra hanafohy ireo andro ireo Andriamanitra, dia tsy hisy olona ho voavonjy; fa noho ny olom-boafidiny, dia hohafohezin’Andriamanitra ireo andro ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Amin’izany, raha misy olona milaza aminareo hoe: «Indro atỳ ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '», na hoe: «Arỳ Izy», dia aza mino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Olona misandoka ho Mesia sy ho mpaminany manko no hijoro, ka haneho famantarana lehibe sy zava-mahagaga hamitahany na dia ny olom-boafidin’Andriamanitra aza raha azony natao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay àry, fa efa voalazako mialoha taminareo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa raha misy olona milaza aminareo hoe: «Indro any an-taniefitra ny Mesia», dia aza mankany; na hoe: «Indro ato amin’ny toera-miafina ato Izy», dia aza mino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eny, ho tahaka ny tselatra, mipoitra avy any atsinanana ka manazava hatrany andrefana, no fiavian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa na aiza na aiza misy ny faty dia any no hifamotoanan’ny voromahery.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho avy amim-boninahitra ny Zanak’olona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 13.24-27; Lk 21.25-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha vao afaka ny fijaliana amin’ireo andro ireo, dia hihamaizina ny masoandro, tsy handefa taratra intsony ny volana, hiraraka avy eny amin’ny habakabaka ny kintana ary ho voahozongozona ny herin’ny habakabaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 13.10; Ezek 32.7; J1 2.10; 3.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Amin’izay dia hiseho eny amin’ny habakabaka ny famantarana momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ; ka handon-tratra avokoa ny firenena rehetra eto an-tany ary hahita ny Zanak’olona tamy eo amin’ny rahon’ny habakabaka sady ombàn-kery sy voninahitra lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dan 7.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia hisy trompetra haneno mafy; ary hirahin’ny Zanak’olona ireo anjeliny, ka ireo no hanangona ny olom-boafidiny avy any amin’ny vazan-tany efatra, manomboka amin’ny faravodilanitra ankilany ka miafara amin’ny faravodilanitra andaniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 30.4; Za 2.10; Ne 1.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famantarana avy amin’ny hazo aviavy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 13.28-31; Lk 21.29-33)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '–Raiso ho anatra ity fanoharana avy amin’ny aviavy ity: Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny fahavaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Toy izany koa, raha vao hitanareo izany rehetra izany, dia fantaro fa efa akaiky ny Zanak’olona ary mby eo am-baravarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Efa akaiky ny Zanak’olona ary mby eo am-baravarana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: efa akaiky izany zavatra izany ary efa hitranga.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Lazaiko marina aminareo fa mbola tsy ho tapitra akory ity taranaka ity, dia ho tonga izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ho levona ny tany amana habakabaka, fa ny teniko tsy mba ho levona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay andro sy ora tsy fantatra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 13.32-37; Lk 17.26-30, 34-36)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: –Ny amin’izay andro sy ora hahatongavan’izany dia tsy misy mahalala na ny anjely any an-danitra na ny Zanaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na ny Zanaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ireo teny ireo dia tsy hita ao amin’ny stf sasantsasany.
    marker-yv: yv-n
  - type: text
    text: ', fa izy Ray irery ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Eny, tahaka ny tamin’ny andron’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Noà
  - type: text
    text: ', dia ho tahaka izany koa ny fiavian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa tamin’ireo andro nialoha ny safodrano dia nihinana sy nisotro ary nampaka-bady na nampakarina ny olona, mandra-pigadon’ny andro nidiran’i Noà tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sambofiara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 6.9–7.6.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ary tsy nanampo na inona na inona ny olona mandra-pahatongan’ny safodrano izay nandringana azy rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 7.7-24.
    marker-yv: yv-n
  - type: text
    text: '. Dia ho tahaka izany koa ny fiavian’ny Zanak’olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Amin’izany, hisy roa lahy tafaraka eny an-tsaha; ka ny iray halaina, ny iray havela; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'hisy roa vavy miara-mikoso-bary: ka ny iray halaina, ny iray havela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Koa miambena àry, fa tsy fantatrareo izay andro hiavian’ny Tomponareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Izao no ataovy ao an-tsaina: raha fantatry ny tompon-trano ny vanim-potoana hiavian’ny mpangalatra amin’ny alina, dia ho niambina izy ary tsy ho namela ny tranony hotamîna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Noho izany, aoka ho vonona hatrany koa ianareo, fa ho avy amin’ny ora tsy ampoizinareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpanompo mahatoky sy ny mpanompo tsy mahatoky
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 12.41-48)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '–Iza moa no mpanompo mahatoky sy mato-tsaina notendren’ny tompony ho mpandraharaha hifehy ireo mpanompony sady hanome azy ny anjara sakafony ara-potoana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Sambatra io mpanompo io raha tonga ny tompony ka mahita azy manao raharaha toy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Lazaiko marina aminareo fa hotendren’ny tompony hiadidy ny fananany rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Raha ho ratsy fanahy kosa io mpanompo io ka hanao anakampo hoe: «Mbola haharitra ela ny tompoko», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'ary hihetraketraka amin’ireo mpanompo namany sady hanaram-po hihinana sy hisotro miaraka amin’ny mpimamo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'dia ho tonga ilay tompony amin’ny andro tsy ampoiziny sy amin’ny ora tsy fantany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
