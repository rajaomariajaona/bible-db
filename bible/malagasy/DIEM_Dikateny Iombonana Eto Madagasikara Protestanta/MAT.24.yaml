document_id: MAT.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ambaran’i Jesoa ny handravana ny tempoly
  - type: heading
    content: (Jereo Mk 13.1-2; Lk 21.5-6)
  - type: text
    content: Dia niala teo an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Jesoa ka lasa nandeha; fa nanatona Azy kosa ny '
  - type: text
    content: mpianany
  - type: text
    content: ' hampizaha Azy ny rafitry ny '
  - type: text
    content: tempoly
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Amin’izany andro izany koa, dia maro ny olona ho voatarika amin’ny ratsy ka hifampiampanga sy hifankahala. '
  '11':
  - type: text
    content: 'Betsaka ireo mpisandoka ho '
  - type: text
    content: mpaminany
  - type: text
    content: ' no hijoro, ka hamitaka olona maro. '
  '12':
  - type: text
    content: 'Ary dia hihanaka tokoa ny ratsy ka hihamangatsiaka ny fitiavana an’Andriamanitra ao am-pon’ny maro; '
  '13':
  - type: text
    content: 'Kanefa izay maharitra hatramin’ny farany no ho voavonjy. '
  '14':
  - type: text
    content: 'Ary dia hatao antso avo eran’izao tontolo izao ity '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' ity, mba ho vavolombelona amin’ny firenen-drehetra; izay vao ho tonga ny farany.'
  - type: heading
    content: Ilay tebiteby lehibe
  - type: heading
    content: (Jereo Mk 13.13-23; Lk 21.20-24)
  '15':
  - type: text
    content: '–Ho hitanareo tafajoro ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ilay fanimbazimbana mahatsiravina, voalazan’i Daniela '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra
  - type: note
    content: Dan 9.27; 11.31; 12.11.
  - type: text
    content: '. (Aoka hahazo tsara izay mamaky!) '
  '16':
  - type: text
    content: 'Koa amin’izany, izay any Jodea aoka handositra any an-tendrombohitra; '
  '17':
  - type: text
    content: 'izay any an-tampon-trano aoka tsy hidina haka izay zavatra ao an-tranony; '
  '18':
  - type: text
    content: 'izay any an-tsaha, aoka tsy hiverina haka ny lambany. '
  '19':
  - type: text
    content: 'Loza no hanjo ny bevohòka sy ny mitaiza kely amin’ireo andro ireo! '
  '2':
  - type: text
    content: 'Ary niteny i Jesoa nanao tamin’ny mpianany hoe:'
  - type: text
    content: –Hitanareo moa ireo rehetra ireo? Lazaiko marina aminareo fa tsy havela hisy vato mifanongoa eo ka tsy harodana!
  - type: heading
    content: Loza ny fanenjehana isan-karazany
  - type: heading
    content: (Jereo Mk 13.3-13; Lk 21.7-19)
  '20':
  - type: text
    content: 'Mivavaha mba tsy ho amin’ny ririnina na ho amin’ny '
  - type: text
    content: sabata
  - type: text
    content: ' no handosiranareo. '
  '21':
  - type: text
    content: Amin’izany mantsy, dia hisy fijaliana lehibe izay tsy mbola nisy toa azy hatramin’ny niandohan’izao tontolo izao ka mandraka ankehitriny, sady tsy hisy toa azy intsony koa
  - type: note
    content: Ampit Dan 12.1.
  - type: text
    content: '. '
  '22':
  - type: text
    content: Raha tsy efa nanapa-kevitra hanafohy ireo andro ireo Andriamanitra, dia tsy hisy olona ho voavonjy; fa noho ny olom-boafidiny, dia hohafohezin’Andriamanitra ireo andro ireo.
  '23':
  - type: text
    content: 'Amin’izany, raha misy olona milaza aminareo hoe: «Indro atỳ ny '
  - type: text
    content: Mesia
  - type: text
    content: '», na hoe: «Arỳ Izy», dia aza mino. '
  '24':
  - type: text
    content: 'Olona misandoka ho Mesia sy ho mpaminany manko no hijoro, ka haneho famantarana lehibe sy zava-mahagaga hamitahany na dia ny olom-boafidin’Andriamanitra aza raha azony natao. '
  '25':
  - type: text
    content: Izay àry, fa efa voalazako mialoha taminareo izany.
  '26':
  - type: text
    content: 'Koa raha misy olona milaza aminareo hoe: «Indro any an-taniefitra ny Mesia», dia aza mankany; na hoe: «Indro ato amin’ny toera-miafina ato Izy», dia aza mino. '
  '27':
  - type: text
    content: 'Eny, ho tahaka ny tselatra, mipoitra avy any atsinanana ka manazava hatrany andrefana, no fiavian’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '. '
  '28':
  - type: text
    content: Fa na aiza na aiza misy ny faty dia any no hifamotoanan’ny voromahery.
  - type: heading
    content: Ho avy amim-boninahitra ny Zanak’olona
  - type: heading
    content: (Jereo Mk 13.24-27; Lk 21.25-28)
  '29':
  - type: text
    content: Raha vao afaka ny fijaliana amin’ireo andro ireo, dia hihamaizina ny masoandro, tsy handefa taratra intsony ny volana, hiraraka avy eny amin’ny habakabaka ny kintana ary ho voahozongozona ny herin’ny habakabaka
  - type: note
    content: Ampit Is 13.10; Ezek 32.7; J1 2.10; 3.4.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ary nipetraka teo an-tendrombohitra Analanôliva i Jesoa; dia nanatona Azy manokana ireo '
  - type: text
    content: mpianany
  - type: text
    content: ' ka nanao hoe:'
  - type: text
    content: –Lazao aminay izay fotoana hahatongavan’izany ary izay hamantarana ny fiavianao sy ny fiafaran’izao tontolo izao.
  '30':
  - type: text
    content: 'Amin’izay dia hiseho eny amin’ny habakabaka ny famantarana momba ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ; ka handon-tratra avokoa ny firenena rehetra eto an-tany ary hahita ny Zanak’olona tamy eo amin’ny rahon’ny habakabaka sady ombàn-kery sy voninahitra lehibe
  - type: note
    content: Dan 7.13.
  - type: text
    content: '. '
  '31':
  - type: text
    content: Dia hisy trompetra haneno mafy; ary hirahin’ny Zanak’olona ireo anjeliny, ka ireo no hanangona ny olom-boafidiny avy any amin’ny vazan-tany efatra, manomboka amin’ny faravodilanitra ankilany ka miafara amin’ny faravodilanitra andaniny
  - type: note
    content: Ampit Deot 30.4; Za 2.10; Ne 1.9.
  - type: text
    content: .
  - type: heading
    content: Famantarana avy amin’ny hazo aviavy
  - type: heading
    content: (Jereo Mk 13.28-31; Lk 21.29-33)
  '32':
  - type: text
    content: '–Raiso ho anatra ity fanoharana avy amin’ny aviavy ity: Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny fahavaratra. '
  '33':
  - type: text
    content: Toy izany koa, raha vao hitanareo izany rehetra izany, dia fantaro fa efa akaiky ny Zanak’olona ary mby eo am-baravarana
  - type: note
    content: 'Efa akaiky ny Zanak’olona ary mby eo am-baravarana: dkt hafa efa akaiky izany zavatra izany ary efa hitranga.'
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Lazaiko marina aminareo fa mbola tsy ho tapitra akory ity taranaka ity, dia ho tonga izany rehetra izany. '
  '35':
  - type: text
    content: Ho levona ny tany amana habakabaka, fa ny teniko tsy mba ho levona.
  - type: heading
    content: Ilay andro sy ora tsy fantatra
  - type: heading
    content: (Jereo Mk 13.32-37; Lk 17.26-30, 34-36)
  '36':
  - type: text
    content: –Ny amin’izay andro sy ora hahatongavan’izany dia tsy misy mahalala na ny anjely any an-danitra na ny Zanaka
  - type: note
    content: 'na ny Zanaka: ireo teny ireo dia tsy hita ao amin’ny stf sasantsasany.'
  - type: text
    content: ', fa izy Ray irery ihany. '
  '37':
  - type: text
    content: 'Eny, tahaka ny tamin’ny andron’i '
  - type: text
    content: Noà
  - type: text
    content: ', dia ho tahaka izany koa ny fiavian’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Fa tamin’ireo andro nialoha ny safodrano dia nihinana sy nisotro ary nampaka-bady na nampakarina ny olona, mandra-pigadon’ny andro nidiran’i Noà tao amin’ny '
  - type: text
    content: sambofiara
  - type: note
    content: Jereo Gen 6.9–7.6.
  - type: text
    content: ', '
  '39':
  - type: text
    content: ary tsy nanampo na inona na inona ny olona mandra-pahatongan’ny safodrano izay nandringana azy rehetra
  - type: note
    content: Jereo Gen 7.7-24.
  - type: text
    content: '. Dia ho tahaka izany koa ny fiavian’ny Zanak’olona. '
  '4':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Tandremo fandrao hisy hamitaka anareo. '
  '40':
  - type: text
    content: 'Amin’izany, hisy roa lahy tafaraka eny an-tsaha; ka ny iray halaina, ny iray havela; '
  '41':
  - type: text
    content: 'hisy roa vavy miara-mikoso-bary: ka ny iray halaina, ny iray havela. '
  '42':
  - type: text
    content: 'Koa miambena àry, fa tsy fantatrareo izay andro hiavian’ny Tomponareo. '
  '43':
  - type: text
    content: 'Izao no ataovy ao an-tsaina: raha fantatry ny tompon-trano ny vanim-potoana hiavian’ny mpangalatra amin’ny alina, dia ho niambina izy ary tsy ho namela ny tranony hotamîna. '
  '44':
  - type: text
    content: 'Noho izany, aoka ho vonona hatrany koa ianareo, fa ho avy amin’ny ora tsy ampoizinareo ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: .
  - type: heading
    content: Ny mpanompo mahatoky sy ny mpanompo tsy mahatoky
  - type: heading
    content: (Jereo Lk 12.41-48)
  '45':
  - type: text
    content: '–Iza moa no mpanompo mahatoky sy mato-tsaina notendren’ny tompony ho mpandraharaha hifehy ireo mpanompony sady hanome azy ny anjara sakafony ara-potoana? '
  '46':
  - type: text
    content: 'Sambatra io mpanompo io raha tonga ny tompony ka mahita azy manao raharaha toy izany. '
  '47':
  - type: text
    content: 'Lazaiko marina aminareo fa hotendren’ny tompony hiadidy ny fananany rehetra izy. '
  '48':
  - type: text
    content: 'Raha ho ratsy fanahy kosa io mpanompo io ka hanao anakampo hoe: «Mbola haharitra ela ny tompoko», '
  '49':
  - type: text
    content: 'ary hihetraketraka amin’ireo mpanompo namany sady hanaram-po hihinana sy hisotro miaraka amin’ny mpimamo, '
  '5':
  - type: text
    content: 'Fa maro no ho avy hisandoka ny anarako ary hiteny hoe: «Izaho no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '»; ary maro ny olona ho voafitany. '
  '50':
  - type: text
    content: 'dia ho tonga ilay tompony amin’ny andro tsy ampoiziny sy amin’ny ora tsy fantany. '
  '51':
  - type: text
    content: Hosazîny mafy tokoa io mpanompo io
  - type: note
    content: 'Hosazîny mafy tokoa io mpanompo io: dkt hafa horoahiny mihitsy io mpanompo io.'
  - type: text
    content: ary hataony miombona anjara amin’ny mpihatsaravelatsihy; any izy no hitomany sy hikitro-nify.
  '6':
  - type: text
    content: 'Handre ady sy filazana ady ianareo, koa fadio izay hatahotra; eny, tsy maintsy ho tonga izany, kanefa tsy mbola izany no farany. '
  '7':
  - type: text
    content: 'Fa hisy firenena hitsangana hamely firenena, hisy koa fanjakana hitsangana hamely fanjakana; ary hisy mosary sy horohorontany amin’ny toerana samihafa. '
  '8':
  - type: text
    content: Izany rehetra izany no toy ny santatry ny fanaintainam-piterahana.
  '9':
  - type: text
    content: 'Amin’izany andro izany, dia hatolotry ny olona ianareo hampijalîna sy hovonoina; ary ho halan’ny firenen-drehetra ianareo, satria miandany amiko. '
