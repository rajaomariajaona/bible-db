  - type: text
    text: ' 1 Mpanjaka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dia mitantara ny fanjakan’i Salômôna zanakalahin’i Davida sy ireo mpandimby azy voalohany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rehefa antitra be tsy nahatondra ara-dalàna intsony ny fanjakana i Davida, dia nioko izay handimbiasana azy ny anankiroa tamin’ireo zanany lahy (1.1–2.12). Tamin’ny farany anefa dia i Salômôna ihany no tonga mpanjaka. Ny fanaovana ny Tempoly sy ny lapan’andriamanjaka no tena nanamarika ny fanjakany. Nampalahelo anefa izy fa fivadihana tamin’Andriamanitra sy fanompoan-tsampy (2.13–11.43) no niafaran’ny fiainany. Noho izany dia navelan’Andriamanitra hivaky ny fanjakana, fa ireo foko tao Avaratra dia tsy nety hankatò ny fahefàn’ny zanakalahin’i Salômôna fa nanaraka mpanjaka hafa (12.1–14.20). Nanomboka teo no nisian’ny fanjakana roa nifanila, dia ny fanjakana Joda sy
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: '; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: naharitra taonjato roa teo ho eo izany, ka indraindray niara-dia ireo, indraindray kosa nifandrafy (14.21–22.53).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ity boky ity dia manindry mafy ny tsy maintsy hankatoavan’ny mpanjaka an’Andriamanitra; izany ihany no loharanom-pahasambarana ho an’ny firenena, fa ny fanompoan-tsampy sy ny tsy fanekena an’Andriamanitra kosa dia tsy maintsy mitera-doza.
  - type: text
