  - type: text
    content: maro no nijoro tamin’ny fotoana samihafa nampahatsiahy ny mpanjaka izany zavatra takîn’Andriamanitra izany; ny malaza indrindra tamin’ireny dia i Elià (toko 17–19; 21).
