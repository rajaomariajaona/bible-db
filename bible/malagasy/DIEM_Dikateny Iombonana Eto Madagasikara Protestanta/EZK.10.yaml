document_id: EZK.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Niseho tamin’i Ezekiela indray ny Tompo
  - type: text
    content: 'Ary nijery aho ka indro teo amin’ny habakabaka izay tambonin’ny lohan’ny '
  - type: text
    content: kerobima
  - type: text
    content: ' fa nisy tahaka ny vato safira, ka mitovitovy amin’ny sezafiandrianana ny endriny; ary niseho teo ambonin’ireo kerobima ny Tompo'
  - type: note
    content: Jereo 1.26.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Mitovy bika izy efatra ary toa samy voarafitra hifampidipiditra. '
  '11':
  - type: text
    content: 'Afaka mandroso ho amin’ny lafiny efatra izy nefa tsy mila avily. Mizotra ho amin’izay itodihan’ny kerobima izy ary mandroso tsy mila avily. '
  '12':
  - type: text
    content: 'Ny tenan’ny kerobima manontolo, indrindra ny lamosiny sy ny tanany ary ny elany, dia rakotra maso manjelanjelatra tahaka ireo kodiarana efatra. '
  '13':
  - type: text
    content: 'Ary ireo kodiarana efatra dia reko nomena anarana hoe «tadio». '
  '14':
  - type: text
    content: 'Samy nanana endrika efatra ny kerobima tsirairay: ny voalohany dia endrika kerobima, ny faharoa dia endrika olona, ny fahatelo dia endrika liona, ary ny fahefatra dia endrika voromahery. '
  '15':
  - type: text
    content: Niakatra ho eny amin’ny habakabaka ireo kerobima, izay tsy hafa fa ireo zava-miaina izay hitako teo amoron’ny ony Kebara ihany
  - type: note
    content: Jereo 1.4-28.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Rehefa mandroso izy, dia mandroso miaraka aminy koa ireo kodiarana; rehefa mikopaka elatra hiakatra hiala amin’ny tany izy, dia tsy misaraka aminy koa ireo kodiarana. '
  '17':
  - type: text
    content: Raha mijanona ireo, dia mijanona koa ny kodiarana; raha manidina miakatra ho eny amin’ny habakabaka ireo, dia mba miakatra koa ireo, satria ny fanahin’ny zava-miaina no manetsika ireo kodiarana.
  - type: heading
    content: Miala ny tempoly ny voninahitry ny Tompo
  '18':
  - type: text
    content: 'Niainga avy teo an-tokonam-baravaran’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' ny voninahitry ny TOMPO, ka nipetraka teo ambony '
  - type: text
    content: kerobima
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Dia nikopaka elatra handeha ireo kerobima ka tsinjoko niakatra niala avy amin’ny tany, ary niara-niainga taminy koa ireo kodiarana. Nijanona teo anilan’ny vavahady atsinanana amin’ny tranon’ny TOMPO izy ka namirapiratra teo amboniny ny voninahitr’Andriamanitr’i Israely. '
  '2':
  - type: text
    content: 'Ary hoy ny Tompo tamin’ilay lehilahy miakanjo rongony: «Midira ao anatin’ny tadio anelanelan’ny kodiarana eo ambany kerobima. Fenoy vainafo avy eo anelanelan’ny kerobima ny tananao, ka afafazo amin’ny tanàna izany'
  - type: note
    content: 'tadio: jereo 1.13. –afafazo amin’ny tanàna izany: hamafisin’ny rijan-teny fa toy izany no handoran’ny Babilônianina an’i Jerosalema araka izay nokasain’Andriamanitra (2 Mp 25.8-9).'
  - type: text
    content: .»
  - type: text
    content: Dia hitako nandeha naka ny vainafo ralehilahy.
  '20':
  - type: text
    content: 'Teo amoron’ny ony Kebara no efa nahitako ireo zava-miaina ireo nijoro teo ambanin’Andriamanitr’i Israely, ka fantatro ankehitriny fa kerobima ireo. '
  '21':
  - type: text
    content: 'Samy nanana endrika efatra sy elatra efatra ary karazana tanan’olona teo ambany elany avy ny tsirairay. '
  '22':
  - type: text
    content: Nitovy tanteraka tamin’ny endrik’ireo zava-miaina teo amoron’ny ony Kebara ny endriny. Samy nandroso mahitsy tamin’izay tandrify azy avy ny kerobima.
  '3':
  - type: text
    content: 'Fa raha mbola nankao izy, dia nijanona teo amin’ny ilany ankavanan’ny tempoly ireo kerobima, ary feno raho-matevina ny kianja anatiny. '
  '4':
  - type: text
    content: 'Niakatra avy eo ambonin’ny kerobima hankeny amin’ny tokonam-baravaran’ny tempoly ny voninahitry ny TOMPO. Koa nanjary feno raho-matevina ny tempoly; ary ny kianja kosa dia namirapiratry ny voninahitry ny TOMPO. '
  '5':
  - type: text
    content: 'Ary heno hatrany amin’ny kianja ivelany ny fikopakopaky ny elatry ny kerobima, tahaka ny feon’Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: ' raha miteny'
  - type: note
    content: Jereo 1.24 sy nta.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Nijoro teo anilan’ny kodiarana iray ilay lehilahy miakanjo rongony, rehefa avy naka afo teo anelanelan’ny kodiarana teo afovoan’ny kerobima araka ny baikon’Andriamanitra. '
  '7':
  - type: text
    content: Nanatsotra ny tanany ho eo amin’ny afo izay teo anilany ny kerobima iray ka naka vainafo tao ary namenoany ny tanan-droan’ilay lehilahy. Noraisin-dralehilahy kosa izany, dia nivoaka ny tempoly izy.
  '8':
  - type: text
    content: 'Ary nisy toa tanan’olona roa niseho teo ambany elatry ny kerobima. '
  '9':
  - type: text
    content: 'Hitako koa fa nisy kodiarana efatra, ka kodiarana iray avy no teo anilan’ny kerobima. Ireo kodiarana ireo dia nanjelanjelatra tahaka ny vatosoa krizôlita. '
