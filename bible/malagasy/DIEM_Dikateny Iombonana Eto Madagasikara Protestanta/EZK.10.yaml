document_id: EZK.10,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niseho tamin’i Ezekiela indray ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nijery aho ka indro teo amin’ny habakabaka izay tambonin’ny lohan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' fa nisy tahaka ny vato safira, ka mitovitovy amin’ny sezafiandrianana ny endriny; ary niseho teo ambonin’ireo kerobima ny Tompo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.26.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mitovy bika izy efatra ary toa samy voarafitra hifampidipiditra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Afaka mandroso ho amin’ny lafiny efatra izy nefa tsy mila avily. Mizotra ho amin’izay itodihan’ny kerobima izy ary mandroso tsy mila avily. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny tenan’ny kerobima manontolo, indrindra ny lamosiny sy ny tanany ary ny elany, dia rakotra maso manjelanjelatra tahaka ireo kodiarana efatra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ireo kodiarana efatra dia reko nomena anarana hoe «tadio». '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Samy nanana endrika efatra ny kerobima tsirairay: ny voalohany dia endrika kerobima, ny faharoa dia endrika olona, ny fahatelo dia endrika liona, ary ny fahefatra dia endrika voromahery. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Niakatra ho eny amin’ny habakabaka ireo kerobima, izay tsy hafa fa ireo zava-miaina izay hitako teo amoron’ny ony Kebara ihany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.4-28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rehefa mandroso izy, dia mandroso miaraka aminy koa ireo kodiarana; rehefa mikopaka elatra hiakatra hiala amin’ny tany izy, dia tsy misaraka aminy koa ireo kodiarana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Raha mijanona ireo, dia mijanona koa ny kodiarana; raha manidina miakatra ho eny amin’ny habakabaka ireo, dia mba miakatra koa ireo, satria ny fanahin’ny zava-miaina no manetsika ireo kodiarana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miala ny tempoly ny voninahitry ny Tompo
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Niainga avy teo an-tokonam-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ny voninahitry ny TOMPO, ka nipetraka teo ambony '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nikopaka elatra handeha ireo kerobima ka tsinjoko niakatra niala avy amin’ny tany, ary niara-niainga taminy koa ireo kodiarana. Nijanona teo anilan’ny vavahady atsinanana amin’ny tranon’ny TOMPO izy ka namirapiratra teo amboniny ny voninahitr’Andriamanitr’i Israely. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hoy ny Tompo tamin’ilay lehilahy miakanjo rongony: «Midira ao anatin’ny tadio anelanelan’ny kodiarana eo ambany kerobima. Fenoy vainafo avy eo anelanelan’ny kerobima ny tananao, ka afafazo amin’ny tanàna izany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tadio: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1.13. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'afafazo amin’ny tanàna izany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' hamafisin’ny rijan-teny fa toy izany no handoran’ny Babilônianina an’i Jerosalema araka izay nokasain’Andriamanitra (2 Mp 25.8-9).'
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hitako nandeha naka ny vainafo ralehilahy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Teo amoron’ny ony Kebara no efa nahitako ireo zava-miaina ireo nijoro teo ambanin’Andriamanitr’i Israely, ka fantatro ankehitriny fa kerobima ireo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Samy nanana endrika efatra sy elatra efatra ary karazana tanan’olona teo ambany elany avy ny tsirairay. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nitovy tanteraka tamin’ny endrik’ireo zava-miaina teo amoron’ny ony Kebara ny endriny. Samy nandroso mahitsy tamin’izay tandrify azy avy ny kerobima.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa raha mbola nankao izy, dia nijanona teo amin’ny ilany ankavanan’ny tempoly ireo kerobima, ary feno raho-matevina ny kianja anatiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Niakatra avy eo ambonin’ny kerobima hankeny amin’ny tokonam-baravaran’ny tempoly ny voninahitry ny TOMPO. Koa nanjary feno raho-matevina ny tempoly; ary ny kianja kosa dia namirapiratry ny voninahitry ny TOMPO. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary heno hatrany amin’ny kianja ivelany ny fikopakopaky ny elatry ny kerobima, tahaka ny feon’Andriamanitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsitoha
    - type: text
      text: ' raha miteny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.24 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nijoro teo anilan’ny kodiarana iray ilay lehilahy miakanjo rongony, rehefa avy naka afo teo anelanelan’ny kodiarana teo afovoan’ny kerobima araka ny baikon’Andriamanitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nanatsotra ny tanany ho eo amin’ny afo izay teo anilany ny kerobima iray ka naka vainafo tao ary namenoany ny tanan-droan’ilay lehilahy. Noraisin-dralehilahy kosa izany, dia nivoaka ny tempoly izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nisy toa tanan’olona roa niseho teo ambany elatry ny kerobima. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hitako koa fa nisy kodiarana efatra, ka kodiarana iray avy no teo anilan’ny kerobima. Ireo kodiarana ireo dia nanjelanjelatra tahaka ny vatosoa krizôlita. '
