document_id: MAT.26,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fikasana hamono an’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 14.1-2; Lk 22.1-2; Jôh 11.45-53)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vitan’i Jesoa avokoa ireo fampianarana ireo, dia izao no teniny tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsikaritr’i Jesoa izany ka hoy Izy tamin’ny mpianany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana no anaovanareo izay mampalahelo an-dravehivavy? Eny, asa soa iny nataony tamiko iny. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ny mahantra dia misy eto aminareo mandrakariva; fa Izaho kosa tsy mba eto aminareo mandrakariva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Deot 15.11.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Naidin’ity vehivavy ity tamin’ny tenako iny ilomanitra iny, ary mba hamboarany Ahy halevina no nanaovany an’izany dieny mialoha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 14.8. sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Lazaiko marina aminareo fa na aiza na aiza eran’izao tontolo izao hanambaràna ity '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' ity dia holazaina koa izao nataon’ity vehivavy ity izao mba ho fahatsiarovana azy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitetika hanolotra an’i Jesoa i Jodasy Iskariôta
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 14.10-11; Lk 22.3-6)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay ny anankiray tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' 12 lahy, ilay atao hoe Jodasy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Iskariôta
    - type: text
      text: ', dia nankany amin’ny lohandoha-mpisorona '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Homenareo hoatrinona aho hanolorako anareo an’i Jesoa?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanisa sekela volafotsy telopolo homena an’i Jodasy ry zareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Za 11.12; Eks 21.32. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sekela:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' vola mitetina denàry efatra.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanomboka hatreo no nitadiavan’i Jodasy izay fotoana tsara hanolorany an’i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny sakafo Paska iarahan’i Jesoa amin’ny mpianany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 14.12-21; Lk 22.7-14, 21-23; Jôh 13.21-30)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro voalohany natao hihinanana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: azima
    - type: text
      text: ', dia nanatona an’i Jesoa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' hanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aiza no tianao hanomananay ho anao ny sakafo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: '?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana mankany an-tanàna ao amin-dranona ka lazao aminy hoe: «Izao no tenin’ny Mpampianatra: Efa tonga ny fotoanandroko; ka ato aminao no hanaovako ny sakafo Paska miaraka amin’ny mpianatro.»'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanao araka izany nasain’i Jesoa nataony izany ireo mpianatra, ka nanomana ny sakafo Paska.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Fantatrareo fa indroa andro sisa tsy hahatongavan’ny fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 12.1-27.
      marker-yv: yv-n
    - type: text
      text: '; ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' dia hatolotra hohomboana amin’ny hazofijaliana.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hariva ny andro, dia nipetraka hihinana i Jesoa mbamin’ny 12 lahy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha teo am-pisakafoana izy rehetra, dia hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazaiko marina aminareo fa hanolotra Ahy ny anankiray aminareo!
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalahelo mafy ireto mpianatra, ka samy niteny tamin’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy izaho manko izany, Tompoko!
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ilay niara-nanatsoboka mofo tamiko tao anaty lovia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 14.20 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', izy no hanolotra Ahy. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' dia efa akaikin’ny ho faty, araka ny voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' momba Azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 22.2-19; Is 53.
      marker-yv: yv-n
    - type: text
      text: ', kanefa mampalahelo ilay olona hanolotra ny Zanak’olona! Tsara raha tsy ary izany olona izany!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mba niteny koa i Jodasy, ilay efa hanolotra an’i Jesoa, ary nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy izaho izany, ry Mpampianatra!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Anao izany teny izany!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Fanasan’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 14.22-26; Lk 22.15-20; 1 Kôr 11.13-25)
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola teo am-pisakafoana ry i Jesoa sy ny mpianany, dia nandray mofo i Jesoa; ary nisaorany an’Andriamanitra izany, dia notapatapahiny sy nomeny ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiso ary hano fa ny tenako ity.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo nandray '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kalisy
    - type: text
      text: ' i Jesoa; ary nisaorany an’Andriamanitra izany, dia nomeny ny mpianany ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Isotroinareo rehetra '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa ny rako ity, dia ilay ra anorenan’Andriamanitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 24.8; Jer 31.31-34.
      marker-yv: yv-n
    - type: text
      text: ' sady alatsaka ho an’ny besinimaro ho famelan-keloka. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Lazaiko aminareo fa tsy hisotro divay intsony aho mandra-pahatongan’ilay andro hisotroako ny divay vaovao miaraka aminareo any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakan’ny Raiko
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay ireo lohandoha-mpisorona sy ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’ny vahoaka jiosy dia nivory tao amin’ny lapan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorombe
    - type: text
      text: ' atao hoe Kaiafa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa avy nihira ny salamo fiderana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny salamo fiderana, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe ny Sal 113–118.
      marker-yv: yv-n
    - type: text
      text: ' i Jesoa mbamin’ny mpianany, dia lasa nankany amin’ny tendrombohitra Analanôliva.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa ny handavan’i Petera Azy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 14.27-31; Lk 22.31-34; Jôh 13.36-38)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia hoy i Jesoa tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Anio alina dia handao Ahy avokoa ianareo, satria izao no voalazan’ny Soratra Masina: «Hasiako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ', dia hiparitaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ondry
    - type: text
      text: ' andrasana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Za 13.7.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa rehefa tafatsangana velona Aho, dia hialoha anareo any Galilea.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny i Petera ka nanao tamin’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na dia handao Anao avokoa aza ny olona rehetra, izaho kosa tsy mba handao Anao na oviana na oviana.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa tamin’i Petera:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazaiko marina aminao fa anio alina alohan’ny maneno akoho, dia handà Ahy intelo ianao.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary novalian’i Petera hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na dia hovonoina miaraka aminao aza aho, dia tsy handà Anao na oviana na oviana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia samy nilaza toy izany koa ny mpianatra rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavak’i Jesoa tao Getsemane
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 14.32-42; Lk 22.39-46)
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay i Jesoa mbamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' dia tonga tao amin’ny saha anankiray atao hoe Getsemane'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Getsemane: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anaran-tany araka ny teny aramianina, izay midika hoe Ampanerenôliva na Ampamiazanôliva (hahazoana menaka).
      marker-yv: yv-n
    - type: text
      text: '; ka hoy i Jesoa tamin’ny mpianany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mipetraha eto ianareo, fa mbola hankeroa hivavaka Aho!
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nentin’i Jesoa niaraka taminy kosa i Petera mbamin’izy roa lahy zanak’i Zebedeo. Dia nanomboka nozoim-pahoriana sy feno tebiteby fatratra i Jesoa, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary dia niteny tamin’izy telo lahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ory dia ory ny fanahiko, ka hila hahafaty Ahy. Mijanòna eto ianareo ary miaraha miari-tory amiko!
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandroso kely i Jesoa, ary niankohoka tamin’ny tany ka nivavaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiko ô, raha azo atao, esory lavitra Ahy izao fijaliana izao; kanefa tsy hoe araka izay sitrapoko, fa araka izay sitraponao!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niara-nioko izy rehetra hisambotra an’i Jesoa am-pitaka sy hamono Azy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niverina nankeo amin’ny mpianany telo lahy i Jesoa ary nahita azy natory; ka hoy Izy tamin’i Petera:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hay tsy nahari-tory miaraka amiko adiny iray akory ianareo? '
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Miareta tory ary mivavaha mba tsy ho azon’ny fakampanahy. Marisika ihany ny fanahin’ny olona, fa ny nofo no malemy!
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihataka fanindroany i Jesoa ary nivavaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiko ô, raha tsy azo esorina izao fijaliana izao fa tsy maintsy hiaretako, dia aoka ny sitraponao no hatao!
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony niverina nankeo amin’izy telo lahy indray i Jesoa, dia mbola nahita azy natory; fa efa navesatra ny masony. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandao azy telo lahy i Jesoa ary nihataka indray; dia nivavaka fanintelony ka ny teniny teo ihany no nataony. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niverina Izy nankeo amin’ny mpianany telo lahy, ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mbola matory sy miala sasatra ihany ve ianareo? Indro efa akaiky ny fotoanandro, ary efa hatolotra eo am-pelatanan’ny mpanota ny Zanak’olona! '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mitsangàna, andao isika handeha! Indro efa akaiky ilay hanolotra Ahy!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voasambotra i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 14.43-50; Lk 22.47-53; Jôh 18.3-12)
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola niteny i Jesoa, dia indro tonga i Jodasy, anankiray amin’ny 12 lahy; ary olona maro nirongo sabatra sy kibay, irak’ireo lohandoha-mpisorona sy ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’ny vahoaka jiosy, no tafaraka taminy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay hanolotra an’i Jesoa dia efa nanome famantarana azy ireo toy izao: «Izay horohako no Izy, ka sambory.» '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
