  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nipetraka teo ivelany tao an-tokotany i Petera. Dia nisy vehivavy mpiasa anankiray nanatona an’i Petera ka niteny taminy hoe:'
