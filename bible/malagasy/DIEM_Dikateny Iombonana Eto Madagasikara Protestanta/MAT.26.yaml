document_id: MAT.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fikasana hamono an’i Jesoa
  - type: heading
    content: (Jereo Mk 14.1-2; Lk 22.1-2; Jôh 11.45-53)
  - type: text
    content: 'Rehefa vitan’i Jesoa avokoa ireo fampianarana ireo, dia izao no teniny tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  '10':
  - type: text
    content: 'Tsikaritr’i Jesoa izany ka hoy Izy tamin’ny mpianany:'
  - type: text
    content: '–Nahoana no anaovanareo izay mampalahelo an-dravehivavy? Eny, asa soa iny nataony tamiko iny. '
  '11':
  - type: text
    content: Ny mahantra dia misy eto aminareo mandrakariva; fa Izaho kosa tsy mba eto aminareo mandrakariva
  - type: note
    content: Ampit Deot 15.11.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Naidin’ity vehivavy ity tamin’ny tenako iny ilomanitra iny, ary mba hamboarany Ahy halevina no nanaovany an’izany dieny mialoha
  - type: note
    content: Jereo Mk 14.8. sy nta.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Lazaiko marina aminareo fa na aiza na aiza eran’izao tontolo izao hanambaràna ity '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' ity dia holazaina koa izao nataon’ity vehivavy ity izao mba ho fahatsiarovana azy.'
  - type: heading
    content: Mitetika hanolotra an’i Jesoa i Jodasy Iskariôta
  - type: heading
    content: (Jereo Mk 14.10-11; Lk 22.3-6)
  '14':
  - type: text
    content: 'Tamin’izay ny anankiray tamin’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' 12 lahy, ilay atao hoe Jodasy '
  - type: text
    content: Iskariôta
  - type: text
    content: ', dia nankany amin’ny lohandoha-mpisorona '
  '15':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: –Homenareo hoatrinona aho hanolorako anareo an’i Jesoa?
  - type: text
    content: Dia nanisa sekela volafotsy telopolo homena an’i Jodasy ry zareo
  - type: note
    content: 'Ampit Za 11.12; Eks 21.32. –Sekela: vola mitetina denàry efatra.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Ary nanomboka hatreo no nitadiavan’i Jodasy izay fotoana tsara hanolorany an’i Jesoa.
  - type: heading
    content: Ny sakafo Paska iarahan’i Jesoa amin’ny mpianany
  - type: heading
    content: (Jereo Mk 14.12-21; Lk 22.7-14, 21-23; Jôh 13.21-30)
  '17':
  - type: text
    content: 'Tamin’ny andro voalohany natao hihinanana ny '
  - type: text
    content: azima
  - type: text
    content: ', dia nanatona an’i Jesoa ny '
  - type: text
    content: mpianany
  - type: text
    content: ' hanontany Azy hoe:'
  - type: text
    content: '–Aiza no tianao hanomananay ho anao ny sakafo '
  - type: text
    content: Paska
  - type: text
    content: '?'
  '18':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Mandehana mankany an-tanàna ao amin-dranona ka lazao aminy hoe: «Izao no tenin’ny Mpampianatra: Efa tonga ny fotoanandroko; ka ato aminao no hanaovako ny sakafo Paska miaraka amin’ny mpianatro.»'
  '19':
  - type: text
    content: Dia nanao araka izany nasain’i Jesoa nataony izany ireo mpianatra, ka nanomana ny sakafo Paska.
  '2':
  - type: text
    content: '–Fantatrareo fa indroa andro sisa tsy hahatongavan’ny fankalazana ny '
  - type: text
    content: Paska
  - type: note
    content: Jereo Eks 12.1-27.
  - type: text
    content: '; ary ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' dia hatolotra hohomboana amin’ny hazofijaliana.'
  '20':
  - type: text
    content: 'Nony hariva ny andro, dia nipetraka hihinana i Jesoa mbamin’ny 12 lahy. '
  '21':
  - type: text
    content: 'Raha teo am-pisakafoana izy rehetra, dia hoy i Jesoa:'
  - type: text
    content: –Lazaiko marina aminareo fa hanolotra Ahy ny anankiray aminareo!
  '22':
  - type: text
    content: 'Nalahelo mafy ireto mpianatra, ka samy niteny tamin’i Jesoa hoe:'
  - type: text
    content: –Tsy izaho manko izany, Tompoko!
  '23':
  - type: text
    content: 'Fa hoy i Jesoa:'
  - type: text
    content: –Ilay niara-nanatsoboka mofo tamiko tao anaty lovia
  - type: note
    content: Jereo Mk 14.20 sy nta.
  - type: text
    content: ', izy no hanolotra Ahy. '
  '24':
  - type: text
    content: 'Ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' dia efa akaikin’ny ho faty, araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' momba Azy'
  - type: note
    content: Jereo Sal 22.2-19; Is 53.
  - type: text
    content: ', kanefa mampalahelo ilay olona hanolotra ny Zanak’olona! Tsara raha tsy ary izany olona izany!'
  '25':
  - type: text
    content: 'Dia mba niteny koa i Jodasy, ilay efa hanolotra an’i Jesoa, ary nanao hoe:'
  - type: text
    content: –Tsy izaho izany, ry Mpampianatra!
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Anao izany teny izany!
  - type: heading
    content: Ny Fanasan’ny Tompo
  - type: heading
    content: (Jereo Mk 14.22-26; Lk 22.15-20; 1 Kôr 11.13-25)
  '26':
  - type: text
    content: 'Raha mbola teo am-pisakafoana ry i Jesoa sy ny mpianany, dia nandray mofo i Jesoa; ary nisaorany an’Andriamanitra izany, dia notapatapahiny sy nomeny ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ka nataony hoe:'
  - type: text
    content: –Raiso ary hano fa ny tenako ity.
  '27':
  - type: text
    content: 'Avy eo nandray '
  - type: text
    content: kalisy
  - type: text
    content: ' i Jesoa; ary nisaorany an’Andriamanitra izany, dia nomeny ny mpianany ka nataony hoe:'
  - type: text
    content: '–Isotroinareo rehetra '
  '28':
  - type: text
    content: 'fa ny rako ity, dia ilay ra anorenan’Andriamanitra ny '
  - type: text
    content: fanekempihavanany
  - type: note
    content: Ampit Eks 24.8; Jer 31.31-34.
  - type: text
    content: ' sady alatsaka ho an’ny besinimaro ho famelan-keloka. '
  '29':
  - type: text
    content: 'Lazaiko aminareo fa tsy hisotro divay intsony aho mandra-pahatongan’ilay andro hisotroako ny divay vaovao miaraka aminareo any amin’ny '
  - type: text
    content: Fanjakan’ny Raiko
  - type: text
    content: .
  '3':
  - type: text
    content: 'Tamin’izay ireo lohandoha-mpisorona sy ireo '
  - type: text
    content: loholon
  - type: text
    content: '’ny vahoaka jiosy dia nivory tao amin’ny lapan’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' atao hoe Kaiafa. '
  '30':
  - type: text
    content: Ary rehefa avy nihira ny salamo fiderana
  - type: note
    content: ny salamo fiderana, izany hoe ny Sal 113–118.
  - type: text
    content: ' i Jesoa mbamin’ny mpianany, dia lasa nankany amin’ny tendrombohitra Analanôliva.'
  - type: heading
    content: Ambaran’i Jesoa ny handavan’i Petera Azy
  - type: heading
    content: (Jereo Mk 14.27-31; Lk 22.31-34; Jôh 13.36-38)
  '31':
  - type: text
    content: 'Tamin’izay dia hoy i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: '–Anio alina dia handao Ahy avokoa ianareo, satria izao no voalazan’ny Soratra Masina: «Hasiako ny '
  - type: text
    content: mpiandry
  - type: text
    content: ', dia hiparitaka ny '
  - type: text
    content: ondry
  - type: text
    content: ' andrasana'
  - type: note
    content: Za 13.7.
  - type: text
    content: '.» '
  '32':
  - type: text
    content: Fa rehefa tafatsangana velona Aho, dia hialoha anareo any Galilea.
  '33':
  - type: text
    content: 'Dia niteny i Petera ka nanao tamin’i Jesoa hoe:'
  - type: text
    content: –Na dia handao Anao avokoa aza ny olona rehetra, izaho kosa tsy mba handao Anao na oviana na oviana.
  '34':
  - type: text
    content: 'Fa hoy i Jesoa tamin’i Petera:'
  - type: text
    content: –Lazaiko marina aminao fa anio alina alohan’ny maneno akoho, dia handà Ahy intelo ianao.
  '35':
  - type: text
    content: 'Ary novalian’i Petera hoe:'
  - type: text
    content: –Na dia hovonoina miaraka aminao aza aho, dia tsy handà Anao na oviana na oviana.
  - type: text
    content: Ary dia samy nilaza toy izany koa ny mpianatra rehetra.
  - type: heading
    content: Vavak’i Jesoa tao Getsemane
  - type: heading
    content: (Jereo Mk 14.32-42; Lk 22.39-46)
  '36':
  - type: text
    content: 'Tamin’izay i Jesoa mbamin’ireo '
  - type: text
    content: mpianany
  - type: text
    content: ' dia tonga tao amin’ny saha anankiray atao hoe Getsemane'
  - type: note
    content: 'Getsemane: anaran-tany araka ny teny aramianina, izay midika hoe Ampanerenôliva na Ampamiazanôliva (hahazoana menaka).'
  - type: text
    content: '; ka hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: –Mipetraha eto ianareo, fa mbola hankeroa hivavaka Aho!
  '37':
  - type: text
    content: 'Nentin’i Jesoa niaraka taminy kosa i Petera mbamin’izy roa lahy zanak’i Zebedeo. Dia nanomboka nozoim-pahoriana sy feno tebiteby fatratra i Jesoa, '
  '38':
  - type: text
    content: 'ary dia niteny tamin’izy telo lahy hoe:'
  - type: text
    content: –Ory dia ory ny fanahiko, ka hila hahafaty Ahy. Mijanòna eto ianareo ary miaraha miari-tory amiko!
  '39':
  - type: text
    content: 'Dia nandroso kely i Jesoa, ary niankohoka tamin’ny tany ka nivavaka hoe:'
  - type: text
    content: –Raiko ô, raha azo atao, esory lavitra Ahy izao fijaliana izao; kanefa tsy hoe araka izay sitrapoko, fa araka izay sitraponao!
  '4':
  - type: text
    content: 'Ary niara-nioko izy rehetra hisambotra an’i Jesoa am-pitaka sy hamono Azy. '
  '40':
  - type: text
    content: 'Dia niverina nankeo amin’ny mpianany telo lahy i Jesoa ary nahita azy natory; ka hoy Izy tamin’i Petera:'
  - type: text
    content: '–Hay tsy nahari-tory miaraka amiko adiny iray akory ianareo? '
  '41':
  - type: text
    content: Miareta tory ary mivavaha mba tsy ho azon’ny fakampanahy. Marisika ihany ny fanahin’ny olona, fa ny nofo no malemy!
  '42':
  - type: text
    content: 'Dia nihataka fanindroany i Jesoa ary nivavaka hoe:'
  - type: text
    content: –Raiko ô, raha tsy azo esorina izao fijaliana izao fa tsy maintsy hiaretako, dia aoka ny sitraponao no hatao!
  '43':
  - type: text
    content: 'Nony niverina nankeo amin’izy telo lahy indray i Jesoa, dia mbola nahita azy natory; fa efa navesatra ny masony. '
  '44':
  - type: text
    content: 'Dia nandao azy telo lahy i Jesoa ary nihataka indray; dia nivavaka fanintelony ka ny teniny teo ihany no nataony. '
  '45':
  - type: text
    content: 'Ary niverina Izy nankeo amin’ny mpianany telo lahy, ka nanao taminy hoe:'
  - type: text
    content: '–Mbola matory sy miala sasatra ihany ve ianareo? Indro efa akaiky ny fotoanandro, ary efa hatolotra eo am-pelatanan’ny mpanota ny Zanak’olona! '
  '46':
  - type: text
    content: Mitsangàna, andao isika handeha! Indro efa akaiky ilay hanolotra Ahy!
  - type: heading
    content: Voasambotra i Jesoa
  - type: heading
    content: (Jereo Mk 14.43-50; Lk 22.47-53; Jôh 18.3-12)
  '47':
  - type: text
    content: 'Raha mbola niteny i Jesoa, dia indro tonga i Jodasy, anankiray amin’ny 12 lahy; ary olona maro nirongo sabatra sy kibay, irak’ireo lohandoha-mpisorona sy ireo '
  - type: text
    content: loholon
  - type: text
    content: '’ny vahoaka jiosy, no tafaraka taminy. '
  '48':
  - type: text
    content: 'Ilay hanolotra an’i Jesoa dia efa nanome famantarana azy ireo toy izao: «Izay horohako no Izy, ka sambory.» '
  '49':
  - type: text
    content: 'Ary nanatona an’i Jesoa avy hatrany i Jodasy, ka nanao taminy hoe:'
  - type: text
    content: –Mpampianatra ô, ho ao aminao anie ny fiadanana!
  - type: text
    content: 'Dia nanoroka Azy i Jodasy. '
  '5':
  - type: text
    content: 'Nefa hoy ry zareo hoe:'
  - type: text
    content: –Aoka tsy ho amin’ny andro fankalazana, mba tsy hampitabataba ny vahoaka!
  - type: heading
    content: Hosoran’ny vehivavy iray ilomanitra ny lohan’i Jesoa
  - type: heading
    content: (Jereo Mk 14.3-9; Jôh 12.1-8)
  '50':
  - type: text
    content: 'Fa i Jesoa kosa niteny hoe:'
  - type: text
    content: –Ry sakaiza, izany ve no alehanao eto
  - type: note
    content: 'Izany ve no alehanao eto: dkt hafa ataovy izay alehanao eto, na hoe maninona atỳ ianao?'
  - type: text
    content: '?'
  - type: text
    content: 'Tamin’izay dia nohatonin’ireo iraka i Jesoa, ary nohazoniny sady nosamboriny. '
  '51':
  - type: text
    content: Indro kosa ny anankiray tamin’ireo nomba an’i Jesoa fa naninjitra tanana ka nanatsoaka sabatra, ary namely ny mpanompon’ny mpisorombe ka nahafaka ny sofiny
  - type: note
    content: Ampit Jôh 18.26.
  - type: text
    content: '. '
  '52':
  - type: text
    content: 'Ary dia hoy i Jesoa tamin’io mpianany io:'
  - type: text
    content: '–Avereno amin’ny toerany ny sabatrao, fa izay rehetra mamely amin’ny sabatra dia ho fatin’ny sabatra. '
  '53':
  - type: text
    content: 'Heverinao ve fa tsy azoko atao ny mangataka amin’ny Raiko, ary ankehitriny izao ihany Aho dia handefasany anjely marobe mihoatra noho ny andian-tafika 12? '
  '54':
  - type: text
    content: Kanefa raha izany, ahoana no hahatanterahan’ny Soratra Masina izay milaza fa tsy maintsy ho tonga izao?
  '55':
  - type: text
    content: 'Tamin’izay fotoana izay i Jesoa dia niteny tamin’ny andian’olona nirahina hoe:'
  - type: text
    content: '–Toy ny hisambotra jiolahy izato fiavinareo mirongo sabatra sy kibay hisambotra Ahy! Isan’andro Aho dia nipetraka nampianatra teo an-kianjan’ny tempoly, kanefa tsy nosamborinareo. '
  '56':
  - type: text
    content: 'Fa tonga kosa izany rehetra izany mba hahatanterahan’izay voalazan’ireo '
  - type: text
    content: mpaminani
  - type: text
    content: 'n’Andriamanitra ao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: .
  - type: text
    content: Tamin’izay dia nandao an’i Jesoa ny mpianatra rehetra ka nandositra
  - type: note
    content: Ampit 26.31.
  - type: text
    content: .
  - type: heading
    content: Voaheloky ny Fitsarana jiosy i Jesoa
  - type: heading
    content: (Jereo Mk 14.53-65; Lk 22.54-55, 63-71; Jôh 18.13-14, 19-24)
  '57':
  - type: text
    content: 'Ary izay efa nisambotra an’i Jesoa dia nitondra Azy ho any an-tranon’i Kaiafa '
  - type: text
    content: mpisorombe
  - type: text
    content: ', izay nivorian’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' rahateo. '
  '58':
  - type: text
    content: Fa i Petera kosa nanaraka an’i Jesoa teny lavidavitra teny mandra-pahatonga tao an-tokotanin’ny tranon’ny mpisorombe. Dia niditra tao an-tokotany i Petera ary niara-nipetraka tamin’ny mpiandry raharaha teo mba hahita izay fiafaran-javatra.
  '59':
  - type: text
    content: 'Nokarohin’ireo lohandoha-mpisorona sy ireo rehetra anisan’ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ' teo amin’ny Jiosy izay mety hiampangana an’i Jesoa, na dia amin’ny lainga aza, mba hanamelohana Azy ho faty; '
  '6':
  - type: text
    content: 'Tany Betania i Jesoa tamin’izay ary tao an-tranon’i Simôna mpivaro-bakoly. '
  '60':
  - type: text
    content: saingy tsy nahita ry zareo na dia tonga maro teo aza ny mpiampanga lainga an’i Jesoa
  - type: note
    content: Ampit Sal 27.12; 35.11.
  - type: text
    content: '. Nony farany, dia nisy olona roa lahy tonga teo '
  '61':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: '–Izao no voalazan’ilay io; azoko ravana ity '
  - type: text
    content: tempoli
  - type: text
    content: n’Andriamanitra ity ary haoriko indray ao anatin’ny telo andro
  - type: note
    content: Jereo Jôh 2.19.
  - type: text
    content: .
  '62':
  - type: text
    content: 'Dia nitsangana ny mpisorombe ary niteny tamin’i Jesoa hoe:'
  - type: text
    content: –Tsy mamaly na inona na inona ve Ianao? Inona no iampangan’ireo Anao?
  '63':
  - type: text
    content: 'Fa nangina i Jesoa. Dia hoy ny mpisorombe taminy:'
  - type: text
    content: '–Mandidy Anao aho, amin’ny anaran’ilay Andriamanitra velona, mba hilaza aminay raha Ianao no ilay '
  - type: text
    content: Mesia
  - type: text
    content: ', ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: .
  '64':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Anao izany teny izany! Kanefa ambarako aminareo fa tsy ho ela intsony dia ho hitanareo ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' mipetraka eo ankavanan’ilay Andriamanitra mahery ary koa tamy eo amin’ny rahon’ny habakabaka'
  - type: note
    content: Sal 110.1; Dan 7.13.
  - type: text
    content: .
  '65':
  - type: text
    content: 'Tamin’izay ny mpisorombe dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' sady niteny hoe:'
  - type: text
    content: '–Nanevateva an’Andriamanitra Izy; ka inona indray no ilàntsika vavolombelona hiampanga. Indro renareo teo ny fanevatevàny an’Andriamanitra; '
  '66':
  - type: text
    content: ka ahoana no hevitrareo?
  - type: text
    content: 'Dia hoy ireo:'
  - type: text
    content: –Mendrika Azy ny ho faty
  - type: note
    content: Jereo Lev 24.16.
  - type: text
    content: '!'
  '67':
  - type: text
    content: Tamin’izay dia nandrora ny tavan’i Jesoa ry zareo ary namely totohondry Azy; ny sasany kosa namely tehamaina Azy
  - type: note
    content: Ampit Is 50.6.
  - type: text
    content: ' '
  '68':
  - type: text
    content: 'sady nanao hoe:'
  - type: text
    content: –Vinanio, ry Mesia, lazao izay namely Anao!
  - type: heading
    content: Lavin’i Petera intelo i Jesoa
  - type: heading
    content: (Jereo Mk 14.66-72; Lk 22.56-62; Jôh 18.15-18, 25-27)
  '69':
  - type: text
    content: 'Nipetraka teo ivelany tao an-tokotany i Petera. Dia nisy vehivavy mpiasa anankiray nanatona an’i Petera ka niteny taminy hoe:'
  - type: text
    content: –Ianao koa niaraka tamin’i Jesoa, Ilay avy any Galilea.
  '7':
  - type: text
    content: 'Raha mbola teo am-pisakafoana i Jesoa, dia nisy vehivavy anankiray nitondra tavoahangy '
  - type: text
    content: alabasitra
  - type: text
    content: ' feno ilomanitra sarobidy; ary naidin-dravehivavy tamin’ny lohan’i Jesoa ny ilomanitra. '
  '70':
  - type: text
    content: 'Fa nandà teo anatrehan’izy rehetra i Petera ka nanao hoe:'
  - type: text
    content: –Tsy fantatro izay lazainao!
  '71':
  - type: text
    content: 'Dia lasa nankeo am-bavahady i Petera; kanjo nisy vehivavy mpiasa anankiray hafa nahatazana azy ary niteny tamin’izay teo hoe:'
  - type: text
    content: –Io rangahy io koa niaraka tamin’i Jesoa, Ilay avy any Nazareta.
  '72':
  - type: text
    content: 'Ary nandà indray i Petera ka nanao hoe:'
  - type: text
    content: –Mianiana aho fa tsy fantatro izany Lehilahy izany.
  '73':
  - type: text
    content: 'Nony afaka kelikely, dia nanatona an’i Petera ny olona teo ka nanao taminy hoe:'
  - type: text
    content: –Tena anisan’ireny tokoa ianao, sady ny fiteninao rahateo mampiharihary izany.
  '74':
  - type: text
    content: 'Ary sady niozona sy nianiana i Petera no nanao hoe:'
  - type: text
    content: –Tsy fantatro izany Lehilahy izany.
  - type: text
    content: 'Niaraka tamin’izay dia nisy akoho naneno; '
  '75':
  - type: text
    content: 'ary tsaroan’i Petera ny teny voalazan’i Jesoa hoe: «Alohan’ny maneno akoho, dia handà Ahy intelo ianao'
  - type: note
    content: Jereo 26.34.
  - type: text
    content: .» Dia lasa nankany ivelany i Petera ka nitomany fatratra.
  '8':
  - type: text
    content: 'Tezitra ireo '
  - type: text
    content: mpianatra
  - type: text
    content: ' nony nahita izany ka nanao hoe:'
  - type: text
    content: '–Nahoana re iny no dia lanîna foana tahaka izao? '
  '9':
  - type: text
    content: Azo namidy lafo be iny ilomanitra iny ka omena ny mahantra ny vidiny.
