segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Ilay Andriamanitra Avo Indrindra no antsoiko
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (57.8-12; jereo Sal 108.2-8)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tao amin’ny tahirin-kiran’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira.
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hohiraina araka ny feon’ny hoe «Aza ravana....» Salamo nataon’i Davida fony izy nandositra lavitra an’i Saoly ka niery tao anaty zohy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Sam 22.1-2; 24.1-9; ampit 142.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Iantrao aho, Andriamanitra ô, iantrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Ianao no fialofako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo ambany elatrao tokoa no ialofako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pidifin’ny loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ilay Andriamanitra Avo Indrindra no antsoiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay Andriamanitra manao izay mahasoa ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hirahiny avy any an-danitra anie ny famonjena ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataony ho afa-baràka anie ireo mpanenjika ahy!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hirahin’Andriamanitra ho amiko anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitiavana amam-pahamarinany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izaho monina afovoan’ny fahavalo masiaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay tahaka ny liona mandripaka olona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny lefona na zana-tsipîka ny nifiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny sabatra maranitra ny lelany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andriamanitra ô, misandrata Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanerinerina any an-tampon’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka anie ny voninahitrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamiratra amin’ny tany tontolo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ireo fahavaloko efa namelatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrika harato tamin’ny lalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampitanondrika ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nihadiany longoa teo anoloako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo izy ihany no latsaka tao.
- type: usfm
  marker: qr
  children:
  - type: text
    text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andriamanitra ô, mitombina dia mitombina ny foko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 108.2.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihira sy hankalaza Anao amin-tsalamo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifohaza, ry fanahiko; mifohaza, ry valiha sy lokanga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tiako hofohazina ny mazavatsinanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tompo ô, vory vahoaka no hiderako Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo anivom-pirenena no hankalazako Anao amin-tsalamo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: satria lehibe tafapaka amin’ny lanitra ny fitiavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avo tafapaka amin’ny rahona ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Andriamanitra ô, misandrata Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanerinerina any an-tampon’ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka anie ny voninahitrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamiratra amin’ny tany tontolo!
