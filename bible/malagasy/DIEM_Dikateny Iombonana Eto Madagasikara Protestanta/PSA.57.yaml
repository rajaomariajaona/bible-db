document_id: PSA.57,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ilay Andriamanitra Avo Indrindra no antsoiko
  - type: heading
    content: (57.8-12; jereo Sal 108.2-8)
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hohiraina araka ny feon’ny hoe «Aza ravana....» Salamo nataon’i Davida fony izy nandositra lavitra an’i Saoly ka niery tao anaty zohy
  - type: note
    content: Jereo 1 Sam 22.1-2; 24.1-9; ampit 142.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Tompo ô, vory vahoaka no hiderako Anao
  - type: text
    content: ary eo anivom-pirenena no hankalazako Anao amin-tsalamo,
  '11':
  - type: text
    content: satria lehibe tafapaka amin’ny lanitra ny fitiavanao
  - type: text
    content: ary avo tafapaka amin’ny rahona ny fahamarinanao.
  '12':
  - type: text
    content: Andriamanitra ô, misandrata Ianao
  - type: text
    content: hanerinerina any an-tampon’ny lanitra;
  - type: text
    content: aoka anie ny voninahitrao
  - type: text
    content: hamiratra amin’ny tany tontolo!
  '2':
  - type: text
    content: Iantrao aho, Andriamanitra ô, iantrao
  - type: text
    content: satria Ianao no fialofako;
  - type: text
    content: eo ambany elatrao tokoa no ialofako
  - type: text
    content: mandra-pidifin’ny loza.
  '3':
  - type: text
    content: Ilay Andriamanitra Avo Indrindra no antsoiko,
  - type: text
    content: dia ilay Andriamanitra manao izay mahasoa ahy.
  '4':
  - type: text
    content: Hirahiny avy any an-danitra anie ny famonjena ahy,
  - type: text
    content: hataony ho afa-baràka anie ireo mpanenjika ahy!
  - type: text
    content: Fiatoana
  - type: text
    content: Eny, hirahin’Andriamanitra ho amiko anie
  - type: text
    content: ny fitiavana amam-pahamarinany!
  '5':
  - type: text
    content: Izaho monina afovoan’ny fahavalo masiaka
  - type: text
    content: 'izay tahaka ny liona mandripaka olona:'
  - type: text
    content: toy ny lefona na zana-tsipîka ny nifiny,
  - type: text
    content: toy ny sabatra maranitra ny lelany.
  '6':
  - type: text
    content: Andriamanitra ô, misandrata Ianao
  - type: text
    content: hanerinerina any an-tampon’ny lanitra.
  - type: text
    content: Aoka anie ny voninahitrao
  - type: text
    content: hamiratra amin’ny tany tontolo!
  '7':
  - type: text
    content: Ireo fahavaloko efa namelatra
  - type: text
    content: fandrika harato tamin’ny lalako
  - type: text
    content: mba hampitanondrika ahy;
  - type: text
    content: nihadiany longoa teo anoloako,
  - type: text
    content: kanjo izy ihany no latsaka tao.
  - type: text
    content: Fiatoana
  '8':
  - type: text
    content: Andriamanitra ô, mitombina dia mitombina ny foko
  - type: note
    content: Ampit Sal 108.2.
  - type: text
    content: ka hihira sy hankalaza Anao amin-tsalamo aho.
  '9':
  - type: text
    content: Mifohaza, ry fanahiko; mifohaza, ry valiha sy lokanga,
  - type: text
    content: fa tiako hofohazina ny mazavatsinanana.
