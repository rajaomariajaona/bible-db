document_id: LUK.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Antsoin’i Jesoa ireo mpianany voalohany
  - type: text
    content: Indray andro i Jesoa, raha ilay nijanona teo amoron’ny farihin’i Genesareta
  - type: note
    content: 'farihin’i Genesareta: anarana hafa iantsoana ny farihin’i Galilea. Jereo koa Mk 6.53 sy nta.'
  - type: text
    content: ' iny, dia nitangoronan’ny vahoaka te hihaino ny tenin’Andriamanitra. '
  '10':
  - type: text
    content: 'Toa izany koa ry i Jakôba sy i Jôhany zanakalahin’i Zebedeo izay niombona asa tamin’i Simôna. Ary hoy i Jesoa tamin’i Simôna:'
  - type: text
    content: –Aoka izay ny tahotra; manomboka izao dia olona kosa no halainao!
  '11':
  - type: text
    content: Ary rehefa nampiantsona ny sambokely teo an-tanety i Simôna sy ny namany, dia nandao ny zavatra rehetra ka lasa niaraka tamin’i Jesoa.
  - type: heading
    content: Sitranin’i Jesoa ilay marary hoditra
  - type: heading
    content: (Jereo Mt 8.1-4; Mk 1.40-45)
  '12':
  - type: text
    content: 'Indray andro, raha tao amin’ny tanàna anankiray i Jesoa, dia indro nisy lehilahy voan’ny aretin-koditra ny tenany manontolo. Nahatazana an’i Jesoa ralehilahy ka niankohoka teo anatrehany sy nitalaho taminy hoe:'
  - type: text
    content: –Tompo ô, raha sitrakao, dia hainao diovina aho!
  '13':
  - type: text
    content: 'Nanatsotra tanana i Jesoa dia nikasika azy sady niteny hoe:'
  - type: text
    content: –Eny, sitrako izany, madiova ianao!
  - type: text
    content: 'Avy hatrany dia nialàn’ny aretin-koditra nahazo azy ralehilahy, '
  '14':
  - type: text
    content: 'kanefa noraran’i Jesoa tsy hilazalaza na amin’iza na amin’iza sady nataony hoe:'
  - type: text
    content: –Mandehana miseho amin’ny mpisorona ary ento ny fanatitra voalazan’i Mosesy, mba ho vavolombelona amin’ny olona fa madio ianao
  - type: note
    content: Jereo Lev 14.2-32.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Kanjo vao mainka niely ny lazany ka vahoaka marobe no nirohotra hihaino Azy sy hositraniny amin’ny aretiny. '
  '16':
  - type: text
    content: I Jesoa kosa amin’izany lasa mihataka any amin’ny toerana mangina ka mivavaka any.
  - type: heading
    content: Sitranin’i Jesoa ilay malemy tao Kafarnahòma
  - type: heading
    content: (Jereo Mt 9.1-8; Mk 2.1-12)
  '17':
  - type: text
    content: 'Indray andro, raha nampianatra i Jesoa, dia nisy '
  - type: text
    content: Farisianina
  - type: text
    content: ' sy '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' nipetraka teo akaikiny; avy amin’ny tanàna any Galilea sy Jodea ary avy any Jerosalema ry zareo ireo. Ary niasa ny herin’ny Tompo'
  - type: note
    content: 'Tompo: tahaka ny hita ao amin’ny Test. T. sy ao amin’ny Lk 1–4, io anaram-boninahitra io dia mazàna ampiharina amin’Andriamanitra (Ray).'
  - type: text
    content: ' mba hanasitranan’i Jesoa ny marary. '
  '18':
  - type: text
    content: 'Dia indreo nisy lehilahy nilanja malemy anankiray tamin’ny fandriana ka nitady hampiditra azy ao an-trano sy hametraka azy eo anoloan’i Jesoa. '
  '19':
  - type: text
    content: Tsy hitan’ireo mpilanja izay fomba hampidirana azy noho ny habetsahan’ny olona ka niakarany ny tafon-trano, nanesorany ny tafo tanimanga ary nampidininy ombàm-pandriana ilay malemy ho eo afovoan’ny olona, eo anoloan’i Jesoa.
  '2':
  - type: text
    content: 'Hitany fa nisy sambokely roa niantsona teo amoron-drano fa nidina nanasa harato ny mpanarato. '
  '20':
  - type: text
    content: 'Hitan’i Jesoa ny finoan’ireo olona ka hoy Izy tamin’ilay marary:'
  - type: text
    content: –Andriamatoa, voavela ny helokao!
  '21':
  - type: text
    content: 'Ireo mpahay lalàna sy Farisianina kosa nieritreritra anakampo hoe: «Mba iza ity manevateva an’Andriamanitra ity? Iza no mahavela heloka afa-tsy Andriamanitra irery ihany'
  - type: note
    content: 'manevateva an’Andriamanitra: ampit Lev 24.16. –Iza no mahavela... irery?: jereo Sal 103.3; Is 43.25.'
  - type: text
    content: '?» '
  '22':
  - type: text
    content: 'Takatr’i Jesoa ny eritreritry ny mpahay lalàna sy Farisianina ka notsenainy ry zareo nataony hoe:'
  - type: text
    content: '–Inona izato eritreretinareo ao am-ponareo? '
  '23':
  - type: text
    content: 'Inona moa no tsotsotra kokoa, ny milaza hoe: «Voavela ny helokao», sa ny milaza hoe: «Mitsangàna ka mandehana»? '
  '24':
  - type: text
    content: 'Aoka ho fantatrareo fa ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' eto an-tany dia manam-pahefana hamela heloka.'
  - type: text
    content: 'Dia hoy i Jesoa tamin’ilay malemy:'
  - type: text
    content: –Mandidy anao Aho, mitsangàna, batao ny fandrianao, ary modia any an-tranonao!
  '25':
  - type: text
    content: 'Niaraka tamin’izay dia nitsangana teo imason’ny olona ralehilahy, nibata ny fandriany ary nody tany an-tranony sady nanome voninahitra an’Andriamanitra. '
  '26':
  - type: text
    content: 'Talanjona avokoa izay rehetra teo ka nanome voninahitra an’Andriamanitra sady raiki-tahotra nanao hoe:'
  - type: text
    content: –Zava-mahagaga ity hitantsika androany itỳ?
  - type: heading
    content: Antsoin’i Jesoa ho mpianany i Levỳ
  - type: heading
    content: (Jereo Mt 9.9-13; Mk 2.13-17)
  '27':
  - type: text
    content: 'Taorian’izany, raha nandeha i Jesoa, dia nahita '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' atao hoe Levỳ nipetraka tao amin’ny birao famorian-ketra, ka hoy Izy taminy:'
  - type: text
    content: –Avia hiaraka amiko!
  '28':
  - type: text
    content: Dia nitsangana i Levỳ namoy ny zavatra rehetra ary nandeha niaraka taminy.
  '29':
  - type: text
    content: 'Avy eo ry i Jesoa dia nanaovan’i Levỳ fanasambe tao an-tranony, ka betsaka ny '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' sy ny olon-kafa no niara-nisakafo taminy sy ny '
  - type: text
    content: mpianany
  - type: text
    content: '. '
  '3':
  - type: text
    content: Dia niakaran’i Jesoa ny sambokely anankiray izay an’i Simôna, ka niangavian’i Jesoa i Simôna hihataka kely amin’ny tany. Ary teo an-tsambokely Izy no nipetraka hampianatra ny vahoaka.
  '30':
  - type: text
    content: 'Nimonomonona ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' sy ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' mpomba azy ka nilaza tamin’ny mpianatr’i Jesoa hoe:'
  - type: text
    content: –Ahoana ianareo no miara-mihinana sy misotro amin’ny mpamory hetra sy ny mpanota
  - type: note
    content: Ampit ny and 29-30 sy Lk 15.1-2.
  - type: text
    content: '?'
  '31':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Tsy ny salama no mila dokotera fa ny marary. '
  '32':
  - type: text
    content: Tsy hiantso ny olo-marina no nahatongavako fa hiantso ny mpanota mba hialany amin’ny toetra ratsiny.
  - type: heading
    content: Ny fifadian-kanina ary ny tonta sy vaovao
  - type: heading
    content: (Jereo Mt 9.14-17; Mk 2.18-22)
  '33':
  - type: text
    content: 'Ary nisy olona nanao tamin’i Jesoa hoe:'
  - type: text
    content: '–Ny an’i Jôhany Mpanao '
  - type: text
    content: batisa
  - type: text
    content: ', ny mpianany mahavatra mifady hanina sy mivavaka; toraka izany koa ny an’ny '
  - type: text
    content: Farisianina
  - type: text
    content: . Fa ny anao kosa mihinana sy misotro hatrany.
  '34':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Moa azonareo atao ve ny mampifady hanina ireo mpanotrona ny mpampaka-bady raha mbola miaraka aminy eo ny mpampakatra? Tsia! '
  '35':
  - type: text
    content: Fa ho avy ny andro hanesorana ny mpampakatra eo aminy ka amin’izay andro izay vao hifady hanina ireo mpanotrona.
  '36':
  - type: text
    content: 'Mbola nilazan’i Jesoa fanoharana koa ireo olona ireo nataony hoe:'
  - type: text
    content: –Tsy misy olona mandrovitra tapa-damba amin’ny fitafiana vaovao hanampenana fitafiana tonta; fa raha izany, ny vaovao moa ho rovitra ary ny tonta tsy hifanendrika amin’ny tapa-damba vaovao.
  '37':
  - type: text
    content: '–Toy izany koa, tsy misy olona mitahiry divay vaovao ao anaty '
  - type: text
    content: siny hoditra
  - type: text
    content: ' efa tranainy; fa raha izany, dia ho rotiky ny divay vaovao ny siny hoditra: ka ny divay ho raraka, ny siny hoditra hafoy. '
  '38':
  - type: text
    content: Fa siny hoditra vaovao no tsy maintsy itahirizana ny divay vaovao.
  '39':
  - type: text
    content: '–Ary tsy misy olona avy nisotro divay ela niotrehana ka hitady divay vaovao. Fa fiteny ny hoe: ny ela niotrehana no tsara.'
  '4':
  - type: text
    content: 'Nony nitsaha-niteny i Jesoa, dia nanao tamin’i Simôna hoe:'
  - type: text
    content: –Mandrosoa eny amin’ny lalina, dia alatsaho ny haratonareo hahazoana trondro.
  '5':
  - type: text
    content: 'Fa novalian’i Simôna hoe:'
  - type: text
    content: –Mpampianatra ô, niasa mafy izahay halina tontolo, saingy tsy nahazo na inona na inona; kanefa noho ny baikonao, dia halatsako ihany ny harato.
  '6':
  - type: text
    content: Vao nandatsaka ny harato izy ireo, dia nahazo trondro be tokoa ary saika rovitra ny harato
  - type: note
    content: Ampit Jôh 21.6.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Koa nohatsihin’izy iray tarika mba ho avy hanampy azy ny namany izay teny amin’ny sambokely hafa. Dia avy ireo, ka samy feno safomorona saika hilentika ny sambokely anankiroa. '
  '8':
  - type: text
    content: 'Raha nahita izany i Simôna Petera, dia niankohoka teo an-tongotr’i Jesoa nanao hoe:'
  - type: text
    content: –Tompo ô, halaviro aho fa mpanota!
  '9':
  - type: text
    content: 'Taitra loatra manko izy mbamin’ireo niaraka taminy noho ny haben’ny trondro azony. '
