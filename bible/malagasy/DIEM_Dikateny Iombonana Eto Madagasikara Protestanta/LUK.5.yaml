document_id: LUK.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antsoin’i Jesoa ireo mpianany voalohany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indray andro i Jesoa, raha ilay nijanona teo amoron’ny farihin’i Genesareta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'farihin’i Genesareta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anarana hafa iantsoana ny farihin’i Galilea. Jereo koa Mk 6.53 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' iny, dia nitangoronan’ny vahoaka te hihaino ny tenin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hitany fa nisy sambokely roa niantsona teo amoron-drano fa nidina nanasa harato ny mpanarato. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia niakaran’i Jesoa ny sambokely anankiray izay an’i Simôna, ka niangavian’i Jesoa i Simôna hihataka kely amin’ny tany. Ary teo an-tsambokely Izy no nipetraka hampianatra ny vahoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony nitsaha-niteny i Jesoa, dia nanao tamin’i Simôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandrosoa eny amin’ny lalina, dia alatsaho ny haratonareo hahazoana trondro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa novalian’i Simôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, niasa mafy izahay halina tontolo, saingy tsy nahazo na inona na inona; kanefa noho ny baikonao, dia halatsako ihany ny harato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vao nandatsaka ny harato izy ireo, dia nahazo trondro be tokoa ary saika rovitra ny harato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôh 21.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa nohatsihin’izy iray tarika mba ho avy hanampy azy ny namany izay teny amin’ny sambokely hafa. Dia avy ireo, ka samy feno safomorona saika hilentika ny sambokely anankiroa. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha nahita izany i Simôna Petera, dia niankohoka teo an-tongotr’i Jesoa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompo ô, halaviro aho fa mpanota!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Taitra loatra manko izy mbamin’ireo niaraka taminy noho ny haben’ny trondro azony. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toa izany koa ry i Jakôba sy i Jôhany zanakalahin’i Zebedeo izay niombona asa tamin’i Simôna. Ary hoy i Jesoa tamin’i Simôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka izay ny tahotra; manomboka izao dia olona kosa no halainao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary rehefa nampiantsona ny sambokely teo an-tanety i Simôna sy ny namany, dia nandao ny zavatra rehetra ka lasa niaraka tamin’i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Sitranin’i Jesoa ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: marary hoditra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 8.1-4; Mk 1.40-45)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Indray andro, raha tao amin’ny tanàna anankiray i Jesoa, dia indro nisy lehilahy voan’ny aretin-koditra ny tenany manontolo. Nahatazana an’i Jesoa ralehilahy ka niankohoka teo anatrehany sy nitalaho taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompo ô, raha sitrakao, dia hainao diovina aho!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nanatsotra tanana i Jesoa dia nikasika azy sady niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, sitrako izany, madiova ianao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Avy hatrany dia nialàn’ny aretin-koditra nahazo azy ralehilahy, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'kanefa noraran’i Jesoa tsy hilazalaza na amin’iza na amin’iza sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana miseho amin’ny mpisorona ary ento ny fanatitra voalazan’i Mosesy, mba ho vavolombelona amin’ny olona fa madio ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 14.2-32.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanjo vao mainka niely ny lazany ka vahoaka marobe no nirohotra hihaino Azy sy hositraniny amin’ny aretiny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I Jesoa kosa amin’izany lasa mihataka any amin’ny toerana mangina ka mivavaka any.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay malemy tao Kafarnahòma
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 9.1-8; Mk 2.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Indray andro, raha nampianatra i Jesoa, dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' nipetraka teo akaikiny; avy amin’ny tanàna any Galilea sy Jodea ary avy any Jerosalema ry zareo ireo. Ary niasa ny herin’ny Tompo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tompo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tahaka ny hita ao amin’ny Test. T. sy ao amin’ny Lk 1–4, io anaram-boninahitra io dia mazàna ampiharina amin’Andriamanitra (Ray).
    marker-yv: yv-n
  - type: text
    text: ' mba hanasitranan’i Jesoa ny marary. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia indreo nisy lehilahy nilanja malemy anankiray tamin’ny fandriana ka nitady hampiditra azy ao an-trano sy hametraka azy eo anoloan’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy hitan’ireo mpilanja izay fomba hampidirana azy noho ny habetsahan’ny olona ka niakarany ny tafon-trano, nanesorany ny tafo tanimanga ary nampidininy ombàm-pandriana ilay malemy ho eo afovoan’ny olona, eo anoloan’i Jesoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hitan’i Jesoa ny finoan’ireo olona ka hoy Izy tamin’ilay marary:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andriamatoa, voavela ny helokao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ireo mpahay lalàna sy Farisianina kosa nieritreritra anakampo hoe: «Mba iza ity manevateva an’Andriamanitra ity? Iza no mahavela heloka afa-tsy Andriamanitra irery ihany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'manevateva an’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Lev 24.16. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Iza no mahavela... irery?
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Sal 103.3; Is 43.25.'
    marker-yv: yv-n
  - type: text
    text: '?» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Takatr’i Jesoa ny eritreritry ny mpahay lalàna sy Farisianina ka notsenainy ry zareo nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona izato eritreretinareo ao am-ponareo? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Inona moa no tsotsotra kokoa, ny milaza hoe: «Voavela ny helokao», sa ny milaza hoe: «Mitsangàna ka mandehana»? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aoka ho fantatrareo fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' eto an-tany dia manam-pahefana hamela heloka.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy i Jesoa tamin’ilay malemy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandidy anao Aho, mitsangàna, batao ny fandrianao, ary modia any an-tranonao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Niaraka tamin’izay dia nitsangana teo imason’ny olona ralehilahy, nibata ny fandriany ary nody tany an-tranony sady nanome voninahitra an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Talanjona avokoa izay rehetra teo ka nanome voninahitra an’Andriamanitra sady raiki-tahotra nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Zava-mahagaga ity hitantsika androany itỳ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antsoin’i Jesoa ho mpianany i Levỳ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 9.9-13; Mk 2.13-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Taorian’izany, raha nandeha i Jesoa, dia nahita '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpamory hetra
  - type: text
    text: ' atao hoe Levỳ nipetraka tao amin’ny birao famorian-ketra, ka hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia hiaraka amiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nitsangana i Levỳ namoy ny zavatra rehetra ary nandeha niaraka taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Avy eo ry i Jesoa dia nanaovan’i Levỳ fanasambe tao an-tranony, ka betsaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpamory hetra
  - type: text
    text: ' sy ny olon-kafa no niara-nisakafo taminy sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nimonomonona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' mpomba azy ka nilaza tamin’ny mpianatr’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana ianareo no miara-mihinana sy misotro amin’ny mpamory hetra sy ny mpanota
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit ny and 29-30 sy Lk 15.1-2.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy ny salama no mila dokotera fa ny marary. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tsy hiantso ny olo-marina no nahatongavako fa hiantso ny mpanota mba hialany amin’ny toetra ratsiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifadian-kanina ary ny tonta sy vaovao
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 9.14-17; Mk 2.18-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nisy olona nanao tamin’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny an’i Jôhany Mpanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ', ny mpianany mahavatra mifady hanina sy mivavaka; toraka izany koa ny an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: . Fa ny anao kosa mihinana sy misotro hatrany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Moa azonareo atao ve ny mampifady hanina ireo mpanotrona ny mpampaka-bady raha mbola miaraka aminy eo ny mpampakatra? Tsia! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa ho avy ny andro hanesorana ny mpampakatra eo aminy ka amin’izay andro izay vao hifady hanina ireo mpanotrona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mbola nilazan’i Jesoa fanoharana koa ireo olona ireo nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy misy olona mandrovitra tapa-damba amin’ny fitafiana vaovao hanampenana fitafiana tonta; fa raha izany, ny vaovao moa ho rovitra ary ny tonta tsy hifanendrika amin’ny tapa-damba vaovao.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '–Toy izany koa, tsy misy olona mitahiry divay vaovao ao anaty '
  - type: usfm
    marker: w
    children:
    - type: text
      text: siny hoditra
  - type: text
    text: ' efa tranainy; fa raha izany, dia ho rotiky ny divay vaovao ny siny hoditra: ka ny divay ho raraka, ny siny hoditra hafoy. '
  - type: usfm
