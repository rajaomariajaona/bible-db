document_id: 2CH.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Jôtama
  - type: heading
    content: (Jereo 2 Mp 15.32-38)
  - type: text
    content: 'Feno 25 taona i Jôtama fony izy tonga mpanjaka; ary naharitra 16 taona no nanjakany toa Jerosalema. Ny anaran-dreniny dia i Jerosà zanakavavin’i Tsadôka. '
  '2':
  - type: text
    content: 'Nanao izay mahitsy eo imason’ny TOMPO i Jôtama, tahaka izay nataon’i Hozià rainy, kanefa tsy mba niditra tao amin’ny '
  - type: text
    content: Toeramasin’ny TOMPO
  - type: text
    content: . Saingy mbola niharatsy toetra ihany ny vahoaka.
  '3':
  - type: text
    content: I Jôtama no nanamboatra ny vavahady ambony
  - type: note
    content: 'Vavahady ambony: jereo 2 Mp 15.25 sy nta.'
  - type: text
    content: ' tamin’ny tranon’ny TOMPO sady nanatontosa rafitra be tamin’ny mandan’i Hôfela'
  - type: note
    content: 'Hôfela: faritra tao anatin’i Jerosalema teo atsimon’ny tempoly sy ny lapan’ny mpanjaka.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: Nanorenany tanàna teny amin’ny havoan’i Joda ary nanaovany trano fiarovana sy tilikambo tany an’ala.
  '5':
  - type: text
    content: 'Niadian’i Jôtama ny mpanjakan’ny Hamônita ka resiny. Tamin’io taona io no nanomezan’ny Hamônita azy volafotsy telo taonina sy varimbazaha telo taonina ary vary ôrza telo taonina; dia mbola izany ihany koa no naloan’izy ireo tamin’ny taona roa manaraka. '
  '6':
  - type: text
    content: Nitombo hery hatrany i Jôtama noho izy tsara fitondrantena teo anatrehan’ny TOMPO Andriamaniny.
  '7':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôtama mbamin’ny adiny rehetra sy ny zava-bitany dia indreo efa voasoratra ao amin’ny bokin’ny mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy i Joda'
  - type: note
    content: Jereo 16.11 sy nta.
  - type: text
    content: ' izany. '
  '8':
  - type: text
    content: 'Feno 25 taona izy fony tonga mpanjaka; ary naharitra 16 taona no nanjakany tao Jerosalema. '
  '9':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany kosa i Jôtama, dia nalevina tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ; ary i Ahaza zanany lahy no nanjaka nandimby azy.
