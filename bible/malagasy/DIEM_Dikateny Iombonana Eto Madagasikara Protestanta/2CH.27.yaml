document_id: 2CH.27,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakàn’i Jôtama
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 15.32-38)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Feno 25 taona i Jôtama fony izy tonga mpanjaka; ary naharitra 16 taona no nanjakany toa Jerosalema. Ny anaran-dreniny dia i Jerosà zanakavavin’i Tsadôka. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay mahitsy eo imason’ny TOMPO i Jôtama, tahaka izay nataon’i Hozià rainy, kanefa tsy mba niditra tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin’ny TOMPO
    - type: text
      text: . Saingy mbola niharatsy toetra ihany ny vahoaka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jôtama no nanamboatra ny vavahady ambony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Vavahady ambony: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Mp 15.25 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny tranon’ny TOMPO sady nanatontosa rafitra be tamin’ny mandan’i Hôfela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hôfela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: faritra tao anatin’i Jerosalema teo atsimon’ny tempoly sy ny lapan’ny mpanjaka.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanorenany tanàna teny amin’ny havoan’i Joda ary nanaovany trano fiarovana sy tilikambo tany an’ala.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niadian’i Jôtama ny mpanjakan’ny Hamônita ka resiny. Tamin’io taona io no nanomezan’ny Hamônita azy volafotsy telo taonina sy varimbazaha telo taonina ary vary ôrza telo taonina; dia mbola izany ihany koa no naloan’izy ireo tamin’ny taona roa manaraka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitombo hery hatrany i Jôtama noho izy tsara fitondrantena teo anatrehan’ny TOMPO Andriamaniny.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Jôtama mbamin’ny adiny rehetra sy ny zava-bitany dia indreo efa voasoratra ao amin’ny bokin’ny mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' sy i Joda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Feno 25 taona izy fony tonga mpanjaka; ary naharitra 16 taona no nanjakany tao Jerosalema. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany kosa i Jôtama, dia nalevina tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tanànan’i Davida
    - type: text
      text: ; ary i Ahaza zanany lahy no nanjaka nandimby azy.
