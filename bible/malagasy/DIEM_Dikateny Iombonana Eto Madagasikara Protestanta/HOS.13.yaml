document_id: HOS.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahafatesan’ny vahoaka nikomy tamin’Andriamanitra
  - type: text
    content: Rehefa niteny i Efraîma,
  - type: text
    content: dia nampatahotra ny besinimaro izy
  - type: text
    content: ka nahery tao Israely.
  - type: text
    content: 'Fa ny nanompoany an’i '
  - type: text
    content: Bahala
  - type: text
    content: no nahameloka sy nahafaty azy.
  '10':
  - type: text
    content: Aiza àry izao ny mpanjakanao
  - type: text
    content: izay tokony hamonjy anao?
  - type: text
    content: Amin’ny tanànanao rehetra,
  - type: text
    content: aiza koa ireo mpitondra anao?
  - type: text
    content: 'Fa ianao ihany no nanao hoe:'
  - type: text
    content: «Omeo mpanjaka sy filoha aho
  - type: note
    content: 'omeo mpanjaka aho: 1 Sam 8.5-6.'
  - type: text
    content: ».
  '11':
  - type: text
    content: Koa tamim-pahatezerana
  - type: text
    content: no nanomezako mpanjaka anao,
  - type: text
    content: ary tamim-pahavinirana
  - type: text
    content: no nanesorako ireny indray
  - type: note
    content: Jereo 1 Sam 10.17-24; 15.26; jereo koa Hôs 10.15; 1 Mp 16.12; 18-19; 22.37-38; 2 Mp 9.24-26.
  - type: text
    content: .
  '12':
  - type: text
    content: Voatana an-tsoratra
  - type: text
    content: ny helok’i Efraîma,
  - type: text
    content: tsara tahiry ny fahotany.
  '13':
  - type: text
    content: Tahaka ny an’ny vehivavy hiteraka
  - type: text
    content: no fanaintainana mahazo azy.
  - type: text
    content: 'Kanefa dia zaza adaladala:'
  - type: text
    content: tsy mety mivoaka avy ao an-kibo izy,
  - type: text
    content: na dia efa tonga aza ny fotoany.
  '14':
  - type: text
    content: Izaho TOMPO ve hanavotra ireo olona ireo
  - type: text
    content: tsy ho voagejan’ny fahafatesana,
  - type: text
    content: ka hanafaka azy amin’ny toeran’ny maty?
  - type: text
    content: Rafahafatesana ô,
  - type: text
    content: aiza ny aretina fandringananao?
  - type: text
    content: Ry toeran’ny maty ô,
  - type: text
    content: aiza ny loza fandripahanao
  - type: note
    content: Lazain’ny apôstôly Paoly malalaka ireo teny ireo ao amin’ny 1Kôr 15.55 ary raisiny ho toy ny fihaikana ny fahafatesana.
  - type: text
    content: '?'
  - type: text
    content: Tsy hana-maso miantra Aho.
  '15':
  - type: text
    content: Fa na dia miroborobo aza i Efraîma
  - type: text
    content: eo anivon’ireo mpiray firenena aminy,
  - type: text
    content: dia hiakatra avy any an-taniefitra
  - type: text
    content: ny rivotra avy atsinanana;
  - type: text
    content: ka ny TOMPO no handefa izany.
  - type: text
    content: Dia ho ritra ny loharanony
  - type: text
    content: ary ho tànkina ny fantsakàny.
  - type: text
    content: Hobaboina ny tahiriny,
  - type: text
    content: dia ny fanaka sarobidy rehetra.
  '2':
  - type: text
    content: Ankehitriny mikiribiby manota izy,
  - type: text
    content: ka mandrendrika volafotsy
  - type: text
    content: hanaovana sarivongan-tsampy
  - type: text
    content: araka ny hakingany mamorona azy.
  - type: text
    content: Asan’ny mpahay taozavatra avokoa ireny
  - type: text
    content: 'kanefa dia lazainy hoe:'
  - type: text
    content: '«Anolory '
  - type: text
    content: sorona
  - type: text
    content: ' izy'
  - type: note
    content: 'anolory sorona izy: araka ny dkt tranainy anankiroa; –mitsaoka ombilahikely mampahatsiahy ny zanak’omby volamena (jereo 8.5 sy nta).'
  - type: text
    content: '!»'
  - type: text
    content: Olombelona no mitsaoka ombilahikely!
  '3':
  - type: text
    content: Ho toy ny rahona vao maraina izy
  - type: text
    content: ary ho toy ny ranon’ando
  - type: text
    content: ka ho levona vetivety;
  - type: text
    content: eny, ho toy ny akofa paohin-drivotra
  - type: text
    content: hiala amin’ny famoloana izy
  - type: text
    content: ary ho toy ny setroka
  - type: text
    content: mivoaka amin’ny varavarankely.
  '4':
  - type: text
    content: Fa Izaho no TOMPO Andriamanitrao,
  - type: text
    content: hatry ny fony ianao tany Ejipta;
  - type: text
    content: ary ianao dia tsy mahafantatra
  - type: text
    content: andriamani-kafa ankoatrako
  - type: text
    content: sy mpamonjy afa-tsy Izaho.
  '5':
  - type: text
    content: Izaho no mpiandry anao
  - type: note
    content: 'no mpiandry anao: araka ireo dkt tranainy grika; ny hebreo: mahalala anao.'
  - type: text
    content: ;
  - type: text
    content: fony ianao tany an-taniefitra
  - type: text
    content: tany amin’ny tany karankaina.
  '6':
  - type: text
    content: Nony mby teo amin’ny ahi-maitso ianao
  - type: text
    content: dia afa nivoky tokoa.
  - type: text
    content: Eny, voky ianao, ka niavonavom-po
  - type: note
    content: 'And 5-6: jereo Deot 8.11-18.'
  - type: text
    content: ;
  - type: text
    content: izany no nanadinoanao Ahy.
  '7':
  - type: text
    content: Koa tonga toy ny liona Aho
  - type: text
    content: aminareo Israelita,
  - type: text
    content: ary koa tahaka ny pantèra
  - type: text
    content: mamitsaka amoron-dalana.
  '8':
  - type: text
    content: Toy ny famelin’ny orsa very zanaka
  - type: text
    content: no amelezako anareo,
  - type: text
    content: ka rotehiko ny tratranareo.
  - type: text
    content: Toy ny fandrapaky ny liom-bavy
  - type: text
    content: no andrapahako anareo;
  - type: text
    content: ny bibidia no hamiravira ny fatinareo.
  '9':
  - type: text
    content: Ny maharingana anao, ry Israely,
  - type: text
    content: dia noho ianao manohitra Ahy
  - type: text
    content: Izay hany mahavonjy anao.
