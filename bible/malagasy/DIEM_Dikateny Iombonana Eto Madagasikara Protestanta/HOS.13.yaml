verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahafatesan’ny vahoaka nikomy tamin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Rehefa niteny i Efraîma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampatahotra ny besinimaro izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahery tao Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa ny nanompoany an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahameloka sy nahafaty azy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aiza àry izao ny mpanjakanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tokony hamonjy anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny tanànanao rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aiza koa ireo mpitondra anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa ianao ihany no nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Omeo mpanjaka sy filoha aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'omeo mpanjaka aho:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1 Sam 8.5-6.
      marker-yv: yv-n
    - type: text
      text: ».
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa tamim-pahatezerana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanomezako mpanjaka anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamim-pahavinirana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanesorako ireny indray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Sam 10.17-24; 15.26; jereo koa Hôs 10.15; 1 Mp 16.12; 18-19; 22.37-38; 2 Mp 9.24-26.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Voatana an-tsoratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny helok’i Efraîma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsara tahiry ny fahotany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tahaka ny an’ny vehivavy hiteraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no fanaintainana mahazo azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Kanefa dia zaza adaladala:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mety mivoaka avy ao an-kibo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia efa tonga aza ny fotoany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izaho TOMPO ve hanavotra ireo olona ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho voagejan’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanafaka azy amin’ny toeran’ny maty?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rafahafatesana ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aiza ny aretina fandringananao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry toeran’ny maty ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aiza ny loza fandripahanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lazain’ny apôstôly Paoly malalaka ireo teny ireo ao amin’ny 1Kôr 15.55 ary raisiny ho toy ny fihaikana ny fahafatesana.
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hana-maso miantra Aho.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa na dia miroborobo aza i Efraîma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anivon’ireo mpiray firenena aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiakatra avy any an-taniefitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny rivotra avy atsinanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny TOMPO no handefa izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho ritra ny loharanony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tànkina ny fantsakàny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hobaboina ny tahiriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fanaka sarobidy rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ankehitriny mikiribiby manota izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandrendrika volafotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanaovana sarivongan-tsampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny hakingany mamorona azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asan’ny mpahay taozavatra avokoa ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'kanefa dia lazainy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Anolory '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' izy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'anolory sorona izy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt tranainy anankiroa; –mitsaoka ombilahikely mampahatsiahy ny zanak’omby volamena (jereo 8.5 sy nta).
      marker-yv: yv-n
    - type: text
      text: '!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Olombelona no mitsaoka ombilahikely!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ho toy ny rahona vao maraina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho toy ny ranon’ando
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho levona vetivety;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho toy ny akofa paohin-drivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiala amin’ny famoloana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho toy ny setroka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mivoaka amin’ny varavarankely.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa Izaho no TOMPO Andriamanitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatry ny fony ianao tany Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ianao dia tsy mahafantatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andriamani-kafa ankoatrako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mpamonjy afa-tsy Izaho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izaho no mpiandry anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'no mpiandry anao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ireo dkt tranainy grika; ny hebreo: mahalala anao.'
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony ianao tany an-taniefitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tany amin’ny tany karankaina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nony mby teo amin’ny ahi-maitso ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia afa nivoky tokoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, voky ianao, ka niavonavom-po
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 5-6:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Deot 8.11-18.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no nanadinoanao Ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa tonga toy ny liona Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aminareo Israelita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa tahaka ny pantèra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamitsaka amoron-dalana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Toy ny famelin’ny orsa very zanaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no amelezako anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka rotehiko ny tratranareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fandrapaky ny liom-bavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no andrapahako anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny bibidia no hamiravira ny fatinareo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny maharingana anao, ry Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia noho ianao manohitra Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hany mahavonjy anao.
