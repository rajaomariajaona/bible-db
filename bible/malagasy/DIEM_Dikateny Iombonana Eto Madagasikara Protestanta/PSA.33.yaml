document_id: PSA.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fiderana an’Andriamanitra mpahary sy mpamonjy
  - type: text
    content: Manaova horakora-pihobiana, ry olo-marina,
  - type: text
    content: noho ny amin’izay nataon’ny TOMPO;
  - type: text
    content: fa tombontsoa ho anareo
  - type: text
    content: ny midera Azy, ry olo-mahitsy.
  '10':
  - type: text
    content: Ny TOMPO maharava ny fikasan’ny firenena
  - type: text
    content: ary mahasakana ny hevitry ny vahoaka;
  '11':
  - type: text
    content: fa ny fikasan’ny TOMPO no maharitra mandrakizay,
  - type: text
    content: ny hevitry ny fony manerana ny taranaka mifandimby.
  '12':
  - type: text
    content: Sambatra ny firenena
  - type: text
    content: manana ny TOMPO ho Andriamanitra;
  - type: text
    content: sambatra ny vahoaka
  - type: text
    content: nofidiny mba ho Azy manokana.
  '13':
  - type: text
    content: Avy eny an-danitra ny TOMPO no mitsinjo
  - type: text
    content: sy mijery ny olombelona rehetra;
  '14':
  - type: text
    content: Avy eo an-tsezafiandrianany no andinihany
  - type: text
    content: ny mponina rehetra etỳ ambonin’ny tany.
  '15':
  - type: text
    content: Mpamorona ny saina amam-piniavana Izy,
  - type: text
    content: ka mahalala izay rehetra ataon’ny olona.
  '16':
  - type: text
    content: Raha handresy amin’ny ady ny mpanjaka,
  - type: text
    content: dia tsy noho ny hamaroan’ny miaramilany;
  - type: text
    content: ary raha afa-doza ny mpiady,
  - type: text
    content: dia tsy noho ny haben’ny heriny.
  '17':
  - type: text
    content: Fa ny soavaly tsy azo itokiana
  - type: text
    content: hahazoam-pandresena;
  - type: text
    content: ary na matanjaka be aza izy,
  - type: text
    content: dia tsy mahavonjy ny mpitaingina azy.
  '18':
  - type: text
    content: Tsinjovin’ny TOMPO kosa ireo mpanaja Azy,
  - type: text
    content: dia ireo olona miantehitra amin’ny fitiavany,
  '19':
  - type: text
    content: mba hanafaka ny ainy amin’ny fahafatesana
  - type: text
    content: sy hamelona azy na dia misy mosary aza.
  '2':
  - type: text
    content: Miderà ny TOMPO amin’ny lokanga;
  - type: text
    content: ka salamo arahim-baliha torifolo
  - type: text
    content: no ataovy ho fankalazana Azy
  - type: note
    content: Jereo Sal 150.3 sy nta.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Miandry ny TOMPO tokoa isika:'
  - type: text
    content: famonjena sy fiarovana ho antsika Izy.
  '21':
  - type: text
    content: Eny, Izy Tompo no ifalian’ny fontsika;
  - type: text
    content: masina ny anarany ka itokiantsika.
  '22':
  - type: text
    content: TOMPO ô, ho aminay anie ny fitiavanao
  - type: text
    content: araka ny ianteheranay aminao!
  '3':
  - type: text
    content: Mihirà hira vaovao ho Azy.
  - type: text
    content: Manaova feon-java-maneno kanto
  - type: text
    content: miaraka amin’ny fihobiana.
  '4':
  - type: text
    content: Fa mahitsy ny tenin’ny TOMPO
  - type: text
    content: ka azo antoka avokoa izay ataony.
  '5':
  - type: text
    content: Ny rariny sy ny hitsiny lalainy;
  - type: text
    content: ny fitiavany manenika ny tany.
  '6':
  - type: text
    content: Nandidy ny TOMPO, dia vita ny lanitra;
  - type: text
    content: niteny Izy, dia ary ny planeta sy ny kintana.
  '7':
  - type: text
    content: Angoniny sy fefeny ny rano an-dranomasina
  - type: text
    content: ataony am-pitahirizana azy ny rano lalimbe.
  '8':
  - type: text
    content: Hatahotra ny TOMPO anie ny tany tontolo;
  - type: text
    content: hangovitra eo anatrehany anie
  - type: text
    content: ny mponina rehetra ao aminy!
  '9':
  - type: text
    content: Fa niteny Izy, dia tonga izay voalazany;
  - type: text
    content: nandidy Izy, dia nisy avy hatrany ireny.
