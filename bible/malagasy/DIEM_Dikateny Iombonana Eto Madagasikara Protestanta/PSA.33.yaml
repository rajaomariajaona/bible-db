document_id: PSA.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Fiderana an’Andriamanitra mpahary sy mpamonjy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Manaova horakora-pihobiana, ry olo-marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny amin’izay nataon’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tombontsoa ho anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny midera Azy, ry olo-mahitsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miderà ny TOMPO amin’ny lokanga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka salamo arahim-baliha torifolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ataovy ho fankalazana Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 150.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mihirà hira vaovao ho Azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova feon-java-maneno kanto
- type: usfm
  marker: q1
  children:
  - type: text
    text: miaraka amin’ny fihobiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa mahitsy ny tenin’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka azo antoka avokoa izay ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny rariny sy ny hitsiny lalainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitiavany manenika ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nandidy ny TOMPO, dia vita ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: niteny Izy, dia ary ny planeta sy ny kintana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Angoniny sy fefeny ny rano an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataony am-pitahirizana azy ny rano lalimbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hatahotra ny TOMPO anie ny tany tontolo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hangovitra eo anatrehany anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mponina rehetra ao aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa niteny Izy, dia tonga izay voalazany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandidy Izy, dia nisy avy hatrany ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny TOMPO maharava ny fikasan’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahasakana ny hevitry ny vahoaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fa ny fikasan’ny TOMPO no maharitra mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hevitry ny fony manerana ny taranaka mifandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sambatra ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: manana ny TOMPO ho Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sambatra ny vahoaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: nofidiny mba ho Azy manokana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Avy eny an-danitra ny TOMPO no mitsinjo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mijery ny olombelona rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avy eo an-tsezafiandrianany no andinihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mponina rehetra etỳ ambonin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mpamorona ny saina amam-piniavana Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahalala izay rehetra ataon’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha handresy amin’ny ady ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy noho ny hamaroan’ny miaramilany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary raha afa-doza ny mpiady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy noho ny haben’ny heriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny soavaly tsy azo itokiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahazoam-pandresena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na matanjaka be aza izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mahavonjy ny mpitaingina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsinjovin’ny TOMPO kosa ireo mpanaja Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo olona miantehitra amin’ny fitiavany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: mba hanafaka ny ainy amin’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamelona azy na dia misy mosary aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Miandry ny TOMPO tokoa isika:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: famonjena sy fiarovana ho antsika Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eny, Izy Tompo no ifalian’ny fontsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: masina ny anarany ka itokiantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: TOMPO ô, ho aminay anie ny fitiavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny ianteheranay aminao!
