      children:
      - type: text
        text: '6'
    - type: text
      text: Manasoa anay tokoa Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Andriamanitra Mpamonjy anay;
  - type: usfm
    marker: q1
    children:
