document_id: PSA.65,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Andriamanitra ô, mendrika hoderaina Ianao
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida. Tononkira.
  '10':
  - type: text
    content: Tompo ô, miahy ny tany Ianao,
  - type: text
    content: manondraka azy amin’ora-mikija
  - type: text
    content: ka mahatonga azy ho vokatra tokoa.
  - type: text
    content: Ilay reniranonao
  - type: note
    content: 'reniranonao: jereo Sal 46.5; Ezek 47; Jôb 4.18; Za 14.8.'
  - type: text
    content: ', Andriamanitra ô,'
  - type: text
    content: dia tondraka midibadiba hatrany.
  - type: text
    content: Vary ho an’ny olona no omaninao
  - type: text
    content: 'ka toy izao no fikolokoloanao ny tany:'
  '11':
  - type: text
    content: ny soritr’asa ataonao ampo-drano
  - type: text
    content: ny bainga motahinao sy aravonao;
  - type: text
    content: oram-batravatra no amontosanao azy
  - type: text
    content: ka ombànao fitahiana ny tsirim-bary.
  '12':
  - type: text
    content: Dia zava-tsoa no toa fehiloha
  - type: text
    content: izay asatrokao ny taona;
  - type: text
    content: ka fahavokarana mitafotafo
  - type: text
    content: no amin’izay andalovanao.
  '13':
  - type: text
    content: Maitso mavana ny ahitra an-tanety,
  - type: text
    content: ka feno fifaliana ny havoana;
  '14':
  - type: text
    content: Rakotra ondry aman’osy ny tanimbilona,
  - type: text
    content: ary voasarom-bary ny lohasaha
  - type: text
    content: ka manako ny hoby sy ny hira ho Anao.
  '2':
  - type: text
    content: 'Ry Andriamanitra monina ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ô,'
  - type: text
    content: mendrika hoderaina Ianao
  - type: text
    content: sy hanefana ny voady natao.
  '3':
  - type: text
    content: Satria mpihaino vavaka Ianao,
  - type: text
    content: dia hatonin’ny olona rehetra
  '4':
  - type: text
    content: samy vesaran’ny heloka vitany.
  - type: text
    content: Ny hadisoanay tsy zakanay;
  - type: text
    content: Ianao kosa no mikosoka azy.
  '5':
  - type: text
    content: Sambatra ny olona izay voafidinao
  - type: text
    content: ka asainao honina ao an-kianjanao!
  - type: text
    content: 'Hamoky anay ny zava-tsoan’ny '
  - type: text
    content: tranonao
  - type: text
    content: ','
  - type: text
    content: 'dia ny zava-masin’ny '
  - type: text
    content: tempolinao
  - type: text
    content: .
  '6':
  - type: text
    content: Manasoa anay tokoa Ianao,
  - type: text
    content: ry Andriamanitra Mpamonjy anay;
  - type: text
    content: ka dia zava-mampitolagaga
  - type: text
    content: no amalianao ny vavakay,
  - type: text
    content: ry hany fanantenan’ny vahoaka
  - type: text
    content: hatrany am-paran’ny tany rehetra
  - type: text
    content: mbamin’ireo nosy any lavitra any.
  '7':
  - type: text
    content: Tompo ô, tanjaka sy hery no asehonao,
  - type: text
    content: ka ataonao miorina mafy ny vohitra,
  '8':
  - type: text
    content: tonenao ny riaka misamboaravoara
  - type: text
    content: sy ireto onjany mirohondrohona,
  - type: text
    content: ampangininao ny firenena mitabataba.
  '9':
  - type: text
    content: Noho ireo famantarana ataonao,
  - type: text
    content: dia mitolagaga ny vahoaka
  - type: text
    content: hatrany am-paran’ny tany;
  - type: text
    content: na tatsinanana na tandrefana
  - type: text
    content: dia entaninao hihorakoraka hihoby.
