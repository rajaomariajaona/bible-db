      text: ka dia zava-mampitolagaga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no amalianao ny vavakay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry hany fanantenan’ny vahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany am-paran’ny tany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ireo nosy any lavitra any.
  '7':
