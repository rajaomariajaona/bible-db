document_id: 2CH.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanatsara ny fitondràm-panjakana tao Joda i Jôsafata
  - type: text
    content: 'Dia niverina soa aman-tsara tao an-dapany, tao Jerosalema, i Jôsafata mpanjakan’i Joda. '
  '10':
  - type: text
    content: 'Na inona na inona ady avy amin’ny mpiray firenena, any amin’ny tanàna fonenany any momba ny vonoan’olona na momba ny lalàna sy didy amam-pitsipika samy hafa, dia anaro izy; dia tsy ho meloka amin’ny TOMPO ireo, ary tsy hiharan’ny fahatezeran’Andriamanitra ianareo sy ny mpiray firenena aminareo. Izany no ataovy, dia tsy ho meloka ianareo. '
  '11':
  - type: text
    content: Ary indro i Amarià mpisorombe no ho lehibenareo amin’ny raharaham-pivavahana rehetra; ary i Zebadià, zanakalahin’i Jismahela sady mpifehy ny taranak’i Joda, no ho lehibenareo amin’ny raharaham-panjakana rehetra. Ny levita no ho mpitantsoratra hanampy anareo. Mahereza, ka mahefà, ary ny TOMPO anie hiaraka amin’izay manao ny tsara!
  '2':
  - type: text
    content: 'Niainga hitsena azy i Jehò '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Hananỳ, ka nanao taminy hoe:'
  - type: text
    content: '–Moa ny olon-dratsy ve no tokony hampiana ary izay mpankahala ny TOMPO va no tokony hotiavinao? Noho izany, dia tezitra aminao ny TOMPO. '
  '3':
  - type: text
    content: 'Kanefa misy hatsaram-panahy hita ihany aminao, satria nofoananao tsy ho eo amin’ny taninao ny tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: ' sady naronanao ny fonao hitady an’Andriamanitra.'
  '4':
  - type: text
    content: 'Nitoetra tao Jerosalema i Jôsafata; ary nandeha hitety vahoaka indray izy hatrany Beera-Seba ka hatrany amin’ny tendrombohitr’i Efraîma, ary nampiverina azy ho amin’ny TOMPO Andriamanitry ny razany. '
  '5':
  - type: text
    content: 'Nanendreny mpitsara tamin’ny isan-tanànamimanda eran’ny tanin’i Joda '
  '6':
  - type: text
    content: 'sady nohafatrafarany hoe:'
  - type: text
    content: '–Tandremo izay hataonareo, satria tsy araka ny olona fa araka ny TOMPO no hitsaranareo; sady ny Tompo mihitsy no hiaraka aminareo rehefa mitsara ianareo. '
  '7':
  - type: text
    content: Koa ho ao aminareo anie ny fanajana ny TOMPO! Tandremo sy ataovy izany, fa tsy tia heloka na fizahan-tavan’olona na fandraisan-kolikoly ny TOMPO Andriamanitsika.
  '8':
  - type: text
    content: 'Tao Jerosalema koa dia nanendren’i Jôsafata ny sasany tamin’ny '
  - type: text
    content: levita
  - type: text
    content: ' sy ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' ary ny filoham-pianakaviana israelita mba hitsara araka ny TOMPO sy handamina ny adin’ny mponina tao an-tanàna. '
  '9':
  - type: text
    content: 'Dia nomeny baiko ireo ka nilazany hoe:'
  - type: text
    content: '–Izao no hataonareo noho ny fanajana ny TOMPO araka ny toetra mahatoky sy ny hitsimpo. '
