document_id: 2CH.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanatsara ny fitondràm-panjakana tao Joda i Jôsafata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niverina soa aman-tsara tao an-dapany, tao Jerosalema, i Jôsafata mpanjakan’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niainga hitsena azy i Jehò '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' zanakalahin’i Hananỳ, ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Moa ny olon-dratsy ve no tokony hampiana ary izay mpankahala ny TOMPO va no tokony hotiavinao? Noho izany, dia tezitra aminao ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Kanefa misy hatsaram-panahy hita ihany aminao, satria nofoananao tsy ho eo amin’ny taninao ny tsatokazo fanajana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: text
    text: ' sady naronanao ny fonao hitady an’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nitoetra tao Jerosalema i Jôsafata; ary nandeha hitety vahoaka indray izy hatrany Beera-Seba ka hatrany amin’ny tendrombohitr’i Efraîma, ary nampiverina azy ho amin’ny TOMPO Andriamanitry ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanendreny mpitsara tamin’ny isan-tanànamimanda eran’ny tanin’i Joda '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sady nohafatrafarany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tandremo izay hataonareo, satria tsy araka ny olona fa araka ny TOMPO no hitsaranareo; sady ny Tompo mihitsy no hiaraka aminareo rehefa mitsara ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa ho ao aminareo anie ny fanajana ny TOMPO! Tandremo sy ataovy izany, fa tsy tia heloka na fizahan-tavan’olona na fandraisan-kolikoly ny TOMPO Andriamanitsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tao Jerosalema koa dia nanendren’i Jôsafata ny sasany tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' ary ny filoham-pianakaviana israelita mba hitsara araka ny TOMPO sy handamina ny adin’ny mponina tao an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nomeny baiko ireo ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no hataonareo noho ny fanajana ny TOMPO araka ny toetra mahatoky sy ny hitsimpo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Na inona na inona ady avy amin’ny mpiray firenena, any amin’ny tanàna fonenany any momba ny vonoan’olona na momba ny lalàna sy didy amam-pitsipika samy hafa, dia anaro izy; dia tsy ho meloka amin’ny TOMPO ireo, ary tsy hiharan’ny fahatezeran’Andriamanitra ianareo sy ny mpiray firenena aminareo. Izany no ataovy, dia tsy ho meloka ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary indro i Amarià mpisorombe no ho lehibenareo amin’ny raharaham-pivavahana rehetra; ary i Zebadià, zanakalahin’i Jismahela sady mpifehy ny taranak’i Joda, no ho lehibenareo amin’ny raharaham-panjakana rehetra. Ny levita no ho mpitantsoratra hanampy anareo. Mahereza, ka mahefà, ary ny TOMPO anie hiaraka amin’izay manao ny tsara!
