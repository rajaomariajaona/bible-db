document_id: PSA.58,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Misy Andriamanitra mitsara tokoa eto an-tany
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hohiraina araka ny feon’ny hoe «Aza ravana....» Salamo nataon’i Davida.
  '10':
  - type: text
    content: Tsy mbola tonga kirihitra akory
  - type: text
    content: ny tsilo novolen’ny olon-dratsy,
  - type: text
    content: dia hongotan’ny tafiotra sahady
  - type: text
    content: na mbola maitso na efa maina.
  '11':
  - type: text
    content: Ny olo-marina hifaly hahita ny famaliana ny mpanota
  - type: text
    content: sy hanasa tongotra amin’ny ran’ireo olon-dratsy.
  '12':
  - type: text
    content: 'Amin’izay ny besinimaro hiaiky hoe:'
  - type: text
    content: «Eny, valisoa no anjaran’ny olomarina;
  - type: text
    content: eny, misy Andriamanitra mitsara eto an-tany.»
  '2':
  - type: text
    content: Moa dia ny rariny tokoa ve
  - type: text
    content: no lazainareo, ry manampahefana
  - type: note
    content: Ampit Sal 82.2.
  - type: text
    content: '?'
  - type: text
    content: Moa araka ny hitsiny ve
  - type: text
    content: no itsaranareo ny olona?
  '3':
  - type: text
    content: Tsy izany, fa minia manao ny ratsy ianareo;
  - type: text
    content: ny herisetra ataonareo no afafinareo amin’ity tany ity.
  '4':
  - type: text
    content: Hatrany am-bohòka ny olon-dratsy no mivoana;
  - type: text
    content: hatramin’ny vao teraka ny mpandainga no maniasia.
  '5':
  - type: text
    content: Misy poizina tahaka ny menarana izy;
  - type: text
    content: manentsin-tadîny tahaka ny bibilava marenina
  '6':
  - type: text
    content: izay tsy mihaino ny mpanao safosiaka azy,
  - type: text
    content: na dia ny mahasondriana indrindra aza.
  '7':
  - type: text
    content: Andriamanitra ô, torotoroy ao am-bavany ny nifiny;
  - type: text
    content: TOMPO ô, montsany ny vangin’ireo zary liona ireo.
  '8':
  - type: text
    content: Hihanaka toa rano abosasaka anie izy,
  - type: text
    content: hadisadisa toa ahitra voahosihosy;
  '9':
  - type: text
    content: ho tahaka ny lelosy anie izy,
  - type: text
    content: ka hiempo eny am-pandehanana;
  - type: text
    content: ho tahaka ny zaza tsy tonga volana
  - type: text
    content: ka tsy hahita masoandro na oviana na oviana!
