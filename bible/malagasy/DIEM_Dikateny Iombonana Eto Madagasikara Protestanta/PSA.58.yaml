segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Misy Andriamanitra mitsara tokoa eto an-tany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tao amin’ny tahirin-kiran’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira.
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hohiraina araka ny feon’ny hoe «Aza ravana....» Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Moa dia ny rariny tokoa ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: no lazainareo, ry manampahefana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 82.2.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa araka ny hitsiny ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: no itsaranareo ny olona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy izany, fa minia manao ny ratsy ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny herisetra ataonareo no afafinareo amin’ity tany ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hatrany am-bohòka ny olon-dratsy no mivoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny vao teraka ny mpandainga no maniasia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Misy poizina tahaka ny menarana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manentsin-tadîny tahaka ny bibilava marenina
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: izay tsy mihaino ny mpanao safosiaka azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ny mahasondriana indrindra aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Andriamanitra ô, torotoroy ao am-bavany ny nifiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, montsany ny vangin’ireo zary liona ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hihanaka toa rano abosasaka anie izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hadisadisa toa ahitra voahosihosy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ho tahaka ny lelosy anie izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiempo eny am-pandehanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny zaza tsy tonga volana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hahita masoandro na oviana na oviana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy mbola tonga kirihitra akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsilo novolen’ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hongotan’ny tafiotra sahady
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mbola maitso na efa maina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny olo-marina hifaly hahita ny famaliana ny mpanota
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanasa tongotra amin’ny ran’ireo olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amin’izay ny besinimaro hiaiky hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Eny, valisoa no anjaran’ny olomarina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, misy Andriamanitra mitsara eto an-tany.»
