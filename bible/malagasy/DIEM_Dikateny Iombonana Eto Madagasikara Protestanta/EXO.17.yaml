document_id: EXO.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny rano tao Masà sy Meribà
  - type: text
    content: Araka ny baikon’ny TOMPO dia niala tao an-taniefitr’i Sina ny fiangonana Israelita manontolo mba hanohy ny diany. Nitoby tao Refidima
  - type: note
    content: 'Refidima: toerana tsy fantatra, saingy tokony ho any amin’ny manodidina an’i Sinay.'
  - type: text
    content: ' izy, kanefa tsy nisy rano hosotroin’ny vahoaka tao. '
  '10':
  - type: text
    content: 'Dia lasa i Josoa niady tamin’ny Hamalekita araka izay efa nandidian’i Mosesy azy; fa i Mosesy sy i Aharôna ary i Hora kosa dia niakatra teny an-tampon’ny havoana. '
  '11':
  - type: text
    content: 'Ary raha mbola nasandratr’i Mosesy ny tanany, dia nahery ny Israelita; fa rehefa navelany hidina, dia nahery ny Hamalekita. '
  '12':
  - type: text
    content: 'Ary nony vizaka ireo sandrin’i Mosesy, dia nalain’i Aharôna sy i Hora ny vato ka napetrany teo anilan’i Mosesy, ary nipetraka teo ambonin’io i Mosesy. Dia avy i Aharôna sy i Hora ka nanohana ny sandriny teo an-daniny sy an-kilany, dia naharitra tsy nidina ny tanany ambara-pilentiky ny masoandro. '
  '13':
  - type: text
    content: Koa resin’i Josoa tanteraka tamin’ny lelan-tsabatra ny tafika hamalekita.
  '14':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Soraty ao amin’ny boky izany mba tsy hohadinoina; ary ambarao amin’i Josoa fa hofoanako tsy ho eto ambonin’ny tany mihitsy ny fahatsiarovana ny Hamalekita
  - type: note
    content: Jereo Deot 25.17-19; 1 Sam 15.2-9.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Dia nanamboatra '
  - type: text
    content: alitara
  - type: text
    content: ' teo i Mosesy ka nomeny anarana hoe «Ny TOMPO fanevako». '
  '16':
  - type: text
    content: 'Ary hoy izy hoe:'
  - type: text
    content: –Satria ny Hamalekita efa nanainga tanana hanohitra ny sezafiandrianan’ny Tompo, dia hiady amin’izy ireo hatrany hatrany ny TOMPO.
  '2':
  - type: text
    content: 'Dia nila ady tamin’i Mosesy ny Israelita ka nanao taminy hoe:'
  - type: text
    content: –Omeo
  - type: note
    content: 'Omeo: araka ny stf tranainy sy ny dikanteny tranainy maro; fa ny RM dia manao hoe Omeonareo.'
  - type: text
    content: rano hosotroina izahay!
  - type: text
    content: 'Fa nanontany azy ireo i Mosesy hoe:'
  - type: text
    content: –Nahoana no mila ady amiko ianareo? Nahoana no maka fanahy ny TOMPO ianareo?
  '3':
  - type: text
    content: 'Fa rehefa main’ny hetaheta mafy ny vahoaka, dia nimonomonona tamin’i Mosesy ka nanao taminy hoe:'
  - type: text
    content: –Nahoana moa ianao no nampiakatra anay niala tany Ejipta? Moa ny hahatonga anay ho fatin-ketaheta eto miaraka amin’ny zanakay sy ny bibinay ve?
  '4':
  - type: text
    content: 'Dia niantso vonjy tamin’ny TOMPO i Mosesy nanao hoe:'
  - type: text
    content: –Inona no hataoko amin’ity vahoaka ity? Fa mila hitora-bato ahy mihitsy izy!
  '5':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy hoe:'
  - type: text
    content: '–Mandalova eo anoloan’ny vahoaka, makà vitsivitsy amin’ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely hiaraka aminao. Ento eny an-tananao ilay tehinao izay nikapohanao ny ranon’i Neily ka mandehana. '
  '6':
  - type: text
    content: 'Izaho kosa dia hijoro eo anoloanao, eo ambonin’ny harambato eny an-tendrombohitra '
  - type: text
    content: Hôreba
  - type: text
    content: ; hokapohinao ny harambato, dia hamoaka rano hosotroin’ny vahoaka.
  - type: text
    content: Dia notanterahin’i Mosesy teo imason’ny loholon’i Israely izany baiko izany.
  '7':
  - type: text
    content: 'Nantsoina hoe Masà sy Meribà io toerana io, izany hoe «fakana fanahy» sy «filàna ady» satria nila ady tamin’i Mosesy ny Israelita, ary naka fanahy ny TOMPO tamin’ny nitenenany hoe: «Moa eto aminay tokoa ve ny TOMPO sa tsia?»'
  - type: heading
    content: Mamely ny Israelita ny Hamalekita
  '8':
  - type: text
    content: Tonga hiady amin’ny Israelita tao Refidima ny Hamalekita
  - type: note
    content: Ny Hamalekita dia nonina tamin’ireo faritany atsimon’i Palestinina, kanefa afaka nifindrafindra tsindraindray nankany amin’ny saikanosy Sinay. Fahavalo masiaka ho an’i Israely izy ireo; jereo and 16.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Josoa:'
  - type: text
    content: '–Mifidiana lehilahy afaka hiaro antsika, dia mivoaha hiady amin’ny Hamalekita. Izaho kosa rahampitso dia hijoro eo an-tampon’ny havoana miaraka amin’ny tehin’Andriamanitra eny an-tanako. '
