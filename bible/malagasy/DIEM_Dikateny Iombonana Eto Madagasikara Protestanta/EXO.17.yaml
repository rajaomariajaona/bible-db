document_id: EXO.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny rano tao Masà sy Meribà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Araka ny baikon’ny TOMPO dia niala tao an-taniefitr’i Sina ny fiangonana Israelita manontolo mba hanohy ny diany. Nitoby tao Refidima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Refidima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra, saingy tokony ho any amin’ny manodidina an’i Sinay.
    marker-yv: yv-n
  - type: text
    text: ' izy, kanefa tsy nisy rano hosotroin’ny vahoaka tao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nila ady tamin’i Mosesy ny Israelita ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Omeo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Omeo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny stf tranainy sy ny dikanteny tranainy maro; fa ny RM dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Omeonareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: rano hosotroina izahay!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa nanontany azy ireo i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no mila ady amiko ianareo? Nahoana no maka fanahy ny TOMPO ianareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa rehefa main’ny hetaheta mafy ny vahoaka, dia nimonomonona tamin’i Mosesy ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana moa ianao no nampiakatra anay niala tany Ejipta? Moa ny hahatonga anay ho fatin-ketaheta eto miaraka amin’ny zanakay sy ny bibinay ve?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niantso vonjy tamin’ny TOMPO i Mosesy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no hataoko amin’ity vahoaka ity? Fa mila hitora-bato ahy mihitsy izy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandalova eo anoloan’ny vahoaka, makà vitsivitsy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely hiaraka aminao. Ento eny an-tananao ilay tehinao izay nikapohanao ny ranon’i Neily ka mandehana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izaho kosa dia hijoro eo anoloanao, eo ambonin’ny harambato eny an-tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: text
    text: ; hokapohinao ny harambato, dia hamoaka rano hosotroin’ny vahoaka.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia notanterahin’i Mosesy teo imason’ny loholon’i Israely izany baiko izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nantsoina hoe Masà sy Meribà io toerana io, izany hoe «fakana fanahy» sy «filàna ady» satria nila ady tamin’i Mosesy ny Israelita, ary naka fanahy ny TOMPO tamin’ny nitenenany hoe: «Moa eto aminay tokoa ve ny TOMPO sa tsia?»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamely ny Israelita ny Hamalekita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tonga hiady amin’ny Israelita tao Refidima ny Hamalekita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny Hamalekita '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia nonina tamin’ireo faritany atsimon’i Palestinina, kanefa afaka nifindrafindra tsindraindray nankany amin’ny saikanosy Sinay. Fahavalo masiaka ho an’i Israely izy ireo; jereo and 16.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy i Mosesy tamin’i Josoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mifidiana lehilahy afaka hiaro antsika, dia mivoaha hiady amin’ny Hamalekita. Izaho kosa rahampitso dia hijoro eo an-tampon’ny havoana miaraka amin’ny tehin’Andriamanitra eny an-tanako. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia lasa i Josoa niady tamin’ny Hamalekita araka izay efa nandidian’i Mosesy azy; fa i Mosesy sy i Aharôna ary i Hora kosa dia niakatra teny an-tampon’ny havoana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha mbola nasandratr’i Mosesy ny tanany, dia nahery ny Israelita; fa rehefa navelany hidina, dia nahery ny Hamalekita. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nony vizaka ireo sandrin’i Mosesy, dia nalain’i Aharôna sy i Hora ny vato ka napetrany teo anilan’i Mosesy, ary nipetraka teo ambonin’io i Mosesy. Dia avy i Aharôna sy i Hora ka nanohana ny sandriny teo an-daniny sy an-kilany, dia naharitra tsy nidina ny tanany ambara-pilentiky ny masoandro. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa resin’i Josoa tanteraka tamin’ny lelan-tsabatra ny tafika hamalekita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Soraty ao amin’ny boky izany mba tsy hohadinoina; ary ambarao amin’i Josoa fa hofoanako tsy ho eto ambonin’ny tany mihitsy ny fahatsiarovana ny Hamalekita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 25.17-19; 1 Sam 15.2-9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanamboatra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' teo i Mosesy ka nomeny anarana hoe «Ny TOMPO fanevako». '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Satria ny Hamalekita efa nanainga tanana hanohitra ny sezafiandrianan’ny Tompo, dia hiady amin’izy ireo hatrany hatrany ny TOMPO.
