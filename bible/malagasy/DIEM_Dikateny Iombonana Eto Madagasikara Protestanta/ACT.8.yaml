      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amin’izao mitataovovonana izao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo 22.6).'
      marker-yv: yv-n
    - type: text
      text: ' ka mizora ny lalana midina avy eto Jerosalema mankany Gaza, dia ny lalana mamakivaky taniefitra.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha avy hatrany i Filipo. Ary indro nisy lehilahy etiôpianina: izy io dia manamboninahitra tandapan’ny Kandasy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kandasy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tsy anaran’olona fa anaram-boninahitra iantsoana ny mpanjakavavin’i Etiôpia, toy ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Farao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' iantsoana ny mpanjakan’i Ejipta.'
      marker-yv: yv-n
    - type: text
      text: ' (mpanjakavavin’i Etiôpia) sady mpitandrina ny fananany rehetra; nivahiny tany Jerosalema ralehilahy mba hivavaka, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary efa mby an-dalana hody tamin’izay. Nipetraka tao amin’ny kalesiny izy ary namaky ny bokin’i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny Fanahy Masina tamin’i Filipo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandrosoa ka hatòny io kalesy io.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay i Saoly dia nilofo handringana ny Fiangonana. Noteteziny nidirana ny isan-trano, nataony sinto-mahery navoaka ny mpino na lahy na vavy ka nalefany tany am-ponja
    - type: usfm
