  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maro ny olona nandroahana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanahy maloto
    - type: text
      text: ' ary nikiakiaka ireny fanahy maloto ireny rehefa niala; maro koa ny malemy sy ny mandringa no sitrana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisy hafaliana be tao amin’izany tanàna izany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy lehilahy atao hoe Simôna efa tao amin’izany tanàna izany rahateo. Mpanao majika izy ka nahatalanjona ny mponina eran’i Samaria sady nanao ny tenany ho zavatra. '
