document_id: ACT.8,396
type_code: plt
verses:
  '1':
  - type: text
    content: Avy nilaza izany izy, dia nodimandry.
  - type: text
    content: Ary i Saoly nankasitraka ny namonoana an’i Stefàna
  - type: note
    content: Ampit 22.20.
  - type: text
    content: .
  - type: heading
    content: Manenjika ny Fiangonana i Saoly
  - type: text
    content: 'Androtr’iny ihany dia nipoaka ny fanenjehana mahery vaika nihatra tamin’ny Fiangonana tao Jerosalema. Niely patrana eran’ny faritany Jodea sy Samaria ny mpino rehetra, afa-tsy ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' ihany. '
  '10':
  - type: text
    content: 'Babony daholo ny olona, hatramin’ny kely ka hatramin’ny lehibe, ka vaky vava hoe:'
  - type: text
    content: –Ity lehilahy ity no herin’Andriamanitra, dia ilay antsoina hoe «hery lehibe».
  '11':
  - type: text
    content: 'Babon’i Simôna tokoa ny olona satria hatramin’ny ela no talanjona tamin’ny majîkany. '
  '12':
  - type: text
    content: 'Saingy rehefa nino ny Vaovao Mahafaly notorîn’i Filipo momba ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' sy momba an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' izy ireo, dia niroso hatao '
  - type: text
    content: batisa
  - type: text
    content: ' avokoa na lahy na vavy. '
  '13':
  - type: text
    content: Ny tenan’i Simôna koa aza dia nino ka natao batisa; tsy nahasaraka an’i Filipo izy ary talanjona nahita ny famantarana sy ny asa lehibe mahagaga izay notontosaina.
  '14':
  - type: text
    content: 'Ren’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' tany Jerosalema fa nandray ny tenin’Andriamanitra ny mponina tao Samaria, ka nirahiny hankany i Petera sy i Jôhany. '
  '15':
  - type: text
    content: 'Rehefa tonga tany Samaria izy roa lahy, dia nivavaka ho an’ny mpino mba handraisany ny Fanahy Masina; '
  '16':
  - type: text
    content: 'satria tsy mbola nisy nilatsahan’ny Fanahy Masina ireo mpino ireo na iray aza, fa vita batisa tamin’ny anaran’i Jesoa Tompo ihany. '
  '17':
  - type: text
    content: Dia nametrahan’i Petera sy Jôhany tanana izy rehetra ka nandray ny Fanahy Masina.
  '18':
  - type: text
    content: 'Nony hitan’i Simôna fa ny '
  - type: text
    content: fametrahan’ny apôstôly tanana
  - type: text
    content: ' no nanomezana ny Fanahy Masina tamin’ireo mpino, dia notolorany vola i Petera sy i Jôhany '
  '19':
  - type: text
    content: 'sady nataony hoe:'
  - type: text
    content: –Omeo ahy koa re izany fahefana izany, dia mba handray ny Fanahy Masina izay olona hametrahako tanana.
  '2':
  - type: text
    content: Nisy kosa mpivavaka tsara nandevina an’i Stefàna sady nisaona azy fatratra.
  '20':
  - type: text
    content: 'Fa hoy i Petera taminy:'
  - type: text
    content: '–Vereza miaraka amin’ny tenanao ny volanao satria nataonao fa azo vidîm-bola ny fanomezan’Andriamanitra. '
  '21':
  - type: text
    content: 'Tsy misy anjaranao na lovanao amin’ity raharaha ity satria tsy mahitsy fo eo anatrehan’Andriamanitra ianao. '
  '22':
  - type: text
    content: 'Koa ialao izao faharatsianao izao ary mangataha amin’ny Tompo mba hamelany izany fihevitry ny fonao izany, raha azo atao. '
  '23':
  - type: text
    content: Hitako manko fa mbola feno fialonana mangidy sy voafatotry ny fahotana ianao.
  '24':
  - type: text
    content: 'Dia hoy i Simôna tamin’i Petera sy i Jôhany:'
  - type: text
    content: –Ianareo mihitsy no mangataha ho ahy amin’ny Tompo, mba tsy hisy hihatra amiko akory izay voalazanareo.
  '25':
  - type: text
    content: Rehefa avy nanao fijoroana vavolombelona sy nitory ny tenin’ny Tompo ry i Petera sy i Jôhany, dia nitodi-doha ho any Jerosalema, ka nanambara ny Vaovao Mahafaly teny amin’ny tanàna kely maro eran’i Samaria.
  - type: heading
    content: I Filipo sy ilay tandapa etiôpianina
  '26':
  - type: text
    content: 'Nisy '
  - type: text
    content: anjelin
  - type: text
    content: '’ny Tompo nanao tamin’i Filipo hoe:'
  - type: text
    content: –Ndeha ianao mianatsimo
  - type: note
    content: mianatsimo na hoe amin’izao mitataovovonana izao (jereo 22.6).
  - type: text
    content: ' ka mizora ny lalana midina avy eto Jerosalema mankany Gaza, dia ny lalana mamakivaky taniefitra.'
  '27':
  - type: text
    content: 'Dia nandeha avy hatrany i Filipo. Ary indro nisy lehilahy etiôpianina: izy io dia manamboninahitra tandapan’ny Kandasy'
  - type: note
    content: 'Kandasy: tsy anaran’olona fa anaram-boninahitra iantsoana ny mpanjakavavin’i Etiôpia, toy ny hoe Farao iantsoana ny mpanjakan’i Ejipta.'
  - type: text
    content: ' (mpanjakavavin’i Etiôpia) sady mpitandrina ny fananany rehetra; nivahiny tany Jerosalema ralehilahy mba hivavaka, '
  '28':
  - type: text
    content: 'ary efa mby an-dalana hody tamin’izay. Nipetraka tao amin’ny kalesiny izy ary namaky ny bokin’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Dia hoy ny Fanahy Masina tamin’i Filipo:'
  - type: text
    content: –Mandrosoa ka hatòny io kalesy io.
  '3':
  - type: text
    content: Tamin’izay i Saoly dia nilofo handringana ny Fiangonana. Noteteziny nidirana ny isan-trano, nataony sinto-mahery navoaka ny mpino na lahy na vavy ka nalefany tany am-ponja
  - type: note
    content: Ampit 22.4-5; 26.9-11.
  - type: text
    content: .
  - type: heading
    content: Itoriana ny Vaovao Mahafaly ny any Samaria
  '30':
  - type: text
    content: Nilomay nanatona i Filipo ka nandre ilay Etiôpianina namaky
  - type: note
    content: namaky teny mafy ilay tandapa, araka ny mahazatra ny olona fahizany.
  - type: text
    content: ' ny bokin’i Isaià mpaminany, ary nanontany azy hoe:'
  - type: text
    content: –Azonao ve ny teny vakînao?
  '31':
  - type: text
    content: 'Dia novalian-dralehilahy hoe:'
  - type: text
    content: –Ahoana moa no ho azoko, raha tsy mba misy manazava?
  - type: text
    content: 'Niangavian’ilay tandapa i Filipo mba hitaingina ny kalesiny ary hipetraka eo anilany. '
  '32':
  - type: text
    content: 'Izao kosa no andalan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' vinakin’ilay tandapa:'
  - type: text
    content: «Toy ny ondry nentina hovonoina Izy,
  - type: text
    content: 'ary toy ny zanak’ondry moana manoloana ny mpanety azy:'
  - type: text
    content: tsy niloa-bava akory!
  '33':
  - type: text
    content: Natao tsinontsinona Izy ary tsy nahazo rariny.
  - type: text
    content: Ary iza moa no hanan-kotantaraina ny amin’izay taranany?
  - type: text
    content: Satria fongotra teto an-tany ny fiainany
  - type: note
    content: 'And 32-33: Is 53.7-8, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  '34':
  - type: text
    content: 'Ka hoy ilay tandapa tamin’i Filipo:'
  - type: text
    content: –Azafady, tompoko, iza moa no lazain’ny mpaminany amin’izany? Ny tenany sa olon-kafa?
  '35':
  - type: text
    content: 'Dia niteny i Filipo ary niainga avy amin’ireo andalan-tSoratra Masina ireo no nanambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i Jesoa. '
  '36':
  - type: text
    content: 'Nizotra ny dian’izy roa lahy, ary mby teo amin’ny toerana anankiray misy rano, ka hoy ilay tandapa:'
  - type: text
    content: '–Inty eto misy rano, ka inona no misakana ahy tsy hatao '
  - type: text
    content: batisa
  - type: text
    content: '?'
  - type: text
    content: '[ '
  '37':
  - type: text
    content: 'Dia novalian’i Filipo hoe:'
  - type: text
    content: –Raha amin’ny fonao manontolo no inoanao, dia azo atao batisa ianao.
  - type: text
    content: 'Ary hoy ilay tandapa:'
  - type: text
    content: '–Mino aho fa i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' no ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: note
    content: Angamba ho akon’ny litorijia fanaovam-batisa tany aloha be tany izany angamba.
  - type: text
    content: .]
  '38':
  - type: text
    content: 'Nasain’ilay tandapa najanona ny kalesy, dia niara-nidina nankeo anaty rano izy mbamin’i Filipo, ary nataon’i Filipo batisa izy. '
  '39':
  - type: text
    content: 'Nony tafakatra avy tao anaty rano izy roa lahy, dia nentin’ny Fanahin’ny Tompo niala teo i Filipo. Tsy nahita azy intsony ilay tandapa, nefa nanohy ny diany tamin-kafaliana. '
  '4':
  - type: text
    content: 'Koa ireo naelin’ny fanenjehana dia nitety tany nitory ny Vaovao Mahafaly raketin’ny tenin’Andriamanitra. '
  '40':
  - type: text
    content: Hay tody tao Azôta
  - type: note
    content: I Azôta dia i Asdôda tanànan’ny Filistinina fahiny (jereo 1 Sam 5.1-7).
  - type: text
    content: ' i Filipo ary nitory ny Vaovao Mahafaly tamin’ny tanàna rehetra nolalovany mandra-pahatongany tany Kesaria.'
  '5':
  - type: text
    content: 'Nidina tao an-tanàna Samaria i Filipo ka nanambara ny '
  - type: text
    content: Mesia
  - type: text
    content: ' tamin’ny mponina tao'
  - type: note
    content: 'tao an-tanàna Samaria (dia i Samaria vaovao na i Sebàsta naorin’i Herôda Lehibe izany): misy stf sasany ahitana hoe tao amin’ny tanàna anankiray any Samaria. –nanambara ny Mesia: satria niandry ny fahatongavan’ny Mesia koa ny Samaritanina (jereo Jôh 4.25).'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Indray babo avokoa ny vahoaka tamin’izay nolazain’i Filipo, raha nandre laza sy nahita maso ny '
  - type: text
    content: famantarana
  - type: text
    content: ' vitany. '
  '7':
  - type: text
    content: 'Fa maro ny olona nandroahana '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' ary nikiakiaka ireny fanahy maloto ireny rehefa niala; maro koa ny malemy sy ny mandringa no sitrana. '
  '8':
  - type: text
    content: Dia nisy hafaliana be tao amin’izany tanàna izany.
  '9':
  - type: text
    content: 'Nisy lehilahy atao hoe Simôna efa tao amin’izany tanàna izany rahateo. Mpanao majika izy ka nahatalanjona ny mponina eran’i Samaria sady nanao ny tenany ho zavatra. '
