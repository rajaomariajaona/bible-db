      marker-yv: yv-n
    - type: text
      text: ' ny bokin’i Isaià mpaminany, ary nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azonao ve ny teny vakînao?
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian-dralehilahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana moa no ho azoko, raha tsy mba misy manazava?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niangavian’ilay tandapa i Filipo mba hitaingina ny kalesiny ary hipetraka eo anilany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
