    children:
    - type: text
      text: Natao tsinontsinona Izy ary tsy nahazo rariny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza moa no hanan-kotantaraina ny amin’izay taranany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria fongotra teto an-tany ny fiainany
    - type: usfm
