  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ilay tandapa tamin’i Filipo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azafady, tompoko, iza moa no lazain’ny mpaminany amin’izany? Ny tenany sa olon-kafa?
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny i Filipo ary niainga avy amin’ireo andalan-tSoratra Masina ireo no nanambara ny '
    - type: usfm
