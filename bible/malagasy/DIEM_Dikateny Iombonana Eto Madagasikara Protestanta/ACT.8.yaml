type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy nilaza izany izy, dia nodimandry.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Saoly nankasitraka ny namonoana an’i Stefàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 22.20.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manenjika ny Fiangonana i Saoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Androtr’iny ihany dia nipoaka ny fanenjehana mahery vaika nihatra tamin’ny Fiangonana tao Jerosalema. Niely patrana eran’ny faritany Jodea sy Samaria ny mpino rehetra, afa-tsy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' ihany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Babony daholo ny olona, hatramin’ny kely ka hatramin’ny lehibe, ka vaky vava hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ity lehilahy ity no herin’Andriamanitra, dia ilay antsoina hoe «hery lehibe».
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Babon’i Simôna tokoa ny olona satria hatramin’ny ela no talanjona tamin’ny majîkany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saingy rehefa nino ny Vaovao Mahafaly notorîn’i Filipo momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' sy momba an’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' izy ireo, dia niroso hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' avokoa na lahy na vavy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tenan’i Simôna koa aza dia nino ka natao batisa; tsy nahasaraka an’i Filipo izy ary talanjona nahita ny famantarana sy ny asa lehibe mahagaga izay notontosaina.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ren’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' tany Jerosalema fa nandray ny tenin’Andriamanitra ny mponina tao Samaria, ka nirahiny hankany i Petera sy i Jôhany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga tany Samaria izy roa lahy, dia nivavaka ho an’ny mpino mba handraisany ny Fanahy Masina; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria tsy mbola nisy nilatsahan’ny Fanahy Masina ireo mpino ireo na iray aza, fa vita batisa tamin’ny anaran’i Jesoa Tompo ihany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nametrahan’i Petera sy Jôhany tanana izy rehetra ka nandray ny Fanahy Masina.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’i Simôna fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fametrahan’ny apôstôly tanana
    - type: text
      text: ' no nanomezana ny Fanahy Masina tamin’ireo mpino, dia notolorany vola i Petera sy i Jôhany '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Omeo ahy koa re izany fahefana izany, dia mba handray ny Fanahy Masina izay olona hametrahako tanana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisy kosa mpivavaka tsara nandevina an’i Stefàna sady nisaona azy fatratra.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Vereza miaraka amin’ny tenanao ny volanao satria nataonao fa azo vidîm-bola ny fanomezan’Andriamanitra. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy misy anjaranao na lovanao amin’ity raharaha ity satria tsy mahitsy fo eo anatrehan’Andriamanitra ianao. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa ialao izao faharatsianao izao ary mangataha amin’ny Tompo mba hamelany izany fihevitry ny fonao izany, raha azo atao. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hitako manko fa mbola feno fialonana mangidy sy voafatotry ny fahotana ianao.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Simôna tamin’i Petera sy i Jôhany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianareo mihitsy no mangataha ho ahy amin’ny Tompo, mba tsy hisy hihatra amiko akory izay voalazanareo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa avy nanao fijoroana vavolombelona sy nitory ny tenin’ny Tompo ry i Petera sy i Jôhany, dia nitodi-doha ho any Jerosalema, ka nanambara ny Vaovao Mahafaly teny amin’ny tanàna kely maro eran’i Samaria.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Filipo sy ilay tandapa etiôpianina
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjelin
    - type: text
      text: '’ny Tompo nanao tamin’i Filipo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha ianao mianatsimo
    - type: usfm
