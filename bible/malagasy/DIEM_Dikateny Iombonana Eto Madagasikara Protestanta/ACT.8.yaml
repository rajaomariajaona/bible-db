        children:
        - type: text
          text: Angamba ho akon’ny litorijia fanaovam-batisa tany aloha be tany izany angamba.
      marker-yv: yv-n
    - type: text
      text: .]
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nasain’ilay tandapa najanona ny kalesy, dia niara-nidina nankeo anaty rano izy mbamin’i Filipo, ary nataon’i Filipo batisa izy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tafakatra avy tao anaty rano izy roa lahy, dia nentin’ny Fanahin’ny Tompo niala teo i Filipo. Tsy nahita azy intsony ilay tandapa, nefa nanohy ny diany tamin-kafaliana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ireo naelin’ny fanenjehana dia nitety tany nitory ny Vaovao Mahafaly raketin’ny tenin’Andriamanitra. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hay tody tao Azôta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Azôta '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia i Asdôda tanànan’ny Filistinina fahiny (jereo 1 Sam 5.1-7).
      marker-yv: yv-n
    - type: text
      text: ' i Filipo ary nitory ny Vaovao Mahafaly tamin’ny tanàna rehetra nolalovany mandra-pahatongany tany Kesaria.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nidina tao an-tanàna Samaria i Filipo ka nanambara ny '
    - type: usfm
