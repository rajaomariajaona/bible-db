document_id: ACT.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny dian’i Paoly mankany Masedônia sy Gresy
  - type: text
    content: 'Nony nijanona ny tabataba, dia namory ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' i Paoly ka nanao teny fampaherezana ho azy, ary nanao veloma ka niainga nankany Masedônia. '
  '10':
  - type: text
    content: Dia nidina i Paoly ary niondrika teo aminy
  - type: note
    content: niondrika teo aminy na hoe niantoraka teo aminy.
  - type: text
    content: 'sy nitrotro azy ka nanao hoe:'
  - type: text
    content: –Aza manahy fa velona izy!
  '11':
  - type: text
    content: 'Dia niakatra indray i Paoly ka nanapaka ny mofo sy nihinana; ary mbola niresaka ela ambara-paharainan’ny andro izy, vao lasa nandeha. '
  '12':
  - type: text
    content: Nitondra nody ilay tovolahy efa velona kosa ny olona sady nahazo fampaherezana lehibe.
  - type: heading
    content: Ny dia avy tao Trôasy mankany Mileto
  '13':
  - type: text
    content: 'Nialoha izahay fa hiondrana amin’ny sambo hitondra anay mankany Aso, fa any no handraisanay an’i Paoly. Fandaminana nataony izany, satria nikasa handeha an-tanety izy. '
  '14':
  - type: text
    content: 'Nony nahatratra anay tao Aso izy, dia noraisinay an-tsambo ka niainga ho any Mitilena izahay. '
  '15':
  - type: text
    content: Niala teo indray izahay ka tonga tandrify an’i Kio ny ampitson’iny; ny afakampitso indray, dia niantsona tao Samo, ary tody tao Mileto ny andro manaraka
  - type: note
    content: Misy stf sasany manampy hoe rehefa avy niato kely tao Trôgly.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Efa nanapa-kevitra manko i Paoly fa holalovany an-tsambo i Efeso mba tsy handaniany andro ao amin’ny faritany Azia. Fa dodona izy ho tody any Jerosalema alohan’ny andro '
  - type: text
    content: Pentekôsta
  - type: text
    content: ', raha azony atao.'
  - type: heading
    content: Hafatr’i Paoly ho an’ny loholom-piangonana tao Efeso
  '17':
  - type: text
    content: 'Naniraka olona avy tao Mileto nankany Efeso i Paoly, hampaka ireo loholon’ny Fiangonana. '
  '18':
  - type: text
    content: 'Nony tonga teo aminy ry zareo, dia nataony hoe:'
  - type: text
    content: '–Fantatrareo tsara ny fitondrantenako mandritra ny fotoana nahateto aminareo ahy, hatramin’ny andro voalohany nahatongavako tamin’ny faritany Azia. '
  '19':
  - type: text
    content: 'Nanompo ny Tompo tamim-panetrentena fatratra aho satria nianjadian’alahelo sy fitsapana noho ny fiokoan’ny Jiosy hamely ahy. '
  '2':
  - type: text
    content: 'Namaky izany faritany izany izy ka nitoriteny imbetsaka nampahery ny mpino; '
  '20':
  - type: text
    content: 'Fantatrareo fa tsy mba nafeniko izay mahasoa anareo, fa notorîko sy nampianariko na vory vahoaka na isan-tokantrano. '
  '21':
  - type: text
    content: 'Ny Jiosy ary koa ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' dia samy nijoroako ho vavolombelona ka notaomiko hiala tamin’ny toe-dratsy ka hitodika amin’Andriamanitra sady hino an’i Jesoa Tompontsika. '
  '22':
  - type: text
    content: 'Ary ankehitriny, indro aho teren’ny Fanahy Masina hankany Jerosalema, saingy tsy fantatro izay hanjo ahy any. '
  '23':
  - type: text
    content: 'Izao no hany fantatro: isan-tanàna alehako, dia ambaran’ny Fanahy Masina amiko fa fonja amam-pahoriana no miandry ahy'
  - type: note
    content: Ampit 21.4, 11.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Kanefa tsy ataoko ho zavatra ny aiko mba hahatontosako hatramin’ny farany ilay hazakazaka imasoako sy hahatomombana ilay fanompoana nankinin’i Jesoa Tompo tamiko, dia ny ho vavolombelona hanambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba ny fahasoavan’Andriamanitra'
  - type: note
    content: Ampit 2Tim 4.7.
  - type: text
    content: .
  '25':
  - type: text
    content: 'Noteteziko avokoa ianareo rehetra ka nitoriako ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '; fantatro anefa ankehitriny fa tsy hahita ahy intsony ianareo. '
  '26':
  - type: text
    content: 'Koa izao no ambarako aminareo anio: raha toa ka misy aminareo manalavitra an’Andriamanitra, dia anareo ny andraikitra fa afaka adidy aminareo rehetra aho. '
  '27':
  - type: text
    content: 'Tsy nafeniko fa notorîko taminareo avokoa ny fikasan’Andriamanitra. '
  '28':
  - type: text
    content: 'Tandremo ny tenanareo sy ny ondry rehetra nankinin’ny Fanahy Masina '
  - type: text
    content: aminareo
  - type: text
    content: ' mba handrasanareo. Karakarao ny Fiangonana izay novidin’Andriamanitra tamin’ny alalan’ny ra nafoin-Janany'
  - type: note
    content: 'ny ondry rehetra: ampit 1Pt 5.2. –ny Fiangonana izay novidin’Andriamanitra tamin’ny alalan’ny ra nafoin-Janany: misy stf sasany ahitana hoe ny Fiangonana izay novidin’ny Tompo tamin’ny alalan’ny ra nafoiny.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Fantatro fa rehefa tsy eny intsony aho, dia ho avy eo aminareo ny amboadia masiaka izay tsy hitsimbina ny ondry. '
  '3':
  - type: text
    content: 'izay vao nankany Gresy ary nitoetra telo volana tany. Efa ndeha hiondrana an-tsambo ho any Siria iny indrindra i Paoly no nahalala fa nioko hamono azy ny Jiosy. Koa tapa-kevitra izy fa hiverina hamaky an’i Masedônia. '
  '30':
  - type: text
    content: 'Avy eo amin’ny samy ianareo ihany aza no hisy hijoro hilaza lainga mba hitaomany ny mpianatra hanaraka azy. '
  '31':
  - type: text
    content: Noho izany, miambena ianareo ka tsarovy fa telo taona maninjitra, tsy niato aho namarafara anareo tsirairay andro aman’alina, eny, tamin-dranomaso aza.
  '32':
  - type: text
    content: 'Ary ankehitriny ianareo dia ankiniko amin’Andriamanitra sy amin’ny teniny mirakitra fahasoavana. Andriamanitra no hampahery anareo sy hanome anareo ny soa izay nataony ho anjaran’ireo rehetra voatokana ho Azy. '
  '33':
  - type: text
    content: 'Tsy mba nisy volafotsy na volamena na fitafian’iza na iza notsiriritiko. '
  '34':
  - type: text
    content: Fantatrareo fa ireto tanako ireto no niantoka izay nilaiko, ho ahy sy ho an’ny mpiara-dia tamiko
  - type: note
    content: Ampit 18.3.
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Efa nasehoko anareo tamin’ny zavatra rehetra fa tsy maintsy mikely aina toy izany koa ianareo mba hanampiana ny mahantra. Tsarovy ireo tenin’i Jesoa Tompo fa Izy mihitsy no nilaza hoe: «Mahasambatra kokoa ny manome noho ny mandray'
  - type: note
    content: Tsy voarakitra ao amin’ny Vaovao Mahafaly efatra io tenin’i Jesoa io.
  - type: text
    content: .»
  '36':
  - type: text
    content: 'Nony avy niteny izany i Paoly, dia nandohalika teo ka niara-nivavaka tamin’izy rehetra. '
  '37':
  - type: text
    content: 'Nitomany avokoa ireo loholona ary samy namihina an’i Paoly sady nanoroka azy. '
  '38':
  - type: text
    content: 'Nalahelo mafy izy rehetra, indrindra noho ny nilazany hoe: «Tsy hahita ahy intsony ianareo.» Dia naterin’izy rehetra teny an-tsambo i Paoly.'
  '4':
  - type: text
    content: Niara-dia taminy
  - type: note
    content: Misy stf sasany manampy hoe hatrany Azia (izany hoe ny faritany antsoina manokana hoe Azia, tao Azia Minôra).
  - type: text
    content: ' koa i Sôpatera, zanakalahin’i Piro sady avy amin’ny tanànan’i Berea, ary koa i Aristarka sy i Sekônda avy any Tesalônika, i Gaio avy any Derba sy i Timôty, i Tisiko sy i Trôfimo avy any amin’ny faritany Azia. '
  '5':
  - type: text
    content: 'Nialoha anay anefa izy fito lahy ka niandry tany Trôasy. '
  '6':
  - type: text
    content: 'Fa izahay dia tany Filipy no niondrana taorian’ny fankalazana ny '
  - type: text
    content: Azima
  - type: text
    content: ', ka nony afaka dimy andro, dia nahatratra azy rehetra tany Trôasy izay nitoeranay mandritra ny herinandro.'
  - type: heading
    content: Fitsidihan’i Paoly farany tao Trôasy
  '7':
  - type: text
    content: Tafavory izahay rehetra ny asabotsy maty masoandro
  - type: note
    content: 'asabotsy maty masoandro: satria manomboka ny asabotsy lenti-masoandro ny alahady araka ny fomba jiosy. Misy anefa mpandikateny sasany manao hoe: alahady maty masoandro.'
  - type: text
    content: 'hiara-mihinana ny sakafo iombonana, ary niteny tamin’ny mpivory i Paoly. Noho izy tsy maintsy handeha ny maraina, dia nitoriteny hatramin’ny sasakalina. '
  '8':
  - type: text
    content: 'Maro jiro ilay efitrano niangonanay tao ambony rihana. '
  '9':
  - type: text
    content: 'Nisy tovolahy atao hoe Eotîka, nipetraka teo am-baravarankely. Sondrian-tory mafy izy mandritra ilay toriteny lava nataon’i Paoly, ary renoky ny torimaso ka nianjera tany alatrano, avy teny amin’ny rihana fahatelo. Natraka ilay tovolahy saingy efa maty. '
