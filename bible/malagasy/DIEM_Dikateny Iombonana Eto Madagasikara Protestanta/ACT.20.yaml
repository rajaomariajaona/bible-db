document_id: ACT.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny dian’i Paoly mankany Masedônia sy Gresy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nony nijanona ny tabataba, dia namory ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' i Paoly ka nanao teny fampaherezana ho azy, ary nanao veloma ka niainga nankany Masedônia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia nidina i Paoly ary niondrika teo aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'niondrika teo aminy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: niantoraka teo aminy.
      marker-yv: yv-n
    - type: text
      text: 'sy nitrotro azy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza manahy fa velona izy!
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia niakatra indray i Paoly ka nanapaka ny mofo sy nihinana; ary mbola niresaka ela ambara-paharainan’ny andro izy, vao lasa nandeha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nitondra nody ilay tovolahy efa velona kosa ny olona sady nahazo fampaherezana lehibe.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny dia avy tao Trôasy mankany Mileto
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nialoha izahay fa hiondrana amin’ny sambo hitondra anay mankany Aso, fa any no handraisanay an’i Paoly. Fandaminana nataony izany, satria nikasa handeha an-tanety izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nony nahatratra anay tao Aso izy, dia noraisinay an-tsambo ka niainga ho any Mitilena izahay. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Niala teo indray izahay ka tonga tandrify an’i Kio ny ampitson’iny; ny afakampitso indray, dia niantsona tao Samo, ary tody tao Mileto ny andro manaraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Misy stf sasany manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: rehefa avy niato kely tao Trôgly.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Efa nanapa-kevitra manko i Paoly fa holalovany an-tsambo i Efeso mba tsy handaniany andro ao amin’ny faritany Azia. Fa dodona izy ho tody any Jerosalema alohan’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pentekôsta
    - type: text
      text: ', raha azony atao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Hafatr’i Paoly ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholom
    - type: text
      text: -piangonana tao Efeso
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Naniraka olona avy tao Mileto nankany Efeso i Paoly, hampaka ireo loholon’ny Fiangonana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nony tonga teo aminy ry zareo, dia nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatrareo tsara ny fitondrantenako mandritra ny fotoana nahateto aminareo ahy, hatramin’ny andro voalohany nahatongavako tamin’ny faritany Azia. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nanompo ny Tompo tamim-panetrentena fatratra aho satria nianjadian’alahelo sy fitsapana noho ny fiokoan’ny Jiosy hamely ahy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Namaky izany faritany izany izy ka nitoriteny imbetsaka nampahery ny mpino; '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fantatrareo fa tsy mba nafeniko izay mahasoa anareo, fa notorîko sy nampianariko na vory vahoaka na isan-tokantrano. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ny Jiosy ary koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' dia samy nijoroako ho vavolombelona ka notaomiko hiala tamin’ny toe-dratsy ka hitodika amin’Andriamanitra sady hino an’i Jesoa Tompontsika. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ankehitriny, indro aho teren’ny Fanahy Masina hankany Jerosalema, saingy tsy fantatro izay hanjo ahy any. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izao no hany fantatro: isan-tanàna alehako, dia ambaran’ny Fanahy Masina amiko fa fonja amam-pahoriana no miandry ahy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 21.4, 11.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Kanefa tsy ataoko ho zavatra ny aiko mba hahatontosako hatramin’ny farany ilay hazakazaka imasoako sy hahatomombana ilay fanompoana nankinin’i Jesoa Tompo tamiko, dia ny ho vavolombelona hanambara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' momba ny fahasoavan’Andriamanitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2Tim 4.7.
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Noteteziko avokoa ianareo rehetra ka nitoriako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '; fantatro anefa ankehitriny fa tsy hahita ahy intsony ianareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Koa izao no ambarako aminareo anio: raha toa ka misy aminareo manalavitra an’Andriamanitra, dia anareo ny andraikitra fa afaka adidy aminareo rehetra aho. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tsy nafeniko fa notorîko taminareo avokoa ny fikasan’Andriamanitra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tandremo ny tenanareo sy ny ondry rehetra nankinin’ny Fanahy Masina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: aminareo
    - type: text
      text: ' mba handrasanareo. Karakarao ny Fiangonana izay novidin’Andriamanitra tamin’ny alalan’ny ra nafoin-Janany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny ondry rehetra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 1Pt 5.2. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny Fiangonana izay novidin’Andriamanitra tamin’ny alalan’ny ra nafoin-Janany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny Fiangonana izay novidin’ny Tompo tamin’ny alalan’ny ra nafoiny.
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fantatro fa rehefa tsy eny intsony aho, dia ho avy eo aminareo ny amboadia masiaka izay tsy hitsimbina ny ondry. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'izay vao nankany Gresy ary nitoetra telo volana tany. Efa ndeha hiondrana an-tsambo ho any Siria iny indrindra i Paoly no nahalala fa nioko hamono azy ny Jiosy. Koa tapa-kevitra izy fa hiverina hamaky an’i Masedônia. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Avy eo amin’ny samy ianareo ihany aza no hisy hijoro hilaza lainga mba hitaomany ny mpianatra hanaraka azy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Noho izany, miambena ianareo ka tsarovy fa telo taona maninjitra, tsy niato aho namarafara anareo tsirairay andro aman’alina, eny, tamin-dranomaso aza.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary ankehitriny ianareo dia ankiniko amin’Andriamanitra sy amin’ny teniny mirakitra fahasoavana. Andriamanitra no hampahery anareo sy hanome anareo ny soa izay nataony ho anjaran’ireo rehetra voatokana ho Azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Tsy mba nisy volafotsy na volamena na fitafian’iza na iza notsiriritiko. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Fantatrareo fa ireto tanako ireto no niantoka izay nilaiko, ho ahy sy ho an’ny mpiara-dia tamiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 18.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Efa nasehoko anareo tamin’ny zavatra rehetra fa tsy maintsy mikely aina toy izany koa ianareo mba hanampiana ny mahantra. Tsarovy ireo tenin’i Jesoa Tompo fa Izy mihitsy no nilaza hoe: «Mahasambatra kokoa ny manome noho ny mandray'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy voarakitra ao amin’ny Vaovao Mahafaly efatra io tenin’i Jesoa io.
      marker-yv: yv-n
    - type: text
      text: .»
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Nony avy niteny izany i Paoly, dia nandohalika teo ka niara-nivavaka tamin’izy rehetra. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Nitomany avokoa ireo loholona ary samy namihina an’i Paoly sady nanoroka azy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Nalahelo mafy izy rehetra, indrindra noho ny nilazany hoe: «Tsy hahita ahy intsony ianareo.» Dia naterin’izy rehetra teny an-tsambo i Paoly.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Niara-dia taminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Misy stf sasany manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hatrany Azia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (izany hoe ny faritany antsoina manokana hoe Azia, tao Azia Minôra).'
      marker-yv: yv-n
    - type: text
      text: ' koa i Sôpatera, zanakalahin’i Piro sady avy amin’ny tanànan’i Berea, ary koa i Aristarka sy i Sekônda avy any Tesalônika, i Gaio avy any Derba sy i Timôty, i Tisiko sy i Trôfimo avy any amin’ny faritany Azia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nialoha anay anefa izy fito lahy ka niandry tany Trôasy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa izahay dia tany Filipy no niondrana taorian’ny fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Azima
    - type: text
      text: ', ka nony afaka dimy andro, dia nahatratra azy rehetra tany Trôasy izay nitoeranay mandritra ny herinandro.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsidihan’i Paoly farany tao Trôasy
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tafavory izahay rehetra ny asabotsy maty masoandro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'asabotsy maty masoandro: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'satria manomboka ny asabotsy lenti-masoandro ny alahady araka ny fomba jiosy. Misy anefa mpandikateny sasany manao hoe: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: alahady maty masoandro.
      marker-yv: yv-n
    - type: text
      text: 'hiara-mihinana ny sakafo iombonana, ary niteny tamin’ny mpivory i Paoly. Noho izy tsy maintsy handeha ny maraina, dia nitoriteny hatramin’ny sasakalina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Maro jiro ilay efitrano niangonanay tao ambony rihana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nisy tovolahy atao hoe Eotîka, nipetraka teo am-baravarankely. Sondrian-tory mafy izy mandritra ilay toriteny lava nataon’i Paoly, ary renoky ny torimaso ka nianjera tany alatrano, avy teny amin’ny rihana fahatelo. Natraka ilay tovolahy saingy efa maty. '
