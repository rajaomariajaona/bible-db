document_id: 1CH.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny taranak’i Benjamîna: lisitra hafa'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny naterak’i Benjamîna dia i Bela lahimatoa, i Asbela lahiaivo, i Aharà fahatelo, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'i Nôhà fahefatra, ary i Rafà faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny zanakalahin’i Bela dia i Adara sy i Gerà (rain’i Ehoda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mpits 3.15.
    marker-yv: yv-n
  - type: text
    text: '), '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'i Abisoa sy i Nahamàna, i Ahôa '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: sy i Gerà ary i Sefofàna sy i Horama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Ireto kosa ny zanakalahin’i Ehoda: i Nahamàna sy i Ahià ary i Gerà (ity Gerà ity dia niteraka an-dry i Hozà sy i Ahihoda). Loham-pianakavian’ireo mponina tao Geba izy telo mirahalahy ary nampifindra monina azy tany Manahata; i Gerà mihitsy no nitarika izany fifindra-monina izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I Saharaîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Saharaîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'angamba tokony hovana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahirama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit Nom 26.38).'
    marker-yv: yv-n
  - type: text
    text: ' kosa, taorian’ny nisaorany an’i Hosîma sy i Baharà vadiny, dia niteraka tany amin’ny faritany Môaba; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka ireto avy no naterany tamin’i Hodesy vadiny: i Jôbaba sy i Tsibià, i Mesà sy i Malkama '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'i Jehotsy mbamin’i Sakeià ary i Mirmà. Ireo zanakalahin’i Saharaîma ireo dia samy lohan’ny fianakaviany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I Hosîma koa efa niterahany an-dry i Abitoba sy i Elpahaly. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zanakalahin’i Elpahaly: i Hebera sy i Misahama ary i Semèra; ity Semèra ity no nanorina an’i Ônao ary koa nanorina an’i Lôda mbamin’ireo tanàna kely miankina aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I Berihà sy i Elpahaly ary i Sema, izay samy loham-pianakavian’ny mponina tao Aialôna, dia nandroaka ny mponina tao Gata. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny rahalahin’izy telo lahy dia i Sasaky sy i Jeremôta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'Zanakalahin’i Berihà: i Zebadià sy i Harada, i Hedera sy i Mikaela ary i Jispà sy i Jôhà.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'Zanakalahin’i Elpahaly: I Zebadià sy i Mesolama, i Hizkỳ sy i Hebera mbamin’i Jismeray sy i Jizlià ary i Jôbaba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'Zanakalahin’i Sema: i Jakima sy i Zikrỳ, i Zabdỳ sy i Eliôhenay, i Tsiletahy sy i Eliela mbamin’i Hadaià sy i Beraià ary i Simrata.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-25
  - type: text
    text: 'Zanakalahin’i Sasaky: i Jispàna sy i Hebera, i Eliela sy i Habdôna, i Zikrỳ sy i Hanàna, Hananià sy i Helama mbamin’i Hanatôtià sy i Jifdeià ary i Penoela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: 'Zanakalahin’i Jeremôta: i Samseray sy i Seharià, i Hatalià sy i Jaharesià ary i Elià sy i Zikrỳ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ireo rehetra ireo dia samy loham-pianakaviana ho an’ny taranany avy ary nonina tao Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tao Gibehôna no nonina i Jihiela, ilay mpanorina io tanàna io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.29 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 29-32:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 9.35-38.
    marker-yv: yv-n
  - type: text
    text: '; ary ny anaran’ny vadiny dia i Mahekà. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I Habdôna no zanany lahimatoa, dia i Tsoro sy i Kîsy, i Bahala sy i Nera, i Nadaba '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'sy i Gedôra mbamin’i Ahiao sy i Zekera ary i Miklôta. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I Miklôta no ray niteraka an’i Simeama: izy mianaka ireto dia niara-monina tamin’ny mpiray foko namany tany Jerosalema, ka nifanandrify fonenana taminy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 9.39-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I Nera no ray niteraka an’i Kisy; i Kisy, ray niteraka an’i Saoly; i Saoly, ray niteraka an-dry i Jônatàna sy i Melkisa ary i Abinadaba sy i Esbahala. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny zanakalahin’i Jônatàna dia i Merîbahala; i Meribahala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Meribahala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ity dia antsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mefibahala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny 2 Sam: jereo, ohatra, 2 Sam 4.4; 9.6-13.'
    marker-yv: yv-n
  - type: text
    text: ' no ray niteraka an’i Mikà. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny zanakalahin’i Mikà dia ry i Pitôny sy i Meleka ary i Taharea sy i Ahaza. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'i Ahaza no ray niteraka an’i Jôhadà; i Jôhadà, ray niteraka an-dry Halemeta sy i Hazmavety ary i Zimrỳ; i Zimrỳ, ray niteraka an’i Môtsà; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Môtsà, ray niteraka an’i Binehà. I Rafà no zanakalahin’i Binehà; i Elehasà no zanakalahin’i Rafà; ary i Atsela no zanakalahin’i Elehasà. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nanan-janaka enina mirahalahy i Atsela ka ireto avy no anarany: i Hazrikama (lahimatoany) sy i Jismahela, i Seharià sy i Hazarià ary i Hôbadià sy i Hanàna; zanakalahin’i Atsela avokoa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny zanakalahin’i Hesèka rahalahin’i Atsela kosa dia i Olama no lahimatoa, i Jehisa no lahiaivo ary i Elifelety no faralahy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ireo zanakalahin’i Olama dia lehilahy mahery sy mpandefa zana-tsipîka, sady nanan-janakalahy aman-jafy maro miisa 150.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ireo rehetra ireo no taranak’i Benjamîna.
