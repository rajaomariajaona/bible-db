document_id: 1CH.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny taranak’i Benjamîna: lisitra hafa'
  - type: text
    content: 'Ny naterak’i Benjamîna dia i Bela lahimatoa, i Asbela lahiaivo, i Aharà fahatelo, '
  '10':
  - type: text
    content: 'i Jehotsy mbamin’i Sakeià ary i Mirmà. Ireo zanakalahin’i Saharaîma ireo dia samy lohan’ny fianakaviany avy. '
  '11':
  - type: text
    content: 'I Hosîma koa efa niterahany an-dry i Abitoba sy i Elpahaly. '
  '12':
  - type: text
    content: 'Zanakalahin’i Elpahaly: i Hebera sy i Misahama ary i Semèra; ity Semèra ity no nanorina an’i Ônao ary koa nanorina an’i Lôda mbamin’ireo tanàna kely miankina aminy.'
  '13':
  - type: text
    content: 'I Berihà sy i Elpahaly ary i Sema, izay samy loham-pianakavian’ny mponina tao Aialôna, dia nandroaka ny mponina tao Gata. '
  '14':
  - type: text
    content: Ny rahalahin’izy telo lahy dia i Sasaky sy i Jeremôta.
  '15':
  - type: text
    content: 'Zanakalahin’i Berihà: i Zebadià sy i Harada, i Hedera sy i Mikaela ary i Jispà sy i Jôhà.'
  '17':
  - type: text
    content: 'Zanakalahin’i Elpahaly: I Zebadià sy i Mesolama, i Hizkỳ sy i Hebera mbamin’i Jismeray sy i Jizlià ary i Jôbaba.'
  '19':
  - type: text
    content: 'Zanakalahin’i Sema: i Jakima sy i Zikrỳ, i Zabdỳ sy i Eliôhenay, i Tsiletahy sy i Eliela mbamin’i Hadaià sy i Beraià ary i Simrata.'
  '2':
  - type: text
    content: 'i Nôhà fahefatra, ary i Rafà faralahy. '
  '22':
  - type: text
    content: 'Zanakalahin’i Sasaky: i Jispàna sy i Hebera, i Eliela sy i Habdôna, i Zikrỳ sy i Hanàna, Hananià sy i Helama mbamin’i Hanatôtià sy i Jifdeià ary i Penoela.'
  '26':
  - type: text
    content: 'Zanakalahin’i Jeremôta: i Samseray sy i Seharià, i Hatalià sy i Jaharesià ary i Elià sy i Zikrỳ.'
  '28':
  - type: text
    content: Ireo rehetra ireo dia samy loham-pianakaviana ho an’ny taranany avy ary nonina tao Jerosalema.
  '29':
  - type: text
    content: Tao Gibehôna no nonina i Jihiela, ilay mpanorina io tanàna io
  - type: note
    content: 'And 29-32: jereo 9.35-38.'
  - type: text
    content: '; ary ny anaran’ny vadiny dia i Mahekà. '
  '3':
  - type: text
    content: Ny zanakalahin’i Bela dia i Adara sy i Gerà (rain’i Ehoda
  - type: note
    content: Ampit Mpits 3.15.
  - type: text
    content: '), '
  '30':
  - type: text
    content: 'I Habdôna no zanany lahimatoa, dia i Tsoro sy i Kîsy, i Bahala sy i Nera, i Nadaba '
  '31':
  - type: text
    content: 'sy i Gedôra mbamin’i Ahiao sy i Zekera ary i Miklôta. '
  '32':
  - type: text
    content: 'I Miklôta no ray niteraka an’i Simeama: izy mianaka ireto dia niara-monina tamin’ny mpiray foko namany tany Jerosalema, ka nifanandrify fonenana taminy.'
  - type: heading
    content: Ny taranak’i Saoly
  - type: heading
    content: (Jereo 9.39-44)
  '33':
  - type: text
    content: 'I Nera no ray niteraka an’i Kisy; i Kisy, ray niteraka an’i Saoly; i Saoly, ray niteraka an-dry i Jônatàna sy i Melkisa ary i Abinadaba sy i Esbahala. '
  '34':
  - type: text
    content: Ny zanakalahin’i Jônatàna dia i Merîbahala; i Meribahala
  - type: note
    content: 'Ity Meribahala ity dia antsoina hoe Mefibahala ao amin’ny 2 Sam: jereo, ohatra, 2 Sam 4.4; 9.6-13.'
  - type: text
    content: ' no ray niteraka an’i Mikà. '
  '35':
  - type: text
    content: 'Ny zanakalahin’i Mikà dia ry i Pitôny sy i Meleka ary i Taharea sy i Ahaza. '
  '36':
  - type: text
    content: 'i Ahaza no ray niteraka an’i Jôhadà; i Jôhadà, ray niteraka an-dry Halemeta sy i Hazmavety ary i Zimrỳ; i Zimrỳ, ray niteraka an’i Môtsà; '
  '37':
  - type: text
    content: 'i Môtsà, ray niteraka an’i Binehà. I Rafà no zanakalahin’i Binehà; i Elehasà no zanakalahin’i Rafà; ary i Atsela no zanakalahin’i Elehasà. '
  '38':
  - type: text
    content: 'Nanan-janaka enina mirahalahy i Atsela ka ireto avy no anarany: i Hazrikama (lahimatoany) sy i Jismahela, i Seharià sy i Hazarià ary i Hôbadià sy i Hanàna; zanakalahin’i Atsela avokoa ireo. '
  '39':
  - type: text
    content: 'Ny zanakalahin’i Hesèka rahalahin’i Atsela kosa dia i Olama no lahimatoa, i Jehisa no lahiaivo ary i Elifelety no faralahy. '
  '4':
  - type: text
    content: 'i Abisoa sy i Nahamàna, i Ahôa '
  '40':
  - type: text
    content: Ireo zanakalahin’i Olama dia lehilahy mahery sy mpandefa zana-tsipîka, sady nanan-janakalahy aman-jafy maro miisa 150.
  - type: text
    content: Ireo rehetra ireo no taranak’i Benjamîna.
  '5':
  - type: text
    content: sy i Gerà ary i Sefofàna sy i Horama.
  '6':
  - type: text
    content: 'Ireto kosa ny zanakalahin’i Ehoda: i Nahamàna sy i Ahià ary i Gerà (ity Gerà ity dia niteraka an-dry i Hozà sy i Ahihoda). Loham-pianakavian’ireo mponina tao Geba izy telo mirahalahy ary nampifindra monina azy tany Manahata; i Gerà mihitsy no nitarika izany fifindra-monina izany.'
  '8':
  - type: text
    content: I Saharaîma
  - type: note
    content: 'Saharaîma: angamba tokony hovana hoe Ahirama (ampit Nom 26.38).'
  - type: text
    content: ' kosa, taorian’ny nisaorany an’i Hosîma sy i Baharà vadiny, dia niteraka tany amin’ny faritany Môaba; '
  '9':
  - type: text
    content: 'ka ireto avy no naterany tamin’i Hodesy vadiny: i Jôbaba sy i Tsibià, i Mesà sy i Malkama '
