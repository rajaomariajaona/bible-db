document_id: MAT.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiovàn’i Jesoa tarehy
  - type: heading
    content: (Jereo Mk 9.2-13; Lk 9.28-36)
  - type: text
    content: 'Enina andro taorian’izay, dia nalain’i Jesoa niaraka taminy ry i Petera mbamin-dry i Jakôba sy i Jôhany mirahalahy, ka nentiny nitokana tany an-tendrombohitra avo anankiray. '
  '10':
  - type: text
    content: 'Dia nanontany an’i Jesoa izy telo lahy nanao hoe:'
  - type: text
    content: '–Nahoana àry no lazain’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' fa tsy maintsy ho avy i Elià, alohan’ny hahatongavan’ny Mesia'
  - type: note
    content: Ampit Mal 3.1, 23-24; Lk 1.17,76; 7.27.
  - type: text
    content: '?'
  '11':
  - type: text
    content: 'Ary novalian’i Jesoa hoe:'
  - type: text
    content: '–Tsy maintsy ho avy i Elià hampody ny zavatra rehetra amin’ny laoniny. '
  '12':
  - type: text
    content: 'Nefa izao no lazaiko aminareo: Efa tonga tokoa i Elià, saingy tsy fantatry ny olona sasany ka nanaovany izay fampijaliana rehetra tiany hatao taminy; dia tahaka izany koa no hampijalian-dry zareo ny Zanak’olona.'
  '13':
  - type: text
    content: Tamin’izay dia azon’ireto mpianatra telo lahy an-tsaina fa i Jôhany Mpanao batisa no voalazan’i Jesoa taminy.
  - type: heading
    content: Sitranin’i Jesoa ilay zazalahy voan’ny androbe
  - type: heading
    content: (Jereo Mk 9.14-29; Lk 9.37-43a)
  '14':
  - type: text
    content: 'Nony tafaverina teo amin’ny vahoaka ry i Jesoa efa-mianaka, dia nisy lehilahy anankiray nanatona an’i Jesoa ary nandohalika teo anatrehany '
  '15':
  - type: text
    content: 'sady nanao hoe:'
  - type: text
    content: –Tompo ô, mamindrà fo amin’ny zanako lahy! Mararin’ny androbe
  - type: note
    content: Jereo 4.24 sy nta.
  - type: text
    content: ' izy ka mijaly tokoa, fa matetika mianjera any anaty afo na any anaty rano. '
  '16':
  - type: text
    content: 'Efa nentiko teo amin’ireo '
  - type: text
    content: mpianatrao
  - type: text
    content: ', saingy tsy nahasitrana azy ry zareo.'
  '17':
  - type: text
    content: 'Dia hoy i Jesoa:'
  - type: text
    content: –Karazan’olona tsy mino sady be siasia ianareo! Mandra-pahoviana no hitoerako eto aminareo? Mandra-pahoviana no handeferako aminareo? Ento atỳ amiko ny zaza!
  '18':
  - type: text
    content: Dia notenenin’i Jesoa mafy ny demony ka niala tamin’ilay zaza; ary sitrana razazalahy nanomboka hatramin’io ora io.
  '19':
  - type: text
    content: 'Tamin’izay dia nanatona an’i Jesoa manokana ireto mpianatra ka nanontany Azy hoe:'
  - type: text
    content: –Nahoana izahay no tsy naharoaka iny demony iny?
  '2':
  - type: text
    content: 'Dia niova tarehy teo anatrehan’izy telo lahy i Jesoa: namirapiratra tahaka ny masoandro ny tavany ary tonga fotsy tahaka ny hazavana ny fitafiany'
  - type: note
    content: Ampit Dan 10.4-12; 2Pt 1.16-18.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Satria kely finoana loatra ianareo! Eny, lazaiko marina aminareo fa raha manam-pinoana tahaka ny voan-tsinapy anankiray
  - type: note
    content: 'tahaka... anankiray: ny voan-tsinapy dia noheverina ho bitika indrindra tamin’ireo voan’anana famafy, na dia tsy mitombina tanteraka aza. Jereo 13.32.'
  - type: text
    content: ' ianareo ka hiteny amin’io tendrombohitra io hoe: «Mifindrà erỳ», dia hifindra izy; ary tsy hisy tsy ho hainareo hatao.'
  - type: text
    content: '[ '
  '21':
  - type: text
    content: 'Iny karazan-demony iny anefa dia tsy tafavoaka, raha tsy amin’ny fivavahana sy ny '
  - type: text
    content: fifadian-kanina
  - type: text
    content: .]
  - type: heading
    content: Ambaran’i Jesoa fanindroany ny hahafatesany sy ny hitsanganany ho velona
  - type: heading
    content: (Jereo Mk 9.30-32; Lk 9.43b-45)
  '22':
  - type: text
    content: 'Raha mbola tafaraka tany Galilea ry i Jesoa mbamin’ny mpianany, dia hoy i Jesoa taminy:'
  - type: text
    content: '–Efa hatolotra eo an-tanan’ny olona ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' '
  '23':
  - type: text
    content: ka hovonoiny ho faty, ary hitsangana velona amin’ny andro fahatelo.
  - type: text
    content: Dia nalahelo mafy ireo mpianatra.
  - type: heading
    content: Ny hetran’ny tempoly
  '24':
  - type: text
    content: 'Nony tonga tao Kafarnahòma i Jesoa mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ', dia nanatona an’i Petera ireo mpandray ny denàry anankiroa hetran’ny tempoly, ary nanontany azy hoe:'
  - type: text
    content: –Moa tsy mandoa ny denàry anankiroa hetran’ny tempoly
  - type: note
    content: Jereo Eks 30.11-16.
  - type: text
    content: ' ve ny Mpampianatrareo?'
  '25':
  - type: text
    content: 'Dia novalian’i Petera hoe:'
  - type: text
    content: –Mandoa izany Izy!
  - type: text
    content: 'Vao niditra tao an-trano i Petera, dia notsenain’i Jesoa nilazany hoe:'
  - type: text
    content: –Ahoana no hevitrao, ry Simôna? Iza no andraisan’ny mpanjaka etỳ an-tany fadintseranana sy hetra, ny ankohonany
  - type: note
    content: 'I Jesoa dia Zanak’ilay Andriamanitra tompon’ny tempoly ary ny mpianany koa dia anisan’ny ankohonan’Andriamanitra: noho izany, tsy tokony handoa ny hetran’ny tempoly.'
  - type: text
    content: ' sa ny olon-kafa?'
  '26':
  - type: text
    content: 'Dia novalian’i Petera hoe:'
  - type: text
    content: –Ny olon-kafa!
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: '–Raha izany àry, dia afaka ny ankohonany. '
  '27':
  - type: text
    content: Kanefa aoka isika tsy hanao izay hampisafoaka ireo olona ireo! Noho izany, ndeha ianao manjono eny am-parihy, dia raiso izay trondro voalohany azonao; ary sokafy ny vavany fa hahitanao vola mitetina denàry efatra. Ento izany ka omeo ireo olona ireo hanefana ny hetrako sy ny anao!
  '3':
  - type: text
    content: 'Ary indreo koa hitan’izy telo lahy i Mosesy sy i '
  - type: text
    content: Elià
  - type: text
    content: ' niresaka tamin’i Jesoa. '
  '4':
  - type: text
    content: 'Dia hoy i Petera tamin’i Jesoa:'
  - type: text
    content: '–Tompo ô, tsara ho antsika ny mitoetra eto; koa raha sitrakao, dia hanao lay telo eto aho: ny anankiray ho Anao, ny anankiray ho an’i Mosesy, ary ny anankiray ho an’i Elià.'
  '5':
  - type: text
    content: 'Raha mbola niteny i Petera, dia nisy rahona mazava nanarona azy rehetra; ary injao nisy feo avy tao amin’io rahona io nanao hoe:'
  - type: text
    content: –Ity no Zanako, ilay Malalako; Izy no sitrako! Henoy Izy
  - type: note
    content: Jereo 3.17 sy nta. Ampit Deot 18.15.
  - type: text
    content: '!'
  '6':
  - type: text
    content: 'Nony nandre izany ireto mpianatra telo lahy, dia natahotra mafy ka lavo niankohoka tamin’ny tany. '
  '7':
  - type: text
    content: 'Fa nanatona azy i Jesoa, dia nanohina azy sady niteny hoe:'
  - type: text
    content: –Miarena! Aoka izay ny tahotra!
  '8':
  - type: text
    content: Dia niandrandra hijery izy telo lahy, ka tsy nahita olona afa-tsy i Jesoa irery ihany.
  '9':
  - type: text
    content: 'Tamin’izy efa-mianaka nidina avy tany an-tendrombohitra, dia izao no baiko nomen’i Jesoa azy telo lahy:'
  - type: text
    content: '–Aza lazaina na amin’iza na amin’iza iny fahitana iny, mandra-pitsangan’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' ho velona avy any amin’ny maty.'
