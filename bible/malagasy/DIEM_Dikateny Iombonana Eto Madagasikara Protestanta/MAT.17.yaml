document_id: MAT.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiovàn’i Jesoa tarehy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 9.2-13; Lk 9.28-36)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Enina andro taorian’izay, dia nalain’i Jesoa niaraka taminy ry i Petera mbamin-dry i Jakôba sy i Jôhany mirahalahy, ka nentiny nitokana tany an-tendrombohitra avo anankiray. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nanontany an’i Jesoa izy telo lahy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana àry no lazain’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' fa tsy maintsy ho avy i Elià, alohan’ny hahatongavan’ny Mesia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mal 3.1, 23-24; Lk 1.17,76; 7.27.
      marker-yv: yv-n
    - type: text
      text: '?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy maintsy ho avy i Elià hampody ny zavatra rehetra amin’ny laoniny. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nefa izao no lazaiko aminareo: Efa tonga tokoa i Elià, saingy tsy fantatry ny olona sasany ka nanaovany izay fampijaliana rehetra tiany hatao taminy; dia tahaka izany koa no hampijalian-dry zareo ny Zanak’olona.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tamin’izay dia azon’ireto mpianatra telo lahy an-tsaina fa i Jôhany Mpanao batisa no voalazan’i Jesoa taminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay zazalahy voan’ny androbe
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 9.14-29; Lk 9.37-43a)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nony tafaverina teo amin’ny vahoaka ry i Jesoa efa-mianaka, dia nisy lehilahy anankiray nanatona an’i Jesoa ary nandohalika teo anatrehany '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, mamindrà fo amin’ny zanako lahy! Mararin’ny androbe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 4.24 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izy ka mijaly tokoa, fa matetika mianjera any anaty afo na any anaty rano. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Efa nentiko teo amin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatrao
    - type: text
      text: ', saingy tsy nahasitrana azy ry zareo.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Karazan’olona tsy mino sady be siasia ianareo! Mandra-pahoviana no hitoerako eto aminareo? Mandra-pahoviana no handeferako aminareo? Ento atỳ amiko ny zaza!
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia notenenin’i Jesoa mafy ny demony ka niala tamin’ilay zaza; ary sitrana razazalahy nanomboka hatramin’io ora io.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tamin’izay dia nanatona an’i Jesoa manokana ireto mpianatra ka nanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana izahay no tsy naharoaka iny demony iny?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niova tarehy teo anatrehan’izy telo lahy i Jesoa: namirapiratra tahaka ny masoandro ny tavany ary tonga fotsy tahaka ny hazavana ny fitafiany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Dan 10.4-12; 2Pt 1.16-18.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Satria kely finoana loatra ianareo! Eny, lazaiko marina aminareo fa raha manam-pinoana tahaka ny voan-tsinapy anankiray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tahaka... anankiray: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny voan-tsinapy dia noheverina ho bitika indrindra tamin’ireo voan’anana famafy, na dia tsy mitombina tanteraka aza. Jereo 13.32.
      marker-yv: yv-n
    - type: text
      text: ' ianareo ka hiteny amin’io tendrombohitra io hoe: «Mifindrà erỳ», dia hifindra izy; ary tsy hisy tsy ho hainareo hatao.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Iny karazan-demony iny anefa dia tsy tafavoaka, raha tsy amin’ny fivavahana sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fifadian-kanina
    - type: text
      text: .]
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa fanindroany ny hahafatesany sy ny hitsanganany ho velona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 9.30-32; Lk 9.43b-45)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha mbola tafaraka tany Galilea ry i Jesoa mbamin’ny mpianany, dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa hatolotra eo an-tanan’ny olona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ka hovonoiny ho faty, ary hitsangana velona amin’ny andro fahatelo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nalahelo mafy ireo mpianatra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hetran’ny tempoly
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nony tonga tao Kafarnahòma i Jesoa mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ', dia nanatona an’i Petera ireo mpandray ny denàry anankiroa hetran’ny tempoly, ary nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa tsy mandoa ny denàry anankiroa hetran’ny tempoly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 30.11-16.
      marker-yv: yv-n
    - type: text
      text: ' ve ny Mpampianatrareo?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia novalian’i Petera hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandoa izany Izy!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao niditra tao an-trano i Petera, dia notsenain’i Jesoa nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana no hevitrao, ry Simôna? Iza no andraisan’ny mpanjaka etỳ an-tany fadintseranana sy hetra, ny ankohonany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I Jesoa dia Zanak’ilay Andriamanitra tompon’ny tempoly ary ny mpianany koa dia anisan’ny ankohonan’Andriamanitra: noho izany, tsy tokony handoa ny hetran’ny tempoly.'
      marker-yv: yv-n
    - type: text
      text: ' sa ny olon-kafa?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia novalian’i Petera hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny olon-kafa!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha izany àry, dia afaka ny ankohonany. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Kanefa aoka isika tsy hanao izay hampisafoaka ireo olona ireo! Noho izany, ndeha ianao manjono eny am-parihy, dia raiso izay trondro voalohany azonao; ary sokafy ny vavany fa hahitanao vola mitetina denàry efatra. Ento izany ka omeo ireo olona ireo hanefana ny hetrako sy ny anao!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary indreo koa hitan’izy telo lahy i Mosesy sy i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Elià
    - type: text
      text: ' niresaka tamin’i Jesoa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy i Petera tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tompo ô, tsara ho antsika ny mitoetra eto; koa raha sitrakao, dia hanao lay telo eto aho: ny anankiray ho Anao, ny anankiray ho an’i Mosesy, ary ny anankiray ho an’i Elià.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Raha mbola niteny i Petera, dia nisy rahona mazava nanarona azy rehetra; ary injao nisy feo avy tao amin’io rahona io nanao hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: –Ity no Zanako, ilay Malalako; Izy no sitrako! Henoy Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.17 sy nta. Ampit Deot 18.15.
      marker-yv: yv-n
    - type: text
      text: '!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony nandre izany ireto mpianatra telo lahy, dia natahotra mafy ka lavo niankohoka tamin’ny tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa nanatona azy i Jesoa, dia nanohina azy sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miarena! Aoka izay ny tahotra!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia niandrandra hijery izy telo lahy, ka tsy nahita olona afa-tsy i Jesoa irery ihany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tamin’izy efa-mianaka nidina avy tany an-tendrombohitra, dia izao no baiko nomen’i Jesoa azy telo lahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza lazaina na amin’iza na amin’iza iny fahitana iny, mandra-pitsangan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' ho velona avy any amin’ny maty.'
