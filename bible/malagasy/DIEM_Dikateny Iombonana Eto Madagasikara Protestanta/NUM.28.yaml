  children:
  - type: text
    text: Fitsipika momba ny sorona
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: a. Amin’ny isan’andro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy ny TOMPO mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Aoka hotandremanareo ny hanolotra ho an’ny TOMPO, amin’ny fotoana voafetra, ireo fanatitra ho Azy, dia ny sakafo izay hodorana ka hanetona ho hanitra ankasitrahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Izao no sakafo dorana izay hatolotrareo ho an’ny TOMPO isan’andro: zanak’ondry roa izay samy herintaona avy sady tsy misy kilema. Ho sorona dorana manontolo tsy tapaka ho Azy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny zanak’ondry voalohany dia hatolotra ny maraina ary ny faharoa kosa ny hariva, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'miaraka amin’ny lafarinina tsara toto telo kilao nofetaina tamin’ny menaka madio iray litatra sy tapany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Io sorona dorana manontolo isan’andro tsy tapaka io dia araka izay natao tany an-tendrombohitra Sinay; ho sakafo dorana ho an’ny TOMPO izany ka hanetona ho hanitra ankasitrahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Io zanak’ondry voalohany io dia hampiarahina amin’ny fanatitra araraka, izany hoe divay iray litatra sy tapany izay hatolotra ho an’ny TOMPO ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zanak’ondry faharoa kosa dia hatolotra ho an’ny TOMPO amin’ny hariva, ka hampiarahina amin’ireo fanatitra lafarinina sy divay toy ny tamin’ny maraina; ho sakafo dorana ho an’ny TOMPO izany ka hanetona ho hanitra hankasitrahiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: b. Amin’ny andro Sabata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Amin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' kosa dia izao no hatolotra: zanak’ondry roa izay samy herintaona avy sady tsy misy kilema sy lafarinina tsara toto enina kilao nofetaina tamin’ny menaka mbamin’ny fanatitra divay momba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sorona dorana manontolo atolotra isan-tsabata izany ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro sy ny fanatitra divay momba azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: d. Amin’ny andro voalohan’ny volana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Amin’ny andro voalohany isam-bolana, dia ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema no hatolotra ho sorona dorana manontolo ho an’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina tsara toto nofetaina tamin’ny menaka, dia lafarinina sivy kilao isan’ombilahy, lafarinina enina kilao isan’ondrilahy, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary lafarinina telo kilao isan-janak’ondry. Sorona dorana manontolo hanetona ho hanitra hankasitrahin’ny TOMPO izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny fanatitra araraka momba izany kosa dia divay telo litatra isan’ombilahy, divay roa litatra isan’ondrilahy ary iray litatra sy tapany isan-janak’ondry. Izany no sorona hatao isaky ny andro voalohan’ny volana, amin’ny volana rehetra mandritra ny taona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hanolotra osilahy iray koa ho an’ny TOMPO ianareo ho sorona fanalana ny ota, ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro sy ny fanatitra divay momba azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: e. Amin’ny fetin’ny Paska
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Ny andro faha-14, amin’ny volana voalohany isan-taona, no hankalazana ny fetin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ', ho voninahitry ny TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 12.1-13 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny andro faha-15 amin’io volana io ihany no hanombohan’ny andro fito izay hihinananareo ny mofo tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Amin’ny andro voalohany, dia hisy fivoriana masina, ka tsy hanao ny asa fanaonareo andavanandro ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny hatolotrareo ho an’ny TOMPO, ho sakafo miendrika sorona dorana manontolo, dia izao: ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka, dia lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary telo kilao isan-janak’ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hanolotra osilahy iray koa ianareo ho sorona fanalana ny ota, hanaovana ny fombam-pivavahana famelan-keloka ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hataonareo avokoa izany ho fanampin’ny sorona dorana manontolo isa-maraina tsy tapaka. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Isan’andro mandritra ny herinandro no hanaovanareo izany ho an’ny TOMPO, dia sakafo dorana hanetona ho hanitra hankasitrahiny ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro sy ny fanatitra divay momba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Amin’ny andro fahafito dia hisy fivoriana masina ho anareo, ka tsy hanao ny asa fanaonareo andavanandro ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'And 17-25: jereo Eks 12.14-20.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: f. Amin’ny fetin’ny Pentekôsta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: «Amin’ny andro Pentekôsta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Pentekôsta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: antsoina koa hoe fetin’ny fijinjana, jereo Eks 23.16; 34.22; Lev 23.15-21; Deot 16.9-12.
    marker-yv: yv-n
  - type: text
    text: ', rehefa mitondra ny fanatitra voamaina vaovao ho an’ny TOMPO ianareo, dia hisy fivoriana masina ho anareo, ka tsy hanao ny asa fanaonareo andavanandro ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny hatolotrareo ho sorona dorana manontolo hanetona ho hanitra hankasitrahin’ny TOMPO dia izao: ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka ka lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary telo kilao isan-janak’ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hanolotra osilahy iray koa ianareo mba hanaovana ny fombam-pivavahana famelan-keloka ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Hataonareo izany ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro mbamin’ny fanatitra lafarinina momba azy; ary biby tsy misy kilema no hatolotrareo miaraka amin’ny fanatitra divay momba azy.
