      text: Ny zanak’ondry faharoa kosa dia hatolotra ho an’ny TOMPO amin’ny hariva, ka hampiarahina amin’ireo fanatitra lafarinina sy divay toy ny tamin’ny maraina; ho sakafo dorana ho an’ny TOMPO izany ka hanetona ho hanitra hankasitrahiny.
