document_id: NUM.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitsipika momba ny sorona
  - type: heading
    content: a. Amin’ny isan’andro
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO mba hamepetra ny Israelita hoe:'
  '10':
  - type: text
    content: Sorona dorana manontolo atolotra isan-tsabata izany ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro sy ny fanatitra divay momba azy.
  - type: heading
    content: d. Amin’ny andro voalohan’ny volana
  '11':
  - type: text
    content: '«Amin’ny andro voalohany isam-bolana, dia ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema no hatolotra ho sorona dorana manontolo ho an’ny TOMPO. '
  '12':
  - type: text
    content: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina tsara toto nofetaina tamin’ny menaka, dia lafarinina sivy kilao isan’ombilahy, lafarinina enina kilao isan’ondrilahy, '
  '13':
  - type: text
    content: 'ary lafarinina telo kilao isan-janak’ondry. Sorona dorana manontolo hanetona ho hanitra hankasitrahin’ny TOMPO izany. '
  '14':
  - type: text
    content: 'Ny fanatitra araraka momba izany kosa dia divay telo litatra isan’ombilahy, divay roa litatra isan’ondrilahy ary iray litatra sy tapany isan-janak’ondry. Izany no sorona hatao isaky ny andro voalohan’ny volana, amin’ny volana rehetra mandritra ny taona. '
  '15':
  - type: text
    content: Hanolotra osilahy iray koa ho an’ny TOMPO ianareo ho sorona fanalana ny ota, ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro sy ny fanatitra divay momba azy.
  - type: heading
    content: e. Amin’ny fetin’ny Paska
  '16':
  - type: text
    content: '«Ny andro faha-14, amin’ny volana voalohany isan-taona, no hankalazana ny fetin’ny '
  - type: text
    content: Paska
  - type: text
    content: ', ho voninahitry ny TOMPO'
  - type: note
    content: Jereo Eks 12.1-13 sy nta.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ny andro faha-15 amin’io volana io ihany no hanombohan’ny andro fito izay hihinananareo ny mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Amin’ny andro voalohany, dia hisy fivoriana masina, ka tsy hanao ny asa fanaonareo andavanandro ianareo. '
  '19':
  - type: text
    content: 'Ny hatolotrareo ho an’ny TOMPO, ho sakafo miendrika sorona dorana manontolo, dia izao: ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema. '
  '2':
  - type: text
    content: «Aoka hotandremanareo ny hanolotra ho an’ny TOMPO, amin’ny fotoana voafetra, ireo fanatitra ho Azy, dia ny sakafo izay hodorana ka hanetona ho hanitra ankasitrahiny.
  '20':
  - type: text
    content: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka, dia lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy '
  '21':
  - type: text
    content: 'ary telo kilao isan-janak’ondry. '
  '22':
  - type: text
    content: 'Hanolotra osilahy iray koa ianareo ho sorona fanalana ny ota, hanaovana ny fombam-pivavahana famelan-keloka ho anareo. '
  '23':
  - type: text
    content: 'Hataonareo avokoa izany ho fanampin’ny sorona dorana manontolo isa-maraina tsy tapaka. '
  '24':
  - type: text
    content: 'Isan’andro mandritra ny herinandro no hanaovanareo izany ho an’ny TOMPO, dia sakafo dorana hanetona ho hanitra hankasitrahiny ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro sy ny fanatitra divay momba azy. '
  '25':
  - type: text
    content: Amin’ny andro fahafito dia hisy fivoriana masina ho anareo, ka tsy hanao ny asa fanaonareo andavanandro ianareo
  - type: note
    content: 'And 17-25: jereo Eks 12.14-20.'
  - type: text
    content: .
  - type: heading
    content: f. Amin’ny fetin’ny Pentekôsta
  '26':
  - type: text
    content: «Amin’ny andro Pentekôsta
  - type: note
    content: 'Pentekôsta: antsoina koa hoe fetin’ny fijinjana, jereo Eks 23.16; 34.22; Lev 23.15-21; Deot 16.9-12.'
  - type: text
    content: ', rehefa mitondra ny fanatitra voamaina vaovao ho an’ny TOMPO ianareo, dia hisy fivoriana masina ho anareo, ka tsy hanao ny asa fanaonareo andavanandro ianareo. '
  '27':
  - type: text
    content: 'Ny hatolotrareo ho sorona dorana manontolo hanetona ho hanitra hankasitrahin’ny TOMPO dia izao: ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy. '
  '28':
  - type: text
    content: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka ka lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy, '
  '29':
  - type: text
    content: 'ary telo kilao isan-janak’ondry. '
  '3':
  - type: text
    content: '«Izao no sakafo dorana izay hatolotrareo ho an’ny TOMPO isan’andro: zanak’ondry roa izay samy herintaona avy sady tsy misy kilema. Ho sorona dorana manontolo tsy tapaka ho Azy izany. '
  '30':
  - type: text
    content: 'Hanolotra osilahy iray koa ianareo mba hanaovana ny fombam-pivavahana famelan-keloka ho anareo. '
  '31':
  - type: text
    content: Hataonareo izany ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro mbamin’ny fanatitra lafarinina momba azy; ary biby tsy misy kilema no hatolotrareo miaraka amin’ny fanatitra divay momba azy.
  '4':
  - type: text
    content: 'Ny zanak’ondry voalohany dia hatolotra ny maraina ary ny faharoa kosa ny hariva, '
  '5':
  - type: text
    content: 'miaraka amin’ny lafarinina tsara toto telo kilao nofetaina tamin’ny menaka madio iray litatra sy tapany. '
  '6':
  - type: text
    content: 'Io sorona dorana manontolo isan’andro tsy tapaka io dia araka izay natao tany an-tendrombohitra Sinay; ho sakafo dorana ho an’ny TOMPO izany ka hanetona ho hanitra ankasitrahiny. '
  '7':
  - type: text
    content: 'Io zanak’ondry voalohany io dia hampiarahina amin’ny fanatitra araraka, izany hoe divay iray litatra sy tapany izay hatolotra ho an’ny TOMPO ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: '. '
  '8':
  - type: text
    content: Ny zanak’ondry faharoa kosa dia hatolotra ho an’ny TOMPO amin’ny hariva, ka hampiarahina amin’ireo fanatitra lafarinina sy divay toy ny tamin’ny maraina; ho sakafo dorana ho an’ny TOMPO izany ka hanetona ho hanitra hankasitrahiny.
  - type: heading
    content: b. Amin’ny andro Sabata
  '9':
  - type: text
    content: '«Amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' kosa dia izao no hatolotra: zanak’ondry roa izay samy herintaona avy sady tsy misy kilema sy lafarinina tsara toto enina kilao nofetaina tamin’ny menaka mbamin’ny fanatitra divay momba azy. '
