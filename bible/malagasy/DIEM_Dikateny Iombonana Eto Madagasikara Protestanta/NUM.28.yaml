    - type: text
      text: a. Amin’ny isan’andro
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny tamin’i Mosesy ny TOMPO mba hamepetra ny Israelita hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sorona dorana manontolo atolotra isan-tsabata izany ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro sy ny fanatitra divay momba azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: d. Amin’ny andro voalohan’ny volana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Amin’ny andro voalohany isam-bolana, dia ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy sady tsy misy kilema no hatolotra ho sorona dorana manontolo ho an’ny TOMPO. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina tsara toto nofetaina tamin’ny menaka, dia lafarinina sivy kilao isan’ombilahy, lafarinina enina kilao isan’ondrilahy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary lafarinina telo kilao isan-janak’ondry. Sorona dorana manontolo hanetona ho hanitra hankasitrahin’ny TOMPO izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanatitra araraka momba izany kosa dia divay telo litatra isan’ombilahy, divay roa litatra isan’ondrilahy ary iray litatra sy tapany isan-janak’ondry. Izany no sorona hatao isaky ny andro voalohan’ny volana, amin’ny volana rehetra mandritra ny taona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hanolotra osilahy iray koa ho an’ny TOMPO ianareo ho sorona fanalana ny ota, ho fanampin’ny sorona dorana manontolo tsy tapaka isan’andro sy ny fanatitra divay momba azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: e. Amin’ny fetin’ny Paska
