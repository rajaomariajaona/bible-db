  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hatolotrareo ho sorona dorana manontolo hanetona ho hanitra hankasitrahin’ny TOMPO dia izao: ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay samy herintaona avy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny biby tsirairay dia hampiarahina amin’ny lafarinina nofetaina tamin’ny menaka ka lafarinina sivy kilao isan’ombilahy, enina kilao isan’ondrilahy, '
  '29':
  - type: usfm
    marker: p
