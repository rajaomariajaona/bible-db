document_id: NUM.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen’ny Israelita ny Kanahanita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa ren’ilay Kanahanita mpanjakan’i Harada, izay nonina tany amin’ny faritra atsimo, fa tonga avy tamin’ny lalan’i Atarima ny Israelita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Harada: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toerana tokony ho 60 km atsimon’i Jerosalema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Atarima
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toerana tsy fantatra. –Jereo 33.40.'
    marker-yv: yv-n
  - type: text
    text: ', dia notafihiny ireo ary nobaboiny ny sasany taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa nivoady tamin’ny TOMPO ireo Israelita ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha atolotrao eo an-tananay io firenena io, dia hataonay levona ny tanànany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nohenoin’ny TOMPO ny voadin’ny Israelita ka natolony azy ny Kanahanita. Dia nataon’ny Israelita levona izy ireo mbamin’ny tanànany; ary ny anaran’izany toerana izany dia natao hoe Hôrmà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 14.45 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo bibilava misy poizina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Niala tao an-tendrombohitra Hôra ny Israelita, ka nihazo tamin’ny lalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ranomasin’ny Volotara
  - type: text
    text: ' hanodidina ny tanin’i Edôma'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ranomasin’ny Volotara
      - type: text
        text: ' eto dia ny helodranomasin’i Akabà. –Jereo Deot 2.1.'
    marker-yv: yv-n
  - type: text
    text: '. Teny an-dalana anefa dia very toky ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa nanomboka nanakiana an’Andriamanitra sy i Mosesy ny olona nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no nentinareo niala tany Ejipta mba ho faty atỳ an-taniefitra izahay? Atỳ anefa tsy misy na mofo na rano, ary efa leon’itony mofomofo ratsy na hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mana
  - type: text
    text: ' itony izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa nandefasan’ny TOMPO bibilava misy poizina ny vahoaka; ary nokekerin’ireo bibilava ireo ny Israelita ka marobe no maty noho izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 5-6:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1Kôr 10.9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nankeo amin’i Mosesy ny vahoaka sisa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nanota izahay fa nanome tsiny ny TOMPO sy ny tenanao. Koa ifony re ny TOMPO mba hanala ireo bibilava ireo aminay.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nifona ho an’ny vahoaka i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ny TOMPO taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manaova bibilava varahina dia ahantony amin’ny hazo lava fa izay rehetra voakaikitra, ka mijery izany, dia ho velona sady afa-doza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nanao bibilava varahina i Mosesy ka nahantony tamin’ny hazo lava. Ary nisy olona voakaikitry ny bibilava misy poizina ka mijery ilay bibilava varahina, dia velona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 18.4; Jôh 3.14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo dingana haleha hahatongavana any amin’ny tendrombohitra Pisgà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Niainga ny Israelita ka nitoby tao Ôbôta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Niala teo Ôbôta izy, dia nitoby tao Hije-Habarîma ao amin’ny taniefitra atsinanan’i Môaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Niala teo izy, dia nitoby teo amoron’ny ranon-driaka Zareda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Niala teo indray izy, dia nitoby tao an-dafin’ny renirano Arnôna izay mipoitra any amin’ny faritanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' ary mamakivaky ny taniefitra, vao manamorona ny sisin-tanin’i Môaba ka mampisaraka ny faritry ny Môabita sy ny faritry ny Amôrita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany no ilazana ao amin’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Bokin’ireo adin’ny TOMPO
  - type: text
    text: ' hoe: «...i Vaheba any Sofà sy ny sakeli-dranony; i Arnôna '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'izay ombàn’ny sakeli-dranony ka mitsontsorika mankany Hàra ary manaraka ny sisin-tanin’i Môaba...» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Niala teo indray ny Israelita, dia nankany Beèra (na hoe Fantsakana). Teo no nitenenan’ny TOMPO tamin’i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Angony ny vahoaka fa homeko rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’izay indrindra no nihiran’ny Israelita izao hira izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aoka ianao hiboiboika rano, ry fantsakana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanaovanay fihobiana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fantsakana nohadin’ireo filoha
- type: usfm
  marker: q1
  children:
  - type: text
    text: nombàn’ny tehim-pahefàny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fantsakana nolavahan’ireo loholona
- type: usfm
  marker: q1
  children:
  - type: text
    text: nombàn’ny tehim-pifehezany.»
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa niala tao an-taniefitra ny Israelita, dia nankany Matanà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Niala teo Matanà izy, dia nankany Mahaliela; niala teo, dia nankany Bamôta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ary farany, rehefa niala tao Bamôta izy, dia nankany an-dohasaha mamaky ny tanin’i Môaba, ka tafapaka hatrany an-tampon’i Pisgà izay ahatazanana ny taniefitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fandresena an’i Sihôna sy i Hôga mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Naniraka olona nankany amin’i Sihôna mpanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' ny Israelita nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: –Mba avelao re izahay hamaky eo amin’ny taninao. Tsy hamaky any amin’ny saha na ny tanimboaloboka izahay, ary tsy hisotro amin’ny ranom-pantsakana; fa ny lalam-panjakana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 20.17 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ihany no hizoranay mandra-pahafakay ny faritry ny taninao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nefa i Sihôna tsy namela ny Israelita hamaky eo amin’ny taniny; fa nangoniny avokoa ny tafiny rehetra, ka lasa izy nitsena ny Israelita hatrany Jahatsà, any an-taniefitra ary niady taminy tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nasian’ny Israelita tamin’ny lelan-tsabatra kosa i Sihôna ka azony ny taniny voafaritr’i Arnôna ao atsimo sy i Jabôka ao avaratra ary ny sisin-tanin’ny Hamônita, dia ilay sisin-tany ao atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nalain’ny Israelita avokoa ny tanànan’ny Amôrita ka nonenany hatramin’i Hesbôna sy ny tanàna manodidina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I Hesbôna no renivohitr’i Sihôna mpanjakan’ny Amôrita, rehefa avy niady tamin’ny mpanjakan’i Môaba teo aloha izy ka naka ny taniny rehetra hatrany Arnôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izany no nanaovan’ny poety hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mankanesa ao Hesbôna ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ho voatsangana indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho voaorina, toy ny teo aloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay renivohitr’i Sihôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sombina tononkalo hafa, tsy fanta-pototra.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa nisy afo nivoaka avy tao Hesbôna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nisy lelafo avy tao an-drenivohitr’i Sihôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandevona an’i Hara-Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ireo tompon’ny havoan’i Arnôna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Loza no nihatra taminao, ry Môaba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ringana ianao, ry firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mpivavaka tamin’i Kemôsy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny lehilahy izay nikasa handositra
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny vehivavy dia samy nafoin’i Kemôsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho babon’i Sihôna, mpanjakan’ny Amorita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Kemôsy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia andriamanitra sampy notompoin’ny Môabita: jereo Mpits 11,24. '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: '–And 28-29:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Jer 48.45-46.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Kanefa notifirinay zana-tsipîka ny Amôrita.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rava i Hesbôna hatrany Dibôna.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nofoananay avokoa hatrany Nôfà
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatrany Medebà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ireo tanàna môabita voalaza ao, dia jereo Is 15.2, 4 sy nta; i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nôfà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tsy fantatra.'
    marker-yv: yv-n
  - type: text
    text: ' mihitsy aza.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Toy izany no nitoeran’ny Israelita teo amin’ny tanin’ny Amôrita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Naniraka olona hisafo an’i Jahezera i Mosesy; dia nalain’ny Israelita izany tanàna izany sy ireo tanàna kely miankina aminy ary noroahiny ny Amôrita izay nipetraka tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Avy eo dia nivily lalana nankany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ' ireo Israelita. Dia tamy nitsena azy i Hôga, mpanjakan’i Basàna, sy ny tafiny manontolo mba hiady aminy tao Edrehỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ka hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza matahotra azy, fa hatolotro eo an-tananao izy sy ny tafiny manontolo ary ny taniny; ka tahaka ny nanaovanao an’i Sihôna, mpanjakan’ny Amôrita, izay nanjaka tao Hesbôna, no hataonao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Dia nasian’ny Israelita tsy nisy niangana i Hôga sy ny zanany ary ny tafiny manontolo, ka lasany ny taniny.
