document_id: NUM.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandresen’ny Israelita ny Kanahanita
  - type: text
    content: Rehefa ren’ilay Kanahanita mpanjakan’i Harada, izay nonina tany amin’ny faritra atsimo, fa tonga avy tamin’ny lalan’i Atarima ny Israelita
  - type: note
    content: 'Harada: toerana tokony ho 60 km atsimon’i Jerosalema; Atarima: toerana tsy fantatra. –Jereo 33.40.'
  - type: text
    content: ', dia notafihiny ireo ary nobaboiny ny sasany taminy. '
  '10':
  - type: text
    content: 'Niainga ny Israelita ka nitoby tao Ôbôta. '
  '11':
  - type: text
    content: 'Niala teo Ôbôta izy, dia nitoby tao Hije-Habarîma ao amin’ny taniefitra atsinanan’i Môaba. '
  '12':
  - type: text
    content: 'Niala teo izy, dia nitoby teo amoron’ny ranon-driaka Zareda. '
  '13':
  - type: text
    content: 'Niala teo indray izy, dia nitoby tao an-dafin’ny renirano Arnôna izay mipoitra any amin’ny faritanin’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' ary mamakivaky ny taniefitra, vao manamorona ny sisin-tanin’i Môaba ka mampisaraka ny faritry ny Môabita sy ny faritry ny Amôrita. '
  '14':
  - type: text
    content: 'Izany no ilazana ao amin’ny '
  - type: text
    content: Bokin’ireo adin’ny TOMPO
  - type: text
    content: ' hoe: «...i Vaheba any Sofà sy ny sakeli-dranony; i Arnôna '
  '15':
  - type: text
    content: 'izay ombàn’ny sakeli-dranony ka mitsontsorika mankany Hàra ary manaraka ny sisin-tanin’i Môaba...» '
  '16':
  - type: text
    content: 'Niala teo indray ny Israelita, dia nankany Beèra (na hoe Fantsakana). Teo no nitenenan’ny TOMPO tamin’i Mosesy hoe:'
  - type: text
    content: –Angony ny vahoaka fa homeko rano.
  '17':
  - type: text
    content: 'Tamin’izay indrindra no nihiran’ny Israelita izao hira izao:'
  - type: text
    content: «Aoka ianao hiboiboika rano, ry fantsakana,
  - type: text
    content: ka hanaovanay fihobiana!
  '18':
  - type: text
    content: Fantsakana nohadin’ireo filoha
  - type: text
    content: nombàn’ny tehim-pahefàny;
  - type: text
    content: fantsakana nolavahan’ireo loholona
  - type: text
    content: nombàn’ny tehim-pifehezany.»
  - type: text
    content: 'Rehefa niala tao an-taniefitra ny Israelita, dia nankany Matanà. '
  '19':
  - type: text
    content: 'Niala teo Matanà izy, dia nankany Mahaliela; niala teo, dia nankany Bamôta; '
  '2':
  - type: text
    content: 'Koa nivoady tamin’ny TOMPO ireo Israelita ka nanao hoe:'
  - type: text
    content: –Raha atolotrao eo an-tananay io firenena io, dia hataonay levona ny tanànany.
  '20':
  - type: text
    content: ary farany, rehefa niala tao Bamôta izy, dia nankany an-dohasaha mamaky ny tanin’i Môaba, ka tafapaka hatrany an-tampon’i Pisgà izay ahatazanana ny taniefitra.
  - type: heading
    content: Ny fandresena an’i Sihôna sy i Hôga mpanjaka
  '21':
  - type: text
    content: 'Naniraka olona nankany amin’i Sihôna mpanjakan’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' ny Israelita nanao hoe:'
  '22':
  - type: text
    content: –Mba avelao re izahay hamaky eo amin’ny taninao. Tsy hamaky any amin’ny saha na ny tanimboaloboka izahay, ary tsy hisotro amin’ny ranom-pantsakana; fa ny lalam-panjakana
  - type: note
    content: Jereo 20.17 sy nta.
  - type: text
    content: ' ihany no hizoranay mandra-pahafakay ny faritry ny taninao.'
  '23':
  - type: text
    content: 'Nefa i Sihôna tsy namela ny Israelita hamaky eo amin’ny taniny; fa nangoniny avokoa ny tafiny rehetra, ka lasa izy nitsena ny Israelita hatrany Jahatsà, any an-taniefitra ary niady taminy tao. '
  '24':
  - type: text
    content: 'Nasian’ny Israelita tamin’ny lelan-tsabatra kosa i Sihôna ka azony ny taniny voafaritr’i Arnôna ao atsimo sy i Jabôka ao avaratra ary ny sisin-tanin’ny Hamônita, dia ilay sisin-tany ao atsinanana. '
  '25':
  - type: text
    content: 'Nalain’ny Israelita avokoa ny tanànan’ny Amôrita ka nonenany hatramin’i Hesbôna sy ny tanàna manodidina azy. '
  '26':
  - type: text
    content: 'I Hesbôna no renivohitr’i Sihôna mpanjakan’ny Amôrita, rehefa avy niady tamin’ny mpanjakan’i Môaba teo aloha izy ka naka ny taniny rehetra hatrany Arnôna. '
  '27':
  - type: text
    content: 'Izany no nanaovan’ny poety hoe:'
  - type: text
    content: «Mankanesa ao Hesbôna ianareo.
  - type: text
    content: Enga anie ho voatsangana indray
  - type: text
    content: ary ho voaorina, toy ny teo aloha
  - type: text
    content: ilay renivohitr’i Sihôna
  - type: note
    content: Sombina tononkalo hafa, tsy fanta-pototra.
  - type: text
    content: '!'
  '28':
  - type: text
    content: Fa nisy afo nivoaka avy tao Hesbôna,
  - type: text
    content: nisy lelafo avy tao an-drenivohitr’i Sihôna
  - type: text
    content: ka nandevona an’i Hara-Môaba,
  - type: text
    content: sy ireo tompon’ny havoan’i Arnôna.
  '29':
  - type: text
    content: Loza no nihatra taminao, ry Môaba!
  - type: text
    content: Ringana ianao, ry firenena
  - type: text
    content: izay mpivavaka tamin’i Kemôsy!
  - type: text
    content: Na ny lehilahy izay nikasa handositra
  - type: text
    content: na ny vehivavy dia samy nafoin’i Kemôsy
  - type: text
    content: ho babon’i Sihôna, mpanjakan’ny Amorita
  - type: note
    content: 'I Kemôsy dia andriamanitra sampy notompoin’ny Môabita: jereo Mpits 11,24. –And 28-29: jereo Jer 48.45-46.'
  - type: text
    content: .
  '3':
  - type: text
    content: Nohenoin’ny TOMPO ny voadin’ny Israelita ka natolony azy ny Kanahanita. Dia nataon’ny Israelita levona izy ireo mbamin’ny tanànany; ary ny anaran’izany toerana izany dia natao hoe Hôrmà
  - type: note
    content: Jereo 14.45 sy nta.
  - type: text
    content: .
  - type: heading
    content: Ireo bibilava misy poizina
  '30':
  - type: text
    content: Kanefa notifirinay zana-tsipîka ny Amôrita.
  - type: text
    content: Rava i Hesbôna hatrany Dibôna.
  - type: text
    content: Nofoananay avokoa hatrany Nôfà
  - type: text
    content: ary hatrany Medebà
  - type: note
    content: Momba ireo tanàna môabita voalaza ao, dia jereo Is 15.2, 4 sy nta; i Nôfà dia tsy fantatra.
  - type: text
    content: ' mihitsy aza.»'
  '31':
  - type: text
    content: 'Toy izany no nitoeran’ny Israelita teo amin’ny tanin’ny Amôrita. '
  '32':
  - type: text
    content: 'Naniraka olona hisafo an’i Jahezera i Mosesy; dia nalain’ny Israelita izany tanàna izany sy ireo tanàna kely miankina aminy ary noroahiny ny Amôrita izay nipetraka tao. '
  '33':
  - type: text
    content: 'Avy eo dia nivily lalana nankany '
  - type: text
    content: Basàna
  - type: text
    content: ' ireo Israelita. Dia tamy nitsena azy i Hôga, mpanjakan’i Basàna, sy ny tafiny manontolo mba hiady aminy tao Edrehỳ. '
  '34':
  - type: text
    content: 'Ka hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Aza matahotra azy, fa hatolotro eo an-tananao izy sy ny tafiny manontolo ary ny taniny; ka tahaka ny nanaovanao an’i Sihôna, mpanjakan’ny Amôrita, izay nanjaka tao Hesbôna, no hataonao aminy.
  '35':
  - type: text
    content: Dia nasian’ny Israelita tsy nisy niangana i Hôga sy ny zanany ary ny tafiny manontolo, ka lasany ny taniny.
  '4':
  - type: text
    content: 'Niala tao an-tendrombohitra Hôra ny Israelita, ka nihazo tamin’ny lalan’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' hanodidina ny tanin’i Edôma'
  - type: note
    content: Ny Ranomasin’ny Volotara eto dia ny helodranomasin’i Akabà. –Jereo Deot 2.1.
  - type: text
    content: '. Teny an-dalana anefa dia very toky ny vahoaka. '
  '5':
  - type: text
    content: 'Koa nanomboka nanakiana an’Andriamanitra sy i Mosesy ny olona nanao hoe:'
  - type: text
    content: '–Nahoana no nentinareo niala tany Ejipta mba ho faty atỳ an-taniefitra izahay? Atỳ anefa tsy misy na mofo na rano, ary efa leon’itony mofomofo ratsy na hoe '
  - type: text
    content: mana
  - type: text
    content: ' itony izahay.'
  '6':
  - type: text
    content: Koa nandefasan’ny TOMPO bibilava misy poizina ny vahoaka; ary nokekerin’ireo bibilava ireo ny Israelita ka marobe no maty noho izany
  - type: note
    content: 'And 5-6: jereo 1Kôr 10.9.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia nankeo amin’i Mosesy ny vahoaka sisa ka nanao hoe:'
  - type: text
    content: –Efa nanota izahay fa nanome tsiny ny TOMPO sy ny tenanao. Koa ifony re ny TOMPO mba hanala ireo bibilava ireo aminay.
  - type: text
    content: 'Dia nifona ho an’ny vahoaka i Mosesy. '
  '8':
  - type: text
    content: 'Ary hoy ny TOMPO taminy:'
  - type: text
    content: –Manaova bibilava varahina dia ahantony amin’ny hazo lava fa izay rehetra voakaikitra, ka mijery izany, dia ho velona sady afa-doza.
  '9':
  - type: text
    content: Dia nanao bibilava varahina i Mosesy ka nahantony tamin’ny hazo lava. Ary nisy olona voakaikitry ny bibilava misy poizina ka mijery ilay bibilava varahina, dia velona
  - type: note
    content: Jereo 2 Mp 18.4; Jôh 3.14.
  - type: text
    content: .
  - type: heading
    content: Ireo dingana haleha hahatongavana any amin’ny tendrombohitra Pisgà
