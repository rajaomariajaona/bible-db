document_id: EZK.41
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nentin-dralehilahy hankao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efitrano
  - type: text
    text: ' malalaka tao an-tempoly aho. Dia nandrefy teo izy, ka ny rindrin’ny lalantsara mankao dia nisy telo metatra ny sakany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny efitrano malalaka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia izay antsoina koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Toeramasina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fanolorana vovo-javamanitra isan’andro amin’Andriamanitra.'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ny fidirana kosa nahatratra dimy metatra ny velarany; ary roa metatra sy sasany no hatevin’ireo rindrina an-daniny roa. Ny efitrano lehibe dia nisy roapolo metatra ny lavany ary folo metatra ny sakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Avy eo dia niditra terỳ amin’ny efitrano farany anatiny izy. Norefesiny teo amin’ny fidirana ka nisy iray metatra ny sakan’ny andriny; telo metatra kosa ny velaran’ny fidirana ary telo metatra sy sasany ny hatevin’ireo rindrina an-daniny roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Norefesiny ihany koa ny efitrano manontolo: efamira izy io ka samy folo metatra avy ny lafiny efatra. Avy eo dia hoy ralehilahy tamiko: io no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina indrindra
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo trano fanampiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Norefesin’ilay lehilahy ny rindrina anatin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' ka nisy telo metatra ny hateviny. Nisy trano fanampiny maromaro naorina manodidina ka nisy roa metatra ny sakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nisy rihana telo ireny ka samy nisy efitra telopolo avy isaky ny rihana. Ny efitra tsirairay dia mitehina amin’ny rindrina ivelany fa tsy miankina amin’ny tempoly akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nitombo hatrany ny velaran’ny efitra isaky ny rihana fa nihena kosa ny hatevin’ny rindrina manodidina. Noho izany, arakaraky ny niakarana no nampalalaka ny toerana ao anatiny. Avy any amin’ny rihana ambany no niakarana ho ao amin’ny rihana antenatenany ary avy eo no niakarana ho any amin’ny rihana farany ambony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hitako fa ireo trano fanampiny dia nisy vodirindrina telo metatra natovona manodidina ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny rindrina ivelany amin’ireo trano fanampiny ireo dia nisy roa metatra sy sasany ny hateviny. Ny toera-malalaka teo anelanelan’ireto trano fanampiny ireto '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: sy ireo efitra hafa manodidina ny tempoly dia nisy folo metatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny efitra manodidina ao amin’ny kianja anatiny no resahina eto.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Varavarana roa ka ny iray terỳ atsimo ary ny iray terỳ avaratra no nivoahana ireo trano fanampiny hankeo amin’ny toera-malalaka. Ny sakan’io toera-malalaka io kosa dia roa metatra sy sasany manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Teo andrefan’ny tempoly dia nisy trano iray manatrika io toera-malalaka io. Mirefy 45 metatra ny lavany sy 35 metatra ny sakany ary roa metatra sy sasany ny hatevin’ny rindrina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nandrefy ny tempoly ralehilahy ka dimampolo metatra ny halavany. Nisy dimampolo metatra koa ny halavan’ilay toera-malalaka nisy ilay trano teo andrefana mbamin’ny rindriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny sakan’ny tempoly mitodika miantsinanana sy ny toera-malalaka teo an-daniny roa dia nahatratra dimampolo metatra ny halehibeny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Norefesin-dralehilahy koa ny halavan’ilay trano tao ivohon’ny tempoly miaraka amin’ny lalantsara teo an-daniny roa ka nisy dimampolo metatra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ao anatin’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny lalantsara fidirana sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efitrano malalaka
  - type: text
    text: ' ary ny efitrano anatiny indrindra tao amin’ny tempoly dia samy norakofana hazo fisaka avokoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'toy izany koa ny varavaran-kely makarakara sy ireo tranoheva fanampiny mirihana telo manodidina ny tempoly. Voapetaka hazo avokoa hatreo amin’ny fototra ka hatreny amin’ny varavaran-kely. Voarakotra latsy kosa ny varavaran-kely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny teo ivelan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' sy ny tao anatiny, manomboka eo am-baravarana fidirana ka hatrany amin’ny efitrano farany anatiny, dia noravahana avokoa ny rindrina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ka nasiana sokitra mampiseho kerobima sy rofia. Ny rofia no manelanelana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: '. Ny kerobima tsirairay dia manana tarehy roa: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka ny anankiray tarehin’olona mitodika amin’ny rofia etsy an-daniny, ary ny anankiray tarehin-diona mitodika amin’ny rofia etsy an-kilany. Natao toy izany avokoa ny manodidina ny tempoly manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voasikotra eny amin’ny rindrina ny kerobima manomboka eo amin’ny tany ka hatrany ambony varavarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Miralafy ny tolam-baravaran’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efitrano malalaka
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Manoloana ny Toeramasina Indrindra dia tazana ho misy zavatra mitovitovy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' hazo izay mirefy iray metatra sy sasany ny haavony ary iray metatra ny sakany. Misy zorony sy fanambaniny ary sisiny hazo. Ka hoy ralehilahy tamiko: «Io no latabatra eo anatrehan’ny TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanambaniny: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt tranainy grika. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'latabatra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fametrahana ny mofo aseho izany, kanefa manjary alitara mihitsy amin’ny fahitan’i Ezekiela.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Varavarana kopa-droa no idirana ho ao amin’ilay efitrano malalaka; ary varavarana kopa-droa hafa koa no idirana ho ao amin’ny Toeramasina Indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ireo varavarana kopa-droa ireo dia samy nisy lela-varavarana roa avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nisy sarina kerobima sy rofia voasokitra tahaka ny teny amin’ny rindrina teo amin’ny varavaran’ny efitrano malalaka. Teo ivelany kosa dia nisy tatao hazo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tatao hazo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny naoty momba ny 1 Mp 7.6.
    marker-yv: yv-n
  - type: text
    text: ' teo ambonin’ny varavarana fidirana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny rindrina eo an-daniny roa amin’ny lalantsara fidirana dia nahitana varavaran-kely misy karakara vy sy sarin-drofia voasokitra.
