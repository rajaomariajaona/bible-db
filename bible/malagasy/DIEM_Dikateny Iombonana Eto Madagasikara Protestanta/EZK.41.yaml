document_id: EZK.41,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nentin-dralehilahy hankao amin’ny '
  - type: text
    content: efitrano
  - type: text
    content: ' malalaka tao an-tempoly aho. Dia nandrefy teo izy, ka ny rindrin’ny lalantsara mankao dia nisy telo metatra ny sakany'
  - type: note
    content: Ny efitrano malalaka dia izay antsoina koa hoe Toeramasina fanolorana vovo-javamanitra isan’andro amin’Andriamanitra.
  - type: text
    content: '; '
  '10':
  - type: text
    content: sy ireo efitra hafa manodidina ny tempoly dia nisy folo metatra
  - type: note
    content: Ny efitra manodidina ao amin’ny kianja anatiny no resahina eto.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Varavarana roa ka ny iray terỳ atsimo ary ny iray terỳ avaratra no nivoahana ireo trano fanampiny hankeo amin’ny toera-malalaka. Ny sakan’io toera-malalaka io kosa dia roa metatra sy sasany manodidina. '
  '12':
  - type: text
    content: 'Teo andrefan’ny tempoly dia nisy trano iray manatrika io toera-malalaka io. Mirefy 45 metatra ny lavany sy 35 metatra ny sakany ary roa metatra sy sasany ny hatevin’ny rindrina. '
  '13':
  - type: text
    content: 'Nandrefy ny tempoly ralehilahy ka dimampolo metatra ny halavany. Nisy dimampolo metatra koa ny halavan’ilay toera-malalaka nisy ilay trano teo andrefana mbamin’ny rindriny. '
  '14':
  - type: text
    content: 'Ny sakan’ny tempoly mitodika miantsinanana sy ny toera-malalaka teo an-daniny roa dia nahatratra dimampolo metatra ny halehibeny. '
  '15':
  - type: text
    content: Norefesin-dralehilahy koa ny halavan’ilay trano tao ivohon’ny tempoly miaraka amin’ny lalantsara teo an-daniny roa ka nisy dimampolo metatra.
  - type: heading
    content: Ny ao anatin’ny tempoly
  - type: text
    content: 'Ny lalantsara fidirana sy ny '
  - type: text
    content: efitrano malalaka
  - type: text
    content: ' ary ny efitrano anatiny indrindra tao amin’ny tempoly dia samy norakofana hazo fisaka avokoa; '
  '16':
  - type: text
    content: 'toy izany koa ny varavaran-kely makarakara sy ireo tranoheva fanampiny mirihana telo manodidina ny tempoly. Voapetaka hazo avokoa hatreo amin’ny fototra ka hatreny amin’ny varavaran-kely. Voarakotra latsy kosa ny varavaran-kely. '
  '17':
  - type: text
    content: 'Ny teo ivelan’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' sy ny tao anatiny, manomboka eo am-baravarana fidirana ka hatrany amin’ny efitrano farany anatiny, dia noravahana avokoa ny rindrina, '
  '18':
  - type: text
    content: 'ka nasiana sokitra mampiseho kerobima sy rofia. Ny rofia no manelanelana ny '
  - type: text
    content: kerobima
  - type: text
    content: '. Ny kerobima tsirairay dia manana tarehy roa: '
  '19':
  - type: text
    content: 'ka ny anankiray tarehin’olona mitodika amin’ny rofia etsy an-daniny, ary ny anankiray tarehin-diona mitodika amin’ny rofia etsy an-kilany. Natao toy izany avokoa ny manodidina ny tempoly manontolo. '
  '2':
  - type: text
    content: 'ny fidirana kosa nahatratra dimy metatra ny velarany; ary roa metatra sy sasany no hatevin’ireo rindrina an-daniny roa. Ny efitrano lehibe dia nisy roapolo metatra ny lavany ary folo metatra ny sakany. '
  '20':
  - type: text
    content: 'Voasikotra eny amin’ny rindrina ny kerobima manomboka eo amin’ny tany ka hatrany ambony varavarana. '
  '21':
  - type: text
    content: 'Miralafy ny tolam-baravaran’ilay '
  - type: text
    content: efitrano malalaka
  - type: text
    content: .
  - type: text
    content: 'Manoloana ny Toeramasina Indrindra dia tazana ho misy zavatra mitovitovy '
  '22':
  - type: text
    content: 'amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' hazo izay mirefy iray metatra sy sasany ny haavony ary iray metatra ny sakany. Misy zorony sy fanambaniny ary sisiny hazo. Ka hoy ralehilahy tamiko: «Io no latabatra eo anatrehan’ny TOMPO'
  - type: note
    content: 'fanambaniny: araka ny dkt tranainy grika. –latabatra: fametrahana ny mofo aseho izany, kanefa manjary alitara mihitsy amin’ny fahitan’i Ezekiela.'
  - type: text
    content: .»
  '23':
  - type: text
    content: 'Varavarana kopa-droa no idirana ho ao amin’ilay efitrano malalaka; ary varavarana kopa-droa hafa koa no idirana ho ao amin’ny Toeramasina Indrindra. '
  '24':
  - type: text
    content: 'Ireo varavarana kopa-droa ireo dia samy nisy lela-varavarana roa avy. '
  '25':
  - type: text
    content: Nisy sarina kerobima sy rofia voasokitra tahaka ny teny amin’ny rindrina teo amin’ny varavaran’ny efitrano malalaka. Teo ivelany kosa dia nisy tatao hazo
  - type: note
    content: 'tatao hazo: jereo ny naoty momba ny 1 Mp 7.6.'
  - type: text
    content: ' teo ambonin’ny varavarana fidirana. '
  '26':
  - type: text
    content: Ary ny rindrina eo an-daniny roa amin’ny lalantsara fidirana dia nahitana varavaran-kely misy karakara vy sy sarin-drofia voasokitra.
  '3':
  - type: text
    content: 'Avy eo dia niditra terỳ amin’ny efitrano farany anatiny izy. Norefesiny teo amin’ny fidirana ka nisy iray metatra ny sakan’ny andriny; telo metatra kosa ny velaran’ny fidirana ary telo metatra sy sasany ny hatevin’ireo rindrina an-daniny roa. '
  '4':
  - type: text
    content: 'Norefesiny ihany koa ny efitrano manontolo: efamira izy io ka samy folo metatra avy ny lafiny efatra. Avy eo dia hoy ralehilahy tamiko: io no '
  - type: text
    content: Toeramasina indrindra
  - type: text
    content: .
  - type: heading
    content: Ireo trano fanampiny
  '5':
  - type: text
    content: 'Norefesin’ilay lehilahy ny rindrina anatin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' ka nisy telo metatra ny hateviny. Nisy trano fanampiny maromaro naorina manodidina ka nisy roa metatra ny sakany. '
  '6':
  - type: text
    content: 'Nisy rihana telo ireny ka samy nisy efitra telopolo avy isaky ny rihana. Ny efitra tsirairay dia mitehina amin’ny rindrina ivelany fa tsy miankina amin’ny tempoly akory. '
  '7':
  - type: text
    content: 'Nitombo hatrany ny velaran’ny efitra isaky ny rihana fa nihena kosa ny hatevin’ny rindrina manodidina. Noho izany, arakaraky ny niakarana no nampalalaka ny toerana ao anatiny. Avy any amin’ny rihana ambany no niakarana ho ao amin’ny rihana antenatenany ary avy eo no niakarana ho any amin’ny rihana farany ambony. '
  '8':
  - type: text
    content: 'Ary hitako fa ireo trano fanampiny dia nisy vodirindrina telo metatra natovona manodidina ny tempoly. '
  '9':
  - type: text
    content: 'Ny rindrina ivelany amin’ireo trano fanampiny ireo dia nisy roa metatra sy sasany ny hateviny. Ny toera-malalaka teo anelanelan’ireto trano fanampiny ireto '
