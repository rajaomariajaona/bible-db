document_id: NUM.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Foko telo no nipetraka teo atsinanan’i Jôrdàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nanana andiana biby fiompy marobe ny taranak’i Reobena sy ny taranak’i Gada. Rehefa hitany fa mety hiompiana tsara ny faritr’i Jahezera sy ny tanin’i Gilehada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny faritr’i Jahezera sy ny tanin’i Gilehada: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia faritany roa ao atsinanan’i Jôrdàna, ary elanelanin’ny ranon-driaka Jabôka.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia niteny tamin’i Mosesy sy i Elehazara mpisorona ary ny filohan’ny fiangonana izy roa tonta ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '–I Hatarôta sy i Dibôna, i Jahezera sy i Nimrà, i Hesbôna sy i Elehale, i Sebama sy i Nebao ary i Behôna dia tanàna '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: anisan’ny tany izay azon’ny Israelita noho ny fanampian’ny TOMPO. Tany tsara iompiana biby izany; ary izahay rahateo dia manana biby fiompy maro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy koa ny Reobenita sy ny Gadita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha ekenao ihany ny soso-kevitray, ry Mosesy, dia aoka io tany io mba homena anay ho zarataninay, fa aza entina mita an’i Jôrdàna izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy i Mosesy tamin’ny taranak’i Gada sy ny taranak’i Reobena:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ahoana hoe? Ny mpiray firenena aminareo handeha hanafika, ka ianareo kosa ve hijanom-potsiny eto? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nahoana ny Israelita no kivìnareo tsy hankany amin’ny tany izay nomen’ny TOMPO azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nanao fahadisoana toy izany koa ny rainareo, raha nirahiko avy tao Kadesy-Barnea hisafo ny tany Kanahàna izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha tonga tao an-dohasahan’i Eskôla izy ka nahita ny tany, dia nanakivy ny Israelita mba tsy hankanesany any amin’ny tany izay nomen’ny TOMPO azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.9 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 8-9:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 13.17-33.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nirehi-pahatezerana ny TOMPO tamin’izay andro izay, ka nianiana nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Ireo olona izay niakatra avy tany Ejipta ka feno roapolo taona no ho miakatra, dia tsy hisy hahita ny tany izay efa nianianako tamin’i Abrahama sy i Itsehàka ary i Jakôba fa homena azy, satria tsy nanaraka ny teniko izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I Kaleba, zanakalahin’i Jefone izay anisan’ny tarik’i Kenaza, ary i Josoa zanakalahin’i Nona ihany no hiditra any, satria izy roa lahy no nanaraka ny teniko.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tezitra aoka izany tamin’ny Israelita ny TOMPO ka nampirenireny azy efapolo taona tany an-taniefitra mandra-pahalany tamingana izay rehetra nanao ratsy teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ianareo, ry andian’olona mpanota, indreo ianareo fa manara-dia ireo rainareo ka hampirehitra indray ny fahatezeran’ny TOMPO amin’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa raha tsy mety manaraka ny Teniny ianareo, dia hohalavainy ny fitoeran’ny Israelita atỳ an-taniefitra, ary ho tompon’andraikitra amin’ny fahavoazan’izao vahoaka rehetra izao ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nanatona an’i Mosesy ny Reobenita sy ny Gadita ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hanao vala ho an’ny biby fiompy sy tanàna ho an’ny fianankavianay eto izahay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary avy eo dia handray fiadiana faingana ka handeha eo alohan’ny Israelita mandra-panatitray azy any aminy, fa ny fianakavianay kosa hijanona ao amin’ny tanàna mimanda mba ho voaaro amin’ny mponina eto amin’ny faritany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy hody izahay raha tsy tafapetraka amin’ny zara taniny avy ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa tsy hiara-mandova aminy ny any an-dafy andrefan’i Jôrdàna izahay, satria ny anjara lovanay dia atỳ an-dafy atsinanan’i Jôrdàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy i Mosesy tamin’ny Reobenita sy ny Gadita:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha izany no ataonareo, dia raiso ny fiadianareo mba hiantafika eo ambany fifehezan’ny TOMPO; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary aoka ny lehilahy vonon-kiady rehetra hiampita eny an-dafy andrefan’i Jôrdàna araka ny fifehezan’ny TOMPO ka haharitra ao mandra-pandroakan’ny Tompo ireo fahavalony! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa resy eo anatrehan’ny TOMPO io tany io, dia hody ianareo ka ho afa-tsiny amin’ny TOMPO sy amin’ny Israelita hafa; ary hoeken’ny TOMPO ho fanananareo ity tany ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha tsy manao izany kosa ianareo, dia manota amin’ny TOMPO, ary fantaro fa ianareo ihany no hifoteran’ny vokatry ny fahotanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Manaova tanàna ho an’ny fianakavianareo ary vala ho an’ny ondry aman’osinareo; nefa tanteraho izay fampanantenana naloaky ny vavanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny taranak’i Gada sy ny taranak’i Reobena ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hanao araka izay nandidianao izahay, tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny vady aman-janakay sy ny ondry aman’osinay ary ny biby hafa rehetra fiompinay dia hajanonay eto amin’ny tanànan’i Gilehada; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: fa izahay kosa dia efa samy vonon-kiady avokoa ka handeha hiantafika eo ambany fifehezan’ny TOMPO, araka izay nolazainao, ry Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nomen’i Mosesy baiko ny amin’ireo i Elehazara mpisorona sy i Josoa zanakalahin’i Nona ary ny filoham-pianakaviana tamin’ny foko israelita '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha hiara-mita an’i Jôrdàna aminareo ny miaramila gadita sy robenita rehetra mirongo fiadiana mba hiantafika eo ambany fifehezan’ny TOMPO, ka ho resinareo ny tany eo anoloanareo, dia omeo ho fananany ny tany Gilehada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa raha tsy manao izany kosa izy, dia miaraka aminareo ihany ao amin’ny tany Kanahàna no hahazoany zara tany ho fananany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia namaly ny miaramila Gadita sy i Reobenita ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izay nandidian’ny TOMPO anay no hataonay! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Handray fiadiana izahay ka hitsofoka ao amin’ny tany Kanahàna araka ny fifehezan’ny TOMPO, mba ho atỳ an-dafy atsinanan’i Jôrdàna atỳ no hahazoanay zara tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.32 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 28-32:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 1.12-15.
    marker-yv: yv-n
  - type: text
    text: ' ho fananany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nomen’i Mosesy ny taranak’i Gada sy ny taranak’i Reobena ary ny antsasaky ny fokon’i Manase zanakalahin’i Jôsefa, ny fanjakan’i Sihôna mpanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' sy ny fanjakan’i Hôga mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ', dia ny tany mbamin’ny tanànany miaraka amin’ny faritra manodidina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny taranak’i Gada nanangana indray ireto tanàna ireto, dia i Dibôna sy i Hatarôta, i Harôhera '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'sy i Hatarôta-Sôfàna, i Jahezera sy i Jôgbôhà '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ary i Bety-Nimrà sy i Bety-Haràna; nataony tanàna mimanda ireo ary nisy koa valan’ondry namboariny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa ny taranak’i Reobena kosa nanangana indray ireto tanàna ireto, dia i Hesbôna sy i Elehale, i Kiriataîma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: sy i Nebao ary i Bahala-Mehôna sy i Sibmà; ary dia nomeny anaram-baovao ny tanàna sasantsasany izay naoriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny taranak’i Makira, zanakalahin’i Manase, dia nankany Gilehada ka nahazo azy ary nandroaka ny Amôrita izay nipetraka tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Koa nomen’i Mosesy an’ireo taranak’i Makira zanakalahin’i Manase i Gilehada ary dia nipetraka tao ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Mba lasa koa ny taranak’i Jaîro zanakalahin’i Manase naka ny tanàna madinika teo amin’ny Amôrita ka nanome anarana azy hoe «Havôta-Jaîro». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary lasa koa i Nôba naka an’i Kenata sy ny tanàna madinika manodidina ka niantso azy hoe Nôba araka ny anarany ihany.
