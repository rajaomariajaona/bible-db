document_id: NUM.32,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Foko telo no nipetraka teo atsinanan’i Jôrdàna
  - type: text
    content: Nanana andiana biby fiompy marobe ny taranak’i Reobena sy ny taranak’i Gada. Rehefa hitany fa mety hiompiana tsara ny faritr’i Jahezera sy ny tanin’i Gilehada
  - type: note
    content: 'Ny faritr’i Jahezera sy ny tanin’i Gilehada: dia faritany roa ao atsinanan’i Jôrdàna, ary elanelanin’ny ranon-driaka Jabôka.'
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'Nirehi-pahatezerana ny TOMPO tamin’izay andro izay, ka nianiana nanao hoe: '
  '11':
  - type: text
    content: '«Ireo olona izay niakatra avy tany Ejipta ka feno roapolo taona no ho miakatra, dia tsy hisy hahita ny tany izay efa nianianako tamin’i Abrahama sy i Itsehàka ary i Jakôba fa homena azy, satria tsy nanaraka ny teniko izy. '
  '12':
  - type: text
    content: 'I Kaleba, zanakalahin’i Jefone izay anisan’ny tarik’i Kenaza, ary i Josoa zanakalahin’i Nona ihany no hiditra any, satria izy roa lahy no nanaraka ny teniko.» '
  '13':
  - type: text
    content: 'Tezitra aoka izany tamin’ny Israelita ny TOMPO ka nampirenireny azy efapolo taona tany an-taniefitra mandra-pahalany tamingana izay rehetra nanao ratsy teo anatrehany. '
  '14':
  - type: text
    content: 'Ary ianareo, ry andian’olona mpanota, indreo ianareo fa manara-dia ireo rainareo ka hampirehitra indray ny fahatezeran’ny TOMPO amin’ny Israelita. '
  '15':
  - type: text
    content: Fa raha tsy mety manaraka ny Teniny ianareo, dia hohalavainy ny fitoeran’ny Israelita atỳ an-taniefitra, ary ho tompon’andraikitra amin’ny fahavoazan’izao vahoaka rehetra izao ianareo.
  '16':
  - type: text
    content: 'Dia nanatona an’i Mosesy ny Reobenita sy ny Gadita ka nanao taminy hoe:'
  - type: text
    content: '–Hanao vala ho an’ny biby fiompy sy tanàna ho an’ny fianankavianay eto izahay; '
  '17':
  - type: text
    content: 'ary avy eo dia handray fiadiana faingana ka handeha eo alohan’ny Israelita mandra-panatitray azy any aminy, fa ny fianakavianay kosa hijanona ao amin’ny tanàna mimanda mba ho voaaro amin’ny mponina eto amin’ny faritany. '
  '18':
  - type: text
    content: 'Tsy hody izahay raha tsy tafapetraka amin’ny zara taniny avy ny Israelita. '
  '19':
  - type: text
    content: Fa tsy hiara-mandova aminy ny any an-dafy andrefan’i Jôrdàna izahay, satria ny anjara lovanay dia atỳ an-dafy atsinanan’i Jôrdàna.
  '2':
  - type: text
    content: 'dia niteny tamin’i Mosesy sy i Elehazara mpisorona ary ny filohan’ny fiangonana izy roa tonta ka nanao hoe:'
  '20':
  - type: text
    content: 'Dia hoy i Mosesy tamin’ny Reobenita sy ny Gadita:'
  - type: text
    content: '–Raha izany no ataonareo, dia raiso ny fiadianareo mba hiantafika eo ambany fifehezan’ny TOMPO; '
  '21':
  - type: text
    content: 'ary aoka ny lehilahy vonon-kiady rehetra hiampita eny an-dafy andrefan’i Jôrdàna araka ny fifehezan’ny TOMPO ka haharitra ao mandra-pandroakan’ny Tompo ireo fahavalony! '
  '22':
  - type: text
    content: 'Rehefa resy eo anatrehan’ny TOMPO io tany io, dia hody ianareo ka ho afa-tsiny amin’ny TOMPO sy amin’ny Israelita hafa; ary hoeken’ny TOMPO ho fanananareo ity tany ity. '
  '23':
  - type: text
    content: 'Fa raha tsy manao izany kosa ianareo, dia manota amin’ny TOMPO, ary fantaro fa ianareo ihany no hifoteran’ny vokatry ny fahotanareo. '
  '24':
  - type: text
    content: Manaova tanàna ho an’ny fianakavianareo ary vala ho an’ny ondry aman’osinareo; nefa tanteraho izay fampanantenana naloaky ny vavanareo.
  '25':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny taranak’i Gada sy ny taranak’i Reobena ka nanao hoe:'
  - type: text
    content: '–Hanao araka izay nandidianao izahay, tompoko. '
  '26':
  - type: text
    content: 'Ny vady aman-janakay sy ny ondry aman’osinay ary ny biby hafa rehetra fiompinay dia hajanonay eto amin’ny tanànan’i Gilehada; '
  '27':
  - type: text
    content: fa izahay kosa dia efa samy vonon-kiady avokoa ka handeha hiantafika eo ambany fifehezan’ny TOMPO, araka izay nolazainao, ry Mosesy.
  '28':
  - type: text
    content: 'Dia nomen’i Mosesy baiko ny amin’ireo i Elehazara mpisorona sy i Josoa zanakalahin’i Nona ary ny filoham-pianakaviana tamin’ny foko israelita '
  '29':
  - type: text
    content: 'ka nilazany hoe:'
  - type: text
    content: '–Raha hiara-mita an’i Jôrdàna aminareo ny miaramila gadita sy robenita rehetra mirongo fiadiana mba hiantafika eo ambany fifehezan’ny TOMPO, ka ho resinareo ny tany eo anoloanareo, dia omeo ho fananany ny tany Gilehada. '
  '3':
  - type: text
    content: '–I Hatarôta sy i Dibôna, i Jahezera sy i Nimrà, i Hesbôna sy i Elehale, i Sebama sy i Nebao ary i Behôna dia tanàna '
  '30':
  - type: text
    content: Fa raha tsy manao izany kosa izy, dia miaraka aminareo ihany ao amin’ny tany Kanahàna no hahazoany zara tany ho fananany.
  '31':
  - type: text
    content: 'Dia namaly ny miaramila Gadita sy i Reobenita ka nanao hoe:'
  - type: text
    content: '–Izay nandidian’ny TOMPO anay no hataonay! '
  '32':
  - type: text
    content: Handray fiadiana izahay ka hitsofoka ao amin’ny tany Kanahàna araka ny fifehezan’ny TOMPO, mba ho atỳ an-dafy atsinanan’i Jôrdàna atỳ no hahazoanay zara tany
  - type: note
    content: 'And 28-32: jereo Jos 1.12-15.'
  - type: text
    content: ' ho fananany.'
  '33':
  - type: text
    content: 'Dia nomen’i Mosesy ny taranak’i Gada sy ny taranak’i Reobena ary ny antsasaky ny fokon’i Manase zanakalahin’i Jôsefa, ny fanjakan’i Sihôna mpanjakan’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sy ny fanjakan’i Hôga mpanjakan’i '
  - type: text
    content: Basàna
  - type: text
    content: ', dia ny tany mbamin’ny tanànany miaraka amin’ny faritra manodidina.'
  '34':
  - type: text
    content: 'Ary ny taranak’i Gada nanangana indray ireto tanàna ireto, dia i Dibôna sy i Hatarôta, i Harôhera '
  '35':
  - type: text
    content: 'sy i Hatarôta-Sôfàna, i Jahezera sy i Jôgbôhà '
  '36':
  - type: text
    content: ary i Bety-Nimrà sy i Bety-Haràna; nataony tanàna mimanda ireo ary nisy koa valan’ondry namboariny.
  '37':
  - type: text
    content: 'Fa ny taranak’i Reobena kosa nanangana indray ireto tanàna ireto, dia i Hesbôna sy i Elehale, i Kiriataîma, '
  '38':
  - type: text
    content: sy i Nebao ary i Bahala-Mehôna sy i Sibmà; ary dia nomeny anaram-baovao ny tanàna sasantsasany izay naoriny.
  '39':
  - type: text
    content: 'Ny taranak’i Makira, zanakalahin’i Manase, dia nankany Gilehada ka nahazo azy ary nandroaka ny Amôrita izay nipetraka tao. '
  '4':
  - type: text
    content: anisan’ny tany izay azon’ny Israelita noho ny fanampian’ny TOMPO. Tany tsara iompiana biby izany; ary izahay rahateo dia manana biby fiompy maro.
  '40':
  - type: text
    content: 'Koa nomen’i Mosesy an’ireo taranak’i Makira zanakalahin’i Manase i Gilehada ary dia nipetraka tao ireo. '
  '41':
  - type: text
    content: 'Mba lasa koa ny taranak’i Jaîro zanakalahin’i Manase naka ny tanàna madinika teo amin’ny Amôrita ka nanome anarana azy hoe «Havôta-Jaîro». '
  '42':
  - type: text
    content: Ary lasa koa i Nôba naka an’i Kenata sy ny tanàna madinika manodidina ka niantso azy hoe Nôba araka ny anarany ihany.
  '5':
  - type: text
    content: 'Hoy koa ny Reobenita sy ny Gadita hoe:'
  - type: text
    content: –Raha ekenao ihany ny soso-kevitray, ry Mosesy, dia aoka io tany io mba homena anay ho zarataninay, fa aza entina mita an’i Jôrdàna izahay.
  '6':
  - type: text
    content: 'Dia hoy i Mosesy tamin’ny taranak’i Gada sy ny taranak’i Reobena:'
  - type: text
    content: '–Ahoana hoe? Ny mpiray firenena aminareo handeha hanafika, ka ianareo kosa ve hijanom-potsiny eto? '
  '7':
  - type: text
    content: 'Nahoana ny Israelita no kivìnareo tsy hankany amin’ny tany izay nomen’ny TOMPO azy? '
  '8':
  - type: text
    content: 'Nanao fahadisoana toy izany koa ny rainareo, raha nirahiko avy tao Kadesy-Barnea hisafo ny tany Kanahàna izy. '
  '9':
  - type: text
    content: Fa raha tonga tao an-dohasahan’i Eskôla izy ka nahita ny tany, dia nanakivy ny Israelita mba tsy hankanesany any amin’ny tany izay nomen’ny TOMPO azy
  - type: note
    content: 'And 8-9: jereo 13.17-33.'
  - type: text
    content: '. '
