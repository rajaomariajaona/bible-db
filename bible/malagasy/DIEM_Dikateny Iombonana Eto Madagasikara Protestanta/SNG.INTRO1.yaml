  - type: text
    text: ' Tononkiran’i Salômôna '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ho fanehoana an’ohatra ny fifandraisan’Andriamanitra amin’ny vahoakany. Ny fifankatiavan’ny lehilahy iray sy ny vehivavy iray anefa dia fanomezana avy amin’Andriamanitra. Noho izany dia manana ny toerany ao amin’ny Baiboly izy, ary ny
  - type: text
    text: ' Tononkiran’i Salômôna '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dia azo raisina tsotra ho toy ny akom-pigagana manoloana izay voalaza ao amin’ny tantaran’ny Fahariana (Gen 2.23-25).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Azo tsinjaraina fito ity boky ity (1.2–2.7; 2.8-17; 3.1–5.1; 5.2–6.3; 6.4–7.11; 7.12–8.5a; 8.5b-14), izay ahitana hainteny ifamalian’olon-droa mifampitady dia mifankahita, mifanary dia mifampikaroka; izany indraindray dia voatapaky ny feon’olon-kafa izay tsy ary ho be fitiavana avokoa: ny'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry ondry
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: (tovolahy sakaizan-dralehilahy), ny renin-dravehivavy na ny anadahiny na koa ny tovovavy sakaizany. Eny antsefatsefany eny dia mihambo ho mpanelanelana azy roa mpifankatia ireo sokajin’olona ireo. Saingy tsy azy anefa izany fitiavana izany, fa fanomezan’Andriamanitra ho an’izay mifankatia.
