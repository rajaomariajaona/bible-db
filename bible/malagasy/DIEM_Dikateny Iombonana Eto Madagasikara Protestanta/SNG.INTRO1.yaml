verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: –Ny
  - type: text
    content: ' Tononkiran’i Salômôna '
  - type: text
    content: dia amboaram-kiram-pitiavana izay ahitana ny fihetsehampon’ny mpifankatia anankiroa. Efa hatramin’ny ela no nandraisana ny
  - type: text
    content: ' Tononkiran’i Salômôna '
  - type: text
    content: ho fanehoana an’ohatra ny fifandraisan’Andriamanitra amin’ny vahoakany. Ny fifankatiavan’ny lehilahy iray sy ny vehivavy iray anefa dia fanomezana avy amin’Andriamanitra. Noho izany dia manana ny toerany ao amin’ny Baiboly izy, ary ny
  - type: text
    content: ' Tononkiran’i Salômôna '
  - type: text
    content: dia azo raisina tsotra ho toy ny akom-pigagana manoloana izay voalaza ao amin’ny tantaran’ny Fahariana (Gen 2.23-25).
  - type: text
    content: 'Azo tsinjaraina fito ity boky ity (1.2–2.7; 2.8-17; 3.1–5.1; 5.2–6.3; 6.4–7.11; 7.12–8.5a; 8.5b-14), izay ahitana hainteny ifamalian’olon-droa mifampitady dia mifankahita, mifanary dia mifampikaroka; izany indraindray dia voatapaky ny feon’olon-kafa izay tsy ary ho be fitiavana avokoa: ny'
  - type: text
    content: ' '
  - type: text
    content: mpiandry ondry
  - type: text
    content: ' '
  - type: text
    content: (tovolahy sakaizan-dralehilahy), ny renin-dravehivavy na ny anadahiny na koa ny tovovavy sakaizany. Eny antsefatsefany eny dia mihambo ho mpanelanelana azy roa mpifankatia ireo sokajin’olona ireo. Saingy tsy azy anefa izany fitiavana izany, fa fanomezan’Andriamanitra ho an’izay mifankatia.
