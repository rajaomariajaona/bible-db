document_id: OBA.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Nisehoam-pahitana i Hôbadià, ka izao no voalazan’ny Tompo ANDRIANANAHARY ny amin’i Edôma
  - type: note
    content: 'Edôma: sady anarana iantsoana faritany no iantsoana ny mponina ao anatiny; jereo ny naoty tandrifin’ny Ham 1.11. –Momba ny and 1.14, jereo Is 34.5 sy nta.'
  - type: text
    content: .
  - type: heading
    content: Ambaran’ny Tompo ny haharava an’i Edôma
  - type: text
    content: Nisy iraka nalefa
  - type: text
    content: ho any amin’ny hafa firenena,
  - type: text
    content: ka renay nanambara
  - type: text
    content: 'filazana avy amin’ny TOMPO hoe:'
  - type: text
    content: «Mitsangàna ianareo! Aoka isika hiara-mitsangana
  - type: text
    content: hanafika an’i Edôma!»
  '10':
  - type: text
    content: «Noho ny taranak’i Jakôba rahalahinao
  - type: text
    content: efa nisetrasetranao sy novonoinao
  - type: note
    content: 'Noho ny... sy novonoinao: jereo Ezek 25.12 sy nta; 35.5 sy nta; ary koa Ezek 35.12. –Ny hoe taranak’i Jakôba etoana dia manondro ny mponina tao amin’ny fanjakan’i Joda. –rahalahinao: i Hesao, razamben’ny Edômita, dia rahalahin’i Jakôba (jereo Gen 25.26; 36).'
  - type: text
    content: ','
  - type: text
    content: dia ho safo-kenatra sy haringana mandrakizay ianao!
  '11':
  - type: text
    content: Nitsangan-kamely ny Israelita
  - type: note
    content: 'Israelita: dia ireo mponina tao Joda.'
  - type: text
    content: ' ianao,'
  - type: text
    content: tamin’ny andro nandresen’ny vahiny ny tafiny
  - type: text
    content: sy nidiran’ny hafa firenena tao an-tanànany;
  - type: text
    content: fony nozarain’ny vahiny antsapaka
  - type: text
    content: ny fananan’i Jerosalema,
  - type: text
    content: dia niray tetika taminy koa ianao.
  '12':
  - type: text
    content: Tsy tokony ho finaritra nijery ireo rahalahinao ianao
  - type: text
    content: tamin’ny andro nahitany loza;
  - type: text
    content: tsy tokony ho nifaly ny amin’ny taranak’i Joda ianao
  - type: text
    content: tamin’ny andro nandringanana azy;
  - type: text
    content: ary tsy tokony ho nanao teny miavonavona ianao
  - type: text
    content: tamin’ny andro nampahory azy;
  '13':
  - type: text
    content: tsy tokony ho niditra ilay tanànan’ny vahoakako ianao
  - type: text
    content: tamin’ny andro nandravana azy;
  - type: text
    content: tsy tokony ho finaritra nijery ny fahantràny ianao
  - type: text
    content: tamin’ny andro nandravana azy;
  - type: text
    content: ary tsy tokony ho naninji-tanana haka ny fananany ianao
  - type: text
    content: tamin’ny andro nandravana azy;
  '14':
  - type: text
    content: tsy tokony ho namitsaka teo an-tsampanan-dalana ianao
  - type: text
    content: mba hamono izay afa-nandositra taminy;
  - type: text
    content: tsy tokony ho natolotrao ny fahavalo ireo sisa tavela
  - type: text
    content: tamin’ny andro nampahory azy;
  '15':
  - type: text
    content: satria efa antomotra ny andro hiavian’ny TOMPO
  - type: text
    content: ka hamelezany ny firenena rehetra.
  - type: text
    content: Amin’izany, dia araka ny nataonao ny hafa
  - type: text
    content: no hatao anao koa;
  - type: text
    content: ary hatsingerina aminao
  - type: text
    content: ny asa ratsinao.
  - type: heading
    content: Hanao valifaty amin’i Edôma ny Israelita
  '16':
  - type: text
    content: «Ianareo, ry Israelita,
  - type: text
    content: dia efa nisotro ny fahatezerako
  - type: text
    content: teo an-tendrombohitro masina
  - type: note
    content: 'nisotro ny fahatezerako: araka ny RM dia hoe nisotro; ao amin’ny Test. T., ny hoe misotro na misotro ny fahatezeran’Andriamanitra dia fomba fiteny enti-manambara ny famaizana ataon’Andriamanitra: jereo Jer 25.15-29; Ezek 23.32-35. –tendrombohitro masina: jereo Ezek 20.40 sy nta.'
  - type: text
    content: ;
  - type: text
    content: 'toy izany koa no hisotroan’ny firenena azy tsy an-kiato:'
  - type: text
    content: eny, hisotro ny fahatezerako izy ka hivembena,
  - type: text
    content: ary dia ho fongana toy ny tsy nisy akory.
  '17':
  - type: text
    content: 'Ho ao an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' kosa ireo sisa tavela,'
  - type: text
    content: ka hanjary masina indray io toerana io;
  - type: text
    content: ary ho lasan’ny taranak’i Jakôba
  - type: text
    content: ny tanin’ireo naka ny taniny
  - type: note
    content: 'ary ho lasan’ny... taniny (araka ny dkt tranainy grika): dkt hafa ary ho azon’ny taranak’i Jakôba indray ny taniny (araka ny RM). –taranak’i Jakôba: jereo ny naoty tandrifin’ny and 10 erỳ aloha.'
  - type: text
    content: .
  '18':
  - type: text
    content: Ny taranak’i Jakôba ho toy ny afo,
  - type: text
    content: ny taranak’i Jôsefa ho toy ny lelafo;
  - type: text
    content: ny taranak’i Hesao
  - type: note
    content: 'taranak’i Jôsefa: jereo ny naoty tandrifin’ny Ham 5.6. –taranak’i Hesao: jereo ny naoty tandrifin’ny and 6 erỳ aloha.'
  - type: text
    content: ' kosa ho toy ny mololo'
  - type: text
    content: ka harehitr’ireo sy holevoniny,
  - type: text
    content: ary tsy mba hisy sisa tavela amin’ny taranak’i Hesao.
  - type: text
    content: Izaho TOMPO no efa niteny!»
  - type: heading
    content: Ho eo ambany fahefàn’ny Israelita indray ny faritany manodidina
  '19':
  - type: text
    content: 'Ny mponin’i Joda, faritra atsimo, no hahalasa ny tendrombohitr’i Hesao; ny mponin’i Joda, faritr’i '
  - type: text
    content: Sefelà
  - type: text
    content: ', no hahalasa ny tanin’ny Filistinina sady hahalasa ny tanin’i Efraîma, izany hoe ny tanin’i Samaria; ary ny taranak’i Benjamîna no hahalasa an’i Gilehàda'
  - type: note
    content: 'Ny mponin’i Joda... Samaria: dkt hafa ny mponin’i Joda dia hahalasa ny tendrombohitr’i Hesao, izay any Negèba, sy hahalasa ny tanin’ny Filistinina, izay any Sefelà, ary hahalasa ny tanin’i Efraîma sy ny tanin’i Samaria. –Gilehada: jereo ny naoty tandrifin’ny Ham 1.3.'
  - type: text
    content: .
  '2':
  - type: text
    content: «Indro ianao, ry Edôma,
  - type: text
    content: fa hataoko osa indrindra eo amin’ny firenena;
  - type: text
    content: ka hotsiratsiraina izaitsizy ianao!
  '20':
  - type: text
    content: Ny babo tamin’ny Israelita, izay tafika marobe, no hahalasa ny tanin’ireo Kanahanita hatrany Tsarefàta. Ny babo tamin’ny mponin’i Jerosalema, izay any Sefaràda
  - type: note
    content: 'Israelita: dia ireo mponina tao Israely (fanjakana avaratra). –tanin’ireo Kanahanita: talohan’ny fahatongavan’ny Israelita avy any Ejipta tao Kanahàna, dia niorim-ponenana hatreo atsimo andrefan’ny ranomasina Maty ka hatrany Fenisia ny Kanahanita. –Tsarefàta: tanàna teo amoron-tsirak’i Fenisia, jereo 1 Mp 17.9. –Sefaràda: tanàna izay heverina ho tany Azia Minôra no nisy azy, dia toa ilay atao hoe Sardy atỳ aoriana.'
  - type: text
    content: ', no hahalasa ny tanàna any Negèba; '
  '21':
  - type: text
    content: rehefa afaka amin’ny fahababoana ireo, dia hiakatra ho ao an-tendrombohitra Tsiôna mba hifehy ny tendrombohitr’i Hesao.
  - type: text
    content: Amin’izay ny TOMPO mihitsy no ho mpanjaka.
  '3':
  - type: text
    content: Ny avonavon’ny fonao no nahavery saina anao!
  - type: text
    content: Mitoetra eny an-tsefatsefaky ny harambato ianao,
  - type: text
    content: faritra avobe no misy ny fonenanao
  - type: note
    content: Ny tanàna atao hoe Petrà, izay midika hoe Vatolampy, no renivohitr’i Edôma; be harambato dia be harambato ny faritany nonenan’ny Edômita sady sarotra idirana sy anihina.
  - type: text
    content: ','
  - type: text
    content: 'ka hoy ianao anakampo hoe:'
  - type: text
    content: «Iza no hampivarina ahy ho eny an-tany ambany?»
  '4':
  - type: text
    content: Na dia miakatra ambony tahaka ny voromahery aza ianao
  - type: text
    content: sy mametraka ny akaninao eny amin’ny kintana,
  - type: text
    content: 'dia havariko avy eny ianao:'
  - type: text
    content: teny hentitra avy amiko TOMPO
  - type: note
    content: Ampit and 1b-4 sy Jer 49.14-16.
  - type: text
    content: ' izany!'
  '5':
  - type: text
    content: Raha misy mpangalatra na mpandroba
  - type: text
    content: tonga alina ao aminao,
  - type: text
    content: moa tsy hindaosiny avokoa ve
  - type: text
    content: izay zavatra azony entina?
  - type: text
    content: Indrisy fa fongotra ianao
  - type: note
    content: 'Indrisy... ianao: dkt hafa indrisy fa taitra tsy hahahetsika ianao. –Ampit ny and 5 sy Jer 49.9.'
  - type: text
    content: '!'
  - type: text
    content: Raha misy mpioty voaloboka tonga eo aminao,
  - type: text
    content: moa tsy voaloboka hotsimponina ve no havelany?
  '6':
  - type: text
    content: Endrey izany fisavàn’ny olona ireo fanananao,
  - type: text
    content: ry taranak’i Hesao
  - type: note
    content: Ny hoe taranak’i Hesao dia ireo Edômita ihany, jereo Gen 25.30.
  - type: text
    content: '!'
  - type: text
    content: Endrey izany fikarohana ny harenao miafina!
  '7':
  - type: text
    content: Ny olona rehetra izay nanao fifanekena taminao
  - type: text
    content: no mandroaka anao hatrany ivelan’ny sisin-taninao.
  - type: text
    content: Ny olona tsara fihavanana taminao
  - type: text
    content: no mamitaka anao ka naharesy anao.
  - type: text
    content: Ireo niara-nisakafo taminao
  - type: text
    content: no mamela-pandrika eo amin’ny lalan-kodiavinao.
  - type: text
    content: 'Ka hoy ireo ny aminao hoe:'
  - type: text
    content: ‹Tsy misy matsilo saina intsony ao aminy›.
  '8':
  - type: text
    content: Amin’izany andro izany manko
  - type: text
    content: no hamongorako ireo olon-kendry ao Edôma
  - type: text
    content: sy ireo matsilo saina
  - type: text
    content: 'ao amin’ny tendrombohitr’i Hesao:'
  - type: text
    content: teny hentitra avy amiko TOMPO izany!
  '9':
  - type: text
    content: Dia ho raiki-tahotra mafy
  - type: text
    content: ny lehilahy maherinao, ry Temàna
  - type: note
    content: 'Temàna: tanàna tao Edôma faritra avaratra.'
  - type: text
    content: ;
  - type: text
    content: ka haringana avokoa ny mponina
  - type: text
    content: ao amin’ny tendrombohitr’i Hesao.
  - type: heading
    content: Nanararaotra ny fahavoazan’ny Israelita ireo Edômita ka hosazina
