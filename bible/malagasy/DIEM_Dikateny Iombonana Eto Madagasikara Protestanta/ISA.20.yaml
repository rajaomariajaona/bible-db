document_id: ISA.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mandehandeha tsy mitafy lamba sy tsy mikiraro i Isaià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’izay no taona nanirahan’i Sargôna mpanjakan’i Asiria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Sargona II '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia nanjaka tao Asiria tamin’ny taona 722-705 tal J.K. Tamin’ny taona 711 no nahazoany an’i Asdôda, tanànan’ny Filistinina nikomy taminy hatramin’ny taona 713. Tamin’izany fotoana izany ireo fanjakana madinika tao Palestinina (Joda, Filistia...) no nanantena fanampiana tamin’i Ejipta mba hialana amin’ny fanjanahan’ny Asirianina.
    marker-yv: yv-n
  - type: text
    text: ' ilay jeneralin’ny tafiny hanafika an’i Asdôda; dia namely ny tanàna izy ka nahazo azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Telo taona talohan’izany kosa dia nampitondra teny an’i Isaià zanakalahin’i Amôtsa ny TOMPO hoe: «Mandehana, vahao ny lamba gony eny an-tsikinanao ary esory ny kapa eny an-tongotrao.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nataon’i Isaià izany, ka nandeha tsy nitafy lamba sy tsy nikiraro izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary io taona nahazoan’ny Asirianina an’i Asdôda io, no nilazan’ny TOMPO taminy hoe: «Efa ho telo taona izao no nandehandehanan’i Isaià mpanompoko, tsy nitafy lamba sy tsy nikiraro, mba ho famantarana sy marika ny amin’ny hamelezana an’i Ejipta sy i Etiôpia'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tamin’izay dia Farao etiôpianina no nifehy an’i Ejipta, jereo 19.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa tahaka izany no hitondran’ny mpanjakan’i Asiria ny Ejiptianina ho sambo-belona sy ny Etiôpianina ho babo na antitra na tanora. Handeha tsy mitafy sy tsy mikiraro koa izy ireo. Mitanjaka ny feny ka henatra moa izao ny an’ny Ejiptianina! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia ho kivy sy ho diso fanantenana ireo Israelita ireo, izay nanantena an’i Etiôpia na nihambo tamin’ny fanampian’i Ejipta.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’izany andro izany, dia hiteny ireo mponina amoron-tsiraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mponina amoron-tsiraka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lazaina eto dia ny ao Filistia sy ao Joda.
    marker-yv: yv-n
  - type: text
    text: ' hoe: «Jereo ity manjo ny firenena nantenaintsika hialofana sy hitadiavam-bonjy ary hahafaka antsika manoloana ny mpanjakan’i Asiria! Ka aiza indray izao no handosirantsika?»'
