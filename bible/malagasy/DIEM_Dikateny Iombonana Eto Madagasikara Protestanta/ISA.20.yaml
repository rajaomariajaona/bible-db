document_id: ISA.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandehandeha tsy mitafy lamba sy tsy mikiraro i Isaià
  - type: text
    content: Tamin’izay no taona nanirahan’i Sargôna mpanjakan’i Asiria
  - type: note
    content: I Sargona II dia nanjaka tao Asiria tamin’ny taona 722-705 tal J.K. Tamin’ny taona 711 no nahazoany an’i Asdôda, tanànan’ny Filistinina nikomy taminy hatramin’ny taona 713. Tamin’izany fotoana izany ireo fanjakana madinika tao Palestinina (Joda, Filistia...) no nanantena fanampiana tamin’i Ejipta mba hialana amin’ny fanjanahan’ny Asirianina.
  - type: text
    content: ' ilay jeneralin’ny tafiny hanafika an’i Asdôda; dia namely ny tanàna izy ka nahazo azy.'
  '2':
  - type: text
    content: 'Telo taona talohan’izany kosa dia nampitondra teny an’i Isaià zanakalahin’i Amôtsa ny TOMPO hoe: «Mandehana, vahao ny lamba gony eny an-tsikinanao ary esory ny kapa eny an-tongotrao.»'
  - type: text
    content: 'Dia nataon’i Isaià izany, ka nandeha tsy nitafy lamba sy tsy nikiraro izy. '
  '3':
  - type: text
    content: 'Ary io taona nahazoan’ny Asirianina an’i Asdôda io, no nilazan’ny TOMPO taminy hoe: «Efa ho telo taona izao no nandehandehanan’i Isaià mpanompoko, tsy nitafy lamba sy tsy nikiraro, mba ho famantarana sy marika ny amin’ny hamelezana an’i Ejipta sy i Etiôpia'
  - type: note
    content: Tamin’izay dia Farao etiôpianina no nifehy an’i Ejipta, jereo 19.4 sy nta.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Fa tahaka izany no hitondran’ny mpanjakan’i Asiria ny Ejiptianina ho sambo-belona sy ny Etiôpianina ho babo na antitra na tanora. Handeha tsy mitafy sy tsy mikiraro koa izy ireo. Mitanjaka ny feny ka henatra moa izao ny an’ny Ejiptianina! '
  '5':
  - type: text
    content: Dia ho kivy sy ho diso fanantenana ireo Israelita ireo, izay nanantena an’i Etiôpia na nihambo tamin’ny fanampian’i Ejipta.»
  '6':
  - type: text
    content: Amin’izany andro izany, dia hiteny ireo mponina amoron-tsiraka
  - type: note
    content: Ny mponina amoron-tsiraka lazaina eto dia ny ao Filistia sy ao Joda.
  - type: text
    content: ' hoe: «Jereo ity manjo ny firenena nantenaintsika hialofana sy hitadiavam-bonjy ary hahafaka antsika manoloana ny mpanjakan’i Asiria! Ka aiza indray izao no handosirantsika?»'
