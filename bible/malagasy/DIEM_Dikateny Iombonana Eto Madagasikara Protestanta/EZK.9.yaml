document_id: EZK.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy eo dia reko niteny mafy tamiko ny Tompo nanao hoe: «Manatòna ianareo natao hanafay ny tanàna ka samia mitondra ny fitaovam-pandravana eny an-tanany avy.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia indreo lehilahy enina nipoitra teo amin’ny vavahady ambony, izay tamin’ny lafiny avaratry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ', sady samy nitondra ny fitaovam-pandravàny avy. Nisy lehilahy iray niakanjo rongony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fitafiana rongony dia natao ho fitafian’ny mpisorona (jereo Lev 6.3; 16.4) sy ny anjely mpandrava ao amin’ny Apôk 15.6.
    marker-yv: yv-n
  - type: text
    text: ' teo afovoany sady mitondra fitaovam-panoratana teny amin’ny fehikibony. Niditra izy rehetra ka nijanona teo akaikin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' halimo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny voninahitr’ilay Andriamanitr’i Israely izay niseho teo ambony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' dia niakatra ho eo amin’ny tokonam-baravaran’ny tempoly. Ary niantso ilay lehilahy niakanjo rongony izay nitondra fitaovam-panoratana ny TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka nanao taminy hoe: «Mandehana mamakivaky eran’ny tanànan’i Jerosalema, ka asio marika eny an-kandrin’izay rehetra mitaraina sy malahelo noho ny fomba rehetra maharikoriko atao eo aminy.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy eo dia reko Izy nanome baiko ireo sisa hoe: «Manaraha io lehilahy io eran’ny tanàna, ka vonoy ny mponina. Aza antra fijery azy ianareo, ary aza mamindrafo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aringano na antitra na tanora, mbamin’ny tovovavy sy ny ankizy ary ny vehivavy. Kanefa aza kasihina izay mitondra ilay marika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Apôk 7.3-4; 9.4.
    marker-yv: yv-n
  - type: text
    text: '. Atombohy eto amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasiko
  - type: text
    text: ' izany.» Dia nanomboka namono ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' izay teo anoloan’ny tempoly izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny Tompo nibaiko azy hoe: «Lotoy ny tempoly, fenoy fatin’olona ny kianjany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny fikasihana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faty
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mahatonga ho maloto*, izany hoe tsy afaka mandray anjara amin’ny fanompoam-pivavahana.'
    marker-yv: yv-n
  - type: text
    text: ', dia mandehana.» Dia lasa ireo ka nanohy ny fandringanana tao an-tanàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izaho irery sisa nijanona teo nandritra ny famelezana, ka niankohoka tamin’ny tany ary niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompo ANDRIANANAHARY ô, raha manampatra ny fahatezeranao amin’i Jerosalema ve ianao dia handringana hatramin’ny Israelita sisa?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary namaly ahy Izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy hita lany mihitsy ny heloka nataon’ny fanjakàn’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy i Joda: feno vonoan’olona ny tany sady feno fitsarana miangatra ny tanàna. Ary ny olona dia nifampiteny hoe: «Efa nandao ny tanintsika ny TOMPO ka tsy mahita antsika.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Noho izany dia tsy ho antra fijery azy Aho ary tsy hamindrafo aminy; fa hataoko mivesatra ny vokatry ny fitondrantenany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’izay dia tonga nanao tatitra ilay lehilahy niakanjo rongony ka nanao tamin’Andriamanitra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa notanterahiko izay nandidianao ahy.
