document_id: EZK.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famaizana an’i Jerosalema
  - type: text
    content: 'Avy eo dia reko niteny mafy tamiko ny Tompo nanao hoe: «Manatòna ianareo natao hanafay ny tanàna ka samia mitondra ny fitaovam-pandravana eny an-tanany avy.» '
  '10':
  - type: text
    content: Noho izany dia tsy ho antra fijery azy Aho ary tsy hamindrafo aminy; fa hataoko mivesatra ny vokatry ny fitondrantenany izy.
  '11':
  - type: text
    content: 'Tamin’izay dia tonga nanao tatitra ilay lehilahy niakanjo rongony ka nanao tamin’Andriamanitra hoe:'
  - type: text
    content: –Efa notanterahiko izay nandidianao ahy.
  '2':
  - type: text
    content: 'Dia indreo lehilahy enina nipoitra teo amin’ny vavahady ambony, izay tamin’ny lafiny avaratry ny '
  - type: text
    content: tempoly
  - type: text
    content: ', sady samy nitondra ny fitaovam-pandravàny avy. Nisy lehilahy iray niakanjo rongony'
  - type: note
    content: Ny fitafiana rongony dia natao ho fitafian’ny mpisorona (jereo Lev 6.3; 16.4) sy ny anjely mpandrava ao amin’ny Apôk 15.6.
  - type: text
    content: ' teo afovoany sady mitondra fitaovam-panoratana teny amin’ny fehikibony. Niditra izy rehetra ka nijanona teo akaikin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' halimo. '
  '3':
  - type: text
    content: 'Ny voninahitr’ilay Andriamanitr’i Israely izay niseho teo ambony '
  - type: text
    content: kerobima
  - type: text
    content: ' dia niakatra ho eo amin’ny tokonam-baravaran’ny tempoly. Ary niantso ilay lehilahy niakanjo rongony izay nitondra fitaovam-panoratana ny TOMPO, '
  '4':
  - type: text
    content: 'ka nanao taminy hoe: «Mandehana mamakivaky eran’ny tanànan’i Jerosalema, ka asio marika eny an-kandrin’izay rehetra mitaraina sy malahelo noho ny fomba rehetra maharikoriko atao eo aminy.» '
  '5':
  - type: text
    content: 'Avy eo dia reko Izy nanome baiko ireo sisa hoe: «Manaraha io lehilahy io eran’ny tanàna, ka vonoy ny mponina. Aza antra fijery azy ianareo, ary aza mamindrafo aminy. '
  '6':
  - type: text
    content: Aringano na antitra na tanora, mbamin’ny tovovavy sy ny ankizy ary ny vehivavy. Kanefa aza kasihina izay mitondra ilay marika
  - type: note
    content: Jereo Apôk 7.3-4; 9.4.
  - type: text
    content: '. Atombohy eto amin’ny '
  - type: text
    content: Toeramasiko
  - type: text
    content: ' izany.» Dia nanomboka namono ireo '
  - type: text
    content: loholona
  - type: text
    content: ' izay teo anoloan’ny tempoly izy. '
  '7':
  - type: text
    content: 'Ary ny Tompo nibaiko azy hoe: «Lotoy ny tempoly, fenoy fatin’olona ny kianjany'
  - type: note
    content: Ny fikasihana faty dia mahatonga ho maloto*, izany hoe tsy afaka mandray anjara amin’ny fanompoam-pivavahana.
  - type: text
    content: ', dia mandehana.» Dia lasa ireo ka nanohy ny fandringanana tao an-tanàna.'
  '8':
  - type: text
    content: 'Izaho irery sisa nijanona teo nandritra ny famelezana, ka niankohoka tamin’ny tany ary niantsoantso hoe:'
  - type: text
    content: –Tompo ANDRIANANAHARY ô, raha manampatra ny fahatezeranao amin’i Jerosalema ve ianao dia handringana hatramin’ny Israelita sisa?
  '9':
  - type: text
    content: 'Ary namaly ahy Izy hoe:'
  - type: text
    content: '–Tsy hita lany mihitsy ny heloka nataon’ny fanjakàn’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy i Joda: feno vonoan’olona ny tany sady feno fitsarana miangatra ny tanàna. Ary ny olona dia nifampiteny hoe: «Efa nandao ny tanintsika ny TOMPO ka tsy mahita antsika.» '
