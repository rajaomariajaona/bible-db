document_id: 2TI.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no anafatrafarako anao mafy eo anatrehan’Andriamanitra sy eo anatrehan’i Kristy Jesoa, Ilay hitsara ny velona sy ny maty, ary koa noho ny andro hisehoan’i Kristy sy hahatongavan’ny '
  - type: text
    content: Fanjakàny
  - type: text
    content: ': '
  '10':
  - type: text
    content: Fa i Damasy efa nandao ahy, satria mankamamy an’izao fiainana ankehitriny izao izy ka lasa nankany Tesalônika. I Kresensa dia lasa any Galatia ary i Tito any Dalmatia
  - type: note
    content: 'Damasy: jereo Kôl 4.14; Fm 24. –Tito: jereo 2 Kôr 8.23; Gal 2.3; Tit 1.4.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: I Lioka no hany eto amiko. Alao i Marka ary ento miaraka aminao, fa afaka manampy ahy amin’ny raharaha izy
  - type: note
    content: 'Lioka: jereo Kôl 4.14; Fm 24. –Marka: jereo Asa 12.12, 25; Kôl 4.10; Fm 24.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: Nirahiko ho any Efeso i Tisiko
  - type: note
    content: 'Tisiko: jereo Asa 20.4; Ef 6.21-22; Kôl 4.7-8.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Rehefa mankatỳ ianao, dia ento ilay akanjobe tavelako tao amin’i Karpo tany Trôasy; ento koa ireo bokiko, indrindra ireo boky hoditra
  - type: note
    content: 'Trôasy: jereo Asa 20.6. –hoditra: hodi-biby, indrindra hoditr’omby na hoditr’osy, voavoatra manokana ho azo anoratana.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Raha i Aleksandra mpanefy varahina, dia betsaka ny ratsy nafitsony ahy; ny Tompo no hamely azy araka izay vitany
  - type: note
    content: 'Aleksandra: jereo 1Tim 1.20. –ny Tompo...vitany: ampit Sal 62.12; Ohab 24.12; Rm 2.6.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Mitandrema koa ianao aminy, fa notoheriny mafy tokoa ny teninay.
  '16':
  - type: text
    content: 'Fony aho nandaha-teny hiarovako tena tamin’ny voalohany, dia tsy nisy nomba ahy fa nandao ahy avokoa ny olona. Tsy hotanan’Andriamanitra ho hadisoany anie izany! '
  '17':
  - type: text
    content: 'Kanefa dia nijoro teo anilako ny Tompo ka nanome hery ahy mba hahatontosako soa aman-tsara ny fitorian-teny sady handrenesan’ireo rehetra '
  - type: text
    content: hafa firenena
  - type: text
    content: ' izany; ary dia afaka teo am-bavan’ny liona aho. '
  '18':
  - type: text
    content: 'Hanafaka ahy amin’ny asa ratsy rehetra afitsoka ahy ny Tompo ka hampandroso ahy soa aman-tsara ao amin’ny '
  - type: text
    content: Fanjakàny
  - type: text
    content: ' any an-danitra. Ho Azy anie ny voninahitra mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  - type: heading
    content: Fanaovam-beloma
  '19':
  - type: text
    content: Veloma any amin’i Prisila sy i Akoilà, ary any amin’ny ankohonan’i Ônesifôro
  - type: note
    content: 'I Prisila sy i Akoilà: jereo Asa 18.2. –Ônesifôro: jereo Asa 20.4; 21.29.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'torio ny tenin’Andriamanitra, ka mazotoa amin’izany na handray azy ny olona na tsy handray, mandrese lahatra, mananara mafy, mampirisiha ombàn’ny fahari-po sy ny fahaiza-mampianatra hatrany. '
  '20':
  - type: text
    content: Nijanona any Kôrinto i Erasta; ary i Trôfimo dia navelako ao Mileto fa narary
  - type: note
    content: 'Erasta: jereo Asa 19.22; Rm 16.23. Trôfimo: jereo Asa 20.4; 21.29.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Ataovy mihitsy izay hahatongavanao atỳ alohan’ny ririnina. Manao veloma anao i Eobola sy i Podensa, i Lino sy i Klaôdia ary ny havana rehetra iray finoana.
  '22':
  - type: text
    content: Homba anao anie ny Tompo!
  - type: text
    content: Homba anareo anie ny fahasoavan’Andriamanitra!
  '3':
  - type: text
    content: 'Eny, ho avy ny andro tsy hahazakan’ny olona intsony ny fampianarana tsy misy tomika; fa mpampianatra araka ny maha diavolana ny fony no havoriny ho azy sy hahalian-tsofina azy. '
  '4':
  - type: text
    content: 'Tsy hihaino ny fampianarana marim-pototra intsony ny olona fa hiala amin’izany ka hivily lalana ho amin’ny anganongano. '
  '5':
  - type: text
    content: 'Fa ianao kosa, aoka hahafehy tena amin’ny zavatra rehetra, zakao ny fijaliana, tontosao ny asa maha mpitory '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' anao, ataovy lavorary ny fanompoanao amin’Andriamanitra.'
  '6':
  - type: text
    content: 'Fa izaho moa dia efa halatsa-dra ho sorona araraka, efa mby akaiky ny fotoanandro hialako amin’izao fiainana izao. '
  '7':
  - type: text
    content: Ny ady tsara no efa vitako, tratrako ny tanjon’ny fihazakazahana, voatanako ny finoana
  - type: note
    content: 'voatanako ny finoana: raisin’ny sasany hoe voatanako ny toky nomeko.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: Ka ny miandry ahy izao dia ny satroboninahi-pandresena natokana ho an’izay manao ny marina. Ny Tompo, ilay mpitsara ara-drariny, dia hanome ahy izany satroboninahi-pandresena izany amin’ny andro fitsarana; ary tsy izaho ihany no homeny izany, fa izay rehetra miandry am-pitiavana ny hisehoany koa.
  - type: heading
    content: Hafatrafatra manokana
  '9':
  - type: text
    content: 'Ataovy mihitsy izay hahatongavanao faingana atỳ amiko. '
