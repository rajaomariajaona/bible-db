document_id: 2TI.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no anafatrafarako anao mafy eo anatrehan’Andriamanitra sy eo anatrehan’i Kristy Jesoa, Ilay hitsara ny velona sy ny maty, ary koa noho ny andro hisehoan’i Kristy sy hahatongavan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàny
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa i Damasy efa nandao ahy, satria mankamamy an’izao fiainana ankehitriny izao izy ka lasa nankany Tesalônika. I Kresensa dia lasa any Galatia ary i Tito any Dalmatia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Damasy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Kôl 4.14; Fm 24. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tito:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 2 Kôr 8.23; Gal 2.3; Tit 1.4.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I Lioka no hany eto amiko. Alao i Marka ary ento miaraka aminao, fa afaka manampy ahy amin’ny raharaha izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lioka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Kôl 4.14; Fm 24. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Marka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Asa 12.12, 25; Kôl 4.10; Fm 24.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nirahiko ho any Efeso i Tisiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tisiko: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Asa 20.4; Ef 6.21-22; Kôl 4.7-8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Rehefa mankatỳ ianao, dia ento ilay akanjobe tavelako tao amin’i Karpo tany Trôasy; ento koa ireo bokiko, indrindra ireo boky hoditra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Trôasy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Asa 20.6. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hoditra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' hodi-biby, indrindra hoditr’omby na hoditr’osy, voavoatra manokana ho azo anoratana.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Raha i Aleksandra mpanefy varahina, dia betsaka ny ratsy nafitsony ahy; ny Tompo no hamely azy araka izay vitany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Aleksandra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1Tim 1.20. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny Tompo...vitany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit Sal 62.12; Ohab 24.12; Rm 2.6.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mitandrema koa ianao aminy, fa notoheriny mafy tokoa ny teninay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fony aho nandaha-teny hiarovako tena tamin’ny voalohany, dia tsy nisy nomba ahy fa nandao ahy avokoa ny olona. Tsy hotanan’Andriamanitra ho hadisoany anie izany! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Kanefa dia nijoro teo anilako ny Tompo ka nanome hery ahy mba hahatontosako soa aman-tsara ny fitorian-teny sady handrenesan’ireo rehetra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' izany; ary dia afaka teo am-bavan’ny liona aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hanafaka ahy amin’ny asa ratsy rehetra afitsoka ahy ny Tompo ka hampandroso ahy soa aman-tsara ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàny
    - type: text
      text: ' any an-danitra. Ho Azy anie ny voninahitra mandrakizay mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanaovam-beloma
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Veloma any amin’i Prisila sy i Akoilà, ary any amin’ny ankohonan’i Ônesifôro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Prisila sy i Akoilà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Asa 18.2. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ônesifôro:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Asa 20.4; 21.29.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'torio ny tenin’Andriamanitra, ka mazotoa amin’izany na handray azy ny olona na tsy handray, mandrese lahatra, mananara mafy, mampirisiha ombàn’ny fahari-po sy ny fahaiza-mampianatra hatrany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Nijanona any Kôrinto i Erasta; ary i Trôfimo dia navelako ao Mileto fa narary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Erasta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo Asa 19.22; Rm 16.23. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Trôfimo:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Asa 20.4; 21.29.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ataovy mihitsy izay hahatongavanao atỳ alohan’ny ririnina. Manao veloma anao i Eobola sy i Podensa, i Lino sy i Klaôdia ary ny havana rehetra iray finoana.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Homba anao anie ny Tompo!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Homba anareo anie ny fahasoavan’Andriamanitra!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Eny, ho avy ny andro tsy hahazakan’ny olona intsony ny fampianarana tsy misy tomika; fa mpampianatra araka ny maha diavolana ny fony no havoriny ho azy sy hahalian-tsofina azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tsy hihaino ny fampianarana marim-pototra intsony ny olona fa hiala amin’izany ka hivily lalana ho amin’ny anganongano. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa ianao kosa, aoka hahafehy tena amin’ny zavatra rehetra, zakao ny fijaliana, tontosao ny asa maha mpitory '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' anao, ataovy lavorary ny fanompoanao amin’Andriamanitra.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa izaho moa dia efa halatsa-dra ho sorona araraka, efa mby akaiky ny fotoanandro hialako amin’izao fiainana izao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny ady tsara no efa vitako, tratrako ny tanjon’ny fihazakazahana, voatanako ny finoana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'voatanako ny finoana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'raisin’ny sasany hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: voatanako ny toky nomeko.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ka ny miandry ahy izao dia ny satroboninahi-pandresena natokana ho an’izay manao ny marina. Ny Tompo, ilay mpitsara ara-drariny, dia hanome ahy izany satroboninahi-pandresena izany amin’ny andro fitsarana; ary tsy izaho ihany no homeny izany, fa izay rehetra miandry am-pitiavana ny hisehoany koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatrafatra manokana
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ataovy mihitsy izay hahatongavanao faingana atỳ amiko. '
