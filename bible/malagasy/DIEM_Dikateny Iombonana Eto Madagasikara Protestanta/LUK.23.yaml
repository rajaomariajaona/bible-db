document_id: LUK.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Eo anatrehan’i Pilato i Jesoa
  - type: heading
    content: (Jereo Mt 27.1-2, 11-14; Mk 15.1-5; Jôh 18.28-38)
  - type: text
    content: 'Dia indray nitsangana ny mpivory ka nitondra an’i Jesoa tany amin’i '
  - type: text
    content: Pilato
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'Eo izany ireo lohandoha-mpisorona sy ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' tsy sasatra miampanga Azy. '
  '11':
  - type: text
    content: 'Dia notebahin’i Herôda sy ny miaramilany Izy ka nesoiny sady nampiakanjoiny akanjo mamirapiratra, vao naveriny tany amin’i Pilato. '
  '12':
  - type: text
    content: Tamin’izay andro izay dia nanjary nihavana i Herôda sy i Pilato izay nifandrafy iny teo aloha.
  - type: heading
    content: Voaheloka ho faty i Jesoa
  - type: heading
    content: (Jereo Mt 27.32-44; Mk 15.6-15; Jôh 18.9-16)
  '13':
  - type: text
    content: 'Novorîn’i '
  - type: text
    content: Pilato
  - type: text
    content: ' ny lohandoha-mpisorona sy ny manampahefana jiosy ary ny vahoaka, '
  '14':
  - type: text
    content: 'dia nilazany hoe:'
  - type: text
    content: '–Nentinareo tatỳ amiko io Lehilahy io fa hoe nampiodina ny vahoaka; izaho efa nanadina Azy teo anatrehanareo, saingy tsy nahitako heloka na iray aza io Lehilahy io tamin’izay niampanganareo Azy. '
  '15':
  - type: text
    content: 'I Herôda koa tsy nahita heloka taminy, fa namerina Azy ho atỳ amintsika. Miharihary fa tsy misy na inona na inona nataony tokony hanamelohana Azy ho faty; '
  '16':
  - type: text
    content: noho izany, hasaiko hokapohina Izy dia halefako.
  - type: text
    content: '[ '
  '17':
  - type: text
    content: 'Fa isaky ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ' i Pilato dia tsy maintsy mandefa mpifatotra anankiray ho azy ireo'
  - type: note
    content: Jereo Mt 27.15; Mk 15.6.
  - type: text
    content: .]
  '18':
  - type: text
    content: 'Kanjo indray nihoraka izy rehetra nanao hoe:'
  - type: text
    content: –Vonoy io, fa i Barabasy alefa ho anay.
  '19':
  - type: text
    content: (Fa ity Barabasy ity dia anisan’ny nanao fikomiana tao an-tanàna sady nahafaty olona, ka natao am-ponja.)
  '2':
  - type: text
    content: 'ary nanomboka niampanga Azy nanao hoe:'
  - type: text
    content: '–Ity olona ity hitanay manakorontana ny firenenay sy mandrara tsy handoa hetra amin’ny amperôra rômanina ary mihambo ny tenany ho '
  - type: text
    content: Mesia
  - type: text
    content: ' mpanjaka.'
  '20':
  - type: text
    content: 'Dia mbola niteny ihany i Pilato satria te handefa an’i Jesoa. '
  '21':
  - type: text
    content: 'Kanefa niantsoantso mafy ny vahoaka nanao hoe:'
  - type: text
    content: –Homboy, homboy amin’ny hazofijaliana io!
  '22':
  - type: text
    content: 'Dia niteny fanintelony indray i Pilato nanao hoe:'
  - type: text
    content: –Inona àry no ratsy nataony? Tsy hitako velively izay heloka tokony hahafaty Azy; noho izany, hasaiko hokapohina Izy dia halefako.
  '23':
  - type: text
    content: 'Fa nikiry niantsoantso mafy ny vahoaka nitaky ny hanombohana an’i Jesoa amin’ny hazofijaliana, ary nandresy ny horakoraka nataony. '
  '24':
  - type: text
    content: 'Dia namoaka didim-pitsarana i Pilato nampanao izay notakîny. '
  '25':
  - type: text
    content: Ilay natao am-ponja satria nanao fikomiana sady nahafaty olona moa nalefany araka ny notakîn-dry zareo, fa i Jesoa kosa natolony azy hanaovany izay sitrapony.
  - type: heading
    content: Homboana amin’ny hazofijaliana i Jesoa
  - type: heading
    content: (Jereo Mt 27.32-44; Mk 15.21-32; Jôh 19.17-27)
  '26':
  - type: text
    content: Ary raha nitondra an’i Jesoa hovonoina ireo miaramila, dia sendra an’i Simôna lehilahy sireneanina nody avy tany an-tsaha; notanany ralehilahy ka notereny hankeo aorian’i Jesoa, hanampy Azy hitondra ny hazofijaliana.
  '27':
  - type: text
    content: 'Vahoaka betsaka no nanaraka an’i Jesoa ary anisan’izany vehivavy maro izay nandona tratra sady nitomany Azy. '
  '28':
  - type: text
    content: 'Nitodika azy ireto i Jesoa ka nanao hoe:'
  - type: text
    content: '–Ry vehivavy eto Jerosalema, aoka izay ny fitomaniana Ahy, fa ny tenanareo sy ny zanakareo itomaniana! '
  '29':
  - type: text
    content: 'Eny, ho avy ny andro hilazana hoe: «Sambatra ny vehivavy momba, tsy niteraka sady tsy nampinono!» '
  '3':
  - type: text
    content: 'Fa i Pilato kosa nanontany an’i Jesoa hoe:'
  - type: text
    content: –Ianao ve no Mpanjakan’ny Jiosy?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Anao izany teny izany!
  '30':
  - type: text
    content: 'Amin’izay ny tendrombohitra hilazan’ny olona hoe: «Ianjerao izahay»; ary ny havoana hilazany hoe: «Saròny izahay'
  - type: note
    content: Hôs 10.8.
  - type: text
    content: '!» '
  '31':
  - type: text
    content: Fa raha izao no hatao amin’ny hazo maitso, inona no hihatra amin’ny hazo maina?
  '32':
  - type: text
    content: 'Ary nisy koa olon-dratsy roa lahy nentina hiara-kovonoina amin’i Jesoa. '
  '33':
  - type: text
    content: Rehefa tonga tany amin’ny toerana atao hoe Ikarandoha, dia nohomboana tamin’ny hazofijaliana i Jesoa mbamin’ireo olon-dratsy
  - type: note
    content: Ampit Is 53.12.
  - type: text
    content: ', ka ny iray teo ankavanany, ny iray teo ankaviany. '
  '34':
  - type: text
    content: 'Ary i Jesoa namerimberina hoe:'
  - type: text
    content: –Ray ô, avelao ny helony fa tsy fantany izay ataony!
  - type: text
    content: Dia nifampizaràn’ireo miaramila ny fitafian’i Jesoa ka nanaovany loka
  - type: note
    content: 'Misy stf sasany tsy ahitana ny teny hoe Ary i Jesoa namerimberina hoe: Ray ô, avelao ny helony, fa tsy fantany izay ataony. –Faran’ny andininy: jereo Sal 22.19.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: Ny vahoaka tamin’izany nijanona teo nijery. Ny manampahefana jiosy kosa nandatsa
  - type: note
    content: Jereo Sal 22.8-9.
  - type: text
    content: ' nanao hoe:'
  - type: text
    content: –Namonjy olon-kafa Izy, ka aoka hamonjy ny tenany, raha Izy tokoa no ilay Mesia avy amin’Andriamanitra!
  '36':
  - type: text
    content: Ny miaramila koa naneso an’i Jesoa ka nanatona hanome vinaingitra
  - type: note
    content: Jereo Sal 69.22.
  - type: text
    content: ' Azy '
  '37':
  - type: text
    content: 'sady niteny hoe:'
  - type: text
    content: –Raha Ianao tokoa no Mpanjakan’ny Jiosy, vonjeo ny tenanao!
  '38':
  - type: text
    content: 'Ary teo ambonin’ny lohan’i Jesoa dia nasiana soratra hoe: «Ity no Mpanjakan’ny Jiosy!»'
  '39':
  - type: text
    content: 'Ny anankiray tamin’ireo olon-dratsy nihantona teo dia nanevateva Azy ka nanao hoe:'
  - type: text
    content: '–Tsy Ianao tokoa ve no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '? Vonjeo ny tenanao ary vonjeo koa izahay.'
  '4':
  - type: text
    content: 'Ka hoy i Pilato tamin’ny lohandoha-mpisorona sy ny vahoaka:'
  - type: text
    content: –Tsy ahitako heloka na iray aza ity Lehilahy ity!
  '40':
  - type: text
    content: 'Fa niteny azy mafy kosa ilay faharoa nanao hoe:'
  - type: text
    content: '–Tsy matahotra an’Andriamanitra mihitsy ve ianao, na dia voaheloka miaraka amin’ity olona ity aza? '
  '41':
  - type: text
    content: Ny antsika roa lahy dia rariny izao, satria valin’ny natao no raisina; fa ny Azy kosa, tsy mba nisy ratsy nataony na inona na inona.
  '42':
  - type: text
    content: 'Dia izao no naverimberiny:'
  - type: text
    content: –Jesoa ô, mba tsarovy aho rahatrizay ho avy indray Ianao amin’ny maha Mpanjaka Anao.
  '43':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: –Lazaiko marina aminao fa anio ihany dia ho tafaraka amiko any am-paradisa ianao.
  - type: heading
    content: Miala aina i Jesoa
  - type: heading
    content: (Jereo Mt 27.45-46; Mk 15.33-47; Jôh 19.28-30)
  '44':
  - type: text
    content: 'Tamin’ny mitataovovonana teo ho eo, dia takona ny masoandro ka rakotra haizina ny faritany manontolo ary naharitra hatramin’ny telo tolakandro izany. Nitriatra nizara roa kosa ny efitra lamba tao amin’ny '
  - type: text
    content: Toeramasina
  - type: note
    content: Jereo Eks 26.31-33.
  - type: text
    content: ' tao an-'
  - type: text
    content: tempoly
  - type: text
    content: '. '
  '46':
  - type: text
    content: 'Ary niantso tamin’ny feo mahery i Jesoa nanao hoe:'
  - type: text
    content: –Ray ô, apetrako eo am-pelatananao ny aiko
  - type: note
    content: Sal 31.6.
  - type: text
    content: '!'
  - type: text
    content: 'Avy nilaza izany Izy, dia niala aina. '
  '47':
  - type: text
    content: 'Nahita ny zava-nitranga ilay kapiteny rômanina ka nanome voninahitra an’Andriamanitra sady niteny hoe:'
  - type: text
    content: –Tena olo-marina tokoa io Lehilahy io!
  '48':
  - type: text
    content: 'Ary ny vahoaka rehetra vory teo mba hizaha dia nanatri-maso ny zava-nitranga, ka lasa niverina nandondòn-tratra noho ny alahelo. '
  '49':
  - type: text
    content: Fa ny olom-pantatr’i Jesoa rehetra mbamin’ireo vehivavy nanaraka Azy hatrany Galilea kosa nijanona teny lavidavitra teny
  - type: note
    content: Ampit Sal 38.12.
  - type: text
    content: ' ka nahita izany.'
  - type: heading
    content: Alevina i Jesoa
  - type: heading
    content: (Jereo Mt 27.57-61; Mk 15.42-47; Jôh 19.38-42)
  '5':
  - type: text
    content: 'Fa vao mainka nandentika ry zareo nanao hoe:'
  - type: text
    content: –Mampiodina ny vahoaka eran’i Jodea manontolo Izy amin’ny fampianarana ataony, hatrany Galilea izay nanombohany ka hatratỳ.
  - type: heading
    content: Eo anatrehan’i Herôda i Jesoa
  '50':
  - type: text
    content: Ary indro nisy lehilahy atao hoe Jôsefa, avy any Harimatia
  - type: note
    content: Jereo Mt 27.57 sy nta.
  - type: text
    content: ' tanàna ao Jodea. Olona tsara fanahy sady marina ary fatra-piandry ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' izany lehilahy izany, anisan’ny mpitsara ambony amin’ny Jiosy saingy tsy mba niombon-kevitra sy tetika tamin’ireo namany. '
  '52':
  - type: text
    content: 'Nanatona an’i '
  - type: text
    content: Pilato
  - type: text
    content: ' izy nangataka ny vatan’i Jesoa. '
  '53':
  - type: text
    content: 'Dia nampidinin’i Jôsefa avy teo amin’ny hazofijaliana ny vatan’i Jesoa, nofonosiny lamba sarobidy, ary napetrany tao amin’ny fasana nolavahana tamin’ny vatolampy, mbola tsy nandevenana olona. '
  '54':
  - type: text
    content: Zoma hariva fiomanana tamin’izay ary efa hanomboka ny sabata.
  '55':
  - type: text
    content: 'Ireo vehivavy nomba an’i Jesoa hatrany Galilea dia niaraka tamin’i Jôsefa, ka nandinika ny fasana sy ny fomba nametrahana ny vatan’i Jesoa. '
  '56':
  - type: text
    content: 'Avy eo dia nody izy ireo ary nanomana zava-manitra sy ilomanitra, fa tamin’ny '
  - type: text
    content: sabata
  - type: text
    content: ' dia niala sasatra araka ny lalàna'
  - type: note
    content: 'zava-manitra sy ilomanitra: jereo Mk 14.8 sy nta. –araka ny lalàna: jereo Eks 20.10; Deot 5.14.'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Vao ren’i '
  - type: text
    content: Pilato
  - type: text
    content: ' izany, dia nanontaniany raha Galileanina tokoa ralehilahy. '
  '7':
  - type: text
    content: 'Nony fantany fa avy amin’ny tany fehezin’i '
  - type: text
    content: Herôda
  - type: text
    content: ' i Jesoa, dia nalefany any amin’i Herôda izay tao Jerosalema koa tamin’izany andro izany. '
  '8':
  - type: text
    content: Faly dia faly erỳ i Herôda nahita an’i Jesoa, satria efa hatry ny ela no nandre ny lazany sy naniry hihaona aminy
  - type: note
    content: Jereo 9.9.
  - type: text
    content: '; ary nanantena izy fa hahita Azy hanao '
  - type: text
    content: famantarana
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Nanaovan’i Herôda fanontaniana maro i Jesoa, fa tsy namaly na teny indraim-bava aza. '
