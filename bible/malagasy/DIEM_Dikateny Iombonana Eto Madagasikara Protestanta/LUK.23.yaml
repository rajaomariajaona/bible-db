document_id: LUK.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eo anatrehan’i Pilato i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.1-2, 11-14; Mk 15.1-5; Jôh 18.28-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia indray nitsangana ny mpivory ka nitondra an’i Jesoa tany amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary nanomboka niampanga Azy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ity olona ity hitanay manakorontana ny firenenay sy mandrara tsy handoa hetra amin’ny amperôra rômanina ary mihambo ny tenany ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ' mpanjaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa i Pilato kosa nanontany an’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao ve no Mpanjakan’ny Jiosy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Anao izany teny izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka hoy i Pilato tamin’ny lohandoha-mpisorona sy ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ahitako heloka na iray aza ity Lehilahy ity!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa vao mainka nandentika ry zareo nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mampiodina ny vahoaka eran’i Jodea manontolo Izy amin’ny fampianarana ataony, hatrany Galilea izay nanombohany ka hatratỳ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eo anatrehan’i Herôda i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vao ren’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' izany, dia nanontaniany raha Galileanina tokoa ralehilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony fantany fa avy amin’ny tany fehezin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  - type: text
    text: ' i Jesoa, dia nalefany any amin’i Herôda izay tao Jerosalema koa tamin’izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Faly dia faly erỳ i Herôda nahita an’i Jesoa, satria efa hatry ny ela no nandre ny lazany sy naniry hihaona aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.9.
    marker-yv: yv-n
  - type: text
    text: '; ary nanantena izy fa hahita Azy hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanaovan’i Herôda fanontaniana maro i Jesoa, fa tsy namaly na teny indraim-bava aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eo izany ireo lohandoha-mpisorona sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' tsy sasatra miampanga Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia notebahin’i Herôda sy ny miaramilany Izy ka nesoiny sady nampiakanjoiny akanjo mamirapiratra, vao naveriny tany amin’i Pilato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tamin’izay andro izay dia nanjary nihavana i Herôda sy i Pilato izay nifandrafy iny teo aloha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaheloka ho faty i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.32-44; Mk 15.6-15; Jôh 18.9-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Novorîn’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' ny lohandoha-mpisorona sy ny manampahefana jiosy ary ny vahoaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nentinareo tatỳ amiko io Lehilahy io fa hoe nampiodina ny vahoaka; izaho efa nanadina Azy teo anatrehanareo, saingy tsy nahitako heloka na iray aza io Lehilahy io tamin’izay niampanganareo Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I Herôda koa tsy nahita heloka taminy, fa namerina Azy ho atỳ amintsika. Miharihary fa tsy misy na inona na inona nataony tokony hanamelohana Azy ho faty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: noho izany, hasaiko hokapohina Izy dia halefako.
- type: usfm
  marker: p
  children:
  - type: text
    text: '[ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa isaky ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' i Pilato dia tsy maintsy mandefa mpifatotra anankiray ho azy ireo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 27.15; Mk 15.6.
    marker-yv: yv-n
  - type: text
    text: .]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Kanjo indray nihoraka izy rehetra nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vonoy io, fa i Barabasy alefa ho anay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: (Fa ity Barabasy ity dia anisan’ny nanao fikomiana tao an-tanàna sady nahafaty olona, ka natao am-ponja.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia mbola niteny ihany i Pilato satria te handefa an’i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Kanefa niantsoantso mafy ny vahoaka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Homboy, homboy amin’ny hazofijaliana io!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niteny fanintelony indray i Pilato nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona àry no ratsy nataony? Tsy hitako velively izay heloka tokony hahafaty Azy; noho izany, hasaiko hokapohina Izy dia halefako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa nikiry niantsoantso mafy ny vahoaka nitaky ny hanombohana an’i Jesoa amin’ny hazofijaliana, ary nandresy ny horakoraka nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia namoaka didim-pitsarana i Pilato nampanao izay notakîny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ilay natao am-ponja satria nanao fikomiana sady nahafaty olona moa nalefany araka ny notakîn-dry zareo, fa i Jesoa kosa natolony azy hanaovany izay sitrapony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Homboana amin’ny hazofijaliana i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.32-44; Mk 15.21-32; Jôh 19.17-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary raha nitondra an’i Jesoa hovonoina ireo miaramila, dia sendra an’i Simôna lehilahy sireneanina nody avy tany an-tsaha; notanany ralehilahy ka notereny hankeo aorian’i Jesoa, hanampy Azy hitondra ny hazofijaliana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vahoaka betsaka no nanaraka an’i Jesoa ary anisan’izany vehivavy maro izay nandona tratra sady nitomany Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nitodika azy ireto i Jesoa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry vehivavy eto Jerosalema, aoka izay ny fitomaniana Ahy, fa ny tenanareo sy ny zanakareo itomaniana! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Eny, ho avy ny andro hilazana hoe: «Sambatra ny vehivavy momba, tsy niteraka sady tsy nampinono!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Amin’izay ny tendrombohitra hilazan’ny olona hoe: «Ianjerao izahay»; ary ny havoana hilazany hoe: «Saròny izahay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hôs 10.8.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa raha izao no hatao amin’ny hazo maitso, inona no hihatra amin’ny hazo maina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nisy koa olon-dratsy roa lahy nentina hiara-kovonoina amin’i Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Rehefa tonga tany amin’ny toerana atao hoe Ikarandoha, dia nohomboana tamin’ny hazofijaliana i Jesoa mbamin’ireo olon-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 53.12.
    marker-yv: yv-n
  - type: text
    text: ', ka ny iray teo ankavanany, ny iray teo ankaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary i Jesoa namerimberina hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ray ô, avelao ny helony fa tsy fantany izay ataony!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nifampizaràn’ireo miaramila ny fitafian’i Jesoa ka nanaovany loka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany tsy ahitana ny teny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ary i Jesoa namerimberina hoe: Ray ô, avelao ny helony, fa tsy fantany izay ataony.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –Faran’ny andininy: jereo Sal 22.19.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ny vahoaka tamin’izany nijanona teo nijery. Ny manampahefana jiosy kosa nandatsa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 22.8-9.
    marker-yv: yv-n
  - type: text
    text: ' nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Namonjy olon-kafa Izy, ka aoka hamonjy ny tenany, raha Izy tokoa no ilay Mesia avy amin’Andriamanitra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ny miaramila koa naneso an’i Jesoa ka nanatona hanome vinaingitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 69.22.
    marker-yv: yv-n
  - type: text
    text: ' Azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'sady niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha Ianao tokoa no Mpanjakan’ny Jiosy, vonjeo ny tenanao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary teo ambonin’ny lohan’i Jesoa dia nasiana soratra hoe: «Ity no Mpanjakan’ny Jiosy!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny anankiray tamin’ireo olon-dratsy nihantona teo dia nanevateva Azy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy Ianao tokoa ve no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '? Vonjeo ny tenanao ary vonjeo koa izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa niteny azy mafy kosa ilay faharoa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy matahotra an’Andriamanitra mihitsy ve ianao, na dia voaheloka miaraka amin’ity olona ity aza? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ny antsika roa lahy dia rariny izao, satria valin’ny natao no raisina; fa ny Azy kosa, tsy mba nisy ratsy nataony na inona na inona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia izao no naverimberiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Jesoa ô, mba tsarovy aho rahatrizay ho avy indray Ianao amin’ny maha Mpanjaka Anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazaiko marina aminao fa anio ihany dia ho tafaraka amiko any am-paradisa ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miala aina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 27.45-46; Mk 15.33-47; Jôh 19.28-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 44-45
  - type: text
    text: 'Tamin’ny mitataovovonana teo ho eo, dia takona ny masoandro ka rakotra haizina ny faritany manontolo ary naharitra hatramin’ny telo tolakandro izany. Nitriatra nizara roa kosa ny efitra lamba tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 26.31-33.
    marker-yv: yv-n
  - type: text
    text: ' tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary niantso tamin’ny feo mahery i Jesoa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ray ô, apetrako eo am-pelatananao ny aiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 31.6.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Avy nilaza izany Izy, dia niala aina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Nahita ny zava-nitranga ilay kapiteny rômanina ka nanome voninahitra an’Andriamanitra sady niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tena olo-marina tokoa io Lehilahy io!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary ny vahoaka rehetra vory teo mba hizaha dia nanatri-maso ny zava-nitranga, ka lasa niverina nandondòn-tratra noho ny alahelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Fa ny olom-pantatr’i Jesoa rehetra mbamin’ireo vehivavy nanaraka Azy hatrany Galilea kosa nijanona teny lavidavitra teny
  - type: usfm
    marker: f
    children:
