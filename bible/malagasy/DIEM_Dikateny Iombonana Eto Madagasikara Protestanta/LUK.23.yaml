  - type: text
    text: 'Dia nampidinin’i Jôsefa avy teo amin’ny hazofijaliana ny vatan’i Jesoa, nofonosiny lamba sarobidy, ary napetrany tao amin’ny fasana nolavahana tamin’ny vatolampy, mbola tsy nandevenana olona. '
  - type: usfm
    marker: vlbl
