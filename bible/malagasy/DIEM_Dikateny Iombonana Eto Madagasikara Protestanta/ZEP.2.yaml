      text: ry mpanetry tena eto amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mpanatanteraka ny fitsipiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manetre tena eo anatrehan’ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Angamba ho voatsimbina ihany ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny androm-pahatezerany.
  - type: usfm
    marker: s1
