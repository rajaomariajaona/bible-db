document_id: ZEP.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Antso ho amin’ny fibebahana
  - type: text
    content: Mandiniha ka mieritrereta,
  - type: text
    content: ry vahoaka lany henatra,
  '10':
  - type: text
    content: Izany no famaizana setrin’ny avonavony
  - type: text
    content: satria izy roa tonta dia samy nandatsa
  - type: text
    content: ny vahoakan’ilay TOMPOn’izao rehetra izao
  - type: text
    content: ary nanitatra ny taniny teo amin’ny azy.
  '11':
  - type: text
    content: Hahatsiravina ny hataon’ny TOMPO aminy;
  - type: text
    content: hofoanany avokoa ireo andriamanitry ny olombelona.
  - type: text
    content: Koa na ireo hafa firenena faran’izay lavitra aza
  - type: text
    content: dia hiankohoka avokoa hitsaoka Azy,
  - type: text
    content: samy any amin’ny taniny avy.
  - type: heading
    content: Ny loza mananontanona ny vahoaka any atsimo sy avaratra
  '12':
  - type: text
    content: «Ianareo koa, ry Etiôpianina, hoy ny Tompo,
  - type: text
    content: hovonoiko amin’ny ady ianareo».
  '13':
  - type: text
    content: Haninji-tanana koa ny TOMPO
  - type: text
    content: hamely ny faritra avaratra
  - type: text
    content: ka handringana an’i Asiria;
  - type: text
    content: Izy no hahalao ny tanànan’i Ninive
  - type: note
    content: Jereo Nah 1.1 sy nta.
  - type: text
    content: ka hahatonga azy ho karankaina toy ny taniefitra.
  '14':
  - type: text
    content: Ao amin’ny toerana nisy an’i Ninive
  - type: text
    content: dia handrian’ny omby aman’ondry
  - type: text
    content: sy ireo karazam-biby samy hafa;
  - type: text
    content: honenan’ny vorondolo sy tararaka
  - type: text
    content: eny an-tampon’ireo andrin-tranony,
  - type: text
    content: feom-borona no ho re eo am-baravarankely,
  - type: text
    content: faharàvana no ho hita raha vao mby eo an-tokonana
  - type: text
    content: satria ho voaendaka ny rafitra hazo sedera.
  '15':
  - type: text
    content: Izany no hiafaran’ilay tanàna fatra-pirehareha,
  - type: text
    content: sady niaina tamim-pilaminana
  - type: text
    content: ary nihevi-tena ho tsy manan-tsahala.
  - type: text
    content: Indrisy, efa tonga lao izy izao ary fierem-biby!
  - type: text
    content: Izay rehetra mandalo eo akaikiny dia hisioka
  - type: text
    content: sy hanakifi-tanana ho fanesoana azy.
  '2':
  - type: text
    content: dieny ianareo tsy mbola tonga toy ny akofa
  - type: note
    content: 'dieny tsy mbola tonga: araka ny dkt tranainy grika; ny rijan-teny hebreo kosa manao hoe dieny tsy mbola mihatra ny fanamelohana.'
  - type: text
    content: izay miely indray andro monja,
  - type: text
    content: dieny tsy mbola mahazo anareo
  - type: text
    content: ny afom-pahatezeran’ny TOMPO,
  - type: text
    content: ary dieny tsy mbola tonga aminareo
  - type: text
    content: ny andro hirehetan’izany.
  '3':
  - type: text
    content: Mitadiava ny TOMPO ianareo rehetra,
  - type: text
    content: ry mpanetry tena eto amin’ny tany
  - type: text
    content: sady mpanatanteraka ny fitsipiny.
  - type: text
    content: Manaova ny marina,
  - type: text
    content: manetre tena eo anatrehan’ny TOMPO.
  - type: text
    content: Angamba ho voatsimbina ihany ianareo
  - type: text
    content: amin’ny androm-pahatezerany.
  - type: heading
    content: Ny loza mananontanona ny vahoaka eo andrefan’i Joda
  '4':
  - type: text
    content: Fa hilaozana i Gazà, ary ho lao i Askelôna.
  - type: text
    content: Horoahina mitataovovonana ny mponin’i Asdôda,
  - type: text
    content: ary hofongorana ny an’i Hekrôna
  - type: note
    content: 'Gazà, Askelôna, Asdôda ary Hekrôna: tanàn-dehibe tany Filistia.'
  - type: text
    content: .
  '5':
  - type: text
    content: Lozanareo avy any Kaftôra
  - type: note
    content: 'Kaftôra na hoe Kreta: jereo Jer 47.4 sy nta.'
  - type: text
    content: ','
  - type: text
    content: izay mipetraka amoron-dranomasina!
  - type: text
    content: 'Izao no tenin’ny TOMPO mitsara anareo:'
  - type: text
    content: «Ry Kanàhana tanin’ny Filistinina,
  - type: text
    content: haringako tsy hisy mponina intsony eo aminao.
  '6':
  - type: text
    content: Ny taninao eo amorontsiraka
  - type: text
    content: dia ho lasa fiandrasam-biby fiompy
  - type: text
    content: 'ka hiriariavan’ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry'
  - type: text
    content: ary hasiana valan’ondry aman’osy.»
  '7':
  - type: text
    content: Ny sisa velona amin’ny taranak’i Joda
  - type: text
    content: no hanana izany faritra izany;
  - type: text
    content: ao no hiandrasany biby fiompy,
  - type: text
    content: ary ny tranon’i Askelôna
  - type: text
    content: no hatoriany amin’ny hariva.
  - type: text
    content: Fa hanasoa azy ny TOMPO Andriamaniny
  - type: text
    content: ary hanome fanambinana azy indray.
  - type: heading
    content: Ny loza mananontanona ny vahoaka eo atsinanan’i Joda
  '8':
  - type: text
    content: Ny TOMPOn’izao rehetra izao
  - type: text
    content: 'sady Andriamanitr’i Israely:'
  - type: text
    content: 'dia manao teny hentitra hoe:'
  - type: text
    content: «Reko ny olon’i Môaba sy Hamôna
  - type: note
    content: 'Môaba sy Hamôna: firenena roa nipetraka tao atsinanan’i Jôrdàna sy ny Ranomasina Maty.'
  - type: text
    content: nandatsa sy nanaratsy ny vahoakako.
  - type: text
    content: Eny, nandatsa azy izy roa tonta,
  - type: text
    content: ary nanitatra ny taniny teo amin’ny azy.
  '9':
  - type: text
    content: Koa velona AHO ary mianiana
  - type: text
    content: fa ho levona i Môaba sy i Hamôna,
  - type: text
    content: ho tahaka ny tanànan’i Sôdôma sy Gômôra
  - type: note
    content: Jereo Gen 19.24-25.
  - type: text
    content: ka ho kirihitra tsilo sy lava-tsira
  - type: text
    content: ary ho tany lao mandrakizay;
  - type: text
    content: ho avy handroba sy haka ny taniny
  - type: text
    content: ireo sisa velona amin’ny vahoakako».
