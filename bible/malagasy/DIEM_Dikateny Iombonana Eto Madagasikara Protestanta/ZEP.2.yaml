  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antso ho amin’ny fibebahana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandiniha ka mieritrereta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry vahoaka lany henatra,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no famaizana setrin’ny avonavony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria izy roa tonta dia samy nandatsa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vahoakan’ilay TOMPOn’izao rehetra izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanitatra ny taniny teo amin’ny azy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahatsiravina ny hataon’ny TOMPO aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hofoanany avokoa ireo andriamanitry ny olombelona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa na ireo hafa firenena faran’izay lavitra aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiankohoka avokoa hitsaoka Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy any amin’ny taniny avy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny loza mananontanona ny vahoaka any atsimo sy avaratra
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianareo koa, ry Etiôpianina, hoy ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovonoiko amin’ny ady ianareo».
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haninji-tanana koa ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamely ny faritra avaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handringana an’i Asiria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no hahalao ny tanànan’i Ninive
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nah 1.1 sy nta.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahatonga azy ho karankaina toy ny taniefitra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny toerana nisy an’i Ninive
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handrian’ny omby aman’ondry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ireo karazam-biby samy hafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: honenan’ny vorondolo sy tararaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-tampon’ireo andrin-tranony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: feom-borona no ho re eo am-baravarankely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faharàvana no ho hita raha vao mby eo an-tokonana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ho voaendaka ny rafitra hazo sedera.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no hiafaran’ilay tanàna fatra-pirehareha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady niaina tamim-pilaminana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nihevi-tena ho tsy manan-tsahala.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy, efa tonga lao izy izao ary fierem-biby!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mandalo eo akaikiny dia hisioka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanakifi-tanana ho fanesoana azy.
