  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hatoriany amin’ny hariva.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hanasoa azy ny TOMPO Andriamaniny
  - type: usfm
    marker: q1
