document_id: 1KI.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpanjakan’i Siria manao fahirano an’i Samaria
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorin’i Bena-Hadada mpanjakan’i Siria ny tafiny manontolo izay nahitana mpanjaka 32 mpiandany aminy ary koa soavaly mbamin’ny kalesy maro. Dia nataony fahirano i Samaria ka notafihiny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izy kosa mbola nampaniraka fanintelony ho amin’i Ahaba mpanjaka hoe: «Hataon’ireo andriamanitra amiko anie ny famaizana faran’izay mafy indrindra, raha avelako hisy hahafeno tanan’ilan’ny vahoaka rehetra manaraka ahy akory ny vovok’i Samaria!»'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny navalin’ny mpanjakan’i Israely:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ampahatsiahivo an’i Bena-Hadada izay voalazan’ny ohabolana hoe: «Aoka izay vao miainga hiantafika tsy hirehareha toy ny efa avy nandresy.»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Teo am-pisotroana niaraka tamin’ny mpanjaka hafa tao an-day i Bena-Hadada raha nahazo izany valinteny izany; koa nomeny baiko avy hatrany ny manamboninahiny mba hiomana hanafika ny tanàna. Dia nioman-kanao izany ireo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nandresy i Ahaba mpanjaka
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy mpaminany nanatona an’i Ahaba mpanjakan’i Israely ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO: «Hitanao va ireo miaramila marobe ireo? Hatolotro eo an-tananao ireo anio, ka dia ho fantatrao fa Izaho no TOMPO.»'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Ahaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Amin’ny alalan’iza anefa?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ilay mpaminany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO: «Amin’ny alalan’ireo tovolahy izay nofantenan’ny filoha isam-paritany.»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy indray i Ahaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza àry no hamaky ny ady?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ilay mpaminany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao ihany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalahatr’i Ahaba ireo zatovo nofantenan’ny filoha isam-paritany ka nahitana 232. Nalahany nanarakaraka an’ireo koa ny miaramila israelita rehetra ka nisy fito arivo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao fanafihana izy tamin’ny mitataovovonana, raha ilay nisotro ka mamo tao an-day iny i Bena-Hadada sy ny mpanjaka 32 mpanampy azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zatovo voafantina isam-paritany no nanafika voalohany; dia nandefa miaramila mpisafo i Bena-Hadada hijery izay mitranga any, ka nilazana izy hoe: «Misy olona mivoaka hanafika avy any Samaria.»'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na fihavanana na ady no hiaviany, dia ataovy sambo-belona izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Noho ny hamamoany dia toa tsy tena fantatr’i Bena-Hadada tsara intsony izay zavatra tadiaviny.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka ny tanàna ny zatovo voafantina sy ny miaramila nanaraka azy, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandefa iraka tany an-tanàna ho any amin’i Ahaba mpanjakan’i Israely izy '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka samy namely izay nifanandrina taminy; ary nitsoaka nandositra ny Sirianina, nefa nenjehin’ny Israelita. Fa i Bena-Hadada mpanjakan’i Siria kosa nandositra nitaingin-tsoavaly niaraka tamin’ny mpitaingin-tsoavaly hafa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nivoaka nanafika koa ny mpanjakan’i Israely ka namely ny mpitaingin-tsoavaly mbamin’ny kalesy; ary dia marobe ny Sirianina matiny.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany amin’ny mpanjakan’i Israely ilay mpaminany ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mahereza ary diniho tsara izay tokony hataonao, fa amin’ny herintaona dia hiakatra hanafika anao indray ny mpanjakan’i Siria.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mandresy indray i Ahaba
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny minisitry ny mpanjakan’i Siria taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny Andriamanitr’i Israely dia Andriamanitry ny tendrombohitra, koa izany no nahareseny antsika. Fa raha eny an-tany lemaka kosa no hiadiantsika aminy dia tsy maintsy ho resintsika ireo. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa izao no ataovy: esory amin’ny toerany avokoa ny mpanjaka mpanampy anao ka soloy governora. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Makà miaramila maro sahala amin’ireo miaramilanao resy teo ary koa soavaly sy kalesy marobe toy ny teo aloha; dia hiady amin’ny tafik’i Israely eny an-tany lemaka isika, ka azo antoka fa isika indray no hahery amin’izay.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neken’i Bena-Hadada ny torohevitr’ireo minisitra ka narahiny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa niherina ny taona, dia nampanaovin’i Bena-Hadada matso ny tafika sirianina ka nentiny hankany Afeka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I Afeka dia mety ho ao amin’ny faritra lemaka atsinanan’ny farihy Genesareta.
      marker-yv: yv-n
    - type: text
      text: ' hiady amin’i Israely. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampanaovin’i Ahaba matso koa ny miaramila israelita sady nandray vatsy, ary niainga hifanehatra amin’ny fahavalo. Nitoby nanao antokony roa teo anoloan’ny Sirianina izy; tahaka ny osy andiany roa kely ny Israelita, fa ny Sirianina kosa nanenika ny tany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanatona ilay olon’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ilay olon’Andriamanitra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia toa ilay mpaminany voalaza etsy aloha and 13, 22.
      marker-yv: yv-n
    - type: text
      text: ' ka niteny tamin’ny mpanjakan’i Israely hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO: «Satria nataon’ny Sirianina fa Andriamanitry ny tendrombohitra ihany ny TOMPO fa tsy mba Andriamanitry ny tany lemaka koa, dia hatolotro eo an-tananao ireo miaramila marobe ireo, ka ho fantatrao fa Izaho no TOMPO.» '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nandritra ny fito andro dia nitoby nifanatrika teo foana izy roa tonta, ka raikitra ny ady tamin’ny andro fahafito; ary nahafaty miaramila sirianina mpandeha an-tongotra antokony zato ny Israelita tao anatin’ny iray andro monja. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hanao aminy hoe: «Izao no lazain’i Bena-Hadada: Ny volafotsinao sy ny volamenanao dia ahy, ary toraka izany koa ny vady aman-janakao izay tsara indrindra dia ahy.» '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izay sisa tsy maty dia nandositra nankany Afeka ary nisy antokony 27, nefa nianjeran’ny mandan’ny tanàna avokoa ireny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Ahaba mitsimbina ny ain’ny mpanjakan’i Siria
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa afa-nandositra i Bena-Hadada ka niditra tao an-tanàna ary niery tao an’efitrano anatiny indrindra tamin’ny trano anankiray. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy iretsy minisitra taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Renay fa mpanjaka antra olona ireo mpanjakan’i Israely ireo; koa aoka hisikina lamba gony izahay, ary aoka hofatorana mahazaka eo ambony lohanay ny tananay, dia hankany amin’ny mpanjakan’i Israely izahay, sao mba hitsimbina ny ainao izy.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisikina lamba gony ireo ary ny tanany nofatorana mahazaka teo ambony lohany, dia nankany amin’ny mpanjakan’i Israely izy sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitalaho aminao i Bena-Hadada mpanomponao mba hitsimbina ny ainy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Ahaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa mbola velona ve izy? Rahalahiko manko izy!
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fambara tsara ho azy ireo izany ka dia nohararaotiny haingana nanaovana hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Rahalahinao hoe i Bena-Hadada!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy indray i Ahaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana ka alao izy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany aminy i Bena-Hadada ka nampitaingeniny tamin’ny kalesiny. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Bena-Hadada tamin’i Ahaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Haveriko aminao ny tanàna izay nalain’ny raiko tamin-drainao; ary afa-manao varotra any Damasy toy izay nataon-draiko tany Samaria ianao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Ahaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hanao izany fifanekena izany aminao aho, dia hamela anao handeha avy eo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa nahavita izany fifanekena izany i Ahaba, dia namela azy handeha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andriamanitra manameloka ny fahalemen’i Ahaba
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tao anatin’ny andia-mpaminany anankiray dia nisy lehilahy niteny tamin’ny namany araka ny baikon’ny TOMPO hoe: «Asio aho!», nefa tsy nety namely azy ilay namany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ralehilahy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Satria tsy nankatoavinao ny TOMPO, dia hisy liona hamely anao raha vao miala eto amiko ianao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha vao niala teo aminy izy, dia tojo liona izay namono azy ho faty. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sendra olon-kafa indray ilay mpaminany ka niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Asio aho!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasian’ilehio izy ka naratra. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lasa ilay mpaminany nipetraka teo amoron-dalana niandry izay handalovan’ny mpanjaka, ary notakonany volon-doha ny handriny mba tsy hahafantarany azy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa rehefa nandalo ny mpanjaka, dia nitarainany nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry andriamanjaka ô, tao anatin’ny ady aho no indro nisy olona nivoaka an-daharana nitondra mpigadra iray teo amiko sady niteny hoe: «Ambeno ity lehilahy ity! Fa raha mandositra io, dia ianao no ho faty hisolo azy, na koa handoa volafotsy 35 kilao amiko ianao.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjakan’i Israely namaly hoe: «Araka ny teninao, ry andriamanjaka, dia anao ny tenako sy izay rehetra ananako.» '
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Kanjo raha mbola sahirana nivezivezy tetsy sy teroa iny aho, dia lasa nitsoaka izy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjakan’i Israely taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao ihany izany no nilaza ny fanamelohana ny tenanao.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nakarin’ilay mpaminany haingana ny volon-doha nanakona ny handriny, ka fantatry ny mpanjakan’i Israely fa isan’ny andia-mpaminany izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.41 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Ireo mpaminany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miara-mitoetra ireo dia mety mitondra marika eo an-kandrina na sola kely eo an-tampon-doha. Nafenin’ity mpaminany ity tamin’ny taovolony izany famantarana manokana izany.
      marker-yv: yv-n
    - type: text
      text: '. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ilay mpaminany taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO: «Satria navelanao handeha ilay lehilahy nohelohiko ho faty, dia ianao kosa no ho faty hisolo azy, ary ny vahoakanao no ho faty hisolo ny vahoakany.»'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nalahelo sady tezitra ny mpanjakan’i Israely no niverina sady nody tany an-tranony, tao Samaria.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niverina indray ny iraka ka nanao hoe: «Izao no tenin’i Bena-Hadada: Nampilaza tatỳ aminao aho ny hanomezanao ahy ny volafotsinao sy ny volamenanao ary ny vady aman-janakao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa rahampitso amin’ny ora toy izao, dia hirahiko hankatỳ aminao ny mpanompoko hisava ny tranonao sy ny an’ny mpanomponao. Koa izay rehetra nahafinaritra ny masonao dia halainy ka hoentiny avokoa.»
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampiantsoin’ny mpanjakan’i Israely ny loholona rehetra teo amin’ny taniny ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hitanareo tsara izao fa mitady hanisy ratsy antsika iny olona iny! Fa raha nitaky ny vady aman-janako mbamin’ny volafotsiko sy ny volamenako izy, dia tsy nisy nolaviko izany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny loholona sy ny vahoaka rehetra taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza mihaino azy ary aza manaiky!
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Ahaba tamin’ny irak’i Bena-Hadada:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lazao amin’ny andriamanjaka hoe: «Izay rehetra notakinao tamiko tamin’ny voalohany dia hataoko; fa izao lazainao amiko izao kosa tsy azoko ekena'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mba tsy hisian’ny ady, dia eken’i Ahaba ny hanolotra ny zava-drehetra amin’ny mpifanandrina aminy, saingy tsy ekeny kosa ny hahatongavan’ny fahavalony handroba ny renivohiny.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa ny iraka nitondra izany valinteny izany tany amin’i Bena-Hadada. '
