document_id: 1KI.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpanjakan’i Siria manao fahirano an’i Samaria
  - type: text
    content: 'Novorin’i Bena-Hadada mpanjakan’i Siria ny tafiny manontolo izay nahitana mpanjaka 32 mpiandany aminy ary koa soavaly mbamin’ny kalesy maro. Dia nataony fahirano i Samaria ka notafihiny. '
  '10':
  - type: text
    content: 'Fa izy kosa mbola nampaniraka fanintelony ho amin’i Ahaba mpanjaka hoe: «Hataon’ireo andriamanitra amiko anie ny famaizana faran’izay mafy indrindra, raha avelako hisy hahafeno tanan’ilan’ny vahoaka rehetra manaraka ahy akory ny vovok’i Samaria!»'
  '11':
  - type: text
    content: 'Ary hoy ny navalin’ny mpanjakan’i Israely:'
  - type: text
    content: '–Ampahatsiahivo an’i Bena-Hadada izay voalazan’ny ohabolana hoe: «Aoka izay vao miainga hiantafika tsy hirehareha toy ny efa avy nandresy.»'
  '12':
  - type: text
    content: Teo am-pisotroana niaraka tamin’ny mpanjaka hafa tao an-day i Bena-Hadada raha nahazo izany valinteny izany; koa nomeny baiko avy hatrany ny manamboninahiny mba hiomana hanafika ny tanàna. Dia nioman-kanao izany ireo.
  - type: heading
    content: Nandresy i Ahaba mpanjaka
  '13':
  - type: text
    content: 'Fa nisy mpaminany nanatona an’i Ahaba mpanjakan’i Israely ka nanao hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Hitanao va ireo miaramila marobe ireo? Hatolotro eo an-tananao ireo anio, ka dia ho fantatrao fa Izaho no TOMPO.»'
  '14':
  - type: text
    content: 'Dia hoy i Ahaba:'
  - type: text
    content: –Amin’ny alalan’iza anefa?
  - type: text
    content: 'Ka novalian’ilay mpaminany hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Amin’ny alalan’ireo tovolahy izay nofantenan’ny filoha isam-paritany.»'
  - type: text
    content: 'Fa hoy indray i Ahaba:'
  - type: text
    content: –Iza àry no hamaky ny ady?
  - type: text
    content: 'Dia hoy ilay mpaminany hoe:'
  - type: text
    content: –Ianao ihany.
  '15':
  - type: text
    content: 'Ary nalahatr’i Ahaba ireo zatovo nofantenan’ny filoha isam-paritany ka nahitana 232. Nalahany nanarakaraka an’ireo koa ny miaramila israelita rehetra ka nisy fito arivo. '
  '16':
  - type: text
    content: 'Nanao fanafihana izy tamin’ny mitataovovonana, raha ilay nisotro ka mamo tao an-day iny i Bena-Hadada sy ny mpanjaka 32 mpanampy azy. '
  '17':
  - type: text
    content: 'Ny zatovo voafantina isam-paritany no nanafika voalohany; dia nandefa miaramila mpisafo i Bena-Hadada hijery izay mitranga any, ka nilazana izy hoe: «Misy olona mivoaka hanafika avy any Samaria.»'
  '18':
  - type: text
    content: 'Dia hoy izy hoe:'
  - type: text
    content: –Na fihavanana na ady no hiaviany, dia ataovy sambo-belona izy
  - type: note
    content: Noho ny hamamoany dia toa tsy tena fantatr’i Bena-Hadada tsara intsony izay zavatra tadiaviny.
  - type: text
    content: .
  '19':
  - type: text
    content: 'Dia nivoaka ny tanàna ny zatovo voafantina sy ny miaramila nanaraka azy, '
  '2':
  - type: text
    content: 'Ary nandefa iraka tany an-tanàna ho any amin’i Ahaba mpanjakan’i Israely izy '
  '20':
  - type: text
    content: 'ka samy namely izay nifanandrina taminy; ary nitsoaka nandositra ny Sirianina, nefa nenjehin’ny Israelita. Fa i Bena-Hadada mpanjakan’i Siria kosa nandositra nitaingin-tsoavaly niaraka tamin’ny mpitaingin-tsoavaly hafa. '
  '21':
  - type: text
    content: Nivoaka nanafika koa ny mpanjakan’i Israely ka namely ny mpitaingin-tsoavaly mbamin’ny kalesy; ary dia marobe ny Sirianina matiny.
  '22':
  - type: text
    content: 'Dia nankany amin’ny mpanjakan’i Israely ilay mpaminany ka nanao taminy hoe:'
  - type: text
    content: –Mahereza ary diniho tsara izay tokony hataonao, fa amin’ny herintaona dia hiakatra hanafika anao indray ny mpanjakan’i Siria.
  - type: heading
    content: Mandresy indray i Ahaba
  '23':
  - type: text
    content: 'Hoy ny minisitry ny mpanjakan’i Siria taminy:'
  - type: text
    content: '–Ny Andriamanitr’i Israely dia Andriamanitry ny tendrombohitra, koa izany no nahareseny antsika. Fa raha eny an-tany lemaka kosa no hiadiantsika aminy dia tsy maintsy ho resintsika ireo. '
  '24':
  - type: text
    content: 'Koa izao no ataovy: esory amin’ny toerany avokoa ny mpanjaka mpanampy anao ka soloy governora. '
  '25':
  - type: text
    content: Makà miaramila maro sahala amin’ireo miaramilanao resy teo ary koa soavaly sy kalesy marobe toy ny teo aloha; dia hiady amin’ny tafik’i Israely eny an-tany lemaka isika, ka azo antoka fa isika indray no hahery amin’izay.
  - type: text
    content: 'Neken’i Bena-Hadada ny torohevitr’ireo minisitra ka narahiny. '
  '26':
  - type: text
    content: Rehefa niherina ny taona, dia nampanaovin’i Bena-Hadada matso ny tafika sirianina ka nentiny hankany Afeka
  - type: note
    content: I Afeka dia mety ho ao amin’ny faritra lemaka atsinanan’ny farihy Genesareta.
  - type: text
    content: ' hiady amin’i Israely. '
  '27':
  - type: text
    content: 'Nampanaovin’i Ahaba matso koa ny miaramila israelita sady nandray vatsy, ary niainga hifanehatra amin’ny fahavalo. Nitoby nanao antokony roa teo anoloan’ny Sirianina izy; tahaka ny osy andiany roa kely ny Israelita, fa ny Sirianina kosa nanenika ny tany. '
  '28':
  - type: text
    content: Dia nanatona ilay olon’Andriamanitra
  - type: note
    content: Ilay olon’Andriamanitra dia toa ilay mpaminany voalaza etsy aloha and 13, 22.
  - type: text
    content: ' ka niteny tamin’ny mpanjakan’i Israely hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Satria nataon’ny Sirianina fa Andriamanitry ny tendrombohitra ihany ny TOMPO fa tsy mba Andriamanitry ny tany lemaka koa, dia hatolotro eo an-tananao ireo miaramila marobe ireo, ka ho fantatrao fa Izaho no TOMPO.» '
  '29':
  - type: text
    content: 'Nandritra ny fito andro dia nitoby nifanatrika teo foana izy roa tonta, ka raikitra ny ady tamin’ny andro fahafito; ary nahafaty miaramila sirianina mpandeha an-tongotra antokony zato ny Israelita tao anatin’ny iray andro monja. '
  '3':
  - type: text
    content: 'hanao aminy hoe: «Izao no lazain’i Bena-Hadada: Ny volafotsinao sy ny volamenanao dia ahy, ary toraka izany koa ny vady aman-janakao izay tsara indrindra dia ahy.» '
  '30':
  - type: text
    content: Izay sisa tsy maty dia nandositra nankany Afeka ary nisy antokony 27, nefa nianjeran’ny mandan’ny tanàna avokoa ireny.
  - type: heading
    content: I Ahaba mitsimbina ny ain’ny mpanjakan’i Siria
  - type: text
    content: 'Fa afa-nandositra i Bena-Hadada ka niditra tao an-tanàna ary niery tao an’efitrano anatiny indrindra tamin’ny trano anankiray. '
  '31':
  - type: text
    content: 'Hoy iretsy minisitra taminy:'
  - type: text
    content: –Renay fa mpanjaka antra olona ireo mpanjakan’i Israely ireo; koa aoka hisikina lamba gony izahay, ary aoka hofatorana mahazaka eo ambony lohanay ny tananay, dia hankany amin’ny mpanjakan’i Israely izahay, sao mba hitsimbina ny ainao izy.
  '32':
  - type: text
    content: 'Dia nisikina lamba gony ireo ary ny tanany nofatorana mahazaka teo ambony lohany, dia nankany amin’ny mpanjakan’i Israely izy sady nanao hoe:'
  - type: text
    content: –Mitalaho aminao i Bena-Hadada mpanomponao mba hitsimbina ny ainy.
  - type: text
    content: 'Fa hoy i Ahaba:'
  - type: text
    content: –Moa mbola velona ve izy? Rahalahiko manko izy!
  '33':
  - type: text
    content: 'Fambara tsara ho azy ireo izany ka dia nohararaotiny haingana nanaovana hoe:'
  - type: text
    content: –Rahalahinao hoe i Bena-Hadada!
  - type: text
    content: 'Dia hoy indray i Ahaba:'
  - type: text
    content: –Mandehana ka alao izy.
  - type: text
    content: 'Dia nankany aminy i Bena-Hadada ka nampitaingeniny tamin’ny kalesiny. '
  '34':
  - type: text
    content: 'Hoy kosa i Bena-Hadada tamin’i Ahaba:'
  - type: text
    content: –Haveriko aminao ny tanàna izay nalain’ny raiko tamin-drainao; ary afa-manao varotra any Damasy toy izay nataon-draiko tany Samaria ianao.
  - type: text
    content: 'Ary hoy i Ahaba:'
  - type: text
    content: –Hanao izany fifanekena izany aminao aho, dia hamela anao handeha avy eo.
  - type: text
    content: Rehefa nahavita izany fifanekena izany i Ahaba, dia namela azy handeha.
  - type: heading
    content: Andriamanitra manameloka ny fahalemen’i Ahaba
  '35':
  - type: text
    content: 'Ary tao anatin’ny andia-mpaminany anankiray dia nisy lehilahy niteny tamin’ny namany araka ny baikon’ny TOMPO hoe: «Asio aho!», nefa tsy nety namely azy ilay namany. '
  '36':
  - type: text
    content: 'Dia hoy ralehilahy taminy:'
  - type: text
    content: –Satria tsy nankatoavinao ny TOMPO, dia hisy liona hamely anao raha vao miala eto amiko ianao.
  - type: text
    content: 'Koa raha vao niala teo aminy izy, dia tojo liona izay namono azy ho faty. '
  '37':
  - type: text
    content: 'Sendra olon-kafa indray ilay mpaminany ka niteny taminy hoe:'
  - type: text
    content: –Asio aho!
  - type: text
    content: 'Dia nasian’ilehio izy ka naratra. '
  '38':
  - type: text
    content: 'Fa lasa ilay mpaminany nipetraka teo amoron-dalana niandry izay handalovan’ny mpanjaka, ary notakonany volon-doha ny handriny mba tsy hahafantarany azy. '
  '39':
  - type: text
    content: 'Koa rehefa nandalo ny mpanjaka, dia nitarainany nataony hoe:'
  - type: text
    content: '–Ry andriamanjaka ô, tao anatin’ny ady aho no indro nisy olona nivoaka an-daharana nitondra mpigadra iray teo amiko sady niteny hoe: «Ambeno ity lehilahy ity! Fa raha mandositra io, dia ianao no ho faty hisolo azy, na koa handoa volafotsy 35 kilao amiko ianao.» '
  '4':
  - type: text
    content: 'Ary ny mpanjakan’i Israely namaly hoe: «Araka ny teninao, ry andriamanjaka, dia anao ny tenako sy izay rehetra ananako.» '
  '40':
  - type: text
    content: Kanjo raha mbola sahirana nivezivezy tetsy sy teroa iny aho, dia lasa nitsoaka izy.
  - type: text
    content: 'Dia hoy ny mpanjakan’i Israely taminy:'
  - type: text
    content: –Ianao ihany izany no nilaza ny fanamelohana ny tenanao.
  '41':
  - type: text
    content: Ary nakarin’ilay mpaminany haingana ny volon-doha nanakona ny handriny, ka fantatry ny mpanjakan’i Israely fa isan’ny andia-mpaminany izy
  - type: note
    content: Ireo mpaminany miara-mitoetra ireo dia mety mitondra marika eo an-kandrina na sola kely eo an-tampon-doha. Nafenin’ity mpaminany ity tamin’ny taovolony izany famantarana manokana izany.
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'Dia hoy ilay mpaminany taminy:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Satria navelanao handeha ilay lehilahy nohelohiko ho faty, dia ianao kosa no ho faty hisolo azy, ary ny vahoakanao no ho faty hisolo ny vahoakany.»'
  '43':
  - type: text
    content: Ary nalahelo sady tezitra ny mpanjakan’i Israely no niverina sady nody tany an-tranony, tao Samaria.
  '5':
  - type: text
    content: 'Dia niverina indray ny iraka ka nanao hoe: «Izao no tenin’i Bena-Hadada: Nampilaza tatỳ aminao aho ny hanomezanao ahy ny volafotsinao sy ny volamenanao ary ny vady aman-janakao. '
  '6':
  - type: text
    content: Koa rahampitso amin’ny ora toy izao, dia hirahiko hankatỳ aminao ny mpanompoko hisava ny tranonao sy ny an’ny mpanomponao. Koa izay rehetra nahafinaritra ny masonao dia halainy ka hoentiny avokoa.»
  '7':
  - type: text
    content: 'Dia nampiantsoin’ny mpanjakan’i Israely ny loholona rehetra teo amin’ny taniny ka nilazany hoe:'
  - type: text
    content: –Hitanareo tsara izao fa mitady hanisy ratsy antsika iny olona iny! Fa raha nitaky ny vady aman-janako mbamin’ny volafotsiko sy ny volamenako izy, dia tsy nisy nolaviko izany.
  '8':
  - type: text
    content: 'Dia hoy ny loholona sy ny vahoaka rehetra taminy:'
  - type: text
    content: –Aza mihaino azy ary aza manaiky!
  '9':
  - type: text
    content: 'Ary hoy i Ahaba tamin’ny irak’i Bena-Hadada:'
  - type: text
    content: '–Lazao amin’ny andriamanjaka hoe: «Izay rehetra notakinao tamiko tamin’ny voalohany dia hataoko; fa izao lazainao amiko izao kosa tsy azoko ekena'
  - type: note
    content: Mba tsy hisian’ny ady, dia eken’i Ahaba ny hanolotra ny zava-drehetra amin’ny mpifanandrina aminy, saingy tsy ekeny kosa ny hahatongavan’ny fahavalony handroba ny renivohiny.
  - type: text
    content: .»
  - type: text
    content: 'Dia lasa ny iraka nitondra izany valinteny izany tany amin’i Bena-Hadada. '
