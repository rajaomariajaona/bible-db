  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Miaramila tsaran’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ianao, anaka, dia aoka hihahery amin’ny alalan’ny fahasoavana ananantsika tafaray amin’i Kristy Jesoa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no iaretako ny mafy rehetra ho fanasoavana ireo olomboafidin’Andriamanitra, mba hahazoan’ireo koa famonjena, dia ilay ao amin’i Kristy Jesoa, mbamin’ny voninahitra maharitra mandrakizay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azo antoka izao teny izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Raha niara-maty tamin’i Kristy isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiara-belona aminy koa;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha miaritra ny mafy isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hiara-manjaka aminy koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha lavintsika Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mba holaviny koa isika;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mivadika aminy isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy dia mahatoky hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy afa-mandà ny tenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 11-13:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Rm 6.8; Mt 10.33 sy Lk 12.9; Nom 22.19.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpiasa voazaha toetra
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany zavatra izany no ampahatsiarovy ny olona, ka anaro mafy eo anatrehan’Andriamanitra izy mba tsy hiady teny; satria tsy mahasoa izany, fa mamohehatra ny mpihaino aza. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mikeleza aina mba ho olona voazaha toetra eo imason’Andriamanitra, ka ho mpiasa tsy mahazo henatra amin’ny asany, mamoaka tsara ny teny momba ny fampianarana marim-pototra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Halaviro ny taria poaka àty sady manazimba fivavahana; fa ny mpanao ireny dia vao mainka handroso amin’ny haratsiam-panahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fampianaran-dry zareo dia toy ny vay homamiadana mandany ny nofo. Isan’ireny ry i Himeneo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Himeneo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1Tim 1.20.
      marker-yv: yv-n
    - type: text
      text: ' sy i Fileto: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'efa nivaona niala tamin’ny fampianarana marim-pototra izy roa lahy sady manimba ny finoan’ny sasany, raha milaza fa zavatra efa tanteraka sahady ny fitsanganantsika ho velona. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ny fanorenana mafy nataon’Andriamanitra dia miorina tsara sady voasokitra eo ny teny hoe: «Fantatry ny Tompo ireo Azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Nom 16.5.
      marker-yv: yv-n
    - type: text
      text: », sy ny hoe «Aoka hiala amin’ny ratsy avokoa ny olona rehetra mitonona ho mpanaja ny Tompo!»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo zavatra efa renao tamiko teo anatrehan’ny vavolombelona maro dia ankino amin’ny olona mahatoky, izay afaka mampianatra ny sasany koa.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy dia fanaka volamena sy volafotsy ihany no ao anaty lapa soa anankiray fa misy fanaka hazo sy tanimanga koa; iretsy voalohany dia fanaka mihaja fa ireto faharoa kosa dia fanaka tsotsotra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay olona miezaka hadio fo ka miala amin’ireo haratsiana ireo dia ho tahaka ny fanaka mihaja, satria voatokana ho an’ny Tompo izy sady misy ampiasany azy ary voavoatra hanao asa soa isan-karazany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andosiro ny zava-dratsy ironan’ny tanora fanahy; fa aoka ny rariny, ny finoana, ny fitiavana ary ny fihavanana no hiarahanao mikatsaka amin’ireo olona miantso ny Tompo amin’ny fo mahitsy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza miraharaha izay fanontaniana adaladala sy tsy misy heviny, satria fantatrao fa mahatonga ady izany; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny mpanompon’ny Tompo dia tsy tokony ho fiadîna, fa tokony halemy fanahy amin’ny olona rehetra, hahay mampianatra, hahalefitra, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ho mora fo raha mananatra ny mpanohitra azy: hataon’Andriamanitra miala amin’ny toe-dratsy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'miala amin’ny toe-dratsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
      marker-yv: yv-n
    - type: text
      text: ' angamba ireny mpanohitra ireny mba hahalala ny fampianarana marim-pototra; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hody ny sain’ireo ka ho afaka amin’ny fandriky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' izay nanao azy sambo-belona hanaraka ny sitrapony.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hiaritra fijaliana miaraka amiko ianao, toy ny miaramila tsaran’i Kristy Jesoa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny miaramila miantafika dia tsy maningo-tena amin’ny raharaha fanaom-bahoaka, raha te hankasitrahin’izay mandatsaka azy hiantafika. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpanao fanatanjahan-tena dia tsy mahazo satroboninahi-pandresena raha tsy manezaka araka ny fitsipika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1Kôr 9.24-27.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpamboly izay misasatra no tokony ho voalohany mandray izay anjarany amin’ny vokatra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saino izay lazaiko, fa homen’ny Tompo fahazavan-tsaina momba ny zavatra rehetra ianao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsarovy i Jesoa Kristy, Izay nipoitra avy amin’ny taranak’i Davida sady efa nitsangana velona avy tany amin’ny maty, araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' torîko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny fitoriako izany Vaovao Mahafaly izany no ijaliako, ary igadrako toy ny mpanao ratsy aza. Kanefa ny tenin’Andriamanitra tsy mba voagadra. '
