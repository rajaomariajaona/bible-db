document_id: 2TI.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miaramila tsaran’i Kristy Jesoa
  - type: text
    content: 'Koa ianao, anaka, dia aoka hihahery amin’ny alalan’ny fahasoavana ananantsika tafaray amin’i Kristy Jesoa. '
  '10':
  - type: text
    content: 'Izany no iaretako ny mafy rehetra ho fanasoavana ireo olomboafidin’Andriamanitra, mba hahazoan’ireo koa famonjena, dia ilay ao amin’i Kristy Jesoa, mbamin’ny voninahitra maharitra mandrakizay. '
  '11':
  - type: text
    content: 'Azo antoka izao teny izao:'
  - type: text
    content: «Raha niara-maty tamin’i Kristy isika,
  - type: text
    content: dia hiara-belona aminy koa;
  '12':
  - type: text
    content: raha miaritra ny mafy isika,
  - type: text
    content: dia hiara-manjaka aminy koa;
  - type: text
    content: fa raha lavintsika Izy,
  - type: text
    content: dia mba holaviny koa isika;
  '13':
  - type: text
    content: raha mivadika aminy isika,
  - type: text
    content: Izy dia mahatoky hatrany
  - type: text
    content: satria tsy afa-mandà ny tenany
  - type: note
    content: 'And 11-13: ampit Rm 6.8; Mt 10.33 sy Lk 12.9; Nom 22.19.'
  - type: text
    content: .»
  - type: heading
    content: Mpiasa voazaha toetra
  '14':
  - type: text
    content: 'Izany zavatra izany no ampahatsiarovy ny olona, ka anaro mafy eo anatrehan’Andriamanitra izy mba tsy hiady teny; satria tsy mahasoa izany, fa mamohehatra ny mpihaino aza. '
  '15':
  - type: text
    content: 'Mikeleza aina mba ho olona voazaha toetra eo imason’Andriamanitra, ka ho mpiasa tsy mahazo henatra amin’ny asany, mamoaka tsara ny teny momba ny fampianarana marim-pototra. '
  '16':
  - type: text
    content: 'Halaviro ny taria poaka àty sady manazimba fivavahana; fa ny mpanao ireny dia vao mainka handroso amin’ny haratsiam-panahy. '
  '17':
  - type: text
    content: Ary ny fampianaran-dry zareo dia toy ny vay homamiadana mandany ny nofo. Isan’ireny ry i Himeneo
  - type: note
    content: 'Himeneo: jereo 1Tim 1.20.'
  - type: text
    content: ' sy i Fileto: '
  '18':
  - type: text
    content: 'efa nivaona niala tamin’ny fampianarana marim-pototra izy roa lahy sady manimba ny finoan’ny sasany, raha milaza fa zavatra efa tanteraka sahady ny fitsanganantsika ho velona. '
  '19':
  - type: text
    content: 'Kanefa ny fanorenana mafy nataon’Andriamanitra dia miorina tsara sady voasokitra eo ny teny hoe: «Fantatry ny Tompo ireo Azy'
  - type: note
    content: Ampit Nom 16.5.
  - type: text
    content: », sy ny hoe «Aoka hiala amin’ny ratsy avokoa ny olona rehetra mitonona ho mpanaja ny Tompo!»
  '2':
  - type: text
    content: Ireo zavatra efa renao tamiko teo anatrehan’ny vavolombelona maro dia ankino amin’ny olona mahatoky, izay afaka mampianatra ny sasany koa.
  '20':
  - type: text
    content: 'Tsy dia fanaka volamena sy volafotsy ihany no ao anaty lapa soa anankiray fa misy fanaka hazo sy tanimanga koa; iretsy voalohany dia fanaka mihaja fa ireto faharoa kosa dia fanaka tsotsotra. '
  '21':
  - type: text
    content: 'Izay olona miezaka hadio fo ka miala amin’ireo haratsiana ireo dia ho tahaka ny fanaka mihaja, satria voatokana ho an’ny Tompo izy sady misy ampiasany azy ary voavoatra hanao asa soa isan-karazany. '
  '22':
  - type: text
    content: 'Andosiro ny zava-dratsy ironan’ny tanora fanahy; fa aoka ny rariny, ny finoana, ny fitiavana ary ny fihavanana no hiarahanao mikatsaka amin’ireo olona miantso ny Tompo amin’ny fo mahitsy. '
  '23':
  - type: text
    content: 'Aza miraharaha izay fanontaniana adaladala sy tsy misy heviny, satria fantatrao fa mahatonga ady izany; '
  '24':
  - type: text
    content: 'fa ny mpanompon’ny Tompo dia tsy tokony ho fiadîna, fa tokony halemy fanahy amin’ny olona rehetra, hahay mampianatra, hahalefitra, '
  '25':
  - type: text
    content: 'ho mora fo raha mananatra ny mpanohitra azy: hataon’Andriamanitra miala amin’ny toe-dratsy'
  - type: note
    content: 'miala amin’ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ' angamba ireny mpanohitra ireny mba hahalala ny fampianarana marim-pototra; '
  '26':
  - type: text
    content: 'ary hody ny sain’ireo ka ho afaka amin’ny fandriky ny '
  - type: text
    content: devoly
  - type: text
    content: ' izay nanao azy sambo-belona hanaraka ny sitrapony.'
  '3':
  - type: text
    content: 'Aoka hiaritra fijaliana miaraka amiko ianao, toy ny miaramila tsaran’i Kristy Jesoa. '
  '4':
  - type: text
    content: 'Ny miaramila miantafika dia tsy maningo-tena amin’ny raharaha fanaom-bahoaka, raha te hankasitrahin’izay mandatsaka azy hiantafika. '
  '5':
  - type: text
    content: Ny mpanao fanatanjahan-tena dia tsy mahazo satroboninahi-pandresena raha tsy manezaka araka ny fitsipika
  - type: note
    content: Ampit 1Kôr 9.24-27.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ny mpamboly izay misasatra no tokony ho voalohany mandray izay anjarany amin’ny vokatra. '
  '7':
  - type: text
    content: Saino izay lazaiko, fa homen’ny Tompo fahazavan-tsaina momba ny zavatra rehetra ianao.
  '8':
  - type: text
    content: 'Tsarovy i Jesoa Kristy, Izay nipoitra avy amin’ny taranak’i Davida sady efa nitsangana velona avy tany amin’ny maty, araka ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' torîko. '
  '9':
  - type: text
    content: 'Noho ny fitoriako izany Vaovao Mahafaly izany no ijaliako, ary igadrako toy ny mpanao ratsy aza. Kanefa ny tenin’Andriamanitra tsy mba voagadra. '
