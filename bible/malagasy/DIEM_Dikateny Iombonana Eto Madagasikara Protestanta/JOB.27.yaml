  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hampiseho anareo ny asan-tanan’Andriamanitra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hanafina ihany koa ny hevitr’ilay Tsitoha.
- type: usfm
  marker: q1
  children:
  - type: usfm
