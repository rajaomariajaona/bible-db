    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny anjaran’ny ratsy fanahy anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ho an’ny fahavaloko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny anjaran’ny olon-dratsy kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ho an’ny mpifanandrina amiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
