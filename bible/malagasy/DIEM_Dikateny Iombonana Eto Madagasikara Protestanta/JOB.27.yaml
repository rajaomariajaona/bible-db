  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa hanantena inona ireo tsy mivavaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha esorin’Andriamanitra ny ainy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hihaino ny fitarainany ve Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha sendra zoim-pahoriana izy?
- type: usfm
  marker: q1
