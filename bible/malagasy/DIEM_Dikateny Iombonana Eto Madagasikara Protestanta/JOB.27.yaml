  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Satria efa tsapanareo rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa nahoana no miteniteny foana ianareo?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahombiazana mandalo
  - type: usfm
