document_id: JOB.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba (tohiny):'
  - type: heading
    content: Hitaraina amin’Andriamanitra ve ny meloka
  - type: text
    content: 'Mbola nanohy ny teniny ihany i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Raha mba nahita fahafinaretana
  - type: text
    content: teo anilan’ilay Tsitoha izy,
  - type: text
    content: dia ho niantso an’Andriamanitra mandrakariva.
  '11':
  - type: text
    content: Hampiseho anareo ny asan-tanan’Andriamanitra aho,
  - type: text
    content: ary tsy hanafina ihany koa ny hevitr’ilay Tsitoha.
  '12':
  - type: text
    content: Satria efa tsapanareo rehetra izany,
  - type: text
    content: koa nahoana no miteniteny foana ianareo?
  - type: heading
    content: Fahombiazana mandaloJereo 24.18 sy nta..
  '13':
  - type: text
    content: Izao no anjara natokan’Andriamanitra
  - type: text
    content: ho an’ny ratsy fanahy
  - type: text
    content: sy lova atolotr’ilay Tsitoha
  - type: text
    content: 'ho an’ny olon-dozabe:'
  '14':
  - type: text
    content: Na mitombo isa aza ny taranany,
  - type: text
    content: dia ho fatin-tsabatra;
  - type: text
    content: ary ny zanany tsy hanan-kohanina.
  '15':
  - type: text
    content: Izay sisa velona haripaky ny pesta,
  - type: text
    content: ary ny mpitondratenany tsy hitomany azy.
  '16':
  - type: text
    content: Na dia mahangona volafotsy
  - type: text
    content: hoatra ny vovoka aza izy
  - type: text
    content: ary fitafiana miavosa tahaka ny fotaka,
  '17':
  - type: text
    content: dia aoka izy hanangona;
  - type: text
    content: fa ny marina no hiakanjo ny fitafiana
  - type: text
    content: ary ny olom-banona no handray ny volafotsy.
  - type: heading
    content: '*'
  '18':
  - type: text
    content: Mora simba ny trano aorin’ny olon-dratsy
  - type: note
    content: Mora simba na toy ny akanim-borona.
  - type: text
    content: fa toy ny kitranotranon’ny mpiandry voly.
  '19':
  - type: text
    content: Mbola manana harembe izy,
  - type: text
    content: nony mandry indray maka farany
  - type: note
    content: 'Faramparany: araka ny dkt grika tranainy sy siriaka; hebreo: tsy halevina.'
  - type: text
    content: ;
  - type: text
    content: saingy tsy eo intsony ireny rehefa mihiratra ny masony.
  '2':
  - type: text
    content: Velona Andriamanitra Izay tsy manome rariny ahy,
  - type: text
    content: velona ilay Tsitoha Izay mameno ahy fahoriana mangidy
  - type: text
    content: 'ka manao izao fianianana izao aho:'
  '20':
  - type: text
    content: Mamely azy toy ny riaka ny horohoro,
  - type: text
    content: ary indray alina no ipaohan’ny tadio azy.
  '21':
  - type: text
    content: Indaosin’ny rivotra avy any atsinanana izy,
  - type: text
    content: ka ongotany mafy hiala amin’ny toerany.
  '22':
  - type: text
    content: Asian’io rivotra io tsy ananany antra izy
  - type: text
    content: ka voatery mandositra ny fisafoahany.
  '23':
  - type: text
    content: Mitehaka noho ny fahavoazany kosa ny olona
  - type: text
    content: sady manakora azy nandao fonenana.
  '3':
  - type: text
    content: raha mbola misy koa aina kely ato amiko
  - type: text
    content: ary eo am-bavoroko ny fofonain’Andriamanitra,
  '4':
  - type: text
    content: dia tsy hiteny fitaka ny molotro
  - type: text
    content: ary tsy hilaza lainga ny lelako.
  '5':
  - type: text
    content: Sanatria amiko ny hihevitra
  - type: text
    content: fa manana ny marina ianareo!
  - type: text
    content: Hizingiziniko mandra-pahafatiko kosa
  - type: text
    content: fa tsy manan-tsiny ny tenako.
  '6':
  - type: text
    content: Hazoniko mafy ny fahamarinako
  - type: text
    content: 'ka tsy havelako hiala:'
  - type: text
    content: Mandry ny eritreritro
  - type: text
    content: ka tsy misy hampahamenatra ahy akory
  - type: text
    content: na dia ny amin’ny androko iray monja aza.
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Ny anjaran’ny ratsy fanahy anie
  - type: text
    content: no ho an’ny fahavaloko!
  - type: text
    content: Ary ny anjaran’ny olon-dratsy kosa
  - type: text
    content: no ho an’ny mpifanandrina amiko!
  '8':
  - type: text
    content: Fa hanantena inona ireo tsy mivavaka,
  - type: text
    content: raha esorin’Andriamanitra ny ainy?
  '9':
  - type: text
    content: Hihaino ny fitarainany ve Andriamanitra
  - type: text
    content: raha sendra zoim-pahoriana izy?
