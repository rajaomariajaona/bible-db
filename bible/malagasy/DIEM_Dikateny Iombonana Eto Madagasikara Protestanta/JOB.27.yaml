  children:
  - type: text
    text: 'Valintenin’i Jôba (tohiny):'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hitaraina amin’Andriamanitra ve ny meloka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mbola nanohy ny teniny ihany i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Velona Andriamanitra Izay tsy manome rariny ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: velona ilay Tsitoha Izay mameno ahy fahoriana mangidy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka manao izao fianianana izao aho:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: raha mbola misy koa aina kely ato amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo am-bavoroko ny fofonain’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: dia tsy hiteny fitaka ny molotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hilaza lainga ny lelako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sanatria amiko ny hihevitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa manana ny marina ianareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hizingiziniko mandra-pahafatiko kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy manan-tsiny ny tenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hazoniko mafy ny fahamarinako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka tsy havelako hiala:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandry ny eritreritro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy hampahamenatra ahy akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ny amin’ny androko iray monja aza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
