  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha mba nahita fahafinaretana
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo anilan’ilay Tsitoha izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho niantso an’Andriamanitra mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
