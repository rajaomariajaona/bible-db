  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na mitombo isa aza ny taranany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fatin-tsabatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zanany tsy hanan-kohanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay sisa velona haripaky ny pesta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpitondratenany tsy hitomany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Na dia mahangona volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoatra ny vovoka aza izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fitafiana miavosa tahaka ny fotaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
