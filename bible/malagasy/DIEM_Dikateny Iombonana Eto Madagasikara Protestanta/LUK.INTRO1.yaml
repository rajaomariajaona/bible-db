document_id: LUK.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Tahaka an’i Matio, i Lioka amin’ny ankapobeny dia mandahatra ny Vaovao Mahafaly arosony ho antsika araka ny soritra vaventy hita ao amin’i Marka:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny ataon’i Jôhany Mpanao batisa, mpialoha lalana an’i Jesoa (Lk 3.1-20), ary ny anaovana batisa an’i Jesoa sy ny akàna fanahy Azy (Lk 3.21–4.13).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Ny fiainan’i Jesoa ampahibemaso any Galilea: mitoriteny sy manasitrana marary (4.14–9.50).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–I Jesoa miala tao Galilea ary mizotra ho any Jerosalema (Lk 9.51–19.28). Eto i Lioka no manana fanampiny maro ankoatra izay voatantaran’i Marka: na fanoharana izany, tahaka ilay Samaritanina tsara fanahy, ilay mpanankarena tsy misaina, ilay faralahy very ka hita indray; na tantara, tahaka ny namangian’i Jesoa an-dry i Marta sy i Maria.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny asan’i Jesoa ao Jerosalema (Lk 19.29–21.38) alohan’ny hijaliany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny fijalian’i Jesoa sy ny fahafatesany (Lk 22–23).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Ny andro fandresen’i Jesoa ny fahafatesana (Lk 24) no mamarana ny Vaovao Mahafaly araka an’i Lioka: amin’izany no itantaran’i Lioka ny fisehoan’i Jesoa tafatsangana velona amin’ireo mpianany, indrindra ilay fisehoana amin’ireo mpianatra teny an-dalana ho any Emaosy, ary itenenany fohy momba ny fiakaran’i Jesoa any an-danitra.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Mbola misy anefa zavatra hafa mampiavaka an’i Lioka amin’i Marka. Eo aloha ny fitarihan-teny (Lk 1.1-4) izay anoloran’i Lioka ny bokiny amin’i Teôfily sady ilazany ny fomba nanatontosany azy. Ary eo indrindra indrindra ny sasin-teny lava natokan’i Lioka hamisavisan-javatra momba ny fiavian’i Jôhany Mpanao batisa sy ny fahazazàny ary koa momba ny fiavian’i Jesoa sy ny fahazazàny (Lk 1.5–2.52), araka ny drafitra maty paika. Zavatra isan-karazany no azo vakîna ao amin’io sasin-teny io: ohatra, ny filazana tamin’i Zakarià sy tamin’i Maria ary tamin’ny mpiandry ondry; ny fahaterahan’i Jôhany Mpanao batisa, ny fahaterahan’i Jesoa sy ny famangian’ireo mpiandry ondry Azy ary ny fanolorana Azy tao an-tempoly; ny tononkiran’i Maria, ny tononkiran’i Zakarià, ny tononkiran’i Simehôna. Ao amin’io sasin-teny io dia efa ambaran’i Lioka sahady ny vontoatin’izay ijoroany ho vavolombelona: sady avy amin’Andriamanitra i Jesoa no mifahatra ao amin’ny vahoaka Israely ara-pirazanana, ary tena manova endrika ny tantaran’ny taranak’olombelona ny fiaviany. Asehon’i Lioka sahady ihany koa fa: ananan’Andriamanitra tombom-pitiavana ireo madinika (ny olon-tsotra, ny voailikilika, ny vehivavy, ny mahantra, ny vahiny); mahery tokoa ny asan’ny Fanahy Masina; miteraka hafaliana sy mampidera an’Andriamanitra sady mampipololotra vavaka ny fiatrehana ny Vaovao Mahafaly.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny an’i Lioka no manana endrika fanoratra grika indrindra amin’ny Vaovao Mahafaly efatra. Olona tsy mahalala firy ny fomba amam-panaon’ny vahoaka Israely no hamaky ny Vaovao Mahafaly arosony ka imasoan’i Lioka lalandava ny hazava ary voasany hatrany ireo zavatra mety tsy ho azon’ny mpamaky. Ho an’ny olona amin’izao vaninandro diavintsika izao dia tsy isalasalana fa ny Vaovao Mahafaly araka an’i Lioka no sahaza azy indrindra. Raha zohîn’ny mpamaky miandalana izy io, dia ho hitany taratra ilay Mpamonjy ny olombelona rehetra.
