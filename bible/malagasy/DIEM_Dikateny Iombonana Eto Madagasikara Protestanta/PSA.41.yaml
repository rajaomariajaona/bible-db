document_id: PSA.41,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaky ny olona voaenjika
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: Na dia ny sakaiza tiako indrindra aza,
  - type: text
    content: izay nitokiako ka niara-nihinana tamiko,
  - type: text
    content: dia nanjary nitsangana hanohitra ahy
  - type: note
    content: Ny and 10 dia voatsiahy ampahany ao amin’ny Mk 14.18 sy Jôh 13.18; jereo koa Mt 26.23; Lk 22.21.
  - type: text
    content: .
  '11':
  - type: text
    content: Fa Ianao kosa, TOMPO ô, miantrà ahy;
  - type: text
    content: ka areno aho mba hamaliako an’ireo.
  '12':
  - type: text
    content: 'Izao no hahafantarako fa tia ahy Ianao:'
  - type: text
    content: tsy hakorain’ny fahavaloko hoe resy aho.
  '13':
  - type: text
    content: Ary izaho dia hotahirizinao tsy hanan-tsiny
  - type: text
    content: ka hampitoerinao mandrakizay eo anatrehanao.
  '14':
  - type: text
    content: Hisaorana anie ny TOMPO Andriamanitr’i Israely,
  - type: text
    content: 'hatrizay hatrizay ka ho mandrakizay. '
  - type: text
    content: Amen
  - type: text
    content: '! Amen'
  - type: note
    content: Ampit Sal 106.48.
  - type: text
    content: '!'
  '2':
  - type: text
    content: Sambatra izay miahy ny malahelo sy mahantra,
  - type: text
    content: fa ny TOMPO hamonjy azy amin’ny andro mahory.
  '3':
  - type: text
    content: Ny TOMPO no miaro azy tsy ho faty
  - type: text
    content: ka mahatonga azy ho sambatra eto an-tany
  - type: text
    content: sady tsy mahafoy azy ho voatanam-pahavalo.
  '4':
  - type: text
    content: Ny TOMPO no hanohana azy
  - type: text
    content: eo am-pandriana ijaliany,
  - type: text
    content: ka dia hikarakara azy
  - type: text
    content: mandritra ny aharariany.
  '5':
  - type: text
    content: 'Ka hoy aho tamin’ny TOMPO:'
  - type: text
    content: «Mba iantrao aho ka sitrano
  - type: text
    content: fa taminao no efa nanotako!»
  '6':
  - type: text
    content: 'Ny fahavaloko maniry loza ho ahy hoe:'
  - type: text
    content: «Oviana no ho faty io, ka tsy hotsaroana intsony!»
  '7':
  - type: text
    content: Raha misy tonga mamangy ahy ireo,
  - type: text
    content: dia mikendry ny hanendrikendrika ahy;
  - type: text
    content: manangona fanaratsiana ao an-tsainy izy,
  - type: text
    content: ka vao tafavoaka, dia mampiely izany.
  '8':
  - type: text
    content: Nivory ireo rehetra tsy tia ahy
  - type: text
    content: mba hitakoritsidritsika ny amiko
  - type: text
    content: sy hanombantombana ny fahavoazako.
  '9':
  - type: text
    content: 'Hoy ireo hoe: «Voan’ny aretin-dratsy io'
  - type: text
    content: ka milamaka tsy ho tafarina intsony!»
