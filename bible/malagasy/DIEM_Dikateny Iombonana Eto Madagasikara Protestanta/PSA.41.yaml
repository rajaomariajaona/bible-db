document_id: PSA.41
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Vavaky ny olona voaenjika
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tao amin’ny tahirin-kiran’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sambatra izay miahy ny malahelo sy mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny TOMPO hamonjy azy amin’ny andro mahory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny TOMPO no miaro azy tsy ho faty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahatonga azy ho sambatra eto an-tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mahafoy azy ho voatanam-pahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny TOMPO no hanohana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo am-pandriana ijaliany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia hikarakara azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandritra ny aharariany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ka hoy aho tamin’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mba iantrao aho ka sitrano
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa taminao no efa nanotako!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny fahavaloko maniry loza ho ahy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Oviana no ho faty io, ka tsy hotsaroana intsony!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha misy tonga mamangy ahy ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mikendry ny hanendrikendrika ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manangona fanaratsiana ao an-tsainy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka vao tafavoaka, dia mampiely izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nivory ireo rehetra tsy tia ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitakoritsidritsika ny amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanombantombana ny fahavoazako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy ireo hoe: «Voan’ny aretin-dratsy io'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka milamaka tsy ho tafarina intsony!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Na dia ny sakaiza tiako indrindra aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nitokiako ka niara-nihinana tamiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanjary nitsangana hanohitra ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 10 dia voatsiahy ampahany ao amin’ny Mk 14.18 sy Jôh 13.18; jereo koa Mt 26.23; Lk 22.21.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa Ianao kosa, TOMPO ô, miantrà ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka areno aho mba hamaliako an’ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no hahafantarako fa tia ahy Ianao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hakorain’ny fahavaloko hoe resy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary izaho dia hotahirizinao tsy hanan-tsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampitoerinao mandrakizay eo anatrehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hisaorana anie ny TOMPO Andriamanitr’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hatrizay hatrizay ka ho mandrakizay. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: '! Amen'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 106.48.
    marker-yv: yv-n
  - type: text
    text: '!'
