document_id: 1TI.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho '
  - type: text
    content: apôstôlin’i Kristy
  - type: text
    content: ' Jesoa noho ny baikon’Andriamanitra Mpamonjy antsika sy i Kristy Jesoa fanantenantsika.'
  '10':
  - type: text
    content: 'ny mpijangajanga, ny mpifampila samy lehilahy, ny mpivarotra olona, ny mpandainga sy mpianian-tsy to, ary izay manao zavatra mifanohitra amin’ny fampianarana tsy misy tomika. '
  '11':
  - type: text
    content: 'Izany fampianarana izany dia mifanaraka amin’ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' izay nankinina tamiko, Vaovao Mahafaly isehoan’ny voninahitr’ilay Andriamanitra loharanom-pahasambarana'
  - type: note
    content: Isehoan’ny... loharanom-pahasambarana na avy amin’ilay Andriamanitra be voninahitra sady loharanom-pahasambarana.
  - type: text
    content: .
  - type: heading
    content: Fisaorana an’Andriamanitra noho ny famindrampony
  '12':
  - type: text
    content: 'Velom-pisaorana an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa Tompontsika aho, fa nomeny hery hahatontosako ny fanompoako. Velom-pisaorana Azy aho fa nataony mahatoky ka notendreny hanompo Azy, '
  '13':
  - type: text
    content: na dia nanevateva Azy aza taloha sady nanenjika sy nampahory Azy mafy. Kanefa namindran’Andriamanitra fo aho satria tsy mbola nanam-pinoana ka tsy nahalala izay nataoko
  - type: note
    content: Jereo Asa 8.3; 9.4-5.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Naidin’ny Tompontsika be dia be tamiko ny fahasoavany, mbamin’ny finoana sy ny fitiavana ananantsika tafaray amin’i Kristy Jesoa. '
  '15':
  - type: text
    content: 'Azo antoka izao teny izao ka mendrika hankatoavin’ny olona rehetra: Tonga tetỳ an-tany i Kristy Jesoa mba hamonjy ny mpanota; ary izaho no faraidiny amin’ireny. '
  '16':
  - type: text
    content: 'Kanefa izao no anton’ny namindran’Andriamanitra fo tamiko: tiany hasehon’i Kristy Jesoa ao amiko mpanota faraidiny ny fahari-pony rehetra mba ho ohatra ho an’izay hino Azy ka handray ny fiaina-maharitra mandrakizay. '
  '17':
  - type: text
    content: 'Ho an’ilay Mpanjaka mandrakizay, dia Andriamanitra tokana, tsy mety maty sady tsy hita maso, ho Azy anie ny haja sy ny voninahitra mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  '18':
  - type: text
    content: 'Ry Timôty zanako, izany fepetra izany no atolotro anao, araka ireo hafatr’Andriamanitra voalaza fahiny tamin’ny fanendrena anao. Raiso ireo ho fitaovam-piadiana amin’ny ady tsara, '
  '19':
  - type: text
    content: 'tano ny finoana ary manàna fieritreretana tsara. Fa misy olona nitsipaka ny feon’ny fieritreretany, ka nandrendrika ny finoany; '
  '2':
  - type: text
    content: Mamangy anao aho, ry Timôty
  - type: note
    content: Jereo Asa 16.1.
  - type: text
    content: ', dia ianao izay tena zanako ao amin’ny finoana. Ho aminao anie ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy i Kristy Tompontsika!'
  - type: heading
    content: Fampitandremana amin’ny fampianaran-diso
  '20':
  - type: text
    content: 'anisan’ireny ry i Himeneo sy i Aleksandra izay natolotro an’i '
  - type: text
    content: Satàna
  - type: note
    content: 'natolotro an’i Satàna: ampit 1Kôr 5.5 sy nta. –Himeneo: jereo 2 Tim 2.17. –Aleksandra: jereo 2 Tim 4.14.'
  - type: text
    content: ' mba ho faizina tsy hanevateva an’Andriamanitra intsony.'
  '3':
  - type: text
    content: Araka ny nangatahiko taminao fony aho nankany Masedônia, dia aoka hitoetra ao Efeso ianao
  - type: note
    content: 'Masedônia: jereo 2 Kôr 1.16 sy nta. –Efeso: jereo 2 Kôr 1.8 sy nta; ny dia ao an-tsain’i Paoly eto dia taona maro tatỳ aorian’ilay tantaraina ao amin’ny Asa 20.1.'
  - type: text
    content: '. Fa misy olona sasany manao fampianaran-diso ao, ka tsy maintsy raranao mba tsy hanao izany. '
  '4':
  - type: text
    content: Ilazao ireo mba tsy hifikitra amin’anganongano sy tantaram-pirazanana tsy misy farany
  - type: note
    content: Angamba tsangan-kevitra miankina amin’ny fitanisana ireo taranaky ny razambe sy olo-malaza ao amin’ny Test. T. izany, tsangan-kevitra miankina amin’ny andalan-tsoratra tahaka ny Gen 4–5; 9–11 sns...
  - type: text
    content: ', izay mahabe ady hevitra fotsiny fa tsy mampandroso ny asa famonjena aorin’Andriamanitra amin’ny finoana. '
  '5':
  - type: text
    content: 'Ny kendren’izany fandrarana izany dia ny mba hamohafoha ny fitiavana avy amin’ny fo mahitsy sy fieritreretana tsara ary finoana tsy mihatsaravelatsihy. '
  '6':
  - type: text
    content: 'Misy sasantsasany efa nivaona tamin’izany, ka very lalana ary niafara any amin’ny taria poaka àty. '
  '7':
  - type: text
    content: Te ho mpampianatra momba ny lalànan’Andriamanitra ry zareo kanefa tsy fantany velively ny zavatra lazainy sy itompoany.
  '8':
  - type: text
    content: 'Fantatsika fa tsara ny '
  - type: text
    content: lalàna
  - type: text
    content: ', raha ampiasaina amin’izay antony marina. '
  '9':
  - type: text
    content: 'Tokony hotsarovana fa ny lalàna dia tsy natao ho an’ny manao ny marina, fa ho an’ny mpandika lalàna sy ny maditra: dia ny olon-dratsy sy ny mpanota, ny olona mpaniratsira an’Andriamanitra sy mpanimbazimba fivavahana, ny mpamono ray sy mpamono reny, ny mpamono olona, '
