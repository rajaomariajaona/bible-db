document_id: 1TI.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Avy amiko Paoly ity taratasy ity, dia izaho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôlin’i Kristy
    - type: text
      text: ' Jesoa noho ny baikon’Andriamanitra Mpamonjy antsika sy i Kristy Jesoa fanantenantsika.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ny mpijangajanga, ny mpifampila samy lehilahy, ny mpivarotra olona, ny mpandainga sy mpianian-tsy to, ary izay manao zavatra mifanohitra amin’ny fampianarana tsy misy tomika. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izany fampianarana izany dia mifanaraka amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' izay nankinina tamiko, Vaovao Mahafaly isehoan’ny voninahitr’ilay Andriamanitra loharanom-pahasambarana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Isehoan’ny... loharanom-pahasambarana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: avy amin’ilay Andriamanitra be voninahitra sady loharanom-pahasambarana.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fisaorana an’Andriamanitra noho ny famindrampony
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Velom-pisaorana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa Tompontsika aho, fa nomeny hery hahatontosako ny fanompoako. Velom-pisaorana Azy aho fa nataony mahatoky ka notendreny hanompo Azy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: na dia nanevateva Azy aza taloha sady nanenjika sy nampahory Azy mafy. Kanefa namindran’Andriamanitra fo aho satria tsy mbola nanam-pinoana ka tsy nahalala izay nataoko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 8.3; 9.4-5.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Naidin’ny Tompontsika be dia be tamiko ny fahasoavany, mbamin’ny finoana sy ny fitiavana ananantsika tafaray amin’i Kristy Jesoa. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Azo antoka izao teny izao ka mendrika hankatoavin’ny olona rehetra: Tonga tetỳ an-tany i Kristy Jesoa mba hamonjy ny mpanota; ary izaho no faraidiny amin’ireny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Kanefa izao no anton’ny namindran’Andriamanitra fo tamiko: tiany hasehon’i Kristy Jesoa ao amiko mpanota faraidiny ny fahari-pony rehetra mba ho ohatra ho an’izay hino Azy ka handray ny fiaina-maharitra mandrakizay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ho an’ilay Mpanjaka mandrakizay, dia Andriamanitra tokana, tsy mety maty sady tsy hita maso, ho Azy anie ny haja sy ny voninahitra mandrakizay mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ry Timôty zanako, izany fepetra izany no atolotro anao, araka ireo hafatr’Andriamanitra voalaza fahiny tamin’ny fanendrena anao. Raiso ireo ho fitaovam-piadiana amin’ny ady tsara, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'tano ny finoana ary manàna fieritreretana tsara. Fa misy olona nitsipaka ny feon’ny fieritreretany, ka nandrendrika ny finoany; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mamangy anao aho, ry Timôty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 16.1.
      marker-yv: yv-n
    - type: text
      text: ', dia ianao izay tena zanako ao amin’ny finoana. Ho aminao anie ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy i Kristy Tompontsika!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana amin’ny fampianaran-diso
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'anisan’ireny ry i Himeneo sy i Aleksandra izay natolotro an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'natolotro an’i Satàna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 1Kôr 5.5 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Himeneo:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 2 Tim 2.17. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Aleksandra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 2 Tim 4.14.'
      marker-yv: yv-n
    - type: text
      text: ' mba ho faizina tsy hanevateva an’Andriamanitra intsony.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Araka ny nangatahiko taminao fony aho nankany Masedônia, dia aoka hitoetra ao Efeso ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Masedônia: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Kôr 1.16 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efeso:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 2 Kôr 1.8 sy nta; ny dia ao an-tsain’i Paoly eto dia taona maro tatỳ aorian’ilay tantaraina ao amin’ny Asa 20.1.'
      marker-yv: yv-n
    - type: text
      text: '. Fa misy olona sasany manao fampianaran-diso ao, ka tsy maintsy raranao mba tsy hanao izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ilazao ireo mba tsy hifikitra amin’anganongano sy tantaram-pirazanana tsy misy farany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Angamba tsangan-kevitra miankina amin’ny fitanisana ireo taranaky ny razambe sy olo-malaza ao amin’ny Test. T. izany, tsangan-kevitra miankina amin’ny andalan-tsoratra tahaka ny Gen 4–5; 9–11 sns...
      marker-yv: yv-n
    - type: text
      text: ', izay mahabe ady hevitra fotsiny fa tsy mampandroso ny asa famonjena aorin’Andriamanitra amin’ny finoana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny kendren’izany fandrarana izany dia ny mba hamohafoha ny fitiavana avy amin’ny fo mahitsy sy fieritreretana tsara ary finoana tsy mihatsaravelatsihy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Misy sasantsasany efa nivaona tamin’izany, ka very lalana ary niafara any amin’ny taria poaka àty. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Te ho mpampianatra momba ny lalànan’Andriamanitra ry zareo kanefa tsy fantany velively ny zavatra lazainy sy itompoany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fantatsika fa tsara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ', raha ampiasaina amin’izay antony marina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tokony hotsarovana fa ny lalàna dia tsy natao ho an’ny manao ny marina, fa ho an’ny mpandika lalàna sy ny maditra: dia ny olon-dratsy sy ny mpanota, ny olona mpaniratsira an’Andriamanitra sy mpanimbazimba fivavahana, ny mpamono ray sy mpamono reny, ny mpamono olona, '
