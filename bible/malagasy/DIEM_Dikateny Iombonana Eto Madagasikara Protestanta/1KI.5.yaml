document_id: 1KI.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary i Salômôna nanapaka tamin’ny fanjakana rehetra hatreo amin’ny ony Eofrata ka mipaka any amin’ny tanin’ny Filistinina ary hatrany amin’ny sisintanin’i Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 15.18; 2 Tan 9.26. –Amin’ny dkt sasany, ny 5.1-14 etoana dia voalahatra ho 4.21-34.
      marker-yv: yv-n
    - type: text
      text: ; fa nandoa hetra ireo ka nanompo an’i Salômôna tamin’ny andro rehetra niainany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Izany fahendren’i Salômôna izany dia nihoatra noho ny an’ny olon-kendry rehetra tany Atsinanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Atsinanana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe Arabia sy Mezôpôtamia...
      marker-yv: yv-n
    - type: text
      text: ' sy tany Ejipta. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hendry noho ny olon-drehetra izy fa nihoarany avokoa na i Etàna ilay Ezrahita, na i Hemàna, na i Kalkôla, na i Dardà zanakalahin’i Mahôla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Etàna ilay Ezrahita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 89.1 –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mahôla:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' olona tsy fantatra. Io teny io anefa, mety hilazana anaran-dihy (jereo Sal 30.12; Eks 15.20); koa ny voadika eto hoe zanakalahin’i Mahôla dia mety midika koa hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpandihy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '; koa niely tamin’ny firenena rehetra manodidina ny lazany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Namoaka ohabolana telo arivo izy sady namoron-kira 1 005
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ohabolana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Ohab 1.1; 10.1; 25.1. –
      - type: usfm
        marker: bd
        children:
        - type: text
          text: hira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Ton 1.1.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Niteny momba ny karazan-kazo izy, manomboka amin’ny hazo sederan’i Libano ka hatramin’ny hisôpa izay maniry eny am-bodirindrina; niteny momba ny biby koa izy, dia ny vorona sy ny biby mandady ary koa ny trondro. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nisy olona maro tonga hihaino ny fahendren’i Salômôna, dia olona avy tamin’ny firenena rehetra ary koa avy tamin’ny mpanjaka rehetra eto an-tany izay efa nandre ny amin’ny fahendreny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Salômôna manomana ny fanorenana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 2.2-15)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary i Hirama mpanjakan’i Tiro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hirama: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia mpanjakan’ny faritanin’i Tiro sy i Tsidôna (Tsora sy Tsaidà ankehitriny izay any Libano); jereo 5.20 sy nta. –Amin’ny dkt sasany ny and 15-32 dia nalahatra 1-18 (jereo 5.1 sy nta).
      marker-yv: yv-n
    - type: text
      text: ' dia sakaizan’i Davida hatramin’ny ela. Nanirahany solotena i Salômôna, satria reny fa voahosotra ho mpanjaka handimby an’i Davida rainy izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary i Salômôna naniraka olona hilaza amin’i Hirama hoe:'
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '–Fantatrao fa i Davida raiko dia tsy mba nahavita trano ho voninahitry ny TOMPO Andriamaniny, satria tsy nitsaha-nanafika azy hatraiza hatraiza ny fahavalo rehetra manodidina raha tsy ny TOMPO no nampilavolefona ireo. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa ankehitriny ny TOMPO Andriamanitro efa nahatonga fandriampahalemana ho ahy eo amin’ny sisintaniko rehetra mba tsy hisian’ny fahavalo na loza hatahorako intsony. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ka indro mikasa hanao trano ho voninahitry ny TOMPO Andriamanitro aho, dia araka ilay nolazain’ny TOMPO tamin’i Davida raiko hoe: «Ny zanakao izay hapetrako eo amin’ny sezafiandriananao handimby anao, no hanao ny trano ho voninahitro'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Sam 7.12-13; 1 Tan 17.11-12.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny fihinan’i Salômôna sy ireo olona tao an-dapa isan’andro dia toy izao: lafarinina tsotra sivy taonina, lafarinina tsara toto 18 taonina, '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Koa mamoaha didy ianao mba hisy mpiasanao hikapa hazo sedera ho ahy any Libano. Hiaraka hankany ny mpiasanao sy ny mpiasako, ka ny karaman’ny mpiasanao dia homeko anao manontolo araka izay hotononinao, satria fantatrao fa tsy mba misy olona mahay mikapa hazo toy ny Fenisianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Fenisianina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tsidônianina.
      marker-yv: yv-n
    - type: text
      text: atỳ aminay.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Faly aoka izany i Hirama raha vao nandre ny tenin’i Salômôna, ka nanao hoe: «Ankehitriny dia hisaorana anie ny TOMPO noho ny nanomezany zanakalahy hendry an’i Davida mba hanjaka amin’izao vahoaka marobe izao!» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nandefa izao valinteny izao ho an’i Salômôna i Hirama nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Voaraiko tsara ny hafatrao; koa dia homeko anao avokoa izay hazo sedera sy kipreso rehetra ilainao. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny mpiasako no hitondra ireo avy any an-tendrombohitra Libano hankany an-dranomasina; dia hasaiko fehezina ho zahatra sy hatsinkafona ambony rano halefa amin’ny toerana izay hotondroinao, ary any vao hampamahako ka hampanalainao. Ho setrin’izany kosa anefa dia homenao ahy ny sakafo ilaiko hamatsiana ny fianakaviako.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nomen’i Hirama an’i Salômôna ny hazo sedera sy ny hazo kipreso rehetra izay nilainy; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ary i Salômôna kosa, ho setrin’izany, dia namatsy varimbazaha enina arivo taonina sy menak’ôliva madio valo arivo litatra isan-taona ny fianakavian’i Hirama.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary ny TOMPO nanome fahendrena an’i Salômôna, araka ny efa nampanantenainy azy. Nandrindra fihavanana i Hirama sy i Salômôna ka dia nanao fifanekena izy roa lahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanangana asa an-terivozona i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 1.18; 2.1, 16-17)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nanangana asa an-terivozona i Salômôna mpanjaka, ka Israelita 30 000 no nalainy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nalefany nifambimby nankany Libano ireo, izany hoe 10 000 no indray milatsaka isam-bolana, ka iray volana izy tany Libano ary roa volana kosa tany an-tranony. I Adônirama no mpifehy azy rehetra ireo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Nanana mpitondra entana 70 000 koa i Salômôna ary tambato 80 000 izay niasa tany an-tendrombohitra, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: omby mifahy folo, omby an-tondraka roapolo ary ondry zato, afa-tsy ny biby hafa toy ny diera sy ny gazela ary ny osy mbamin’ny gisa matavy.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'afa-tsy ny lehiben’ny mpiasa 3 300 notendren’i Salômôna hibaiko ny fanatanterahan-draharaha. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Mba hananganana ny fototry ny tempoly, dia nandidy hampaka vato vaventy sady voapaika ny mpanjaka. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ny mpiasan’i Salômôna sy i Hirama ary ny manam-pahaizana avy any Biblôsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Biblôsy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gebala
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tanàna 30 km avaratry ny tanànan’i Beiroty ankehitriny.'
      marker-yv: yv-n
    - type: text
      text: ' no nipaika ny vato sy nanamboatra ny hazo hanaovana ny tempoly.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa nanapaka ny faritany manontolo any atsimo andrefan’ny ony Eofrata, hatreo Tifsà ka hatrany Gazà i Salômôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tifsà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toerana eo amin’ny morony andrefan’ny ony Eofrata, 80 km atsinanan’ny tanànan’i Alepa (Siria) ankehitriny; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gazà:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tanàna filistinina ao amin’ny lemaka amorontsirak’i Mediteranea, ao atsimon’ny fanjakan’i Salômôna.'
      marker-yv: yv-n
    - type: text
      text: ', dia tamin’ny mpanjaka rehetra tatỳ atsimo andrefan’ny Ony; ary tsara fihavanana tamin’ireo firenena rehetra nanodidina azy izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary nandry feizay i Joda sy i Israely tamin’ny andro rehetra niainan’i Salômôna; fa samy niadam-pinaritra teo anivon’ny voalobony sy ny aviaviny ny olona hatreo Dana ka hatrany Beera-Seba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Sam 3.10 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I Salômôna dia nanana tranon-tsoavaly afaka mandray soavaly 40 000 mpitarika kalesy ary koa nanana mpitaingin-tsoavaly 12 000
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jereo 10.26, 2 Tan 1.14; 9.25 '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –mpitaingin-tsoavaly
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: soavaly.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ireo governora ireo no namatsy isam-bolana an’i Salômôna mpanjaka sy izay navela hiray latabatra aminy, ka tsy navelany ho nisy zavatra tsy ampy na inona izany na inona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny ôrza sy ny mololo ho an’ny soavaly rehetra dia nentin’ny governora teo amin’ny toerana nisy ny mpanjaka, samy araka ny baiko azony avy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahendren’i Salômôna
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nomen’Andriamanitra fahendrena fatratra sy saina mahiratra tokoa i Salomôna; ary ny zavatra noeritreretiny dia maro toy ny fasika amoron-dranomasina. '
