document_id: 1KI.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ary i Salômôna nanapaka tamin’ny fanjakana rehetra hatreo amin’ny ony Eofrata ka mipaka any amin’ny tanin’ny Filistinina ary hatrany amin’ny sisintanin’i Ejipta
  - type: note
    content: Ampit Gen 15.18; 2 Tan 9.26. –Amin’ny dkt sasany, ny 5.1-14 etoana dia voalahatra ho 4.21-34.
  - type: text
    content: ; fa nandoa hetra ireo ka nanompo an’i Salômôna tamin’ny andro rehetra niainany.
  '10':
  - type: text
    content: Izany fahendren’i Salômôna izany dia nihoatra noho ny an’ny olon-kendry rehetra tany Atsinanana
  - type: note
    content: 'Atsinanana: izany hoe Arabia sy Mezôpôtamia...'
  - type: text
    content: ' sy tany Ejipta. '
  '11':
  - type: text
    content: Hendry noho ny olon-drehetra izy fa nihoarany avokoa na i Etàna ilay Ezrahita, na i Hemàna, na i Kalkôla, na i Dardà zanakalahin’i Mahôla
  - type: note
    content: 'Etàna ilay Ezrahita: jereo Sal 89.1 –Mahôla: olona tsy fantatra. Io teny io anefa, mety hilazana anaran-dihy (jereo Sal 30.12; Eks 15.20); koa ny voadika eto hoe zanakalahin’i Mahôla dia mety midika koa hoe mpandihy.'
  - type: text
    content: '; koa niely tamin’ny firenena rehetra manodidina ny lazany. '
  '12':
  - type: text
    content: Namoaka ohabolana telo arivo izy sady namoron-kira 1 005
  - type: note
    content: 'Ohabolana: jereo Ohab 1.1; 10.1; 25.1. –hira: jereo Ton 1.1.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Niteny momba ny karazan-kazo izy, manomboka amin’ny hazo sederan’i Libano ka hatramin’ny hisôpa izay maniry eny am-bodirindrina; niteny momba ny biby koa izy, dia ny vorona sy ny biby mandady ary koa ny trondro. '
  '14':
  - type: text
    content: Nisy olona maro tonga hihaino ny fahendren’i Salômôna, dia olona avy tamin’ny firenena rehetra ary koa avy tamin’ny mpanjaka rehetra eto an-tany izay efa nandre ny amin’ny fahendreny.
  - type: heading
    content: I Salômôna manomana ny fanorenana ny tempoly
  - type: heading
    content: (Jereo 2 Tan 2.2-15)
  '15':
  - type: text
    content: Ary i Hirama mpanjakan’i Tiro
  - type: note
    content: 'Hirama: dia mpanjakan’ny faritanin’i Tiro sy i Tsidôna (Tsora sy Tsaidà ankehitriny izay any Libano); jereo 5.20 sy nta. –Amin’ny dkt sasany ny and 15-32 dia nalahatra 1-18 (jereo 5.1 sy nta).'
  - type: text
    content: ' dia sakaizan’i Davida hatramin’ny ela. Nanirahany solotena i Salômôna, satria reny fa voahosotra ho mpanjaka handimby an’i Davida rainy izy. '
  '16':
  - type: text
    content: 'Ary i Salômôna naniraka olona hilaza amin’i Hirama hoe:'
  '17':
  - type: text
    content: '–Fantatrao fa i Davida raiko dia tsy mba nahavita trano ho voninahitry ny TOMPO Andriamaniny, satria tsy nitsaha-nanafika azy hatraiza hatraiza ny fahavalo rehetra manodidina raha tsy ny TOMPO no nampilavolefona ireo. '
  '18':
  - type: text
    content: 'Fa ankehitriny ny TOMPO Andriamanitro efa nahatonga fandriampahalemana ho ahy eo amin’ny sisintaniko rehetra mba tsy hisian’ny fahavalo na loza hatahorako intsony. '
  '19':
  - type: text
    content: 'Ka indro mikasa hanao trano ho voninahitry ny TOMPO Andriamanitro aho, dia araka ilay nolazain’ny TOMPO tamin’i Davida raiko hoe: «Ny zanakao izay hapetrako eo amin’ny sezafiandriananao handimby anao, no hanao ny trano ho voninahitro'
  - type: note
    content: Jereo 2 Sam 7.12-13; 1 Tan 17.11-12.
  - type: text
    content: '.» '
  '2':
  - type: text
    content: 'Ny fihinan’i Salômôna sy ireo olona tao an-dapa isan’andro dia toy izao: lafarinina tsotra sivy taonina, lafarinina tsara toto 18 taonina, '
  '20':
  - type: text
    content: Koa mamoaha didy ianao mba hisy mpiasanao hikapa hazo sedera ho ahy any Libano. Hiaraka hankany ny mpiasanao sy ny mpiasako, ka ny karaman’ny mpiasanao dia homeko anao manontolo araka izay hotononinao, satria fantatrao fa tsy mba misy olona mahay mikapa hazo toy ny Fenisianina
  - type: note
    content: 'Fenisianina: dkt hafa Tsidônianina.'
  - type: text
    content: atỳ aminay.
  '21':
  - type: text
    content: 'Faly aoka izany i Hirama raha vao nandre ny tenin’i Salômôna, ka nanao hoe: «Ankehitriny dia hisaorana anie ny TOMPO noho ny nanomezany zanakalahy hendry an’i Davida mba hanjaka amin’izao vahoaka marobe izao!» '
  '22':
  - type: text
    content: 'Dia nandefa izao valinteny izao ho an’i Salômôna i Hirama nanao hoe:'
  - type: text
    content: '–Voaraiko tsara ny hafatrao; koa dia homeko anao avokoa izay hazo sedera sy kipreso rehetra ilainao. '
  '23':
  - type: text
    content: Ny mpiasako no hitondra ireo avy any an-tendrombohitra Libano hankany an-dranomasina; dia hasaiko fehezina ho zahatra sy hatsinkafona ambony rano halefa amin’ny toerana izay hotondroinao, ary any vao hampamahako ka hampanalainao. Ho setrin’izany kosa anefa dia homenao ahy ny sakafo ilaiko hamatsiana ny fianakaviako.
  '24':
  - type: text
    content: 'Dia nomen’i Hirama an’i Salômôna ny hazo sedera sy ny hazo kipreso rehetra izay nilainy; '
  '25':
  - type: text
    content: ary i Salômôna kosa, ho setrin’izany, dia namatsy varimbazaha enina arivo taonina sy menak’ôliva madio valo arivo litatra isan-taona ny fianakavian’i Hirama.
  '26':
  - type: text
    content: Ary ny TOMPO nanome fahendrena an’i Salômôna, araka ny efa nampanantenainy azy. Nandrindra fihavanana i Hirama sy i Salômôna ka dia nanao fifanekena izy roa lahy.
  - type: heading
    content: Nanangana asa an-terivozona i Salômôna
  - type: heading
    content: (Jereo 2 Tan 1.18; 2.1, 16-17)
  '27':
  - type: text
    content: 'Nanangana asa an-terivozona i Salômôna mpanjaka, ka Israelita 30 000 no nalainy. '
  '28':
  - type: text
    content: 'Nalefany nifambimby nankany Libano ireo, izany hoe 10 000 no indray milatsaka isam-bolana, ka iray volana izy tany Libano ary roa volana kosa tany an-tranony. I Adônirama no mpifehy azy rehetra ireo. '
  '29':
  - type: text
    content: 'Nanana mpitondra entana 70 000 koa i Salômôna ary tambato 80 000 izay niasa tany an-tendrombohitra, '
  '3':
  - type: text
    content: omby mifahy folo, omby an-tondraka roapolo ary ondry zato, afa-tsy ny biby hafa toy ny diera sy ny gazela ary ny osy mbamin’ny gisa matavy.
  '30':
  - type: text
    content: 'afa-tsy ny lehiben’ny mpiasa 3 300 notendren’i Salômôna hibaiko ny fanatanterahan-draharaha. '
  '31':
  - type: text
    content: 'Mba hananganana ny fototry ny tempoly, dia nandidy hampaka vato vaventy sady voapaika ny mpanjaka. '
  '32':
  - type: text
    content: Ny mpiasan’i Salômôna sy i Hirama ary ny manam-pahaizana avy any Biblôsy
  - type: note
    content: 'Biblôsy na Gebala: tanàna 30 km avaratry ny tanànan’i Beiroty ankehitriny.'
  - type: text
    content: ' no nipaika ny vato sy nanamboatra ny hazo hanaovana ny tempoly.'
  '4':
  - type: text
    content: Fa nanapaka ny faritany manontolo any atsimo andrefan’ny ony Eofrata, hatreo Tifsà ka hatrany Gazà i Salômôna
  - type: note
    content: 'Tifsà: toerana eo amin’ny morony andrefan’ny ony Eofrata, 80 km atsinanan’ny tanànan’i Alepa (Siria) ankehitriny; Gazà: tanàna filistinina ao amin’ny lemaka amorontsirak’i Mediteranea, ao atsimon’ny fanjakan’i Salômôna.'
  - type: text
    content: ', dia tamin’ny mpanjaka rehetra tatỳ atsimo andrefan’ny Ony; ary tsara fihavanana tamin’ireo firenena rehetra nanodidina azy izy. '
  '5':
  - type: text
    content: Ary nandry feizay i Joda sy i Israely tamin’ny andro rehetra niainan’i Salômôna; fa samy niadam-pinaritra teo anivon’ny voalobony sy ny aviaviny ny olona hatreo Dana ka hatrany Beera-Seba
  - type: note
    content: Jereo 2 Sam 3.10 sy nta.
  - type: text
    content: .
  '6':
  - type: text
    content: I Salômôna dia nanana tranon-tsoavaly afaka mandray soavaly 40 000 mpitarika kalesy ary koa nanana mpitaingin-tsoavaly 12 000
  - type: note
    content: Jereo 10.26, 2 Tan 1.14; 9.25 –mpitaingin-tsoavaly na soavaly.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Ireo governora ireo no namatsy isam-bolana an’i Salômôna mpanjaka sy izay navela hiray latabatra aminy, ka tsy navelany ho nisy zavatra tsy ampy na inona izany na inona. '
  '8':
  - type: text
    content: Ny ôrza sy ny mololo ho an’ny soavaly rehetra dia nentin’ny governora teo amin’ny toerana nisy ny mpanjaka, samy araka ny baiko azony avy.
  - type: heading
    content: Ny fahendren’i Salômôna
  '9':
  - type: text
    content: 'Nomen’Andriamanitra fahendrena fatratra sy saina mahiratra tokoa i Salomôna; ary ny zavatra noeritreretiny dia maro toy ny fasika amoron-dranomasina. '
