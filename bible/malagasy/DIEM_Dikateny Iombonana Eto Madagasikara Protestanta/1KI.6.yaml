document_id: 1KI.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanaovana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 3.1-14)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taona faha-480 taorian’ny nialan’ny Israelita tany Ejipta, izany hoe ny taona fahefatra nanjakàn’i Salômôna tamin’i Israely, fony volana Ziva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ziva: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
      marker-yv: yv-n
    - type: text
      text: ' na volana faharoa no nanombohany nanorina ny tranon’ny TOMPO.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny paosin-trano natao manodidina dia mirefy roa metatra sy sasany ny haavony isaky ny rihana, ary hazo sedera no nanakambanany azy tamin’ny rindrin’ny tempoly.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy tenin’ny TOMPO tamin’i Salômôna nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manao izao tempoly izao ho Ahy ianao; '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'koa raha mizotra araka ny lalànako ianao sy manaraka ny fitsipiko ary mitandrina ny didiko rehetra, dia hotanterahiko aminao ny fampanantenana izay nataoko tamin’i Davida rainao; '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: honina ao amin’ny tempoly eto anivon’ny Israelita Aho ary tsy hahafoy ilay Israely vahoakako.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandravahana ny atin’ny tempoly
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vitan’i Salômôna ny asa fananganana ny tempoly, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia norakofany hazo sedera ny rindrina anatiny hatreo ambany ka hatrany ambony; ary hazo fisaka kipreso no nataony gorodona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Norakofana hazo sedera mirefy folo metatra hatreo ambany ka hatrany ambony koa ny rindrin’ilay efitrano anatiny; ka ny atin’io efitrano io dia namboarina ho efitra voatokana izay nantsoina hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina Indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Toeramasina indrindra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Eks 26.33-34.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efitrano malalaka
    - type: text
      text: ' teo anoloan’io efitra voatokana io kosa dia nirefy roapolo metatra ny lavany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hazo sedera izay tao anatin’ny tempoly dia voaravaka asa sokitra misarim-boatango sy voninkazo mivelatra; vita tamin’ny sedera avokoa izany ka tsy nisy mihitsy vato niseho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo amin’ny faritra afovoan’ny tempoly dia namboarana efitrano iray hametrahana ilay Vatamasina mirakitra ny fanekempihavanan’ny TOMPO. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny trano izay nataon’i Salômôna mpanjaka ho an’ny TOMPO dia nirefy telopolo metatra ny lavany, folo metatra ny sakany ary 15 metatra ny haavony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efamira io efitrano io ka samy nirefy folo metatra ny lafiny rehetra ary folo metatra koa ny haavony. Nopetahan’i Salômôna takela-bolamena tsara sady madio ny atin’io efitrano io ary koa ny atin’ny tempoly manontolo. Teo amin’ny fidirana mankao amin’io efitrano io dia nasiana rojo volamena hisakana ary nametrahana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' hazo sedera nopetahana takela-bolamena. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, nopetahana takela-bolamena toy izany ny tempoly manontolo ary koa ny alitara manontolo teo akaikin’ny fidirana mankao amin’ny efitrano misy ny Vatamasina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 30.1-3. Ny alitara fandoroana vovo-javamanitra no lazaina eto (and 21, 22)
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao amin’io efitrano misy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina
    - type: text
      text: ' io dia namboarana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' roa vita tamin’ny hazo ôliva izay samy nirefy dimy metatra ny haavony. Ny voalohany dia nanana elatra roa metatra sy sasany ny halavany, izany hoe dimy metatra no elanelan’ny tendron’elatra anankiroa. Ny faharoa koa dia nirefy dimy metatra, ary nitovy refy sy bika tamin’ilay voalohany ihany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Napetraka teo afovoan’ny efitrano misy ny Vatamasina ny kerobima; ary natao mivelatra ny elany, ka ny ilany samy nipaka tamin’ny rindrina an-kilany sy an-daniny avy, ary ny elatra roa hafa kosa dia nifanendry teo afovoan’ny efitrano. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nopetahana takela-bolamena ireo kerobima roa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 23-28: ampit Eks 25.18-20.'
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny rindrina manodidina, na teo amin’ny efitrano anatiny na teo amin’ny efitrano malalaka, dia nisokirana sarina kerobima sy hazo rofia ary voninkazo mivelatra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lalantsara fidirana, izay teo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efitrano malalaka
    - type: text
      text: ' amin’ny tempoly dia nirefy folo metatra toy ny sakan’ny tempoly ihany ary dimy metatra ny lafiny miditra ho amin’io efitrano io. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nopetahana takela-bolamena ny gorodona, na teo amin’ny efitrano anatiny na teo amin’ny efitrano malalaka.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nasiana varavarana kopa-droa vita tamin’ny hazo ôliva ny mankao amin’ny efitrano misy ny Vatamasina, ka ny tataony sy ny tolàny dia ampahadimin’ny sakan’ny tempoly. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lela-varavarana kopa-droa vita tamin’ny hazo ôliva dia nisokirana sarina kerobima sy hazo rofia ary voninkazo mivelatra, izay samy nopetahana takela-bolamena; ka nokaliana ny fametahana izany tamin’ny kerobima sy ny hazo rofia. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany koa no nanaovana ny varavarana mankao amin’ny atitrano lehibe fa nasiana tolàna hazo ôliva ampahefatry ny sakan’ny tempoly; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny lela-varavarana kopa-droa dia hazo kipreso izay samy noravahana mason-drojo roa voasokitra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisokirana sarina kerobima sy hazon-drofia ary voninkazo mivelatra teo, ary dia nopetahana volamena ny faritra voasokitra.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nohodidinina rindrim-bato voapaika telo andalana mifanongoa sy rairainy sedera iray andalana ny kianja anatiny.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahefatra nanjakàn’i Salômôna, fony volana Ziva, no nametrahana ny fototry ny tranon’ny TOMPO. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tamin’ny taona faha-11, fony volana Bola
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bola: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
      marker-yv: yv-n
    - type: text
      text: ' na volana faha-8, no nahavitan’izany an-tsakany sy an-davany tamin’ny fombany rehetra.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fito taona no nanaovan’i Salômôna azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Teo amin’ny rindrin’ny tempoly dia nisy ireo varavarankely nametahana fefy makarakara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fefy makarakara: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mety ho takela-bato voalavadavaka mba hidiran’ny rivotra ao an-trano sady haingony rahateo ihany koa.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natsangana ny paosin-trano misy rihana roa izay niankina tamin’ny rindrina ivelan’ny efitrano malalaka sy ny efitrano anatiny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ambany rihan’ny paosin-trano dia nirefy roa metatra sy sasany ny sakany, ny rihana voalohany dia nirefy telo metatra ny sakany ary ny rihina faharoa dia mirefy telo metatra sy sasany ny sakany. Tsy mitovy manko ny hatevin’ny rindrina ivelan’ny tempoly isaky ny rihana mifanongoa, mba tsy haninteraka ny rindrin’ny tempoly ireo sakamandimbin’ny paosin-trano. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny fanaovana ny tempoly, dia vato voapaika avy tany amin’ny fihadiam-bato no nampiasaina, hany ka tsy nandrenesana feon-tantanana na fandraka na fiasana vy hafa tao amin’ny tempoly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaky ny rihan’ny paosin-trano, ny rindrin’ny tempoly dia andatsahana 50 sm ny hateviny, ka izany no nipetrahan’ireo sakamandimbin’ny paosin-trano.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny varavarana mankamin’ny ambany rihana dia teo amin’ny lafy atsimon’ny tempoly; tohatra miolikolika no niakarana hankamin’ny rihana voalohany; tahaka izany koa no niakarana hankamin’ny rihana faharoa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mba hamitana ny fananganana ny tempoly, dia napetaka ny valin-tafo izay nasiana sakamandimby sy hazo fisaka sedera. '
