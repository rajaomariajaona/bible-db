document_id: 1KI.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanaovana ny tempoly
  - type: heading
    content: (Jereo 2 Tan 3.1-14)
  - type: text
    content: Tamin’ny taona faha-480 taorian’ny nialan’ny Israelita tany Ejipta, izany hoe ny taona fahefatra nanjakàn’i Salômôna tamin’i Israely, fony volana Ziva
  - type: note
    content: 'Ziva: jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
  - type: text
    content: ' na volana faharoa no nanombohany nanorina ny tranon’ny TOMPO.'
  '10':
  - type: text
    content: Ary ny paosin-trano natao manodidina dia mirefy roa metatra sy sasany ny haavony isaky ny rihana, ary hazo sedera no nanakambanany azy tamin’ny rindrin’ny tempoly.
  '11':
  - type: text
    content: 'Dia nisy tenin’ny TOMPO tamin’i Salômôna nanao hoe:'
  - type: text
    content: '–Manao izao tempoly izao ho Ahy ianao; '
  '12':
  - type: text
    content: 'koa raha mizotra araka ny lalànako ianao sy manaraka ny fitsipiko ary mitandrina ny didiko rehetra, dia hotanterahiko aminao ny fampanantenana izay nataoko tamin’i Davida rainao; '
  '13':
  - type: text
    content: honina ao amin’ny tempoly eto anivon’ny Israelita Aho ary tsy hahafoy ilay Israely vahoakako.
  - type: heading
    content: Ny fandravahana ny atin’ny tempoly
  '14':
  - type: text
    content: 'Rehefa vitan’i Salômôna ny asa fananganana ny tempoly, '
  '15':
  - type: text
    content: 'dia norakofany hazo sedera ny rindrina anatiny hatreo ambany ka hatrany ambony; ary hazo fisaka kipreso no nataony gorodona. '
  '16':
  - type: text
    content: 'Norakofana hazo sedera mirefy folo metatra hatreo ambany ka hatrany ambony koa ny rindrin’ilay efitrano anatiny; ka ny atin’io efitrano io dia namboarina ho efitra voatokana izay nantsoina hoe '
  - type: text
    content: Toeramasina Indrindra
  - type: note
    content: 'Toeramasina indrindra: ampit Eks 26.33-34.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ilay '
  - type: text
    content: efitrano malalaka
  - type: text
    content: ' teo anoloan’io efitra voatokana io kosa dia nirefy roapolo metatra ny lavany. '
  '18':
  - type: text
    content: 'Ny hazo sedera izay tao anatin’ny tempoly dia voaravaka asa sokitra misarim-boatango sy voninkazo mivelatra; vita tamin’ny sedera avokoa izany ka tsy nisy mihitsy vato niseho. '
  '19':
  - type: text
    content: 'Teo amin’ny faritra afovoan’ny tempoly dia namboarana efitrano iray hametrahana ilay Vatamasina mirakitra ny fanekempihavanan’ny TOMPO. '
  '2':
  - type: text
    content: 'Ary ny trano izay nataon’i Salômôna mpanjaka ho an’ny TOMPO dia nirefy telopolo metatra ny lavany, folo metatra ny sakany ary 15 metatra ny haavony. '
  '20':
  - type: text
    content: 'Efamira io efitrano io ka samy nirefy folo metatra ny lafiny rehetra ary folo metatra koa ny haavony. Nopetahan’i Salômôna takela-bolamena tsara sady madio ny atin’io efitrano io ary koa ny atin’ny tempoly manontolo. Teo amin’ny fidirana mankao amin’io efitrano io dia nasiana rojo volamena hisakana ary nametrahana '
  - type: text
    content: alitara
  - type: text
    content: ' hazo sedera nopetahana takela-bolamena. '
  '22':
  - type: text
    content: Eny, nopetahana takela-bolamena toy izany ny tempoly manontolo ary koa ny alitara manontolo teo akaikin’ny fidirana mankao amin’ny efitrano misy ny Vatamasina
  - type: note
    content: Ampit Eks 30.1-3. Ny alitara fandoroana vovo-javamanitra no lazaina eto (and 21, 22)
  - type: text
    content: .
  '23':
  - type: text
    content: 'Tao amin’io efitrano misy ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' io dia namboarana '
  - type: text
    content: kerobima
  - type: text
    content: ' roa vita tamin’ny hazo ôliva izay samy nirefy dimy metatra ny haavony. Ny voalohany dia nanana elatra roa metatra sy sasany ny halavany, izany hoe dimy metatra no elanelan’ny tendron’elatra anankiroa. Ny faharoa koa dia nirefy dimy metatra, ary nitovy refy sy bika tamin’ilay voalohany ihany. '
  '27':
  - type: text
    content: 'Napetraka teo afovoan’ny efitrano misy ny Vatamasina ny kerobima; ary natao mivelatra ny elany, ka ny ilany samy nipaka tamin’ny rindrina an-kilany sy an-daniny avy, ary ny elatra roa hafa kosa dia nifanendry teo afovoan’ny efitrano. '
  '28':
  - type: text
    content: Nopetahana takela-bolamena ireo kerobima roa
  - type: note
    content: 'And 23-28: ampit Eks 25.18-20.'
  - type: text
    content: .
  '29':
  - type: text
    content: 'Ny rindrina manodidina, na teo amin’ny efitrano anatiny na teo amin’ny efitrano malalaka, dia nisokirana sarina kerobima sy hazo rofia ary voninkazo mivelatra. '
  '3':
  - type: text
    content: 'Ny lalantsara fidirana, izay teo anoloan’ny '
  - type: text
    content: efitrano malalaka
  - type: text
    content: ' amin’ny tempoly dia nirefy folo metatra toy ny sakan’ny tempoly ihany ary dimy metatra ny lafiny miditra ho amin’io efitrano io. '
  '30':
  - type: text
    content: Ary nopetahana takela-bolamena ny gorodona, na teo amin’ny efitrano anatiny na teo amin’ny efitrano malalaka.
  '31':
  - type: text
    content: 'Nasiana varavarana kopa-droa vita tamin’ny hazo ôliva ny mankao amin’ny efitrano misy ny Vatamasina, ka ny tataony sy ny tolàny dia ampahadimin’ny sakan’ny tempoly. '
  '32':
  - type: text
    content: 'Ny lela-varavarana kopa-droa vita tamin’ny hazo ôliva dia nisokirana sarina kerobima sy hazo rofia ary voninkazo mivelatra, izay samy nopetahana takela-bolamena; ka nokaliana ny fametahana izany tamin’ny kerobima sy ny hazo rofia. '
  '33':
  - type: text
    content: 'Toy izany koa no nanaovana ny varavarana mankao amin’ny atitrano lehibe fa nasiana tolàna hazo ôliva ampahefatry ny sakan’ny tempoly; '
  '34':
  - type: text
    content: 'ny lela-varavarana kopa-droa dia hazo kipreso izay samy noravahana mason-drojo roa voasokitra. '
  '35':
  - type: text
    content: Nisokirana sarina kerobima sy hazon-drofia ary voninkazo mivelatra teo, ary dia nopetahana volamena ny faritra voasokitra.
  '36':
  - type: text
    content: Ary nohodidinina rindrim-bato voapaika telo andalana mifanongoa sy rairainy sedera iray andalana ny kianja anatiny.
  '37':
  - type: text
    content: 'Tamin’ny taona fahefatra nanjakàn’i Salômôna, fony volana Ziva, no nametrahana ny fototry ny tranon’ny TOMPO. '
  '38':
  - type: text
    content: Ary tamin’ny taona faha-11, fony volana Bola
  - type: note
    content: 'Bola: jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
  - type: text
    content: ' na volana faha-8, no nahavitan’izany an-tsakany sy an-davany tamin’ny fombany rehetra.'
  - type: text
    content: Fito taona no nanaovan’i Salômôna azy.
  '4':
  - type: text
    content: Teo amin’ny rindrin’ny tempoly dia nisy ireo varavarankely nametahana fefy makarakara
  - type: note
    content: 'fefy makarakara: mety ho takela-bato voalavadavaka mba hidiran’ny rivotra ao an-trano sady haingony rahateo ihany koa.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Natsangana ny paosin-trano misy rihana roa izay niankina tamin’ny rindrina ivelan’ny efitrano malalaka sy ny efitrano anatiny. '
  '6':
  - type: text
    content: 'Ny ambany rihan’ny paosin-trano dia nirefy roa metatra sy sasany ny sakany, ny rihana voalohany dia nirefy telo metatra ny sakany ary ny rihina faharoa dia mirefy telo metatra sy sasany ny sakany. Tsy mitovy manko ny hatevin’ny rindrina ivelan’ny tempoly isaky ny rihana mifanongoa, mba tsy haninteraka ny rindrin’ny tempoly ireo sakamandimbin’ny paosin-trano. '
  '7':
  - type: text
    content: Tamin’ny fanaovana ny tempoly, dia vato voapaika avy tany amin’ny fihadiam-bato no nampiasaina, hany ka tsy nandrenesana feon-tantanana na fandraka na fiasana vy hafa tao amin’ny tempoly
  - type: note
    content: Isaky ny rihan’ny paosin-trano, ny rindrin’ny tempoly dia andatsahana 50 sm ny hateviny, ka izany no nipetrahan’ireo sakamandimbin’ny paosin-trano.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ny varavarana mankamin’ny ambany rihana dia teo amin’ny lafy atsimon’ny tempoly; tohatra miolikolika no niakarana hankamin’ny rihana voalohany; tahaka izany koa no niakarana hankamin’ny rihana faharoa. '
  '9':
  - type: text
    content: 'Mba hamitana ny fananganana ny tempoly, dia napetaka ny valin-tafo izay nasiana sakamandimby sy hazo fisaka sedera. '
