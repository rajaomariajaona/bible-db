document_id: PSA.71,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Aza ariana aho, nony antitra
  - type: text
    content: TOMPO ô, Ianao no fialofako
  - type: text
    content: ka tsy ho diso fanantenana
  - type: text
    content: na oviana na oviana aho!
  '10':
  - type: text
    content: Fa miresaka ahy ny fahavaloko,
  - type: text
    content: miara-mioko mikendry ny hahafaty ahy.
  '11':
  - type: text
    content: 'Hoy ireo hoe: «Nafoin’Andriamanitra io'
  - type: text
    content: ka enjeho; sambory fa tsy misy mpanafaka.»
  '12':
  - type: text
    content: Andriamanitro ô, aza manalavitra ahy;
  - type: text
    content: Andriamanitra ô, faingàna re hamonjy.
  '13':
  - type: text
    content: Ho menatra sy ho afa-baràka anie
  - type: text
    content: ireo olona mpiampanga ahy;
  - type: text
    content: ho voatevateva sy ho very haja anie
  - type: text
    content: ireo olona mitady hanisy ratsy ahy!
  '14':
  - type: text
    content: Izaho kosa hanantena Anao lalandava,
  - type: text
    content: ary hampitombo ny fiderana Anao;
  '15':
  - type: text
    content: isan’andro no hitanisan’ny vavako
  - type: text
    content: ny fahamarinanao sy ny famonjenao,
  - type: text
    content: na tsy voaisako avokoa aza ireny.
  '16':
  - type: text
    content: Tompo ANDRIANANAHARY ô, hiditra ao an-tranonao aho,
  - type: text
    content: satria Ianao nirotsaka an-tsehatra nomba ahy;
  - type: text
    content: ary dia ny fahamarinanao irery no hotsahiviko.
  '17':
  - type: text
    content: Hatry ny fony aho mbola tanora
  - type: text
    content: no efa nampianarinao, Andriamanitra ô;
  - type: text
    content: ary mandraka izao dia tsy mitsahatra
  - type: text
    content: manambara ireo asanao mahagaga.
  '18':
  - type: text
    content: Antitra sy fotsy volo aho ankehitriny,
  - type: text
    content: nefa aza afoy, Andriamanitra ô;
  - type: text
    content: enga anie aho ho afaka hanambara
  - type: text
    content: ny asanao mahery vaika sy mahomby
  - type: text
    content: amin’ireo tanora sy ny taranaka manaraka!
  '19':
  - type: text
    content: Ambony dia ambony tokoa
  - type: text
    content: ny fahamarinanao, Andriamanitra ô;
  - type: text
    content: ary nahavita zava-baventy Ianao!
  - type: text
    content: Tsy misy toa Anao, Andriamanitra ô.
  '2':
  - type: text
    content: Noho ny fahamarinanao
  - type: text
    content: dia afaho sy ambeno aho,
  - type: text
    content: anongilano sofina ka vonjeo.
  '20':
  - type: text
    content: Fahoriana be sady mafy
  - type: text
    content: no navelanao hihatra tamiko;
  - type: text
    content: kanefa hovelombelominao indray aho,
  - type: text
    content: ary hampiakarinao indray ho afaka
  - type: text
    content: amin’ny fasana mampihitsoka.
  '21':
  - type: text
    content: Dia mbola hampionona indray Ianao
  - type: text
    content: ary hamerina amiko ny voninahitro.
  '22':
  - type: text
    content: Izaho kosa hidera Anao amim-baliha
  - type: text
    content: noho ny toetranao mahatoky, ry Andriamanitro ô,
  - type: text
    content: sy hiredona salamo arahin-dokanga
  - type: text
    content: ho Anao, ry ilay Masin’i Israely.
  '23':
  - type: text
    content: Eny, hihorakoraka hihoby ho Anao aho
  - type: text
    content: sady hankalaza Anao amin-java-maneno,
  - type: text
    content: satria efa notsimbininao ny aiko.
  '24':
  - type: text
    content: Isan’andro no hitanisako ny fahamarinanao,
  - type: text
    content: satria efa menatra sy mangaihay
  - type: text
    content: ireo olona nitady hanisy ratsy ahy.
  '3':
  - type: text
    content: Aoka Ianao ho vatolampy miaro ahy
  - type: text
    content: sy ho manda ahitako famonjena
  - type: note
    content: Ampit Sal 31.3.
  - type: text
    content: '!'
  - type: text
    content: Ianao tokoa no harambato
  - type: text
    content: sady toera-mafy ho ahy.
  '4':
  - type: text
    content: Andriamanitro ô, ambeno re aho
  - type: text
    content: mba tsy ho azon’ireo olon-dratsy
  - type: text
    content: na ho voatanan’ny olo-meloka
  - type: text
    content: mbamin’ny mpanao an-keriny.
  '5':
  - type: text
    content: Fa Ianao no fanantenàko,
  - type: text
    content: ry Tompo ANDRIANANAHARY ô;
  - type: text
    content: Ianao no itokiako
  - type: text
    content: hatry ny fahakeliko.
  '6':
  - type: text
    content: Vao teraka aho, dia niantehitra taminao;
  - type: text
    content: mbola tany am-bohòka aho, efa mpiaro ahy Ianao.
  - type: text
    content: Ianao lalandava no fidèrako.
  '7':
  - type: text
    content: Toa zava-mahagaga ho an’ny maro aho,
  - type: text
    content: kanefa Ianao no fialofa-mafy ho ahy.
  '8':
  - type: text
    content: Ho feno fiderana Anao anie ny vavako
  - type: text
    content: ary ho feno fankalazana Anao isan’andro.
  '9':
  - type: text
    content: Aza arianao aho, nony antitra;
  - type: text
    content: aza afoy, rehefa lany hery.
