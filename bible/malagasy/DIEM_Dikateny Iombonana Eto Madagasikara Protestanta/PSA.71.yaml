document_id: PSA.71,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Aza ariana aho, nony antitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TOMPO ô, Ianao no fialofako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho diso fanantenana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na oviana na oviana aho!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa miresaka ahy ny fahavaloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miara-mioko mikendry ny hahafaty ahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy ireo hoe: «Nafoin’Andriamanitra io'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka enjeho; sambory fa tsy misy mpanafaka.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Andriamanitro ô, aza manalavitra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, faingàna re hamonjy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ho menatra sy ho afa-baràka anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo olona mpiampanga ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho voatevateva sy ho very haja anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo olona mitady hanisy ratsy ahy!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izaho kosa hanantena Anao lalandava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampitombo ny fiderana Anao;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: isan’andro no hitanisan’ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahamarinanao sy ny famonjenao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tsy voaisako avokoa aza ireny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tompo ANDRIANANAHARY ô, hiditra ao an-tranonao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao nirotsaka an-tsehatra nomba ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia ny fahamarinanao irery no hotsahiviko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hatry ny fony aho mbola tanora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa nampianarinao, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandraka izao dia tsy mitsahatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manambara ireo asanao mahagaga.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Antitra sy fotsy volo aho ankehitriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa aza afoy, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enga anie aho ho afaka hanambara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asanao mahery vaika sy mahomby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo tanora sy ny taranaka manaraka!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ambony dia ambony tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahamarinanao, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahavita zava-baventy Ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy toa Anao, Andriamanitra ô.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Noho ny fahamarinanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia afaho sy ambeno aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anongilano sofina ka vonjeo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fahoriana be sady mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no navelanao hihatra tamiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa hovelombelominao indray aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampiakarinao indray ho afaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fasana mampihitsoka.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia mbola hampionona indray Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamerina amiko ny voninahitro.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Izaho kosa hidera Anao amim-baliha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny toetranao mahatoky, ry Andriamanitro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hiredona salamo arahin-dokanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho Anao, ry ilay Masin’i Israely.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Eny, hihorakoraka hihoby ho Anao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hankalaza Anao amin-java-maneno,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa notsimbininao ny aiko.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Isan’andro no hitanisako ny fahamarinanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa menatra sy mangaihay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo olona nitady hanisy ratsy ahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aoka Ianao ho vatolampy miaro ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho manda ahitako famonjena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '71.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 31.3.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao tokoa no harambato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady toera-mafy ho ahy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Andriamanitro ô, ambeno re aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho azon’ireo olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho voatanan’ny olo-meloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny mpanao an-keriny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa Ianao no fanantenàko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Tompo ANDRIANANAHARY ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no itokiako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatry ny fahakeliko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Vao teraka aho, dia niantehitra taminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbola tany am-bohòka aho, efa mpiaro ahy Ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao lalandava no fidèrako.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Toa zava-mahagaga ho an’ny maro aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa Ianao no fialofa-mafy ho ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ho feno fiderana Anao anie ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho feno fankalazana Anao isan’andro.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza arianao aho, nony antitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza afoy, rehefa lany hery.
