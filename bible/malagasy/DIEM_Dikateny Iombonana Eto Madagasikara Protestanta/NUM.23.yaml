document_id: NUM.23,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy i Balahama tamin’i Balàka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manangàna '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' fito eto ho ahy ary manomàna vantotr’ombilahy fito sy ondrilahy fito eo.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Zovy no mahisa ny taranak’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay marobe tahaka ny vovotany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahisa ny ampahefatry ny Israelita?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ny fahafatesako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho toy ny fahafatesan’ireo olo-marina ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary enga anie ny fiafaràko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho toy ny fiafaràn’ny vahoaka israelita!»
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy i Balàka tamin’i Balahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fa inona izao nataonao tamiko izao? Hanozona ny fahavaloko no nitondrako anao atỳ, kanefa dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitsodrano
    - type: text
      text: ' azy indray no nataonao!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa novalian’i Balahama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa tsy ny hilaza izay teny nataon’ny TOMPO tao am-bavako ihany ve no andraikitro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsodrano faharoa nataon’i Balahama
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy indray i Balàka tamin’i Balahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha hiaraka amiko any amin’ny toeran-kafa izay hahitanao ny Israelita rehetra. Ampahany ihany mantsy no hitanao teto fa tsy ny vahoaka manontolo. Ka avy eo amin’izany toerana izany no hanozonanao azy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nentin’i Balàka teo amin’ny saha Tsôfima tao an-tampon’i Pisgà i Balahama; nanorina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' fito teo ny mpanjakan’i Môaba ka nanatitra vantotr’ombilahy iray sy ondrilahy iray isan’alitara. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy i Balahama tamin’i Balàka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mijanòna eto akaikin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo natolotrao, fa izaho hankerỳ hihaona amin’Andriamanitra.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nisehoan’ny TOMPO i Balahama ka nilazany izay teny hampitainy amin’i Balàka; ary nasainy hiverina any amin’ny mpanjaka izy mba hanambara izany aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia lasa izy niverina tany amin’i Balàka izay mbola teo anilan’ny sorona nataony sady tafaraka tamin’ny olo-manan-kaja môabita. Ary hoy i Balàka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no nolazain’ny TOMPO?
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nanao izao tononkalo manaraka izao indray i Balahama:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mitsangàna, ry Balàka zanakalahin’i Tsipôra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atongilano amiko ny sofinao, ka mihainoa.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Andriamanitra tsy mba olona ka handainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na taranak’olombelona ka hanenina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nolazainy dia hoefainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nampanantenainy dia hotanterahiny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nataon’i Balàka izay nolazain’i Balahama; avy eo izy roa lahy dia niara-nanatitra vantotr’ombilahy sy ondrilahy iray isan’alitara. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Efa nekeko ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitsodrano
    - type: text
      text: ' ity vahoaka ity;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa nitsodrano azy rahateo ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy afaka hanova na inona na inona aho.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy nahita tsiny tamin’ny taranak’i Jakôba ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na faharatsiana teo amin’ny vahoaka israelita.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Tompo Andriamaniny no momba azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka anaovany fihobiana toy ny mpanjakany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nentin’Andriamanitra niala tany Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany vahoaka izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manan-kery tsy hay tohaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny an’ny omby dia.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tsy mba misy fanaovan-tsikidy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny taranak’i Jakôba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba misy fankatovana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny vahoaka israelita.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’izay fotoana sahaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hampahafantarana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zavatra ataon’Andriamanitra.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Indro io vahoaka io
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mitsangana toy ny bibidia masiaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mijoro tahaka ny liona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy mandry raha tsy voky remby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mamon’ny ran’ny biby voahazany.»
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy i Balàka tamin’i Balahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Rehefa tsy hanozona ny Israelita ianao, dia aoka mba tsy hitsodrano azy kosa!
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa hoy ny navalin’i Balahama azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa tsy efa niteny taminao ve aho fa izay rehetra holazain’ny TOMPO ihany no hataoko?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsodrano fahatelo nataon’i Balahama
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia hoy koa i Balàka tamin’i Balahama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andao fa hoentiko any amin’ny toeran-kafa indray ianao; angamba hoeken’Andriamanitra amin’izay ny hanozonanao io vahoaka io any.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nentin’i Balàka i Balahama ho eo an-tampon’i Pehôra izay manoloana ny taniefitra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary hoy i Balahama tamin’i Balàka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manangana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' fito eto ho ahy ary manomàna vantotr’ombilahy fito sy ondrilahy fito eo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy i Balahama tamin’i Balàka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mijanòna ihany eto akaikin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo natolotrao, fa izaho kosa hihataka kely hijery raha ho avy hihaona amiko ny TOMPO na tsia; koa izay hasehony amiko dia hambarako anao.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lasa i Balahama nankany amin’ny tendrombohitra anankiray mangadihady. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nataon’i Balàka izay nolazain’i Balahama ka nanatitra vantotr’ombilahy iray sy ondrilahy iray isan’alitara izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nisehoan’Andriamanitra teo i Balahama ka nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa voatsangako ireo alitara fito ary efa voaatitro koa ny vantotr’ombilahy sy ny ondrilahy iray avy isan’alitara.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nanisy teny tao am-bavan’i Balahama ny TOMPO, ary dia nanasa azy hiverina any amin’ny mpanjaka mba hilaza izany aminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia niverina tany amin’i Balàka izy, ka nahita azy nijoro teo akaikin’ny sorona nataony sady tafaraka tamin’ireo olo-mana-kaja môabita rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nanao izao tononkalo manaraka izao i Balahama:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «I Balàka, mpanjakan’i Môaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampaka ahy avy any Siria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any amin’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny ilany atsinanan’izany tany izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia, hoy izy tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanozona ny taranak’i Jakôba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avia handrahona ny Israelita.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hataoko ahoana anefa no fanozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy mba nozonin’Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko ahoana koa no fandrahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy mba norahonan’ny TOMPO?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rehefa jereko avy eto an-tampon’ny vatolampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa tazaniko avy eto an-tampon-kavoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany vahoaka israelita izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia vahoaka mitoka-monina no fahitako azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miavaka amin’ny firenen-kafa rehetra.
