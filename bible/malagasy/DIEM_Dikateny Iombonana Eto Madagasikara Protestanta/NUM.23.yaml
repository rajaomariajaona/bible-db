document_id: NUM.23,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy i Balahama tamin’i Balàka:'
  - type: text
    content: '–Manangàna '
  - type: text
    content: alitara
  - type: text
    content: ' fito eto ho ahy ary manomàna vantotr’ombilahy fito sy ondrilahy fito eo.'
  '10':
  - type: text
    content: Zovy no mahisa ny taranak’i Jakôba
  - type: text
    content: izay marobe tahaka ny vovotany
  - type: text
    content: na mahisa ny ampahefatry ny Israelita?
  - type: text
    content: Enga anie ny fahafatesako
  - type: text
    content: ho toy ny fahafatesan’ireo olo-marina ireo,
  - type: text
    content: ary enga anie ny fiafaràko
  - type: text
    content: ho toy ny fiafaràn’ny vahoaka israelita!»
  '11':
  - type: text
    content: 'Dia hoy i Balàka tamin’i Balahama:'
  - type: text
    content: '–Fa inona izao nataonao tamiko izao? Hanozona ny fahavaloko no nitondrako anao atỳ, kanefa dia ny '
  - type: text
    content: nitsodrano
  - type: text
    content: ' azy indray no nataonao!'
  '12':
  - type: text
    content: 'Fa novalian’i Balahama hoe:'
  - type: text
    content: –Moa tsy ny hilaza izay teny nataon’ny TOMPO tao am-bavako ihany ve no andraikitro.
  - type: heading
    content: Tsodrano faharoa nataon’i Balahama
  '13':
  - type: text
    content: 'Dia hoy indray i Balàka tamin’i Balahama:'
  - type: text
    content: –Andeha hiaraka amiko any amin’ny toeran-kafa izay hahitanao ny Israelita rehetra. Ampahany ihany mantsy no hitanao teto fa tsy ny vahoaka manontolo. Ka avy eo amin’izany toerana izany no hanozonanao azy.
  '14':
  - type: text
    content: 'Dia nentin’i Balàka teo amin’ny saha Tsôfima tao an-tampon’i Pisgà i Balahama; nanorina '
  - type: text
    content: alitara
  - type: text
    content: ' fito teo ny mpanjakan’i Môaba ka nanatitra vantotr’ombilahy iray sy ondrilahy iray isan’alitara. '
  '15':
  - type: text
    content: 'Ary hoy i Balahama tamin’i Balàka:'
  - type: text
    content: '–Mijanòna eto akaikin’ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo natolotrao, fa izaho hankerỳ hihaona amin’Andriamanitra.'
  '16':
  - type: text
    content: 'Nisehoan’ny TOMPO i Balahama ka nilazany izay teny hampitainy amin’i Balàka; ary nasainy hiverina any amin’ny mpanjaka izy mba hanambara izany aminy. '
  '17':
  - type: text
    content: 'Dia lasa izy niverina tany amin’i Balàka izay mbola teo anilan’ny sorona nataony sady tafaraka tamin’ny olo-manan-kaja môabita. Ary hoy i Balàka taminy:'
  - type: text
    content: –Inona no nolazain’ny TOMPO?
  '18':
  - type: text
    content: 'Dia nanao izao tononkalo manaraka izao indray i Balahama:'
  - type: text
    content: «Mitsangàna, ry Balàka zanakalahin’i Tsipôra,
  - type: text
    content: atongilano amiko ny sofinao, ka mihainoa.
  '19':
  - type: text
    content: Andriamanitra tsy mba olona ka handainga,
  - type: text
    content: na taranak’olombelona ka hanenina.
  - type: text
    content: Izay nolazainy dia hoefainy;
  - type: text
    content: izay nampanantenainy dia hotanterahiny.
  '2':
  - type: text
    content: 'Nataon’i Balàka izay nolazain’i Balahama; avy eo izy roa lahy dia niara-nanatitra vantotr’ombilahy sy ondrilahy iray isan’alitara. '
  '20':
  - type: text
    content: 'Efa nekeko ny '
  - type: text
    content: hitsodrano
  - type: text
    content: ' ity vahoaka ity;'
  - type: text
    content: ary efa nitsodrano azy rahateo ny TOMPO
  - type: text
    content: ka tsy afaka hanova na inona na inona aho.
  '21':
  - type: text
    content: Tsy nahita tsiny tamin’ny taranak’i Jakôba ny TOMPO
  - type: text
    content: na faharatsiana teo amin’ny vahoaka israelita.
  - type: text
    content: Ny Tompo Andriamaniny no momba azy,
  - type: text
    content: ka anaovany fihobiana toy ny mpanjakany.
  '22':
  - type: text
    content: Nentin’Andriamanitra niala tany Ejipta
  - type: text
    content: izany vahoaka izany
  - type: text
    content: ka manan-kery tsy hay tohaina
  - type: text
    content: tahaka ny an’ny omby dia.
  '23':
  - type: text
    content: Tsy mba misy fanaovan-tsikidy
  - type: text
    content: eo amin’ny taranak’i Jakôba;
  - type: text
    content: tsy mba misy fankatovana
  - type: text
    content: eo amin’ny vahoaka israelita.
  - type: text
    content: Fa amin’izay fotoana sahaza
  - type: text
    content: no hampahafantarana azy
  - type: text
    content: ny zavatra ataon’Andriamanitra.
  '24':
  - type: text
    content: Indro io vahoaka io
  - type: text
    content: fa mitsangana toy ny bibidia masiaka,
  - type: text
    content: ary mijoro tahaka ny liona,
  - type: text
    content: izay tsy mandry raha tsy voky remby
  - type: text
    content: sy mamon’ny ran’ny biby voahazany.»
  '25':
  - type: text
    content: 'Dia hoy i Balàka tamin’i Balahama:'
  - type: text
    content: –Rehefa tsy hanozona ny Israelita ianao, dia aoka mba tsy hitsodrano azy kosa!
  '26':
  - type: text
    content: 'Fa hoy ny navalin’i Balahama azy:'
  - type: text
    content: –Moa tsy efa niteny taminao ve aho fa izay rehetra holazain’ny TOMPO ihany no hataoko?
  - type: heading
    content: Tsodrano fahatelo nataon’i Balahama
  '27':
  - type: text
    content: 'Dia hoy koa i Balàka tamin’i Balahama:'
  - type: text
    content: –Andao fa hoentiko any amin’ny toeran-kafa indray ianao; angamba hoeken’Andriamanitra amin’izay ny hanozonanao io vahoaka io any.
  '28':
  - type: text
    content: 'Dia nentin’i Balàka i Balahama ho eo an-tampon’i Pehôra izay manoloana ny taniefitra. '
  '29':
  - type: text
    content: 'Ary hoy i Balahama tamin’i Balàka:'
  - type: text
    content: '–Manangana '
  - type: text
    content: alitara
  - type: text
    content: ' fito eto ho ahy ary manomàna vantotr’ombilahy fito sy ondrilahy fito eo. '
  '3':
  - type: text
    content: 'Dia hoy i Balahama tamin’i Balàka:'
  - type: text
    content: '–Mijanòna ihany eto akaikin’ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo natolotrao, fa izaho kosa hihataka kely hijery raha ho avy hihaona amiko ny TOMPO na tsia; koa izay hasehony amiko dia hambarako anao.'
  - type: text
    content: 'Ary lasa i Balahama nankany amin’ny tendrombohitra anankiray mangadihady. '
  '30':
  - type: text
    content: Dia nataon’i Balàka izay nolazain’i Balahama ka nanatitra vantotr’ombilahy iray sy ondrilahy iray isan’alitara izy.
  '4':
  - type: text
    content: 'Nisehoan’Andriamanitra teo i Balahama ka nilaza taminy hoe:'
  - type: text
    content: –Efa voatsangako ireo alitara fito ary efa voaatitro koa ny vantotr’ombilahy sy ny ondrilahy iray avy isan’alitara.
  '5':
  - type: text
    content: 'Nanisy teny tao am-bavan’i Balahama ny TOMPO, ary dia nanasa azy hiverina any amin’ny mpanjaka mba hilaza izany aminy. '
  '6':
  - type: text
    content: 'Dia niverina tany amin’i Balàka izy, ka nahita azy nijoro teo akaikin’ny sorona nataony sady tafaraka tamin’ireo olo-mana-kaja môabita rehetra. '
  '7':
  - type: text
    content: 'Dia nanao izao tononkalo manaraka izao i Balahama:'
  - type: text
    content: «I Balàka, mpanjakan’i Môaba,
  - type: text
    content: dia nampaka ahy avy any Siria,
  - type: text
    content: avy any amin’ny tendrombohitra
  - type: text
    content: amin’ny ilany atsinanan’izany tany izany.
  - type: text
    content: Avia, hoy izy tamiko,
  - type: text
    content: hanozona ny taranak’i Jakôba;
  - type: text
    content: avia handrahona ny Israelita.
  '8':
  - type: text
    content: Hataoko ahoana anefa no fanozona
  - type: text
    content: izay tsy mba nozonin’Andriamanitra?
  - type: text
    content: Ary hataoko ahoana koa no fandrahona
  - type: text
    content: izay tsy mba norahonan’ny TOMPO?
  '9':
  - type: text
    content: Rehefa jereko avy eto an-tampon’ny vatolampy
  - type: text
    content: ary rehefa tazaniko avy eto an-tampon-kavoana
  - type: text
    content: izany vahoaka israelita izany,
  - type: text
    content: dia vahoaka mitoka-monina no fahitako azy,
  - type: text
    content: sady miavaka amin’ny firenen-kafa rehetra.
