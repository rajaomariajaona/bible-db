document_id: 2PE.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny kristianina amin’ny ankapobeny (1.1) no iantefan’ity taratasy ity. Ka ny tena imasoan’ny mpanoratra dia ny miady amin’ireo mpampiely fianaran-diso mifanohitra amin’ny Vaovao Mahafaly mangarangarana. Tafiditra ao amin’ny Fiangonana ireo mpampiely fampianaran-diso ireo, ka isan’ny voka-dratsin’ny fampianarany dia ny fitondrantena mivaona amin’ny tsy izy. Ny hany fomba anoherana an-dry zareo dia ny mifikitra tanteraka amin’ny fahalalana tsara an’Andriamanitra sy i Jesoa Kristy, araka izay nampitain’ireo nahita maso an’i Jesoa sy nandre ny fampianarany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Vao vita ny fiarahabana (1.1-2) dia hizingizinin’ny mpanoratra avy hatrany ireo toetra ilaina amin’ny fiainana kristianina ary ny tokony hiraiketam-po amin’ny fiantsoan’Andriamanitra, araka izay nambaran’ireo nahita maso an’i Jesoa Tompo (1.3-21). Avy eo dia potsipotsiriny amim-pahasahiana ny asa ataon’ireo mpampiely fampianaran-diso mbamin’ny fitondrantena asehony (2.1-22); tomoriny akaiky, ao amin’ny toko faha-3, ny lafiny anankiray amin’ny fampianaran-dry zareo: maneso ny olona miandry ny fiavian’i Kristy izy ireo sady mihambo fa tsy hitranga na oviana na oviana izany. Hamaliana azy ireo dia ambaran’ny mpanoratra fa raha toa mitaredretra ny fiavian’i Kristy, dia satria mahari-po Andriamanitra izay te hampahazo famonjena ny besinimaro.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Nisy hatrany hatrany teo amin’izao tontolo izao ireo mpampiely fampianaran-diso. Noho izany, dia mbola manan-danja, mandraka ankehitriny, ny hafatra raketin’ny taratasy faharoa avy amin’i Petera: ireo mpino dia ampirisihin’ny mpanoratra bebe kokoa amin’ny fahalalana ny Tompo, mba tsy ho voarebirebin’ny fampianarana tsy marim-pototra.'
