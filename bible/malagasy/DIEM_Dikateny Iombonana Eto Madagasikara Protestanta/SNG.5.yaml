document_id: SNG.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tonga eto an-jaridainako aho,
  - type: text
    content: ry havako fofombadiko,
  - type: text
    content: 'ka mioty ny '
  - type: text
    content: miorako
  - type: text
    content: mbamin’ny zava-manitro,
  - type: text
    content: sy mihinan-tantely avy amin’ny tohotra,
  - type: text
    content: ary misotro ny divaiko sy ny rononoko.
  - type: heading
    content: (Sakaizan’ny roa tonta)
  - type: text
    content: «Mihinàna ianareo, ry sakaiza, ka misotroa;
  - type: text
    content: ary aoka ianareo ho sondriam-pitia.»
  - type: heading
    content: Vohan-dravehivavy varavarana izy, kanjo tara loatra
  - type: heading
    content: (Ravehivavy)
  '10':
  - type: text
    content: Sady fotsy mangatsakatsaka
  - type: text
    content: no manopy mena ny malalako;
  - type: text
    content: ka tena maningana izy
  - type: text
    content: ao anatin’ny olona folo arivo.
  '11':
  - type: text
    content: Toa anja-bolamena madio ny lohany;
  - type: text
    content: ary ny volony dia mainty milantolanto
  - type: text
    content: sady mangilohilo toy ny an’ny goaika.
  '12':
  - type: text
    content: Ny masony dia mahafinaritra
  - type: text
    content: tahaka ny voromahailala
  - type: text
    content: mitaratra eo amoron-drenirano;
  - type: text
    content: ny voamasony toa mandro eo anivon-dronono,
  - type: text
    content: sady toa mipetraka anaty vatakely
  - type: note
    content: 'anaty vatakely: dkt hafa eo amoron-dobokely.'
  - type: text
    content: .
  '13':
  - type: text
    content: Ny takolany dia miendrika
  - type: text
    content: saham-boninkazo mandraradraraka
  - type: text
    content: sy mamokatra ahitra mamerovero
  - type: note
    content: 'mamokatra: araka ny dkt tranainy grika; ny hebreo tilikambo izay adikan’ny sasany ho tendrombohitra rako-boninkazo.'
  - type: text
    content: .
  - type: text
    content: Ny molony dia toy ny lisy
  - type: text
    content: 'mitsonika menaka '
  - type: text
    content: miora
  - type: text
    content: .
  '14':
  - type: text
    content: Ny tanany dia toa haba volamena
  - type: text
    content: izay nopetahana vatosoa.
  - type: text
    content: Ny tenany dia miendrika
  - type: text
    content: takelaka ivoary feno safira
  - type: note
    content: 'Ny tenany na hoe ny kibony. –takelaka: dkt hafa sangan’asa –Ny tena sy ny ranjo izay mazàna voasaron’ny akanjo dia mijanona fotsy ihany toy ny ivoary na vatosoa fotsy (and 15), ary mifanohitra kosa amin’ny loha sy ny sandry ary ny tongotra (and 15) izay mazàna haraky ny andro ka mivolom-barahina na mivolom-bolamena (and 11,14a). –Ny safira (vato soa miloko manga) dia mampahatsiaro ny lalandra hita eo amin’ny hoditra; ny sasany dia mihevitra tombo-kavatsa.'
  - type: text
    content: .
  '15':
  - type: text
    content: Ny ranjony dia toa andrim-batosoa
  - type: text
    content: miorina mafy amin’ny faladia volamena.
  - type: text
    content: Ny endriny dia meva fisandratra
  - type: text
    content: toy ny tendrombohitr’i Libano,
  - type: text
    content: sady fatratra toy ny hazo sedera.
  '16':
  - type: text
    content: Feno hamamiana ny vavany fanoroko
  - type: text
    content: ary mahatehotia avokoa ny aminy.
  - type: text
    content: Toy izany ilay malalako sady olon-tiako,
  - type: text
    content: ry tovovavin’i Jerosalema.
  - type: heading
    content: (Ireo tovovavy)
  '2':
  - type: text
    content: Matory aho fa ny foko mahatsiaro ihany.
  - type: text
    content: Injay reko ny malalako
  - type: text
    content: 'izay mandondòna sady miteny hoe:'
  - type: heading
    content: (Ralehilahy)
  - type: text
    content: «Vohay aho, ry havako fofombadiko,
  - type: text
    content: ry ilay voromahailalako tsy misy tomika.
  - type: text
    content: Fa rakotra ando ny lohako;
  - type: text
    content: ary kotsan’ireo patrakalan’ny alina
  - type: text
    content: ny volon-dohako milantolanto.»
  - type: heading
    content: (Ravehivavy)
  '3':
  - type: text
    content: «Efa niala akanjo aho,
  - type: text
    content: ka hiverina hiakanjo indray ve?
  - type: text
    content: Efa nanasa tongotra koa aho,
  - type: text
    content: ka handoto azy indray ve?»
  '4':
  - type: text
    content: Atsofok’ilay malalako ny tanany
  - type: text
    content: eo amin’ny lavaky ny hidim-baravarana;
  - type: text
    content: ka mampidobodoboka ny foko izany.
  '5':
  - type: text
    content: Mitsangana aho hamoha ny malalako.
  - type: text
    content: 'Mitsonika menaka '
  - type: text
    content: miora
  - type: text
    content: ny tanako sy ny rantsan-tanako,
  - type: text
    content: raha mamoha ny hidin-trano aho
  - type: note
    content: Na nohosoran’ilay tovolahy menaka miora ny famohana ny hidim-baravarana, na noho ny fahamehan’ilay tovovavy, dia voaisiny betsaka tamin’izany ny tanany.
  - type: text
    content: .
  '6':
  - type: text
    content: Vohako varavarana ny malalako,
  - type: text
    content: kanjo efa nihodina izy ka lasa.
  - type: text
    content: Mivoaka ny trano hanenjika azy aho;
  - type: text
    content: dia tadiaviko izy fa tsy hitako,
  - type: text
    content: ary antsointsoiko fa tsy mamaly.
  '7':
  - type: text
    content: Ireo mpiambina misafo ny tanàna no tojo ahy;
  - type: text
    content: dia mikapoka sy mandratra ahy
  - type: text
    content: ireo mpiambina manda ireo
  - type: text
    content: ary manendaka ny lamba saly teny amiko
  - type: note
    content: Noheverin’ireo mpiambin-tanàna ho mpivaro-tena indrisy ravehivavy, ka niezahany hosamborina.
  - type: text
    content: .
  '8':
  - type: text
    content: «Ry tovovavin’i Jerosalema ô,
  - type: text
    content: 'miangavy mafy anareo aho hoe:'
  - type: text
    content: Raha mba tojo ny malalako ianareo,
  - type: text
    content: dia inona no holazainareo aminy?
  - type: text
    content: –Ilazao izy fa mararim-pitia aho!»
  - type: heading
    content: (Ireo tovovavy)
  '9':
  - type: text
    content: «Io malalanao io, inona no ananany
  - type: text
    content: mihoatra noho ny tovolahy hafa,
  - type: text
    content: ry vehivavy tsara tarehy indrindra?
  - type: text
    content: Io malalanao io, inona no ananany
  - type: text
    content: mihoatra noho ny tovolahy hafa
  - type: text
    content: no miangavy mafy anay toy izany ianao?»
  - type: heading
    content: (Ravehivavy)
