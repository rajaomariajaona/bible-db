document_id: ISA.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanjakàn’i Baroa ny ao Joda
  - type: text
    content: Fa indro ny Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: manaisotra amin’i Jerosalema sy amin’i Joda
  - type: text
    content: 'ny andry aman-tohana isan-karazany iankinany:'
  - type: text
    content: dia ny mofo sy ny rano izay tohan’aina,
  '10':
  - type: text
    content: Sambatra ny olo-marina fa hahita soa izy,
  - type: text
    content: ka ny vokatry ny asany no hohaniny.
  '11':
  - type: text
    content: Lozan’ny ratsy fanahy kosa
  - type: text
    content: fa hiharam-pahavoazana izy,
  - type: text
    content: satria araka izay nataony ihany
  - type: text
    content: no zavatra hafitsoka aminy!
  '12':
  - type: text
    content: Ry vahoakako ô, hoy ny Tompo,
  - type: text
    content: olona mpanjakazaka anao no mampahory anao
  - type: text
    content: ary olona tsy miraharaha anao no manapaka anao;
  - type: text
    content: ry vahoakako ô, ireo mpitondra anao no nampivily anao
  - type: text
    content: ka làlan-tsiizy no nitondrany anao.
  - type: heading
    content: Fitsarana ireo mpitondra
  '13':
  - type: text
    content: Vonona hifandahatra ny TOMPO,
  - type: text
    content: ka mipetraka hitsara ny vahoakany.
  '14':
  - type: text
    content: Hampandaloviny fitsarana
  - type: text
    content: 'ireo loholona sy lehiben’ny vahoakany:'
  - type: text
    content: «Ianareo no nanimba ny voaloboka
  - type: note
    content: Araka ny fahita matetika ao amin’ny Baiboly, dia raisina ho isan’ny tandindon’ny vahoakan’Andriamanitra ny voaloboka; jereo 5.7.
  - type: text
    content: ;
  - type: text
    content: ary izay nalainareo tamin’ny mahantra
  - type: text
    content: no namenoanareo ny tranonareo.
  '15':
  - type: text
    content: Ahoana moa no ahazoanareo mampahory ny vahoakako
  - type: text
    content: sy manosihosy ny fahamendrehan’ny mahantra?
  - type: text
    content: Izany no teny hentitra avy amiko Tompo ANDRIAMANITR’izao rehetra izao.»
  - type: heading
    content: Be renty ireo andriambavilanitr’i Jerosalema
  '16':
  - type: text
    content: 'Hoy koa ny TOMPO hoe:'
  - type: text
    content: «Miandranandrana erỳ ny andriambavilanitr’i Tsiôna,
  - type: text
    content: mianjonanjona aoka izany rehefa mamindra,
  - type: text
    content: mianjola fijery sady mitsingintsingim-pandeha,
  - type: text
    content: mampikorintsana ny haba amin’ny hato-tongony.»
  '17':
  - type: text
    content: Noho izany, dia hataon’ny TOMPO voaharatra
  - type: text
    content: ny tampon-dohan’ireo andriambavilanitra ireo
  - type: text
    content: sady hataony mangadihady ny handriny
  - type: note
    content: 'tampon-doha voaharatra: anisan’ny marika anehoana fisaonana na fahaketrahana; jereo and 24; 7.20; Jer 47.5; 48.37 sns. Kanefa anisan’ny marika maha babo an’ady koa izany.'
  - type: text
    content: .
  '18':
  - type: text
    content: Amin’izany andro izany, dia hoesorin’ny Tompo ny haingo
  - type: note
    content: Ny haingo amam-piravaka isan-karazany voatanisa ao amin’ny and 18-23 dia tsy azo antoka ho tena voafaritra mazava avokoa.
  - type: text
    content: ' rehetra fampiasan’ny andriambavilanitr’i Tsiôna, izany hoe: ny haban-tongotra sy ny fehiloha ary ny firavaka misarim-bolan-tsinana; '
  '19':
  - type: text
    content: 'ny kavina jejo sy ny rojo ary ny voaly; '
  '2':
  - type: text
    content: ny miaramila voafantina sy ny miaramila tsotra,
  - type: text
    content: 'ny mpitsara sy ny '
  - type: text
    content: mpaminany
  - type: text
    content: ','
  - type: text
    content: 'ny mpimasy mbamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ','
  '20':
  - type: text
    content: 'ny satroka diadema sy ny rojo miolanolana, ny fehikibo mirandrana sy ny vakana fanefitra ary ny firavaka mampanambina; '
  '21':
  - type: text
    content: 'ny peratra sy ny kavin’orona; '
  '22':
  - type: text
    content: 'ny akanjo fitondra mianjaika sy ny akanjo misy saron-doha ary koa ny fehitenda sy ny pôketra; '
  '23':
  - type: text
    content: ny fitaratra sy ny akanjo somizo manify ary ny samboady sy ny lamba fisalobonana.
  '24':
  - type: text
    content: Ny fofona manitra hosoloana fofo-maimbo,
  - type: text
    content: ny fehikibo marevaka hosoloana tady tsotra,
  - type: text
    content: ny randrana tsara voatra hosoloana loha sola.
  - type: text
    content: ny fitafiana mihaja hosoloana lamba fisaonana.
  - type: text
    content: Eny, ny bika soa hosoloana tomboka vy mahamenatra
  - type: note
    content: 'loha sola: jereo ny naoty momba ny 3.17. –tomboka vy mahamenatra: anisan’ny famantarana sy fampijaliana ampiharina amin’ny babo ihany koa izany.'
  - type: text
    content: .
  - type: heading
    content: Ny vehivavy mpitondratena ao Jerosalema
  '25':
  - type: text
    content: Ry Jerosalema ô,
  - type: text
    content: ho fatin-tsabatra ny lehilahy ao aminao,
  - type: text
    content: ary ho faty an’ady ny miaramilanao.
  '26':
  - type: text
    content: Koa hitomany sy hitoloko ny iray tanàna,
  - type: text
    content: ho toy ny vehivavy very fananana
  - type: text
    content: mitorevaka amin’ny tany.
  '3':
  - type: text
    content: ny manamboninahitra sy ny olo-manan-kaja,
  - type: text
    content: ny mpanolotsaina mbamin’ny manampahaizana,
  - type: text
    content: ary ireo havanana amin’ny fanaovana vorika.
  '4':
  - type: text
    content: 'Ka hoy ny Tompo hoe:'
  - type: text
    content: «Ankizy no hotendreko ho lehibeny
  - type: text
    content: ka hitondra azy araka ny haitraitrany.»
  '5':
  - type: text
    content: Dia hifanjevo izy samy mpiray firenena;
  - type: text
    content: hifampisompatra ny olona ka hifamely,
  - type: text
    content: ny tanora hirehareha amin’ny antitra,
  - type: text
    content: ary ny olon-tsotra hanohitra ny olo-manan-kaja.
  '6':
  - type: text
    content: Hisy lehilahy hisambotra ny rahalahiny
  - type: text
    content: 'izay iray tarika aminy ihany ka hiangavy azy hoe:'
  - type: text
    content: «Ianao no manam-pitafiana
  - type: note
    content: 'fitafiana: anisan’ny marika mampiavaka ny lehibe izany. Ka izay mbola manana fitafiana no afaka manao ny fandraharahana maha lehibe eo anivon’ireo namany tsy manan-katafy.'
  - type: text
    content: ', koa aoka ho mpifehy anay;'
  - type: text
    content: raiso ny andraikitrao amin’izao fahavoazana izao.»
  '7':
  - type: text
    content: 'Fa hamaly izy amin’izay andro izay hoe:'
  - type: text
    content: «Tsy afaka hanao na inona na inona ho anareo aho,
  - type: text
    content: tsy misy mofo na fitafiana ao an-tranoko,
  - type: text
    content: koa aza ataonareo mpifehy vahoaka aho.»
  '8':
  - type: text
    content: Eny, lavo i Jerosalema ary potraka i Joda;
  - type: text
    content: ka na ny tenin’ny olona na ny asany
  - type: text
    content: dia samy manohitra ny TOMPO
  - type: text
    content: sy mihantsy ny voninahiny eo imaso.
  '9':
  - type: text
    content: Ny endrika asehony dia efa miampanga azy;
  - type: text
    content: manota an-karihary toy ny mponin’i Sôdôma
  - type: note
    content: 'Sôdôma: jereo 1.10 sy nta.'
  - type: text
    content: ' izy'
  - type: text
    content: fa tsy mba miafinafina intsony.
  - type: text
    content: Indrisy! Anomanany loza ho an’ny tenany izany.
