document_id: ISA.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanjakàn’i Baroa ny ao Joda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa indro ny Tompo ANDRIAMANITR’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: manaisotra amin’i Jerosalema sy amin’i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny andry aman-tohana isan-karazany iankinany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny mofo sy ny rano izay tohan’aina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ny miaramila voafantina sy ny miaramila tsotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny mpitsara sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny mpimasy mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ny manamboninahitra sy ny olo-manan-kaja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpanolotsaina mbamin’ny manampahaizana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireo havanana amin’ny fanaovana vorika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka hoy ny Tompo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ankizy no hotendreko ho lehibeny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitondra azy araka ny haitraitrany.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hifanjevo izy samy mpiray firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hifampisompatra ny olona ka hifamely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanora hirehareha amin’ny antitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny olon-tsotra hanohitra ny olo-manan-kaja.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hisy lehilahy hisambotra ny rahalahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay iray tarika aminy ihany ka hiangavy azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ianao no manam-pitafiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'fitafiana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anisan’ny marika mampiavaka ny lehibe izany. Ka izay mbola manana fitafiana no afaka manao ny fandraharahana maha lehibe eo anivon’ireo namany tsy manan-katafy.
    marker-yv: yv-n
  - type: text
    text: ', koa aoka ho mpifehy anay;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: raiso ny andraikitrao amin’izao fahavoazana izao.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hamaly izy amin’izay andro izay hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy afaka hanao na inona na inona ho anareo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy mofo na fitafiana ao an-tranoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aza ataonareo mpifehy vahoaka aho.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eny, lavo i Jerosalema ary potraka i Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka na ny tenin’ny olona na ny asany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy manohitra ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mihantsy ny voninahiny eo imaso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny endrika asehony dia efa miampanga azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manota an-karihary toy ny mponin’i Sôdôma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sôdôma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.10 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mba miafinafina intsony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy! Anomanany loza ho an’ny tenany izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sambatra ny olo-marina fa hahita soa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny vokatry ny asany no hohaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lozan’ny ratsy fanahy kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hiharam-pahavoazana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria araka izay nataony ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no zavatra hafitsoka aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ry vahoakako ô, hoy ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: olona mpanjakazaka anao no mampahory anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary olona tsy miraharaha anao no manapaka anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry vahoakako ô, ireo mpitondra anao no nampivily anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka làlan-tsiizy no nitondrany anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsarana ireo mpitondra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vonona hifandahatra ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mipetraka hitsara ny vahoakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hampandaloviny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ireo loholona sy lehiben’ny vahoakany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ianareo no nanimba ny voaloboka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny fahita matetika ao amin’ny Baiboly, dia raisina ho isan’ny tandindon’ny vahoakan’Andriamanitra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny voaloboka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; jereo 5.7.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay nalainareo tamin’ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no namenoanareo ny tranonareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ahoana moa no ahazoanareo mampahory ny vahoakako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manosihosy ny fahamendrehan’ny mahantra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitra avy amiko Tompo ANDRIAMANITR’izao rehetra izao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Be renty ireo andriambavilanitr’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy koa ny TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Miandranandrana erỳ ny andriambavilanitr’i Tsiôna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mianjonanjona aoka izany rehefa mamindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mianjola fijery sady mitsingintsingim-pandeha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampikorintsana ny haba amin’ny hato-tongony.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noho izany, dia hataon’ny TOMPO voaharatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tampon-dohan’ireo andriambavilanitra ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hataony mangadihady ny handriny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'tampon-doha voaharatra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anisan’ny marika anehoana fisaonana na fahaketrahana; jereo and 24; 7.20; Jer 47.5; 48.37 sns. Kanefa anisan’ny marika maha babo an’ady koa izany.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’izany andro izany, dia hoesorin’ny Tompo ny haingo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny haingo amam-piravaka isan-karazany voatanisa ao amin’ny and 18-23 dia tsy azo antoka ho tena voafaritra mazava avokoa.
    marker-yv: yv-n
  - type: text
    text: ' rehetra fampiasan’ny andriambavilanitr’i Tsiôna, izany hoe: ny haban-tongotra sy ny fehiloha ary ny firavaka misarim-bolan-tsinana; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny kavina jejo sy ny rojo ary ny voaly; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny satroka diadema sy ny rojo miolanolana, ny fehikibo mirandrana sy ny vakana fanefitra ary ny firavaka mampanambina; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ny peratra sy ny kavin’orona; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ny akanjo fitondra mianjaika sy ny akanjo misy saron-doha ary koa ny fehitenda sy ny pôketra; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ny fitaratra sy ny akanjo somizo manify ary ny samboady sy ny lamba fisalobonana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny fofona manitra hosoloana fofo-maimbo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fehikibo marevaka hosoloana tady tsotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny randrana tsara voatra hosoloana loha sola.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitafiana mihaja hosoloana lamba fisaonana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny bika soa hosoloana tomboka vy mahamenatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'loha sola: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny naoty momba ny 3.17. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tomboka vy mahamenatra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' anisan’ny famantarana sy fampijaliana ampiharina amin’ny babo ihany koa izany.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vehivavy mpitondratena ao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ry Jerosalema ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fatin-tsabatra ny lehilahy ao aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho faty an’ady ny miaramilanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Koa hitomany sy hitoloko ny iray tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho toy ny vehivavy very fananana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitorevaka amin’ny tany.
