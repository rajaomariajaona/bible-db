document_id: ISA.23,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahavoazan’i Fenisia
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hafatra momba an’i Tiro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Midradradradrà mafy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry sambon’i Tarsisy ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria rava ny serananareo.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony izy tonga avy any amin’ny nosy Sipra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nandrenesany izany vaovao izany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Voleo ny taninao, ry Tiro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ataovy toy ny eny amoron’i Neily,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy hisy seranana intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny sambon’i Tarsisy.»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa naninji-tanana ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handrahonana ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa nampangorohoro ny fanjakana maro Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa nanome baiko handravana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo tanàna mimanda teo amin’ny Kanahanita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny Fenisianina dia Kanahanita (jereo Gen 10.15); kanefa ny voambolana anondroana ny kanahanita dia mety midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'mpivarotra na mpandranto '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: koa indraindray, tahaka ny ao amin’ny and 8.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy ny Tompo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy afaka hiravoravo intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo mponina ao Tsidôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa afa-baràka toy ny virijiny naolana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hiainga aza ianareo ka hiampita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny nosy Sipra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hanam-pitsaharana any akory.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba jereo ange ity tanin’i Sipra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy intsony ny maha firenena azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataon’ny Asirianina tobim-pamaharana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anivon-dranomasina io nosy io,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nananganany tilikambo fitiliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanorenany tanàna mimanda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa lasa korontam-bato miavovona ireny.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midradradradrà mafy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry sambon’i Tarsisy ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria rava ny fialofanareo.»
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany, dia hohadinoina mandritra ny fitopolo taona i Tiro, izany hoe mandritra ny andro iainan’ny mpanjaka iray. Rehefa afaka fitopolo taona, dia hihatra amin’i Tiro izay nolazain’ny tonon-kira momba ny mpivarotena hoe:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Raiso ny lokanganao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lokanga: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 137.2 sy nta.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tetezo ny tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry kala janga hadino.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitendre tsara ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahereza mivazovazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahatsiarovana anao.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka fitopolo taona, dia hirotsaka an-tsehatra ao Tiro ny TOMPO. Hiverina hanao ny fanaony indray izy ka haka tombony mihoa-pampana amin’ny firenena rehetra eran-tany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa ny tombombarony sy ny vola azony dia hatokana ho an’ny TOMPO. Tsy hangonina ireny na hotahirizina fa hatao sakafo hamokisana ireo mitoetra eo anatrehan’ny TOMPO, sady hividianana fitafiana mendrika ho azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aoka tsy hahateny tsy hahavolana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo mponina amoron-tsiraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianareo mpandranto ao Tsidôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.2 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Tiro
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 1), '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Tsidôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 2): '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàn-dehibe fitodian-tsambo eo amin’ny morontsiraka fenisianina. Ao amin’ny Baiboly, dia mazàna no voatonona miaraka i Tiro sy i Tsidôna. –Ny amin’ny Fenisianina, dia jereo Ezek 26–28; Jôb 4.4-8; Ham 1.9-10; Za 9.1-4; ampit Mt 11.21-22; Lk 10.13-14.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mandefa iraka hamakivaky ny ranomasim-be.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay afafy eny amoron’i Neily
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia i Tsidôna no mioty azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izy no mandray ny tombombarotr’ireo firenena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa fahavoazana moa izato manjo anao, ry Tsidôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tanàna mimanda eo amoron-dranomasina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy indrindra ny ranomasina hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Laviko ny hihetsi-jaza na hiteraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: laviko ny hitaiza zazalahy na hanabe tovovavy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Misy famohapohazana mitôlôjia kanahanita izany, satria noheverina fa vadin’ny vahoaka fenisianina ny ranomasina. Koa lazain’ny ranomasina an-tsarisary etoana fa tsy tokony hiantehitra amin’ny harena nentiny ho azy intsony i Fenisia amin’ny hoavy.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mandre izany i Ejipta, dia hihoron-koditra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny hampihoron-koditra azy koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izay efa hanjo an’i Tiro.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ndeha mamaky ranomasina hatrany Tarsisy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tarsisy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 72.10 sy nta.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manaova antsoantsom-pitarainana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo mponina amoron-tsiraka.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ity tokoa ve ilay tanànareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay naresaka dia naresaka fahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy efa niorina hatry ny ela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nandeha nanjana-tany hatrany lavitra any
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I Tiro dia nanorina seranam-barotra tao Afrika Avaratra (Kartazy, eo akaikin’i Tonisy) ary tany Espaina (Tarsisy). Tolorany satroboninahitra ny manampahefana apetrany hifehy ireny faritra zanahiny ireny (jereo and 8 eo ambany).
      marker-yv: yv-n
    - type: text
      text: ?»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nanapa-kevitra hamely an’i Tiro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mpizara satroboninahi-panjakana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpandrantony dia tahaka ny printsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpandraharahany anisan’ireo olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nohajaina tetỳ an-tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka iza no nanapa-kevitra hamely an’i Tiro?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Ny TOMPOn’izao rehetra izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanapa-kevitra hanao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanetrena ny fireharehana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’izay rehetra mpitady voninahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanaovana tsinontsinona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo rehetra nohajaina tetỳ an-tany.
