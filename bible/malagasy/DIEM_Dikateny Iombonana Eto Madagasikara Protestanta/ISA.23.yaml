document_id: ISA.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahavoazan’i Fenisia
  - type: text
    content: Hafatra momba an’i Tiro.
  - type: text
    content: «Midradradradrà mafy ianareo,
  - type: text
    content: ry sambon’i Tarsisy ô,
  - type: text
    content: satria rava ny serananareo.»
  - type: text
    content: Fony izy tonga avy any amin’ny nosy Sipra
  - type: text
    content: no nandrenesany izany vaovao izany.
  '10':
  - type: text
    content: «Voleo ny taninao, ry Tiro,
  - type: text
    content: ka ataovy toy ny eny amoron’i Neily,
  - type: text
    content: satria tsy hisy seranana intsony
  - type: text
    content: ho an’ny sambon’i Tarsisy.»
  '11':
  - type: text
    content: Efa naninji-tanana ny TOMPO,
  - type: text
    content: mba handrahonana ny ranomasina,
  - type: text
    content: efa nampangorohoro ny fanjakana maro Izy,
  - type: text
    content: ary efa nanome baiko handravana
  - type: text
    content: ireo tanàna mimanda teo amin’ny Kanahanita
  - type: note
    content: Ny Fenisianina dia Kanahanita (jereo Gen 10.15); kanefa ny voambolana anondroana ny kanahanita dia mety midika hoe mpivarotra na mpandranto koa indraindray, tahaka ny ao amin’ny and 8.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Fa hoy ny Tompo hoe:'
  - type: text
    content: «Tsy afaka hiravoravo intsony
  - type: text
    content: ianareo mponina ao Tsidôna
  - type: text
    content: fa afa-baràka toy ny virijiny naolana.
  - type: text
    content: Na hiainga aza ianareo ka hiampita
  - type: text
    content: hatrany amin’ny nosy Sipra,
  - type: text
    content: dia tsy hanam-pitsaharana any akory.
  '13':
  - type: text
    content: Mba jereo ange ity tanin’i Sipra!
  - type: text
    content: Tsy misy intsony ny maha firenena azy.
  - type: text
    content: Nataon’ny Asirianina tobim-pamaharana
  - type: text
    content: eo anivon-dranomasina io nosy io,
  - type: text
    content: ary nananganany tilikambo fitiliana
  - type: text
    content: sy nanorenany tanàna mimanda;
  - type: text
    content: kanefa lasa korontam-bato miavovona ireny.
  '14':
  - type: text
    content: Midradradradrà mafy ianareo,
  - type: text
    content: ry sambon’i Tarsisy ô,
  - type: text
    content: satria rava ny fialofanareo.»
  '15':
  - type: text
    content: 'Amin’izany andro izany, dia hohadinoina mandritra ny fitopolo taona i Tiro, izany hoe mandritra ny andro iainan’ny mpanjaka iray. Rehefa afaka fitopolo taona, dia hihatra amin’i Tiro izay nolazain’ny tonon-kira momba ny mpivarotena hoe:'
  '16':
  - type: text
    content: «Raiso ny lokanganao
  - type: note
    content: 'lokanga: jereo Sal 137.2 sy nta.'
  - type: text
    content: ka tetezo ny tanàna,
  - type: text
    content: ry kala janga hadino.
  - type: text
    content: Mitendre tsara ianao
  - type: text
    content: ka mahereza mivazovazo
  - type: text
    content: mba hahatsiarovana anao.»
  '17':
  - type: text
    content: 'Rehefa afaka fitopolo taona, dia hirotsaka an-tsehatra ao Tiro ny TOMPO. Hiverina hanao ny fanaony indray izy ka haka tombony mihoa-pampana amin’ny firenena rehetra eran-tany. '
  '18':
  - type: text
    content: Nefa ny tombombarony sy ny vola azony dia hatokana ho an’ny TOMPO. Tsy hangonina ireny na hotahirizina fa hatao sakafo hamokisana ireo mitoetra eo anatrehan’ny TOMPO, sady hividianana fitafiana mendrika ho azy.
  '2':
  - type: text
    content: «Aoka tsy hahateny tsy hahavolana
  - type: text
    content: ianareo mponina amoron-tsiraka,
  - type: text
    content: dia ianareo mpandranto ao Tsidôna
  - type: note
    content: 'Tiro (and 1), Tsidôna (and 2): tanàn-dehibe fitodian-tsambo eo amin’ny morontsiraka fenisianina. Ao amin’ny Baiboly, dia mazàna no voatonona miaraka i Tiro sy i Tsidôna. –Ny amin’ny Fenisianina, dia jereo Ezek 26–28; Jôb 4.4-8; Ham 1.9-10; Za 9.1-4; ampit Mt 11.21-22; Lk 10.13-14.'
  - type: text
    content: izay mandefa iraka hamakivaky ny ranomasim-be.»
  '3':
  - type: text
    content: Izay afafy eny amoron’i Neily
  - type: text
    content: dia i Tsidôna no mioty azy;
  - type: text
    content: izy no mandray ny tombombarotr’ireo firenena.
  '4':
  - type: text
    content: Koa fahavoazana moa izato manjo anao, ry Tsidôna,
  - type: text
    content: tanàna mimanda eo amoron-dranomasina!
  - type: text
    content: 'Fa hoy indrindra ny ranomasina hoe:'
  - type: text
    content: «Laviko ny hihetsi-jaza na hiteraka,
  - type: text
    content: laviko ny hitaiza zazalahy na hanabe tovovavy
  - type: note
    content: Misy famohapohazana mitôlôjia kanahanita izany, satria noheverina fa vadin’ny vahoaka fenisianina ny ranomasina. Koa lazain’ny ranomasina an-tsarisary etoana fa tsy tokony hiantehitra amin’ny harena nentiny ho azy intsony i Fenisia amin’ny hoavy.
  - type: text
    content: .
  '5':
  - type: text
    content: Raha mandre izany i Ejipta, dia hihoron-koditra
  - type: text
    content: tahaka ny hampihoron-koditra azy koa
  - type: text
    content: noho izay efa hanjo an’i Tiro.
  '6':
  - type: text
    content: «Ndeha mamaky ranomasina hatrany Tarsisy
  - type: note
    content: 'Tarsisy: jereo Sal 72.10 sy nta.'
  - type: text
    content: ka manaova antsoantsom-pitarainana,
  - type: text
    content: ianareo mponina amoron-tsiraka.
  '7':
  - type: text
    content: Dia ity tokoa ve ilay tanànareo
  - type: text
    content: izay naresaka dia naresaka fahiny,
  - type: text
    content: sy efa niorina hatry ny ela
  - type: text
    content: ary nandeha nanjana-tany hatrany lavitra any
  - type: note
    content: I Tiro dia nanorina seranam-barotra tao Afrika Avaratra (Kartazy, eo akaikin’i Tonisy) ary tany Espaina (Tarsisy). Tolorany satroboninahitra ny manampahefana apetrany hifehy ireny faritra zanahiny ireny (jereo and 8 eo ambany).
  - type: text
    content: ?»
  '8':
  - type: text
    content: Iza no nanapa-kevitra hamely an’i Tiro
  - type: text
    content: izay mpizara satroboninahi-panjakana?
  - type: text
    content: Ny mpandrantony dia tahaka ny printsy
  - type: text
    content: ary ny mpandraharahany anisan’ireo olona
  - type: text
    content: nohajaina tetỳ an-tany,
  - type: text
    content: ka iza no nanapa-kevitra hamely an’i Tiro?
  '9':
  - type: text
    content: –Ny TOMPOn’izao rehetra izao
  - type: text
    content: no nanapa-kevitra hanao izany
  - type: text
    content: mba hanetrena ny fireharehana
  - type: text
    content: eo amin’izay rehetra mpitady voninahitra
  - type: text
    content: sy hanaovana tsinontsinona
  - type: text
    content: ireo rehetra nohajaina tetỳ an-tany.
