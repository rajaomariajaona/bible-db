document_id: PSA.148,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Deraina any an-danitra sy etỳ an-tany Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  - type: text
    content: Miderà ny TOMPO ianareo any an-danitra any;
  - type: text
    content: eny, miderà Azy ianareo any ambony any.
  '10':
  - type: text
    content: ry bibidia sy biby fiompy rehetra,
  - type: text
    content: ry biby mandady sy voro-manidina.
  '11':
  - type: text
    content: Miderà Azy, ry mpanjakan’ny tany sy ry vahoaka rehetra,
  - type: text
    content: ry mpitondra sy mpifehy rehetra eran-tany,
  '12':
  - type: text
    content: ry tovolahy sy tovovavy,
  - type: text
    content: ry zokiolona ombàn’ny ankizy.
  '13':
  - type: text
    content: Aoka ianareo samy hidera ny Tompo,
  - type: text
    content: 'satria ny anarany irery no avo indrindra:'
  - type: text
    content: ambonin’ny tany aman-danitra ny fiandrianany.
  '14':
  - type: text
    content: Nataony mitraka sy mahery ny vahoakany;
  - type: text
    content: ka midera ny TOMPO ireo mpivavaka aminy,
  - type: text
    content: dia ireo Israelita vahoaka lalainy.
  - type: text
    content: Haleloià!
  '2':
  - type: text
    content: Miderà Azy, ry anjeliny rehetra;
  - type: text
    content: miderà Azy, ry tafiny tontolo.
  '3':
  - type: text
    content: Miderà Azy, ry masoandro amam-bolana;
  - type: text
    content: miderà Azy, ry kinta-mazava rehetra.
  '4':
  - type: text
    content: Miderà Azy, ry lanitra faratampony
  - type: text
    content: mbaminareo rano any ambonin’ny habakabaka
  - type: note
    content: Ampit Gen 1.6-8.
  - type: text
    content: .
  '5':
  - type: text
    content: Aoka ireo samy hidera ny anaran’ny TOMPO,
  - type: text
    content: satria Izy no nandidy, dia ary ireo
  '6':
  - type: text
    content: sady nataony maharitra mandrakizay
  - type: text
    content: sy nomeny lalàna tsy azo dikaina!
  '7':
  - type: text
    content: Miderà ny TOMPO ianareo eto an-tany;
  - type: text
    content: miderà Azy, ry dragona sy rano lalimbe rehetra,
  '8':
  - type: text
    content: ry afo sy havandra, ry orampanala sy zavona,
  - type: text
    content: ry rivotra mahery izay mpankatò ny teniny;
  '9':
  - type: text
    content: miderà Azy, ry tendrombohitra sy havoana rehetra,
  - type: text
    content: ry hazo mamoa sy sedera rehetra,
