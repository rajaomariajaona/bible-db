document_id: PSA.148
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Deraina any an-danitra sy etỳ an-tany Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Haleloià
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà ny TOMPO ianareo any an-danitra any;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, miderà Azy ianareo any ambony any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miderà Azy, ry anjeliny rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy, ry tafiny tontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Miderà Azy, ry masoandro amam-bolana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy, ry kinta-mazava rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miderà Azy, ry lanitra faratampony
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbaminareo rano any ambonin’ny habakabaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '148.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 1.6-8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka ireo samy hidera ny anaran’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izy no nandidy, dia ary ireo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: sady nataony maharitra mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nomeny lalàna tsy azo dikaina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Miderà ny TOMPO ianareo eto an-tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy, ry dragona sy rano lalimbe rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ry afo sy havandra, ry orampanala sy zavona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry rivotra mahery izay mpankatò ny teniny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: miderà Azy, ry tendrombohitra sy havoana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry hazo mamoa sy sedera rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ry bibidia sy biby fiompy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry biby mandady sy voro-manidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Miderà Azy, ry mpanjakan’ny tany sy ry vahoaka rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mpitondra sy mpifehy rehetra eran-tany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ry tovolahy sy tovovavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry zokiolona ombàn’ny ankizy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aoka ianareo samy hidera ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'satria ny anarany irery no avo indrindra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ambonin’ny tany aman-danitra ny fiandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nataony mitraka sy mahery ny vahoakany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka midera ny TOMPO ireo mpivavaka aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo Israelita vahoaka lalainy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloià!
