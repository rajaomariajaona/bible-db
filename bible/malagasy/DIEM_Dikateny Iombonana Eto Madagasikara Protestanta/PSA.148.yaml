document_id: PSA.148,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Deraina any an-danitra sy etỳ an-tany Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloià
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà ny TOMPO ianareo any an-danitra any;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, miderà Azy ianareo any ambony any.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry bibidia sy biby fiompy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry biby mandady sy voro-manidina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy, ry mpanjakan’ny tany sy ry vahoaka rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mpitondra sy mpifehy rehetra eran-tany,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry tovolahy sy tovovavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry zokiolona ombàn’ny ankizy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ianareo samy hidera ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'satria ny anarany irery no avo indrindra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambonin’ny tany aman-danitra ny fiandrianany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataony mitraka sy mahery ny vahoakany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka midera ny TOMPO ireo mpivavaka aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo Israelita vahoaka lalainy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloià!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy, ry anjeliny rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miderà Azy, ry tafiny tontolo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy, ry masoandro amam-bolana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miderà Azy, ry kinta-mazava rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy, ry lanitra faratampony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbaminareo rano any ambonin’ny habakabaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '148.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 1.6-8.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ireo samy hidera ny anaran’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Izy no nandidy, dia ary ireo
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nataony maharitra mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nomeny lalàna tsy azo dikaina!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà ny TOMPO ianareo eto an-tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miderà Azy, ry dragona sy rano lalimbe rehetra,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry afo sy havandra, ry orampanala sy zavona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry rivotra mahery izay mpankatò ny teniny;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miderà Azy, ry tendrombohitra sy havoana rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry hazo mamoa sy sedera rehetra,
