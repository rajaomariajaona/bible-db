document_id: 1CH.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsinjarain’i Davida ny raharahan’ny levita
  - type: text
    content: Nony efa tratrantitra sy voky andro i Davida, dia i Salômôna zanany lahy no nataony mpanjaka tamin’i Israely
  - type: note
    content: Jereo 1 Mp 1.1-40.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ary mbola nisy efatra koa ny zanakalahin’i Simehỳ, dia i Jahata sy i Zizà ary i Jehosa sy i Berihà; ireo indray no zanakalahin’i Simehỳ: '
  '11':
  - type: text
    content: 'ka i Jahata no voalohany, i Zizà no faharoa; fa i Jehisa sy i Berihà kosa vitsy zanakalahy, ka nisaina mitambatra ho fianakaviana iray. '
  '12':
  - type: text
    content: 'Ny zanakalahin’i Kehata dia efatra: i Hamrama sy i Jitsehara ary i Hebrôna sy i Hoziela. '
  '13':
  - type: text
    content: 'Ny zanakalahin’i Hamrama dia i Aharôna sy i Mosesy. I Aharôna mbamin’ny taranany no natokana hatrany mba hanao fanompoana ao amin’ny '
  - type: text
    content: Toeramasina indrindra
  - type: note
    content: 'I Aharôna mbamin’ny taranany no natokana hatrany: jereo Eks 28.1. –ao amin’ny Toeramasina Indrindra na hoe momba ny zava-masina indrindra.'
  - type: text
    content: ': ka himasoany lalandava ny handoro zava-manitra eo anatrehan’ny TOMPO sy ny hanao fanompoam-pivavahana ary ny '
  - type: text
    content: hitsodrano
  - type: text
    content: ' amin’ny anaran’ny Tompo. '
  '14':
  - type: text
    content: 'I Mosesy dia lehilahin’Andriamanitra; natao ho anisan’ny fokon’i Levỳ kosa ny zanakalahiny, '
  '15':
  - type: text
    content: 'dia i Gersôma sy i Elihezera. '
  '16':
  - type: text
    content: 'Tamin’ny zanakalahin’i Gersôma dia i Sobaela no loham-pianakaviana. '
  '17':
  - type: text
    content: 'Tamin’ireo zanak’i Elihezera dia i Rehabià no loham-pianakaviana, sady tsy nanan-janakalahy hafa i Elihezera; kanefa maro dia maro ny zanakalahin’i Rehabià. '
  '18':
  - type: text
    content: 'Tamin’ny zanakalahin’i Jitsehara dia i Selomôta no loham-pianakaviana. '
  '19':
  - type: text
    content: 'Ny zanakalahin’i Hebrôna dia i Jerià no lahimatoa, i Amarià no lahiaivo, i Jahaziela no fahatelo, ary i Jekamehama no fahefatra. '
  '2':
  - type: text
    content: 'Novoriny koa ny lehibe rehetra tamin’i Israely mbamin’ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: .
  '20':
  - type: text
    content: Ny zanakalahin’i Hoziela dia i Mikà no lahimatoa ary i Jisià no faralahy.
  '21':
  - type: text
    content: 'Ny zanakalahin’i Merarỳ dia i Mahilỳ sy i Mosỳ. Ny zanakalahin’i Mahilỳ dia i Elehazara sy i Kisy. '
  '22':
  - type: text
    content: 'Maty tsy nitera-dahy i Elehazara fa vavy avokoa ny zaza navelany: ary dia nalain’ny zanakalahin’i Kisy rahalahin-drainy ho vady ireo. '
  '23':
  - type: text
    content: 'Telo ny zanakalahin’i Mosỳ: dia i Mahilỳ sy i Hedera ary i Jeremôta.'
  '24':
  - type: text
    content: 'Ireo rehetra ireo no taranak’i Levỳ, izay samy lohany teo amin’ny fianakaviany avy, araka ny nanisana azy sy nanoratana anarana azy tsirairay: nanao ny asa fanompoana tao an-tranon’ny TOMPO ireo, nanomboka hatreo amin’ny roapolo taona no ho miakatra. '
  '25':
  - type: text
    content: 'Hoy manko i Davida hoe: «Ny TOMPO, Andriamanitr’i Israely dia efa nanome fandriampahalemana ho an’ny vahoakany, sady honina mandrakizay eto Jerosalema; '
  '26':
  - type: text
    content: 'koa ny levita dia tsy hitondra ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' sy ny fanaka rehetra fanaovana fanompoana momba izany intsony.» '
  '27':
  - type: text
    content: 'Araka ny faratenin’i Davida no nanisana ny levita, nanomboka hatreo amin’ny roapolo taona no ho miakatra. '
  '28':
  - type: text
    content: Manolo-tena izy ireo hobaikoin’ny taranak’i Aharôna ny amin’ny fanompoana ao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' na momba ireo kianja aman’efitrano izany na momba ny '
  - type: text
    content: fanadiovana
  - type: text
    content: ' ireo fitaovana masina rehetra. Ny raharaha mifandray amin’ny fanompoana ny tranon’Andriamanitra dia ireto: '
  '29':
  - type: text
    content: mamboatra ny mofo apetraka eo anatrehan’Andriamanitra
  - type: note
    content: Jereo Lev 24.5-9.
  - type: text
    content: ', manomana ny lafarinina tsara indrindra hatao fanatitra, mahandro ny mofo manify tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' sy ny mofo endasina amin’ny lapoaly ary ny mofo hafa isan-karazany, manamarina ny famarana sy fandrefesana rehetra. '
  '3':
  - type: text
    content: 'Natao fanisana tsirairay ireo vatan-dehilahy levita, hatramin’ny telopolo taona no ho miakatra, ka 38 000 no isany. '
  '30':
  - type: text
    content: 'Adidin’ny levita ny mihoby sy midera ny TOMPO isa-marain-tsy hariva '
  '31':
  - type: text
    content: 'ary koa isaky ny misy '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo atolotra ny TOMPO na amin’ny '
  - type: text
    content: sabata
  - type: text
    content: ' na amin’ny andro voalohan’ny volana na amin’ny fankalazana hafa'
  - type: note
    content: Jereo Nom 28–29.
  - type: text
    content: '. Araka ny isa naraikitra hanaovana lalandava ireny raharaha ireny no hanatontosan’ny levita azy eo anatrehan’ny TOMPO. '
  '32':
  - type: text
    content: Mbola azy koa no miambina ny Tranolay fihaonana sy ny Toeramasina; fa an’ny taranak’i Aharôna rahalahiny kosa ny manao ny fanompoana ao an-tranon’ny TOMPO
  - type: note
    content: 'And 28-32: jereo Nom 3.5-9.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Ary hoy i Davida hoe: ny 24 000 amin’ireo ho tonian’ny asa fanorenana ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '; ny enina arivo ho mpitantsoratra sy ho mpitsara; '
  '5':
  - type: text
    content: 'ny efatra arivo ho mpiandry varavarana; ary ny efatra arivo ho mpidera ny TOMPO amin’ny zava-maneno namboariko hiderana Azy. '
  '6':
  - type: text
    content: 'Natsitokotokon’i Davida koa ny levita, araka ny ifandraisany amin’ireo zanakalahin’i Levỳ: dia i Gersôna sy i Kehata ary i Merarỳ.'
  '7':
  - type: text
    content: 'Ny avy amin’i Gersôna: i Lahadàna sy i Simehỳ no zanakalahin’i Gersôna. '
  '8':
  - type: text
    content: 'Telo no zanakalahin’i Lahadàna: voalohany i Jehiela, avy eo i Zetama sy i Jôela. '
  '9':
  - type: text
    content: 'Telo no zanakalahin’i Simehỳ: dia i Selômita sy i Haziela ary i Haràna, izay samy nanjary lohany tamin’ireo fianakaviana avy amin’i Lahadàna'
  - type: note
    content: Tsy mazava loatra ny hevitry ny RTM eto amin’ity and ity; nahoana no tonga lohan’ireo fianakaviana lahadanita izy telo lahy? Tsy voalaza eto ny antony.
  - type: text
    content: '. '
