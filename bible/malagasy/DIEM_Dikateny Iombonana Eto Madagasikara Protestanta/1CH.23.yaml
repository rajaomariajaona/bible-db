document_id: 1CH.23,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsinjarain’i Davida ny raharahan’ny levita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nony efa tratrantitra sy voky andro i Davida, dia i Salômôna zanany lahy no nataony mpanjaka tamin’i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 1.1-40.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary mbola nisy efatra koa ny zanakalahin’i Simehỳ, dia i Jahata sy i Zizà ary i Jehosa sy i Berihà; ireo indray no zanakalahin’i Simehỳ: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ka i Jahata no voalohany, i Zizà no faharoa; fa i Jehisa sy i Berihà kosa vitsy zanakalahy, ka nisaina mitambatra ho fianakaviana iray. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny zanakalahin’i Kehata dia efatra: i Hamrama sy i Jitsehara ary i Hebrôna sy i Hoziela. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny zanakalahin’i Hamrama dia i Aharôna sy i Mosesy. I Aharôna mbamin’ny taranany no natokana hatrany mba hanao fanompoana ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Aharôna mbamin’ny taranany no natokana hatrany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 28.1. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ao amin’ny Toeramasina Indrindra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: momba ny zava-masina indrindra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ': ka himasoany lalandava ny handoro zava-manitra eo anatrehan’ny TOMPO sy ny hanao fanompoam-pivavahana ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitsodrano
    - type: text
      text: ' amin’ny anaran’ny Tompo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I Mosesy dia lehilahin’Andriamanitra; natao ho anisan’ny fokon’i Levỳ kosa ny zanakalahiny, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'dia i Gersôma sy i Elihezera. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tamin’ny zanakalahin’i Gersôma dia i Sobaela no loham-pianakaviana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tamin’ireo zanak’i Elihezera dia i Rehabià no loham-pianakaviana, sady tsy nanan-janakalahy hafa i Elihezera; kanefa maro dia maro ny zanakalahin’i Rehabià. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tamin’ny zanakalahin’i Jitsehara dia i Selomôta no loham-pianakaviana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny zanakalahin’i Hebrôna dia i Jerià no lahimatoa, i Amarià no lahiaivo, i Jahaziela no fahatelo, ary i Jekamehama no fahefatra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Novoriny koa ny lehibe rehetra tamin’i Israely mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny zanakalahin’i Hoziela dia i Mikà no lahimatoa ary i Jisià no faralahy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ny zanakalahin’i Merarỳ dia i Mahilỳ sy i Mosỳ. Ny zanakalahin’i Mahilỳ dia i Elehazara sy i Kisy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Maty tsy nitera-dahy i Elehazara fa vavy avokoa ny zaza navelany: ary dia nalain’ny zanakalahin’i Kisy rahalahin-drainy ho vady ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Telo ny zanakalahin’i Mosỳ: dia i Mahilỳ sy i Hedera ary i Jeremôta.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ireo rehetra ireo no taranak’i Levỳ, izay samy lohany teo amin’ny fianakaviany avy, araka ny nanisana azy sy nanoratana anarana azy tsirairay: nanao ny asa fanompoana tao an-tranon’ny TOMPO ireo, nanomboka hatreo amin’ny roapolo taona no ho miakatra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hoy manko i Davida hoe: «Ny TOMPO, Andriamanitr’i Israely dia efa nanome fandriampahalemana ho an’ny vahoakany, sady honina mandrakizay eto Jerosalema; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'koa ny levita dia tsy hitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' sy ny fanaka rehetra fanaovana fanompoana momba izany intsony.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Araka ny faratenin’i Davida no nanisana ny levita, nanomboka hatreo amin’ny roapolo taona no ho miakatra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Manolo-tena izy ireo hobaikoin’ny taranak’i Aharôna ny amin’ny fanompoana ao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' na momba ireo kianja aman’efitrano izany na momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanadiovana
    - type: text
      text: ' ireo fitaovana masina rehetra. Ny raharaha mifandray amin’ny fanompoana ny tranon’Andriamanitra dia ireto: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: mamboatra ny mofo apetraka eo anatrehan’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 24.5-9.
      marker-yv: yv-n
    - type: text
      text: ', manomana ny lafarinina tsara indrindra hatao fanatitra, mahandro ny mofo manify tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: ' sy ny mofo endasina amin’ny lapoaly ary ny mofo hafa isan-karazany, manamarina ny famarana sy fandrefesana rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Natao fanisana tsirairay ireo vatan-dehilahy levita, hatramin’ny telopolo taona no ho miakatra, ka 38 000 no isany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Adidin’ny levita ny mihoby sy midera ny TOMPO isa-marain-tsy hariva '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ary koa isaky ny misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo atolotra ny TOMPO na amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' na amin’ny andro voalohan’ny volana na amin’ny fankalazana hafa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 28–29.
      marker-yv: yv-n
    - type: text
      text: '. Araka ny isa naraikitra hanaovana lalandava ireny raharaha ireny no hanatontosan’ny levita azy eo anatrehan’ny TOMPO. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Mbola azy koa no miambina ny Tranolay fihaonana sy ny Toeramasina; fa an’ny taranak’i Aharôna rahalahiny kosa ny manao ny fanompoana ao an-tranon’ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.32 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 28-32:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 3.5-9.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hoy i Davida hoe: ny 24 000 amin’ireo ho tonian’ny asa fanorenana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: '; ny enina arivo ho mpitantsoratra sy ho mpitsara; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ny efatra arivo ho mpiandry varavarana; ary ny efatra arivo ho mpidera ny TOMPO amin’ny zava-maneno namboariko hiderana Azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Natsitokotokon’i Davida koa ny levita, araka ny ifandraisany amin’ireo zanakalahin’i Levỳ: dia i Gersôna sy i Kehata ary i Merarỳ.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny avy amin’i Gersôna: i Lahadàna sy i Simehỳ no zanakalahin’i Gersôna. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Telo no zanakalahin’i Lahadàna: voalohany i Jehiela, avy eo i Zetama sy i Jôela. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Telo no zanakalahin’i Simehỳ: dia i Selômita sy i Haziela ary i Haràna, izay samy nanjary lohany tamin’ireo fianakaviana avy amin’i Lahadàna'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy mazava loatra ny hevitry ny RTM eto amin’ity and ity; nahoana no tonga lohan’ireo fianakaviana lahadanita izy telo lahy? Tsy voalaza eto ny antony.
      marker-yv: yv-n
    - type: text
      text: '. '
