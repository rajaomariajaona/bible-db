- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taom-pitsaharana sy ny andro fitsaharana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Mandritra ny enin-taona misesy no ahazoanareo mamafy ny taninareo sy mijinja ny vokatra avy aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fa amin’ny taona fahafito dia tsy maintsy avelanareo hitsahatra tanteraka ny tany. Ny mahantra iray firenena aminareo amin’izay dia hahita hohanina, ary ny sisa dia hohanin’ny bibidia. Toy izany koa no hataonareo amin’ny tanimboalobokareo sy ny tanin’ôlivanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
