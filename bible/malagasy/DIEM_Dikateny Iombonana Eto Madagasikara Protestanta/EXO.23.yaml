    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Aza mampijaly ny vahiny izay mipetraka ao aminareo. Fantatrareo tsara ny fiainan’ny vahiny satria efa mba vahiny tany Ejipta koa ny tenanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
