document_id: EXO.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahamarinana ary tsy fizahan-tavan’olona
  - type: text
    content: «Aza manely tsaho foana, na manao vavolombelona mandainga hiray tsikombakomba ny olon-dratsy
  - type: note
    content: Jereo 20.16; Lev 19.11-12; Deot 5.20.
  - type: text
    content: '. '
  '10':
  - type: text
    content: '«Mandritra ny enin-taona misesy no ahazoanareo mamafy ny taninareo sy mijinja ny vokatra avy aminy; '
  '11':
  - type: text
    content: fa amin’ny taona fahafito dia tsy maintsy avelanareo hitsahatra tanteraka ny tany. Ny mahantra iray firenena aminareo amin’izay dia hahita hohanina, ary ny sisa dia hohanin’ny bibidia. Toy izany koa no hataonareo amin’ny tanimboalobokareo sy ny tanin’ôlivanareo
  - type: note
    content: 'And 10-11: jereo Lev 25.1-7.'
  - type: text
    content: .
  '12':
  - type: text
    content: «Enina andro no hanaovanareo ny raharahanareo fa amin’ny andro fahafito dia hitsahatra ianareo mba hahazoan’ny ombinareo sy ny borikinareo miala sasatra, ary mba hahazoan’ny mpanomponareo sy ny vahiny maka aina
  - type: note
    content: Jereo 16.23-30; 20.8-11; 31.12-17; 34.21; 35.2; Lev 23.3; Deot 5.13-14.
  - type: text
    content: .
  '13':
  - type: text
    content: «Tandremo tsara izay rehetra nandidiako anareo; ary aoka ny anaran’andriamani-kafa tsy hantsoina mihitsy, na ho re tononina akory eo aminareo.
  - type: heading
    content: Ny fety hotandreman’ny Israelita
  '14':
  - type: text
    content: '«Fety telo no hankalazainareo isan-taona ho fanomezam-boninahitra Ahy. '
  '15':
  - type: text
    content: 'Ny fety voalohany hankalazainareo dia ny fetin’ny mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ': mandritra ny fito andro voatondro amin’ny volana Abiba'
  - type: note
    content: Momba ny fetin’ny mofo tsy misy leviora sy ireo fety roa hafa eo amin’ny and 16 ary koa ny volana Abiba, dia jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
  - type: text
    content: ' no hihinananareo ny mofo tsy misy leviora araka izay efa nandidiako anareo. Tamin’io volana io manko no nialanareo tany Ejipta; koa aza miseho eo amin’ny '
  - type: text
    content: alitarako
  - type: text
    content: ' mitondra tanam-polo. '
  '16':
  - type: text
    content: Hankalazainareo manaraka izany ny fetin’ny fijinjana amin’ny fotoana ijinjanareo ny voaloham-bokatr’izay nafafinareo tany an-tsaha. Ary amin’ny faran’ny taona kosa no hankalazainareo ny fetim-bokatra, rehefa vitanareo avokoa ny famoriana ny vokatry ny fambolenareo any an-tsaha
  - type: note
    content: 'Araka ny fanisanandro tranainy israelita, ny taona dia mifarana amin’ny fararano, izany hoe tapaky ny Septambra. –And 15-16: jereo 12.14-20; 34.18; Lev 23.76-8, 15-21, 39-43; Rom 28.17-32; 29.12; Deot 16.1-17.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: Koa intelo isan-taona izany ny lehilahy rehetra aminareo no ho tonga hiseho eo anatrehako TOMPO Andriamanitrareo.
  '18':
  - type: text
    content: «Aza manao sorom-biby ho Ahy miaraka amin’ny mofo misy leviora; ary aza tahirizina ho tra-maraina ny jaboran’ireo sorona fanomezam-boninahitra Ahy
  - type: note
    content: ny jaboran’ireo sorona dia tsy maintsy dorana androtr’iny ihany.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Haterinareo ao an-tranoko ny santatry ny vokatry ny taninareo satria Izaho no Tompo Andriamanitrareo. Nefa aza mahandro zanak’osy amin’ny rononon-dreniny
  - type: note
    content: 'ny santatry ny vokatra: jereo Deot 26.2. –mahandro zanak’osy...: jereo 34.26; Deot 14.21. Io dia fomba fanao tao amin’ny fivavahana kanahanita.'
  - type: text
    content: .
  - type: heading
    content: Teny fampanantenana sy torohevitra alohan’ny fiaingana
  '2':
  - type: text
    content: 'Aza manaiky hotarihin’ny maro hanao ratsy; aza mijoro ho vavolombelona noho ny hena-maso ny maro mitady hamadika ny rariny eo amin’ny fitsarana. '
  '20':
  - type: text
    content: '«Haniraka '
  - type: text
    content: anjely
  - type: text
    content: ' iray hialoha anareo Aho, mba hiaro anareo eny an-dàlana; izy no hitarika anareo ho ao amin’ny tany izay efa nomaniko ho anareo. '
  '21':
  - type: text
    content: 'Mitandrema tsara eo anatrehany ka henoy izay lazainy, ary aza manohitra azy; fa tsy mahazaka fikomiana izy, satria mitondra ny anarako. '
  '22':
  - type: text
    content: Raha mankatò azy hatrany ianareo, ka manatanteraka an-tsipiriany izay rehetra nandidiako anareo, dia Izaho Tompo no ho fahavalon’izay fahavalonareo, ary handrafy izay mandrafy anareo.
  '23':
  - type: text
    content: '«Rehefa mandeha eo alohanareo ny anjeliko, ka mitarika anareo ho any amin’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sy ny Hitita, ny Perizita sy ny Kanahanita, ary ny Hivita sy ny Jebosita, dia hofongorako ireo firenena ireo. '
  '24':
  - type: text
    content: 'Koa aza miankohoka eo anoloan’ny andriamaniny, na manao fanompoam-pivavahana aminy na mianatra ny fanaony, fa ravao mihitsy ny sarivongan’ireo sampiny sady potipoteho ny tsangambatony. '
  '25':
  - type: text
    content: 'Izaho TOMPO Andriamanitrareo irery ihany no hivavahanareo; amin’izay Aho dia hitahy anareo ka hanome anareo sakafo sy fisotro, sady hampanalavitra ny aretina aminareo. '
  '26':
  - type: text
    content: Tsy hisy vehivavy ho afa-jaza na ho momba eo amin’ny taninareo, ary hataoko ela velona ianareo.
  '27':
  - type: text
    content: '«Halefako hialoha anareo ny tahotra Ahy, ka hisavoritaka ny firenena rehetra izay hidiranareo. '
  '28':
  - type: text
    content: Halefako hialoha anareo koa ny takolapanenitra ka hampandositra ny Hivita sy ny Kanahanita ary ny Hetita mialoha ny fahatongavanareo
  - type: note
    content: 'Dkt hafa momba ity and ity: Hataoko izay hahatonga ny Hivita sy ny Kanahanita ary ny Hitita ho kivy ka handositra alohan’ny fahatongavanareo.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Tsy hampandosiriko anareo ao anatin’ny taona iray ihany anefa ireo firenena ireo, fandrao hanjary ho lao ny tany ka hihamaro hamely anareo ny bibidia. '
  '3':
  - type: text
    content: Aza manasohaso olona eo amin’ny fitsarana, na dia ny mahantra aza
  - type: note
    content: Jereo Lev 19.15; Deot 16.19.
  - type: text
    content: .
  '30':
  - type: text
    content: 'Horoahiko tsikelikely ny fahavalonareo, arakaraka ny hihamaroanareo ka handraisanareo ny tany ho anareo. '
  '31':
  - type: text
    content: 'Ny faritaninareo dia hataoko mahafaoka hatreo amin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' ka hatrany amin’ny ranomasina Mediteranea'
  - type: note
    content: Ranomasina Mediteranea dia antsoina hoe Ranomasin’ny Filistinina eto.
  - type: text
    content: ', ary hatreo amin’ny taniefitr’i Sinay ka hatrany amin’ny ony Eofrata; fa hatolotro ho eo an-tananareo ny mponina amin’ireo faritany ireo ka horoahinareo. '
  '32':
  - type: text
    content: 'Aza manao fanekempihavanana amin’ireo na amin’ny andriamaniny. '
  '33':
  - type: text
    content: Aza avela honina ao amin’ny taninareo ireny fandrao mitarika anareo hanao fahadisoana amiko; satria raha manao fanompoam-pivavahana amin’ny andriamaniny ianareo, dia hanjary fandrika ho anareo izany.»
  '4':
  - type: text
    content: '«Raha mifanena aminao fa diso lalana ny ombin’ny fahavalonao na ny borikiny, dia avereno any aminy. '
  '5':
  - type: text
    content: Raha hitanao ny borikin’izay mankahala anao fa mihohaka eo ambanin’ny entana entiny, dia aza ilaozana fotsiny ilay olona fa ampio izy hanarina ny bibiny
  - type: note
    content: 'And 4-5: jereo Deot 22.1-4. –fa ampio izy...bibiny: tsy mazava ny RM, koa ny dkt eto dia araka ny hevitra ankapoben’ny rijan-teny.'
  - type: text
    content: .
  '6':
  - type: text
    content: «Aza mamilivily ny rariny ananan’ny mahantranareo
  - type: note
    content: 'ny rariny... mahantranareo: dkt hafa ny rariny mba hahavoa ny mahantranareo.'
  - type: text
    content: ' rehefa miseho fitsarana izy. '
  '7':
  - type: text
    content: 'Aza mihaino ny lainga tsara lahatra. Aza manameloka ho faty ny tsy manan-tsiny sy ny olo-marina, satria Izaho Tompo dia tsy hihevitra ny olon-dratsy toy izany ho marina. '
  '8':
  - type: text
    content: Aza mandray tsolotra fa ny tsolotra no mahajamba ny mason’ny mahiratra sy mamadika ny tenin’ny olo-marina
  - type: note
    content: 'And 6-8: jereo Lev 19.15; Deot 16.19. –sy mamadika... olo-marina: dkt hafa mamilivily ny raharahan’ny tsy manan-tsiny.'
  - type: text
    content: .
  '9':
  - type: text
    content: «Aza mampijaly ny vahiny izay mipetraka ao aminareo. Fantatrareo tsara ny fiainan’ny vahiny satria efa mba vahiny tany Ejipta koa ny tenanareo
  - type: note
    content: Jereo 22.20-21; Lev 19.33-34; Deot 24.17-18; 27.19.
  - type: text
    content: .
  - type: heading
    content: Ny taom-pitsaharana sy ny andro fitsaharana
