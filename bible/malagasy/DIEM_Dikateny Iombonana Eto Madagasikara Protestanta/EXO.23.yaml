  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza mihaino ny lainga tsara lahatra. Aza manameloka ho faty ny tsy manan-tsiny sy ny olo-marina, satria Izaho Tompo dia tsy hihevitra ny olon-dratsy toy izany ho marina. '
  - type: usfm
