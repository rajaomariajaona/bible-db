  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: «Tandremo tsara izay rehetra nandidiako anareo; ary aoka ny anaran’andriamani-kafa tsy hantsoina mihitsy, na ho re tononina akory eo aminareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fety hotandreman’ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Fety telo no hankalazainareo isan-taona ho fanomezam-boninahitra Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny fety voalohany hankalazainareo dia ny fetin’ny mofo tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ': mandritra ny fito andro voatondro amin’ny volana Abiba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny fetin’ny mofo tsy misy leviora sy ireo fety roa hafa eo amin’ny and 16 ary koa ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: volana Abiba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dia jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
    marker-yv: yv-n
  - type: text
    text: ' no hihinananareo ny mofo tsy misy leviora araka izay efa nandidiako anareo. Tamin’io volana io manko no nialanareo tany Ejipta; koa aza miseho eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitarako
  - type: text
    text: ' mitondra tanam-polo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hankalazainareo manaraka izany ny fetin’ny fijinjana amin’ny fotoana ijinjanareo ny voaloham-bokatr’izay nafafinareo tany an-tsaha. Ary amin’ny faran’ny taona kosa no hankalazainareo ny fetim-bokatra, rehefa vitanareo avokoa ny famoriana ny vokatry ny fambolenareo any an-tsaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny fanisanandro tranainy israelita, ny taona dia mifarana amin’ny fararano, izany hoe tapaky ny Septambra. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '–And 15-16:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 12.14-20; 34.18; Lev 23.76-8, 15-21, 39-43; Rom 28.17-32; 29.12; Deot 16.1-17.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa intelo isan-taona izany ny lehilahy rehetra aminareo no ho tonga hiseho eo anatrehako TOMPO Andriamanitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: «Aza manao sorom-biby ho Ahy miaraka amin’ny mofo misy leviora; ary aza tahirizina ho tra-maraina ny jaboran’ireo sorona fanomezam-boninahitra Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny jaboran’ireo sorona '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tsy maintsy dorana androtr’iny ihany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Haterinareo ao an-tranoko ny santatry ny vokatry ny taninareo satria Izaho no Tompo Andriamanitrareo. Nefa aza mahandro zanak’osy amin’ny rononon-dreniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.19 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'ny santatry ny vokatra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Deot 26.2. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mahandro zanak’osy...:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 34.26; Deot 14.21. Io dia fomba fanao tao amin’ny fivavahana kanahanita.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny fampanantenana sy torohevitra alohan’ny fiaingana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Haniraka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' iray hialoha anareo Aho, mba hiaro anareo eny an-dàlana; izy no hitarika anareo ho ao amin’ny tany izay efa nomaniko ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mitandrema tsara eo anatrehany ka henoy izay lazainy, ary aza manohitra azy; fa tsy mahazaka fikomiana izy, satria mitondra ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha mankatò azy hatrany ianareo, ka manatanteraka an-tsipiriany izay rehetra nandidiako anareo, dia Izaho Tompo no ho fahavalon’izay fahavalonareo, ary handrafy izay mandrafy anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Rehefa mandeha eo alohanareo ny anjeliko, ka mitarika anareo ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' sy ny Hitita, ny Perizita sy ny Kanahanita, ary ny Hivita sy ny Jebosita, dia hofongorako ireo firenena ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa aza miankohoka eo anoloan’ny andriamaniny, na manao fanompoam-pivavahana aminy na mianatra ny fanaony, fa ravao mihitsy ny sarivongan’ireo sampiny sady potipoteho ny tsangambatony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izaho TOMPO Andriamanitrareo irery ihany no hivavahanareo; amin’izay Aho dia hitahy anareo ka hanome anareo sakafo sy fisotro, sady hampanalavitra ny aretina aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy hisy vehivavy ho afa-jaza na ho momba eo amin’ny taninareo, ary hataoko ela velona ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Halefako hialoha anareo ny tahotra Ahy, ka hisavoritaka ny firenena rehetra izay hidiranareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Halefako hialoha anareo koa ny takolapanenitra ka hampandositra ny Hivita sy ny Kanahanita ary ny Hetita mialoha ny fahatongavanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa momba ity and ity: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hataoko izay hahatonga ny Hivita sy ny Kanahanita ary ny Hitita ho kivy ka handositra alohan’ny fahatongavanareo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tsy hampandosiriko anareo ao anatin’ny taona iray ihany anefa ireo firenena ireo, fandrao hanjary ho lao ny tany ka hihamaro hamely anareo ny bibidia. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Horoahiko tsikelikely ny fahavalonareo, arakaraka ny hihamaroanareo ka handraisanareo ny tany ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny faritaninareo dia hataoko mahafaoka hatreo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ranomasin’ny Volotara
  - type: text
    text: ' ka hatrany amin’ny ranomasina Mediteranea'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ranomasina Mediteranea dia antsoina hoe Ranomasin’ny Filistinina eto.
    marker-yv: yv-n
  - type: text
    text: ', ary hatreo amin’ny taniefitr’i Sinay ka hatrany amin’ny ony Eofrata; fa hatolotro ho eo an-tananareo ny mponina amin’ireo faritany ireo ka horoahinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aza manao fanekempihavanana amin’ireo na amin’ny andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Aza avela honina ao amin’ny taninareo ireny fandrao mitarika anareo hanao fahadisoana amiko; satria raha manao fanompoam-pivavahana amin’ny andriamaniny ianareo, dia hanjary fandrika ho anareo izany.»
