  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: «Enina andro no hanaovanareo ny raharahanareo fa amin’ny andro fahafito dia hitsahatra ianareo mba hahazoan’ny ombinareo sy ny borikinareo miala sasatra, ary mba hahazoan’ny mpanomponareo sy ny vahiny maka aina
  - type: usfm
