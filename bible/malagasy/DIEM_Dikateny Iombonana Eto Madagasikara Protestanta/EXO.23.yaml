    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza mandray tsolotra fa ny tsolotra no mahajamba ny mason’ny mahiratra sy mamadika ny tenin’ny olo-marina
  - type: usfm
    marker: f
    children:
    - type: usfm
