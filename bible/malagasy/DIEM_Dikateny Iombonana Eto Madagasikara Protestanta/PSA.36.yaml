  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hanosihosy ahy anie ny mpiavonavona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy haharoaka ahy anie ireo olon-dratsy!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreo fa lavo etoana ny mpanao heloka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nianjera ka tsy ho tafarina intsony.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voarakitra ato an-tsaiko hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny teny fikomian’ny olon-dratsy hoe:'
  - type: usfm
