  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandoka tena loatra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy miaiky hadisoana na mankahala izany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay teny lazainy dia heloka sy fitaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nofy azy mihitsy ny hoe hanao ny tsara.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao am-pandriany no isainany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny heloka heveriny hatao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mikiribiby amin’ny fanao tsy mety izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy laviny akory ny ratsy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, mahatakatra ny lanitra ny fitiavanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mipaka eny amin’ny rahona ny toetranao mahatoky.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avo toy ireo tendrombohitra ny fahamarinanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lalina toy ny ranomasina izany fitsarànao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, samy vonjenao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na olombelona na biby.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sarobidy loatra ny fitiavanao, Andriamanitra ô,
