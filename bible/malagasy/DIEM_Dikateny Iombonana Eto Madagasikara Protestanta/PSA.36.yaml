document_id: PSA.36,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny haratsian’ny olona sy ny hatsaràn’Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Nataon’i Davida mpanompon’ny TOMPO.
  '10':
  - type: text
    content: Fa ao aminao ny loharanon’aina;
  - type: text
    content: ny fahazavanao no manazava anay.
  '11':
  - type: text
    content: Mbola anehoy fitiavana
  - type: text
    content: ireo mahalala Anao;
  - type: text
    content: ho marina hatrany Ianao
  - type: text
    content: amin’ireo mahitsy fo.
  '12':
  - type: text
    content: Tsy hanosihosy ahy anie ny mpiavonavona;
  - type: text
    content: tsy haharoaka ahy anie ireo olon-dratsy!
  '13':
  - type: text
    content: Indreo fa lavo etoana ny mpanao heloka,
  - type: text
    content: nianjera ka tsy ho tafarina intsony.
  '2':
  - type: text
    content: Voarakitra ato an-tsaiko hatrany
  - type: text
    content: 'ny teny fikomian’ny olon-dratsy hoe:'
  - type: text
    content: «Tsy misy dikany aminay
  - type: text
    content: ny fanajana an’Andriamanitra
  - type: note
    content: Tsiahivina ao amin’ny Rm 3.18 ny faran’ny and 2.
  - type: text
    content: '!»'
  '3':
  - type: text
    content: Mandoka tena loatra izy,
  - type: text
    content: ka tsy miaiky hadisoana na mankahala izany.
  '4':
  - type: text
    content: Izay teny lazainy dia heloka sy fitaka;
  - type: text
    content: nofy azy mihitsy ny hoe hanao ny tsara.
  '5':
  - type: text
    content: Ao am-pandriany no isainany
  - type: text
    content: ny heloka heveriny hatao;
  - type: text
    content: mikiribiby amin’ny fanao tsy mety izy
  - type: text
    content: ary tsy laviny akory ny ratsy.
  '6':
  - type: text
    content: TOMPO ô, mahatakatra ny lanitra ny fitiavanao;
  - type: text
    content: mipaka eny amin’ny rahona ny toetranao mahatoky.
  '7':
  - type: text
    content: Avo toy ireo tendrombohitra ny fahamarinanao;
  - type: text
    content: lalina toy ny ranomasina izany fitsarànao.
  - type: text
    content: TOMPO ô, samy vonjenao
  - type: text
    content: na olombelona na biby.
  '8':
  - type: text
    content: Sarobidy loatra ny fitiavanao, Andriamanitra ô,
  - type: text
    content: ka mitady fialofana eo ambany elatrao ny olona
  - type: note
    content: Jereo Sal 17.8 sy nta.
  - type: text
    content: ;
  '9':
  - type: text
    content: Fenoinao harena avy ao an-tranonao izy,
  - type: text
    content: ka diboka ny zava-tsoa mandriaka toy ny ony.
