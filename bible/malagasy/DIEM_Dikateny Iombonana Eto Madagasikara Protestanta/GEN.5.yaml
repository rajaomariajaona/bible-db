document_id: GEN.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lisitry ny razambe hatreo amin’i Adama ka hatramin’i Noa
  - type: text
    content: 'Ity no lisitry ny taranak’i Adama:'
  - type: text
    content: 'Tamin’ny andro naharian’Andriamanitra ny olombelona, dia nataon’Andriamanitra manahaka Azy ny olombelona. '
  '10':
  - type: text
    content: 'Taorian’ny nahaterahan’i Kenàna, dia mbola velona nandritra ny 815 taona i Enôsa, ary niteraka zanakalahy sy zanakavavy maro. '
  '11':
  - type: text
    content: Nisy 905 taona ny andro rehetra niainan’i Enôsa, dia maty izy.
  '12':
  - type: text
    content: 'Rehefa feno 70 taona i Kenàna, dia niteraka an’i Mahalalèla. '
  '13':
  - type: text
    content: 'Taorian’ny nahaterahan’i Mahalalèla, dia mbola velona 840 taona i Kanàna, ary niteraka zanakalahy sy zanakavavy maro. '
  '14':
  - type: text
    content: Nisy 910 taona ny andro rehetra niainan’i Kenàna, dia maty izy.
  '15':
  - type: text
    content: 'Rehefa feno 65 taona i Mahalalèla, dia niteraka an’i Jerada. '
  '16':
  - type: text
    content: 'Taorian’ny nahaterahan’i Jereda, dia mbola velona nandritra ny 830 taona i Mahalalèla, ary niteraka zanakalahy sy zanakavavy maro. '
  '17':
  - type: text
    content: Nisy 895 taona ny andro rehetra niainan’i Mahalalèla, dia maty izy.
  '18':
  - type: text
    content: 'Rehefa feno 162 taona i Jereda, dia niteraka an’i Henôka. '
  '19':
  - type: text
    content: 'Taorian’ny nahaterahan’i Henôka, dia mbola velona 800 taona i Jereda, ary niteraka zanaka lahy sy zanaka vavy maro. '
  '2':
  - type: text
    content: 'Lehilahy sy vehivavy no nahariany azy, dia '
  - type: text
    content: nitsodrano
  - type: text
    content: ' azy Izy ka niantso azy hoe olombelona tamin’ny andro nahariany azy'
  - type: note
    content: Ampit Gen 1.27-28; Mt 19.4; Mk 10.6.
  - type: text
    content: .
  '20':
  - type: text
    content: Nisy 962 taona ny andro rehetra niainan’i Jereda, dia maty izy.
  '21':
  - type: text
    content: Rehefa feno 65 taona i Henôka, dia niteraka an’i Metosèla
  - type: note
    content: 'Metosèla: io no heverina ho nanjary Matosalema.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ary niara-nandeha tamin’Andriamanitra i Henôka, ka taorian’ny nahaterahan’i Metosèla dia mbola velona 300 taona izy ary niteraka zanakalahy sy zanakavavy maro. '
  '23':
  - type: text
    content: Nisy 365 taona ny andro rehetra niainan’i Henôka
  - type: note
    content: 'Henôka: jereo Heb 11.5; Jod 14.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: Niara-nandeha tamin’Andriamanitra izy; ary tsy hita izy satria nalain’Andriamanitra ho any aminy.
  '25':
  - type: text
    content: 'Rehefa feno 187 taona i Metosèla, dia niteraka an’i Lamèka. '
  '26':
  - type: text
    content: 'Taorian’ny nahaterahan’i Lamèka, dia mbola velona nandritra ny 782 taona i Metosèla ary niteraka zanakalahy sy zanakavavy maro. '
  '27':
  - type: text
    content: Nisy 969 taona ny andro rehetra niainan’i Metosèla, dia maty izy.
  '28':
  - type: text
    content: 'Rehefa feno 182 taona i Lamèka, dia niteraka zazalahy, '
  '29':
  - type: text
    content: 'ary ny anarany nataony hoe Noà, fa hoy izy hoe:'
  - type: text
    content: –Ity no hampionona anay
  - type: note
    content: Ny anarana hoe Noà amin’ny teny hebreo dia mampahatsiaro ny matoanteny naham izay nadika hoe hampionona eto.
  - type: text
    content: ' amin’ny asa mafy sy ny fahasahirananay noho ny nanozonan’ny TOMPO ny tany. '
  '3':
  - type: text
    content: 'Rehefa feno 130 taona i Adama, dia niteraka zazalahy manahaka azy sy mitovy endrika aminy ary nantsoiny hoe Seta. '
  '30':
  - type: text
    content: 'Taorian’ny nahaterahan’i Noà, dia mbola velona 595 taona i Lamèka, ary niteraka zanakalahy sy zanakavavy maro. '
  '31':
  - type: text
    content: Nisy 777 taona ny andro rehetra niainan’i Lamèka, dia maty izy.
  '32':
  - type: text
    content: Efa 500 taona i Noà raha niteraka an’i Sema sy i Hama ary i Jafeta.
  '4':
  - type: text
    content: 'Taorian’ny nahaterahan’i Seta, dia mbola velona nandritra ny 800 taona i Adama, ary niteraka zanakalahy sy zanakavavy maro. '
  '5':
  - type: text
    content: Nisy 930 taona ny andro rehetra niainan’i Adama, dia maty izy.
  '6':
  - type: text
    content: 'Rehefa feno 105 taona i Seta, dia niteraka an’i Enôsa. '
  '7':
  - type: text
    content: 'Taorian’ny nahaterahan’i Enôsa, dia mbola velona nandritra ny 807 taona i Seta, ary niteraka zanakalahy sy zanakavavy maro. '
  '8':
  - type: text
    content: Nisy 912 taona ny andro rehetra niainan’i Seta, dia maty izy.
  '9':
  - type: text
    content: 'Rehefa feno 90 taona i Enôsa, dia niteraka an’i Kenàna. '
