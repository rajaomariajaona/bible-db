document_id: 2KI.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jôrama mpanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' i Jôrama zanakalahin’i Ahaba tamin’ny taona faha-18 nanjakan’i Jôsafata mpanjakan’i Joda; ary naharitra 12 taona no nanjakany tao Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'Nanao izay ratsy eo imason’ny TOMPO izy; ka nifikirany fa tsy nialany akory ny fahotana izay nampanaovin’i Jerôbohama zanakalahin’i Nebata ny Israelita. Kanefa tsy dia ratsy tahaka an-drainy sy reniny izy, satria nanaisotra ny tsangambato izay nataon-drainy hanajana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandefasana miaramila hanafika ny tanin’i Môaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary niompy ondry maro i Mesà mpanjakan’i Môaba ka nandoa hetra zanak’ondry 100 000 sy ondrilahy 100 000 mbamin’ny volony ho an’ny mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa maty anefa i Ahaba mpanjaka, dia nikomy tamin’ny mpanjakan’i Israely ny mpanjakan’i Môaba. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary niala tao Samaria i Jôrama tamin’izay mba hampanao matso ny tafik’i Israely manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandefa iraka hilaza amin’i Jôsafata mpanjakan’i Joda izy nanao hoe: «Nikomy tamiko ny mpanjakan’i Môaba; koa hiaraka amiko hanafika ny taniny ve ianao?» Ary hoy ny navaliny: «Eny, ho avy aho, fa tahaka ny tenanao ihany aho, ka ny tafiko dia tafikao ary ny soavaliko dia soavalinao.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy ihany izy: «Aiza àry no lalana halehantsika?» Ary namaly i Jôrama hoe: «Ilay mamaky ny taniefitr’i Edôma'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny mihodidina ny Ranomasina Maty eny am-pita andrefana no tian’i Jôrama mba hahazoany manafika an’i Môaba avy any atsimo. Ny mpanjakan’i Edôma (jereo and 9) dia nanoa ny mpanjakan’i Joda tamin’izay.
    marker-yv: yv-n
  - type: text
    text: ».
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niainga ny mpanjakan’i Israely sy ny mpanjakan’i Joda ary ny mpanjakan’i Edôma. Rehefa nandeha lalana fito andro ireo, dia tsy nahita rano intsony ho an’ny miaramila sy ny biby niaraka taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny mpanjakan’i Israely:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indrisy fa ny TOMPO mihitsy no nitaona antsika mpanjaka telo lahy ireto mba hatolotra eo an-tanan’ny Môabita!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy kosa i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Moa tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminani
  - type: text
    text: n’ny TOMPO va eto mba hanontaniantsika ny TOMPO?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nisy manamboninahitry ny mpanjakan’i Israely namaly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miaraka amintsika ao i Elisà zanakalahin’i Safata sady mpiara-niasa akaiky tamin’i Elià mpaminany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miloatra avy aminy tokoa ny tenin’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nankany amin’i Elisà ny mpanjakan’i Israely sy i Jôsafata ary ny mpanjakan’i Edôma. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ka hoy i Elisà tamin’ny mpanjakan’i Israely:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no mankatỳ amiko ianao? Mandehana any amin’ireo mpaminanin-drainao na ireo mpaminanin-dreninao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa novalian’ny mpanjakan’i Israely hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, fa ny TOMPO mihitsy no nitaona anay mpanjaka telo lahy ireto mba hatolotra eo an-tanan’ny Môabita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy indray i Elisà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Velona ny TOMPOn’izao rehetra izao sady tompoiko, ka manizingizina aho fa ny fanajàko an’i Jôsafata mpanjakan’i Joda ihany no anatrehako anao sy ijereko anao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankehitriny, itondray mpitendry mozika aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Raha mbola niangaly mozika ilay mpitendry, dia tonga tamin’i Elisà ny herin’ny TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka nampiteny azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO: «Andoahy lavaka maro ity hady ity, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'satria Izaho TOMPO no efa nilaza fa tsy handre rivotra na hahita orana ianareo, nefa ho feno rano izany hady izany mba hisotroanareo, dia ny tenanareo sy ny miaramilanareo ary ny biby mpitondra ny entanareo.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Saingy mbola zavatra kely eo imason’ny TOMPO ihany izany; fa hanolotra ny tanin’i Môaba eo an-tananareo koa Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Horavanareo ny tanànamimanda sy ny tanàna soa rehetra, hokapainareo ny hazo fihinam-boa rehetra, hotampenanareo ny loharano rehetra ary hanipazanareo vato ny saha voavoly rehetra ho fanimbana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny ampitso maraina, tamin’ny fotoana fanoloran-tsorona, dia indro fa nikoriana avy any Edôma ny rano ka nandrakotra ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa ren’ny Môabita rehetra fa avy hanafika azy ireto mpanjaka telo lahy, dia nantsoiny avokoa izay lehilahy mahatam-piadiana rehetra ka naka toerana teo amin’ny sisin-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nony nifoha ny Môabita ny ampitso maraina, dia notarafin’ny masoandro izany rano izany ka mena toy ny ra no fahitany azy teo anoloany; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ra io! Niady sy nifandringana tokoa ireo mpanjaka ireo sy ny tafiny; koa mitsangàna, ry Môaba, ka mandrobà!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Kanjo, rehefa nanatona ny tobin’i Israely ny Môabita, dia notampohin’ny miaramila israelita izay namely azy ka nitsoaka nandositra teo anoloany. Nanenjika azy hatrany amin’ny taniny kosa ny Israelita ka naharesy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Noravany ny tanàna ary samy nanipazany vato avokoa ny saha voavoly rehetra mandra-pahatototra azy, notampenany ny loharano rehetra ary nokapainy ny hazo fihinam-boa rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny tanànan’i Kira-Harôseta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Renivohitry ny fanjakan’i Môaba.
    marker-yv: yv-n
  - type: text
    text: ' no sisa tsy rava, nefa na io aza dia nohodidinin’ny mpandefa antsamotady ka notafihiny ihany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary rehefa hitan’ny mpanjakan’i Môaba fa tsy hahatohitra ny fanafihana izy, dia namory miaramila fitonjato lahy mpitan-tsabatra hiaraka aminy mba hanavatsava hankany amin’ny mpanjakan’i Siria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Siria: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy latinina izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Edôma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpanjakan’i Môaba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia nikendry hitady fanohanana tamin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpanjakan’i Siria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', izay fahavalon’ireto tafika miara-mamely azy ireto.'
    marker-yv: yv-n
  - type: text
    text: ', nefa tsy nahomby. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nalainy ny zanany lahimatoa izay tokony hanjaka handimby azy ka nataony sorona dorana manontolo teo ambonin’ny mandan’ny tanàna; natahotra mafy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'natahotra mafy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny tahotra dia ny hahita ny andriamanitr’i Môaba manampy ny vahoakany satria noheverin’ny Israelita indraindray fa tao anatin’ny faritr’i Israely ihany ilay Tompo Andriamaniny no nahery.
    marker-yv: yv-n
  - type: text
    text: ' ny Israelita ka nandao ny fahirano ary nody any amin’ny taniny.'
