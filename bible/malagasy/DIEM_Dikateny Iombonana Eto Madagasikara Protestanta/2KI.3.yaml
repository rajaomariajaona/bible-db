document_id: 2KI.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jôrama mpanjakan’i Israely
  - type: text
    content: 'Tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' i Jôrama zanakalahin’i Ahaba tamin’ny taona faha-18 nanjakan’i Jôsafata mpanjakan’i Joda; ary naharitra 12 taona no nanjakany tao Samaria. '
  '10':
  - type: text
    content: 'Dia hoy ny mpanjakan’i Israely:'
  - type: text
    content: –Indrisy fa ny TOMPO mihitsy no nitaona antsika mpanjaka telo lahy ireto mba hatolotra eo an-tanan’ny Môabita!
  '11':
  - type: text
    content: 'Fa hoy kosa i Jôsafata:'
  - type: text
    content: '–Moa tsy misy '
  - type: text
    content: mpaminani
  - type: text
    content: n’ny TOMPO va eto mba hanontaniantsika ny TOMPO?
  - type: text
    content: 'Ary nisy manamboninahitry ny mpanjakan’i Israely namaly hoe:'
  - type: text
    content: –Miaraka amintsika ao i Elisà zanakalahin’i Safata sady mpiara-niasa akaiky tamin’i Elià mpaminany.
  '12':
  - type: text
    content: 'Hoy i Jôsafata:'
  - type: text
    content: –Miloatra avy aminy tokoa ny tenin’ny TOMPO.
  - type: text
    content: 'Dia nankany amin’i Elisà ny mpanjakan’i Israely sy i Jôsafata ary ny mpanjakan’i Edôma. '
  '13':
  - type: text
    content: 'Ka hoy i Elisà tamin’ny mpanjakan’i Israely:'
  - type: text
    content: –Nahoana no mankatỳ amiko ianao? Mandehana any amin’ireo mpaminanin-drainao na ireo mpaminanin-dreninao!
  - type: text
    content: 'Fa novalian’ny mpanjakan’i Israely hoe:'
  - type: text
    content: –Tsia, fa ny TOMPO mihitsy no nitaona anay mpanjaka telo lahy ireto mba hatolotra eo an-tanan’ny Môabita.
  '14':
  - type: text
    content: 'Dia hoy indray i Elisà:'
  - type: text
    content: '–Velona ny TOMPOn’izao rehetra izao sady tompoiko, ka manizingizina aho fa ny fanajàko an’i Jôsafata mpanjakan’i Joda ihany no anatrehako anao sy ijereko anao. '
  '15':
  - type: text
    content: Ankehitriny, itondray mpitendry mozika aho.
  - type: text
    content: 'Raha mbola niangaly mozika ilay mpitendry, dia tonga tamin’i Elisà ny herin’ny TOMPO, '
  '16':
  - type: text
    content: 'ka nampiteny azy hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Andoahy lavaka maro ity hady ity, '
  '17':
  - type: text
    content: 'satria Izaho TOMPO no efa nilaza fa tsy handre rivotra na hahita orana ianareo, nefa ho feno rano izany hady izany mba hisotroanareo, dia ny tenanareo sy ny miaramilanareo ary ny biby mpitondra ny entanareo.» '
  '18':
  - type: text
    content: 'Saingy mbola zavatra kely eo imason’ny TOMPO ihany izany; fa hanolotra ny tanin’i Môaba eo an-tananareo koa Izy. '
  '19':
  - type: text
    content: Horavanareo ny tanànamimanda sy ny tanàna soa rehetra, hokapainareo ny hazo fihinam-boa rehetra, hotampenanareo ny loharano rehetra ary hanipazanareo vato ny saha voavoly rehetra ho fanimbana azy.
  '2':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO izy; ka nifikirany fa tsy nialany akory ny fahotana izay nampanaovin’i Jerôbohama zanakalahin’i Nebata ny Israelita. Kanefa tsy dia ratsy tahaka an-drainy sy reniny izy, satria nanaisotra ny tsangambato izay nataon-drainy hanajana an’i '
  - type: text
    content: Bahala
  - type: text
    content: .
  - type: heading
    content: Fandefasana miaramila hanafika ny tanin’i Môaba
  '20':
  - type: text
    content: Ny ampitso maraina, tamin’ny fotoana fanoloran-tsorona, dia indro fa nikoriana avy any Edôma ny rano ka nandrakotra ny tany.
  '21':
  - type: text
    content: 'Rehefa ren’ny Môabita rehetra fa avy hanafika azy ireto mpanjaka telo lahy, dia nantsoiny avokoa izay lehilahy mahatam-piadiana rehetra ka naka toerana teo amin’ny sisin-tany. '
  '22':
  - type: text
    content: 'Nony nifoha ny Môabita ny ampitso maraina, dia notarafin’ny masoandro izany rano izany ka mena toy ny ra no fahitany azy teo anoloany; '
  '23':
  - type: text
    content: 'ary hoy izy hoe:'
  - type: text
    content: –Ra io! Niady sy nifandringana tokoa ireo mpanjaka ireo sy ny tafiny; koa mitsangàna, ry Môaba, ka mandrobà!
  '24':
  - type: text
    content: 'Kanjo, rehefa nanatona ny tobin’i Israely ny Môabita, dia notampohin’ny miaramila israelita izay namely azy ka nitsoaka nandositra teo anoloany. Nanenjika azy hatrany amin’ny taniny kosa ny Israelita ka naharesy azy. '
  '25':
  - type: text
    content: Noravany ny tanàna ary samy nanipazany vato avokoa ny saha voavoly rehetra mandra-pahatototra azy, notampenany ny loharano rehetra ary nokapainy ny hazo fihinam-boa rehetra.
  - type: text
    content: Ny tanànan’i Kira-Harôseta
  - type: note
    content: Renivohitry ny fanjakan’i Môaba.
  - type: text
    content: ' no sisa tsy rava, nefa na io aza dia nohodidinin’ny mpandefa antsamotady ka notafihiny ihany koa. '
  '26':
  - type: text
    content: Ary rehefa hitan’ny mpanjakan’i Môaba fa tsy hahatohitra ny fanafihana izy, dia namory miaramila fitonjato lahy mpitan-tsabatra hiaraka aminy mba hanavatsava hankany amin’ny mpanjakan’i Siria
  - type: note
    content: 'Siria: araka ny dkt tranainy latinina izany; fa ny RM kosa manao hoe Edôma. Ny mpanjakan’i Môaba dia nikendry hitady fanohanana tamin’ny mpanjakan’i Siria, izay fahavalon’ireto tafika miara-mamely azy ireto.'
  - type: text
    content: ', nefa tsy nahomby. '
  '27':
  - type: text
    content: Ary nalainy ny zanany lahimatoa izay tokony hanjaka handimby azy ka nataony sorona dorana manontolo teo ambonin’ny mandan’ny tanàna; natahotra mafy
  - type: note
    content: 'natahotra mafy: ny tahotra dia ny hahita ny andriamanitr’i Môaba manampy ny vahoakany satria noheverin’ny Israelita indraindray fa tao anatin’ny faritr’i Israely ihany ilay Tompo Andriamaniny no nahery.'
  - type: text
    content: ' ny Israelita ka nandao ny fahirano ary nody any amin’ny taniny.'
  '4':
  - type: text
    content: 'Ary niompy ondry maro i Mesà mpanjakan’i Môaba ka nandoa hetra zanak’ondry 100 000 sy ondrilahy 100 000 mbamin’ny volony ho an’ny mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Rehefa maty anefa i Ahaba mpanjaka, dia nikomy tamin’ny mpanjakan’i Israely ny mpanjakan’i Môaba. '
  '6':
  - type: text
    content: 'Ary niala tao Samaria i Jôrama tamin’izay mba hampanao matso ny tafik’i Israely manontolo. '
  '7':
  - type: text
    content: 'Dia nandefa iraka hilaza amin’i Jôsafata mpanjakan’i Joda izy nanao hoe: «Nikomy tamiko ny mpanjakan’i Môaba; koa hiaraka amiko hanafika ny taniny ve ianao?» Ary hoy ny navaliny: «Eny, ho avy aho, fa tahaka ny tenanao ihany aho, ka ny tafiko dia tafikao ary ny soavaliko dia soavalinao.» '
  '8':
  - type: text
    content: 'Fa hoy ihany izy: «Aiza àry no lalana halehantsika?» Ary namaly i Jôrama hoe: «Ilay mamaky ny taniefitr’i Edôma'
  - type: note
    content: Ny mihodidina ny Ranomasina Maty eny am-pita andrefana no tian’i Jôrama mba hahazoany manafika an’i Môaba avy any atsimo. Ny mpanjakan’i Edôma (jereo and 9) dia nanoa ny mpanjakan’i Joda tamin’izay.
  - type: text
    content: ».
  '9':
  - type: text
    content: 'Dia niainga ny mpanjakan’i Israely sy ny mpanjakan’i Joda ary ny mpanjakan’i Edôma. Rehefa nandeha lalana fito andro ireo, dia tsy nahita rano intsony ho an’ny miaramila sy ny biby niaraka taminy. '
