  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra irery no iadanako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy aminy ny famonjena ahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy irery no Vatolampy ahazoako famonjena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fiarovana avo ho ahy ka tsy hihontsona aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Ianareo kosa, mandra-pahoviana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hifarimbona hamely olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiara-mioko handrodana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho toa rindrina mirona sy fefy mikoa?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hany itadiavanareo hanongana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia satria izy manana toerana ambony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fitaka no zavatra mba maminareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'am-bava '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mirary soa
    - type: text
      text: ', fa am-po manozona.'
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra irery no iadanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Izy mihitsy no antenaiko.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy irery no Vatolampy ahazoako famonjena,
  - type: usfm
