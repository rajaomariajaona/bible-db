document_id: PSA.62,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Andriamanitra irery no iadanako
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’i Jedotòna
  - type: text
    content: ' '
  - type: note
    content: 'Jedotòna: jereo Sal 39.1 sy nta.'
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: Tsio-drivotra mandalo ihany
  - type: text
    content: ny sarambabem-bahoaka;
  - type: text
    content: rendrarendra foana koa
  - type: text
    content: ireo olona manan-kaja;
  - type: text
    content: raha indray atao amin’ny mizana izy roa tonta,
  - type: text
    content: dia maivana noho ny tsio-drivotra mandalo.
  '11':
  - type: text
    content: –Aza mitoky amin’ny fanaovana an-keriny,
  - type: text
    content: aza miankina amin’ny fangalarana.
  - type: text
    content: Raha mitombo fananana ianareo,
  - type: text
    content: aza mba miraiki-po amin’izany.
  '12':
  - type: text
    content: Izao no tenin’Andriamanitra
  - type: text
    content: 'fandreko matetika: «Ahy ny hery!»'
  '13':
  - type: text
    content: –Tompo ô, Anao ihany koa ny fitiavana;
  - type: text
    content: sady Ianao no mamaly ny olona
  - type: text
    content: araka ny asa nataony avy
  - type: note
    content: Jereo Jer 17.10; Jôb 34.11; Mt 16.27; Rm 2.6; Apôk 2.23.
  - type: text
    content: .
  '2':
  - type: text
    content: Andriamanitra irery no iadanako;
  - type: text
    content: avy aminy ny famonjena ahy.
  '3':
  - type: text
    content: Izy irery no Vatolampy ahazoako famonjena,
  - type: text
    content: fiarovana avo ho ahy ka tsy hihontsona aho.
  '4':
  - type: text
    content: –Ianareo kosa, mandra-pahoviana
  - type: text
    content: no hifarimbona hamely olona
  - type: text
    content: ka hiara-mioko handrodana azy
  - type: text
    content: ho toa rindrina mirona sy fefy mikoa?
  '5':
  - type: text
    content: Ny hany itadiavanareo hanongana azy
  - type: text
    content: dia satria izy manana toerana ambony.
  - type: text
    content: 'Fitaka no zavatra mba maminareo:'
  - type: text
    content: 'am-bava '
  - type: text
    content: mirary soa
  - type: text
    content: ', fa am-po manozona.'
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Andriamanitra irery no iadanako
  - type: text
    content: satria Izy mihitsy no antenaiko.
  '7':
  - type: text
    content: Izy irery no Vatolampy ahazoako famonjena,
  - type: text
    content: fiarovana avo ho ahy ka tsy hihontsona aho.
  '8':
  - type: text
    content: Miankina amin’Andriamanitra
  - type: text
    content: ny famonjena ahy sy ny voninahitro;
  - type: text
    content: Andriamanitra no Vatolampy
  - type: text
    content: ianteherako mafy sy fialofako.
  '9':
  - type: text
    content: –Matokia Azy lalandava, ry vahoakany,
  - type: text
    content: atosahy eo anoloany ny fiahianareo
  - type: text
    content: fa Izy Andriamanitra no fialofantsika.
  - type: text
    content: Fiatoana
