  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsio-drivotra mandalo ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sarambabem-bahoaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rendrarendra foana koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo olona manan-kaja;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha indray atao amin’ny mizana izy roa tonta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maivana noho ny tsio-drivotra mandalo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Aza mitoky amin’ny fanaovana an-keriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza miankina amin’ny fangalarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitombo fananana ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mba miraiki-po amin’izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no tenin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fandreko matetika: «Ahy ny hery!»'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Tompo ô, Anao ihany koa ny fitiavana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady Ianao no mamaly ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny asa nataony avy
