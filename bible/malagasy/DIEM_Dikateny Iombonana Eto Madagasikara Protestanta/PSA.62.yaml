  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miankina amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny famonjena ahy sy ny voninahitro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra no Vatolampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianteherako mafy sy fialofako.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Matokia Azy lalandava, ry vahoakany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atosahy eo anoloany ny fiahianareo
  - type: usfm
    marker: q1
