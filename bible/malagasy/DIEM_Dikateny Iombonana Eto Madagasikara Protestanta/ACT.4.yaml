    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ao aminy no hany ahazoam-pamonjena; eny, tsy misy eto ambanin’ny lanitra anarana hafa nomen’Andriamanitra ny olona, izay hahazoantsika famonjena!
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Gaga dia gaga ireo anisan’ny Fitsarana ambony raha nahita ny fahasahiana nasehon’i Petera sy i Jôhany: satria tandriny tokoa fa olona tsotra tsy nahita fianarana izy roa lahy, sady fantany fa olona niaraka tamin’i Jesoa; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: hitany koa ralehilahy sitrana soa aman-tsara nitsangana teo anilan’izy roa lahy, hany ka tsy nanan-kolazaina ry zareo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nasaina niala teo amin’ny efitranon’ny Fitsarana ambony ireto voampanga fa ry zareo kosa nifampidinika '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona no hataontsika amin’ireo lehilahy ireo? Ny mponina rehetra eto Jerosalema dia mahalala miharihary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' vitany ka tsy haintsika lavina. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Kanefa mba tsy hielezan’izany intsony amin’ny vahoaka, dia aoka horahonantsika izy roa lahy ka hosakanana tsy hiteny amin’ny anaran’i Jesoa intsony na amin’iza na amin’iza.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nantsoin-dry zareo i Petera sy i Jôhany, ka norarany tsy hiteny na hampianatra amin’ny anaran’i Jesoa intsony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Saingy hoy izy roa lahy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsarao raha rariny eo imason’Andriamanitra ny manaiky anareo toy izay manaiky an’Andriamanitra; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tsy zakan-dry zareo mihitsy ny ampianarin’izy roa lahy ny vahoaka sady itoriany fa tanteraka ao amin’ny tenan’i Jesoa ny fitsanganana velona avy any amin’ny maty. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: raha izahay, tsy azonay atao ny tsy hiteny momba izay efa hitanay sy renay.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Norahonan’ireto manampahefana indray i Petera sy i Jôhany vao nalefany. Tsy nahita izay hampiharana sazy ry zareo satria ny vahoaka efa samy nanome voninahitra an’Andriamanitra noho ny zava-nitranga teo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa mihoatra ny efapolo taona ralehilahy nanaovana izany famantarana nahasitrana azy izany.
  - type: usfm
