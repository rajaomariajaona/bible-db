      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nosamborin’izy ireo i Petera sy i Jôhany, ary satria efa hariva ny andro, dia nataony am-ponja mandra-paharainan’ny andro. '
  '30':
  - type: usfm
