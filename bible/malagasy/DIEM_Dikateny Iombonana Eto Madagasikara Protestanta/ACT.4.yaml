  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Tsy nisy orin-javatra teo aminy; fa ireo nanana tany na trano dia nivarotra izany, ary nitondra ny vola vidin’ny zavatra lafo, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
