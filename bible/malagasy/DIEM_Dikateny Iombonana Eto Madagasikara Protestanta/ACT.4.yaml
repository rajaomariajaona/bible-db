document_id: ACT.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Petera sy i Jôhany eo anatrehan’ny Fitsarana ambony
  - type: text
    content: Raha mbola niteny tamin’ny vahoaka teo i Petera sy i Jôhany, dia indreo tonga ny mpisorona
  - type: note
    content: 'ny mpisorona: misy stf sasany ahitana hoe ny lohandoha-mpisorona.'
  - type: text
    content: 'sy ny lehiben’ny mpiambina ny tempoly ary koa ny '
  - type: text
    content: Tsadoseanina
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'dia izao no aoka ho fantatrareo rehetra mbamin’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo: salama tsara io lehilahy manoloana anareo io noho ny anaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' avy any Nazareta, Izay nohomboanareo tamin’ny hazofijaliana kanefa natsangan’Andriamanitra ho velona avy any amin’ny maty. '
  '11':
  - type: text
    content: 'I Jesoa no Ilay voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Ny vato nolavinareo mpanao trano
  - type: text
    content: no nanjary vato fehizoro
  - type: note
    content: Sal 118.22.
  - type: text
    content: '!»'
  '12':
  - type: text
    content: Ao aminy no hany ahazoam-pamonjena; eny, tsy misy eto ambanin’ny lanitra anarana hafa nomen’Andriamanitra ny olona, izay hahazoantsika famonjena!
  '13':
  - type: text
    content: 'Gaga dia gaga ireo anisan’ny Fitsarana ambony raha nahita ny fahasahiana nasehon’i Petera sy i Jôhany: satria tandriny tokoa fa olona tsotra tsy nahita fianarana izy roa lahy, sady fantany fa olona niaraka tamin’i Jesoa; '
  '14':
  - type: text
    content: hitany koa ralehilahy sitrana soa aman-tsara nitsangana teo anilan’izy roa lahy, hany ka tsy nanan-kolazaina ry zareo.
  '15':
  - type: text
    content: 'Dia nasaina niala teo amin’ny efitranon’ny Fitsarana ambony ireto voampanga fa ry zareo kosa nifampidinika '
  '16':
  - type: text
    content: 'nanao hoe:'
  - type: text
    content: '–Inona no hataontsika amin’ireo lehilahy ireo? Ny mponina rehetra eto Jerosalema dia mahalala miharihary ny '
  - type: text
    content: famantarana
  - type: text
    content: ' vitany ka tsy haintsika lavina. '
  '17':
  - type: text
    content: Kanefa mba tsy hielezan’izany intsony amin’ny vahoaka, dia aoka horahonantsika izy roa lahy ka hosakanana tsy hiteny amin’ny anaran’i Jesoa intsony na amin’iza na amin’iza.
  '18':
  - type: text
    content: 'Dia nantsoin-dry zareo i Petera sy i Jôhany, ka norarany tsy hiteny na hampianatra amin’ny anaran’i Jesoa intsony. '
  '19':
  - type: text
    content: 'Saingy hoy izy roa lahy taminy:'
  - type: text
    content: '–Tsarao raha rariny eo imason’Andriamanitra ny manaiky anareo toy izay manaiky an’Andriamanitra; '
  '2':
  - type: text
    content: 'Tsy zakan-dry zareo mihitsy ny ampianarin’izy roa lahy ny vahoaka sady itoriany fa tanteraka ao amin’ny tenan’i Jesoa ny fitsanganana velona avy any amin’ny maty. '
  '20':
  - type: text
    content: raha izahay, tsy azonay atao ny tsy hiteny momba izay efa hitanay sy renay.
  '21':
  - type: text
    content: 'Norahonan’ireto manampahefana indray i Petera sy i Jôhany vao nalefany. Tsy nahita izay hampiharana sazy ry zareo satria ny vahoaka efa samy nanome voninahitra an’Andriamanitra noho ny zava-nitranga teo. '
  '22':
  - type: text
    content: Fa mihoatra ny efapolo taona ralehilahy nanaovana izany famantarana nahasitrana azy izany.
  - type: heading
    content: Vavaka nataon’ny mpino
  '23':
  - type: text
    content: 'Vantany vao afaka izy roa lahy, dia namonjy ireo namany ka nitantara izay rehetra voalazan’ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholona
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Nony nandre izany ireo mpino, dia indray nientana nanandratra tonom-bavaka tamin’Andriamanitra hoe:'
  - type: text
    content: –Tompo ô, Ianao no nanao ny lanitra sy ny tany ary ny ranomasina mbamin’izay rehetra eo aminy
  - type: note
    content: Jereo Eks 20.11; Sal 146.6.
  - type: text
    content: '; '
  '25':
  - type: text
    content: 'ary tamin’ny alalan’ny Fanahy Masina no nampitenenanao an’i Davida razanay sady mpanomponao hoe:'
  - type: text
    content: «Nahoana no mihotakotaka ny firenena?
  - type: text
    content: Nahoana no mioko foana ny vahoaka?
  '26':
  - type: text
    content: Nivonon-kiady ny mpanjakan’ny tany,
  - type: text
    content: ary nivondrona ny manampahefana
  - type: text
    content: 'mba hanohitra ny Tompo sy ilay '
  - type: text
    content: Mesiany
  - type: note
    content: Sal 2.1-2, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '27':
  - type: text
    content: 'Marina tokoa fa i '
  - type: text
    content: Herôda
  - type: text
    content: ' sy i Pônty '
  - type: text
    content: Pilato
  - type: text
    content: ', niaraka tamin’ny olona '
  - type: text
    content: hafa firenena
  - type: text
    content: ' sy ny vahoaka '
  - type: text
    content: israelita
  - type: text
    content: ', dia nivondrona teto amin’ity tanàna ity mba hanohitra an’i Jesoa Mpanomponao masina, Izay natokanao ho Mesia'
  - type: note
    content: Jereo Lk 23.7-11; Mt 27.1-2; Is 61.1.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Notanterahin’izy ireo izay efa notendrenao rahateo tamin’ny herinao sy ny fikasanao. '
  '29':
  - type: text
    content: 'Tompo ô, hitanao ankehitriny ny fandrahonany, koa omeo anay mpanomponao ny hery hitoriana ny teninao amim-pahasahiana tokoa; '
  '3':
  - type: text
    content: 'Nosamborin’izy ireo i Petera sy i Jôhany, ary satria efa hariva ny andro, dia nataony am-ponja mandra-paharainan’ny andro. '
  '30':
  - type: text
    content: 'ahinjiro ny tananao hahasitrana ary hahatontosa '
  - type: text
    content: famantarana
  - type: text
    content: ' sy zava-mahagaga amin’ny anaran’i Jesoa ilay Mpanomponao masina.'
  '31':
  - type: text
    content: Rehefa avy nivavaka ireo mpino, dia nihovitrovitra ny trano niangonany ary feno Fanahy Masina izy rehetra ka nitory ny tenin’Andriamanitra tamim-pahasahiana.
  - type: heading
    content: Miombom-pananana ny mpino
  '32':
  - type: text
    content: Iray fo sy fanahy tokoa ireo mpino marobe ary tsy nisy nilaza ny fananany ho azy samirery, fa niara-nanana ny zavatra rehetra
  - type: note
    content: Ampit 2.44-45 sy nta.
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Tamin-kery lehibe no nijoroan’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' ho vavolombelona manambara fa nitsangana velona i Jesoa Tompo; ary fitahiam-be avy amin’Andriamanitra no teo amin’ny mpino rehetra. '
  '34':
  - type: text
    content: 'Tsy nisy orin-javatra teo aminy; fa ireo nanana tany na trano dia nivarotra izany, ary nitondra ny vola vidin’ny zavatra lafo, '
  '35':
  - type: text
    content: 'ka nanolotra izany teo anatrehan’ny apôstôly, dia nozaraina araka izay nilain’ny tsirairay. '
  '36':
  - type: text
    content: 'Ohatra i '
  - type: text
    content: Jôsefa
  - type: text
    content: ', levita teraka tany Sipra, izay nantsoin’ny apôstôly hoe Barnabà (izany hoe olona havanana amin’ny fampaherezana): '
  '37':
  - type: text
    content: i Jôsefa dia nanana saha izay namidiny, ka nanolotra ny vola vidiny teo anatrehan’ny apôstôly.
  '4':
  - type: text
    content: Maro kosa tamin’izay nihaino ny tenin’Andriamanitra no nino, ka tafakatra ho dimy arivo ny isan’ny vatan-dehilahy mpino.
  '5':
  - type: text
    content: 'Nony ampitson’iny vao nifamory tao Jerosalema ny manampahefana jiosy: dia ny '
  - type: text
    content: loholona
  - type: text
    content: ' sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'ary koa i Hanà '
  - type: text
    content: mpisorombe
  - type: text
    content: ' sy i Kaiàfa, i Jôhany sy i Aleksandra mbamin’izay rehetra havan’ny mpisorombe. '
  '7':
  - type: text
    content: 'Nampanatrehan-dry zareo i Petera sy i Jôhany sady nanontaniany hoe:'
  - type: text
    content: –Fahefana ahoana moa na amin’ny anaran’iza no nanaovanareo izany fanaratsiana izany?
  '8':
  - type: text
    content: 'Feno Fanahy Masina i Petera tamin’izay ka nanao hoe:'
  - type: text
    content: '–Ry mpifehy ny vahoaka sy ry loholona, '
  '9':
  - type: text
    content: 'raha adinina izahay anio satria nanasoa lehilahy kilemaina anankiray ary anontaniana ny fomba nahasitranany, '
