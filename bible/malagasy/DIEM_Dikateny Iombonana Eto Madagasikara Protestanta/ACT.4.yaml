    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Vantany vao afaka izy roa lahy, dia namonjy ireo namany ka nitantara izay rehetra voalazan’ny lohandoha-mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: '. '
