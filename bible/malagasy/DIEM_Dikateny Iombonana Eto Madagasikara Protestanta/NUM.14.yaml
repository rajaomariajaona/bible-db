document_id: NUM.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nandà tsy nety niditra an’i Kanahàna ny vahoaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandritra ny alina manontolo dia nikiakiaka sy nitomany avokoa ny vahoaka tafangona teo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandrahona hitora-bato azy roa lahy ny vahoaka iray manontolo; kanjo indro ny voninahitry ny TOMPO fa niseho tamin’ny Israelita rehetra teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nangata-pamelana ho an’ny vahoaka i Mosesy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandra-pahoviana no hanamavoan’ity vahoaka ity Ahy? Ary mandra-pahoviana no handavany tsy hino Ahy, na dia teo aza ny famantarana rehetra izay nataoko teo aminy? '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hamely azy amin’ny pesta Aho ka hamongotra azy; ianao kosa hataoko firenen-dehibe sy matanjaka noho izy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navalin’i Mosesy ny TOMPO:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatry ny Ejiptianina fa ny herinao no namoahanao ity vahoaka ity hiala teo aminy. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Notantarainy tamin’ny mponin’ity tany anoloanay ity izany. Koa dia fantatr’izy ireo fa Ianao TOMPO no momba ny vahoakanao ary IANAO mifanatri-tava aminy; ny rahonao dia mijanona eo amboniny hialofany; mialoha azy amin’ny andry rahona Ianao nony andro ary amin’ny andry afo kosa nony alina. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ankehitriny, raha indray hofongoranao ny vahoakanao, dia hiteny ireo firenena efa nahafantatra ny lazanao ka hanao hoe: '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Tsy afaka nitondra ny vahoakany ho any amin’ny tany izay efa nampanantenainy azy ny TOMPO, koa izany no nandringanany azy tany an-taniefitra.» '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa ankehitriny, Tompo ô, mitalaho aminao aho, asehoy ny herinao araka ny teninao hoe: '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: «Izaho no TOMPO Izay tsy mora tezitra sady be fitiavana fa mahazaka ny heloka sy ny fikomiana. Kanefa tsy afa-maina ny meloka, fa ny heloky ny olona kosa dia valiako amin’ny taranany hatramin’ny zafindohalika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 20.5-6; 34.6-7; Deot 5.9-10; 7.9-10.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tompo ô, araka ny halehiben’ny fitiavanao, dia mamelà ny fahotan’ny vahoakanao tahaka ny efa namelanao ny fahotany hatrany Ejipta ka hatraty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 13-19:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 32.11-14.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nimonomonona tamin’i Mosesy sy I Aharôna ny Israelita rehetra ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsara kokoa ho antsika ny maty tany Ejipta na koa maty tatỳ an-taniefitra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mamela azy araka ny fangatahanao Aho. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Kanefa velona Aho ary feno ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitra
    - type: text
      text: ' maha TOMPO Ahy ny tany tontolo, koa mianiana Aho fa tsy hisy hiditra amin’io tany io ireo olona ireo. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nahita ny voninahitro sy ny asa mahagaga nataoko tany Ejipta sy tany an-taniefitra izy ireo, nefa tsy nitsahatra naka fanahy Ahy tamin’ny tsy fihainoany ny teniko; '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: koa satria efa nanamavo Ahy izy, dia tsy hisy hahita ny tany izay nampanantenaiko ny razany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 21-23:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Heb 3.18.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa i Kaleba mpanompoko, izay nanam-panahy hafa ka tsy nisalasala nanaraka Ahy, dia hampidiriko any amin’ny tany efa nalehany; ary hahazo izany tany izany ny taranany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jos 14.9-12.
      marker-yv: yv-n
    - type: text
      text: ', '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa ny Hamalekita sy ny Kanahanita kosa honina amin’ny lemaka. Koa rahampitso, miverena indray ianareo ka mankanesa any an-taniefitra amin’ny lalana mankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ranomasin’ny Volotara
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanasazy ny vahoakany ny Tompo
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny tamin’i Mosesy sy i Aharôna indray ny TOMPO ka nanao hoe:'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Mandra-pahoviana no mbola handeferako fimonomononan’ity fiangonana ratsy ity amiko? Efa mankadilo ny sofiko ny fimonomononany amiko. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandehana lazao aminy hoe: «Velona Izaho TOMPO, ka mianiana fa araka ny teny izay reko taminareo ihany no hataoko aminareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Araka ny teny izay reko taminareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo and 2.
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho faty ka hiampatrampatra amin’ity taniefitra ity ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Heb 3.17.
      marker-yv: yv-n
    - type: text
      text: '. Ianareo rehetra izay nanaovana fanisana, dia ny roapolo taona no ho miakatra fahizany, no ho faty satria efa nimonomonona tamiko. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa nahoana isika no nentin’ny TOMPO ho lavon-tsabatra amin’ny tany toy izany? Ho lasan-ko babo avokoa ny vady aman-janatsika; koa tsy aleontsika ve miverina indray any Ejipta?
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mianiana Aho fa tsy hisy hiditra amin’ny tany izay efa nampanantenaiko hamponenana anareo ianareo, afa-tsy i Kaleba zanakalahin’i Jefonè sy i Josoa zanakalahin’i Nona; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny zanakareo madinika izay voalazanareo fa ho lasan-ko babo kosa dia hoentiko mankany; ireo no hahafantatra ny tany izay tsy noraharahainareo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianareo izany ho faty ka hiampatrampatra amin’ity taniefitra ity; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny zanakareo kosa dia ho mpiandry ondry atỳ mandritra ny efapolo taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'efapolo taona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Asa 7.36.
      marker-yv: yv-n
    - type: text
      text: '. Izy ireo no hizaka ny vokatry ny fivadihanareo mandrapahafatinareo rehetra atỳ an-taniefitra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efapolo andro no nisafoanareo ny tany; koa dia mandritra ny efapolo taona kosa no hitondranareo ny vokatry ny fahotanareo, izany hoe taona iray isaky ny andro iray. Ka dia ho fantatrareo tsara ny dikan’ny faniniako anareo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho TOMPO no efa niteny, ka mianiana Aho fa hataoko tokoa amin’ity fiangonana ratsy sy niodina tamiko ity izany: atỳ an-taniefitra no hiafarany sy hahafatesany.»'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao kosa ny amin’ny lehilahy izay nirahin’i Mosesy hisafo ny tany ka nony tafaverina, dia nampimonomonona ny fiangonana hanome tsiny an’i Mosesy: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'maty tampoka teo anatrehan’ny TOMPO ireny, satria nanao laza ratsy ny tany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Josoa zanakalahin’i Nona sy i Kaleba zanakalahin’i Jefonè no sisa velona tamin’ireo nandeha nisafo ny tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy nanoa indray ny vahoaka
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nolazain’i Mosesy tamin’ny Israelita rehetra izany teny izany, ka dia nalahelo mafy ny vahoaka. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifampilaza izy ireo nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka isika hanendry mpitarika, dia hiverina any Ejipta!
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampitso vao maraina, dia niakatra tany an-tendrombohitra izy ireo sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tena nanota tokoa izahay, fa izao kosa dia vonona hiakatra hankany amin’ny toerana voatondron’ny TOMPO.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona no anton’izao? Mandika ny baikon’ny TOMPO ianareo ka tsy hahomby amin’izany mihitsy! '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Aza miakatra mankany satria tsy momba anareo ny TOMPO fandrao horesen’ny fahavalonareo ianareo. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Eo anoloanareo ny Hamalekita sy ny Kanahanita, ka ho fatin’ny sabany ianareo. Efa niodina tamin’ny TOMPO ianareo, ka tsy homba anareo IZY.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola nikiry niakatra hankeny an-tampon-tendrombohitra ihany ireo Israelita; nefa na i Mosesy na ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina
    - type: text
      text: ' mirakitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanan’ny TOMPO
    - type: text
      text: ' dia samy tsy nihetsika teo an-toby. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nidinan’ny Hamalekita sy ny Kanahanita izay nonina tamin’izany tendrombohitra izany izy ireo ka notafihiny ary nenjehiny hatrany Hôrmà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.45 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hôrmà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tsy fantatra marina, nefa tokony ho 60 km atsimon’i Jerosalema. Somary eo atsinanan’i Beera-Seba no misy azy.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niankohoka tamin’ny tany teo anatrehan’ny fiangonan’ny Israelita rehetra vory teo i Mosesy sy Aharôna. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Josa zanakalahin’i Nona sy i Kaleba zanakalahin’i Jefonè izay samy anisan’ny nisafo tany kosa dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra ny fitafiany
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary niteny tamin’ny fiangonana israelita tsivakivolo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny tany izay nosafoinay dia tany tena tsara tokoa. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha ambinin’ny TOMPO isika, dia hoentiny any amin’io tany tondra-dronono sy tantely io ka homeny antsika izany. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa aza mikomy amin’ny Tompo ianareo; ary aza matahotra ny mponin’io tany io, fa tsy misy hataontsika indraim-bava akory ireo. Efa niala taminy ireo andriamanitra fiarovany, fa ny Tompo kosa momba antsika; koa aza matahotra azy ireny ianareo.
