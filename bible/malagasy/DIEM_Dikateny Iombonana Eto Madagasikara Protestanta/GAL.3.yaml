  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manohitra ireo fampanantenana nataon’Andriamanitra àry ve ny lalàna? Sanatria! Raha lalàna afaka mamelona no nomena, dia ny lalàna mihitsy no hahatonga ny olona ho marina eo imason’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanefa voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' fa voageja teo ambany fahefan’ny fahotana avokoa izao rehetra izao, hany ka ilay fanomezana nampanantenain’Andriamanitra dia hatolotra an’ireo mino, noho ny finoana niainan’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Talohan’ny hahatongavan’izany finoana izany, dia voagadra sy voageja eo ambany fahefan’ny lalàna izahay Jiosy mba hiandrandranay ny finoana izay efa hambara atỳ aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa ny lalàna dia nanjary mpitaiza anay mba hiandrandranay an’i Kristy, ka hahatonga anay ho marina eo imason’Andriamanitra noho ny finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Efa tonga kosa ankehitriny izany finoana izany, ka tsy fehezin’ny mpitaiza intsony izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
