    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany no nihatra tamin’i Kristy dia mba hahatafita amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' tafaray amin’i Kristy Jesoa ny fitahiana efa nampombain’Andriamanitra an’i Abrahama ary koa mba handraisantsika roa tonta, amin’ny alalan’ny finoana, ilay Fanahy Masina nampanantenain’Andriamanitra antsika!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny '
