    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 12.7.
    marker-yv: yv-n
  - type: text
    text: '», toy ny manondro tokana: dia i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izao no lazaiko: Nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' vita ara-pomba nataon’Andriamanitra mialoha; ary ny lalàna, niseho 430 taona tatỳ aoriana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 12.40.
    marker-yv: yv-n
  - type: text
    text: ', dia tsy hahafoana io fanekempihavanana io ka hahatonga ny fampanantenana tsy hanan-kery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa raha avy amin’ny lalàna ny lova omen’Andriamanitra, dia tsy avy amin’ny fampanantenana intsony; kanefa, ho an’i Abrahama, dia tamin’ny alalan’ny fampanantenana no nanomezan’Andriamanitra izany maimaimpoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Inona àry no anton’ny lalàna? Ny lalàna dia zavatra natovana mba hampiharihary ny fandikan-dalàna, mandra-piavin’ilay taranaka iantefan’ny fampanantenana. Fa ny lalàna dia natolotr’
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' teo an-tanan’ny mpanalalana anankiray'
