    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Fifan 27.26, voatsiahy araka ny dkt grika tranainy Septoazinta. –'
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 11: ny olo-marina noho ny finoana dia ho velona'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Hab 2.4): dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny olo-marina dia ho velona araka ny finoana
    - type: usfm
