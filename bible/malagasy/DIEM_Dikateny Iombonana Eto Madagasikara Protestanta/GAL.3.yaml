    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsy misaina ianareo, ry Galatianina! Iza moa no nanodoka anareo? Kanefa dia i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' voahombo tamin’ny hazofijaliana no naseho mazava teo imasonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izaho ihany no tiako ho fantatra avy aminareo: noho ianareo nanatanteraka ny lalàna ve nandraisanareo ny Fanahy Masina sa noho ianareo nihaino sy nino ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy misaina mihitsy ve ianareo no dia nanomboka tamin’ny herin’ny Fanahy Masina kanefa ankehitriny miafara amin’ny maha olombelona osa sy malemy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia ho very maina foana ve ny nahatsapanareo zava-dehibe toy ireny, raha ohatra ka ho very maina foana tokoa izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa manome anareo ny Fanahy Masina sy manefa asa mahery eo anivonareo àry Andriamanitra, moa ve noho ianareo manatanteraka ny lalàna no mahatonga izany sa noho ianareo mihaino sy mino ny Vaovao Mahafaly?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ': «Nino an’Andriamanitra i Abrahama ary nankatoavan’Andriamanitra azy ho marina izany!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa fantaro fa izay velona noho ny finoana no tena zanak’i Abrahama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsinjon’ny Soratra Masina rahateo fa ny finoana no hankatoavan’Andriamanitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' ho marina; noho izany, dia nambaran’ny Soratra Masina mialoha tamin’i Abrahama izao hafatra mahafaly izao: «Ao aminao no hombàn’Andriamanitra fitahiana ny firenen-drehetra'
