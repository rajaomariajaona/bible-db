  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ry havana, hiteny araka ny fanaon’ny besinimaro aho: na dia ny didim-pananana ataon’olona aza, rehefa vita ara-pomba, dia tsy azon’olona foanana na ampiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’i Abrahama sy tamin’ilay taranany kosa no nilazan’Andriamanitra ny fampanantenana. Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' dia tsy manao hoe «tamin’ireo taranany», toy ny nanondro maro; fa hoe «tamin’ilay taranakao'
  - type: usfm
