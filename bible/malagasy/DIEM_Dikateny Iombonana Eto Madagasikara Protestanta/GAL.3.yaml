    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nino i Abrahama ary nomban’Andriamanitra fitahiana; ary izay velona noho ny finoana dia hombàn’Andriamanitra fitahiana tahaka azy koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa izay rehetra miantehitra amin’ny fanatanterahana ny lalàna dia ianjadian’ny ozona, satria izao no voalazan’ny Soratra Masina: «Voaozona izay rehetra tsy maharitra manatanteraka ny zavatra rehetra voasoratra ao amin’ny bokin’ny lalàna.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Miharihary koa fa, raha amin’ny lalàna, dia tsy misy olona eken’Andriamanitra ho marina, satria hoy ny Soratra Masina hoe: «Ny olo-marina noho ny finoana dia ho velona!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny lalàna kosa dia tsy miantehitra amin’ny finoana fa izao no tenin’ny Soratra Masina: «Izay manatanteraka ny didy amam-pitsipika dia ho velona amin’izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
