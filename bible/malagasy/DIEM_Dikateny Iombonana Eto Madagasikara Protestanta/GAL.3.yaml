      children:
      - type: text
        text: 'natolotr’anjely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tahaka ny ataon’i Stefàna, i Paoly koa eto dia miantehitra amina fampianarana nifandovan’ny Jiosy (jereo Asa 7.53 sy nta). –Ny voalaza ho '
    - type: usfm
