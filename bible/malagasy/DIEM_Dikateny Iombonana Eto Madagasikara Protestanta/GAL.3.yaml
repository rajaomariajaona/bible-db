document_id: GAL.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Izay iray, na ny lalàna na ny finoana
  - type: text
    content: 'Tsy misaina ianareo, ry Galatianina! Iza moa no nanodoka anareo? Kanefa dia i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' voahombo tamin’ny hazofijaliana no naseho mazava teo imasonareo. '
  '10':
  - type: text
    content: 'Fa izay rehetra miantehitra amin’ny fanatanterahana ny lalàna dia ianjadian’ny ozona, satria izao no voalazan’ny Soratra Masina: «Voaozona izay rehetra tsy maharitra manatanteraka ny zavatra rehetra voasoratra ao amin’ny bokin’ny lalàna.» '
  '11':
  - type: text
    content: 'Miharihary koa fa, raha amin’ny lalàna, dia tsy misy olona eken’Andriamanitra ho marina, satria hoy ny Soratra Masina hoe: «Ny olo-marina noho ny finoana dia ho velona!» '
  '12':
  - type: text
    content: 'Ny lalàna kosa dia tsy miantehitra amin’ny finoana fa izao no tenin’ny Soratra Masina: «Izay manatanteraka ny didy amam-pitsipika dia ho velona amin’izany'
  - type: note
    content: 'Andinin-tSoratra Masina mifandraika amin’ny and 10-12: and 10: Fifan 27.26, voatsiahy araka ny dkt grika tranainy Septoazinta. –And 11: ny olo-marina noho ny finoana dia ho velona (jereo Hab 2.4): dkt hafa ny olo-marina dia ho velona araka ny finoana na hoe ny finoana no hahavelona ny olo-marina. (ampit Rm 1.17). –And 12: jereo Fisor 18.5; Rm 10.5.'
  - type: text
    content: .»
  '13':
  - type: text
    content: 'I Kristy dia nanavotra anay Jiosy ho afaka amin’ny ozona tanisain’ny lalàna; fa nanjary niharan’ny ozona Izy ho famonjena anay satria hoy ny Soratra Masina hoe: «Voaozona izay rehetra mihantona amin’ny hazo'
  - type: note
    content: Jereo Fifan 21.23 sy nta.
  - type: text
    content: '!» '
  '14':
  - type: text
    content: 'Izany no nihatra tamin’i Kristy dia mba hahatafita amin’ireo '
  - type: text
    content: hafa firenena
  - type: text
    content: ' tafaray amin’i Kristy Jesoa ny fitahiana efa nampombain’Andriamanitra an’i Abrahama ary koa mba handraisantsika roa tonta, amin’ny alalan’ny finoana, ilay Fanahy Masina nampanantenain’Andriamanitra antsika!'
  - type: heading
    content: Ny lalàna sy ny fampanantenana
  '15':
  - type: text
    content: 'Ry havana, hiteny araka ny fanaon’ny besinimaro aho: na dia ny didim-pananana ataon’olona aza, rehefa vita ara-pomba, dia tsy azon’olona foanana na ampiana. '
  '16':
  - type: text
    content: 'Tamin’i Abrahama sy tamin’ilay taranany kosa no nilazan’Andriamanitra ny fampanantenana. Ary ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' dia tsy manao hoe «tamin’ireo taranany», toy ny nanondro maro; fa hoe «tamin’ilay taranakao'
  - type: note
    content: Jereo Gen 12.7.
  - type: text
    content: '», toy ny manondro tokana: dia i '
  - type: text
    content: Kristy
  - type: text
    content: ' izany. '
  '17':
  - type: text
    content: 'Ary izao no lazaiko: Nisy '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' vita ara-pomba nataon’Andriamanitra mialoha; ary ny lalàna, niseho 430 taona tatỳ aoriana'
  - type: note
    content: Ampit Eks 12.40.
  - type: text
    content: ', dia tsy hahafoana io fanekempihavanana io ka hahatonga ny fampanantenana tsy hanan-kery. '
  '18':
  - type: text
    content: Fa raha avy amin’ny lalàna ny lova omen’Andriamanitra, dia tsy avy amin’ny fampanantenana intsony; kanefa, ho an’i Abrahama, dia tamin’ny alalan’ny fampanantenana no nanomezan’Andriamanitra izany maimaimpoana.
  '19':
  - type: text
    content: Inona àry no anton’ny lalàna? Ny lalàna dia zavatra natovana mba hampiharihary ny fandikan-dalàna, mandra-piavin’ilay taranaka iantefan’ny fampanantenana. Fa ny lalàna dia natolotr’
  - type: text
    content: anjely
  - type: text
    content: ' teo an-tanan’ny mpanalalana anankiray'
  - type: note
    content: 'natolotr’anjely: tahaka ny ataon’i Stefàna, i Paoly koa eto dia miantehitra amina fampianarana nifandovan’ny Jiosy (jereo Asa 7.53 sy nta). –Ny voalaza ho mpanalalana eto dia i Mosesy.'
  - type: text
    content: '; '
  '2':
  - type: text
    content: 'Izaho ihany no tiako ho fantatra avy aminareo: noho ianareo nanatanteraka ny lalàna ve nandraisanareo ny Fanahy Masina sa noho ianareo nihaino sy nino ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: '? '
  '20':
  - type: text
    content: kanefa ny mpanalalana dia tsy an’ny iray ihany, fa Andriamanitra kosa no iray ihany
  - type: note
    content: 'Andriamanitra kosa no iray ihany: ampit Fifan 6.4.'
  - type: text
    content: .
  - type: heading
    content: Ny anton’ny nisian’ny lalàna
  '21':
  - type: text
    content: 'Manohitra ireo fampanantenana nataon’Andriamanitra àry ve ny lalàna? Sanatria! Raha lalàna afaka mamelona no nomena, dia ny lalàna mihitsy no hahatonga ny olona ho marina eo imason’Andriamanitra. '
  '22':
  - type: text
    content: 'Kanefa voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' fa voageja teo ambany fahefan’ny fahotana avokoa izao rehetra izao, hany ka ilay fanomezana nampanantenain’Andriamanitra dia hatolotra an’ireo mino, noho ny finoana niainan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: .
  '23':
  - type: text
    content: 'Talohan’ny hahatongavan’izany finoana izany, dia voagadra sy voageja eo ambany fahefan’ny lalàna izahay Jiosy mba hiandrandranay ny finoana izay efa hambara atỳ aoriana. '
  '24':
  - type: text
    content: 'Koa ny lalàna dia nanjary mpitaiza anay mba hiandrandranay an’i Kristy, ka hahatonga anay ho marina eo imason’Andriamanitra noho ny finoana. '
  '25':
  - type: text
    content: Efa tonga kosa ankehitriny izany finoana izany, ka tsy fehezin’ny mpitaiza intsony izahay.
  '26':
  - type: text
    content: 'Noho ny finoana manko dia '
  - type: text
    content: zanak’Andriamanitra
  - type: text
    content: ' avokoa ianareo, satria tafaray amin’i Kristy Jesoa. '
  '27':
  - type: text
    content: 'Eny, ianareo rehetra izay natao '
  - type: text
    content: batisa
  - type: text
    content: ' mba ho tafaray amin’i Kristy Jesoa dia henika ny fiainan’i Kristy. '
  '28':
  - type: text
    content: 'Koa tsy misy intsony ny hoe Jiosy na '
  - type: text
    content: hafa firenena
  - type: text
    content: ', tsy misy intsony ny hoe mpanompo na tsy mpanompo, tsy misy intsony ny hoe lehilahy na vehivavy; fa olona iray ihany ianareo rehetra, noho ianareo tafaray amin’i Kristy Jesoa. '
  '29':
  - type: text
    content: Ary raha an’i Kristy ianareo, dia taranak’i Abrahama sy mpandova araka ny fampanantenana nataon’Andriamanitra
  - type: note
    content: Ampit Rm 4.13.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Tsy misaina mihitsy ve ianareo no dia nanomboka tamin’ny herin’ny Fanahy Masina kanefa ankehitriny miafara amin’ny maha olombelona osa sy malemy? '
  '4':
  - type: text
    content: 'Dia ho very maina foana ve ny nahatsapanareo zava-dehibe toy ireny, raha ohatra ka ho very maina foana tokoa izany? '
  '5':
  - type: text
    content: Rehefa manome anareo ny Fanahy Masina sy manefa asa mahery eo anivonareo àry Andriamanitra, moa ve noho ianareo manatanteraka ny lalàna no mahatonga izany sa noho ianareo mihaino sy mino ny Vaovao Mahafaly?
  '6':
  - type: text
    content: 'Izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Nino an’Andriamanitra i Abrahama ary nankatoavan’Andriamanitra azy ho marina izany!» '
  '7':
  - type: text
    content: 'Koa fantaro fa izay velona noho ny finoana no tena zanak’i Abrahama. '
  '8':
  - type: text
    content: 'Tsinjon’ny Soratra Masina rahateo fa ny finoana no hankatoavan’Andriamanitra ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' ho marina; noho izany, dia nambaran’ny Soratra Masina mialoha tamin’i Abrahama izao hafatra mahafaly izao: «Ao aminao no hombàn’Andriamanitra fitahiana ny firenen-drehetra'
  - type: note
    content: 'Andinin-tSoratra Masina mifandraika amin’ny and 6-8: and 6: Gen 15.6; Rm 4.3. –And 7: Rm 4.16. –And 8: Gen 12.3.'
  - type: text
    content: '!» '
  '9':
  - type: text
    content: Nino i Abrahama ary nomban’Andriamanitra fitahiana; ary izay velona noho ny finoana dia hombàn’Andriamanitra fitahiana tahaka azy koa.
