    - type: text
      text: '26'
  - type: text
    text: 'Noho ny finoana manko dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’Andriamanitra
  - type: text
    text: ' avokoa ianareo, satria tafaray amin’i Kristy Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eny, ianareo rehetra izay natao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' mba ho tafaray amin’i Kristy Jesoa dia henika ny fiainan’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa tsy misy intsony ny hoe Jiosy na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ', tsy misy intsony ny hoe mpanompo na tsy mpanompo, tsy misy intsony ny hoe lehilahy na vehivavy; fa olona iray ihany ianareo rehetra, noho ianareo tafaray amin’i Kristy Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary raha an’i Kristy ianareo, dia taranak’i Abrahama sy mpandova araka ny fampanantenana nataon’Andriamanitra
