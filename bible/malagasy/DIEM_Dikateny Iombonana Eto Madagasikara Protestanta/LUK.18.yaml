document_id: LUK.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana momba ilay mpitondratena sy ny mpitsara
  - type: text
    content: 'Nanaovan’i Jesoa '
  - type: text
    content: fanoharana
  - type: text
    content: ' avy eo ny '
  - type: text
    content: mpianany
  - type: text
    content: ' hanehoana fa tsy maintsy mivavaka lalandava, ka tsy tokony ho kivy na oviana na oviana. '
  '10':
  - type: text
    content: –Nisy olona roa lahy niakatra hivavaka teo an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ': ny anankiray '
  - type: text
    content: Farisianina
  - type: text
    content: ' ary ny anankiray '
  - type: text
    content: mpamory hetra
  - type: text
    content: '. '
  '11':
  - type: text
    content: Naka toerana ilay Farisianina ka nivavaka anakampony hoe
  - type: note
    content: 'Naka toerana... anakampony hoe: misy stf sasany ahitana hoe Naka toerana mitokana ilay Farisianina ka nivavaka toy izao:'
  - type: text
    content: ': «Andriamanitra ô, misaotra Anao aho fa tsy mba tahaka ny olona sasany izay mpangalatra, tsy marina sady mpaka vadin’olona, na tahaka io mpamory hetra io aza. '
  '12':
  - type: text
    content: 'Mifady hanina indroa isan-kerinandro aho ary manolotra ny ampahafolon’izay azoko rehetra.» '
  '13':
  - type: text
    content: 'Ilay mpamory hetra kosa nijanona terỳ lavidavitra, tsy sahy niandrandra ny lanitra akory, fa nandondòna ny tratrany matetika sady nanao hoe: «Andriamanitra ô, mba iantrao re aho, fa mpanota!» '
  '14':
  - type: text
    content: 'Izao no lazaiko aminareo: ity faharoa ity, fa tsy ilay voalohany, no nahazo fahamarinana avy tamin’Andriamanitra'
  - type: note
    content: tsara nahazo... Andriamanitra na hoe navelan’Andriamanitra heloka na nanjary tsara fihavanana tamin’Andriamanitra.
  - type: text
    content: nony nody. Satria izay rehetra manandra-tena, dia haetrin’Andriamanitra; fa izay manetry tena, dia hasandratr’Andriamanitra.
  - type: heading
    content: Tsofin’i Jesoa rano ny zazakely
  - type: heading
    content: (Jereo Mt 19.13-15; Mk 10.13-16)
  '15':
  - type: text
    content: 'Na ny zazakely mbola trotroina aza dia nentin’ny olona teo amin’i Jesoa mba hametrahany tanana. Hitan’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' ireto olona ireto ka noteneniny mafy. '
  '16':
  - type: text
    content: 'Nefa dia nasain’i Jesoa ho entina eo aminy ny zazakely sady hoy izy hoe:'
  - type: text
    content: '–Avelao ny zazakely hanatona Ahy ary aza raràna, satria an’ny toa azy ireny ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. '
  '17':
  - type: text
    content: Lazaiko marina aminareo fa na iza na iza tsy mandray ny Fanjakàn’Andriamanitra toy ny andraisan’ny zazakely azy, dia tsy ho tafiditra ao.
  - type: heading
    content: Ilay manampahefana mpanankarena
  - type: heading
    content: (Jereo Mt 19.16-30; Mk 10.17-31)
  '18':
  - type: text
    content: 'Ary nisy manampahefana jiosy nanontany an’i Jesoa hoe:'
  - type: text
    content: –Ry Mpampianatra tapitra ohatra ô, inona no tokony hataoko hananako anjara amin’ny fiaina-maharitra mandrakizay?
  '19':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Nahoana Aho no ataonao hoe tapitra ohatra? Tsy misy tapitra ohatra afa-tsy Andriamanitra irery ihany. '
  '2':
  - type: text
    content: 'Hoy Izy hoe:'
  - type: text
    content: '–Nisy mpitsara tsy nanan-tahotra an’Andriamanitra na hena-maso olona tao an-tanàna anankiray izay. '
  '20':
  - type: text
    content: 'Fantatrao ny didy hoe: «Aza maka vadin’olona; aza mamono olona; aza mangalatra; aza manao vavolombelona tsy marina; hajao ny rainao sy ny reninao'
  - type: note
    content: Jereo Eks 20.12-16; Deot 5.16-20.
  - type: text
    content: '!»'
  '21':
  - type: text
    content: 'Dia hoy ilay manampahefana hoe:'
  - type: text
    content: –Izany rehetra izany dia efa voatandriko hatramin’ny fahatanorako!
  '22':
  - type: text
    content: 'Nandre izany i Jesoa ka nanao taminy hoe:'
  - type: text
    content: '–Zavatra iray no mbola tsy ampy aminao: amidio avokoa ny fanananao rehetra ka zarao amin’ny mahantra ny vidiny, dia hanana rakitra any an-danitra ianao; raha efa izany, dia avia hiaraka amiko!'
  '23':
  - type: text
    content: 'Vao nandre izany kosa ralehilahy, dia nanjary nalahelo erỳ, satria tena mpanankarena izy. '
  '24':
  - type: text
    content: 'Ary nahita azy nalahelo toy izany i Jesoa ka nanao hoe:'
  - type: text
    content: '–Sarotra mihitsy amin’ny mpanankarena ny miditra ao amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. '
  '25':
  - type: text
    content: Eny, moramora kokoa ny idiran’ny rameva amin’ny vodifanjaikely noho ny idiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra
  - type: note
    content: 'moramora... Fanjakàn’Andriamanitra: dkt hafa moramora kokoa ny idiran’ny tadimahazaka amin’ny vodifanjaikely noho ny idiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra.'
  - type: text
    content: .
  '26':
  - type: text
    content: 'Dia hoy ny olona nandre izany:'
  - type: text
    content: –Koa iza àry no mety ho voavonjy?
  '27':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Ny tsy vitan’olombelona, vitan’Andriamanitra.
  '28':
  - type: text
    content: 'Hoy kosa i Petera:'
  - type: text
    content: –Jereo ange! Izahay dia efa nahafoy izay mba anay ka niaraka taminao!
  '29':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: '–Lazaiko marina aminareo fa tsy misy olona nahafoy trano na vady na mpiray tampo na ray aman-dreny na zanaka noho ny Fanjakàn’Andriamanitra '
  '3':
  - type: text
    content: 'Nisy koa tao amin’io tanàna io vehivavy anankiray mpitondratena, niverimberina tao amin’ilay mpitsara nanao hoe: «Omeo rariny amin’ilay miady amiko aho!» '
  '30':
  - type: text
    content: ka tsy hahazo be lavitra amin’izao etỳ izao, ary ny fiaina-maharitra mandrakizay amin’ny andro ho avy.
  - type: heading
    content: Ambaran’i Jesoa fanintelony ny hahafatesany sy ny hitsanganany ho velona
  - type: heading
    content: (Jereo Mt 20.17-19; Mk 10.32-34)
  '31':
  - type: text
    content: 'Nalain’i Jesoa ho eo aminy kosa ny 12 lahy ka nilazany hoe:'
  - type: text
    content: '–Miakatra ho any Jerosalema àry izao isika, ka ho tanteraka avokoa izay voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' tamin’ny alalan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' momba ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Eny, hatolotra ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' Izy, ka hoesoiny, hisetrasetrany, hororany; '
  '33':
  - type: text
    content: ary rehefa nokapohiny, dia hovonoiny ho faty; kanefa hitsangana velona amin’ny andro fahatelo.
  '34':
  - type: text
    content: 'Tsy misy azon’ireto '
  - type: text
    content: mpianatra
  - type: text
    content: ' anefa izany, fa teny miafina taminy ka tsy fantany izay nolazain’i Jesoa.'
  - type: heading
    content: Sitranin’i Jesoa ilay mpangataka jamba
  - type: heading
    content: (Jereo Mt 20.29-34; Mk 10.46-52)
  '35':
  - type: text
    content: 'Rehefa mby teo akaikin’i Jerikao i Jesoa, dia nisy jamba anankiray efa nitalapetraka teo an-tsisin-dalana nangataka. '
  '36':
  - type: text
    content: 'Henony nihaohao ny vahoaka mitanjozotra ka nanontaniany hoe: «Inona izany?» '
  '37':
  - type: text
    content: 'Nampahalalain’ny olona izy fa i Jesoa avy any Nazareta no nandalo. '
  '38':
  - type: text
    content: 'Koa velona antso amin’izay izy nanao hoe:'
  - type: text
    content: '–Ry Jesoa, '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: ' ô, mamindrà fo amiko!'
  '39':
  - type: text
    content: 'Norahonan’ireo olona lohalalana ralehilahy hangina, fa vao mainka koa niantsoantso mafy hoe:'
  - type: text
    content: –Ry Zanak’i Davida ô, mamindrà fo amiko!
  '4':
  - type: text
    content: 'Elabe ilay mpitsara tsy niraika; nefa nony farany, dia nanao anakampo hoe: «Marina tokoa fa raha izaho dia tsy manan-tahotra an’Andriamanitra na hena-maso olona. '
  '40':
  - type: text
    content: 'Niato i Jesoa ary nasainy hoentina eo aminy izy, ka nony tonga teo akaikiny dia nanontaniany hoe:'
  '41':
  - type: text
    content: –Inona no tianao hataoko aminao?
  - type: text
    content: 'Ka novalian’ilay jamba hoe:'
  - type: text
    content: –Tompo ô, ny hampahiratra ahy!
  '42':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Mahirata, ny finoanao no nahasitrana anao!
  '43':
  - type: text
    content: Dia nahiratra teo no ho eo ihany izy, ary lasa nanaraka an’i Jesoa sady nanome voninahitra an’Andriamanitra. Ny vahoaka rehetra koa, raha nahita, dia nidera an’Andriamanitra.
  '5':
  - type: text
    content: Kanefa mandreraka ahy ny ataon-dravehivavy ity, ka homeko rariny izy mba tsy hiverimberina foana hanorisory ahy!»
  '6':
  - type: text
    content: 'Ary hoy ny Tompo:'
  - type: text
    content: '–Henoy kely ny ambaran’ilay mpitsara ratsy fanahy! '
  '7':
  - type: text
    content: Ka dia Andriamanitra indray ve no tsy hanome rariny ny olom-boafidiny mitaraina andro aman’alina aminy? Ary hampiandry lava azy ireo ve Izy
  - type: note
    content: '...andro aman’alina aminy? Ary hampiandry lava azy ireo ve Izy? dkt hafa ...andro aman’alina, na dia hampiandry azy ireo aza Izy?'
  - type: text
    content: '? '
  '8':
  - type: text
    content: 'Lazaiko aminareo fa hanome rariny azy faingana Andriamanitra. Kanefa rahatrizay tonga ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', moa hahita finoana eto an-tany ve Izy?'
  - type: heading
    content: Fanoharana momba ilay Farisianina sy ilay mpamory hetra
  '9':
  - type: text
    content: 'Nanao izao '
  - type: text
    content: fanoharana
  - type: text
    content: ' izao kosa i Jesoa ho an’ireo olona natoky tena ho marina ka nanaratsy ny sasany:'
