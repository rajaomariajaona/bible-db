document_id: LUK.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ilay mpitondratena sy ny mpitsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanaovan’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' avy eo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' hanehoana fa tsy maintsy mivavaka lalandava, ka tsy tokony ho kivy na oviana na oviana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy Izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nisy mpitsara tsy nanan-tahotra an’Andriamanitra na hena-maso olona tao an-tanàna anankiray izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nisy koa tao amin’io tanàna io vehivavy anankiray mpitondratena, niverimberina tao amin’ilay mpitsara nanao hoe: «Omeo rariny amin’ilay miady amiko aho!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elabe ilay mpitsara tsy niraika; nefa nony farany, dia nanao anakampo hoe: «Marina tokoa fa raha izaho dia tsy manan-tahotra an’Andriamanitra na hena-maso olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Kanefa mandreraka ahy ny ataon-dravehivavy ity, ka homeko rariny izy mba tsy hiverimberina foana hanorisory ahy!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy ny Tompo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Henoy kely ny ambaran’ilay mpitsara ratsy fanahy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ka dia Andriamanitra indray ve no tsy hanome rariny ny olom-boafidiny mitaraina andro aman’alina aminy? Ary hampiandry lava azy ireo ve Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: '...andro aman’alina aminy? Ary hampiandry lava azy ireo ve Izy? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '...andro aman’alina, na dia hampiandry azy ireo aza Izy?'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lazaiko aminareo fa hanome rariny azy faingana Andriamanitra. Kanefa rahatrizay tonga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ', moa hahita finoana eto an-tany ve Izy?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoharana momba ilay Farisianina sy ilay mpamory hetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanao izao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' izao kosa i Jesoa ho an’ireo olona natoky tena ho marina ka nanaratsy ny sasany:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: –Nisy olona roa lahy niakatra hivavaka teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ': ny anankiray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' ary ny anankiray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpamory hetra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Naka toerana ilay Farisianina ka nivavaka anakampony hoe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Naka toerana... anakampony hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Naka toerana mitokana ilay Farisianina ka nivavaka toy izao:'
    marker-yv: yv-n
  - type: text
    text: ': «Andriamanitra ô, misaotra Anao aho fa tsy mba tahaka ny olona sasany izay mpangalatra, tsy marina sady mpaka vadin’olona, na tahaka io mpamory hetra io aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mifady hanina indroa isan-kerinandro aho ary manolotra ny ampahafolon’izay azoko rehetra.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ilay mpamory hetra kosa nijanona terỳ lavidavitra, tsy sahy niandrandra ny lanitra akory, fa nandondòna ny tratrany matetika sady nanao hoe: «Andriamanitra ô, mba iantrao re aho, fa mpanota!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lazaiko aminareo: ity faharoa ity, fa tsy ilay voalohany, no nahazo fahamarinana avy tamin’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.14 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: tsara nahazo... Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: navelan’Andriamanitra heloka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nanjary tsara fihavanana tamin’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: nony nody. Satria izay rehetra manandra-tena, dia haetrin’Andriamanitra; fa izay manetry tena, dia hasandratr’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsofin’i Jesoa rano ny zazakely
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 19.13-15; Mk 10.13-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Na ny zazakely mbola trotroina aza dia nentin’ny olona teo amin’i Jesoa mba hametrahany tanana. Hitan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' ireto olona ireto ka noteneniny mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nefa dia nasain’i Jesoa ho entina eo aminy ny zazakely sady hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avelao ny zazakely hanatona Ahy ary aza raràna, satria an’ny toa azy ireny ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lazaiko marina aminareo fa na iza na iza tsy mandray ny Fanjakàn’Andriamanitra toy ny andraisan’ny zazakely azy, dia tsy ho tafiditra ao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay manampahefana mpanankarena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 19.16-30; Mk 10.17-31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nisy manampahefana jiosy nanontany an’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Mpampianatra tapitra ohatra ô, inona no tokony hataoko hananako anjara amin’ny fiaina-maharitra mandrakizay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana Aho no ataonao hoe tapitra ohatra? Tsy misy tapitra ohatra afa-tsy Andriamanitra irery ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fantatrao ny didy hoe: «Aza maka vadin’olona; aza mamono olona; aza mangalatra; aza manao vavolombelona tsy marina; hajao ny rainao sy ny reninao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.12-16; Deot 5.16-20.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy ilay manampahefana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izany rehetra izany dia efa voatandriko hatramin’ny fahatanorako!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nandre izany i Jesoa ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Zavatra iray no mbola tsy ampy aminao: amidio avokoa ny fanananao rehetra ka zarao amin’ny mahantra ny vidiny, dia hanana rakitra any an-danitra ianao; raha efa izany, dia avia hiaraka amiko!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vao nandre izany kosa ralehilahy, dia nanjary nalahelo erỳ, satria tena mpanankarena izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nahita azy nalahelo toy izany i Jesoa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sarotra mihitsy amin’ny mpanankarena ny miditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Eny, moramora kokoa ny idiran’ny rameva amin’ny vodifanjaikely noho ny idiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'moramora... Fanjakàn’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: moramora kokoa ny idiran’ny tadimahazaka amin’ny vodifanjaikely noho ny idiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy ny olona nandre izany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Koa iza àry no mety ho voavonjy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny tsy vitan’olombelona, vitan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy kosa i Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Jereo ange! Izahay dia efa nahafoy izay mba anay ka niaraka taminao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy i Jesoa tamin’ny mpianany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina aminareo fa tsy misy olona nahafoy trano na vady na mpiray tampo na ray aman-dreny na zanaka noho ny Fanjakàn’Andriamanitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ka tsy hahazo be lavitra amin’izao etỳ izao, ary ny fiaina-maharitra mandrakizay amin’ny andro ho avy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jesoa fanintelony ny hahafatesany sy ny hitsanganany ho velona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 20.17-19; Mk 10.32-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nalain’i Jesoa ho eo aminy kosa ny 12 lahy ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Miakatra ho any Jerosalema àry izao isika, ka ho tanteraka avokoa izay voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' tamin’ny alalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Eny, hatolotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' Izy, ka hoesoiny, hisetrasetrany, hororany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ary rehefa nokapohiny, dia hovonoiny ho faty; kanefa hitsangana velona amin’ny andro fahatelo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tsy misy azon’ireto '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' anefa izany, fa teny miafina taminy ka tsy fantany izay nolazain’i Jesoa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay mpangataka jamba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 20.29-34; Mk 10.46-52)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Rehefa mby teo akaikin’i Jerikao i Jesoa, dia nisy jamba anankiray efa nitalapetraka teo an-tsisin-dalana nangataka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Henony nihaohao ny vahoaka mitanjozotra ka nanontaniany hoe: «Inona izany?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nampahalalain’ny olona izy fa i Jesoa avy any Nazareta no nandalo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Koa velona antso amin’izay izy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Jesoa, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’i Davida
  - type: text
    text: ' ô, mamindrà fo amiko!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Norahonan’ireo olona lohalalana ralehilahy hangina, fa vao mainka koa niantsoantso mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Zanak’i Davida ô, mamindrà fo amiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Niato i Jesoa ary nasainy hoentina eo aminy izy, ka nony tonga teo akaikiny dia nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: –Inona no tianao hataoko aminao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’ilay jamba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompo ô, ny hampahiratra ahy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mahirata, ny finoanao no nahasitrana anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Dia nahiratra teo no ho eo ihany izy, ary lasa nanaraka an’i Jesoa sady nanome voninahitra an’Andriamanitra. Ny vahoaka rehetra koa, raha nahita, dia nidera an’Andriamanitra.
