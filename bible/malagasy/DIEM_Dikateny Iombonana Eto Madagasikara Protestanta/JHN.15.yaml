document_id: JHN.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jesoa no tena voaloboka
  - type: text
    content: –Izaho no tena voaloboka
  - type: note
    content: Ampit Is 5.1-4; Sal 80.9-20; Ezek 15.1-8; 19.10-14.
  - type: text
    content: '; ary ny Raiko no mpamboly. '
  '10':
  - type: text
    content: Raha mitandrina ireo didiko ianareo, dia hitoetra ao amin’izany fitiavako anareo izany, tahaka ny nitandremako ireo didin’ny Raiko sy itoerako ao amin’ny fitiavana Ahy.
  '11':
  - type: text
    content: Izany no voalazako taminareo, dia mba ho ao aminareo ny hafaliako ary mba ho feno ny hafalianareo
  - type: note
    content: Ampit Is 9.2; 35.10.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Izao no didiko: mifankatiava ianareo tahaka ny nitiavako anareo. '
  '13':
  - type: text
    content: 'Tsy misy manam-pitiavana lehibe kokoa noho ny mahafoy ny ainy hamonjy ny sakaizany. '
  '14':
  - type: text
    content: 'Ianareo no sakaizako, raha manatanteraka izay andidiako anareo: '
  '15':
  - type: text
    content: 'tsy hataoko hoe mpanompo intsony ianareo, satria ny mpanompo tsy mahalala izay ataon’ny tompony; fa efa ataoko hoe sakaiza ianareo, satria izay rehetra reko tamin’ny Raiko no nampahafantariko anareo. '
  '16':
  - type: text
    content: 'Tsy ianareo no nifidy Ahy, fa Izaho no nifidy anareo sady nanendry anareo mba handehananareo sy hahavokaranareo ary haharetan’ny vokatrareo; hany ka na inona na inona angatahinareo amin’ny Ray noho ny anarako, dia homeny anareo. '
  '17':
  - type: text
    content: 'Koa izao no andidiako anareo: mifankatiava ianareo.'
  - type: heading
    content: Ankahalain’izao tontolo izao i Jesoa mbamin’ireo mpomba Azy
  '18':
  - type: text
    content: –Raha ankahalain’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' ianareo, dia fantaro fa Izaho no efa nankahalainy talohanareo. '
  '19':
  - type: text
    content: 'Raha naman’izao tontolo izao ianareo, dia hotiavin’izao tontolo izao satria azy. Saingy Izaho efa nifidy anareo hiavaka amin’izao tontolo izao, dia ankahalain’izao tontolo izao ianareo. '
  '2':
  - type: text
    content: 'Ny sampana rehetra izay tafaray amiko nefa tsy mamokatra dia esorin’ny Raiko; ary ny sampana rehetra izay mamokatra kosa, dioviny mba hamokatra bebe kokoa. '
  '20':
  - type: text
    content: 'Tsarovy ny teny izay nolazaiko taminareo hoe: «Ny mpanompo tsy lehibe noho ny tompony'
  - type: note
    content: Ampit Mt 10.24; Lk 6.40; Jôh 13.16.
  - type: text
    content: '.» Raha nanenjika Ahy ry zareo, dia hanenjika anareo koa; raha nitandrina ny teniko izy ireo, dia hitandrina ny teninareo koa. '
  '21':
  - type: text
    content: 'Fa izany rehetra izany dia hataony aminareo noho ny amiko, satria tsy fantany Ilay naniraka Ahy. '
  '22':
  - type: text
    content: 'Raha toa tsy tonga Aho ka tsy niteny taminy, dia tsy ho nanam-pahotana ry zareo; ankehitriny kosa dia tsy manana fialan-tsiny izy ireo amin’ny fahotany. '
  '23':
  - type: text
    content: 'Izay mankahala Ahy dia mankahala ny Raiko ihany koa. '
  '24':
  - type: text
    content: 'Raha toa ireo asa izay tsy nataon’olona na iza na iza no tsy nataoko taminy, dia tsy ho nanam-pahotana izy ireo; ankehitriny kosa, efa nahita ny asa nataoko ireo sady efa nankahala Ahy sy ny Raiko. '
  '25':
  - type: text
    content: 'Tonga izany mba hahatanteraka ny teny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Nankahalainy tsy amin’antony Aho'
  - type: note
    content: Sal 35.19; 69.5.
  - type: text
    content: .»
  '26':
  - type: text
    content: 'Ho tonga ilay Mpampahery anareo, dia ilay Fanahy fahamarinana Izay mivoaka avy any amin’ny Ray: Izy no hirahiko ho etỳ aminareo avy any amin’ny Ray, ary Izy no ho vavolombelona hanambara Ahy. '
  '27':
  - type: text
    content: Ary ianareo koa dia vavolombelona hanambara Ahy, satria miaraka amiko hatramin’ny voalohany ianareo!
  '3':
  - type: text
    content: 'Madio izao ianareo noho ny teny izay nolazaiko taminareo. '
  '4':
  - type: text
    content: 'Aoka hiray amiko hatrany ianareo toy ny iraisako aminareo. Ny sampana tsy afa-mamokatra ho azy raha tsy miray amin’ny voaloboka hatrany; dia toy izany koa ianareo: tsy afa-mamokatra, raha tsy miray amiko hatrany. '
  '5':
  - type: text
    content: 'Izaho no voaloboka; ianareo no sampana. Izay miray amiko hatrany, toy ny iraisako aminy, no mamokatra be; satria raha misaraka amiko ianareo, dia tsy afa-manao na inona na inona. '
  '6':
  - type: text
    content: 'Raha misy olona tsy miray amiko hatrany, dia ariana any ivelany tahaka ny sampana izy, ka mihamaina; ary angonina ireo sampana maina ka atsipy ao anaty afo, dia may. '
  '7':
  - type: text
    content: 'Raha miray amiko hatrany ianareo ka mitoetra ao anatinareo ny teniko, dia angataho izay zavatra tianareo na inona na inona, fa ho tonga aminareo izany. '
  '8':
  - type: text
    content: 'Ny ahazoan’ny Raiko voninahitra, dia ianareo mamokatra be sady tonga '
  - type: text
    content: mpianatro
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Tahaka ny nitiavan’ny Ray Ahy no nitiavako anareo koa; mitoera ao amin’izany fitiavako anareo izany. '
