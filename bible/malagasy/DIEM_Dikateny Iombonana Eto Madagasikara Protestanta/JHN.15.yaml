document_id: JHN.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jesoa no tena voaloboka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: –Izaho no tena voaloboka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 5.1-4; Sal 80.9-20; Ezek 15.1-8; 19.10-14.
      marker-yv: yv-n
    - type: text
      text: '; ary ny Raiko no mpamboly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha mitandrina ireo didiko ianareo, dia hitoetra ao amin’izany fitiavako anareo izany, tahaka ny nitandremako ireo didin’ny Raiko sy itoerako ao amin’ny fitiavana Ahy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izany no voalazako taminareo, dia mba ho ao aminareo ny hafaliako ary mba ho feno ny hafalianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 9.2; 35.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Izao no didiko: mifankatiava ianareo tahaka ny nitiavako anareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tsy misy manam-pitiavana lehibe kokoa noho ny mahafoy ny ainy hamonjy ny sakaizany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ianareo no sakaizako, raha manatanteraka izay andidiako anareo: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'tsy hataoko hoe mpanompo intsony ianareo, satria ny mpanompo tsy mahalala izay ataon’ny tompony; fa efa ataoko hoe sakaiza ianareo, satria izay rehetra reko tamin’ny Raiko no nampahafantariko anareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tsy ianareo no nifidy Ahy, fa Izaho no nifidy anareo sady nanendry anareo mba handehananareo sy hahavokaranareo ary haharetan’ny vokatrareo; hany ka na inona na inona angatahinareo amin’ny Ray noho ny anarako, dia homeny anareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa izao no andidiako anareo: mifankatiava ianareo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ankahalain’izao tontolo izao i Jesoa mbamin’ireo mpomba Azy
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: –Raha ankahalain’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' ianareo, dia fantaro fa Izaho no efa nankahalainy talohanareo. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Raha naman’izao tontolo izao ianareo, dia hotiavin’izao tontolo izao satria azy. Saingy Izaho efa nifidy anareo hiavaka amin’izao tontolo izao, dia ankahalain’izao tontolo izao ianareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny sampana rehetra izay tafaray amiko nefa tsy mamokatra dia esorin’ny Raiko; ary ny sampana rehetra izay mamokatra kosa, dioviny mba hamokatra bebe kokoa. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tsarovy ny teny izay nolazaiko taminareo hoe: «Ny mpanompo tsy lehibe noho ny tompony'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 10.24; Lk 6.40; Jôh 13.16.
      marker-yv: yv-n
    - type: text
      text: '.» Raha nanenjika Ahy ry zareo, dia hanenjika anareo koa; raha nitandrina ny teniko izy ireo, dia hitandrina ny teninareo koa. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa izany rehetra izany dia hataony aminareo noho ny amiko, satria tsy fantany Ilay naniraka Ahy. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha toa tsy tonga Aho ka tsy niteny taminy, dia tsy ho nanam-pahotana ry zareo; ankehitriny kosa dia tsy manana fialan-tsiny izy ireo amin’ny fahotany. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izay mankahala Ahy dia mankahala ny Raiko ihany koa. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Raha toa ireo asa izay tsy nataon’olona na iza na iza no tsy nataoko taminy, dia tsy ho nanam-pahotana izy ireo; ankehitriny kosa, efa nahita ny asa nataoko ireo sady efa nankahala Ahy sy ny Raiko. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tonga izany mba hahatanteraka ny teny voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hoe: «Nankahalainy tsy amin’antony Aho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 35.19; 69.5.
      marker-yv: yv-n
    - type: text
      text: .»
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ho tonga ilay Mpampahery anareo, dia ilay Fanahy fahamarinana Izay mivoaka avy any amin’ny Ray: Izy no hirahiko ho etỳ aminareo avy any amin’ny Ray, ary Izy no ho vavolombelona hanambara Ahy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary ianareo koa dia vavolombelona hanambara Ahy, satria miaraka amiko hatramin’ny voalohany ianareo!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Madio izao ianareo noho ny teny izay nolazaiko taminareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka hiray amiko hatrany ianareo toy ny iraisako aminareo. Ny sampana tsy afa-mamokatra ho azy raha tsy miray amin’ny voaloboka hatrany; dia toy izany koa ianareo: tsy afa-mamokatra, raha tsy miray amiko hatrany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izaho no voaloboka; ianareo no sampana. Izay miray amiko hatrany, toy ny iraisako aminy, no mamokatra be; satria raha misaraka amiko ianareo, dia tsy afa-manao na inona na inona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Raha misy olona tsy miray amiko hatrany, dia ariana any ivelany tahaka ny sampana izy, ka mihamaina; ary angonina ireo sampana maina ka atsipy ao anaty afo, dia may. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Raha miray amiko hatrany ianareo ka mitoetra ao anatinareo ny teniko, dia angataho izay zavatra tianareo na inona na inona, fa ho tonga aminareo izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny ahazoan’ny Raiko voninahitra, dia ianareo mamokatra be sady tonga '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatro
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tahaka ny nitiavan’ny Ray Ahy no nitiavako anareo koa; mitoera ao amin’izany fitiavako anareo izany. '
