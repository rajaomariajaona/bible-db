document_id: HAB.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no hafatra nampitondrain’Andriamanitra an’i Habakòka '
  - type: text
    content: mpaminany
  - type: text
    content: .
  - type: heading
    content: Ny mpaminany miantso vonjy amin’Andriamanitra
  '10':
  - type: text
    content: Tsy raharahany akory izay mpanjaka,
  - type: text
    content: ary dia ihomehezany ny mpanapaka.
  - type: text
    content: Tsy mampihontsina azy izay tanànamimanda;
  - type: text
    content: tovon-tany no asavovony, dia afany ireny.
  '11':
  - type: text
    content: Mitombo hafanampo izy,
  - type: text
    content: ka mbola manao heloka hatrany
  - type: note
    content: 'Dkt hafa: Mihavao ny hafanampony ary manohy ny diany izy sady mihameloka hatrany.'
  - type: text
    content: .
  - type: text
    content: Izany heriny izany no andriamaniny.
  - type: heading
    content: Antso vaovao ataon’ny mpaminanin’Andriamanitra
  '12':
  - type: text
    content: Hatrizay hatrizay tokoa dia Ianao no TOMPO,
  - type: text
    content: Ianao no Andriamanitro masina sady tsy mety maty
  - type: note
    content: 'tsy mety maty araka ny lovan-tsofina tranainy teo amin’ny Jiosy; ny RM dia manao hoe: tsy ho faty izahay.'
  - type: text
    content: '!'
  - type: text
    content: Ry TOMPO Vatolampy miaro ahy ô,
  - type: text
    content: notendrenao sy nohatanjahinao
  - type: text
    content: ny Babilônianina fahavalonay
  - type: text
    content: mba ho famaizana sy fananarana anay.
  '13':
  - type: text
    content: Nefa madio loatra ny masonao ka tsy mahajery ny ratsy;
  - type: text
    content: ary tsy tantinao koa ny mitazana fahoriana.
  - type: text
    content: Koa nahoana no jerenao fotsiny izay ataon’ny mpamitaka?
  - type: text
    content: Ary nahoana no mangina Ianao, Andriamanitro ô,
  - type: text
    content: raha aripaky ny olon-dratsy ny marina noho izy?
  '14':
  - type: text
    content: Nahoana re ny olombelona no ataonao
  - type: text
    content: toy ny trondro any an-dranomasina
  - type: text
    content: dia toy ireo biby mifanaretsaka tsy misy mpitarika?
  '15':
  - type: text
    content: Toy ny trondro azom-pintana na voafandrika am-bovo
  - type: text
    content: na voasarika amin’ny harato tarihina
  - type: text
    content: no amaboan’ny Babilônianina ireo olombelona;
  - type: text
    content: ary ifaliany sy iravoravoany tokoa izany.
  '16':
  - type: text
    content: 'Koa izany haratony izany no anaovany '
  - type: text
    content: sorona
  - type: text
    content: izay dorany hanetona ho mari-panajana azy,
  - type: text
    content: satria fitaovana ahazoany sakafo matsiro sy matavy.
  '17':
  - type: text
    content: Mbola hanatsoaka sabatra
  - type: note
    content: 'hanatsoaka sabatra: araka ny stf iray momba ny bokin’i Habakòka, hita tao Komrano; ny RM dia manao hoe hanaisotra ny ao anaty haratony.'
  - type: text
    content: hatrany ve ry zareo,
  - type: text
    content: ka handringana tsisy indrafo ny firenena maro?
  '2':
  - type: text
    content: Mandra-pahoviana, TOMPO ô,
  - type: text
    content: no hiantsoako vonjy aminao
  - type: text
    content: nefa tsy henoinao aho?
  - type: text
    content: Mandra-pahoviana tokoa re
  - type: text
    content: no hitarainako ny amin’ny herisetra
  - type: text
    content: nefa tsy vonjenao izahay?
  '3':
  - type: text
    content: Nahoana no ampahitanao faharatsiana maro aho?
  - type: text
    content: Nahoana no mijery fotsiny ny fahoriana Ianao?
  - type: text
    content: Fa ny hany manodidina ahy dia famoretana sy herisetra;
  - type: text
    content: ary fitsarana sy fifandirana no mipoaka hatraiza hatraiza
  - type: note
    content: Dkt hafa raha misy fitsarana, mihamafy ny fifandirana.
  - type: text
    content: .
  '4':
  - type: text
    content: Noho izany, dia tsy manan-kery ny lalàna;
  - type: text
    content: ary tsy mivoaka mandresy ny rariny.
  - type: text
    content: Tsy mahaleo ny ratsy fanahy ny olo-marina,
  - type: text
    content: ka izany no ivoahan’ny fitsarana miangatra.
  - type: heading
    content: 'Ny valin-tenin’Andriamanitra: fanafihan’ny Babilônianina'
  '5':
  - type: text
    content: «Banjinonareo ny hafa firenena, hoy ny Tompo.
  - type: text
    content: Ary aoka ianareo ho talanjona tokoa
  - type: text
    content: fa amin’izao andronareo izao no hanaovana asa
  - type: text
    content: izay tsy hinoanareo na dia holazaina aminareo aza
  - type: note
    content: Toy izay ny hoe ny hafa firenena ny dkt grika tranainy kosa dia manao hoe ny mpaniratsira; ary toy izay ny hoe hanaovana izy kosa manao hoe hanaovako. Ity and ity dia raisin’ny Asa 13.41 amin’ny endrika ahitana azy ao amin’ny dkt grika tranainy.
  - type: text
    content: .
  '6':
  - type: text
    content: Fa indro antsoiko ny Babilônianina
  - type: note
    content: Ny fanjakana babilônianina vaovao dia nanomboka tamin’ny taona 626 ka hatramin’ny taona 539 tal J.K. ary dia nivelatra nahazo iny faritra atsinanana iray manontolo amoron’i Mediteranea iny, indrindra fa tamin’ny andro nanjakan’i Nebôkadnetsara.
  - type: text
    content: ','
  - type: text
    content: dia ilay firenena masiaka sy tsy mivatravatra;
  - type: text
    content: mitety faritra midadasika ireo
  - type: text
    content: hakàny ny tanin’ny sasany.
  '7':
  - type: text
    content: Mahatsiravina sy mahatahotra izy,
  - type: text
    content: fa ny tenany ihany no fenitra
  - type: text
    content: ipoiran’ny zony amam-pahefàny.
  '8':
  - type: text
    content: Faingam-pandeha noho ny leôparda ny soavaliny,
  - type: text
    content: ary kinga noho ny amboadia miremby takariva.
  - type: text
    content: Avy lavitra ny mpitaingin-tsoavaliny no mitsamboamboatra
  - type: text
    content: ary mirimorimo toy ny voromahery miantoraka amin-kaza.
  '9':
  - type: text
    content: Handroba no ahatongavan’izy rehetra,
  - type: text
    content: ka ijereny fatratra ny eo anoloany
  - type: note
    content: 'Dkt hafa momba ity andalana ity: Mahamay toy ny rivotra avy any atsinanana ny fiaviny.'
  - type: text
    content: ary anangonany babo maro tahaka ny fasika.
