document_id: 2CH.34,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakàn’i Jôsià. Fanitsiana ara-pivavahana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 22.1-2; 23.4-20)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Feno valo taona i Jôsià fony tonga mpanjaka; ary naharitra 31 taona no nanjakany tao Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 3.6.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natolotr’izy telo lahy teo am-pelatanan’ny mpianto-draharaha voatendry hiandraikitra ny tranon’ny TOMPO izany vola izany, ary nampiasain’ireo tamin’ny asa fanamboarana sy fanamafisana io trano io; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nanomezany karama ny mpandrafitra sy mpandatsa-bato izany sy nividianany vato voapaika na hazo sakamandimby sady nanatevenana ny efitrano izay navelan’ireo mpanjakan’i Joda hihasimba. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahatoky tokoa ny fomba fiasan’ny olona, teo ambany fifehezan’ireto levita ireto: dia i Jahata sy i Hôbadià tamin’ny taranak’i Merarỳ, ary koa i Zakarià sy i Mesolama tamin’ny taranak’i Kehata. Nisy levita hafa, izay samy mpiangaly zava-maneno avokoa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toa nisy asa sasantsasany izay narahina mozika mingadongadona ny fanatontosana azy.
      marker-yv: yv-n
    - type: text
      text: ', '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka natao tonian’ny mpitondra entana sy mpibaiko ny mpiasa rehetra araka ny anton-draharahany avy; ary tamin’ny levita koa dia nisy mpanoratra sy mpifehy ary mpiandry varavarana.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’iny famoahana ny vola naterina tao an-tranon’ny TOMPO iny, no hitan’i Hilkià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' ny Bokin’ny Lalànan’ny TOMPO'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Araka ny fironan-kevitry ny mpanoratra ny 1 sy 2 Tantara, dia tokony ho ny Pentateoka (Genesỳ –Deoterônômy) no '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bokin’ny Lalàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Ampit 2 Mp 22.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', izay nampitaina tamin’ny alalan’i Mosesy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Safàna mpanoratra no nitenenan’i Hilkià ka nilazany fa ny Bokin’ny Lalàna dia hitany tao an-tranon’ny TOMPO. Dia natolotr’i Hilkià an’i Safàna ny boky; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Safàna kosa nitondra izany ho any amin’ny mpanjaka sady nanao tatitra taminy nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ireo mpanomponao dia eo am-panatontosana ny andraikitra rehetra nasainao nosahaniny. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Efa voaangon’ireo mpisorona ny vola izay azo tao an-tranon’ny TOMPO ka natolony teo am-pelatanan’ny mpianto-draharaha sy teo am-pelatanan’ny mpiasa.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilazan’i Safàna koa ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Misy boky nomen’i Hilkià mpisorombe ahy ity!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary novakiny teo anatrehan’ny mpanjaka izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nasain’i Jôsià hanontaniana i Holdà mpaminanivavy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 22.11-20a)
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ren’i Jôsià mpanjaka ny teny tao amin’ny Lalàna, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra fitafiana
    - type: text
      text: ' izy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanao izay mahitsy eo imason’ny TOMPO i Jôsià; ka narahiny ny toetran’i Davida razambeny, fa tsy mba nivily hiala tamin’izany izy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nomeny baiko i Hilkià, sy i Ahikama zanakalahin’i Safàna, ary i Habdôna zanakalahin’i Mikà mbamin’i Safàna mpitantsoratra sy i Hasaià mpandraharahany ka nilazany hoe:'
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha anontanio ny TOMPO ho ahy sy ho an’ny olona sisa tavela eto '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' sy Joda ny amin’ny teny raketin’io boky vao hita io. Ireo razantsika manko tsy nitandrina ny tenin’ny TOMPO sady tsy nanao araka izay rehetra voasoratra anatin’io boky io, hany ka mafy ny fahatezerana atosakin’ny TOMPO amintsika.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany amin’i Holdà '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminanivavy
    - type: text
      text: ' i Hilkià sy ireo olon-kafa voatendrin’ny mpanjaka. I Holdà, izay nonina tao Antanambaon’i Jerosalema, dia vadin’i Saloma zanakalahin’i Tôkehata sy zafikelin’i Hasrà sady mpitahiry ny fanamiana masina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 22.14 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' tao an-tempoly. Koa rehefa niresaka tamin-dravehivavy ry i Hilkià, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nasainy miteny amin’ny mpaniraka azy hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Israely: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‹Indro Aho hahatonga loza amin’ity tanàna ity sy ny mponiny, dia ny ozona rehetra voasoratra ao anatin’ilay boky izay novakîna teo anatrehan’ny mpanjakan’i Joda. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nandao Ahy manko ny mponin’i Jerosalema sady nampanetona sorona ho an’ny andriamani-kafa, ary nampahatezitra Ahy tamin’ny sampy rehetra nataon’ny tanany. Izany no hitosahan’ny fahatezerako amin’ity tanàna ity ka tsy mbola hitoniany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny mpanjakan’i Joda, izay naniraka anareo hanontany Ahy TOMPO, dia anambarao fa Izaho TOMPO Andriamanitr’i Israely dia milaza izao: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’ny teny izay efa renao, dia nino anatra ianao ka niaiky heloka teo anatrehako, rehefa nihaino ny teniko ny amin’ity tanàna ity sy ny mponiny. Ary satria niaiky heloka teo anatrehako ianao ka nandriatra fitafiana sady nitomany, dia efa nihaino anao koa Aho; teny hentitra avy amiko TOMPO izany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro hangoniko any amin’ny razanao ianao ary ho voapetraka am-pasanao hombàm-piadanana, ka tsy mba hahita maso ny loza rehetra hamelezako ity tanàna ity sy ny mponiny.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nohavaozin’i Jôsià ny fanekempihavanana tamin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 22.20b–23.3)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitondra izany valinteny izany ho an’ny mpanjaka i Hilkià sy ireo namany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandefa iraka i Jôsià hanainga tsy an-kanavaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’i Joda sy i Jerosalema mba ho vory. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona fahavalo nanjakàny, fony i Jôsià mbola zatovolahy, no nanombohany nitady an’ilay Andriamanitr’i Davida razambeny; ary efatra taona taorian’izany kosa no nanombohany nanadio ny fanjakàn’i Joda sy ny tanànan’i Jerosalema mba tsy hisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: toeram-panasinana
    - type: text
      text: ' na tsatokazo fanajana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserà
    - type: text
      text: ', ary tsy hisy sarin-tsampy voasokitra na mivongana intsony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niaraka nankao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' ireo mbamin’ny lehilahy rehetra sy ny mponina rehetra tao Jerosalema, izany hoe ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ary ny sarambabem-bahoaka rehetra na kely na lehibe. Novakin’i Jôsià teo anatrehan’ny besinimaro ny teny rehetra tao anatin’ny bokin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ', dia ilay boky izay hita tao an-tranon’ny TOMPO. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsangana teo ambonin’ny lampihazo voatokana ho azy ny mpanjaka, dia nanavao fanekempihavanana teo anatrehan’ny TOMPO mba hanarahan’ny tsirairay ny TOMPO sy hitandrina ny didiny sy ny fepetrany ary ny lalànany amin’ny fony manontolo sy ny fanahiny manontolo, ka hampiharany ny tenin’ny fanekempihavanana izay voasoratra ao amin’io boky io. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia nasainy nanome toky ny olona rehetra izay tao Jerosalema mbamin’ny Benjaminita. Izany no nahatonga ny mponin’i Jerosalema hitondra tena araka ny fanekempihavanana nataon’Andriamanitra, dia ilay Andriamanitry ny razany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’izay dia nofoanan’i Jôsià avokoa ny fombam-tsampy maharikoriko tamin’ny tany manontolo izay an’ny Israelita sady notereny ny mponina rehetra teo amin’i Israely mba hanompo ny TOMPO Andriamaniny. Tamin’ny andro rehetra niainan’i Jôsià dia tsy mba nialan’ny olona ilay TOMPO Andriamanitry ny razany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noravana teo anatrehan’i Jôsià ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: 'n’ireo andriamanitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: '; nazerany ny fandoroana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' teo amboniny; novakivakiny ny tsatokazo fanajana an’i Aserà mbamin’ireo sarin-tsampy voasokitra na mivongana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 33.3-7; 2 Mp 21.3-7.
      marker-yv: yv-n
    - type: text
      text: '; ary notorotoroiny ho lasan-ko vovoka izany rehetra izany ka nafafiny teny amin’ny fasan’ireo efa nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' tamin’ireny andriamani-tsiizy ireny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy aza taolan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' amin’ny sampy mihitsy no naroso hodorana teo amin’ny alitara fisoronany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 13.2.
      marker-yv: yv-n
    - type: text
      text: '. Dia toy izany no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nanadiovan
    - type: text
      text: ’i Jôsià ny fanjakàn’i Joda sy ny tanànan’i Jerosalema.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tany amin’ny tanàna manasita sy efraimita ary simehônita ka hatrany amin’ny tanàna naftalita mbamin’ny faritra manodidina azy avy '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia noravan’i Jôsià koa ny alitara; nokapakapainy ny tsatokazo fanajana an’i Aserà ary ny sarin-tsampy voasokitra mba hotorotoroina ho lasan-ko vovoka. Nazerany ny fandoroana vovo-javamanitra eran’ny tanin’i Israely manontolo; izay vao niverina ho any Jerosalema izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahitan’ny mpisorombe ny bokin’ny lalàna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 22.3-10)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taona faha-18 nanjakàn’i Jôsià, iny izy mbola '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manadio
    - type: text
      text: ' ny tany sy ny tempoly iny, dia i Safàna zanakalahin’i Atsalià ary koa i Mahaseià komandin’ny tanàna sy i Jôà zanakalahin’i Jôahaza sady mpitondratenin’ny mpanjaka no nirahiny mba hamboatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' Andriamaniny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany amin’i Hilkià mpisorombe izy telo lahy ary nanome azy ny vola naterin’ny olona tao an-tranon’Andriamanitra; io vola io dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' mpiandry varavarana no nanangona azy tamin’ny Manasita sy ny Efraimita mbamin’ny Israelita tavaratra sisa rehetra, ary koa tamin’ny Jodeanina sy ny Benjaminita rehetra mbamin’ny mponin’i Jerosalema. '
