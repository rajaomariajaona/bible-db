document_id: 2CH.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Jôsià. Fanitsiana ara-pivavahana
  - type: heading
    content: (Jereo 2 Mp 22.1-2; 23.4-20)
  - type: text
    content: Feno valo taona i Jôsià fony tonga mpanjaka; ary naharitra 31 taona no nanjakany tao Jerosalema
  - type: note
    content: Jereo Jer 3.6.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Natolotr’izy telo lahy teo am-pelatanan’ny mpianto-draharaha voatendry hiandraikitra ny tranon’ny TOMPO izany vola izany, ary nampiasain’ireo tamin’ny asa fanamboarana sy fanamafisana io trano io; '
  '11':
  - type: text
    content: 'dia nanomezany karama ny mpandrafitra sy mpandatsa-bato izany sy nividianany vato voapaika na hazo sakamandimby sady nanatevenana ny efitrano izay navelan’ireo mpanjakan’i Joda hihasimba. '
  '12':
  - type: text
    content: 'Nahatoky tokoa ny fomba fiasan’ny olona, teo ambany fifehezan’ireto levita ireto: dia i Jahata sy i Hôbadià tamin’ny taranak’i Merarỳ, ary koa i Zakarià sy i Mesolama tamin’ny taranak’i Kehata. Nisy levita hafa, izay samy mpiangaly zava-maneno avokoa'
  - type: note
    content: Toa nisy asa sasantsasany izay narahina mozika mingadongadona ny fanatontosana azy.
  - type: text
    content: ', '
  '13':
  - type: text
    content: ka natao tonian’ny mpitondra entana sy mpibaiko ny mpiasa rehetra araka ny anton-draharahany avy; ary tamin’ny levita koa dia nisy mpanoratra sy mpifehy ary mpiandry varavarana.
  '14':
  - type: text
    content: 'Tamin’iny famoahana ny vola naterina tao an-tranon’ny TOMPO iny, no hitan’i Hilkià '
  - type: text
    content: mpisorona
  - type: text
    content: ' ny Bokin’ny Lalànan’ny TOMPO'
  - type: note
    content: Araka ny fironan-kevitry ny mpanoratra ny 1 sy 2 Tantara, dia tokony ho ny Pentateoka (Genesỳ –Deoterônômy) no Bokin’ny Lalàna. Ampit 2 Mp 22.8 sy nta.
  - type: text
    content: ', izay nampitaina tamin’ny alalan’i Mosesy. '
  '15':
  - type: text
    content: 'I Safàna mpanoratra no nitenenan’i Hilkià ka nilazany fa ny Bokin’ny Lalàna dia hitany tao an-tranon’ny TOMPO. Dia natolotr’i Hilkià an’i Safàna ny boky; '
  '16':
  - type: text
    content: 'i Safàna kosa nitondra izany ho any amin’ny mpanjaka sady nanao tatitra taminy nilaza hoe:'
  - type: text
    content: '–Ireo mpanomponao dia eo am-panatontosana ny andraikitra rehetra nasainao nosahaniny. '
  '17':
  - type: text
    content: Efa voaangon’ireo mpisorona ny vola izay azo tao an-tranon’ny TOMPO ka natolony teo am-pelatanan’ny mpianto-draharaha sy teo am-pelatanan’ny mpiasa.
  '18':
  - type: text
    content: 'Dia nilazan’i Safàna koa ny mpanjaka hoe:'
  - type: text
    content: –Misy boky nomen’i Hilkià mpisorombe ahy ity!
  - type: text
    content: Ary novakiny teo anatrehan’ny mpanjaka izany.
  - type: heading
    content: Nasain’i Jôsià hanontaniana i Holdà mpaminanivavy
  - type: heading
    content: (Jereo 2 Mp 22.11-20a)
  '19':
  - type: text
    content: 'Nony ren’i Jôsià mpanjaka ny teny tao amin’ny Lalàna, dia '
  - type: text
    content: nandriatra fitafiana
  - type: text
    content: ' izy; '
  '2':
  - type: text
    content: Nanao izay mahitsy eo imason’ny TOMPO i Jôsià; ka narahiny ny toetran’i Davida razambeny, fa tsy mba nivily hiala tamin’izany izy.
  '20':
  - type: text
    content: 'ary nomeny baiko i Hilkià, sy i Ahikama zanakalahin’i Safàna, ary i Habdôna zanakalahin’i Mikà mbamin’i Safàna mpitantsoratra sy i Hasaià mpandraharahany ka nilazany hoe:'
  '21':
  - type: text
    content: '–Ndeha anontanio ny TOMPO ho ahy sy ho an’ny olona sisa tavela eto '
  - type: text
    content: Israely
  - type: text
    content: ' sy Joda ny amin’ny teny raketin’io boky vao hita io. Ireo razantsika manko tsy nitandrina ny tenin’ny TOMPO sady tsy nanao araka izay rehetra voasoratra anatin’io boky io, hany ka mafy ny fahatezerana atosakin’ny TOMPO amintsika.'
  '22':
  - type: text
    content: 'Dia nankany amin’i Holdà '
  - type: text
    content: mpaminanivavy
  - type: text
    content: ' i Hilkià sy ireo olon-kafa voatendrin’ny mpanjaka. I Holdà, izay nonina tao Antanambaon’i Jerosalema, dia vadin’i Saloma zanakalahin’i Tôkehata sy zafikelin’i Hasrà sady mpitahiry ny fanamiana masina'
  - type: note
    content: Jereo 2 Mp 22.14 sy nta.
  - type: text
    content: ' tao an-tempoly. Koa rehefa niresaka tamin-dravehivavy ry i Hilkià, '
  '23':
  - type: text
    content: 'dia nasainy miteny amin’ny mpaniraka azy hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Israely: '
  '24':
  - type: text
    content: '‹Indro Aho hahatonga loza amin’ity tanàna ity sy ny mponiny, dia ny ozona rehetra voasoratra ao anatin’ilay boky izay novakîna teo anatrehan’ny mpanjakan’i Joda. '
  '25':
  - type: text
    content: 'Efa nandao Ahy manko ny mponin’i Jerosalema sady nampanetona sorona ho an’ny andriamani-kafa, ary nampahatezitra Ahy tamin’ny sampy rehetra nataon’ny tanany. Izany no hitosahan’ny fahatezerako amin’ity tanàna ity ka tsy mbola hitoniany. '
  '26':
  - type: text
    content: 'Fa ny mpanjakan’i Joda, izay naniraka anareo hanontany Ahy TOMPO, dia anambarao fa Izaho TOMPO Andriamanitr’i Israely dia milaza izao: '
  '27':
  - type: text
    content: 'Ny amin’ny teny izay efa renao, dia nino anatra ianao ka niaiky heloka teo anatrehako, rehefa nihaino ny teniko ny amin’ity tanàna ity sy ny mponiny. Ary satria niaiky heloka teo anatrehako ianao ka nandriatra fitafiana sady nitomany, dia efa nihaino anao koa Aho; teny hentitra avy amiko TOMPO izany. '
  '28':
  - type: text
    content: Indro hangoniko any amin’ny razanao ianao ary ho voapetraka am-pasanao hombàm-piadanana, ka tsy mba hahita maso ny loza rehetra hamelezako ity tanàna ity sy ny mponiny.»
  - type: heading
    content: Nohavaozin’i Jôsià ny fanekempihavanana tamin’Andriamanitra
  - type: heading
    content: (Jereo 2 Mp 22.20b–23.3)
  - type: text
    content: 'Dia nitondra izany valinteny izany ho an’ny mpanjaka i Hilkià sy ireo namany. '
  '29':
  - type: text
    content: 'Ary nandefa iraka i Jôsià hanainga tsy an-kanavaka ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Joda sy i Jerosalema mba ho vory. '
  '3':
  - type: text
    content: 'Tamin’ny taona fahavalo nanjakàny, fony i Jôsià mbola zatovolahy, no nanombohany nitady an’ilay Andriamanitr’i Davida razambeny; ary efatra taona taorian’izany kosa no nanombohany nanadio ny fanjakàn’i Joda sy ny tanànan’i Jerosalema mba tsy hisy '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' na tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: ', ary tsy hisy sarin-tsampy voasokitra na mivongana intsony. '
  '30':
  - type: text
    content: Dia niaraka nankao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' ireo mbamin’ny lehilahy rehetra sy ny mponina rehetra tao Jerosalema, izany hoe ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: ' ary ny sarambabem-bahoaka rehetra na kely na lehibe. Novakin’i Jôsià teo anatrehan’ny besinimaro ny teny rehetra tao anatin’ny bokin’ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ', dia ilay boky izay hita tao an-tranon’ny TOMPO. '
  '31':
  - type: text
    content: 'Ary nitsangana teo ambonin’ny lampihazo voatokana ho azy ny mpanjaka, dia nanavao fanekempihavanana teo anatrehan’ny TOMPO mba hanarahan’ny tsirairay ny TOMPO sy hitandrina ny didiny sy ny fepetrany ary ny lalànany amin’ny fony manontolo sy ny fanahiny manontolo, ka hampiharany ny tenin’ny fanekempihavanana izay voasoratra ao amin’io boky io. '
  '32':
  - type: text
    content: 'Avy eo dia nasainy nanome toky ny olona rehetra izay tao Jerosalema mbamin’ny Benjaminita. Izany no nahatonga ny mponin’i Jerosalema hitondra tena araka ny fanekempihavanana nataon’Andriamanitra, dia ilay Andriamanitry ny razany. '
  '33':
  - type: text
    content: Taorian’izay dia nofoanan’i Jôsià avokoa ny fombam-tsampy maharikoriko tamin’ny tany manontolo izay an’ny Israelita sady notereny ny mponina rehetra teo amin’i Israely mba hanompo ny TOMPO Andriamaniny. Tamin’ny andro rehetra niainan’i Jôsià dia tsy mba nialan’ny olona ilay TOMPO Andriamanitry ny razany.
  '4':
  - type: text
    content: 'Noravana teo anatrehan’i Jôsià ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ireo andriamanitra '
  - type: text
    content: Bahala
  - type: text
    content: '; nazerany ny fandoroana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' teo amboniny; novakivakiny ny tsatokazo fanajana an’i Aserà mbamin’ireo sarin-tsampy voasokitra na mivongana'
  - type: note
    content: Jereo 33.3-7; 2 Mp 21.3-7.
  - type: text
    content: '; ary notorotoroiny ho lasan-ko vovoka izany rehetra izany ka nafafiny teny amin’ny fasan’ireo efa nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' tamin’ireny andriamani-tsiizy ireny. '
  '5':
  - type: text
    content: 'Nisy aza taolan’ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' amin’ny sampy mihitsy no naroso hodorana teo amin’ny alitara fisoronany'
  - type: note
    content: Jereo 1 Mp 13.2.
  - type: text
    content: '. Dia toy izany no '
  - type: text
    content: nanadiovan
  - type: text
    content: ’i Jôsià ny fanjakàn’i Joda sy ny tanànan’i Jerosalema.
  '6':
  - type: text
    content: 'Tany amin’ny tanàna manasita sy efraimita ary simehônita ka hatrany amin’ny tanàna naftalita mbamin’ny faritra manodidina azy avy '
  '7':
  - type: text
    content: dia noravan’i Jôsià koa ny alitara; nokapakapainy ny tsatokazo fanajana an’i Aserà ary ny sarin-tsampy voasokitra mba hotorotoroina ho lasan-ko vovoka. Nazerany ny fandoroana vovo-javamanitra eran’ny tanin’i Israely manontolo; izay vao niverina ho any Jerosalema izy.
  - type: heading
    content: Ny nahitan’ny mpisorombe ny bokin’ny lalàna
  - type: heading
    content: (Jereo 2 Mp 22.3-10)
  '8':
  - type: text
    content: 'Tamin’ny taona faha-18 nanjakàn’i Jôsià, iny izy mbola '
  - type: text
    content: manadio
  - type: text
    content: ' ny tany sy ny tempoly iny, dia i Safàna zanakalahin’i Atsalià ary koa i Mahaseià komandin’ny tanàna sy i Jôà zanakalahin’i Jôahaza sady mpitondratenin’ny mpanjaka no nirahiny mba hamboatra ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' Andriamaniny. '
  '9':
  - type: text
    content: 'Dia nankany amin’i Hilkià mpisorombe izy telo lahy ary nanome azy ny vola naterin’ny olona tao an-tranon’Andriamanitra; io vola io dia ny '
  - type: text
    content: levita
  - type: text
    content: ' mpiandry varavarana no nanangona azy tamin’ny Manasita sy ny Efraimita mbamin’ny Israelita tavaratra sisa rehetra, ary koa tamin’ny Jodeanina sy ny Benjaminita rehetra mbamin’ny mponin’i Jerosalema. '
