document_id: EZK.38,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Loza mananontanona an’i Gôga
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Amin’izany andro izany dia hisy hevitra maro ho tonga ao an-tsainao ka hamorona teti-dratsy ianao. '
  '11':
  - type: text
    content: 'Hanapa-kevitra ianao fa hiakatra hamely ireo olona finaritra miaina am-pilaminana avokoa ao amin’ny tany izay tsy mba misy tanàna voahodidina manda na manana vavahady mihidy. '
  '12':
  - type: text
    content: Hankao ianao mba handroba sy handravarava ary hamely ireo tanàna izay efa rava taloha saingy onenana indray ankehitriny; hankao ianao hamely vahoaka iray nangonina avy any amin’ny firenen-kafa, ka nihary biby fiompy sy fananana indray, ary monina eo amin’ny foiben’izao tontolo izao
  - type: note
    content: 'foiben’izao tontolo izao: toa i Jerosalema izany, ampit 5.5.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Hanontany anao ny mponina ao Sebà sy Dedàna ary koa ireo mpandranto rehetra any Tarsisy na any amin’ireo tanàna akaikiny ka hanao hoe
  - type: note
    content: 'Sebà: fanjakana arabo, jereo 1 Mp 10.1; Sal 72.10. –Dedàna: jereo ny naoty momba ny 25.13. –Tarsisy: jereo ny naoty momba ny 27.12. –ireo tanàna akaikiny: araka ny dkt grika tranainy izany; fa ny RM kosa manao hoe sy ny liona tanorany (teny mety manondro ny mpanjaka, jereo 19.2-3).'
  - type: text
    content: ': ‹Moa handroba sy handrava ve no namorianao ny tafikao? Moa hangorona volafotsy sy volamena ary handroba biby fiompy sy fananana ka hahazo babo betsaka ve no nahatongavanao?›'
  '14':
  - type: text
    content: «Koa ijoroy ny maha-
  - type: text
    content: mpaminany
  - type: text
    content: ' anao, ry ilay taranak’olombelona, ary ambarao amin’i Gôga fa izao no lazain’ny Tompo ANDRIANANAHARY: Amin’ny andro hiainan’i Israely vahoakako am-pilaminana no hiainganao'
  - type: note
    content: 'hiainganao: araka ny dkt tranainy grika izany; fa ny RM kosa manao hoe hahafantaranao izany.'
  - type: text
    content: '; '
  '15':
  - type: text
    content: 'ary ho tonga avy any amin’ny taninao any am-parany avaratra ianao, arahin’ny miaramila avy amin’ny firenena maro; samy mitaingin-tsoavaly avokoa ianareo ka mivondrona ho tafika goavana sy mahery. '
  '16':
  - type: text
    content: Hanafika an’i Israely vahoakako ianao, ka hanarona ny taniny toy ny andian-drahona matevina. Any aoriana be any no hisehoan’izany. Haniraka anao hanafika ny taniko Aho, ry Gôga, mba hieken’ny hafa firenena fa Izaho no Andriamanitra masina; ary ianao no fitaovana hanehoako izany eo imasony amin’ny hamelezako anao.
  '17':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Ianao no ilay nambarako hatry ny fahiny elabe, fony Aho nandidy ireo mpanompoko, dia ny mpaminanin’i Israely, hilaza ny hafatro nandritra ny taona maro; ianao no nasaiko tonga hamely ny fireneny. '
  '18':
  - type: text
    content: 'Nefa amin’ny andro izay hamelezanao tokoa an’i Israely, ry Gôga, dia ho romotry ny hatezerana Aho; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '19':
  - type: text
    content: 'Noho ny fahasaro-piaroko sy ny fahatezerako mirehitra dia mianiana Aho fa amin’izay andro izay dia hisy horohoron-tany mahatsiravina hamely ny tanin’i Israely. '
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, mitodiha manandrify an’i Gôga, filoha faratampon’ny vahoakan’i Mesèka sy i Tobala, any amin’ny tanin’i Magôga
  - type: note
    content: 'Mesèka sy Tobala: jereo 27.13 sy nta. –Ny anarana hoe Gôga sy tanin’i Magôga izay miseho eto sy ao amin’ny toko 39 ary ao amin’ny Gen 10.2-3 sy ao amin’ny Apôk 20.8 dia mifono hevi-miafina. Toa filazana an’ohatra ny fahavalo izy ireo ka tsy tokony hokarohina ny misy azy ara-jeôgrafia.'
  - type: text
    content: ', ka ijoroy ny maha-mpaminany anao manoloana azy. '
  '20':
  - type: text
    content: Koa na ny trondro any an-dranomasina na ny voro-manidina na ny bibidia na ny bibikely isan-karazany mihetsiketsika amin’ny tany na ny olombelona rehetra eny ambonin’ny tany dia samy hangorohoro eo anatrehako. Ny tendrombohitra hietry, ny harana hikoa ary ny manda hirodana
  - type: note
    content: Ireo dia famantarana mampiavaka ny andron’ny fitsaran’Andriamanitra, jereo Jer 4.24; Is 2.10; Jl 4.16.
  - type: text
    content: '. '
  '21':
  - type: text
    content: Ary ianao dia hampihorohoroiko amin’ny fomba maro
  - type: note
    content: Araka ny dkt grika tranainy izany, fa ny RM kosa manao hoe hiantso ady Aho hamelezana anao eny amin’ny tendrombohitro rehetra eny.
  - type: text
    content: '; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Hifamono ny miaramilanao. '
  '22':
  - type: text
    content: 'Hofaiziko amin’ny areti-mifindra sy amin’ny fandringanana ianao. Harotsako aminao sy amin’ny tafikao ary amin’ireo firenena maro mpomba anao ny oram-be mivatravatra sy ny havandra arahina solifara mivaivay. '
  '23':
  - type: text
    content: Toy izany no hanehoako eo imason’ny firenen-kafa marobe fa Izaho dia Andriamanitra lehibe sady masina; amin’izay dia hoeken’ireo fa Izaho no TOMPO.
  '3':
  - type: text
    content: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: Hirotsaka an-tsehatra hamely anao Aho, ry Gôga filoha faratampon’ny vahoakan’i Mesèka sy i Tobala. '
  '4':
  - type: text
    content: 'Hasiako farango vy eo amin’ny valanoranonao mba hitarihako anao an-keriny. Hotereko hivoaka ny taninao ianao sy ny tafikao manontolo, dia ny soavaly sy ny mpitaingina azy samy mareva-pitafiana mbamin’ny miaramila marobe samy mirongo ampinga sy sabatra. '
  '5':
  - type: text
    content: Hiaraka aminao ny miaramilan’i Persia sy i Etiôpia ary i Poto
  - type: note
    content: 'Poto: jereo 27.10 sy nta.'
  - type: text
    content: ', samy mirongo ampinga sy fiarovan-doha avokoa; '
  '6':
  - type: text
    content: toy izany koa ny antoko miaramila rehetra avy any Gômera sy avy any Bety-Tôgarmà
  - type: note
    content: 'Gômera sy Bety-Tôgarmà: dia ilazana firenena madinidinika any Armenia.'
  - type: text
    content: ' any am-parany avaratra mbamin’ny vatan-dehilahy avy amin’ny firenena maro hafa. '
  '7':
  - type: text
    content: 'Ry Gôga, miomàna ary mivonòna ianao sy ireo vahoaka rehetra voaangonao ho eo ambany fifehezanao. '
  '8':
  - type: text
    content: 'Ary any aoriana any, rehefa afaka taona maromaro, dia ianao no hasaiko maka an-keriny ny tanin’i Israely. Fa rehefa afaka tamin’ny ady ny mponina tao, dia niala tamin’ny firenena maro nielezany ary novorîna teo an-tendrombohitr’i Israely izay efa lao hatry ny ela. Fa rehefa navoaka avy tany amin’ireo firenen-kafa izy rehetra, dia niaina tamim-pilaminana. '
  '9':
  - type: text
    content: Fa ianao sy ireo antoko miaramilanao ary ireo firenena maro momba anao no hanafika azy, ka ho tonga eo aminy tahaka ny fiavian’ny rambon-danitra ary handrakotra ny taniny toy ny andian-drahona matevina.
