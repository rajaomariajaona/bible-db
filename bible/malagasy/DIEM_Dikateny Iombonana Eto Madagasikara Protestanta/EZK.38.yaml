document_id: EZK.38,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza mananontanona an’i Gôga
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Amin’izany andro izany dia hisy hevitra maro ho tonga ao an-tsainao ka hamorona teti-dratsy ianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hanapa-kevitra ianao fa hiakatra hamely ireo olona finaritra miaina am-pilaminana avokoa ao amin’ny tany izay tsy mba misy tanàna voahodidina manda na manana vavahady mihidy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hankao ianao mba handroba sy handravarava ary hamely ireo tanàna izay efa rava taloha saingy onenana indray ankehitriny; hankao ianao hamely vahoaka iray nangonina avy any amin’ny firenen-kafa, ka nihary biby fiompy sy fananana indray, ary monina eo amin’ny foiben’izao tontolo izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'foiben’izao tontolo izao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa i Jerosalema izany, ampit 5.5.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hanontany anao ny mponina ao Sebà sy Dedàna ary koa ireo mpandranto rehetra any Tarsisy na any amin’ireo tanàna akaikiny ka hanao hoe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sebà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanjakana arabo, jereo 1 Mp 10.1; Sal 72.10. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dedàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo ny naoty momba ny 25.13. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Tarsisy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo ny naoty momba ny 27.12. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ireo tanàna akaikiny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': araka ny dkt grika tranainy izany; fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sy ny liona tanorany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (teny mety manondro ny mpanjaka, jereo 19.2-3).'
      marker-yv: yv-n
    - type: text
      text: ': ‹Moa handroba sy handrava ve no namorianao ny tafikao? Moa hangorona volafotsy sy volamena ary handroba biby fiompy sy fananana ka hahazo babo betsaka ve no nahatongavanao?›'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: «Koa ijoroy ny maha-
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' anao, ry ilay taranak’olombelona, ary ambarao amin’i Gôga fa izao no lazain’ny Tompo ANDRIANANAHARY: Amin’ny andro hiainan’i Israely vahoakako am-pilaminana no hiainganao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hiainganao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt tranainy grika izany; fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hahafantaranao izany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary ho tonga avy any amin’ny taninao any am-parany avaratra ianao, arahin’ny miaramila avy amin’ny firenena maro; samy mitaingin-tsoavaly avokoa ianareo ka mivondrona ho tafika goavana sy mahery. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hanafika an’i Israely vahoakako ianao, ka hanarona ny taniny toy ny andian-drahona matevina. Any aoriana be any no hisehoan’izany. Haniraka anao hanafika ny taniko Aho, ry Gôga, mba hieken’ny hafa firenena fa Izaho no Andriamanitra masina; ary ianao no fitaovana hanehoako izany eo imasony amin’ny hamelezako anao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Ianao no ilay nambarako hatry ny fahiny elabe, fony Aho nandidy ireo mpanompoko, dia ny mpaminanin’i Israely, hilaza ny hafatro nandritra ny taona maro; ianao no nasaiko tonga hamely ny fireneny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nefa amin’ny andro izay hamelezanao tokoa an’i Israely, ry Gôga, dia ho romotry ny hatezerana Aho; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Noho ny fahasaro-piaroko sy ny fahatezerako mirehitra dia mianiana Aho fa amin’izay andro izay dia hisy horohoron-tany mahatsiravina hamely ny tanin’i Israely. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: «Ry ilay taranak’olombelona, mitodiha manandrify an’i Gôga, filoha faratampon’ny vahoakan’i Mesèka sy i Tobala, any amin’ny tanin’i Magôga
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Mesèka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tobala:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 27.13 sy nta. –Ny anarana hoe '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gôga
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: tanin’i Magôga
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay miseho eto sy ao amin’ny toko 39 ary ao amin’ny Gen 10.2-3 sy ao amin’ny Apôk 20.8 dia mifono hevi-miafina. Toa filazana an’ohatra ny fahavalo izy ireo ka tsy tokony hokarohina ny misy azy ara-jeôgrafia.'
      marker-yv: yv-n
    - type: text
      text: ', ka ijoroy ny maha-mpaminany anao manoloana azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Koa na ny trondro any an-dranomasina na ny voro-manidina na ny bibidia na ny bibikely isan-karazany mihetsiketsika amin’ny tany na ny olombelona rehetra eny ambonin’ny tany dia samy hangorohoro eo anatrehako. Ny tendrombohitra hietry, ny harana hikoa ary ny manda hirodana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ireo dia famantarana mampiavaka ny andron’ny fitsaran’Andriamanitra, jereo Jer 4.24; Is 2.10; Jl 4.16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary ianao dia hampihorohoroiko amin’ny fomba maro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Araka ny dkt grika tranainy izany, fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hiantso ady Aho hamelezana anao eny amin’ny tendrombohitro rehetra eny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Hifamono ny miaramilanao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hofaiziko amin’ny areti-mifindra sy amin’ny fandringanana ianao. Harotsako aminao sy amin’ny tafikao ary amin’ireo firenena maro mpomba anao ny oram-be mivatravatra sy ny havandra arahina solifara mivaivay. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Toy izany no hanehoako eo imason’ny firenen-kafa marobe fa Izaho dia Andriamanitra lehibe sady masina; amin’izay dia hoeken’ireo fa Izaho no TOMPO.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: Hirotsaka an-tsehatra hamely anao Aho, ry Gôga filoha faratampon’ny vahoakan’i Mesèka sy i Tobala. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hasiako farango vy eo amin’ny valanoranonao mba hitarihako anao an-keriny. Hotereko hivoaka ny taninao ianao sy ny tafikao manontolo, dia ny soavaly sy ny mpitaingina azy samy mareva-pitafiana mbamin’ny miaramila marobe samy mirongo ampinga sy sabatra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hiaraka aminao ny miaramilan’i Persia sy i Etiôpia ary i Poto
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Poto: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 27.10 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', samy mirongo ampinga sy fiarovan-doha avokoa; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: toy izany koa ny antoko miaramila rehetra avy any Gômera sy avy any Bety-Tôgarmà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gômera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bety-Tôgarmà:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia ilazana firenena madinidinika any Armenia.'
      marker-yv: yv-n
    - type: text
      text: ' any am-parany avaratra mbamin’ny vatan-dehilahy avy amin’ny firenena maro hafa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ry Gôga, miomàna ary mivonòna ianao sy ireo vahoaka rehetra voaangonao ho eo ambany fifehezanao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary any aoriana any, rehefa afaka taona maromaro, dia ianao no hasaiko maka an-keriny ny tanin’i Israely. Fa rehefa afaka tamin’ny ady ny mponina tao, dia niala tamin’ny firenena maro nielezany ary novorîna teo an-tendrombohitr’i Israely izay efa lao hatry ny ela. Fa rehefa navoaka avy tany amin’ireo firenen-kafa izy rehetra, dia niaina tamim-pilaminana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa ianao sy ireo antoko miaramilanao ary ireo firenena maro momba anao no hanafika azy, ka ho tonga eo aminy tahaka ny fiavian’ny rambon-danitra ary handrakotra ny taniny toy ny andian-drahona matevina.
