document_id: 2CO.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa izao no hevitra tapaka tato am-poko: tsy hankany aminareo aho, mba tsy hampalahelo anareo indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha ampalaheloviko ianareo, dia mba iza indray no hampifaly ahy? Moa tsy ireo nampalaheloviko ihany ve? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izany indrindra no nanoratako taminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toa milaza taratasy hafa efa very angamba ka tsy ananantsika.
    marker-yv: yv-n
  - type: text
    text: ': tsy sitrako ny ho tonga atỳ aminareo ka hampalahelovin’ireo olona izay tokony hampifaly ahy. Matoky anareo rehetra aho fa raha faly aho, dia faly koa ianareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tamin’ny fo ontsa sy ory fatratra ary tamin-dranomaso be no nanoratako taminareo, tsy hoe hampalahelo anareo fa mba hahafantaranareo izato haben’ny fitiavako anareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamela ny helok’izay diso
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha nisy taminareo nahatonga alahelo, dia tsy izaho no nampalaheloviny fa ianareo rehetra, na aoka hatao hoe ny sasany taminareo mba tsy hanitatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ampy ho an’izany olona izany ny famaizana vitan’ny maro taminareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka dia aleo mamela heloka sy mankahery azy kosa ianareo, mba tsy hahatonga alahelo tafahoatra hampamoy fo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Noho izany, dia miangavy anareo aho mba hanao izay hahatsapany fa tia azy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satria izao koa no anton’ny nanoratako taminareo: tiako ho fantatra raha voazaha toetra tokoa ianareo, ka hahitako na olona vonon-kanoa ahy amin’ny zavatra rehetra na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay olona avelanareo heloka dia mba avelako heloka ihany koa. Izaho anefa, raha nisy heloka navelako, dia noho ianareo no nanaovako izany teo imason’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fandrao ho voafitak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' isika, satria fantatsika tsara ny hafetseny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'ny hafetsen’i Satàna:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lk 22.31; Rm 16.17-20; 2Kôr 6.14-16; 11.3-15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sahiran-tsaina i Paoly tao Trôasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony tonga tany Trôasy hitory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' momba an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' aho, dia hitako fa efa novohàn’ny Tompo varavarana sahady aho hiasa tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kanefa tsy nilamin-tsaina aho satria tsy nahita an’i Tito rahalahiko. Koa nanao veloma ny olona tao Trôasy aho, dia niainga nankany Masedônia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 12-13:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 20.1. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'rahalahiko:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tsy hoe iray tampo ara-nofo, fa ara-pinoana (jereo koa 2 Kôr 8.18, 22, 23; 9.3).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fandresena miaraka amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa hisaorana anie Andriamanitra Izay mampiombona anay mandrakariva amin’ny fandresen’i Kristy. Ampiasain’Andriamanitra izahay hampiely amin’ny toerana rehetra ny fahalalana an’i Kristy, ho toy ny hanitra mamerovero hatraiza hatraiza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa tahaka ny zava-manitra ataon’i Kristy fanatitra ho an’Andriamanitra izahay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Fa tahaka ny zava-manitra ataon’i Kristy fanatitra ho an’Andriamanitra izahay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ho fanompoana an’Andriamanitra dia hanitra ararak’i Kristy izahay.
    marker-yv: yv-n
  - type: text
    text: ', na amin’ny voavonjy na amin’ny very: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fofona mahafaty tokoa izany ho an’ny very, fa fofona mahavelona tokoa ho an’ny voavonjy. Koa iza moa no antonona ho amin’izany asa izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izahay dia tsy toy ny sasany manao ny tenin’Andriamanitra ho filàm-bola, fa miteny toy ny olona irahin’Andriamanitra sady mahitsy fo eo anatrehan’Andriamanitra, araka ny maha mpanompon’i Kristy anay.
