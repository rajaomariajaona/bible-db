document_id: 2CO.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa izao no hevitra tapaka tato am-poko: tsy hankany aminareo aho, mba tsy hampalahelo anareo indray. '
  '10':
  - type: text
    content: 'Izay olona avelanareo heloka dia mba avelako heloka ihany koa. Izaho anefa, raha nisy heloka navelako, dia noho ianareo no nanaovako izany teo imason’i '
  - type: text
    content: Kristy
  - type: text
    content: ', '
  '11':
  - type: text
    content: 'fandrao ho voafitak’i '
  - type: text
    content: Satàna
  - type: text
    content: ' isika, satria fantatsika tsara ny hafetseny'
  - type: note
    content: 'ny hafetsen’i Satàna: jereo Lk 22.31; Rm 16.17-20; 2Kôr 6.14-16; 11.3-15.'
  - type: text
    content: .
  - type: heading
    content: Sahiran-tsaina i Paoly tao Trôasy
  '12':
  - type: text
    content: 'Nony tonga tany Trôasy hitory ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' aho, dia hitako fa efa novohàn’ny Tompo varavarana sahady aho hiasa tao. '
  '13':
  - type: text
    content: Kanefa tsy nilamin-tsaina aho satria tsy nahita an’i Tito rahalahiko. Koa nanao veloma ny olona tao Trôasy aho, dia niainga nankany Masedônia
  - type: note
    content: 'And 12-13: jereo Asa 20.1. –rahalahiko: tsy hoe iray tampo ara-nofo, fa ara-pinoana (jereo koa 2 Kôr 8.18, 22, 23; 9.3).'
  - type: text
    content: .
  - type: heading
    content: Fandresena miaraka amin’i Kristy
  '14':
  - type: text
    content: 'Kanefa hisaorana anie Andriamanitra Izay mampiombona anay mandrakariva amin’ny fandresen’i Kristy. Ampiasain’Andriamanitra izahay hampiely amin’ny toerana rehetra ny fahalalana an’i Kristy, ho toy ny hanitra mamerovero hatraiza hatraiza. '
  '15':
  - type: text
    content: Fa tahaka ny zava-manitra ataon’i Kristy fanatitra ho an’Andriamanitra izahay
  - type: note
    content: 'Fa tahaka ny zava-manitra ataon’i Kristy fanatitra ho an’Andriamanitra izahay: dkt hafa Ho fanompoana an’Andriamanitra dia hanitra ararak’i Kristy izahay.'
  - type: text
    content: ', na amin’ny voavonjy na amin’ny very: '
  '16':
  - type: text
    content: 'fofona mahafaty tokoa izany ho an’ny very, fa fofona mahavelona tokoa ho an’ny voavonjy. Koa iza moa no antonona ho amin’izany asa izany? '
  '17':
  - type: text
    content: Izahay dia tsy toy ny sasany manao ny tenin’Andriamanitra ho filàm-bola, fa miteny toy ny olona irahin’Andriamanitra sady mahitsy fo eo anatrehan’Andriamanitra, araka ny maha mpanompon’i Kristy anay.
  '2':
  - type: text
    content: 'Fa raha ampalaheloviko ianareo, dia mba iza indray no hampifaly ahy? Moa tsy ireo nampalaheloviko ihany ve? '
  '3':
  - type: text
    content: Izany indrindra no nanoratako taminareo
  - type: note
    content: Toa milaza taratasy hafa efa very angamba ka tsy ananantsika.
  - type: text
    content: ': tsy sitrako ny ho tonga atỳ aminareo ka hampalahelovin’ireo olona izay tokony hampifaly ahy. Matoky anareo rehetra aho fa raha faly aho, dia faly koa ianareo rehetra. '
  '4':
  - type: text
    content: Tamin’ny fo ontsa sy ory fatratra ary tamin-dranomaso be no nanoratako taminareo, tsy hoe hampalahelo anareo fa mba hahafantaranareo izato haben’ny fitiavako anareo.
  - type: heading
    content: Mamela ny helok’izay diso
  '5':
  - type: text
    content: 'Fa raha nisy taminareo nahatonga alahelo, dia tsy izaho no nampalaheloviny fa ianareo rehetra, na aoka hatao hoe ny sasany taminareo mba tsy hanitatra. '
  '6':
  - type: text
    content: 'Ampy ho an’izany olona izany ny famaizana vitan’ny maro taminareo; '
  '7':
  - type: text
    content: 'ka dia aleo mamela heloka sy mankahery azy kosa ianareo, mba tsy hahatonga alahelo tafahoatra hampamoy fo azy. '
  '8':
  - type: text
    content: 'Noho izany, dia miangavy anareo aho mba hanao izay hahatsapany fa tia azy ianareo. '
  '9':
  - type: text
    content: 'Satria izao koa no anton’ny nanoratako taminareo: tiako ho fantatra raha voazaha toetra tokoa ianareo, ka hahitako na olona vonon-kanoa ahy amin’ny zavatra rehetra na tsia. '
