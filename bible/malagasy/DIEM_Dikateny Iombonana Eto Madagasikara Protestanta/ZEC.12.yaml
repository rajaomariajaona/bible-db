document_id: ZEC.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahirano sy fanafahana an’i Jerosalema
  - type: text
    content: Hafatry ny Tompo momba an’i Israely.
  - type: text
    content: Izao no teny hentitra ambaran’ny Tompo
  - type: text
    content: Izay namelatra ny lanitra
  - type: text
    content: sy namorona ny tany,
  - type: text
    content: 'ary nanome aina ny olona:'
  '10':
  - type: text
    content: Fanahim-pangorahana sy fanahim-bavaka no hanentanako ny taranak’i Davida sy ny mponin’i Jerosalema. Ka hijery Ahy ireo noho ny amin’Ilay nolefoniny
  - type: note
    content: Ahy noho ny amin’Ilay nolefoniny na Ahy Izay nolefoniny; ny Tompo mihitsy no manambara ny tenany ho voan’ny fahafatesana izay nahavoa ny irany anankiray. Io fehezanteny io dia ampiharina amin’ny nahafatesan’i Kristy ao amin’ny Jôh 19.37 sy Apôk 1.7.
  - type: text
    content: ', ary hisaona azy toy ny fisaonana zanakalahy tokana sady hitomany azy toy ny fitomaniana lahimatoa. '
  '11':
  - type: text
    content: Amin’izany andro izany dia hisy fisaonana lehibe ao Jerosalema, dia tahaka izay niseho tao Hadadrimôna
  - type: note
    content: 'Hadadrimôna: andriamanitra sampy fenisianina miahy ny zava-maniry, izay heverina fa maty amin’ny fotoam-piotazana mba ho teraka indray raha avy orana. Azo heverina fa ny fivavahana tamin’i Hadadrimôna dia tena nandroso tao amin’ny lohasahan’i Megidô.'
  - type: text
    content: ' teo amin’ny lohasahan’i Megidao. '
  '12':
  - type: text
    content: 'Ary hisaona ny firenena, dia ny isam-pianakaviany avy: ny an’ny taranak’i Davida, lahy sy vavy samy mitokana; ny an’ny taranak’i Natàna, lahy sy vavy samy mitokana; '
  '13':
  - type: text
    content: 'ny an’ny taranak’i Levỳ, lahy sy vavy samy mitokana; ny an’ny taranak’i Simey, lahy sy vavy mitokana; '
  '14':
  - type: text
    content: ary ny fianakaviana sisa rehetra, lahy sy vavy samy mitokana hisaona avokoa.
  '2':
  - type: text
    content: –Indro Aho hanao an’i Jerosalema ho tsatokaty feno ny divaim-pahatezerako, ka hahafanina ny firenena rehetra manodidina. Ary hahafanina an’i Joda koa izany, rehefa ho voafahirano i Jerosalema
  - type: note
    content: 'tsatokaty: ao amin’ny Testamenta Taloha ny tsatokaty diany famaizan’Andriamanitra, jereo Jer 25.15 snm; Ezek 23.31 snm; Hôb 16. –Ary hahafanina...Jerosalema: dkt hafa Izany fanambarana izany dia mikasika koa an’i Joda, izay hitranga mandritra ny fahirano amin’i Jerosalema.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ary amin’izany andro izany i Jerosalema dia hataoko toy ny vongam-bato mavesatra eo anoloan’ny firenena rehetra; ka haratra tokoa izay mitady hanainga izany. Koa ny firenena rehetra ambonin’ny tany hiray no hiady hamely ny tanàna. '
  '4':
  - type: text
    content: 'Amin’izany andro izany, hoy ny teny hentitra ambarako, dia hataoko mandraingiraingy ny tahotra avokoa ny soavaliny, ary ny mpitaingina azy ho lasa adala; hiambina tsara ny vahoakan’i Joda Aho, kanefa hampahajamba ny soavaly rehetra izay an’ny fahavalo. '
  '5':
  - type: text
    content: 'Ary ny firenen’i Joda hanao anakampo hoe: «Ao amin’ilay Tompon’izao rehetra izao sady Andriamaniny no ahitan’ny mponin’i Jerosalema ny heriny». '
  '6':
  - type: text
    content: 'Amin’izany andro izany, ny firenen’i Joda dia hataoko tahaka ny afo mihanaka amin’ny ala na mirehitra ao ambanin’ny antontan’amboara, ka handevona ny firenena rehetra manodidina azy na eo ankavanany na eo ankaviany. Ary ny mponin’i Jerosalema dia mbola hijanona ao an-tanànany ihany. '
  '7':
  - type: text
    content: 'Hovonjen’ny Tompo aloha ny fianakaviamben’i Joda, mba tsy hihevi-tena ho ambonin’ny olona sisa eran’i Joda ny taranak’i Davida sy ny mponin’i Jerosalema. '
  '8':
  - type: text
    content: 'Amin’izany fotoana izany dia harovan’ny Tompo ireo mponin’i Jerosalema; ka ny osa indrindra ao aminy dia hatanjaka tahaka an’i Davida, ary ny taranak’i Davida ho tahaka an’Andriamanitra, dia tahaka ny '
  - type: text
    content: anjeli
  - type: text
    content: n’ny Tompo mitarika azy eo aloha.
  - type: heading
    content: Fisaonana manerana ny firenena israelita
  '9':
  - type: text
    content: 'Amin’izany andro izany, hoy ny Tompo, dia hirotsaka an-tsehatra Aho handringana ny hafa firenena rehetra izay ho avy hamely an’i Jerosalema. '
