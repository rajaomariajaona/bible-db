document_id: ZEC.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahirano sy fanafahana an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hafatry ny Tompo momba an’i Israely.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izao no teny hentitra ambaran’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay namelatra ny lanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy namorona ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary nanome aina ny olona:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Indro Aho hanao an’i Jerosalema ho tsatokaty feno ny divaim-pahatezerako, ka hahafanina ny firenena rehetra manodidina. Ary hahafanina an’i Joda koa izany, rehefa ho voafahirano i Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsatokaty: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ao amin’ny Testamenta Taloha '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tsatokaty
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' diany famaizan’Andriamanitra, jereo Jer 25.15 snm; Ezek 23.31 snm; Hôb 16. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ary hahafanina...Jerosalema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dkt hafa Izany fanambarana izany dia mikasika koa an’i Joda, izay hitranga mandritra ny fahirano amin’i Jerosalema.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary amin’izany andro izany i Jerosalema dia hataoko toy ny vongam-bato mavesatra eo anoloan’ny firenena rehetra; ka haratra tokoa izay mitady hanainga izany. Koa ny firenena rehetra ambonin’ny tany hiray no hiady hamely ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Amin’izany andro izany, hoy ny teny hentitra ambarako, dia hataoko mandraingiraingy ny tahotra avokoa ny soavaliny, ary ny mpitaingina azy ho lasa adala; hiambina tsara ny vahoakan’i Joda Aho, kanefa hampahajamba ny soavaly rehetra izay an’ny fahavalo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny firenen’i Joda hanao anakampo hoe: «Ao amin’ilay Tompon’izao rehetra izao sady Andriamaniny no ahitan’ny mponin’i Jerosalema ny heriny». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin’izany andro izany, ny firenen’i Joda dia hataoko tahaka ny afo mihanaka amin’ny ala na mirehitra ao ambanin’ny antontan’amboara, ka handevona ny firenena rehetra manodidina azy na eo ankavanany na eo ankaviany. Ary ny mponin’i Jerosalema dia mbola hijanona ao an-tanànany ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hovonjen’ny Tompo aloha ny fianakaviamben’i Joda, mba tsy hihevi-tena ho ambonin’ny olona sisa eran’i Joda ny taranak’i Davida sy ny mponin’i Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Amin’izany fotoana izany dia harovan’ny Tompo ireo mponin’i Jerosalema; ka ny osa indrindra ao aminy dia hatanjaka tahaka an’i Davida, ary ny taranak’i Davida ho tahaka an’Andriamanitra, dia tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: n’ny Tompo mitarika azy eo aloha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaonana manerana ny firenena israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Amin’izany andro izany, hoy ny Tompo, dia hirotsaka an-tsehatra Aho handringana ny hafa firenena rehetra izay ho avy hamely an’i Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fanahim-pangorahana sy fanahim-bavaka no hanentanako ny taranak’i Davida sy ny mponin’i Jerosalema. Ka hijery Ahy ireo noho ny amin’Ilay nolefoniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ahy noho ny amin’Ilay nolefoniny
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahy Izay nolefoniny
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny Tompo mihitsy no manambara ny tenany ho voan’ny fahafatesana izay nahavoa ny irany anankiray. Io fehezanteny io dia ampiharina amin’ny nahafatesan’i Kristy ao amin’ny Jôh 19.37 sy Apôk 1.7.
    marker-yv: yv-n
  - type: text
    text: ', ary hisaona azy toy ny fisaonana zanakalahy tokana sady hitomany azy toy ny fitomaniana lahimatoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Amin’izany andro izany dia hisy fisaonana lehibe ao Jerosalema, dia tahaka izay niseho tao Hadadrimôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hadadrimôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: andriamanitra sampy fenisianina miahy ny zava-maniry, izay heverina fa maty amin’ny fotoam-piotazana mba ho teraka indray raha avy orana. Azo heverina fa ny fivavahana tamin’i Hadadrimôna dia tena nandroso tao amin’ny lohasahan’i Megidô.
    marker-yv: yv-n
  - type: text
    text: ' teo amin’ny lohasahan’i Megidao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hisaona ny firenena, dia ny isam-pianakaviany avy: ny an’ny taranak’i Davida, lahy sy vavy samy mitokana; ny an’ny taranak’i Natàna, lahy sy vavy samy mitokana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny an’ny taranak’i Levỳ, lahy sy vavy samy mitokana; ny an’ny taranak’i Simey, lahy sy vavy mitokana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ary ny fianakaviana sisa rehetra, lahy sy vavy samy mitokana hisaona avokoa.
