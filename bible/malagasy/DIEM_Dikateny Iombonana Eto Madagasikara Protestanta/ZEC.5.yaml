document_id: ZEC.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana fahenina: ny bokin’ny fanozonana'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nanopy maso indray aho, ka indro hitako nisy horonam-boky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'horonam-boky: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jer 36.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' manidina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanontanian’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' aho hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no hitanao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy aho namaly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mahita horonam-boky manidina aho: folo metatra ny lavany ary dimy metatra ny sakany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka hoy izy tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izany no ozona miainga hipaka amin’ny tany manontolo. Fa araka ny voasoratra eo amin’ny lafiny iray, ny mpangalatra rehetra dia horoahina hiala amin’ity tany ity; ary amin’ny lafiny hafa kosa, izay rehetra mianiana lainga dia hatao araka izany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny TOMPOn’izao rehetra izao dia manao teny hentitra hoe: Izaho no nampiainga izany ozona izany; hiditra ao an-tranon’ny mpangalatra sy ny mpianiana lainga amin’ny anarako izany, ary hitoetra ao ka handevona ny trano mbamin’ny hazony sy ny vatony.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana fahafito: ilay vehivavy ao anaty vata famarana'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Niseho indray ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' niresaka tamiko ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Atopazy ny masonao, ka jereo irỳ mipoitra irỳ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nanontaniako izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona io?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navaliny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vata famarana mirakitra ny fahadisoana eto amin’ny tany manontolo io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny fahadisoana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ireo dkt tranainy grika sy siriaka: dkt hafa –araka ny hebreo izay manao hoe: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny masony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –Ny fahitana manontolo eto dia momba ny fanadiovana ny firenena amin’ny famongorana ny faharatsiam-panahy tsy ho eo intsony.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tamin’izay dia niainga ho azy ny vongam-piraka saron’ilay vata, ary indro hitako nisy vehivavy iray mipetraka ao anatiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy ilay anjely tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Io vehivavy io no Faharatsiam-panahy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Koa natosiny hiverina tao anaty vata izy ary nakatony ny sarona vongam-piraka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha nanopy maso aho, dia indreo hitako nisy vehivavy roa nanidina; ny rivotra no nanampy tosika ny elany, fa nanana elatra toy ny an’ny vano izy. Noraisin’izy roa vavy ilay vata ka nentiny nisidina teny amin’ny habakabaka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nanontaniako ilay anjely niresaka tamiko hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hoentin’izy ireo aiza moa ity vata?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka hoy izy tamiko:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Any Mezôpôtamia, fa any no hanaovana tempoly ho azy ka hametrahana azy eo ambonin’ny vodivato hitoerany.
