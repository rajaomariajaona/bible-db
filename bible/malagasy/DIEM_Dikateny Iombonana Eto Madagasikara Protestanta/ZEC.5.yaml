document_id: ZEC.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahenina: ny bokin’ny fanozonana'
  - type: text
    content: Nanopy maso indray aho, ka indro hitako nisy horonam-boky
  - type: note
    content: 'horonam-boky: jereo Jer 36.2 sy nta.'
  - type: text
    content: ' manidina.'
  '10':
  - type: text
    content: 'Dia nanontaniako ilay anjely niresaka tamiko hoe:'
  - type: text
    content: –Hoentin’izy ireo aiza moa ity vata?
  '11':
  - type: text
    content: 'Ka hoy izy tamiko:'
  - type: text
    content: Any Mezôpôtamia, fa any no hanaovana tempoly ho azy ka hametrahana azy eo ambonin’ny vodivato hitoerany.
  '2':
  - type: text
    content: 'Ary nanontanian’ilay '
  - type: text
    content: anjely
  - type: text
    content: ' aho hoe:'
  - type: text
    content: –Inona no hitanao?
  - type: text
    content: 'Dia hoy aho namaly:'
  - type: text
    content: '–Mahita horonam-boky manidina aho: folo metatra ny lavany ary dimy metatra ny sakany.'
  '3':
  - type: text
    content: 'Ka hoy izy tamiko:'
  - type: text
    content: '–Izany no ozona miainga hipaka amin’ny tany manontolo. Fa araka ny voasoratra eo amin’ny lafiny iray, ny mpangalatra rehetra dia horoahina hiala amin’ity tany ity; ary amin’ny lafiny hafa kosa, izay rehetra mianiana lainga dia hatao araka izany koa. '
  '4':
  - type: text
    content: 'Ny TOMPOn’izao rehetra izao dia manao teny hentitra hoe: Izaho no nampiainga izany ozona izany; hiditra ao an-tranon’ny mpangalatra sy ny mpianiana lainga amin’ny anarako izany, ary hitoetra ao ka handevona ny trano mbamin’ny hazony sy ny vatony.'
  - type: heading
    content: 'Fahitana fahafito: ilay vehivavy ao anaty vata famarana'
  '5':
  - type: text
    content: 'Niseho indray ilay '
  - type: text
    content: anjely
  - type: text
    content: ' niresaka tamiko ka nanao hoe:'
  - type: text
    content: –Atopazy ny masonao, ka jereo irỳ mipoitra irỳ?
  '6':
  - type: text
    content: 'Ary nanontaniako izy hoe:'
  - type: text
    content: –Inona io?
  - type: text
    content: 'Dia hoy ny navaliny:'
  - type: text
    content: –Vata famarana mirakitra ny fahadisoana eto amin’ny tany manontolo io
  - type: note
    content: 'ny fahadisoana: araka ireo dkt tranainy grika sy siriaka: dkt hafa –araka ny hebreo izay manao hoe: ny masony. –Ny fahitana manontolo eto dia momba ny fanadiovana ny firenena amin’ny famongorana ny faharatsiam-panahy tsy ho eo intsony.'
  - type: text
    content: .
  '7':
  - type: text
    content: Tamin’izay dia niainga ho azy ny vongam-piraka saron’ilay vata, ary indro hitako nisy vehivavy iray mipetraka ao anatiny.
  '8':
  - type: text
    content: 'Dia hoy ilay anjely tamiko:'
  - type: text
    content: –Io vehivavy io no Faharatsiam-panahy.
  - type: text
    content: 'Koa natosiny hiverina tao anaty vata izy ary nakatony ny sarona vongam-piraka. '
  '9':
  - type: text
    content: 'Raha nanopy maso aho, dia indreo hitako nisy vehivavy roa nanidina; ny rivotra no nanampy tosika ny elany, fa nanana elatra toy ny an’ny vano izy. Noraisin’izy roa vavy ilay vata ka nentiny nisidina teny amin’ny habakabaka. '
