    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' 12 lahy: voalohany i Simôna izay atao hoe Petera, dia i Andrea rahalahiny, i Jakôba sy i Jôhany mirahalahy zanak’i Zebedeo, '
  - type: usfm
