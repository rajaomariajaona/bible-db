- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanirahan’i Jesoa ny apôstôly 12 lahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 6.7-13; Lk 9.1-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izy 12 lahy ireo dia nirahin’i Jesoa sady nohafatrafarany hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '–Aza mandeha any amin’ny faritra onenan’ny hafa firenena ary aza miditra amin’ny tanànan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritanina
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa aleo manatona ny ondry very, dia ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa mandeha ianareo, dia manaova antso avo hoe: «Efa tonga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: '!» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sitrano ny marary, atsangano ho velona ny maty, diovy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: marary hoditra
  - type: text
    text: ', roahy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: '; nahazo maimaimpoana ianareo, koa manomeza maimaimpoana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza mitady vola hatao am-paosy, na volamena izany na volafotsy na varahina; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: aza mitondra kitapom-batsy ho amin’ny dia, na akanjo hisoloana, na kapa, na tehina; fa ny mpiasa dia mendrika homena izay hivelomany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo mpampianatra jiosy dia afaka mivelona amin’ny fanomezana atolotr’ireo mpianany.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha misy tanàna lehibe na tanàna kely idiranareo, dia fotory izay olona mendrika handray anareo; ka mitoera ao aminy mandra-piàlanareo ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vao miditra ny trano ianareo dia miarahabà hoe: «Ho ao aminareo anie ny fiadanana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fiarahabana, eo amin’ny Jiosy, dia nirary fiadanana.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa raha mandray anareo ny ao an-trano, dia aoka ho tonga aminy tokoa ny fiadanana rarînareo; fa raha tsy mandray anareo ny ao an-trano, dia aoka hiverina aminareo ny fiadanana rarînareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary izay trano na tanàna tsy handraisan’ny olona anareo na tsy hihainoany teny anareo, dia ialao; ka ahintsano eo ny vovoka avy amin’ny tongotrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mk 6.11 sy nta; Asa 13.51; ampit Asa 18.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lazaiko marina aminareo fa amin’ny andro fitsarana dia ho azoazo kokoa ny sazy hihatra amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sôdôma
  - type: text
    text: ' sy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Gômôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Sôdôma sy i Gômôra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 18–19.
    marker-yv: yv-n
  - type: text
    text: ' noho ny hihatra amin’izany tanàna izany!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanenjehana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 13.8-13; Lk 21.12-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '–Indro Aho maniraka anareo ho tahaka ny ondry eo afovoan’ny amboadia. Noho izany, aoka ho malina tahaka ny bibilava ianareo, ary aoka ho tsotra tahaka ny voromahailala. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mitandrema, fa hatolotry ny olona amin’ny mpitsara isan-tanàna ianareo sady hokapohiny any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôgany
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary hoentina eo anoloan’ny mpifehy sy ny mpanjaka noho ny maha mpianatro anareo, mba hijoroanareo ho vavolombelona manambara Ahy eo anatrehan’ny Jiosy sy ny hafa firenena. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha atolotry ny olona ianareo, aza manahy izay fomba hitenenanareo na izay teny holazainareo, satria homena anareo eo no ho eo ihany izay teny holazainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy teny avy aminareo no holazainareo fa teny avy amin’ny Fanahy Masina irahin’ilay Rainareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hisy olona hanolotra ny iray tampo aminy hovonoina; hisy raim-pianakaviana hanolotra ny zanany hovonoina; ary hisy zanaka hanohitra ray aman-dreny ka hampanameloka azy ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ho halan’ny olona rehetra ianareo satria miandany amiko; fa izay haharitra hatramin’ny farany dia ho voavonjy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha enjehina amin’ny tanàna anankiray ianareo, dia mandosira any amin’ny tanàna hafa; eny, lazaiko marina aminareo fa tsy ho tapitra voatetinareo akory ny tanàna eto Israely, dia ho avy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mpianatra tsy mihoatra ny mpampianatra azy; mpanompo tsy mihoatra ny tompony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ampy ho an’ny mpianatra ny tonga tahaka ny mpampianatra azy, ary ho an’ny mpanompo ny tonga tahaka ny tompony. Koa raha ny loham-pianakaviana aza nisy nanao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Belzeboba
  - type: text
    text: ', mainka fa ny fianakaviany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hany tokony hatahorana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 12.2-7)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '–Koa aza matahotra ny olombelona ianareo. Fa tsy misy afenina izay tsy haseho na takona izay tsy ho fantatra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izay lazaiko aminareo ao amin’ny maizina dia ambarao eny amin’ny mazava; ary izay ren’ny sofinareo dia antsoantsoy eny an-tampon-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary aza matahotra ireo mamono mahafaty ny vatana, nefa tsy mahay mamono mahafaty ny fanahy; fa aleo matahotra an’Andriamanitra Izay mahay mahavery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jak 4.12.
    marker-yv: yv-n
  - type: text
    text: ' ny fanahy amam-batana any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lohasahan’afo
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tsy ampaharoapolon’ny denàry monja ve no vidin’ny fody roa? Kanefa tsy hisy latsaka amin’ny tany izy ireny na iray aza, raha tsy lahatry ny Rainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Na ny volon-dohanareo aza dia fantatr’Andriamanitra ny isany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Koa aza matahotra, fa sarobidy noho ny fody maro ianareo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manaiky na tsy manaiky ho mpiandany amin’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 12.8-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '–Noho izany, na zovy na zovy manaiky ho mpiandany amiko eo anatrehan’ny olona, Izaho koa dia hanaiky ho mpiandany aminy eo anatrehan’ny Raiko Izay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa na zovy na zovy mandà tsy ho mpiandany amiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2Tim 2.12.
    marker-yv: yv-n
  - type: text
    text: ' eo anatrehan’ny olona, Izaho koa dia handà tsy ho mpiandany aminy eo anatrehan’ny Raiko Izay any an-danitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mahatonga fisarahana i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 12.21-53; 14.26-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '–Aza heverinareo fa tonga eto an-tany Aho hampihavana; tsy tonga hampihavana Aho, fa hampiady. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Eny, tonga Aho hampisaraka ny zanaka lahy amin’ny rainy, sy ny zanaka vavy amin’ny reniny, ary ny vinantovavy amin’ny rafozambaviny; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: koa ny ankohonan’ny olona ihany no ho fahavalony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and 35-36, jereo Mi 7.6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izay tia ny rainy na ny reniny mihoatra noho ny fitiavany Ahy dia tsy mendrika Ahy; ary izay tia ny zanany lahy na ny zanany vavy mihoatra noho ny fitiavany Ahy dia tsy mendrika Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary izay tsy mitondra ny hazofijaliany ka tsy miaraka amiko dia tsy mendrika Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Izay mamonjy ny ainy no hahavery azy, fa izay mahafoy ny ainy noho ny fitiavana Ahy no hahavonjy azy.
- type: usfm
