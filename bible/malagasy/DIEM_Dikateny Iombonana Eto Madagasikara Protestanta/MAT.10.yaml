document_id: MAT.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo apôstôly 12 lahy
  - type: heading
    content: (Jereo Mk 3.13-19; Lk 6.12-16)
  - type: text
    content: 'Dia nantsoin’i Jesoa ny mpianany 12 lahy ka nomeny fahefana handroaka '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' sy hahasitrana ny aretina mbamin’ny rofy rehetra. '
  '10':
  - type: text
    content: aza mitondra kitapom-batsy ho amin’ny dia, na akanjo hisoloana, na kapa, na tehina; fa ny mpiasa dia mendrika homena izay hivelomany
  - type: note
    content: Ireo mpampianatra jiosy dia afaka mivelona amin’ny fanomezana atolotr’ireo mpianany.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Raha misy tanàna lehibe na tanàna kely idiranareo, dia fotory izay olona mendrika handray anareo; ka mitoera ao aminy mandra-piàlanareo ny tanàna. '
  '12':
  - type: text
    content: 'Vao miditra ny trano ianareo dia miarahabà hoe: «Ho ao aminareo anie ny fiadanana'
  - type: note
    content: Ny fiarahabana, eo amin’ny Jiosy, dia nirary fiadanana.
  - type: text
    content: '!» '
  '13':
  - type: text
    content: 'Koa raha mandray anareo ny ao an-trano, dia aoka ho tonga aminy tokoa ny fiadanana rarînareo; fa raha tsy mandray anareo ny ao an-trano, dia aoka hiverina aminareo ny fiadanana rarînareo. '
  '14':
  - type: text
    content: Ary izay trano na tanàna tsy handraisan’ny olona anareo na tsy hihainoany teny anareo, dia ialao; ka ahintsano eo ny vovoka avy amin’ny tongotrareo
  - type: note
    content: Jereo Mk 6.11 sy nta; Asa 13.51; ampit Asa 18.6.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Lazaiko marina aminareo fa amin’ny andro fitsarana dia ho azoazo kokoa ny sazy hihatra amin’i '
  - type: text
    content: Sôdôma
  - type: text
    content: ' sy i '
  - type: text
    content: Gômôra
  - type: note
    content: 'I Sôdôma sy i Gômôra: jereo Gen 18–19.'
  - type: text
    content: ' noho ny hihatra amin’izany tanàna izany!'
  - type: heading
    content: Ny fanenjehana
  - type: heading
    content: (Jereo Mk 13.8-13; Lk 21.12-17)
  '16':
  - type: text
    content: '–Indro Aho maniraka anareo ho tahaka ny ondry eo afovoan’ny amboadia. Noho izany, aoka ho malina tahaka ny bibilava ianareo, ary aoka ho tsotra tahaka ny voromahailala. '
  '17':
  - type: text
    content: 'Mitandrema, fa hatolotry ny olona amin’ny mpitsara isan-tanàna ianareo sady hokapohiny any amin’ny '
  - type: text
    content: sinagôgany
  - type: text
    content: '; '
  '18':
  - type: text
    content: 'ary hoentina eo anoloan’ny mpifehy sy ny mpanjaka noho ny maha mpianatro anareo, mba hijoroanareo ho vavolombelona manambara Ahy eo anatrehan’ny Jiosy sy ny hafa firenena. '
  '19':
  - type: text
    content: 'Fa raha atolotry ny olona ianareo, aza manahy izay fomba hitenenanareo na izay teny holazainareo, satria homena anareo eo no ho eo ihany izay teny holazainareo. '
  '2':
  - type: text
    content: 'Ary izao avy no anaran’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' 12 lahy: voalohany i Simôna izay atao hoe Petera, dia i Andrea rahalahiny, i Jakôba sy i Jôhany mirahalahy zanak’i Zebedeo, '
  '20':
  - type: text
    content: Tsy teny avy aminareo no holazainareo fa teny avy amin’ny Fanahy Masina irahin’ilay Rainareo.
  '21':
  - type: text
    content: 'Hisy olona hanolotra ny iray tampo aminy hovonoina; hisy raim-pianakaviana hanolotra ny zanany hovonoina; ary hisy zanaka hanohitra ray aman-dreny ka hampanameloka azy ho faty. '
  '22':
  - type: text
    content: 'Ho halan’ny olona rehetra ianareo satria miandany amiko; fa izay haharitra hatramin’ny farany dia ho voavonjy. '
  '23':
  - type: text
    content: 'Raha enjehina amin’ny tanàna anankiray ianareo, dia mandosira any amin’ny tanàna hafa; eny, lazaiko marina aminareo fa tsy ho tapitra voatetinareo akory ny tanàna eto Israely, dia ho avy ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: .
  '24':
  - type: text
    content: 'Mpianatra tsy mihoatra ny mpampianatra azy; mpanompo tsy mihoatra ny tompony. '
  '25':
  - type: text
    content: 'Ampy ho an’ny mpianatra ny tonga tahaka ny mpampianatra azy, ary ho an’ny mpanompo ny tonga tahaka ny tompony. Koa raha ny loham-pianakaviana aza nisy nanao hoe '
  - type: text
    content: Belzeboba
  - type: text
    content: ', mainka fa ny fianakaviany.'
  - type: heading
    content: Ny hany tokony hatahorana
  - type: heading
    content: (Jereo Lk 12.2-7)
  '26':
  - type: text
    content: '–Koa aza matahotra ny olombelona ianareo. Fa tsy misy afenina izay tsy haseho na takona izay tsy ho fantatra. '
  '27':
  - type: text
    content: 'Izay lazaiko aminareo ao amin’ny maizina dia ambarao eny amin’ny mazava; ary izay ren’ny sofinareo dia antsoantsoy eny an-tampon-trano. '
  '28':
  - type: text
    content: Ary aza matahotra ireo mamono mahafaty ny vatana, nefa tsy mahay mamono mahafaty ny fanahy; fa aleo matahotra an’Andriamanitra Izay mahay mahavery
  - type: note
    content: Ampit Jak 4.12.
  - type: text
    content: ' ny fanahy amam-batana any amin’ny '
  - type: text
    content: lohasahan’afo
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Tsy ampaharoapolon’ny denàry monja ve no vidin’ny fody roa? Kanefa tsy hisy latsaka amin’ny tany izy ireny na iray aza, raha tsy lahatry ny Rainareo. '
  '3':
  - type: text
    content: 'i Filipo, i Bartôlômeo, i Tôma, i Matio ilay '
  - type: text
    content: mpamory hetra
  - type: text
    content: ', i Jakôba zanak’i Halfeo, i Tadeo, '
  '30':
  - type: text
    content: 'Na ny volon-dohanareo aza dia fantatr’Andriamanitra ny isany. '
  '31':
  - type: text
    content: Koa aza matahotra, fa sarobidy noho ny fody maro ianareo!
  - type: heading
    content: Manaiky na tsy manaiky ho mpiandany amin’i Jesoa
  - type: heading
    content: (Jereo Lk 12.8-9)
  '32':
  - type: text
    content: '–Noho izany, na zovy na zovy manaiky ho mpiandany amiko eo anatrehan’ny olona, Izaho koa dia hanaiky ho mpiandany aminy eo anatrehan’ny Raiko Izay any an-danitra. '
  '33':
  - type: text
    content: Fa na zovy na zovy mandà tsy ho mpiandany amiko
  - type: note
    content: Ampit 2Tim 2.12.
  - type: text
    content: ' eo anatrehan’ny olona, Izaho koa dia handà tsy ho mpiandany aminy eo anatrehan’ny Raiko Izay any an-danitra.'
  - type: heading
    content: Mahatonga fisarahana i Jesoa
  - type: heading
    content: (Jereo Lk 12.21-53; 14.26-27)
  '34':
  - type: text
    content: '–Aza heverinareo fa tonga eto an-tany Aho hampihavana; tsy tonga hampihavana Aho, fa hampiady. '
  '35':
  - type: text
    content: 'Eny, tonga Aho hampisaraka ny zanaka lahy amin’ny rainy, sy ny zanaka vavy amin’ny reniny, ary ny vinantovavy amin’ny rafozambaviny; '
  '36':
  - type: text
    content: koa ny ankohonan’ny olona ihany no ho fahavalony
  - type: note
    content: Momba ny and 35-36, jereo Mi 7.6.
  - type: text
    content: .
  '37':
  - type: text
    content: 'Izay tia ny rainy na ny reniny mihoatra noho ny fitiavany Ahy dia tsy mendrika Ahy; ary izay tia ny zanany lahy na ny zanany vavy mihoatra noho ny fitiavany Ahy dia tsy mendrika Ahy. '
  '38':
  - type: text
    content: 'Ary izay tsy mitondra ny hazofijaliany ka tsy miaraka amiko dia tsy mendrika Ahy. '
  '39':
  - type: text
    content: Izay mamonjy ny ainy no hahavery azy, fa izay mahafoy ny ainy noho ny fitiavana Ahy no hahavonjy azy.
  - type: heading
    content: Valisoa
  - type: heading
    content: (Jereo Mk 9.41)
  '4':
  - type: text
    content: 'i Simôna '
  - type: text
    content: Kananeanina
  - type: text
    content: ' ary i Jodasy '
  - type: text
    content: Iskariôta
  - type: text
    content: ' ilay nanolotra an’i Jesoa'
  - type: note
    content: 'Tadeo: misy stf maro ahitana hoe Lebeo antsoina hoe Tadeo; misy stf vitsivitsy ahitana hoe Tadeo antsoina hoe Lebeo, na Lebeo fotsiny, na Jodasy Zelôta (jereo Lk 6.16 sy Asa 1.13). –Toerana itanisana ny apôstôly, ao amin’ny Test. V.: eto sy Mk 3.16-19 ary Lk 6.14-16 sy Asa 1.13.'
  - type: text
    content: .
  - type: heading
    content: Fanirahan’i Jesoa ny apôstôly 12 lahy
  - type: heading
    content: (Jereo Mk 6.7-13; Lk 9.1-6)
  '40':
  - type: text
    content: '–Izay mandray anareo dia mandray Ahy; ary izay mandray Ahy dia mandray Ilay naniraka Ahy. '
  '41':
  - type: text
    content: 'Izay mandray '
  - type: text
    content: mpaminanin
  - type: text
    content: '’Andriamanitra noho izy mpaminanin’Andriamanitra dia hahazo valisoana mpaminanin’Andriamanitra; ary izay mandray olo-marina noho izy olo-marina dia hahazo valisoan’olo-marina; '
  '42':
  - type: text
    content: ary lazaiko marina aminareo fa na iza na iza hanome rano mangatsiaka, na eran’ny kaopy ihany aza, hosotroin’ny anankiray amin’ireo mpianatro madinika ireo noho izy mpianatro, dia tsy ho diso valisoa.
  '5':
  - type: text
    content: 'Izy 12 lahy ireo dia nirahin’i Jesoa sady nohafatrafarany hoe:'
  - type: text
    content: '–Aza mandeha any amin’ny faritra onenan’ny hafa firenena ary aza miditra amin’ny tanànan’ny '
  - type: text
    content: Samaritanina
  - type: text
    content: '; '
  '6':
  - type: text
    content: 'fa aleo manatona ny ondry very, dia ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ary rehefa mandeha ianareo, dia manaova antso avo hoe: «Efa tonga ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: '!» '
  '8':
  - type: text
    content: 'Sitrano ny marary, atsangano ho velona ny maty, diovy ny '
  - type: text
    content: marary hoditra
  - type: text
    content: ', roahy ny '
  - type: text
    content: demony
  - type: text
    content: '; nahazo maimaimpoana ianareo, koa manomeza maimaimpoana. '
  '9':
  - type: text
    content: 'Aza mitady vola hatao am-paosy, na volamena izany na volafotsy na varahina; '
