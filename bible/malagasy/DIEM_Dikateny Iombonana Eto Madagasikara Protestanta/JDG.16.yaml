document_id: JDG.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Samsôna sy ny vavahadin’i Gazà
  - type: text
    content: Dia nankany Gazà
  - type: note
    content: 'Gazà: jereo ny naoty momba ny 6.4.'
  - type: text
    content: ' i Samsôna ka nahita mpivarotena iray tao, ary niditra tao aminy mba handry. '
  '10':
  - type: text
    content: 'Ary hoy i Delilà tamin’i Samsôna:'
  - type: text
    content: –Indro namitaka ahy ianao sady nilaza lainga tamiko; koa mba atoroy ahy re ankehitriny izay fomba tokony hamatorana anao.
  '11':
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: –Raha tady mahazaka vaovao tsy mbola nampiasaina no amatorana ahy, dia hanjary osa aho ka ho tahaka ny olon-tsotra.
  '12':
  - type: text
    content: 'Dia nalain’i Delilà ny tady mahazaka vaovao ka namatorany azy, dia nihiaka mafy izy hoe:'
  - type: text
    content: –Ry Samsôna a, tonga hamely anao ny Filistinina!
  - type: text
    content: Efa nisy olona nafenin-dravehivavy indray manko tao an’efitrano. Kinanjo notapatapahin’i Samsôna hiala amin’ny sandriny ireo tady mahazaka ireo ka maito tahaka ny tady taretra.
  '13':
  - type: text
    content: 'Ary hoy i Delilà tamin’i Samsôna:'
  - type: text
    content: –Mbola namitaka ahy ihany ianao sady nilaza lainga tamiko; mba atoroy ahy re izay fomba tokony hamatorana anao.
  - type: text
    content: 'Dia namaly azy izy hoe:'
  - type: text
    content: –Raha tenominao hikambana amin’ny tenan-tenona ny randrana fito amin’ny volon-dohako ka aompanao amin’ny fandraotra, dia hanjary osa aho ka ho tahaka ny olon-tsotra.
  '14':
  - type: text
    content: Dia nampatorin’i Delilà i Samsôna ka notenominy hikambana amin’ny tenan-tenona ny randrana fito tamin’ny volon-dohany
  - type: note
    content: Ny faran’ny and 13 sy ny fiandohan’ny and 14 dia tsy hita ao amin’ny TM fa nadika avy amin’ny dkt tranainy grika.
  - type: text
    content: ' ary naompany tamin’ny fandraotra, dia nihiaka mafy ravehivavy hoe:'
  - type: text
    content: –Ry Samsôna a, tonga hamely anao ny Filistinina!
  - type: text
    content: Dia nifoha i Samsôna ka nongotany ny fandraotra sy ny rafi-panenomana ary ny tenan-tenona.
  '15':
  - type: text
    content: 'Ary hoy i Delilà taminy:'
  - type: text
    content: –Ahoana no ilazanao fa tia ahy ianao, kanefa ianao tsy matoky ahy akory? Indro efa intelo izao ianao no namitaka ahy ka tsy mbola nampahalala ahy ihany izay iavian’ny herinao lehibe.
  '16':
  - type: text
    content: 'Ary rehefa nanao lemozy toy izany isan’andro ilay ramatoa ka nahasosotra azy, dia tofoka loatra i Samsôna; '
  '17':
  - type: text
    content: 'ary nanambara tamin’i Delilà ny tsiambaratelo rehetra tao am-pony izy ka nanao hoe:'
  - type: text
    content: –Tsy mbola nokasihin-kareza mihitsy ny volon-dohako, fa natokana ho an’Andriamanitra hatrany an-kibon-dreniko aho
  - type: note
    content: Jereo 13.4-5 sy nta.
  - type: text
    content: . Koa raha tapahina ny volon-dohako, dia hanjary osa tahaka ny olon-tsotra rehetra aho.
  '18':
  - type: text
    content: 'Takatr’i Delilà tamin’izay fa nambaran’i Samsôna azy ny tsiambaratelo rehetra tao am-pony, koa nandefa iraka izy hiantso ireo mpanjaka filistinina sy hilaza aminy hoe:'
  - type: text
    content: –Tongava amin’izay ianareo amin’ity indray mandeha ity, fa efa nambaran’i Samsôna ahy ny tsiambaratelo rehetra tao am-pony.
  - type: text
    content: 'Dia nankany amin’ilay vehivavy ireo mpanjaka filistinina ary nanome azy ny vola. '
  '19':
  - type: text
    content: 'Nampatorin’i Delilà teo am-pofoany i Samsôna ary niantso lehilahy iray izy hanety ireo randrana fito teo amin’ny volon-dohany. Dia nanomboka nihanalemy i Samsôna satria niala taminy tokoa ny heriny. '
  '2':
  - type: text
    content: 'Fantatry ny mponina fa tonga tao i Samsôna; dia nanao fiambenana tokoa ny Gazita sady nitily azy teo am-bavahadin’ny tanàna nandritra ny alina manontolo. Saingy tsy niraika izy ireo tamin’io alina manontolo io fa nanao anakampo hoe: «Aoka handrasantsika hazava ny maraina, vao hovonointsika izy!» '
  '20':
  - type: text
    content: 'Ary nihiaka mafy i Delilà hoe:'
  - type: text
    content: –Ry Samsôna a, tonga hamely anao ny Filistinina!
  - type: text
    content: 'Dia nifoha i Samsôna ary nihevitra ny ho tafavoaka toy ny teo aloha, satria tsy fantany fa efa nanaisotra ny fanampiany azy ny TOMPO. '
  '21':
  - type: text
    content: 'Kinanjo nosamborin’ny Filistinina izy ary nopotsiriny ny masony. Dia nentiny nankany Gazà izy ary nafatony tamin’ny rojo halimo roa sosona sy notereny hitoto koba tao an-tranomaizina. '
  '22':
  - type: text
    content: Kanefa dia nanomboka naniry indray ireo volon-dohany taorian’ny nanetezana azy.
  - type: heading
    content: Ny asa mahery farany nataon’i Samsôna sy ny nahafatesany
  '23':
  - type: text
    content: 'Indray andro dia nivory ireo mpanjaka filistinina mba hankalaza ny fandreseny sy hanao sorona lehibe ho an’i Dagôna andriamaniny. Fa hoy izy hoe:'
  - type: text
    content: –Efa natolotry ny andriamanitsika ho eo an-tanantsika i Samsôna fahavalontsika.
  '24':
  - type: text
    content: 'Ary nony efa diboky ny hafaliana izy ireo, dia nitaky ny hampakana an’i Samsôna mba hanao fanalana hamohamo azy. Dia nalaina tany an-tranomaizina i Samsôna ka nanao fanalana hamohamo azy; avy eo dia natsangana teo anelanelan’ny andrin’ny tempoly izy. Ary rehefa nahita an’i Samsôna ny olona, dia nidera ny andriamaniny ka nanao hoe:'
  - type: text
    content: –Efa natolotry ny andriamanitsika ho eto an-tanantsika ilay fahavalontsika, mpanimba ny firenentsika sy nandripaka olona maro tamintsika.
  '26':
  - type: text
    content: 'Tamin’izay i Samsôna dia nangataka tamin’ilay zatovo nitantana azy hoe:'
  - type: text
    content: –Tariho kely aho hitsapa ny andry izay manohana ny tempoly mba hiankinako aminy.
  '27':
  - type: text
    content: 'Ny tempoly anefa tamin’izay dia feno lehilahy sy vehivavy ary tao koa ny mpanjaka filistinina rehetra; ankoatra izany, teo an-tampontrano dia nisy olona tokony ho telo arivo, izay nijery an’i Samsôna nanao fanalana hamohamo. '
  '28':
  - type: text
    content: 'Koa niantso ny TOMPO i Samsôna nanao hoe:'
  - type: text
    content: –Ry Tompo ANDRIANANAHARY ô, mba tsarovy aho! Ka omeo hery aho, Andriamanitra ô, na dia amin’izao indray mandeha izao ihany aza mba hamaliako faty indray maka monja ireo Filistinina noho ny amin’ny voamasoko roa.
  '29':
  - type: text
    content: 'Dia notsapatsapain’i Samsôna ireo andry roa afovoany izay nanohana ny tempoly; ka ny anankiray niankinan’ny tanany havanana, ary ny anankiray niankinan’ny tanany havia. '
  '3':
  - type: text
    content: Dia natory tsara i Samsôna ambara-pisasaky ny alina. Fa nony nisasaka ny alina, dia nifoha izy; ka nobetainy ny lela-varavarana kopa-droan’ny vavahadin’ny tanàna mbamin’ny tolàna roa ary nongotany niaraka tamin’ny hidiny, dia nataony an-tsoroka ary nentiny ka napetrany teo an-tampon’ny tendrombohitra manoloana ny tanàna Hebrôna
  - type: note
    content: 'Hebrôna: tanàna eo amin’ny 70 km ao atsinanan’i Gazà.'
  - type: text
    content: .
  - type: heading
    content: Ny namadihan’i Delilà an’i Samsôna
  '30':
  - type: text
    content: 'Dia nihiaka i Samsôna hoe:'
  - type: text
    content: –Aoka aho ho faty miaraka amin’ny Filistinina!
  - type: text
    content: Dia naronjiny mafy ny andry ka nianjeran’ny tempoly ireo mpanjaka sy izay rehetra tao. Koa betsaka lavitra ny olona matiny tamin’ny fahafatesany noho izay matiny tamin’ny androm-piainany.
  '31':
  - type: text
    content: Ary nidina ireo rahalahin’i Samsôna sy ny fianakavian-drainy mba haka ny fatiny. Dia nentiny niakatra izy ka naleviny tao am-pasan’i Manôà rainy, teo anelanelan’i Tsôrehà sy i Estaôla.
  - type: text
    content: I Samsôna no nitondra ny Israelita nandritra ny roapolo taona.
  '4':
  - type: text
    content: Taorian’izany i Samsôna dia raiki-pitia tamin’ny vehivavy atao hoe Delilà izay nonina tao amin’ny lohasaha Sôrèka
  - type: note
    content: 'Sôrèka: tanàna kely eo andrefan’ilay Tsôrehà fiavian’i Samsôna.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ary niakatra hankany amin’ilay vehivavy ireo mpanjaka filistinina ka nanao taminy hoe:'
  - type: text
    content: –Langolangoy i Samsôna mba hampahalala anao izay iavian’ny heriny lehibe sy ny fomba hahazoanay mandresy azy, dia hafatotray izy ka hofolahinay. Ary samy hanome anao vola sekela 1 100 avy izahay.
  '6':
  - type: text
    content: 'Dia nanontany an’i Samsôna tokoa i Delilà ka nanao hoe:'
  - type: text
    content: –Etsy ange ianao e, mba lazao ahy re izay iavian’izao herinao lehibe izao. Ary fomba ahoana no tokony hamatorana anao mba hahafolaka anao?
  '7':
  - type: text
    content: 'Dia namaly azy i Samsôna hoe:'
  - type: text
    content: –Raha tady vaovao fito tsy mbola maina no amatorana ahy, dia hanjary osa aho ka ho tahaka ny olon-tsotra.
  '8':
  - type: text
    content: 'Dia nitondran’ireo mpanjaka filistinina tady vaovao fito tsy mbola maina i Delilà ka nentiny namatorana an’i Samsôna ireny. '
  '9':
  - type: text
    content: 'Ary nisy lehilahy efa nafenin-dravehivavy tao an’efitranony. Dia nikiaka tampoka i Delilà ka nanao hoe:'
  - type: text
    content: –Ry Samsôna a, tonga hamely anao ny Filistinina!
  - type: text
    content: Dia notapatapahin’i Samsôna ireo tady ka maito tahaka ny tady rongony main’ny afo; ary tsy fantatra izay tsiambaratelon’ny heriny.
