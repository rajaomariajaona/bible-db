document_id: DEU.13,396
type_code: plt
verses:
  '1':
  - type: text
    content: Imasoy hotanterahina avokoa ny didy izay ampitaiko aminareo ka aza anampiana izany ary aza anesorana
  - type: note
    content: Jereo 4.2; Apôk 22.18-19. –Ao amin’ny dkt sasantsasany dia voalahatra ho 12.32 ny 13.1; noho izany, ny 13.2-19 dia manjary 13.1-18.
  - type: text
    content: .
  - type: heading
    content: Teny mamely an’ireo mpanompo sampy
  '10':
  - type: text
    content: 'fa vonoy ho faty mihitsy; ny tanan’izay olona notaominy no hiainga voalohany hamely torabato azy, vao ny tanan’ny vahoaka rehetra. '
  '11':
  - type: text
    content: 'Torahy vato izy ho faty, satria efa nitady hitaona anareo hiala amin’ny TOMPO Andriamanitrareo, Izay namoaka anareo tany Ejipta toera-nanandevozana anareo. '
  '12':
  - type: text
    content: Ary handre izany ny Israelita rehetra, dia hatahotra ka tsy hanao ratsy toy izany intsony.
  '13':
  - type: text
    content: 'Mety anankiray amin’ny tanàna nomen’ny TOMPO Andriamanitrareo honenanareo, no holazaina hoe: '
  '14':
  - type: text
    content: '«Nisy olona tena ratsy fanahy mpiray firenena aminareo ka nahataona ny mponina tao an-tanànany hanompo andriamani-kafa!». Tsy fantatrareo ireny andriamani-kafa ireny; ka raha misy filazana toy izany, '
  '15':
  - type: text
    content: 'dia dinihonareo sy anontanio ary fotory tsara. Raha nisy marina ka natao teo anivonareo izany zavatra mahatsiravina izany, '
  '16':
  - type: text
    content: 'dia asio amin’ny sabatra ho faty ny mponina sy ny biby fiompy amin’io tanàna io ka ataovy levona tanteraka ny tanàna sy izay rehetra eo aminy: '
  '17':
  - type: text
    content: 'angony eo afovoan’ny kianja ny entana rehetra voababo, ka dory avokoa na ny tanàna sy ireo entana ireo mba hafoy ho an’ny TOMPO Andriamanitra; dia ho tanàna aolo lalandava izany tanàna izany ka tsy haorina intsony. '
  '18':
  - type: text
    content: 'Aoka tsy hisy hataon’ny tananao fihi-mamba ny zavatra efa nafoy holevonina, mba hitsaharan’ny TOMPO amin’ny fahatezerany mirehitra; dia hamindrany fo tokoa ianareo ary hohamaroiny araka ny nampanantenainy ombàm-pianianana tamin’ny razambenareo, '
  '19':
  - type: text
    content: raha hohenoinareo ny feon’ny TOMPO Andriamanitrareo ka hotandremanareo ny didy rehetra izay ampitaiko aminareo mba hanatanterahana izay mahitsy eo imasony.
  '2':
  - type: text
    content: 'Mety hisy '
  - type: text
    content: mpaminany
  - type: text
    content: ' na mpahita'
  - type: note
    content: 'mpahita: jereo Jer 23.25-32.'
  - type: text
    content: ' mipoitra eo anivonareo ka hilaza famantarana na zava-mahagaga aminareo. '
  '3':
  - type: text
    content: 'Na dia tanteraka aza ny famantarana na zava-mahagaga nolazainy taminareo, kanefa avy eo izy manainga anareo hanaraka sy hanompo andriamani-kafa saingy andriamanitra tsy fantatrareo, '
  '4':
  - type: text
    content: 'dia aza henoinareo ny tenin’izany mpaminany na mpanonofy izany. Mizaha toetra anareo manko ny TOMPO Andriamanitrareo hahalalany raha tia Azy TOMPO Andriamanitra amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo ianareo. '
  '5':
  - type: text
    content: 'Ilay TOMPO Andriamanitrareo no harahinareo sy hohajainareo; ny didiny no hotandremanareo, ny feony no hohenoinareo, ary aoka Izy no hotompoinareo sy hifikiranareo. '
  '6':
  - type: text
    content: Izany mpaminany na mpahita izany kosa ataovy maty, satria efa nanao teny mampikomy anareo amin’ny TOMPO Andriamanitrareo. Izy TOMPO no efa nitondra anareo hiala tany Ejipta ka nanavotra anareo tamin’ny toera-nanandevozana anareo. Ataovy maty izany olona izany satria mitaona anareo hiala amin’ny sori-dàlana izay nasain’ny TOMPO Andriamanitrareo hizoranareo. Dia izany no hanesoranareo ny fanao ratsy ho fongotra eo anivonareo.
  '7':
  - type: text
    content: 'Mety misy aminareo hotaomin’ny mpiray tampo na zanaka na vady na sakaiza tsy foy, ka hataony hoe: «Andeha isika hanompo andriamani-kafa!» Tsy fantatrareo na ny razambenareo ireny andriamani-kafa ireny, '
  '8':
  - type: text
    content: 'dia ny andriamanitry ny firenena manodidina anareo, na ny akaiky na ny lavitra, manomboka amin’ny faravodilanitra ankilany ka miafara amin’ny faravodilanitra andaniny. '
  '9':
  - type: text
    content: 'Koa aza manaiky na mihaino ny havana aman-tsakaiza toy ireny ianareo. Ary aza mba angorahana izy na amindrana fo na arovana, '
