  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Imasoy hotanterahina avokoa ny didy izay ampitaiko aminareo ka aza anampiana izany ary aza anesorana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 4.2; Apôk 22.18-19. –Ao amin’ny dkt sasantsasany dia voalahatra ho 12.32 ny 13.1; noho izany, ny 13.2-19 dia manjary 13.1-18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny mamely an’ireo mpanompo sampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mety hisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' na mpahita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mpahita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jer 23.25-32.
    marker-yv: yv-n
  - type: text
    text: ' mipoitra eo anivonareo ka hilaza famantarana na zava-mahagaga aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Na dia tanteraka aza ny famantarana na zava-mahagaga nolazainy taminareo, kanefa avy eo izy manainga anareo hanaraka sy hanompo andriamani-kafa saingy andriamanitra tsy fantatrareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia aza henoinareo ny tenin’izany mpaminany na mpanonofy izany. Mizaha toetra anareo manko ny TOMPO Andriamanitrareo hahalalany raha tia Azy TOMPO Andriamanitra amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ilay TOMPO Andriamanitrareo no harahinareo sy hohajainareo; ny didiny no hotandremanareo, ny feony no hohenoinareo, ary aoka Izy no hotompoinareo sy hifikiranareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany mpaminany na mpahita izany kosa ataovy maty, satria efa nanao teny mampikomy anareo amin’ny TOMPO Andriamanitrareo. Izy TOMPO no efa nitondra anareo hiala tany Ejipta ka nanavotra anareo tamin’ny toera-nanandevozana anareo. Ataovy maty izany olona izany satria mitaona anareo hiala amin’ny sori-dàlana izay nasain’ny TOMPO Andriamanitrareo hizoranareo. Dia izany no hanesoranareo ny fanao ratsy ho fongotra eo anivonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mety misy aminareo hotaomin’ny mpiray tampo na zanaka na vady na sakaiza tsy foy, ka hataony hoe: «Andeha isika hanompo andriamani-kafa!» Tsy fantatrareo na ny razambenareo ireny andriamani-kafa ireny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia ny andriamanitry ny firenena manodidina anareo, na ny akaiky na ny lavitra, manomboka amin’ny faravodilanitra ankilany ka miafara amin’ny faravodilanitra andaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa aza manaiky na mihaino ny havana aman-tsakaiza toy ireny ianareo. Ary aza mba angorahana izy na amindrana fo na arovana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa vonoy ho faty mihitsy; ny tanan’izay olona notaominy no hiainga voalohany hamely torabato azy, vao ny tanan’ny vahoaka rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Torahy vato izy ho faty, satria efa nitady hitaona anareo hiala amin’ny TOMPO Andriamanitrareo, Izay namoaka anareo tany Ejipta toera-nanandevozana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary handre izany ny Israelita rehetra, dia hatahotra ka tsy hanao ratsy toy izany intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mety anankiray amin’ny tanàna nomen’ny TOMPO Andriamanitrareo honenanareo, no holazaina hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Nisy olona tena ratsy fanahy mpiray firenena aminareo ka nahataona ny mponina tao an-tanànany hanompo andriamani-kafa!». Tsy fantatrareo ireny andriamani-kafa ireny; ka raha misy filazana toy izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia dinihonareo sy anontanio ary fotory tsara. Raha nisy marina ka natao teo anivonareo izany zavatra mahatsiravina izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia asio amin’ny sabatra ho faty ny mponina sy ny biby fiompy amin’io tanàna io ka ataovy levona tanteraka ny tanàna sy izay rehetra eo aminy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'angony eo afovoan’ny kianja ny entana rehetra voababo, ka dory avokoa na ny tanàna sy ireo entana ireo mba hafoy ho an’ny TOMPO Andriamanitra; dia ho tanàna aolo lalandava izany tanàna izany ka tsy haorina intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aoka tsy hisy hataon’ny tananao fihi-mamba ny zavatra efa nafoy holevonina, mba hitsaharan’ny TOMPO amin’ny fahatezerany mirehitra; dia hamindrany fo tokoa ianareo ary hohamaroiny araka ny nampanantenainy ombàm-pianianana tamin’ny razambenareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: raha hohenoinareo ny feon’ny TOMPO Andriamanitrareo ka hotandremanareo ny didy rehetra izay ampitaiko aminareo mba hanatanterahana izay mahitsy eo imasony.
