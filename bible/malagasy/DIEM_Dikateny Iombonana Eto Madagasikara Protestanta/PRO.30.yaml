document_id: PRO.30,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tenin’i Agora
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny manan-danja nataon’i Agora zanakalahin’i Jake.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no teny hentitra nambaran’izany lehilahy izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’i Itiela, dia tamin’i Itiela sy i Okala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tamin’i Itiela... Okala: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'izany andalana izany raha ovana kely ny fitohizan’ny tarehin-tsoratra hebreo dia mety midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nisasatra aho, Andriamanitra ô; nisasatra aho, Andriamanitra ô, ka lanaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Rehefa miaraka amiko Andriamanitra, rehefa miaraka amiko Andriamanitra, dia mahomby aho.
      marker-yv: yv-n
    - type: text
      text: ':'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manendrikendrika ny mpanompo amin’ny tompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hozoniny ianao ka hiharam-pahavoazana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy karazan’olona izay manozona ny rainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba mirary soa ho an-dreniny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy karazan’olona izay mihevi-tena ho madio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy voasasa ho afaka amin’ny fahalotoany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy karazan’olona izay fatra-pianjonanjona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manana fijery miandranandrana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy karazan’olona izay manana toetra lozabe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa toy ny sabatra ny nifiny ary toy ny antsy ny vazany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'toy ny sabatra ny nifiny ary toy ny antsy ny vazany; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: momba ireo sarisary izay nenti-nilaza ny fomba fampahoriana ny mahantra ireo dia zahao koa 12.18; Sal 55.22; 59.8...
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka vonona izy hamongotra ny ory tsy ho amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa ny mahantra tsy ho eo anivon’ny olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ohabolana momba ny isa
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manan-janakavavy roa ny dinta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay samy manao hoe: «Omeo! Omeo!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy zavatra telo tsy mety afa-po
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady tsy mba manao hoe: «Aoka izay!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fonenan’ny maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny kibo tsy niteraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany tsy vonton-drano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa misy koa zavatra fahefatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny afo izay tsy mba manao hoe: «Aoka izay!».'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona izay miandranandrana amin-dray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mamingavinga ny fahanteran-dreny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hopotsirin’ny goaikan-driaka ny masony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hohanin’ny voromahery ny tenany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy zavatra telo tsy fantatro sady tsy takatro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fanidin’ny voromahery eny ana habakabaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fandadin’ny bibilava eny amin’ny vatolampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fizotran’ny sambo eny afovoan-dranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa misy koa zavatra fahefatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny firaikan’ny tovolahy amin’ny tovovavy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, dondrona toa biby aho raha samy olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mba manana izay fahaizan’olombelona akory.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Toy izao no fomban’ny vehivavy mpanitsakitsa-bady:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misesika remby izy, dia mamafa vava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary miteny hoe: «Tsy nanao ratsy aho!»'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy zavatra telo mampikorontana tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy azony leferina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny andevo izay tonga mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny adala izay miletra hanina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vehivavy fanganga izay manambady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa misy koa zavatra fahefatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny mpanompovavy mandimby tompovavy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy karazam-biby efatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tena bitika etỳ ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'saingy manam-pahendrena mampitolagaga:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny vitsika, izay andiam-biby tsy matanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa manangona ny haniny amin’ny fahavaratra;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny marmôta, izay andiam-biby tsy manan-kery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mahavita trano eny amin’ny harambato;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny valala, izay tsy mana-mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hain’izy rehetra ny miainga manao andiany;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny androngo, izay azo samborin-tanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tonga hatrany an-dapan’ny mpanjaka.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy zava-miaina telo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay tsara famindra sy miedinedim-pandeha:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny liona, izay mahery indrindra amin’ny biby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mihemotra na amin’inona na amin’inona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny soavaly izay manana andila-mihantsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny osilahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa misy koa fahefatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny mpanjaka eo alohan-tafika.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nianatra fahendrena na oviana na oviana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy nahazo ny fahalalan’ireo olo-masina.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha niadaladala ka nanandra-tena ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha mba nieritreritra kosa avy eo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tampeno ny vavanao mba tsy hiteny!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fikapohan-dronono no manome dibera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: famelezana ny orona no mampivoa-dra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fanetseham-pahatezerana no miteraka ady.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no efa niakatra tany an-danitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nidina avy tany indray?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nahangona ny rivotra tao an-tanany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nahafono ny rano tamin’ny lambany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nandraikitra ny faravazan-tany rehetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no anarany? Iza no anaran-janany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambarao raha fantatrao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voazaha toetra avokoa ny tenin’Andriamanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny ampinga Izy ho an’izay mialoka aminy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manampy na inona na inona amin’ny teniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hofaizin’Andriamanitra ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiharihary ny maha mpandainga anao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Zavatra roa no angatahiko aminao, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza lavina alohan’ny hahafatesako.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alao amiko ny fitaka sy ny lainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza omena fahantrana aho na koa harena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay hanina sahaza ahy ihany omena ahy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao ho tototra harena aho, dia handà Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hahateny hoe: ‹Fa iza moa ny TOMPO?›'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na fandrao hahantra aho, dia mety hangalatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanala baràka ny anaran’Andriamanitro».
