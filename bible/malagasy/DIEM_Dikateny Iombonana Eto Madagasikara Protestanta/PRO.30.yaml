document_id: PRO.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tenin’i Agora
  - type: text
    content: Teny manan-danja nataon’i Agora zanakalahin’i Jake.
  - type: text
    content: Izao no teny hentitra nambaran’izany lehilahy izany
  - type: text
    content: tamin’i Itiela, dia tamin’i Itiela sy i Okala
  - type: note
    content: 'tamin’i Itiela... Okala: izany andalana izany raha ovana kely ny fitohizan’ny tarehin-tsoratra hebreo dia mety midika hoe Nisasatra aho, Andriamanitra ô; nisasatra aho, Andriamanitra ô, ka lanaka na hoe Rehefa miaraka amiko Andriamanitra, rehefa miaraka amiko Andriamanitra, dia mahomby aho.'
  - type: text
    content: ':'
  '10':
  - type: text
    content: Aza manendrikendrika ny mpanompo amin’ny tompony,
  - type: text
    content: fandrao hozoniny ianao ka hiharam-pahavoazana.
  '11':
  - type: text
    content: Misy karazan’olona izay manozona ny rainy
  - type: text
    content: ary tsy mba mirary soa ho an-dreniny.
  '12':
  - type: text
    content: Misy karazan’olona izay mihevi-tena ho madio,
  - type: text
    content: nefa tsy voasasa ho afaka amin’ny fahalotoany.
  '13':
  - type: text
    content: Misy karazan’olona izay fatra-pianjonanjona
  - type: text
    content: sady manana fijery miandranandrana.
  '14':
  - type: text
    content: Misy karazan’olona izay manana toetra lozabe
  - type: text
    content: fa toy ny sabatra ny nifiny ary toy ny antsy ny vazany
  - type: note
    content: toy ny sabatra ny nifiny ary toy ny antsy ny vazany; momba ireo sarisary izay nenti-nilaza ny fomba fampahoriana ny mahantra ireo dia zahao koa 12.18; Sal 55.22; 59.8...
  - type: text
    content: .
  - type: text
    content: ka vonona izy hamongotra ny ory tsy ho amin’ny tany
  - type: text
    content: ary koa ny mahantra tsy ho eo anivon’ny olona.
  - type: heading
    content: Ohabolana momba ny isa
  '15':
  - type: text
    content: Manan-janakavavy roa ny dinta
  - type: text
    content: 'izay samy manao hoe: «Omeo! Omeo!»'
  - type: text
    content: Misy zavatra telo tsy mety afa-po
  - type: text
    content: 'sady tsy mba manao hoe: «Aoka izay!»'
  - type: text
    content: dia ny fonenan’ny maty,
  - type: text
    content: sy ny kibo tsy niteraka,
  - type: text
    content: ary ny tany tsy vonton-drano;
  - type: text
    content: kanefa misy koa zavatra fahefatra,
  - type: text
    content: 'dia ny afo izay tsy mba manao hoe: «Aoka izay!».'
  '17':
  - type: text
    content: Ny olona izay miandranandrana amin-dray
  - type: text
    content: sy mamingavinga ny fahanteran-dreny
  - type: text
    content: dia hopotsirin’ny goaikan-driaka ny masony
  - type: text
    content: ary hohanin’ny voromahery ny tenany.
  '18':
  - type: text
    content: Misy zavatra telo tsy fantatro sady tsy takatro,
  - type: text
    content: dia ny fanidin’ny voromahery eny ana habakabaka
  - type: text
    content: sy ny fandadin’ny bibilava eny amin’ny vatolampy
  - type: text
    content: ary ny fizotran’ny sambo eny afovoan-dranomasina;
  - type: text
    content: kanefa misy koa zavatra fahefatra,
  - type: text
    content: dia ny firaikan’ny tovolahy amin’ny tovovavy.
  '2':
  - type: text
    content: Eny, dondrona toa biby aho raha samy olona,
  - type: text
    content: fa tsy mba manana izay fahaizan’olombelona akory.
  '20':
  - type: text
    content: 'Toy izao no fomban’ny vehivavy mpanitsakitsa-bady:'
  - type: text
    content: misesika remby izy, dia mamafa vava
  - type: text
    content: 'ary miteny hoe: «Tsy nanao ratsy aho!»'
  '21':
  - type: text
    content: Misy zavatra telo mampikorontana tany,
  - type: text
    content: sady tsy azony leferina,
  - type: text
    content: dia ny andevo izay tonga mpanjaka
  - type: text
    content: sy ny adala izay miletra hanina
  - type: text
    content: ary ny vehivavy fanganga izay manambady;
  - type: text
    content: kanefa misy koa zavatra fahefatra,
  - type: text
    content: dia ny mpanompovavy mandimby tompovavy.
  '24':
  - type: text
    content: Misy karazam-biby efatra
  - type: text
    content: tena bitika etỳ ambonin’ny tany
  - type: text
    content: 'saingy manam-pahendrena mampitolagaga:'
  '25':
  - type: text
    content: dia ny vitsika, izay andiam-biby tsy matanjaka,
  - type: text
    content: nefa manangona ny haniny amin’ny fahavaratra;
  '26':
  - type: text
    content: ny marmôta, izay andiam-biby tsy manan-kery,
  - type: text
    content: nefa mahavita trano eny amin’ny harambato;
  '27':
  - type: text
    content: ny valala, izay tsy mana-mpanjaka,
  - type: text
    content: nefa hain’izy rehetra ny miainga manao andiany;
  '28':
  - type: text
    content: ny androngo, izay azo samborin-tanana,
  - type: text
    content: nefa tonga hatrany an-dapan’ny mpanjaka.
  '29':
  - type: text
    content: Misy zava-miaina telo
  - type: text
    content: 'izay tsara famindra sy miedinedim-pandeha:'
  - type: text
    content: dia ny liona, izay mahery indrindra amin’ny biby
  - type: text
    content: ka tsy mihemotra na amin’inona na amin’inona;
  - type: text
    content: sy ny soavaly izay manana andila-mihantsika,
  - type: text
    content: ary ny osilahy;
  - type: text
    content: kanefa misy koa fahefatra,
  - type: text
    content: dia ny mpanjaka eo alohan-tafika.
  '3':
  - type: text
    content: Tsy nianatra fahendrena na oviana na oviana aho,
  - type: text
    content: saingy nahazo ny fahalalan’ireo olo-masina.
  '32':
  - type: text
    content: Raha niadaladala ka nanandra-tena ianao
  - type: text
    content: ary raha mba nieritreritra kosa avy eo,
  - type: text
    content: dia tampeno ny vavanao mba tsy hiteny!
  '33':
  - type: text
    content: Fa fikapohan-dronono no manome dibera,
  - type: text
    content: famelezana ny orona no mampivoa-dra,
  - type: text
    content: ary fanetseham-pahatezerana no miteraka ady.
  '4':
  - type: text
    content: Iza no efa niakatra tany an-danitra
  - type: text
    content: ka nidina avy tany indray?
  - type: text
    content: Iza no nahangona ny rivotra tao an-tanany?
  - type: text
    content: Iza no nahafono ny rano tamin’ny lambany?
  - type: text
    content: Iza no nandraikitra ny faravazan-tany rehetra?
  - type: text
    content: Iza no anarany? Iza no anaran-janany?
  - type: text
    content: Ambarao raha fantatrao.
  '5':
  - type: text
    content: Voazaha toetra avokoa ny tenin’Andriamanitra.
  - type: text
    content: Toy ny ampinga Izy ho an’izay mialoka aminy.
  '6':
  - type: text
    content: Aza manampy na inona na inona amin’ny teniny,
  - type: text
    content: fandrao hofaizin’Andriamanitra ianao
  - type: text
    content: ka hiharihary ny maha mpandainga anao.
  '7':
  - type: text
    content: «Zavatra roa no angatahiko aminao, Andriamanitra ô,
  - type: text
    content: ka aza lavina alohan’ny hahafatesako.
  '8':
  - type: text
    content: Alao amiko ny fitaka sy ny lainga
  - type: text
    content: ary aza omena fahantrana aho na koa harena,
  - type: text
    content: fa izay hanina sahaza ahy ihany omena ahy.
  '9':
  - type: text
    content: Fandrao ho tototra harena aho, dia handà Anao
  - type: text
    content: 'ka hahateny hoe: ‹Fa iza moa ny TOMPO?›'
  - type: text
    content: na fandrao hahantra aho, dia mety hangalatra
  - type: text
    content: ka hanala baràka ny anaran’Andriamanitro».
