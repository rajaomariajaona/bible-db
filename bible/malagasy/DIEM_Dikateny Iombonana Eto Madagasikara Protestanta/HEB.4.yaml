document_id: HEB.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Mbola namelan’Andriamanitra fampanantenana isika fa hiditra ao amin’ny toeram-pitsaharana voaomany ho antsika; koa mitandrema isika mba tsy hisy aminareo tsy ho tody amin’izany. '
  '10':
  - type: text
    content: 'Fa izay tafiditra ao amin’ny fitsaharana voaoman’Andriamanitra, dia mitsahatra amin’ny asany tahaka ny nitsaharan’Andriamanitra tamin’ny Azy. '
  '11':
  - type: text
    content: Koa aoka isika hazoto hiditra ao amin’izany fitsaharana izany, mba tsy hisy amintsika ho voan’ny tsy fanekena tahaka an-dry zareo tany an-taniefitra fahiny.
  '12':
  - type: text
    content: 'Fa velona sy mahery ny tenin’Andriamanitra, sady maranitra noho ny sabatra roa lela ka maninteraka hatrany amin’ny fihaonan’ny aina sy ny fanahy ary hatrany amin’ny fihaonan’ny famavàny sy ny tsoka; hainy tsaraina ny eritreritra amam-pisainan’ny fon’ny olona. '
  '13':
  - type: text
    content: Tsy misy zavaboaary miafina amin’Andriamanitra; fa ny zavatra rehetra dia mihanjahanja sy miharihary eo imasony, ary Izy no hampamoaka antsika ny amin’izay ataontsika.
  - type: heading
    content: I Jesoa Mpisorombe tsy manampaharoa
  '14':
  - type: text
    content: 'Aoka àry hotanantsika mafy ny finoana efa nekentsika, satria isika manana Mpisorombe tsy anoharana Izay lasa namakivaky ny lanitra, dia i Jesoa ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Tsy mba Mpisorombe tsy afaka miara-mizaka ny fahalementsika no ananantsika, fa Mpisorombe efa nalaim-panahy tamin’ny zavatra rehetra tahaka antsika ihany, saingy tsy mba nanota. '
  '16':
  - type: text
    content: Koa aoka isika hatoky hanatona ny sezafiandrianan’Andriamanitra, izay toeram-pahasoavana; eo no hahazoantsika famindrampo ary koa hahitantsika fahasoavana, ka hanampian’Andriamanitra antsika amin’ny fotoana ilantsika izany.
  '2':
  - type: text
    content: 'Efa nitoriana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' isika, tahaka an-dry zareo tany an-taniefitra fahiny. Ren’ireo ny hafatra, nefa tsy nahasoa azy, satria tsy mba anisan’izay nihaino izany tamim-pinoana ireo'
  - type: note
    content: 'satria... tamim-pinoana ireo: misy stf sasany ahitana hoe satria tsy nombàny finoana tamin’ny nandrenesany azy.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Fa isika mpino kosa dia hiditra any amin’izany toeram-pitsaharana izany, araka ny voalazan’Andriamanitra hoe:'
  - type: text
    content: '«Tezitra aho, ka nianiana hoe:'
  - type: text
    content: Tsy hiditra mihitsy ao amin’ny toeram-pitsaharana nomaniko ireo
  - type: note
    content: Sal 95.11.
  - type: text
    content: .»
  - type: text
    content: Izany no teny nataon’Andriamanitra na dia efa vitany tamin’ny nahariany an’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' aza ny asany. '
  '4':
  - type: text
    content: 'Fa misy teny anankiray izay, ao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ', milaza ny andro fahafito manao hoe: «Dia nitsahatra tamin’ny asany rehetra Andriamanitra tamin’ny andro fahafito'
  - type: note
    content: Gen 2.2.
  - type: text
    content: '.» '
  '5':
  - type: text
    content: 'Ary eto indray dia ny hoe: «Tsy hiditra mihitsy ao amin’ny toeram-pitsaharana nomaniko ireo'
  - type: note
    content: Sal 95.11.
  - type: text
    content: '.» '
  '6':
  - type: text
    content: 'Noho izany, ireo voalohany nandre ny Vaovao Mahafaly dia tsy tafiditra tao amin’izany toeram-pitsaharana izany, satria tsy nanaiky; fa mbola mahazo miditra ihany ny sasany. '
  '7':
  - type: text
    content: 'Koa nametra andro anankiray indray Andriamanitra, andro anankiray antsoiny hoe «anio». Izany kosa dia nolazainy tatỳ aoriana elabe, tamin’ny alalan’i Davida, ao amin’ny andinin-tSoratra Masina voatonona teo hoe:'
  - type: text
    content: «Anio, raha renareo ny feon’Andriamanitra
  - type: text
    content: dia aza hamafisina ny fonareo
  - type: note
    content: Sal 95.7-8, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '8':
  - type: text
    content: Raha tàhiny efa vitan’i Josoa ny fanomezana fitsaharana ny vahoaka
  - type: note
    content: Jereo Fifan 31.7; Jos 22.4.
  - type: text
    content: ', dia tsy ho nilaza andro hafa indray Andriamanitra tatỳ aoriana. '
  '9':
  - type: text
    content: 'Koa dia mbola misy fitsaharana ho an’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ', amin’ny andro fahafito. '
