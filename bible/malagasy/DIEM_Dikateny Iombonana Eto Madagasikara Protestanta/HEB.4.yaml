document_id: HEB.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mbola namelan’Andriamanitra fampanantenana isika fa hiditra ao amin’ny toeram-pitsaharana voaomany ho antsika; koa mitandrema isika mba tsy hisy aminareo tsy ho tody amin’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Efa nitoriana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' isika, tahaka an-dry zareo tany an-taniefitra fahiny. Ren’ireo ny hafatra, nefa tsy nahasoa azy, satria tsy mba anisan’izay nihaino izany tamim-pinoana ireo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria... tamim-pinoana ireo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: satria tsy nombàny finoana tamin’ny nandrenesany azy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa isika mpino kosa dia hiditra any amin’izany toeram-pitsaharana izany, araka ny voalazan’Andriamanitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Tezitra aho, ka nianiana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiditra mihitsy ao amin’ny toeram-pitsaharana nomaniko ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 95.11.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: m
  children:
  - type: text
    text: Izany no teny nataon’Andriamanitra na dia efa vitany tamin’ny nahariany an’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' aza ny asany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa misy teny anankiray izay, ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ', milaza ny andro fahafito manao hoe: «Dia nitsahatra tamin’ny asany rehetra Andriamanitra tamin’ny andro fahafito'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 2.2.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary eto indray dia ny hoe: «Tsy hiditra mihitsy ao amin’ny toeram-pitsaharana nomaniko ireo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 95.11.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noho izany, ireo voalohany nandre ny Vaovao Mahafaly dia tsy tafiditra tao amin’izany toeram-pitsaharana izany, satria tsy nanaiky; fa mbola mahazo miditra ihany ny sasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa nametra andro anankiray indray Andriamanitra, andro anankiray antsoiny hoe «anio». Izany kosa dia nolazainy tatỳ aoriana elabe, tamin’ny alalan’i Davida, ao amin’ny andinin-tSoratra Masina voatonona teo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Anio, raha renareo ny feon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aza hamafisina ny fonareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 95.7-8, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha tàhiny efa vitan’i Josoa ny fanomezana fitsaharana ny vahoaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Fifan 31.7; Jos 22.4.
    marker-yv: yv-n
  - type: text
    text: ', dia tsy ho nilaza andro hafa indray Andriamanitra tatỳ aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa dia mbola misy fitsaharana ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ', amin’ny andro fahafito. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa izay tafiditra ao amin’ny fitsaharana voaoman’Andriamanitra, dia mitsahatra amin’ny asany tahaka ny nitsaharan’Andriamanitra tamin’ny Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa aoka isika hazoto hiditra ao amin’izany fitsaharana izany, mba tsy hisy amintsika ho voan’ny tsy fanekena tahaka an-dry zareo tany an-taniefitra fahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa velona sy mahery ny tenin’Andriamanitra, sady maranitra noho ny sabatra roa lela ka maninteraka hatrany amin’ny fihaonan’ny aina sy ny fanahy ary hatrany amin’ny fihaonan’ny famavàny sy ny tsoka; hainy tsaraina ny eritreritra amam-pisainan’ny fon’ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy misy zavaboaary miafina amin’Andriamanitra; fa ny zavatra rehetra dia mihanjahanja sy miharihary eo imasony, ary Izy no hampamoaka antsika ny amin’izay ataontsika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'I Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisorombe
  - type: text
    text: ' tsy manampaharoa'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Aoka àry hotanantsika mafy ny finoana efa nekentsika, satria isika manana Mpisorombe tsy anoharana Izay lasa namakivaky ny lanitra, dia i Jesoa ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy mba Mpisorombe tsy afaka miara-mizaka ny fahalementsika no ananantsika, fa Mpisorombe efa nalaim-panahy tamin’ny zavatra rehetra tahaka antsika ihany, saingy tsy mba nanota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa aoka isika hatoky hanatona ny sezafiandrianan’Andriamanitra, izay toeram-pahasoavana; eo no hahazoantsika famindrampo ary koa hahitantsika fahasoavana, ka hanampian’Andriamanitra antsika amin’ny fotoana ilantsika izany.
