document_id: JER.40,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nipetraka tao Mitsepà i Jeremià
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary tonga tamin’i Jeremià indray ny teny avy amin’ny TOMPO taorian’ny namotsoran’i Nebozaradàna, lehiben’ny mpiambina azy hiala tao Ramà.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nigadra niaraka tamin’ny olon’i Jerosalema sy ny olon’i Joda izay efa hoentin-ko babo any Babilôna i Jeremià. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hipetraka eto Mitsepà aho mba hisolo tena anareo eo anatrehan’ny Babilônianina izay tonga eto amintsika; fa ianareo kosa manangòna divay sy voankazo ary diloilo ka manaova tahiry, ary monena amin’izay tanàna hidiranareo.»
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tahaka izany koa ireo Jodeanina nitoetra tany amin’ny Môabita sy ny Hamônita sy ny Edômita ary tany amin’ny faritra rehetra hafa, dia samy nahare fa misy ampahany amin’ny vahoaka navelan’ny mpanjakan’i Babilôna ao amin’ny fanjakan’i Joda ary nankininy tamin’i Gedalià zanakalahin’i Ahikama sy zafikelin’i Safàna. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa ireny Jodeanina rehetra ireny dia niverina avy any amin’ny toerana izay nandroahana azy, ka tonga tany amin’i Gedalià tao Mitsepà, any amin’ny tanin’i Joda. Dia nanangona divay sy voankazo be dia be ireny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny namonoana an’i Gedalià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 25.25-26)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Indray andro dia tonga nihaona tamin’i Gedalià tao Mitsepà i Jôhanàna zanakalahin’i Karea sy ireo olon-kafa lehiben’ny andia-miaramila izay mbola tany an-tsaha. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nanontany an’i Gedalià izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa fantatrao tsara ve fa i Bahalisa, mpanjakan’ny Hamônita, dia naniraka an’i Jismahela, zanakalahin’i Netanià, hamono anao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy nino azy i Gedalià. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Na izany aza dia tonga nihaona mangingina tamin’i Gedalià tao Mitsepà ihany i Jôhanàna ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka aho handeha hamely an’i Jismahela, zanakalahin’i Netanià fa tsy hisy olona hahalala akory? Nahoana no havelanao hovonoiny ho faty ny tenanao? Fa raha matiny ianao, dia hiparitaka indray ny Jodeanina rehetra efa tafangona eto aminao; ary izay hany sisa amin’ny fanjakàn’i Joda dia ho levona.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nefa namaly an’i Jôhanàna i Gedalià ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza manao izany zavatra izany! Fa tsy marina izay voalazanao momba an’i Jismahela.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Teo izy no nalain’ny lehiben’ny mpiambina ka nilazany hoe: «Ny TOMPO Andriamanitrao no nanambara mialoha izao loza manjo ity tanàna ity izao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ankehitriny dia notanterahin’ny TOMPO tokoa izay nambarany, noho ny nanotanareo taminy sy tsy nankatoavanareo izay nolazainy. Izany no nahatonga izao zavatra izao taminareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ankehitriny, indro vahako izao ny gadra eny an-tananao; koa raha tianao ny handeha hiaraka amiko hankany Babilôna, dia andao fa izaho no hiahy anao. Nefa raha tsy tianao izany, dia mijanòna. Hevero ho eo anatrehanao ny tany manontolo, koa mandehàna amin’izay toerana tianao haleha.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary raha mbola nihazohazo teo i Jeremià, dia hoy i Nebozaradàna taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: «Mahazo miverina any amin’i Gedalià, zanakalahin’i Ahikama sy zafikelin’i Safàna ianao, fa izy no voatendrin’ny mpanjakan’i Babilôna hitondra ireo tanànan’i Joda. Mipetraha miaraka aminy eo anivon’ny vahoaka, ka mandehàna amin’izay toerana tianao haleha.»
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nomen’ny lehiben’ny mpiambina vatsy sy fanomezana i Jeremià, ary navelany handeha. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary i Jeremià nankany amin’i Gedalià zanakalahin’i Ahikama tao Mitsepà, ka niara-nipetraka taminy teo anivon’ny vahoaka izay sisa velona teo amin’ny tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nivondrona nanodidina an’i Gedalià ny olon’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (40.7-9; jereo 2 Mp 25.23-24)
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mbola nisy andia-miaramila jodeanina tavela tany an-tsaha; henon’ireo lehibeny sy ireo olom-peheziny fa ny mpanjakan’i Babilôna efa nanendry an’i Gedalià, zanakalahin’i Ahikama hitondra ny tany sy nanankina taminy ny mahantra, dia izay lehilahy sy vehivavy ary ankizy tsy nentina ho babo tany Babilôna. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa nanatona an’i Gedalià tao Mitsepà niaraka tamin’ny olom-peheziny ary ireo lehiben’andia-miaramila ireo, fa ireto avy izy: i Jismahela zanakalahin’i Netanià, i Jôhanàna sy i Jônatàna samy zanakalahin’i Karea, i Seraià zanakalahin’i Tanehometa, ireo zanakalahin’i Hôfay avy any Netôfà, ary i Jazanià avy any Mahekà. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nanizingizina tamin’ireo sy tamin’ny olom-peheziny i Gedalià nanao hoe: «Aza matahotra hanompo ny Babilônianina ianareo; monena amin’ny tany ary maneke ny mpanjakan’i Babilôna, fa hahasoa anareo izany. '
