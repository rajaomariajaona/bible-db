document_id: JER.40,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nipetraka tao Mitsepà i Jeremià
  - type: text
    content: Ary tonga tamin’i Jeremià indray ny teny avy amin’ny TOMPO taorian’ny namotsoran’i Nebozaradàna, lehiben’ny mpiambina azy hiala tao Ramà.
  - type: text
    content: 'Fa nigadra niaraka tamin’ny olon’i Jerosalema sy ny olon’i Joda izay efa hoentin-ko babo any Babilôna i Jeremià. '
  '10':
  - type: text
    content: Hipetraka eto Mitsepà aho mba hisolo tena anareo eo anatrehan’ny Babilônianina izay tonga eto amintsika; fa ianareo kosa manangòna divay sy voankazo ary diloilo ka manaova tahiry, ary monena amin’izay tanàna hidiranareo.»
  '11':
  - type: text
    content: 'Tahaka izany koa ireo Jodeanina nitoetra tany amin’ny Môabita sy ny Hamônita sy ny Edômita ary tany amin’ny faritra rehetra hafa, dia samy nahare fa misy ampahany amin’ny vahoaka navelan’ny mpanjakan’i Babilôna ao amin’ny fanjakan’i Joda ary nankininy tamin’i Gedalià zanakalahin’i Ahikama sy zafikelin’i Safàna. '
  '12':
  - type: text
    content: Koa ireny Jodeanina rehetra ireny dia niverina avy any amin’ny toerana izay nandroahana azy, ka tonga tany amin’i Gedalià tao Mitsepà, any amin’ny tanin’i Joda. Dia nanangona divay sy voankazo be dia be ireny.
  - type: heading
    content: Ny namonoana an’i Gedalià
  - type: heading
    content: (Jereo 2 Mp 25.25-26)
  '13':
  - type: text
    content: 'Indray andro dia tonga nihaona tamin’i Gedalià tao Mitsepà i Jôhanàna zanakalahin’i Karea sy ireo olon-kafa lehiben’ny andia-miaramila izay mbola tany an-tsaha. '
  '14':
  - type: text
    content: 'Nanontany an’i Gedalià izy hoe:'
  - type: text
    content: –Moa fantatrao tsara ve fa i Bahalisa, mpanjakan’ny Hamônita, dia naniraka an’i Jismahela, zanakalahin’i Netanià, hamono anao?
  - type: text
    content: 'Nefa tsy nino azy i Gedalià. '
  '15':
  - type: text
    content: 'Na izany aza dia tonga nihaona mangingina tamin’i Gedalià tao Mitsepà ihany i Jôhanàna ka nanao taminy hoe:'
  - type: text
    content: –Aoka aho handeha hamely an’i Jismahela, zanakalahin’i Netanià fa tsy hisy olona hahalala akory? Nahoana no havelanao hovonoiny ho faty ny tenanao? Fa raha matiny ianao, dia hiparitaka indray ny Jodeanina rehetra efa tafangona eto aminao; ary izay hany sisa amin’ny fanjakàn’i Joda dia ho levona.
  '16':
  - type: text
    content: 'Nefa namaly an’i Jôhanàna i Gedalià ka nanao hoe:'
  - type: text
    content: –Aza manao izany zavatra izany! Fa tsy marina izay voalazanao momba an’i Jismahela.
  '2':
  - type: text
    content: 'Teo izy no nalain’ny lehiben’ny mpiambina ka nilazany hoe: «Ny TOMPO Andriamanitrao no nanambara mialoha izao loza manjo ity tanàna ity izao. '
  '3':
  - type: text
    content: 'Ary ankehitriny dia notanterahin’ny TOMPO tokoa izay nambarany, noho ny nanotanareo taminy sy tsy nankatoavanareo izay nolazainy. Izany no nahatonga izao zavatra izao taminareo. '
  '4':
  - type: text
    content: Ankehitriny, indro vahako izao ny gadra eny an-tananao; koa raha tianao ny handeha hiaraka amiko hankany Babilôna, dia andao fa izaho no hiahy anao. Nefa raha tsy tianao izany, dia mijanòna. Hevero ho eo anatrehanao ny tany manontolo, koa mandehàna amin’izay toerana tianao haleha.»
  '5':
  - type: text
    content: 'Ary raha mbola nihazohazo teo i Jeremià, dia hoy i Nebozaradàna taminy:'
  - type: text
    content: «Mahazo miverina any amin’i Gedalià, zanakalahin’i Ahikama sy zafikelin’i Safàna ianao, fa izy no voatendrin’ny mpanjakan’i Babilôna hitondra ireo tanànan’i Joda. Mipetraha miaraka aminy eo anivon’ny vahoaka, ka mandehàna amin’izay toerana tianao haleha.»
  - type: text
    content: 'Dia nomen’ny lehiben’ny mpiambina vatsy sy fanomezana i Jeremià, ary navelany handeha. '
  '6':
  - type: text
    content: Ary i Jeremià nankany amin’i Gedalià zanakalahin’i Ahikama tao Mitsepà, ka niara-nipetraka taminy teo anivon’ny vahoaka izay sisa velona teo amin’ny tany.
  - type: heading
    content: Nivondrona nanodidina an’i Gedalià ny olon’i Joda
  - type: heading
    content: (40.7-9; jereo 2 Mp 25.23-24)
  '7':
  - type: text
    content: 'Mbola nisy andia-miaramila jodeanina tavela tany an-tsaha; henon’ireo lehibeny sy ireo olom-peheziny fa ny mpanjakan’i Babilôna efa nanendry an’i Gedalià, zanakalahin’i Ahikama hitondra ny tany sy nanankina taminy ny mahantra, dia izay lehilahy sy vehivavy ary ankizy tsy nentina ho babo tany Babilôna. '
  '8':
  - type: text
    content: 'Koa nanatona an’i Gedalià tao Mitsepà niaraka tamin’ny olom-peheziny ary ireo lehiben’andia-miaramila ireo, fa ireto avy izy: i Jismahela zanakalahin’i Netanià, i Jôhanàna sy i Jônatàna samy zanakalahin’i Karea, i Seraià zanakalahin’i Tanehometa, ireo zanakalahin’i Hôfay avy any Netôfà, ary i Jazanià avy any Mahekà. '
  '9':
  - type: text
    content: 'Dia nanizingizina tamin’ireo sy tamin’ny olom-peheziny i Gedalià nanao hoe: «Aza matahotra hanompo ny Babilônianina ianareo; monena amin’ny tany ary maneke ny mpanjakan’i Babilôna, fa hahasoa anareo izany. '
