document_id: GEN.36,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nipetrahan’i Hesao tany amin’ny tany Edôma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izao no lisitry ny taranak’i Hesao na koa i Edôma. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no anaran’ny zanakalahin’i Hesao: i Elifaza zanakalahin’i Hadà vadiny, ary i Rehoela zanakalahin’i Basemata vadiny.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Elifaza dia i Temàna sy i Omara, i Tsefao sy i Gahetama ary i Kenaza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Timnà vadikelin’i Elifaza dia niteraka an’i Hamalèka taminy koa. Ireo no zafikelin’i Hesao sy i Hadà vadiny.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Rehoela dia i Nahata sy i Zera ary i Samà sy i Mizà. Ireo no zafikelin’i Hesao sy i Basemata vadiny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’i Ohôlibamà, zanakavavin’i Hanà sy zafikelin’i Tsibehôna sady vadin’i Hesao, dia ireto kosa no zanakalahiny: i Jehîsa sy i Jahelàma ary Kôrà.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy no filoham-pianakavian’ny taranak’i Hesao. Samy filoham-pianakaviany avokoa ireo zanakalahin’i Elifaza lahimatoan’i Hesao, dia i Temàna sy i Omara, i Tsefao sy i Kenaza, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Kôra sy i Gahetama ary i Hamalèka; tao amin’ny faritr’i Edôma ireo ary zafikelin’i Hadà.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samy filoham-pianakaviany avokoa ny zanakalahin’i Rehoela zanak’i Hesao, dia i Nahata sy i Zera ary i Samà sy i Mizà; tao amin’ny faritr’i Edôma ireo ary zafikelin’i Basemata vadin’i Hesao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samy filoham-pianakaviany avokoa ireo zanakalahin’i Ohôlibamà vadin’i Hesao, dia i Jehîsa sy i Jahilama ary i Kôrà; izy telo lahy kosa dia avy tamin’i Ohôlibamà izay zanakavavin’i Hanà sy vadin’i Hesao.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no taranak’i Hesao na hoe i Edôma, ka samy filoham-pianakaviany avy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naka vady kanahanita i Hesao, dia i Hadà zanakavavin’i Elôna izay hetita, sy i Ohôlibamà zanakavavin’i Hanà sady zafikelin’i Tsibehôna izay hivita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hivita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe AMÔRITA.
      marker-yv: yv-n
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mponina taloha tao amin’ny faritr’i Edôma dia ireo taranak’i Sehira ilay Hôrita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hôrita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe AMÔRITA.
      marker-yv: yv-n
    - type: text
      text: '. Ny zanakalahin’i Sehîra dia i Lôtàna sy i Sôbala, i Tsibehôna sy i Hanà, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Disôna sy i Etsera ary i Disàna. Ireo no filoham-pianakaviana hôrita, tao amin’ny faritr’i Edôma.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Lôtàna dia i Hôry sy i Hemàma. Nanana anabavy atao hoe Timnà i Lôtàna. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no zanakalahin’i Sôbala: i Halevàna sy i Manahata, i Hebala sy i Sefao ary i Onama. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no zanakalahin’i Tsibehôna: i Aià sy i Hanà; ity Hanà ity no nahita rano'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'rano: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt syriaka; tsy fantatra ny hevitry ny teny hebreo mifanandrify aminy.
      marker-yv: yv-n
    - type: text
      text: 'tany an-taniefitra, fony izy niandry ny borikin’i Tsibehôna rainy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no zanak’i Hanà: i Disôna no lahy ary i Ohôlibamà no vavy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no zanakalahin’i Disôna: i Hemdàna sy i Esbàna ary Jitràna sy i Keràna. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no zanakalahin’i Etsèra: i Bilehàna sy i Zaha ary i Hakàna. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireto no zanakalahin’i Disàna: i Hotsa sy i Aràna.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy no filoham-pianakavian’ny Hôrita: i Lôtana sy i Sôbala, i Tsibehôna sy i Hanà, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary i Basemata zanakavavin’i Jismahela sady anabavin’i Nebaiôta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 28.9.
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Disôna sy i Etsera, ary i Disàna. Ireo no filoham-pianakavian’ny Hôrita araka ny isan-tarika avy, tao amin’ny tany Sehira.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy ny mpanjaka nifandimby nanjaka tao amin’ny tany Edôma, fony tsy mbola nisy mpanjaka nanjaka tamin’ny Israelita. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanjaka tao Edôma i Bela zanakalahin’i Behôra, avy ao amin’ny tanànan’i Dinehaba. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty izy, dia i Jôbaba, zanakalahin’i Zera avy ao Bôtserà, no nanjaka nandimby azy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Jôbaba, dia nanjaka nandimby azy i Hosama avy ao amin’ny faritanin’ny Temanita. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Hosama, dia nanjaka nandimby azy i Hadada, zanakalahin’i Bedada, avy ao an-tanànan’i Havita. Izy io no nandresy ny Midianita teny an-tsahan’i Môaba. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Hadada, dia nanjaka nandimby azy i Samlà avy ao Masrekà. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Samlà, dia nanjaka nandimby azy i Saoly avy any Rehôbôta amoron’ny ony Eofrata. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty i Saoly, dia nanjaka nandimby azy i Bahala-Hanàna, zanakalahin’i Hakbôra. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa maty i Bahala-Hanàna, dia nanjaka nandimby azy i Hadara avy ao an-tanànan’i Pahò; ny anaran’ny vadiny dia i Mehetabeela, zanakavavin’i Matreda sady zafikelin’i Me-Zahaba.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Hadà niteraka an’i Elifaza tamin’i Hesao, fa i Basemata kosa niteraka an’i Rehoela; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto no anaran’ireo filoham-pianakavian’ny taranak’i Hesao, araka ny isan-tarika sy ny toerany avy: '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Timnà sy i Halvà, i Jeteta sy i Ohôlibamà, i Elà sy i Pinôna, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Kenàza sy i Temàna, i Mibitsara '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sy i Magdiela ary i Hirama. Ireo no filoham-pianakavian’ny Edômita araka ny fonenany teo amin’ny faritaniny avy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Hesao no razamben’ny Edômita.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary i Ohôlibamà kosa niteraka an’i Jehîsa sy i Jahilama ary i Kôrà. Ireo no zanakalahy naterak’i Hesao tao amin’ny tany Kanahàna.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nentin’i Hesao ireo vadiny sy ireo zanany lahy sy vavy ary ireo olona rehetra tao an-tranony, mbamin’ny biby fiompiny sy ny biby rehetra mpitondra ny entany; ary nentiny koa ireo fananana rehetra izay azony tao amin’ny tany Kanahàna, dia lasa nankany an-tany hafa izy mba ho lavitra an’i Jakôba rahalahiny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria efa samy be harena loatra izy mirahalahy ka tsy afaka ny hiara-monina intsony; ary ny faritany nisy azy dia tsy ampy hihinanan’ny biby fiompin’ny roa tonta. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no nipetrahan’i Hesao na i Edôma tany an-tendrombohitra Sehira.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak’i Hesao
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izao no lisitry ny taranak’i Hesao, razamben’ny Edômita izay nonina teny an-tendrombohitra Sehira. '
