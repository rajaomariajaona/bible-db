document_id: DEU.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny ombilahikely volamena: mamela heloka ny Tompo'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany no nilazan’ny TOMPO tamiko hoe: «Manamboara takela-bato anankiroa tahaka ny teo, ary manaova koa vatahazo anankiray; dia miakara ho atỳ amiko atỳ an-tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hosoratako amin’ireo takela-bato ireo ny didy voasoratra tamin’ny takela-bato nomontsaninao; ka hataonao ao anatin’ny vata ireo takela-bato ireo.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanao vata tamin’ny hazo akasia aho sy nanamboatra takela-bato anankiroa tahaka ny teo, ary niakatra tao an-tendrombohitra ka nitondra ny takela-bato anankiroa teny an-tanako. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nosoratan’ny TOMPO teo amin’ireo takela-bato ireo izay voasoratra tamin’ny takela-bato teo aloha, dia ny didy folo nampitain’ny TOMPO taminareo; tao an-tendrombohitra, avy tao anatin’ny afo, no nilazany an’ireny taminareo fony ianareo vory ho fivondronambe; dia nomen’ny TOMPO ahy ireo takela-bato ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nihodina aho ka nidina niala teo amin’ny tendrombohitra; ary napetraka tao anatin’ilay vata efa nataoko ireo takela-bato ireo, ka dia mbola ao ihany araka izay nandidian’ny TOMPO ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: (Niainga teo amin’ny fantsakan’i Benè-Jahakàna ny Israelita ka nankany Môserà. Tao no nahafatesan’i Aharôna sy nandevenana azy; ary i Elehazara zanany no tonga mpisorona nandimby azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 20.28; 33.38.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony niala teo ny Israelita, dia nankany Godgôdà; avy eo nankany Jôtbatà, faritra be lohasahan-driaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’izay ny fokon’i Levỳ no natokan’ny TOMPO hanao ireto raharaha ireto: hitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vata mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    text: '; hitoetra eo anatrehan’ny TOMPO; hanao fanompoam-pivavahana aminy; hanome '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tsodrano
  - type: text
    text: ' amin’ny anarany. Mbola ataon’ny levîta ireo raharaha ireo mandraka androany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 3.5-8; 8.5-19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izany no tsy ananan’ny levîta zaratany na anjara eo amin’ny Israelita namany; fa ny TOMPO no anjarany, araka izay nampanantenain’ny TOMPO Andriamanitrareo taminy.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efapolo andro sy efapolo alina tahaka ny teo aloha ihany no nitoerako tany an-tendrombohitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 34.28.
    marker-yv: yv-n
  - type: text
    text: '; ary mbola nihaino ahy koa ny TOMPO tamin’ity indray maka ity, ka tsy sitrany hofongorana ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy ny TOMPO tamiko: «Miaingà, ndeha mialoha lalana ny vahoaka; aoka ireo hiditra haka ny tany, izay nianianako tamin’ny razambeny homena azy!».'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay lalàna miorina amin’ny fitiavana sy ny fanekena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ankehitriny, ry Israelita, inona moa no andrandrain’ny TOMPO Andriamanitrareo aminareo, afa-tsy ny hanajanareo AZY sy ny hizoranareo amin’ny lalana rehetra soritany ary ny hitiavanareo sy hanompoanareo AZY amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Andrandrain’ny TOMPO aminareo ny hitandremanareo ny didy aman-dalàny, izay ampitaiko aminareo anio mba hahasambatra anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro fa an’ny TOMPO Andriamanitrareo ny lanitra midadasika ary ny tany mbamin’izay rehetra eo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanefa ny razambenareo ihany no niraiketan’ny TOMPO hotiavina ka nifidianany anareo taranany mihoatra noho ny firenena hafa rehetra, araka izao hitanareo anio izao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Noho izany, aoka ny fonareo ho voatokana tanteraka ho an’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny RM dia manambara izany hevitra izany araka ny fomba fiteny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: forao ny fonareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Ny famorana manko ho famantarana fa voatokana ho an’ny Tompo, anisan’ny vahoakany tokoa ny olona anankiray.
    marker-yv: yv-n
  - type: text
    text: ', fa aza mafy hatoka intsony ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ilay TOMPO Andriamanitrareo no Andriamanitry ny andriamanitra sy Tompon’ny tompo, Andriamanitra lehibe sy mahery ary mahatahotra, tsy mba mizaha tavan’olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tompon’ny tompo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1Tim 6.15; Apôk 17.14; 19.16. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tsy mba mizaha tavan’olona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': izany hoe tsy mba miangatra; jereo Asa 10.34; Rm 2.11; Ef 6.9.'
    marker-yv: yv-n
  - type: text
    text: ' na mandray kolikoly; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'manome rariny ny kamboty sy ny mpitondratena Izy, sady tia ny vahiny ka manome azy hanina sy fitafiana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa tiavo ny vahiny eo aminareo, fa efa mba vahiny tany Ejipta ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ilay TOMPO Andriamanitrareo no hohajainareo, Izy no hotompoinareo sy hifikiranareo, ary ny anarany no hianiananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izy no fidèranareo, Izy no Andriamanitrareo, dia Ilay nanao ho anareo ireny zavatra lehibe sy mahatahotra efa hitan’ny masonareo ireny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny ambara eto dia ny zava-mahagaga nataon’ny Tompo tamin’ny nialan’ny vahoakany tany Ejipta, jereo Eks 7–12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Olona fitopolo ny razambenareo no nidina tany Ejipta; ankehitriny kosa efa nataon’ny TOMPO Andriamanitrareo maro tahaka ny kintana eny ana habakabaka ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fitopolo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 46.27; Eks 1.5 sy nta; Asa 7.14. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'maro tahaka...ianareo:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' 22.17; Heb 11.12.'
    marker-yv: yv-n
  - type: text
    text: .
