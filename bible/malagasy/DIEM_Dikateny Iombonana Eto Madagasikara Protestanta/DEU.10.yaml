document_id: DEU.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny ombilahikely volamena: mamela heloka ny Tompo'
  - type: text
    content: 'Tamin’izany andro izany no nilazan’ny TOMPO tamiko hoe: «Manamboara takela-bato anankiroa tahaka ny teo, ary manaova koa vatahazo anankiray; dia miakara ho atỳ amiko atỳ an-tendrombohitra. '
  '10':
  - type: text
    content: Efapolo andro sy efapolo alina tahaka ny teo aloha ihany no nitoerako tany an-tendrombohitra
  - type: note
    content: Jereo Eks 34.28.
  - type: text
    content: '; ary mbola nihaino ahy koa ny TOMPO tamin’ity indray maka ity, ka tsy sitrany hofongorana ianareo. '
  '11':
  - type: text
    content: 'Dia hoy ny TOMPO tamiko: «Miaingà, ndeha mialoha lalana ny vahoaka; aoka ireo hiditra haka ny tany, izay nianianako tamin’ny razambeny homena azy!».'
  - type: heading
    content: Ilay lalàna miorina amin’ny fitiavana sy ny fanekena
  '12':
  - type: text
    content: 'Ary ankehitriny, ry Israelita, inona moa no andrandrain’ny TOMPO Andriamanitrareo aminareo, afa-tsy ny hanajanareo AZY sy ny hizoranareo amin’ny lalana rehetra soritany ary ny hitiavanareo sy hanompoanareo AZY amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo. '
  '13':
  - type: text
    content: 'Andrandrain’ny TOMPO aminareo ny hitandremanareo ny didy aman-dalàny, izay ampitaiko aminareo anio mba hahasambatra anareo. '
  '14':
  - type: text
    content: 'Indro fa an’ny TOMPO Andriamanitrareo ny lanitra midadasika ary ny tany mbamin’izay rehetra eo aminy. '
  '15':
  - type: text
    content: 'Kanefa ny razambenareo ihany no niraiketan’ny TOMPO hotiavina ka nifidianany anareo taranany mihoatra noho ny firenena hafa rehetra, araka izao hitanareo anio izao. '
  '16':
  - type: text
    content: Noho izany, aoka ny fonareo ho voatokana tanteraka ho an’ny TOMPO
  - type: note
    content: Ny RM dia manambara izany hevitra izany araka ny fomba fiteny hoe forao ny fonareo. Ny famorana manko ho famantarana fa voatokana ho an’ny Tompo, anisan’ny vahoakany tokoa ny olona anankiray.
  - type: text
    content: ', fa aza mafy hatoka intsony ianareo. '
  '17':
  - type: text
    content: Ilay TOMPO Andriamanitrareo no Andriamanitry ny andriamanitra sy Tompon’ny tompo, Andriamanitra lehibe sy mahery ary mahatahotra, tsy mba mizaha tavan’olona
  - type: note
    content: 'Tompon’ny tompo: jereo 1Tim 6.15; Apôk 17.14; 19.16. –tsy mba mizaha tavan’olona: izany hoe tsy mba miangatra; jereo Asa 10.34; Rm 2.11; Ef 6.9.'
  - type: text
    content: ' na mandray kolikoly; '
  '18':
  - type: text
    content: 'manome rariny ny kamboty sy ny mpitondratena Izy, sady tia ny vahiny ka manome azy hanina sy fitafiana. '
  '19':
  - type: text
    content: Koa tiavo ny vahiny eo aminareo, fa efa mba vahiny tany Ejipta ianareo.
  '2':
  - type: text
    content: 'Hosoratako amin’ireo takela-bato ireo ny didy voasoratra tamin’ny takela-bato nomontsaninao; ka hataonao ao anatin’ny vata ireo takela-bato ireo.» '
  '20':
  - type: text
    content: 'Ilay TOMPO Andriamanitrareo no hohajainareo, Izy no hotompoinareo sy hifikiranareo, ary ny anarany no hianiananareo. '
  '21':
  - type: text
    content: Izy no fidèranareo, Izy no Andriamanitrareo, dia Ilay nanao ho anareo ireny zavatra lehibe sy mahatahotra efa hitan’ny masonareo ireny
  - type: note
    content: Ny ambara eto dia ny zava-mahagaga nataon’ny Tompo tamin’ny nialan’ny vahoakany tany Ejipta, jereo Eks 7–12.
  - type: text
    content: '. '
  '22':
  - type: text
    content: Olona fitopolo ny razambenareo no nidina tany Ejipta; ankehitriny kosa efa nataon’ny TOMPO Andriamanitrareo maro tahaka ny kintana eny ana habakabaka ianareo
  - type: note
    content: 'fitopolo: jereo Gen 46.27; Eks 1.5 sy nta; Asa 7.14. –maro tahaka...ianareo: 22.17; Heb 11.12.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia nanao vata tamin’ny hazo akasia aho sy nanamboatra takela-bato anankiroa tahaka ny teo, ary niakatra tao an-tendrombohitra ka nitondra ny takela-bato anankiroa teny an-tanako. '
  '4':
  - type: text
    content: 'Dia nosoratan’ny TOMPO teo amin’ireo takela-bato ireo izay voasoratra tamin’ny takela-bato teo aloha, dia ny didy folo nampitain’ny TOMPO taminareo; tao an-tendrombohitra, avy tao anatin’ny afo, no nilazany an’ireny taminareo fony ianareo vory ho fivondronambe; dia nomen’ny TOMPO ahy ireo takela-bato ireo. '
  '5':
  - type: text
    content: Nihodina aho ka nidina niala teo amin’ny tendrombohitra; ary napetraka tao anatin’ilay vata efa nataoko ireo takela-bato ireo, ka dia mbola ao ihany araka izay nandidian’ny TOMPO ahy.
  '6':
  - type: text
    content: (Niainga teo amin’ny fantsakan’i Benè-Jahakàna ny Israelita ka nankany Môserà. Tao no nahafatesan’i Aharôna sy nandevenana azy; ary i Elehazara zanany no tonga mpisorona nandimby azy
  - type: note
    content: Jereo Nom 20.28; 33.38.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Nony niala teo ny Israelita, dia nankany Godgôdà; avy eo nankany Jôtbatà, faritra be lohasahan-driaka. '
  '8':
  - type: text
    content: 'Tamin’izay ny fokon’i Levỳ no natokan’ny TOMPO hanao ireto raharaha ireto: hitondra ny '
  - type: text
    content: vata mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: '; hitoetra eo anatrehan’ny TOMPO; hanao fanompoam-pivavahana aminy; hanome '
  - type: text
    content: tsodrano
  - type: text
    content: ' amin’ny anarany. Mbola ataon’ny levîta ireo raharaha ireo mandraka androany'
  - type: note
    content: Jereo Nom 3.5-8; 8.5-19.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Izany no tsy ananan’ny levîta zaratany na anjara eo amin’ny Israelita namany; fa ny TOMPO no anjarany, araka izay nampanantenain’ny TOMPO Andriamanitrareo taminy.)
