document_id: JER.8,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Amin’izany fotoana izany, hoy ny teny hentitry ny Tompo, dia hofongarina avy ao am-pasana ny taolan’ireo mpanjakan’i Joda sy ny an’ireo lehibeny, ny taolan’ireo mpisorona sy ny an’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' ary ny an’ireo mponina tao Jerosalema, '
  '10':
  - type: text
    content: Ary noho izany, hoy ny Tompo
  - type: note
    content: 'And 10-12: ampit 6.12-15.'
  - type: text
    content: ','
  - type: text
    content: dia homeko ny hafa ny vadiny
  - type: text
    content: ary ny sahany ho an’izay maka azy.
  - type: text
    content: Satria izy rehetra na ny kely na ny lehibe
  - type: text
    content: dia samy mitady tombontsoa avokoa.
  - type: text
    content: 'Na ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' na ny '
  - type: text
    content: mpisorona
  - type: text
    content: dia samy mpamitaka avokoa.
  '11':
  - type: text
    content: Alasafay fotsiny no nitsaboany
  - type: text
    content: ny fahavoazan’ny vahoakako
  - type: text
    content: 'tamin’ny nilazany hoe:'
  - type: text
    content: «Fiadanana, fiadanana!»;
  - type: text
    content: kanjo tsy misy fiadanana akory
  - type: note
    content: Jereo Ezek 13.10.
  - type: text
    content: .
  '12':
  - type: text
    content: Tokony hahamenatra azy
  - type: text
    content: ny zava-maharikoriko nataony;
  - type: text
    content: nefa tsy menatra akory izy
  - type: text
    content: sady tsy mahatsapa ny hadisoany.
  - type: text
    content: Noho izany, hoy ny TOMPO,
  - type: text
    content: dia ho isan’ireo ho lavo izy;
  - type: text
    content: ka amin’ny andro hamaliako azy,
  - type: text
    content: dia hitrosina amin’ny tany izy.
  - type: heading
    content: Diso fanantenana ny Tompo sy ny vahoaka
  - type: heading
    content: (Ny Tompo)
  '13':
  - type: text
    content: Nony tena hioty vokatra teo aminy Aho,
  - type: text
    content: hoy ny teny hentitry ny TOMPO,
  - type: text
    content: dia tsy nisy voany teo amin’ny voaloboka
  - type: text
    content: ary tsy nisy voany koa teo amin’ny aviavy,
  - type: text
    content: fa nalazo ny raviny;
  - type: text
    content: koa avelako ho an’ny mpandalo izy
  - type: note
    content: 'Tsy misy voany koa ny aviavy: jereo Mk 11.12-14.'
  - type: text
    content: .
  - type: heading
    content: (Ny vahoaka)
  '14':
  - type: text
    content: Nahoana no mijanona eto isika?
  - type: text
    content: Andeha hifamory isika
  - type: text
    content: ka hiditra ao amin’ny tanànamimanda
  - type: text
    content: ary dia miandry ny ho faty ao,
  - type: text
    content: satria ny TOMPO Andriamanitsika
  - type: text
    content: no manendry antsika ho faty
  - type: text
    content: ka mampisotro antsika rano voapoizina,
  - type: text
    content: 'noho isika efa nanota taminy:'
  '15':
  - type: text
    content: Nanantena fiadanana isika,
  - type: text
    content: nefa tsy nisy soa akory.
  - type: text
    content: Nanantena fotoam-panasitranana isika
  - type: text
    content: kanjo indro zava-mampihorohoro.
  '16':
  - type: text
    content: Efa ao Dana ny fahavalo
  - type: text
    content: ka re avy any ny fiefonefon’ny soavaly.
  - type: text
    content: Mihorohoro ny tany manontolo
  - type: text
    content: noho ny fanenon’ireo soavaly haingam-pandeha.
  - type: text
    content: Avy izy handripaka ny tany sy izay mameno azy,
  - type: text
    content: dia ny tanàna sy ny mponina ao aminy.
  - type: heading
    content: (Ny Tompo)
  '17':
  - type: text
    content: Indro bibilava misy poizina
  - type: text
    content: no halefako hamely anareo,
  - type: text
    content: dia menarana tsy azon’ody;
  - type: text
    content: ka hanaikitra anareo tokoa izy,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  - type: heading
    content: Ny alahelon’i Jeremià
  - type: heading
    content: (Jeremià)
  '18':
  - type: text
    content: Marary mikainkona ny foko;
  - type: text
    content: tsy misy fanafody hahasitrana ny alaheloko.
  '19':
  - type: text
    content: Injany! Re hatrany amin’ny faritra lavitra any
  - type: text
    content: 'ny antso vonjy ataon’ny vahoakako hoe:'
  - type: text
    content: '«Tsy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' intsony ve ny TOMPO,'
  - type: text
    content: ary tsy ao aminy intsony ve ny mpanjakany?»
  - type: heading
    content: (Ny Tompo)
  - type: text
    content: Nahoana moa izy no nahatezitra Ahy
  - type: text
    content: tamin’ireo sarivongan-tsampiny,
  - type: text
    content: dia ireo zava-poana avy any an-kafa?
  - type: heading
    content: (Jeremià)
  '2':
  - type: text
    content: ka avela hiparitaka eo anatrehan’ny masoandro sy ny volana ary ny andian-kintana eny amin’ny lanitra izay notiavin’ireny olona ireny ka nivavahany sy niraiketany, ary nanontaniany hilan-kevitra sy niankohofany. Tsy hangonina na halevina intsony ireo taolana ireo fa ho tonga zezika eny ambonin’ny tany
  - type: note
    content: Ny tsy milevina am-pasana dia noheverina ho loza lehibe; jereo Mpitor 6.3.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Efa lasa ny fararano
  - type: text
    content: ary efa tapitra ny fotoam-pijinjana,
  - type: text
    content: nefa tsy mbola misy famonjena ho anay!
  '21':
  - type: text
    content: Noho ny fahavoazan’ny vahoakako
  - type: text
    content: dia torotoro tanteraka aho;
  - type: text
    content: misaona aho, azon’alahelo mafy!
  '22':
  - type: text
    content: Moa tsy misy balisama mampitony
  - type: text
    content: na dokotera ve any Gilehada?
  - type: text
    content: Nahoana no tsy mety sitrana
  - type: text
    content: ny ratran’ny fireneko?
  '23':
  - type: text
    content: Enga anie ka ho feno rano ny lohako
  - type: text
    content: ary ho loharanon-dranomaso ny masoko
  - type: text
    content: mba hitomaniako andro aman’alina
  - type: text
    content: ireo maty tao amin’ny fireneko!
  '3':
  - type: text
    content: Ary ny sisa tavela rehetra amin’izao taranaka ratsy izao, ka mbola velona any amin’ny toerana izay nanelezako azy any, dia haniry kokoa ny ho faty toy izay ny ho velona. Izany no teny hentitr’ilay TOMPOn’izao rehetra izao.
  - type: heading
    content: Mikiribiby aman-keloka
  '4':
  - type: text
    content: 'Hoteneninao amin’ny vahoakan’i Joda, ry Jeremià, fa izao no lazain’ny TOMPO:'
  - type: text
    content: Izay mianjera ve dia tsy miarina intsony?
  - type: text
    content: Izay miodina ve dia tsy miverina intsony?
  '5':
  - type: text
    content: Koa nahoana àry ity vahoaka ity,
  - type: text
    content: no niodina, ry Jerosalema,
  - type: text
    content: ka mikiribiby amin’izany fiodinany izany?
  - type: text
    content: Mifikitra amin’ny andriamani-tsiizy izy
  - type: text
    content: ka tsy mety miverina amiko.
  '6':
  - type: text
    content: Nohenoiko tsara izay nolazainy
  - type: text
    content: fa tsy mitombina velively.
  - type: text
    content: Tsy misy mba manenina amin’ny haratsiany izy
  - type: text
    content: 'na mba manontany tena hoe: «Inona ity nataoko?»'
  - type: text
    content: Fa samy mivily amin’izay maharevo azy avy izy
  - type: note
    content: Dkt hafa «manohy ny hazakazaka adalany».
  - type: text
    content: tahaka ny soavaly miriotra amin’ny ady.
  '7':
  - type: text
    content: Na dia ny vano aza dia mahalala
  - type: text
    content: ny fotoanandro fifindrany lasy;
  - type: text
    content: ary ny domohina sy ny sidintsidina
  - type: text
    content: mbamin’ny tsikorovana koa
  - type: text
    content: samy mitandrina ny fotoana fiverenany,
  - type: text
    content: fa ny vahoakako kosa tsy mahalala ny fitsipiko.
  - type: heading
    content: Ireo mpisandoka ho hendry
  '8':
  - type: text
    content: 'Ianareo mihambo hoe: «Hendry izahay,'
  - type: text
    content: sady ato aminay ny lalànan’ny TOMPO.»
  - type: text
    content: Ahoana no ahazoanareo mihambo toy izany,
  - type: text
    content: raha ireo mpanora-dalàna aza
  - type: text
    content: manao fanoratana diso
  - type: text
    content: ka mahatonga azy hivoana?
  '9':
  - type: text
    content: Mahazo henatra ny hendry
  - type: text
    content: ary ketraka satria voafandrika;
  - type: text
    content: nanamavo ny tenin’ny TOMPO izy
  - type: text
    content: ka inona indray no mahahendry azy?
  - type: heading
    content: Tsy fahatsiarovan-tenan’ny mpaminany sy ny mpisorona
  - type: heading
    content: (Jereo Jer 6.12-15)
