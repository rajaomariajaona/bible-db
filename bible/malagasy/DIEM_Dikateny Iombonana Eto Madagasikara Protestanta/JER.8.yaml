verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Amin’izany fotoana izany, hoy ny teny hentitry ny Tompo, dia hofongarina avy ao am-pasana ny taolan’ireo mpanjakan’i Joda sy ny an’ireo lehibeny, ny taolan’ireo mpisorona sy ny an’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ary ny an’ireo mponina tao Jerosalema, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary noho izany, hoy ny Tompo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 10-12: ampit 6.12-15.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia homeko ny hafa ny vadiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sahany ho an’izay maka azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria izy rehetra na ny kely na ny lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy mitady tombontsoa avokoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' na ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy mpamitaka avokoa.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Alasafay fotsiny no nitsaboany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahavoazan’ny vahoakako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’ny nilazany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Fiadanana, fiadanana!»;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo tsy misy fiadanana akory
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Ezek 13.10.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tokony hahamenatra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zava-maharikoriko nataony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy menatra akory izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mahatsapa ny hadisoany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany, hoy ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho isan’ireo ho lavo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka amin’ny andro hamaliako azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitrosina amin’ny tany izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Diso fanantenana ny Tompo sy ny vahoaka
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ny Tompo)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nony tena hioty vokatra teo aminy Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy nisy voany teo amin’ny voaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nisy voany koa teo amin’ny aviavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nalazo ny raviny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa avelako ho an’ny mpandalo izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy misy voany koa ny aviavy: jereo Mk 11.12-14.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ny vahoaka)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nahoana no mijanona eto isika?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha hifamory isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiditra ao amin’ny tanànamimanda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia miandry ny ho faty ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny TOMPO Andriamanitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no manendry antsika ho faty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampisotro antsika rano voapoizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'noho isika efa nanota taminy:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nanantena fiadanana isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nisy soa akory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanantena fotoam-panasitranana isika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo indro zava-mampihorohoro.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Efa ao Dana ny fahavalo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka re avy any ny fiefonefon’ny soavaly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihorohoro ny tany manontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fanenon’ireo soavaly haingam-pandeha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy izy handripaka ny tany sy izay mameno azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tanàna sy ny mponina ao aminy.
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ny Tompo)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Indro bibilava misy poizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no halefako hamely anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia menarana tsy azon’ody;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanaikitra anareo tokoa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny alahelon’i Jeremià
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Jeremià)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Marary mikainkona ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy fanafody hahasitrana ny alaheloko.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Injany! Re hatrany amin’ny faritra lavitra any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny antso vonjy ataon’ny vahoakako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Tsy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' intsony ve ny TOMPO,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ao aminy intsony ve ny mpanjakany?»
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ny Tompo)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana moa izy no nahatezitra Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ireo sarivongan-tsampiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo zava-poana avy any an-kafa?
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Jeremià)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ka avela hiparitaka eo anatrehan’ny masoandro sy ny volana ary ny andian-kintana eny amin’ny lanitra izay notiavin’ireny olona ireny ka nivavahany sy niraiketany, ary nanontaniany hilan-kevitra sy niankohofany. Tsy hangonina na halevina intsony ireo taolana ireo fa ho tonga zezika eny ambonin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny tsy milevina am-pasana dia noheverina ho loza lehibe; jereo Mpitor 6.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Efa lasa ny fararano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa tapitra ny fotoam-pijinjana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy mbola misy famonjena ho anay!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Noho ny fahavoazan’ny vahoakako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia torotoro tanteraka aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: misaona aho, azon’alahelo mafy!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moa tsy misy balisama mampitony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dokotera ve any Gilehada?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no tsy mety sitrana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ratran’ny fireneko?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Enga anie ka ho feno rano ny lohako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho loharanon-dranomaso ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitomaniako andro aman’alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo maty tao amin’ny fireneko!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary ny sisa tavela rehetra amin’izao taranaka ratsy izao, ka mbola velona any amin’ny toerana izay nanelezako azy any, dia haniry kokoa ny ho faty toy izay ny ho velona. Izany no teny hentitr’ilay TOMPOn’izao rehetra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mikiribiby aman-keloka
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hoteneninao amin’ny vahoakan’i Joda, ry Jeremià, fa izao no lazain’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mianjera ve dia tsy miarina intsony?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miodina ve dia tsy miverina intsony?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Koa nahoana àry ity vahoaka ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no niodina, ry Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mikiribiby amin’izany fiodinany izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifikitra amin’ny andriamani-tsiizy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mety miverina amiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nohenoiko tsara izay nolazainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mitombina velively.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy mba manenina amin’ny haratsiany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na mba manontany tena hoe: «Inona ity nataoko?»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa samy mivily amin’izay maharevo azy avy izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dkt hafa «manohy ny hazakazaka adalany».
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny soavaly miriotra amin’ny ady.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Na dia ny vano aza dia mahalala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fotoanandro fifindrany lasy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny domohina sy ny sidintsidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny tsikorovana koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy mitandrina ny fotoana fiverenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vahoakako kosa tsy mahalala ny fitsipiko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo mpisandoka ho hendry
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ianareo mihambo hoe: «Hendry izahay,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ato aminay ny lalànan’ny TOMPO.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahoana no ahazoanareo mihambo toy izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha ireo mpanora-dalàna aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao fanoratana diso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahatonga azy hivoana?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mahazo henatra ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ketraka satria voafandrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanamavo ny tenin’ny TOMPO izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka inona indray no mahahendry azy?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy fahatsiarovan-tenan’ny mpaminany sy ny mpisorona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Jer 6.12-15)
    marker-yv: yv-h
