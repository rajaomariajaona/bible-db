document_id: REV.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: I Jôhany, izay angady nananana ilay boky farany indrindra na ato amin’ny Baiboly na ato amin’ny Testamenta Vaovao (Fanekempihavanana Vaovao), dia manolotra zavatra maro mifanesy «izay nambaran’i Jesoa Kristy» (1.1). Tantarain’i Jôhany ny zavatra hitany fony izy «nahazo tsindrimandry avy amin’ny Fanahy Masina» (1.10). Raha nanoratra ity boky ity izy, dia tao amin’ny nosy kely atao hoe Pàtmo, andrefan’i Azia Minôra (i Torkia any Azia, ankehitriny); natao sesitany tao izy, satria nitory ny Vaovao Mahafaly (1.9) tamin’ny vaninandro nanenjehan’ny amperôra rômanina ireo vondrona kristianina. Ny anoratany dia ireo Fiangonana fito tao Azia Minôra, tao amin’ny faritra misy ny seranana tiorka ankehitriny atao hoe Izmira (i Smirna fahiny).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Raha enjehina ny kristianina, dia noho izy tsy mankatò afa-tsy Tompo tokana, dia i Jesoa Kristy. Mandritra izany vaninandro be hotakotaka izany no anoratan’i Jôhany mba hampahery finoana sy fanantenana ireo kristianina. Ny tena ampahany be amin’ny bokiny dia fahitana sy fanambaràna voalaza amin’ny fomba fiteny feno fanoharana aman-tsarintsary: izany fomba fiteny izany dia manjavozavo ho an’ny hafa, kanefa ireo mpino mahalala tsara ny Testamenta Taloha (Fanekempihavanana Taloha) dia nahatakatra izany mora kokoa. Maro karazana ny fahitana visavisain’i Jôhany, saingy fotokevitra mitovy hatrany no averimberiny. Samihafa ny fivoaboasana ireny fahitana ireny amin’ny antsipiriany araka ny mpanao heviteny; kanefa mazava ny vontoatin-javatra aroson’ity boky ity, dia izao: na dia ny herin’ny ratsy aza no mandresy vetivety, ny fandresena farany sy maharitra kosa dia ho an’Andriamanitra sy ho an’ireo mpomba Azy, amin’ny alalan’i Jesoa Kristy ilay Tompo tokana.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: I Jôhany eo am-panombohana dia mitonon-tena ho mpitondra ny hafatr’ilay Kristy tafatsangana ho velona (1.1-8).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ao amin’ny fizaràna voalohany (1.9–3.22), dia tantarain’i Jôhany ny fomba nahatonga ilay fahitana voalohany, ka mandritra izany fahitana izany izy no asain’i Jesoa manoratra taratasy ho an’ny Fiangonana fito tao Azia Minôra.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Ao amin’ny fizaràna faharoa (4.1–22.17), dia afindra any an-danitra i Jôhany ka fahitana maro mifanesy no atrehiny: ireo tandapan’ny lanitra, mitsaoka an’Andriamanitra Ray sy mitsaoka an’i Jesoa Kristy (toko 4–5); ny horonamboky sy ireo tombokase fito (6.1–8.1); ny trompetra fito (8.2–11.19); ny dragona sy ny biby anankiroa (12.1–13.18); ny Zanakondry sy ireo olo-navotany 144 000, ny fitsaràn’Andriamanitra ampahafantarin’ny anjely mialoha (14.1-20); ny lovia fito mirakitra ny fahatezeran’Andriamanitra (15.1–16.21); ny faharavana nanjo an’i Babilôna, ny faharesena nihatra tamin’ilay biby sy tamin’ilay mpaminany sandoka ary tamin’ny devoly (17.1–20.10); ny habakabaka vaovao sy tany vaovao, i Jerosalema vaovao, ary ny fiavian’i Jesoa Tompo (21.1–22.17).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Eo am-pamaranana ity boky ity dia misy teny fampitandremana ataon’i Jôhany ary misy teny fampanantenana avy amin’i Jesoa Tompo manao hoe: «Eny, ho avy faingana Aho» (22.18-21).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Raha toa tsy ny antsipirian’ny loza aman’antambo mahatsiravina hiseho rahatrizay loatra no karohintsika ato amin’ity boky ity, dia ho azontsika mpamaky ankehitriny tsaratsara kokoa ny raketiny. Tsy hoe hampatahotra ny mpino no zava-kendren’ny mpanoratra fa hampahery azy ireo amin’ny andro sarotra diaviny. Ny fahitana voatanisan’ny boky Apôkalipsỳ dia natao hampahafantarana ireo vokatry ny asan’i Kristy sy ireo vokatry ny fitsanganany ho velona eo amin’ny mpino Azy na mandritra izao fiainana izao na amin’ny fiainana ho avy.
