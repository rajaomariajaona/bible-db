document_id: 2CO.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha manana ireo fampanantenana ireo isika, ry hava-malala, dia aoka isika hitandrin-tena hadio sy ho afaka amin’ny fahalotoana rehetra na ara-batana na ara-panahy, ka hiezaka ho masina tanteraka amin’ny fahatahorana an’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hafalian’i Paoly
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Satria ny alahelo araka an’Andriamanitra dia mahatonga hiala amin’ny toe-dratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hiala amin’ny toe-dratsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS ao amin’ny voambolana hoe FIBEBAHANA.
      marker-yv: yv-n
    - type: text
      text: ', mba hiroso amin’ny famonjena tsy anenenana; fa ny alahelon’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' kosa dia mahatonga fahafatesana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jereo tokoa ny vokatr’izany alahelo araka an’Andriamanitra izany teo aminareo: He izato fahazotoana hanova ny toe-javatra! He izato ezaka hanala tsiny ny tenanareo! He izato fahatezerana noho ny zava-nitranga! He izato tahotra ny famaizan’Andriamanitra! He izato faniriana hihaona amiko indray! He izato zotompo hanaiky ahy! He izato finiavana hanafay ny ratsy! Izany rehetra izany no nampisehoanareo fa tsy misy tsininareo mihitsy amin’iny raharaha iny.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha nanoratra taminareo aho, dia tsy noho ilay nahavita ratsy na noho ilay nasian-dratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2.5.
      marker-yv: yv-n
    - type: text
      text: '; nanoratra taminareo aho mba hampiharihary aminareo fa eo anatrehan’Andriamanitra dia mazoto hanaiky ahy ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nampahery anay izany fihetsikareo izany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankoatra ny fampaherezana azonay, dia vao mainka safononoka ny hafalianay tamin’ny nahitanay fa faly aoka izany i Tito satria namelombelona aina azy ianareo rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, nirehareha teo anatrehan’i Tito aho ny aminareo, ary dia tsy nandiso fanantenana ahy tokoa ianareo; fa tahaka ny nilazanay marina taminareo ny zavatra rehetra, dia tonga marina koa ny reharehanay teo anatrehan’i Tito ny aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao mainka nitombo ny fankamamian’i Tito anareo, rehefa tsaroany fa vonon-kanoa ianareo rehetra, sady tamin-tahotra sy hovitra tokoa no nandraisanareo azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faly aho fa mahazo matoky anareo amin’ny zavatra rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mba ataovy omby anay ny fonareo. Tsy nanisy ratsy olona izahay, na nanimba olona, na nanambaka olona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy ny hanameloka anareo no ilazako izany; fa efa voalazako rahateo fa lalainay ao am-ponay ianareo, ka ho tafaraka aminay hatrany na velona na maty. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lehibe ny fahatokiako anareo, tena reharehako tokoa ianareo; ka feno fampaherezana aho sady tsy omby tratra ny hafaliako amin’ny fahoriana rehetra manjo anay.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na dia tonga tany Masedônia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2.13.
      marker-yv: yv-n
    - type: text
      text: ' tokoa aza izahay, dia tsy nisy hilaminanay mihitsy, fa nifandafaram-pahoriana izahay: teo ivelany, nisy ady namelezana anay; tao anatinay, nisy tahotra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa Andriamanitra, Izay mampahery ny ory fo, dia nampahery anay tamin’ny nahatongavan’i Tito; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsy ny nahatongavany ihany no nampahery anay, fa ny fampaherezana azony taminareo koa: notantarainy taminay fa maniry mafy hihaona amiko indray ianareo, sady nitomany noho ny zava-nitranga ary nazoto hanaiky ahy; ka dia vao mainka faly aho.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na dia nampalahelo anareo aza ny taratasy nosoratako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', dia tsy anenenako ankehitriny. Nanenenako ihany izany nony hitako fa noseranin’alahelo ianareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mifaly aho ankehitriny, tsy noho ny nampalahelovako anareo, fa noho ny alahelonareo nahatonga anareo hiala amin’ny toe-dratsy. Eny, alahelo araka an’Andriamanitra ny anareo, ka tsy nitondra fatiantoka avy aminay ianareo. '
