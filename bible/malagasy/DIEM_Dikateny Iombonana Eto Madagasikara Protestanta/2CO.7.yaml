document_id: 2CO.7,396
type_code: plt
verses:
  '1':
  - type: text
    content: Koa raha manana ireo fampanantenana ireo isika, ry hava-malala, dia aoka isika hitandrin-tena hadio sy ho afaka amin’ny fahalotoana rehetra na ara-batana na ara-panahy, ka hiezaka ho masina tanteraka amin’ny fahatahorana an’Andriamanitra.
  - type: heading
    content: Ny hafalian’i Paoly
  '10':
  - type: text
    content: Satria ny alahelo araka an’Andriamanitra dia mahatonga hiala amin’ny toe-dratsy
  - type: note
    content: 'hiala amin’ny toe-dratsy: jereo ny FTS ao amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ', mba hiroso amin’ny famonjena tsy anenenana; fa ny alahelon’'
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' kosa dia mahatonga fahafatesana. '
  '11':
  - type: text
    content: 'Jereo tokoa ny vokatr’izany alahelo araka an’Andriamanitra izany teo aminareo: He izato fahazotoana hanova ny toe-javatra! He izato ezaka hanala tsiny ny tenanareo! He izato fahatezerana noho ny zava-nitranga! He izato tahotra ny famaizan’Andriamanitra! He izato faniriana hihaona amiko indray! He izato zotompo hanaiky ahy! He izato finiavana hanafay ny ratsy! Izany rehetra izany no nampisehoanareo fa tsy misy tsininareo mihitsy amin’iny raharaha iny.'
  '12':
  - type: text
    content: Koa raha nanoratra taminareo aho, dia tsy noho ilay nahavita ratsy na noho ilay nasian-dratsy
  - type: note
    content: Ampit 2.5.
  - type: text
    content: '; nanoratra taminareo aho mba hampiharihary aminareo fa eo anatrehan’Andriamanitra dia mazoto hanaiky ahy ianareo. '
  '13':
  - type: text
    content: Nampahery anay izany fihetsikareo izany.
  - type: text
    content: 'Ankoatra ny fampaherezana azonay, dia vao mainka safononoka ny hafalianay tamin’ny nahitanay fa faly aoka izany i Tito satria namelombelona aina azy ianareo rehetra. '
  '14':
  - type: text
    content: 'Eny, nirehareha teo anatrehan’i Tito aho ny aminareo, ary dia tsy nandiso fanantenana ahy tokoa ianareo; fa tahaka ny nilazanay marina taminareo ny zavatra rehetra, dia tonga marina koa ny reharehanay teo anatrehan’i Tito ny aminareo. '
  '15':
  - type: text
    content: 'Vao mainka nitombo ny fankamamian’i Tito anareo, rehefa tsaroany fa vonon-kanoa ianareo rehetra, sady tamin-tahotra sy hovitra tokoa no nandraisanareo azy. '
  '16':
  - type: text
    content: Faly aho fa mahazo matoky anareo amin’ny zavatra rehetra.
  '2':
  - type: text
    content: 'Mba ataovy omby anay ny fonareo. Tsy nanisy ratsy olona izahay, na nanimba olona, na nanambaka olona. '
  '3':
  - type: text
    content: 'Tsy ny hanameloka anareo no ilazako izany; fa efa voalazako rahateo fa lalainay ao am-ponay ianareo, ka ho tafaraka aminay hatrany na velona na maty. '
  '4':
  - type: text
    content: Lehibe ny fahatokiako anareo, tena reharehako tokoa ianareo; ka feno fampaherezana aho sady tsy omby tratra ny hafaliako amin’ny fahoriana rehetra manjo anay.
  '5':
  - type: text
    content: Na dia tonga tany Masedônia
  - type: note
    content: Ampit 2.13.
  - type: text
    content: ' tokoa aza izahay, dia tsy nisy hilaminanay mihitsy, fa nifandafaram-pahoriana izahay: teo ivelany, nisy ady namelezana anay; tao anatinay, nisy tahotra. '
  '6':
  - type: text
    content: 'Kanefa Andriamanitra, Izay mampahery ny ory fo, dia nampahery anay tamin’ny nahatongavan’i Tito; '
  '7':
  - type: text
    content: 'ary tsy ny nahatongavany ihany no nampahery anay, fa ny fampaherezana azony taminareo koa: notantarainy taminay fa maniry mafy hihaona amiko indray ianareo, sady nitomany noho ny zava-nitranga ary nazoto hanaiky ahy; ka dia vao mainka faly aho.'
  '8':
  - type: text
    content: Fa na dia nampalahelo anareo aza ny taratasy nosoratako
  - type: note
    content: Jereo 2.3 sy nta.
  - type: text
    content: ', dia tsy anenenako ankehitriny. Nanenenako ihany izany nony hitako fa noseranin’alahelo ianareo. '
  '9':
  - type: text
    content: 'Kanefa mifaly aho ankehitriny, tsy noho ny nampalahelovako anareo, fa noho ny alahelonareo nahatonga anareo hiala amin’ny toe-dratsy. Eny, alahelo araka an’Andriamanitra ny anareo, ka tsy nitondra fatiantoka avy aminay ianareo. '
