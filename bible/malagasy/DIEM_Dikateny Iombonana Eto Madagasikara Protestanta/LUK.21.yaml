document_id: LUK.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanomezan’ilay vehivavy mpitondratena
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 12.41-44)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nanopy ny masony i Jesoa ka nahita ireo mpanankarena nandrotsa-bola teo amin’ny vata fitoeran-drakitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy koa i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hisy firenena hitsangana hamely firenena ary koa fanjakana hitsangana hamely fanjakana. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Amin’ny toerana samihafa, hisy horohorontany mahery vaika mbamin’ny mosary sy areti-mandringana; ary avy eny amin’ny habakabaka dia hisy zava-mahatahotra sy famantarana lehibe. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Kanefa alohan’izany rehetra izany, dia hosamborina sy hoenjehina ianareo, hatolotra hotsaraina any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' ary hatao am-ponja, hoentina eo anatrehan’ireo mpanjaka sy mpifehy noho ianareo miandany amiko. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ho tonga aminareo izany mba hijoroanareo ho vavolombelona manambara Ahy. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa ataovy latsaka ao am-ponareo fa tsy tokony hihevitra mialoha izay hiarovanareo tena ianareo; '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'satria Izaho ihany no hampiteny anareo sy hanome fahendrena anareo, ka tsy hahatohitra sady tsy haharesy lahatra anareo izay rehetra miampanga anareo. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hanolotra anareo na dia ny ray aman-dreny sy ny mpiray tampo ary ny havana aman-tsakaiza aza, ka hovonoin’olona ny sasany aminareo. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ho halan’ny olon-drehetra ianareo satria miandany amiko, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'nefa tsy hisy very na dia singam-bolo iray amin’ny lohanareo aza. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aoka ho amim-paharetana no hahazoanareo famonjena ny ainareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa mialoha ny handravana an’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 24.15-21; Mk 13.14-19)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary hitany koa ity vehivavy mpitondratena mahantra nandrotsaka ariary anankiroa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 12.42 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '–Rehefa hitanareo voahodidina miaramila i Jerosalema, dia fantaro fa antomotra ny fandravana azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Amin’izany, izay any Jodea aoka handositra any an-tendrombohitra; izay ao an-tanànan’i Jerosalema aoka hilefa any ivelany; ary izay any an-tsaha aoka tsy hiverina ao an-tanàna. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Satria andro nataon’Andriamanitra ho famaizana izany andro izany, mba hahatanterahan’izay rehetra voalazan’ny Soratra Masina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Hôs 9.7.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Loza no hanjo ny bevohòka sy ny mitaiza kely amin’izany andro izany, satria hisy fahoriana lehibe amin’ity tany ity ary hihatra amin’ity vahoaka ity ny fahatezeran’Andriamanitra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ny mponina haringan’ny lelan-tsabatra na hoentin-ko babo any amin’ny firenena rehetra any, ary i Jerosalema hohitsakitsahin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' mandrapahafenon’ny andro natao hanjakan’ny hafa firenena.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ho avy amim-boninahitra ny Zanak’olona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 24.29-31; Mk 13.24-27)
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: –Hisy famantarana koa eny amin’ny masoandro sy ny volana ary ny kintana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 13.10; Ezek 32.7; Jl 3.3-4.
      marker-yv: yv-n
    - type: text
      text: '; ary etỳ an-tany dia ho ory sy ho very hevitra ny firenena noho ny ranomasina hikotrokotroka sy hanonja izaitsizy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hisy olona ho fatin’ny tahotra sy ny fanahiana izay hanjo ny tany tontolo, satria hihozongozona ny herin’ny habakabaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Amin’izay no hahitana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' tamy voahodidin-drahona sady ombàn-kery sy voninahitra lehibe'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dan 7.13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Raha vao miantomboka anefa izany zavatra izany, dia mitrakà ianareo ary andrandrao ny lohanareo fa efa antomotra ny fanavotana anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famantarana avy amin’ny hazo rehetra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 24.32-35; Mk 13.28-31)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nilaza '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' tamin’ny mpihaino Azy i Jesoa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Jereo ny aviavy sy ny hazo rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ka hoy i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lazaiko marina aminareo fa io mpitondratena io no nandrotsaka be indrindra tamin’izy rehetra. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Raha vao tazanareo manaroka izy ireny, dia fantatrareo fa efa akaiky ny fahavaratra. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Toy izany koa raha vao hitanareo miantomboka izany zavatra izany, dia fantaro fa efa akaiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Lazaiko marina aminareo fa mbola tsy ho tapitra akory ity taranaka ity, dia ho tanteraka izany rehetra izany. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ho levona ny tany amana habakabaka, fa ny teniko tsy mba ho levona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay andro sy ora tsy fantatra
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '–Mitandrema tena ianareo, fandrao tonga mavesatra ny fonareo noho ny filibàna sy ny hamamoana ary ny fiahiana izao fiainana izao; ka ho avy tampoka tsy ampoizinareo izany andro izany, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: satria hiantonta tahaka ny fandrika harato amin’ny mponina rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.35 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'ho avy tampoka... mponina rehetra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ho avy tampoka aminareo toy ny fandrika harato izany andro izany, satria hihatra amin’ny mponina rehetra.
      marker-yv: yv-n
    - type: text
      text: 'manerana ny tany tontolo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Koa miambena sady mivavaha lalandava mba ho afa-miala amin’izany loza rehetra efa ho avy izany sy ho marim-pijoro eo anatrehan’ny Zanak’olona.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Ny antoandro i Jesoa dia nampianatra tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: '; ny hariva kosa Izy nankany ivelan’ny tanàna, ka nandany ny alina manontolo teny amin’ny tendrombohitra atao hoe Analanôliva. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Ary vao maraina be, dia nanatona Azy ao an-kianjan’ny tempoly ny vahoaka rehetra mba hihaino Azy.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Satria ireo rehetra ireo dia nandrotsaka ny ambim-bavany ho fanatitra; fa ravehivavy io kosa, na fadiranovana toy inona aza, dia ny fivelomany manontolo no narotsany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa ny handravana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 13.1-2)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' niresaka momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ', amin’izy voaravaka vato saro-bidy sy fanatitra fanalàm-boady. Ka hoy i Jesoa:'
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: –Ho avy ny andro handravana ireo zavatra banjininareo ireo ary tsy havela hisy vato mifanongoa eo ka tsy harodana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza sy fanenjehana isan-karazany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 24.3-14; Mk 13.3-13)
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nanontanian’ireo indray i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpampianatra ô, oviana no hahatongavan’izany ary inona no hamantarana fa madiva ho avy izany?
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tandremo sao voafitaka ianareo. Fa maro no ho avy hisandoka ny anarako sady hanao hoe: «Izaho no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: '», ary «Tonga ny fotoana!» Aza mba manaraka an’ireny. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha mandre ady sy korontana ianareo, aza taitra; eny, tsy maintsy ho tonga aloha izany, nefa tsy dia miaraka amin’izay akory ny farandro.
