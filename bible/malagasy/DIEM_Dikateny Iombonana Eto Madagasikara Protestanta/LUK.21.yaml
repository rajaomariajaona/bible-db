document_id: LUK.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanomezan’ilay vehivavy mpitondratena
  - type: heading
    content: (Jereo Mk 12.41-44)
  - type: text
    content: 'Ary nanopy ny masony i Jesoa ka nahita ireo mpanankarena nandrotsa-bola teo amin’ny vata fitoeran-drakitra. '
  '10':
  - type: text
    content: 'Ary hoy koa i Jesoa taminy:'
  - type: text
    content: '–Hisy firenena hitsangana hamely firenena ary koa fanjakana hitsangana hamely fanjakana. '
  '11':
  - type: text
    content: 'Amin’ny toerana samihafa, hisy horohorontany mahery vaika mbamin’ny mosary sy areti-mandringana; ary avy eny amin’ny habakabaka dia hisy zava-mahatahotra sy famantarana lehibe. '
  '12':
  - type: text
    content: 'Kanefa alohan’izany rehetra izany, dia hosamborina sy hoenjehina ianareo, hatolotra hotsaraina any amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' ary hatao am-ponja, hoentina eo anatrehan’ireo mpanjaka sy mpifehy noho ianareo miandany amiko. '
  '13':
  - type: text
    content: 'Ho tonga aminareo izany mba hijoroanareo ho vavolombelona manambara Ahy. '
  '14':
  - type: text
    content: 'Koa ataovy latsaka ao am-ponareo fa tsy tokony hihevitra mialoha izay hiarovanareo tena ianareo; '
  '15':
  - type: text
    content: 'satria Izaho ihany no hampiteny anareo sy hanome fahendrena anareo, ka tsy hahatohitra sady tsy haharesy lahatra anareo izay rehetra miampanga anareo. '
  '16':
  - type: text
    content: 'Hanolotra anareo na dia ny ray aman-dreny sy ny mpiray tampo ary ny havana aman-tsakaiza aza, ka hovonoin’olona ny sasany aminareo. '
  '17':
  - type: text
    content: 'Ho halan’ny olon-drehetra ianareo satria miandany amiko, '
  '18':
  - type: text
    content: 'nefa tsy hisy very na dia singam-bolo iray amin’ny lohanareo aza. '
  '19':
  - type: text
    content: Aoka ho amim-paharetana no hahazoanareo famonjena ny ainareo.
  - type: heading
    content: Ambaran’i Jesoa mialoha ny handravana an’i Jerosalema
  - type: heading
    content: (Jereo Mt 24.15-21; Mk 13.14-19)
  '2':
  - type: text
    content: Ary hitany koa ity vehivavy mpitondratena mahantra nandrotsaka ariary anankiroa
  - type: note
    content: Jereo Mk 12.42 sy nta.
  - type: text
    content: '. '
  '20':
  - type: text
    content: '–Rehefa hitanareo voahodidina miaramila i Jerosalema, dia fantaro fa antomotra ny fandravana azy. '
  '21':
  - type: text
    content: 'Amin’izany, izay any Jodea aoka handositra any an-tendrombohitra; izay ao an-tanànan’i Jerosalema aoka hilefa any ivelany; ary izay any an-tsaha aoka tsy hiverina ao an-tanàna. '
  '22':
  - type: text
    content: Satria andro nataon’Andriamanitra ho famaizana izany andro izany, mba hahatanterahan’izay rehetra voalazan’ny Soratra Masina
  - type: note
    content: Ampit Hôs 9.7.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Loza no hanjo ny bevohòka sy ny mitaiza kely amin’izany andro izany, satria hisy fahoriana lehibe amin’ity tany ity ary hihatra amin’ity vahoaka ity ny fahatezeran’Andriamanitra. '
  '24':
  - type: text
    content: 'Ny mponina haringan’ny lelan-tsabatra na hoentin-ko babo any amin’ny firenena rehetra any, ary i Jerosalema hohitsakitsahin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' mandrapahafenon’ny andro natao hanjakan’ny hafa firenena.'
  - type: heading
    content: Ho avy amim-boninahitra ny Zanak’olona
  - type: heading
    content: (Jereo Mt 24.29-31; Mk 13.24-27)
  '25':
  - type: text
    content: –Hisy famantarana koa eny amin’ny masoandro sy ny volana ary ny kintana
  - type: note
    content: Ampit Is 13.10; Ezek 32.7; Jl 3.3-4.
  - type: text
    content: '; ary etỳ an-tany dia ho ory sy ho very hevitra ny firenena noho ny ranomasina hikotrokotroka sy hanonja izaitsizy. '
  '26':
  - type: text
    content: 'Hisy olona ho fatin’ny tahotra sy ny fanahiana izay hanjo ny tany tontolo, satria hihozongozona ny herin’ny habakabaka. '
  '27':
  - type: text
    content: 'Amin’izay no hahitana ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' tamy voahodidin-drahona sady ombàn-kery sy voninahitra lehibe'
  - type: note
    content: Dan 7.13.
  - type: text
    content: '. '
  '28':
  - type: text
    content: Raha vao miantomboka anefa izany zavatra izany, dia mitrakà ianareo ary andrandrao ny lohanareo fa efa antomotra ny fanavotana anareo.
  - type: heading
    content: Famantarana avy amin’ny hazo rehetra
  - type: heading
    content: (Jereo Mt 24.32-35; Mk 13.28-31)
  '29':
  - type: text
    content: 'Dia nilaza '
  - type: text
    content: fanoharana
  - type: text
    content: ' tamin’ny mpihaino Azy i Jesoa nanao hoe:'
  - type: text
    content: '–Jereo ny aviavy sy ny hazo rehetra. '
  '3':
  - type: text
    content: 'Ka hoy i Jesoa hoe:'
  - type: text
    content: '–Lazaiko marina aminareo fa io mpitondratena io no nandrotsaka be indrindra tamin’izy rehetra. '
  '30':
  - type: text
    content: 'Raha vao tazanareo manaroka izy ireny, dia fantatrareo fa efa akaiky ny fahavaratra. '
  '31':
  - type: text
    content: 'Toy izany koa raha vao hitanareo miantomboka izany zavatra izany, dia fantaro fa efa akaiky ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Lazaiko marina aminareo fa mbola tsy ho tapitra akory ity taranaka ity, dia ho tanteraka izany rehetra izany. '
  '33':
  - type: text
    content: Ho levona ny tany amana habakabaka, fa ny teniko tsy mba ho levona.
  - type: heading
    content: Ilay andro sy ora tsy fantatra
  '34':
  - type: text
    content: '–Mitandrema tena ianareo, fandrao tonga mavesatra ny fonareo noho ny filibàna sy ny hamamoana ary ny fiahiana izao fiainana izao; ka ho avy tampoka tsy ampoizinareo izany andro izany, '
  '35':
  - type: text
    content: satria hiantonta tahaka ny fandrika harato amin’ny mponina rehetra
  - type: note
    content: 'ho avy tampoka... mponina rehetra: dkt hafa ho avy tampoka aminareo toy ny fandrika harato izany andro izany, satria hihatra amin’ny mponina rehetra.'
  - type: text
    content: 'manerana ny tany tontolo. '
  '36':
  - type: text
    content: Koa miambena sady mivavaha lalandava mba ho afa-miala amin’izany loza rehetra efa ho avy izany sy ho marim-pijoro eo anatrehan’ny Zanak’olona.
  '37':
  - type: text
    content: Ny antoandro i Jesoa dia nampianatra tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: '; ny hariva kosa Izy nankany ivelan’ny tanàna, ka nandany ny alina manontolo teny amin’ny tendrombohitra atao hoe Analanôliva. '
  '38':
  - type: text
    content: Ary vao maraina be, dia nanatona Azy ao an-kianjan’ny tempoly ny vahoaka rehetra mba hihaino Azy.
  '4':
  - type: text
    content: Satria ireo rehetra ireo dia nandrotsaka ny ambim-bavany ho fanatitra; fa ravehivavy io kosa, na fadiranovana toy inona aza, dia ny fivelomany manontolo no narotsany.
  - type: heading
    content: Ambaran’i Jesoa ny handravana ny tempoly
  - type: heading
    content: (Jereo Mk 13.1-2)
  '5':
  - type: text
    content: 'Nisy '
  - type: text
    content: mpianatra
  - type: text
    content: ' niresaka momba ny '
  - type: text
    content: tempoly
  - type: text
    content: ', amin’izy voaravaka vato saro-bidy sy fanatitra fanalàm-boady. Ka hoy i Jesoa:'
  '6':
  - type: text
    content: –Ho avy ny andro handravana ireo zavatra banjininareo ireo ary tsy havela hisy vato mifanongoa eo ka tsy harodana.
  - type: heading
    content: Loza sy fanenjehana isan-karazany
  - type: heading
    content: (Jereo Mt 24.3-14; Mk 13.3-13)
  '7':
  - type: text
    content: 'Ary nanontanian’ireo indray i Jesoa hoe:'
  - type: text
    content: –Mpampianatra ô, oviana no hahatongavan’izany ary inona no hamantarana fa madiva ho avy izany?
  '8':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: '–Tandremo sao voafitaka ianareo. Fa maro no ho avy hisandoka ny anarako sady hanao hoe: «Izaho no '
  - type: text
    content: Mesia
  - type: text
    content: '», ary «Tonga ny fotoana!» Aza mba manaraka an’ireny. '
  '9':
  - type: text
    content: Raha mandre ady sy korontana ianareo, aza taitra; eny, tsy maintsy ho tonga aloha izany, nefa tsy dia miaraka amin’izay akory ny farandro.
