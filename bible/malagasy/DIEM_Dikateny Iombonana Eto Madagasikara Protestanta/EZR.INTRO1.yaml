document_id: EZR.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny tontolo iainana nipoiran’ireo Bokin’ny Tantara no nipoiran’ny bokin’i Hezrà sy ny bokin’i Nehemià (jereo ny sava lalana momba ny 1 Tantara) ary miendrika ho tohin’ireo bokin’ny Tantara mihitsy izy roa tonta. Toe-panahy sy fomba fijery iombonana no nanoratana azy rehetra.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny bokin’i Hezrà dia manomboka amin’ilay fanomezan-dalana nataon’i Kirôsa amperôran’i Persia mba hahazoan’ny Jiosy hiverina any Jerosalema sy hanorina indray ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: (toko 1). Olona maro tamin’ireo jiosy voasesitany no miainga hiverina an-tanindrazana (toko 2); ka ny zavatra voalohany imasoany ao Jerosalema dia ny manangana indray ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fisoronana sy mampisy indray ny fanompoam-pivavahana (toko 3). Saingy rehefa niomana sy niroso hanorina ny tena tempoly ry zareo, dia niseho ny fisakanan’ny mpanohitra sasantsasany, ka mahatonga fifanoratan-taratasy amin’ny fitondrana persianina. Fanamafisana ilay fanomezan-dalana sy fampijoroana ny tempoly no vokatry ny fifampiraharahana.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny fizaràna faharoa amin’ity kosa mitantara momba an’i Hezrà mpisorona izay nirahin’ny amperôra Artakserksesa tamin’ny taonjato manaraka, dia ny hamelombeloman’i Hezrà indray sy hanitsiany ny fiainana ara-pivavahana ao Jerosalema (toko 7–10).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny hafatra raketin’ny bokin’i Hezrà dia manindry mafy fa ilaina hangarangarana ny finoana sy ny fitondrantena. Aharihariny koa ny herimpo sy ny finiavana nasehon’ity
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mpanitsy fivavahana ity mba hampijoroana indray ny firaiketam-pon’ireo Israelita amin’Andriamanitra. Faha-Hezrà no nitsirian’ny jodaîsma tena izy; ka ao anatin’izany jodaîsma izany indrindra, taonjato vitsivitsy aty aoriana, no hahaterahan’i Jesoa.
