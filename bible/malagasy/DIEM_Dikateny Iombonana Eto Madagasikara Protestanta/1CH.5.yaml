    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ny Reobenita sy ny Gadita ary ny antsasa-pokon’i Manase dia nivadika tamin’ilay Andriamanitry ny razany ka nanompo ny andriamani-kafan’ny firenena tompon-tany izay efa naringan’Andriamanitra teo anoloany. '
  '26':
  - type: usfm
