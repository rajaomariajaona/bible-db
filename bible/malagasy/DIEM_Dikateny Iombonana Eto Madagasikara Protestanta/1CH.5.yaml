    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia nampirisihin’ilay Andriamanitr’i Israely i Pola sy i Tiglato-Pilesera samy mpanjakan’i Asiria, ka nobaboin’ireo ny Reobenita sy ny Gadîta ary ny antsasaky ny fokon’i Manase sady nentiny tany Halà sy Habôra sy Harà ary tany amoron’ny ony Gôzàna
    - type: usfm
