    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ny loham-pianakaviany dia i Hefera sy i Jisehỳ, i Eliela sy i Hazriela mbamin’i Jeremià sy i Hôdavià ary i Jahediela: lehilahy mahery sy olo-malaza ireo sady samy lohan’ny fianakaviany avy.'
  '25':
  - type: usfm
