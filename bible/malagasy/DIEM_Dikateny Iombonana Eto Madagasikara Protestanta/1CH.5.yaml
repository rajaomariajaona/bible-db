    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'tao Basàna dia ry i Jôela no voalohany, ry i Safana no faharoa, ary ny manaraka dia ry i Jahenay sy ry i Safata. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fito ny rahalahin’ireo, araka ny fianakaviany avy, dia Mikaela sy i Mesolama, i Seba sy i Jôray mbamin’i Jahikano sy i Zia ary i Hebera: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ireo no zanakalahin’i Abihaîla ilay zanakalahin’i Horỳ sy zafin’i Jarôa sy zafiafin’i Gilehada sy zafin-dohalik’i Mikaela sy zafin-kitrokelin’i Jesisay sy zafim-paladian’i Jehidao ary zafin-dorian’i Boza. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I Ahỳ zanakalahin’i Habdiela sy zafin’i Gonỳ no filohan’ireo fianakaviana ireo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny taranak’i Gada dia nonina tao Gilehada sy Basàna mbamin’ny faritra miankina aminy sy ny kijàna rehetra any Siriôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Siriôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'io no toa mitombina kokoa na dia '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sarôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' aza no hita ao amin’ny TM.'
      marker-yv: yv-n
    - type: text
      text: ' mipaka hatrany amin’ny sisiny farany lavitra indrindra.'
