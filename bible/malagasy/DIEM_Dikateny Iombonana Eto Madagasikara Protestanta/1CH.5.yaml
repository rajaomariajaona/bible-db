      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny fokon’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gada
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mazàna apetraka eo atsimotsimo kokoa, ao amin’ny faritany Gilehada (and 16). Kanefa jereo ny naoty etsy aloha.'
      marker-yv: yv-n
    - type: text
      text: ' dia nonina tandrifin’ny Reobenita tao amin’ny faritany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Basàna
    - type: text
      text: ' ka hatrany Salkà: '
  '12':
