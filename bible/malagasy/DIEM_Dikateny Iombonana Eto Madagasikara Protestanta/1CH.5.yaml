document_id: 1CH.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’i Reobena
  - type: text
    content: I Reobena no lahimatoan’i Jakôba
  - type: note
    content: 'Jakôba: ny hoe Israely no tena ao amin’ny RM.'
  - type: text
    content: ', satria izy no voalohan-terany; kanefa tamin’ny nandotoan’i Reobena ny vadikelin-drainy, dia nomena an’i Jôsefa zanakalahin’i Jakôba ny fizokiany, ka tsy voasoratra ho zokiny tao amin’ny tetiarana intsony i Reobena. '
  '10':
  - type: text
    content: Tamin’ny andron’i Saoly no niady tamin’ny Hagrita ny Reobenita ka nandresy azy; avy eo, dia nanorin-dasy manerana ny ilany atsinanana amin’i Gilehada.
  - type: heading
    content: Ny taranak’i Gada
  '11':
  - type: text
    content: Ny taranak’i Gada
  - type: note
    content: Ny fokon’i Gada dia mazàna apetraka eo atsimotsimo kokoa, ao amin’ny faritany Gilehada (and 16). Kanefa jereo ny naoty etsy aloha.
  - type: text
    content: ' dia nonina tandrifin’ny Reobenita tao amin’ny faritany '
  - type: text
    content: Basàna
  - type: text
    content: ' ka hatrany Salkà: '
  '12':
  - type: text
    content: 'tao Basàna dia ry i Jôela no voalohany, ry i Safana no faharoa, ary ny manaraka dia ry i Jahenay sy ry i Safata. '
  '13':
  - type: text
    content: 'Fito ny rahalahin’ireo, araka ny fianakaviany avy, dia Mikaela sy i Mesolama, i Seba sy i Jôray mbamin’i Jahikano sy i Zia ary i Hebera: '
  '14':
  - type: text
    content: 'ireo no zanakalahin’i Abihaîla ilay zanakalahin’i Horỳ sy zafin’i Jarôa sy zafiafin’i Gilehada sy zafin-dohalik’i Mikaela sy zafin-kitrokelin’i Jesisay sy zafim-paladian’i Jehidao ary zafin-dorian’i Boza. '
  '15':
  - type: text
    content: 'I Ahỳ zanakalahin’i Habdiela sy zafin’i Gonỳ no filohan’ireo fianakaviana ireo. '
  '16':
  - type: text
    content: Ny taranak’i Gada dia nonina tao Gilehada sy Basàna mbamin’ny faritra miankina aminy sy ny kijàna rehetra any Siriôna
  - type: note
    content: 'Siriôna: io no toa mitombina kokoa na dia Sarôna aza no hita ao amin’ny TM.'
  - type: text
    content: ' mipaka hatrany amin’ny sisiny farany lavitra indrindra.'
  '17':
  - type: text
    content: Ireo taranak’i Gada rehetra ireo dia voasoratra tanaty boky avokoa tamin’ny andron’i Jôtama mpanjakan’i Joda sy tamin’ny andron’i Jerobohama
  - type: note
    content: Ny ambara eto dia i Jerobohama II mpanjakan’i Israely tamin’ny 787-747 tal J.K. (jereo 2 Mp 14.16-29).
  - type: text
    content: ' mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: .
  '18':
  - type: text
    content: Ny Reobenita sy ny Gadita ary ny antsasaky ny fokon’i Manase
  - type: note
    content: Jereo and 23.
  - type: text
    content: ' dia nisy lehilahy mahery, havanana mitana ampinga aman-tsabatra sy mandefa tsipîka sady zatra ady: 44.760 no isan’ireo vonon-kiantafika. '
  '19':
  - type: text
    content: Dia niady tamin’ny Hagrîta sy tamin’ny taranak’i Jetora sy i Nafisa
  - type: note
    content: Jereo Gen 25.15.
  - type: text
    content: ' ary i Nôdaba ry zareo. '
  '2':
  - type: text
    content: I Joda
  - type: note
    content: 'Reobena: jereo Gen 35.22; Joda: jereo Gen 49.8-10.'
  - type: text
    content: ' no nahery indrindra teo amin’izy mirahalahy avy, ka izy no nipoiran’ilay ho tonga mpanjakan’i Israely; nefa ny fizokiana dia an’i Jôsefa ihany.'
  '20':
  - type: text
    content: 'Nitaraina tamin’Andriamanitra izy nandritra ny ady, ka nohenoin’Andriamanitra satria natoky Azy; dia novonjeny ary voatolotra ho eo an-tanany ny Hagrîta sy izay rehetra mpomba azy. '
  '21':
  - type: text
    content: 'Nataony babo ny biby fiompiny (dia rameva 50 000, ondry aman’osy 250.000, boriky roa arivo) ary koa olona iray hetsy. '
  '22':
  - type: text
    content: Marobe ny fahavalo maty niampatrampatra satria avy amin’Andriamanitra ny ady. Ary nipetraka nisolo toerana ny Hagrita ry zareo mandra-pahatongan’ny fahababoana.
  - type: heading
    content: Ny taranak’i Manase teny atsinanan’i Jôrdàna
  '23':
  - type: text
    content: 'Ny antsasaky ny fokon’i Manase dia nonina ny faritra hatreo '
  - type: text
    content: Basàna
  - type: text
    content: ' ka hatrany Bahala-Hermôna sy Senîra'
  - type: note
    content: I Bahala-Hermôna sy i Senîra angamba dia anaran-toerana roa (na anaran-tendrombohitra roa) any amin’ny faritr’i Hermôna.
  - type: text
    content: 'ary ny tendrombohitra Hermôna; nihamaro be izy ireo. '
  '24':
  - type: text
    content: 'Ny loham-pianakaviany dia i Hefera sy i Jisehỳ, i Eliela sy i Hazriela mbamin’i Jeremià sy i Hôdavià ary i Jahediela: lehilahy mahery sy olo-malaza ireo sady samy lohan’ny fianakaviany avy.'
  '25':
  - type: text
    content: 'Ny Reobenita sy ny Gadita ary ny antsasa-pokon’i Manase dia nivadika tamin’ilay Andriamanitry ny razany ka nanompo ny andriamani-kafan’ny firenena tompon-tany izay efa naringan’Andriamanitra teo anoloany. '
  '26':
  - type: text
    content: Dia nampirisihin’ilay Andriamanitr’i Israely i Pola sy i Tiglato-Pilesera samy mpanjakan’i Asiria, ka nobaboin’ireo ny Reobenita sy ny Gadîta ary ny antsasaky ny fokon’i Manase sady nentiny tany Halà sy Habôra sy Harà ary tany amoron’ny ony Gôzàna
  - type: note
    content: 'Pola, Tiglato-Pilesera: jereo 2 Mp 15.19 sy nta. –Halà...Gôzàna: jereo 2 Mp 17.6 sy nta.'
  - type: text
    content: ', ka mbola any ireo mandraka androany.'
  '27':
  - type: text
    content: Ny zanakalahin’i Levỳ
  - type: note
    content: Ao amin’ny dkt sasantsasany, ny 5.27-41 dia ataony 6.1-15.
  - type: text
    content: ' dia i Gersôna sy i Kehata ary i Merarỳ. '
  '28':
  - type: text
    content: 'Ny zanakalahin’i Kehata dia i Hamrama sy i Jitsehara ary i Hebrôna sy i Hoziela. '
  '29':
  - type: text
    content: 'Ny zanakalahin’i Hamràma dia i Aharôna sy i Mosesy; ary ny zanakavaviny dia i Miriama. Ny zanakalahin’i Aharôna dia i Nadaba sy i Abihò ary i Elehazara sy i Itamara. '
  '3':
  - type: text
    content: Ny zanakalahin’i Reobena, lahimatoan’i Jakôba, dia i Hanôka sy i Palò ary i Hetsirôna sy i Karmỳ.
  '30':
  - type: text
    content: 'I Elehazara no ray niteraka an’i Pinehasa; i Pinehasa, ray niteraka an’i Abisoa; '
  '31':
  - type: text
    content: 'i Abisoa, ray niteraka an’i Bokỳ; i Bokỳ, ray niteraka an’i Hozỳ; '
  '32':
  - type: text
    content: 'i Hozỳ, ray niteraka an’i Zerahià; i Zerahià, ray niteraka an’i Meraiôta; '
  '33':
  - type: text
    content: 'i Meraiôta, ray niteraka an’i Amarià; i Amzarià, ray niteraka an’i Ahitoba; '
  '34':
  - type: text
    content: 'i Ahitoba, ray niteraka an’i Tsadôka; i Tsadôka, ray niteraka an’i Ahimahatsa; '
  '35':
  - type: text
    content: 'i Ahimahatsa, ray niteraka an’i Hazarià; i Hazarià, ray niteraka an’i Johanàna; '
  '36':
  - type: text
    content: 'i Johanàna, ray niteraka an’i Hazarià (ity Hazarià ity no nanao fisoronana tao amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' izay naorin’i Salômôna tao Jerosalema); '
  '37':
  - type: text
    content: 'i Hazarià, ray niteraka an’i Amarià; i Amarià, ray niteraka an’i Ahitoba; '
  '38':
  - type: text
    content: 'i Ahitoba, ray niteraka an’i Tsadôka; i Tsadôka, ray niteraka an’i Saloma; '
  '39':
  - type: text
    content: 'i Saloma, ray niteraka an’i Hilkià; i Hilkià, ray niteraka an’i Hazarià; '
  '4':
  - type: text
    content: Taranak’i Jôela
  - type: note
    content: I Jôela dia tsy hita ao amin’ny lisitr’ireo taranak’i Reobena mihitsy; fa heverin’ny dkt tranainy sasany ho zanakalahin’i Karmỳ izy.
  - type: text
    content: ': i Semahià zanakalahin’i Jôela, i Gôga zanakalahin’i Semahià, i Simehỳ zanakalahin’i Gôga, '
  '40':
  - type: text
    content: 'i Hazarià, ray niteraka an’i Seraià; i Seraià, ray niteraka an’i Jôtsadaky. '
  '41':
  - type: text
    content: Ary i Jôtsadaky dia lasan-ko babo rehefa natolotry ny TOMPO ho babon’i Nebokadnetsara ny mponin’i Joda sy i Jerosalema.
  '5':
  - type: text
    content: 'i Mikà zanakalahin’i Simehỳ, i Reaià zanakalahin’i Mikà, i Bahala zanakalahin’i Reaià, '
  '6':
  - type: text
    content: ary i Beerà zanakalahin’i Bahala; io Beerà io, izay nentin’i Tiglato-Pilesera mpanjakan’i Asiria ho babo, no filohan’ny Reobenita
  - type: note
    content: 2 Mp 15.29.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Ny rahalahin’i Beerà, araka ny fianakaviany avy, dia voasoratra ao amin’ny bokin’ny taranany; ka ny voalohany dia i Jehiela, ny manaraka dia i Zakarià, '
  '8':
  - type: text
    content: ny farany dia i Bela izay zanakalahin’i Hazaza sy zafin’i Semà
  - type: note
    content: 'Semà: angamba i Simehỳ eo amin’ny and 4 ihany no ambara eto.'
  - type: text
    content: ' ary zafiafin’i Jôela.'
  - type: text
    content: 'Ny Reobenita dia nonina ny faritra hatreo Harôhera ka hatrany amin’ny tendrombohitra Nebao sy hatrany Bahala-Mehôna; '
  '9':
  - type: text
    content: tany atsinanana dia nonina hatrany akaikin’ny taniefitra izay nampisaraka azy amin’ny ony Eofrata izy ireo, fa nihamaro be ny biby fiompy tao amin’ny faritany Gilehada
  - type: note
    content: Raha ny tena izy, dia nonina tamin’ny faritany eo atsimon’izay antsoina mazàna hoe Gilehada ny Reobenita. Kanefa tamin’ny fotoana sasany, ny anarana hoe Gilehada dia mety ho nanondro faritany mivelatra kokoa nianatsimo.
  - type: text
    content: '. '
