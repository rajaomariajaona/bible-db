    - type: text
      text: ', satria izy no voalohan-terany; kanefa tamin’ny nandotoan’i Reobena ny vadikelin-drainy, dia nomena an’i Jôsefa zanakalahin’i Jakôba ny fizokiany, ka tsy voasoratra ho zokiny tao amin’ny tetiarana intsony i Reobena. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tamin’ny andron’i Saoly no niady tamin’ny Hagrita ny Reobenita ka nandresy azy; avy eo, dia nanorin-dasy manerana ny ilany atsinanana amin’i Gilehada.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak’i Gada
    marker-yv: yv-h
  '11':
  - type: usfm
