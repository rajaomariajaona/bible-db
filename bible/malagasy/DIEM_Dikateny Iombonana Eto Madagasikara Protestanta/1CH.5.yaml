  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ny zanakalahin’i Hamràma dia i Aharôna sy i Mosesy; ary ny zanakavaviny dia i Miriama. Ny zanakalahin’i Aharôna dia i Nadaba sy i Abihò ary i Elehazara sy i Itamara. '
  '3':
