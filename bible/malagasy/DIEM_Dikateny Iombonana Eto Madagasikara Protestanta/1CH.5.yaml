  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nitaraina tamin’Andriamanitra izy nandritra ny ady, ka nohenoin’Andriamanitra satria natoky Azy; dia novonjeny ary voatolotra ho eo an-tanany ny Hagrîta sy izay rehetra mpomba azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nataony babo ny biby fiompiny (dia rameva 50 000, ondry aman’osy 250.000, boriky roa arivo) ary koa olona iray hetsy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Marobe ny fahavalo maty niampatrampatra satria avy amin’Andriamanitra ny ady. Ary nipetraka nisolo toerana ny Hagrita ry zareo mandra-pahatongan’ny fahababoana.
  - type: usfm
    marker: s1
    children:
    - type: text
