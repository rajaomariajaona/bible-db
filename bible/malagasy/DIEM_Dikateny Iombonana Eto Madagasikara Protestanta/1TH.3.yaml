      - type: text
        text: Jereo Asa 17.15-16.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ka nalefanay nankatỳ aminareo i Timôty rahalahinay ara-pinoana sady mpiara-miasa aminay ho an’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mpiara-miasa aminay ho an’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpiara-miasa amin’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ary ny sasany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpanompon’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: 'amin’ny fitoriana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' momba an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. Nalefanay i Timôty hampiorina sy hampahery anareo amin’ny finoanareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mba tsy hisy hihontsina ianareo amin’izao fahoriana mahazo antsika izao; satria ny tenanareo mahalala fa voatendrin’Andriamanitra hodiavintsika izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fony mbola tatỳ aminareo izahay, dia efa nilaza fa tsy maintsy hampahorîna isika; ary dia nitranga izany, araka izay fantatrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa satria tsy aritro intsony, dia nalefako i Timôty hahalalako ny finoanareo. Nanahy aho fandrao voataonan’ilay mpaka fanahy ianareo ka ho very maina ny nikelezanay aina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa tafaverina atỳ aminay izao i Timôty avy tatỳ aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Asa 18.5: avy any Kôrinto no nanoratan’i Paoly ity taratasy ity.'
    marker-yv: yv-n
  - type: text
    text: ', ka nilaza vaovao tsara taminay momba ny finoanareo sy ny fitiavanareo. Nilazany koa izahay fa mahatsiaro tsara anay mandrakariva ianareo sady maniry mafy ny hahita anay, toy ny anirianay mafy hahita anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Noho izany, na dia tery sy ory fatratra aza izahay, dia nahazo hery noho ny aminareo; ny finoanareo no nampahery anay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa velona izahay ankehitriny satria mamahatra tsara sy mifikitra mafy amin’ny Tompo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Inona re no saotra azonay avaly an’Andriamanitra noho ny aminareo, noho ny hafaliana be dia be omenareo anay sy tsapanay eo anatrehan’Andriamanitsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mangataka mafy aminy, andro aman’alina, izahay mba hifanatri-tava aminareo sy hameno izay tsy ampy amin’ny finoanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izy izay Andriamanitsika sady Raintsika sy i Jesoa Tompontsika anie hitari-dalana anay ho atỳ aminareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny Tompo anie hampitombo ny fifankatiavanareo sy ny fitiavanareo ny olona rehetra ho tahaka ny itiavanay anareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia hampiorina ny fonareo Izy, ka tsy hanan-tsiny sy ho masina eo anatrehan’ilay Andriamanitra Raintsika ianareo, amin’ny andro hiavian’i Jesoa Tompontsika otronin’izay rehetra voatokana ho Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'otronin’izay... ho Azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: otronin’ireo anjeliny rehetra.
    marker-yv: yv-n
