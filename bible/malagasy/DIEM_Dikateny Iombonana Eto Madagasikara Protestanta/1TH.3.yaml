document_id: 1TH.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: Koa satria tsy aritray intsony, dia naleonay nilaozana irery tany Atena
  - type: note
    content: Jereo Asa 17.15-16.
  - type: text
    content: '; '
  '10':
  - type: text
    content: Mangataka mafy aminy, andro aman’alina, izahay mba hifanatri-tava aminareo sy hameno izay tsy ampy amin’ny finoanareo.
  '11':
  - type: text
    content: 'Izy izay Andriamanitsika sady Raintsika sy i Jesoa Tompontsika anie hitari-dalana anay ho atỳ aminareo! '
  '12':
  - type: text
    content: 'Ny Tompo anie hampitombo ny fifankatiavanareo sy ny fitiavanareo ny olona rehetra ho tahaka ny itiavanay anareo! '
  '13':
  - type: text
    content: Dia hampiorina ny fonareo Izy, ka tsy hanan-tsiny sy ho masina eo anatrehan’ilay Andriamanitra Raintsika ianareo, amin’ny andro hiavian’i Jesoa Tompontsika otronin’izay rehetra voatokana ho Azy
  - type: note
    content: 'otronin’izay... ho Azy: dkt hafa otronin’ireo anjeliny rehetra.'
  - type: text
    content: .
  '2':
  - type: text
    content: ka nalefanay nankatỳ aminareo i Timôty rahalahinay ara-pinoana sady mpiara-miasa aminay ho an’Andriamanitra
  - type: note
    content: 'mpiara-miasa aminay ho an’Andriamanitra: misy stf sasany ahitana hoe mpiara-miasa amin’Andriamanitra ary ny sasany mpanompon’Andriamanitra.'
  - type: text
    content: 'amin’ny fitoriana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i '
  - type: text
    content: Kristy
  - type: text
    content: '. Nalefanay i Timôty hampiorina sy hampahery anareo amin’ny finoanareo, '
  '3':
  - type: text
    content: 'mba tsy hisy hihontsina ianareo amin’izao fahoriana mahazo antsika izao; satria ny tenanareo mahalala fa voatendrin’Andriamanitra hodiavintsika izany. '
  '4':
  - type: text
    content: 'Fony mbola tatỳ aminareo izahay, dia efa nilaza fa tsy maintsy hampahorîna isika; ary dia nitranga izany, araka izay fantatrareo. '
  '5':
  - type: text
    content: Koa satria tsy aritro intsony, dia nalefako i Timôty hahalalako ny finoanareo. Nanahy aho fandrao voataonan’ilay mpaka fanahy ianareo ka ho very maina ny nikelezanay aina.
  '6':
  - type: text
    content: Efa tafaverina atỳ aminay izao i Timôty avy tatỳ aminareo
  - type: note
    content: 'Jereo Asa 18.5: avy any Kôrinto no nanoratan’i Paoly ity taratasy ity.'
  - type: text
    content: ', ka nilaza vaovao tsara taminay momba ny finoanareo sy ny fitiavanareo. Nilazany koa izahay fa mahatsiaro tsara anay mandrakariva ianareo sady maniry mafy ny hahita anay, toy ny anirianay mafy hahita anareo. '
  '7':
  - type: text
    content: 'Noho izany, na dia tery sy ory fatratra aza izahay, dia nahazo hery noho ny aminareo; ny finoanareo no nampahery anay, '
  '8':
  - type: text
    content: 'fa velona izahay ankehitriny satria mamahatra tsara sy mifikitra mafy amin’ny Tompo ianareo. '
  '9':
  - type: text
    content: 'Inona re no saotra azonay avaly an’Andriamanitra noho ny aminareo, noho ny hafaliana be dia be omenareo anay sy tsapanay eo anatrehan’Andriamanitsika? '
