document_id: NUM.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lavenon’ny ombivavy mena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy sy i Aharôna ny TOMPO ka nampita '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ireto fepetran-dalàna izay nandidiany ireto:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazao ny Israelita hitondra ombivavy mena izay tsy misy kilema na tsininy ary tsy mbola nampitondraina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zioga
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ento any amin’i Elehazàra mpisorona izany mba havoakany eny ivelan’ny toby, ary hovonoina eo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hakan’i Elehazàra mpisorona amin’ny fanondro ny ran’ilay ombivavy ka hafafiny impito manandrify ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hodorana eo imasony ilay ombivavy miaraka amin’ny hodiny sy ny henany ary ny tsinainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia haka hazo sedera sy rantsana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hisôpa
  - type: text
    text: ' ary lamba jaky ny mpisorona ka hanipy azy eo amin’ny afo andoroana ilay ombivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Avy eo dia hanasa ny fitafiany ny mpisorona ary hampandro ny tenany, izay vao hiditra ao amin’ny toby; nefa mbola '
  - type: usfm
    marker: w
    children:
    - type: text
      text: haloto
  - type: text
    text: ' mandra-paharivan’ny andro izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ilay handoro ny ombivavy kosa dia hanasa ny fitafiany sady hampandro ny tenany, saingy mbola haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hangonin’ny lehilahy madio iray ny lavenon’ilay ombivavy ka hapetrany amin’ny toerana madio iray eo ivelan’ny toby. Hotehirizina ho an’ny fiangonan’ny Israelita ao izany hanomanana ny rano fanadiovana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 9.13.
    marker-yv: yv-n
  - type: text
    text: '. Izany fombam-pivavahana izany dia tahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanalana ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hanasa ny fitafiany koa ilay hanangona ny lavenon’ny ombivavy, saingy mbola haloto mandra-paharivan’ny andro. Ho lalàna raikitra izany ho an’ny Israelita sy ny vahiny valovotaka ao aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna momba ny fanadiovana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Izay mikasika fatin’olona dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: haloto
  - type: text
    text: ' mandritra ny fito andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amin’ny andro fahatelo sy fahafito izy no hanadio ny tenany amin’ny rano fanadiovana, dia hadio; fa raha tsy manadio ny tenany amin’ny andro fahatelo sy fahafito kosa izy, dia tsy hadio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mikasika fatin’olona, nefa tsy manadio ny tenany, dia mandoto ny Fonena-masin’ny Tompo, ka hoesorina tsy ho isan’ny vahoaka Israely. Koa satria tsy nofafazana rano fanadiovana izy, dia haloto; ary mbola hitoetra aminy ihany ny tsy fahadiovany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Izao no fitsipika: raha misy olona maty an-day, izay rehetra miditra ao na ny olona rehetra efa ao rahateo dia haloto mandritra ny fito andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny fitoeran-javatra rehetra izay misokatra ka tsy misy sarony mifatotra aminy dia haloto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay any an-tsaha, ka mandona olona matin-tsabatra na maty ho azy na koa mandona taolam-paty na fasana, dia haloto mandritra ny fito andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mba anadiovana ny olona maloto, dia halaina ny lavenon’ilay ombivavy nodorana ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanalana ny ota ka hatao ao anaty tsangambava izay hasiana ranovelona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Haka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hisôpa
  - type: text
    text: ' ny lehilahy madio iray ka hanatsoboka izany ao amin’ny rano, dia hofafazany ny lay misy ny maty sy ny fitoeran-javatra rehetra ary ny olona ao; na koa hofafazany rano izay sendra nikasika taolam-paty na olona maty novonoina na olona maty ho azy na fasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hofafazan-drano toy izany ilay olona maloto amin’ny andro fahatelo sy fahafito, ka hadio amin’ny otany izy amin’ny andro fahafito. Hanasa ny fitafiany sy hampandro ny tenany izy aorian’izany, dia hadio rehefa hariva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Fa izay olona naloto nefa tsy nanao fidiovan-tena dia hoesorina tsy ho isan’ny fiangonana israelita satria handoto ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasin’ny TOMPO
  - type: text
    text: ' izy; tsy nofafazana rano fanadiovana izy, ka dia maloto.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Ho lalàna raikitra ho an’ny Israelita izany. Izay manao fafy rano amin’io rano fanadiovana io dia hanasa ny fitafiany; ary izay mikasika io rano fandiovana io dia haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izay zavatra rehetra voakasiky ny olona maloto dia haloto; ary izay olona mikasika azy koa dia haloto mandra-paharivan’ny andro.»
