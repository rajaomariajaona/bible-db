document_id: NUM.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lavenon’ny ombivavy mena
  - type: text
    content: 'Niteny tamin’i Mosesy sy i Aharôna ny TOMPO ka nampita '
  '10':
  - type: text
    content: Hanasa ny fitafiany koa ilay hanangona ny lavenon’ny ombivavy, saingy mbola haloto mandra-paharivan’ny andro. Ho lalàna raikitra izany ho an’ny Israelita sy ny vahiny valovotaka ao aminy.
  - type: heading
    content: Lalàna momba ny fanadiovana
  '11':
  - type: text
    content: '«Izay mikasika fatin’olona dia '
  - type: text
    content: haloto
  - type: text
    content: ' mandritra ny fito andro. '
  '12':
  - type: text
    content: 'Amin’ny andro fahatelo sy fahafito izy no hanadio ny tenany amin’ny rano fanadiovana, dia hadio; fa raha tsy manadio ny tenany amin’ny andro fahatelo sy fahafito kosa izy, dia tsy hadio. '
  '13':
  - type: text
    content: Izay mikasika fatin’olona, nefa tsy manadio ny tenany, dia mandoto ny Fonena-masin’ny Tompo, ka hoesorina tsy ho isan’ny vahoaka Israely. Koa satria tsy nofafazana rano fanadiovana izy, dia haloto; ary mbola hitoetra aminy ihany ny tsy fahadiovany.
  '14':
  - type: text
    content: '«Izao no fitsipika: raha misy olona maty an-day, izay rehetra miditra ao na ny olona rehetra efa ao rahateo dia haloto mandritra ny fito andro. '
  '15':
  - type: text
    content: 'Ny fitoeran-javatra rehetra izay misokatra ka tsy misy sarony mifatotra aminy dia haloto. '
  '16':
  - type: text
    content: 'Izay any an-tsaha, ka mandona olona matin-tsabatra na maty ho azy na koa mandona taolam-paty na fasana, dia haloto mandritra ny fito andro. '
  '17':
  - type: text
    content: 'Mba anadiovana ny olona maloto, dia halaina ny lavenon’ilay ombivavy nodorana ho '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota ka hatao ao anaty tsangambava izay hasiana ranovelona. '
  '18':
  - type: text
    content: 'Haka '
  - type: text
    content: hisôpa
  - type: text
    content: ' ny lehilahy madio iray ka hanatsoboka izany ao amin’ny rano, dia hofafazany ny lay misy ny maty sy ny fitoeran-javatra rehetra ary ny olona ao; na koa hofafazany rano izay sendra nikasika taolam-paty na olona maty novonoina na olona maty ho azy na fasana. '
  '19':
  - type: text
    content: Hofafazan-drano toy izany ilay olona maloto amin’ny andro fahatelo sy fahafito, ka hadio amin’ny otany izy amin’ny andro fahafito. Hanasa ny fitafiany sy hampandro ny tenany izy aorian’izany, dia hadio rehefa hariva.
  '2':
  - type: text
    content: 'ireto fepetran-dalàna izay nandidiany ireto:'
  - type: text
    content: '–Lazao ny Israelita hitondra ombivavy mena izay tsy misy kilema na tsininy ary tsy mbola nampitondraina '
  - type: text
    content: zioga
  - type: text
    content: '. '
  '20':
  - type: text
    content: '«Fa izay olona naloto nefa tsy nanao fidiovan-tena dia hoesorina tsy ho isan’ny fiangonana israelita satria handoto ny '
  - type: text
    content: Toeramasin’ny TOMPO
  - type: text
    content: ' izy; tsy nofafazana rano fanadiovana izy, ka dia maloto.'
  '21':
  - type: text
    content: '«Ho lalàna raikitra ho an’ny Israelita izany. Izay manao fafy rano amin’io rano fanadiovana io dia hanasa ny fitafiany; ary izay mikasika io rano fandiovana io dia haloto mandra-paharivan’ny andro. '
  '22':
  - type: text
    content: Izay zavatra rehetra voakasiky ny olona maloto dia haloto; ary izay olona mikasika azy koa dia haloto mandra-paharivan’ny andro.»
  '3':
  - type: text
    content: 'Ento any amin’i Elehazàra mpisorona izany mba havoakany eny ivelan’ny toby, ary hovonoina eo anatrehany. '
  '4':
  - type: text
    content: 'Hakan’i Elehazàra mpisorona amin’ny fanondro ny ran’ilay ombivavy ka hafafiny impito manandrify ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Hodorana eo imasony ilay ombivavy miaraka amin’ny hodiny sy ny henany ary ny tsinainy. '
  '6':
  - type: text
    content: 'Dia haka hazo sedera sy rantsana '
  - type: text
    content: hisôpa
  - type: text
    content: ' ary lamba jaky ny mpisorona ka hanipy azy eo amin’ny afo andoroana ilay ombivavy. '
  '7':
  - type: text
    content: 'Avy eo dia hanasa ny fitafiany ny mpisorona ary hampandro ny tenany, izay vao hiditra ao amin’ny toby; nefa mbola '
  - type: text
    content: haloto
  - type: text
    content: ' mandra-paharivan’ny andro izy. '
  '8':
  - type: text
    content: 'Ilay handoro ny ombivavy kosa dia hanasa ny fitafiany sady hampandro ny tenany, saingy mbola haloto mandra-paharivan’ny andro. '
  '9':
  - type: text
    content: Hangonin’ny lehilahy madio iray ny lavenon’ilay ombivavy ka hapetrany amin’ny toerana madio iray eo ivelan’ny toby. Hotehirizina ho an’ny fiangonan’ny Israelita ao izany hanomanana ny rano fanadiovana
  - type: note
    content: Jereo Heb 9.13.
  - type: text
    content: '. Izany fombam-pivavahana izany dia tahaka ny '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota. '
