document_id: ISA.26,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tanàna mahery sy sarotra iakarana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Amin’izany andro izany, ao amin’ny tanin’i Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hihirana izao hira izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Manan-tanàna mafy isika.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manda roa sosona no nataon’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho fiarovana azy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa raha amindrana fo ny olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hahatakatra ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hamilivily ny rariny eto an-tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hahita ny fiandrianan’ny TOMPO.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: TOMPO ô, manandra-tanana handrahona Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy ahoan’ireo olon-dratsy akory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra izy raha mahita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zotomponao hiaro ny vahoakanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, aoka handevona azy ny afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay natokanao ho an’ny fahavalonao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Heb 10.27.
      marker-yv: yv-n
    - type: text
      text: '!'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: TOMPO ô, Ianao no manome anay ny fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Ianao koa no mahatomombana ho anay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asa rehetra nataonay.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ry TOMPO Andriamanitray ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tompo maro no efa notompoinay talohanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny anaranao ihany no satrinay hotsaroana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny maty tsy ho velona intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny matoatoa tsy hitsangana koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa nirotsaka handringana azy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nolevoninao mbamin’ny fahatsiarovana azy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: TOMPO ô, nampitomboinao ny firenenay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izany no nahazoanao voninahitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nampitomboinao ny firenenay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nitarinao halalaka avokoa ny sisin-taniny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: TOMPO ô, fony azom-pahoriana izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nitady Anao tokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary niantso vonjy taminao izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa voaterin’ny famaizanao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Toy ny vehivavy mihetsi-jaza hiteraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miolanolana sy mitaraina mafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo anatrehanao, TOMPO ô.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Izahay koa dia mova tsy efa bevohòka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy efa nihetsi-jaza hiteraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tahaka ny zava-poana no naterakay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nahay nitondra fanafahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny tany izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nahay nitondra mponina vaovao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izao tontolo izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsanganan’ny maty sy famaizana ireo heloka bevava
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ho velona indray ireo maty ao aminao, ry fireneko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitsangana ny fatiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hifoha sy hanao hobim-pifaliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo matory ao amin’ny vovo-tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa handefasan’ny Tompo andom-pahazavana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hateraky ny tany indray ireo nodimandry.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Vohay ireo vavahady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hidiran’ny firenena mahatoky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitana ny fahamarinana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 118.19-20.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ndeha miditra any an-tranonao, ry fireneko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hidio mafy ny varavarana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miere kely indray mipy maso monja ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pisindan’ny fahatezeran’ny Tompo.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa indro ny TOMPO mivoaka ny fonenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanadina ny mponina amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: momba ny heloka vitany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hasehon’ny tany ireo ra notrohiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hafeniny intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo novonoina ho faty teo aminy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny toe-tsainy tsy miovaova;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka omenao fiadanana hatrany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria matoky Anao, TOMPO ô.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Matokia ny TOMPO hatrany hatrany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny TOMPO no vatolampy mandrakizay.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izy no nampietry ireo mpiteronterona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nandrodana ny tanàna sarotra iakarana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nampidaboka azy tamin’ny tany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampitrosona azy tamin’ny vovoka
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: mba hohitsahin’ny mahantra sy ny malemy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka amin’ny fotoana farany
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: TOMPO ô, toroanao lala-mahitsy ny olo-marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy miolikolika ny lalana soritanao ho azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Eny, lalana atoron’ny didim-pitsaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no anantenanay Anao, TOMPO ô.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hanonona ny anaranao sy hahatsiaro Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hetahetam-ponay.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Maniry ny atrehinao aho amin’ny alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mitady Anao ny fanahiko ato anatiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa ny didim-pitsaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ampiharinao amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahay hitondratena mahitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mponina eran’izao tontolo izao.
