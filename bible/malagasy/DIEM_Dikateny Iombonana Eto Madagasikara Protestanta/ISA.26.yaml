document_id: ISA.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tanàna mahery sy sarotra iakarana
  - type: text
    content: Amin’izany andro izany, ao amin’ny tanin’i Joda
  - type: text
    content: 'dia hihirana izao hira izao:'
  - type: text
    content: «Manan-tanàna mafy isika.
  - type: text
    content: Manda roa sosona no nataon’ny TOMPO
  - type: text
    content: mba ho fiarovana azy.
  '10':
  - type: text
    content: Fa raha amindrana fo ny olon-dratsy,
  - type: text
    content: dia tsy hahatakatra ny fahamarinana,
  - type: text
    content: fa hamilivily ny rariny eto an-tany
  - type: text
    content: ka tsy hahita ny fiandrianan’ny TOMPO.
  '11':
  - type: text
    content: TOMPO ô, manandra-tanana handrahona Ianao
  - type: text
    content: kanefa tsy ahoan’ireo olon-dratsy akory.
  - type: text
    content: Aoka ho menatra izy raha mahita
  - type: text
    content: ny zotomponao hiaro ny vahoakanao;
  - type: text
    content: eny, aoka handevona azy ny afo
  - type: text
    content: izay natokanao ho an’ny fahavalonao
  - type: note
    content: Ampit Heb 10.27.
  - type: text
    content: '!'
  '12':
  - type: text
    content: TOMPO ô, Ianao no manome anay ny fiadanana
  - type: text
    content: ary Ianao koa no mahatomombana ho anay
  - type: text
    content: ny asa rehetra nataonay.
  '13':
  - type: text
    content: Ry TOMPO Andriamanitray ô,
  - type: text
    content: tompo maro no efa notompoinay talohanao;
  - type: text
    content: nefa ny anaranao ihany no satrinay hotsaroana.
  '14':
  - type: text
    content: Ny maty tsy ho velona intsony
  - type: text
    content: ary ny matoatoa tsy hitsangana koa;
  - type: text
    content: fa efa nirotsaka handringana azy Ianao
  - type: text
    content: ka nolevoninao mbamin’ny fahatsiarovana azy.
  '15':
  - type: text
    content: TOMPO ô, nampitomboinao ny firenenay,
  - type: text
    content: ary izany no nahazoanao voninahitra;
  - type: text
    content: eny, nampitomboinao ny firenenay
  - type: text
    content: ka nitarinao halalaka avokoa ny sisin-taniny.
  '16':
  - type: text
    content: TOMPO ô, fony azom-pahoriana izahay,
  - type: text
    content: dia nitady Anao tokoa;
  - type: text
    content: ary niantso vonjy taminao izahay,
  - type: text
    content: rehefa voaterin’ny famaizanao.
  '17':
  - type: text
    content: Toy ny vehivavy mihetsi-jaza hiteraka
  - type: text
    content: ka miolanolana sy mitaraina mafy,
  - type: text
    content: dia toy izany izahay
  - type: text
    content: teo anatrehanao, TOMPO ô.
  '18':
  - type: text
    content: Izahay koa dia mova tsy efa bevohòka
  - type: text
    content: sy efa nihetsi-jaza hiteraka,
  - type: text
    content: nefa tahaka ny zava-poana no naterakay.
  - type: text
    content: Tsy nahay nitondra fanafahana
  - type: text
    content: ho an’ny tany izahay,
  - type: text
    content: tsy nahay nitondra mponina vaovao
  - type: text
    content: ho an’izao tontolo izao.
  - type: heading
    content: Fitsanganan’ny maty sy famaizana ireo heloka bevava
  '19':
  - type: text
    content: Ho velona indray ireo maty ao aminao, ry fireneko,
  - type: text
    content: ary hitsangana ny fatiny.
  - type: text
    content: Hifoha sy hanao hobim-pifaliana
  - type: text
    content: ireo matory ao amin’ny vovo-tany,
  - type: text
    content: fa handefasan’ny Tompo andom-pahazavana ianao
  - type: text
    content: ka hateraky ny tany indray ireo nodimandry.
  '2':
  - type: text
    content: Vohay ireo vavahady
  - type: text
    content: hidiran’ny firenena mahatoky
  - type: text
    content: izay mitana ny fahamarinana
  - type: note
    content: Ampit Sal 118.19-20.
  - type: text
    content: .
  '20':
  - type: text
    content: Ndeha miditra any an-tranonao, ry fireneko,
  - type: text
    content: ka hidio mafy ny varavarana;
  - type: text
    content: miere kely indray mipy maso monja ianao
  - type: text
    content: mandra-pisindan’ny fahatezeran’ny Tompo.
  '21':
  - type: text
    content: Fa indro ny TOMPO mivoaka ny fonenany
  - type: text
    content: mba hanadina ny mponina amin’ny tany
  - type: text
    content: momba ny heloka vitany.
  - type: text
    content: Hasehon’ny tany ireo ra notrohiny
  - type: text
    content: ary tsy hafeniny intsony
  - type: text
    content: ireo novonoina ho faty teo aminy.
  '3':
  - type: text
    content: Ny toe-tsainy tsy miovaova;
  - type: text
    content: ka omenao fiadanana hatrany izy
  - type: text
    content: satria matoky Anao, TOMPO ô.
  '4':
  - type: text
    content: Matokia ny TOMPO hatrany hatrany ianareo,
  - type: text
    content: satria ny TOMPO no vatolampy mandrakizay.
  '5':
  - type: text
    content: Izy no nampietry ireo mpiteronterona
  - type: text
    content: sy nandrodana ny tanàna sarotra iakarana;
  - type: text
    content: eny, nampidaboka azy tamin’ny tany Izy
  - type: text
    content: ka nampitrosona azy tamin’ny vovoka
  '6':
  - type: text
    content: mba hohitsahin’ny mahantra sy ny malemy.
  - type: heading
    content: Vavaka amin’ny fotoana farany
  '7':
  - type: text
    content: TOMPO ô, toroanao lala-mahitsy ny olo-marina;
  - type: text
    content: ary tsy miolikolika ny lalana soritanao ho azy.
  '8':
  - type: text
    content: Eny, lalana atoron’ny didim-pitsaranao
  - type: text
    content: no anantenanay Anao, TOMPO ô.
  - type: text
    content: Ny hanonona ny anaranao sy hahatsiaro Anao
  - type: text
    content: no hetahetam-ponay.
  '9':
  - type: text
    content: Maniry ny atrehinao aho amin’ny alina;
  - type: text
    content: eny, mitady Anao ny fanahiko ato anatiko.
  - type: text
    content: Rehefa ny didim-pitsaranao
  - type: text
    content: no ampiharinao amin’ny tany,
  - type: text
    content: dia hahay hitondratena mahitsy
  - type: text
    content: ny mponina eran’izao tontolo izao.
