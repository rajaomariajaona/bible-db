document_id: JOS.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny momba ireo foko any atsinanan’i Jôrdàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia novorîn’i Josoa ny vatan-dehilahy tao amin’ny fokon’i Reobena sy fokon’i Gada ary antsasa-pokon’i Manase any atsinanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa notandremanareo avokoa izay rehetra nandidian’i Mosesy mpanompon’ny TOMPO anareo, ary nankatoavinareo aho tamin’izay rehetra nasaiko nataonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nandritra izay andro marobe izay ka mandraka ankehitriny dia tsy nilaozanareo ny mpiray firenena aminareo fa ny baikon’ny TOMPO Andriamanitrareo no tena notandremanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ankehitriny, araka izay efa nampanantenainy, dia nomen’ny TOMPO Andriamanitrareo fandriampahalemana ny mpiray firenena aminareo; koa mahazo miverina any an-dainareo ianareo ankehitriny, any amin’ny tany izay efa nomen’i Mosesy mpanompon’ny TOMPO ho anareo eny ampita atsinanan’i Jôrdàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao anefa: Imasoy tsara ny hanatanteraka ny didy aman-dalàna rehetra izay nampitain’i Mosesy mpanompon’ny TOMPO taminareo, ka hitiavanareo ny TOMPO Andriamanitrareo, hizoranareo amin’ny lalana rehetra nosoritany, hitandremanareo ny didiny, hifikiranareo aminy ary hanompoanareo Azy amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: 'Ary rehefa nitsodrano azy telo tonta i Josoa, dia nandefa azy hody any aminy sady nanafatra azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Modia any aminareo miaraka amin’ny harena be, dia ny andiam-biby fiompy maro, ny volafotsy sy volamena, ny varahina sy ny vy, ary ny fitafiana miavosa; ka zarao amin’ireo mpiray foko aminareo ny zavatra nobaboina tamin’ny fahavalonareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lasa nody tany aminy avy izy telo tonta. Ny antsasapokon’i Manase dia nomen’i Mosesy zaratany tao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ', teny ampita atsinanan’i Jôrdàna; ny antsasany kosa nomen’i Josoa zaratany teny ampita andrefan’i Jôrdàna, niaraka tamin’ireo foko hafa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nananganana alitara teo akaikin’i Jôrdàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lasa nody tany aminy tokoa ny vatan-dehilahy taranak’i Reobena sy taranak’i Gada ary anisan’ny antsasa-pokon’i Manase. Tao Silao amin’ny tany Kanahàna ry zareo no nandao ny Israelita hafa mba hankany amin’ny tany Gilehada izay zaratany azony araka ny baiko nampitain’ny Tompo tamin’ny alalan’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nony tonga tao Gelilôta teo amoron’i Jôrdàna sady mbola tao amin’ny tany Kanahàna izy telo tonta, dia nanorina alitara lehibe mahatalanjona teo amoron’ny renirano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nampandrenesina ny Israelita sisa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro ny vatan-dehilahy taranak’i Reobena sy taranak’i Gada ary anisan’ny antsasa-pokon’i Manase nanorina alitara ao Gelilôta amoron’i Jôrdàna amin’ny sisin’ny tany Kanahàna, atỳ amin’ny lafiny misy antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rehefa nandre izany ny fiangonan’ny Israelita tandrefana tsivakivolo, dia nifamory tao Silao izy rehetra mba handeha hiady amin’ireo foko tatsinanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny alitara naorina teny amin’ny tany Kanahàna dia noheverina hifaninana amin’ilay Toeramasina tao Silao sy ho mariky ny fikomiana amin’Andriamanitra (and 16).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia naniraka an’i Pinehasa zanakalahin’i Elehazara mpisorona ry zareo hiresaka amin’ny taranak’i Reobena sy taranak’i Gada ary antsasa-pokon’i Manase any Gilehada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Niaraka taminy koa ny loholona folo, iray isaky ny foko; izy rehetra ireo dia samy loham-pianakaviana tamin’ny isan’arivo israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia tonga tany amin’ny taranak’i Reobena sy taranak’i Gada ary antsasa-pokon’i Manase tany Gilehada ireo iraka ireo ka niresaka taminy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'sady nampita izay voalazan’ny fiangonan’ny TOMPO tsivakivolo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona izao fahotana nataonareo tamin’Andriamanitr’i Israely izao? Nahoana ianareo no miala amin’ny fanarahana Azy TOMPO ankehitriny? Fa tamin’ny nanorenanareo alitara ho anareo, dia mikomy amin’ny TOMPO ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moa mbola tsy ampy ho antsika ve ny heloka tao Pehôra, izay tsy mbola nodiovina ho afaka amintsika mandraka androany na dia efa nisy aza ny aretina nahavoa antsika fiangonan’ny TOMPO? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ankehitriny dia miala amin’ny fanarahana ny TOMPO ianareo. Koa raha mikomy amin’ny TOMPO ianareo anio, dia ho tezitra amin’ny fiangonan’ny Israelita tsivakivolo Izy rahampitso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa raha heverinareo ho tsy mendrika ny TOMPO ireto zarataninareo, dia mankanesa any amin’ny tanin’ny TOMPO izay misy ny tranolay fonenany, ka mangalà zaratany eo afovoan’ny anay; fa aza mikomy amin’ny TOMPO ianareo ary aza mikomy aminay amin’ny fanangananareo alitara, ankoatra ilay alitaran’ny TOMPO Andriamanitsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moa tsy i Hakàna zanakalahin’i Zera ve no nandika ny fepetra momba ny zavatra natao hafoy ho an’ny TOMPO, kanefa dia ny fiangonan’ny Israelita tsivakivolo no niharan’ny fahatezeran’ny TOMPO? Ary tsy i Hakàna irery ihany no maty tamin’ny fahadisoany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny amin’i Hakàna '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nandika fepetra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Jos 7.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia namaly ny taranak’i Reobena sy taranak’i Gada ary antsasa-pokon’i Manase ka nanambara tamin’iretsy iraka israelita mpifehy arivo hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '–Ny TOMPO no Andriamanitry ny andriamanitra, eny, ny TOMPO no Andriamanitry ny andriamanitra! Izy dia mahalala ary ny Israelita rehetra koa hahalala ny anton’ny nanorenanay io alitara io. Raha ho fikomiana na ho fivadihana amin’ny TOMPO izany, dia aoka tsy hovonjeny izahay anio! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha tàhiny hanolorana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo na fanatitra hohanina na sorom-pihavanana izany, dia aoka ny TOMPO mihitsy no hanafay anay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny sorona dia tsy maintsy atolotra eo amin’ilay alitaran’ny Toeramasin’i Israely, eo anoloan’ny varavaran’ny Tranolay fihaonana irery ihany: (jereo Lev 1–3).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsia, fa raha nanao izao zavatra izao izahay, dia natahotra fandao any aoriana any ny taranakareo hiteny amin’ny taranakay hoe: «Inona moa no ifandraisanareo sy ny TOMPO Andriamanitr’i Israely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny TOMPO mihitsy manko no nametraka an’i Jôrdàna ho faritra mampisaraka anay aminareo taranak’i Reobena sy taranak’i Gada, ka tsy misy anjaranareo amin’ny TOMPO!» Dia mety hampitsahatra ny taranakay tsy hanaja ny TOMPO intsony ny taranakareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izany no nahatonga anay hanapa-kevitra hanao io alitara io, saingy tsy hanaterana sorona dorana manontolo na sorona hafa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ho vavolombelona aminay sy aminareo ary amin’ny taranatsika mifandimby kosa io alitara io fa zonay ny hanao fanompoana eo anatrehan’ny TOMPO amin’ny fanolorana sorona dorana manontolo sy fanatitra hohanina ary sorom-pihavanana. Amin’izay ny taranakareo, any aoriana any, dia tsy ho afa-milaza amin’ny taranakay hoe: «Tsy misy anjaranareo amin’ny TOMPO». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha sendra ka hambarany aminay na amin’ny taranakay izany rahatrizay, dia hovaliana hoe: «Jereo io alitara nataon’ny razanay io fa mitovy amin’ny alitaran’ny TOMPO; saingy tsy natao hanolorana sorona dorana manontolo na fanatitra hohanina izany, fa ho vavolombelona aminay sy aminareo». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Sanatria aminay mihitsy ny hikomy amin’ny TOMPO na hiala amin’ny fanarahana AZY ankehitriny, ka hanorina alitara mba hanolorana sorona dorana manontolo na fanatitra hohanina na sorona hafa. Eo amin’ny alitaran’ny TOMPO Andriamanitray, dia ilay alitara manoloana ny fonena-masiny ihany, no hanoloranay ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Rehefa ren’i Pinehasa mpisorona sy ireo loholom-piangonana (izany hoe ireo Israelita mpifehy arivo tafaraka taminy) ny teny izay nambaran’ny Reobenita sy Gadita ary Manasita, dia nahafa-po azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Koa hoy i Pinehasa, zanakalahin’i Elehazara mpisorona, tamin’izy telo tonta:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ankehitriny dia fantatray fa eto afovoantsika ny TOMPO satria tsy nahavita izany fahadisoana izany taminy ianareo. Koa dia efa nanafaka ny Israelita tsy hiharan’ny famaizan’ny TOMPO ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Taorian’izany, dia nandao ny Reobenita sy Gadîta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Reobenita sy Gadîta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny TM izany fa ny dkt grika Septoazinta manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Reobenita sy Gadita ary antsasa-pokon’i Manase
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (toy izany koa ny and 33 sy 34).'
    marker-yv: yv-n
  - type: text
    text: ' tao Gilehada i Pinehasa zanakalahin’i Elehazara mpisorona sy ireo loholona ka niverina ho any amin’ny Israelita hafa tany Kanahàna ary nanao tatitra taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nahafa-po ny Israelita izany sady nisaorany an’Andriamanitra. Tsy noheveriny intsony ny handeha hiady amin’ny Reobenita sy Gadîta ka handrava ny tany izay nonenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy kosa ny Reobenita sy Gadîta hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ity alitara ity no vavolombelona aminay sy aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'aminay sy aminareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe aminay Israelita atsinanan’i Jôrdàna sy aminareo Israelita andrefan’i Jôrdàna.
    marker-yv: yv-n
  - type: text
    text: ' fa ny TOMPO no Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nataony hoe «Vavolombelona» no anaran’izany alitara izany.
