  - type: text
    text: Araka ny firazanany, dia ireto avy ny loham-pianakaviana niaraka tamiko niala tany Babilôna ka niverina an-tanindrazana, tamin’ny andro nanjakan’ny amperôra Artakserksesa
  - type: usfm
