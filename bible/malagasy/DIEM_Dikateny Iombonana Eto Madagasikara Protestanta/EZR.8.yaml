document_id: EZR.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo mpiara-dia amin’i Hezrà
  - type: text
    content: Araka ny firazanany, dia ireto avy ny loham-pianakaviana niaraka tamiko niala tany Babilôna ka niverina an-tanindrazana, tamin’ny andro nanjakan’ny amperôra Artakserksesa
  - type: note
    content: Jereo 7.1 sy nta.
  - type: text
    content: ':'
  '10':
  - type: text
    content: i Selômita, zanakalahin’i Jôsifià, mbamin’ireo namany 160 lahy, samy avy amin’ny terak’i Banỳ
  - type: note
    content: 'Banỳ: araka ny dkt grika Septoazinta; tsy hita ao amin’ny rijan-teny hebreo io anaran’olona io.'
  - type: text
    content: ;
  '11':
  - type: text
    content: i Zakarià, zanakalahin’i Bebay, mbamin’ireo namany 28 lahy, samy avy amin’ny terak’i Bebay;
  '12':
  - type: text
    content: i Jôhanàna, zanakalahin’i Hakatàna, mbamin’ireo namany 110 lahy, samy avy amin’ny terak’i Hazgada;
  '13':
  - type: text
    content: i Elifelety sy i Jehiela ary i Semahià, izy telo lahy tanora indrindra, mbamin’ireo namany 60 lahy, samy avy amin’ny terak’i Adônikama;
  '14':
  - type: text
    content: i Hotahy sy i Zaboda
  - type: note
    content: 'Zaboda: misy ny dkt Septoazinta sy Siriaka ary Volgata manao hoe: Zakora.'
  - type: text
    content: ', mbamin’ireo namany 70 lahy, samy avy amin’ny terak’i Bigvay.'
  - type: heading
    content: Fanomanana ny dia hiverina any Jerosalema
  '15':
  - type: text
    content: Nangoniko teo amoron’ilay lakan-drano mankany Ahavà
  - type: note
    content: 'Ahavà: anaran-tanàna anankiray tsy fantatra tsara ny nisy azy tao Babilônia; io tanàna io no namindra anarana amin’ilay lakan-drano fanondraham-boly, jereo and 21.'
  - type: text
    content: ' ireo loham-pianakaviana rehetra ireo, ka nilasy teo nandritra ny telo andro izahay. Nony nandinika ny olona aho, dia nahita fa sarambabem-bahoaka sy '
  - type: text
    content: mpisorona
  - type: text
    content: ' ry zareo fa tsy nisy '
  - type: text
    content: levita
  - type: text
    content: ' na dia iray akory aza. '
  '16':
  - type: text
    content: 'Ka dia nirahiko ry i Elihezera sy i Ariela, i Semahià, i Elnatàna, i Jariba sy i Elnatàna, i Natàna sy i Zakarià ary i Mesolama izay samy loham-pianakaviana, mbamin’i Jôiariba sy i Elnatàna izay samy mpivaofy lalàna; '
  '17':
  - type: text
    content: nampitondraiko hafatra ho an’i Hidao loholona any Kasifià izy 11 lahy; ka nambarako azy izay teny holazaina amin’i Hidao sy ireo namany mpanampy ny Levita izay monina any Kasifià
  - type: note
    content: 'Kasifià: tanàna tsy fantatra kanefa toa maro ny levita no niorim-ponenana tao. –i Hidao sy ireo namany: araka ny dkt grika Septoazinta fa misy tsy mazava ny rijan-teny hebreo.'
  - type: text
    content: . Ny kendrena dia ny hitondran’izy 11 lahy atỳ aminay ireo olona ho mpandraharaha ao an-
  - type: text
    content: tranon’Andriamanitray
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Noho ny fiarovan’Andriamanitray, dia ireto avy ny olona azon’izy 11 lahy nentina ho atỳ aminay: i Serebià, olon-kendry anisan’ny tarik’i Mahely sady taranak’i Levỳ zanakalahin’i Jakôba, mbamin’ireo zanany sy mpiray tampo aminy, izany hoe lehilahy 18; '
  '19':
  - type: text
    content: 'i Hasabià sy i Jesahià, anisan’ny tarik’i Merarỳ, mbamin’ireo mpiray tampo aminy sy ny zanak’izy roa lahy, izany hoe lehilahy 20. '
  '2':
  - type: text
    content: I Geresôna, avy amin’ny terak’i Pinehasa;
  - type: text
    content: i Daniela, avy amin’ny terak’i Itamara;
  - type: text
    content: i Hatosy, avy amin’ny terak’i Davida;
  '20':
  - type: text
    content: Nentin’ireto iraka koa ny lehilahy 220 notsongaina tamin’ireo mpanampy ny levita, dia ilay sokajin’olona notendren’i Davida sy ny loholona mba hanompo ny levita. Samy notononina anarana avokoa ireo lehilahy ireo.
  '21':
  - type: text
    content: 'Teo amoron’io lakan-dranon’i Ahavà io, dia nanainga anay rehetra hanao '
  - type: text
    content: fifadian-kanina
  - type: text
    content: ' aho mba hietrenay tena eo anatrehan’Andriamanitray sy hangatahanay Azy hahatsara dia anay sy ny vady aman-janakay ombàn’ny fanananay rehetra. '
  '22':
  - type: text
    content: 'Fa nahamenatra ahy ny hangataka miaramila sy mpitaingin-tsoavaly amin’ny amperôra mba hiaro anay amin’ny fahavalonay eny an-dalana; fa efa nilaza taminy manko izahay hoe: «Momba izay rehetra mitady Azy ny fiarovan’Andriamanitray, fa ny fahatezerany kosa hamely mafy izay rehetra mahafoy Azy». '
  '23':
  - type: text
    content: Izany no nifadianay hanina sy nangatahanay ny hiarovan’Andriamanitra anay; ary nohenoiny vavaka izahay.
  '24':
  - type: text
    content: Avy eo dia nifidy 12 lahy tamin’ireo lohandoha-mpisorona aho ary koa
  - type: note
    content: ary koa tsy hita ao amin’ny rijan-teny hebreo io mpanompo io kanefa takîn’ny konteksta izany (satria i Serebià sy i Hasabia dia levita araka ny and 18-19).
  - type: text
    content: ' nifidy an’i Serebià sy i Hasabià mbamin’ny levita folo lahy namany. '
  '25':
  - type: text
    content: 'Nolanjaiko teo anatrehan’izy 24 lahy ny volafotsy sy volamena ary fanaka horaisiny, dia ny zavatra natokana ho an’ny tranon’Andriamanitray ka naterin’ny amperôra sy ny mpanolotsainy sy ny manampahefana ary ny Israelita rehetra vory teo. '
  '26':
  - type: text
    content: Eny, nolanjaiko hatolotra an’ireo mpisorona sy levita ireo ny volafotsy roa alina kilao
  - type: note
    content: volafotsy roa alina kilao rijan-teny hebreo manjavozavo ary dkt tsy azo antoka.
  - type: text
    content: ', '
  '27':
  - type: text
    content: ny koveta volamena roapolo milanja valo kilao, ary ny fanaka varahina anankiroa sarobidy toy ny fanaka volamena satria vita varahina manganohano
  - type: note
    content: manganohano tsy azo antoka ny hevitry ny voambolana hebreo.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Ka hoy aho tamin’ireo mpisorona sy levita ireo:'
  - type: text
    content: '–Tahaka ny maha voatokana anareo ho an’ny TOMPO no maha voatokana an’ireto fanaka ireto ho Azy koa; ny volafotsy sy volamena dia fanomezana an-tsitrapo ho an’ny TOMPO, Ilay Andriamanitry ny razanareo. '
  '29':
  - type: text
    content: Koa tandremo tsara ireo mandra-pahatonga any Jerosalema, ary lanjao eo anatrehan’ny lohandohany amin’ny mpisorona sy levita ary eo anatrehan’ny loham-pianakaviana, ao amin’ny efitrano fanaovana izany ao an-tranon’ny TOMPO.
  '3':
  - type: text
    content: lehilahy iray anisan’ny zanak’i Sekanià;
  - type: text
    content: i Zakarià mbamin’ireo namany 150 lahy samy avy amin’ny terak’i Parehôsy;
  '30':
  - type: text
    content: Dia noraisin’ireo mpisorona sy levita ireo izany volafotsy sy volamena ary fanaka voalanja izany mba hoentiny any Jerosalema, ho ao an-tranon’Andriamanitray.
  - type: heading
    content: Ny dia mankany Jerosalema sy ny fahatongavana
  '31':
  - type: text
    content: 'Tamin’ny andro faha-13, volana voalohany, no nialanay teo amin’ny lakan-dranon’i Ahavà mba hankany Jerosalema; ary nombàn’ny fiarovan’Andriamanitra izahay teny an-dalana ka novonjeny tamin’ny famelezan’ny fahavalo sy mpanotrika. '
  '32':
  - type: text
    content: 'Nony tonga tany Jerosalema izahay, dia niala sasatra telo andro. '
  '33':
  - type: text
    content: 'Tamin’ny andro fahefatra no nandanjana ny volafotsy sy volamena ary fanaka, alohan’ny hanolorana azy an’i Meromôta '
  - type: text
    content: mpisorona
  - type: text
    content: ', zanakalahin’i Orià, izay nampian’i Elehazara, zanakalahin’i Pinehasa, ary koa ny '
  - type: text
    content: levita
  - type: text
    content: ' anankiroa, dia i Jôzabada zanakalahin’i Jesoa, sy i Nôhadià zanakalahin’i Binoy. '
  '34':
  - type: text
    content: Voaisa sy voalanja avokoa ny zavatra rehetra, ka natao an-tsoratra androtr’izay ihany ny tontaliny.
  '35':
  - type: text
    content: 'Izay rehetra niverina avy any an-tsesitany dia nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’Ilay Andriamanitr’i Israely. Ka tamin’ny anaran’i Israely tsivakivolo no nanolorany ombilahy 12 sy ondrilahy 96 ary zanakondry 77 ho sorona dorana manontolo, sady nanolorany osilahy 12 ho sorona fanalana ny ota: natao sorona nolevonina manontolo ho an’ny TOMPO izany rehetra izany. '
  '36':
  - type: text
    content: Avy eo dia natolotray an’ireo solotenan’ny andriamanjaka sy ireo governoran’ny
  - type: note
    content: Ny solotenan’ny amperôra dia filoham-paritany eto amin’ny fanjakana; ny governora, izay filoham-paritra kely kokoa, dia teo ambany fifehezan’ireo solotenan’ny amperôra.
  - type: text
    content: ' faritra atỳ andafy andrefan’ny ony Eofrata ny didin’i Artakserksesa; ka nampian-dry zareo ny vahoaka israelita sy ny tranon’Andriamanitra.'
  '4':
  - type: text
    content: i Eliôhenay mbamin’ireo namany roanjato lahy, samy avy amin’ny terak’i Zerahià;
  '5':
  - type: text
    content: i Sekanià, zanakalahin’i Jahaziela, mbamin’ireo namany telonjato lahy, samy avy amin’ny terak’i Zatò
  - type: note
    content: 'Zatò: araka ny dkt grika Septoazinta; tsy hita ao amin’ny rijan-teny hebreo io anaran’olona io.'
  - type: text
    content: ;
  '6':
  - type: text
    content: i Hebeda, zanakalahin’i Jônatàna, mbamin’ireo namany dimampolo lahy, samy avy amin’ny terak’i Hadîna;
  '7':
  - type: text
    content: i Jesahià, zanakalahin’i Hatalià, mbamin’ireo namany fitopolo lahy, samy avy amin’ny terak’i Helama;
  '8':
  - type: text
    content: i Zebadià, zanakalahin’i Mikaela, mbamin’ireo namany valopolo lahy samy avy amin’ny terak’i Sefatià;
  '9':
  - type: text
    content: i Hôbadià, zanakalahin’i Jehiela, mbamin’ireo namany 218 lahy, samy avy amin’ny terak’i Jôaba;
