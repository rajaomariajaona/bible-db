      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: i Hotahy sy i Zaboda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zaboda: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy ny dkt Septoazinta sy Siriaka ary Volgata manao hoe: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zakora.
    marker-yv: yv-n
  - type: text
    text: ', mbamin’ireo namany 70 lahy, samy avy amin’ny terak’i Bigvay.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanomanana ny dia hiverina any Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nangoniko teo amoron’ilay lakan-drano mankany Ahavà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ahavà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'anaran-tanàna anankiray tsy fantatra tsara ny nisy azy tao Babilônia; io tanàna io no namindra anarana amin’ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lakan-drano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fanondraham-boly, jereo and 21.'
    marker-yv: yv-n
  - type: text
    text: ' ireo loham-pianakaviana rehetra ireo, ka nilasy teo nandritra ny telo andro izahay. Nony nandinika ny olona aho, dia nahita fa sarambabem-bahoaka sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' ry zareo fa tsy nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ka dia nirahiko ry i Elihezera sy i Ariela, i Semahià, i Elnatàna, i Jariba sy i Elnatàna, i Natàna sy i Zakarià ary i Mesolama izay samy loham-pianakaviana, mbamin’i Jôiariba sy i Elnatàna izay samy mpivaofy lalàna; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: nampitondraiko hafatra ho an’i Hidao loholona any Kasifià izy 11 lahy; ka nambarako azy izay teny holazaina amin’i Hidao sy ireo namany mpanampy ny Levita izay monina any Kasifià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kasifià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tsy fantatra kanefa toa maro ny levita no niorim-ponenana tao. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: i Hidao sy ireo namany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': araka ny dkt grika Septoazinta fa misy tsy mazava ny rijan-teny hebreo.'
    marker-yv: yv-n
  - type: text
    text: . Ny kendrena dia ny hitondran’izy 11 lahy atỳ aminay ireo olona ho mpandraharaha ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitray
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noho ny fiarovan’Andriamanitray, dia ireto avy ny olona azon’izy 11 lahy nentina ho atỳ aminay: i Serebià, olon-kendry anisan’ny tarik’i Mahely sady taranak’i Levỳ zanakalahin’i Jakôba, mbamin’ireo zanany sy mpiray tampo aminy, izany hoe lehilahy 18; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'i Hasabià sy i Jesahià, anisan’ny tarik’i Merarỳ, mbamin’ireo mpiray tampo aminy sy ny zanak’izy roa lahy, izany hoe lehilahy 20. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nentin’ireto iraka koa ny lehilahy 220 notsongaina tamin’ireo mpanampy ny levita, dia ilay sokajin’olona notendren’i Davida sy ny loholona mba hanompo ny levita. Samy notononina anarana avokoa ireo lehilahy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Teo amoron’io lakan-dranon’i Ahavà io, dia nanainga anay rehetra hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fifadian-kanina
  - type: text
    text: ' aho mba hietrenay tena eo anatrehan’Andriamanitray sy hangatahanay Azy hahatsara dia anay sy ny vady aman-janakay ombàn’ny fanananay rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa nahamenatra ahy ny hangataka miaramila sy mpitaingin-tsoavaly amin’ny amperôra mba hiaro anay amin’ny fahavalonay eny an-dalana; fa efa nilaza taminy manko izahay hoe: «Momba izay rehetra mitady Azy ny fiarovan’Andriamanitray, fa ny fahatezerany kosa hamely mafy izay rehetra mahafoy Azy». '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izany no nifadianay hanina sy nangatahanay ny hiarovan’Andriamanitra anay; ary nohenoiny vavaka izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Avy eo dia nifidy 12 lahy tamin’ireo lohandoha-mpisorona aho ary koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary koa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tsy hita ao amin’ny rijan-teny hebreo io mpanompo io kanefa takîn’ny konteksta izany (satria i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Serebià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hasabia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia levita araka ny and 18-19).'
    marker-yv: yv-n
  - type: text
    text: ' nifidy an’i Serebià sy i Hasabià mbamin’ny levita folo lahy namany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nolanjaiko teo anatrehan’izy 24 lahy ny volafotsy sy volamena ary fanaka horaisiny, dia ny zavatra natokana ho an’ny tranon’Andriamanitray ka naterin’ny amperôra sy ny mpanolotsainy sy ny manampahefana ary ny Israelita rehetra vory teo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Eny, nolanjaiko hatolotra an’ireo mpisorona sy levita ireo ny volafotsy roa alina kilao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'volafotsy roa alina kilao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rijan-teny hebreo manjavozavo ary dkt tsy azo antoka.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ny koveta volamena roapolo milanja valo kilao, ary ny fanaka varahina anankiroa sarobidy toy ny fanaka volamena satria vita varahina manganohano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'manganohano '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy azo antoka ny hevitry ny voambolana hebreo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ka hoy aho tamin’ireo mpisorona sy levita ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tahaka ny maha voatokana anareo ho an’ny TOMPO no maha voatokana an’ireto fanaka ireto ho Azy koa; ny volafotsy sy volamena dia fanomezana an-tsitrapo ho an’ny TOMPO, Ilay Andriamanitry ny razanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Koa tandremo tsara ireo mandra-pahatonga any Jerosalema, ary lanjao eo anatrehan’ny lohandohany amin’ny mpisorona sy levita ary eo anatrehan’ny loham-pianakaviana, ao amin’ny efitrano fanaovana izany ao an-tranon’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia noraisin’ireo mpisorona sy levita ireo izany volafotsy sy volamena ary fanaka voalanja izany mba hoentiny any Jerosalema, ho ao an-tranon’Andriamanitray.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny dia mankany Jerosalema sy ny fahatongavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin’ny andro faha-13, volana voalohany, no nialanay teo amin’ny lakan-dranon’i Ahavà mba hankany Jerosalema; ary nombàn’ny fiarovan’Andriamanitra izahay teny an-dalana ka novonjeny tamin’ny famelezan’ny fahavalo sy mpanotrika. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nony tonga tany Jerosalema izahay, dia niala sasatra telo andro. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin’ny andro fahefatra no nandanjana ny volafotsy sy volamena ary fanaka, alohan’ny hanolorana azy an’i Meromôta '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ', zanakalahin’i Orià, izay nampian’i Elehazara, zanakalahin’i Pinehasa, ary koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' anankiroa, dia i Jôzabada zanakalahin’i Jesoa, sy i Nôhadià zanakalahin’i Binoy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Voaisa sy voalanja avokoa ny zavatra rehetra, ka natao an-tsoratra androtr’izay ihany ny tontaliny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izay rehetra niverina avy any an-tsesitany dia nanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ho an’Ilay Andriamanitr’i Israely. Ka tamin’ny anaran’i Israely tsivakivolo no nanolorany ombilahy 12 sy ondrilahy 96 ary zanakondry 77 ho sorona dorana manontolo, sady nanolorany osilahy 12 ho sorona fanalana ny ota: natao sorona nolevonina manontolo ho an’ny TOMPO izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Avy eo dia natolotray an’ireo solotenan’ny andriamanjaka sy ireo governoran’ny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.36 '
