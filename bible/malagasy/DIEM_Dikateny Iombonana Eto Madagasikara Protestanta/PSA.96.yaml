document_id: PSA.96,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Hira vaovao ho an’ny Tompo Izay avy hanjaka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 16.23-33)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà hira vao ho an’ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà ho AZY, ry mponin’ny tany tontolo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lazao amin’ny olona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny TOMPO no mpanjaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaorina mafy izao rehetra izao ka tsy hihontsona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hofehezin’ny Tompo araka ny hitsiny ny vahoaka.»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hifaly ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiravoravo ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hirohondrohona ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’izay rehetra ao anatiny,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hibita-kafaliana ny saha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’izay rehetra ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ny hazo rehetra any an’ala hihoby
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mba hitsena ny TOMPO satria tamy Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, tamy Izy mba hifehy ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hifehy ny tontolo araka ny rariny Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hifehy ny firenena araka ny hitsiny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà ho an’ny TOMPO, misaora ny anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: torio isan’andro isan’andro ny namonjeny antsika.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ambarao amin’ireo firenena ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahiny
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lazao amin’ny vahoaka rehetra ny zava-mahagaga nataony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lehibe ny TOMPO ka mendrika hoderaina fatratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahatahotra mihoatra noho ny andriamanitra rehetra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsinontsinona avokoa ireo andriamanitry ny firenen-kafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO kosa no nanao ny lanitra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahalehibeazana sy famirapiratana no manodidina Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hery sy fiandrianana no mameno ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasiny
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo fianakaviamben’ny firenen-drehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tolory haja ny TOMPO fa be voninahitra sy hery.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tolory haja ny TOMPO satria be voninahitra Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondrà fanatitra ka midira eo an-kianjan’ny tempoly;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miankohofa eo anatrehan’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa miseho ny fahamasinany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '96.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 8-9: jereo Sal 29.1-2 sy nta.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangovita eo anoloany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponin’ny tany tontolo.
