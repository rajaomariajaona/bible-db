document_id: PSA.96,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Hira vaovao ho an’ny Tompo Izay avy hanjaka
  - type: heading
    content: (Jereo 1 Tan 16.23-33)
  - type: text
    content: Mihirà hira vao ho an’ny TOMPO.
  - type: text
    content: Mihirà ho AZY, ry mponin’ny tany tontolo.
  '10':
  - type: text
    content: 'Lazao amin’ny olona hoe:'
  - type: text
    content: «Ny TOMPO no mpanjaka!
  - type: text
    content: Voaorina mafy izao rehetra izao ka tsy hihontsona;
  - type: text
    content: hofehezin’ny Tompo araka ny hitsiny ny vahoaka.»
  '11':
  - type: text
    content: Aoka hifaly ny lanitra
  - type: text
    content: ary hiravoravo ny tany,
  - type: text
    content: aoka hirohondrohona ny ranomasina
  - type: text
    content: mbamin’izay rehetra ao anatiny,
  '12':
  - type: text
    content: aoka hibita-kafaliana ny saha
  - type: text
    content: mbamin’izay rehetra ao aminy,
  - type: text
    content: aoka ny hazo rehetra any an’ala hihoby
  '13':
  - type: text
    content: 'mba hitsena ny TOMPO satria tamy Izy:'
  - type: text
    content: eny, tamy Izy mba hifehy ny tany;
  - type: text
    content: dia hifehy ny tontolo araka ny rariny Izy
  - type: text
    content: ary hifehy ny firenena araka ny hitsiny.
  '2':
  - type: text
    content: Mihirà ho an’ny TOMPO, misaora ny anarany;
  - type: text
    content: torio isan’andro isan’andro ny namonjeny antsika.
  '3':
  - type: text
    content: 'Ambarao amin’ireo firenena ny '
  - type: text
    content: voninahiny
  - type: text
    content: ','
  - type: text
    content: lazao amin’ny vahoaka rehetra ny zava-mahagaga nataony.
  '4':
  - type: text
    content: Fa lehibe ny TOMPO ka mendrika hoderaina fatratra
  - type: text
    content: sady mahatahotra mihoatra noho ny andriamanitra rehetra.
  '5':
  - type: text
    content: Tsinontsinona avokoa ireo andriamanitry ny firenen-kafa,
  - type: text
    content: fa ny TOMPO kosa no nanao ny lanitra.
  '6':
  - type: text
    content: Fahalehibeazana sy famirapiratana no manodidina Azy
  - type: text
    content: 'ary hery sy fiandrianana no mameno ny '
  - type: text
    content: Toeramasiny
  - type: text
    content: .
  '7':
  - type: text
    content: Ianareo fianakaviamben’ny firenen-drehetra,
  - type: text
    content: tolory haja ny TOMPO fa be voninahitra sy hery.
  '8':
  - type: text
    content: Tolory haja ny TOMPO satria be voninahitra Izy.
  - type: text
    content: Mitondrà fanatitra ka midira eo an-kianjan’ny tempoly;
  '9':
  - type: text
    content: dia miankohofa eo anatrehan’ny TOMPO,
  - type: text
    content: rehefa miseho ny fahamasinany
  - type: note
    content: 'And 8-9: jereo Sal 29.1-2 sy nta.'
  - type: text
    content: .
  - type: text
    content: Mangovita eo anoloany,
  - type: text
    content: ry mponin’ny tany tontolo.
