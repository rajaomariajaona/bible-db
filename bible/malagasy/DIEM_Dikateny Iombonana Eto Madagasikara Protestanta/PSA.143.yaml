document_id: PSA.143,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Tompo ô, aza antsoina hotsaraina aho
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, mba henoy vavaka aho,
  - type: text
    content: anongilano sofina ny fifònako.
  - type: text
    content: Araka ny toetranao mahatoky
  - type: text
    content: sy araka ny fiantrànao no amalio ahy.
  '10':
  - type: text
    content: Ampianaro aho hanao ny sitrakao,
  - type: text
    content: satria Andriamanitro Ianao.
  - type: text
    content: Enga anie ny Fanahinao tsara
  - type: text
    content: hitarika ahy amin’ny tany marina!
  '11':
  - type: text
    content: Araka ny maha TOMPO Anao,
  - type: text
    content: dia velomy indray aho;
  - type: text
    content: noho ny fahamarinanao,
  - type: text
    content: dia esory amin’ny fahoriana aho.
  '12':
  - type: text
    content: Noho ny fitiavanao ahy,
  - type: text
    content: dia fongory ny fahavaloko
  - type: text
    content: ka aringano avokoa ny mpandrafy ahy,
  - type: text
    content: satria mpanomponao aho.
  '2':
  - type: text
    content: Mpanomponao aho ka aza antsoina hotsaraina,
  - type: text
    content: fa tsy misy olombelona ho marina eo anatrehanao
  - type: note
    content: Jereo Rm 3.20; Gal 2.16.
  - type: text
    content: .
  '3':
  - type: text
    content: Nenjehim-pahavalo tokoa aho;
  - type: text
    content: nohoseny an-tany ny aiko.
  - type: text
    content: Nampitoeriny tamin’ny haizina aho
  - type: text
    content: mova tsy ny maty fahagola.
  '4':
  - type: text
    content: Koa reraka ato anatiko aho;
  - type: text
    content: fadiranovana ny foko ato amiko.
  '5':
  - type: text
    content: Tsaroako izany andro fahiny;
  - type: text
    content: sainiko avokoa ny nataonao,
  - type: text
    content: eritreretiko ny asa vitanao.
  '6':
  - type: text
    content: Mivavaka manandra-tanana aminao aho
  - type: note
    content: Ampit Sal 28.2 sy nta.
  - type: text
    content: ;
  - type: text
    content: ny fanahiko eo anatrehanao
  - type: text
    content: dia tahaka ny tany mangentana.
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: Valio faingana aho, TOMPO ô,
  - type: text
    content: fa efa ambivitra ny aiko.
  - type: text
    content: Aza manafin-tava amiko Ianao,
  - type: text
    content: ndrao ho tahaka izay midina any am-pasana aho.
  '8':
  - type: text
    content: Ataovy tsapako isa-maraina ny fitiavanao,
  - type: text
    content: satria Ianao no itokiako;
  - type: text
    content: ampahafantaro ahy ny lalan-kizorako,
  - type: text
    content: satria Ianao no ifantohako.
  '9':
  - type: text
    content: TOMPO ô, afaho amin’ny fahavalo aho
  - type: text
    content: fa ao aminao no iereko.
