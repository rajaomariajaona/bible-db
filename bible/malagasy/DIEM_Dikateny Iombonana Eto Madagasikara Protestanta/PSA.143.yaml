document_id: PSA.143,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Tompo ô, aza antsoina hotsaraina aho
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, mba henoy vavaka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anongilano sofina ny fifònako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny toetranao mahatoky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy araka ny fiantrànao no amalio ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ampianaro aho hanao ny sitrakao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Andriamanitro Ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ny Fanahinao tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitarika ahy amin’ny tany marina!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Araka ny maha TOMPO Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia velomy indray aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fahamarinanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia esory amin’ny fahoriana aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Noho ny fitiavanao ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fongory ny fahavaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aringano avokoa ny mpandrafy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mpanomponao aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mpanomponao aho ka aza antsoina hotsaraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy olombelona ho marina eo anatrehanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '143.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 3.20; Gal 2.16.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nenjehim-pahavalo tokoa aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nohoseny an-tany ny aiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampitoeriny tamin’ny haizina aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mova tsy ny maty fahagola.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Koa reraka ato anatiko aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fadiranovana ny foko ato amiko.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsaroako izany andro fahiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sainiko avokoa ny nataonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eritreretiko ny asa vitanao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mivavaka manandra-tanana aminao aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '143.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 28.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanahiko eo anatrehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka ny tany mangentana.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Valio faingana aho, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa ambivitra ny aiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manafin-tava amiko Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ndrao ho tahaka izay midina any am-pasana aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ataovy tsapako isa-maraina ny fitiavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao no itokiako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampahafantaro ahy ny lalan-kizorako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao no ifantohako.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: TOMPO ô, afaho amin’ny fahavalo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ao aminao no iereko.
