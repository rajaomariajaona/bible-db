    children:
    - type: text
      text: '31'
  - type: text
    text: Feno 23 taona i Jôahaza fony tonga mpanjaka, ary telo volana ihany no nanjakany tao Jerosalema. Ny anaran-dreniny dia Hamotala zanakavavin’i Jeremià avy any Libnà
  - type: usfm
