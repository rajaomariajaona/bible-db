document_id: 2KI.23,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nandefa iraka ny mpanjaka hanainga tsy an-kanavaka ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Joda sy i Jerosalema mba ho vory ao aminy. '
  '10':
  - type: text
    content: Nozimbain’i Jôsià koa ny Tôfeta tao amin’ny lohasahan’i Bena-Hinôma mba tsy handoran’ny olona intsony ny zanany lahy na vavy ho sorona ho an’i Môlôka
  - type: note
    content: 'Tôfeta: jereo Jer 7.31; 19.1-6. –ny lohasahan’i Bena-Hinôma dia ao atsimon’i Jerosalema. – Momba ny andriamanitra Môlôka, jereo Lev 18.21 sy nta.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Nesoriny ireo sarivongan-tsoavaly izay natokan’ny mpanjakan’i Joda ho an’ny fivavahana amin’ny masoandro; ireo soavaly ireo dia teo akaikin’ny fidirana mankao an-tranon’ny TOMPO tao amin’ny trano fanampiny anilan’ny efitr’i Natàna-Melèka mpiandraikitra. Nodoran’i Jôsià ny kalesin’ny masoandro. '
  '12':
  - type: text
    content: Noravan’ny mpanjaka ireo alitara natsangan’ny mpanjakan’i Joda teo an-tampon-tranon’i Ahaza ary koa ireo alitara natsangan’i Manase tao amin’ny kianja roan’ny tranon’ny TOMPO, ka nampamotehiny
  - type: note
    content: 'ireo alitara natsangan’ny... natsangan’i Manase: jereo 21.4-5.'
  - type: text
    content: ' ary nasainy nafafy eran’ny lohasahan’i Kidrôna ny vovoka taminy. '
  '13':
  - type: text
    content: Nozimbain’ny mpanjaka ihany koa ireo toeram-panasinana tandrifin’i Jerosalema izay naorin’i Salômôna mpanjakan’i Israely teo amin’ny ilany atsimon’ny tendrombohitra Analanôliva
  - type: note
    content: Jereo 1 Mp 11.7. –ny tendrombohitra Analanôliva dia ao atsinanan’i Jerosalema, eny andafin’i Kidrôna. Dkt hafa tendrombohitry ny fahaverezana (amin’ny teny hebreo dia misy kilalaon-teny amin’ny hoe tendrombohitra Analanôliva sy ny hoe tendrombohitry ny fahaverezana).
  - type: text
    content: 'ho an’i '
  - type: text
    content: Hastôreta
  - type: text
    content: ' sampin-dozan’ny Tsidônianina sy ho an’i Kemôsy sampin-dozan’ny Môabita ary ho an’i Milkôma sampin-dozan’ny Hamônita. '
  '14':
  - type: text
    content: Nomontsaniny ny tsangambaton-tsampy sady nokapainy ny tsatokazo fanajana an’i Aserà ka nofenoiny taolam-patin’olona ny toerany
  - type: note
    content: Ny toerany izay voazimbazimban’ny taolam-patin’olona dia very hasina; ampit ny and 16 sy 20.
  - type: text
    content: .
  - type: heading
    content: Fanitsiam-pivavahana tany Israely avaratra
  - type: heading
    content: (Jereo 2 Tan 34.6-7)
  '15':
  - type: text
    content: Noravan’i Jôsià ihany koa ny alitara tao Betela
  - type: note
    content: Momba io toeram-panasinana io, jereo 1 Mp 12.26–13.10.
  - type: text
    content: ', izay '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' nataon’i Jerôbohama zanakalahin’i Nebata mba hitarihana an’i '
  - type: text
    content: Israely
  - type: text
    content: ' hanota; eny, noravan’i Jôsià io '
  - type: text
    content: alitara
  - type: text
    content: ' io sy ilay toeram-panasinana ka nodorany sy notorotoroiny ho vovoka; ary nodorany koa ny tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: .
  '16':
  - type: text
    content: 'Dia niherika i Jôsià ka nahita ireo fasana terỳ an-tendrombohitra, ary naniraka olona izy haka ny taolana tao am-pasana hodorana eo amin’ny alitara mba hanazimbana azy araka ny tenin’ny TOMPO nambaran’ilay '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ' fony i Jerôbohama nitsangana teo anoloan’ny alitara nandritra ny fety. Niherika indray i Jôsià tamin’izay ka nahita ny fasan’io olon’Andriamanitra io'
  '17':
  - type: text
    content: 'ary nanontany hoe:'
  - type: text
    content: –Inona irỳ tsangambato hitako irỳ?
  - type: text
    content: 'Dia novalian’ny mponina tao an-tanàna hoe:'
  - type: text
    content: –Io no fasan’ilay olon’Andriamanitra avy any Joda, dia ilay nanambara izao nataonao tamin’ny alitaran’i Betela izao.
  '18':
  - type: text
    content: 'Ka hoy i Jôsià hoe:'
  - type: text
    content: –Avelao io fasana io! Ary aoka tsy hisy hanetsika ny taolambalony!
  - type: text
    content: Izany no tsy nikitihana ny taolambalony sy ny an’ilay mpaminany avy any Samaria
  - type: note
    content: Momba ny fasana sy ny mpaminany roa lahy, jereo 1 Mp 13.29-31.
  - type: text
    content: .
  '19':
  - type: text
    content: 'Nampahatezitra ny TOMPO ny nanaovan’ny mpanjakan’i Israely trano fivavahana teny amin’ny toeram-panasinan’ireo tanànan’i Samaria; ka dia noravan’i Jôsià koa ireny tahaka izay efa nataony tany Betela. '
  '2':
  - type: text
    content: Dia niaraka nankao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' ireo mbamin’ny mponina rehetra tao Jerosalema sy Joda, izany hoe ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' ary ny sarambabem-bahoaka rehetra na kely na lehibe. Novakin’ny mpanjaka teo anatrehan’ny besinimaro ny teny rehetra tao anatin’ny bokin’ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ', dia ilay boky izay hita tao an-tranon’ny TOMPO. '
  '20':
  - type: text
    content: Ary novonoiny ho faty teo ambonin’ny alitara avokoa ny mpisorona izay teo amin’ireny toeram-panasinana ireny sady nandoroany taolam-patin’olona hanazimbana azy.
  - type: text
    content: Avy teo i Jôsià dia niverina tany Jerosalema.
  - type: heading
    content: Nankalaza ny Paska ny vahoakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 35.18-19)
  '21':
  - type: text
    content: 'Nomen’ny mpanjaka baiko ny vahoaka rehetra mba hankalaza ny fetin’ny '
  - type: text
    content: Paska
  - type: text
    content: ' ho voninahitry ny TOMPO Andriamaniny, araka ny voasoratra amin’ity bokin’ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' ity'
  - type: note
    content: 'araka...fanekempihavanana ity: jereo 23.2-3; Deot 16.1-8.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Fa tsy nisy Paska nankalazaina toy izany hatramin’ny andro nanapahan’ny mpitsara an’i '
  - type: text
    content: Israely
  - type: text
    content: ' na tamin’ny andro rehetra nitondran’ny mpanjakan’i Israely sy ny mpanjakan’i Joda. '
  '23':
  - type: text
    content: Fa tamin’ny taona faha-18 nanjakan’i Jôsià no nankalazana izany Paska izany tany Jerosalema ho voninahitry ny TOMPO.
  - type: heading
    content: Fehinteny momba ny andro nanjakan’i Jôsià
  - type: heading
    content: (Jereo 2 Tan 35.20-27; 36.1)
  '24':
  - type: text
    content: 'Ho fanatanterahana ny tenin’ny lalàna voasoratra ao amin’ilay boky hitan’i Hilkià '
  - type: text
    content: mpisorona
  - type: text
    content: ' tao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ', dia nofoanan’i Jôsià tamin’ny tanin’i Joda sy tao Jerosalema ireo olona mpanontany ny fanahin’ny maty sy mpamoha angatra, ary nopotehiny ny sarivongan-tsampy sy ny zava-maharikoriko rehetra momba azy.'
  '25':
  - type: text
    content: Ho fehin’izany, talohan’i Jôsià dia tsy nisy mpanjaka tahaka azy izay ny TOMPO no nifikirany tamin’ny fony manontolo sy ny fanahiny manontolo ary ny heriny manontolo, araka ny Lalàn’i Mosesy manontolo. Ary tsy nisy tahaka azy intsony koa tatỳ aoriany.
  '26':
  - type: text
    content: 'Kanefa tsy nitony ny firehetam-pahaviniran’ny TOMPO tamin’ny fanjakan’i Joda satria zavatra isan-karazany no nampahatezeran’i Manase mpanjaka Azy. '
  '27':
  - type: text
    content: 'Izany no nilazan’ny TOMPO hoe:'
  - type: text
    content: '–Hoesoriko tsy ho eo anatrehako tahaka ny nanesorako an’i '
  - type: text
    content: Israely
  - type: text
    content: ' koa i Joda, ary hailiko ity tanànan’i Jerosalema nofidiko ity sy ny trano izay nolazaiko fa hipetrahan’ny voninahitro.'
  '28':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôsià ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Tamin’ny andro nanjakany no nitondran’ny '
  - type: text
    content: Farao
  - type: text
    content: ' Nekao mpanjakan’i Ejipta ny tafiny ho any amoron’i Eofrata mba hanampy ny mpanjakan’i Asiria. Ary nandeha i Jôsià mba hifanehatra aminy; kanjo vantany vao hitan’ny Farao izy, dia novonoiny ho faty tao Megidao'
  - type: note
    content: 'Megidao: jereo 9.27 sy nta.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: Ary niakatra teo ambonin’ny lampihazo
  - type: note
    content: 'teo ambonin’ny lampihazo: dkt hafa teo akaikin’ny andrin’ny tempoly (ampit 11.14 sy nta).'
  - type: text
    content: ' voatokana ho azy ny mpanjaka, dia nanavao ny fanekempihavanana teo anatrehan’ny TOMPO mba hanarahan’ny tsirairay ny TOMPO sy hitandremany ny didiny sy ny fepetrany ary ny lalànany amin’ny fony manontolo sy ny fanahiny manontolo, ka hampiharany ny tenin’ny fanekempihavanana izay voasoratra ao amin’io boky io. Ary neken’ny vahoaka rehetra izany fanekempihavanana izany.'
  - type: heading
    content: Fanitsiam-pivavahana tany Joda
  - type: heading
    content: (Jereo 2 Tan 34.3-5)
  '30':
  - type: text
    content: Dia napetraky ny manamboninahiny tao anaty kalesy ny fatin’i Jôsià ka nentina niala tao Megidao hankany Jerosalema ary nalevina tao amin’ny fasany. Nalain’ny mponin’i Joda kosa i Jôahaza zanakalahin’i Jôsià ka natokany ho mpanjaka handimby an-drainy.
  - type: heading
    content: I Jôahaza mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 36.2-4)
  '31':
  - type: text
    content: Feno 23 taona i Jôahaza fony tonga mpanjaka, ary telo volana ihany no nanjakany tao Jerosalema. Ny anaran-dreniny dia Hamotala zanakavavin’i Jeremià avy any Libnà
  - type: note
    content: 'Libnà: jereo 8.22 sy nta.'
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO tahaka izay rehetra nataon’ireo razany izy. '
  '33':
  - type: text
    content: 'Nogadrain’ny '
  - type: text
    content: Farao
  - type: text
    content: ' Nekao tany Riblà any amin’ny tanin’i Hamata'
  - type: note
    content: 'Riblà: tanàna any avaratr’i Libàno, akaikin’ny sisintany iraisana amin’ny Siria ankehitriny. Ny tanànan’i Hamata dia somary avaratra kokoa.'
  - type: text
    content: ' izy mba tsy ho afa-manjaka any Jerosalema intsony; ary nampandoavin’io Farao io sazy volafotsy telo taonina sy volamena telopolo kilao ny fanjakan’i Joda.'
  '34':
  - type: text
    content: Dia i Eliakima zanakalahin’i Jôsià no voatendren’i Nekao ho mpanjaka handimby an-drainy, ary novany anarana hoe Jôiakima. Fa i Jôahaza kosa nentin’i Nekao ho any Ejipta ka maty tany
  - type: note
    content: Jereo Jer 22.10-12.
  - type: text
    content: '. '
  '35':
  - type: text
    content: Noteren’i Jôiakima handoa hetra volafotsy sy volamena araka ny ananany avy ny vahoaka mba hanomezana izay notakin’ny Farao Nekao.
  - type: heading
    content: I Jôiakima mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 36.5-8)
  '36':
  - type: text
    content: Feno 25 taona i Jôiakima fony tonga mpanjaka, ary naharitra 11 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Zebodà zanakavavin’i Pedaià avy any Romà
  - type: note
    content: 'Jôiakima: jereo Jer 22.18-19; 26.1-6. –Romà: toerana tsy fantatra mazava, toa any Galilea.'
  - type: text
    content: '. '
  '37':
  - type: text
    content: Ary nanao izay ratsy eo imason’ny TOMPO tahaka izay nataon’ireo razany izy.
  '4':
  - type: text
    content: 'Dia nomen’ny mpanjaka baiko i Hilkià '
  - type: text
    content: mpisorombe
  - type: text
    content: ' sy ireo '
  - type: text
    content: mpisorona
  - type: text
    content: ' lefiny ary ny mpiambina varavarana mba hamoaka any ivelan’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' ireo kojakoja rehetra natao hivavahana tamin’i '
  - type: text
    content: Bahala
  - type: text
    content: ' sy tamin’i '
  - type: text
    content: Aserà
  - type: text
    content: ' ary tamin’ireo planeta aman-kintana. Nodorany tany ivelan’i Jerosalema tao amin’ny sahan’i Kidrôna ireny; ka nentiny nankany Betela ny lavenony'
  - type: note
    content: 'Betela: jereo and 15-20.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: Noroahin’i Jôsià ireo mpisorona sandoka izay notendren’ny mpanjakan’i Joda mba handoro sorona hanetona tamin’ireo toeram-panasinana tao an-tanànan’i Joda sy manodidina an’i Jerosalema; noroahiny ireo satria nanao sorona ho an’i Bahala sy ho an’ny masoandro ary ho an’ny volana sy ny planeta aman-kintana
  - type: note
    content: 'masoandro...kintana: jereo Deot 4.19.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: Nalany tao an-tranon’ny TOMPO koa ny tsatokazo fanajana an’i Aserà ka navoakany any ivelan’i Jerosalema mba hodorana ao amin’ny lohasahan’i Kidrôna; ary ny lavenony dia nafafiny teny amin’ny fasam-bahoaka
  - type: note
    content: 'And 4-6: jereo 21.3.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Noravany ireo efitrano teo akaikin’ny tranon’ny TOMPO, efitrano izay nijangajangana ho fanompoan-tsampy sy nanenoman’ny vehivavy akanjo ho fanajana an’i Aserà.
  '8':
  - type: text
    content: 'Nasainy tonga tany Jerosalema ny mpisorona rehetra avy amin’ny tanànan’i Joda; dia narodany ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' izay fampiasan’ireo mpisorona sandoka ireo sy fandorany sorona hanetona, hatreo Geba ka hatrany Beera-Seba'
  - type: note
    content: 'Geba: toerana sahabo ho 10 km ao avaratr’i Jerosalema; Beera-Seba: toerana sahabo ho 70 km any atsimo andrefan’i Jerosalema. Ny fitenenana hoe hatreo Geba ka hatrany Beera-Seba dia midika «ao amin’ny fanjakan’i Joda manontolo».'
  - type: text
    content: '; ary noravany tao Jerosalema ireo toeram-panasinana teo akaikim-bavahady, indrindra ilay teo anoloan’ny vavahadin’i Josoa governoran’ny tanàna ka teo ankavia raha miditra ny tanàna. '
  '9':
  - type: text
    content: 'Tsy navela hisorona teo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO tao Jerosalema ireo mpisorona tamin’ny toeram-panasinana; fa ny mihinana ny '
  - type: text
    content: mofo tsy misy leviora
  - type: text
    content: ' niaraka tamin’ny mpisorona hafa ihany no azony natao.'
