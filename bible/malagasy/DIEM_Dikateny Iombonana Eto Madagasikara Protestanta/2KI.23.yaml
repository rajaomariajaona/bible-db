    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Riblà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna any avaratr’i Libàno, akaikin’ny sisintany iraisana amin’ny Siria ankehitriny. Ny tanànan’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hamata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia somary avaratra kokoa.'
    marker-yv: yv-n
  - type: text
    text: ' izy mba tsy ho afa-manjaka any Jerosalema intsony; ary nampandoavin’io Farao io sazy volafotsy telo taonina sy volamena telopolo kilao ny fanjakan’i Joda.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia i Eliakima zanakalahin’i Jôsià no voatendren’i Nekao ho mpanjaka handimby an-drainy, ary novany anarana hoe Jôiakima. Fa i Jôahaza kosa nentin’i Nekao ho any Ejipta ka maty tany
  - type: usfm
