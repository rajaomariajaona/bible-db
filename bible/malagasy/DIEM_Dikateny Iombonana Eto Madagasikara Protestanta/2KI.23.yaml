    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nanao izay ratsy eo imason’ny TOMPO tahaka izay rehetra nataon’ireo razany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nogadrain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' Nekao tany Riblà any amin’ny tanin’i Hamata'
