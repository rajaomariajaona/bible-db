  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 35.20-27; 36.1)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ho fanatanterahana ny tenin’ny lalàna voasoratra ao amin’ilay boky hitan’i Hilkià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ', dia nofoanan’i Jôsià tamin’ny tanin’i Joda sy tao Jerosalema ireo olona mpanontany ny fanahin’ny maty sy mpamoha angatra, ary nopotehiny ny sarivongan-tsampy sy ny zava-maharikoriko rehetra momba azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho fehin’izany, talohan’i Jôsià dia tsy nisy mpanjaka tahaka azy izay ny TOMPO no nifikirany tamin’ny fony manontolo sy ny fanahiny manontolo ary ny heriny manontolo, araka ny Lalàn’i Mosesy manontolo. Ary tsy nisy tahaka azy intsony koa tatỳ aoriany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Kanefa tsy nitony ny firehetam-pahaviniran’ny TOMPO tamin’ny fanjakan’i Joda satria zavatra isan-karazany no nampahatezeran’i Manase mpanjaka Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izany no nilazan’ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hoesoriko tsy ho eo anatrehako tahaka ny nanesorako an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' koa i Joda, ary hailiko ity tanànan’i Jerosalema nofidiko ity sy ny trano izay nolazaiko fa hipetrahan’ny voninahitro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Jôsià ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Joda.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin’ny andro nanjakany no nitondran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' Nekao mpanjakan’i Ejipta ny tafiny ho any amoron’i Eofrata mba hanampy ny mpanjakan’i Asiria. Ary nandeha i Jôsià mba hifanehatra aminy; kanjo vantany vao hitan’ny Farao izy, dia novonoiny ho faty tao Megidao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Megidao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 9.27 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia napetraky ny manamboninahiny tao anaty kalesy ny fatin’i Jôsià ka nentina niala tao Megidao hankany Jerosalema ary nalevina tao amin’ny fasany. Nalain’ny mponin’i Joda kosa i Jôahaza zanakalahin’i Jôsià ka natokany ho mpanjaka handimby an-drainy.
