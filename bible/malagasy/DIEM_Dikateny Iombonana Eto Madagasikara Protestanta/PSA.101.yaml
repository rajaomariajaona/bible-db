document_id: PSA.101,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mianiana eo anatrehan’Andriamanitra ny mpanjaka fa hanaja ny rariny
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: TOMPO ô, firaiketam-po aminao
  - type: text
    content: sy rariny ho an’ny vahoaka
  - type: text
    content: 'no zavatra tiako hokaloina:'
  - type: text
    content: izany no hankalazako Anao an-kira.
  '2':
  - type: text
    content: Hiezaka hiroso amin’ny fahitsiana aho,
  - type: text
    content: ka rahoviana no hankatỳ amiko Ianao?
  - type: text
    content: Amin-kitsim-po no hiainako
  - type: text
    content: ao amin’ny lapam-panjakàko.
  '3':
  - type: text
    content: Tsy hahatanty zava-dratsy aho;
  - type: text
    content: halako ny mivadika finoana,
  - type: text
    content: tsy mba hahazo ahy izany.
  '4':
  - type: text
    content: Halaviriko ny haloto fo,
  - type: text
    content: tsisy antony amiko ny olon-dratsy.
  '5':
  - type: text
    content: Hofongorako ny mpanaratsy namana amin’ny takona
  - type: text
    content: fa tsy zakako ny mpiandranandrana miavona am-po.
  '6':
  - type: text
    content: Hojereko izay olo-mahatoky
  - type: text
    content: eto amin’ny tany sy ny fanjakana
  - type: text
    content: mba hametrahako azy eo anilako;
  - type: text
    content: izay mizotra amin’ny fahitsiana
  - type: text
    content: no ho tonga mpanampy ahy.
  '7':
  - type: text
    content: Tsy hitoetra ao amin’ny lapam-panjakàko
  - type: text
    content: ny olona mpametsifetsy;
  - type: text
    content: ary tsy hijanona eo anilako
  - type: text
    content: ny mpanao teny mandrobo.
  '8':
  - type: text
    content: Hataoko fongotra isa-maraina ny olon-dratsy rehetra
  - type: text
    content: eto amin’ny tany sy ny fanjakana
  - type: text
    content: mba ho foana avokoa ny mpanao ratsy
  - type: text
    content: ao amin’ny tanànan’ny TOMPO.
