document_id: PSA.101,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Mianiana eo anatrehan’Andriamanitra ny mpanjaka fa hanaja ny rariny
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, firaiketam-po aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy rariny ho an’ny vahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no zavatra tiako hokaloina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no hankalazako Anao an-kira.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hiezaka hiroso amin’ny fahitsiana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka rahoviana no hankatỳ amiko Ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin-kitsim-po no hiainako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny lapam-panjakàko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy hahatanty zava-dratsy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halako ny mivadika finoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba hahazo ahy izany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Halaviriko ny haloto fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsisy antony amiko ny olon-dratsy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hofongorako ny mpanaratsy namana amin’ny takona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy zakako ny mpiandranandrana miavona am-po.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hojereko izay olo-mahatoky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eto amin’ny tany sy ny fanjakana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hametrahako azy eo anilako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mizotra amin’ny fahitsiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho tonga mpanampy ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy hitoetra ao amin’ny lapam-panjakàko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona mpametsifetsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hijanona eo anilako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanao teny mandrobo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hataoko fongotra isa-maraina ny olon-dratsy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eto amin’ny tany sy ny fanjakana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho foana avokoa ny mpanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny tanànan’ny TOMPO.
