    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Na ahoana na ahoana, dia mazava ny zava-kendren’ny toritenin’ny mpaminany: ny vahoakan’i Israely izay tsy manana na inona na inona intsony, eny, hatramin’ny fahazoany manatanteraka ny fanompoam-pivavahana ao an-'
