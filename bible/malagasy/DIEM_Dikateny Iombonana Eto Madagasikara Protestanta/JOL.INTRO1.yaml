      children:
      - type: text
        text: aza, dia antsoin’izany toe-javatra izany mba hitodika amin’Andriamanitra ka hivavaka aminy (1.13-14,19-20; 2.12-17). Ny tsy fananan’ny vahoaka na inona na inona no antoka faran’ny famonjena azy. Ny fitahiana amam-panambinana nampanantenaina (2.18-27; 3.1-5; 4.17, 18-21) dia mifanohitra amin’ny tsy fisiana sy fahafoanana ateraky ny fahatezeran’Andriamanitra. Ny olona hafa firenena dia horavan’ny fitsarana (4.1-16), fa ny vahoakan’i Israely kosa ho voatarika hahalala ny dikan’ny fisian’Andriamanitra eo aminy. Ny bokin’i Jôela dia manambara fa indray andro any izany fisian’Andriamanitra eo aminy izany dia homena ny olona rehetra, satria amin’ny olon-drehetra no handatsahany ny Fanahiny (3.1-2). Ireo kristianina voalohany dia nahita sy niaina ny fahatanterahan’izany fampanantenana izany tamin’ny andro
