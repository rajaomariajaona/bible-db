      children:
      - type: text
        text: Jôela, ary na dia ny fotoana nahavelomany aza; kanefa ny hafatra nampitainy dia mifono hery mampitolagaga eo amin’ny taonjato mifandimby. Ny vontoatin’ny bokin’i Jôela dia ny fanambaràna ny andro izay anehoan’ny Tompo ny fahefàny sy itsarany ny vahoaka rehetra; ny vahoakan’i Israely dia tsarainy noho ny fihetsika sy toetra nasehony tamin’Andriamanitra, ary ny hafa kosa araka izay nasehony tamin’i Israely. Ny fiavian’ny andro fitsarana dia ialohan’ny loza mandrava zavatra sady miteraka tsy fisiana sy fahafoanana. Andiam-balala, haintany, doro tanàna ary fanafihana miaramila no sary andravahana ny herim-pandringanan’izany andro izany (1.2-12, 15-18; 2.1-11). Tsy misy ahafantarantsika na zava-nitranga tamin’ny androny no tenenin’ny mpaminany na sarintsary niantefa taminy mba hampivaingana ny hafatra ambarany.
  - type: usfm
    marker: ip
