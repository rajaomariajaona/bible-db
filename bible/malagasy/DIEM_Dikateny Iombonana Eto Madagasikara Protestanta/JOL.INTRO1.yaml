  - type: text
    content: Sava lalana
  - type: text
    content: –Tsy misy zavatra fantatra momba ny tenan’ny
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: ' '
  - type: text
    content: Jôela, ary na dia ny fotoana nahavelomany aza; kanefa ny hafatra nampitainy dia mifono hery mampitolagaga eo amin’ny taonjato mifandimby. Ny vontoatin’ny bokin’i Jôela dia ny fanambaràna ny andro izay anehoan’ny Tompo ny fahefàny sy itsarany ny vahoaka rehetra; ny vahoakan’i Israely dia tsarainy noho ny fihetsika sy toetra nasehony tamin’Andriamanitra, ary ny hafa kosa araka izay nasehony tamin’i Israely. Ny fiavian’ny andro fitsarana dia ialohan’ny loza mandrava zavatra sady miteraka tsy fisiana sy fahafoanana. Andiam-balala, haintany, doro tanàna ary fanafihana miaramila no sary andravahana ny herim-pandringanan’izany andro izany (1.2-12, 15-18; 2.1-11). Tsy misy ahafantarantsika na zava-nitranga tamin’ny androny no tenenin’ny mpaminany na sarintsary niantefa taminy mba hampivaingana ny hafatra ambarany.
  - type: text
    content: 'Na ahoana na ahoana, dia mazava ny zava-kendren’ny toritenin’ny mpaminany: ny vahoakan’i Israely izay tsy manana na inona na inona intsony, eny, hatramin’ny fahazoany manatanteraka ny fanompoam-pivavahana ao an-'
  - type: text
    content: ' '
  - type: text
    content: tempoly
  - type: text
    content: ' '
  - type: text
    content: aza, dia antsoin’izany toe-javatra izany mba hitodika amin’Andriamanitra ka hivavaka aminy (1.13-14,19-20; 2.12-17). Ny tsy fananan’ny vahoaka na inona na inona no antoka faran’ny famonjena azy. Ny fitahiana amam-panambinana nampanantenaina (2.18-27; 3.1-5; 4.17, 18-21) dia mifanohitra amin’ny tsy fisiana sy fahafoanana ateraky ny fahatezeran’Andriamanitra. Ny olona hafa firenena dia horavan’ny fitsarana (4.1-16), fa ny vahoakan’i Israely kosa ho voatarika hahalala ny dikan’ny fisian’Andriamanitra eo aminy. Ny bokin’i Jôela dia manambara fa indray andro any izany fisian’Andriamanitra eo aminy izany dia homena ny olona rehetra, satria amin’ny olon-drehetra no handatsahany ny Fanahiny (3.1-2). Ireo kristianina voalohany dia nahita sy niaina ny fahatanterahan’izany fampanantenana izany tamin’ny andro
