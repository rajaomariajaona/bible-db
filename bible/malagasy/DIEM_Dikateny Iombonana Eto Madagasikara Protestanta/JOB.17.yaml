document_id: JOB.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Valintenin’i Jôba (tohiny): very ny fanantenako'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torovana ny aiko ary madiva hilentika ny androko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fasana sisa no miandry ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia ka miverena avokoa, ianareo sakaizako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mahita izay olon-kendry teo aminareo aho.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasa ny androko; foana ny fikasàko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay zavatra nirin’ny foko fatratra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny alina ataon’ny sakaizako ho andro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa tonga ny haizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lazainy fa antomotra ny mazava.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona indray no mbola antenaiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afa-tsy ny toeran’ny maty ho fonenako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny haiziny no hamelarako fandriana!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy aho amin’ny fasana: «Ianao no raiko»,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary amin’ny olitra: «Ianareo no reniko sy anabaviko»'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aiza àry ny fanantenako? Iza no mbola mahita azy?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miara-midina amiko any amin’ny toeran’ny maty izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiara-mihitsoka amiko eo amin’ny vovoka.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy ireo mpaneso ve no manodidina ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny filàny misotasota no tsy ahitako tory?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, meteza ho hany mpiantoka ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa iza moa ankoatra Anao no hety hanao izany?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nataonao very saina ireo sakaizako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa tsy havelanao hirehareha amiko.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ireo no tonga amin’ilay ohabolana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manan-kozaraina amin’ny namana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa dia mahajery voamason-janaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no ambentin-kiran’ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fandrorany an-tava hatrany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa jembin’ny alahelo ny masoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa hoatra ny aloka sisa ny tenako.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankona noho izany ny olo-mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tezitra ny tsy manan-tsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria olona mpihatsaravelatsihy no ahitany ahy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy izy: «Aoka ny marina hifikitra amin’ny lalany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny madio tanana hitombo fiezahana.»
