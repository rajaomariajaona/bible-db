document_id: JOB.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba (tohiny): very ny fanantenako'
  - type: text
    content: Torovana ny aiko ary madiva hilentika ny androko;
  - type: text
    content: ny fasana sisa no miandry ahy.
  '10':
  - type: text
    content: Avia ka miverena avokoa, ianareo sakaizako.
  - type: text
    content: Fa tsy mahita izay olon-kendry teo aminareo aho.
  - type: heading
    content: '*'
  '11':
  - type: text
    content: Lasa ny androko; foana ny fikasàko,
  - type: text
    content: dia izay zavatra nirin’ny foko fatratra.
  '12':
  - type: text
    content: Fa ny alina ataon’ny sakaizako ho andro;
  - type: text
    content: ary rehefa tonga ny haizina,
  - type: text
    content: dia lazainy fa antomotra ny mazava.
  '13':
  - type: text
    content: Inona indray no mbola antenaiko,
  - type: text
    content: afa-tsy ny toeran’ny maty ho fonenako?
  - type: text
    content: Ao amin’ny haiziny no hamelarako fandriana!
  '14':
  - type: text
    content: 'Hoy aho amin’ny fasana: «Ianao no raiko»,'
  - type: text
    content: 'ary amin’ny olitra: «Ianareo no reniko sy anabaviko»'
  '15':
  - type: text
    content: Fa aiza àry ny fanantenako? Iza no mbola mahita azy?
  '16':
  - type: text
    content: Miara-midina amiko any amin’ny toeran’ny maty izany,
  - type: text
    content: ary hiara-mihitsoka amiko eo amin’ny vovoka.
  '2':
  - type: text
    content: Moa tsy ireo mpaneso ve no manodidina ahy
  - type: text
    content: ka ny filàny misotasota no tsy ahitako tory?
  '3':
  - type: text
    content: Andriamanitra ô, meteza ho hany mpiantoka ahy,
  - type: text
    content: fa iza moa ankoatra Anao no hety hanao izany?
  '4':
  - type: text
    content: Efa nataonao very saina ireo sakaizako,
  - type: text
    content: koa tsy havelanao hirehareha amiko.
  '5':
  - type: text
    content: 'Ireo no tonga amin’ilay ohabolana hoe:'
  - type: text
    content: Manan-kozaraina amin’ny namana,
  - type: text
    content: kanefa dia mahajery voamason-janaka.
  - type: heading
    content: '*'
  '6':
  - type: text
    content: Izaho no ambentin-kiran’ny olona
  - type: text
    content: sy fandrorany an-tava hatrany.
  '7':
  - type: text
    content: Efa jembin’ny alahelo ny masoko,
  - type: text
    content: ary efa hoatra ny aloka sisa ny tenako.
  '8':
  - type: text
    content: Ankona noho izany ny olo-mahitsy,
  - type: text
    content: ary tezitra ny tsy manan-tsiny
  - type: text
    content: satria olona mpihatsaravelatsihy no ahitany ahy.
  '9':
  - type: text
    content: 'Fa hoy izy: «Aoka ny marina hifikitra amin’ny lalany,'
  - type: text
    content: ary aoka ny madio tanana hitombo fiezahana.»
