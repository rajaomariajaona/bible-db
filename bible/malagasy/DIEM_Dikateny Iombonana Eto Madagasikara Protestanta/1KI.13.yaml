document_id: 1KI.13,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Noho ny baikon’ny TOMPO, dia nisy '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ' avy any Joda tonga tany Betela raha mbola nandoro sorona hanetona teo amin’ny alitara i Jerôbohama. '
  '10':
  - type: text
    content: Dia lalan-kafa no nalehany fa tsy niverina tamin’ilay efa nandehanany nankany Betela izy.
  - type: heading
    content: Tsy nankatò ny Tompo ilay mpaminany
  '11':
  - type: text
    content: 'Fa nisy '
  - type: text
    content: mpaminany
  - type: text
    content: ' antitra iray nipetraka tany Betela; ary tonga ireo zanany lahy ka nitantara taminy izay rehetra nataon’ilay '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ' androtriny tao Betela sy izay nambarany tamin’ny mpanjaka. '
  '12':
  - type: text
    content: 'Dia hoy ny rainy taminy:'
  - type: text
    content: –Aiza no lalana nalehany?
  - type: text
    content: 'Fa hitan-janany ny lalana nalehan’ilay olon’Andriamanitra izay tonga avy tany Joda. '
  '13':
  - type: text
    content: 'Dia hoy indray ny rainy taminy:'
  - type: text
    content: –Asio lasely ny borikiko!
  - type: text
    content: 'Dia nasian-janany lasely ny boriky ka nitaingenany. '
  '14':
  - type: text
    content: 'Narahin’io mpaminany io ny lalan’ilay olon’Andriamanitra ka tratrany izy, raha iny nipetraka teo ambanin’ny hazo lehibe iray iny, ary nanontaniany hoe:'
  - type: text
    content: –Ianao ve ilay olon’Andriamanitra avy any Joda?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Eny, izaho no izy.
  '15':
  - type: text
    content: 'Dia hoy indray ity mpaminany taminy:'
  - type: text
    content: –Andao hiaraka amiko ho any an-tranoko mba hihinan-javatra kely.
  '16':
  - type: text
    content: 'Fa hoy izy namaly:'
  - type: text
    content: '–Tsia, tsy mahazo miverin-dalana hiaraka aminao aho ary tsy mahazo mihinan-kanina na misotro rano aminao atỳ; '
  '17':
  - type: text
    content: 'satria izao no tenin’ny TOMPO tamiko: «Aza mihinan-kanina na misotro any, ary aza miverina amin’ny lalana efa nalehanao.»'
  '18':
  - type: text
    content: 'Fa hoy kosa ilay lahiantitra taminy:'
  - type: text
    content: '–Izaho koa dia mba mpaminany toa anao ihany, ary nisy '
  - type: text
    content: anjely
  - type: text
    content: ' nilaza tenin’ny TOMPO tamiko nanao hoe: «Ento miverina miaraka aminao ho any an-tranonao izy mba hihinan-kanina sy hisotro rano.» Kanjo nandainga taminy izy. '
  '19':
  - type: text
    content: Dia niverina niaraka taminy ihany ilay olon’Andriamanitra, ka nihinan-kanina sy nisotro rano tao an-tranony.
  - type: heading
    content: Voaheloka ilay irak’Andriamanitra
  '2':
  - type: text
    content: 'Ary nanao antso avo nanohitra io alitara io, araka ny baikon’ny TOMPO, ilay olon’Andriamanitra ka nanao hoe:'
  - type: text
    content: '–Ry alitara ô, ry alitara ô, izao no lazain’ny TOMPO: «Hisy zazalahy ho teraka ao amin’ny fianakavian’i Davida, ka ny anarany hatao hoe Jôsià'
  - type: note
    content: Jereo 2 Mp 22–23, indrindra 23.15-16.
  - type: text
    content: . Eo aminao, ry alitara ô, no hovonoiny ho faty ka hataony sorona ireo mpisoron’ny toeram-panasinana ireo, izay nandoro sorona hanetona teo aminao; ary taolan’olona aza no hodorana eo aminao.
  '20':
  - type: text
    content: 'Fa raha mbola nipetraka nihinana izy roa lahy, dia nisy tenin’ny TOMPO tamin’ilay '
  - type: text
    content: mpaminany
  - type: text
    content: ' antitra nampiverin-dalana; '
  '21':
  - type: text
    content: 'ary izy io kosa niteny mafy tamin’ilay olon’Andriamanitra avy any Joda hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Noho ianao tsy nankatò ny baikon’ny TOMPO Andriamanitrao ary tsy nitandrina ny didy izay nomeny anao, '
  '22':
  - type: text
    content: 'noho ianao niverina nihinan-kanina sy nisotro rano tany amin’ny tany izay nandraran’ny TOMPO anao hoe: ‹Aza mihinan-kanina na misotro rano any›, dia ho faty ianao kanefa tsy hiditra am-pasan-drazanao ny fatinao.»'
  '23':
  - type: text
    content: 'Rehefa avy nihinana sy nisotro izy roa lahy, dia nasian’ilay lahiantitra lasely ny boriky hitaingenan’ilay mpaminany voataonany hiverina teo iny. '
  '24':
  - type: text
    content: 'Kanjo nony nandeha izy, dia sendra liona teny an-dalana ka matin’izany; ary ny fatiny dia niampatra teo amin’ny lalana, fa ny boriky sy ny liona kosa nijanona teo an-daniny sy an-kilany. '
  '25':
  - type: text
    content: 'Rehefa hitan’ny mpandalo ny faty niampatra teo amin’ny lalana sy ny liona nijanona teo anilany, dia lasa ireo nitantara izany tany amin’ny tanàna izay nipetrahan’ilay mpaminany antitra. '
  '26':
  - type: text
    content: 'Nony nandre izany ity mpaminany nampiverin-dalana azy, dia nilaza hoe:'
  - type: text
    content: –Ilay olon’Andriamanitra tsy nankatò ny baikon’ny TOMPO izay; fa natolotry ny TOMPO ho an’ny liona izy ka noviravirainy sy nataony maty araka ny teny izay nambaran’ny TOMPO taminy.
  '27':
  - type: text
    content: 'Avy eo dia hoy ity lahiantitra tamin’ireto zanany:'
  - type: text
    content: –Asio lasely ny borikiko!
  - type: text
    content: 'Nony voaisy lasely ny boriky, '
  '28':
  - type: text
    content: 'dia nandeha ilay mpaminany antitra ka nahita ny fatin-dralehilahy niampatra teo amin’ny lalana ary ny boriky sy ny liona nijanona teo anilan’ny faty; nefa ny liona tsy nihinana ny faty ary tsy namiravira ny boriky. '
  '29':
  - type: text
    content: 'Dia nobatain’ilay mpaminany antitra ny fatin’ilay olon’Andriamanitra ka nakariny teo ambony boriky ary nentiny niverina tany an-tanànany mba hanaovany fisaonana sy fandevenana. '
  '3':
  - type: text
    content: 'Androtr’io ihany dia nanome famantarana ilay olon’Andriamanitra ka nanambara hoe:'
  - type: text
    content: '–Izao no famantarana ho porofo fa ny TOMPO no niteny: «Indro hitresaka ny alitara ka hiely amin’ny tany ny lavenona eo amboniny.»'
  '30':
  - type: text
    content: 'Dia naleviny tao am-pasany ny faty ka nitomanian’ny olona an-kira hoe: «Indrisy, ry rahalahiko!»'
  '31':
  - type: text
    content: 'Taorian’ny fandevenana dia hoy ilay mpaminany antitra tamin’ireo zanany:'
  - type: text
    content: '–Rehefa maty aho, dia aleveno ao amin’ny fasana ilevenan’io olon’Andriamanitra io, ka ataovy eo anilan’ny taolambalony ny taolambaloko. '
  '32':
  - type: text
    content: 'Fa tsy maintsy ho tanteraka ilay hafatra nataony antso avo araka ny tenin’ny TOMPO ho fanoherana ny '
  - type: text
    content: alitara
  - type: text
    content: ' ao Betela sy ny trano rehetra amin’ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' manerana ireo tanànan’i Samaria.'
  '33':
  - type: text
    content: 'Na teo aza anefa izany, dia tsy nanitsy fitondrantena i Jerôbohama, fa mbola nanendry olon-kafa ho mpisorona amin’ny toeram-panasinana hatrany izy; ka izay olona te hanao izany, dia natokany mba ho mpisorona amin’ireny toeram-panasinana ireny. '
  '34':
  - type: text
    content: Tonga fahotan’ny fianakavian’i Jerôbohama izany ka nahafongotra sy naharingana azy tanteraka teto ambonin’ny tany.
  '4':
  - type: text
    content: 'Raha vao ren’i Jerôbohama mpanjaka ny tenin’ilay olon’Andriamanitra izay nanao antso avo nanohitra ny alitara tao Betela, dia naninjitra ilay tanany izay teo ambony alitara izy sady niteny hoe:'
  - type: text
    content: –Tano io olona io!
  - type: text
    content: 'Kanjo maina tampoka teo iny tanana nahinjiny hanoherana an’ilay olon’Andriamanitra iny ka tsy azony noketrahina intsony. '
  '5':
  - type: text
    content: 'Tamin’izay koa dia nitresaka ny alitara ka niely tamin’ny tany ny lavenona teo amboniny, araka ny famantarana nambaran’ilay olon’Andriamanitra ihany noho ny tenin’ny TOMPO. '
  '6':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’ilay olon’Andriamanitra:'
  - type: text
    content: –Mba ifony amin’ny TOMPO Andriamanitrao re aho ka mivavaha ho ahy mba ho azoko ketrahina indray ny tanako.
  - type: text
    content: 'Dia nifona tamin’ny TOMPO ilay olon’Andriamanitra, ka azon’ny mpanjaka noketrahina indray ny tanany, ary tafaverina toy ny teo aloha. '
  '7':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’ilay olon’Andriamanitra:'
  - type: text
    content: –Andao hiaraka amiko ho any an-tranoko ianao mba hihinan-javatra kely sady hotolorako fanomezana.
  '8':
  - type: text
    content: 'Fa hoy ny navalin’ilay olon’Andriamanitra azy hoe:'
  - type: text
    content: '–Na homenao ahy aza ny antsasaky ny fanananao, dia tsy hankany an-tranonao aho, ary tsy hihinan-kanina na hisotro rano atỳ; '
  '9':
  - type: text
    content: 'satria izao no nandidian’ny tenin’ny TOMPO ahy: «Aza mihinan-kanina na misotro rano any ianao, ary aza miverina amin’ny lalana efa nalehanao.»'
