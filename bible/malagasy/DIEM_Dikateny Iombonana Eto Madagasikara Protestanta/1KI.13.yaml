document_id: 1KI.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Noho ny baikon’ny TOMPO, dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: olon’Andriamanitra
  - type: text
    text: ' avy any Joda tonga tany Betela raha mbola nandoro sorona hanetona teo amin’ny alitara i Jerôbohama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanao antso avo nanohitra io alitara io, araka ny baikon’ny TOMPO, ilay olon’Andriamanitra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry alitara ô, ry alitara ô, izao no lazain’ny TOMPO: «Hisy zazalahy ho teraka ao amin’ny fianakavian’i Davida, ka ny anarany hatao hoe Jôsià'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 22–23, indrindra 23.15-16.
    marker-yv: yv-n
  - type: text
    text: . Eo aminao, ry alitara ô, no hovonoiny ho faty ka hataony sorona ireo mpisoron’ny toeram-panasinana ireo, izay nandoro sorona hanetona teo aminao; ary taolan’olona aza no hodorana eo aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Androtr’io ihany dia nanome famantarana ilay olon’Andriamanitra ka nanambara hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no famantarana ho porofo fa ny TOMPO no niteny: «Indro hitresaka ny alitara ka hiely amin’ny tany ny lavenona eo amboniny.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha vao ren’i Jerôbohama mpanjaka ny tenin’ilay olon’Andriamanitra izay nanao antso avo nanohitra ny alitara tao Betela, dia naninjitra ilay tanany izay teo ambony alitara izy sady niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tano io olona io!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Kanjo maina tampoka teo iny tanana nahinjiny hanoherana an’ilay olon’Andriamanitra iny ka tsy azony noketrahina intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’izay koa dia nitresaka ny alitara ka niely tamin’ny tany ny lavenona teo amboniny, araka ny famantarana nambaran’ilay olon’Andriamanitra ihany noho ny tenin’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’ilay olon’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba ifony amin’ny TOMPO Andriamanitrao re aho ka mivavaha ho ahy mba ho azoko ketrahina indray ny tanako.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nifona tamin’ny TOMPO ilay olon’Andriamanitra, ka azon’ny mpanjaka noketrahina indray ny tanany, ary tafaverina toy ny teo aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’ilay olon’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andao hiaraka amiko ho any an-tranoko ianao mba hihinan-javatra kely sady hotolorako fanomezana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy ny navalin’ilay olon’Andriamanitra azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Na homenao ahy aza ny antsasaky ny fanananao, dia tsy hankany an-tranonao aho, ary tsy hihinan-kanina na hisotro rano atỳ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'satria izao no nandidian’ny tenin’ny TOMPO ahy: «Aza mihinan-kanina na misotro rano any ianao, ary aza miverina amin’ny lalana efa nalehanao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia lalan-kafa no nalehany fa tsy niverina tamin’ilay efa nandehanany nankany Betela izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy nankatò ny Tompo ilay mpaminany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' antitra iray nipetraka tany Betela; ary tonga ireo zanany lahy ka nitantara taminy izay rehetra nataon’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: olon’Andriamanitra
  - type: text
    text: ' androtriny tao Betela sy izay nambarany tamin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ny rainy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza no lalana nalehany?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hitan-janany ny lalana nalehan’ilay olon’Andriamanitra izay tonga avy tany Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy indray ny rainy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Asio lasely ny borikiko!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nasian-janany lasely ny boriky ka nitaingenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Narahin’io mpaminany io ny lalan’ilay olon’Andriamanitra ka tratrany izy, raha iny nipetraka teo ambanin’ny hazo lehibe iray iny, ary nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao ve ilay olon’Andriamanitra avy any Joda?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, izaho no izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy indray ity mpaminany taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andao hiaraka amiko ho any an-tranoko mba hihinan-javatra kely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy izy namaly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsia, tsy mahazo miverin-dalana hiaraka aminao aho ary tsy mahazo mihinan-kanina na misotro rano aminao atỳ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'satria izao no tenin’ny TOMPO tamiko: «Aza mihinan-kanina na misotro any, ary aza miverina amin’ny lalana efa nalehanao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy kosa ilay lahiantitra taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho koa dia mba mpaminany toa anao ihany, ary nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' nilaza tenin’ny TOMPO tamiko nanao hoe: «Ento miverina miaraka aminao ho any an-tranonao izy mba hihinan-kanina sy hisotro rano.» Kanjo nandainga taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia niverina niaraka taminy ihany ilay olon’Andriamanitra, ka nihinan-kanina sy nisotro rano tao an-tranony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voaheloka ilay irak’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha mbola nipetraka nihinana izy roa lahy, dia nisy tenin’ny TOMPO tamin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' antitra nampiverin-dalana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary izy io kosa niteny mafy tamin’ilay olon’Andriamanitra avy any Joda hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO: «Noho ianao tsy nankatò ny baikon’ny TOMPO Andriamanitrao ary tsy nitandrina ny didy izay nomeny anao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'noho ianao niverina nihinan-kanina sy nisotro rano tany amin’ny tany izay nandraran’ny TOMPO anao hoe: ‹Aza mihinan-kanina na misotro rano any›, dia ho faty ianao kanefa tsy hiditra am-pasan-drazanao ny fatinao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa avy nihinana sy nisotro izy roa lahy, dia nasian’ilay lahiantitra lasely ny boriky hitaingenan’ilay mpaminany voataonany hiverina teo iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Kanjo nony nandeha izy, dia sendra liona teny an-dalana ka matin’izany; ary ny fatiny dia niampatra teo amin’ny lalana, fa ny boriky sy ny liona kosa nijanona teo an-daniny sy an-kilany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa hitan’ny mpandalo ny faty niampatra teo amin’ny lalana sy ny liona nijanona teo anilany, dia lasa ireo nitantara izany tany amin’ny tanàna izay nipetrahan’ilay mpaminany antitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nony nandre izany ity mpaminany nampiverin-dalana azy, dia nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ilay olon’Andriamanitra tsy nankatò ny baikon’ny TOMPO izay; fa natolotry ny TOMPO ho an’ny liona izy ka noviravirainy sy nataony maty araka ny teny izay nambaran’ny TOMPO taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Avy eo dia hoy ity lahiantitra tamin’ireto zanany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Asio lasely ny borikiko!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nony voaisy lasely ny boriky, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia nandeha ilay mpaminany antitra ka nahita ny fatin-dralehilahy niampatra teo amin’ny lalana ary ny boriky sy ny liona nijanona teo anilan’ny faty; nefa ny liona tsy nihinana ny faty ary tsy namiravira ny boriky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nobatain’ilay mpaminany antitra ny fatin’ilay olon’Andriamanitra ka nakariny teo ambony boriky ary nentiny niverina tany an-tanànany mba hanaovany fisaonana sy fandevenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia naleviny tao am-pasany ny faty ka nitomanian’ny olona an-kira hoe: «Indrisy, ry rahalahiko!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Taorian’ny fandevenana dia hoy ilay mpaminany antitra tamin’ireo zanany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Rehefa maty aho, dia aleveno ao amin’ny fasana ilevenan’io olon’Andriamanitra io, ka ataovy eo anilan’ny taolambalony ny taolambaloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa tsy maintsy ho tanteraka ilay hafatra nataony antso avo araka ny tenin’ny TOMPO ho fanoherana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ao Betela sy ny trano rehetra amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinana
  - type: text
    text: ' manerana ireo tanànan’i Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Na teo aza anefa izany, dia tsy nanitsy fitondrantena i Jerôbohama, fa mbola nanendry olon-kafa ho mpisorona amin’ny toeram-panasinana hatrany izy; ka izay olona te hanao izany, dia natokany mba ho mpisorona amin’ireny toeram-panasinana ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tonga fahotan’ny fianakavian’i Jerôbohama izany ka nahafongotra sy naharingana azy tanteraka teto ambonin’ny tany.
