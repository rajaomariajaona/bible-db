    children:
    - type: text
      text: BOKY VOALOHANY
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: (Salamo 1–41)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ny fahasambarana marina
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Sambatra ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy manaraka ny hevitry ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mijanona eo amin’ny lalan’ny mpanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na miray toerana amin’ny mpaniratsira!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa ny fampianaran’ny TOMPO no sitrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia saintsaininy andro aman’alina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Toy ny hazo nambolena eo amoron-drenirano izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mamoa ara-potoana sady tsy malazo ravina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 17.8.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia mahomby avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asa rehetra ataony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy mba toy izany ireo olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tahaka ny akofa aelin-drivotra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Noho izany, dia ho voaheloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny fitsarana ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy toerana ho azy akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny fivorian’ny olo-marina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsimbinin’ny TOMPO tokoa ny fiainan’ny olo-marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny an’ny olon-dratsy kosa mankamin’ny fahaverezana.
