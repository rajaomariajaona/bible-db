document_id: PSA.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY VOALOHANY
  - type: heading
    content: (Salamo 1–41)
  - type: heading
    content: SALAMO Ny fahasambarana marina
  - type: text
    content: Sambatra ny olona
  - type: text
    content: tsy manaraka ny hevitry ny ratsy fanahy,
  - type: text
    content: na mijanona eo amin’ny lalan’ny mpanota,
  - type: text
    content: na miray toerana amin’ny mpaniratsira!
  '2':
  - type: text
    content: Fa ny fampianaran’ny TOMPO no sitrany,
  - type: text
    content: ka dia saintsaininy andro aman’alina.
  '3':
  - type: text
    content: Toy ny hazo nambolena eo amoron-drenirano izy,
  - type: text
    content: izay mamoa ara-potoana sady tsy malazo ravina
  - type: note
    content: Jereo Jer 17.8.
  - type: text
    content: ','
  - type: text
    content: ka dia mahomby avokoa
  - type: text
    content: ny asa rehetra ataony.
  '4':
  - type: text
    content: Tsy mba toy izany ireo olon-dratsy,
  - type: text
    content: fa tahaka ny akofa aelin-drivotra.
  '5':
  - type: text
    content: Noho izany, dia ho voaheloka
  - type: text
    content: eo amin’ny fitsarana ireo;
  - type: text
    content: ary tsy hisy toerana ho azy akory
  - type: text
    content: eo amin’ny fivorian’ny olo-marina.
  '6':
  - type: text
    content: Tsimbinin’ny TOMPO tokoa ny fiainan’ny olo-marina,
  - type: text
    content: fa ny an’ny olon-dratsy kosa mankamin’ny fahaverezana.
