document_id: PRO.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Torohevitra ho an’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izao no torohevitra izay noraisin’i Lemoela mpanjakan’i Masà tamin-dreniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Izao no torohevitra, dia ny hafatra mavesa-danja izay noraisin’i Lemoela mpanjaka tamin-dreniny
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Inona, anaka, inona no holazaiko anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: zanako naterako izay efa nangatahiko am-bavaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza omena ny vehivavy ny herinao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy ireo vehivavy manimba mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hibaiko ny fitondrantenanao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mety amin’ny mpanjaka, ry Lemoela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mety amin’ny mpanjaka na mpifehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny miboboka divay na toaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha miboboka izany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanadino ny fampiharan-dalàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamadika ny zon’ireo olona mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka izay efa ho faty no homena toaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay fadiranovana no hotoloran-divay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia hiboboka izy hanadinoany ny fahoriany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hahatsiarovany ny fahantrany intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sokafy ny vavanao hiaro izay tsy afa-miteny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hiady ho an’ny olona rehetra tsy mana-mpiahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sokafy ny vavanao mba hitsara araka ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiady ho an’ny ory sy ny mahantra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.9 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: And 4-5 sy 8-9;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 16.10-12, 1 Mp 3.28; Sal 72.1-4.
    marker-yv: yv-n
  - type: text
    text: ».
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vehivavy mahay
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: text
    text: ALEFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza no mahita vehivavy mahavatra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny hasarobidiny dia mihoatra noho ny perla.
- type: usfm
  marker: sp
  children:
  - type: text
    text: BETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Matoky azy tanteraka ny vadiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy mandanilany fananana izy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: GIMELA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy manao ratsy aminy ravehivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa manao izay hahasambatra azy kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandritra ny andro rehetra iainany.
- type: usfm
  marker: sp
  children:
  - type: text
    text: DALETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitady volon’ondry sy kiran-drongony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miasa araka ny fahakingan’ny tanany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: HE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tahaka ny sambon’ny mpandranto izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitondra ny haniny avy lavitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: VAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mifoha mbola maizina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mikarakara ny sakafon’ny ankohonany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mitsinjara ny asan’ny mpanompovaviny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: ZAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mandinika tsara izy vao mividy saha
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamboly voaloboka amin’ny tombontsoa azony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: PETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Misikina herimpo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mba miraviravy tanana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: TETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsapany ny fandrosoan’ny raharahany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy maty jiro mandritra ny alina izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: JODA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Miasa mamoly volon’ondry ny tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manenona lamba ny rantsan-tanany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: KAFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Manatsotra ny tanany amin’ny ory izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary malala-tanana amin’ny mahantra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: LAMEDA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy ahiany amin’izay oram-panala ny ankohonany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa voatafy mafana avokoa ny ao an-tranony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: MEMA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manao firakotra ho an’ny tenany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitafiany dia rongony fotsy sy volomparasy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: NONA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hajaina ny vadiny rehefa mivory eo am-bavahady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miara-midinika amin’ireo loholon’ny tanàna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: SAMEKA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Manao akanjo izy ka mivarotra izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandafo fehikibo amin’ny mpandranto koa izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: HAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Hery sy haja no iravahany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahataitra azy ny hoavy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: PE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Miteny amim-pahendrena izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manoro hevitra amim-pitiavana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: TSADE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Manara-maso izay fizotry ny ankohonany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy malaina manomana ny sakafo hohaniny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: KÔFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny zanany miara-miantso azy hoe sambatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny vadiny midera azy manao hoe:'
- type: usfm
  marker: s1
  children:
  - type: text
    text: RESA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: «Maro ny vehivavy miseho ho mahavatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa manoatra noho izy rehetra ianao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: SINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mamitaka ny bika ary mandalo ny hatsaran-tarehy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vehivavy manaja ny TOMPO ihany no hoderaina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: TAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Hanomezam-pankasitrahana azy anie ny tombontsoa azony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hideran’ny besinimaro azy anie ny zava-bitany!
