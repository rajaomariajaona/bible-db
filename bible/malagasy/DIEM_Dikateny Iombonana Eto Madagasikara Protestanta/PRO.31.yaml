document_id: PRO.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Torohevitra ho an’ny mpanjaka
  - type: text
    content: Izao no torohevitra izay noraisin’i Lemoela mpanjakan’i Masà tamin-dreniny
  - type: note
    content: Dkt hafa Izao no torohevitra, dia ny hafatra mavesa-danja izay noraisin’i Lemoela mpanjaka tamin-dreniny.
  - type: text
    content: ':'
  '10':
  - type: text
    content: Iza no mahita vehivavy mahavatra?
  - type: text
    content: Fa ny hasarobidiny dia mihoatra noho ny perla.
  - type: heading
    content: BETA
  '11':
  - type: text
    content: Matoky azy tanteraka ny vadiny,
  - type: text
    content: satria tsy mandanilany fananana izy.
  - type: heading
    content: GIMELA
  '12':
  - type: text
    content: Tsy manao ratsy aminy ravehivavy
  - type: text
    content: fa manao izay hahasambatra azy kosa
  - type: text
    content: mandritra ny andro rehetra iainany.
  - type: heading
    content: DALETA
  '13':
  - type: text
    content: Mitady volon’ondry sy kiran-drongony izy
  - type: text
    content: ary miasa araka ny fahakingan’ny tanany.
  - type: heading
    content: HE
  '14':
  - type: text
    content: Tahaka ny sambon’ny mpandranto izy
  - type: text
    content: ka mitondra ny haniny avy lavitra.
  - type: heading
    content: VAO
  '15':
  - type: text
    content: Mifoha mbola maizina izy,
  - type: text
    content: ka mikarakara ny sakafon’ny ankohonany
  - type: text
    content: sy mitsinjara ny asan’ny mpanompovaviny.
  - type: heading
    content: ZAINA
  '16':
  - type: text
    content: Mandinika tsara izy vao mividy saha
  - type: text
    content: ary mamboly voaloboka amin’ny tombontsoa azony.
  - type: heading
    content: PETA
  '17':
  - type: text
    content: Misikina herimpo izy
  - type: text
    content: fa tsy mba miraviravy tanana.
  - type: heading
    content: TETA
  '18':
  - type: text
    content: Tsapany ny fandrosoan’ny raharahany
  - type: text
    content: ka tsy maty jiro mandritra ny alina izy.
  - type: heading
    content: JODA
  '19':
  - type: text
    content: Miasa mamoly volon’ondry ny tanany
  - type: text
    content: ary manenona lamba ny rantsan-tanany.
  - type: heading
    content: KAFA
  '2':
  - type: text
    content: «Inona, anaka, inona no holazaiko anao
  - type: text
    content: zanako naterako izay efa nangatahiko am-bavaka?
  '20':
  - type: text
    content: Manatsotra ny tanany amin’ny ory izy
  - type: text
    content: ary malala-tanana amin’ny mahantra.
  - type: heading
    content: LAMEDA
  '21':
  - type: text
    content: Tsy ahiany amin’izay oram-panala ny ankohonany,
  - type: text
    content: fa voatafy mafana avokoa ny ao an-tranony.
  - type: heading
    content: MEMA
  '22':
  - type: text
    content: Manao firakotra ho an’ny tenany izy;
  - type: text
    content: ny fitafiany dia rongony fotsy sy volomparasy.
  - type: heading
    content: NONA
  '23':
  - type: text
    content: Hajaina ny vadiny rehefa mivory eo am-bavahady
  - type: text
    content: ka miara-midinika amin’ireo loholon’ny tanàna.
  - type: heading
    content: SAMEKA
  '24':
  - type: text
    content: Manao akanjo izy ka mivarotra izany;
  - type: text
    content: mandafo fehikibo amin’ny mpandranto koa izy.
  - type: heading
    content: HAINA
  '25':
  - type: text
    content: Hery sy haja no iravahany;
  - type: text
    content: ary tsy mahataitra azy ny hoavy.
  - type: heading
    content: PE
  '26':
  - type: text
    content: Miteny amim-pahendrena izy
  - type: text
    content: ary manoro hevitra amim-pitiavana.
  - type: heading
    content: TSADE
  '27':
  - type: text
    content: Manara-maso izay fizotry ny ankohonany izy
  - type: text
    content: ka tsy malaina manomana ny sakafo hohaniny.
  - type: heading
    content: KÔFA
  '28':
  - type: text
    content: Ny zanany miara-miantso azy hoe sambatra,
  - type: text
    content: 'ary ny vadiny midera azy manao hoe:'
  - type: heading
    content: RESA
  '29':
  - type: text
    content: «Maro ny vehivavy miseho ho mahavatra,
  - type: text
    content: fa manoatra noho izy rehetra ianao.»
  - type: heading
    content: SINA
  '3':
  - type: text
    content: Aza omena ny vehivavy ny herinao.
  - type: text
    content: Aoka tsy ireo vehivavy manimba mpanjaka
  - type: text
    content: no hibaiko ny fitondrantenanao!
  '30':
  - type: text
    content: Mamitaka ny bika ary mandalo ny hatsaran-tarehy;
  - type: text
    content: fa ny vehivavy manaja ny TOMPO ihany no hoderaina.
  - type: heading
    content: TAO
  '31':
  - type: text
    content: Hanomezam-pankasitrahana azy anie ny tombontsoa azony
  - type: text
    content: ary hideran’ny besinimaro azy anie ny zava-bitany!
  '4':
  - type: text
    content: Tsy mety amin’ny mpanjaka, ry Lemoela,
  - type: text
    content: tsy mety amin’ny mpanjaka na mpifehy
  - type: text
    content: ny miboboka divay na toaka.
  '5':
  - type: text
    content: Fa raha miboboka izany izy,
  - type: text
    content: dia hanadino ny fampiharan-dalàna
  - type: text
    content: ary hamadika ny zon’ireo olona mahantra.
  '6':
  - type: text
    content: Aoka izay efa ho faty no homena toaka
  - type: text
    content: ary izay fadiranovana no hotoloran-divay;
  '7':
  - type: text
    content: dia hiboboka izy hanadinoany ny fahoriany
  - type: text
    content: ary tsy hahatsiarovany ny fahantrany intsony.
  '8':
  - type: text
    content: Sokafy ny vavanao hiaro izay tsy afa-miteny
  - type: text
    content: sy hiady ho an’ny olona rehetra tsy mana-mpiahy.
  '9':
  - type: text
    content: Sokafy ny vavanao mba hitsara araka ny marina
  - type: text
    content: ary hiady ho an’ny ory sy ny mahantra
  - type: note
    content: And 4-5 sy 8-9; jereo 16.10-12, 1 Mp 3.28; Sal 72.1-4.
  - type: text
    content: ».
  - type: heading
    content: Ny vehivavy mahay
  - type: heading
    content: ALEFA
