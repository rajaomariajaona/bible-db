document_id: EXO.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanambaràna ny loza farany
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Mbola asiako loza iray farany ny '
  - type: text
    content: Farao
  - type: text
    content: ' sy ny Ejiptianina. Aorian’izany vao halefany handeha ianareo; ary horoahiny tanteraka aza ianareo hiala eto. '
  '10':
  - type: text
    content: I Mosesy sy i Aharôna anefa dia efa nanao zava-mahagaga maro teo anatrehan’ny Farao, saingy ny TOMPO dia nanamafy fo ny Farao ka tsy nandefa ny Israelita hiala tao amin’ny taniny izy.
  '2':
  - type: text
    content: Koa ambarao amin’ny Israelita fa ny tsirairay na lahy na vavy dia aoka samy hangataka firavaka sy volamena amin’ny Ejiptianina akaiky azy avy.
  '3':
  - type: text
    content: Nataon’ny TOMPO nahita sitraka teo imason’ny Ejiptianina ny Israelita. I Mosesy koa dia lehilahy najaina fatratra tany Ejipta na teo amin’ny tandapan’ny Farao na teo amin’ny vahoaka Ejiptianina.
  '4':
  - type: text
    content: 'Ka hoy i Mosesy tamin’ny Farao:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Rehefa tokony ho misasakalina dia hipoitra eo anivon’i Ejipta Aho. '
  '5':
  - type: text
    content: 'Koa ho faty avokoa ny lahimatoa rehetra ao amin’ny tany Ejipta, manomboka amin’ny lahimatoanao Farao izay mipetraka eo amin’ny sezafiandrianany ka hatramin’ny lahimatoan’ny mpanompovavy mpanodina ny fikosoham-bary ary ny lahimatoan’ny biby fiompy rehetra. '
  '6':
  - type: text
    content: 'Hanako eran’i Ejipta ny fidradradradrana lehibe izay tsy mbola nisy toa azy, sady tsy hisy ho toa azy intsony. '
  '7':
  - type: text
    content: 'Fa ao amin’ny Israelita rehetra kosa dia tsy handrenesana na inona na inona, na dia ny vovòn’alika amin’ny olona sy amin’ny biby fiompy aza. Izay no hahafantaranareo fa Izaho TOMPO dia manavaka ny Ejiptianina amin’ny Israelita». '
  '8':
  - type: text
    content: 'Ary ireto mpanomponao ireo dia ho avy hiankohoka eo anatrehako sady hiteny hoe: «Mandehana any ianao sy ny vahoakanao!» Dia handeha miaraka amin’izay aho.'
  - type: text
    content: Dia niala tao amin’ny Farao i Mosesy sady feno hatezerana.
  '9':
  - type: text
    content: 'Ary hoy Koa ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Raha toa tsy mihaino anao ny Farao, dia ny mba hahazoako mampitombo ny zava-mahagaga hataoko eo amin’ny taniny.
