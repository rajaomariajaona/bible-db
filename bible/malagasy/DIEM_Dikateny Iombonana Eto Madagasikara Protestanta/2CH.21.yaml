document_id: 2CH.21,396
type_code: plt
verses:
  '1':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Jôsafata, dia nalevina tao amin’ny fasam-pianakaviany tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ; ary i Jôrama zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: Ny nanjakàn’i Jôrama
  - type: heading
    content: (Jereo 2 Mp 8.16-24)
  '10':
  - type: text
    content: Hatreo dia nizaka tena sady nanohitra ny fahefana jodeanina ny Edômita mandraka androany.
  - type: text
    content: Tamin’izay fotoana izay koa ny tanànan’i Libnà
  - type: note
    content: Jereo 2 Mp 8.22 sy nta.
  - type: text
    content: ' no nikomy nanohitra ny fahefàn’i Jôrama, satria efa nandao ny TOMPO Andriamanitry ny razany izy. '
  '11':
  - type: text
    content: I Jôrama mihitsy no nanao toeram-panasinana teny an-tendrombohitr’i Joda ka nitaona ny mponin’i Jerosalema sy ny Jodeanina hanompo sampy sady hivadika amin’Andriamanitra.
  '12':
  - type: text
    content: 'Ary nisy taratasy avy tamin’i Elià '
  - type: text
    content: mpaminany
  - type: text
    content: ' tonga tao amin’i Jôrama nanambara hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Davida razanao: Tsy nanaraka ny toetran’i Jôsafata rainao na ny an’i Asà mpanjakan’i Joda ianao, '
  '13':
  - type: text
    content: 'fa nanaraka ny toetran’ireo mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' avaratra ka nampanompo sampy ny Jodeanina sy ny mponin’i Jerosalema tahaka ny fanaon’ny taranak’i Ahaba; novoinao ho faty aza ny rahalahinao tera-drainao, izay tsara noho ianao; '
  '14':
  - type: text
    content: 'koa dia hataon’ny TOMPO hiharan-doza goavana ny vahoakanao sy ny zanakao ary ny vadinao sy ny fanananao rehetra. '
  '15':
  - type: text
    content: Ny tenanao ho azon’aretina mafy isan-karazany, indrindra fa aretina amin’ny tsinainao izay hiharatsy miandalana isan’andro isan’andro mandra-piloatra ny tsinainao.»
  '16':
  - type: text
    content: Dia notaomin’ny TOMPO hamely an’i Jôrama ny Filistinina ary koa ny Arabo izay mifanila amin’ny Kosîta
  - type: note
    content: 'Kosîta: mety ilazana ny Etiôpianina izany na mbetika koa ilazana tarika iray mpifindrafindra lasy tao an-taniefitr’i Arabià; ity heviny faharoa ity no mitombina eto.'
  - type: text
    content: '; '
  '17':
  - type: text
    content: niakatra tany Joda ireo ka nisesika tao, ary namabo ny fananana rehetra izay tao an-dapan’ny mpanjaka mbamin’ny zanany sy ny vadiny koa aza. Tsy nisy zanany tavela intsony teo aminy, afa-tsy i Jôahaza faralahiny ihany.
  '18':
  - type: text
    content: 'Taorian’izany rehetra izany, ny namelezan’ny TOMPO an’i Jôrama dia aretina tsy azo sitranina teo amin’ny tsinainy. '
  '19':
  - type: text
    content: Rehefa ela ny ela, nony afaka roa taona, dia niloatra nihahaka ny tsinainy noho ny fiantraikan’ilay aretina; ka maty tamin’ny fangirifiriana mafy i Jôrama. Ary ny vahoakany tsy mba nandoro vovo-javamanitra ho fisaonana azy toy ny natao tamin’ireo razany
  - type: note
    content: Jereo 16.14.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Nanan-drahalahy zanak’i Jôsafata koa i Jôrama, dia i Hazarià sy i Jehiela, i Zakarià sy i Hazarià ary i Mikaela sy i Sefatià; izy rehetra ireo no zanakalahin’i Jôsafata, mpanjakan’i Joda. '
  '20':
  - type: text
    content: Feno 32 taona i Jôrama fony tonga mpanjaka; ary naharitra valo taona no nanjakany tao Jerosalema. Koa lasa nodimandry tsy nisy nalahelo azy izy. Nalevina tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ' ihany i Jôrama, nefa tsy mba tao amin’ny fasan’ireo mpanjaka.'
  '3':
  - type: text
    content: Samy notoloran-drainy fanomezana betsaka izy ireo, dia volafotsy sy volamena ary fanaka sarobidy mbamin’ny fifehezana tanànamimanda sasany tao Joda; fa ny maha-andriamanjaka kosa dia natolony an’i Jôrama, satria izy no lahimatoa.
  '4':
  - type: text
    content: 'Raha vao nandray an-tanana ny fanjakàn-drainy i Jôrama, dia nanamafy ny fahefàny ka namono nahafaty tamin’ny sabatra ny rahalahiny rehetra sy ny mpitondra sasany teo amin’i Israely. '
  '5':
  - type: text
    content: 'Feno 32 taona i Jôrama fony tonga mpanjaka; ary naharitra valo taona no nanjakany tao Jerosalema. '
  '6':
  - type: text
    content: 'Nanaraka ny toetran’ireo mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' avaratra izy, dia tahaka ny nataon’ireo taranak’i Ahaba, fa zanakavavin’i Ahaba'
  - type: note
    content: I Hatalià izany, jereo 22.2.
  - type: text
    content: ' no vadiny; eny, nanao izay ratsy eo imason’ny TOMPO i Jôrama. '
  '7':
  - type: text
    content: 'Kanefa ny TOMPO tsy te handringana ny taranak’i Davida noho ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataony tamin’i Davida sy ny nilazany fa homeny jiro mandrakizay'
  - type: note
    content: Izany jiro mandrakizay izany dia ny fahefà-manjaka ao Jerosalema hatrany hatrany. Jereo 1 Mp 11.36.
  - type: text
    content: ' izy sy ny taranany.'
  '8':
  - type: text
    content: Tamin’ny andron’i Jôrama no nikomian’ny Edômita tamin’ny fahefana jodeanina
  - type: note
    content: Jereo Gen 27.40.
  - type: text
    content: ' ka nananganany mpanjaka ho azy. '
  '9':
  - type: text
    content: 'Niainga manko i Jôrama sy ireo manamboninahiny ary ny kalesiny rehetra; nony voahodidin’ny Edômita ny tenany mbamin’ireo komandin-kalesiny, dia voatery nitsoaka nanao latsaka alina tamin’ny Edômita. '
