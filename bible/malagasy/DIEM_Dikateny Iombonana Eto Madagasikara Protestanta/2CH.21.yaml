document_id: 2CH.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany i Jôsafata, dia nalevina tao amin’ny fasam-pianakaviany tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tanànan’i Davida
    - type: text
      text: ; ary i Jôrama zanany lahy no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakàn’i Jôrama
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 8.16-24)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatreo dia nizaka tena sady nanohitra ny fahefana jodeanina ny Edômita mandraka androany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay fotoana izay koa ny tanànan’i Libnà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 8.22 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' no nikomy nanohitra ny fahefàn’i Jôrama, satria efa nandao ny TOMPO Andriamanitry ny razany izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jôrama mihitsy no nanao toeram-panasinana teny an-tendrombohitr’i Joda ka nitaona ny mponin’i Jerosalema sy ny Jodeanina hanompo sampy sady hivadika amin’Andriamanitra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy taratasy avy tamin’i Elià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' tonga tao amin’i Jôrama nanambara hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Davida razanao: Tsy nanaraka ny toetran’i Jôsafata rainao na ny an’i Asà mpanjakan’i Joda ianao, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nanaraka ny toetran’ireo mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' avaratra ka nampanompo sampy ny Jodeanina sy ny mponin’i Jerosalema tahaka ny fanaon’ny taranak’i Ahaba; novoinao ho faty aza ny rahalahinao tera-drainao, izay tsara noho ianao; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa dia hataon’ny TOMPO hiharan-doza goavana ny vahoakanao sy ny zanakao ary ny vadinao sy ny fanananao rehetra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tenanao ho azon’aretina mafy isan-karazany, indrindra fa aretina amin’ny tsinainao izay hiharatsy miandalana isan’andro isan’andro mandra-piloatra ny tsinainao.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia notaomin’ny TOMPO hamely an’i Jôrama ny Filistinina ary koa ny Arabo izay mifanila amin’ny Kosîta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kosîta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mety ilazana ny Etiôpianina izany na mbetika koa ilazana tarika iray mpifindrafindra lasy tao an-taniefitr’i Arabià; ity heviny faharoa ity no mitombina eto.
      marker-yv: yv-n
    - type: text
      text: '; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: niakatra tany Joda ireo ka nisesika tao, ary namabo ny fananana rehetra izay tao an-dapan’ny mpanjaka mbamin’ny zanany sy ny vadiny koa aza. Tsy nisy zanany tavela intsony teo aminy, afa-tsy i Jôahaza faralahiny ihany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany rehetra izany, ny namelezan’ny TOMPO an’i Jôrama dia aretina tsy azo sitranina teo amin’ny tsinainy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa ela ny ela, nony afaka roa taona, dia niloatra nihahaka ny tsinainy noho ny fiantraikan’ilay aretina; ka maty tamin’ny fangirifiriana mafy i Jôrama. Ary ny vahoakany tsy mba nandoro vovo-javamanitra ho fisaonana azy toy ny natao tamin’ireo razany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.14.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanan-drahalahy zanak’i Jôsafata koa i Jôrama, dia i Hazarià sy i Jehiela, i Zakarià sy i Hazarià ary i Mikaela sy i Sefatià; izy rehetra ireo no zanakalahin’i Jôsafata, mpanjakan’i Joda. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Feno 32 taona i Jôrama fony tonga mpanjaka; ary naharitra valo taona no nanjakany tao Jerosalema. Koa lasa nodimandry tsy nisy nalahelo azy izy. Nalevina tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tanànan’i Davida
    - type: text
      text: ' ihany i Jôrama, nefa tsy mba tao amin’ny fasan’ireo mpanjaka.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samy notoloran-drainy fanomezana betsaka izy ireo, dia volafotsy sy volamena ary fanaka sarobidy mbamin’ny fifehezana tanànamimanda sasany tao Joda; fa ny maha-andriamanjaka kosa dia natolony an’i Jôrama, satria izy no lahimatoa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao nandray an-tanana ny fanjakàn-drainy i Jôrama, dia nanamafy ny fahefàny ka namono nahafaty tamin’ny sabatra ny rahalahiny rehetra sy ny mpitondra sasany teo amin’i Israely. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Feno 32 taona i Jôrama fony tonga mpanjaka; ary naharitra valo taona no nanjakany tao Jerosalema. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanaraka ny toetran’ireo mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' avaratra izy, dia tahaka ny nataon’ireo taranak’i Ahaba, fa zanakavavin’i Ahaba'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I Hatalià izany, jereo 22.2.
      marker-yv: yv-n
    - type: text
      text: ' no vadiny; eny, nanao izay ratsy eo imason’ny TOMPO i Jôrama. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ny TOMPO tsy te handringana ny taranak’i Davida noho ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' nataony tamin’i Davida sy ny nilazany fa homeny jiro mandrakizay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Izany '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'jiro mandrakizay '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany dia ny fahefà-manjaka ao Jerosalema hatrany hatrany. Jereo 1 Mp 11.36.
      marker-yv: yv-n
    - type: text
      text: ' izy sy ny taranany.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny andron’i Jôrama no nikomian’ny Edômita tamin’ny fahefana jodeanina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 27.40.
      marker-yv: yv-n
    - type: text
      text: ' ka nananganany mpanjaka ho azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niainga manko i Jôrama sy ireo manamboninahiny ary ny kalesiny rehetra; nony voahodidin’ny Edômita ny tenany mbamin’ireo komandin-kalesiny, dia voatery nitsoaka nanao latsaka alina tamin’ny Edômita. '
