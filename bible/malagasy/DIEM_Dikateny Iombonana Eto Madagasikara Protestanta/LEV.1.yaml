      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Rehefa ondry na osy no atolotra ho sorona dorana manontolo, dia ondrilahy sy osilahy tsy misy kilema no aoka hatolotra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mpanolotra no hamono azy eo avaratry ny alitara, eo anoloan’ny Toeramasin’ny TOMPO: fa ireo mpisorona taranak’i Aharôna kosa hamafy ny ra manodidina eo amin’ny rindrin’ny alitara. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mpanolotra no hanao rasa vaventy azy sy hanesotra ny lohany sy ny taviny; fa mpisorona anankiray kosa no handahatra ireny eo ambonin’ny kitay izay napetraka tambony vainafo eo amin’ny alitara. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mpanolotra no hanasa ny taovany sy ny tongony; fa ilay mpisorona kosa no hitondra azy rehetra ka handoro azy hanetona eo ambonin’ny alitara. Sorona dorana manontolo izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Rehefa vorona no atolotra ho sorona dorana manontolo amin’ny TOMPO, dia domohina na voromahailala no aoka hatolotra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoentin’ny mpisorona ho eo amin’ny alitara izany, ka hotapahiny ny lohany, dia hodorany hanetona eo ambonin’ny alitara; ary hofiazany hiraraka eo amin’ny rindrin’ny alitara ny rany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoesoriny ny takorobabony mbamin’ny ao anatiny, ka hararany eo atsinanan’ny alitara, eo amin’ny fitobian-davenona; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary hosamahiny anelanelan’ny elany fa tsy hosarahiny roa tanteraka ilay vorona, ka hodorany hanetona eo ambonin’ny alitara, dia eo ambonin’ny kitay izay napetraka tambony vainafo. Sorona dorana manontolo izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO.
  '2':
  - type: usfm
    marker: p
