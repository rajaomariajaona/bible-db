segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: NY FOMBA FANOLORAN-TSORONA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sorona dorana manontolo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niantso an’i Mosesy ny TOMPO ka niteny taminy avy ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Rehefa misy aminareo te hanolotra biby fiompy ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' amin’ny TOMPO, dia omby na ondry na osy no aoka hatolony ho sorona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: «Raha omby no atolotra ho sorona dorana manontolo, dia ombilahy tsy misy kilema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 22.18-20
    marker-yv: yv-n
  - type: text
    text: ' no aoka hatolotra; eo anoloan’ny varavaran’ny Tranolay fihaonana no hitondrany azy mba hankasitrahina eo anatrehan’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay mpanolotra no hametra-tanana eo amin’ny lohan’ilay omby hatao sorona; dia hankasitrahina izany mba hahazoany famelan-keloka. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izy ihany no hamono ilay omby eo anoloan’ny *
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasin
  - type: text
    text: '’ny TOMPO; fa ireo mpisorona taranak’i Aharôna kosa hitondra ny ra ka hamafy azy manodidina eo amin’ny rindrin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ', dia ilay alitara izay eo anoloan’ny Tranolay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay mpanolotra no hanenda-koditra ilay omby sy hanao rasa vaventy azy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa ireo taranak’i Aharôna mpisorona kosa hanisy vainafo eo ambonin’ny alitara ka handahatra kitay eo ambonin’ny vainafo; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary mbola ny mpisorona taranak’i Aharôna ihany no handahatra eo ambonin’ireo kitay ireo ny omby voarasa mbamin’ny lohany sy ny taviny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mpanolotra no hanasa amin’ny rano ny taovany sy tongony; fa mpisorona anankiray kosa no handoro azy rehetra hanetona eo ambonin’ny alitara. Sorona dorana manontolo izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Rehefa ondry na osy no atolotra ho sorona dorana manontolo, dia ondrilahy sy osilahy tsy misy kilema no aoka hatolotra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay mpanolotra no hamono azy eo avaratry ny alitara, eo anoloan’ny Toeramasin’ny TOMPO: fa ireo mpisorona taranak’i Aharôna kosa hamafy ny ra manodidina eo amin’ny rindrin’ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izay mpanolotra no hanao rasa vaventy azy sy hanesotra ny lohany sy ny taviny; fa mpisorona anankiray kosa no handahatra ireny eo ambonin’ny kitay izay napetraka tambony vainafo eo amin’ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mpanolotra no hanasa ny taovany sy ny tongony; fa ilay mpisorona kosa no hitondra azy rehetra ka handoro azy hanetona eo ambonin’ny alitara. Sorona dorana manontolo izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Rehefa vorona no atolotra ho sorona dorana manontolo amin’ny TOMPO, dia domohina na voromahailala no aoka hatolotra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoentin’ny mpisorona ho eo amin’ny alitara izany, ka hotapahiny ny lohany, dia hodorany hanetona eo ambonin’ny alitara; ary hofiazany hiraraka eo amin’ny rindrin’ny alitara ny rany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoesoriny ny takorobabony mbamin’ny ao anatiny, ka hararany eo atsinanan’ny alitara, eo amin’ny fitobian-davenona; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary hosamahiny anelanelan’ny elany fa tsy hosarahiny roa tanteraka ilay vorona, ka hodorany hanetona eo ambonin’ny alitara, dia eo ambonin’ny kitay izay napetraka tambony vainafo. Sorona dorana manontolo izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO.
