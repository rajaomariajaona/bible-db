verses:
  '1':
  - type: heading
    content: NY FOMBA FANOLORAN-TSORONA
  - type: heading
    content: Ny sorona dorana manontolo
  - type: text
    content: 'Niantso an’i Mosesy ny TOMPO ka niteny taminy avy ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' '
  '10':
  - type: text
    content: '«Rehefa ondry na osy no atolotra ho sorona dorana manontolo, dia ondrilahy sy osilahy tsy misy kilema no aoka hatolotra. '
  '11':
  - type: text
    content: 'Izay mpanolotra no hamono azy eo avaratry ny alitara, eo anoloan’ny Toeramasin’ny TOMPO: fa ireo mpisorona taranak’i Aharôna kosa hamafy ny ra manodidina eo amin’ny rindrin’ny alitara. '
  '12':
  - type: text
    content: 'Izay mpanolotra no hanao rasa vaventy azy sy hanesotra ny lohany sy ny taviny; fa mpisorona anankiray kosa no handahatra ireny eo ambonin’ny kitay izay napetraka tambony vainafo eo amin’ny alitara. '
  '13':
  - type: text
    content: Izay mpanolotra no hanasa ny taovany sy ny tongony; fa ilay mpisorona kosa no hitondra azy rehetra ka handoro azy hanetona eo ambonin’ny alitara. Sorona dorana manontolo izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO.
  '14':
  - type: text
    content: '«Rehefa vorona no atolotra ho sorona dorana manontolo amin’ny TOMPO, dia domohina na voromahailala no aoka hatolotra. '
  '15':
  - type: text
    content: 'Hoentin’ny mpisorona ho eo amin’ny alitara izany, ka hotapahiny ny lohany, dia hodorany hanetona eo ambonin’ny alitara; ary hofiazany hiraraka eo amin’ny rindrin’ny alitara ny rany. '
  '16':
  - type: text
    content: 'Dia hoesoriny ny takorobabony mbamin’ny ao anatiny, ka hararany eo atsinanan’ny alitara, eo amin’ny fitobian-davenona; '
  '17':
  - type: text
    content: ary hosamahiny anelanelan’ny elany fa tsy hosarahiny roa tanteraka ilay vorona, ka hodorany hanetona eo ambonin’ny alitara, dia eo ambonin’ny kitay izay napetraka tambony vainafo. Sorona dorana manontolo izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO.
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Rehefa misy aminareo te hanolotra biby fiompy ho '
  - type: text
    content: sorona
  - type: text
    content: ' amin’ny TOMPO, dia omby na ondry na osy no aoka hatolony ho sorona.'
  '3':
  - type: text
    content: «Raha omby no atolotra ho sorona dorana manontolo, dia ombilahy tsy misy kilema
  - type: note
    content: Jereo 22.18-20
  - type: text
    content: ' no aoka hatolotra; eo anoloan’ny varavaran’ny Tranolay fihaonana no hitondrany azy mba hankasitrahina eo anatrehan’ny TOMPO. '
  '4':
  - type: text
    content: 'Izay mpanolotra no hametra-tanana eo amin’ny lohan’ilay omby hatao sorona; dia hankasitrahina izany mba hahazoany famelan-keloka. '
  '5':
  - type: text
    content: Izy ihany no hamono ilay omby eo anoloan’ny *
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO; fa ireo mpisorona taranak’i Aharôna kosa hitondra ny ra ka hamafy azy manodidina eo amin’ny rindrin’ny '
  - type: text
    content: alitara
  - type: text
    content: ', dia ilay alitara izay eo anoloan’ny Tranolay fihaonana. '
  '6':
  - type: text
    content: 'Izay mpanolotra no hanenda-koditra ilay omby sy hanao rasa vaventy azy; '
  '7':
  - type: text
    content: 'fa ireo taranak’i Aharôna mpisorona kosa hanisy vainafo eo ambonin’ny alitara ka handahatra kitay eo ambonin’ny vainafo; '
  '8':
  - type: text
    content: 'ary mbola ny mpisorona taranak’i Aharôna ihany no handahatra eo ambonin’ireo kitay ireo ny omby voarasa mbamin’ny lohany sy ny taviny. '
  '9':
  - type: text
    content: Izay mpanolotra no hanasa amin’ny rano ny taovany sy tongony; fa mpisorona anankiray kosa no handoro azy rehetra hanetona eo ambonin’ny alitara. Sorona dorana manontolo izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO.
