document_id: MAT.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanaon-drazana jiosy
  - type: heading
    content: (Jereo Mk 7.1-13)
  - type: text
    content: 'Tamin’izay dia nisy '
  - type: text
    content: Farisianina
  - type: text
    content: ' sy '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' avy tany Jerosalema, nanatona an’i Jesoa ary nanontany Azy hoe:'
  '10':
  - type: text
    content: 'Dia nantsoin’i Jesoa hankeo aminy kosa ny vahoaka sady nilazany hoe:'
  - type: text
    content: '–Mihainoa ka mahafantara: '
  '11':
  - type: text
    content: Tsy izay miditra ao am-bavan’ny olona no mahaloto azy; fa izay aloaky ny vavan’ny olona no mahaloto azy.
  '12':
  - type: text
    content: 'Tamin’izay dia nanatona an’i Jesoa ny '
  - type: text
    content: mpianany
  - type: text
    content: ', ka nanao taminy hoe:'
  - type: text
    content: '–Fantatrao ve fa tezitra mafy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' raha nandre izany teny izany?'
  '13':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Ny voly rehetra tsy nambolen’ny Raiko Izay any an-danitra dia hongotana. '
  '14':
  - type: text
    content: Avelao any ireo, fa jamba mitantana jamba; ary raha misy jamba mifampitantana, dia hifamarina an-kady.
  '15':
  - type: text
    content: 'Dia niteny i Petera ka nanao taminy hoe:'
  - type: text
    content: –Hazavao aminay ny hevitr’ilay fanoharana teo.
  '16':
  - type: text
    content: 'Dia hoy i Jesoa:'
  - type: text
    content: '–Ianareo koa ve tsy mahafantatra mandrak’izao? '
  '17':
  - type: text
    content: 'Tsy takatrareo ve fa izay rehetra miditra ao am-bava dia lasa any an-kibo ka alefa any amin’ny fanariana azy. '
  '18':
  - type: text
    content: 'Fa izay aloaky ny vava kosa dia mipoitra avy ao am-po, ary izany no mahaloto ny olona. '
  '19':
  - type: text
    content: 'Satria avy ao am-pon’ny olona no ipoiran’ny sain-dratsy mahatonga azy hamono olona, haka vadin’olona, hijangajanga, hangalatra, hanao vavolombelona tsy marina, ary hanao vava ratsy. '
  '2':
  - type: text
    content: '–Nahoana ny '
  - type: text
    content: mpianatrao
  - type: text
    content: ' no mandika ny fomba amam-panao nampitain’ny razantsika? Tsy mba manasa tanana araka ny fomba ara-pivavahana manko ny mpianatrao raha hihinan-kanina'
  - type: note
    content: 'manasa tanana... raha hihinan-kanina: toa fomba fanao ara-pivavahana fotsiny tany am-boalohany sady voatokana ho an’ny mpisorona (Eks 30.18-21; Deot 21.6), nefa dia nitarin’ireo Farisianina ho an’ny olona tsotra ka nampiharina hatrany amin’ny fiainana andavanandro. Ampit Lk 11.38.'
  - type: text
    content: '!'
  '20':
  - type: text
    content: Izany no mahaloto ny olona; fa ny mihinana tsy misasa tanana, tsy mba mahaloto ny olona.
  - type: heading
    content: Ilay vehivavy kanahanita manam-pinoana
  - type: heading
    content: (Jereo Mk 7.24-30)
  '21':
  - type: text
    content: 'Dia niala teo i Jesoa ary nankany amin’ny faritanin’i Tiro sy i Sidôna. '
  '22':
  - type: text
    content: Ary indro nisy vehivavy kanahanita
  - type: note
    content: Ireo Fenisianina tamin’iny faritra iny, faha-Jesoa, dia nitonon-tena ho Kanahanita. Tsy Jiosy ity vehivavy tantaraina eto ity kanefa mety efa nandre laza an’i Jesoa ihany.
  - type: text
    content: ', avy amin’izany faritany izany, tonga teo amin’i Jesoa sady niantsoantso mafy hoe:'
  - type: text
    content: '–Mamindrà fo amiko, ry Tompo, '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: ' ô; fa ampahorîn’ny demony mafy loatra ny zanako vavy!'
  '23':
  - type: text
    content: 'Tsy namaly teny azy i Jesoa, ka nohatonin’ny mpianany ary nangatahany hoe:'
  - type: text
    content: –Omeo an-dramatoa io izay tadiaviny
  - type: note
    content: 'Omeo an-dramatoa io izay tadiaviny: dkt hafa roahy any ramatoa io (ara-bakiteny kokoa).'
  - type: text
    content: ', satria miantsoantso mafy manjohy antsika izy.'
  '24':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Tsy nirahina Aho afa-tsy amin’ireo '
  - type: text
    content: ondry
  - type: text
    content: ' very, dia ny vahoaka Israely'
  - type: note
    content: Ampit 10.5-6.
  - type: text
    content: '!'
  '25':
  - type: text
    content: 'Tonga niankohoka teo anatrehan’i Jesoa anefa ravehivavy ka nanao hoe:'
  - type: text
    content: –Tompo ô, ampio re aho!
  '26':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Tsy mety raha mofon-jaza no alaina ka atsipy ho an’ny amboakely.
  '27':
  - type: text
    content: 'Fa hoy kosa ravehivavy:'
  - type: text
    content: –Marina izany, Tompoko, kanefa na ny amboakely aza dia mba mihinana ny sombintsombiny latsaka avy amin’ny latabatry ny tompony ihany.
  '28':
  - type: text
    content: 'Tamin’izay dia niteny i Jesoa nanao taminy hoe:'
  - type: text
    content: –Lehibe ny finoanao, ramatoa; aoka ho tonga aminao araka izay irînao.
  - type: text
    content: Ary nanomboka tamin’io ora io dia sitrana ilay zanany vavy.
  - type: heading
    content: Sitranin’i Jesoa ireo marary maro
  '29':
  - type: text
    content: 'Niainga avy teo i Jesoa dia lasa nankany amoron’ny farihin’i Galilea, ary niakatra nankeo an-tendrombohitra ka nipetraka teo. '
  '3':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Nahoana kosa ianareo no mandika ny didin’Andriamanitra mba hifikiranareo amin’ny fomba amam-panaonareo? '
  '30':
  - type: text
    content: 'Ary nisy vahoaka betsaka nanatona Azy sady nitondra ny mandringa, ny jamba, ny kilemaina, ny moana, mbamin’ny maro hafa koa; napetraka teo an-tongotr’i Jesoa ireo marary ireo ka nositraniny. '
  '31':
  - type: text
    content: 'Gaga ny vahoaka raha nahita ny moana niteny, ny kilemaina nanjary tomady, ny mandringa nandeha tsara sy ny jamba nahiratra, ka dia nanome voninahitra an’ilay Andriamanitr’i '
  - type: text
    content: Israely
  - type: text
    content: .
  - type: heading
    content: Omen’i Jesoa sakafo ny olona mihoatra ny efatra arivo
  - type: heading
    content: (Jereo Mk 8.1-10)
  '32':
  - type: text
    content: 'Dia nantsoin’i Jesoa ny '
  - type: text
    content: mpianany
  - type: text
    content: ' hankeo aminy ka nilazany hoe:'
  - type: text
    content: –Mahonena Ahy ireto vahoaka, satria efa telo andro izao no teto amiko, ka tsy manan-kohanina intsony; ary tsy tiako halefa mody tsy misakafo, fandrao reraka eny an-dalana.
  '33':
  - type: text
    content: 'Dia hoy ny mpianatra taminy:'
  - type: text
    content: –Aiza no hahitantsika mofo hahavoky vahoaka be toy izao atỳ an-taniefitra atỳ?
  '34':
  - type: text
    content: 'Hoy kosa i Jesoa tamin’ny mpianany:'
  - type: text
    content: –Misy mofo firy any aminareo?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Fito, ary koa trondro madinika vitsivitsy!
  '35':
  - type: text
    content: 'Dia nasain’i Jesoa nipetraka tamin’ny tany ireto vahoaka. '
  '36':
  - type: text
    content: 'Ary noraisin’i Jesoa ny mofo fito sy ny trondro; ka rehefa avy nisaotra an’Andriamanitra Izy, dia nanapaka ny mofo sy ny trondro ary nanome azy ny mpianatra; ny mpianatra kosa nandroso izany tamin’ny vahoaka. '
  '37':
  - type: text
    content: 'Dia samy nihinana avokoa izy rehetra ka voky. Ary nangonina ny tapa-mofo aman-trondro ambiny ka nahafeno harona fito. '
  '38':
  - type: text
    content: Nefa dia efatra arivo ny vatan-dehilahy nihinana teo, afa-tsy ny zaza amam-behivavy.
  '39':
  - type: text
    content: Dia nalefan’i Jesoa hody ny vahoaka. Avy eo niondrana an-tsambokely Izy ary lasa nankany amin’ny faritany atao hoe Magadàna
  - type: note
    content: I Magadàna dia toerana tsy fantatra mazava tsara; misy stf sasany ahitana hoe Magdalà.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Fa hoy Andriamanitra hoe: «Hajao ny rainao sy ny reninao», ary koa hoe: «Izay miteny ratsy ny rainy na ny reniny dia aoka hovonoin-ko faty'
  - type: note
    content: Jereo Eks 20.12; Deot 5.16; Eks 21.17; Lev 20.9.
  - type: text
    content: '.» '
  '5':
  - type: text
    content: 'Ianareo kosa manao hoe: «Na iza na iza hilaza amin’ny rainy na ny reniny hoe: Efa nataoko fanatitra ho an’Andriamanitra ny zavatra tokony hanasoavako anao, '
  '6':
  - type: text
    content: dia tsy mahazo manolotra mari-panajana ho an’ny rainy na ny reniny intsony
  - type: note
    content: 'ny rainy na ny reniny: misy stf sasany ahitana fotsiny hoe ny rainy.'
  - type: text
    content: '.» Koa ny fomba amam-panaonareo no nanafoananareo ny tenin’Andriamanitra. '
  '7':
  - type: text
    content: 'Ry mpihatsaravelatsihy, marina tokoa ny naminanian’i Isaià anareo hoe:'
  '8':
  - type: text
    content: «Ity vahoaka ity, hoy Andriamanitra,
  - type: text
    content: tendro-molotra no anajany Ahy
  - type: text
    content: fa ny fony kosa lavitra Ahy mihitsy;
  '9':
  - type: text
    content: ka poaka àty ny fivavahana ataony amiko,
  - type: text
    content: satria didin’olombelona no ambarany
  - type: text
    content: ho fampianarako
  - type: note
    content: Is 29.13, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  - type: heading
    content: Ny zavatra tena mahaloto ny olona
  - type: heading
    content: (Jereo Mk 7.14-23)
