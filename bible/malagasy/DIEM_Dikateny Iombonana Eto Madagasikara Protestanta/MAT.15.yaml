document_id: MAT.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanaon-drazana jiosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 7.1-13)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izay dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' avy tany Jerosalema, nanatona an’i Jesoa ary nanontany Azy hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nantsoin’i Jesoa hankeo aminy kosa ny vahoaka sady nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mihainoa ka mahafantara: '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tsy izay miditra ao am-bavan’ny olona no mahaloto azy; fa izay aloaky ny vavan’ny olona no mahaloto azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tamin’izay dia nanatona an’i Jesoa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ', ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatrao ve fa tezitra mafy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' raha nandre izany teny izany?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny voly rehetra tsy nambolen’ny Raiko Izay any an-danitra dia hongotana. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Avelao any ireo, fa jamba mitantana jamba; ary raha misy jamba mifampitantana, dia hifamarina an-kady.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia niteny i Petera ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hazavao aminay ny hevitr’ilay fanoharana teo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianareo koa ve tsy mahafantatra mandrak’izao? '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tsy takatrareo ve fa izay rehetra miditra ao am-bava dia lasa any an-kibo ka alefa any amin’ny fanariana azy. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa izay aloaky ny vava kosa dia mipoitra avy ao am-po, ary izany no mahaloto ny olona. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Satria avy ao am-pon’ny olona no ipoiran’ny sain-dratsy mahatonga azy hamono olona, haka vadin’olona, hijangajanga, hangalatra, hanao vavolombelona tsy marina, ary hanao vava ratsy. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '–Nahoana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatrao
    - type: text
      text: ' no mandika ny fomba amam-panao nampitain’ny razantsika? Tsy mba manasa tanana araka ny fomba ara-pivavahana manko ny mpianatrao raha hihinan-kanina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'manasa tanana... raha hihinan-kanina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa fomba fanao ara-pivavahana fotsiny tany am-boalohany sady voatokana ho an’ny mpisorona (Eks 30.18-21; Deot 21.6), nefa dia nitarin’ireo Farisianina ho an’ny olona tsotra ka nampiharina hatrany amin’ny fiainana andavanandro. Ampit Lk 11.38.
      marker-yv: yv-n
    - type: text
      text: '!'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Izany no mahaloto ny olona; fa ny mihinana tsy misasa tanana, tsy mba mahaloto ny olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay vehivavy kanahanita manam-pinoana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 7.24-30)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia niala teo i Jesoa ary nankany amin’ny faritanin’i Tiro sy i Sidôna. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary indro nisy vehivavy kanahanita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ireo Fenisianina tamin’iny faritra iny, faha-Jesoa, dia nitonon-tena ho '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kanahanita.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Tsy Jiosy ity vehivavy tantaraina eto ity kanefa mety efa nandre laza an’i Jesoa ihany.'
      marker-yv: yv-n
    - type: text
      text: ', avy amin’izany faritany izany, tonga teo amin’i Jesoa sady niantsoantso mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mamindrà fo amiko, ry Tompo, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’i Davida
    - type: text
      text: ' ô; fa ampahorîn’ny demony mafy loatra ny zanako vavy!'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tsy namaly teny azy i Jesoa, ka nohatonin’ny mpianany ary nangatahany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Omeo an-dramatoa io izay tadiaviny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Omeo an-dramatoa io izay tadiaviny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: roahy any ramatoa io
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (ara-bakiteny kokoa).'
      marker-yv: yv-n
    - type: text
      text: ', satria miantsoantso mafy manjohy antsika izy.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy nirahina Aho afa-tsy amin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ondry
    - type: text
      text: ' very, dia ny vahoaka Israely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 10.5-6.
      marker-yv: yv-n
    - type: text
      text: '!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tonga niankohoka teo anatrehan’i Jesoa anefa ravehivavy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, ampio re aho!
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mety raha mofon-jaza no alaina ka atsipy ho an’ny amboakely.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa hoy kosa ravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Marina izany, Tompoko, kanefa na ny amboakely aza dia mba mihinana ny sombintsombiny latsaka avy amin’ny latabatry ny tompony ihany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tamin’izay dia niteny i Jesoa nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lehibe ny finoanao, ramatoa; aoka ho tonga aminao araka izay irînao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanomboka tamin’io ora io dia sitrana ilay zanany vavy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ireo marary maro
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Niainga avy teo i Jesoa dia lasa nankany amoron’ny farihin’i Galilea, ary niakatra nankeo an-tendrombohitra ka nipetraka teo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana kosa ianareo no mandika ny didin’Andriamanitra mba hifikiranareo amin’ny fomba amam-panaonareo? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary nisy vahoaka betsaka nanatona Azy sady nitondra ny mandringa, ny jamba, ny kilemaina, ny moana, mbamin’ny maro hafa koa; napetraka teo an-tongotr’i Jesoa ireo marary ireo ka nositraniny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Gaga ny vahoaka raha nahita ny moana niteny, ny kilemaina nanjary tomady, ny mandringa nandeha tsara sy ny jamba nahiratra, ka dia nanome voninahitra an’ilay Andriamanitr’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omen’i Jesoa sakafo ny olona mihoatra ny efatra arivo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 8.1-10)
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nantsoin’i Jesoa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' hankeo aminy ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mahonena Ahy ireto vahoaka, satria efa telo andro izao no teto amiko, ka tsy manan-kohanina intsony; ary tsy tiako halefa mody tsy misakafo, fandrao reraka eny an-dalana.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia hoy ny mpianatra taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza no hahitantsika mofo hahavoky vahoaka be toy izao atỳ an-taniefitra atỳ?
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Hoy kosa i Jesoa tamin’ny mpianany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Misy mofo firy any aminareo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fito, ary koa trondro madinika vitsivitsy!
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia nasain’i Jesoa nipetraka tamin’ny tany ireto vahoaka. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary noraisin’i Jesoa ny mofo fito sy ny trondro; ka rehefa avy nisaotra an’Andriamanitra Izy, dia nanapaka ny mofo sy ny trondro ary nanome azy ny mpianatra; ny mpianatra kosa nandroso izany tamin’ny vahoaka. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Dia samy nihinana avokoa izy rehetra ka voky. Ary nangonina ny tapa-mofo aman-trondro ambiny ka nahafeno harona fito. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Nefa dia efatra arivo ny vatan-dehilahy nihinana teo, afa-tsy ny zaza amam-behivavy.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Dia nalefan’i Jesoa hody ny vahoaka. Avy eo niondrana an-tsambokely Izy ary lasa nankany amin’ny faritany atao hoe Magadàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Magadàna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia toerana tsy fantatra mazava tsara; misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Magdalà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa hoy Andriamanitra hoe: «Hajao ny rainao sy ny reninao», ary koa hoe: «Izay miteny ratsy ny rainy na ny reniny dia aoka hovonoin-ko faty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 20.12; Deot 5.16; Eks 21.17; Lev 20.9.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ianareo kosa manao hoe: «Na iza na iza hilaza amin’ny rainy na ny reniny hoe: Efa nataoko fanatitra ho an’Andriamanitra ny zavatra tokony hanasoavako anao, '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: dia tsy mahazo manolotra mari-panajana ho an’ny rainy na ny reniny intsony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny rainy na ny reniny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana fotsiny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny rainy.
      marker-yv: yv-n
    - type: text
      text: '.» Koa ny fomba amam-panaonareo no nanafoananareo ny tenin’Andriamanitra. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ry mpihatsaravelatsihy, marina tokoa ny naminanian’i Isaià anareo hoe:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: «Ity vahoaka ity, hoy Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tendro-molotra no anajany Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fony kosa lavitra Ahy mihitsy;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ka poaka àty ny fivavahana ataony amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria didin’olombelona no ambarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fampianarako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 29.13, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
