document_id: NEH.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lisitr’ireo Jiosy voatendry honina ao Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Niorim-ponenana tao Jerosalema ireo lehiben’ny vahoaka; ary nanaovana antsapaka ny vahoaka sisa mba hahatonga ny ampahafolony honina ao Jerosalema tanàna masina, fa ny sivy toko kosa dia ho any amin’ny tanàna hafa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tamin’ny mpisorona dia ireto avy: i Jedahià, zanakalahin’i Jôiakima; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'i Seraià, zanakalahin’i Hilkià sy zafin’i Mesolama sy zafiafin’i Tsadôka sy zafin-dohalik’i Meraiôta ary zafin-kitrokelin’i Ahitoba mpisorombe; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary koa lehilahy 822 iray tarika amin’i Jedahià sy i Seraià, izay mpiasa teo amin’ny fanaovana ny tranon’Andriamanitra; i Hadaià, zanakalahin’i Jerôhama sy zafin’i Pelahià sy zafiafin’i Ametsy sy zafin-dohalik’i Zakarià sy zafin-kitrokelin’i Pasehora ary zafim-paladian’i Malkià, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary koa lehilahy 242 iray tarika amin’i Hadaià, izay samy loham-pianakaviana avy; i Hamasay, zanakalahin’i Hazarela sy zafin’i Ahezay sy zafiafin’i Meselemôta ary zafin-dohalik’i Imera, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ary koa lehilahy tomady 128 iray tarika amin’i Hamasay, ka ny mpifehy azy dia i Zabdiela zanakalahin’i Gedôlima.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tamin’ny levita dia ireto avy: i Semahià, zanakalahin’i Hasoba sy zafin’i Hazrikama sy zafiafin’i Hasabià ary zafin-dohalik’i Bony; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'i Sabetahy sy i Jôzabada, anisan’ny lohandohan’ny levita sady tonian’ny raharaha teo ivelan’ny tranon’Andriamanitra; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'i Matanià zanakalahin’i Mikà sy zafin’i Zabdy ary zafiafin’i Asafa ka izy no mpiventy ny hira fiderana amin’ny fotoam-pivavahana; i Bakbokià rahalahin’i Matanià sady mpanampy azy amin’ny hira; ary i Habdà, zanakalahin’i Samoa sy zafin’i Galala ary zafiafin’i Jedotona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny levita rehetra, tao amin’ny tanàna masina, dia 284.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny mpiandry varavarana dia i Hakoba sy i Talmôna mbamin’ny namany izay niambina ny vavahady, ka 172 no isany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nisaoran’ny vahoaka manokana ny lehilahy rehetra izay nanolo-tena honina ao Jerosalema.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny sisa tamin’ny Israelita sy ny mpisorona ary ny levita dia teny amin’ny tanàna rehetra tao Joda, samy teo amin’ny zarataniny avy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa ireo mpanampy ny levita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mpanampy ny levita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo Hez 2.55 sy nta. –Hôfela: jereo 2 Tan 27.3 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' dia nonina teo amin’ny faritr’i Hôfela, ka i Tsihà sy i Gispà no nifehy azy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny mpifehy ny levita tao Jerosalema dia i Hozy, zanakalahin’i Banỳ sy zafin’i Hasabià sy zafiafin’i Matanià ary zafin-dohalik’i Mikà; i Hozy dia anisan’ny tarik’i Asafa, ilay tarika mpihira miadidy ny fanompoana ao an-tranon’Andriamanitra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa nisy didin’ny mpanjaka ny amin’ireo mpihira ireo, dia ny handraiketana izay anjara asa hataony isan’andro.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: I Petahià, zanakalahin’i Mesezabela sady anisan’ny terak’i Zera zanakalahin’i Joda, dia teo anilan’ny amperôra mba hiandraikitra ny raharaha rehetra momba ny vahoaka israelita.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Jiosy monina ivelan’i Jerosalema
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ny sasany tamin’ny taranak’i Joda dia nonina tany amin’ireto tanàna teny anivon-tsaha ireto: i Kiriata-Arbà sy ireo tanàna kely miankina aminy, i Dibôna sy ireo tanàna kely miankina aminy, i Kabitseela sy ny tanàna mifanila aminy, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'i Jesoa, i Môladà, i Bety-Peleta, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'i Hatsary-Sohaly, i Beera-Seba sy ireo tanàna kely miankina aminy, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'i Tsiklaga, i Mekônà sy ireo tanàna kely miankina aminy, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'i Haîna-Rimôna, i Tsôrehà, i Jarmota, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ireo lohandohany teo amin’ny faritany no niorim-ponenana tao Jerosalema; fa ny Israelita sarambabem-bahoaka, ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ', ireo mpanampy ny levita sy ireo taranaky ny mpanompon’i Salômôna dia samy tao amin’ny zarataniny aman-tanànany avy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: i Zanôa, i Hadolama sy ny tanàna mifanila aminy, i Lakîsy sy ny saha manodidina azy, i Hazeka sy ireo tanàna kely miankina aminy. Nonina hatrany Beera-Seba any atsimo ka hatramin’ny lohasahan’i Hinôma any avaratra ireo taranak’i Joda ireo.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ny sasany tamin’ny taranak’i Benjamîna kosa dia nonina tamin’ireto tanàna ireto: i Geba, i Mikmasy, i Haià, i Betela sy ireo tanàna kely miankina aminy, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'i Hanatôta, i Nôba, i Hananià, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'i Hatsôra, i Ramà, i Gitaîma, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'i Hadida, i Tsebôhima, i Nebalato, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: i Lôda, i Onao ary ny lohasahan’ny mpahay taozavatra.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ', dia nisy ankolafiny tao Joda lasa nankany Benjamîna'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manjavozavo ny RM eto amin’ity and 36 ity.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Kanefa niorim-ponenana tao Jerosalema koa ny olona sasany tamin’ny taranak’i Joda sy i Benjamîna.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny taranak’i Joda dia ireto avy: i Hataià, anisan’ny terak’i Peretsa noho izy zanakalahin’i Hozià sy zafin’i Zakarià sy zafiafin’i Amarià sy zafin-dohalik’i Sefatià ary zafin-kitrokelin’i Mahalalela; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ary i Mahaseià, anisan’ny terak’i Selà noho izy zanakalahin’i Baròka sy zafin’i Kôla-Hôze sy zafiafin’i Hazaià sy zafin-dohalik’i Hadaià sy zafin-kitrokelin’i Jôiariba ary zafim-paladian’i Zakarià. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Lehilahy olombanona 468 no tontalin’ny terak’i Peretsa tonga nonina tao Jerosalema.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tamin’ny taranak’i Benjamîna dia ireto avy: i Salò, zanakalahin’i Mesolama sy zafin’i Jôheda sy zafiafin’i Pedaià sy zafin-dohalik’i Kôlaià sy zafin-kitrokelin’i Mahaseià sy zafim-paladian’i Itiela ary zafin-dorian’i Jesahià, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'mbamin’ireo lehilahy olombanona mpiray foko aminy: dia 928 no tontalin’ny Benjaminita. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I Jôela, zanakalahin’i Zikry, no mpifehy azy; ary i Joda, zanakalahin’i Senaà, no lefitry ny komandin’ny tanàna. '
