document_id: JOB.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny valintenin’i Jôba (tohiny): mitaraina ny amin’Andriamanitra izy.'
  - type: text
    content: Mafy tahaka ny asa fanompoana
  - type: text
    content: ny fiainan’ny olombelona eto an-tany;
  - type: text
    content: ary toy ny andron’ny mpikarama
  - type: text
    content: no mahamàzana ny androny.
  '10':
  - type: text
    content: Tsy hiverina any an-tranony intsony izy,
  - type: text
    content: ary tsy hahalala azy intsony ny fonenany.
  '11':
  - type: text
    content: Koa tsy hamehy vava hangina intsony aho,
  - type: text
    content: fa misefosefo mafy ka tsy maintsy hiteny
  - type: text
    content: ary tezitra anaty ka voatery hitaraina.
  '12':
  - type: text
    content: Moa ve Ranomasimbe aho sa Dràgon-dranomasina
  - type: note
    content: Eto i Jôba dia mety mampahatsiaro tantara tatsinanana tranainy momba ny fahariana izay milaza fa rehefa resin’Andriamanitra mpahary, ny Ranomasimbe sy ilay Dragon-dranomasina, dia napetrany tamin-toerana tsara ambina mba tsy ho afa-manelingelina intsony. Ampit Is 27.1; Sal 74.13.
  - type: text
    content: no dia ataonao tsara ambina, Andriamanitra ô?
  '13':
  - type: text
    content: Raha ilay mandry eo am-parafara iny aho
  - type: text
    content: ka mba manantena hahita fitoniana sy fampiononana,
  '14':
  - type: text
    content: dia tonga ianao mampitahotra ahy amin’ny nofiratsy,
  - type: text
    content: ary mampihorohoro ahy amin’ny fahitana.
  '15':
  - type: text
    content: Ka dia aleoko kendainao ho faty
  - type: text
    content: toy izay mitofezaka misarin-kàrana.
  '16':
  - type: text
    content: Tsy tantiko intsony, fa tsy ho velona ela aho.
  - type: text
    content: Zava-poana ihany ny androm-piainako!
  - type: text
    content: Koa avelao hilamina amin’izao aho.
  - type: heading
    content: '*'
  '17':
  - type: text
    content: Inona moa ny olona no dia omenao lanja lehibe
  - type: text
    content: ka andrianin’ny fonao aoka izany
  - type: note
    content: Ampit Sal 8.5; 144.3.
  - type: text
    content: '?'
  '18':
  - type: text
    content: Tonga mitsidika azy isa-maraina ianao
  - type: text
    content: sady mizaha toetra azy tsy an-kiato.
  '19':
  - type: text
    content: Rahoviana no hitsahatra ny fijerenao ahy
  - type: text
    content: mba hamelanao ahy vetivety hitelin-drora?
  '2':
  - type: text
    content: Toy ny mpanompo mba maniry alokaloka izy
  - type: text
    content: na tahaka ny mpikarama miandry ny karamany.
  '20':
  - type: text
    content: Na dia ho nanota aza aho,
  - type: text
    content: nampaninona anao moa izany,
  - type: text
    content: ry Mpiambina ny olombelona ô?
  - type: text
    content: Nahoana no dia nataonao lasibatra aho?
  - type: text
    content: Efa tonga enta-mavesatra ho anao ve aho?
  '21':
  - type: text
    content: Nahoana no tsy avelanao ny fahadisoako
  - type: text
    content: ary tsy esorinao ny heloka vitako?
  - type: text
    content: Fa indro efa ho faty aho
  - type: text
    content: ka handry eo amin’ny vovoka;
  - type: text
    content: ary hitady ahy fatratra Ianao
  - type: text
    content: saingy efa tsy izy intsony aho amin’izay.
  '3':
  - type: text
    content: Toy izany koa no nanjo ahy
  - type: text
    content: am-bolana maro nahitam-pahoriana
  - type: text
    content: ary alina nifandimby nizakam-pijaliana.
  '4':
  - type: text
    content: Raha vao mandry aho,
  - type: text
    content: 'dia manao anakampo hoe:'
  - type: text
    content: «Rahoviana aho no hifoha?»
  - type: text
    content: Fa tsy mety tapitra ny alina,
  - type: text
    content: ary mivadibadika aho mandra-maraina.
  '5':
  - type: text
    content: Olitra sy hatina mifangaro vovoka
  - type: text
    content: no mandrakotra ny tenako manontolo;
  - type: text
    content: miempaka sady mandeha nana ny hoditro.
  '6':
  - type: text
    content: Mandalo sy lany tsy misy fanantenana ny androko,
  - type: text
    content: eny, mandalo faingana noho ny famahanan-tenona.
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Mba tsarovy, Andriamanitra ô,
  - type: text
    content: fa tsio-drivotra miserana ny aiko;
  - type: text
    content: tsy hahita fahasambarana intsony ny masoko.
  '8':
  - type: text
    content: Ny masonao izay nijery ahy
  - type: text
    content: dia tsy hahita ahy intsony;
  - type: text
    content: rehefa hizaha ahy ianao,
  - type: text
    content: dia tsy ho eo intsony aho.
  '9':
  - type: text
    content: 'Ny rahona, rehefa misava, dia levona:'
  - type: text
    content: toy izany koa izay midina any an-toeran’ny maty
  - type: text
    content: dia tsy mba hiakatra avy any intsony.
