document_id: JOB.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny valintenin’i Jôba (tohiny): mitaraina ny amin’Andriamanitra izy.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mafy tahaka ny asa fanompoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiainan’ny olombelona eto an-tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny andron’ny mpikarama
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mahamàzana ny androny.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hiverina any an-tranony intsony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hahalala azy intsony ny fonenany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy hamehy vava hangina intsony aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misefosefo mafy ka tsy maintsy hiteny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tezitra anaty ka voatery hitaraina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa ve Ranomasimbe aho sa Dràgon-dranomasina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eto i Jôba dia mety mampahatsiaro tantara tatsinanana tranainy momba ny fahariana izay milaza fa rehefa resin’Andriamanitra mpahary, ny Ranomasimbe sy ilay Dragon-dranomasina, dia napetrany tamin-toerana tsara ambina mba tsy ho afa-manelingelina intsony. Ampit Is 27.1; Sal 74.13.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no dia ataonao tsara ambina, Andriamanitra ô?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ilay mandry eo am-parafara iny aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mba manantena hahita fitoniana sy fampiononana,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga ianao mampitahotra ahy amin’ny nofiratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampihorohoro ahy amin’ny fahitana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia aleoko kendainao ho faty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay mitofezaka misarin-kàrana.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy tantiko intsony, fa tsy ho velona ela aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-poana ihany ny androm-piainako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa avelao hilamina amin’izao aho.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona moa ny olona no dia omenao lanja lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka andrianin’ny fonao aoka izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 8.5; 144.3.
      marker-yv: yv-n
    - type: text
      text: '?'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga mitsidika azy isa-maraina ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mizaha toetra azy tsy an-kiato.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahoviana no hitsahatra ny fijerenao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hamelanao ahy vetivety hitelin-drora?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny mpanompo mba maniry alokaloka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tahaka ny mpikarama miandry ny karamany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ho nanota aza aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampaninona anao moa izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Mpiambina ny olombelona ô?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no dia nataonao lasibatra aho?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tonga enta-mavesatra ho anao ve aho?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no tsy avelanao ny fahadisoako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy esorinao ny heloka vitako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indro efa ho faty aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handry eo amin’ny vovoka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitady ahy fatratra Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy efa tsy izy intsony aho amin’izay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izany koa no nanjo ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: am-bolana maro nahitam-pahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary alina nifandimby nizakam-pijaliana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha vao mandry aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia manao anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Rahoviana aho no hifoha?»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mety tapitra ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mivadibadika aho mandra-maraina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Olitra sy hatina mifangaro vovoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mandrakotra ny tenako manontolo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miempaka sady mandeha nana ny hoditro.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandalo sy lany tsy misy fanantenana ny androko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mandalo faingana noho ny famahanan-tenona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba tsarovy, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsio-drivotra miserana ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hahita fahasambarana intsony ny masoko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonao izay nijery ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hahita ahy intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa hizaha ahy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho eo intsony aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny rahona, rehefa misava, dia levona:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany koa izay midina any an-toeran’ny maty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba hiakatra avy any intsony.
