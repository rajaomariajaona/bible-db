document_id: HOS.14,396
type_code: plt
verses:
  '1':
  - type: text
    content: Hozakain’ny mponin’i Samaria
  - type: note
    content: 'Samaria: jereo 8.5 sy nta. –Amin’ny edisiona sasany ny and 14.1 dia voalahatra 13.16; fa ny 14.2-10 kosa lasa 14.1-9.'
  - type: text
    content: ny vokatry ny heloka nataony
  - type: text
    content: fa nikomy tamin’Andriamaniny izy.
  - type: text
    content: Ho faty an’ady ireo,
  - type: text
    content: ho voatorotoro ny zaza;
  - type: text
    content: ary hotatahina kibo
  - type: text
    content: ny vehivavy bevohòka.
  - type: heading
    content: Ny fanasitranana ny vahoaka rehefa mibebaka
  '10':
  - type: text
    content: Iza no hendry hahafantatra
  - type: text
    content: izany tenin’i Hôsea izany
  - type: note
    content: izany tenin’i Hôsea izany na izany zavatra izany. Io andininy miendrika fehinteny io dia ao anatin’ny antsoina hoe lahatsoratr’olon-kendry. Misy fomba fanoratra mitovitovy amin’izany ao amin’ny faran’ny Sal 107.43 sy ao amin’i Jer 9.11; Koh 8.1.
  - type: text
    content: ','
  - type: text
    content: na lalin-tsaina hahalala ny heviny?
  - type: text
    content: Fa mahitsy ny sori-dalan’ny TOMPO;
  - type: text
    content: ka hizoran’ny olo-marina izany,
  - type: text
    content: saingy hahasolafaka ny mpikomy.
  '2':
  - type: text
    content: Ry Israelita ô, mba miverena
  - type: text
    content: amin’ny TOMPO Andriamanitrareo,
  - type: text
    content: fa ny helokareo no nahalavo anareo.
  '3':
  - type: text
    content: Miverena amin’ny TOMPO
  - type: text
    content: 'ka milazà aminy hoe:'
  - type: text
    content: «Avelao avokoa ny helokay;
  - type: text
    content: ary ho solon’ny vantotr’ombilahy fanolotray
  - type: text
    content: 'dia raiso tsara ireto teninay ireto:'
  '4':
  - type: text
    content: Tsy i Asiria no hahavonjy anay,
  - type: text
    content: tsy hitaingin-tsoavaly izahay;
  - type: text
    content: ary tsy amin’ny sampy asan-tananay intsony
  - type: text
    content: 'no hitenenanay hoe: ‹Ry Andriamanitray ô!›;'
  - type: text
    content: fa Ianao no mamindrafo amin’ny kamboty.»
  '5':
  - type: text
    content: Izaho TOMPO dia hanasitrana
  - type: text
    content: an’ilay Israely amin’ny fiodinany.
  - type: text
    content: Ho tia azy amim-po malalaka Aho;
  - type: text
    content: fa efa nialan’ny fahatezerako izy.
  '6':
  - type: text
    content: Ho tahaka ny ando mahasoa azy Aho;
  - type: text
    content: dia hamony tahaka ny lisy izy
  - type: text
    content: ary hamàka tahaka ny hazon’i Libàno.
  '7':
  - type: text
    content: Hisandrahaka rantsana izy,
  - type: text
    content: ka ho tsara tarehy toy ny hazo ôliva
  - type: text
    content: ary hamerovero toy ny alan’i Libàno.
  '8':
  - type: text
    content: Ho avy indray i Israely,
  - type: text
    content: ka hitoetra eo ambany fiarovako.
  - type: text
    content: Hamboly vary indray izy,
  - type: text
    content: ka hiroborobo tahaka ny voaloboka
  - type: text
    content: sy halaza tahaka ny divay avy any Libàno.
  '9':
  - type: text
    content: Hataon’i Efraîma inona intsony izay sampy?
  - type: text
    content: Izaho TOMPO no mamaly vavaka azy
  - type: text
    content: sady mitandrina azy.
  - type: text
    content: Izaho no toy ny kipreso,
  - type: text
    content: hazo maitso mandavan-taona
  - type: note
    content: 'kipreso, hazo maitso mandavan-taona: hany teny ao amin’ny T.T. izay ampitahana an’Andriamanitra amina hazo masina fanompon’ny fivavahana kanahanita, satria mariky ny fahavokarana.'
  - type: text
    content: .
  - type: text
    content: Izaho no hahazoany vokatra.
