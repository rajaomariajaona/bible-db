document_id: 1CH.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’i Joda, zanakalahin’i Jakôba
  - type: text
    content: Ireto no zanakalahin’i Israely
  - type: note
    content: 'Israely: na hoe Jakôba (jereo 1.34) –and 1-2: ampit Gen 35.23-36; and 3-4: ampit Gen 38; and 9-12: ampit Rot 4.18-22; and 13-15: ampit 1 Sam 16.6-13.'
  - type: text
    content: ': i Reobena sy i Simehôna, i Levỳ sy i Joda, i Jisakara sy i Zebolòna, '
  '10':
  - type: text
    content: 'I Rama no ray niteraka an’i Haminadaba; i Haminadaba no ray niteraka an’i Nahasôna izay filohan’ny taranak’i Joda. '
  '11':
  - type: text
    content: 'I Nahasôna no ray niteraka an’i Salmà; i Salmà no ray niteraka an’i Bôhaza. '
  '12':
  - type: text
    content: 'I Bôhaza no ray niteraka an’i Hôbeda; i Hobeda no ray niteraka an’i Jesè; '
  '13':
  - type: text
    content: 'ary i Jesè no ray niteraka azy fito mirahalahy ireto: dia i Eliaba sy i Abinadaba, i Simehà '
  '14':
  - type: text
    content: 'sy i Natanaela, i Raday '
  '15':
  - type: text
    content: 'sy i Ôtsema ary i Davida. '
  '16':
  - type: text
    content: Ny anabavin’izy fito lahy dia i Tseroià sy i Abigaîla
  - type: note
    content: Abigaîla na Abigala (toraka izany koa ao amin’ny and 17).
  - type: text
    content: '; telo no zanakalahin’i Tseroià: dia i Abisay sy i Jôaba ary i Hasahela. '
  '17':
  - type: text
    content: Ary i Abigaîla no reny niteraka an’i Hamasà, ka i Jetera izay Jismahelita no rainy.
  '18':
  - type: text
    content: 'I Kaleba, zanakalahin’i Hetsirôna, niteraka tamin’i Hazobà vadiny: dia zanakavavy atao hoe Jerihôta, ary zanakalahy atao hoe Jesera sy Sôbaba ary Ardôna'
  - type: note
    content: 'Kaleba: jereo Jos 14.6. –niteraka...hoe Jesera...: dkt hafa dia nanana zanakavavy atao hoe i Jerihôta tamin’i Hazobà vadiny; io Jerihôta io kosa nanana zanakalahy atao hoe Jesera....'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Ary rehefa maty i Hazobà, dia i Efrata no nalain’i Kaleba ho vadiny; ary io no niterahany an’i Hora. '
  '2':
  - type: text
    content: i Dana sy i Jôsefa, i Benjamîna sy i Naftalỳ ary i Gada sy i Asera.
  '20':
  - type: text
    content: I Hora no ray niteraka an’i Orỳ; ary i Orỳ no ray niteraka an’i Betsalela.
  '21':
  - type: text
    content: 'Ary rehefa feno enimpolo taona i Hetsirôna, dia nalainy ho vady ny zanakavavin’i Makira rain’i Gilehada ka niterahany an’i Segoba. '
  '22':
  - type: text
    content: 'I Segoba no ray niteraka an’i Jaîro izay nanana tanàna telo amby roapolo tao amin’ny tanin’i Gilehada. '
  '23':
  - type: text
    content: 'Fa nalain’ny Gesorita sy ny Sirianina ireo tanànan’i Jaîro miaraka amin’i Kenata renivohitra sy ny tanàna kely manodidina azy; tanàna enimpolo no fitambarany. Ny mponina rehetra tamin’ireo tanàna ireo dia taranak’i Makira, rain’i Gilehada. '
  '24':
  - type: text
    content: Taorian’ny nahafatesan’i Hetsirôna izay nanambady an’i Abià, dia niray tamin’i Efrata
  - type: note
    content: 'izay nanambady an’i Abià, dia niray tamin’i Efrata: araka ny dkt grika tranainy; tsy mazava ny RM.'
  - type: text
    content: ' indray i Kaleba; ka i Efrata no niterahany an’i Asehora mpanorina an’i Tekôa.'
  '25':
  - type: text
    content: 'Ireo zanakalahin’i Jerahimeela, lahimatoan’i Hetsirôna, dia i Rama lahimatoa sy i Bonà mbamin’i Ôrena sy i Ôtsema ary i Ahià. '
  '26':
  - type: text
    content: 'Nanana vady hafa koa i Jerahimeela, i Hatarà no anarany, ary izy no renin’i Ônama. '
  '27':
  - type: text
    content: 'Ny zanakalahin’i Rama, lahimatoan’i Jerahimeela, dia i Mahatsa sy i Jamina ary i Hekera. '
  '28':
  - type: text
    content: 'Ny zanakalahin’i Ônama dia i Semay sy i Jadà; ny zanakalahin’i Samay kosa dia i Nadaba sy i Abisora. '
  '29':
  - type: text
    content: 'Ny anaran’ny vadin’i Abisora dia i Abihaîla; izy no reny niteraka an’i Ahebàna sy i Môlida. '
  '3':
  - type: text
    content: 'Ny zanakalahin’i Joda dia i Hera sy i Ônàna ary i Selà: izy telo lahy no naterak’ilay Kanahanita vadiny, dia ny zanakavavin’i Soha. Ary ratsy fanahy teo imason’ny TOMPO i Hera, lahimatoan’i Joda, ka novonoin’ny Tompo ho faty. '
  '30':
  - type: text
    content: 'Ny zanakalahin’i Nadaba dia i Seleda sy i Apaîma; fa maty tsy niteraka i Seleda. '
  '31':
  - type: text
    content: 'Ny zanakalahin’i Apaîma dia i Jisehỳ; ny zanakalahin’i Jisehỳ dia i Sesàna; ary ny zanakalahin’i Sesàna dia i Ahelay. '
  '32':
  - type: text
    content: 'Ny zanakalahin’i Jadà, rahalahin’i Samay, dia i Jetera sy i Jônatàna; fa maty tsy niteraka i Jetera. '
  '33':
  - type: text
    content: Ary ny zanakalahin’i Jônatàna dia i Peleta sy i Zazà. Ireo avy no taranak’i Jerehimeela.
  '34':
  - type: text
    content: 'Tsy nisy zazalahy ny zanak’i Sesàna fa zazavavy avokoa. I Sesàna kosa nanana mpanompo ejiptianina iray: i Jarehà no anarany. '
  '35':
  - type: text
    content: 'Koa nomen’i Sesàna ho vadin’i Jarehà mpanompony ny zanany vavy anankiray ka niteraka an’i Hatahy. '
  '36':
  - type: text
    content: 'Ary i Hatahy no ray niteraka an’i Natàna; i Natàna, ray niteraka an’i Zabada; '
  '37':
  - type: text
    content: 'i Zabada, ray niteraka an’i Epelala; i Epelala, ray niteraka an’i Hôbeda; '
  '38':
  - type: text
    content: 'i Hôbeda, ray niteraka an’i Jehò; i Jehò, ray niteraka an’i Hazarià; '
  '39':
  - type: text
    content: 'i Hazarià, ray niteraka an’i Heletsa; i Heletsa, ray niteraka an’i Elehasà; '
  '4':
  - type: text
    content: 'I Tamàra vinantovavin’i Joda kosa niterahany an’i Peretsa sy i Zera; noho izany, dia dimy ny zanakalahin’i Joda rehetra. '
  '40':
  - type: text
    content: 'i Elehasà, ray niteraka an’i Sisemay; i Sisemay, ray niteraka an’i Saloma; '
  '41':
  - type: text
    content: i Saloma, ray niteraka an’i Jekamià; ary i Jekamià no ray niteraka an’i Elisamà.
  '42':
  - type: text
    content: Ireo zanakalahin’i Kaleba, rahalahin’i Jerahimeela, dia i Mesà, lahimatoa sady rain’i Zifa, ary i Maresa
  - type: note
    content: 'ary i Maresa: io no rijan-teny toa mitombina; ary ny zanakalahin’i Maresa no ao amin’ny RM.'
  - type: text
    content: ' rain’i Hebrôna. '
  '43':
  - type: text
    content: 'Ny zanakalahin’i Hebrôna dia i Kora sy i Tapoa ary i Rekema sy i Sema. '
  '44':
  - type: text
    content: 'I Sema no ray niteraka an’i Rahama izay rain’i Jôrkehama. I Rekama no ray niteraka an’i Samay; '
  '45':
  - type: text
    content: 'ny zanakalahin’i Samay dia i Mahôna; ary i Mahôna no mpanorina an’i Bety-Tsoro. '
  '46':
  - type: text
    content: I Hefà, vadikelin’i Kaleba, no reny niteraka an’i Haràna sy i Môtsà ary i Gazeza. I Haràna no ray niteraka an’i Jaheday
  - type: note
    content: 'Jaheday: Gazeza no ao amin’ny RM; kanefa tsy hita loatra izay ipoiran’ny hoe Jaheday (and 47) raha tsy tsaraina araka izany ity Gazeza faharoa eto amin’ny and 46 ity.'
  - type: text
    content: '; '
  '47':
  - type: text
    content: 'ary ny zanakalahin’i Jaheday dia i Regema sy i Jôtama, i Gesàna sy i Peleta ary i Hefà sy i Sahafy. '
  '48':
  - type: text
    content: 'I Mahekà, vadikelin’i Kaleba, no reny niteraka an’i Sebera sy i Tirehanà; '
  '49':
  - type: text
    content: izy ihany koa no reny niteraka an’i Sahafy mpanorina an’i Madmenà sy niteraka an’i Sevà mpanorina an’i Makbenà sy i Gibehà; ary ny zanakavavin’i Kaleba dia i Haksà.
  '5':
  - type: text
    content: 'Ny zanakalahin’i Peretsa dia i Hetsirôna sy i Hamola. '
  '50':
  - type: text
    content: 'Ireto koa mbola taranak’i Kaleba: ireo zanakalahin’i Hora, lahimatoan’i Efrata, dia i Sôbala mpanorina an’i Kiriata-Jeharîma, '
  '51':
  - type: text
    content: 'i Salmà mpanorina an’i Betlehema, ary i Harefa mpanorina an’i Bety-Gedera. '
  '52':
  - type: text
    content: 'Taranak’i Sôbala mpanorina an’i Kiriata-Jeharîma: ny mponina tao Harôe sy ny antsasaky ny Manahetita '
  '53':
  - type: text
    content: ary ireo tarika tao Kiriata-Jeharîma, dia ny Jitrita sy ny Potita mbamin’ny Somatita sy ny Misrahita; avy tamin’ireo tarika ireo no nipoiran’ny Tsôrehatita sy ny Estaolita.
  '54':
  - type: text
    content: 'Taranak’i Salmà: ny mponina tao Betlehema, ny Netôfatita, ny mponina tao Hatarôta-Bety-Jôaba, ny antsasaky ny Manahetîta, ny Tsôrehita, '
  '55':
  - type: text
    content: ary ireo tarika mpanoratra nonina tao Jahebetsy, dia ny Tirehatita sy ny Simehatita mbamin’ny Sokatita. Ireo tarika mpanoratra ireo no Kenita nipoitra avy tamin’i Hamata izay razamben’ny fianakaviana Rekabita.
  '6':
  - type: text
    content: Ny zanakalahin’i Zera dia i Zimrỳ sy i Etàna, i Hemàna sy i Kalkôla ary i Darà
  - type: note
    content: Darà na Dardà (ampit 1 Mp 5.11).
  - type: text
    content: ': dimy izy rehetra. '
  '7':
  - type: text
    content: Ny zanakalahin’i Karmỳ dia i Hakàna izay nampidi-doza
  - type: note
    content: Eo amin’ny fiandohan’ny and 7, ny mpandikateny sasany dia miainga avy amin’i Jos 7.1, ka manampy hoe ny zanakalahin’i Zimrỳ dia i Karmỳ ary ny zanakalahin’i Karmỳ dia i Hakara. –I Hakara, ao amin’ny Jos 7.1, dia antsoina hoe Hakàna. Eto ny anarana hoe Hakara sy ny matoanteny hebreo nadika hoe nampidi-doza dia misy tsilalaon-teny.
  - type: text
    content: ' an’i Israely tamin’ny nandikàny ny didy momba ny zavatra natokana ho an’Andriamanitra. '
  '8':
  - type: text
    content: 'Ny zanakalahin’i Etàna dia i Hazarià. '
  '9':
  - type: text
    content: Ary ny zanakalahy naterak’i Hetsirôna dia i Jerahimeela sy i Rama ary i Kelobay na Kaleba.
