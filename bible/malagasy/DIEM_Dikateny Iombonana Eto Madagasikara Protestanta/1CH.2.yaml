      marker-yv: yv-n
    - type: text
      text: ': i Reobena sy i Simehôna, i Levỳ sy i Joda, i Jisakara sy i Zebolòna, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Rama no ray niteraka an’i Haminadaba; i Haminadaba no ray niteraka an’i Nahasôna izay filohan’ny taranak’i Joda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Nahasôna no ray niteraka an’i Salmà; i Salmà no ray niteraka an’i Bôhaza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Bôhaza no ray niteraka an’i Hôbeda; i Hobeda no ray niteraka an’i Jesè; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary i Jesè no ray niteraka azy fito mirahalahy ireto: dia i Eliaba sy i Abinadaba, i Simehà '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy i Natanaela, i Raday '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy i Ôtsema ary i Davida. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny anabavin’izy fito lahy dia i Tseroià sy i Abigaîla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Abigaîla '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abigala
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (toraka izany koa ao amin’ny and 17).'
      marker-yv: yv-n
    - type: text
      text: '; telo no zanakalahin’i Tseroià: dia i Abisay sy i Jôaba ary i Hasahela. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Abigaîla no reny niteraka an’i Hamasà, ka i Jetera izay Jismahelita no rainy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Kaleba, zanakalahin’i Hetsirôna, niteraka tamin’i Hazobà vadiny: dia zanakavavy atao hoe Jerihôta, ary zanakalahy atao hoe Jesera sy Sôbaba ary Ardôna'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kaleba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jos 14.6. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: niteraka...hoe Jesera...
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dia nanana zanakavavy atao hoe i Jerihôta tamin’i Hazobà vadiny; io Jerihôta io kosa nanana zanakalahy atao hoe Jesera...
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa maty i Hazobà, dia i Efrata no nalain’i Kaleba ho vadiny; ary io no niterahany an’i Hora. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Dana sy i Jôsefa, i Benjamîna sy i Naftalỳ ary i Gada sy i Asera.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Hora no ray niteraka an’i Orỳ; ary i Orỳ no ray niteraka an’i Betsalela.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa feno enimpolo taona i Hetsirôna, dia nalainy ho vady ny zanakavavin’i Makira rain’i Gilehada ka niterahany an’i Segoba. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Segoba no ray niteraka an’i Jaîro izay nanana tanàna telo amby roapolo tao amin’ny tanin’i Gilehada. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nalain’ny Gesorita sy ny Sirianina ireo tanànan’i Jaîro miaraka amin’i Kenata renivohitra sy ny tanàna kely manodidina azy; tanàna enimpolo no fitambarany. Ny mponina rehetra tamin’ireo tanàna ireo dia taranak’i Makira, rain’i Gilehada. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahafatesan’i Hetsirôna izay nanambady an’i Abià, dia niray tamin’i Efrata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izay nanambady an’i Abià, dia niray tamin’i Efrata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt grika tranainy; tsy mazava ny RM.
      marker-yv: yv-n
    - type: text
      text: ' indray i Kaleba; ka i Efrata no niterahany an’i Asehora mpanorina an’i Tekôa.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo zanakalahin’i Jerahimeela, lahimatoan’i Hetsirôna, dia i Rama lahimatoa sy i Bonà mbamin’i Ôrena sy i Ôtsema ary i Ahià. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanana vady hafa koa i Jerahimeela, i Hatarà no anarany, ary izy no renin’i Ônama. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Rama, lahimatoan’i Jerahimeela, dia i Mahatsa sy i Jamina ary i Hekera. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Ônama dia i Semay sy i Jadà; ny zanakalahin’i Samay kosa dia i Nadaba sy i Abisora. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny anaran’ny vadin’i Abisora dia i Abihaîla; izy no reny niteraka an’i Ahebàna sy i Môlida. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Joda dia i Hera sy i Ônàna ary i Selà: izy telo lahy no naterak’ilay Kanahanita vadiny, dia ny zanakavavin’i Soha. Ary ratsy fanahy teo imason’ny TOMPO i Hera, lahimatoan’i Joda, ka novonoin’ny Tompo ho faty. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Nadaba dia i Seleda sy i Apaîma; fa maty tsy niteraka i Seleda. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Apaîma dia i Jisehỳ; ny zanakalahin’i Jisehỳ dia i Sesàna; ary ny zanakalahin’i Sesàna dia i Ahelay. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Jadà, rahalahin’i Samay, dia i Jetera sy i Jônatàna; fa maty tsy niteraka i Jetera. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zanakalahin’i Jônatàna dia i Peleta sy i Zazà. Ireo avy no taranak’i Jerehimeela.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nisy zazalahy ny zanak’i Sesàna fa zazavavy avokoa. I Sesàna kosa nanana mpanompo ejiptianina iray: i Jarehà no anarany. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nomen’i Sesàna ho vadin’i Jarehà mpanompony ny zanany vavy anankiray ka niteraka an’i Hatahy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Hatahy no ray niteraka an’i Natàna; i Natàna, ray niteraka an’i Zabada; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Zabada, ray niteraka an’i Epelala; i Epelala, ray niteraka an’i Hôbeda; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Hôbeda, ray niteraka an’i Jehò; i Jehò, ray niteraka an’i Hazarià; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Hazarià, ray niteraka an’i Heletsa; i Heletsa, ray niteraka an’i Elehasà; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Tamàra vinantovavin’i Joda kosa niterahany an’i Peretsa sy i Zera; noho izany, dia dimy ny zanakalahin’i Joda rehetra. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Elehasà, ray niteraka an’i Sisemay; i Sisemay, ray niteraka an’i Saloma; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Saloma, ray niteraka an’i Jekamià; ary i Jekamià no ray niteraka an’i Elisamà.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo zanakalahin’i Kaleba, rahalahin’i Jerahimeela, dia i Mesà, lahimatoa sady rain’i Zifa, ary i Maresa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.42 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ary i Maresa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'io no rijan-teny toa mitombina; '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary ny zanakalahin’i Maresa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no ao amin’ny RM.'
      marker-yv: yv-n
    - type: text
      text: ' rain’i Hebrôna. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Hebrôna dia i Kora sy i Tapoa ary i Rekema sy i Sema. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Sema no ray niteraka an’i Rahama izay rain’i Jôrkehama. I Rekama no ray niteraka an’i Samay; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny zanakalahin’i Samay dia i Mahôna; ary i Mahôna no mpanorina an’i Bety-Tsoro. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Hefà, vadikelin’i Kaleba, no reny niteraka an’i Haràna sy i Môtsà ary i Gazeza. I Haràna no ray niteraka an’i Jaheday
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.46 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jaheday: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gazeza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no ao amin’ny RM; kanefa tsy hita loatra izay ipoiran’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jaheday
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 47) raha tsy tsaraina araka izany ity '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gazeza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' faharoa eto amin’ny and 46 ity.'
      marker-yv: yv-n
    - type: text
      text: '; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny zanakalahin’i Jaheday dia i Regema sy i Jôtama, i Gesàna sy i Peleta ary i Hefà sy i Sahafy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Mahekà, vadikelin’i Kaleba, no reny niteraka an’i Sebera sy i Tirehanà; '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izy ihany koa no reny niteraka an’i Sahafy mpanorina an’i Madmenà sy niteraka an’i Sevà mpanorina an’i Makbenà sy i Gibehà; ary ny zanakavavin’i Kaleba dia i Haksà.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Peretsa dia i Hetsirôna sy i Hamola. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto koa mbola taranak’i Kaleba: ireo zanakalahin’i Hora, lahimatoan’i Efrata, dia i Sôbala mpanorina an’i Kiriata-Jeharîma, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Salmà mpanorina an’i Betlehema, ary i Harefa mpanorina an’i Bety-Gedera. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taranak’i Sôbala mpanorina an’i Kiriata-Jeharîma: ny mponina tao Harôe sy ny antsasaky ny Manahetita '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ireo tarika tao Kiriata-Jeharîma, dia ny Jitrita sy ny Potita mbamin’ny Somatita sy ny Misrahita; avy tamin’ireo tarika ireo no nipoiran’ny Tsôrehatita sy ny Estaolita.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taranak’i Salmà: ny mponina tao Betlehema, ny Netôfatita, ny mponina tao Hatarôta-Bety-Jôaba, ny antsasaky ny Manahetîta, ny Tsôrehita, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ireo tarika mpanoratra nonina tao Jahebetsy, dia ny Tirehatita sy ny Simehatita mbamin’ny Sokatita. Ireo tarika mpanoratra ireo no Kenita nipoitra avy tamin’i Hamata izay razamben’ny fianakaviana Rekabita.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zanakalahin’i Zera dia i Zimrỳ sy i Etàna, i Hemàna sy i Kalkôla ary i Darà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Darà '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Dardà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (ampit 1 Mp 5.11).'
      marker-yv: yv-n
    - type: text
      text: ': dimy izy rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zanakalahin’i Karmỳ dia i Hakàna izay nampidi-doza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Eo amin’ny fiandohan’ny and 7, ny mpandikateny sasany dia miainga avy amin’i Jos 7.1, ka manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny zanakalahin’i Zimrỳ dia i Karmỳ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ary '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny zanakalahin’i Karmỳ dia i Hakara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –I '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Hakara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ao amin’ny Jos 7.1, dia antsoina hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hakàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Eto ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hakara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy ny matoanteny hebreo nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nampidi-doza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia misy tsilalaon-teny.'
      marker-yv: yv-n
    - type: text
      text: ' an’i Israely tamin’ny nandikàny ny didy momba ny zavatra natokana ho an’Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Etàna dia i Hazarià. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zanakalahy naterak’i Hetsirôna dia i Jerahimeela sy i Rama ary i Kelobay na Kaleba.
