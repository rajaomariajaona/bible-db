document_id: 1SA.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Naverin’ny Filistinina any Israely ny Vatamasina
  - type: text
    content: 'Tany amin’ny tanin’ny Filistinina nandritra ny fito volana ny '
  - type: text
    content: Vatamasin’ny TOMPO
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dia araka izany no nataon’ny Filistinina. Naka ombivavy roa mitaiza izy, dia norohizany tamin’ny sarety; ary ny zanany nohidiany tao am-bala. '
  '11':
  - type: text
    content: Napetrany teo ambony sarety ny Vatamasin’ny TOMPO sy ny vata kely misy ny totozy volamena sy ny sarin-kitso.
  '12':
  - type: text
    content: 'Avy hatrany dia nihazo ny lalana mankany Bèty-Semesy ireo ombivavy; ka sady nandeha tamin’izany izy no tsy nitsaha-nimamà, ary tsy nivilivily niankavanana na niankavia. Ary ireo filohan’ny Filistinina nanaraka ny sarety hatrany amin’ny fizaran-tanin’i Bèty-Semesy. '
  '13':
  - type: text
    content: 'Tamin’izay ny mponina tao Bèty-Semesy dia nijinja varim-bazaha tany an-dohasaha. Nahatazana ny Vatamasina izy ireo ka dibo-kafaliana nahita azy. '
  '14':
  - type: text
    content: 'Tonga tao an-tsahan’i Josoa, lehilahy avy ao Bèty-Semesy, ny Vatamasina ka nijanona teo akaikin’ny vato lehibe iray. Novakîna madinika ny hazon-tsarety, ary natao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho an’ny TOMPO ireo ombivavy.'
  '15':
  - type: text
    content: 'Nampidinin’ny '
  - type: text
    content: Levita
  - type: text
    content: ' ny Vatamasin’ny TOMPO sy ny vata kely nisy ireo sarin-javatra volamena niaraka taminy, ary dia samy napetrany teo ambonin’ilay vato lehibe. Tamin’io andro io ihany dia nanao sorona dorana manontolo sy sorom-pihavanana ho an’ny TOMPO ny olona tao Bèty-Semesy. '
  '16':
  - type: text
    content: Tamin’io andro io koa, rehefa nahita izany ireo andriana dimy filohan’i Filistinina, dia niverina nankany Hekrôna.
  '17':
  - type: text
    content: 'Toy izao ny amin’ireo kitso volamena izay naterin’ny Filistinina amin’ny TOMPO ho fanonerana: iray ho an’i Asdôda, iray ho an’i Gazà, iray ho an’i Askelôna'
  - type: note
    content: Ireo tanàn-dehibe dimy an’ny Filistinina no tanisaina etoana. I Gazà sy i Askelôna no tanàn-dehibe fahefatra sy fahadimy ka eo amorontsirak’i Mediteranea no misy azy (jereo 5.1, 8, 10 sy nta).
  - type: text
    content: ', iray ho an’i Gata ary iray ho an’i Hekrôna. '
  '18':
  - type: text
    content: Ireo totozy volamena kosa dia natao araka ny isan’ny tanàna filistinina rehetra nentin’ireo filoha dimy, manomboka amin’ny tanànamimanda ka hatramin’ny tanàna kely eny ambanivohitra. Ny vato lehibe nametrahana ny Vatamasin’ny TOMPO no vavolombelon’izany; mandraka androany io vato io mbola ao an-tsahan’i Josoà, lehilahy avy any Betỳ-Semesy.
  '19':
  - type: text
    content: Namely ny mponin’i Betỳ-Semesy ny TOMPO satria nojeren’ireo ny Vatamasina, ka lehilahy fitopolo sy biby fiompy vaventy dimampolo no maty
  - type: note
    content: 'lehilahy fitopolo... dimampolo: misy dkt hafa hoe lehilahy fitopolo amin’ny fianakaviana dimampolo na hoe lehilahy fitopolo amin’ny mponina dimy alina.'
  - type: text
    content: '. Koa dia nisaona avokoa ireo olona sisa mbola velona satria namely azy mafy ny TOMPO. '
  '2':
  - type: text
    content: 'Farany dia nampaka ireo mpisorony sy mpimasiny ny Filistinina ka nanontany azy hoe:'
  - type: text
    content: –Hataonay ahoana ny Vatamasin’ny TOMPO? Ambarao anay izay fomba hamerenana azy any amin’ny toerany.
  '20':
  - type: text
    content: 'Ary hoy ny mponin’i Betỳ-Semesy:'
  - type: text
    content: –Iza no hahajanona eo anatrehan’io TOMPO Andriamanitra Masina io? Ary aiza no hampiakarantsika ny Vatamasiny hanalavitra antsika?
  '21':
  - type: text
    content: Dia nandefa iraka ho any amin’ny mponin’i Kiriata-Jeharîma
  - type: note
    content: 'Kiriata-Jeharîma: tanàna tokony ho 13 km any avaratra andrefan’i Jerosalema.'
  - type: text
    content: ' izy ireo mba hilaza aminy hoe:'
  - type: text
    content: –Naverin’ny Filistinina ilay Vatamasin’ny TOMPO, koa tongava ianareo hampiakatra azy ho any aminareo.
  '3':
  - type: text
    content: 'Dia hoy ireo namaly:'
  - type: text
    content: –Raha hamerina ilay Vatamasin’ny Andriamanitr’i Israely ianareo, dia aza averina foana amin’izao, fa tsy maintsy hanateranareo fanonerana Izy; dia ho sitrana ianareo ary ho fantatrareo ny anton’ny namelezan’io Andriamanitra io anareo tamin’ny heriny.
  '4':
  - type: text
    content: 'Hoy kosa ny Filistinina hoe:'
  - type: text
    content: –Fa inona àry no fanonerana haterinay aminy?
  - type: text
    content: 'Dia hoy ny navalin’ny mpisorona sy ny mpimasy:'
  - type: text
    content: '–Araka izay isan’ireo andriana filohan’ny Filistinina, dia mba anatero sarin-kitso volamena dimy sy totozy volamena dimy; fa aretina iray ihany no mahazo anareo rehetra mbamin’ny filohanareo. '
  '5':
  - type: text
    content: Koa manaova sarin’ny kitsonareo sy sarin’ny totozy mpandevona ny taninareo ary atolory izany ho fanomezam-
  - type: text
    content: boninahitra
  - type: text
    content: ' ny Andriamanitr’i Israely. Angamba mba hitsahatra tsy hanampatra ny heriny aminareo sy amin’ny andriamanitrareo ary amin’ny taninareo Izy. '
  '6':
  - type: text
    content: 'Nahoana no hihamafy fo tahaka ny Ejiptianina sy ny '
  - type: text
    content: Farao
  - type: text
    content: ' ianareo? Tsarovy tsara ny nanaovan’Andriamanitra azy ireo ka nahatonga azy hamela ny vahoaka handeha, ka dia lasa izy. '
  '7':
  - type: text
    content: 'Koa manamboara sarety vaovao, dia makà ombivavy roa mitaiza sady tsy mbola nitondra '
  - type: text
    content: zioga
  - type: text
    content: ', ka rohizo amin’ny sarety, ary dia saraho aminy ho any am-balany ireo zanany. '
  '8':
  - type: text
    content: 'Halainareo ny Vatamasin’ny TOMPO, dia apetraho eo ambony sarety; hataonareo anaty vata kely eo anilany ireo sarin-javatra volamena izay aterinareo ho fanonerana amin’Andriamanitra. Avy eo dia alefaso izy handeha. '
  '9':
  - type: text
    content: Ho hitanareo tsara fa raha mihazo ny lalana mankany amin’ny tanin’i Israely ka mizotra ho any Bèty-Semesy
  - type: note
    content: 'Bèty-Semesy: toerana tokony ho 25 km ao andrefan’i Jerosalema.'
  - type: text
    content: ' ireo ombivavy, dia midika izany fa ny Andriamanitry ny Israely no nahatonga izao loza lehibe izao tamintsika; raha tsy izany kosa dia ho fantatsika fa kisendrasendra ihany fa tsy ny heriny akory no namely antsika.'
