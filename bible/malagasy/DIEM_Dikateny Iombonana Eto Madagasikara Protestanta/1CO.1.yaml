    - type: text
      text: 1-2
  - type: text
    text: 'Avy amiko Paoly ity taratasy ity, dia izaho voaantso ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôlin’i Kristy
  - type: text
    text: ' Jesoa noho ny sitrapon’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mamangy anareo isan’ny Fiangonan’Andriamanitra atỳ Kôrinto
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kôrinto: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 18.1 sy ny naoty.
    marker-yv: yv-n
  - type: text
    text: ' aho, ary mamangy anareo koa i Sôstena'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sôstena: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 18.17.
    marker-yv: yv-n
  - type: text
    text: ' havantsika. Voatokana ho an’Andriamanitra sy voaantso ho anisan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakany
  - type: text
    text: ' ianareo satria efa tafaray amin’i Kristy Jesoa. Eny, anisan’ny vahoakan’Andriamanitra ianareo miaraka amin’izay rehetra miantso ny anaran’i Jesoa Kristy Tompontsika, na aiza na aiza, fa sady Tompon’izy rehetra i Kristy no Tompontsika koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fisaorana an’Andriamanitra noho ny fitahiana ao amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Velom-pisaorana mandrakariva an’Andriamanitro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'an’Andriamanitro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: 'ny aminareo aho noho ny fahasoavana efa nomeny anareo izay tafaray amin’i Kristy Jesoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, noho ianareo tafaray amin’i Kristy Jesoa no mampanankarena anareo amin’ny fanomezana rehetra, dia ny teny sy ny fahalalana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay nijoroana ho vavolombelona momba an’i Kristy dia efa tafaorina mafy ao aminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka tsy misy fanomezam-pahasoavana tsy anananareo eo am-piandrasana ny hisehoan’i Jesoa Kristy Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Andriamanitra koa no hampiorina anareo hatramin’ny farany, ka tsy hanananareo tsiny amin’ny andro hiavian’i Jesoa Kristy Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mitana ny toky nomeny Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 9.7.
    marker-yv: yv-n
  - type: text
    text: ' Izay niantso anareo hiombona amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ', dia i Jesoa Kristy Tompontsika.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaraham-bazana ao amin’ny Fiangonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ry havako, izao no iangaviako anareo amin’ny anaran’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika: mifanaraha ianareo rehetra, ary aza mifanao an-kolafiny; aoka hiray saina sy hevitra ianareo ka hivondrona tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nisy avy tamin’ny ankohonan’i Klôà manko efa nitatitra tamiko ny aminareo, fa hoe misy adiady eo aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no tiako holazaina: Samy miteny izay teneninareo ianareo, ka ny anankiray manao hoe: «Izaho an’i Paoly»; ary hoy kosa ny anankiray: «Izaho an’i Apôlao»; misy kosa manao hoe: «Izaho an’i Petera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Apôlao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo Asa 18.24. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Petera:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny rijan-teny grika fototra etoana dia mampiasa ny hoe '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Kefasy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay teny aramianina mitovy hevitra amin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Petera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Jôh 1.42).'
    marker-yv: yv-n
  - type: text
    text: '»; ary hoy indray ny hafa: «Izaho an’i Kristy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Heverinareo ve fa voazarazara i Kristy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heverinareo ve fa voazarazara i Kristy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy mety ho voazarazara i Kristy.
    marker-yv: yv-n
  - type: text
    text: '? I Paoly ve no voahombo teo amin’ny hazofijaliana ho famonjena anareo? Sa tamin’ny anaran’i Paoly no nanaovana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' anareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Isaorako Andriamanitra fa tsy nisy nataoko batisa ianareo, afa-tsy i Krispo sy i Gaio
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Krispo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 18.8. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gaio:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Asa 19.29.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ka tsy afaka milaza ianareo fa vita batisa tamin’ny anarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(Hay koa moa nataoko batisa ny ankohonan’i Stefanasy; afa-tsy ireo, dia tsy misy hafa tsaroako ho nataoko batisa.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izaho manko tsy nirahin’i Kristy hanao batisa fa hitory ny Vaovao Mahafaly; ary tsy tamin’ny fahendren’olombelona asehon’ny lahateny kanto no nitoriako mba tsy ho foana ny herin’i Kristy voahombo teo amin’ny hazofijaliana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'I Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' herin’Andriamanitra sy fahendreny'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Eny, ny fitoriana momba an’i Kristy voahombo teo amin’ny hazofijaliana dia fahadalana amin’izay ho very, fa herin’Andriamanitra kosa amintsika izay hovonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa izao no ambaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hofoanako ny fahendren’ny hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: holaviko ny fahaizan’ny mahay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 29.14, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aiza ny olon-kendry? Aiza ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: '? Aiza ny mpiady hevitra avy amin’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 44.25.
    marker-yv: yv-n
  - type: text
    text: '? Tsy efa nahariharin’Andriamanitra ho fahadalana ve ny fahendren’izao tontolo izao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ny fahendren’olombelona dia tsy nahalalan’izao tontolo izao an’Andriamanitra na dia teo amin’izay nihariharian’ny fahendren’Andriamanitra aza. Noho izany, dia sitrak’Andriamanitra ho tamin’ny alalan’ny hafatra miendrika fahadalana izay torînay no hamonjena ny olona izay mino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eny, mitaky famantarana avy amin’Andriamanitra ny Jiosy, ary ny Grika mitady fahendrena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'izahay kosa dia i Kristy voahombo teo amin’ny hazofijaliana no torînay: fanafintohinana ho an’ny Jiosy izany ary fahadalana ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Kanefa ho an’izay voaantson’Andriamanitra, na Jiosy na hafa firenena, dia i Kristy no herin’Andriamanitra sy fahendren’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: satria izay toa fahadalàn’Andriamanitra dia hendry noho ny fahendren’olombelona, ary izay toa fahalemen’Andriamanitra dia mahery noho ny herin’olombelona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mba mijere tena ange ianareo izay voaantson’Andriamanitra, ry havako: araka ny maha olombelona, dia tsy misy firy ianareo no olon-kendry, tsy misy firy no mahery, tsy misy firy no avo razana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Kanefa izay noheverin’izao tontolo izao ho adala no voafidin’Andriamanitra hampahamenatra ny hendry; izay noheverin’izao tontolo izao ho osa no voafidin’Andriamanitra hampahamenatra ny matanjaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary izay noheverin’izao tontolo izao ho ambany sy fanaratsy, dia izay ataony tsy ho zavatra, no voafidin’Andriamanitra hahatsinontsinona izay ataon’izao tontolo izao ho zavatra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'mba tsy hisy mihitsy olombelona mahazo mirehareha eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa nataon’Andriamanitra tafaray amin’i Kristy ianareo, ka dia i Kristy no fahendrena avy aminy ho antsika: i Kristy no andraisantsika ny fahamarinan’Andriamanitra ary anafahan’Andriamanitra antsika amin’ny fahotana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Noho izany, araka ny voalazan’ny Soratra Masina, «izay mirehareha, dia ny nataon’ny Tompo no aoka hireharehany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jer 9.23.
    marker-yv: yv-n
  - type: text
    text: .»
