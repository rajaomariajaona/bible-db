document_id: 1CO.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho voaantso ho '
  - type: text
    content: apôstôlin’i Kristy
  - type: text
    content: ' Jesoa noho ny sitrapon’Andriamanitra.'
  - type: text
    content: Mamangy anareo isan’ny Fiangonan’Andriamanitra atỳ Kôrinto
  - type: note
    content: 'Kôrinto: jereo Asa 18.1 sy ny naoty.'
  - type: text
    content: ' aho, ary mamangy anareo koa i Sôstena'
  - type: note
    content: 'Sôstena: jereo Asa 18.17.'
  - type: text
    content: ' havantsika. Voatokana ho an’Andriamanitra sy voaantso ho anisan’ny '
  - type: text
    content: vahoakany
  - type: text
    content: ' ianareo satria efa tafaray amin’i Kristy Jesoa. Eny, anisan’ny vahoakan’Andriamanitra ianareo miaraka amin’izay rehetra miantso ny anaran’i Jesoa Kristy Tompontsika, na aiza na aiza, fa sady Tompon’izy rehetra i Kristy no Tompontsika koa. '
  '10':
  - type: text
    content: 'Ry havako, izao no iangaviako anareo amin’ny anaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika: mifanaraha ianareo rehetra, ary aza mifanao an-kolafiny; aoka hiray saina sy hevitra ianareo ka hivondrona tsara. '
  '11':
  - type: text
    content: 'Nisy avy tamin’ny ankohonan’i Klôà manko efa nitatitra tamiko ny aminareo, fa hoe misy adiady eo aminareo. '
  '12':
  - type: text
    content: 'Izao no tiako holazaina: Samy miteny izay teneninareo ianareo, ka ny anankiray manao hoe: «Izaho an’i Paoly»; ary hoy kosa ny anankiray: «Izaho an’i Apôlao»; misy kosa manao hoe: «Izaho an’i Petera'
  - type: note
    content: 'Apôlao: jereo Asa 18.24. Petera: ny rijan-teny grika fototra etoana dia mampiasa ny hoe Kefasy izay teny aramianina mitovy hevitra amin’ny hoe Petera (jereo Jôh 1.42).'
  - type: text
    content: '»; ary hoy indray ny hafa: «Izaho an’i Kristy.» '
  '13':
  - type: text
    content: Heverinareo ve fa voazarazara i Kristy
  - type: note
    content: 'Heverinareo ve fa voazarazara i Kristy: misy stf sasany ahitana hoe tsy mety ho voazarazara i Kristy.'
  - type: text
    content: '? I Paoly ve no voahombo teo amin’ny hazofijaliana ho famonjena anareo? Sa tamin’ny anaran’i Paoly no nanaovana '
  - type: text
    content: batisa
  - type: text
    content: ' anareo?'
  '14':
  - type: text
    content: Isaorako Andriamanitra fa tsy nisy nataoko batisa ianareo, afa-tsy i Krispo sy i Gaio
  - type: note
    content: 'Krispo: jereo Asa 18.8. –Gaio: jereo Asa 19.29.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ka tsy afaka milaza ianareo fa vita batisa tamin’ny anarako. '
  '16':
  - type: text
    content: '(Hay koa moa nataoko batisa ny ankohonan’i Stefanasy; afa-tsy ireo, dia tsy misy hafa tsaroako ho nataoko batisa.) '
  '17':
  - type: text
    content: Izaho manko tsy nirahin’i Kristy hanao batisa fa hitory ny Vaovao Mahafaly; ary tsy tamin’ny fahendren’olombelona asehon’ny lahateny kanto no nitoriako mba tsy ho foana ny herin’i Kristy voahombo teo amin’ny hazofijaliana.
  - type: heading
    content: I Jesoa Kristy herin’Andriamanitra sy fahendreny
  '18':
  - type: text
    content: 'Eny, ny fitoriana momba an’i Kristy voahombo teo amin’ny hazofijaliana dia fahadalana amin’izay ho very, fa herin’Andriamanitra kosa amintsika izay hovonjena. '
  '19':
  - type: text
    content: 'Fa izao no ambaran’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Hofoanako ny fahendren’ny hendry,
  - type: text
    content: holaviko ny fahaizan’ny mahay
  - type: note
    content: Is 29.14, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '20':
  - type: text
    content: 'Aiza ny olon-kendry? Aiza ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: '? Aiza ny mpiady hevitra avy amin’'
  - type: text
    content: izao tontolo izao
  - type: note
    content: Ampit Is 44.25.
  - type: text
    content: '? Tsy efa nahariharin’Andriamanitra ho fahadalana ve ny fahendren’izao tontolo izao?'
  '21':
  - type: text
    content: 'Fa ny fahendren’olombelona dia tsy nahalalan’izao tontolo izao an’Andriamanitra na dia teo amin’izay nihariharian’ny fahendren’Andriamanitra aza. Noho izany, dia sitrak’Andriamanitra ho tamin’ny alalan’ny hafatra miendrika fahadalana izay torînay no hamonjena ny olona izay mino. '
  '22':
  - type: text
    content: 'Eny, mitaky famantarana avy amin’Andriamanitra ny Jiosy, ary ny Grika mitady fahendrena; '
  '23':
  - type: text
    content: 'izahay kosa dia i Kristy voahombo teo amin’ny hazofijaliana no torînay: fanafintohinana ho an’ny Jiosy izany ary fahadalana ho an’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: .
  '24':
  - type: text
    content: 'Kanefa ho an’izay voaantson’Andriamanitra, na Jiosy na hafa firenena, dia i Kristy no herin’Andriamanitra sy fahendren’Andriamanitra; '
  '25':
  - type: text
    content: satria izay toa fahadalàn’Andriamanitra dia hendry noho ny fahendren’olombelona, ary izay toa fahalemen’Andriamanitra dia mahery noho ny herin’olombelona.
  '26':
  - type: text
    content: 'Mba mijere tena ange ianareo izay voaantson’Andriamanitra, ry havako: araka ny maha olombelona, dia tsy misy firy ianareo no olon-kendry, tsy misy firy no mahery, tsy misy firy no avo razana. '
  '27':
  - type: text
    content: 'Kanefa izay noheverin’izao tontolo izao ho adala no voafidin’Andriamanitra hampahamenatra ny hendry; izay noheverin’izao tontolo izao ho osa no voafidin’Andriamanitra hampahamenatra ny matanjaka; '
  '28':
  - type: text
    content: 'ary izay noheverin’izao tontolo izao ho ambany sy fanaratsy, dia izay ataony tsy ho zavatra, no voafidin’Andriamanitra hahatsinontsinona izay ataon’izao tontolo izao ho zavatra, '
  '29':
  - type: text
    content: 'mba tsy hisy mihitsy olombelona mahazo mirehareha eo anatrehan’Andriamanitra. '
  '3':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
  - type: heading
    content: Fisaorana an’Andriamanitra noho ny fitahiana ao amin’i Kristy
  '30':
  - type: text
    content: 'Fa nataon’Andriamanitra tafaray amin’i Kristy ianareo, ka dia i Kristy no fahendrena avy aminy ho antsika: i Kristy no andraisantsika ny fahamarinan’Andriamanitra ary anafahan’Andriamanitra antsika amin’ny fahotana. '
  '31':
  - type: text
    content: Noho izany, araka ny voalazan’ny Soratra Masina, «izay mirehareha, dia ny nataon’ny Tompo no aoka hireharehany
  - type: note
    content: Jereo Jer 9.23.
  - type: text
    content: .»
  '4':
  - type: text
    content: Velom-pisaorana mandrakariva an’Andriamanitro
  - type: note
    content: 'an’Andriamanitro: misy stf sasany ahitana fotsiny hoe an’Andriamanitra.'
  - type: text
    content: 'ny aminareo aho noho ny fahasoavana efa nomeny anareo izay tafaray amin’i Kristy Jesoa. '
  '5':
  - type: text
    content: 'Eny, noho ianareo tafaray amin’i Kristy Jesoa no mampanankarena anareo amin’ny fanomezana rehetra, dia ny teny sy ny fahalalana rehetra. '
  '6':
  - type: text
    content: 'Izay nijoroana ho vavolombelona momba an’i Kristy dia efa tafaorina mafy ao aminareo, '
  '7':
  - type: text
    content: 'ka tsy misy fanomezam-pahasoavana tsy anananareo eo am-piandrasana ny hisehoan’i Jesoa Kristy Tompontsika. '
  '8':
  - type: text
    content: 'Andriamanitra koa no hampiorina anareo hatramin’ny farany, ka tsy hanananareo tsiny amin’ny andro hiavian’i Jesoa Kristy Tompontsika. '
  '9':
  - type: text
    content: Mitana ny toky nomeny Andriamanitra
  - type: note
    content: Ampit Deot 9.7.
  - type: text
    content: ' Izay niantso anareo hiombona amin’ny '
  - type: text
    content: Zanany
  - type: text
    content: ', dia i Jesoa Kristy Tompontsika.'
  - type: heading
    content: Fisaraham-bazana ao amin’ny Fiangonana
