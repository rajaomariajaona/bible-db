document_id: ISA.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaorana an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, Ianao no Andriamanitro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanandratra Anao sy hankalaza ny anaranao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria notanterahinao ny zava-mahagaga
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nokasainao hatry ny elabe
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mafy orina sy azo itokiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nataonao lasa antontam-bato ny tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noravanao tokoa ny tanàna mimanda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy vanon-ko tanàna intsony ny lapan’ny mpiavonavona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy hatsangana intsony na oviana na oviana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho izany, dia hisy firenena matanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanome voninahitra Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tanànan’ireo firenena lozabe
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haneho fanajana Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa Ianao tokoa no fiarovana mafy ho an’ny osa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fiarovana mafy ho an’ny malahelo Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro mampahory azy ireny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fialofana amin’ny orana Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady alokaloka amin’ny hainandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny fisafoaky ny mpanjakazaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny oram-batravatra hamely tamboho
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: na toy ny hainandro mitarika tany karakaina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Resenao ny tabataban’ny mpiavonavona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, toy ny andrakofan-drahona ny hainandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ampanginana tsy ho re intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hiram-pandresen’ny mpanjakazaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanasana ho an’ny firenen-drehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eto amin’ity tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ' ity,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanao fanasana ho an’ny firenena rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanasana amin’ny hena matavy ombàn-divay niotrika ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hena matavy be sy feno tsoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary divay niotrika ela sady voadio tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eto Izy no hanafoana ny voalim-pisaonana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nanarona ny vahoaka rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanafoana ny lambam-pahoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nandrakotra ny firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hofoanany tsy hisy mandrakizay ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hofafan’ny Tompo ANDRIANANAHARY
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ranomaso amin’ny tava rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hofoanany... fahafatesana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Kôr 15.54. –
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'hofafany ny ranomaso:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Apôk 7.17; 21.4.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hoesoriny ny fahafaham-baràka
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahazo ny vahoakany manerana ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no nampanantenain’ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifaliana ho an’i Israely sy fahavoazana ho an’i Môaba
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Amin’izany andro izany no hilazana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro ny Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanantena Azy isika, hany ka novonjeny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Izy no TOMPO nantenaintsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mifalia sy miravoa isika fa novonjeny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa hipetraka amin’ity tendrombohitra ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanam-piarovan’ny TOMPO!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa i Môaba kosa hohosihosena eo amin’ny toerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fanosihosy mololo ao am-pahitra tondra-drano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny amin’i Môaba dia jereo Is 15.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ao izy no hitsiparaka tanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fanaon’ny mpilomano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa hampietry ny avonavon’i Môaba ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia eo aza ny hamailaky ny tanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny mandanao mafy sy sarotra iakarana, ry Môaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa nazeran’ny TOMPO sy narodany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nilamaka an-tany hiafara am-bovoka.
