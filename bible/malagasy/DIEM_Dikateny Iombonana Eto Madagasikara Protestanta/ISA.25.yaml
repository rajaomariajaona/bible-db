document_id: ISA.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana an’Andriamanitra
  - type: text
    content: TOMPO ô, Ianao no Andriamanitro.
  - type: text
    content: Hanandratra Anao sy hankalaza ny anaranao aho,
  - type: text
    content: satria notanterahinao ny zava-mahagaga
  - type: text
    content: izay efa nokasainao hatry ny elabe
  - type: text
    content: sady mafy orina sy azo itokiana.
  '10':
  - type: text
    content: Fa hipetraka amin’ity tendrombohitra ity
  - type: text
    content: ny tanam-piarovan’ny TOMPO!»
  - type: text
    content: Fa i Môaba kosa hohosihosena eo amin’ny toerany
  - type: text
    content: toy ny fanosihosy mololo ao am-pahitra tondra-drano
  - type: note
    content: Ny amin’i Môaba dia jereo Is 15.1 sy nta.
  - type: text
    content: .
  '11':
  - type: text
    content: Ao izy no hitsiparaka tanana
  - type: text
    content: toy ny fanaon’ny mpilomano;
  - type: text
    content: nefa hampietry ny avonavon’i Môaba ny TOMPO
  - type: text
    content: na dia eo aza ny hamailaky ny tanany.
  '12':
  - type: text
    content: Ary ny mandanao mafy sy sarotra iakarana, ry Môaba,
  - type: text
    content: dia efa nazeran’ny TOMPO sy narodany
  - type: text
    content: ka nilamaka an-tany hiafara am-bovoka.
  '2':
  - type: text
    content: Nataonao lasa antontam-bato ny tanàna,
  - type: text
    content: noravanao tokoa ny tanàna mimanda;
  - type: text
    content: tsy vanon-ko tanàna intsony ny lapan’ny mpiavonavona
  - type: text
    content: sady tsy hatsangana intsony na oviana na oviana.
  '3':
  - type: text
    content: Noho izany, dia hisy firenena matanjaka
  - type: text
    content: hanome voninahitra Anao;
  - type: text
    content: ary ny tanànan’ireo firenena lozabe
  - type: text
    content: dia haneho fanajana Anao.
  '4':
  - type: text
    content: Fa Ianao tokoa no fiarovana mafy ho an’ny osa;
  - type: text
    content: eny, fiarovana mafy ho an’ny malahelo Ianao
  - type: text
    content: amin’ny andro mampahory azy ireny.
  - type: text
    content: Fialofana amin’ny orana Ianao
  - type: text
    content: sady alokaloka amin’ny hainandro,
  - type: text
    content: satria ny fisafoaky ny mpanjakazaka
  - type: text
    content: dia toy ny oram-batravatra hamely tamboho
  '5':
  - type: text
    content: na toy ny hainandro mitarika tany karakaina.
  - type: text
    content: Resenao ny tabataban’ny mpiavonavona;
  - type: text
    content: eny, toy ny andrakofan-drahona ny hainandro
  - type: text
    content: no ampanginana tsy ho re intsony
  - type: text
    content: ny hiram-pandresen’ny mpanjakazaka.
  - type: heading
    content: Fanasana ho an’ny firenen-drehetra
  '6':
  - type: text
    content: 'Eto amin’ity tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ity,'
  - type: text
    content: ny TOMPOn’izao rehetra izao
  - type: text
    content: dia hanao fanasana ho an’ny firenena rehetra,
  - type: text
    content: fanasana amin’ny hena matavy ombàn-divay niotrika ela,
  - type: text
    content: dia hena matavy be sy feno tsoka
  - type: text
    content: ary divay niotrika ela sady voadio tsara.
  '7':
  - type: text
    content: Eto Izy no hanafoana ny voalim-pisaonana
  - type: text
    content: izay nanarona ny vahoaka rehetra,
  - type: text
    content: hanafoana ny lambam-pahoriana
  - type: text
    content: izay nandrakotra ny firenena rehetra.
  '8':
  - type: text
    content: Hofoanany tsy hisy mandrakizay ny fahafatesana.
  - type: text
    content: Hofafan’ny Tompo ANDRIANANAHARY
  - type: text
    content: ny ranomaso amin’ny tava rehetra
  - type: note
    content: 'Hofoanany... fahafatesana: jereo 1 Kôr 15.54. –hofafany ny ranomaso: Apôk 7.17; 21.4.'
  - type: text
    content: ','
  - type: text
    content: ary hoesoriny ny fahafaham-baràka
  - type: text
    content: nahazo ny vahoakany manerana ny tany.
  - type: text
    content: Izany no nampanantenain’ny TOMPO.
  - type: heading
    content: Fifaliana ho an’i Israely sy fahavoazana ho an’i Môaba
  '9':
  - type: text
    content: 'Amin’izany andro izany no hilazana hoe:'
  - type: text
    content: «Indro ny Andriamanitsika.
  - type: text
    content: Nanantena Azy isika, hany ka novonjeny.
  - type: text
    content: Eny, Izy no TOMPO nantenaintsika,
  - type: text
    content: koa mifalia sy miravoa isika fa novonjeny!
