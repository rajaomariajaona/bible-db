document_id: JHN.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay malemy tao Betesdà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany, dia nisy fankalazana nataon’ny Jiosy ka niakatra tany Jerosalema i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary tao Jerosalema teo akaikin’ny vavahadin’ny ondry, dia nisy dobo anankiray atao hoe Betesdà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Betesdà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Betzatà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'amin’ny teny hebreo. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Lala-mitafo
  - type: text
    text: ' dimy no manamorona ilay dobo, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary marobe ny marary nandry tamin’ireo lala-mitafo ireo: dia ny jamba, ny mandringa, ny maty ila. [Niandry ny fihetsehan’ny rano izy rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny Tompo nidina tao anatin’ny dobo indraindray ary nampihetsika ny rano; ka izay marary niroboka voalohany, rehefa mihetsika ny rano, dia sitrana tamin’ny aretiny na inona na inona nanjo azy]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy lehilahy anankiray teo, izay narary hatramin’ny 38 taona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hitan’i Jesoa nandry teo ralehilahy io sady fantany tsara fa hatramin’ny ela izy no efa toy izany, ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Te ho sitrana ve ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia novalian’ilay marary hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mba manana olona handroboka ahy ao anatin’ny dobo aho, Tompoko, rehefa voahetsika ny rano; ka nony mandeha aho, dia olon-kafa no tafidina alohako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitsangàna, ento ny fandrianao ka mandehana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Niaraka tamin’izay dia sitrana ralehilahy, ka nitondra ny fandriany ary nandeha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabata
  - type: text
    text: ' anefa tamin’io andro io. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa izao no tenin’ireo manampahefana jiosy tamin-dralehilahy vao sitrana:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sabata ny andro, ka tsy azonao atao ny mitondra ny fandrianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jer 17.21; Ne 13.19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ilay nahasitrana ahy no nanao tamiko hoe: «Ento ny fandrianao ka mandehana!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ry zareo nanontany azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Iza moa ilay olona nanao taminao hoe: «Ento ny fandrianao ka mandehana»?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy nahalala Azy anefa ilay vao sitrana, satria niala teo i Jesoa noho ny vahoaka vory tamin’io toerana io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Taorian’izany, dia hitan’i Jesoa teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' ralehilahy ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro efa sitrana ianao; ka aza manota intsony, fandrao zavatra ratsy kokoa noho ny teo no hanjo anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia lasa ralehilahy ka nanambara tamin’ireo manampahefana jiosy fa i Jesoa no nahasitrana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Noho i Jesoa nanao izany tamin’ny andro sabata, dia nanenjika Azy ny manampahefana jiosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy i Jesoa tamin’ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny Raiko dia miasa tsy an-kiato ary Izaho koa miasa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Noho izany teny izany dia vao mainka nitady hamono Azy ny manampahefana jiosy; satria tsy vitan’ny hoe nandika ny fepetra momba ny sabata fotsiny i Jesoa, fa nilaza koa hoe Andriamanitra no Rainy, ka dia nanao ny tenany ho mitovy amin’Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahefan’ilay Zanak’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niteny indray i Jesoa nanao tamin’ny manampahefana jiosy hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '–Lazaiko marina dia marina aminareo fa ny Zanaka dia tsy mahavita na inona na inona avy amin’ny tenany: izay hitany ataon’ny Ray no ataony, satria na inona na inona ataon’ny Ray dia toy izany koa no ataon’ny Zanaka. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny Ray dia fatra-pitia ny Zanaka, ka ny zavatra rehetra ataon’Izy Ray dia asehony Azy; ary asa lehibe noho ireto aza no mbola hasehony Azy, mba higaganareo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny Ray dia mampitsangana ireo maty sy mamelona aina azy: toy izany koa, ny Zanaka dia mamelona aina ireo tiany hovelomina aina. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny Ray aza tsy mitsara olona, fa ny Zanaka no efa nomeny fahefana feno hitsara, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'mba hanajan’ny olona rehetra ny Zanaka tahaka ny anajan’ny olona rehetra ny Ray: izay tsy manaja ny Zanaka, dia tsy manaja ny Ray Izay naniraka Azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lazaiko marina dia marina aminareo fa izay mihaino ireo teniko sy mino Ilay naniraka Ahy no velona aina mandrakizay; ka tsy hohelohina izy, satria efa niala tamin’ny fahafatesana mba ho velona aina. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lazaiko marina dia marina aminareo fa avy ary efa tonga sahady aza ny fotoana handrenesan’ny maty ilay feon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ', ka izay mandre dia ho velona. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny Ray dia manana fahefana hanome ny aina: toy izany koa no nanomezany fahefana ny Zanaka hanome ny aina. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nomen’ny Ray fahefana hitsara Izy, satria '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aza gaga amin’izany, fa avy ny fotoana handrenesan’ireo rehetra any am-pasana ilay feon’ny Zanak’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ary hiala avy ao izy rehetra, ka izay manao ny tsara dia hitsangana mba ho velona aina, fa izay manao ny ratsy kosa dia hitsangana mba hohelohina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Dan 12.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo vavolombelona manambara ny fahefàn’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '–Raha Izaho dia tsy mahavita na inona na inona avy amin’ny tenako. Araka izay reko amin’ny Ray no itsarako; ka ara-drariny ny fitsaràko, satria tsy ny sitrapoko no tadiaviko hatao fa ny sitrapon’Ilay naniraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha Izaho ihany no vavolombelona manambara ny tenako, dia tsy azo antoka ny fijoroako ho vavolombelona; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'fa misy hafa izay mijoro ho vavolombelona momba Ahy, ary fantatro fa azo antoka ny fijoroany ho vavolombelona momba Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nandefa iraka tany amin’i Jôhany ianareo, ary nijoro ho vavolombelona nanambara ny marina i Jôhany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Jôhany '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mpanao batisa izany: jereo 1.19-27; 3.22-30.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tsy dia ny fijoroana ho vavolombelona avy amin’olona anefa no ianteherako, fa ny mba hahavoavonjy anareo no ilazako izany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'I Jôhany dia toy ny jiro nirehitra sy nanazava, ka satrinareo nifaliana vetivety ny fahazavany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Raha Izaho dia manana fijoroana ho vavolombelona manoatra ny an’i Jôhany, satria ireo asa nomen’ny Raiko hotontosaiko sady ataoko tokoa no vavolombelona momba Ahy sady manambara fa nirahin’ny Ray Aho: '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ny Ray Izay naniraka Ahy mihitsy no vavolombelona nanambara Ahy. Tsy mba nandre ny feony na nahita ny endriny na oviana na oviana ianareo, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'sady tsy mba manana ny teniny mitoetra ao anatinareo, noho ianareo tsy mino Ilay nirahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mandinika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' ianareo, satria ao no heverinareo hahavelona aina mandrakizay; ireo Soratra Masina ireo indrindra no mijoro ho vavolombelona manambara Ahy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.45 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: kanefa tsy mety manatona Ahy ianareo mba hahavelona aina anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tsy hoe voninahitra avy amin’olombelona no tadiaviko; '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'saingy fantatro ianareo, fa tsy manana ny fitiavana an’Andriamanitra ao anatinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Raha Izaho dia tamin’ny anaran’ny Raiko no nahatongavako, nefa tsy raisinareo; raha misy hafa ka tamin’ny anaran’ny tenany no nahatongavany, dia horaisinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Aminareo samy ianareo no itadiavanareo voninahitra fa ny voninahitra avy amin’Andriamanitra Tokana tsy tadiavinareo, ka hataonareo ahoana no fino? '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Aza heverinareo fa Izaho no hiampanga anareo eo anatrehan’ny Ray; ao ny hiampanga anareo, dia i Mosesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 31.26-27.
    marker-yv: yv-n
  - type: text
    text: ' izay nitokianareo! '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Eny, raha mba mino an’i Mosesy ianareo, dia ho nino Ahy koa, satria nanoratra nanambara Ahy izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 18.15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Fa raha tsy mino izay nosoratany ianareo, hataonareo ahoana no fino ireo teniko?
