document_id: 2KI.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jôasy mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 24.1-3)
  - type: text
    content: Tamin’ny taona fahafito
  - type: note
    content: Amin’ny dkt sasany ny 12.1-22 dia alahatra ho 11.21–12.21.
  - type: text
    content: ' nanjakan’i Jehò tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga ho mpanjakan’i Joda i Jôasy; vao fito taona izy tamin’izay, ary naharitra efapolo taona no nanjakany tany Jerosalema. Ny anaran-dreniny dia i Tsibià avy any Beera-Seba. '
  '10':
  - type: text
    content: 'Fa naka vata iray i Jôiadà mpisorona, dia noloahiny ny sarony ka napetrany teo akaikin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' teo ankavanan’ny fidirana amin’ny tranon’ny TOMPO; dia nalatsaky ny mpisorona mpiandry varavarana'
  - type: note
    content: 'mpisorona mpiandry varavarana: olona ambony eo amin’ny mpisorona (jereo 23.4; 25.18) na dia tsy fantatra aza ny tena asany.'
  - type: text
    content: ' tao ny vola rehetra nentina tao an-tranon’ny TOMPO. '
  '11':
  - type: text
    content: 'Rehefa hitany fa be ny vola tao am-bata, dia nangonin’ny mpitantsoratry ny mpanjaka sy ny mpisorombe ny vola tao an-tranon’ny TOMPO ka nisainy. '
  '12':
  - type: text
    content: 'Rehefa voaisa ny vola, dia natolony ny mpiandraikitra ny tranon’ny TOMPO izay nampiasa izany hanakaramana ny mpandrafitra sy ny mpanao mari-trano niasa tao an-tranon’ny Tompo '
  '13':
  - type: text
    content: mbamin’ny mpandatsa-biriky sy ny mpipai-bato ary koa hividianana hazo sy vato voapaika hanamboarana ny simba amin’ny tranon’ny TOMPO sy hiantohana izay fandaniana hafa rehetra ilaina amin’izany.
  '14':
  - type: text
    content: Nefa tsy mba nanaovana koveta na antsy na tsatokaty famafazana
  - type: note
    content: Momba ireo kojakoja samihafa ireo dia jereo 1 Mp 7.50.
  - type: text
    content: ', na trompetra na zavatra hafa vita volamena na volafotsy ireny fanomezana nentina tao an-tranon’ny TOMPO ireny. '
  '15':
  - type: text
    content: 'Dia nomena ny mpanao raharaha izany hanamboarana ny tranon’ny TOMPO. '
  '16':
  - type: text
    content: Tsy nampamoahina ny mpanome karama ny mpiasa satria nahatoky tamin’ny fiasany
  - type: note
    content: Jereo 22.7.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Ny vola narotsaky ny olona ho solon’ny '
  - type: text
    content: sorom-panonerana
  - type: text
    content: ' na sorona fanalana ny ota dia tsy mba natolotra ho an’ny tranon’ny TOMPO, fa an’ny mpisorona kosa'
  - type: note
    content: Ampit Lev 7.7.
  - type: text
    content: ' izany.'
  - type: heading
    content: Fiafaran’ny fanjakan’i Jôasy
  - type: heading
    content: (Jereo 2 Tan 24.23-27)
  '18':
  - type: text
    content: 'Tamin’izany dia niakatra nanafika ny tanànan’i Gata i Hazaela mpanjakan’i Siria, ka nahazo azy; rehefa izany, dia niomana hanafika an’i Jerosalema ihany koa izy. '
  '19':
  - type: text
    content: Fa nangonin’i Jôasy mpanjakan’i Joda avokoa ny zava-tsarobidy rehetra izay natolony na natolotr’ireo razany mpanjakan’i Joda, dia i Jôsafata sy i Jôrama ary i Ahazià ho an’ny TOMPO, mbamin’ireo volamena napetraka tao amin’ny efitrano firaketan’ny tempoly sy tao an-dapan’ny mpanjaka; ka nampanateriny ho an’i Hazaela izay nisinda tsy nanafika an’i Jerosalema.
  '20':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôasy ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Ary nioko hanohitra an’i Jôasy ny manamboninahiny; ka ny anankiroa taminy, dia i Jôzabada zanakalahin’i Simehata sy i Jehôzabada zanakalahin’i Sômera no namono azy ho faty tao Bety-Milao
  - type: note
    content: 'Bety-Milao: toerana tsy fantatra mazava; mety ho kartie iray ao Jerosalema.'
  - type: text
    content: ' iny Jôasy nidina hankany Silà iny. Dia nalevina tao amin’ny fasam-pianakaviany tao an-'
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ' izy; ary i Amatsià zanany lahy no nanjaka nandimby azy.'
  '3':
  - type: text
    content: 'Nanao izay mahitsy eo imason’ny TOMPO tamin’ny androny rehetra i Jôasy, satria nampianatra azy tsara i Jôiadà mpisorona. '
  '4':
  - type: text
    content: Saingy tsy nofoanany ny toeram-panasinana, ka mbola tonga nitondra sorona sy nandoro azy hanetona teny ihany ny olona.
  - type: heading
    content: Nampanamboarin’i Jôasy ny tempoly
  - type: heading
    content: (Jereo 2 Tan 24.4-14)
  '5':
  - type: text
    content: 'Indray andro dia hoy i Jôasy tamin’ireo mpisorona:'
  - type: text
    content: –Angoninareo izay vola rehetra entina ato an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ', dia ny vola nandoavan’ny olona ny hetrany'
  - type: note
    content: 'hetrany: jereo Eks 30.11-16; Lev 27.1-8; Mt 17.24-27.'
  - type: text
    content: ' na ny vola natolotra an-tsitrapo. Asaivo hangonin’ireo mpandray vola voatendry izany ka hampiasainareo hanamboarana izay hitanareo fa simba amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: .
  '7':
  - type: text
    content: 'Kanjo tamin’ny taona faha-23 nanjakan’i Jôasy dia tsy mbola voavoatr’ireo mpisorona ihany ny simba tamin’ny tempoly. '
  '8':
  - type: text
    content: 'Koa nampiantso an’i Jôiadà sy ny mpisorona hafa i Jôasy mpanjaka ka nanao taminy hoe:'
  - type: text
    content: –Nahoana no tsy namboarinareo ny simba tamin’ny tempoly? Noho izany dia tsy mahazo maka vola amin’ny mpandray volanareo intsony ianareo, fa avelao kosa izany hanamboarana ny tempoly.
  '9':
  - type: text
    content: Dia nanaiky tsy handray vola amin’ny olona intsony sy tsy hiandraikitra ny fanamboarana ny tempoly ny mpisorona.
