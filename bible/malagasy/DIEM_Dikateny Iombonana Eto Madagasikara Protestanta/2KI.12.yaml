document_id: 2KI.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jôasy mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 24.1-3)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taona fahafito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1-2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amin’ny dkt sasany ny 12.1-22 dia alahatra ho 11.21–12.21.
      marker-yv: yv-n
    - type: text
      text: ' nanjakan’i Jehò tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' no tonga ho mpanjakan’i Joda i Jôasy; vao fito taona izy tamin’izay, ary naharitra efapolo taona no nanjakany tany Jerosalema. Ny anaran-dreniny dia i Tsibià avy any Beera-Seba. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa naka vata iray i Jôiadà mpisorona, dia noloahiny ny sarony ka napetrany teo akaikin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' teo ankavanan’ny fidirana amin’ny tranon’ny TOMPO; dia nalatsaky ny mpisorona mpiandry varavarana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mpisorona mpiandry varavarana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: olona ambony eo amin’ny mpisorona (jereo 23.4; 25.18) na dia tsy fantatra aza ny tena asany.
      marker-yv: yv-n
    - type: text
      text: ' tao ny vola rehetra nentina tao an-tranon’ny TOMPO. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitany fa be ny vola tao am-bata, dia nangonin’ny mpitantsoratry ny mpanjaka sy ny mpisorombe ny vola tao an-tranon’ny TOMPO ka nisainy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa voaisa ny vola, dia natolony ny mpiandraikitra ny tranon’ny TOMPO izay nampiasa izany hanakaramana ny mpandrafitra sy ny mpanao mari-trano niasa tao an-tranon’ny Tompo '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mbamin’ny mpandatsa-biriky sy ny mpipai-bato ary koa hividianana hazo sy vato voapaika hanamboarana ny simba amin’ny tranon’ny TOMPO sy hiantohana izay fandaniana hafa rehetra ilaina amin’izany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa tsy mba nanaovana koveta na antsy na tsatokaty famafazana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ireo kojakoja samihafa ireo dia jereo 1 Mp 7.50.
      marker-yv: yv-n
    - type: text
      text: ', na trompetra na zavatra hafa vita volamena na volafotsy ireny fanomezana nentina tao an-tranon’ny TOMPO ireny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nomena ny mpanao raharaha izany hanamboarana ny tranon’ny TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nampamoahina ny mpanome karama ny mpiasa satria nahatoky tamin’ny fiasany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 22.7.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vola narotsaky ny olona ho solon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom-panonerana
    - type: text
      text: ' na sorona fanalana ny ota dia tsy mba natolotra ho an’ny tranon’ny TOMPO, fa an’ny mpisorona kosa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lev 7.7.
      marker-yv: yv-n
    - type: text
      text: ' izany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiafaran’ny fanjakan’i Jôasy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 24.23-27)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany dia niakatra nanafika ny tanànan’i Gata i Hazaela mpanjakan’i Siria, ka nahazo azy; rehefa izany, dia niomana hanafika an’i Jerosalema ihany koa izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa nangonin’i Jôasy mpanjakan’i Joda avokoa ny zava-tsarobidy rehetra izay natolony na natolotr’ireo razany mpanjakan’i Joda, dia i Jôsafata sy i Jôrama ary i Ahazià ho an’ny TOMPO, mbamin’ireo volamena napetraka tao amin’ny efitrano firaketan’ny tempoly sy tao an-dapan’ny mpanjaka; ka nampanateriny ho an’i Hazaela izay nisinda tsy nanafika an’i Jerosalema.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Jôasy ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Joda.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nioko hanohitra an’i Jôasy ny manamboninahiny; ka ny anankiroa taminy, dia i Jôzabada zanakalahin’i Simehata sy i Jehôzabada zanakalahin’i Sômera no namono azy ho faty tao Bety-Milao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21-22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bety-Milao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tsy fantatra mazava; mety ho kartie iray ao Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ' iny Jôasy nidina hankany Silà iny. Dia nalevina tao amin’ny fasam-pianakaviany tao an-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tanànan’i Davida
    - type: text
      text: ' izy; ary i Amatsià zanany lahy no nanjaka nandimby azy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay mahitsy eo imason’ny TOMPO tamin’ny androny rehetra i Jôasy, satria nampianatra azy tsara i Jôiadà mpisorona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saingy tsy nofoanany ny toeram-panasinana, ka mbola tonga nitondra sorona sy nandoro azy hanetona teny ihany ny olona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nampanamboarin’i Jôasy ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 24.4-14)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro dia hoy i Jôasy tamin’ireo mpisorona:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Angoninareo izay vola rehetra entina ato an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ', dia ny vola nandoavan’ny olona ny hetrany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hetrany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 30.11-16; Lev 27.1-8; Mt 17.24-27.
      marker-yv: yv-n
    - type: text
      text: ' na ny vola natolotra an-tsitrapo. Asaivo hangonin’ireo mpandray vola voatendry izany ka hampiasainareo hanamboarana izay hitanareo fa simba amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo tamin’ny taona faha-23 nanjakan’i Jôasy dia tsy mbola voavoatr’ireo mpisorona ihany ny simba tamin’ny tempoly. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nampiantso an’i Jôiadà sy ny mpisorona hafa i Jôasy mpanjaka ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no tsy namboarinareo ny simba tamin’ny tempoly? Noho izany dia tsy mahazo maka vola amin’ny mpandray volanareo intsony ianareo, fa avelao kosa izany hanamboarana ny tempoly.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanaiky tsy handray vola amin’ny olona intsony sy tsy hiandraikitra ny fanamboarana ny tempoly ny mpisorona.
