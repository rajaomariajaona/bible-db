document_id: JER.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jeremià sy ny fehikibo rongony
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no voalazan’ny TOMPO tamiko: «Mandehana mividy fehikibo rongony ho anao ka afehezo ny kibonao izany, nefa aza alona rano.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa vahoaka ratsy tsy mety mihaino izay lazaiko izy, mikiry amin’ny ditram-pony, mifikitra amin’ireo andriamani-kafa ka manompo azy sy miankohoka eo anatrehany. Koa ho tahaka io fehikibo tsy azo ampiasaina intsony io anie ity vahoaka ity! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Toy ny amatoran’ny olona ny fehikibo amin’ny kibony, hoy ny teny hentitra avy amiko TOMPO, no nifatorako tamin’ny vahoakan’i Israely sy ny vahoakan’i Joda rehetra mba hahatonga azy ho vahoakako sy ho lazako, ho voninahitro sy ho firavako. Kanjo tsy nety nihaino Ahy izy.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny divay sy ny fahatezeran’ny Tompo
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ndeha lazao amin’ny vahoakan’i Israely sy amin’ny vahoakan’i Joda, ry Jeremià, ity hafatra ity: «Izao no lazain’ny TOMPO, Andriamanitr’i Israely: Ny siny rehetra dia natao hofenoina divay!» Ary raha mamaly anao izy hoe: «Fantatray tokoa fa natao hofenoina divay ny siny rehetra», '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'dia hitenenanao hoe: «Izao no lazain’ny TOMPO: Indro hataoko mamo tanteraka ny mponina rehetra amin’ity tany ity, dia ny mpanjaka izay mipetraka eo amin’ny sezafiandrianan’i Davida, ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ', ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ary ny mponina rehetra eto Jerosalema'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Miteny an-kolaka momba ny lohahevitra izay hiverina matetika eto i Jeremià: ny fahatezeran’Andriamanitra dia oharina amin’ny divay izay mahamamo (jereo ohatra Jer 25.15-16).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hampifandrotehiko ny olona ka ny ray aman-dreny hamely ny zanany, hoy ny teny hentitra avy amiko TOMPO. Tsy hitsitsy na hiantra na hamindra fo Aho fa handringana azy.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mihainoa fa sao tara loatra.
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mihainoa, ka mandrenesa tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza miavonavona satria ny TOMPO no miteny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Omeo voninahitra ny TOMPO Andriamanitrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dieny tsy mbola nahatonga haizina Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dieny tsy mbola tafintohina ny tongotrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-tendrombohitra rakotry ny alina eny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miandry ny mazava ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo hovany ho alo-pahafatesana izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hataony toy ny rahona mainty.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Raha tsy mihaino izany hafatra izany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitomany ao amin’ny toera-mangina aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny avonavonareo mihoa-pampana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny masoko dia hamarin-dranomaso,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamarin-dranomaso hijononoka be,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria lasan-ko babo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny andianondrin’ny TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatry ny Tompo ho an’ny ankohonan’ny mpanjaka
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lazao amin’ny mpanjaka sy ny reniny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mipetraha amin’ny tany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nianjera avy eny an-dohanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny satroboninahitrareo tsara tarehy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Voahidy ny tanàna any Negeba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy olona mamoha intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria lasan-ko babo avokoa ny vahoakan’i Joda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, lasan-ko babo avokoa izy rehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Afa-baràka i Jerosalema
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nividy fehikibo araka izay nolazain’ny TOMPO aho ka nafehiko ny kiboko. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Atopazo ny masonao, ry Jerosalema, ka jereo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga avy any avaratra ny fahavalonao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona àry no hanjo ny vahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nankiniko taminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ondrinao tsara tarehy?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary inona no havalinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha izay nozarinao ho namanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nivadika hamely sy hanapaka anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tratry ny fanaintainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vehivavy miteraka ianao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Amin’izay dia hanontany tena ianao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ahoana no nahatonga izao tamiko?»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny halehiben’ny fahadisoanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanaingàna ny morontongotr’akanjonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanaovana an-keriny taminao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Afaka hanova ny volon-kodiny ve ny Etiôpianina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na afaka hanova ny sorany ve ny leôparda?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia! Dia toy izany koa ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay efa zatra manao ratsy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy afaka hanao ny tsara intsony ianareo!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Koa haeliko ianareo ho toy ny poti-mololo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indaosin’ny rivotra avy any an-taniefitra.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ry Jerosalema, izao no voatendry ho anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay anjara nomaniko ho anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitra avy amiko TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nanadino Ahy ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka nifikitra tamin’ireo andriamani-tsiizy:'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Izaho koa dia hanainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny morontongotr’akanjonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatreny amin’ny endrikao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho hita mitanjaka ianao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Izato fanitsakitsaham-bady sy antsoantsom-pilàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fijangajangana mahamenatra nafitsokao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.20; 3.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny amin’ny havoana sy teny an-tsaha teny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nahitako ireo sampinao maharikoriko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozanao, ry Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa tsy mety '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hidio
    - type: text
      text: ' ianao!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no haharetan’izany?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nisy tenin’ny TOMPO fanindroany nanao tamiko hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: «Ento ny fehikibo izay novidinao ka afehinao ny kibonao, ary mankanesa any Farà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Farà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika tranainy. Renirano mikoriana mankany Jôrdàna io, tokony ho adiny iray an-tongotra ao avaratr’i Hanatôta. Dkt mahazatra '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Eofrata.
      marker-yv: yv-n
    - type: text
      text: 'ka afeno ao an-tsefatsefaky ny harambato any izy.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nankany Farà aho ary nafeniko tany ilay fehikibo araka izay nandidian’ny TOMPO ahy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony afaka andro maro dia hoy ny TOMPO tamiko: «Mankanesa indray any Farà ianao ary alao ilay fehikibo nasaiko nafeninao tany.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia niverina tany Farà aho mba hamongatra sy haka ilay fehikibo tao amin’ny toerana izay nanafenako azy. Kinanjo indro efa lò tanteraka, tsy azo ampiasaina intsony ilay fehikibo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '«Izao no lazain’ny TOMPO: Hataoko lo tahaka ity fehikibo ity ny zavatra mampirehareha an’i Joda sy mampirehareha fatratra an’i Jerosalema. '
