document_id: JER.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jeremià sy ny fehikibo rongony
  - type: text
    content: 'Izao no voalazan’ny TOMPO tamiko: «Mandehana mividy fehikibo rongony ho anao ka afehezo ny kibonao izany, nefa aza alona rano.» '
  '10':
  - type: text
    content: 'Fa vahoaka ratsy tsy mety mihaino izay lazaiko izy, mikiry amin’ny ditram-pony, mifikitra amin’ireo andriamani-kafa ka manompo azy sy miankohoka eo anatrehany. Koa ho tahaka io fehikibo tsy azo ampiasaina intsony io anie ity vahoaka ity! '
  '11':
  - type: text
    content: Toy ny amatoran’ny olona ny fehikibo amin’ny kibony, hoy ny teny hentitra avy amiko TOMPO, no nifatorako tamin’ny vahoakan’i Israely sy ny vahoakan’i Joda rehetra mba hahatonga azy ho vahoakako sy ho lazako, ho voninahitro sy ho firavako. Kanjo tsy nety nihaino Ahy izy.»
  - type: heading
    content: Ny divay sy ny fahatezeran’ny Tompo
  '12':
  - type: text
    content: 'Ndeha lazao amin’ny vahoakan’i Israely sy amin’ny vahoakan’i Joda, ry Jeremià, ity hafatra ity: «Izao no lazain’ny TOMPO, Andriamanitr’i Israely: Ny siny rehetra dia natao hofenoina divay!» Ary raha mamaly anao izy hoe: «Fantatray tokoa fa natao hofenoina divay ny siny rehetra», '
  '13':
  - type: text
    content: 'dia hitenenanao hoe: «Izao no lazain’ny TOMPO: Indro hataoko mamo tanteraka ny mponina rehetra amin’ity tany ity, dia ny mpanjaka izay mipetraka eo amin’ny sezafiandrianan’i Davida, ny '
  - type: text
    content: mpisorona
  - type: text
    content: ', ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' ary ny mponina rehetra eto Jerosalema'
  - type: note
    content: 'Miteny an-kolaka momba ny lohahevitra izay hiverina matetika eto i Jeremià: ny fahatezeran’Andriamanitra dia oharina amin’ny divay izay mahamamo (jereo ohatra Jer 25.15-16).'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Hampifandrotehiko ny olona ka ny ray aman-dreny hamely ny zanany, hoy ny teny hentitra avy amiko TOMPO. Tsy hitsitsy na hiantra na hamindra fo Aho fa handringana azy.»
  - type: heading
    content: Mihainoa fa sao tara loatra.
  '15':
  - type: text
    content: Mihainoa, ka mandrenesa tsara;
  - type: text
    content: aza miavonavona satria ny TOMPO no miteny.
  '16':
  - type: text
    content: Omeo voninahitra ny TOMPO Andriamanitrareo,
  - type: text
    content: dieny tsy mbola nahatonga haizina Izy
  - type: text
    content: ary dieny tsy mbola tafintohina ny tongotrareo
  - type: text
    content: eny an-tendrombohitra rakotry ny alina eny.
  - type: text
    content: Miandry ny mazava ianareo,
  - type: text
    content: kanjo hovany ho alo-pahafatesana izany
  - type: text
    content: sy hataony toy ny rahona mainty.
  '17':
  - type: text
    content: Raha tsy mihaino izany hafatra izany ianareo,
  - type: text
    content: dia hitomany ao amin’ny toera-mangina aho
  - type: text
    content: noho ny avonavonareo mihoa-pampana;
  - type: text
    content: eny, ny masoko dia hamarin-dranomaso,
  - type: text
    content: hamarin-dranomaso hijononoka be,
  - type: text
    content: satria lasan-ko babo
  - type: text
    content: ny andianondrin’ny TOMPO.
  - type: heading
    content: Hafatry ny Tompo ho an’ny ankohonan’ny mpanjaka
  '18':
  - type: text
    content: 'Lazao amin’ny mpanjaka sy ny reniny hoe:'
  - type: text
    content: «Mipetraha amin’ny tany ianareo,
  - type: text
    content: satria efa nianjera avy eny an-dohanareo
  - type: text
    content: ny satroboninahitrareo tsara tarehy.
  '19':
  - type: text
    content: Voahidy ny tanàna any Negeba,
  - type: text
    content: ary tsy misy olona mamoha intsony,
  - type: text
    content: satria lasan-ko babo avokoa ny vahoakan’i Joda;
  - type: text
    content: eny, lasan-ko babo avokoa izy rehetra.
  - type: heading
    content: Afa-baràka i Jerosalema
  '2':
  - type: text
    content: 'Dia nividy fehikibo araka izay nolazain’ny TOMPO aho ka nafehiko ny kiboko. '
  '20':
  - type: text
    content: 'Atopazo ny masonao, ry Jerosalema, ka jereo:'
  - type: text
    content: tonga avy any avaratra ny fahavalonao!
  - type: text
    content: Inona àry no hanjo ny vahoaka
  - type: text
    content: izay nankiniko taminao,
  - type: text
    content: dia ny ondrinao tsara tarehy?
  '21':
  - type: text
    content: Ary inona no havalinao
  - type: text
    content: raha izay nozarinao ho namanao
  - type: text
    content: no nivadika hamely sy hanapaka anao?
  - type: text
    content: Ho tratry ny fanaintainana
  - type: text
    content: toy ny vehivavy miteraka ianao.
  '22':
  - type: text
    content: 'Amin’izay dia hanontany tena ianao hoe:'
  - type: text
    content: «Ahoana no nahatonga izao tamiko?»
  - type: text
    content: Ny halehiben’ny fahadisoanao
  - type: text
    content: no nanaingàna ny morontongotr’akanjonao
  - type: text
    content: ka nanaovana an-keriny taminao.
  '23':
  - type: text
    content: Afaka hanova ny volon-kodiny ve ny Etiôpianina
  - type: text
    content: na afaka hanova ny sorany ve ny leôparda?
  - type: text
    content: Tsia! Dia toy izany koa ianareo,
  - type: text
    content: 'izay efa zatra manao ratsy:'
  - type: text
    content: tsy afaka hanao ny tsara intsony ianareo!
  '24':
  - type: text
    content: Koa haeliko ianareo ho toy ny poti-mololo
  - type: text
    content: indaosin’ny rivotra avy any an-taniefitra.
  '25':
  - type: text
    content: Ry Jerosalema, izao no voatendry ho anao,
  - type: text
    content: dia ilay anjara nomaniko ho anao,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO,
  - type: text
    content: satria nanadino Ahy ianao
  - type: text
    content: 'ka nifikitra tamin’ireo andriamani-tsiizy:'
  '26':
  - type: text
    content: Izaho koa dia hanainga
  - type: text
    content: ny morontongotr’akanjonao
  - type: text
    content: hatreny amin’ny endrikao
  - type: text
    content: ka ho hita mitanjaka ianao.
  '27':
  - type: text
    content: Izato fanitsakitsaham-bady sy antsoantsom-pilàna
  - type: text
    content: ary fijangajangana mahamenatra nafitsokao
  - type: note
    content: Jereo 2.20; 3.8 sy nta.
  - type: text
    content: '!'
  - type: text
    content: Teny amin’ny havoana sy teny an-tsaha teny
  - type: text
    content: na nahitako ireo sampinao maharikoriko.
  - type: text
    content: Lozanao, ry Jerosalema,
  - type: text
    content: 'fa tsy mety '
  - type: text
    content: hidio
  - type: text
    content: ' ianao!'
  - type: text
    content: Mandra-pahoviana no haharetan’izany?
  '3':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO fanindroany nanao tamiko hoe: '
  '4':
  - type: text
    content: «Ento ny fehikibo izay novidinao ka afehinao ny kibonao, ary mankanesa any Farà
  - type: note
    content: 'Farà: araka ny dkt grika tranainy. Renirano mikoriana mankany Jôrdàna io, tokony ho adiny iray an-tongotra ao avaratr’i Hanatôta. Dkt mahazatra Eofrata.'
  - type: text
    content: 'ka afeno ao an-tsefatsefaky ny harambato any izy.» '
  '5':
  - type: text
    content: 'Dia nankany Farà aho ary nafeniko tany ilay fehikibo araka izay nandidian’ny TOMPO ahy. '
  '6':
  - type: text
    content: 'Nony afaka andro maro dia hoy ny TOMPO tamiko: «Mankanesa indray any Farà ianao ary alao ilay fehikibo nasaiko nafeninao tany.» '
  '7':
  - type: text
    content: Dia niverina tany Farà aho mba hamongatra sy haka ilay fehikibo tao amin’ny toerana izay nanafenako azy. Kinanjo indro efa lò tanteraka, tsy azo ampiasaina intsony ilay fehikibo.
  '8':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '9':
  - type: text
    content: '«Izao no lazain’ny TOMPO: Hataoko lo tahaka ity fehikibo ity ny zavatra mampirehareha an’i Joda sy mampirehareha fatratra an’i Jerosalema. '
