document_id: JOB.42
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaiky ny tsy fahombiazany i Jôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Namaly ny Tompo i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fantatro fa mahay ny zava-drehetra Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy maharara izay tianao hatao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy Ianao tamiko: «Zovy moa ianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no sahy manivaiva ny fikasàko
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ireo teny foana tsisy dikany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 38.2.
    marker-yv: yv-n
  - type: text
    text: ?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, zava-tsy takatry ny saiko no voateniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zava-mahagaga loatra amiko sady tsy fantatro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Henoy, hoy Ianao, fa mbola hiteny Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanontany anao Aho ka hovalianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 38.3.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy nahafantatra ny aminao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy izay henoko momba Anao ihany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa ankehitriny izao kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny masoko no nahita Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany no anatsoahako izay voambarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy iekeko hadisoana ary ietreko tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ny vovoka sy ny lavenona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naverin’ny Tompo amin’ny laoniny ny momba an’i Jôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa voalazan’ny Tompo tamin’i Jôba ireo teny ireo, dia i Elifaza avy any Temàna no nataotaony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tezitra aminao sy ny namanao roa lahy Aho satria tsy mba marina tahaka izay nolazain’i Jôba mpanompoko ny filàzanareo Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa ankehitriny makà ombilahy fito sy ondrilahy fito ianareo, dia mankanesa any amin’ny Jôba mpanompoko. Hatolotrareo ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo noho ny fahotanareo ireo biby ireo; ary hifona ho anareo i Jôba mpanompoko. Fa ho sitrako ny vavak’i Jôba, ka tsy hamaly anareo araka ny hadalànareo Aho na dia tsy marina tahaka izay nolazain’i Jôba mpanompoko aza ny filàzanareo Ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nandeha i Elifaza avy any Temàna sy i Bildada avy any Soha ary i Tsôfara avy any Nahama ka nanao izay nasain’ny TOMPO hataony; ary sitraky ny TOMPO ny vavak’i Jôba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rehefa avy nivavaka ho an’ireo namany i Jôba, dia naverin’ny TOMPO hanan-karena indray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hanan-karena indray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jôb 1.1-3.
    marker-yv: yv-n
  - type: text
    text: ' ary nomeny indroan’izay rehetra nananany fahiny aza. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia tonga namangy an’i Jôba avokoa ny rahalahiny sy ny anabaviny mbamin’ny olom-pantany fahiny, ka niara-nihinana taminy tao an-tranony. Naneho fiombonana taminy koa ireo sady nampionona azy noho ny loza rehetra nalefan’ny TOMPO taminy. Ary samy nanolotra fanomezana vola kesita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kesita iray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny teny ampiasaina eto (sy ao amin’ny Gen 33.19; Jos 24.32) dia manondro fa ny teti-bidin’io vola io dia mitovy amin’ny vidin’ny ondrivavy iray.
    marker-yv: yv-n
  - type: text
    text: ' iray sy rojo volamena iray avy ho azy izy rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nandritra ny taona sisa niainan’i Jôba, dia heniky ny fitahian’ny TOMPO mihoatra noho ny taloha izy, fa nanana ondry 14 000, rameva enina arivo, omby miasa roa arivo ary borikivavy arivo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nanan-janakalahy fito ary zanakavavy telo koa izy, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ka ny vavimatoa nataony hoe Jemimà, ny vaviaivo Ketsihà ary ny faravavy Kerena-Hapòka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe domohina, vonin-kanelina ary manja-maso.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tao amin’ny tany iray manontolo dia tsy nisy vehivavy tsara tarehy tahaka ireo zanakavavin’i Jôba. Ary samy nomen-drainy ny anjara lovany tahaka ireo anadahiny avy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Taorian’izany dia mbola velona efapolo amby zato taona i Jôba ka nahita ireo zanany sy zafikeliny hatramin’ny zafindohaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia maty i Jôba rehefa ela niainana ka tratrantitra.
