document_id: JOB.42,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miaiky ny tsy fahombiazany i Jôba
  - type: text
    content: 'Namaly ny Tompo i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Rehefa avy nivavaka ho an’ireo namany i Jôba, dia naverin’ny TOMPO hanan-karena indray
  - type: note
    content: 'hanan-karena indray: jereo Jôb 1.1-3.'
  - type: text
    content: ' ary nomeny indroan’izay rehetra nananany fahiny aza. '
  '11':
  - type: text
    content: Dia tonga namangy an’i Jôba avokoa ny rahalahiny sy ny anabaviny mbamin’ny olom-pantany fahiny, ka niara-nihinana taminy tao an-tranony. Naneho fiombonana taminy koa ireo sady nampionona azy noho ny loza rehetra nalefan’ny TOMPO taminy. Ary samy nanolotra fanomezana vola kesita
  - type: note
    content: 'kesita iray: ny teny ampiasaina eto (sy ao amin’ny Gen 33.19; Jos 24.32) dia manondro fa ny teti-bidin’io vola io dia mitovy amin’ny vidin’ny ondrivavy iray.'
  - type: text
    content: ' iray sy rojo volamena iray avy ho azy izy rehetra.'
  '12':
  - type: text
    content: 'Nandritra ny taona sisa niainan’i Jôba, dia heniky ny fitahian’ny TOMPO mihoatra noho ny taloha izy, fa nanana ondry 14 000, rameva enina arivo, omby miasa roa arivo ary borikivavy arivo izy. '
  '13':
  - type: text
    content: 'Nanan-janakalahy fito ary zanakavavy telo koa izy, '
  '14':
  - type: text
    content: ka ny vavimatoa nataony hoe Jemimà, ny vaviaivo Ketsihà ary ny faravavy Kerena-Hapòka
  - type: note
    content: Izany hoe domohina, vonin-kanelina ary manja-maso.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Tao amin’ny tany iray manontolo dia tsy nisy vehivavy tsara tarehy tahaka ireo zanakavavin’i Jôba. Ary samy nomen-drainy ny anjara lovany tahaka ireo anadahiny avy izy.
  '16':
  - type: text
    content: 'Taorian’izany dia mbola velona efapolo amby zato taona i Jôba ka nahita ireo zanany sy zafikeliny hatramin’ny zafindohaliny. '
  '17':
  - type: text
    content: Dia maty i Jôba rehefa ela niainana ka tratrantitra.
  '2':
  - type: text
    content: Fantatro fa mahay ny zava-drehetra Ianao,
  - type: text
    content: ary tsy misy maharara izay tianao hatao.
  '3':
  - type: text
    content: 'Hoy Ianao tamiko: «Zovy moa ianao'
  - type: text
    content: no sahy manivaiva ny fikasàko
  - type: text
    content: amin’ireo teny foana tsisy dikany
  - type: note
    content: Jereo 38.2.
  - type: text
    content: ?»
  - type: text
    content: Eny, zava-tsy takatry ny saiko no voateniko
  - type: text
    content: dia zava-mahagaga loatra amiko sady tsy fantatro!
  '4':
  - type: text
    content: «Henoy, hoy Ianao, fa mbola hiteny Aho;
  - type: text
    content: hanontany anao Aho ka hovalianao
  - type: note
    content: Jereo 38.3.
  - type: text
    content: .»
  '5':
  - type: text
    content: Tsy nahafantatra ny aminao aho
  - type: text
    content: afa-tsy izay henoko momba Anao ihany.
  - type: text
    content: Kanefa ankehitriny izao kosa
  - type: text
    content: dia ny masoko no nahita Anao.
  '6':
  - type: text
    content: Izany no anatsoahako izay voambarako,
  - type: text
    content: sy iekeko hadisoana ary ietreko tena
  - type: text
    content: eto amin’ny vovoka sy ny lavenona.
  - type: heading
    content: Naverin’ny Tompo amin’ny laoniny ny momba an’i Jôba
  '7':
  - type: text
    content: 'Rehefa voalazan’ny Tompo tamin’i Jôba ireo teny ireo, dia i Elifaza avy any Temàna no nataotaony hoe:'
  - type: text
    content: '–Tezitra aminao sy ny namanao roa lahy Aho satria tsy mba marina tahaka izay nolazain’i Jôba mpanompoko ny filàzanareo Ahy. '
  '8':
  - type: text
    content: 'Koa ankehitriny makà ombilahy fito sy ondrilahy fito ianareo, dia mankanesa any amin’ny Jôba mpanompoko. Hatolotrareo ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo noho ny fahotanareo ireo biby ireo; ary hifona ho anareo i Jôba mpanompoko. Fa ho sitrako ny vavak’i Jôba, ka tsy hamaly anareo araka ny hadalànareo Aho na dia tsy marina tahaka izay nolazain’i Jôba mpanompoko aza ny filàzanareo Ahy.'
  '9':
  - type: text
    content: Dia nandeha i Elifaza avy any Temàna sy i Bildada avy any Soha ary i Tsôfara avy any Nahama ka nanao izay nasain’ny TOMPO hataony; ary sitraky ny TOMPO ny vavak’i Jôba.
