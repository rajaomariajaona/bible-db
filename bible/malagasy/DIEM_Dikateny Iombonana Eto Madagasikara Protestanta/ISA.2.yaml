document_id: ISA.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ny toe-javatra hitan’i Isaià, zanakalahin’i Amôtsa, momba ny fanjakan’i Joda sy ny tanànan’i Jerosalema
  - type: note
    content: Lohateny ho an’ny toko 2–4 na 2–11 mihitsy aza ity and 1 ity; ampit 1.1.
  - type: text
    content: .
  - type: heading
    content: Ny vahoaka rehetra hirohotra hankao Jerosalema
  - type: heading
    content: (2.2-4; jereo Mik 4.1-3)
  '10':
  - type: text
    content: Miafena any ambany vatolampy ianareo
  - type: text
    content: ary misitriha any anaty tany,
  - type: text
    content: mba ho lavitry ny TOMPO mahatahotra
  - type: text
    content: sy ho lavitry ny fiandrianany mamirapiratra
  - type: note
    content: Jereo Apôk 6.15.
  - type: text
    content: .
  '11':
  - type: text
    content: Hitanondrika ny olona mpiandranandrana,
  - type: text
    content: ary hihohoka ny olona mpanandra-tena;
  - type: text
    content: fa amin’izany andro izany,
  - type: text
    content: dia ny TOMPO irery ihany no hasandratra.
  '12':
  - type: text
    content: Eny, hisy andro omanin’ny TOMPOn’izao rehetra izao
  - type: text
    content: hitsarana ny mpirehareha sy ny mpanandra-tena
  - type: text
    content: ary koa ny mpiandranandrana rehetra
  - type: text
    content: 'mba ho fampietrena azy ireo:'
  '13':
  - type: text
    content: dia ny sedera rehetra any Libano,
  - type: text
    content: izay avo sady mijoalajoala,
  - type: text
    content: 'sy ny hazo ôaka rehetra any '
  - type: text
    content: Basàna
  - type: text
    content: ;
  '14':
  - type: text
    content: ny tendrombohitra avo
  - type: text
    content: sy ny havoana manerinerina rehetra;
  '15':
  - type: text
    content: ny tilikambo miringiringy
  - type: text
    content: sy ny manda mafy rehetra;
  '16':
  - type: text
    content: ary ny sambo vaventy
  - type: text
    content: sy ny sambo marevaka rehetra.
  '17':
  - type: text
    content: Hihohoka ny olona mpiandranandrana
  - type: text
    content: ary haetry amin’ny tany ny olona mpanandra-tena;
  - type: text
    content: fa amin’izany andro izany,
  - type: text
    content: dia ny TOMPO irery ihany no hasandratra.
  '18':
  - type: text
    content: Ho levona ny andriamani-tsiizy rehetra.
  '19':
  - type: text
    content: Aoka hiditra any amin’ny lava-bato
  - type: text
    content: sy ny zohy fierena ireo olona ireo,
  - type: text
    content: mba ho lavitry ny TOMPO mahatahotra
  - type: text
    content: sy ho lavitry ny fiandrianany mamirapiratra
  - type: text
    content: rehefa hirotsaka an-tsehatra Izy
  - type: text
    content: mba hampihorohoro ny tany.
  '2':
  - type: text
    content: 'Izao no hiseho amin’ny andro any aoriana:'
  - type: text
    content: Ny tendrombohitra misy ny tranon’ny TOMPO
  - type: note
    content: 'And 2-4: jereo Mi 4.1-3. –Antsoina hoe Tsiôna kosa ny tendrombohitra misy ny tranon’ny Tompo eo amin’ny and 3.'
  - type: text
    content: dia hanerinerina ambonin’ny tendrombohitra sisa
  - type: text
    content: ka hasandratra ho avo kokoa noho ireo havoana;
  - type: text
    content: dia hitanjozotra hankany ny firenena rehetra.
  '20':
  - type: text
    content: 'Amin’izany andro izany, dia harian’ny olona ho an’ny voalavo sy ny ramanavy ny sampy volafotsy sy volamena nataony hiankohofana; '
  '21':
  - type: text
    content: dia hiditra amin’ny hirika sy ny tsefatsefa-bato izy mba ho lavitry ny TOMPO mahatahotra azy sy ho lavitry ny fiandrianany mamirapiratra rehefa hirotsaka an-tsehatra ny Tompo hampihorohoro ny tany.
  '22':
  - type: text
    content: Atsaharo ny fitokiana amin’olombelona
  - type: text
    content: fa fofonaina miserana ihany izy
  - type: text
    content: ka tsy misy lanjany akory!
  '3':
  - type: text
    content: 'Handeha ho any ny firenena marobe ka hifampitaona hoe:'
  - type: text
    content: «Andeha isika hiakatra any an-tendrombohitry ny TOMPO,
  - type: text
    content: ho any an-tranon’ilay Andriamanitr’i Jakôba;
  - type: text
    content: dia hampianariny antsika ny sori-dàlany,
  - type: text
    content: ary harahintsika ny lalana hatorony.»
  - type: text
    content: 'Fa avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' no ivoahan’ny fampianarana,'
  - type: text
    content: ary avy ao Jerosalema no iavian’ny tenin’ny TOMPO.
  '4':
  - type: text
    content: Hitsara ny firenena maro Izy,
  - type: text
    content: ary hampanaiky ny vahoaka rehetra
  - type: text
    content: ka hanefy ny sabany ho angady ireny,
  - type: text
    content: ary hanao ny lefony ho fanetezam-boaloboka
  - type: note
    content: Ampit Jôb 4.10.
  - type: text
    content: sady tsy hianatra hiady intsony.
  '5':
  - type: text
    content: Ry taranak’i Jakôba, avia,
  - type: text
    content: aoka isika handeha amin’ny fahazavàn’ny TOMPO!
  - type: heading
    content: Ny andron’ny Tompo dia andro fitsarana
  '6':
  - type: text
    content: TOMPO ô, efa narianao ny vahoakanao,
  - type: text
    content: dia ny taranak’i Jakôba,
  - type: text
    content: satria nihahohaho tao aminy
  - type: text
    content: ny mpimasy avy any atsinanana
  - type: text
    content: sady betsaka tahaka ny an’ny Filistinina ny mpanandrony;
  - type: text
    content: ary nifandray tendro tamin’ny vahiny izy.
  '7':
  - type: text
    content: Feno volafotsy sy volamena ny taniny
  - type: text
    content: sady tsy hita lany ny hareny;
  - type: text
    content: ary feno soavaly ny taniny
  - type: text
    content: sady tsy hita isa ny kalesiny.
  '8':
  - type: text
    content: Feno andriamani-tsiizy koa ny taniny;
  - type: text
    content: ary niankohoka amin’ny sampy natao tanana izy,
  - type: text
    content: dia ny zavatra nataon’ny tanan’olona.
  '9':
  - type: text
    content: Noho izany, dia tsy maintsy hihohoka
  - type: text
    content: sy haetry amin’ny tany ny olombelona;
  - type: text
    content: ka tsy hisy hampiarina azy intsony.
  - type: note
    content: 'ka tsy... intsony: na hoe ka aza mamela ny helony, Tompo ô.'
