document_id: MAL.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ka hoy ny TOMPOn’izao rehetra izao aminareo: «Indro Aho handefa ny irako mba hanamboatra lalana'
  - type: note
    content: Jereo Is 40.3 sy Mt 11.10.
  - type: text
    content: ' eo alohako; ary ny Tompo izay tadiavinareo dia ho tonga tampoka ao an-'
  - type: text
    content: tempoliny
  - type: text
    content: '. Ho tonga hitondra ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' ilay iraka izay irinareo; indro avy tokoa Izy!» '
  '10':
  - type: text
    content: Ento manontolo àry ny ampahafolon-karena ho ao an-trano fitahirizana azy, mba tsy ho tapaka sakafo ao an-
  - type: text
    content: tempoliko
  - type: text
    content: '. Ary zahao toetra amin’izany ny tenako, hoy Izaho TOMPOn’izao rehetra izao, dia ho hitanareo fa hovohako ho anareo ny vavahadin-dranon’ny lanitra hampidinako fitahiam-be miavosa aminareo. '
  '11':
  - type: text
    content: 'Tsy havelako hanimba ny volinareo ny bibikely ka hahavanom-boa ny voalobokareo any an-tsaha, hoy Izaho TOMPOn’izao rehetra izao. '
  '12':
  - type: text
    content: Ary hataon’ny firenen-drehetra hoe sambatra ianareo, satria hahafinaritra hivelomana ny taninareo, hoy Izaho TOMPOn’izao rehetra izao.»
  - type: heading
    content: Ny andro hanambaran’Andriamanitra ny fitsarany
  '13':
  - type: text
    content: 'Hoy ny TOMPO hoe: «Mafy loatra ny teny amelezanareo Ahy; nefa manontany ianareo hoe: ‹Inona no resaka nifanaovanay hamelezana Anao?› '
  '14':
  - type: text
    content: 'Izao no nolazainareo: ‹Zava-poana ny manompo an’Andriamanitra. Efa nitandrina izay nasainy notandremana izahay ary efa nisaona araka ny fomba fanao'
  - type: note
    content: Amin’ireny lozabe mahazo ireny dia nantsoina ny vahoaka hisaona araka ny fomba fanao izay ahitana fifadian-kanina*, fitomaniana ary sorona*. Misy olona sasany mihevitra fa ireny fomba ireny dia ampy hitarihana an’Andriamanitra mba hanambina.
  - type: text
    content: ' teo anatrehan’ny TOMPOn’izao rehetra izao, nefa tsy nisy soa azonay akory. '
  '15':
  - type: text
    content: Ankehitriny dia ny mpirehaka no tokony hataonay hoe sambatra ary ny olon-dratsy no tokony hataonay hoe ambinina. Eny, fa na dia maka fanahy an’Andriamanitra aza ireo, dia afaka hatrany!› »
  '16':
  - type: text
    content: 'Toy izany no nifampiresahan’ireo manaja ny TOMPO. Dia nihaino tsara ny TOMPO ka nandre izany. Nisy firaketana an-tsoratra teo anatrehan’ny TOMPO an’ireo manaja Azy sy mankamamy ny anarany. '
  '17':
  - type: text
    content: 'Ary hoy ny TOMPOn’izao rehetra izao hoe:'
  - type: text
    content: '–Amin’ny andro izay hotendreko dia ho raki-tsoa fananako ireo olona ireo. Ary hitsimbina azy Aho toy ny fitsimbin-dray ny zanany izay manompo azy. '
  '18':
  - type: text
    content: 'Ka dia ho hitanareo indray ny fahasamihafan’ny olo-marina sy ny olon-dratsy, dia ny manompo an’Andriamanitra sy ny tsy manompo Azy. '
  '19':
  - type: text
    content: 'Fa hoy Izaho TOMPOn’izao rehetra izao: Indro avy ilay andro ka mandoro tahaka ny fatana mivaivay. Amin’io andro io ny mpirehaka sy ny mpanao ratsy dia hodorana avokoa toy ny vodivary, ka tsy hisy miangana na ny fakany na ny sampany'
  - type: note
    content: Manomboka eto amin’ity and ity, ny dkt sasany dia manao fanisana hafa hoe 4.1-6 fa tsy 3.19-24. –ilay andro, jereo Jl 1.15 sy nta.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Nefa zovy no hahatanty ny andro hiaviany? Ary zovy koa no hahajoro rehefa hiseho Izy? Fa ho tahaka ny afon’ny mpandrendrika sy ho tahaka ny savonin’ny mpanasa lamba Izy. '
  '20':
  - type: text
    content: 'Fa ho an’izay manaja ny anarako, dia izao no teniko: hiseho ny famonjeko toy ny masoandro miposaka manana fanasitranana ao amin’ny tànany. Ho afaka ianareo ka hifalihavanja toy ny zanak’omby mivoaka ny vala'
  - type: note
    content: 'mivoaka ny vala: araka ny dkt tranainy grika izany; fa ny RM dia manao hoe mifahy.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Amin’io andro izay hotendreko io, dia hohitsakitsahinareo ny olon-dratsy ka ho toy ny vovoka eo ambany faladianareo, hoy Izaho TOMPOn’izao rehetra izao.»
  - type: heading
    content: Ny fiverenan’i Elià
  '22':
  - type: text
    content: '«Tsarovy ny lalànan’i Mosesy mpanompoko, dia ny didy amam-pitsipika izay nomeko azy tao '
  - type: text
    content: Hôreba
  - type: text
    content: ' ho an’ny Israelita rehetra.'
  '23':
  - type: text
    content: '«Fa alohan’ny hiavian’ny andron’ny TOMPO, ilay andro lehibe sady mahatahotra, dia haniraka an’i Elià '
  - type: text
    content: mpaminany
  - type: note
    content: 'i Elià mpaminany: jereo 1 Mp 17-21; Mt 17.1-13.'
  - type: text
    content: ' ho aminareo Aho. '
  '24':
  - type: text
    content: Izy no hampody ny fon’ny ray ho amin’ny zanany
  - type: note
    content: Jereo Lk 1.17.
  - type: text
    content: ' ary ny fon’ny zanaka ho amin’ny rainy; amin’izay Aho dia tsy ho avy hamely ny tany amin’ny fandringanana.»'
  '3':
  - type: text
    content: 'Hipetraka toa handrendrika sy hanadio volafotsy izy. Eny, tahaka ny fanadio ny volamena sy volafotsy no hanadiovany tanteraka ireo taranak’i Levỳ. Koa dia hanolotra fanatitra amin’ny TOMPO ara-pahamarinana ireo. '
  '4':
  - type: text
    content: 'Ary ho mamin’ny TOMPO ireo fanatitry ny vahoakan’i Joda sy i Jerosalema toy ny tamin’ny andro taloha sy tamin’ny taona fahiny. '
  '5':
  - type: text
    content: 'Ary hoy ny TOMPOn’izao rehetra izao hoe: «Ho avy eo aminareo Aho mba hitsara anareo. Ho dodona Aho hanameloka ny mpanao majika, ny mpanitsakitsa-bady, ny mpianiana lainga, ny mpamaly karaman’ny mpiasa, ny mpamoritra mpitondratena sy kamboty na koa ny mpampahory vahiny, dia izay rehetra tsy manaja Ahy.»'
  - type: heading
    content: Miverina amin’ny Tompo
  '6':
  - type: text
    content: «Eny, Izaho TOMPO dia tsy miova; fa tsy mitsahatra kosa ny maha taranak’i Jakôba anareo
  - type: note
    content: 'Ny maha taranak’i Jakôba: mpamitaka i Jakôba (jereo Is 43.27; Hôs 12.3,4) ka toetra arahin’ny taranany izany (jereo and 8). –fa tsy mitsahatra kosa ny maha taranak’i Jakôba anareo: dkt hafa Ary ianareo, ry taranak’i Jakôba, dia tsy fongana.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Fa hatramin’ireo razana talohanareo no efa nialanareo tamin’ny didiko ka tsy nitandremanareo izany. Miverena amiko, dia hiverina aminareo koa ny tenako, hoy Izaho TOMPOn’izao rehetra izao. Nefa dia hoy ianareo hoe: ‹Ahoana no iverenanay aminao?› '
  '8':
  - type: text
    content: 'Dia hamaly anareo Aho hoe: ‹Azon’ny olona fitahina ve Andriamanitra no mamitaka Ahy ianareo?› Dia manontany indray ianareo hoe: ‹Amin’inona no amitahanay Anao?› Amin’ny fandrotsahana ny ampahafolon-karena'
  - type: note
    content: 'Ny ampahafolon-karena dia natao hikarakarana ny mpisorona sy ny levita ka niantoka ny fitohizan’ny fanompoam-pivavahana; nisy koa ampahany nitsinjovana ny mahantra: jereo Deot 14.24-27.'
  - type: text
    content: ' sy amin’ny fanaovanareo fanatitra. '
  '9':
  - type: text
    content: 'Hiharan’ny ozona ianareo satria Izaho no fitahinareo, dia ianareo rehetra mpiray firenena. '
