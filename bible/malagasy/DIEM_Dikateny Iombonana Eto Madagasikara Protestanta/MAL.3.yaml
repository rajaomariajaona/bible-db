document_id: MAL.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ka hoy ny TOMPOn’izao rehetra izao aminareo: «Indro Aho handefa ny irako mba hanamboatra lalana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 40.3 sy Mt 11.10.
    marker-yv: yv-n
  - type: text
    text: ' eo alohako; ary ny Tompo izay tadiavinareo dia ho tonga tampoka ao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliny
  - type: text
    text: '. Ho tonga hitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanako
  - type: text
    text: ' ilay iraka izay irinareo; indro avy tokoa Izy!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nefa zovy no hahatanty ny andro hiaviany? Ary zovy koa no hahajoro rehefa hiseho Izy? Fa ho tahaka ny afon’ny mpandrendrika sy ho tahaka ny savonin’ny mpanasa lamba Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hipetraka toa handrendrika sy hanadio volafotsy izy. Eny, tahaka ny fanadio ny volamena sy volafotsy no hanadiovany tanteraka ireo taranak’i Levỳ. Koa dia hanolotra fanatitra amin’ny TOMPO ara-pahamarinana ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ho mamin’ny TOMPO ireo fanatitry ny vahoakan’i Joda sy i Jerosalema toy ny tamin’ny andro taloha sy tamin’ny taona fahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy ny TOMPOn’izao rehetra izao hoe: «Ho avy eo aminareo Aho mba hitsara anareo. Ho dodona Aho hanameloka ny mpanao majika, ny mpanitsakitsa-bady, ny mpianiana lainga, ny mpamaly karaman’ny mpiasa, ny mpamoritra mpitondratena sy kamboty na koa ny mpampahory vahiny, dia izay rehetra tsy manaja Ahy.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miverina amin’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: «Eny, Izaho TOMPO dia tsy miova; fa tsy mitsahatra kosa ny maha taranak’i Jakôba anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny maha taranak’i Jakôba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpamitaka i Jakôba (jereo Is 43.27; Hôs 12.3,4) ka toetra arahin’ny taranany izany (jereo and 8). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: fa tsy mitsahatra kosa ny maha taranak’i Jakôba anareo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ary ianareo, ry taranak’i Jakôba, dia tsy fongana.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hatramin’ireo razana talohanareo no efa nialanareo tamin’ny didiko ka tsy nitandremanareo izany. Miverena amiko, dia hiverina aminareo koa ny tenako, hoy Izaho TOMPOn’izao rehetra izao. Nefa dia hoy ianareo hoe: ‹Ahoana no iverenanay aminao?› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hamaly anareo Aho hoe: ‹Azon’ny olona fitahina ve Andriamanitra no mamitaka Ahy ianareo?› Dia manontany indray ianareo hoe: ‹Amin’inona no amitahanay Anao?› Amin’ny fandrotsahana ny ampahafolon-karena'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny ampahafolon-karena '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia natao hikarakarana ny mpisorona sy ny levita ka niantoka ny fitohizan’ny fanompoam-pivavahana; nisy koa ampahany nitsinjovana ny mahantra: jereo Deot 14.24-27.'
    marker-yv: yv-n
  - type: text
    text: ' sy amin’ny fanaovanareo fanatitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hiharan’ny ozona ianareo satria Izaho no fitahinareo, dia ianareo rehetra mpiray firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ento manontolo àry ny ampahafolon-karena ho ao an-trano fitahirizana azy, mba tsy ho tapaka sakafo ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliko
  - type: text
    text: '. Ary zahao toetra amin’izany ny tenako, hoy Izaho TOMPOn’izao rehetra izao, dia ho hitanareo fa hovohako ho anareo ny vavahadin-dranon’ny lanitra hampidinako fitahiam-be miavosa aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy havelako hanimba ny volinareo ny bibikely ka hahavanom-boa ny voalobokareo any an-tsaha, hoy Izaho TOMPOn’izao rehetra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary hataon’ny firenen-drehetra hoe sambatra ianareo, satria hahafinaritra hivelomana ny taninareo, hoy Izaho TOMPOn’izao rehetra izao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andro hanambaran’Andriamanitra ny fitsarany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy ny TOMPO hoe: «Mafy loatra ny teny amelezanareo Ahy; nefa manontany ianareo hoe: ‹Inona no resaka nifanaovanay hamelezana Anao?› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no nolazainareo: ‹Zava-poana ny manompo an’Andriamanitra. Efa nitandrina izay nasainy notandremana izahay ary efa nisaona araka ny fomba fanao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ireny lozabe mahazo ireny dia nantsoina ny vahoaka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hisaona araka ny fomba fanao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay ahitana fifadian-kanina*, fitomaniana ary sorona*. Misy olona sasany mihevitra fa ireny fomba ireny dia ampy hitarihana an’Andriamanitra mba hanambina.'
    marker-yv: yv-n
  - type: text
    text: ' teo anatrehan’ny TOMPOn’izao rehetra izao, nefa tsy nisy soa azonay akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankehitriny dia ny mpirehaka no tokony hataonay hoe sambatra ary ny olon-dratsy no tokony hataonay hoe ambinina. Eny, fa na dia maka fanahy an’Andriamanitra aza ireo, dia afaka hatrany!› »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toy izany no nifampiresahan’ireo manaja ny TOMPO. Dia nihaino tsara ny TOMPO ka nandre izany. Nisy firaketana an-tsoratra teo anatrehan’ny TOMPO an’ireo manaja Azy sy mankamamy ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy ny TOMPOn’izao rehetra izao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Amin’ny andro izay hotendreko dia ho raki-tsoa fananako ireo olona ireo. Ary hitsimbina azy Aho toy ny fitsimbin-dray ny zanany izay manompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ka dia ho hitanareo indray ny fahasamihafan’ny olo-marina sy ny olon-dratsy, dia ny manompo an’Andriamanitra sy ny tsy manompo Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy Izaho TOMPOn’izao rehetra izao: Indro avy ilay andro ka mandoro tahaka ny fatana mivaivay. Amin’io andro io ny mpirehaka sy ny mpanao ratsy dia hodorana avokoa toy ny vodivary, ka tsy hisy miangana na ny fakany na ny sampany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manomboka eto amin’ity and ity, ny dkt sasany dia manao fanisana hafa hoe 4.1-6 fa tsy 3.19-24. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ilay andro
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Jl 1.15 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ho an’izay manaja ny anarako, dia izao no teniko: hiseho ny famonjeko toy ny masoandro miposaka manana fanasitranana ao amin’ny tànany. Ho afaka ianareo ka hifalihavanja toy ny zanak’omby mivoaka ny vala'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mivoaka ny vala: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika izany; fa ny RM dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mifahy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Amin’io andro izay hotendreko io, dia hohitsakitsahinareo ny olon-dratsy ka ho toy ny vovoka eo ambany faladianareo, hoy Izaho TOMPOn’izao rehetra izao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’i Elià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '«Tsarovy ny lalànan’i Mosesy mpanompoko, dia ny didy amam-pitsipika izay nomeko azy tao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: text
    text: ' ho an’ny Israelita rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Fa alohan’ny hiavian’ny andron’ny TOMPO, ilay andro lehibe sady mahatahotra, dia haniraka an’i Elià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'i Elià mpaminany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 17-21; Mt 17.1-13.
    marker-yv: yv-n
  - type: text
    text: ' ho aminareo Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izy no hampody ny fon’ny ray ho amin’ny zanany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lk 1.17.
    marker-yv: yv-n
  - type: text
    text: ' ary ny fon’ny zanaka ho amin’ny rainy; amin’izay Aho dia tsy ho avy hamely ny tany amin’ny fandringanana.»'
