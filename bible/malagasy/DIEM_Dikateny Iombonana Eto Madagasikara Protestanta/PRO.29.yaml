document_id: PRO.29,396
type_code: plt
verses:
  '1':
  - type: text
    content: Izay mafy hatoka tsy laitra anarina
  - type: text
    content: dia ho montsana tampoka tsy hisy fanafana.
  '10':
  - type: text
    content: Ny olona lian-drà mankahala ny olom-banona,
  - type: text
    content: fa ny olo-mahitsy kosa miahy ny ainy.
  '11':
  - type: text
    content: Manampatra hatezerana ny adala,
  - type: text
    content: fa mahatsindry fo kosa ny hendry.
  '12':
  - type: text
    content: Raha mihaino lainga ny mpitondra,
  - type: text
    content: ho tonga ratsy avokoa ny olom-peheziny.
  '13':
  - type: text
    content: Izao no iraisan’ny mahantra sy ny mpampahory;
  - type: text
    content: samy omen’ny TOMPO maso hijerena izy roa tonta.
  '14':
  - type: text
    content: Manamafy orina mandrakizay ny sezafiandrianany
  - type: text
    content: ny mpanjaka izay mitsara marina ny mahantra.
  '15':
  - type: text
    content: Manome fahendrena ny tsorakazo sy ny fananarana,
  - type: text
    content: fa henatra ho an-dreniny kosa ny zaza avela hanaram-po.
  '16':
  - type: text
    content: Raha maro ny olon-dratsy, dia mitombo ny heloka;
  - type: text
    content: fa olo-marina kosa ho vavolombelon’ny fianjerany.
  '17':
  - type: text
    content: Faizo ny zanakao, dia hahafinaritra anao izy
  - type: text
    content: ary hanome fahafaham-po anao.
  '18':
  - type: text
    content: Rehefa tsy misy fanambaràn’ny mpaminany,
  - type: text
    content: dia mivarilavo ny vahoaka;
  - type: text
    content: fa sambatra kosa izany vahoaka izany
  - type: text
    content: raha mitandrina ny lalànan’ny Tompo.
  '19':
  - type: text
    content: Tsy amin’ny teny no amaizana ny mpanompo;
  - type: text
    content: fa na azony aza izany, dia tsy hankatoaviny.
  '2':
  - type: text
    content: Rehefa ny olo-marina no mitondra
  - type: note
    content: 'mitondra: dkt hafa maro.'
  - type: text
    content: ', dia faly ny vahoaka;'
  - type: text
    content: fa rehefa ny olon-dratsy no mifehy, dia misento ny vahoaka.
  '20':
  - type: text
    content: Raha mahita olona miteny tsy amim-piheverana ianao,
  - type: text
    content: dia ny adala no misy hantenaina kokoa noho izy.
  '21':
  - type: text
    content: Izay mampihanta ny mpanompony hatry ny fahakely
  - type: text
    content: dia hampahaditra azy amin’ny farany.
  '22':
  - type: text
    content: Ny olona mora tezitra manetsika ady;
  - type: text
    content: izay mora misafoaka mampiavosa hadisoana.
  '23':
  - type: text
    content: Ny avonavon’ny olona no hampietry azy;
  - type: text
    content: fa ny manetry tena no hahazo haja.
  '24':
  - type: text
    content: Izay miray tetika amin’ny mpangalatra,
  - type: text
    content: dia fahavalon’ny tenany;
  - type: text
    content: nandre ny ozona mety hihatra izy,
  - type: text
    content: kanefa tsy milaza ny mpangalatra
  - type: note
    content: Jereo Lev 5.1.
  - type: text
    content: .
  '25':
  - type: text
    content: Mampidi-doza ny fahatahorana olona;
  - type: text
    content: fa izay matoky ny TOMPO kosa no voaaro.
  '26':
  - type: text
    content: Maro no mila sitraka amin’ny mpitondra;
  - type: text
    content: fa ny TOMPO ihany no mitsara ny olona tsirairay.
  '27':
  - type: text
    content: Halan’ny olo-marina ny olona mpivadi-bolana;
  - type: text
    content: ary halan’ny olon-dratsy ny mahitsy fitondrantena.
  '3':
  - type: text
    content: Izay tia fahendrena no mahafaly ny rainy;
  - type: text
    content: izay miaraka amin’ny mpivarotena kosa mandany harena.
  '4':
  - type: text
    content: Ny mpanjaka mpandala ny rariny
  - type: text
    content: no mampiorina mafy ny tany;
  - type: text
    content: fa izay mitaky hetra mihoa-pampana kosa
  - type: text
    content: no mampikorosy fahana izany.
  '5':
  - type: text
    content: Izay olona mandodoka ny namany
  - type: text
    content: dia mamela-pandrika ho an’ny tenany
  - type: note
    content: 'ho an’ny tenany: dkt hafa ho azy ireny.'
  - type: text
    content: .
  '6':
  - type: text
    content: Ny olon-dratsy mamandri-tena amin’ny fahotany,
  - type: text
    content: fa ny olo-marina kosa mientanentan-kafaliana.
  '7':
  - type: text
    content: Ny olo-marina mahafantatra ny zon’ireo mahantra,
  - type: text
    content: fa ny olon-dratsy kosa tsy manana fahalalana izany.
  '8':
  - type: text
    content: Mampisavorovoro ny iray tanàna ny mpaniratsira,
  - type: text
    content: fa mampitony fahatezerana kosa ny hendry.
  '9':
  - type: text
    content: Raha olon-kendry no manana ady amin’adala,
  - type: text
    content: dia ho tezitra na hihomehy ity adala,
  - type: text
    content: kanefa tsy hisy filaminana mihitsy.
