document_id: PRO.29,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izay mafy hatoka tsy laitra anarina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho montsana tampoka tsy hisy fanafana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny olona lian-drà mankahala ny olom-banona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olo-mahitsy kosa miahy ny ainy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Manampatra hatezerana ny adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahatsindry fo kosa ny hendry.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha mihaino lainga ny mpitondra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tonga ratsy avokoa ny olom-peheziny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izao no iraisan’ny mahantra sy ny mpampahory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy omen’ny TOMPO maso hijerena izy roa tonta.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Manamafy orina mandrakizay ny sezafiandrianany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanjaka izay mitsara marina ny mahantra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Manome fahendrena ny tsorakazo sy ny fananarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa henatra ho an-dreniny kosa ny zaza avela hanaram-po.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Raha maro ny olon-dratsy, dia mitombo ny heloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa olo-marina kosa ho vavolombelon’ny fianjerany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Faizo ny zanakao, dia hahafinaritra anao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanome fahafaham-po anao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Rehefa tsy misy fanambaràn’ny mpaminany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mivarilavo ny vahoaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sambatra kosa izany vahoaka izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mitandrina ny lalànan’ny Tompo.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy amin’ny teny no amaizana ny mpanompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na azony aza izany, dia tsy hankatoaviny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rehefa ny olo-marina no mitondra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mitondra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: maro
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', dia faly ny vahoaka;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa rehefa ny olon-dratsy no mifehy, dia misento ny vahoaka.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Raha mahita olona miteny tsy amim-piheverana ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny adala no misy hantenaina kokoa noho izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izay mampihanta ny mpanompony hatry ny fahakely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampahaditra azy amin’ny farany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny olona mora tezitra manetsika ady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mora misafoaka mampiavosa hadisoana.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny avonavon’ny olona no hampietry azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny manetry tena no hahazo haja.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Izay miray tetika amin’ny mpangalatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fahavalon’ny tenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandre ny ozona mety hihatra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy milaza ny mpangalatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 5.1.
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mampidi-doza ny fahatahorana olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay matoky ny TOMPO kosa no voaaro.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Maro no mila sitraka amin’ny mpitondra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO ihany no mitsara ny olona tsirairay.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Halan’ny olo-marina ny olona mpivadi-bolana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary halan’ny olon-dratsy ny mahitsy fitondrantena.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izay tia fahendrena no mahafaly ny rainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay miaraka amin’ny mpivarotena kosa mandany harena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny mpanjaka mpandala ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampiorina mafy ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mitaky hetra mihoa-pampana kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampikorosy fahana izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izay olona mandodoka ny namany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mamela-pandrika ho an’ny tenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ho an’ny tenany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ho azy ireny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny olon-dratsy mamandri-tena amin’ny fahotany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olo-marina kosa mientanentan-kafaliana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny olo-marina mahafantatra ny zon’ireo mahantra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olon-dratsy kosa tsy manana fahalalana izany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mampisavorovoro ny iray tanàna ny mpaniratsira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mampitony fahatezerana kosa ny hendry.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha olon-kendry no manana ady amin’adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tezitra na hihomehy ity adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy hisy filaminana mihitsy.
