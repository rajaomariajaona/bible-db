document_id: DAN.11,396
type_code: plt
verses:
  '1':
  - type: text
    content: Fa izaho tamin’ny taona voalohany nanjakan’i Dariôsa, ilay Medianina
  - type: note
    content: 'Dariôsa, ilay Medianina: jereo 6.1 sy nta.'
  - type: text
    content: ', dia nitsangana teo anilan’i Mikaela ka nampahery sy nanohana azy. '
  '10':
  - type: text
    content: «Fa hioman-kanafika kosa ireo zanaky ny mpanjaka ao avaratra
  - type: note
    content: 'ireo zanaky ny mpanjaka ao avaratra: dia i Seleokôsa III, ary ny rahalahiny atao hoe Antiôkôsa III, zanak’i Seleokôsa II.'
  - type: text
    content: ' ka hanangona miaramila marobe. Dia hiroso ny iray amin’ireo ka hihoatra sisintany ombàn-tafika sy hipariaka toy ny ranovaky; saingy nony hiverina izy, dia hananika tanànamimanda iray'
  - type: note
    content: 'tanànamimanda iray: mety ho i Gazà izay azon’i Antiôkôsa III tamin’ny taona 201 tal J.K.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Hisafoaka ny mpanjaka ao atsimo ka hivoaka hiady amin’ny mpanjaka ao avaratra, izay hamory miaramila marobe; nefa io tafika goavana io dia hatolotra ho eo an-tanam-pahavalo. '
  '12':
  - type: text
    content: 'Ary resin’ilay mpanjaka ao atsimo ireo vahoaka marobe ireo ka hampiavonavona ny fony; nefa, na dia haharingana miaramila 10 000 maro aza izy, dia tsy handresy. '
  '13':
  - type: text
    content: 'Iny indray ny mpanjaka ao avaratra fa hanangona miaramila marobe mihoatra lavitra noho ny teo aloha; ary rehefa afaka taona vitsivitsy, dia ho avy tokoa izy hitondra tafika goavana sy fitaovam-piadiana maro. '
  '14':
  - type: text
    content: 'Amin’izany fotoana izany dia marobe ireo olona hitsangan-kanohitra ny mpanjaka ao atsimo; ary, na dia ireo olona mahery setra anisan’ny firenenao aza, dia hikomy amin’io mpanjaka io mba hahatanteraka fahitana iray, kanefa ho resy ireo. '
  '15':
  - type: text
    content: Ary ho avy ny mpanjaka ao avaratra hanangana tovon-tany hamelezana tanànamimanda
  - type: note
    content: 'tanànamimanda iray: mety ho i Tsidôna izay azon’i Antiôkôsa III tamin’ny taona 198 tal J.K. izany.'
  - type: text
    content: ' iray sy hahazoana azy; ary ny tafiky ny ao atsimo, na dia hisy miaramila voafantina aza, dia tsy hanan-kery hanoheram-panafihana. '
  '16':
  - type: text
    content: Izay avy hamely azy dia hanao araka izay sitrapony fa tsy hisy hahatohitra akory; ary hamahatra ao amin’ilay tany tsara indrindra
  - type: note
    content: 'ilay tany tsara indrindra: ny tanin’i Israely.'
  - type: text
    content: ' izy sady hanao fandripahana eo. '
  '17':
  - type: text
    content: 'Hanapa-kevitra ho avy miaraka amin’ny hery rehetra ananan’ny fanjakany izy ka hanao izay hahatsara fihavanana. Dia homeny ho vadin’ny mpanjaka ao atsimo ny iray amin’ny zanakavavin’ny vadiny; ny hahatonga loza amin’ny tanin’io mpanjaka io no kendreny, kanefa tsy hahomby izany tetika izany. '
  '18':
  - type: text
    content: Avy eo dia hitodika amin’ireo nosy indray izy ka hahalasa maromaro; kanjo hisy filohan-tafika vahiny iray hampitsahatra ny fanalam-baràka ataony, ka hampitsingerina izany aminy
  - type: note
    content: 'filohan-tafika vahiny iray: mety ho i Lucius Scipion, jeneraly rômanina izay nandresy an’i Antiôkôsa III tamin’ny taona 190 tal J.K.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Dia hitodika amin’ireo tanànamimanda ao amin’ny taniny izy, kanjo tsy hahomby fa ho faty ka tsy ho hita intsony. '
  '2':
  - type: text
    content: Ary ankehitriny haharihariko aminao ny marina
  - type: note
    content: 'Ny toko 11 dia mamintina ny vanim-potoana iray tao amin’ny tantaran’ny faritra Atsinanana iny, izay nahavoarohirohy koa ny tanin’i Israely. Ny and 2-4: ny fanjakana persianina sy ny fandrombaham-pahefana nataon’ilay Grika Aleksandra Lehibe tokony ho tamin’ny 500–323 tal J.K. eo ho eo. Ny and 5-20: lango malefaka hamaboan-tany, ireo fifanekena sy ady nifanaovan’ny taranaka mpandova ny fanjakan’i Aleksandra, dia ny Ptôlemeo tany Ejipta sy ny Seleosida tany Babilôna sy Siria (323-175 tal. J.K.). Ny and 21-45: ny fanjakan’i Antiôkôsa Epifàna, mpanjaka miavonavona sy lian-dra, fatra-panenjika ny Jiosy (175-164 tal J.K.).'
  - type: text
    content: .
  - type: heading
    content: Ny ady hifanaovan’ny mpanjaka atsimo sy avaratra.
  - type: text
    content: 'Indro mbola hisy mpanjaka telo hifandimby hanjaka amin’i Persia; avy eo dia hisy iray fahefatra hangoron-karena be noho ireo talohany. Ary rehefa matanjaka tokoa izy noho ny hareny, dia hampirohotra ny hery rehetra ananany hamely ny fanjakana grika. '
  '20':
  - type: text
    content: Ary hisy hitsangana handimby azy ka hampandroba ilay trano be voninahitra indrindra
  - type: note
    content: 'ilay trano be voninahitra indrindra: dia ny tempolin’i Jerosalema.'
  - type: text
    content: ' ao amin’ny fanjakana; kanjo rehefa afaka andro vitsivitsy, dia ho potika io mpanjaka io nefa tsy an-karihary na amin’ny ady.'
  '21':
  - type: text
    content: '«Ary hisy olona fanebaka handimby io mpanjaka io nefa tsy hanam-pahamendrehana hanjaka akory; fa hiditra an-tsokosoko izy ka handrombaka an-kafetsena ny fahefà-manjaka. '
  '22':
  - type: text
    content: 'Ary ny tafika tonga hamely ny taniny dia tsy hahatohitra azy fa hopotehiny; hovonoiny ho faty mbamin’ny filohan’ilay vahoakan’ny '
  - type: text
    content: fanekempihavanana
  - type: note
    content: 'ny filoha... fanekempihavanana: dia mety ho ny mpisorombe Ônià III (jereo 9.26 sy nta).'
  - type: text
    content: ' aza. '
  '23':
  - type: text
    content: 'Hampiasa ireo fifanarahana natao taminy izy mba hamitapitahana; ka hitombo hatrany ny heriny, na dia olom-bitsy aza no ho mpomba azy. '
  '24':
  - type: text
    content: 'An-tsokosoko no hidirany ao amin’ireo toerana mahavokatra indrindra ao amin’ny faritany ka hanaovany zavatra tsy mbola nataon’ny rainy na ny razany: hozarainy amin’ireo mpomba azy ny babo sy ny harena voababony tao. Hanao teti-dratsy koa izy hamelezana tanànamimanda. Kanefa fotoana fohy ihany no haharetan’izany.'
  '25':
  - type: text
    content: '«Ary hasesiky ny heriny sy ny hambompony izy ka hombàn-tafika lehibe no hiroso hamely ny mpanjaka ao atsimo; ary io mpanjaka ao atsimo io dia hioman-kiady miaraka amina tafika goavana sy matanjaka tokoa, kanjo tsy hahatohitra satria hanaovana teti-dratsy hahavoa azy. '
  '26':
  - type: text
    content: Fa izay olona akaiky azy ihany no hanapotika azy; ka ho resim-pahavalo
  - type: note
    content: 'ho resim-pahavalo: araka ny stf tranainy latinina sy siriaka; ny RM dia manao hoe handresy.'
  - type: text
    content: 'ny tafiny, ary ho marobe ny faty hiampatrampatra. '
  '27':
  - type: text
    content: 'Ary ireo mpanjaka roa ireo dia samy haniry hanao ratsy ao am-pony avy ka hifampiresaka lainga eo amin’ny latabatra iray; nefa tsy hahomby izany satria amin’ny fotoanandro voatendry ihany no hiafaran’ny raharaha. '
  '28':
  - type: text
    content: Ary hiverina any amin’ny taniny mitondra harembe ilay mpanjaka ao avaratra; ka hanatanteraka izay nokasainy hanoherana ny fanekempihavanana masina izy, vao hody any amin’ny taniny.
  '29':
  - type: text
    content: 'Amin’ny fotoana voatendry, dia hiverina any atsimo indray izy, nefa tsy hizotra tahaka ny tamin’ny voalohany ny fanafihana amin’ity farany ity. '
  '3':
  - type: text
    content: Nefa hisy mpanjaka maherifo hitsangana ao Gresy ka hanapaka amin-kery lehibe ary hanao araka izay sitrapony
  - type: note
    content: Jereo 8.21 sy nta.
  - type: text
    content: '. '
  '30':
  - type: text
    content: Fa ho tonga hamely azy ny sambon’i Kitima, ary ho kivy izy ka hiverin-dalàna. Hisafoaka indray izy ka hanao izay hanoherana ny fanekempihavanana masina sady hifanaraka koa amin’ireo mivadika amin’izany fanekempihavanana izany
  - type: note
    content: Tamin’ny taona 168 tal J.K. i Popily Laenà, filohan’ny tafika an-dranomasina rômanina, dia nandidy an’i Antiôkôsa Epifàna mba hody any Siria.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Ary ireo miaramila hirahiny dia haka toerana eo anoloan’ny '
  - type: text
    content: toeramasina
  - type: text
    content: ' mimanda'
  - type: note
    content: 'toeramasina mimanda: ny toeramasina ao anatin’ny tempolin’i Jerosalema.'
  - type: text
    content: ' ka hanazimba azy; hampitsahatra ny '
  - type: text
    content: sorona
  - type: text
    content: ' fanao isan’andro amin’Andriamanitra'
  - type: note
    content: 'ny sorona... amin’Andriamanitra: jereo Eks 29.39-42; Nom 28.3-6 Ampit Dan 8.11.'
  - type: text
    content: ' izy sady hampiditra ilay fanimbazimbana mahatsiravina'
  - type: note
    content: ilay fanimbazimbana mahatsiravina dia ny sarivongana mampiseho an’i Zeosa Olimpianina izay naorina teo ambonin’ny alitara araka ny baiko nomen’i Antiôkôsa Epifàna; jereo 12.11; Mt 24.15; Mk 13.14.
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Ary izy mpanjaka mihitsy no handroboka ny olona hitsipaka ny fanekempihavanana amin’ny fandokadokafana. Nefa ny olona izay mahalala an’Andriamaniny dia hiorina mafy amin’ny fanaony; '
  '33':
  - type: text
    content: 'ary izay hendry ao amin’ireo kosa hampianatra ny maro, saingy mandritra ny andro vitsivitsy dia ho fatin’ny sabatra na hodorana na hatao an-tranomaizina ny sasany amin’ireto mpampianatra rehefa avy norobaina. '
  '34':
  - type: text
    content: 'Ary mandritra ireny fanenjehana ireny dia fanampiana kely monja no ho azon’ireto ampahorina, satria maro ny olona hiandany aminy noho ny fihatsarambelatsihy ihany. '
  '35':
  - type: text
    content: 'Ary hisy amin’ireo hendry ireo no ho faty mba '
  - type: text
    content: hanadiovana
  - type: text
    content: ' sy hanatsarana ary hamotsiana ny vahoakan’Andriamanitra mandra-piavin’ny fotoana farany, satria ho tonga izany amin’ny fotoana voatondro.'
  '36':
  - type: text
    content: «Ary ny mpanjaka hanao araka izay sitrapony; dia hanandra-tena sy hihevi-tena ho ambonin’ny andriamanitra rehetra ka hiteny zava-mampivarahontsana hanohitra an’ilay Andriamanitry ny andriamanitra. Ary hanam-pahombiazana izy ambara-pihatran’ny fahatezeran’Andriamanitra, satria ho tanteraka izay efa voatendry
  - type: note
    content: Ampit 2Tes 2.3-4; Apôk 13.5-6.
  - type: text
    content: '. '
  '37':
  - type: text
    content: Ary tsy horaharahainy akory ireo andriamanitry ny razany na ireo andriamanitra lalain’ny vehivavy
  - type: note
    content: 'andriamanitra... vehivavy: angamba ny andriamanitra Tamoza izany, jereo Ezek 8.14 sy nta.'
  - type: text
    content: ; tsy hisy horaharahainy tokoa izay andriamanitra satria heveriny
  - type: note
    content: 'mihevi-tena ho...: ny mpanjaka Antiôkôsa izay resahina eto (jereo nta 11.2) dia nanome anarana ny tenany hoe «Epifàna», izany hoe raha adika dia «andriamanitra niseho vatana».'
  - type: text
    content: ' ho ambonin’izy rehetra ny tenany. '
  '38':
  - type: text
    content: Fa ho solon’izany kosa dia homeny voninahitra ny andriamanitry ny tanànamimanda
  - type: note
    content: 'andriamanitry ny tanànamimanda: angamba mety ho Zeosa Olimpianina no tiany hambara.'
  - type: text
    content: '; andriamanitra tsy fantatry ny razany akory izany kanefa hotoloran’io mpanjaka io volamena sy volafotsy ary vatosoa mbamy zava-tsarobidy hafa. '
  '39':
  - type: text
    content: Hamely ny tanànamimanda izy ombàn’io andriamanitra vahiny io; ary izay manaiky io andriamanitra io dia hampitomboiny voninahitra ka hampanapahany ny maro, sady hizaràny tany ho valisoany
  - type: note
    content: 'ary izay... andriamanitra io: dkt hafa ary izay manaiky azy ho mpanjaka.'
  - type: text
    content: .
  '4':
  - type: text
    content: Saingy rehefa tafajoro tsara izy, dia hopotehina ny fanjakany ka hozaraina efatra araka ny vazan-tany efatra, fa tsy hodimbiasan’ny taranany; hongotana ka ho lasan’olon-kafa ny fahefà-manjaka, nefa tsy hanan-kery tahaka ny fanapahan’ilay mpanjaka maherifo
  - type: note
    content: Jereo 8.8, 22 sy nta.
  - type: text
    content: .
  '40':
  - type: text
    content: '«Ary amin’ny fotoana farany dia hanoto azy indray ny mpanjaka ao atsimo, nefa ny mpanjaka ao avaratra dia hipaoka azy toy tafio-drivotra miaraka amin-kalesy sy mpitaingi-tsoavaly ary sambo marobe; ary hiditra amin’ny tany isan-karazany izy ka hihoatra sisintany ombàn-tafika sy hipariaka toy ny ranovaky. '
  '41':
  - type: text
    content: Ary hiditra ao amin’ilay tany tsara indrindra
  - type: note
    content: 'ilay tany tsara indrindra: ny tanin’i Israely.'
  - type: text
    content: ' izy ka betsaka ny olona haripany; nefa ho afaka amin’ny tanany kosa ireo Môabita sy Edômita'
  - type: note
    content: 'Edômita, Môabita, Hamônita: firenena akaikin’i Israely sady fahavalony hatramin’ny ela.'
  - type: text
    content: ' ary ny lohandohan’ny Hamônita'
  - type: note
    content: 'lohandohan’ny Hamônita: dkt hafa araka ny siriaka ary ireo sisa amin’ny Hamônita. Voatsimbina ireo fahavalon’ny Israelita ireo satria miandany amin’i Antiôkôsa Epifàna.'
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'Ary hanitatra ny fahefàny ao amin’ny tany hafa izy ka na dia i Ejipta aza dia tsy ho afa-mitsoaka. '
  '43':
  - type: text
    content: 'Ho lasany avokoa ny tahirim-bolamena sy volafotsy ary zava-tsoan’i Ejipta; ary ny Libianina sy ny Etiôpianina dia hanaiky azy. '
  '44':
  - type: text
    content: 'Kanefa hisy vaovao avy any atsinanana sy avy any avaratra hampitebiteby azy, ka hiainga hanafika amin-katezerana mafy izy mba handrava zavatra sy handringana olona maro. '
  '45':
  - type: text
    content: Ary hanorina ny tranolain’andriamanjaka eo anelanelan’ny ranomasina sy ny tendrombohitra masin’ilay tany tsara indrindra izy; nefa ho tonga amin’ny hiafarany ihany izy, ka tsy hisy hamonjy azy.»
  '5':
  - type: text
    content: «Ary hahery ilay mpanjaka ao atsimo
  - type: note
    content: 'atsimo: na Ejipta.'
  - type: text
    content: '; kanefa ny iray amin’ireo filohan-tafiny dia hahery kokoa noho izy ka hanapaka, ary hanana fanapahana mitatra kokoa noho ny azy aza. '
  '6':
  - type: text
    content: Ary rehefa afaka taona vitsivitsy, dia hanao fifanekena ny roa tonta; ka ny zanakavavin’ny mpanjaka ao atsimo ho tonga vadin’ilay mpanjaka ao avaratra
  - type: note
    content: 'mpanjaka ao avaratra: i Antiôkôsa II, mpanjakan’i Siria-Babilônia, dia nanambady an’i Berenisa, zanakavavin’i Ptôlemeo II mpanjakan’i Ejipta.'
  - type: text
    content: ' mba hahatsara ny fihavanana; nefa tsy hanana mpanohana ravehivavy, ary samy tsy ho ela velona na ny vadiny na ny zanany'
  - type: note
    content: 'zanany: araka ny dkt grika tranainy. Ny RM dia manao hoe fahefàny.'
  - type: text
    content: ', fa hatolotra ho faty avokoa ravehivavy sy ireo nitondra azy sy ny rainy niteraka azy ary ny vadiny tamin’izany fotoana izany. '
  '7':
  - type: text
    content: Nefa hisy solofo iray avy amin’ny fianakaviany hitsangana handimby ilay mpanjaka ao atsimo; ho avy izy hamely ny tafik’ilay mpanjaka ao avaratra ary hitsofoka amin’ny tanànany mimanda; ary hiady amin’io tafika io izy ka handresy azy
  - type: note
    content: Ny lazaina eto dia ny fandefasana tafika nataon’i Ptôlemeo III hamelezana an’i Seleokôsa II, zanakalahin’i Antiôkôsa II, mba hamaly faty ny nahafatesan’i Berenisa anabaviny.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Nentiny ho babo tany Ejipta avokoa ny sarivongan’ireo andriamanitr’izany tany izany miaraka amin’ny fanaka sarobidy volafotsy sy volamena; ary hijanona elaela tsy hamely an’ilay mpanjaka ao avaratra izy. '
  '9':
  - type: text
    content: Aorian’izany kosa io mpanjaka ao avaratra io dia hankany amin’ilay mpanjaka ao atsimo, ary dia hiverina amin’ny taniny ihany.
