document_id: DAN.11
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa izaho tamin’ny taona voalohany nanjakan’i Dariôsa, ilay Medianina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Dariôsa, ilay Medianina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 6.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', dia nitsangana teo anilan’i Mikaela ka nampahery sy nanohana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ankehitriny haharihariko aminao ny marina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny toko 11 dia mamintina ny vanim-potoana iray tao amin’ny tantaran’ny faritra Atsinanana iny, izay nahavoarohirohy koa ny tanin’i Israely. Ny and 2-4: ny fanjakana persianina sy ny fandrombaham-pahefana nataon’ilay Grika Aleksandra Lehibe tokony ho tamin’ny 500–323 tal J.K. eo ho eo. Ny and 5-20: lango malefaka hamaboan-tany, ireo fifanekena sy ady nifanaovan’ny taranaka mpandova ny fanjakan’i Aleksandra, dia ny Ptôlemeo tany Ejipta sy ny Seleosida tany Babilôna sy Siria (323-175 tal. J.K.). Ny and 21-45: ny fanjakan’i Antiôkôsa Epifàna, mpanjaka miavonavona sy lian-dra, fatra-panenjika ny Jiosy (175-164 tal J.K.).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady hifanaovan’ny mpanjaka atsimo sy avaratra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Indro mbola hisy mpanjaka telo hifandimby hanjaka amin’i Persia; avy eo dia hisy iray fahefatra hangoron-karena be noho ireo talohany. Ary rehefa matanjaka tokoa izy noho ny hareny, dia hampirohotra ny hery rehetra ananany hamely ny fanjakana grika. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nefa hisy mpanjaka maherifo hitsangana ao Gresy ka hanapaka amin-kery lehibe ary hanao araka izay sitrapony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 8.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Saingy rehefa tafajoro tsara izy, dia hopotehina ny fanjakany ka hozaraina efatra araka ny vazan-tany efatra, fa tsy hodimbiasan’ny taranany; hongotana ka ho lasan’olon-kafa ny fahefà-manjaka, nefa tsy hanan-kery tahaka ny fanapahan’ilay mpanjaka maherifo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 8.8, 22 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Ary hahery ilay mpanjaka ao atsimo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'atsimo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: na Ejipta.
    marker-yv: yv-n
  - type: text
    text: '; kanefa ny iray amin’ireo filohan-tafiny dia hahery kokoa noho izy ka hanapaka, ary hanana fanapahana mitatra kokoa noho ny azy aza. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary rehefa afaka taona vitsivitsy, dia hanao fifanekena ny roa tonta; ka ny zanakavavin’ny mpanjaka ao atsimo ho tonga vadin’ilay mpanjaka ao avaratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mpanjaka ao avaratra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: i Antiôkôsa II, mpanjakan’i Siria-Babilônia, dia nanambady an’i Berenisa, zanakavavin’i Ptôlemeo II mpanjakan’i Ejipta.
    marker-yv: yv-n
  - type: text
    text: ' mba hahatsara ny fihavanana; nefa tsy hanana mpanohana ravehivavy, ary samy tsy ho ela velona na ny vadiny na ny zanany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zanany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy. Ny RM dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahefàny.
    marker-yv: yv-n
  - type: text
    text: ', fa hatolotra ho faty avokoa ravehivavy sy ireo nitondra azy sy ny rainy niteraka azy ary ny vadiny tamin’izany fotoana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nefa hisy solofo iray avy amin’ny fianakaviany hitsangana handimby ilay mpanjaka ao atsimo; ho avy izy hamely ny tafik’ilay mpanjaka ao avaratra ary hitsofoka amin’ny tanànany mimanda; ary hiady amin’io tafika io izy ka handresy azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny lazaina eto dia ny fandefasana tafika nataon’i Ptôlemeo III hamelezana an’i Seleokôsa II, zanakalahin’i Antiôkôsa II, mba hamaly faty ny nahafatesan’i Berenisa anabaviny.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nentiny ho babo tany Ejipta avokoa ny sarivongan’ireo andriamanitr’izany tany izany miaraka amin’ny fanaka sarobidy volafotsy sy volamena; ary hijanona elaela tsy hamely an’ilay mpanjaka ao avaratra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aorian’izany kosa io mpanjaka ao avaratra io dia hankany amin’ilay mpanjaka ao atsimo, ary dia hiverina amin’ny taniny ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: «Fa hioman-kanafika kosa ireo zanaky ny mpanjaka ao avaratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo zanaky ny mpanjaka ao avaratra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia i Seleokôsa III, ary ny rahalahiny atao hoe Antiôkôsa III, zanak’i Seleokôsa II.
    marker-yv: yv-n
  - type: text
    text: ' ka hanangona miaramila marobe. Dia hiroso ny iray amin’ireo ka hihoatra sisintany ombàn-tafika sy hipariaka toy ny ranovaky; saingy nony hiverina izy, dia hananika tanànamimanda iray'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tanànamimanda iray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho i Gazà izay azon’i Antiôkôsa III tamin’ny taona 201 tal J.K.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hisafoaka ny mpanjaka ao atsimo ka hivoaka hiady amin’ny mpanjaka ao avaratra, izay hamory miaramila marobe; nefa io tafika goavana io dia hatolotra ho eo an-tanam-pahavalo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary resin’ilay mpanjaka ao atsimo ireo vahoaka marobe ireo ka hampiavonavona ny fony; nefa, na dia haharingana miaramila 10 000 maro aza izy, dia tsy handresy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Iny indray ny mpanjaka ao avaratra fa hanangona miaramila marobe mihoatra lavitra noho ny teo aloha; ary rehefa afaka taona vitsivitsy, dia ho avy tokoa izy hitondra tafika goavana sy fitaovam-piadiana maro. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amin’izany fotoana izany dia marobe ireo olona hitsangan-kanohitra ny mpanjaka ao atsimo; ary, na dia ireo olona mahery setra anisan’ny firenenao aza, dia hikomy amin’io mpanjaka io mba hahatanteraka fahitana iray, kanefa ho resy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ho avy ny mpanjaka ao avaratra hanangana tovon-tany hamelezana tanànamimanda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tanànamimanda iray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho i Tsidôna izay azon’i Antiôkôsa III tamin’ny taona 198 tal J.K. izany.
    marker-yv: yv-n
  - type: text
    text: ' iray sy hahazoana azy; ary ny tafiky ny ao atsimo, na dia hisy miaramila voafantina aza, dia tsy hanan-kery hanoheram-panafihana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay avy hamely azy dia hanao araka izay sitrapony fa tsy hisy hahatohitra akory; ary hamahatra ao amin’ilay tany tsara indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay tany tsara indrindra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny tanin’i Israely.
    marker-yv: yv-n
  - type: text
    text: ' izy sady hanao fandripahana eo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hanapa-kevitra ho avy miaraka amin’ny hery rehetra ananan’ny fanjakany izy ka hanao izay hahatsara fihavanana. Dia homeny ho vadin’ny mpanjaka ao atsimo ny iray amin’ny zanakavavin’ny vadiny; ny hahatonga loza amin’ny tanin’io mpanjaka io no kendreny, kanefa tsy hahomby izany tetika izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Avy eo dia hitodika amin’ireo nosy indray izy ka hahalasa maromaro; kanjo hisy filohan-tafika vahiny iray hampitsahatra ny fanalam-baràka ataony, ka hampitsingerina izany aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'filohan-tafika vahiny iray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho i Lucius Scipion, jeneraly rômanina izay nandresy an’i Antiôkôsa III tamin’ny taona 190 tal J.K.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hitodika amin’ireo tanànamimanda ao amin’ny taniny izy, kanjo tsy hahomby fa ho faty ka tsy ho hita intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary hisy hitsangana handimby azy ka hampandroba ilay trano be voninahitra indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay trano be voninahitra indrindra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ny tempolin’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' ao amin’ny fanjakana; kanjo rehefa afaka andro vitsivitsy, dia ho potika io mpanjaka io nefa tsy an-karihary na amin’ny ady.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Ary hisy olona fanebaka handimby io mpanjaka io nefa tsy hanam-pahamendrehana hanjaka akory; fa hiditra an-tsokosoko izy ka handrombaka an-kafetsena ny fahefà-manjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny tafika tonga hamely ny taniny dia tsy hahatohitra azy fa hopotehiny; hovonoiny ho faty mbamin’ny filohan’ilay vahoakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny filoha... fanekempihavanana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia mety ho ny mpisorombe Ônià III (jereo 9.26 sy nta).
    marker-yv: yv-n
  - type: text
    text: ' aza. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hampiasa ireo fifanarahana natao taminy izy mba hamitapitahana; ka hitombo hatrany ny heriny, na dia olom-bitsy aza no ho mpomba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'An-tsokosoko no hidirany ao amin’ireo toerana mahavokatra indrindra ao amin’ny faritany ka hanaovany zavatra tsy mbola nataon’ny rainy na ny razany: hozarainy amin’ireo mpomba azy ny babo sy ny harena voababony tao. Hanao teti-dratsy koa izy hamelezana tanànamimanda. Kanefa fotoana fohy ihany no haharetan’izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '«Ary hasesiky ny heriny sy ny hambompony izy ka hombàn-tafika lehibe no hiroso hamely ny mpanjaka ao atsimo; ary io mpanjaka ao atsimo io dia hioman-kiady miaraka amina tafika goavana sy matanjaka tokoa, kanjo tsy hahatohitra satria hanaovana teti-dratsy hahavoa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa izay olona akaiky azy ihany no hanapotika azy; ka ho resim-pahavalo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ho resim-pahavalo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny stf tranainy latinina sy siriaka; ny RM dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: handresy.
    marker-yv: yv-n
  - type: text
    text: 'ny tafiny, ary ho marobe ny faty hiampatrampatra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ireo mpanjaka roa ireo dia samy haniry hanao ratsy ao am-pony avy ka hifampiresaka lainga eo amin’ny latabatra iray; nefa tsy hahomby izany satria amin’ny fotoanandro voatendry ihany no hiafaran’ny raharaha. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary hiverina any amin’ny taniny mitondra harembe ilay mpanjaka ao avaratra; ka hanatanteraka izay nokasainy hanoherana ny fanekempihavanana masina izy, vao hody any amin’ny taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Amin’ny fotoana voatendry, dia hiverina any atsimo indray izy, nefa tsy hizotra tahaka ny tamin’ny voalohany ny fanafihana amin’ity farany ity. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa ho tonga hamely azy ny sambon’i Kitima, ary ho kivy izy ka hiverin-dalàna. Hisafoaka indray izy ka hanao izay hanoherana ny fanekempihavanana masina sady hifanaraka koa amin’ireo mivadika amin’izany fanekempihavanana izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tamin’ny taona 168 tal J.K. i Popily Laenà, filohan’ny tafika an-dranomasina rômanina, dia nandidy an’i Antiôkôsa Epifàna mba hody any Siria.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ireo miaramila hirahiny dia haka toerana eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeramasina
  - type: text
    text: ' mimanda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'toeramasina mimanda: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny toeramasina ao anatin’ny tempolin’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' ka hanazimba azy; hampitsahatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanao isan’andro amin’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny sorona... amin’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 29.39-42; Nom 28.3-6 Ampit Dan 8.11.
    marker-yv: yv-n
  - type: text
    text: ' izy sady hampiditra ilay fanimbazimbana mahatsiravina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31d '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay fanimbazimbana mahatsiravina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ny sarivongana mampiseho an’i Zeosa Olimpianina izay naorina teo ambonin’ny alitara araka ny baiko nomen’i Antiôkôsa Epifàna; jereo 12.11; Mt 24.15; Mk 13.14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary izy mpanjaka mihitsy no handroboka ny olona hitsipaka ny fanekempihavanana amin’ny fandokadokafana. Nefa ny olona izay mahalala an’Andriamaniny dia hiorina mafy amin’ny fanaony; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ary izay hendry ao amin’ireo kosa hampianatra ny maro, saingy mandritra ny andro vitsivitsy dia ho fatin’ny sabatra na hodorana na hatao an-tranomaizina ny sasany amin’ireto mpampianatra rehefa avy norobaina. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary mandritra ireny fanenjehana ireny dia fanampiana kely monja no ho azon’ireto ampahorina, satria maro ny olona hiandany aminy noho ny fihatsarambelatsihy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary hisy amin’ireo hendry ireo no ho faty mba '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hanadiovana
  - type: text
    text: ' sy hanatsarana ary hamotsiana ny vahoakan’Andriamanitra mandra-piavin’ny fotoana farany, satria ho tonga izany amin’ny fotoana voatondro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: «Ary ny mpanjaka hanao araka izay sitrapony; dia hanandra-tena sy hihevi-tena ho ambonin’ny andriamanitra rehetra ka hiteny zava-mampivarahontsana hanohitra an’ilay Andriamanitry ny andriamanitra. Ary hanam-pahombiazana izy ambara-pihatran’ny fahatezeran’Andriamanitra, satria ho tanteraka izay efa voatendry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2Tes 2.3-4; Apôk 13.5-6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary tsy horaharahainy akory ireo andriamanitry ny razany na ireo andriamanitra lalain’ny vehivavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.37a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andriamanitra... vehivavy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: angamba ny andriamanitra Tamoza izany, jereo Ezek 8.14 sy nta.
    marker-yv: yv-n
  - type: text
    text: ; tsy hisy horaharahainy tokoa izay andriamanitra satria heveriny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.37b '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'mihevi-tena ho...:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny mpanjaka Antiôkôsa izay resahina eto (jereo nta 11.2) dia nanome anarana ny tenany hoe «Epifàna», izany hoe raha adika dia «andriamanitra niseho vatana».
    marker-yv: yv-n
  - type: text
    text: ' ho ambonin’izy rehetra ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fa ho solon’izany kosa dia homeny voninahitra ny andriamanitry ny tanànamimanda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.38 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andriamanitry ny tanànamimanda: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: angamba mety ho Zeosa Olimpianina no tiany hambara.
    marker-yv: yv-n
  - type: text
    text: '; andriamanitra tsy fantatry ny razany akory izany kanefa hotoloran’io mpanjaka io volamena sy volafotsy ary vatosoa mbamy zava-tsarobidy hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Hamely ny tanànamimanda izy ombàn’io andriamanitra vahiny io; ary izay manaiky io andriamanitra io dia hampitomboiny voninahitra ka hampanapahany ny maro, sady hizaràny tany ho valisoany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.39 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary izay... andriamanitra io: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary izay manaiky azy ho mpanjaka.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: '«Ary amin’ny fotoana farany dia hanoto azy indray ny mpanjaka ao atsimo, nefa ny mpanjaka ao avaratra dia hipaoka azy toy tafio-drivotra miaraka amin-kalesy sy mpitaingi-tsoavaly ary sambo marobe; ary hiditra amin’ny tany isan-karazany izy ka hihoatra sisintany ombàn-tafika sy hipariaka toy ny ranovaky. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary hiditra ao amin’ilay tany tsara indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.41a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay tany tsara indrindra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny tanin’i Israely.
    marker-yv: yv-n
  - type: text
    text: ' izy ka betsaka ny olona haripany; nefa ho afaka amin’ny tanany kosa ireo Môabita sy Edômita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.41b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Edômita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Môabita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hamônita:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: firenena akaikin’i Israely sady fahavalony hatramin’ny ela.
    marker-yv: yv-n
  - type: text
    text: ' ary ny lohandohan’ny Hamônita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.41d '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lohandohan’ny Hamônita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa araka ny siriaka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary ireo sisa amin’ny Hamônita.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Voatsimbina ireo fahavalon’ny Israelita ireo satria miandany amin’i Antiôkôsa Epifàna.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary hanitatra ny fahefàny ao amin’ny tany hafa izy ka na dia i Ejipta aza dia tsy ho afa-mitsoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ho lasany avokoa ny tahirim-bolamena sy volafotsy ary zava-tsoan’i Ejipta; ary ny Libianina sy ny Etiôpianina dia hanaiky azy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Kanefa hisy vaovao avy any atsinanana sy avy any avaratra hampitebiteby azy, ka hiainga hanafika amin-katezerana mafy izy mba handrava zavatra sy handringana olona maro. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary hanorina ny tranolain’andriamanjaka eo anelanelan’ny ranomasina sy ny tendrombohitra masin’ilay tany tsara indrindra izy; nefa ho tonga amin’ny hiafarany ihany izy, ka tsy hisy hamonjy azy.»
