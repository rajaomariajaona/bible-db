document_id: REV.9,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia nitsoka trompetra ilay anjely fahadimy; ka hitako nisy kintana anankiray avy tany an-danitra, nilatsaka tetỳ an-tany; ary nomena io kintana io ny fanalahidin’ny vavalavaky ny '
  - type: text
    content: hantsambe
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Manana rambo sy fanindrona tahaka ny an’ny maingoka izy ireo; ary ny rambony no misy ny hery entiny hamely ny olona mandritra ny dimy volana. '
  '11':
  - type: text
    content: Manana mpanjaka ireo valala ireo, dia ilay anjely mifehy ny hantsambe; ka ny anaran’io anjely io amin’ny teny hebreo dia «Abadôna» ary amin’ny teny grika dia «Apôliôna» (izany hoe «Mpandrava»).
  '12':
  - type: text
    content: Lasa izay ny loza voalohany; fa aorian’izany, indreo hisosoka ny loza roa hafa.
  '13':
  - type: text
    content: 'Dia nitsoka trompetra ilay anjely fahenina, ka nisy feo reko nivoaka avy tamin’ny zoro efatry ny '
  - type: text
    content: alitara
  - type: text
    content: ' volamena izay teo anatrehan’Andriamanitra'
  - type: note
    content: Jereo 8.3 sy nta.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ary hoy ilay feo tamin’ny anjely fahenina nitana trompetra: «Vahao ny anjely efatra mifatotra eo akaikin’ny Eofrata'
  - type: note
    content: 'Eofrata: ony lehibe any Mezôpôtamia, izay namaritra ny sisiny atsinanana teo amin’ny fanjakana rômanina fahizany. Mamakivaky an’i Iràka io ony io ankehitriny.'
  - type: text
    content: ', ony lehibe!» '
  '15':
  - type: text
    content: 'Dia novahana ireo anjely efatra ireo; fa voaomana ho amin’izany ora sy andro ary volana sy taona izany rahateo izy ireo, mba hahafaty ny ampahatelon’ny olombelona. '
  '16':
  - type: text
    content: 'Ary ny isan’ny miaramila an-tsoavaly dia roanjato tapitrisa, fa nahare ny isany aho. '
  '17':
  - type: text
    content: 'Ary toy izao no nahitako ny soavaly sy ny mpitaingina azy, nandritra ny fahitana: ny mpitaingina dia manana fiarovantratra mena toy ny afo sy manga toy ny vatosoa safira ary mavo toy ny solifara'
  - type: note
    content: 'vatosoa safira: jereo 21.19-20 sy nta. –solifara: jereo Lk 17.29 sy nta.'
  - type: text
    content: '; ny soavaly kosa dia tahaka ny lohan-diona ny lohany, ary nivoaka afo aman-tsetroka sy solifara ny vavany. '
  '18':
  - type: text
    content: 'Ireo loza telo ireo, izany hoe ny afo aman-tsetroka sy solifara izay nivoaka avy tamin’ny vavan-tsoavaly, no nahafaty ny ampahatelon’ny olombelona. '
  '19':
  - type: text
    content: Fa ny herin’ny soavaly dia eo amin’ny vavany sy ny rambony; satria toy ny bibilava ny rambony ka misy loha izay entiny mamely.
  '2':
  - type: text
    content: Dia nosokafany ny vavalavak’ilay hantsambe, ka nisy setroka niakatra avy ao tahaka ny setroka avoakan’ny lafaoro lehibe
  - type: note
    content: Ampit Gen 19.28.
  - type: text
    content: '; ary nihamaizina ny masoandro sy ny habakabaka noho ny setroka navoakan’ny vavalavaka. '
  '20':
  - type: text
    content: 'Kanefa ny olombelona, sisa tsy matin’ireo loza ireo, dia tsy niova toetra hiala tamin’ireo andriamanitra voatran’ny tanany, ka tsy nitsaha-nivavaka tamin’ny '
  - type: text
    content: demony
  - type: text
    content: ' sy tamin’ny sampy volamena sy volafotsy sy halimo ary vato aman-kazo, sampy izay tsy afaka mijery na mandre na mamindra'
  - type: note
    content: 'Ampit Sal 115.4-5; 135.15-17; Dan 5.4, 23. –demony: jereo 1 Tim 4.1 sy nta.'
  - type: text
    content: '; '
  '21':
  - type: text
    content: ary tsy niova toetra koa izy ireo hiala amin’ny vonoana olona na ny ody ratsy na ny fijangajangana na ny halatra fanaony.
  '3':
  - type: text
    content: Ary nisy valala navoakan’io setroka io mba hankamin’ny tany sady nomena hery toy ny an’ny maingoka etỳ an-tany
  - type: note
    content: 'Ampit Eks 10.12-15. –maingoka: jereo Lk 10.19 sy nta.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: Dia nilazana ny valala mba tsy hamely ny ahitra amin’ny tany na ny zava-maitso na ny hazo, fa ny olona tsy manana ny tombokasen’Andriamanitra eo an-kandriny ihany
  - type: note
    content: Jereo 5.1 sy nta.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Kanefa tsy navela hahafaty ireo olona ireo ny valala fa ny hampanaintaina azy dimy volana ihany; ary ny fanaintainana nafitsony dia tahaka ny fanaintainana afitsoky ny maingoka rehefa manindrona olona. '
  '6':
  - type: text
    content: Amin’izany andro izany dia hitady fahafatesana ny olona, fa tsy hahita; ary haniry ho faty izy, fa handositra lavitra azy ny fahafatesana
  - type: note
    content: Ampit Jôb 3.21; Jer 8.3.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Ny endrik’ireo valala ireo dia mitovy amin’ny soavaly vonon-kiady; toa satroboninahitra volamena no teny an-dohany ary tahaka ny tavan’olona ny tavany. '
  '8':
  - type: text
    content: 'Manana volo tahaka ny volom-behivavy izy ireo, ary ny nifiny dia tahaka ny an’ny liona. '
  '9':
  - type: text
    content: Manana fiarovantratra tahaka ny akanjo vy fiarovantratra izy ireo; ary ny fikopakopaky ny elany dia tahaka ny fikotrokotroky ny kalesy tarihin-tsoavaly maro miriotra hiady
  - type: note
    content: 'And 7-9: jereo Jl 2.4; 1.6; 2.5.'
  - type: text
    content: '. '
