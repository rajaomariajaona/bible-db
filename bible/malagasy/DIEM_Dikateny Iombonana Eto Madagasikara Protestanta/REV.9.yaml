document_id: REV.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nitsoka trompetra ilay anjely fahadimy; ka hitako nisy kintana anankiray avy tany an-danitra, nilatsaka tetỳ an-tany; ary nomena io kintana io ny fanalahidin’ny vavalavaky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hantsambe
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Manana rambo sy fanindrona tahaka ny an’ny maingoka izy ireo; ary ny rambony no misy ny hery entiny hamely ny olona mandritra ny dimy volana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Manana mpanjaka ireo valala ireo, dia ilay anjely mifehy ny hantsambe; ka ny anaran’io anjely io amin’ny teny hebreo dia «Abadôna» ary amin’ny teny grika dia «Apôliôna» (izany hoe «Mpandrava»).
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Lasa izay ny loza voalohany; fa aorian’izany, indreo hisosoka ny loza roa hafa.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nitsoka trompetra ilay anjely fahenina, ka nisy feo reko nivoaka avy tamin’ny zoro efatry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' volamena izay teo anatrehan’Andriamanitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 8.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hoy ilay feo tamin’ny anjely fahenina nitana trompetra: «Vahao ny anjely efatra mifatotra eo akaikin’ny Eofrata'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Eofrata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ony lehibe any Mezôpôtamia, izay namaritra ny sisiny atsinanana teo amin’ny fanjakana rômanina fahizany. Mamakivaky an’i Iràka io ony io ankehitriny.
      marker-yv: yv-n
    - type: text
      text: ', ony lehibe!» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia novahana ireo anjely efatra ireo; fa voaomana ho amin’izany ora sy andro ary volana sy taona izany rahateo izy ireo, mba hahafaty ny ampahatelon’ny olombelona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny isan’ny miaramila an-tsoavaly dia roanjato tapitrisa, fa nahare ny isany aho. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary toy izao no nahitako ny soavaly sy ny mpitaingina azy, nandritra ny fahitana: ny mpitaingina dia manana fiarovantratra mena toy ny afo sy manga toy ny vatosoa safira ary mavo toy ny solifara'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'vatosoa safira: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 21.19-20 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'solifara:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Lk 17.29 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '; ny soavaly kosa dia tahaka ny lohan-diona ny lohany, ary nivoaka afo aman-tsetroka sy solifara ny vavany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ireo loza telo ireo, izany hoe ny afo aman-tsetroka sy solifara izay nivoaka avy tamin’ny vavan-tsoavaly, no nahafaty ny ampahatelon’ny olombelona. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa ny herin’ny soavaly dia eo amin’ny vavany sy ny rambony; satria toy ny bibilava ny rambony ka misy loha izay entiny mamely.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia nosokafany ny vavalavak’ilay hantsambe, ka nisy setroka niakatra avy ao tahaka ny setroka avoakan’ny lafaoro lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 19.28.
      marker-yv: yv-n
    - type: text
      text: '; ary nihamaizina ny masoandro sy ny habakabaka noho ny setroka navoakan’ny vavalavaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Kanefa ny olombelona, sisa tsy matin’ireo loza ireo, dia tsy niova toetra hiala tamin’ireo andriamanitra voatran’ny tanany, ka tsy nitsaha-nivavaka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ' sy tamin’ny sampy volamena sy volafotsy sy halimo ary vato aman-kazo, sampy izay tsy afaka mijery na mandre na mamindra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 115.4-5; 135.15-17; Dan 5.4, 23. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'demony:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 1 Tim 4.1 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ary tsy niova toetra koa izy ireo hiala amin’ny vonoana olona na ny ody ratsy na ny fijangajangana na ny halatra fanaony.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nisy valala navoakan’io setroka io mba hankamin’ny tany sady nomena hery toy ny an’ny maingoka etỳ an-tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 10.12-15. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'maingoka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Lk 10.19 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia nilazana ny valala mba tsy hamely ny ahitra amin’ny tany na ny zava-maitso na ny hazo, fa ny olona tsy manana ny tombokasen’Andriamanitra eo an-kandriny ihany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 5.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Kanefa tsy navela hahafaty ireo olona ireo ny valala fa ny hampanaintaina azy dimy volana ihany; ary ny fanaintainana nafitsony dia tahaka ny fanaintainana afitsoky ny maingoka rehefa manindrona olona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Amin’izany andro izany dia hitady fahafatesana ny olona, fa tsy hahita; ary haniry ho faty izy, fa handositra lavitra azy ny fahafatesana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôb 3.21; Jer 8.3.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny endrik’ireo valala ireo dia mitovy amin’ny soavaly vonon-kiady; toa satroboninahitra volamena no teny an-dohany ary tahaka ny tavan’olona ny tavany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Manana volo tahaka ny volom-behivavy izy ireo, ary ny nifiny dia tahaka ny an’ny liona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Manana fiarovantratra tahaka ny akanjo vy fiarovantratra izy ireo; ary ny fikopakopaky ny elany dia tahaka ny fikotrokotroky ny kalesy tarihin-tsoavaly maro miriotra hiady
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 7-9:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jl 2.4; 1.6; 2.5.
      marker-yv: yv-n
    - type: text
      text: '. '
