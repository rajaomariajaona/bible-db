document_id: JOS.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanaovana antsapaka ho an’ireo foko sisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’ny nandresen’ny Israelita ilay tany, dia nivory tao Silao ny fiangonana israelita tsivakivolo ka tao no nananganany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' amin’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rehefa naorina tao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Silao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' teo amin’ny faritanin’i Efraîma ny Tranolay fihaonana, dia nanjary foibem-pivavahana sy toeram-pihaonambe ho an’ny Israelita rehetra io tanàna io.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary mbola nisy foko fito tsy mbola nahazo ny zarataniny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka hoy i Josoa tamin’ireo Israelita ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandra-pahoviana no hiandrasanareo tsy handeha handray ny tany izay nomen’ny TOMPO Andriamanitry ny razanareo anareo? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa manendre lehilahy telo isam-poko mba hirahiko hitety ny tany; avy eo dia hiverina hanao tatitra eo anatrehako ny amin’ny anjara tany noteteziny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hozarain’ireo ho fito toko ny tany. Ny taranak’i Joda dia hijanona amin’ny faritaniny ao atsimo, ary ny taranak’i Jôsefa kosa hijanona amin’ny azy ao avaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ataovinareo an-tsoratra ny toetoetr’ireo tany fito toko ireo ka ento atỳ amiko izany; dia hataoko antsapaka eo anatrehan’ny TOMPO Andriamanitsika izay ho anjara fokonareo avy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy hisy anjara ho an’ny Levita eo anivonareo satria ny fisoronana amin’ny TOMPO no lovany. Ny fokon’i Gada sy fokon’i Reobena ary antsasa-pokon’i Manase koa dia efa nahazo ny zaratany teny ampita atsinanan’i Jôrdàna, ka i Mosesy mpanompon’ny TOMPO no nanome azy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nioman-kandeha ireo lehilahy voatendry hisafo ny tany, ka izao no baiko nataon’i Josoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana, tetezo ny tany, ataovy an-tsoratra ny toetoetrany, dia miverena atỳ amiko; fa eto Silao, eto anatrehan’ny TOMPO no hanaovako antsapaka izay ho anjaranareo avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nandeha ireo lehilahy ireo ka nitety ny tany sy nanao an-tsoratra ny toetoetrany ary nizara azy ho fito toko miaraka amin’ny lisitry ny tanàna; dia niverina ho any amin’i Josoa tao amin’ny toby tao Silao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nanao ny antsapaka teo anatrehan’ny TOMPO tao Silao i Josoa ka nizara ny tany ho an’ny Israelita araka ny anjara tandrifin’ny fokony avy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaratanin’i Benjamîna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny anjara voatendrin’ny antsapaka voalohany dia azon’ny foko benjaminita ho an’ireo tarika ao anatiny; ka ny velaran-taniny dia teo anelanelan’ny an’ny taranak’i Joda sy ny an’ny taranak’i Jôsefa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faritanin’i Benjamîna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tao avaratr’i Jerosalema no nisy azy.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny sisin-taniny, lafy avaratra, dia miainga hatreo Jôrdàna ka miakatra ho any amin’ny ilany avaratr’i Jerikao, dia mahazo ny tendrombohitra any andrefana, ary miafara amin’ny taniefitr’i Bety-Avena; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'avy eo dia mankany Lozy ka mandalo amin’ny ilany atsimon’i Lozy izay antsoina koa hoe Betela, ary midina ho any Hatarôta-Adara, rehefa avy mandalo ny tendrombohitra eo atsimon’i Bety-Hôrôna ambany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ao andrefan’io tendrombohitra io no miolaka ny sisin-tany ka mihodina mianatsimo ary miafara ao Kiriata-Bahala (antsoina koa hoe Kiriata-Jeharima), izay tanànan’ny taranak’i Joda. Izany no sisin-tany lafy andrefana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny sisin-tanin’i Benjamîna, lafy atsimo kosa, dia miainga hatreo Kiriata-Jeharima, ka miankandrefana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.15 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Mandroso miankandrefana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mankany Gasîna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' araka ny dkt tranainy Septoazinta.'
    marker-yv: yv-n
  - type: text
    text: ' ary miafara any amin’ny loharanon’i Neftoa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Avy eo midina hatrany am-pototr’ilay tendrombohitra manoloana ny lohasahan’i Hinôma ao avaratry ny lohasahan’ny Refaîta, dia manaraka ny lohasahan’i Hinôma amin’ny ilany atsimo manamorona ny havoanan’ny Jebosita, ary midina hatrany Haîna-Rôgela. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Avy eo mihodina mianavaratra ka mandroso hatrany Haîna-Semesa sy hatrany Gilelôta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gilelôta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toerana voatsiahy amin’ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gilgala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny 15.7 (jereo 15.7 sy nta).'
    marker-yv: yv-n
  - type: text
    text: ' izay manoloana ny fiakaran’i Adomima, ary midina ho any amin’ilay vato atao hoe vaton’i Bôhana (I Bôhana dia zanakalahin’i Reobena). '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avy eo mihazo ny ilany avaratr’ilay havoana mandondona ny lohasahan’i Jôrdàna, dia midina amin’io lohasaha io, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary mitohy any avaratr’i Bety-Hôglà ka miafara any amin’ny tendrony avaratry ny Ranomasina Maty, eo am-bavaranon’i Jôrdàna. Izany no sisin-tany, lafy atsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I Jôrdàna kosa no sisin-tany, lafy atsinanana.
- type: usfm
  marker: p
  children:
  - type: text
    text: Izany no zaratany nolovan’ny Benjaminita ho an’ireo tarika ao anatiny, araka ny sisin-tany manodidina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ireto avy ny tanàna azon’ny foko benjaminita ho an’ny tarika ao anatiny: i Jerikao, i Bety-Hôglà, i Hemeke-Ketsitsa, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Bety-Harabà, i Tsemaraîma, i Betela, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Havima, i Parà, i Hôfrà, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Kefara-Hamônà, i Hôfnỳ, ary i Geba; izany hoe tanàna 12 miampy ireo tanàna kely miankina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tao koa i Gibehôna, i Ramà, i Beerôta. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Mitsipè, i Kefirà, i Môtsà, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Rekema, i Jirpeela, i Taralà, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: i Tselà, i Elefa, ny tanànan’ny Jebosita (izany hoe i Jerosalema), i Gibehata, ary i Kiriata; izany hoe tanàn-dehibe 14 samy miampy ireo tanàna kely miankina aminy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Izany no zaratany nolovan’ny Benjaminita ho an’ireo tarika ao anatiny.
