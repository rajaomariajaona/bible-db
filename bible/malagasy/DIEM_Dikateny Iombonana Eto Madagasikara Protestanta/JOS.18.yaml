document_id: JOS.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanaovana antsapaka ho an’ireo foko sisa
  - type: text
    content: 'Taorian’ny nandresen’ny Israelita ilay tany, dia nivory tao Silao ny fiangonana israelita tsivakivolo ka tao no nananganany ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' amin’Andriamanitra'
  - type: note
    content: Rehefa naorina tao Silao teo amin’ny faritanin’i Efraîma ny Tranolay fihaonana, dia nanjary foibem-pivavahana sy toeram-pihaonambe ho an’ny Israelita rehetra io tanàna io.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ary nanao ny antsapaka teo anatrehan’ny TOMPO tao Silao i Josoa ka nizara ny tany ho an’ny Israelita araka ny anjara tandrifin’ny fokony avy.
  - type: heading
    content: Ny zaratanin’i Benjamîna
  '11':
  - type: text
    content: Ny anjara voatendrin’ny antsapaka voalohany dia azon’ny foko benjaminita ho an’ireo tarika ao anatiny; ka ny velaran-taniny dia teo anelanelan’ny an’ny taranak’i Joda sy ny an’ny taranak’i Jôsefa
  - type: note
    content: Ny faritanin’i Benjamîna dia tao avaratr’i Jerosalema no nisy azy.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ny sisin-taniny, lafy avaratra, dia miainga hatreo Jôrdàna ka miakatra ho any amin’ny ilany avaratr’i Jerikao, dia mahazo ny tendrombohitra any andrefana, ary miafara amin’ny taniefitr’i Bety-Avena; '
  '13':
  - type: text
    content: 'avy eo dia mankany Lozy ka mandalo amin’ny ilany atsimon’i Lozy izay antsoina koa hoe Betela, ary midina ho any Hatarôta-Adara, rehefa avy mandalo ny tendrombohitra eo atsimon’i Bety-Hôrôna ambany. '
  '14':
  - type: text
    content: Ao andrefan’io tendrombohitra io no miolaka ny sisin-tany ka mihodina mianatsimo ary miafara ao Kiriata-Bahala (antsoina koa hoe Kiriata-Jeharima), izay tanànan’ny taranak’i Joda. Izany no sisin-tany lafy andrefana.
  '15':
  - type: text
    content: Ny sisin-tanin’i Benjamîna, lafy atsimo kosa, dia miainga hatreo Kiriata-Jeharima, ka miankandrefana
  - type: note
    content: Mandroso miankandrefana na hoe mankany Gasîna araka ny dkt tranainy Septoazinta.
  - type: text
    content: ' ary miafara any amin’ny loharanon’i Neftoa. '
  '16':
  - type: text
    content: 'Avy eo midina hatrany am-pototr’ilay tendrombohitra manoloana ny lohasahan’i Hinôma ao avaratry ny lohasahan’ny Refaîta, dia manaraka ny lohasahan’i Hinôma amin’ny ilany atsimo manamorona ny havoanan’ny Jebosita, ary midina hatrany Haîna-Rôgela. '
  '17':
  - type: text
    content: Avy eo mihodina mianavaratra ka mandroso hatrany Haîna-Semesa sy hatrany Gilelôta
  - type: note
    content: 'Gilelôta: toerana voatsiahy amin’ny anarana hoe Gilgala ao amin’ny 15.7 (jereo 15.7 sy nta).'
  - type: text
    content: ' izay manoloana ny fiakaran’i Adomima, ary midina ho any amin’ilay vato atao hoe vaton’i Bôhana (I Bôhana dia zanakalahin’i Reobena). '
  '18':
  - type: text
    content: 'Avy eo mihazo ny ilany avaratr’ilay havoana mandondona ny lohasahan’i Jôrdàna, dia midina amin’io lohasaha io, '
  '19':
  - type: text
    content: 'ary mitohy any avaratr’i Bety-Hôglà ka miafara any amin’ny tendrony avaratry ny Ranomasina Maty, eo am-bavaranon’i Jôrdàna. Izany no sisin-tany, lafy atsimo. '
  '2':
  - type: text
    content: 'Ary mbola nisy foko fito tsy mbola nahazo ny zarataniny. '
  '20':
  - type: text
    content: I Jôrdàna kosa no sisin-tany, lafy atsinanana.
  - type: text
    content: Izany no zaratany nolovan’ny Benjaminita ho an’ireo tarika ao anatiny, araka ny sisin-tany manodidina azy.
  '21':
  - type: text
    content: 'Ireto avy ny tanàna azon’ny foko benjaminita ho an’ny tarika ao anatiny: i Jerikao, i Bety-Hôglà, i Hemeke-Ketsitsa, '
  '22':
  - type: text
    content: 'i Bety-Harabà, i Tsemaraîma, i Betela, '
  '23':
  - type: text
    content: 'i Havima, i Parà, i Hôfrà, '
  '24':
  - type: text
    content: 'i Kefara-Hamônà, i Hôfnỳ, ary i Geba; izany hoe tanàna 12 miampy ireo tanàna kely miankina aminy. '
  '25':
  - type: text
    content: 'Tao koa i Gibehôna, i Ramà, i Beerôta. '
  '26':
  - type: text
    content: 'i Mitsipè, i Kefirà, i Môtsà, '
  '27':
  - type: text
    content: 'i Rekema, i Jirpeela, i Taralà, '
  '28':
  - type: text
    content: i Tselà, i Elefa, ny tanànan’ny Jebosita (izany hoe i Jerosalema), i Gibehata, ary i Kiriata; izany hoe tanàn-dehibe 14 samy miampy ireo tanàna kely miankina aminy.
  - type: text
    content: Izany no zaratany nolovan’ny Benjaminita ho an’ireo tarika ao anatiny.
  '3':
  - type: text
    content: 'Ka hoy i Josoa tamin’ireo Israelita ireo:'
  - type: text
    content: '–Mandra-pahoviana no hiandrasanareo tsy handeha handray ny tany izay nomen’ny TOMPO Andriamanitry ny razanareo anareo? '
  '4':
  - type: text
    content: 'Koa manendre lehilahy telo isam-poko mba hirahiko hitety ny tany; avy eo dia hiverina hanao tatitra eo anatrehako ny amin’ny anjara tany noteteziny. '
  '5':
  - type: text
    content: 'Dia hozarain’ireo ho fito toko ny tany. Ny taranak’i Joda dia hijanona amin’ny faritaniny ao atsimo, ary ny taranak’i Jôsefa kosa hijanona amin’ny azy ao avaratra. '
  '6':
  - type: text
    content: 'Ataovinareo an-tsoratra ny toetoetr’ireo tany fito toko ireo ka ento atỳ amiko izany; dia hataoko antsapaka eo anatrehan’ny TOMPO Andriamanitsika izay ho anjara fokonareo avy. '
  '7':
  - type: text
    content: Tsy hisy anjara ho an’ny Levita eo anivonareo satria ny fisoronana amin’ny TOMPO no lovany. Ny fokon’i Gada sy fokon’i Reobena ary antsasa-pokon’i Manase koa dia efa nahazo ny zaratany teny ampita atsinanan’i Jôrdàna, ka i Mosesy mpanompon’ny TOMPO no nanome azy izany.
  '8':
  - type: text
    content: 'Dia nioman-kandeha ireo lehilahy voatendry hisafo ny tany, ka izao no baiko nataon’i Josoa taminy:'
  - type: text
    content: –Mandehana, tetezo ny tany, ataovy an-tsoratra ny toetoetrany, dia miverena atỳ amiko; fa eto Silao, eto anatrehan’ny TOMPO no hanaovako antsapaka izay ho anjaranareo avy.
  '9':
  - type: text
    content: 'Dia nandeha ireo lehilahy ireo ka nitety ny tany sy nanao an-tsoratra ny toetoetrany ary nizara azy ho fito toko miaraka amin’ny lisitry ny tanàna; dia niverina ho any amin’i Josoa tao amin’ny toby tao Silao. '
