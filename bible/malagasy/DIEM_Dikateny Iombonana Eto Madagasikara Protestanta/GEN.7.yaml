document_id: GEN.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niditra tao an-tsambofiara i Noà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Noà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Midira ao anatin’ny sambofiara ianao sy ny ankohonanao, satria ianao irery no hitako fa marina teo anatrehako tamin’izao taranaka izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Makà biby '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'biby madio '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ireo voalazan’ny lalànan’i Mosesy (jereo Lev 11) fa azo hanina sy atao sorona.
    marker-yv: yv-n
  - type: text
    text: ' mpivady fito isaky ny karazany avy, ary biby maloto mpivady iray ihany kosa isaky ny karazany avy, ka ento miaraka aminao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'toy izany koa ny amin’ny voro-manidina, makà mpivady fito isaky ny karazany avy: dia mba samy hamelona taranaka eo amin’ny velaran’ny tany tontolo ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa herinandro sisa dia hampilatsaka ranonorana mandritra ny efapolo andro sy efapolo alina amin’ny tany Aho, ka hofoanako eo amin’ny velaran’ny tany ireo zava-mananaina rehetra nataoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nataon’i Noà izay rehetra nandidian’ny TOMPO azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 6.22 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny safo-drano lehibe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Feno 600 taona i Noà raha tonga ny safo-drano lehibe teto ambonin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Niditra tao anaty sambofiara izy mbamin’ny vady aman-janany ary ireo vinantovaviny mba tsy ho tratry ny safo-drano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 24.38-3; Lk 17.27.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny biby '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: ' sy ny biby maloto ary ny voro-manidina sy ireo bibikely mihetsiketsika ambonin’ny tany koa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia tonga tsiroaroa, lahy sy vavy, nankao amin’i Noà tao amin’ny sambofiara araka izay efa nandidian’Andriamanitra an’i Noà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nony afaka herinandro dia safotry ny ranobe ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Iny faha-600 taona niainan’i Noà iny, tamin’ny volana faharoa, andro faha-17, dia niboiboika be ny rano avy any ambanin’ny tany tamin’ireo loharano rehetra, ary nivoha nidanadana ny varavaran’ny lanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'volana faharoa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe FANISANANDRO. –
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Ny rano tamin’ny safo-drano:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 2 Pt 3.6.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia avy be ny orana teny ambonin’ny tany nandritra ny efapolo andro sy efapolo alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’io andro io no niditra tao amin’ny sambofiara i Noà sy ny vadiny ary koa i Sema sy i Hama ary i Jafeta zanany lahy mbamin’ireo vinantovaviny telo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'niditra tao koa ireo bibidia amam-biby fiompy rehetra isan-karazany sy ireo bibikely rehetra isan-karazany mihetsiketsika ambonin’ny tany mbamin’ireo voro-manidina rehetra isan-karazany sy ireo bibikely rehetra manana elatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Samy tonga tsiroaroa teo amin’i Noà tao anatin’ny sambofiara ireo voaary rehetra manam-pofonaina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lahy sy vavy tamin’ireo zava-mananaina rehetra ireo no niditra tao, araka izay efa nandidian’Andriamanitra an’i Noà. Avy eo dia nohidin’ny TOMPO ny varavarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Naharitra efapolo andro ny safo-drano teny ambonin’ny tany. Rehefa nitombo ny rano, dia nanainga ny sambofiara, hitsinkafona hiala amin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nihanahery ny rano sady nitombo be dia be, ka dia nandeha teny ambony rano ny sambofiara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nitombo be izaitsizy ny rano tetỳ ambonin’ny tany ka naharakotra hatramin’ireo tendrombohitra avo indrindra taty ambanin’ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tafakatra fito metatra sy sasany ambonin’ny tendrombohitra ny haavon’ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia maty ny nofo rehetra izay nihetsiketsika tambonin’ny tany, izany hoe ny voro-manidina sy ny biby fiompy mbamin’ny bibidia, ny bibikely mihahohaho tambonin’ny tany, ary ny olombelona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Maty avokoa izay rehetra nanam-pofonaina tamin’ny vavorona teny an-tanety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nofoanan’Andriamanitra ny zava-mananaina rehetra teny ambonin’ny tany, nanomboka tamin’ny olona ka hatramin’ny biby lehibe sy kely mbamin’ny voro-manidina; dia nofoanan’Andriamanitra tsy ho amin’ny tany ireny, fa i Noà irery ihany mbamin’izay niaraka taminy tao anatin’ny sambofiara no sisa tavela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nivoahan’i Noà avy tao an-tsambofiara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Naharitra 150 andro ny fahatondrahan’ny rano teny ambonin’ny tany.
