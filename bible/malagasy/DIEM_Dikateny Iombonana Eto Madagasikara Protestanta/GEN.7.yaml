document_id: GEN.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Niditra tao an-tsambofiara i Noà
  - type: text
    content: 'Hoy ny TOMPO tamin’i Noà:'
  - type: text
    content: '–Midira ao anatin’ny sambofiara ianao sy ny ankohonanao, satria ianao irery no hitako fa marina teo anatrehako tamin’izao taranaka izao. '
  '10':
  - type: text
    content: Nony afaka herinandro dia safotry ny ranobe ny tany.
  '11':
  - type: text
    content: Iny faha-600 taona niainan’i Noà iny, tamin’ny volana faharoa, andro faha-17, dia niboiboika be ny rano avy any ambanin’ny tany tamin’ireo loharano rehetra, ary nivoha nidanadana ny varavaran’ny lanitra
  - type: note
    content: 'volana faharoa: jereo ny FTS amin’ny voambolana hoe FANISANANDRO. –Ny rano tamin’ny safo-drano: jereo 2 Pt 3.6.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Dia avy be ny orana teny ambonin’ny tany nandritra ny efapolo andro sy efapolo alina. '
  '13':
  - type: text
    content: 'Tamin’io andro io no niditra tao amin’ny sambofiara i Noà sy ny vadiny ary koa i Sema sy i Hama ary i Jafeta zanany lahy mbamin’ireo vinantovaviny telo; '
  '14':
  - type: text
    content: 'niditra tao koa ireo bibidia amam-biby fiompy rehetra isan-karazany sy ireo bibikely rehetra isan-karazany mihetsiketsika ambonin’ny tany mbamin’ireo voro-manidina rehetra isan-karazany sy ireo bibikely rehetra manana elatra. '
  '15':
  - type: text
    content: 'Samy tonga tsiroaroa teo amin’i Noà tao anatin’ny sambofiara ireo voaary rehetra manam-pofonaina. '
  '16':
  - type: text
    content: Lahy sy vavy tamin’ireo zava-mananaina rehetra ireo no niditra tao, araka izay efa nandidian’Andriamanitra an’i Noà. Avy eo dia nohidin’ny TOMPO ny varavarana.
  '17':
  - type: text
    content: 'Naharitra efapolo andro ny safo-drano teny ambonin’ny tany. Rehefa nitombo ny rano, dia nanainga ny sambofiara, hitsinkafona hiala amin’ny tany. '
  '18':
  - type: text
    content: 'Ary nihanahery ny rano sady nitombo be dia be, ka dia nandeha teny ambony rano ny sambofiara. '
  '19':
  - type: text
    content: 'Ary nitombo be izaitsizy ny rano tetỳ ambonin’ny tany ka naharakotra hatramin’ireo tendrombohitra avo indrindra taty ambanin’ny lanitra. '
  '2':
  - type: text
    content: 'Makà biby '
  - type: text
    content: madio
  - type: note
    content: Ny biby madio dia ireo voalazan’ny lalànan’i Mosesy (jereo Lev 11) fa azo hanina sy atao sorona.
  - type: text
    content: ' mpivady fito isaky ny karazany avy, ary biby maloto mpivady iray ihany kosa isaky ny karazany avy, ka ento miaraka aminao; '
  '20':
  - type: text
    content: 'Tafakatra fito metatra sy sasany ambonin’ny tendrombohitra ny haavon’ny rano. '
  '21':
  - type: text
    content: 'Dia maty ny nofo rehetra izay nihetsiketsika tambonin’ny tany, izany hoe ny voro-manidina sy ny biby fiompy mbamin’ny bibidia, ny bibikely mihahohaho tambonin’ny tany, ary ny olombelona rehetra. '
  '22':
  - type: text
    content: 'Maty avokoa izay rehetra nanam-pofonaina tamin’ny vavorona teny an-tanety. '
  '23':
  - type: text
    content: Dia nofoanan’Andriamanitra ny zava-mananaina rehetra teny ambonin’ny tany, nanomboka tamin’ny olona ka hatramin’ny biby lehibe sy kely mbamin’ny voro-manidina; dia nofoanan’Andriamanitra tsy ho amin’ny tany ireny, fa i Noà irery ihany mbamin’izay niaraka taminy tao anatin’ny sambofiara no sisa tavela.
  - type: heading
    content: Ny nivoahan’i Noà avy tao an-tsambofiara
  '24':
  - type: text
    content: Naharitra 150 andro ny fahatondrahan’ny rano teny ambonin’ny tany.
  '3':
  - type: text
    content: 'toy izany koa ny amin’ny voro-manidina, makà mpivady fito isaky ny karazany avy: dia mba samy hamelona taranaka eo amin’ny velaran’ny tany tontolo ireny. '
  '4':
  - type: text
    content: Fa herinandro sisa dia hampilatsaka ranonorana mandritra ny efapolo andro sy efapolo alina amin’ny tany Aho, ka hofoanako eo amin’ny velaran’ny tany ireo zava-mananaina rehetra nataoko.
  '5':
  - type: text
    content: Dia nataon’i Noà izay rehetra nandidian’ny TOMPO azy
  - type: note
    content: Jereo Gen 6.22 sy nta.
  - type: text
    content: .
  - type: heading
    content: Ny safo-drano lehibe
  '6':
  - type: text
    content: 'Feno 600 taona i Noà raha tonga ny safo-drano lehibe teto ambonin’ny tany. '
  '7':
  - type: text
    content: Niditra tao anaty sambofiara izy mbamin’ny vady aman-janany ary ireo vinantovaviny mba tsy ho tratry ny safo-drano
  - type: note
    content: Ampit Mt 24.38-3; Lk 17.27.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ny biby '
  - type: text
    content: madio
  - type: text
    content: ' sy ny biby maloto ary ny voro-manidina sy ireo bibikely mihetsiketsika ambonin’ny tany koa '
  '9':
  - type: text
    content: 'dia tonga tsiroaroa, lahy sy vavy, nankao amin’i Noà tao amin’ny sambofiara araka izay efa nandidian’Andriamanitra an’i Noà. '
