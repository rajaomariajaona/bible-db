document_id: 1CH.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitondran’i Davida ilay Vatamasina
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: mirakitra ny Fanekempihavanana ho any Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Sam 6.1-11)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Niarahan’i Davida nihevi-draharaha ny komandin-tafika mifehy arivo na mifehy zato ary ny mpanapaka rehetra; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa nirehi-pahatezerana tamin’i Hozà ny TOMPO ka namono nahafaty azy noho ny naninjirany tanana tamin’ny Vatamasina; dia teo anatrehan’Andriamanitra teo izy no maty.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Taitra i Davida satria tena namely mafy an’i Hozà ny TOMPO, koa io toerana io dia nantsoiny hoe «Peretsa-Hozà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Peretsa-Hozà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Sam 6.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: '», ary mbola izany no fiantso azy mandraka androany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Natahotra an’Andriamanitra i Davida tamin’izany andro izany ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fomba ahoana no hitondrako ho atỳ amiko ny Vatamasin’Andriamanitra?
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Koa tsy nafindran’i Davida ho any aminy, any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: ', ny Vatamasina; fa naviliny kosa izany ho ao an-tranon’i Hôbeda-Edôma, lehilahy avy any Gata. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Telo volana no nipetrahan’ny vatamasin’Andriamanitra niaraka tamin’ny ankohonan’i Hôbeda-Edôma, tanaty efitrano voatokana ho azy; ary dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: notahîn
    - type: text
      text: ’ny TOMPO ny ankohonan’i Hôbeda-Edôma sy izay rehetra fananany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 26.4-5.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka taorian’izany, dia hoy i Davida tamin’ny Israelita rehetra tafangona teo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha sitraky ny TOMPO Andriamanitsika, sady heverinareo fa tsara, dia andeha isika haniraka faingana ho any amin’ny mpiray firenena havantsika tavela manerana ny tanin’i Israely, indrindra amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' any amin’ny tanànany sy ny kijanany avy, mba hitaona azy hikambana amintsika. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia halaintsika ho atỳ amintsika indray ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny Fanekempihavanan
    - type: text
      text: ’ilay Andriamanitsika, satria tsy nahoantsika izany tamin’ny andron’i Saoly.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia niombon-kevitra ny olona rehetra tafangona teo fa hanao araka izany satria teo imason’ny vahoaka rehetra dia mitombina ny fikasana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia novorin’i Davida i Israely lafy valo, manomboka amin’ny sisin-tanin’i Ejipta ka hatrany Lebô-Hamàta, mba handeha haka ny Vatamasina, any Kiriata-Jeharima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lebô-Hamàta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 13.21 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Kiriata-Jeharima
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 1 Sam 6.21 sy nta; 7.1-2.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary niakatra niaraka tamin’ny Israelita rehetra i Davida ho any Bahalà, na hoe Kiriata-Jeharima, izay any Joda, mba hampakatra ilay Vatamasina fa eo amin’io Vatamasina io no iantsoana ny anaran’ny TOMPO Izay mipetraka eo ambonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerôbima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Eo amin’io... kerôbima: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 25.22.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nalaina tao an-tranon’i Abinadaba ny Vatamasina, dia nataingina teo ambony sarety vaovao; ka i Hozà sy i Ahiao no mpandroaka ny sarety. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary i Davida sy ny Israelita rehetra dia niravoravo araka izay tratry ny heriny manontolo teo anatrehan’Andriamanitra, ka nihira niaraka tamin’ny lokanga sy ny valiha mbamin’ny amponga sy ny kipantsona ary ny trompetra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nony tonga teo akaikin’ny famoloan’i Kidôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'famoloan’i Kidôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 2 Sam 6.6.
      marker-yv: yv-n
    - type: text
      text: ' izy ireo, dia naninji-tanana hihazona ny Vatamasina i Hozà satria saika hazeran’ny omby io. '
