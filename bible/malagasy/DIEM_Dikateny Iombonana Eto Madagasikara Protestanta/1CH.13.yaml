document_id: 1CH.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitondran’i Davida ilay Vatamasina
  - type: heading
    content: mirakitra ny Fanekempihavanana ho any Jerosalema
  - type: heading
    content: (Jereo 2 Sam 6.1-11)
  - type: text
    content: 'Niarahan’i Davida nihevi-draharaha ny komandin-tafika mifehy arivo na mifehy zato ary ny mpanapaka rehetra; '
  '10':
  - type: text
    content: Fa nirehi-pahatezerana tamin’i Hozà ny TOMPO ka namono nahafaty azy noho ny naninjirany tanana tamin’ny Vatamasina; dia teo anatrehan’Andriamanitra teo izy no maty.
  '11':
  - type: text
    content: Taitra i Davida satria tena namely mafy an’i Hozà ny TOMPO, koa io toerana io dia nantsoiny hoe «Peretsa-Hozà
  - type: note
    content: 'Peretsa-Hozà: jereo 2 Sam 6.8 sy nta.'
  - type: text
    content: '», ary mbola izany no fiantso azy mandraka androany. '
  '12':
  - type: text
    content: 'Natahotra an’Andriamanitra i Davida tamin’izany andro izany ka nanao hoe:'
  - type: text
    content: –Fomba ahoana no hitondrako ho atỳ amiko ny Vatamasin’Andriamanitra?
  '13':
  - type: text
    content: Koa tsy nafindran’i Davida ho any aminy, any an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ', ny Vatamasina; fa naviliny kosa izany ho ao an-tranon’i Hôbeda-Edôma, lehilahy avy any Gata. '
  '14':
  - type: text
    content: 'Telo volana no nipetrahan’ny vatamasin’Andriamanitra niaraka tamin’ny ankohonan’i Hôbeda-Edôma, tanaty efitrano voatokana ho azy; ary dia '
  - type: text
    content: notahîn
  - type: text
    content: ’ny TOMPO ny ankohonan’i Hôbeda-Edôma sy izay rehetra fananany
  - type: note
    content: Jereo 26.4-5.
  - type: text
    content: .
  '2':
  - type: text
    content: 'ka taorian’izany, dia hoy i Davida tamin’ny Israelita rehetra tafangona teo:'
  - type: text
    content: '–Raha sitraky ny TOMPO Andriamanitsika, sady heverinareo fa tsara, dia andeha isika haniraka faingana ho any amin’ny mpiray firenena havantsika tavela manerana ny tanin’i Israely, indrindra amin’ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: ' any amin’ny tanànany sy ny kijanany avy, mba hitaona azy hikambana amintsika. '
  '3':
  - type: text
    content: 'Dia halaintsika ho atỳ amintsika indray ny '
  - type: text
    content: Vatamasina mirakitra ny Fanekempihavanan
  - type: text
    content: ’ilay Andriamanitsika, satria tsy nahoantsika izany tamin’ny andron’i Saoly.
  '4':
  - type: text
    content: 'Dia niombon-kevitra ny olona rehetra tafangona teo fa hanao araka izany satria teo imason’ny vahoaka rehetra dia mitombina ny fikasana. '
  '5':
  - type: text
    content: Dia novorin’i Davida i Israely lafy valo, manomboka amin’ny sisin-tanin’i Ejipta ka hatrany Lebô-Hamàta, mba handeha haka ny Vatamasina, any Kiriata-Jeharima
  - type: note
    content: 'Lebô-Hamàta: jereo Nom 13.21 sy nta. –Kiriata-Jeharima: jereo 1 Sam 6.21 sy nta; 7.1-2.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ary niakatra niaraka tamin’ny Israelita rehetra i Davida ho any Bahalà, na hoe Kiriata-Jeharima, izay any Joda, mba hampakatra ilay Vatamasina fa eo amin’io Vatamasina io no iantsoana ny anaran’ny TOMPO Izay mipetraka eo ambonin’ny '
  - type: text
    content: kerôbima
  - type: note
    content: 'Eo amin’io... kerôbima: jereo Eks 25.22.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Nalaina tao an-tranon’i Abinadaba ny Vatamasina, dia nataingina teo ambony sarety vaovao; ka i Hozà sy i Ahiao no mpandroaka ny sarety. '
  '8':
  - type: text
    content: 'Ary i Davida sy ny Israelita rehetra dia niravoravo araka izay tratry ny heriny manontolo teo anatrehan’Andriamanitra, ka nihira niaraka tamin’ny lokanga sy ny valiha mbamin’ny amponga sy ny kipantsona ary ny trompetra. '
  '9':
  - type: text
    content: Nony tonga teo akaikin’ny famoloan’i Kidôna
  - type: note
    content: 'famoloan’i Kidôna: ampit 2 Sam 6.6.'
  - type: text
    content: ' izy ireo, dia naninji-tanana hihazona ny Vatamasina i Hozà satria saika hazeran’ny omby io. '
