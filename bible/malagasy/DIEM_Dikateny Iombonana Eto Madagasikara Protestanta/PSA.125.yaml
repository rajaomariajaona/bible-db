    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tendrombohitra no manodidina an’i Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO koa manodidina ny vahoakany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrizao ka ho mandrakizay
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsia, tsy haharitra amin’ny anjaran’olo-marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tehim-panjakàn’olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sao dia ny olo-marina indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hiroso hanao ny tsy rariny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hasoavy, TOMPO ô, ny tsara fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ireo olona mahitsy fo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa izay mivoana any amin’ny lala-miolikolika kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka horoahin’ny TOMPO miaraka amin’ny mpanao ratsy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiadanana anie
  - type: usfm
    marker: q1
    children:
    - type: text
