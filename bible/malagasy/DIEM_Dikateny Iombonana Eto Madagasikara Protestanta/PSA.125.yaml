  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay matoky ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'toy ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
