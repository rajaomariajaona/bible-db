document_id: PSA.125,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fiarovana hitan’izay matoky an’Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: 'Izay matoky ny TOMPO:'
  - type: text
    content: 'toy ny tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: tsy mihontsona fa mitombina mandrakizay.
  '2':
  - type: text
    content: Tendrombohitra no manodidina an’i Jerosalema;
  - type: text
    content: ny TOMPO koa manodidina ny vahoakany,
  - type: text
    content: hatrizao ka ho mandrakizay
  '3':
  - type: text
    content: Tsia, tsy haharitra amin’ny anjaran’olo-marina
  - type: text
    content: ny tehim-panjakàn’olon-dratsy,
  - type: text
    content: sao dia ny olo-marina indray
  - type: text
    content: no hiroso hanao ny tsy rariny.
  '4':
  - type: text
    content: Hasoavy, TOMPO ô, ny tsara fanahy
  - type: text
    content: mbamin’ireo olona mahitsy fo.
  '5':
  - type: text
    content: Fa izay mivoana any amin’ny lala-miolikolika kosa
  - type: text
    content: dia aoka horoahin’ny TOMPO miaraka amin’ny mpanao ratsy!
  - type: text
    content: Ny fiadanana anie
  - type: text
    content: ho amin’i Israely!
