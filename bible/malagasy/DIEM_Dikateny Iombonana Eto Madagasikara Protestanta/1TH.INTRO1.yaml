  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: I Tesalônika dia renivohitr’i Masedônia, faritany rômanina tany avaratra atsinanan’i Gresy. Fony i Paoly nitety tany fanindroany no nahatongavany tao amin’io tanàna io, taorian’ny nandaozany an’i Filipy. Nanorina Fiangonana tao izy; nefa fotoana fohy ihany no nitoerany tao, fa nanohitra azy mafy ireo Jiosy nonina tao. Tsy maintsy niala faingana tao Tesalônika izy, ka nankany Berea (Asa 17.1-10). Nony tany Kôrinto i Paoly tatỳ aoriana, dia namonjy azy tany i Timôty mpiara-dia taminy, ka nanao tatitra momba ny toe-javatra tany Tesalônika. Dia nanoratra ny taratasy voalohany ho an’ny Tesalônisianina i Paoly tamin’izay, ary tsy isalasalana fa avy ao Kôrinto no nanaovany izany. Ireo manam-pahaizana manokana, mahalala ny amin’ny fiainan’i Paoly sy ny asany, dia milaza amin’ny ankapobeny fa ity taratasy ity no lahatsoratra tranainy indrindra ao amin’ny Testamenta Vaovao na Fanekempihavanana Vaovao, ka voasoratra tokony ho tamin’ny taona 50 taor J.K.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nahafaly an’i Paoly ny vaovao azony avy any Tesalônika. Koa misaotra an’Andriamanitra izy satria manome ohatra tsara ho an’ireo Fiangonana hafa eran’ny faritany Masedônia ny Tesalônisianina; sady mampahatsiaro ny asa vitany tao amin-dry zareo i Paoly no milaza ny faniriany fatratra hahita azy indray (1.1–3.13). Ampirisihiny izy ireo, tsy hoe mba haharitra fotsiny, fa mba handroso koa amin’ny fiainana kristianina (4.1-12). Ary dia valiany koa ireo fanontanian’ny olona momba ny fitsanganan’ny maty ho velona sy ny fiavian’i Kristy amim-boninahitra (4.13–5.11). Hafatrafatra sy fanaovam-beloma no amaranany ny taratasiny (5.12-28).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ity taratasy ity dia manome fanazavana ho an’ireo rehetra mitebiteby amin’ny fiheverana ny andro farany. Ampahatsiaroviny ny mpino fa ny tena zavatra dia ny mijoro ankehitriny izao ho olona miaina araka ny mazava, ary momba ny ho avy kosa dia ny manana fanantenana mafy fa ho tonga ny fotoana (tsy mampaninona izay hoe rahoviana!) «hiarahany amin’ny Tompo mandrakizay» (4.17).
