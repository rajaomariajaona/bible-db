verses:
  '1':
  - type: heading
    content: SALAMO Fantatro fa lehibe ny Tompo
  - type: text
    content: ' '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  - type: text
    content: Miderà ny anaran’ny TOMPO ianareo.
  - type: text
    content: Miderà Azy ianareo mpanompony
  '10':
  - type: text
    content: Namely hafa firenena maro Izy
  - type: text
    content: sy nahafaty mpanjaka mahery,
  '11':
  - type: text
    content: 'dia i Sihôna mpanjakan’ny '
  - type: text
    content: Amôrita
  - type: text
    content: 'sy i Hôga mpanjakan’i '
  - type: text
    content: Basàna
  - type: note
    content: Nom 21.21-35.
  - type: text
    content: ','
  - type: text
    content: ary namely ny fanjakana rehetra
  - type: text
    content: izay manerana an’i Kanahàna.
  '12':
  - type: text
    content: Ny tanin’ireny nomeny ho lova,
  - type: text
    content: ho lovan’i Israely vahoakany.
  '13':
  - type: text
    content: TOMPO ô, maharitra mandrakizay ny lazanao;
  - type: text
    content: amin’ny taona rehetra ny fahatsiarovana Anao,
  '14':
  - type: text
    content: satria omenao rariny ny vahoakanao
  - type: text
    content: ary iantranao indray ny mpanomponao.
  '15':
  - type: text
    content: Ny sampin’ny hafa firenena
  - type: text
    content: dia volafotsy amam-bolamena;
  - type: text
    content: zavatra notefen’olombelona ireny.
  '16':
  - type: text
    content: Manam-bava fa tsy miteny;
  - type: text
    content: mana-maso fa tsy mahita;
  '17':
  - type: text
    content: manan-tsofina fa tsy mandre;
  - type: text
    content: tsy misy fofonaina akory ao am-bavany.
  '18':
  - type: text
    content: Ho tahaka azy anie izay nanao azy
  - type: text
    content: sy izay rehetra mitoky aminy
  - type: note
    content: 'And 15-18: jereo Sal 115.4-8; Apôk 9.20.'
  - type: text
    content: '!'
  '19':
  - type: text
    content: Ry fokon’i Israely ô, misaora ny TOMPO;
  - type: text
    content: 'ry taranak’i '
  - type: text
    content: Aharôna
  - type: note
    content: Jereo Sal 115.10 sy nta.
  - type: text
    content: ' ô, misaora ny TOMPO;'
  '2':
  - type: text
    content: izay mitoetra ao an-
  - type: text
    content: tranony
  - type: text
    content: ','
  - type: text
    content: ao an-kianjan’ny tranon’Andriamanitsika.
  '20':
  - type: text
    content: 'ry tariky ny '
  - type: text
    content: levita
  - type: text
    content: ' ô, misaora ny TOMPO;'
  - type: text
    content: ry mpanaja ny TOMPO ô, misaora ny TOMPO.
  '21':
  - type: text
    content: 'Hisaorana avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' anie ny TOMPO,'
  - type: text
    content: Izay monina ao Jerosalema! Haleloià!
  '3':
  - type: text
    content: Miderà ny TOMPO ianareo fa tsara Izy;
  - type: text
    content: mankalazà ny anarany fa mamy izany,
  '4':
  - type: text
    content: satria i Jakôba nofidîn’ny TOMPO ho Azy
  - type: text
    content: ary i Israely natokany ho fananany.
  '5':
  - type: text
    content: Eny, fantatro fa lehibe ny TOMPO;
  - type: text
    content: ary ekeko fa izany Tompontsika izany
  - type: text
    content: dia ambonin’ny andriamanitra rehetra.
  '6':
  - type: text
    content: Izay sitraky ny TOMPO, ataony avokoa
  - type: text
    content: na any an-danitra na etỳ an-tany,
  - type: text
    content: na any an-dranomasina
  - type: text
    content: sy any an-drano lalimbe.
  '7':
  - type: text
    content: Nampiakatra rahona avy any am-paran’ny tany Izy,
  - type: text
    content: ka nanao helatra narahin-dranonorana
  - type: text
    content: ary namoaka ny rivotra
  - type: text
    content: avy tamin’ny fitahirizany azy.
  '8':
  - type: text
    content: Namely ny lahimatoan’ny Ejiptianina Izy,
  - type: text
    content: hatramin’ny olombelona ka hatramin’ny biby
  - type: note
    content: Eks 12.29.
  - type: text
    content: .
  '9':
  - type: text
    content: Famantarana sy zava-mahagaga
  - type: text
    content: no nalefany teo anivonao, ry Ejipta,
  - type: text
    content: 'mba hanafaizana ny '
  - type: text
    content: Farao
  - type: text
    content: sy ireo mpanompony rehetra
  - type: note
    content: Eks 7.8–14.31.
  - type: text
    content: .
