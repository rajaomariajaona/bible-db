document_id: DEU.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famoizan-trosa isaky ny fito taona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaky ny fito taona dia hanao famoizan-trosa ianareo, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Omeo tokoa izy ary aoka tsy halahelo ny fonareo raha manome azy, satria izany fahalalahan-tananareo izany no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitahian
    - type: text
      text: '’ny TOMPO Andriamanitrareo anareo amin’ny asa aman-draharaha rehetra ataonareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa satria hisy mandrakariva ny mahantra eo amin’ny taninareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 26.11; Mk 14.7; Jôh 12.8.
      marker-yv: yv-n
    - type: text
      text: ', dia izany no andidiako anareo hoe: Sokafy tsara amin’ny mpiray firenena aminareo ny tananareo, dia amin’ny ory sy mahantra eo amin’ny taninareo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famotsorana ireo mpanompo
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha sendra misy mitolo-tena ho mpanomponareo ny lehilahy na vehivavy hebreo mpiray firenena aminareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mitolo-tena '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: atolotra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', dia hanompo anareo enin-taona izy; amin’ny taona fahafito kosa hovotsoranareo ho afaka izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hovotsoranareo ho afaka izy, dia tsy havelanareo handeha fotsiny; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hisy hampitondrainareo azy avy amin’ny ondry aman’osinareo ary avy amin’ny vary aman-divainareo: izay efa nitahian’ny TOMPO Andriamanitrareo anareo no hanomezanareo azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsarovy fa nandevozina tany Ejipta ianareo, saingy efa nanafaka anareo ilay TOMPO Andriamanitrareo; koa izany no anomezako anareo anio izao didy izao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mety milaza aminareo io mpanomponareo io fa tsy hiala aminareo, satria tiany ianareo mianakavy ka finaritra izy miaraka aminareo; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: amin’izay, dia alaovy ny fitevika ka teveho amin’ny varavarana ny sofiny; dia ho mpanomponareo mandra-maty izy. Toy izany koa no hataonareo raha misy mpanompovavy tsy te hiala aminareo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy ho mafy aminareo ny hamotsotra ny mpanomponareo ho afaka, satria nahazoanareo avo sasaka mihoatra noho izay vitan’ny mpikarama ny nanompoany anareo enin-taona. Eny, votsory izy, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hotahîn
    - type: text
      text: ’ny TOMPO Andriamanitrareo ianareo amin’izay rehetra ataonareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 12-18:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lev 25.39-46.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voalohan-teraky ny biby fiompy
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lahy rehetra amin’ny voalohan-teraky ny ombinareo sy ny ondry aman’osinareo dia hatokanareo ho an’ny TOMPO Andriamanitrareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 13.12.
      marker-yv: yv-n
    - type: text
      text: '; aza mampiasa ny voalohan-teraky ny ombinareo, na manety ny voalohan-teraky ny ondry aman’osinareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka izao no fomba hampiharana izany: ianareo tompon-trosa rehetra, izay nampisambo-bola ny namany, dia hamoy izany, rehefa natao antso avo ny taona famoizan-trosa ho fanajana ny TOMPO; tsy hoterenareo hamerin-trosa ilay namana mpiray tanindrazana aminareo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isan-taona isan-taona dia eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin
    - type: text
      text: ’ny TOMPO Andriamanitrareo, ao amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo, no hihinananareo izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 14.23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy kilemany kosa ny voalohan-teraky ny biby fiompinareo fa mandringa na jamba na voan’ny kilema ratsy hafa, dia aza atolotra ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' ho an’ny TOMPO Andriamanitrareo ireny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao an-tanànanareo ihany no hihinananareo ireny; ka samy mahazo mihinana azy na ny olona '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' ara-pivavahana na ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ', tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saingy ny rany no aza haninareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 12.16; Gen 9.4; Lev 7.26-27; 17.10-14.
      marker-yv: yv-n
    - type: text
      text: ' fa araraho amin’ny tany toy ny rano.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona hafa firenena ihany no azonareo terena hamerin-trosa; fa izay trosanareo amin’ny mpiray firenena aminareo kosa dia hafoinareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tsy hisy mahantra eo aminareo, satria hotahîn’ny TOMPO tokoa ianareo, any amin’ny tany izay homen’ny TOMPO Andriamanitrareo ho fanananareo, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha henoinareo tsara ny feony ka imasoanareo hotanterahina manontolo izao didy ampitaiko aminareo anio izao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, hotahîn’ny TOMPO Andriamanitrareo ianareo, araka izay nampanantenainy anareo; ka ianareo tsy mba hisy hisambo-bola fa firenena maro kosa no hampisamborinareo vola; firenena maro no hofehezinareo, fa ianareo kosa tsy mba hofeheziny.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha sendra misy mahantra ny mpiray firenena aminareo ao an-tanàna anankiray amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo, dia aza anidianareo fo izy na anakombonanareo tanana; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa sokafy tsara amin’io mahantra mpiray firenena aminareo io ny tananareo, ka ampisambory azy ny sahaza ilainy, araka izay mahory azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.8 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 7-8:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lev 25.35.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandremo fandrao mitsiry ao am-ponareo ny hevi-dratsy manao hoe: «Antomotra ity ny taona fahafito, dia ny taona famoizan-trosa.» Aoka ianareo tsy ho ratsy fijery an’ilay mahantra mpiray firenena aminareo, ka tsy hanome azy na inona na inona; fa hitaraina amin’ny TOMPO hiampanga anareo izy, ka dia ho fahotanareo izany. '
