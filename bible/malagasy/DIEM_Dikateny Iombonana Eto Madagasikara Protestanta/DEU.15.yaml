document_id: DEU.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Famoizan-trosa isaky ny fito taona
  - type: text
    content: 'Isaky ny fito taona dia hanao famoizan-trosa ianareo, '
  '10':
  - type: text
    content: 'Omeo tokoa izy ary aoka tsy halahelo ny fonareo raha manome azy, satria izany fahalalahan-tananareo izany no '
  - type: text
    content: hitahian
  - type: text
    content: '’ny TOMPO Andriamanitrareo anareo amin’ny asa aman-draharaha rehetra ataonareo. '
  '11':
  - type: text
    content: Koa satria hisy mandrakariva ny mahantra eo amin’ny taninareo
  - type: note
    content: Jereo Mt 26.11; Mk 14.7; Jôh 12.8.
  - type: text
    content: ', dia izany no andidiako anareo hoe: Sokafy tsara amin’ny mpiray firenena aminareo ny tananareo, dia amin’ny ory sy mahantra eo amin’ny taninareo.'
  - type: heading
    content: Ny famotsorana ireo mpanompo
  '12':
  - type: text
    content: Raha sendra misy mitolo-tena ho mpanomponareo ny lehilahy na vehivavy hebreo mpiray firenena aminareo
  - type: note
    content: mitolo-tena na hoe atolotra.
  - type: text
    content: ', dia hanompo anareo enin-taona izy; amin’ny taona fahafito kosa hovotsoranareo ho afaka izy. '
  '13':
  - type: text
    content: 'Rehefa hovotsoranareo ho afaka izy, dia tsy havelanareo handeha fotsiny; '
  '14':
  - type: text
    content: 'fa hisy hampitondrainareo azy avy amin’ny ondry aman’osinareo ary avy amin’ny vary aman-divainareo: izay efa nitahian’ny TOMPO Andriamanitrareo anareo no hanomezanareo azy. '
  '15':
  - type: text
    content: Tsarovy fa nandevozina tany Ejipta ianareo, saingy efa nanafaka anareo ilay TOMPO Andriamanitrareo; koa izany no anomezako anareo anio izao didy izao.
  '16':
  - type: text
    content: 'Kanefa mety milaza aminareo io mpanomponareo io fa tsy hiala aminareo, satria tiany ianareo mianakavy ka finaritra izy miaraka aminareo; '
  '17':
  - type: text
    content: amin’izay, dia alaovy ny fitevika ka teveho amin’ny varavarana ny sofiny; dia ho mpanomponareo mandra-maty izy. Toy izany koa no hataonareo raha misy mpanompovavy tsy te hiala aminareo.
  '18':
  - type: text
    content: 'Aoka tsy ho mafy aminareo ny hamotsotra ny mpanomponareo ho afaka, satria nahazoanareo avo sasaka mihoatra noho izay vitan’ny mpikarama ny nanompoany anareo enin-taona. Eny, votsory izy, dia '
  - type: text
    content: hotahîn
  - type: text
    content: ’ny TOMPO Andriamanitrareo ianareo amin’izay rehetra ataonareo
  - type: note
    content: 'And 12-18: jereo Lev 25.39-46.'
  - type: text
    content: .
  - type: heading
    content: Ny voalohan-teraky ny biby fiompy
  '19':
  - type: text
    content: Ny lahy rehetra amin’ny voalohan-teraky ny ombinareo sy ny ondry aman’osinareo dia hatokanareo ho an’ny TOMPO Andriamanitrareo
  - type: note
    content: Jereo Eks 13.12.
  - type: text
    content: '; aza mampiasa ny voalohan-teraky ny ombinareo, na manety ny voalohan-teraky ny ondry aman’osinareo. '
  '2':
  - type: text
    content: 'ka izao no fomba hampiharana izany: ianareo tompon-trosa rehetra, izay nampisambo-bola ny namany, dia hamoy izany, rehefa natao antso avo ny taona famoizan-trosa ho fanajana ny TOMPO; tsy hoterenareo hamerin-trosa ilay namana mpiray tanindrazana aminareo. '
  '20':
  - type: text
    content: 'Isan-taona isan-taona dia eo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: ’ny TOMPO Andriamanitrareo, ao amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo, no hihinananareo izany
  - type: note
    content: Jereo Eks 14.23.
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Raha misy kilemany kosa ny voalohan-teraky ny biby fiompinareo fa mandringa na jamba na voan’ny kilema ratsy hafa, dia aza atolotra ho '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’ny TOMPO Andriamanitrareo ireny. '
  '22':
  - type: text
    content: 'Ao an-tanànanareo ihany no hihinananareo ireny; ka samy mahazo mihinana azy na ny olona '
  - type: text
    content: maloto
  - type: text
    content: ' ara-pivavahana na ny '
  - type: text
    content: madio
  - type: text
    content: ', tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  '23':
  - type: text
    content: Saingy ny rany no aza haninareo
  - type: note
    content: Jereo 12.16; Gen 9.4; Lev 7.26-27; 17.10-14.
  - type: text
    content: ' fa araraho amin’ny tany toy ny rano.'
  '3':
  - type: text
    content: 'Ny olona hafa firenena ihany no azonareo terena hamerin-trosa; fa izay trosanareo amin’ny mpiray firenena aminareo kosa dia hafoinareo. '
  '4':
  - type: text
    content: 'Kanefa tsy hisy mahantra eo aminareo, satria hotahîn’ny TOMPO tokoa ianareo, any amin’ny tany izay homen’ny TOMPO Andriamanitrareo ho fanananareo, '
  '5':
  - type: text
    content: 'raha henoinareo tsara ny feony ka imasoanareo hotanterahina manontolo izao didy ampitaiko aminareo anio izao. '
  '6':
  - type: text
    content: Eny, hotahîn’ny TOMPO Andriamanitrareo ianareo, araka izay nampanantenainy anareo; ka ianareo tsy mba hisy hisambo-bola fa firenena maro kosa no hampisamborinareo vola; firenena maro no hofehezinareo, fa ianareo kosa tsy mba hofeheziny.
  '7':
  - type: text
    content: 'Raha sendra misy mahantra ny mpiray firenena aminareo ao an-tanàna anankiray amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo, dia aza anidianareo fo izy na anakombonanareo tanana; '
  '8':
  - type: text
    content: fa sokafy tsara amin’io mahantra mpiray firenena aminareo io ny tananareo, ka ampisambory azy ny sahaza ilainy, araka izay mahory azy
  - type: note
    content: 'And 7-8: jereo Lev 25.35.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Tandremo fandrao mitsiry ao am-ponareo ny hevi-dratsy manao hoe: «Antomotra ity ny taona fahafito, dia ny taona famoizan-trosa.» Aoka ianareo tsy ho ratsy fijery an’ilay mahantra mpiray firenena aminareo, ka tsy hanome azy na inona na inona; fa hitaraina amin’ny TOMPO hiampanga anareo izy, ka dia ho fahotanareo izany. '
