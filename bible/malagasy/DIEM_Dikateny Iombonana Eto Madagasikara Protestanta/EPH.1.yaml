document_id: EPH.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy amiko Paoly ity taratasy ity, dia izaho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôlin’i Kristy
  - type: text
    text: ' Jesoa noho ny sitrapon’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mamangy anareo atỳ Efeso
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: atỳ Efeso.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Momba ny nitoeran’i Paoly tao Efeso, jereo Asa 18.19-21; 19.1-40.'
    marker-yv: yv-n
  - type: text
    text: ' aho, dia ianareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' sady mpino tafaray amin’i Kristy Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitahian’Andriamanitra antsika ao amin’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hankalazaina anie ilay Andriamanitra sady Rain’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika! Fa nitahy antsika Andriamanitra tamin’ny fitahiana rehetra araka ny Fanahy Masina ka nataony miray amin’i Kristy isika sady tonga mponina any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy mbola nahary ny tontolo Izy, dia efa nifidy antsika hiray amin’i Kristy; ka ho masina sady tsy hisy tsiny eo anatrehan’Andriamanitra isika. Noho ny fitiavany antsika, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia natokan’Andriamanitra isika mba ho Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'eo anatrehan’Andriamanitra. Noho ny fitiavany antsika, dia natokan’Andriamanitra isika mba ho Azy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eo anatrehany isika no ho tia Azy. Eny, nanokana antsika Andriamanitra mba ho Azy.
    marker-yv: yv-n
  - type: text
    text: ', mba ho tonga zanany amin’ny alalan’i Jesoa Kristy, fa izany no safidin’ny sitrapony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hiderantsika an’Andriamanitra anie ny fahasoavana mamirapiratra izay nomeny antsika maimaimpoana ao amin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ' malalany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny ra nafoin-Janany no nahazoantsika ny fanavotana, dia ny famelana ny hadisoantsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Kôl 1.14.
    marker-yv: yv-n
  - type: text
    text: '. Izany no nanehoan’Andriamanitra ny harem-pahasoavany, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'izay natosany be dia be tamintsika ka nahazoantsika fahendrena amam-pahalalana feno. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nampahafantarin’Andriamanitra antsika ilay tsiambaratelon’ny sitrapony, araka ny safidy noheveriny hotontosaina ao amin’ny Zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eny, hotanterahiny mandra-pahatongan’ny fotoanandro farany izany tsiambaratelo izany: dia ny hampivondrona ny zavatra rehetra, ny any an-danitra sy ny eto an-tany, ao amin’i Kristy Filoha tokana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tafaray amin’i Kristy izahay ka tonga anjara lovan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe izahay Jiosy tonga kristianina; jereo koa 2.3. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tonga anjara lovan’Andriamanitra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nandray ny anjara lovanay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ahatsiarovana ny nizarazaran’ny vahoaka Israely ny tany nampanantenaina, izay samy nananany anjara avy, jereo Jos 13–19).'
    marker-yv: yv-n
  - type: text
    text: '; satria natokany rahateo izahay, fa izany no fandaharan’Ilay manao ny zavatra rehetra araka izay efa nokasain’ny sitrapony. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hideranay an’Andriamanitra be voninahitra anie izany, satria izahay no nanantena voalohany an’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tafaray amin’i Kristy koa ianareo, satria efa renareo ilay hafatra marim-pototra, izany hoe ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' izay nitondra ny famonjena taminareo, ary efa ninoanareo i Kristy. Ka dia nasiana tombokase maha fananan’Andriamanitra ianareo, tamin’ny nanomezana anareo ny Fanahy Masina Izay nampanantenaina. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Io Fanahy Masina io no antoka hahazoantsika ny lova natokan’Andriamanitra ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakany
  - type: text
    text: ', mba hahatanteraka ny fanavotana ireo olona natao mba ho fananan’Andriamanitra, hiderantsika ny voninahitr’Andriamanitra izany!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka nataon’i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Noho izany, rehefa nandre ny finoanareo an’i Jesoa Tompo sy ny fitiavanareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' rehetra aho, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia tsy mitsahatra misaotra an’Andriamanitra noho ny aminareo. Mahatsiaro anareo aho amin’ny fivavahako '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka mangataka amin’ilay Andriamanitr’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika, dia amin’ilay Ray be voninahitra, mba hanomezany anareo ny Fanahy Masina Izay mampahendry anareo sy manambara an’Andriamanitra aminareo ka hahalalanareo Azy tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mangataka aho ny hanokafan’Andriamanitra ny sainareo handray ny fahazavàny: mba hahafantaranareo ny fanantenana niantsoan’Andriamanitra anareo; sy hahafantaranareo ny haren’ny voninahiny ary ny lova izay natokany ho an’ny vahoakany; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary hahafantaranareo ny hery lehibe sy mihoa-pampana tokoa izay anasoavany antsika mpino, araka ny fiàsany tsy hay tohaina sy mahery vaika. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izany hery izany dia nampiasain’Andriamanitra tamin’ny nananganany an’i Kristy ho velona avy tany amin’ny maty ary tamin’ny nampipetrahany Azy eo ankavanany any an-danitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 110.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Any i Kristy dia ambony lavitra noho ny fanapahana sy fahefana ary hery sy fanjakana rehetra eny ana habakabaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Kôl 1.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; any Izy ambony lavitra noho ny anaram-boninahitra rehetra azo tononina tsy amin’izao fiainana izao ihany fa amin’ny ho avy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa napetrak’Andriamanitra eo ambany tongotr’i Kristy ny zavatra rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 8.7.
    marker-yv: yv-n
  - type: text
    text: '; ary i Kristy dia nomen’Andriamanitra ny Fiangonana ho Filoha faratampony. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny Fiangonana no tenan’i Kristy sady heniky ny hafenoana omen’i Kristy Izay manerana ny zavatra rehetra hatraiza hatraiza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izay manerana ny zavatra rehetra hatraiza hatraiza: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Izay henika an’Andriamanitra tanteraka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit Kôl 1.19) na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Izay mameno ny zavatra rehetra ao amin’ny olona rehetra.
    marker-yv: yv-n
  - type: text
    text: .
