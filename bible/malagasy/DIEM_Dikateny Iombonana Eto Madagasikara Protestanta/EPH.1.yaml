document_id: EPH.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho '
  - type: text
    content: apôstôlin’i Kristy
  - type: text
    content: ' Jesoa noho ny sitrapon’Andriamanitra.'
  - type: text
    content: Mamangy anareo atỳ Efeso
  - type: note
    content: Misy stf sasany ahitana ny hoe atỳ Efeso. Momba ny nitoeran’i Paoly tao Efeso, jereo Asa 18.19-21; 19.1-40.
  - type: text
    content: ' aho, dia ianareo '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' sady mpino tafaray amin’i Kristy Jesoa. '
  '10':
  - type: text
    content: 'Eny, hotanterahiny mandra-pahatongan’ny fotoanandro farany izany tsiambaratelo izany: dia ny hampivondrona ny zavatra rehetra, ny any an-danitra sy ny eto an-tany, ao amin’i Kristy Filoha tokana.'
  '11':
  - type: text
    content: Tafaray amin’i Kristy izahay ka tonga anjara lovan’Andriamanitra
  - type: note
    content: 'izahay: izany hoe izahay Jiosy tonga kristianina; jereo koa 2.3. –tonga anjara lovan’Andriamanitra: dkt hafa nandray ny anjara lovanay (ahatsiarovana ny nizarazaran’ny vahoaka Israely ny tany nampanantenaina, izay samy nananany anjara avy, jereo Jos 13–19).'
  - type: text
    content: '; satria natokany rahateo izahay, fa izany no fandaharan’Ilay manao ny zavatra rehetra araka izay efa nokasain’ny sitrapony. '
  '12':
  - type: text
    content: Hideranay an’Andriamanitra be voninahitra anie izany, satria izahay no nanantena voalohany an’i Kristy.
  '13':
  - type: text
    content: 'Tafaray amin’i Kristy koa ianareo, satria efa renareo ilay hafatra marim-pototra, izany hoe ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' izay nitondra ny famonjena taminareo, ary efa ninoanareo i Kristy. Ka dia nasiana tombokase maha fananan’Andriamanitra ianareo, tamin’ny nanomezana anareo ny Fanahy Masina Izay nampanantenaina. '
  '14':
  - type: text
    content: 'Io Fanahy Masina io no antoka hahazoantsika ny lova natokan’Andriamanitra ho an’ny '
  - type: text
    content: vahoakany
  - type: text
    content: ', mba hahatanteraka ny fanavotana ireo olona natao mba ho fananan’Andriamanitra, hiderantsika ny voninahitr’Andriamanitra izany!'
  - type: heading
    content: Vavaka nataon’i Paoly
  '15':
  - type: text
    content: 'Noho izany, rehefa nandre ny finoanareo an’i Jesoa Tompo sy ny fitiavanareo ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra aho, '
  '16':
  - type: text
    content: 'dia tsy mitsahatra misaotra an’Andriamanitra noho ny aminareo. Mahatsiaro anareo aho amin’ny fivavahako '
  '17':
  - type: text
    content: 'ka mangataka amin’ilay Andriamanitr’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika, dia amin’ilay Ray be voninahitra, mba hanomezany anareo ny Fanahy Masina Izay mampahendry anareo sy manambara an’Andriamanitra aminareo ka hahalalanareo Azy tokoa. '
  '18':
  - type: text
    content: 'Mangataka aho ny hanokafan’Andriamanitra ny sainareo handray ny fahazavàny: mba hahafantaranareo ny fanantenana niantsoan’Andriamanitra anareo; sy hahafantaranareo ny haren’ny voninahiny ary ny lova izay natokany ho an’ny vahoakany; '
  '19':
  - type: text
    content: 'ary hahafantaranareo ny hery lehibe sy mihoa-pampana tokoa izay anasoavany antsika mpino, araka ny fiàsany tsy hay tohaina sy mahery vaika. '
  '2':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
  - type: heading
    content: Ny fitahian’Andriamanitra antsika ao amin’i Kristy
  '20':
  - type: text
    content: Izany hery izany dia nampiasain’Andriamanitra tamin’ny nananganany an’i Kristy ho velona avy tany amin’ny maty ary tamin’ny nampipetrahany Azy eo ankavanany any an-danitra
  - type: note
    content: Jereo Sal 110.1.
  - type: text
    content: '. '
  '21':
  - type: text
    content: Any i Kristy dia ambony lavitra noho ny fanapahana sy fahefana ary hery sy fanjakana rehetra eny ana habakabaka
  - type: note
    content: Jereo Kôl 1.16 sy nta.
  - type: text
    content: '; any Izy ambony lavitra noho ny anaram-boninahitra rehetra azo tononina tsy amin’izao fiainana izao ihany fa amin’ny ho avy koa. '
  '22':
  - type: text
    content: Fa napetrak’Andriamanitra eo ambany tongotr’i Kristy ny zavatra rehetra
  - type: note
    content: Jereo Sal 8.7.
  - type: text
    content: '; ary i Kristy dia nomen’Andriamanitra ny Fiangonana ho Filoha faratampony. '
  '23':
  - type: text
    content: Ny Fiangonana no tenan’i Kristy sady heniky ny hafenoana omen’i Kristy Izay manerana ny zavatra rehetra hatraiza hatraiza
  - type: note
    content: 'Izay manerana ny zavatra rehetra hatraiza hatraiza: dkt hafa Izay henika an’Andriamanitra tanteraka (ampit Kôl 1.19) na Izay mameno ny zavatra rehetra ao amin’ny olona rehetra.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Hankalazaina anie ilay Andriamanitra sady Rain’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika! Fa nitahy antsika Andriamanitra tamin’ny fitahiana rehetra araka ny Fanahy Masina ka nataony miray amin’i Kristy isika sady tonga mponina any an-danitra. '
  '4':
  - type: text
    content: 'Tsy mbola nahary ny tontolo Izy, dia efa nifidy antsika hiray amin’i Kristy; ka ho masina sady tsy hisy tsiny eo anatrehan’Andriamanitra isika. Noho ny fitiavany antsika, '
  '5':
  - type: text
    content: dia natokan’Andriamanitra isika mba ho Azy
  - type: note
    content: 'eo anatrehan’Andriamanitra. Noho ny fitiavany antsika, dia natokan’Andriamanitra isika mba ho Azy: dkt hafa eo anatrehany isika no ho tia Azy. Eny, nanokana antsika Andriamanitra mba ho Azy.'
  - type: text
    content: ', mba ho tonga zanany amin’ny alalan’i Jesoa Kristy, fa izany no safidin’ny sitrapony. '
  '6':
  - type: text
    content: 'Hiderantsika an’Andriamanitra anie ny fahasoavana mamirapiratra izay nomeny antsika maimaimpoana ao amin’ilay '
  - type: text
    content: Zanany
  - type: text
    content: ' malalany.'
  '7':
  - type: text
    content: Ny ra nafoin-Janany no nahazoantsika ny fanavotana, dia ny famelana ny hadisoantsika
  - type: note
    content: Ampit Kôl 1.14.
  - type: text
    content: '. Izany no nanehoan’Andriamanitra ny harem-pahasoavany, '
  '8':
  - type: text
    content: 'izay natosany be dia be tamintsika ka nahazoantsika fahendrena amam-pahalalana feno. '
  '9':
  - type: text
    content: 'Dia nampahafantarin’Andriamanitra antsika ilay tsiambaratelon’ny sitrapony, araka ny safidy noheveriny hotontosaina ao amin’ny Zanany. '
