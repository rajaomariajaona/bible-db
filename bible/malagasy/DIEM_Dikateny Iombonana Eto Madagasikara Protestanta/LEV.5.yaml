segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: f. Ohatra vitsivitsy momba ny ota vitan’ny olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: «Raha misy olona mandre ny antso avo ataon’ny fampanoavana ho an’ireo vavolombelona ka ny tenany dia vavolombelona nahita na nahalala nefa tsy manambara, dia manota izy ary itambesaran’ny heloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ohab 29.24.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Raha misy olona mahakasika tsy nahy zavatra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ', toy ny fatim-biby maloto rehetra na bibidia na biby fiompy na biby mandady, dia manjary voaloto izy ary meloka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 11.24-40.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: «Raha misy olona mahakasika tsy nahy olona maloto na inona na inona fahalotoana, ka mahafantatra izy avy eo, dia manjary meloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 12–15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Raha misy olona manao vava latsaka mianiana hanao ratsy na hanao soa, na inona na inona vava latsaka nombàny fianianana, ka mahafantatra izy avy eo, dia manjary meloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 15.4; Nom 30.2-9. –Amin’ny faran’ity and ity, ny rijan-teny hebreo dia manampy teny anankiroa nindramina tamin’ny and manaraka.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Izay olona meloka tamin’ny anankiray amin’ireo karazan-javatra ireo, dia aoka izy hiaiky ampahibemaso ny zavatra nanotany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hitondra fanonerana amin’ny TOMPO izy noho ny ota vitany, dia ondrivavy na osivavy mba ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanalana ny ota; dia hataon’ny mpisorona amin’ilay olona ny fombam-pivavahana famelana, noho ny ota vitany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: g. Ny sorona sy fanatitra sahaza ny mahantra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Raha tsy takatry ny fananan’ny olona kosa ny ondrivavy na osivavy iray, dia domohina roa na voromahailala roa no hoentiny amin’ny TOMPO ho fanonerana ny ota vitany ka ny anankiray ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanalana ny ota, ary ny anankiray kosa ho sorona dorana manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoentin’ilay olona ireo vorona ireo ho eo amin’ny mpisorona. Ka ny hatolotry ny mpisorona aloha dia ilay sorona fanalana ny ota: hofolahiny amin’ny hoho ny lohany, eo akaikin’ny hatony, saingy tsy hataony tangarana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'hamafazany eo amin’ny rindrin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ny ran’ilay vorona, ary ny ra sisa dia hofiaziny eo am-pototr’io alitara io ihany: sorona fanalana ny ota izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny vorona anankiray kosa dia sorona dorana manontolo araka ny fomba fanao; ary rehefa nataon’ny mpisorona tamin’ilay olona ny fombam-pivavahana famelana, dia voavela ny otany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Raha tsy takatry ny fananan’ny olona indray ny domohina na voromahailala roa, dia koba lafarinina tsara, milanja telo kilao, no hoentiny ho fanatitra fanalana ny ota; tsy handrarahany menaka sady tsy hasiany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovoka zava-manitra
  - type: text
    text: ' izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2.1.
    marker-yv: yv-n
  - type: text
    text: ', satria fanatitra fanalana ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hoentin’ilay olona izany koba izany ho eo amin’ny mpisorona ka handraofan’ny mpisorona eran-tanana ila mba ho fanati-pahatsiarovana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; dia hodorany hanetona eo amin’ny alitara io fanati-pahatsiarovana io, miaraka amin’ny sorona levonina amin’ny afo ho an’ny TOMPO: fanatitra fanalana ny ota izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary rehefa nataon’ny mpisorona tamin’ilay olona ny fombam-pivavahana famelana noho ny ota vitany momba ny anankiray amin’ireo lafin-javatra ireo, dia voavela ny otany.
- type: usfm
  marker: p
  children:
  - type: text
    text: «Araka ny fanao amin’ny fanatitra vokatry ny tany no hataon’ny mpisorona amin’izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Araka...mpisorona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa, araka ny dkt grika tranainy Septoazinta. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ny sisa dia ho anjaran’ny mpisorona, toy ny amin’ny fanatitra
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sorom-panonerana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Raha misy olona manao fanazimbana ny zavatra voatokana ho an’ny TOMPO ka manota tsy nahy momba izany, dia hitondra sorom-panonerana amin’ny TOMPO izy, dia ondrilahy tsy misy kilema, tombanana sekela volafotsy vitsivitsy araka ny sekela fampiasa ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: 'Toeramasina:'
  - type: text
    text: ' sorom-panonerana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny zavatra namonoany antoka ny Toeramasina dia honerany sady hampiany ny ampahadimin-tombany, ka homeny ny mpisorona. Ary rehefa voatolotry ny mpisorona ilay ondrilahy sorom-panonerana ka nataony tamin’ilay olona ny fombam-pivavahana famelana, dia voavela ny otany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Raha misy olona manota satria manao tsy nahy ny anankiray amin’ny zavatra noraran’ny TOMPO, dia manjary manan-tsiny izy sady itambesaran’ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ondrilahy, tsy misy kilema, avy amin’ny andian’ondriny sady tombanana araka ny maha sorom-panonerana azy, no hoentiny ho eo amin’ny mpisorona. Ary rehefa nataon’ny mpisorona tamin’ilay olona ny fombam-pivavahana famelana noho ny ota tsy tandrina sady tsy nahy nahavoa azy, dia voavela ny otany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Sorom-panonerana izany, satria meloka tamin’ny TOMPO tokoa izy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia niteny tamin’i Mosesy ny TOMPO nanao hoe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasantsasany, ny and 5.20-26 dia voalahatra ho 6.1-7.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Mety misy olona manota ka diso tamin’ny TOMPO satria mandainga amin’ny namany momba ny zavatra nampitahirizina azy, na zavatra nindraminy, na zavatra nangalariny, na zavatra nalainy an-keriny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'na zava-bery hitany, na koa manao fianianana tsy marina momba izay mety ho fahotana fanaon’ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Noho izy nanota ka meloka, dia haveriny ny zavatra nangalariny na nalainy an-keriny, na nampitahirizany azy, na zava-bery hitany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'na izay rehetra nanaovany fianianana tsy marina. Haveriny manontolo izany sady hampiany ny ampahadimin-tombany, ka homeny an’ilay tompon-javatra, vantany vao tsapany fa meloka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ho sorom-panonerana amin’ny TOMPO, dia ondrilahy no hoentiny ho eo amin’ny mpisorona: ondrilahy tsy misy kilema, avy amin’ny andian’ondriny sady tombanana araka ny maha sorom-panonerana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary rehefa nataon’ny mpisorona teo anoloan’ny Toeramasin’ny TOMPO kosa ny fombam-pivavahana famelana, dia voavela ny otan’ilay olona na inona na inona hadisoana vitany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 20-26:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 5.5-8.
    marker-yv: yv-n
  - type: text
    text: .»
