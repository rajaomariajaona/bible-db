document_id: LEV.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: f. Ohatra vitsivitsy momba ny ota vitan’ny olona
  - type: text
    content: «Raha misy olona mandre ny antso avo ataon’ny fampanoavana ho an’ireo vavolombelona ka ny tenany dia vavolombelona nahita na nahalala nefa tsy manambara, dia manota izy ary itambesaran’ny heloka
  - type: note
    content: Ampit Ohab 29.24.
  - type: text
    content: .
  '10':
  - type: text
    content: Ny vorona anankiray kosa dia sorona dorana manontolo araka ny fomba fanao; ary rehefa nataon’ny mpisorona tamin’ilay olona ny fombam-pivavahana famelana, dia voavela ny otany.
  '11':
  - type: text
    content: '«Raha tsy takatry ny fananan’ny olona indray ny domohina na voromahailala roa, dia koba lafarinina tsara, milanja telo kilao, no hoentiny ho fanatitra fanalana ny ota; tsy handrarahany menaka sady tsy hasiany '
  - type: text
    content: vovoka zava-manitra
  - type: text
    content: ' izany'
  - type: note
    content: Ampit 2.1.
  - type: text
    content: ', satria fanatitra fanalana ny ota. '
  '12':
  - type: text
    content: Hoentin’ilay olona izany koba izany ho eo amin’ny mpisorona ka handraofan’ny mpisorona eran-tanana ila mba ho fanati-pahatsiarovana
  - type: note
    content: Jereo 2.2 sy nta.
  - type: text
    content: '; dia hodorany hanetona eo amin’ny alitara io fanati-pahatsiarovana io, miaraka amin’ny sorona levonina amin’ny afo ho an’ny TOMPO: fanatitra fanalana ny ota izany. '
  '13':
  - type: text
    content: Ary rehefa nataon’ny mpisorona tamin’ilay olona ny fombam-pivavahana famelana noho ny ota vitany momba ny anankiray amin’ireo lafin-javatra ireo, dia voavela ny otany.
  - type: text
    content: «Araka ny fanao amin’ny fanatitra vokatry ny tany no hataon’ny mpisorona amin’izany
  - type: note
    content: 'Araka...mpisorona: dkt hafa, araka ny dkt grika tranainy Septoazinta. Ny sisa dia ho anjaran’ny mpisorona, toy ny amin’ny fanatitra.'
  - type: text
    content: .»
  - type: heading
    content: Ny sorom-panonerana
  '14':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '15':
  - type: text
    content: '«Raha misy olona manao fanazimbana ny zavatra voatokana ho an’ny TOMPO ka manota tsy nahy momba izany, dia hitondra sorom-panonerana amin’ny TOMPO izy, dia ondrilahy tsy misy kilema, tombanana sekela volafotsy vitsivitsy araka ny sekela fampiasa ao amin’ny '
  - type: text
    content: 'Toeramasina:'
  - type: text
    content: ' sorom-panonerana izany. '
  '16':
  - type: text
    content: Ny zavatra namonoany antoka ny Toeramasina dia honerany sady hampiany ny ampahadimin-tombany, ka homeny ny mpisorona. Ary rehefa voatolotry ny mpisorona ilay ondrilahy sorom-panonerana ka nataony tamin’ilay olona ny fombam-pivavahana famelana, dia voavela ny otany.
  '17':
  - type: text
    content: '«Raha misy olona manota satria manao tsy nahy ny anankiray amin’ny zavatra noraran’ny TOMPO, dia manjary manan-tsiny izy sady itambesaran’ota. '
  '18':
  - type: text
    content: 'Ondrilahy, tsy misy kilema, avy amin’ny andian’ondriny sady tombanana araka ny maha sorom-panonerana azy, no hoentiny ho eo amin’ny mpisorona. Ary rehefa nataon’ny mpisorona tamin’ilay olona ny fombam-pivavahana famelana noho ny ota tsy tandrina sady tsy nahy nahavoa azy, dia voavela ny otany. '
  '19':
  - type: text
    content: Sorom-panonerana izany, satria meloka tamin’ny TOMPO tokoa izy.»
  '2':
  - type: text
    content: '«Raha misy olona mahakasika tsy nahy zavatra '
  - type: text
    content: maloto
  - type: text
    content: ', toy ny fatim-biby maloto rehetra na bibidia na biby fiompy na biby mandady, dia manjary voaloto izy ary meloka'
  - type: note
    content: Jereo 11.24-40.
  - type: text
    content: .
  '20':
  - type: text
    content: Dia niteny tamin’i Mosesy ny TOMPO nanao hoe
  - type: note
    content: Amin’ny dkt sasantsasany, ny and 5.20-26 dia voalahatra ho 6.1-7.
  - type: text
    content: ':'
  '21':
  - type: text
    content: '«Mety misy olona manota ka diso tamin’ny TOMPO satria mandainga amin’ny namany momba ny zavatra nampitahirizina azy, na zavatra nindraminy, na zavatra nangalariny, na zavatra nalainy an-keriny, '
  '22':
  - type: text
    content: 'na zava-bery hitany, na koa manao fianianana tsy marina momba izay mety ho fahotana fanaon’ny olona. '
  '23':
  - type: text
    content: 'Noho izy nanota ka meloka, dia haveriny ny zavatra nangalariny na nalainy an-keriny, na nampitahirizany azy, na zava-bery hitany, '
  '24':
  - type: text
    content: 'na izay rehetra nanaovany fianianana tsy marina. Haveriny manontolo izany sady hampiany ny ampahadimin-tombany, ka homeny an’ilay tompon-javatra, vantany vao tsapany fa meloka izy. '
  '25':
  - type: text
    content: 'Ho sorom-panonerana amin’ny TOMPO, dia ondrilahy no hoentiny ho eo amin’ny mpisorona: ondrilahy tsy misy kilema, avy amin’ny andian’ondriny sady tombanana araka ny maha sorom-panonerana azy. '
  '26':
  - type: text
    content: Ary rehefa nataon’ny mpisorona teo anoloan’ny Toeramasin’ny TOMPO kosa ny fombam-pivavahana famelana, dia voavela ny otan’ilay olona na inona na inona hadisoana vitany
  - type: note
    content: 'And 20-26: jereo Nom 5.5-8.'
  - type: text
    content: .»
  '3':
  - type: text
    content: «Raha misy olona mahakasika tsy nahy olona maloto na inona na inona fahalotoana, ka mahafantatra izy avy eo, dia manjary meloka
  - type: note
    content: Jereo Lev 12–15.
  - type: text
    content: .
  '4':
  - type: text
    content: «Raha misy olona manao vava latsaka mianiana hanao ratsy na hanao soa, na inona na inona vava latsaka nombàny fianianana, ka mahafantatra izy avy eo, dia manjary meloka
  - type: note
    content: Ampit Sal 15.4; Nom 30.2-9. –Amin’ny faran’ity and ity, ny rijan-teny hebreo dia manampy teny anankiroa nindramina tamin’ny and manaraka.
  - type: text
    content: .
  '5':
  - type: text
    content: '«Izay olona meloka tamin’ny anankiray amin’ireo karazan-javatra ireo, dia aoka izy hiaiky ampahibemaso ny zavatra nanotany. '
  '6':
  - type: text
    content: 'Ary hitondra fanonerana amin’ny TOMPO izy noho ny ota vitany, dia ondrivavy na osivavy mba ho '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota; dia hataon’ny mpisorona amin’ilay olona ny fombam-pivavahana famelana, noho ny ota vitany.'
  - type: heading
    content: g. Ny sorona sy fanatitra sahaza ny mahantra
  '7':
  - type: text
    content: '«Raha tsy takatry ny fananan’ny olona kosa ny ondrivavy na osivavy iray, dia domohina roa na voromahailala roa no hoentiny amin’ny TOMPO ho fanonerana ny ota vitany ka ny anankiray ho '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota, ary ny anankiray kosa ho sorona dorana manontolo. '
  '8':
  - type: text
    content: 'Hoentin’ilay olona ireo vorona ireo ho eo amin’ny mpisorona. Ka ny hatolotry ny mpisorona aloha dia ilay sorona fanalana ny ota: hofolahiny amin’ny hoho ny lohany, eo akaikin’ny hatony, saingy tsy hataony tangarana; '
  '9':
  - type: text
    content: 'hamafazany eo amin’ny rindrin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ny ran’ilay vorona, ary ny ra sisa dia hofiaziny eo am-pototr’io alitara io ihany: sorona fanalana ny ota izany. '
