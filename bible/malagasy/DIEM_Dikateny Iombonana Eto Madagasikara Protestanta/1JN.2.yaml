document_id: 1JN.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izany, rey anaka, no soratako aminareo, mba tsy hanotanareo. Kanefa raha misy olona manota, dia manana mpisolovava eo anilan’ny Ray isika, dia i Jesoa Kristy, ilay Marina. '
  '10':
  - type: text
    content: Izay tia ny namany iray finoana no mitoetra ao amin’ny fahazavana, ka tsy misy zavatra mitaona ny hafa amin’ny ratsy ao aminy
  - type: note
    content: 'tsy misy zavatra mitaona ny hafa amin’ny ratsy ao aminy: dkt hafa tsy misy zavatra mitaona ny tenany amin’ny ratsy ao aminy.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Fa izay mankahala ny namany no ao amin’ny haizina: ao amin’ny haizina no andehanany ka tsy fantany izay alehany, satria voajamban’ny haizina ny masony.'
  '12':
  - type: text
    content: 'Izao no soratako ho anareo rankizy: «Voavela ny fahotanareo'
  - type: note
    content: 'Izao no soratako ho anareo rankizy: «Voavela...»: dkt hafa Manoratra aminareo ankizy aho satria voavela.... Toraka izany koa ao amin’ny and 13 sy 14.'
  - type: text
    content: ' noho ny anaran’i Kristy!» '
  '13':
  - type: text
    content: 'Izao no soratako ho anareo ray aman-dreny: «Efa nahalala Ilay nambara hatramin’ny voalohany'
  - type: note
    content: 'Ilay nambara hatramin’ny voalohany: jereo 1.1 sy nta. Toa i Jesoa Kristy araka ny nampahalalain’Andriamanitra Ray hatramin’ny andron’i Jôhany Mpanao batisa izany; kanefa eo koa ireo hevitra hafa aroson’ny mpandinika sasany.'
  - type: text
    content: ' ianareo!» Izao no soratako ho anareo zatovo: «Efa naharesy '
  - type: text
    content: ilay Ratsy
  - type: text
    content: ' ianareo!»'
  '14':
  - type: text
    content: 'Izao no voasoratro ho anareo ankizy: «Efa nahalala ny Ray ianareo!» Izao no voasoratro ho anareo ray aman-dreny: «Efa nahalala Ilay nambara hatramin’ny voalohany ianareo!» Izao no voasoratro ho anareo zatovo: «Mahery ianareo ary mitoetra ao anatinareo ny tenin’Andriamanitra, sady efa naharesy ilay Ratsy ianareo!»'
  '15':
  - type: text
    content: Aza mankamamy an’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ', na ny zavatra izay ao amin’izao tontolo izao. Raha misy olona mankamamy an’izao tontolo izao, dia tsy ao anatin’izany olona izany ny fitiavana ny Ray. '
  '16':
  - type: text
    content: 'Satria ny zavatra rehetra izay ao amin’izao tontolo izao, izany hoe ny filàndratsin’ny maha olona mpanota sy ny fitsiriritan-javatra hitan’ny maso ary ny rehaka momba izao fiainana izao, dia tsy avy amin’ny Ray, fa avy amin’izao tontolo izao. '
  '17':
  - type: text
    content: Mandalo izao tontolo izao sy ny filàndratsy itaomany, fa izay manao ny sitrapon’Andriamanitra no maharitra mandrakizay.
  - type: heading
    content: Ilay antikristy
  '18':
  - type: text
    content: Rey anaka, izao no fotoanandro farany. Araka ny efa renareo dia ho avy ilay antikristy, sady maro ny antikristy efa tonga sahady; ka izany no ahafantarantsika fa izao no fotoanandro farany
  - type: note
    content: Ampit Mt 24.5, 23-24; Mk 13.21-22.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Avy tamintsika ihany ireo no niala, saingy tsy namantsika; satria raha namantsika tokoa ireo, dia ho naharitra niaraka tamintsika. Fa ireo no niala, dia mba hampiharihary fa tsy namantsika avokoa ny olona rehetra.
  '2':
  - type: text
    content: Izy no sorom-panonerana amelana ny fahotantsika
  - type: note
    content: 'Izy no sorom-panonerana amelana ny fahotantsika: ampit Rm 3.25-26 sy nta.'
  - type: text
    content: ; ary tsy ny antsika ihany, fa ny an’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' koa.'
  '20':
  - type: text
    content: 'Ianareo kosa dia manana ny Fanahy Masina avy amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ary mahafantatra izany avokoa ianareo'
  - type: note
    content: 'ny Fanahy Masina: ara-bakiteny kokoa ny hosotra (jereo and 27). –i Kristy: ara-bakiteny kokoa ny Masina: (jereo Jôh 6.69). –mahafantatra izany avokoa ianareo: misy stf sasany ahitana hoe mahafantatra ny zavatra rehetra ianareo.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Tsy noho ianareo tsy mahafantatra ny hafatra marim-pototra no nanoratako taminareo, fa noho ianareo mahafantatra izany; ary fantatrareo koa fa tsy misy lainga avy amin’ilay hafatra marim-pototra.
  '22':
  - type: text
    content: 'Iza no mpandainga, raha tsy izay mandà an’i Jesoa tsy ho Kristy? Izy no ilay antikristy, mandà ny Ray sy ny Zanaka. '
  '23':
  - type: text
    content: Izay rehetra mandà ny Zanaka no tsy manana ny Ray koa; izay manaiky ny Zanaka no manana ny Ray koa
  - type: note
    content: Ampit Mt 11.27; Jôh 5.23; 15.23.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Ianareo kosa, dia ny hafatra izay efa renareo hatramin’ny voalohany no aoka hitoetra ao anatinareo. Raha mitoetra ao anatinareo ny hafatra izay efa renareo hatramin’ny voalohany, dia hitoetra ao anatin’ny Zanaka sy ny Ray koa ianareo. '
  '25':
  - type: text
    content: Ary ny zavatra nampanantenain’i Kristy antsika dia ny fiaina-maharitra mandrakizay.
  '26':
  - type: text
    content: 'Izany no voasoratro ho anareo, dia ny amin’ireo mitady hamitaka anareo. '
  '27':
  - type: text
    content: Ianareo kosa, dia ny Fanahy Masina efa noraisinareo avy tamin’i Kristy no mitoetra ao anatinareo, ka tsy mila hampianarin’olona ianareo. Fa ny Fanahy Masina avy amin’i Kristy no mampianatra anareo ny amin’ny zavatra rehetra, ary zavatra marim-pototra fa tsy lainga no ampianariny; ka tomoera ao anatin’i Kristy ianareo, araka ny nampianaran’ny Fanahy Masina anareo.
  '28':
  - type: text
    content: Eny, rey anaka, tomoera ao anatin’i Kristy ianareo mba hananantsika toky rahatrizay hiseho Izy ary mba tsy ho voaroaka lavitra Azy isika amin’ny andro hiaviany ka ho afa-baràka.
  - type: heading
    content: Zanak’Andriamanitra
  '29':
  - type: text
    content: Raha fantatrareo fa marina Andriamanitra, dia fantaro fa izay rehetra manao ny marina soritany koa dia naterak’Andriamanitra.
  '3':
  - type: text
    content: 'Ny ahafantarantsika fa mahalala an’Andriamanitra isika, dia ny fitandremantsika ireo didiny. '
  '4':
  - type: text
    content: 'Izay milaza ho mahalala an’Andriamanitra, nefa tsy mitandrina ireo didiny, dia mpandainga sady tsy ao anatin’izany olona izany ny hafatra marim-pototra. '
  '5':
  - type: text
    content: 'Fa na iza na iza mitandrina ny tenin’Andriamanitra, dia lavorary ao aminy marina tokoa ny fitiavana an’Andriamanitra; izany no ahafantarantsika fa tafaray amin’Andriamanitra isika. '
  '6':
  - type: text
    content: Izay milaza fa mitoetra ao anatin’Andriamanitra izy, dia tsy maintsy miaina toa izay niainan’i Kristy koa.
  - type: heading
    content: Ilay didy ela sy vao
  '7':
  - type: text
    content: Ry hava-malala, tsy didy vaovao no soratako aminareo, fa didy ela, izay nanananareo hatramin’ny voalohany
  - type: note
    content: Jereo Jôh 13.34.
  - type: text
    content: '; izany didy ela izany dia ilay teny efa renareo. '
  '8':
  - type: text
    content: 'Didy vaovao ihany koa no soratako aminareo, dia ilay hita marina eo amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' sy eo aminareo, satria misava ny haizina ary efa mamiratra ny fahazavana tena izy.'
  '9':
  - type: text
    content: 'Izay milaza fa ao amin’ny fahazavana izy, kanefa mankahala ny namany iray finoana, dia mbola ao amin’ny haizina ihany. '
