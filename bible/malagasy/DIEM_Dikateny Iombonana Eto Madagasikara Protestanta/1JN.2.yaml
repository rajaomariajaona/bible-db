document_id: 1JN.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izany, rey anaka, no soratako aminareo, mba tsy hanotanareo. Kanefa raha misy olona manota, dia manana mpisolovava eo anilan’ny Ray isika, dia i Jesoa Kristy, ilay Marina. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izy no sorom-panonerana amelana ny fahotantsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izy no sorom-panonerana amelana ny fahotantsika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Rm 3.25-26 sy nta.
    marker-yv: yv-n
  - type: text
    text: ; ary tsy ny antsika ihany, fa ny an’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny ahafantarantsika fa mahalala an’Andriamanitra isika, dia ny fitandremantsika ireo didiny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay milaza ho mahalala an’Andriamanitra, nefa tsy mitandrina ireo didiny, dia mpandainga sady tsy ao anatin’izany olona izany ny hafatra marim-pototra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa na iza na iza mitandrina ny tenin’Andriamanitra, dia lavorary ao aminy marina tokoa ny fitiavana an’Andriamanitra; izany no ahafantarantsika fa tafaray amin’Andriamanitra isika. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izay milaza fa mitoetra ao anatin’Andriamanitra izy, dia tsy maintsy miaina toa izay niainan’i Kristy koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay didy ela sy vao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ry hava-malala, tsy didy vaovao no soratako aminareo, fa didy ela, izay nanananareo hatramin’ny voalohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jôh 13.34.
    marker-yv: yv-n
  - type: text
    text: '; izany didy ela izany dia ilay teny efa renareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Didy vaovao ihany koa no soratako aminareo, dia ilay hita marina eo amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' sy eo aminareo, satria misava ny haizina ary efa mamiratra ny fahazavana tena izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay milaza fa ao amin’ny fahazavana izy, kanefa mankahala ny namany iray finoana, dia mbola ao amin’ny haizina ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay tia ny namany iray finoana no mitoetra ao amin’ny fahazavana, ka tsy misy zavatra mitaona ny hafa amin’ny ratsy ao aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsy misy zavatra mitaona ny hafa amin’ny ratsy ao aminy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy misy zavatra mitaona ny tenany amin’ny ratsy ao aminy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izay mankahala ny namany no ao amin’ny haizina: ao amin’ny haizina no andehanany ka tsy fantany izay alehany, satria voajamban’ny haizina ny masony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no soratako ho anareo rankizy: «Voavela ny fahotanareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izao no soratako ho anareo rankizy: «Voavela...»: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Manoratra aminareo ankizy aho satria voavela....
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Toraka izany koa ao amin’ny and 13 sy 14.'
    marker-yv: yv-n
  - type: text
    text: ' noho ny anaran’i Kristy!» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no soratako ho anareo ray aman-dreny: «Efa nahalala Ilay nambara hatramin’ny voalohany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ilay nambara hatramin’ny voalohany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.1 sy nta. Toa i Jesoa Kristy araka ny nampahalalain’Andriamanitra Ray hatramin’ny andron’i Jôhany Mpanao batisa izany; kanefa eo koa ireo hevitra hafa aroson’ny mpandinika sasany.
    marker-yv: yv-n
  - type: text
    text: ' ianareo!» Izao no soratako ho anareo zatovo: «Efa naharesy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ilay Ratsy
  - type: text
    text: ' ianareo!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no voasoratro ho anareo ankizy: «Efa nahalala ny Ray ianareo!» Izao no voasoratro ho anareo ray aman-dreny: «Efa nahalala Ilay nambara hatramin’ny voalohany ianareo!» Izao no voasoratro ho anareo zatovo: «Mahery ianareo ary mitoetra ao anatinareo ny tenin’Andriamanitra, sady efa naharesy ilay Ratsy ianareo!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza mankamamy an’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ', na ny zavatra izay ao amin’izao tontolo izao. Raha misy olona mankamamy an’izao tontolo izao, dia tsy ao anatin’izany olona izany ny fitiavana ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Satria ny zavatra rehetra izay ao amin’izao tontolo izao, izany hoe ny filàndratsin’ny maha olona mpanota sy ny fitsiriritan-javatra hitan’ny maso ary ny rehaka momba izao fiainana izao, dia tsy avy amin’ny Ray, fa avy amin’izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mandalo izao tontolo izao sy ny filàndratsy itaomany, fa izay manao ny sitrapon’Andriamanitra no maharitra mandrakizay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay antikristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rey anaka, izao no fotoanandro farany. Araka ny efa renareo dia ho avy ilay antikristy, sady maro ny antikristy efa tonga sahady; ka izany no ahafantarantsika fa izao no fotoanandro farany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 24.5, 23-24; Mk 13.21-22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Avy tamintsika ihany ireo no niala, saingy tsy namantsika; satria raha namantsika tokoa ireo, dia ho naharitra niaraka tamintsika. Fa ireo no niala, dia mba hampiharihary fa tsy namantsika avokoa ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ianareo kosa dia manana ny Fanahy Masina avy amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ary mahafantatra izany avokoa ianareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny Fanahy Masina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ara-bakiteny kokoa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny hosotra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo and 27). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'i Kristy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ara-bakiteny kokoa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'ny Masina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Jôh 6.69). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mahafantatra izany avokoa ianareo:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mahafantatra ny zavatra rehetra ianareo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy noho ianareo tsy mahafantatra ny hafatra marim-pototra no nanoratako taminareo, fa noho ianareo mahafantatra izany; ary fantatrareo koa fa tsy misy lainga avy amin’ilay hafatra marim-pototra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Iza no mpandainga, raha tsy izay mandà an’i Jesoa tsy ho Kristy? Izy no ilay antikristy, mandà ny Ray sy ny Zanaka. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay rehetra mandà ny Zanaka no tsy manana ny Ray koa; izay manaiky ny Zanaka no manana ny Ray koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 11.27; Jôh 5.23; 15.23.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ianareo kosa, dia ny hafatra izay efa renareo hatramin’ny voalohany no aoka hitoetra ao anatinareo. Raha mitoetra ao anatinareo ny hafatra izay efa renareo hatramin’ny voalohany, dia hitoetra ao anatin’ny Zanaka sy ny Ray koa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny zavatra nampanantenain’i Kristy antsika dia ny fiaina-maharitra mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izany no voasoratro ho anareo, dia ny amin’ireo mitady hamitaka anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ianareo kosa, dia ny Fanahy Masina efa noraisinareo avy tamin’i Kristy no mitoetra ao anatinareo, ka tsy mila hampianarin’olona ianareo. Fa ny Fanahy Masina avy amin’i Kristy no mampianatra anareo ny amin’ny zavatra rehetra, ary zavatra marim-pototra fa tsy lainga no ampianariny; ka tomoera ao anatin’i Kristy ianareo, araka ny nampianaran’ny Fanahy Masina anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny, rey anaka, tomoera ao anatin’i Kristy ianareo mba hananantsika toky rahatrizay hiseho Izy ary mba tsy ho voaroaka lavitra Azy isika amin’ny andro hiaviany ka ho afa-baràka.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha fantatrareo fa marina Andriamanitra, dia fantaro fa izay rehetra manao ny marina soritany koa dia naterak’Andriamanitra.
