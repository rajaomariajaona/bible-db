document_id: NAM.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanamelohana an’i Ninive
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozanao, ry tanàna mpandatsaka ain’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpanao hosoka sy fanambakana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ialana fandrobana!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa na ny mponin’i Teba koa aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lasan-ko babo sy voasesitany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zaza teo aminy dia novonoin-ko faty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny an-joron-dàlana rehetra teny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny loholony notsinjaraina an-tsapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lehibeny rehetra nasiana gadra vy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anjaranao koa izao, ry Ninive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ho leom-pangirifiriana ka ho difotr’izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ho difotr’izany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hiery
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anjaranao koa izao ny hitady fiafenana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hialana amin’ny fahavalo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny manda mafy rehetra anananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho toy ny aviavy efa masa-boa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha hohozongozonina ny fototra, dia hihintsana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo am-bavan’izay te hihinana azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro tonga osa toy ny vehivavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lehilahy eo aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary midanadana ho an’ny fahavalonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vavahadin’ny taninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria kilan’ny afo ny hidiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny hidiny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hazo no fanidiana vavahady tamin’izany. Ny hoe «hidy» dia raisina an’ohatra ilazana ny fitambaran’ny fiarovana ny tanàna.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mponin’i Ninive, manangòna rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho avy ny fahirano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamafiso ny mandanareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manditia tanimanga ho feta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka raiso ny lasi-biriky
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny lasi-biriky: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy maintsy manao biriky hahazoana manamboatra indray ny manda.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho faty kilan’ny afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho ripaky ny sabatra ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho levona tokoa ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fandevon’ny valala ny ravina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanjavona ny vahoaka iray manontolo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nivangongo tahaka ny voangory ny vahoakanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nifanaretsaka tahaka ny valala.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nohamaroinao ny mpandrantonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mihoatra noho ny kintana eny amin’ny lanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny voangory àry elatra ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka lasa nanidina nanjavona.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Betsaka toy ny valala ny andriananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpiasam-panjakana ao aminao koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny andiam-balala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mivangongo eny amin’ny fefy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nony mangatsiaka ny andro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa rehefa miposaka ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lasa manidina ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy fantatra izay nalehany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fangirifiriana tsy misy fanafana
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matory tsy hifoha intsony ireo filoham-paritaninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mpanjakan’i Asiria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miampatrampatra ireo jeneralinao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihahaka eny an-tendrombohitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mihahaka eny an-tendrombohitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tamin’ny 609 tal J.K ireo tafika asirianina farany izay nenjehin’ny Babilônianina dia niparitaka tany an-tendrombohitr’i Armenia.
      marker-yv: yv-n
    - type: text
      text: ' ny tafikao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy mamory.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fanafany ny fangirifirianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy azo sitranina intsony ny ferinao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay rehetra mahalala ny nanjò anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitehaka avokoa manoloana ny fahavoazanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria zovy moa no tsy nahita faisana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny habibiana mitohy nafitsokao?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany re ao ny firefotry ny karavasy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny firodorodon’ny kodiarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fikatrokatroky ny soavaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fitraitraikan’ny kalesy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He, miantsambotra ny mpitaingin-tsoavaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamirapiratra ny sabatra, manjelanjelatra ny lefona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Betsaka ny maratra! Fatin’olona no miampatrampatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hita isa sy mamingana hatraiza hatraiza!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rakotra henatra i Ninive
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fatra-pijangajanga i Ninive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay mpivarotena bikana sy kinga amin’ny fanangolena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nangeja vahoaka sy firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny fijangajangana sy ny ody fitia.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izao no teny hentitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ataon’ny TOMPOn’izao rehetra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro hamely anao Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haingaiko hatreny amin’ny tavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny moron-tongotr’akanjonao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hasehoko miboridana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny firenena sy fanjakana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahita anao rakotra henatra ireo.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hataoko mihosim-potaka ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy halako baràka ka higagan’ny olona.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay rehetra mahita anao dia handositra anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady hiteny hoe: «Rava i Ninive!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza intsony no hangoraka azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza no hahitana mpampionona azy?»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hanjo an’i Ninive koa izay nanjo an’i Teba
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa va ianao, ry Ninive, tsara noho i Teba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Teba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ilay Teba any Ejipta, fa ny RM dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nô-Amôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay midika hoe tanànan’ilay andriamanitra sampy Amôna, jereo Jer 46.25 sy nta. Tamin’ny 663 tal J.K no voababo sy voaroban’ny mpanjaka asirianina Asorbanipaly ny tanàna.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay tanàna niorina teo anivon’ny ony Neily
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voadidin’ny ranobe toy ny manda miaro azy?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Etiôpia sy i Ejipta no heriny tsy mety ritra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vahoakan’i Pota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Pota: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Is 66.19 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sy ny Libianina no mpanampy azy.'
