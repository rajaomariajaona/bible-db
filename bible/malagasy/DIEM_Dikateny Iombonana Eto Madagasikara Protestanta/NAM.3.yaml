document_id: NAM.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanamelohana an’i Ninive
  - type: text
    content: Lozanao, ry tanàna mpandatsaka ain’olona,
  - type: text
    content: mpanao hosoka sy fanambakana,
  - type: text
    content: ary tsy ialana fandrobana!
  '10':
  - type: text
    content: Nefa na ny mponin’i Teba koa aza
  - type: text
    content: dia lasan-ko babo sy voasesitany.
  - type: text
    content: Ny zaza teo aminy dia novonoin-ko faty
  - type: text
    content: teny an-joron-dàlana rehetra teny,
  - type: text
    content: ny loholony notsinjaraina an-tsapaka,
  - type: text
    content: ary ny lehibeny rehetra nasiana gadra vy.
  '11':
  - type: text
    content: Anjaranao koa izao, ry Ninive,
  - type: text
    content: ny ho leom-pangirifiriana ka ho difotr’izany
  - type: note
    content: 'ho difotr’izany: dkt hafa hiery.'
  - type: text
    content: ;
  - type: text
    content: anjaranao koa izao ny hitady fiafenana
  - type: text
    content: hialana amin’ny fahavalo.
  '12':
  - type: text
    content: Ny manda mafy rehetra anananao
  - type: text
    content: dia ho toy ny aviavy efa masa-boa;
  - type: text
    content: raha hohozongozonina ny fototra, dia hihintsana
  - type: text
    content: eo am-bavan’izay te hihinana azy.
  '13':
  - type: text
    content: Indro tonga osa toy ny vehivavy
  - type: text
    content: ny lehilahy eo aminao;
  - type: text
    content: ary midanadana ho an’ny fahavalonao
  - type: text
    content: ny vavahadin’ny taninao,
  - type: text
    content: satria kilan’ny afo ny hidiny
  - type: note
    content: 'ny hidiny: hazo no fanidiana vavahady tamin’izany. Ny hoe «hidy» dia raisina an’ohatra ilazana ny fitambaran’ny fiarovana ny tanàna.'
  - type: text
    content: .
  '14':
  - type: text
    content: Ry mponin’i Ninive, manangòna rano
  - type: text
    content: fa ho avy ny fahirano,
  - type: text
    content: hamafiso ny mandanareo;
  - type: text
    content: manditia tanimanga ho feta
  - type: text
    content: ka raiso ny lasi-biriky
  - type: note
    content: 'ny lasi-biriky: tsy maintsy manao biriky hahazoana manamboatra indray ny manda.'
  - type: text
    content: .
  '15':
  - type: text
    content: Fa ho faty kilan’ny afo
  - type: text
    content: sy ho ripaky ny sabatra ianareo;
  - type: text
    content: eny, ho levona tokoa ianareo,
  - type: text
    content: toy ny fandevon’ny valala ny ravina.
  - type: heading
    content: Nanjavona ny vahoaka iray manontolo
  - type: text
    content: Nivangongo tahaka ny voangory ny vahoakanao
  - type: text
    content: ary nifanaretsaka tahaka ny valala.
  '16':
  - type: text
    content: Nohamaroinao ny mpandrantonao
  - type: text
    content: ka mihoatra noho ny kintana eny amin’ny lanitra.
  - type: text
    content: Tahaka ny voangory àry elatra ireny
  - type: text
    content: ka lasa nanidina nanjavona.
  '17':
  - type: text
    content: Betsaka toy ny valala ny andriananao;
  - type: text
    content: ny mpiasam-panjakana ao aminao koa
  - type: text
    content: dia toy ny andiam-balala
  - type: text
    content: mivangongo eny amin’ny fefy
  - type: text
    content: nony mangatsiaka ny andro.
  - type: text
    content: Fa rehefa miposaka ny masoandro,
  - type: text
    content: dia lasa manidina ireny
  - type: text
    content: ka tsy fantatra izay nalehany.
  - type: heading
    content: Fangirifiriana tsy misy fanafana
  '18':
  - type: text
    content: Matory tsy hifoha intsony ireo filoham-paritaninao
  - type: text
    content: ry mpanjakan’i Asiria,
  - type: text
    content: ary miampatrampatra ireo jeneralinao.
  - type: text
    content: Mihahaka eny an-tendrombohitra
  - type: note
    content: 'Mihahaka eny an-tendrombohitra: tamin’ny 609 tal J.K ireo tafika asirianina farany izay nenjehin’ny Babilônianina dia niparitaka tany an-tendrombohitr’i Armenia.'
  - type: text
    content: ' ny tafikao,'
  - type: text
    content: ka tsy misy mamory.
  '19':
  - type: text
    content: Tsy misy fanafany ny fangirifirianao
  - type: text
    content: ary tsy azo sitranina intsony ny ferinao.
  - type: text
    content: Fa izay rehetra mahalala ny nanjò anao
  - type: text
    content: dia hitehaka avokoa manoloana ny fahavoazanao,
  - type: text
    content: satria zovy moa no tsy nahita faisana
  - type: text
    content: noho ny habibiana mitohy nafitsokao?
  '2':
  - type: text
    content: Injany re ao ny firefotry ny karavasy,
  - type: text
    content: ny firodorodon’ny kodiarana
  - type: text
    content: sy ny fikatrokatroky ny soavaly
  - type: text
    content: ary ny fitraitraikan’ny kalesy.
  '3':
  - type: text
    content: He, miantsambotra ny mpitaingin-tsoavaly,
  - type: text
    content: mamirapiratra ny sabatra, manjelanjelatra ny lefona!
  - type: text
    content: Betsaka ny maratra! Fatin’olona no miampatrampatra
  - type: text
    content: tsy hita isa sy mamingana hatraiza hatraiza!
  - type: heading
    content: Rakotra henatra i Ninive
  '4':
  - type: text
    content: Fatra-pijangajanga i Ninive,
  - type: text
    content: ilay mpivarotena bikana sy kinga amin’ny fanangolena,
  - type: text
    content: sady nangeja vahoaka sy firenena
  - type: text
    content: tamin’ny fijangajangana sy ny ody fitia.
  '5':
  - type: text
    content: Koa izao no teny hentitra
  - type: text
    content: 'ataon’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Indro hamely anao Aho.
  - type: text
    content: Haingaiko hatreny amin’ny tavanao
  - type: text
    content: ny moron-tongotr’akanjonao.
  - type: text
    content: Ka hasehoko miboridana
  - type: text
    content: amin’ny firenena sy fanjakana ianao
  - type: text
    content: ary hahita anao rakotra henatra ireo.
  '6':
  - type: text
    content: Dia hataoko mihosim-potaka ianao
  - type: text
    content: sy halako baràka ka higagan’ny olona.
  '7':
  - type: text
    content: Ary izay rehetra mahita anao dia handositra anao
  - type: text
    content: 'sady hiteny hoe: «Rava i Ninive!'
  - type: text
    content: Iza intsony no hangoraka azy?
  - type: text
    content: Aiza no hahitana mpampionona azy?»
  - type: heading
    content: Hanjo an’i Ninive koa izay nanjo an’i Teba
  '8':
  - type: text
    content: Moa va ianao, ry Ninive, tsara noho i Teba
  - type: note
    content: 'Teba: ilay Teba any Ejipta, fa ny RM dia manao hoe Nô-Amôna izay midika hoe tanànan’ilay andriamanitra sampy Amôna, jereo Jer 46.25 sy nta. Tamin’ny 663 tal J.K no voababo sy voaroban’ny mpanjaka asirianina Asorbanipaly ny tanàna.'
  - type: text
    content: ','
  - type: text
    content: ilay tanàna niorina teo anivon’ny ony Neily
  - type: text
    content: sady voadidin’ny ranobe toy ny manda miaro azy?
  '9':
  - type: text
    content: I Etiôpia sy i Ejipta no heriny tsy mety ritra
  - type: text
    content: ary ny vahoakan’i Pota
  - type: note
    content: 'Pota: jereo Is 66.19 sy nta.'
  - type: text
    content: ' sy ny Libianina no mpanampy azy.'
