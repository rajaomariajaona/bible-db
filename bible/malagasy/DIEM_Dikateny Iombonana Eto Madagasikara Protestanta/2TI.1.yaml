document_id: 2TI.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho '
  - type: text
    content: apôstôlin’i Kristy
  - type: text
    content: ' Jesoa noho ny sitrapon’Andriamanitra mba hitory ny fiainana nampanantenaina izay ananantsika tafaray amin’i Kristy Jesoa.'
  '10':
  - type: text
    content: kanefa naharihariny antsika ankehitriny tamin’ny nisehoan’ilay Mpamonjy antsika, dia i Kristy Jesoa Izay nanafoana ny herin’ny fahafatesana sy nanambara mazava ny fiainana sy ny tsy fahalòvana tamin’ny alalan’ny Vaovao Mahafaly.
  '11':
  - type: text
    content: 'Ny hitory izany Vaovao Mahafaly izany no nanendren’Andriamanitra ahy ho '
  - type: text
    content: apôstôly
  - type: text
    content: ' sy ho mpampianatra'
  - type: note
    content: Ampit 1Tim 2.7.
  - type: text
    content: '; '
  '12':
  - type: text
    content: ary izany koa no antony iaretako izao fijaliana izao. Kanefa tsy mahakivy ahy izany, satria fantatro Ilay nametrahako ny fitokiako ary azoko antoka fa Izy dia mahatahiry ilay raki-tsoa nankininy tamiko
  - type: note
    content: 'ilay raki-tsoa nankininy tamiko: ampit 1.14; 1Tim 6.20.'
  - type: text
    content: ' mandra-piavin’ny andro fitsarana. '
  '13':
  - type: text
    content: 'Ireo teny efa renao tamiko no ataovy fenitra ho anao, ka tano mafy amin’ny finoana sy ny fitiavana ananantsika tafaray amin’i Kristy Jesoa. '
  '14':
  - type: text
    content: Ny Fanahy Masina Izay mitoetra ao anatintsika no itahirizo ilay raki-tsoa nankinina taminao.
  '15':
  - type: text
    content: 'Fantatrao fa efa nandao ahy ry zareo rehetra any Azia, ka isan’ireny ry i Figelo sy i Hermozena. '
  '16':
  - type: text
    content: 'Ny Tompo anie hamindra fo amin’ny ankohonan’i Ônesifôro fa namelombelona ny fanahiko matetika izy sady tsy nahamenatra azy ny figadràko! '
  '17':
  - type: text
    content: 'Fa nony tonga teto Rôma i Ônesifôro, dia nazoto nitady ahy; ka tsy navelany aho, raha tsy hitany. '
  '18':
  - type: text
    content: Mba hataon’ny Tompo hahita ny famindrampony
  - type: note
    content: 'Mba... ny famindrampony: indroa miverina ny teny hoe Tompo ao amin’ny rijan-teny fototra, ka izany dia anaram-boninahitra mety hiantefa amin’Andriamanitra na amin’i Jesoa Kristy.'
  - type: text
    content: ' anie izy amin’ny andro fitsarana! Fantatrao tsara dia tsara koa ny fikarakarana rehetra nataony tamiko tao Efeso.'
  '2':
  - type: text
    content: Mamangy anao aho, ry Timôty
  - type: note
    content: Jereo Asa 16.1.
  - type: text
    content: ' zanako malala. Ho aminao anie ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy i Kristy Jesoa Tompontsika!'
  - type: heading
    content: Fampirisihana mba ho mahatoky amin’ny finoana
  '3':
  - type: text
    content: Velom-pisaorana an’Andriamanitra aho, dia Andriamanitra Izay tompoiko amin’ny fieritreretana mahitsy toy ny nataon’ireo razako
  - type: note
    content: Jiosy nanaraka tsara ny fivavahan-drazany ny fianakaviana nipoiran’i Paoly (jereo Fil 3.4-5).
  - type: text
    content: '. Velom-pisaorana Azy aho rehefa mahatsiaro anao tsy tapaka amin’ny fivavahana ataoko andro aman’alina. '
  '4':
  - type: text
    content: Tsaroako ny ranomasonao
  - type: note
    content: Ao an-tsain’i Paoly ny alahelon’i Timôty fony nilaozany tany Efeso (jereo 1Tim 1.3).
  - type: text
    content: ', ka tsy andriko mihitsy ny hahitako anao mba ho safononoka ny hafaliako. '
  '5':
  - type: text
    content: 'Tsahiviko ny finoana tsy mihatsaravelatsihy izay ao anatinao, dia ilay finoana efa nananan’i Lôisa renibenao sy i Eonika reninao talohanao. Azoko antoka fa anananao koa izany. '
  '6':
  - type: text
    content: 'Izany no ampahatsiarovako ny hamelombelomanao indray ilay fanomezam-pahasoavana narotsak’Andriamanitra tao anatinao, fony aho nametra-tanana taminao. '
  '7':
  - type: text
    content: Tsy mba fanahy mahatonga ho kanosa no efa nomen’Andriamanitra antsika, fa ilay Fanahiny mahatonga antsika ho feno hery sy be fitiavana ary mahay mifehy tena.
  '8':
  - type: text
    content: Koa aza menatra ny ho vavolombelon’ny Tompontsika; aza menatra ny amiko ihany koa, dia izaho voafonja noho ny aminy
  - type: note
    content: Voafonja tao Rôma i Paoly araka izay hita ao 1.17.
  - type: text
    content: '. Fa aoka hiaretanao fijaliana miaraka amiko ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', araka ny hery omen’Andriamanitra anao. '
  '9':
  - type: text
    content: 'Andriamanitra no namonjy antsika sy niantso antsika ho '
  - type: text
    content: vahoakany
  - type: text
    content: ', tsy noho ny asa vitantsika fa noho ny fandaharan’ny tenany ihany ary noho ny fahasoavany. Efa nomeny antsika tao amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa izany fahasoavana izany, fony tsy mbola nisy ary akory izao rehetra izao; '
