document_id: 2TI.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Avy amiko Paoly ity taratasy ity, dia izaho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôlin’i Kristy
    - type: text
      text: ' Jesoa noho ny sitrapon’Andriamanitra mba hitory ny fiainana nampanantenaina izay ananantsika tafaray amin’i Kristy Jesoa.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: kanefa naharihariny antsika ankehitriny tamin’ny nisehoan’ilay Mpamonjy antsika, dia i Kristy Jesoa Izay nanafoana ny herin’ny fahafatesana sy nanambara mazava ny fiainana sy ny tsy fahalòvana tamin’ny alalan’ny Vaovao Mahafaly.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny hitory izany Vaovao Mahafaly izany no nanendren’Andriamanitra ahy ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' sy ho mpampianatra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1Tim 2.7.
      marker-yv: yv-n
    - type: text
      text: '; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ary izany koa no antony iaretako izao fijaliana izao. Kanefa tsy mahakivy ahy izany, satria fantatro Ilay nametrahako ny fitokiako ary azoko antoka fa Izy dia mahatahiry ilay raki-tsoa nankininy tamiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ilay raki-tsoa nankininy tamiko: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 1.14; 1Tim 6.20.
      marker-yv: yv-n
    - type: text
      text: ' mandra-piavin’ny andro fitsarana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ireo teny efa renao tamiko no ataovy fenitra ho anao, ka tano mafy amin’ny finoana sy ny fitiavana ananantsika tafaray amin’i Kristy Jesoa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny Fanahy Masina Izay mitoetra ao anatintsika no itahirizo ilay raki-tsoa nankinina taminao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fantatrao fa efa nandao ahy ry zareo rehetra any Azia, ka isan’ireny ry i Figelo sy i Hermozena. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny Tompo anie hamindra fo amin’ny ankohonan’i Ônesifôro fa namelombelona ny fanahiko matetika izy sady tsy nahamenatra azy ny figadràko! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa nony tonga teto Rôma i Ônesifôro, dia nazoto nitady ahy; ka tsy navelany aho, raha tsy hitany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mba hataon’ny Tompo hahita ny famindrampony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mba... ny famindrampony:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' indroa miverina ny teny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tompo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ao amin’ny rijan-teny fototra, ka izany dia anaram-boninahitra mety hiantefa amin’Andriamanitra na amin’i Jesoa Kristy.'
      marker-yv: yv-n
    - type: text
      text: ' anie izy amin’ny andro fitsarana! Fantatrao tsara dia tsara koa ny fikarakarana rehetra nataony tamiko tao Efeso.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mamangy anao aho, ry Timôty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 16.1.
      marker-yv: yv-n
    - type: text
      text: ' zanako malala. Ho aminao anie ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy i Kristy Jesoa Tompontsika!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampirisihana mba ho mahatoky amin’ny finoana
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Velom-pisaorana an’Andriamanitra aho, dia Andriamanitra Izay tompoiko amin’ny fieritreretana mahitsy toy ny nataon’ireo razako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jiosy nanaraka tsara ny fivavahan-drazany ny fianakaviana nipoiran’i Paoly (jereo Fil 3.4-5).
      marker-yv: yv-n
    - type: text
      text: '. Velom-pisaorana Azy aho rehefa mahatsiaro anao tsy tapaka amin’ny fivavahana ataoko andro aman’alina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsaroako ny ranomasonao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ao an-tsain’i Paoly ny alahelon’i Timôty fony nilaozany tany Efeso (jereo 1Tim 1.3).
      marker-yv: yv-n
    - type: text
      text: ', ka tsy andriko mihitsy ny hahitako anao mba ho safononoka ny hafaliako. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tsahiviko ny finoana tsy mihatsaravelatsihy izay ao anatinao, dia ilay finoana efa nananan’i Lôisa renibenao sy i Eonika reninao talohanao. Azoko antoka fa anananao koa izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izany no ampahatsiarovako ny hamelombelomanao indray ilay fanomezam-pahasoavana narotsak’Andriamanitra tao anatinao, fony aho nametra-tanana taminao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy mba fanahy mahatonga ho kanosa no efa nomen’Andriamanitra antsika, fa ilay Fanahiny mahatonga antsika ho feno hery sy be fitiavana ary mahay mifehy tena.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa aza menatra ny ho vavolombelon’ny Tompontsika; aza menatra ny amiko ihany koa, dia izaho voafonja noho ny aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voafonja tao Rôma i Paoly araka izay hita ao 1.17.
      marker-yv: yv-n
    - type: text
      text: '. Fa aoka hiaretanao fijaliana miaraka amiko ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ', araka ny hery omen’Andriamanitra anao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Andriamanitra no namonjy antsika sy niantso antsika ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakany
    - type: text
      text: ', tsy noho ny asa vitantsika fa noho ny fandaharan’ny tenany ihany ary noho ny fahasoavany. Efa nomeny antsika tao amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa izany fahasoavana izany, fony tsy mbola nisy ary akory izao rehetra izao; '
