document_id: AMO.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Fahotana mifanesy no vitan’ny mponin’i Môaba,
  - type: text
    content: 'fa indrindra ity anankiray ity:'
  - type: text
    content: Nodorany ho sokay ny taolan’ilay mpanjakan’i Edôma
  - type: note
    content: 'Môaba: fanjakana iray mifanila amin’i Israely, ka eo atsinanan’ny ranomasina Maty no misy azy. Momba ny Môabita dia jereo Is 15.1 sy nta. –nodorany... ny taolana: ny taolana dia maneho izay sisa tavela amin’ny olona. Noheverina fa tsy mahazo fialan-tsasatra any an-koatra ny fahavalo, rehefa dorana amin’ny afo ny taolambalony. Jereo koa Jer 8.2 sy nta.'
  - type: text
    content: .
  - type: text
    content: 'Noho izany, dia tsy hahemotro ny sazy momba azy:'
  '10':
  - type: text
    content: Izaho koa no nampiakatra anareo avy tany Ejipta
  - type: text
    content: sady nitari-dàlana anareo efapolo taona tany an-taniefitra
  - type: text
    content: mandra-pahazoanareo ny tanin’ny Amôrita.
  '11':
  - type: text
    content: 'Taoriana dia nisy natsangako ho '
  - type: text
    content: mpaminany
  - type: text
    content: ' ny zanakalahinareo,'
  - type: text
    content: ary nisy nantsoiko ho Nazirita
  - type: note
    content: 'ho Nazirita: izany hoe hanokan-tena ho Ahy amin’ny voady*; jereo Nom 6.1-21.'
  - type: text
    content: ' ny zatovonareo;'
  - type: text
    content: ka mba tsy izany tokoa ve, ry taranak’i Israely?
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.
  '12':
  - type: text
    content: Kanjo nampisotroinareo divay ireo Nazirita;
  - type: text
    content: ary ny mpaminany noraranareo
  - type: text
    content: tsy hampita ny hafatr’Andriamanitra.
  '13':
  - type: text
    content: Noho izany, dia tsy hahemotro ny sazy momba anareo.
  - type: text
    content: Indro hataoko mikonainaika
  - type: note
    content: 'mikonainaika: tsy azo antoka ny hevitry ny matoanteny hebreo; misy mandika hoe voatsindry na taraiky.'
  - type: text
    content: eo amin’izay misy anareo avy ianareo
  - type: text
    content: tahaka ny ikonainaihan’ny sarety vesaram-bary.
  '14':
  - type: text
    content: Ka ny haingam-pandeha tsy hahita fierena,
  - type: text
    content: ny matanjaka tsy afaka hampiasa ny heriny,
  - type: text
    content: ary ny miaramila voafantina tsy hahavonjy ny tenany.
  '15':
  - type: text
    content: Tsy hahajoro ny mpandefa zana-tsipîka,
  - type: text
    content: tsy ho afa-mitsoaka ireo faingan-tongotra,
  - type: text
    content: ary tsy hahavonjy ny ainy ny mpitaingin-tsoavaly.
  '16':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: na ny mahery fo indrindra
  - type: text
    content: amin’ireo miaramila voafantina aza
  - type: text
    content: dia hanary fiadiana ka handositra
  - type: note
    content: 'Momba ny and 6-16: jereo 4.1-3; 5.11-13; 7.10-17; 8.4-7; Jer 2.4-7, 19.'
  - type: text
    content: .
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.»
  '2':
  - type: text
    content: Handefasako afo ny tanin’i Môaba
  - type: text
    content: ka ho levon’izany koa ireo lapa ao Kiriôta
  - type: note
    content: 'Kiriôta: tanàn-dehibe môabita voalaza ao amin’ny Jer 48.24 ihany koa, nefa tsy mbola voafaritra mazava ny toerana nisy azy.'
  - type: text
    content: ;
  - type: text
    content: ho faty ao anatin’ny kotaba ny Môabita,
  - type: text
    content: ho faty ao anatin’ny akoran’ady sy ny feon-trompetra.
  '3':
  - type: text
    content: Haringako ilay mpitsara ao aminy
  - type: text
    content: ary hovonoiko miaraka aminy koa
  - type: text
    content: ireo manamboninahiny rehetra
  - type: note
    content: 'Momba ny and 1-3: jereo Is 15–16; Jer 48; Tsef 2.8-11; Ezek 25.8-11.'
  - type: text
    content: .
  - type: text
    content: Izaho Tompo no miteny.»
  - type: heading
    content: (Joda)
  '4':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Fahotana mifanesy no vitan’ny mponin’i Joda,
  - type: text
    content: 'fa indrindra ireto:'
  - type: text
    content: Nanao tsinontsinona ny fampianarako izy
  - type: text
    content: ary tsy nitandrina ny didiko
  - type: text
    content: sady nanaiky ho voafitaky ny andriamanitra sampy
  - type: text
    content: izay efa notompoin’ireo razany.
  - type: text
    content: 'Noho izany, dia tsy hahemotro ny sazy momba azy:'
  '5':
  - type: text
    content: Handefasako afo ny tanin’i Joda
  - type: text
    content: ka ho levon’izany koa ireo lapa ao Jerosalema
  - type: note
    content: 'Momba ny and 4-5: jereo Lev 26.14-16; Jer 9.11-16; 2 Tan 36.14-20.'
  - type: text
    content: .»
  - type: heading
    content: (Israely)
  '6':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Fahotana mifanesy no vitan’ny mponin’i Israely,
  - type: text
    content: 'fa indrindra ireto:'
  - type: text
    content: Namidiny ho andevo
  - type: note
    content: 'Israely: jereo ny naoty tandrifin’ny 1.1 –Namidiny ho andevo: jereo Lev 25.39-43; 2 Mp 4.1; Is 50.1; Ne 5.1-5; Mt 18.25.'
  - type: text
    content: ' ny olon-tsotra raiki-trosa'
  - type: text
    content: mba hamerenana ny volany;
  - type: text
    content: ary namidiny ho andevo ny mahantra
  - type: text
    content: satria tsy nahaloa na ny vidin-kapa iray lomisy aza.
  '7':
  - type: text
    content: Hitsahiny eo ambony vovo-tany ny lohan’ny osa,
  - type: text
    content: ary aviliviliny ny fitarainan’ny mpandefitra
  - type: text
    content: eo amin’ny fitsarana.
  - type: text
    content: Olona mianaka, dia mifandimby mandry
  - type: text
    content: amin’ny zatovovavy iray ihany
  - type: text
    content: mba hanevatevana ny anarako masina
  - type: note
    content: Ampit Deot 22.28-29; Lev 18.15. Misy mihevitra fa filazana an-kolaka ny fijangajangana fanao eo anatrehan’ny sampy no ambara eto (jereo Deot 23.18; Hôs 4.14).
  - type: text
    content: .
  '8':
  - type: text
    content: Lamba nomen’ny mahantra ho antoka
  - type: text
    content: no itsilailaizany eny akaikin’ny alitara rehetra eny
  - type: note
    content: Jereo Eks 22.25-26; Deot 24.10-13.
  - type: text
    content: ;
  - type: text
    content: ary divay azo avy amin’ny sazy
  - type: text
    content: no sotroiny ao an-tempolin’ireo andriamaniny.
  '9':
  - type: text
    content: 'Izaho anefa no nandringana ny '
  - type: text
    content: Amôrita
  - type: note
    content: 'Momba ny fandringanana ny vahoaka Amôrita: ampit Deot 3.8-11.'
  - type: text
    content: ' teo anatrehany,'
  - type: text
    content: dia olona ranjanana tahaka ny hazo sedera
  - type: text
    content: ary matanjaka tahaka ny hazo ôaka;
  - type: text
    content: eny, nopotehiko avokoa na ny fotony na ny voany.
