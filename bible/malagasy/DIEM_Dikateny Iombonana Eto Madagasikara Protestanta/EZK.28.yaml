document_id: EZK.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza mananontanona hamelezana ny mpanjakan’i Tiro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ry ilay taranak’olombelona, ambarao amin’ny mpanjakan’i Tiro fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Fo miavonavona no nilazanao ny tenanao ho andriamanitra sady mipetraka amina sezafiandrianana mendrika an’ireo andriamanitra, dia sezafiandrianana eo anivon-dranomasina. Nihevi-tena ho mitovy amin’ireo andriamanitra ianao nefa olombelona ihany fa tsy andriamanitra akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nihambo ho hendry noho i Daniela ianao ka afaka mamantatra na dia ny zavatra miafina indrindra aza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.3 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Danela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Daniela:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny 14.14 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nahazo harena ianao noho ny fahendrenao sy ny fahiratan-tsainao, ka nanangona raki-tsarobidy toy ny volamena sy ny volafotsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nanangona tombom-barotra ianao noho ny fahaizanao ara-barotra; ary izany harena izany no niavonavonan’ny fonao.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Nihevi-tena ho mitovy amin’ireo andriamanitra ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa indro hitondrako vahiny hamely anao, dia izay lozabe indrindra amin’ny hafa firenena; ka hopotipotehiny amin’ny sabatra izay zava-tsoan’ny fahendrenao ary hozimbazimbainy ny fiandriananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Havariny any an-davaka ianao, ka ho faty vokatry ny famonoana an-keriny anao eo anivon’ny ranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mbola sahy hihambo ho andriamanitra ve ianao eo anatrehan’izay hamono hahafaty anao? Olombelona ihany ianao fa tsy andriamanitra, rehefa mby eo an-tanan’izay hamono hahafaty anao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fahafatesana mahafa-baràka toy ny an’ny olona tsy voafora no hahafaty anao eo an-tanan’ny vahiny. Izaho Tompo ANDRIANANAHARY no manambara; teny hentitra avy amiko izany›. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Ry ilay taranak’olombelona, manaova hira fisaonana ny amin’ny mpanjakan’i Tiro. Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Modely tonga lafatra ianao satria feno fahendrena sady tsara tarehy aoka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tao Hedèna, zaridainan’Andriamanitra, no niainanao, dia ilay Hedèna voahodidina tamboho rakotry ny vatosoa isan-karazany: robisy, tôpaza, diamondra, krizôlita, berila, jaspa, safira, robina, emeralda. Firavaka sy haingo volamena voaomana hatramin’ny andro nahariana anao no nentinao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hedèna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 2.8-15. –Tsy azo antoka ny fitanisana ny anaran’ireo karazam-batosoa.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Napetrako teo anilanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' iray mpiaro goavana be'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.14 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'ny kerobima mpiaro:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo Gen 3.24. –Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tendrombohitra voatokana ho an’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia milaza ny toerana voafaritra honenan’ny mpanjakan’i Tiro.'
    marker-yv: yv-n
  - type: text
    text: '; dia niaina teo amin’ilay tendrombohitra voatokana ho an’Andriamanitra ianao ary nandehandeha teo anivon’ny vato manjelanjelatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy nisy hokianina ny fitondrantenanao hatramin’ny andro nahariana anao ka mandra-pisehon’ny ratsy teo aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fandrosoan’ny varotrao no nampihanaka ny herisetra teo anivonao sy nampanota anao. Koa dia aetriko ho sarambabembahoaka ianao ary roahiko tsy ho eo amin’ilay tendrombohitr’Andriamanitra. Ny kerobima mpiaro no mandroaka anao lavitr’ireo vato manjelanjelatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny kerobima mpiaro no mandroaka anao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt grika tranainy, jereo ny and 14 sy ny nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny hatsaran-tarehinao no nampiavonavona ny fonao, ary ny fahombiazanao mamirapiratra no nahasimba ny fahendrenao. Dia azerako amin’ny tany ianao ary atolotro hampitalanjona ireo mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Maro tokoa ny helokao satria tsifahamarinana no nitondranao ny varotrao ka voazimbazimbanao ireo toeram-pivavahanao. Izany no andrehetako afo ao an-tanànanao handevona anao. Izay rehetra hijery anao dia hahita fa hataoko tonga lavenona ianao eto an-tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny firenena rehetra izay mahalala anao dia ho gaga ny aminao, satria ho tonga fampitahorana ianao, sady tsy hisy intsony mandrakizay›. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza mananontanona an’i Tsidôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Ry ilay taranak’olombelona, mitodiha manandrify ny tanàna Tsidôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsidôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe fenisianina teo akaikin’i Tiro ary matetika voatonona miaraka aminy, jereo Is 23.1 sy ny nta.
    marker-yv: yv-n
  - type: text
    text: ', ary ijoroy ny maha-mpaminany anao mba hamelezako azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hirotsaka hamely anao Aho, ry Tsidôna, ary homem-boninahitra eo afovoanao. Amin’izay dia hoekena fa Izaho no TOMPO, rehefa hampihariko aminao ny didim-pitsarako ary hasehoko eo aminao ny maha Andriamanitra masina Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Halefako hamely anao ny areti-mandringana, ary handriaka eny an-dalambenao ny ra. Hananganana ady hatraiza hatraiza ianao, ka hiampatrampatra ao aminao ny fatin’ny mponina. Amin’izay dia hoekena fa Izaho no TOMPO›. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hiaina am-pilaminana i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: «Ireo firenena manodidina an’i Israely dia tsy hisy hanao tsinontsinona azy intsony. Tsy hamelively azy intsony ireo ka mova tsy roy manindrona na tsilo mandrangotra. Amin’izay dia hoekena fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Hangoniko avy any amin’ny firenen-kafa izay nanelezako azy ny Israelita, ka hasehoko eo imason’ireo hafa firenena fa Izaho no Andriamanitra masina. Honina ao amin’ny taniny izy, dia ny tany izay efa nomeko an’i Jakôba mpanompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ao izy no honina am-pilaminana ka hanorina trano sy hamboly voaloboka; eny, honina am-pilaminana izy satria hampiharako famaizana ireo rehetra manodidina azy ka nanao tsinontsinona azy. Amin’izay dia hoekena fa Izaho no TOMPO Andriamaniny.»
