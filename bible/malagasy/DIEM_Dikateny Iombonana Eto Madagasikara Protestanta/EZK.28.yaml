document_id: EZK.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Loza mananontanona hamelezana ny mpanjakan’i Tiro
  - type: text
    content: 'Nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: Fahafatesana mahafa-baràka toy ny an’ny olona tsy voafora no hahafaty anao eo an-tanan’ny vahiny. Izaho Tompo ANDRIANANAHARY no manambara; teny hentitra avy amiko izany›. »
  '11':
  - type: text
    content: 'Dia nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  '12':
  - type: text
    content: '«Ry ilay taranak’olombelona, manaova hira fisaonana ny amin’ny mpanjakan’i Tiro. Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Modely tonga lafatra ianao satria feno fahendrena sady tsara tarehy aoka izany. '
  '13':
  - type: text
    content: 'Tao Hedèna, zaridainan’Andriamanitra, no niainanao, dia ilay Hedèna voahodidina tamboho rakotry ny vatosoa isan-karazany: robisy, tôpaza, diamondra, krizôlita, berila, jaspa, safira, robina, emeralda. Firavaka sy haingo volamena voaomana hatramin’ny andro nahariana anao no nentinao'
  - type: note
    content: 'Hedèna: jereo Gen 2.8-15. –Tsy azo antoka ny fitanisana ny anaran’ireo karazam-batosoa.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Napetrako teo anilanao ny '
  - type: text
    content: kerobima
  - type: text
    content: ' iray mpiaro goavana be'
  - type: note
    content: 'ny kerobima mpiaro: jereo Gen 3.24. –Ny tendrombohitra voatokana ho an’Andriamanitra dia milaza ny toerana voafaritra honenan’ny mpanjakan’i Tiro.'
  - type: text
    content: '; dia niaina teo amin’ilay tendrombohitra voatokana ho an’Andriamanitra ianao ary nandehandeha teo anivon’ny vato manjelanjelatra. '
  '15':
  - type: text
    content: 'Tsy nisy hokianina ny fitondrantenanao hatramin’ny andro nahariana anao ka mandra-pisehon’ny ratsy teo aminao. '
  '16':
  - type: text
    content: Ny fandrosoan’ny varotrao no nampihanaka ny herisetra teo anivonao sy nampanota anao. Koa dia aetriko ho sarambabembahoaka ianao ary roahiko tsy ho eo amin’ilay tendrombohitr’Andriamanitra. Ny kerobima mpiaro no mandroaka anao lavitr’ireo vato manjelanjelatra
  - type: note
    content: 'Ny kerobima mpiaro no mandroaka anao: araka ny dkt grika tranainy, jereo ny and 14 sy ny nta.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ny hatsaran-tarehinao no nampiavonavona ny fonao, ary ny fahombiazanao mamirapiratra no nahasimba ny fahendrenao. Dia azerako amin’ny tany ianao ary atolotro hampitalanjona ireo mpanjaka. '
  '18':
  - type: text
    content: 'Maro tokoa ny helokao satria tsifahamarinana no nitondranao ny varotrao ka voazimbazimbanao ireo toeram-pivavahanao. Izany no andrehetako afo ao an-tanànanao handevona anao. Izay rehetra hijery anao dia hahita fa hataoko tonga lavenona ianao eto an-tany. '
  '19':
  - type: text
    content: Ny firenena rehetra izay mahalala anao dia ho gaga ny aminao, satria ho tonga fampitahorana ianao, sady tsy hisy intsony mandrakizay›. »
  - type: heading
    content: Loza mananontanona an’i Tsidôna
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, ambarao amin’ny mpanjakan’i Tiro fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Fo miavonavona no nilazanao ny tenanao ho andriamanitra sady mipetraka amina sezafiandrianana mendrika an’ireo andriamanitra, dia sezafiandrianana eo anivon-dranomasina. Nihevi-tena ho mitovy amin’ireo andriamanitra ianao nefa olombelona ihany fa tsy andriamanitra akory. '
  '20':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '21':
  - type: text
    content: «Ry ilay taranak’olombelona, mitodiha manandrify ny tanàna Tsidôna
  - type: note
    content: 'Tsidôna: tanàn-dehibe fenisianina teo akaikin’i Tiro ary matetika voatonona miaraka aminy, jereo Is 23.1 sy ny nta.'
  - type: text
    content: ', ary ijoroy ny maha-mpaminany anao mba hamelezako azy. '
  '22':
  - type: text
    content: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hirotsaka hamely anao Aho, ry Tsidôna, ary homem-boninahitra eo afovoanao. Amin’izay dia hoekena fa Izaho no TOMPO, rehefa hampihariko aminao ny didim-pitsarako ary hasehoko eo aminao ny maha Andriamanitra masina Ahy. '
  '23':
  - type: text
    content: Halefako hamely anao ny areti-mandringana, ary handriaka eny an-dalambenao ny ra. Hananganana ady hatraiza hatraiza ianao, ka hiampatrampatra ao aminao ny fatin’ny mponina. Amin’izay dia hoekena fa Izaho no TOMPO›. »
  - type: heading
    content: Hiaina am-pilaminana i Israely
  '24':
  - type: text
    content: «Ireo firenena manodidina an’i Israely dia tsy hisy hanao tsinontsinona azy intsony. Tsy hamelively azy intsony ireo ka mova tsy roy manindrona na tsilo mandrangotra. Amin’izay dia hoekena fa Izaho no TOMPO.
  '25':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Hangoniko avy any amin’ny firenen-kafa izay nanelezako azy ny Israelita, ka hasehoko eo imason’ireo hafa firenena fa Izaho no Andriamanitra masina. Honina ao amin’ny taniny izy, dia ny tany izay efa nomeko an’i Jakôba mpanompoko. '
  '26':
  - type: text
    content: Ao izy no honina am-pilaminana ka hanorina trano sy hamboly voaloboka; eny, honina am-pilaminana izy satria hampiharako famaizana ireo rehetra manodidina azy ka nanao tsinontsinona azy. Amin’izay dia hoekena fa Izaho no TOMPO Andriamaniny.»
  '3':
  - type: text
    content: Nihambo ho hendry noho i Daniela ianao ka afaka mamantatra na dia ny zavatra miafina indrindra aza
  - type: note
    content: 'Danela na Daniela: jereo ny 14.14 sy nta.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Nahazo harena ianao noho ny fahendrenao sy ny fahiratan-tsainao, ka nanangona raki-tsarobidy toy ny volamena sy ny volafotsy. '
  '5':
  - type: text
    content: Nanangona tombom-barotra ianao noho ny fahaizanao ara-barotra; ary izany harena izany no niavonavonan’ny fonao.›
  '6':
  - type: text
    content: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Nihevi-tena ho mitovy amin’ireo andriamanitra ianao. '
  '7':
  - type: text
    content: 'Koa indro hitondrako vahiny hamely anao, dia izay lozabe indrindra amin’ny hafa firenena; ka hopotipotehiny amin’ny sabatra izay zava-tsoan’ny fahendrenao ary hozimbazimbainy ny fiandriananao. '
  '8':
  - type: text
    content: 'Havariny any an-davaka ianao, ka ho faty vokatry ny famonoana an-keriny anao eo anivon’ny ranomasina. '
  '9':
  - type: text
    content: 'Mbola sahy hihambo ho andriamanitra ve ianao eo anatrehan’izay hamono hahafaty anao? Olombelona ihany ianao fa tsy andriamanitra, rehefa mby eo an-tanan’izay hamono hahafaty anao! '
