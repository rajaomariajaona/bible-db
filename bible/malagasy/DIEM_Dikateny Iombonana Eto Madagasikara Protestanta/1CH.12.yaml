document_id: 1CH.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo niaraka tamin’i Davida voalohany tany Tsiklaga
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ireto kosa ny olona tonga tany amin’i Davida tao Tsiklaga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsiklaga: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 27.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' fony izy mbola niery an’i Saoly, zanakalahin’i Kisy; izy ireo dia lehilahy mahery mpanampy an’i Davida amin’ny ady, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: sady mpitondra tsipìka sy antsamotady ka mahay manavia sy manavanana raha mandefa vato sy zana-tsipîka.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireto ny avy amin’ny tarik’i Saoly, anisan’ny fokon’i Benjamîna: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Ahihezera, filohany, sy i Joasy rahalahiny, zanakalahin’i Semahà avy any Gibehà; i Jeziela sy i Peleta, zanakalahin’i Hazmavety; i Berekià sy i Jehò, avy any Hanatôta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: i Jismahià, avy any Gibehôna, lehilahy mahery tao amin’ny «andian’ny telopolo lahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andian’ny telopolo lahy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 23.8-39. –Amin’ny dkt sasany dia ny and 5 no faran’ny and 4; ary ny and 6-41 kosa dia voalahatra ho and 5-40.
    marker-yv: yv-n
  - type: text
    text: '», sady anankiray amin’ny lehibeny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'i Jeremià sy i Jahaziela ary i Jôhanàna; i Jôzabada, avy any Gederà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'i Elehozay sy i Jerimôta mbamin’i Behalià sy i Semarià ary i Sefatià, samy avy any Harofa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'i Elkanà sy i Jisià mbamin’i Hazarela sy i Jôhezera ary i Jasôbehama, samy taranak’i Kôra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary i Jôhelà sy i Zebadià, samy zanakalahin’i Jerôhama, avy any Gedôra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nisy koa olona avy amin’ny fokon’i Gada, niendaka hanatona an’i Davida tao amin’ny toby fiarovana tany an-taniefitra. Izy ireo dia lehilahy maherifo, miaramila mahay miady sady zatra mampiasa ampinga sy lefona: masiaka toy ny liona no fahitana azy, ary faingam-pandeha toy ny gazela eny an-tendrombohitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-14
  - type: text
    text: 'Miisa 11 ry zareo: dia i Hezera sy i Hôbadià, i Eliaba sy i Mismanà, i Jeremià sy i Hatahy, i Eliela sy i Jôhanàna mbamin’i Elzabada sy i Jeremià ary i Makbanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mpitari-tafika ireo avy amin’ny taranak’i Gada ireo ka ny kely indrindra aminy dia mahatoraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mahatoraka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mifehy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'ny zato lahy, ary ny lehibe aminy mahatoraka ny arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izy ireo no niampita an’i Jôrdàna tamin’ny volana voalohany amin’ny taona, raha iny mbola nihoatra iny avokoa ny morony, ka nampandositra ny mponina rehetra teny amin’ny lohasaha atsinanana sy andrefana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nisy koa avy amin’ny fokon’i Benjamîna sy i Joda tonga hitady an’i Davida tao amin’ny toby fiarovana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nivoaka hitsena azy i Davida ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha fihavanana no ahatongavanareo atỳ amiko mba hanampy ahy, dia amin’ny foko tokoa no hikambanako aminareo; fa raha hamadika ahy kosa mba hanolotra ahy amin’ny fahavaloko, na tsy nanao an-keriny aza ny tanako, dia aoka ilay Andriamanitry ny razantsika no hijery sy hamaly anareo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tamin’izay, dia nentanin’ny Fanahin’Andriamanitra i Hamasay, filohan’ny «andian’ny telopolo lahy», ka niantso hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Anao izahay, ry Davida ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miandany aminao izahay, ry zanakalahin’i Jisay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fiadanana, fiadanana anie ho anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fiadanana anie ho an’ireo mpanampy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ilay Andriamanitrao no efa manampy anao!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia noraisin’i Davida ireo ka notendreny ho isan’ny filohan’ny andian-tafika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nisy avy amin’ny fokon’i Manase lasa nikambana tamin’i Davida fony izy nomba ny Filistinina mba hiady amin’i Saoly; saingy tsy nanampy ny Filistinina ry i Davida, satria rehefa nifampidinika ny andrianan’ny Filistinina dia nampiverina azy, fa hoy ireo hoe: «Hikambana amin’i Saoly tompony i Davida, ka hanolotra antsika aminy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hikambana... antsika aminy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mampahatsiaro ny fitantarana ao amin’ny 1 Sam 29.1-5.
    marker-yv: yv-n
  - type: text
    text: '». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa raha niverina ho any Tsiklaga iny i Davida no tonga nikambana taminy kosa ireo olona anisan’ny fokon’i Manase, dia i Hadnà sy i Jôzabada, i Jedihaela sy i Mikaela mbamin’i Jôzakara sy i Elihò ary i Tsiletahy izay samy mpifehy arivo tao amin’i Manase. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nanampy ny andian-tafik’i Davida ireo satria lehilahy mahery avokoa, ary nanjary komandy tao amin’ny tafiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Isan’andro isan’andro dia nisy olona tonga tany amin’i Davida hanampy azy hany ka nanjary lehibe dia lehibe tokoa ny tafik’i Davida
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hany... tafik’i Davida: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny hita ao amin’ny RM dia hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mandrapahatongany ho toby lehibe toy ny tobin’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; kanefa toa fomba fiteny hebreo enti-milaza ny zavatra goavana tsy hita lany ity hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: toy ny tobin’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ity.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny isan’ireo mpomba an’i Davida tonga tany Hebrôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izao no isan’ny vatan-dehilahy vonona hiady izay tonga tany amin’i Davida tao Hebrôna mba hamindra aminy ny fanjakàn’i Saoly araka ny baikon’ny TOMPO:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tamin’ny taranak’i Joda, dia nisy 6 800 lahy mpitondra ampinga sy lefona sady vonona hiady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tamin’ny i Simehôna, dia nisy 7 100 lahy maherifo an’ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ny taranak’i Levỳ, dia nisy 4 600 lahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'niampy an’i Jôiadà, filohan’ny taranak’i Aharôna, niaraka tamin’ny 3 700 lahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'sy niampy an’i Tsadôka, tovolahy maherifo, niaraka tamin’ny 22 lahy samy filoha teo amin’ny fianakavian-drainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tamin’ny taranak’i Benjamîna, mpiray foko amin’i Saoly, dia nisy telo arivo lahy; ka ny ankamaroan’ireo, talohan’izao, dia mpikarakara ny ankohonan’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin’ny taranak’i Efraîma, dia nisy 20 800 lahy, samy maherifo sady nalaza teo amin’ny fianakaviany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tamin’ny antsasa-pokon’i Manase, dia nisy 18 000 lahy izay notsongaina anarana mba handeha hampanjaka an’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin’ny taranak’i Jisakara, dia nisy manamboninahitra roanjato lahy sy ireo mpiray foko rehetra teo ambany fifehezany; ireo manamboninahitra ireo dia samy nahay mamantatra tsara ny fotoana mety sy ny fomba tokony hikatrohan’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tamin’i Zebolòna, dia nisy miaramila 50 000, zatra ady sy vonon-kiantafika, nirongo fiadiana isan-karazany sady afaka miara-mientana tsara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sady afaka...mientana tsara: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sady vonona hanampy an’i Davida tsy am-pisalasalana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', araka ny stf hebreo vitsivitsy sy ny dkt grika Septoazinta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tamin’i Naftalỳ, dia nisy manamboninahitra arivo lahy arahin’ny miaramilany 37 000 nirongo ampinga sy lefona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tamin’i Dana, dia nisy 28 600 lahy, vonon-kiantafika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tamin’i Asera, dia nisy miaramila 40 000, zatra ady sy vonon-kiantafika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tamin’ireo teny ampita atsinanan’i Jôrdàna, izany hoe tamin’ny Reobenita sy ny Gadita ary ny antsasa-pokon’i Manase, dia nisy 120 000 ny lehilahy mirongo fiadiana isan-karazany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ireo miaramila rehetra vonon-kilahatra hiady ireo no tonga tao Hebrôna tamin’ny fony manontolo mba hampanjaka an’i Davida amin’i Israely lafy valo; ary ny Israelita sisa rehetra koa niray fo mba hampanjaka an’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nijanona telo andro tao Hebrôna niaraka tamin’i Davida ireo miaramila ka nihinana sy nisotro izay efa nomanin’ireo havany ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ankoatra izany koa, ny olona avy amin’ny faritany akaiky, ary hatrany amin’i Jisakara sy Zebolòna ary i Naftalỳ aza, dia nitondra sakafo ho azy ireo tamin’ny boriky sy rameva ary molè sy omby; dia koba lafarinina, mofo aviavy, voaloboka maina, divay, menaka, ary omby sy ondry aman’osy betsaka koa; satria nisy firavoravoana tao Israely.
