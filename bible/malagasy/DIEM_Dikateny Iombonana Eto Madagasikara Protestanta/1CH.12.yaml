document_id: 1CH.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo niaraka tamin’i Davida voalohany tany Tsiklaga
  - type: text
    content: Ireto kosa ny olona tonga tany amin’i Davida tao Tsiklaga
  - type: note
    content: 'Tsiklaga: jereo 1 Sam 27.6 sy nta.'
  - type: text
    content: ' fony izy mbola niery an’i Saoly, zanakalahin’i Kisy; izy ireo dia lehilahy mahery mpanampy an’i Davida amin’ny ady, '
  '10':
  - type: text
    content: 'Miisa 11 ry zareo: dia i Hezera sy i Hôbadià, i Eliaba sy i Mismanà, i Jeremià sy i Hatahy, i Eliela sy i Jôhanàna mbamin’i Elzabada sy i Jeremià ary i Makbanay. '
  '15':
  - type: text
    content: Mpitari-tafika ireo avy amin’ny taranak’i Gada ireo ka ny kely indrindra aminy dia mahatoraka
  - type: note
    content: mahatoraka na mifehy.
  - type: text
    content: 'ny zato lahy, ary ny lehibe aminy mahatoraka ny arivo. '
  '16':
  - type: text
    content: Izy ireo no niampita an’i Jôrdàna tamin’ny volana voalohany amin’ny taona, raha iny mbola nihoatra iny avokoa ny morony, ka nampandositra ny mponina rehetra teny amin’ny lohasaha atsinanana sy andrefana.
  '17':
  - type: text
    content: 'Nisy koa avy amin’ny fokon’i Benjamîna sy i Joda tonga hitady an’i Davida tao amin’ny toby fiarovana. '
  '18':
  - type: text
    content: 'Dia nivoaka hitsena azy i Davida ka nanao taminy hoe:'
  - type: text
    content: –Raha fihavanana no ahatongavanareo atỳ amiko mba hanampy ahy, dia amin’ny foko tokoa no hikambanako aminareo; fa raha hamadika ahy kosa mba hanolotra ahy amin’ny fahavaloko, na tsy nanao an-keriny aza ny tanako, dia aoka ilay Andriamanitry ny razantsika no hijery sy hamaly anareo!
  '19':
  - type: text
    content: 'Tamin’izay, dia nentanin’ny Fanahin’Andriamanitra i Hamasay, filohan’ny «andian’ny telopolo lahy», ka niantso hoe:'
  - type: text
    content: –Anao izahay, ry Davida ô!
  - type: text
    content: Miandany aminao izahay, ry zanakalahin’i Jisay!
  - type: text
    content: Fiadanana, fiadanana anie ho anao
  - type: text
    content: ary fiadanana anie ho an’ireo mpanampy anao,
  - type: text
    content: satria ilay Andriamanitrao no efa manampy anao!
  - type: text
    content: Dia noraisin’i Davida ireo ka notendreny ho isan’ny filohan’ny andian-tafika.
  '2':
  - type: text
    content: sady mpitondra tsipìka sy antsamotady ka mahay manavia sy manavanana raha mandefa vato sy zana-tsipîka.
  - type: text
    content: 'Ireto ny avy amin’ny tarik’i Saoly, anisan’ny fokon’i Benjamîna: '
  '20':
  - type: text
    content: 'Ary nisy avy amin’ny fokon’i Manase lasa nikambana tamin’i Davida fony izy nomba ny Filistinina mba hiady amin’i Saoly; saingy tsy nanampy ny Filistinina ry i Davida, satria rehefa nifampidinika ny andrianan’ny Filistinina dia nampiverina azy, fa hoy ireo hoe: «Hikambana amin’i Saoly tompony i Davida, ka hanolotra antsika aminy'
  - type: note
    content: 'hikambana... antsika aminy: mampahatsiaro ny fitantarana ao amin’ny 1 Sam 29.1-5.'
  - type: text
    content: '». '
  '21':
  - type: text
    content: 'Koa raha niverina ho any Tsiklaga iny i Davida no tonga nikambana taminy kosa ireo olona anisan’ny fokon’i Manase, dia i Hadnà sy i Jôzabada, i Jedihaela sy i Mikaela mbamin’i Jôzakara sy i Elihò ary i Tsiletahy izay samy mpifehy arivo tao amin’i Manase. '
  '22':
  - type: text
    content: 'Nanampy ny andian-tafik’i Davida ireo satria lehilahy mahery avokoa, ary nanjary komandy tao amin’ny tafiny. '
  '23':
  - type: text
    content: Isan’andro isan’andro dia nisy olona tonga tany amin’i Davida hanampy azy hany ka nanjary lehibe dia lehibe tokoa ny tafik’i Davida
  - type: note
    content: 'hany... tafik’i Davida: ny hita ao amin’ny RM dia hoe mandrapahatongany ho toby lehibe toy ny tobin’Andriamanitra; kanefa toa fomba fiteny hebreo enti-milaza ny zavatra goavana tsy hita lany ity hoe toy ny tobin’Andriamanitra ity.'
  - type: text
    content: .
  - type: heading
    content: Ny isan’ireo mpomba an’i Davida tonga tany Hebrôna
  '24':
  - type: text
    content: 'Izao no isan’ny vatan-dehilahy vonona hiady izay tonga tany amin’i Davida tao Hebrôna mba hamindra aminy ny fanjakàn’i Saoly araka ny baikon’ny TOMPO:'
  '25':
  - type: text
    content: 'Tamin’ny taranak’i Joda, dia nisy 6 800 lahy mpitondra ampinga sy lefona sady vonona hiady. '
  '26':
  - type: text
    content: 'Tamin’ny i Simehôna, dia nisy 7 100 lahy maherifo an’ady. '
  '27':
  - type: text
    content: 'Tamin’ny taranak’i Levỳ, dia nisy 4 600 lahy, '
  '28':
  - type: text
    content: 'niampy an’i Jôiadà, filohan’ny taranak’i Aharôna, niaraka tamin’ny 3 700 lahy, '
  '29':
  - type: text
    content: 'sy niampy an’i Tsadôka, tovolahy maherifo, niaraka tamin’ny 22 lahy samy filoha teo amin’ny fianakavian-drainy. '
  '3':
  - type: text
    content: 'i Ahihezera, filohany, sy i Joasy rahalahiny, zanakalahin’i Semahà avy any Gibehà; i Jeziela sy i Peleta, zanakalahin’i Hazmavety; i Berekià sy i Jehò, avy any Hanatôta; '
  '30':
  - type: text
    content: 'Tamin’ny taranak’i Benjamîna, mpiray foko amin’i Saoly, dia nisy telo arivo lahy; ka ny ankamaroan’ireo, talohan’izao, dia mpikarakara ny ankohonan’i Saoly. '
  '31':
  - type: text
    content: 'Tamin’ny taranak’i Efraîma, dia nisy 20 800 lahy, samy maherifo sady nalaza teo amin’ny fianakaviany avy. '
  '32':
  - type: text
    content: 'Tamin’ny antsasa-pokon’i Manase, dia nisy 18 000 lahy izay notsongaina anarana mba handeha hampanjaka an’i Davida. '
  '33':
  - type: text
    content: 'Tamin’ny taranak’i Jisakara, dia nisy manamboninahitra roanjato lahy sy ireo mpiray foko rehetra teo ambany fifehezany; ireo manamboninahitra ireo dia samy nahay mamantatra tsara ny fotoana mety sy ny fomba tokony hikatrohan’ny Israelita. '
  '34':
  - type: text
    content: Tamin’i Zebolòna, dia nisy miaramila 50 000, zatra ady sy vonon-kiantafika, nirongo fiadiana isan-karazany sady afaka miara-mientana tsara
  - type: note
    content: 'sady afaka...mientana tsara: dkt hafa sady vonona hanampy an’i Davida tsy am-pisalasalana, araka ny stf hebreo vitsivitsy sy ny dkt grika Septoazinta.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Tamin’i Naftalỳ, dia nisy manamboninahitra arivo lahy arahin’ny miaramilany 37 000 nirongo ampinga sy lefona. '
  '36':
  - type: text
    content: 'Tamin’i Dana, dia nisy 28 600 lahy, vonon-kiantafika. '
  '37':
  - type: text
    content: 'Tamin’i Asera, dia nisy miaramila 40 000, zatra ady sy vonon-kiantafika. '
  '38':
  - type: text
    content: Tamin’ireo teny ampita atsinanan’i Jôrdàna, izany hoe tamin’ny Reobenita sy ny Gadita ary ny antsasa-pokon’i Manase, dia nisy 120 000 ny lehilahy mirongo fiadiana isan-karazany.
  '39':
  - type: text
    content: 'Ireo miaramila rehetra vonon-kilahatra hiady ireo no tonga tao Hebrôna tamin’ny fony manontolo mba hampanjaka an’i Davida amin’i Israely lafy valo; ary ny Israelita sisa rehetra koa niray fo mba hampanjaka an’i Davida. '
  '4':
  - type: text
    content: i Jismahià, avy any Gibehôna, lehilahy mahery tao amin’ny «andian’ny telopolo lahy
  - type: note
    content: 'andian’ny telopolo lahy: jereo 2 Sam 23.8-39. –Amin’ny dkt sasany dia ny and 5 no faran’ny and 4; ary ny and 6-41 kosa dia voalahatra ho and 5-40.'
  - type: text
    content: '», sady anankiray amin’ny lehibeny; '
  '40':
  - type: text
    content: 'Dia nijanona telo andro tao Hebrôna niaraka tamin’i Davida ireo miaramila ka nihinana sy nisotro izay efa nomanin’ireo havany ho azy. '
  '41':
  - type: text
    content: Ankoatra izany koa, ny olona avy amin’ny faritany akaiky, ary hatrany amin’i Jisakara sy Zebolòna ary i Naftalỳ aza, dia nitondra sakafo ho azy ireo tamin’ny boriky sy rameva ary molè sy omby; dia koba lafarinina, mofo aviavy, voaloboka maina, divay, menaka, ary omby sy ondry aman’osy betsaka koa; satria nisy firavoravoana tao Israely.
  '5':
  - type: text
    content: 'i Jeremià sy i Jahaziela ary i Jôhanàna; i Jôzabada, avy any Gederà; '
  '6':
  - type: text
    content: 'i Elehozay sy i Jerimôta mbamin’i Behalià sy i Semarià ary i Sefatià, samy avy any Harofa; '
  '7':
  - type: text
    content: 'i Elkanà sy i Jisià mbamin’i Hazarela sy i Jôhezera ary i Jasôbehama, samy taranak’i Kôra; '
  '8':
  - type: text
    content: ary i Jôhelà sy i Zebadià, samy zanakalahin’i Jerôhama, avy any Gedôra.
  '9':
  - type: text
    content: 'Nisy koa olona avy amin’ny fokon’i Gada, niendaka hanatona an’i Davida tao amin’ny toby fiarovana tany an-taniefitra. Izy ireo dia lehilahy maherifo, miaramila mahay miady sady zatra mampiasa ampinga sy lefona: masiaka toy ny liona no fahitana azy, ary faingam-pandeha toy ny gazela eny an-tendrombohitra. '
