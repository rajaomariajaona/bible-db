document_id: JER.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Norahonana ho faty i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vao niandoha ny fanjakan’i Jôiakima, zanakalahin’i Josià sady mpanjakan’i Joda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 22.13 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', dia nisy teny avy amin’ny TOMPO tonga tamin’i Jeremià nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Izao no voalazan’ny TOMPO: mijoroa eo an-kianjan’ny tranoko ianao ary mitenena amin’ny olona rehetra mponin’ireo tanànan’i Joda ka tonga hivavaka ao. Avereno aminy avokoa ny teny nasaiko hambaranao aminy, ka aza anesorana na kely aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Angamba hihaino ihany izy, ka hiala amin’ny fitondrantena ratsy. Mihevitra ny hamely azy amin’ny loza Aho noho ny ratsy fanaony, nefa tsy hampihariko izany raha mihaino izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa ambarao azy hoe: Izao no lazain’ny TOMPO: ‹Mihainoa Ahy ianareo ka araho ny lalàna izay nomeko anareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary mihainoa ny tenin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' mpanompoko. Tsy nitsahatra naniraka azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 7.25 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' tatỳ aminareo Aho, nefa tsy nihaino azy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa raha tsy mihaino ianareo, dia horavako tahaka ny nandravako ilay tao Silao ity trano ity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jos 18.1; Jer 7.1-15; Sal 78.60.
    marker-yv: yv-n
  - type: text
    text: ; ary ny tanànan’i Jerosalema dia hataoko oha-panozonana any amin’ny firenena rehetra eran-tany.»›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny mpisorona sy ny mpaminany ary ny vahoaka rehetra teo dia samy nahare an’i Jeremià nanambara ireo teny ireo tao an-tranon’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa rehefa tapitra voalazan’i Jeremià ny teny rehetra izay nasain’ny TOMPO nambarany tamin’ny besinimaro teo, dia nosamborin’izy rehetra i Jeremià ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mendrika ho faty ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ahoana no ahasahianao milaza amin’ny anaran’ny TOMPO fa horavana tahaka ny tao Silao ity trano ity, ary ho simba sady tsy hisy mponina ity tanàna ity?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’izay dia nitangorona hamely an’i Jeremià izay rehetra teo an-kianjan’ny tranon’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nony ren’ireo mpitondran’i Joda ny zava-nitranga, dia niakatra avy tao an-dapan’ny mpanjaka hankao an-tranon’ny TOMPO izy, ka nipetraka hitsara teo anoloan’ny vavahady vaovao amin’ny tranon’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy ireo mpisorona ama-mpaminany tamin’ny mpitondran’i Joda ary koa tamin’ny vahoaka rehetra teo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mendrika ho faty io lehilahy io, satria naminany ny hamelezana ity tanàna ity izy, ary ny sofinareo mihitsy no efa nandre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa namaly ny mpitondra sy ny vahoaka rehetra teo i Jeremià ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny TOMPO no naniraka ahy hanambara ny hamelezana ity trano ity sy ity tanàna ity araka izay efa renareo teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa ankehitriny hatsarao ny fitondrantenanareo sy ny fomba fanaonareo; henoy izay lazain’ny TOMPO Andriamanitrareo, dia tsy hampiharin’ny TOMPO ilay loza efa nolazainy hamelezana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha ny tenako dia indro eo am-pelatananareo; ka ataovy amiko izay heverinareo ho tsara sy mahitsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Saingy izao, raha hamono ahy ho faty ianareo, dia fantaro fa mamono ny tsy manan-tsiny ka hibaby ny vokatr’izany ianareo sy ny mponina rehetra amin’ity tanàna ity; satria ny TOMPO tokoa no naniraka ahy hankatỳ aminareo hanambara ireo teny rehetra ireo mba ho renareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’izay dia hoy ireo mpitondra sy ny vahoaka rehetra tamin’ny mpisorona sy ny mpaminany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mendrika ho faty ity lehilahy ity fa tamin’ny anaran’ny TOMPO Andriamanitsika no nitenenany tamintsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nisy nitsangana aza ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' ka niteny tamin’ny vahoaka vory teo hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '–Tamin’ny andron’i Hezekià mpanjakan’i Joda dia nisy mpaminany atao hoe Mikà avy any Môreseta. Niteny tamin’ny vahoaka rehetra tao Joda izy ka nanao hoe: Izao no lazain’ny TOMPOn’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Ho voatrongitrongy toy ny tanimboly i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tonga korontam-bato i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tonga havoana misy lobolobo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tendrombohitra misy ny tempoly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mik 3.12.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moa nampamono azy ho faty va i Hezekià mpanjaka sy ny vahoaka rehetra tao Joda? Tsia, fa nanaja ny TOMPO izy ary niezaka hampitony azy. Koa tsy nampiharin’ny TOMPO ilay loza efa nolazainy hamelezana azy. Fa isika kosa hampidi-doza lehibe ho an’ny tenantsika, raha manameloka ho faty io lehilahy io.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nasain’i Jôiakima novonoina i Orià mpaminany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nisy mpaminany iray hafa koa niteny tamin’ny anaran’ny TOMPO, dia i Orià zanakalahin’i Semahià sady avy any Kiriata-Jeharima. Nanambara ny hamelezana an’i Jerosalema sy ny tanin’i Joda koa izy tahaka ny hafatra rehetra efa nataon’i Jeremià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha nandre ny tenin’i Orià i Jôiakima mpanjaka sy ireo mpiambina azy ary ny mpitondra rehetra, dia nitady hahafaty azy. Ren’i Orià izany, dia natahotra izy ka nandositra tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa i Jôiakima mpanjaka naniraka an’i Elnatàna zanakalahin’i Akbôra mbamin’ny lehilahy vitsivitsy hankany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Koa nalain’ireo avy any Ejipta i Orià ary nentiny teo amin’i Jôiakima mpanjaka. Dia nasainy novonoina izy ary nariany tao amin’ny fasam-bahoaka ny fatiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa i Jeremià kosa narovan’i Ahikama zanakalahin’i Safàna ka tsy nisy sahy nanolotra azy ho eo an-tanan’ny vahoaka mba hovonoina ho faty.
