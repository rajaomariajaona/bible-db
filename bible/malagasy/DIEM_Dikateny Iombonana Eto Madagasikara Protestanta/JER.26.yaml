document_id: JER.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Norahonana ho faty i Jeremià
  - type: text
    content: Vao niandoha ny fanjakan’i Jôiakima, zanakalahin’i Josià sady mpanjakan’i Joda
  - type: note
    content: Jereo 22.13 sy nta.
  - type: text
    content: ', dia nisy teny avy amin’ny TOMPO tonga tamin’i Jeremià nanao hoe: '
  '10':
  - type: text
    content: 'Nony ren’ireo mpitondran’i Joda ny zava-nitranga, dia niakatra avy tao an-dapan’ny mpanjaka hankao an-tranon’ny TOMPO izy, ka nipetraka hitsara teo anoloan’ny vavahady vaovao amin’ny tranon’ny TOMPO. '
  '11':
  - type: text
    content: 'Dia hoy ireo mpisorona ama-mpaminany tamin’ny mpitondran’i Joda ary koa tamin’ny vahoaka rehetra teo:'
  - type: text
    content: –Mendrika ho faty io lehilahy io, satria naminany ny hamelezana ity tanàna ity izy, ary ny sofinareo mihitsy no efa nandre.
  '12':
  - type: text
    content: 'Fa namaly ny mpitondra sy ny vahoaka rehetra teo i Jeremià ka nanao hoe:'
  - type: text
    content: '–Ny TOMPO no naniraka ahy hanambara ny hamelezana ity trano ity sy ity tanàna ity araka izay efa renareo teo. '
  '13':
  - type: text
    content: 'Koa ankehitriny hatsarao ny fitondrantenanareo sy ny fomba fanaonareo; henoy izay lazain’ny TOMPO Andriamanitrareo, dia tsy hampiharin’ny TOMPO ilay loza efa nolazainy hamelezana anareo. '
  '14':
  - type: text
    content: 'Ary raha ny tenako dia indro eo am-pelatananareo; ka ataovy amiko izay heverinareo ho tsara sy mahitsy. '
  '15':
  - type: text
    content: Saingy izao, raha hamono ahy ho faty ianareo, dia fantaro fa mamono ny tsy manan-tsiny ka hibaby ny vokatr’izany ianareo sy ny mponina rehetra amin’ity tanàna ity; satria ny TOMPO tokoa no naniraka ahy hankatỳ aminareo hanambara ireo teny rehetra ireo mba ho renareo.
  '16':
  - type: text
    content: 'Tamin’izay dia hoy ireo mpitondra sy ny vahoaka rehetra tamin’ny mpisorona sy ny mpaminany hoe:'
  - type: text
    content: –Tsy mendrika ho faty ity lehilahy ity fa tamin’ny anaran’ny TOMPO Andriamanitsika no nitenenany tamintsika.
  '17':
  - type: text
    content: 'Nisy nitsangana aza ny '
  - type: text
    content: loholona
  - type: text
    content: ' ka niteny tamin’ny vahoaka vory teo hoe:'
  '18':
  - type: text
    content: '–Tamin’ny andron’i Hezekià mpanjakan’i Joda dia nisy mpaminany atao hoe Mikà avy any Môreseta. Niteny tamin’ny vahoaka rehetra tao Joda izy ka nanao hoe: Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: '«Ho voatrongitrongy toy ny tanimboly i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: ho tonga korontam-bato i Jerosalema,
  - type: text
    content: ary ho tonga havoana misy lobolobo
  - type: text
    content: ny tendrombohitra misy ny tempoly
  - type: note
    content: Jereo Mik 3.12.
  - type: text
    content: .»
  '19':
  - type: text
    content: Moa nampamono azy ho faty va i Hezekià mpanjaka sy ny vahoaka rehetra tao Joda? Tsia, fa nanaja ny TOMPO izy ary niezaka hampitony azy. Koa tsy nampiharin’ny TOMPO ilay loza efa nolazainy hamelezana azy. Fa isika kosa hampidi-doza lehibe ho an’ny tenantsika, raha manameloka ho faty io lehilahy io.
  - type: heading
    content: Nasain’i Jôiakima novonoina i Orià mpaminany
  '2':
  - type: text
    content: '«Izao no voalazan’ny TOMPO: mijoroa eo an-kianjan’ny tranoko ianao ary mitenena amin’ny olona rehetra mponin’ireo tanànan’i Joda ka tonga hivavaka ao. Avereno aminy avokoa ny teny nasaiko hambaranao aminy, ka aza anesorana na kely aza. '
  '20':
  - type: text
    content: 'Nisy mpaminany iray hafa koa niteny tamin’ny anaran’ny TOMPO, dia i Orià zanakalahin’i Semahià sady avy any Kiriata-Jeharima. Nanambara ny hamelezana an’i Jerosalema sy ny tanin’i Joda koa izy tahaka ny hafatra rehetra efa nataon’i Jeremià. '
  '21':
  - type: text
    content: 'Fa raha nandre ny tenin’i Orià i Jôiakima mpanjaka sy ireo mpiambina azy ary ny mpitondra rehetra, dia nitady hahafaty azy. Ren’i Orià izany, dia natahotra izy ka nandositra tany Ejipta. '
  '22':
  - type: text
    content: 'Fa i Jôiakima mpanjaka naniraka an’i Elnatàna zanakalahin’i Akbôra mbamin’ny lehilahy vitsivitsy hankany Ejipta. '
  '23':
  - type: text
    content: Koa nalain’ireo avy any Ejipta i Orià ary nentiny teo amin’i Jôiakima mpanjaka. Dia nasainy novonoina izy ary nariany tao amin’ny fasam-bahoaka ny fatiny.
  '24':
  - type: text
    content: Fa i Jeremià kosa narovan’i Ahikama zanakalahin’i Safàna ka tsy nisy sahy nanolotra azy ho eo an-tanan’ny vahoaka mba hovonoina ho faty.
  '3':
  - type: text
    content: 'Angamba hihaino ihany izy, ka hiala amin’ny fitondrantena ratsy. Mihevitra ny hamely azy amin’ny loza Aho noho ny ratsy fanaony, nefa tsy hampihariko izany raha mihaino izy. '
  '4':
  - type: text
    content: 'Koa ambarao azy hoe: Izao no lazain’ny TOMPO: ‹Mihainoa Ahy ianareo ka araho ny lalàna izay nomeko anareo; '
  '5':
  - type: text
    content: 'ary mihainoa ny tenin’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpanompoko. Tsy nitsahatra naniraka azy'
  - type: note
    content: Jereo 7.25 sy nta.
  - type: text
    content: ' tatỳ aminareo Aho, nefa tsy nihaino azy ianareo. '
  '6':
  - type: text
    content: Fa raha tsy mihaino ianareo, dia horavako tahaka ny nandravako ilay tao Silao ity trano ity
  - type: note
    content: Jereo Jos 18.1; Jer 7.1-15; Sal 78.60.
  - type: text
    content: ; ary ny tanànan’i Jerosalema dia hataoko oha-panozonana any amin’ny firenena rehetra eran-tany.»›
  '7':
  - type: text
    content: 'Ny mpisorona sy ny mpaminany ary ny vahoaka rehetra teo dia samy nahare an’i Jeremià nanambara ireo teny ireo tao an-tranon’ny TOMPO. '
  '8':
  - type: text
    content: 'Koa rehefa tapitra voalazan’i Jeremià ny teny rehetra izay nasain’ny TOMPO nambarany tamin’ny besinimaro teo, dia nosamborin’izy rehetra i Jeremià ka nataony hoe:'
  - type: text
    content: '–Mendrika ho faty ianao. '
  '9':
  - type: text
    content: Ahoana no ahasahianao milaza amin’ny anaran’ny TOMPO fa horavana tahaka ny tao Silao ity trano ity, ary ho simba sady tsy hisy mponina ity tanàna ity?
  - type: text
    content: 'Tamin’izay dia nitangorona hamely an’i Jeremià izay rehetra teo an-kianjan’ny tranon’ny TOMPO. '
