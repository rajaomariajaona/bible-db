  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho lavo sy ho mongomongo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho harato sy fandrika ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny mponina ao Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary maro no ho voafandrika eo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho afa-mitsoaka.
  '16':
  - type: usfm
