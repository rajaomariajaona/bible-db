      marker-yv: yv-n
    - type: text
      text: ' Izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny fanjakana roa eto Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
