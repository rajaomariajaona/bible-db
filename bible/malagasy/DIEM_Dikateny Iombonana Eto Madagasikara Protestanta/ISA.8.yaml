  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa vizana sy noana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny hanoanana dia hisafoaka izy
  - type: usfm
    marker: q1
    children:
