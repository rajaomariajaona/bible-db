    children:
    - type: text
      text: Faingàna hamabo –Dodòna handroba!
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy ny TOMPO tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandraisa takela-tanimanga iray lehibe, dia soraty araka ny fanaon’ny olona izao: «Ho an’i Mahera-Salala-Hasy-Baza» na hoe «Ho an’i Faingàna hamabo-Dodòna handroba.»'
