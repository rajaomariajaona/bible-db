        children:
        - type: text
          text: jereo Heb 2.13. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nomen’ny Tompo ahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo mpianatr’i Isaià izany.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Misy milaza hoe: «Anontanionareo ny avelon’ny maty izay mibitsibitsika sy misaosao eo am-pilazana ny hoavy. Ara-dalàna raha manontany izay heveriny ho andriamanitra ny vahoaka iray; ara-dalàna raha manontany ny maty izy mba ho fanasoavana ny velona.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nasehoko tamin’ny vavolombelona roa mahatoky izany, dia tamin’i Orià mpisorona sy i Zakarià zanakalahin’i Jeberekià. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Izao kosa no havalinareo izany: «Ao amin’ny fampianarana sy ny hafatry ny TOMPO ihany no tsy maintsy hiverenana.» Fa izay tsy miteny araka izany baiko izany dia tsy hiposahan’ny taratry ny maraina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: ft
        children:
