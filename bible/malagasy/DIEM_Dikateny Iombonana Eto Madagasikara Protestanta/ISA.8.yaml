  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hiandry ny TOMPO aho satria manafin-tava amin’ny taranak’i Jakôba Izy izao, kanefa manantena Azy aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny tenako sy ny zaza izay nomen’ny TOMPO ahy dia natao famantarana sy fambara mialoha ho an’i Israely avy amin’ny TOMPOn’izao rehetra izao sady monina ao an-tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
