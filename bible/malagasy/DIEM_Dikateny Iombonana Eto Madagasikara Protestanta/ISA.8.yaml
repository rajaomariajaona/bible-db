    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Manaova fikasana fa ho rava izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaova lahateny aman-karajia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hisy ho tanteraka akory ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Andriamanitra no momba anay
    - type: usfm
      marker: f
