      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Mt 10.28; Lk 12.4-5; 1Pt 3.14-15. Toa tsy i Isaià ihany fa ny mpianatr’i Isaià koa no itenenan’ny Tompo eto.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: Toeramasina tsy azo zimbazimbaina ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho vato mahasolafaka
  - type: usfm
    marker: q1
