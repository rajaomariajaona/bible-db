document_id: ISA.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Faingàna hamabo –Dodòna handroba!
  - type: text
    content: 'Ary hoy ny TOMPO tamiko:'
  - type: text
    content: '–Mandraisa takela-tanimanga iray lehibe, dia soraty araka ny fanaon’ny olona izao: «Ho an’i Mahera-Salala-Hasy-Baza» na hoe «Ho an’i Faingàna hamabo-Dodòna handroba.»'
  '10':
  - type: text
    content: Manaova fikasana fa ho rava izany,
  - type: text
    content: manaova lahateny aman-karajia
  - type: text
    content: fa tsy hisy ho tanteraka akory ireny,
  - type: text
    content: satria Andriamanitra no momba anay
  - type: note
    content: Jereo Is 7.14; 8.8.
  - type: text
    content: .
  - type: heading
    content: Ny vato mahatafintohina
  '11':
  - type: text
    content: 'Fony nihazona ahy ny TOMPO ka nampitandrina ahy tsy hanahaka ny toetoetran’ity vahoaka ity, dia niteny tamiko toy izao:'
  '12':
  - type: text
    content: «Aza ataonareo hoe fikomiana avokoa
  - type: text
    content: izay lazain’ity vahoaka ity ho fikomiana,
  - type: text
    content: ary aza matahotra na mangovitra akory
  - type: text
    content: amin’izay zavatra atahorany.»
  '13':
  - type: text
    content: Ny TOMPOn’izao rehetra izao ihany
  - type: text
    content: no aoka hoekenareo ho masina!
  - type: text
    content: Izy no hatahoranareo sy hangovitanareo
  - type: note
    content: 'And 12-13: ampit Mt 10.28; Lk 12.4-5; 1Pt 3.14-15. Toa tsy i Isaià ihany fa ny mpianatr’i Isaià koa no itenenan’ny Tompo eto.'
  - type: text
    content: .
  '14':
  - type: text
    content: Toeramasina tsy azo zimbazimbaina ny Tompo,
  - type: text
    content: ka ho vato mahasolafaka
  - type: text
    content: sy vatolampy mampianjera
  - type: note
    content: 'vatolampy mampianjera: jereo 1Pt 2.8.'
  - type: text
    content: ' Izy,'
  - type: text
    content: ho an’ny fanjakana roa eto Israely;
  - type: text
    content: ary maro no hianjera eo
  - type: text
    content: ka ho lavo sy ho mongomongo.
  - type: text
    content: Ho harato sy fandrika ny Tompo
  - type: text
    content: ho an’ny mponina ao Jerosalema;
  - type: text
    content: ary maro no ho voafandrika eo
  - type: text
    content: ka tsy ho afa-mitsoaka.
  '16':
  - type: text
    content: «Fonosy izany hafatra izany, ry Isaià,
  - type: text
    content: ary asio tombokase ny fampianarana
  - type: text
    content: 'ho eo anivon’ireo '
  - type: text
    content: mpianatro
  - type: text
    content: ' ihany.»'
  - type: heading
    content: Fotoam-pahanginana sy fiandrasana
  '17':
  - type: text
    content: 'Hiandry ny TOMPO aho satria manafin-tava amin’ny taranak’i Jakôba Izy izao, kanefa manantena Azy aho. '
  '18':
  - type: text
    content: 'Ny tenako sy ny zaza izay nomen’ny TOMPO ahy dia natao famantarana sy fambara mialoha ho an’i Israely avy amin’ny TOMPOn’izao rehetra izao sady monina ao an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: note
    content: 'And 17-18: jereo Heb 2.13. –nomen’ny Tompo ahy: ireo mpianatr’i Isaià izany.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'Misy milaza hoe: «Anontanionareo ny avelon’ny maty izay mibitsibitsika sy misaosao eo am-pilazana ny hoavy. Ara-dalàna raha manontany izay heveriny ho andriamanitra ny vahoaka iray; ara-dalàna raha manontany ny maty izy mba ho fanasoavana ny velona.» '
  '2':
  - type: text
    content: 'Nasehoko tamin’ny vavolombelona roa mahatoky izany, dia tamin’i Orià mpisorona sy i Zakarià zanakalahin’i Jeberekià. '
  '20':
  - type: text
    content: 'Izao kosa no havalinareo izany: «Ao amin’ny fampianarana sy ny hafatry ny TOMPO ihany no tsy maintsy hiverenana.» Fa izay tsy miteny araka izany baiko izany dia tsy hiposahan’ny taratry ny maraina'
  - type: note
    content: Jereo 9.1.
  - type: text
    content: .
  - type: heading
    content: Haizina mikitroka
  '21':
  - type: text
    content: Handalo ao amin’io tany io ny olona,
  - type: text
    content: izay efa vizana sy noana.
  - type: text
    content: Noho ny hanoanana dia hisafoaka izy
  - type: text
    content: ka hanozona ny mpanjakany sy ilay Andriamaniny.
  - type: text
    content: Hiandrandra ny lanitra izy
  '22':
  - type: text
    content: ary hiondrika hijery ny tany,
  - type: text
    content: ka indro fahoriana sy haizina no hitany,
  - type: text
    content: haizim-pito mampitebiteby sy alina tsy misy mangirana
  - type: note
    content: 'alina tsy misy mangirana: araka ny dkt grika tranainy sy tahaka ny Ham 5.20.'
  - type: text
    content: .
  - type: heading
    content: Ny mpanjaka vaovao
  '23':
  - type: text
    content: Kanefa tsy hisy haizina intsony
  - type: text
    content: eo amin’ny toerana izay efa nozoim-pahoriana.
  - type: text
    content: Nataon’ny Tompo afa-baràka fahiny
  - type: text
    content: ny tanin’i Zebolòna sy i Naftalỳ;
  - type: text
    content: fa atỳ aoriana kosa dia homeny voninahitra
  - type: text
    content: ny lalana manamorona ny ranomasina,
  - type: text
    content: sy ny faritra eny am-pita atsinanan’i Jôrdàna
  - type: text
    content: ary koa i Galilea onenan’ny hafa firenena
  - type: note
    content: 'Zebolòna, Naftalỳ: foko israelita anankiroa nonina teo andrefan’ny farihin’i Kinereta sy ny faritr’i Jôrdàna ambony; nozanahin’i Asiria ny tanin’izy roa tonta teo anelanelan’ny taona 734-732 tal J.K., niaraka tamin’ny faritra eny am-pita atsinanan’i Jôrdàna ary koa i Galilea. –ny lalana manamorona ny ranomasina dia mampitohy an’i Ejipta sy i Siria ka nanaraka ny morontsirak’i Palestinina tamin’iny lemak’i Sarôna iny. –And 8.23–9.1: jereo Mt 4.15-16; Lk 1.79.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia nankao amin’ny '
  - type: text
    content: mpaminanivavy
  - type: text
    content: ' vadiko aho, ka nitoe-jaza izy ary niteraka zazalahy. Koa niteny tamiko ny TOMPO hoe:'
  - type: text
    content: '–I Mahera-Salala-Hasy-Baza no ataovy anarany. '
  '4':
  - type: text
    content: Fa raha tsy mbola mahay miantso Dada sy Neny akory io zaza io, dia hoentina eo anatrehan’ny mpanjakan’i Asiria ny haren’i Damasy sy ny remby voababo tao Samaria.
  - type: heading
    content: Ny fandrobana an’i Samaria
  '5':
  - type: text
    content: 'Mbola nanafatra ahy indray ny TOMPO ka nanao hoe:'
  '6':
  - type: text
    content: –Ity vahoaka ity dia manao tsinontsinona
  - type: text
    content: ny ranon’i Silôà
  - type: note
    content: Ny ranon’i Silôà dia rano avy any amin’ny loharanon’i Gihôna ka voatariky ny lakandrano hankao anatin’i Jerosalema. Mamatsy rano an’i Jerosalema izany, na mandritra ny fahirano aza.
  - type: text
    content: ' izay misononòka mora;'
  - type: text
    content: ka kivy izy manoloana an’i Retsîna
  - type: text
    content: sy manoloana ilay zanakalahin’i Remalià.
  '7':
  - type: text
    content: Noho izany, hakariko hamely ity vahoaka ity
  - type: text
    content: ny ranon’i Eofrata, izay rano be sady manonja,
  - type: text
    content: dia ny mpanjakan’i Asiria
  - type: text
    content: sy ny heriny manontolo.
  - type: text
    content: Hiala amin’ny làlany ny ony Eofrata
  - type: text
    content: ka hihoatra ny morony rehetra,
  '8':
  - type: text
    content: hibosesika any Joda sady hanafotra azy,
  - type: text
    content: ary hiakatra hatreny am-bozony.
  - type: text
    content: Eny, hihanaka lavitra amin’ny sisiny roa i Eofrata
  - type: text
    content: ka hanenika ny velaran’ny taninao, ry Himanoela
  - type: note
    content: Jereo Is 7.14; 8.10.
  - type: text
    content: .
  - type: heading
    content: Ny tetika tsy mahomby kotrehin’ireo vahoaka
  '9':
  - type: text
    content: Mangovita ianareo, ry firenena,
  - type: text
    content: ka mihorohoroa fatratra!
  - type: text
    content: Aoka hanongilan-tsofina ianareo,
  - type: text
    content: 'ry faritra rehetra any lavitra any:'
  - type: text
    content: hirongo fiadiana tokoa ianareo,
  - type: text
    content: nefa hihorohoro fatratra;
  - type: text
    content: eny, hirongo fiadiana tokoa ianareo,
  - type: text
    content: nefa hihorohoro fatratra.
