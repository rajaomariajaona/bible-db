    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fony nihazona ahy ny TOMPO ka nampitandrina ahy tsy hanahaka ny toetoetran’ity vahoaka ity, dia niteny tamiko toy izao:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: «Aza ataonareo hoe fikomiana avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay lazain’ity vahoaka ity ho fikomiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza matahotra na mangovitra akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay zavatra atahorany.»
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny TOMPOn’izao rehetra izao ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no aoka hoekenareo ho masina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no hatahoranareo sy hangovitanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
