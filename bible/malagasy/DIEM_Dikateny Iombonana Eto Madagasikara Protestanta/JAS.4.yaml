document_id: JAS.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisakaizana amin’izao tontolo izao
  - type: text
    content: 'Avy aiza moa ireo ady sy fifandirana eo aminareo? Ny fototr’ireny dia ny filàndratsinareo, filàndratsy izay miady ao amin’ny tenanareo. '
  '10':
  - type: text
    content: Manetre tena eo anatrehan’ny Tompo, dia hanandratra anareo Izy.
  - type: heading
    content: Aza manameloka ny namana
  '11':
  - type: text
    content: 'Aza mifanaratsy, ry havana! Izay manaratsy ny havana iray finoana na manameloka azy dia sady manaratsy no manameloka ny '
  - type: text
    content: lalàna
  - type: text
    content: '. Ka raha manameloka ny lalàna ianao, dia tsy mpanatanteraka ny lalàna fa mpitsara azy. '
  '12':
  - type: text
    content: Andriamanitra anefa no hany mpanome ny lalàna sady mpitsara; Izy no hany mahavonjy sy mahavery. Fa iza kosa ianao no manameloka ny namanao?
  - type: heading
    content: Aza mirehareha tsy amin’antony
  '13':
  - type: text
    content: 'Mihainoa ahy izao ianareo manao hoe: «Anio na rahampitso dia hankany Ananona izahay, handany iray taona any ka hivarotra sy hahazo vola.» '
  '14':
  - type: text
    content: Tsy fantatrareo izay hanjo ny ainareo rahampitso
  - type: note
    content: 'And 13-14: ampit Ohab 27.1.'
  - type: text
    content: '! Toy ny etona kely miserana vetivety ianareo, avy eo dia manjavona. '
  '15':
  - type: text
    content: 'Aleo ianareo manao hoe: «Raha sitrapon’ny Tompo ka velona aina, dia hataonay izao na izatsy»; '
  '16':
  - type: text
    content: 'fa izao ianareo dia sahy mirehareha sy mandoka tena; ratsy avokoa ny fireharehana toy izany. '
  '17':
  - type: text
    content: Koa izay mahalala ny tsara tokony hatao nefa tsy manao, dia manota.
  '2':
  - type: text
    content: 'Mitsiriritra zavatra ianareo nefa tsy mahazo, dia mamono olona; maniry mafy hanan-javatra ianareo nefa tsy afaka manana, dia mifanditra sy miady. Tsy manana ianareo, satria tsy mangataka amin’Andriamanitra; '
  '3':
  - type: text
    content: 'mangataka amin’Andriamanitra ianareo nefa tsy mahazo, satria ratsy fangataka: izay hiaranan’ny filàndratsinareo no angatahinareo. '
  '4':
  - type: text
    content: 'Olona mivadika amin’Andriamanitra ianareo! Tsy fantatrareo ve fa izay misakaiza amin’izao tontolo izao dia fahavalon’Andriamanitra? Koa na iza na iza te ho sakaizan’izao tontolo izao, dia mampahatonga ny tenany ho fahavalon’Andriamanitra. '
  '5':
  - type: text
    content: 'Aza heverinareo fa tsy misy antony ny tenin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Feno faniriana mirehidrehitra ny fanahy izay napetrak’Andriamanitra ao anatintsika'
  - type: note
    content: 'Feno... anatintsika: dkt hafa Ilay Fanahy Masina izay namponenin’Andriamanitra ao anatintsika dia tena saropiaro antsika na hoe Mahasaropiaro an’Andriamanitra tokoa ny fanahy napetrany ao anatintsika. Io rijan-teny io dia tsy hita na ao amin’ny Test. T. na ao amin’ny Test. V.'
  - type: text
    content: '.» '
  '6':
  - type: text
    content: 'Manome antsika fahasoavana lehibe lavitra anefa Andriamanitra, satria hoy ny Soratra Masina: «Toherin’Andriamanitra ny mpiavonavona, fa omeny fahasoavana kosa ny manetry tena'
  - type: note
    content: Ohab 3.34, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '.» '
  '7':
  - type: text
    content: 'Koa maneke an’Andriamanitra ianareo; ary manohera ny '
  - type: text
    content: devoly
  - type: text
    content: ', dia handositra lavitra anareo izy. '
  '8':
  - type: text
    content: Manatòna an’Andriamanitra, dia hanatona anareo Izy
  - type: note
    content: Ampit Za 1.3; Mal 3.7.
  - type: text
    content: '. Sasao ny tananareo, ry mpanota; ary diovy ny fonareo, ry mpiroa fo. '
  '9':
  - type: text
    content: 'Malahelova, mitomania ary midradradradrà; aoka hody fitomaniana ny fihomehezanareo ary hody alahelo ny fifalianareo. '
