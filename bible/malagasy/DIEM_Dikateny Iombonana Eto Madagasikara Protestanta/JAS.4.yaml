document_id: JAS.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisakaizana amin’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy aiza moa ireo ady sy fifandirana eo aminareo? Ny fototr’ireny dia ny filàndratsinareo, filàndratsy izay miady ao amin’ny tenanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitsiriritra zavatra ianareo nefa tsy mahazo, dia mamono olona; maniry mafy hanan-javatra ianareo nefa tsy afaka manana, dia mifanditra sy miady. Tsy manana ianareo, satria tsy mangataka amin’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mangataka amin’Andriamanitra ianareo nefa tsy mahazo, satria ratsy fangataka: izay hiaranan’ny filàndratsinareo no angatahinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Olona mivadika amin’Andriamanitra ianareo! Tsy fantatrareo ve fa izay misakaiza amin’izao tontolo izao dia fahavalon’Andriamanitra? Koa na iza na iza te ho sakaizan’izao tontolo izao, dia mampahatonga ny tenany ho fahavalon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aza heverinareo fa tsy misy antony ny tenin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Feno faniriana mirehidrehitra ny fanahy izay napetrak’Andriamanitra ao anatintsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Feno... anatintsika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ilay Fanahy Masina izay namponenin’Andriamanitra ao anatintsika dia tena saropiaro antsika
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mahasaropiaro an’Andriamanitra tokoa ny fanahy napetrany ao anatintsika.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Io rijan-teny io dia tsy hita na ao amin’ny Test. T. na ao amin’ny Test. V.'
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manome antsika fahasoavana lehibe lavitra anefa Andriamanitra, satria hoy ny Soratra Masina: «Toherin’Andriamanitra ny mpiavonavona, fa omeny fahasoavana kosa ny manetry tena'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ohab 3.34, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa maneke an’Andriamanitra ianareo; ary manohera ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ', dia handositra lavitra anareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Manatòna an’Andriamanitra, dia hanatona anareo Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Za 1.3; Mal 3.7.
    marker-yv: yv-n
  - type: text
    text: '. Sasao ny tananareo, ry mpanota; ary diovy ny fonareo, ry mpiroa fo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Malahelova, mitomania ary midradradradrà; aoka hody fitomaniana ny fihomehezanareo ary hody alahelo ny fifalianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Manetre tena eo anatrehan’ny Tompo, dia hanandratra anareo Izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aza manameloka ny namana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aza mifanaratsy, ry havana! Izay manaratsy ny havana iray finoana na manameloka azy dia sady manaratsy no manameloka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: '. Ka raha manameloka ny lalàna ianao, dia tsy mpanatanteraka ny lalàna fa mpitsara azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Andriamanitra anefa no hany mpanome ny lalàna sady mpitsara; Izy no hany mahavonjy sy mahavery. Fa iza kosa ianao no manameloka ny namanao?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aza mirehareha tsy amin’antony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mihainoa ahy izao ianareo manao hoe: «Anio na rahampitso dia hankany Ananona izahay, handany iray taona any ka hivarotra sy hahazo vola.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy fantatrareo izay hanjo ny ainareo rahampitso
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 13-14:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Ohab 27.1.
    marker-yv: yv-n
  - type: text
    text: '! Toy ny etona kely miserana vetivety ianareo, avy eo dia manjavona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aleo ianareo manao hoe: «Raha sitrapon’ny Tompo ka velona aina, dia hataonay izao na izatsy»; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fa izao ianareo dia sahy mirehareha sy mandoka tena; ratsy avokoa ny fireharehana toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa izay mahalala ny tsara tokony hatao nefa tsy manao, dia manota.
