document_id: ACT.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ampangain’ny Jiosy i Paoly
  - type: text
    content: 'Dimy andro taorian’izay, dia tonga tao Kesaria i Hananià '
  - type: text
    content: mpisorombe
  - type: text
    content: ', tafaraka tamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' sasantsasany sy tamin’ny mpisolovava atao hoe Tertòly. Tonga teo amin’i Feliksa governora'
  - type: note
    content: Jereo 23.24 sy nta.
  - type: text
    content: ' izy rehetra mba hametraka fitarainana manohitra an’i Paoly. '
  '10':
  - type: text
    content: 'Notondroin’ny governora hiteny i Paoly ka namaly hoe:'
  - type: text
    content: '–Fantatro fa efa mpitsara hatramin’ny taona maro eto amin’ity firenena ity ianao ka amim-pitokiana no andaharako ny fiarovako tena. '
  '11':
  - type: text
    content: 'Azonao itadiavana porofo fa tsy mbola mihoatra ny 12 andro no nahatongavako tany Jerosalema mba hivavaka amin’Andriamanitra. '
  '12':
  - type: text
    content: Tsy nisy nahita ahy niady hevitra tamin’olona tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' na koa nampitabataba vahoaka tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' na tany an-toeran-kafa tao an-tanàna. '
  '13':
  - type: text
    content: 'Ary tsy afaka hanome porofo anao amin’izay iampangany ahy ry zareo. '
  '14':
  - type: text
    content: 'Ekeko eto anatrehanao kosa fa manompo ny Andriamanitry ny razanay aho amin’ny anarahako ny lalana nosoritan’Andriamanitra, izay lazain’ireo hoe diso. Izaho anefa dia mino izay rehetra voasoratra ao amin’ny bokin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ' sy ny '
  - type: text
    content: mpaminany
  - type: text
    content: '. '
  '15':
  - type: text
    content: Matoky an’Andriamanitra aho ary manantena, tahaka ny nanantenan-dry zareo koa, fa samy hitsangana ho velona, na ny olo-marina na ny olo-meloka
  - type: note
    content: Ampit Dan 12.2.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Noho izany, dia miezaka lalandava aho mba tsy homelohin’ny fieritreretako eo anatrehan’Andriamanitra sy ny olona. '
  '17':
  - type: text
    content: 'Taona maro no tsy naha tao Jerosalema ahy vao tafaverina indray aho nitondra vola ho fanampiana ny fireneko ary hanolotra fanatitra amin’Andriamanitra. '
  '18':
  - type: text
    content: 'Izany indrindra no nataoko tamin’ny nahitan-dry zareo ahy tao an-kianjan’ny tempoly: nanao ny fombam-pihavanana fidiovana aho, ka tsy nisy vahoaka vory na tabataba niseho'
  - type: note
    content: 'And 17-18: jereo 21.17-28.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Fa Jiosy sasantsasany avy tamin’ny faritany Azia no tao, ka izy ireo no tokony hanatrika anao etoana hiampanga ahy raha manana alahelo amiko. '
  '2':
  - type: text
    content: 'Nantsoina i Paoly ary dia nampangain’i Tertòly toy izao:'
  - type: text
    content: '–Andriamatoa governora hajaina, ianao no isian’izao fandriampahalemana tonga lafatra iadananay izao, ary ny fitondranao feno fahendrena no mahatonga ireo fivoarana mahasoa ity firenena ity. '
  '20':
  - type: text
    content: 'Na aoka ireto olona ireto hilaza raha misy fahadisoana heveriny fa mahameloka ahy tamin’ilay nijoroako niatrika ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ', '
  '21':
  - type: text
    content: 'afa-tsy ilay fanambaràna nataoko tamin’ny feo avo fony izaho nijoro nanoloana azy rehetra hoe: «Noho izaho mino ny '
  - type: text
    content: fitsanganan’ny maty
  - type: text
    content: ' no itsarana ahy eto anatrehanareo anio'
  - type: note
    content: Jereo 23.6.
  - type: text
    content: .»
  '22':
  - type: text
    content: 'Fantatr’i Feliksa mazava tokoa ny amin’ity lalana nosoritan’Andriamanitra ity ka dia nahemony ho aoriana ny fanohizana ny fitsarana sady noravany izy rehetra nilazany hoe:'
  - type: text
    content: –Rehefa tafidina atỳ i Lisia komandy, dia hanapa-kevitra momba ny raharahanareo aho.
  '23':
  - type: text
    content: Nomen’ny governora baiko ilay kapiteny mpiandraikitra an’i Paoly mba hiambina azy, saingy hamela azy halaladalaka ihany sady tsy hisy sakaizany sakanana tsy hikarakara azy.
  - type: heading
    content: Miatrika an’i Feliksa sy i Drosila i Paoly
  '24':
  - type: text
    content: Nony afaka andro vitsivitsy, dia tonga i Feliksa sy i Drosila
  - type: note
    content: 'Feliksa: jereo 23.24 sy nta. –Drosila: zanaka faravavin’i Herôda Agripà (jereo 12.1); nalain’i Feliksa tamin’ny mpanjakan’i Emesa, izay vadiny voalohany izy.'
  - type: text
    content: ' vadiny, izay vehivavy Jiosy. Nampanalain’ny governora i Paoly ka nohenoiny izay nolazainy momba ny finoana an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa. '
  '25':
  - type: text
    content: 'Raha nidinidinika momba ny toetra tia rariny sy mahonon-tena ary momba ny fitsarana ho avy anefa i Paoly, dia raiki-tahora i Feliksa ka nanao hoe:'
  - type: text
    content: –Mandehana aloha izao, fa hampiantso anao indray aho rehefa malalaka!
  '26':
  - type: text
    content: Nanantena koa i Feliksa fa homen’i Paoly vola, ka izany no nampanalainy azy matetika hiresahana.
  '27':
  - type: text
    content: Rehefa afaka roa taona, dia nodiasan’i Pôrsy Festo
  - type: note
    content: I Pôrsy Festo dia tonga governoran’i Jodea tokony ho tamin’ny taona 59 na 60.
  - type: text
    content: ' amin’ny maha governora i Feliksa. Ary satria te hahazo sitraka amin’ny Jiosy i Feliksa, dia navelany ho ao am-ponja i Paoly.'
  '3':
  - type: text
    content: 'Koa noho ireo soa raisinay lalandava ary hatraiza hatraiza, dia mankasitraka anao tokoa izahay. '
  '4':
  - type: text
    content: 'Tsy te hitana anao maharitra anefa aho fa niangavy ny hamoram-ponao mba hihaino anay vetivety. '
  '5':
  - type: text
    content: 'Tsikaritray fa mampidi-doza mihitsy io lehilahy io: mpampikorontana ny Jiosy any am-pielezana izy sady mitarika ny antoko '
  - type: text
    content: Nazareanina
  - type: note
    content: Jereo Mt 2.23 sy nta.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ny '
  - type: text
    content: tempoly
  - type: text
    content: ' avy aza no sahiny vetavetaina, ka dia nosamborinay izy. [Satrinay ny hitsara azy araka ny '
  - type: text
    content: lalànanay
  - type: text
    content: ', '
  '7':
  - type: text
    content: 'kanefa tonga i Lisia komandy nanao an-keriny mafy naka azy teo am-pelatananay. '
  '8':
  - type: text
    content: Ary dia nasain’i Lisia mankatỳ aminao ny mpiampanga azy.] Rehefa manao famotorana io lehilahy io ianao, dia hahita fa marina avokoa ny zavatra iampanganay azy.
  '9':
  - type: text
    content: Nohamafisin’ny manampahefana jiosy ny fiampangana ka nolazainy fa tena izany no izy.
  - type: heading
    content: Miaro tena eo anatrehan’i Feliksa i Paoly
