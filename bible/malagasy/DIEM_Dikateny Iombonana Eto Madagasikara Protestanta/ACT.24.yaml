document_id: ACT.24,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ampangain’ny Jiosy i Paoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimy andro taorian’izay, dia tonga tao Kesaria i Hananià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorombe
    - type: text
      text: ', tafaraka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' sasantsasany sy tamin’ny mpisolovava atao hoe Tertòly. Tonga teo amin’i Feliksa governora'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 23.24 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izy rehetra mba hametraka fitarainana manohitra an’i Paoly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notondroin’ny governora hiteny i Paoly ka namaly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatro fa efa mpitsara hatramin’ny taona maro eto amin’ity firenena ity ianao ka amim-pitokiana no andaharako ny fiarovako tena. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Azonao itadiavana porofo fa tsy mbola mihoatra ny 12 andro no nahatongavako tany Jerosalema mba hivavaka amin’Andriamanitra. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy nisy nahita ahy niady hevitra tamin’olona tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' na koa nampitabataba vahoaka tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' na tany an-toeran-kafa tao an-tanàna. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary tsy afaka hanome porofo anao amin’izay iampangany ahy ry zareo. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ekeko eto anatrehanao kosa fa manompo ny Andriamanitry ny razanay aho amin’ny anarahako ny lalana nosoritan’Andriamanitra, izay lazain’ireo hoe diso. Izaho anefa dia mino izay rehetra voasoratra ao amin’ny bokin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Matoky an’Andriamanitra aho ary manantena, tahaka ny nanantenan-dry zareo koa, fa samy hitsangana ho velona, na ny olo-marina na ny olo-meloka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Dan 12.2.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Noho izany, dia miezaka lalandava aho mba tsy homelohin’ny fieritreretako eo anatrehan’Andriamanitra sy ny olona. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Taona maro no tsy naha tao Jerosalema ahy vao tafaverina indray aho nitondra vola ho fanampiana ny fireneko ary hanolotra fanatitra amin’Andriamanitra. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany indrindra no nataoko tamin’ny nahitan-dry zareo ahy tao an-kianjan’ny tempoly: nanao ny fombam-pihavanana fidiovana aho, ka tsy nisy vahoaka vory na tabataba niseho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 17-18: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 21.17-28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa Jiosy sasantsasany avy tamin’ny faritany Azia no tao, ka izy ireo no tokony hanatrika anao etoana hiampanga ahy raha manana alahelo amiko. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nantsoina i Paoly ary dia nampangain’i Tertòly toy izao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Andriamatoa governora hajaina, ianao no isian’izao fandriampahalemana tonga lafatra iadananay izao, ary ny fitondranao feno fahendrena no mahatonga ireo fivoarana mahasoa ity firenena ity. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Na aoka ireto olona ireto hilaza raha misy fahadisoana heveriny fa mahameloka ahy tamin’ilay nijoroako niatrika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fitsarana ambony
    - type: text
      text: ', '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'afa-tsy ilay fanambaràna nataoko tamin’ny feo avo fony izaho nijoro nanoloana azy rehetra hoe: «Noho izaho mino ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitsanganan’ny maty
    - type: text
      text: ' no itsarana ahy eto anatrehanareo anio'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 23.6.
      marker-yv: yv-n
    - type: text
      text: .»
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatr’i Feliksa mazava tokoa ny amin’ity lalana nosoritan’Andriamanitra ity ka dia nahemony ho aoriana ny fanohizana ny fitsarana sady noravany izy rehetra nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Rehefa tafidina atỳ i Lisia komandy, dia hanapa-kevitra momba ny raharahanareo aho.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nomen’ny governora baiko ilay kapiteny mpiandraikitra an’i Paoly mba hiambina azy, saingy hamela azy halaladalaka ihany sady tsy hisy sakaizany sakanana tsy hikarakara azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miatrika an’i Feliksa sy i Drosila i Paoly
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony afaka andro vitsivitsy, dia tonga i Feliksa sy i Drosila
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Feliksa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 23.24 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Drosila:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' zanaka faravavin’i Herôda Agripà (jereo 12.1); nalain’i Feliksa tamin’ny mpanjakan’i Emesa, izay vadiny voalohany izy.'
      marker-yv: yv-n
    - type: text
      text: ' vadiny, izay vehivavy Jiosy. Nampanalain’ny governora i Paoly ka nohenoiny izay nolazainy momba ny finoana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nidinidinika momba ny toetra tia rariny sy mahonon-tena ary momba ny fitsarana ho avy anefa i Paoly, dia raiki-tahora i Feliksa ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana aloha izao, fa hampiantso anao indray aho rehefa malalaka!
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanantena koa i Feliksa fa homen’i Paoly vola, ka izany no nampanalainy azy matetika hiresahana.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa afaka roa taona, dia nodiasan’i Pôrsy Festo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Pôrsy Festo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia tonga governoran’i Jodea tokony ho tamin’ny taona 59 na 60.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny maha governora i Feliksa. Ary satria te hahazo sitraka amin’ny Jiosy i Feliksa, dia navelany ho ao am-ponja i Paoly.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa noho ireo soa raisinay lalandava ary hatraiza hatraiza, dia mankasitraka anao tokoa izahay. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy te hitana anao maharitra anefa aho fa niangavy ny hamoram-ponao mba hihaino anay vetivety. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsikaritray fa mampidi-doza mihitsy io lehilahy io: mpampikorontana ny Jiosy any am-pielezana izy sady mitarika ny antoko '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Nazareanina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 2.23 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' avy aza no sahiny vetavetaina, ka dia nosamborinay izy. [Satrinay ny hitsara azy araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànanay
    - type: text
      text: ', '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'kanefa tonga i Lisia komandy nanao an-keriny mafy naka azy teo am-pelatananay. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary dia nasain’i Lisia mankatỳ aminao ny mpiampanga azy.] Rehefa manao famotorana io lehilahy io ianao, dia hahita fa marina avokoa ny zavatra iampanganay azy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nohamafisin’ny manampahefana jiosy ny fiampangana ka nolazainy fa tena izany no izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miaro tena eo anatrehan’i Feliksa i Paoly
    marker-yv: yv-h
