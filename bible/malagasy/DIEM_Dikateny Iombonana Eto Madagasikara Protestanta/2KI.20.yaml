document_id: 2KI.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aretina sy fahasitranan’i Hezekià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Is 38.1-8; 2 Tan 32.24)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany dia narary efa ho faty i Hezekià. Tonga nitsidika azy i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' zanakalahin’i Amôtsa ary nilaza taminy ny tenin’ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ataovy ny farahafatrao amin’ny ankohonanao, satria efa ho faty ianao fa tsy ho velona.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Hezekià namaly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mora amin’ny aloka ny handrosoany ambaratonga folo, fa aoka izy hihemotra ambaratonga folo.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nivavaka tamin’ny TOMPO i Isaià mpaminany ka nahemony ambaratonga folo ny aloka teo amin’ny tohatr’i Ahaza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny tantara mirazotra aminy ao amin’i Isaià dia manatsofoka eto (Is 38.9-20) ny vavaka fisaorana iray nataon’i Hezekià.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noraisin’i Hezekià ireo masoivohon’i Babilôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Is 39)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany fotoana izany i Merôdaky-Baladàna zanakalahin’i Baladàna sady mpanjakan’i Babilôna no nandre fa narary i Hezekià; koa dia nandefa masoivoho mba hitondra taratasy sy fanomezana ho azy izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tamin’ny 703 tal J.K. no nanafahan’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Merôdaky-Baladàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' an’i Babilônia tamin’ny fifehezan’ny Asirianina. Ny fandefasana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: masoivoho
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' teo amin’i Hezekià dia mety midika ho fikatsaham-piarahan’ny Babilônianina sy ny Jiosy hanohitra an’i Asiria.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faly i Hezekià tamin’ny fahatongavan’ireto iraka; dia nasehony azy avokoa ny trano fitahirizany zava-tsarobidy, dia volafotsy sy volamena ary zava-manitra sy menaka mamerovero; nasehony azy koa ny trano fitobian’ny fitaovam-piadiana rehetra mbamin’ny zavatra hafa isan-karazany tao amin’ny fitoeran-drakiny. Tsy nisy zavatra nafeniny azy na ny tao an-dapany na ny tao amin’ny fanjakany manontolo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany dia nankany amin’i Hezekià mpanjaka i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ka nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no nolazain’ireny olona nankatỳ aminao ireny? Ary mba avy taiza moa izy ireo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Hezekià hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy any Babilôna lavitra any izy no nankatỳ amiko.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy indray i Isaià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona avy anefa no hitany tato an-dapanao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’i Hezekià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay rehetra ato an-dapako dia hitany avokoa. Tsy nisy zavatra nafeniko azy ny tao amin’ny fitoeran-drakitro.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Isaià tamin’i Hezekià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Henoy àry ny tenin’ny TOMPO: '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: «Indro ho avy ny andro hitondrana any Babilôna izay rehetra ao an-dapanao sy izay rehetra nangonin’ny razanao ka voatahiry mandraka androany. Tsy hisy tavela eto na inona na inona, hoy Izaho TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 24.13; 2 Tan 36.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary na dia ny sasany amin’ireo taranakao aza hoentina any koa ho mpanompo hanao raharaha ao an-dapan’ny mpanjakan’i Babilôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 24.14-15; Dan 1.1-7.
      marker-yv: yv-n
    - type: text
      text: .»
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Hezekià tamin’i Isaià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsara ny tenin’ny TOMPO izay nambaranao ahy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izy manko anakampo hoe: «Raha velona koa ny aiko, dia hanjaka ny fiadanana sy ny fandriampahalemana.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitodika tany amin’ny rindrina i Hezekià ka nivavaka tamin’ny TOMPO '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny sisa amin’ny tantaran’i Hezekià ary koa ny herimpo isan-karazany nasehony mbamin’ny nanaovany ny dobo sy ny lakan-drano hitarika rano hankao an-tanàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tamin’ny fihadian-tany arkeôlojika no nahitana ny lakan-drano izay nohadian’i Hezekià mba hitarihana ny rano avy amin’ny loharanon’i Gihôna hankao an-tanàna (jereo 1 Mp 1.33 sy nta).
      marker-yv: yv-n
    - type: text
      text: ', dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Joda.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa lasa nodimandry any amin’ny razany izy, dia i Manase zanany lahy no nanjaka nandimby azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary nanao hoe
  - type: usfm
    marker: m
    children:
    - type: text
      text: –TOMPO ô, tsarovy fa nitondra tena tamim-pahamarinana sy tamim-kitsimpo teo anatrehanao aho ary nanao izay tsara eo imasonao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitomany nanao ranomaso havozona i Hezekià.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha mbola tsy tonga teo amin’ny kianja anatin’ny lapa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'teo... lapa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt tranainy izany; fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: teo amin’ny faritra afovoan-tanàna.
      marker-yv: yv-n
    - type: text
      text: 'i Isaià, dia nisy tenin’ny TOMPO taminy nandidy azy '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hiverina ka hilaza amin’i Hezekià filohan’ny vahoakan’Andriamanitra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO Andriamanitr’i Davida razambenao: Reko ny vavakao ary hitako ny ranomasonao. Koa hositraniko ianao, ary raha afakampitso ihany dia hiakatra ao an-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranoko
    - type: text
      text: ' ianao. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hampiako 15 taona ny andro hiainanao; ary ny tenanao sy i Jerosalema dia hafahako amin’ny vahohon’ny mpanjakan’i Asiria. Eny, ity tanàna ity dia harovako noho ny amin’ny tenako sy i Davida mpanompoko.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nampaka ampempan’aviavy i Isaià mba hapetaka eo amin’ny vay ka hahasitrana ny mpanjaka.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Hezekià taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no famantarana fa hositranin’ny TOMPO aho ka afaka hiakatra any an-tranony raha afakampitso?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no famantarana omen’ny TOMPO anao mba hahalalanao fa hotanterahiny tokoa izay nolazainy: Hikisaka ambaratonga folo ny aloka eo amin’ny tohatr’i Ahaza'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tohatr’i Ahaza: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nanana efitrano tao ambony tafon-trano marin-tampona i Ahaza, ka ny tohatra manara-drindrina miakatra mankeo no voateny eto; jereo 23.12.
      marker-yv: yv-n
    - type: text
      text: ; koa handroso sa hihemotra no tianao hikisahany?
