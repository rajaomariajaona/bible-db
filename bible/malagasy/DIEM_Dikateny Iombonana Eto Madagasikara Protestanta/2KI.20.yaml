document_id: 2KI.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Aretina sy fahasitranan’i Hezekià
  - type: heading
    content: (Jereo Is 38.1-8; 2 Tan 32.24)
  - type: text
    content: 'Tamin’izany andro izany dia narary efa ho faty i Hezekià. Tonga nitsidika azy i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Amôtsa ary nilaza taminy ny tenin’ny TOMPO hoe:'
  - type: text
    content: –Ataovy ny farahafatrao amin’ny ankohonanao, satria efa ho faty ianao fa tsy ho velona.
  '10':
  - type: text
    content: 'Ary i Hezekià namaly hoe:'
  - type: text
    content: –Mora amin’ny aloka ny handrosoany ambaratonga folo, fa aoka izy hihemotra ambaratonga folo.
  '11':
  - type: text
    content: Dia nivavaka tamin’ny TOMPO i Isaià mpaminany ka nahemony ambaratonga folo ny aloka teo amin’ny tohatr’i Ahaza
  - type: note
    content: Ny tantara mirazotra aminy ao amin’i Isaià dia manatsofoka eto (Is 38.9-20) ny vavaka fisaorana iray nataon’i Hezekià.
  - type: text
    content: .
  - type: heading
    content: Noraisin’i Hezekià ireo masoivohon’i Babilôna
  - type: heading
    content: (Jereo Is 39)
  '12':
  - type: text
    content: Tamin’izany fotoana izany i Merôdaky-Baladàna zanakalahin’i Baladàna sady mpanjakan’i Babilôna no nandre fa narary i Hezekià; koa dia nandefa masoivoho mba hitondra taratasy sy fanomezana ho azy izy
  - type: note
    content: Tamin’ny 703 tal J.K. no nanafahan’i Merôdaky-Baladàna an’i Babilônia tamin’ny fifehezan’ny Asirianina. Ny fandefasana masoivoho teo amin’i Hezekià dia mety midika ho fikatsaham-piarahan’ny Babilônianina sy ny Jiosy hanohitra an’i Asiria.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Faly i Hezekià tamin’ny fahatongavan’ireto iraka; dia nasehony azy avokoa ny trano fitahirizany zava-tsarobidy, dia volafotsy sy volamena ary zava-manitra sy menaka mamerovero; nasehony azy koa ny trano fitobian’ny fitaovam-piadiana rehetra mbamin’ny zavatra hafa isan-karazany tao amin’ny fitoeran-drakiny. Tsy nisy zavatra nafeniny azy na ny tao an-dapany na ny tao amin’ny fanjakany manontolo.
  '14':
  - type: text
    content: 'Taorian’izany dia nankany amin’i Hezekià mpanjaka i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' ka nanontany azy hoe:'
  - type: text
    content: –Inona no nolazain’ireny olona nankatỳ aminao ireny? Ary mba avy taiza moa izy ireo?
  - type: text
    content: 'Dia novalian’i Hezekià hoe:'
  - type: text
    content: –Avy any Babilôna lavitra any izy no nankatỳ amiko.
  '15':
  - type: text
    content: 'Ka hoy indray i Isaià:'
  - type: text
    content: –Inona avy anefa no hitany tato an-dapanao?
  - type: text
    content: 'Dia hoy ny navalin’i Hezekià:'
  - type: text
    content: –Izay rehetra ato an-dapako dia hitany avokoa. Tsy nisy zavatra nafeniko azy ny tao amin’ny fitoeran-drakitro.
  '16':
  - type: text
    content: 'Ary hoy i Isaià tamin’i Hezekià:'
  - type: text
    content: '–Henoy àry ny tenin’ny TOMPO: '
  '17':
  - type: text
    content: «Indro ho avy ny andro hitondrana any Babilôna izay rehetra ao an-dapanao sy izay rehetra nangonin’ny razanao ka voatahiry mandraka androany. Tsy hisy tavela eto na inona na inona, hoy Izaho TOMPO
  - type: note
    content: Jereo 24.13; 2 Tan 36.10.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Ary na dia ny sasany amin’ireo taranakao aza hoentina any koa ho mpanompo hanao raharaha ao an-dapan’ny mpanjakan’i Babilôna
  - type: note
    content: Jereo 24.14-15; Dan 1.1-7.
  - type: text
    content: .»
  '19':
  - type: text
    content: 'Dia hoy i Hezekià tamin’i Isaià:'
  - type: text
    content: –Tsara ny tenin’ny TOMPO izay nambaranao ahy.
  - type: text
    content: 'Fa hoy izy manko anakampo hoe: «Raha velona koa ny aiko, dia hanjaka ny fiadanana sy ny fandriampahalemana.»'
  '2':
  - type: text
    content: 'Dia nitodika tany amin’ny rindrina i Hezekià ka nivavaka tamin’ny TOMPO '
  '20':
  - type: text
    content: Ny sisa amin’ny tantaran’i Hezekià ary koa ny herimpo isan-karazany nasehony mbamin’ny nanaovany ny dobo sy ny lakan-drano hitarika rano hankao an-tanàna
  - type: note
    content: Tamin’ny fihadian-tany arkeôlojika no nahitana ny lakan-drano izay nohadian’i Hezekià mba hitarihana ny rano avy amin’ny loharanon’i Gihôna hankao an-tanàna (jereo 1 Mp 1.33 sy nta).
  - type: text
    content: ', dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Ary rehefa lasa nodimandry any amin’ny razany izy, dia i Manase zanany lahy no nanjaka nandimby azy.
  '3':
  - type: text
    content: ary nanao hoe
  - type: text
    content: –TOMPO ô, tsarovy fa nitondra tena tamim-pahamarinana sy tamim-kitsimpo teo anatrehanao aho ary nanao izay tsara eo imasonao.
  - type: text
    content: Dia nitomany nanao ranomaso havozona i Hezekià.
  '4':
  - type: text
    content: Fa raha mbola tsy tonga teo amin’ny kianja anatin’ny lapa
  - type: note
    content: 'teo... lapa: araka ny dkt tranainy izany; fa ny RM kosa manao hoe teo amin’ny faritra afovoan-tanàna.'
  - type: text
    content: 'i Isaià, dia nisy tenin’ny TOMPO taminy nandidy azy '
  '5':
  - type: text
    content: 'hiverina ka hilaza amin’i Hezekià filohan’ny vahoakan’Andriamanitra hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO Andriamanitr’i Davida razambenao: Reko ny vavakao ary hitako ny ranomasonao. Koa hositraniko ianao, ary raha afakampitso ihany dia hiakatra ao an-'
  - type: text
    content: tranoko
  - type: text
    content: ' ianao. '
  '6':
  - type: text
    content: Hampiako 15 taona ny andro hiainanao; ary ny tenanao sy i Jerosalema dia hafahako amin’ny vahohon’ny mpanjakan’i Asiria. Eny, ity tanàna ity dia harovako noho ny amin’ny tenako sy i Davida mpanompoko.
  '7':
  - type: text
    content: Ary nampaka ampempan’aviavy i Isaià mba hapetaka eo amin’ny vay ka hahasitrana ny mpanjaka.
  '8':
  - type: text
    content: 'Dia hoy i Hezekià taminy:'
  - type: text
    content: –Inona no famantarana fa hositranin’ny TOMPO aho ka afaka hiakatra any an-tranony raha afakampitso?
  '9':
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: '–Izao no famantarana omen’ny TOMPO anao mba hahalalanao fa hotanterahiny tokoa izay nolazainy: Hikisaka ambaratonga folo ny aloka eo amin’ny tohatr’i Ahaza'
  - type: note
    content: 'tohatr’i Ahaza: nanana efitrano tao ambony tafon-trano marin-tampona i Ahaza, ka ny tohatra manara-drindrina miakatra mankeo no voateny eto; jereo 23.12.'
  - type: text
    content: ; koa handroso sa hihemotra no tianao hikisahany?
