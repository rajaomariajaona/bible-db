document_id: GEN.35,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Niala tao Sikema ho any Betela i Jakôba
  - type: text
    content: 'Indray andro dia hoy Andriamanitra tamin’i Jakôba:'
  - type: text
    content: '–Miaingà, miakara any Betela ka mitoera any; ary manaova '
  - type: text
    content: alitara
  - type: text
    content: ' eo ho an’ilay Andriamanitra Izay niseho taminao fony ianao nandositra an’i Hesao rahalahinao'
  - type: note
    content: Jereo 28.10-12.
  - type: text
    content: .
  '10':
  - type: text
    content: 'ary nitenany hoe:'
  - type: text
    content: –I Jakôba no anaranao; nefa tsy hatao hoe Jakôba intsony ianao fa hatao hoe Israely
  - type: note
    content: Jereo 32.29 sy nta.
  - type: text
    content: .
  - type: text
    content: 'Dia nataon’Andriamanitra hoe Israely ny anarany; '
  '11':
  - type: text
    content: 'sady hoy koa Izy taminy:'
  - type: text
    content: '–Izaho no Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: '. Mihamaroa sy mitomboa, ka hisy firenena sy vondrom-pirenena hipoitra avy aminao ary mpanjaka maro avy amin’ny taranakao. '
  '12':
  - type: text
    content: Homeko anao sy ny taranakao
  - type: note
    content: 'And 11-12: ampit Gen 17.4-8; 26.3.'
  - type: text
    content: ' mandimby anao ny tany izay nomeko an’i Abrahama sy i Itsehàka.'
  '13':
  - type: text
    content: 'Dia niala teo amin’ny toerana izay nitenenany tamin’i Jakôba Andriamanitra. '
  '14':
  - type: text
    content: 'I Jakôba kosa nanorina tsangambato teo ka nanoso-menaka ilay tsangambato sy nandraraka divay teo amboniny. '
  '15':
  - type: text
    content: Dia nantsoin’i Jakôba hoe «Betela» na Tranon’Andriamanitra io toerana izay nitenenan’Andriamanitra taminy io
  - type: note
    content: Jereo Gen 28.18-19.
  - type: text
    content: .
  - type: heading
    content: Ny nahaterahan’i Benjamîna sy ny nahafatesan’i Rahely
  '16':
  - type: text
    content: 'Niala tao Betela i Jakôba sy ny ankohonany. Raha mbola lavidavitra an’i Efratà no nisy azy mianakavy, dia teraka i Rahely; nefa saro-piterahana izy. '
  '17':
  - type: text
    content: 'Fa raha sahirana teo am-piterahana iny i Rahely, dia hoy ny mpampivelona taminy:'
  - type: text
    content: –Aza matahotra fa mbola zazalahy no ho anao!
  '18':
  - type: text
    content: Teo am-pialana aina rehefa ho faty izy, dia nataony hoe Bèna-Ony na zanaky ny fahoriako ny anaran’ny zaza; fa ny rainy kosa niantso azy hoe Benjamîna na zanaky ny tanan-kavanana
  - type: note
    content: Ny anarana tsy nanambina hoe Bèna-Ony dia novan’i Jakôba ho anarana manambina hoe Benjamîna, satria ny tanana havanana matetika no heverina ho tsara indrindra (jereo Sal 137.5); toy izany koa ny ilany havanana amin’ny zavatra rehetra (Sal 110.5 sy nta; ampit Mt 25.34).
  - type: text
    content: .
  '19':
  - type: text
    content: 'Maty i Rahely ka nalevina teo amoron-dàlana mankany Efratà, izay atao hoe Betlehema ankehitriny. '
  '2':
  - type: text
    content: 'Dia hoy i Jakôba tamin’ny ankohonany sy izay rehetra niaraka taminy:'
  - type: text
    content: '–Ario avokoa ireo andriamani-kafa eo aminareo, ka '
  - type: text
    content: midiova
  - type: text
    content: ' ary misoloa fitafiana. '
  '20':
  - type: text
    content: Dia nanorenan’i Jakôba tsangambato teo ambonin’ny fasany izay mbola antsoina mandraka androany hoe Tsangambatom-pasan’i Rahely.
  '21':
  - type: text
    content: Dia niala teo i Jakôba ka nanorin-day tao ambadik’i Migdala-Hedera
  - type: note
    content: 'Migdala-Hedera: na ny Tilikambon’ny andiam-biby fiompy, tsy lavitra ny tendrombohitra Tsiôna izany.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: Fa raha mbola nipetraka tamin’izany faritany izany i Jakôba, dia lasa i Reobena nandry tamin’i Bilehà vadikelin-drainy. Nahare izany i Jakôba ka nisafoaka
  - type: note
    content: 'ka nisafoaka: araka ny dkt grika tranainy izany fa tsy hita ao amin’ny Rm mahazatra. –Momba ny fahadisoan’i Reobena: jereo Gen 49.4.'
  - type: text
    content: .
  - type: text
    content: 'Fa nisy roa ambin’ny folo ny zanakalahin’i Jakôba; '
  '23':
  - type: text
    content: 'i Reobena no lahimatoan’i Jakôba tamin’i Leà, avy eo dia i Simehôna, i Levỳ, i Joda, i Jisakara ary i Zebolòna. '
  '24':
  - type: text
    content: 'I Jôsefa sy i Benjamîna kosa no zanany tamin’i Rahely. '
  '25':
  - type: text
    content: 'I Dana sy Naftalỳ no zanany tamin’i Bilehà mpanompovavin’i Rahely. '
  '26':
  - type: text
    content: I Gada sy i Asera no zanany tamin’i Zilpà, mpanompovavin’i Leà. Ireo no zanakalahin’i Jakôba teraka tany Mezôpôtamia ambony.
  '27':
  - type: text
    content: 'Ary nandeha i Jakôba nankany amin’i Itsehàka rainy tany Mamre, tao akaikin’i Kiriata-Arbà izay antsoina hoe Hebrôna ankehitriny, fa tao Mamre no nivahinian’i Abrahama sy i Itsehàka. '
  '28':
  - type: text
    content: 'Efa nisy valopolo amby zato taona ny andron’i Itsehàka, '
  '29':
  - type: text
    content: no niala aina izy ka maty; ary efa tratra antitra izy vao nakambana tamin’ny razany. I Hesao sy i Jakôba zanany no nandevina azy.
  '3':
  - type: text
    content: Ndeha isika hiainga hiakatra any Betela; fa hanamboatra alitara any aho ho an’Andriamanitra Izay nihaino ahy tamin’ny androm-pahoriako sady nomba ahy tamin’izay rehetra nalehako.
  '4':
  - type: text
    content: Dia natolony an’i Jakôba ireo andriamani-kafa rehetra tany am-pelatanany mbamin’ireo kavina teny an-tsofiny
  - type: note
    content: ireo kavina (na haba) dia tsy isalasalana fa marika ara-pivavahana.
  - type: text
    content: ', ka nalevin’i Jakôba teo am-pototr’ilay hazo midoroboka tao akaikin’i Sekema. '
  '5':
  - type: text
    content: Ary rehefa niala teo ry i Jakôba sy ny zanany, dia nampihorohoroin’Andriamanitra ireo tanàna manodidina, ka tsy nisy sahy nanarakaraka azy avy taoriana.
  '6':
  - type: text
    content: 'I Jakôba sy ireo rehetra niaraka taminy dia tonga tao Lozy, izany hoe tao Betela izay ao amin’ny tany Kanahàna. '
  '7':
  - type: text
    content: Ary nanamboatra alitara teo izy, ka niantso an’io toerana io hoe Andriamanitr’i Betela; satria teo no nisehoan’Andriamanitra taminy fony izy nandositra ny rahalahiny.
  '8':
  - type: text
    content: Ary maty i Debôrà, izay nitaiza an’i Rebekà, ka nalevina teo akaikin’i Betela, teo am-pototry ny hazo ôaka izay nantsoina hoe «Hazo ôaka fitomaniana» nanomboka hatreo.
  '9':
  - type: text
    content: 'Rehefa niverina avy tany Mezôpôtamia ambony i Jakôba, dia nisehoan’Andriamanitra indray sady '
  - type: text
    content: notsofiny
  - type: text
    content: ' rano '
