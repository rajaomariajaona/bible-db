document_id: GEN.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niala tao Sikema ho any Betela i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray andro dia hoy Andriamanitra tamin’i Jakôba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Miaingà, miakara any Betela ka mitoera any; ary manaova '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' eo ho an’ilay Andriamanitra Izay niseho taminao fony ianao nandositra an’i Hesao rahalahinao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 28.10-12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Jakôba tamin’ny ankohonany sy izay rehetra niaraka taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ario avokoa ireo andriamani-kafa eo aminareo, ka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: midiova
  - type: text
    text: ' ary misoloa fitafiana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ndeha isika hiainga hiakatra any Betela; fa hanamboatra alitara any aho ho an’Andriamanitra Izay nihaino ahy tamin’ny androm-pahoriako sady nomba ahy tamin’izay rehetra nalehako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia natolony an’i Jakôba ireo andriamani-kafa rehetra tany am-pelatanany mbamin’ireo kavina teny an-tsofiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ireo kavina (na haba) dia tsy isalasalana fa marika ara-pivavahana.
    marker-yv: yv-n
  - type: text
    text: ', ka nalevin’i Jakôba teo am-pototr’ilay hazo midoroboka tao akaikin’i Sekema. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary rehefa niala teo ry i Jakôba sy ny zanany, dia nampihorohoroin’Andriamanitra ireo tanàna manodidina, ka tsy nisy sahy nanarakaraka azy avy taoriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I Jakôba sy ireo rehetra niaraka taminy dia tonga tao Lozy, izany hoe tao Betela izay ao amin’ny tany Kanahàna. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nanamboatra alitara teo izy, ka niantso an’io toerana io hoe Andriamanitr’i Betela; satria teo no nisehoan’Andriamanitra taminy fony izy nandositra ny rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary maty i Debôrà, izay nitaiza an’i Rebekà, ka nalevina teo akaikin’i Betela, teo am-pototry ny hazo ôaka izay nantsoina hoe «Hazo ôaka fitomaniana» nanomboka hatreo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa niverina avy tany Mezôpôtamia ambony i Jakôba, dia nisehoan’Andriamanitra indray sady '
  - type: usfm
    marker: w
    children:
    - type: text
      text: notsofiny
  - type: text
    text: ' rano '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary nitenany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –I Jakôba no anaranao; nefa tsy hatao hoe Jakôba intsony ianao fa hatao hoe Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 32.29 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nataon’Andriamanitra hoe Israely ny anarany; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'sady hoy koa Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no Andriamanitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsitoha
  - type: text
    text: '. Mihamaroa sy mitomboa, ka hisy firenena sy vondrom-pirenena hipoitra avy aminao ary mpanjaka maro avy amin’ny taranakao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Homeko anao sy ny taranakao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.12 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 11-12:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Gen 17.4-8; 26.3.
    marker-yv: yv-n
  - type: text
    text: ' mandimby anao ny tany izay nomeko an’i Abrahama sy i Itsehàka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niala teo amin’ny toerana izay nitenenany tamin’i Jakôba Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I Jakôba kosa nanorina tsangambato teo ka nanoso-menaka ilay tsangambato sy nandraraka divay teo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nantsoin’i Jakôba hoe «Betela» na Tranon’Andriamanitra io toerana izay nitenenan’Andriamanitra taminy io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 28.18-19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Benjamîna sy ny nahafatesan’i Rahely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Niala tao Betela i Jakôba sy ny ankohonany. Raha mbola lavidavitra an’i Efratà no nisy azy mianakavy, dia teraka i Rahely; nefa saro-piterahana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha sahirana teo am-piterahana iny i Rahely, dia hoy ny mpampivelona taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza matahotra fa mbola zazalahy no ho anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Teo am-pialana aina rehefa ho faty izy, dia nataony hoe Bèna-Ony na zanaky ny fahoriako ny anaran’ny zaza; fa ny rainy kosa niantso azy hoe Benjamîna na zanaky ny tanan-kavanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny anarana tsy nanambina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bèna-Ony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia novan’i Jakôba ho anarana manambina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Benjamîna,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' satria ny tanana havanana matetika no heverina ho tsara indrindra (jereo Sal 137.5); toy izany koa ny ilany havanana amin’ny zavatra rehetra (Sal 110.5 sy nta; ampit Mt 25.34).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maty i Rahely ka nalevina teo amoron-dàlana mankany Efratà, izay atao hoe Betlehema ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nanorenan’i Jakôba tsangambato teo ambonin’ny fasany izay mbola antsoina mandraka androany hoe Tsangambatom-pasan’i Rahely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia niala teo i Jakôba ka nanorin-day tao ambadik’i Migdala-Hedera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Migdala-Hedera:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Tilikambon’ny andiam-biby fiompy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy lavitra ny tendrombohitra Tsiôna izany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa raha mbola nipetraka tamin’izany faritany izany i Jakôba, dia lasa i Reobena nandry tamin’i Bilehà vadikelin-drainy. Nahare izany i Jakôba ka nisafoaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ka nisafoaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy izany fa tsy hita ao amin’ny Rm mahazatra. –Momba ny fahadisoan’i Reobena: jereo Gen 49.4.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa nisy roa ambin’ny folo ny zanakalahin’i Jakôba; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Reobena no lahimatoan’i Jakôba tamin’i Leà, avy eo dia i Simehôna, i Levỳ, i Joda, i Jisakara ary i Zebolòna. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I Jôsefa sy i Benjamîna kosa no zanany tamin’i Rahely. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I Dana sy Naftalỳ no zanany tamin’i Bilehà mpanompovavin’i Rahely. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I Gada sy i Asera no zanany tamin’i Zilpà, mpanompovavin’i Leà. Ireo no zanakalahin’i Jakôba teraka tany Mezôpôtamia ambony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nandeha i Jakôba nankany amin’i Itsehàka rainy tany Mamre, tao akaikin’i Kiriata-Arbà izay antsoina hoe Hebrôna ankehitriny, fa tao Mamre no nivahinian’i Abrahama sy i Itsehàka. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Efa nisy valopolo amby zato taona ny andron’i Itsehàka, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: no niala aina izy ka maty; ary efa tratra antitra izy vao nakambana tamin’ny razany. I Hesao sy i Jakôba zanany no nandevina azy.
