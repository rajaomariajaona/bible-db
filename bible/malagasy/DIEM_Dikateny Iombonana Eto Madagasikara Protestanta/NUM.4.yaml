document_id: NUM.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny raharahan’ireo tarika levita
  - type: heading
    content: a. Ny taranak’i Kehàta
  - type: text
    content: 'Niteny tamin’i Mosesy sy i Aharôna ny TOMPO ka nanao hoe:'
  '10':
  - type: text
    content: 'Hataony ao anaty saronan-koditra mafy izany ka hapetrany amin’ny filanjana azy. '
  '11':
  - type: text
    content: 'Hamelatra lamba volomparasy eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' volamena izy, ka handrakotra izany amin’ny lamba hoditra mafy, ary izay vao hapetrany ny bao. '
  '12':
  - type: text
    content: 'Haka ny fanaka litorjika rehetra fampiasa amin’ny fanompoam-pivavahana ao amin’ny Toeramasina izy, ka hofonosiny lamba volomparasy sady horakofany lamba hoditra mafy, ary dia hapetrany amin’ny filanjana azy. '
  '13':
  - type: text
    content: 'Hoesoriny ny lavenona eo amin’ny alitara ka hamelarany lamba volomparasy eo. '
  '14':
  - type: text
    content: Hapetrany eo amboniny avokoa ny fanaka rehetra ilaina amin’ny fanaovan-
  - type: text
    content: tsorona
  - type: text
    content: ', dia ny fitondrana afo, ny fitrebika, ny sotron’afo, ny zinga famafazana ary ny kojakoja rehetra momba ny alitara. Hovelarana ny lamba mafy eo ambonin’izany, ary hapetrany ny bao. '
  '15':
  - type: text
    content: 'Rehefa hifindra toby ny Israelita dia ho vitan’i Aharôna sy ny zanany ny famonosana ny Toeramasina sy ny fanaka rehetra momba ny Toeramasina, dia ho avy amin’izay ny taranak’i Kehàta hitondra azy. Tsy hikasika ny fitaovana masina mivantana izy sao maty. Izany no anjara entan’ny taranak’i Kehàta ny amin’ny Tranolay fihaonana. '
  '16':
  - type: text
    content: I Elehazara zanakalahin’i Aharôna mpisorona no miandraikitra ny diloilon-jiro, ny ditin-kazo manitra, ny fanatitra hohanina fanao isan’andro ary ny diloilo fanosorana; miandraikitra ny Fonena-masina manontolo sy ny ao anatiny rehetra izy, na ny fitaovana masina izany na ny kojakoja rehetra momba azy.
  '17':
  - type: text
    content: 'Hoy indray ny TOMPO tamin’i Mosesy sy i Aharôna:'
  '18':
  - type: text
    content: '–Tandremo izay tsy hahafongotra ny tariky ny Kehatita tsy ho isan’ny Levita. '
  '19':
  - type: text
    content: 'Izao no hataonareo aminy mba hahavelona fa tsy hahafaty azy raha manakaiky izay fitaovana masina indrindra izy: i Aharôna sy ny zanany ihany no hametraka azy ireo amin’ny andraikiny sy amin’izay tokony hoentiny avy. '
  '2':
  - type: text
    content: 'Eo amin’ny samy '
  - type: text
    content: Levita
  - type: text
    content: ', dia ataovy lisitra isan-tarika sy isam-pianakaviana ny taranak’i Kehàta, feno telopolo taona ka hatramin’ny dimampolo taona, izany hoe ireo rehetra tokony hirotsaka hanao ny asam-panompoana ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '20':
  - type: text
    content: Koa tsy ho avy hijery ny fitaovana masina na dia kely akory aza izy ireo sao maty.
  - type: heading
    content: b. Ny taranak’i Gersôna
  '21':
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '22':
  - type: text
    content: '«Ataovy lisitra isam-pianakaviana sy isan-tarika koa ny taranak’i Gersôna. '
  '23':
  - type: text
    content: 'Hisainao ny lehilahy rehetra feno telopolo taona ka hatramin’ny dimampolo taona, dia ireo rehetra tokony hirotsaka hanao ny asam-panompoana ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Izao no asa hampiandraiketina ny tariky ny Gersônita: '
  '25':
  - type: text
    content: 'hitondra ny lamba mandrakotra ny Fonena-masina ny Tranolay fihaonana, ny rakotra lambam-baravarana fidirana eo amin’ny Tranolay fihaonana, '
  '26':
  - type: text
    content: 'ny fefilamban’ny kianja sy ny lambam-baravaran’ny vavahadin’ny kianja izay manodidina ny Fonena-masina sy ny '
  - type: text
    content: alitara
  - type: text
    content: ', ny tady mamaritra ny kianja ary ny kojakoja rehetra ho an’ny fanompoany, dia izay rehetra nomena azy hiasany'
  - type: note
    content: Jereo Eks 26.1-14; 27.9-16.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Araka ny baikon’i Aharôna sy ny zanany no hanaovan’ny Gersônita ny asa fanompoany, na momba ny fitondrana ireo entana izany, na momba ny fanatanterahana ny asa. Izy telo mianaka no hiteny aminy izay tokony hataony sy izay tokony hoentiny. '
  '28':
  - type: text
    content: Izany no fanompoana nampiandraketina ny tariky ny Gersônita tao amin’ny Tranolay fihaonana. I Itamara zanakalahin’i Aharôna mpisorona no hanara-maso azy amin’izany.
  - type: heading
    content: d. Ny taranak’i Merarỳ
  '29':
  - type: text
    content: '«Ataovy koa ny fanisana ny taranak’i Merarỳ, isan-tarika sy isam-pianakaviana. '
  '30':
  - type: text
    content: 'Hisainao ny lehilahy feno telopolo taona ka hatramin’ny dimampolo taona, izany hoe ireo rehetra tokony hirotsaka hanao ny asam-panompoana ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Izao no asa hampiandraiketina azy: dia ny hitondra ireo hazo fisaky ny Fonena-masina, ny barany, ny andriny, ny faladiany, '
  '32':
  - type: text
    content: 'ny andrin’ny fefin’ny kianja mbamin’ny faladiany, ny tsatòka sy ny tady ary ny kojakoja rehetra ho an’ny fanompoany. Atao lisitra ny anaran’ireo zavatra izay hoentin’ny tsirairay avy. '
  '33':
  - type: text
    content: Izany no fanompoana nampiandraketina ny tariky ny Merarita tao amin’ny Tranolay fihaonana. I Itamara, zanakalahin’i Aharôna mpisorona, no hanara-maso azy amin’izany.»
  - type: heading
    content: Fanisana ny Levita am-perin’asa
  '34':
  - type: text
    content: 'Ary i Mosesy sy i Aharôna mbamin’ny filohan’ny fiangonana nanisa ny '
  - type: text
    content: Levita
  - type: text
    content: ' rehetra taranak’i Kehàta sy i Gersôna ary i Merarỳ, isan-tarika sy isam-pianakaviana, dia izay lehilahy feno telopolo taona ka hatramin’ny dimampolo taona, izany hoe ireo rehetra tokony hirotsaka hanao ny asam-panompoana ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. Izany fanisana nataon’i Mosesy sy i Aharôna izany dia araka izay nandidian’ny TOMPO an’i Mosesy ka nahazoana ireto tarehimarika manaraka ireto:'
  - type: text
    content: 'taranak’i Kehàta:'
  - type: text
    content: vatan-dehilahy 2 750;
  - type: text
    content: 'taranak’i Gersôna:'
  - type: text
    content: vatan-dehilahy 2 630;
  - type: text
    content: 'taranak’i Merarỳ:'
  - type: text
    content: vatan-dehilahy 3 200;
  - type: text
    content: 'Fitambaran’ny Levita: vatan-dehilahy 8 580.'
  - type: text
    content: Araka ny baikon’ny TOMPO sy teo ambany fitarihan’i Mosesy dia nankinina tamin’ny levita tsirairay avy ny asam-panompoana hiandraiketany sy ny entana hoentiny. Araka ny nandidian’ny TOMPO an’i Mosesy no nanankinana izany.
  '4':
  - type: text
    content: 'Ny miandraikitra ireo fanaka masina indrindra no asan’ny taranak’i Kehàta ao amin’ny Tranolay fihaonana. '
  '5':
  - type: text
    content: 'Rehefa hiainga ny Israelita dia ho avy i Aharôna sy ny zanany hanala ny lamba mampisaraka amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ka handrakofany ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' misy ny Didy folo; '
  '6':
  - type: text
    content: 'hasiany lamba hoditra manify eo ambonin’izany, dia hamelarany lamba volomparasy indray eo ambonin’io, vao hapetrany ny bao filanjana azy. '
  '7':
  - type: text
    content: Hamelatra lamba volomparasy eo amin’ny latabatry ny mofo aseho izy ka hametraka ny lovia, ny kaopy, ny tsatokaty ary ny zinga fampidinan-divay; hapetrany eo koa ny mofo izay haseho lalandava eo anatrehako
  - type: note
    content: Jereo Lev 24.5-9.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Eo ambonin’izany rehetra izany no hamelarany lamba jaky izay horakofany lamba hoditra manify; izay vao hapetrany ny bao filanjana ny latabatra. '
  '9':
  - type: text
    content: 'Haka lamba volomparasy izy handrakofany ny fitoeran-jiro mbamin’ny jiro sy ny kojakojany rehetra: dia ny hetin-jiro sy ny fitoeran-davenona ary ny tavoaran-diloilo. '
