document_id: NUM.4
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ny raharahan’ireo tarika levita
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: a. Ny taranak’i Kehàta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy sy i Aharôna ny TOMPO ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'Eo amin’ny samy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ', dia ataovy lisitra isan-tarika sy isam-pianakaviana ny taranak’i Kehàta, feno telopolo taona ka hatramin’ny dimampolo taona, izany hoe ireo rehetra tokony hirotsaka hanao ny asam-panompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny miandraikitra ireo fanaka masina indrindra no asan’ny taranak’i Kehàta ao amin’ny Tranolay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa hiainga ny Israelita dia ho avy i Aharôna sy ny zanany hanala ny lamba mampisaraka amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' ka handrakofany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: ' misy ny Didy folo; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'hasiany lamba hoditra manify eo ambonin’izany, dia hamelarany lamba volomparasy indray eo ambonin’io, vao hapetrany ny bao filanjana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hamelatra lamba volomparasy eo amin’ny latabatry ny mofo aseho izy ka hametraka ny lovia, ny kaopy, ny tsatokaty ary ny zinga fampidinan-divay; hapetrany eo koa ny mofo izay haseho lalandava eo anatrehako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 24.5-9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eo ambonin’izany rehetra izany no hamelarany lamba jaky izay horakofany lamba hoditra manify; izay vao hapetrany ny bao filanjana ny latabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Haka lamba volomparasy izy handrakofany ny fitoeran-jiro mbamin’ny jiro sy ny kojakojany rehetra: dia ny hetin-jiro sy ny fitoeran-davenona ary ny tavoaran-diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hataony ao anaty saronan-koditra mafy izany ka hapetrany amin’ny filanjana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hamelatra lamba volomparasy eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' volamena izy, ka handrakotra izany amin’ny lamba hoditra mafy, ary izay vao hapetrany ny bao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Haka ny fanaka litorjika rehetra fampiasa amin’ny fanompoam-pivavahana ao amin’ny Toeramasina izy, ka hofonosiny lamba volomparasy sady horakofany lamba hoditra mafy, ary dia hapetrany amin’ny filanjana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoesoriny ny lavenona eo amin’ny alitara ka hamelarany lamba volomparasy eo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hapetrany eo amboniny avokoa ny fanaka rehetra ilaina amin’ny fanaovan-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tsorona
  - type: text
    text: ', dia ny fitondrana afo, ny fitrebika, ny sotron’afo, ny zinga famafazana ary ny kojakoja rehetra momba ny alitara. Hovelarana ny lamba mafy eo ambonin’izany, ary hapetrany ny bao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa hifindra toby ny Israelita dia ho vitan’i Aharôna sy ny zanany ny famonosana ny Toeramasina sy ny fanaka rehetra momba ny Toeramasina, dia ho avy amin’izay ny taranak’i Kehàta hitondra azy. Tsy hikasika ny fitaovana masina mivantana izy sao maty. Izany no anjara entan’ny taranak’i Kehàta ny amin’ny Tranolay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I Elehazara zanakalahin’i Aharôna mpisorona no miandraikitra ny diloilon-jiro, ny ditin-kazo manitra, ny fanatitra hohanina fanao isan’andro ary ny diloilo fanosorana; miandraikitra ny Fonena-masina manontolo sy ny ao anatiny rehetra izy, na ny fitaovana masina izany na ny kojakoja rehetra momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy indray ny TOMPO tamin’i Mosesy sy i Aharôna:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '–Tandremo izay tsy hahafongotra ny tariky ny Kehatita tsy ho isan’ny Levita. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izao no hataonareo aminy mba hahavelona fa tsy hahafaty azy raha manakaiky izay fitaovana masina indrindra izy: i Aharôna sy ny zanany ihany no hametraka azy ireo amin’ny andraikiny sy amin’izay tokony hoentiny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa tsy ho avy hijery ny fitaovana masina na dia kely akory aza izy ireo sao maty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: b. Ny taranak’i Gersôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '«Ataovy lisitra isam-pianakaviana sy isan-tarika koa ny taranak’i Gersôna. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hisainao ny lehilahy rehetra feno telopolo taona ka hatramin’ny dimampolo taona, dia ireo rehetra tokony hirotsaka hanao ny asam-panompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izao no asa hampiandraiketina ny tariky ny Gersônita: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'hitondra ny lamba mandrakotra ny Fonena-masina ny Tranolay fihaonana, ny rakotra lambam-baravarana fidirana eo amin’ny Tranolay fihaonana, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ny fefilamban’ny kianja sy ny lambam-baravaran’ny vavahadin’ny kianja izay manodidina ny Fonena-masina sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ', ny tady mamaritra ny kianja ary ny kojakoja rehetra ho an’ny fanompoany, dia izay rehetra nomena azy hiasany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 26.1-14; 27.9-16.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Araka ny baikon’i Aharôna sy ny zanany no hanaovan’ny Gersônita ny asa fanompoany, na momba ny fitondrana ireo entana izany, na momba ny fanatanterahana ny asa. Izy telo mianaka no hiteny aminy izay tokony hataony sy izay tokony hoentiny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izany no fanompoana nampiandraketina ny tariky ny Gersônita tao amin’ny Tranolay fihaonana. I Itamara zanakalahin’i Aharôna mpisorona no hanara-maso azy amin’izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: d. Ny taranak’i Merarỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Ataovy koa ny fanisana ny taranak’i Merarỳ, isan-tarika sy isam-pianakaviana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hisainao ny lehilahy feno telopolo taona ka hatramin’ny dimampolo taona, izany hoe ireo rehetra tokony hirotsaka hanao ny asam-panompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Izao no asa hampiandraiketina azy: dia ny hitondra ireo hazo fisaky ny Fonena-masina, ny barany, ny andriny, ny faladiany, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ny andrin’ny fefin’ny kianja mbamin’ny faladiany, ny tsatòka sy ny tady ary ny kojakoja rehetra ho an’ny fanompoany. Atao lisitra ny anaran’ireo zavatra izay hoentin’ny tsirairay avy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izany no fanompoana nampiandraketina ny tariky ny Merarita tao amin’ny Tranolay fihaonana. I Itamara, zanakalahin’i Aharôna mpisorona, no hanara-maso azy amin’izany.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanisana ny Levita am-perin’asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-49
  - type: text
    text: 'Ary i Mosesy sy i Aharôna mbamin’ny filohan’ny fiangonana nanisa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ' rehetra taranak’i Kehàta sy i Gersôna ary i Merarỳ, isan-tarika sy isam-pianakaviana, dia izay lehilahy feno telopolo taona ka hatramin’ny dimampolo taona, izany hoe ireo rehetra tokony hirotsaka hanao ny asam-panompoana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '. Izany fanisana nataon’i Mosesy sy i Aharôna izany dia araka izay nandidian’ny TOMPO an’i Mosesy ka nahazoana ireto tarehimarika manaraka ireto:'
- type: text
  text: taranak’i Kehàta:vatan-dehilahy 2 750;taranak’i Gersôna:vatan-dehilahy 2 630;taranak’i Merarỳ:vatan-dehilahy 3 200;
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fitambaran’ny Levita: vatan-dehilahy 8 580.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Araka ny baikon’ny TOMPO sy teo ambany fitarihan’i Mosesy dia nankinina tamin’ny levita tsirairay avy ny asam-panompoana hiandraiketany sy ny entana hoentiny. Araka ny nandidian’ny TOMPO an’i Mosesy no nanankinana izany.
