document_id: PSA.75,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Andriamanitra no mpitsara
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: 'Hohiraina araka ny feon’ny hoe: «Aza ravana...'
  - type: note
    content: 'Hohiraina... ravana: jereo Sal 57.1 sy nta; Sal 58–59.'
  - type: text
    content: '». '
  - type: text
    content: Salamo nataon’i Asafa. Tononkira.
  '10':
  - type: text
    content: Izaho kosa tsy hitsahatra hanambara izany,
  - type: text
    content: ka dia ilay Andriamanitr’i Jakôba
  - type: text
    content: 'no hankalazaiko amin-kira hoe:'
  '11':
  - type: text
    content: «Hopotehiny avokoa ny fahefàn’ny olon-dratsy
  - type: text
    content: fa hasandrany kosa ny fahefàn’ny olo-marina.»
  '2':
  - type: text
    content: Andriamanitra ô, midera Anao izahay;
  - type: text
    content: eny, midera Anao tokoa izahay.
  - type: text
    content: Ataonay antso avo ny lazanao
  - type: note
    content: 'Ataonay... lazanao: dkt araka ny dkt tranainy grika izany.'
  - type: text
    content: ary tantarainay ny zava-mahagaga vitanao.
  '3':
  - type: text
    content: 'Hoy ny Tompo hoe: «Amin’ny fotoana hotondroiko'
  - type: text
    content: dia hanao fitsarana araka ny hitsiny Aho.
  '4':
  - type: text
    content: Hihorohoro ny tany mbamin’ireo mponina eo aminy,
  - type: text
    content: nefa Izaho mbola hihazona ny andry iorenany.»
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: 'Hoy aho aminareo mpirehareha hoe:'
  - type: text
    content: «Aoka izay ny fireharehànareo!»;
  - type: text
    content: 'ary aminareo olon-dratsy hoe:'
  - type: text
    content: «Aza miandranandrana intsony!
  '6':
  - type: text
    content: Eny, aza miandranandrana intsony;
  - type: text
    content: aza mafy hatoka miteniteny foana.
  '7':
  - type: text
    content: Fantaro fa ny didim-pitsarana havoaka
  - type: text
    content: dia tsy avy any atsinanana na avy any andrefana,
  - type: text
    content: tsy avy any avaratra na avy any atsimo;
  '8':
  - type: text
    content: satria Andriamanitra no mpitsara,
  - type: text
    content: ka mampietry ny sasany Izy
  - type: text
    content: ary manandratra ny hafa kosa.»
  '9':
  - type: text
    content: Misy tsangambava iray eo an-tanan’ny TOMPO,
  - type: text
    content: dia tsangambava feno divay mifangaroharo
  - type: text
    content: izay tandindon’ny hatezerany mandroatra.
  - type: text
    content: Asainy sotroin’ny olon-dratsy rehetra amin’ny tany izany
  - type: text
    content: ka tsy maintsy trohin’ireo hatramin’ny faikany
  - type: note
    content: Ny amin’izany sary an’ohatra momba ny fitsarana izany, dia jereo ny Sal 60.5 sy nta.
  - type: text
    content: .
