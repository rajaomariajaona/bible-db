document_id: 2CO.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanampiana ny kristianina any Jodea
  - type: text
    content: 'Momba ny fanampiana ho an’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' any Jodea, dia tsy misy tokony hanoratako aminareo. '
  '10':
  - type: text
    content: Andriamanitra, Izay miantoka masomboly ho an’ny mpamafy sy hanin-kohanina
  - type: note
    content: Ampit Is 55.10.
  - type: text
    content: ', no hiantoka masomboly ho anareo sy hampitombo azy, ka hampamokatra be dia be ny asa fiantrana ataonareo. '
  '11':
  - type: text
    content: 'Hataon’Andriamanitra hanan-karena amin’ny zavatra rehetra ianareo mba hahafoy be amin’ny fanasoavana isan-karazany; ka hahatonga ny olona hisaotra an’Andriamanitra noho ny fanomezanareo entinay ho azy ireo. '
  '12':
  - type: text
    content: 'Satria ny fanaovana izao asa famoriam-bola izao dia tsy hoe mahafa-pahasahiranana ny vahoakan’Andriamanitra any Jodea fotsiny, fa mahabe ny fisaoran’ny maro an’Andriamanitra koa. '
  '13':
  - type: text
    content: 'Misy vidiny tokoa izao asa fanasoavana izao, ka maro no hanome voninahitra an’Andriamanitra noho ny fanoavana anehoanareo fa inoanareo ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' nentin’i '
  - type: text
    content: Kristy
  - type: text
    content: '; maro koa no hanome voninahitra an’Andriamanitra noho ianareo nahafoy be nizara harena tamin-dry zareo any Jodea sy tamin’ny olona rehetra. '
  '14':
  - type: text
    content: 'Hivavaka ho anareo izy rehetra, fa ankamamiany tokoa ianareo satria nihoa-pampana ny fahasoavana nomen’Andriamanitra anareo. '
  '15':
  - type: text
    content: Hisaorana anie Andriamanitra noho ny fanomezany tsy hay visavisaina!
  '2':
  - type: text
    content: Fantatro manko ny risi-ponareo ka nataoko rehareha ny aminareo teo anoloan’ny Masedônianina
  - type: note
    content: 'Masedônianina: izay hoe ireo isan’ny Fiangonana any Filipy, Tesalônika, Berea... Jereo koa 1.16 sy ny naoty.'
  - type: text
    content: '; fa hoy aho taminy: «Efa vonona hatry ny taona itsỳ ry zareo any Akaîa!» Nanaitaitra ny maro ny zotomponareo. '
  '3':
  - type: text
    content: 'Kanefa dia nalefako ho any aminareo ihany ireto rahalahy ireto mba tsy ho foana ilay reharehanay ny aminareo momba izany; sàtriko ho vonona tokoa ianareo, araka izay voalazako. '
  '4':
  - type: text
    content: 'Fa raha tàhiny misy tafara-dia amiko ny avy atỳ Masedônia, ka mahita anareo tsy mbola vonona, dia hahamenatra anay izany fahatokianay anareo izany! Aoka tsy hoteneniko ny hoe hahamenatra anareo! '
  '5':
  - type: text
    content: 'Noheveriko àry fa tena ilaina ny niangaviako ireto rahalahy ireto handeha hialoha ho any aminareo mba hampanomana rahateo ny fanomezana be nampanantenainareo teo aloha; dia ho vonona izany, ka ho fanomezana be tokoa fa tsy ho fanomezana mahihitra. '
  '6':
  - type: text
    content: 'Izao no tsarovy: izay mamafy kely dia hijinja kely; izay mamafy be dia hijinja be. '
  '7':
  - type: text
    content: 'Aoka samy hanome araka izay nokasain’ny fony avy, tsy amin’alahelo na an-terivozona, satria ny mpanome an-kafaliana no tian’Andriamanitra. '
  '8':
  - type: text
    content: 'Ary hain’Andriamanitra omena mitafotafo anareo ny soa isan-karazany, ka hanana ny ampy mandrakariva amin’ny zavatra rehetra ianareo, sady hanana mitafotafo hoentinareo manao asa soa isan-karazany, '
  '9':
  - type: text
    content: 'araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Malala-tanana izy nanome ny mahantra;
  - type: text
    content: maharitra mandrakizay ny asa fiantrany
  - type: note
    content: Jereo Sal 112.9.
  - type: text
    content: .»
