    - type: text
      text: Ny fanampiana ny kristianina any Jodea
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Momba ny fanampiana ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: ' any Jodea, dia tsy misy tokony hanoratako aminareo. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Andriamanitra, Izay miantoka masomboly ho an’ny mpamafy sy hanin-kohanina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 55.10.
      marker-yv: yv-n
    - type: text
      text: ', no hiantoka masomboly ho anareo sy hampitombo azy, ka hampamokatra be dia be ny asa fiantrana ataonareo. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hataon’Andriamanitra hanan-karena amin’ny zavatra rehetra ianareo mba hahafoy be amin’ny fanasoavana isan-karazany; ka hahatonga ny olona hisaotra an’Andriamanitra noho ny fanomezanareo entinay ho azy ireo. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Satria ny fanaovana izao asa famoriam-bola izao dia tsy hoe mahafa-pahasahiranana ny vahoakan’Andriamanitra any Jodea fotsiny, fa mahabe ny fisaoran’ny maro an’Andriamanitra koa. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Misy vidiny tokoa izao asa fanasoavana izao, ka maro no hanome voninahitra an’Andriamanitra noho ny fanoavana anehoanareo fa inoanareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' nentin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '; maro koa no hanome voninahitra an’Andriamanitra noho ianareo nahafoy be nizara harena tamin-dry zareo any Jodea sy tamin’ny olona rehetra. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hivavaka ho anareo izy rehetra, fa ankamamiany tokoa ianareo satria nihoa-pampana ny fahasoavana nomen’Andriamanitra anareo. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hisaorana anie Andriamanitra noho ny fanomezany tsy hay visavisaina!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatro manko ny risi-ponareo ka nataoko rehareha ny aminareo teo anoloan’ny Masedônianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Masedônianina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izay hoe ireo isan’ny Fiangonana any Filipy, Tesalônika, Berea... Jereo koa 1.16 sy ny naoty.
      marker-yv: yv-n
    - type: text
      text: '; fa hoy aho taminy: «Efa vonona hatry ny taona itsỳ ry zareo any Akaîa!» Nanaitaitra ny maro ny zotomponareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa dia nalefako ho any aminareo ihany ireto rahalahy ireto mba tsy ho foana ilay reharehanay ny aminareo momba izany; sàtriko ho vonona tokoa ianareo, araka izay voalazako. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tàhiny misy tafara-dia amiko ny avy atỳ Masedônia, ka mahita anareo tsy mbola vonona, dia hahamenatra anay izany fahatokianay anareo izany! Aoka tsy hoteneniko ny hoe hahamenatra anareo! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noheveriko àry fa tena ilaina ny niangaviako ireto rahalahy ireto handeha hialoha ho any aminareo mba hampanomana rahateo ny fanomezana be nampanantenainareo teo aloha; dia ho vonona izany, ka ho fanomezana be tokoa fa tsy ho fanomezana mahihitra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no tsarovy: izay mamafy kely dia hijinja kely; izay mamafy be dia hijinja be. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka samy hanome araka izay nokasain’ny fony avy, tsy amin’alahelo na an-terivozona, satria ny mpanome an-kafaliana no tian’Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hain’Andriamanitra omena mitafotafo anareo ny soa isan-karazany, ka hanana ny ampy mandrakariva amin’ny zavatra rehetra ianareo, sady hanana mitafotafo hoentinareo manao asa soa isan-karazany, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny voalazan’ny '
    - type: usfm
      marker: w
      children:
