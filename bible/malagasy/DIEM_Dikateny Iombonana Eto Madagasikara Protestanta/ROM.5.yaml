document_id: ROM.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vokatry ny nankatoavan’Andriamanitra antsika ho marina
  - type: text
    content: Noho ny finoana àry dia tonga olo-marina eo imason’Andriamanitra isika sady efa mihavana amin’Andriamanitra
  - type: note
    content: 'sady efa mihavana amin’Andriamanitra: misy stf sasany ahitana hoe koa aoka isika hihavana amin’Andriamanitra.'
  - type: text
    content: 'amin’ny alalan’i Jesoa Kristy Tompontsika. '
  '10':
  - type: text
    content: 'Eny, fony fahavalon’Andriamanitra aza isika, dia nampihavanina taminy noho ny fahafatesan’ny '
  - type: text
    content: Zanany
  - type: text
    content: '; vao mainka izao isika efa nampihavanina tamin’Andriamanitra izao, dia tena hovonjena tokoa noho ny fahaveloman’ny Zanany. '
  '11':
  - type: text
    content: Tsy izany ihany, fa mirehareha ao amin’Andriamanitra koa isika amin’ny alalan’i Jesoa Kristy Tompontsika, Ilay nahazoantsika izao fihavanantsika amin’Andriamanitra izao.
  - type: heading
    content: I Adama sy i Kristy
  '12':
  - type: text
    content: Noho ny nataon’ny olona anankiray, dia i Adama, no nidiran’ny fahotana teo amin’izao tontolo izao, sady nidiran’ny fahafatesana koa noho ny fahotana; ary dia nahatratra ny olona rehetra ny fahafatesana, satria samy nanota izy rehetra
  - type: note
    content: 'satria samy... rehetra: dkt hafa fa noho i Adama dia nanota avokoa izy rehetra na hoe satria ny hiharan’ny fahafatesana no nanotan’ny rehetra. Jereo Gen 2.17; 3.6, 17-19.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Talohan’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy dia efa nisy fahotana teo amin’izao tontolo izao; nefa ny fahotana dia tsy mbola natao hoe fandikana, raha tsy mbola nisy ny lalàna. '
  '14':
  - type: text
    content: Na izany aza anefa, hatramin’i Adama ka hatramin’i Mosesy dia efa nanjaka ny fahafatesana, na dia tamin’ireo tsy nanota toraka ny nataon’i Adama izay nandika ny didin’Andriamanitra aza.
  - type: text
    content: 'Ary i Adama dia tandindon’Ilay ho avy. '
  '15':
  - type: text
    content: 'Kanefa tsy azo ampitahaina ny hadisoana vitan’i Adama sy ny fanomezana atolotr’Andriamanitra maimaimpoana. Niharan’ny fahafatesana ny besinimaro, noho ny hadisoan’ny olona anankiray, dia i Adama; nitosaka be nihoatra lavitra noho izany kosa ilay fahasoavana avy amin’Andriamanitra, ilay fahasoavana nomena maimaimpoana ho an’ny besinimaro tao tamin’ny olona anankiray, dia i Jesoa Kristy. '
  '16':
  - type: text
    content: 'Ary tsy tahaka ny vokatry ny fahotana vitan’i Adama ny vokatry ny fanomezana atolotr’Andriamanitra: ny hadisoan’ny olona anankiray notsaraina dia nahatonga fanamelohana; fa ny fanomezana atolotr’Andriamanitra maimaimpoana kosa dia nahatonga ny hadisoana maro havela tanteraka. '
  '17':
  - type: text
    content: Eny, tamin’ny alalan’ny olona anankiray ary noho ny hadisoan’io olona iray io no nanjakan’ny fahafatesana; fa ireo mandray ny fahasoavana nitosaka be avy amin’Andriamanitra ary koa ny fahamarinana nomeny maimaimpoana dia vao mainka velomin’Andriamanitra sy ampanjakainy tamin’ny alalan’ny olona anankiray, dia i Jesoa Kristy.
  '18':
  - type: text
    content: 'Koa ny hadisoana vitan’olona iray, dia i Adama, no nahavoaheloka ny olona rehetra; toy izany koa ny asa marina vitan’olona iray, dia i Jesoa Kristy, no nahatonga ny olona rehetra hovotsorana tanteraka sy hahazo fiainana. '
  '19':
  - type: text
    content: Noho ny olona anankiray tsy nanaiky an’Andriamanitra, dia nanjary mpanota ny besinimaro; toy izany koa, noho ny olona anankiray nanaiky an’Andriamanitra, dia hanjary olo-marina eo imason’Andriamanitra ny besinimaro.
  '2':
  - type: text
    content: Amin’ny alalan’i Jesoa ihany koa, rehefa mino isika, no ahazoantsika manatona ilay fahasoavana efa misy antsika ankehitriny; ary ny ireharehantsika dia ny fanantenana
  - type: note
    content: 'rehefa mino isika: misy stf sasany tsy ahitana ireo teny ireo. –ary ny ireharehantsika dia ny fanantenana: dkt hafa koa aoka hireharehantsika ny fanantenana.'
  - type: text
    content: 'hanana anjara amin’ny voninahitr’Andriamanitra. '
  '20':
  - type: text
    content: 'Ny lalàna no tonga, dia ny mba hampitombo be ny hadisoana; nefa koa teo amin’izay nahabe ny fahotana no nihoa-pampana ny fahasoavana. '
  '21':
  - type: text
    content: Koa tahaka ny nanjakan’ny fahotana ka nahafaty antsika no hanjakan’ny fahasoavan’Andriamanitra hahatonga antsika ho marina ka hahavelona antsika mandrakizay amin’ny alalan’i Jesoa Kristy Tompontsika.
  '3':
  - type: text
    content: Tsy izany ihany, fa ireharehantsika
  - type: note
    content: ireharehantsika na hoe aoka hireharehantsika.
  - type: text
    content: 'koa ny fahoriana mahazo antsika: satria fantatsika fa ny fahoriana mahatonga faharetana; '
  '4':
  - type: text
    content: ny faharetana mahatonga toetra voasedra
  - type: note
    content: 'toetra voasedra: dkt hafa hatsaram-panahy voazaha toetra.'
  - type: text
    content: '; ny toetra voasedra mahatonga fanantenana; '
  '5':
  - type: text
    content: ary ny fanantenana tsy mba manodoka, fa efa voarotsaka ao am-pontsika ny fitiavan’Andriamanitra, tamin’ny alalan’ny Fanahy Masina Izay nomena antsika.
  '6':
  - type: text
    content: 'Mbola tsy nanan-kery isika no tonga ny fotoanandro voatendrin’Andriamanitra, ka maty hamonjy ny ratsy fanahy i Kristy. '
  '7':
  - type: text
    content: 'Saika tsy misy aza manaiky ho faty hamonjy olo-marina; ary angamba mety hisy ihany hanana herim-po ho faty hamonjy olona tsara fanahy. '
  '8':
  - type: text
    content: 'Fa i Kristy kosa maty hamonjy antsika, fony isika mbola mpanota: nahariharin’Andriamanitra tamin’izany ny fitiavany antsika. '
  '9':
  - type: text
    content: 'Koa, amin’izao isika efa tonga olo-marina eo imason’Andriamanitra noho ny ra nafoin’i Kristy izao, dia vao mainka hovonjena amin’ny alalan’i Kristy tsy hiharan’ny '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: '. '
