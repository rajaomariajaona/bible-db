  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary ny fanantenana tsy mba manodoka, fa efa voarotsaka ao am-pontsika ny fitiavan’Andriamanitra, tamin’ny alalan’ny Fanahy Masina Izay nomena antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mbola tsy nanan-kery isika no tonga ny fotoanandro voatendrin’Andriamanitra, ka maty hamonjy ny ratsy fanahy i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saika tsy misy aza manaiky ho faty hamonjy olo-marina; ary angamba mety hisy ihany hanana herim-po ho faty hamonjy olona tsara fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa i Kristy kosa maty hamonjy antsika, fony isika mbola mpanota: nahariharin’Andriamanitra tamin’izany ny fitiavany antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa, amin’izao isika efa tonga olo-marina eo imason’Andriamanitra noho ny ra nafoin’i Kristy izao, dia vao mainka hovonjena amin’ny alalan’i Kristy tsy hiharan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eny, fony fahavalon’Andriamanitra aza isika, dia nampihavanina taminy noho ny fahafatesan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: '; vao mainka izao isika efa nampihavanina tamin’Andriamanitra izao, dia tena hovonjena tokoa noho ny fahaveloman’ny Zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy izany ihany, fa mirehareha ao amin’Andriamanitra koa isika amin’ny alalan’i Jesoa Kristy Tompontsika, Ilay nahazoantsika izao fihavanantsika amin’Andriamanitra izao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'I Adama sy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Noho ny nataon’ny olona anankiray, dia i Adama, no nidiran’ny fahotana teo amin’izao tontolo izao, sady nidiran’ny fahafatesana koa noho ny fahotana; ary dia nahatratra ny olona rehetra ny fahafatesana, satria samy nanota izy rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria samy... rehetra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fa noho i Adama dia nanota avokoa izy rehetra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: satria ny hiharan’ny fahafatesana no nanotan’ny rehetra.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Jereo Gen 2.17; 3.6, 17-19.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Talohan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy dia efa nisy fahotana teo amin’izao tontolo izao; nefa ny fahotana dia tsy mbola natao hoe fandikana, raha tsy mbola nisy ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na izany aza anefa, hatramin’i Adama ka hatramin’i Mosesy dia efa nanjaka ny fahafatesana, na dia tamin’ireo tsy nanota toraka ny nataon’i Adama izay nandika ny didin’Andriamanitra aza.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary i Adama dia tandindon’Ilay ho avy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanefa tsy azo ampitahaina ny hadisoana vitan’i Adama sy ny fanomezana atolotr’Andriamanitra maimaimpoana. Niharan’ny fahafatesana ny besinimaro, noho ny hadisoan’ny olona anankiray, dia i Adama; nitosaka be nihoatra lavitra noho izany kosa ilay fahasoavana avy amin’Andriamanitra, ilay fahasoavana nomena maimaimpoana ho an’ny besinimaro tao tamin’ny olona anankiray, dia i Jesoa Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tsy tahaka ny vokatry ny fahotana vitan’i Adama ny vokatry ny fanomezana atolotr’Andriamanitra: ny hadisoan’ny olona anankiray notsaraina dia nahatonga fanamelohana; fa ny fanomezana atolotr’Andriamanitra maimaimpoana kosa dia nahatonga ny hadisoana maro havela tanteraka. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny, tamin’ny alalan’ny olona anankiray ary noho ny hadisoan’io olona iray io no nanjakan’ny fahafatesana; fa ireo mandray ny fahasoavana nitosaka be avy amin’Andriamanitra ary koa ny fahamarinana nomeny maimaimpoana dia vao mainka velomin’Andriamanitra sy ampanjakainy tamin’ny alalan’ny olona anankiray, dia i Jesoa Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa ny hadisoana vitan’olona iray, dia i Adama, no nahavoaheloka ny olona rehetra; toy izany koa ny asa marina vitan’olona iray, dia i Jesoa Kristy, no nahatonga ny olona rehetra hovotsorana tanteraka sy hahazo fiainana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Noho ny olona anankiray tsy nanaiky an’Andriamanitra, dia nanjary mpanota ny besinimaro; toy izany koa, noho ny olona anankiray nanaiky an’Andriamanitra, dia hanjary olo-marina eo imason’Andriamanitra ny besinimaro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny lalàna no tonga, dia ny mba hampitombo be ny hadisoana; nefa koa teo amin’izay nahabe ny fahotana no nihoa-pampana ny fahasoavana. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa tahaka ny nanjakan’ny fahotana ka nahafaty antsika no hanjakan’ny fahasoavan’Andriamanitra hahatonga antsika ho marina ka hahavelona antsika mandrakizay amin’ny alalan’i Jesoa Kristy Tompontsika.
