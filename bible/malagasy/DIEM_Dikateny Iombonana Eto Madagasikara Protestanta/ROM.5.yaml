    - type: text
      text: '’i Mosesy dia efa nisy fahotana teo amin’izao tontolo izao; nefa ny fahotana dia tsy mbola natao hoe fandikana, raha tsy mbola nisy ny lalàna. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na izany aza anefa, hatramin’i Adama ka hatramin’i Mosesy dia efa nanjaka ny fahafatesana, na dia tamin’ireo tsy nanota toraka ny nataon’i Adama izay nandika ny didin’Andriamanitra aza.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Adama dia tandindon’Ilay ho avy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tsy azo ampitahaina ny hadisoana vitan’i Adama sy ny fanomezana atolotr’Andriamanitra maimaimpoana. Niharan’ny fahafatesana ny besinimaro, noho ny hadisoan’ny olona anankiray, dia i Adama; nitosaka be nihoatra lavitra noho izany kosa ilay fahasoavana avy amin’Andriamanitra, ilay fahasoavana nomena maimaimpoana ho an’ny besinimaro tao tamin’ny olona anankiray, dia i Jesoa Kristy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy tahaka ny vokatry ny fahotana vitan’i Adama ny vokatry ny fanomezana atolotr’Andriamanitra: ny hadisoan’ny olona anankiray notsaraina dia nahatonga fanamelohana; fa ny fanomezana atolotr’Andriamanitra maimaimpoana kosa dia nahatonga ny hadisoana maro havela tanteraka. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, tamin’ny alalan’ny olona anankiray ary noho ny hadisoan’io olona iray io no nanjakan’ny fahafatesana; fa ireo mandray ny fahasoavana nitosaka be avy amin’Andriamanitra ary koa ny fahamarinana nomeny maimaimpoana dia vao mainka velomin’Andriamanitra sy ampanjakainy tamin’ny alalan’ny olona anankiray, dia i Jesoa Kristy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ny hadisoana vitan’olona iray, dia i Adama, no nahavoaheloka ny olona rehetra; toy izany koa ny asa marina vitan’olona iray, dia i Jesoa Kristy, no nahatonga ny olona rehetra hovotsorana tanteraka sy hahazo fiainana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho ny olona anankiray tsy nanaiky an’Andriamanitra, dia nanjary mpanota ny besinimaro; toy izany koa, noho ny olona anankiray nanaiky an’Andriamanitra, dia hanjary olo-marina eo imason’Andriamanitra ny besinimaro.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’ny alalan’i Jesoa ihany koa, rehefa mino isika, no ahazoantsika manatona ilay fahasoavana efa misy antsika ankehitriny; ary ny ireharehantsika dia ny fanantenana
