  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lalàna no tonga, dia ny mba hampitombo be ny hadisoana; nefa koa teo amin’izay nahabe ny fahotana no nihoa-pampana ny fahasoavana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tahaka ny nanjakan’ny fahotana ka nahafaty antsika no hanjakan’ny fahasoavan’Andriamanitra hahatonga antsika ho marina ka hahavelona antsika mandrakizay amin’ny alalan’i Jesoa Kristy Tompontsika.
