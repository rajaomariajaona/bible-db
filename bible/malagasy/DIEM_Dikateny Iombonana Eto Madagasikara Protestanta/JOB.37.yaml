document_id: JOB.37,396
type_code: plt
verses:
  '1':
  - type: heading
    content: '*'
  - type: text
    content: Mipararetra ny foko eo am-pahitana izany,
  - type: text
    content: ka mitepotepo mila hiala amin’ny toerany.
  '10':
  - type: text
    content: Ny fofonain’Andriamanitra
  - type: text
    content: no mampisy ny ranomandry
  - type: text
    content: ka mampivaingana ny velaran-drano.
  - type: heading
    content: '*'
  '11':
  - type: text
    content: Dia vesarany etona mando ny raho-matevina
  - type: text
    content: ka aeliny etsy sy eroa ombàn-tselatra.
  '12':
  - type: text
    content: Andriamanitra no mampihodinkodina azy
  - type: text
    content: mba hahatanteraka, araka ny fikasany,
  - type: text
    content: izay rehetra nandidiany azy eran’izao tontolo izao.
  '13':
  - type: text
    content: Izany no ataon’Andriamanitra mitranga
  - type: text
    content: na hamaizana ny tany, na hanambinana azy.
  - type: heading
    content: '*'
  '14':
  - type: text
    content: Anongilano sofina izao lazaiko izao, ry Jôba.
  - type: text
    content: Miatoa kely aloha ka diniho
  - type: text
    content: ny zava-mahagaga ataon’Andriamanitra.
  '15':
  - type: text
    content: Fantatrao ve ny fibaikoan’Andriamanitra ireny
  - type: text
    content: sy ny mahatonga ny tselatra eny amin’ny rahona?
  '16':
  - type: text
    content: Fantatrao koa ve ny mampihevaheva ny raho-matevina?
  - type: text
    content: Ny manao ireny zava-mahagaga ireny
  - type: text
    content: dia Ilay tanteraka amin’ny fahalalana;
  '17':
  - type: text
    content: Ianao kosa dia mafana loatra anaty fitafianao,
  - type: text
    content: rehefa vesaran’ny andro migaingaina ny tany
  - type: text
    content: noho ny rivotra manempotra avy any atsimo.
  '18':
  - type: text
    content: Afaka nanampy an’Andriamanitra ve ianao,
  - type: text
    content: fony Izy nanefy ny habakabaka
  - type: text
    content: sy nahamafy izany toa fitara-by?
  - type: heading
    content: '*'
  '19':
  - type: text
    content: Mba ampianaro anay ireto àry, ry Jôba,
  - type: text
    content: izay holazainay amin’Andriamanitra.
  - type: text
    content: Fa tsy hitanay izay hotenenina
  - type: text
    content: noho ny haizin’ny tsy fahalalanay.
  '2':
  - type: text
    content: Henoy, henoy ny fidoboky ny feon’Andriamanitra
  - type: text
    content: ary ny firohondrohona avoaky ny vavany.
  '20':
  - type: text
    content: Tsy hangataka ny hiteny aminy aho;
  - type: text
    content: sa maniry ny hataony levona ve ny tenako?
  '21':
  - type: text
    content: Tampotampoka teo dia tsy hita ny fahazavana
  - type: text
    content: fa voatakon-drahona ny masoandro.
  - type: text
    content: Avy eo dia nisy rivotra nitsoka
  - type: text
    content: sy nampisava izany rahona izany.
  '22':
  - type: text
    content: Tara-bolamena no nipoitra avy any avaratra,
  - type: text
    content: ary famirapiratana mahatahotra
  - type: text
    content: no indro manodidina an’Andriamanitra.
  '23':
  - type: text
    content: Izy no ilay Tsitoha tsy haintsika akaikezina,
  - type: text
    content: sady lehibe amin’ny hery ananany;
  - type: text
    content: fatra-pitandro ny rariny sy ny fahamarinana Izy
  - type: text
    content: ka tsy mba mampahory ny olona.
  '24':
  - type: text
    content: Koa izany no tokony hanajana an’Andriamanitra;
  - type: text
    content: fa tsy jereny kosa izay mihambo ho hendry.
  '3':
  - type: text
    content: Mamakivaky ny lanitra manontolo ny tselany
  - type: text
    content: ka tonga hatrany am-paran’ny tany.
  '4':
  - type: text
    content: Aorian’izany dia re ny feon’Andriamanitra
  - type: text
    content: mirohondrohona amin-kery lehibe;
  - type: text
    content: koa mandritra ny andrenesana izany feony izany,
  - type: text
    content: dia avelany hipariaka ny tselatra
  '5':
  - type: text
    content: Mirohondrohona ny feon’Andriamanitra
  - type: text
    content: ka mahatalanjona fatratra,
  - type: text
    content: satria tsy takatry ny saintsika
  - type: text
    content: ireo zavatra goavana vitany.
  - type: heading
    content: '*'
  '6':
  - type: text
    content: 'Fa ny ranomandry baikoiny hoe:'
  - type: text
    content: «Milatsahà amin’ny tany».
  - type: text
    content: Izany koa no ataony amin’ny orana,
  - type: text
    content: dia amin’ny oram-be mivatravatra.
  '7':
  - type: text
    content: Aatony ny asan’ny olona tsirairay avy
  - type: text
    content: mba hieken’ny olombelona rehetra
  - type: text
    content: ny zavatra vitan’Andriamanitra.
  '8':
  - type: text
    content: Ary na ny biby aza dia miditra ao am-ponenany
  - type: text
    content: ka mamitsaka ao amin’ny toeram-piereny.
  '9':
  - type: text
    content: Tonga avy any atsimo ny rivo-doza
  - type: text
    content: ary avy any avaratra ny hatsiaka.
