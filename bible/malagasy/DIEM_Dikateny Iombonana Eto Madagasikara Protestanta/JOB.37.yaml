document_id: JOB.37
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mipararetra ny foko eo am-pahitana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitepotepo mila hiala amin’ny toerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Henoy, henoy ny fidoboky ny feon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny firohondrohona avoaky ny vavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mamakivaky ny lanitra manontolo ny tselany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tonga hatrany am-paran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aorian’izany dia re ny feon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mirohondrohona amin-kery lehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa mandritra ny andrenesana izany feony izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia avelany hipariaka ny tselatra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mirohondrohona ny feon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mahatalanjona fatratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy takatry ny saintsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo zavatra goavana vitany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny ranomandry baikoiny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Milatsahà amin’ny tany».
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany koa no ataony amin’ny orana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny oram-be mivatravatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aatony ny asan’ny olona tsirairay avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hieken’ny olombelona rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zavatra vitan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary na ny biby aza dia miditra ao am-ponenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamitsaka ao amin’ny toeram-piereny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tonga avy any atsimo ny rivo-doza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avy any avaratra ny hatsiaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fofonain’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mampisy ny ranomandry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampivaingana ny velaran-drano.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia vesarany etona mando ny raho-matevina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aeliny etsy sy eroa ombàn-tselatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Andriamanitra no mampihodinkodina azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahatanteraka, araka ny fikasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra nandidiany azy eran’izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izany no ataon’Andriamanitra mitranga
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hamaizana ny tany, na hanambinana azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Anongilano sofina izao lazaiko izao, ry Jôba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miatoa kely aloha ka diniho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zava-mahagaga ataon’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fantatrao ve ny fibaikoan’Andriamanitra ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny mahatonga ny tselatra eny amin’ny rahona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fantatrao koa ve ny mampihevaheva ny raho-matevina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny manao ireny zava-mahagaga ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Ilay tanteraka amin’ny fahalalana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ianao kosa dia mafana loatra anaty fitafianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa vesaran’ny andro migaingaina ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny rivotra manempotra avy any atsimo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Afaka nanampy an’Andriamanitra ve ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fony Izy nanefy ny habakabaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nahamafy izany toa fitara-by?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mba ampianaro anay ireto àry, ry Jôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay holazainay amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hitanay izay hotenenina
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny haizin’ny tsy fahalalanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy hangataka ny hiteny aminy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa maniry ny hataony levona ve ny tenako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tampotampoka teo dia tsy hita ny fahazavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa voatakon-drahona ny masoandro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy eo dia nisy rivotra nitsoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nampisava izany rahona izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tara-bolamena no nipoitra avy any avaratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary famirapiratana mahatahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no indro manodidina an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izy no ilay Tsitoha tsy haintsika akaikezina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady lehibe amin’ny hery ananany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fatra-pitandro ny rariny sy ny fahamarinana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba mampahory ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa izany no tokony hanajana an’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy jereny kosa izay mihambo ho hendry.
