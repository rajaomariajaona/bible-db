document_id: JOB.37,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mipararetra ny foko eo am-pahitana izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitepotepo mila hiala amin’ny toerany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny fofonain’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampisy ny ranomandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampivaingana ny velaran-drano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia vesarany etona mando ny raho-matevina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aeliny etsy sy eroa ombàn-tselatra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Andriamanitra no mampihodinkodina azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahatanteraka, araka ny fikasany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra nandidiany azy eran’izao tontolo izao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izany no ataon’Andriamanitra mitranga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hamaizana ny tany, na hanambinana azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Anongilano sofina izao lazaiko izao, ry Jôba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miatoa kely aloha ka diniho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zava-mahagaga ataon’Andriamanitra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fantatrao ve ny fibaikoan’Andriamanitra ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny mahatonga ny tselatra eny amin’ny rahona?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fantatrao koa ve ny mampihevaheva ny raho-matevina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny manao ireny zava-mahagaga ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ilay tanteraka amin’ny fahalalana;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ianao kosa dia mafana loatra anaty fitafianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa vesaran’ny andro migaingaina ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny rivotra manempotra avy any atsimo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Afaka nanampy an’Andriamanitra ve ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony Izy nanefy ny habakabaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nahamafy izany toa fitara-by?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mba ampianaro anay ireto àry, ry Jôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay holazainay amin’Andriamanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy hitanay izay hotenenina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny haizin’ny tsy fahalalanay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Henoy, henoy ny fidoboky ny feon’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny firohondrohona avoaky ny vavany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsy hangataka ny hiteny aminy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa maniry ny hataony levona ve ny tenako?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tampotampoka teo dia tsy hita ny fahazavana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa voatakon-drahona ny masoandro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy eo dia nisy rivotra nitsoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nampisava izany rahona izany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tara-bolamena no nipoitra avy any avaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary famirapiratana mahatahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no indro manodidina an’Andriamanitra.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Izy no ilay Tsitoha tsy haintsika akaikezina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady lehibe amin’ny hery ananany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fatra-pitandro ny rariny sy ny fahamarinana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba mampahory ny olona.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Koa izany no tokony hanajana an’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy jereny kosa izay mihambo ho hendry.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mamakivaky ny lanitra manontolo ny tselany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tonga hatrany am-paran’ny tany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aorian’izany dia re ny feon’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirohondrohona amin-kery lehibe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa mandritra ny andrenesana izany feony izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia avelany hipariaka ny tselatra
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mirohondrohona ny feon’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahatalanjona fatratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy takatry ny saintsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo zavatra goavana vitany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa ny ranomandry baikoiny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Milatsahà amin’ny tany».
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany koa no ataony amin’ny orana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’ny oram-be mivatravatra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aatony ny asan’ny olona tsirairay avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hieken’ny olombelona rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zavatra vitan’Andriamanitra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary na ny biby aza dia miditra ao am-ponenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamitsaka ao amin’ny toeram-piereny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tonga avy any atsimo ny rivo-doza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy any avaratra ny hatsiaka.
