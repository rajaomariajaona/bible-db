    children:
    - type: text
      text: '14'
  - type: text
    text: 'Noho izany, hoy ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely, indro hofahanako zava-mahafaty ity vahoaka ity, ary hampisotroiko rano misy poizina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
