document_id: JER.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vahoaka heniky ny lainga
  - type: text
    content: Raha izao aho no manan-toerana any an-taniefitra
  - type: text
    content: tahaka ny fialofan’ireo mpivezivezy,
  - type: text
    content: dia hilaozako ny fireneko
  - type: text
    content: ka handeha lavitra azy aho.
  - type: text
    content: Satria samy mpijangajanga avokoa
  - type: text
    content: sy mpamadika mpiray tetika izy rehetra.
  '10':
  - type: text
    content: 'Dia hoy ny Tompo hoe:'
  - type: text
    content: «Hataoko korontam-bato i Jerosalema,
  - type: text
    content: ka ho fonenan’ny amboadia;
  - type: text
    content: ary ireo tanànan’i Joda
  - type: text
    content: hataoko lao tsy misy mponina.»
  '11':
  - type: text
    content: Mba misy olon-kendry anankiray ve
  - type: text
    content: mba afaka hahatakatra izao?
  - type: text
    content: Raha nitenenan’ny TOMPO izy,
  - type: text
    content: dia aoka mba hanambara
  - type: text
    content: izay antony nahasimba ny tany
  - type: text
    content: sy nahavoadoro azy ho tahaka ny taniefitra
  - type: text
    content: ka tsy andalovan’olona intsony.
  '12':
  - type: text
    content: 'Ary hoy indray ny TOMPO hoe: «Nandao ny fampianarana nomeko azy izy ary tsy nihaino na nanaraka izay nolazaiko taminy; '
  '13':
  - type: text
    content: 'nikiry tamin’ny ditram-pony hanao ratsy izy, ka nifikitra tamin’i '
  - type: text
    content: Bahala
  - type: text
    content: ' izay efa nanazaran’ny razany azy. '
  '14':
  - type: text
    content: 'Noho izany, hoy ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely, indro hofahanako zava-mahafaty ity vahoaka ity, ary hampisotroiko rano misy poizina. '
  '15':
  - type: text
    content: 'Haeliko any amin’ny firenen-kafa izay tsy fantany na fantatry ny razany izy, ka hoenjehiko amin’ny ady any ambara-pahalany ritra azy. '
  '16':
  - type: text
    content: Izany no TOMPOn’izao rehetra izao.
  - type: heading
    content: (Ny vahoaka)
  - type: text
    content: Tandremo, antsoy ho tonga
  - type: text
    content: ireo vehivavy mpitomany.
  - type: text
    content: Maniraha haka ireo efa za-draharaha;
  '17':
  - type: text
    content: aoka ho tonga faingana ireny
  - type: text
    content: ka hiredona hira fisaonana ho antsika!
  - type: text
    content: Aoka hijoy ny ranomasontsika
  - type: text
    content: ary ho kotsan-dranomaso ny hodi-masontsika!
  - type: heading
    content: (Jeremià)
  '18':
  - type: text
    content: 'Misy feo mitaraina re any '
  - type: text
    content: Tsiôna
  - type: text
    content: ':'
  - type: text
    content: «Indrisy, rava isika sady afa-baràka tokoa
  - type: text
    content: satria voatery hamoy ity tany ity
  - type: text
    content: noho ny nandrodanana ny tranontsika!»
  '19':
  - type: text
    content: Ianareo vehivavy, mihainoa ny tenin’ny TOMPO,
  - type: text
    content: 'sokafy tsara ny sofinareo amin’izay lazainy:'
  - type: text
    content: ampianaro hira fisaonana ny zanakavavinareo,
  - type: text
    content: samia ianareo mampianatra ny namany avy
  - type: text
    content: 'izao tononkira fitomaniana izao:'
  '2':
  - type: text
    content: «Toy ny tsipîka mihenjana ny lelany
  - type: note
    content: Tsipîka mihenjana na fiadiana manambana.
  - type: text
    content: ','
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  - type: text
    content: Lainga fa tsy toetra mahatoky
  - type: text
    content: no anjakany eo amin’ny tany.
  - type: text
    content: Mandroso miharatsy hatrany izy,
  - type: text
    content: ary Izaho kosa tsy fantany.
  '20':
  - type: text
    content: «Mianika ny varavarankelintsika ny fahafatesana,
  - type: text
    content: ary miditra ao an-dapantsika;
  - type: text
    content: eny an-dalambe no andringanany ny ankizy
  - type: text
    content: ary eny an-kianja no andripahany ny zatovo.»
  - type: heading
    content: (Ny Tompo)
  '21':
  - type: text
    content: Ambarao kosa, ry Jeremià,
  - type: text
    content: 'izao teny hentitry ny TOMPO izao:'
  - type: text
    content: «Eny amin’ny tany eny
  - type: text
    content: no miampatrampatra ny fatin’olona,
  - type: text
    content: toy ny zezika aparitaka eny an-tanimboly;
  - type: text
    content: tahaka ny amboara voajinja
  - type: text
    content: sady efa nilaozan’ny mpijinja
  - type: text
    content: saingy tsy misy olona mpanangona.»
  - type: heading
    content: Ny fahalalana ny Tompo no tena fahendrena
  '22':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Aoka ny hendry tsy hirehareha
  - type: text
    content: amin’ny fahendreny,
  - type: text
    content: aoka ny mahery tsy hirehareha
  - type: text
    content: amin’ny heriny,
  - type: text
    content: ary aoka ny mpanankarena tsy hirehareha
  - type: text
    content: amin’ny hareny!
  '23':
  - type: text
    content: Fa raha misy te hirehareha,
  - type: text
    content: dia aoka izy hirehareha
  - type: text
    content: ho afaka mahafantatra Ahy
  - type: text
    content: sy mahalala fa Izaho TOMPO,
  - type: text
    content: dia mampihatra ny hatsaram-po
  - type: text
    content: ary ny rariny sy ny hitsiny eto an-tany.
  - type: text
    content: Eny, ny olona toy ireny no sitrako
  - type: note
    content: 'ny olona... sitrako: dkt hafa izany no mahafinaritra Ahy. –Ny fiandohan’ity and ity dia tsiahivina ao amin’ny 1 Kôr 1.31; 2 Kôr 10.17.'
  - type: text
    content: ;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.»
  - type: heading
    content: Fampitandremana ireo voafora ivelany fotsiny
  '24':
  - type: text
    content: 'Indro avy ny andro, hoy ny teny hentitry ny TOMPO, izay hirotsahako an-tsehatra hamely ireo '
  - type: text
    content: voafora
  - type: text
    content: ' ivelany fotsiny: '
  '25':
  - type: text
    content: na ny Ejiptianina, na ny Jodeanina, na ny Edômita, na ny Hamônita, na ny Môabita na ireo mponina any an-taniefitra izay miharatra fihirifana. Satria izy rehetra ireo
  - type: note
    content: 'izy rehetra ireo: dkt hafa araka ny hebreo mahazatra tsy misy firenena voafora ary na dia ny vahoaka Israely ankapobeny aza dia tsy voafora ho an’ny Tompo.'
  - type: text
    content: ', eny na dia ny Israelita koa aza, dia tsy voafora fo ho an’ny Tompo.'
  '3':
  - type: text
    content: Samia miaro tena amin’ny namany avy ianareo
  - type: text
    content: ary aza matoky olona na dia ny rahalahy aza;
  - type: text
    content: fa Jakôba vaovao mamitaka tokoa izy
  - type: note
    content: Ny matoanteny hebreo midika hoe mamitaka na misongona ampiasaina eto dia mampahatsiaro ny anarana hoe Jakôba, izay razamben’ny vahoaka Israely; jereo Gen 25.26; 27.36; Hôs 12.3-4.
  - type: text
    content: ','
  - type: text
    content: ary na ny sakaiza aza manaratsy anareo.
  '4':
  - type: text
    content: Samy mamitaka ny namany izy
  - type: text
    content: fa tsy misy milaza ny marina,
  - type: text
    content: satria efa zatra mandainga.
  - type: text
    content: Nironany loatra ny fanaovan-dratsy
  - type: text
    content: ka tsy afaka hiverina amiko intsony izy.
  '5':
  - type: text
    content: Herisetra arahina herisetra
  - type: note
    content: Ny faran’ny and 4 sy fiandohan’ny and 5 dia nadika araka ny dkt tranainy grika sy latinina. Tsy mazava ny hebreo, ka misy manao hoe vizaky ny manao ratsy izy. 5 Monina eo anivon’ny fitaka ianao; fitaka no tsy anekeny...
  - type: text
    content: ','
  - type: text
    content: ary fitaka arahina fitaka!
  - type: text
    content: Tsy manaiky hahalala Ahy izy,
  - type: text
    content: hoy ny teny hentitra ambarako!»
  '6':
  - type: text
    content: 'Koa hoy ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Hodioviko amin’ny afo izy
  - type: text
    content: ary hozahako toetra.
  - type: text
    content: Satria ahoana ny fomba hafa hataoko
  - type: text
    content: amin’ny faharatsian
  - type: note
    content: 'ny faharatsian’ny: teny latsaka amin’ny rijan-teny hebreo, fa narenina araka ny dkt tranainy grika sy aramianina.'
  - type: text
    content: ’ny vahoakako?
  '7':
  - type: text
    content: Toy ny zana-tsipîka mahafaty
  - type: note
    content: 'mahafaty: dkt hafa maranitra.'
  - type: text
    content: ny lelany,
  - type: text
    content: 'ka lainga avokoa izay lazainy:'
  - type: text
    content: Tsara vava amin’ny namany izy,
  - type: text
    content: fa ao anatiny manao otri-po.
  '8':
  - type: text
    content: Koa tsy hirotsaka ve Aho
  - type: text
    content: hamely ireny olona ireny,
  - type: text
    content: ka hamaly faty ny firenena toy izany
  - type: note
    content: Jereo 5.9,29.
  - type: text
    content: ','
  - type: text
    content: hoy ny teny hentitra ambarako?»
  - type: heading
    content: Andron-dranomaso sy toloko
  '9':
  - type: text
    content: Noho ny amin’ny tendrombohitra
  - type: text
    content: no hitomaniako sy hitarainako,
  - type: text
    content: ary noho ny amin’ny kijana any an-taniefitra
  - type: text
    content: no hanaovako hira fisaonana,
  - type: text
    content: satria voadoro avokoa izy rehetra
  - type: text
    content: ka tsy andalovan’olona intsony.
  - type: text
    content: Tsy re any intsony ny fitrenan’ny andian’omby;
  - type: text
    content: ary samy lasa nandositra avokoa
  - type: text
    content: ny voro-manidina sy ny bibidia.
