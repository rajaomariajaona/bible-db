document_id: 2SA.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Toherin’i Hosay ny torohevitr’i Ahitôfela
  - type: text
    content: 'Hoy i Ahitôfela tamin’i Absalôma:'
  - type: text
    content: '–Aoka aho hifidy lehilahy 12 000 hoentiko hanenjika an’i Davida anio alina. '
  '10':
  - type: text
    content: 'Koa na dia izay be herimpo indrindra toy ny liona aza dia hivalaketraka, satria fantatry ny Israelita rehetra fa kalaza ny rainao ary mahery fo ireo tafaraka aminy. '
  '11':
  - type: text
    content: 'Izao àry no mba torohevitro: Vorio eto aminao ny miaramila israelita rehetra, hatrany Dana ka hatrany Beera-Seba ka ho toy ny fasika amoron-dranomasina ny hamaroany; ary ny tenanao mihitsy no hiantafika miaraka aminy'
  - type: note
    content: Mitaky andro maromaro ny famoriana miaramila hiantafika; izay no nahazoan’i Hosay nampandre an’i Davida (and 15-22), sy nahazoan’i Davida niomana tsara hiatrika ady (toko 18).
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ho tonga any amin’izay itoeran’i Davida isika, ka hilatsaka aminy toy ny filatsaky ny ando amin’ny tany; ary tsy hasiantsika miangana na dia iray akory aza izy mbamin’ny olona rehetra tafaraka aminy. '
  '13':
  - type: text
    content: Fa raha mitsoaka mankamin’ny tanàna iray izy, dia hitondran’i Israely manontolo tady mahazaka izany tanàna izany, ka hotarihintsika hivarina any amin’ny ranon-driaka mandra-pahafoana azy tsy hisy vato kely iray hita ao intsony.
  '14':
  - type: text
    content: 'Ary hoy i Absalôma sy ny lehilahy israelita rehetra hoe:'
  - type: text
    content: –Tsara noho ny torohevitr’i Ahitôfela ny an’i Hosay, ilay Arkita!
  - type: text
    content: Efa nataon’ny TOMPO manko izay tsy hampahomby ny torohevitr’i Ahitôfela, na dia tsara aza, mba hampidirany loza amin’i Absalôma.
  - type: heading
    content: I Davida mita an’i Jôrdàna
  '15':
  - type: text
    content: 'Hoy i Hosay tamin’i Tsadôka sy i Abiatara mpisorona:'
  - type: text
    content: '–Izany sy izany no torohevitra nomen’i Ahitôfela an’i Absalôma sy ireo '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely, ary dia izay sy izay kosa ny torohevitra nomeko. '
  '16':
  - type: text
    content: Ankehitriny, maniraha haingana hampandre an’i Davida; lazao izy tsy hijanona amin’ny lemak’i Jôrdàna rahalina fa mità faingana raha tsy te ho ringana na ny tenany na ireo olona rehetra tafaraka aminy.
  '17':
  - type: text
    content: Dia niandry tao Haîna-Rogèla i Jônatàna sy i Ahimahatsa; ary nisy ankizivavy nilaza tamin’izy roa lahy mba hahafahany kosa mampandre an’i Davida mpanjaka
  - type: note
    content: 'Haîna-Rogèla: na Loharanon’ny Mpamotsy lamba dia ao amin’ny lohasahan’i Kidrôna, atsimo atsinanan’i Jerosalema. «Ny Fantsakan’i Jôba» no iantsoana ilay toerana ankehitriny.'
  - type: text
    content: ', satria natahotra ny hisy mpahita izy raha miditra ny tanàna. '
  '18':
  - type: text
    content: 'Nefa nisy tovolahy iray nahita azy roa lahy ireo ka nanambara tamin’i Absalôma; fa nandositra faingana izy roa lahy ary tonga tany Bahorima tao an-tranon’ny lehilahy iray, izay nisy lava-pantsakana teo an-tokotaniny. Dia nidina tao ireo. '
  '19':
  - type: text
    content: 'Naka labasy ny vadin’ilay rangahy tompon-trano ka narakony teo am-bavan’ny lava-pantsakana sy nanahazany voan-javatra mba tsy hanampoizana na inona na inona. '
  '2':
  - type: text
    content: 'Hotampohiko amin’ilay mbola sasatra sy reraka iny izy ka hampihorohoroiko. Handositra ny olona rehetra tafaraka taminy, ary ny mpanjaka irery no hovonoiko ho faty. '
  '20':
  - type: text
    content: 'Ary niditra tao an-tranon’ilay ramatoa ny mpanompon’i Absalôma ka nanao hoe:'
  - type: text
    content: –Aiza i Ahimahatsa sy i Jônatàna?
  - type: text
    content: 'Dia hoy ny navalin’ilay vehivavy taminy:'
  - type: text
    content: –Nita ny rano izy ireo.
  - type: text
    content: 'Rehefa nitady ihany ireto mpanompon’i Absalôma ka tsy nahita, dia niverina nankany Jerosalema. '
  '21':
  - type: text
    content: 'Nony lasa ireo, dia niakatra avy tao an-dava-pantsakana izy roa lahy ka lasa nanambara tamin’i Davida mpanjaka ny torohevitra nataon’i Ahitôfela hamelezana ny tenany sy ny mpomba azy, ary nilaza hoe: Miaingà, ka mità faingana ny rano.'
  '22':
  - type: text
    content: Ary lasa i Davida sy ireo mpanaraka azy niampita ny ranon’i Jôrdàna; ka nony maraina ny andro, dia tsy nisy tsy tafita an’i Jôrdàna na dia olona iray aza.
  '23':
  - type: text
    content: Nony hitan’i Ahitôfela fa tsy narahina ny heviny, dia nasiany lasely ny borikiny, ary lasa izy nody tany an-tanàna fonenany
  - type: note
    content: Jereo 15.2.
  - type: text
    content: . Rehefa avy nanafatra ny ankohonany izy, dia nananton-tena ary maty ka nalevina tao amin’ny fasan-drainy.
  - type: heading
    content: I Davida tao Mahanaîma
  '24':
  - type: text
    content: Tonga tao Mahanaîma
  - type: note
    content: Jereo Fiand 32.3 sy nta.
  - type: text
    content: ' i Davida, raha nita an’i Jôrdàna i Absalôma mbamin’ny miaramila rehetra amin’i Israely. '
  '25':
  - type: text
    content: Notendren’i Absalôma ho lehiben’ny tafika hisolo an’i Jôaba i Hamasà. Io Hamasà io dia zanakalahin’ilay Israelita atao hoe Jitrà, ilay niray tamin’i Abigaîla zanakavavin’i Nahasy ary rahavavin’i Tseroià, renin’i Jôaba
  - type: note
    content: Araka ny dkt grika tranainy sy ny rijan-teny 1 Tan 2.16-17; i Jitrà dia Ismaelita, ary i Abigaîla zanakavavin’i Jisay.
  - type: text
    content: .
  '26':
  - type: text
    content: Nitoby tao amin’ny faritany Gilehada i Absalôma sy ny Israelita
  - type: note
    content: 'Malalaka be ny filazana eto: ny faritany Gilehada dia mivelatra any atsinanan’i Jôrdàna; ao anatin’izany, i Nahanaîma (and 24).'
  - type: text
    content: .
  '27':
  - type: text
    content: Rehefa tonga tao Mahanaîma i Davida, dia indreo tamy i Sôbỳ zanakalahin’i Nahasy avy any Rabà renivohitry ny Hamônita, sy i Makira zanakalahin’i Hamiela avy any Lô-Debàra, ary i Barzilay izay Gilehadita avy any Rôgelima
  - type: note
    content: 'Rabà: jereo 11.1; Lô-Debàra: jereo 9.4 sy nta; Rôgelima: toerana tokony ho 25 km atsimo andrefan’ny farihy Genesareta.'
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Izy telo lahy ireo dia nitondra ho an’i Davida sy ny olona tafaraka taminy fitaovam-pandriana, lamba volonondry, lovia bakoly sy vilany tany, ary sakafo isan-karazany: varimbazaha, ôrza, lafarinina, lango, tsaramaso, voanemba, '
  '29':
  - type: text
    content: 'tantely, rononomandry, ary hena ondry sy hena omby; fa hoy izy telo lahy hoe: «Matin-kanoanana sy main’ny hetaheta ary sasatry ny dia tany an-taniefitra ireo olona ireo.»'
  '3':
  - type: text
    content: Dia haveriko ho atỳ aminao ny vahoaka rehetra; satria miankina amin’ny fahazoana io lehilahy tadiavinao io ny hiverenan’ny besinimaro aminao ka hiadanan’ny vahoaka rehetra.
  '4':
  - type: text
    content: 'Nahafaly an’i Absalôma sy ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely rehetra izany hevitra izany. '
  '5':
  - type: text
    content: 'Kanefa hoy i Absalôma hoe:'
  - type: text
    content: –Antsoy koa i Hosay, ilay Arkita, mba handrenesantsika izay teniny.
  '6':
  - type: text
    content: 'Rehefa tonga teo amin’i Absalôma i Hosay, dia nilazany hoe:'
  - type: text
    content: –Izao no notenenin’i Ahitôfela, ka harahintsika ve ny teniny? Raha tsy sitrakao izany, dia mitenena ianao.
  '7':
  - type: text
    content: 'Fa hoy ny navalin’i Hosay an’i Absalôma:'
  - type: text
    content: '–Tamin’ity dia tsy tsara ny torohevitr’i Ahitôfela. '
  '8':
  - type: text
    content: 'Ka hoy aho hoe: Fantatrao tsara ny rainao sy ireo olony; fa kalaza ireo sady masiaka tahaka ny orsa very anaka any an-tsaha. Ary ny rainao dia lehilahy mpiady ka tsy mba miara-mitoetra amin’ny vahoaka nony alina. '
  '9':
  - type: text
    content: 'Indro izy ankehitriny fa miery any an-davabato na any an-toeran-kafa any. Raha manomboka misy voa amintsika, izay mandre ny vaovao dia hanao hoe: Nahafatesana ny olona mpanaraka an’i Absalôma. '
