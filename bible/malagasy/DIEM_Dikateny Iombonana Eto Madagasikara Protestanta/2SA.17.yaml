document_id: 2SA.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toherin’i Hosay ny torohevitr’i Ahitôfela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy i Ahitôfela tamin’i Absalôma:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka aho hifidy lehilahy 12 000 hoentiko hanenjika an’i Davida anio alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hotampohiko amin’ilay mbola sasatra sy reraka iny izy ka hampihorohoroiko. Handositra ny olona rehetra tafaraka taminy, ary ny mpanjaka irery no hovonoiko ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia haveriko ho atỳ aminao ny vahoaka rehetra; satria miankina amin’ny fahazoana io lehilahy tadiavinao io ny hiverenan’ny besinimaro aminao ka hiadanan’ny vahoaka rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nahafaly an’i Absalôma sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely rehetra izany hevitra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Kanefa hoy i Absalôma hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Antsoy koa i Hosay, ilay Arkita, mba handrenesantsika izay teniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa tonga teo amin’i Absalôma i Hosay, dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izao no notenenin’i Ahitôfela, ka harahintsika ve ny teniny? Raha tsy sitrakao izany, dia mitenena ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy ny navalin’i Hosay an’i Absalôma:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tamin’ity dia tsy tsara ny torohevitr’i Ahitôfela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ka hoy aho hoe: Fantatrao tsara ny rainao sy ireo olony; fa kalaza ireo sady masiaka tahaka ny orsa very anaka any an-tsaha. Ary ny rainao dia lehilahy mpiady ka tsy mba miara-mitoetra amin’ny vahoaka nony alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Indro izy ankehitriny fa miery any an-davabato na any an-toeran-kafa any. Raha manomboka misy voa amintsika, izay mandre ny vaovao dia hanao hoe: Nahafatesana ny olona mpanaraka an’i Absalôma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa na dia izay be herimpo indrindra toy ny liona aza dia hivalaketraka, satria fantatry ny Israelita rehetra fa kalaza ny rainao ary mahery fo ireo tafaraka aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao àry no mba torohevitro: Vorio eto aminao ny miaramila israelita rehetra, hatrany Dana ka hatrany Beera-Seba ka ho toy ny fasika amoron-dranomasina ny hamaroany; ary ny tenanao mihitsy no hiantafika miaraka aminy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mitaky andro maromaro ny famoriana miaramila hiantafika; izay no nahazoan’i Hosay nampandre an’i Davida (and 15-22), sy nahazoan’i Davida niomana tsara hiatrika ady (toko 18).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ho tonga any amin’izay itoeran’i Davida isika, ka hilatsaka aminy toy ny filatsaky ny ando amin’ny tany; ary tsy hasiantsika miangana na dia iray akory aza izy mbamin’ny olona rehetra tafaraka aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha mitsoaka mankamin’ny tanàna iray izy, dia hitondran’i Israely manontolo tady mahazaka izany tanàna izany, ka hotarihintsika hivarina any amin’ny ranon-driaka mandra-pahafoana azy tsy hisy vato kely iray hita ao intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy i Absalôma sy ny lehilahy israelita rehetra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsara noho ny torohevitr’i Ahitôfela ny an’i Hosay, ilay Arkita!
- type: usfm
  marker: p
  children:
  - type: text
    text: Efa nataon’ny TOMPO manko izay tsy hampahomby ny torohevitr’i Ahitôfela, na dia tsara aza, mba hampidirany loza amin’i Absalôma.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida mita an’i Jôrdàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy i Hosay tamin’i Tsadôka sy i Abiatara mpisorona:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izany sy izany no torohevitra nomen’i Ahitôfela an’i Absalôma sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely, ary dia izay sy izay kosa ny torohevitra nomeko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ankehitriny, maniraha haingana hampandre an’i Davida; lazao izy tsy hijanona amin’ny lemak’i Jôrdàna rahalina fa mità faingana raha tsy te ho ringana na ny tenany na ireo olona rehetra tafaraka aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia niandry tao Haîna-Rogèla i Jônatàna sy i Ahimahatsa; ary nisy ankizivavy nilaza tamin’izy roa lahy mba hahafahany kosa mampandre an’i Davida mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Haîna-Rogèla:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Loharanon’ny Mpamotsy lamba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ao amin’ny lohasahan’i Kidrôna, atsimo atsinanan’i Jerosalema. «Ny Fantsakan’i Jôba» no iantsoana ilay toerana ankehitriny.
    marker-yv: yv-n
  - type: text
    text: ', satria natahotra ny hisy mpahita izy raha miditra ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa nisy tovolahy iray nahita azy roa lahy ireo ka nanambara tamin’i Absalôma; fa nandositra faingana izy roa lahy ary tonga tany Bahorima tao an-tranon’ny lehilahy iray, izay nisy lava-pantsakana teo an-tokotaniny. Dia nidina tao ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Naka labasy ny vadin’ilay rangahy tompon-trano ka narakony teo am-bavan’ny lava-pantsakana sy nanahazany voan-javatra mba tsy hanampoizana na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary niditra tao an-tranon’ilay ramatoa ny mpanompon’i Absalôma ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza i Ahimahatsa sy i Jônatàna?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navalin’ilay vehivavy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nita ny rano izy ireo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa nitady ihany ireto mpanompon’i Absalôma ka tsy nahita, dia niverina nankany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nony lasa ireo, dia niakatra avy tao an-dava-pantsakana izy roa lahy ka lasa nanambara tamin’i Davida mpanjaka ny torohevitra nataon’i Ahitôfela hamelezana ny tenany sy ny mpomba azy, ary nilaza hoe: Miaingà, ka mità faingana ny rano.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary lasa i Davida sy ireo mpanaraka azy niampita ny ranon’i Jôrdàna; ka nony maraina ny andro, dia tsy nisy tsy tafita an’i Jôrdàna na dia olona iray aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nony hitan’i Ahitôfela fa tsy narahina ny heviny, dia nasiany lasely ny borikiny, ary lasa izy nody tany an-tanàna fonenany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 15.2.
    marker-yv: yv-n
  - type: text
    text: . Rehefa avy nanafatra ny ankohonany izy, dia nananton-tena ary maty ka nalevina tao amin’ny fasan-drainy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida tao Mahanaîma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tonga tao Mahanaîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Fiand 32.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Davida, raha nita an’i Jôrdàna i Absalôma mbamin’ny miaramila rehetra amin’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Notendren’i Absalôma ho lehiben’ny tafika hisolo an’i Jôaba i Hamasà. Io Hamasà io dia zanakalahin’ilay Israelita atao hoe Jitrà, ilay niray tamin’i Abigaîla zanakavavin’i Nahasy ary rahavavin’i Tseroià, renin’i Jôaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny dkt grika tranainy sy ny rijan-teny 1 Tan 2.16-17; i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jitrà dia Ismaelita, ary i Abigaîla zanakavavin’i Jisay.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nitoby tao amin’ny faritany Gilehada i Absalôma sy ny Israelita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Malalaka be ny filazana eto: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny faritany Gilehada
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mivelatra any atsinanan’i Jôrdàna; ao anatin’izany, i Nahanaîma (and 24).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Rehefa tonga tao Mahanaîma i Davida, dia indreo tamy i Sôbỳ zanakalahin’i Nahasy avy any Rabà renivohitry ny Hamônita, sy i Makira zanakalahin’i Hamiela avy any Lô-Debàra, ary i Barzilay izay Gilehadita avy any Rôgelima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Rabà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 11.1; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lô-Debàra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 9.4 sy nta; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Rôgelima:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' toerana tokony ho 25 km atsimo andrefan’ny farihy Genesareta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izy telo lahy ireo dia nitondra ho an’i Davida sy ny olona tafaraka taminy fitaovam-pandriana, lamba volonondry, lovia bakoly sy vilany tany, ary sakafo isan-karazany: varimbazaha, ôrza, lafarinina, lango, tsaramaso, voanemba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'tantely, rononomandry, ary hena ondry sy hena omby; fa hoy izy telo lahy hoe: «Matin-kanoanana sy main’ny hetaheta ary sasatry ny dia tany an-taniefitra ireo olona ireo.»'
