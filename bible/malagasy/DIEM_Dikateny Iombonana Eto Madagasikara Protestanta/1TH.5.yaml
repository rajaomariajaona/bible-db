document_id: 1TH.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Momba ny andro sy ny fotoana hitrangan’izany, ry havana, dia tsy ilaina ny hanoratako aminareo. '
  '10':
  - type: text
    content: 'Maty ho antsika i Kristy, mba hahatonga antsika hiara-miaina aminy, na mbola velona aina isika na efa maty, amin’ny andro hiaviany. '
  '11':
  - type: text
    content: Noho izany àry, mifampirisiha sy mifampahereza ianareo araka izay efa fanaonareo.
  - type: heading
    content: Hafatrafatra sy fanaovam-beloma
  '12':
  - type: text
    content: 'Mangataka aminareo izahay, ry havana, mba hanaja izay mikely aina eo anivonareo, dia izay voatendrin’ny Tompo hitarika sy hananatra anareo. '
  '13':
  - type: text
    content: Fankatoavana be dia be ombàm-pitiavana no asehoy azy ireo, noho ny asa tontosainy. Mihavàna tsara ianareo samy ianareo.
  '14':
  - type: text
    content: 'Miangavy anareo izahay, ry havana: anaro ny kamo'
  - type: note
    content: 'ny kamo: dkt hafa izay tsy mitoetra tsara, izay misarita-piainana.'
  - type: text
    content: ', ampaherezo ny katahotra, ampio ny osa, ary aoka hahari-po amin’ny olona rehetra. '
  '15':
  - type: text
    content: Tandremo mba tsy hisy hamaly ratsy ny ratsy, fa miezaha mandrakariva hifanasoa ary hanasoa ny olona rehetra.
  '16':
  - type: text
    content: 'Mifalia mandrakariva; '
  '17':
  - type: text
    content: 'mivavaha lalandava; '
  '18':
  - type: text
    content: 'misaora an’Andriamanitra amin’ny zavatra rehetra, fa izany no sitrak’Andriamanitra hataonareo tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa.'
  '19':
  - type: text
    content: 'Aza vonoina ny asan’ny Fanahy Masina; '
  '2':
  - type: text
    content: Satria fantatrareo tsara fa ny andron’ny Tompo dia ho avy tampoka, toy ny iavian’ny mpangalatra amin’ny alina
  - type: note
    content: Ampit Mt 24.43; Lk 12.39; 2Pt 3.10.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'aza atao tsinontsinona ny teny ataon’ireo mpilaza hafatra avy amin’Andriamanitra; '
  '21':
  - type: text
    content: 'diniho ny zavatra rehetra, ka tano izay tsara; '
  '22':
  - type: text
    content: halaviro daholo ny zava-dratsy isan-karazany.
  '23':
  - type: text
    content: 'Ilay Andriamanitra loharanon’ny fiadanana anie hahatonga anareo ho voatokana tanteraka ho Azy; ka harovany avokoa anie ny fanahinareo sy ny ainareo ary ny tenanareo mba tsy hanan-tsiny amin’ny andro hiavian’i Jesoa Kristy Tompontsika! '
  '24':
  - type: text
    content: Mitana ny toky nomeny Andriamanitra Izay miantso anareo, ka hoefainy izany.
  '25':
  - type: text
    content: Ry havana, mivavaha koa ho anay.
  '26':
  - type: text
    content: Ataovy veloma amin’ny fanoroham-pihavanana daholo ny havana rehetra iray finoana.
  '27':
  - type: text
    content: 'Iangaviako indrindra amin’ny anaran’ny Tompo ianareo: mba vakio amin’ny havana rehetra iray finoana ity taratasy ity.'
  '28':
  - type: text
    content: Homba anareo anie ny fahasoavan’i Jesoa Kristy Tompontsika!
  '3':
  - type: text
    content: 'Amin’ny anaovan’ny olona hoe: «Miadana sy mandry feizay ny zavatra rehetra'
  - type: note
    content: Ampit Jer 6.14; 8.11.
  - type: text
    content: '!», amin’iny no hamely azy tampoka ny fandringanana ka tsy ho azony andosirana mihitsy, mova tsy ny fanaintainan’ny vehivavy bevohòka mihetsi-jaza. '
  '4':
  - type: text
    content: 'Fa ianareo, ry havana, tsy mba ao amin’ny maizina, ka tsy mba hanampoka anareo toy ny mpangalatra izany andro izany. '
  '5':
  - type: text
    content: 'Satria ianareo rehetra dia an’ny mazava sy an’ny andro; tsy mba an’ny alina isika na an’ny maizina. '
  '6':
  - type: text
    content: 'Koa aza mba matory tahaka ny sasany, fa aoka hiambina sy hahonon-tena. '
  '7':
  - type: text
    content: 'Fa ny alina no atorian’ny olona ary ny alina no imamoany. '
  '8':
  - type: text
    content: Fa satria an’ny andro isika, dia aoka hahonon-tena ka hitafy finoana sy fitiavana ho toy ny fiarovan-tratra, ary hitafy fanantenam-pamonjena ho toy ny fiarovan-doha
  - type: note
    content: Is 59.17.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Fa tsy notendren’Andriamanitra hiharan’ny '
  - type: text
    content: fahatezerany
  - type: text
    content: ' isika, fa mba hahazo famonjena amin’ny alalan’i Jesoa Kristy Tompontsika. '
