document_id: 1TH.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Momba ny andro sy ny fotoana hitrangan’izany, ry havana, dia tsy ilaina ny hanoratako aminareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Maty ho antsika i Kristy, mba hahatonga antsika hiara-miaina aminy, na mbola velona aina isika na efa maty, amin’ny andro hiaviany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Noho izany àry, mifampirisiha sy mifampahereza ianareo araka izay efa fanaonareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatrafatra sy fanaovam-beloma
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mangataka aminareo izahay, ry havana, mba hanaja izay mikely aina eo anivonareo, dia izay voatendrin’ny Tompo hitarika sy hananatra anareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fankatoavana be dia be ombàm-pitiavana no asehoy azy ireo, noho ny asa tontosainy. Mihavàna tsara ianareo samy ianareo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Miangavy anareo izahay, ry havana: anaro ny kamo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny kamo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: izay tsy mitoetra tsara, izay misarita-piainana.
      marker-yv: yv-n
    - type: text
      text: ', ampaherezo ny katahotra, ampio ny osa, ary aoka hahari-po amin’ny olona rehetra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tandremo mba tsy hisy hamaly ratsy ny ratsy, fa miezaha mandrakariva hifanasoa ary hanasoa ny olona rehetra.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mifalia mandrakariva; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'mivavaha lalandava; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'misaora an’Andriamanitra amin’ny zavatra rehetra, fa izany no sitrak’Andriamanitra hataonareo tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Aza vonoina ny asan’ny Fanahy Masina; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Satria fantatrareo tsara fa ny andron’ny Tompo dia ho avy tampoka, toy ny iavian’ny mpangalatra amin’ny alina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 24.43; Lk 12.39; 2Pt 3.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'aza atao tsinontsinona ny teny ataon’ireo mpilaza hafatra avy amin’Andriamanitra; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'diniho ny zavatra rehetra, ka tano izay tsara; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: halaviro daholo ny zava-dratsy isan-karazany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ilay Andriamanitra loharanon’ny fiadanana anie hahatonga anareo ho voatokana tanteraka ho Azy; ka harovany avokoa anie ny fanahinareo sy ny ainareo ary ny tenanareo mba tsy hanan-tsiny amin’ny andro hiavian’i Jesoa Kristy Tompontsika! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mitana ny toky nomeny Andriamanitra Izay miantso anareo, ka hoefainy izany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ry havana, mivavaha koa ho anay.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ataovy veloma amin’ny fanoroham-pihavanana daholo ny havana rehetra iray finoana.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Iangaviako indrindra amin’ny anaran’ny Tompo ianareo: mba vakio amin’ny havana rehetra iray finoana ity taratasy ity.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Homba anareo anie ny fahasoavan’i Jesoa Kristy Tompontsika!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Amin’ny anaovan’ny olona hoe: «Miadana sy mandry feizay ny zavatra rehetra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jer 6.14; 8.11.
      marker-yv: yv-n
    - type: text
      text: '!», amin’iny no hamely azy tampoka ny fandringanana ka tsy ho azony andosirana mihitsy, mova tsy ny fanaintainan’ny vehivavy bevohòka mihetsi-jaza. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa ianareo, ry havana, tsy mba ao amin’ny maizina, ka tsy mba hanampoka anareo toy ny mpangalatra izany andro izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Satria ianareo rehetra dia an’ny mazava sy an’ny andro; tsy mba an’ny alina isika na an’ny maizina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa aza mba matory tahaka ny sasany, fa aoka hiambina sy hahonon-tena. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa ny alina no atorian’ny olona ary ny alina no imamoany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa satria an’ny andro isika, dia aoka hahonon-tena ka hitafy finoana sy fitiavana ho toy ny fiarovan-tratra, ary hitafy fanantenam-pamonjena ho toy ny fiarovan-doha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 59.17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa tsy notendren’Andriamanitra hiharan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fahatezerany
    - type: text
      text: ' isika, fa mba hahazo famonjena amin’ny alalan’i Jesoa Kristy Tompontsika. '
