document_id: 1SA.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tonga naka ny Vatamasin’ny TOMPO ny mponin’i Kiriata-Jeharîma ka nitondra azy ho ao an-tranon’i Abinadàba teo amin’ny havoana iray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 6.3.
    marker-yv: yv-n
  - type: text
    text: . Dia natokan’izy ireo ho mpiambina ny Vatamasin’ny TOMPO i Elihezera zanakalahin’i Abinadàba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Resy ny Filistinina. Tonga filohan’i Israely i Samoela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hatramin’ny nitoeran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasin’ny TOMPO
  - type: text
    text: ' tany Kiriata-Jeharîma, dia andro maro no nifandimby, efa roapolo taona izao. Nalahelo te hiverina amin’ny TOMPO ny Israelita rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nilazan’i Samoela hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha amin’ny fonareo manontolo tokoa no hiverenanareo amin’ny TOMPO, dia atsaharo ny fanompoanareo andriamani-kafa sy fanompoanareo ny sampy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hastôreta
  - type: text
    text: ; aoka hiraiki-po amin’ny TOMPO ianareo, ary aza manompo afa-tsy Izy irery ihany, fa hovonjeny tsy ho voagejan’ny Filistinina ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia narian’ny Israelita ireo sampin’ny andriamani-dahy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' sy ny andriamani-bavy Hastôreta, ka ny TOMPO no hany notompoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy eo dia hoy i Samoela hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ho vory any Mitsepà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mitsepà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 12 km any avaratr’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' ny vahoaka Israely tsivakivolo, fa izaho hivavaka amin’ny TOMPO ho azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia tafangona tao Mitsepà ny Israelita. Nanovo rano izy ireo, dia nararany tamin’ny tany teo anatrehan’ny TOMPO izany. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Nifady hanina
  - type: text
    text: ' koa izy tamin’izany andro izany sady niaiky heloka hoe: «Efa nanota tamin’ny TOMPO izahay.» Tao Mitsepà no nahatonga an’i Samoela ho filohan’ny vahoaka Israely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa fantatry ny Filistinina fa nivory tany Mitsepà ny Israelita, dia tapa-kevitra ireo andriana dimy filohan’ny Filistinina fa hanafika azy. Nony ren’ny Israelita izany, dia natahotra ny Filistinina izy, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka nanao tamin’i Samoela hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza arianao izahay, fa mivavaha amin’ny TOMPO Andriamanitsika ho anay, mba hamonjeny anay tsy ho voagejan’ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Naka zanak’ondry mbola minono i Samoela ka nanolotra izany ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho an’ny TOMPO; dia nitalaho tamin’ny TOMPO ho an’ny vahoaka Israely izy, ary ny TOMPO namaly ny vavaka nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha mbola nanatitra ilay sorona i Samoela, dia nandroso hanafika an’i Israely kosa ny Filistinina. Tamin’izay indrindra anefa ny TOMPO no nampirefotra kotro-baratra tamin’ny miaramila filistinina sy nampifanaritaka azy, ka resin’ny Israelita izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Niala tao Mitsepà ny tafik’i Israely ka nanenjika ny Filistinina hatrany ambanin’ny Bety-Kàra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bety-Kàra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra mazava ny misy azy.
    marker-yv: yv-n
  - type: text
    text: ' mandra-pandresiny azy tanteraka. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Naka vato i Samoela ka natsangany teo anelanelan’i Mitsepà sy i Sèna izany ary nomeny anarana hoe Ebena-Hezera na «Vatom-pamonjena», fa hoy izy hoe: «Efa namonjy antsika hatretỳ ny TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sèna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra mazava ny misy azy. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ebena-Hezera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toa toerana hafa noho ilay voateny ao amin’ny 4.1.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Menatra ny fahareseny loatra ny Filistinina, ka tsy sahy nitsofoka ny faritanin’i Israely intsony, satria ny TOMPO naneho ny heriny tamin’izy ireo nandritra ny andro rehetra niainan’i Samoela. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ireo tanàna izay nalain’ny Filistinina tamin’ny Israelita, teo anelanelan’i Hekrôna sy Gata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hekrôna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 5.8, 10 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ', dia tafaverina soa aman-tsara tamin’ny Israelita; koa afaka teo an-tanan’ny Filistinina izany faritra izany. Ary dia nisy koa ny fandriampahalemana teo amin’ny Israelita sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I Samoela no filohan’ny vahoaka Israely mandra-pahafatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Isan-taona izy dia nandeha nitety an’i Betela sy i Gilgala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Betela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 15 km any avaratr’i Jerosalema. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gilgala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': anaran-toerana maro ao amin’ny tanin’i Israely; mety ho ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gilgala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' akaikin’i Jerikao no voalaza eto (jereo Jos 4.19-20; 5.9-10).'
    marker-yv: yv-n
  - type: text
    text: ' ary i Mitsepà ka nitsara tamin’ireo tanàna telo ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Rehefa izany, dia niverina nody tany Ramà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ramà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izay nisy azy izy; nitsarany ny Israelita koa tao sady nanorenany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' anankiray ho an’ny TOMPO.'
