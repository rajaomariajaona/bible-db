document_id: 1SA.7,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tonga naka ny Vatamasin’ny TOMPO ny mponin’i Kiriata-Jeharîma ka nitondra azy ho ao an-tranon’i Abinadàba teo amin’ny havoana iray
  - type: note
    content: Jereo 2 Sam 6.3.
  - type: text
    content: . Dia natokan’izy ireo ho mpiambina ny Vatamasin’ny TOMPO i Elihezera zanakalahin’i Abinadàba.
  - type: heading
    content: Resy ny Filistinina. Tonga filohan’i Israely i Samoela
  '10':
  - type: text
    content: 'Fa raha mbola nanatitra ilay sorona i Samoela, dia nandroso hanafika an’i Israely kosa ny Filistinina. Tamin’izay indrindra anefa ny TOMPO no nampirefotra kotro-baratra tamin’ny miaramila filistinina sy nampifanaritaka azy, ka resin’ny Israelita izy ireo. '
  '11':
  - type: text
    content: Niala tao Mitsepà ny tafik’i Israely ka nanenjika ny Filistinina hatrany ambanin’ny Bety-Kàra
  - type: note
    content: 'Bety-Kàra: toerana tsy fantatra mazava ny misy azy.'
  - type: text
    content: ' mandra-pandresiny azy tanteraka. '
  '12':
  - type: text
    content: 'Naka vato i Samoela ka natsangany teo anelanelan’i Mitsepà sy i Sèna izany ary nomeny anarana hoe Ebena-Hezera na «Vatom-pamonjena», fa hoy izy hoe: «Efa namonjy antsika hatretỳ ny TOMPO'
  - type: note
    content: 'Sèna: toerana tsy fantatra mazava ny misy azy. –Ebena-Hezera: toa toerana hafa noho ilay voateny ao amin’ny 4.1.'
  - type: text
    content: .»
  '13':
  - type: text
    content: 'Menatra ny fahareseny loatra ny Filistinina, ka tsy sahy nitsofoka ny faritanin’i Israely intsony, satria ny TOMPO naneho ny heriny tamin’izy ireo nandritra ny andro rehetra niainan’i Samoela. '
  '14':
  - type: text
    content: Ary ireo tanàna izay nalain’ny Filistinina tamin’ny Israelita, teo anelanelan’i Hekrôna sy Gata
  - type: note
    content: 'Hekrôna sy Gata: jereo 5.8, 10 sy nta.'
  - type: text
    content: ', dia tafaverina soa aman-tsara tamin’ny Israelita; koa afaka teo an-tanan’ny Filistinina izany faritra izany. Ary dia nisy koa ny fandriampahalemana teo amin’ny Israelita sy ny '
  - type: text
    content: Amôrita
  - type: text
    content: .
  '15':
  - type: text
    content: 'I Samoela no filohan’ny vahoaka Israely mandra-pahafatiny. '
  '16':
  - type: text
    content: Isan-taona izy dia nandeha nitety an’i Betela sy i Gilgala
  - type: note
    content: 'Betela: tanàna tokony ho 15 km any avaratr’i Jerosalema. –Gilgala: anaran-toerana maro ao amin’ny tanin’i Israely; mety ho ilay Gilgala akaikin’i Jerikao no voalaza eto (jereo Jos 4.19-20; 5.9-10).'
  - type: text
    content: ' ary i Mitsepà ka nitsara tamin’ireo tanàna telo ireo. '
  '17':
  - type: text
    content: Rehefa izany, dia niverina nody tany Ramà
  - type: note
    content: 'Ramà: jereo 1.1 sy nta.'
  - type: text
    content: ' izay nisy azy izy; nitsarany ny Israelita koa tao sady nanorenany '
  - type: text
    content: alitara
  - type: text
    content: ' anankiray ho an’ny TOMPO.'
  '2':
  - type: text
    content: 'Hatramin’ny nitoeran’ny '
  - type: text
    content: Vatamasin’ny TOMPO
  - type: text
    content: ' tany Kiriata-Jeharîma, dia andro maro no nifandimby, efa roapolo taona izao. Nalahelo te hiverina amin’ny TOMPO ny Israelita rehetra '
  '3':
  - type: text
    content: 'ka nilazan’i Samoela hoe:'
  - type: text
    content: '–Raha amin’ny fonareo manontolo tokoa no hiverenanareo amin’ny TOMPO, dia atsaharo ny fanompoanareo andriamani-kafa sy fanompoanareo ny sampy '
  - type: text
    content: Hastôreta
  - type: text
    content: ; aoka hiraiki-po amin’ny TOMPO ianareo, ary aza manompo afa-tsy Izy irery ihany, fa hovonjeny tsy ho voagejan’ny Filistinina ianareo.
  '4':
  - type: text
    content: 'Dia narian’ny Israelita ireo sampin’ny andriamani-dahy '
  - type: text
    content: Bahala
  - type: text
    content: ' sy ny andriamani-bavy Hastôreta, ka ny TOMPO no hany notompoiny. '
  '5':
  - type: text
    content: 'Avy eo dia hoy i Samoela hoe:'
  - type: text
    content: –Aoka ho vory any Mitsepà
  - type: note
    content: 'Mitsepà: tanàna tokony ho 12 km any avaratr’i Jerosalema.'
  - type: text
    content: ' ny vahoaka Israely tsivakivolo, fa izaho hivavaka amin’ny TOMPO ho azy.'
  '6':
  - type: text
    content: 'Dia tafangona tao Mitsepà ny Israelita. Nanovo rano izy ireo, dia nararany tamin’ny tany teo anatrehan’ny TOMPO izany. '
  - type: text
    content: Nifady hanina
  - type: text
    content: ' koa izy tamin’izany andro izany sady niaiky heloka hoe: «Efa nanota tamin’ny TOMPO izahay.» Tao Mitsepà no nahatonga an’i Samoela ho filohan’ny vahoaka Israely.'
  '7':
  - type: text
    content: 'Rehefa fantatry ny Filistinina fa nivory tany Mitsepà ny Israelita, dia tapa-kevitra ireo andriana dimy filohan’ny Filistinina fa hanafika azy. Nony ren’ny Israelita izany, dia natahotra ny Filistinina izy, '
  '8':
  - type: text
    content: 'ka nanao tamin’i Samoela hoe:'
  - type: text
    content: –Aza arianao izahay, fa mivavaha amin’ny TOMPO Andriamanitsika ho anay, mba hamonjeny anay tsy ho voagejan’ny Filistinina.
  '9':
  - type: text
    content: 'Naka zanak’ondry mbola minono i Samoela ka nanolotra izany ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho an’ny TOMPO; dia nitalaho tamin’ny TOMPO ho an’ny vahoaka Israely izy, ary ny TOMPO namaly ny vavaka nataony. '
