document_id: GEN.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia vita ny lanitra sy ny tany mbamin’izay rehetra ao aminy. '
  '10':
  - type: text
    content: 'Ary nisy ony iray nivoaka avy tao Hedena ka nanondraka ny zaridaina. Hatreo izy no nizara ho sampana efatra. '
  '11':
  - type: text
    content: 'I Pisôna no anaran’ny sampan-drano voalohany; io no manodidina ny tany Havilà manontolo izay misy ny volamena, '
  '12':
  - type: text
    content: 'ary tsara ny volamena tamin’io tany io; tao koa ny ditin-kazo mani-pofona sy ny vatosoa. '
  '13':
  - type: text
    content: 'I Gihôna no anaran’ny sampan-drano faharoa, izay manodidina ny tany Kosy '
  - type: note
    content: ny tany Kosy dia heverin’ny sasany fa any Mezôpôtamia. Ny hafa kosa dia mihevitra azy io ho faritany iray any atsimon’i Ejipta (Sodàna na Etiôpia).
  - type: text
    content: 'manontolo. '
  '14':
  - type: text
    content: 'I Tigra no anaran’ny sampan-drano fahatelo mandalo any atsinanan’i Asiria. Ary i Eofrata no anaran’ny sampan-drano fahefatra. '
  '15':
  - type: text
    content: 'Ary nalain’ny TOMPO Andriamanitra raolombelona ka napetrany tao amin’ny zaridainan’i Hedena mba hanolokolo sy hitandrina azy. '
  '16':
  - type: text
    content: 'Ary IZY nandidy an-draolombelona hoe: «Azonao ihinanana avokoa ny voa avy amin’ny hazo rehetra ao amin’ny zaridaina; '
  '17':
  - type: text
    content: afa-tsy ny avy amin’ny hazo fahalalàna ny tsara sy ny ratsy, satria amin’ny andro izay hihinananao azy dia ho faty tokoa ianao.»
  '18':
  - type: text
    content: 'Dia hoy ny TOMPO Andriamanitra hoe: «Tsy tsara raha irery raolombelona, fa aoka hanaovako mpanampy sahaza azy izy.» '
  '19':
  - type: text
    content: 'Tany no nanaovan’ny TOMPO Andriamanitra ny karazam-bibidia sy voro-manidina rehetra, ka dia nentiny teo amin-draolombelona ireny hahitany izay anarana hiantsoany azy. Ary dia izay hanononan-dralehilahy azy no ho anarany. '
  '2':
  - type: text
    content: 'Rehefa vitan’Andriamanitra ny asany, dia nitsahatra tamin’izay rehetra nataony Izy tamin’ny andro fahafito. '
  '20':
  - type: text
    content: 'Dia nomen-draolombelona anarana ny biby fiompy rehetra sy ny voro-manidina rehetra ary ny bibidia rehetra, kanefa tsy hitany izay mpanampy sahaza azy. '
  '21':
  - type: text
    content: 'Ary ny TOMPO Andriamanitra nahatonga an-draolombelona ho sondrian-tory sy ho renoka, dia nalainy ny taolana iray tamin’ny tehezany ka nosoloany nofo. '
  '22':
  - type: text
    content: 'Izany taolan-tehezana nalainy tamin-draolombelona izany no namboarin’ny TOMPO Andriamanitra ho vehivavy izay nentiny teo amin-draolombelona. '
  '23':
  - type: text
    content: 'Tamin’izay dia hoy raolombelona hoe: «Ity ahay mba mitovy amiko, fa taolana avy amin’ny taolako ity sady nofo avy amin’ny nofoko; hatao hoe vehivavy ity, satria lehilahy no nanalana azy'
  - type: note
    content: 'vehivavy ity, satria lehilahy no nanalana azy: ny teny hebreo ishah (vehivavy) dia misy itoviana akaiky amin’ny ish (lehilahy) fa ny ah fotsiny no mampiavaka azy.'
  - type: text
    content: '.» '
  '24':
  - type: text
    content: Izany no handaozan’ny lehilahy ny rainy sy ny reniny ka hifikirany amin’ny vadiny, ary hanjary tena iray ihany izy roa
  - type: note
    content: Jereo Mt 19.5; Mk 10.7-8; 1Kôr 6.16; Ef 5.31.
  - type: text
    content: .
  '25':
  - type: text
    content: Ary nitanjaka ny lehilahy sy ny vadiny nefa tsy nahalala henatra.
  '3':
  - type: text
    content: Koa notahîn’Andriamanitra sady natokany ny andro fahafito satria io no nitsaharany tamin’ny asany rehetra maha mpahary Azy
  - type: note
    content: Jereo Eks 20.11; Heb 4.4,10.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Izany no tantaran’ny lanitra sy ny tany tamin’ny naharian’Andriamanitra azy.
  - type: heading
    content: Ny zaridaina tao Hedena
  - type: text
    content: 'Fony nanao ny tany sy ny lanitra ny TOMPO Andriamanitra, '
  '5':
  - type: text
    content: 'dia tsy mbola nisy kirihitra ny tany, ary tsy nisy ahitra nitsimoka akory, satria tsy mbola nampilatsaka orana tamin’ny tany ny TOMPO Andriamanitra ary tsy mbola nisy olombelona hiasa ny tany. '
  '6':
  - type: text
    content: Fa loharano nifantsitsitra avy tao amin’ny tany ihany no nanondraka ny velaran-tany manontolo.
  '7':
  - type: text
    content: 'Ary vovoka avy amin’ny tany no nalain’ny TOMPO Andriamanitra, ka nanamboarany olombelona anankiray. Nitsofany fofonaina mahavelona tao am-bavorony, dia tonga manana aina raolombelona. '
  '8':
  - type: text
    content: 'Avy eo dia novolen’ny TOMPO Andriamanitra zaridaina tao Hedena, tany atsinanana, mba hametrahany an-draolombelona izay namboariny. '
  '9':
  - type: text
    content: Nampaniry karazan-kazo tsara tarehy fihinam-boa teo amin’ny tany ny TOMPO Andriamanitra, ka nataony teo afovoan’ny zaridaina ny hazon’aina sy ny hazo fahalalana ny tsara sy ny ratsy
  - type: note
    content: 'hazon’aina: ampit Apôk 2.7; 22.2-14. –fahalalana ny tsara sy ny ratsy: dkt hafa ahalalana ny zavatra rehetra (tahaka izany koa ny and 17 sy ny 3.5-22).'
  - type: text
    content: .
