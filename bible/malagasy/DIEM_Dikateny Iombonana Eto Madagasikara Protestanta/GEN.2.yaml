document_id: GEN.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia vita ny lanitra sy ny tany mbamin’izay rehetra ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rehefa vitan’Andriamanitra ny asany, dia nitsahatra tamin’izay rehetra nataony Izy tamin’ny andro fahafito. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa notahîn’Andriamanitra sady natokany ny andro fahafito satria io no nitsaharany tamin’ny asany rehetra maha mpahary Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.11; Heb 4.4,10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izany no tantaran’ny lanitra sy ny tany tamin’ny naharian’Andriamanitra azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zaridaina tao Hedena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fony nanao ny tany sy ny lanitra ny TOMPO Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia tsy mbola nisy kirihitra ny tany, ary tsy nisy ahitra nitsimoka akory, satria tsy mbola nampilatsaka orana tamin’ny tany ny TOMPO Andriamanitra ary tsy mbola nisy olombelona hiasa ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa loharano nifantsitsitra avy tao amin’ny tany ihany no nanondraka ny velaran-tany manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary vovoka avy amin’ny tany no nalain’ny TOMPO Andriamanitra, ka nanamboarany olombelona anankiray. Nitsofany fofonaina mahavelona tao am-bavorony, dia tonga manana aina raolombelona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avy eo dia novolen’ny TOMPO Andriamanitra zaridaina tao Hedena, tany atsinanana, mba hametrahany an-draolombelona izay namboariny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nampaniry karazan-kazo tsara tarehy fihinam-boa teo amin’ny tany ny TOMPO Andriamanitra, ka nataony teo afovoan’ny zaridaina ny hazon’aina sy ny hazo fahalalana ny tsara sy ny ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hazon’aina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Apôk 2.7; 22.2-14. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fahalalana ny tsara sy ny ratsy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ahalalana ny zavatra rehetra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (tahaka izany koa ny and 17 sy ny 3.5-22).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nisy ony iray nivoaka avy tao Hedena ka nanondraka ny zaridaina. Hatreo izy no nizara ho sampana efatra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I Pisôna no anaran’ny sampan-drano voalohany; io no manodidina ny tany Havilà manontolo izay misy ny volamena, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary tsara ny volamena tamin’io tany io; tao koa ny ditin-kazo mani-pofona sy ny vatosoa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I Gihôna no anaran’ny sampan-drano faharoa, izay manodidina ny tany Kosy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny tany Kosy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia heverin’ny sasany fa any Mezôpôtamia. Ny hafa kosa dia mihevitra azy io ho faritany iray any atsimon’i Ejipta (Sodàna na Etiôpia).
    marker-yv: yv-n
  - type: text
    text: 'manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I Tigra no anaran’ny sampan-drano fahatelo mandalo any atsinanan’i Asiria. Ary i Eofrata no anaran’ny sampan-drano fahefatra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nalain’ny TOMPO Andriamanitra raolombelona ka napetrany tao amin’ny zaridainan’i Hedena mba hanolokolo sy hitandrina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary IZY nandidy an-draolombelona hoe: «Azonao ihinanana avokoa ny voa avy amin’ny hazo rehetra ao amin’ny zaridaina; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: afa-tsy ny avy amin’ny hazo fahalalàna ny tsara sy ny ratsy, satria amin’ny andro izay hihinananao azy dia ho faty tokoa ianao.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy ny TOMPO Andriamanitra hoe: «Tsy tsara raha irery raolombelona, fa aoka hanaovako mpanampy sahaza azy izy.» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tany no nanaovan’ny TOMPO Andriamanitra ny karazam-bibidia sy voro-manidina rehetra, ka dia nentiny teo amin-draolombelona ireny hahitany izay anarana hiantsoany azy. Ary dia izay hanononan-dralehilahy azy no ho anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nomen-draolombelona anarana ny biby fiompy rehetra sy ny voro-manidina rehetra ary ny bibidia rehetra, kanefa tsy hitany izay mpanampy sahaza azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny TOMPO Andriamanitra nahatonga an-draolombelona ho sondrian-tory sy ho renoka, dia nalainy ny taolana iray tamin’ny tehezany ka nosoloany nofo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izany taolan-tehezana nalainy tamin-draolombelona izany no namboarin’ny TOMPO Andriamanitra ho vehivavy izay nentiny teo amin-draolombelona. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’izay dia hoy raolombelona hoe: «Ity ahay mba mitovy amiko, fa taolana avy amin’ny taolako ity sady nofo avy amin’ny nofoko; hatao hoe vehivavy ity, satria lehilahy no nanalana azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'vehivavy ity, satria lehilahy no nanalana azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny teny hebreo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ishah
      - type: text
        text: ' (vehivavy) dia misy itoviana akaiky amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ish
      - type: text
        text: ' (lehilahy) fa ny ah fotsiny no mampiavaka azy.'
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izany no handaozan’ny lehilahy ny rainy sy ny reniny ka hifikirany amin’ny vadiny, ary hanjary tena iray ihany izy roa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 19.5; Mk 10.7-8; 1Kôr 6.16; Ef 5.31.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nitanjaka ny lehilahy sy ny vadiny nefa tsy nahalala henatra.
