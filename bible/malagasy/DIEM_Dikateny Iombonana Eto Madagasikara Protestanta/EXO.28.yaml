document_id: EXO.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanamian’ny mpisorona
  - type: text
    content: '«Ry Mosesy, ampanatòny ho eo akaikinao i Aharôna rahalahinao sy ny zanany efa-dahy, dia i Nadaba sy i Abihò ary i Elehazara sy i Itamara. Avaho amin’ny Israelita ireo mba hanompo Ahy amin’ny fisoronana. '
  '10':
  - type: text
    content: 'ka ny anarana enina amin’ny vato voalohany, ary ny anarana enina amin’ny vato faharoa, arakara-jokiny. '
  '11':
  - type: text
    content: 'Mpivaofy vato no hisokitra ny anarana amin’ireo vato roa ireo; hataony toy ny fisokitra '
  - type: text
    content: tombokase
  - type: text
    content: ' izany ka hapetaka anaty bokom-bolamena anankiroa. '
  '12':
  - type: text
    content: 'Avy eo dia hapetany eo ambony beritelon’ny efôda ireo vato roa ireo mba ho fahatsiarovana ny Israelita foko 12. Amin’izay i Aharôna dia hitondra ny anaran’izy ireo eny an-tsorony ao amin’ny Toeramasina, ka Izaho TOMPO tsy hanadino anareo. '
  '13':
  - type: text
    content: 'Rehefa vita ny bokom-bolamena anankiroa, '
  '14':
  - type: text
    content: dia hapetaka eo koa ny rojo volamena madinika anankiroa miolanolana toy ny tady voarandrana.
  - type: heading
    content: Ny saron-tratra
  '15':
  - type: text
    content: «Mpahay taozavatra no hanao ny saron-tratra fitsarana
  - type: note
    content: Ny saron-tratra fitsarana dia karazana paosy napetaka teo ambonin’ny efôda. Izy no mitahiry ireo zavatra voatokana (and 30) hampiasain’ny mpisorombe hikarohana izay sitrapon’Andriamanitra na izay fitsarany amin’ny toe-javatra sasany.
  - type: text
    content: ' amin’ny kiran-drongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky, sady hasiana peta-kofehy volamena toy ny efôda. '
  '16':
  - type: text
    content: 'Ho paosy efamira izy io, ka mirefy 25 santimetatra ny lafiny tsirairay ary '
  '17':
  - type: text
    content: 'horavahana laharam-batosoa efatra: ny laharana voalohany dia sardoanina sy tôpaza ary emeralda; '
  '18':
  - type: text
    content: 'ny laharana faharoa dia robisy sy safira ary diamondra; '
  '19':
  - type: text
    content: 'ny laharana fahatelo dia ôpaka sy agata ary ametista; '
  '2':
  - type: text
    content: 'Hanaovana fanamiana voatokana i Aharôna ho mariky ny voninahitra amam-piandrianany. '
  '20':
  - type: text
    content: ny laharana fahefatra dia krizôlita sy berila ary jaspa. Samy apetaka anaty bokom-bolamena avy ny vato tsirairay
  - type: note
    content: Tsy tena azo antoka ny famantarana ireo vatosoa isan-karazany eto.
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Hosoratana an-tsokitra eo amin’ny vatosoa tsirairay avy ny anaran’ireo zanakalahin’i Jakôba izay miisa 12; hatao toy ny fisokitra '
  - type: text
    content: tombokase
  - type: text
    content: ' izany, ka ireo vato ireo no ho solotenan’ny foko israelita 12.'
  '22':
  - type: text
    content: '«Rojo volamena madio anankiroa, miolanolana toy ny tady voarandrana, no hatao eo amin’ny saron-tratra; '
  '23':
  - type: text
    content: 'hisy haba volamena roa hamboarina ka hapetaka eo amin’ny zorony roa ambony amin’ny saron-tratra. '
  '24':
  - type: text
    content: 'Hafatotra tsirairay amin’ireo haba amin’ny saron-tratra ireo ny rojo volamena madinika; '
  '25':
  - type: text
    content: 'ary ny lanin’ny rojo roa kosa dia hapetaka amin’ny bokom-bolamena izay eo ambonin’ny beritelon’ny efôda mba hahatonga ny saron-tratra ho eo anoloana. '
  '26':
  - type: text
    content: 'Hisy haba volamena roa hafa koa hamboarina ka hapetaka eo amin’ny zorony roa ambany amin’ny saron-tratra manolotra ny efôda. '
  '27':
  - type: text
    content: 'Mbola hisy haba volamena roa hafa koa hamboarina ka hapetaka eo ambanin’ny beritelon’ny efôda eo anoloana, eo amin’ny fikambanany; eo ambonin’ny samboadin’ny efôda no hametrahana ireo haba volamena ireo. '
  '28':
  - type: text
    content: Hatohy tady volomparasy ny haban’ny saron-tratra sy ny haban’ny efôda mba ho eo ambonin’ny beritelon’ny efôda ilay saron-tratra ka tsy hifindrafindra eo amin’ny efôda.
  '29':
  - type: text
    content: '«Amin’izay, rehefa miditra ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' i Aharôna, dia hitondra eny an-tratrany ny saron-tratra fitsarana misy ny anaran’ny fokon’i Israely; ka Izaho TOMPO amin’izay dia tsy hanadino anareo na oviana na oviana. '
  '3':
  - type: text
    content: 'Ny torohevitra rehetra dia ambarao amin’ireo mpahay taozavatra izay nofenoiko hakingana, ka ireo no hanao ny fanamiana izay hoentin’i Aharôna amin’ny fanokanana azy ho mpisorona ho Ahy. '
  '30':
  - type: text
    content: Ary ianao, ry Mosesy, apetaho eo amin’ny saron-tratra fitsarana ny Orîma sy Tomîma
  - type: note
    content: ny Orîma sy Tomîma dia zavatra voatokana (tehinakely na kodiakely) nampiasaina tany am-boalohany, tamin’ny alalan’ny antsapaka, mba hoenti-mamantatra izay sitrapon’Andriamanitra; jereo Nom 27.21; 1 Sam 14.41; 28.6; Hez 2.63; Ne 7.65.
  - type: text
    content: ' mba hoentin’i Aharôna eny an-tratrany rehefa hiseho eo anatrehako Izaho TOMPO izy; tsy maintsy entin’i Aharôna mandrakariva eny aminy manko ireny isaky ny ho ao amin’ny Toeramasina izy mba hahazoany mamantatra ny sitrapoko momba ny Israelita.'
  - type: heading
    content: Ny fanamiana hafa voatokana
  '31':
  - type: text
    content: '«Ny akanjo lava ivelany izay hitondran’i Aharôna ny efôda dia hatao manontolo amin’ny volon’ondry miloko volomparasy. '
  '32':
  - type: text
    content: 'Hasiana vavany eo afovoany mba hidiran’ny loha, ka hotenomina sy hohamafisina ny sisiny manodidina io vavany io mba tsy ho rovitra. '
  '33':
  - type: text
    content: 'Ny moron-tongotr’akanjo manodidina dia horavahana sarin’ampongabendanitra vita amin’ny volon’ondry miloko volomparasy sy mena ary jaky, sady hasiana lakolosy kely volamena. '
  '34':
  - type: text
    content: 'Ny sarin’ampongabendanitra dia hifanelanelana amin’ny lakolosy kely. '
  '35':
  - type: text
    content: 'Hanaovan’i Aharôna io fanamiana io rehefa manao ny raharaha maha mpisorona izy: koa rehefa hiseho eo anatrehako ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' izy, na hiala tao, dia ho heno ny feon’ny lakolosy kely ka tsy ho faty izy.'
  '36':
  - type: text
    content: '«Hisy takela-bolamena madio iray hamboarina, ka hatao miendrika voninkazo ary eo amboniny hasiana soratra voasokitra toy ny amin’ny '
  - type: text
    content: tombokase
  - type: text
    content: ' hoe: ‹Voatokana ho an’ny TOMPO›. '
  '37':
  - type: text
    content: 'Dia hafatotra amin’ny tady volon’ondry miloko volomparasy eo ambonin’ny satroka fehiloha, eo anoloana izy. '
  '38':
  - type: text
    content: Hoentin’i Aharôna mandrakariva eny amin’ny handriny io takela-bolamena io rehefa hiseho eo anatrehako Izaho TOMPO izy, ka amin’izay dia hoekeko ny fanatitra rehetra izay hatokan’ny Israelita ho Ahy na dia manao hadisoana aza ireo amin’ny fanolorana azy.
  '39':
  - type: text
    content: «Farany dia hanenomana akanjo lava vita rongony i Aharôna, ary hanaovana satroka fehiloha rongony sy fehikibo vita peta-kofehy.
  '4':
  - type: text
    content: 'Ireo fanamiana izay hataony dia ny saron-tratra, ny efôda, ny akanjo lava ivelany, ny akanjo vita peta-kofehy, ny satroka fehiloha ary ny fehikibo. Hanaovan’i Aharôna rahalahinao sy ny taranany ireo rehefa manao fisoronana amiko izy. '
  '40':
  - type: text
    content: «Ary ireo zanakalahin’i Aharôna koa dia hanaovana fanamiana mihaja sy be voninahitra, dia akanjo lava sy fehikibo ary satroka boribory
  - type: note
    content: Ny voambolana hebreo izay nadika hoe satroka boribory dia satroka toa vita lamba, nefa tsy fantatra izay tena endriny marina.
  - type: text
    content: .
  '41':
  - type: text
    content: '«Ry Mosesy, hampiakanjoinao ireo fanamiana ireo i Aharôna zokinao sy ny zanany lahy ary hohosoranao diloilo ny lohany, dia hapetrakao amin’ny toerany izy; toy izany no hanokananao azy hanompo Ahy amin’ny maha mpisorona azy. '
  '42':
  - type: text
    content: 'Mba hanaronana ny fitanjahany, dia hanaovana kilaoty rongony izy hanarona ny hatreo amin’ny tehezany ka hatramin’ny feny. '
  '43':
  - type: text
    content: 'Hiakanjoan’i Aharôna sy ny zanany izany rehefa hiditra ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' izy, na manatona eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' hanao ny raharaha maha mpisorona ao amin’ny Toeramasina. Izany no tsy hahazoany heloka hahafaty azy. Ho fepetra raikitra izany ho an’i Aharôna sy ny taranany.'
  '5':
  - type: text
    content: Volon’ondry miloko volomparasy sy mena ary jaky mbamin’ny rongony madinika sy kofehy volamena no hampiasain’ireo mpahay taozavatra.
  - type: heading
    content: Ny efôda
  '6':
  - type: text
    content: «Mpahay taozavatra no hanao ny efôda
  - type: note
    content: Araka ny filazalazana manaraka, ny efôda dia karazana aron’akanjo voatokana.
  - type: text
    content: ' amin’ny kiran-drongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky, ka asiana peta-kofehy volamena. '
  '7':
  - type: text
    content: 'Beritelo zairina amin’ny sisiny roa no hitondrana ny efôda. '
  '8':
  - type: text
    content: 'Hotenomina ho iray amin’ny efôda sady hatao amin’ny kofehy mitovy amin’ny nanaovana azy ny samboady fitazonana ny efôda. '
  '9':
  - type: text
    content: 'Avy eo dia halaina ny vato berila roa izay hanoratana an-tsokitra ny anaran’ireo zanakalahin’i Jakôba: '
