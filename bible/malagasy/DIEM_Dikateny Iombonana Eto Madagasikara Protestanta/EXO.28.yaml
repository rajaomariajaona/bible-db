    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ry Mosesy, ampanatòny ho eo akaikinao i Aharôna rahalahinao sy ny zanany efa-dahy, dia i Nadaba sy i Abihò ary i Elehazara sy i Itamara. Avaho amin’ny Israelita ireo mba hanompo Ahy amin’ny fisoronana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ny anarana enina amin’ny vato voalohany, ary ny anarana enina amin’ny vato faharoa, arakara-jokiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpivaofy vato no hisokitra ny anarana amin’ireo vato roa ireo; hataony toy ny fisokitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tombokase
    - type: text
      text: ' izany ka hapetaka anaty bokom-bolamena anankiroa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia hapetany eo ambony beritelon’ny efôda ireo vato roa ireo mba ho fahatsiarovana ny Israelita foko 12. Amin’izay i Aharôna dia hitondra ny anaran’izy ireo eny an-tsorony ao amin’ny Toeramasina, ka Izaho TOMPO tsy hanadino anareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vita ny bokom-bolamena anankiroa, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hapetaka eo koa ny rojo volamena madinika anankiroa miolanolana toy ny tady voarandrana.
  - type: usfm
    marker: s1
