  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Rojo volamena madio anankiroa, miolanolana toy ny tady voarandrana, no hatao eo amin’ny saron-tratra; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hisy haba volamena roa hamboarina ka hapetaka eo amin’ny zorony roa ambony amin’ny saron-tratra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hafatotra tsirairay amin’ireo haba amin’ny saron-tratra ireo ny rojo volamena madinika; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny lanin’ny rojo roa kosa dia hapetaka amin’ny bokom-bolamena izay eo ambonin’ny beritelon’ny efôda mba hahatonga ny saron-tratra ho eo anoloana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hisy haba volamena roa hafa koa hamboarina ka hapetaka eo amin’ny zorony roa ambany amin’ny saron-tratra manolotra ny efôda. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola hisy haba volamena roa hafa koa hamboarina ka hapetaka eo ambanin’ny beritelon’ny efôda eo anoloana, eo amin’ny fikambanany; eo ambonin’ny samboadin’ny efôda no hametrahana ireo haba volamena ireo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatohy tady volomparasy ny haban’ny saron-tratra sy ny haban’ny efôda mba ho eo ambonin’ny beritelon’ny efôda ilay saron-tratra ka tsy hifindrafindra eo amin’ny efôda.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Amin’izay, rehefa miditra ao amin’ny '
    - type: usfm
