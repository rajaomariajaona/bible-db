document_id: EXO.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanamian’ny mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Ry Mosesy, ampanatòny ho eo akaikinao i Aharôna rahalahinao sy ny zanany efa-dahy, dia i Nadaba sy i Abihò ary i Elehazara sy i Itamara. Avaho amin’ny Israelita ireo mba hanompo Ahy amin’ny fisoronana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hanaovana fanamiana voatokana i Aharôna ho mariky ny voninahitra amam-piandrianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny torohevitra rehetra dia ambarao amin’ireo mpahay taozavatra izay nofenoiko hakingana, ka ireo no hanao ny fanamiana izay hoentin’i Aharôna amin’ny fanokanana azy ho mpisorona ho Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ireo fanamiana izay hataony dia ny saron-tratra, ny efôda, ny akanjo lava ivelany, ny akanjo vita peta-kofehy, ny satroka fehiloha ary ny fehikibo. Hanaovan’i Aharôna rahalahinao sy ny taranany ireo rehefa manao fisoronana amiko izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Volon’ondry miloko volomparasy sy mena ary jaky mbamin’ny rongony madinika sy kofehy volamena no hampiasain’ireo mpahay taozavatra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny efôda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: «Mpahay taozavatra no hanao ny efôda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny filazalazana manaraka, ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: efôda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia karazana aron’akanjo voatokana.'
    marker-yv: yv-n
  - type: text
    text: ' amin’ny kiran-drongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky, ka asiana peta-kofehy volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Beritelo zairina amin’ny sisiny roa no hitondrana ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hotenomina ho iray amin’ny efôda sady hatao amin’ny kofehy mitovy amin’ny nanaovana azy ny samboady fitazonana ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Avy eo dia halaina ny vato berila roa izay hanoratana an-tsokitra ny anaran’ireo zanakalahin’i Jakôba: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka ny anarana enina amin’ny vato voalohany, ary ny anarana enina amin’ny vato faharoa, arakara-jokiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mpivaofy vato no hisokitra ny anarana amin’ireo vato roa ireo; hataony toy ny fisokitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: ' izany ka hapetaka anaty bokom-bolamena anankiroa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avy eo dia hapetany eo ambony beritelon’ny efôda ireo vato roa ireo mba ho fahatsiarovana ny Israelita foko 12. Amin’izay i Aharôna dia hitondra ny anaran’izy ireo eny an-tsorony ao amin’ny Toeramasina, ka Izaho TOMPO tsy hanadino anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa vita ny bokom-bolamena anankiroa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia hapetaka eo koa ny rojo volamena madinika anankiroa miolanolana toy ny tady voarandrana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny saron-tratra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Mpahay taozavatra no hanao ny saron-tratra fitsarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny saron-tratra fitsarana '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia karazana paosy napetaka teo ambonin’ny efôda. Izy no mitahiry ireo zavatra voatokana (and 30) hampiasain’ny mpisorombe hikarohana izay sitrapon’Andriamanitra na izay fitsarany amin’ny toe-javatra sasany.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny kiran-drongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky, sady hasiana peta-kofehy volamena toy ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ho paosy efamira izy io, ka mirefy 25 santimetatra ny lafiny tsirairay ary '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'horavahana laharam-batosoa efatra: ny laharana voalohany dia sardoanina sy tôpaza ary emeralda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny laharana faharoa dia robisy sy safira ary diamondra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny laharana fahatelo dia ôpaka sy agata ary ametista; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ny laharana fahefatra dia krizôlita sy berila ary jaspa. Samy apetaka anaty bokom-bolamena avy ny vato tsirairay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy tena azo antoka ny famantarana ireo vatosoa isan-karazany eto.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hosoratana an-tsokitra eo amin’ny vatosoa tsirairay avy ny anaran’ireo zanakalahin’i Jakôba izay miisa 12; hatao toy ny fisokitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: ' izany, ka ireo vato ireo no ho solotenan’ny foko israelita 12.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '«Rojo volamena madio anankiroa, miolanolana toy ny tady voarandrana, no hatao eo amin’ny saron-tratra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'hisy haba volamena roa hamboarina ka hapetaka eo amin’ny zorony roa ambony amin’ny saron-tratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hafatotra tsirairay amin’ireo haba amin’ny saron-tratra ireo ny rojo volamena madinika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ary ny lanin’ny rojo roa kosa dia hapetaka amin’ny bokom-bolamena izay eo ambonin’ny beritelon’ny efôda mba hahatonga ny saron-tratra ho eo anoloana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hisy haba volamena roa hafa koa hamboarina ka hapetaka eo amin’ny zorony roa ambany amin’ny saron-tratra manolotra ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mbola hisy haba volamena roa hafa koa hamboarina ka hapetaka eo ambanin’ny beritelon’ny efôda eo anoloana, eo amin’ny fikambanany; eo ambonin’ny samboadin’ny efôda no hametrahana ireo haba volamena ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hatohy tady volomparasy ny haban’ny saron-tratra sy ny haban’ny efôda mba ho eo ambonin’ny beritelon’ny efôda ilay saron-tratra ka tsy hifindrafindra eo amin’ny efôda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Amin’izay, rehefa miditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' i Aharôna, dia hitondra eny an-tratrany ny saron-tratra fitsarana misy ny anaran’ny fokon’i Israely; ka Izaho TOMPO amin’izay dia tsy hanadino anareo na oviana na oviana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary ianao, ry Mosesy, apetaho eo amin’ny saron-tratra fitsarana ny Orîma sy Tomîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny Orîma sy Tomîma '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia zavatra voatokana (
    - type: usfm
      marker: it
      children:
      - type: text
        text: tehinakely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kodiakely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) nampiasaina tany am-boalohany, tamin’ny alalan’ny antsapaka, mba hoenti-mamantatra izay sitrapon’Andriamanitra; jereo Nom 27.21; 1 Sam 14.41; 28.6; Hez 2.63; Ne 7.65.
    marker-yv: yv-n
  - type: text
    text: ' mba hoentin’i Aharôna eny an-tratrany rehefa hiseho eo anatrehako Izaho TOMPO izy; tsy maintsy entin’i Aharôna mandrakariva eny aminy manko ireny isaky ny ho ao amin’ny Toeramasina izy mba hahazoany mamantatra ny sitrapoko momba ny Israelita.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanamiana hafa voatokana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Ny akanjo lava ivelany izay hitondran’i Aharôna ny efôda dia hatao manontolo amin’ny volon’ondry miloko volomparasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hasiana vavany eo afovoany mba hidiran’ny loha, ka hotenomina sy hohamafisina ny sisiny manodidina io vavany io mba tsy ho rovitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny moron-tongotr’akanjo manodidina dia horavahana sarin’ampongabendanitra vita amin’ny volon’ondry miloko volomparasy sy mena ary jaky, sady hasiana lakolosy kely volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny sarin’ampongabendanitra dia hifanelanelana amin’ny lakolosy kely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hanaovan’i Aharôna io fanamiana io rehefa manao ny raharaha maha mpisorona izy: koa rehefa hiseho eo anatrehako ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' izy, na hiala tao, dia ho heno ny feon’ny lakolosy kely ka tsy ho faty izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '«Hisy takela-bolamena madio iray hamboarina, ka hatao miendrika voninkazo ary eo amboniny hasiana soratra voasokitra toy ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: ' hoe: ‹Voatokana ho an’ny TOMPO›. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia hafatotra amin’ny tady volon’ondry miloko volomparasy eo ambonin’ny satroka fehiloha, eo anoloana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Hoentin’i Aharôna mandrakariva eny amin’ny handriny io takela-bolamena io rehefa hiseho eo anatrehako Izaho TOMPO izy, ka amin’izay dia hoekeko ny fanatitra rehetra izay hatokan’ny Israelita ho Ahy na dia manao hadisoana aza ireo amin’ny fanolorana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: «Farany dia hanenomana akanjo lava vita rongony i Aharôna, ary hanaovana satroka fehiloha rongony sy fehikibo vita peta-kofehy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: «Ary ireo zanakalahin’i Aharôna koa dia hanaovana fanamiana mihaja sy be voninahitra, dia akanjo lava sy fehikibo ary satroka boribory
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny voambolana hebreo izay nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: satroka boribory
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia satroka toa vita lamba, nefa tsy fantatra izay tena endriny marina.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '«Ry Mosesy, hampiakanjoinao ireo fanamiana ireo i Aharôna zokinao sy ny zanany lahy ary hohosoranao diloilo ny lohany, dia hapetrakao amin’ny toerany izy; toy izany no hanokananao azy hanompo Ahy amin’ny maha mpisorona azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mba hanaronana ny fitanjahany, dia hanaovana kilaoty rongony izy hanarona ny hatreo amin’ny tehezany ka hatramin’ny feny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Hiakanjoan’i Aharôna sy ny zanany izany rehefa hiditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' izy, na manatona eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' hanao ny raharaha maha mpisorona ao amin’ny Toeramasina. Izany no tsy hahazoany heloka hahafaty azy. Ho fepetra raikitra izany ho an’i Aharôna sy ny taranany.'
