document_id: JER.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Famaizana tsy azo ivalozana
  - type: text
    content: 'Ary hoy ny TOMPO tamiko:'
  - type: text
    content: –Na dia i Mosesy sy i Samoela aza no mitsangana manelanelana eto amiko
  - type: note
    content: 'Mosesy mpanelanelana: jereo Eks 32.11-14; Nom 11.2; 14.13-19. –Samoela mpanelanelana: jereo 1 Sam 7.5-9.'
  - type: text
    content: ', dia tsy handefitra amin’ity vahoaka ity Aho. Roahy hiala eto anatrehako izy mba handeha any! '
  '10':
  - type: text
    content: Lozako, ry Neny nahitako masoandro!
  - type: text
    content: Tsy misy olona toherina
  - type: text
    content: sy ilàna ady hoatra ahy
  - type: text
    content: eto amin’ny tany manontolo.
  - type: text
    content: Tsy nampanjana-bola aho
  - type: text
    content: na nisambotra volan’olona,
  - type: text
    content: nefa ozonin’ny olon-drehetra.
  '11':
  - type: text
    content: Eny, aoka ho voaozona aho, TOMPO ô,
  - type: text
    content: raha tsy nanompo tsara Anao
  - type: note
    content: 'Eny, aoka ho voaozona aho, Tompo ô: araka ny dkt grika tranainy; ny RM dia manao hoe hoy ny Tompo.'
  - type: text
    content: ','
  - type: text
    content: raha tsy nitalahoako ho an’ny fahavaloko Ianao
  - type: text
    content: tamin’ny fotoanan’ny loza amam-pahoriany.
  '12':
  - type: text
    content: Moa mety ho tapaka ve ny vy,
  - type: text
    content: dia ny vy avy ao avaratra na ny halimo
  - type: note
    content: Jereo 1.14 sy nta; ampit koa 15.20 sy 1.18.
  - type: text
    content: '?'
  - type: heading
    content: (Ny Tompo)
  '13':
  - type: text
    content: Ry Joda, ny harenao sy ny zava-tsoanao
  - type: text
    content: dia hatolotro horobaina;
  - type: text
    content: ho valin’ny heloka rehetra nataonao
  - type: text
    content: manerana ny taninao manontolo izany
  - type: note
    content: 'And 13-14: jereo 17.3-4.'
  - type: text
    content: .
  '14':
  - type: text
    content: Hampanompoiko
  - type: note
    content: 'hampanompoiko: araka ny stf hebreo sasany sy dkt tranainy grika sy siriaka ary hamafisin’ny 17.4; ny RM dia manao hoe hampandaloviko (ny fahavalonao).'
  - type: text
    content: ny fahavalonao ianao
  - type: text
    content: any amin’ny tany tsy fantatrao;
  - type: text
    content: fa mipoitra ny afom-pahatezerako
  - type: text
    content: ka handoro anao no irehetany.
  - type: heading
    content: (Jeremià)
  '15':
  - type: text
    content: TOMPO ô, fantatrao tsara ny amiko.
  - type: text
    content: Tsarovy aho ary mirotsaha an-tsehatra
  - type: text
    content: hamaly faty ireo mpanenjika ahy.
  - type: text
    content: Aza andeferana izy, fandrao ho faty aho.
  - type: text
    content: Satria aoka ho fantatrao
  - type: text
    content: fa noho ny aminao no itondrako latsa.
  '16':
  - type: text
    content: Hitako ireo teninao ka nohaniko;
  - type: text
    content: ny teninao no fifaliako
  - type: text
    content: sy firavoravoan’ny foko,
  - type: text
    content: satria efa natokana ho Anao aho,
  - type: text
    content: ry TOMPO Andriamanitr’izao rehetra izao.
  '17':
  - type: text
    content: Tsy nipetraka hamalifaly ny tenako
  - type: text
    content: teo amin’ny fivorian’ny mpikorana aho,
  - type: text
    content: fa noteren’ny herinao hitoetra irery
  - type: text
    content: satria nofenoinao ny fahatezeranao.
  '18':
  - type: text
    content: Nahoana no mitohy ny fijaliako?
  - type: text
    content: Nahoana no tsy mety sitrana ny feriko
  - type: text
    content: sady tsy andairam-panafody?
  - type: text
    content: Ho tonga mamitaka ahy Ianao
  - type: text
    content: toy ny mason-dranotrambo
  - type: text
    content: ka tsy azo antoka hisy rano.
  '19':
  - type: text
    content: 'Momba izany, dia izao no lazain’ny TOMPO:'
  - type: text
    content: Raha miverina amiko ianao,
  - type: text
    content: dia horaisiko indray ka hanompo eo anatrehako.
  - type: text
    content: Raha milaza izay tokony holazaina ianao
  - type: text
    content: fa tsy miteniteny foana,
  - type: text
    content: dia ho mpitondrateniko.
  - type: text
    content: Hiverina aminao indray ireo olon’i Joda,
  - type: text
    content: fa tsy ianao no hiverina any aminy.
  '2':
  - type: text
    content: 'Ary raha misy manontany anao hoe: «Hankaiza àry izahay?», dia hovalianao hoe: Izao no lazain’ny TOMPO:'
  - type: text
    content: Raha misy natao hasian’ny areti-mandringana,
  - type: text
    content: dia hasian’ny areti-mandringana izy;
  - type: text
    content: raha misy natao ho fatin’ny sabatra,
  - type: text
    content: dia ho fatin’ny sabatra izy;
  - type: text
    content: raha misy natao hiharan’ny mosary,
  - type: text
    content: dia hiharan’ny mosary izy;
  - type: text
    content: raha misy natao ho amin’ny fahababoana,
  - type: text
    content: dia hankany amin’ny fahababoana izy
  - type: note
    content: Ampit Apôk 13.10.
  - type: text
    content: .
  '20':
  - type: text
    content: Hataoko manda varahina mafy ianao
  - type: text
    content: manoloana ity vahoaka ity.
  - type: text
    content: Hiady aminao izy
  - type: text
    content: fa tsy hahatohitra anao,
  - type: text
    content: satria miaraka aminao Aho
  - type: text
    content: mba hamonjy sy hanafaka anao,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO
  - type: note
    content: Jereo 1.18-19.
  - type: text
    content: .
  '21':
  - type: text
    content: Eo an-tanan’olon-dratsy ianao no hafahako
  - type: text
    content: ary eo an-tanan’ny mpampahory no havotako.
  '3':
  - type: text
    content: 'Karazan-javatra efatra no hotendreko hamely azy, hoy ny teny hentitra avy amiko TOMPO: ny sabatra handringana azy, ny alika hitarika azy lavitra ary ny voromahery mbamin’ny bibidia hihinana sy handripaka azy; '
  '4':
  - type: text
    content: hany ka hataoko mampivarahontsana izy any amin’ny fanjakana rehetra eran-tany. Noho ny amin’i Manase, zanakalahin’i Hezekià sady mpanjakan’i Joda, no nahatonga izany
  - type: note
    content: 'Manase: jereo 2 Mp 21.1-16; 2 Tan 33.1-20.'
  - type: text
    content: ', dia vokatry ny ratsy nataony tao Jerosalema.'
  - type: heading
    content: Tofoka ny Tompo
  '5':
  - type: text
    content: Iza no hangoraka anao, ry Jerosalema?
  - type: text
    content: Iza no hitsetra anao?
  - type: text
    content: Iza no hisahirana hanantsafa anao?
  '6':
  - type: text
    content: Ianao no nandao Ahy sy niamboho Ahy,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  - type: text
    content: Koa nahinjitro hamely anao ny tanako
  - type: text
    content: mba handevona anao
  - type: text
    content: fa efa sasatry ny mandefitra Aho.
  '7':
  - type: text
    content: Naparitako tamin’ny fitaovana fikororohana
  - type: text
    content: ny tao amin’ny isan-tanàna teo amin’ny tany,
  - type: text
    content: tsy nomeko zanaka fa naringako ny oloko,
  - type: text
    content: nefa tsy novany ny fitondrantenany.
  '8':
  - type: text
    content: Ny mpitondratenany dia nohamaroiko
  - type: text
    content: noho ny fasika amoron-dranomasina.
  - type: text
    content: Na dia mitataovovonana aza ny andro,
  - type: text
    content: dia nitondrako mpandringana tao aminy
  - type: text
    content: handripaka ny renin’ireo zatovo mpiantafika
  - type: text
    content: ary nazerako tampoka teo aminy
  - type: text
    content: ny hovitra noho ny tahotra
  '9':
  - type: text
    content: Nihareraka ilay niteraka fito,
  - type: text
    content: ka misefosefo fiaina;
  - type: text
    content: nilentika antoandrobe ny masoandrony,
  - type: text
    content: ka menatra sy afa-baràka izy.
  - type: text
    content: Ary izay sisa velona dia hatolotro
  - type: text
    content: haringana eo anatrehan’ny fahavalony.
  - type: text
    content: Izany no teny hentitra avy amiko TOMPO.
  - type: heading
    content: Fitarainan’i Jeremià sy valintenin’ny Tompo
  - type: heading
    content: (Jeremià)
