document_id: JER.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famaizana tsy azo ivalozana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy ny TOMPO tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Na dia i Mosesy sy i Samoela aza no mitsangana manelanelana eto amiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mosesy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mpanelanelana: jereo Eks 32.11-14; Nom 11.2; 14.13-19. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Samoela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mpanelanelana: jereo 1 Sam 7.5-9.'
    marker-yv: yv-n
  - type: text
    text: ', dia tsy handefitra amin’ity vahoaka ity Aho. Roahy hiala eto anatrehako izy mba handeha any! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary raha misy manontany anao hoe: «Hankaiza àry izahay?», dia hovalianao hoe: Izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha misy natao hasian’ny areti-mandringana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hasian’ny areti-mandringana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha misy natao ho fatin’ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fatin’ny sabatra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha misy natao hiharan’ny mosary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiharan’ny mosary izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha misy natao ho amin’ny fahababoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hankany amin’ny fahababoana izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Apôk 13.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Karazan-javatra efatra no hotendreko hamely azy, hoy ny teny hentitra avy amiko TOMPO: ny sabatra handringana azy, ny alika hitarika azy lavitra ary ny voromahery mbamin’ny bibidia hihinana sy handripaka azy; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: hany ka hataoko mampivarahontsana izy any amin’ny fanjakana rehetra eran-tany. Noho ny amin’i Manase, zanakalahin’i Hezekià sady mpanjakan’i Joda, no nahatonga izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Manase: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Mp 21.1-16; 2 Tan 33.1-20.
    marker-yv: yv-n
  - type: text
    text: ', dia vokatry ny ratsy nataony tao Jerosalema.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tofoka ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza no hangoraka anao, ry Jerosalema?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hitsetra anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hisahirana hanantsafa anao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ianao no nandao Ahy sy niamboho Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitra avy amiko TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa nahinjitro hamely anao ny tanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba handevona anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa sasatry ny mandefitra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Naparitako tamin’ny fitaovana fikororohana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tao amin’ny isan-tanàna teo amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nomeko zanaka fa naringako ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy novany ny fitondrantenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny mpitondratenany dia nohamaroiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fasika amoron-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia mitataovovonana aza ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nitondrako mpandringana tao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: handripaka ny renin’ireo zatovo mpiantafika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nazerako tampoka teo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hovitra noho ny tahotra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nihareraka ilay niteraka fito,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka misefosefo fiaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nilentika antoandrobe ny masoandrony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka menatra sy afa-baràka izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay sisa velona dia hatolotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: haringana eo anatrehan’ny fahavalony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitra avy amiko TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainan’i Jeremià sy valintenin’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: (Jeremià)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lozako, ry Neny nahitako masoandro!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy olona toherina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ilàna ady hoatra ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ny tany manontolo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nampanjana-bola aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nisambotra volan’olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ozonin’ny olon-drehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eny, aoka ho voaozona aho, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy nanompo tsara Anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Eny, aoka ho voaozona aho, Tompo ô: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy; ny RM dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hoy ny Tompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy nitalahoako ho an’ny fahavaloko Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny fotoanan’ny loza amam-pahoriany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Moa mety ho tapaka ve ny vy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny vy avy ao avaratra na ny halimo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.14 sy nta; ampit koa 15.20 sy 1.18.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: (Ny Tompo)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ry Joda, ny harenao sy ny zava-tsoanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatolotro horobaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho valin’ny heloka rehetra nataonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: manerana ny taninao manontolo izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 13-14:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 17.3-4.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hampanompoiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hampanompoiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny stf hebreo sasany sy dkt tranainy grika sy siriaka ary hamafisin’ny 17.4; ny RM dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hampandaloviko (ny fahavalonao)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ny fahavalonao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny tany tsy fantatrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mipoitra ny afom-pahatezerako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handoro anao no irehetany.
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: (Jeremià)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: TOMPO ô, fantatrao tsara ny amiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsarovy aho ary mirotsaha an-tsehatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamaly faty ireo mpanenjika ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza andeferana izy, fandrao ho faty aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria aoka ho fantatrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa noho ny aminao no itondrako latsa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hitako ireo teninao ka nohaniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny teninao no fifaliako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy firavoravoan’ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa natokana ho Anao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry TOMPO Andriamanitr’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy nipetraka hamalifaly ny tenako
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny fivorian’ny mpikorana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa noteren’ny herinao hitoetra irery
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nofenoinao ny fahatezeranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nahoana no mitohy ny fijaliako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no tsy mety sitrana ny feriko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy andairam-panafody?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tonga mamitaka ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny mason-dranotrambo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy azo antoka hisy rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Momba izany, dia izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha miverina amiko ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia horaisiko indray ka hanompo eo anatrehako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha milaza izay tokony holazaina ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy miteniteny foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho mpitondrateniko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiverina aminao indray ireo olon’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ianao no hiverina any aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hataoko manda varahina mafy ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: manoloana ity vahoaka ity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiady aminao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hahatohitra anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria miaraka aminao Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamonjy sy hanafaka anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitra avy amiko TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.18-19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eo an-tanan’olon-dratsy ianao no hafahako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo an-tanan’ny mpampahory no havotako.
