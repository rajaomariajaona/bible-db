document_id: GEN.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany, dia notsarovan’Andriamanitra i Noà sy ny bibidia rehetra ary ny biby fiompy rehetra izay niaraka taminy tao anatin’ny sambofiara; ka nampandalo rivo-mahery teny ambonin’ny tany Izy, dia niharîtra ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nihidy ny loharano niboiboika avy any ambanin’ny tany sy ny varavaran’ny lanitra, ary nitsahatra ny ranonorana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Niala tsikelikely ny rano teny ambonin’ny tany, ary nihena nony afaka 150 andro. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary tamin’ny volana fahafito, andro faha-17, dia niantsona teo an-tendrombohitr’i Ararata ny sambofiara. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia mbola nihena hatrany ihany ny rano hatramin’ny volana fahafolo. Ka tamin’ny andro voalohan’ny volana fahafolo, dia tazana ny tampon’ireo tendrombohitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony afaka efapolo andro, dia novohan’i Noà ny varavarankelin’ny sambofiara izay nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandefa goaika anankiray izy, nefa niverimberina nivoaka sy niditra io mandra-paharîtran’ny rano teny ambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nandefa voromahailala iray koa izy mba hahitany na efa nihena ny rano teny ambonin’ny tany na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Kanefa tsy nahita izay hametrahany ny tongony ilay voromahailala, ka niverina tany amin’i Noà teny an-tsambofiara, satria mbola feno rano tambonin’ny tany tontolo. Dia naninjitra ny tanany i Noà ka nandray ilay voromahailala ary nampiditra azy tao anaty sambofiara. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mbola niandry herinandro izy vao nandefa ilay voromahailala fanindroany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa niverina tany amin’i Noà ilay voromahailala, nony hariva, ka hita nitondra ravin’ôliva maitso teny am-bavany. Dia fantatr’i Noà tamin’izany fa efa nihena ny rano tambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia mbola niandry herinandro indray izy vao nandefa ilay voromahailala izay tsy niverina intsony kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa tamin’ny andro voalohan’ny volana voalohany, nony feno 601 taona i Noà, dia ritra ny rano teo ambonin’ny tany. Nesorin’i Noà ny tafon’ny sambofiara ka hitany fa efa maina ny velaran’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary fony andro fahafito amby roapolo tamin’ny volana faharoa dia maina tanteraka ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy Andriamanitra tamin’i Noà: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Mivoaha tao amin’ny sambofiara ianao sy ny vadinao ary ireo zanakalahinao mbamin’ireo vinantovavinao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Avoahy koa ireo biby rehetra niaraka taminao, dia ny karazam-borona rehetra, ny biby rehetra isan-karazany na kely na lehibe, ary aoka hiparitaka eny ambonin’ny tany ireny, ka hitombo eny.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nivoaka avy tao amin’ny sambofiara i Noà sy ny vadiny sy ireo zanany lahy ary ireo vinantovaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Avy eo dia nivoaka koa ireo biby rehetra sy ireo voro-manidina, ary ireo bibikely mihetsiketsika rehetra eny ambonin’ny tany araka ny karazany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nanangana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ho an’ny TOMPO i Noà, ka naka tamin’ireo biby fiompy sy voro-manidina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: ' rehetra ary nanolotra azy ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho an’ny Tompo teo amin’ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nony ren’ny TOMPO ilay hanitra ankasitrahiny, dia hoy IZY anakampo hoe: «Tsy mba hanozona ny tany intsony Aho noho ny amin’ny olombelona. Eny, manomboka amin’ny fahatanorany, dia mirona ho amin’ny ratsy ny fon’ny olombelona; koa tsy hamely ny miaina rehetra intsony toy izay nataoko Aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha mbola tany koa ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hanam-pitsaharana mihitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny famafazana sy ny fijinjana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hafanana sy ny hatsiaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahavaratra sy ny ririnina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny andro sy ny alina.»
