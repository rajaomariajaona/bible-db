document_id: EXO.35,396
type_code: plt
verses:
  '1':
  - type: heading
    content: NY FANAMBOARANA NY TOERAMASINA
  - type: heading
    content: Ny sabata dia andro fitsaharana
  - type: text
    content: Novorin’i Mosesy
  - type: note
    content: 'Ny toko 35–40 dia fitantarana amin’ny antsipiriany ny fanatanterahana ny baiko nomena tao amin’ny toko 25–31. Noho izany dia azo atao ny mijery ireo naoty amin’ireo toko ireo. –And 1-3: ampit 31.12-17.'
  - type: text
    content: ' ny Israelita rehetra ka nilazany hoe:'
  - type: text
    content: '–Ireto no zavatra nandidian’ny TOMPO hotanterahinareo: '
  '10':
  - type: text
    content: 'Ary aoka ny mpahay taozavatra kinga rehetra ao aminareo hivory mba hanatanteraka izay rehetra nodidian’ny TOMPO: '
  '11':
  - type: text
    content: 'dia ny fonena-masina miaraka amin’ny tranolay sy ny rakotra hiaro azy, ny farango, ny hazo fisaka, ny barany, ny andry miaraka amin’ny faladiany; '
  '12':
  - type: text
    content: 'ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' sy ny baony ary ny sarony; ny efitra lamba, '
  '13':
  - type: text
    content: 'ny latabatra voatokana sy ny baony ary ny fitaovana rehetra miaraka aminy mbamin’ny mofo fanolotra an’Andriamanitra; '
  '14':
  - type: text
    content: 'ny fitoeran-jiro sy ny fitaovana miaraka aminy, ny jiro sy ny solika fandrehitra, '
  '15':
  - type: text
    content: 'ny '
  - type: text
    content: alitara
  - type: text
    content: ' fandoroana vovo-javamanitra sy ny baony, ny ilomasina fanokanana, ny vovo-javamanitra hodorana, ny varavarana lamba eo amin’ny fidirana mankao amin’ny fonena-masina; '
  '16':
  - type: text
    content: 'ny alitara fanaovana '
  - type: text
    content: sorona
  - type: text
    content: ' sy ny makarakarany halimo ary ny baony mbamin’ny fitaovana rehetra miaraka aminy; ny kovetabe sy ny faladiany, '
  '17':
  - type: text
    content: 'ny temitry ny kianja miaraka amin’ny andry sy ny faladiany, ny varavarana lamba eo am-bavahadin’ny kianja; '
  '18':
  - type: text
    content: 'ny tsîmatra momba ny fonena-masina sy ny fefin’ny kianja miaraka amin’ny tady mifandraika aminy; '
  '19':
  - type: text
    content: ny lamba fandrakofana ny fanaka
  - type: note
    content: Jereo 31.10 sy nta.
  - type: text
    content: ' ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ary ny fanamiana voatokana hiakanjoan’i Aharôna sy ny zanany lahy eo am-panaovana ny raharahany.'
  '2':
  - type: text
    content: 'misy andro enina hiasanareo isan-kerinandro, fa ny andro fahafito dia '
  - type: text
    content: sabata
  - type: text
    content: ', andro fitsaharana hatokanareo ho an’ny TOMPO. Koa izay olona rehetra manao raharaha amin’io andro io dia hovonoina ho faty'
  - type: note
    content: Jereo 20.8-11; 23.12; 31.12-17; 34.21; Lev 23.3; Deot 5.12-14.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Dia nandao an’i Mosesy ny vahoaka israelita rehetra. '
  '21':
  - type: text
    content: 'Nony avy eo, dia tonga avokoa izay olona rehetra nentanin’ny fony sy malala-tanana, ka samy nitondra fanomezana ho an’ny TOMPO mba hanamboarana ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', hanaovana fanompoam-pivavahana sy hanamboarana ny fanamiana voatokana. '
  '22':
  - type: text
    content: 'Tonga ny lehilahy sy ny vehivavy rehetra malala-tanana nitondra firavaka volamena isan-karazany, fisisika, kavina, peratra na vakana, ka nanolotra azy ho an’ny TOMPO araka ny fihetsika fanolorana izany. '
  '23':
  - type: text
    content: 'Ireo rehetra nanana volon’ondry miloko volomparasy sy mena ary jaky, rongony madinika, na volon’osy, na hoditr’ondry miloko mena na hoditra mafy ihany koa dia samy nitondra ny azy. '
  '24':
  - type: text
    content: 'Ireo nanavaka volafotsy na halimo ho an’ny TOMPO koa dia samy nitondra ny azy; izay nanana hazo mimôzà azo ampiasaina amin’ny fanatanterahana ny asa dia nitondra ny azy. '
  '25':
  - type: text
    content: 'Samy nitondra ny kiran-drongony madinika sy ny volon’ondry miloko volomparasy sy mena ary jaky izay efa nofolesin’ny tanany koa ireo vehivavy kinga. '
  '26':
  - type: text
    content: 'Nisy koa vehivavy kinga hafa nazoto namoly volon’osy. '
  '27':
  - type: text
    content: 'Ireo lehiben’ny vahoaka israelita kosa nitondra ny vato berila sy ny vatosoa hafa hatao amin’ny efôda sy ny saron-tratran’ny mpisorombe, '
  '28':
  - type: text
    content: 'mbamin’ny ilomanitra sy ny solika hatao amin’ny jiro sy ho an’ny ilomasina fampiasa amin’ny fanokanana ary ny vovo-javamanitra hodorana. '
  '29':
  - type: text
    content: Ny Israelita malala-tanana rehetra, na lahy na vavy, dia nitondra fanatitra an-tsitrapo ho an’ny TOMPO mba ho enti-manao ireo asa izay efa nandidian’ny TOMPO an’i Mosesy.
  - type: heading
    content: Manomboka ny asa i Betsalela sy i Ôhôliaba
  '3':
  - type: text
    content: Na aiza na aiza honenanareo, dia tsy azonareo atao na dia ny mandrehitra afo aza amin’ny andro sabata.
  - type: heading
    content: Mitondra ny fandraisany anjara ny Israelita
  '30':
  - type: text
    content: Hoy i Mosesy
  - type: note
    content: 'Ny 35.30–36.7: ampit 31.1-11.'
  - type: text
    content: ' tamin’ny Israelita:'
  - type: text
    content: '–Jereonareo fa nofidin’ny TOMPO i Betsalela, zanakalahin’i Orỳ sady zafikelin’i Hora, avy amin’ny fokon’i Joda, '
  '31':
  - type: text
    content: 'ary nofenoiny ny Fanahiny mba ho tena kinga sy marani-tsaina, ka mahalala ny haitao isan-karazany: '
  '32':
  - type: text
    content: 'hainy ny manao vinavinan’asa, ny miasa volamena sy volafotsy ary halimo, '
  '33':
  - type: text
    content: 'ny mandidy ny vatosoa sy mandrafitra azy, ny manao sokitra ny hazo, izany hoe hainy atao ny asa kanto samihafa. '
  '34':
  - type: text
    content: 'Nomen’ny TOMPO azy ny fahaiza-mampianatra, tahaka izay nomeny an’i Ôhôliaba, zanakalahin’i Ahisamàka, avy amin’ny fokon’i Dana. '
  '35':
  - type: text
    content: 'Nomeny azy roa lahy ny talenta hanao asa isan-karazany: ny mandidy vatosoa, ny manao sary, ny manao peta-kofehy amin’ny volon’ondry miloko volomparasy sy mena ary jaky, ny manao peta-kofehy amin’ny kiran-drongony madinika, ny manenona ary ny manatontosa asa samihafa na mamorona zava-kanto.'
  '4':
  - type: text
    content: Nanohy nampita ny baiko avy amin’ny TOMPO ihany i Mosesy
  - type: note
    content: 'And 4-29: ampit 25.1-7.'
  - type: text
    content: ' ka niteny tamin’ny Israelita tafangona teo nanao hoe:'
  '5':
  - type: text
    content: '–Angony ny fanomezana avy aminareo ho an’ny TOMPO; izay rehetra manome an-tsitrapo no aoka hitondra fanomezana isan-karazany ho an’ny TOMPO: dia volamena, volafotsy, halimo, '
  '6':
  - type: text
    content: 'volon’ondry miloko volomparasy sy mena ary jaky, rongony madinika, volon’osy, '
  '7':
  - type: text
    content: 'hoditr’ondry miloko mena, hoditra mafy, hazo mimôzà, '
  '8':
  - type: text
    content: 'solika hampiasaina amin’ny fitoeran-jiro, ilomanitra hafangaro amin’ny ilomasina fanokanana sy amin’ny vovo-javamanitra hodorana, '
  '9':
  - type: text
    content: 'vato berila sy vatosoa hafa hatao amin’ny efôda sy ny saron-tratran’ny mpisorombe. '
