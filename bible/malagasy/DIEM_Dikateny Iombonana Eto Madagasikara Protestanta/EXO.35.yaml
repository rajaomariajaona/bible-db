    - type: text
      text: ' ary ny fanamiana voatokana hiakanjoan’i Aharôna sy ny zanany lahy eo am-panaovana ny raharahany.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'misy andro enina hiasanareo isan-kerinandro, fa ny andro fahafito dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ', andro fitsaharana hatokanareo ho an’ny TOMPO. Koa izay olona rehetra manao raharaha amin’io andro io dia hovonoina ho faty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 20.8-11; 23.12; 31.12-17; 34.21; Lev 23.3; Deot 5.12-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nandao an’i Mosesy ny vahoaka israelita rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nony avy eo, dia tonga avokoa izay olona rehetra nentanin’ny fony sy malala-tanana, ka samy nitondra fanomezana ho an’ny TOMPO mba hanamboarana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', hanaovana fanompoam-pivavahana sy hanamboarana ny fanamiana voatokana. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tonga ny lehilahy sy ny vehivavy rehetra malala-tanana nitondra firavaka volamena isan-karazany, fisisika, kavina, peratra na vakana, ka nanolotra azy ho an’ny TOMPO araka ny fihetsika fanolorana izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ireo rehetra nanana volon’ondry miloko volomparasy sy mena ary jaky, rongony madinika, na volon’osy, na hoditr’ondry miloko mena na hoditra mafy ihany koa dia samy nitondra ny azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ireo nanavaka volafotsy na halimo ho an’ny TOMPO koa dia samy nitondra ny azy; izay nanana hazo mimôzà azo ampiasaina amin’ny fanatanterahana ny asa dia nitondra ny azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Samy nitondra ny kiran-drongony madinika sy ny volon’ondry miloko volomparasy sy mena ary jaky izay efa nofolesin’ny tanany koa ireo vehivavy kinga. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nisy koa vehivavy kinga hafa nazoto namoly volon’osy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ireo lehiben’ny vahoaka israelita kosa nitondra ny vato berila sy ny vatosoa hafa hatao amin’ny efôda sy ny saron-tratran’ny mpisorombe, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'mbamin’ny ilomanitra sy ny solika hatao amin’ny jiro sy ho an’ny ilomasina fampiasa amin’ny fanokanana ary ny vovo-javamanitra hodorana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny Israelita malala-tanana rehetra, na lahy na vavy, dia nitondra fanatitra an-tsitrapo ho an’ny TOMPO mba ho enti-manao ireo asa izay efa nandidian’ny TOMPO an’i Mosesy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomboka ny asa i Betsalela sy i Ôhôliaba
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Na aiza na aiza honenanareo, dia tsy azonareo atao na dia ny mandrehitra afo aza amin’ny andro sabata.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitondra ny fandraisany anjara ny Israelita
    marker-yv: yv-h
