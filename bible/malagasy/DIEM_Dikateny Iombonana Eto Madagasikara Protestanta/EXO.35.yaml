    - type: text
      text: ' sy ny makarakarany halimo ary ny baony mbamin’ny fitaovana rehetra miaraka aminy; ny kovetabe sy ny faladiany, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ny temitry ny kianja miaraka amin’ny andry sy ny faladiany, ny varavarana lamba eo am-bavahadin’ny kianja; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ny tsîmatra momba ny fonena-masina sy ny fefin’ny kianja miaraka amin’ny tady mifandraika aminy; '
