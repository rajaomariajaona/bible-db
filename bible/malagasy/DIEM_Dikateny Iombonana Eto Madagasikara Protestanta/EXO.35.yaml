      marker-yv: yv-n
    - type: text
      text: ' ny Israelita rehetra ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ireto no zavatra nandidian’ny TOMPO hotanterahinareo: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary aoka ny mpahay taozavatra kinga rehetra ao aminareo hivory mba hanatanteraka izay rehetra nodidian’ny TOMPO: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'dia ny fonena-masina miaraka amin’ny tranolay sy ny rakotra hiaro azy, ny farango, ny hazo fisaka, ny barany, ny andry miaraka amin’ny faladiany; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina
    - type: text
      text: ' sy ny baony ary ny sarony; ny efitra lamba, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ny latabatra voatokana sy ny baony ary ny fitaovana rehetra miaraka aminy mbamin’ny mofo fanolotra an’Andriamanitra; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ny fitoeran-jiro sy ny fitaovana miaraka aminy, ny jiro sy ny solika fandrehitra, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
