      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny toko 35–40 dia fitantarana amin’ny antsipiriany ny fanatanterahana ny baiko nomena tao amin’ny toko 25–31. Noho izany dia azo atao ny mijery ireo naoty amin’ireo toko ireo. '
