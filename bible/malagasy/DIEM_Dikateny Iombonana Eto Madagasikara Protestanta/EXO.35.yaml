      - type: text
        text: alitara
    - type: text
      text: ' fandoroana vovo-javamanitra sy ny baony, ny ilomasina fanokanana, ny vovo-javamanitra hodorana, ny varavarana lamba eo amin’ny fidirana mankao amin’ny fonena-masina; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ny alitara fanaovana '
    - type: usfm
      marker: w
      children:
      - type: text
