    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'hoditr’ondry miloko mena, hoditra mafy, hazo mimôzà, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
