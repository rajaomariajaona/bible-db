    children:
    - type: text
      text: '–Jereonareo fa nofidin’ny TOMPO i Betsalela, zanakalahin’i Orỳ sady zafikelin’i Hora, avy amin’ny fokon’i Joda, '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ary nofenoiny ny Fanahiny mba ho tena kinga sy marani-tsaina, ka mahalala ny haitao isan-karazany: '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'hainy ny manao vinavinan’asa, ny miasa volamena sy volafotsy ary halimo, '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'ny mandidy ny vatosoa sy mandrafitra azy, ny manao sokitra ny hazo, izany hoe hainy atao ny asa kanto samihafa. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Nomen’ny TOMPO azy ny fahaiza-mampianatra, tahaka izay nomeny an’i Ôhôliaba, zanakalahin’i Ahisamàka, avy amin’ny fokon’i Dana. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Nomeny azy roa lahy ny talenta hanao asa isan-karazany: ny mandidy vatosoa, ny manao sary, ny manao peta-kofehy amin’ny volon’ondry miloko volomparasy sy mena ary jaky, ny manao peta-kofehy amin’ny kiran-drongony madinika, ny manenona ary ny manatontosa asa samihafa na mamorona zava-kanto.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nanohy nampita ny baiko avy amin’ny TOMPO ihany i Mosesy
    - type: usfm
