document_id: MRK.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tafatsangana velona i Jesoa
  - type: heading
    content: (Jereo Mt 28.1-8; Lk 24.1-12; Jôh 20.1-10)
  - type: text
    content: 'Rehefa tapitra ny andro '
  - type: text
    content: sabata
  - type: text
    content: ', dia lasa i Maria ilay avy any Magdalà sy i Salôme ary i Maria renin’i Jôsèta nividy zava-manitra, fa nikasa handeha hanosotra an’i Jesoa. '
  '10':
  - type: text
    content: 'Io indray lasa nitantara tamin’ireo mpomba an’i Jesoa, izay mbola nisaona sy nitomany. '
  '11':
  - type: text
    content: Ireo anefa, nony nandre ny voalazan-dravehivavy fa hoe velona i Jesoa ary hitany, dia tsy nino.
  - type: heading
    content: Isehoan’i Jesoa ireo mpianatra roa lahy
  - type: heading
    content: (Jereo Lk 24.13-35)
  '12':
  - type: text
    content: 'Taorian’izany, dia roa lahy tamin’ireo '
  - type: text
    content: mpianatra
  - type: text
    content: ' no nisehoan’i Jesoa tamin’ny fomba hafa indray, raha ilay nandeha nankany ambanivohitra iny izy roa lahy. '
  '13':
  - type: text
    content: Ireo koa niverin-dalana nitantara tamin’ny namany; fa na dia ireo aza tsy ninoany koa.
  - type: heading
    content: Irahin’i Jesoa ny 11 lahy
  - type: heading
    content: (Jereo Mt 28.16-20; Lk 24.36-49; Jôh 20.19-23; Asa 1.6-8)
  '14':
  - type: text
    content: 'Ary farany dia izy 11 lahy teo am-pisakafoana no nisehoan’i Jesoa, ka nomeny tsiny noho izy malain-kino sy mafy fo satria tsy nety nino ireo nahita Azy efa tafatsangana velona. '
  '15':
  - type: text
    content: 'Dia hoy koa i Jesoa taminy:'
  - type: text
    content: '–Mandehana eran’izao tontolo izao, torio amin’ny olombelona rehetra ny '
  - type: text
    content: Vaovao Mahafaly
  - type: note
    content: Ampit Asa 1.8.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Izay hino ka hatao '
  - type: text
    content: batisa
  - type: text
    content: ', dia ho voavonjy; fa izay tsy hino, dia hohelohina. '
  '17':
  - type: text
    content: 'Ary ireto no famantarana homba izay mino: handroaka '
  - type: text
    content: demony
  - type: text
    content: ' amin’ny anarako izy; hiteny amin’ny fiteny vaovao; '
  '18':
  - type: text
    content: handray menarana sy hisotro poizina mahafaty, nefa tsy haninon-tsy haninona; ary hametra-tanana amin’ny marary, dia ho sitrana ireny.
  - type: heading
    content: Miakatra any an-danitra i Jesoa
  - type: heading
    content: (Jereo Lk 24.50-53; Asa 1.9-11)
  '19':
  - type: text
    content: Ary i Jesoa Tompo, rehefa avy niteny tamin’ny 11 lahy toy izany, dia nakarina any an-danitra ary mipetraka eo ankavanan’Andriamanitra
  - type: note
    content: Ampit Asa 1.9-11.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Ka ny andro alahady vao maraina be, raha iny niposaka iny ny masoandro, dia nankany amin’ny fasana izy telo vavy '
  '20':
  - type: text
    content: Ireo mpianany kosa lasa nitory ny Vaovao Mahafaly hatraiza haraiza; ary ny Tompo dia niara-niasa taminy sy nanome hery ny teny notorîny tamin’ny alalan’ny famantarana nampombany azy.]
  - type: heading
    content: FAMARANANA FOHY
  '21':
  - type: text
    content: '['
  - type: text
    content: '9'
  - type: text
    content: ' Kanefa ny zavatra rehetra nanafarana azy telo vavy dia notantarainy fohifohy tamin’i Petera sy ny namany. '
  '22':
  - type: text
    content: ' Ary taorian’izany, dia i Jesoa mihitsy no naniraka ny mpianany, hatrany atsinanana ka hatrany andrefana, hitory ilay hafatra masina tsy tontan’ny ela, dia ny famonjena maharitra mandrakizay. '
  - type: text
    content: Amen
  - type: note
    content: Stf anankiray fotsiny no tsy ahitana afa-tsy ity «famaranana fohy»ity aorian’ny Mk 16.8. Ary misy stf vitsivitsy ahitana ny «famaranana fohy» arahin’ny «famaranana lava».
  - type: text
    content: .]
  '3':
  - type: text
    content: 'ary nifampilaza hoe:'
  - type: text
    content: –Iza no hasaintsika hanakodia ny vato avy eo amin’ny vavafasana?
  '4':
  - type: text
    content: 'Kanjo nony nitraka izy telo vavy, dia tazany ny vato satria goavambe ary hitany efa voakodia. '
  '5':
  - type: text
    content: 'Dia niditra tao am-pasana izy telo vavy ka raiki-tahotra nahita tovolahy niakanjo fotsy nipetraka teo ankavanam-pasana. '
  '6':
  - type: text
    content: 'Fa hoy ilay tovolahy taminy:'
  - type: text
    content: '–Aoka izay ny tahotra. Mitady an’i Jesoa avy any Nazareta, Ilay nohomboana tamin’ny hazofijaliana, ianareo; efa nitsangana velona Izy ka tsy eto intsony. Jereo fa teo ny toerana nametrahana Azy. '
  '7':
  - type: text
    content: 'Fa mandehana lazao amin’ny mpianany sy amin’i Petera hoe: «Mialoha lalana anareo any Galilea, hono, Izy; any no hahitanareo Azy, araka ny voalazany taminareo'
  - type: note
    content: Jereo 14.28.
  - type: text
    content: .»
  '8':
  - type: text
    content: Dia nivoaka ny fasana izy telo vavy, ka lasa nandositra niala teo fa tora-kovitra sady talanjona; nefa tsy nilaza na inona na inona tamin’olona, satria natahotra.
  - type: heading
    content: FAMARANANA LAVA
  - type: heading
    content: Isehoan’i Jesoa i Maria avy any Magdalà
  - type: heading
    content: (Jereo Mt 28.9-10; Jôh 20.11-18)
  - type: text
    content: '[ '
  '9':
  - type: text
    content: Rehefa nitsangana velona i Jesoa ny alahady vao maraina be, dia tamin’i Maria avy any Magdalà, ilay nandroahany demony fito, no nisehoany voalohany
  - type: note
    content: Tsy ahitana ny and 9-20 ny stf tranainy maromaro; araka ireo stf ireo, dia mifarana eo amin’ny 16.8 ny Vaovao Mahafaly araka an’i Marka; kanefa betsaka ihany ireo stf ahitana ny and 9-20 na hoe «famaranana lava».
  - type: text
    content: '. '
