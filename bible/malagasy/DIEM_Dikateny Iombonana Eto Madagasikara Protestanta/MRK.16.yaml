document_id: MRK.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tafatsangana velona i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 28.1-8; Lk 24.1-12; Jôh 20.1-10)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa tapitra ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ', dia lasa i Maria ilay avy any Magdalà sy i Salôme ary i Maria renin’i Jôsèta nividy zava-manitra, fa nikasa handeha hanosotra an’i Jesoa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Io indray lasa nitantara tamin’ireo mpomba an’i Jesoa, izay mbola nisaona sy nitomany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ireo anefa, nony nandre ny voalazan-dravehivavy fa hoe velona i Jesoa ary hitany, dia tsy nino.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isehoan’i Jesoa ireo mpianatra roa lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 24.13-35)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Taorian’izany, dia roa lahy tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' no nisehoan’i Jesoa tamin’ny fomba hafa indray, raha ilay nandeha nankany ambanivohitra iny izy roa lahy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ireo koa niverin-dalana nitantara tamin’ny namany; fa na dia ireo aza tsy ninoany koa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Irahin’i Jesoa ny 11 lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 28.16-20; Lk 24.36-49; Jôh 20.19-23; Asa 1.6-8)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary farany dia izy 11 lahy teo am-pisakafoana no nisehoan’i Jesoa, ka nomeny tsiny noho izy malain-kino sy mafy fo satria tsy nety nino ireo nahita Azy efa tafatsangana velona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy koa i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana eran’izao tontolo izao, torio amin’ny olombelona rehetra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Asa 1.8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izay hino ka hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ', dia ho voavonjy; fa izay tsy hino, dia hohelohina. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ireto no famantarana homba izay mino: handroaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ' amin’ny anarako izy; hiteny amin’ny fiteny vaovao; '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: handray menarana sy hisotro poizina mahafaty, nefa tsy haninon-tsy haninona; ary hametra-tanana amin’ny marary, dia ho sitrana ireny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miakatra any an-danitra i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 24.50-53; Asa 1.9-11)
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary i Jesoa Tompo, rehefa avy niteny tamin’ny 11 lahy toy izany, dia nakarina any an-danitra ary mipetraka eo ankavanan’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Asa 1.9-11.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ka ny andro alahady vao maraina be, raha iny niposaka iny ny masoandro, dia nankany amin’ny fasana izy telo vavy '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ireo mpianany kosa lasa nitory ny Vaovao Mahafaly hatraiza haraiza; ary ny Tompo dia niara-niasa taminy sy nanome hery ny teny notorîny tamin’ny alalan’ny famantarana nampombany azy.]
  - type: usfm
    marker: s1
    children:
    - type: text
      text: FAMARANANA FOHY
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '['
    - type: usfm
      marker: vp
      children:
      - type: text
        text: '9'
    - type: text
      text: ' Kanefa ny zavatra rehetra nanafarana azy telo vavy dia notantarainy fohifohy tamin’i Petera sy ny namany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' Ary taorian’izany, dia i Jesoa mihitsy no naniraka ny mpianany, hatrany atsinanana ka hatrany andrefana, hitory ilay hafatra masina tsy tontan’ny ela, dia ny famonjena maharitra mandrakizay. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Stf anankiray fotsiny no tsy ahitana afa-tsy ity «famaranana fohy»ity aorian’ny Mk 16.8. Ary misy stf vitsivitsy ahitana ny «famaranana fohy» arahin’ny «famaranana lava».
      marker-yv: yv-n
    - type: text
      text: .]
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary nifampilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza no hasaintsika hanakodia ny vato avy eo amin’ny vavafasana?
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Kanjo nony nitraka izy telo vavy, dia tazany ny vato satria goavambe ary hitany efa voakodia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia niditra tao am-pasana izy telo vavy ka raiki-tahotra nahita tovolahy niakanjo fotsy nipetraka teo ankavanam-pasana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa hoy ilay tovolahy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka izay ny tahotra. Mitady an’i Jesoa avy any Nazareta, Ilay nohomboana tamin’ny hazofijaliana, ianareo; efa nitsangana velona Izy ka tsy eto intsony. Jereo fa teo ny toerana nametrahana Azy. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa mandehana lazao amin’ny mpianany sy amin’i Petera hoe: «Mialoha lalana anareo any Galilea, hono, Izy; any no hahitanareo Azy, araka ny voalazany taminareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 14.28.
      marker-yv: yv-n
    - type: text
      text: .»
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia nivoaka ny fasana izy telo vavy, ka lasa nandositra niala teo fa tora-kovitra sady talanjona; nefa tsy nilaza na inona na inona tamin’olona, satria natahotra.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: FAMARANANA LAVA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isehoan’i Jesoa i Maria avy any Magdalà
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 28.9-10; Jôh 20.11-18)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rehefa nitsangana velona i Jesoa ny alahady vao maraina be, dia tamin’i Maria avy any Magdalà, ilay nandroahany demony fito, no nisehoany voalohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy ahitana ny and 9-20 ny stf tranainy maromaro; araka ireo stf ireo, dia mifarana eo amin’ny 16.8 ny Vaovao Mahafaly araka an’i Marka; kanefa betsaka ihany ireo stf ahitana ny and 9-20 na hoe «famaranana lava».
      marker-yv: yv-n
    - type: text
      text: '. '
