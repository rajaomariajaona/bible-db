document_id: PRO.11,396
type_code: plt
verses:
  '1':
  - type: text
    content: Halan’ny TOMPO ireo mizana mandainga;
  - type: text
    content: fa ny lanja marina no tiany
  - type: note
    content: Jereo ohatra Lev 19.36; Mik 6.9-12.
  - type: text
    content: .
  '10':
  - type: text
    content: Mifaly amin’ny fahombiazan’ny olo-marina ny tanàna,
  - type: text
    content: ary velom-pihobiana amin’ny fahafatesan’ny olon-dratsy.
  '11':
  - type: text
    content: Ny tsodranon’ireo olo-mahitsy no isandratan’ny tanàna;
  - type: text
    content: fa ny tenin’ireo olon-dratsy kosa no aharavany.
  '12':
  - type: text
    content: Izay manambany ny namany no bado;
  - type: text
    content: fa aleon’ny manan-tsaina mangina.
  '13':
  - type: text
    content: Ny mpanely fanaratsiana no manambara tsiambaratelo;
  - type: text
    content: fa ny olo-mahatoky kosa mahay manafin-javatra.
  '14':
  - type: text
    content: Ho very ny vahoaka tsy misy mpitondra;
  - type: text
    content: fa raha maro mpanolo-tsaina izy no handry feizay.
  '15':
  - type: text
    content: Izay miantoka ny trosan’ny hafa dia hanenina mafy;
  - type: text
    content: milamin-tsaina kosa izay tsy manaiky hanao izany.
  '16':
  - type: text
    content: Ny vehivavy tsara tarehy mahazo haja;
  - type: text
    content: ary ny lehilahy mavitrika mahazo harena.
  '17':
  - type: text
    content: Ny olona tsara fanahy dia manasoa tena;
  - type: text
    content: fa ny olona masiaka kosa mampahory tena.
  '18':
  - type: text
    content: Karama manodoka no raisin’ny olon-dratsy;
  - type: text
    content: fa valisoa azo antoka no an’izay mamafy fahamarinana.
  '19':
  - type: text
    content: Izay mitandro fahamarinana dia ho velona;
  - type: text
    content: fa izay mpanaraka ny ratsy kosa ho faty.
  '2':
  - type: text
    content: Setrin’ny fiavonavonana ny fahafaham-baràka;
  - type: text
    content: fa ao amin’ny manetry tena no misy fahendrena.
  '20':
  - type: text
    content: Halan’ny TOMPO ny olona fetsifetsy;
  - type: text
    content: fa izay manan-toetra vanona kosa no tiany.
  '21':
  - type: text
    content: Azo antoka tokoa fa hofaizina ny ratsy fanahy;
  - type: text
    content: fa ny taranaky ny marina kosa ho voavonjy.
  '22':
  - type: text
    content: Ny hatsaran-tarehin’ny vehivavy tsy misaina
  - type: text
    content: dia toy ny kavim-bolamena eo amin’ny oron-kisoa.
  '23':
  - type: text
    content: Ny soa ihany no kendren’ny olo-marina;
  - type: text
    content: fa ny fahatezeran’Andriamanitra
  - type: note
    content: ny fahatezeran’Andriamanitra na koa ny fahatezeran’ny hafa.
  - type: text
    content: kosa
  - type: text
    content: no arehitry ny fanirian’ireo olon-dratsy.
  '24':
  - type: text
    content: Misy izay malala-tanana nefa mitombo harena hatrany;
  - type: text
    content: ary misy kahihitra loatra nefa mihamahantra ihany.
  '25':
  - type: text
    content: Hiavosam-panambinana ny olona mpanao soa,
  - type: text
    content: ary izay manome rano hosotroina dia ho afa-ketaheta.
  '26':
  - type: text
    content: Ozonim-bahoaka izay mitahiry ny variny
  - type: note
    content: Ireo olona mpamandri-bary izay tsy mety mivarotra ny variny ara-potoana ireo fa mitahiry izany kosa mba hakana tombony mihoa-pampana amin’ny fotoana tsy mampisy ny vokatra.
  - type: text
    content: fa tsofiny rano kosa izay mivarotra ny azy.
  '27':
  - type: text
    content: Izay fatra-pikatsaka ny soa
  - type: text
    content: dia misarika ny fanambinan’Andriamanitra;
  - type: text
    content: fa izay mitady ny ratsy kosa dia hahita loza.
  '28':
  - type: text
    content: Hihareraka izay mitoky amin’ny hareny,
  - type: text
    content: fa ho tahaka ny ravin-kazo maitso kosa
  - type: text
    content: no handrobonan’ny olo-marina.
  '29':
  - type: text
    content: Izay mitondra korontana ao an-tranony dia adala,
  - type: text
    content: ka handova rivotra sy ho tonga mpanompon’ny hendry.
  '3':
  - type: text
    content: Ny toetra vanona no mitarika ny olo-mahitsy;
  - type: text
    content: fa ny haratsiana kosa mandringana ny mpamitaka.
  '30':
  - type: text
    content: Ny vokatry ny fahamarinana dia toy ny hazon’aina;
  - type: text
    content: ary ny hendry no mahataona olona.
  '31':
  - type: text
    content: Omem-balisoa etỳ an-tany ny olo-marina;
  - type: text
    content: koa ny ratsy fanahy sy ny mpanota
  - type: text
    content: dia vao mainka hahazo ny setry sahaza
  - type: note
    content: Jereo 10.27 sy nta.
  - type: text
    content: '!'
  '4':
  - type: text
    content: Tsy misy ilana ny harena amin’ny andro fitsarana;
  - type: text
    content: fa ny fahamarinana no manafaka amin’ny fahafatesana.
  '5':
  - type: text
    content: Ny fahamarinan’ny olom-banona manamora ny fiainany;
  - type: text
    content: fa ny olon-dratsy kosa verin’ny faharatsiany.
  '6':
  - type: text
    content: Ny fahamarinan’ny olo-mahitsy manafaka azy;
  - type: text
    content: fa voafandriky ny filàn-dratsy kosa ny mpamitaka.
  '7':
  - type: text
    content: Rehefa maty ny olon-dratsy, dia miara-maty aminy koa ny fanantenany,
  - type: text
    content: indrindra fa izay nankininy tamin’ny harena.
  '8':
  - type: text
    content: Ny olo-marina dia afahana amin’ny tebiteby;
  - type: text
    content: fa ny olon-dratsy kosa no hiditra hisolo azy ao.
  '9':
  - type: text
    content: Ny mpandà an’Andriamanitra dia manimba namana amin’ny teniny;
  - type: text
    content: fa ny fahalalana kosa no hanafahana ny olo-marina.
