document_id: PRO.11
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Halan’ny TOMPO ireo mizana mandainga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lanja marina no tiany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ohatra Lev 19.36; Mik 6.9-12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Setrin’ny fiavonavonana ny fahafaham-baràka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ao amin’ny manetry tena no misy fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny toetra vanona no mitarika ny olo-mahitsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny haratsiana kosa mandringana ny mpamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy misy ilana ny harena amin’ny andro fitsarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahamarinana no manafaka amin’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny fahamarinan’ny olom-banona manamora ny fiainany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-dratsy kosa verin’ny faharatsiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahamarinan’ny olo-mahitsy manafaka azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa voafandriky ny filàn-dratsy kosa ny mpamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rehefa maty ny olon-dratsy, dia miara-maty aminy koa ny fanantenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: indrindra fa izay nankininy tamin’ny harena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny olo-marina dia afahana amin’ny tebiteby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-dratsy kosa no hiditra hisolo azy ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny mpandà an’Andriamanitra dia manimba namana amin’ny teniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahalalana kosa no hanafahana ny olo-marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mifaly amin’ny fahombiazan’ny olo-marina ny tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary velom-pihobiana amin’ny fahafatesan’ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny tsodranon’ireo olo-mahitsy no isandratan’ny tanàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenin’ireo olon-dratsy kosa no aharavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izay manambany ny namany no bado;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aleon’ny manan-tsaina mangina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny mpanely fanaratsiana no manambara tsiambaratelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olo-mahatoky kosa mahay manafin-javatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ho very ny vahoaka tsy misy mpitondra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha maro mpanolo-tsaina izy no handry feizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay miantoka ny trosan’ny hafa dia hanenina mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: milamin-tsaina kosa izay tsy manaiky hanao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny vehivavy tsara tarehy mahazo haja;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lehilahy mavitrika mahazo harena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny olona tsara fanahy dia manasoa tena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olona masiaka kosa mampahory tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Karama manodoka no raisin’ny olon-dratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa valisoa azo antoka no an’izay mamafy fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay mitandro fahamarinana dia ho velona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mpanaraka ny ratsy kosa ho faty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Halan’ny TOMPO ny olona fetsifetsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay manan-toetra vanona kosa no tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Azo antoka tokoa fa hofaizina ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny taranaky ny marina kosa ho voavonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny hatsaran-tarehin’ny vehivavy tsy misaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny kavim-bolamena eo amin’ny oron-kisoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny soa ihany no kendren’ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahatezeran’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny fahatezeran’Andriamanitra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na koa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny fahatezeran’ny hafa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no arehitry ny fanirian’ireo olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Misy izay malala-tanana nefa mitombo harena hatrany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misy kahihitra loatra nefa mihamahantra ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Hiavosam-panambinana ny olona mpanao soa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay manome rano hosotroina dia ho afa-ketaheta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ozonim-bahoaka izay mitahiry ny variny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo olona mpamandri-bary izay tsy mety mivarotra ny variny ara-potoana ireo fa mitahiry izany kosa mba hakana tombony mihoa-pampana amin’ny fotoana tsy mampisy ny vokatra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsofiny rano kosa izay mivarotra ny azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay fatra-pikatsaka ny soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia misarika ny fanambinan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mitady ny ratsy kosa dia hahita loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hihareraka izay mitoky amin’ny hareny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho tahaka ny ravin-kazo maitso kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no handrobonan’ny olo-marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izay mitondra korontana ao an-tranony dia adala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handova rivotra sy ho tonga mpanompon’ny hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny vokatry ny fahamarinana dia toy ny hazon’aina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hendry no mahataona olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Omem-balisoa etỳ an-tany ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny ratsy fanahy sy ny mpanota
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia vao mainka hahazo ny setry sahaza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 10.27 sy nta.
    marker-yv: yv-n
  - type: text
    text: '!'
