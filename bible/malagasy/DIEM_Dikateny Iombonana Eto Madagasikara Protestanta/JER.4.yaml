document_id: JER.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: Raha hiverina ianao, ry Israely,
  - type: text
    content: hoy ny teny hentitry ny TOMPO,
  - type: text
    content: dia mahazo miverina amiko.
  - type: text
    content: Raha esorinao tsy ho hitan’ny masoko
  - type: text
    content: ireo sampinao maharikoriko,
  - type: text
    content: dia tsy hirenireny intsony ianao.
  '10':
  - type: text
    content: Dia hiteny ireny
  - type: note
    content: 'Dia hiteny ireny hoe: araka ny stf tranainy grika; hebreo Dia hoy aho hoe:'
  - type: text
    content: 'hoe:'
  - type: text
    content: «Andray, ry Tompo ANDRIANANAHARY ô,
  - type: text
    content: namitaka ity vahoaka ity
  - type: text
    content: sy namitaka an’i Jerosalema Ianao
  - type: text
    content: tamin’ny fampanantenana hoe fa
  - type: text
    content: hisy fiadanana ho antsika
  - type: text
    content: kanjo mihatra aman’aina ity ny sabatra!»
  - type: heading
    content: Mipoitra avy etsy sy eroa ny mpandrava
  '11':
  - type: text
    content: Amin’izay dia hiteny amin’ity vahoaka ity
  - type: text
    content: 'sy amin’ny mponin’i Jerosalema ny Tompo hoe:'
  - type: text
    content: «Ny rivotra mahamay eny an-tendrombohitra
  - type: text
    content: no tonga avy any an-taniefitra
  - type: text
    content: mankany amin’ny vahoakako;
  - type: text
    content: tsy rivotra malefaka hikororoham-bary
  '12':
  - type: text
    content: fa rivotra mahery izay nirahiko avy any,
  - type: text
    content: ka hanambaràko ankehitriny
  - type: text
    content: ny didim-pitsarana hamelezako azy.»
  - type: heading
    content: (Ny vahoaka)
  '13':
  - type: text
    content: 'Indro tamy ny fahavalo:'
  - type: text
    content: toy ny rahona no iakarany hanafika,
  - type: text
    content: toy ny rambon-danitra no firimorimon’ny kalesiny
  - type: text
    content: ary faingana noho ny voromahery ny soavaliny.
  - type: text
    content: Very isika, fa ringana tanteraka!
  - type: heading
    content: (Ny Tompo)
  '14':
  - type: text
    content: Diovy hiala amin’ny ratsy ny fonao,
  - type: text
    content: raha te ho afaka ianao, ry Jerosalema.
  - type: text
    content: Mandra-pahoviana ny hevi-dratsy
  - type: text
    content: no hitoetra ao anatinao?
  '15':
  - type: text
    content: Henoy ange fa misy siosio avy any Dana,
  - type: text
    content: ary misy vaovao milaza fahoriana
  - type: text
    content: avy amin’ny faritra havoan’i Efraîma.
  '16':
  - type: text
    content: Lazaonareo amin’ny mponina rehetra,
  - type: text
    content: ampandrenesonareo i Jerosalema
  - type: text
    content: fa manakaiky azy ny mpanao fahirano,
  - type: text
    content: tonga avy any an-tany lavitra any
  - type: text
    content: ka mihorakoraka hamely ireo tanànan’i Joda.
  '17':
  - type: text
    content: Manodidina an’i Jerosalema
  - type: text
    content: tahaka ny olona miandry saha izy.
  - type: text
    content: Vokatry ny fikomianao tamiko izao,
  - type: text
    content: teny hentitry ny TOMPO izany.
  '18':
  - type: text
    content: Ny fitondrantenanao sy ny ratsy nataonao
  - type: text
    content: no nahatonga izao taminao, ry Jerosalema.
  - type: text
    content: Hotsaroanao ny ngidin’izao loza izao,
  - type: text
    content: satria mihatra hatrany amin’ny fonao.
  - type: heading
    content: Mararin’ny loza tsinjony mialoha i Jeremià
  '19':
  - type: text
    content: Endrey izany kiboko fa maharary ahy.
  - type: text
    content: Manaintaina miferinaina aho;
  - type: text
    content: mila ho vaky izany ny foko.
  - type: text
    content: Mikorontana ny ao anatiko
  - type: text
    content: 'ka tsy afa-mangina aho:'
  - type: text
    content: fa reko ny feon’anjomara sy ny akoran’ady.
  '2':
  - type: text
    content: Raha araka ny rariny sy ny hitsiny ary ny marina
  - type: text
    content: 'no hanaovanao fianianana hoe:'
  - type: text
    content: «Velona ny TOMPO, ka mianiana aho fa...»,
  - type: text
    content: dia ny firenen-kafa koa hangataka hotahîko
  - type: text
    content: sady hanao Ahy ho reharehany.
  '20':
  - type: text
    content: Fahavoazana mifanontona no ambara;
  - type: text
    content: rava ny tany manontolo.
  - type: text
    content: Rava tampoka teo ny tranolay nitobianay
  - type: text
    content: ary fongana indray mipi-maso ny fialofanay.
  '21':
  - type: text
    content: Mandra-pahoviana no mbola hijereko
  - type: text
    content: ireo faneva famantarana ady
  - type: text
    content: sy handrenesako ny feon’ny anjomara?
  '22':
  - type: text
    content: «Adala tokoa ny vahoakako
  - type: text
    content: fa tsy mahalala Ahy», hoy ny Tompo.
  - type: text
    content: Ankizy tsy misaina ireo,
  - type: text
    content: tsy mahatakatra na inona na inona,
  - type: text
    content: tsy kinga afa-tsy amin’ny fanaovan-dratsy
  - type: text
    content: fa raha izay hanao ny tsara tsy hainy.
  '23':
  - type: text
    content: Nojereko ny tany,
  - type: text
    content: ka indro foana sady tsy nisy endrika,
  - type: text
    content: ary ny lanitra tsy nisy fahazavana.
  '24':
  - type: text
    content: Nojereko ny tendrombohitra
  - type: text
    content: ka tsy nahajoro intsony;
  - type: text
    content: ary ny havoana rehetra nihozongozona.
  '25':
  - type: text
    content: Nojereko ka tsy nisy olona intsony
  - type: text
    content: fa lasa mbamin’ny voronkely rehetra aza.
  '26':
  - type: text
    content: Nojereko ity tany izay saha nahavokatra
  - type: text
    content: ka tonga taniefitra sisa,
  - type: text
    content: fa rava avokoa ny tanànany.
  - type: text
    content: Noho ny nataon’ny TOMPO izany,
  - type: text
    content: noho ny fahatezerany mirehitra.
  '27':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Ho lao ny tany manontolo
  - type: text
    content: nefa tsy hofoanako avokoa.
  '28':
  - type: text
    content: Noho izany, dia misaona ny tany
  - type: text
    content: ary mihamaizina ny lanitra any ambony.
  - type: text
    content: Satria Izaho no efa niteny;
  - type: text
    content: ka tsy hanova ny fanapahan-kevitro Aho
  - type: text
    content: na hihemotra amin’izany.»
  - type: heading
    content: I Tsiôna manoloana ireo mpamono
  '29':
  - type: text
    content: Noho ny fihorakorak’ireo mpitaingin-tsoavaly
  - type: text
    content: sy ireo mpitifitra amin’ny tsipîka,
  - type: text
    content: 'dia vaky nandositra ny tao an-tanàna rehetra:'
  - type: text
    content: ka nitsofoka anaty kirihitr’ala
  - type: text
    content: na nianika ny harambato.
  - type: text
    content: Nilaozana avokoa ny tanàna rehetra,
  - type: text
    content: ka tsy nisy mponina intsony.
  '3':
  - type: text
    content: Izao no lazain’ny TOMPO
  - type: text
    content: 'amin’ny olon’i Joda sy ireo mponin’i Jerosalema:'
  - type: text
    content: Miasà tanimboly vaovao ianareo,
  - type: text
    content: fa aza mamafy amin’ny tany misy tsilo
  - type: note
    content: Jereo Hos 10.12.
  - type: text
    content: '!'
  '30':
  - type: text
    content: Ary inona ity ataonao, ry Jerosalema?
  - type: text
    content: Na miakanjo marevaka aza ianao
  - type: text
    content: sy miravaka volamena sady manao manja maso,
  - type: text
    content: dia tsy misy ilana ny hatsaran-tarehinao.
  - type: text
    content: Fa harian’ireo lehilahy naka anao ianao,
  - type: text
    content: sady tadiaviny hovonoina ho faty.
  '31':
  - type: text
    content: Nandre feo toy ny an’ny vehivavy miteraka aho,
  - type: text
    content: dia kiakiakan’ny vehivavy miteraka ny voalohan-janany.
  - type: text
    content: 'Feon’ireo mponin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' izany,'
  - type: text
    content: dia ireo mponina misefosefo
  - type: text
    content: 'sady maninji-tanana miangavy hoe:'
  - type: text
    content: «Lozanay fa reraka ny ainay
  - type: text
    content: noho ny ataon’ireo mpamono olona!»
  '4':
  - type: text
    content: 'Aoka ho '
  - type: text
    content: voafora
  - type: text
    content: ' ho Ahy TOMPO ianareo'
  - type: text
    content: ka esory ny loto ao amin’ny fonareo
  - type: text
    content: ry olon’i Joda sy ry mponin’i Jerosalema.
  - type: text
    content: Fandrao hirehitra toy ny afo ny fahatezerako
  - type: text
    content: noho ny faharatsian’ny ataonareo
  - type: text
    content: ka handevona izao rehetra izao;
  - type: text
    content: ary tsy hisy hamono ny afo.
  - type: heading
    content: Koka fanairana ao Joda
  '5':
  - type: text
    content: Ataovy ny fanairana an’i Joda
  - type: text
    content: ary ampandreneso ny ao Jerosalema
  - type: text
    content: Tsofy ao amin’io tany io ny anjomara,
  - type: text
    content: 'ka miantsoantsoa mafy hoe:'
  - type: text
    content: Mivoria ianareo,
  - type: text
    content: ary andeha isika hiditra
  - type: text
    content: ao amin’ny tanànamimanda.
  '6':
  - type: text
    content: 'Atsangano tandrifin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny faneva,'
  - type: text
    content: ary mandosira ka aza miato;
  - type: text
    content: fa hahatonga loza amin’antambo lehibe
  - type: text
    content: avy any avaratra
  - type: note
    content: Jereo 1.14 sy nta.
  - type: text
    content: ' ny Tompo.'
  '7':
  - type: text
    content: Miakatra avy any anaty akata ny liona
  - type: text
    content: ary efa eny an-dalana ny mpandrava firenena;
  - type: text
    content: niala tao amin’ny toerany izy
  - type: text
    content: mba handrava ny taninareo
  - type: text
    content: sy hampahalao ny tanànanareo
  - type: text
    content: tsy hisy mponina intsony.
  '8':
  - type: text
    content: Manaova akanjo fisaonana noho izany
  - type: text
    content: ka mitomania sy midradradradrà,
  - type: text
    content: fa ny TOMPO tsy mbola nampiala tamintsika
  - type: text
    content: ny fahatezerany mirehitra.
  '9':
  - type: text
    content: Amin’ny andro hitrangan’izany,
  - type: text
    content: hoy ny teny hentitry ny Tompo,
  - type: text
    content: dia ho kivy ny mpanjaka sy ny mpitondra ambony,
  - type: text
    content: 'ho ketraka ny '
  - type: text
    content: mpisorona
  - type: text
    content: 'ary hivarahontsana ny '
  - type: text
    content: mpaminany
  - type: text
    content: .
