document_id: NUM.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo sarety nomena ny Toeramasina
  - type: text
    content: 'Tamin’ny andro namitan’i Mosesy ny fananganana ny Fonena-masina no nanosorany sy nanokanany azy niaraka tamin’ny kojakoja rehetra momba azy; nohosorany sy notokanany tahaka izany koa ny '
  - type: text
    content: alitara
  - type: text
    content: ' mbamin’ny kojakoja rehetra momba azy. '
  '10':
  - type: text
    content: 'Tamin’ny andro nanosorana ny '
  - type: text
    content: alitara
  - type: text
    content: ', dia ireo filoham-pianakaviambe koa no nitondra fanomezana ho fitokanana azy. Samy nitondra ny fanomezany avy teo anoloan’ny alitara izy ireo. '
  '11':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Aoka hifandimby hitondra ny fanomezany isan’andro avy ireo filoha ireo amin’ny fanokanana ny alitara!
  '12':
  - type: text
    content: 'Toy izao manaraka izao ny fahatongavany nitondra ny fanomezany:'
  - type: text
    content: tamin’ny andro voalohany dia i Nahasôna zanakalahin’i Hadaba, avy amin’ny fokon’i Joda;
  - type: text
    content: tamin’ny andro faharoa dia i Natanaela zanakalahin’i Tsohara, avy amin’ny fokon’i Jisakara;
  - type: text
    content: tamin’ny andro fahatelo dia i Eliaba zanakalahin’i Helôna, avy amin’ny fokon’i Zebolòna;
  - type: text
    content: tamin’ny andro fahefatra dia i Elitsora zanakalahin’i Sedeòra, avy amin’ny fokon’i Reobena;
  - type: text
    content: tamin’ny andro fahadimy dia i Selomiela zanakalahin’i Tsorisaday, avy amin’ny fokon’i Simehôna;
  - type: text
    content: tamin’ny andro fahenina dia i Eliasafa zanakalahin’i Dehoela, avy amin’ny fokon’i Gada;
  - type: text
    content: tamin’ny andro fahafito dia i Elisamà zanakalahin’i Hamihoda, avy amin’ny fokon’i Efraîma;
  - type: text
    content: tamin’ny andro fahavalo dia i Gamalièla zanakalahin’i Pedahatsoro, avy amin’ny fokon’i Manase;
  - type: text
    content: tamin’ny andro fahasivy dia i Abidàna zanakalahin’i Gidehônỳ, avy amin’ny fokon’i Benjamîna;
  - type: text
    content: tamin’ny andro fahafolo dia i Ahihezera zanakalahin’i Hamisaday, avy amin’ny fokon’i Dana;
  - type: text
    content: tamin’ny andro faha-11 dia i Pagihiela zanakalahin’i Hôkràna, avy amin’ny fokon’i Asera;
  - type: text
    content: ary tamin’ny andro faha-12 dia i Ahîra zanakalahin’i Henàna, avy amin’ny fokon’i Naftalỳ.
  - type: text
    content: 'Ireto manaraka ireto kosa ny fanomezana nentin’ny filoham-pianakaviana tsirairay avy:'
  - type: text
    content: '–lovia volafotsy iray milanja 1 300 grama, tsatokaty volafotsy famafazana iray milanja 700 grama araka ny ventin-danja fampiasa ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ; ireo fitaovana ireo dia samy feno lafarinina tsara toto sy voafeta menaka ho fanatitra;
  - type: text
    content: –zinga volamena iray milanja 100 grama feno vovo-javamanitra;
  - type: text
    content: '–vantotr’ombilahy iray sy ondrilahy iray ary ondrilahikely iray izay iray taona avy, samy hatao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo;'
  - type: text
    content: –osilahy iray hatao sorona fanalana ny ota;
  - type: text
    content: –ary ombilahy roa, ondrilahy dimy sy osilahy dimy ary ondrilahikely dimy izay iray taona avy, samy hatao sorom-pihavanana.
  '2':
  - type: text
    content: 'Avy eo dia niroso ireo filoham-pianakaviambe tamin’ny fokon’i Israely, izany hoe ireo nitarika ny fanisana. '
  '3':
  - type: text
    content: 'Nitondra fanomezana teo anatrehan’ny TOMPO ireo, dia sarety enina mirakotra sy omby 12 ka sarety iray no avy amin’ny filoha roa ary omby iray no avy amin’ny filoha iray. Nentiny teo anoloan’ny Fonena-masina avokoa ireo. '
  '4':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  '5':
  - type: text
    content: '–Raiso ireo fanomezana entiny eto aminao ireo fa ilaina amin’ny asa fanompoana momba ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' izany, ka omeo ny '
  - type: text
    content: Levita
  - type: text
    content: ', samy araka ny ilàny azy avy.'
  '6':
  - type: text
    content: 'Dia noraisin’i Mosesy ny sarety sy ny omby ka nomeny ny Levita. '
  '7':
  - type: text
    content: 'Nomeny sarety roa sy omby efatra ny taranak’i Gersôna, araka ny ilainy amin’ny asany. '
  '8':
  - type: text
    content: 'Ny sarety efatra sisa sy ny omby valo kosa dia nomeny ny taranak’i Merarỳ tamin’ny alalan’i Itamara mpisorona sady zanakalahin’i Aharôna, araka ny ilainy amin’ny asany. '
  '84':
  - type: text
    content: 'Ireto ny fitambaran’ny fanomezana natolotr’ireo filoham-pianakaviamben’i Israely tamin’ny andro nanosorana sy nanokanana ny alitara: lovia volafotsy 12, kaopy volafotsy famafazana 12, lovia kely volamena 12, '
  '85':
  - type: text
    content: 'ka 1 300 grama avy no lanjan’ny lovia volafotsy iray ary fitonjato grama avy no lanjan’ny kaopy volafotsy iray. Ny fitambaran’ireo fanaka volafotsy ireo dia 24 kilao araka ny ventin-danja fampiasa ao amin’ny Toeramasina. '
  '86':
  - type: text
    content: 'Zato grama no lanjan’ny lovia kely volamena iray, ka ny lanjan’ny zinga 12 mitambatra dia 1 200 grama araka ny ventin-danja fampiasa ao amin’ny Toeramasina. '
  '87':
  - type: text
    content: 'Ireo biby rehetra natao sorona dorana manontolo dia vantotr’ombilahy 12, ondrilahy 12, ondrilahikely 12 izay iray taona avy miaraka amin’ny fanatitra momba azy; osilahy 12 no natao sorona fanalana ny ota. '
  '88':
  - type: text
    content: Ny biby rehetra natao sorom-pihavanana kosa dia ombilahy 24, ondrilahy 60, osilahy 60, ondrilahikely 60 izay iray taona avy. Ireo no fanomezana natolotra ho fanokanana ny alitara rehefa voahosotra izy.
  '89':
  - type: text
    content: 'Rehefa niditra tao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' i Mosesy mba hiresaka amin’ny TOMPO, dia nandre feo niteny taminy avy teo anelanelan’ny '
  - type: text
    content: kerobima
  - type: text
    content: ' roa izy, dia teo ambonin’ny rakotry ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' misy ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: ; ary niresahan’ny TOMPO i Mosesy.
  '9':
  - type: text
    content: Fa ny taranak’i Kehàta kosa tsy mba nomeny, satria izy ireo no tompon’andraikitra momba ny fitaovana masina, ka tsy maintsy milanja izany eo an-tsoroka.
  - type: heading
    content: Ny fanomezana enti-mitokana ny alitara
