document_id: NUM.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo sarety nomena ny Toeramasina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny andro namitan’i Mosesy ny fananganana ny Fonena-masina no nanosorany sy nanokanany azy niaraka tamin’ny kojakoja rehetra momba azy; nohosorany sy notokanany tahaka izany koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' mbamin’ny kojakoja rehetra momba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Avy eo dia niroso ireo filoham-pianakaviambe tamin’ny fokon’i Israely, izany hoe ireo nitarika ny fanisana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nitondra fanomezana teo anatrehan’ny TOMPO ireo, dia sarety enina mirakotra sy omby 12 ka sarety iray no avy amin’ny filoha roa ary omby iray no avy amin’ny filoha iray. Nentiny teo anoloan’ny Fonena-masina avokoa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '–Raiso ireo fanomezana entiny eto aminao ireo fa ilaina amin’ny asa fanompoana momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' izany, ka omeo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ', samy araka ny ilàny azy avy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia noraisin’i Mosesy ny sarety sy ny omby ka nomeny ny Levita. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nomeny sarety roa sy omby efatra ny taranak’i Gersôna, araka ny ilainy amin’ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny sarety efatra sisa sy ny omby valo kosa dia nomeny ny taranak’i Merarỳ tamin’ny alalan’i Itamara mpisorona sady zanakalahin’i Aharôna, araka ny ilainy amin’ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny taranak’i Kehàta kosa tsy mba nomeny, satria izy ireo no tompon’andraikitra momba ny fitaovana masina, ka tsy maintsy milanja izany eo an-tsoroka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanomezana enti-mitokana ny alitara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’ny andro nanosorana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ', dia ireo filoham-pianakaviambe koa no nitondra fanomezana ho fitokanana azy. Samy nitondra ny fanomezany avy teo anoloan’ny alitara izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hifandimby hitondra ny fanomezany isan’andro avy ireo filoha ireo amin’ny fanokanana ny alitara!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-83
  - type: text
    text: 'Toy izao manaraka izao ny fahatongavany nitondra ny fanomezany:'
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro voalohany dia i Nahasôna zanakalahin’i Hadaba, avy amin’ny fokon’i Joda;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro faharoa dia i Natanaela zanakalahin’i Tsohara, avy amin’ny fokon’i Jisakara;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro fahatelo dia i Eliaba zanakalahin’i Helôna, avy amin’ny fokon’i Zebolòna;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro fahefatra dia i Elitsora zanakalahin’i Sedeòra, avy amin’ny fokon’i Reobena;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro fahadimy dia i Selomiela zanakalahin’i Tsorisaday, avy amin’ny fokon’i Simehôna;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro fahenina dia i Eliasafa zanakalahin’i Dehoela, avy amin’ny fokon’i Gada;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro fahafito dia i Elisamà zanakalahin’i Hamihoda, avy amin’ny fokon’i Efraîma;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro fahavalo dia i Gamalièla zanakalahin’i Pedahatsoro, avy amin’ny fokon’i Manase;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro fahasivy dia i Abidàna zanakalahin’i Gidehônỳ, avy amin’ny fokon’i Benjamîna;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro fahafolo dia i Ahihezera zanakalahin’i Hamisaday, avy amin’ny fokon’i Dana;
- type: usfm
  marker: p
  children:
  - type: text
    text: tamin’ny andro faha-11 dia i Pagihiela zanakalahin’i Hôkràna, avy amin’ny fokon’i Asera;
- type: usfm
  marker: p
  children:
  - type: text
    text: ary tamin’ny andro faha-12 dia i Ahîra zanakalahin’i Henàna, avy amin’ny fokon’i Naftalỳ.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireto manaraka ireto kosa ny fanomezana nentin’ny filoham-pianakaviana tsirairay avy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–lovia volafotsy iray milanja 1 300 grama, tsatokaty volafotsy famafazana iray milanja 700 grama araka ny ventin-danja fampiasa ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ; ireo fitaovana ireo dia samy feno lafarinina tsara toto sy voafeta menaka ho fanatitra;
- type: usfm
  marker: m
  children:
  - type: text
    text: –zinga volamena iray milanja 100 grama feno vovo-javamanitra;
- type: usfm
  marker: m
  children:
  - type: text
    text: '–vantotr’ombilahy iray sy ondrilahy iray ary ondrilahikely iray izay iray taona avy, samy hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo;'
- type: usfm
  marker: m
  children:
  - type: text
    text: –osilahy iray hatao sorona fanalana ny ota;
- type: usfm
  marker: m
  children:
  - type: text
    text: –ary ombilahy roa, ondrilahy dimy sy osilahy dimy ary ondrilahikely dimy izay iray taona avy, samy hatao sorom-pihavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '84'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '84'
  - type: text
    text: 'Ireto ny fitambaran’ny fanomezana natolotr’ireo filoham-pianakaviamben’i Israely tamin’ny andro nanosorana sy nanokanana ny alitara: lovia volafotsy 12, kaopy volafotsy famafazana 12, lovia kely volamena 12, '
  - type: usfm
    marker: v
    metadata:
      v: '85'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: 'ka 1 300 grama avy no lanjan’ny lovia volafotsy iray ary fitonjato grama avy no lanjan’ny kaopy volafotsy iray. Ny fitambaran’ireo fanaka volafotsy ireo dia 24 kilao araka ny ventin-danja fampiasa ao amin’ny Toeramasina. '
  - type: usfm
    marker: v
    metadata:
      v: '86'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: 'Zato grama no lanjan’ny lovia kely volamena iray, ka ny lanjan’ny zinga 12 mitambatra dia 1 200 grama araka ny ventin-danja fampiasa ao amin’ny Toeramasina. '
  - type: usfm
    marker: v
    metadata:
      v: '87'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: 'Ireo biby rehetra natao sorona dorana manontolo dia vantotr’ombilahy 12, ondrilahy 12, ondrilahikely 12 izay iray taona avy miaraka amin’ny fanatitra momba azy; osilahy 12 no natao sorona fanalana ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '88'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: Ny biby rehetra natao sorom-pihavanana kosa dia ombilahy 24, ondrilahy 60, osilahy 60, ondrilahikely 60 izay iray taona avy. Ireo no fanomezana natolotra ho fanokanana ny alitara rehefa voahosotra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '89'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '89'
  - type: text
    text: 'Rehefa niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' i Mosesy mba hiresaka amin’ny TOMPO, dia nandre feo niteny taminy avy teo anelanelan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' roa izy, dia teo ambonin’ny rakotry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: ' misy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny fanekempihavanana
  - type: text
    text: ; ary niresahan’ny TOMPO i Mosesy.
