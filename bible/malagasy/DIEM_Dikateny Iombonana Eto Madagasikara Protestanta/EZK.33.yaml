document_id: EZK.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Notendren’Andriamanitra ho mpitily i Ezekiela
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 3.16-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ry ilay taranak’olombelona, mitenena amin’ny Israelita ka lazao azy ny zava-mitranga rehefa manetsika ady hamelezana tany anankiray Aho. Ny mponina amin’io tany io dia hifidy lehilahy iray ao aminy ka hanendry azy ho mpitiliny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha vao mahita ny tafika fahavalo tamy ilay mpitily, dia mitsoka ny anjomara mba hanaitra ny mpiray firenena aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa raha misy olona mandre ny feon’anjomara ihany nefa tsy miraharaha izany fanairana izany, ka tonga ny fahavalo ary mandripaka azy, dia ny tenany ihany no tompon’andraikitra amin’ny fahafatesany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nandre ny feon’anjomara manko izy, saingy tsy niraharaha ny fanairana azy ka dia tompon’andraikitra amin’ny fahafatesany. Fa raha niraharaha fanairana izy, dia ho namonjy ny ainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha tàhiny kosa hitan’ilay mpitily fa tamy ny tafika fahavalo, nefa tsy nitsoka ny anjomara izy, dia tsy nahazo fanairana ireo mpiray firenena aminy. Koa raha tonga ny fahavalo ary nahafaty olona iray, dia an’ny mpitily ny fahadisoana; izy no hotanako ho tompon’andraikitra amin’izany fahafatesana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Ry ilay taranak’olombelona, ianao no efa notendreko ho mpitily hanaitra ny vahoaka Israely. Hihaino ny teny aloaky ny vavako ianao ka hampita ny fampitandremako amin’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Andeha hataontsika hoe misy olon-dratsy iray tiako hilazana fa hahafaty azy tokoa ny afitsony: raha tsy mampitandrina azy ianao hialany amin’ny toe-dratsiny, dia ho fatin’ny heloka vitany tokoa izany olon-dratsy izany, nefa ianao no tazoniko ho tompon’andraikitra amin’ny fahafatesany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha ohatra kosa ka mampitandrina azy ianao mba hialany amin’ny toe-dratsiny saingy izy no tsy nety niova, dia ho fatin’ny heloka vitany tokoa izy, fa ianao kosa hahavonjy ny ainao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho velona ny olon-dratsy miverina amin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Ry ilay taranak’olombelona, mitenena amin’ny Israelita izay milaza hoe: ‹Vesaran’ny fahadisoanay sy ny fahotanay izahay, ka mila ho levona mihitsy. Koa ahoana moa no hahavelomanay?› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ambarao aminy hoe: Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy sitrako ny hahafatesan’ireo olon-dratsy; fa ny tena tadiaviko dia ny hiovany mba hahavelona azy. Koa ialao mihitsy ny toe-dratsinareo, ry Israelita, fa nahoana moa no te ho faty ianareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Ianao, ry ilay taranak’olombelona, lazao amin’ny mpiray firenena aminao koa izao: ‹Raha misy olo-marina iray manao ratsy, ny soa izay nataony taloha dia tsy hahavonjy azy. Raha misy olon-dratsy miala amin’ny faharatsiany, ny ratsy izay nataony taloha dia tsy hahavoa azy. Eny, raha misy olo-marina iray manota, ny soa izay nataony taloha dia tsy hahavelona azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Andeha hataontsika hoe misy olo-marina iray nilazako fa ho velona tokoa izy. Raha tàhiny mitoky amin’ny fahamarinany taloha izy ka manao heloka, dia hohadinoina ny soa rehetra vitany, ka ho fatin’ny heloka nataony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ohatra kosa misy olon-dratsy iray nilazako fa hahafaty azy tokoa ny afitsony. Raha miala amin’ny fahotany izy ka manao ny rariny sy ny hitsiny, dia tsy ho faty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha mamerina ny zavatra natao tsatòka izy sady mampody izay nangalariny, raha tsy manao ratsy intsony fa mankatò ny lalàna izay manome fiainana, dia tsy ho faty izy fa ho velona tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hohadinoina avokoa ny fahotana rehetra nataony ka ho velona tokoa izy, satria manao ny rariny sy ny hitsiny.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Ireo mpiray firenena aminao kosa milaza fa Izaho Tompo dia manao zavatra tsy araka ny tokony ho izy. Tsy ireo ve no manao zavatra tsy araka ny tokony ho izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha misy olo-marina iray miala amin’ny fahamarinany ka manao heloka dia ho fatin’izany izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'raha misy kosa olon-dratsy iray miala amin’ny faharatsiany ka manao ny rariny sy ny hitsiny, dia hahavelona azy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ianareo Israelita milaza fa Izaho Tompo dia manao zavatra tsy araka ny tokony ho izy, dia aoka ho fantatrareo fa araka ny fitondrantenanareo tsirairay avy no hitsarako anareo!»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Simba ny tanin’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tamin’ny taona faha-11 taorian’ny fahababoana, nony andro fahadimin’ny volana fahafolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe Desambra 587-Janoary 586 tal J.K. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'taona faha-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' araka ny stf hebreo sasany sy ny dkt tranainy grika (jereo 2 Mp 25.8-9; Jer 39.2); ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: taona faha-12.
    marker-yv: yv-n
  - type: text
    text: ', dia nisy lehilahy iray afa-nandositra avy tany Jerosalema ary tonga tao amiko ka nanao hoe: «Azom-pahavalo ny tanàna!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ny hariva nialoha ny andro nahatongavan’io lehilahy io, dia nataon’ny TOMPO tsapako ny heriny tamin’ny nanokafany ny vavako ho afa-miteny indray. Koa ny ampitso maraina, nony tonga teo amiko ilay nandositra, dia tsy moana intsony aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsy moana intsony aho: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 3.26; 24.27.
    marker-yv: yv-n
  - type: text
    text: ' fa afaka niteny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '«Ry ilay taranak’olombelona, ireo mponina tavela amin’ireo tanàna rava any an-tanin’i Israely dia nilaza hoe: ‹I Abrahama irery aza nahazo ity tany ity ho fananany, mainka fa isika marobe izao dia homena ity tany ity ho fananantsika›. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Mihinan-kena miaraka amin’ny ra ianareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mihinan-kena miaraka amin’ny ra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny naoty momba ny 4.14 sy Lev 17.12.
    marker-yv: yv-n
  - type: text
    text: ', ary manompo ireo sampinareo sady mamono olona ho faty, koa ahoana no hahazoanareo io tany io ho fanananareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Miantehitra amin’ny sabatrareo ianareo ka manao zavatra maharikoriko, ary samy maka ny vadin’ny namany avy, koa ahoana no hahazoanareo io tany io ho fanananareo?›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Velona Aho ka mianiana fa izay sisa tavela ao amin’ireo tanàna rava dia ho fatin’ny sabatra, izay any an-tsaha dia homeko ho rembin’ny bibidia, ary izay miery any an-tendrombohitra sy any an-dava-bato dia ho fatin’ny areti-mandringana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hataoko rava sy lao ny tany; hitsahatra ny hery izay mampirehareha ny mponina eo aminy; hilaozana ny tendrombohitr’i Israely, ka tsy hisy olona handalo any intsony.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary rehefa hataoko rava sy lao ny tany ho famaizana ny asa maharikoriko nataon’ny Israelita, dia hoeken’ireo fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '«Ry ilay taranak’olombelona, ireo mpiray firenena aminao atỳ am-pahababoana dia miresaka anao eny akaikin’ny mandan’ny tanàna na eny am-baravaran’ny tranony, ka mifampilaza hoe: ‹Andeha hihaino ny hafatra avy any amin’ny TOMPO isika.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia mivory eo aminao ireo olona anisan’ny vahoakako ka mipetraka eo anatrehanao mba hihaino anao. Mihaino ny teninao izy, fa tsy manatanteraka azy. Izay rendrarendra tiany hatao ihany no eo am-bavany; ary ny filan-dratsiny no ironan’ny fony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa aminy ianao dia toy ny mpihira mahafinaritra tsara feo sady arahina mozika mahasondriana. Mihaino ny teninao izy fa tsy manatanteraka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Rehefa ho tonga kosa ny zavatra ambaranao, fa madiva ho avy izany, dia hoeken’ireo fa efa nisy mpaminany tokoa teo aminy.»
