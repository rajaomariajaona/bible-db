document_id: EZK.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Notendren’Andriamanitra ho mpitily i Ezekiela
  - type: heading
    content: (Jereo 3.16-21)
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: '«Ry ilay taranak’olombelona, mitenena amin’ny Israelita izay milaza hoe: ‹Vesaran’ny fahadisoanay sy ny fahotanay izahay, ka mila ho levona mihitsy. Koa ahoana moa no hahavelomanay?› '
  '11':
  - type: text
    content: 'Ambarao aminy hoe: Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy sitrako ny hahafatesan’ireo olon-dratsy; fa ny tena tadiaviko dia ny hiovany mba hahavelona azy. Koa ialao mihitsy ny toe-dratsinareo, ry Israelita, fa nahoana moa no te ho faty ianareo?'
  '12':
  - type: text
    content: '«Ianao, ry ilay taranak’olombelona, lazao amin’ny mpiray firenena aminao koa izao: ‹Raha misy olo-marina iray manao ratsy, ny soa izay nataony taloha dia tsy hahavonjy azy. Raha misy olon-dratsy miala amin’ny faharatsiany, ny ratsy izay nataony taloha dia tsy hahavoa azy. Eny, raha misy olo-marina iray manota, ny soa izay nataony taloha dia tsy hahavelona azy. '
  '13':
  - type: text
    content: 'Andeha hataontsika hoe misy olo-marina iray nilazako fa ho velona tokoa izy. Raha tàhiny mitoky amin’ny fahamarinany taloha izy ka manao heloka, dia hohadinoina ny soa rehetra vitany, ka ho fatin’ny heloka nataony izy. '
  '14':
  - type: text
    content: 'Ohatra kosa misy olon-dratsy iray nilazako fa hahafaty azy tokoa ny afitsony. Raha miala amin’ny fahotany izy ka manao ny rariny sy ny hitsiny, dia tsy ho faty izy. '
  '15':
  - type: text
    content: 'Raha mamerina ny zavatra natao tsatòka izy sady mampody izay nangalariny, raha tsy manao ratsy intsony fa mankatò ny lalàna izay manome fiainana, dia tsy ho faty izy fa ho velona tokoa. '
  '16':
  - type: text
    content: Hohadinoina avokoa ny fahotana rehetra nataony ka ho velona tokoa izy, satria manao ny rariny sy ny hitsiny.›
  '17':
  - type: text
    content: '«Ireo mpiray firenena aminao kosa milaza fa Izaho Tompo dia manao zavatra tsy araka ny tokony ho izy. Tsy ireo ve no manao zavatra tsy araka ny tokony ho izy? '
  '18':
  - type: text
    content: 'Raha misy olo-marina iray miala amin’ny fahamarinany ka manao heloka dia ho fatin’izany izy; '
  '19':
  - type: text
    content: 'raha misy kosa olon-dratsy iray miala amin’ny faharatsiany ka manao ny rariny sy ny hitsiny, dia hahavelona azy izany. '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, mitenena amin’ny Israelita ka lazao azy ny zava-mitranga rehefa manetsika ady hamelezana tany anankiray Aho. Ny mponina amin’io tany io dia hifidy lehilahy iray ao aminy ka hanendry azy ho mpitiliny. '
  '20':
  - type: text
    content: Ianareo Israelita milaza fa Izaho Tompo dia manao zavatra tsy araka ny tokony ho izy, dia aoka ho fantatrareo fa araka ny fitondrantenanareo tsirairay avy no hitsarako anareo!»
  - type: heading
    content: Simba ny tanin’i Israely
  '21':
  - type: text
    content: Tamin’ny taona faha-11 taorian’ny fahababoana, nony andro fahadimin’ny volana fahafolo
  - type: note
    content: 'Izany hoe Desambra 587-Janoary 586 tal J.K. –taona faha-11: araka ny stf hebreo sasany sy ny dkt tranainy grika (jereo 2 Mp 25.8-9; Jer 39.2); ny RM kosa manao hoe taona faha-12.'
  - type: text
    content: ', dia nisy lehilahy iray afa-nandositra avy tany Jerosalema ary tonga tao amiko ka nanao hoe: «Azom-pahavalo ny tanàna!» '
  '22':
  - type: text
    content: Fa ny hariva nialoha ny andro nahatongavan’io lehilahy io, dia nataon’ny TOMPO tsapako ny heriny tamin’ny nanokafany ny vavako ho afa-miteny indray. Koa ny ampitso maraina, nony tonga teo amiko ilay nandositra, dia tsy moana intsony aho
  - type: note
    content: 'Tsy moana intsony aho: jereo 3.26; 24.27.'
  - type: text
    content: ' fa afaka niteny. '
  '23':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '24':
  - type: text
    content: '«Ry ilay taranak’olombelona, ireo mponina tavela amin’ireo tanàna rava any an-tanin’i Israely dia nilaza hoe: ‹I Abrahama irery aza nahazo ity tany ity ho fananany, mainka fa isika marobe izao dia homena ity tany ity ho fananantsika›. '
  '25':
  - type: text
    content: 'Koa ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Mihinan-kena miaraka amin’ny ra ianareo'
  - type: note
    content: 'Mihinan-kena miaraka amin’ny ra: jereo ny naoty momba ny 4.14 sy Lev 17.12.'
  - type: text
    content: ', ary manompo ireo sampinareo sady mamono olona ho faty, koa ahoana no hahazoanareo io tany io ho fanananareo? '
  '26':
  - type: text
    content: Miantehitra amin’ny sabatrareo ianareo ka manao zavatra maharikoriko, ary samy maka ny vadin’ny namany avy, koa ahoana no hahazoanareo io tany io ho fanananareo?›
  '27':
  - type: text
    content: '«Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Velona Aho ka mianiana fa izay sisa tavela ao amin’ireo tanàna rava dia ho fatin’ny sabatra, izay any an-tsaha dia homeko ho rembin’ny bibidia, ary izay miery any an-tendrombohitra sy any an-dava-bato dia ho fatin’ny areti-mandringana. '
  '28':
  - type: text
    content: 'Hataoko rava sy lao ny tany; hitsahatra ny hery izay mampirehareha ny mponina eo aminy; hilaozana ny tendrombohitr’i Israely, ka tsy hisy olona handalo any intsony.› '
  '29':
  - type: text
    content: Ary rehefa hataoko rava sy lao ny tany ho famaizana ny asa maharikoriko nataon’ny Israelita, dia hoeken’ireo fa Izaho no TOMPO.
  '3':
  - type: text
    content: 'Raha vao mahita ny tafika fahavalo tamy ilay mpitily, dia mitsoka ny anjomara mba hanaitra ny mpiray firenena aminy. '
  '30':
  - type: text
    content: '«Ry ilay taranak’olombelona, ireo mpiray firenena aminao atỳ am-pahababoana dia miresaka anao eny akaikin’ny mandan’ny tanàna na eny am-baravaran’ny tranony, ka mifampilaza hoe: ‹Andeha hihaino ny hafatra avy any amin’ny TOMPO isika.› '
  '31':
  - type: text
    content: 'Dia mivory eo aminao ireo olona anisan’ny vahoakako ka mipetraka eo anatrehanao mba hihaino anao. Mihaino ny teninao izy, fa tsy manatanteraka azy. Izay rendrarendra tiany hatao ihany no eo am-bavany; ary ny filan-dratsiny no ironan’ny fony. '
  '32':
  - type: text
    content: 'Koa aminy ianao dia toy ny mpihira mahafinaritra tsara feo sady arahina mozika mahasondriana. Mihaino ny teninao izy fa tsy manatanteraka azy. '
  '33':
  - type: text
    content: Rehefa ho tonga kosa ny zavatra ambaranao, fa madiva ho avy izany, dia hoeken’ireo fa efa nisy mpaminany tokoa teo aminy.»
  '4':
  - type: text
    content: 'Koa raha misy olona mandre ny feon’anjomara ihany nefa tsy miraharaha izany fanairana izany, ka tonga ny fahavalo ary mandripaka azy, dia ny tenany ihany no tompon’andraikitra amin’ny fahafatesany. '
  '5':
  - type: text
    content: 'Nandre ny feon’anjomara manko izy, saingy tsy niraharaha ny fanairana azy ka dia tompon’andraikitra amin’ny fahafatesany. Fa raha niraharaha fanairana izy, dia ho namonjy ny ainy. '
  '6':
  - type: text
    content: Raha tàhiny kosa hitan’ilay mpitily fa tamy ny tafika fahavalo, nefa tsy nitsoka ny anjomara izy, dia tsy nahazo fanairana ireo mpiray firenena aminy. Koa raha tonga ny fahavalo ary nahafaty olona iray, dia an’ny mpitily ny fahadisoana; izy no hotanako ho tompon’andraikitra amin’izany fahafatesana izany.
  '7':
  - type: text
    content: '«Ry ilay taranak’olombelona, ianao no efa notendreko ho mpitily hanaitra ny vahoaka Israely. Hihaino ny teny aloaky ny vavako ianao ka hampita ny fampitandremako amin’ny Israelita. '
  '8':
  - type: text
    content: 'Andeha hataontsika hoe misy olon-dratsy iray tiako hilazana fa hahafaty azy tokoa ny afitsony: raha tsy mampitandrina azy ianao hialany amin’ny toe-dratsiny, dia ho fatin’ny heloka vitany tokoa izany olon-dratsy izany, nefa ianao no tazoniko ho tompon’andraikitra amin’ny fahafatesany. '
  '9':
  - type: text
    content: Raha ohatra kosa ka mampitandrina azy ianao mba hialany amin’ny toe-dratsiny saingy izy no tsy nety niova, dia ho fatin’ny heloka vitany tokoa izy, fa ianao kosa hahavonjy ny ainao.»
  - type: heading
    content: Ho velona ny olon-dratsy miverina amin’Andriamanitra
