document_id: JDG.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ady famaizana natao tamin’ny Benjaminita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dia niainga ny Israelita rehetra ary tafangona toy ny olona iray izy hatrany Dana ka hatrany Beera-Seba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny fomba fiteny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hatrany Dana ka hatrany Beera-Seba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia manondro ny faritra israelita manontolo (jereo 1 Sam 3.20).'
      marker-yv: yv-n
    - type: text
      text: ' sy hatrany amin’ny faritr’i Gilehada'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1b '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny faritr’i Gilehada '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia nonenan’ny foko gadita sy ny antsasaky ny foko manasita teny atsinanan’i Jôrdàna (jereo Jos 13.24-31).
      marker-yv: yv-n
    - type: text
      text: ' no nivory teo anatrehan’ny TOMPO tao Mitsepà'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1d '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mitsepà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna benjaminita eo amin’ny 13 km ao avaratr’i Jerosalema; tsy tokony hafangaro amin’i Mitsepà any Gilehada (jereo 10.17 sy nta).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Antsapaka no hifidianantsika ny ampahafolon’ny vatan-dehilahy isaky ny fokon’i Israely, izany hoe zato amin’ny arivo, na arivo amin’ny iray alina; ka ireo no hamatsy ny andian-tafika izay handeha hanafay an’i Gibehà tanàna benjaminita, araka ny zava-pady nafitsony teto Israely.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nifanaraka ny Israelita rehetra fa hiray hina toy ny olona iray hamely an’i Gibehà. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa nandefa iraka ho any amin’ny faritanin’i Benjamîna manontolo ny foko tsirairay avy hanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ahoana izao heloka mahatsiravina nitranga teto aminareo izao? '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Atolory anay ny olo-meloka, dia ireo faikan’olona ao Gibehà, mba hovonoinay ho faty ka hataonay tsy hisy eto amin’ny tanin’Israely intsony ny ratsy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kinanjo ny Benjaminita tsy nety nihaino ny feon’ireo Israelita mpiray firenena aminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa tonga avy any amin’ny tanàna samihafa izy ireo ka vory tao Gibehà mba hiady amin’ny Israelita. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tamin’izany andro izany dia natao fanisana ny Benjaminita avy amin’ny tanàna manodidina, ka andiany 26 ny vatan-dehilahy kinga famely sabatra, afa-tsy ireo mponin’i Gibehà izay nanao fanisa-miaramila koa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Io tafika benjaminita manontolo io dia nisy miaramila voafantina fitonjato lahy samy kavia avokoa ary afa-nitoraka singam-bolo tamin’ny antsamotady nefa tsy mivaona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tetsy an-kilany, rehefa natao fanisana kosa ireo vatan-dehilahy tamin’ny Israelita hafa, dia nahitana vata-miaramila nisy andiany efajato samy kinga famely sabatra sady zatra ady avokoa.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia nandeha tany Betela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Betela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 12.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' aloha ny Israelita ka nanontany an’Andriamanitra hahalalana izay foko hiroso voalohany hanafika ny Benjaminita; ka ny fokon’i Joda no voatondron’ny TOMPO. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Niainga vao maraina ny vatan-dehilahy israelita ka nitoby tao akaikin’i Gibehà. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny lehibe rehetra sy ny lehilahy rehetra tao amin’ny fokon’i Israely dia tonga tao amin’io fivorian’ny vahoakan’Andriamanitra io avokoa, izany hoe vatan-dehilahy andiany efajato, samy miaramila an-tongotra sy kinga famely sabatra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary niroso hifanandrina amin’ny Benjaminita izy ka nilahatra hiady teo anoloan’i Gibehà. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nivoaka avy tao an-tanàna kosa ny Benjaminita, ka naharingana Israelita andiany 22 izay niampatrampatra tamin’izany andro izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23
    - type: text
      text: 'Ary nandeha nitomany teo anatrehan’ny TOMPO mandra-paharivan’ny andro ny Israelita sady nanontany AZY na tokony mbola hiady amin’ny Benjaminita mpiray firenena aminy na tsia; ka novalian’ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miakara hiady aminy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifampahery ny Israelita ary nandeha hilahatra hiady teo amin’ny toerana izay efa nilaharany tamin’ny andro voalohany ihany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tamin’ny andro faharoa no nanatona hamely ny Benjaminita indray ny Israelita. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Kinanjo tamin’io andro faharoa io dia nivoaka avy tao Gibehà ny Benjaminita ka nandringana andiany 18 indray tamin’ny vatan-dehilahy israelita, dia lehilahy kinga famely sabatra avokoa. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary nandeha niakatra tany Betela ny Israelita rehetra sy ny tafiny manontolo ka nipetraka nitomany teo anatrehan’ny TOMPO; tamin’izay dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nifady hanina
    - type: text
      text: ' mandra-paharivan’ny andro izy sady nanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorom-pihavanana teo anatrehan’ny TOMPO. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: 'Tamin’izany andro izany moa mbola tao Betela ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina misy ny fanekempihavanan’Andriamanitra
    - type: text
      text: '; ary i Pinehasa, zanakalahin’i Elehazara sady zafikelin’i Aharôna, no mpitandrina azy. Dia nanontany ny TOMPO ireo Israelita na tokony mbola handeha hiady amin’ny Benjaminita mpiray firenena aminy na tsia; ka novalian’ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehàna, fa rahampitso dia hatolotro eo an-tananareo izy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nanafina miaramila manodidina an’i Gibehà ny Israelita. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary ren’ny Benjaminita fa tafakatra ao Mitsepà ny Israelita hafa.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo Israelita ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tantarao aminay izay antony nahatonga izao heloka bevava izao.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary tamin’ny andro fahatelo no niakatra hamely ny Benjaminita ireo Israelita, ka nilahatra hiady teo anoloan’i Gibehà toy ny teo aloha ihany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa nivoaka hiady aminy kosa ny Benjaminita ka voatarika handeha lavitra ny tanàna. Ary toy ny teo aloha dia nanomboka namely ny Israelita izy ka nahafaty tokony ho telopolo lahy teny an-dalana mankany Betela sy mankany Gibehôna. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Tamin’izay dia nihevitra ho naharesy ny Israelita toy ny teo aloha izy; kinanjo nanapa-kevitra ny Israelita fa hanao tari-dositra mba hisarika ny Benjaminita ho any amin’ny lalana mankany an-tsaha ka hanalavitra an’i Gibehà. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia niainga avy tamin’ireo toerana rehetra nisy azy ny Israelita ka nilahatra hiady tao Bahala-Tamara; tamin’izay kosa ny miaramila israelita niafina dia nipoitra avy tao amin’ny fiereny teo andrefan’i Geba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bahala-Tamara: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toerana tsy dia fantatra mazava ny misy azy, kanefa teo akaikin’i Gibehà. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: I Geba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tanàna benjaminita 4 km ao avaratra atsinanan’i Gibehà.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Koa nisy andiany folo ny vatan-dehilahy voafantina, avy amin’i Israely manontolo, no tonga teo anoloan’i Gibehà. Nangotraka ny ady, nefa tsy nampoizin’ny Benjaminita ny fahavoazana hihatra aminy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Nataon’ny TOMPO resy teo anatrehan’ny Israelita ireo Benjaminita, ka nahafatesana vatan-dehilahy miisa andiany 25 miampy 100 lahy tamin’izay andro izay, dia lehilahy kinga famely sabatra avokoa. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Takatry ny Benjaminita tamin’izay fa resy tokoa izy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao tari-dositra ny Israelita, satria niantehitra tamin’ireo miaramila nafeniny manodidina an’i Gibehà. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ireo miaramila niafina ireo dia niroatra haingana nankany Gibehà ka namely ny tanàna manontolo sy nandringana ny mponina tao. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary ny famantarana efa nifanomezany tamin’ny Israelita sisa rehetra dia tsangan’afo lehibe midona-tsetroka avy ao an-tanàna. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Koa rehefa nihemotra an’ady ny Israelita ka nahafatesana tokony ho telopolo lahy, dia nihevitra ho naharesy azy tahaka ny teo aloha ny Benjaminita. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia namaly ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ', vadin-dravehivavy novonoina ho faty, ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Niditra tao Gibehà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gibehà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 19.12 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' tanàna benjaminita ny tenako sy ny vadikeliko mba handry tao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Kinanjo tamin’izay indrindra no nitambolimbolina niakatra ny setroka avy tao Gibehà. Niherika ny Benjaminita ka nahatazana ny afo manaka-danitra avy tao an-tanàna izay nirehitra tanteraka. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Nisampotina namely ny Benjaminita tamin’izay ny Israelita. Nivarahontsana ireto Benjaminita satria hitany ny fahavoazana nihatra taminy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Vaky nandositra teo anoloan’ny vatan-dehilahy israelita izy ary nizotra nankany an-taniefitra; saingy narahin’ny andian-tafika lehibe sy ireo vatan-dehilahy israelita nivoaka avy tao an-tanàna izy ka naringany. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Notemerin’ny Israelita ireo Benjaminita, nenjehiny tsy an-kiato ka nataony matin-kitsaka teny an-dàlana mandra-pahatonga hatrany atsinanan’i Gebà. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Nahafatesana vatan-dehilahy andiany 18 ny Benjaminita tamin’io andro io, dia lehilahy mahery fo avokoa. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ny Benjaminita sisa dia nitodi-doha nandositra nankany an-taniefitra ho any amin’ny harambaton’i Rimôna. Ny andiany dimy tamin’ireo anefa dia maty noraofim-potsiny teny an-dalana, fa ny sisa kosa nenjehina ka ny nokendrena dia ny hahafongana azy; ary mbola nahafatesana andiany roa koa ireo. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ny tontalin’ny Benjaminita maty tamin’izany andro izany dia vatan-dehilahy andiany 25, ka lehilahy kinga famely sabatra sady samy mahery fo avokoa. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Na izany aza, dia nisy eninjato lahy tamin’ireo nitodi-doha nandositra nankany an-taniefitra no afaka nitsoaka ihany ka tonga tao amin’ny harambaton’i Rimôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.47 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Rimôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana 9 km ao avaratra atsinanan’i Gibehà.
      marker-yv: yv-n
    - type: text
      text: ' ary nitoetra tao efa-bolana. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Dia niverina namely ireo Benjaminita hafa ny Israelita ka isan-tanàna no nandringanany tamin’ny lelan-tsabatra ny olona mbamin’ny biby fiompiny; ary ny tanàna rehetra, izay hitany tamin’izany faritany izany, dia nodorany avokoa.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nisy nirongatra hamely ahy ny mponina tao Gibehà ka nanodidina ny trano nitoerako nony alina. Nikasa hamono ahy izy, ary nanolana ny vadikeliko ambara-pahafaty azy. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nalaiko ny fatiny ary norasarasaiko; ka nandefasako toko iray avy isam-poko manerana ny tanin’i Israely, satria zavatra mahatsiravina sy fady tokoa eto Israely no nafitsok’ireo olona tao Gibehà ireo. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Indreto ianareo Israelita rehetra, koa samia miteny ary maka fanapahan-kevitra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nitsangana toy ny olona iray ihany ny vahoaka rehetra ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy hisy olona hiverina any an-dainy na hody any an-tranony isika. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izao no zavatra hataontsika momba an’i Gibehà. '
