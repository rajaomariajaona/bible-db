document_id: JDG.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ady famaizana natao tamin’ny Benjaminita
  - type: text
    content: Dia niainga ny Israelita rehetra ary tafangona toy ny olona iray izy hatrany Dana ka hatrany Beera-Seba
  - type: note
    content: Ny fomba fiteny hoe hatrany Dana ka hatrany Beera-Seba dia manondro ny faritra israelita manontolo (jereo 1 Sam 3.20).
  - type: text
    content: ' sy hatrany amin’ny faritr’i Gilehada'
  - type: note
    content: Ny faritr’i Gilehada dia nonenan’ny foko gadita sy ny antsasaky ny foko manasita teny atsinanan’i Jôrdàna (jereo Jos 13.24-31).
  - type: text
    content: ' no nivory teo anatrehan’ny TOMPO tao Mitsepà'
  - type: note
    content: 'Mitsepà: tanàna benjaminita eo amin’ny 13 km ao avaratr’i Jerosalema; tsy tokony hafangaro amin’i Mitsepà any Gilehada (jereo 10.17 sy nta).'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Antsapaka no hifidianantsika ny ampahafolon’ny vatan-dehilahy isaky ny fokon’i Israely, izany hoe zato amin’ny arivo, na arivo amin’ny iray alina; ka ireo no hamatsy ny andian-tafika izay handeha hanafay an’i Gibehà tanàna benjaminita, araka ny zava-pady nafitsony teto Israely.
  '11':
  - type: text
    content: 'Dia nifanaraka ny Israelita rehetra fa hiray hina toy ny olona iray hamely an’i Gibehà. '
  '12':
  - type: text
    content: 'Koa nandefa iraka ho any amin’ny faritanin’i Benjamîna manontolo ny foko tsirairay avy hanao hoe:'
  - type: text
    content: '–Ahoana izao heloka mahatsiravina nitranga teto aminareo izao? '
  '13':
  - type: text
    content: Atolory anay ny olo-meloka, dia ireo faikan’olona ao Gibehà, mba hovonoinay ho faty ka hataonay tsy hisy eto amin’ny tanin’Israely intsony ny ratsy.
  - type: text
    content: 'Kinanjo ny Benjaminita tsy nety nihaino ny feon’ireo Israelita mpiray firenena aminy. '
  '14':
  - type: text
    content: 'Fa tonga avy any amin’ny tanàna samihafa izy ireo ka vory tao Gibehà mba hiady amin’ny Israelita. '
  '15':
  - type: text
    content: 'Tamin’izany andro izany dia natao fanisana ny Benjaminita avy amin’ny tanàna manodidina, ka andiany 26 ny vatan-dehilahy kinga famely sabatra, afa-tsy ireo mponin’i Gibehà izay nanao fanisa-miaramila koa. '
  '16':
  - type: text
    content: 'Io tafika benjaminita manontolo io dia nisy miaramila voafantina fitonjato lahy samy kavia avokoa ary afa-nitoraka singam-bolo tamin’ny antsamotady nefa tsy mivaona. '
  '17':
  - type: text
    content: Tetsy an-kilany, rehefa natao fanisana kosa ireo vatan-dehilahy tamin’ny Israelita hafa, dia nahitana vata-miaramila nisy andiany efajato samy kinga famely sabatra sady zatra ady avokoa.
  '18':
  - type: text
    content: Dia nandeha tany Betela
  - type: note
    content: 'Betela: jereo Gen 12.8 sy nta.'
  - type: text
    content: ' aloha ny Israelita ka nanontany an’Andriamanitra hahalalana izay foko hiroso voalohany hanafika ny Benjaminita; ka ny fokon’i Joda no voatondron’ny TOMPO. '
  '19':
  - type: text
    content: 'Niainga vao maraina ny vatan-dehilahy israelita ka nitoby tao akaikin’i Gibehà. '
  '2':
  - type: text
    content: 'Ny lehibe rehetra sy ny lehilahy rehetra tao amin’ny fokon’i Israely dia tonga tao amin’io fivorian’ny vahoakan’Andriamanitra io avokoa, izany hoe vatan-dehilahy andiany efajato, samy miaramila an-tongotra sy kinga famely sabatra. '
  '20':
  - type: text
    content: 'Ary niroso hifanandrina amin’ny Benjaminita izy ka nilahatra hiady teo anoloan’i Gibehà. '
  '21':
  - type: text
    content: 'Nivoaka avy tao an-tanàna kosa ny Benjaminita, ka naharingana Israelita andiany 22 izay niampatrampatra tamin’izany andro izany. '
  '22':
  - type: text
    content: 'Ary nandeha nitomany teo anatrehan’ny TOMPO mandra-paharivan’ny andro ny Israelita sady nanontany AZY na tokony mbola hiady amin’ny Benjaminita mpiray firenena aminy na tsia; ka novalian’ny TOMPO hoe:'
  - type: text
    content: –Miakara hiady aminy.
  - type: text
    content: 'Dia nifampahery ny Israelita ary nandeha hilahatra hiady teo amin’ny toerana izay efa nilaharany tamin’ny andro voalohany ihany. '
  '24':
  - type: text
    content: 'Tamin’ny andro faharoa no nanatona hamely ny Benjaminita indray ny Israelita. '
  '25':
  - type: text
    content: 'Kinanjo tamin’io andro faharoa io dia nivoaka avy tao Gibehà ny Benjaminita ka nandringana andiany 18 indray tamin’ny vatan-dehilahy israelita, dia lehilahy kinga famely sabatra avokoa. '
  '26':
  - type: text
    content: 'Ary nandeha niakatra tany Betela ny Israelita rehetra sy ny tafiny manontolo ka nipetraka nitomany teo anatrehan’ny TOMPO; tamin’izay dia '
  - type: text
    content: nifady hanina
  - type: text
    content: ' mandra-paharivan’ny andro izy sady nanao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana teo anatrehan’ny TOMPO. '
  '27':
  - type: text
    content: 'Tamin’izany andro izany moa mbola tao Betela ny '
  - type: text
    content: Vatamasina misy ny fanekempihavanan’Andriamanitra
  - type: text
    content: '; ary i Pinehasa, zanakalahin’i Elehazara sady zafikelin’i Aharôna, no mpitandrina azy. Dia nanontany ny TOMPO ireo Israelita na tokony mbola handeha hiady amin’ny Benjaminita mpiray firenena aminy na tsia; ka novalian’ny TOMPO hoe:'
  - type: text
    content: –Mandehàna, fa rahampitso dia hatolotro eo an-tananareo izy.
  '29':
  - type: text
    content: 'Dia nanafina miaramila manodidina an’i Gibehà ny Israelita. '
  '3':
  - type: text
    content: Ary ren’ny Benjaminita fa tafakatra ao Mitsepà ny Israelita hafa.
  - type: text
    content: 'Dia hoy ireo Israelita ireo hoe:'
  - type: text
    content: –Tantarao aminay izay antony nahatonga izao heloka bevava izao.
  '30':
  - type: text
    content: 'Ary tamin’ny andro fahatelo no niakatra hamely ny Benjaminita ireo Israelita, ka nilahatra hiady teo anoloan’i Gibehà toy ny teo aloha ihany. '
  '31':
  - type: text
    content: 'Fa nivoaka hiady aminy kosa ny Benjaminita ka voatarika handeha lavitra ny tanàna. Ary toy ny teo aloha dia nanomboka namely ny Israelita izy ka nahafaty tokony ho telopolo lahy teny an-dalana mankany Betela sy mankany Gibehôna. '
  '32':
  - type: text
    content: 'Tamin’izay dia nihevitra ho naharesy ny Israelita toy ny teo aloha izy; kinanjo nanapa-kevitra ny Israelita fa hanao tari-dositra mba hisarika ny Benjaminita ho any amin’ny lalana mankany an-tsaha ka hanalavitra an’i Gibehà. '
  '33':
  - type: text
    content: Dia niainga avy tamin’ireo toerana rehetra nisy azy ny Israelita ka nilahatra hiady tao Bahala-Tamara; tamin’izay kosa ny miaramila israelita niafina dia nipoitra avy tao amin’ny fiereny teo andrefan’i Geba
  - type: note
    content: 'Bahala-Tamara: toerana tsy dia fantatra mazava ny misy azy, kanefa teo akaikin’i Gibehà. I Geba dia tanàna benjaminita 4 km ao avaratra atsinanan’i Gibehà.'
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Koa nisy andiany folo ny vatan-dehilahy voafantina, avy amin’i Israely manontolo, no tonga teo anoloan’i Gibehà. Nangotraka ny ady, nefa tsy nampoizin’ny Benjaminita ny fahavoazana hihatra aminy. '
  '35':
  - type: text
    content: 'Nataon’ny TOMPO resy teo anatrehan’ny Israelita ireo Benjaminita, ka nahafatesana vatan-dehilahy miisa andiany 25 miampy 100 lahy tamin’izay andro izay, dia lehilahy kinga famely sabatra avokoa. '
  '36':
  - type: text
    content: Takatry ny Benjaminita tamin’izay fa resy tokoa izy.
  - type: text
    content: 'Nanao tari-dositra ny Israelita, satria niantehitra tamin’ireo miaramila nafeniny manodidina an’i Gibehà. '
  '37':
  - type: text
    content: 'Ireo miaramila niafina ireo dia niroatra haingana nankany Gibehà ka namely ny tanàna manontolo sy nandringana ny mponina tao. '
  '38':
  - type: text
    content: 'Ary ny famantarana efa nifanomezany tamin’ny Israelita sisa rehetra dia tsangan’afo lehibe midona-tsetroka avy ao an-tanàna. '
  '39':
  - type: text
    content: 'Koa rehefa nihemotra an’ady ny Israelita ka nahafatesana tokony ho telopolo lahy, dia nihevitra ho naharesy azy tahaka ny teo aloha ny Benjaminita. '
  '4':
  - type: text
    content: 'Dia namaly ilay '
  - type: text
    content: levita
  - type: text
    content: ', vadin-dravehivavy novonoina ho faty, ka nanao hoe:'
  - type: text
    content: –Niditra tao Gibehà
  - type: note
    content: 'Gibehà: jereo 19.12 sy nta.'
  - type: text
    content: ' tanàna benjaminita ny tenako sy ny vadikeliko mba handry tao. '
  '40':
  - type: text
    content: 'Kinanjo tamin’izay indrindra no nitambolimbolina niakatra ny setroka avy tao Gibehà. Niherika ny Benjaminita ka nahatazana ny afo manaka-danitra avy tao an-tanàna izay nirehitra tanteraka. '
  '41':
  - type: text
    content: 'Nisampotina namely ny Benjaminita tamin’izay ny Israelita. Nivarahontsana ireto Benjaminita satria hitany ny fahavoazana nihatra taminy. '
  '42':
  - type: text
    content: 'Vaky nandositra teo anoloan’ny vatan-dehilahy israelita izy ary nizotra nankany an-taniefitra; saingy narahin’ny andian-tafika lehibe sy ireo vatan-dehilahy israelita nivoaka avy tao an-tanàna izy ka naringany. '
  '43':
  - type: text
    content: 'Notemerin’ny Israelita ireo Benjaminita, nenjehiny tsy an-kiato ka nataony matin-kitsaka teny an-dàlana mandra-pahatonga hatrany atsinanan’i Gebà. '
  '44':
  - type: text
    content: 'Nahafatesana vatan-dehilahy andiany 18 ny Benjaminita tamin’io andro io, dia lehilahy mahery fo avokoa. '
  '45':
  - type: text
    content: 'Ny Benjaminita sisa dia nitodi-doha nandositra nankany an-taniefitra ho any amin’ny harambaton’i Rimôna. Ny andiany dimy tamin’ireo anefa dia maty noraofim-potsiny teny an-dalana, fa ny sisa kosa nenjehina ka ny nokendrena dia ny hahafongana azy; ary mbola nahafatesana andiany roa koa ireo. '
  '46':
  - type: text
    content: 'Ny tontalin’ny Benjaminita maty tamin’izany andro izany dia vatan-dehilahy andiany 25, ka lehilahy kinga famely sabatra sady samy mahery fo avokoa. '
  '47':
  - type: text
    content: Na izany aza, dia nisy eninjato lahy tamin’ireo nitodi-doha nandositra nankany an-taniefitra no afaka nitsoaka ihany ka tonga tao amin’ny harambaton’i Rimôna
  - type: note
    content: 'Rimôna: toerana 9 km ao avaratra atsinanan’i Gibehà.'
  - type: text
    content: ' ary nitoetra tao efa-bolana. '
  '48':
  - type: text
    content: Dia niverina namely ireo Benjaminita hafa ny Israelita ka isan-tanàna no nandringanany tamin’ny lelan-tsabatra ny olona mbamin’ny biby fiompiny; ary ny tanàna rehetra, izay hitany tamin’izany faritany izany, dia nodorany avokoa.
  '5':
  - type: text
    content: 'Dia nisy nirongatra hamely ahy ny mponina tao Gibehà ka nanodidina ny trano nitoerako nony alina. Nikasa hamono ahy izy, ary nanolana ny vadikeliko ambara-pahafaty azy. '
  '6':
  - type: text
    content: 'Dia nalaiko ny fatiny ary norasarasaiko; ka nandefasako toko iray avy isam-poko manerana ny tanin’i Israely, satria zavatra mahatsiravina sy fady tokoa eto Israely no nafitsok’ireo olona tao Gibehà ireo. '
  '7':
  - type: text
    content: Indreto ianareo Israelita rehetra, koa samia miteny ary maka fanapahan-kevitra.
  '8':
  - type: text
    content: 'Dia nitsangana toy ny olona iray ihany ny vahoaka rehetra ka nanao hoe:'
  - type: text
    content: '–Tsy hisy olona hiverina any an-dainy na hody any an-tranony isika. '
  '9':
  - type: text
    content: 'Izao no zavatra hataontsika momba an’i Gibehà. '
