document_id: GEN.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: ABRAHAMA
  - type: heading
    content: Ny antson’Andriamanitra tamin’i Abrama
  - type: text
    content: 'Hoy ny TOMPO tamin’i Abrama:'
  - type: text
    content: –Mialà amin’ny taninao sy ny fianakavianao ary ny tranon-drainao ka mankanesa any amin’ny tany izay hasehoko anao
  - type: note
    content: Ampit Asa 7.2-3; Heb 11.8.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ary nisy mosary tao amin’ny tany; ka rehefa nihamafy izany, dia nidina tany Ejipta ry i Abrama. '
  '11':
  - type: text
    content: 'Ary nony efa akaiky ho tonga tany Ejipta ry zareo, dia hoy i Abrama tamin’i Saray vadiny:'
  - type: text
    content: '–Etsy ange, fantatro fa vehivavy tsara tarehy ianao. '
  '12':
  - type: text
    content: 'Koa raha vao mahita anao ny Ejiptianina, dia hanao hoe «io no vadiny»; dia hovonoiny aho, fa ianao kosa hovelominy. '
  '13':
  - type: text
    content: Koa aoka holazainao amin’ireo fa anabaviko ianao
  - type: note
    content: Jereo Gen 20.2-12; 26.7.
  - type: text
    content: ' mba horaisiny tsara aho noho ny aminao, ary hovelominy noho ny aminao!'
  '14':
  - type: text
    content: 'Nony tonga tany Ejipta i Abrama, dia hitan’ireo Ejiptianina fa tena tsara tarehy tokoa ravehivavy. '
  '15':
  - type: text
    content: 'Nahita azy ny manamboninahitry ny '
  - type: text
    content: Farao
  - type: text
    content: ' ka lasa nidera azy tany amin’ny Farao; koa nampanalaina ho any an-dapan’ny Farao ilay ramatoa. '
  '16':
  - type: text
    content: 'Noho ny aminy dia nasian’ny Farao soa i Abrama ka nomeny ondry aman’osy sy omby, mpanompo lahy sy vavy mbamin’ny boriky sy rameva. '
  '17':
  - type: text
    content: 'Fa ny TOMPO namely loza goavana ny Farao sy ny ankohonany noho ny amin’i Saray, vadin’i Abrama. '
  '18':
  - type: text
    content: 'Dia nampiantso an’i Abrama ny Farao ka nanao taminy hoe:'
  - type: text
    content: '–Inona ity nataonao tamiko? Nahoana no tsy nambaranao tamiko fa vadinao izy? '
  '19':
  - type: text
    content: Nahoana moa no nolazainao fa anabavinao izy, ka dia nalaiko ho vadiko? Izao ankehitriny izao, iny raiso ny vadinao ka mandehana!
  '2':
  - type: text
    content: 'Hataoko firenena lehibe ianao; hitahy anao Aho ka hampahalaza ny anaranao. Hanjary '
  - type: text
    content: fitahiana
  - type: text
    content: ' ho an’ny hafa ianao. '
  '20':
  - type: text
    content: Nobaikoin’ny Farao ireo mpanompony mba handefa an’i Abrama sy ny vadiny mbamin’ny fananany rehetra.
  '3':
  - type: text
    content: Hotahîko izay mitahy anao, fa hozoniko kosa izay manozona anao. Amin’ny alalanao no hitahiana ny firenena rehetra eran-tany
  - type: note
    content: 'ny firenena rehetra eran-tany: ampit 18.18; 22.18; 26.4; 28.14; Asa 3.25; Gal 3.8-9. –Dkt hafa Ao amin’ny firenena rehetra ambonin’ny tany no hilazana hoe: Hotahîn’Andriamanitra anie ianareo, tahaka ny nitahiany an’i Abrahama.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Dia nandeha araka izay nolazain’ny TOMPO taminy i Abrama, ary niaraka taminy koa i Lôta. Tokony ho 75 taona i Abrama fony izy niala tany Haràna. '
  '5':
  - type: text
    content: Nalain’i Abrama i Saray vadiny sy i Lôta zana-drahalahiny, ary nentiny ny harena rehetra voaangony mbamin’ireo mpanompo rehetra novidîny tao Haràna. Dia niainga izy ka nankany amin’ny tany Kanahàna.
  - type: heading
    content: I Abrama tao Kanahàna, avy eo tany Ejipta
  - type: text
    content: 'Dia tonga tany Kanahàna ry i Abrama mianakavy. '
  '6':
  - type: text
    content: Ary i Abrama namakivaky ny tany hatrany amin’ny hazo ôakan’i Môre, any Sekema. Ny Kanahanita no nipetraka tamin’iny faritra iny tamin’izany.
  '7':
  - type: text
    content: 'Niseho tamin’i Abrama ny TOMPO ka niteny taminy hoe: «Homeko ny taranakao ity tany ity.» Dia nanorina '
  - type: text
    content: alitara
  - type: text
    content: ' ho an’ny TOMPO i Abrama teo amin’io toerana izay nisehoan’ny TOMPO taminy io. '
  '8':
  - type: text
    content: Avy eo izy dia niainga ho any amin’ny faritra be havoana any atsinanan’i Betela, ary nanorina ny lainy teo anelanelan’i Betela tao andrefana sy i Hay tao atsinanana
  - type: note
    content: Betela (Tranon’Andriamanitra) sy i Hay (fahasimbana) dia tanàna roa tokony ho 15 km any avaratr’i Jerosalema.
  - type: text
    content: '. Nanorina alitara iray ho an’ny TOMPO teo koa izy ka nivavaka sady niantso an’Andriamanitra hoe TOMPO. '
  '9':
  - type: text
    content: Dia nandeha i Abrama ka nifindrafindra toby nihazo ny faritra atsimo.
