document_id: GEN.12
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: ABRAHAMA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny antson’Andriamanitra tamin’i Abrama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Abrama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mialà amin’ny taninao sy ny fianakavianao ary ny tranon-drainao ka mankanesa any amin’ny tany izay hasehoko anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 7.2-3; Heb 11.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hataoko firenena lehibe ianao; hitahy anao Aho ka hampahalaza ny anaranao. Hanjary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitahiana
  - type: text
    text: ' ho an’ny hafa ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hotahîko izay mitahy anao, fa hozoniko kosa izay manozona anao. Amin’ny alalanao no hitahiana ny firenena rehetra eran-tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny firenena rehetra eran-tany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ampit 18.18; 22.18; 26.4; 28.14; Asa 3.25; Gal 3.8-9. –Dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ao amin’ny firenena rehetra ambonin’ny tany no hilazana hoe: Hotahîn’Andriamanitra anie ianareo, tahaka ny nitahiany an’i Abrahama.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandeha araka izay nolazain’ny TOMPO taminy i Abrama, ary niaraka taminy koa i Lôta. Tokony ho 75 taona i Abrama fony izy niala tany Haràna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nalain’i Abrama i Saray vadiny sy i Lôta zana-drahalahiny, ary nentiny ny harena rehetra voaangony mbamin’ireo mpanompo rehetra novidîny tao Haràna. Dia niainga izy ka nankany amin’ny tany Kanahàna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Abrama tao Kanahàna, avy eo tany Ejipta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia tonga tany Kanahàna ry i Abrama mianakavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary i Abrama namakivaky ny tany hatrany amin’ny hazo ôakan’i Môre, any Sekema. Ny Kanahanita no nipetraka tamin’iny faritra iny tamin’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Niseho tamin’i Abrama ny TOMPO ka niteny taminy hoe: «Homeko ny taranakao ity tany ity.» Dia nanorina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ho an’ny TOMPO i Abrama teo amin’io toerana izay nisehoan’ny TOMPO taminy io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avy eo izy dia niainga ho any amin’ny faritra be havoana any atsinanan’i Betela, ary nanorina ny lainy teo anelanelan’i Betela tao andrefana sy i Hay tao atsinanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Betela '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Tranon’Andriamanitra) sy i '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (fahasimbana) dia tanàna roa tokony ho 15 km any avaratr’i Jerosalema.'
    marker-yv: yv-n
  - type: text
    text: '. Nanorina alitara iray ho an’ny TOMPO teo koa izy ka nivavaka sady niantso an’Andriamanitra hoe TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nandeha i Abrama ka nifindrafindra toby nihazo ny faritra atsimo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nisy mosary tao amin’ny tany; ka rehefa nihamafy izany, dia nidina tany Ejipta ry i Abrama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony efa akaiky ho tonga tany Ejipta ry zareo, dia hoy i Abrama tamin’i Saray vadiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Etsy ange, fantatro fa vehivavy tsara tarehy ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa raha vao mahita anao ny Ejiptianina, dia hanao hoe «io no vadiny»; dia hovonoiny aho, fa ianao kosa hovelominy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa aoka holazainao amin’ireo fa anabaviko ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 20.2-12; 26.7.
    marker-yv: yv-n
  - type: text
    text: ' mba horaisiny tsara aho noho ny aminao, ary hovelominy noho ny aminao!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony tonga tany Ejipta i Abrama, dia hitan’ireo Ejiptianina fa tena tsara tarehy tokoa ravehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nahita azy ny manamboninahitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' ka lasa nidera azy tany amin’ny Farao; koa nampanalaina ho any an-dapan’ny Farao ilay ramatoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Noho ny aminy dia nasian’ny Farao soa i Abrama ka nomeny ondry aman’osy sy omby, mpanompo lahy sy vavy mbamin’ny boriky sy rameva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny TOMPO namely loza goavana ny Farao sy ny ankohonany noho ny amin’i Saray, vadin’i Abrama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nampiantso an’i Abrama ny Farao ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona ity nataonao tamiko? Nahoana no tsy nambaranao tamiko fa vadinao izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nahoana moa no nolazainao fa anabavinao izy, ka dia nalaiko ho vadiko? Izao ankehitriny izao, iny raiso ny vadinao ka mandehana!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nobaikoin’ny Farao ireo mpanompony mba handefa an’i Abrama sy ny vadiny mbamin’ny fananany rehetra.
