document_id: 1KI.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namangian’ny mpanjakavavin’i Sabà an’i Salômôna
  - type: heading
    content: (Jereo 2 Tan 9.1-12)
  - type: text
    content: Ny mpanjakavavin’i Sebà
  - type: note
    content: 'Sebà: faritra any atsimon’ny tany saikanosin’i Arabia, mifandraidraika amin’i Iemenina ankehitriny.'
  - type: text
    content: ' dia nahare ny laza nananan’i Salômôna noho ny anaran’ny TOMPO, ka avy hitsapa azy tamin’ny fanontaniana sarotra. '
  '10':
  - type: text
    content: Dia nomen’ilay mpanjakavavy volamena telo taonina sy sasany ary koa zava-manitra sesehena sy vatosoa ny mpanjaka; tsy nisy na ovina na oviana haben-java-manitra tonga tao Israely tahaka izay nomen’ny mpanjakavavin’i Sebà ho an’i Salômôna.
  '11':
  - type: text
    content: Ny sambon’i Hirama, izay naka volamena avy tany Ôfira, dia nitondra hazo sarobidy betsaka
  - type: note
    content: Momba an’i Hirama mpanjaka, jereo 5.15.26.
  - type: text
    content: ' tokoa sy vatosoa. '
  '12':
  - type: text
    content: Ny hazo sarobidy dia nataon’ny mpanjaka arofanina tao amin’ny tranon’ny TOMPO
  - type: note
    content: Ny teny hebreo dia milaza zavatra azo ianteherana.
  - type: text
    content: ' sy ny lapan’andriamanjaka ary koa nanamboarany lokanga sy valiha ho an’ny mpihira; ka tsy nisy hazo sarobidy tonga na hita toy izany intsony tany Israely mandraka ankehitriny.'
  '13':
  - type: text
    content: Tetsy an-danin’izany kosa dia nomen’i Salômôna mpanjaka ny mpanjakavavin’i Sebà avokoa izay rehetra niriny sy nangatahiny, ankoatra izay natolony azy araka ny fahalalahan-tanan’i Salômôna mpanjaka. Avy eo ilay mpanjakavavy sy ireo mpanompony dia niverina nody tany amin’ny taniny.
  - type: heading
    content: Filazalazana ireo haremben’i Salômôna
  - type: heading
    content: (Jereo 2 Tan 1.14-17; 9.13-28)
  '14':
  - type: text
    content: 'Ny lanjam-bolamena tonga tao amin’i Salômôna, tanatin’ny taona iray monja, dia nahatratra roapolo taonina, '
  '15':
  - type: text
    content: ankoatra ny haba nalainy tamin’ny mpandranto sy ny mpivarotra ary ny hetra naloan’ny mpanjaka vahiny
  - type: note
    content: 'Ny haba: araka ny dkt tranainy; ny hebreo dia ny olona (=’anshê, nefa tokony ho hanshê no mitombina kokoa). –vahiny: ny rijan-teny ao amin’ny 2 Tan 9.14 sy ny dkt tranainy sasany dia milaza ireo mpanjakan’i Arabia.'
  - type: text
    content: na voaangon’ireo governoran’ny tany.
  '16':
  - type: text
    content: 'Nampamboatra ampingabe roanjato tamina metaly miharo volamena i Salômôna mpanjaka; ka lanjam-bolamena enina kilao avy no nilaina isan’ampinga. '
  '17':
  - type: text
    content: Dia nampamboatra ampingakely telonjato tamina metaly miharo volamena koa izy; ka lanjam-bolamena iray kilao sy sasany avy no nilaina isan’ampinga. Ary napetraky ny mpanjaka tao amin’ilay trano antsoina hoe «Alan’i Libano» ireo.
  '18':
  - type: text
    content: 'Dia nampamboatra sezafiandrianana lehibe koa izy, dia sezafiandrianana izay voaravaka ivoara sady nopetahana takela-bolamena madio. '
  '19':
  - type: text
    content: 'Nisy zanatohatra enina tamin’io sezafiandrianana io; miendrika faribolana ny fiankinana teo aminy ary nisy fitehenan-tanana teo an-daniny roa amin’ny fipetrahana. Nisy sarin-diona iray avy teo an-kilan’ny fitehenan-tanana; '
  '2':
  - type: text
    content: 'Dia tonga tany Jerosalema izy sy ny mpanaraka azy marobe, ny rameva izay nivesatra zava-manitra sy volamena sesehena ary vatosoa. Rehefa mby tao amin’i Salômôna ity mpanjakavavy, dia nilaza taminy izay rehetra tao am-pony. '
  '20':
  - type: text
    content: ary sarin-diona enina avy no teo an-daniny roa amin’ny zanatohatra enina. Tsy nisy natao tahaka izany mihitsy tany amin’ny fanjakana hafa rehetra.
  '21':
  - type: text
    content: 'Volamena avokoa ny tsatokaty fisotroan’i Salômôna mpanjaka; ary volamena tsara avokoa ny kojakoja rehetra tao amin’ilay trano antsoina hoe «Alan’i Libano». Tsy nisy vita volafotsy ireo, satria noheverina ho tsy dia sarobidy loatra izany tamin’ny andron’i Salômôna. '
  '22':
  - type: text
    content: Ny mpanjaka manko dia nanana sambo vaventy izay nitety ranomasina niaraka tamin’ny sambon’i Hirama; ary indray mandeha isan-telo taona ireo sambo vaventy ireo no tonga mitondra volamena sy volafotsy amana ivoara ary koa rajako sy vorombola.
  '23':
  - type: text
    content: 'I Salômôna mpanjaka dia nihoatra noho ny mpanjaka hafa rehetra tambonin’ny tany tamin’ny harena sy ny fahendrena. '
  '24':
  - type: text
    content: 'Olona avy amin’ny tany tontolo no nitady hahita an’i Salômôna mba hihaino ny fahendrena izay nataon’Andriamanitra tao am-pony. '
  '25':
  - type: text
    content: Ka isan-taona dia samy tonga nitondra fanomezana avy izy rehetra, dia kojakoja volafotsy sy volamena ary koa fitafiana sy fiadiana mbamin’ny zava-manitra sy soavaly na boriky.
  '26':
  - type: text
    content: Nanangona kalesy fitondra miady sy mpitaingin-tsoavaly i Salômôna ka nanana kalesy 1 400 sy mpitaingin-tsoavaly 12 000 izay nisy natobiny tamin’ireo tanàna fitoeran-kalesy ary nisy notanany teo aminy tao Jerosalema
  - type: note
    content: Jereo 5.6 sy nta.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Toy ny hamaroan’ny vatokely no nataon’ny mpanjaka habetsaky ny volafotsy tao Jerosalema; ary toy ny hamaroan’ny aviavy any amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ' no nataony habetsaky ny hazo sedera. '
  '28':
  - type: text
    content: Ny soavalin’i Salômôna dia avy tany Ejipta
  - type: note
    content: 'Ejipta (hebreo =Mitsiraîma): mety tsy ho io tany ikorianan’ny ony Neily io no ambara eto, fa i Motsirỳ izay faritra any Mezôpôtamia ambony; kanefa ampit Deot 17.16.'
  - type: text
    content: ' sy Silisia; ny mpandranton’ny mpanjaka no nividy azy tany. '
  '29':
  - type: text
    content: Ny kalesy fitondra miady anankiray avy tany Ejipta dia nitentina sekela volafotsy eninjato, ary ny soavaly anankiray kosa dia sekela volafotsy 150; toy izany vidiny izany koa no nitondran’ireo mpandranto ireo ho an’ny mpanjakan’ny Hetita sy ho an’ny mpanjakan’i Siria.
  '3':
  - type: text
    content: 'Voavalin’i Salômôna avokoa ny fanontaniana rehetra nataony, ka tsy nisy zavatra niafina tamin’ny mpanjaka ireny fa nanomezany valinteny avokoa. '
  '4':
  - type: text
    content: 'Ary rehefa samy hitan’ny mpanjakavavin’i Sebà ny fahendren’i Salômôna sy ny trano naoriny, '
  '5':
  - type: text
    content: 'ny sakafo teo amin’ny latabany ary ny toeram-ponenan’ireo tandapany, ny fitafian’ny mpandroso sakafo sy mpitondra divay ary koa ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo natolony tao an-tranon’ny TOMPO, dia talanjona aoka izany izy '
  '6':
  - type: text
    content: 'ka nilaza tamin’ny mpanjaka hoe:'
  - type: text
    content: '–Marina avokoa izay resaka reko tany amin’ny taniko momba ny teninao sy ny fahendrenao. '
  '7':
  - type: text
    content: 'Nefa tsy nino ny filàzan’olona aho, raha tsy tonga sy atỳ, ka ny masoko no mahita. Hay na dia ny antsasany aza tsy voambara tamiko akory. Fa mihoatra lavitra noho ny laza efa reko ny fahendrena sy ny fahamendrehana izay anananao. '
  '8':
  - type: text
    content: 'Sambatra ireo olonao sy ireo tandapanao, satria eo anatrehanao mandrakariva ka mandre ny fahendrenao. '
  '9':
  - type: text
    content: Hisaorana anie ny TOMPO Andriamanitrao fa sitrany napetraka eo amin’ny sezafiandrianan’i Israely ianao; noho ny fitiavany mandrakizay an’i Israely manko no nanaovan’ny TOMPO anao ho mpanjaka mba hampihatra ny rariny sy ny fahamarinana
  - type: note
    content: 'And 1-9: jereo Mt 12.42; Lk 11.31.'
  - type: text
    content: .
