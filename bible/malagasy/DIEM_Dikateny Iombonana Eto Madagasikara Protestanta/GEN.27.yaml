document_id: GEN.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Voasongona i Hesao
  - type: text
    content: 'Efa antitra i Itsehàka ary efa pahina ny masony ka tsy nahita tsara intsony. Dia niantso an’i Hesao zanany lahimatoa izy ka nanao taminy hoe:'
  - type: text
    content: –Ry Hesao a!
  - type: text
    content: 'Ary hoy ny navaliny azy:'
  - type: text
    content: –Inty aho!
  - type: text
    content: 'Dia hoy i Itsehàka hoe:'
  '10':
  - type: text
    content: Hoentinao any amin-drainao izany hohaniny ka hanomezany tsodrano anao alohan’ny hahafatesany.
  '11':
  - type: text
    content: 'Fa hoy i Jakôba tamin’ny reniny:'
  - type: text
    content: '–I Hesao rahalahiko dia voloina, fa izaho kosa malama hoditra. '
  '12':
  - type: text
    content: Koa raha mitsapa ahy ny raiko, dia ho fantany fa mamitaka azy aho; ka hahatonga ozona amiko fa tsy tsodrano izany.
  '13':
  - type: text
    content: 'Namaly azy kosa ny reniny hoe:'
  - type: text
    content: –Aoka ho ahy ny ozona, anaka; fa araho ny teniko ka mandehana akao ireo zanak’osy ireo aho.
  '14':
  - type: text
    content: 'Dia nandeha i Jakôba naka ireo zanak’osy ka nitondra azy tany amin-dreniny, dia nanamboaran-dreniny hanim-py araka ilay tian’i Itsehàka. '
  '15':
  - type: text
    content: 'Avy eo dia nalain’i Rebekà ny fitafian’ny lahimatoany izay tsara indrindra tao an-trano, ka natafiny an’i Jakôba. '
  '16':
  - type: text
    content: 'Nalainy koa ny hoditr’osy ka namonosany ny sandriny sy ny faritra malama teo amin’ny vozony; '
  '17':
  - type: text
    content: 'dia natolony azy ny hanim-py sy ny mofo efa namboariny. '
  '18':
  - type: text
    content: 'Dia lasa i Jakôba nankany amin’ny rainy ka niteny hoe:'
  - type: text
    content: –Dada ô!
  - type: text
    content: 'Namaly kosa izy hoe:'
  - type: text
    content: –Inty aho, anaka, fa iza moa ianao?
  '19':
  - type: text
    content: 'Dia hoy i Jakôba taminy:'
  - type: text
    content: –Izaho no Hesao, zanakao lahimatoa, efa nanao araka izay nolazainao aho; koa miarena ary mipetraha hihinana avy amin’ny hazako, mba hitsofanao rano ahy.
  '2':
  - type: text
    content: 'Hitanao izao fa efa antitra aho, ka tsy fantatro izay andro hahafatesako. '
  '20':
  - type: text
    content: 'Nanontany azy kosa i Itsehàka hoe:'
  - type: text
    content: –Ahoana no nahitanao haza faingana toy izao, anaka?
  - type: text
    content: 'Fa namaly izy hoe:'
  - type: text
    content: –Ny TOMPO Andriamanitrao no nampahatonga azy teo anatrehako.
  '21':
  - type: text
    content: 'Dia hoy i Itsehàka tamin’i Jakôba:'
  - type: text
    content: –Manatòna kely hoe, anaka, hitsapako anao mba hahafantarako raha i Hesao zanako tokoa ianao na tsia.
  '22':
  - type: text
    content: 'Nanatona an’Itsehàka rainy i Jakôba ka notsapainy, ary nilazany hoe:'
  - type: text
    content: –Ny feony dia feon’i Jakôba, nefa ny tanany kosa dia tanan’i Hesao.
  '23':
  - type: text
    content: 'Tsy fantatr’i Itsehàka i Jakôba, satria rakotra volo toy ny tanan’i Hesao rahalahiny ny sandriny. Kanefa talohan’ny hitsofany rano azy, '
  '24':
  - type: text
    content: 'dia nanontany azy indray izy hoe:'
  - type: text
    content: –Ianao tokoa ve no Hesao zanako?
  - type: text
    content: 'Ka novalian’i Jakôba hoe:'
  - type: text
    content: –Eny, izaho no izy.
  '25':
  - type: text
    content: 'Dia hoy indray i Itsehàka taminy:'
  - type: text
    content: –Arosoy àry hihinanako izato hazan-janako mba hitsofako rano anao.
  - type: text
    content: 'Dia norosoany izy ka nihinana, ary nitondrany divay koa ka nisotro. '
  '26':
  - type: text
    content: 'Taorian’izany, dia hoy i Itsehàka rainy taminy:'
  - type: text
    content: –Manatòna kely hoe ny zanako ka manoroha ahy!
  '27':
  - type: text
    content: Dia nanatona i Jakôba ka nanoroka an-drainy
  - type: note
    content: Jereo Heb 11.20.
  - type: text
    content: '. Ary nony ren’i Itsehàka ny fofon’ny fitafiany, dia nitsodrano azy izy nanao hoe:'
  - type: text
    content: Endrey izany fofon’ny zanako,
  - type: text
    content: fa tahaka ny fofon’ny saha notahîn’ny TOMPO!
  '28':
  - type: text
    content: Homen’Andriamanitra anao anie
  - type: text
    content: ny andon’ny lanitra sy ny tsiron’ny tany
  - type: text
    content: ary ny vary aman-divay betsaka!
  '29':
  - type: text
    content: Hanompo anao anie ireo firenena
  - type: text
    content: ary hiankohoka eo anatrehanao ny vahoaka maro!
  - type: text
    content: Ho tompon’ny rahalahinao anie ianao
  - type: text
    content: ka hiankohoka eo anoloanao ireo zanaky ny reninao!
  - type: text
    content: Ho voaozona anie izay manozona anao
  - type: text
    content: ary hohasoavina izay manisy soa anao
  - type: note
    content: Ampit Gen 12.3.
  - type: text
    content: '!'
  '3':
  - type: text
    content: 'Izao ankehitriny izao, raiso ny fiadianao, dia ny tsipîkanao sy ny zana-tsipîkanao ka mandehana mihaza; ary ento ho ahy izay haza azonao, '
  '30':
  - type: text
    content: 'Nivoaka ny efitrano i Jakôba, nony vitan’i Itsehàka ny fitsofan-drano azy. Nefa raha vao nidify teo anatrehan’ny rainy izy, dia tonga kosa i Hesao rahalahiny avy nihaza. '
  '31':
  - type: text
    content: 'Nanamboatra hanim-py koa izy dia nitondra izany tany amin’ny rainy sady niteny taminy hoe:'
  - type: text
    content: –Miarena, ry dada, mihinàna amin’ny haza namboariko, mba hitsofanao rano ahy.
  '32':
  - type: text
    content: 'Fa hoy i Itsehàka taminy:'
  - type: text
    content: –Iza moa ianao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Izaho no Hesao, zanakao lahimatoa.
  '33':
  - type: text
    content: 'Dia nangovitra fatratra i Itsehàka, ka nanontany hoe:'
  - type: text
    content: –Fa iza àry ilay nihaza, dia nitondra ny hazany teto amiko ka nihinanako talohan’ny nahatongavanao? Izy no efa notsofiko rano; eny, hotahîna tokoa izy.
  '34':
  - type: text
    content: 'Rehefa nandre ny tenin-drainy i Hesao, dia nikiakiaka mafy noho ny alahelony ka nanao hoe:'
  - type: text
    content: –Dada ô, mba omeo tsodrano koa aho!
  '35':
  - type: text
    content: 'Fa namaly i Itsehàka hoe:'
  - type: text
    content: –Tonga teto ny rahalahinao namitaka ahy, ka lasany ny tsodrano tokony ho anao.
  '36':
  - type: text
    content: 'Dia hoy i Hesao tamin-drainy:'
  - type: text
    content: –Tsy mandia tokoa ve ny anarany hoe Jakôba, «Ilay mpisoloky?» Fa efa nisoloky ahy indroa izy izao; efa nalainy ny fizokiako
  - type: note
    content: 'Amin’ny teny hebreo ny anarana hoe Jakôba dia mampahatsiaro ny voambolana izay nadika mpisoloky eto. Ampit Hôs 12.4. Jereo koa ny Gen 25.26 sy nta. – Nanary ny zony i Hesao: Gen 25.29-34.'
  - type: text
    content: ', ary ankehitriny lasany koa ny tsodrano tokony ho ahy! Moa tsy mba misy tsodrano notahirizinao ho ahy ve?'
  '37':
  - type: text
    content: 'Namaly azy i Itsehàka hoe:'
  - type: text
    content: –Efa nataoko ho tomponao izy ary nomeko ho mpanompony ny rahalahiny rehetra. Nomeko azy koa ny vary aman-divay. Koa tsy misy azoko atao ho anao intsony, anaka!
  '38':
  - type: text
    content: 'Fa mbola niteny indray i Hesao hoe:'
  - type: text
    content: –Moa tokana ihany ve ny tsodranonao, ry dada? Dada ô, izaho koa re mba tsofy rano e!
  '39':
  - type: text
    content: Dia nitomany mafy i Hesao
  - type: note
    content: 'Ny tomanin’i Hesao: jereo Heb 12.17.'
  - type: text
    content: '. Fa ny rainy kosa nanao taminy hoe:'
  - type: text
    content: «Indro ny fonenanao ho lavitry ny tany lonaka
  - type: text
    content: sy ho lavitry ny ando midina avy any an-danitra.
  '4':
  - type: text
    content: 'ka anamboaro hanim-py ho ahy araka ilay tiako, ary ento aty hohaniko. Avy eo dia '
  - type: text
    content: hotsofiko
  - type: text
    content: ' rano ianao alohan’ny hahafatesako.'
  '40':
  - type: text
    content: Fa ny sabatrao no hivelomanao,
  - type: text
    content: ary ny rahalahinao no hotompoinao.
  - type: text
    content: Nefa hiavo-tena ianao
  - type: text
    content: 'ka hanapotika ny '
  - type: text
    content: ziogany
  - type: text
    content: hiala amin’ny vozonao
  - type: note
    content: 'hiavo-tena ianao: ny hevitry ny voambolana hebreo eto dia iadian-kevitra. Misy kosa ireo mandika hoe hikomy aminy ianao na ho lasa mpanjenjena ianao. –Ny and 39-40: jereo Heb 11.20. –Momba ny fonenana sy ny tantaran’i Hesao: jereo Gen 36.8; 2 Mp 8.20.'
  - type: text
    content: .»
  - type: heading
    content: Nandositra tany amin’i Labàna i Jakôba
  '41':
  - type: text
    content: 'Ary nankahalain’i Hesao i Jakôba, satria nahazo ny '
  - type: text
    content: tsodranon
  - type: text
    content: '-drainy; ka hoy i Hesao anakampo hoe: «Efa akaiky ny andro hisaonana an’i dada, ary amin’izay no hamonoako an’i Jakôba rahalahiko.» '
  '42':
  - type: text
    content: 'Rehefa nampandrenesina ny fikàsan’i Hesao lahimatoany i Rebekà, dia nampiantso an’i Jakôba faralahiny ka nanao taminy hoe:'
  - type: text
    content: '–Tandremo fa te hamaly ny nataonao i Hesao rahalahinao ka hamono anao ho faty. '
  '43':
  - type: text
    content: 'Koa ankehitriny, anaka, henoy tsara aho! Mandehana mandositra any amin’ny anadahiko any Haràna. '
  '44':
  - type: text
    content: 'Mitoera any aminy aloha mandritra ny fotoana vitsivitsy, mandra-pitony ny rahalahinao. '
  '45':
  - type: text
    content: Rehefa afaka ny hatezeran’ny rahalahinao aminao ka hadinony izay nataonao taminy, dia haniraka haka anao any aho; fa nahoana moa aho no hamoy anareo roa lahy indray andro?
  '46':
  - type: text
    content: 'Ary hoy i Rebèka tamin’i Itsehàka:'
  - type: text
    content: –Efa mankaleo ahy mihitsy ny fiainako noho ny afitsok’ireto vinantovavy hetita ireto. Raha hanambady zazavavy tompon-tany toy ireo i Jakôba, dia aleoko maty!
  '5':
  - type: text
    content: 'Nohenoin’i Rebèka anefa ny resak’i Itsehàka sy i Hesao; koa rehefa lasa nandeha nihaza i Hesao, '
  '6':
  - type: text
    content: 'dia niantso an’i Jakôba zanany i Rebekà ka nanao hoe:'
  - type: text
    content: '–Reko ny rainao nilaza tamin’i Hesao hoe: '
  '7':
  - type: text
    content: '«Itondray haza aho ary anamboary hanim-py hohaniko izany; fa rehefa avy mihinana aho, dia hotsofiko rano eo anatrehan’ny TOMPO ianao alohan’ny hahafatesako.» '
  '8':
  - type: text
    content: 'Koa ankehitriny, anaka, henoy tsara aho ary ataovy izay andidiako anao. '
  '9':
  - type: text
    content: 'Mankanesa any amin’ny andian’ondry aman’osy, ka makà zanak’osy roa izay tsara, fa hanamboarako hanim-py araka ilay tian-drainao. '
