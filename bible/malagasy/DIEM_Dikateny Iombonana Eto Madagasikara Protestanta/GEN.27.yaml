document_id: GEN.27,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voasongona i Hesao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Efa antitra i Itsehàka ary efa pahina ny masony ka tsy nahita tsara intsony. Dia niantso an’i Hesao zanany lahimatoa izy ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Hesao a!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny navaliny azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inty aho!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Itsehàka hoe:'
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hoentinao any amin-drainao izany hohaniny ka hanomezany tsodrano anao alohan’ny hahafatesany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa hoy i Jakôba tamin’ny reniny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I Hesao rahalahiko dia voloina, fa izaho kosa malama hoditra. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa raha mitsapa ahy ny raiko, dia ho fantany fa mamitaka azy aho; ka hahatonga ozona amiko fa tsy tsodrano izany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Namaly azy kosa ny reniny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka ho ahy ny ozona, anaka; fa araho ny teniko ka mandehana akao ireo zanak’osy ireo aho.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nandeha i Jakôba naka ireo zanak’osy ka nitondra azy tany amin-dreniny, dia nanamboaran-dreniny hanim-py araka ilay tian’i Itsehàka. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Avy eo dia nalain’i Rebekà ny fitafian’ny lahimatoany izay tsara indrindra tao an-trano, ka natafiny an’i Jakôba. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nalainy koa ny hoditr’osy ka namonosany ny sandriny sy ny faritra malama teo amin’ny vozony; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'dia natolony azy ny hanim-py sy ny mofo efa namboariny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia lasa i Jakôba nankany amin’ny rainy ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Dada ô!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly kosa izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inty aho, anaka, fa iza moa ianao?
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy i Jakôba taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho no Hesao, zanakao lahimatoa, efa nanao araka izay nolazainao aho; koa miarena ary mipetraha hihinana avy amin’ny hazako, mba hitsofanao rano ahy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hitanao izao fa efa antitra aho, ka tsy fantatro izay andro hahafatesako. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nanontany azy kosa i Itsehàka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana no nahitanao haza faingana toy izao, anaka?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny TOMPO Andriamanitrao no nampahatonga azy teo anatrehako.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy i Itsehàka tamin’i Jakôba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manatòna kely hoe, anaka, hitsapako anao mba hahafantarako raha i Hesao zanako tokoa ianao na tsia.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nanatona an’Itsehàka rainy i Jakôba ka notsapainy, ary nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny feony dia feon’i Jakôba, nefa ny tanany kosa dia tanan’i Hesao.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tsy fantatr’i Itsehàka i Jakôba, satria rakotra volo toy ny tanan’i Hesao rahalahiny ny sandriny. Kanefa talohan’ny hitsofany rano azy, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'dia nanontany azy indray izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao tokoa ve no Hesao zanako?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’i Jakôba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, izaho no izy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy indray i Itsehàka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Arosoy àry hihinanako izato hazan-janako mba hitsofako rano anao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia norosoany izy ka nihinana, ary nitondrany divay koa ka nisotro. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Taorian’izany, dia hoy i Itsehàka rainy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manatòna kely hoe ny zanako ka manoroha ahy!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia nanatona i Jakôba ka nanoroka an-drainy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Heb 11.20.
      marker-yv: yv-n
    - type: text
      text: '. Ary nony ren’i Itsehàka ny fofon’ny fitafiany, dia nitsodrano azy izy nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey izany fofon’ny zanako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tahaka ny fofon’ny saha notahîn’ny TOMPO!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Homen’Andriamanitra anao anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny andon’ny lanitra sy ny tsiron’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vary aman-divay betsaka!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Hanompo anao anie ireo firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiankohoka eo anatrehanao ny vahoaka maro!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tompon’ny rahalahinao anie ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiankohoka eo anoloanao ireo zanaky ny reninao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voaozona anie izay manozona anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hohasoavina izay manisy soa anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 12.3.
      marker-yv: yv-n
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izao ankehitriny izao, raiso ny fiadianao, dia ny tsipîkanao sy ny zana-tsipîkanao ka mandehana mihaza; ary ento ho ahy izay haza azonao, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nivoaka ny efitrano i Jakôba, nony vitan’i Itsehàka ny fitsofan-drano azy. Nefa raha vao nidify teo anatrehan’ny rainy izy, dia tonga kosa i Hesao rahalahiny avy nihaza. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Nanamboatra hanim-py koa izy dia nitondra izany tany amin’ny rainy sady niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miarena, ry dada, mihinàna amin’ny haza namboariko, mba hitsofanao rano ahy.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa hoy i Itsehàka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho no Hesao, zanakao lahimatoa.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia nangovitra fatratra i Itsehàka, ka nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa iza àry ilay nihaza, dia nitondra ny hazany teto amiko ka nihinanako talohan’ny nahatongavanao? Izy no efa notsofiko rano; eny, hotahîna tokoa izy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Rehefa nandre ny tenin-drainy i Hesao, dia nikiakiaka mafy noho ny alahelony ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Dada ô, mba omeo tsodrano koa aho!
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fa namaly i Itsehàka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tonga teto ny rahalahinao namitaka ahy, ka lasany ny tsodrano tokony ho anao.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia hoy i Hesao tamin-drainy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mandia tokoa ve ny anarany hoe Jakôba, «Ilay mpisoloky?» Fa efa nisoloky ahy indroa izy izao; efa nalainy ny fizokiako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jakôba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mampahatsiaro ny voambolana izay nadika '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpisoloky
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto. Ampit Hôs 12.4. Jereo koa ny Gen 25.26 sy nta. – '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Nanary ny zony i Hesao:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Gen 25.29-34.'
      marker-yv: yv-n
    - type: text
      text: ', ary ankehitriny lasany koa ny tsodrano tokony ho ahy! Moa tsy mba misy tsodrano notahirizinao ho ahy ve?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Namaly azy i Itsehàka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa nataoko ho tomponao izy ary nomeko ho mpanompony ny rahalahiny rehetra. Nomeko azy koa ny vary aman-divay. Koa tsy misy azoko atao ho anao intsony, anaka!
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Fa mbola niteny indray i Hesao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa tokana ihany ve ny tsodranonao, ry dada? Dada ô, izaho koa re mba tsofy rano e!
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Dia nitomany mafy i Hesao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.39 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Ny tomanin’i Hesao:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Heb 12.17.
      marker-yv: yv-n
    - type: text
      text: '. Fa ny rainy kosa nanao taminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro ny fonenanao ho lavitry ny tany lonaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho lavitry ny ando midina avy any an-danitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ka anamboaro hanim-py ho ahy araka ilay tiako, ary ento aty hohaniko. Avy eo dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hotsofiko
    - type: text
      text: ' rano ianao alohan’ny hahafatesako.'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Fa ny sabatrao no hivelomanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny rahalahinao no hotompoinao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa hiavo-tena ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hanapotika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ziogany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiala amin’ny vozonao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.40 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hiavo-tena ianao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny hevitry ny voambolana hebreo eto dia iadian-kevitra. Misy kosa ireo mandika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hikomy aminy ianao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ho lasa mpanjenjena ianao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –Ny and 39-40: jereo Heb 11.20. –Momba ny fonenana sy ny tantaran’i Hesao: jereo Gen 36.8; 2 Mp 8.20.'
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nandositra tany amin’i Labàna i Jakôba
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary nankahalain’i Hesao i Jakôba, satria nahazo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tsodranon
    - type: text
      text: '-drainy; ka hoy i Hesao anakampo hoe: «Efa akaiky ny andro hisaonana an’i dada, ary amin’izay no hamonoako an’i Jakôba rahalahiko.» '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Rehefa nampandrenesina ny fikàsan’i Hesao lahimatoany i Rebekà, dia nampiantso an’i Jakôba faralahiny ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tandremo fa te hamaly ny nataonao i Hesao rahalahinao ka hamono anao ho faty. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Koa ankehitriny, anaka, henoy tsara aho! Mandehana mandositra any amin’ny anadahiko any Haràna. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Mitoera any aminy aloha mandritra ny fotoana vitsivitsy, mandra-pitony ny rahalahinao. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Rehefa afaka ny hatezeran’ny rahalahinao aminao ka hadinony izay nataonao taminy, dia haniraka haka anao any aho; fa nahoana moa aho no hamoy anareo roa lahy indray andro?
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ary hoy i Rebèka tamin’i Itsehàka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa mankaleo ahy mihitsy ny fiainako noho ny afitsok’ireto vinantovavy hetita ireto. Raha hanambady zazavavy tompon-tany toy ireo i Jakôba, dia aleoko maty!
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nohenoin’i Rebèka anefa ny resak’i Itsehàka sy i Hesao; koa rehefa lasa nandeha nihaza i Hesao, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'dia niantso an’i Jakôba zanany i Rebekà ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Reko ny rainao nilaza tamin’i Hesao hoe: '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '«Itondray haza aho ary anamboary hanim-py hohaniko izany; fa rehefa avy mihinana aho, dia hotsofiko rano eo anatrehan’ny TOMPO ianao alohan’ny hahafatesako.» '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa ankehitriny, anaka, henoy tsara aho ary ataovy izay andidiako anao. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mankanesa any amin’ny andian’ondry aman’osy, ka makà zanak’osy roa izay tsara, fa hanamboarako hanim-py araka ilay tian-drainao. '
