document_id: DEU.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsofin’i Mosesy rano ireo foko israelita 12
  - type: text
    content: Rehefa nadiva ho faty i Mosesy,
  - type: text
    content: 'lehilahin’Andriamanitra, dia izao no '
  - type: text
    content: tsodrano
  - type: text
    content: ' nataony tamin’ny Israelita:'
  '10':
  - type: text
    content: Ireo no mampianatra ny fitsipika aman-dalànanao
  - type: text
    content: amin’ny Israelita namany
  - type: text
    content: sy manolotra vovo-javamanitra eo anatrehanao
  - type: text
    content: 'ary mitondra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo'
  - type: text
    content: 'eo amin’ny '
  - type: text
    content: alitaranao
  - type: note
    content: Fampianarana sy fanoloran-tsorona no andraikitra roa lehibe sahanin’ireo mpisorona, taranak’i Levỳ.
  - type: text
    content: .
  '11':
  - type: text
    content: TOMPO ô, tahio ny ezaka vitany
  - type: text
    content: ary aoka ho sitrakao ny asa ataony;
  - type: text
    content: folahy ny herin’izay mitsangan-kanohitra azy,
  - type: text
    content: ary aoka tsy hiarina intsony izay mankahala azy.»
  '12':
  - type: text
    content: 'Ny amin’ny taranak’i Benjamîna, dia hoy i Mosesy hoe:'
  - type: text
    content: «Foko malalan’ny TOMPO ianareo
  - type: text
    content: ka monina feizay eo akaikiny;
  - type: text
    content: miaro anao isan’andro vaky Izy
  - type: text
    content: sady monina eo anivon’ny havoanareo
  - type: note
    content: 'eo anivon’ny havoanareo: i Jerosalema indraindray dia heverina ho anatin’ny faritanin’i Benjamîna.'
  - type: text
    content: .»
  '13':
  - type: text
    content: 'Ny amin’ny taranak’i Jôsefa, dia hoy i Mosesy hoe:'
  - type: text
    content: «Hotahîn’ny TOMPO anie ny taninareo,
  - type: text
    content: ka hahazo ny ando fanomezan-tsoan’ny lanitra
  - type: text
    content: sy ny rano misoko avy any ambany lalina any,
  '14':
  - type: text
    content: handray ny zava-tsoa entin’ny masoandro
  - type: text
    content: sy ny zava-tsoa matoy isam-bolana,
  '15':
  - type: text
    content: ho rakotry ny voka-tsoan’ny tendrombohitra
  - type: text
    content: sy ny voka-tsoan’ny havoana hatrizay hatrizay!
  '16':
  - type: text
    content: Enga anie ny zava-tsoan’izany tany mahavokatra izany
  - type: text
    content: sy ny fanambinan’Ilay nitoetra tao amin’ny Roimemy
  - type: text
    content: hitosaka eo amin’ny taranak’i Jôsefa,
  - type: text
    content: dia ny taranak’ilay navahana tamin’ny rahalahiny
  - type: note
    content: 'And 13.16: jereo Gen 49.25-26. –nitoetra tao amin’ny Roimemy: jereo Eks 3.1-6. –ilay navahana tamin’ny rahalahiny: jereo Gen 37.5-11; 44.14.'
  - type: text
    content: '!'
  '17':
  - type: text
    content: Homem-boninahitra anie ny taranak’i Jôsefa
  - type: text
    content: satria mahery tahaka ny ombalahy izy!
  - type: text
    content: Tahaka ny ombimanga be tandroka izy,
  - type: text
    content: ka manan-tandroka roa hanotoany ny firenena rehetra
  - type: text
    content: hatrany amin’ny faravazan-tany,
  - type: text
    content: dia ny miaramila alinalin’ny fokon’i Efraîma
  - type: text
    content: sy ny miaramila arivoarivon’ny fokon’i Manase.»
  '18':
  - type: text
    content: Ny amin’ny taranak’i Zebolòna sy i Jisakara,
  - type: text
    content: 'dia hoy i Mosesy hoe:'
  - type: text
    content: «Mifalia, ry fokon’i Zebolòna,
  - type: text
    content: amin’ny varotra ataonao;
  - type: text
    content: mifalia, ry fokon’i Jisakara, ao an-dainao.
  '19':
  - type: text
    content: Firenena maro no antsoinareo hankeo an-tendrombohitra
  - type: text
    content: mba hanolotra sorona araka ny voalahatra,
  - type: text
    content: satria angoronanareo harena ny ranomasina
  - type: text
    content: sy ny zava-tsoa miafina ao amin’ny fasika
  - type: note
    content: 'ranomasina: tsiahivina amin’izany ny fifanakalozana ara-barotra tamin’ny Fenisianina izay firenena nanana tantsambo maro (jereo kosa Gen 49.43). –zava-tsoa miafina amin’ny fasika: tsiahivina amin’izany ny fanangonana sifo-dranomasina hahazoana ny loko sarobidy fampiasa amin’ny lamba jaky na koa ny fampiasana ny fasika hanamboarana fitaratra.'
  - type: text
    content: .»
  '2':
  - type: text
    content: Tonga avy tany Sinay ny TOMPO,
  - type: text
    content: avy tany Sehîra no nisehoany tamin’ny vahoakany,
  - type: text
    content: avy tao an-tendrombohitra Paràna no namirapiratany.
  - type: text
    content: 'Otronin’ny '
  - type: text
    content: anjely
  - type: text
    content: ' alinkisa no nahatongavany;'
  - type: text
    content: avy teo amin’ny tanan-kavanany no nanjelanjelatra ny lalàna
  - type: note
    content: 'Sehîra: anarana hafa fiantsoana ny faritany Edôma. –Paràna: toa tendrombohitra anankiray any Edôma. –Amin’ny toerana maro no tsy mazava ny RM eto amin’ny and 2-5 ary tsy azo antoka ny dkt aroso.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'Ny amin’ny taranak’i Gada, dia hoy i Mosesy hoe:'
  - type: text
    content: «Hankalazaina anie ny Tompo
  - type: text
    content: Izay manome faritra malalaka ho an’ny fokon’i Gada!
  - type: text
    content: Tahaka ny liona no amitsahan’ny fokon’i Gada,
  - type: text
    content: dia liona vonon-kamiravira ny sandrin’ny rembiny
  - type: text
    content: mbamin’ny lohany koa aza.
  '21':
  - type: text
    content: Nahazo ny zaratany tsara indrindra ho azy izy,
  - type: text
    content: dia anjara voatokana ho an’ny mpifehy;
  - type: text
    content: avy eo niaraka tamin’ny lehiben’ny vahoaka izy
  - type: text
    content: ka nanao ny marina soritan’ny TOMPO
  - type: text
    content: sy ny fitsipiny hanasoavana an’i Israely
  - type: note
    content: 'avy eo... Israely: jereo Nom 32.16-18.'
  - type: text
    content: .»
  '22':
  - type: text
    content: 'Ny amin’ny taranak’i Dana, dia hoy i Mosesy hoe:'
  - type: text
    content: «Ny fokon’i Dana dia tahaka ny vanton-diona
  - type: text
    content: 'izay miantoraka avy ao '
  - type: text
    content: Basàna
  - type: note
    content: 'Voatsiahy amin’izany ny fanafihana niainga avy tany Basàna: ampit Gen 49.17; Jos 19.47.'
  - type: text
    content: .»
  '23':
  - type: text
    content: 'Ny amin’ny taranak’i Naftalỳ, dia hoy i Mosesy hoe:'
  - type: text
    content: «Ry fokon’i Naftalỳ, tototra tombontsoa ianao
  - type: text
    content: sady heniky ny fitahian’ny TOMPO.
  - type: text
    content: Aoka hitatra miankandrefana sy mianatsimo
  - type: text
    content: ny faritany anananao
  - type: note
    content: 'Aoka... anananao: dkt hafa Ny farihy (=farihin’i Genesareta) sy iny atsimony iny no ho faritany anananao.'
  - type: text
    content: '!»'
  '24':
  - type: text
    content: 'Ny amin’ny taranak’i Asera, dia hoy i Mosesy hoe:'
  - type: text
    content: «Hotahîna anie ny fokon’i Asera,
  - type: text
    content: eo amin’ny samy taranak’i Jakôba!
  - type: text
    content: Hotiavin’ny mpiray firenena aminy anie izy!
  - type: text
    content: Aoka hitobaka ny menak’ôlivany
  - type: text
    content: ka hisy hanobohany ny tongony!»
  '25':
  - type: text
    content: Azo antoka ny varavaranao
  - type: text
    content: fa ho vy amam-barahina ny hidiny.
  - type: text
    content: Ny herinao
  - type: note
    content: 'Ny heriny: araka ny dkt tranainy maro; tsy fantatra mazava ny hevitr’ilay voambolana hebreo.'
  - type: text
    content: ' anie haharitra toy ny androm-piainanao!'
  '26':
  - type: text
    content: 'Dia hoy koa i Mosesy hoe:'
  - type: text
    content: «Ry Jesoròna
  - type: note
    content: Ry Jesoròna na hoe ry Israely jereo 32 15 sy nta.
  - type: text
    content: ', tsy misy tahaka an’ilay Andriamanitrao!'
  - type: text
    content: Heni-boninahitra sady mitaingina ny rahon’ny lanitra Izy
  - type: text
    content: mba ho tonga hamonjy anao.
  '27':
  - type: text
    content: Andriamanitra, hatrizay hatrizay, no fialofana;
  - type: text
    content: ny heriny, hatrany hatrany, no miasa etỳ ambany
  - type: note
    content: 'ny heriny... ambany: dkt hafa eo ambany fiarovan’ny heriny hatrany hatrany ianao.'
  - type: text
    content: etỳ.
  - type: text
    content: Mandroaka ny fahavalo eo anoloanao Izy
  - type: text
    content: ary mandidy anao handringana an’ireo.
  '28':
  - type: text
    content: Mandry feizay ny Israelita;
  - type: text
    content: monina milamina ny taranak’i Jakôba
  - type: text
    content: eo amin’ny tany be vary sy divay,
  - type: text
    content: tany izay ipariahan’ny andon’ny lanitra.
  '29':
  - type: text
    content: Sambatra ianareo, ry Israelita!
  - type: text
    content: Iza no tahaka anareo, ry vahoaka voavonjin’ny TOMPO?
  - type: text
    content: Izy no ampinga miaro anareo sy sabatra ireharehanareo.
  - type: text
    content: Hikoy aminareo ny fahavalonareo,
  - type: text
    content: ka hohitsahinareo ny toerana avo fivavahany.»
  '3':
  - type: text
    content: Eny, tia ireo fokon’i Israely ianao, ry Tompo!
  - type: text
    content: Ambany fifehezanao avokoa ny olona voatokana ho Anao;
  - type: text
    content: miankohoka eo an-tongotrao ireo
  - type: text
    content: ka samy mandray ny teninao.
  '4':
  - type: text
    content: Ny Lalàna naroson’i Mosesy tamintsika
  - type: text
    content: no lovan’ny taranaka narovan’i Jakôba;
  '5':
  - type: text
    content: ary tonga mpanjakan’i Jesoròna ny Tompo
  - type: note
    content: 'Ny Tompo: misy mihevitra fa tsy ny Tompo no lazaina eto fa i Mosesy (rijan-teny hebreo, mpisolo anarana Izy sa izy?) –i Jesoròna, izany hoe i Israely: jereo 32.15 sy nta.'
  - type: text
    content: fony tafangona ny lehiben’ny vahoaka
  - type: text
    content: mbamin’ireo foko israelita rehetra.
  '6':
  - type: text
    content: 'Ny amin’ny taranak’i Reobena, dia hoy i Mosesy hoe:'
  - type: text
    content: «Aoka ho velona ny fokon’i Reobena fa tsy ho faty,
  - type: text
    content: ary aoka ho tsy tambo isaina ny olony!»
  '7':
  - type: text
    content: Ny amin’ny taranak’i Joda dia izao no voalazan’i Mosesy;
  - type: text
    content: «TOMPO ô, henoy antso ny fokon’i Joda!
  - type: text
    content: Ento izy hifandray amin’ireo mpiray firenena aminy;
  - type: text
    content: ny tanany no hiadiany ho an’ny fokony
  - type: text
    content: ka ampio izy hamely ny mpandrafy azy.»
  '8':
  - type: text
    content: 'Ny amin’ny taranak’i Levỳ, dia hoy i Mosesy hoe:'
  - type: text
    content: «Tompo ô, ny Orîmanao sy Tomîmanao
  - type: text
    content: dia nankininao amin’ireto olona mahatoky Anao ireto,
  - type: text
    content: izay efa nozahanao toetra tany Masà
  - type: text
    content: sy nanarinao mafy teo amin’ny ranon’i Meribà
  - type: note
    content: 'Orîma sy Tomîma: karazana kodiakely na tehina kely (jereo Eks 28.30 sy nta.) –Masà, Meribà jereo Eks 17.1-7; Nom 20.1-13.'
  - type: text
    content: .
  '9':
  - type: text
    content: Noho Ianao, dia tsy mba niraiki-po
  - type: text
    content: tamin’ny ray aman-dreniny ireo,
  - type: text
    content: na nifikitra tamin’ny mpiray tampo na fatra-pitia zanaka,
  - type: text
    content: fa nitandrina ny teninao
  - type: text
    content: 'sy nitana ny '
  - type: text
    content: fanekempihavananao
  - type: note
    content: Tsiahivina etoana ny tantara ao amin’ny Eks 32.25-29.
  - type: text
    content: .
