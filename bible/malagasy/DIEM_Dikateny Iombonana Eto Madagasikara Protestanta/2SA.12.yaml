document_id: 2SA.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Natàna manambara amin’i Davida ny famaizan’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy sitraky ny TOMPO anefa izany nataon’i Davida izany. '
    - type: text
      text: 'Naniraka an’i Natàna '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ho any amin’i Davida ny TOMPO. Rehefa tonga tany aminy izy, dia nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nisy lehilahy roa tao amin’ny tanàna iray, ny anankiray mpanankarena ary ny anankiray mahantra. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Noho izany, dia tsy hiala amin’ny taranakao mandrakizay kosa ny sabatra, satria tsy noraharahainao Aho fa nalainao ny vadin’i Orià ilay Hetita mba ho vadinao. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izao no lazaiko aminao: Indro fa hahatonga loza amin’ny ankohonanao Aho. Halàko eo imasonao ireo vadinao ka homeko olon-kafa izay hiray aminy antoandrobenanahary'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.21-22.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ianao nanao izany tao amin’ny miafina, fa Izaho kosa haneho izany antoandrobenanahary eo imason’i Israely manontolo.»
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida tamin’i Natàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nanota tamin’ny TOMPO aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy kosa i Natàna tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny TOMPO efa namela ny helokao, ka tsy ho faty ianao. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nefa noho ianao nampiteny ratsy ny fahavalon’ny TOMPO tamin’izany nataonao izany, dia ny zanaka izay naterakao no ho faty.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nody tany an-tranony i Natàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’ny zanak’i Bàty-Seba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namely aretina ny zaza izay nateraky ny vadin’i Orià tamin’i Davida ny TOMPO, ka dia narary mafy izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitalaho tamin’Andriamanitra ho an’ilay zaza i Davida, ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nifady hanina
    - type: text
      text: '; ary rehefa niditra tao an’efitranony izy nony alina, dia nandry tamin’ny tany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niezaka nankao aminy mba hampiarina azy ireo loholona tao an-dapa, kanefa dia nolaviny; ary tsy nety niara-nisakafo tamin’ireo koa izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro fahafito dia maty ilay zaza. Natahotra ny hilaza aminy ny fahafatesan’ny zaza ireo mpanompon’i Davida, fa nifampiresaka hoe: «Fahavelon’ny zaza aza tsy nihaino antsika izy raha mba niteny taminy isika, koa ankehitriny atao ahoana no filaza aminy fa maty ny zaza? Tsy ho loza va?» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tsikaritr’i Davida fa nitakoritsika ny mpanompony, dia fantany fa maty ny zaza; ka hoy izy nanontany azy ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Maty ve ny zaza?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, maty izy.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nanana ondry sy omby marobe ilay mpanankarena; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niarina avy teo amin’ny tany i Davida, ka nandro sy nihosotra diloilo ary nisolo akanjo; dia nankao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' izy ka nivavaka. Rehefa nody tany aminy izy, dia nangataka horosoana sakafo ka nihinana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanompony taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no dikan’izao? Fahavelon’ny zaza, dia nifady hanina sy nitomany ianao; fa rehefa maty kosa izy, dia niarina sy nihinan-kanina indray ianao?
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navalin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fahavelon’ny zaza, dia nifady hanina sy nitomany aho satria nanao anakampo hoe: «Iza no mahalala? Angamba hiantra ahy ihany ny TOMPO ka tsy hamela ny zaza ho faty». '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Maty izy anefa ankehitriny, koa nahoana aho no mbola hifady hanina? Moa mahay mamerina azy ho velona indray va aho? Izaho no hankany aminy, fa izy tsy hiverina amiko intsony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahaterahan’i Salômôna
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampionona an’i Bàty-Seba vadiny i Davida, dia nankao aminy ka niray taminy; ary ravehivavy kosa niteraka zazalahy izay nomen’i Davida anarana hoe Salômôna. Ary ny TOMPO tia ilay zaza, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka naniraka an’i Natàna '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hanome azy anarana hoe Jedidià, izany hoe: «Tiavin’ny TOMPO».'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Azon’i Davida ny tanànan’i Rabà
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 20.1-3)
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notafihin’i Jôaba i Rabà, renivohitry ny Hamônita ka azony ny tanànan’ny mpanjaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary naniraka olona nankany amin’i Davida i Jôaba hilaza aminy hoe: «Notafihiko i Rabà, ka azoko mbamin’ny faritra fitahirizan-dranony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny vorio ny miaramila sisa, dia tongava hanao fahirano ny tanàna mba hahazoanao azy, fandrao izaho no hahazo azy ka ny anarako no homem-boninahitra.» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorin’i Davida ny miaramila sisa rehetra; ary nankany Rabà izy hanafika azy, ka azony ny tanàna. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa ilay mahantra kosa tsy nanana afa-tsy ondrivavikely iray izay novidiny. Nofahanany tsara izy io, ka niara-nitombo tamin’ireo zanany tao aminy. Ny sakafo fihinan’ilay mahantra no nihinanany; ny ronono fisotrony no nisotroany; ary teo akaikiny no nampatoriany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nesoriny teny an-dohan’i Milkôma ny satroboninahitra volamena izay milanja mihoatra ny 30 kilao; ary nisy vatosoa tamin’io satroboninahitra io, ka nafindra ho eo an-tampon’ny satroboninahitr’i Davida. Zavatra marobe koa no voababony avy tao an-tanàna. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nataon’i Davida sesitany ny mponina izay tao ka nampiasainy mafy tamin’ny tsofa sy ny lapika ary ny famaky na notereny ho mpandasitra biriky. Nataony toy izany avokoa ireo tanàna hafa rehetra fonenan’ny Hamônita. Dia niverina nankany Jerosalema i Davida sy ny tafiny manontolo.
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Indray andro, nandray vahiny ilay manankarena. Tsy mba naka tamin’ireo omby aman’ondriny anefa izy hamahanany azy, fa ny ondrivavikelin’ilay mahantra no nalainy ka namboariny ho an’ilay vahiny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tezitra mafy tamin’izany lehilahy izany i Davida ka nilaza tamin’i Natàna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Velona ny TOMPO ka manizingizina aho fa mendrika ny ho faty izay olona nanao izany! '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ny ondrivavikely dia hosoloiny avo efatra heny, satria nanao izany tsy nisy antra izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Natàna tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianao izany olona izany! Koa izao no lazain’ny TOMPO, Andriamanitr’i Israely: «Izaho no nanosotra anao ho mpanjakan’i Israely sady namonjy anao ho afaka tamin’ny famelezan’i Saoly. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Natolotro hofehezinao ny fianakavian’i Saoly ary nataoko tonga andefimandrinao ny vadiny; natolotro ho eo ambany fahefànao ny vahoakan’i Israely sy i Joda. Ary raha mbola tsy ampy anao izany, dia ho nomeko toy izany ianao. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa nahoana no tsy noraharahainao ny teniko tamin’ny nanaovanao izay ratsy eo imasoko? Nasianao tamin’ny sabatra i Orià ilay Hetita ary nalainao ho vadinao ny vadiny; eny, ianao no nahafaty azy tamin’ny sabatry ny Hamônita. '
