document_id: 2KI.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Melohin’Andriamanitra ny fihetsik’i Ahazià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’ny nahafatesan’i Ahaba dia nikomy tamin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' i Môaba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indray andro i Ahazià mpanjakan’i Israely dia nianjera avy teny an-davarangan’ny efitrano ambony amin’ny lapany tao Samaria ka naratra mafy. Dia naniraka olona izy hanontany an’i Bahala-Zeboba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efitrano ambony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 1 Mp 17.19 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Bahala-Zeboba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': izany anarana izany dia midika hoe «ny Tompon’ny lalitra»; teny fanesoana fanambaniana avy amin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bahala-Zebola
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na «Bahala Printsy».'
    marker-yv: yv-n
  - type: text
    text: ' andriamanitry ny tanànan’i Hekrôna, raha toa ka ho sitrana amin’izao ratra nahazo azy izao na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy kosa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny TOMPO tamin’i Elià avy any Tisbe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandehana mihaona amin’ny iraky ny mpanjakan’i Samaria ka lazao izy hoe: «Moa tsy misy Andriamanitra ve any Israely no mandeha hanontany an’i Bahala-Zeboba andriamanitr’i Hekrôna ianareo?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia ampio koa hoe: «Izao no tenin’ny TOMPO ho an’ny mpanjakan’i Israely: ‹Tsy hiala eo am-parafara izay nandrianao intsony ianao, fa ho faty tokoa.› »'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary lasa i Elià nampita hafatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niverina tany amin’ny mpanjaka ireto iraka. Rehefa nanontany ny anton’ny niverenany kosa i Ahazià, dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '–Nisy lehilahy iray nanatona anay sady nanome baiko anay mba hiverina atỳ aminao ka hilaza aminao izao tenin’ny TOMPO izao: «Moa tsy misy Andriamanitra ve any Israely no maniraka hanontany an’i Bahala-Zeboba andriamanitr’i Hekrôna ianareo? Noho izany, dia tsy hiala eo am-parafara izay nandrianao intsony ianao, fa ho faty tokoa!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa manao ahoana izay lehilahy tonga nitsena anareo izay ka nilaza izany teny izany taminareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manao akanjo volom-biby sy fehikibo hoditra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 3.4; Mk 1.6.
    marker-yv: yv-n
  - type: text
    text: ' izy.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –I Elià avy any Tisbe izay!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nikasa hisambotra an’i Elià i Ahazià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nandefa manamboninahitra iray miaraka amin’ny miaramila dimampolo ny mpanjaka mba hisambotra an’i Elià. Ary ireo niakatra terỳ an-tampon-tendrombohitra izay nipetrahan’i Elià. Dia nitenenan’ilay manamboninahitra izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: olon’Andriamanitra
  - type: text
    text: ' ô, midîna ianao, hoy ny mpanjaka!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa novalian’i Elià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha olon’Andriamanitra tokoa aho, dia aoka hisy afo hilatsaka avy any an-danitra handevona anao sy ny miaramila dimampolo fehezinao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lk 9.54.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nisy afo nilatsaka avy tany an-danitra ka nandevona ilay manamboninahitra sy ny miaramilany dimampolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nalefan’ny mpanjaka indray ny manamboninahitra iray hafa miaraka amin’ny miaramila dimampolo hankany amin’i Elià. Dia nitenenan’ilay manamboninahitra izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry olon’Andriamanitra, midîna faingana ianao, hoy ny mpanjaka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa novalian’i Elià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha olon’Andriamanitra tokoa aho, dia aoka hisy afo hilatsaka avy any an-danitra handevona anao sy ny miaramila dimampolo fehezinao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nisy afo nilatsaka avy tany an-danitra ka nandevona ilay manamboninahitra sy ny miaramilany dimampolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mbola nalefan’ny mpanjaka koa ny manamboninahitra iray hafa miaraka amin’ny miaramila dimampolo. Dia niakatra ny tendrombohitra ilay manamboninahitra; rehefa tonga izy, dia nandohalika teo anatrehan’i Elià ka nitalaho taminy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry olon’Andriamanitra ô, mba tsimbino re ny aiko sy ny an’ireto miaramilako dimampolo ireto! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fantatro fa efa nisy afo nilatsaka avy tany an-danitra izay nandevona ireo manamboninahitra roa talohako mbamin’ny miaramila feheziny avy. Ankehitriny kosa mba tsimbino re ny aiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny TOMPO tamin’i Elià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Midîna miaraka aminy, fa aza matahotra azy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nidina niaraka tamin’ilay manamboninahitra ho any amin’ny mpanjaka i Elià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka nilaza tamin’i Ahazià ny tenin’ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Satria naniraka olona hanontany an’i Bahala-Zeboba andriamanitr’i Hekrôna ianao, hoatra ny hoe tsy misy Andriamanitra mba azo anontaniana eto amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ', dia tsy ho tafala eo am-parafara izay nandrianao intsony ianao fa ho faty tokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia maty tokoa araka ny tenin’ny TOMPO voalazan’i Elià i Ahazià; ary satria tsy mba niteraka izy, dia i Jôrama rahalahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'rahalahiny: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt grika tranainy izany; fa tsy hita ao amin’ny RM io voambolana io.
    marker-yv: yv-n
  - type: text
    text: ' no nanjaka nandimby azy tamin’ny taona faharoa nanjakan’i Jôrama zanakalahin’i Jôsafata sady mpanjakan’i Joda.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Ahazià ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Israely.
