document_id: 2KI.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Melohin’Andriamanitra ny fihetsik’i Ahazià
  - type: text
    content: 'Taorian’ny nahafatesan’i Ahaba dia nikomy tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' i Môaba.'
  '10':
  - type: text
    content: 'Fa novalian’i Elià hoe:'
  - type: text
    content: –Raha olon’Andriamanitra tokoa aho, dia aoka hisy afo hilatsaka avy any an-danitra handevona anao sy ny miaramila dimampolo fehezinao
  - type: note
    content: Ampit Lk 9.54.
  - type: text
    content: '!'
  - type: text
    content: 'Dia nisy afo nilatsaka avy tany an-danitra ka nandevona ilay manamboninahitra sy ny miaramilany dimampolo. '
  '11':
  - type: text
    content: 'Ary nalefan’ny mpanjaka indray ny manamboninahitra iray hafa miaraka amin’ny miaramila dimampolo hankany amin’i Elià. Dia nitenenan’ilay manamboninahitra izy hoe:'
  - type: text
    content: –Ry olon’Andriamanitra, midîna faingana ianao, hoy ny mpanjaka!
  '12':
  - type: text
    content: 'Fa novalian’i Elià hoe:'
  - type: text
    content: –Raha olon’Andriamanitra tokoa aho, dia aoka hisy afo hilatsaka avy any an-danitra handevona anao sy ny miaramila dimampolo fehezinao!
  - type: text
    content: 'Dia nisy afo nilatsaka avy tany an-danitra ka nandevona ilay manamboninahitra sy ny miaramilany dimampolo. '
  '13':
  - type: text
    content: 'Mbola nalefan’ny mpanjaka koa ny manamboninahitra iray hafa miaraka amin’ny miaramila dimampolo. Dia niakatra ny tendrombohitra ilay manamboninahitra; rehefa tonga izy, dia nandohalika teo anatrehan’i Elià ka nitalaho taminy nanao hoe:'
  - type: text
    content: '–Ry olon’Andriamanitra ô, mba tsimbino re ny aiko sy ny an’ireto miaramilako dimampolo ireto! '
  '14':
  - type: text
    content: Fantatro fa efa nisy afo nilatsaka avy tany an-danitra izay nandevona ireo manamboninahitra roa talohako mbamin’ny miaramila feheziny avy. Ankehitriny kosa mba tsimbino re ny aiko!
  '15':
  - type: text
    content: 'Ary hoy ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO tamin’i Elià:'
  - type: text
    content: –Midîna miaraka aminy, fa aza matahotra azy.
  - type: text
    content: 'Dia nidina niaraka tamin’ilay manamboninahitra ho any amin’ny mpanjaka i Elià, '
  '16':
  - type: text
    content: 'ka nilaza tamin’i Ahazià ny tenin’ny TOMPO hoe:'
  - type: text
    content: '–Satria naniraka olona hanontany an’i Bahala-Zeboba andriamanitr’i Hekrôna ianao, hoatra ny hoe tsy misy Andriamanitra mba azo anontaniana eto amin’i '
  - type: text
    content: Israely
  - type: text
    content: ', dia tsy ho tafala eo am-parafara izay nandrianao intsony ianao fa ho faty tokoa.'
  '17':
  - type: text
    content: Dia maty tokoa araka ny tenin’ny TOMPO voalazan’i Elià i Ahazià; ary satria tsy mba niteraka izy, dia i Jôrama rahalahiny
  - type: note
    content: 'rahalahiny: araka ny dkt grika tranainy izany; fa tsy hita ao amin’ny RM io voambolana io.'
  - type: text
    content: ' no nanjaka nandimby azy tamin’ny taona faharoa nanjakan’i Jôrama zanakalahin’i Jôsafata sady mpanjakan’i Joda.'
  '18':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Ahazià ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  '2':
  - type: text
    content: Indray andro i Ahazià mpanjakan’i Israely dia nianjera avy teny an-davarangan’ny efitrano ambony amin’ny lapany tao Samaria ka naratra mafy. Dia naniraka olona izy hanontany an’i Bahala-Zeboba
  - type: note
    content: 'efitrano ambony: ampit 1 Mp 17.19 sy nta. –Bahala-Zeboba: izany anarana izany dia midika hoe «ny Tompon’ny lalitra»; teny fanesoana fanambaniana avy amin’ny hoe Bahala-Zebola na «Bahala Printsy».'
  - type: text
    content: ' andriamanitry ny tanànan’i Hekrôna, raha toa ka ho sitrana amin’izao ratra nahazo azy izao na tsia. '
  '3':
  - type: text
    content: 'Fa hoy kosa ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO tamin’i Elià avy any Tisbe:'
  - type: text
    content: '–Mandehana mihaona amin’ny iraky ny mpanjakan’i Samaria ka lazao izy hoe: «Moa tsy misy Andriamanitra ve any Israely no mandeha hanontany an’i Bahala-Zeboba andriamanitr’i Hekrôna ianareo?» '
  '4':
  - type: text
    content: 'Dia ampio koa hoe: «Izao no tenin’ny TOMPO ho an’ny mpanjakan’i Israely: ‹Tsy hiala eo am-parafara izay nandrianao intsony ianao, fa ho faty tokoa.› »'
  - type: text
    content: Ary lasa i Elià nampita hafatra.
  '5':
  - type: text
    content: 'Dia niverina tany amin’ny mpanjaka ireto iraka. Rehefa nanontany ny anton’ny niverenany kosa i Ahazià, dia novaliany hoe:'
  '6':
  - type: text
    content: '–Nisy lehilahy iray nanatona anay sady nanome baiko anay mba hiverina atỳ aminao ka hilaza aminao izao tenin’ny TOMPO izao: «Moa tsy misy Andriamanitra ve any Israely no maniraka hanontany an’i Bahala-Zeboba andriamanitr’i Hekrôna ianareo? Noho izany, dia tsy hiala eo am-parafara izay nandrianao intsony ianao, fa ho faty tokoa!»'
  '7':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’ireo:'
  - type: text
    content: –Fa manao ahoana izay lehilahy tonga nitsena anareo izay ka nilaza izany teny izany taminareo?
  '8':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Manao akanjo volom-biby sy fehikibo hoditra
  - type: note
    content: Ampit Mt 3.4; Mk 1.6.
  - type: text
    content: ' izy.'
  - type: text
    content: 'Dia hoy ny mpanjaka:'
  - type: text
    content: –I Elià avy any Tisbe izay!
  - type: heading
    content: Nikasa hisambotra an’i Elià i Ahazià
  '9':
  - type: text
    content: 'Dia nandefa manamboninahitra iray miaraka amin’ny miaramila dimampolo ny mpanjaka mba hisambotra an’i Elià. Ary ireo niakatra terỳ an-tampon-tendrombohitra izay nipetrahan’i Elià. Dia nitenenan’ilay manamboninahitra izy hoe:'
  - type: text
    content: '–Ry '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ' ô, midîna ianao, hoy ny mpanjaka!'
