document_id: MAL.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana ny mpisorona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao no fampitandremana ataon’ny TOMPOn’izao rehetra izao aminareo, ry mpisorona:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha tsy mihaino Ahy sy tsy miezaka ny hanome voninahitra ny anarako amin’ny fonareo ianareo, dia halefako hamely anareo ny ozona. Fa hovako ho ozona ny fitahiana nampanantenaiko anareo; eny, hataoko izany satria tsy tamin’ny fonareo marina no nandraisanareo ny didiko. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy tokana va ny raintsika rehetra? Tsy Andriamanitra iray va no nahary antsika? Koa nahoana no mivadika amin’ny namantsika avy isika, ka manimbazimba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' nifanaovan’Andriamanitra tamin’ireo razantsika? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nivadi-panekena ny vahoakan’i Joda. Zavatra maharikoriko no nataony tao Jerosalema sy tamin’ny tanin’i Israely manontolo; satria nozimbazimbainy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: toeramasina
    - type: text
      text: ' izay mamin’ny TOMPO'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny toeramasina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny lalàna masina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ary dia nanambady vehivavy mpivavaka amin’ny andriamani-kafa izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hoesorin’ny TOMPO tsy ho anisan’ny taranak’i Jakôba anie izay lehilahy manao izany na iza izy na iza, eny, fa na dia izay manolotra fanatitra ho an’ny TOMPOn’izao rehetra izao aza!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao koa no mbola ataonareo: ataonareo hotsa-dranomaso ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: 'n’ny TOMPO; mitomany sy midradradradra ianareo, satria tsy miraika amin’izay fanatitrareo intsony Izy ary tsy manaiky intsony izay zavatra aterinareo aminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia anontanianareo ny anton’ny tsy anekeny izany intsony. Ny antony dia satria efa nanaiky teo anatrehan’ny TOMPO ianareo fa ho mahatoky amin’ny vadin’ny fahatanoranareo. Vady vita fanekena taminareo izany, nefa dia nilaozanareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy efa nataon’ny TOMPO ho tena iray amin’ny vadinareo ve ianareo, ara-batana sy ara-panahy? Ary inona no tadiavin’izany tena iray izany? Moa va tsy ny hanan-taranaka araka an’Andriamanitra? Koa dia mitandrema tena ianareo, aza ilaozana ny vadin’ny fahatanoranareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Halako ny fisaoram-bady sy ny fihosenana amin’ny herisetra, hoy ny TOMPO Andriamanitr’i Israely sady Tompon’izao rehetra izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Halako ny fisaoram-bady sy ny fihosenana amin’ny herisetra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: meloka manao herisetra ny misao-bady am-pankahalana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Koa dia mitandrema tena ianareo ary aza mandao vady.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Handefa iraka ny Tompo
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manasatra ny TOMPO amin’ny teninareo ianareo. Nefa manontany ianareo hoe: «Dia amin’inona no anasaranay Azy?» Amin’ny filazànareo hoe: «Izay rehetra manao ratsy dia tsara eo imason’ny TOMPO, ary ny olona toy izany no sitrany.» Na koa amin’ny filazànareo hoe: «Aiza àry ilay Andriamanitra mampihatra ny rariny?»'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Efa mandrahona sahady ny taranakareo Aho; ianareo kosa hamafazako tain-droroha eny an-tavanareo, dia ny tain-drorohan’ireo biby nataonareo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' tamin’ny andro fety; ary hoesorina miaraka aminy koa ianareo. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia ho fantatrareo fa Izaho TOMPOn’izao rehetra izao no efa nampitandrina anareo mba haharetan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' amin’ny levita'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Ny fanekempihavanana tamin’ny levita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia tsy voalaza mazava na aiza na aiza ao amin’ny Testamenta Taloha na Fanekempihavanana Taloha. Ny mifanaraka amin’izany dia izao: ny taranak’i Levỳ irery ihany no afaka manao ny asan’ny mpisorona.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny fanekempihavanako taminy dia ahazoany fiainana sy fiadanana. Nomeko azy izany mba hanajany Ahy; ka dia nanaja Ahy sy nangovitra teo anatrehan’ny anarako izy. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Marina ny fampianarana nomeny ary tsy nisy fitaka teo amin’ny molony. Tamim-pahatoniana sy tamim-pahitsiana no niarahany tamiko ka nandreseny lahatra olona marobe hiala amin’ny faharatsiana. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa andraikitry ny mpisorona ny mampianatra ny olona hahalala Ahy Andriamanitra TOMPOn’izao rehetra izao; ny mpisorona no anontaniana ny fitsipika tokony hampiharina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Hag 2.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', satria mpitondrateniko izy. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ankehitriny efa nivily lalana ianareo mpisorona, ka nahasolafaka olona maro tamin’ny fampianaranareo. Noravanareo noho izany koa ny fanekempihavanako taminareo, hoy Izaho Tompon’izao rehetra izao. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa dia hampirisihiko ny vahoakan’i Israely rehetra haniratsira sy hanao tsinontsinona anareo, satria tsy nitandrina ny sori-dalako ianareo sady nizaha tavan’olona tamin’izay fanapahan-kevitrareo».
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fomba roa amadiham-panekena
    marker-yv: yv-h
