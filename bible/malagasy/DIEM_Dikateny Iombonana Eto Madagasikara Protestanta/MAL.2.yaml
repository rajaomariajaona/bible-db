document_id: MAL.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ny mpisorona
  - type: text
    content: '«Izao no fampitandremana ataon’ny TOMPOn’izao rehetra izao aminareo, ry mpisorona:'
  - type: text
    content: '–Raha tsy mihaino Ahy sy tsy miezaka ny hanome voninahitra ny anarako amin’ny fonareo ianareo, dia halefako hamely anareo ny ozona. Fa hovako ho ozona ny fitahiana nampanantenaiko anareo; eny, hataoko izany satria tsy tamin’ny fonareo marina no nandraisanareo ny didiko. '
  '10':
  - type: text
    content: 'Tsy tokana va ny raintsika rehetra? Tsy Andriamanitra iray va no nahary antsika? Koa nahoana no mivadika amin’ny namantsika avy isika, ka manimbazimba ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nifanaovan’Andriamanitra tamin’ireo razantsika? '
  '11':
  - type: text
    content: 'Efa nivadi-panekena ny vahoakan’i Joda. Zavatra maharikoriko no nataony tao Jerosalema sy tamin’ny tanin’i Israely manontolo; satria nozimbazimbainy ny '
  - type: text
    content: toeramasina
  - type: text
    content: ' izay mamin’ny TOMPO'
  - type: note
    content: 'ny toeramasina: dkt hafa ny lalàna masina.'
  - type: text
    content: ', ary dia nanambady vehivavy mpivavaka amin’ny andriamani-kafa izy. '
  '12':
  - type: text
    content: Hoesorin’ny TOMPO tsy ho anisan’ny taranak’i Jakôba anie izay lehilahy manao izany na iza izy na iza, eny, fa na dia izay manolotra fanatitra ho an’ny TOMPOn’izao rehetra izao aza!
  '13':
  - type: text
    content: 'Ary izao koa no mbola ataonareo: ataonareo hotsa-dranomaso ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO; mitomany sy midradradradra ianareo, satria tsy miraika amin’izay fanatitrareo intsony Izy ary tsy manaiky intsony izay zavatra aterinareo aminy. '
  '14':
  - type: text
    content: 'Dia anontanianareo ny anton’ny tsy anekeny izany intsony. Ny antony dia satria efa nanaiky teo anatrehan’ny TOMPO ianareo fa ho mahatoky amin’ny vadin’ny fahatanoranareo. Vady vita fanekena taminareo izany, nefa dia nilaozanareo. '
  '15':
  - type: text
    content: 'Tsy efa nataon’ny TOMPO ho tena iray amin’ny vadinareo ve ianareo, ara-batana sy ara-panahy? Ary inona no tadiavin’izany tena iray izany? Moa va tsy ny hanan-taranaka araka an’Andriamanitra? Koa dia mitandrema tena ianareo, aza ilaozana ny vadin’ny fahatanoranareo. '
  '16':
  - type: text
    content: «Halako ny fisaoram-bady sy ny fihosenana amin’ny herisetra, hoy ny TOMPO Andriamanitr’i Israely sady Tompon’izao rehetra izao
  - type: note
    content: 'Halako ny fisaoram-bady sy ny fihosenana amin’ny herisetra: dkt hafa meloka manao herisetra ny misao-bady am-pankahalana.'
  - type: text
    content: . Koa dia mitandrema tena ianareo ary aza mandao vady.»
  - type: heading
    content: Handefa iraka ny Tompo
  '17':
  - type: text
    content: 'Manasatra ny TOMPO amin’ny teninareo ianareo. Nefa manontany ianareo hoe: «Dia amin’inona no anasaranay Azy?» Amin’ny filazànareo hoe: «Izay rehetra manao ratsy dia tsara eo imason’ny TOMPO, ary ny olona toy izany no sitrany.» Na koa amin’ny filazànareo hoe: «Aiza àry ilay Andriamanitra mampihatra ny rariny?»'
  '3':
  - type: text
    content: 'Efa mandrahona sahady ny taranakareo Aho; ianareo kosa hamafazako tain-droroha eny an-tavanareo, dia ny tain-drorohan’ireo biby nataonareo '
  - type: text
    content: sorona
  - type: text
    content: ' tamin’ny andro fety; ary hoesorina miaraka aminy koa ianareo. '
  '4':
  - type: text
    content: 'Dia ho fantatrareo fa Izaho TOMPOn’izao rehetra izao no efa nampitandrina anareo mba haharetan’ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' amin’ny levita'
  - type: note
    content: 'Ny fanekempihavanana tamin’ny levita dia tsy voalaza mazava na aiza na aiza ao amin’ny Testamenta Taloha na Fanekempihavanana Taloha. Ny mifanaraka amin’izany dia izao: ny taranak’i Levỳ irery ihany no afaka manao ny asan’ny mpisorona.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ny fanekempihavanako taminy dia ahazoany fiainana sy fiadanana. Nomeko azy izany mba hanajany Ahy; ka dia nanaja Ahy sy nangovitra teo anatrehan’ny anarako izy. '
  '6':
  - type: text
    content: 'Marina ny fampianarana nomeny ary tsy nisy fitaka teo amin’ny molony. Tamim-pahatoniana sy tamim-pahitsiana no niarahany tamiko ka nandreseny lahatra olona marobe hiala amin’ny faharatsiana. '
  '7':
  - type: text
    content: Fa andraikitry ny mpisorona ny mampianatra ny olona hahalala Ahy Andriamanitra TOMPOn’izao rehetra izao; ny mpisorona no anontaniana ny fitsipika tokony hampiharina
  - type: note
    content: Jereo Hag 2.11 sy nta.
  - type: text
    content: ', satria mpitondrateniko izy. '
  '8':
  - type: text
    content: 'Fa ankehitriny efa nivily lalana ianareo mpisorona, ka nahasolafaka olona maro tamin’ny fampianaranareo. Noravanareo noho izany koa ny fanekempihavanako taminareo, hoy Izaho Tompon’izao rehetra izao. '
  '9':
  - type: text
    content: Koa dia hampirisihiko ny vahoakan’i Israely rehetra haniratsira sy hanao tsinontsinona anareo, satria tsy nitandrina ny sori-dalako ianareo sady nizaha tavan’olona tamin’izay fanapahan-kevitrareo».
  - type: heading
    content: Fomba roa amadiham-panekena
