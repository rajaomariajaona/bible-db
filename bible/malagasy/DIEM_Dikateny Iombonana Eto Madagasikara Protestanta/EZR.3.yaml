document_id: EZR.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Namerina indray ny fanompoam-pivavahana i Jesoa sy i Zerôbabela
  - type: text
    content: Nony tonga ny volana fahafito, ireo Israelita rehetra, izay efa samy tafapetraka teny amin’ny tanànany avy, dia nivory tany Jerosalema
  - type: note
    content: Ny volana fahafito (septambra-ôktôbra) dia ahitana fety jiosy maromaro izay samy manan-danja, voatanisa ao amin’ny Lev 23.23-43. Jereo manokana Lev 23.24 sy nta.
  - type: text
    content: ' toy ny olona iray ihany. '
  '10':
  - type: text
    content: Nony nandatsaka ny fototr’ilay tempolin’ny TOMPO ireo mpiasa, dia nasaina nanatrika teo ny mpisorona nanao fanamiana sy nitondra trômpetra ary koa ny levita terak’i Asafa nitondra kipantsona, mba hidera ny TOMPO araka ny nandidian’i Davida mpanjakan’i Israely
  - type: note
    content: Jereo 1 Tan 25.1.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Dia nidera sy nisaotra ny TOMPO ireto terak’i Asafa ka nanao hira nifamalivaly hoe: «Tsara ny Tompo, ary maharitra mandrakizay ny fitiavany an’i Israely!» Nihoby mafy koa ny vahoaka rehetra raha nidera ny TOMPO'
  - type: note
    content: Izany fiverenan-kira litorjika izany dia fahita koa ohatra ao amin’ny Jer 33.11; 1 Tan 16.34; 2 Tan 5.13 ary indrindra ao amin’ny Sal 136. –Ny hobin-kafaliana dia anisan’ny litorjia fa tsy hoe horakoraka be fahatany.
  - type: text
    content: ', satria vita ny fototry ny tranon’ny TOMPO.'
  '12':
  - type: text
    content: 'Maro ny mpisorona sy ny levita ary ny loham-pianakaviana, dia ireo antitra efa nahita ilay trano taloha, no nitomany mafy dia mafy nony nalatsaka teo imasony ny fototr’izany trano vaovao izany; nefa maro koa no nanandra-peo nihoby sy nifaly. '
  '13':
  - type: text
    content: Ka dia tsy hay navahany ny hobin-kafalian’ny andaniny sy ny feo fitomanian’ny ankilany, satria samy nanao horakoraka mafy sy re lavitra tokoa ny olona.
  '2':
  - type: text
    content: 'Tamin’izay i Jesoa, zanakalahin’i Jôtsadàka, sy ireo mpisorona mpiombom-panompoana aminy, ary koa i Zerôbabela, zanakalahin’i Sealtiela, sy ireo olona iray tarika aminy no nirotsaka nanorina ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’Ilay Andriamanitr’i Israely mba hanolorana '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo, araka izay voasoratra ao amin’ny lalànan’i Mosesy, olon’Andriamanitra'
  - type: note
    content: Jereo 2 Tan 4.1, ampit Eks 27.1-2.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Na dia nampahatahotra azy aza ireo valovotaka tao Joda, dia naorin’ny Israelita teo amin’ny toerany taloha ihany ny alitara; ary teo amboniny no nanolorany sorona dorana manontolo ho an’ny TOMPO, dia ireo sorona fanao maraina sy hariva
  - type: note
    content: 'valovotaka: vahiny niorim-ponenana tao Joda nandritra ny naha voasesitany an’ireo Israelita. –na dia nampatahotra asehon’ny toko 4 fa nisy tokoa ny anton-javatra nampatahotra an’ireo Jiosy tafaverina avy any an-tsesitany. –sorona dorana... hariva: jereo Eks 29.38-39; Nom 28.3-4.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: Avy eo dia nanao ny fankalazana ny Tranotomboka araka ny voasoratra koa ny Israelita ka nanolotra sorona dorana manontolo isan’andro araka izay voafetra hatao isan’andro
  - type: note
    content: Jereo Nom 29.12-38.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Taorian’izany dia natolotry ry zareo ny sorona dorana manontolo tsy tapaka sy ny sorona dorana manontolo fanao amin’ny voaloham-bolana na amin’ny fankalazana rehetra voatokana ho an’ny TOMPO
  - type: note
    content: Jereo Nom 28.11–29.39.
  - type: text
    content: ' ary koa ny avy amin’izay rehetra manao fanatitra an-tsitrapo ho Azy TOMPO. '
  '6':
  - type: text
    content: 'Amin’izao andro voalohan’ny volana fahafito izao ny Israelita no nanomboka nanolotra sorona dorana manontolo ho an’ny TOMPO, na dia mbola tsy nalatsaka akory aza ny fototr’ilay '
  - type: text
    content: tempoli
  - type: text
    content: n’ny TOMPO.
  '7':
  - type: text
    content: Dia nomeny vola ny mpipai-bato sy ny mpandrafitra; nomeny hanina amam-pisotro sy menaka ny Tirianina sy ny Tsidônianina mba hitondra hazo sedera avy any Libano ka hitatitra azy an-dranomasina hatrany Jafao
  - type: note
    content: Jafao seranana mitodika amin’ny Ranomasina Mediteranea; ankehitriny izy dia voatelin’i Tela-Aviva. –Ity and ity dia ampit 1 Mp 5.15-25.
  - type: text
    content: '. Araka ny fanomezan-dàlana nomen’i Kirôsa amperôran’i Persia no nanaovan’ny Israelita izany. '
  '8':
  - type: text
    content: Ary tamin’ny volana
  - type: note
    content: volana faharoa aprily-mey 537 tal J.K.
  - type: text
    content: ' faharoan’ny taona faharoa nahatongavany teo amin’ny tranon’Andriamanitra tao Jerosalema, dia nisantatra ilay asa i Zerobabela zanakalahin’i Sealtiela, sy i Jesoa zanakalahin’i Jôtsadàka mbamin’ireo mpisorona mpiombom-panompoana aminy sy ny '
  - type: text
    content: levita
  - type: text
    content: ' ary izay rehetra tafaverina avy any an-tsesitany ka tonga tao Jerosalema. Nanendry ny Levita hatramin’ny roapolo taona no ho miakatra ny daholobe mba ho tonian’izao asa amin’ny tranon’ny TOMPO izao; '
  '9':
  - type: text
    content: 'ary niray hina nijoro ho tonian’ny mpiasa ireo levita: dia ry i Jesoa sy i Kadmiela mirahalahy zanak’i Hôdavià mbamin’ny taranany avy, ireo zanakalahin’i Henadada'
  - type: note
    content: Tsy mazava loatra ny rijan-teny hebreo eto amin’ity and ity.
  - type: text
    content: ' mbamin’ny taranany avy, ary koa levita hafa mpiray foko aminy.'
