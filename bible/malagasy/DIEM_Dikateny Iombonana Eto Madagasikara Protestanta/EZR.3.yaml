document_id: EZR.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namerina indray ny fanompoam-pivavahana i Jesoa sy i Zerôbabela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nony tonga ny volana fahafito, ireo Israelita rehetra, izay efa samy tafapetraka teny amin’ny tanànany avy, dia nivory tany Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: volana fahafito
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (septambra-ôktôbra) dia ahitana fety jiosy maromaro izay samy manan-danja, voatanisa ao amin’ny Lev 23.23-43. Jereo manokana Lev 23.24 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' toy ny olona iray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’izay i Jesoa, zanakalahin’i Jôtsadàka, sy ireo mpisorona mpiombom-panompoana aminy, ary koa i Zerôbabela, zanakalahin’i Sealtiela, sy ireo olona iray tarika aminy no nirotsaka nanorina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: 'n’Ilay Andriamanitr’i Israely mba hanolorana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo, araka izay voasoratra ao amin’ny lalànan’i Mosesy, olon’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Tan 4.1, ampit Eks 27.1-2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Na dia nampahatahotra azy aza ireo valovotaka tao Joda, dia naorin’ny Israelita teo amin’ny toerany taloha ihany ny alitara; ary teo amboniny no nanolorany sorona dorana manontolo ho an’ny TOMPO, dia ireo sorona fanao maraina sy hariva
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'valovotaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'vahiny niorim-ponenana tao Joda nandritra ny naha voasesitany an’ireo Israelita. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –na dia nampatahotra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' asehon’ny toko 4 fa nisy tokoa ny anton-javatra nampatahotra an’ireo Jiosy tafaverina avy any an-tsesitany. –'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'sorona dorana... hariva:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Eks 29.38-39; Nom 28.3-4.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Avy eo dia nanao ny fankalazana ny Tranotomboka araka ny voasoratra koa ny Israelita ka nanolotra sorona dorana manontolo isan’andro araka izay voafetra hatao isan’andro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 29.12-38.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Taorian’izany dia natolotry ry zareo ny sorona dorana manontolo tsy tapaka sy ny sorona dorana manontolo fanao amin’ny voaloham-bolana na amin’ny fankalazana rehetra voatokana ho an’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 28.11–29.39.
    marker-yv: yv-n
  - type: text
    text: ' ary koa ny avy amin’izay rehetra manao fanatitra an-tsitrapo ho Azy TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin’izao andro voalohan’ny volana fahafito izao ny Israelita no nanomboka nanolotra sorona dorana manontolo ho an’ny TOMPO, na dia mbola tsy nalatsaka akory aza ny fototr’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoli
  - type: text
    text: n’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nomeny vola ny mpipai-bato sy ny mpandrafitra; nomeny hanina amam-pisotro sy menaka ny Tirianina sy ny Tsidônianina mba hitondra hazo sedera avy any Libano ka hitatitra azy an-dranomasina hatrany Jafao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jafao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: seranana mitodika amin’ny Ranomasina Mediteranea; ankehitriny izy dia voatelin’i Tela-Aviva. –Ity and ity dia ampit 1 Mp 5.15-25.
    marker-yv: yv-n
  - type: text
    text: '. Araka ny fanomezan-dàlana nomen’i Kirôsa amperôran’i Persia no nanaovan’ny Israelita izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary tamin’ny volana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'volana faharoa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aprily-mey 537 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ' faharoan’ny taona faharoa nahatongavany teo amin’ny tranon’Andriamanitra tao Jerosalema, dia nisantatra ilay asa i Zerobabela zanakalahin’i Sealtiela, sy i Jesoa zanakalahin’i Jôtsadàka mbamin’ireo mpisorona mpiombom-panompoana aminy sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' ary izay rehetra tafaverina avy any an-tsesitany ka tonga tao Jerosalema. Nanendry ny Levita hatramin’ny roapolo taona no ho miakatra ny daholobe mba ho tonian’izao asa amin’ny tranon’ny TOMPO izao; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary niray hina nijoro ho tonian’ny mpiasa ireo levita: dia ry i Jesoa sy i Kadmiela mirahalahy zanak’i Hôdavià mbamin’ny taranany avy, ireo zanakalahin’i Henadada'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy mazava loatra ny rijan-teny hebreo eto amin’ity and ity.
    marker-yv: yv-n
  - type: text
    text: ' mbamin’ny taranany avy, ary koa levita hafa mpiray foko aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nony nandatsaka ny fototr’ilay tempolin’ny TOMPO ireo mpiasa, dia nasaina nanatrika teo ny mpisorona nanao fanamiana sy nitondra trômpetra ary koa ny levita terak’i Asafa nitondra kipantsona, mba hidera ny TOMPO araka ny nandidian’i Davida mpanjakan’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Tan 25.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nidera sy nisaotra ny TOMPO ireto terak’i Asafa ka nanao hira nifamalivaly hoe: «Tsara ny Tompo, ary maharitra mandrakizay ny fitiavany an’i Israely!» Nihoby mafy koa ny vahoaka rehetra raha nidera ny TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Izany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fiverenan-kira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' litorjika izany dia fahita koa ohatra ao amin’ny Jer 33.11; 1 Tan 16.34; 2 Tan 5.13 ary indrindra ao amin’ny Sal 136. –Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hobin-kafaliana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia anisan’ny litorjia fa tsy hoe horakoraka be fahatany.'
    marker-yv: yv-n
  - type: text
    text: ', satria vita ny fototry ny tranon’ny TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Maro ny mpisorona sy ny levita ary ny loham-pianakaviana, dia ireo antitra efa nahita ilay trano taloha, no nitomany mafy dia mafy nony nalatsaka teo imasony ny fototr’izany trano vaovao izany; nefa maro koa no nanandra-peo nihoby sy nifaly. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka dia tsy hay navahany ny hobin-kafalian’ny andaniny sy ny feo fitomanian’ny ankilany, satria samy nanao horakoraka mafy sy re lavitra tokoa ny olona.
