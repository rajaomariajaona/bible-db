document_id: 1KI.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toromarika farany nomen’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nandindona an’i Davida ny andro hahafatesany, dia nandidy an’i Salômôna zanany lahy izy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Efa ho faty araka ny lalan-kizoran’ny besinimaro aho; koa aoka ianao hahery sy hiseho ho tena lehilahy! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tandremo izay andidian’ny TOMPO Andriamanitrao hanarahanao ny sori-dalany ary hitandrovanao ny lalànany sy ny didiny amam-pitsipiny sy ny sàtany araka ny voasoratra ao amin’ny lalànan’i Mosesy; dia hahomby ianao amin’izay rehetra hataonao sy hokasainao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hotanterahin’ny TOMPO ilay fampanantenana izay nambarany tamiko hoe: «Raha tandreman’ireo taranakao ny fitondrantenany ka amin’ny fony manontolo sy ny fanahiny manontolo no izorany eo anatrehako amim-pahitsiana, dia tsy ho diso zanakalahy handimby eo amin’ny sezafiandrianan’i Israely ianao.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ankoatra izany, ianao koa mahalala ny ratsy rehetra nataon’i Jôaba zanakalahin’i Tseroià tamiko sy tamin’ny filohan’ny tafik’i Israely roa lahy, dia i Abinera zanakalahin’i Nera sy i Hamasà zanakalahin’i Jetera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 3.26-27; 20.9-10.
    marker-yv: yv-n
  - type: text
    text: ' izay samy novonoiny ho faty sady nalatsany ra toy ny amin’ny ady nefa tsy nisy ady akory; ka dia tompon’andraikitra feno izy ny amin’ny nafitsony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa araka ny fahendrenao no ataovy, ary aza avela ho tratra antitra amim-piadanana izy no hidina any amin’ny toeran’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ireo zanakalahin’i Barzilay avy any Gilehada kosa dia asio soa ary aoka izy hihinana eo amin’ny latabatrao, satria tonga namonjy ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 17.27-29; 19.32-33.
    marker-yv: yv-n
  - type: text
    text: ' izy fony aho nandositra an’i Absalôma rahalahinao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Farany dia aza hadino i Simehỳ zanakalahin’i Gerà sady Benjaminita avy any Bahorima. Mafy loatra ny nanozonany ahy tamin’ny andro nankanesako tany Mahanaîma; nefa nidina nitsena ahy tao Jôrdàna izy, ka dia nianiana tamin’ny TOMPO aho fa tsy hamono azy ho faty amin’ny sabatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 16.5-13; 19.16-24.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa ankehitriny, aza atao afa-maina izy, fa lehilahy hendry ianao ka mahafantatra izay tokony hanaovana azy; na dia efa antitra aza izy, dia amin’ny fandatsahan-dra no hampidinanao azy any amin’ny toeran’ny maty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maty i Davida ary i Salômôna no mandimby azy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 29.26-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany i Davida, dia nalevina tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tanànan’i Davida
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Naharitra efapolo taona no nanjakàn’i Davida tamin’i Israely, ka fito taona tao Hebrôna ary telo amby telopolo taona tao Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 5.1-5; 1 Tan 3.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I Salômôna no nipetraka teo amin’ny sezafiandrianan’i Davida rainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Salômôna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia nanomboka nanjaka tamin’ny taona 970 tal J.K. tany ho any.
    marker-yv: yv-n
  - type: text
    text: ' ary niorina tsara ny fahefàm-panjakany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Adônià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Indray andro dia nankany amin’i Baty-Seba renin’i Salômôna i Adônià zanakalahin’i Hagita. Ary hoy ravehivavy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hitondra fihavanana va no ahatongavanao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy koa izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Misy teny kely holazaiko aminao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ravehivavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazao àry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fantatrao fa ahy ny fanjakana, ary i Israely iray manontolo no efa nitodika tamiko mba hampanjaka ahy; kanjo dia tafahodina ny fanjakana ka lasan’ny rahalahiko, satria izay no sitrapon’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Zavatra tokana no mba angatahiko aminao ankehitriny, ka aoka re mba tsy holavinao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy ravehivavy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazao àry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Adônià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miangavy anao re aho hiteny amin’i Salômôna mpanjaka, (fa tsy handà anao izy) mba hanomezany ahy an’i Abisaga avy any Sonema ho vadiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy i Baty-Seba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny àry fa dia hiteny momba anao amin’ny mpanjaka aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nankany amin’i Salômôna mpanjaka i Baty-Seba hiteny aminy momba an’i Adônià. Ary nitsangana nitsena an’i Baty-Seba ny mpanjaka sady niondrika teo anatrehany; dia niverina nipetraka teo amin’ny sezafiandrianany izy ary nasainy nasiana sezafiandrianana iray ho an-dreniny teo ankavanany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy i Baty-Seba taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Misy zavatra kely iray angatahiko aminao, ka aoka mba tsy holavinao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’ny mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Angataho izay tianao, ry neny, fa tsy handà izany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy ravehivavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka homena an’i Adônià rahalahinao i Abisaga avy any Sonema mba ho vadiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy i Salômôna namaly an-dreniny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ianao no mangataka an’i Abisaga avy any Sonema ho an’i Adônià? Angataho ho azy koa ny fanjakana satria izy no zokiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 3.7 sy nta; 16.21-22.
    marker-yv: yv-n
  - type: text
    text: ; dia ho azy izany sy ho an’i Abiatara mpisorona ary ho an’i Jôaba zanakalahin’i Tseroià?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nianiana tamin’ny TOMPO i Salômôna mpanjaka ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka hataon’Andriamanitra amiko ny famaizana faran’izay mafy raha tsy hataoko maty i Adônià noho izany teniny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Velona ny TOMPO Izay nampitoetra sy nametraka ahy teo amin’ny sezafiandrianan’i Davida raiko sady nampanantena ho ahy sy ny taranako ny fahefà-manjaka, koa mianiana aho fa tsy maintsy maty anio ihany i Adônià!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary i Salômôna naniraka an’i Benaià zanakalahin’i Jôiadà mba hamely azy. Dia maty tokoa i Adônià.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Roahin’i Salômôna tao Jerosalema i Abiatara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hoy kosa ny mpanjaka tamin’i Abiatara mpisorona:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mankanesa any Hanatôta any amin’ny taninao, fa olona mendrika ho faty ianao; nefa tsy anio akory no hataoko maty ianao, satria efa mba nitondra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasin
  - type: text
    text: ’ny Tompo ANDRIANANAHARY ihany ianao tamin’ny andron’i Davida raiko sady niara-niaritra ny mafy rehetra nozakainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hanatôta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tokony ho 4 km avaratra andrefan’i Jerosalema; tanindrazan’i Jeremià mpaminany (jereo Jer 1.1). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nitondra ny Vatamasin’...ianao:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 2 Sam 15.24-29. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny mafy rehetra nozakainy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 1 Sam 22.20-33.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary naongan’i Salômôna tsy ho mpisoron’ny TOMPO intsony i Abiatara; ka dia tanteraka ny teny nolazain’ny TOMPO tao Silao ny amin’ny taranak’i Helỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Sam 2.30-36.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahafatesan’i Jôaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vao ren’i Jôaba ny nanjo an’i Adônià sy i Abiatara, dia nandositra nankao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolain
  - type: text
    text: '’ny TOMPO izy ka namikitra tamin’ny tandroky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fanaovan-tsorona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.50 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. I Jôaba manko niandany tamin’i Adônià, kanefa tsy nanaraka an’i Absalôma. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nisy olona nanambara ny vaovao tamin’i Salômôna ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nandositra ao amin’ny Tranolain’ny TOMPO i Jôaba ka mialokaloka eo akaikin’ny alitara.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia naniraka olona i Salômôna mba hamototra an’i Jôaba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ianao no nialokaloka eto akaikin’ny alitara?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’i Jôaba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Natahotra anao aho ka nialokaloka eto akaikin’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Dia naniraka... akaikin’ny Tompo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt tranainy grika izany; tsy hita ao amin’ny RM ireo andalan-teny ireo.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nirahin’i Salômôna hankany i Benaià zanakalahin’i Jôiadà ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha vonoy ho faty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nankany amin’ny Tranolain’ny TOMPO i Benaià ka niteny tamin’i Jôaba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny mpanjaka: Mivoaha tao ianao!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy kosa izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, fa eto no hahafatesako.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nankany amin’ny mpanjaka indray i Benaià nitondra ny valin-tenin’i Jôaba. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ataovy araka izay nolazainy; ka vonoy ho faty izy, dia aleveno mba ho voaesotrao amiko sy amin’ny taranaky ny raiko ny andraikitra amin’ny famonoan’i Jôaba ho faty ny olona anankiroa. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hataon’ny TOMPO manody an’i Jôaba anie izany, satria olona roa tsy manan-tsiny akory sady tsara fanahy noho izy no nasiany tamin’ny sabatra ka maty, dia i Abinera zanakalahin’i Nera sady filohan-tafik’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy i Hamasà zanakalahin’i Jetera sady filohan-tafik’i Joda, nefa i Davida raiko tsy mba nahafantatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Eny, hanody tokoa amin’i Jôaba sy ny taranany mandrakizay izany; fa fiadanana mandrakizay avy amin’ny TOMPO kosa no ho amin’i Davida sy ny taranany mbamin’ny fianakaviany ary ny sezafiandrianany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niverina niakatra tany amin’i Jôaba i Benaià zanakalahin’i Jôiadà ka namely sy nahafaty azy; ary dia nalevina tao amin’ny toeram-ponenany tany an-taniefitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: I Benaià zanakalahin’i Jôiadà no nasolon’ny mpanjaka azy ho filohan-tafika, ary i Tsadôka mpisorona kosa no nasolony an’i Abiatara.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahafatesan’i Simehỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nampiantso an’i Simehỳ ny mpanjaka, ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Manaova trano eto Jerosalema ka mitoera ao; ary aza miala ao mihitsy ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fantaro tsara fa ho faty ianao amin’ny andro izay hialanao ao ka hitànao ny lohasahan-driaka Kidrôna; dia ho tompon’andraikitra samirery amin’ny hahafatesanao ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ka hoy i Simehỳ tamin’ny mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsara izany, ry andriamanjaka, fa araka izay nolazainao no hataoko.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nitoetra ela tao Jerosalema i Simehỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Kanjo telo taona taorian’izany, dia nisy mpanompon’i Simehỳ roa lahy nandositra ho any amin’i Akisa zanakalahin’i Mahekà sady mpanjakan’i Gata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.39 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gata: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 5.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. Rehefa nilazana i Simehỳ fa indreo any Gata ny mpanompony, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'dia nanisy lasely ny borikiny izy, ka niainga nankany Gata ho any amin’i Akisa haka ny mpanompony. Dia nitodi-doha niverina niaraka tamin’ny mpanompony i Simehỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fa nisy nanambara tamin’i Salômôna ny nankanesan’i Simehỳ tany Gata sy ny niverenany indray tao Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Koa nampiantso an’i Simehỳ ny mpanjaka, ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy efa nampianiana anao tamin’ny TOMPO ve aho mba tsy hiala amin’ny tanàna? Ary tsy efa nampitandrina anao ve aho fa raha miala ao ianao, dia tsy maintsy ho faty? Dia hoy ianao namaly ahy tamin’izay hoe: «Tsara izany!» '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Koa nahoana ianao no tsy nitana ny fianianana natao tamin’ny TOMPO? Nahoana no tsy notandremanao ny didy izay nomeko anao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary hoy koa ny mpanjaka tamin’i Simehỳ:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fantatrao ny ratsy rehetra nataonao tamin’i Davida raiko; eny, tsaroan’ny fonao izany; ka dia hataon’ny TOMPO manody anao ny haratsianao. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Izaho Salômôna mpanjaka kosa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hotahina
  - type: text
    text: ; ary ny sezafiandrianan’i Davida hampitoerina mandrakizay eo anatrehan’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 7.13-16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Dia nanome baiko an’i Benaià zanakalahin’i Jôiadà ny mpanjaka; dia nivoaka ny trano izy io ka namely an’i Simehỳ ho faty.
- type: usfm
  marker: p
  children:
  - type: text
    text: Toy izany no nanamafisana ny fahefana maha mpanjaka teo an-tanan’i Salômôna.
