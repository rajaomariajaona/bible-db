document_id: 1KI.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny toromarika farany nomen’i Davida
  - type: text
    content: 'Rehefa nandindona an’i Davida ny andro hahafatesany, dia nandidy an’i Salômôna zanany lahy izy nanao hoe:'
  '10':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Davida, dia nalevina tao an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: '. '
  '11':
  - type: text
    content: Naharitra efapolo taona no nanjakàn’i Davida tamin’i Israely, ka fito taona tao Hebrôna ary telo amby telopolo taona tao Jerosalema
  - type: note
    content: Jereo 2 Sam 5.1-5; 1 Tan 3.4.
  - type: text
    content: '. '
  '12':
  - type: text
    content: I Salômôna no nipetraka teo amin’ny sezafiandrianan’i Davida rainy
  - type: note
    content: I Salômôna dia nanomboka nanjaka tamin’ny taona 970 tal J.K. tany ho any.
  - type: text
    content: ' ary niorina tsara ny fahefàm-panjakany.'
  - type: heading
    content: Ny nahafatesan’i Adônià
  '13':
  - type: text
    content: 'Indray andro dia nankany amin’i Baty-Seba renin’i Salômôna i Adônià zanakalahin’i Hagita. Ary hoy ravehivavy taminy:'
  - type: text
    content: –Hitondra fihavanana va no ahatongavanao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Eny!
  '14':
  - type: text
    content: 'Ary hoy koa izy:'
  - type: text
    content: –Misy teny kely holazaiko aminao.
  - type: text
    content: 'Dia hoy ravehivavy:'
  - type: text
    content: –Lazao àry.
  '15':
  - type: text
    content: 'Dia hoy izy:'
  - type: text
    content: '–Fantatrao fa ahy ny fanjakana, ary i Israely iray manontolo no efa nitodika tamiko mba hampanjaka ahy; kanjo dia tafahodina ny fanjakana ka lasan’ny rahalahiko, satria izay no sitrapon’ny TOMPO. '
  '16':
  - type: text
    content: Zavatra tokana no mba angatahiko aminao ankehitriny, ka aoka re mba tsy holavinao.
  - type: text
    content: 'Ary hoy ravehivavy taminy:'
  - type: text
    content: –Lazao àry.
  '17':
  - type: text
    content: 'Dia hoy i Adônià:'
  - type: text
    content: –Miangavy anao re aho hiteny amin’i Salômôna mpanjaka, (fa tsy handà anao izy) mba hanomezany ahy an’i Abisaga avy any Sonema ho vadiko.
  '18':
  - type: text
    content: 'Hoy i Baty-Seba:'
  - type: text
    content: –Eny àry fa dia hiteny momba anao amin’ny mpanjaka aho.
  '19':
  - type: text
    content: 'Dia nankany amin’i Salômôna mpanjaka i Baty-Seba hiteny aminy momba an’i Adônià. Ary nitsangana nitsena an’i Baty-Seba ny mpanjaka sady niondrika teo anatrehany; dia niverina nipetraka teo amin’ny sezafiandrianany izy ary nasainy nasiana sezafiandrianana iray ho an-dreniny teo ankavanany. '
  '2':
  - type: text
    content: '–Efa ho faty araka ny lalan-kizoran’ny besinimaro aho; koa aoka ianao hahery sy hiseho ho tena lehilahy! '
  '20':
  - type: text
    content: 'Ary hoy i Baty-Seba taminy:'
  - type: text
    content: –Misy zavatra kely iray angatahiko aminao, ka aoka mba tsy holavinao.
  - type: text
    content: 'Ka novalian’ny mpanjaka hoe:'
  - type: text
    content: –Angataho izay tianao, ry neny, fa tsy handà izany aho.
  '21':
  - type: text
    content: 'Dia hoy ravehivavy:'
  - type: text
    content: –Aoka homena an’i Adônià rahalahinao i Abisaga avy any Sonema mba ho vadiny.
  '22':
  - type: text
    content: 'Fa hoy i Salômôna namaly an-dreniny:'
  - type: text
    content: –Nahoana ianao no mangataka an’i Abisaga avy any Sonema ho an’i Adônià? Angataho ho azy koa ny fanjakana satria izy no zokiko
  - type: note
    content: Jereo 2 Sam 3.7 sy nta; 16.21-22.
  - type: text
    content: ; dia ho azy izany sy ho an’i Abiatara mpisorona ary ho an’i Jôaba zanakalahin’i Tseroià?
  '23':
  - type: text
    content: 'Dia nianiana tamin’ny TOMPO i Salômôna mpanjaka ka nanao hoe:'
  - type: text
    content: '–Aoka hataon’Andriamanitra amiko ny famaizana faran’izay mafy raha tsy hataoko maty i Adônià noho izany teniny izany. '
  '24':
  - type: text
    content: Velona ny TOMPO Izay nampitoetra sy nametraka ahy teo amin’ny sezafiandrianan’i Davida raiko sady nampanantena ho ahy sy ny taranako ny fahefà-manjaka, koa mianiana aho fa tsy maintsy maty anio ihany i Adônià!
  '25':
  - type: text
    content: Ary i Salômôna naniraka an’i Benaià zanakalahin’i Jôiadà mba hamely azy. Dia maty tokoa i Adônià.
  - type: heading
    content: Roahin’i Salômôna tao Jerosalema i Abiatara
  '26':
  - type: text
    content: 'Hoy kosa ny mpanjaka tamin’i Abiatara mpisorona:'
  - type: text
    content: '–Mankanesa any Hanatôta any amin’ny taninao, fa olona mendrika ho faty ianao; nefa tsy anio akory no hataoko maty ianao, satria efa mba nitondra ny '
  - type: text
    content: Vatamasin
  - type: text
    content: ’ny Tompo ANDRIANANAHARY ihany ianao tamin’ny andron’i Davida raiko sady niara-niaritra ny mafy rehetra nozakainy
  - type: note
    content: 'Hanatôta: toerana tokony ho 4 km avaratra andrefan’i Jerosalema; tanindrazan’i Jeremià mpaminany (jereo Jer 1.1). –nitondra ny Vatamasin’...ianao: jereo 2 Sam 15.24-29. –ny mafy rehetra nozakainy: jereo 1 Sam 22.20-33.'
  - type: text
    content: .
  '27':
  - type: text
    content: Ary naongan’i Salômôna tsy ho mpisoron’ny TOMPO intsony i Abiatara; ka dia tanteraka ny teny nolazain’ny TOMPO tao Silao ny amin’ny taranak’i Helỳ
  - type: note
    content: Jereo 1 Sam 2.30-36.
  - type: text
    content: .
  - type: heading
    content: Ny fahafatesan’i Jôaba
  '28':
  - type: text
    content: 'Vao ren’i Jôaba ny nanjo an’i Adônià sy i Abiatara, dia nandositra nankao amin’ny '
  - type: text
    content: Tranolain
  - type: text
    content: '’ny TOMPO izy ka namikitra tamin’ny tandroky ny '
  - type: text
    content: alitara
  - type: text
    content: ' fanaovan-tsorona'
  - type: note
    content: Jereo 1.50 sy nta.
  - type: text
    content: '. I Jôaba manko niandany tamin’i Adônià, kanefa tsy nanaraka an’i Absalôma. '
  '29':
  - type: text
    content: 'Ary nisy olona nanambara ny vaovao tamin’i Salômôna ka nanao hoe:'
  - type: text
    content: –Nandositra ao amin’ny Tranolain’ny TOMPO i Jôaba ka mialokaloka eo akaikin’ny alitara.
  - type: text
    content: 'Dia naniraka olona i Salômôna mba hamototra an’i Jôaba hoe:'
  - type: text
    content: –Nahoana ianao no nialokaloka eto akaikin’ny alitara?
  - type: text
    content: 'Ka novalian’i Jôaba hoe:'
  - type: text
    content: –Natahotra anao aho ka nialokaloka eto akaikin’ny TOMPO
  - type: note
    content: 'Dia naniraka... akaikin’ny Tompo: araka ny dkt tranainy grika izany; tsy hita ao amin’ny RM ireo andalan-teny ireo.'
  - type: text
    content: .
  - type: text
    content: 'Dia nirahin’i Salômôna hankany i Benaià zanakalahin’i Jôiadà ka nilazany hoe:'
  - type: text
    content: –Andeha vonoy ho faty izy.
  '3':
  - type: text
    content: 'Tandremo izay andidian’ny TOMPO Andriamanitrao hanarahanao ny sori-dalany ary hitandrovanao ny lalànany sy ny didiny amam-pitsipiny sy ny sàtany araka ny voasoratra ao amin’ny lalànan’i Mosesy; dia hahomby ianao amin’izay rehetra hataonao sy hokasainao. '
  '30':
  - type: text
    content: 'Dia nankany amin’ny Tranolain’ny TOMPO i Benaià ka niteny tamin’i Jôaba hoe:'
  - type: text
    content: '–Izao no lazain’ny mpanjaka: Mivoaha tao ianao!'
  - type: text
    content: 'Hoy kosa izy:'
  - type: text
    content: –Tsia, fa eto no hahafatesako.
  - type: text
    content: 'Dia nankany amin’ny mpanjaka indray i Benaià nitondra ny valin-tenin’i Jôaba. '
  '31':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy:'
  - type: text
    content: '–Ataovy araka izay nolazainy; ka vonoy ho faty izy, dia aleveno mba ho voaesotrao amiko sy amin’ny taranaky ny raiko ny andraikitra amin’ny famonoan’i Jôaba ho faty ny olona anankiroa. '
  '32':
  - type: text
    content: 'Hataon’ny TOMPO manody an’i Jôaba anie izany, satria olona roa tsy manan-tsiny akory sady tsara fanahy noho izy no nasiany tamin’ny sabatra ka maty, dia i Abinera zanakalahin’i Nera sady filohan-tafik’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy i Hamasà zanakalahin’i Jetera sady filohan-tafik’i Joda, nefa i Davida raiko tsy mba nahafantatra izany. '
  '33':
  - type: text
    content: Eny, hanody tokoa amin’i Jôaba sy ny taranany mandrakizay izany; fa fiadanana mandrakizay avy amin’ny TOMPO kosa no ho amin’i Davida sy ny taranany mbamin’ny fianakaviany ary ny sezafiandrianany.
  '34':
  - type: text
    content: 'Dia niverina niakatra tany amin’i Jôaba i Benaià zanakalahin’i Jôiadà ka namely sy nahafaty azy; ary dia nalevina tao amin’ny toeram-ponenany tany an-taniefitra izy. '
  '35':
  - type: text
    content: I Benaià zanakalahin’i Jôiadà no nasolon’ny mpanjaka azy ho filohan-tafika, ary i Tsadôka mpisorona kosa no nasolony an’i Abiatara.
  - type: heading
    content: Ny fahafatesan’i Simehỳ
  '36':
  - type: text
    content: 'Nampiantso an’i Simehỳ ny mpanjaka, ka nanao taminy hoe:'
  - type: text
    content: '–Manaova trano eto Jerosalema ka mitoera ao; ary aza miala ao mihitsy ianao. '
  '37':
  - type: text
    content: Fantaro tsara fa ho faty ianao amin’ny andro izay hialanao ao ka hitànao ny lohasahan-driaka Kidrôna; dia ho tompon’andraikitra samirery amin’ny hahafatesanao ianao.
  '38':
  - type: text
    content: 'Ka hoy i Simehỳ tamin’ny mpanjaka:'
  - type: text
    content: –Tsara izany, ry andriamanjaka, fa araka izay nolazainao no hataoko.
  - type: text
    content: 'Dia nitoetra ela tao Jerosalema i Simehỳ. '
  '39':
  - type: text
    content: Kanjo telo taona taorian’izany, dia nisy mpanompon’i Simehỳ roa lahy nandositra ho any amin’i Akisa zanakalahin’i Mahekà sady mpanjakan’i Gata
  - type: note
    content: 'Gata: jereo 1 Sam 5.8 sy nta.'
  - type: text
    content: '. Rehefa nilazana i Simehỳ fa indreo any Gata ny mpanompony, '
  '4':
  - type: text
    content: 'Ary hotanterahin’ny TOMPO ilay fampanantenana izay nambarany tamiko hoe: «Raha tandreman’ireo taranakao ny fitondrantenany ka amin’ny fony manontolo sy ny fanahiny manontolo no izorany eo anatrehako amim-pahitsiana, dia tsy ho diso zanakalahy handimby eo amin’ny sezafiandrianan’i Israely ianao.» '
  '40':
  - type: text
    content: 'dia nanisy lasely ny borikiny izy, ka niainga nankany Gata ho any amin’i Akisa haka ny mpanompony. Dia nitodi-doha niverina niaraka tamin’ny mpanompony i Simehỳ. '
  '41':
  - type: text
    content: 'Fa nisy nanambara tamin’i Salômôna ny nankanesan’i Simehỳ tany Gata sy ny niverenany indray tao Jerosalema. '
  '42':
  - type: text
    content: 'Koa nampiantso an’i Simehỳ ny mpanjaka, ka nanao taminy hoe:'
  - type: text
    content: '–Tsy efa nampianiana anao tamin’ny TOMPO ve aho mba tsy hiala amin’ny tanàna? Ary tsy efa nampitandrina anao ve aho fa raha miala ao ianao, dia tsy maintsy ho faty? Dia hoy ianao namaly ahy tamin’izay hoe: «Tsara izany!» '
  '43':
  - type: text
    content: Koa nahoana ianao no tsy nitana ny fianianana natao tamin’ny TOMPO? Nahoana no tsy notandremanao ny didy izay nomeko anao?
  '44':
  - type: text
    content: 'Ary hoy koa ny mpanjaka tamin’i Simehỳ:'
  - type: text
    content: '–Fantatrao ny ratsy rehetra nataonao tamin’i Davida raiko; eny, tsaroan’ny fonao izany; ka dia hataon’ny TOMPO manody anao ny haratsianao. '
  '45':
  - type: text
    content: 'Izaho Salômôna mpanjaka kosa '
  - type: text
    content: hotahina
  - type: text
    content: ; ary ny sezafiandrianan’i Davida hampitoerina mandrakizay eo anatrehan’ny TOMPO
  - type: note
    content: Jereo 2 Sam 7.13-16.
  - type: text
    content: .
  '46':
  - type: text
    content: Dia nanome baiko an’i Benaià zanakalahin’i Jôiadà ny mpanjaka; dia nivoaka ny trano izy io ka namely an’i Simehỳ ho faty.
  - type: text
    content: Toy izany no nanamafisana ny fahefana maha mpanjaka teo an-tanan’i Salômôna.
  '5':
  - type: text
    content: Ankoatra izany, ianao koa mahalala ny ratsy rehetra nataon’i Jôaba zanakalahin’i Tseroià tamiko sy tamin’ny filohan’ny tafik’i Israely roa lahy, dia i Abinera zanakalahin’i Nera sy i Hamasà zanakalahin’i Jetera
  - type: note
    content: Jereo 2 Sam 3.26-27; 20.9-10.
  - type: text
    content: ' izay samy novonoiny ho faty sady nalatsany ra toy ny amin’ny ady nefa tsy nisy ady akory; ka dia tompon’andraikitra feno izy ny amin’ny nafitsony. '
  '6':
  - type: text
    content: 'Koa araka ny fahendrenao no ataovy, ary aza avela ho tratra antitra amim-piadanana izy no hidina any amin’ny toeran’ny maty. '
  '7':
  - type: text
    content: Fa ireo zanakalahin’i Barzilay avy any Gilehada kosa dia asio soa ary aoka izy hihinana eo amin’ny latabatrao, satria tonga namonjy ahy
  - type: note
    content: Jereo 2 Sam 17.27-29; 19.32-33.
  - type: text
    content: ' izy fony aho nandositra an’i Absalôma rahalahinao. '
  '8':
  - type: text
    content: Farany dia aza hadino i Simehỳ zanakalahin’i Gerà sady Benjaminita avy any Bahorima. Mafy loatra ny nanozonany ahy tamin’ny andro nankanesako tany Mahanaîma; nefa nidina nitsena ahy tao Jôrdàna izy, ka dia nianiana tamin’ny TOMPO aho fa tsy hamono azy ho faty amin’ny sabatra
  - type: note
    content: Jereo 2 Sam 16.5-13; 19.16-24.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Koa ankehitriny, aza atao afa-maina izy, fa lehilahy hendry ianao ka mahafantatra izay tokony hanaovana azy; na dia efa antitra aza izy, dia amin’ny fandatsahan-dra no hampidinanao azy any amin’ny toeran’ny maty.
  - type: heading
    content: Maty i Davida ary i Salômôna no mandimby azy
  - type: heading
    content: (Jereo 1 Tan 29.26-28)
