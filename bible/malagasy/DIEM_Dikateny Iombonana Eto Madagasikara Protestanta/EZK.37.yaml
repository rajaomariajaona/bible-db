  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilaza ny hafatra araka izay nandidian’ny Tompo ahy aho. Fa raha mbola nampita ilay hafatra aho, dia nisy feon-javatra nifanaretsaka: nihetsiketsika sady nifanatonkatona ny taolana, samy nanatona ny taolana namany avy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
