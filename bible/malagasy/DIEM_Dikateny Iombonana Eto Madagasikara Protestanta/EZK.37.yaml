document_id: EZK.37,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitana momba ny taola-maina
  - type: text
    content: 'Ary ny herin’ny TOMPO nanindry ahy; ka ny Fanahiny no nitondran’ny TOMPO ahy ary nametrahany ahy tao amin’ny lohasaha midadasika iray rakotra taolana. '
  '10':
  - type: text
    content: Dia nilaza ilay hafatra araka izay nandidian’ny Tompo ahy aho. Koa nidiran’ny fofonaina ireo faty ireo, dia velona indray. Nitsangana tamin’ny tongony izy ary nanjary tafika iray lehibe dia lehibe.
  '11':
  - type: text
    content: 'Ary hoy indray ny Tompo tamiko: «Ry ilay taranak’olombelona, ireo taola-maina ireo dia sarin’ny vahoaka israelita rehetra. Fa hoy ny Israelita hoe: ‹Tahaka ny taola-maina izahay, levona ny fanantenanay, fongotra izahay.› '
  '12':
  - type: text
    content: 'Noho izany, ijoroy ny maha-mpaminany anao ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hosokafako ny fasanareo, ry vahoakako, ka hampiakariko avy any ianareo, ary haveriko ao Israely tanindrazanareo. '
  '13':
  - type: text
    content: 'Amin’izay dia hoekenareo fa Izaho no TOMPO, rehefa voasokatro ny fasanareo, ry vahoakako, ka hampiakariko avy ao ianareo; '
  '14':
  - type: text
    content: ary hapetrako ao anatinareo ny Fanahiko
  - type: note
    content: Jereo ny naoty momba ny and 9.
  - type: text
    content: ' dia ho velona ianareo ka hamponeniko indray ao an-tanindrazanareo. Eny, amin’izay dia hoekenareo fa Izaho TOMPO no nampanantena sady nahatanteraka izany; teny hentitra avy amiko TOMPO izany›. »'
  - type: heading
    content: Haverin’ny Tompo ny firaisan’ny vahoakany
  '15':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '16':
  - type: text
    content: '«Ianao, ry ilay taranak’olombelona, makà tapa-kazo iray ka asio soratra hoe: ‹I Joda sy ny Israelita amin’io fanjakana io.› Avy eo, makà tapa-kazo iray hafa ka asio soratra hoe: ‹I Jôsefa (na Efraîma) sy ny Israelita amin’io fanjakana io'
  - type: note
    content: I Joda dia ilazana ny fanjakana atsimo (jereo 1 Mp 12 sy 13). –I Jôsefa (rain’i Efraîma) dia ilazana ireo foko tao amin’ny fanjakana avaratra, izay nanjavona hatramin’ny naharesy an’i Samaria ka nahalasan-ko babo ny mponina tao tamin’ny taona 721 tal J.K.
  - type: text
    content: '.› '
  '17':
  - type: text
    content: 'Ampifanatony hifanohy ireo tapa-kazo anankiroa ireo mba hanjary tapa-kazo iray ihany eo an-tananao. '
  '18':
  - type: text
    content: 'Hangataka ny hanazavanao izany ireo mpiray firenena aminao; '
  '19':
  - type: text
    content: 'ka hambaranao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: Halaiko ny tapa-kazo iray izay mampiseho an’i Jôsefa sy ny Israelita ao aminy mba hatohiko amin’ilay mampiseho ny fanjakan’i Joda, dia hatambatro ho tapa-kazo iray izy roa ka hanjary iray ihany eo an-tanako.'
  '2':
  - type: text
    content: Ary nentiny nandehandeha nanodidina an’ireo aho tao amin’izany lohasaha izany; ka indreo maro dia maro ny taolana sady maina tanteraka.
  '20':
  - type: text
    content: '«Ary ianao, ry Ezekiela, dia hitazona tsara eny an-tananao ireo tapa-kazo izay nasianao soratra mba ho hitan’ny besinimaro. '
  '21':
  - type: text
    content: 'Ary ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: Ry Israelita, halaiko eo anivon’ny firenena izay nalehanareo ianareo, hangoniko avy any rehetra any ka haveriko ao an-tanindrazanareo. '
  '22':
  - type: text
    content: 'Ao no hamoriako anareo ho firenena iray eny an-tendrombohitr’i Israely. Ary mpanjaka iray ihany no hanjaka aminareo rehetra, ka tsy ho firenena roa intsony ianareo sady tsy hivaky ho fanjakana roa intsony. '
  '23':
  - type: text
    content: Tsy handoto tena amin’ny fanompoan-tsampy intsony ianareo na amin’ny fanaovana zava-mahatsiravina na amin’ny fahadisoana hafa rehetra. Fa hafahako amin’ny fikomiana
  - type: note
    content: 'fikomiana (meshûbôt): araka ny stf hebreo vitsivitsy sy ny dkt tranainy anankiray; fa ny RM mahazatra kosa manao hoe fonenana (môshebôt).'
  - type: text
    content: ' rehetra izay nanotanareo tamiko ianareo. '
  - type: text
    content: Hodioviko
  - type: text
    content: ' ianareo, ka dia ho vahoakako ary Izaho ho Andriamanitrareo. '
  '24':
  - type: text
    content: 'I Davida mpanompoko no ho mpanjakanareo ka izy irery ihany no ho '
  - type: text
    content: mpiandry
  - type: text
    content: ' anareo rehetra. Dia hanaraka ny fitsipiko ianareo sady hitandrina ny lalànako sy hanatanteraka ireny. '
  '25':
  - type: text
    content: Ary honenanareo ny tany izay nomeko an’i Jakôba mpanompoko sady efa nonenan’ireo razanareo. Ao no honenanareo hatrany, dia ny tenanareo sy ny zanakareo mbamin’ny taranakareo; ary i Davida mpanompoko no ho printsy filohanareo mandrakizay
  - type: note
    content: Jereo ny naoty momba ny 34.24.
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Hanao fanekempihavanana aminareo Aho, dia fanekempihavanana haharitra mandrakizay. Hataoko miorim-ponenana eo ianareo ka hampitomboiko ny mponina ao aminareo; ary hampitoeriko eo anivonareo mandrakizay ny '
  - type: text
    content: tempoliko
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Hiara-monina aminareo Aho, ka Izaho ho Andriamanitrareo ary ianareo kosa ho vahoakako. '
  '28':
  - type: text
    content: Amin’izay dia hoeken’ireo hafa firenena fa Izaho no TOMPO, Izay manokana an’i Israely hanompo Ahy rehefa tafaorina eo anivonareo mandrakizay ny tempoliko.»
  '3':
  - type: text
    content: 'Dia nanontany ahy ny TOMPO hoe:'
  - type: text
    content: –Ry ilay taranak’olombelona, moa mety ho velona indray ve ireo taola-maina ireo?
  - type: text
    content: 'Ka novaliako hoe:'
  - type: text
    content: –Ry Tompo ANDRIANANAHARY ô, Ianao irery ihany no mahalala.
  '4':
  - type: text
    content: 'Ary hoy indray Izy tamiko:'
  - type: text
    content: –Ijoroy ny maha-
  - type: text
    content: mpaminany
  - type: text
    content: ' anao manoloana ireo taola-maina ireo ka mitenena aminy hoe: «Ry taola-maina, mihainoa ny tenin’ny TOMPO ianareo! '
  '5':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY aminareo: Hasiako fofonaina indray ianareo, dia ho velona. '
  '6':
  - type: text
    content: Hasiako hozatra ianareo ary hampaniriko nofo sy hosaronako hoditra; dia hasiako fofonaina ianareo ka ho velona. Amin’izay dia hoekenareo fa Izaho no TOMPO.»
  '7':
  - type: text
    content: 'Dia nilaza ny hafatra araka izay nandidian’ny Tompo ahy aho. Fa raha mbola nampita ilay hafatra aho, dia nisy feon-javatra nifanaretsaka: nihetsiketsika sady nifanatonkatona ny taolana, samy nanatona ny taolana namany avy. '
  '8':
  - type: text
    content: 'Ary hitako naniry hozatra sy nofo sady nisarona hoditra izy, nefa tsy mbola nisy fofonaina tao aminy. '
  '9':
  - type: text
    content: 'Dia hoy ny Tompo tamiko: «Ry ilay taranak’olombelona, ijoroy ny maha-mpaminany anao ny amin’ny fofonaina, eny, ijoroy ny maha-mpaminany anao ka mitenena aminy hoe: ‹Ry fofonaina, mandidy anao ny Tompo ANDRIANANAHARY mba ho tonga avy amin’ny vazan-tany efatra ianao ka hitsoka amin’ireo faty ireo mba ho velona indray izy'
  - type: note
    content: Ny voambolana voadika hoe fofonaina eto dia mety milaza koa hoe fanahy ary izay no andikana azy eo amin’ny and 14.
  - type: text
    content: '.› '
