document_id: EZK.37
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahitana momba ny taola-maina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny herin’ny TOMPO nanindry ahy; ka ny Fanahiny no nitondran’ny TOMPO ahy ary nametrahany ahy tao amin’ny lohasaha midadasika iray rakotra taolana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nentiny nandehandeha nanodidina an’ireo aho tao amin’izany lohasaha izany; ka indreo maro dia maro ny taolana sady maina tanteraka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanontany ahy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry ilay taranak’olombelona, moa mety ho velona indray ve ireo taola-maina ireo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliako hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Tompo ANDRIANANAHARY ô, Ianao irery ihany no mahalala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy indray Izy tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ijoroy ny maha-
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anao manoloana ireo taola-maina ireo ka mitenena aminy hoe: «Ry taola-maina, mihainoa ny tenin’ny TOMPO ianareo! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain’ny Tompo ANDRIANANAHARY aminareo: Hasiako fofonaina indray ianareo, dia ho velona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hasiako hozatra ianareo ary hampaniriko nofo sy hosaronako hoditra; dia hasiako fofonaina ianareo ka ho velona. Amin’izay dia hoekenareo fa Izaho no TOMPO.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nilaza ny hafatra araka izay nandidian’ny Tompo ahy aho. Fa raha mbola nampita ilay hafatra aho, dia nisy feon-javatra nifanaretsaka: nihetsiketsika sady nifanatonkatona ny taolana, samy nanatona ny taolana namany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hitako naniry hozatra sy nofo sady nisarona hoditra izy, nefa tsy mbola nisy fofonaina tao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy ny Tompo tamiko: «Ry ilay taranak’olombelona, ijoroy ny maha-mpaminany anao ny amin’ny fofonaina, eny, ijoroy ny maha-mpaminany anao ka mitenena aminy hoe: ‹Ry fofonaina, mandidy anao ny Tompo ANDRIANANAHARY mba ho tonga avy amin’ny vazan-tany efatra ianao ka hitsoka amin’ireo faty ireo mba ho velona indray izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny voambolana voadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fofonaina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia mety milaza koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fanahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ary izay no andikana azy eo amin’ny and 14.'
    marker-yv: yv-n
  - type: text
    text: '.› '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nilaza ilay hafatra araka izay nandidian’ny Tompo ahy aho. Koa nidiran’ny fofonaina ireo faty ireo, dia velona indray. Nitsangana tamin’ny tongony izy ary nanjary tafika iray lehibe dia lehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy indray ny Tompo tamiko: «Ry ilay taranak’olombelona, ireo taola-maina ireo dia sarin’ny vahoaka israelita rehetra. Fa hoy ny Israelita hoe: ‹Tahaka ny taola-maina izahay, levona ny fanantenanay, fongotra izahay.› '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Noho izany, ijoroy ny maha-mpaminany anao ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hosokafako ny fasanareo, ry vahoakako, ka hampiakariko avy any ianareo, ary haveriko ao Israely tanindrazanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Amin’izay dia hoekenareo fa Izaho no TOMPO, rehefa voasokatro ny fasanareo, ry vahoakako, ka hampiakariko avy ao ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ary hapetrako ao anatinareo ny Fanahiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty momba ny and 9.
    marker-yv: yv-n
  - type: text
    text: ' dia ho velona ianareo ka hamponeniko indray ao an-tanindrazanareo. Eny, amin’izay dia hoekenareo fa Izaho TOMPO no nampanantena sady nahatanteraka izany; teny hentitra avy amiko TOMPO izany›. »'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haverin’ny Tompo ny firaisan’ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Ianao, ry ilay taranak’olombelona, makà tapa-kazo iray ka asio soratra hoe: ‹I Joda sy ny Israelita amin’io fanjakana io.› Avy eo, makà tapa-kazo iray hafa ka asio soratra hoe: ‹I Jôsefa (na Efraîma) sy ny Israelita amin’io fanjakana io'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ilazana ny fanjakana atsimo (jereo 1 Mp 12 sy 13). –I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôsefa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (rain’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Efraîma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) dia ilazana ireo foko tao amin’ny fanjakana avaratra, izay nanjavona hatramin’ny naharesy an’i Samaria ka nahalasan-ko babo ny mponina tao tamin’ny taona 721 tal J.K.
    marker-yv: yv-n
  - type: text
    text: '.› '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ampifanatony hifanohy ireo tapa-kazo anankiroa ireo mba hanjary tapa-kazo iray ihany eo an-tananao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hangataka ny hanazavanao izany ireo mpiray firenena aminao; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka hambaranao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: Halaiko ny tapa-kazo iray izay mampiseho an’i Jôsefa sy ny Israelita ao aminy mba hatohiko amin’ilay mampiseho ny fanjakan’i Joda, dia hatambatro ho tapa-kazo iray izy roa ka hanjary iray ihany eo an-tanako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Ary ianao, ry Ezekiela, dia hitazona tsara eny an-tananao ireo tapa-kazo izay nasianao soratra mba ho hitan’ny besinimaro. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: Ry Israelita, halaiko eo anivon’ny firenena izay nalehanareo ianareo, hangoniko avy any rehetra any ka haveriko ao an-tanindrazanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ao no hamoriako anareo ho firenena iray eny an-tendrombohitr’i Israely. Ary mpanjaka iray ihany no hanjaka aminareo rehetra, ka tsy ho firenena roa intsony ianareo sady tsy hivaky ho fanjakana roa intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy handoto tena amin’ny fanompoan-tsampy intsony ianareo na amin’ny fanaovana zava-mahatsiravina na amin’ny fahadisoana hafa rehetra. Fa hafahako amin’ny fikomiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fikomiana '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(meshûbôt): araka ny stf hebreo vitsivitsy sy ny dkt tranainy anankiray; fa ny RM mahazatra kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fonenana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (môshebôt).'
    marker-yv: yv-n
  - type: text
    text: ' rehetra izay nanotanareo tamiko ianareo. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hodioviko
  - type: text
    text: ' ianareo, ka dia ho vahoakako ary Izaho ho Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I Davida mpanompoko no ho mpanjakanareo ka izy irery ihany no ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' anareo rehetra. Dia hanaraka ny fitsipiko ianareo sady hitandrina ny lalànako sy hanatanteraka ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary honenanareo ny tany izay nomeko an’i Jakôba mpanompoko sady efa nonenan’ireo razanareo. Ao no honenanareo hatrany, dia ny tenanareo sy ny zanakareo mbamin’ny taranakareo; ary i Davida mpanompoko no ho printsy filohanareo mandrakizay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty momba ny 34.24.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hanao fanekempihavanana aminareo Aho, dia fanekempihavanana haharitra mandrakizay. Hataoko miorim-ponenana eo ianareo ka hampitomboiko ny mponina ao aminareo; ary hampitoeriko eo anivonareo mandrakizay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliko
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hiara-monina aminareo Aho, ka Izaho ho Andriamanitrareo ary ianareo kosa ho vahoakako. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Amin’izay dia hoeken’ireo hafa firenena fa Izaho no TOMPO, Izay manokana an’i Israely hanompo Ahy rehefa tafaorina eo anivonareo mandrakizay ny tempoliko.»
