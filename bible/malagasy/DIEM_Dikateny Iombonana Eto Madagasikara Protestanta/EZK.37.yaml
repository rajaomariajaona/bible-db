    - type: text
      text: Ny fahitana momba ny taola-maina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny herin’ny TOMPO nanindry ahy; ka ny Fanahiny no nitondran’ny TOMPO ahy ary nametrahany ahy tao amin’ny lohasaha midadasika iray rakotra taolana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nilaza ilay hafatra araka izay nandidian’ny Tompo ahy aho. Koa nidiran’ny fofonaina ireo faty ireo, dia velona indray. Nitsangana tamin’ny tongony izy ary nanjary tafika iray lehibe dia lehibe.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray ny Tompo tamiko: «Ry ilay taranak’olombelona, ireo taola-maina ireo dia sarin’ny vahoaka israelita rehetra. Fa hoy ny Israelita hoe: ‹Tahaka ny taola-maina izahay, levona ny fanantenanay, fongotra izahay.› '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, ijoroy ny maha-mpaminany anao ka ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hosokafako ny fasanareo, ry vahoakako, ka hampiakariko avy any ianareo, ary haveriko ao Israely tanindrazanareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay dia hoekenareo fa Izaho no TOMPO, rehefa voasokatro ny fasanareo, ry vahoakako, ka hampiakariko avy ao ianareo; '
  '14':
