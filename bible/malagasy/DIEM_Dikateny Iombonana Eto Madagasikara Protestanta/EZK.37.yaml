      text: 'ka hambaranao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: Halaiko ny tapa-kazo iray izay mampiseho an’i Jôsefa sy ny Israelita ao aminy mba hatohiko amin’ilay mampiseho ny fanjakan’i Joda, dia hatambatro ho tapa-kazo iray izy roa ka hanjary iray ihany eo an-tanako.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nentiny nandehandeha nanodidina an’ireo aho tao amin’izany lohasaha izany; ka indreo maro dia maro ny taolana sady maina tanteraka.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ary ianao, ry Ezekiela, dia hitazona tsara eny an-tananao ireo tapa-kazo izay nasianao soratra mba ho hitan’ny besinimaro. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: Ry Israelita, halaiko eo anivon’ny firenena izay nalehanareo ianareo, hangoniko avy any rehetra any ka haveriko ao an-tanindrazanareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao no hamoriako anareo ho firenena iray eny an-tendrombohitr’i Israely. Ary mpanjaka iray ihany no hanjaka aminareo rehetra, ka tsy ho firenena roa intsony ianareo sady tsy hivaky ho fanjakana roa intsony. '
  '23':
