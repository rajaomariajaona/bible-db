verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO I Tsiôna fonenan’ny Tompo sy tanànan’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hira fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, ny zavatra rehetra niaretan’i Davida
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mba tsarovy hanasoavanao azy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Noho ny amin’i Davida mpanomponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aza lavina ity mpanjaka voahosotrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 8-10: ampit 2 Tan 6.41-42.'
      marker-yv: yv-n
    - type: text
      text: .»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny TOMPO efa nanao fianianana tamin’i Davida
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka tsy hivadika amin’ny marina voalazany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Iray amin’ireo zanakalahinao no hataoko mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handimby anao amin’ny sezafiandriananao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha ny zanakao mitandrina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny fepetra izay hampitaiko aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zanany lahy hatrany hatrany koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hipetraka eo amin’ny sezafiandriananao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Sam 7.12-16; 1 Tan 17.11-14; Sal 89.4-5; Asa 2.30.
      marker-yv: yv-n
    - type: text
      text: .»
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny TOMPO efa nifidy an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tiany hatao fonenana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: «Intỳ, hoy Izy, no toeram-pitsaharako hatrany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eto no honenako! Eny, eto no tiako!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hotahîko tokoa i Tsiôna, homeko ny sakafo hivelomany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataoko voky hanina ireo mahantra ao aminy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny mpisorony hotafîko famonjena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpivavaka hanao hobin-kafaliana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ao no hataoko mpanjaka mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny solofo iray avy amin’i Davida;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho toy ny fanilo maharitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany mpanjaka voahosotro izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 11.36.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fahavalony hotafîko henatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fehiloha manjelatra kosa no eo aminy.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsarovy fa taminao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanaovany fianianana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: taminao, ry ilay Maherin’i Jakôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no nanaovany voady hoe:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: «Tsy hiditra ny tranolay fonenako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hiakatra ny farafara fandriako,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: tsy hamela ny masoko hatory aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny hodi-masoko ho rendremana,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: mandra-pahitako toerana ho an’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fonenana ho an’ilay Maherin’i Jakôba.»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Indro henonay hoe any Efratà
