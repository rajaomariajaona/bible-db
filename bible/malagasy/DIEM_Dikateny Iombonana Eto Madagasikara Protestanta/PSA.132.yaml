      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.6a '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efratà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tanàna niorina teo akaikin’i Betela, tao anatin’ny faritanin’ny foko Efraîma; tsy tokony hampifangaroina amin’i '
      - type: usfm
        marker: it
