    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.6b '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny vatamasina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo Eks 25.10-22. Noheverina ho toy ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sezafiandrianan’ny Tompo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izany na ho toy ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fitoeran-tongony
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 7): jereo Nom 10.33-36; 1 Sam 4.3-8; Sal 99.5.'
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hitanay tao amin’ny sahan’i Jahara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.6d '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jahara: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toa fanafohezana ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kiriata-Jeharîma
      - type: usfm
        marker: ft
        children:
        - type: text
