          text: Jereo Sal 99.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: '!'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Avia, TOMPO ô, ho amin’ny toeram-pitsaharanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ianao sy ilay Vatamasina maneho ny herinao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aoka ny mpisorona hitafy fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpivavaka aminao hihoby an-kafaliana!
