document_id: PSA.132,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO I Tsiôna fonenan’ny Tompo sy tanànan’i Davida
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: TOMPO ô, ny zavatra rehetra niaretan’i Davida
  - type: text
    content: dia mba tsarovy hanasoavanao azy.
  '10':
  - type: text
    content: Noho ny amin’i Davida mpanomponao,
  - type: text
    content: dia aza lavina ity mpanjaka voahosotrao
  - type: note
    content: 'And 8-10: ampit 2 Tan 6.41-42.'
  - type: text
    content: .»
  '11':
  - type: text
    content: Ny TOMPO efa nanao fianianana tamin’i Davida
  - type: text
    content: 'ka tsy hivadika amin’ny marina voalazany hoe:'
  - type: text
    content: «Iray amin’ireo zanakalahinao no hataoko mpanjaka
  - type: text
    content: handimby anao amin’ny sezafiandriananao.
  '12':
  - type: text
    content: 'Raha ny zanakao mitandrina ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: mbamin’ny fepetra izay hampitaiko aminy,
  - type: text
    content: dia zanany lahy hatrany hatrany koa
  - type: text
    content: no hipetraka eo amin’ny sezafiandriananao
  - type: note
    content: Jereo 2 Sam 7.12-16; 1 Tan 17.11-14; Sal 89.4-5; Asa 2.30.
  - type: text
    content: .»
  '13':
  - type: text
    content: 'Ny TOMPO efa nifidy an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: izay tiany hatao fonenana.
  '14':
  - type: text
    content: «Intỳ, hoy Izy, no toeram-pitsaharako hatrany.
  - type: text
    content: Eto no honenako! Eny, eto no tiako!
  '15':
  - type: text
    content: Hotahîko tokoa i Tsiôna, homeko ny sakafo hivelomany;
  - type: text
    content: hataoko voky hanina ireo mahantra ao aminy.
  '16':
  - type: text
    content: Ny mpisorony hotafîko famonjena,
  - type: text
    content: ny mpivavaka hanao hobin-kafaliana.
  '17':
  - type: text
    content: Ao no hataoko mpanjaka mahery
  - type: text
    content: ny solofo iray avy amin’i Davida;
  - type: text
    content: ary ho toy ny fanilo maharitra
  - type: text
    content: izany mpanjaka voahosotro izany
  - type: note
    content: Jereo 1 Mp 11.36.
  - type: text
    content: .
  '18':
  - type: text
    content: Ny fahavalony hotafîko henatra,
  - type: text
    content: fa fehiloha manjelatra kosa no eo aminy.»
  '2':
  - type: text
    content: Tsarovy fa taminao, TOMPO ô,
  - type: text
    content: no nanaovany fianianana;
  - type: text
    content: taminao, ry ilay Maherin’i Jakôba,
  - type: text
    content: 'no nanaovany voady hoe:'
  '3':
  - type: text
    content: «Tsy hiditra ny tranolay fonenako aho
  - type: text
    content: na hiakatra ny farafara fandriako,
  '4':
  - type: text
    content: tsy hamela ny masoko hatory aho
  - type: text
    content: na ny hodi-masoko ho rendremana,
  '5':
  - type: text
    content: mandra-pahitako toerana ho an’ny TOMPO,
  - type: text
    content: dia fonenana ho an’ilay Maherin’i Jakôba.»
  '6':
  - type: text
    content: Indro henonay hoe any Efratà
  - type: note
    content: 'Efratà: tanàna niorina teo akaikin’i Betela, tao anatin’ny faritanin’ny foko Efraîma; tsy tokony hampifangaroina amin’i Efratà-Betlehema.'
  - type: text
    content: 'ny '
  - type: text
    content: Vatamasina
  - type: note
    content: 'ny vatamasina: jereo Eks 25.10-22. Noheverina ho toy ny sezafiandrianan’ny Tompo izany na ho toy ny fitoeran-tongony (and 7): jereo Nom 10.33-36; 1 Sam 4.3-8; Sal 99.5.'
  - type: text
    content: ;
  - type: text
    content: ary hitanay tao amin’ny sahan’i Jahara
  - type: note
    content: 'Jahara: toa fanafohezana ny hoe Kiriata-Jeharîma, izay tanàna 12 km teo andrefan’i Jerosalema. Momba ny fifindrafindran-toeran’ny Vatamasina, dia jereo 1 Sam 5.1-7; 2 Sam 6.1-19.'
  - type: text
    content: .
  '7':
  - type: text
    content: «Koa ndeha isika ho any amin’ny fonenan’ny Tompo
  - type: text
    content: sy hiankohoka eo anoloan’ny fitoeran-tongony
  - type: note
    content: Jereo Sal 99.5 sy nta.
  - type: text
    content: '!'
  '8':
  - type: text
    content: Avia, TOMPO ô, ho amin’ny toeram-pitsaharanao,
  - type: text
    content: dia Ianao sy ilay Vatamasina maneho ny herinao.
  '9':
  - type: text
    content: Aoka ny mpisorona hitafy fahamarinana,
  - type: text
    content: ny mpivavaka aminao hihoby an-kafaliana!
