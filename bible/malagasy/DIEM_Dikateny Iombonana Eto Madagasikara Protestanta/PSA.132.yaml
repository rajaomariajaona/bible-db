    - type: text
      text: sy hiankohoka eo anoloan’ny fitoeran-tongony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.7 '
      - type: usfm
        marker: ft
        children:
