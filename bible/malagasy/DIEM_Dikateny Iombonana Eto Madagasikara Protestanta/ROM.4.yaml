document_id: ROM.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny finoana no nahatonga an’i Abrahama ho marina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Inona àry no holazaintsika ho efa notsapan’i Abrahama razambenay Jiosy? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha ny asa vitan’i Abrahama no naneken’Andriamanitra azy ho marina, dia ho nahazo nirehareha i Abrahama. Tsy izany anefa no toe-javatra eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa inona tokoa moa no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: '? «Nino an’Andriamanitra i Abrahama ary nankatoavan’Andriamanitra azy ho marina izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 15.6.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy azo heverina ho fanomezana ny karaman’izay manao ny asa, fa heverina ho toy ny trosa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay tsy manao asa nefa mino an’ilay Andriamanitra mahatonga ireo ratsy fanahy ho marina, dia izany finoany izany no iheveran’Andriamanitra azy ho marina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Andriamanitra... fanahy ho marina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra mandray tsara ireo ratsy fanahy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Toy izany no ilazan’i Davida hoe sambatra ny olona, raha tsy ny asa vitany no iheveran’Andriamanitra azy ho marina:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Sambatra ireo navelan’Andriamanitra fahotana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nofoanany heloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sambatra ny olona tsy itanan’ny Tompo heloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 7-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 32.1-2.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ho an’iza moa izany fahasambarana izany? Ho an’ny voafora ve sa ho an’ny tsy voafora koa? Voatsiahiko teo ny tenin’ny Soratra Masina hoe: «Ny finoana no nankatoavan’Andriamanitra an’i Abrahama ho marina.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ahoana izany? Tamin’i Abrahama efa voafora sa fony izy tsy mbola voafora? Tsy tamin’izy efa voafora tsy akory, fa fony izy tsy mbola voafora; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famorana
  - type: text
    text: ' dia famantarana noraisin’i Abrahama tatỳ aoriana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 17.9-14.
    marker-yv: yv-n
  - type: text
    text: ', ho toy ny tombokase manamarika fa neken’Andriamanitra ho marina izy satria nino, dia fony izy tsy mbola voafora. Koa tonga rain’izay rehetra tsy voafora i Abrahama: dia ireo tsy voafora nefa nino ka neken’Andriamanitra ho marina; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'sady tonga rainay voafora ihany koa: dia izahay sady voafora no manara-dia an’i Abrahama razanay izay efa nino fony tsy mbola voafora.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny finoana no ahazoana fampanantenana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nampanantenain’Andriamanitra fa handova izao tontolo izao i Abrahama sy ny taranany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 12.2-3; 17.4-6; 22.15-18.
    marker-yv: yv-n
  - type: text
    text: '. Tsy noho izy ireo nandala '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: ', fa noho izy ireo nino ka neken’Andriamanitra ho marina no nahazoany izany fampanantenana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha ny fanatanterahana ny lalàna no nahatonga azy ireo ho mpandova, dia ho poaka àty ny finoana ary ho foana ny fampanantenana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa mahatonga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: ' ny lalàna; ka raha tsy misy ny lalàna, dia tsy hisy koa ny fandikan-dalàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Noho izany, dia avy amin’ny finoana no ahazoana ny fampanantenana, hany ka fanomezana azo antoka ho an’ny taranak’i Abrahama rehetra: tsy ho an’izay mandala ny lalàna ihany, fa ho an’izay mino tahaka ny nataon’i Abrahama koa. Fa raintsika rehetra i Abrahama, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'araka ny voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Nahatonga anao ho raim-pirenena maro Aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 17.5.
    marker-yv: yv-n
  - type: text
    text: '.» Eny, raintsika rehetra izy eo anatrehan’ilay Andriamanitra ninoany, dia ilay Andriamanitra mamelona ny maty sy mampisy ny tsy misy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nanantena i Abrahama na dia tsy nisy hanantenany aza, ary dia nino fa ho tonga «raim-pirenena» maro, araka ny voalazan’Andriamanitra taminy hoe: «Ho tahaka izany ny taranakao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 15.5.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy nalemy finoana i Abrahama raha nandinika ny tenany izay naman’ny maty, fa efa tokony ho zato taona izy tamin’izay, ary koa raha nandinika an’i Sarà vadiny, izay tsy afa-niteraka intsony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 17.1, 15-22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy very finoana ny amin’ny fampanantenana izay nataon’Andriamanitra i Abrahama, fa vao mainka aza nankahery azy ny finoany; ka dia nanome voninahitra an’Andriamanitra izy, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'sady natoky mihitsy fa izay nampanantenain’Andriamanitra dia hain’Andriamanitra tanterahina. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izany no «nankatoavan’Andriamanitra azy ho marina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 53.4-6.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tsy ho an’i Abrahama ihany anefa ilay voasoratra hoe «nankatoavan’Andriamanitra azy ho marina», '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa ho antsika koa, dia isika mino Ilay nanangana an’i Jesoa Tompontsika ho velona avy tany amin’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa natolotra ho faty noho ny fahotantsika i Jesoa ary natsangana ho velona mba hahatonga antsika ho olo-marina eo imason’Andriamanitra.
