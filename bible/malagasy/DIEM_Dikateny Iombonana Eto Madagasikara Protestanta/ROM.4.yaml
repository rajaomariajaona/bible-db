document_id: ROM.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny finoana no nahatonga an’i Abrahama ho marina
  - type: text
    content: 'Inona àry no holazaintsika ho efa notsapan’i Abrahama razambenay Jiosy? '
  '10':
  - type: text
    content: 'Ary ahoana izany? Tamin’i Abrahama efa voafora sa fony izy tsy mbola voafora? Tsy tamin’izy efa voafora tsy akory, fa fony izy tsy mbola voafora; '
  '11':
  - type: text
    content: 'fa ny '
  - type: text
    content: famorana
  - type: text
    content: ' dia famantarana noraisin’i Abrahama tatỳ aoriana'
  - type: note
    content: Jereo Gen 17.9-14.
  - type: text
    content: ', ho toy ny tombokase manamarika fa neken’Andriamanitra ho marina izy satria nino, dia fony izy tsy mbola voafora. Koa tonga rain’izay rehetra tsy voafora i Abrahama: dia ireo tsy voafora nefa nino ka neken’Andriamanitra ho marina; '
  '12':
  - type: text
    content: 'sady tonga rainay voafora ihany koa: dia izahay sady voafora no manara-dia an’i Abrahama razanay izay efa nino fony tsy mbola voafora.'
  - type: heading
    content: Ny finoana no ahazoana fampanantenana
  '13':
  - type: text
    content: Nampanantenain’Andriamanitra fa handova izao tontolo izao i Abrahama sy ny taranany
  - type: note
    content: Jereo Gen 12.2-3; 17.4-6; 22.15-18.
  - type: text
    content: '. Tsy noho izy ireo nandala '
  - type: text
    content: lalàna
  - type: text
    content: ', fa noho izy ireo nino ka neken’Andriamanitra ho marina no nahazoany izany fampanantenana izany. '
  '14':
  - type: text
    content: 'Raha ny fanatanterahana ny lalàna no nahatonga azy ireo ho mpandova, dia ho poaka àty ny finoana ary ho foana ny fampanantenana. '
  '15':
  - type: text
    content: 'Fa mahatonga ny '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' ny lalàna; ka raha tsy misy ny lalàna, dia tsy hisy koa ny fandikan-dalàna.'
  '16':
  - type: text
    content: 'Noho izany, dia avy amin’ny finoana no ahazoana ny fampanantenana, hany ka fanomezana azo antoka ho an’ny taranak’i Abrahama rehetra: tsy ho an’izay mandala ny lalàna ihany, fa ho an’izay mino tahaka ny nataon’i Abrahama koa. Fa raintsika rehetra i Abrahama, '
  '17':
  - type: text
    content: 'araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Nahatonga anao ho raim-pirenena maro Aho'
  - type: note
    content: Gen 17.5.
  - type: text
    content: '.» Eny, raintsika rehetra izy eo anatrehan’ilay Andriamanitra ninoany, dia ilay Andriamanitra mamelona ny maty sy mampisy ny tsy misy. '
  '18':
  - type: text
    content: 'Nanantena i Abrahama na dia tsy nisy hanantenany aza, ary dia nino fa ho tonga «raim-pirenena» maro, araka ny voalazan’Andriamanitra taminy hoe: «Ho tahaka izany ny taranakao'
  - type: note
    content: Gen 15.5.
  - type: text
    content: '.» '
  '19':
  - type: text
    content: Tsy nalemy finoana i Abrahama raha nandinika ny tenany izay naman’ny maty, fa efa tokony ho zato taona izy tamin’izay, ary koa raha nandinika an’i Sarà vadiny, izay tsy afa-niteraka intsony
  - type: note
    content: Jereo Gen 17.1, 15-22.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Raha ny asa vitan’i Abrahama no naneken’Andriamanitra azy ho marina, dia ho nahazo nirehareha i Abrahama. Tsy izany anefa no toe-javatra eo anatrehan’Andriamanitra. '
  '20':
  - type: text
    content: 'Tsy very finoana ny amin’ny fampanantenana izay nataon’Andriamanitra i Abrahama, fa vao mainka aza nankahery azy ny finoany; ka dia nanome voninahitra an’Andriamanitra izy, '
  '21':
  - type: text
    content: 'sady natoky mihitsy fa izay nampanantenain’Andriamanitra dia hain’Andriamanitra tanterahina. '
  '22':
  - type: text
    content: Izany no «nankatoavan’Andriamanitra azy ho marina
  - type: note
    content: Jereo Is 53.4-6.
  - type: text
    content: '.» '
  '23':
  - type: text
    content: 'Tsy ho an’i Abrahama ihany anefa ilay voasoratra hoe «nankatoavan’Andriamanitra azy ho marina», '
  '24':
  - type: text
    content: 'fa ho antsika koa, dia isika mino Ilay nanangana an’i Jesoa Tompontsika ho velona avy tany amin’ny maty. '
  '25':
  - type: text
    content: Fa natolotra ho faty noho ny fahotantsika i Jesoa ary natsangana ho velona mba hahatonga antsika ho olo-marina eo imason’Andriamanitra.
  '3':
  - type: text
    content: 'Fa inona tokoa moa no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: '? «Nino an’Andriamanitra i Abrahama ary nankatoavan’Andriamanitra azy ho marina izany'
  - type: note
    content: Gen 15.6.
  - type: text
    content: '!» '
  '4':
  - type: text
    content: 'Tsy azo heverina ho fanomezana ny karaman’izay manao ny asa, fa heverina ho toy ny trosa. '
  '5':
  - type: text
    content: Izay tsy manao asa nefa mino an’ilay Andriamanitra mahatonga ireo ratsy fanahy ho marina, dia izany finoany izany no iheveran’Andriamanitra azy ho marina
  - type: note
    content: 'Andriamanitra... fanahy ho marina: dkt hafa Andriamanitra mandray tsara ireo ratsy fanahy.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Toy izany no ilazan’i Davida hoe sambatra ny olona, raha tsy ny asa vitany no iheveran’Andriamanitra azy ho marina:'
  '7':
  - type: text
    content: «Sambatra ireo navelan’Andriamanitra fahotana
  - type: text
    content: sy nofoanany heloka.
  '8':
  - type: text
    content: Sambatra ny olona tsy itanan’ny Tompo heloka
  - type: note
    content: 'And 7-8: Sal 32.1-2.'
  - type: text
    content: '!»'
  '9':
  - type: text
    content: 'Ho an’iza moa izany fahasambarana izany? Ho an’ny voafora ve sa ho an’ny tsy voafora koa? Voatsiahiko teo ny tenin’ny Soratra Masina hoe: «Ny finoana no nankatoavan’Andriamanitra an’i Abrahama ho marina.» '
