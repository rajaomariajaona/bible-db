document_id: GEN.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avy any Ejipta i Abrama dia niverina nankany Negeva niaraka tamin’ny vadiny mbamin’ny fananany rehetra. Niaraka taminy koa i Lôta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nisara-dia i Abrama sy i Lôta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanan-karena tokoa i Abrama, fa nanana biby fiompy sy volafotsy ary volamena betsaka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nandeha izy nifindrafindra avy tao Negeva ka hatrany Betela, teo amin’ny toerana izay efa nitobiany tamin’ny voalohany, teo anelanelan’i Betela sy i Hay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka dia tamin’ilay toerana nanorenan’i Abrama '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' voalohany no nivavahany sady niantsoany an’Andriamanitra hoe TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary i Lôta izay niara-dia tamin’i Abrama koa dia nanana andian’omby aman’ondry sy tranolay maro. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Noho ny hamaroan’ny olona sy ny biby fiompy, dia tsy ampy hitoeran’izy roa lahy miaraka ny tany satria mbola nonina tao koa ny Kanahanita sy ny Perizita. Koa nisy fifandirana teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' biby fiompin’i Abrama sy ny an’i Lôta. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Abrama tamin’i Lôta:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka tsy hisy fifandirana amintsika na amin’ny mpiandry ireo biby fiompintsika, satria olona mpihavana isika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moa tsy eo anatrehanao ve ny faritra manontolo? Koa aoka hisaraka eto isika. Fa raha hianavaratra ianao, dia hianatsimo aho; ary raha hianatsimo kosa ianao, izaho hianavaratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nitazana i Lôta ka nahatsinjo ny faritanin’i Jôrdàna manontolo. Talohan’ny nandravan’ny TOMPO an’i Sôdôma sy i Gômôra, izany faritany izany mandra-pahatonga any Tsôhara dia tahaka ny zaridainan’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zaridainan’ny TOMPO '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: na Paradisa dia mampahatsiaro ny zaridaina tao Hedena (jereo Gen 2.8-10).
    marker-yv: yv-n
  - type: text
    text: ', tahaka ny lohasahan’i Neily. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa nofidîn’i Lôta ho azy ny faritanin’i Jôrdàna ka nikisaka niantsinanana izy. Toy izany no nisarahan’izy roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I Abrama nipetraka tao amin’ny tany Kanahàna, fa i Lôta kosa nitoby tao amin’ireo tanàna amin’ny faritanin’i Jôrdàna ka nametraka ny lainy hatrany Sôdôma. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny mponina tao Sôdôma dia tena ratsy toetra sady nanota mafy tamin’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nitenenan’ny TOMPO i Abrama, rehefa avy nisaraka tamin’i Lôta izy, ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mitazàna, avy eo amin’izay misy anao, ka mijere mianavaratra sy mianatsimo, ary miantsinanana sy miankandrefana; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: fa homeko anao sy ny taranakao mandrakizay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 7.5.
    marker-yv: yv-n
  - type: text
    text: ' ny tany manontolo izay tazanao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hohamaroiko tahaka ny vovo-tany ny taranakao ka tsy ho hita isa, tahaka ny tsy ahazoan’ny olona manisa ny vovo-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Miaingà ka mandehana mamakivaky ny tany amin’ny sakany sy lavany, fa homeko anao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia nangoron-day i Abrama ka nandeha nipetraka tao amin’ny hazo ôakan’i Mamre, akaikin’i Hebrôna, ary nanorina alitara teo ho an’ny TOMPO.
