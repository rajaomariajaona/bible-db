document_id: GEN.13,396
type_code: plt
verses:
  '1':
  - type: text
    content: Avy any Ejipta i Abrama dia niverina nankany Negeva niaraka tamin’ny vadiny mbamin’ny fananany rehetra. Niaraka taminy koa i Lôta.
  - type: heading
    content: Nisara-dia i Abrama sy i Lôta
  '10':
  - type: text
    content: Dia nitazana i Lôta ka nahatsinjo ny faritanin’i Jôrdàna manontolo. Talohan’ny nandravan’ny TOMPO an’i Sôdôma sy i Gômôra, izany faritany izany mandra-pahatonga any Tsôhara dia tahaka ny zaridainan’ny TOMPO
  - type: note
    content: Zaridainan’ny TOMPO na Paradisa dia mampahatsiaro ny zaridaina tao Hedena (jereo Gen 2.8-10).
  - type: text
    content: ', tahaka ny lohasahan’i Neily. '
  '11':
  - type: text
    content: 'Koa nofidîn’i Lôta ho azy ny faritanin’i Jôrdàna ka nikisaka niantsinanana izy. Toy izany no nisarahan’izy roa lahy. '
  '12':
  - type: text
    content: 'I Abrama nipetraka tao amin’ny tany Kanahàna, fa i Lôta kosa nitoby tao amin’ireo tanàna amin’ny faritanin’i Jôrdàna ka nametraka ny lainy hatrany Sôdôma. '
  '13':
  - type: text
    content: Ny mponina tao Sôdôma dia tena ratsy toetra sady nanota mafy tamin’ny TOMPO.
  '14':
  - type: text
    content: 'Dia nitenenan’ny TOMPO i Abrama, rehefa avy nisaraka tamin’i Lôta izy, ka nataony hoe:'
  - type: text
    content: '–Mitazàna, avy eo amin’izay misy anao, ka mijere mianavaratra sy mianatsimo, ary miantsinanana sy miankandrefana; '
  '15':
  - type: text
    content: fa homeko anao sy ny taranakao mandrakizay
  - type: note
    content: Jereo Asa 7.5.
  - type: text
    content: ' ny tany manontolo izay tazanao. '
  '16':
  - type: text
    content: 'Hohamaroiko tahaka ny vovo-tany ny taranakao ka tsy ho hita isa, tahaka ny tsy ahazoan’ny olona manisa ny vovo-tany. '
  '17':
  - type: text
    content: Miaingà ka mandehana mamakivaky ny tany amin’ny sakany sy lavany, fa homeko anao izy.
  '18':
  - type: text
    content: Dia nangoron-day i Abrama ka nandeha nipetraka tao amin’ny hazo ôakan’i Mamre, akaikin’i Hebrôna, ary nanorina alitara teo ho an’ny TOMPO.
  '2':
  - type: text
    content: 'Nanan-karena tokoa i Abrama, fa nanana biby fiompy sy volafotsy ary volamena betsaka. '
  '3':
  - type: text
    content: 'Nandeha izy nifindrafindra avy tao Negeva ka hatrany Betela, teo amin’ny toerana izay efa nitobiany tamin’ny voalohany, teo anelanelan’i Betela sy i Hay. '
  '4':
  - type: text
    content: 'Ka dia tamin’ilay toerana nanorenan’i Abrama '
  - type: text
    content: alitara
  - type: text
    content: ' voalohany no nivavahany sady niantsoany an’Andriamanitra hoe TOMPO.'
  '5':
  - type: text
    content: 'Ary i Lôta izay niara-dia tamin’i Abrama koa dia nanana andian’omby aman’ondry sy tranolay maro. '
  '6':
  - type: text
    content: 'Noho ny hamaroan’ny olona sy ny biby fiompy, dia tsy ampy hitoeran’izy roa lahy miaraka ny tany satria mbola nonina tao koa ny Kanahanita sy ny Perizita. Koa nisy fifandirana teo amin’ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' biby fiompin’i Abrama sy ny an’i Lôta. '
  '8':
  - type: text
    content: 'Dia hoy i Abrama tamin’i Lôta:'
  - type: text
    content: '–Aoka tsy hisy fifandirana amintsika na amin’ny mpiandry ireo biby fiompintsika, satria olona mpihavana isika. '
  '9':
  - type: text
    content: Moa tsy eo anatrehanao ve ny faritra manontolo? Koa aoka hisaraka eto isika. Fa raha hianavaratra ianao, dia hianatsimo aho; ary raha hianatsimo kosa ianao, izaho hianavaratra.
