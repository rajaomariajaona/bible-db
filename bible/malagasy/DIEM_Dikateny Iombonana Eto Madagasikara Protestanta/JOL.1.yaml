document_id: JOL.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Izao no tenin’ny TOMPO tamin’i Jôela zanakalahin’i Petoela.
  - type: heading
    content: Andiam-bibikely sy haintany
  '10':
  - type: text
    content: Simba ny saha,
  - type: text
    content: misaona ny tany fambolena;
  - type: text
    content: satria levona ny vary,
  - type: text
    content: maina ny voaloboka
  - type: text
    content: ary malazo ny ôliva.
  '11':
  - type: text
    content: Malahelova ianareo mpiasa tany,
  - type: text
    content: midradradradrà ianareo mpamboly voaloboka;
  - type: text
    content: ny amin’ny vary sy ny ôrza,
  - type: text
    content: dia levona ny vokatry ny saha.
  '12':
  - type: text
    content: Maina ny voaloboka,
  - type: text
    content: malazo ny aviavimbazaha;
  - type: text
    content: toraka izany koa ny ampongabendanitra
  - type: text
    content: sy ny palmie ary ny paoma,
  - type: text
    content: dia ny hazo rehetra any an-tsaha.
  - type: text
    content: Nihalefy ny fifaliana
  - type: text
    content: teo anivon’ny olombelona.
  - type: heading
    content: Fanaingana hifady hanina sy hifona amin’ny Tompo
  '13':
  - type: text
    content: Mitafia lamba fisaonana
  - type: text
    content: ary mitomania sy midradradradrà,
  - type: text
    content: ianareo mpisorona
  - type: text
    content: mpanao fanompoam-pivavahana
  - type: text
    content: 'eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: .
  - type: text
    content: Avia ianareo hialina amin’alahelo,
  - type: text
    content: ry mpanao fanompoam-pivavahana
  - type: text
    content: 'amin’Andriamanitro:'
  - type: text
    content: fa tsy misy entina intsony
  - type: text
    content: ao an-
  - type: text
    content: tranon’Andriamanitrareo
  - type: text
    content: na ny fanatitra vokatry ny tany
  - type: text
    content: na ny fanatitra araraka.
  '14':
  - type: text
    content: 'Manokàna andro '
  - type: text
    content: fifadian-kanina
  - type: text
    content: ','
  - type: text
    content: miantsoa fivoriana masina;
  - type: text
    content: 'angony ny '
  - type: text
    content: loholona
  - type: text
    content: sy ny mponina rehetra
  - type: text
    content: eto amin’ny tany
  - type: text
    content: ho ao an-tranon’ny TOMPO Andriamanitrareo,
  - type: text
    content: ka miantsoa vonjy amin’ny TOMPO.
  - type: heading
    content: Ny androm-pahatezeran’ny Tompo
  '15':
  - type: text
    content: Indrisy efa antomotra ny andro,
  - type: text
    content: dia ny androm-pahatezeran’ny TOMPO
  - type: note
    content: 'ny androm-pahatezeran’ny Tompo: jereo 2.1-2,11; 3.4; 4.14; Is 13.6-9; Ezek 30.2-3; Ham 5.18.'
  - type: text
    content: izay ho tahaka ny fandringanana
  - type: text
    content: 'avy amin’ilay Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: .
  '16':
  - type: text
    content: Teo imasontsika teo
  - type: text
    content: no nanafoanana ny hanintsika;
  - type: text
    content: 'ary lavitry ny '
  - type: text
    content: tranon’Andriamanitsika
  - type: text
    content: ny fifaliana amam-piravoravoantsika?
  '17':
  - type: text
    content: Maina tao ambanin’ny bainga ny voa;
  - type: text
    content: foana ny sompitra,
  - type: text
    content: mirodana ny trano fitehirizana
  - type: text
    content: fa tsy misy intsony ny vary.
  '18':
  - type: text
    content: Indrisy fa mitoreo ny biby!
  - type: text
    content: Mihoalahoala ny andian’omby,
  - type: text
    content: satria tsy misy ahitra ho azy.
  - type: text
    content: Eny, mihareraka
  - type: text
    content: hatramin’ny andian’ondry aza.
  - type: heading
    content: Vavaky ny mpaminany
  '19':
  - type: text
    content: TOMPO ô, mitaraina aminao aho
  - type: text
    content: fa levon’ny afo ny kijana any an-taniefitra;
  - type: text
    content: ary misy lelafo mandoro
  - type: text
    content: ny hazo rehetra any an-tsaha.
  '2':
  - type: text
    content: 'Mba henoy izao, ry '
  - type: text
    content: loholona
  - type: text
    content: ;
  - type: text
    content: ary atongilano ny sofinareo,
  - type: text
    content: ry mponina rehetra eto Joda
  - type: note
    content: 'mponina eto Joda: hebreo amin’ny tany araka ny tohin’ny bokin’i Jôela, io tany io dia ny fanjakan’i Joda (jereo manokana 4.1, 6-8,20).'
  - type: text
    content: .
  - type: text
    content: Efa nisy toy izao ve tamin’ny andronareo
  - type: text
    content: na tamin’ny andron’ny razanareo?
  '20':
  - type: text
    content: Na dia ny bibidia aza
  - type: text
    content: mitodika miandrandra Anao,
  - type: text
    content: satria ritra ny renirano
  - type: text
    content: ary levon’ny afo ny kijana any an-taniefitra.
  '3':
  - type: text
    content: Tantarao amin’ny zanakareo izao,
  - type: text
    content: dia hotantarainy amin’ireo zanany;
  - type: text
    content: ary ireto kosa hitantara izany
  - type: text
    content: amin’ny taranaka mandimby azy.
  '4':
  - type: text
    content: Izay tsy lanim-panday, hanim-balala;
  - type: text
    content: izay tsy lanim-balala, hanim-boangory;
  - type: text
    content: ary izay tsy lanim-boangory, hanin-kijeja
  - type: note
    content: 'fanday, valala, voangory, kijeja: ireo teny efatra ireo dia heverina fa manondro karazana bibikely mpanimba voly.'
  - type: text
    content: .
  '5':
  - type: text
    content: Mifohaza ka mitomania,
  - type: text
    content: ry mamolava;
  - type: text
    content: midradradradrà ianareo rehetra,
  - type: text
    content: 'ry mpisotro divay:'
  - type: text
    content: fa tsy hisy ny voaloboka,
  - type: text
    content: ka ho diso divay ny vavanareo.
  '6':
  - type: text
    content: Fa misy andiam-bibikely
  - type: text
    content: miakatra mamely ny tanintsika;
  - type: text
    content: Tsy hita isa sady mahery ireo,
  - type: text
    content: ary mpandravarava sy mpandevona
  - type: text
    content: toy ny nifin’ny lion-dahy
  - type: text
    content: na toy ny vazan’ny liom-bavy.
  '7':
  - type: text
    content: Nosimbany ny voaloboko
  - type: text
    content: ary nopotehiny ny aviaviko.
  - type: text
    content: Nokikisany sy nohodirany ireny
  - type: text
    content: mandra-pahafotsy ny rantsany.
  '8':
  - type: text
    content: Midradradradrà ianareo,
  - type: text
    content: toy ny vehivavy tanora misaona
  - type: text
    content: noho ny amin’ny vady izay vao nampakatra azy.
  '9':
  - type: text
    content: Tsy misy entina intsony
  - type: text
    content: ao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: na ny fanatitra vokatry ny tany
  - type: text
    content: na ny fanatitra araraka.
  - type: text
    content: Noho izany, misaona ny mpisorona
  - type: text
    content: dia ireo mpanao fanompoam-pivavahana
  - type: text
    content: amin’ny TOMPO.
