document_id: PSA.59,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Afaho amin’ny fahavaloko aho, Andriamanitra ô
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hohiraina araka ny feon’ny hoe «Aza ravana...». Hira malefaka nataon’i Davida, fony i Saoly naniraka hiambina ny tranon’i Davida mba hamonoany azy
  - type: note
    content: Jereo 1 Sam 19.11-13.
  - type: text
    content: .
  '10':
  - type: text
    content: Ry Heriko ô, Ianao no andrandraiko
  - type: text
    content: satria Andriamanitra fiarovana avo ho ahy.
  '11':
  - type: text
    content: Ilay Andriamanitra fatra-pitia ahy
  - type: text
    content: dia ho avy tokoa hialoha ahy
  - type: text
    content: ka hataony hitako ny fahavaloko resy.
  '12':
  - type: text
    content: Andriamanitra ô, aza aringana avy hatrany ireo
  - type: text
    content: fandrao hadinon’ny vahoakako ny fandresenao;
  - type: text
    content: ahofokofohy amin’ny herinao ireo
  - type: text
    content: ka azerao, ry Tompo ampinganay ô.
  '13':
  - type: text
    content: Vao miteny izy, dia manota aminao;
  - type: text
    content: koa ataovy voafandriky ny avonavony
  - type: text
    content: sy tratry ny ozona aman-dainga tanisainy.
  '14':
  - type: text
    content: Aringano an-katezerana izy,
  - type: text
    content: aringano ka aza avela hisy hiangana;
  - type: text
    content: dia ho fantatra hatrany am-paran’ny tany
  - type: text
    content: fa Andriamanitra no mifehy
  - type: text
    content: eo amin’ny taranak’i Jakôba.
  - type: text
    content: Fiatoana
  '15':
  - type: text
    content: Nony hariva, dia mitampody ireo fahavaloko
  - type: text
    content: ka toa andian’alika mivovò
  - type: text
    content: mihaodihaody eran’ny tanàna
  '16':
  - type: text
    content: sady miriorio mitady hanina;
  - type: text
    content: ka raha tsy voky izy, dia maneronerona.
  '17':
  - type: text
    content: Izaho kosa hihira ny herinao
  - type: text
    content: sy hihoby vao maraina ny fitiavanao,
  - type: text
    content: satria Ianao fiarovana avo ho ahy
  - type: text
    content: sady fialofana amin’ny andro fahoriana.
  '18':
  - type: text
    content: Ry Heriko ô, mankalaza Anao amin-tsalamo aho
  - type: text
    content: satria Ianao Andriamanitra fiarovana avo ho ahy,
  - type: text
    content: dia ilay Andriamanitra fatra-pitia ahy.
  '2':
  - type: text
    content: Andriamanitra ô, afaho amin’ny fahavaloko aho,
  - type: text
    content: arovy tsy ho voan’ireo mpamely ahy.
  '3':
  - type: text
    content: Afaho amin’ny mpanao ratsy aho,
  - type: text
    content: vonjeo tsy ho azon’ny mpandatsa-dra.
  '4':
  - type: text
    content: Indreo izy miery ka mikendry hahafaty ahy;
  - type: text
    content: olo-matanjaka no mivorivory hamely ahy,
  - type: text
    content: kanefa tsy meloka aho na nanota, TOMPO ô;
  '5':
  - type: text
    content: tsy misy hadisoana vitako velively,
  - type: text
    content: kanefa milomay izy mivonon-kijoko ahy.
  '6':
  - type: text
    content: Ianao TOMPO Andriamanitr’izao rehetra izao
  - type: text
    content: sady Andriamanitr’i Israely ô,
  - type: text
    content: mifohaza, tongava atỳ amiko ka jereo;
  - type: text
    content: mifohaza hanasazy ny mpanompo sampy,
  - type: text
    content: aza misy iantrana ireo mpivadika ratsy ireo.
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: Nony hariva, dia mitampody ny fahavaloko
  - type: text
    content: ka toa andian’alika mivovò
  - type: text
    content: mihaodihaody eran’ny tanàna.
  '8':
  - type: text
    content: Injao fa midaondaom-bava izy,
  - type: text
    content: ka ny teniny toy ny sabatra;
  - type: text
    content: heveriny fa tsy misy mandre azy.
  '9':
  - type: text
    content: Kanjo Ianao, TOMPO ô, homehy azy;
  - type: text
    content: esoinao ny mpanompo sampy rehetra!
