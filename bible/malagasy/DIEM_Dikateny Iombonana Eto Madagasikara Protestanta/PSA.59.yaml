document_id: PSA.59,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Afaho amin’ny fahavaloko aho, Andriamanitra ô
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira.
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hohiraina araka ny feon’ny hoe «Aza ravana...». Hira malefaka nataon’i Davida, fony i Saoly naniraka hiambina ny tranon’i Davida mba hamonoany azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '59.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Sam 19.11-13.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Heriko ô, Ianao no andrandraiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Andriamanitra fiarovana avo ho ahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay Andriamanitra fatra-pitia ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho avy tokoa hialoha ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hataony hitako ny fahavaloko resy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, aza aringana avy hatrany ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hadinon’ny vahoakako ny fandresenao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ahofokofohy amin’ny herinao ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka azerao, ry Tompo ampinganay ô.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao miteny izy, dia manota aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ataovy voafandriky ny avonavony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tratry ny ozona aman-dainga tanisainy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aringano an-katezerana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aringano ka aza avela hisy hiangana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho fantatra hatrany am-paran’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Andriamanitra no mifehy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny taranak’i Jakôba.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nony hariva, dia mitampody ireo fahavaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka toa andian’alika mivovò
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihaodihaody eran’ny tanàna
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miriorio mitady hanina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka raha tsy voky izy, dia maneronerona.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa hihira ny herinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hihoby vao maraina ny fitiavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao fiarovana avo ho ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady fialofana amin’ny andro fahoriana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Heriko ô, mankalaza Anao amin-tsalamo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao Andriamanitra fiarovana avo ho ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay Andriamanitra fatra-pitia ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, afaho amin’ny fahavaloko aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arovy tsy ho voan’ireo mpamely ahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho amin’ny mpanao ratsy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo tsy ho azon’ny mpandatsa-dra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreo izy miery ka mikendry hahafaty ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: olo-matanjaka no mivorivory hamely ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy meloka aho na nanota, TOMPO ô;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy hadisoana vitako velively,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa milomay izy mivonon-kijoko ahy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao TOMPO Andriamanitr’izao rehetra izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady Andriamanitr’i Israely ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifohaza, tongava atỳ amiko ka jereo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifohaza hanasazy ny mpanompo sampy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza misy iantrana ireo mpivadika ratsy ireo.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nony hariva, dia mitampody ny fahavaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka toa andian’alika mivovò
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihaodihaody eran’ny tanàna.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injao fa midaondaom-bava izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny teniny toy ny sabatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heveriny fa tsy misy mandre azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo Ianao, TOMPO ô, homehy azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: esoinao ny mpanompo sampy rehetra!
