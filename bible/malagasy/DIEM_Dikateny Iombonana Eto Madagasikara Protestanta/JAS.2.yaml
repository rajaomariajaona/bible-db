document_id: JAS.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aza asiana fanavakavahana eo amin’ny mpino
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ry havako, noho ianareo mino ny Tompontsika, izany hoe i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' be voninahitra, dia aoka ianareo mba tsy hijery tavan’olona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôb 34.19.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Satria izay diso amin’ny lalàna anankiray monja, na dia mitandrina ny lalàna hafa rehetra aza, dia meloka amin’izy rehetra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Eny, ilay Andriamanitra nanao hoe: «Aza maka vadin’olona», no nanao koa hoe: «Aza mamono olona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 20.14 sy Deot 5.18; Eks 20.13 sy Deot 5.17.
      marker-yv: yv-n
    - type: text
      text: '.» Ka raha tàhiny tsy maka vadin’olona ianao, nefa mamono olona, dia mpandika ny lalàna ianao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Aoka ianareo hiteny sy hiasa toy ny olona mbola hotsarain’ny lalàna mitondra fahafahana; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: satria fitsarana tsy misy indrafo no hataon’Andriamanitra amin’izay tsy namindra fo; ny famindrampo kosa afa-mirehareha tsy matahotra ny fitsarana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Finoana arahin’asa
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ry havako, inona moa no soa azon’ny olona milaza azy ho manam-pinoana, raha tsy miseho amin’ny asa izany? Mahavonjy azy ve izany finoana izany? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Raha tàhiny misy havana iray finoana tsy manan-kitafy sady tsy ampy sakafo, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia inona moa no soa azonareo milaza aminy hoe: «Veloma finaritra, manaova mafana tsara, manaova voky tsara», raha tsy mba omenareo azy izay ilain’ny tenany? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Toy izany kosa àry ny finoana: raha misy tsy miseho amin’ny asa, dia maty mihitsy.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nefa raha misy manao hoe: «Ny anao finoana, fa ny ahy asa», dia hovaliako hoe: «Asehoy ahy izay finoanao tsy ombàn’asa, fa hasehoko anao amin’ny asa kosa ny finoako.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Inoanao ve fa misy Andriamanitra tokana? Tsara ny ataonao. Mba mino izany koa anefa ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ' ka mangovitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'demony: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1Tim 4.1 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mino izany koa...:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit Mt 8.29; Mk 1.24; 5.7; Lk 4.34.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa misy ohatra olona miperatra volamena sady manao akanjo marevaka miditra ao am-piangonanareo, ary misy mahantra ratsy akanjo miditra ao koa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ry adala, tianao ve ny hahafantatra fa tsy vanona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy vanona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: maty.
      marker-yv: yv-n
    - type: text
      text: 'ny finoana tsy ombàn’asa? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ahoana moa no nahazoan’i Abrahama razantsika ny fahamarinana avy amin’Andriamanitra? Noho ny asa nataon’i Abrahama, fony izy nanolotra an’i Itsehàka zanany lahy teo ambonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 22.9.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hitanao fa indray mientana ny azy ny finoana sy ny asa; ary tonga lavorary ny finoan’i Abrahama noho ny asa nombàny azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Koa tanteraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' manao hoe: ‹Nino an’Andriamanitra i Abrahama, ka nankatoavan’Andriamanitra azy ho marina izany; ary dia nantsoin’Andriamanitra hoe sakaizany izy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nino... izany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 15.6. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sakaizany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Is 41.8; 2 Tan 20.7.'
      marker-yv: yv-n
    - type: text
      text: '». '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Hitanareo àry fa nahazo ny fahamarinana avy amin’Andriamanitra ny olona, noho ny asa fa tsy noho ny finoana fotsiny ihany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Toy izay koa i Rahaba vehivavy janga: nahazo ny fahamarinana avy amin’Andriamanitra izy noho ny asa nataony, fony izy nampiantrano ireo iraka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: israelita
    - type: text
      text: ' ary nampandeha azy tamin’ny lalan-kafa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jos 2.1-21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Eny, maty ny vatantena raha tsy misy fofonaina, ary maty toy izany koa ny finoana raha tsy ombàn’asa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hajahajainareo erỳ ilay olona miakanjo marevaka sady ataonareo hoe: «Etsy amin’ny toeram-boninahitra ianao mipetraka, azafady»; fa ilay mahantra kosa ataonareo hoe: «Mijorojoroa eo ianao, na eto an-tongotro mipetraka». '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Raha izany no izy, dia manavakavaka ianareo; ary sain-dratsy no entinareo manombantombana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mihainoa, ry havako malala: ireo mahantra eto amin’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' no efa nofidin’Andriamanitra, mba hanan-karena amin’ny finoana ka handray ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakana
    - type: text
      text: ' izay nampanantenainy homena ireo tia Azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa ianareo kosa, manao tsinontsinona ny mahantra! Moa tsy ny mpanankarena ve no mampahory anareo sy mitarika anareo ho eo amin’ny fitsarana? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ireo no manevateva ilay anarana soa nomen’Andriamanitra anareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ilay anarana soa... anareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ilay anarana soa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (ny an’i Jesoa Tompo) '
      - type: usfm
        marker: it
        children:
        - type: text
          text: izay nantsoina ho eo aminareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (toa mampahatsiaro ny batisa).'
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsara ny ataonareo raha tanterahinareo ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lalàna momba ny Fanjakàn’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny lalàna ambony indrindra.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tiavo...tenanao:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Lev 19.18.'
      marker-yv: yv-n
    - type: text
      text: ', araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' manao hoe: «Tiavo ny namanao tahaka ny itiavanao ny tenanao». '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Kanefa raha mijery tavan’olona ianareo, dia manota sady mpandika ny lalàna ka melohiny. '
