document_id: JAS.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Aza asiana fanavakavahana eo amin’ny mpino
  - type: text
    content: 'Ry havako, noho ianareo mino ny Tompontsika, izany hoe i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' be voninahitra, dia aoka ianareo mba tsy hijery tavan’olona'
  - type: note
    content: Ampit Jôb 34.19.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Satria izay diso amin’ny lalàna anankiray monja, na dia mitandrina ny lalàna hafa rehetra aza, dia meloka amin’izy rehetra. '
  '11':
  - type: text
    content: 'Eny, ilay Andriamanitra nanao hoe: «Aza maka vadin’olona», no nanao koa hoe: «Aza mamono olona'
  - type: note
    content: Jereo Eks 20.14 sy Deot 5.18; Eks 20.13 sy Deot 5.17.
  - type: text
    content: '.» Ka raha tàhiny tsy maka vadin’olona ianao, nefa mamono olona, dia mpandika ny lalàna ianao. '
  '12':
  - type: text
    content: 'Aoka ianareo hiteny sy hiasa toy ny olona mbola hotsarain’ny lalàna mitondra fahafahana; '
  '13':
  - type: text
    content: satria fitsarana tsy misy indrafo no hataon’Andriamanitra amin’izay tsy namindra fo; ny famindrampo kosa afa-mirehareha tsy matahotra ny fitsarana.
  - type: heading
    content: Finoana arahin’asa
  '14':
  - type: text
    content: 'Ry havako, inona moa no soa azon’ny olona milaza azy ho manam-pinoana, raha tsy miseho amin’ny asa izany? Mahavonjy azy ve izany finoana izany? '
  '15':
  - type: text
    content: 'Raha tàhiny misy havana iray finoana tsy manan-kitafy sady tsy ampy sakafo, '
  '16':
  - type: text
    content: 'dia inona moa no soa azonareo milaza aminy hoe: «Veloma finaritra, manaova mafana tsara, manaova voky tsara», raha tsy mba omenareo azy izay ilain’ny tenany? '
  '17':
  - type: text
    content: 'Toy izany kosa àry ny finoana: raha misy tsy miseho amin’ny asa, dia maty mihitsy.'
  '18':
  - type: text
    content: 'Nefa raha misy manao hoe: «Ny anao finoana, fa ny ahy asa», dia hovaliako hoe: «Asehoy ahy izay finoanao tsy ombàn’asa, fa hasehoko anao amin’ny asa kosa ny finoako.» '
  '19':
  - type: text
    content: 'Inoanao ve fa misy Andriamanitra tokana? Tsara ny ataonao. Mba mino izany koa anefa ireo '
  - type: text
    content: demony
  - type: text
    content: ' ka mangovitra'
  - type: note
    content: 'demony: jereo 1Tim 4.1 sy nta. –mino izany koa...: ampit Mt 8.29; Mk 1.24; 5.7; Lk 4.34.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Fa misy ohatra olona miperatra volamena sady manao akanjo marevaka miditra ao am-piangonanareo, ary misy mahantra ratsy akanjo miditra ao koa. '
  '20':
  - type: text
    content: Ry adala, tianao ve ny hahafantatra fa tsy vanona
  - type: note
    content: 'tsy vanona: misy stf sasany ahitana hoe maty.'
  - type: text
    content: 'ny finoana tsy ombàn’asa? '
  '21':
  - type: text
    content: 'Ahoana moa no nahazoan’i Abrahama razantsika ny fahamarinana avy amin’Andriamanitra? Noho ny asa nataon’i Abrahama, fony izy nanolotra an’i Itsehàka zanany lahy teo ambonin’ny '
  - type: text
    content: alitara
  - type: note
    content: Jereo Gen 22.9.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Hitanao fa indray mientana ny azy ny finoana sy ny asa; ary tonga lavorary ny finoan’i Abrahama noho ny asa nombàny azy. '
  '23':
  - type: text
    content: 'Koa tanteraka ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' manao hoe: ‹Nino an’Andriamanitra i Abrahama, ka nankatoavan’Andriamanitra azy ho marina izany; ary dia nantsoin’Andriamanitra hoe sakaizany izy'
  - type: note
    content: 'Nino... izany: Gen 15.6. –sakaizany: jereo Is 41.8; 2 Tan 20.7.'
  - type: text
    content: '». '
  '24':
  - type: text
    content: Hitanareo àry fa nahazo ny fahamarinana avy amin’Andriamanitra ny olona, noho ny asa fa tsy noho ny finoana fotsiny ihany.
  '25':
  - type: text
    content: 'Toy izay koa i Rahaba vehivavy janga: nahazo ny fahamarinana avy amin’Andriamanitra izy noho ny asa nataony, fony izy nampiantrano ireo iraka '
  - type: text
    content: israelita
  - type: text
    content: ' ary nampandeha azy tamin’ny lalan-kafa'
  - type: note
    content: Jereo Jos 2.1-21.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Eny, maty ny vatantena raha tsy misy fofonaina, ary maty toy izany koa ny finoana raha tsy ombàn’asa.
  '3':
  - type: text
    content: 'Dia hajahajainareo erỳ ilay olona miakanjo marevaka sady ataonareo hoe: «Etsy amin’ny toeram-boninahitra ianao mipetraka, azafady»; fa ilay mahantra kosa ataonareo hoe: «Mijorojoroa eo ianao, na eto an-tongotro mipetraka». '
  '4':
  - type: text
    content: Raha izany no izy, dia manavakavaka ianareo; ary sain-dratsy no entinareo manombantombana.
  '5':
  - type: text
    content: 'Mihainoa, ry havako malala: ireo mahantra eto amin’'
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' no efa nofidin’Andriamanitra, mba hanan-karena amin’ny finoana ka handray ny '
  - type: text
    content: Fanjakana
  - type: text
    content: ' izay nampanantenainy homena ireo tia Azy. '
  '6':
  - type: text
    content: 'Fa ianareo kosa, manao tsinontsinona ny mahantra! Moa tsy ny mpanankarena ve no mampahory anareo sy mitarika anareo ho eo amin’ny fitsarana? '
  '7':
  - type: text
    content: Ireo no manevateva ilay anarana soa nomen’Andriamanitra anareo
  - type: note
    content: 'ilay anarana soa... anareo: dkt hafa ilay anarana soa (ny an’i Jesoa Tompo) izay nantsoina ho eo aminareo (toa mampahatsiaro ny batisa).'
  - type: text
    content: .
  '8':
  - type: text
    content: 'Tsara ny ataonareo raha tanterahinareo ilay '
  - type: text
    content: lalàna
  - type: text
    content: ' momba ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: note
    content: 'Ny lalàna momba ny Fanjakàn’Andriamanitra: dkt hafa ny lalàna ambony indrindra. –Tiavo...tenanao: Lev 19.18.'
  - type: text
    content: ', araka ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' manao hoe: «Tiavo ny namanao tahaka ny itiavanao ny tenanao». '
  '9':
  - type: text
    content: 'Kanefa raha mijery tavan’olona ianareo, dia manota sady mpandika ny lalàna ka melohiny. '
