    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Aoka tsy ho voafitaka ianareo, fa «mamohehatra ny toetra tsara ny namana tsy valahara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voatsiahy eto amin’ity andininy ity ny andalan-tononkalo anankiray nosoratan’i Menandra, poeta grika.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Samia tonga saina araka ny tokony ho izy, ka aza manota intsony. Misy manko aminareo tsy mahalala an’Andriamanitra akory: ny hampahamenatra anareo no ilazako izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toetoetry ny tenan’ireo hitsangana velona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Kanefa hisy hanontany hoe: «Fomba ahoana no hitsanganan’ny maty ho velona? Toy inona ny tenan-javatra hananany?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Izato hadalànao! Maty aloha ny voa afafinao, vao velona indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Voa fotsiny ihany no afafinao, akotry na masomboly hafa, fa tsy ny tenan’izay vao hitsiry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Andriamanitra kosa, araka izay tiany, no manome tena ilay nafafy; ary ny voa afafy rehetra dia omeny tena tandrify ny karazany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tsy mitovy nofo ny zavamananaina rehetra mitafy nofo: hafa ny an’ny olombelona, hafa ny an’ny biby, hafa ny an’ny vorona, ary hafa ny an’ny trondro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Misy koa tenan-javatra eny amin’ny habakabaka, ary misy tenan-javatra etỳ an-tany; hafa ny famirapiratan’ireo tenan-javatra eny amin’ny habakabaka, ary hafa ny famirapiratan’ny tenan-javatra etỳ an-tany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: hafa ny famirapiratan’ny masoandro, hafa ny famirapiratan’ny volana, ary hafa ny famirapiratan’ny kintana; ary, na ny kintana anankiroa aza, dia samy hafa ny famirapiratany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia ho toy izany koa rehefa hitsangana velona ny maty: vatana mety lo no afafy, fa vatana tsy mety lo intsony no hitsangana velona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'vatana mahonena no afafy, fa vatana be voninahitra no hitsangana velona; vatana malemy no afafy, fa vatana mahery no hitsangana velona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'vatana manana aina no afafy, fa vatana anjakan’ny Fanahy Masina no hitsangana ho velona. Eny, misy vatana manana aina, ary misy ny vatana anjakan’ny Fanahy Masina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'araka izany koa no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «I Adama, ilay olona voalohany, dia natao manana aina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 2.7.
    marker-yv: yv-n
  - type: text
    text: ', fa ilay Adama farany kosa natao feno Fanahy mahavelona.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Kanefa tsy izay anjakan’ny Fanahy Masina no tonga mialoha fa izay manana aina; taoriana vao tonga izay anjakan’ny Fanahy Masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ilay olona voalohany dia avy amin’ny tany, ka tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 2.7.
    marker-yv: yv-n
  - type: text
    text: '; fa ilay olona faharoa dia avy any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ireo an’ny tany dia manahaka ilay olona avy amin’ny tany; fa ireo an’ny lanitra kosa dia manahaka ilay olona avy any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Tahaka ny nitondrantsika ny endrik’ilay olona avy amin’ny tany no hitondrantsika
  - type: usfm
    marker: f
