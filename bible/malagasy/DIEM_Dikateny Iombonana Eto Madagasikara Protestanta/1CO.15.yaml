document_id: 1CO.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Kristy nitsangana velona avy tany amin’ny maty
  - type: text
    content: 'Tiako hampahatsiahivina anareo, ry havako, ilay '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' izay notorîko taminareo ka noraisinareo sady ifikiranareo. '
  '10':
  - type: text
    content: 'Saingy ny fahasoavan’Andriamanitra no nahatoy izao ahy, ary tsy very maina tao amiko ny fahasoavana nomena ahy; fa niasa mihoatra noho ny apôstôly rehetra aho, kanefa tsy izaho, fa ilay fahasoavan’Andriamanitra niaraka tamiko. '
  '11':
  - type: text
    content: koa izany àry no torînay, na izaho na ry zareo; ary izany no efa ninoanareo.
  - type: heading
    content: Ny fitsanganan’ny tenantsika ho velona
  '12':
  - type: text
    content: 'Raha i '
  - type: text
    content: Kristy
  - type: text
    content: ' no torînay fa nitsangana velona avy tany amin’ny maty, ahoana no ilazan’ny sasany aminareo fa tsy hitsangana velona ny maty? '
  '13':
  - type: text
    content: 'Fa raha tsy hitsangana velona ny maty, na dia i Kristy aza dia tsy ho nitsangana velona mihitsy; '
  '14':
  - type: text
    content: 'ary raha tsy nitsangana velona i Kristy, dia tsy misy fotony izay torînay, ary tsy misy fotony izay inoanareo? '
  '15':
  - type: text
    content: 'Ary dia hita fa vavolombelona mandainga ny amin’Andriamanitra izahay, satria lainga no nanambaranay fa Andriamanitra dia nanangana an’i Kristy ho velona: na dia Andriamanitra aza tsy ho nanangana an’i Kristy ho velona, raha marina fa tsy mitsangana velona ny maty. '
  '16':
  - type: text
    content: 'Eny, raha marina fa tsy mitsangana velona ny maty, na dia i Kristy aza dia tsy ho nitsangana velona. '
  '17':
  - type: text
    content: 'Ary raha tsy nitsangana velona i Kristy, dia foana ny finoanareo ary mbola tavela ao amin’ny fahotanareo ihany ianareo. '
  '18':
  - type: text
    content: 'Ary dia very koa izay efa nodimandry ka nino an’i Kristy. '
  '19':
  - type: text
    content: Raha amin’izao fiainana izao ihany no anantenantsika an’i Kristy
  - type: note
    content: 'Raha amin’izao... an’i Kristy: dkt hafa raha manantena an’i Kristy no hany ataontsika amin’izao fiainana izao.'
  - type: text
    content: ', dia faran’izay mahonena isika amin’ny olon-drehetra.'
  '2':
  - type: text
    content: Izany Vaovao Mahafaly izany no amonjena anareo koa, raha tananareo araka ny nitoriako azy; raha tsy izany kosa dia ninonino foana ianareo.
  '20':
  - type: text
    content: 'Efa nitsangana velona avy tany amin’ny maty tokoa anefa i Kristy, santatra ho an’ireo nodimandry. '
  '21':
  - type: text
    content: 'Ary satria olona iray no niavin’ny fahafatesana, dia olona iray ihany koa no iavian’ny '
  - type: text
    content: fitsanganan’ny maty
  - type: text
    content: '. '
  '22':
  - type: text
    content: Eny, toy ny ahafatesan’ny olona rehetra noho izy tafaray amin’i Adama, no ahaveloman’ny olona rehetra noho izy tafaray amin’i Kristy
  - type: note
    content: 'And 21-22: jereo Gen 3.17-19; Rm 5.12-21.'
  - type: text
    content: ', '
  '23':
  - type: text
    content: 'saingy manaraka ny filaharany avy: i Kristy no santatra, vao ireo voatokana ho an’i Kristy amin’ny fotoana hiavian’i Kristy. '
  '24':
  - type: text
    content: 'Aorian’izany, dia ho tonga ny farany: hofoanan’i Kristy avokoa ireo fanapahana sy fahefana ary hery'
  - type: note
    content: 'fanapahana sy fahefana ary hery: fiteny enti-manondro izay rehetra mitsangan-kanohitra an’i Kristy, na anjely izany na olombelona (jereo 1Kôr 2.6; Kôl 2.15; Rm 8.38).'
  - type: text
    content: ' manohitra Azy, ka hatolony an’ilay Andriamanitra sady Ray ny Fanjakana. '
  '25':
  - type: text
    content: Satria tsy maintsy manjaka i Kristy, ary hataon’Andriamanitra eo ambany tongotr’i Kristy avokoa ireo fahavalo rehetra
  - type: note
    content: Jereo Sal 110.1.
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Ny fahavalo farany hofoanana dia ny fahafatesana, '
  '27':
  - type: text
    content: 'fa hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Ny zavatra rehetra dia nampaneken’Andriamanitra ho eo ambanin’ny tongony'
  - type: note
    content: Sal 8.7.
  - type: text
    content: '.» Kanefa raha ny Soratra Masina milaza hoe: «Nampanekena Azy ny zavatra rehetra», dia miharihary fa tsy mba isan’izany Andriamanitra Izay nampanaiky an’i Kristy ny zavatra rehetra. '
  '28':
  - type: text
    content: Ary rehefa nampaneken’Andriamanitra an’i Kristy ny zavatra rehetra, na Izy Zanaka ihany koa aza dia hanaiky an’Andriamanitra Izay nampanaiky Azy ny zavatra rehetra; hany ka ho zavatra rehetra amin’ny olona rehetra Andriamanitra.
  '29':
  - type: text
    content: 'Raha tsy izany, inona no tadiavin’ireo olona atao '
  - type: text
    content: batisa
  - type: text
    content: ' misolo ny maty'
  - type: note
    content: Tsy mbola misy fantatra mazava tsara ny amin’io fomba amam-panao io sy ny zavatra kendreny.
  - type: text
    content: '? Raha tsy mitsangana velona mihitsy ny maty, ahoana ireo olona ireo no atao batisa misolo azy ireny? '
  '3':
  - type: text
    content: 'Izao no fampianarana isan’ny voalohany indrindra voaraiko ary nampitaiko taminareo: i Kristy dia maty ho fanalana ny fahotantsika araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ', '
  '30':
  - type: text
    content: 'Ary izahay koa, ahoana no dia anaovany vy very ny ainay lalandava izao? '
  '31':
  - type: text
    content: 'Ry havako, hila ho faty isan’andro vaky aho: lazaiko marina aminareo izany satria ianareo no reharehako ao amin’i Kristy Jesoa Tompontsika. '
  '32':
  - type: text
    content: Raha araka izay hevitr’olombelona fotsiny no niaretako fanenjehana mafy teto Efeso, soa inona no azoko tamin’izany? Raha tsy mitsangana velona ny maty, dia «aoka hihinana sy hisotro isika, fa ho faty rahampitso
  - type: note
    content: Is 22.13.
  - type: text
    content: .»
  '33':
  - type: text
    content: Aoka tsy ho voafitaka ianareo, fa «mamohehatra ny toetra tsara ny namana tsy valahara
  - type: note
    content: Voatsiahy eto amin’ity andininy ity ny andalan-tononkalo anankiray nosoratan’i Menandra, poeta grika.
  - type: text
    content: '.» '
  '34':
  - type: text
    content: 'Samia tonga saina araka ny tokony ho izy, ka aza manota intsony. Misy manko aminareo tsy mahalala an’Andriamanitra akory: ny hampahamenatra anareo no ilazako izany.'
  - type: heading
    content: Toetoetry ny tenan’ireo hitsangana velona
  '35':
  - type: text
    content: 'Kanefa hisy hanontany hoe: «Fomba ahoana no hitsanganan’ny maty ho velona? Toy inona ny tenan-javatra hananany?» '
  '36':
  - type: text
    content: 'Izato hadalànao! Maty aloha ny voa afafinao, vao velona indray. '
  '37':
  - type: text
    content: 'Voa fotsiny ihany no afafinao, akotry na masomboly hafa, fa tsy ny tenan’izay vao hitsiry. '
  '38':
  - type: text
    content: Andriamanitra kosa, araka izay tiany, no manome tena ilay nafafy; ary ny voa afafy rehetra dia omeny tena tandrify ny karazany avy.
  '39':
  - type: text
    content: 'Tsy mitovy nofo ny zavamananaina rehetra mitafy nofo: hafa ny an’ny olombelona, hafa ny an’ny biby, hafa ny an’ny vorona, ary hafa ny an’ny trondro.'
  '4':
  - type: text
    content: 'nalevina, nitsangana velona tamin’ny andro fahatelo araka ny voalazan’ny Soratra Masina, '
  '40':
  - type: text
    content: 'Misy koa tenan-javatra eny amin’ny habakabaka, ary misy tenan-javatra etỳ an-tany; hafa ny famirapiratan’ireo tenan-javatra eny amin’ny habakabaka, ary hafa ny famirapiratan’ny tenan-javatra etỳ an-tany; '
  '41':
  - type: text
    content: hafa ny famirapiratan’ny masoandro, hafa ny famirapiratan’ny volana, ary hafa ny famirapiratan’ny kintana; ary, na ny kintana anankiroa aza, dia samy hafa ny famirapiratany.
  '42':
  - type: text
    content: 'Dia ho toy izany koa rehefa hitsangana velona ny maty: vatana mety lo no afafy, fa vatana tsy mety lo intsony no hitsangana velona; '
  '43':
  - type: text
    content: 'vatana mahonena no afafy, fa vatana be voninahitra no hitsangana velona; vatana malemy no afafy, fa vatana mahery no hitsangana velona; '
  '44':
  - type: text
    content: 'vatana manana aina no afafy, fa vatana anjakan’ny Fanahy Masina no hitsangana ho velona. Eny, misy vatana manana aina, ary misy ny vatana anjakan’ny Fanahy Masina; '
  '45':
  - type: text
    content: 'araka izany koa no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «I Adama, ilay olona voalohany, dia natao manana aina'
  - type: note
    content: Gen 2.7.
  - type: text
    content: ', fa ilay Adama farany kosa natao feno Fanahy mahavelona.» '
  '46':
  - type: text
    content: Kanefa tsy izay anjakan’ny Fanahy Masina no tonga mialoha fa izay manana aina; taoriana vao tonga izay anjakan’ny Fanahy Masina.
  '47':
  - type: text
    content: Ilay olona voalohany dia avy amin’ny tany, ka tany
  - type: note
    content: Jereo Gen 2.7.
  - type: text
    content: '; fa ilay olona faharoa dia avy any an-danitra. '
  '48':
  - type: text
    content: 'Ireo an’ny tany dia manahaka ilay olona avy amin’ny tany; fa ireo an’ny lanitra kosa dia manahaka ilay olona avy any an-danitra. '
  '49':
  - type: text
    content: Tahaka ny nitondrantsika ny endrik’ilay olona avy amin’ny tany no hitondrantsika
  - type: note
    content: 'no hitondrantsika: misy stf sasany ahitana hoe no aoka hitondrantsika.'
  - type: text
    content: ny endrik’ilay olona avy any an-danitra.
  '5':
  - type: text
    content: ary niseho tamin’i Petera, vao tamin’ny 12 lahy
  - type: note
    content: 'Momba ny and 3-5: and 3: jereo Is 53.5-12. –And 4: jereo Sal 16.10; Hôs 6.2. –And 5: Lk 24.34; Mt 28.16-17; Mk 16.14; Lk 24.36; Jôh 20.19.'
  - type: text
    content: '. '
  '50':
  - type: text
    content: 'Izao kosa no lazaiko, ry havako: ny olombelona nofo aman-dra dia tsy afaka hanana anjara amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ; ary izay tratry ny fahalòvana dia tsy afaka hahazo anjara amin’ny tsy fahalòvana.
  '51':
  - type: text
    content: 'Indro misy tsiambaratelo ambarako aminareo: tsy hodimandry avokoa isika rehetra; '
  '52':
  - type: text
    content: vetivety foana, indray mipy maso, rehefa maneno ny trompetra farany, dia hovàna avokoa isika rehetra. Satria haneno ny trompetra farany, dia hitsangana velona ireo maty ka tsy ho tratry ny fahalòvana intsony; ary hovàna isika
  - type: note
    content: 'And 51-52: ampit 1Tes 4.15-17.'
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'Ka ity mety lo ity dia tsy maintsy hitafy ny tsy fahalòvana, ary ity mety maty ity dia tsy maintsy hitafy ny tsy fahafatesana. '
  '54':
  - type: text
    content: 'Fa rehefa mitafy ny tsy fahalòvana ity mety lo ity, ary mitafy ny tsy fahafatesana ity mety maty ity, dia ho tanteraka ilay tenin’ny Soratra Masina hoe:'
  - type: text
    content: «Noresena ny fahafatesana ka levona!»
  '55':
  - type: text
    content: «Aiza ny fandresenao, ry fahafatesana?
  - type: text
    content: Aiza ny lefonao maranitra, ry fahafatesana
  - type: note
    content: 'And 54: Is 25.8. And 55: Hôs 13.14, voatsiahy araka ny dkt grika tranainy Septoazinta. –lefonao maranitra: dkt ara-keviny ihany, fa zava-maranitra misy poizina mahafaty toy ny rambon’ny maingoka no tian-kambara.'
  - type: text
    content: ?»
  '56':
  - type: text
    content: 'Fa ny fahotana no lefona maranitra anindronan’ny fahafatesana, ary ny '
  - type: text
    content: lalàna
  - type: text
    content: ' no hery ahombiazan’ny fahotana. '
  '57':
  - type: text
    content: Kanefa hisaorana anie Andriamanitra, Izay manome antsika ny fandresena amin’ny alalan’i Jesoa Kristy Tompontsika!
  '58':
  - type: text
    content: Koa amin’izany, ry havako malala, aoka ianareo hiorina mafy, tsy ho voahozongozona, hahefa bebe kokoa hatrany eo amin’ny asan’ny Tompo, satria fantatrareo fa tsy foana tsy akory ny fisasaranareo amin’ny fanompoana ny Tompo.
  '6':
  - type: text
    content: 'Manaraka izany, dia '
  - type: text
    content: mpianany
  - type: text
    content: ' mihoatra ny 500 no indray nisehoany: mbola velona mandraka androany ny ankamaroany amin’ireo, fa ny sasany ihany no efa nodimandry. '
  '7':
  - type: text
    content: 'Taorian’izay, dia nisehoany koa i Jakôba, vao ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' rehetra.'
  '8':
  - type: text
    content: 'Ary faran’izy rehetra, mba nisehoany koa aho, izay toy ny zaza tsy tonga volana. '
  '9':
  - type: text
    content: Raha izaho manko dia faraidiny amin’ny samy apôstôly, ka tsy mendrika hantsoina hoe apôstôly satria efa nanenjika ny Fiangonan’Andriamanitra
  - type: note
    content: 'And 8: jereo Asa 9.3-6. –And 9: jereo Asa 8.3.'
  - type: text
    content: '. '
