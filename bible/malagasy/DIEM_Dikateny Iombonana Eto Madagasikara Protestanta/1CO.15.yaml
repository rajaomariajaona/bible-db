    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saingy ny fahasoavan’Andriamanitra no nahatoy izao ahy, ary tsy very maina tao amiko ny fahasoavana nomena ahy; fa niasa mihoatra noho ny apôstôly rehetra aho, kanefa tsy izaho, fa ilay fahasoavan’Andriamanitra niaraka tamiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: koa izany àry no torînay, na izaho na ry zareo; ary izany no efa ninoanareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsanganan’ny tenantsika ho velona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no torînay fa nitsangana velona avy tany amin’ny maty, ahoana no ilazan’ny sasany aminareo fa tsy hitsangana velona ny maty? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha tsy hitsangana velona ny maty, na dia i Kristy aza dia tsy ho nitsangana velona mihitsy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary raha tsy nitsangana velona i Kristy, dia tsy misy fotony izay torînay, ary tsy misy fotony izay inoanareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary dia hita fa vavolombelona mandainga ny amin’Andriamanitra izahay, satria lainga no nanambaranay fa Andriamanitra dia nanangana an’i Kristy ho velona: na dia Andriamanitra aza tsy ho nanangana an’i Kristy ho velona, raha marina fa tsy mitsangana velona ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eny, raha marina fa tsy mitsangana velona ny maty, na dia i Kristy aza dia tsy ho nitsangana velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha tsy nitsangana velona i Kristy, dia foana ny finoanareo ary mbola tavela ao amin’ny fahotanareo ihany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary dia very koa izay efa nodimandry ka nino an’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Raha amin’izao fiainana izao ihany no anantenantsika an’i Kristy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Raha amin’izao... an’i Kristy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raha manantena an’i Kristy no hany ataontsika amin’izao fiainana izao.
    marker-yv: yv-n
  - type: text
    text: ', dia faran’izay mahonena isika amin’ny olon-drehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Efa nitsangana velona avy tany amin’ny maty tokoa anefa i Kristy, santatra ho an’ireo nodimandry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary satria olona iray no niavin’ny fahafatesana, dia olona iray ihany koa no iavian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitsanganan’ny maty
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Eny, toy ny ahafatesan’ny olona rehetra noho izy tafaray amin’i Adama, no ahaveloman’ny olona rehetra noho izy tafaray amin’i Kristy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
