  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saingy ny fahasoavan’Andriamanitra no nahatoy izao ahy, ary tsy very maina tao amiko ny fahasoavana nomena ahy; fa niasa mihoatra noho ny apôstôly rehetra aho, kanefa tsy izaho, fa ilay fahasoavan’Andriamanitra niaraka tamiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: koa izany àry no torînay, na izaho na ry zareo; ary izany no efa ninoanareo.
  - type: usfm
