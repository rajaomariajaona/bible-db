  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary faran’izy rehetra, mba nisehoany koa aho, izay toy ny zaza tsy tonga volana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha izaho manko dia faraidiny amin’ny samy apôstôly, ka tsy mendrika hantsoina hoe apôstôly satria efa nanenjika ny Fiangonan’Andriamanitra
  - type: usfm
    marker: f
