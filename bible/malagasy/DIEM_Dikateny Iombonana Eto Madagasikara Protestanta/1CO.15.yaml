      text: '3'
  - type: text
    text: 'Izao no fampianarana isan’ny voalohany indrindra voaraiko ary nampitaiko taminareo: i Kristy dia maty ho fanalana ny fahotantsika araka ny voalazan’ny '
  - type: usfm
