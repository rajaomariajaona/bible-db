  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no torînay fa nitsangana velona avy tany amin’ny maty, ahoana no ilazan’ny sasany aminareo fa tsy hitsangana velona ny maty? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy hitsangana velona ny maty, na dia i Kristy aza dia tsy ho nitsangana velona mihitsy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary raha tsy nitsangana velona i Kristy, dia tsy misy fotony izay torînay, ary tsy misy fotony izay inoanareo? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia hita fa vavolombelona mandainga ny amin’Andriamanitra izahay, satria lainga no nanambaranay fa Andriamanitra dia nanangana an’i Kristy ho velona: na dia Andriamanitra aza tsy ho nanangana an’i Kristy ho velona, raha marina fa tsy mitsangana velona ny maty. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, raha marina fa tsy mitsangana velona ny maty, na dia i Kristy aza dia tsy ho nitsangana velona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tsy nitsangana velona i Kristy, dia foana ny finoanareo ary mbola tavela ao amin’ny fahotanareo ihany ianareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia very koa izay efa nodimandry ka nino an’i Kristy. '
  '19':
