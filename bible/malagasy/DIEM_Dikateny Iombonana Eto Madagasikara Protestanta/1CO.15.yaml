  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'saingy manaraka ny filaharany avy: i Kristy no santatra, vao ireo voatokana ho an’i Kristy amin’ny fotoana hiavian’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aorian’izany, dia ho tonga ny farany: hofoanan’i Kristy avokoa ireo fanapahana sy fahefana ary hery'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanapahana sy fahefana ary hery: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiteny enti-manondro izay rehetra mitsangan-kanohitra an’i Kristy, na anjely izany na olombelona (jereo 1Kôr 2.6; Kôl 2.15; Rm 8.38).
    marker-yv: yv-n
  - type: text
    text: ' manohitra Azy, ka hatolony an’ilay Andriamanitra sady Ray ny Fanjakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Satria tsy maintsy manjaka i Kristy, ary hataon’Andriamanitra eo ambany tongotr’i Kristy avokoa ireo fahavalo rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 110.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny fahavalo farany hofoanana dia ny fahafatesana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fa hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Ny zavatra rehetra dia nampaneken’Andriamanitra ho eo ambanin’ny tongony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 8.7.
    marker-yv: yv-n
  - type: text
    text: '.» Kanefa raha ny Soratra Masina milaza hoe: «Nampanekena Azy ny zavatra rehetra», dia miharihary fa tsy mba isan’izany Andriamanitra Izay nampanaiky an’i Kristy ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary rehefa nampaneken’Andriamanitra an’i Kristy ny zavatra rehetra, na Izy Zanaka ihany koa aza dia hanaiky an’Andriamanitra Izay nampanaiky Azy ny zavatra rehetra; hany ka ho zavatra rehetra amin’ny olona rehetra Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha tsy izany, inona no tadiavin’ireo olona atao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' misolo ny maty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy mbola misy fantatra mazava tsara ny amin’io fomba amam-panao io sy ny zavatra kendreny.
    marker-yv: yv-n
  - type: text
    text: '? Raha tsy mitsangana velona mihitsy ny maty, ahoana ireo olona ireo no atao batisa misolo azy ireny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary izahay koa, ahoana no dia anaovany vy very ny ainay lalandava izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ry havako, hila ho faty isan’andro vaky aho: lazaiko marina aminareo izany satria ianareo no reharehako ao amin’i Kristy Jesoa Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha araka izay hevitr’olombelona fotsiny no niaretako fanenjehana mafy teto Efeso, soa inona no azoko tamin’izany? Raha tsy mitsangana velona ny maty, dia «aoka hihinana sy hisotro isika, fa ho faty rahampitso
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
