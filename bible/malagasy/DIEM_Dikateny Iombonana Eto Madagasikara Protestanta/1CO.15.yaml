  - type: text
    text: ' mihoatra ny 500 no indray nisehoany: mbola velona mandraka androany ny ankamaroany amin’ireo, fa ny sasany ihany no efa nodimandry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Taorian’izay, dia nisehoany koa i Jakôba, vao ny '
