document_id: JDG.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Naka toerana tao Kanahàna ny Israelita
  - type: text
    content: 'Taorian’ny nahafatesan’i Josoa dia nanontany ny TOMPO ny Israelita hoe: «Iza amin’ny fokonay no tokony handeha voalohany hanafika ny Kanahanita?» '
  '10':
  - type: text
    content: 'Avy eo dia nandeha izy namely ny Kanahanita tao Hebrôna, izay nantsoina hoe Kiriata-Arbà tamin’izany fotoana izany, ka nandresy ny tarik’i Sesay sy i Ahimàna ary i Talmay. '
  '11':
  - type: text
    content: 'Avy tao Hebrôna izy no nandeha namely ny mponina tao Debîra izay nantsoina hoe Kiriata-Sefera tamin’izany fotoana izany. '
  '12':
  - type: text
    content: 'Dia hoy i Kaleba hoe: «Izay mandresy an’i Kiriata-Sefera ka mahazo azy dia homeko azy i Haksà zanako vavy ho vadiny.» '
  '13':
  - type: text
    content: 'Ary i Hôtniela, zanakalahin’i Kenaza izay zandrin’i Kaleba, no nahazo ny tanàna; koa nomen’i Kaleba azy i Haksà zanany vavy ho vadiny. '
  '14':
  - type: text
    content: 'Rehefa tonga teo anilan’i Hôtniela razazavavy, dia notoroany hevitra mba hangataka saha amin’ny rainy. Vao nidina niala tamin’ny borikiny kosa i Haksà, dia nanontanian’i Kaleba ny amin’izay ilainy; '
  '15':
  - type: text
    content: 'ka izao no navaliny azy:'
  - type: text
    content: –Mba anaovy fanomezana aho! Tany ngazana any atsimo no natolotrao ahy, ka mba omeo loharano aho.
  - type: text
    content: Dia nomen’i Kaleba azy ny loharano any ambony sy ny loharano atỳ ambany.
  '16':
  - type: text
    content: Ary ny Kenita, taranaky ny rafozan-dahin’i Mosesy, dia niainga avy tao Jerikao, tanàna be rofia. Niainga niaraka tamin’ny vatan-dehilahin’i Joda izy ka nandeha nanorim-ponenana tany amin’ny taniefitr’i Joda tao atsimon’i Harada
  - type: note
    content: I Harada dia tanàna eo amin’ny 30 km ao atsimon’i Hebrôna.
  - type: text
    content: ' ary niara-nonina tamin’ny Hamalekita.'
  '17':
  - type: text
    content: Ary ny vatan-dehilahin’i Joda dia mbola nandeha nanafika niaraka tamin’ny taranak’i Simehôna rahalahin’i Joda ihany ka nandresy ny Kanahanita nonina tao Tsefata
  - type: note
    content: 'Tsefata: tanàna tsy fantatra mazava izay misy azy, kanefa tokony ho akaikin’i Harada.'
  - type: text
    content: '. Noravany tanteraka io tanàna io, ka nanomboka hatreo ny anaran’ny tanàna dia nataony hoe Hôrmà na Faharavana. '
  '18':
  - type: text
    content: Avy eo dia nalain’ny olon’i Joda koa ny tanàna Gazà sy Askelôna ary Hekrôna
  - type: note
    content: Gazà sy Askelôna ary Hekrôna dia tanàna filistinina, jereo Jos 13.3.
  - type: text
    content: ' mbamin’ireo faritra manodidina azy avy. '
  '19':
  - type: text
    content: 'Ny TOMPO mihitsy no efa nomba ny olon’i Joda tamin’izany, ka azony ny faritra be tendrombohitra. Nefa tsy voaroakany ireo mponin’ny tany lemaka, satria nanana kalesy vy ireny. '
  '2':
  - type: text
    content: 'Dia namaly azy ny TOMPO hoe:'
  - type: text
    content: –Ny vatan-dehilahy amin’ny fokon’i Joda, fa hatolotro azy ny tany.
  '20':
  - type: text
    content: 'Dia nomena an’i Kaleba i Hebrôna araka izay efa nolazain’i Mosesy azy. Ireo tarika hanakita telo mponin’i Hebrôna dia noroahin’i Kaleba hiala tao. '
  '21':
  - type: text
    content: Fa ny Jebosita izay nonina tao Jerosalema kosa dia tsy voaroakan’ny taranak’i Benjamîna, ka mbola miara-nonina amin’ny taranak’i Benjamîna ao Jerosalema mandraka androany.
  '22':
  - type: text
    content: Ny taranak’i Efraîma sy i Manase zanakalahin’i Jôsefa kosa dia niakatra nanafika an’i Betela
  - type: note
    content: 'Betela: jereo Gen 12.8 sy nta.'
  - type: text
    content: ' ary nombàn’ny TOMPO. '
  '23':
  - type: text
    content: 'Nandefa iraka izy aloha mba hijery ny tanàna, izay nantsoina hoe Lozy tamin’izany fotoana izany. '
  '24':
  - type: text
    content: 'Dia nahita lehilahy iray nivoaka avy tao an-tanàna ireto iraka, ka niteny taminy hoe:'
  - type: text
    content: –Atoroy anay ny fomba hidiranay ao an-tanàna, dia hamindra fo aminao izahay.
  '25':
  - type: text
    content: 'Dia natoron-dralehilahy azy ny fomba hidirany ao an-tanàna. Koa naringan’ireo tamin’ny sabatra ny mponina tao an-tanàna, fa ilay lehilahy sy ny fianakaviany manontolo kosa navelany handeha. '
  '26':
  - type: text
    content: Dia nankany amin’ny tanin’ny Hetita ralehilahy ka nanorina tanàna anankiray nantsoiny hoe Lozy; ka mbola izany ihany no anarana entiny mandraka androany
  - type: note
    content: 'tanin’ny Hetita: izany hoe ny faritra Siria-Palestinina manontolo. Ampit Jos 1.4 sy nta. Midadasika ihany ilay faritra, ary tsy fantatra mazava izay nanorenana ny tanàna Lozy vaovao.'
  - type: text
    content: .
  '27':
  - type: text
    content: 'Ary ny taranak’i Manase dia tsy naharoaka ny mponina tao Bety-Seàna sy Tahenàka na ny tao Dôra sy Jiblehama ary Megidao na tamin’ireo tanàna madinika samy miankina aminy avy; koa nanohy nipetraka tamin’izany faritany izany hatrany ny Kanahanita. '
  '28':
  - type: text
    content: Ary na dia efa natanjaka aza i Israely tatỳ aoriana, dia tsy naharoaka azy ireo mihitsy fa nampanompo azy fotsiny.
  '29':
  - type: text
    content: Ny taranak’i Efraîma ihany koa dia tsy naharoaka ny Kanahanita izay nonina tao Gezera; ka nipetraka teo anivon’ny Efraîmita ireo Kanahanita tao Gezera.
  '3':
  - type: text
    content: 'Dia hoy ny vatan-dehilahin’i Joda tamin’ny taranak’i Simehôna rahalahin’i Joda hoe:'
  - type: text
    content: –Andeha hiaraka aminay haka ny faritany natokana ho anay, ka hiarahantsika manafika ny Kanahanita; avy eo dia haka ny faritaninareo miaraka aminareo koa izahay.
  - type: text
    content: 'Dia nikambana tamin’ny vatan-dehilahin’i Joda ny olona tao amin’ny fokon’i Simehôna, '
  '30':
  - type: text
    content: Ny taranak’i Zebolòna dia tsy naharoaka ireo mponina tao Kitrôna na ny tao Nahalôla; ka nipetraka teo anivon’ny Zebolonita ireo Kanahanita ireo saingy nampanompoiny.
  '31':
  - type: text
    content: 'Ny taranak’i Asera dia tsy naharoaka ny mponina tao Hakao sy Tsidôna na ny tao Mehaleba sy Akziba na ny tao Helbà sy Afîka ary Rehôba. '
  '32':
  - type: text
    content: Koa nipetraka teo anivon’ny Kanahanita izay nonina teo amin’ny tany ireo Aserita satria tsy naharoaka azy.
  '33':
  - type: text
    content: Ny taranak’i Naftalỳ dia tsy naharoaka ny mponina tao Bety-Semesy sy Bety-Hanata; ka nonina teo anivon’ny Kanahanita izay nipetraka tao ireo Naftalita saingy nampanompo azy.
  '34':
  - type: text
    content: 'Ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' kosa dia naharesy tosika ny taranak’i Dana teny amin’ny faritany be tendrombohitra ka tsy namela azy hidina teny amin’ny tany lemaka. '
  '35':
  - type: text
    content: 'Nanohy nipetraka tao Hara-Heresa sy Aialôna ary Sahalbima ny Amôrita; kanjo tato aoriana dia nanjakan’ny taranak’i Efraîma sy i Manase izy, ka voatery nanompo azy. '
  '36':
  - type: text
    content: Ny faritanin’ny Edômita kosa miainga eo amin’ny fiakarana Hakrabima, dia eo amin’ny harambato no ho miakatra.
  '4':
  - type: text
    content: ka niara-nanafika izy roa tonta. Dia natolotry ny TOMPO azy ny Kanahanita sy ny Perizita, ka nahafatesany vatan-dehilahy andiany folo tao Bezèka
  - type: note
    content: 'Bezèka: tanàna tsy fantatra mazava izay misy azy, kanefa tokony ho akaikin’i Jerosalema.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Hitany tao Bezèka ny mpanjaka Adônỳ-Bezèka ka notafihiny, ary resiny ny Kanahanita sy ny Perizita. '
  '6':
  - type: text
    content: 'Vaky nandositra i Adônỳ-Bezèka saingy nenjehin’ireo ka tratrany, dia notapahiny ny ankiben-tanany sy ny ankiben-tongony. '
  '7':
  - type: text
    content: 'Ary hoy i Adônỳ-Bezèka hoe:'
  - type: text
    content: –Mpanjaka fitopolo, tapaka ankiben-tanana sy ankiben-tongotra, no nitsimpona hanina teo ambany latabatro; koa izay nataoko ihany no navalin’Andriamanitra ahy!
  - type: text
    content: Dia nentina ho any Jerosalema i Adonỳ-Bezèka ary maty tany.
  '8':
  - type: text
    content: 'Dia nanafika an’i Jerosalema ny vatan-dehilahin’i Joda ka nahazo azy; ary novonoiny tamin’ny sabatra ny mponina sady nodorany ny tanàna. '
  '9':
  - type: text
    content: 'Taorian’izany, dia nidina ireo hiady tamin’ny Kanahanita izay nonina teny an-kavoana sy tany amin’ny faritra atsimo ary tany amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: '. '
