document_id: JDG.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naka toerana tao Kanahàna ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’ny nahafatesan’i Josoa dia nanontany ny TOMPO ny Israelita hoe: «Iza amin’ny fokonay no tokony handeha voalohany hanafika ny Kanahanita?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia namaly azy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny vatan-dehilahy amin’ny fokon’i Joda, fa hatolotro azy ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy ny vatan-dehilahin’i Joda tamin’ny taranak’i Simehôna rahalahin’i Joda hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha hiaraka aminay haka ny faritany natokana ho anay, ka hiarahantsika manafika ny Kanahanita; avy eo dia haka ny faritaninareo miaraka aminareo koa izahay.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nikambana tamin’ny vatan-dehilahin’i Joda ny olona tao amin’ny fokon’i Simehôna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ka niara-nanafika izy roa tonta. Dia natolotry ny TOMPO azy ny Kanahanita sy ny Perizita, ka nahafatesany vatan-dehilahy andiany folo tao Bezèka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bezèka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tsy fantatra mazava izay misy azy, kanefa tokony ho akaikin’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hitany tao Bezèka ny mpanjaka Adônỳ-Bezèka ka notafihiny, ary resiny ny Kanahanita sy ny Perizita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vaky nandositra i Adônỳ-Bezèka saingy nenjehin’ireo ka tratrany, dia notapahiny ny ankiben-tanany sy ny ankiben-tongony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy i Adônỳ-Bezèka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpanjaka fitopolo, tapaka ankiben-tanana sy ankiben-tongotra, no nitsimpona hanina teo ambany latabatro; koa izay nataoko ihany no navalin’Andriamanitra ahy!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nentina ho any Jerosalema i Adonỳ-Bezèka ary maty tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nanafika an’i Jerosalema ny vatan-dehilahin’i Joda ka nahazo azy; ary novonoiny tamin’ny sabatra ny mponina sady nodorany ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Taorian’izany, dia nidina ireo hiady tamin’ny Kanahanita izay nonina teny an-kavoana sy tany amin’ny faritra atsimo ary tany amin’ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Avy eo dia nandeha izy namely ny Kanahanita tao Hebrôna, izay nantsoina hoe Kiriata-Arbà tamin’izany fotoana izany, ka nandresy ny tarik’i Sesay sy i Ahimàna ary i Talmay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Avy tao Hebrôna izy no nandeha namely ny mponina tao Debîra izay nantsoina hoe Kiriata-Sefera tamin’izany fotoana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy i Kaleba hoe: «Izay mandresy an’i Kiriata-Sefera ka mahazo azy dia homeko azy i Haksà zanako vavy ho vadiny.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary i Hôtniela, zanakalahin’i Kenaza izay zandrin’i Kaleba, no nahazo ny tanàna; koa nomen’i Kaleba azy i Haksà zanany vavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa tonga teo anilan’i Hôtniela razazavavy, dia notoroany hevitra mba hangataka saha amin’ny rainy. Vao nidina niala tamin’ny borikiny kosa i Haksà, dia nanontanian’i Kaleba ny amin’izay ilainy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka izao no navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba anaovy fanomezana aho! Tany ngazana any atsimo no natolotrao ahy, ka mba omeo loharano aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nomen’i Kaleba azy ny loharano any ambony sy ny loharano atỳ ambany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny Kenita, taranaky ny rafozan-dahin’i Mosesy, dia niainga avy tao Jerikao, tanàna be rofia. Niainga niaraka tamin’ny vatan-dehilahin’i Joda izy ka nandeha nanorim-ponenana tany amin’ny taniefitr’i Joda tao atsimon’i Harada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Harada '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna eo amin’ny 30 km ao atsimon’i Hebrôna.
    marker-yv: yv-n
  - type: text
    text: ' ary niara-nonina tamin’ny Hamalekita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny vatan-dehilahin’i Joda dia mbola nandeha nanafika niaraka tamin’ny taranak’i Simehôna rahalahin’i Joda ihany ka nandresy ny Kanahanita nonina tao Tsefata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsefata: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tsy fantatra mazava izay misy azy, kanefa tokony ho akaikin’i Harada.
    marker-yv: yv-n
  - type: text
    text: '. Noravany tanteraka io tanàna io, ka nanomboka hatreo ny anaran’ny tanàna dia nataony hoe Hôrmà na Faharavana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Avy eo dia nalain’ny olon’i Joda koa ny tanàna Gazà sy Askelôna ary Hekrôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gazà sy Askelôna ary Hekrôna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna filistinina, jereo Jos 13.3.
    marker-yv: yv-n
  - type: text
    text: ' mbamin’ireo faritra manodidina azy avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny TOMPO mihitsy no efa nomba ny olon’i Joda tamin’izany, ka azony ny faritra be tendrombohitra. Nefa tsy voaroakany ireo mponin’ny tany lemaka, satria nanana kalesy vy ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nomena an’i Kaleba i Hebrôna araka izay efa nolazain’i Mosesy azy. Ireo tarika hanakita telo mponin’i Hebrôna dia noroahin’i Kaleba hiala tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny Jebosita izay nonina tao Jerosalema kosa dia tsy voaroakan’ny taranak’i Benjamîna, ka mbola miara-nonina amin’ny taranak’i Benjamîna ao Jerosalema mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny taranak’i Efraîma sy i Manase zanakalahin’i Jôsefa kosa dia niakatra nanafika an’i Betela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Betela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 12.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ary nombàn’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nandefa iraka izy aloha mba hijery ny tanàna, izay nantsoina hoe Lozy tamin’izany fotoana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nahita lehilahy iray nivoaka avy tao an-tanàna ireto iraka, ka niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Atoroy anay ny fomba hidiranay ao an-tanàna, dia hamindra fo aminao izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia natoron-dralehilahy azy ny fomba hidirany ao an-tanàna. Koa naringan’ireo tamin’ny sabatra ny mponina tao an-tanàna, fa ilay lehilahy sy ny fianakaviany manontolo kosa navelany handeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nankany amin’ny tanin’ny Hetita ralehilahy ka nanorina tanàna anankiray nantsoiny hoe Lozy; ka mbola izany ihany no anarana entiny mandraka androany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tanin’ny Hetita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izany hoe ny faritra Siria-Palestinina manontolo. Ampit Jos 1.4 sy nta. Midadasika ihany ilay faritra, ary tsy fantatra mazava izay nanorenana ny tanàna '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lozy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' vaovao.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny taranak’i Manase dia tsy naharoaka ny mponina tao Bety-Seàna sy Tahenàka na ny tao Dôra sy Jiblehama ary Megidao na tamin’ireo tanàna madinika samy miankina aminy avy; koa nanohy nipetraka tamin’izany faritany izany hatrany ny Kanahanita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary na dia efa natanjaka aza i Israely tatỳ aoriana, dia tsy naharoaka azy ireo mihitsy fa nampanompo azy fotsiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny taranak’i Efraîma ihany koa dia tsy naharoaka ny Kanahanita izay nonina tao Gezera; ka nipetraka teo anivon’ny Efraîmita ireo Kanahanita tao Gezera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny taranak’i Zebolòna dia tsy naharoaka ireo mponina tao Kitrôna na ny tao Nahalôla; ka nipetraka teo anivon’ny Zebolonita ireo Kanahanita ireo saingy nampanompoiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny taranak’i Asera dia tsy naharoaka ny mponina tao Hakao sy Tsidôna na ny tao Mehaleba sy Akziba na ny tao Helbà sy Afîka ary Rehôba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Koa nipetraka teo anivon’ny Kanahanita izay nonina teo amin’ny tany ireo Aserita satria tsy naharoaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny taranak’i Naftalỳ dia tsy naharoaka ny mponina tao Bety-Semesy sy Bety-Hanata; ka nonina teo anivon’ny Kanahanita izay nipetraka tao ireo Naftalita saingy nampanompo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' kosa dia naharesy tosika ny taranak’i Dana teny amin’ny faritany be tendrombohitra ka tsy namela azy hidina teny amin’ny tany lemaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nanohy nipetraka tao Hara-Heresa sy Aialôna ary Sahalbima ny Amôrita; kanjo tato aoriana dia nanjakan’ny taranak’i Efraîma sy i Manase izy, ka voatery nanompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ny faritanin’ny Edômita kosa miainga eo amin’ny fiakarana Hakrabima, dia eo amin’ny harambato no ho miakatra.
