document_id: 2PE.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Simôna Petera ity taratasy ity, dia izaho mpanompon’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' sady '
  - type: text
    content: apôstôliny
  - type: text
    content: .
  - type: text
    content: Mamangy anareo aho, dia ianareo izay nahazo finoana sarobidy tahaka ny anay, noho i Jesoa Kristy, Andriamanitsika sy Mpamonjy antsika
  - type: note
    content: 'noho i Jesoa Kristy, Andriamanitsika sy Mpamonjy antsika: dkt hafa noho ilay Andriamanitsika sy i Jesoa Kristy Mpamonjy.'
  - type: text
    content: ', efa niantra antsika. '
  '10':
  - type: text
    content: Koa amin’izany, ry havana, miezaha bebe kokoa hampitombina tsara ny fiantsoan’Andriamanitra anareo sy ny fifidianany anareo; satria raha manao izany ianareo, dia tsy ho solafaka amin’ny fahotana
  - type: note
    content: 'tsy ho solafaka amin’ny fahotana: na hoe tsy ho very finoana.'
  - type: text
    content: 'na oviana na oviana; '
  '11':
  - type: text
    content: 'fa toy izany no hanomezana malalaka ho anareo ny fidirana ao amin’ny '
  - type: text
    content: Fanjakana
  - type: text
    content: ' maharitra mandrakizay, dia ny Fanjakàn’i Jesoa Kristy Tompontsika sy Mpamonjy antsika. '
  '12':
  - type: text
    content: 'Koa hazoto mandrakariva hampahatsiaro anareo an’izany zavatra izany aho, na dia efa mahalala aza ianareo sy efa miorina mafy amin’ny hafatra marim-pototra izay anananareo ankehitriny. '
  '13':
  - type: text
    content: 'Saingy heveriko fa raha mbola amin’ity fiaina-mandalo ity koa aho, dia mety ny hanaitairako anareo amin’ny fampahatsiarovana izany. '
  '14':
  - type: text
    content: 'Eny, fantatro fa ho avy faingana ny fanesorana ahy amin’ity fiaina-mandalo ity, araka ny efa nasehon’i Jesoa Kristy Tompontsika tamiko. '
  '15':
  - type: text
    content: Ary dia hiezaka tokoa aho mba hisy hahatsiarovanareo izany zavatra izany mandrakariva, rehefa maty aho.
  - type: heading
    content: Ireo nahita ny voninahitr’i Kristy
  '16':
  - type: text
    content: 'Tsy angano tsara lahatra no narahinay, raha nampahafantatra anareo ny hery nampombana ny fiavian’i Jesoa Kristy Tompontsika, fa tena nahita maso ny fiandrianany izahay. '
  '17':
  - type: text
    content: 'Eny, nahazo haja amam-boninahitra tamin’Andriamanitra Ray i Jesoa, raha tonga teo aminy ilay feo avy tamin’Andriamanitra be voninahitra indrindra nanao hoe: «Ity no '
  - type: text
    content: Zanako
  - type: text
    content: ' Malalako; Izy no sitrako.» '
  '18':
  - type: text
    content: Renay io feo avy tany an-danitra io, raha niara-nipetraka tamin’i Jesoa tany an-tendrombohitra masina izahay
  - type: note
    content: 'And 17-18: jereo Mt 17.1; Mk 9.2-7; Lk 9.28-35.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'Ary mafy orina kokoa ho antsika ny tenin’ireo '
  - type: text
    content: mpaminanin
  - type: text
    content: '’Andriamanitra; ka tsara raha ifantohanareo izany toy ny ifantohanareo amin’ny jiro mamiratra anaty toerana maizimaizina, mandra-pahazàvan’ny andro sy mandra-piposaky ny kintana fitarikandro ao am-ponareo. '
  '2':
  - type: text
    content: Hampitomboina ao aminareo anie ny fahasoavana sy ny fiadanana, vokatry ny fahalalana tsara an’Andriamanitra sy i Jesoa Tompontsika!
  - type: heading
    content: Ny fiantsoan’Andriamanitra ny kristianina
  '20':
  - type: text
    content: 'Izao anefa voalohany indrindra no tsara ho fantatrareo: ny fivoaboasana ny teny faminaniana rehetra raketin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' dia tsy efan’ny fisainan’ny olona fotsiny ihany'
  - type: note
    content: 'ny fivoaboasana... fotsiny ihany: dkt hafa ny teny faminaniana rehetra raketin’ny Soratra Masina dia tsy misy avy amin’ny fisainan’ny mpaminany fotsiny ihany.'
  - type: text
    content: '; '
  '21':
  - type: text
    content: satria na oviana na oviana tsy nisy faminaniana avy tamin’ny sitrapon’ny olona, fa avy tamin’Andriamanitra no nitenenan’ny olona izay nentanin’ny Fanahy Masina.
  '3':
  - type: text
    content: Ny hery maha Andriamanitra Azy no nanome antsika ny zavatra rehetra ilaina hahazoana ny fiainana sy hiraiketam-po amin’Andriamanitra, satria isika efa nampahalalain’i Jesoa Tompo an’Ilay niantso antsika noho ny voninahiny sy fahatsarany
  - type: note
    content: 'noho ny voninahiny sy fahatsarany: misy stf sasany ahitana hoe ho ao amin’ny voninahiny sy fahatsarany.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: Izany voninahitr’Andriamanitra sy fahatsarany izany no nanomezana antsika ireo zavatra sarobidy sy lehibe tokoa nampanantenainy antsika, mba ho tonga mpiombona amin’ny fomban’Andriamanitra ianareo, rehefa afaka tamin’ny fahalòvana vokatry ny filàndratsy mihanaka eo amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Koa noho izany, aoka hiezaka mafy tokoa ianareo: ka ny finoanareo ombay hatsaram-panahy; ny hatsaram-panahinareo ombay fahalalana; '
  '6':
  - type: text
    content: 'ny fahalalanareo ombay fahononam-po; ny fahononam-ponareo ombay faharetana; ny faharetanareo ombay firaiketam-po amin’Andriamanitra; '
  '7':
  - type: text
    content: 'ny firaiketam-ponareo amin’Andriamanitra ombay fandalana ireo havana iray finoana; ny fandalànareo ny havana iray finoana ombay fitiavana ny olona rehetra. '
  '8':
  - type: text
    content: 'Fa raha ireo toetra ireo no anananareo sy ampitomboinareo, dia hanjary mazoto sady mahavokatra ianareo amin’ny fahalalana bebe kokoa an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika.'
  '9':
  - type: text
    content: 'Fa izay tsy manana ireo toetra ireo kosa dia tsy mahajery lavitra ka naman’ny jamba, sady manadino ny nanadiovana azy tamin’ny fahotany fahiny. '
