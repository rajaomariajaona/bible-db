document_id: 2PE.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Avy amiko Simôna Petera ity taratasy ity, dia izaho mpanompon’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôliny
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamangy anareo aho, dia ianareo izay nahazo finoana sarobidy tahaka ny anay, noho i Jesoa Kristy, Andriamanitsika sy Mpamonjy antsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'noho i Jesoa Kristy, Andriamanitsika sy Mpamonjy antsika: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: noho ilay Andriamanitsika sy i Jesoa Kristy Mpamonjy.
      marker-yv: yv-n
    - type: text
      text: ', efa niantra antsika. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa amin’izany, ry havana, miezaha bebe kokoa hampitombina tsara ny fiantsoan’Andriamanitra anareo sy ny fifidianany anareo; satria raha manao izany ianareo, dia tsy ho solafaka amin’ny fahotana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy ho solafaka amin’ny fahotana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy ho very finoana.
      marker-yv: yv-n
    - type: text
      text: 'na oviana na oviana; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'fa toy izany no hanomezana malalaka ho anareo ny fidirana ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakana
    - type: text
      text: ' maharitra mandrakizay, dia ny Fanjakàn’i Jesoa Kristy Tompontsika sy Mpamonjy antsika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa hazoto mandrakariva hampahatsiaro anareo an’izany zavatra izany aho, na dia efa mahalala aza ianareo sy efa miorina mafy amin’ny hafatra marim-pototra izay anananareo ankehitriny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Saingy heveriko fa raha mbola amin’ity fiaina-mandalo ity koa aho, dia mety ny hanaitairako anareo amin’ny fampahatsiarovana izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Eny, fantatro fa ho avy faingana ny fanesorana ahy amin’ity fiaina-mandalo ity, araka ny efa nasehon’i Jesoa Kristy Tompontsika tamiko. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary dia hiezaka tokoa aho mba hisy hahatsiarovanareo izany zavatra izany mandrakariva, rehefa maty aho.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ireo nahita ny voninahitr’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tsy angano tsara lahatra no narahinay, raha nampahafantatra anareo ny hery nampombana ny fiavian’i Jesoa Kristy Tompontsika, fa tena nahita maso ny fiandrianany izahay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Eny, nahazo haja amam-boninahitra tamin’Andriamanitra Ray i Jesoa, raha tonga teo aminy ilay feo avy tamin’Andriamanitra be voninahitra indrindra nanao hoe: «Ity no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanako
    - type: text
      text: ' Malalako; Izy no sitrako.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Renay io feo avy tany an-danitra io, raha niara-nipetraka tamin’i Jesoa tany an-tendrombohitra masina izahay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 17-18:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mt 17.1; Mk 9.2-7; Lk 9.28-35.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary mafy orina kokoa ho antsika ny tenin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminanin
    - type: text
      text: '’Andriamanitra; ka tsara raha ifantohanareo izany toy ny ifantohanareo amin’ny jiro mamiratra anaty toerana maizimaizina, mandra-pahazàvan’ny andro sy mandra-piposaky ny kintana fitarikandro ao am-ponareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hampitomboina ao aminareo anie ny fahasoavana sy ny fiadanana, vokatry ny fahalalana tsara an’Andriamanitra sy i Jesoa Tompontsika!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiantsoan’Andriamanitra ny kristianina
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Izao anefa voalohany indrindra no tsara ho fantatrareo: ny fivoaboasana ny teny faminaniana rehetra raketin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' dia tsy efan’ny fisainan’ny olona fotsiny ihany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny fivoaboasana... fotsiny ihany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny teny faminaniana rehetra raketin’ny Soratra Masina dia tsy misy avy amin’ny fisainan’ny mpaminany fotsiny ihany.
      marker-yv: yv-n
    - type: text
      text: '; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: satria na oviana na oviana tsy nisy faminaniana avy tamin’ny sitrapon’ny olona, fa avy tamin’Andriamanitra no nitenenan’ny olona izay nentanin’ny Fanahy Masina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny hery maha Andriamanitra Azy no nanome antsika ny zavatra rehetra ilaina hahazoana ny fiainana sy hiraiketam-po amin’Andriamanitra, satria isika efa nampahalalain’i Jesoa Tompo an’Ilay niantso antsika noho ny voninahiny sy fahatsarany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'noho ny voninahiny sy fahatsarany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ho ao amin’ny voninahiny sy fahatsarany.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izany voninahitr’Andriamanitra sy fahatsarany izany no nanomezana antsika ireo zavatra sarobidy sy lehibe tokoa nampanantenainy antsika, mba ho tonga mpiombona amin’ny fomban’Andriamanitra ianareo, rehefa afaka tamin’ny fahalòvana vokatry ny filàndratsy mihanaka eo amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa noho izany, aoka hiezaka mafy tokoa ianareo: ka ny finoanareo ombay hatsaram-panahy; ny hatsaram-panahinareo ombay fahalalana; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ny fahalalanareo ombay fahononam-po; ny fahononam-ponareo ombay faharetana; ny faharetanareo ombay firaiketam-po amin’Andriamanitra; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ny firaiketam-ponareo amin’Andriamanitra ombay fandalana ireo havana iray finoana; ny fandalànareo ny havana iray finoana ombay fitiavana ny olona rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa raha ireo toetra ireo no anananareo sy ampitomboinareo, dia hanjary mazoto sady mahavokatra ianareo amin’ny fahalalana bebe kokoa an’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa izay tsy manana ireo toetra ireo kosa dia tsy mahajery lavitra ka naman’ny jamba, sady manadino ny nanadiovana azy tamin’ny fahotany fahiny. '
