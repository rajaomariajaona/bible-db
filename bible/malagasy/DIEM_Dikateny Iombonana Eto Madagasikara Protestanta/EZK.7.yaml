  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny firàvany tsara tarehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia niteraka avonavona tao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nisy namboarany sarivongan-tsampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: maharikoriko sy mahatsiravina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no nanaovako ireny firàvany ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho zavatra mankaloiloy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
