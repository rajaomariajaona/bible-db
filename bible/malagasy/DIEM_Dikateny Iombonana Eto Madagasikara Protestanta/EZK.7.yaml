document_id: EZK.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manambara ny fanimbana farany ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Mihainoa ianao, ry ilay taranak’olombelona. Izaho Tompo ANDRIANANAHARY dia milaza izao amin’ny tanin’i Israely: «Injao no farany; mby akaiky ny farany ho an’ny vazan-tany efatra eo aminao tokoa ry tanin’i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ankehitriny no farany ho anao: hampihariko hamely anao ny fahatezerako. Hotsaraiko araka ny fitondrantenany ny mponinao ka hovaliako aminy avokoa ny asa maharikoriko rehetra nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy ho antra fijery azy Aho ary tsy hamindrafo aminy, fa hataoko mivesatra ny vokatry ny fitondrantenany sy ny asa maharikoriko izay mbola tohiziny eo anivonao. Amin’izay dia hoekeny fa Izaho no TOMPO.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Indro fa avy ny loza, dia loza tsy misy toa azy! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Injao no farany; mby akaiky ny farany, ry tanin’i Israely. Mifoha hiantonta aminao izy, indro fa avy tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ry mponina amin’ny tanin’i Israely, mby akaiky ny faharavana hanjo anareo, tonga ny fotoana, antomotra ny andro fitsarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny andro fitsarana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ohatra Is 2.12; Ham 5.18.
    marker-yv: yv-n
  - type: text
    text: '. Sahotaka no hisolo ny horakora-pifaliana eny an-tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao ankehitriny izao no hanosahako ny fahatezerako aminareo ka hanamparako ny fahavinirako. Hotsaraiko araka ny fitondrantenanareo ianareo ary hovaliako aminareo ny asa maharikoriko rehetra nataonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy ho antra fijery anareo Aho ary tsy hamindrafo aminareo, fa hovaliako aminareo ny fitondrantenanareo sy ny asa maharikoriko izay mbola tohizinareo eo anivonareo. Amin’izay dia hoekenareo fa Izaho TOMPO no mikapoka anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: «Indro ny andro fitsarana, ary mby akaiky sady miseho lany ny faharavana. Mitombo ny hetraketraka ary mahazo vahana ny avonavona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Indro... ny faharavana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo and 7 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Mitombo ny hetraketraka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': teny an’ohatra no ampiasain’ny RM '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mamony ny tsora-kazo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo and 11.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny herisetra dia toy ny tsorakazo arangaranga hanafaizana ny haratsiana; koa tsy hisy tavela intsony eo aminareo na ny hamaroanareo na ny harenareo na ny zava-kantonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tonga ny fotoana ary akaiky ny andro fitsarana: aoka tsy hifaly ny mpividy ary aoka halahelo ny mpivarotra satria ny vahoaka rehetra no iharan’ny fahatezerako. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny mpivarotra tsy hiverenan’ny entany intsony na dia mbola velona aina aza. Ny fahitana manambara ny loza hanjo ny vahoaka rehetra manko dia ho tanteraka. Samy miaina anaty heloka ny olona tsirairay ka tsy hisy hotafarina. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hotsofina ny anjomara ary hatao ny fiomanan-kiady, fa tsy hisy olona handeha hiantafika satria ny vahoaka rehetra no iharan’ny fahatezerako.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy hisy olona ho afaka amin’ny famaizana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Hirongatra eny an-dalambe ny ady, ary ao an-trano kosa ny areti-mandringana sy ny mosary. Ho fatin’ny ady ireo olona any an-tsaha, ary ho ripaky ny mosary sy ny areti-mandringana ireo any an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Handositra any an-tendrombohitra izay sisa velona; ka samy hitoloko toy ny voromahailala an-dohasaha izy rehetra noho ny heloka nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hiraviravy tanana daholo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary halemy lohalika avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hisikina lamba fisaonana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho safotry ny horohoro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisoritra henatra ny endrika rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho voaharatra avokoa ny loha rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny misikina lamba fisaonana sy manaratra ny loha dia mariky ny fisaonana; jereo Is 15.2,3; Ham 8.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
