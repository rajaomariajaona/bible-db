document_id: EZK.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manambara ny fanimbana farany ny Tompo
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: «Indro ny andro fitsarana, ary mby akaiky sady miseho lany ny faharavana. Mitombo ny hetraketraka ary mahazo vahana ny avonavona
  - type: note
    content: 'Indro... ny faharavana: jereo and 7 sy nta. –Mitombo ny hetraketraka: teny an’ohatra no ampiasain’ny RM mamony ny tsora-kazo, jereo and 11.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ny herisetra dia toy ny tsorakazo arangaranga hanafaizana ny haratsiana; koa tsy hisy tavela intsony eo aminareo na ny hamaroanareo na ny harenareo na ny zava-kantonareo. '
  '12':
  - type: text
    content: 'Tonga ny fotoana ary akaiky ny andro fitsarana: aoka tsy hifaly ny mpividy ary aoka halahelo ny mpivarotra satria ny vahoaka rehetra no iharan’ny fahatezerako. '
  '13':
  - type: text
    content: 'Ny mpivarotra tsy hiverenan’ny entany intsony na dia mbola velona aina aza. Ny fahitana manambara ny loza hanjo ny vahoaka rehetra manko dia ho tanteraka. Samy miaina anaty heloka ny olona tsirairay ka tsy hisy hotafarina. '
  '14':
  - type: text
    content: Hotsofina ny anjomara ary hatao ny fiomanan-kiady, fa tsy hisy olona handeha hiantafika satria ny vahoaka rehetra no iharan’ny fahatezerako.»
  - type: heading
    content: Tsy hisy olona ho afaka amin’ny famaizana
  '15':
  - type: text
    content: '«Hirongatra eny an-dalambe ny ady, ary ao an-trano kosa ny areti-mandringana sy ny mosary. Ho fatin’ny ady ireo olona any an-tsaha, ary ho ripaky ny mosary sy ny areti-mandringana ireo any an-tanàna. '
  '16':
  - type: text
    content: Handositra any an-tendrombohitra izay sisa velona; ka samy hitoloko toy ny voromahailala an-dohasaha izy rehetra noho ny heloka nataony.
  '17':
  - type: text
    content: Hiraviravy tanana daholo izy
  - type: text
    content: ary halemy lohalika avokoa.
  '18':
  - type: text
    content: Hisikina lamba fisaonana izy
  - type: text
    content: ka ho safotry ny horohoro.
  - type: text
    content: Hisoritra henatra ny endrika rehetra
  - type: text
    content: ary ho voaharatra avokoa ny loha rehetra
  - type: note
    content: Ny misikina lamba fisaonana sy manaratra ny loha dia mariky ny fisaonana; jereo Is 15.2,3; Ham 8.10.
  - type: text
    content: .
  '19':
  - type: text
    content: Hariany eny an-dalambe ny volafotsiny
  - type: text
    content: ary hataony toy ny tain-drendrika ny volamenany
  - type: text
    content: satria na ny volafotsy na ny volamena
  - type: text
    content: dia samy tsy hahavonjy azy
  - type: text
    content: amin’ny androm-pahatezeran’ny TOMPO.
  - type: text
    content: Tsy hahafa-po azy na hahavoky azy izany
  - type: text
    content: satria ny volafotsy sy ny volamena
  - type: text
    content: no tonga fototry ny heloka ataony.
  '2':
  - type: text
    content: '«Mihainoa ianao, ry ilay taranak’olombelona. Izaho Tompo ANDRIANANAHARY dia milaza izao amin’ny tanin’i Israely: «Injao no farany; mby akaiky ny farany ho an’ny vazan-tany efatra eo aminao tokoa ry tanin’i Israely. '
  '20':
  - type: text
    content: Ny firàvany tsara tarehy
  - type: text
    content: dia niteraka avonavona tao aminy
  - type: text
    content: ka nisy namboarany sarivongan-tsampy
  - type: text
    content: maharikoriko sy mahatsiravina.
  - type: text
    content: Izany no nanaovako ireny firàvany ireny
  - type: text
    content: ho zavatra mankaloiloy azy.
  '21':
  - type: text
    content: Havelako horobain’ny vahiny koa ireny
  - type: text
    content: sy hofaohin’ny olon-dratsy ho babo
  - type: text
    content: rehefa avy nozimbazimbainy.
  '22':
  - type: text
    content: Hiamboho tsy hiraharaha azy Aho
  - type: text
    content: ka ilay raki-tsoako
  - type: note
    content: 'ilay raki-tsoako: izany hoe ny tempoly* izany, na ny tanànan’i Jerosalema renivohitra, na koa ny tanin’i Israely.'
  - type: text
    content: ' no hozimbazimbainy;'
  - type: text
    content: fa hiditra ao ny jiolahy
  - type: text
    content: ka hanimbazimba azy.
  '23':
  - type: text
    content: Manamboara rojo fandrohizana
  - type: note
    content: 'Manamboara rojo fandrohizana: ity baiko ity dia mety hitsinjovana ny fahababoana satria ny babo no rohizana amin’ny rojo araka ny mahazatra.'
  - type: text
    content: fa feno vonoan’olona ny tany
  - type: text
    content: ary feno herisetra ny tanàna.
  '24':
  - type: text
    content: Asaiko tonga ireo hafa firenena lozabe
  - type: text
    content: mba haka ny tranon’ny mponina.
  - type: text
    content: Hatsahatro ny avonavon’ireo mahery
  - type: text
    content: ary hozimbazimbaina ny toeramasiny
  - type: note
    content: 'Ny toeramasiny: araka ny dkt tranainy grika izany; ny RM kosa manao hoe ary ireo manamasina azy.'
  - type: text
    content: .
  '25':
  - type: text
    content: Ho avy ny tebiteby;
  - type: text
    content: hitady fiadanana izy fa tsy hisy.
  '26':
  - type: text
    content: Hifanesy tonga ny antambo
  - type: text
    content: ary hifanindry ny filazana loza.
  - type: text
    content: 'Ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' hitakiana fahitana fa tsy hisy;'
  - type: text
    content: 'ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' tsy manana fampianarana intsony'
  - type: text
    content: 'ary ireo '
  - type: text
    content: loholona
  - type: text
    content: ' tsy manome tolo-kevitra.'
  '27':
  - type: text
    content: Hisaona ny mpanjaka,
  - type: text
    content: tototra hakiviana ny andriana
  - type: text
    content: ary hangovi-tanana ny vahoaka.
  - type: text
    content: Hovaliako araka ny fitondrantenany izy
  - type: text
    content: ary hotsaraiko araka ny sahaza azy.
  - type: text
    content: Amin’izay dia hoeken’ireo
  - type: text
    content: fa Izaho no TOMPO.»
  '3':
  - type: text
    content: 'Ankehitriny no farany ho anao: hampihariko hamely anao ny fahatezerako. Hotsaraiko araka ny fitondrantenany ny mponinao ka hovaliako aminy avokoa ny asa maharikoriko rehetra nataony. '
  '4':
  - type: text
    content: Tsy ho antra fijery azy Aho ary tsy hamindrafo aminy, fa hataoko mivesatra ny vokatry ny fitondrantenany sy ny asa maharikoriko izay mbola tohiziny eo anivonao. Amin’izay dia hoekeny fa Izaho no TOMPO.»
  '5':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Indro fa avy ny loza, dia loza tsy misy toa azy! '
  '6':
  - type: text
    content: 'Injao no farany; mby akaiky ny farany, ry tanin’i Israely. Mifoha hiantonta aminao izy, indro fa avy tokoa. '
  '7':
  - type: text
    content: Ry mponina amin’ny tanin’i Israely, mby akaiky ny faharavana hanjo anareo, tonga ny fotoana, antomotra ny andro fitsarana
  - type: note
    content: 'ny andro fitsarana: jereo ohatra Is 2.12; Ham 5.18.'
  - type: text
    content: '. Sahotaka no hisolo ny horakora-pifaliana eny an-tendrombohitra. '
  '8':
  - type: text
    content: 'Izao ankehitriny izao no hanosahako ny fahatezerako aminareo ka hanamparako ny fahavinirako. Hotsaraiko araka ny fitondrantenanareo ianareo ary hovaliako aminareo ny asa maharikoriko rehetra nataonareo. '
  '9':
  - type: text
    content: Tsy ho antra fijery anareo Aho ary tsy hamindrafo aminareo, fa hovaliako aminareo ny fitondrantenanareo sy ny asa maharikoriko izay mbola tohizinareo eo anivonareo. Amin’izay dia hoekenareo fa Izaho TOMPO no mikapoka anareo.
