  - type: text
    text: ary hataony toy ny tain-drendrika ny volamenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria na ny volafotsy na ny volamena
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy tsy hahavonjy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny androm-pahatezeran’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hahafa-po azy na hahavoky azy izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny volafotsy sy ny volamena
- type: usfm
  marker: q1
  children:
