verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ny Tompo mpanjaka; maneran-tany ny fifaliana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny TOMPO no mpanjaka: miravoa, ry tany tontolo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifalia, ry mponina amin’ny nosy maro.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ianareo fatra-pitia ny TOMPO, mankahalà ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa miaro ny ain’ireo mpivavaka aminy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manafaka azy tsy ho voatanan’ny olon-dratsy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Misy hazavana mamiratra ho an’ny olo-marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitondra haravoana izany ho an’ny mahitsy fo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mifalia ao amin’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo olo-marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaova fiderana Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsarovy fa masina Izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rahona sy zavona mikitroka no manodidina Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rariny sy hitsiny no iorenan’ny fanjakany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '97.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 89.15.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Misy afo mandeha mialoha Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandevona ny fahavalony eny manodidina.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mahazava izao tontolo izao ny tselany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahita izany ny tany ka dia mangovitra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Miempo toy ny savoka ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ilay TOMPOn’ny tany tontolo;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: manambara ny fahamarinany ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahita ny voninahiny ny firenen-drehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aoka ho menatra izay rehetra manompo sampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mirehareha amin’ny zavatra tsinontsinona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiankohoka eo anoloan’ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo andriamanitra rehetra!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mandre izany i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' ka miravo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo tanànan’i Joda mifaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fifehezanao, TOMPO ô,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: satria IANAO no Ilay Avo Indrindra eran-tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ambonin’ireo andriamanitra rehetra.
