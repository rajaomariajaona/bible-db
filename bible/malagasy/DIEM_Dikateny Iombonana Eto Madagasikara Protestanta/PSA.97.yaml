  - type: text
    text: SALAMO Ny Tompo mpanjaka; maneran-tany ny fifaliana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny TOMPO no mpanjaka: miravoa, ry tany tontolo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifalia, ry mponina amin’ny nosy maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rahona sy zavona mikitroka no manodidina Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rariny sy hitsiny no iorenan’ny fanjakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '97.2 '
    - type: usfm
      marker: ft
