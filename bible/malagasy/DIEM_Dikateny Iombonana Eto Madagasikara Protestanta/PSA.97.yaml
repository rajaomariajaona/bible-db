document_id: PSA.97,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tompo mpanjaka; maneran-tany ny fifaliana
  - type: text
    content: 'Ny TOMPO no mpanjaka: miravoa, ry tany tontolo;'
  - type: text
    content: mifalia, ry mponina amin’ny nosy maro.
  '10':
  - type: text
    content: Ianareo fatra-pitia ny TOMPO, mankahalà ny ratsy
  - type: text
    content: fa miaro ny ain’ireo mpivavaka aminy Izy
  - type: text
    content: ka manafaka azy tsy ho voatanan’ny olon-dratsy.
  '11':
  - type: text
    content: Misy hazavana mamiratra ho an’ny olo-marina,
  - type: text
    content: ka mitondra haravoana izany ho an’ny mahitsy fo.
  '12':
  - type: text
    content: Mifalia ao amin’ny TOMPO,
  - type: text
    content: ianareo olo-marina;
  - type: text
    content: manaova fiderana Azy
  - type: text
    content: ka tsarovy fa masina Izy.
  '2':
  - type: text
    content: Rahona sy zavona mikitroka no manodidina Azy;
  - type: text
    content: rariny sy hitsiny no iorenan’ny fanjakany
  - type: note
    content: Sal 89.15.
  - type: text
    content: .
  '3':
  - type: text
    content: Misy afo mandeha mialoha Azy
  - type: text
    content: ka mandevona ny fahavalony eny manodidina.
  '4':
  - type: text
    content: Mahazava izao tontolo izao ny tselany;
  - type: text
    content: mahita izany ny tany ka dia mangovitra.
  '5':
  - type: text
    content: Miempo toy ny savoka ny tendrombohitra
  - type: text
    content: eo anoloan’ilay TOMPOn’ny tany tontolo;
  '6':
  - type: text
    content: manambara ny fahamarinany ny lanitra
  - type: text
    content: ary mahita ny voninahiny ny firenen-drehetra.
  '7':
  - type: text
    content: Aoka ho menatra izay rehetra manompo sampy
  - type: text
    content: sy mirehareha amin’ny zavatra tsinontsinona!
  - type: text
    content: Aoka hiankohoka eo anoloan’ny Tompo
  - type: text
    content: ianareo andriamanitra rehetra!
  '8':
  - type: text
    content: 'Mandre izany i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ka miravo;'
  - type: text
    content: ireo tanànan’i Joda mifaly
  - type: text
    content: noho ny fifehezanao, TOMPO ô,
  '9':
  - type: text
    content: satria IANAO no Ilay Avo Indrindra eran-tany
  - type: text
    content: sady ambonin’ireo andriamanitra rehetra.
