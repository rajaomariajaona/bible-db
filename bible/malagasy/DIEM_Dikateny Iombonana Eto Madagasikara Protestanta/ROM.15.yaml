      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Samia isika manao izay mahafaly ny namantsika amin’izay mahasoa ka mampiorina azy amin’ny finoana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary tamin’izany, dia nataoko ho voninahitra ny mitory ny Vaovao Mahafaly tamin’izay toerana tsy mbola nandrenesan’olona ny momba an’i Kristy; fa tsy tiako ny hanorina eo amin’ny fototra nataon’ny sasany, '
