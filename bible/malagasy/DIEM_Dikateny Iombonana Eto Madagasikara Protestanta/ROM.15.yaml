    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Koa rehefa vitako io raharaha io ary voatolotro ny vokatr’izany famoriam-bola izany, dia hiainga ho any Espaina aho ka handalo atỳ aminareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary fantatro fa rehefa mankatỳ aminareo aho, dia ho tonga miaraka amin’ny fitahian’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' feno dia feno.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Satria i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' koa tsy nikatsaka izay hahafaly ny tenany, fa araka ny voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hoe: «Ny latsa nataon’izay nandatsa Anao dia nihatra tamiko'
    - type: usfm
