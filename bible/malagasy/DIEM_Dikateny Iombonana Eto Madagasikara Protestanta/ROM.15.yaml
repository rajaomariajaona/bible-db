      children:
      - type: text
        text: '13'
    - type: text
      text: Ilay Andriamanitra loharanon’ny fanantenana anie hameno fifaliana sy fiadanana tanteraka anareo noho ny finoanareo, mba hampitomboina be dia be ao aminareo ny fanantenana noho ny herin’ny Fanahy Masina!
  - type: usfm
