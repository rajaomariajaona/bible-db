    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa raha ny aminareo, ry havako, dia matoky koa aho fa feno hatsaram-po ianareo ary henika ny fahalalana rehetra sady mahay mifananatra koa. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Kanefa, mba ho toy ny hamohafohazana ny fahalalana efa ao aminareo no nanoratako taminareo tamin-kasahiana ihany ombieny ombieny, noho ilay tombon-tsoa nomen’Andriamanitra ahy; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'fa izaho dia natokan’Andriamanitra ho mpanompon’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: '. Manatontosa fanompoana toy ny mpisorona aho, amin’ny itoriako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao mahafaly
    - type: text
      text: ' avy amin’Andriamanitra, mba ho zary fanatitra ankasitrahin’Andriamanitra ireo hafa firenena, rehefa voatokana ho azy noho ny asan’ny Fanahy Masina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa satria tafaray amin’i Kristy Jesoa aho, dia afaka mirehareha ny amin’ny asa ataoko ho an’Andriamanitra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa tsy misy sahiko lazaina, raha tsy izay notontosain’i Kristy tamin’ny alalako mba hitaomana ny hafa firenena hanaiky an’Andriamanitra: dia izay notontosain’i Kristy tamin’ny teny sy asa, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'tamin’ny herin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' sy zava-mahagaga ary tamin’ny herin’ny Fanahin’Andriamanitra. Hany ka feno tokoa ny fitoriako ny Vaovao Mahafaly momba an’i Kristy, hatrany Jerosalema sy ny manodidina ka hatrany amin’ny faritany Iliria'
    - type: usfm
