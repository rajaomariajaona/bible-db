  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Noho ny amin’i Jesoa Kristy Tompontsika ary noho ny fitiavana avy amin’ny Fanahy Masina, dia izao, ry havana, no angatahiko aminareo: aoka hiara-miady amiko ianareo ka hivavaka amin’Andriamanitra ho ahy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Mivavaha mba hahafahako amin’ny tanan’ny tsy mpino any Jodea ary mba hankasitrahin’ny vahoakan’Andriamanitra ilay fanampiana hoentiko any Jerosalema. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary dia ho faly tonga atỳ aminareo aho, raha sitrak’Andriamanitra izany, ka hiala sasatra eo afovoanareo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Homba anareo rehetra anie ilay Andriamanitra loharanon’ny fiadanana! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Eny, izay rehetra hitantsika ao amin’ny Soratra Masina dia voasoratra ho fampianarana antsika mba hananantsika ny fanantenana no ho ny faharetana sy ny fampaherezana avy amin’ny Soratra Masina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Andriamanitra loharanon’ny faharetana sy ny fampaherezana anie hampiray hina anareo, hanaraka ny ohatra nomen’i Kristy Jesoa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ka mba hiray feo ianareo hiara-manome voninahitra an’Andriamanitra, Rain’i Jesoa Kristy Tompontsika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ho an’ny firenen-drehetra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa mifandraisa tsara ianareo, tahaka ny nandraisan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' anareo koa ho voninahitr’Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa izao no ambarako aminareo: Tonga mpanompon’ny Jiosy i Kristy mba hahatanteraka ny fampanantenana natao tamin’ny razan’izy ireo ka anehoana fa azo antoka Andriamanitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary izany koa dia mba hahazoan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' manome voninahitra an’Andriamanitra noho ny famindrampony, araka izay voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izany no hiderako Anao any amin’ny hafa firenena
  - type: usfm
