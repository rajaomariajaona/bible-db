    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ankehitriny anefa, tsy misy raharaha mitana ahy amin’ireto faritany ireto intsony, sady naniry hankatỳ aminareo hatramin’ny taona maro aho. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa manantena aho fa amin’ny diako hankany Espaina, dia handalo eo aminareo ka hahita anareo; ary dia hampianareo ho any amin’io tany io, rehefa fenofeno ny hafaliako aminareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Izao anefa aho dia hankany Jerosalema hitondra fanampiana ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: ' any. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa sitraky ny any Masedônia sy Akaîa ny namory vola hanasoavana ireo mahantra amin’ny vahoakan’Andriamanitra any Jerosalema. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Eny, sitrapony tokoa izany, sady adidiny amin’ireo mahantra ireo: satria ny kristianina jiosy tany Jerosalema dia nizara ny harena ara-panahy nananany tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ; ka adidin’ny kristianina hafa firenena kosa ny manompo azy ireo amin’ny harena ara-nofo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.27 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 25-27:'
      - type: usfm
