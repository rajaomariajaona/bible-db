document_id: ROM.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namana aloha, fa tsy ny tena
  - type: text
    content: 'Adidintsika izay matanjaka ara-pinoana ny mizaka ny fahosan’ny malemy, fa tsy dia hanao izay mahafaly ny tenantsika fotsiny. '
  '10':
  - type: text
    content: 'Ary hoy indray ny Soratra Masina hoe:'
  - type: text
    content: «Miaraha miravo amin’ny vahoakan’ny Tompo,
  - type: text
    content: ry hafa firenena!»
  '11':
  - type: text
    content: 'Ary koa hoe: «Derao ny Tompo, ry firenena rehetra;'
  - type: text
    content: ankalazao Izy, ry vahoaka rehetra!»
  '12':
  - type: text
    content: 'Ary hoy indray i Isaià hoe:'
  - type: text
    content: «Ho avy ilay solofon’i Jisay,
  - type: text
    content: dia ilay hitsangana hifehy ny firenena
  - type: note
    content: 'Momba ny and 9-12: and 9: Sal 18.50; 2 Sa, 22.50. And 10: jereo Deot 32.43. –And 11: Sal 117.1. –And 12: Is 11.10, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: ':'
  - type: text
    content: Izy no hitokian’ireo firenena!»
  '13':
  - type: text
    content: Ilay Andriamanitra loharanon’ny fanantenana anie hameno fifaliana sy fiadanana tanteraka anareo noho ny finoanareo, mba hampitomboina be dia be ao aminareo ny fanantenana noho ny herin’ny Fanahy Masina!
  - type: heading
    content: Ny anton’ny nanoratan’i Paoly
  '14':
  - type: text
    content: 'Fa raha ny aminareo, ry havako, dia matoky koa aho fa feno hatsaram-po ianareo ary henika ny fahalalana rehetra sady mahay mifananatra koa. '
  '15':
  - type: text
    content: 'Kanefa, mba ho toy ny hamohafohazana ny fahalalana efa ao aminareo no nanoratako taminareo tamin-kasahiana ihany ombieny ombieny, noho ilay tombon-tsoa nomen’Andriamanitra ahy; '
  '16':
  - type: text
    content: 'fa izaho dia natokan’Andriamanitra ho mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa eo amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: '. Manatontosa fanompoana toy ny mpisorona aho, amin’ny itoriako ny '
  - type: text
    content: Vaovao mahafaly
  - type: text
    content: ' avy amin’Andriamanitra, mba ho zary fanatitra ankasitrahin’Andriamanitra ireo hafa firenena, rehefa voatokana ho azy noho ny asan’ny Fanahy Masina. '
  '17':
  - type: text
    content: 'Koa satria tafaray amin’i Kristy Jesoa aho, dia afaka mirehareha ny amin’ny asa ataoko ho an’Andriamanitra. '
  '18':
  - type: text
    content: 'Fa tsy misy sahiko lazaina, raha tsy izay notontosain’i Kristy tamin’ny alalako mba hitaomana ny hafa firenena hanaiky an’Andriamanitra: dia izay notontosain’i Kristy tamin’ny teny sy asa, '
  '19':
  - type: text
    content: 'tamin’ny herin’ny '
  - type: text
    content: famantarana
  - type: text
    content: ' sy zava-mahagaga ary tamin’ny herin’ny Fanahin’Andriamanitra. Hany ka feno tokoa ny fitoriako ny Vaovao Mahafaly momba an’i Kristy, hatrany Jerosalema sy ny manodidina ka hatrany amin’ny faritany Iliria'
  - type: note
    content: 'Iliria: faritany teo ambany fitondrana rômanina fahizany, mifanandrifindrify amin’ny tapany atsimon’ny hoe Iogôslavia ankehitriny.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Samia isika manao izay mahafaly ny namantsika amin’izay mahasoa ka mampiorina azy amin’ny finoana. '
  '20':
  - type: text
    content: 'Ary tamin’izany, dia nataoko ho voninahitra ny mitory ny Vaovao Mahafaly tamin’izay toerana tsy mbola nandrenesan’olona ny momba an’i Kristy; fa tsy tiako ny hanorina eo amin’ny fototra nataon’ny sasany, '
  '21':
  - type: text
    content: 'araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Ireo tsy mbola nilazana Azy dia hahita;
  - type: text
    content: ary ireo tsy mbola nandre dia hahalala
  - type: note
    content: Is 52.15, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!»'
  - type: heading
    content: Ny kasain’i Paoly hatao
  '22':
  - type: text
    content: Ary izany no nahasampona ahy matetika tsy ho tonga hatratỳ aminareo
  - type: note
    content: Ampit 1.13.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Ankehitriny anefa, tsy misy raharaha mitana ahy amin’ireto faritany ireto intsony, sady naniry hankatỳ aminareo hatramin’ny taona maro aho. '
  '24':
  - type: text
    content: 'Koa manantena aho fa amin’ny diako hankany Espaina, dia handalo eo aminareo ka hahita anareo; ary dia hampianareo ho any amin’io tany io, rehefa fenofeno ny hafaliako aminareo. '
  '25':
  - type: text
    content: 'Izao anefa aho dia hankany Jerosalema hitondra fanampiana ho an’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' any. '
  '26':
  - type: text
    content: 'Fa sitraky ny any Masedônia sy Akaîa ny namory vola hanasoavana ireo mahantra amin’ny vahoakan’Andriamanitra any Jerosalema. '
  '27':
  - type: text
    content: 'Eny, sitrapony tokoa izany, sady adidiny amin’ireo mahantra ireo: satria ny kristianina jiosy tany Jerosalema dia nizara ny harena ara-panahy nananany tamin’ireo '
  - type: text
    content: hafa firenena
  - type: text
    content: ; ka adidin’ny kristianina hafa firenena kosa ny manompo azy ireo amin’ny harena ara-nofo
  - type: note
    content: 'And 25-27: ampit 1Kôr 16.1-4; 9.11.'
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Koa rehefa vitako io raharaha io ary voatolotro ny vokatr’izany famoriam-bola izany, dia hiainga ho any Espaina aho ka handalo atỳ aminareo. '
  '29':
  - type: text
    content: 'Ary fantatro fa rehefa mankatỳ aminareo aho, dia ho tonga miaraka amin’ny fitahian’i '
  - type: text
    content: Kristy
  - type: text
    content: ' feno dia feno.'
  '3':
  - type: text
    content: 'Satria i '
  - type: text
    content: Kristy
  - type: text
    content: ' koa tsy nikatsaka izay hahafaly ny tenany, fa araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Ny latsa nataon’izay nandatsa Anao dia nihatra tamiko'
  - type: note
    content: Sal 69.10.
  - type: text
    content: '.» '
  '30':
  - type: text
    content: 'Noho ny amin’i Jesoa Kristy Tompontsika ary noho ny fitiavana avy amin’ny Fanahy Masina, dia izao, ry havana, no angatahiko aminareo: aoka hiara-miady amiko ianareo ka hivavaka amin’Andriamanitra ho ahy. '
  '31':
  - type: text
    content: 'Mivavaha mba hahafahako amin’ny tanan’ny tsy mpino any Jodea ary mba hankasitrahin’ny vahoakan’Andriamanitra ilay fanampiana hoentiko any Jerosalema. '
  '32':
  - type: text
    content: 'Ary dia ho faly tonga atỳ aminareo aho, raha sitrak’Andriamanitra izany, ka hiala sasatra eo afovoanareo. '
  '33':
  - type: text
    content: 'Homba anareo rehetra anie ilay Andriamanitra loharanon’ny fiadanana! '
  - type: text
    content: Amen
  - type: text
    content: .
  '4':
  - type: text
    content: 'Eny, izay rehetra hitantsika ao amin’ny Soratra Masina dia voasoratra ho fampianarana antsika mba hananantsika ny fanantenana no ho ny faharetana sy ny fampaherezana avy amin’ny Soratra Masina. '
  '5':
  - type: text
    content: 'Ary Andriamanitra loharanon’ny faharetana sy ny fampaherezana anie hampiray hina anareo, hanaraka ny ohatra nomen’i Kristy Jesoa. '
  '6':
  - type: text
    content: Ka mba hiray feo ianareo hiara-manome voninahitra an’Andriamanitra, Rain’i Jesoa Kristy Tompontsika.
  - type: heading
    content: Ho an’ny firenen-drehetra ny Vaovao Mahafaly
  '7':
  - type: text
    content: 'Koa mifandraisa tsara ianareo, tahaka ny nandraisan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' anareo koa ho voninahitr’Andriamanitra. '
  '8':
  - type: text
    content: 'Fa izao no ambarako aminareo: Tonga mpanompon’ny Jiosy i Kristy mba hahatanteraka ny fampanantenana natao tamin’ny razan’izy ireo ka anehoana fa azo antoka Andriamanitra. '
  '9':
  - type: text
    content: 'Ary izany koa dia mba hahazoan’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' manome voninahitra an’Andriamanitra noho ny famindrampony, araka izay voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Izany no hiderako Anao any amin’ny hafa firenena
  - type: text
    content: sy hihirako ho voninahitry ny anaranao.»
