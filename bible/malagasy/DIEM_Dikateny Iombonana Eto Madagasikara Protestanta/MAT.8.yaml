document_id: MAT.8,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay lehilahy marary hoditra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 1.40-45; Lk 5.12-26)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nidina avy teo an-tendrombohitra i Jesoa, dia narahina vahoaka maro. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaga i Jesoa raha nandre izany, ka loa-bolana tamin’ireo nanaraka Azy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lazaiko marina aminareo fa mbola tsy nisy olona nahitako finoana toy izany tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ambarako aminareo fa maro ny avy any atsinanana sy avy any andrefana no hipetraka hiara-misakafo amin-dry i Abrahama sy i Itsehàka ary i Jakôba any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’ny lanitra
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ireo natao handova ny Fanjakàn’ny lanitra kosa dia horoahina any amin’ny maizina any ivelany; ka any ireo no hitomany sy hikitro-nify.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ilay kapiteny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana, ary aoka ho tonga aminao araka izay ninoanao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia sitrana tamin’izany ora izany ilay mpanompony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ny olona maro
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 1.29-34; Lk 4.35-41)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantrano tao amin-dry i Petera i Jesoa, ary nahita ny rafozambavin’i Petera nandamaka fa voan’ny tazo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nokasihin’i Jesoa ny tanan-dravehivavy; ary nialan’ny tazo ravehivavy dia nitsangana nandroso sakafo ho an’i Jesoa.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hariva ny andro, dia maro ny azon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ' no nentin’ny olona teo amin’i Jesoa; teny fotsiny no nataon’i Jesoa handroahana ireny fanahy ratsy ireny. Ary izay rehetra narary dia nositraniny avokoa; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hany ka tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hoe: «Izy no naka ny rofintsika sy nitondra ny aretintsika'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 53.4.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ireo mikasa hiara-dia amin’i Jesoa: sokajy roa'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 9.57-62)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’i Jesoa ny vahoaka betsaka nanodidina Azy, dia nanome baiko Izy mba hankeny ampitan’ny farihin’i Galilea. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy anefa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' nanatona Azy ka nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpampianatra ô, hiaraka aminao aho na aiza na aiza alehanao!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro nisy lehilahy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: marary hoditra
    - type: text
      text: ' nanatona Azy, dia niankohoka teo anatrehany sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, raha sitrakao, dia hainao diovina aho!
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny fosa manan-davaka ary ny voro-manidina manana akany; fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' tsy mba manan-trano handriany sy hialany sasatra!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy olon-kafa, anisan’ny mpianatr’i Jesoa, nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, avelao aho aloha handevina an’i dada!
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andao hiaraka amiko; avelao izy samy maty no hifandevina!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ampitsaharin’i Jesoa ny tafio-drivotra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 4.35-41; Lk 8.22-35)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niondrana an-tsambokely i Jesoa, ka niarahan’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy tafio-drivotra mahery tonga tampoka teo amin’ny farihin’i Galilea, hany ka efa nila ho safotry ny alon-drano ny sambokely; i Jesoa anefa natory. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nohatonin’ireto mpianany Izy, ka nofohaziny sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, vonjeo fa ho faty isika!
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no saro-tahotra ianareo, ry kely finoana?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay vao niarina i Jesoa, dia niteny mafy ny rivotra sy ny farihy, ary nanjary tony dia tony ny andro. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaga ny olona ka vaky vava hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy aiza àry io Lehilahy io no manaiky Azy hatramin’ny rivotra sy ny farihy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 65.8; 89.10; 107.23-32.
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ireo azon’ny demony tany Gadarà
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 5.1-20; Lk 8.26-39)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tonga teny ampita teo amin’ny faritanin’i Gadarà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Gadarà '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia tanàna teo amin’ny 10 kilaometatra atsimo atsinanan’ny farihin’i Galilea.
      marker-yv: yv-n
    - type: text
      text: ' i Jesoa, dia nisy olona roa lahy nipoitra avy eny amin’ny fasana, nitsena Azy. Azon’ny demony izy roa lahy ary tena nasiaka mihitsy ka tsy nisy olona sahy nandalo tamin’izany lalana izany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia indreo izy roa lahy niantsoantso hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fa ataonao inona izahay, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Andriamanitra
    - type: text
      text: '? Tonga eto ve Ianao mba hampijaly anay alohan’ny fotoanandro?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanatsotra tanana i Jesoa dia nikasika azy sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Sitrako, madiova ianao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy hatrany dia nadio ny aretin-koditra nahazo an-dralehilahy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy kisoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 5.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' maro, andiany iray, nitrongy teny lavidavitra teny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nitalaho tamin’i Jesoa ireo demony nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha dia roahinao re izahay, mba alefaso amin’itsy andian-kisoa itsy.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ny demony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala tamin’izy roa lahy ny demony ka lasa niditra tao amin’ny kisoa. Ary indreo ny kisoa andiany manontolo fa nirifatra ka nivarimbarina tan-kilahila ho any anaty farihy dia maty an-drano tao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandositra kosa ireo mpiandry kisoa, ary nankany an-tanàna nilaza ny zava-nitranga rehetra sy ny momba azy roa lahy azon’ny demony teo aloha. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay ny mponina rehetra iray tanàna dia niainga nitsena an’i Jesoa; ka nony nahita Azy, dia nitalaho mba hialan’i Jesoa eo amin’ny taniny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tandremo ny milaza izao na amin’iza na amin’iza; fa mandehana miseho amin’ny mpisorona ary ento ny fanatitra voadidin’i Mosesy mba ho vavolombelona amin’ny olona fa madio
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 14.2-32.
      marker-yv: yv-n
    - type: text
      text: ' ianao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ny mpanompon’ilay kapiteny
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 7.1-10; Jôh 4.43-54)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa niditra tao Kafarnahòma i Jesoa, dia nisy kapitenin-tafika nanatona Azy sady nitaraina taminy '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, milamaka ao an-tranoko ao re ny mpanompoko, fa malemy sady mijaly mafy dia mafy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho avy Aho hanasitrana azy!
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’ny kapiteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tompo ô, tsy mendrika handrosoanao an-trano aho; fa teny fotsiny re atao, dia ho sitrana ny mpanompoko. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izaho manko, na ambany fahefan’olona aza, dia mba mifehy miaramila ihany; ka raha misy ataoko hoe «Mandehana», dia mandeha izy; na misy antsoiko hoe «Avia», dia avy izy; ary raha ny mpiasako no ilazako hoe «Ataovy izao», dia manao izy.
