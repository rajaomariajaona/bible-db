document_id: MAT.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitranin’i Jesoa ilay lehilahy marary hoditra
  - type: heading
    content: (Jereo Lk 1.40-45; Lk 5.12-26)
  - type: text
    content: 'Raha nidina avy teo an-tendrombohitra i Jesoa, dia narahina vahoaka maro. '
  '10':
  - type: text
    content: 'Gaga i Jesoa raha nandre izany, ka loa-bolana tamin’ireo nanaraka Azy nanao hoe:'
  - type: text
    content: '–Lazaiko marina aminareo fa mbola tsy nisy olona nahitako finoana toy izany tamin’i '
  - type: text
    content: Israely
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ambarako aminareo fa maro ny avy any atsinanana sy avy any andrefana no hipetraka hiara-misakafo amin-dry i Abrahama sy i Itsehàka ary i Jakôba any amin’ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ireo natao handova ny Fanjakàn’ny lanitra kosa dia horoahina any amin’ny maizina any ivelany; ka any ireo no hitomany sy hikitro-nify.
  '13':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ilay kapiteny:'
  - type: text
    content: –Mandehana, ary aoka ho tonga aminao araka izay ninoanao.
  - type: text
    content: Dia sitrana tamin’izany ora izany ilay mpanompony.
  - type: heading
    content: Sitranin’i Jesoa ny olona maro
  - type: heading
    content: (Jereo Mk 1.29-34; Lk 4.35-41)
  '14':
  - type: text
    content: 'Dia niantrano tao amin-dry i Petera i Jesoa, ary nahita ny rafozambavin’i Petera nandamaka fa voan’ny tazo. '
  '15':
  - type: text
    content: Nokasihin’i Jesoa ny tanan-dravehivavy; ary nialan’ny tazo ravehivavy dia nitsangana nandroso sakafo ho an’i Jesoa.
  '16':
  - type: text
    content: 'Nony hariva ny andro, dia maro ny azon’ny '
  - type: text
    content: demony
  - type: text
    content: ' no nentin’ny olona teo amin’i Jesoa; teny fotsiny no nataon’i Jesoa handroahana ireny fanahy ratsy ireny. Ary izay rehetra narary dia nositraniny avokoa; '
  '17':
  - type: text
    content: 'hany ka tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe: «Izy no naka ny rofintsika sy nitondra ny aretintsika'
  - type: note
    content: Is 53.4.
  - type: text
    content: .»
  - type: heading
    content: 'Ireo mikasa hiara-dia amin’i Jesoa: sokajy roa'
  - type: heading
    content: (Jereo Lk 9.57-62)
  '18':
  - type: text
    content: 'Nony hitan’i Jesoa ny vahoaka betsaka nanodidina Azy, dia nanome baiko Izy mba hankeny ampitan’ny farihin’i Galilea. '
  '19':
  - type: text
    content: 'Nisy anefa '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' nanatona Azy ka nilaza taminy hoe:'
  - type: text
    content: –Mpampianatra ô, hiaraka aminao aho na aiza na aiza alehanao!
  '2':
  - type: text
    content: 'Ary indro nisy lehilahy '
  - type: text
    content: marary hoditra
  - type: text
    content: ' nanatona Azy, dia niankohoka teo anatrehany sady nanao hoe:'
  - type: text
    content: –Tompo ô, raha sitrakao, dia hainao diovina aho!
  '20':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Ny fosa manan-davaka ary ny voro-manidina manana akany; fa ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' tsy mba manan-trano handriany sy hialany sasatra!'
  '21':
  - type: text
    content: 'Dia nisy olon-kafa, anisan’ny mpianatr’i Jesoa, nilaza taminy hoe:'
  - type: text
    content: –Tompo ô, avelao aho aloha handevina an’i dada!
  '22':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Andao hiaraka amiko; avelao izy samy maty no hifandevina!
  - type: heading
    content: Ampitsaharin’i Jesoa ny tafio-drivotra
  - type: heading
    content: (Jereo Mk 4.35-41; Lk 8.22-35)
  '23':
  - type: text
    content: 'Ary niondrana an-tsambokely i Jesoa, ka niarahan’ireo '
  - type: text
    content: mpianany
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ary nisy tafio-drivotra mahery tonga tampoka teo amin’ny farihin’i Galilea, hany ka efa nila ho safotry ny alon-drano ny sambokely; i Jesoa anefa natory. '
  '25':
  - type: text
    content: 'Dia nohatonin’ireto mpianany Izy, ka nofohaziny sady nataony hoe:'
  - type: text
    content: –Tompo ô, vonjeo fa ho faty isika!
  '26':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Nahoana no saro-tahotra ianareo, ry kely finoana?
  - type: text
    content: 'Izay vao niarina i Jesoa, dia niteny mafy ny rivotra sy ny farihy, ary nanjary tony dia tony ny andro. '
  '27':
  - type: text
    content: 'Gaga ny olona ka vaky vava hoe:'
  - type: text
    content: –Avy aiza àry io Lehilahy io no manaiky Azy hatramin’ny rivotra sy ny farihy
  - type: note
    content: Ampit Sal 65.8; 89.10; 107.23-32.
  - type: text
    content: '?'
  - type: heading
    content: Sitranin’i Jesoa ireo azon’ny demony tany Gadarà
  - type: heading
    content: (Jereo Mk 5.1-20; Lk 8.26-39)
  '28':
  - type: text
    content: Rehefa tonga teny ampita teo amin’ny faritanin’i Gadarà
  - type: note
    content: I Gadarà dia tanàna teo amin’ny 10 kilaometatra atsimo atsinanan’ny farihin’i Galilea.
  - type: text
    content: ' i Jesoa, dia nisy olona roa lahy nipoitra avy eny amin’ny fasana, nitsena Azy. Azon’ny demony izy roa lahy ary tena nasiaka mihitsy ka tsy nisy olona sahy nandalo tamin’izany lalana izany. '
  '29':
  - type: text
    content: 'Dia indreo izy roa lahy niantsoantso hoe:'
  - type: text
    content: '–Fa ataonao inona izahay, ry '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: '? Tonga eto ve Ianao mba hampijaly anay alohan’ny fotoanandro?'
  '3':
  - type: text
    content: 'Nanatsotra tanana i Jesoa dia nikasika azy sady niteny hoe:'
  - type: text
    content: –Sitrako, madiova ianao!
  - type: text
    content: 'Avy hatrany dia nadio ny aretin-koditra nahazo an-dralehilahy. '
  '30':
  - type: text
    content: Ary nisy kisoa
  - type: note
    content: Jereo Mk 5.11 sy nta.
  - type: text
    content: ' maro, andiany iray, nitrongy teny lavidavitra teny. '
  '31':
  - type: text
    content: 'Koa nitalaho tamin’i Jesoa ireo demony nanao hoe:'
  - type: text
    content: –Raha dia roahinao re izahay, mba alefaso amin’itsy andian-kisoa itsy.
  '32':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny demony:'
  - type: text
    content: –Mandehana.
  - type: text
    content: 'Dia niala tamin’izy roa lahy ny demony ka lasa niditra tao amin’ny kisoa. Ary indreo ny kisoa andiany manontolo fa nirifatra ka nivarimbarina tan-kilahila ho any anaty farihy dia maty an-drano tao. '
  '33':
  - type: text
    content: 'Nandositra kosa ireo mpiandry kisoa, ary nankany an-tanàna nilaza ny zava-nitranga rehetra sy ny momba azy roa lahy azon’ny demony teo aloha. '
  '34':
  - type: text
    content: Tamin’izay ny mponina rehetra iray tanàna dia niainga nitsena an’i Jesoa; ka nony nahita Azy, dia nitalaho mba hialan’i Jesoa eo amin’ny taniny.
  '4':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Tandremo ny milaza izao na amin’iza na amin’iza; fa mandehana miseho amin’ny mpisorona ary ento ny fanatitra voadidin’i Mosesy mba ho vavolombelona amin’ny olona fa madio
  - type: note
    content: Jereo Lev 14.2-32.
  - type: text
    content: ' ianao.'
  - type: heading
    content: Sitranin’i Jesoa ny mpanompon’ilay kapiteny
  - type: heading
    content: (Jereo Lk 7.1-10; Jôh 4.43-54)
  '5':
  - type: text
    content: 'Rehefa niditra tao Kafarnahòma i Jesoa, dia nisy kapitenin-tafika nanatona Azy sady nitaraina taminy '
  '6':
  - type: text
    content: 'hoe:'
  - type: text
    content: –Tompo ô, milamaka ao an-tranoko ao re ny mpanompoko, fa malemy sady mijaly mafy dia mafy.
  '7':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Ho avy Aho hanasitrana azy!
  '8':
  - type: text
    content: 'Dia novalian’ny kapiteny hoe:'
  - type: text
    content: '–Tompo ô, tsy mendrika handrosoanao an-trano aho; fa teny fotsiny re atao, dia ho sitrana ny mpanompoko. '
  '9':
  - type: text
    content: Izaho manko, na ambany fahefan’olona aza, dia mba mifehy miaramila ihany; ka raha misy ataoko hoe «Mandehana», dia mandeha izy; na misy antsoiko hoe «Avia», dia avy izy; ary raha ny mpiasako no ilazako hoe «Ataovy izao», dia manao izy.
