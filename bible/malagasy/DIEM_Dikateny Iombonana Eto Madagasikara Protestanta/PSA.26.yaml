document_id: PSA.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Miantso vonjy amin’Andriamanitra ny tsy manan-tsiny
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: TOMPO ô, ambarao ho tsy manan-tsiny aho
  - type: text
    content: fa madio fiaina sy matoky tanteraka ANAO.
  '10':
  - type: text
    content: dia ireo mivimbina ody ratsy an-tanan’ila
  - type: text
    content: ary ny ilany indray feno tsolotra noraisina.
  '11':
  - type: text
    content: Fa izaho kosa dia madio fiaina;
  - type: text
    content: koa afaho sy iantrao aho.
  '12':
  - type: text
    content: Lala-mahitsy no ijoroan’ny tongotro;
  - type: text
    content: ka isaky ny miangona aho, dia hisaotra ny TOMPO.
  '2':
  - type: text
    content: TOMPO ô, fotory toetra sy diniho aho
  - type: text
    content: ka tsarao ny faniriako aman’eritreritro.
  '3':
  - type: text
    content: Ifantohan’ny masoko ny fitiavanao;
  - type: text
    content: ary ny fahamarinanao no arahiko.
  '4':
  - type: text
    content: Tsy niray tsikombakomba tamin’ny mpisoloky aho
  - type: text
    content: na niara-dia tamin’ny mpihatsaravelatsihy;
  '5':
  - type: text
    content: fa halako ny fikambanan’ny olon-dratsy
  - type: text
    content: ary ihatahako lavitra ny olo-meloka.
  '6':
  - type: text
    content: Hanasa tanana aho satria tsy manan-tsiny.
  - type: text
    content: 'TOMPO ô, hanodidina ny '
  - type: text
    content: alitaranao
  - type: text
    content: ' aho'
  '7':
  - type: text
    content: ka hiredona hira fisaorana Anao
  - type: text
    content: sady hitantara ny asanao mahagaga rehetra.
  '8':
  - type: text
    content: TOMPO ô, tiako ny trano onenanao,
  - type: text
    content: dia ny toerana ipetrahan’ny voninahitrao.
  '9':
  - type: text
    content: Aza aringana miaraka amin’ny mpanota aho;
  - type: text
    content: ny aiko, aza esorina toy ny an’ny mpamono olona,
