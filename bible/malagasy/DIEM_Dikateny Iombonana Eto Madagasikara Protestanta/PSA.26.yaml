    - type: text
      text: ' aho'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiredona hira fisaorana Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hitantara ny asanao mahagaga rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tiako ny trano onenanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny toerana ipetrahan’ny voninahitrao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza aringana miaraka amin’ny mpanota aho;
  - type: usfm
