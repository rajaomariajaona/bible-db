  children:
  - type: text
    text: SALAMO Miantso vonjy amin’Andriamanitra ny tsy manan-tsiny
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, ambarao ho tsy manan-tsiny aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa madio fiaina sy matoky tanteraka ANAO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: TOMPO ô, fotory toetra sy diniho aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsarao ny faniriako aman’eritreritro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ifantohan’ny masoko ny fitiavanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahamarinanao no arahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy niray tsikombakomba tamin’ny mpisoloky aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na niara-dia tamin’ny mpihatsaravelatsihy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fa halako ny fikambanan’ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ihatahako lavitra ny olo-meloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hanasa tanana aho satria tsy manan-tsiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'TOMPO ô, hanodidina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitaranao
  - type: text
    text: ' aho'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ka hiredona hira fisaorana Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hitantara ny asanao mahagaga rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: TOMPO ô, tiako ny trano onenanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny toerana ipetrahan’ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza aringana miaraka amin’ny mpanota aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny aiko, aza esorina toy ny an’ny mpamono olona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia ireo mivimbina ody ratsy an-tanan’ila
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ilany indray feno tsolotra noraisina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa izaho kosa dia madio fiaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa afaho sy iantrao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lala-mahitsy no ijoroan’ny tongotro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka isaky ny miangona aho, dia hisaotra ny TOMPO.
