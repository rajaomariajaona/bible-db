    - type: text
      text: TOMPO ô, ambarao ho tsy manan-tsiny aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa madio fiaina sy matoky tanteraka ANAO.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo mivimbina ody ratsy an-tanan’ila
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ilany indray feno tsolotra noraisina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa dia madio fiaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa afaho sy iantrao aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lala-mahitsy no ijoroan’ny tongotro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka isaky ny miangona aho, dia hisaotra ny TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, fotory toetra sy diniho aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsarao ny faniriako aman’eritreritro.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ifantohan’ny masoko ny fitiavanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinanao no arahiko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy niray tsikombakomba tamin’ny mpisoloky aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na niara-dia tamin’ny mpihatsaravelatsihy;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa halako ny fikambanan’ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ihatahako lavitra ny olo-meloka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanasa tanana aho satria tsy manan-tsiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'TOMPO ô, hanodidina ny '
    - type: usfm
