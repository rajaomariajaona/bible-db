document_id: 2CH.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanorenana ny tempoly
  - type: heading
    content: (Jereo 1 Mp 6.1-38)
  - type: text
    content: 'Dia nanomboka nanao ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' tao Jerosalema i Salômôna ka teo amin’ny tendrombohitra Môrià'
  - type: note
    content: 'Môrià: eto ihany eran’ny Test. Tal manontolo no omena izany anarana izany ny tendrombohitra izay mazàna antsoina hoe Tsiôna*. Kanefa ampit Gen 22 izay itenenana ny «tanin’i Môrià» (and 2) izay misy ilay «tendrombohitra hikarakaran’ny Tompo izany» (and 14); izany no mety nahatonga ny mpanoratra ity Bokin’ny Tantara ity hampitovy ny havoana misy ny tempoly sy ilay tendrombohitra Môrià.'
  - type: text
    content: ', izay nisehoan’ny Tompo tamin’i Davida rainy no nanorenany azy, dia ilay toerana nomanin’i Davida tao amin’ny famoloan’i Ôrnàna izay lehilahy jebosita'
  - type: note
    content: 'ny famoloan’i... jebosita: jereo 1 Tan 21.15–22.1.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Tao amin’ny Toeramasina Indrindra dia namboarana sarivongana kerobima anankiroa, ka metaly narendrika
  - type: note
    content: 'metaly narendrika: ao amin’ny dkt tranainy grika dia hazo ka mifanaraka amin’ny voalazan’ny 1 Mp 6.23 izany; sady tsy azo antoka loatra ny dikan’ny voambolana hebreo ampiasaina eto.'
  - type: text
    content: ' sady nopetahana takela-bolamena no nanaovana azy. '
  '11':
  - type: text
    content: Nijoro tamin’ny tongony ireo kerobima ireo, ary ny tarehiny nitodika tany amin’ny fidirana. Samy nanana elatra roa avy ireto kerobima ireto; ka ny anankiray samy nipaka tamin’ny rindrina, ary ny anankiray nifanendry teo afovoany. Roa metatra sy sasany ny fivelaran’ny elatra ka ny halavan’ny elatra mivelatra rehetra mitambatra dia folo metatra
  - type: note
    content: Ampit Eks 25.18-20.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Lamba rongony voaloko volomparasy sy mena ary jaky no nanaovana ny efitra lamba; ka sarin-kerobima no natao sorany
  - type: note
    content: Ampit Eks 26.31.
  - type: text
    content: .
  - type: heading
    content: Ireo andry halimo sy ny alitara
  - type: heading
    content: (Jereo 1 Mp 7.15-22)
  '15':
  - type: text
    content: 'Dia nanao ireo andry roa teo anoloan’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' i Horama'
  - type: note
    content: Araka ny 4.11 sy 1 Mp 7, dia toa i Horama (na Horama-Abỳ, 2.12) mpahay taozavatra no niangaly ireo asa rehetra ireo na dia tsy voatonona mivantana aza.
  - type: text
    content: ', ka 17 metatra sy sasany ny haavony; ary ny koronosy teo an-tampony kosa dia roa metatra sy sasany avy ny haavony. '
  '16':
  - type: text
    content: 'Nataony koa ny tongàlika miendrika rojo, ka napetrany teo an-tampon’ny andry; avy eo dia nataony ny ravaka misarin’ampongabendanitra zato ka nahantony tamin’ireo tongàlika ireo. '
  '17':
  - type: text
    content: Dia natsangany teo anoloan’ny Toeramasina ireo andry roa, ka ny anankiray tamin’ny ankavanana ary ny anankiray tamin’ny ankavia; ny anaran’ilay teo ankavanana dia Jakîna, izany hoe «Andriamanitra mampiorina mafy», ary ny anaran’ilay teo ankavia dia Bôhaza, izany hoe «Ao amin’Andriamanitra ny hery».
  '2':
  - type: text
    content: Tamin’ny volana faharoan’ny taona fahefatra nanjakany no nanombohany nanorina ny tempoly.
  '3':
  - type: text
    content: 'Toy izao no refy naraikitr’i Salômôna hanorenana ny tranon’Andriamanitra: ny lavany araka ny nandrefesana azy dia telopolo metatra, ny haavony dia 15 metatra ary ny sakany folo metatra. '
  '4':
  - type: text
    content: 'Ny lalantsara fidirana, izay teo anoloan’ny '
  - type: text
    content: efitrano malalaka
  - type: text
    content: ', dia nirefy dimy metatra ny sakany; ny lavany, izay nitovy refy tamin’ny sakan’ny tempoly, dia folo metatra; ary ny haavony koa dia folo metatra. Nopetahana takela-bolamena madio ny rindrina tao anatin’io lalantsara io. '
  '5':
  - type: text
    content: Ny efitrano malalaka kosa dia norakofana hazo kipreso, izay nopetahana takela-bolamena madio sady voaisy ravaka miendrika sampan-drofia sy tongàlika
  - type: note
    content: tongàlika na hoe karazana girlandy.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Noravahana vatosoa koa io efitrano io; ary ny volamena nampiasaina dia volamena avy any Parvaîma
  - type: note
    content: 'Parvaîma: eto ihany no itenenana izany toerana izany eran’ny Test. Tal., kanefa tsy fantatra mazava ny misy azy.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Nopetahana takela-bolamena hatramin’ny rairainy sy ny tokonana ary ny rindrina sy ny lelambaravarana; ary nanaovany sary sikotra '
  - type: text
    content: kerobima
  - type: text
    content: ' koa ny rindrina.'
  '8':
  - type: text
    content: 'Avy eo dia natao ilay efitrano antsoina hoe '
  - type: text
    content: Toeramasina Indrindra
  - type: note
    content: Ampit Eks 26.33-34.
  - type: text
    content: '; efamira io efitrano io fa ny lafiny rehetra dia samy nirefy folo metatra tahaka ny sakan’ny tempoly. Nopetahana takela-bolamena milanja roapolo taonina ny rindrina anatiny. '
  '9':
  - type: text
    content: Ny fantsika volamena dia nilanja dimampolo sekela
  - type: note
    content: Ny sekela dia lanja mitovy amin’ny 11 grama.
  - type: text
    content: . Ary ireo efitrano tamboniny aza dia nopetahana volamena koa ny rindrina anatiny.
