document_id: 2CH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanorenana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 6.1-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nanomboka nanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' tao Jerosalema i Salômôna ka teo amin’ny tendrombohitra Môrià'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Môrià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eto ihany eran’ny Test. Tal manontolo no omena izany anarana izany ny tendrombohitra izay mazàna antsoina hoe Tsiôna*. Kanefa ampit Gen 22 izay itenenana ny «tanin’i Môrià» (and 2) izay misy ilay «tendrombohitra hikarakaran’ny Tompo izany» (and 14); izany no mety nahatonga ny mpanoratra ity Bokin’ny Tantara ity hampitovy ny havoana misy ny tempoly sy ilay tendrombohitra Môrià.
    marker-yv: yv-n
  - type: text
    text: ', izay nisehoan’ny Tompo tamin’i Davida rainy no nanorenany azy, dia ilay toerana nomanin’i Davida tao amin’ny famoloan’i Ôrnàna izay lehilahy jebosita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny famoloan’i... jebosita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Tan 21.15–22.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tamin’ny volana faharoan’ny taona fahefatra nanjakany no nanombohany nanorina ny tempoly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Toy izao no refy naraikitr’i Salômôna hanorenana ny tranon’Andriamanitra: ny lavany araka ny nandrefesana azy dia telopolo metatra, ny haavony dia 15 metatra ary ny sakany folo metatra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny lalantsara fidirana, izay teo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: efitrano malalaka
  - type: text
    text: ', dia nirefy dimy metatra ny sakany; ny lavany, izay nitovy refy tamin’ny sakan’ny tempoly, dia folo metatra; ary ny haavony koa dia folo metatra. Nopetahana takela-bolamena madio ny rindrina tao anatin’io lalantsara io. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny efitrano malalaka kosa dia norakofana hazo kipreso, izay nopetahana takela-bolamena madio sady voaisy ravaka miendrika sampan-drofia sy tongàlika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tongàlika '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe karazana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: girlandy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Noravahana vatosoa koa io efitrano io; ary ny volamena nampiasaina dia volamena avy any Parvaîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Parvaîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eto ihany no itenenana izany toerana izany eran’ny Test. Tal., kanefa tsy fantatra mazava ny misy azy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nopetahana takela-bolamena hatramin’ny rairainy sy ny tokonana ary ny rindrina sy ny lelambaravarana; ary nanaovany sary sikotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' koa ny rindrina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avy eo dia natao ilay efitrano antsoina hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina Indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 26.33-34.
    marker-yv: yv-n
  - type: text
    text: '; efamira io efitrano io fa ny lafiny rehetra dia samy nirefy folo metatra tahaka ny sakan’ny tempoly. Nopetahana takela-bolamena milanja roapolo taonina ny rindrina anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fantsika volamena dia nilanja dimampolo sekela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sekela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia lanja mitovy amin’ny 11 grama.'
    marker-yv: yv-n
  - type: text
    text: . Ary ireo efitrano tamboniny aza dia nopetahana volamena koa ny rindrina anatiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tao amin’ny Toeramasina Indrindra dia namboarana sarivongana kerobima anankiroa, ka metaly narendrika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'metaly narendrika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ao amin’ny dkt tranainy grika dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hazo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ka mifanaraka amin’ny voalazan’ny 1 Mp 6.23 izany; sady tsy azo antoka loatra ny dikan’ny voambolana hebreo ampiasaina eto.'
    marker-yv: yv-n
  - type: text
    text: ' sady nopetahana takela-bolamena no nanaovana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: Nijoro tamin’ny tongony ireo kerobima ireo, ary ny tarehiny nitodika tany amin’ny fidirana. Samy nanana elatra roa avy ireto kerobima ireto; ka ny anankiray samy nipaka tamin’ny rindrina, ary ny anankiray nifanendry teo afovoany. Roa metatra sy sasany ny fivelaran’ny elatra ka ny halavan’ny elatra mivelatra rehetra mitambatra dia folo metatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 25.18-20.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lamba rongony voaloko volomparasy sy mena ary jaky no nanaovana ny efitra lamba; ka sarin-kerobima no natao sorany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 26.31.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo andry halimo sy ny alitara
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 7.15-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanao ireo andry roa teo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' i Horama'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny 4.11 sy 1 Mp 7, dia toa i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Horama (na Horama-Abỳ, 2.12)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mpahay taozavatra no niangaly ireo asa rehetra ireo na dia tsy voatonona mivantana aza.'
    marker-yv: yv-n
  - type: text
    text: ', ka 17 metatra sy sasany ny haavony; ary ny koronosy teo an-tampony kosa dia roa metatra sy sasany avy ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nataony koa ny tongàlika miendrika rojo, ka napetrany teo an-tampon’ny andry; avy eo dia nataony ny ravaka misarin’ampongabendanitra zato ka nahantony tamin’ireo tongàlika ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia natsangany teo anoloan’ny Toeramasina ireo andry roa, ka ny anankiray tamin’ny ankavanana ary ny anankiray tamin’ny ankavia; ny anaran’ilay teo ankavanana dia Jakîna, izany hoe «Andriamanitra mampiorina mafy», ary ny anaran’ilay teo ankavia dia Bôhaza, izany hoe «Ao amin’Andriamanitra ny hery».
