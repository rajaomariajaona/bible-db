document_id: PSA.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mahazo matoky ny Tompo ny mpanjaka
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: Raha vao hiseho fotsiny Ianao,
  - type: text
    content: dia ho toy ny afo mijoalajoala handevona azy.
  - type: text
    content: –Eny, hofongoran’ny TOMPO amin’ny hatezerany anie ireny
  - type: text
    content: tahaka ny andevonan’ny afo ireo zavatra dorana!–
  '11':
  - type: text
    content: Hofoananao tsy ho eto an-tany ny taranany,
  - type: text
    content: ka hoesorinao tsy ho eo amin’ny olombelona.
  '12':
  - type: text
    content: Raha mikasa hanisy ratsy anao ireny
  - type: text
    content: na mitady hanohitra, dia tsy hahomby;
  '13':
  - type: text
    content: fa tifirinao amin’ny zana-tsipîka izy
  - type: text
    content: ary ataonao rifatra mandositra.
  '14':
  - type: text
    content: Misandrata, TOMPO ô, amin’izato herinao
  - type: text
    content: fa hankalazainay an-kira ny fandresenao.
  '2':
  - type: text
    content: TOMPO ô, ny herinao no ifalian’ny mpanjaka
  - type: text
    content: ary ny fandresenao no iravoany aoka izany.
  '3':
  - type: text
    content: Nomenao azy izay zavatra nirîny
  - type: text
    content: ary tsy nolavinao izay nangatahiny taminao.
  - type: text
    content: Fiatoana
  '4':
  - type: text
    content: 'Eny, notsenainao '
  - type: text
    content: fitahian-tsoa
  - type: text
    content: ' izy'
  - type: text
    content: ka fehiloha volamena no nasatrokao ny lohany;
  '5':
  - type: text
    content: ny fiainana nangatahiny nomenao azy,
  - type: text
    content: dia andro mitandavana mandrakizay.
  '6':
  - type: text
    content: 'Noho ny fandresenao dia lehibe ny voninahiny:'
  - type: text
    content: fiandrianana sy laza no arakotrao azy.
  '7':
  - type: text
    content: Fa ataonao heni-pitahiana hatrany izy
  - type: note
    content: 'heni-pitahiana... izy: jereo Sal 72.16-17.'
  - type: text
    content: ary ampifalînao amin’ny fanatrehanao.
  '8':
  - type: text
    content: Eny, ny TOMPO no itokian’ny mpanjaka,
  - type: text
    content: hany ka tsy hangozohozo akory izy
  - type: text
    content: satria tia azy ilay Avo Indrindra.
  '9':
  - type: text
    content: Ry Andriamanitra Mpanjaka ô,
  - type: text
    content: ho azonao ny fahavalonao rehetra
  - type: text
    content: ary ho eo am-pelatananao
  - type: text
    content: ireo rehetra mpankahala Anao.
