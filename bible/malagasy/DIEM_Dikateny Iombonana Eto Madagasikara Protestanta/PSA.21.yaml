verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Mahazo matoky ny Tompo ny mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha vao hiseho fotsiny Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho toy ny afo mijoalajoala handevona azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Eny, hofongoran’ny TOMPO amin’ny hatezerany anie ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny andevonan’ny afo ireo zavatra dorana!–
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hofoananao tsy ho eto an-tany ny taranany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hoesorinao tsy ho eo amin’ny olombelona.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha mikasa hanisy ratsy anao ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mitady hanohitra, dia tsy hahomby;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: fa tifirinao amin’ny zana-tsipîka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataonao rifatra mandositra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Misandrata, TOMPO ô, amin’izato herinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hankalazainay an-kira ny fandresenao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: TOMPO ô, ny herinao no ifalian’ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fandresenao no iravoany aoka izany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nomenao azy izay zavatra nirîny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nolavinao izay nangatahiny taminao.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Eny, notsenainao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitahian-tsoa
    - type: text
      text: ' izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka fehiloha volamena no nasatrokao ny lohany;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ny fiainana nangatahiny nomenao azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia andro mitandavana mandrakizay.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Noho ny fandresenao dia lehibe ny voninahiny:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fiandrianana sy laza no arakotrao azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ataonao heni-pitahiana hatrany izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'heni-pitahiana... izy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 72.16-17.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampifalînao amin’ny fanatrehanao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Eny, ny TOMPO no itokian’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hany ka tsy hangozohozo akory izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tia azy ilay Avo Indrindra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ry Andriamanitra Mpanjaka ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho azonao ny fahavalonao rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho eo am-pelatananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo rehetra mpankahala Anao.
