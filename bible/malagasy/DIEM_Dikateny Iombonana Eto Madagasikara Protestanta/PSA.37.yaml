document_id: PSA.37
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Aza tezitra amin’ny fahombiazan’ny olon-dratsy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nataon’i Davida.
- type: usfm
  marker: sp
  children:
  - type: text
    text: ALEFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza tezitra amin’ny mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mialona ireo mpanao heloka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: fa toy ny ahitra ireny ka malaky malazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny vilo-maitso ka mbola hihamaina.
- type: usfm
  marker: sp
  children:
  - type: text
    text: BETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Matokia ny TOMPO, manaova ny tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia honina amin’ny tany nomeny ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiaina amim-pilaminana azo antoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka ny TOMPO no hiravoanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia homeny anao izay irîn’ny fonao!
- type: usfm
  marker: sp
  children:
  - type: text
    text: GIMELA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ankino amin’ny TOMPO ny fiainanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka itokio Izy fa hanao izay mahasoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny rariny anananao hasehony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho toy ny mazavatsinanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zo tandrify anao haharihariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny mitataovovonana.
- type: usfm
  marker: sp
  children:
  - type: text
    text: DALETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka hitombina tsara eo anatrehan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiandry Azy amim-paharetana ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza tezitra amin’izay mahomby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia amin’ny olona manao fetsifetsy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ialao ny hatezerana, avelao ny havinirana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza misafoaka fa loza no hiafaran’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Satria hofongorana ireo mpanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay matoky ny TOMPO no handova ny tany.
- type: usfm
  marker: sp
  children:
  - type: text
    text: VAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy ho ela dia hanjavona ny olon-dratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: handinika izay nisy azy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hahita na inona na inona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny malemy fanahy no handova ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho finaritra hombam-piadanam-be.
- type: usfm
  marker: sp
  children:
  - type: text
    text: ZAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny olon-dratsy manao hafetsena hamely ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mihidy vazana ho fankahalana azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: kanjo izy ihomehezan’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mahita fa antomotra ny andro famaliana.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manatsoaka sabatra ireo olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa manenjana tsipîka
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba handavoana ny ory sy ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamonoana ny mahitsy fomba fiaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa hifotitra ny sabatra eny an-tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitsatoka amin’ny fony ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tsipîkany ho tapatapaka.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aleo ny kely ananan’ny olo-marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay ny harem-ben’ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: satria ho potika ny fahefàn’ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olo-marina kosa hotohanan’ny TOMPO.
- type: usfm
  marker: sp
  children:
  - type: text
    text: JODA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny TOMPO mitsimbina ny fiainan’ny manan-tsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny tany zara lovany dia ho azy mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin’ny fotoana mahory dia tsy hiraika izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny andro mosarena dia hanana izay ilainy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: KAFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eny, ho ringana ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo fahavalon’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny voninkazo eny an-tsaha izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho levona, eny, ho levona toy ny setroka.
- type: usfm
  marker: sp
  children:
  - type: text
    text: LAMEDA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny ratsy fanahy misambotra tsy mamerina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olo-marina kosa miantra ka manome.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tahîn
  - type: text
    text: ’ny Tompo no handova ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay ozoniny kosa dia ho fongotra.
- type: usfm
  marker: sp
  children:
  - type: text
    text: MEMA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Rehefa mahafaly ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitondrantenan’olona iray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Izy no hampahery azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny lalan-kalehany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: raha solafaka ilay olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mba hidaraboka
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tantanan’ny TOMPO.
- type: usfm
  marker: sp
  children:
  - type: text
    text: NONA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tanora aho fahiny, fa antitra izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa na oviana na oviana aho tsy nahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: olo-marina nilaozan’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny zanany lasa mpangataka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Miantra isan’andro izy ka mampisambotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary andraisan’ny zanany fitahiana izany.
- type: usfm
  marker: sp
  children:
  - type: text
    text: SAMEKA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Raha manalavitra ny ratsy ka manao ny tsara ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia honina maharitra eo amin’ny tany lovanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Satria ny TOMPO mitandro ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba mandao ny mpivavaka aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hofoanana mandrakizay kosa ny olo-meloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hofongorana ny taranaky ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny olo-marina no handova ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka honina mandrakizay ao aminy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: PE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fahendrena no lazain’ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ara-drariny ny zavatra ambarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: ’ny Andriamaniny no ao am-pony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba solafa-mamindra izy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TSADE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tsikilovin’ny olon-dratsy ny olo-marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tadiaviny izay hahafaty azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy avelan’ny Tompo ho azony
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ho voaheloka any am-pitsarana.
- type: usfm
  marker: sp
  children:
  - type: text
    text: KÔFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Miankîna am-paharetana amin’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny lalana soritany no araho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia hasandrany ho mpandova ny tany ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hahita ny olon-dratsy ho fongotra.
- type: usfm
  marker: sp
  children:
  - type: text
    text: RESA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Izaho nahita olon-dratsy nanjakazaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nisandrahaka toa sederan’i Libano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nandalo indray aho, dia tsy teo intsony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nokarohiko fa tsy nety hita.
- type: usfm
  marker: sp
  children:
  - type: text
    text: SINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Diniho ny olom-banona, jereo ny olo-mahitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tsapanao tokoa fa ny hasambarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no valiny omena ny olona toy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ny olo-meloka kosa dia haringana avokoa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny famongorana no valiny omena ny olon-dratsy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mamonjy ny olo-marina ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy miaro mafy azy amin’ny andro mahory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Manampy sy manafaka azy ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manafaka azy amin’ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamonjy azy noho ireo mialoka aminy.
