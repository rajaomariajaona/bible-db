document_id: PSA.37,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Aza tezitra amin’ny fahombiazan’ny olon-dratsy
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida.
  - type: heading
    content: ALEFA
  - type: text
    content: Aza tezitra amin’ny mpanao ratsy
  - type: text
    content: ary aza mialona ireo mpanao heloka;
  '10':
  - type: text
    content: Tsy ho ela dia hanjavona ny olon-dratsy;
  - type: text
    content: handinika izay nisy azy ianao,
  - type: text
    content: fa tsy hahita na inona na inona.
  '11':
  - type: text
    content: Ny malemy fanahy no handova ny tany
  - type: text
    content: ka ho finaritra hombam-piadanam-be.
  - type: heading
    content: ZAINA
  '12':
  - type: text
    content: Ny olon-dratsy manao hafetsena hamely ny marina
  - type: text
    content: sy mihidy vazana ho fankahalana azy,
  '13':
  - type: text
    content: kanjo izy ihomehezan’ny Tompo
  - type: text
    content: Izay mahita fa antomotra ny andro famaliana.
  - type: heading
    content: HETA
  '14':
  - type: text
    content: Manatsoaka sabatra ireo olon-dratsy
  - type: text
    content: ary koa manenjana tsipîka
  - type: text
    content: mba handavoana ny ory sy ny mahantra
  - type: text
    content: ary hamonoana ny mahitsy fomba fiaina.
  '15':
  - type: text
    content: Fa hifotitra ny sabatra eny an-tanany
  - type: text
    content: ka hitsatoka amin’ny fony ihany;
  - type: text
    content: ary ny tsipîkany ho tapatapaka.
  - type: heading
    content: TETA
  '16':
  - type: text
    content: Aleo ny kely ananan’ny olo-marina
  - type: text
    content: toy izay ny harem-ben’ny olon-dratsy,
  '17':
  - type: text
    content: satria ho potika ny fahefàn’ny olon-dratsy
  - type: text
    content: fa ny olo-marina kosa hotohanan’ny TOMPO.
  - type: heading
    content: JODA
  '18':
  - type: text
    content: Ny TOMPO mitsimbina ny fiainan’ny manan-tsiny,
  - type: text
    content: ka ny tany zara lovany dia ho azy mandrakizay.
  '19':
  - type: text
    content: Amin’ny fotoana mahory dia tsy hiraika izy,
  - type: text
    content: ary amin’ny andro mosarena dia hanana izay ilainy.
  - type: heading
    content: KAFA
  '2':
  - type: text
    content: fa toy ny ahitra ireny ka malaky malazo,
  - type: text
    content: toy ny vilo-maitso ka mbola hihamaina.
  - type: heading
    content: BETA
  '20':
  - type: text
    content: Eny, ho ringana ny ratsy fanahy
  - type: text
    content: dia ireo fahavalon’ny TOMPO;
  - type: text
    content: ho tahaka ny voninkazo eny an-tsaha izy
  - type: text
    content: ka ho levona, eny, ho levona toy ny setroka.
  - type: heading
    content: LAMEDA
  '21':
  - type: text
    content: Ny ratsy fanahy misambotra tsy mamerina,
  - type: text
    content: fa ny olo-marina kosa miantra ka manome.
  '22':
  - type: text
    content: 'Izay '
  - type: text
    content: tahîn
  - type: text
    content: ’ny Tompo no handova ny tany,
  - type: text
    content: fa izay ozoniny kosa dia ho fongotra.
  - type: heading
    content: MEMA
  '23':
  - type: text
    content: Rehefa mahafaly ny TOMPO
  - type: text
    content: ny fitondrantenan’olona iray,
  - type: text
    content: dia Izy no hampahery azy
  - type: text
    content: eo amin’ny lalan-kalehany;
  '24':
  - type: text
    content: raha solafaka ilay olona,
  - type: text
    content: dia tsy mba hidaraboka
  - type: text
    content: satria tantanan’ny TOMPO.
  - type: heading
    content: NONA
  '25':
  - type: text
    content: Tanora aho fahiny, fa antitra izao;
  - type: text
    content: kanefa na oviana na oviana aho tsy nahita
  - type: text
    content: olo-marina nilaozan’ny Tompo
  - type: text
    content: na ny zanany lasa mpangataka.
  '26':
  - type: text
    content: Miantra isan’andro izy ka mampisambotra,
  - type: text
    content: ary andraisan’ny zanany fitahiana izany.
  - type: heading
    content: SAMEKA
  '27':
  - type: text
    content: Raha manalavitra ny ratsy ka manao ny tsara ianao,
  - type: text
    content: dia honina maharitra eo amin’ny tany lovanao.
  '28':
  - type: text
    content: Satria ny TOMPO mitandro ny rariny
  - type: text
    content: ka tsy mba mandao ny mpivavaka aminy;
  - type: text
    content: hofoanana mandrakizay kosa ny olo-meloka
  - type: text
    content: ary hofongorana ny taranaky ny olon-dratsy.
  '29':
  - type: text
    content: Ny olo-marina no handova ny tany,
  - type: text
    content: ka honina mandrakizay ao aminy.
  - type: heading
    content: PE
  '3':
  - type: text
    content: Matokia ny TOMPO, manaova ny tsara,
  - type: text
    content: dia honina amin’ny tany nomeny ianao
  - type: text
    content: ka hiaina amim-pilaminana azo antoka.
  '30':
  - type: text
    content: Fahendrena no lazain’ny olo-marina;
  - type: text
    content: ara-drariny ny zavatra ambarany.
  '31':
  - type: text
    content: 'Ny '
  - type: text
    content: lalànan
  - type: text
    content: ’ny Andriamaniny no ao am-pony,
  - type: text
    content: ka tsy mba solafa-mamindra izy.
  - type: heading
    content: TSADE
  '32':
  - type: text
    content: Tsikilovin’ny olon-dratsy ny olo-marina
  - type: text
    content: ary tadiaviny izay hahafaty azy,
  - type: text
    content: fa tsy avelan’ny Tompo ho azony
  - type: text
    content: na ho voaheloka any am-pitsarana.
  - type: heading
    content: KÔFA
  '33':
  - type: text
    content: Miankîna am-paharetana amin’ny TOMPO
  - type: text
    content: ka ny lalana soritany no araho;
  '34':
  - type: text
    content: dia hasandrany ho mpandova ny tany ianao
  - type: text
    content: sady hahita ny olon-dratsy ho fongotra.
  - type: heading
    content: RESA
  '35':
  - type: text
    content: Izaho nahita olon-dratsy nanjakazaka
  - type: text
    content: ary nisandrahaka toa sederan’i Libano.
  '36':
  - type: text
    content: Nandalo indray aho, dia tsy teo intsony izy,
  - type: text
    content: ary nokarohiko fa tsy nety hita.
  - type: heading
    content: SINA
  '37':
  - type: text
    content: Diniho ny olom-banona, jereo ny olo-mahitsy,
  - type: text
    content: dia ho tsapanao tokoa fa ny hasambarana
  - type: text
    content: no valiny omena ny olona toy izany.
  '38':
  - type: text
    content: 'Ny olo-meloka kosa dia haringana avokoa:'
  - type: text
    content: ny famongorana no valiny omena ny olon-dratsy.
  - type: heading
    content: TAO
  '39':
  - type: text
    content: Mamonjy ny olo-marina ny TOMPO
  - type: text
    content: sy miaro mafy azy amin’ny andro mahory.
  '4':
  - type: text
    content: Aoka ny TOMPO no hiravoanao,
  - type: text
    content: dia homeny anao izay irîn’ny fonao!
  - type: heading
    content: GIMELA
  '40':
  - type: text
    content: Manampy sy manafaka azy ny TOMPO,
  - type: text
    content: manafaka azy amin’ny olon-dratsy
  - type: text
    content: ka mamonjy azy noho ireo mialoka aminy.
  '5':
  - type: text
    content: Ankino amin’ny TOMPO ny fiainanao,
  - type: text
    content: ka itokio Izy fa hanao izay mahasoa.
  '6':
  - type: text
    content: Ny rariny anananao hasehony
  - type: text
    content: ho toy ny mazavatsinanana;
  - type: text
    content: ny zo tandrify anao haharihariny
  - type: text
    content: ho tahaka ny mitataovovonana.
  - type: heading
    content: DALETA
  '7':
  - type: text
    content: Aoka hitombina tsara eo anatrehan’ny TOMPO
  - type: text
    content: ka hiandry Azy amim-paharetana ianao!
  - type: text
    content: Aza tezitra amin’izay mahomby,
  - type: text
    content: dia amin’ny olona manao fetsifetsy.
  - type: heading
    content: HE
  '8':
  - type: text
    content: Ialao ny hatezerana, avelao ny havinirana;
  - type: text
    content: aza misafoaka fa loza no hiafaran’izany.
  '9':
  - type: text
    content: Satria hofongorana ireo mpanao ratsy,
  - type: text
    content: fa izay matoky ny TOMPO no handova ny tany.
  - type: heading
    content: VAO
