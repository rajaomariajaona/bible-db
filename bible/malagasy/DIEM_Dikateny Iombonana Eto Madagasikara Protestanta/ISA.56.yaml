verses:
  '1':
  - type: heading
    content: FIZARÀNA FAHATELO
  - type: heading
    content: Tsy hisy voailikilika intsony
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Tandremo ny rariny ka manaova ny marina,
  - type: text
    content: satria akaiky ho tonga ny famonjeko
  - type: text
    content: ary efa hiharihary ny fanafahako.
  '10':
  - type: text
    content: Jamba avokoa ireo mpiahy ny vahoaka Israely
  - type: text
    content: ka samy tsy mahalala na inona na inona.
  - type: text
    content: Alika moana izy rehetra ka tsy mahavòvò,
  - type: text
    content: fa manonofy fotsiny sy mitsotsotra
  - type: text
    content: satria ny matory no tiany.
  '11':
  - type: text
    content: Alika tendan-kanina koa ireo
  - type: text
    content: ka tsy mahalala voky na oviana na oviana,
  - type: text
    content: 'nefa dia lazaina hoe '
  - type: text
    content: mpiandry
  - type: text
    content: '!'
  - type: text
    content: Tsy mahay mandinika akory ireo
  - type: text
    content: fa samy manaraka ny lalany avy
  - type: text
    content: ary samy mikendry ny tombontsoany avy.
  '12':
  - type: text
    content: «Avia ianareo, hoy izy
  - type: text
    content: fa haka divay isika
  - type: text
    content: ary hiboboka fisotro mahery!
  - type: text
    content: Ho toraka ny androany ihany koa ny rahampitso,
  - type: text
    content: fa mbola be dia be ny sisa hosotroina.»
  '2':
  - type: text
    content: Sambatra ny olona manatanteraka izay lazaiko
  - type: text
    content: sy mifikitra mafy amin’izany,
  - type: text
    content: 'ka mitandrina ny '
  - type: text
    content: sabata
  - type: text
    content: ' fa tsy manimbazimba azy,'
  - type: text
    content: ary mitandrina ny tanany tsy hanao ratsy.»
  '3':
  - type: text
    content: Aoka ny hafa firenena efa miraiki-po amin’ny TOMPO
  - type: text
    content: 'tsy hanao anakampo hoe:'
  - type: text
    content: «Hoesorin’ny TOMPO tokoa aho
  - type: text
    content: tsy ho anisan’ny vahoakany.»
  - type: text
    content: 'Ary aoka ny '
  - type: text
    content: eonòka
  - type: text
    content: ' tsy hanao anakampo hoe:'
  - type: text
    content: «Indro efa hazo maina aho
  - type: note
    content: Tsy afaka hanan-taranaka ny eonòka , hany ka ory mieritreritra fa tsy mba hisy hamelo-maso ny anarany. Misy fanafany kosa izany eo amin’ny and 5.
  - type: text
    content: .»
  '4':
  - type: text
    content: 'Satria izao no lazain’ny TOMPO:'
  - type: text
    content: «Ny eonòka mitandrina ny sabatako
  - type: text
    content: ka mifidy ny hanao izay sitrako
  - type: text
    content: sy mifikitra mafy amin’ny fanekempihavanako,
  '5':
  - type: text
    content: dia hanokanako takela-bato misy ny anarany
  - type: text
    content: eo amin’ny rindrin’ny tempoliko.
  - type: text
    content: Izany no tsara kokoa ho azy
  - type: text
    content: noho ny zanakalahy sy zanakavavy maro.
  - type: text
    content: Hampitoeriko eo mandrakizay ny anarany
  - type: text
    content: ka tsy hisy na inona na inona hahakosoka azy.»
  '6':
  - type: text
    content: Ho an’ny hafa firenena miraiki-po amin’ny TOMPO
  - type: text
    content: mba hanao fanompoam-pivavahana aminy
  - type: text
    content: sady tia Azy ary tonga mpanompony
  - type: text
    content: 'dia izao no teny hentitra ataon’ny TOMPO aminy:'
  - type: text
    content: «Raha mitandrina ny sabata izy
  - type: text
    content: ka tsy manimbazimba azy
  - type: text
    content: sy mifikitra mafy amin’ny fanekempihavanako,
  '7':
  - type: text
    content: dia hoentiko eo an-tendrombohitro masina,
  - type: text
    content: ka hampifalîko ao an-trano fivavahana amiko;
  - type: text
    content: ny sorona isan-karazany hatolony
  - type: text
    content: 'dia hankasitrahiko eo ambonin’ny '
  - type: text
    content: alitarako
  - type: text
    content: ;
  - type: text
    content: 'satria ny tranoko hatao hoe:'
  - type: text
    content: ‹Trano fivavahana ho an’ny firenena rehetra
  - type: note
    content: Ny tendrombohitro masina dia i Tsiôna izay havoana niorenan’ny tempoly. –Ny faran’ity and ity dia tsiahivin’i Jesoa ao amin’ny Mt 21.13; Mk 11.17; Lk 19.46.
  - type: text
    content: .›
  '8':
  - type: text
    content: Izaho Tompo ANDRIANANAHARY,
  - type: text
    content: Ilay nanangona ny vahoaka Israely tafaely,
  - type: text
    content: 'dia mbola manao teny hentitra hoe:'
  - type: text
    content: ‹Efa nanangona Aho, nefa mbola hanangona hafa koa›. »
  - type: heading
    content: Ireo tompon’andraikitra tsy mendrika
  '9':
  - type: text
    content: Ianareo bibidia rehetra any an-tsaha
  - type: text
    content: sy ianareo bibidia rehetra any an’ala,
  - type: text
    content: avia hanao fihinanam-be!
