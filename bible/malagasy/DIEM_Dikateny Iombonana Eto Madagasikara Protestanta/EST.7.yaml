document_id: EST.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anonganana an’i Hamàna sy amonoana azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia lasa ny amperôra sy i Hamàna nankany amin’i Estera mpanjakavavy, ho ao amin’ilay fanasana faharoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary teo am-pamaranana ny sakafo, dia hoy indray ny amperôra tamin’i Estera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no angatahinao sy tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakako aza, dia homeko anao izany ary ho azonao tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia namaly i Estera mpanjakavavy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry andriamanjaka, raha mba mahazo fitia eo imasonao ary raha sitrakao izao, dia aoka hotsimbininao aina ny tenako sy ny mpiray firenena amiko fa izany no angatahiko sy tadiaviko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Namidy manko ny tenako sy ny mpiray firenena amiko mba haringana sy hovonoina ho ripaka; fa raha tàhiny namidy handevozina fotsiny izahay, dia ho nangina ihany aho satria tsy tokony hanahiranana anao izany fampahoriana izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria tsy... fampahoriana izany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kanefa tsy hahonitra ny fatiantoky ny amperôra akory ity fahavalonay ity.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanontany an’i Estera mpanjakavavy ny amperôra Kserksesa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa ilay olona mikasa hanao izany ary aiza no misy azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ka novalian’i Estera hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Io Hamàna ratsy fanahy io no fahavalonay sy mpankahala anay!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia raiki-tahotra teo anatrehan’ny amperôra sy ny mpanjakavavy i Hamàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tezitra mafy ny amperôra, dia niala teo amin’ny fanasana ho eny amin’ny zaridainan’ny lapa. I Hamàna kosa nahatsapa fa misy loza hamelezan’ny amperôra azy ka nijanona nangataka tamin’i Estera mpanjakavavy izy mba hotsimbinina ny ainy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary niankohoka teo am-parafaran’i Estera mihitsy aza i Hamàna. Tamin’izay indrindra ny amperôra no niverina avy teo an-jaridaina ho ao an’efitrano fanasana ka vaky vava hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Dia sahin’ilehio koa ve ny misavika ny mpanjakavavy, eto anatrehako, ato an-dapako?
- type: usfm
  marker: p
  children:
  - type: text
    text: Vantany vao niloa-bava ireo teny ireo ny amperôra, dia nisy mpanompony nanarona ny tavan’i Hamàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nosaronan-tava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ny olona voaheloka ho faty. Asehon’ny fihetsik’ireto mpanompo ireto fa raisiny ho fanamelohana ho faty mihitsy ny tenin’ny amperôra.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa i Harbonà, anisan’ireo tandapa, dia nilaza tamin’ny amperôra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry andriamanjaka, i Hamàna dia efa nampanamboatra hazo hanantonany an’i Môrdôkay, ilay nanao tatitra hanasoavana anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.21-23.
    marker-yv: yv-n
  - type: text
    text: . Indro miorina eo akaikin’ny tranon’i Hamàna io hazo io, ka 25 metatra ny haavony.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny amperôra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahantony amin’io i Hamàna!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nahantona tamin’ilay hazo efa nomaniny hanantonana an’i Môrdôkay i Hamàna. Dia vao izay no nionona ny fahatezeran’ny amperôra.
