document_id: EST.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny anonganana an’i Hamàna sy amonoana azy
  - type: text
    content: 'Dia lasa ny amperôra sy i Hamàna nankany amin’i Estera mpanjakavavy, ho ao amin’ilay fanasana faharoa. '
  '10':
  - type: text
    content: Ary nahantona tamin’ilay hazo efa nomaniny hanantonana an’i Môrdôkay i Hamàna. Dia vao izay no nionona ny fahatezeran’ny amperôra.
  '2':
  - type: text
    content: 'Ary teo am-pamaranana ny sakafo, dia hoy indray ny amperôra tamin’i Estera:'
  - type: text
    content: –Inona no angatahinao sy tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakako aza, dia homeko anao izany ary ho azonao tokoa.
  '3':
  - type: text
    content: 'Dia namaly i Estera mpanjakavavy ka nanao hoe:'
  - type: text
    content: '–Ry andriamanjaka, raha mba mahazo fitia eo imasonao ary raha sitrakao izao, dia aoka hotsimbininao aina ny tenako sy ny mpiray firenena amiko fa izany no angatahiko sy tadiaviko. '
  '4':
  - type: text
    content: Namidy manko ny tenako sy ny mpiray firenena amiko mba haringana sy hovonoina ho ripaka; fa raha tàhiny namidy handevozina fotsiny izahay, dia ho nangina ihany aho satria tsy tokony hanahiranana anao izany fampahoriana izany
  - type: note
    content: 'satria tsy... fampahoriana izany: dkt hafa kanefa tsy hahonitra ny fatiantoky ny amperôra akory ity fahavalonay ity.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Dia nanontany an’i Estera mpanjakavavy ny amperôra Kserksesa nanao hoe:'
  - type: text
    content: –Iza moa ilay olona mikasa hanao izany ary aiza no misy azy?
  '6':
  - type: text
    content: 'Ka novalian’i Estera hoe:'
  - type: text
    content: –Io Hamàna ratsy fanahy io no fahavalonay sy mpankahala anay!
  - type: text
    content: 'Dia raiki-tahotra teo anatrehan’ny amperôra sy ny mpanjakavavy i Hamàna. '
  '7':
  - type: text
    content: 'Ary tezitra mafy ny amperôra, dia niala teo amin’ny fanasana ho eny amin’ny zaridainan’ny lapa. I Hamàna kosa nahatsapa fa misy loza hamelezan’ny amperôra azy ka nijanona nangataka tamin’i Estera mpanjakavavy izy mba hotsimbinina ny ainy; '
  '8':
  - type: text
    content: 'ary niankohoka teo am-parafaran’i Estera mihitsy aza i Hamàna. Tamin’izay indrindra ny amperôra no niverina avy teo an-jaridaina ho ao an’efitrano fanasana ka vaky vava hoe:'
  - type: text
    content: –Dia sahin’ilehio koa ve ny misavika ny mpanjakavavy, eto anatrehako, ato an-dapako?
  - type: text
    content: Vantany vao niloa-bava ireo teny ireo ny amperôra, dia nisy mpanompony nanarona ny tavan’i Hamàna
  - type: note
    content: Ny nosaronan-tava dia ny olona voaheloka ho faty. Asehon’ny fihetsik’ireto mpanompo ireto fa raisiny ho fanamelohana ho faty mihitsy ny tenin’ny amperôra.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Fa i Harbonà, anisan’ireo tandapa, dia nilaza tamin’ny amperôra hoe:'
  - type: text
    content: –Ry andriamanjaka, i Hamàna dia efa nampanamboatra hazo hanantonany an’i Môrdôkay, ilay nanao tatitra hanasoavana anao
  - type: note
    content: Jereo 2.21-23.
  - type: text
    content: . Indro miorina eo akaikin’ny tranon’i Hamàna io hazo io, ka 25 metatra ny haavony.
  - type: text
    content: 'Dia hoy ny amperôra hoe:'
  - type: text
    content: –Ahantony amin’io i Hamàna!
