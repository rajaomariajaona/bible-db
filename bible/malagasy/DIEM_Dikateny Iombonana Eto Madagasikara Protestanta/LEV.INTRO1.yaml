    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'mba hiteny aminy. Manerana ity boky ity no ampitain’Andriamanitra aminy ny lalàna sy fitsipika natao hifehy ny vahoaka israelita; ary misy ny fampanantenana fa «izay manatanteraka izany, dia ho velona amin’izany» (18.5, voatsiahy ao amin’ny Rm 10.5). Raha atao bango tokana, dia voasan’Andriamanitra amin’ny Israelita ny fomba hanafoanana izay vatomisakana ny firaisana amin’Izy Tompo na hoe ny tokony hatao mba ho toerana «fihaonana» amin’Andriamanitra tokoa ilay «tranolay»: tsy maintsy manaraka ny fitsipika ireo mpanolotra sorona rehefa manao izany (toko 1–7); tsy maintsy hajaina sady tsy maintsy manana fitondrantena mendrika koa ireo mpisorona (toko 8–10); tsy maintsy iezahan’ny tsirairay anisan’ny vahoakan’Andriamanitra ny hifady ny fahalotoana araka izay azo atao, na'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahalotoana
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'eo amin’ny vatana (toko 11–16) na fahalotoana eo amin’ny fitondrantena na fahalotoana eo amin’ny fombam-pivavahana (toko 17–27). Ilay Andriamanitra masina, ilay Andriamanitra fitiavana, ilay Andriamanitra velona dia te hampandray anjara ny vahoakany amin’ny fahamasinany (19.2) mba hahatonga azy koa ho mpitondra aina sy fitiavana. Araka izany toe-panahy izany no anomezan’Andriamanitra an’ireo Israelita ny didy hoe: «Tiavo ny namanao tahaka ny itiavanao ny tenanao» (19.18); nampahatsiahivin’i Jesoa rahateo ny maha lalàna fototra izany didy izany (jereo Mt 22.39).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ireo lalàna ireo dia mazàna manaitra antsika mpamaky amin’izao andro ankehitriny izao; kanefa tsy an-kitsahatra sady amin’ny endrika samy hafa no ampahatsiarovany ny mpino rehetra, hatraiza hatraiza ary hatrany hatrany, fa ny firaisana amin’Andriamanitra dia zavatra tena ilaina mba hahavelona ny olona.
