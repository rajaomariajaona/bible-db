document_id: 1SA.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andriamanitra nifidy an’i Davida ho mpanjaka vaovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Samoela:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandra-pahoviana ihany no halahelovanao an’i Saoly, nefa na Izaho aza efa nandà azy tsy ho mpanjakan’i Israely intsony? Raiso ny diloilonao, dia mandehana; fa irahiko ho any amin’i Jisay any Betlehema ianao, satria efa nifidy anankiray tamin’ny zanany aho mba ho mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy i Samoela hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana no hankanesako any? Fa raha fantatr’i Saoly izany, dia ho fatiny tokoa aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy kosa ny TOMPO taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mitondrà zanak’omby iray ianao, dia lazao fa hanatitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ho AHY no nahatongavanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary asao amin’izany sorona izany koa i Jisay. Hatoroko anao ihany izay tokony hataonao; ka amin’ny anarako, dia hohosoranao ho mpanjaka ilay hotondroiko aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Narahin’i Samoela izay voalazan’ny TOMPO, ka dia tonga tany Betlehema izy. Ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' tao an-tanàna nirohotra nitsena azy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fiadanana ve no nahatongavanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Eny, tonga hanatitra sorona ho an’ny TOMPO aho, koa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diovy
  - type: text
    text: ' ny tenanareo ho amin’izany ary andeha hiaraka amiko.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nanainga an’i Jisay sy ireo zanany hidio koa i Samoela, ary dia niangavy azy ho amin’ny sorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa tonga izy ireo, dia tazan’i Eliaba i Samoela, ka hoy izy hoe: «Ity mijoro eto anatrehany ity tokoa ilay nofinidin’ny TOMPO.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa hoy ny TOMPO taminy: «Aza sodokan’ny tarehiny sy ny tsanganany ianao, fa tsy nifidy azy Aho akory. Tsy mba mitsara toy izay ataon’olombelona Aho. Ny olona mijery ivelany fotsiny ihany, fa Izaho TOMPO kosa mahita hatramin’ny atin’ny fo.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa dia nantsoin’i Jisay i Abinadaba ary nasainy nandalo teo anoloan’i Samoela, nefa hoy i Samoela taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mba nifidy an’io koa ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nampandalovin’i Jisay i Samà, nefa mbola hoy ihany izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mba nifidy an’io koa ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tapitra nampandalovin’i Jisay teo anoloan’i Samoela avokoa ireo zanany fito mirahalahy, kanefa dia hoy i Samoela taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy nisy nofidin’ny TOMPO ireo na dia iray aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy indray i Samoela tamin’i Jisay:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ireo avokoa ve izy mirahalahy avy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’i Jisay hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny zandriny indrindra sisa no tsy eo, fa mbola miandry ondry izy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy kosa i Samoela tamin’i Jisay:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ampanalao izy, fa tsy hanomboka ny sorona isika raha tsy efa tonga eto izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nampanalain’i Jisay i Davida, izay tovolahy mazava endrika sady baribary maso no tsara tarehy. Ary hoy ny TOMPO tamin’i Samoela: «Io no izy, koa mandehana hosory mpanjaka izy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Noraisin’i Samoela ny diloilo ka nararany teo an-dohan’i Davida ho fanokanana azy teo anatrehan’ny rahalahiny. Hatramin’io andro io no nilatsahan’ny Fanahin’ny TOMPO tamin’i Davida ka tsy niala taminy intsony.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia niverina nankany Ramà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ramà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Samoela.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida miasa ao an-tranon’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nandao an’i Saoly ny Fanahin’ny TOMPO, ka dia fanahy ratsy avy amin’ny TOMPO no tonga nampahory azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy ny mpanompon’i Saoly taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fantatray fa misy fanahy ratsy nalefan’Andriamanitra mampahory anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Omeo baiko fotsiny izahay, tompoko, fa hanao izay asainao hatao, ka hitady olona mahay mitendry harpa. Koa rehefa tonga ao aminao ny fanahy ratsy, dia hitendry izy handrotsirotsy anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Saoly tamin’ny mpanompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Itadiavo olona mahay mitendry zava-maneno aho, ka ento atỳ amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niteny ny iray tamin’ny mpanompony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mahalala olona iray izay aho, dia ny zanakalahin’i Jisay any Betlehema; tena mahay mitendry zava-maneno izy sady lehilahy manana ny maha izy azy no miaramila matanjaka, ary koa mahay mikabary sy tsara tarehy, ary ny TOMPO dia momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nandefa iraka tany amin’i Jisay i Saoly hilaza hoe: «Alefaso atỳ amiko i Davida zanakao, ilay mpiandry ondry.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary i Jisay naka boriky iray, mofo sy divay iray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: siny hoditra
  - type: text
    text: ' ary zanak’osy iray, ka nampitondrainy an’i Davida zanany ho an’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha vao tonga tany amin’i Saoly i Davida, dia avy hatrany nikatroka niasa ho azy. Lehibe loatra ny fitiavan’i Saoly azy, ka dia izy no nataony mpitondra ny fitaovam-piadiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nampaniraka tany amin’i Jisay i Saoly hilaza hoe: «Tiako raha mba mitoetra eto amiko i Davida, satria mahafinaritra ahy izy.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Koa rehefa tonga tamin’i Saoly ilay fanahy ratsy nalefan’Andriamanitra, dia noraisin’i Davida ny harpa ka notendreny. Mba tony sy nahatsiaro maivamaivana i Saoly tamin’izany, ary dia nandao azy ny fanahy ratsy.
