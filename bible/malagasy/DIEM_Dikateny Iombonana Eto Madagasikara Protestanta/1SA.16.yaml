document_id: 1SA.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Andriamanitra nifidy an’i Davida ho mpanjaka vaovao
  - type: text
    content: 'Hoy ny TOMPO tamin’i Samoela:'
  - type: text
    content: –Mandra-pahoviana ihany no halahelovanao an’i Saoly, nefa na Izaho aza efa nandà azy tsy ho mpanjakan’i Israely intsony? Raiso ny diloilonao, dia mandehana; fa irahiko ho any amin’i Jisay any Betlehema ianao, satria efa nifidy anankiray tamin’ny zanany aho mba ho mpanjaka.
  '10':
  - type: text
    content: 'Tapitra nampandalovin’i Jisay teo anoloan’i Samoela avokoa ireo zanany fito mirahalahy, kanefa dia hoy i Samoela taminy:'
  - type: text
    content: –Tsy nisy nofidin’ny TOMPO ireo na dia iray aza.
  '11':
  - type: text
    content: 'Hoy indray i Samoela tamin’i Jisay:'
  - type: text
    content: –Ireo avokoa ve izy mirahalahy avy?
  - type: text
    content: 'Ka novalian’i Jisay hoe:'
  - type: text
    content: –Ny zandriny indrindra sisa no tsy eo, fa mbola miandry ondry izy.
  - type: text
    content: 'Fa hoy kosa i Samoela tamin’i Jisay:'
  - type: text
    content: –Ampanalao izy, fa tsy hanomboka ny sorona isika raha tsy efa tonga eto izy.
  '12':
  - type: text
    content: 'Dia nampanalain’i Jisay i Davida, izay tovolahy mazava endrika sady baribary maso no tsara tarehy. Ary hoy ny TOMPO tamin’i Samoela: «Io no izy, koa mandehana hosory mpanjaka izy.» '
  '13':
  - type: text
    content: Noraisin’i Samoela ny diloilo ka nararany teo an-dohan’i Davida ho fanokanana azy teo anatrehan’ny rahalahiny. Hatramin’io andro io no nilatsahan’ny Fanahin’ny TOMPO tamin’i Davida ka tsy niala taminy intsony.
  - type: text
    content: Dia niverina nankany Ramà
  - type: note
    content: 'Ramà: jereo 1.1 sy nta.'
  - type: text
    content: ' i Samoela.'
  - type: heading
    content: I Davida miasa ao an-tranon’i Saoly
  '14':
  - type: text
    content: 'Nandao an’i Saoly ny Fanahin’ny TOMPO, ka dia fanahy ratsy avy amin’ny TOMPO no tonga nampahory azy. '
  '15':
  - type: text
    content: 'Ary hoy ny mpanompon’i Saoly taminy:'
  - type: text
    content: '–Fantatray fa misy fanahy ratsy nalefan’Andriamanitra mampahory anao. '
  '16':
  - type: text
    content: Omeo baiko fotsiny izahay, tompoko, fa hanao izay asainao hatao, ka hitady olona mahay mitendry harpa. Koa rehefa tonga ao aminao ny fanahy ratsy, dia hitendry izy handrotsirotsy anao.
  '17':
  - type: text
    content: 'Dia hoy i Saoly tamin’ny mpanompony:'
  - type: text
    content: –Itadiavo olona mahay mitendry zava-maneno aho, ka ento atỳ amiko.
  '18':
  - type: text
    content: 'Ary niteny ny iray tamin’ny mpanompony hoe:'
  - type: text
    content: –Mahalala olona iray izay aho, dia ny zanakalahin’i Jisay any Betlehema; tena mahay mitendry zava-maneno izy sady lehilahy manana ny maha izy azy no miaramila matanjaka, ary koa mahay mikabary sy tsara tarehy, ary ny TOMPO dia momba azy.
  '19':
  - type: text
    content: 'Nandefa iraka tany amin’i Jisay i Saoly hilaza hoe: «Alefaso atỳ amiko i Davida zanakao, ilay mpiandry ondry.» '
  '2':
  - type: text
    content: 'Fa hoy i Samoela hoe:'
  - type: text
    content: –Ahoana no hankanesako any? Fa raha fantatr’i Saoly izany, dia ho fatiny tokoa aho.
  - type: text
    content: 'Hoy kosa ny TOMPO taminy:'
  - type: text
    content: '–Mitondrà zanak’omby iray ianao, dia lazao fa hanatitra '
  - type: text
    content: sorona
  - type: text
    content: ' ho AHY no nahatongavanao, '
  '20':
  - type: text
    content: 'Ary i Jisay naka boriky iray, mofo sy divay iray '
  - type: text
    content: siny hoditra
  - type: text
    content: ' ary zanak’osy iray, ka nampitondrainy an’i Davida zanany ho an’i Saoly. '
  '21':
  - type: text
    content: 'Raha vao tonga tany amin’i Saoly i Davida, dia avy hatrany nikatroka niasa ho azy. Lehibe loatra ny fitiavan’i Saoly azy, ka dia izy no nataony mpitondra ny fitaovam-piadiany. '
  '22':
  - type: text
    content: 'Dia nampaniraka tany amin’i Jisay i Saoly hilaza hoe: «Tiako raha mba mitoetra eto amiko i Davida, satria mahafinaritra ahy izy.»'
  '23':
  - type: text
    content: Koa rehefa tonga tamin’i Saoly ilay fanahy ratsy nalefan’Andriamanitra, dia noraisin’i Davida ny harpa ka notendreny. Mba tony sy nahatsiaro maivamaivana i Saoly tamin’izany, ary dia nandao azy ny fanahy ratsy.
  '3':
  - type: text
    content: ary asao amin’izany sorona izany koa i Jisay. Hatoroko anao ihany izay tokony hataonao; ka amin’ny anarako, dia hohosoranao ho mpanjaka ilay hotondroiko aminao.
  '4':
  - type: text
    content: 'Narahin’i Samoela izay voalazan’ny TOMPO, ka dia tonga tany Betlehema izy. Ary ny '
  - type: text
    content: loholona
  - type: text
    content: ' tao an-tanàna nirohotra nitsena azy ka nanao hoe:'
  - type: text
    content: –Fiadanana ve no nahatongavanao?
  '5':
  - type: text
    content: 'Ary hoy izy hoe:'
  - type: text
    content: '–Eny, tonga hanatitra sorona ho an’ny TOMPO aho, koa '
  - type: text
    content: diovy
  - type: text
    content: ' ny tenanareo ho amin’izany ary andeha hiaraka amiko.'
  - type: text
    content: 'Nanainga an’i Jisay sy ireo zanany hidio koa i Samoela, ary dia niangavy azy ho amin’ny sorona. '
  '6':
  - type: text
    content: 'Rehefa tonga izy ireo, dia tazan’i Eliaba i Samoela, ka hoy izy hoe: «Ity mijoro eto anatrehany ity tokoa ilay nofinidin’ny TOMPO.» '
  '7':
  - type: text
    content: 'Nefa hoy ny TOMPO taminy: «Aza sodokan’ny tarehiny sy ny tsanganany ianao, fa tsy nifidy azy Aho akory. Tsy mba mitsara toy izay ataon’olombelona Aho. Ny olona mijery ivelany fotsiny ihany, fa Izaho TOMPO kosa mahita hatramin’ny atin’ny fo.»'
  '8':
  - type: text
    content: 'Koa dia nantsoin’i Jisay i Abinadaba ary nasainy nandalo teo anoloan’i Samoela, nefa hoy i Samoela taminy:'
  - type: text
    content: –Tsy mba nifidy an’io koa ny TOMPO.
  '9':
  - type: text
    content: 'Dia nampandalovin’i Jisay i Samà, nefa mbola hoy ihany izy hoe:'
  - type: text
    content: –Tsy mba nifidy an’io koa ny TOMPO.
