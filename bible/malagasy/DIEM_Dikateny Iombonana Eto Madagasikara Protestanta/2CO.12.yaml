document_id: 2CO.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahitana sy fanambarana nomen’Andriamanitra an’i Paoly
  - type: text
    content: 'Tsy maintsy mirehareha aho, na dia tsy mahasoa aza izany; fa hiroso aho hilaza fahitana sy fanambarana nomen’ny Tompo ahy. '
  '10':
  - type: text
    content: Ka dia ifaliako ny fahalemena, ny fanevatevana, ny fahaterena, ny fanenjehana ary ny tebiteby, izay manjo ahy noho ny amin’i Kristy; fa rehefa malemy iny indrindra aho no mahery.
  - type: heading
    content: Ahiahin’i Paoly momba ny Fiangonana tao Kôrinto
  '11':
  - type: text
    content: 'Efa lasa adala aho, satria noterenareo. Ianareo ange no tokony hidera ahy e! Fa na dia tsinontsinona aza aho, dia tsy misy mahalatsa-danja ahy velively amin’ireo '
  - type: text
    content: apôstôly
  - type: text
    content: ' fanaperana. '
  '12':
  - type: text
    content: 'Notontosaina teo aminareo avokoa ny marika manaporofo ny maha apôstôly ahy: dia faharetana lehibe sy '
  - type: text
    content: famantarana
  - type: text
    content: ' ary zava-mahatalanjona aman’asa mahagaga. '
  '13':
  - type: text
    content: Fa inona moa no mahalatsa-danja anareo noho ny Fiangonana hafa, afa-tsy hoe angaha tsy nanahirana anareo aho? Mamelà ny hadisoako fa tsy rariny tokoa izany!
  '14':
  - type: text
    content: Indro fa vonona aho izao ny hankatỳ aminareo fanintelony
  - type: note
    content: Ny voalohany naha tao Kôrinto an’i Paoly dia fony izy nanorina ny Fiangonana tao (jereo Asa 18); ny fanindroany dia voatsiahy ao amin’ny 2Kôr 13.2.
  - type: text
    content: ', nefa tsy hanahirana anareo. Ianareo manko no katsahiko fa tsy ny fanananareo; satria tsy ny zanaka no tokony hitady vola hikarakarana ny ray aman-dreniny, fa ny ray aman-dreniny no tokony hitady vola hikarakarana ny zanany. '
  '15':
  - type: text
    content: Raha ny amiko, dia sitrako mihitsy ny handany manontolo ny fananako sy ny aiko hamonjena anareo. Koa raha manao lanja miakatra ny fitiavako anareo, dia hanao lanja midina ve ny fitiavanareo ahy?
  '16':
  - type: text
    content: 'Ekenareo fa tsy nanahirana anareo tokoa aho; kanefa nanao hafetsena, hono, aho mba hahazoako anareo am-pitaka. '
  '17':
  - type: text
    content: 'Moa nisy nasaiko naka vola aman-karena taminareo ve ireo nirahiko tatỳ aminareo? '
  '18':
  - type: text
    content: Niangaviako i Tito hankatỳ aminareo ary nirahiko hiara-dia taminy koa ilay rahalahy izay fantatrareo
  - type: note
    content: Jereo 8.18.
  - type: text
    content: . Naka vola aman-karena taminareo ve i Tito? Tsy toe-panahy iraisana ve no narahinay tamin’ny fitondrantenanay?
  '19':
  - type: text
    content: 'Heverinareo angamba fa miaro tena hatrany izahay eo imasonareo. Tsia! Araka ny sitrapon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' no itenenanay eo anatrehan’Andriamanitra; ka lazainay aminareo, ry hava-malala, fa izay rehetra izany dia hampandrosoana anareo amin’ny finoana. '
  '2':
  - type: text
    content: Fantatro fa tokony ho 14 taona lasa
  - type: note
    content: 'kristianina anankiray: milaza tena i Paoly. –14 taona lasa: izany hoe sahabo tamin’ny 42 na 43, naha tany Silisia an’i Paoly (jereo Asa 9.30; 11.25; Gal 1.21) na naha tany Antiôkia ary talohan’ny dia voalohany nataony.'
  - type: text
    content: ' izay, dia nisy kristianina anankiray nakarina tany amin’ny lanitra fahatelo. (Asa moa raha nakarina tokoa izy na nisehoam-pahitana fotsiny, Andriamanitra no mahalala.) '
  '20':
  - type: text
    content: 'Atahorako manko fandrao, rehefa tonga aho, dia tsy araka izay tiako no hahitako anareo, ary tsy araka izay tianareo koa no hahitanareo ahy. Atahorako fandrao hisy fifandirana, fifampialonana, fahatezerana, fifampiandaniana, fanaratsiana, fanendrikendrehana, fieboeboana, ary fisavorovoroana. '
  '21':
  - type: text
    content: Atahorako fandrao, amin’izao fahatongavako izao, dia hampietry ahy eo anatrehanareo ilay Andriamanitro; ka hitomany aho, noho ny maro izay nanota teo aloha nefa mbola tsy niala tamin’ny fahalotoana sy fijangajangana ary fihetsika tsy maotina fanaony.
  '3':
  - type: text
    content: Fantatro fa nakarina hatrany Paradisa
  - type: note
    content: 'Paradisa: noheverin’ny Jiosy fa misy ambaratonga dimy ka hatramin’ny folo ny fitambaran’ny atao hoe lanitra, ary Paradisa no iantsoana ny ambaratonga fahatelo na hoe lanitra fahatelo.'
  - type: text
    content: ' izany lehilahy izany (asa moa raha nakarina tokoa izy na nisehoam-pahitana fotsiny, Andriamanitra no mahalala); ary tao Paradisa no nandrenesany teny tsy hay lazaina sady tsy azon’olombelona tenenina. '
  '5':
  - type: text
    content: 'Ny amin’izany lehilahy izany no hataoko rehareha, fa ny amin’ny tenako dia tsy misy hataoko rehareha afa-tsy ny fahalemeko ihany. '
  '6':
  - type: text
    content: Satria na dia te hirehareha aza aho, dia tsy ho adala fa ny marina no holazaiko; kanefa tsy manao izany aho, fandrao hisy olona hihevitra ahy ho mihoatra noho izay hitany amiko na reny avy amiko.
  '7':
  - type: text
    content: 'Fa mba tsy hampieboebo ahy noho ireo fanambarana tsy manan-tsahala voaraiko, dia navelan’Andriamanitra hisy zava-mampijaly ahy tao amin’ny tenako; toy ny irak’i '
  - type: text
    content: Satàna
  - type: text
    content: ' mamely ahy izany ka misakana ahy tsy hieboebo'
  - type: note
    content: Fijaliana manokana nahazo an’i Paoly, tsy dia voatondro mazava hoe inona kanefa mety ho aretina mitaiza izany. Ampit Gal 4.13-15.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Intelo aho no niangavy ny Tompo mba hialan’izany aretina izany amiko; '
  '9':
  - type: text
    content: 'nefa hoy ny Tompo tamiko: «Ampy ho anao ny fahasoavako, satria ao amin’ny fahalemenao no isehoan’ny heriko tanteraka.» Koa vao mainka sitrako mihitsy ny hirehareha amin’ny fahalemeko, mba hambomba ahy ny herin’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
