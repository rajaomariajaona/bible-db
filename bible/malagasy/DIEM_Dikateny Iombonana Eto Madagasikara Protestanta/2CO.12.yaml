document_id: 2CO.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahitana sy fanambarana nomen’Andriamanitra an’i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsy maintsy mirehareha aho, na dia tsy mahasoa aza izany; fa hiroso aho hilaza fahitana sy fanambarana nomen’ny Tompo ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fantatro fa tokony ho 14 taona lasa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kristianina anankiray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: milaza tena i Paoly. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: '14 taona lasa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany hoe sahabo tamin’ny 42 na 43, naha tany Silisia an’i Paoly (jereo Asa 9.30; 11.25; Gal 1.21) na naha tany Antiôkia ary talohan’ny dia voalohany nataony.'
    marker-yv: yv-n
  - type: text
    text: ' izay, dia nisy kristianina anankiray nakarina tany amin’ny lanitra fahatelo. (Asa moa raha nakarina tokoa izy na nisehoam-pahitana fotsiny, Andriamanitra no mahalala.) '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Fantatro fa nakarina hatrany Paradisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Paradisa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'noheverin’ny Jiosy fa misy ambaratonga dimy ka hatramin’ny folo ny fitambaran’ny atao hoe lanitra, ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paradisa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no iantsoana ny ambaratonga fahatelo na hoe lanitra fahatelo.'
    marker-yv: yv-n
  - type: text
    text: ' izany lehilahy izany (asa moa raha nakarina tokoa izy na nisehoam-pahitana fotsiny, Andriamanitra no mahalala); ary tao Paradisa no nandrenesany teny tsy hay lazaina sady tsy azon’olombelona tenenina. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny amin’izany lehilahy izany no hataoko rehareha, fa ny amin’ny tenako dia tsy misy hataoko rehareha afa-tsy ny fahalemeko ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Satria na dia te hirehareha aza aho, dia tsy ho adala fa ny marina no holazaiko; kanefa tsy manao izany aho, fandrao hisy olona hihevitra ahy ho mihoatra noho izay hitany amiko na reny avy amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa mba tsy hampieboebo ahy noho ireo fanambarana tsy manan-tsahala voaraiko, dia navelan’Andriamanitra hisy zava-mampijaly ahy tao amin’ny tenako; toy ny irak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' mamely ahy izany ka misakana ahy tsy hieboebo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fijaliana manokana nahazo an’i Paoly, tsy dia voatondro mazava hoe inona kanefa mety ho aretina mitaiza izany. Ampit Gal 4.13-15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Intelo aho no niangavy ny Tompo mba hialan’izany aretina izany amiko; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'nefa hoy ny Tompo tamiko: «Ampy ho anao ny fahasoavako, satria ao amin’ny fahalemenao no isehoan’ny heriko tanteraka.» Koa vao mainka sitrako mihitsy ny hirehareha amin’ny fahalemeko, mba hambomba ahy ny herin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ka dia ifaliako ny fahalemena, ny fanevatevana, ny fahaterena, ny fanenjehana ary ny tebiteby, izay manjo ahy noho ny amin’i Kristy; fa rehefa malemy iny indrindra aho no mahery.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahiahin’i Paoly momba ny Fiangonana tao Kôrinto
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Efa lasa adala aho, satria noterenareo. Ianareo ange no tokony hidera ahy e! Fa na dia tsinontsinona aza aho, dia tsy misy mahalatsa-danja ahy velively amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' fanaperana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Notontosaina teo aminareo avokoa ny marika manaporofo ny maha apôstôly ahy: dia faharetana lehibe sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' ary zava-mahatalanjona aman’asa mahagaga. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa inona moa no mahalatsa-danja anareo noho ny Fiangonana hafa, afa-tsy hoe angaha tsy nanahirana anareo aho? Mamelà ny hadisoako fa tsy rariny tokoa izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro fa vonona aho izao ny hankatỳ aminareo fanintelony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny voalohany naha tao Kôrinto an’i Paoly dia fony izy nanorina ny Fiangonana tao (jereo Asa 18); ny fanindroany dia voatsiahy ao amin’ny 2Kôr 13.2.
    marker-yv: yv-n
  - type: text
    text: ', nefa tsy hanahirana anareo. Ianareo manko no katsahiko fa tsy ny fanananareo; satria tsy ny zanaka no tokony hitady vola hikarakarana ny ray aman-dreniny, fa ny ray aman-dreniny no tokony hitady vola hikarakarana ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha ny amiko, dia sitrako mihitsy ny handany manontolo ny fananako sy ny aiko hamonjena anareo. Koa raha manao lanja miakatra ny fitiavako anareo, dia hanao lanja midina ve ny fitiavanareo ahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ekenareo fa tsy nanahirana anareo tokoa aho; kanefa nanao hafetsena, hono, aho mba hahazoako anareo am-pitaka. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moa nisy nasaiko naka vola aman-karena taminareo ve ireo nirahiko tatỳ aminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Niangaviako i Tito hankatỳ aminareo ary nirahiko hiara-dia taminy koa ilay rahalahy izay fantatrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 8.18.
    marker-yv: yv-n
  - type: text
    text: . Naka vola aman-karena taminareo ve i Tito? Tsy toe-panahy iraisana ve no narahinay tamin’ny fitondrantenanay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Heverinareo angamba fa miaro tena hatrany izahay eo imasonareo. Tsia! Araka ny sitrapon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no itenenanay eo anatrehan’Andriamanitra; ka lazainay aminareo, ry hava-malala, fa izay rehetra izany dia hampandrosoana anareo amin’ny finoana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Atahorako manko fandrao, rehefa tonga aho, dia tsy araka izay tiako no hahitako anareo, ary tsy araka izay tianareo koa no hahitanareo ahy. Atahorako fandrao hisy fifandirana, fifampialonana, fahatezerana, fifampiandaniana, fanaratsiana, fanendrikendrehana, fieboeboana, ary fisavorovoroana. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Atahorako fandrao, amin’izao fahatongavako izao, dia hampietry ahy eo anatrehanareo ilay Andriamanitro; ka hitomany aho, noho ny maro izay nanota teo aloha nefa mbola tsy niala tamin’ny fahalotoana sy fijangajangana ary fihetsika tsy maotina fanaony.
