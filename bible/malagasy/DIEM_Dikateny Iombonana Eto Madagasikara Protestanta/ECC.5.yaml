document_id: ECC.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Aza maika ny hiteny ary aza malaky manapa-kevitra hanao voady amin’Andriamanitra; fa any an-danitra Andriamanitra ary ianao kosa etỳ ambonin’ny tany. Koa lanjalanjao ny teninao. '
  '10':
  - type: text
    content: 'Fa arakaraka ny ananan’ny olona no mampitombo ny mpihampitra aminy. Inona no tombontsoan’ny tompom-pananana afa-tsy ny mijery ny hareny? '
  '11':
  - type: text
    content: 'Mahita tory tsara ny mpiasa na kely na be ny harapany. Fa tsy mba mahita tory kosa ny mpanankarena vokatry ny hamaroan’ny fananany. '
  '12':
  - type: text
    content: 'Nahita zava-dratsy mampahory aho teto ambonin’ny tany, dia ny vola izay notahirizin’ny tompony nefa nampidi-doza azy. '
  '13':
  - type: text
    content: 'Very harena tamin-javatra mamohehatra izy ary tsy nanana na inona intsony nony tera-dahy. '
  '14':
  - type: text
    content: 'Tsy maintsy handao ity tany ity toy izay niaviany izy, dia toy ny nitanjahany fony izy nivoaka avy tao an-kibon-dreniny. Ary tsy hahatondra na inona na inona ho valin-kasasarany izy. '
  '15':
  - type: text
    content: Fahoriana lehibe ho azy fa toy ny nahatongavany teto an-tany no handaozany azy. Inona no tombontsoa azony? Nisasa-poana fotsiny izy
  - type: note
    content: 'And 14 sy 15: Jereo Jôb 1.21; Sal 49.17-18; 1Tim 6.7.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Ankoatra izany, maloka ny fiainany manontolo noho ny alahelo
  - type: note
    content: 'maloka ny fiainany... noho ny alahelo be: araka ny dkt grika tranainy; hebreo mihinana ao amin’ny maizina izy.'
  - type: text
    content: 'be sy ny fahasorenana ary ny fijaliana. '
  '17':
  - type: text
    content: 'Izao no tsapako fa tsara: mety ho an’ny olona ny mihinana sy ny misotro ary ny mifaly amin’ny vokatry ny asany mandritra ny androm-piainana omen’Andriamanitra azy; satria izany no anjarany. '
  '18':
  - type: text
    content: 'Rehefa misy olona omen’Andriamanitra vola aman-karena sady avelany hihinana sy haka ny anjarany amin’izany ary koa hifaly amin’ny vokatry ny asany, dia fanomezan’Andriamanitra izany. '
  '19':
  - type: text
    content: Hadinon’ny olona kosa amin’izay fa mandalo ny fiainany, satria fenoin’Andriamanitra fahasambarana ny fony.
  '2':
  - type: text
    content: Fa izay be ahiahy, mpanonofy ratsy; ary izay be teny mpanao rediredin’adala
  - type: note
    content: 'And 1 sy 2: jereo Oha 10.19; 13.3; Jak 3.1-12.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Raha manao voady amin’Andriamanitra ianao, dia tanteraho ara-potoana izany, satria tsy sitrak’Andriamanitra ny olona adala. Koa efao ny voady efa nataonao. '
  '4':
  - type: text
    content: 'Aleo tsy manome toky toy izay manome toky nefa tsy mahatanteraka. '
  '5':
  - type: text
    content: 'Halaviro ireo teny mety hamatotra anao. Aza miteny amin’ny mpisorona voairak’Andriamanitra hoe: «Tsy fanahy iniana iny». Fa ho tezitra Andriamanitra ary hopotehiny avokoa izay rehetra ataonao. '
  '6':
  - type: text
    content: Arakaraka ny mahabe ny teny no mahabe ny nofy sy ny zava-poana. Koa Andriamanitra no hajao.
  - type: heading
    content: Ireo fanamparam-pahefana
  '7':
  - type: text
    content: 'Aza atao ho mahagaga ny fahitana ny mahantra ampijalîna na ny rariny sy ny fahamarinana voahitsakitsaka eto amin’ny tany. Fa ny olona anankiray ambony dia misy miaro azy ao amboniny ao, ary izy roa tonta ireo aza dia mbola misy ambony kokoa miaro azy. '
  '8':
  - type: text
    content: Tsara kokoa ho an’ny firenena ny manana mpanjaka izay mampandroso ny asa fambolena
  - type: note
    content: Izany hoe izay miaro ireo ambanimbany fari-piainana, dia ireo tantsaha.
  - type: text
    content: .
  - type: heading
    content: Zava-poana ny harena
  '9':
  - type: text
    content: 'Izay tia vola dia tsy ho afa-po mihitsy; ary izay tia harena dia tsy ho vokin’izany mihitsy. Zava-poana koa izany. '
