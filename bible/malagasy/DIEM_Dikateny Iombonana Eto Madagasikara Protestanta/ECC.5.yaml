document_id: ECC.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aza maika ny hiteny ary aza malaky manapa-kevitra hanao voady amin’Andriamanitra; fa any an-danitra Andriamanitra ary ianao kosa etỳ ambonin’ny tany. Koa lanjalanjao ny teninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa izay be ahiahy, mpanonofy ratsy; ary izay be teny mpanao rediredin’adala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'And 1 sy 2: jereo Oha 10.19; 13.3; Jak 3.1-12.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha manao voady amin’Andriamanitra ianao, dia tanteraho ara-potoana izany, satria tsy sitrak’Andriamanitra ny olona adala. Koa efao ny voady efa nataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aleo tsy manome toky toy izay manome toky nefa tsy mahatanteraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Halaviro ireo teny mety hamatotra anao. Aza miteny amin’ny mpisorona voairak’Andriamanitra hoe: «Tsy fanahy iniana iny». Fa ho tezitra Andriamanitra ary hopotehiny avokoa izay rehetra ataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Arakaraka ny mahabe ny teny no mahabe ny nofy sy ny zava-poana. Koa Andriamanitra no hajao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo fanamparam-pahefana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza atao ho mahagaga ny fahitana ny mahantra ampijalîna na ny rariny sy ny fahamarinana voahitsakitsaka eto amin’ny tany. Fa ny olona anankiray ambony dia misy miaro azy ao amboniny ao, ary izy roa tonta ireo aza dia mbola misy ambony kokoa miaro azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsara kokoa ho an’ny firenena ny manana mpanjaka izay mampandroso ny asa fambolena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe izay miaro ireo ambanimbany fari-piainana, dia ireo tantsaha.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zava-poana ny harena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay tia vola dia tsy ho afa-po mihitsy; ary izay tia harena dia tsy ho vokin’izany mihitsy. Zava-poana koa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa arakaraka ny ananan’ny olona no mampitombo ny mpihampitra aminy. Inona no tombontsoan’ny tompom-pananana afa-tsy ny mijery ny hareny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mahita tory tsara ny mpiasa na kely na be ny harapany. Fa tsy mba mahita tory kosa ny mpanankarena vokatry ny hamaroan’ny fananany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nahita zava-dratsy mampahory aho teto ambonin’ny tany, dia ny vola izay notahirizin’ny tompony nefa nampidi-doza azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Very harena tamin-javatra mamohehatra izy ary tsy nanana na inona intsony nony tera-dahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy maintsy handao ity tany ity toy izay niaviany izy, dia toy ny nitanjahany fony izy nivoaka avy tao an-kibon-dreniny. Ary tsy hahatondra na inona na inona ho valin-kasasarany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fahoriana lehibe ho azy fa toy ny nahatongavany teto an-tany no handaozany azy. Inona no tombontsoa azony? Nisasa-poana fotsiny izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'And 14 sy 15: Jereo Jôb 1.21; Sal 49.17-18; 1Tim 6.7.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ankoatra izany, maloka ny fiainany manontolo noho ny alahelo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'maloka ny fiainany... noho ny alahelo be: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika tranainy; hebreo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mihinana ao amin’ny maizina izy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'be sy ny fahasorenana ary ny fijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izao no tsapako fa tsara: mety ho an’ny olona ny mihinana sy ny misotro ary ny mifaly amin’ny vokatry ny asany mandritra ny androm-piainana omen’Andriamanitra azy; satria izany no anjarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa misy olona omen’Andriamanitra vola aman-karena sady avelany hihinana sy haka ny anjarany amin’izany ary koa hifaly amin’ny vokatry ny asany, dia fanomezan’Andriamanitra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hadinon’ny olona kosa amin’izay fa mandalo ny fiainany, satria fenoin’Andriamanitra fahasambarana ny fony.
