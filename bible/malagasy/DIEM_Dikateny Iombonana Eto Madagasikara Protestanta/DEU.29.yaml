document_id: DEU.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nataon’ny Tompo ho an’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Novorîn’i Mosesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasany, ny and 1-28 dia voalahatra ho 2-29 (jereo ny naoty etsy aloha).
    marker-yv: yv-n
  - type: text
    text: ' ny Israelita rehetra ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tany Ejipta dia efa hitanareo izay rehetra nataon’ny TOMPO teo imasonareo tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' sy ny tandapany rehetra ary ny taniny manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Efa hitanareo maso ny fitsapana mafy nianjady taminy, dia ireny famantarana sy zava-mahagaga goavana ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nefa tsy nomen’ny TOMPO fo hahalala sy maso hahita ary sofina handre ianareo mandraka androany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 11.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Efapolo taona no nitondrako anareo tany an-taniefitra; tsy nihatonta na ny fitafiana teny an-koditrareo na ny kapa teny an-tongotrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy mofo mba nohaninareo ary tsy divay na toaka mba nosotroinareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 16; 17.1-7.
    marker-yv: yv-n
  - type: text
    text: ': niahy anareo ny TOMPO hahafantaranareo fa Izy no TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nony tonga teto amin’ity toerana ity ianareo, dia niainga hifanehatra sy hiady amintsika i Sihôna, mpanjakan’i Hesbôna, sy i Hôga mpanjakan’i Basàna; kanefa resintsika izy roa lahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 21.21-35.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nalaintsika ny taniny ka nomentsika ho zaratanin’ny Reobenita sy ny Gadita ary ny antsasa-pokon’i Manase
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 32.33.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa imasoy hotanterahina ny fepetra momba izao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' izao mba hambinina ianareo amin’izay rehetra hataonareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zava-dehibe ny fanekempihavanana amin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ry Israelita, anio no miseho eto anatrehan’ny TOMPO Andriamanitrareo ianareo rehetra, dia ny lehibenareo sy mpitsaranareo, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholonareo
  - type: text
    text: ' sy mpifehy anareo, ny vatan-dehilahy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sy zaza amam-behivavy, ary koa ny vahiny eo amin’ny tobinareo ka ampiasainareo ho mpikapa hazo sy ho mpantsaka rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hidiranareo izao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' ataon’ny TOMPO Andriamanitrareo aminareo ary hirosoanareo ny fianianana hankatoavana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hasandrany ho vahoakany ianareo ary Izy ho Andriamanitrareo, araka izay nampanantenainy taminareo sy nianianany tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy aminareo ihany no ataoko manankery izao fanekempihavanana arahim-pianianana izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: eny, tsy an’izay olona tafaraka etoana manatrika ny TOMPO Andriamanitsika ihany izao fanekempihavanana izao fa ho an’izay taranaka amam-para tsy mbola tafaraka amintsika anio koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fantatrareo izay nitoerantsika tany Ejipta sy izay nandehanantsika namakivaky ny tanin’ireo hafa firenena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary efa hitanareo ny zava-maharikoriko misy eo aminy, dia ny sampy vita hazo na vato na volafotsy na volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa aoka tsy hisy aminareo, lahy na vavy, na fianakaviana na foko, hanana fo mivily anio ka hiala amin’ny TOMPO Andriamanitsika mba handeha hanompo ny andriamanitr’ireny firenena ireny; aoka tsy hisy aminareo ho tahaka ny fakan-javamaniry miteraka poizina mangidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 12.15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha olona mandre izao tenim-pianianana izao no mihevi-tena ho ambinina ka hanao hoe: «Hanam-piadanana ihany aho, na manaraka ny ditram-poko aza; sady tany dibo-drano, tsy mba mangetaheta intsony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sady tany... intsony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy mazava ny RM ary tsy azo antoka ny dkt.
    marker-yv: yv-n
  - type: text
    text: '!», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia tsy hety hamela heloka izany olona izany ny TOMPO; fa hanetroka aminy kosa ny fahatezeran’ny TOMPO sy ny fahasarota-piarony, ary hiafitra aminy avokoa ny ozona rehetra izay voasoratra amin’ity boky ity, ka hovonoin’ny TOMPO tsy ho eo amin’izao tontolo izao ny fahatsiarovana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia havahan’ny TOMPO tsy ho anisan’ny foko israelita rehetra intsony izy; ary ho loza ho azy izany, araka ny ozona rehetra izay raketin’ny fanekempihavanana voasoratra amin’ity bokin’ny Lalàna ity.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hampiharin’ny Tompo tokoa ny fandrahonany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa mahita ny voina sy loza hamelezan’ny TOMPO ity taninareo ity ny taranaka any aoriana, dia ny zanakareo izay handimby anareo sy ny vahiny avy any an-tany lavitra, dia ho loa-bolana hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: «Main’ny solifara sy ny sira avokoa ity tany ity; tsy azo amafazana intsony, tsy hanirian-javatra intsony, ary tsy hisy ahitra hitrebona intsony ao. Ny mihatra aminy dia ny nanjo an’i Sôdôma sy i Gômôra ary i Admà sy i Tsebôima, izay tanàna noravan’ny TOMPO satria nirehetan’ny fahatezerany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 19.24-25.
    marker-yv: yv-n
  - type: text
    text: '». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny firenena hafa rehetra koa dia ho loa-bolana hoe: «Nahoana re ny TOMPO no dia nanao toy izany tamin’ity tany ity? Inona no hevitr’izao fahatezerany mirehitra mafy izao?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hovalian’ny olona hoe: «Tonga izao satria nafoin’izany vahoaka izany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' nataon’ny TOMPO, dia ilay Andriamanitry ny razambeny. Nanao fanekempihavanana taminy tokoa manko ny TOMPO fony nampiala azy tany Ejipta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'kanjo nandeha nanompo andriamani-kafa izy ka niankohoka teo anatrehan’ireny andriamanitra tsy fantany sady tsy navela hotompoiny ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nirehitra tamin’ity tany ity ny fahatezeran’ny TOMPO, ka nataony tonga taminy avokoa ny ozona rehetra izay voasoratra amin’ity boky ity; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: eny, fahatezerana mirehitra mafy tokoa no nandroahan’ny TOMPO azy sy nanilihany azy any an-tany hafa, tahaka ny misy azy ankehitriny izao.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Anjaran’ny TOMPO Andriamanitsika ny mahafantatra ny zava-miafina. Ny tenantsika sy ny taranatsika hatrany hatrany kosa no mahafantatra ny zavatra ambarany, mba hanatanterahantsika ny didy rehetra raketin’ity Lalàna ity.
