document_id: DEU.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nataon’ny Tompo ho an’i Israely
  - type: text
    content: Novorîn’i Mosesy
  - type: note
    content: Amin’ny dkt sasany, ny and 1-28 dia voalahatra ho 2-29 (jereo ny naoty etsy aloha).
  - type: text
    content: ' ny Israelita rehetra ka nilazany hoe:'
  - type: text
    content: '–Tany Ejipta dia efa hitanareo izay rehetra nataon’ny TOMPO teo imasonareo tamin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' sy ny tandapany rehetra ary ny taniny manontolo. '
  '10':
  - type: text
    content: 'sy zaza amam-behivavy, ary koa ny vahiny eo amin’ny tobinareo ka ampiasainareo ho mpikapa hazo sy ho mpantsaka rano. '
  '11':
  - type: text
    content: 'Hidiranareo izao ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' ataon’ny TOMPO Andriamanitrareo aminareo ary hirosoanareo ny fianianana hankatoavana izany. '
  '12':
  - type: text
    content: 'Dia hasandrany ho vahoakany ianareo ary Izy ho Andriamanitrareo, araka izay nampanantenainy taminareo sy nianianany tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo. '
  '13':
  - type: text
    content: 'Tsy aminareo ihany no ataoko manankery izao fanekempihavanana arahim-pianianana izao; '
  '14':
  - type: text
    content: eny, tsy an’izay olona tafaraka etoana manatrika ny TOMPO Andriamanitsika ihany izao fanekempihavanana izao fa ho an’izay taranaka amam-para tsy mbola tafaraka amintsika anio koa.
  '15':
  - type: text
    content: 'Fantatrareo izay nitoerantsika tany Ejipta sy izay nandehanantsika namakivaky ny tanin’ireo hafa firenena; '
  '16':
  - type: text
    content: 'ary efa hitanareo ny zava-maharikoriko misy eo aminy, dia ny sampy vita hazo na vato na volafotsy na volamena. '
  '17':
  - type: text
    content: Koa aoka tsy hisy aminareo, lahy na vavy, na fianakaviana na foko, hanana fo mivily anio ka hiala amin’ny TOMPO Andriamanitsika mba handeha hanompo ny andriamanitr’ireny firenena ireny; aoka tsy hisy aminareo ho tahaka ny fakan-javamaniry miteraka poizina mangidy
  - type: note
    content: Jereo Heb 12.15.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Raha olona mandre izao tenim-pianianana izao no mihevi-tena ho ambinina ka hanao hoe: «Hanam-piadanana ihany aho, na manaraka ny ditram-poko aza; sady tany dibo-drano, tsy mba mangetaheta intsony'
  - type: note
    content: 'sady tany... intsony: tsy mazava ny RM ary tsy azo antoka ny dkt.'
  - type: text
    content: '!», '
  '19':
  - type: text
    content: 'dia tsy hety hamela heloka izany olona izany ny TOMPO; fa hanetroka aminy kosa ny fahatezeran’ny TOMPO sy ny fahasarota-piarony, ary hiafitra aminy avokoa ny ozona rehetra izay voasoratra amin’ity boky ity, ka hovonoin’ny TOMPO tsy ho eo amin’izao tontolo izao ny fahatsiarovana azy. '
  '2':
  - type: text
    content: 'Efa hitanareo maso ny fitsapana mafy nianjady taminy, dia ireny famantarana sy zava-mahagaga goavana ireny. '
  '20':
  - type: text
    content: Dia havahan’ny TOMPO tsy ho anisan’ny foko israelita rehetra intsony izy; ary ho loza ho azy izany, araka ny ozona rehetra izay raketin’ny fanekempihavanana voasoratra amin’ity bokin’ny Lalàna ity.
  - type: heading
    content: Hampiharin’ny Tompo tokoa ny fandrahonany
  '21':
  - type: text
    content: 'Rehefa mahita ny voina sy loza hamelezan’ny TOMPO ity taninareo ity ny taranaka any aoriana, dia ny zanakareo izay handimby anareo sy ny vahiny avy any an-tany lavitra, dia ho loa-bolana hoe: '
  '22':
  - type: text
    content: «Main’ny solifara sy ny sira avokoa ity tany ity; tsy azo amafazana intsony, tsy hanirian-javatra intsony, ary tsy hisy ahitra hitrebona intsony ao. Ny mihatra aminy dia ny nanjo an’i Sôdôma sy i Gômôra ary i Admà sy i Tsebôima, izay tanàna noravan’ny TOMPO satria nirehetan’ny fahatezerany
  - type: note
    content: Jereo Gen 19.24-25.
  - type: text
    content: '». '
  '23':
  - type: text
    content: 'Ny firenena hafa rehetra koa dia ho loa-bolana hoe: «Nahoana re ny TOMPO no dia nanao toy izany tamin’ity tany ity? Inona no hevitr’izao fahatezerany mirehitra mafy izao?» '
  '24':
  - type: text
    content: 'Dia hovalian’ny olona hoe: «Tonga izao satria nafoin’izany vahoaka izany ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataon’ny TOMPO, dia ilay Andriamanitry ny razambeny. Nanao fanekempihavanana taminy tokoa manko ny TOMPO fony nampiala azy tany Ejipta; '
  '25':
  - type: text
    content: 'kanjo nandeha nanompo andriamani-kafa izy ka niankohoka teo anatrehan’ireny andriamanitra tsy fantany sady tsy navela hotompoiny ireny. '
  '26':
  - type: text
    content: 'Dia nirehitra tamin’ity tany ity ny fahatezeran’ny TOMPO, ka nataony tonga taminy avokoa ny ozona rehetra izay voasoratra amin’ity boky ity; '
  '27':
  - type: text
    content: eny, fahatezerana mirehitra mafy tokoa no nandroahan’ny TOMPO azy sy nanilihany azy any an-tany hafa, tahaka ny misy azy ankehitriny izao.»
  '28':
  - type: text
    content: Anjaran’ny TOMPO Andriamanitsika ny mahafantatra ny zava-miafina. Ny tenantsika sy ny taranatsika hatrany hatrany kosa no mahafantatra ny zavatra ambarany, mba hanatanterahantsika ny didy rehetra raketin’ity Lalàna ity.
  '3':
  - type: text
    content: Nefa tsy nomen’ny TOMPO fo hahalala sy maso hahita ary sofina handre ianareo mandraka androany
  - type: note
    content: Jereo Rm 11.8.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Efapolo taona no nitondrako anareo tany an-taniefitra; tsy nihatonta na ny fitafiana teny an-koditrareo na ny kapa teny an-tongotrareo. '
  '5':
  - type: text
    content: Tsy mofo mba nohaninareo ary tsy divay na toaka mba nosotroinareo
  - type: note
    content: Jereo Eks 16; 17.1-7.
  - type: text
    content: ': niahy anareo ny TOMPO hahafantaranareo fa Izy no TOMPO Andriamanitrareo. '
  '6':
  - type: text
    content: Nony tonga teto amin’ity toerana ity ianareo, dia niainga hifanehatra sy hiady amintsika i Sihôna, mpanjakan’i Hesbôna, sy i Hôga mpanjakan’i Basàna; kanefa resintsika izy roa lahy
  - type: note
    content: Jereo Nom 21.21-35.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Ary nalaintsika ny taniny ka nomentsika ho zaratanin’ny Reobenita sy ny Gadita ary ny antsasa-pokon’i Manase
  - type: note
    content: Jereo Nom 32.33.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Koa imasoy hotanterahina ny fepetra momba izao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' izao mba hambinina ianareo amin’izay rehetra hataonareo.'
  - type: heading
    content: Zava-dehibe ny fanekempihavanana amin’Andriamanitra
  '9':
  - type: text
    content: 'Ry Israelita, anio no miseho eto anatrehan’ny TOMPO Andriamanitrareo ianareo rehetra, dia ny lehibenareo sy mpitsaranareo, ny '
  - type: text
    content: loholonareo
  - type: text
    content: ' sy mpifehy anareo, ny vatan-dehilahy '
