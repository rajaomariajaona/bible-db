document_id: EXO.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: AVOAKAN’ANDRIAMANITRA HIALA TANY EJIPTA NY ISRAELITA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andevo tany Ejipta ny Israelita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireto no anaran’ireo zanakalahin’i Jakôba na Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Israely: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anarana hafa iantsoana an’i Jakôba izay nanjary niantsoana ny vahoaka taranany tatỳ aoriana, dia ny vahoaka Israely na Israelita. –Ampit ny and 1-4 sy ny Gen 46.8-27.
      marker-yv: yv-n
    - type: text
      text: ' tonga tany Ejipta niaraka tamin’ny rainy, samy nombàm-bady aman-janaka: '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa tsy maintsy itadiavana tetika hamerana ny isany. Rehefa misy ady manko, dia homba ireo fahavalontsika izy ka hiady amintsika ary hiala ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hiala ny tany '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: na hoe haka ny fahefana eo amin’ny tany.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanendry lehiben’ny asa fanompoana ny Ejiptianina mba hampikoy ny Israelita amin’ny asa mafy. Koa nanangana ny tanàna Pitôma sy Rahamsesa ny Israelita mba ho fitahirizam-bokatra ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy mbola tena fantatra mazava ny toerana nisy ireo tanàna roa Pitôma sy Rahamsesa, nefa azo antoka fa tany avaratra-atsinanan’ny vavaranon’i Neily no nisy azy. Ny hoe Farao dia anaram-boninahitra iombonana mitovitovy amin’ny hoe Amperôra.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa arakaraka ny namoretana azy no vao mainka nitomboany sy nahazoany vahana ka natahoran’ny Ejiptianina azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampanompoin’ny Ejiptianina mafy tokoa ny Israelita '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nataony nangidy ny fiainany tamin’ny fanompoana mafy: dia ny mandona tanimanga sy manao biriky ary manao ny asa any an-tsaha rehetra. Izany hoe ny asa fanompoana isan-karazany no nanereny azy mafy tokoa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Enjehin’ny Farao ny Israelita
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy mpampivelona hebreo anankiroa nantsoina hoe Sifrà sy Pohà. Nandidy azy ireo ny mpanjakan’i Ejipta, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Rehefa mampiteraka ny vehivavy hebreo ianareo, dia jereo ny zaza vao teraka; ka raha zazalahy dia vonoy ho faty, fa raha zazavavy kosa dia velomy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natahotra an’Andriamanitra anefa ireo mpampivelona ireo ka tsy nanao araka izay nodidian’ny mpanjakan’i Ejipta, fa namela ireo zazalahy ho velona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nampanantsoin’ny mpanjaka ireo mpampivelona ka nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no nanao izany zavatra izany ianareo, ka namela ireo zazalahy ho velona?
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly ireo mpampivelona hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mba tahaka ny vehivavy ejiptianina ireo vehivavy hebreo fa matanjaka; koa raha tsy mbola tonga akory ny mpampivelona, dia efa teraka izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Reobèna, Simehôna, Levỳ, Joda, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, dia nihamaro hatrany hatrany ireo Israelita sady nihanahery tokoa. Nasian’Andriamanitra soa ireo mpampivelona, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nomeny fara aman-dimby satria natahotra Azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' kosa dia nandidy ny vahoakany rehetra ka nanao hoe'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 7.19.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Atsipazo ao amin’ny ony Neily ny zazalahy hebreo rehetra raha vao teraka, fa ny zazavavy kosa avelao ho velona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jisakara, Zebolòna, Benjamîna, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dana, Naftalỳ, Gada ary Asera. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miisa fitopolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Miisa fitopolo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny stf hebreo iray hita tao Qumrân sy ny Septoazinta dia manao hoe dimy amby fitopolo no isany, isa hita ao amin’ny Asa 7.14 ihany koa (jereo Gen 46.27 sy nta).
      marker-yv: yv-n
    - type: text
      text: ' izy rehetra taranak’i Jakôba, fa i Jôsefa dia efa tany Ejipta rahateo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tatỳ aoriana dia maty i Jôsefa sy ireo rahalahiny ary ny taranaka indray nihira taminy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’izany dia niteraka betsaka ny Israelita ka nihamaro fatratra sady nihanahery tokoa ka nameno ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 7.17.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mpanjaka vaovao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Io '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mpanjaka vaovao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: io dia mety ho Rahamsesa II, Farao anisan’ilay andia-mpanjaka faha-19 tany Ejipta (1304-1238 tal J. K.) sady nalaza tamin’ny fanorenan-javatra. –Misy koa anefa vinavina milaza fa olon-kafa ny mpanjaka voalaza eto. –Ampit Asa 7.18 ity and ity.
      marker-yv: yv-n
    - type: text
      text: ' kosa no nanomboka nanjaka tany Ejipta tamin’izay ka tsy nahalala an’i Jôsefa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy tamin’ny vahoakany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Jereonareo fa betsaka ny vahoaka israelita sady mahery noho isika. '
