document_id: EXO.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: AVOAKAN’ANDRIAMANITRA HIALA TANY EJIPTA NY ISRAELITA
  - type: heading
    content: Andevo tany Ejipta ny Israelita
  - type: text
    content: Ireto no anaran’ireo zanakalahin’i Jakôba na Israely
  - type: note
    content: 'Israely: anarana hafa iantsoana an’i Jakôba izay nanjary niantsoana ny vahoaka taranany tatỳ aoriana, dia ny vahoaka Israely na Israelita. –Ampit ny and 1-4 sy ny Gen 46.8-27.'
  - type: text
    content: ' tonga tany Ejipta niaraka tamin’ny rainy, samy nombàm-bady aman-janaka: '
  '10':
  - type: text
    content: Koa tsy maintsy itadiavana tetika hamerana ny isany. Rehefa misy ady manko, dia homba ireo fahavalontsika izy ka hiady amintsika ary hiala ny tany
  - type: note
    content: hiala ny tany na hoe haka ny fahefana eo amin’ny tany.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Dia nanendry lehiben’ny asa fanompoana ny Ejiptianina mba hampikoy ny Israelita amin’ny asa mafy. Koa nanangana ny tanàna Pitôma sy Rahamsesa ny Israelita mba ho fitahirizam-bokatra ho an’ny '
  - type: text
    content: Farao
  - type: note
    content: Tsy mbola tena fantatra mazava ny toerana nisy ireo tanàna roa Pitôma sy Rahamsesa, nefa azo antoka fa tany avaratra-atsinanan’ny vavaranon’i Neily no nisy azy. Ny hoe Farao dia anaram-boninahitra iombonana mitovitovy amin’ny hoe Amperôra.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Kanefa arakaraka ny namoretana azy no vao mainka nitomboany sy nahazoany vahana ka natahoran’ny Ejiptianina azy. '
  '13':
  - type: text
    content: 'Nampanompoin’ny Ejiptianina mafy tokoa ny Israelita '
  '14':
  - type: text
    content: 'sady nataony nangidy ny fiainany tamin’ny fanompoana mafy: dia ny mandona tanimanga sy manao biriky ary manao ny asa any an-tsaha rehetra. Izany hoe ny asa fanompoana isan-karazany no nanereny azy mafy tokoa.'
  - type: heading
    content: Enjehin’ny Farao ny Israelita
  '15':
  - type: text
    content: 'Nisy mpampivelona hebreo anankiroa nantsoina hoe Sifrà sy Pohà. Nandidy azy ireo ny mpanjakan’i Ejipta, '
  '16':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: –Rehefa mampiteraka ny vehivavy hebreo ianareo, dia jereo ny zaza vao teraka; ka raha zazalahy dia vonoy ho faty, fa raha zazavavy kosa dia velomy.
  '17':
  - type: text
    content: 'Natahotra an’Andriamanitra anefa ireo mpampivelona ireo ka tsy nanao araka izay nodidian’ny mpanjakan’i Ejipta, fa namela ireo zazalahy ho velona. '
  '18':
  - type: text
    content: 'Koa nampanantsoin’ny mpanjaka ireo mpampivelona ka nanontaniany hoe:'
  - type: text
    content: –Nahoana no nanao izany zavatra izany ianareo, ka namela ireo zazalahy ho velona?
  '19':
  - type: text
    content: 'Fa namaly ireo mpampivelona hoe:'
  - type: text
    content: –Tsy mba tahaka ny vehivavy ejiptianina ireo vehivavy hebreo fa matanjaka; koa raha tsy mbola tonga akory ny mpampivelona, dia efa teraka izy.
  '2':
  - type: text
    content: 'Reobèna, Simehôna, Levỳ, Joda, '
  '20':
  - type: text
    content: 'Noho izany, dia nihamaro hatrany hatrany ireo Israelita sady nihanahery tokoa. Nasian’Andriamanitra soa ireo mpampivelona, '
  '21':
  - type: text
    content: 'ka nomeny fara aman-dimby satria natahotra Azy. '
  '22':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Farao
  - type: text
    content: ' kosa dia nandidy ny vahoakany rehetra ka nanao hoe'
  - type: note
    content: Jereo Asa 7.19.
  - type: text
    content: ':'
  - type: text
    content: –Atsipazo ao amin’ny ony Neily ny zazalahy hebreo rehetra raha vao teraka, fa ny zazavavy kosa avelao ho velona.
  '3':
  - type: text
    content: 'Jisakara, Zebolòna, Benjamîna, '
  '4':
  - type: text
    content: 'Dana, Naftalỳ, Gada ary Asera. '
  '5':
  - type: text
    content: Miisa fitopolo
  - type: note
    content: 'Miisa fitopolo: ny stf hebreo iray hita tao Qumrân sy ny Septoazinta dia manao hoe dimy amby fitopolo no isany, isa hita ao amin’ny Asa 7.14 ihany koa (jereo Gen 46.27 sy nta).'
  - type: text
    content: ' izy rehetra taranak’i Jakôba, fa i Jôsefa dia efa tany Ejipta rahateo. '
  '6':
  - type: text
    content: 'Tatỳ aoriana dia maty i Jôsefa sy ireo rahalahiny ary ny taranaka indray nihira taminy. '
  '7':
  - type: text
    content: Taorian’izany dia niteraka betsaka ny Israelita ka nihamaro fatratra sady nihanahery tokoa ka nameno ny tany
  - type: note
    content: Jereo Asa 7.17.
  - type: text
    content: .
  '8':
  - type: text
    content: Mpanjaka vaovao
  - type: note
    content: Io mpanjaka vaovao io dia mety ho Rahamsesa II, Farao anisan’ilay andia-mpanjaka faha-19 tany Ejipta (1304-1238 tal J. K.) sady nalaza tamin’ny fanorenan-javatra. –Misy koa anefa vinavina milaza fa olon-kafa ny mpanjaka voalaza eto. –Ampit Asa 7.18 ity and ity.
  - type: text
    content: ' kosa no nanomboka nanjaka tany Ejipta tamin’izay ka tsy nahalala an’i Jôsefa. '
  '9':
  - type: text
    content: 'Hoy izy tamin’ny vahoakany:'
  - type: text
    content: '–Jereonareo fa betsaka ny vahoaka israelita sady mahery noho isika. '
