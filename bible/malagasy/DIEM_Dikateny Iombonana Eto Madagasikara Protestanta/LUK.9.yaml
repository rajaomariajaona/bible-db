document_id: LUK.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Irahin’i Jesoa ny 12 lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 10.5-15; Mk 6.7-13)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorîn’i Jesoa ny 12 lahy, ka nomeny hery amam-pahefana hampiaiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ' rehetra sy hahasitrana ny aretina, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tafaverina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ', dia notantarainy tamin’i Jesoa izay rehetra nataony; ary nentin’i Jesoa nitokana tany amin’ny toerana mangingina akaikin’ny tanàna atao hoe Betsaidà ny apôstôly. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vao nahare izany kosa ny vahoaka dia lasa nanaraka an’i Jesoa. Noraisin’i Jesoa tsara ny olona ka nilazalazany momba ny Fanjakàn’Andriamanitra ary nositraniny izay nila fanasitranana.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony efa ho hariva ny andro, dia nohatonin’ny 12 lahy i Jesoa sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ravao ny vahoaka mba hamonjy ny tanàna kely sy trano an-tsaha eny manodidina, hitady hanina sy fandriana satria an-taniefitra isika izao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianareo ihany no aoka hanome hanina azy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny mpianany kosa niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy manana afa-tsy mofo dimy sy trondro anankiroa izahay, raha tsy hoe izahay angaha no tokony handeha hividy hanina ho an’ireo vahoaka be ireo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa dimy arivo teo ho eo ny vatan-dehilahy. Ary hoy indray i Jesoa tamin’ny mpianany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Asaovy mipetraka mitsitokotoko ny olona, tokony ho dimampolo isany avy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataon’ny mpianatra izany ka nasainy nipetraka avokoa ny vahoaka.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noraisin’i Jesoa kosa ny mofo dimy sy ny trondro anankiroa; ary rehefa niandrandra ny lanitra Izy ka nisaotra an’Andriamanitra noho ireo sakafo ireo, dia nanapaka sy nanome azy ny mpianany harosony amin’ny vahoaka. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia samy nihinana avokoa izy rehetra ka voky. Ary nangonina ny tapa-mofo aman-trondro ambiny ka nisy 12
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2 Mp 4.42-44.
      marker-yv: yv-n
    - type: text
      text: ' sobika.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Petera ho Mesia i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 16.13-19; Mk 8.27-29)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro, nivavaka samirery tany amin’ny toerana mangina i Jesoa; dia tonga teo aminy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ', ka nanontanian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa Aho araka ny filàzan’ny olona?
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’ny mpianany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Misy manao hoe i Jôhany Mpanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: '; ny sasany kosa manao hoe i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Elià
    - type: text
      text: '; ary ny hafa indray manao hoe anankiray amin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminani
    - type: text
      text: n’Andriamanitra fahizay no miverina!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nirahiny hitory ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' sy hanasitrana ny marary, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa ianareo kosa, iza moa Aho aminareo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly i Petera ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: ' avy amin’Andriamanitra!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa mialoha ny hahafatesany sy ny hitsanganany ho velona
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 16.20-28; Mk 8.30–9.1)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nofeperan’i Jesoa mafy anefa ireo mpianany tsy hilaza izany na amin’iza na amin’iza, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nampiany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy maintsy hijaly mafy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ', ka holavin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' sy ny lohandoha-mpisorona ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ', dia hovonoina ho faty; nefa hitsangana velona amin’ny andro fahatelo.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa tamin’ny olona rehetra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha misy te hiara-dia amiko, dia aoka handà ny tenany, ka hitondra ny hazo fijaliany isan’andro ary hiaraka amiko, '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa izay te hamonjy ny ainy no hahavery azy; ary izay hahafoy ny ainy noho ny fitiavany Ahy kosa no hahavonjy azy. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa inona no soa azon’ny olona raha eo am-pelatanany avokoa izao tontolo izao, kanefa ny tenany very na hitondra faisana? '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Na iza na iza menatra Ahy sy menatra ny teniko, dia ho menatra azy koa ny Zanak’olona rehefa ho avy ombàn’ny voninahiny, dia ny voninahitra ananan’ny Ray sy ananan’ny anjely masina. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Lazaiko marina aminareo fa ny sasany amin’izay manatrika etoana dia tsy ho faty raha tsy efa nahita ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiovàn’i Jesoa tarehy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 17.1-8; Mk 9.2-8)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tokony ho herinandro taorian’izany, dia nitondra an-dry i Petera sy i Jôhany ary i Jakôba i Jesoa, ka lasa niakatra tany an-tendrombohitra hivavaka. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola nivavaka i Jesoa, dia niova ny fahitana ny tarehiny ary tonga fotsy manjopiaka ny fitafiany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nohafatrafarany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza mitondra na inona na inona ianareo rehefa mandeha, na tehina, na kitapo, na sakafo, na vola, na akanjo hisoloana. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indreo nisy olona roa lahy niresaka taminy: dia i Mosesy sy i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Elià
    - type: text
      text: ', '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay niseho tamim-boninahitra sady nifampilaza fa efa ho tanteraka any Jerosalema ny hialàn’i Jesoa eto an-tany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sondrian-tory kosa i Petera sy ny namany, nefa mba taitra ihany ka nahita an’i Jesoa heni-boninahitra sy nahita azy roa lahy izay teo aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2Pt 1.16-18.
      marker-yv: yv-n
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony efa handao an’i Jesoa ry i Mosesy sy i Elià, dia hoy i Petera tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mpampianatra ô, tsara ho antsika ny mitoetra eto; ka hanao tranolay anankitelo izahay: ny anankiray ho Anao; ny anankiray ho an’i Mosesy ary ny anankiray ho an’i Elià (Tsy fantany anefa izay nolazainy).'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola niteny izany i Petera, dia nisy rahona nanarona azy rehetra ka nihoron-koditra i Petera sy ny namany raha niditra tao anatin’ilay rahona. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy feo avy tao amin’io rahona io nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ity no Zanako, ilay voafidiko; henoy Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 42.1; Lk 3.22.
      marker-yv: yv-n
    - type: text
      text: .
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vao nanomboka niteny ilay feo, dia i Jesoa irery ihany no hita. Nahatam-bava ireo mpianany telo lahy; ka tamin’izany andro izany, dia tsy nilazalaza na inona na inona tamin’olona momba ny zavatra hitany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay zazakely azon’ny demony
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 17.14-18; Mk 9.14-27)
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampitson’iny, raha nidina avy any an-tendrombohitra izy efa-mianaka, dia notsenain’ny vahoaka maro i Jesoa. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro nisy lehilahy anankiray tamin’ny vahoaka nitaraina mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mpampianatra ô, mihanta aminao aho, mba iantrao re ny zanako, fa lahitokana izy io! '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha vao hetsehin’ny fanahy ratsy izy, dia ataony midradradradra tampoka sady mifanintontsintona sy mandoa vory: ary efa torovana erỳ ny zanako vao ialan’ny fanahy ratsy. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izay trano hampandrosoana anareo dia itoero, ka avy ao no miaingà hanohy ny dianareo. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Efa nangatahiko ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatrao
    - type: text
      text: ' handroaka fa tsy nahomby.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Karazan’olona tsy mino sady be siasia ianareo! Mandra-pahoviana no hitoerako eto aminareo sy handeferako aminareo? Ento atỳ ny zanakao!
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iny nanatona iny ilay zaza, dia nazeran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ' ary nataony mifanintontsintona izaitsizy; fa notenenin’i Jesoa mafy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanahy maloto
    - type: text
      text: ' ka sitrana ilay zaza, ary natolony an-drainy.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia talanjona izy rehetra noho ny halehiben’ny fahefàn’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa fanindroany ny hahafatesany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 17.22-23; Mk 9.30-32)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola nigagan’ny besinimaro i Jesoa tamin’ny rehetra nataony, dia hoy Izy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tadidio tsara izao teny izao: Hatolotra eo an-tanan’ny olombelona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: .
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy azon’ny mpianany anefa izany teny izany, sady mbola nafenina taminy ka tsy fantany; ary tsy sahiny nanontaniana an’i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miady ny amin’izay ho lehibe ireo mpianatr’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 18.1-5; Mk 9.33-37)
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy hevitra nipoitra teo amin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' ny amin’izay mety ho lehibe indrindra amin’izy samy izy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jesoa kosa nahalala ny hevitra tao am-pon’ireo mpianatra ka nandray zazakely anankiray napetrany teo anilany, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nanao tamin’ny mpianany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na iza na iza mandray ity zaza ity amin’ny anarako, dia Izaho no raisiny; ary na iza na iza mandray Ahy, dia Ilay naniraka Ahy no raisiny. Eny, izay kely indrindra aminareo rehetra no lehibe indrindra!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay tsy manohitra anareo dia momba anareo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 9.38-40)
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny kosa i Jôhany nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mpampianatra ô, nahita olona nandroaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: ' tamin’ny anaranao izahay, ka norarànay satria tsy namanay.'
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izay rehetra tsy mandray anareo dia ialao ny tanànany; ka ny vovoka avy amin’ny tongotrareo ahintsano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 6.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ho fiampangana azy.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza raràna, fa izay tsy manohitra anareo dia momba anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy raisin’ny tanàna anankiray any Samaria i Jesoa
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony efa antomotra ny fotoana hanalana an’i Jesoa teto an-tany, dia tapa-kevitra hankany Jerosalema Izy, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nandefa iraka hialoha Azy. Lasa ireo mpialoha lalana ary niditra tao amin’ny tanàna anankiray an-dry zareo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Samaritanina
    - type: text
      text: ', mba hanomana ny fandraisana Azy. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nety nandray an’i Jesoa anefa ny mponina tao, noho Izy hita fa mizotra ho any Jerosalema. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nahita izany ry i Jakôba sy i Jôhany mpianany, dia nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, sitrakao ve ny hiantsoanay varatra hilatsaka avy any an-danitra handevona azy ireo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ampit 2 Mp 1.10-12. –Aorian’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: handevona azy ireo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia misy stf sasany manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tahaka ny nataon’i Elià
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '?'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa nitodika tamin’izy mirahalahy i Jesoa ka nananatra azy mafy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Misy stf sasany manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'ary nanao hoe: tsy fantatrareo manko izay fanahy mibaiko anareo; tsy ny hanala ain’olona fa ny hamonjy azy no nahatongavan’ny Zanak’olona.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Ampit Lk 19.10.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nankany amin’ny tanàna hafa i Jesoa sy ny mpianany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo nikasa hiara-dia amin’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 8.19-22)
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola nizotra tamin’ny diany i Jesoa sy ny mpianany, dia nisy olona anankiray nilaza tamin’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hiaraka aminao aho, na aiza na aiza alehanao!
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny fosa manan-davaka; ny voro-manidina manana ny akany; fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' tsy mba manan-trano handriany sy hialany sasatra.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Jesoa tamin’ny anankiray hafa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andao hiaraka amiko!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia izao no navalin’io:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avelao aho aloha, Tompoko, handevina an’i dada!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa ireo mpianatra nitety isan-tanàna ka nanambara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' sy nanasitrana hatraiza hatraiza.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahasahiran-kevitra an’i Herôda i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 14.1-12; Mk 6.14-29)
    marker-yv: yv-h
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Avelao izy samy maty no hifandevina, fa ianao kosa mandehana mitory ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '!'
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny anankiray hafa indray hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hiaraka aminao aho, Tompoko, saingy avelao aloha hanao veloma ny fianakaviako.
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny olona efa mitana amin’ny angadin’omby kanefa mbola miherika ihany, dia tsy natao ho an’ny Fanjakàn’Andriamanitra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Henon’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: ', mpanjaka tao Galilea, izay rehetra nataon’i Jesoa, ka sahiran-kevitra be ihany izy, satria nisy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I Jôhany Mpanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' no natsangan’Andriamanitra ho velona avy tany amin’ny maty indray!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sasany kosa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Elià
    - type: text
      text: ' no miseho!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hafa indray nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny anankiray tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminani
    - type: text
      text: n’Andriamanitra fahizay no niverina!
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa i Herôda:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha i Jôhany dia efa nasaiko notapahina ny lohany. Ka iza indray àry izao henoko manao zava-mahagaga izao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary notadiavin’i Herôda ho hita i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omen’i Jesoa sakafo ny olona mihoatra ny dimy arivo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 14.13-21; Mk 6.30-44; Jôh 6.1-14)
    marker-yv: yv-h
