document_id: LUK.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Irahin’i Jesoa ny 12 lahy
  - type: heading
    content: (Jereo Mt 10.5-15; Mk 6.7-13)
  - type: text
    content: 'Novorîn’i Jesoa ny 12 lahy, ka nomeny hery amam-pahefana hampiaiky ny '
  - type: text
    content: demony
  - type: text
    content: ' rehetra sy hahasitrana ny aretina, '
  '10':
  - type: text
    content: 'Nony tafaverina ny '
  - type: text
    content: apôstôly
  - type: text
    content: ', dia notantarainy tamin’i Jesoa izay rehetra nataony; ary nentin’i Jesoa nitokana tany amin’ny toerana mangingina akaikin’ny tanàna atao hoe Betsaidà ny apôstôly. '
  '11':
  - type: text
    content: Vao nahare izany kosa ny vahoaka dia lasa nanaraka an’i Jesoa. Noraisin’i Jesoa tsara ny olona ka nilazalazany momba ny Fanjakàn’Andriamanitra ary nositraniny izay nila fanasitranana.
  '12':
  - type: text
    content: 'Nony efa ho hariva ny andro, dia nohatonin’ny 12 lahy i Jesoa sady nataony hoe:'
  - type: text
    content: –Ravao ny vahoaka mba hamonjy ny tanàna kely sy trano an-tsaha eny manodidina, hitady hanina sy fandriana satria an-taniefitra isika izao.
  '13':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Ianareo ihany no aoka hanome hanina azy.
  - type: text
    content: 'Fa ny mpianany kosa niteny hoe:'
  - type: text
    content: –Tsy manana afa-tsy mofo dimy sy trondro anankiroa izahay, raha tsy hoe izahay angaha no tokony handeha hividy hanina ho an’ireo vahoaka be ireo.
  '14':
  - type: text
    content: 'Fa dimy arivo teo ho eo ny vatan-dehilahy. Ary hoy indray i Jesoa tamin’ny mpianany:'
  - type: text
    content: –Asaovy mipetraka mitsitokotoko ny olona, tokony ho dimampolo isany avy.
  '15':
  - type: text
    content: Dia nataon’ny mpianatra izany ka nasainy nipetraka avokoa ny vahoaka.
  '16':
  - type: text
    content: 'Noraisin’i Jesoa kosa ny mofo dimy sy ny trondro anankiroa; ary rehefa niandrandra ny lanitra Izy ka nisaotra an’Andriamanitra noho ireo sakafo ireo, dia nanapaka sy nanome azy ny mpianany harosony amin’ny vahoaka. '
  '17':
  - type: text
    content: Dia samy nihinana avokoa izy rehetra ka voky. Ary nangonina ny tapa-mofo aman-trondro ambiny ka nisy 12
  - type: note
    content: Ampit 2 Mp 4.42-44.
  - type: text
    content: ' sobika.'
  - type: heading
    content: Ambaran’i Petera ho Mesia i Jesoa
  - type: heading
    content: (Jereo Mt 16.13-19; Mk 8.27-29)
  '18':
  - type: text
    content: 'Indray andro, nivavaka samirery tany amin’ny toerana mangina i Jesoa; dia tonga teo aminy ny '
  - type: text
    content: mpianany
  - type: text
    content: ', ka nanontanian’i Jesoa hoe:'
  - type: text
    content: –Iza moa Aho araka ny filàzan’ny olona?
  '19':
  - type: text
    content: 'Dia novalian’ny mpianany hoe:'
  - type: text
    content: '–Misy manao hoe i Jôhany Mpanao '
  - type: text
    content: batisa
  - type: text
    content: '; ny sasany kosa manao hoe i '
  - type: text
    content: Elià
  - type: text
    content: '; ary ny hafa indray manao hoe anankiray amin’ireo '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra fahizay no miverina!
  '2':
  - type: text
    content: 'ary nirahiny hitory ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' sy hanasitrana ny marary, '
  '20':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Fa ianareo kosa, iza moa Aho aminareo?
  - type: text
    content: 'Namaly i Petera ka nanao hoe:'
  - type: text
    content: '–Ilay '
  - type: text
    content: Mesia
  - type: text
    content: ' avy amin’Andriamanitra!'
  - type: heading
    content: Ambaran’i Jesoa mialoha ny hahafatesany sy ny hitsanganany ho velona
  - type: heading
    content: (Jereo Mt 16.20-28; Mk 8.30–9.1)
  '21':
  - type: text
    content: 'Nofeperan’i Jesoa mafy anefa ireo mpianany tsy hilaza izany na amin’iza na amin’iza, '
  '22':
  - type: text
    content: 'sady nampiany hoe:'
  - type: text
    content: '–Tsy maintsy hijaly mafy ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', ka holavin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' sy ny lohandoha-mpisorona ary ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ', dia hovonoina ho faty; nefa hitsangana velona amin’ny andro fahatelo.'
  '23':
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny olona rehetra:'
  - type: text
    content: '–Raha misy te hiara-dia amiko, dia aoka handà ny tenany, ka hitondra ny hazo fijaliany isan’andro ary hiaraka amiko, '
  '24':
  - type: text
    content: 'Fa izay te hamonjy ny ainy no hahavery azy; ary izay hahafoy ny ainy noho ny fitiavany Ahy kosa no hahavonjy azy. '
  '25':
  - type: text
    content: 'Fa inona no soa azon’ny olona raha eo am-pelatanany avokoa izao tontolo izao, kanefa ny tenany very na hitondra faisana? '
  '26':
  - type: text
    content: 'Na iza na iza menatra Ahy sy menatra ny teniko, dia ho menatra azy koa ny Zanak’olona rehefa ho avy ombàn’ny voninahiny, dia ny voninahitra ananan’ny Ray sy ananan’ny anjely masina. '
  '27':
  - type: text
    content: 'Lazaiko marina aminareo fa ny sasany amin’izay manatrika etoana dia tsy ho faty raha tsy efa nahita ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: .
  - type: heading
    content: Ny fiovàn’i Jesoa tarehy
  - type: heading
    content: (Jereo Mt 17.1-8; Mk 9.2-8)
  '28':
  - type: text
    content: 'Tokony ho herinandro taorian’izany, dia nitondra an-dry i Petera sy i Jôhany ary i Jakôba i Jesoa, ka lasa niakatra tany an-tendrombohitra hivavaka. '
  '29':
  - type: text
    content: 'Raha mbola nivavaka i Jesoa, dia niova ny fahitana ny tarehiny ary tonga fotsy manjopiaka ny fitafiany. '
  '3':
  - type: text
    content: 'sady nohafatrafarany hoe:'
  - type: text
    content: '–Aza mitondra na inona na inona ianareo rehefa mandeha, na tehina, na kitapo, na sakafo, na vola, na akanjo hisoloana. '
  '30':
  - type: text
    content: 'Ary indreo nisy olona roa lahy niresaka taminy: dia i Mosesy sy i '
  - type: text
    content: Elià
  - type: text
    content: ', '
  '31':
  - type: text
    content: 'izay niseho tamim-boninahitra sady nifampilaza fa efa ho tanteraka any Jerosalema ny hialàn’i Jesoa eto an-tany. '
  '32':
  - type: text
    content: Sondrian-tory kosa i Petera sy ny namany, nefa mba taitra ihany ka nahita an’i Jesoa heni-boninahitra sy nahita azy roa lahy izay teo aminy
  - type: note
    content: Ampit 2Pt 1.16-18.
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Nony efa handao an’i Jesoa ry i Mosesy sy i Elià, dia hoy i Petera tamin’i Jesoa:'
  - type: text
    content: '–Mpampianatra ô, tsara ho antsika ny mitoetra eto; ka hanao tranolay anankitelo izahay: ny anankiray ho Anao; ny anankiray ho an’i Mosesy ary ny anankiray ho an’i Elià (Tsy fantany anefa izay nolazainy).'
  '34':
  - type: text
    content: 'Raha mbola niteny izany i Petera, dia nisy rahona nanarona azy rehetra ka nihoron-koditra i Petera sy ny namany raha niditra tao anatin’ilay rahona. '
  '35':
  - type: text
    content: 'Ary nisy feo avy tao amin’io rahona io nanao hoe:'
  - type: text
    content: –Ity no Zanako, ilay voafidiko; henoy Izy
  - type: note
    content: Ampit Is 42.1; Lk 3.22.
  - type: text
    content: .
  '36':
  - type: text
    content: Vao nanomboka niteny ilay feo, dia i Jesoa irery ihany no hita. Nahatam-bava ireo mpianany telo lahy; ka tamin’izany andro izany, dia tsy nilazalaza na inona na inona tamin’olona momba ny zavatra hitany.
  - type: heading
    content: Sitranin’i Jesoa ilay zazakely azon’ny demony
  - type: heading
    content: (Jereo Mt 17.14-18; Mk 9.14-27)
  '37':
  - type: text
    content: 'Ny ampitson’iny, raha nidina avy any an-tendrombohitra izy efa-mianaka, dia notsenain’ny vahoaka maro i Jesoa. '
  '38':
  - type: text
    content: 'Ary indro nisy lehilahy anankiray tamin’ny vahoaka nitaraina mafy hoe:'
  - type: text
    content: '–Mpampianatra ô, mihanta aminao aho, mba iantrao re ny zanako, fa lahitokana izy io! '
  '39':
  - type: text
    content: 'Raha vao hetsehin’ny fanahy ratsy izy, dia ataony midradradradra tampoka sady mifanintontsintona sy mandoa vory: ary efa torovana erỳ ny zanako vao ialan’ny fanahy ratsy. '
  '4':
  - type: text
    content: 'Izay trano hampandrosoana anareo dia itoero, ka avy ao no miaingà hanohy ny dianareo. '
  '40':
  - type: text
    content: 'Efa nangatahiko ny '
  - type: text
    content: mpianatrao
  - type: text
    content: ' handroaka fa tsy nahomby.'
  '41':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Karazan’olona tsy mino sady be siasia ianareo! Mandra-pahoviana no hitoerako eto aminareo sy handeferako aminareo? Ento atỳ ny zanakao!
  '42':
  - type: text
    content: 'Iny nanatona iny ilay zaza, dia nazeran’ny '
  - type: text
    content: demony
  - type: text
    content: ' ary nataony mifanintontsintona izaitsizy; fa notenenin’i Jesoa mafy ny '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' ka sitrana ilay zaza, ary natolony an-drainy.'
  '43':
  - type: text
    content: Dia talanjona izy rehetra noho ny halehiben’ny fahefàn’Andriamanitra.
  - type: heading
    content: Ambaran’i Jesoa fanindroany ny hahafatesany
  - type: heading
    content: (Jereo Mt 17.22-23; Mk 9.30-32)
  - type: text
    content: 'Raha mbola nigagan’ny besinimaro i Jesoa tamin’ny rehetra nataony, dia hoy Izy tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  '44':
  - type: text
    content: '–Tadidio tsara izao teny izao: Hatolotra eo an-tanan’ny olombelona ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: .
  '45':
  - type: text
    content: Tsy azon’ny mpianany anefa izany teny izany, sady mbola nafenina taminy ka tsy fantany; ary tsy sahiny nanontaniana an’i Jesoa.
  - type: heading
    content: Miady ny amin’izay ho lehibe ireo mpianatr’i Jesoa
  - type: heading
    content: (Jereo Mt 18.1-5; Mk 9.33-37)
  '46':
  - type: text
    content: 'Ary nisy hevitra nipoitra teo amin’ireo '
  - type: text
    content: mpianatra
  - type: text
    content: ' ny amin’izay mety ho lehibe indrindra amin’izy samy izy. '
  '47':
  - type: text
    content: 'I Jesoa kosa nahalala ny hevitra tao am-pon’ireo mpianatra ka nandray zazakely anankiray napetrany teo anilany, '
  '48':
  - type: text
    content: 'sady nanao tamin’ny mpianany hoe:'
  - type: text
    content: –Na iza na iza mandray ity zaza ity amin’ny anarako, dia Izaho no raisiny; ary na iza na iza mandray Ahy, dia Ilay naniraka Ahy no raisiny. Eny, izay kely indrindra aminareo rehetra no lehibe indrindra!
  - type: heading
    content: Izay tsy manohitra anareo dia momba anareo
  - type: heading
    content: (Jereo Mk 9.38-40)
  '49':
  - type: text
    content: 'Niteny kosa i Jôhany nanao hoe:'
  - type: text
    content: '–Mpampianatra ô, nahita olona nandroaka '
  - type: text
    content: demony
  - type: text
    content: ' tamin’ny anaranao izahay, ka norarànay satria tsy namanay.'
  '5':
  - type: text
    content: Izay rehetra tsy mandray anareo dia ialao ny tanànany; ka ny vovoka avy amin’ny tongotrareo ahintsano
  - type: note
    content: Jereo Mk 6.11 sy nta.
  - type: text
    content: ' ho fiampangana azy.'
  '50':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Aza raràna, fa izay tsy manohitra anareo dia momba anareo.
  - type: heading
    content: Tsy raisin’ny tanàna anankiray any Samaria i Jesoa
  '51':
  - type: text
    content: 'Nony efa antomotra ny fotoana hanalana an’i Jesoa teto an-tany, dia tapa-kevitra hankany Jerosalema Izy, '
  '52':
  - type: text
    content: 'ka nandefa iraka hialoha Azy. Lasa ireo mpialoha lalana ary niditra tao amin’ny tanàna anankiray an-dry zareo '
  - type: text
    content: Samaritanina
  - type: text
    content: ', mba hanomana ny fandraisana Azy. '
  '53':
  - type: text
    content: 'Tsy nety nandray an’i Jesoa anefa ny mponina tao, noho Izy hita fa mizotra ho any Jerosalema. '
  '54':
  - type: text
    content: 'Nony nahita izany ry i Jakôba sy i Jôhany mpianany, dia nanao hoe:'
  - type: text
    content: –Tompo ô, sitrakao ve ny hiantsoanay varatra hilatsaka avy any an-danitra handevona azy ireo
  - type: note
    content: Ampit 2 Mp 1.10-12. –Aorian’ny hoe handevona azy ireo dia misy stf sasany manampy hoe tahaka ny nataon’i Elià.
  - type: text
    content: '?'
  '55':
  - type: text
    content: Fa nitodika tamin’izy mirahalahy i Jesoa ka nananatra azy mafy
  - type: note
    content: 'Misy stf sasany manampy hoe ary nanao hoe: tsy fantatrareo manko izay fanahy mibaiko anareo; tsy ny hanala ain’olona fa ny hamonjy azy no nahatongavan’ny Zanak’olona. Ampit Lk 19.10.'
  - type: text
    content: '. '
  '56':
  - type: text
    content: Dia nankany amin’ny tanàna hafa i Jesoa sy ny mpianany.
  - type: heading
    content: Ireo nikasa hiara-dia amin’i Jesoa
  - type: heading
    content: (Jereo Mt 8.19-22)
  '57':
  - type: text
    content: 'Raha mbola nizotra tamin’ny diany i Jesoa sy ny mpianany, dia nisy olona anankiray nilaza tamin’i Jesoa hoe:'
  - type: text
    content: –Hiaraka aminao aho, na aiza na aiza alehanao!
  '58':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Ny fosa manan-davaka; ny voro-manidina manana ny akany; fa ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' tsy mba manan-trano handriany sy hialany sasatra.'
  '59':
  - type: text
    content: 'Hoy kosa i Jesoa tamin’ny anankiray hafa:'
  - type: text
    content: –Andao hiaraka amiko!
  - type: text
    content: 'Dia izao no navalin’io:'
  - type: text
    content: –Avelao aho aloha, Tompoko, handevina an’i dada!
  '6':
  - type: text
    content: 'Dia lasa ireo mpianatra nitety isan-tanàna ka nanambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' sy nanasitrana hatraiza hatraiza.'
  - type: heading
    content: Mahasahiran-kevitra an’i Herôda i Jesoa
  - type: heading
    content: (Jereo Mt 14.1-12; Mk 6.14-29)
  '60':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Avelao izy samy maty no hifandevina, fa ianao kosa mandehana mitory ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '!'
  '61':
  - type: text
    content: 'Ary hoy ny anankiray hafa indray hoe:'
  - type: text
    content: –Hiaraka aminao aho, Tompoko, saingy avelao aloha hanao veloma ny fianakaviako.
  '62':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Ny olona efa mitana amin’ny angadin’omby kanefa mbola miherika ihany, dia tsy natao ho an’ny Fanjakàn’Andriamanitra.
  '7':
  - type: text
    content: 'Henon’i '
  - type: text
    content: Herôda
  - type: text
    content: ', mpanjaka tao Galilea, izay rehetra nataon’i Jesoa, ka sahiran-kevitra be ihany izy, satria nisy nanao hoe:'
  - type: text
    content: '–I Jôhany Mpanao '
  - type: text
    content: batisa
  - type: text
    content: ' no natsangan’Andriamanitra ho velona avy tany amin’ny maty indray!'
  '8':
  - type: text
    content: 'Ny sasany kosa nanao hoe:'
  - type: text
    content: '–I '
  - type: text
    content: Elià
  - type: text
    content: ' no miseho!'
  - type: text
    content: 'Ny hafa indray nanao hoe:'
  - type: text
    content: '–Ny anankiray tamin’ireo '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra fahizay no niverina!
  '9':
  - type: text
    content: 'Fa hoy kosa i Herôda:'
  - type: text
    content: –Raha i Jôhany dia efa nasaiko notapahina ny lohany. Ka iza indray àry izao henoko manao zava-mahagaga izao?
  - type: text
    content: Ary notadiavin’i Herôda ho hita i Jesoa.
  - type: heading
    content: Omen’i Jesoa sakafo ny olona mihoatra ny dimy arivo
  - type: heading
    content: (Jereo Mt 14.13-21; Mk 6.30-44; Jôh 6.1-14)
