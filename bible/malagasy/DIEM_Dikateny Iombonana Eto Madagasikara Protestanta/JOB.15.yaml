document_id: JOB.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Tenin’i Elifaza: tsy ho afa-miala ny ratsy fanahy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niteny indray i Elifaza avy any Temàna ka nanao tamin’i Jôba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mba misy eto aminay ihany koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ela nihetezana sy tratra antitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoatra noho ny rainao aza.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Moa tsy mendrika anao ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fampiononan’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny teny mamy nataonay taminao?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nahoana no dia entim-po toy izao ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahoana no mangarika anay ihany koa?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary nahoana Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ifatraran’ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka anaovanao vava tsy ambina?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa inona ny olombelona no hihambo ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na izay natera-behivavy no hanao ny tenany ho marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôb 25.4-6.
      marker-yv: yv-n
    - type: text
      text: '?'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Raha Andriamanitra aza tsy matoky ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeliny
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lanitra aza tsy madio eo imasony,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: mainka moa izay faikan’olona feno fahalovana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay misotro heloka toy ny misotro rano?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hanazava zavatra aminao aho ka henoy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izay efa hitako no hambarako anao,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: dia izay ampianarin’ny olon-kendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady azony tamin’ny razany fa tsy nisy nafeniny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ireny razana ireny ihany rahateo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa nomen’Andriamanitra ity tany ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nisy vahiny nifangaroharo taminy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Velon-drivotra va ny olon-kendry toa anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiteniteny foana tsy amim-piheverana
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hoy ireo olon-kendry ireo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny olon-dratsy dia feno fanahiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandritra ny andro rehetra iainany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na firy na firy ny taona voatendry ho an’ny lozabe.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Feo mampitahotra no tsy afaka an-tsofiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izy mihevi-tena ho milamina iny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no avy hamely azy ilay mpandrava.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy manantena ho afaka amin’ny haizina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria manandindona azy ny ho fatin’ny sabatra,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ary miandry hamiravira azy ny voromahery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantany fa efa antomotra ny faharavany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mampatahotra azy ny fahoriana sy ny tebiteby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mirohotra mianjady aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny mpanjaka ombàn-tafika vonon-kamely.»
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Izany no tonga dia satria ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: naninji-tanana hanohitra an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nirehareha nihantsy an’ilay Tsitoha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny olon-dratsy dia minia manamafy hatoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mimaona hamely an’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria hono arovan’ny ampingany matevina.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fenofeno ny tarehiny sady mahazo nofo ny tenabeny.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Niorim-ponenana an-tanàna rava izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nitoetra an-trano haolo madiva hirodana.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Na oviana na oviana io olon-dratsy io
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho tonga mpanankarena mihitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy haharitra ela ny fananany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahombiazany tsy hitatra amin’ny tany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: sady hampiasa firesaka tsy misy dikany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa fiteny tsy mahasoa akory?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tsy ho afaka amin’ny haizim-pahafatesana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho tahaka ny solofon-kazo main’ny afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no handevonan’ny fofonain’Andriamanitra azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Diso hevitra izy raha hitoky amin’ny fitaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny nataony ihany no hivaly aminy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ho tanteraka alohan’ny fahafatesany izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny ravin-kazo tsy hihamaitso intsony,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: na toy ny voaloboka hanintsana voa mbola manta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na toy ny ôliva mampiraraka ny voniny.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Fa ho momba ny ankohonan’ny olon-dratsy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho levon’ny afo ny tranon’ny mpandray tsolotra.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Izay torontoronina loza dia miteraka fahoriana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny kibony manotri-pitaka hahavoa azy ihany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vitanao ravana ny fanajana an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary foananao ny fivavahana eo anatrehany!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa ny helokao no manesika anao hiteny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lelan’ny mpamitaka no arahinao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ka ny vavanao fa tsy izaho no manameloka anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny molotrao ihany no miampanga anao,
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ianao va, ry Jôba, no olombelona teraka voalohany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita masoandro talohan’ny tendrombohitra ve ianao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nanatrika ny filan-kevitr’Andriamanitra va ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no bodoinao samirery ny fahendrena?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Inona no fantatrao ka tsy mba fantatray?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no hainao ka mbola manavia anay?
