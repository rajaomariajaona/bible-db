document_id: JOB.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Tenin’i Elifaza: tsy ho afa-miala ny ratsy fanahy'
  - type: text
    content: 'Dia niteny indray i Elifaza avy any Temàna ka nanao tamin’i Jôba hoe:'
  '10':
  - type: text
    content: Mba misy eto aminay ihany koa
  - type: text
    content: ny ela nihetezana sy tratra antitra
  - type: text
    content: mihoatra noho ny rainao aza.
  '11':
  - type: text
    content: Moa tsy mendrika anao ve
  - type: text
    content: ny fampiononan’Andriamanitra
  - type: text
    content: sy ny teny mamy nataonay taminao?
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Nahoana no dia entim-po toy izao ianao
  - type: text
    content: ary nahoana no mangarika anay ihany koa?
  '13':
  - type: text
    content: Ary nahoana Andriamanitra
  - type: text
    content: no ifatraran’ny fahatezeranao
  - type: text
    content: ka anaovanao vava tsy ambina?
  '14':
  - type: text
    content: 'Fa inona ny olombelona no hihambo ho '
  - type: text
    content: madio
  - type: text
    content: '?'
  - type: text
    content: Na izay natera-behivavy no hanao ny tenany ho marina
  - type: note
    content: Ampit Jôb 25.4-6.
  - type: text
    content: '?'
  '15':
  - type: text
    content: 'Raha Andriamanitra aza tsy matoky ireo '
  - type: text
    content: anjeliny
  - type: text
    content: ','
  - type: text
    content: ary ny lanitra aza tsy madio eo imasony,
  '16':
  - type: text
    content: mainka moa izay faikan’olona feno fahalovana
  - type: text
    content: izay misotro heloka toy ny misotro rano?
  - type: heading
    content: '*'
  '17':
  - type: text
    content: Hanazava zavatra aminao aho ka henoy;
  - type: text
    content: fa Izay efa hitako no hambarako anao,
  '18':
  - type: text
    content: dia izay ampianarin’ny olon-kendry
  - type: text
    content: sady azony tamin’ny razany fa tsy nisy nafeniny.
  '19':
  - type: text
    content: Ireny razana ireny ihany rahateo
  - type: text
    content: no efa nomen’Andriamanitra ity tany ity
  - type: text
    content: ary tsy nisy vahiny nifangaroharo taminy.
  '2':
  - type: text
    content: Velon-drivotra va ny olon-kendry toa anao
  - type: text
    content: ka hiteniteny foana tsy amim-piheverana
  '20':
  - type: text
    content: 'Hoy ireo olon-kendry ireo hoe:'
  - type: text
    content: «Ny olon-dratsy dia feno fanahiana
  - type: text
    content: mandritra ny andro rehetra iainany,
  - type: text
    content: na firy na firy ny taona voatendry ho an’ny lozabe.
  '21':
  - type: text
    content: Feo mampitahotra no tsy afaka an-tsofiny;
  - type: text
    content: amin’izy mihevi-tena ho milamina iny
  - type: text
    content: no avy hamely azy ilay mpandrava.
  '22':
  - type: text
    content: Tsy manantena ho afaka amin’ny haizina izy,
  - type: text
    content: satria manandindona azy ny ho fatin’ny sabatra,
  '23':
  - type: text
    content: ary miandry hamiravira azy ny voromahery.
  - type: text
    content: Fantany fa efa antomotra ny faharavany.
  '24':
  - type: text
    content: Mampatahotra azy ny fahoriana sy ny tebiteby
  - type: text
    content: izay mirohotra mianjady aminy
  - type: text
    content: tahaka ny mpanjaka ombàn-tafika vonon-kamely.»
  '25':
  - type: text
    content: Izany no tonga dia satria ny olon-dratsy
  - type: text
    content: naninji-tanana hanohitra an’Andriamanitra
  - type: text
    content: sady nirehareha nihantsy an’ilay Tsitoha.
  - type: heading
    content: '*'
  '26':
  - type: text
    content: Ny olon-dratsy dia minia manamafy hatoka
  - type: text
    content: sy mimaona hamely an’Andriamanitra,
  - type: text
    content: satria hono arovan’ny ampingany matevina.
  '27':
  - type: text
    content: Fenofeno ny tarehiny sady mahazo nofo ny tenabeny.
  '28':
  - type: text
    content: Niorim-ponenana an-tanàna rava izy
  - type: text
    content: ka nitoetra an-trano haolo madiva hirodana.
  '29':
  - type: text
    content: Na oviana na oviana io olon-dratsy io
  - type: text
    content: dia tsy ho tonga mpanankarena mihitsy,
  - type: text
    content: satria tsy haharitra ela ny fananany;
  - type: text
    content: ary ny fahombiazany tsy hitatra amin’ny tany.
  '3':
  - type: text
    content: sady hampiasa firesaka tsy misy dikany
  - type: text
    content: ary koa fiteny tsy mahasoa akory?
  '30':
  - type: text
    content: Tsy ho afaka amin’ny haizim-pahafatesana izy;
  - type: text
    content: fa ho tahaka ny solofon-kazo main’ny afo
  - type: text
    content: no handevonan’ny fofonain’Andriamanitra azy.
  - type: heading
    content: '*'
  '31':
  - type: text
    content: Diso hevitra izy raha hitoky amin’ny fitaka,
  - type: text
    content: satria ny nataony ihany no hivaly aminy.
  '32':
  - type: text
    content: Ho tanteraka alohan’ny fahafatesany izany,
  - type: text
    content: dia toy ny ravin-kazo tsy hihamaitso intsony,
  '33':
  - type: text
    content: na toy ny voaloboka hanintsana voa mbola manta,
  - type: text
    content: na toy ny ôliva mampiraraka ny voniny.
  '34':
  - type: text
    content: Fa ho momba ny ankohonan’ny olon-dratsy.
  - type: text
    content: Ho levon’ny afo ny tranon’ny mpandray tsolotra.
  '35':
  - type: text
    content: Izay torontoronina loza dia miteraka fahoriana;
  - type: text
    content: fa ny kibony manotri-pitaka hahavoa azy ihany.
  '4':
  - type: text
    content: Vitanao ravana ny fanajana an’Andriamanitra
  - type: text
    content: ary foananao ny fivavahana eo anatrehany!
  '5':
  - type: text
    content: Fa ny helokao no manesika anao hiteny;
  - type: text
    content: ary ny lelan’ny mpamitaka no arahinao.
  '6':
  - type: text
    content: Ka ny vavanao fa tsy izaho no manameloka anao,
  - type: text
    content: ary ny molotrao ihany no miampanga anao,
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Ianao va, ry Jôba, no olombelona teraka voalohany?
  - type: text
    content: Nahita masoandro talohan’ny tendrombohitra ve ianao?
  '8':
  - type: text
    content: Nanatrika ny filan-kevitr’Andriamanitra va ianao
  - type: text
    content: no bodoinao samirery ny fahendrena?
  '9':
  - type: text
    content: Inona no fantatrao ka tsy mba fantatray?
  - type: text
    content: Inona no hainao ka mbola manavia anay?
