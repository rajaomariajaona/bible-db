document_id: JER.47,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanambaràna ny amin’ny Filistinina
  - type: text
    content: 'Hafatry ny TOMPO izay tonga tamin’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ' momba ny Filistinina'
  - type: note
    content: Momba ny Filistinina dia jereo Is 14.29 sy nta.
  - type: text
    content: ', talohan’ny hamelezan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' an’i Gazà. '
  '2':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Misy ranotrambo mipoitra avy any avaratra
  - type: note
    content: Jereo 1.14 sy nta.
  - type: text
    content: ','
  - type: text
    content: ary tonga ranon-driaka misamboaravoara
  - type: text
    content: ka manafotra ny tany sy izay rehetra eo aminy,
  - type: text
    content: dia ireo tanàna sy ny mponina ao aminy.
  - type: text
    content: Mikiakiaka ny olona;
  - type: text
    content: ary manao hira fitarainana
  - type: text
    content: ny mponina rehetra amin’ny tany.
  '3':
  - type: text
    content: Mikatrokatroka ny kitron’ireo soavaly matanjaka
  - type: text
    content: mirodorodo ny kalesy ary mikotrokotroka ny kodiarany;
  - type: text
    content: ka manadino zanaka ny ray aman-dreny
  - type: text
    content: satria efa miraviravy tanana.
  '4':
  - type: text
    content: Tonga ny andro fandravana ny Filistinina rehetra,
  - type: text
    content: hany ka tsy misy olona sisa tavela intsony
  - type: text
    content: mba hanampy an’i Tiro sy i Sidôna.
  - type: text
    content: Ravan’ny TOMPO tokoa ny Filistinina,
  - type: text
    content: dia ireo sisa velona avy any amin’ny nosy Kaftôra
  - type: note
    content: 'I Tiro sy i Sidôna: tanàn-dehibe teny amin’ny morontsiraka fenisianina. –Kaftôra: tany niavian’ny Filistinina (Ham 9.7), ary angamba ny nosy Kreta.'
  - type: text
    content: .
  '5':
  - type: text
    content: Voaharatra ny lohan’ny ao Gazà fa misaona
  - type: text
    content: ary mangina tanteraka ny ao Askelôna.
  - type: text
    content: Ianareo sisa tamingan’ny rapetonolona,
  - type: text
    content: mandra-pahoviana ianareo no hiteti-tena
  - type: note
    content: 'Voaharatra loha sy miteti-tena: jereo 16.6. –rapetonolona na Hanakita (Jos 11.22): araka ny dkt grika izany; ny RM kosa manao hoe lohasahany.'
  - type: text
    content: '?'
  '6':
  - type: text
    content: 'Hoy ianareo hoe:'
  - type: text
    content: ‹Indrisy ry sabatry ny TOMPO,
  - type: text
    content: tsy mba hiato mihitsy ve ianao?
  - type: text
    content: Midira ao anaty tranonao,
  - type: text
    content: mialà voly ka mijanòna.›
  '7':
  - type: text
    content: Ahoana moa no hiatoany?
  - type: text
    content: Ny TOMPO no manome baiko azy;
  - type: text
    content: ary hamely an’i Askelôna
  - type: text
    content: sy ny tany amoron-dranomasina
  - type: text
    content: no tanjona nanendreny azy.»
