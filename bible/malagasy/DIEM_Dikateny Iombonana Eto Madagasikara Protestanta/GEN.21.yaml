document_id: GEN.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahaterahan’i Itsehàka
  - type: text
    content: 'Nitahy an’i Sarà ny TOMPO ka notanterahiny taminy tokoa izay nampanantenainy. '
  '10':
  - type: text
    content: 'ka hoy i Sarà tamin’i Abrahama:'
  - type: text
    content: –Roahy io mpanompovavy io sy ny zanany
  - type: note
    content: Jereo Gal 4.29-30.
  - type: text
    content: ', satria tsy tokony handova miaraka amin’i Itsehàka zanako ny zanany.'
  '11':
  - type: text
    content: 'Nampalahelo an’i Abrahama loatra izany teny izany, satria zanany koa i Jismahela. '
  '12':
  - type: text
    content: 'Nefa hoy Andriamanitra tamin’i Abrahama:'
  - type: text
    content: –Aza malahelo ny amin’ny zazalahy sy ny mpanompovavinao, fa ekeo izay rehetra nolazain’i Sarà taminao; amin’ny alalan’i Itsehàka manko no hisian’ny taranaka hitondra ny anaranao
  - type: note
    content: Jereo Rom 9.71; Heb 11.18.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Kanefa ilay zanakalahin’ny mpanompovavinao koa dia hataoko tonga firenena, satria taranakao izy.
  '14':
  - type: text
    content: 'Dia nifoha vao maraina be i Abrahama ka naka mofo sy '
  - type: text
    content: siny hoditra
  - type: text
    content: ' feno rano; dia nomeny an’i Hagara izany sady napetrany teo an-tsorony, ary natolony azy koa ny zaza. Dia nalefan’i Abrahama izy mianaka ka nandeha nirenireny tao an-taniefitr’i Beera-Seba. '
  '15':
  - type: text
    content: 'Rehefa tapitra ny rano tao amin’ny siny hoditra, dia navelan’i Hagara teo am-pototry ny hazo iray ny zaza; '
  '16':
  - type: text
    content: 'dia lasa izy nipetraka tandrifiny tery lavidavitra tokony ho tratry ny zana-tsipîka, fa hoy izy anakampo hoe: «Aza hitako anie izay hahafatesan’ny zaza.» Fony nipetraka tandrifin’ny zaza izy, dia nanandra-peo nitomany. '
  '17':
  - type: text
    content: 'Nefa henon’Andriamanitra ny kiakiakan’ny zaza; koa niantso an’i Hagara avy any an-danitra ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’Andriamanitra nanao taminy hoe:'
  - type: text
    content: '–Inona no mahazo anao, ry Hagara? Aza matahotra, fa efa henon’Andriamanitra ny kiakiakan’ny zaza eo amin’ny toerany eo. '
  '18':
  - type: text
    content: Mitsangàna, ndeha areno ny zaza ka tantano; fa hataoko tonga firenena lehibe izy.
  '19':
  - type: text
    content: Dia nataon’Andriamanitra nahiratra ny mason’i Hagara, ka nahatazana lavaka fantsakana. Dia lasa izy nameno rano ny siny hoditra ary nampisotro rano ny zaza.
  '2':
  - type: text
    content: 'Dia nitoe-jaza i Sarà na dia efa antitra aza i Abrahama, ary niteraka zazalahy izy tamin’ny fotoana izay efa nambaran’Andriamanitra taminy. '
  '20':
  - type: text
    content: 'Ary nombàn’Andriamanitra ny zaza ka nihalehibe, ary nonina tany an-taniefitra ka lasa mpandefa tsipîka mahay. '
  '21':
  - type: text
    content: Nangalan-dreniny vady avy tany Ejipta izy ary nonina tao an-taniefitr’i Paràna.
  - type: heading
    content: Ny fifanekena nataon’i Abrahama sy i Abimelèka
  '22':
  - type: text
    content: 'Tamin’izany fotoana izany dia nankany amin’i Abrahama i Abimelèka, niaraka tamin’i Pikôla lehiben’ny tafiny, ka nanao taminy hoe:'
  - type: text
    content: '–Homba anao anie Andriamanitra amin’izay rehetra hataonao. '
  '23':
  - type: text
    content: Ankehitriny ianiano amin’Andriamanitra aho fa tsy hamadika ahy na ny zanako na ny taranako ianao. Fa ho tahaka ny soa izay nataoko taminao no hataonao amiko sy amin’ity tany izay ivahinianao ity.
  '24':
  - type: text
    content: 'Dia hoy i Abrahama hoe:'
  - type: text
    content: –Ianianako izany!
  '25':
  - type: text
    content: 'Ary nitarainan’i Abrahama i Abimelèka noho ilay lavaka fantsakana nalain’ireo mpanompon’i Abimelèka an-keriny. '
  '26':
  - type: text
    content: 'Fa namaly azy i Abimelèka hoe:'
  - type: text
    content: –Tsy fantatro izay nanao izany zavatra izany, ary ianao koa tsy nanambara tamiko sady izao aho vao mandre izany.
  '27':
  - type: text
    content: 'Dia naka ny ondry aman’osy sy omby i Abrahama, ka nomeny an’i Abimelèka; dia nanao fifanekena izy roa lahy. '
  '28':
  - type: text
    content: 'Ary nanavaka ondrivavy kely fito i Abrahama '
  '29':
  - type: text
    content: 'ka nanontanian’i Abimelèka hoe:'
  - type: text
    content: –Nahoana no avahanao ireo ondrivavy kely fito ireo?
  '3':
  - type: text
    content: 'Nataon’i Abrahama hoe Itsehàka ny anaran’ilay zazalahy naterak’i Sarà ho azy. '
  '30':
  - type: text
    content: 'Dia namaly i Abrahama hoe:'
  - type: text
    content: –Mba ekeo avy amin’ny tanako ireo ho vavolombelona amiko fa izaho no nandavaka ilay fantsakana.
  '31':
  - type: text
    content: Izany no niantsoana io toerana io hoe Beera-Seba, satria teo izy roa lahy no nanao fianianana
  - type: note
    content: 'Amin’ny TM dia misy tsilalaon-teny roa sosona ao amin’ny and 28-31: ny anarana hoe Beera-Seba manko dia mety midika hoe fantsakan’ny fianianana na hoe Fantsakan’ny Ondrivavy Fito.'
  - type: text
    content: .
  '32':
  - type: text
    content: Nanao fifanekena tao Beera-Seba i Abrahama sy i Abimelèka; avy eo dia niainga i Abimelèka sy i Pikôla, lehiben’ny tafiny, ka lasa niverina nankany amin’ny tanin’ny Filistinina.
  '33':
  - type: text
    content: 'Ary i Abrahama namboly hazo voamadilo tao Beera-Seba, ka teo no nivavahany tamin’ilay Andriamanitra mandrakizay sy niantsoany Azy hoe TOMPO. '
  '34':
  - type: text
    content: Naharitra ela ny fivahinian’i Abrahama tao amin’ny tanin’ny Filistinina.
  '4':
  - type: text
    content: Noforan
  - type: text
    content: ’i Abrahama i Itsehàka zanany lahy, rehefa feno valo andro araka izay efa nandidian’Andriamanitra azy
  - type: note
    content: Jereo Koa Gen 17.12; Asa 7.8.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ary efa feno zato taona i Abrahama tamin’ny nahaterahan’i Itsehàka zanany lahy. '
  '6':
  - type: text
    content: 'Dia nilaza i Sarà hoe:'
  - type: text
    content: –Nanao izay nampihomehy ahy Andriamanitra, ary izay rehetra mandre ny momba an’i Itsehàka dia hihomehy miaraka amiko
  - type: note
    content: Jereo Gen 17.19 sy nta.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Ary hoy koa izy hoe:'
  - type: text
    content: –Iza moa no afaka hilaza amin’i Abrahama fa hampinono zaza i Sarà? Kanjo niteraka zazalahy ho azy tamin’ny fahanterany aho.
  - type: heading
    content: Ny nandroahan’i Abrahama an’i Hagara sy i Jismahela
  '8':
  - type: text
    content: Rehefa lehibe ny zaza, dia nosarahi-nono. Koa nanao fanasana lehibe i Abrahama noho izany.
  '9':
  - type: text
    content: Indray andro dia hitan’i Sarà nilalao
  - type: note
    content: 'nilalao: ny LXX dia manao hoe nisangisangy tamin’i Itsehàka zanany ny zanakalahin’i Hagara... Abrahama.'
  - type: text
    content: 'ny zanakalahin’i Hagara ejiptianina, izay naterany ho an’i Abrahama; '
