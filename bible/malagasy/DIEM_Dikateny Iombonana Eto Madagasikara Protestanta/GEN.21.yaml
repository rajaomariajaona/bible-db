document_id: GEN.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Itsehàka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nitahy an’i Sarà ny TOMPO ka notanterahiny taminy tokoa izay nampanantenainy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitoe-jaza i Sarà na dia efa antitra aza i Abrahama, ary niteraka zazalahy izy tamin’ny fotoana izay efa nambaran’Andriamanitra taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nataon’i Abrahama hoe Itsehàka ny anaran’ilay zazalahy naterak’i Sarà ho azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Noforan
  - type: text
    text: ’i Abrahama i Itsehàka zanany lahy, rehefa feno valo andro araka izay efa nandidian’Andriamanitra azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Koa Gen 17.12; Asa 7.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary efa feno zato taona i Abrahama tamin’ny nahaterahan’i Itsehàka zanany lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nilaza i Sarà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nanao izay nampihomehy ahy Andriamanitra, ary izay rehetra mandre ny momba an’i Itsehàka dia hihomehy miaraka amiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 17.19 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy koa izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa no afaka hilaza amin’i Abrahama fa hampinono zaza i Sarà? Kanjo niteraka zazalahy ho azy tamin’ny fahanterany aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandroahan’i Abrahama an’i Hagara sy i Jismahela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rehefa lehibe ny zaza, dia nosarahi-nono. Koa nanao fanasana lehibe i Abrahama noho izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Indray andro dia hitan’i Sarà nilalao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nilalao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny LXX dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nisangisangy tamin’i Itsehàka zanany ny zanakalahin’i Hagara... Abrahama.
    marker-yv: yv-n
  - type: text
    text: 'ny zanakalahin’i Hagara ejiptianina, izay naterany ho an’i Abrahama; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka hoy i Sarà tamin’i Abrahama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Roahy io mpanompovavy io sy ny zanany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gal 4.29-30.
    marker-yv: yv-n
  - type: text
    text: ', satria tsy tokony handova miaraka amin’i Itsehàka zanako ny zanany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nampalahelo an’i Abrahama loatra izany teny izany, satria zanany koa i Jismahela. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa hoy Andriamanitra tamin’i Abrahama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza malahelo ny amin’ny zazalahy sy ny mpanompovavinao, fa ekeo izay rehetra nolazain’i Sarà taminao; amin’ny alalan’i Itsehàka manko no hisian’ny taranaka hitondra ny anaranao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rom 9.71; Heb 11.18.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kanefa ilay zanakalahin’ny mpanompovavinao koa dia hataoko tonga firenena, satria taranakao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nifoha vao maraina be i Abrahama ka naka mofo sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: siny hoditra
  - type: text
    text: ' feno rano; dia nomeny an’i Hagara izany sady napetrany teo an-tsorony, ary natolony azy koa ny zaza. Dia nalefan’i Abrahama izy mianaka ka nandeha nirenireny tao an-taniefitr’i Beera-Seba. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa tapitra ny rano tao amin’ny siny hoditra, dia navelan’i Hagara teo am-pototry ny hazo iray ny zaza; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia lasa izy nipetraka tandrifiny tery lavidavitra tokony ho tratry ny zana-tsipîka, fa hoy izy anakampo hoe: «Aza hitako anie izay hahafatesan’ny zaza.» Fony nipetraka tandrifin’ny zaza izy, dia nanandra-peo nitomany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa henon’Andriamanitra ny kiakiakan’ny zaza; koa niantso an’i Hagara avy any an-danitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’Andriamanitra nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona no mahazo anao, ry Hagara? Aza matahotra, fa efa henon’Andriamanitra ny kiakiakan’ny zaza eo amin’ny toerany eo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mitsangàna, ndeha areno ny zaza ka tantano; fa hataoko tonga firenena lehibe izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nataon’Andriamanitra nahiratra ny mason’i Hagara, ka nahatazana lavaka fantsakana. Dia lasa izy nameno rano ny siny hoditra ary nampisotro rano ny zaza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nombàn’Andriamanitra ny zaza ka nihalehibe, ary nonina tany an-taniefitra ka lasa mpandefa tsipîka mahay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nangalan-dreniny vady avy tany Ejipta izy ary nonina tao an-taniefitr’i Paràna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifanekena nataon’i Abrahama sy i Abimelèka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’izany fotoana izany dia nankany amin’i Abrahama i Abimelèka, niaraka tamin’i Pikôla lehiben’ny tafiny, ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Homba anao anie Andriamanitra amin’izay rehetra hataonao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ankehitriny ianiano amin’Andriamanitra aho fa tsy hamadika ahy na ny zanako na ny taranako ianao. Fa ho tahaka ny soa izay nataoko taminao no hataonao amiko sy amin’ity tany izay ivahinianao ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Abrahama hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianianako izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nitarainan’i Abrahama i Abimelèka noho ilay lavaka fantsakana nalain’ireo mpanompon’i Abimelèka an-keriny. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa namaly azy i Abimelèka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy fantatro izay nanao izany zavatra izany, ary ianao koa tsy nanambara tamiko sady izao aho vao mandre izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia naka ny ondry aman’osy sy omby i Abrahama, ka nomeny an’i Abimelèka; dia nanao fifanekena izy roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nanavaka ondrivavy kely fito i Abrahama '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ka nanontanian’i Abimelèka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no avahanao ireo ondrivavy kely fito ireo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia namaly i Abrahama hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba ekeo avy amin’ny tanako ireo ho vavolombelona amiko fa izaho no nandavaka ilay fantsakana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Izany no niantsoana io toerana io hoe Beera-Seba, satria teo izy roa lahy no nanao fianianana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny TM dia misy tsilalaon-teny roa sosona ao amin’ny and 28-31: ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Beera-Seba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' manko dia mety midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fantsakan’ny fianianana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Fantsakan’ny Ondrivavy Fito.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nanao fifanekena tao Beera-Seba i Abrahama sy i Abimelèka; avy eo dia niainga i Abimelèka sy i Pikôla, lehiben’ny tafiny, ka lasa niverina nankany amin’ny tanin’ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary i Abrahama namboly hazo voamadilo tao Beera-Seba, ka teo no nivavahany tamin’ilay Andriamanitra mandrakizay sy niantsoany Azy hoe TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Naharitra ela ny fivahinian’i Abrahama tao amin’ny tanin’ny Filistinina.
