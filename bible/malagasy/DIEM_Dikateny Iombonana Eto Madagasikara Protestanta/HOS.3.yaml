document_id: HOS.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vidin’ny fampihavanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy ny TOMPO tamiko: «Mandehana indray ka tiava io vehivavy izay tiavin’ny lehilahy sakaizany io sady tena mpanitsakitsa-bady. Tiavo izy tahaka ny itiavako ny Israelita, na dia mihodina ho amin’ny andriamani-kafa aza izy sady tia ampempam-boaloboka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampempam-boaloboka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampiasaina amin’ny fanompoam-pivavahan’ny hafa firenena; jereo Is 6.7. ary ampit Jer 7.18; 44.19.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa novidiko sekela volafotsy dimy ambin’ny folo sy ôrza enin-jato litatra ny vadiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy aho taminy: «Mandritra ny andro maromaro dia hijanona ato an-tranoko ianao, ka tsy hivaro-tena na hanitsakitsaka ahy amin’ny olon-kafa intsony. Izaho koa ho toy izany aminao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa andro maro no hijanonan’ny Israelita tsy hana-mpanjaka na filoha, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' na tsangam-bato, efôda na terafîma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aorian’izany ny Israelita dia hitady indray ny TOMPO Andriamaniny sy i Davida mpanjakany, ka hiverina amin-kovitra amin’ny TOMPO sy ireo zava-tsoany amin’ny hoavy.
