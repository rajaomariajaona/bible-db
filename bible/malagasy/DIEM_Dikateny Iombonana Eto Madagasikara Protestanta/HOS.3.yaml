document_id: HOS.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vidin’ny fampihavanana
  - type: text
    content: 'Hoy ny TOMPO tamiko: «Mandehana indray ka tiava io vehivavy izay tiavin’ny lehilahy sakaizany io sady tena mpanitsakitsa-bady. Tiavo izy tahaka ny itiavako ny Israelita, na dia mihodina ho amin’ny andriamani-kafa aza izy sady tia ampempam-boaloboka'
  - type: note
    content: 'Ampempam-boaloboka: ampiasaina amin’ny fanompoam-pivavahan’ny hafa firenena; jereo Is 6.7. ary ampit Jer 7.18; 44.19.'
  - type: text
    content: '.» '
  '2':
  - type: text
    content: 'Koa novidiko sekela volafotsy dimy ambin’ny folo sy ôrza enin-jato litatra ny vadiko. '
  '3':
  - type: text
    content: 'Ary hoy aho taminy: «Mandritra ny andro maromaro dia hijanona ato an-tranoko ianao, ka tsy hivaro-tena na hanitsakitsaka ahy amin’ny olon-kafa intsony. Izaho koa ho toy izany aminao.»'
  '4':
  - type: text
    content: 'Koa andro maro no hijanonan’ny Israelita tsy hana-mpanjaka na filoha, '
  - type: text
    content: sorona
  - type: text
    content: ' na tsangam-bato, efôda na terafîma. '
  '5':
  - type: text
    content: Aorian’izany ny Israelita dia hitady indray ny TOMPO Andriamaniny sy i Davida mpanjakany, ka hiverina amin-kovitra amin’ny TOMPO sy ireo zava-tsoany amin’ny hoavy.
