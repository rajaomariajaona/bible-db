document_id: JER.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Feno 23 taona nitorian-teny i Jeremià
  - type: text
    content: Nisy hafatra azon’i Jeremià ho an’ny vahoaka rehetra ao Joda tamin’ny taona fahefatra nanjakan’i Jôiakima, zanakalahin’i Jôsià sady mpanjakan’i Joda
  - type: note
    content: 'nanjakan’i Jôiakima: jereo 22.13 sy nta. –taona fahefatra: tamin’ny taona 605 tal J.K.; ampit Dan 1.1-2.'
  - type: text
    content: ', dia ny taona voalohany nanjakan’i Nebokadnetsara, mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Hofoanako tsy hisy eo aminareo ny tabataban’ny fety, ny horakora-pifaliana sy ny hiran’ny mpanambady, ny fidilotry ny '
  - type: text
    content: vato fikoseham-bary
  - type: text
    content: ' ary ny fahazavan’ny jiro'
  - type: note
    content: Jereo Jer 7.34 sy nta.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Ho rava sy hampahonena ny tany manontolo ary hanompo ny mpanjakan’i Babilôna mandritra ny fitopolo taona
  - type: note
    content: Jereo 2 Tan 36.21; Jer 29.10; Dan 9.2.
  - type: text
    content: ' ny firenen-kafa rehetra.'
  '12':
  - type: text
    content: 'Rehefa tapitra ny fitopolo taona, dia hirotsaka an-tsehatra Aho hamaly an’i Nebokadnetsara sy ny vahoakany noho ny helony, hamely ny taniny Aho ka hanao azy ho taniefitra rava mandrakizay. Teny hentitra avy amiko TOMPO izany. '
  '13':
  - type: text
    content: 'Hataoko mihatra amin’izany tany izany ny loza rehetra izay efa nolazaiko. Voasoratra ao anatin’ity boky ity ireny, dia araka izay efa nambaran’ny mpaminany Jeremià ny amin’ny firenena rehetra. '
  '14':
  - type: text
    content: Anjaran’ny Babilônianina kosa amin’izay ny hanompo firenen-dehibe sy mpanjaka mahery. Havaliko azy ny ratsy rehetra nataony.
  - type: heading
    content: Famaizana ho an’ny firenen-drehetra
  '15':
  - type: text
    content: 'Izao no voalazan’ny TOMPO Andriamanitr’i Israely tamiko: «Raiso etỳ an-tanako ity tsangambava izay feno ny divaim-pahatezerako ity, ka ampisotroy ny firenena rehetra izay anirahako anao. '
  '16':
  - type: text
    content: Hisotroany anie izany ka hampivembena sy hahavery saina azy eo anoloan’ny fandringanana izay halefako eo anivony.»
  '17':
  - type: text
    content: 'Dia noraisiko ny tsangambava izay teny an-tanan’ny TOMPO, ary nampisotroiko ny firenena rehetra izay nanirahan’ny TOMPO ahy. '
  '18':
  - type: text
    content: I Jerosalema sy ireo tanànan’i Joda mbamin’ireo mpanjaka sy mpanapaka teo aminy no nanombohako izany mba hahatonga ireo toerana ireo ho rava ka hampahonena sy hampivarahontsana ary ho tonga oha-panozonana, araka izao toe-javatra ankehitriny izao.
  '19':
  - type: text
    content: 'Dia tonga ny anjaran’ny firenen-kafa:'
  - type: text
    content: '–Ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta sy ireo tandapany ary ny mpifehiny mbamin’ny vahoakany rehetra, '
  '2':
  - type: text
    content: 'Ka hoy i Jeremià mpaminany tamin’ny vahoaka rehetra ao Joda sy ny mponina rehetra tao Jerosalema:'
  '20':
  - type: text
    content: miaraka amin’ireo firenena madinika samihafa monina any Ejipta;
  - type: text
    content: –ireo mpanjaka rehetra amin’ny tany Hotsy
  - type: note
    content: Ao atsimon’ny Ranomasina Maty, ao amin’ny tanin’i Edôma no nisy an’i Hotsy.
  - type: text
    content: ;
  - type: text
    content: '–ireo mpanjaka rehetra amin’ny tanin’ny Filistinina: dia ny tao Askelôna sy tao Gazà sy tao Hekrôna ary tao amin’ny faritra sisa eo Asdôda;'
  '21':
  - type: text
    content: –ny Edômita sy ny Môabita ary ny Hamônita;
  '22':
  - type: text
    content: –ireo mpanjaka rehetra tao Tiro sy tao Tsidôna ary tao amin’ny tany amorontsiraka any ampitan-dranomasina any;
  '23':
  - type: text
    content: –ny mponina any Dedàna sy Temà ary Bozỳ mbamin’ireo olona rehetra mpiharatra fihirifana
  - type: note
    content: 'Dedàna, Temà, Bozỳ: saha lonaka mitsitokotoko any Arabia. –mpiharatra fihirifana: jereo 9.25.'
  - type: text
    content: ;
  '24':
  - type: text
    content: –ireo mpanjaka rehetra any Arabia sy any amin’ireo foko samihafa monina any an-taniefitra;
  '25':
  - type: text
    content: –ireo mpanjaka rehetra any Zimrỳ
  - type: note
    content: 'Zimrỳ: tany tsy fantatra mazava, fa misy mihevitra azy ho tanin’ny Simerianina na Armenia.'
  - type: text
    content: ' sy any Helama ary any Media;'
  '26':
  - type: text
    content: –ireo mpanjaka rehetra any avaratra, na ny lavitra na ny akaiky.
  - type: text
    content: Izany hoe ny fanjakana rehetra teto amin’izao tontolo izao, manerana ny velaran-tany, dia samy tsy maintsy nisotro tsirairay tamin’izany tsangambava feno ny divaim-pahatezeran’ny Tompo izany; ary ny mpanjakan’i Sesàka
  - type: note
    content: 'Sesàka: mety ho fanoratana an-kolaka amin’ny teny hebreo ny anaran’i Babilôna.'
  - type: text
    content: ' no nisotro namarana azy.'
  '27':
  - type: text
    content: 'Nanafatra ahy ny Tompo hilaza amin’izy rehetra hoe: «Izao no lazain’ny TOMPOn’izao rehetra izao, Andriamanitr’i Israely: Misotroa ianareo ka mimamoa sy mandoava ary mianjerà amin’ny tany mihitsy; ka tsy ho tafarina intsony ianareo noho ny fandringanana izay halefako eo anivonareo.» '
  '28':
  - type: text
    content: 'Ary nampiany hoe: «Raha misy mandà tsy hisotro amin’ny tsangambava izay atolotrao azy, dia ilazao hoe: Izany no baikon’ny TOMPOn’izao rehetra izao ka tsy maintsy misotro ianareo. '
  '29':
  - type: text
    content: Ireo tanàna izay natokana ho Ahy aza no nanombohako nandefasana loza, ka ianareo ve no hataoko afa-maina? Tsia, tsy hataoko afa-maina ianareo, fa hiantso sabatra hamely ny mponina rehetra eo amin’ny tany Aho. Izany no teny hentitra avy amiko TOMPOn’izao rehetra izao.»
  '3':
  - type: text
    content: '«Manomboka amin’ny taona faha-13 nanjakan’i Jôsià, zanakalahin’i Amôna sady mpanjakan’i Joda, ka mandraka androany, izany hoe efa 23 taona izao, no nanambarako sy namerimberenako taminareo ny hafatra nampitondrain’ny TOMPO ahy, nefa tsy nihaino ianareo. '
  '30':
  - type: text
    content: 'Ary hoy koa ny Tompo tamiko:'
  - type: text
    content: '«Ijoroy ny maha-mpaminany anao ny amin’ireo mpanjaka rehetra ireo araka ny teny voalazako teo ka ampio hoe:'
  - type: text
    content: Avy any ambony any ny TOMPO no manerona,
  - type: text
    content: avy ao amin’ny fonenany masina Izy no manandra-peo.
  - type: text
    content: Eny, manerona mafy amin’ny toeram-pitsaharany Izy
  - type: text
    content: ka mihorakoraka toy ny mpanosihosy voaloboka.
  '31':
  - type: text
    content: Tonga amin’ny mponina rehetra amin’ny tany
  - type: text
    content: izany feo mitrena ataon’ny Tompo izany,
  - type: text
    content: ary tafapaka hatrany amin’ny faran’ny tany.
  - type: text
    content: Manana ady atao amin’ireo firenena ny TOMPO
  - type: text
    content: ka miantso ny olona rehetra ho eo amin’ny fitsarana.
  - type: text
    content: Izay olon-dratsy dia hatolony haringana.
  - type: text
    content: Izany no teny hentitry ny TOMPO.»
  '32':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Indro miainga ao amin’ny firenena iray ny loza
  - type: text
    content: ka mihanaka any amin’ny firenena hafa;
  - type: text
    content: misy tafio-drivotra mahery
  - type: text
    content: mipoitra avy any am-paran’ny tany.»
  '33':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: manomboka amin’ny tendron-tany ankilany
  - type: text
    content: ka hatrany amin’ny tendron-tany andaniny,
  - type: text
    content: izay nasian’ny TOMPO ho faty dia tsy hisaonana;
  - type: text
    content: tsy hangonina na halevina izy ireny,
  - type: text
    content: fa ho tonga zezika eo amin’ny velaran-tany.
  '34':
  - type: text
    content: Midradradradrà, ianareo mpitondra,
  - type: text
    content: manaova antsoantsom-pitarainana;
  - type: text
    content: mihosinkosena amin’ny tany,
  - type: text
    content: ianareo mpiandraikitra andian’ondry,
  - type: text
    content: fa tonga ny andro hamonoana anareo ho faty!
  - type: text
    content: Hataoko montsamontsana ianareo,
  - type: text
    content: ka ho toy ny fanaka sarobidy nianjera.
  '35':
  - type: text
    content: Tsy manan-kisitrihana intsony ny mpitondra;
  - type: text
    content: tsy manan-kialofana ny mpiandraikitra andian’ondry.
  '36':
  - type: text
    content: Reko ny antsoantsom-pitarainany
  - type: text
    content: sy ny fidradradradrana ataony,
  - type: text
    content: satria efa simban’ny TOMPO
  - type: text
    content: ireo kijana fiandrasany.
  '37':
  - type: text
    content: Nirehitra ny hatezeran’ny TOMPO
  - type: text
    content: dia gina ilay kijana niadanana.
  '38':
  - type: text
    content: Tahaka ny liona tanora
  - type: text
    content: nandao ny kirihitra fiereny
  - type: text
    content: no fahalasanan’ireo mpitondra
  - type: text
    content: Efa tonga lao ny taniny
  - type: text
    content: satria mahatsiravina ny ady
  - type: text
    content: ary mirehitra ny hatezeran’ny Tompo.
  '4':
  - type: text
    content: 'Tsy nitsahatra naniraka ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpanompony'
  - type: note
    content: Jereo 7.25 sy nta.
  - type: text
    content: ' tany aminareo ny TOMPO nefa tsy nihaino na niraharaha akory ianareo. '
  '5':
  - type: text
    content: 'Hoy Izy taminareo: «Samia miala amin’ny fitondrantena sy fanao ratsiny avy ianareo, dia haveriko honina ao amin’ny tany izay nomeko anareo sy ny razanareo hatrizay ka ho mandrakizay ianareo. '
  '6':
  - type: text
    content: 'Aza mifikitra amin’ireo andriamani-kafa hivavaka aminy na hiankohoka eo anatrehany, ary aza mampahatezitra Ahy amin’ny fanaovana sampy; dia tsy hahatonga loza aminareo Aho. '
  '7':
  - type: text
    content: Nefa tsy nihaino Ahy ianareo, hoy ny teny hentitra avy amiko TOMPO; fa vao mainka aza nampahatezitra Ahy tamin’ny fanaovana sampy mba hahatonga loza aminareo.»
  '8':
  - type: text
    content: 'Koa izao no lazain’ny TOMPOn’izao rehetra izao: «Satria tsy nihaino ny teniko ianareo, '
  '9':
  - type: text
    content: dia hampaniraka haka ireo fokom-pirenena rehetra any avaratra Aho
  - type: note
    content: Jereo 1.14 sy nta.
  - type: text
    content: ', ary hiantso an’i Nebokadnetsara mpanjakan’i Babilôna sady mpanompoko. Hasaiko tonga izy hamely ity tany ity sy ny mponina eo ary koa hamely ireto firenena rehetra manodidina anareo ireto; samy haringako tokoa ireo ka hampahonena sy hampivarahontsana ary ho tonga oha-pandatsana mandrakizay. Teny hentitra avy amiko TOMPO izany. '
