document_id: JER.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Feno 23 taona nitorian-teny i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nisy hafatra azon’i Jeremià ho an’ny vahoaka rehetra ao Joda tamin’ny taona fahefatra nanjakan’i Jôiakima, zanakalahin’i Jôsià sady mpanjakan’i Joda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nanjakan’i Jôiakima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 22.13 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: taona fahefatra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tamin’ny taona 605 tal J.K.; ampit Dan 1.1-2.'
    marker-yv: yv-n
  - type: text
    text: ', dia ny taona voalohany nanjakan’i Nebokadnetsara, mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka hoy i Jeremià mpaminany tamin’ny vahoaka rehetra ao Joda sy ny mponina rehetra tao Jerosalema:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Manomboka amin’ny taona faha-13 nanjakan’i Jôsià, zanakalahin’i Amôna sady mpanjakan’i Joda, ka mandraka androany, izany hoe efa 23 taona izao, no nanambarako sy namerimberenako taminareo ny hafatra nampitondrain’ny TOMPO ahy, nefa tsy nihaino ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy nitsahatra naniraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' mpanompony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 7.25 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' tany aminareo ny TOMPO nefa tsy nihaino na niraharaha akory ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy Izy taminareo: «Samia miala amin’ny fitondrantena sy fanao ratsiny avy ianareo, dia haveriko honina ao amin’ny tany izay nomeko anareo sy ny razanareo hatrizay ka ho mandrakizay ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aza mifikitra amin’ireo andriamani-kafa hivavaka aminy na hiankohoka eo anatrehany, ary aza mampahatezitra Ahy amin’ny fanaovana sampy; dia tsy hahatonga loza aminareo Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nefa tsy nihaino Ahy ianareo, hoy ny teny hentitra avy amiko TOMPO; fa vao mainka aza nampahatezitra Ahy tamin’ny fanaovana sampy mba hahatonga loza aminareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa izao no lazain’ny TOMPOn’izao rehetra izao: «Satria tsy nihaino ny teniko ianareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: dia hampaniraka haka ireo fokom-pirenena rehetra any avaratra Aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.14 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ary hiantso an’i Nebokadnetsara mpanjakan’i Babilôna sady mpanompoko. Hasaiko tonga izy hamely ity tany ity sy ny mponina eo ary koa hamely ireto firenena rehetra manodidina anareo ireto; samy haringako tokoa ireo ka hampahonena sy hampivarahontsana ary ho tonga oha-pandatsana mandrakizay. Teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hofoanako tsy hisy eo aminareo ny tabataban’ny fety, ny horakora-pifaliana sy ny hiran’ny mpanambady, ny fidilotry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vato fikoseham-bary
  - type: text
    text: ' ary ny fahazavan’ny jiro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jer 7.34 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ho rava sy hampahonena ny tany manontolo ary hanompo ny mpanjakan’i Babilôna mandritra ny fitopolo taona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Tan 36.21; Jer 29.10; Dan 9.2.
    marker-yv: yv-n
  - type: text
    text: ' ny firenen-kafa rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa tapitra ny fitopolo taona, dia hirotsaka an-tsehatra Aho hamaly an’i Nebokadnetsara sy ny vahoakany noho ny helony, hamely ny taniny Aho ka hanao azy ho taniefitra rava mandrakizay. Teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hataoko mihatra amin’izany tany izany ny loza rehetra izay efa nolazaiko. Voasoratra ao anatin’ity boky ity ireny, dia araka izay efa nambaran’ny mpaminany Jeremià ny amin’ny firenena rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Anjaran’ny Babilônianina kosa amin’izay ny hanompo firenen-dehibe sy mpanjaka mahery. Havaliko azy ny ratsy rehetra nataony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famaizana ho an’ny firenen-drehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no voalazan’ny TOMPO Andriamanitr’i Israely tamiko: «Raiso etỳ an-tanako ity tsangambava izay feno ny divaim-pahatezerako ity, ka ampisotroy ny firenena rehetra izay anirahako anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hisotroany anie izany ka hampivembena sy hahavery saina azy eo anoloan’ny fandringanana izay halefako eo anivony.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia noraisiko ny tsangambava izay teny an-tanan’ny TOMPO, ary nampisotroiko ny firenena rehetra izay nanirahan’ny TOMPO ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I Jerosalema sy ireo tanànan’i Joda mbamin’ireo mpanjaka sy mpanapaka teo aminy no nanombohako izany mba hahatonga ireo toerana ireo ho rava ka hampahonena sy hampivarahontsana ary ho tonga oha-panozonana, araka izao toe-javatra ankehitriny izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia tonga ny anjaran’ny firenen-kafa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' mpanjakan’i Ejipta sy ireo tandapany ary ny mpifehiny mbamin’ny vahoakany rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: miaraka amin’ireo firenena madinika samihafa monina any Ejipta;
- type: usfm
  marker: p
  children:
  - type: text
    text: –ireo mpanjaka rehetra amin’ny tany Hotsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ao atsimon’ny Ranomasina Maty, ao amin’ny tanin’i Edôma no nisy an’i Hotsy.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: p
  children:
  - type: text
    text: '–ireo mpanjaka rehetra amin’ny tanin’ny Filistinina: dia ny tao Askelôna sy tao Gazà sy tao Hekrôna ary tao amin’ny faritra sisa eo Asdôda;'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: –ny Edômita sy ny Môabita ary ny Hamônita;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: –ireo mpanjaka rehetra tao Tiro sy tao Tsidôna ary tao amin’ny tany amorontsiraka any ampitan-dranomasina any;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: –ny mponina any Dedàna sy Temà ary Bozỳ mbamin’ireo olona rehetra mpiharatra fihirifana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dedàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Temà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bozỳ:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: saha lonaka mitsitokotoko any Arabia. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: mpiharatra fihirifana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 9.25.'
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: –ireo mpanjaka rehetra any Arabia sy any amin’ireo foko samihafa monina any an-taniefitra;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: –ireo mpanjaka rehetra any Zimrỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zimrỳ: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tany tsy fantatra mazava, fa misy mihevitra azy ho tanin’ny Simerianina na Armenia.
    marker-yv: yv-n
  - type: text
    text: ' sy any Helama ary any Media;'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: –ireo mpanjaka rehetra any avaratra, na ny lavitra na ny akaiky.
- type: usfm
  marker: p
  children:
  - type: text
    text: Izany hoe ny fanjakana rehetra teto amin’izao tontolo izao, manerana ny velaran-tany, dia samy tsy maintsy nisotro tsirairay tamin’izany tsangambava feno ny divaim-pahatezeran’ny Tompo izany; ary ny mpanjakan’i Sesàka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sesàka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho fanoratana an-kolaka amin’ny teny hebreo ny anaran’i Babilôna.
    marker-yv: yv-n
  - type: text
    text: ' no nisotro namarana azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nanafatra ahy ny Tompo hilaza amin’izy rehetra hoe: «Izao no lazain’ny TOMPOn’izao rehetra izao, Andriamanitr’i Israely: Misotroa ianareo ka mimamoa sy mandoava ary mianjerà amin’ny tany mihitsy; ka tsy ho tafarina intsony ianareo noho ny fandringanana izay halefako eo anivonareo.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nampiany hoe: «Raha misy mandà tsy hisotro amin’ny tsangambava izay atolotrao azy, dia ilazao hoe: Izany no baikon’ny TOMPOn’izao rehetra izao ka tsy maintsy misotro ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ireo tanàna izay natokana ho Ahy aza no nanombohako nandefasana loza, ka ianareo ve no hataoko afa-maina? Tsia, tsy hataoko afa-maina ianareo, fa hiantso sabatra hamely ny mponina rehetra eo amin’ny tany Aho. Izany no teny hentitra avy amiko TOMPOn’izao rehetra izao.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy koa ny Tompo tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '«Ijoroy ny maha-mpaminany anao ny amin’ireo mpanjaka rehetra ireo araka ny teny voalazako teo ka ampio hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy any ambony any ny TOMPO no manerona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy ao amin’ny fonenany masina Izy no manandra-peo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manerona mafy amin’ny toeram-pitsaharany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihorakoraka toy ny mpanosihosy voaloboka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tonga amin’ny mponina rehetra amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany feo mitrena ataon’ny Tompo izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tafapaka hatrany amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manana ady atao amin’ireo firenena ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miantso ny olona rehetra ho eo amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay olon-dratsy dia hatolony haringana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitry ny TOMPO.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro miainga ao amin’ny firenena iray ny loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihanaka any amin’ny firenena hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy tafio-drivotra mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: mipoitra avy any am-paran’ny tany.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manomboka amin’ny tendron-tany ankilany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatrany amin’ny tendron-tany andaniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nasian’ny TOMPO ho faty dia tsy hisaonana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hangonina na halevina izy ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho tonga zezika eo amin’ny velaran-tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Midradradradrà, ianareo mpitondra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manaova antsoantsom-pitarainana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihosinkosena amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo mpiandraikitra andian’ondry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tonga ny andro hamonoana anareo ho faty!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko montsamontsana ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho toy ny fanaka sarobidy nianjera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tsy manan-kisitrihana intsony ny mpitondra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy manan-kialofana ny mpiandraikitra andian’ondry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Reko ny antsoantsom-pitarainany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fidradradradrana ataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa simban’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo kijana fiandrasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Nirehitra ny hatezeran’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia gina ilay kijana niadanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tahaka ny liona tanora
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandao ny kirihitra fiereny
- type: usfm
  marker: q1
  children:
