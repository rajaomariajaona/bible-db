document_id: EZK.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hotsaraina noho ny helony i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ningain’ny Fanahin’ny Tompo aho ka nentiny hankeo amin’ilay vavahady atsinanana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '. Tazako teo anilan’ny fidirana ny lehilahy 25 ka anisan’ireny ireo roalahy lehiben’ny vahoaka, dia i Jazanià zanakalahin’i Hazora, sy i Pelatià zanakalahin’i Benaià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy ny Fanahy tamiko: «Ry ilay taranak’olombelona, ireo no lehilahy manomana asa ratsy sy manolo-tsaina mandoza eto Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lazainy hoe: ‹Tsy hanorenana trano intsony eto ao anatin’ny fotoana elaela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsy hanorenana... fotoana elaela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moa tsy efa akaiky va ny hanorenan-trano?
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Toa hoatry ny manamafy eto izany fa aleo mijanona ao Jerosalema ho voaaro kokoa toy izay ho lasan-ko babo (io sary io dia averina eo amin’ny 24.3-5).'
    marker-yv: yv-n
  - type: text
    text: '! Fa ho toy ny vilany ity tanàna ity ary isika no ho hena tahirizina ao anatiny.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa ianao, ry ilay taranak’olombelona, ijoroy ny maha-
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anao, eny, ijoroy ny maha-mpaminany anao mba hanohitra azy.».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nilatsaka tamiko ny Fanahin’ny TOMPO ka nandidy ahy hanambara hoe: «Izao no lazain’ny TOMPO: Fantatro izay teneninareo, ry olon’i Israely, fantatro ny eritreritra tonga ao an-tsainareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Efa nahafaty olona maro teto amin’ity tanàna ity ianareo; ary namenoanareo ny lalambe ny fatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa hoy Izaho Tompo ANDRIANANAHARY aminareo: toy ny vilany ity tanàna ity, ary ny hena dia ireo efa novonoinareo ho faty teo anivony. Ianareo kosa anefa dia horoahiko tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Matahotra ny ady ve ianareo? Raha izany, dia halefako aminareo ny ady. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Horoahiko hiala amin’ity tanàna ity ianareo, ka hatolotro ho eo an-tanàn’ny firenen-kafa; ary hotanterahiko ny didim-pitsarako ny aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hampihariko aminareo ny fitsarako ato anatin’ny faritr’i Israely, ka hovonoiko ho faty amin’ny ady ianareo. Amin’izay dia hoekenareo fa Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy ho toy ny vilany ho anareo ity tanàna ity ary tsy ho toy ny hena tahirizina ao anatiny ianareo; fa hampihariko aminareo ny fitsarako ato anatin’ny faritr’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amin’izay dia hoekenareo fa Izaho no TOMPO Izay tsy nankatoavinareo lalàna sy tsy narahinareo fitsipika, satria nanaraka ny fomban’ireo firenena nanodidina ianareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha mbola nampita izany faminaniana izany aho, dia maty i Pelatià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny fahafatesan’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pelatià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: voaavotr’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia fambara loza ho an’ny Israelita rehetra izay afaka tamin’ny fahababoana.'
    marker-yv: yv-n
  - type: text
    text: ' zanakalahin’i Benaià. Koa nianjera nihohoka tamin’ny tany aho ary niantso mafy hoe: «Adray, ry Tompo ANDRIANANAHARY ô, haringanao avokoa ve ny Israelita sisa?»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hangonin’Andriamanitra ireo Israelita niely patrana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Ry ilay taranak’olombelona, ny mpiray firenena aminao, ireo havanao israelita rehetra atỳ, dia ilazan’ny mponina eto Jerosalema izao torohevitra izao: ‹Mijanòna lavitry ny TOMPO any ianareo, satria izahay no nomeny ity tany ity ho fanananay›. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Noho izany, ambarao amin’ireo namanao babo fa izao no lazain’ny Tompo ANDRIANANAHARY: «Na dia nalefako any an-tany lavitra sy naeliko any anivon’ny firenen-kafa aza ianareo, dia manatrika anareo Aho tahaka ny ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tahaka ny ao amin’ny Toeramasina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ninoana fa ny fanatrehan’Andriamanitra dia nifamatotra tamin’ny Toeramasina iray, indrindra tamin’ny tempolin’i Jerosalema. Ny bokin’i Ezekiela mpaminany kosa dia milaza ny mifanohitra amin’izany, jereo 1.26-28; 10.18-19; 11.22-25.
    marker-yv: yv-n
  - type: text
    text: ' ihany.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ambarao aminy koa fa izao no lazain’ny Tompo ANDRIANANAHARY: «Hangoniko avy any amin’ny firenena sy ny tany izay nanelezako anareo ianareo, ka homeko ny tanin’i Israely indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa tafaverina any ianareo, dia hanaisotra ny fanao mahatsiravina sy maharikoriko rehetra momba ny fanompoan-tsampy izay misy ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Homeko fo iray ihany ianareo rehetra, ary hametrahako fanahy vaovao ao anatinareo; hoesoriko aminareo ny fo tsy miraika toy ny vato ka hosoloiko fo mora anarina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin’izay dia hizotra araka ny lalànako rehetra ianareo ary hitandrina ny fitsipiko ka hampihatra azy, dia ho vahoakako ianareo ary Izaho ho Andriamanitrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'And 19-20: jereo 36.26-28.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ho an’izay manana fo mirona amin’ny fanao mahatsiravina sy maharikoriko momba ny fanompoan-tsampy dia hataoko mivesatra ny vokatry ny fitondrantenany izy. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miala ao Jerosalema ny voninahitry ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nikopaka elatra ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ', dia niara-nihetsika taminy koa ireo kodiarana, ary namirapiratra teo amboniny ny voninahitr’ilay Andriamanitr’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Avy eo dia niakatra niala teo afovoan’ny tanàna ny voninahitry ny TOMPO ka nijanona teo amin’ilay tendrombohitra atsinanan’i Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia tsaroako ho ningain’ny Fanahin’Andriamanitra aho, ka naveriny ho eo anilan’ireo babo tany Babilôna. Tamin’izay dia nitsahatra ny fahitana azoko; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ary notantaraiko tamin’ireo babo ny zavatra rehetra nasehon’ny TOMPO ahy.
