document_id: LEV.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Aretin-koditra isan-karazany eo amin’ny olona
  - type: text
    content: 'Dia niteny tamin’i Mosesy sy i Aharôna ny TOMPO nanao hoe:'
  '10':
  - type: text
    content: 'Hozahan’ny mpisorona ilay olona; ka raha hitany fa misy pentina mamontsina fotsy eo amin’ny hodiny sady efa niova ho fotsy ny volo eo amin’io pentina io ary misy nofo mangenahena mipoitra koa eo, '
  '11':
  - type: text
    content: dia habokana efa ela teo amin’ny hodi-nofo izany, ka hambaran’ny mpisorona hoe maloto ilay marary; tsy hatokany toerana akory izy, satria efa maloto
  - type: note
    content: Ampit and 4-5.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Mety ho ny hoditra manontolo mihitsy no efa ielezan’ny habokana ka henika azy hatreo antampon-doha ka hatrany am-paladia, araka izay faritra rehetra taza-mason’ny mpisorona; '
  '13':
  - type: text
    content: 'dia hozahany akaiky ilay marary ka raha hitany fa manenika ny tenany manontolo ny habokana, dia hambarany hoe madio izy. Madio tokoa ilay olona satria efa niova ho fotsy avokoa ny hodiny. '
  '14':
  - type: text
    content: 'Fa amin’ny andro hahitana nofo mangenahena miseho eo aminy, dia hanjary maloto izy; '
  '15':
  - type: text
    content: 'ary rehefa voazahan’ny mpisorona io nofo mangenahena io, dia hambarany hoe maloto ilay olona; maloto manko ny nofo mangenahena fa habokana izany. '
  '16':
  - type: text
    content: 'Raha niova kosa ny nofo mangenahena ka tonga fotsy, dia hankeo amin’ny mpisorona indray ilay olona; '
  '17':
  - type: text
    content: hozahan’ny mpisorona izy, ka raha hitany fa tonga fotsy tokoa ny faritra nisy fery, dia hambaran’ny mpisorona hoe madio ilay fery na madio koa ilay olona.
  '18':
  - type: text
    content: '«Raha misy olona manam-pery sitrana eo amin’ny hodiny, '
  '19':
  - type: text
    content: 'nefa isehoana pentina mamontsina fotsy na pentina somary menamena eo amin’ilay hola-pery, dia hiseho amin’ny mpisorona izy. '
  '2':
  - type: text
    content: '«Raha misy faritra mamontsina na faritra manakopery na pentina mangirana eo amin’ny hodi-nofon’ny olona, ka manjary aretina miendrika '
  - type: text
    content: habokana
  - type: text
    content: ' izany'
  - type: note
    content: Ny voambolana hebreo dia tsy manondro fotsiny ny habokana fa ny aretin-koditra isan-karazany ka ny mpisorona no manombana ny hamafiny. Na dia tsy misy fampiasana mivantana ny voambolana aza, dia aretin-koditra toy izany no midona amin’i Jôba (2.7) sy ilay mpamorona ny Salamo 38. Io voambolana io ihany no iantsoana ny bobongolo amin’ny fitafiana 13.47-59 sy amin’ny rindrin-trano (14.33-53).
  - type: text
    content: ', dia hoentina ilay olona ho eo amin’i Aharôna mpisorona na ho eo amina mpisorona anankiray anisan’ny taranany. '
  '20':
  - type: text
    content: 'Hozahan’ny mpisorona izy; ka raha hitany fa mandoaka hoditra ilay pentina sady efa niova ho fotsy ny volo eo, dia hambaran’ny mpisorona hoe maloto ilay olona, fa aretina miendrika habokana no efa mipoipoitra eo amin’ny hola-pery. '
  '21':
  - type: text
    content: 'Raha voazahan’ny mpisorona kosa ilay olona, ka hitany fa tsy mandoaka hoditra sady matromatroka ihany ilay pentina ary tsy misy volo fotsy eo, dia hatokany toerana izy mandritra ny fito andro; '
  '22':
  - type: text
    content: 'aorian’izany, raha nanitatra tokoa teo amin’ny hoditra ilay pentina, vao hambaran’ny mpisorona hoe maloto ilay olona fa habokana izany. '
  '23':
  - type: text
    content: Raha tsy niova sady tsy nanitatra kosa ilay pentina, dia hola-pery ihany izany, ary hambaran’ny mpisorona hoe madio ilay olona.
  '24':
  - type: text
    content: '«Raha misy olona main’ny afo eo amin’ny hodiny ka iforonana pentina somary menamena na pentina fotsy mangirana eo amin’ny faritra may, '
  '25':
  - type: text
    content: 'dia hozahan’ny mpisorona izany. Raha hitany fa mandoaka hoditra ilay pentina sady efa niova ho fotsy ny volo eo, dia habokana efa mipoipoitra eo amin’ny faritra may izany; ka hambaran’ny mpisorona hoe maloto ilay olona, fa aretina miendrika habokana izany. '
  '26':
  - type: text
    content: 'Raha voazahan’ny mpisorona kosa izy, ka hitany fa tsy mandoaka hoditra sady matromatroka ihany ilay pentina ary tsy misy hoditra sady matromatroka ihany ilay pentina ary tsy misy fotsy ny volo eo, dia hatokan’ny mpisorona toerana mandritra ny fito andro ilay olona. '
  '27':
  - type: text
    content: 'Hozahan’ny mpisorona izy amin’ny andro fahafito; ka raha hitany fa manitatra tokoa ilay pentina teo amin’ny hoditra, dia hambarany hoe maloto ilay olona fa aretina miendrika habokana izany. '
  '28':
  - type: text
    content: Raha tsy niova sady tsy nanitatra kosa ilay pentina fotsy teo amin’ny hoditra, fa nihamatromatroka, dia pentina mamontsina eo amin’ny faritra may izany; ary hambaran’ny mpisorona hoe madio ilay olona fa holatry ny faritra may ihany izany.
  '29':
  - type: text
    content: '«Raha misy lehilahy na vehivavy manana fery eo amin’ny lohany na eo amin’ny saokany, '
  '3':
  - type: text
    content: 'Hozahan’ny mpisorona ny faritra misy aretina eo amin’ny hoditr’ilay olona; ka raha mandoaka hoditra no fahitana io faritra misy aretina io sady niova ho fotsy ny volo eo, dia aretina miendrika habokana izany. Ary rehefa voazahan’ny mpisorona ilay olona, dia hataony hoe '
  - type: text
    content: maloto
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'dia hozahan’ny mpisorona izany. Raha hitany fa mandoaka hoditra ny fery sady misy volo madinika tomamotamo eo, dia hambaran’ny mpisorona hoe maloto ilay olona; fa kimavo izany ka aretin-koditra mamely ny loha na ny saoka. '
  '31':
  - type: text
    content: Raha voazahan’ny mpisorona ilay marary ka hitany fa tsy mandoaka hoditra ny fery nefa tsy misy volo mainty eo
  - type: note
    content: Ny volo mainty dia toa mariky ny fahasalamana fa ny volo tomamotamo kosa (and 30) dia toa mariky ny aretina.
  - type: text
    content: ', dia hatokany toerana izy mandritra ny fito andro. '
  '32':
  - type: text
    content: 'Hozahan’ny mpisorona indray ny fery amin’ny andro fahafito; ka raha hitany fa tsy nanitatra sady tsy nandoaka hoditra ny kimavo ary misy volo tomamotamo eo, '
  '33':
  - type: text
    content: 'dia tokony hiharatra ilay marary, saingy ny faritra misy fery tsy hoharatany; ary hatokan’ny mpisorona toerana fanindroany mandritra ny fito andro izy. '
  '34':
  - type: text
    content: 'Hozahan’ny mpisorona indray izy amin’ny andro fahafito; ka raha hitany fa tsy nanitatra sady tsy nandoaka hoditra ny kimavo, dia hambaran’ny mpisorona hoe madio ilay olona; ary hanasa fitafiana izy dia hadio. '
  '35':
  - type: text
    content: 'Fa raha taorian’ny nanambarana an’ilay olona hoe madio no nitaran’ny kimavo teo amin’ny hodiny, '
  '36':
  - type: text
    content: 'dia hozahan’ny mpisorona indray izy; ka raha hitany fa nanitatra tokoa ny kimavo, dia tsy ilaina hitady izay volo tomamotamo intsony ny mpisorona, fa efa maloto ilay olona. '
  '37':
  - type: text
    content: Nefa raha tsy miova ny kimavo araka ny fijery azy sady misy volo mainty maniry eo, dia sitrana ny kimavo ka madio ilay olona ary hambaran’ny mpisorona hoe madio.
  '38':
  - type: text
    content: '«Raha misy lehilahy na vehivavy manana pentina mangirana fotsy eo amin’ny hodiny, '
  '39':
  - type: text
    content: dia hozahan’ny mpisorona izy; ka raha hitany fa matromatroka ny pentina mangirana eo amin’ny hodi-nofony, dia korofotra mipoipoitra eo izany, ka madio ihany ilay olona.
  '4':
  - type: text
    content: 'Raha misy pentina fotsy mangirana kosa eo amin’ny hoditry ny olona, nefa tsy mandoaka hoditra no fahitana io pentina io sady tsy niova ho fotsy ny volo eo, dia hatokan’ny mpisorona toerana mandritra ny fito andro ilay marary. '
  '40':
  - type: text
    content: '«Raha misy lehilahy mihintsana volon-doha ka sola, dia madio ihany izy. '
  '41':
  - type: text
    content: 'Raha ny volon-doha eo anoloana no mihintsana ka mahatonga mazavaray, dia madio ihany izy. '
  '42':
  - type: text
    content: 'Fa raha misy aretin-koditra fotsy somary mena eo amin’ny loha sola na eo amin’ny mazavaray, dia habokana mipoipoitra eo izany. '
  '43':
  - type: text
    content: 'Hozahan’ny mpisorona ilay olona ka raha hitany fa misy mamontsina fotsy somary mena eo amin’ny loha sola na eo amin’ny mazavaray, ka miendrika habokana eo amin’ny hodi-nofo, '
  '44':
  - type: text
    content: dia lehilahy voan’ny habokana izy, ka maloto; ary hambaran’ny mpisorona hoe maloto izy, satria misy fery eo amin’ny lohany.
  '45':
  - type: text
    content: '«Ny olona voan’ny aretin-koditra dia hanao fitafiana '
  - type: text
    content: voatriatra
  - type: text
    content: ' sy hampirakaraka volo ary hisarom-bava'
  - type: note
    content: 'fitafiana voatriatra...: fomba fanao hanehoana ny fisaonana, jereo Ezek 24.17; ampit Lev 10.6. Ny marary hoditra manko dia tafasaraka amin’ny mpiara-belona (and 46) ka toa efa naman’ny maty.'
  - type: text
    content: ' sady hiantsoantso hoe: ‹Maloto aho! Maloto aho!› '
  '46':
  - type: text
    content: Mandritra ny andro rehetra handotoan’ny fery an’ilay olona, dia maloto izy, ka hitoetra mitokana any ivelan’ny toby.
  - type: heading
    content: Ny amin’ny fitafiana misy bobongolo
  '47':
  - type: text
    content: '«Raha misy bobongolo amina fitafiana kiran-drongony na volon’ondry, '
  '48':
  - type: text
    content: 'amina lamba sy akanjobà volon’ondry na kiran-drongony, amina hoditra na fitaovana vita hoditra, dia izao sy izao no hatao. '
  '49':
  - type: text
    content: 'Raha maitsomaitso na menamena ny holatra amin’ireo, dia bobongolo tokony haseho amin’ny mpisorona. '
  '5':
  - type: text
    content: 'Hozahan’ny mpisorona izy amin’ny andro fahafito; ka raha hitany fa tsy mitombo ny aretina sady tsy manitatra eo amin’ny hoditra, dia hatokany toerana fanindroany mandritra ny fito andro izy. '
  '50':
  - type: text
    content: 'Rehefa nozahan’ny mpisorona ilay holatra, dia hatokany toerana mandritra ny fito andro ilay zavatra bobongolo. '
  '51':
  - type: text
    content: 'Amin’ny andro fahafito dia hozahany indray ny holatra, ka raha nitaran’izany ilay fitafiana na lamba na akanjobà na hoditra na fitaovana vita hoditra, dia bobongolo tsy azo esorina izany ka '
  - type: text
    content: maloto
  - type: text
    content: ' ilay zavatra voany. '
  '52':
  - type: text
    content: 'Hodoran’ny mpisorona ilay fitafiana na lamba na akanjobà volon’ondry na kiran-drongony na fitaovana vita hoditra. Noho ny bobongolo tsy azo esorina, dia hodorana amin’ny afo ilay zavatra voany. '
  '53':
  - type: text
    content: 'Fa rehefa nozahan’ny mpisorona ka hitany fa tsy nitaran’ny holatra ilay zavatra, '
  '54':
  - type: text
    content: 'dia hasainy hosasana izany ary hatokany toerana indray mandritra ny fito andro. '
  '55':
  - type: text
    content: 'Avy eo dia hozahan’ny mpisorona ny holatra eo amin’ilay zavatra voasasa; ka raha hitany fa tsy niova toetra ny holatra na dia tsy nanitatra aza, dia maloto ilay zavatra voany ka hodorana amin’ny afo, na ny lafitsarany na ny lafiratsiny no voakikin’ny bobongolo. '
  '56':
  - type: text
    content: 'Fa rehefa nozahan’ny mpisorona kosa ka hitany fa nihamatromatroka ny holatra amin’ilay zavatra voasana, dia ny faritra misy holatra fotsiny no hoesoriny aminy. '
  '57':
  - type: text
    content: Raha mbola misy holatra miseho indray eo amin’ny fitafiana na lamba na akanjobà na fitaovana vita hoditra, dia bobongolo mipoitra izany ka hodorana amin’ny afo ilay zavatra voany.
  '58':
  - type: text
    content: «Raha misy fitafiana na lamba na akanjobà na fitaovana vita hoditra bobongolo nosasana ka nanjavona ny holatra taminy, dia hosasana fanindroany vao hadio.»
  '59':
  - type: text
    content: Ireo no fepetra momba ny bobongolo amina fitafiana volon’ondry na kiran-drongony, amina lamba na akanjobà, ary amina fitaovana vita hoditra; ireo fepetra ireo no ahazoana manambara zavatra hoe madio na maloto.
  '6':
  - type: text
    content: 'Ary hozahan’ny mpisorona indray izy amin’ny andro fahafito ka raha hitany fa mihamatroka ny pentina fotsy sady tsy manitatra eo amin’ny hoditra, dia hambarany hoe madio ilay olona; takopery ihany mantsy izany, ka hanasa fitafiana ilay marary, dia hadio. '
  '7':
  - type: text
    content: 'Raha manitatra eo amin’ny hodiny kosa ny manako-pery, taorian’ny nisehoany tamin’ny mpisorona ka efa nanambarany azy hoe madio, dia hiseho amin’ny mpisorona indray izy. '
  '8':
  - type: text
    content: Hozahan’ny mpisorona izy; ka raha hitany fa manitatra eo amin’ny hoditra tokoa ny manako-pery, dia hambarany hoe maloto ilay olona fa habokana izany.
  '9':
  - type: text
    content: '«Raha misy olona voan’ny aretina miendrika habokana, dia hoentina ho eo amin’ny mpisorona izy. '
