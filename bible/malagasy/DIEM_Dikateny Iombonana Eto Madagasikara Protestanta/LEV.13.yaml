    - type: text
      text: 'Avy eo dia hozahan’ny mpisorona ny holatra eo amin’ilay zavatra voasasa; ka raha hitany fa tsy niova toetra ny holatra na dia tsy nanitatra aza, dia maloto ilay zavatra voany ka hodorana amin’ny afo, na ny lafitsarany na ny lafiratsiny no voakikin’ny bobongolo. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Fa rehefa nozahan’ny mpisorona kosa ka hitany fa nihamatromatroka ny holatra amin’ilay zavatra voasana, dia ny faritra misy holatra fotsiny no hoesoriny aminy. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Raha mbola misy holatra miseho indray eo amin’ny fitafiana na lamba na akanjobà na fitaovana vita hoditra, dia bobongolo mipoitra izany ka hodorana amin’ny afo ilay zavatra voany.
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: «Raha misy fitafiana na lamba na akanjobà na fitaovana vita hoditra bobongolo nosasana ka nanjavona ny holatra taminy, dia hosasana fanindroany vao hadio.»
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: Ireo no fepetra momba ny bobongolo amina fitafiana volon’ondry na kiran-drongony, amina lamba na akanjobà, ary amina fitaovana vita hoditra; ireo fepetra ireo no ahazoana manambara zavatra hoe madio na maloto.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hozahan’ny mpisorona indray izy amin’ny andro fahafito ka raha hitany fa mihamatroka ny pentina fotsy sady tsy manitatra eo amin’ny hoditra, dia hambarany hoe madio ilay olona; takopery ihany mantsy izany, ka hanasa fitafiana ilay marary, dia hadio. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Raha manitatra eo amin’ny hodiny kosa ny manako-pery, taorian’ny nisehoany tamin’ny mpisorona ka efa nanambarany azy hoe madio, dia hiseho amin’ny mpisorona indray izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hozahan’ny mpisorona izy; ka raha hitany fa manitatra eo amin’ny hoditra tokoa ny manako-pery, dia hambarany hoe maloto ilay olona fa habokana izany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '«Raha misy olona voan’ny aretina miendrika habokana, dia hoentina ho eo amin’ny mpisorona izy. '
