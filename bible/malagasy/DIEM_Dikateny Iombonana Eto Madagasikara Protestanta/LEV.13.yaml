      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mety ho ny hoditra manontolo mihitsy no efa ielezan’ny habokana ka henika azy hatreo antampon-doha ka hatrany am-paladia, araka izay faritra rehetra taza-mason’ny mpisorona; '
