      text: 'dia hozahany akaiky ilay marary ka raha hitany fa manenika ny tenany manontolo ny habokana, dia hambarany hoe madio izy. Madio tokoa ilay olona satria efa niova ho fotsy avokoa ny hodiny. '
  '14':
