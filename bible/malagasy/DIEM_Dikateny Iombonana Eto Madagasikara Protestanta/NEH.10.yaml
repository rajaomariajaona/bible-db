document_id: NEH.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manome toky ny vahoaka fa hitandrina ny lalàna
  - type: text
    content: 'Noho izany rehetra nanjo anay izany, dia fanomezan-toky mafy no nataonay sy naraikitray an-tsoratra. Taratasy nasiana tombokase izy io sady nosoniavin’ny mpanapaka anay sy ny '
  - type: text
    content: levitanay
  - type: text
    content: ' ary ny '
  - type: text
    content: mpisoronay
  - type: text
    content: '. '
  '10':
  - type: text
    content: '–Ny levita kosa dia i Jesoa zanakalahin’i Azanià, i Binoy isan’ny zanakalahin’i Henadada, i Kadmiela, '
  '11':
  - type: text
    content: 'ary koa ny naman’ireo: dia ry i Sekanià sy i Hôdoià, i Kelità sy i Pelaià ary i Hanàna, '
  '12':
  - type: text
    content: 'i Mikà sy i Rehoba ary i Hasabià, '
  '13':
  - type: text
    content: 'i Zakora sy i Serebià, ary i Sebanià, '
  '14':
  - type: text
    content: i Hôdià sy i Banỳ ary i Kenany.
  '15':
  - type: text
    content: '–Ary ny loholona kosa dia ry i Parehôsy sy i Pahata-Môaba, i Helama sy i Zatò ary i Banỳ, '
  '16':
  - type: text
    content: 'i Bony sy i Hazdaga ary i Belay, '
  '17':
  - type: text
    content: 'i Adônià sy i Bigvay ary i Hadîna, '
  '18':
  - type: text
    content: 'i Atera sy i Hezekià ary i Hazora, '
  '19':
  - type: text
    content: 'i Hôdià sy i Hasoma ary i Betsay, '
  '2':
  - type: text
    content: 'Ireto avy ny mpanao sonia:'
  - type: text
    content: –I Nehemià governora, zanakalahin’i Hakalià.
  - type: text
    content: '–Ny mpisorona kosa dia ry i Tsedekià, '
  '20':
  - type: text
    content: 'i Harifa sy i Hanatôta ary i Nebay, '
  '21':
  - type: text
    content: 'i Magpihasy sy i Mesolama ary i Hezira, '
  '22':
  - type: text
    content: 'i Mesezabela sy i Tsadôka ary i Jadoa, '
  '23':
  - type: text
    content: 'i Pelatià sy i Hanàna ary i Hanaià, '
  '24':
  - type: text
    content: 'i Hôsea sy i Hananià ary i Hasoba, '
  '25':
  - type: text
    content: 'i Lôhesy sy i Pilehà ary i Sôbèka, '
  '26':
  - type: text
    content: 'i Rehoma sy i Hasabnà ary i Mahaseià, '
  '27':
  - type: text
    content: 'i Ahià sy i Hanany ary i Hanàna, '
  '28':
  - type: text
    content: i Malòka sy i Harima ary i Bahanà.
  '29':
  - type: text
    content: 'Ny olona sisa, na mpisorona, na levita, na mpiandry varavarana, na mpihira, na mpanampy ny levita, na izay rehetra efa niavaka tamin’ny valovotaka mba hanaraka ny lalànan’Andriamanitra, na ny vadin’ireo, na ny zanany lahy sy vavy, izany hoe izay rehetra efa mahahaino tsara, '
  '3':
  - type: text
    content: 'i Seraià sy i Hazarià ary i Jeremià, '
  '30':
  - type: text
    content: eny, ny olona sisa dia samy nikambana tsara tamin’ireo Israelita manan-kaja ireo; ka nianiana mafy izy rehetra hanaraka ny lalàna izay nampitain’Andriamanitra tamin’ny alalan’i Mosesy mpanompony, ary hitandrina sy hanatanteraka ny didy sy fitsipika aman-dalàna rehetra izay nataon’ny TOMPO Andriamanitray.
  '31':
  - type: text
    content: 'Tsy homenay ho vadin’ny valovotaka ny zanakavavinay; ary tsy halainay ho vadin’ny zanakalahinay ny zanakavavin’ireo valovotaka. '
  '32':
  - type: text
    content: 'Raha misy vary na entana hafa amidin’ny valovotaka amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' na amin’ny andro fety, dia tsy hovidinay; ary, isaky ny taona fahafito, dia tsy hambolenay ny tany sady hafoinay ny trosa rehetra. '
  '33':
  - type: text
    content: 'Nataonay lalàna koa ny handoavana ny ampahatelon-tsekela isan-taona hanaovana ny fanompoana momba ny tranon’Andriamanitray: '
  '34':
  - type: text
    content: 'io rehetra io dia hahazoana ny mofo atolotra ho an’Andriamanitra, ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy fanatitra vokatry ny tany fanao isan’andro, ny sorona fanolotra isaky ny sabata sy voaloham-bolana ary andro fety, ny fanatitra hafa voatokana ho zava-masina dia masina, ary ny sorona fanalana ny ota mba handraisan’ny vahoaka Israely famelan-keloka; farany, io hetra io dia hanatontosana ny raharaha rehetra fikarakarana ny tranon’Andriamanitray. '
  '35':
  - type: text
    content: 'Nanao antsapaka izahay mpisorona sy levita ary sarambabem-bahoaka ny amin’ny hifandimbiasana hanatitra kitay hazo ho ao an-tranon’Andriamanitray, isam-pianakaviana amin’ny fotoanandro manandrify; isan-taona, araka izay voasoratra ao amin’ny lalàna, no hitondranay an’izany kitay izany mba handorana ny sorona eo ambonin’ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO Andriamanitray. '
  '36':
  - type: text
    content: 'Isan-taona koa no hanateranay ao an-tranon’ny TOMPO ireo voaloham-bokatry ny taninay sy ireo voaloham-bokatry ny hazo rehetra fihinam-boa; '
  '37':
  - type: text
    content: 'nekenay hoentina ny lahimatoanay sy ny voalohan-teraky ny biby fiompinay ka harosonay amin’ny mpisorona izay manao ny fanompoana. '
  '38':
  - type: text
    content: 'Ampahany voafantinay amin’ny koba sy voankazo ary divay sy menaka no hatolotray ho an’ny mpisorona ka hapetrakay ao an-tranon’Andriamanitray, ao amin’ny efitrano voatokana ho an’izany; hatolotray ho an’ny levita ny ampahafolon’ny vokatry ny taninay, ka ny levita mihitsy no handray io fahafolon-karena io eny an-tanàna rehetra akaikin’ny fambolenay. '
  '39':
  - type: text
    content: 'Rehefa mandray ny fahafolon-karena kosa ny levita, dia hisy mpisorona anankiray taranak’i Aharôna hiaraka aminy; ary ny ampahafolon’ny fahafolon-karena dia hoentin’ny levita ao an-tranon’Andriamanitra, ao amin’ny efitrano fitehirizan-drakitra. '
  '4':
  - type: text
    content: 'i Pasehora sy i Amarià ary i Malkià, '
  '40':
  - type: text
    content: 'Ao amin’ireo efitrano ireo no hanateran’ny Israelita sy ny levita ny ampahany voafantiny amin’ny vary sy divay ary menaka; ao amin’ireo efitrano ireo mantsy no misy ny fanaky ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' sady itoeran’ny mpisorona manao fanompoana sy ny mpiandry varavarana ary ny mpihira.'
  - type: text
    content: Amin’izany no tsy hanaovanay tsirambina ny tranon’Andriamanitray.
  '5':
  - type: text
    content: 'i Hatosy sy i Sebanià ary i Malòka, '
  '6':
  - type: text
    content: 'i Harima sy i Meremôta ary i Hôbadià, '
  '7':
  - type: text
    content: 'i Daniela sy i Ginetôna ary i Baròka, '
  '8':
  - type: text
    content: 'i Mesolama sy i Abià ary i Miamîna, '
  '9':
  - type: text
    content: i Mahazià sy i Bilgay ary i Semahià.
