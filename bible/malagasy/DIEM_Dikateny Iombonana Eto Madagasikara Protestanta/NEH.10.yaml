document_id: NEH.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manome toky ny vahoaka fa hitandrina ny lalàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Noho izany rehetra nanjo anay izany, dia fanomezan-toky mafy no nataonay sy naraikitray an-tsoratra. Taratasy nasiana tombokase izy io sady nosoniavin’ny mpanapaka anay sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levitanay
  - type: text
    text: ' ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisoronay
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ireto avy ny mpanao sonia:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –I Nehemià governora, zanakalahin’i Hakalià.
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny mpisorona kosa dia ry i Tsedekià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Seraià sy i Hazarià ary i Jeremià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'i Pasehora sy i Amarià ary i Malkià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'i Hatosy sy i Sebanià ary i Malòka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'i Harima sy i Meremôta ary i Hôbadià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'i Daniela sy i Ginetôna ary i Baròka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'i Mesolama sy i Abià ary i Miamîna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: i Mahazià sy i Bilgay ary i Semahià.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '–Ny levita kosa dia i Jesoa zanakalahin’i Azanià, i Binoy isan’ny zanakalahin’i Henadada, i Kadmiela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary koa ny naman’ireo: dia ry i Sekanià sy i Hôdoià, i Kelità sy i Pelaià ary i Hanàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'i Mikà sy i Rehoba ary i Hasabià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'i Zakora sy i Serebià, ary i Sebanià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: i Hôdià sy i Banỳ ary i Kenany.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '–Ary ny loholona kosa dia ry i Parehôsy sy i Pahata-Môaba, i Helama sy i Zatò ary i Banỳ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'i Bony sy i Hazdaga ary i Belay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'i Adônià sy i Bigvay ary i Hadîna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'i Atera sy i Hezekià ary i Hazora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'i Hôdià sy i Hasoma ary i Betsay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'i Harifa sy i Hanatôta ary i Nebay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'i Magpihasy sy i Mesolama ary i Hezira, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Mesezabela sy i Tsadôka ary i Jadoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'i Pelatià sy i Hanàna ary i Hanaià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Hôsea sy i Hananià ary i Hasoba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Lôhesy sy i Pilehà ary i Sôbèka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Rehoma sy i Hasabnà ary i Mahaseià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Ahià sy i Hanany ary i Hanàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: i Malòka sy i Harima ary i Bahanà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny olona sisa, na mpisorona, na levita, na mpiandry varavarana, na mpihira, na mpanampy ny levita, na izay rehetra efa niavaka tamin’ny valovotaka mba hanaraka ny lalànan’Andriamanitra, na ny vadin’ireo, na ny zanany lahy sy vavy, izany hoe izay rehetra efa mahahaino tsara, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: eny, ny olona sisa dia samy nikambana tsara tamin’ireo Israelita manan-kaja ireo; ka nianiana mafy izy rehetra hanaraka ny lalàna izay nampitain’Andriamanitra tamin’ny alalan’i Mosesy mpanompony, ary hitandrina sy hanatanteraka ny didy sy fitsipika aman-dalàna rehetra izay nataon’ny TOMPO Andriamanitray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tsy homenay ho vadin’ny valovotaka ny zanakavavinay; ary tsy halainay ho vadin’ny zanakalahinay ny zanakavavin’ireo valovotaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Raha misy vary na entana hafa amidin’ny valovotaka amin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' na amin’ny andro fety, dia tsy hovidinay; ary, isaky ny taona fahafito, dia tsy hambolenay ny tany sady hafoinay ny trosa rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nataonay lalàna koa ny handoavana ny ampahatelon-tsekela isan-taona hanaovana ny fanompoana momba ny tranon’Andriamanitray: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'io rehetra io dia hahazoana ny mofo atolotra ho an’Andriamanitra, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo sy fanatitra vokatry ny tany fanao isan’andro, ny sorona fanolotra isaky ny sabata sy voaloham-bolana ary andro fety, ny fanatitra hafa voatokana ho zava-masina dia masina, ary ny sorona fanalana ny ota mba handraisan’ny vahoaka Israely famelan-keloka; farany, io hetra io dia hanatontosana ny raharaha rehetra fikarakarana ny tranon’Andriamanitray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nanao antsapaka izahay mpisorona sy levita ary sarambabem-bahoaka ny amin’ny hifandimbiasana hanatitra kitay hazo ho ao an-tranon’Andriamanitray, isam-pianakaviana amin’ny fotoanandro manandrify; isan-taona, araka izay voasoratra ao amin’ny lalàna, no hitondranay an’izany kitay izany mba handorana ny sorona eo ambonin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: 'n’ny TOMPO Andriamanitray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Isan-taona koa no hanateranay ao an-tranon’ny TOMPO ireo voaloham-bokatry ny taninay sy ireo voaloham-bokatry ny hazo rehetra fihinam-boa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'nekenay hoentina ny lahimatoanay sy ny voalohan-teraky ny biby fiompinay ka harosonay amin’ny mpisorona izay manao ny fanompoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ampahany voafantinay amin’ny koba sy voankazo ary divay sy menaka no hatolotray ho an’ny mpisorona ka hapetrakay ao an-tranon’Andriamanitray, ao amin’ny efitrano voatokana ho an’izany; hatolotray ho an’ny levita ny ampahafolon’ny vokatry ny taninay, ka ny levita mihitsy no handray io fahafolon-karena io eny an-tanàna rehetra akaikin’ny fambolenay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Rehefa mandray ny fahafolon-karena kosa ny levita, dia hisy mpisorona anankiray taranak’i Aharôna hiaraka aminy; ary ny ampahafolon’ny fahafolon-karena dia hoentin’ny levita ao an-tranon’Andriamanitra, ao amin’ny efitrano fitehirizan-drakitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ao amin’ireo efitrano ireo no hanateran’ny Israelita sy ny levita ny ampahany voafantiny amin’ny vary sy divay ary menaka; ao amin’ireo efitrano ireo mantsy no misy ny fanaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' sady itoeran’ny mpisorona manao fanompoana sy ny mpiandry varavarana ary ny mpihira.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Amin’izany no tsy hanaovanay tsirambina ny tranon’Andriamanitray.
