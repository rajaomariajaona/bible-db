document_id: ISA.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Olombelona ihany ny Ejiptianina
  - type: text
    content: Lozan’izay midina any Ejipta
  - type: text
    content: mba hitady famonjena!
  - type: text
    content: Ny soavaly no ianteherany;
  - type: text
    content: ny kalesy no itokiany
  - type: text
    content: satria maro ireny;
  - type: text
    content: ary ny mpitaingin-tsoavaly no antenainy,
  - type: text
    content: satria mahery tokoa ireny;
  - type: text
    content: fa tsy andrandrainy akory ilay Masin’i Israely
  - type: text
    content: ary tsy anontaniany mihitsy ny TOMPO.
  '2':
  - type: text
    content: Izy koa anefa mahay zavatra,
  - type: text
    content: afaka mahatonga loza
  - type: text
    content: ary tsy mitsoaka amin’izay nolazainy.
  - type: text
    content: Eny, ny TOMPO efa nitsangan-kamely
  - type: text
    content: ny antokon’ny olon-dratsy
  - type: note
    content: Ny antokon’ny olon-dratsy dia ireo Israelita mpiandany amin’ny Ejipta mba hanoherana ny Asirianina. –Ny mpanao heloka kosa dia toa ny Ejiptianina rahateo.
  - type: text
    content: ary koa ireo mpanao heloka
  - type: text
    content: izay fitadiavam-pamonjena.
  '3':
  - type: text
    content: Olombelona ihany ny Ejiptianina
  - type: text
    content: fa tsy Andriamanitra akory;
  - type: text
    content: nofo ihany ny soavaliny fa tsy fanahy;
  - type: text
    content: koa vao maninji-tanana ny TOMPO,
  - type: text
    content: dia ho solafaka izany mpamonjy izany,
  - type: text
    content: hianjera koa ilay natao harovany
  - type: text
    content: ary hiara-devona izy roa tonta.
  - type: heading
    content: Mpiaro an’i Jerosalema ny Tompo
  '4':
  - type: text
    content: 'Izao no nolazain’ny TOMPO tamiko:'
  - type: text
    content: «Rehefa ny liona na ny liona tanora
  - type: text
    content: no mierona hiambina ny remby azony
  - type: text
    content: 'eo anoloan’andiana '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry'
  - type: text
    content: izay tafangona hamely azy,
  - type: text
    content: dia tsy matahotra ny antsoantson’ireo izy
  - type: text
    content: na lasa mitsoaka noho ny tabatabany.
  - type: text
    content: Ho tahaka izany koa Aho,
  - type: text
    content: hoy ny TOMPOn’izao rehetra izao,
  - type: text
    content: rehefa midina hiady
  - type: text
    content: 'eo an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: na eo amin’ilay havoany.»
  '5':
  - type: text
    content: Tahaka ny vorona mamelatra ny elany
  - type: text
    content: no hamelaran’ny TOMPOn’izao rehetra izao
  - type: text
    content: ny fiarovany amin’i Jerosalema;
  - type: text
    content: ka sady hiaro no hanafaka azy ny Tompo,
  - type: text
    content: eny, sady hitsimbina no hamonjy azy.
  '6':
  - type: text
    content: 'Ry Israelita ô, miverena amin’Ilay efa niodinanareo lavitra. '
  '7':
  - type: text
    content: Amin’izany andro izany, dia samy hanary ny sampy volafotsy sy volamena ianareo tsirairay avy, dia ireo sampy namboarin’ny tananareo feno heloka.
  '8':
  - type: text
    content: Tsy sabatra nataon’ny olona
  - type: text
    content: ilay sabatra handavo ny Asirianina;
  - type: text
    content: ary tsy sabatra an’olombelona
  - type: text
    content: ilay sabatra handringana azy.
  - type: text
    content: Handositra eo anoloan’io sabatra io ny Asirianina;
  - type: text
    content: ary ny miaramila voafantiny
  - type: text
    content: dia hampanaovina asa an-terivozona.
  '9':
  - type: text
    content: Ny mpanjakany handositra noho ny tahotra,
  - type: text
    content: ary ny manamboninahiny ho kivy
  - type: text
    content: ka hitsoaka hamela ny fanevany.
  - type: text
    content: Izany no teny hentitry ny TOMPO
  - type: text
    content: 'izay manana ny fatana fandoroany ao '
  - type: text
    content: Tsiôna
  - type: text
    content: sy ny lafaorony miredareda ao Jerosalema.
