  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan’izay midina any Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitady famonjena!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny soavaly no ianteherany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny kalesy no itokiany
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria maro ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpitaingin-tsoavaly no antenainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria mahery tokoa ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy andrandrainy akory ilay Masin’i Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy anontaniany mihitsy ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izy koa anefa mahay zavatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afaka mahatonga loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mitsoaka amin’izay nolazainy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny TOMPO efa nitsangan-kamely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny antokon’ny olon-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny antokon’ny olon-dratsy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia ireo Israelita mpiandany amin’ny Ejipta mba hanoherana ny Asirianina. –Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'mpanao heloka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: kosa dia toa ny Ejiptianina rahateo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa ireo mpanao heloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay fitadiavam-pamonjena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Olombelona ihany ny Ejiptianina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy Andriamanitra akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nofo ihany ny soavaliny fa tsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa vao maninji-tanana ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho solafaka izany mpamonjy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hianjera koa ilay natao harovany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiara-devona izy roa tonta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpiaro an’i Jerosalema ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no nolazain’ny TOMPO tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Rehefa ny liona na ny liona tanora
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mierona hiambina ny remby azony
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eo anoloan’andiana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ondry'
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tafangona hamely azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy matahotra ny antsoantson’ireo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na lasa mitsoaka noho ny tabatabany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tahaka izany koa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny TOMPOn’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa midina hiady
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eo an-tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: na eo amin’ilay havoany.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tahaka ny vorona mamelatra ny elany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hamelaran’ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fiarovany amin’i Jerosalema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sady hiaro no hanafaka azy ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, sady hitsimbina no hamonjy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ry Israelita ô, miverena amin’Ilay efa niodinanareo lavitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’izany andro izany, dia samy hanary ny sampy volafotsy sy volamena ianareo tsirairay avy, dia ireo sampy namboarin’ny tananareo feno heloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy sabatra nataon’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay sabatra handavo ny Asirianina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy sabatra an’olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay sabatra handringana azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handositra eo anoloan’io sabatra io ny Asirianina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny miaramila voafantiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hampanaovina asa an-terivozona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny mpanjakany handositra noho ny tahotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny manamboninahiny ho kivy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitsoaka hamela ny fanevany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitry ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay manana ny fatana fandoroany ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny lafaorony miredareda ao Jerosalema.
