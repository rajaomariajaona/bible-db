document_id: MAT.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Alaim-panahy any an-taniefitra i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 1.12-13; Lk 4.1-13)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary dia notarihin’ny Fanahin’Andriamanitra hankany an-taniefitra i Jesoa, mba halain’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' fanahy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tamin’izay dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mialà, ry Satàna, satria izao no voalazan’ny Soratra Masina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny Tompo Andriamanitrao no hiankohofanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy irery no hivavahanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deot 6.13.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izay vao nandao Azy ny devoly, ary indreo nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' tonga teo amin’i Jesoa ka nanompo Azy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manomboka mitory ny Fanjakàn’ny lanitra any Galilea i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 1.14-15; Lk 4.14-15)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nony ren’i Jesoa fa naiditra am-ponja i Jôhany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'naiditra... Jôhany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i Jôhany Mpanao batisa no ambara eto. Jereo Mt 14.3.
      marker-yv: yv-n
    - type: text
      text: ', dia lasa nankany Galilea Izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary nilaozany i Nazareta ka lasa Izy niorim-ponenana tao Kafarnahòma, tanàna amoron’ny farihin’i Galilea, anatin’ny faritanin’i Zebolòna sy i Naftalỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Zebolòna sy i Naftalỳ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ireo foko anankiroa niorim-ponenana tany amin’ny faritra avaratr’i Israely, ka isan’iny Galilea faha-Jesoa iny.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ka tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hoe:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: «Ry tanin’i Zebolòna sy i Naftalỳ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry lalana amoron’ny farihy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry faritra ampitan’i Jôrdàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry Galilea onenan’ny hafa firenena,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ny vahoaka izay mihitsoka amin’ny maizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahita hazavana lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olona izay mihitsoka amin’ny toerana alofan’ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia niposahan’ny hazavana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 8.3–9.1.
      marker-yv: yv-n
    - type: text
      text: .»
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hatramin’izay i Jesoa dia nanomboka nitoriteny ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ialao ny toe-dratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ialao ny toe-dratsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
      marker-yv: yv-n
    - type: text
      text: ', fa efa akaiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’ny lanitra
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antsoin’i Jesoa ireo mpanarato efa-dahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 1.16-20; Lk 5.1-11)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nitsangantsangana teny amoron’ny farihin’i Galilea i Jesoa ka nahita olona mirahalahy, dia i Simôna ilay atao hoe Petera sy i Andrea rahalahiny; nanipy harato tao anaty farihy izy roa lahy fa mpanarato no raharahany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andao hiaraka amiko fa hataoko mpanarato olona ianareo!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rehefa avy nifady hanina efapolo andro sy efapolo alina i Jesoa, dia noana; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia nilaozany avy hatrany ny haratony ka lasa izy roa lahy niaraka tamin’i Jesoa.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary nandroso ihany i Jesoa ka nahita olona mirahalahy hafa koa, dia i Jakôba sy i Jôhany zanak’i Zebedeo; tafaraka tamin’i Zebedeo rainy teo an-tsambokely izy roa lahy ary nanamboatra harato. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nantsoin’i Jesoa izy mirahalahy; ary nilaozany avy hatrany ny sambokely sy ny rainy fa lasa izy roa lahy niaraka tamin’i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mampianatra ny vahoaka sy manasitrana ny marary i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 6.17-19)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nitety an’i Galilea manontolo i Jesoa, ka nampianatra tany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: 'n-dry zareo ary nanao antso avo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’ny lanitra
    - type: text
      text: ' sady nanasitrana ny aretina mbamin’ny rofy rehetra teo amin’ny vahoaka. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary niely eran’i Siria manontolo ny lazany, ka nentin’ny olona teo aminy avokoa izay mety ho marary ianjadian’ny aretina sy fanaintainana isan-karazany, dia ny azon’ny demony sy ny mararin’ny androbe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mararin’ny androbe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: olona voan’ny aretin-kozatra mahatonga azy hifanintontsintona sy ho torana rehefa mihetsika ilay aretiny.
      marker-yv: yv-n
    - type: text
      text: ' ary ny malemy ka nositraniny avokoa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Vahoaka marobe no nanaraka Azy avy any Galilea sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Dekapôly
    - type: text
      text: ', avy tany Jerosalema sy Jodea ary avy any andafin’i Jôrdàna.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary nohatonin’ny mpaka fanahy Izy ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Andriamanitra
    - type: text
      text: ' tokoa Ianao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Raha... Ianao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa (eto sy ao amin’ny and 6) '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Satria Zanak’Andriamanitra tokoa Ianao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Noho Ianao Zanak’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ', teneno ireo vato ireo hanjary mofo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no voalazan’ny Soratra Masina: «Tsy ny mofo ihany no hiveloman’ny olona, fa ny teny rehetra aloaky ny vavan’Andriamanitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deot 8.3.
      marker-yv: yv-n
    - type: text
      text: .»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Avy eo dia nentin’ny devoly ho any Jerosalema tanàna masina i Jesoa, ka najorony teo an-tendron’ny zoron’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha Zanak’Andriamanitra tokoa Ianao, mianjerà any ambany any, fa izao no voalazan’ny Soratra Masina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Homen’ny Tompo baiko ireo anjeliny noho ny aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' hitondra Anao eny an-tanany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho tafintohim-bato ny tongotrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 91.11-12.
      marker-yv: yv-n
    - type: text
      text: .»
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao koa no voalazan’ny Soratra Masina: «Aza maka fanahy ny Tompo Andriamanitrao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deot 6.16.
      marker-yv: yv-n
    - type: text
      text: .»
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nentin’ny devoly ho any amin’ny tendrombohitra avo dia avo indray i Jesoa, ka nasehony Azy ny fanjakana rehetra eo amin’izao tontolo izao mbamin’ny voninahiny '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Homeko Anao avokoa ireo, raha miankohoka eto anoloako Ianao ho fanajana ahy!
