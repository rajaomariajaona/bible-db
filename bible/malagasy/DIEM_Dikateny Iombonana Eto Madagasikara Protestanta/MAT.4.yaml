document_id: MAT.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Alaim-panahy any an-taniefitra i Jesoa
  - type: heading
    content: (Jereo Mk 1.12-13; Lk 4.1-13)
  - type: text
    content: 'Ary dia notarihin’ny Fanahin’Andriamanitra hankany an-taniefitra i Jesoa, mba halain’ny '
  - type: text
    content: devoly
  - type: text
    content: ' fanahy. '
  '10':
  - type: text
    content: 'Tamin’izay dia hoy i Jesoa taminy:'
  - type: text
    content: '–Mialà, ry Satàna, satria izao no voalazan’ny Soratra Masina:'
  - type: text
    content: «Ny Tompo Andriamanitrao no hiankohofanao,
  - type: text
    content: ary Izy irery no hivavahanao
  - type: note
    content: Deot 6.13.
  - type: text
    content: '!»'
  '11':
  - type: text
    content: 'Izay vao nandao Azy ny devoly, ary indreo nisy '
  - type: text
    content: anjely
  - type: text
    content: ' tonga teo amin’i Jesoa ka nanompo Azy.'
  - type: heading
    content: Manomboka mitory ny Fanjakàn’ny lanitra any Galilea i Jesoa
  - type: heading
    content: (Jereo Mk 1.14-15; Lk 4.14-15)
  '12':
  - type: text
    content: Nony ren’i Jesoa fa naiditra am-ponja i Jôhany
  - type: note
    content: 'naiditra... Jôhany: i Jôhany Mpanao batisa no ambara eto. Jereo Mt 14.3.'
  - type: text
    content: ', dia lasa nankany Galilea Izy. '
  '13':
  - type: text
    content: Ary nilaozany i Nazareta ka lasa Izy niorim-ponenana tao Kafarnahòma, tanàna amoron’ny farihin’i Galilea, anatin’ny faritanin’i Zebolòna sy i Naftalỳ
  - type: note
    content: I Zebolòna sy i Naftalỳ dia ireo foko anankiroa niorim-ponenana tany amin’ny faritra avaratr’i Israely, ka isan’iny Galilea faha-Jesoa iny.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ka tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  '15':
  - type: text
    content: «Ry tanin’i Zebolòna sy i Naftalỳ,
  - type: text
    content: ry lalana amoron’ny farihy,
  - type: text
    content: ry faritra ampitan’i Jôrdàna,
  - type: text
    content: ry Galilea onenan’ny hafa firenena,
  '16':
  - type: text
    content: ny vahoaka izay mihitsoka amin’ny maizina
  - type: text
    content: dia nahita hazavana lehibe,
  - type: text
    content: ary ny olona izay mihitsoka amin’ny toerana alofan’ny fahafatesana
  - type: text
    content: dia niposahan’ny hazavana
  - type: note
    content: Is 8.3–9.1.
  - type: text
    content: .»
  '17':
  - type: text
    content: 'Hatramin’izay i Jesoa dia nanomboka nitoriteny ka nanao hoe:'
  - type: text
    content: –Ialao ny toe-dratsy
  - type: note
    content: 'Ialao ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ', fa efa akaiky ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: .
  - type: heading
    content: Antsoin’i Jesoa ireo mpanarato efa-dahy
  - type: heading
    content: (Jereo Mk 1.16-20; Lk 5.1-11)
  '18':
  - type: text
    content: 'Nitsangantsangana teny amoron’ny farihin’i Galilea i Jesoa ka nahita olona mirahalahy, dia i Simôna ilay atao hoe Petera sy i Andrea rahalahiny; nanipy harato tao anaty farihy izy roa lahy fa mpanarato no raharahany. '
  '19':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Andao hiaraka amiko fa hataoko mpanarato olona ianareo!
  '2':
  - type: text
    content: 'Rehefa avy nifady hanina efapolo andro sy efapolo alina i Jesoa, dia noana; '
  '20':
  - type: text
    content: Dia nilaozany avy hatrany ny haratony ka lasa izy roa lahy niaraka tamin’i Jesoa.
  '21':
  - type: text
    content: 'Ary nandroso ihany i Jesoa ka nahita olona mirahalahy hafa koa, dia i Jakôba sy i Jôhany zanak’i Zebedeo; tafaraka tamin’i Zebedeo rainy teo an-tsambokely izy roa lahy ary nanamboatra harato. '
  '22':
  - type: text
    content: Nantsoin’i Jesoa izy mirahalahy; ary nilaozany avy hatrany ny sambokely sy ny rainy fa lasa izy roa lahy niaraka tamin’i Jesoa.
  - type: heading
    content: Mampianatra ny vahoaka sy manasitrana ny marary i Jesoa
  - type: heading
    content: (Jereo Lk 6.17-19)
  '23':
  - type: text
    content: 'Ary nitety an’i Galilea manontolo i Jesoa, ka nampianatra tany amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: 'n-dry zareo ary nanao antso avo ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' sady nanasitrana ny aretina mbamin’ny rofy rehetra teo amin’ny vahoaka. '
  '24':
  - type: text
    content: Ary niely eran’i Siria manontolo ny lazany, ka nentin’ny olona teo aminy avokoa izay mety ho marary ianjadian’ny aretina sy fanaintainana isan-karazany, dia ny azon’ny demony sy ny mararin’ny androbe
  - type: note
    content: 'mararin’ny androbe: olona voan’ny aretin-kozatra mahatonga azy hifanintontsintona sy ho torana rehefa mihetsika ilay aretiny.'
  - type: text
    content: ' ary ny malemy ka nositraniny avokoa. '
  '25':
  - type: text
    content: 'Vahoaka marobe no nanaraka Azy avy any Galilea sy '
  - type: text
    content: Dekapôly
  - type: text
    content: ', avy tany Jerosalema sy Jodea ary avy any andafin’i Jôrdàna.'
  '3':
  - type: text
    content: 'ary nohatonin’ny mpaka fanahy Izy ka nataony hoe:'
  - type: text
    content: '–Raha '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' tokoa Ianao'
  - type: note
    content: 'Raha... Ianao: dkt hafa (eto sy ao amin’ny and 6) Satria Zanak’Andriamanitra tokoa Ianao na hoe Noho Ianao Zanak’Andriamanitra.'
  - type: text
    content: ', teneno ireo vato ireo hanjary mofo.'
  '4':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Izao no voalazan’ny Soratra Masina: «Tsy ny mofo ihany no hiveloman’ny olona, fa ny teny rehetra aloaky ny vavan’Andriamanitra'
  - type: note
    content: Deot 8.3.
  - type: text
    content: .»
  '5':
  - type: text
    content: 'Avy eo dia nentin’ny devoly ho any Jerosalema tanàna masina i Jesoa, ka najorony teo an-tendron’ny zoron’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'sady nataony hoe:'
  - type: text
    content: '–Raha Zanak’Andriamanitra tokoa Ianao, mianjerà any ambany any, fa izao no voalazan’ny Soratra Masina:'
  - type: text
    content: «Homen’ny Tompo baiko ireo anjeliny noho ny aminao,
  - type: text
    content: 'ka ny '
  - type: text
    content: anjely
  - type: text
    content: ' hitondra Anao eny an-tanany'
  - type: text
    content: mba tsy ho tafintohim-bato ny tongotrao
  - type: note
    content: Sal 91.11-12.
  - type: text
    content: .»
  '7':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Izao koa no voalazan’ny Soratra Masina: «Aza maka fanahy ny Tompo Andriamanitrao'
  - type: note
    content: Deot 6.16.
  - type: text
    content: .»
  '8':
  - type: text
    content: 'Ary nentin’ny devoly ho any amin’ny tendrombohitra avo dia avo indray i Jesoa, ka nasehony Azy ny fanjakana rehetra eo amin’izao tontolo izao mbamin’ny voninahiny '
  '9':
  - type: text
    content: 'sady nataony hoe:'
  - type: text
    content: –Homeko Anao avokoa ireo, raha miankohoka eto anoloako Ianao ho fanajana ahy!
