segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sisin-tanin’i Kanahàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy koa ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Rehefa tafiditra any amin’ny tany Kanahàna ianareo, dia izao no tany izay ho anjara lovanareo araka ireto sisin-tany ireto:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Any atsimo, ny taninareo dia voafaritry ny taniefitra Tsina sy ny tanin’i Edôma. Izany dia manomboka avy eo atsinanana ao amin’ny tendrony atsimon’ny Ranomasina Maty; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'avy eo dia miolaka eo atsimon’ny fiakaran’i Akrabima, dia mandalo an’i Tsina, dia mahazo ny atsimon’i Kadesy-Barnea sy mipaka any Hatsara, ary mitohy hatrany Hatsemôna; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: avy eo Hatsemôna, dia miolaka any amin’ny lohasahan-driakan’i Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lohasahan-driakan’i Ejipta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mety ho '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wadi Arich
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ilay ranon-driaka izay mivarina any amin’ny ranomasina Mediteranea, sahabo ho 80 km atsimon’i Gazà.'
    marker-yv: yv-n
  - type: text
    text: ' ary miafara amin’ny Ranomasina Mediteranea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: «Any andrefana dia ny Ranomasina Mediteranea no mamaritra ny taninareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Any avaratra dia hofaritanareo ny sisin-tany manomboka amin’ny Ranomasina Mediteranea ka hatrany amin’ny tendrombohitra Hôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tendrombohitra tsy fantatra, nefa hafa amin’izay voalaza ao amin’ny 20.22-29 sy 33.37-41.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avy eo an-tendrombohitra Hôra, dia ny lalana mankany Lebô-Hamata no hamaritanareo azy, ary hipaka any Tsedada. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia hitohy hatrany Zifrôna izany ka hiafara any Hatsara-Heinàna. Izany no sisin-taninareo any avaratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Any atsinanana dia hofaritanareo ny sisin-tany manomboka eo Hatsara-Heinàna ka hatrany Sefama. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Avy eo dia mahazo an’i Riblà atsinanan’i Haîna, dia midina mipaka amin’ny sisiny atsinanan’ny farihin’i Kinereta, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ka hitsontsorika hatrany Jôrdàna ary hiafara any amin’ny Ranomasina Maty.
- type: usfm
  marker: p
  children:
  - type: text
    text: «Izany no taninareo araka ny sisin-tany manodidina azy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia namepetra ny Israelita i Mosesy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izany no tany izay nandidian’ny TOMPO fa hozarainareo antsapaka ho an’ny foko sivy sy sasany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 26.52-56; 33.54; Jos 14.1-2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny foko robenita sy ny foko gadita ary koa ny antsasaky ny fokon’i Manase dia efa samy nahazo ny zara taniny, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia atỳ an-dafy atsinanan’i Jôrdàna tandrifin’i Jerikao manatrika ny fiposahan’ny masoandro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 32.33.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lisitr’ireo tompon’andraikitry ny fizaràna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia niteny tamin’i Mosesy indray ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '–I Elehazara mpisorona sy i Josoa zanakalahin’i Nona no hisahana ny fizaràna ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hisy tompon’andraikitra iray avy isam-poko hotendrenareo hanampy azy amin’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izao avy ny anaran’izy ireo:'
- type: usfm
  marker: p
  children:
  - type: text
    text: ho an’ny fokon’i Joda dia i Kaleba zanakalahin’i Jefone;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ho an’ny fokon’i Simehôna, dia i Semoela zanakalahin’i Hamihoda;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ho an’ny fokon’i Benjamîna, dia i Elidada zanakalahin’i Kislôna;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ho an’ny fokon’i Dana, dia i Bokỳ zanakalahin’i Jôglỳ;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ho an’ny fokon’i Manase zanak’i Jôsefa, dia i Haniela zanakalahin’i Efôda;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ho an’ny fokon’i Efraîma zanak’i Jôsefa, dia i Kemoela zanakalahin’i Siftana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ho an’ny fokon’i Zebolòna, dia i Elitsafàna zanakalahin’i Parnàla;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ho an’ny fokon’i Jisakara, dia i Paltiela zanakalahin’i Hazàna;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ho an’ny fokon’i Asera, dia i Ahihoda zanakalahin’i Selômy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ho an’ny fokon’i Naftalỳ, dia i Pedahela zanakalahin’i Hamihoda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ireo no olona nodidian’ny TOMPO hisahana ny fizaràna ny tany Kanahàna ho an’ny Israelita.
