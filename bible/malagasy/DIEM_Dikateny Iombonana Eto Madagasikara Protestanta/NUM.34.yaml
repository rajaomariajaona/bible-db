document_id: NUM.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny sisin-tanin’i Kanahàna
  - type: text
    content: 'Niteny tamin’i Mosesy koa ny TOMPO '
  '10':
  - type: text
    content: '«Any atsinanana dia hofaritanareo ny sisin-tany manomboka eo Hatsara-Heinàna ka hatrany Sefama. '
  '11':
  - type: text
    content: 'Avy eo dia mahazo an’i Riblà atsinanan’i Haîna, dia midina mipaka amin’ny sisiny atsinanan’ny farihin’i Kinereta, '
  '12':
  - type: text
    content: ka hitsontsorika hatrany Jôrdàna ary hiafara any amin’ny Ranomasina Maty.
  - type: text
    content: «Izany no taninareo araka ny sisin-tany manodidina azy.»
  '13':
  - type: text
    content: 'Dia namepetra ny Israelita i Mosesy ka nanao hoe:'
  - type: text
    content: –Izany no tany izay nandidian’ny TOMPO fa hozarainareo antsapaka ho an’ny foko sivy sy sasany
  - type: note
    content: Jereo 26.52-56; 33.54; Jos 14.1-2.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Fa ny foko robenita sy ny foko gadita ary koa ny antsasaky ny fokon’i Manase dia efa samy nahazo ny zara taniny, '
  '15':
  - type: text
    content: dia atỳ an-dafy atsinanan’i Jôrdàna tandrifin’i Jerikao manatrika ny fiposahan’ny masoandro
  - type: note
    content: Jereo 32.33.
  - type: text
    content: .
  - type: heading
    content: Ny lisitr’ireo tompon’andraikitry ny fizaràna
  '16':
  - type: text
    content: 'Dia niteny tamin’i Mosesy indray ny TOMPO ka nanao hoe:'
  '17':
  - type: text
    content: '–I Elehazara mpisorona sy i Josoa zanakalahin’i Nona no hisahana ny fizaràna ny tany. '
  '18':
  - type: text
    content: Hisy tompon’andraikitra iray avy isam-poko hotendrenareo hanampy azy amin’izany.
  '19':
  - type: text
    content: 'Izao avy ny anaran’izy ireo:'
  - type: text
    content: ho an’ny fokon’i Joda dia i Kaleba zanakalahin’i Jefone;
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '–Rehefa tafiditra any amin’ny tany Kanahàna ianareo, dia izao no tany izay ho anjara lovanareo araka ireto sisin-tany ireto:'
  '20':
  - type: text
    content: ho an’ny fokon’i Simehôna, dia i Semoela zanakalahin’i Hamihoda;
  '21':
  - type: text
    content: ho an’ny fokon’i Benjamîna, dia i Elidada zanakalahin’i Kislôna;
  '22':
  - type: text
    content: ho an’ny fokon’i Dana, dia i Bokỳ zanakalahin’i Jôglỳ;
  '23':
  - type: text
    content: ho an’ny fokon’i Manase zanak’i Jôsefa, dia i Haniela zanakalahin’i Efôda;
  '24':
  - type: text
    content: ho an’ny fokon’i Efraîma zanak’i Jôsefa, dia i Kemoela zanakalahin’i Siftana;
  '25':
  - type: text
    content: ho an’ny fokon’i Zebolòna, dia i Elitsafàna zanakalahin’i Parnàla;
  '26':
  - type: text
    content: ho an’ny fokon’i Jisakara, dia i Paltiela zanakalahin’i Hazàna;
  '27':
  - type: text
    content: ho an’ny fokon’i Asera, dia i Ahihoda zanakalahin’i Selômy;
  '28':
  - type: text
    content: ho an’ny fokon’i Naftalỳ, dia i Pedahela zanakalahin’i Hamihoda.
  '29':
  - type: text
    content: Ireo no olona nodidian’ny TOMPO hisahana ny fizaràna ny tany Kanahàna ho an’ny Israelita.
  '3':
  - type: text
    content: '«Any atsimo, ny taninareo dia voafaritry ny taniefitra Tsina sy ny tanin’i Edôma. Izany dia manomboka avy eo atsinanana ao amin’ny tendrony atsimon’ny Ranomasina Maty; '
  '4':
  - type: text
    content: 'avy eo dia miolaka eo atsimon’ny fiakaran’i Akrabima, dia mandalo an’i Tsina, dia mahazo ny atsimon’i Kadesy-Barnea sy mipaka any Hatsara, ary mitohy hatrany Hatsemôna; '
  '5':
  - type: text
    content: avy eo Hatsemôna, dia miolaka any amin’ny lohasahan-driakan’i Ejipta
  - type: note
    content: 'lohasahan-driakan’i Ejipta: mety ho wadi Arich, ilay ranon-driaka izay mivarina any amin’ny ranomasina Mediteranea, sahabo ho 80 km atsimon’i Gazà.'
  - type: text
    content: ' ary miafara amin’ny Ranomasina Mediteranea.'
  '6':
  - type: text
    content: «Any andrefana dia ny Ranomasina Mediteranea no mamaritra ny taninareo.
  '7':
  - type: text
    content: «Any avaratra dia hofaritanareo ny sisin-tany manomboka amin’ny Ranomasina Mediteranea ka hatrany amin’ny tendrombohitra Hôra
  - type: note
    content: Tendrombohitra tsy fantatra, nefa hafa amin’izay voalaza ao amin’ny 20.22-29 sy 33.37-41.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Avy eo an-tendrombohitra Hôra, dia ny lalana mankany Lebô-Hamata no hamaritanareo azy, ary hipaka any Tsedada. '
  '9':
  - type: text
    content: Dia hitohy hatrany Zifrôna izany ka hiafara any Hatsara-Heinàna. Izany no sisin-taninareo any avaratra.
