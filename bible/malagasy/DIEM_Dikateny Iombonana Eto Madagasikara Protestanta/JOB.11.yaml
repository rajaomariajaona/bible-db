document_id: JOB.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Tenin’i Tsôfara: miverena amin’Andriamanitra'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nandray fitenenana i Tsôfara avy any Nahamà ka nanao tamin’i Jôba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha sendra mandalo Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka misambotra olo-meloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampanao fitsarana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza no hahasakana Azy amin’izany?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa fantatr’Andriamanitra ny mpamoron-dainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitany ny ratsy, na dia tsy tomoriny akory aza.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Amin’izay ny olona tsy ampiampy saina aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mety hahazo fahendrena indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia toetram-borikidia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'borikidia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia malaza ho sarotra folahina.
      marker-yv: yv-n
    - type: text
      text: ' aza izy fony vao teraka.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa ianao kosa, tsy maintsy mitodika amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manatsotra ny tananao hivavaka aminy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Raha misy heloka eo an-tananao, dia ario lavitra izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza avela hanan-toerana eo aminao ny tsy fahamarinana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Koa tsy hanan-tsiny ianao sady hitraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy hampihozongozona sy hampahatahotra anao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa hohadinoinao ny fahorianao lasa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na toa rano nandalo sisa no hahatsiarovanao azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hamirapiratra noho ny mitataovovonana ny andronao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny haizina hanjary tahaka ny maraim-baovao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hatoky ianao satria manantena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka na very laza sy afa-baràka aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handry tsy amin’ahiahy ianao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy hisy hanelingelina ny fialan-tsasatrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa maro aza no hila sitraka aminao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsy mba hovaliana ve ny teny maro toy izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hoe be vava manko no manana ny marina!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa hihajamba kosa ny mason’ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hahita lalan-kivoahana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fialana aina no sisa azony antenaina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny rediredinao ve no hampangina ny olona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia haneso tsy hisy mpanakiana ianao!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nambaranao aza hoe: «Madio ny teny nalahatro;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra no mahita fa tsy manan-tsiny aho».
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa raha mba nety niteny ahay Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanaiky hisoka-bava hamaly anao mivantana,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: dia ho nambarany anao ny zava-miafin’ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy takatry ny saintsika olombelona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia hiaiky ianao fa maro ny fahotanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no odian’Andriamanitra tsy hita akory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Moa azonao takarina ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zava-dalina momba an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa azonao fantarina ve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatanterahan’ilay Tsitoha?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Avo tahaka ny lanitra izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hataonao ahoana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary lalina noho ny toeran’ny maty izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho fantatrao ve?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Malalaka noho ny tany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary midadasika noho ny ranomasina.
