document_id: JOB.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Tenin’i Tsôfara: miverena amin’Andriamanitra'
  - type: text
    content: 'Dia nandray fitenenana i Tsôfara avy any Nahamà ka nanao tamin’i Jôba hoe:'
  '10':
  - type: text
    content: Raha sendra mandalo Andriamanitra
  - type: text
    content: ka misambotra olo-meloka
  - type: text
    content: sy mampanao fitsarana azy,
  - type: text
    content: iza no hahasakana Azy amin’izany?
  '11':
  - type: text
    content: Fa fantatr’Andriamanitra ny mpamoron-dainga;
  - type: text
    content: hitany ny ratsy, na dia tsy tomoriny akory aza.
  '12':
  - type: text
    content: Amin’izay ny olona tsy ampiampy saina aza
  - type: text
    content: dia mety hahazo fahendrena indray
  - type: text
    content: na dia toetram-borikidia
  - type: note
    content: Ny borikidia dia malaza ho sarotra folahina.
  - type: text
    content: ' aza izy fony vao teraka.'
  '13':
  - type: text
    content: Fa ianao kosa, tsy maintsy mitodika amin’Andriamanitra
  - type: text
    content: ka manatsotra ny tananao hivavaka aminy.
  '14':
  - type: text
    content: Raha misy heloka eo an-tananao, dia ario lavitra izany;
  - type: text
    content: aza avela hanan-toerana eo aminao ny tsy fahamarinana.
  '15':
  - type: text
    content: Koa tsy hanan-tsiny ianao sady hitraka,
  - type: text
    content: tsy misy hampihozongozona sy hampahatahotra anao.
  '16':
  - type: text
    content: Fa hohadinoinao ny fahorianao lasa,
  - type: text
    content: na toa rano nandalo sisa no hahatsiarovanao azy.
  '17':
  - type: text
    content: Hamirapiratra noho ny mitataovovonana ny andronao;
  - type: text
    content: ny haizina hanjary tahaka ny maraim-baovao.
  '18':
  - type: text
    content: Hatoky ianao satria manantena;
  - type: text
    content: ka na very laza sy afa-baràka aza
  - type: text
    content: dia handry tsy amin’ahiahy ianao.
  '19':
  - type: text
    content: Tsy hisy hanelingelina ny fialan-tsasatrao,
  - type: text
    content: fa maro aza no hila sitraka aminao.
  '2':
  - type: text
    content: Tsy mba hovaliana ve ny teny maro toy izany?
  - type: text
    content: Tsy hoe be vava manko no manana ny marina!
  '20':
  - type: text
    content: Fa hihajamba kosa ny mason’ny olon-dratsy
  - type: text
    content: ka tsy hahita lalan-kivoahana.
  - type: text
    content: Ny fialana aina no sisa azony antenaina.
  '3':
  - type: text
    content: Ny rediredinao ve no hampangina ny olona?
  - type: text
    content: Ka dia haneso tsy hisy mpanakiana ianao!
  '4':
  - type: text
    content: 'Nambaranao aza hoe: «Madio ny teny nalahatro;'
  - type: text
    content: Andriamanitra no mahita fa tsy manan-tsiny aho».
  '5':
  - type: text
    content: Fa raha mba nety niteny ahay Andriamanitra
  - type: text
    content: ka nanaiky hisoka-bava hamaly anao mivantana,
  '6':
  - type: text
    content: dia ho nambarany anao ny zava-miafin’ny fahendrena
  - type: text
    content: izay tsy takatry ny saintsika olombelona;
  - type: text
    content: ary dia hiaiky ianao fa maro ny fahotanao
  - type: text
    content: no odian’Andriamanitra tsy hita akory.
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Moa azonao takarina ve
  - type: text
    content: ny zava-dalina momba an’Andriamanitra
  - type: text
    content: na koa azonao fantarina ve
  - type: text
    content: ny fahatanterahan’ilay Tsitoha?
  '8':
  - type: text
    content: Avo tahaka ny lanitra izany,
  - type: text
    content: ka hataonao ahoana?
  - type: text
    content: Ary lalina noho ny toeran’ny maty izany,
  - type: text
    content: ka ho fantatrao ve?
  '9':
  - type: text
    content: Malalaka noho ny tany izy
  - type: text
    content: ary midadasika noho ny ranomasina.
