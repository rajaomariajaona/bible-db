document_id: MAL.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hafatra nampitondrain’ny TOMPO an’i Malakỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny anarana '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Malakỳ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny irako
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 3.1). Heverina fa tany amin’ny taona 480-460 tany ho any no nitondran’io mpaminany* io ny hafany, izany hoe roapolo na telopolo taona talohan’ny nahatongavan’i Nehemià tany Jerosalema (jereo ny naoty tandrify ny Neh 1.1).'
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny Israelita.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Israely no voafidin’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy ny TOMPO taminareo vahoakany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tiako ianareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nefa nanontanianareo Izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza àry ny porofon’ny fitiavanao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ny TOMPO an-teny hentitra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mpirahalahy va i Hesao sy i Jakôba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hesao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no razamben’ny Edômita, izay hatramin’ny nisiany no fahavalon’ny Israelita, jereo Ezek 25.12-14; Jl 4.19; Hôb 10.15; Sal 137.7. I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jakôba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no razamben’ny Israelita, jereo Hôs 12.4 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '? Nefa i Jakôba no tiako, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: fa i Hesao kosa halako. Nataoko tonga lao ny faritra be tendrombohitra nitoeran’ny taranak’i Hesao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'I Jakôba no tiako, fa i Hesao kosa halako:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny ao amin’ny Rm 9.6-16 izay anaovana tonon-tsiahy io fehezanteny io sy ivoaboasana azy.
    marker-yv: yv-n
  - type: text
    text: ', ary ny taniny natolotro ho an’ny amboadia any an-taniefitra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Na dia hiteny aza ny Edômita taranak’i Hesao hoe: «Rava sy potika izahay, nefa hatsanganay indray ny tanàna rava», Izaho TOMPOn’izao rehetra izao dia hamaly hoe: Aoka izy hanangana, fa Izaho kosa handrava. Ary ny olona hametaka anarana azy hoe: «Tany anjakam-paharatsiana» sy «Vahoaka tezeran’ny TOMPO mandrakizay». '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hahita maso izany ianareo, ry Israelita, ka hahateny hoe: «Lehibe ny TOMPO, na dia hatrany ivelan’ny tanin’i Israely aza!»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanompoam-pivavahana tsy mendrika ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy ny TOMPOn’izao rehetra izao aminareo mpisorona: «Ny zanaka manome voninahitra ny rainy, ary ny mpanompo manaja ny tompony. Koa raha Ray aho, aiza izay voninahitro? Ary raha Tompo aho, aiza izay hajako? Fa manamavo ny anarako ianareo, nefa manontany hoe: «Amin’inona no anamavoanay ny anaranao?». '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitondra hanina tsy mendrika Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hanina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ireo dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy mendrika
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny Tompo satria tsy voaatitra araka ny fitsipika, jereo and 8 sy Lev 22.17-30; Deot 15.21.'
    marker-yv: yv-n
  - type: text
    text: ' eo amin’ny alitarako ianareo, nefa manontany hoe: «Amin’inona no anaovanay zavatra tsy mendrika Anao?» Ka hoy Aho hoe: Amin’ny fanimbazimbanareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitarako
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha biby jamba na mandringa na marary no entinareo hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' amiko, moa heverinareo fa tsy ratsy ve izany? Biby tahaka izany ange aterina ho an’ny governora, dia ho hitanareo raha hahazo sitraka na fitia aminy ianareo, hoy Izaho TOMPOn’izao rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa ankehitriny, ry mpisorona, mifonà amiko Andriamanitrareo ange ianareo, raha toa ka mba hiantra ny vahoakako Aho. Noho izay nataon’ny tananareo izay, moa heverinareo ve fa hihaino anareo Izaho TOMPOn’izao rehetra izao? Sanatria izany! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tokony hohidin’ny anankiray aminareo ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' mba tsy handrehetanareo afo tsy misy lanjany eo amin’ny alitarako. Tsy sitrako ny hahita anareo na ny handray izay fanatitra ataonareo, hoy Izaho TOMPOn’izao rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa manomboka any atsinanana ka hatrany andrefana no hieken’ireo hafa firenena fa lehibe ny lazako. Ary hatraiza hatraiza no handoroana sorona sy hanaovana fanatitra mendrika ny anarako. Eny, hiaiky ireo hafa firenena fa lehibe ny lazako, hoy Izaho TOMPOn’izao rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ianareo kosa manevateva izany amin’ny filazànareo fa ny alitaran’ny TOMPO dia tsy mendri-kaja, ary ny sakafo aterina eo dia tsizarizary. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Miteny aza ianareo hoe: «Asa mafy re izany!» Dia tsy mba miraharaha Ahy ianareo, hoy Izaho TOMPOn’izao rehetra izao. Biby nangalarina na mandringa na marary no atolotrareo amiko. Koa ataoko ahoana, hoy AHO, no fankasitraka izany avy amin’ny tananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ho voaozona anie ny mpamitaka izay manana biby salama ao amin’ny andian’ondriny; saingy rehefa manao voady izy, dia biby manan-kilema no ataony sorona amiko. Eny, mpanjaka lehibe ny tenako, hoy Izaho TOMPOn’izao rehetra izao; ary mampihorohoro ny firenen-drehetra ny lazako.
