document_id: MAL.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Hafatra nampitondrain’ny TOMPO an’i Malakỳ
  - type: note
    content: ny anarana Malakỳ dia midika hoe ny irako (jereo 3.1). Heverina fa tany amin’ny taona 480-460 tany ho any no nitondran’io mpaminany* io ny hafany, izany hoe roapolo na telopolo taona talohan’ny nahatongavan’i Nehemià tany Jerosalema (jereo ny naoty tandrify ny Neh 1.1).
  - type: text
    content: ' ho an’ny Israelita.'
  - type: heading
    content: I Israely no voafidin’ny Tompo
  '10':
  - type: text
    content: 'Tokony hohidin’ny anankiray aminareo ny varavaran’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' mba tsy handrehetanareo afo tsy misy lanjany eo amin’ny alitarako. Tsy sitrako ny hahita anareo na ny handray izay fanatitra ataonareo, hoy Izaho TOMPOn’izao rehetra izao. '
  '11':
  - type: text
    content: 'Fa manomboka any atsinanana ka hatrany andrefana no hieken’ireo hafa firenena fa lehibe ny lazako. Ary hatraiza hatraiza no handoroana sorona sy hanaovana fanatitra mendrika ny anarako. Eny, hiaiky ireo hafa firenena fa lehibe ny lazako, hoy Izaho TOMPOn’izao rehetra izao. '
  '12':
  - type: text
    content: 'Fa ianareo kosa manevateva izany amin’ny filazànareo fa ny alitaran’ny TOMPO dia tsy mendri-kaja, ary ny sakafo aterina eo dia tsizarizary. '
  '13':
  - type: text
    content: 'Miteny aza ianareo hoe: «Asa mafy re izany!» Dia tsy mba miraharaha Ahy ianareo, hoy Izaho TOMPOn’izao rehetra izao. Biby nangalarina na mandringa na marary no atolotrareo amiko. Koa ataoko ahoana, hoy AHO, no fankasitraka izany avy amin’ny tananareo. '
  '14':
  - type: text
    content: Ho voaozona anie ny mpamitaka izay manana biby salama ao amin’ny andian’ondriny; saingy rehefa manao voady izy, dia biby manan-kilema no ataony sorona amiko. Eny, mpanjaka lehibe ny tenako, hoy Izaho TOMPOn’izao rehetra izao; ary mampihorohoro ny firenen-drehetra ny lazako.
  '2':
  - type: text
    content: 'Hoy ny TOMPO taminareo vahoakany:'
  - type: text
    content: –Tiako ianareo.
  - type: text
    content: 'Nefa nanontanianareo Izy hoe:'
  - type: text
    content: –Aiza àry ny porofon’ny fitiavanao?
  - type: text
    content: 'Dia novalian’ny TOMPO an-teny hentitra hoe:'
  - type: text
    content: –Tsy mpirahalahy va i Hesao sy i Jakôba
  - type: note
    content: I Hesao no razamben’ny Edômita, izay hatramin’ny nisiany no fahavalon’ny Israelita, jereo Ezek 25.12-14; Jl 4.19; Hôb 10.15; Sal 137.7. I Jakôba no razamben’ny Israelita, jereo Hôs 12.4 sy nta.
  - type: text
    content: '? Nefa i Jakôba no tiako, '
  '3':
  - type: text
    content: fa i Hesao kosa halako. Nataoko tonga lao ny faritra be tendrombohitra nitoeran’ny taranak’i Hesao
  - type: note
    content: 'I Jakôba no tiako, fa i Hesao kosa halako: jereo ny ao amin’ny Rm 9.6-16 izay anaovana tonon-tsiahy io fehezanteny io sy ivoaboasana azy.'
  - type: text
    content: ', ary ny taniny natolotro ho an’ny amboadia any an-taniefitra. '
  '4':
  - type: text
    content: 'Na dia hiteny aza ny Edômita taranak’i Hesao hoe: «Rava sy potika izahay, nefa hatsanganay indray ny tanàna rava», Izaho TOMPOn’izao rehetra izao dia hamaly hoe: Aoka izy hanangana, fa Izaho kosa handrava. Ary ny olona hametaka anarana azy hoe: «Tany anjakam-paharatsiana» sy «Vahoaka tezeran’ny TOMPO mandrakizay». '
  '5':
  - type: text
    content: 'Hahita maso izany ianareo, ry Israelita, ka hahateny hoe: «Lehibe ny TOMPO, na dia hatrany ivelan’ny tanin’i Israely aza!»'
  - type: heading
    content: Fanompoam-pivavahana tsy mendrika ny Tompo
  '6':
  - type: text
    content: 'Hoy ny TOMPOn’izao rehetra izao aminareo mpisorona: «Ny zanaka manome voninahitra ny rainy, ary ny mpanompo manaja ny tompony. Koa raha Ray aho, aiza izay voninahitro? Ary raha Tompo aho, aiza izay hajako? Fa manamavo ny anarako ianareo, nefa manontany hoe: «Amin’inona no anamavoanay ny anaranao?». '
  '7':
  - type: text
    content: Mitondra hanina tsy mendrika Ahy
  - type: note
    content: Ireo hanina ireo dia tsy mendrika ny Tompo satria tsy voaatitra araka ny fitsipika, jereo and 8 sy Lev 22.17-30; Deot 15.21.
  - type: text
    content: ' eo amin’ny alitarako ianareo, nefa manontany hoe: «Amin’inona no anaovanay zavatra tsy mendrika Anao?» Ka hoy Aho hoe: Amin’ny fanimbazimbanareo ny '
  - type: text
    content: alitarako
  - type: text
    content: '! '
  '8':
  - type: text
    content: 'Raha biby jamba na mandringa na marary no entinareo hatao '
  - type: text
    content: sorona
  - type: text
    content: ' amiko, moa heverinareo fa tsy ratsy ve izany? Biby tahaka izany ange aterina ho an’ny governora, dia ho hitanareo raha hahazo sitraka na fitia aminy ianareo, hoy Izaho TOMPOn’izao rehetra izao. '
  '9':
  - type: text
    content: 'Koa ankehitriny, ry mpisorona, mifonà amiko Andriamanitrareo ange ianareo, raha toa ka mba hiantra ny vahoakako Aho. Noho izay nataon’ny tananareo izay, moa heverinareo ve fa hihaino anareo Izaho TOMPOn’izao rehetra izao? Sanatria izany! '
