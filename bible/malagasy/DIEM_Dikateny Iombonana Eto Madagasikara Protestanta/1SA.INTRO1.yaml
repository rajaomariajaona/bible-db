document_id: 1SA.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Ny boky Samoela voalohany no mitantara ny fotoana tetezamita teo amin’i Israely izay nampitohy ny andron’ny Mpitsara sy ny andron’ny Mpanjaka. Izany tantaram-piainan’i Israely izany dia mihodinkodina amin’ireto olona telo ireto: i Samoela mpitsara lehibe farany sy i Saoly mpanjaka voalohany teo amin’i Israely ary i Davida izay nanan-tantara nifaningotra tamin’ny an’iretsy voalohany talohan’ny nampalaza azy.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny vontoatin’ny boky dia tahaka izay hita amin’ireo tantara hafa ao amin’ny Fanekempihavanana Taloha ihany dia ny hoe: ny finoana an’Andriamanitra no mitondra fahombiazana eo amin’izay atao, fa ny fandavana Azy kosa mahatonga loza. Voalaza mazava izany tamin’ny hafatry ny Tompo ho an’i Helỳ mpisorona ao amin’ny 2.30 hoe: «Izay manome voninahitra Ahy no homeko voninahitra, ary izay manimbazimba Ahy no ho afa-baràka.»'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny boky dia mitantara ny fampifangaroan-kevitra momba ny fametrahana ny fanjakana misy mpanjaka; ny Tompo no tena Mpanjakan’i Israely, kanefa ho valin’ny fangatahan’ny vahoaka dia nifidy mpanjaka ho azy Izy. Na ny mpanjaka voafidy na ny vahoakan’i Israely dia samy nivelona teo ambanin’ny fiandrianana sy ny fitsaran’Andriamanitra (2.3-10). Eo anatrehan’ny lalàna sy ny fahefàn’Andriamanitra dia mitovy zo ny olona rehetra na mpanankarena na mahantra.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Toy izao no fizaràna hita ao amin’ny boky:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –I Samoela mpitsaran’i Israely (1–7)
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –I Saoly tonga mpanjaka (8–10)
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny taona voalohandohan’ny nanjakàn’i Saoly (11–15)
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –I Davida sy i Saoly (16–30)
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny nahafatesan’i Saoly sy ny amin’ireo zanany (31)
  - type: text
    text: .
