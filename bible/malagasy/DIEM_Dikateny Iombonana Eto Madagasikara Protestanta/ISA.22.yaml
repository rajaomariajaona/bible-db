    children:
    - type: text
      text: 'Kanefa hihantona hitambesatra eo amin’i Eliakima avokoa ny sampan’ny fianakavian-drainy na ny lehibe na ny kely, ka tahaka ny fanaka madinika isan-karazany, hatramin’ny lovia ka hatramin’ny siny, mihantona amina tsatòka anankiray. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Amin’izany andro izany, hoy ny teny hentitry ny TOMPOn’izao rehetra izao, dia hiletsy ilay tsatòka natsatoka teo amin’ny toerana mafy; hiala izy ka hianjera, ary ho vaky avokoa ireo entana rehetra nahantona teo.» Izany no nambaran’ny TOMPO.
