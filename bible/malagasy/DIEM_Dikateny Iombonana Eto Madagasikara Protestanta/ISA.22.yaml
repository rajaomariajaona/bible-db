    text: «Amin’izany andro izany, hoy ny teny hentitry ny TOMPOn’izao rehetra izao, dia hiletsy ilay tsatòka natsatoka teo amin’ny toerana mafy; hiala izy ka hianjera, ary ho vaky avokoa ireo entana rehetra nahantona teo.» Izany no nambaran’ny TOMPO.
