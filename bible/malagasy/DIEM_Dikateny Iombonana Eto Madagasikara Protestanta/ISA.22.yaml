document_id: ISA.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana an’i Jerosalema
  - type: text
    content: Hafatra momba ny lohasahan’ny fahitana
  - type: note
    content: 'ny lohasahan’ny fahitana: toa lohasaha iray akaikin’i Jerosalema. Ny famelezana tsy nahomby nataon’ny Asirianina tamin’i Jerosalema, tamin’ny taona 701 tal J.K. (jereo 2 Mp 18.13–19.37) no tsiahivin’ny mpaminany eto amin’ny and 1-14.'
  - type: text
    content: .
  - type: text
    content: Fa inona ity mahazo anareo
  - type: text
    content: no miakatra eny an-tampon-trano,
  - type: text
    content: ry mponin’i Jerosalema?
  '10':
  - type: text
    content: Nisainareo ny trano tao Jerosalema
  - type: text
    content: ka noravanareo ny sasany
  - type: text
    content: mba hahamora ny hiarovana ny manda.
  '11':
  - type: text
    content: Nanamboatra dobon-drano
  - type: text
    content: teo anelanelan’ny manda roa
  - type: note
    content: 'teo anelanelan’ny manda roa: eo amin’ny lafy atsimon’ny tanàna (jereo Jer 39.4; 52.7).'
  - type: text
    content: ' ianareo'
  - type: text
    content: mba halehan’ny rano mihoatra
  - type: text
    content: avy amin’ny fitobian-drano taloha.
  - type: text
    content: Nefa tsy mba nojerenareo akory
  - type: text
    content: Ilay nanao izao toe-javatra izao;
  - type: text
    content: efa nanomana izao hatry ny ela Izy
  - type: text
    content: saingy tsy hitanareo.
  '12':
  - type: text
    content: Tamin’izany andro izany dia niantso anareo
  - type: text
    content: ny Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: mba hitomany sy hitoloko,
  - type: text
    content: hanaratra volon-doha sy hitondra lamba fisaonana.
  '13':
  - type: text
    content: 'Kanjo fifaliam-be no nataonareo:'
  - type: text
    content: novonoina ny omby sy ny ondry
  - type: text
    content: ka fihinanan-kena sy fisotroan-divay moa izao!
  - type: text
    content: «Andeha isika hihinana sy hisotro
  - type: text
    content: fa rahampitso dia ho faty
  - type: note
    content: Averin’i Paoly ao amin’ny 1 Kôr 15.22 ireo teny ireo.
  - type: text
    content: ', hoy ianareo.»'
  '14':
  - type: text
    content: Koa ny TOMPOn’izao rehetra izao
  - type: text
    content: 'dia mampandre ahy ny hafatra hoe:'
  - type: text
    content: «Mianiana Aho fa mandra-pahafatinareo
  - type: text
    content: dia tsy havelako mihitsy izany helokareo izany.
  - type: text
    content: Izaho Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: no efa niteny.»
  - type: heading
    content: Fanesorana an’i Sebnà amin’ny toerany
  '15':
  - type: text
    content: Izao no voalazan’ny Tompo
  - type: text
    content: 'ANDRIAMANITR’izao rehetra izao:'
  - type: text
    content: «Ndeha mankany amin’i Sebnà,
  - type: text
    content: mpanolotsain’ny mpanjaka
  - type: text
    content: sady lehiben’ny lapa
  - type: text
    content: 'ka mitenena aminy hoe:'
  '16':
  - type: text
    content: –Inona no anao atỳ ary inonao no atỳ,
  - type: text
    content: no mampandoaka ny fasana hilevenanao
  - type: text
    content: etỳ amin’ny havoana etỳ ianao
  - type: text
    content: ary mandavaka ny fonenanao rahatrizay
  - type: text
    content: etỳ amin’ny harambato etỳ?
  '17':
  - type: text
    content: Indro ny TOMPO hamely anao
  - type: text
    content: indray mipaoka monja, rangahy,
  - type: text
    content: dia hataony an-kitapo ianao
  '18':
  - type: text
    content: sy hahorony toy ny bolabolan-javatra
  - type: text
    content: ka hakodiadiany ho any amin’ny tany anankiray
  - type: text
    content: izay misy faritra malalaka.
  - type: text
    content: Any no hahafaty ny tenanao
  - type: text
    content: mbamin’ny kalesim-boninahitrao,
  - type: text
    content: ry ilay manala baràka ny ao an-tranon’ny tomponao.
  '19':
  - type: text
    content: Horoahiko hiala amin’ny toeranao ianao
  - type: text
    content: ary hoesoriko amin’ny andraikitrao.
  '2':
  - type: text
    content: Nahoana no maresaka be ny tanàna
  - type: text
    content: ary feno antsoantso sy tabataba?
  - type: text
    content: Tsy matin-tsabatra anefa ireo maty eo aminao
  - type: text
    content: ary tsy maty novonoina tamin’ny ady.
  '20':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: dia hantsoiko i Eliakima,
  - type: text
    content: zanakalahin’i Hilkià mpanompoko,
  '21':
  - type: text
    content: ka hampitafiako ny akanjonao,
  - type: text
    content: sy hampietràko ny fehikibonao
  - type: text
    content: ary hotolorako ny fahefànao.
  - type: text
    content: Ho an’ny mponin’i Jerosalema
  - type: text
    content: sy ny fanjakan’i Joda
  - type: text
    content: dia hanjary ray i Eliakima.
  '22':
  - type: text
    content: Hapetrako eo an-tsorony
  - type: text
    content: ny fanalahidin’ny lapan’i Davida;
  - type: text
    content: ka raha hamoha varavarana izy
  - type: text
    content: dia tsy hisy hanidy,
  - type: text
    content: ary raha hanidy izy
  - type: text
    content: dia tsy hisy hamoha
  - type: note
    content: Ny fanalahidy fahizay dia tena vaventy be tokoa. –Ny faran’ity and ity dia averina ao amin’ny Apôk 3.7.
  - type: text
    content: .
  '23':
  - type: text
    content: Halentiko toy ny tsatòka
  - type: text
    content: eo amin’ny toerana mafy izy,
  - type: text
    content: ka ho tonga anaram-boninahitra
  - type: text
    content: ho an’ny fianakavian-drainy.»
  '24':
  - type: text
    content: 'Kanefa hihantona hitambesatra eo amin’i Eliakima avokoa ny sampan’ny fianakavian-drainy na ny lehibe na ny kely, ka tahaka ny fanaka madinika isan-karazany, hatramin’ny lovia ka hatramin’ny siny, mihantona amina tsatòka anankiray. '
  '25':
  - type: text
    content: «Amin’izany andro izany, hoy ny teny hentitry ny TOMPOn’izao rehetra izao, dia hiletsy ilay tsatòka natsatoka teo amin’ny toerana mafy; hiala izy ka hianjera, ary ho vaky avokoa ireo entana rehetra nahantona teo.» Izany no nambaran’ny TOMPO.
  '3':
  - type: text
    content: Nitsoaka nandositra ireo mpitari-tafikao,
  - type: text
    content: azo babo noho ny tifitra tsipîka izy.
  - type: text
    content: Nataon’ny fahavalo sambo-belona avokoa izay hitany,
  - type: text
    content: hatramin’ireo efa nitsoaka nandositra lavitra aza.
  '4':
  - type: text
    content: 'Izany no itenenako aminareo hoe:'
  - type: text
    content: «Aza mijery ahy intsony fa aleo aho hitomany mafy.
  - type: text
    content: Aza misahirana mampionona ahy akory
  - type: text
    content: noho ny fandringanana nanjo ny fireneko.
  '5':
  - type: text
    content: Satria amin’ity andro anio ity
  - type: text
    content: ny Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: no mandefa fisavoritahana sy faharesena
  - type: text
    content: ary fahaverezan-kevitra ho antsika.»
  - type: text
    content: Rava ny manda eo amin’ny lohasahan’ny fahitana
  - type: text
    content: ary manako hatrany an-tendrombohitra ny antso vonjy!
  '6':
  - type: text
    content: Mitondra tsipîka sy zana-tsipîka ny Helamita,
  - type: text
    content: sady mitaingina kalesy sy soavaly;
  - type: text
    content: ary mamelatra ampinga ny mpiady avy any Kira
  - type: note
    content: 'Helamita, mpiady avy any Kira: miaramila vahiny ao anatin’ny tafika asirianina.'
  - type: text
    content: .
  '7':
  - type: text
    content: Feno kalesy sy soavaly, ry Jerosalema,
  - type: text
    content: ny lohasahanao tsara indrindra;
  - type: text
    content: milahatra eo am-bavahadinao ireny,
  '8':
  - type: text
    content: ka tsy misy fiarovana ho an’i Joda intsony.
  - type: text
    content: Tamin’izany andro izany, dia nojerenareo
  - type: text
    content: ny fitaovam-piadiana napetraka hitoby
  - type: text
    content: tao amin’ilay trano antsoina hoe «Lapan’ny Ala
  - type: note
    content: Jereo 1 Mp 7.2-5; 10.17-21.
  - type: text
    content: »,
  '9':
  - type: text
    content: ary hitanareo ny banga maro
  - type: text
    content: 'amin’ny mandan’ny '
  - type: text
    content: tanànan’i Davida
  - type: text
    content: .
  - type: text
    content: Tao amin’ny fitobian-drano ambany
  - type: note
    content: 'ny fitobian-drano ambany: namboarin’i Ahaza mpanjaka, mba hampitomboana ny tahirin-drano raha sendra misy fahirano.'
  - type: text
    content: no namorianareo rano.
