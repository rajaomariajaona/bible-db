document_id: 1SA.21,396
type_code: plt
verses:
  '1':
  - type: text
    content: Dia lasa nandeha i Davida, fa i Jônatàna kosa nody any an-tanàna.
  - type: heading
    content: I Davida tao Nôba, tao amin’i Ahimelèka mpisorona
  '10':
  - type: text
    content: 'Ka novalian’ity mpisorona hoe:'
  - type: text
    content: –Ao ny sabatr’i Gôliata, ilay Filistinina, matinao tao an-dohasahan’i Elà
  - type: note
    content: 'Ilay sabatr’i Gôliata: jereo toko 17, indrindra 17.51-54. lohasaha Elà: jereo 17.2 sy nta.'
  - type: text
    content: ', fa voafono lamba ao ivohon’ny efôda ao. Raha tianao ny hitondra azy io, dia ento; fa tsy manam-piadiana hafa izahay.'
  - type: text
    content: 'Dia hoy i Davida hoe:'
  - type: text
    content: –Omeo ahy atỳ fa tsy misy tahaka iny akory.
  - type: heading
    content: I Davida tany amin’ny Filistinina tao Gata
  '11':
  - type: text
    content: Tamin’io andro io ihany i Davida dia niainga ka nandositra lavitra an’i Saoly, ary nankany amin’i Akisa mpanjakan’i Gata
  - type: note
    content: 'Gata: jereo 5.8 sy nta.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Hoy ny minisitr’i Akisa taminy:'
  - type: text
    content: '–Tsy i Davida, mpanjakan’ny tanin’i Israely ve ity? Moa tsy izy ve ilay nohiraina sy nandihizan’ny olona hoe:'
  - type: text
    content: «I Saoly nahafaty an’arivoarivo,
  - type: text
    content: fa i Davida kosa nahafaty an’alinalina
  - type: note
    content: Jereo 18.7; 29.5.
  - type: text
    content: .»
  '13':
  - type: text
    content: Nieritreritra izany teny izany tao am-pony i Davida ka natahotra mafy an’i Akisa mpanjakan’i Gata
  - type: note
    content: Jereo Sal 56.1.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Dia nisary adala teo anatrehan’ny Filistinina i Davida ka nody nanao very saina tamin’izy ireo, fa nanao sarisary teo amin’ny lelam-baravarana ary nandraraka ivy teo amin’ny volom-bavany
  - type: note
    content: Jereo Sal 34.1.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Dia hoy i Akisa tamin’ireo minisitra:'
  - type: text
    content: '–Hitanareo tsara fa olona adala io! Ka nahoana no mbola entinareo atỳ amiko? '
  '16':
  - type: text
    content: Mitady olona adala angaha aho no nitondranareo azy io hanondrana eto amiko! Tsia, tsy mba hidiran’io ny tranoko.
  '2':
  - type: text
    content: Tonga tany Nôba
  - type: note
    content: 'Nôba: toerana akaikin’i Jerosalema, eo avarany eo, kanefa tsy dia fantatra mazava ny misy azy.'
  - type: text
    content: ' tao amin’i Ahimelèka mpisorona i Davida. Tamy nitsena azy tamin-kovitra i Ahimelèka ka nanontany azy:'
  - type: text
    content: –Nahoana no mandeha irery tsy misy mpanaraka ianao?
  '3':
  - type: text
    content: 'Dia novalian’i Davida hoe:'
  - type: text
    content: '–Ny mpanjaka no efa nanome baiko ahy hoe: «Aoka tsy hisy hahafantatra mihitsy izao asa anirahiko anao izao!» Izany no nanomezako fotoana ireo tovolahy namako ireo amina toerana iray. '
  '4':
  - type: text
    content: Koa inona no sakafo misy ato aminao izao? Omeo mofo dimy na izay misy aho.
  '5':
  - type: text
    content: 'Fa hoy ilay mpisorona tamin’i Davida:'
  - type: text
    content: –Tsy manana mofo tsotra aho, fa mofo voatokana
  - type: note
    content: 'mofo voatokana: jereo Lev 24.5-9.'
  - type: text
    content: ' ho an’Andriamanitra ihany. Nefa azoko omena ihany ianao raha tàhiny ka tsy niray tamim-behivavy ireo tovolahy ireo tato ho ato.'
  '6':
  - type: text
    content: 'Ka hoy ny navalin’i Davida azy:'
  - type: text
    content: –Izany tokoa, fa tsy niray tamim-behivavy izahay, toy ny taloha ihany rehefa niantafika aho; ka masina ny kitapon’ireo tovolahy namako. Ary na dia tsy masina aza ity dia hiantafika indray maka ity, dia ho masina ihany izy anio amin’ny mofo hatao anaty kitapo
  - type: note
    content: Fanahy inian’i Davida ny valin-teny tsy mazava ataony satria tsy tiany hitsorana amin’i Ahimelèka na mandositra izy na mamita iraka.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Dia ny mofo masina tokoa no nanomezan’ny mpisorona ho an’i Davida, satria tsy nisy mofo hafa. Ireo mofo masina ireo dia mofo natolotra tamin’ny TOMPO ary avy eo dia nesorina tao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' mba hosoloana mofo mafana'
  - type: note
    content: Jereo Mt 12.3-4; Mk 2.25-26; Lk 6.3-4.
  - type: text
    content: .
  '8':
  - type: text
    content: Tamin’io andro io dia tonga teo anatrehan’ny TOMPO ny mpanompon’i Saoly anankiray, dia Dôega
  - type: note
    content: 'Dôega: jereo 22.6-23.'
  - type: text
    content: ', ilay Edômita lehiben’ny mpiandry ondrin’i Saoly.'
  '9':
  - type: text
    content: 'Hoy indray i Davida tamin’i Ahimelèka:'
  - type: text
    content: –Manan-defona na sabatra ve ianao ato? Maika loatra ny iraka nampanaovin’ny mpanjaka ahy, dia tsy voaraiko intsony mbamin’ny sabatro sy ny fiadiako hafa.
