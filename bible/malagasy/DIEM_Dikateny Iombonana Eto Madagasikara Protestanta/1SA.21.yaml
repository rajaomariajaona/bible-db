document_id: 1SA.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa nandeha i Davida, fa i Jônatàna kosa nody any an-tanàna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida tao Nôba, tao amin’i Ahimelèka mpisorona
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ity mpisorona hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ao ny sabatr’i Gôliata, ilay Filistinina, matinao tao an-dohasahan’i Elà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Ilay sabatr’i Gôliata:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo toko 17, indrindra 17.51-54. '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: lohasaha Elà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 17.2 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ', fa voafono lamba ao ivohon’ny efôda ao. Raha tianao ny hitondra azy io, dia ento; fa tsy manam-piadiana hafa izahay.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Omeo ahy atỳ fa tsy misy tahaka iny akory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida tany amin’ny Filistinina tao Gata
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’io andro io ihany i Davida dia niainga ka nandositra lavitra an’i Saoly, ary nankany amin’i Akisa mpanjakan’i Gata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 5.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny minisitr’i Akisa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy i Davida, mpanjakan’ny tanin’i Israely ve ity? Moa tsy izy ve ilay nohiraina sy nandihizan’ny olona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «I Saoly nahafaty an’arivoarivo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa i Davida kosa nahafaty an’alinalina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 18.7; 29.5.
      marker-yv: yv-n
    - type: text
      text: .»
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nieritreritra izany teny izany tao am-pony i Davida ka natahotra mafy an’i Akisa mpanjakan’i Gata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 56.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisary adala teo anatrehan’ny Filistinina i Davida ka nody nanao very saina tamin’izy ireo, fa nanao sarisary teo amin’ny lelam-baravarana ary nandraraka ivy teo amin’ny volom-bavany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 34.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Akisa tamin’ireo minisitra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hitanareo tsara fa olona adala io! Ka nahoana no mbola entinareo atỳ amiko? '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mitady olona adala angaha aho no nitondranareo azy io hanondrana eto amiko! Tsia, tsy mba hidiran’io ny tranoko.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tonga tany Nôba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nôba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana akaikin’i Jerosalema, eo avarany eo, kanefa tsy dia fantatra mazava ny misy azy.
      marker-yv: yv-n
    - type: text
      text: ' tao amin’i Ahimelèka mpisorona i Davida. Tamy nitsena azy tamin-kovitra i Ahimelèka ka nanontany azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no mandeha irery tsy misy mpanaraka ianao?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny mpanjaka no efa nanome baiko ahy hoe: «Aoka tsy hisy hahafantatra mihitsy izao asa anirahiko anao izao!» Izany no nanomezako fotoana ireo tovolahy namako ireo amina toerana iray. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa inona no sakafo misy ato aminao izao? Omeo mofo dimy na izay misy aho.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ilay mpisorona tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy manana mofo tsotra aho, fa mofo voatokana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mofo voatokana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lev 24.5-9.
      marker-yv: yv-n
    - type: text
      text: ' ho an’Andriamanitra ihany. Nefa azoko omena ihany ianao raha tàhiny ka tsy niray tamim-behivavy ireo tovolahy ireo tato ho ato.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navalin’i Davida azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izany tokoa, fa tsy niray tamim-behivavy izahay, toy ny taloha ihany rehefa niantafika aho; ka masina ny kitapon’ireo tovolahy namako. Ary na dia tsy masina aza ity dia hiantafika indray maka ity, dia ho masina ihany izy anio amin’ny mofo hatao anaty kitapo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fanahy inian’i Davida ny valin-teny tsy mazava ataony satria tsy tiany hitsorana amin’i Ahimelèka na mandositra izy na mamita iraka.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ny mofo masina tokoa no nanomezan’ny mpisorona ho an’i Davida, satria tsy nisy mofo hafa. Ireo mofo masina ireo dia mofo natolotra tamin’ny TOMPO ary avy eo dia nesorina tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' mba hosoloana mofo mafana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 12.3-4; Mk 2.25-26; Lk 6.3-4.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’io andro io dia tonga teo anatrehan’ny TOMPO ny mpanompon’i Saoly anankiray, dia Dôega
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Dôega: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 22.6-23.
      marker-yv: yv-n
    - type: text
      text: ', ilay Edômita lehiben’ny mpiandry ondrin’i Saoly.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray i Davida tamin’i Ahimelèka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manan-defona na sabatra ve ianao ato? Maika loatra ny iraka nampanaovin’ny mpanjaka ahy, dia tsy voaraiko intsony mbamin’ny sabatro sy ny fiadiako hafa.
