    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Sal 110.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Eny, i Kristy no nandavorary mandrakizay, tamin’ny fanatitra iray ihany, ireo olona efa nodioviny ho afaka amin’ny ota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ambaran’ny Fanahy Masina amintsika koa izany, fa hoy Izy aloha hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Izao no Fanekempihavanana hataoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'rehefa afaka izany andro izany, hoy ny Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko ao an-tsainy ny lalànako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hosoratako ao am-pony.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy koa ny Fanahy Masina hoe:'
- type: usfm
  marker: q1
