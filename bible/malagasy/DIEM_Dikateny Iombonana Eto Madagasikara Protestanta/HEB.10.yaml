  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aoka hohazonintsika mafy tsy azo hozongozonina ny fiekena ny zavatra antenaintsika, satria mahatoky Andriamanitra nanao ny fampanantenana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aoka isika samy hifampihevitra ka hifampirisika hampandroso ny fitiavana sy ny asa tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aza mahafoy ny fiarahantsika miangona, tahaka ny fanaon’ny sasany zatra tsy miangona; mifampirisiha kosa isika, mainka fa hitanareo mihantomotra ilay andro hiavian’ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Satria efa nandray ny fahalalana tsara ny fampianarana marim-pototra isika no mbola minia manota ihany, dia tsy misy sorona ho afa-manala ny ota intsony; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
