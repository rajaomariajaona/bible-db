  - type: text
    text: ' sy mihevitra fa ny ra iorenan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanekempihavanana
  - type: text
    text: ' sady nanadiovana azy dia tsy misy hasiny ary maniratsira ny Fanahy Masina nandraisany fahasoavana? Hanao ahoana ny hamafin’ny fampijaliana heverinareo fa tokony hihatra aminy? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Eny, fantatsika Ilay niteny hoe: «Ahy ny famaliana, Izaho no hamaly», ary niteny koa hoe: «Ny Tompo no hitsara ny vahoakany'
  - type: usfm
