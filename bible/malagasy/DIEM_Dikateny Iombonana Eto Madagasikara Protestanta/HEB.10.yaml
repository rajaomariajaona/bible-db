    - type: text
      text: '1'
  - type: text
    text: 'Tsy fanehoana ny tena izy tsy akory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: ' jiosy, fa tandindon’ny zava-tsoa ho avy. Tsy mahatanteraka velively ny olona manantena an’Andriamanitra ny lalàna jiosy, na dia naverimberina isan-taona hatrany hatrany aza ny fanolorana ireo sorona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha mba voadio tanteraka ho afaka tamin’ny otany tokoa ireo mpanao izany fanompoam-pivavahana izany, dia tsy hoenjehin’ny fieritreretany intsony, ka ho nitsahatra nanolotra sorona. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny asan’ireo sorona ireo dia ny mampahatsiaro ny olona isan-taona ny fahotany; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: fa ny ran’ombilahy sy ny ran’osilahy dia tsy hanaisotra ny fahotana na oviana na oviana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Noho izany, fony niditra teto amin’izao tontolo izao i Kristy, dia niteny tamin’Andriamanitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy nilainao ny sorona sy ny fanatitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tena no namboarinao ho Ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
