document_id: HEB.10,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tsy fanehoana ny tena izy tsy akory ny '
  - type: text
    content: lalàna
  - type: text
    content: ' jiosy, fa tandindon’ny zava-tsoa ho avy. Tsy mahatanteraka velively ny olona manantena an’Andriamanitra ny lalàna jiosy, na dia naverimberina isan-taona hatrany hatrany aza ny fanolorana ireo sorona ireo. '
  '10':
  - type: text
    content: ary satria notontosain’i Jesoa Kristy ny sitrapon’Andriamanitra, dia voadio afaka tamin’ny fahotana isika noho ny nanoloran’i Jesoa Kristy indray mandeha monja ny tenany.
  '11':
  - type: text
    content: Ny mpisorona rehetra dia samy nijoro isan’andro manao fanompoam-pivavahana sy manolotra matetika ny sorona fanaony, izay sorona tsy mahaisotra ny fahotana velively
  - type: note
    content: Jereo Eks 29.38.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Fa i Kristy kosa dia nanolotra sorona fanalana ny ota indray mandeha monja ho sorona manan-kery mandrakizay, ary efa mipetraka eo ankavanan’Andriamanitra; '
  '13':
  - type: text
    content: ka dia eo Izy ankehitriny miandry ny hanaovan’Andriamanitra ny fahavalony ho fitoeran-tongony
  - type: note
    content: 'And 12-13: jereo Sal 110.1.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Eny, i Kristy no nandavorary mandrakizay, tamin’ny fanatitra iray ihany, ireo olona efa nodioviny ho afaka amin’ny ota.
  '15':
  - type: text
    content: 'Ary ambaran’ny Fanahy Masina amintsika koa izany, fa hoy Izy aloha hoe:'
  '16':
  - type: text
    content: «Izao no Fanekempihavanana hataoko
  - type: text
    content: 'amin’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: 'rehefa afaka izany andro izany, hoy ny Tompo:'
  - type: text
    content: Hataoko ao an-tsainy ny lalànako,
  - type: text
    content: ary hosoratako ao am-pony.»
  '17':
  - type: text
    content: 'Ary hoy koa ny Fanahy Masina hoe:'
  - type: text
    content: «Tsy hotsarovako intsony ny fahotany sy ny helony
  - type: note
    content: 'And 16-17: Jer 31.33-34.'
  - type: text
    content: .»
  '18':
  - type: text
    content: Ka rehefa voavela ny fahotana sy ny heloka, dia tsy misy ilana fanatitra ho fanalana izany intsony.
  - type: heading
    content: Aoka isika hanatona an’Andriamanitra
  '19':
  - type: text
    content: 'Koa isika, ry havana, dia manana ny tena fahafahana hiditra ao amin’ny '
  - type: text
    content: Toeramasina Indrindra
  - type: text
    content: ', noho ny ra nafoin’i Jesoa. '
  '2':
  - type: text
    content: 'Fa raha mba voadio tanteraka ho afaka tamin’ny otany tokoa ireo mpanao izany fanompoam-pivavahana izany, dia tsy hoenjehin’ny fieritreretany intsony, ka ho nitsahatra nanolotra sorona. '
  '20':
  - type: text
    content: 'Nanokafany lalana vaovao mitondra amin’ny fiainana isika: dia lalana mamaky eo amin’ny efitra lamba, izany hoe eo amin’ny tenan’i Jesoa. '
  '21':
  - type: text
    content: 'Manana Mpisorona lehibe izay mifehy ny tranon’Andriamanitra isika; '
  '22':
  - type: text
    content: koa aoka isika hanatona an’Andriamanitra amin’ny fo mahitsy sy amin’ny fahatokiana vokatry ny finoana, rehefa voadio ho afaka amin’ny fieritreretana vesaran’ota ny fontsika ary rehefa voasasa tamin’ny rano madio ny tenantsika
  - type: note
    content: Ampit Ezek 36.25.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Aoka hohazonintsika mafy tsy azo hozongozonina ny fiekena ny zavatra antenaintsika, satria mahatoky Andriamanitra nanao ny fampanantenana. '
  '24':
  - type: text
    content: 'Aoka isika samy hifampihevitra ka hifampirisika hampandroso ny fitiavana sy ny asa tsara. '
  '25':
  - type: text
    content: Aza mahafoy ny fiarahantsika miangona, tahaka ny fanaon’ny sasany zatra tsy miangona; mifampirisiha kosa isika, mainka fa hitanareo mihantomotra ilay andro hiavian’ny Tompo.
  '26':
  - type: text
    content: 'Satria efa nandray ny fahalalana tsara ny fampianarana marim-pototra isika no mbola minia manota ihany, dia tsy misy sorona ho afa-manala ny ota intsony; '
  '27':
  - type: text
    content: fa ny andrasantsika amin-tahotra dia ilay andro fitsarana sy ny afo midedadeda handevona ny fahavalon’Andriamanitra
  - type: note
    content: Is 26.11, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Izay mandika ny '
  - type: text
    content: lalànan
  - type: text
    content: ’i Mosesy dia vonoina tsy asiana indrafo, rehefa hita fa meloka araka ny tenin’ny vavolombelona roa na telo
  - type: note
    content: Ampit Fifan 19.15.
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Hanao ahoana kosa àry izay manao tsinontsinona ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' sy mihevitra fa ny ra iorenan’ny '
  - type: text
    content: Fanekempihavanana
  - type: text
    content: ' sady nanadiovana azy dia tsy misy hasiny ary maniratsira ny Fanahy Masina nandraisany fahasoavana? Hanao ahoana ny hamafin’ny fampijaliana heverinareo fa tokony hihatra aminy? '
  '3':
  - type: text
    content: 'Ny asan’ireo sorona ireo dia ny mampahatsiaro ny olona isan-taona ny fahotany; '
  '30':
  - type: text
    content: 'Eny, fantatsika Ilay niteny hoe: «Ahy ny famaliana, Izaho no hamaly», ary niteny koa hoe: «Ny Tompo no hitsara ny vahoakany'
  - type: note
    content: Fifan 32.35 sy 36.
  - type: text
    content: '.» '
  '31':
  - type: text
    content: Zavatra mahatahotra izany ho azon’ny tanan’ilay Andriamanitra velona!
  '32':
  - type: text
    content: 'Tsarovy ny nanjo anareo tamin’ny andro fahiny. Fa rehefa nohazavain’Andriamanitra ianareo, dia niharam-pijaliana sy niaritra ady mafy tokoa: '
  '33':
  - type: text
    content: 'novetavetaina sy nampahorîna teo imasom-bahoaka ianareo indraindray, na niara-nizaka izay nanjo an’ireo natao toy izany koa indraindray; '
  '34':
  - type: text
    content: 'niarahanareo niaritra ny fijalian’izay voafonja; ary nony norobaina ny fanananareo, dia nekenareo tamin-kafaliana izany satria fantatrareo fa manam-pananana tsara lavitra sady maharitra ianareo. '
  '35':
  - type: text
    content: 'Koa aza manary ny fahatokianareo fa misy valisoa lehibe izany. '
  '36':
  - type: text
    content: 'Ilainareo tokoa ny faharetana mba hanaovanareo ny sitrapon’Andriamanitra ka hahazoanareo izay ampanantenainy. '
  '37':
  - type: text
    content: 'Fa hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Kely foana sisa
  - type: text
    content: dia ho tonga Ilay tsy maintsy ho avy,
  - type: text
    content: fa tsy hitaredretra.
  '38':
  - type: text
    content: Ary ny olo-marina eo imasoko noho ny finoana dia ho velona;
  - type: text
    content: fa raha mihemotra izy, dia tsy sitrako
  - type: note
    content: 'And 37-38: Hab 2.3-4, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  '39':
  - type: text
    content: Isika kosa dia tsy mba naman’izay mihemotra ka ho very fa naman’izay mino ka ho voavonjy.
  '4':
  - type: text
    content: fa ny ran’ombilahy sy ny ran’osilahy dia tsy hanaisotra ny fahotana na oviana na oviana.
  '5':
  - type: text
    content: 'Noho izany, fony niditra teto amin’izao tontolo izao i Kristy, dia niteny tamin’Andriamanitra hoe:'
  - type: text
    content: «Tsy nilainao ny sorona sy ny fanatitra,
  - type: text
    content: fa tena no namboarinao ho Ahy;
  '6':
  - type: text
    content: 'tsy sitrakao ireo biby dorana eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: sy ireo sorona ho fanalana ny ota,
  '7':
  - type: text
    content: 'ka hoy Aho hoe: ‹Intỳ aho, Andriamanitra ô,'
  - type: text
    content: tonga hanao ny sitraponao›;
  - type: text
    content: fa izany no voasoratra momba Ahy,
  - type: text
    content: ao amin’ny horonambokin’ny lalàna
  - type: note
    content: 'And 5-7: Sal 40.6-8, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  '8':
  - type: text
    content: 'Voalohany indrindra dia hoy i Kristy: «Tsy nilainao sady tsy sitrakao ny sorona sy ny fanatitra, ary ny biby dorana eo amin’ny alitara sy ny sorona ho fanalana ny ota»; kanefa ireo rehetra ireo dia natolotra araka ny lalàna avokoa. '
  '9':
  - type: text
    content: 'Ary hoy koa Izy: «Intỳ aho, Andriamanitra ô, tonga hanao ny sitraponao.» Koa dia foanan’Andriamanitra ny sorona taloha rehetra ka soloany ny soron’i Kristy; '
