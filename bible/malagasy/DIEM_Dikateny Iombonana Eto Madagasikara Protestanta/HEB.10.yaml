  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ka rehefa voavela ny fahotana sy ny heloka, dia tsy misy ilana fanatitra ho fanalana izany intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aoka isika hanatona an’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa isika, ry havana, dia manana ny tena fahafahana hiditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina Indrindra
  - type: text
    text: ', noho ny ra nafoin’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nanokafany lalana vaovao mitondra amin’ny fiainana isika: dia lalana mamaky eo amin’ny efitra lamba, izany hoe eo amin’ny tenan’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manana Mpisorona lehibe izay mifehy ny tranon’Andriamanitra isika; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: koa aoka isika hanatona an’Andriamanitra amin’ny fo mahitsy sy amin’ny fahatokiana vokatry ny finoana, rehefa voadio ho afaka amin’ny fieritreretana vesaran’ota ny fontsika ary rehefa voasasa tamin’ny rano madio ny tenantsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: ft
