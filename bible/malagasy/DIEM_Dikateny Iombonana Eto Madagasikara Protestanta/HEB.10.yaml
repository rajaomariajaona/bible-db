  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voalohany indrindra dia hoy i Kristy: «Tsy nilainao sady tsy sitrakao ny sorona sy ny fanatitra, ary ny biby dorana eo amin’ny alitara sy ny sorona ho fanalana ny ota»; kanefa ireo rehetra ireo dia natolotra araka ny lalàna avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy koa Izy: «Intỳ aho, Andriamanitra ô, tonga hanao ny sitraponao.» Koa dia foanan’Andriamanitra ny sorona taloha rehetra ka soloany ny soron’i Kristy; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary satria notontosain’i Jesoa Kristy ny sitrapon’Andriamanitra, dia voadio afaka tamin’ny fahotana isika noho ny nanoloran’i Jesoa Kristy indray mandeha monja ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny mpisorona rehetra dia samy nijoro isan’andro manao fanompoam-pivavahana sy manolotra matetika ny sorona fanaony, izay sorona tsy mahaisotra ny fahotana velively
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 29.38.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa i Kristy kosa dia nanolotra sorona fanalana ny ota indray mandeha monja ho sorona manan-kery mandrakizay, ary efa mipetraka eo ankavanan’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ka dia eo Izy ankehitriny miandry ny hanaovan’Andriamanitra ny fahavalony ho fitoeran-tongony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: bdit
      children:
      - type: text
