    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Zavatra mahatahotra izany ho azon’ny tanan’ilay Andriamanitra velona!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tsarovy ny nanjo anareo tamin’ny andro fahiny. Fa rehefa nohazavain’Andriamanitra ianareo, dia niharam-pijaliana sy niaritra ady mafy tokoa: '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'novetavetaina sy nampahorîna teo imasom-bahoaka ianareo indraindray, na niara-nizaka izay nanjo an’ireo natao toy izany koa indraindray; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'niarahanareo niaritra ny fijalian’izay voafonja; ary nony norobaina ny fanananareo, dia nekenareo tamin-kafaliana izany satria fantatrareo fa manam-pananana tsara lavitra sady maharitra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa aza manary ny fahatokianareo fa misy valisoa lehibe izany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ilainareo tokoa ny faharetana mba hanaovanareo ny sitrapon’Andriamanitra ka hahazoanareo izay ampanantenainy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
