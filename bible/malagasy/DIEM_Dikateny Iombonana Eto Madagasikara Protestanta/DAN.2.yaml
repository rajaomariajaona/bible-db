document_id: DAN.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nofy voalohany nataon’i Nebokadnetsara
  - type: text
    content: 'Ary tamin’ny taona faharoa nanjakan’i Nebokadnetsara, dia nanonofy izy. Nampitebiteby azy izany, hany ka tsy nahitany tory. '
  '10':
  - type: text
    content: 'Dia namaly teo anatrehan’ny mpanjaka indray ny mpanandro ka nanao hoe:'
  - type: text
    content: '–Tsy misy olona eto ambonin’ny tany afaka hilaza izany nofinao izany, ry mpanjaka! Ary tsy mbola nisy mpanjaka, na dia izay lehibe sy mahery aza, ka nanontany zavatra toy izany tamin’ny mpanao majika aman-tsikidy sy ny mpanandro. '
  '11':
  - type: text
    content: Ary ny zavatra izay angatahinao dia faran’izay lalina, ka tsy misy afaka manambara azy eo anatrehanao raha tsy ireo andriamanitra izay tsy miara-monina amin’ny olombelona.
  '12':
  - type: text
    content: Dia tezitra nisafoaka mafy noho izany rehetra izany ny mpanjaka, ka nanome baiko mba handringanana ny olon-kendry
  - type: note
    content: 'olon-kendry: io teny io dia enti-manondro ireo manam-pahaizana manokana momba ny sikidy sy ny fanandroana voatanisa eo amin’ny and 2.'
  - type: text
    content: ' rehetra ao Babilôna. '
  '13':
  - type: text
    content: Dia navoaka ny didy mampamono ho faty ireo olon-kendry; ary notadiavina koa i Daniela sy ny namany mba hovonoina ho faty.
  - type: heading
    content: Nambaran’Andriamanitra tamin’i Daniela ny nofin’ny mpanjaka.
  '14':
  - type: text
    content: 'Ary niainga tokoa i Ariôka, lehiben’ny mpiambina ny mpanjaka, mba hamono ho faty ireo olon-kendrin’i Babilôna. Kanefa teny feno fahamalinana sy fahendrena no nasetrin’i Daniela an’i Ariôka; '
  '15':
  - type: text
    content: 'nanontaniany momba ny antony nahahenjana ny didy navoakan’ny mpanjaka i Ariôka, dia nampahafantatra azy ny toe-javatra. '
  '16':
  - type: text
    content: Avy eo nankany amin’ny mpanjaka i Daniela ary niangavy azy mba hanome fotoana hahazoany manambara amin’ny mpanjaka ny hevitry ny nofiny.
  '17':
  - type: text
    content: 'Dia nody tany an-tranony i Daniela ka nampahafantatra an’i Hananià sy i Misaela ary i Hazarià namany ny toe-javatra; '
  '18':
  - type: text
    content: 'ary nangatahiny izy telo lahy mba hitalaho ny famindrampon’ilay Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: ' momba ity zava-miafina ity, ka mba tsy haringana miaraka amin’ireo olon-kendrin’i Babilôna sisa i Daniela sy ny namany. '
  '19':
  - type: text
    content: 'Ary naseho an’i Daniela tamin’ny fahitana nandritra ny alina ilay zava-miafina; koa nidera an’ilay Andriamanitry ny lanitra izy. '
  '2':
  - type: text
    content: 'Dia nasain’ny mpanjaka nantsoina ny mpanao majika aman-tsikidy sy ny mpimasy ary ny mpanandro mba hanambara aminy ny hevitry ny nofiny. Nony tonga ireo ka niseho teo anatrehan’ny mpanjaka, '
  '20':
  - type: text
    content: 'Dia niteny i Daniela ka nanao hoe:'
  - type: text
    content: «Hisaorana anie ny anaran’Andriamanitra
  - type: text
    content: hatrizay hatrizay ka ho mandrakizay,
  - type: text
    content: satria Azy ny fahendrena sy ny hery!
  '21':
  - type: text
    content: Izy no tompon’ny fotoana sy ny tantara;
  - type: text
    content: Izy no manonga-mpanjaka sy mananga-mpanjaka;
  - type: text
    content: Izy no manome ny fahendrena ho an’ny hendry
  - type: text
    content: ary ny fahaiza-manavaka ho an’ny mahira-tsaina.
  '22':
  - type: text
    content: Izy no mampiseho ny zavatra lalina sy miafina
  - type: text
    content: sady mahalala izay misy ao amin’ny maizina,
  - type: text
    content: satria ny mazava no miara-mitoetra aminy.
  '23':
  - type: text
    content: Misaotra sy midera Anao aho,
  - type: text
    content: ry Andriamanitry ny razako ô,
  - type: text
    content: satria nomenao fahendrena sy hery.
  - type: text
    content: Ary ankehitriny nampahafantarinao ahy
  - type: text
    content: izay zavatra nangatahinay taminao,
  - type: text
    content: ka nambaranao anay ilay nofin’ny mpanjaka.
  '24':
  - type: text
    content: 'Teo anoloan’izany i Daniela dia nankany amin’i Ariôka izay voatendrin’ny mpanjaka handringana ny olon-kendry rehetra ao Babilôna, ka avy hatrany i Daniela dia niteny taminy hoe:'
  - type: text
    content: –Aza aringana ny olon-kendrin’i Babilôna! Ento ho eo anatrehan’ny mpanjaka aho fa ny tenako no hanambara aminy ny hevitry ny nofiny.
  '25':
  - type: text
    content: 'Dia nitondra haingana an’i Daniela ho eo anatrehan’ny mpanjaka i Ariôka sady niteny tamin’i Nebokadnetsara hoe:'
  - type: text
    content: –Nahita lehilahy isan’ny babo avy any Joda aho, ry mpanjaka; izy io no hanambara aminao ny hevitry ny nofinao.
  - type: heading
    content: Ilay sarivongana manan-tongo-marefo
  '26':
  - type: text
    content: 'Dia niresahan’ny mpanjaka i Daniela izay antsoina hoe Beltesatsara ka nanontaniany hoe:'
  - type: text
    content: –Moa afaka hampahalala ahy ny nofiko sy ny heviny tokoa va ianao?
  '27':
  - type: text
    content: 'Dia namaly ny mpanjaka i Daniela ka nanao hoe:'
  - type: text
    content: '–Tsy misy olon-kendry na mpisikidy na mpanao majika na ombiasy afaka hanambara aminao ny zava-miafina izay anontanianao, ry mpanjaka! '
  '28':
  - type: text
    content: Fa misy Andriamanitra any an-
  - type: text
    content: danitra
  - type: text
    content: ' ambony any Izay mampiseho ny zava-miafina, ka Izy no nampahafantatra an’i Nebokadnetsara mpanjaka izay hiseho amin’ny hoavy. Koa izao àry ny nofinao sy ny fahitana tao an-tsainao teo am-pandriana. '
  '29':
  - type: text
    content: 'Raha natory ianao, ry mpanjaka, dia lasan’eritreritra ny amin’izay hiseho rahatrizay; koa Ilay mampiseho ny zava-miafina dia nampahafantatra anao izay hiseho rahatrizay. '
  '3':
  - type: text
    content: 'dia nilazany hoe:'
  - type: text
    content: –Nanonofy aho ka nampitebiteby ahy izany; liana te hahalala ilay nofy aho.
  '30':
  - type: text
    content: Ary raha naseho tamiko io zava-miafina io, dia tsy hoe manam-pahendrena mihoatra noho ny miaina rehetra aho akory, fa mba hahazoana mampahalala anao ny hevitry ny nofinao, ry mpanjaka, ka hahafantaranao izay eritreritry ny fonao.
  '31':
  - type: text
    content: '«Ry mpanjaka ô, izao àry no hitanao: Nisy sarivongana iray tena lehibe nijoro teo anoloanao ary namirapiratra sady nahatahotra ny endriny. '
  '32':
  - type: text
    content: 'Volamena madio ny lohan’io sarivongana io, volafotsy kosa ny tratrany sy ny tanany, halimo ny kibony sy ny feny, '
  '33':
  - type: text
    content: 'vy ny ranjony; ary ny tongony dia vy ny ampahany ary tanimanga ny ampahany. '
  '34':
  - type: text
    content: Dia nijery tsara io sarivongana io ianao mandra-piendaky ny vato iray tamina tendrombohitra
  - type: note
    content: 'tamina tendrombohitra: araka ny dkt tranainy grika sy ny and 45; tsy hita ao amin’ny rijan-teny fototra aramianina eo amin’ny and 34.'
  - type: text
    content: ' nefa tsy nendahan-tanana; namely an’ireo tongotra vy sy tanimanga tamin’ilay sarivongana io vato io ka nahatorotoro ny tongony roa. '
  '35':
  - type: text
    content: Ary torotoro avy hatrany koa ny vy sy tanimanga mbamin’ny halimo sy volafotsy ary volamena, ka tonga toy ny akofa eny am-pamoloana fahavaratra; dia nopaohin’ny rivotra ireo, ka tsy hita intsony izay nitoerany. Ary ilay vato izay namely ny sarivongana dia tonga tendrombohitra lehibe ka nameno ny tany manontolo
  - type: note
    content: Jereo Jer 4.11 sy nta.
  - type: text
    content: .
  '36':
  - type: text
    content: '«Izany ilay nofinao, ry mpanjaka, ary ny heviny koa dia holazaina eto anatrehanao. '
  '37':
  - type: text
    content: 'Ry mpanjaka ô, ianao no mpanjakan’ny mpanjaka fa nomen’ilay Andriamanitry ny lanitra ho anao ny fanjakana sy ny hery ary ny tanjaka sy ny voninahitra. '
  '38':
  - type: text
    content: 'Napetrany eo ambany fifehezanao koa ny olombelona sy ny biby eny an-tsaha ary ny voro-manidina; eo ambany fifehezanao ireny, na aiza na aiza itoerany, ka ianao no nataon’Andriamanitra ho mpanjakan’izy rehetra; ianao izany no ilay loha volamena. '
  '39':
  - type: text
    content: 'Hisy fanjakana malemy kokoa noho ny anao, hitsangana aorianao; avy eo dia hisy fanjakana fahatelo izay ambaran’ny halimo ka hitatra amin’ny tany manontolo. '
  '4':
  - type: text
    content: Namaly ny mpanjaka tamin’ny teny aramianina
  - type: note
    content: 'teny aramianina: manomboka eto ka hatramin’ny toko 7.28, ny rijan-teny manontolo dia amin’ny fiteny aramianina izay fiteny iraisam-pirenena nampiasaina tany Atsinanana-akaiky nanomboka tamin’ny taonjato faha-8 tal J.K.'
  - type: text
    content: ' ireo mpanandro ka nanao hoe:'
  - type: text
    content: –Ho ela velona anie ianao, ry mpanjaka! Lazao aminay mpanomponao ny nofinao, dia hambaranay anao ny heviny.
  '40':
  - type: text
    content: Ary ny fanjakana fahefatra dia ho mafy tahaka ny vy. Tahaka ny anorotoroan’ny vy sy anapotehany ary anamontsanany ny zavatra rehetra no hanorotoroan’io fanjakana io sy hanamontsanany ireo fanjakana rehetra talohany
  - type: note
    content: Ireo metaly isan-karazany izay manao lanja midina mirafitra amin’ny sarivongana dia mampiseho an’ohatra ny fifandimbiasan’ny fanjakana Babilônianina, sy Medianina, sy Persianina ary Grika na ny fanjakana Babilônianina, fanjakana Medianina-Persianina, fanjakana Grika sy Rômanina araka ny fiheverana sasany.
  - type: text
    content: '. '
  '41':
  - type: text
    content: 'Ary, araka ny hitanao, ny tongotr’ilay sarivongana sy ny rantsan-tongony dia tanimanga ny ampahany ary vy ny ampahany, izany hoe hizara io fanjakana io. Hisy fahamafisana toy ny an’ny vy ao aminy, satria hitanao fa ny vy dia nifangaro tamin’ny tanimanga; '
  '42':
  - type: text
    content: 'kanefa ny rantsan-tongotra, izay vy ny ampahany ary tanimanga ny ampahany, dia maneho tahaka izany koa fa ny ampahan’io fanjakana io dia hatanjaka ary ny ampahany kosa halemy. '
  '43':
  - type: text
    content: Ny vy izay hitanao nifangaro tamin’ny tanimanga dia mampiseho ihany koa fa hifangaro amin’ny fanambadiana ireo mpanjaka; nefa tsy ho mafy io fitambarana io tahaka ny tsy mahamafy ny fitambaran’ny vy amin’ny tanimanga
  - type: note
    content: Ampit 11.6,17.
  - type: text
    content: .
  '44':
  - type: text
    content: '«Amin’ny andron’ireo mpanjaka ireo ilay Andriamanitry ny lanitra no hanangana fanjakana izay tsy ho rava na oviana na oviana; ary ny fiandrianany tsy ho lasan’ny firenen-kafa. Io fanjakana io no hanorotoro sy handevona ireo fanjakana rehetra talohany, fa izy kosa hitoetra mandrakizay. '
  '45':
  - type: text
    content: Izany no ambaran’ilay vato
  - type: note
    content: Io vato io dia milaza ny hahatongavan’ny fanjakana iray vaovao izay haorin’Andriamanitra.
  - type: text
    content: ' izay hitanao niendaka tamina tendrombohitra nefa tsy nendahan-tanana, ka nanapotika ny vy sy halimo mbamin’ny tanimanga sy volafotsy ary volamena. Nampahafantarin’Andriamanitra lehibe anao, ry mpanjaka ô, izay hiseho amin’ny hoavy. Tena marina ny nofinao ary azo antoka ny heviny.»'
  '46':
  - type: text
    content: 'Dia niankohoka i Nebokadnetsara mpanjaka, ka nanome voninahitra an’i Daniela ary nampanolotra fanomezana sy zava-manitra ho azy. '
  '47':
  - type: text
    content: 'Izay ny mpanjaka vao namaly an’i Daniela ka nanao hoe:'
  - type: text
    content: –Marina tokoa fa ny Andriamanitrareo no Andriamanitry ny andriamanitra sy Tompon’ny mpanjaka ary mpanambara ny zava-miafina, matoa afaka nanambara tamiko izany zava-miafina izany ianao.
  '48':
  - type: text
    content: 'Tamin’izay ny mpanjaka dia nanandratra an’i Daniela ka nanome azy zava-tsarobidy marobe ary nanendry azy ho mpifehy amin’ny faritanin’i Babilôna manontolo sy ho lehiben’ireo olon-kendry rehetra ao Babilôna. '
  '49':
  - type: text
    content: Noho ny fangatahan’i Daniela tamin’ny mpanjaka dia i Sadràka sy i Mesàka ary i Habeda-Negao no voatendrin’i Nebokadnetsara hitondra ny faritanin’i Babilôna; fa i Daniela kosa lasa mpanolotsainan’ny mpanjaka
  - type: note
    content: 'fa i Daniela... mpanjaka: dkt hafa fa i Daniela kosa tao an-dapan’ny mpanjaka.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Namaly an’ireo mpanandro kosa ny mpanjaka, ka nanao taminy hoe:'
  - type: text
    content: '–Hentitra ny teniko fa raha tsy hampahafantarinareo ahy ny nofy sy ny heviny, dia hotetitetehina ianareo, ary horavana ny tranonareo. '
  '6':
  - type: text
    content: Fa raha mahalaza amiko ny nofy sy ny heviny kosa ianareo, dia hahazo fanomezana sy valisoa ary voninahitra lehibe avy amiko. Noho izany ambarao ahy ny nofy sy ny heviny.
  '7':
  - type: text
    content: 'Dia namaly azy indray ireo ka nanao hoe:'
  - type: text
    content: –Ry mpanjaka ô, aoka holazainao aminay mpanomponao ny nofy, dia hasehonay ny heviny.
  '8':
  - type: text
    content: 'Fa namaly ny mpanjaka, ka nanao hoe:'
  - type: text
    content: '–Fantatro marina izao fa mitady handany andro ianareo, satria tsapanareo fa hentitra ny teniko. '
  '9':
  - type: text
    content: Fa raha tsy manambara amiko ny nofy ianareo, dia hitovy ny famaizana hatao aminareo rehetra; sady ianareo niray tetika hilaza lainga sy fitaka eto anatrehako mandra-piovan’ny toe-javatra. Koa ambarao ahy ny nofy, dia ho fantatro fa mahalaza ny heviny amiko ianareo.
