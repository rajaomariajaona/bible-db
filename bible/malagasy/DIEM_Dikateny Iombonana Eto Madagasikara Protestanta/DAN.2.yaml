document_id: DAN.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nofy voalohany nataon’i Nebokadnetsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin’ny taona faharoa nanjakan’i Nebokadnetsara, dia nanonofy izy. Nampitebiteby azy izany, hany ka tsy nahitany tory. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nasain’ny mpanjaka nantsoina ny mpanao majika aman-tsikidy sy ny mpimasy ary ny mpanandro mba hanambara aminy ny hevitry ny nofiny. Nony tonga ireo ka niseho teo anatrehan’ny mpanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nanonofy aho ka nampitebiteby ahy izany; liana te hahalala ilay nofy aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Namaly ny mpanjaka tamin’ny teny aramianina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'teny aramianina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manomboka eto ka hatramin’ny toko 7.28, ny rijan-teny manontolo dia amin’ny fiteny aramianina izay fiteny iraisam-pirenena nampiasaina tany Atsinanana-akaiky nanomboka tamin’ny taonjato faha-8 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ' ireo mpanandro ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho ela velona anie ianao, ry mpanjaka! Lazao aminay mpanomponao ny nofinao, dia hambaranay anao ny heviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Namaly an’ireo mpanandro kosa ny mpanjaka, ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hentitra ny teniko fa raha tsy hampahafantarinareo ahy ny nofy sy ny heviny, dia hotetitetehina ianareo, ary horavana ny tranonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa raha mahalaza amiko ny nofy sy ny heviny kosa ianareo, dia hahazo fanomezana sy valisoa ary voninahitra lehibe avy amiko. Noho izany ambarao ahy ny nofy sy ny heviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia namaly azy indray ireo ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry mpanjaka ô, aoka holazainao aminay mpanomponao ny nofy, dia hasehonay ny heviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa namaly ny mpanjaka, ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fantatro marina izao fa mitady handany andro ianareo, satria tsapanareo fa hentitra ny teniko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha tsy manambara amiko ny nofy ianareo, dia hitovy ny famaizana hatao aminareo rehetra; sady ianareo niray tetika hilaza lainga sy fitaka eto anatrehako mandra-piovan’ny toe-javatra. Koa ambarao ahy ny nofy, dia ho fantatro fa mahalaza ny heviny amiko ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia namaly teo anatrehan’ny mpanjaka indray ny mpanandro ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy misy olona eto ambonin’ny tany afaka hilaza izany nofinao izany, ry mpanjaka! Ary tsy mbola nisy mpanjaka, na dia izay lehibe sy mahery aza, ka nanontany zavatra toy izany tamin’ny mpanao majika aman-tsikidy sy ny mpanandro. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny zavatra izay angatahinao dia faran’izay lalina, ka tsy misy afaka manambara azy eo anatrehanao raha tsy ireo andriamanitra izay tsy miara-monina amin’ny olombelona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia tezitra nisafoaka mafy noho izany rehetra izany ny mpanjaka, ka nanome baiko mba handringanana ny olon-kendry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'olon-kendry: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: io teny io dia enti-manondro ireo manam-pahaizana manokana momba ny sikidy sy ny fanandroana voatanisa eo amin’ny and 2.
    marker-yv: yv-n
  - type: text
    text: ' rehetra ao Babilôna. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia navoaka ny didy mampamono ho faty ireo olon-kendry; ary notadiavina koa i Daniela sy ny namany mba hovonoina ho faty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nambaran’Andriamanitra tamin’i Daniela ny nofin’ny mpanjaka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary niainga tokoa i Ariôka, lehiben’ny mpiambina ny mpanjaka, mba hamono ho faty ireo olon-kendrin’i Babilôna. Kanefa teny feno fahamalinana sy fahendrena no nasetrin’i Daniela an’i Ariôka; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'nanontaniany momba ny antony nahahenjana ny didy navoakan’ny mpanjaka i Ariôka, dia nampahafantatra azy ny toe-javatra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Avy eo nankany amin’ny mpanjaka i Daniela ary niangavy azy mba hanome fotoana hahazoany manambara amin’ny mpanjaka ny hevitry ny nofiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nody tany an-tranony i Daniela ka nampahafantatra an’i Hananià sy i Misaela ary i Hazarià namany ny toe-javatra; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary nangatahiny izy telo lahy mba hitalaho ny famindrampon’ilay Andriamanitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: ' momba ity zava-miafina ity, ka mba tsy haringana miaraka amin’ireo olon-kendrin’i Babilôna sisa i Daniela sy ny namany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary naseho an’i Daniela tamin’ny fahitana nandritra ny alina ilay zava-miafina; koa nidera an’ilay Andriamanitry ny lanitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia niteny i Daniela ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hisaorana anie ny anaran’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrizay hatrizay ka ho mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Azy ny fahendrena sy ny hery!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izy no tompon’ny fotoana sy ny tantara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no manonga-mpanjaka sy mananga-mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no manome ny fahendrena ho an’ny hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahaiza-manavaka ho an’ny mahira-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izy no mampiseho ny zavatra lalina sy miafina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahalala izay misy ao amin’ny maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny mazava no miara-mitoetra aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Misaotra sy midera Anao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Andriamanitry ny razako ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nomenao fahendrena sy hery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ankehitriny nampahafantarinao ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay zavatra nangatahinay taminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nambaranao anay ilay nofin’ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Teo anoloan’izany i Daniela dia nankany amin’i Ariôka izay voatendrin’ny mpanjaka handringana ny olon-kendry rehetra ao Babilôna, ka avy hatrany i Daniela dia niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza aringana ny olon-kendrin’i Babilôna! Ento ho eo anatrehan’ny mpanjaka aho fa ny tenako no hanambara aminy ny hevitry ny nofiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nitondra haingana an’i Daniela ho eo anatrehan’ny mpanjaka i Ariôka sady niteny tamin’i Nebokadnetsara hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahita lehilahy isan’ny babo avy any Joda aho, ry mpanjaka; izy io no hanambara aminao ny hevitry ny nofinao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay sarivongana manan-tongo-marefo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niresahan’ny mpanjaka i Daniela izay antsoina hoe Beltesatsara ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa afaka hampahalala ahy ny nofiko sy ny heviny tokoa va ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia namaly ny mpanjaka i Daniela ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy misy olon-kendry na mpisikidy na mpanao majika na ombiasy afaka hanambara aminao ny zava-miafina izay anontanianao, ry mpanjaka! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa misy Andriamanitra any an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: danitra
  - type: text
    text: ' ambony any Izay mampiseho ny zava-miafina, ka Izy no nampahafantatra an’i Nebokadnetsara mpanjaka izay hiseho amin’ny hoavy. Koa izao àry ny nofinao sy ny fahitana tao an-tsainao teo am-pandriana. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha natory ianao, ry mpanjaka, dia lasan’eritreritra ny amin’izay hiseho rahatrizay; koa Ilay mampiseho ny zava-miafina dia nampahafantatra anao izay hiseho rahatrizay. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary raha naseho tamiko io zava-miafina io, dia tsy hoe manam-pahendrena mihoatra noho ny miaina rehetra aho akory, fa mba hahazoana mampahalala anao ny hevitry ny nofinao, ry mpanjaka, ka hahafantaranao izay eritreritry ny fonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Ry mpanjaka ô, izao àry no hitanao: Nisy sarivongana iray tena lehibe nijoro teo anoloanao ary namirapiratra sady nahatahotra ny endriny. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Volamena madio ny lohan’io sarivongana io, volafotsy kosa ny tratrany sy ny tanany, halimo ny kibony sy ny feny, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'vy ny ranjony; ary ny tongony dia vy ny ampahany ary tanimanga ny ampahany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia nijery tsara io sarivongana io ianao mandra-piendaky ny vato iray tamina tendrombohitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tamina tendrombohitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt tranainy grika sy ny and 45; tsy hita ao amin’ny rijan-teny fototra aramianina eo amin’ny and 34.
    marker-yv: yv-n
  - type: text
    text: ' nefa tsy nendahan-tanana; namely an’ireo tongotra vy sy tanimanga tamin’ilay sarivongana io vato io ka nahatorotoro ny tongony roa. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary torotoro avy hatrany koa ny vy sy tanimanga mbamin’ny halimo sy volafotsy ary volamena, ka tonga toy ny akofa eny am-pamoloana fahavaratra; dia nopaohin’ny rivotra ireo, ka tsy hita intsony izay nitoerany. Ary ilay vato izay namely ny sarivongana dia tonga tendrombohitra lehibe ka nameno ny tany manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jer 4.11 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '«Izany ilay nofinao, ry mpanjaka, ary ny heviny koa dia holazaina eto anatrehanao. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ry mpanjaka ô, ianao no mpanjakan’ny mpanjaka fa nomen’ilay Andriamanitry ny lanitra ho anao ny fanjakana sy ny hery ary ny tanjaka sy ny voninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Napetrany eo ambany fifehezanao koa ny olombelona sy ny biby eny an-tsaha ary ny voro-manidina; eo ambany fifehezanao ireny, na aiza na aiza itoerany, ka ianao no nataon’Andriamanitra ho mpanjakan’izy rehetra; ianao izany no ilay loha volamena. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hisy fanjakana malemy kokoa noho ny anao, hitsangana aorianao; avy eo dia hisy fanjakana fahatelo izay ambaran’ny halimo ka hitatra amin’ny tany manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary ny fanjakana fahefatra dia ho mafy tahaka ny vy. Tahaka ny anorotoroan’ny vy sy anapotehany ary anamontsanany ny zavatra rehetra no hanorotoroan’io fanjakana io sy hanamontsanany ireo fanjakana rehetra talohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo metaly isan-karazany izay manao lanja midina mirafitra amin’ny sarivongana dia mampiseho an’ohatra ny fifandimbiasan’ny fanjakana Babilônianina, sy Medianina, sy Persianina ary Grika na ny fanjakana Babilônianina, fanjakana Medianina-Persianina, fanjakana Grika sy Rômanina araka ny fiheverana sasany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary, araka ny hitanao, ny tongotr’ilay sarivongana sy ny rantsan-tongony dia tanimanga ny ampahany ary vy ny ampahany, izany hoe hizara io fanjakana io. Hisy fahamafisana toy ny an’ny vy ao aminy, satria hitanao fa ny vy dia nifangaro tamin’ny tanimanga; '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'kanefa ny rantsan-tongotra, izay vy ny ampahany ary tanimanga ny ampahany, dia maneho tahaka izany koa fa ny ampahan’io fanjakana io dia hatanjaka ary ny ampahany kosa halemy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ny vy izay hitanao nifangaro tamin’ny tanimanga dia mampiseho ihany koa fa hifangaro amin’ny fanambadiana ireo mpanjaka; nefa tsy ho mafy io fitambarana io tahaka ny tsy mahamafy ny fitambaran’ny vy amin’ny tanimanga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 11.6,17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '«Amin’ny andron’ireo mpanjaka ireo ilay Andriamanitry ny lanitra no hanangana fanjakana izay tsy ho rava na oviana na oviana; ary ny fiandrianany tsy ho lasan’ny firenen-kafa. Io fanjakana io no hanorotoro sy handevona ireo fanjakana rehetra talohany, fa izy kosa hitoetra mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Izany no ambaran’ilay vato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Io '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: vato
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io dia milaza ny hahatongavan’ny fanjakana iray vaovao izay haorin’Andriamanitra.'
    marker-yv: yv-n
  - type: text
    text: ' izay hitanao niendaka tamina tendrombohitra nefa tsy nendahan-tanana, ka nanapotika ny vy sy halimo mbamin’ny tanimanga sy volafotsy ary volamena. Nampahafantarin’Andriamanitra lehibe anao, ry mpanjaka ô, izay hiseho amin’ny hoavy. Tena marina ny nofinao ary azo antoka ny heviny.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia niankohoka i Nebokadnetsara mpanjaka, ka nanome voninahitra an’i Daniela ary nampanolotra fanomezana sy zava-manitra ho azy. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Izay ny mpanjaka vao namaly an’i Daniela ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Marina tokoa fa ny Andriamanitrareo no Andriamanitry ny andriamanitra sy Tompon’ny mpanjaka ary mpanambara ny zava-miafina, matoa afaka nanambara tamiko izany zava-miafina izany ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Tamin’izay ny mpanjaka dia nanandratra an’i Daniela ka nanome azy zava-tsarobidy marobe ary nanendry azy ho mpifehy amin’ny faritanin’i Babilôna manontolo sy ho lehiben’ireo olon-kendry rehetra ao Babilôna. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Noho ny fangatahan’i Daniela tamin’ny mpanjaka dia i Sadràka sy i Mesàka ary i Habeda-Negao no voatendrin’i Nebokadnetsara hitondra ny faritanin’i Babilôna; fa i Daniela kosa lasa mpanolotsainan’ny mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.49 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fa i Daniela... mpanjaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fa i Daniela kosa tao an-dapan’ny mpanjaka.
    marker-yv: yv-n
  - type: text
    text: .
