  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fanjakana fahefatra dia ho mafy tahaka ny vy. Tahaka ny anorotoroan’ny vy sy anapotehany ary anamontsanany ny zavatra rehetra no hanorotoroan’io fanjakana io sy hanamontsanany ireo fanjakana rehetra talohany
