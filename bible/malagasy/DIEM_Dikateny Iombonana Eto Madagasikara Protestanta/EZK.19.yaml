  children:
  - type: text
    text: Tononkiram-palahelovana ny amin’ireo «liona»
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny Tompo niteny tamiko mba hivetso izao tononkiram-palahelovana izao ny amin’ireo andrianan’i Israely '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny reninareo ve? Toy ny liom-bavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny liom-bavy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eto dia mety haneho ny tanànan’i Jerosalema na koa ny fokon’i Joda (jereo Gen 49.9).
    marker-yv: yv-n
  - type: text
    text: ' izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no namitsaka teo afovoan’ireo lion-dahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teo anivon’ny liona tanora izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nitorovoka nampinono ny zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nanabe ny anankiray tamin’ireo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nony liona tanora matanjaka io,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nianatra namiravira haza
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nihinana olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nahare ny lazany ny hafa firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia namandrika azy hatao anaty lavaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanisy farango vy tamin’ny orony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nitondra azy nankany Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eo amin’ny and 3 sy 4 dia tsy isalasalana fa i Jôahaza mpanjaka no resahina (jereo 2 Mp 23.31-34). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: farango vy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 2 Mp 19.28 sy nta.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa tsapan’ilay liom-bavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa foana sy levona ny fanantenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nalainy ny iray hafa tamin’ireo zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka notezainy ho tonga liona tanora matanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Niriaria teo anivon’ny lion-dahy izy io,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nony tonga liona tanora matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nianatra namiravira haza ihany koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nihinana olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Namotika ny lapan’ireo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nandrava ny tanànany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raiki-tahotra ny mponina teo amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha vao nandre ny fieronerony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa ireo hafa firenena manodidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny faritra samihafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nivondrona hamely azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namelatra harato hahazoana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary namandrika azy hatao anaty lavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nasiany farango vy tamin’ny orony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nohidiny tao anaty vata makarakara
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nentiny tany amin’ny mpanjakan’i Babilôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Raha araka ny fanondroana eto, ny liona faharoa dia tokony ho i Jôiakina mpanjaka, jereo 2 Mp 24.15.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nataony an-tranomaizina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy ho re mieronerona intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny tendrombohitr’i Israely.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tononkiram-palahelovana ny amin’ny voaloboka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: «Ny reninareo dia tahaka ny voaloboka iray
- type: usfm
  marker: q1
  children:
  - type: text
    text: nambolena teo amoron-drano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tahaka ny voaloboka iray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt aramianina tranainy. Momba ny famantarana ny amin’ny voaloboka, jereo 15.2 sy ny nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nilonjehitra voa sy nanaroka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny rano be nanondraka azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ka nisy rantsana mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: azo atao tehim-pahefàn’ny mpifehy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nisondrotra avo nitehi-drahona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nikoizana noho ny haavony
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny hamaroan’ireo rantsany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kanefa nongotana an-katezerana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka natsipy tamin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny rivotra avy atsinanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nahamaina ny voany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampihintsana azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nihamaina koa ny rantsany mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka natao levon’ny ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ankehitriny izany voaloboka izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voavoly any an-taniefitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny tany maina sy karankaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nisy afo nivoaka avy tao amin’ny tahony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nandevona ny rantsany sy ny voany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy misy intsony rantsana mafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: azo atao tehim-pahefàn’ny mpifehy.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tononkiram-palahelovana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tokony hohiraina amin’alahelo.
