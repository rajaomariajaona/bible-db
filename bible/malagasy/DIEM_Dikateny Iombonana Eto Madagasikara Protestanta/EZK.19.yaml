document_id: EZK.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tononkiram-palahelovana ny amin’ireo «liona»
  - type: text
    content: 'Ary ny Tompo niteny tamiko mba hivetso izao tononkiram-palahelovana izao ny amin’ireo andrianan’i Israely '
  '10':
  - type: text
    content: «Ny reninareo dia tahaka ny voaloboka iray
  - type: text
    content: nambolena teo amoron-drano
  - type: note
    content: 'tahaka ny voaloboka iray: araka ny dkt aramianina tranainy. Momba ny famantarana ny amin’ny voaloboka, jereo 15.2 sy ny nta.'
  - type: text
    content: .
  - type: text
    content: Nilonjehitra voa sy nanaroka izy
  - type: text
    content: noho ny rano be nanondraka azy,
  '11':
  - type: text
    content: ka nisy rantsana mafy
  - type: text
    content: azo atao tehim-pahefàn’ny mpifehy;
  - type: text
    content: dia nisondrotra avo nitehi-drahona izy,
  - type: text
    content: ka nikoizana noho ny haavony
  - type: text
    content: mbamin’ny hamaroan’ireo rantsany.
  '12':
  - type: text
    content: Kanefa nongotana an-katezerana izy
  - type: text
    content: ka natsipy tamin’ny tany.
  - type: text
    content: Ny rivotra avy atsinanana
  - type: text
    content: no nahamaina ny voany
  - type: text
    content: ka nampihintsana azy.
  - type: text
    content: Nihamaina koa ny rantsany mafy
  - type: text
    content: ka natao levon’ny ao.
  '13':
  - type: text
    content: Ankehitriny izany voaloboka izany
  - type: text
    content: dia voavoly any an-taniefitra
  - type: text
    content: ao amin’ny tany maina sy karankaina.
  '14':
  - type: text
    content: Nisy afo nivoaka avy tao amin’ny tahony
  - type: text
    content: ka nandevona ny rantsany sy ny voany;
  - type: text
    content: dia tsy misy intsony rantsana mafy
  - type: text
    content: azo atao tehim-pahefàn’ny mpifehy.»
  - type: text
    content: Tononkiram-palahelovana izany
  - type: text
    content: ka tokony hohiraina amin’alahelo.
  '2':
  - type: text
    content: 'ka hanao hoe:'
  - type: text
    content: «Ny reninareo ve? Toy ny liom-bavy
  - type: note
    content: Ny liom-bavy eto dia mety haneho ny tanànan’i Jerosalema na koa ny fokon’i Joda (jereo Gen 49.9).
  - type: text
    content: ' izy'
  - type: text
    content: no namitsaka teo afovoan’ireo lion-dahy!
  - type: text
    content: Teo anivon’ny liona tanora izy
  - type: text
    content: no nitorovoka nampinono ny zanany.
  '3':
  - type: text
    content: Nanabe ny anankiray tamin’ireo izy;
  - type: text
    content: ka nony liona tanora matanjaka io,
  - type: text
    content: dia nianatra namiravira haza
  - type: text
    content: sady nihinana olona.
  '4':
  - type: text
    content: Nahare ny lazany ny hafa firenena
  - type: text
    content: dia namandrika azy hatao anaty lavaka,
  - type: text
    content: ary nanisy farango vy tamin’ny orony
  - type: text
    content: sy nitondra azy nankany Ejipta
  - type: note
    content: 'Eo amin’ny and 3 sy 4 dia tsy isalasalana fa i Jôahaza mpanjaka no resahina (jereo 2 Mp 23.31-34). –farango vy: jereo 2 Mp 19.28 sy nta.'
  - type: text
    content: .
  '5':
  - type: text
    content: Rehefa tsapan’ilay liom-bavy
  - type: text
    content: fa foana sy levona ny fanantenany,
  - type: text
    content: dia nalainy ny iray hafa tamin’ireo zanany
  - type: text
    content: ka notezainy ho tonga liona tanora matanjaka.
  '6':
  - type: text
    content: Niriaria teo anivon’ny lion-dahy izy io,
  - type: text
    content: ka nony tonga liona tanora matanjaka,
  - type: text
    content: dia nianatra namiravira haza ihany koa
  - type: text
    content: sady nihinana olona.
  '7':
  - type: text
    content: Namotika ny lapan’ireo izy
  - type: text
    content: ary nandrava ny tanànany.
  - type: text
    content: Raiki-tahotra ny mponina teo amin’ny tany,
  - type: text
    content: raha vao nandre ny fieronerony.
  '8':
  - type: text
    content: Koa ireo hafa firenena manodidina,
  - type: text
    content: avy amin’ny faritra samihafa,
  - type: text
    content: dia nivondrona hamely azy
  - type: text
    content: ka namelatra harato hahazoana azy
  - type: text
    content: ary namandrika azy hatao anaty lavaka.
  '9':
  - type: text
    content: Nasiany farango vy tamin’ny orony izy,
  - type: text
    content: dia nohidiny tao anaty vata makarakara
  - type: text
    content: ary nentiny tany amin’ny mpanjakan’i Babilôna
  - type: note
    content: Raha araka ny fanondroana eto, ny liona faharoa dia tokony ho i Jôiakina mpanjaka, jereo 2 Mp 24.15.
  - type: text
    content: ;
  - type: text
    content: dia nataony an-tranomaizina izy
  - type: text
    content: mba tsy ho re mieronerona intsony
  - type: text
    content: eny amin’ny tendrombohitr’i Israely.»
  - type: heading
    content: Tononkiram-palahelovana ny amin’ny voaloboka
