verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ao anatin’ny fahoriana no ahatsiarovako ny asa mahagaga vitanao fahiny
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’i Jedotòna
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jedotòna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 39.1 sy nta.
      marker-yv: yv-n
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira.
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Asafa.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hadinon’Andriamanitra ve ny miantra anay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nohidiany tanteraka ve ny fony, satria tezitra Izy?»
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy aho anakampoko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Ny mampahararirary ahy dia izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manao asa mahery ho anay intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Andriamanitra Avo Indrindra.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: TOMPO ô, tsaroako izay efa nataonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tadidiko ny zava-mahagaga vitanao fahiny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mandinika ireo asanao rehetra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mieritreritra ireo zava-dehibe nataonao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Andriamanitra ô, fahamasinana no tanjon’ny lalanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy Andriamanitra lehibe toa Anao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ianao irery no manao zava-mahagaga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nasehonao tamin’ny firenen-kafa ny fahefànao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny herinao no nanavotanao ny vahoakanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny taranak’i Jakôba sy ny taranak’i Jôsefa.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Andriamanitra ô, nahita Anao ny ranobe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka raiki-tahotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nipararetra mbamin’ny fanambanin’ny ranomasina aza.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nandrotsaka oram-be ny rahona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: namoaka kotro-baratra ny raho-matevina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nifanaretsaka ny zana-tsipîkanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.18 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Ny zana-tsipîkan’Andriamanitra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sary an’ohatra ilazana ny tselatra izany; jereo Sal 18.15; 144.6.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tamin’ny firohondrohon’ny kotro-baratrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahazava izao rehetra izao ny tselatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nihovotrovotra sy nihorohoro ny tany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Andriamanitra no antsoiko mba hitarainako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, Izy no antsoiko mba hihainoany ahy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Nanao lalana tany an-dranomasina Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary sakeli-dalana tany amin’ny rano lalina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fampahatsiahivana fohy ny fandalovana teo amin’ny Ranomasin’ny Volotara* (Eks 14–15). Ireo farihy masirasira eo anelanelan’ny Ranomasina Mena sy ny Ranomasina Mediteranea no atao hoe Ranomasin’ny Volotara etoana.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nisy nahalala ny soritry ny dianao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Toy ny fitarihana andian’ondry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nitarihanao ny vahoakanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’ny alalan’i Mosesy sy i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aharôna
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny Tompo no tadiaviko amin’ny andro fahoriako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy an-kitsahatra, nony alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no anandratako tanana any aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 28.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa dia tsy mety mionona ny foko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mahatsiaro an’Andriamanitra aho, ka misento;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha vao mieritreritra aho, dia rera-tsaina.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy avelan’ny Tompo hikimpy ny masoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitebiteby aho, ary tsy hitako izay holazaina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Vetsoiko ny andro fahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsaroako ny taona taloha elabe.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mandinika lalina aho, nony alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mieritreritra ato am-poko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka ny saiko dia velom-panontaniana hoe:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: «Dia hanary anay mandrakizay ve ny Tompo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hiantra anay intsony ve Izy?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia ho lany tokoa ve ny fitiavany anay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tapitra tsy hisy intsony ve ny teniny?
