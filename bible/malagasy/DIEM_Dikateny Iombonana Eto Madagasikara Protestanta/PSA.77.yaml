type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ao anatin’ny fahoriana no ahatsiarovako ny asa mahagaga vitanao fahiny
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’i Jedotòna
  - type: text
    content: ' '
  - type: note
    content: 'Jedotòna: jereo Sal 39.1 sy nta.'
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Asafa.
  '10':
  - type: text
    content: Hadinon’Andriamanitra ve ny miantra anay?
  - type: text
    content: Nohidiany tanteraka ve ny fony, satria tezitra Izy?»
  - type: text
    content: Fiatoana
  '11':
  - type: text
    content: 'Dia hoy aho anakampoko hoe:'
  - type: text
    content: '«Ny mampahararirary ahy dia izao:'
  - type: text
    content: Tsy manao asa mahery ho anay intsony
  - type: text
    content: ilay Andriamanitra Avo Indrindra.»
  '12':
  - type: text
    content: TOMPO ô, tsaroako izay efa nataonao
  - type: text
    content: ary tadidiko ny zava-mahagaga vitanao fahiny.
  '13':
  - type: text
    content: Mandinika ireo asanao rehetra aho
  - type: text
    content: ary mieritreritra ireo zava-dehibe nataonao.
  '14':
  - type: text
    content: Andriamanitra ô, fahamasinana no tanjon’ny lalanao
  - type: text
    content: ka tsy misy Andriamanitra lehibe toa Anao.
  '15':
  - type: text
    content: Ianao irery no manao zava-mahagaga;
  - type: text
    content: ary nasehonao tamin’ny firenen-kafa ny fahefànao.
  '16':
  - type: text
    content: Ny herinao no nanavotanao ny vahoakanao,
  - type: text
    content: dia ny taranak’i Jakôba sy ny taranak’i Jôsefa.
  - type: text
    content: Fiatoana
  '17':
  - type: text
    content: Andriamanitra ô, nahita Anao ny ranobe
  - type: text
    content: ka raiki-tahotra;
  - type: text
    content: eny, nipararetra mbamin’ny fanambanin’ny ranomasina aza.
  '18':
  - type: text
    content: Nandrotsaka oram-be ny rahona,
  - type: text
    content: namoaka kotro-baratra ny raho-matevina,
  - type: text
    content: ary nifanaretsaka ny zana-tsipîkanao
  - type: note
    content: 'Ny zana-tsipîkan’Andriamanitra: sary an’ohatra ilazana ny tselatra izany; jereo Sal 18.15; 144.6.'
  - type: text
    content: .
  '19':
  - type: text
    content: Tamin’ny firohondrohon’ny kotro-baratrao
  - type: text
    content: dia nahazava izao rehetra izao ny tselatra,
  - type: text
    content: ary nihovotrovotra sy nihorohoro ny tany.
  '2':
  - type: text
    content: Andriamanitra no antsoiko mba hitarainako;
  - type: text
    content: eny, Izy no antsoiko mba hihainoany ahy.
  '20':
  - type: text
    content: Nanao lalana tany an-dranomasina Ianao
  - type: text
    content: ary sakeli-dalana tany amin’ny rano lalina
  - type: note
    content: Fampahatsiahivana fohy ny fandalovana teo amin’ny Ranomasin’ny Volotara* (Eks 14–15). Ireo farihy masirasira eo anelanelan’ny Ranomasina Mena sy ny Ranomasina Mediteranea no atao hoe Ranomasin’ny Volotara etoana.
  - type: text
    content: ','
  - type: text
    content: nefa tsy nisy nahalala ny soritry ny dianao.
  '21':
  - type: text
    content: Toy ny fitarihana andian’ondry
  - type: text
    content: no nitarihanao ny vahoakanao
  - type: text
    content: 'tamin’ny alalan’i Mosesy sy i '
  - type: text
    content: Aharôna
  - type: text
    content: .
  '3':
  - type: text
    content: Ny Tompo no tadiaviko amin’ny andro fahoriako;
  - type: text
    content: tsy an-kitsahatra, nony alina,
  - type: text
    content: no anandratako tanana any aminy
  - type: note
    content: Ampit Sal 28.2 sy nta.
  - type: text
    content: ','
  - type: text
    content: kanefa dia tsy mety mionona ny foko.
  '4':
  - type: text
    content: Mahatsiaro an’Andriamanitra aho, ka misento;
  - type: text
    content: raha vao mieritreritra aho, dia rera-tsaina.
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Tsy avelan’ny Tompo hikimpy ny masoko;
  - type: text
    content: mitebiteby aho, ary tsy hitako izay holazaina.
  '6':
  - type: text
    content: Vetsoiko ny andro fahiny,
  - type: text
    content: tsaroako ny taona taloha elabe.
  '7':
  - type: text
    content: Mandinika lalina aho, nony alina,
  - type: text
    content: sady mieritreritra ato am-poko;
  - type: text
    content: 'ka ny saiko dia velom-panontaniana hoe:'
  '8':
  - type: text
    content: «Dia hanary anay mandrakizay ve ny Tompo?
  - type: text
    content: Tsy hiantra anay intsony ve Izy?
  '9':
  - type: text
    content: Dia ho lany tokoa ve ny fitiavany anay?
  - type: text
    content: Ho tapitra tsy hisy intsony ve ny teniny?
