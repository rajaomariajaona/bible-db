document_id: HAB.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavak’i Habakòka
  - type: text
    content: 'Izao no vavaka miendrika fitarainana nataon’i Habakòka '
  - type: text
    content: mpaminany
  - type: text
    content: .
  '10':
  - type: text
    content: Nahita Anao ny tendrombohitra ka tora-kovitra;
  - type: text
    content: mandrotsaka orambe ny rahona,
  - type: text
    content: mirohondrohona ny ranomasimbe
  - type: text
    content: ka manainga onja hatreny amin’ny lanitra.
  '11':
  - type: text
    content: Noho ny zana-tsipîkanao mamiratra mitsoriaka,
  - type: text
    content: noho ny lefonao manjelanjelatra mahajemby,
  - type: text
    content: dia tsy nahahetsika ny masoandro sy ny volana.
  '12':
  - type: text
    content: Mitety ny tany amim-pahatezerana Ianao,
  - type: text
    content: ary manosihosy ny firenena amim-pahavinirana.
  '13':
  - type: text
    content: Niainga hamonjy ny olonao Ianao,
  - type: text
    content: eny, hamonjy ilay vahoaka voahosotrao.
  - type: text
    content: Aonganao ny filohan’ny andian’olon-dratsy;
  - type: text
    content: hatratỳ am-potony ka hatrany an-tampony
  - type: text
    content: no amotehanao izany andian’olon-dratsy izany.
  '14':
  - type: text
    content: Ny zana-tsipîkany ihany no anagorobahanao
  - type: text
    content: ny lohan’ireo mpitari-tafika fahavalo.
  - type: text
    content: Mibosesika toy ny tadio mahery izy,
  - type: text
    content: ka faly hampihahaka anay toy ny ampombo
  - type: text
    content: sady handevona mangingina izay resiny.
  '15':
  - type: text
    content: Ny nanokafanao lalana
  - type: text
    content: dia teo anivon’ny ranomasina;
  - type: text
    content: ny soavalim-pahavalo kosa tafahitsoka
  - type: text
    content: tao amin’ny fisamboaravoaran’ny onja mahery.
  '16':
  - type: text
    content: Reko avokoa izany ka dia mangotika aho.
  - type: text
    content: Mipararetry ny tahotra koa ny molotro.
  - type: text
    content: Mihaosa ny tenako ka mangozohozo famindra.
  - type: text
    content: Eny, am-pahanginana no tsy maintsy iandrasako
  - type: text
    content: ny androm-pahoriana hamelezan’Andriamanitra
  - type: text
    content: ity vahoaka izay mamoritra anay ity.
  '17':
  - type: text
    content: Fa na dia tsy mamontsina aza ny aviavy
  - type: text
    content: ary tsy manome voa ny voaloboka,
  - type: text
    content: na dia tsy mahavanona aza ny ôliva
  - type: text
    content: ary tsy mahavokatra hanina ny saha,
  - type: text
    content: na dia voapaoka aza ny ondry ao am-pahitra
  - type: text
    content: ary tsy misy omby intsony ao am-bala,
  '18':
  - type: text
    content: dia mbola ho faly sy ravo ihany aho
  - type: text
    content: satria ny TOMPO Andriamanitra no Mpamonjy ahy.
  '19':
  - type: text
    content: Ny TOMPO Andriamanitra no heriko;
  - type: text
    content: mampalady ahy toy ny dieravavy Izy
  - type: text
    content: ka mampiriaria ahy eny an-kavoana.
  - type: text
    content: 'Tao amin’ny tahirin-kiran’ny '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: ': hohiraina miaraka amin’ny valiha'
  - type: note
    content: Teny fahita eo am-piandohan’ny Salamo sasany (jereo Sal 4; 6; 54; 67; 76).
  - type: text
    content: .
  '2':
  - type: text
    content: TOMPO ô, efa reko izay nambaranao
  - type: note
    content: 'izay nambaranao: dkt hafa ny lazanao.'
  - type: text
    content: ka dia raiki-tahotra aho.
  - type: text
    content: TOMPO ô, enga anie ny asanao
  - type: text
    content: mba ho velombelona hatrany
  - type: text
    content: amin’izao andronay izao;
  - type: text
    content: eny, amin’izao andronay izao
  - type: text
    content: no ataovy fantatry ny olona izany.
  - type: text
    content: Fa na dia tezitra aza Ianao,
  - type: text
    content: asehoy anay ihany ny indrafonao.
  '3':
  - type: text
    content: Tonga avy any Temàna Andriamanitra;
  - type: text
    content: Ilay Andriamanitra masina no tamy
  - type: text
    content: avy any an-tendrombohitra Paràna
  - type: note
    content: 'Temàna: faritanin’ny fanjakan’i Edôma, ao atsimo atsinanan’i Joda. –Ny tendrombohitra Paràna dia ao amin’ny taniefitra izay ao atsimon’i Palestinina (jereo Deot 33.2).'
  - type: text
    content: .
  - type: text
    content: Manarona ny lanitra ny voninahiny
  - type: text
    content: ary maneran-tany ny fiderana Azy.
  '4':
  - type: text
    content: Famirapiratana toy ny fahazavana
  - type: text
    content: no teo ambanin’Andriamanitra;
  - type: text
    content: misy tanà-masoandro avy eo amin’ny tanany,
  - type: text
    content: dia ny tanany izay iafenan’ny heriny.
  '5':
  - type: text
    content: Areti-mandringana no alefany mialoha Azy,
  - type: text
    content: ary tazomahery no mipoitra manaraka ny diany.
  '6':
  - type: text
    content: Mihorohoro ny tany, rehefa mijadona Izy.
  - type: text
    content: Vao jereny ny firenena, dia mangovitra.
  - type: text
    content: Torotoro ireo tendrombohitra mandrakizay,
  - type: text
    content: mietry ireo havoana fahagola,
  - type: text
    content: dia ireo havoana fandalovany taloha.
  '7':
  - type: text
    content: Hitako ny fahorian’ireo vahoakan’i Kosàna
  - type: text
    content: sy ny horohoron’ireo mponin’i Midiàna
  - type: note
    content: Ny hoe Kosàna dia mety hoenti-milaza ireo olona mpifindrafindra fonenana tao amin’ny taniefitr’i Sinay, dia tahaka ny Midianita izany.
  - type: text
    content: .
  '8':
  - type: text
    content: Moa ny ony va, TOMPO ô,
  - type: text
    content: no irehetan’ny fahatezeranao
  - type: text
    content: sa ny ranomasina no isafoahanao,
  - type: text
    content: no dia ny rahona no toa kalesy tarihin-tsoavaly
  - type: text
    content: itaingenanao mba hahazoam-pandresena?
  '9':
  - type: text
    content: Nalanao sarona hohenjanina ny tsipîkanao;
  - type: text
    content: ka dia ireo fianianana izay notononinao
  - type: text
    content: no toy ny zana-tsipîka alefanao.
  - type: text
    content: Tonga mitresatresaka ny tany
  - type: text
    content: nikorianan’ny ranon-driaka.
