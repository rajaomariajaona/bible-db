- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia raiki-tahotra aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, enga anie ny asanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho velombelona hatrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izao andronay izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, amin’izao andronay izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ataovy fantatry ny olona izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa na dia tezitra aza Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: asehoy anay ihany ny indrafonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tonga avy any Temàna Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay Andriamanitra masina no tamy
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any an-tendrombohitra Paràna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Temàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'faritanin’ny fanjakan’i Edôma, ao atsimo atsinanan’i Joda. –Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tendrombohitra Paràna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ao amin’ny taniefitra izay ao atsimon’i Palestinina (jereo Deot 33.2).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manarona ny lanitra ny voninahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maneran-tany ny fiderana Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Famirapiratana toy ny fahazavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no teo ambanin’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy tanà-masoandro avy eo amin’ny tanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny tanany izay iafenan’ny heriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Areti-mandringana no alefany mialoha Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tazomahery no mipoitra manaraka ny diany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mihorohoro ny tany, rehefa mijadona Izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vao jereny ny firenena, dia mangovitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Torotoro ireo tendrombohitra mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mietry ireo havoana fahagola,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo havoana fandalovany taloha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hitako ny fahorian’ireo vahoakan’i Kosàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny horohoron’ireo mponin’i Midiàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kosàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety hoenti-milaza ireo olona mpifindrafindra fonenana tao amin’ny taniefitr’i Sinay, dia tahaka ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Midianita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Moa ny ony va, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no irehetan’ny fahatezeranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa ny ranomasina no isafoahanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no dia ny rahona no toa kalesy tarihin-tsoavaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: itaingenanao mba hahazoam-pandresena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nalanao sarona hohenjanina ny tsipîkanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia ireo fianianana izay notononinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no toy ny zana-tsipîka alefanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga mitresatresaka ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: nikorianan’ny ranon-driaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nahita Anao ny tendrombohitra ka tora-kovitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandrotsaka orambe ny rahona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mirohondrohona ny ranomasimbe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manainga onja hatreny amin’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho ny zana-tsipîkanao mamiratra mitsoriaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny lefonao manjelanjelatra mahajemby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy nahahetsika ny masoandro sy ny volana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mitety ny tany amim-pahatezerana Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manosihosy ny firenena amim-pahavinirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Niainga hamonjy ny olonao Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hamonjy ilay vahoaka voahosotrao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aonganao ny filohan’ny andian’olon-dratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatratỳ am-potony ka hatrany an-tampony
- type: usfm
  marker: q1
  children:
  - type: text
    text: no amotehanao izany andian’olon-dratsy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny zana-tsipîkany ihany no anagorobahanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lohan’ireo mpitari-tafika fahavalo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mibosesika toy ny tadio mahery izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka faly hampihahaka anay toy ny ampombo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady handevona mangingina izay resiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny nanokafanao lalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia teo anivon’ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny soavalim-pahavalo kosa tafahitsoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: tao amin’ny fisamboaravoaran’ny onja mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Reko avokoa izany ka dia mangotika aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipararetry ny tahotra koa ny molotro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihaosa ny tenako ka mangozohozo famindra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, am-pahanginana no tsy maintsy iandrasako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny androm-pahoriana hamelezan’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ity vahoaka izay mamoritra anay ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa na dia tsy mamontsina aza ny aviavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy manome voa ny voaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia tsy mahavanona aza ny ôliva
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahavokatra hanina ny saha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia voapaoka aza ny ondry ao am-pahitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy omby intsony ao am-bala,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia mbola ho faly sy ravo ihany aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny TOMPO Andriamanitra no Mpamonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny TOMPO Andriamanitra no heriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampalady ahy toy ny dieravavy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampiriaria ahy eny an-kavoana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tao amin’ny tahirin-kiran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira
  - type: text
    text: ': hohiraina miaraka amin’ny valiha'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Teny fahita eo am-piandohan’ny Salamo sasany (jereo Sal 4; 6; 54; 67; 76).
    marker-yv: yv-n
  - type: text
    text: .
