document_id: JOB.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba (famaranana): mahonena ny maha olombelona'
  - type: text
    content: Ny olona natera-behivavy
  - type: text
    content: dia fohy andro iainana
  - type: text
    content: sady vontom-pahoriana.
  '10':
  - type: text
    content: Fa ny olona kosa maty dia manjavona;
  - type: text
    content: ary aiza moa izy, rehefa miala aina?
  '11':
  - type: text
    content: Mety hisintona ny rano amin’ny farihy,
  - type: text
    content: ary ho ritra ny ony ka ho maina;
  '12':
  - type: text
    content: dia toy izany koa ny olona rehefa maty,
  - type: text
    content: mandry izy ka tsy hitsangana intsony;
  - type: text
    content: raha mbola maharitra ihany ny lanitra,
  - type: text
    content: dia tsy ho tafafoha intsony ireo
  - type: text
    content: ary tsy ho voafoha amin’ny torimasony.
  - type: heading
    content: '*'
  '13':
  - type: text
    content: Andriamanitro ô, raha mba nafeninao
  - type: text
    content: tany amin’ny toeran’ny maty aho
  - type: text
    content: ka notoloranao fialofana hiereko
  - type: text
    content: mandra-pitony ny fahatezeranao!
  - type: text
    content: ka aorian’izay dia hahatsiaro ahy Ianao!
  '14':
  - type: text
    content: Nefa moa ho velona indray va ny olona maty?
  - type: text
    content: Raha izany dia ho niandry isan’andro aho
  - type: text
    content: mandritra ny fotoana manontolo fanompoako,
  - type: text
    content: mandra-pahatonga ny famotsorana ahy.
  '15':
  - type: text
    content: Amin’izay dia hamaly aho rehefa hiantso ahy Ianao
  - type: text
    content: ka haneho fangorahana ny tenako izay arin-tananao.
  '16':
  - type: text
    content: Ankehitriny Ianao manisa ny diako hiarovana ahy,
  - type: text
    content: koa tsy hitsikilo ny fahotako intsony.
  '17':
  - type: text
    content: Ho voaafinao an-kitapo misy kase ny fahadisoako
  - type: text
    content: ary ho voasaronao tanteraka ny heloko rehetra.
  - type: heading
    content: '*'
  '18':
  - type: text
    content: Fa ny tendrombohitra aza mikoa ka levona
  - type: text
    content: ary ny vatolampy voaongotra amin’ny toerany.
  '19':
  - type: text
    content: Ny vato aza ho voakikin’ny rano
  - type: text
    content: ary ny tany hindaosin’ny riaka.
  - type: text
    content: Dia toy izany no andravanao
  - type: text
    content: ny fanantenan’ny olona ho velona.
  '2':
  - type: text
    content: Tahaka ny voninkazo izy,
  - type: text
    content: mora maniry nefa mora malazo;
  - type: text
    content: ary tahaka ny aloka ihany izy,
  - type: text
    content: mihelina fa tsy maharitra
  - type: note
    content: 'And 1–2: jereo Jôba 7.7; 8.9,12; Ampit Is 40.6-8.'
  - type: text
    content: .
  '20':
  - type: text
    content: Lavonao amin’ny tany izy ka lasana
  - type: text
    content: ary simbanao ny endriny ka voailikao izy.
  '21':
  - type: text
    content: Omem-boninahitra ny zanany, nefa tsy fantany;
  - type: text
    content: ary tonga afa-baràka ireo, nefa tsy hitany.
  '22':
  - type: text
    content: Ny hany tsapany dia ny fanaintainan’ny nofony;
  - type: text
    content: ny hany isaonany dia ny fahoriam-panahiny.
  '3':
  - type: text
    content: Kanefa dia ny toy izany, Andriamanitra ô,
  - type: text
    content: no anokafanao ny masonao!
  - type: text
    content: ary dia ny tenako izao no entinao
  - type: text
    content: hifandahatra aminao am-pitsarana.
  '4':
  - type: text
    content: Misy madio ateraky ny tsy madio ve?
  - type: text
    content: Tsy misy na dia iray akory aza.
  '5':
  - type: text
    content: Koa satria voafaritra ny androm-piainan’ny olona,
  - type: text
    content: voatendrinao ny isan’ireo volana hahavelomany,
  - type: text
    content: ary nasianao fetra tsy azony ihoarana,
  '6':
  - type: text
    content: dia midifia tsy hanatrika azy Ianao,
  - type: text
    content: mba hahazoany maka aina kely sy mifaly
  - type: text
    content: toy ny mpikarama finaritra amin’ny fotoam-piatoany.
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Fa mbola misy antenaina amin’ny hazo
  - type: text
    content: satria na dia kapaina aza izy,
  - type: text
    content: dia mbola haniry indray
  - type: text
    content: ka hanome solofo hatrany.
  '8':
  - type: text
    content: Na dia antitra ao amin’ny tany aza ny fakany
  - type: text
    content: ka efa maty mihosim-bovoka ny fotony,
  '9':
  - type: text
    content: dia hitsimoka indray izy raha sendra rano
  - type: text
    content: ary hisandrahaka toy ny vao nambolena.
