document_id: JOB.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Valintenin’i Jôba (famaranana): mahonena ny maha olombelona'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny olona natera-behivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fohy andro iainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady vontom-pahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tahaka ny voninkazo izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mora maniry nefa mora malazo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka ny aloka ihany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihelina fa tsy maharitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 1–2:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jôba 7.7; 8.9,12; Ampit Is 40.6-8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa dia ny toy izany, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anokafanao ny masonao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary dia ny tenako izao no entinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: hifandahatra aminao am-pitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misy madio ateraky ny tsy madio ve?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy na dia iray akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa satria voafaritra ny androm-piainan’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voatendrinao ny isan’ireo volana hahavelomany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nasianao fetra tsy azony ihoarana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia midifia tsy hanatrika azy Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahazoany maka aina kely sy mifaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny mpikarama finaritra amin’ny fotoam-piatoany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa mbola misy antenaina amin’ny hazo
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria na dia kapaina aza izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola haniry indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanome solofo hatrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Na dia antitra ao amin’ny tany aza ny fakany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka efa maty mihosim-bovoka ny fotony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: dia hitsimoka indray izy raha sendra rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hisandrahaka toy ny vao nambolena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny olona kosa maty dia manjavona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aiza moa izy, rehefa miala aina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mety hisintona ny rano amin’ny farihy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho ritra ny ony ka ho maina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia toy izany koa ny olona rehefa maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandry izy ka tsy hitsangana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mbola maharitra ihany ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho tafafoha intsony ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho voafoha amin’ny torimasony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitro ô, raha mba nafeninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tany amin’ny toeran’ny maty aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka notoloranao fialofana hiereko
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pitony ny fahatezeranao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aorian’izay dia hahatsiaro ahy Ianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nefa moa ho velona indray va ny olona maty?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha izany dia ho niandry isan’andro aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandritra ny fotoana manontolo fanompoako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-pahatonga ny famotsorana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Amin’izay dia hamaly aho rehefa hiantso ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka haneho fangorahana ny tenako izay arin-tananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ankehitriny Ianao manisa ny diako hiarovana ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tsy hitsikilo ny fahotako intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho voaafinao an-kitapo misy kase ny fahadisoako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho voasaronao tanteraka ny heloko rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa ny tendrombohitra aza mikoa ka levona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vatolampy voaongotra amin’ny toerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny vato aza ho voakikin’ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany hindaosin’ny riaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany no andravanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanantenan’ny olona ho velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lavonao amin’ny tany izy ka lasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary simbanao ny endriny ka voailikao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Omem-boninahitra ny zanany, nefa tsy fantany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tonga afa-baràka ireo, nefa tsy hitany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny hany tsapany dia ny fanaintainan’ny nofony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hany isaonany dia ny fahoriam-panahiny.
