document_id: EZK.32,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hira fisaonana ny amin’i Ejipta sy ny mpanjakany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tamin’ny taona faha-12 taorian’ny fahababoana, nony andro voalohan’ny volana faha-12
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izany hoe Febroary-Marsa 585 tal J.K.
      marker-yv: yv-n
    - type: text
      text: ' dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ho talanjona ireo firenena maro ireo noho ny namelezako anao. Hipararetra noho ny aminao ny mpanjakany, rehefa harangarangako eny ambony lohany ny sabatro. Amin’ny andro haharavanao dia hangovitra tsy an-kitsahatra izy fa samy manahy momba ny ainy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '‹Izao no lazain’ny Tompo ANDRIANANAHARY : Hibosesika ao aminao ny tafiky ny mpanjakan’i Babilôna. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ireo miaramila masiaka indrindra amin’ny samy tafi-pirenena no halefako hamono ho faty ireo vahoakanao marobe. Horavany i Ejipta fatra-pirehareha ka ho fongotra ny vahoakany marobe rehetra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Haringako ny biby fiompy rehetra izay anananao eny amoron’i Neily, ary tsy hisy tongotr’olona na kitrom-biby fiompy hanakobana sy handoto intsony ny rano. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hampandrîko ho tony izy ka hikoriana milamina toy ny diloilo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hovàko ho tany ngazana i Ejipta, ka ny zavatra nameno azy dia hofongorako tsy hisy intsony ary haringako ny mponina rehetra ao aminy. Amin’izay dia hoekena fa Izaho no TOMPO.›
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: «Izany no hira fisaonana hohirain’ny vehivavin’ny firenen-drehetra ny amin’i Ejipta sy ny vahoakany marobe rehetra; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitomaniana ny amin’ireo vahoaka resy
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tamin’ny taona faha-12 taorian’ny fahababoana, nony andro faha-15 tanatin’ny volana faha-12
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'faha-12: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny and 1 na dia tsy voalazan’ny RM aza ny laharan’ny volana eto.
      marker-yv: yv-n
    - type: text
      text: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '«Ry ilay taranak’olombelona, mitolokia ny amin’ny vahoaka maroben’i Ejipta. Izany no ampidino azy miaraka amin’ireo mponin’ny firenen-kafa ho any ambanin’ny tany, izay toerana fidinan’ny maty. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Lazao azy hoe: Heverinareo angaha fa hanaovana fitondrana manokana noho ny hafa ianareo? Midîna ianareo hiampatra miaraka amin’ireo tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voafora
    - type: text
      text: ' hafa izay maty an’ady. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Ry ilay taranak’olombelona, hirao ity hira fisaonana ny amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' mpanjakan’i Ejipta ity ka ambarao aminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Tahaka ny liona tanora ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo anivon’ireo firenena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa toy ny fanano ao anaty ranobe koa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nikofokofoka teny amin’ny oninao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nakobankobanao tamin’ny tongotrao ny rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izany no nandotoanao ny fikorianany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Farao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ampitahaina amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fanano
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo 29.3,4.'
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa ny Ejiptianina dia ho faty eo an-tany fiadiana. Efa voatsoaka ny sabatra; aoka izy handripaka ny tafika ejiptianina manontolo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Any amin’ny toeran’ny maty ireo mpiady maherifo sy ireo mpanampy an’i Ejipta taloha dia hihorakoraka hoe: ‹Midina hiampatra miaraka amintsika atỳ koa ireo tsy voafora maty an’ady ireo!›'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: «Any koa no tafangona ny tafika asirianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Asiria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no fanjakana voalohany azon’ny Babilônianina, jereo 2 Mp 23.29. –And 22-23: jereo nta Is 10.5.'
      marker-yv: yv-n
    - type: text
      text: ' manontolo sady voahodidin’ny fasany; samy voatrabaka sy maty an’ady avokoa izy rehetra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Sehatra lalina indrindra amin’ny toeran’ny maty no misy ny fasany. Samy maty an’ady avokoa izy rehetra, dia ireo izay nampihorohoro taloha teny amin’ny tanin’ny velona.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: «Any koa no tafangona ny tafika helamita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.24 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Helama:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tany izay tao atsinanan’i Babilônia. –And 24-25: jereo Jer 49.34-49. Toa mamerina ny and 24 ihany ny and 25 amin’ny ankapobeny.'
      marker-yv: yv-n
    - type: text
      text: ' manontolo sady voahodidin’ny fasany; samy voatrabaka sy maty an’ady avokoa izy rehetra. Ireo tsy voafora ireo, izay nampihorohoro taloha teny amin’ny tanin’ny velona, dia naidina any ambanin’ny tany. Izao izy rakotry ny henatra miaraka amin’ireo efa tafidina any. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Teo anivon’ireo maty no nanomezana fandriana ho an’ny tafika helamita manontolo izay voahodidin’ny fasany. Olona tsy voafora izy rehetra ireo sady maty an’ady. Nampihorohoro taloha teny amin’ny tanin’ny velona izy, kanjo indreo fa miampatra rakotry ny henatra miaraka amin’ireo efa tafidina any an-davaka ambany any sady voapetraka eo anivon’ireo maty.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: «Any koa ny terak’i Mesèka sy i Tobala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.26 '
