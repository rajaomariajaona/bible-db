          text: jereo 27.13 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', dia ny tafiny manontolo voahodidin’ny fasany. Olona tsy voafora izy rehetra ireo sady maty an’ady, satria nampihorohoro taloha teny amin’ny tanin’ny velona! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ireo tsy voafora ireo dia tsy mba nalevina niaraka tamin’ireo mpiady maherifo maty fahiny; ireto maherifo ireto, na dia nampihorohoro teny amin’ny tanin’ny velona aza, dia naidina tany amin’ny toeran’ny maty niaraka tamin’ny fitaovam-piadiany, ka ny sabany natao teo ambany lohany ary ny ampingany napetraka teo ambonin’ny vatany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fahiny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt tranainy grika izany, fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: anisan’ny tsy voafora.
      marker-yv: yv-n
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ianareo Ejiptianina koa izao dia haripaka ary hiara-miampatra amin’ireo tsy voafora maty an’ady.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: «Any koa ny terak’i Edôma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'terak’i Edôma '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Edômita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo nta 25.12.'
      marker-yv: yv-n
    - type: text
      text: ' mbamin’ireo mpanjakany sy ireo rehetra mpifehy azy. Na dia nahery fo aza izy, dia atao tahaka ireo maty an’ady hafa rehetra, ka hiampatra any an-davaka ambany any miaraka amin’ireo rehetra tsy voafora izay tafidina any.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '‹Izao no lazain’ny Tompo ANDRIANANAHARY: Rehefa tafangona ny firenena maro, dia hosaronako harato ianao, ka hakarin’ireo ho eny amoron-drano amin’io haratoko io. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: «Any koa ireo rehetra mpitondra ny vahoaka any avaratra mbamin’ireo Tsidônianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.30 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Tsidôna:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tanàna fenisianina any avaratr’i Tiro. Matetika ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tsidônianina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mahafaoka ny fitambaran’ny Fenisianina.'
      marker-yv: yv-n
    - type: text
      text: ' rehetra izay nidina ho any amin’ny maty. Nahery fo tokoa ireny ary nampihorohoro, fa ankehitriny ireny tsy voafora ireny dia miampatra rakotry ny henatra, miaraka amin’ireo hafa rehetra maty an’ady. Mitondra fahafaham-baràka izy miaraka amin’ireo rehetra tafidina any an-davaka ambany any.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '«Raha mahita ireo mpiady rehetra ireo any ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ', dia hionona ny amin’izay manjo ny tafiny manontolo; fa ny tenany dia ho faty an’ady koa miaraka amin’ny miaramilany rehetra; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Navelako hampihorohoro teny amin’ny tanin’ny velona ny Farao, fa ankehitriny kosa izy mbamin’ny tafiny manontolo dia halevina miaraka amin’ireo tsy voafora maty an’ady; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hatsipitsipiko eny an-tanety ary hazerazerako eny an-tsaha ianao, dia hampitangoronako ny voromanidina isan-karazany ianao ary homeko hivokisan’ny bibidia rehetra amin’ny tany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny nofonao sisa dia haeliko eny an-tendrombohitra sy hamenoako ny lohasaha. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hampisotroiko ny ranao ny tany, ka ho rakotra azy ny tendrombohitra ary ho feno azy ny lalan-driaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa maty ianao, dia hohamaiziniko ny lanitra, hosaronako ny fahazavan’ny kintana, hotakonako rahona ny masoandro ary tsy hamirapiratra intsony ny hazavan’ny volana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Noho ny aminao, dia hosaronako ny fahazavana rehetra eny an-danitra, ary horakofako haizina ny taninao; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hataoko mitebiteby ny fon’ny firenena maro, hatrany amin’ny tany izay tsy fantatrao akory aza, rehefa hampandrenesiko azy ny faharavanao. '
