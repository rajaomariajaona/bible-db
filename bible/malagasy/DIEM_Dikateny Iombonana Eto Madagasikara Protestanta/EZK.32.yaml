document_id: EZK.32,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fisaonana ny amin’i Ejipta sy ny mpanjakany
  - type: text
    content: Tamin’ny taona faha-12 taorian’ny fahababoana, nony andro voalohan’ny volana faha-12
  - type: note
    content: Izany hoe Febroary-Marsa 585 tal J.K.
  - type: text
    content: ' dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: Ho talanjona ireo firenena maro ireo noho ny namelezako anao. Hipararetra noho ny aminao ny mpanjakany, rehefa harangarangako eny ambony lohany ny sabatro. Amin’ny andro haharavanao dia hangovitra tsy an-kitsahatra izy fa samy manahy momba ny ainy.
  '11':
  - type: text
    content: '‹Izao no lazain’ny Tompo ANDRIANANAHARY : Hibosesika ao aminao ny tafiky ny mpanjakan’i Babilôna. '
  '12':
  - type: text
    content: 'Ireo miaramila masiaka indrindra amin’ny samy tafi-pirenena no halefako hamono ho faty ireo vahoakanao marobe. Horavany i Ejipta fatra-pirehareha ka ho fongotra ny vahoakany marobe rehetra. '
  '13':
  - type: text
    content: 'Haringako ny biby fiompy rehetra izay anananao eny amoron’i Neily, ary tsy hisy tongotr’olona na kitrom-biby fiompy hanakobana sy handoto intsony ny rano. '
  '14':
  - type: text
    content: 'Hampandrîko ho tony izy ka hikoriana milamina toy ny diloilo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '15':
  - type: text
    content: Hovàko ho tany ngazana i Ejipta, ka ny zavatra nameno azy dia hofongorako tsy hisy intsony ary haringako ny mponina rehetra ao aminy. Amin’izay dia hoekena fa Izaho no TOMPO.›
  '16':
  - type: text
    content: «Izany no hira fisaonana hohirain’ny vehivavin’ny firenen-drehetra ny amin’i Ejipta sy ny vahoakany marobe rehetra; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  - type: heading
    content: Fitomaniana ny amin’ireo vahoaka resy
  '17':
  - type: text
    content: Tamin’ny taona faha-12 taorian’ny fahababoana, nony andro faha-15 tanatin’ny volana faha-12
  - type: note
    content: 'faha-12: araka ny and 1 na dia tsy voalazan’ny RM aza ny laharan’ny volana eto.'
  - type: text
    content: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '18':
  - type: text
    content: '«Ry ilay taranak’olombelona, mitolokia ny amin’ny vahoaka maroben’i Ejipta. Izany no ampidino azy miaraka amin’ireo mponin’ny firenen-kafa ho any ambanin’ny tany, izay toerana fidinan’ny maty. '
  '19':
  - type: text
    content: 'Lazao azy hoe: Heverinareo angaha fa hanaovana fitondrana manokana noho ny hafa ianareo? Midîna ianareo hiampatra miaraka amin’ireo tsy '
  - type: text
    content: voafora
  - type: text
    content: ' hafa izay maty an’ady. '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, hirao ity hira fisaonana ny amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta ity ka ambarao aminy hoe:'
  - type: text
    content: ‹Tahaka ny liona tanora ianao
  - type: text
    content: teo anivon’ireo firenena.
  - type: text
    content: Nefa toy ny fanano ao anaty ranobe koa ianao
  - type: text
    content: ka nikofokofoka teny amin’ny oninao;
  - type: text
    content: nakobankobanao tamin’ny tongotrao ny rano
  - type: text
    content: ka izany no nandotoanao ny fikorianany
  - type: note
    content: Farao ampitahaina amin’ny fanano, jereo 29.3,4.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Fa ny Ejiptianina dia ho faty eo an-tany fiadiana. Efa voatsoaka ny sabatra; aoka izy handripaka ny tafika ejiptianina manontolo. '
  '21':
  - type: text
    content: 'Any amin’ny toeran’ny maty ireo mpiady maherifo sy ireo mpanampy an’i Ejipta taloha dia hihorakoraka hoe: ‹Midina hiampatra miaraka amintsika atỳ koa ireo tsy voafora maty an’ady ireo!›'
  '22':
  - type: text
    content: «Any koa no tafangona ny tafika asirianina
  - type: note
    content: 'I Asiria no fanjakana voalohany azon’ny Babilônianina, jereo 2 Mp 23.29. –And 22-23: jereo nta Is 10.5.'
  - type: text
    content: ' manontolo sady voahodidin’ny fasany; samy voatrabaka sy maty an’ady avokoa izy rehetra. '
  '23':
  - type: text
    content: Sehatra lalina indrindra amin’ny toeran’ny maty no misy ny fasany. Samy maty an’ady avokoa izy rehetra, dia ireo izay nampihorohoro taloha teny amin’ny tanin’ny velona.
  '24':
  - type: text
    content: «Any koa no tafangona ny tafika helamita
  - type: note
    content: 'Helama: tany izay tao atsinanan’i Babilônia. –And 24-25: jereo Jer 49.34-49. Toa mamerina ny and 24 ihany ny and 25 amin’ny ankapobeny.'
  - type: text
    content: ' manontolo sady voahodidin’ny fasany; samy voatrabaka sy maty an’ady avokoa izy rehetra. Ireo tsy voafora ireo, izay nampihorohoro taloha teny amin’ny tanin’ny velona, dia naidina any ambanin’ny tany. Izao izy rakotry ny henatra miaraka amin’ireo efa tafidina any. '
  '25':
  - type: text
    content: Teo anivon’ireo maty no nanomezana fandriana ho an’ny tafika helamita manontolo izay voahodidin’ny fasany. Olona tsy voafora izy rehetra ireo sady maty an’ady. Nampihorohoro taloha teny amin’ny tanin’ny velona izy, kanjo indreo fa miampatra rakotry ny henatra miaraka amin’ireo efa tafidina any an-davaka ambany any sady voapetraka eo anivon’ireo maty.
  '26':
  - type: text
    content: «Any koa ny terak’i Mesèka sy i Tobala
  - type: note
    content: 'Mesèka sy Tobala: jereo 27.13 sy nta.'
  - type: text
    content: ', dia ny tafiny manontolo voahodidin’ny fasany. Olona tsy voafora izy rehetra ireo sady maty an’ady, satria nampihorohoro taloha teny amin’ny tanin’ny velona! '
  '27':
  - type: text
    content: Ireo tsy voafora ireo dia tsy mba nalevina niaraka tamin’ireo mpiady maherifo maty fahiny; ireto maherifo ireto, na dia nampihorohoro teny amin’ny tanin’ny velona aza, dia naidina tany amin’ny toeran’ny maty niaraka tamin’ny fitaovam-piadiany, ka ny sabany natao teo ambany lohany ary ny ampingany napetraka teo ambonin’ny vatany
  - type: note
    content: 'fahiny: araka ny dkt tranainy grika izany, fa ny RM kosa manao hoe anisan’ny tsy voafora.'
  - type: text
    content: '. '
  '28':
  - type: text
    content: Ianareo Ejiptianina koa izao dia haripaka ary hiara-miampatra amin’ireo tsy voafora maty an’ady.
  '29':
  - type: text
    content: «Any koa ny terak’i Edôma
  - type: note
    content: 'terak’i Edôma na hoe Edômita: jereo nta 25.12.'
  - type: text
    content: ' mbamin’ireo mpanjakany sy ireo rehetra mpifehy azy. Na dia nahery fo aza izy, dia atao tahaka ireo maty an’ady hafa rehetra, ka hiampatra any an-davaka ambany any miaraka amin’ireo rehetra tsy voafora izay tafidina any.'
  '3':
  - type: text
    content: '‹Izao no lazain’ny Tompo ANDRIANANAHARY: Rehefa tafangona ny firenena maro, dia hosaronako harato ianao, ka hakarin’ireo ho eny amoron-drano amin’io haratoko io. '
  '30':
  - type: text
    content: «Any koa ireo rehetra mpitondra ny vahoaka any avaratra mbamin’ireo Tsidônianina
  - type: note
    content: 'Tsidôna: tanàna fenisianina any avaratr’i Tiro. Matetika ny hoe Tsidônianina dia mahafaoka ny fitambaran’ny Fenisianina.'
  - type: text
    content: ' rehetra izay nidina ho any amin’ny maty. Nahery fo tokoa ireny ary nampihorohoro, fa ankehitriny ireny tsy voafora ireny dia miampatra rakotry ny henatra, miaraka amin’ireo hafa rehetra maty an’ady. Mitondra fahafaham-baràka izy miaraka amin’ireo rehetra tafidina any an-davaka ambany any.'
  '31':
  - type: text
    content: '«Raha mahita ireo mpiady rehetra ireo any ny '
  - type: text
    content: Farao
  - type: text
    content: ', dia hionona ny amin’izay manjo ny tafiny manontolo; fa ny tenany dia ho faty an’ady koa miaraka amin’ny miaramilany rehetra; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '32':
  - type: text
    content: Navelako hampihorohoro teny amin’ny tanin’ny velona ny Farao, fa ankehitriny kosa izy mbamin’ny tafiny manontolo dia halevina miaraka amin’ireo tsy voafora maty an’ady; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '4':
  - type: text
    content: 'Hatsipitsipiko eny an-tanety ary hazerazerako eny an-tsaha ianao, dia hampitangoronako ny voromanidina isan-karazany ianao ary homeko hivokisan’ny bibidia rehetra amin’ny tany. '
  '5':
  - type: text
    content: 'Ary ny nofonao sisa dia haeliko eny an-tendrombohitra sy hamenoako ny lohasaha. '
  '6':
  - type: text
    content: 'Hampisotroiko ny ranao ny tany, ka ho rakotra azy ny tendrombohitra ary ho feno azy ny lalan-driaka. '
  '7':
  - type: text
    content: 'Rehefa maty ianao, dia hohamaiziniko ny lanitra, hosaronako ny fahazavan’ny kintana, hotakonako rahona ny masoandro ary tsy hamirapiratra intsony ny hazavan’ny volana. '
  '8':
  - type: text
    content: 'Noho ny aminao, dia hosaronako ny fahazavana rehetra eny an-danitra, ary horakofako haizina ny taninao; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '9':
  - type: text
    content: 'Hataoko mitebiteby ny fon’ny firenena maro, hatrany amin’ny tany izay tsy fantatrao akory aza, rehefa hampandrenesiko azy ny faharavanao. '
