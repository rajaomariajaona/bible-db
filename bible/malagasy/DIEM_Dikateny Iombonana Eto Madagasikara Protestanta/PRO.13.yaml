document_id: PRO.13
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny zanaka hendry mihaino ny anatry ny rainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny zanaka mpaniratsira kosa mandà fitsikerana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny olona tsara dia mijinja ny vokatry ny teniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mpanao ratsy kosa mivelona amin’ny herisetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay mahafehy ny vavany maharo ny ainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay basivava mandringan-tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny kamo no mitsiriritra tsy mety afa-po;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mazoto kosa mahazo izay irîny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny olo-marina dia mankahala ny lainga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-dratsy kosa manevateva sy manala baràka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahamarinana miaro izay mizotra tsy misy tsiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny faharatsiana kosa mamery ny mpanota.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misy miseho ho manankarena nefa tsy manam-bariraiventy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa misy kosa mody mahantra nefa manana harem-be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny haren’ny olona no antoky ny ainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny mahantra tsy matahotra fandrahonana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny olo-marina dia toy ny hazavana tsara famiratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-dratsy kosa dia toy ny jiro efa ho faty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fifandirana no hany ateraky ny avonavona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mandray torohevitra kosa no misy fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny harena azo amim-pahamaikana dia mihena an-toerana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay manangona izany tsikelikely no mampitombo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fanantenana mihemo-dava dia mankarary fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny firarian-tsoa tanteraka kosa mampahazo aina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mamery tena izay manamavo ny teny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hahazo valisoa kosa izay manaja ny didy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fampianaran’ny hendry dia loharanon’aina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hialana amin’ny fandriky ny fahafatesana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.18 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ahazoan-tsitraka ny fahalalana enti-manasoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny toetran’ny ratsy fanahy kosa mitratrevatreva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny malina rehetra dia miasa amim-pandinihana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny adala kosa mampiseho hafokana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny iraka ratsy fanahy dia mampidi-doza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny masoivoho mahatoky kosa manarin-javatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hahantra sy ho menatra izay mandà fananarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa homem-boninahitra kosa izay mandray tsikera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fifaliam-panahy ny firarian-tsoa izay tanteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maharikoriko ireo adala kosa ny hiala amin’ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay miaraka amin’ny hendry dia hihahendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay misakaiza amin’ny adala kosa hiharatsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Loza no manjohy ny mpanota;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hasambarana kosa no valisoan’ny olo-marina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 10.27 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny olona tsara fanahy mamela lova ho an’ny taranany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny haren’ny mpanota kosa voatahiry ho an’ny olo-marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny sahan’ny mahantra izay voaasa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mahavokatra hanina be;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olona sasany kosa ringana
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tsy rariny ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay tsy mba mikapoka an-janany tsy tia azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay tia azy kosa tsy misalasala manafay azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny olo-marina dia mihinana mahalala onona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny kibon’ny olon-dratsy kosa tsy mety afa-po.
