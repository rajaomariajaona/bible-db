document_id: PRO.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanaka hendry mihaino ny anatry ny rainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny zanaka mpaniratsira kosa mandà fitsikerana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fifandirana no hany ateraky ny avonavona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mandray torohevitra kosa no misy fahendrena.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny harena azo amim-pahamaikana dia mihena an-toerana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay manangona izany tsikelikely no mampitombo azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanantenana mihemo-dava dia mankarary fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny firarian-tsoa tanteraka kosa mampahazo aina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamery tena izay manamavo ny teny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hahazo valisoa kosa izay manaja ny didy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fampianaran’ny hendry dia loharanon’aina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hialana amin’ny fandriky ny fahafatesana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.18 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahazoan-tsitraka ny fahalalana enti-manasoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny toetran’ny ratsy fanahy kosa mitratrevatreva.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny malina rehetra dia miasa amim-pandinihana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny adala kosa mampiseho hafokana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny iraka ratsy fanahy dia mampidi-doza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny masoivoho mahatoky kosa manarin-javatra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahantra sy ho menatra izay mandà fananarana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa homem-boninahitra kosa izay mandray tsikera.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fifaliam-panahy ny firarian-tsoa izay tanteraka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maharikoriko ireo adala kosa ny hiala amin’ny ratsy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona tsara dia mijinja ny vokatry ny teniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mpanao ratsy kosa mivelona amin’ny herisetra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miaraka amin’ny hendry dia hihahendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay misakaiza amin’ny adala kosa hiharatsy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loza no manjohy ny mpanota;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hasambarana kosa no valisoan’ny olo-marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 10.27 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona tsara fanahy mamela lova ho an’ny taranany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny haren’ny mpanota kosa voatahiry ho an’ny olo-marina.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sahan’ny mahantra izay voaasa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mahavokatra hanina be;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olona sasany kosa ringana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny tsy rariny ataony.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy mba mikapoka an-janany tsy tia azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay tia azy kosa tsy misalasala manafay azy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-marina dia mihinana mahalala onona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny kibon’ny olon-dratsy kosa tsy mety afa-po.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mahafehy ny vavany maharo ny ainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay basivava mandringan-tena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kamo no mitsiriritra tsy mety afa-po;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mazoto kosa mahazo izay irîny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-marina dia mankahala ny lainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olon-dratsy kosa manevateva sy manala baràka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinana miaro izay mizotra tsy misy tsiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny faharatsiana kosa mamery ny mpanota.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy miseho ho manankarena nefa tsy manam-bariraiventy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa misy kosa mody mahantra nefa manana harem-be.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny haren’ny olona no antoky ny ainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mahantra tsy matahotra fandrahonana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-marina dia toy ny hazavana tsara famiratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olon-dratsy kosa dia toy ny jiro efa ho faty.
