document_id: PRO.13,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ny zanaka hendry mihaino ny anatry ny rainy,
  - type: text
    content: fa ny zanaka mpaniratsira kosa mandà fitsikerana.
  '10':
  - type: text
    content: Fifandirana no hany ateraky ny avonavona;
  - type: text
    content: fa izay mandray torohevitra kosa no misy fahendrena.
  '11':
  - type: text
    content: Ny harena azo amim-pahamaikana dia mihena an-toerana;
  - type: text
    content: fa izay manangona izany tsikelikely no mampitombo azy.
  '12':
  - type: text
    content: Ny fanantenana mihemo-dava dia mankarary fo;
  - type: text
    content: fa ny firarian-tsoa tanteraka kosa mampahazo aina.
  '13':
  - type: text
    content: Mamery tena izay manamavo ny teny;
  - type: text
    content: fa hahazo valisoa kosa izay manaja ny didy.
  '14':
  - type: text
    content: Ny fampianaran’ny hendry dia loharanon’aina,
  - type: text
    content: mba hialana amin’ny fandriky ny fahafatesana
  - type: note
    content: Jereo 3.18 sy nta.
  - type: text
    content: .
  '15':
  - type: text
    content: Ahazoan-tsitraka ny fahalalana enti-manasoa,
  - type: text
    content: fa ny toetran’ny ratsy fanahy kosa mitratrevatreva.
  '16':
  - type: text
    content: Ny malina rehetra dia miasa amim-pandinihana;
  - type: text
    content: fa ny adala kosa mampiseho hafokana.
  '17':
  - type: text
    content: Ny iraka ratsy fanahy dia mampidi-doza;
  - type: text
    content: fa ny masoivoho mahatoky kosa manarin-javatra.
  '18':
  - type: text
    content: Hahantra sy ho menatra izay mandà fananarana;
  - type: text
    content: fa homem-boninahitra kosa izay mandray tsikera.
  '19':
  - type: text
    content: Fifaliam-panahy ny firarian-tsoa izay tanteraka;
  - type: text
    content: maharikoriko ireo adala kosa ny hiala amin’ny ratsy.
  '2':
  - type: text
    content: Ny olona tsara dia mijinja ny vokatry ny teniny,
  - type: text
    content: fa ny mpanao ratsy kosa mivelona amin’ny herisetra.
  '20':
  - type: text
    content: Izay miaraka amin’ny hendry dia hihahendry;
  - type: text
    content: fa izay misakaiza amin’ny adala kosa hiharatsy.
  '21':
  - type: text
    content: Loza no manjohy ny mpanota;
  - type: text
    content: fa hasambarana kosa no valisoan’ny olo-marina
  - type: note
    content: Jereo 10.27 sy nta.
  - type: text
    content: .
  '22':
  - type: text
    content: Ny olona tsara fanahy mamela lova ho an’ny taranany;
  - type: text
    content: fa ny haren’ny mpanota kosa voatahiry ho an’ny olo-marina.
  '23':
  - type: text
    content: Ny sahan’ny mahantra izay voaasa
  - type: text
    content: dia mahavokatra hanina be;
  - type: text
    content: fa ny olona sasany kosa ringana
  - type: text
    content: noho ny tsy rariny ataony.
  '24':
  - type: text
    content: Izay tsy mba mikapoka an-janany tsy tia azy;
  - type: text
    content: fa izay tia azy kosa tsy misalasala manafay azy.
  '25':
  - type: text
    content: Ny olo-marina dia mihinana mahalala onona;
  - type: text
    content: fa ny kibon’ny olon-dratsy kosa tsy mety afa-po.
  '3':
  - type: text
    content: Izay mahafehy ny vavany maharo ny ainy;
  - type: text
    content: fa izay basivava mandringan-tena.
  '4':
  - type: text
    content: Ny kamo no mitsiriritra tsy mety afa-po;
  - type: text
    content: fa ny mazoto kosa mahazo izay irîny.
  '5':
  - type: text
    content: Ny olo-marina dia mankahala ny lainga;
  - type: text
    content: fa ny olon-dratsy kosa manevateva sy manala baràka.
  '6':
  - type: text
    content: Ny fahamarinana miaro izay mizotra tsy misy tsiny;
  - type: text
    content: fa ny faharatsiana kosa mamery ny mpanota.
  '7':
  - type: text
    content: Misy miseho ho manankarena nefa tsy manam-bariraiventy;
  - type: text
    content: fa misy kosa mody mahantra nefa manana harem-be.
  '8':
  - type: text
    content: Ny haren’ny olona no antoky ny ainy;
  - type: text
    content: fa ny mahantra tsy matahotra fandrahonana.
  '9':
  - type: text
    content: Ny olo-marina dia toy ny hazavana tsara famiratra;
  - type: text
    content: fa ny olon-dratsy kosa dia toy ny jiro efa ho faty.
