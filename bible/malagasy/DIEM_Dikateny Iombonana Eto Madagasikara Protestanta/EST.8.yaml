document_id: EST.8,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Androtr’io ihany dia nomen’ny amperôra Kserksesa ho an’i Estera mpanjakavavy ireo fananan’i Hamàna fahavalon’ny Jiosy. I Môrdôkay koa, rehefa nampahafantarin’i Estera fa rainy izy, dia nasaina hankeo amin’ny amperôra. '
  '10':
  - type: text
    content: 'Nosoniavina tamin’ny anaran’ny amperôra ireo taratasy ireo sy notombohina tamin’ny peratra tombokaseny ary dia nampitondraina iraka, mitaingina soavalim-panjakana haingam-pandeha avy amin’ny fiompian-tsoavalin’ny amperôra. '
  '11':
  - type: text
    content: 'Voarakitry ny taratasy fa ny Jiosy isan-tanàna misy azy dia nomen’ny amperôra lalana hivory hiaro ny ainy. Navela koa ry zareo handringana sy hamono ho ripaka izay andian’olona mamely azy any amin’ny firenena sy faritany isan-tokony; azony atao aza ny mamono ny vady aman-janak’ireo sy ny mandroba ny fananany. '
  '12':
  - type: text
    content: Andro iray ihany no hampiharana izany fanomezan-dalana izany amin’ny faritany rehetra manerana ny fanjakan’i Kserksesa, dia ny andro faha-13 amin’ny volana faha-12 na volana Adara
  - type: note
    content: Ilay daty nokasaina handringanana ny Jiosy no tian-kambara amin’izany, jereo 3.13.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ny kopian’io taratasy io dia navoaka ho didy manan-kery amin’ny isam-paritany ary nampahafantarina ny olona rehetra mba hampiomana ny Jiosy ho amin’izany andro hamaliany ny fahavalony izany. '
  '14':
  - type: text
    content: Noho ny baikon’ny amperôra, dia nandeha faingana sy dodona ny iraka, nitaingina soavalim-panjakana haingam-pandeha avy amin’ny fiompian-tsoavalin’ny amperôra. Ary navoaka tao Sosany renivohitra
  - type: note
    content: 'Sosany renivohitra: jereo 1.2 sy nta.'
  - type: text
    content: ' koa izany didy manan-kery izany.'
  '15':
  - type: text
    content: 'Fony i Môrdôkay nivoaka ny lapa, dia akanjo lava vita rongony madinika miloko jaky no nanaovany, fanamiam-piandrianana fotsy sy volomparasy no nitafiany, ary satroboninahitra volamena lehibe no nisatrohany; koa faly sy ravo i Sosany iray vohitra. '
  '16':
  - type: text
    content: 'Ny Jiosy dia miramirana sy ravoravo ary heni-kafaliana amam-boninahitra. '
  '17':
  - type: text
    content: Isam-paritany sy isan-tanàna nahatongavan’ny teny aman-didin’ny amperôra, dia ravoravo sy heni-kafaliana ny Jiosy ary nanao fanasana sy lanonana. Maro ny olona tompon-tany no tonga Jiosy, satria nanindry azy ny fahatahorana ny Jiosy.
  '2':
  - type: text
    content: Ary nesorin’i Kserksesa ilay peratra tombokase, izay efa nalainy tamin’i Hamàna, ka nomeny an’i Môrdôkay
  - type: note
    content: Momba ny hevitr’izany fihetsika izany, jereo 3.10 sy nta.
  - type: text
    content: . Ankoatra izany i Môrdôkay dia notendren’i Estera hitantana ireo fananan’i Hamàna.
  - type: heading
    content: Didin’ny amperôra hiarovana ny Jiosy
  '3':
  - type: text
    content: Dia niteny teo anatrehan’ny amperôra indray i Estera sady niankohoka teo an-tongony ka nitomany sy nifona taminy mba hanafoana ny loza notetehin’i Hamàna taranak’i Agaga
  - type: note
    content: 'ny loza notetehin’i Hamàna: jereo 3.8-19. –taranak’i Agaga: jereo 3.1 sy nta.'
  - type: text
    content: ' hamelezana ny Jiosy. '
  '4':
  - type: text
    content: Ary notondroin’ny amperôra tamin’ny tehim-bolamena i Estera
  - type: note
    content: Momba ny hevitr’izany fihetsika izany, jereo 4.11.
  - type: text
    content: ', ka nitsangana sy nijoro teo anatrehany '
  '5':
  - type: text
    content: 'ary nanao hoe:'
  - type: text
    content: '–Ry andriamanjaka, raha sitrakao sy ataonao ho mety ary raha mba mahazo fitia eo anatrehanao sy tsara eo imasonao aho, dia aoka hisy soratra hanova ireo taratasy voahevitr’i Hamàna zanakalahin’i Hamedatà sady taranak’i Agaga. Nosoratan’i Hamàna manko ireny taratasy ireny hampandringana ny Jiosy any amin’ny faritany rehetra manerana ny fanjakanao. '
  '6':
  - type: text
    content: Ka hataoko ahoana no fijery ny loza hanjo ireo mpiray firenena amiko sy ny fandringanana ireo iray firazanana amiko?
  '7':
  - type: text
    content: 'Dia hoy ny amperôra Kserksesa tamin’i Estera mpanjakavavy sy tamin’i Môrdôkay ilay Jiosy:'
  - type: text
    content: '–Indro efa nahantona tamin’ny hazo i Hamàna satria naninji-tanana hamely ny Jiosy; sady ireo fananany koa, ry Estera, efa nomeko anao. '
  '8':
  - type: text
    content: Tsy azo foanana rehefa taratasy voasoratra tamin’ny anarako sy voatomboka tamin’ny peratro; kanefa manorata taratasy amin’ny anarako ianareo, araka izay sitrakareo mba hamonjena ny Jiosy, ka tombohy amin’ny peratro izany.
  '9':
  - type: text
    content: 'Tamin’io andro io, andro faha-23 tamin’ny volana fahatelo na volana Sivàna, dia nantsoina ny mpitantsoratry ny amperôra. Araka izay rehetra nandidian’i Môrdôkay no nanoratany taratasy ho an’ny Jiosy sy ny solotenan’ny amperôra mbamin’ny governora sy mpitondra any amin’ny faritany 127 hatreo India ka hatrany Etiôpia. Taratasy araka ny fomba fiteny sy fanoratry ny firenena isan-tokony na araka ny fomba fiteny sy fanoratry ny Jiosy no nataony. '
