document_id: EST.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Androtr’io ihany dia nomen’ny amperôra Kserksesa ho an’i Estera mpanjakavavy ireo fananan’i Hamàna fahavalon’ny Jiosy. I Môrdôkay koa, rehefa nampahafantarin’i Estera fa rainy izy, dia nasaina hankeo amin’ny amperôra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nesorin’i Kserksesa ilay peratra tombokase, izay efa nalainy tamin’i Hamàna, ka nomeny an’i Môrdôkay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny hevitr’izany fihetsika izany, jereo 3.10 sy nta.
    marker-yv: yv-n
  - type: text
    text: . Ankoatra izany i Môrdôkay dia notendren’i Estera hitantana ireo fananan’i Hamàna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Didin’ny amperôra hiarovana ny Jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia niteny teo anatrehan’ny amperôra indray i Estera sady niankohoka teo an-tongony ka nitomany sy nifona taminy mba hanafoana ny loza notetehin’i Hamàna taranak’i Agaga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny loza notetehin’i Hamàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 3.8-19. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: taranak’i Agaga
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 3.1 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' hamelezana ny Jiosy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary notondroin’ny amperôra tamin’ny tehim-bolamena i Estera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny hevitr’izany fihetsika izany, jereo 4.11.
    marker-yv: yv-n
  - type: text
    text: ', ka nitsangana sy nijoro teo anatrehany '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '–Ry andriamanjaka, raha sitrakao sy ataonao ho mety ary raha mba mahazo fitia eo anatrehanao sy tsara eo imasonao aho, dia aoka hisy soratra hanova ireo taratasy voahevitr’i Hamàna zanakalahin’i Hamedatà sady taranak’i Agaga. Nosoratan’i Hamàna manko ireny taratasy ireny hampandringana ny Jiosy any amin’ny faritany rehetra manerana ny fanjakanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ka hataoko ahoana no fijery ny loza hanjo ireo mpiray firenena amiko sy ny fandringanana ireo iray firazanana amiko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy ny amperôra Kserksesa tamin’i Estera mpanjakavavy sy tamin’i Môrdôkay ilay Jiosy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro efa nahantona tamin’ny hazo i Hamàna satria naninji-tanana hamely ny Jiosy; sady ireo fananany koa, ry Estera, efa nomeko anao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy azo foanana rehefa taratasy voasoratra tamin’ny anarako sy voatomboka tamin’ny peratro; kanefa manorata taratasy amin’ny anarako ianareo, araka izay sitrakareo mba hamonjena ny Jiosy, ka tombohy amin’ny peratro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tamin’io andro io, andro faha-23 tamin’ny volana fahatelo na volana Sivàna, dia nantsoina ny mpitantsoratry ny amperôra. Araka izay rehetra nandidian’i Môrdôkay no nanoratany taratasy ho an’ny Jiosy sy ny solotenan’ny amperôra mbamin’ny governora sy mpitondra any amin’ny faritany 127 hatreo India ka hatrany Etiôpia. Taratasy araka ny fomba fiteny sy fanoratry ny firenena isan-tokony na araka ny fomba fiteny sy fanoratry ny Jiosy no nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nosoniavina tamin’ny anaran’ny amperôra ireo taratasy ireo sy notombohina tamin’ny peratra tombokaseny ary dia nampitondraina iraka, mitaingina soavalim-panjakana haingam-pandeha avy amin’ny fiompian-tsoavalin’ny amperôra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voarakitry ny taratasy fa ny Jiosy isan-tanàna misy azy dia nomen’ny amperôra lalana hivory hiaro ny ainy. Navela koa ry zareo handringana sy hamono ho ripaka izay andian’olona mamely azy any amin’ny firenena sy faritany isan-tokony; azony atao aza ny mamono ny vady aman-janak’ireo sy ny mandroba ny fananany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Andro iray ihany no hampiharana izany fanomezan-dalana izany amin’ny faritany rehetra manerana ny fanjakan’i Kserksesa, dia ny andro faha-13 amin’ny volana faha-12 na volana Adara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ilay daty nokasaina handringanana ny Jiosy no tian-kambara amin’izany, jereo 3.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny kopian’io taratasy io dia navoaka ho didy manan-kery amin’ny isam-paritany ary nampahafantarina ny olona rehetra mba hampiomana ny Jiosy ho amin’izany andro hamaliany ny fahavalony izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Noho ny baikon’ny amperôra, dia nandeha faingana sy dodona ny iraka, nitaingina soavalim-panjakana haingam-pandeha avy amin’ny fiompian-tsoavalin’ny amperôra. Ary navoaka tao Sosany renivohitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sosany renivohitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' koa izany didy manan-kery izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fony i Môrdôkay nivoaka ny lapa, dia akanjo lava vita rongony madinika miloko jaky no nanaovany, fanamiam-piandrianana fotsy sy volomparasy no nitafiany, ary satroboninahitra volamena lehibe no nisatrohany; koa faly sy ravo i Sosany iray vohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny Jiosy dia miramirana sy ravoravo ary heni-kafaliana amam-boninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Isam-paritany sy isan-tanàna nahatongavan’ny teny aman-didin’ny amperôra, dia ravoravo sy heni-kafaliana ny Jiosy ary nanao fanasana sy lanonana. Maro ny olona tompon-tany no tonga Jiosy, satria nanindry azy ny fahatahorana ny Jiosy.
