document_id: JER.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nilanja zioga i Jeremià
  - type: text
    content: Tamin’ny fiandohan’ny nanjakan’i Tsedekià
  - type: note
    content: 'Tsedekià: araka ny stf hebreo vitsivitsy sy dkt tranainy siriaka sy arabo ary ny and 3,12,30; misy stf hebreo sasany manao hoe Jôiakima. –fanjakan’i Tsedekià: jereo 2 Mp 24.18–25.7; 2 Tan 36.11-13.'
  - type: text
    content: ', zanakalahin’i Josià sady mpanjakan’i Joda, dia nisy teny avy amin’ny TOMPO tonga tamin’i Jeremià nanao hoe:'
  '10':
  - type: text
    content: Fa maminany lainga aminareo izy; koa raha mihaino azy ianareo, dia hoentina hanalavitra ny taninareo. Eny, horoahiko hiala eto ianareo ka ho lany ringana.
  '11':
  - type: text
    content: «Fa ny firenena, izay manaiky hitondra ny zioga, ampitondrain’ny mpanjakan’i Babilôna azy kosa ka manompo azy, dia havelako ho eo amin’ny taniny, ary ho afaka hamboly azy sy honina eo, hoy ny teny hentitra avy amiko TOMPO.»
  '12':
  - type: text
    content: 'Araka izany hafatra izany koa no nilazan’i Jeremià tamin’i Tsedekià mpanjakan’i Joda hoe:'
  - type: text
    content: '«Maneke hitondra ny zioga izay ampitondrain’ny mpanjakan’i Babilôna ianao sy ny vahoakanao, ka manompoa azy sy ny vahoakany, dia ho velona ianareo. '
  '13':
  - type: text
    content: 'Fa nahoana moa no tsy maintsy ho faty amin’ny ady sy ny mosary ary ny areti-mandringana ianao sy ny vahoakanao? Izany no hanjo ny firenena rehetra izay tsy manaiky hanompo ny mpanjakan’i Babilôna araka izay voalazan’ny Tompo. '
  '14':
  - type: text
    content: 'Misy mpaminany mihambo milaza fa tsy hanompo ny mpanjakan’i Babilôna intsony ianareo. Maminany lainga izy, ka aza mihaino azy ianareo. '
  '15':
  - type: text
    content: 'Hentitra kosa ny tenin’ny TOMPO hoe: ‹Tsy naniraka ireny Aho. Mihambo miteny amin’ny anarako izy, nefa mandainga. Koa raha mihaino azy ianareo, dia horoahiko hiala eto, ka ho lany ringana ianareo sy ireto mpaminany izay maminany aminareo.› »'
  '16':
  - type: text
    content: 'Farany dia ireo mpisorona sy ny vahoaka rehetra teo no nitenenan’i Jeremià hoe: «Izao no lazain’ny TOMPO: ‹Aza mihaino ny tenin’ireo mpaminany izay milaza aminareo fa haverina haingana avy any Babilôna ny fanaky ny tranon’ny TOMPO'
  - type: note
    content: Jereo 2 Mp 24.13; 2 Tan 36.10.
  - type: text
    content: ', satria lainga izay nambarany taminareo. '
  '17':
  - type: text
    content: Aza mihaino azy fa manompoa an’i Nebokadnetsara, dia ho velona ianareo. Fa nahoana no avela ho rava ity tanàna ity?› »
  '18':
  - type: text
    content: 'Sady nampian’i Jeremià hoe: «Raha mpaminany tokoa ireo olona ireo, ka tena mitondra ny hafatra avy amin’ny TOMPO, dia aoka izy hangataka amin’ny TOMPOn’izao rehetra izao mba tsy havelany hoentina any Babilôna ireo fanaka sarobidy sisa mbola ao an-tranon’ny TOMPO sy ao an-dapan’ny mpanjakan’i Joda na eto an-tanàna. '
  '19':
  - type: text
    content: Fa manan-kolazaina ny TOMPOn’izao rehetra izao momba ireo andry
  - type: note
    content: Jereo 1 Mp 7.13-39; 2 Mp 25.13-17.
  - type: text
    content: ' sy ilay fitobian-drano goavana ary ireo kovetabe misy tongony mbamin’ireo fanaka hafa mbola eto Jerosalema. ( '
  '2':
  - type: text
    content: '«Izao no voalazan’ny TOMPO: Manamboara mahazaka sy '
  - type: text
    content: zioga
  - type: text
    content: ' ka lanjao eny an-tsorokao. '
  '20':
  - type: text
    content: I Nebokadnetsara mpanjakan’i Babilôna manko tsy mbola nitondra ireo fitaovana ireo avy tao Jerosalema hankany Babilôna fony izy nitondra an’i Jekonià
  - type: note
    content: 'Jekonià: jereo ny naoty momba ny 22.24.'
  - type: text
    content: ', zanakalahin’i Joîakima sady mpanjakan’i Joda sy ireo olo-manankaja rehetra avy eto Joda sy i Jerosalema.) '
  '21':
  - type: text
    content: 'Koa izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely, ny amin’ireo fanaka sisa tafajanona ao an-tranon’ny TOMPO sy ao an-dapan’ny mpanjakan’i Joda na eto Jerosalema: '
  '22':
  - type: text
    content: «Hoentina any Babilôna ireo fanaka rehetra ireo, ary hijanona any ambara-piavin’ny andro hirotsahako an-tsehatra hampakatra sy hamerina azy eto amin’ity toerana ity indray.»
  - type: text
    content: Izany no teny hentitry ny TOMPO.
  '3':
  - type: text
    content: 'Avy eo dia alefaso any amin’ny mpanjakan’i Edôma sy ny mpanjakan’i Môaba ary ny mpanjakan’ny Hamônita mbamin’ny mpanjakan’i Tiro sy ny mpanjakan’i Tsidôna ireny. Ampitondray ireo masoivohony tonga eto Jerosalema mba hihaona amin’i Tsedekià mpanjakan’i Joda ireny zioga ireny; '
  '4':
  - type: text
    content: 'sady asaovy ampitainy tsara amin’ny tompony avy ity hafatra ity: «Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely ka hampitainareo amin’ny tomponareo: '
  '5':
  - type: text
    content: 'Izaho no nanao ny tany sy ny olona ary ny biby eny ambonin’ny tany tamin-kery lehibe sy tamim-pahefana tsy hay tohaina, ka manome azy ho an’izay tiako. '
  '6':
  - type: text
    content: 'Koa ankehitriny dia atolotro eo an-tanan’i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' sady mpanompoko ny taninareo rehetra; ary atolotro hanompo azy na dia ny bibidia aza. '
  '7':
  - type: text
    content: Hanompo azy sy ny zanany mbamin’ny zafikeliny ny firenena rehetra ambara-pahatongan’ny andro hanompoan’ny taniny kosa an’ireo firenena matanjaka kokoa sy mpanjaka lehibe kokoa.
  '8':
  - type: text
    content: «Koa raha misy firenena na fanjakana tsy mety manompo an’i Nebokadnetsara, eny, raha misy firenena tsy manaiky hitondra ny zioga izay hampitondrain’i Nebokadnetsara azy, dia hirotsaka an-tsehatra Aho hamely izany firenena izany amin’ny ady sy ny mosary ary ny areti-mandringana, hoy ny teny hentitra avy amiko TOMPO; ary ny tanan’i Nebokadnetsara no hasaiko mandripaka azy
  - type: note
    content: 'ary ny tanan’i Nebokadnetsara... azy: ny dkt tranainy kosa manao hoe mandra-pahafoana azy.'
  - type: text
    content: .
  '9':
  - type: text
    content: '«Noho izany, dia aza henoinareo ny '
  - type: text
    content: mpaminaninareo
  - type: text
    content: ' na ny mpisikidy milaza ny hoavy amin’ny antsapaka, na ny mpilaza nofy na ny mpanandro na ny mpimasy izay mihambo fa tsy hanompo an’i Nebokadnetsara ianareo. '
