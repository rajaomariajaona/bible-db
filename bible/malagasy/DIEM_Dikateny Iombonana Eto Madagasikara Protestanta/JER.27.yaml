document_id: JER.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nilanja zioga i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny fiandohan’ny nanjakan’i Tsedekià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsedekià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny stf hebreo vitsivitsy sy dkt tranainy siriaka sy arabo ary ny and 3,12,30; misy stf hebreo sasany manao hoe Jôiakima. –
    - type: usfm
      marker: bd
      children:
      - type: text
        text: fanjakan’i Tsedekià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 2 Mp 24.18–25.7; 2 Tan 36.11-13.'
    marker-yv: yv-n
  - type: text
    text: ', zanakalahin’i Josià sady mpanjakan’i Joda, dia nisy teny avy amin’ny TOMPO tonga tamin’i Jeremià nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Izao no voalazan’ny TOMPO: Manamboara mahazaka sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zioga
  - type: text
    text: ' ka lanjao eny an-tsorokao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Avy eo dia alefaso any amin’ny mpanjakan’i Edôma sy ny mpanjakan’i Môaba ary ny mpanjakan’ny Hamônita mbamin’ny mpanjakan’i Tiro sy ny mpanjakan’i Tsidôna ireny. Ampitondray ireo masoivohony tonga eto Jerosalema mba hihaona amin’i Tsedekià mpanjakan’i Joda ireny zioga ireny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sady asaovy ampitainy tsara amin’ny tompony avy ity hafatra ity: «Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely ka hampitainareo amin’ny tomponareo: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izaho no nanao ny tany sy ny olona ary ny biby eny ambonin’ny tany tamin-kery lehibe sy tamim-pahefana tsy hay tohaina, ka manome azy ho an’izay tiako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa ankehitriny dia atolotro eo an-tanan’i Nebokadnetsara mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' sady mpanompoko ny taninareo rehetra; ary atolotro hanompo azy na dia ny bibidia aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hanompo azy sy ny zanany mbamin’ny zafikeliny ny firenena rehetra ambara-pahatongan’ny andro hanompoan’ny taniny kosa an’ireo firenena matanjaka kokoa sy mpanjaka lehibe kokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Koa raha misy firenena na fanjakana tsy mety manompo an’i Nebokadnetsara, eny, raha misy firenena tsy manaiky hitondra ny zioga izay hampitondrain’i Nebokadnetsara azy, dia hirotsaka an-tsehatra Aho hamely izany firenena izany amin’ny ady sy ny mosary ary ny areti-mandringana, hoy ny teny hentitra avy amiko TOMPO; ary ny tanan’i Nebokadnetsara no hasaiko mandripaka azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary ny tanan’i Nebokadnetsara... azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny dkt tranainy kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mandra-pahafoana azy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Noho izany, dia aza henoinareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminaninareo
  - type: text
    text: ' na ny mpisikidy milaza ny hoavy amin’ny antsapaka, na ny mpilaza nofy na ny mpanandro na ny mpimasy izay mihambo fa tsy hanompo an’i Nebokadnetsara ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa maminany lainga aminareo izy; koa raha mihaino azy ianareo, dia hoentina hanalavitra ny taninareo. Eny, horoahiko hiala eto ianareo ka ho lany ringana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: «Fa ny firenena, izay manaiky hitondra ny zioga, ampitondrain’ny mpanjakan’i Babilôna azy kosa ka manompo azy, dia havelako ho eo amin’ny taniny, ary ho afaka hamboly azy sy honina eo, hoy ny teny hentitra avy amiko TOMPO.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Araka izany hafatra izany koa no nilazan’i Jeremià tamin’i Tsedekià mpanjakan’i Joda hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '«Maneke hitondra ny zioga izay ampitondrain’ny mpanjakan’i Babilôna ianao sy ny vahoakanao, ka manompoa azy sy ny vahoakany, dia ho velona ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa nahoana moa no tsy maintsy ho faty amin’ny ady sy ny mosary ary ny areti-mandringana ianao sy ny vahoakanao? Izany no hanjo ny firenena rehetra izay tsy manaiky hanompo ny mpanjakan’i Babilôna araka izay voalazan’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Misy mpaminany mihambo milaza fa tsy hanompo ny mpanjakan’i Babilôna intsony ianareo. Maminany lainga izy, ka aza mihaino azy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hentitra kosa ny tenin’ny TOMPO hoe: ‹Tsy naniraka ireny Aho. Mihambo miteny amin’ny anarako izy, nefa mandainga. Koa raha mihaino azy ianareo, dia horoahiko hiala eto, ka ho lany ringana ianareo sy ireto mpaminany izay maminany aminareo.› »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Farany dia ireo mpisorona sy ny vahoaka rehetra teo no nitenenan’i Jeremià hoe: «Izao no lazain’ny TOMPO: ‹Aza mihaino ny tenin’ireo mpaminany izay milaza aminareo fa haverina haingana avy any Babilôna ny fanaky ny tranon’ny TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 24.13; 2 Tan 36.10.
    marker-yv: yv-n
  - type: text
    text: ', satria lainga izay nambarany taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza mihaino azy fa manompoa an’i Nebokadnetsara, dia ho velona ianareo. Fa nahoana no avela ho rava ity tanàna ity?› »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Sady nampian’i Jeremià hoe: «Raha mpaminany tokoa ireo olona ireo, ka tena mitondra ny hafatra avy amin’ny TOMPO, dia aoka izy hangataka amin’ny TOMPOn’izao rehetra izao mba tsy havelany hoentina any Babilôna ireo fanaka sarobidy sisa mbola ao an-tranon’ny TOMPO sy ao an-dapan’ny mpanjakan’i Joda na eto an-tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa manan-kolazaina ny TOMPOn’izao rehetra izao momba ireo andry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 7.13-39; 2 Mp 25.13-17.
    marker-yv: yv-n
  - type: text
    text: ' sy ilay fitobian-drano goavana ary ireo kovetabe misy tongony mbamin’ireo fanaka hafa mbola eto Jerosalema. ( '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I Nebokadnetsara mpanjakan’i Babilôna manko tsy mbola nitondra ireo fitaovana ireo avy tao Jerosalema hankany Babilôna fony izy nitondra an’i Jekonià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jekonià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny naoty momba ny 22.24.
    marker-yv: yv-n
  - type: text
    text: ', zanakalahin’i Joîakima sady mpanjakan’i Joda sy ireo olo-manankaja rehetra avy eto Joda sy i Jerosalema.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely, ny amin’ireo fanaka sisa tafajanona ao an-tranon’ny TOMPO sy ao an-dapan’ny mpanjakan’i Joda na eto Jerosalema: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: «Hoentina any Babilôna ireo fanaka rehetra ireo, ary hijanona any ambara-piavin’ny andro hirotsahako an-tsehatra hampakatra sy hamerina azy eto amin’ity toerana ity indray.»
- type: usfm
  marker: p
  children:
  - type: text
    text: Izany no teny hentitry ny TOMPO.
