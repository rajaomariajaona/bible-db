document_id: 2CH.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: Rehefa vita ny asa rehetra nataon’i Salômôna ho an’ny tranon’ny TOMPO, dia nasainy nentina ny zavatra efa natokan’i Davida rainy ho an’Andriamanitra
  - type: note
    content: Jereo 2 Sam 8.11; 1 Tan 18.11.
  - type: text
    content: ', dia ny volafotsy sy volamena ary ny kojakoja isan-karazany, ka napetrany tao amin’ny efitrano fitahirizan-drakitry ny tranon’Andriamanitra.'
  - type: heading
    content: Ny fametrahana ny Vatamasina tao an-tempoly
  - type: heading
    content: (Jereo 1 Mp 8.1-13)
  '10':
  - type: text
    content: 'Tsy nisy na inona na inona tao anatin’ilay Vatamasina afa-tsy ny vatofisaka roa izay napetrak’i Mosesy tao fony tany '
  - type: text
    content: Hôreba
  - type: text
    content: ', rehefa nanaovan’ny TOMPO fanekempihavanana ny Israelita taorian’ny nialany tany Ejipta'
  - type: note
    content: Jereo Deot 10.5.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Dia nivoaka ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' (fa ny mpisorona rehetra teo moa dia samy efa nanokan-tena, satria tsy nisy fitandroana ny filaharan’ny antokony'
  - type: note
    content: Momba ireo antoko-mpisorona, jereo 1 Tan 24.1-19.
  - type: text
    content: ' tamin’izay). '
  '12':
  - type: text
    content: 'Ny levita mpihira rehetra kosa, izany hoe i Asafa sy i Hemàna ary i Jedotòna mbamin’ny zanany sy ny mpiray tarika aminy, dia nitafy rongony fotsy madinika; ary nitsangana teo atsinanan’ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana izy ireo sady nitondra kipantsona sy valiha ary lokanga. Teo anilan’ny levita mpihira dia nisy koa mpisorona 120 izay nahay nitsoka trompetra. '
  '13':
  - type: text
    content: 'Niombona toy ny feo tokana no fandrenesana ny mpitsoka trompetra sy ny mpihira, fony izy nidera sy nisaotra ny TOMPO. Ary rehefa nanandratra ny feony izy sady nampaneno ny trompetra sy ny kipantsona mbamin’ny zava-maneno isan-karazany, ka nihira hoe: «Miderà ny TOMPO fa tsara Izy; eny, maharitra mandrakizay ny fitiavany'
  - type: note
    content: Jereo 1 Tan 16.34 sy nta.
  - type: text
    content: '», dia feno rahona ny tranon’ny TOMPO; '
  '14':
  - type: text
    content: ka tsy nahajanona hanohy fanompoam-pivavahana ny mpisorona noho izany rahona izany, satria feno ny voninahitry ny TOMPO ilay tranon’Andriamanitra
  - type: note
    content: 'And 13.14: ampit Eks 40.34-35.'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Tamin’izay fotoana izay dia novorîn’i Salômôna tao Jerosalema ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely sy ny lehibem-poko rehetra ary ireo filoham-pianakaviana israelita mba hampakatra ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ', avy ao '
  - type: text
    content: Tsiôna Tanànan’i Davida
  - type: note
    content: Jereo 2 Sam 6.12-16; 1 Tan 15.29.
  - type: text
    content: ' hankao an-tempoly. '
  '3':
  - type: text
    content: Ary tafavory teo amin’ny mpanjaka ny vatan-dehilahy israelita rehetra nandritra ilay fety fanao amin’ny volana fahafito
  - type: note
    content: Jereo 1 Mp 8.2 sy nta.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Rehefa tonga avokoa ny loholon’i Israely, dia noraisin’ny mpisorona-levita
  - type: note
    content: 'mpisorona-levita: jereo Deot 17.9 sy nta.'
  - type: text
    content: ' ny Vatamasina '
  '5':
  - type: text
    content: 'ka nampiakariny niaraka tamin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' sy ny fanaka masina rehetra izay tao anatiny. '
  '6':
  - type: text
    content: 'I Salômôna mpanjaka sy ireo Israelita rehetra tafangona niaraka taminy teo anoloan’ny Vatamasina kosa dia samy nanao '
  - type: text
    content: sorona
  - type: text
    content: ' omby sy ondry aman’osy marobe tokoa hany ka tsy tambo nisaina intsony.'
  '7':
  - type: text
    content: 'Ary ilay Vatamasina mirakitra ny fanekempihavanan’ny TOMPO dia nampidirin’ny mpisorona ho ao amin’ny toerany tao anatin’ny efitrano atao hoe '
  - type: text
    content: Toeramasina Indrindra
  - type: text
    content: ', teo ambanin’ny elatr’ireo '
  - type: text
    content: kerobima
  - type: text
    content: '; '
  '8':
  - type: text
    content: 'fa nivelatra tambonin’ny toeran’ny Vatamasina ny elatr’ireo kerobima ka nanarona ny Vatamasina sy ny bao filanjana azy. '
  '9':
  - type: text
    content: 'Lava ihany ireto bao ireto, ka mety hita ny lohany, raha tazanina avy eo amin’ny Toeramasina manoloana ny efitra anatiny, saingy tsy hita kosa avy any ivelany; ary mbola ao mandraka androany ireo bao ireo. '
