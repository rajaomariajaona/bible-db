document_id: 2CH.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa vita ny asa rehetra nataon’i Salômôna ho an’ny tranon’ny TOMPO, dia nasainy nentina ny zavatra efa natokan’i Davida rainy ho an’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Sam 8.11; 1 Tan 18.11.
      marker-yv: yv-n
    - type: text
      text: ', dia ny volafotsy sy volamena ary ny kojakoja isan-karazany, ka napetrany tao amin’ny efitrano fitahirizan-drakitry ny tranon’Andriamanitra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fametrahana ny Vatamasina tao an-tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 8.1-13)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nisy na inona na inona tao anatin’ilay Vatamasina afa-tsy ny vatofisaka roa izay napetrak’i Mosesy tao fony tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hôreba
    - type: text
      text: ', rehefa nanaovan’ny TOMPO fanekempihavanana ny Israelita taorian’ny nialany tany Ejipta'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 10.5.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' (fa ny mpisorona rehetra teo moa dia samy efa nanokan-tena, satria tsy nisy fitandroana ny filaharan’ny antokony'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: antoko-mpisorona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo 1 Tan 24.1-19.'
      marker-yv: yv-n
    - type: text
      text: ' tamin’izay). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny levita mpihira rehetra kosa, izany hoe i Asafa sy i Hemàna ary i Jedotòna mbamin’ny zanany sy ny mpiray tarika aminy, dia nitafy rongony fotsy madinika; ary nitsangana teo atsinanan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' fisoronana izy ireo sady nitondra kipantsona sy valiha ary lokanga. Teo anilan’ny levita mpihira dia nisy koa mpisorona 120 izay nahay nitsoka trompetra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niombona toy ny feo tokana no fandrenesana ny mpitsoka trompetra sy ny mpihira, fony izy nidera sy nisaotra ny TOMPO. Ary rehefa nanandratra ny feony izy sady nampaneno ny trompetra sy ny kipantsona mbamin’ny zava-maneno isan-karazany, ka nihira hoe: «Miderà ny TOMPO fa tsara Izy; eny, maharitra mandrakizay ny fitiavany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Tan 16.34 sy nta.
      marker-yv: yv-n
    - type: text
      text: '», dia feno rahona ny tranon’ny TOMPO; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka tsy nahajanona hanohy fanompoam-pivavahana ny mpisorona noho izany rahona izany, satria feno ny voninahitry ny TOMPO ilay tranon’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 13.14:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Eks 40.34-35.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay fotoana izay dia novorîn’i Salômôna tao Jerosalema ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’i Israely sy ny lehibem-poko rehetra ary ireo filoham-pianakaviana israelita mba hampakatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
    - type: text
      text: ', avy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna Tanànan’i Davida
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Sam 6.12-16; 1 Tan 15.29.
      marker-yv: yv-n
    - type: text
      text: ' hankao an-tempoly. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tafavory teo amin’ny mpanjaka ny vatan-dehilahy israelita rehetra nandritra ilay fety fanao amin’ny volana fahafito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 8.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tonga avokoa ny loholon’i Israely, dia noraisin’ny mpisorona-levita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mpisorona-levita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Deot 17.9 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ny Vatamasina '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nampiakariny niaraka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' sy ny fanaka masina rehetra izay tao anatiny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Salômôna mpanjaka sy ireo Israelita rehetra tafangona niaraka taminy teo anoloan’ny Vatamasina kosa dia samy nanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' omby sy ondry aman’osy marobe tokoa hany ka tsy tambo nisaina intsony.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay Vatamasina mirakitra ny fanekempihavanan’ny TOMPO dia nampidirin’ny mpisorona ho ao amin’ny toerany tao anatin’ny efitrano atao hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina Indrindra
    - type: text
      text: ', teo ambanin’ny elatr’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: '; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nivelatra tambonin’ny toeran’ny Vatamasina ny elatr’ireo kerobima ka nanarona ny Vatamasina sy ny bao filanjana azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lava ihany ireto bao ireto, ka mety hita ny lohany, raha tazanina avy eo amin’ny Toeramasina manoloana ny efitra anatiny, saingy tsy hita kosa avy any ivelany; ary mbola ao mandraka androany ireo bao ireo. '
