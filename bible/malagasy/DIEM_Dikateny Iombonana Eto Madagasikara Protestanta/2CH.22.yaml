document_id: 2CH.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Ahazià
  - type: heading
    content: (Jereo 2 Mp 8.25-29; 9.27-29)
  - type: text
    content: Ary ny mponin’i Jerosalema nampanjaka an’i Ahazià, faralahin’i Jôrama, handimby azy; fa ny zokiny rehetra efa matin’ny andian’olona mpanaraka ny Arabo hatrany an-toby avokoa
  - type: note
    content: 'Ahazià: olona iray ihany no tondroin’ny hoe Ahazià eto sy ny hoe Jôahaza (and 21.17) etsy aloha. –Arabo: ampit 21.16-17.'
  - type: text
    content: '. Izany no nahatonga an’i Ahazià ho mpanjakan’i Joda. '
  '10':
  - type: text
    content: 'Rehefa hitan’i Hatalià renin’i Ahazià fa maty ity zanany lahy, dia niroso nandringana ny zazalahy rehetra tamin’ny teraky ny andriamanjakan’i Joda izy. '
  '11':
  - type: text
    content: 'Kanefa i Jôsebà, zanakavavin’i Jôrama mpanjaka, dia naka an’i Jôasy zanakalahin’i Ahazià ka namonjy azy teo anivon’ireo rahalahiny efa novonoina; ary napetrany tao an’efitrano fandriana niaraka tamin’ny mpitaiza azy. Io Jôsebà vadin’i Jôiadà mpisorona sady zanakavavin’i Jôrama mpanjakan’i Joda io moa dia anabavin’i Ahazià; nafenin’i Jôsebà i Jôasy mba tsy ho hitan’i Hatalià, ka dia tsy mba voavono ho faty. '
  '12':
  - type: text
    content: Niery enin-taona tao an-
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ' niaraka tamin’i Jôsebà sy ilay mpitaiza i Jôasy; ary dia i Hatalià no nanjaka teo amin’ny tany.'
  '2':
  - type: text
    content: Feno 22 taona
  - type: note
    content: 'Feno 22 taona: araka ny 2 Mp 8.26 izany; ny RM eto dia milaza hoe Feno 42 taona (kanefa araka ny 2 Tan 21.20 sy 2 Mp 8.17 dia feno efapolo taona ny rainy no maty), ary ny dkt tranainy grika dia milaza hoe Feno 20 taona.'
  - type: text
    content: izy fony vao nanjaka; ary herintaona ihany no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Hatalià, zafikelin’i Hômrỳ
  - type: note
    content: Araka ny 21.6 dia zanakavavin’i Ahaba i Hatalià, ka noho izany zafikelin’i Hômrỳ. Ny voambolana hebreo bat dia mety midika hoe zanakavavy na zafikely (vavy) arakaraka ny konteksta.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Nanaraka ny toetran’ireo taranak’i Ahaba koa i Ahazià, satria ny reniny no nanoro hevitra azy hanao ratsy. '
  '4':
  - type: text
    content: 'Ka dia nanao izay ratsy eo imason’ny TOMPO toy ny taranak’i Ahaba izy, satria ireo no mpanolotsaina azy taorian’ny nahafatesan’i Jôrama rainy ka nampidi-doza azy. '
  '5':
  - type: text
    content: 'Ny torohevitra nomen’ireo azy tokoa no narahin’i Ahazià, ka dia niainga niaraka tamin’i Jôrama zanakalahin’i Ahaba sady mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' avaratra izy mba hiady amin’i Hazaela mpanjakan’i Siria, tao Ramôta-Gilehada. Tamin’izay ny Sirianina dia nandratra an’i Jôrama; '
  '6':
  - type: text
    content: ary niverina tao Jizrehela izy mba hotsaboina tamin’ny ratra nahavoa azy tany Ramôta, fony izy niady tamin’i Hazaela mpanjakan’i Siria. Dia nankany Jizrehela i Ahazià
  - type: note
    content: 'Ahazià: izany no hita ao amin’ny stf hebreo vitsivitsy sy ireo dkt tranainy ary 2 Mp 8.29 sady hany mifanaraka amin’ny konteksta, na dia Hazarià aza no hita ao amin’ny RM.'
  - type: text
    content: ', zanakalahin’i Jôrama sady mpanjakan’i Joda, mba hamangy an’i Jôrama zanakalahin’i Ahaba noho izy narary.'
  '7':
  - type: text
    content: 'Avy tamin’Andriamanitra ny loza nanjo an’i Ahazià tamin’ny nankanesany hamangy an’i Jôrama; nony tonga manko izy, dia niara-niainga tamin’i Jôrama mba hitsena an’i Jehò, zanakalahin’i Nimsỳ sady nohosoran’ny TOMPO ho mpanjaka mba handringana ny taranak’i Ahaba. '
  '8':
  - type: text
    content: 'Dia nampiharin’i Jehò tamin’ny taranak’i Ahaba ny famalian’Andriamanitra; hitany koa ireo manampahefana jodeanina sy ireo zana-drahalahin’i Ahazià izay samy nanompo an’i Ahazià, ka novonoiny ho faty. '
  '9':
  - type: text
    content: 'Nampitady an’i Ahazià izy ka tany Samaria niereny no nisy nahita azy; dia nentina ho any amin’i Jehò izy ary novonoina ho faty. Nalevina ihany anefa izy, satria hoy ny olona hoe: «Taranak’i Jôsafata, ilay nitady ny TOMPO tamin’ny fony manontolo, ity.»'
  - type: text
    content: Tamin’izay dia tsy mbola nisy afaka nitana fanjakana ny terak’i Ahazià.
  - type: heading
    content: Nandrombaka fahefana i Hatalià
  - type: heading
    content: (Jereo 2 Mp 11.1-3)
