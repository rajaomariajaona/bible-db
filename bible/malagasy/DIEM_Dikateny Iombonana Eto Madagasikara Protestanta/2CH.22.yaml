document_id: 2CH.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakàn’i Ahazià
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 8.25-29; 9.27-29)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary ny mponin’i Jerosalema nampanjaka an’i Ahazià, faralahin’i Jôrama, handimby azy; fa ny zokiny rehetra efa matin’ny andian’olona mpanaraka ny Arabo hatrany an-toby avokoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ahazià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'olona iray ihany no tondroin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahazià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto sy ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôahaza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 21.17) etsy aloha. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Arabo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': ampit 21.16-17.'
    marker-yv: yv-n
  - type: text
    text: '. Izany no nahatonga an’i Ahazià ho mpanjakan’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Feno 22 taona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Feno 22 taona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny 2 Mp 8.26 izany; ny RM eto dia milaza hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Feno 42 taona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (kanefa araka ny 2 Tan 21.20 sy 2 Mp 8.17 dia feno efapolo taona ny rainy no maty), ary ny dkt tranainy grika dia milaza hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Feno 20 taona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: izy fony vao nanjaka; ary herintaona ihany no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Hatalià, zafikelin’i Hômrỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Araka ny 21.6 dia zanakavavin’i Ahaba i Hatalià, ka noho izany zafikelin’i Hômrỳ. Ny voambolana hebreo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zanakavavy na zafikely (vavy)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' arakaraka ny konteksta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanaraka ny toetran’ireo taranak’i Ahaba koa i Ahazià, satria ny reniny no nanoro hevitra azy hanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka dia nanao izay ratsy eo imason’ny TOMPO toy ny taranak’i Ahaba izy, satria ireo no mpanolotsaina azy taorian’ny nahafatesan’i Jôrama rainy ka nampidi-doza azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny torohevitra nomen’ireo azy tokoa no narahin’i Ahazià, ka dia niainga niaraka tamin’i Jôrama zanakalahin’i Ahaba sady mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' avaratra izy mba hiady amin’i Hazaela mpanjakan’i Siria, tao Ramôta-Gilehada. Tamin’izay ny Sirianina dia nandratra an’i Jôrama; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary niverina tao Jizrehela izy mba hotsaboina tamin’ny ratra nahavoa azy tany Ramôta, fony izy niady tamin’i Hazaela mpanjakan’i Siria. Dia nankany Jizrehela i Ahazià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ahazià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izany no hita ao amin’ny stf hebreo vitsivitsy sy ireo dkt tranainy ary 2 Mp 8.29 sady hany mifanaraka amin’ny konteksta, na dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hazarià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' aza no hita ao amin’ny RM.'
    marker-yv: yv-n
  - type: text
    text: ', zanakalahin’i Jôrama sady mpanjakan’i Joda, mba hamangy an’i Jôrama zanakalahin’i Ahaba noho izy narary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Avy tamin’Andriamanitra ny loza nanjo an’i Ahazià tamin’ny nankanesany hamangy an’i Jôrama; nony tonga manko izy, dia niara-niainga tamin’i Jôrama mba hitsena an’i Jehò, zanakalahin’i Nimsỳ sady nohosoran’ny TOMPO ho mpanjaka mba handringana ny taranak’i Ahaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nampiharin’i Jehò tamin’ny taranak’i Ahaba ny famalian’Andriamanitra; hitany koa ireo manampahefana jodeanina sy ireo zana-drahalahin’i Ahazià izay samy nanompo an’i Ahazià, ka novonoiny ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nampitady an’i Ahazià izy ka tany Samaria niereny no nisy nahita azy; dia nentina ho any amin’i Jehò izy ary novonoina ho faty. Nalevina ihany anefa izy, satria hoy ny olona hoe: «Taranak’i Jôsafata, ilay nitady ny TOMPO tamin’ny fony manontolo, ity.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’izay dia tsy mbola nisy afaka nitana fanjakana ny terak’i Ahazià.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nandrombaka fahefana i Hatalià
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 11.1-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa hitan’i Hatalià renin’i Ahazià fa maty ity zanany lahy, dia niroso nandringana ny zazalahy rehetra tamin’ny teraky ny andriamanjakan’i Joda izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa i Jôsebà, zanakavavin’i Jôrama mpanjaka, dia naka an’i Jôasy zanakalahin’i Ahazià ka namonjy azy teo anivon’ireo rahalahiny efa novonoina; ary napetrany tao an’efitrano fandriana niaraka tamin’ny mpitaiza azy. Io Jôsebà vadin’i Jôiadà mpisorona sady zanakavavin’i Jôrama mpanjakan’i Joda io moa dia anabavin’i Ahazià; nafenin’i Jôsebà i Jôasy mba tsy ho hitan’i Hatalià, ka dia tsy mba voavono ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Niery enin-taona tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitra
  - type: text
    text: ' niaraka tamin’i Jôsebà sy ilay mpitaiza i Jôasy; ary dia i Hatalià no nanjaka teo amin’ny tany.'
