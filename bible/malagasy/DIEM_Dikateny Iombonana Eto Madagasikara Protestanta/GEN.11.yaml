document_id: GEN.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tilikambon’i Babèla
  - type: text
    content: 'Fiteny iray ihany ary voambolana mitovy no nampiasaina tamin’ny tany tontolo. '
  '10':
  - type: text
    content: 'Toy izao no lisitry ny taranak’i Sema. Efa feno zato taona i Sema raha niteraka an’i Arpaksada, roa taona taorian’ny safo-drano. Taorian’ny nahaterahan’i Arpaksada, '
  '11':
  - type: text
    content: dia mbola velona dimanjato taona i Sema, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '12':
  - type: text
    content: 'Rehefa feno 35 taona i Arpaksada, dia niteraka an’i Sela. '
  '13':
  - type: text
    content: Taorian’ny nahaterahan’i Sela, dia mbola velona 403 taona i Arpaksada ary niteraka zanakalahy sy zanakavavy hafa koa.
  '14':
  - type: text
    content: 'Rehefa feno 30 taona i Sela, dia niteraka an’i Hebera. '
  '15':
  - type: text
    content: Taorian’ny nahaterahan’i Hebèra dia mbola velona 403 taona i Sela, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '16':
  - type: text
    content: 'Rehefa feno 34 taona i Hebera, dia niteraka an’i Pelega. '
  '17':
  - type: text
    content: Taorian’ny nahaterahan’i Pelega, dia mbola velona 430 taona i Hebèra, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '18':
  - type: text
    content: 'Rehefa feno 30 taona i Pelega dia niteraka an’i Rehò. '
  '19':
  - type: text
    content: Taorian’ny nahaterahan’i Rehò dia mbola velona 209 taona i Pelega, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '2':
  - type: text
    content: 'Saingy rehefa nikisaka niantsinanana ny olona, dia nahita lemaka tao amin’ny tany Sinehara ary niorim-ponenana tao. '
  '20':
  - type: text
    content: 'Rehefa feno 32 taona i Rehò, dia niteraka an’i Seroga. '
  '21':
  - type: text
    content: Taorian’ny nahaterahan’i Seroga, dia mbola velona 207 taona i Rehò, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '22':
  - type: text
    content: 'Rehefa feno 30 taona i Seroga, dia niteraka an’i Nahôra. '
  '23':
  - type: text
    content: Taorian’ny nahaterahan’i Nahôra, dia mbola velona 200 taona i Seroga, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '24':
  - type: text
    content: 'Rehefa feno 29 taona i Nahôra, dia niteraka an’i Tera. '
  '25':
  - type: text
    content: Taorian’ny nahaterahan’i Tera, dia mbola velona 119 taona i Nahôra, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '26':
  - type: text
    content: Rehefa feno 70 taona i Tera, dia niteraka telo lahy dia i Abrama sy i Nahôra ary i Haràna.
  '27':
  - type: text
    content: 'Ireto avy no taranak’i Tera, rain’i Abrama sy i Nahôra ary i Haràna. I Haràna dia niteraka an’i Lôta, '
  '28':
  - type: text
    content: 'ary maty tao amin’ny tany nahaterahany tao Ora any Babilônia izy fony fahavelon’i Tera rainy. '
  '29':
  - type: text
    content: 'Nanambady an’i Saray i Abrama; ary i Nahôra kosa nanambady an’i Milkà zanakavavin’i Haràna. I Haràna koa no rain’i Milkà sy i Jiskà. '
  '3':
  - type: text
    content: 'Dia nifampiresaka izy ka nanao hoe: «Andao isika hanao biriky tanimanga ka handotra azy amin’ny afo.» Ny biriky no nataony solon’ny vato ary ny molanga no nataony solon’ny rihitra. '
  '30':
  - type: text
    content: Ary i Saray dia tsy niteraka fa momba.
  '31':
  - type: text
    content: 'Ary nentin’i Tera i Abrama zanany lahy sy i Lôta zafikeliny sady zanakalahin’i Haràna. Nentiny koa i Saray vinantovaviny, vadin’i Abrama. Dia niala tao Ora any Babilônia ireo ka nankany amin’ny tany Kanahàna. Tonga hatrany Haràna '
  - type: note
    content: I Haràna, tanàna tany Mezôpôtamia ambony, dia foiben’ny fivavahana amin’ny volana tahaka an’i Ora tanàna tany Mezôpôtamia ambany.
  - type: text
    content: 'izy ary nonina tao. '
  '32':
  - type: text
    content: Ary maty tao Haràna i Tera, rehefa feno 205.
  '4':
  - type: text
    content: 'Avy teo dia hoy koa ireo hoe: «Andeha isika hanorina tanàna misy tilikambo mahatakatra ny lanitra ny tendrony! Amin’izay dia halaza isika ka tsy hiparitaka amin’ny velaran’ny tany.»'
  '5':
  - type: text
    content: 'Dia nidina avy any an-danitra ny TOMPO mba hijery ny tanàna sy ny tilikambo izay naorin’ny zanak’olombelona. '
  '6':
  - type: text
    content: 'Ka hoy IZY hoe: «Indro ankehitriny fa firenena iray ihany izy rehetra ary fiteny tokana ihany no ampiasainy. Raha izany no fiandohan-javatra hataony, dia tsy hisy hahasakana azy tsy hahatanteraka izay kasainy. '
  '7':
  - type: text
    content: 'Koa andeha isika hidina hanakorontana ny fiteniny mba tsy hifankahazoany fiteny intsony.» '
  '8':
  - type: text
    content: 'Koa tao ny TOMPO no nampiely ny olona ho amin’ny velaran’ny tany tontolo; ary dia nilaozan’ireo ny fananganana ilay tanàna. '
  '9':
  - type: text
    content: Izany no niantsoana io tanàna io hoe Babèla
  - type: note
    content: 'Babèla: anarana hebreo iantsoana an’i Babilôna; ny RM dia mampifamatotra io anarana io amin’ny matoanteny mifanakaiky aminy izay nadika hoe nanakorontana eto (jereo and 7 sy 9).'
  - type: text
    content: ', satria tao no nanakorontanan’ny TOMPO ny fitenin’ny olona, ary tao no nampielezany ny olona ho amin’ny velaran’ny tany tontolo.'
  - type: heading
    content: Ny lisitry ny razambe hatramin’i Sema ka hatramin’i Abrama
