document_id: GEN.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tilikambon’i Babèla
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fiteny iray ihany ary voambolana mitovy no nampiasaina tamin’ny tany tontolo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izao no lisitry ny taranak’i Sema. Efa feno zato taona i Sema raha niteraka an’i Arpaksada, roa taona taorian’ny safo-drano. Taorian’ny nahaterahan’i Arpaksada, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia mbola velona dimanjato taona i Sema, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno 35 taona i Arpaksada, dia niteraka an’i Sela. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahaterahan’i Sela, dia mbola velona 403 taona i Arpaksada ary niteraka zanakalahy sy zanakavavy hafa koa.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno 30 taona i Sela, dia niteraka an’i Hebera. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahaterahan’i Hebèra dia mbola velona 403 taona i Sela, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno 34 taona i Hebera, dia niteraka an’i Pelega. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahaterahan’i Pelega, dia mbola velona 430 taona i Hebèra, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno 30 taona i Pelega dia niteraka an’i Rehò. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahaterahan’i Rehò dia mbola velona 209 taona i Pelega, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saingy rehefa nikisaka niantsinanana ny olona, dia nahita lemaka tao amin’ny tany Sinehara ary niorim-ponenana tao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno 32 taona i Rehò, dia niteraka an’i Seroga. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahaterahan’i Seroga, dia mbola velona 207 taona i Rehò, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno 30 taona i Seroga, dia niteraka an’i Nahôra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahaterahan’i Nahôra, dia mbola velona 200 taona i Seroga, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno 29 taona i Nahôra, dia niteraka an’i Tera. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahaterahan’i Tera, dia mbola velona 119 taona i Nahôra, ary niteraka zanakalahy sy zanakavavy hafa koa.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa feno 70 taona i Tera, dia niteraka telo lahy dia i Abrama sy i Nahôra ary i Haràna.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy no taranak’i Tera, rain’i Abrama sy i Nahôra ary i Haràna. I Haràna dia niteraka an’i Lôta, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary maty tao amin’ny tany nahaterahany tao Ora any Babilônia izy fony fahavelon’i Tera rainy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanambady an’i Saray i Abrama; ary i Nahôra kosa nanambady an’i Milkà zanakavavin’i Haràna. I Haràna koa no rain’i Milkà sy i Jiskà. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifampiresaka izy ka nanao hoe: «Andao isika hanao biriky tanimanga ka handotra azy amin’ny afo.» Ny biriky no nataony solon’ny vato ary ny molanga no nataony solon’ny rihitra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Saray dia tsy niteraka fa momba.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nentin’i Tera i Abrama zanany lahy sy i Lôta zafikeliny sady zanakalahin’i Haràna. Nentiny koa i Saray vinantovaviny, vadin’i Abrama. Dia niala tao Ora any Babilônia ireo ka nankany amin’ny tany Kanahàna. Tonga hatrany Haràna '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Haràna,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tanàna tany Mezôpôtamia ambony, dia foiben’ny fivavahana amin’ny volana tahaka an’i Ora tanàna tany Mezôpôtamia ambany.'
      marker-yv: yv-n
    - type: text
      text: 'izy ary nonina tao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary maty tao Haràna i Tera, rehefa feno 205.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy teo dia hoy koa ireo hoe: «Andeha isika hanorina tanàna misy tilikambo mahatakatra ny lanitra ny tendrony! Amin’izay dia halaza isika ka tsy hiparitaka amin’ny velaran’ny tany.»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nidina avy any an-danitra ny TOMPO mba hijery ny tanàna sy ny tilikambo izay naorin’ny zanak’olombelona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy IZY hoe: «Indro ankehitriny fa firenena iray ihany izy rehetra ary fiteny tokana ihany no ampiasainy. Raha izany no fiandohan-javatra hataony, dia tsy hisy hahasakana azy tsy hahatanteraka izay kasainy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa andeha isika hidina hanakorontana ny fiteniny mba tsy hifankahazoany fiteny intsony.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tao ny TOMPO no nampiely ny olona ho amin’ny velaran’ny tany tontolo; ary dia nilaozan’ireo ny fananganana ilay tanàna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no niantsoana io tanàna io hoe Babèla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Babèla: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'anarana hebreo iantsoana an’i Babilôna; ny RM dia mampifamatotra io anarana io amin’ny matoanteny mifanakaiky aminy izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nanakorontana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto (jereo and 7 sy 9).'
      marker-yv: yv-n
    - type: text
      text: ', satria tao no nanakorontanan’ny TOMPO ny fitenin’ny olona, ary tao no nampielezany ny olona ho amin’ny velaran’ny tany tontolo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lisitry ny razambe hatramin’i Sema ka hatramin’i Abrama
    marker-yv: yv-h
