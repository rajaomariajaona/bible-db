document_id: LUK.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Teraka ao Betlehema i Jesoa
  - type: heading
    content: (Jereo Mt 1.18-25)
  - type: text
    content: Tamin’izany andro izany, dia namoaka didy ny amperôra Aogosta
  - type: note
    content: I Aogosta dia amperôra tao Rôma, taona 29 tal J.K. –14 taor J.K.
  - type: text
    content: ' hampanao fanisàm-bahoaka eran’ny fanjakana rômanina. '
  '10':
  - type: text
    content: 'Fa hoy ilay anjely taminy:'
  - type: text
    content: '–Aoka izay ny tahotra, fa vaovao mahafaly no entiko ho anareo, dia fifaliana lehibe ho an’ny vahoaka rehetra: '
  '11':
  - type: text
    content: 'Mpamonjy no teraka ho anareo anio ao an-tanànan’i Davida, dia i Kristy Tompo. '
  '12':
  - type: text
    content: 'Izao no hahafantaranareo Azy: hahita zazakely anankiray voahodidina lamban-jaza sady mandry eo amina fihinanam-bilona ianareo.'
  '13':
  - type: text
    content: 'Ary nisy anjely alikisa avy any an-danitra niseho niaraka tamin’ilay anjely teo ka nidera an’Andriamanitra nanao hoe:'
  '14':
  - type: text
    content: «Voninahitra any amin’ny avo indrindra
  - type: text
    content: ho an’Andriamanitra;
  - type: text
    content: ary fiadanana etỳ an-tany ho an’ny olombelona
  - type: text
    content: fa nanehoany fitia
  - type: note
    content: Dkt hafa, araka izay hita ao amin’ny stf sasany, fiadanana etỳ ambonin’ny tany, famindrampo ho an’ny olombelona.
  - type: text
    content: '!»'
  - type: heading
    content: Mamangy an’i Jesoa ireo mpiandry ondry
  '15':
  - type: text
    content: 'Rehefa nilaozan’ny '
  - type: text
    content: anjely
  - type: text
    content: ' niverina any an-danitra ireto '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry, dia nifampiresaka hoe:'
  - type: text
    content: –Andao mihitsy ho any Betlehema isika hizaha izany zava-baovao nampahalalain’ny Tompo antsika izany!
  '16':
  - type: text
    content: 'Dia nandeha faingana izy ireo nankany, ka nahita an’i Maria sy i Jôsefa ary nahita zazakely mandry eo amin’ny fihinanam-bilona. '
  '17':
  - type: text
    content: 'Nony avy nahita ireto mpamangy, dia nampiely ny teny nolazain’ny anjely taminy momba io zazakely io; '
  '18':
  - type: text
    content: 'ary izay rehetra nandre dia gaga tamin’ny zavatra voalazan’ireo mpiandry ondry. '
  '19':
  - type: text
    content: 'I Maria kosa nitadidy izany rehetra izany ka nieritreritra azy tao am-pony. '
  '2':
  - type: text
    content: 'Izany fanisàm-bahoaka voalohany izany dia natao fony i Kireny no filohan’ny faritany Siria. '
  '20':
  - type: text
    content: Dia lasa nody ireo mpiandry ondry ka nanome voninahitra sy dera an’Andriamanitra noho izay rehetra reny sy hitany, araka ny voalazan’ny anjely taminy.
  - type: heading
    content: Atao hasoavana sy omena anarana i Jesoa
  '21':
  - type: text
    content: 'Tonga ny fotoana hamorana ilay zaza nony afaka herinandro; ary natao hoe Jesoa ny anarany, araka ilay nolazain’ny '
  - type: text
    content: anjely
  - type: text
    content: ' talohan’ny nahatorontoronina Azy'
  - type: note
    content: Jereo Lev 12.3; Lk 1.31.
  - type: text
    content: .
  - type: heading
    content: Atolotra ao an-tempoly i Jesoa
  '22':
  - type: text
    content: 'Tonga ny fotoana tsy maintsy anatanterahana ny fombam-pivavahana fidiovana ho an’i Maria sy i Jesoa zazakely, araka ny '
  - type: text
    content: lalànan
  - type: text
    content: ’i Mosesy
  - type: note
    content: Jereo Lev 12.3,6.
  - type: text
    content: '. Dia nentin’i Maria sy i Jôsefa tany Jerosalema ny zazakely mba hatolotra ny Tompo, '
  '23':
  - type: text
    content: 'satria voasoratra ao amin’ny lalànan’ny Tompo hoe: «Hatokana ho an’ny Tompo ny lahimatoa rehetra'
  - type: note
    content: Jereo Eks 13.2, 12.
  - type: text
    content: '.» '
  '24':
  - type: text
    content: Nitondra fanatitra araka ny voalaza ao amin’ny lalànan’ny Tompo ihany koa i Maria sy i Jôsefa, izany hoe fanatitra «domohina roa na voromahailala roa
  - type: note
    content: Jereo Lev 12.8.
  - type: text
    content: ».
  '25':
  - type: text
    content: 'Tao Jerosalema tamin’izay dia nisy lehilahy nantsoina hoe Simehôna; olo-marina sady tena mpivavaka izany lehilahy izany ary fatra-piandry an’Ilay ho avy hampionona ny vahoaka Israely. Nombàn’ny Fanahy Masina izy '
  '26':
  - type: text
    content: 'ary nampahalalainy fa tsy ho faty raha tsy efa mahita ilay '
  - type: text
    content: Mesia
  - type: text
    content: ' avy amin’ny Tompo. '
  '27':
  - type: text
    content: Nentin’ny Fanahy Masina hankao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Simehôna, raha niditra indrindra ny ray aman-drenin’i Jesoa zazakely mba hanatanteraka izay andidian’ny lalàna ny amin’ny zaza; '
  '28':
  - type: text
    content: 'dia nitrotro Azy i Simehôna sady velom-pisaorana an’Andriamanitra nanao hoe:'
  '29':
  - type: text
    content: –Tompo ô, alefaso amim-piadanana amin’izay
  - type: text
    content: ity mpanomponao, araka ny teninao!
  '3':
  - type: text
    content: Ary samy namonjy ny tanàna fiaviany avy ny olona rehetra mba hisaina.
  '30':
  - type: text
    content: Efa hitako maso manko ny famonjena avy aminao
  '31':
  - type: text
    content: 'izay nomaninao ho an’ny firenena rehetra:'
  '32':
  - type: text
    content: dia fahazavana hampahalala Anao amin’ny hafa firenena
  - type: text
    content: 'ary hanome voninahitra an’i '
  - type: text
    content: Israely
  - type: text
    content: ' vahoakanao'
  - type: note
    content: Ampit Is 42.6; 49.6; 52.10.
  - type: text
    content: .
  - type: heading
    content: Milaza teny faminaniana i Simehôna
  '33':
  - type: text
    content: 'Gaga ny ray aman-drenin’i Jesoa noho izao tenin’i Simehôna momba ny zanany izao. '
  '34':
  - type: text
    content: 'Ary nitsodrano azy telo mianaka i Simehôna; avy eo izy dia niteny tamin’i Maria renin’i Jesoa hoe:'
  - type: text
    content: '–Indro ity zaza ity fa voatendry mba hahatonga ny maro amin’i '
  - type: text
    content: Israely
  - type: text
    content: ' homelohin’Andriamanitra ary koa hahatonga ny maro amin’i Israely hankatoavin’Andriamanitra. Ho famantarana hifanoheran’ny olona ity zaza ity, '
  '35':
  - type: text
    content: mba hampiharihary ny fisainan’ny besinimaro. Ary ianao kosa, ramatoa, hotsatohan-tsabatra ny fanahinao!
  - type: heading
    content: Finaritra mahita an’i Jesoa i Ana vaviantitra
  '36':
  - type: text
    content: 'Nisy koa vehivavy '
  - type: text
    content: mpaminany
  - type: text
    content: ' natao hoe Ana, zanakavavin’i Fanoela, avy amin’ny fokon’i Asera. Tena antitra izy. Fito taona ihany no nanambadiany taorian’ny nahatovovavy azy. '
  '37':
  - type: text
    content: Dia nipetraka ho mpitondratena izy ary feno 84 taona izao ny andro niainany
  - type: note
    content: 'Dia nipetraka... niainany: dkt hafa ary efa 84 taona izao no naha-mpitondratena azy.'
  - type: text
    content: '. Tsy niala tao amin’ny tempoly mihitsy izy, fa nanompo an’Andriamanitra andro aman’alina, ka '
  - type: text
    content: nifady hanina
  - type: text
    content: ' sy nivavaka. '
  '38':
  - type: text
    content: Tonga koa i Ana tamin’io fotoana io ka nisaotra an’Andriamanitra ary nilazalaza momba ity zaza ity tamin’izay rehetra fatra-piandry ny hanavotan’Andriamanitra an’i Jerosalema.
  - type: heading
    content: Miverina any Nazareta izy telo mianaka
  '39':
  - type: text
    content: 'Rehefa avy nanatontosa ny zavatra rehetra araka ny lalànan’ny Tompo ny ray aman-drenin’i Jesoa, dia niverina nankany Galilea izy telo mianaka ho ao Nazareta tanànany. '
  '4':
  - type: text
    content: 'Niainga avy tao Nazareta tanàna any Galilea i Jôsefa hiakatra any Jodea, hankany amin’ilay tanàna fiavian’i Davida atao hoe Betlehema, noho izy taranaka sy fokon’i Davida. '
  '40':
  - type: text
    content: Nitombo sy nihatanjaka ilay zaza sady feno fahendrena; ary tao aminy ny fahasoavan’Andriamanitra.
  - type: heading
    content: Feno 12 taona i Jesoa ka miakatra any Jerosalema
  '41':
  - type: text
    content: 'Mpankany Jerosalema isan-taona ny ray aman-drenin’i Jesoa amin’ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: '. '
  '42':
  - type: text
    content: Nony feno 12 taona i Jesoa, dia lasa izy telo mianaka niara-niakatra araka ny fanao amin’izany fankalazana izany
  - type: note
    content: Jereo Eks 12.1-27; Deot 16.1-8. –12 taona eo ho eo no tonon-taona maha olona matotra ara-pivavahana teo amin’ny Jiosy.
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Nody i Maria sy i Jôsefa nony tapitra ny andro fankalazana, fa i Jesoa tovolahikely dia mbola nijanona tao Jerosalema, saingy tsy tsikaritr’ireo ray aman-dreniny izany. '
  '44':
  - type: text
    content: 'Nihevitra moa izy roa fa tafaraka tamin’ny mpiara-dia ity zanany; ka efa lasa lalana indray andro, izay vao nitady Azy, nanontany ny havana sy olom-pantatra, '
  '45':
  - type: text
    content: 'nefa tsy nahita Azy. Dia niverina ilàlana izy roa nitady Azy tany Jerosalema. '
  '46':
  - type: text
    content: Tamin’ny andro fahatelo vao hitany tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Jesoa mipetraka teo afovoan’ireo mpampianatra jiosy ka mihaino sady manontany an-dry zareo. '
  '47':
  - type: text
    content: 'Talanjona daholo ny olona nandre ity tovolahikely fa saina matotra no nasehony isak’izay niteny Izy. '
  '48':
  - type: text
    content: 'Gaga dia gaga ny ray aman-dreniny nahita Azy, ka hoy ny reniny taminy:'
  - type: text
    content: –Nahoana, anaka, no nanao toy izao taminay Ianao? Endrey izany tebitebinay sy ny rainao nitady Anao!
  '49':
  - type: text
    content: 'Dia hoy i Jesoa tamin’izy mivady:'
  - type: text
    content: –Nahoana kosa no mitady Ahy ianareo? Hay tsy mbola fantatrareo fa tsy maintsy ato amin’ny tranon’ny Raiko Aho
  - type: note
    content: 'tsy maintsy... Aho?: dkt hafa tsy maintsy ao amin’ny raharahan’ny Raiko Aho?'
  - type: text
    content: '?'
  '5':
  - type: text
    content: 'Mba hoisaina no foto-dian’i Jôsefa sy i Maria vadiny izay efa bevohòka. '
  '50':
  - type: text
    content: Tsy azon’izy roa anefa izay nolazain-janany taminy.
  '51':
  - type: text
    content: 'Dia niara-nody taminy tany Nazareta i Jesoa ary nanoa azy. Ny reniny kosa nitadidy izany rehetra izany tao am-pony. '
  '52':
  - type: text
    content: Ary nitombo fahendrena sy taona i Jesoa sady nandroso nahatehotia tamin’Andriamanitra sy ny olona
  - type: note
    content: 'olona: Ampit 1 Sam 2.26; Ohab 3.4. –taona: dkt hafa tena, halavana.'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Raha tao Betlehema izy roa, dia tonga ny andro hahaveloman’i Maria. '
  '7':
  - type: text
    content: Teraka ny lahimatoany izy, dia nohodidininy lamban-jaza ary nampandrîny teo amina fihinanam-bilona; fa tsy nisy toerana ho azy telo mianaka tao amin’ny trano fivantanam-bahiny.
  - type: heading
    content: Ambara amin’ny mpiandry ondry ny nahaterahan’i Jesoa
  '8':
  - type: text
    content: 'Tany amin’izany faritany izany, dia nisy '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry nitoetra tany an-tsaha niambina ny ondriny nandritra ny alina. '
  '9':
  - type: text
    content: 'Nisy '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny Tompo niseho tampoka taminy; ary nohodidinin’ny voninahitry ny Tompo ireo mpiandry ondry ka raiki-tahotra izaitsizy. '
