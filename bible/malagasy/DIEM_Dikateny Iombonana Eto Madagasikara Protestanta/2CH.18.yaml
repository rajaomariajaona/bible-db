document_id: 2CH.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nikambana hiady tamin’ny Sirianina i Jôsafata sy i Ahaba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 22.1-4)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanan-karena sy voninahitra be i Jôsafata; ary ny zanany lahy dia nampanambadiany ny zanakavavin’i Ahaba mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nampanambadian’i Jôsafata an’i Hatalià zanakavavin’i Ahaba i Jôrama zanany lahy (jereo 2 Mp 8.25-26 sy 2 Tan 21.6). Antony ara-bola sy ara-pôlitika no nahatonga ireny fifanambadian’andriana ireny.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Taona vitsivitsy taorian’izany, dia nidina nankany amin’i Ahaba tany Samaria i Jôsafata; ary namonoan’i Ahaba ondry aman’osy sy omby betsaka izy sy ireo olona nanaraka azy. Avy eo dia notaomin’i Ahaba hanafika an’i Ramôta-Gilehada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ramôta-Gilehada; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 22.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Jôsafata '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba hiaraka amiko hanafika an’i Ramôta-Gilehada ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, fa tahaka ny tenanao ihany aho, ka ny tafiko dia tafikao; koa hiaraka hiantafika aminao izahay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naminany fahombiazana ireo mpaminany matihanina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 22.5-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mbola niteny tamin’ny mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' indray i Jôsafata ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba anontanio aloha ny tenin’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary novorin’ny mpanjakan’i Israely ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminaniny
  - type: text
    text: ' efajato lahy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 22.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handeha hanafika an’i Ramôta-Gilehada ve isika, sa hijanona ihany aho?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana, ry andriamanjaka, fa hatolotr’Andriamanitra eo an-tananao ny tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy kosa i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa tsy misy mpaminanin’ny TOMPO koa ve eto mba hanontaniantsika?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia novalian’ny mpanjakan’i Israely hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mbola misy lehilahy iray ahazoantsika manontany ny TOMPO ao; saingy halako izy, satria tsy mbola naminany soa ho ahy fa loza mandrakariva. Mikaià, zanakalahin’i Jimlà, no anarany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza dia miteny toy izany re ianao, ry mpanjaka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tamin’izay dia niantso tandapa anankiray ny mpanjakan’i Israely, ka nandidy azy haka faingana an’i Mikaià zanakalahin’i Jimlà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny mpanjakan’i Israely sy ny mpanjakan’i Joda dia samy nipetraka teo amin’ny sezafiandrianany sy efa niakanjo ny fanamiany avy, teo amin’ilay kianja manoloana ny vavahadin’i Samaria, nandritra ny naminanian’ireo mpaminany rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa i Tsedekià, zanakalahin’i Kenahanà, dia namboatra tandro-by ka niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO: «Ireto tandroka ireto no hanotoanao ny tafika sirianina mandra-paharingany.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nilaza hafatra toy izany avokoa ny mpaminany rehetra teo ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tafiho i Ramôta-Gilehada fa ho resinao, ry mpanjaka! Eny, hatolotry ny TOMPO eo an-tananao io tanàna io.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faharesena no nambaran’i Mikaià mpaminany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 22.13-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ilay iraka izay nandeha naka an’i Mikaià kosa dia niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro efa iray teny avokoa izao ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ', ka milaza soa ho an’ny mpanjaka; enga anie ny teninao mba ho tahaka ny azy, ka hilaza soa ihany koa!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy i Mikaià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Velona ny TOMPO, ka mianiana aho fa izay lazain’Andriamanitra ihany no hambarako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa tonga teo anatrehan’ny mpanjaka izy, dia nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Mikaià, handeha hanafika an’i Ramôta-Gilehada ve izahay, sa hijanona ihany aho?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana fa handresy ianareo, ary hatolotry ny Tompo eo an-tananareo io tanàna io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy indray ny mpanjaka taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Impiry moa no hampianianako anao mba tsy hilaza amiko afa-tsy ny marina ihany amin’ny anaran’ny TOMPO?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy ny navalin’i Mikaià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hitako fa ny tafik’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' manontolo dia niely teny an-tendrombohitra toy ny ondry tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 27.17 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. Ary ny TOMPO niteny hoe: «Tsy mana-mpifehy intsony ireo miaramila ireo, ka aoka izy samy hody soa aman-tsara any an-tranony avy!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy ny mpanjakan’i Israely tamin’i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy, fa loza ihany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy indray i Mikaià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Henoy àry ny tenin’ny TOMPO. Hitako nipetraka teo amin’ny sezafiandrianany manko ny TOMPO; ary ireo anjeliny rehetra any an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: danitra
  - type: text
    text: ' nijoro teo ankavanany sy teo ankaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ka hoy ny TOMPO nanontany hoe: «Iza no hitaona an’i Ahaba, mpanjakan’i Israely, handeha hanafika an’i Ramôta-Gilehada mba hahafaty azy any?» Ary samy nanana ny fomba famaliny avy ny tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa nandroso ka nitsangana teo anatrehan’ny TOMPO ny fanahy anankiray ary nanao hoe: «Izaho no hitaona azy.» Hoy kosa ny TOMPO hoe: «Amin’ny fomba ahoana?» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy izy: «Handeha aho ka ho tonga fanahy mandainga ao am-bavan’ireo mpaminanin’i Ahaba rehetra.» Ary hoy indray ny Tompo: «Ho voataonanao tokoa izy, sady zavatra manavanana anao izany; ndeha àry ka ataovy.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ankehitriny, indro ny TOMPO efa nanisy fanahy mandainga ao am-bavan’ireto mpaminaninao ireto, dia satria IZY mihitsy no efa nilaza ny loza hanjo anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’izay dia nanatona an’i Mikaià i Tsedekià zanakalahin’i Kenahanà, ka namely tehamaina azy sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Niala tamiko ve ny Fanahin’ny TOMPO hiteny aminao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia novalian’i Mikaià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro fa ho hitanao izany amin’ny andro izay hitsofotsofohanao efitrano mba hiery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tamin’izay ny mpanjakan’i Israely dia nibaiko hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sambory i Mikaià, dia ento miverina any amin’i Amôna governoran’ny tanàna sy any amin’i Joasy zanako lahy '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ka lazao ireo fa baiko avy amiko ny hanaovana ity olona ity an-tranomaizina ary ny hamahanana azy mofo kely sy rano kely fotsiny mandra-piveriko soa aman-tsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy kosa i Mikaià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tàhiny ka tafaverina soa aman-tsara ianao, dia tsy nampitenenin’ny TOMPO aho tsy akory
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 22.28 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maty nandritra ny ady i Ahaba mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 22.29-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia lasa nanafika an’i Ramôta-Gilehada ny mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy i Jôsafata mpanjakan’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy ny mpanjakan’i Israely tamin’i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hody olon-kafa aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 22.30 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', dia hirotsaka an’ady; fa ianao kosa miakanjoa ny fanamianao ihany.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nody olon-kafa ny mpanjakan’i Israely sady nirotsaka an’ady. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa ny mpanjakan’i Siria kosa efa nanome baiko ireo komandin’ny kalesiny mba tsy hamely miaramila tsotra na mpitari-tafika fa ny mpanjakan’i Israely ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nony nahita an’i Jôsafata ireo komandin-kalesy, dia nihevitra azy ho ny mpanjakan’i Israely mihitsy. Dia nohodidininy hasiana izy; kanjo niantso vonjy kosa i Jôsafata, ka namonjy azy ny TOMPO Andriamanitra, ary nampiala ny fahavalo teo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Rehefa hitan’ireo komandin-kalesy fa tsy ny mpanjakan’i Israely io, dia nialany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nisy miaramila sirianina anankiray nandefa zana-tsipîka tsy nahy, ka nahavoa ny mpanjakan’i Israely teo anelanelan’ny famavàn’ny akanjo vy fiarovan-tratrany; ka dia hoy ity mpanjaka tamin’ny mpamily ny kalesiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahodino ny kalesy, ka ento miala ny toeram-piadiana aho fa maratra mafy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Kanefa nihamafy ny ady tamin’izay andro izay, hany ka voatery nihafy ny mpanjakan’i Israely nitsangana teo amin’ny kalesiny, nanoloana ny tafika sirianina, mandra-paharivan’ny andro; fa nony efa hilentika ny masoandro, dia maty izy.
