document_id: 2CH.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nikambana hiady tamin’ny Sirianina i Jôsafata sy i Ahaba
  - type: heading
    content: (Jereo 1 Mp 22.1-4)
  - type: text
    content: 'Nanan-karena sy voninahitra be i Jôsafata; ary ny zanany lahy dia nampanambadiany ny zanakavavin’i Ahaba mpanjakan’i '
  - type: text
    content: Israely
  - type: note
    content: Nampanambadian’i Jôsafata an’i Hatalià zanakavavin’i Ahaba i Jôrama zanany lahy (jereo 2 Mp 8.25-26 sy 2 Tan 21.6). Antony ara-bola sy ara-pôlitika no nahatonga ireny fifanambadian’andriana ireny.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Fa i Tsedekià, zanakalahin’i Kenahanà, dia namboatra tandro-by ka niteny hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Ireto tandroka ireto no hanotoanao ny tafika sirianina mandra-paharingany.»'
  '11':
  - type: text
    content: 'Dia nilaza hafatra toy izany avokoa ny mpaminany rehetra teo ka nanao hoe:'
  - type: text
    content: –Tafiho i Ramôta-Gilehada fa ho resinao, ry mpanjaka! Eny, hatolotry ny TOMPO eo an-tananao io tanàna io.
  - type: heading
    content: Faharesena no nambaran’i Mikaià mpaminany
  - type: heading
    content: (Jereo 1 Mp 22.13-28)
  '12':
  - type: text
    content: 'Ilay iraka izay nandeha naka an’i Mikaià kosa dia niteny taminy hoe:'
  - type: text
    content: '–Indro efa iray teny avokoa izao ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ', ka milaza soa ho an’ny mpanjaka; enga anie ny teninao mba ho tahaka ny azy, ka hilaza soa ihany koa!'
  '13':
  - type: text
    content: 'Fa hoy i Mikaià hoe:'
  - type: text
    content: –Velona ny TOMPO, ka mianiana aho fa izay lazain’Andriamanitra ihany no hambarako.
  '14':
  - type: text
    content: 'Rehefa tonga teo anatrehan’ny mpanjaka izy, dia nanontaniany hoe:'
  - type: text
    content: –Ry Mikaià, handeha hanafika an’i Ramôta-Gilehada ve izahay, sa hijanona ihany aho?
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: –Mandehana fa handresy ianareo, ary hatolotry ny Tompo eo an-tananareo io tanàna io.
  '15':
  - type: text
    content: 'Fa hoy indray ny mpanjaka taminy:'
  - type: text
    content: –Impiry moa no hampianianako anao mba tsy hilaza amiko afa-tsy ny marina ihany amin’ny anaran’ny TOMPO?
  '16':
  - type: text
    content: 'Dia hoy ny navalin’i Mikaià:'
  - type: text
    content: '–Hitako fa ny tafik’i '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo dia niely teny an-tendrombohitra toy ny ondry tsy misy '
  - type: text
    content: mpiandry
  - type: note
    content: Jereo Nom 27.17 sy nta.
  - type: text
    content: '. Ary ny TOMPO niteny hoe: «Tsy mana-mpifehy intsony ireo miaramila ireo, ka aoka izy samy hody soa aman-tsara any an-tranony avy!»'
  '17':
  - type: text
    content: 'Dia hoy ny mpanjakan’i Israely tamin’i Jôsafata:'
  - type: text
    content: –Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy, fa loza ihany?
  '18':
  - type: text
    content: 'Ary hoy indray i Mikaià:'
  - type: text
    content: –Henoy àry ny tenin’ny TOMPO. Hitako nipetraka teo amin’ny sezafiandrianany manko ny TOMPO; ary ireo anjeliny rehetra any an-
  - type: text
    content: danitra
  - type: text
    content: ' nijoro teo ankavanany sy teo ankaviany. '
  '19':
  - type: text
    content: 'Ka hoy ny TOMPO nanontany hoe: «Iza no hitaona an’i Ahaba, mpanjakan’i Israely, handeha hanafika an’i Ramôta-Gilehada mba hahafaty azy any?» Ary samy nanana ny fomba famaliny avy ny tsirairay. '
  '2':
  - type: text
    content: Taona vitsivitsy taorian’izany, dia nidina nankany amin’i Ahaba tany Samaria i Jôsafata; ary namonoan’i Ahaba ondry aman’osy sy omby betsaka izy sy ireo olona nanaraka azy. Avy eo dia notaomin’i Ahaba hanafika an’i Ramôta-Gilehada
  - type: note
    content: Ramôta-Gilehada; jereo 1 Mp 22.3 sy nta.
  - type: text
    content: ' i Jôsafata '
  '20':
  - type: text
    content: 'Fa nandroso ka nitsangana teo anatrehan’ny TOMPO ny fanahy anankiray ary nanao hoe: «Izaho no hitaona azy.» Hoy kosa ny TOMPO hoe: «Amin’ny fomba ahoana?» '
  '21':
  - type: text
    content: 'Dia hoy izy: «Handeha aho ka ho tonga fanahy mandainga ao am-bavan’ireo mpaminanin’i Ahaba rehetra.» Ary hoy indray ny Tompo: «Ho voataonanao tokoa izy, sady zavatra manavanana anao izany; ndeha àry ka ataovy.» '
  '22':
  - type: text
    content: Ankehitriny, indro ny TOMPO efa nanisy fanahy mandainga ao am-bavan’ireto mpaminaninao ireto, dia satria IZY mihitsy no efa nilaza ny loza hanjo anao.
  '23':
  - type: text
    content: 'Tamin’izay dia nanatona an’i Mikaià i Tsedekià zanakalahin’i Kenahanà, ka namely tehamaina azy sady nanao hoe:'
  - type: text
    content: –Niala tamiko ve ny Fanahin’ny TOMPO hiteny aminao?
  '24':
  - type: text
    content: 'Dia novalian’i Mikaià hoe:'
  - type: text
    content: –Indro fa ho hitanao izany amin’ny andro izay hitsofotsofohanao efitrano mba hiery.
  '25':
  - type: text
    content: 'Tamin’izay ny mpanjakan’i Israely dia nibaiko hoe:'
  - type: text
    content: '–Sambory i Mikaià, dia ento miverina any amin’i Amôna governoran’ny tanàna sy any amin’i Joasy zanako lahy '
  '26':
  - type: text
    content: ka lazao ireo fa baiko avy amiko ny hanaovana ity olona ity an-tranomaizina ary ny hamahanana azy mofo kely sy rano kely fotsiny mandra-piveriko soa aman-tsara.
  '27':
  - type: text
    content: 'Fa hoy kosa i Mikaià:'
  - type: text
    content: –Raha tàhiny ka tafaverina soa aman-tsara ianao, dia tsy nampitenenin’ny TOMPO aho tsy akory
  - type: note
    content: Jereo 1 Mp 22.28 sy nta.
  - type: text
    content: .
  - type: heading
    content: Maty nandritra ny ady i Ahaba mpanjaka
  - type: heading
    content: (Jereo 1 Mp 22.29-40)
  '28':
  - type: text
    content: 'Dia lasa nanafika an’i Ramôta-Gilehada ny mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy i Jôsafata mpanjakan’i Joda. '
  '29':
  - type: text
    content: 'Ary hoy ny mpanjakan’i Israely tamin’i Jôsafata:'
  - type: text
    content: –Hody olon-kafa aho
  - type: note
    content: Jereo 1 Mp 22.30 sy nta.
  - type: text
    content: ', dia hirotsaka an’ady; fa ianao kosa miakanjoa ny fanamianao ihany.'
  - type: text
    content: 'Dia nody olon-kafa ny mpanjakan’i Israely sady nirotsaka an’ady. '
  '3':
  - type: text
    content: 'ka nanontaniany hoe:'
  - type: text
    content: –Mba hiaraka amiko hanafika an’i Ramôta-Gilehada ve ianao?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Eny, fa tahaka ny tenanao ihany aho, ka ny tafiko dia tafikao; koa hiaraka hiantafika aminao izahay.
  - type: heading
    content: Naminany fahombiazana ireo mpaminany matihanina
  - type: heading
    content: (Jereo 1 Mp 22.5-12)
  '30':
  - type: text
    content: Fa ny mpanjakan’i Siria kosa efa nanome baiko ireo komandin’ny kalesiny mba tsy hamely miaramila tsotra na mpitari-tafika fa ny mpanjakan’i Israely ihany.
  '31':
  - type: text
    content: 'Nony nahita an’i Jôsafata ireo komandin-kalesy, dia nihevitra azy ho ny mpanjakan’i Israely mihitsy. Dia nohodidininy hasiana izy; kanjo niantso vonjy kosa i Jôsafata, ka namonjy azy ny TOMPO Andriamanitra, ary nampiala ny fahavalo teo aminy. '
  '32':
  - type: text
    content: Rehefa hitan’ireo komandin-kalesy fa tsy ny mpanjakan’i Israely io, dia nialany.
  '33':
  - type: text
    content: 'Ary nisy miaramila sirianina anankiray nandefa zana-tsipîka tsy nahy, ka nahavoa ny mpanjakan’i Israely teo anelanelan’ny famavàn’ny akanjo vy fiarovan-tratrany; ka dia hoy ity mpanjaka tamin’ny mpamily ny kalesiny:'
  - type: text
    content: –Ahodino ny kalesy, ka ento miala ny toeram-piadiana aho fa maratra mafy.
  '34':
  - type: text
    content: Kanefa nihamafy ny ady tamin’izay andro izay, hany ka voatery nihafy ny mpanjakan’i Israely nitsangana teo amin’ny kalesiny, nanoloana ny tafika sirianina, mandra-paharivan’ny andro; fa nony efa hilentika ny masoandro, dia maty izy.
  '4':
  - type: text
    content: 'Mbola niteny tamin’ny mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' indray i Jôsafata ka nanao hoe:'
  - type: text
    content: –Mba anontanio aloha ny tenin’ny TOMPO.
  '5':
  - type: text
    content: 'ary novorin’ny mpanjakan’i Israely ny '
  - type: text
    content: mpaminaniny
  - type: text
    content: ' efajato lahy'
  - type: note
    content: Jereo 1 Mp 22.6 sy nta.
  - type: text
    content: ' ka nanontaniany hoe:'
  - type: text
    content: –Handeha hanafika an’i Ramôta-Gilehada ve isika, sa hijanona ihany aho?
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –Mandehana, ry andriamanjaka, fa hatolotr’Andriamanitra eo an-tananao ny tanàna.
  '6':
  - type: text
    content: 'Ary hoy kosa i Jôsafata:'
  - type: text
    content: –Moa tsy misy mpaminanin’ny TOMPO koa ve eto mba hanontaniantsika?
  '7':
  - type: text
    content: 'Dia novalian’ny mpanjakan’i Israely hoe:'
  - type: text
    content: –Mbola misy lehilahy iray ahazoantsika manontany ny TOMPO ao; saingy halako izy, satria tsy mbola naminany soa ho ahy fa loza mandrakariva. Mikaià, zanakalahin’i Jimlà, no anarany.
  - type: text
    content: 'Ka hoy i Jôsafata:'
  - type: text
    content: –Aza dia miteny toy izany re ianao, ry mpanjaka!
  '8':
  - type: text
    content: Tamin’izay dia niantso tandapa anankiray ny mpanjakan’i Israely, ka nandidy azy haka faingana an’i Mikaià zanakalahin’i Jimlà.
  '9':
  - type: text
    content: 'Ary ny mpanjakan’i Israely sy ny mpanjakan’i Joda dia samy nipetraka teo amin’ny sezafiandrianany sy efa niakanjo ny fanamiany avy, teo amin’ilay kianja manoloana ny vavahadin’i Samaria, nandritra ny naminanian’ireo mpaminany rehetra ireo. '
