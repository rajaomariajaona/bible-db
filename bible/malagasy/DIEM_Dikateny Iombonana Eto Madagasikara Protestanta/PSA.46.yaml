  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Misy renirano mampifaly ny tanànan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay fonena-masina tsy manan-tsahala
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ireo fonenan’ny Avo Indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andriamanitra no eo anivony ka tsy hihontsona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra mamonjy azy raha ho avy ny maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitabataba ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mikorontana ny fanjakana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny Tompo kosa namoaka feo toa kotro-baratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nihovotra sy niempo ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
