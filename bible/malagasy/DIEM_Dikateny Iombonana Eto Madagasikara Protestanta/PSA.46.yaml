  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tongava hizaha ny asa vitan’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny zava-mampitolagaga nataony teto an-tany:'
