    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy ny Tompo hoe: «Tapitra hatreo ny ady;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ekeo fa Izaho no Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voasandratra hanerinerina amin’ireo firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voasandratra hanerinerina amin’ny tany.»
