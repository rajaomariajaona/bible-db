    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy ny Tompo hoe: «Tapitra hatreo ny ady;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ekeo fa Izaho no Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voasandratra hanerinerina amin’ireo firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voasandratra hanerinerina amin’ny tany.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny TOMPOn’izao rehetra izao no momba anay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Andriamanitr’i Jakôba no fialofanay!
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Andriamanitra ny anay no aro sy hery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpamonjy mora azo indrindra Izy amin’ny fahoriana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Koa tsy atahoranay na tany hihozona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tendrombohitra hianjera any anaty ranomasina,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: na riaka hirohondrohona sy handroatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hibontsina hampikoa ny tendrombohitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPOn’izao rehetra izao no momba anay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Andriamanitr’i Jakôba no fialofanay!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Misy renirano mampifaly ny tanànan’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay fonena-masina tsy manan-tsahala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo fonenan’ny Avo Indrindra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Andriamanitra no eo anivony ka tsy hihontsona izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra mamonjy azy raha ho avy ny maraina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mitabataba ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mikorontana ny fanjakana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny Tompo kosa namoaka feo toa kotro-baratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nihovotra sy niempo ny tany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
