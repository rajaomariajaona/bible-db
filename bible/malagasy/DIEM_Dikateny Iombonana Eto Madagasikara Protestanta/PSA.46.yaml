document_id: PSA.46,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tompon’izao rehetra izao no momba anay
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny zava-maneno avo feo. Tononkira nataon’ireo terak’i Kôra
  - type: note
    content: 'terak’i Kôra: jereo Sal 42.1 sy nta.'
  - type: text
    content: .
  '10':
  - type: text
    content: ny ady ampitsahariny
  - type: text
    content: hatrany am-paran’ny tany,
  - type: text
    content: ny tsipîka sy ny lefona tapatapahiny,
  - type: text
    content: ary ny ampinga ataony kilan’ny afo.
  '11':
  - type: text
    content: 'Hoy ny Tompo hoe: «Tapitra hatreo ny ady;'
  - type: text
    content: ka ekeo fa Izaho no Andriamanitra,
  - type: text
    content: voasandratra hanerinerina amin’ireo firenena,
  - type: text
    content: voasandratra hanerinerina amin’ny tany.»
  '12':
  - type: text
    content: Ny TOMPOn’izao rehetra izao no momba anay;
  - type: text
    content: ilay Andriamanitr’i Jakôba no fialofanay!
  - type: text
    content: Fiatoana
  '2':
  - type: text
    content: Andriamanitra ny anay no aro sy hery;
  - type: text
    content: mpamonjy mora azo indrindra Izy amin’ny fahoriana.
  '3':
  - type: text
    content: Koa tsy atahoranay na tany hihozona,
  - type: text
    content: na tendrombohitra hianjera any anaty ranomasina,
  '4':
  - type: text
    content: na riaka hirohondrohona sy handroatra
  - type: text
    content: ka hibontsina hampikoa ny tendrombohitra.
  - type: text
    content: Ny TOMPOn’izao rehetra izao no momba anay;
  - type: text
    content: ilay Andriamanitr’i Jakôba no fialofanay!
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Misy renirano mampifaly ny tanànan’Andriamanitra,
  - type: text
    content: dia ilay fonena-masina tsy manan-tsahala
  - type: text
    content: amin’ireo fonenan’ny Avo Indrindra.
  '6':
  - type: text
    content: Andriamanitra no eo anivony ka tsy hihontsona izy;
  - type: text
    content: Andriamanitra mamonjy azy raha ho avy ny maraina.
  '7':
  - type: text
    content: Mitabataba ny firenena,
  - type: text
    content: mikorontana ny fanjakana;
  - type: text
    content: ny Tompo kosa namoaka feo toa kotro-baratra,
  - type: text
    content: dia nihovotra sy niempo ny tany.
  '8':
  - type: text
    content: Ny TOMPOn’izao rehetra izao no momba anay;
  - type: text
    content: ilay Andriamanitr’i Jakôba no fialofanay!
  - type: text
    content: Fiatoana
  '9':
  - type: text
    content: Tongava hizaha ny asa vitan’ny TOMPO,
  - type: text
    content: 'dia ny zava-mampitolagaga nataony teto an-tany:'
