    - type: text
      text: '9'
  - type: text
    text: Tongava hizaha ny asa vitan’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ny zava-mampitolagaga nataony teto an-tany:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ny ady ampitsahariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrany am-paran’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsipîka sy ny lefona tapatapahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ampinga ataony kilan’ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
