    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa tsy atahoranay na tany hihozona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na tendrombohitra hianjera any anaty ranomasina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: na riaka hirohondrohona sy handroatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hibontsina hampikoa ny tendrombohitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny TOMPOn’izao rehetra izao no momba anay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay Andriamanitr’i Jakôba no fialofanay!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
