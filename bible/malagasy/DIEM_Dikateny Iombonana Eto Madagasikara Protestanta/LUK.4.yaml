segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alaim-panahy any an-taniefitra i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 4.1-11; Mk 1.12-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary feno ny Fanahy Masina i Jesoa no niverina avy any Jôrdàna. Dia nentin’ny Fanahy Masina Izy honina any an-taniefitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'efapolo andro sady nalain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' fanahy, ary tsy nikasika hanina nandritra izany andro izany ka noana tamin’ny farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy ny devoly taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ' tokoa Ianao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Raha zanak’Andriamanitra tokoa Ianao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa (eto sy ao amin’ny and 9) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Satria Zanak’Andriamanitra tokoa Ianao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Noho Ianao Zanak’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', teneno io vato io hanjary mofo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ': «Tsy ny mofo ihany no hiveloman’ny olona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deot 8.3.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nentin’ny devoly tany amin’ny toerana avo i Jesoa ka nasehony Azy indray mipy maso ny fanjakana rehetra eran-tany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Homeko Anao daholo ny hery amam-boninahitr’ireo fanjakana ireo, fa efa natolotra ahy ka omeko an’izay tiako homena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa raha miankohoka eto anoloako Ianao, dia ho Anao avokoa ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no voalazan’ny Soratra Masina: «Ny Tompo Andriamanitra no hiankohofanao ary Izy irery no hivavahanao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deot 6.13.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nentin’ny devoly tany Jerosalema i Jesoa ka najorony teo an-tendron’ny zoron’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha Zanak’Andriamanitra tokoa Ianao, mianjerà avy eto ho any ambany any; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'satria izao no voalazan’ny Soratra Masina: «Homen’ny Tompo baiko ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeliny
  - type: text
    text: ' noho ny aminao mba hiaro Anao.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izao koa: «Ny anjely hitondra Anao eny an-tanany mba tsy ho tafintohim-bato ny tongotrao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 10-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 91.11-12.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no voalazan’ny Soratra Masina: «Aza maka fanahy ny Tompo Andriamanitrao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deot 6.16.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nony avy naka fanahy an’i Jesoa tamin’izao fomba isan-karazany izao ny devoly dia nandao Azy aloha mandra-piavin’ny fotoana hafa indray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mandra-piavin’...indray: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mandra-piavin’ny fotoana voafetra indray.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manomboka ny asany any Galilea i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 4.12-17; Mk 1.14-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nombàn’ny Fanahy Masina i Jesoa no niverina tany Galilea; ary nanomboka niely tamin’ny faritany manontolo ny lazany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nampianatra tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' Izy sady nomen’ny olona rehetra voninahitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Roahin’ny tao Nazareta i Jesoa rehefa avy nampianatra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 13.53-58; Mk 6.1-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nandeha tany Nazareta tanàna nahabe Azy i Jesoa ary tamin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' dia niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' araka ny fanaony. Nitsangana Izy hamaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka natolotra Azy ny bokin’i Isaià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: '. Novelariny ilay boky ary izao no andinin-tsoratra hitany:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: «Ato amiko ny Fanahy avy amin’ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka natokan’ny Tompo Aho hanambara
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' amin’ny mahantra;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nirahiny Aho hitory fanafahana amin’ny mpigadra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fahiratana amin’ny jamba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanafaka ny ampahorîna
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary hitory taona hanehoan’ny Tompo fanambinana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 61.1-2, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa nahorony ilay boky ka naveriny tamin’ny mpandraharaha, dia nipetraka i Jesoa. Nifantoka teny aminy avokoa ny mason’izay rehetra tao amin’ny sinagôga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa i Jesoa kosa niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tanteraka androany amin’izao andrenesanareo azy izao izany andinin’ny Soratra Masina izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary samy vavolombelona niaiky Azy daholo ny olona sady gaga noho ny teny soa naloaky ny vavany, ka hoy izy rehetra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy zanak’i Jôsefa ve ity?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa i Jesoa kosa nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ampiharinareo amiko tokoa ilay ohabolana hoe: «Dokotera, sitrano aloha ny tenanao», satria hoy ianareo tamiko: «Izay rehetra renay fa nataonao tany Kafarnahòma, mba ataovy eto an-tanindrazanao koa!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary niteny indray i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina aminareo fa tsy misy mpaminany to teny eo amin’ny tanàna nahabe azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary izao koa no ambarako tsotra aminareo: marobe ireo mpitondratena teo amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 17.1.
    marker-yv: yv-n
  - type: text
    text: ' tamin’ny andron’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià
  - type: text
    text: ', raha nihantona telo taona sy tapany ny ranonorana ka nahatonga mosary lehibe manerana ny tany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: kanefa tsy nisy nanirahan’Andriamanitra an’i Elià na dia iray aza, fa ilay mpitondratena tany Sarefàta ao amin’ny faritr’i Sidôna ihany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 17.8-16.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Marobe koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: marary hoditra
  - type: text
    text: ' teo amin’i Israely faha-Elisà mpaminany; kanefa tsy nisy nodioviny na dia iray aza, fa i Nahamàna Sirianina ihany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 5.1-14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nisafoaka daholo ny olona teo amin’ny sinagôga nony nandre izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ka niara-nitsangana nandroaka an’i Jesoa tany ivelan’ny tanàna sy nitondra Azy tany an-tampon’ilay havoana iorenan’ny tanàna mba hamarina Azy any an-tevana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Izy kosa namakivaky teo afovoan’izy rehetra, dia lasa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay azon’ny demony tao Kafarnahòma
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 1.21-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nidina tany Kafarnahòma tanàna any Galilea i Jesoa ka nampianatra ny olona isaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Talanjona ny olona tamin’ny fampianarany, satria feno fahefana ny teniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' dia nisy lehilahy azon’ny fanahin-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' maloto, ka niantsoantso tamin’ny feo mahery hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: –Aoka re fa hataonao inona izahay, ry Jesoa avy any Nazareta? Tonga handringana anay ve Ianao? Fantatro anie fa Ianao no ilay Masina avy amin’Andriamanitra e!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Notenenin’i Jesoa mafy kosa ilay fanahy maloto ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mangina, ary mialà amin-dralehilahy io!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nandavo an-dralehilahy tamin’ny tany teo afovoan’ny vahoaka ny demony vao niala taminy, nefa tsy nandratra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Raiki-tahotra izy rehetra sady nifampiresaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana re izany teny izany? Fa baikon’ity olona ity amim-pahefana sy hery ny fanahy maloto, dia lasa!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary niely teny amin’ny tany manodidina rehetra ny lazan’i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ny marary marobe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 8.14-17; Mk 1.29-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Rehefa niala tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' i Jesoa, dia niantrano tao amin-dry Simôna. Ary voan’ny tazo mahery ny rafozambavin’i Simôna ka niangaviana Azy hositraniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Niondrika teo amin-dravehivavy i Jesoa; ary notenenin’i Jesoa mafy ny tazo, ka niala taminy. Dia nitsangana teo no ho eo ihany ravehivavy nandroso sakafo ho an’ireo vahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Vao maty kosa ny masoandro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mk 1.32 sy nta.
