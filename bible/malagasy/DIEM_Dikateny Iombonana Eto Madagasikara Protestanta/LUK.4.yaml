document_id: LUK.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Alaim-panahy any an-taniefitra i Jesoa
  - type: heading
    content: (Jereo Mt 4.1-11; Mk 1.12-13)
  - type: text
    content: 'Ary feno ny Fanahy Masina i Jesoa no niverina avy any Jôrdàna. Dia nentin’ny Fanahy Masina Izy honina any an-taniefitra '
  '10':
  - type: text
    content: 'satria izao no voalazan’ny Soratra Masina: «Homen’ny Tompo baiko ireo '
  - type: text
    content: anjeliny
  - type: text
    content: ' noho ny aminao mba hiaro Anao.» '
  '11':
  - type: text
    content: 'Ary izao koa: «Ny anjely hitondra Anao eny an-tanany mba tsy ho tafintohim-bato ny tongotrao'
  - type: note
    content: 'And 10-11: Sal 91.11-12.'
  - type: text
    content: .»
  '12':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Izao no voalazan’ny Soratra Masina: «Aza maka fanahy ny Tompo Andriamanitrao'
  - type: note
    content: Deot 6.16.
  - type: text
    content: .»
  '13':
  - type: text
    content: Nony avy naka fanahy an’i Jesoa tamin’izao fomba isan-karazany izao ny devoly dia nandao Azy aloha mandra-piavin’ny fotoana hafa indray
  - type: note
    content: 'mandra-piavin’...indray: dkt hafa mandra-piavin’ny fotoana voafetra indray.'
  - type: text
    content: .
  - type: heading
    content: Manomboka ny asany any Galilea i Jesoa
  - type: heading
    content: (Jereo Mt 4.12-17; Mk 1.14-15)
  '14':
  - type: text
    content: 'Nombàn’ny Fanahy Masina i Jesoa no niverina tany Galilea; ary nanomboka niely tamin’ny faritany manontolo ny lazany. '
  '15':
  - type: text
    content: 'Nampianatra tany amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' Izy sady nomen’ny olona rehetra voninahitra.'
  - type: heading
    content: Roahin’ny tao Nazareta i Jesoa rehefa avy nampianatra
  - type: heading
    content: (Jereo Mt 13.53-58; Mk 6.1-6)
  '16':
  - type: text
    content: 'Nandeha tany Nazareta tanàna nahabe Azy i Jesoa ary tamin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' dia niditra tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' araka ny fanaony. Nitsangana Izy hamaky ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'ka natolotra Azy ny bokin’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: '. Novelariny ilay boky ary izao no andinin-tsoratra hitany:'
  '18':
  - type: text
    content: «Ato amiko ny Fanahy avy amin’ny Tompo.
  - type: text
    content: Ka natokan’ny Tompo Aho hanambara
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' amin’ny mahantra;'
  - type: text
    content: nirahiny Aho hitory fanafahana amin’ny mpigadra
  - type: text
    content: sy fahiratana amin’ny jamba,
  - type: text
    content: hanafaka ny ampahorîna
  '19':
  - type: text
    content: ary hitory taona hanehoan’ny Tompo fanambinana
  - type: note
    content: Is 61.1-2, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '2':
  - type: text
    content: 'efapolo andro sady nalain’ny '
  - type: text
    content: devoly
  - type: text
    content: ' fanahy, ary tsy nikasika hanina nandritra izany andro izany ka noana tamin’ny farany. '
  '20':
  - type: text
    content: 'Rehefa nahorony ilay boky ka naveriny tamin’ny mpandraharaha, dia nipetraka i Jesoa. Nifantoka teny aminy avokoa ny mason’izay rehetra tao amin’ny sinagôga. '
  '21':
  - type: text
    content: 'Fa i Jesoa kosa niteny taminy hoe:'
  - type: text
    content: –Tanteraka androany amin’izao andrenesanareo azy izao izany andinin’ny Soratra Masina izany.
  '22':
  - type: text
    content: 'Ary samy vavolombelona niaiky Azy daholo ny olona sady gaga noho ny teny soa naloaky ny vavany, ka hoy izy rehetra hoe:'
  - type: text
    content: –Tsy zanak’i Jôsefa ve ity?
  '23':
  - type: text
    content: 'Fa i Jesoa kosa nanao taminy hoe:'
  - type: text
    content: '–Ampiharinareo amiko tokoa ilay ohabolana hoe: «Dokotera, sitrano aloha ny tenanao», satria hoy ianareo tamiko: «Izay rehetra renay fa nataonao tany Kafarnahòma, mba ataovy eto an-tanindrazanao koa!»'
  '24':
  - type: text
    content: 'Ary niteny indray i Jesoa hoe:'
  - type: text
    content: '–Lazaiko marina aminareo fa tsy misy mpaminany to teny eo amin’ny tanàna nahabe azy. '
  '25':
  - type: text
    content: 'Ary izao koa no ambarako tsotra aminareo: marobe ireo mpitondratena teo amin’i '
  - type: text
    content: Israely
  - type: note
    content: Jereo 1 Mp 17.1.
  - type: text
    content: ' tamin’ny andron’i '
  - type: text
    content: Elià
  - type: text
    content: ', raha nihantona telo taona sy tapany ny ranonorana ka nahatonga mosary lehibe manerana ny tany; '
  '26':
  - type: text
    content: kanefa tsy nisy nanirahan’Andriamanitra an’i Elià na dia iray aza, fa ilay mpitondratena tany Sarefàta ao amin’ny faritr’i Sidôna ihany
  - type: note
    content: Jereo 1 Mp 17.8-16.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Marobe koa ny '
  - type: text
    content: marary hoditra
  - type: text
    content: ' teo amin’i Israely faha-Elisà mpaminany; kanefa tsy nisy nodioviny na dia iray aza, fa i Nahamàna Sirianina ihany'
  - type: note
    content: Jereo 2 Mp 5.1-14.
  - type: text
    content: .
  '28':
  - type: text
    content: 'Nisafoaka daholo ny olona teo amin’ny sinagôga nony nandre izany, '
  '29':
  - type: text
    content: 'ka niara-nitsangana nandroaka an’i Jesoa tany ivelan’ny tanàna sy nitondra Azy tany an-tampon’ilay havoana iorenan’ny tanàna mba hamarina Azy any an-tevana. '
  '3':
  - type: text
    content: 'Dia hoy ny devoly taminy:'
  - type: text
    content: '–Raha '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' tokoa Ianao'
  - type: note
    content: 'Raha zanak’Andriamanitra tokoa Ianao: dkt hafa (eto sy ao amin’ny and 9) Satria Zanak’Andriamanitra tokoa Ianao na hoe Noho Ianao Zanak’Andriamanitra.'
  - type: text
    content: ', teneno io vato io hanjary mofo.'
  '30':
  - type: text
    content: Izy kosa namakivaky teo afovoan’izy rehetra, dia lasa.
  - type: heading
    content: Sitranin’i Jesoa ilay azon’ny demony tao Kafarnahòma
  - type: heading
    content: (Jereo Mk 1.21-28)
  '31':
  - type: text
    content: 'Nidina tany Kafarnahòma tanàna any Galilea i Jesoa ka nampianatra ny olona isaky ny '
  - type: text
    content: sabata
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Talanjona ny olona tamin’ny fampianarany, satria feno fahefana ny teniny. '
  '33':
  - type: text
    content: 'Ary tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' dia nisy lehilahy azon’ny fanahin-'
  - type: text
    content: demony
  - type: text
    content: ' maloto, ka niantsoantso tamin’ny feo mahery hoe:'
  '34':
  - type: text
    content: –Aoka re fa hataonao inona izahay, ry Jesoa avy any Nazareta? Tonga handringana anay ve Ianao? Fantatro anie fa Ianao no ilay Masina avy amin’Andriamanitra e!
  '35':
  - type: text
    content: 'Notenenin’i Jesoa mafy kosa ilay fanahy maloto ka nataony hoe:'
  - type: text
    content: –Mangina, ary mialà amin-dralehilahy io!
  - type: text
    content: 'Dia nandavo an-dralehilahy tamin’ny tany teo afovoan’ny vahoaka ny demony vao niala taminy, nefa tsy nandratra azy. '
  '36':
  - type: text
    content: 'Raiki-tahotra izy rehetra sady nifampiresaka hoe:'
  - type: text
    content: –Ahoana re izany teny izany? Fa baikon’ity olona ity amim-pahefana sy hery ny fanahy maloto, dia lasa!
  '37':
  - type: text
    content: Ary niely teny amin’ny tany manodidina rehetra ny lazan’i Jesoa.
  - type: heading
    content: Sitranin’i Jesoa ny marary marobe
  - type: heading
    content: (Jereo Mt 8.14-17; Mk 1.29-34)
  '38':
  - type: text
    content: 'Rehefa niala tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Jesoa, dia niantrano tao amin-dry Simôna. Ary voan’ny tazo mahery ny rafozambavin’i Simôna ka niangaviana Azy hositraniny. '
  '39':
  - type: text
    content: Niondrika teo amin-dravehivavy i Jesoa; ary notenenin’i Jesoa mafy ny tazo, ka niala taminy. Dia nitsangana teo no ho eo ihany ravehivavy nandroso sakafo ho an’ireo vahiny.
  '4':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Tsy ny mofo ihany no hiveloman’ny olona'
  - type: note
    content: Deot 8.3.
  - type: text
    content: .»
  '40':
  - type: text
    content: Vao maty kosa ny masoandro
  - type: note
    content: Jereo Mk 1.32 sy nta.
  - type: text
    content: ', izay rehetra nanana marary azon’ny aretina isan-karazany dia samy nitondra ny azy teo amin’i Jesoa. Nametrahany tanana tsirairay izy ireny, ka nositraniny. '
  '41':
  - type: text
    content: 'Olona maro koa no nialan’ny '
  - type: text
    content: demony
  - type: text
    content: ' izay nihiakiaka nanao hoe: «Ianao no ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: '!» Norahonan’i Jesoa mafy kosa ny demony sady tsy navelany hiteniteny satria ireo dia nahalala fa Izy no ilay '
  - type: text
    content: Mesia
  - type: text
    content: .
  - type: heading
    content: Mitory ny Vaovao Mahafaly eran’i Jodea i Jesoa
  - type: heading
    content: (Jereo Mk 1.35-39)
  '42':
  - type: text
    content: 'Raha vao naraina ny andro, dia niala tao an-tanàna i Jesoa ary nankany amin’ny toerana mangina. Nokarohin’ny vahoaka i Jesoa, ary dia hitany ka nokasainy hotazonina tsy hiala teo aminy. '
  '43':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Tsy maintsy anambaràko ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' koa ny tanàna hafa, satria izany no nanirahan’Andriamanitra Ahy.'
  '44':
  - type: text
    content: 'Dia nitoriteny tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' eran’i Jodea'
  - type: note
    content: 'Jodea: jereo 1.5 sy nta. Misy stf sasany ahitana hoe Galilea.'
  - type: text
    content: Izy.
  '5':
  - type: text
    content: 'Dia nentin’ny devoly tany amin’ny toerana avo i Jesoa ka nasehony Azy indray mipy maso ny fanjakana rehetra eran-tany '
  '6':
  - type: text
    content: 'sady nataony hoe:'
  - type: text
    content: '–Homeko Anao daholo ny hery amam-boninahitr’ireo fanjakana ireo, fa efa natolotra ahy ka omeko an’izay tiako homena azy. '
  '7':
  - type: text
    content: Koa raha miankohoka eto anoloako Ianao, dia ho Anao avokoa ireo.
  '8':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Izao no voalazan’ny Soratra Masina: «Ny Tompo Andriamanitra no hiankohofanao ary Izy irery no hivavahanao'
  - type: note
    content: Deot 6.13.
  - type: text
    content: .»
  '9':
  - type: text
    content: 'Dia nentin’ny devoly tany Jerosalema i Jesoa ka najorony teo an-tendron’ny zoron’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' sady nataony hoe:'
  - type: text
    content: '–Raha Zanak’Andriamanitra tokoa Ianao, mianjerà avy eto ho any ambany any; '
