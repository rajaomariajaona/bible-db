  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy andriambavy iray mitsena anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mpanjakavavy maka toerana eo ankavananao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'eo ankavananao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 16.11; ampit Sal 110.1.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady miravaka volamena avy any Ôfira.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa, razazavavy, atongilano ny sofinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary aoka ho tandrinao tsara izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza raharahaina intsony ny firenenao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fianakavian-drainao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanjaka mankatelina ny bikanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka iondreho izy fa tomponao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanefoefo avy any Tiro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny mpanankarena amin’ny vahoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy hitondra fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahazoana sitraka aminao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamirapiratra tokoa ilay Andriambavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ombàn’ny firavaka mifaham-bolamena.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao fitafiana misoratsoratra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no entina eo amin’ny mpanjaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manotrona ny andriambavy koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo zazavavy sakaizany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay efa nentina teo aminy:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandroso amim-pifaliana sy haravoana ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miditra ao an-dapan’ny mpanjaka.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mpanjaka ô, ny zanakao anie handimby anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny sezafiandrianan’ny razanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hotendrenao ho mpifehy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manerana ny tany tontolo!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa hampahatsiaro ny lazanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny taranaka mifandimby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no hahatonga ny firenen-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hidera anao mandrakizay mandrakizay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny foko miboiboika teny soa, ry mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha hambarako ny tononkaloko ho anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fomba kanto no hanononako an’izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny soratra voasikotra ambony vato.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soa indrindra amin’ny samy olombelona ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mahafinaritra ny teny ambaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'koa aminao mandrakizay ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitahian
    - type: text
      text: ’Andriamanitra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry ilay mpiady mahery fo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fehezo amin’ny etra ny sabatrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mari-piandrianana sy voninahitrao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitaingena kalesy ianao ka mirosoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiaro ny hitsiny sy hitandro ny rariny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Loza no hafitsoky ny herinao:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho lavo eo ambaninao ireo firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria maranitra ny zana-tsipîkanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitsatoka am-pon’ireo fahavalonao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sezafiandriananao dia tahaka ny an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka maharitra mandrakizay mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny fahitsiana tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no itondranao ny fanjakanao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tia rariny sy mpankahala ratsy ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany ilay Andriamanitra Andriamanitrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: And tsiahivina ao amin’ny Heb 1.8-9 ary ampiharina amin’i Jesoa Kristy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanokana anao fa tsy ireo namanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanosotra diloilo fifaliana tamin’ny lohanao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamerovero ny fitafianao rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'fa manitra sahondra sy kanela ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: miora
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy ao an-dapanao voaravaka ivoary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia andrenesanao mozika izay ankafizinao.
