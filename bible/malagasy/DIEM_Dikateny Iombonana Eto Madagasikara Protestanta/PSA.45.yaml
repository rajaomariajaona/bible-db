document_id: PSA.45,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Tononkalo ho an’ny fanambadian’ny mpanjaka
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny gitara. Tononkalo fananarana nataon’ireo terak’i Kôra. Tononkiram-pitiavana
  - type: note
    content: 'terak’i Kôra: jereo Sal 42.1 sy nta.'
  - type: text
    content: .
  '10':
  - type: text
    content: Misy andriambavy iray mitsena anao,
  - type: text
    content: dia mpanjakavavy maka toerana eo ankavananao
  - type: note
    content: 'eo ankavananao: jereo Sal 16.11; ampit Sal 110.1.'
  - type: text
    content: sady miravaka volamena avy any Ôfira.
  '11':
  - type: text
    content: Mihainoa, razazavavy, atongilano ny sofinao
  - type: text
    content: 'ary aoka ho tandrinao tsara izao:'
  - type: text
    content: Aza raharahaina intsony ny firenenao
  - type: text
    content: sy ny fianakavian-drainao.
  '12':
  - type: text
    content: Ny mpanjaka mankatelina ny bikanao,
  - type: text
    content: ka iondreho izy fa tomponao.
  '13':
  - type: text
    content: Ny mpanefoefo avy any Tiro
  - type: text
    content: sy ny mpanankarena amin’ny vahoaka
  - type: text
    content: dia samy hitondra fanatitra
  - type: text
    content: hahazoana sitraka aminao.
  '14':
  - type: text
    content: Mamirapiratra tokoa ilay Andriambavy
  - type: text
    content: ombàn’ny firavaka mifaham-bolamena.
  '15':
  - type: text
    content: Manao fitafiana misoratsoratra izy
  - type: text
    content: no entina eo amin’ny mpanjaka.
  - type: text
    content: Manotrona ny andriambavy koa
  - type: text
    content: ireo zazavavy sakaizany
  - type: text
    content: 'izay efa nentina teo aminy:'
  '16':
  - type: text
    content: mandroso amim-pifaliana sy haravoana ireo
  - type: text
    content: ary miditra ao an-dapan’ny mpanjaka.
  '17':
  - type: text
    content: Ry mpanjaka ô, ny zanakao anie handimby anao
  - type: text
    content: eo amin’ny sezafiandrianan’ny razanao,
  - type: text
    content: ka hotendrenao ho mpifehy
  - type: text
    content: manerana ny tany tontolo!
  '18':
  - type: text
    content: Izaho kosa hampahatsiaro ny lazanao
  - type: text
    content: amin’ny taranaka mifandimby;
  - type: text
    content: izany no hahatonga ny firenen-kafa
  - type: text
    content: hidera anao mandrakizay mandrakizay.
  '2':
  - type: text
    content: Ny foko miboiboika teny soa, ry mpanjaka,
  - type: text
    content: raha hambarako ny tononkaloko ho anao.
  - type: text
    content: Fomba kanto no hanononako an’izany,
  - type: text
    content: tahaka ny soratra voasikotra ambony vato.
  '3':
  - type: text
    content: Soa indrindra amin’ny samy olombelona ianao
  - type: text
    content: sady mahafinaritra ny teny ambaranao;
  - type: text
    content: 'koa aminao mandrakizay ny '
  - type: text
    content: fitahian
  - type: text
    content: ’Andriamanitra.
  '4':
  - type: text
    content: Ry ilay mpiady mahery fo ô,
  - type: text
    content: fehezo amin’ny etra ny sabatrao
  - type: text
    content: izay mari-piandrianana sy voninahitrao.
  '5':
  - type: text
    content: Mitaingena kalesy ianao ka mirosoa
  - type: text
    content: hiaro ny hitsiny sy hitandro ny rariny.
  - type: text
    content: 'Loza no hafitsoky ny herinao:'
  '6':
  - type: text
    content: ho lavo eo ambaninao ireo firenena,
  - type: text
    content: satria maranitra ny zana-tsipîkanao
  - type: text
    content: ka hitsatoka am-pon’ireo fahavalonao.
  '7':
  - type: text
    content: Ny sezafiandriananao dia tahaka ny an’Andriamanitra
  - type: text
    content: ka maharitra mandrakizay mandrakizay;
  - type: text
    content: araka ny fahitsiana tokoa
  - type: text
    content: no itondranao ny fanjakanao.
  '8':
  - type: text
    content: Tia rariny sy mpankahala ratsy ianao.
  - type: text
    content: Noho izany ilay Andriamanitra Andriamanitrao
  - type: note
    content: And tsiahivina ao amin’ny Heb 1.8-9 ary ampiharina amin’i Jesoa Kristy.
  - type: text
    content: dia nanokana anao fa tsy ireo namanao
  - type: text
    content: ka nanosotra diloilo fifaliana tamin’ny lohanao.
  '9':
  - type: text
    content: Mamerovero ny fitafianao rehetra
  - type: text
    content: 'fa manitra sahondra sy kanela ary '
  - type: text
    content: miora
  - type: text
    content: ;
  - type: text
    content: avy ao an-dapanao voaravaka ivoary
  - type: text
    content: dia andrenesanao mozika izay ankafizinao.
