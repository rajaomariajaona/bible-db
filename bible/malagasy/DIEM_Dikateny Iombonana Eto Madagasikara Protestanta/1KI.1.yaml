document_id: 1KI.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Te ho tonga mpanjaka i Adônià
  - type: text
    content: 'Efa antitra sy konka i Davida mpanjaka; ka na dia norakofan-damba aza izy, dia tsy nety nafana. '
  '10':
  - type: text
    content: 'Kanefa tsy mba nasainy i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy i Benaià sy ireo lehilahy kalaza ary i Salômôna rahalahiny.'
  '11':
  - type: text
    content: Niteny tamin’i Baty-Seba renin’i Salômôna
  - type: note
    content: Jereo 2 Sam 12.24.
  - type: text
    content: ' i Natàna ka nanao hoe:'
  - type: text
    content: '–Tsy efa renao va fa nanangan-tena ho mpanjaka i Adônià zanakalahin’i Hagita, nefa i Davida andriamanjaka tsy nahalala izany akory? '
  '12':
  - type: text
    content: 'Koa etsy hotoroako hevitra ianao mba hamonjena aina ny tenanao sy i Salômôna zanakao. '
  '13':
  - type: text
    content: 'Mankanesa any amin’i Davida mpanjaka ka lazao aminy hoe: «Moa tsy efa nianiana tamiko va ianao, ry andriamanjaka'
  - type: note
    content: Ny tantaran’ny fanjakan’i Davida dia tsy milaza ny toe-javatra nahatonga ny mpanjaka hanao fampanantenana toy izany tamin’i Salômôna.
  - type: text
    content: ', fa i Salômôna zanako lahy no hanjaka handimby anao ka hipetraka eo amin’ny sezafiandriananao. Koa nahoana no i Adônià indray no tonga mpanjaka?»'
  '14':
  - type: text
    content: 'Dia hoy ihany i Natàna:'
  - type: text
    content: –Ary raha ilay mbola eo am-piresahana amin’ny mpanjaka iny ianao, dia mba hiditra ao aminy koa aho hanamafy izay voalazanao.
  '15':
  - type: text
    content: 'Dia nankany amin’ny mpanjaka tao an’efitranony i Baty-Seba. Efa tena antitra ny mpanjaka; ary i Abisaga avy any Sonema no tao nanompo azy. '
  '16':
  - type: text
    content: 'Nandohalika niankohoka teo anatrehan’ny mpanjaka i Baty-Seba, ka nitenenan’ny mpanjaka hoe:'
  - type: text
    content: –Inona no ilainao?
  '17':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: '–Efa nianiana tamiko teo anatrehan’ny TOMPO Andriamanitrao ianao, ry andriamanjaka, fa i Salômôna zanako lahy no hanjaka handimby anao ka hipetraka eo amin’ny sezafiandriananao. '
  '18':
  - type: text
    content: 'Indro ankehitriny fa i Adônià no manjaka, nefa tsy mba fantatrao akory izany. '
  '19':
  - type: text
    content: 'Ary efa nanao fety be namonoana omby sy biby matavy ary ondry maro izy ka nanasa ny zanakalahinao rehetra sy i Abiatara mpisorona ary i Jôaba filohan’ny tafika, fa i Salômôna mpanomponao ihany no tsy mba nasainy. '
  '2':
  - type: text
    content: 'Hoy ny mpanompony taminy:'
  - type: text
    content: –Aoka ianao, ry andriamanjaka, hitadiavana tovovavy virijiny izay ho eo anatrehanao mandrakariva mba ho mpitaiza anao sy handry eo anilanao, ka dia hafana ianao.
  '20':
  - type: text
    content: 'Ankehitriny, ry andriamanjaka, ny vahoakan’i Israely rehetra dia miandrandra fatratra ny fanambarànao ampahibemaso ny anaran’izay hipetraka handimby anao eo amin’ny sezafiandriananao. '
  '21':
  - type: text
    content: Raha tsy izany, rehefa modimandry ka tsy eo intsony ianao, ry andriamanjaka, dia hatao toy ny olo-meloka ny tenako sy i Salômôna zanako.
  '22':
  - type: text
    content: 'Raha mbola teo am-piresahana tamin’ny mpanjaka ravehivavy, dia niditra i Natàna mpaminany. '
  '23':
  - type: text
    content: 'Ary nisy nilaza tamin’ny mpanjaka hoe: Indro ao i Natàna mpaminany. Dia nankeo anatrehan’ny mpanjaka i Natàna ka niankohoka nitehi-tany ho fanajana azy '
  '24':
  - type: text
    content: 'ary niteny hoe:'
  - type: text
    content: '–Ry andriamanjaka ô, angaha ianao efa nilaza fa i Adônià no hanjaka handimby anao ka hipetraka eo amin’ny sezafiandriananao? '
  '25':
  - type: text
    content: 'Fa androany izy dia nidina tao amin’ny vaton’i Zôheleta ka nanao fety be izay namonoana omby sy zanak’omby matavy ary ondry maro. Nasainy tao avokoa ny zanakalahinao rehetra sy ny filohan’ny tafika ary i Abiatara mpisorona. Indreo izy rehetra fa mihinana sy misotro eo anatrehany ka mihorakoraka hoe: «Ho ela velona anie i Adônià mpanjaka!». '
  '26':
  - type: text
    content: 'Nefa dia tsy mba nasainy na ny tenako na i Tsadôka mpisorona, na i Benaià zanakalahin’i Jôiadà, na i Salômôna zanakalahinao. '
  '27':
  - type: text
    content: Moa ve baiko avy taminao, ry andriamanjaka, no nahatonga izany? Fa izahay mpanomponao ireto tsy mba nampahafantarinao izay handimby anao eo amin’ny sezafiandriananao.
  - type: heading
    content: I Davida manendry an’i Salômôna mba handimby azy
  '28':
  - type: text
    content: 'Tamin’izay dia niteny i Davida mpanjaka ka nanao hoe:'
  - type: text
    content: –Antsoy hankatỳ i Baty-Seba.
  - type: text
    content: 'Dia nankeo anatrehan’ny mpanjaka izy ka nijoro teo anoloany. '
  '29':
  - type: text
    content: 'Ary ny mpanjaka nanao izao fianianana izao taminy:'
  - type: text
    content: '–Velona ny TOMPO, Izay nanafaka ahy tamin’ny fahoriana rehetra, '
  '3':
  - type: text
    content: Dia nitady izay tovovavy tsara tarehy teo amin’ny tanin’i Israely manontolo ireto mpanompon’i Davida; ary tao Sonema
  - type: note
    content: 'Sonema: tanàna iray any Galilea, 80 km avaratr’i Jerosalema. Jereo 2 Mp 4.8.'
  - type: text
    content: ' no nahitany an’i Abisaga izay nentiny tany amin’ny mpanjaka. '
  '30':
  - type: text
    content: 'koa mianiana aminao aho fa hotanterahiko anio izay efa nampanantenaiko taminao teo anatrehan’ny TOMPO Andriamanitr’i Israely hoe: «I Salômôna zanakao no hanjaka handimby ahy ka hipetraka eo amin’ny sezafiandrianako».'
  '31':
  - type: text
    content: 'Dia nandohalika i Baty-Seba ka niankohoka nitehi-tany ho fanajana ny mpanjaka ary nihiaka hoe:'
  - type: text
    content: –Ho ela velona mandrakizay anie ianao, ry Davida andriamanjaka!
  '32':
  - type: text
    content: 'Dia nampiantsoin’i Davida i Tsadôka mpisorona sy i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: ' ary i Benaià zanakalahin’i Jôiadà; rehefa tonga teo anatrehan’ny mpanjaka izy telo lahy ireo, '
  '33':
  - type: text
    content: 'dia nobaikoiny hoe:'
  - type: text
    content: –Vorio ny miaramila mpiambina ahy, dia ampitaingeno ny borikivaviko i Salômôna zanako, ka ento midina any Gihôna izy
  - type: note
    content: 'Gihôna: loharano ao amin’ny lohasaha Kidrôna, eo amin’ny havoana misy an’i Jerosalema, tehezana atsinanana. Iray amin’ny anarany ankehitriny dia «Fantsakan’ilay Virijiny»'
  - type: text
    content: '. '
  '34':
  - type: text
    content: Any no hanosotra azy ho mpanjakan’i Israely i Tsadôka mpisorona sy i Natàna mpaminany
  - type: note
    content: Jereo 1 Sam 10.1; 16.13.
  - type: text
    content: '; ary ianareo sisa kosa hitsoka ny anjomara sady hihiaka hoe: «Ho ela velona anie i Salômôna mpanjaka!» '
  '35':
  - type: text
    content: 'Avy eo ianareo dia hiakatra hanaraka azy ao an-tanàna; ary hiditra i Salômôna dia hipetraka eo amin’ny sezafiandrianako ka hanjaka hisolo ahy, satria izy no voatendriko ho filohan’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy i Joda.'
  '36':
  - type: text
    content: 'Dia hoy i Benaià zanakalahin’i Jôiadà namaly ny mpanjaka:'
  - type: text
    content: '–Amen! Izany no tenin’ny TOMPO Andriamanitrao, ry andriamanjaka. '
  '37':
  - type: text
    content: Toy ny efa nanombàn’ny TOMPO anao anie, ry andriamanjaka, no hanombàny koa an’i Salômôna; ary hataony be voninahitra noho ny anao anie ny sezafiandrianan’i Salômôna!
  - type: heading
    content: Hosorana ho mpanjaka i Salômôna
  - type: heading
    content: (Jereo 1 Tan 29.21-25)
  '38':
  - type: text
    content: 'Dia nidina nankany amin’i Salômôna i Tsadôka mpisorona sy i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: ' ary i Benaià zanakalahin’i Jôiadà, niaraka tamin’ny Keretita sy ny Peletita'
  - type: note
    content: 'Peletita: miaramila vahiny tsy fantatra loatra ny fiaviany, nefa ireo no mpiambina ny tenan’ny Davida miaraka tamin’ny Keretita (avy any Kreta).'
  - type: text
    content: ' mpiambina andriana ka nampitaingina azy ny borikivavin’i Davida, ary nitondra azy nankany Gihôna. '
  '39':
  - type: text
    content: 'Dia nalain’i Tsadôka mpisorona ny tandroka misy menaka tao amin’ny '
  - type: text
    content: Tranolay Fihaonana
  - type: text
    content: ' ka nandrarahany tamin’ny lohan’i Salômôna ho fanosorana azy ho mpanjaka. Notsofina tamin’izay ny anjomara, ary ny vahoaka rehetra teo samy nihiaka hoe: «Ho ela velona anie i Salômôna mpanjaka!» '
  '4':
  - type: text
    content: Tsara tarehy fatratra ilay tovovavy ka tonga mpitaiza sy mpanompon’ny mpanjaka; nefa tsy niray taminy akory ny mpanjaka.
  '40':
  - type: text
    content: Dia niakatra nanaraka azy tao an-tanàna ny vahoaka rehetra izay nitsoka sodina sady faly aoka izany, ka dia nila hitresaka ny tany noho ny horakorany.
  - type: heading
    content: Avelan’i Salômôna heloka i Adônià
  '41':
  - type: text
    content: 'Rehefa tapi-nihinana i Adônià sy ny nasainy rehetra dia samy nahare ny horakoraky ny olona; i Jôaba aza dia nandre ny feon’anjomara ka velom-panontaniana hoe:'
  - type: text
    content: –Fa inona izany kotaba be manerana ny tanàna izany?
  '42':
  - type: text
    content: 'Raha mbola niteny toy izany izy, dia indro niditra i Jônatàna zanakalahin’i Abiatara mpisorona; ka hoy i Adônià taminy:'
  - type: text
    content: –Mandrosoa fa olom-banona ianao, ka ho vaovao tsara no entinao.
  '43':
  - type: text
    content: 'Fa niteny i Jônatàna ka nanao tamin’i Adônià hoe:'
  - type: text
    content: '–Indrisy, tsy izany akory fa izao: I Davida andriamanjaka no efa nanangana an’i Salômôna ho mpanjaka handimby azy. '
  '44':
  - type: text
    content: 'Ary i Davida efa naniraka an’i Tsadôka mpisorona sy i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: ' ary i Benaià zanakalahin’i Jôiadà mbamin’ny Keretita sy ny Peletita mpiambina mba hiaraka amin’i Salômôna; ka ireo no nampitaingina azy ny borikivavin’ny mpanjaka. '
  '45':
  - type: text
    content: 'Ary i Tsadôka mpisorona sy i Natàna mpaminany nanosotra azy ho mpanjaka teo Gihôna. Avy eo ny olona rehetra dia niakatra tao an-tanàna naneho ny hafaliany, ka dia feno horakoraka ny tanàna. Izany izao kotaba be renareo izao. '
  '46':
  - type: text
    content: 'Manaraka izany koa dia efa tafapetraka amin’ny sezafiandrianana maha mpanjaka i Salômôna; '
  '47':
  - type: text
    content: 'ary tonga niarahaba an’i Davida andriamanjaka ireo minisitra ka nanao hoe: «Hataon’ilay Andriamanitrao ho tsara laza kokoa noho ianao anie i Salômôna, ary hataony ho be voninahitra noho ny sezafiandriananao anie ny sezafiandrianany». Dia niankohoka teo am-parafara ny mpanjaka, '
  '48':
  - type: text
    content: 'ka niteny hoe: «Hisaorana anie ny TOMPO Andriamanitr’i Israely, fa nanome izay ho mpandimby ahy eo amin’ny sezafiandrianako androany; ary mbola mihiratra ny masoko no mitranga izany».'
  '49':
  - type: text
    content: 'Raiki-tahotra avokoa ireo olona nasain’i Adônià ka nitsangana ary samy nandositra tamin’izay azony nitsoahana. '
  '5':
  - type: text
    content: Fa i Adônià zanakalahin’i Hagita kosa tamin’izay no nanandra-tena ho mpanjaka. Dia nanomana kalesy sy mpitaingin-tsoavaly
  - type: note
    content: 'Adônià: jereo 2 Sam 3.2-4 –mpitaingin-tsoavaly na soavaly.'
  - type: text
    content: 'ary lehilahy dimampolo ho mpihazakazaka eo anoloany izy. '
  '50':
  - type: text
    content: Natahotra an’i Salômôna koa i Adônià, dia nitsangana ka lasa namikitra tamin’ny tandroky ny alitara
  - type: note
    content: Izay nandeha nialokaloka teo akaikin’ny alitara* dia nangataka ny fiarovan’Andriamanitra azy tamin’izany fihetsika izany.
  - type: text
    content: '. '
  '51':
  - type: text
    content: 'Ary nisy nanambara izany tamin’i Salômôna ka nanao hoe:'
  - type: text
    content: '–Natahotra anao mafy i Adônià, ry Salômôna mpanjaka; ka indro izy fa mamikitra amin’ny tandroky ny alitara sady manao hoe: «Tsy hiala eto mihitsy aho raha tsy mianiana amiko i Salômôna mpanjaka fa tsy hamono ahy ho faty amin’ny sabatra».'
  '52':
  - type: text
    content: 'Fa hoy i Salômôna:'
  - type: text
    content: –Raha mitondra tena toy ny olom-banona izy, dia tsy hisy hikasika na dia singam-bolony iray aza; fa raha hita ho manan-keloka kosa izy, dia ho faty ihany.
  '53':
  - type: text
    content: 'Dia naniraka olona hampidina azy hiala teo amin’ny alitara i Salômôna. Ary tonga niankohoka teo anatrehan’i Salômôna mpanjaka i Adônià ka nitenenany hoe:'
  - type: text
    content: –Mahazo mody an-tranonao ianao!
  '6':
  - type: text
    content: 'Hatramin’izay niainany dia tsy mbola niteny mafy azy i Davida rainy na nanontany azy ny antony nanaovany izany. Izy moa dia lehilahy tsara tarehy tokoa, ary natera-dreniny nanarakaraka an’i Absalôma. '
  '7':
  - type: text
    content: Dia niresaka tamin’i Jôaba
  - type: note
    content: 'Jôaba: zana-drahalahy (jereo 1 Tan 2.13-16) sady jeneraly mpitari-tafik’i Davida (Jereo 2 Sam 8.16). –Abiatara: iray amin’ireo mpisorona roalahy mahatokin’i Davida, jereo 2 Sam 8.17. (Momba an’i Tsadôka, dia jereo and 8).'
  - type: text
    content: ' zanakalahin’i Tseroià sy tamin’i Abiatara mpisorona i Adônià, ka nahazo ny fanohanan’ireo. '
  '8':
  - type: text
    content: 'Fa i Tsadôka mpisorona sy i Benaià zanakalahin’i Jôiadà sy i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: ' mbamin’i Simehỳ sy i Rehỳ ary ireo kalazan’i Davida kosa tsy mba niandany tamin’i Adônià.'
  - type: heading
    content: I Natàna sy i Baty-Seba mpomba an’i Salômôna
  '9':
  - type: text
    content: Indray andro dia nikorana teo amin’ny vaton’i Zôheleta akaikin’i Haîna-Rôgela
  - type: note
    content: 'Haîna-Rôgela: na loharanon’ny mpanasa lamba, jereo 2 Sam 17.17 sy nta.'
  - type: text
    content: ' i Adônià ka namono ondry sy omby ary biby matavy. Nasainy avokoa ny rahalahiny rehetra zanaky ny mpanjaka ary ny lehilahy rehetra amin’i Joda izay mpanompon’ny mpanjaka. '
