document_id: 1KI.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Te ho tonga mpanjaka i Adônià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Efa antitra sy konka i Davida mpanjaka; ka na dia norakofan-damba aza izy, dia tsy nety nafana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy ny mpanompony taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ianao, ry andriamanjaka, hitadiavana tovovavy virijiny izay ho eo anatrehanao mandrakariva mba ho mpitaiza anao sy handry eo anilanao, ka dia hafana ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nitady izay tovovavy tsara tarehy teo amin’ny tanin’i Israely manontolo ireto mpanompon’i Davida; ary tao Sonema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sonema: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna iray any Galilea, 80 km avaratr’i Jerosalema. Jereo 2 Mp 4.8.
    marker-yv: yv-n
  - type: text
    text: ' no nahitany an’i Abisaga izay nentiny tany amin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsara tarehy fatratra ilay tovovavy ka tonga mpitaiza sy mpanompon’ny mpanjaka; nefa tsy niray taminy akory ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa i Adônià zanakalahin’i Hagita kosa tamin’izay no nanandra-tena ho mpanjaka. Dia nanomana kalesy sy mpitaingin-tsoavaly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Adônià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 2 Sam 3.2-4 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –mpitaingin-tsoavaly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: soavaly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'ary lehilahy dimampolo ho mpihazakazaka eo anoloany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hatramin’izay niainany dia tsy mbola niteny mafy azy i Davida rainy na nanontany azy ny antony nanaovany izany. Izy moa dia lehilahy tsara tarehy tokoa, ary natera-dreniny nanarakaraka an’i Absalôma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia niresaka tamin’i Jôaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jôaba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zana-drahalahy (jereo 1 Tan 2.13-16) sady jeneraly mpitari-tafik’i Davida (Jereo 2 Sam 8.16). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Abiatara:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' iray amin’ireo mpisorona roalahy mahatokin’i Davida, jereo 2 Sam 8.17. (Momba an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tsadôka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dia jereo and 8).'
    marker-yv: yv-n
  - type: text
    text: ' zanakalahin’i Tseroià sy tamin’i Abiatara mpisorona i Adônià, ka nahazo ny fanohanan’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa i Tsadôka mpisorona sy i Benaià zanakalahin’i Jôiadà sy i Natàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' mbamin’i Simehỳ sy i Rehỳ ary ireo kalazan’i Davida kosa tsy mba niandany tamin’i Adônià.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Natàna sy i Baty-Seba mpomba an’i Salômôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Indray andro dia nikorana teo amin’ny vaton’i Zôheleta akaikin’i Haîna-Rôgela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Haîna-Rôgela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: loharanon’ny mpanasa lamba,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 2 Sam 17.17 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' i Adônià ka namono ondry sy omby ary biby matavy. Nasainy avokoa ny rahalahiny rehetra zanaky ny mpanjaka ary ny lehilahy rehetra amin’i Joda izay mpanompon’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Kanefa tsy mba nasainy i Natàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sy i Benaià sy ireo lehilahy kalaza ary i Salômôna rahalahiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Niteny tamin’i Baty-Seba renin’i Salômôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 12.24.
    marker-yv: yv-n
  - type: text
    text: ' i Natàna ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy efa renao va fa nanangan-tena ho mpanjaka i Adônià zanakalahin’i Hagita, nefa i Davida andriamanjaka tsy nahalala izany akory? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa etsy hotoroako hevitra ianao mba hamonjena aina ny tenanao sy i Salômôna zanakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mankanesa any amin’i Davida mpanjaka ka lazao aminy hoe: «Moa tsy efa nianiana tamiko va ianao, ry andriamanjaka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tantaran’ny fanjakan’i Davida dia tsy milaza ny toe-javatra nahatonga ny mpanjaka hanao fampanantenana toy izany tamin’i Salômôna.
    marker-yv: yv-n
  - type: text
    text: ', fa i Salômôna zanako lahy no hanjaka handimby anao ka hipetraka eo amin’ny sezafiandriananao. Koa nahoana no i Adônià indray no tonga mpanjaka?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy ihany i Natàna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ary raha ilay mbola eo am-piresahana amin’ny mpanjaka iny ianao, dia mba hiditra ao aminy koa aho hanamafy izay voalazanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nankany amin’ny mpanjaka tao an’efitranony i Baty-Seba. Efa tena antitra ny mpanjaka; ary i Abisaga avy any Sonema no tao nanompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nandohalika niankohoka teo anatrehan’ny mpanjaka i Baty-Seba, ka nitenenan’ny mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no ilainao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa nianiana tamiko teo anatrehan’ny TOMPO Andriamanitrao ianao, ry andriamanjaka, fa i Salômôna zanako lahy no hanjaka handimby anao ka hipetraka eo amin’ny sezafiandriananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indro ankehitriny fa i Adônià no manjaka, nefa tsy mba fantatrao akory izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary efa nanao fety be namonoana omby sy biby matavy ary ondry maro izy ka nanasa ny zanakalahinao rehetra sy i Abiatara mpisorona ary i Jôaba filohan’ny tafika, fa i Salômôna mpanomponao ihany no tsy mba nasainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ankehitriny, ry andriamanjaka, ny vahoakan’i Israely rehetra dia miandrandra fatratra ny fanambarànao ampahibemaso ny anaran’izay hipetraka handimby anao eo amin’ny sezafiandriananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Raha tsy izany, rehefa modimandry ka tsy eo intsony ianao, ry andriamanjaka, dia hatao toy ny olo-meloka ny tenako sy i Salômôna zanako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha mbola teo am-piresahana tamin’ny mpanjaka ravehivavy, dia niditra i Natàna mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nisy nilaza tamin’ny mpanjaka hoe: Indro ao i Natàna mpaminany. Dia nankeo anatrehan’ny mpanjaka i Natàna ka niankohoka nitehi-tany ho fanajana azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry andriamanjaka ô, angaha ianao efa nilaza fa i Adônià no hanjaka handimby anao ka hipetraka eo amin’ny sezafiandriananao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa androany izy dia nidina tao amin’ny vaton’i Zôheleta ka nanao fety be izay namonoana omby sy zanak’omby matavy ary ondry maro. Nasainy tao avokoa ny zanakalahinao rehetra sy ny filohan’ny tafika ary i Abiatara mpisorona. Indreo izy rehetra fa mihinana sy misotro eo anatrehany ka mihorakoraka hoe: «Ho ela velona anie i Adônià mpanjaka!». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nefa dia tsy mba nasainy na ny tenako na i Tsadôka mpisorona, na i Benaià zanakalahin’i Jôiadà, na i Salômôna zanakalahinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Moa ve baiko avy taminao, ry andriamanjaka, no nahatonga izany? Fa izahay mpanomponao ireto tsy mba nampahafantarinao izay handimby anao eo amin’ny sezafiandriananao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida manendry an’i Salômôna mba handimby azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tamin’izay dia niteny i Davida mpanjaka ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Antsoy hankatỳ i Baty-Seba.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nankeo anatrehan’ny mpanjaka izy ka nijoro teo anoloany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny mpanjaka nanao izao fianianana izao taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Velona ny TOMPO, Izay nanafaka ahy tamin’ny fahoriana rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'koa mianiana aminao aho fa hotanterahiko anio izay efa nampanantenaiko taminao teo anatrehan’ny TOMPO Andriamanitr’i Israely hoe: «I Salômôna zanakao no hanjaka handimby ahy ka hipetraka eo amin’ny sezafiandrianako».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nandohalika i Baty-Seba ka niankohoka nitehi-tany ho fanajana ny mpanjaka ary nihiaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho ela velona mandrakizay anie ianao, ry Davida andriamanjaka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nampiantsoin’i Davida i Tsadôka mpisorona sy i Natàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' ary i Benaià zanakalahin’i Jôiadà; rehefa tonga teo anatrehan’ny mpanjaka izy telo lahy ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'dia nobaikoiny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vorio ny miaramila mpiambina ahy, dia ampitaingeno ny borikivaviko i Salômôna zanako, ka ento midina any Gihôna izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gihôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: loharano ao amin’ny lohasaha Kidrôna, eo amin’ny havoana misy an’i Jerosalema, tehezana atsinanana. Iray amin’ny anarany ankehitriny dia «Fantsakan’ilay Virijiny»
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Any no hanosotra azy ho mpanjakan’i Israely i Tsadôka mpisorona sy i Natàna mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Sam 10.1; 16.13.
    marker-yv: yv-n
  - type: text
    text: '; ary ianareo sisa kosa hitsoka ny anjomara sady hihiaka hoe: «Ho ela velona anie i Salômôna mpanjaka!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Avy eo ianareo dia hiakatra hanaraka azy ao an-tanàna; ary hiditra i Salômôna dia hipetraka eo amin’ny sezafiandrianako ka hanjaka hisolo ahy, satria izy no voatendriko ho filohan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy i Joda.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia hoy i Benaià zanakalahin’i Jôiadà namaly ny mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Amen! Izany no tenin’ny TOMPO Andriamanitrao, ry andriamanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Toy ny efa nanombàn’ny TOMPO anao anie, ry andriamanjaka, no hanombàny koa an’i Salômôna; ary hataony be voninahitra noho ny anao anie ny sezafiandrianan’i Salômôna!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hosorana ho mpanjaka i Salômôna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 29.21-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia nidina nankany amin’i Salômôna i Tsadôka mpisorona sy i Natàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' ary i Benaià zanakalahin’i Jôiadà, niaraka tamin’ny Keretita sy ny Peletita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.38 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Peletita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'miaramila vahiny tsy fantatra loatra ny fiaviany, nefa ireo no mpiambina ny tenan’ny Davida miaraka tamin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Keretita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (avy any Kreta).'
    marker-yv: yv-n
  - type: text
    text: ' mpiambina andriana ka nampitaingina azy ny borikivavin’i Davida, ary nitondra azy nankany Gihôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nalain’i Tsadôka mpisorona ny tandroka misy menaka tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay Fihaonana
  - type: text
    text: ' ka nandrarahany tamin’ny lohan’i Salômôna ho fanosorana azy ho mpanjaka. Notsofina tamin’izay ny anjomara, ary ny vahoaka rehetra teo samy nihiaka hoe: «Ho ela velona anie i Salômôna mpanjaka!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia niakatra nanaraka azy tao an-tanàna ny vahoaka rehetra izay nitsoka sodina sady faly aoka izany, ka dia nila hitresaka ny tany noho ny horakorany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avelan’i Salômôna heloka i Adônià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Rehefa tapi-nihinana i Adônià sy ny nasainy rehetra dia samy nahare ny horakoraky ny olona; i Jôaba aza dia nandre ny feon’anjomara ka velom-panontaniana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona izany kotaba be manerana ny tanàna izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Raha mbola niteny toy izany izy, dia indro niditra i Jônatàna zanakalahin’i Abiatara mpisorona; ka hoy i Adônià taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandrosoa fa olom-banona ianao, ka ho vaovao tsara no entinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa niteny i Jônatàna ka nanao tamin’i Adônià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indrisy, tsy izany akory fa izao: I Davida andriamanjaka no efa nanangana an’i Salômôna ho mpanjaka handimby azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary i Davida efa naniraka an’i Tsadôka mpisorona sy i Natàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' ary i Benaià zanakalahin’i Jôiadà mbamin’ny Keretita sy ny Peletita mpiambina mba hiaraka amin’i Salômôna; ka ireo no nampitaingina azy ny borikivavin’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary i Tsadôka mpisorona sy i Natàna mpaminany nanosotra azy ho mpanjaka teo Gihôna. Avy eo ny olona rehetra dia niakatra tao an-tanàna naneho ny hafaliany, ka dia feno horakoraka ny tanàna. Izany izao kotaba be renareo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Manaraka izany koa dia efa tafapetraka amin’ny sezafiandrianana maha mpanjaka i Salômôna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'ary tonga niarahaba an’i Davida andriamanjaka ireo minisitra ka nanao hoe: «Hataon’ilay Andriamanitrao ho tsara laza kokoa noho ianao anie i Salômôna, ary hataony ho be voninahitra noho ny sezafiandriananao anie ny sezafiandrianany». Dia niankohoka teo am-parafara ny mpanjaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ka niteny hoe: «Hisaorana anie ny TOMPO Andriamanitr’i Israely, fa nanome izay ho mpandimby ahy eo amin’ny sezafiandrianako androany; ary mbola mihiratra ny masoko no mitranga izany».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Raiki-tahotra avokoa ireo olona nasain’i Adônià ka nitsangana ary samy nandositra tamin’izay azony nitsoahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Natahotra an’i Salômôna koa i Adônià, dia nitsangana ka lasa namikitra tamin’ny tandroky ny alitara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izay nandeha nialokaloka teo akaikin’ny alitara* dia nangataka ny fiarovan’Andriamanitra azy tamin’izany fihetsika izany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary nisy nanambara izany tamin’i Salômôna ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Natahotra anao mafy i Adônià, ry Salômôna mpanjaka; ka indro izy fa mamikitra amin’ny tandroky ny alitara sady manao hoe: «Tsy hiala eto mihitsy aho raha tsy mianiana amiko i Salômôna mpanjaka fa tsy hamono ahy ho faty amin’ny sabatra».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Fa hoy i Salômôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha mitondra tena toy ny olom-banona izy, dia tsy hisy hikasika na dia singam-bolony iray aza; fa raha hita ho manan-keloka kosa izy, dia ho faty ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Dia naniraka olona hampidina azy hiala teo amin’ny alitara i Salômôna. Ary tonga niankohoka teo anatrehan’i Salômôna mpanjaka i Adônià ka nitenenany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mahazo mody an-tranonao ianao!
