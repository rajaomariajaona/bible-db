document_id: REV.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo biby roa mpanompon’ny dràgona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nahita biby anankiray nipoitra avy tany an-dranomasina aho; nanana tandroka folo sy loha fito izy; nisy satroboninahitra iray avy isaky ny tandrony; ary nisy anarana iray manevateva an’Andriamanitra isaky ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ilay biby izay hitako dia sahala amin’ny leoparda; saingy tahaka ny tongotr’orsa ny tongony, ary tahaka ny vavan’ny liona ny vavany. Nomen’ilay dràgona azy ny heriny sy ny sezafiandrianany ary fahefana lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 1-2:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Dan 7.3-6. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'dràgona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 12.3 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny anankiray tamin’ireo lohany fito dia toa voan’ny ratra ka nila ho faty, nefa sitrana ihany ilay ratra saika nahafaty azy; ary gaga ny tany tontolo ka nanaraka ilay biby. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nivavaka teo anoloan’ilay dràgona ny olona; satria izy no nanome fahefana ho an’ilay biby; ary nivavaka teo anoloan’ilay biby koa ireo ka nanao hoe: «Iza no tahaka ilay biby, ary iza no afa-miady aminy?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nomena vava midaondaona sy manevateva an’Andriamanitra ilay biby, sady nomena fahefana mba hiasa mandritra ny 42 volana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nanoka-bava izy hanevateva an’Andriamanitra, dia ny hanevateva ny anarany sy ny toerana fonenany mbamin’ireo mponina any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Navela hiady amin’ireo olona anisan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' sy handresy azy koa ilay biby'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 5-7:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Dan 7.8, 25; 11.36; 7.21.
    marker-yv: yv-n
  - type: text
    text: ', ary dia nomena fahefana tamin’ny fokom-pirenena sy ny vahoaka mbamin’ny olona samy hafa fiteny sy ny firenena rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hivavaka eo anoloany daholo ny mponina ambonin’ny tany, izany hoe ny olona tsy voasoratra anarana ao amin’ny horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay. Io horonamboky io dia hatramin’ny fiandohan’izao tontolo izao no eo am-pelatanan’ilay Zanakondry Izay efa voavono ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Izay manan-tsofina, aoka hihaino! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha misy natao ho amin’ny fahababoana, dia hankany amin’ny fahababoana izy; raha misy natao ho fatin’ny sabatra, dia ho fatin’ny sabatra izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Raha misy natao ho... sabatra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raha misy mamabo, dia mba hobaboina kosa izy; raha misy mamono amin’ny sabatra, dia tsy maintsy hovonoina amin’ny sabatra kosa izy.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –Ampit Jer 15.2; 43.11.'
    marker-yv: yv-n
  - type: text
    text: . Amin’izany no ilana ny faharetana sy ny finoana eo amin’ny vahoakan’Andriamanitra.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nahita biby anankiray hafa nipoitra avy tamin’ny tany aho: nanana tandroka roa tahaka ny an’ny ondrikely izy sady nierona tahaka ny dràgona. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ampiasainy avokoa ny fahefàn’ilay biby voalohany ka asehony eo anatrehany; ary ny tany mbamin’izay mponina ao aminy dia asainy mivavaka eo anoloan’ilay biby voalohany, izay efa sitrana tamin’ilay ratra saiky nahafaty azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Manao zava-dehibe mampitolagaga ity biby faharoa ity, ka hatramin’ny mampidina afo avy any an-danitra ho etỳ an-tany eo imason’ny olona aza dia vitany; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary mamitaka ny mponina ambonin’ny tany izy amin’ny zava-mampitolagaga nomena hataony eo anatrehan’ilay biby voalohany. Milaza amin’ny mponina ambonin’ny tany koa ny biby faharoa mba hanao sary ho fanajana ilay biby voalohany, izay voaratran’ny sabatra nefa velona ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia navela hanisy aina ny sarin’ilay biby voalohany izy, mba hahatonga ny sariny hiteny ka hampamono izay rehetra tsy mivavaka eo anoloany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny olona rehetra, na kely na lehibe, na manankarena na mahantra, na mpanompo na tsy mpanompo, dia noteren’ny biby faharoa handray marika eo amin’ny tanany ankavanana na eo amin’ny handriny; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ka tsy misy mahazo mividy na mivarotra, afa-tsy izay manana ny marika, dia ny anaran’ilay biby voalohany na ny isa mifandraika amin’ny anarany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mba hahazoana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: isa mifandraika amin’ny anarana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia atambatra ny tarehimarika fonosin’ireo litera tsirairay mamorona ny anarana. Toa manondro ny amperôra Nerôna ny isa 666 (jereo and 18).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Eto no ilàna fahendrena! Izay manan-tsaina, aoka hanombantombana ny isa mifandraika amin’ilay biby, fa isa milaza olona izany; ary 666 no isa mifandraika aminy.
