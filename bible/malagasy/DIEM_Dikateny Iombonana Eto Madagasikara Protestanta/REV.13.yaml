document_id: REV.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo biby roa mpanompon’ny dràgona
  - type: text
    content: 'Dia nahita biby anankiray nipoitra avy tany an-dranomasina aho; nanana tandroka folo sy loha fito izy; nisy satroboninahitra iray avy isaky ny tandrony; ary nisy anarana iray manevateva an’Andriamanitra isaky ny lohany. '
  '10':
  - type: text
    content: Raha misy natao ho amin’ny fahababoana, dia hankany amin’ny fahababoana izy; raha misy natao ho fatin’ny sabatra, dia ho fatin’ny sabatra izy
  - type: note
    content: 'Raha misy natao ho... sabatra: misy stf sasany ahitana hoe raha misy mamabo, dia mba hobaboina kosa izy; raha misy mamono amin’ny sabatra, dia tsy maintsy hovonoina amin’ny sabatra kosa izy. –Ampit Jer 15.2; 43.11.'
  - type: text
    content: . Amin’izany no ilana ny faharetana sy ny finoana eo amin’ny vahoakan’Andriamanitra.»
  '11':
  - type: text
    content: 'Dia nahita biby anankiray hafa nipoitra avy tamin’ny tany aho: nanana tandroka roa tahaka ny an’ny ondrikely izy sady nierona tahaka ny dràgona. '
  '12':
  - type: text
    content: 'Ampiasainy avokoa ny fahefàn’ilay biby voalohany ka asehony eo anatrehany; ary ny tany mbamin’izay mponina ao aminy dia asainy mivavaka eo anoloan’ilay biby voalohany, izay efa sitrana tamin’ilay ratra saiky nahafaty azy. '
  '13':
  - type: text
    content: 'Manao zava-dehibe mampitolagaga ity biby faharoa ity, ka hatramin’ny mampidina afo avy any an-danitra ho etỳ an-tany eo imason’ny olona aza dia vitany; '
  '14':
  - type: text
    content: 'ary mamitaka ny mponina ambonin’ny tany izy amin’ny zava-mampitolagaga nomena hataony eo anatrehan’ilay biby voalohany. Milaza amin’ny mponina ambonin’ny tany koa ny biby faharoa mba hanao sary ho fanajana ilay biby voalohany, izay voaratran’ny sabatra nefa velona ihany. '
  '15':
  - type: text
    content: 'Dia navela hanisy aina ny sarin’ilay biby voalohany izy, mba hahatonga ny sariny hiteny ka hampamono izay rehetra tsy mivavaka eo anoloany. '
  '16':
  - type: text
    content: 'Ary ny olona rehetra, na kely na lehibe, na manankarena na mahantra, na mpanompo na tsy mpanompo, dia noteren’ny biby faharoa handray marika eo amin’ny tanany ankavanana na eo amin’ny handriny; '
  '17':
  - type: text
    content: ka tsy misy mahazo mividy na mivarotra, afa-tsy izay manana ny marika, dia ny anaran’ilay biby voalohany na ny isa mifandraika amin’ny anarany
  - type: note
    content: Mba hahazoana isa mifandraika amin’ny anarana dia atambatra ny tarehimarika fonosin’ireo litera tsirairay mamorona ny anarana. Toa manondro ny amperôra Nerôna ny isa 666 (jereo and 18).
  - type: text
    content: .
  '18':
  - type: text
    content: Eto no ilàna fahendrena! Izay manan-tsaina, aoka hanombantombana ny isa mifandraika amin’ilay biby, fa isa milaza olona izany; ary 666 no isa mifandraika aminy.
  '2':
  - type: text
    content: Ilay biby izay hitako dia sahala amin’ny leoparda; saingy tahaka ny tongotr’orsa ny tongony, ary tahaka ny vavan’ny liona ny vavany. Nomen’ilay dràgona azy ny heriny sy ny sezafiandrianany ary fahefana lehibe
  - type: note
    content: 'And 1-2: ampit Dan 7.3-6. –dràgona: jereo 12.3 sy nta.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ny anankiray tamin’ireo lohany fito dia toa voan’ny ratra ka nila ho faty, nefa sitrana ihany ilay ratra saika nahafaty azy; ary gaga ny tany tontolo ka nanaraka ilay biby. '
  '4':
  - type: text
    content: 'Dia nivavaka teo anoloan’ilay dràgona ny olona; satria izy no nanome fahefana ho an’ilay biby; ary nivavaka teo anoloan’ilay biby koa ireo ka nanao hoe: «Iza no tahaka ilay biby, ary iza no afa-miady aminy?»'
  '5':
  - type: text
    content: 'Dia nomena vava midaondaona sy manevateva an’Andriamanitra ilay biby, sady nomena fahefana mba hiasa mandritra ny 42 volana. '
  '6':
  - type: text
    content: 'Ary nanoka-bava izy hanevateva an’Andriamanitra, dia ny hanevateva ny anarany sy ny toerana fonenany mbamin’ireo mponina any an-danitra. '
  '7':
  - type: text
    content: 'Navela hiady amin’ireo olona anisan’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' sy handresy azy koa ilay biby'
  - type: note
    content: 'And 5-7: ampit Dan 7.8, 25; 11.36; 7.21.'
  - type: text
    content: ', ary dia nomena fahefana tamin’ny fokom-pirenena sy ny vahoaka mbamin’ny olona samy hafa fiteny sy ny firenena rehetra. '
  '8':
  - type: text
    content: Hivavaka eo anoloany daholo ny mponina ambonin’ny tany, izany hoe ny olona tsy voasoratra anarana ao amin’ny horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay. Io horonamboky io dia hatramin’ny fiandohan’izao tontolo izao no eo am-pelatanan’ilay Zanakondry Izay efa voavono ho faty.
  '9':
  - type: text
    content: '«Izay manan-tsofina, aoka hihaino! '
