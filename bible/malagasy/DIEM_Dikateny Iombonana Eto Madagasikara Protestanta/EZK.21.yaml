    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ankehitriny ampidiro amin’ny fitoerany ny sabatrareo; fa eo amin’ny toerana izay namoronako anareo sy nahaterahanareo no hanafaizako anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Hatosako aminareo ny fahavinirako ary hampihariko aminareo ny fahatezerako mirehitra, ka hatolotro eo an-tanan’ny olon-doza mpamorona fandravana ianareo. '
