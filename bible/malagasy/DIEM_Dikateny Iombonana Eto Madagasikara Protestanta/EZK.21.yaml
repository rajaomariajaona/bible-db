      children:
      - type: text
        text: ’i Israely voaresaka eto dia i Tsedekià. Izay nanjo azy dia jereo 2 Mp 25.4-7.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Satria izao no lazain’ny Tompo ANDRIANANAHARY: ‹Halaina aminao ny marika maha mpanjaka anao, ary hoesorina ny satro-boninahitrao. Fa nivadika ny toe-javatra: ny olona ambany no hasandratra, ary ny olona ambony no haetry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Faharavana, faharavana, faharavana: hataoko toy izany i Jerosalema. Ho potika tanteraka ny tanàna, saingy tsy alohan’ny hahatongavan’ilay homeko fahefana hanafay azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fanatanterahana ny famaizana dia nankinina tamin’i Nebokadnetsara, fitaovan’Andriamanitra hanafay an’i Israely, jereo 23.23-24.
    marker-yv: yv-n
  - type: text
    text: ›. »
- type: usfm
  marker: s1
