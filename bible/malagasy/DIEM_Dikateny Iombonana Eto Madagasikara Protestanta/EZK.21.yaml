    - type: text
      text: '23'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '«Ry ilay taranak’olombelona, sorito ny lalana roa izay hahazoan’ny mpanjakan’i Babilôna ho tonga ombàn-tsabatra. Ataovy samy miainga amin’ny tany iray ihany ireo lalana roa ireo. Isaky ny vavalalana dia mariho ny tanàna izay halehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny iray amin’ireo lalana ireo dia hitondra ny tafika babilônianina ho any Rabà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rabà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia renivohitry ny Hamônita, ao atsinanan’i Jôrdàna. Izy no tanàna Hamàna ankehitriny (renivohitr’i Jôrdania).'
    marker-yv: yv-n
  - type: text
    text: ', tanànan’ny Hamônita; fa ny iray kosa ho any Jerosalema, tanànamimanda any Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hijanona eo am-bavalalana iaingan’ireo lalana roa ireo aloha ny mpanjakan’i Babilôna mba hanao sikidy. Hahontsankontsany ny zana-tsipîka, hanontaniany ny sampy ary hohadininy ny atin-kenam-biby
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tanisain’i Ezekiela eto ireo fomba fanao amin’ny sikidy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny zana-tsipîka manondro an’i Jerosalema dia nianjera teo an-kavanany. Koa hanandra-peo hanao akoran’ady izy ary hampametraka ny kanontabe hamelezana ny vavahadin-tanàna, hampanangana ny tovon-tany ary hampandavaka ireo hady fanafihana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hihevitra ny olona ao Jerosalema fa tsy misy dikany ny sikidy satria voaaron’ny fianianana natao izy. Nefa ny mpanjakan’i Babilôna dia hampahatsiaro azy ny fivadihany ka mampandre fa hoentina ho babo ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Mampahatsiaro Ahy tsy tapaka ny helokareo ianareo amin’ireo fikomianareo an-karihary; ary ny asa rehetra nataonareo no mampiseho ny fahotanareo. Noho ianareo nanao izay hahatsiarovana anareo toy izany, dia hosamborin’ny fahavalo tokoa ianareo!›'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: «Ary ianao, ry printsy filohan’i Israely sady olon-dratsy mpamadika, tonga ny andro hifaranan’ny fanaovanao heloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
