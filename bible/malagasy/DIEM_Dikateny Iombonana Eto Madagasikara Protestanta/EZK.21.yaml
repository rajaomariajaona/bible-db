  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Asaivo mihaino ny tenin’ny TOMPO izy, satria izao no lazain’ny Tompo ANDRIANANAHARY aminy: «Indro Aho handrehitra afo izay handevona ny hazonao rehetra na ireo mirobona maitso na ireo efa maina. Tsy hisy afaka hamono ny lelafo midedadeda fa hihanaka avy any atsimo ka hatrany avaratra izany, ka ho may avokoa ny tarehin’ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia ho hitan’ny olona rehetra fa Izaho TOMPO no nandrehitra io afo io ka tsy misy afaka hamono azy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa namaly Azy aho hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indrisy, ry Tompo ANDRIANANAHARY ô, efa mimenomenona amiko ny olona ka manao hoe: «Tsy miteny afa-tsy ankamantatra izy!»'
- type: usfm
  marker: p
