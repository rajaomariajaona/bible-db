document_id: EZK.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vaovao ratsy ho an’i Israely
  - type: text
    content: Ary nisy tenin’ny TOMPO tamiko nanao hoe
  - type: note
    content: Amin’ny dkt sasany ny hoe 21.1-5 dia voalahatra hoe 20.45-49.
  - type: text
    content: ':'
  '10':
  - type: text
    content: 'Dia hoeken’ny olona rehetra amin’izay fa Izaho TOMPO no efa nanatsoaka ny sabatro tamin’ny fitoerany ka tsy hampiditra azy ao intsony.» '
  '11':
  - type: text
    content: 'Ary ianao, ry ilay taranak’olombelona, mitolokoa noho ny havesatry ny fahadisoam-panantenana; eny, mitolokoa eo imason’izy rehetra. '
  '12':
  - type: text
    content: 'Dia hanontaniana anao ny antony itolokoanao ka hovalianao hoe: «Vaovao ratsy no reko ary ho tonga izany. Ho kivy fo sy hiraviravy tanana ny besinimaro ary ho ketra-panahy sy halemy lohalika. Indro tonga izany ary tanteraka, hoy ny teny hentitra avy amiko Tompo ANDRIANANAHARY.»'
  - type: heading
    content: Ny amin’ilay sabatra fandringanana
  '13':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '14':
  - type: text
    content: «Ry ilay taranak’olombelona, ijoroy ny maha-
  - type: text
    content: mpaminany
  - type: text
    content: ' anao ka ambarao amin’ny olona fa izao no lazain’ny TOMPO:'
  - type: text
    content: ‹Indro misy sabatra,
  - type: text
    content: dia sabatra voaranitra sady mangirana!
  '15':
  - type: text
    content: Noranitina handringanana olona izy
  - type: text
    content: natao mangirana hanjelanjelatra
  - type: note
    content: Amin’ny faran’ity and 15 ity dia misy andalana tsy azo ny heviny ka navela; io andalana io dia midika ara-bakiteny hoe sa hiravoravo isika fa ny tehim-panjakan-janako dia manao tsinontsinona ny hazo rehetra?
  - type: text
    content: .
  '16':
  - type: text
    content: Nomeko hatao mangirana izy
  - type: text
    content: mba ho azo arangaranga;
  - type: text
    content: noranitina sy natao mangirana izy
  - type: text
    content: mba hatolotra ny mpandringana.
  '17':
  - type: text
    content: Miantsoa vonjy ianao ary midradradradrà,
  - type: text
    content: ry ilay taranak’olombelona,
  - type: text
    content: satria izany sabatra izany
  - type: text
    content: dia mihatra amin’ny vahoakako;
  - type: text
    content: iharan’io sabatra io koa
  - type: text
    content: ny mpitondra rehetra eto Israely,
  - type: text
    content: ka ho ringan-tsabatra miaraka amin’ny vahoakako ireo.
  - type: text
    content: Koa aoka ianao handondon-tratra
  '18':
  - type: text
    content: noho ny alahelo aterak’izao fitsapana izao
  - type: note
    content: Aorian’ny hoe fitsapana izao, dia misy andalana tsy azo ny heviny ka navela; io andalana io dia midika ara-bakiteny hoe Ary inona no hiseho raha tsy nisy ny tehim-panjakana manao tsinontsinona? izay toa mifandray amin’ny faran’ny and 15 (jereo ny naoty momba io and io).
  - type: text
    content: .
  - type: text
    content: Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '19':
  - type: text
    content: Ankehitriny, ijoroy ny maha-mpaminany anao,
  - type: text
    content: ry ilay taranak’olombelona,
  - type: text
    content: ka mitehafa tanana ho fanaingana
  - type: note
    content: Ny teha-tanana ataon’ny mpaminany Ezekiela no toa famantarana manainga an’i Nebokadnetsara hanomboka ny fandravana sy fandringanana.
  - type: text
    content: ':'
  - type: text
    content: Ho indroa na intelo heny anie
  - type: text
    content: no hahaloza ny velin-tsabatra,
  - type: text
    content: dia ilay sabatry ny fandringanana goavana
  - type: text
    content: izay manemitra hatraiza hatraiza.
  '2':
  - type: text
    content: –Ry ilay taranak’olombelona, atodiho mianatsimo ny fijerinao, ka mitenena manandrify ny atsimo ary ijoroy ny maha-mpaminany anao mba hamelezana ny alan’i Negeba
  - type: note
    content: Ny alan’i Negeba dia ao atsimon’i Joda, fa eto izy dia toa manondro an’i Joda manontolo.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Mba hampivalaketraka ny fon’ny olona
  - type: text
    content: sy hampivembena ny besinimaro
  - type: text
    content: dia napetrako isam-bavahady
  - type: text
    content: ny sabatra fandringanana,
  - type: text
    content: ka manjelanjelatra toy ny tselatra
  - type: text
    content: sady efa voavoatra hamono.
  '21':
  - type: text
    content: Ry sabatra maranitra ô, kapao
  - type: text
    content: mihodin-kavanana sy mihodin-kavia,
  - type: text
    content: na aiza na aiza voatendry hamelezanao.
  '22':
  - type: text
    content: Izaho koa dia hiteha-tanana ho fanaingana
  - type: text
    content: ary dia hanampatra ny fahatezerako.
  - type: text
    content: Izaho TOMPO no manambara izany›. »
  - type: heading
    content: Fanafihana an’i Jerosalema
  '23':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '24':
  - type: text
    content: '«Ry ilay taranak’olombelona, sorito ny lalana roa izay hahazoan’ny mpanjakan’i Babilôna ho tonga ombàn-tsabatra. Ataovy samy miainga amin’ny tany iray ihany ireo lalana roa ireo. Isaky ny vavalalana dia mariho ny tanàna izay halehany. '
  '25':
  - type: text
    content: Ny iray amin’ireo lalana ireo dia hitondra ny tafika babilônianina ho any Rabà
  - type: note
    content: I Rabà dia renivohitry ny Hamônita, ao atsinanan’i Jôrdàna. Izy no tanàna Hamàna ankehitriny (renivohitr’i Jôrdania).
  - type: text
    content: ', tanànan’ny Hamônita; fa ny iray kosa ho any Jerosalema, tanànamimanda any Joda. '
  '26':
  - type: text
    content: Hijanona eo am-bavalalana iaingan’ireo lalana roa ireo aloha ny mpanjakan’i Babilôna mba hanao sikidy. Hahontsankontsany ny zana-tsipîka, hanontaniany ny sampy ary hohadininy ny atin-kenam-biby
  - type: note
    content: Tanisain’i Ezekiela eto ireo fomba fanao amin’ny sikidy.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Ny zana-tsipîka manondro an’i Jerosalema dia nianjera teo an-kavanany. Koa hanandra-peo hanao akoran’ady izy ary hampametraka ny kanontabe hamelezana ny vavahadin-tanàna, hampanangana ny tovon-tany ary hampandavaka ireo hady fanafihana. '
  '28':
  - type: text
    content: 'Hihevitra ny olona ao Jerosalema fa tsy misy dikany ny sikidy satria voaaron’ny fianianana natao izy. Nefa ny mpanjakan’i Babilôna dia hampahatsiaro azy ny fivadihany ka mampandre fa hoentina ho babo ireo. '
  '29':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Mampahatsiaro Ahy tsy tapaka ny helokareo ianareo amin’ireo fikomianareo an-karihary; ary ny asa rehetra nataonareo no mampiseho ny fahotanareo. Noho ianareo nanao izay hahatsiarovana anareo toy izany, dia hosamborin’ny fahavalo tokoa ianareo!›'
  '3':
  - type: text
    content: 'Asaivo mihaino ny tenin’ny TOMPO izy, satria izao no lazain’ny Tompo ANDRIANANAHARY aminy: «Indro Aho handrehitra afo izay handevona ny hazonao rehetra na ireo mirobona maitso na ireo efa maina. Tsy hisy afaka hamono ny lelafo midedadeda fa hihanaka avy any atsimo ka hatrany avaratra izany, ka ho may avokoa ny tarehin’ny olona rehetra. '
  '30':
  - type: text
    content: «Ary ianao, ry printsy filohan’i Israely sady olon-dratsy mpamadika, tonga ny andro hifaranan’ny fanaovanao heloka
  - type: note
    content: Ny filohan’i Israely voaresaka eto dia i Tsedekià. Izay nanjo azy dia jereo 2 Mp 25.4-7.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Satria izao no lazain’ny Tompo ANDRIANANAHARY: ‹Halaina aminao ny marika maha mpanjaka anao, ary hoesorina ny satro-boninahitrao. Fa nivadika ny toe-javatra: ny olona ambany no hasandratra, ary ny olona ambony no haetry. '
  '32':
  - type: text
    content: 'Faharavana, faharavana, faharavana: hataoko toy izany i Jerosalema. Ho potika tanteraka ny tanàna, saingy tsy alohan’ny hahatongavan’ilay homeko fahefana hanafay azy'
  - type: note
    content: Ny fanatanterahana ny famaizana dia nankinina tamin’i Nebokadnetsara, fitaovan’Andriamanitra hanafay an’i Israely, jereo 23.23-24.
  - type: text
    content: ›. »
  - type: heading
    content: Fanafihana ny Hamônita
  '33':
  - type: text
    content: 'Dia nampian’ny Tompo hoe: «Ary ianao, ry ilay taranak’olombelona, mijoroa ho '
  - type: text
    content: mpaminany
  - type: text
    content: ' ka ambarao amin’ny Hamônita'
  - type: note
    content: Ny Hamônita dia nifanaiky tamin’ny Edômita sy ny Môabita sy ny Fenisianina tao Tiro sy Tsidôna niaraka tamin’i Joda mba hanandrana hikomy tamin’i Babilôna niaraka tamin’ny fanampian’i Ejipta, jereo Jer 27.2-6.
  - type: text
    content: ' fa izao no lazain’ny Tompo ANDRIANANAHARY hamelezana azy ary ho setrin’ny fandatsana nataony tamin’i Israely: ‹Efa ao ny sabatra, dia sabatra voatsoaka hahafaty sy handringana ary sabatra natao mangirana hanelatselatra. '
  '34':
  - type: text
    content: Raha fahitana manodoka sy fanambarana mamitaka no aroso aminareo, dia efa vonona hanapaka ny vozon’ny mpamadika sy ny olon-dratsy izany; satria tonga ny andro hifaranan’ny fanaovany heloka
  - type: note
    content: 'ny andro... heloka: jereo ny and 30.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Ankehitriny ampidiro amin’ny fitoerany ny sabatrareo; fa eo amin’ny toerana izay namoronako anareo sy nahaterahanareo no hanafaizako anareo. '
  '36':
  - type: text
    content: 'Hatosako aminareo ny fahavinirako ary hampihariko aminareo ny fahatezerako mirehitra, ka hatolotro eo an-tanan’ny olon-doza mpamorona fandravana ianareo. '
  '37':
  - type: text
    content: Ho levon’ny afo toy ny kitay ianareo, handriaka amin’ny tany ny ranareo, ary dia tsy hisy hahatsiaro anareo intsony. Izaho TOMPO no manambara izany
  - type: note
    content: 'And 33-37: jereo ny naoty momba ny Jer 49.1.'
  - type: text
    content: ›. »
  '4':
  - type: text
    content: Dia ho hitan’ny olona rehetra fa Izaho TOMPO no nandrehitra io afo io ka tsy misy afaka hamono azy.»
  '5':
  - type: text
    content: 'Fa namaly Azy aho hoe:'
  - type: text
    content: '–Indrisy, ry Tompo ANDRIANANAHARY ô, efa mimenomenona amiko ny olona ka manao hoe: «Tsy miteny afa-tsy ankamantatra izy!»'
  '6':
  - type: text
    content: Fa nisy indray tenin’ny TOMPO tamiko nanao hoe
  - type: note
    content: Amin’ny dkt sasany ny hoe 21.6-37 dia voalahatra hoe 21.1-32; jereo ny naoty tandrifin’ny 21.1.
  - type: text
    content: ':'
  '7':
  - type: text
    content: '–Ry ilay taranak’olombelona, atodiho mankany Jerosalema ny fijerinao, ka mitenena miantefa amin’ny '
  - type: text
    content: Toeramasiny
  - type: text
    content: ', ary ijoroy ny maha-mpaminany anao mba hamelezana ny tanin’i Israely. '
  '8':
  - type: text
    content: 'Ambarao amin’ny tanin’i Israely fa izao no lazain’ny TOMPO: «Hirotsaka an-tsehatra hamely anao Aho, ary hanatsoaka ny sabatro amin’ny fitoerany ka haringako na ny olo-marina na ny olon-dratsy eo aminao. '
  '9':
  - type: text
    content: 'Ny handringanako ny olo-marina sy ny olon-dratsy eo aminao no hanatsoahako ny sabatro amin’ny fitoerany, hamelezany ny olona rehetra hatreo atsimo ka hatrany avaratra. '
