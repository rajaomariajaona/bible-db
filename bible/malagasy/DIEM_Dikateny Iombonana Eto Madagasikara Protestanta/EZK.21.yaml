  - type: text
    text: ary dia hanampatra ny fahatezerako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho TOMPO no manambara izany›. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanafihana an’i Jerosalema
  marker-yv: yv-h
- type: usfm
