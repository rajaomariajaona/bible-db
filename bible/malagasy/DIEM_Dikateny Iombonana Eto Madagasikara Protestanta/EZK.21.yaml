    marker-yv: yv-n
  - type: text
    text: ' fa izao no lazain’ny Tompo ANDRIANANAHARY hamelezana azy ary ho setrin’ny fandatsana nataony tamin’i Israely: ‹Efa ao ny sabatra, dia sabatra voatsoaka hahafaty sy handringana ary sabatra natao mangirana hanelatselatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Raha fahitana manodoka sy fanambarana mamitaka no aroso aminareo, dia efa vonona hanapaka ny vozon’ny mpamadika sy ny olon-dratsy izany; satria tonga ny andro hifaranan’ny fanaovany heloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
