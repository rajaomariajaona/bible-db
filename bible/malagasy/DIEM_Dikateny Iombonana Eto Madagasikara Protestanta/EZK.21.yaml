  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '–Ry ilay taranak’olombelona, atodiho mankany Jerosalema ny fijerinao, ka mitenena miantefa amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasiny
  - type: text
    text: ', ary ijoroy ny maha-mpaminany anao mba hamelezana ny tanin’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ambarao amin’ny tanin’i Israely fa izao no lazain’ny TOMPO: «Hirotsaka an-tsehatra hamely anao Aho, ary hanatsoaka ny sabatro amin’ny fitoerany ka haringako na ny olo-marina na ny olon-dratsy eo aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny handringanako ny olo-marina sy ny olon-dratsy eo aminao no hanatsoahako ny sabatro amin’ny fitoerany, hamelezany ny olona rehetra hatreo atsimo ka hatrany avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoeken’ny olona rehetra amin’izay fa Izaho TOMPO no efa nanatsoaka ny sabatro tamin’ny fitoerany ka tsy hampiditra azy ao intsony.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ianao, ry ilay taranak’olombelona, mitolokoa noho ny havesatry ny fahadisoam-panantenana; eny, mitolokoa eo imason’izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hanontaniana anao ny antony itolokoanao ka hovalianao hoe: «Vaovao ratsy no reko ary ho tonga izany. Ho kivy fo sy hiraviravy tanana ny besinimaro ary ho ketra-panahy sy halemy lohalika. Indro tonga izany ary tanteraka, hoy ny teny hentitra avy amiko Tompo ANDRIANANAHARY.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ilay sabatra fandringanana
  marker-yv: yv-h
