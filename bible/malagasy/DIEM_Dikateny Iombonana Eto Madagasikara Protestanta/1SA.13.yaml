document_id: 1SA.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fikomiana tamin’ny Filistinina. Fahadisoan’i Saoly
  - type: note
    content: 'Ny and 1 (tsy hita ao amin’ny dkt tranainy grika) dia miseho amin’ny endrika misy banga ao amin’ny RM: I Saoly dia... taona raha vao nanjaka; ary nanjaka... taona tamin’i Israely izy.'
  '10':
  - type: text
    content: Vao vita ny sorona nataony, dia tonga i Samoela; ary nanatona hitsena azy i Saoly mba hiarahaba azy.
  '11':
  - type: text
    content: 'Dia hoy i Samoela nanontany azy:'
  - type: text
    content: –Fa inona no nataonao?
  - type: text
    content: 'Ka novalian’i Saoly hoe:'
  - type: text
    content: '–Rehefa hitako fa niparitaka nandao ahy ny miaramilako, ary ianao koa tsy tonga tamin’ny fotoana nifanomezana, nefa ny Filistinina efa vory lanona tao Mikmasy, '
  '12':
  - type: text
    content: dia noheveriko fa ankehitriny dia ho avy hanafika ahy atỳ Gilgàla ny Filistinina; nefa izaho ity tsy mbola nahazo ny fanambinan’ny TOMPO, koa dia ny tenako mihitsy no nandray andraikitra nanatitra ny sorona dorana manontolo.
  '13':
  - type: text
    content: 'Ary hoy i Samoela tamin’i Saoly:'
  - type: text
    content: '–Nanaonao foana tahaka ny olona adala ianao! Tsy notandremanao akory ny didy nomen’ny TOMPO Andriamanitrao anao. Fa raha mba nataonao anefa izany, dia ho nampanjakain’ny TOMPO mandrakizay tamin’i Israely ianao sy ny taranakao. '
  '14':
  - type: text
    content: Ankehitriny kosa dia tsy haharitra ny fanjakanao. Ny TOMPO efa nifidy olona izay tiany ary nanendry azy ho filohan’ny vahoakany
  - type: note
    content: I Davida no lazaina eto, izay tantaraina manomboka amin’ny toko 16. Ampit Asa 13.22.
  - type: text
    content: ', satria ianao tsy nitandrina ny didiny.'
  '15':
  - type: text
    content: 'Nandao an’i Gilgàla i Samoela ka nanohy ny diany. Ny miaramila sisa kosa nanaraka an’i Saoly, rehefa niala tao Gilgàla ity mpanjaka mba hanatona ireo miaramilany hafa tany Gibehàn’i Benjamîna. Noisain’i Saoly ny miaramila mbola tafaraka taminy, ka nisy lehilahy tokony ho eninjato eo ho eo. '
  '16':
  - type: text
    content: 'Nitoby tao Gibehàn’i Benjamîna i Saoly sy ny zanany ary ireo miaramila niara-dia taminy, fa ny Filistinina kosa tao Mikmasy. '
  '17':
  - type: text
    content: Indray andro dia nisy mpanao vy very ny ainy nivoaka avy tamin’ny tobin’ny Filistinina, ka nizara telo izy ireo. Ny andiany voalohany nihazo ny lalana mankany Hôfrà ao amin’ny faritr’i Sohala
  - type: note
    content: 'Hôfrà: tanàna eo avaratr’i Mikmasy. –Ny faritanin’i Sohala dia eto ihany no itenenana azy.'
  - type: text
    content: ', '
  '18':
  - type: text
    content: ny andiany faharoa ny mankany Bèty-Hôrôna, ary ny fahatelo ny mankany amin’ny sisin-tany dia ny lalana mandondona ny lohasahan’i Tsebôhima
  - type: note
    content: 'Bèty-Hôrôna: tanàna eo andrefan’i Mikmasy. –Ny lohasahan’i Tsebôhima: faritra eo atsimo atsinanan’i Mikmasy.'
  - type: text
    content: ' tandrifin’ny taniefitra.'
  '19':
  - type: text
    content: 'Tamin’izany, dia tsy nahitana mpanefy teo amin’ny tanin’i Israely, satria natahotra ny Filistinina sao mahavita sabatra aman-defona ny Hebreo. '
  '2':
  - type: text
    content: Nifantina miaramila telo arivo lahy tamin’ny Israelita i Saoly, ka ny roa arivo lahy dia teo ambany fifehezany tao Mikmasy sy tany an-tendrombohitr’i Betela, fa ny arivo lahy kosa dia nofehezin’i Jônatàna tao Gibehàn’i Benjamîna
  - type: note
    content: 'Mikmasy: tanàna tokony ho 12 km any avaratra andrefan’i Jerosalema. –Betela: jereo 7.16 sy nta. –Gibehàn’i Benjamîna: jereo 10.5 sy nta.'
  - type: text
    content: . Ary ny vahoaka sisa dia nasain’i Saoly nody any aminy avokoa.
  '20':
  - type: text
    content: 'Noho izany dia samy nankany amin’ny Filistinina ny Israelita mba hanasa ny lelan’angadinombiny, ny lapikany sy ny famakiny ary ny angadiny. '
  '21':
  - type: text
    content: 'Ny fanasana lelan’angadinomby na lapika, na famaky, na angady na ny fanindronan’omby dia mitentina androatokon’ny sekela volafotsy. '
  '22':
  - type: text
    content: Koa tamin’ny andro nipoahan’ny ady dia tanam-polo no nentin’ny miaramila israelita; i Saoly sy i Jônatàna zanany ihany no mba nanana sabatra sy lefona.
  '23':
  - type: text
    content: Nisy andiana miaramila filistinina naka toerana teo amin’ny hadilalan’i Mikmasy.
  '3':
  - type: text
    content: Novonoin’i Jônatàna ho faty ny governora filistinina izay tao Gebà
  - type: note
    content: 'Gebà: tanàna tokony ho 9 km any avaratra atsinanan’i Jerosalema; kanefa tsaratsara kokoa angamba ny mamaky azy hoe Gibehà (jereo 10.5) miaraka amin’ny dkt tranainy grika.'
  - type: text
    content: ', ary fantatry ny Filistinina izany. Nasain’i Saoly notsofina nanerana ny taniny tontolo ny anjomara satria hoy izy anakampony hoe: «Aoka ho fantatry ny Hebreo izany!» '
  '4':
  - type: text
    content: Koa dia fantatry ny Israelita rehetra fa novonoin’i Saoly ho faty ny governora filistinina iray; ary nahatonga ny fahatezeran’ny Filistinina tamin’i Israely izany. Dia nivory nanaraka an’i Saoly tany Gilgala
  - type: note
    content: 'Gilgala: jereo 7.16 sy nta.'
  - type: text
    content: ' ny tafiny. '
  '5':
  - type: text
    content: 'Ny Filistinina kosa tetsy an-danin’izany dia vory lanona mba hiady amin’i Israely: nanana kalesy telo alina sy mpitaingin-tsoavaly enina arivo, ary miaramila betsaka tahaka ny fasika eny amoron-dranomasina izy ireo, ary tonga nitoby tao Mikmasy, atsinanan’i Bèty-Avena'
  - type: note
    content: 'Bèty-Avena: matetika anondroana an’i Betela izany anarana manokana izany ao amin’ny Test. Tal.; kanefa toa manondro tanàna hafa atsimo kokoa izy etoana.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Rehefa hitan’ny Israelita fa tandidomin-doza izy, dia lasa ny olona niery tany anaty zohy, sy tany anaty kirihitra, tany amin’ny harambato sy tany ambanin’ny tany, ary tany an-dava-pantsakana. '
  '7':
  - type: text
    content: Ny Hebreo sasany aza tafita an’i Jôrdàna mba hialokaloka any amin’ny tanin’i Gada sy i Gilehada.
  - type: text
    content: 'Mbola tany Gilgala i Saoly tamin’izay, ary rano an-dravina ny miaramila rehetra nanaraka azy. '
  '8':
  - type: text
    content: Fito andro no niandrasany ny fe-potoana nomen’i Samoela
  - type: note
    content: Momba ny fe-potoana nomen’i Samoela; jereo 10.8.
  - type: text
    content: ', nefa i Samoela tsy tonga tany Gilgala. Nanomboka niparitaka nandao an’i Saoly ny miaramilany. '
  '9':
  - type: text
    content: 'Koa nodidian’i Saoly hoentina eo aminy ny biby hatao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy ny sorom-pihavanana, ary dia ny tenany mihitsy no nanolotra ny sorona dorana manontolo'
  - type: note
    content: Ny fanolorana sorona dia fanompoam-pivavahana fanao hiomanan-kiady (jereo 7.9).
  - type: text
    content: '. '
