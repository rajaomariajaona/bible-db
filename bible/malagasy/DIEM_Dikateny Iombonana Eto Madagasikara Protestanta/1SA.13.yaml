document_id: 1SA.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fikomiana tamin’ny Filistinina. Fahadisoan’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny and 1 (tsy hita ao amin’ny dkt tranainy grika) dia miseho amin’ny endrika misy banga ao amin’ny RM: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I Saoly dia... taona raha vao nanjaka; ary nanjaka... taona tamin’i Israely izy.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nifantina miaramila telo arivo lahy tamin’ny Israelita i Saoly, ka ny roa arivo lahy dia teo ambany fifehezany tao Mikmasy sy tany an-tendrombohitr’i Betela, fa ny arivo lahy kosa dia nofehezin’i Jônatàna tao Gibehàn’i Benjamîna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mikmasy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 12 km any avaratra andrefan’i Jerosalema. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Betela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 7.16 sy nta. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gibehàn’i Benjamîna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 10.5 sy nta.'
    marker-yv: yv-n
  - type: text
    text: . Ary ny vahoaka sisa dia nasain’i Saoly nody any aminy avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Novonoin’i Jônatàna ho faty ny governora filistinina izay tao Gebà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gebà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna tokony ho 9 km any avaratra atsinanan’i Jerosalema; kanefa tsaratsara kokoa angamba ny mamaky azy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gibehà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 10.5) miaraka amin’ny dkt tranainy grika.'
    marker-yv: yv-n
  - type: text
    text: ', ary fantatry ny Filistinina izany. Nasain’i Saoly notsofina nanerana ny taniny tontolo ny anjomara satria hoy izy anakampony hoe: «Aoka ho fantatry ny Hebreo izany!» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa dia fantatry ny Israelita rehetra fa novonoin’i Saoly ho faty ny governora filistinina iray; ary nahatonga ny fahatezeran’ny Filistinina tamin’i Israely izany. Dia nivory nanaraka an’i Saoly tany Gilgala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gilgala: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 7.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ny tafiny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny Filistinina kosa tetsy an-danin’izany dia vory lanona mba hiady amin’i Israely: nanana kalesy telo alina sy mpitaingin-tsoavaly enina arivo, ary miaramila betsaka tahaka ny fasika eny amoron-dranomasina izy ireo, ary tonga nitoby tao Mikmasy, atsinanan’i Bèty-Avena'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bèty-Avena: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: matetika anondroana an’i Betela izany anarana manokana izany ao amin’ny Test. Tal.; kanefa toa manondro tanàna hafa atsimo kokoa izy etoana.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa hitan’ny Israelita fa tandidomin-doza izy, dia lasa ny olona niery tany anaty zohy, sy tany anaty kirihitra, tany amin’ny harambato sy tany ambanin’ny tany, ary tany an-dava-pantsakana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny Hebreo sasany aza tafita an’i Jôrdàna mba hialokaloka any amin’ny tanin’i Gada sy i Gilehada.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mbola tany Gilgala i Saoly tamin’izay, ary rano an-dravina ny miaramila rehetra nanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fito andro no niandrasany ny fe-potoana nomen’i Samoela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fe-potoana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' nomen’i Samoela; jereo 10.8.'
    marker-yv: yv-n
  - type: text
    text: ', nefa i Samoela tsy tonga tany Gilgala. Nanomboka niparitaka nandao an’i Saoly ny miaramilany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa nodidian’i Saoly hoentina eo aminy ny biby hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo sy ny sorom-pihavanana, ary dia ny tenany mihitsy no nanolotra ny sorona dorana manontolo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny fanolorana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sorona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia fanompoam-pivavahana fanao hiomanan-kiady (jereo 7.9).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vao vita ny sorona nataony, dia tonga i Samoela; ary nanatona hitsena azy i Saoly mba hiarahaba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy i Samoela nanontany azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona no nataonao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Rehefa hitako fa niparitaka nandao ahy ny miaramilako, ary ianao koa tsy tonga tamin’ny fotoana nifanomezana, nefa ny Filistinina efa vory lanona tao Mikmasy, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia noheveriko fa ankehitriny dia ho avy hanafika ahy atỳ Gilgàla ny Filistinina; nefa izaho ity tsy mbola nahazo ny fanambinan’ny TOMPO, koa dia ny tenako mihitsy no nandray andraikitra nanatitra ny sorona dorana manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy i Samoela tamin’i Saoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nanaonao foana tahaka ny olona adala ianao! Tsy notandremanao akory ny didy nomen’ny TOMPO Andriamanitrao anao. Fa raha mba nataonao anefa izany, dia ho nampanjakain’ny TOMPO mandrakizay tamin’i Israely ianao sy ny taranakao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ankehitriny kosa dia tsy haharitra ny fanjakanao. Ny TOMPO efa nifidy olona izay tiany ary nanendry azy ho filohan’ny vahoakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I Davida no lazaina eto, izay tantaraina manomboka amin’ny toko 16. Ampit Asa 13.22.
    marker-yv: yv-n
  - type: text
    text: ', satria ianao tsy nitandrina ny didiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nandao an’i Gilgàla i Samoela ka nanohy ny diany. Ny miaramila sisa kosa nanaraka an’i Saoly, rehefa niala tao Gilgàla ity mpanjaka mba hanatona ireo miaramilany hafa tany Gibehàn’i Benjamîna. Noisain’i Saoly ny miaramila mbola tafaraka taminy, ka nisy lehilahy tokony ho eninjato eo ho eo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nitoby tao Gibehàn’i Benjamîna i Saoly sy ny zanany ary ireo miaramila niara-dia taminy, fa ny Filistinina kosa tao Mikmasy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indray andro dia nisy mpanao vy very ny ainy nivoaka avy tamin’ny tobin’ny Filistinina, ka nizara telo izy ireo. Ny andiany voalohany nihazo ny lalana mankany Hôfrà ao amin’ny faritr’i Sohala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hôfrà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna eo avaratr’i Mikmasy. –Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faritanin’i Sohala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia eto ihany no itenenana azy.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ny andiany faharoa ny mankany Bèty-Hôrôna, ary ny fahatelo ny mankany amin’ny sisin-tany dia ny lalana mandondona ny lohasahan’i Tsebôhima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bèty-Hôrôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna eo andrefan’i Mikmasy. –Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: lohasahan’i Tsebôhima
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': faritra eo atsimo atsinanan’i Mikmasy.'
    marker-yv: yv-n
  - type: text
    text: ' tandrifin’ny taniefitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tamin’izany, dia tsy nahitana mpanefy teo amin’ny tanin’i Israely, satria natahotra ny Filistinina sao mahavita sabatra aman-defona ny Hebreo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Noho izany dia samy nankany amin’ny Filistinina ny Israelita mba hanasa ny lelan’angadinombiny, ny lapikany sy ny famakiny ary ny angadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny fanasana lelan’angadinomby na lapika, na famaky, na angady na ny fanindronan’omby dia mitentina androatokon’ny sekela volafotsy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa tamin’ny andro nipoahan’ny ady dia tanam-polo no nentin’ny miaramila israelita; i Saoly sy i Jônatàna zanany ihany no mba nanana sabatra sy lefona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nisy andiana miaramila filistinina naka toerana teo amin’ny hadilalan’i Mikmasy.
