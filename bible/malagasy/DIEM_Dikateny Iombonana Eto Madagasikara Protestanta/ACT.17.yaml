document_id: ACT.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tabataba tao Tesalônika
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandalo an’i Amfipôly sy i Apôlônia ry i Paoly sy i Silasy ka tonga tao Tesalônika izay nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' anankiray fivavahan’ny Jiosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony alina ny andro, dia nasain’ny havana iray finoana hiainga ho any Berea i Paoly sy i Silasy. Nony tonga tany izy roa lahy, dia nankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' fivavahan’ny Jiosy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsara toe-po amam-panahy kokoa ireto Jiosy ireto noho ny tany Tesalônika sady nazoto tokoa nandray ny tenin’Andriamanitra. Nodinihin-dry zareo isan’andro ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hanamarinany izay lazain’i Paoly. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa maro tamin’ireo Jiosy no nino; ary, tamin’ireo Grika, dia tsy vitsy ny vehivavy ambony toerana sy ny vadiny no nino. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa nony fantatry ny Jiosy tany Tesalônika fa nitorian’i Paoly ny tenin’Andriamanitra koa tao Berea, dia nankany ry zareo nampitabataba sy nampisahotaka ny vahoaka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niaraka tamin’izay dia nasain’ny havana iray finoana nankany amoron-dranomasina i Paoly fa i Silasy mbamin’i Timôty kosa no mbola nijanona tao Berea. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo nanatitra an’i Paoly dia nitondra azy hatrany Atena. Ary dia niverina tany Berea indray izy ireo nitondra hafatra ho an’i Silasy mbamin’i Timôty; fa niangavian’i Paoly izy roa lahy mba hamonjy azy faran’izay haingana any Atena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Paoly tao Atena
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mbola niandry an’i Silasy sy i Timôty tao Atena i Paoly, dia niontana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'niontana ny fony tamin’izy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nahatezitra azy mafy ny...
      marker-yv: yv-n
    - type: text
      text: 'ny fony tamin’izy nahita ity tanàna feno sampy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' i Paoly no nifanakalo hevitra tamin’ny Jiosy sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanaja an’Andriamanitra
    - type: text
      text: ', ary teny an-kianja isan’andro tamin’ny olona sendra teo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy koa filôzôfy epikorianina sy stôisianina nifanakalo hevitra taminy, ka hoy ny sasany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no tian’ity mpirediredy holazaina?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sasany kosa, nony nandre an’i Paoly nanambara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' momba an’i Jesoa sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitsanganan’ny maty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.18 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: Ny epikorianina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia mpanaraka ny fampianaran’i Epikora (filôzôfy grika maty tamin’ny taona 270 tal J.K). Ny fitondrantena nampianarin’ny epikorianina dia ny hahatonga ny olona tsy hianjadiam-pijaliana eo anivon’izao tontolo heverin-dry zareo hoe fehezin’ny kisendrasendra izao. –
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: Ny stôisianina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' kosa dia mpanaraka ny fampianaran’ny filôzôfy atao hoe Zenôna (maty tamin’ny taona 265 tal J.K.). Ho azy ireo ny fahendrena dia ny mahalala ireo lalàna voajanahary mifehy an’izao tontolo izao sy ny miezaka hanana fitondrantena mendrika. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'i Jesoa sy ny fitsanganan’ny maty:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ny teny grika hoe «anastasis» (fitsanganan’ny maty), noho izy voafaritra ho feminina, dia noheverin’ireo mpihaino an’i Paoly fa manondro andriamanibavy anankiray miara-dia amin’i Jesoa. Koa ireo andriamanitra vaovao mahavelom-panontaniana ny Atenianina dia mova tsy hoe ny andriamanidahy «Jesoa» sy ny andriamanibavy «Anastàzy», sanatria!'
      marker-yv: yv-n
    - type: text
      text: ', dia niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Toa andriamanitra vahiny no torîny!
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentin’izy rehetra i Paoly ka notarihiny hankeo amin’ny antenimiera Areôpazy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Areôpazy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: havoana ao an-tanànan’i Atena, izay fivorian’ny antenimieran’ny tanàna teo am-boalohany. Raikitra ho anaran’ilay antenimiera ihany io teny io na dia efa teo an-kianja (Agôrà) aza no nivoriany tamin’ny andron’i Paoly, fa tsy teo amin’ilay havoana intsony.
      marker-yv: yv-n
    - type: text
      text: ' sady nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Moa azonay fantarina ve izao fampianarana vaovao resahinao izao? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nankao amin’ilay sinagôga i Paoly araka ny fanaony. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sabata
    - type: text
      text: ' telo nifanarakaraka no nifanakalozany hevitra momba ny Soratra Masina tamin’ny olona tao; '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Zavatra hafahafa manko izao renay aminao izao, ka tianay ho fantatra izay mety ho hevitr’izany. ( '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa ny Atenianina rehetra mbamin’ny vahiny niara-nonina taminy moa dia nandany andro fotsiny hilaza na hihaino izay zava-baovao farany).
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nijoro teo afovoan’ny Areôpazy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'teo afovoan’ny '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: teo anoloan’ny.
      marker-yv: yv-n
    - type: text
      text: 'i Paoly ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Atenianina, hitako fa amin’ny lafin-javatra rehetra dia olona fatra-pivavaka ianareo. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha nitsangantsangana eran’ny tanàna aho, ka nijerijery ireo toeram-pivavahanareo, dia nahita alitara anankiray misy soratra hoe: «Ho an’ilay Andriamanitra tsy fantatra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Naleon’ny Atenianina nanokana alitara '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ho an’ilay andriamanitra tsy fantatra,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sao misy andriamanidahy na andriamanibavy sendra hadino tsy nahavitana alitara ka ho tezitra.'
      marker-yv: yv-n
    - type: text
      text: '.» Ka izany tsy fantatrareo izany, kanefa ivavahanareo, no ambarako aminareo. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ilay Andriamanitra Izay nanao izao tontolo izao sy ny zavatra rehetra eo aminy no Tompon’ny lanitra sy ny tany, ka tsy mba mitoetra ao anaty tempoly nataon-tanan’olombelona. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy hoe orin-javatra Andriamanitra ka tompoin’olombelona, satria Izy ihany no manome ny aina sy ny fofon’aina mbamin’ny zavatra rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.25 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 25:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Is 42.5; Sal 51.18; Jer 7.22.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny olombelona tsy an-kanavaka. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Noarîny avy amin’olona anankiray ny firenena rehetra mba honina manerana ny tany tontolo; ary nofariparitany koa ny vanim-potoana hiainany sy ny zaratany honenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'olona anankiray: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia i Adama (Gen 1.28). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'zaratany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Deot 32.8.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nataon’Andriamanitra izany mba hahazoan’ny olombelona mitady Azy, sao izy ireo mba mety maminavina Azy sy mifandray aminy; fa Andriamanitra dia tsy lavitra antsika tsirairay avy, '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: satria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ao aminy no ivelomantsika sy ihetsiketsehantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary isiantsika.»
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany indrindra koa no nilazan’ny mpanao tononkira sasany teo aminareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Avy amin’Andriamanitra no ipoirantsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny andalana voalohany voatsiahy eto dia nalain’i Paoly araka ny nahatadidiavany azy tamin’ny soratr’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Epimenida
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' pôeta grika (taonjato faha-6 tal J.K.): jereo Tit 1.12 sy nta; ary ny andalana manaraka dia avy amin’ny pôeta grika atao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Arato
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (taonjato faha-3 tal J.K.).'
      marker-yv: yv-n
    - type: text
      text: .»
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa satria avy amin’Andriamanitra no ipoirantsika, dia tsy tokony hoheverintsika fa Andriamanitra dia mitovy endrika amin’ny sampy volamena na volafotsy na vato, sary sokitra vokatry ny fahaizana amam-pisaintsainan’olombelona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nohazavainy sady nasehony taminy fa, araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ', dia tsy maintsy nijaly ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: ' ary nitsangana velona avy tany amin’ny maty. Ka hoy i Paoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izao Jesoa ambarako aminareo izao no ilay Mesia!
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Kanefa ninian’Andriamanitra tsy jerena intsony ireo andro tsy nahalalana Azy, fa antsoiny hiala amin’ny toe-dratsy avokoa ny olona rehetra, na aiza na aiza. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nisy manko andro anankiray natao hitsaran’Andriamanitra izao tontolo izao araka ny rariny, amin’ny alalan’ny lehilahy anankiray efa voatendriny; ary ny nananganany Azy ho velona avy any amin’ny maty no nataony porofon’izany ho an’ny olona rehetra!
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao nandre an’i Paoly niteny momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitsanganan’ny maty
    - type: text
      text: ' ireo olona teo amin’ny Areôpazy, dia tao ny naneso azy ary tao kosa ny nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mbola hihaino anao indray izahay ny amin’io zavatra io.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia toy izany no nandaozan’i Paoly azy ireo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa nisy olona sasantsasany nikambana taminy ary tonga mpino: anisan’ireny i Diônisy, mambran’ny antenimiera Areôpazy, sy vehivavy atao hoe Damarida ary ny sasany hafa koa izay niaraka tamin’ireo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy sasantsasany resy lahatra tamin’ireo mpiangona ka niray anjara tamin’i Paoly sy i Silasy. Nanao toy izany koa ny olona marobe tamin’ireo Grika '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanaja an’Andriamanitra
    - type: text
      text: ', ary tsy vitsy tamin’ireo vehivavy ambony toerana.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Velom-pialonana kosa ny Jiosy, ka namory olon-dratsy avy amin’ireo vahoaka be nahaona teny an-dalambe. Dia nampihotakotaka ny olona ny Jiosy ka nampisavorovoro ny tanàna. Notamîn-dry zareo ny tranon’i Jasôna ary notadiaviny hoentina eo anatrehan’ny vahoaka ry i Paoly sy i Silasy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tsy hitan-dry zareo izy roa lahy, dia i Jasôna sy ny havana iray finoana vitsivitsy no nosarihiny hanatrika an’ireo lehiben’ny tanàna sady nohorakorahiny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nanakorontana ny lafy valon’ny tany izy roa lahy ireny, ary mby eto amintsika ankehitriny '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ka nampiantranoin’i Jasôna. Mifanohitra amin’ny didin’ny amperôra rômanina anefa ny fihetsik’izy rehetra ireo satria ambarany fa misy mpanjaka hafa koa atao hoe Jesoa.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampisahotaka ny vahoaka sy ny lehiben’ny tanàna izany teny izany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka nandoa vola hatao antoka ry i Jasôna sy ny namany vao navelan’ireo lehiben’ny tanàna handeha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Paoly sy i Silasy tao Berea
    marker-yv: yv-h
