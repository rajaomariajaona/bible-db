document_id: ACT.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tabataba tao Tesalônika
  - type: text
    content: 'Dia nandalo an’i Amfipôly sy i Apôlônia ry i Paoly sy i Silasy ka tonga tao Tesalônika izay nisy '
  - type: text
    content: sinagôga
  - type: text
    content: ' anankiray fivavahan’ny Jiosy. '
  '10':
  - type: text
    content: 'Nony alina ny andro, dia nasain’ny havana iray finoana hiainga ho any Berea i Paoly sy i Silasy. Nony tonga tany izy roa lahy, dia nankany amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' fivavahan’ny Jiosy. '
  '11':
  - type: text
    content: 'Tsara toe-po amam-panahy kokoa ireto Jiosy ireto noho ny tany Tesalônika sady nazoto tokoa nandray ny tenin’Andriamanitra. Nodinihin-dry zareo isan’andro ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hanamarinany izay lazain’i Paoly. '
  '12':
  - type: text
    content: 'Koa maro tamin’ireo Jiosy no nino; ary, tamin’ireo Grika, dia tsy vitsy ny vehivavy ambony toerana sy ny vadiny no nino. '
  '13':
  - type: text
    content: 'Kanefa nony fantatry ny Jiosy tany Tesalônika fa nitorian’i Paoly ny tenin’Andriamanitra koa tao Berea, dia nankany ry zareo nampitabataba sy nampisahotaka ny vahoaka. '
  '14':
  - type: text
    content: 'Niaraka tamin’izay dia nasain’ny havana iray finoana nankany amoron-dranomasina i Paoly fa i Silasy mbamin’i Timôty kosa no mbola nijanona tao Berea. '
  '15':
  - type: text
    content: Ireo nanatitra an’i Paoly dia nitondra azy hatrany Atena. Ary dia niverina tany Berea indray izy ireo nitondra hafatra ho an’i Silasy mbamin’i Timôty; fa niangavian’i Paoly izy roa lahy mba hamonjy azy faran’izay haingana any Atena.
  - type: heading
    content: I Paoly tao Atena
  '16':
  - type: text
    content: Raha mbola niandry an’i Silasy sy i Timôty tao Atena i Paoly, dia niontana
  - type: note
    content: 'niontana ny fony tamin’izy: na hoe nahatezitra azy mafy ny...'
  - type: text
    content: 'ny fony tamin’izy nahita ity tanàna feno sampy. '
  '17':
  - type: text
    content: 'Koa tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Paoly no nifanakalo hevitra tamin’ny Jiosy sy ny '
  - type: text
    content: mpanaja an’Andriamanitra
  - type: text
    content: ', ary teny an-kianja isan’andro tamin’ny olona sendra teo. '
  '18':
  - type: text
    content: 'Nisy koa filôzôfy epikorianina sy stôisianina nifanakalo hevitra taminy, ka hoy ny sasany hoe:'
  - type: text
    content: –Inona no tian’ity mpirediredy holazaina?
  - type: text
    content: 'Ny sasany kosa, nony nandre an’i Paoly nanambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i Jesoa sy ny '
  - type: text
    content: fitsanganan’ny maty
  - type: note
    content: 'Ny epikorianina dia mpanaraka ny fampianaran’i Epikora (filôzôfy grika maty tamin’ny taona 270 tal J.K). Ny fitondrantena nampianarin’ny epikorianina dia ny hahatonga ny olona tsy hianjadiam-pijaliana eo anivon’izao tontolo heverin-dry zareo hoe fehezin’ny kisendrasendra izao. –Ny stôisianina kosa dia mpanaraka ny fampianaran’ny filôzôfy atao hoe Zenôna (maty tamin’ny taona 265 tal J.K.). Ho azy ireo ny fahendrena dia ny mahalala ireo lalàna voajanahary mifehy an’izao tontolo izao sy ny miezaka hanana fitondrantena mendrika. –i Jesoa sy ny fitsanganan’ny maty: ny teny grika hoe «anastasis» (fitsanganan’ny maty), noho izy voafaritra ho feminina, dia noheverin’ireo mpihaino an’i Paoly fa manondro andriamanibavy anankiray miara-dia amin’i Jesoa. Koa ireo andriamanitra vaovao mahavelom-panontaniana ny Atenianina dia mova tsy hoe ny andriamanidahy «Jesoa» sy ny andriamanibavy «Anastàzy», sanatria!'
  - type: text
    content: ', dia niteny hoe:'
  - type: text
    content: –Toa andriamanitra vahiny no torîny!
  '19':
  - type: text
    content: Dia nentin’izy rehetra i Paoly ka notarihiny hankeo amin’ny antenimiera Areôpazy
  - type: note
    content: 'Areôpazy: havoana ao an-tanànan’i Atena, izay fivorian’ny antenimieran’ny tanàna teo am-boalohany. Raikitra ho anaran’ilay antenimiera ihany io teny io na dia efa teo an-kianja (Agôrà) aza no nivoriany tamin’ny andron’i Paoly, fa tsy teo amin’ilay havoana intsony.'
  - type: text
    content: ' sady nilazany hoe:'
  - type: text
    content: '–Moa azonay fantarina ve izao fampianarana vaovao resahinao izao? '
  '2':
  - type: text
    content: 'Nankao amin’ilay sinagôga i Paoly araka ny fanaony. '
  - type: text
    content: Sabata
  - type: text
    content: ' telo nifanarakaraka no nifanakalozany hevitra momba ny Soratra Masina tamin’ny olona tao; '
  '20':
  - type: text
    content: 'Zavatra hafahafa manko izao renay aminao izao, ka tianay ho fantatra izay mety ho hevitr’izany. ( '
  '21':
  - type: text
    content: Fa ny Atenianina rehetra mbamin’ny vahiny niara-nonina taminy moa dia nandany andro fotsiny hilaza na hihaino izay zava-baovao farany).
  '22':
  - type: text
    content: Dia nijoro teo afovoan’ny Areôpazy
  - type: note
    content: teo afovoan’ny na hoe teo anoloan’ny.
  - type: text
    content: 'i Paoly ka nanao hoe:'
  - type: text
    content: '–Ry Atenianina, hitako fa amin’ny lafin-javatra rehetra dia olona fatra-pivavaka ianareo. '
  '23':
  - type: text
    content: 'Raha nitsangantsangana eran’ny tanàna aho, ka nijerijery ireo toeram-pivavahanareo, dia nahita alitara anankiray misy soratra hoe: «Ho an’ilay Andriamanitra tsy fantatra'
  - type: note
    content: Naleon’ny Atenianina nanokana alitara ho an’ilay andriamanitra tsy fantatra, sao misy andriamanidahy na andriamanibavy sendra hadino tsy nahavitana alitara ka ho tezitra.
  - type: text
    content: '.» Ka izany tsy fantatrareo izany, kanefa ivavahanareo, no ambarako aminareo. '
  '24':
  - type: text
    content: 'Ilay Andriamanitra Izay nanao izao tontolo izao sy ny zavatra rehetra eo aminy no Tompon’ny lanitra sy ny tany, ka tsy mba mitoetra ao anaty tempoly nataon-tanan’olombelona. '
  '25':
  - type: text
    content: Tsy hoe orin-javatra Andriamanitra ka tompoin’olombelona, satria Izy ihany no manome ny aina sy ny fofon’aina mbamin’ny zavatra rehetra
  - type: note
    content: 'And 25: jereo Is 42.5; Sal 51.18; Jer 7.22.'
  - type: text
    content: ' ho an’ny olombelona tsy an-kanavaka. '
  '26':
  - type: text
    content: Noarîny avy amin’olona anankiray ny firenena rehetra mba honina manerana ny tany tontolo; ary nofariparitany koa ny vanim-potoana hiainany sy ny zaratany honenany
  - type: note
    content: 'olona anankiray: dia i Adama (Gen 1.28). –zaratany: jereo Deot 32.8.'
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Nataon’Andriamanitra izany mba hahazoan’ny olombelona mitady Azy, sao izy ireo mba mety maminavina Azy sy mifandray aminy; fa Andriamanitra dia tsy lavitra antsika tsirairay avy, '
  '28':
  - type: text
    content: satria
  - type: text
    content: «Ao aminy no ivelomantsika sy ihetsiketsehantsika
  - type: text
    content: ary isiantsika.»
  - type: text
    content: 'Izany indrindra koa no nilazan’ny mpanao tononkira sasany teo aminareo hoe:'
  - type: text
    content: «Avy amin’Andriamanitra no ipoirantsika
  - type: note
    content: 'Ny andalana voalohany voatsiahy eto dia nalain’i Paoly araka ny nahatadidiavany azy tamin’ny soratr’i Epimenida pôeta grika (taonjato faha-6 tal J.K.): jereo Tit 1.12 sy nta; ary ny andalana manaraka dia avy amin’ny pôeta grika atao hoe Arato (taonjato faha-3 tal J.K.).'
  - type: text
    content: .»
  '29':
  - type: text
    content: 'Koa satria avy amin’Andriamanitra no ipoirantsika, dia tsy tokony hoheverintsika fa Andriamanitra dia mitovy endrika amin’ny sampy volamena na volafotsy na vato, sary sokitra vokatry ny fahaizana amam-pisaintsainan’olombelona. '
  '3':
  - type: text
    content: 'nohazavainy sady nasehony taminy fa, araka ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ', dia tsy maintsy nijaly ny '
  - type: text
    content: Mesia
  - type: text
    content: ' ary nitsangana velona avy tany amin’ny maty. Ka hoy i Paoly:'
  - type: text
    content: –Izao Jesoa ambarako aminareo izao no ilay Mesia!
  '30':
  - type: text
    content: 'Kanefa ninian’Andriamanitra tsy jerena intsony ireo andro tsy nahalalana Azy, fa antsoiny hiala amin’ny toe-dratsy avokoa ny olona rehetra, na aiza na aiza. '
  '31':
  - type: text
    content: Nisy manko andro anankiray natao hitsaran’Andriamanitra izao tontolo izao araka ny rariny, amin’ny alalan’ny lehilahy anankiray efa voatendriny; ary ny nananganany Azy ho velona avy any amin’ny maty no nataony porofon’izany ho an’ny olona rehetra!
  '32':
  - type: text
    content: 'Vao nandre an’i Paoly niteny momba ny '
  - type: text
    content: fitsanganan’ny maty
  - type: text
    content: ' ireo olona teo amin’ny Areôpazy, dia tao ny naneso azy ary tao kosa ny nilaza hoe:'
  - type: text
    content: –Mbola hihaino anao indray izahay ny amin’io zavatra io.
  '33':
  - type: text
    content: 'Dia toy izany no nandaozan’i Paoly azy ireo. '
  '34':
  - type: text
    content: 'Kanefa nisy olona sasantsasany nikambana taminy ary tonga mpino: anisan’ireny i Diônisy, mambran’ny antenimiera Areôpazy, sy vehivavy atao hoe Damarida ary ny sasany hafa koa izay niaraka tamin’ireo.'
  '4':
  - type: text
    content: 'Nisy sasantsasany resy lahatra tamin’ireo mpiangona ka niray anjara tamin’i Paoly sy i Silasy. Nanao toy izany koa ny olona marobe tamin’ireo Grika '
  - type: text
    content: mpanaja an’Andriamanitra
  - type: text
    content: ', ary tsy vitsy tamin’ireo vehivavy ambony toerana.'
  '5':
  - type: text
    content: 'Velom-pialonana kosa ny Jiosy, ka namory olon-dratsy avy amin’ireo vahoaka be nahaona teny an-dalambe. Dia nampihotakotaka ny olona ny Jiosy ka nampisavorovoro ny tanàna. Notamîn-dry zareo ny tranon’i Jasôna ary notadiaviny hoentina eo anatrehan’ny vahoaka ry i Paoly sy i Silasy. '
  '6':
  - type: text
    content: 'Nony tsy hitan-dry zareo izy roa lahy, dia i Jasôna sy ny havana iray finoana vitsivitsy no nosarihiny hanatrika an’ireo lehiben’ny tanàna sady nohorakorahiny hoe:'
  - type: text
    content: '–Nanakorontana ny lafy valon’ny tany izy roa lahy ireny, ary mby eto amintsika ankehitriny '
  '7':
  - type: text
    content: ka nampiantranoin’i Jasôna. Mifanohitra amin’ny didin’ny amperôra rômanina anefa ny fihetsik’izy rehetra ireo satria ambarany fa misy mpanjaka hafa koa atao hoe Jesoa.
  '8':
  - type: text
    content: 'Nampisahotaka ny vahoaka sy ny lehiben’ny tanàna izany teny izany; '
  '9':
  - type: text
    content: ka nandoa vola hatao antoka ry i Jasôna sy ny namany vao navelan’ireo lehiben’ny tanàna handeha.
  - type: heading
    content: I Paoly sy i Silasy tao Berea
