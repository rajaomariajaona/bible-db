document_id: JER.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampanantenana vaovao ho an’i Jerosalema
  - type: text
    content: 'Fa raha mbola voatana teo an-kianjan’ny trano fiambenana i Jeremià, dia nisy indray tenin’ny TOMPO fanindroany taminy nanao hoe:'
  '10':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: '«Ianareo vahoakan’i Joda dia mamerimberina hoe rava ny taninay ka tsy ahitana olona na biby fiompy intsony. Marina tokoa fa ny tanànan’i Joda sy ny lalamben’i Jerosalema dia foana ka tsy ahitana olona na biby fiompy monina ao intsony. Kanefa amin’izany toerana izany no mbola handrenesana indray '
  '11':
  - type: text
    content: 'ny kotaban’ny fety sy ny horakora-pifaliana. Ho re ao indray ny hiran’ny mpanambady; ho re ao indray ny hira manao hoe:'
  - type: text
    content: Derao ny TOMPOn’izao rehetra izao, fa tsara Izy;
  - type: text
    content: eny, maharitra mandrakizay ny fitiavany
  - type: note
    content: 'Derao ny Tompo: jereo Sal 106.1 sy nta.'
  - type: text
    content: .
  - type: text
    content: Izany no hiran’ireo mitondra sorom-pisaorana mankao an-tranoko. Eny, hoy Izaho TOMPO, haveriko amin’ny laoniny toy ny fahiny izany tany izany.»
  - type: heading
    content: '*'
  '12':
  - type: text
    content: 'Izao koa no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: '«Eto amin’ity toerana rava ka tsy ahitana olona na biby fiompy ity sy amin’ny tanànany rehetra dia hisy faritra hampandrian’ireo mpiandry ondry ny biby fiompiny. '
  '13':
  - type: text
    content: Ao amin’ireo tanàna any an-tendrombohitra sy any Sefalà ary any Negeba
  - type: note
    content: 'Negeba: jereo 32.44 sy nta.'
  - type: text
    content: ', ao amin’ny faritanin’i Benjamîna sy ny manodidina an’i Jerosalema ary ao amin’ireo tanànan’i Joda, hoy Izaho TOMPO, dia handalo eo anatrehan’ny mpiandry azy indray ny ondry aman’osy mba hisainy.»'
  - type: heading
    content: Tsy hitsoaka amin’izay efa nampanantenainy Andriamanitra
  '14':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: '«Indro avy ny andro izay hanatanterahako ny zava-tsoa nampanantenaiko ny vahoakan’i Israely sy ny vahoakan’i Joda. '
  '15':
  - type: text
    content: 'Amin’izany andro sy fotoana izany, dia solofo mpandala ny hitsiny no hapoitrako ho an’i Davida. Izy no hampihatra ny rariny sy ny hitsiny eo amin’ny tany. '
  '16':
  - type: text
    content: Amin’izay dia ho afaka ny fanjakan’i Joda ary hiaina am-pilaminana ny mponin’i Jerosalema. Ka ny hiantsoana an’i Jerosalema dia hoe ‹Ny TOMPO no fahamarinantsika
  - type: note
    content: 'And 14-16: ampit Jer 23.5-6.'
  - type: text
    content: .› »
  - type: heading
    content: '*'
  '17':
  - type: text
    content: 'Izao koa no lazain’ny TOMPO:'
  - type: text
    content: «I Davida mpanjaka
  - type: note
    content: Tamin’ny andron’i Jeremià dia efa maty tokony ho efajato taona taloha i Davida mpanjaka. Momba ny fampanantenana voatsiahy eto, jereo 2 Sam 7.12-16; 1 Mp 2.4; 1 Tan 17.11-14.
  - type: text
    content: ' dia tsy ho tapaka mpandimby azy eo amin’ny sezafiandrianan’i Israely. '
  '18':
  - type: text
    content: Ary ny mpisorona taranak’i Levỳ
  - type: note
    content: 'Levỳ: zanakalahin’i Jakôba fahatelo izy (Gen 29.34) ary razamben’i Aharôna (Eks 4.14). I Aharôna moa no razamben’ny mpisorona israelita araka ny Nom 18.7. Momba ireo taranaka hafan’i Levỳ sy ny asany, jereo Nom 3.5-10.'
  - type: text
    content: ' tsy ho tapaka olona hijoro eo anatrehako hanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo, ary hampakatra ny eton’ny fanatitra sy ny sorom-pihavanana fanao isan’andro.'
  - type: heading
    content: '*'
  '19':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamin’i Jeremià nanao hoe:'
  '2':
  - type: text
    content: '«Izao no lazain’ny TOMPO, Ilay manao ny zava-mitranga ka mamolavola azy mba hitantanany azy, dia Ilay antsoina hoe TOMPO: '
  '20':
  - type: text
    content: '«Izao no lazain’ny TOMPO: Raha mahafoana ny fifanekena nataoko tamin’ny andro sy ny alina ianareo ka mahasakana ny andro sy ny alina tsy hiseho araka ny fotoanany, '
  '21':
  - type: text
    content: 'dia ho foana ny fanekempihavanana nataoko tamin’i Davida mpanompoko ka tsy hanana zanakalahy hipetraka eo amin’ny sezafiandrianany izy, ary tsy hisy koa ny mpisorona taranak’i Levỳ hanao fanompoam-pivavahana ho Ahy. '
  '22':
  - type: text
    content: Tsia, fa ny taranak’i Davida mpanompoko sy ny an’ireo levita izay manao fanompoam-pivavahana ho Ahy dia ho maro tahaka ny kintana eny amin’ny lanitra ka tsy ho hita isa. ary toy ny fasika eny amoron-dranomasina ka tsy ho hita fatra.»
  - type: heading
    content: '*'
  '23':
  - type: text
    content: 'Ary farany, dia nisy tenin’ny TOMPO tamin’i Jeremià nanao hoe:'
  '24':
  - type: text
    content: '«Tsy mba voamarikao angaha fa lazain’ny olona hoe nariako hono ireo fianakaviana roa nofidiko, dia i '
  - type: text
    content: Israely
  - type: text
    content: ' sy i Joda? Izay miteny izany anefa dia tsy mihevitra ny vahoakako ho firenena intsony fa manevateva azy. '
  '25':
  - type: text
    content: 'Kanefa izao no lazaiko: Nanao fifanekena tamin’ny andro sy ny alina Aho, ary nametraka lalàna mifehy ny lanitra sy ny tany. '
  '26':
  - type: text
    content: Koa hariako ve ny taranak’i Jakôba sy ny an’i Davida mpanompoko? Holaviko ve ny hanendry lehibe hitondra ny taranak’i Abrahama sy i Itsehàka ary i Jakôba?
  - type: text
    content: «Tsia, fa hamerina azy amin’ny laoniny Aho ary hamindrafo aminy.»
  '3':
  - type: text
    content: 'Antsoy Aho, dia hamaly anao sady hampianatra anao zava-dehibe izay tsy takatry ny saina sady tsy mbola fantatrao. '
  '4':
  - type: text
    content: 'Izaho TOMPO Andriamanitr’i Israely dia milaza ny amin’ireo trano eto an-tanàna sy ny lapan’ny mpanjakan’i Joda fa rava avokoa ireo. Ny amin’ny tovon-tany fanafihana sy ny ady kosa dia izao: Tsy ilaina ny hanoherana ny Babilônianina fa hahafeno faty eto an-tanàna izany noho ny olona naripaky ny fahatezerako amam-pahavinirako. Fa ny haratsiana rehetra nataon’ny mponin’i Jerosalema no nahatonga Ahy tsy niraharaha ny tanànany.'
  '6':
  - type: text
    content: '«Kanefa indro Aho hitsabo an’i Jerosalema ka hahasitrana azy tanteraka; ary hasehoko mitafotafo amin’ny mponina indray ny fiadanana sy ny filaminana. '
  '7':
  - type: text
    content: 'Haveriko amin’ny laoniny indray i Joda sy i Israely ka hareniko ho tahaka ny fahiny. '
  '8':
  - type: text
    content: 'Hodioviko ho afaka amin’ny heloka rehetra izay nataony tamiko izy; eny, havelako ny heloka rehetra izay nikomiany tamiko. '
  '9':
  - type: text
    content: Ary hahafaly Ahy ny hanonona ny anaran’i Jerosalema, ka ho voninahitro sy haingoko eo imason’ny firenen-kafa rehetra ambonin’ny tany izy. Ary rehefa handre ny soa rehetra izay hataoko amin’i Jerosalema, ireo firenena ireo, dia hangovitry ny tahotra manoloana ny soa rehetra sy ny fiadanam-be izay hataoko aminy.»
  - type: heading
    content: '*'
