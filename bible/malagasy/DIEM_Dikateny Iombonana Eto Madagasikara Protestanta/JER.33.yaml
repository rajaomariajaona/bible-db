document_id: JER.33,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampanantenana vaovao ho an’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mbola voatana teo an-kianjan’ny trano fiambenana i Jeremià, dia nisy indray tenin’ny TOMPO fanindroany taminy nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny TOMPO:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ianareo vahoakan’i Joda dia mamerimberina hoe rava ny taninay ka tsy ahitana olona na biby fiompy intsony. Marina tokoa fa ny tanànan’i Joda sy ny lalamben’i Jerosalema dia foana ka tsy ahitana olona na biby fiompy monina ao intsony. Kanefa amin’izany toerana izany no mbola handrenesana indray '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny kotaban’ny fety sy ny horakora-pifaliana. Ho re ao indray ny hiran’ny mpanambady; ho re ao indray ny hira manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Derao ny TOMPOn’izao rehetra izao, fa tsara Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, maharitra mandrakizay ny fitiavany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Derao ny Tompo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 106.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izany no hiran’ireo mitondra sorom-pisaorana mankao an-tranoko. Eny, hoy Izaho TOMPO, haveriko amin’ny laoniny toy ny fahiny izany tany izany.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao koa no lazain’ny TOMPOn’izao rehetra izao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Eto amin’ity toerana rava ka tsy ahitana olona na biby fiompy ity sy amin’ny tanànany rehetra dia hisy faritra hampandrian’ireo mpiandry ondry ny biby fiompiny. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ao amin’ireo tanàna any an-tendrombohitra sy any Sefalà ary any Negeba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Negeba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 32.44 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ao amin’ny faritanin’i Benjamîna sy ny manodidina an’i Jerosalema ary ao amin’ireo tanànan’i Joda, hoy Izaho TOMPO, dia handalo eo anatrehan’ny mpiandry azy indray ny ondry aman’osy mba hisainy.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy hitsoaka amin’izay efa nampanantenainy Andriamanitra
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Indro avy ny andro izay hanatanterahako ny zava-tsoa nampanantenaiko ny vahoakan’i Israely sy ny vahoakan’i Joda. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Amin’izany andro sy fotoana izany, dia solofo mpandala ny hitsiny no hapoitrako ho an’i Davida. Izy no hampihatra ny rariny sy ny hitsiny eo amin’ny tany. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Amin’izay dia ho afaka ny fanjakan’i Joda ary hiaina am-pilaminana ny mponin’i Jerosalema. Ka ny hiantsoana an’i Jerosalema dia hoe ‹Ny TOMPO no fahamarinantsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.16 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 14-16:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Jer 23.5-6.
      marker-yv: yv-n
    - type: text
      text: .› »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao koa no lazain’ny TOMPO:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: «I Davida mpanjaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tamin’ny andron’i Jeremià dia efa maty tokony ho efajato taona taloha i Davida mpanjaka. Momba ny fampanantenana voatsiahy eto, jereo 2 Sam 7.12-16; 1 Mp 2.4; 1 Tan 17.11-14.
      marker-yv: yv-n
    - type: text
      text: ' dia tsy ho tapaka mpandimby azy eo amin’ny sezafiandrianan’i Israely. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ny mpisorona taranak’i Levỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Levỳ: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zanakalahin’i Jakôba fahatelo izy (Gen 29.34) ary razamben’i Aharôna (Eks 4.14). I Aharôna moa no razamben’ny mpisorona israelita araka ny Nom 18.7. Momba ireo taranaka hafan’i Levỳ sy ny asany, jereo Nom 3.5-10.
      marker-yv: yv-n
    - type: text
      text: ' tsy ho tapaka olona hijoro eo anatrehako hanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo, ary hampakatra ny eton’ny fanatitra sy ny sorom-pihavanana fanao isan’andro.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamin’i Jeremià nanao hoe:'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Izao no lazain’ny TOMPO, Ilay manao ny zava-mitranga ka mamolavola azy mba hitantanany azy, dia Ilay antsoina hoe TOMPO: '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Izao no lazain’ny TOMPO: Raha mahafoana ny fifanekena nataoko tamin’ny andro sy ny alina ianareo ka mahasakana ny andro sy ny alina tsy hiseho araka ny fotoanany, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia ho foana ny fanekempihavanana nataoko tamin’i Davida mpanompoko ka tsy hanana zanakalahy hipetraka eo amin’ny sezafiandrianany izy, ary tsy hisy koa ny mpisorona taranak’i Levỳ hanao fanompoam-pivavahana ho Ahy. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsia, fa ny taranak’i Davida mpanompoko sy ny an’ireo levita izay manao fanompoam-pivavahana ho Ahy dia ho maro tahaka ny kintana eny amin’ny lanitra ka tsy ho hita isa. ary toy ny fasika eny amoron-dranomasina ka tsy ho hita fatra.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary farany, dia nisy tenin’ny TOMPO tamin’i Jeremià nanao hoe:'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Tsy mba voamarikao angaha fa lazain’ny olona hoe nariako hono ireo fianakaviana roa nofidiko, dia i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' sy i Joda? Izay miteny izany anefa dia tsy mihevitra ny vahoakako ho firenena intsony fa manevateva azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa izao no lazaiko: Nanao fifanekena tamin’ny andro sy ny alina Aho, ary nametraka lalàna mifehy ny lanitra sy ny tany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa hariako ve ny taranak’i Jakôba sy ny an’i Davida mpanompoko? Holaviko ve ny hanendry lehibe hitondra ny taranak’i Abrahama sy i Itsehàka ary i Jakôba?
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Tsia, fa hamerina azy amin’ny laoniny Aho ary hamindrafo aminy.»
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Antsoy Aho, dia hamaly anao sady hampianatra anao zava-dehibe izay tsy takatry ny saina sady tsy mbola fantatrao. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izaho TOMPO Andriamanitr’i Israely dia milaza ny amin’ireo trano eto an-tanàna sy ny lapan’ny mpanjakan’i Joda fa rava avokoa ireo. Ny amin’ny tovon-tany fanafihana sy ny ady kosa dia izao: Tsy ilaina ny hanoherana ny Babilônianina fa hahafeno faty eto an-tanàna izany noho ny olona naripaky ny fahatezerako amam-pahavinirako. Fa ny haratsiana rehetra nataon’ny mponin’i Jerosalema no nahatonga Ahy tsy niraharaha ny tanànany.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Kanefa indro Aho hitsabo an’i Jerosalema ka hahasitrana azy tanteraka; ary hasehoko mitafotafo amin’ny mponina indray ny fiadanana sy ny filaminana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haveriko amin’ny laoniny indray i Joda sy i Israely ka hareniko ho tahaka ny fahiny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hodioviko ho afaka amin’ny heloka rehetra izay nataony tamiko izy; eny, havelako ny heloka rehetra izay nikomiany tamiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hahafaly Ahy ny hanonona ny anaran’i Jerosalema, ka ho voninahitro sy haingoko eo imason’ny firenen-kafa rehetra ambonin’ny tany izy. Ary rehefa handre ny soa rehetra izay hataoko amin’i Jerosalema, ireo firenena ireo, dia hangovitry ny tahotra manoloana ny soa rehetra sy ny fiadanam-be izay hataoko aminy.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
