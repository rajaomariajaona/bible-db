document_id: 2CO.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'I Paoly sy ireo mihambo ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Enga anie ka mba handefitra amiko ianareo amin’izao hadalana kely izao! Eny, mandefera amiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mandefera amiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mandefitra amiko.
    marker-yv: yv-n
  - type: text
    text: 'ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saro-piaro momba anareo aho, ary fahasaro-piaro avy amin’Andriamanitra izany; satria ianareo dia toy ny virijiny madio atolotra ho fofombadin’ny lehilahy anankiray, dia i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Saingy atahorako fandrao hihasimba ny toe-tsainareo, ka hilaozanareo ny firaiketam-po mahitsy sy madio amin’i Kristy, tahaka ny nahavoafitaka an’i Eva tamin’ny lainga tsara lahatra nataon’ny bibilava
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 3.1-6. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'firaiketam-po mahitsy sy madio:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy stf sasany tsy ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sy madio.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eny, leferinareo tsara raha misy olona tonga mitory Jesoa hafa noho ilay Jesoa notorînay; ary ianareo toa vonon-kandray fanahy hafa noho ilay Fanahy Masina efa azonareo, na vonon-kandray vaovao mahafaly hafa noho ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' efa noraisinareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Heveriko fa tsy misy mahalatsa-danja ahy velively amin’ireo apôstôly fanaperana ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na tsy ampy fahaiza-mandahateny aza aho, dia ampy fahalalana; nasehonay mazava tsara mandrakariva tamin’ny zavatra rehetra izany mba hahasoa anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fony aho nitory taminareo ny Vaovao Mahafaly avy amin’Andriamanitra, dia nanao izany maimaimpoana aho; moa diso ve aho, raha nanetry tena mba hisandratanareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nekeko ny nandoavan’ny Fiangonana sasany vola tamiko, ka tahaka ny hoe nandroba azy ireo aho mba hanampiako anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 8.1-4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fony teo aminareo aho, dia tsy nanahirana na iza na iza raha nisy zavatra nilaiko, satria ireo havana kristianina avy any Masedônia no nanome ahy ny zavatra nilaiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Fil 4.15-18.
    marker-yv: yv-n
  - type: text
    text: '; ary tamin’ny zavatra rehetra dia nitandrina tsara izay tsy hanahirana anareo aho sady mbola hitandrina izany ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I Kristy Izay ato amiko dia milaza ny marina hatrany, ka milaza marina aho fa tsy azo esorina amiko izany reharehako izany eran’ny faritany Akaîa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ahoana moa no ilazako izany? Satria tsy tiako ve ianareo? Andriamanitra no mahalala fa tiako ianareo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hataoko hatrany izao fanaoko izao, mba tsy hanan-kolazaina ry zareo te ho hita fa manahaka anay amin’izay ireharehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Apôstôly sandoka izy ireny, milaza lainga momba izay ataony, ka miova endrika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 7.15.
    marker-yv: yv-n
  - type: text
    text: ' ho apôstôlin’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy mahagaga izany satria hain’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' aza ny miova endrika ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' mamirapiratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa tsy sarotra ho an’ireo mpanompon’i Satàna ny miova endrika ho mpanompon’ilay Andriamanitra marina; kanefa ny hiafaran’ireo dia ho araka ny asany ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fijaliana niaretan’i Paoly amin’ny maha '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' azy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Antitranteriko ihany: aoka tsy hisy hanao ahy ho adala! Kanefa raha izany no iheveranareo ahy, dia raiso toy ny adala aho, mba hahazoako mirehareha kely koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izay lazaiko izao dia tsy araka ny Tompo no ilazako azy; fa miteny toy ny adala aho amin’izao toe-javatra ireharehako izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Satria maro no mirehareha araka ny maha olombelona, dia mba hirehareha araka izany koa aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hendry ianareo ka sitrakareo ny handefitra amin’ireo adala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eny, leferinareo raha misy manandevo anareo, raha misy mandàny anareo, raha misy maka ny anareo, raha misy manao zinona anareo, raha misy mamely ny tavanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hanalam-baràka ny tenanay no ilazako ho: osa loatra izahay ka tsy nahavita izany!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Kanefa izay sahin’ny olona lazaina – miteny toy ny adala aho – dia mba sahiko lazaina koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hebreo ve ireo apôstôly sandoka ireo? Izaho koa! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israelita
  - type: text
    text: ' ve izy ireo? izaho koa! Taranak’i Abrahama ve izy ireo? Izaho koa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Fil 3.5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mpanompon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ve izy ireo? Hiteny toy ny very saina aho: eny, mpanompon’i Kristy koa aho, ary mihoatra noho izy ireo; fa nisasatra mafy kokoa aho, natao am-ponja matetika kokoa, nokapohina bebe kokoa, tambavahoana imbetsaka kokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Indimy nokapohin’ny Jiosy aho, ka nandalasina in-39 misesy isaky ny mandeha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny rijan-teny grika fototra dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'inefapolo latsaka anankiray:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tsy tiana hihoarana ny isa ara-dalana voafetra ao amin’ny Fifan 25.3, dia ny kapoka inefapolo farafahabeny.'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: intelo nokaravasîn’ny Rômanina aho, ary indray maka saika matin’ny tora-bato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 16.22; 14.19.
    marker-yv: yv-n
  - type: text
    text: '; intelo vaky sambo aho, ary efa tavela teo anivon-dranomasina indray andro sy indray alina maninjitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Matetika nanao dia an-tongotra aho ka efa tojo ny loza isan-karazany: loza tamin’ny ony tondraka, loza tamin’ny jiolahy, loza avy amin’ny Jiosy mpiray firenena'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 9.23; 14.5.
    marker-yv: yv-n
  - type: text
    text: ' amiko, loza avy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ', loza tao an-tanàna, loza tany an-taniefitra, loza teny an-dranomasina, loza teo anivon’ny misandoka ho havana kristianina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Niasa mafy sy nisasatra aho, niari-tory matetika, nijalin’ny hanoanana sy hetaheta, tsy nitendry hanina matetika, niaritra hatsiaka sady tsy nanan-kitafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ankoatra izay tsy voalaza, dia mbola mitambesatra amiko isan’andro vaky ny fiahiana ny Fiangonana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Iza no malemy, ka tsy malemy aho? Iza no lavo tamin’ny fahotana, ka tsy malahelo mafy aho?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha tsy maintsy mirehareha aho, dia ireo zavatra mampiharihary ny fahalemeko no hataoko rehareha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Andriamanitra, Rain’i Jesoa Tompo, Ilay ankalazaina mandrakizay, dia mahalala fa tsy mandainga aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fony tany Damasy aho, ny governora notendren’i Hareta mpanjaka dia nampiambina ny tanàna Damasy mba hisamborana ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa nisy nampidina ahy an-tsobika avy teo amin’ny varavarankelin’ny mànda, ka dia afa-nandositra ny tanan’i Hareta aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.33 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 32-33:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 9.23-25. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hareta:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' i Hareta faha-IV, mpanjakan’ny Nabateanina (9 tal J.K. –39 aor J.K.) Ny tanin’ny Nabateanina dia tao atsimo tsy tao atsinanan’i Palestinina.'
    marker-yv: yv-n
  - type: text
    text: .
