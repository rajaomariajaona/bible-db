document_id: 2CO.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Paoly sy ireo mihambo ho apôstôly
  - type: text
    content: Enga anie ka mba handefitra amiko ianareo amin’izao hadalana kely izao! Eny, mandefera amiko
  - type: note
    content: 'mandefera amiko: na hoe mandefitra amiko.'
  - type: text
    content: 'ianareo! '
  '10':
  - type: text
    content: 'I Kristy Izay ato amiko dia milaza ny marina hatrany, ka milaza marina aho fa tsy azo esorina amiko izany reharehako izany eran’ny faritany Akaîa. '
  '11':
  - type: text
    content: Ahoana moa no ilazako izany? Satria tsy tiako ve ianareo? Andriamanitra no mahalala fa tiako ianareo!
  '12':
  - type: text
    content: 'Hataoko hatrany izao fanaoko izao, mba tsy hanan-kolazaina ry zareo te ho hita fa manahaka anay amin’izay ireharehany. '
  '13':
  - type: text
    content: Apôstôly sandoka izy ireny, milaza lainga momba izay ataony, ka miova endrika
  - type: note
    content: Ampit Mt 7.15.
  - type: text
    content: ' ho apôstôlin’i Kristy. '
  '14':
  - type: text
    content: 'Tsy mahagaga izany satria hain’i '
  - type: text
    content: Satàna
  - type: text
    content: ' aza ny miova endrika ho '
  - type: text
    content: anjely
  - type: text
    content: ' mamirapiratra. '
  '15':
  - type: text
    content: Koa tsy sarotra ho an’ireo mpanompon’i Satàna ny miova endrika ho mpanompon’ilay Andriamanitra marina; kanefa ny hiafaran’ireo dia ho araka ny asany ihany.
  - type: heading
    content: Fijaliana niaretan’i Paoly amin’ny maha apôstôly azy
  '16':
  - type: text
    content: 'Antitranteriko ihany: aoka tsy hisy hanao ahy ho adala! Kanefa raha izany no iheveranareo ahy, dia raiso toy ny adala aho, mba hahazoako mirehareha kely koa. '
  '17':
  - type: text
    content: 'Izay lazaiko izao dia tsy araka ny Tompo no ilazako azy; fa miteny toy ny adala aho amin’izao toe-javatra ireharehako izao. '
  '18':
  - type: text
    content: 'Satria maro no mirehareha araka ny maha olombelona, dia mba hirehareha araka izany koa aho. '
  '19':
  - type: text
    content: 'Fa hendry ianareo ka sitrakareo ny handefitra amin’ireo adala. '
  '2':
  - type: text
    content: 'Saro-piaro momba anareo aho, ary fahasaro-piaro avy amin’Andriamanitra izany; satria ianareo dia toy ny virijiny madio atolotra ho fofombadin’ny lehilahy anankiray, dia i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Eny, leferinareo raha misy manandevo anareo, raha misy mandàny anareo, raha misy maka ny anareo, raha misy manao zinona anareo, raha misy mamely ny tavanareo. '
  '21':
  - type: text
    content: 'Hanalam-baràka ny tenanay no ilazako ho: osa loatra izahay ka tsy nahavita izany!'
  - type: text
    content: 'Kanefa izay sahin’ny olona lazaina – miteny toy ny adala aho – dia mba sahiko lazaina koa. '
  '22':
  - type: text
    content: 'Hebreo ve ireo apôstôly sandoka ireo? Izaho koa! '
  - type: text
    content: Israelita
  - type: text
    content: ' ve izy ireo? izaho koa! Taranak’i Abrahama ve izy ireo? Izaho koa'
  - type: note
    content: Ampit Fil 3.5.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ve izy ireo? Hiteny toy ny very saina aho: eny, mpanompon’i Kristy koa aho, ary mihoatra noho izy ireo; fa nisasatra mafy kokoa aho, natao am-ponja matetika kokoa, nokapohina bebe kokoa, tambavahoana imbetsaka kokoa. '
  '24':
  - type: text
    content: Indimy nokapohin’ny Jiosy aho, ka nandalasina in-39 misesy isaky ny mandeha
  - type: note
    content: 'Ny rijan-teny grika fototra dia manao hoe inefapolo latsaka anankiray: tsy tiana hihoarana ny isa ara-dalana voafetra ao amin’ny Fifan 25.3, dia ny kapoka inefapolo farafahabeny.'
  - type: text
    content: '; '
  '25':
  - type: text
    content: intelo nokaravasîn’ny Rômanina aho, ary indray maka saika matin’ny tora-bato
  - type: note
    content: Jereo Asa 16.22; 14.19.
  - type: text
    content: '; intelo vaky sambo aho, ary efa tavela teo anivon-dranomasina indray andro sy indray alina maninjitra. '
  '26':
  - type: text
    content: 'Matetika nanao dia an-tongotra aho ka efa tojo ny loza isan-karazany: loza tamin’ny ony tondraka, loza tamin’ny jiolahy, loza avy amin’ny Jiosy mpiray firenena'
  - type: note
    content: Jereo Asa 9.23; 14.5.
  - type: text
    content: ' amiko, loza avy amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ', loza tao an-tanàna, loza tany an-taniefitra, loza teny an-dranomasina, loza teo anivon’ny misandoka ho havana kristianina. '
  '27':
  - type: text
    content: 'Niasa mafy sy nisasatra aho, niari-tory matetika, nijalin’ny hanoanana sy hetaheta, tsy nitendry hanina matetika, niaritra hatsiaka sady tsy nanan-kitafy. '
  '28':
  - type: text
    content: 'Ankoatra izay tsy voalaza, dia mbola mitambesatra amiko isan’andro vaky ny fiahiana ny Fiangonana rehetra. '
  '29':
  - type: text
    content: Iza no malemy, ka tsy malemy aho? Iza no lavo tamin’ny fahotana, ka tsy malahelo mafy aho?
  '3':
  - type: text
    content: Saingy atahorako fandrao hihasimba ny toe-tsainareo, ka hilaozanareo ny firaiketam-po mahitsy sy madio amin’i Kristy, tahaka ny nahavoafitaka an’i Eva tamin’ny lainga tsara lahatra nataon’ny bibilava
  - type: note
    content: 'Jereo Gen 3.1-6. –firaiketam-po mahitsy sy madio: misy stf sasany tsy ahitana ny hoe sy madio.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Raha tsy maintsy mirehareha aho, dia ireo zavatra mampiharihary ny fahalemeko no hataoko rehareha. '
  '31':
  - type: text
    content: 'Andriamanitra, Rain’i Jesoa Tompo, Ilay ankalazaina mandrakizay, dia mahalala fa tsy mandainga aho. '
  '32':
  - type: text
    content: 'Fony tany Damasy aho, ny governora notendren’i Hareta mpanjaka dia nampiambina ny tanàna Damasy mba hisamborana ahy. '
  '33':
  - type: text
    content: Fa nisy nampidina ahy an-tsobika avy teo amin’ny varavarankelin’ny mànda, ka dia afa-nandositra ny tanan’i Hareta aho
  - type: note
    content: 'And 32-33: jereo Asa 9.23-25. –Hareta: i Hareta faha-IV, mpanjakan’ny Nabateanina (9 tal J.K. –39 aor J.K.) Ny tanin’ny Nabateanina dia tao atsimo tsy tao atsinanan’i Palestinina.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Eny, leferinareo tsara raha misy olona tonga mitory Jesoa hafa noho ilay Jesoa notorînay; ary ianareo toa vonon-kandray fanahy hafa noho ilay Fanahy Masina efa azonareo, na vonon-kandray vaovao mahafaly hafa noho ilay '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' efa noraisinareo.'
  '5':
  - type: text
    content: 'Heveriko fa tsy misy mahalatsa-danja ahy velively amin’ireo apôstôly fanaperana ireo. '
  '6':
  - type: text
    content: Na tsy ampy fahaiza-mandahateny aza aho, dia ampy fahalalana; nasehonay mazava tsara mandrakariva tamin’ny zavatra rehetra izany mba hahasoa anareo.
  '7':
  - type: text
    content: 'Fony aho nitory taminareo ny Vaovao Mahafaly avy amin’Andriamanitra, dia nanao izany maimaimpoana aho; moa diso ve aho, raha nanetry tena mba hisandratanareo? '
  '8':
  - type: text
    content: Nekeko ny nandoavan’ny Fiangonana sasany vola tamiko, ka tahaka ny hoe nandroba azy ireo aho mba hanampiako anareo
  - type: note
    content: Ampit 8.1-4.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Fony teo aminareo aho, dia tsy nanahirana na iza na iza raha nisy zavatra nilaiko, satria ireo havana kristianina avy any Masedônia no nanome ahy ny zavatra nilaiko
  - type: note
    content: Ampit Fil 4.15-18.
  - type: text
    content: '; ary tamin’ny zavatra rehetra dia nitandrina tsara izay tsy hanahirana anareo aho sady mbola hitandrina izany ihany. '
