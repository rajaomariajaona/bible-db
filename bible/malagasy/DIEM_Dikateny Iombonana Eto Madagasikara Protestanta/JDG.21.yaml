document_id: JDG.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Velona indray ny fokon’i Benjamîna
  - type: text
    content: Fony nivory tao Mitsepà
  - type: note
    content: 'Mitsepà: jereo 20.1 sy nta.'
  - type: text
    content: ' ny lehilahy israelita, dia nianiana fa tsy hisy hanome ny zanany vavy hanambady lehilahy Benjaminita. '
  '10':
  - type: text
    content: 'Noho izany ny mpivory dia nandefa lehilahy mahery fo andiany 12 nankany Jabesy sady nanome baiko azy hoe:'
  - type: text
    content: '–Ndeha aringàno ny mponina ao Jabesy-Gilehada hatramin’ny zaza aman-behivavy. '
  '11':
  - type: text
    content: Vonoy ny lehilahy rehetra sy ny vehivavy rehetra izay efa nanam-bady. Izany no hataonareo.
  '12':
  - type: text
    content: Tamin’ny mponina tao Jabesy-Gilehada dia nahitana tovovavy efajato mbola virijiny, ka nentin’ireo iraka ho any amin’ny toby tao Silao
  - type: note
    content: 'Silao: jereo Jos 18.1 sy nta.'
  - type: text
    content: ', tao amin’ny tany Kanahàna. '
  '13':
  - type: text
    content: 'Avy eo ny vahoaka tafangona rehetra dia nandefa iraka nirary fihavanana tamin’ireo Benjaminita nandositra niery tao amin’ny harambaton’i Rimôna. '
  '14':
  - type: text
    content: Koa niverina nody tany aminy teo no ho eo ihany ireo Benjaminita; ary nomena ho vadiny ireo vehivavy sisa velona tao Jabesy-Gilehada, nefa tsy nahenina azy rehetra.
  '15':
  - type: text
    content: 'Fa onena tokoa ny vahoaka tamin’ireo Benjaminita, satria efa nanisy banga teo amin’ny fokon’i Israely ny TOMPO. '
  '16':
  - type: text
    content: 'Koa hoy ireo loholon’ny vahoaka tafangona teo hoe:'
  - type: text
    content: '–Tsy misy vehivavy intsony ao amin’ny foko benjaminita, koa inona no hataontsika mba hanomezana vady ho an’ireo lehilahy sisa? '
  '17':
  - type: text
    content: 'Fa tokony hisy taranaka mpandova ireo Benjaminita sisa velona mba tsy ho fongotra ny foko iray amin’i Israely. '
  '18':
  - type: text
    content: Kanefa tsy azontsika atao ny mamela azy ireo hanambady ny zanatsika vavy, satria efa nianiana isika fa ho voaozona izay Israelita hanome ny zanany vavy ho vadin’ny lehilahy benjaminita.
  '19':
  - type: text
    content: Tamin’izay dia tsaroan’ny loholona fa hisy ny fety fanao isan-taona ho an’ny TOMPO any Silao
  - type: note
    content: Toa fety fanao teo an-toerana izany, rehefa vita ny fiotazam-boaloboka.
  - type: text
    content: ' izay eo avaratr’i Betela sy ao atsimon’i Lebônà ary ao atsinanan’ny lalana mampitohy an’i Betela sy i Sekema. '
  '2':
  - type: text
    content: Fa tamin’izao indray mandeha izao kosa dia nankany Betela
  - type: note
    content: 'Betela: jereo Gen 12.8 sy nta.'
  - type: text
    content: ' ny vahoaka ary nijanona teo anatrehan’Andriamanitra mandra-paharivan’ny andro. Nitaraina mafy izy ireo ary nitomany fatratra '
  '20':
  - type: text
    content: 'Koa nanoro hevitra ireo lehilahy benjaminita izy hoe:'
  - type: text
    content: '–Mandehana miafina any anaty voaloboka, '
  '21':
  - type: text
    content: 'ka miandrasa ao. Rehefa mivoaka hiara-mandihy ireo tovovavin’i Silao, dia mipoira avy tao anaty voaloboka ianareo, ka samia misambotra tovovavy iray avy; dia ento miaraka aminareo any amin’ny faritanin’i Benjamîna izy mba ho vadinareo. '
  '22':
  - type: text
    content: 'Ary raha misy rainy na anadahiny tonga hitaraina aminay, dia hovalianay hoe: «Miangavy anareo izahay mba tsy ho sarotiny amin’ireo lehilahy benjaminita, satria tsy nahazo vehivavy ho azy ireo tsirairay avy izy tamin’ny ady tao Jabesy'
  - type: note
    content: Jereo and 10-14.
  - type: text
    content: . Ary satria tsy ianareo no nanome azy ny zanakareo vavy, dia tsy azo ampangaina ho meloka amin’ny fianianana ianareo».
  '23':
  - type: text
    content: 'Dia nanaraka io torohevitra io ny lehilahy benjaminita ka samy nisambotra vehivavy ho vadiny araka ny isany tamin’ireo tovovavy nandihy tao Silao; ary lasa niverina tany amin’ny zarataniny avy izy ka namboatra ny tanànany sy nonina tao. '
  '24':
  - type: text
    content: Ny Israelita hafa kosa dia nirava tamin’ny fivoriana ka samy namonjy ny fokony sy ny fianakaviany ary ny zarataniny avy.
  '25':
  - type: text
    content: Tamin’izany fotoana izany dia tsy mbola nisy mpanjaka tany Israely, ka samy nanao izay heveriny ho mety avy ny olona tsirairay.
  '3':
  - type: text
    content: 'sady nanao hoe:'
  - type: text
    content: –Ry TOMPO Andriamanitr’i Israely ô, inona no anton’izao mahalevona ny foko iray amin’Israely izao ankehitriny?
  '4':
  - type: text
    content: 'Ny ampitson’iny, dia nifoha maraina koa ny olona ka nanorina '
  - type: text
    content: alitara
  - type: text
    content: ' teo ary nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana. '
  '5':
  - type: text
    content: 'Dia nifanontany ny Israelita hoe:'
  - type: text
    content: –Tamin’ny fokon’i Israely rehetra, moa nisy foko tsy tonga tamin’ilay fivoriana natao teo anatrehan’ny TOMPO tao Mitsepà ve?
  - type: text
    content: 'Efa nianiana mafy manko ry zareo tamin’izay fa na iza na iza tsy tonga teo anatrehan’ny TOMPO tao Mitsepà dia hatao maty. '
  '6':
  - type: text
    content: 'Kanefa onena tokoa izy tamin’ireo Benjaminita mpiray firenena aminy, ka niteny hoe:'
  - type: text
    content: '–Foko iray eto amin’i Israely no mila ho levona androany. '
  '7':
  - type: text
    content: Inona no hataontsika mba hanomezana vady ho an’ireo lehilahy Benjaminita sisa velona, satria efa nianiana mafy teo anatrehan’ny TOMPO isika fa tsy hanome ny zanakavavintsika ho vadiny?
  '8':
  - type: text
    content: Dia nifanadihady teo izy mba hahalalana raha nisy vondron’olona tamin’ny fokon’i Israely tsy tonga niseho teo anatrehan’ny TOMPO tao Mitsepà. Koa hitany fa ny olona avy any Jabesy-Gilehada
  - type: note
    content: 'Jabesy-Gilehada: tanàna tokony ho 70 km ao avaratra atsinanan’i Jerosalema, eny ampitan’i Jôrdàna.'
  - type: text
    content: ' ihany no tsy tonga tao an-toby nivoriana. '
  '9':
  - type: text
    content: 'Fa rehefa natao ny fanisana ny mpandray anjara, dia tsy nisy vatan-dehilahy tonga avy any Jabesy na iray aza. '
