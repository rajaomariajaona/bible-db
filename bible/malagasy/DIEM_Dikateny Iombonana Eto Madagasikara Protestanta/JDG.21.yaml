document_id: JDG.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Velona indray ny fokon’i Benjamîna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fony nivory tao Mitsepà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mitsepà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 20.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ny lehilahy israelita, dia nianiana fa tsy hisy hanome ny zanany vavy hanambady lehilahy Benjaminita. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Noho izany ny mpivory dia nandefa lehilahy mahery fo andiany 12 nankany Jabesy sady nanome baiko azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha aringàno ny mponina ao Jabesy-Gilehada hatramin’ny zaza aman-behivavy. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Vonoy ny lehilahy rehetra sy ny vehivavy rehetra izay efa nanam-bady. Izany no hataonareo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tamin’ny mponina tao Jabesy-Gilehada dia nahitana tovovavy efajato mbola virijiny, ka nentin’ireo iraka ho any amin’ny toby tao Silao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Silao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jos 18.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', tao amin’ny tany Kanahàna. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Avy eo ny vahoaka tafangona rehetra dia nandefa iraka nirary fihavanana tamin’ireo Benjaminita nandositra niery tao amin’ny harambaton’i Rimôna. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Koa niverina nody tany aminy teo no ho eo ihany ireo Benjaminita; ary nomena ho vadiny ireo vehivavy sisa velona tao Jabesy-Gilehada, nefa tsy nahenina azy rehetra.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa onena tokoa ny vahoaka tamin’ireo Benjaminita, satria efa nanisy banga teo amin’ny fokon’i Israely ny TOMPO. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa hoy ireo loholon’ny vahoaka tafangona teo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy misy vehivavy intsony ao amin’ny foko benjaminita, koa inona no hataontsika mba hanomezana vady ho an’ireo lehilahy sisa? '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa tokony hisy taranaka mpandova ireo Benjaminita sisa velona mba tsy ho fongotra ny foko iray amin’i Israely. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Kanefa tsy azontsika atao ny mamela azy ireo hanambady ny zanatsika vavy, satria efa nianiana isika fa ho voaozona izay Israelita hanome ny zanany vavy ho vadin’ny lehilahy benjaminita.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tamin’izay dia tsaroan’ny loholona fa hisy ny fety fanao isan-taona ho an’ny TOMPO any Silao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toa fety fanao teo an-toerana izany, rehefa vita ny fiotazam-boaloboka.
      marker-yv: yv-n
    - type: text
      text: ' izay eo avaratr’i Betela sy ao atsimon’i Lebônà ary ao atsinanan’ny lalana mampitohy an’i Betela sy i Sekema. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa tamin’izao indray mandeha izao kosa dia nankany Betela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Betela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 12.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ny vahoaka ary nijanona teo anatrehan’Andriamanitra mandra-paharivan’ny andro. Nitaraina mafy izy ireo ary nitomany fatratra '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Koa nanoro hevitra ireo lehilahy benjaminita izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana miafina any anaty voaloboka, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ka miandrasa ao. Rehefa mivoaka hiara-mandihy ireo tovovavin’i Silao, dia mipoira avy tao anaty voaloboka ianareo, ka samia misambotra tovovavy iray avy; dia ento miaraka aminareo any amin’ny faritanin’i Benjamîna izy mba ho vadinareo. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary raha misy rainy na anadahiny tonga hitaraina aminay, dia hovalianay hoe: «Miangavy anareo izahay mba tsy ho sarotiny amin’ireo lehilahy benjaminita, satria tsy nahazo vehivavy ho azy ireo tsirairay avy izy tamin’ny ady tao Jabesy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo and 10-14.
      marker-yv: yv-n
    - type: text
      text: . Ary satria tsy ianareo no nanome azy ny zanakareo vavy, dia tsy azo ampangaina ho meloka amin’ny fianianana ianareo».
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nanaraka io torohevitra io ny lehilahy benjaminita ka samy nisambotra vehivavy ho vadiny araka ny isany tamin’ireo tovovavy nandihy tao Silao; ary lasa niverina tany amin’ny zarataniny avy izy ka namboatra ny tanànany sy nonina tao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny Israelita hafa kosa dia nirava tamin’ny fivoriana ka samy namonjy ny fokony sy ny fianakaviany ary ny zarataniny avy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tamin’izany fotoana izany dia tsy mbola nisy mpanjaka tany Israely, ka samy nanao izay heveriny ho mety avy ny olona tsirairay.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry TOMPO Andriamanitr’i Israely ô, inona no anton’izao mahalevona ny foko iray amin’Israely izao ankehitriny?
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny ampitson’iny, dia nifoha maraina koa ny olona ka nanorina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' teo ary nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorom-pihavanana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nifanontany ny Israelita hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tamin’ny fokon’i Israely rehetra, moa nisy foko tsy tonga tamin’ilay fivoriana natao teo anatrehan’ny TOMPO tao Mitsepà ve?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nianiana mafy manko ry zareo tamin’izay fa na iza na iza tsy tonga teo anatrehan’ny TOMPO tao Mitsepà dia hatao maty. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Kanefa onena tokoa izy tamin’ireo Benjaminita mpiray firenena aminy, ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Foko iray eto amin’i Israely no mila ho levona androany. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Inona no hataontsika mba hanomezana vady ho an’ireo lehilahy Benjaminita sisa velona, satria efa nianiana mafy teo anatrehan’ny TOMPO isika fa tsy hanome ny zanakavavintsika ho vadiny?
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia nifanadihady teo izy mba hahalalana raha nisy vondron’olona tamin’ny fokon’i Israely tsy tonga niseho teo anatrehan’ny TOMPO tao Mitsepà. Koa hitany fa ny olona avy any Jabesy-Gilehada
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jabesy-Gilehada: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna tokony ho 70 km ao avaratra atsinanan’i Jerosalema, eny ampitan’i Jôrdàna.
      marker-yv: yv-n
    - type: text
      text: ' ihany no tsy tonga tao an-toby nivoriana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa rehefa natao ny fanisana ny mpandray anjara, dia tsy nisy vatan-dehilahy tonga avy any Jabesy na iray aza. '
