document_id: PSA.79,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Avoty izahay, Tompo ô, satria voa mafy tokoa
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: Andriamanitra ô, nidiran’ireo hafa firenena ny taninao
  - type: text
    content: 'ka nozimbazimbainy ny '
  - type: text
    content: tempolinao
  - type: text
    content: ' masina'
  - type: text
    content: ary nataony korontam-bato i Jerosalema
  - type: note
    content: 'Momba ny fandravana an’i Jerosalema: jereo 2 Mp 25.8-10; 2 Tan 36.17-19; Jer 52.12-14.'
  - type: text
    content: .
  '10':
  - type: text
    content: 'Nahoana ny firenen-kafa no hanontany hoe:'
  - type: text
    content: «Aiza àry izay Andriamanitrareo
  - type: note
    content: Jereo Sal 42.4,11; Mi 7.10; Mal 2.17.
  - type: text
    content: ?»
  - type: text
    content: Aoka ho fantany sy hohitanay
  - type: text
    content: fa valianao ny ran’ireo mpanomponao
  - type: text
    content: izay novonoin’izy ireny ho faty!
  '11':
  - type: text
    content: Aoka ho tonga eo anatrehanao
  - type: text
    content: ny fitarainan’ireo voafonja!
  - type: text
    content: Araka ny haben’ny herinao
  - type: text
    content: no iarovy ny ain’ireo voaheloka ho faty.
  '12':
  - type: text
    content: Tompo ô, mba valio impito heny
  - type: text
    content: amin’ireo firenena mifanila aminay
  - type: text
    content: ny fanalàm-baràka nataony Anao.
  '13':
  - type: text
    content: Fa izahay vahoakanao,
  - type: text
    content: 'andian’ondry '
  - type: text
    content: fiandrinao
  - type: text
    content: ','
  - type: text
    content: dia hanolotra fisaorana Anao mandrakizay,
  - type: text
    content: hanambara ny fiderana Anao hatrany hatrany.
  '2':
  - type: text
    content: Ny fatin’ny mpanomponao,
  - type: text
    content: eny, ny nofon’ireo mpivavaka aminao,
  - type: text
    content: dia nomeny ho sakafon’ny papango
  - type: text
    content: ary natsipiny hohanin’ny bibidia.
  '3':
  - type: text
    content: Ny ran’ireo mpanomponao
  - type: text
    content: dia nataony mandriaka toy ny rano
  - type: text
    content: manerana an’i Jerosalema,
  - type: text
    content: ka tsy misy olona tavela handevina
  - type: note
    content: 'Ny tsy milevina am-pasana dia noheverina ho loza lehibe: jereo Jer 14.16; Mpitor 6.3; ampit Jer 36.30.'
  - type: text
    content: .
  '4':
  - type: text
    content: Tonga fandatsan’ny vahoaka hafa
  - type: text
    content: izay mpifanila aminay izahay,
  - type: text
    content: zary fihomehezana sy faneso
  - type: text
    content: ho an’ireo firenena manodidina anay.
  '5':
  - type: text
    content: TOMPO ô, mandra-pahoviana izahay
  - type: text
    content: no hitananao ny fahatezeranao
  - type: text
    content: sy ity fahasarotam-piaronao
  - type: text
    content: izay mandoro tahaka ny afo?
  '6':
  - type: text
    content: Aoka ireo firenen-kafa no hotezeranao,
  - type: text
    content: dia ireo firenena tsy mahalala Anao,
  - type: text
    content: ireo fanjakana tsy mivavaka aminao,
  '7':
  - type: text
    content: fa norobainy ny taranak’i Jakôba
  - type: text
    content: ary nosimbàny ny tany fonenany.
  '8':
  - type: text
    content: Aza tsaroana hamelezana anay
  - type: text
    content: ny heloka vitan’ireo talohanay;
  - type: text
    content: fa aoka ny famindramponao
  - type: text
    content: no ho tonga haingana hitsena anay,
  - type: text
    content: satria voa mafy tokoa izahay!
  '9':
  - type: text
    content: Andriamanitra mpamonjinay ô,
  - type: text
    content: vonjeo izahay noho ny voninahitrao;
  - type: text
    content: mba avelao re ny fahotanay,
  - type: text
    content: ka afaho izahay noho ny lazanao.
