verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny mpisorombe rehetra dia alaina amin’ny olona, ka tendrena ho solotenan’ny olona eo amin’ny fifandraisana amin’Andriamanitra. Natao hanolotra fanatitra izy ary koa natao hanolotra sorona ho fanalana ny fahotana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary dia nambaran’Andriamanitra ho Mpisorombe araka ny fomban’i Melkitsedeka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitandremana mba tsy hivadi-pinoana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manan-kolazaina betsaka izahay ny amin’izany, saingy sarotra hazavaina aminareo satria votsa fandray zavatra ianareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha izay ela izay, dia tokony ho efa mpampianatra ianareo, kanefa dia mbola mila hampianarina indray ny abidim-pahalalana momba ireo tenin’Andriamanitra. Ronono no mbola ilainareo, fa tsy ventin-kanina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay rehetra mivelona amin-dronono dia zaza ihany, ka tsy mbola mahatsapa ny zavatra diso sy marina
    - type: usfm
      marker: f
      children:
      - type: usfm
