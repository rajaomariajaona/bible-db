  '7':
  - type: text
    content: I Jesoa, fahavelony teto an-tany, dia nanolotra fivavahana sy fitalahoana nombàm-pitarainana mafy sy ranomaso be tamin’Andriamanitra, Izay afa-mamonjy Azy tsy hiharan’ny fahafatesana; ary dia nohenoin’Andriamanitra izy, ka afaka tamin’ny tahotra ny ho faty
  - type: note
    content: 'Jereo Mt 20.36-46; Mk 14.32-42; Lk 22.39-40. –izy, ka... faty: dkt hafa Izy noho ny fahatahorany an’Andriamanitra.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Na dia Zanak’Andriamanitra aza Izy, dia nianatra nanoa tamin’ny fijaliana niaretany. '
  '9':
  - type: text
    content: 'Nony efa tonga amin’izay fanaperana Izy, dia zary loharanom-pamonjena mandrakizay ho an’izay rehetra manoa Azy, '
