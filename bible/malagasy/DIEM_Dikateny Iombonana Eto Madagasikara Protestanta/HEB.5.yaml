type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa ny mpisorombe rehetra dia alaina amin’ny olona, ka tendrena ho solotenan’ny olona eo amin’ny fifandraisana amin’Andriamanitra. Natao hanolotra fanatitra izy ary koa natao hanolotra sorona ho fanalana ny fahotana. '
  '10':
  - type: text
    content: ary dia nambaran’Andriamanitra ho Mpisorombe araka ny fomban’i Melkitsedeka.
  - type: heading
    content: Fampitandremana mba tsy hivadi-pinoana
  '11':
  - type: text
    content: 'Manan-kolazaina betsaka izahay ny amin’izany, saingy sarotra hazavaina aminareo satria votsa fandray zavatra ianareo. '
  '12':
  - type: text
    content: 'Raha izay ela izay, dia tokony ho efa mpampianatra ianareo, kanefa dia mbola mila hampianarina indray ny abidim-pahalalana momba ireo tenin’Andriamanitra. Ronono no mbola ilainareo, fa tsy ventin-kanina. '
  '13':
  - type: text
    content: Fa izay rehetra mivelona amin-dronono dia zaza ihany, ka tsy mbola mahatsapa ny zavatra diso sy marina
  - type: note
    content: 'And 12-13: ampit 1Kôr 3.2.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Fa ho an’ny olon-dehibe ny ventin-kanina, dia ho an’ireo efa zatra nampiasa ny sainy hahay manavaka ny tsara sy ny ratsy.
  '2':
  - type: text
    content: 'Mahay mitondra mora ireo tsy mahalala sy maniasia izy, satria na ny tenany aza dia mba hodidinin’ny fahalemena koa. '
  '3':
  - type: text
    content: Noho izany fahalemen’ny tenany izany, dia tsy maintsy manolotra sorona fanalana ny fahotana izy ho an’ny tenany koa, toy ny ataony ho an’ny vahoaka
  - type: note
    content: Jereo Fisor 9.7.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ary tsy misy maka izany voninahitra maha mpisorombe izany ho an’ny tenany, afa-tsy izay voaantson’Andriamanitra tahaka an’i '
  - type: text
    content: Aharôna
  - type: text
    content: .
