segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ny mpisorombe rehetra dia alaina amin’ny olona, ka tendrena ho solotenan’ny olona eo amin’ny fifandraisana amin’Andriamanitra. Natao hanolotra fanatitra izy ary koa natao hanolotra sorona ho fanalana ny fahotana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mahay mitondra mora ireo tsy mahalala sy maniasia izy, satria na ny tenany aza dia mba hodidinin’ny fahalemena koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho izany fahalemen’ny tenany izany, dia tsy maintsy manolotra sorona fanalana ny fahotana izy ho an’ny tenany koa, toy ny ataony ho an’ny vahoaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Fisor 9.7.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary tsy misy maka izany voninahitra maha mpisorombe izany ho an’ny tenany, afa-tsy izay voaantson’Andriamanitra tahaka an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aharôna
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia toy izany koa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ': tsy Izy no nanome voninahitra ny tenany ho tonga Mpisorombe, fa ilay Andriamanitra nilaza taminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanako
  - type: text
    text: ' Ianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ray niteraka Anao Aho manomboka anio!»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izany koa dia araka ny teny hafa nataon’Andriamanitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ianao no Mpisorona mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny fomban’i Melkitsedeka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 5-6:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 2.7; Sal 110.4.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I Jesoa, fahavelony teto an-tany, dia nanolotra fivavahana sy fitalahoana nombàm-pitarainana mafy sy ranomaso be tamin’Andriamanitra, Izay afa-mamonjy Azy tsy hiharan’ny fahafatesana; ary dia nohenoin’Andriamanitra izy, ka afaka tamin’ny tahotra ny ho faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 20.36-46; Mk 14.32-42; Lk 22.39-40. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izy, ka... faty:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Izy noho ny fahatahorany an’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Na dia Zanak’Andriamanitra aza Izy, dia nianatra nanoa tamin’ny fijaliana niaretany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony efa tonga amin’izay fanaperana Izy, dia zary loharanom-pamonjena mandrakizay ho an’izay rehetra manoa Azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary dia nambaran’Andriamanitra ho Mpisorombe araka ny fomban’i Melkitsedeka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana mba tsy hivadi-pinoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manan-kolazaina betsaka izahay ny amin’izany, saingy sarotra hazavaina aminareo satria votsa fandray zavatra ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha izay ela izay, dia tokony ho efa mpampianatra ianareo, kanefa dia mbola mila hampianarina indray ny abidim-pahalalana momba ireo tenin’Andriamanitra. Ronono no mbola ilainareo, fa tsy ventin-kanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa izay rehetra mivelona amin-dronono dia zaza ihany, ka tsy mbola mahatsapa ny zavatra diso sy marina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 12-13:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 1Kôr 3.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ho an’ny olon-dehibe ny ventin-kanina, dia ho an’ireo efa zatra nampiasa ny sainy hahay manavaka ny tsara sy ny ratsy.
