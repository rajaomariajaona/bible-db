document_id: 1SA.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jônatàna manafika andiana Filistinina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray andro, dia hoy i Jônatàna zanakalahin’i Saoly tamin’ny zatovolahy mpitondra ny fitaovam-piadiany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha hotafihintsika ny tobin’ny miaramila Filistinina erỳ ampita erỳ.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nefa tsy nampandre an-drainy i Jônatàna. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I Saoly tamin’izay dia nipetraka teo an-tsisin’i Gibehà, teo ambanin’ny ampongabendanitr’i Migrôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gibehà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 10.5 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Migrôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toerana tsy fantatra mazava kanefa akaikin’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mikmasy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 13.2 sy nta).'
    marker-yv: yv-n
  - type: text
    text: ' niaraka tamin’ny miaramila tokony ho eninjato. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nisy mpisorona iray nisalotra efôda teo, dia i Ahià zanakalahin’i Ahitòba izay rahalahin’i Ikabôda. (Ity Ikabôda ity dia zanakalahin’i Pinehasa ary zafikelin’i Helỳ, izay mpisoron’ny TOMPO tao Silao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efôda: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fitaovana fitondran’ny mpisorombe ary ampiasaina hahafantarana ny sitrapon’Andriamanitra (jereo Eks 28.6 sy nta). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Helỳ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo toko 1–4. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Silao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 1.3 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ). Tsy nisy nahafantatra ny miaramila fa lasa i Jônatàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mba hahatrarany ny andiana miaramila filistinina, dia nitsofoka teo anelanelan’ny harambato marani-doha roa atao hoe Bôtsetsa sy Senè i Jônatàna; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ny voalohany dia nijoro teo amin’ny lafiny avaratra, manatrika an’i Mikmasy, ny faharoa kosa tamin’ny lafiny atsimo, manolotra an’i Gebà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gebà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy izany i Jônatàna tamin’ny mpanompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha hotafihintsika ny tobin’ireo tsy mifora ireo, sao mba homba antsika ihany ny TOMPO, fa tsy misy manakana AZY tsy hanome antsika ny fandresena, na maro isika na vitsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy kosa ilay mpanompo namaly azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy izay mahadiavolana ny fonao; alao hery, fa vonona hanaraka anao aho na aiza na aiza alehanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy ihany i Jônatàna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hanatona moramora ireo olona ireo isika ka hiseho aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha miteny amintsika izy hoe: «Aoka! Andraso fa ho eny aminareo izahay», dia hijanona eo amin’izay nisy antsika isika, ka tsy hiakatra eny aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha tàhiny kosa izy manao amintsika hoe: «Miakara etỳ aminay», dia hiakatra isika, satria izay no famantarana ho antsika fa natolotry ny TOMPO horesentsika ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nanolo-tena ho hitan’ny Filistinina izy roa lahy, ary hoy ny Filistinina: «Indreo ny Hebreo fa mivoaka ny lavaka fiereny.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Niantso mafy an’i Jônatàna sy ny mpanompony ireo miaramila filistinina ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miakara mankatỳ aminay, fa misy zavatra holazainay aminareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy i Jônatàna tamin’ny mpanompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miakara manaraka ahy fa efa natolotry ny TOMPO horesen’i Israely ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niakatra i Jônatàna, ka namikitra tongotra aman-tanana, ary nanaraka azy ny mpanompony. Nasian’i Jônatàna ireo Filistinina ka lavo ary novitain’ilay mpanompo nanaraka azy kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Io famelezana voalohany nafitsok’i Jônatàna sy ny mpanompony io, dia nahafatesana Filistinina roapolo lahy, voavono tao anatin’ny faritra sahabo ho ampahefatry ny hekitara. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nihorohoro ny Filistinina tafajanona tao an-toby sy ny mponina rehetra teny manodidina; tera-kovitra ihany koa mbamin’ny miaramila lohalalana sy ny mpanao vy very ny ainy. Nihovitrovitra ny tany; ka dia nisy fangitakitahana lehibe dia lehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tazan’ny mpitilin’i Saoly, avy tao Gibehàn’i Benjamîna, ny vahoaka filistinina nifanaritaka izaitsizy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ka hoy i Saoly tamin’ireo miaramilany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy ny fiantsoana anarana, ka jereo izay nitsoaka an-daharana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia natao ny fiantsoana anarana, ary tsapa ny tsy nahateo an’i Jônatàna sy ilay mpitondra ny fitaovam-piadiany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy i Saoly tamin’i Ahià mpisorona:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ento atỳ ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasin’ny Tompo
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: (Tamin’izany andro izany manko dia teo amin’ny tobin’ny Israelita ny Vatamasin’ny Tompo.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha mbola niteny tamin’ny mpisorona i Saoly, dia nihamafy ny kotaba tao amin’ny tobin’ny Filistinina. Ka hoy i Saoly tamin’i Ahià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ihany, tsoahy ny tananao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Novorin’i Saoly ny tafiny manontolo mba handeha hiady amin’ny Filistinina izay efa nifanjevo sy nifamono ho faty tamin’ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny Hebreo sasany izay nanompo ny Filistinina taloha sady niara-niakatra taminy ho any an-toby, dia nihodina nankamin’i Israely notarihin’i Saoly sy Jônatàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny Israelita rehetra kosa izay niery tany an-tendrombohitr’i Efraîma, raha nahare fa nandositra ny Filistinina, dia mba nanenjika azy ireo koa ka niady taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toy izany no nanomezan’ny TOMPO fandresena ho an’i Israely tamin’izay andro izay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny miaramila israelita mamonjy an’i Jônatàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: Nitatra ankoatran’i Bety-Avena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bety-Avena: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Reraka mafy ny Israelita tamin’io andro io, satria efa norahonan’i Saoly tamin’ny fampitandremana hoe: «Ho voaozona anie izay manendry hanina alohan’ny hariva mandra-pahatò ny valifatiko amin’ny fahavalo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fifadian-kanina nampanaovin’i Saoly dia toa fomba nokendrena hahazoana ny fanampian’Andriamanitra mba handresena.
    marker-yv: yv-n
  - type: text
    text: '!» Dia tsy nisy sahy nanendry hanina ny olon-drehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tonga tao amin’ny ala iray feno tantely nihanaka hatreny amin’ny tany ny besinimaro. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa tafiditra ny ala izy ireo, dia indro hitany ny tantely izay efa mitsororoka fotsiny; saingy tsy nisy sahy nikasika nihinana na iray aza fa natahotra ny ozona. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nefa i Jônatàna tsy mba nahafantatra ny fianianana nampanaovin-drainy ny besinimaro; koa avy hatrany dia nanatsoboka ny lohatehina teny an-tanany tamin’ny tantely izy ary nanao izany am-bava. Dia tonga nazava terỳ ny fijeriny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy ny miaramila iray taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny rainao anie efa nampianiana mafy ny vahoaka ombàn’ny fampitandremana hoe: «Ho voaozona anie izay manendry hanina anio!» Izany no nampahareraka ny vahoaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy i Jônatàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa nampidi-doza ny firenena ny raiko! Koa jereo fa toa nihanahazo hery aho hatramin’ny nihinanako kely tamin’ny tantely teo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy ho latsak’izany koa androany raha mba navela nihinana ny remby azony tamin’ny fahavalony ny miaramila, dia ho nihoa-pampana ny fahavoazan’ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tamin’io andro io dia resin’ny Israelita ny Filistinina ka nenjehiny nanomboka tao Mikmasy ka hatrany Aialôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mikmasy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.2 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Aialôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàna tokony ho 25 km tao andrefan’i Mikmasy.'
    marker-yv: yv-n
  - type: text
    text: '. Torovana loatra ny vahoaka, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'koa avy dia niantoraka tamin’ireo remby izy; nalainy avokoa na ondry na omby na zanak’omby, dia novonoiny ary nohaniny teo amin’ny toerana nandatsahany ny rany ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nisy nitatitra tamin’i Saoly fa manota amin’ny TOMPO ny olona satria mihinan-kena eo amin’ny nandatsahany ra azy. Ary hoy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpamadika ianareo! Izao ankehitriny izao dia manakodiava vato lehibe mankatỳ amiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Io '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vato lehibe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io dia natao alitara hanaovana sorona ny biby araka ny lalàna. Ampit Lev 19.26.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Avy eo dia miparitaha any amin’ny vahoaka ka asaivo mankatỳ amiko tsirairay izy miaraka amin’ny ombiny aman’ondriny avy. Hovonoiny eto izany ka hohaniny, mba tsy hanotany amin’ny TOMPO amin’ny fihinanana izany eo amin’ny toerana andatsahan-dra azy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’iny hariva iny dia samy nitondra ny bibiny avy ny olona ka namono azy tamin’io toerana io. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Toy izany no nanorenan’i Saoly '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ho an’ny TOMPO. Io no alitara voalohany izay naoriny ho AZY.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Avy eo dia hoy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha hanaovantsika latsaka alina ny Filistinina ka horobaintsika mandra-paharain’ny andro, ary dia tsy havelantsika hisy miangana na iray aza.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navalin’ny miaramila azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy izay mahadiavolana ny fonao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy kosa ny mpisorona hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha isika aloha haka hevitra amin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia nanontany an’Andriamanitra i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hidina hamely ny Filistinina ve aho? Hatolotrao horesen’i Israely ve izy?
- type: usfm
  marker: p
  children:
  - type: text
    text: Nefa tsy namaly azy Andriamanitra tamin’izay andro izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy i Saoly tamin’ny filohan’ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avia atỳ ianareo rehetra ka fantaro tsara izay fahotana natao androany. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Velona ny TOMPO mpamonjy an’i Israely ka mianiana aminy aho, fa tsy maintsy hatao maty izay nanao izany, na dia i Jônatàna zanako aza.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tsy nisy namaly azy ny vahoaka na iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa hoy indray i Saoly tamin’ny Israelita rehetra teo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitsangàna ianareo etỳ ankilany, fa izaho sy i Jônatàna zanako kosa etsy andaniny.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny miaramila taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy izay sitraky ny fonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ka hoy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry TOMPO Andriamanitr’i Israely ô, nahoana no tsy novalianao aho anikeheo? Ry TOMPO Andriamanitr’i Israely ô, valio amin’ny antsapaka masina aho. Raha avy tamin’i Jônatàna na tamiko ny fahadisoana, dia valio amin’ny Orîma; fa raha avy amin’ny miaramila kosa, dia valio amin’ny Tomîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ireo zavatra nantsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Orîma sy Tomîma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Eks 28.30.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Jônatàna sy i Saoly no voatendrin’ny antsapaka, fa ny vahoaka kosa afaka madiodio. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ka hoy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hatao antsapaka izaho sy i Jônatàna zanako.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Koa dia i Jônatàna no azo. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary hoy i Saoly taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tantarao amiko izay nataonao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia notantarain’i Jônatàna azy izany ka hoy izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nihinana tantely kely tamin’ny lohatehina teny amiko aho. Koa intỳ aho fa vonon-ko faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary hoy i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Enga anie hosazîn’Andriamanitra mafy tokoa aho, raha toa ka tsy hatao maty ianao, ry Jônatàna!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa hoy ny miaramila tamin’i Saoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho faty hoe i Jônatàna? Dia ilay nahatonga izao fandresena lehibe azon’i Israely izao! Sanatria azy izany! Fa velona ny TOMPO ka mianiana izahay fa tsy hisy singambolony na iray aza avelanay hilatsaka amin’ny tany, satria Andriamanitra mihitsy no nanampy azy tamin’izay nataony androany!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Izany no nanafahan’ny miaramila an’i Jônatàna, ka dia tsy maty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary natsahatr’i Saoly ny fanenjehana ny Filistinina, koa afaka nody tany amin’ny taniny izy ireny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fandresen’i Saoly. Ny fianakaviany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Rehefa tonga mpanjakan’i Israely i Saoly, dia niady tamin’ireo fahavalony rehetra izay nanodidina azy, izany hoe ny Môabita, ny Hamônita, ny Edômita, ny fanjakan’i Tsôbà ary ny Filistinina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.47 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny Môabita, ny Hamônita, ny Edômita, ny fanjakan’i Tsôbà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: firenena efatra samy any atsinanan’ny ony Jôrdàna. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Filistinina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': firenena tafaorina tao atsimo andrefan’i Palestinina, teo amin’ny morontsiraka mediteraneanina.'
    marker-yv: yv-n
  - type: text
    text: '. Fandresena hatrany no azony tamin’izay rehetra niadiany. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Niady tamin-kerim-po fatratra ka nandresy ny Hamalekita koa izy, ary dia nahafaka an’i Israely tamin’izay nandroba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Nanan-janaka lahy i Saoly, dia i Jônatàna sy i Jisvỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.49 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jisvỳ: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mety ho iray ihany amin’ilay antsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Isbahala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 2 Sam 2,8 sy nta).'
    marker-yv: yv-n
  - type: text
    text: ' ary i Melkisa; ny anaran-janany vavy roa kosa dia ireto: i Meràba ny zokiny, ary i Mikala ny zandriny. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ny anaram-badin’i Saoly kosa dia i Ahinôhama, zanakavavin’i Ahimahatsa. Ny jeneralin’ny tafiny dia Abinera, zanakalahin’i Nera rahalahin-drain’i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: I Kisy rain’i Saoly sy i Nera rain’i Abinera dia samy zanakalahin’i Abiela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Nafotaka tokoa ny ady tamin’ny Filistinina nandritra ny andro rehetra nanjakan’i Saoly. Koa izay lehilahy rehetra hitany fa matanjaka sy mahery fo, dia noraisiny ho ao amin’ny tafiny avokoa.
