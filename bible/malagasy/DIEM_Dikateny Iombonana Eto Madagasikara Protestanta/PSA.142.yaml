document_id: PSA.142,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ny Tompo no hany fialofan’izay enjehina
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tononkalo fananarana nataon’i Davida. Vavaka nataony fony izy tao anaty zohy
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '142.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 57.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantso mafy ny TOMPO aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitalaho mafy aminy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loarako eo anatrehany ny tarainako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambarako eo anatrehany ny fahoriako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha reraka ato anatiko aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fantatrao ny manjo ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo amin’ny lalana izorako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namelaram-pandrika hamely ahy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tazano eo ankavanako ka jereo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy olona mba miraika amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy toerana mba hialofako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy olona miahy ny aiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, TOMPO ô, no antsoiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy aho hoe: «Ianao no aroko'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady anjara voatokana ho ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eto amin’ity tany ivelomanay ity!»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho henonao anie ny tarainako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa reraka dia reraka tokoa aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho amin’ny mpanenjika aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahery noho izaho ireny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avoahy hiala ny tranomaiziko aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahazoako hidera ny anaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anivon’ny olo-marina hanodidina ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa nanisy soa ahy Ianao.
