document_id: PSA.142,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tompo no hany fialofan’izay enjehina
  - type: text
    content: ' '
  - type: text
    content: Tononkalo fananarana nataon’i Davida. Vavaka nataony fony izy tao anaty zohy
  - type: text
    content: ' '
  - type: note
    content: Jereo Sal 57.1 sy nta.
  - type: text
    content: .
  '2':
  - type: text
    content: Miantso mafy ny TOMPO aho,
  - type: text
    content: mitalaho mafy aminy.
  '3':
  - type: text
    content: Loarako eo anatrehany ny tarainako,
  - type: text
    content: ambarako eo anatrehany ny fahoriako.
  '4':
  - type: text
    content: Raha reraka ato anatiko aho,
  - type: text
    content: dia fantatrao ny manjo ahy.
  - type: text
    content: Eo amin’ny lalana izorako
  - type: text
    content: no namelaram-pandrika hamely ahy.
  '5':
  - type: text
    content: 'Tazano eo ankavanako ka jereo:'
  - type: text
    content: tsy misy olona mba miraika amiko,
  - type: text
    content: tsy misy toerana mba hialofako,
  - type: text
    content: tsy misy olona miahy ny aiko.
  '6':
  - type: text
    content: Ianao, TOMPO ô, no antsoiko.
  - type: text
    content: 'Hoy aho hoe: «Ianao no aroko'
  - type: text
    content: sady anjara voatokana ho ahy,
  - type: text
    content: eto amin’ity tany ivelomanay ity!»
  '7':
  - type: text
    content: Ho henonao anie ny tarainako,
  - type: text
    content: fa reraka dia reraka tokoa aho!
  - type: text
    content: Afaho amin’ny mpanenjika aho,
  - type: text
    content: fa mahery noho izaho ireny.
  '8':
  - type: text
    content: Avoahy hiala ny tranomaiziko aho
  - type: text
    content: mba hahazoako hidera ny anaranao
  - type: text
    content: eo anivon’ny olo-marina hanodidina ahy,
  - type: text
    content: rehefa nanisy soa ahy Ianao.
