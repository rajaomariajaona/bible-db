document_id: 2CH.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nataon’i Horama koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' halimo efamira, izay folo metatra ny lafiny ary dimy metatra ny haavony'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 27.1-2.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay fitobian-drano goavana sy ireo kovetabe
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 7.23-26)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ilay fitobian-drano goavana dia napetrany teo amin’ny lafiny havanana, teo amin’ny zorony atsimo atsinanana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa vitan’i Horama ny vilany fanangonan-davenona sy ny lapelina ary ny tsatokaty famafazana, dia efany avokoa ny asa izay nataony ho an’i Salômôna mpanjaka tao amin’ny tranon’Andriamanitra:'
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ny andry anankiroa,
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny koronosy boribory anankiroa teo an-tampon’ny andry,
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny harato anankiroa nafono ny koronosy,
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ny sarin’ampongabendanitra efajato nahantona tamin’ny harato roa, ka ampongabendanitra roa andalana isaky ny harato.
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nataon’i Horama ny kalesy mbamin’ireo kovetabe fametraka eo amboniny,
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: sy ilay fitobian-drano goavana mbamin’ny sarin’ombalahy 12 teo ambaniny,
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ary ny vilany fanangonan-davenona mbamin’ny lapelina sy ny fitrebika.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny kojakoja rehetra nataon’i Horama-Abỳ ho an’i Salômôna mpanjaka ho an’ny tranon’ny TOMPO, dia vita halimo mamiratra avokoa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tao amin’ny lohasahan’i Jôrdàna no nasain’i Salômôna narendrika tao amin’ny tany be tanimanga ireo kojakoja ireo, dia teo anelanelan’i Sokôta sy i Tseredatà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tseredatà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toa tsipelina diso na niova kely nanoratana ny anarana ho '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tsaretàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izany, jereo 1 Mp 7.46 sy nta. Misy tokoa ny toerana atao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tseredà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' saingy faritany hafa no ahitana azy (jereo 1 Mp 11.26).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nampanao fitaovana maro dia maro i Salômôna, hany ka tsy hay notombanana intsony izay lanjan’ny halimo nampiasaina.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampanaovin’i Salômôna natao koa ny kojakoja volamena rehetra izay nilaina tao amin’ny tranon’Andriamanitra, dia ireto avy:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' volamena,'
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny latabatra fametrahana ny mofo aterina ho an’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny alitara volamena '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fandoroana vovo-javamanitra no lazaina eto; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny mofo aterina ho an’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Lev 24.5-9.'
      marker-yv: yv-n
    - type: text
      text: ','
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao ilay fitobian-drano goavana boribory i Horama; halimo voaempo no nanefeny azy, ka nirefy dimy metatra ny savaivony, roa metatra sy sasany ny haavony, ary 15 metatra ny morony manodidina azy. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ny fitoeran-jiro mbamin’ny lelan-jiro hampirehetina eo anoloan’ny efitra masina indrindra, araka ny fomba, dia samy volamena madio avokoa,
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ny sary felam-boninkazo sy ny lelan-jiro ary ny hetin-jiro, izay momba ny fitoeran-jiro, dia samy volamena faran’izay tsara;
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ny antsy, ny tsatokaty famafazana, ny kaopy, ary ny fitoeran-davenon-jiro, dia samy volamena madio;
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny lelavaravarana, na ny mankao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina Indrindra
    - type: text
      text: ', na ny mankao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: efitrano malalaka
    - type: text
      text: ', dia samy volamena avokoa.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tambanin’ny molotr’ilay fitobian-drano goavana, tamin’ny manodidina azy manontolo, dia nisy sarin’ombalahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sarin’ombalahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ao amin’ny 1 Mp 7.24 kosa dia hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sarim-boatango
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (mitovitovy faneno ny voambolana hebreo anankiroa); kanefa mety no voatariky ny 4.4 etsy ambany ny kôpista nanao izany eto.'
      marker-yv: yv-n
    - type: text
      text: ' folo isaky ny antsasa-metatra; roa andalana ireo nifanongoa ireo ary niara-narendrika tamin’ilay fitobian-drano. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tambony sarin’ombilahy halimo 12 no nipetrahan’ilay fitobian-drano; ka ny telo nitodika nianavaratra, ny telo nitodika niankandrefana, ny telo nitodika nianatsimo, ary ny telo nitodika niantsinanana. Eny, ilay fitobian-drano goavana dia teo ambonin’ireo sarin’ombalahy izay nifampiamboho ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny hateviny dia valo santimetatra; ary ny molony dia natao tahaka ny molo-tsangambava ka miendrika felana lisy. Niaty 135 000 litatra eo ho eo izany fitobian-drano goavana izany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao ny kovetabe halimo folo i Horama mba ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanasàn-tsorona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny kovetabe... fanasàn-tsorona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Eks 30.17-21.
      marker-yv: yv-n
    - type: text
      text: ', ka ny dimy napetraka teo amin’ny ankavanana, fa ny dimy teo amin’ny ankavia; ny zavatra fanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo no nakobaka teo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny zavatra...teo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lev 1.9,13.
      marker-yv: yv-n
    - type: text
      text: . Ny fitobian-drano goavana kosa dia fidiovan’ny mpisorona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lisitra fitanisana mitambatra ireo fitaovana vita metaly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 7.40-51)
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao ny fitoeran-jiro volamena folo, araka ny toromarika, i Horama ka napetrany tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ', dimy teo amin’ny ankavanana ary dimy teo amin’ny ankavia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 25.31-40.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataony koa ny latabatra folo izay napetraka tao amin’ny Toeramasina, dimy teo amin’ny ankavanana ary dimy teo amin’ny ankavia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 25.23-30.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataony ny tsatokaty volamena miisa zato mba ho famafazana.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nataony ny kianjan’ny mpisorona sy ilay kianja hafa lehibe kokoa miaraka amin’ny lelavavahady izay nopetahana takelaka halimo.
