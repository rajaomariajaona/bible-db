document_id: 2CH.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia nataon’i Horama koa ny '
  - type: text
    content: alitara
  - type: text
    content: ' halimo efamira, izay folo metatra ny lafiny ary dimy metatra ny haavony'
  - type: note
    content: Ampit Eks 27.1-2.
  - type: text
    content: .
  - type: heading
    content: Ilay fitobian-drano goavana sy ireo kovetabe
  - type: heading
    content: (Jereo 1 Mp 7.23-26)
  '10':
  - type: text
    content: Ilay fitobian-drano goavana dia napetrany teo amin’ny lafiny havanana, teo amin’ny zorony atsimo atsinanana.
  '11':
  - type: text
    content: 'Rehefa vitan’i Horama ny vilany fanangonan-davenona sy ny lapelina ary ny tsatokaty famafazana, dia efany avokoa ny asa izay nataony ho an’i Salômôna mpanjaka tao amin’ny tranon’Andriamanitra:'
  '12':
  - type: text
    content: ny andry anankiroa,
  - type: text
    content: ny koronosy boribory anankiroa teo an-tampon’ny andry,
  - type: text
    content: ny harato anankiroa nafono ny koronosy,
  '13':
  - type: text
    content: ny sarin’ampongabendanitra efajato nahantona tamin’ny harato roa, ka ampongabendanitra roa andalana isaky ny harato.
  '14':
  - type: text
    content: Nataon’i Horama ny kalesy mbamin’ireo kovetabe fametraka eo amboniny,
  '15':
  - type: text
    content: sy ilay fitobian-drano goavana mbamin’ny sarin’ombalahy 12 teo ambaniny,
  '16':
  - type: text
    content: ary ny vilany fanangonan-davenona mbamin’ny lapelina sy ny fitrebika.
  - type: text
    content: 'Ny kojakoja rehetra nataon’i Horama-Abỳ ho an’i Salômôna mpanjaka ho an’ny tranon’ny TOMPO, dia vita halimo mamiratra avokoa. '
  '17':
  - type: text
    content: Tao amin’ny lohasahan’i Jôrdàna no nasain’i Salômôna narendrika tao amin’ny tany be tanimanga ireo kojakoja ireo, dia teo anelanelan’i Sokôta sy i Tseredatà
  - type: note
    content: 'Tseredatà: toa tsipelina diso na niova kely nanoratana ny anarana ho Tsaretàna izany, jereo 1 Mp 7.46 sy nta. Misy tokoa ny toerana atao hoe Tseredà saingy faritany hafa no ahitana azy (jereo 1 Mp 11.26).'
  - type: text
    content: '. '
  '18':
  - type: text
    content: Nampanao fitaovana maro dia maro i Salômôna, hany ka tsy hay notombanana intsony izay lanjan’ny halimo nampiasaina.
  '19':
  - type: text
    content: 'Nampanaovin’i Salômôna natao koa ny kojakoja volamena rehetra izay nilaina tao amin’ny tranon’Andriamanitra, dia ireto avy:'
  - type: text
    content: 'ny '
  - type: text
    content: alitara
  - type: text
    content: ' volamena,'
  - type: text
    content: ny latabatra fametrahana ny mofo aterina ho an’Andriamanitra
  - type: note
    content: 'ny alitara volamena fandoroana vovo-javamanitra no lazaina eto; ny mofo aterina ho an’Andriamanitra: jereo Lev 24.5-9.'
  - type: text
    content: ','
  '2':
  - type: text
    content: 'Dia nanao ilay fitobian-drano goavana boribory i Horama; halimo voaempo no nanefeny azy, ka nirefy dimy metatra ny savaivony, roa metatra sy sasany ny haavony, ary 15 metatra ny morony manodidina azy. '
  '20':
  - type: text
    content: ny fitoeran-jiro mbamin’ny lelan-jiro hampirehetina eo anoloan’ny efitra masina indrindra, araka ny fomba, dia samy volamena madio avokoa,
  '21':
  - type: text
    content: ny sary felam-boninkazo sy ny lelan-jiro ary ny hetin-jiro, izay momba ny fitoeran-jiro, dia samy volamena faran’izay tsara;
  '22':
  - type: text
    content: ny antsy, ny tsatokaty famafazana, ny kaopy, ary ny fitoeran-davenon-jiro, dia samy volamena madio;
  - type: text
    content: 'ny lelavaravarana, na ny mankao amin’ny '
  - type: text
    content: Toeramasina Indrindra
  - type: text
    content: ', na ny mankao amin’ny '
  - type: text
    content: efitrano malalaka
  - type: text
    content: ', dia samy volamena avokoa.'
  '3':
  - type: text
    content: Tambanin’ny molotr’ilay fitobian-drano goavana, tamin’ny manodidina azy manontolo, dia nisy sarin’ombalahy
  - type: note
    content: 'sarin’ombalahy: ao amin’ny 1 Mp 7.24 kosa dia hoe sarim-boatango (mitovitovy faneno ny voambolana hebreo anankiroa); kanefa mety no voatariky ny 4.4 etsy ambany ny kôpista nanao izany eto.'
  - type: text
    content: ' folo isaky ny antsasa-metatra; roa andalana ireo nifanongoa ireo ary niara-narendrika tamin’ilay fitobian-drano. '
  '4':
  - type: text
    content: 'Tambony sarin’ombilahy halimo 12 no nipetrahan’ilay fitobian-drano; ka ny telo nitodika nianavaratra, ny telo nitodika niankandrefana, ny telo nitodika nianatsimo, ary ny telo nitodika niantsinanana. Eny, ilay fitobian-drano goavana dia teo ambonin’ireo sarin’ombalahy izay nifampiamboho ireo. '
  '5':
  - type: text
    content: Ny hateviny dia valo santimetatra; ary ny molony dia natao tahaka ny molo-tsangambava ka miendrika felana lisy. Niaty 135 000 litatra eo ho eo izany fitobian-drano goavana izany.
  '6':
  - type: text
    content: 'Dia nanao ny kovetabe halimo folo i Horama mba ho '
  - type: text
    content: fanasàn-tsorona
  - type: note
    content: 'ny kovetabe... fanasàn-tsorona: ampit Eks 30.17-21.'
  - type: text
    content: ', ka ny dimy napetraka teo amin’ny ankavanana, fa ny dimy teo amin’ny ankavia; ny zavatra fanao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo no nakobaka teo'
  - type: note
    content: 'ny zavatra...teo: jereo Lev 1.9,13.'
  - type: text
    content: . Ny fitobian-drano goavana kosa dia fidiovan’ny mpisorona.
  - type: heading
    content: Ny lisitra fitanisana mitambatra ireo fitaovana vita metaly
  - type: heading
    content: (Jereo 1 Mp 7.40-51)
  '7':
  - type: text
    content: 'Dia nanao ny fitoeran-jiro volamena folo, araka ny toromarika, i Horama ka napetrany tao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ', dimy teo amin’ny ankavanana ary dimy teo amin’ny ankavia'
  - type: note
    content: Ampit Eks 25.31-40.
  - type: text
    content: .
  '8':
  - type: text
    content: Dia nataony koa ny latabatra folo izay napetraka tao amin’ny Toeramasina, dimy teo amin’ny ankavanana ary dimy teo amin’ny ankavia
  - type: note
    content: Ampit Eks 25.23-30.
  - type: text
    content: .
  - type: text
    content: Dia nataony ny tsatokaty volamena miisa zato mba ho famafazana.
  '9':
  - type: text
    content: Ary nataony ny kianjan’ny mpisorona sy ilay kianja hafa lehibe kokoa miaraka amin’ny lelavavahady izay nopetahana takelaka halimo.
