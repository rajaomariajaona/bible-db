document_id: 2CH.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanao fanitsiana ara-pivavahana i Asà
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 15.12-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamin’i Hazarià zanakalahin’i Hôdeda ny Fanahin’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka niainga hitsena an’i Asà izy ary nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mihainoa ahy, ry Asà mbaminareo Jodeanina sy i Benjaminita rehetra. Miaraka aminareo ny TOMPO, raha miaraka aminy ianareo. Raha mitady Azy ianareo, dia hahita Azy; fa raha mandao Azy ianareo, dia hilaozany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nandritra ny fotoana ela ny Israelita no tsy nanana an’ilay Andriamanitra marina, na mpisorona hampianatra na lalàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toa ny andron’ireo Mpitsara no tsiahivin’ny mpanoratra eto amin’ity and ity; ampit Mpits 2.10-23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa rehefa azom-pahoriana izy, dia niverina tamin’ny TOMPO Andriamanitr’i Israely, ka nitady Azy ary nahita Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’izay fotoana izay dia tsy afaka nifamoivoy tamim-pilaminana ny olona; fa horohoro be no nanjo ny mponina rehetra tamin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nifandringana ny firenena sy ny tanàna, satria Andriamanitra efa nampangorohoro azy tamin’ny fahoriana isan-karazany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa mahereza ianareo, fa aza miraviravy tanana; satria hisy valim-pitia tokoa ny ataonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehefa ren’i Asà izany teny izany na hoe ny faminanian’i Hazarià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' zanakalahin’i Hôdeda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'mpaminany Hazarià zanakalahin’i Hôdeda:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny RM dia hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpaminany Hôdeda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; kanefa toa nandingana teny ny mpandika (jereo 15.1 ary koa ny dkt tranainy latinina).
    marker-yv: yv-n
  - type: text
    text: ', dia nihasahy izy ka nanaisotra ny sampy tamin’ny faritanin’i Joda sy i Benjamîna manontolo ary tamin’ny tanàna izay azony tany amin’ny faritra be tendrombohitra any Efraîma. Avy eo dia nohavaoziny ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: 'n’ny TOMPO, izay teo anoloan’ny fidirana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nisy Israelita betsaka, avy tamin’ny foko efraîmita sy manasita ary simehônita, nifindra monina sy nanatona an’i Asà rehefa nahita fa niaraka tamin’i Asà ny TOMPO Andriamaniny. Novorîn’ny mpanjaka ireo mbamin’ny Jodeanina sy ny Benjaminita rehetra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka tafavory tokoa tao Jerosalema tamin’ny volana fahatelon’ny taona faha-15 nanjakàn’i Asà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Androtrizay no nanolorana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ho an’ny TOMPO tamin’ny babo izay nentiny, dia omby fitonjato sy ondry aman’osy fito arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nanao ny fanekempihavanana ny besinimaro fa samy vonon-kitady ny TOMPO Andriamanitry ny razany amin’ny fony manontolo sy amin’ny fanahiny manontolo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ka na iza na iza tsy mety mitady ny TOMPO Andriamanitr’i Israely, dia hatao maty, na kely na lehibe, na lahy na vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nianiana tamin’ny TOMPO izy ireo, ka nampombainy horakoraka sy fihobiana ary feon-trompetra sy anjomara izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nifalian’i Joda tsivakivolo io fianianana io, satria tamin’ny fony manontolo no nanaovany azy ary tamin’ny finiavany manontolo no nitadiavany ny TOMPO; ka dia nahita Azy tokoa ireo sady nomeny fiadanana tamin’ny sisin-tany manodidina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Na dia i Mahekà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 15.10 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' reniben’i Asà aza dia naetrin’ity mpanjaka tsy ho andriambavy intsony, noho izy efa nanao sarivongan-tsampin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: text
    text: '. Noravan’i Asà io sampy io, dia nomontsamontsaniny ary nodorany tao amin’ny lohasahan-driaka Kidrôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Kanefa tsy mbola foana teo amin’i Israely ny toeram-panasinana, na dia nahitsy fo hatrany aza i Asà tamin’ny androm-piainany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nampidiriny ho ao an-tranon’ny Tompo ireo zavatra voatokan-drainy sy voatokan’ny tenany, dia volafotsy sy volamena ary fanaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary tsy nisy ady intsony hatramin’ny taona faha-35 nanjakàn’i Asà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Kanefa jereo 1 Mp 15.16.
    marker-yv: yv-n
  - type: text
    text: .
