document_id: 2CH.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanao fanitsiana ara-pivavahana i Asà
  - type: heading
    content: (Jereo 1 Mp 15.12-15)
  - type: text
    content: 'Tonga tamin’i Hazarià zanakalahin’i Hôdeda ny Fanahin’Andriamanitra; '
  '10':
  - type: text
    content: 'ka tafavory tokoa tao Jerosalema tamin’ny volana fahatelon’ny taona faha-15 nanjakàn’i Asà. '
  '11':
  - type: text
    content: 'Androtrizay no nanolorana '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’ny TOMPO tamin’ny babo izay nentiny, dia omby fitonjato sy ondry aman’osy fito arivo. '
  '12':
  - type: text
    content: 'Ary nanao ny fanekempihavanana ny besinimaro fa samy vonon-kitady ny TOMPO Andriamanitry ny razany amin’ny fony manontolo sy amin’ny fanahiny manontolo; '
  '13':
  - type: text
    content: 'ka na iza na iza tsy mety mitady ny TOMPO Andriamanitr’i Israely, dia hatao maty, na kely na lehibe, na lahy na vavy. '
  '14':
  - type: text
    content: 'Ary nianiana tamin’ny TOMPO izy ireo, ka nampombainy horakoraka sy fihobiana ary feon-trompetra sy anjomara izany. '
  '15':
  - type: text
    content: Nifalian’i Joda tsivakivolo io fianianana io, satria tamin’ny fony manontolo no nanaovany azy ary tamin’ny finiavany manontolo no nitadiavany ny TOMPO; ka dia nahita Azy tokoa ireo sady nomeny fiadanana tamin’ny sisin-tany manodidina.
  '16':
  - type: text
    content: Na dia i Mahekà
  - type: note
    content: Jereo 1 Mp 15.10 sy nta.
  - type: text
    content: ' reniben’i Asà aza dia naetrin’ity mpanjaka tsy ho andriambavy intsony, noho izy efa nanao sarivongan-tsampin’i '
  - type: text
    content: Aserà
  - type: text
    content: '. Noravan’i Asà io sampy io, dia nomontsamontsaniny ary nodorany tao amin’ny lohasahan-driaka Kidrôna. '
  '17':
  - type: text
    content: 'Kanefa tsy mbola foana teo amin’i Israely ny toeram-panasinana, na dia nahitsy fo hatrany aza i Asà tamin’ny androm-piainany rehetra. '
  '18':
  - type: text
    content: Nampidiriny ho ao an-tranon’ny Tompo ireo zavatra voatokan-drainy sy voatokan’ny tenany, dia volafotsy sy volamena ary fanaka.
  '19':
  - type: text
    content: Ary tsy nisy ady intsony hatramin’ny taona faha-35 nanjakàn’i Asà
  - type: note
    content: Kanefa jereo 1 Mp 15.16.
  - type: text
    content: .
  '2':
  - type: text
    content: 'ka niainga hitsena an’i Asà izy ary nanao taminy hoe:'
  - type: text
    content: '–Mihainoa ahy, ry Asà mbaminareo Jodeanina sy i Benjaminita rehetra. Miaraka aminareo ny TOMPO, raha miaraka aminy ianareo. Raha mitady Azy ianareo, dia hahita Azy; fa raha mandao Azy ianareo, dia hilaozany. '
  '3':
  - type: text
    content: Nandritra ny fotoana ela ny Israelita no tsy nanana an’ilay Andriamanitra marina, na mpisorona hampianatra na lalàna
  - type: note
    content: Toa ny andron’ireo Mpitsara no tsiahivin’ny mpanoratra eto amin’ity and ity; ampit Mpits 2.10-23.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Fa rehefa azom-pahoriana izy, dia niverina tamin’ny TOMPO Andriamanitr’i Israely, ka nitady Azy ary nahita Azy. '
  '5':
  - type: text
    content: 'Tamin’izay fotoana izay dia tsy afaka nifamoivoy tamim-pilaminana ny olona; fa horohoro be no nanjo ny mponina rehetra tamin’ny tany. '
  '6':
  - type: text
    content: 'Nifandringana ny firenena sy ny tanàna, satria Andriamanitra efa nampangorohoro azy tamin’ny fahoriana isan-karazany. '
  '7':
  - type: text
    content: Koa mahereza ianareo, fa aza miraviravy tanana; satria hisy valim-pitia tokoa ny ataonareo.
  '8':
  - type: text
    content: 'Rehefa ren’i Asà izany teny izany na hoe ny faminanian’i Hazarià '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Hôdeda'
  - type: note
    content: 'mpaminany Hazarià zanakalahin’i Hôdeda: araka ny RM dia hoe mpaminany Hôdeda; kanefa toa nandingana teny ny mpandika (jereo 15.1 ary koa ny dkt tranainy latinina).'
  - type: text
    content: ', dia nihasahy izy ka nanaisotra ny sampy tamin’ny faritanin’i Joda sy i Benjamîna manontolo ary tamin’ny tanàna izay azony tany amin’ny faritra be tendrombohitra any Efraîma. Avy eo dia nohavaoziny ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO, izay teo anoloan’ny fidirana amin’ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Nisy Israelita betsaka, avy tamin’ny foko efraîmita sy manasita ary simehônita, nifindra monina sy nanatona an’i Asà rehefa nahita fa niaraka tamin’i Asà ny TOMPO Andriamaniny. Novorîn’ny mpanjaka ireo mbamin’ny Jodeanina sy ny Benjaminita rehetra '
