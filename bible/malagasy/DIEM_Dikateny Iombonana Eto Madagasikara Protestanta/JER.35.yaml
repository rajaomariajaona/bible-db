document_id: JER.35,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jeremià sy ny foko Rekabita
  - type: text
    content: Tamin’ny andron’i Jôiakima, zanakalahin’i Josià sady mpanjakan’i Joda
  - type: note
    content: Jereo 22.13 sy nta.
  - type: text
    content: ', dia tonga ho an’i Jeremià avy amin’ny TOMPO izao teny izao: '
  '10':
  - type: text
    content: 'fa mipetraka an-day. Koa ankatoavinay sy arahinay izay rehetra nanafaran’i Jônadaba razanay anay. '
  '11':
  - type: text
    content: Fa nony niakatra teto amin’ny tany i Nebokadnetsara mpanjakan’i Babilôna, dia nanapa-kevitra hiditra ato Jerosalema izahay mba handositra ny tafika babilônianina sy sirianina. Koa izany no ipetrahanay eto Jerosalema izao.
  '12':
  - type: text
    content: 'Dia nisy indray tenin’ny TOMPO ho an’i Jeremià nanao hoe:'
  '13':
  - type: text
    content: '«Mitenena amin’ny vahoakan’i Joda sy ny mponina eto Jerosalema ianao, ka ataovy hoe: Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Moa tsy tokony ho nandray anatra va ianareo ka ho nihaino izay nolazaiko, hoy ny teny hentitra avy amiko TOMPO? '
  '14':
  - type: text
    content: 'Fa i Jônadaba, zanakalahin’i Rekaba, dia nandidy ireo zanany mba tsy hisotro divay, ary nankatoavin’ny Rekabita ny teniny; ka tsy nikasika divay ireo mandraka androany, satria nitana ny hafa-drazany. Izaho anefa, na dia tsy nitsahatra nampitandrina anareo aza, dia tsy mba nohenoinareo akory. '
  '15':
  - type: text
    content: 'Tsy nitsahatra nandefa ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpanompoko rehetra nifandimby nankany aminareo Aho hilaza aminareo hoe: ‹Samia miala amin’ny lalan-dratsiny ka manaova ny tsara, atsaharo ny mifikitra amin’andriamani-kafa sy manao fanompoam-pivavahana ho azy, dia hahazo honina eto amin’ny tany efa nomeko anareo sy ny razanareo ianareo.› Kanefa tsy nanongilan-tsofina tamiko sady tsy nihaino Ahy ianareo. '
  '16':
  - type: text
    content: Ny Rekabita dia nankatò ny hafatra azony tamin’i Jônadaba razambeny, fa ianareo vahoakan’i Joda kosa tsy mba nihaino Ahy.»
  '17':
  - type: text
    content: 'Dia hoy koa i Jeremià hoe: «Noho izany, dia izao no lazain’ny TOMPO Andriamanitr’izao rehetra izao sady Andriamanitr’i Israely: Indro hahatonga ny loza izay voalazako taminareo Aho, ry vahoakan’i Joda sy ry mponin’i Jerosalema. Satria efa niteny taminareo Aho fa tsy nihaino ianareo, efa niantso anareo Aho fa tsy namaly ianareo.»'
  '18':
  - type: text
    content: 'Avy eo, dia hoy i Jeremià tamin’ny fokon’ny Rekabita: «Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Nitana ny hafatra azonareo tamin’i Jônadaba razanareo ianareo, ka nanatanteraka izany an-tsakany sy an-davany araka izay rehetra nanafarany anareo. '
  '19':
  - type: text
    content: Noho izany, amin’ny fianakavian’i Jônadaba zanakalahin’i Rekaba, dia hisy hatrany olona hijoro hanompo eo anatrehako. Izaho TOMPOn’izao rehetra izao sady Andriamanitr’i Israely no milaza izany.»
  '2':
  - type: text
    content: «Mandehana mankany amin’ny fokon’ny Rekabita
  - type: note
    content: 'Ny Rekabita: jereo 2 Mp 10.15-16; 1 Tan 2.55.'
  - type: text
    content: ' ka reseo lahatra izy mba hankao amin’ny efitra iray ao an-tranoko, dia rosoy divay hosotroiny.»'
  '3':
  - type: text
    content: 'Dia nandeha aho, ka naka an’i Jazanià, zanakalahin’i Jirmeià sady zafikelin’i Habatsinià, mbamin’ny rahalahin’io Jazanià io sy ny zanakalahiny rehetra, dia ny fokon’ny Rekabita manontolo. '
  '4':
  - type: text
    content: 'Nampidiriko tao amin’ny efitra iray tao an-tranon’ny TOMPO izy, dia tao amin’ny efitra voatokana ho an’ny mpianatr’i Hanàna, izay lehilahy masina sady zanakalahin’i Jigdalià. Io efitra io dia teo akaikin’ilay efitranon’ireo lehibe ary teo ambonin’ny an’i Mahaseià, zanakalahin’i Salòma izay mpisorona miambina ny varavarana fidirana amin’ny tempoly. '
  '5':
  - type: text
    content: 'Dia narosoko teo anoloan’ireo Rekabita ireo ny siny feno divay sy ny tsatokaty, ary hoy aho taminy:'
  - type: text
    content: –Misotroa divay ianareo!
  '6':
  - type: text
    content: 'Nefa namaly izy hoe:'
  - type: text
    content: '–Tsy misotro divay izahay, satria i Jônadaba, zanakalahin’i Rekaba sady razanay, dia efa nandidy anay hoe:'
  - type: text
    content: «Aza misotro divay na oviana na oviana,
  - type: text
    content: na ianareo na ny taranakareo.
  '7':
  - type: text
    content: Aza manao trano ianareo
  - type: text
    content: na mamboly ny tany
  - type: text
    content: na mamboly voaloboka,
  - type: text
    content: na manana tanimboaloboka;
  - type: text
    content: fa anaty trano lay ihany no hipetrahanareo
  - type: text
    content: mandritra ny androm-piainanareo rehetra,
  - type: text
    content: dia ho ela velona ianareo
  - type: text
    content: any amin’ny tany izay ivahinianareo any.»
  '8':
  - type: text
    content: 'Koa nankatoavinay ny tenin’i Jônadaba zanakalahin’i Rekaba sady razanay, tamin’izay rehetra nanafarany anay. Dia tsy misotro divay na oviana na oviana ny tenanay na ny vadinay na ny zanakay lahy na ny zanakay vavy. '
  '9':
  - type: text
    content: 'Tsy manao trano hipetrahanay izahay na manana tanimboaloboka na saha voavoly, '
