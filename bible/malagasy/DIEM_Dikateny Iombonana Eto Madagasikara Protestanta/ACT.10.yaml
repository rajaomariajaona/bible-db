document_id: ACT.10,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Petera sy i Kôrnely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tany Kesaria dia nisy lehilahy atao hoe Kôrnely, kapiteny tao amin’ny andian-tafika rômanina atao hoe «andian-tafika Italianina». '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary efa noana mafy izy ka te hisakafo; ny olona namboatra sakafo ho azy, izy kosa nisehoam-pahitana mahavariana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hitan’i Petera fa nisokatra ny lanitra ary nisy fasian-javatra nidina avy any: toa lamba lehibe voatana amin’ny zorony efatra, nalatsaka amin’ny tany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary tao anatiny dia nisy biby isan-karazany, ny mandeha tongotra efatra mbamin’ny mikisaka amin’ny tany, ary koa voro-manidina isan-karazany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nisy feo nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitsangàna, ry Petera, mamonoa ka mihinàna!
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy i Petera:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Sanatria, Tompoko! Tsy mbola nihinan-javatra fady na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 11.1-47; Ezek 4.14. Jereo FTS amin’ny voambolana hoe FAHADIOVANA.
      marker-yv: yv-n
    - type: text
      text: ' aho!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nefa dia mbola injay indray ilay feo nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izay efa nambaran’Andriamanitra fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mk 7.15, 19.
      marker-yv: yv-n
    - type: text
      text: ', dia aza ataonao ho fady.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Intelo niverina izany vao nakarina tany an-danitra ilay fasian-javatra.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Raha mbola nieritreritra izay tokony ho hevitr’ilay fahitana niseho taminy teo i Petera, dia tonga ireo irak’i Kôrnely. Nanontany tamin’olona izay tranon’i Simôna mpandon-koditra izy telo lahy ary efa migadona eo am-bavahady. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Niantso izy ireo ary nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miantrano ato ve i Simôna, ilay antsoina koa hoe Petera?
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mbola revo nieritreritra izay tokony ho hevitr’ilay fahitana i Petera no nitenenan’ny Fanahy Masina hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indreo misy olona telo lahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'olona telo lahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: olona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (miisa maro tsy voafaritra); ary misy stf anankiray ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: olona roa lahy.
      marker-yv: yv-n
    - type: text
      text: 'mitady anao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mpivavaka sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanaja
    - type: text
      text: ' an’Andriamanitra izy mbamin’ny ankohonany manontolo. Nanampy be dia be ny olo-mahantran’ny vahoaka jiosy i Kôrnely sady nivavaka tamin’Andriamanitra isaky ny fotoana voatendry. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mitsangàna, dia midîna ary aza misalasala fa mandehana miaraka aminy; satria Izaho no naniraka azy ireo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nidina i Petera ary nanatona azy telo lahy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho no ilay tadiavinareo. Inona no anton-dianareo?
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy izy telo lahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iraky ny kapiteny Kôrnely izahay. Izy dia lehilahy tia rariny sady mpanaja an’Andriamanitra no tsara laza amin’ny Jiosy rehetra. Notoroan’ny anjely masina hevitra izy mba hampaka anao ho any an-tranony ary hihaino izay zavatra hambaranao aminy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nampiantranoin’i Petera izy telo lahy ka nandry tao ny alin’iny. Ny ampitso kosa dia lasa i Petera niara-dia tamin’ireto iraka. Tafaraka tamin’i Petera koa ny havana sasany mpino avy ao Jôpa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ny afakampitso dia tonga tany Kesaria ry i Petera. Efa niandry azy ireo i Kôrnely sy ny havany aman-tsakaizany izay nasainy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Iny vao hiditra iny i Petera, dia nitsena azy i Kôrnely ary niantoraka teo an-tongony ho mari-panajana azy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa nampitsangana azy i Petera ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitsangàna ianao, fa izaho koa dia olombelona ihany!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Sady niresaka tamin’i Kôrnely i Petera no niditra tao an-trano ka nahita ny olona marobe tafavory tao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy izy tamin’ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatrareo fa ny Jiosy dia raran’ny fivavahany tsy hifanerasera amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' na hiditra ao an-tranony. Nefa nasehon’Andriamanitra tamiko fa tsy misy olona azoko atao hoe maloto na tsy mendrika hifaneraserana. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Noho izany, raha vao nampanalainao aho, dia tonga fa tsy nandà. Tiako ho fantatra àry izay anton’ny nampanalanao ahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Indray tolakandro, tokony ho tamin’ny telo, dia nisehoam-pahitana izy ary nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjelin
    - type: text
      text: '’Andriamanitra tazany mazava tsara niditra tao an-tranony ka niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Kôrnely!
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia novalian’i Kôrnely hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Telo andro lasa izay, tamin’ny telo tolakandro toy izao indrindra, dia nivavaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nivavaka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nivavaka sady nifady hanina.
      marker-yv: yv-n
    - type: text
      text: 'tato an-trano aho. Ary nisy lehilahy manao fitafiana mamirapiratra nijoro tampoka teo anatrehako, '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ka nilaza tamiko hoe: «Ry Kôrnely, nohenoin’Andriamanitra ny vavakao ary notsarovany koa ny fiantrana vitanao. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Noho izany, mandefasa olona ho any Jôpa haka an’i Simôna, izay antsoina koa hoe Petera. Ny iantranoany dia ao amin’i Simôna mpandon-koditra, eo amoron-dranomasina.» '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Nandefa olona haka anao niaraka tamin’izay aho, ka mahafinaritra ny nanekenao hankatỳ. Ankehitriny àry dia eto anatrehan’Andriamanitra izahay rehetra, mba hihaino ny hafatra rehetra nandidian’ny Tompo anao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lahatenin’i Petera tao an-tranon’i Kôrnely
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia niteny i Petera ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azoko tsara ankehitriny, fa tsy mba mijery tavan’olona Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 10.17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Eny, ankasitrahin’Andriamanitra avokoa izay olona manaja Azy sy manao ny rariny na aiza na aiza firenena misy azy. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Fantatrareo ny teny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia ny hafatra momba ny famonjena izay anambaràn’Andriamanitra fihavanana amin’ny olombelona (Is 52.7; Sal 107.20; 147.19).
      marker-yv: yv-n
    - type: text
      text: ' nampitondrain’Andriamanitra ho an’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ', anambaràny ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ': dia ny fampihavanana amin’ny alalan’i Jesoa Kristy, ilay Tompon’ny olona rehetra. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fantatrareo ny zava-nitranga tany Galilea aloha ary dia nanerana an’i Jodea, taorian’ny toriteny sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' nataon’i Jôhany: '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'nandrotsahan’Andriamanitra ny herin’ny Fanahy Masina i Jesoa avy any Nazareta, ka nitety tany nanao soa sy nanasitrana izay rehetra teo ambany fahefàn’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ', satria nombàn’Andriamanitra Izy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 4.18-21; Asa 1.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Izahay dia vavolombelona nahita ny zavatra rehetra nataony manerana ny tanin’ny Jiosy sy tao Jerosalema. Io Jesoa io dia nahanton’ny olona tamin’ny hazofijaliana no namonoany Azy, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nibanjina an’ilay anjely i Kôrnely ka raiki-tahotra sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana izay, tompoko?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny anjely taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tafakatra any amin’Andriamanitra ny vavaka sy ny fiantrana vitanao, ka ahatsiarovany anao. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'nefa natsangan’Andriamanitra ho velona tamin’ny andro fahatelo. Nasehon’Andriamanitra miharihary Izy, '
  '41':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: tsy tamin’ny vahoaka ankapobeny fa taminay vavolombelona efa notendren’Andriamanitra mialoha hanambara an’i Jesoa. Niara-nihinana sy nisotro taminy izahay taorian’ny nananganan’Andriamanitra Azy ho velona avy any amin’ny maty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 24.30, 42; Asa 1.4.
      marker-yv: yv-n
    - type: text
      text: '; '
  '42':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'ary nomeny baiko mba hitory amin’ny vahoaka sy ho vavolombelona manambara fa Izy no voatendrin’Andriamanitra ho Mpitsara ny velona sy ny maty. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Samy mijoro ho vavolombelona momba azy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' rehetra ka manambara fa izay rehetra mino Azy dia hahazo famelan-keloka amin’ny anarany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 53.5-6; Jer 31.34.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Mandray ny Fanahy Masina koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Raha mbola nilaza izany zavatra izany i Petera, dia nilatsahan’ny Fanahy Masina ny olona rehetra nihaino ny lahateniny. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Talanjona ireo mpino jiosy tafaraka tamin’i Petera, satria narotsaka tamin’ny hafa firenena koa ny Fanahy Masina fanomezan’Andriamanitra; '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'fa henony niteny tamin’ny fiteny tsy fantatra sady nankalaza an’Andriamanitra ny hafa firenena. Tamin’izay dia hoy i Petera hoe:'
  '47':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: '–Azo sakanana tsy hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' amin’ny rano ve ireto olona efa nandray ny Fanahy Masina tahaka antsika ireto?'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Dia nasain’i Petera natao batisa amin’ny anaran’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' izy rehetra. Ary nangatahin’izy ireo kosa i Petera mba hitoetra eo aminy andro vitsivitsy.'
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izao ankehitriny izao dia mandefasa lehilahy ho any Jôpa haka an’i Simôna, izay antsoina koa hoe Petera. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ao amin’ny mpandon-koditra atao hoe Simôna izay manan-trano eo amoron-dranomasina no iantranoany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa lasa ilay anjely niteny taminy teo, dia nantsoin’i Kôrnely ny roa lahy tamin’ny mpanompony sy ny miaramila anankiray mpivavaka, anisan’ireo mpanotrona azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nitantaran’ny kapiteny izay rehetra nitranga izy telo lahy ary dia nirahiny ho any Jôpa.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Raha mbola teny an-dalana ireto iraka ny ampitson’iny ka efa nanakaiky an’i Jôpa, dia niakatra tao an-tampon-trano kosa i Petera, tokony ho tamin’ny mitataovovonana, mba hivavaka. '
