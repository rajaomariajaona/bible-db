document_id: ACT.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Petera sy i Kôrnely
  - type: text
    content: 'Tany Kesaria dia nisy lehilahy atao hoe Kôrnely, kapiteny tao amin’ny andian-tafika rômanina atao hoe «andian-tafika Italianina». '
  '10':
  - type: text
    content: 'Ary efa noana mafy izy ka te hisakafo; ny olona namboatra sakafo ho azy, izy kosa nisehoam-pahitana mahavariana. '
  '11':
  - type: text
    content: 'Hitan’i Petera fa nisokatra ny lanitra ary nisy fasian-javatra nidina avy any: toa lamba lehibe voatana amin’ny zorony efatra, nalatsaka amin’ny tany. '
  '12':
  - type: text
    content: 'Ary tao anatiny dia nisy biby isan-karazany, ny mandeha tongotra efatra mbamin’ny mikisaka amin’ny tany, ary koa voro-manidina isan-karazany. '
  '13':
  - type: text
    content: 'Dia nisy feo nanao taminy hoe:'
  - type: text
    content: –Mitsangàna, ry Petera, mamonoa ka mihinàna!
  '14':
  - type: text
    content: 'Dia hoy i Petera:'
  - type: text
    content: '–Sanatria, Tompoko! Tsy mbola nihinan-javatra fady na '
  - type: text
    content: maloto
  - type: note
    content: Jereo Lev 11.1-47; Ezek 4.14. Jereo FTS amin’ny voambolana hoe FAHADIOVANA.
  - type: text
    content: ' aho!'
  '15':
  - type: text
    content: 'Nefa dia mbola injay indray ilay feo nanao taminy hoe:'
  - type: text
    content: '–Izay efa nambaran’Andriamanitra fa '
  - type: text
    content: madio
  - type: note
    content: Ampit Mk 7.15, 19.
  - type: text
    content: ', dia aza ataonao ho fady.'
  '16':
  - type: text
    content: Intelo niverina izany vao nakarina tany an-danitra ilay fasian-javatra.
  '17':
  - type: text
    content: 'Raha mbola nieritreritra izay tokony ho hevitr’ilay fahitana niseho taminy teo i Petera, dia tonga ireo irak’i Kôrnely. Nanontany tamin’olona izay tranon’i Simôna mpandon-koditra izy telo lahy ary efa migadona eo am-bavahady. '
  '18':
  - type: text
    content: 'Niantso izy ireo ary nanontany hoe:'
  - type: text
    content: –Miantrano ato ve i Simôna, ilay antsoina koa hoe Petera?
  '19':
  - type: text
    content: 'Mbola revo nieritreritra izay tokony ho hevitr’ilay fahitana i Petera no nitenenan’ny Fanahy Masina hoe:'
  - type: text
    content: –Indreo misy olona telo lahy
  - type: note
    content: 'olona telo lahy: misy stf sasany ahitana hoe olona (miisa maro tsy voafaritra); ary misy stf anankiray ahitana hoe olona roa lahy.'
  - type: text
    content: 'mitady anao. '
  '2':
  - type: text
    content: 'Mpivavaka sady '
  - type: text
    content: mpanaja
  - type: text
    content: ' an’Andriamanitra izy mbamin’ny ankohonany manontolo. Nanampy be dia be ny olo-mahantran’ny vahoaka jiosy i Kôrnely sady nivavaka tamin’Andriamanitra isaky ny fotoana voatendry. '
  '20':
  - type: text
    content: Mitsangàna, dia midîna ary aza misalasala fa mandehana miaraka aminy; satria Izaho no naniraka azy ireo.
  '21':
  - type: text
    content: 'Dia nidina i Petera ary nanatona azy telo lahy ka nanao hoe:'
  - type: text
    content: –Izaho no ilay tadiavinareo. Inona no anton-dianareo?
  '22':
  - type: text
    content: 'Dia hoy izy telo lahy:'
  - type: text
    content: –Iraky ny kapiteny Kôrnely izahay. Izy dia lehilahy tia rariny sady mpanaja an’Andriamanitra no tsara laza amin’ny Jiosy rehetra. Notoroan’ny anjely masina hevitra izy mba hampaka anao ho any an-tranony ary hihaino izay zavatra hambaranao aminy.
  '23':
  - type: text
    content: 'Nampiantranoin’i Petera izy telo lahy ka nandry tao ny alin’iny. Ny ampitso kosa dia lasa i Petera niara-dia tamin’ireto iraka. Tafaraka tamin’i Petera koa ny havana sasany mpino avy ao Jôpa. '
  '24':
  - type: text
    content: 'Ny afakampitso dia tonga tany Kesaria ry i Petera. Efa niandry azy ireo i Kôrnely sy ny havany aman-tsakaizany izay nasainy. '
  '25':
  - type: text
    content: 'Iny vao hiditra iny i Petera, dia nitsena azy i Kôrnely ary niantoraka teo an-tongony ho mari-panajana azy. '
  '26':
  - type: text
    content: 'Fa nampitsangana azy i Petera ka nanao hoe:'
  - type: text
    content: –Mitsangàna ianao, fa izaho koa dia olombelona ihany!
  '27':
  - type: text
    content: 'Sady niresaka tamin’i Kôrnely i Petera no niditra tao an-trano ka nahita ny olona marobe tafavory tao. '
  '28':
  - type: text
    content: 'Dia hoy izy tamin’ireo:'
  - type: text
    content: '–Fantatrareo fa ny Jiosy dia raran’ny fivavahany tsy hifanerasera amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' na hiditra ao an-tranony. Nefa nasehon’Andriamanitra tamiko fa tsy misy olona azoko atao hoe maloto na tsy mendrika hifaneraserana. '
  '29':
  - type: text
    content: Noho izany, raha vao nampanalainao aho, dia tonga fa tsy nandà. Tiako ho fantatra àry izay anton’ny nampanalanao ahy.
  '3':
  - type: text
    content: 'Indray tolakandro, tokony ho tamin’ny telo, dia nisehoam-pahitana izy ary nisy '
  - type: text
    content: anjelin
  - type: text
    content: '’Andriamanitra tazany mazava tsara niditra tao an-tranony ka niteny taminy hoe:'
  - type: text
    content: –Ry Kôrnely!
  '30':
  - type: text
    content: 'Dia novalian’i Kôrnely hoe:'
  - type: text
    content: –Telo andro lasa izay, tamin’ny telo tolakandro toy izao indrindra, dia nivavaka
  - type: note
    content: 'nivavaka: misy stf sasany ahitana hoe nivavaka sady nifady hanina.'
  - type: text
    content: 'tato an-trano aho. Ary nisy lehilahy manao fitafiana mamirapiratra nijoro tampoka teo anatrehako, '
  '31':
  - type: text
    content: 'ka nilaza tamiko hoe: «Ry Kôrnely, nohenoin’Andriamanitra ny vavakao ary notsarovany koa ny fiantrana vitanao. '
  '32':
  - type: text
    content: 'Noho izany, mandefasa olona ho any Jôpa haka an’i Simôna, izay antsoina koa hoe Petera. Ny iantranoany dia ao amin’i Simôna mpandon-koditra, eo amoron-dranomasina.» '
  '33':
  - type: text
    content: Nandefa olona haka anao niaraka tamin’izay aho, ka mahafinaritra ny nanekenao hankatỳ. Ankehitriny àry dia eto anatrehan’Andriamanitra izahay rehetra, mba hihaino ny hafatra rehetra nandidian’ny Tompo anao.
  - type: heading
    content: Ny lahatenin’i Petera tao an-tranon’i Kôrnely
  '34':
  - type: text
    content: 'Dia niteny i Petera ka nanao hoe:'
  - type: text
    content: –Azoko tsara ankehitriny, fa tsy mba mijery tavan’olona Andriamanitra
  - type: note
    content: Ampit Eks 10.17.
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Eny, ankasitrahin’Andriamanitra avokoa izay olona manaja Azy sy manao ny rariny na aiza na aiza firenena misy azy. '
  '36':
  - type: text
    content: Fantatrareo ny teny
  - type: note
    content: Dia ny hafatra momba ny famonjena izay anambaràn’Andriamanitra fihavanana amin’ny olombelona (Is 52.7; Sal 107.20; 147.19).
  - type: text
    content: ' nampitondrain’Andriamanitra ho an’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ', anambaràny ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ': dia ny fampihavanana amin’ny alalan’i Jesoa Kristy, ilay Tompon’ny olona rehetra. '
  '37':
  - type: text
    content: 'Fantatrareo ny zava-nitranga tany Galilea aloha ary dia nanerana an’i Jodea, taorian’ny toriteny sy ny '
  - type: text
    content: batisa
  - type: text
    content: ' nataon’i Jôhany: '
  '38':
  - type: text
    content: 'nandrotsahan’Andriamanitra ny herin’ny Fanahy Masina i Jesoa avy any Nazareta, ka nitety tany nanao soa sy nanasitrana izay rehetra teo ambany fahefàn’ny '
  - type: text
    content: devoly
  - type: text
    content: ', satria nombàn’Andriamanitra Izy'
  - type: note
    content: Jereo Lk 4.18-21; Asa 1.8 sy nta.
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'Izahay dia vavolombelona nahita ny zavatra rehetra nataony manerana ny tanin’ny Jiosy sy tao Jerosalema. Io Jesoa io dia nahanton’ny olona tamin’ny hazofijaliana no namonoany Azy, '
  '4':
  - type: text
    content: 'Nibanjina an’ilay anjely i Kôrnely ka raiki-tahotra sady nanao hoe:'
  - type: text
    content: –Ahoana izay, tompoko?
  - type: text
    content: 'Dia hoy ny anjely taminy:'
  - type: text
    content: '–Tafakatra any amin’Andriamanitra ny vavaka sy ny fiantrana vitanao, ka ahatsiarovany anao. '
  '40':
  - type: text
    content: 'nefa natsangan’Andriamanitra ho velona tamin’ny andro fahatelo. Nasehon’Andriamanitra miharihary Izy, '
  '41':
  - type: text
    content: tsy tamin’ny vahoaka ankapobeny fa taminay vavolombelona efa notendren’Andriamanitra mialoha hanambara an’i Jesoa. Niara-nihinana sy nisotro taminy izahay taorian’ny nananganan’Andriamanitra Azy ho velona avy any amin’ny maty
  - type: note
    content: Jereo Lk 24.30, 42; Asa 1.4.
  - type: text
    content: '; '
  '42':
  - type: text
    content: 'ary nomeny baiko mba hitory amin’ny vahoaka sy ho vavolombelona manambara fa Izy no voatendrin’Andriamanitra ho Mpitsara ny velona sy ny maty. '
  '43':
  - type: text
    content: 'Samy mijoro ho vavolombelona momba azy ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' rehetra ka manambara fa izay rehetra mino Azy dia hahazo famelan-keloka amin’ny anarany'
  - type: note
    content: Jereo Is 53.5-6; Jer 31.34.
  - type: text
    content: .
  - type: heading
    content: Mandray ny Fanahy Masina koa ny hafa firenena
  '44':
  - type: text
    content: 'Raha mbola nilaza izany zavatra izany i Petera, dia nilatsahan’ny Fanahy Masina ny olona rehetra nihaino ny lahateniny. '
  '45':
  - type: text
    content: 'Talanjona ireo mpino jiosy tafaraka tamin’i Petera, satria narotsaka tamin’ny hafa firenena koa ny Fanahy Masina fanomezan’Andriamanitra; '
  '46':
  - type: text
    content: 'fa henony niteny tamin’ny fiteny tsy fantatra sady nankalaza an’Andriamanitra ny hafa firenena. Tamin’izay dia hoy i Petera hoe:'
  '47':
  - type: text
    content: '–Azo sakanana tsy hatao '
  - type: text
    content: batisa
  - type: text
    content: ' amin’ny rano ve ireto olona efa nandray ny Fanahy Masina tahaka antsika ireto?'
  '48':
  - type: text
    content: 'Dia nasain’i Petera natao batisa amin’ny anaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' izy rehetra. Ary nangatahin’izy ireo kosa i Petera mba hitoetra eo aminy andro vitsivitsy.'
  '5':
  - type: text
    content: 'Izao ankehitriny izao dia mandefasa lehilahy ho any Jôpa haka an’i Simôna, izay antsoina koa hoe Petera. '
  '6':
  - type: text
    content: Ao amin’ny mpandon-koditra atao hoe Simôna izay manan-trano eo amoron-dranomasina no iantranoany.
  '7':
  - type: text
    content: 'Rehefa lasa ilay anjely niteny taminy teo, dia nantsoin’i Kôrnely ny roa lahy tamin’ny mpanompony sy ny miaramila anankiray mpivavaka, anisan’ireo mpanotrona azy. '
  '8':
  - type: text
    content: Nitantaran’ny kapiteny izay rehetra nitranga izy telo lahy ary dia nirahiny ho any Jôpa.
  '9':
  - type: text
    content: 'Raha mbola teny an-dalana ireto iraka ny ampitson’iny ka efa nanakaiky an’i Jôpa, dia niakatra tao an-tampon-trano kosa i Petera, tokony ho tamin’ny mitataovovonana, mba hivavaka. '
