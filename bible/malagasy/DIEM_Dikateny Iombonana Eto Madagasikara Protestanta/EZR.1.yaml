document_id: EZR.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Avelan’i Kirôsa haorina indray ny tempoly
  - type: text
    content: 'Tamin’ny taona voalohany nanjakàn’i Kirôsa amperôran’i Persia no tanteraka ny teny nampilazain’ny TOMPO an’i Jeremià '
  - type: text
    content: mpaminany
  - type: note
    content: 'Ny and 1-2 sy ny fanombohan’ny and 3 dia mamerina ara-bakiteny ny rijan-teny famaranana ao amin’ny 2 Tan 36.22-23. –I Kirôsa dia amperôran’i Persia, taona 558-528 tal J.K. Tamin’ny fararanon’ny taona 539, rehefa nahazo an’i Babilôna i Kirôsa, dia nisantatra fanjakana vaovao amin’ny maha «mpanjakan’i Babilôna» azy; ny taona voalohan’io fanjakana vaovao io (taona 538 tal J.K.) no tsahivin’ny and 1. –nampilazain’ny...mpaminany: jereo Jer 25.11-12; 29.10.'
  - type: text
    content: '. Nanaitra fanahy an’i Kirôsa manko tamin’izay ny TOMPO ka nahatonga azy hampiely an-kabary sy an-tsoratra eran’ny fanjakany manontolo ireto hafatra ireto: '
  '10':
  - type: text
    content: 'koveta volamena telopolo; koveta volafotsy 410; fitaovana hafa arivo. '
  '11':
  - type: text
    content: Ny isan’ny fanaka volamena sy volafotsy rehetra dia 5 400; ka nentin’i Sesebatsàro ireo, fony niakatra avy tany Babilôna ho any Jerosalema ny voasesitany.
  '2':
  - type: text
    content: '«Izao no lazain’i Kirôsa amperôran’i Persia. Ny TOMPO Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: ' dia efa nanome ahy ny fanjakana rehetra ambonin’ny tany ary efa nandidy ahy hanorina '
  - type: text
    content: tempoly
  - type: text
    content: ' ho Azy any Jerosalema, izay ao amin’ny tanin’i Joda'
  - type: note
    content: Jereo Is 44.28.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Koa aoka ianareo rehetra anisan’ny vahoakan’ny Tompo mba hiakatra any Jerosalema, ao amin’ny tanin’i Joda, ka hanorina indray ny tranon’ny TOMPO Andriamanitr’i Israely, dia ilay Andriamanitra Izay ivavahana ao Jerosalema. Homba anareo anie ilay Andriamanitrareo! '
  '4':
  - type: text
    content: Na aiza na aiza onenan’ireo sisa tavela amin’izany vahoaka izany dia aoka ny tompontany hanome azy volafotsy sy volamena ary koa fananana hafa sy biby fiompy mbamin’ny fanatitra an-tsitrapo ho an’ilay tranon’Andriamanitra any Jerosalema.»
  '5':
  - type: text
    content: 'Dia nioman-kiainga ny loham-pianakaviana tamin’ny fokon’i Joda sy ny fokon’i Benjamîna mbamin’ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: ', izany hoe izay rehetra nampirisihin’ny TOMPO Andriamanitra hiakatra hanorina ilay tranony any Jerosalema. '
  '6':
  - type: text
    content: Ny olona rehetra nifanakaiky taminy dia nanampy azy tamin’ny fanaka volafotsy sy volamena, fananana hafa sy biby fiompy ary zavatra sarobidy mbamin’ny fanomezana an-tsitrapo ho an’ny tempoly.
  '7':
  - type: text
    content: Nasain’ny amperôra Kirôsa navoaka ireo fanaky ny tranon’ny TOMPO, dia ny fanaka nalain’i Nebokadnetsara tany Jerosalema
  - type: note
    content: Jereo 2 Mp 25.13-15.
  - type: text
    content: ' ka efa napetrany tao an-tranon’ireo andriamaniny. '
  '8':
  - type: text
    content: 'I Mitredata, mpitahiry ny harem-panjakana, no nasainy namoaka ireny fanaka ireny sy nanisa azy ary nanolotra azy tamin’i Sesebatsàro, taranaky ny mpanjakan’i Joda. '
  '9':
  - type: text
    content: 'Izao no isany: lovia volamena telopolo; lovia volafotsy arivo; antsy 29'
  - type: note
    content: 'antsy: tsy azo antoka loatra ny hevitry ny voambolana hebreo.'
  - type: text
    content: '; '
