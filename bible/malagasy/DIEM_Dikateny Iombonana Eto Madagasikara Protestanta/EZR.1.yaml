document_id: EZR.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avelan’i Kirôsa haorina indray ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona voalohany nanjakàn’i Kirôsa amperôran’i Persia no tanteraka ny teny nampilazain’ny TOMPO an’i Jeremià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny and 1-2 sy ny fanombohan’ny and 3 dia mamerina ara-bakiteny ny rijan-teny famaranana ao amin’ny 2 Tan 36.22-23. –I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kirôsa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amperôran’i Persia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', taona 558-528 tal J.K. Tamin’ny fararanon’ny taona 539, rehefa nahazo an’i Babilôna i Kirôsa, dia nisantatra fanjakana vaovao amin’ny maha «mpanjakan’i Babilôna» azy; ny taona voalohan’io fanjakana vaovao io (taona 538 tal J.K.) no tsahivin’ny and 1. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: nampilazain’ny...mpaminany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Jer 25.11-12; 29.10.'
      marker-yv: yv-n
    - type: text
      text: '. Nanaitra fanahy an’i Kirôsa manko tamin’izay ny TOMPO ka nahatonga azy hampiely an-kabary sy an-tsoratra eran’ny fanjakany manontolo ireto hafatra ireto: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'koveta volamena telopolo; koveta volafotsy 410; fitaovana hafa arivo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny isan’ny fanaka volamena sy volafotsy rehetra dia 5 400; ka nentin’i Sesebatsàro ireo, fony niakatra avy tany Babilôna ho any Jerosalema ny voasesitany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Izao no lazain’i Kirôsa amperôran’i Persia. Ny TOMPO Andriamanitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lanitra
    - type: text
      text: ' dia efa nanome ahy ny fanjakana rehetra ambonin’ny tany ary efa nandidy ahy hanorina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ho Azy any Jerosalema, izay ao amin’ny tanin’i Joda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 44.28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa aoka ianareo rehetra anisan’ny vahoakan’ny Tompo mba hiakatra any Jerosalema, ao amin’ny tanin’i Joda, ka hanorina indray ny tranon’ny TOMPO Andriamanitr’i Israely, dia ilay Andriamanitra Izay ivavahana ao Jerosalema. Homba anareo anie ilay Andriamanitrareo! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Na aiza na aiza onenan’ireo sisa tavela amin’izany vahoaka izany dia aoka ny tompontany hanome azy volafotsy sy volamena ary koa fananana hafa sy biby fiompy mbamin’ny fanatitra an-tsitrapo ho an’ilay tranon’Andriamanitra any Jerosalema.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nioman-kiainga ny loham-pianakaviana tamin’ny fokon’i Joda sy ny fokon’i Benjamîna mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ', izany hoe izay rehetra nampirisihin’ny TOMPO Andriamanitra hiakatra hanorina ilay tranony any Jerosalema. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny olona rehetra nifanakaiky taminy dia nanampy azy tamin’ny fanaka volafotsy sy volamena, fananana hafa sy biby fiompy ary zavatra sarobidy mbamin’ny fanomezana an-tsitrapo ho an’ny tempoly.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nasain’ny amperôra Kirôsa navoaka ireo fanaky ny tranon’ny TOMPO, dia ny fanaka nalain’i Nebokadnetsara tany Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 25.13-15.
      marker-yv: yv-n
    - type: text
      text: ' ka efa napetrany tao an-tranon’ireo andriamaniny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I Mitredata, mpitahiry ny harem-panjakana, no nasainy namoaka ireny fanaka ireny sy nanisa azy ary nanolotra azy tamin’i Sesebatsàro, taranaky ny mpanjakan’i Joda. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izao no isany: lovia volamena telopolo; lovia volafotsy arivo; antsy 29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'antsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy azo antoka loatra ny hevitry ny voambolana hebreo.
      marker-yv: yv-n
    - type: text
      text: '; '
