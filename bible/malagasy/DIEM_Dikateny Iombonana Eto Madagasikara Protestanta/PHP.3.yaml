document_id: PHP.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahamarinana omen’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Farany, ry havako, mifalia noho ianareo tafaray amin’ny Tompo. Tsy manahirana ahy ny mamerina aminareo indray ny teny nosoratako ho anareo, sady azonareo toky tsara amin’izay. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hany iriko dia ny hahalalako an’i Kristy, ka hahatsapako ny herin’ny fitsanganany ho velona sy hiombonako fijaliana aminy ary hanahafako Azy amin’ny fahafatesany; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: koa manantena aho amin’izany fa hahatratra ny zava-kendrena, dia ny hitsanganan’Andriamanitra ho velona avy any amin’ny maty.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miezaka ho tafita
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mihambo ho efa tafita aho na ho efa tanteraka; fa miezaka hatrany aho hahazo ny amboaran’ny hazakazaka, satria izany no efa nahazoan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa ahy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry havana, tsy mihevi-tena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy mihevi-tena: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy mbola mihevi-tena.
      marker-yv: yv-n
    - type: text
      text: 'ho efa nahazo ny amboara sahady aho; fa zavatra iray ihany no ataoko: manadino ny efa nodiaviko ka mikely aina fatratra ho tody amin’izay kendrena. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miezaka hahatratra ny tanjona aho mba hahazoako ny amboara, dia ny fiainana iraisana amin’i Kristy Jesoa ka iantsoan’Andriamanitra any ambony any.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hisaina toy izany àry isika rehetra matotra ara-panahy. Kanefa raha misy aminareo misaina hafa noho izany, dia Andriamanitra no hampahazava izany aminareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saingy, na ahoana na ahoana, dia aoka isika hizotra amin’izay efa andehanantsika hatramin’izao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry havana, aoka hanahaka ahy ianareo ary diniho hatrany ireo manao fitondrantena araka izay ohatra nomenay anareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa voalazako imbetsaka taminareo, ary dia mbola lazaiko amin-dranomaso ankehitriny, fa maro no manao fitondrantena manohitra an’i Kristy maty teo amin’ny hazofijaliana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fahaverezana no hiafaran’ireo, satria ny zavatry ny tany no hany ankamamîny ka ny kibony no ataony andriamaniny, ny zavatra ahazoany henatra no ataony rehareha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny kibony: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo fandrarana ny hanina sasany izay tandreman’ny mpanaraka lalàna jiosy (ampit Rm 16.18; Kôl 2.16, 20-21) no toa kendren’i Paoly hokianina eto. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ahazoany henatra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' mety mampahatsiaro ny famorana (Gal 6.13, 15).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tandremo ny tenanareo amin’ireo mpanao ratsy, tandremo ny tenanareo amin’ireo amboa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Noheverina ho biby ambany sy maloto ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amboa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tamin’iny faritra atsinanana manamorona ny Ranomasina Mediteranea iny. Amin’ity and ity dia ilazana ny mpanohitra, izany hoe ireo mpiandany amin’ny famorana. Ampit koa Mt 7.6.'
      marker-yv: yv-n
    - type: text
      text: ', tandremo ny tenanareo amin’ireo manan-takaitra! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa isika kosa dia mizaka ny zo maha mponin’ny lanitra; ka Mpamonjy avy any an-danitra no andrasantsika, dia i Jesoa Kristy Tompo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy no hanova izao tenantsika tsinontsinona izao, ka hampitovîny amin’ny tenany be voninahitra, araka ny heriny miasa hahatonga ny zavatra rehetra hanaiky Azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isika, fa tsy ry zareo, no mpitandro ny tena '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famorana
    - type: text
      text: ', dia isika manompo an’Andriamanitra araka ny fanentanan’ny Fanahy Masina ary mirehareha noho isika tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa fa tsy mitoky amin’ny fombafomban’olombelona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mba manana izay ahafahako mitoky amin’ny fombafomban’olombelona ihany aho; ka raha misy olon-kafa mihevitra azy ho afa-mitoky amin’ny fombafomban’olombelona, mainka fa izaho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voafora fony teraka herinandro aho; taranak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: '; avy amin’ny fokon’i Benjamîna; hebreo ray, hebreo reny; ny amin’ny fitandroana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' jiosy, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' aho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ampit Rm 11.1; Asa 23.6; 26.5. –Enin-kaja manokana ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'fokon’i Benjamîna:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tsy niala tamin’ireo mpanjaka avy amin’ny taranak’i Davida izy.'
      marker-yv: yv-n
    - type: text
      text: '; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nafana fo tokoa aho tamin’ny maha Farisianina ahy, ka nanenjika ny Fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 8.3; 22.4; 26.9-11.
      marker-yv: yv-n
    - type: text
      text: '; ny amin’ny maha olo-marina mpanara-dalàna, dia tsy misy hokianina aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ireo zavatra izay noheveriko ho tombony ho ahy ireo dia ataoko ho tsinontsinona kosa ankehitriny noho ny amin’i Kristy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy ireo zavatra ireo ihany fa ny zavatra rehetra mihitsy no ataoko tsinontsinona noho ny amin’ilay zava-tsoa ambony lavitra, dia ny fahalalana an’i Kristy Jesoa Tompoko. Noho ny amin’i Kristy, dia nataoko tsinontsinona ny zavatra rehetra ary noheveriko ho fakofako mba hahazoako an’i Kristy '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary mba hahatafaray ahy aminy. Tsy manana fahamarinana avy amin’ny fanarahan-dalàna aho; fa ny finoana niainan’i Kristy no ahazoako fahamarinana, dia ilay fahamarinana avy amin’Andriamanitra ka miorina amin’ny finoana. '
