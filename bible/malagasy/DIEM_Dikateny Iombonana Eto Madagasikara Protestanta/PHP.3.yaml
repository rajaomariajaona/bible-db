document_id: PHP.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahamarinana omen’Andriamanitra
  - type: text
    content: 'Farany, ry havako, mifalia noho ianareo tafaray amin’ny Tompo. Tsy manahirana ahy ny mamerina aminareo indray ny teny nosoratako ho anareo, sady azonareo toky tsara amin’izay. '
  '10':
  - type: text
    content: 'Ny hany iriko dia ny hahalalako an’i Kristy, ka hahatsapako ny herin’ny fitsanganany ho velona sy hiombonako fijaliana aminy ary hanahafako Azy amin’ny fahafatesany; '
  '11':
  - type: text
    content: koa manantena aho amin’izany fa hahatratra ny zava-kendrena, dia ny hitsanganan’Andriamanitra ho velona avy any amin’ny maty.
  - type: heading
    content: Miezaka ho tafita
  '12':
  - type: text
    content: 'Tsy mihambo ho efa tafita aho na ho efa tanteraka; fa miezaka hatrany aho hahazo ny amboaran’ny hazakazaka, satria izany no efa nahazoan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa ahy. '
  '13':
  - type: text
    content: Ry havana, tsy mihevi-tena
  - type: note
    content: 'tsy mihevi-tena: misy stf sasany ahitana hoe tsy mbola mihevi-tena.'
  - type: text
    content: 'ho efa nahazo ny amboara sahady aho; fa zavatra iray ihany no ataoko: manadino ny efa nodiaviko ka mikely aina fatratra ho tody amin’izay kendrena. '
  '14':
  - type: text
    content: Miezaka hahatratra ny tanjona aho mba hahazoako ny amboara, dia ny fiainana iraisana amin’i Kristy Jesoa ka iantsoan’Andriamanitra any ambony any.
  '15':
  - type: text
    content: 'Aoka hisaina toy izany àry isika rehetra matotra ara-panahy. Kanefa raha misy aminareo misaina hafa noho izany, dia Andriamanitra no hampahazava izany aminareo. '
  '16':
  - type: text
    content: Saingy, na ahoana na ahoana, dia aoka isika hizotra amin’izay efa andehanantsika hatramin’izao.
  '17':
  - type: text
    content: 'Ry havana, aoka hanahaka ahy ianareo ary diniho hatrany ireo manao fitondrantena araka izay ohatra nomenay anareo. '
  '18':
  - type: text
    content: 'Efa voalazako imbetsaka taminareo, ary dia mbola lazaiko amin-dranomaso ankehitriny, fa maro no manao fitondrantena manohitra an’i Kristy maty teo amin’ny hazofijaliana. '
  '19':
  - type: text
    content: Fahaverezana no hiafaran’ireo, satria ny zavatry ny tany no hany ankamamîny ka ny kibony no ataony andriamaniny, ny zavatra ahazoany henatra no ataony rehareha
  - type: note
    content: 'ny kibony: ireo fandrarana ny hanina sasany izay tandreman’ny mpanaraka lalàna jiosy (ampit Rm 16.18; Kôl 2.16, 20-21) no toa kendren’i Paoly hokianina eto. –ahazoany henatra: mety mampahatsiaro ny famorana (Gal 6.13, 15).'
  - type: text
    content: '. '
  '2':
  - type: text
    content: Tandremo ny tenanareo amin’ireo mpanao ratsy, tandremo ny tenanareo amin’ireo amboa
  - type: note
    content: Noheverina ho biby ambany sy maloto ny amboa tamin’iny faritra atsinanana manamorona ny Ranomasina Mediteranea iny. Amin’ity and ity dia ilazana ny mpanohitra, izany hoe ireo mpiandany amin’ny famorana. Ampit koa Mt 7.6.
  - type: text
    content: ', tandremo ny tenanareo amin’ireo manan-takaitra! '
  '20':
  - type: text
    content: 'Fa isika kosa dia mizaka ny zo maha mponin’ny lanitra; ka Mpamonjy avy any an-danitra no andrasantsika, dia i Jesoa Kristy Tompo. '
  '21':
  - type: text
    content: Izy no hanova izao tenantsika tsinontsinona izao, ka hampitovîny amin’ny tenany be voninahitra, araka ny heriny miasa hahatonga ny zavatra rehetra hanaiky Azy.
  '3':
  - type: text
    content: 'Isika, fa tsy ry zareo, no mpitandro ny tena '
  - type: text
    content: famorana
  - type: text
    content: ', dia isika manompo an’Andriamanitra araka ny fanentanan’ny Fanahy Masina ary mirehareha noho isika tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa fa tsy mitoky amin’ny fombafomban’olombelona. '
  '4':
  - type: text
    content: 'Kanefa mba manana izay ahafahako mitoky amin’ny fombafomban’olombelona ihany aho; ka raha misy olon-kafa mihevitra azy ho afa-mitoky amin’ny fombafomban’olombelona, mainka fa izaho. '
  '5':
  - type: text
    content: 'Voafora fony teraka herinandro aho; taranak’i '
  - type: text
    content: Israely
  - type: text
    content: '; avy amin’ny fokon’i Benjamîna; hebreo ray, hebreo reny; ny amin’ny fitandroana ny '
  - type: text
    content: lalàna
  - type: text
    content: ' jiosy, dia '
  - type: text
    content: Farisianina
  - type: text
    content: ' aho'
  - type: note
    content: 'Ampit Rm 11.1; Asa 23.6; 26.5. –Enin-kaja manokana ny fokon’i Benjamîna: tsy niala tamin’ireo mpanjaka avy amin’ny taranak’i Davida izy.'
  - type: text
    content: '; '
  '6':
  - type: text
    content: nafana fo tokoa aho tamin’ny maha Farisianina ahy, ka nanenjika ny Fiangonana
  - type: note
    content: Jereo Asa 8.3; 22.4; 26.9-11.
  - type: text
    content: '; ny amin’ny maha olo-marina mpanara-dalàna, dia tsy misy hokianina aho. '
  '7':
  - type: text
    content: 'Kanefa ireo zavatra izay noheveriko ho tombony ho ahy ireo dia ataoko ho tsinontsinona kosa ankehitriny noho ny amin’i Kristy. '
  '8':
  - type: text
    content: 'Ary tsy ireo zavatra ireo ihany fa ny zavatra rehetra mihitsy no ataoko tsinontsinona noho ny amin’ilay zava-tsoa ambony lavitra, dia ny fahalalana an’i Kristy Jesoa Tompoko. Noho ny amin’i Kristy, dia nataoko tsinontsinona ny zavatra rehetra ary noheveriko ho fakofako mba hahazoako an’i Kristy '
  '9':
  - type: text
    content: 'ary mba hahatafaray ahy aminy. Tsy manana fahamarinana avy amin’ny fanarahan-dalàna aho; fa ny finoana niainan’i Kristy no ahazoako fahamarinana, dia ilay fahamarinana avy amin’Andriamanitra ka miorina amin’ny finoana. '
