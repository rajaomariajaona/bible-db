segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana faharoa: ilay ondrilahy sy ilay osilahy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: «Tamin’ny taona fahatelo nanjakan’i Belsatsara mpanjaka, izaho Daniela dia nahazo fahitana indray taorian’ilay hitako teo aloha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manomboka eto amin’ny 8.1 dia amin’ny teny hebreo indray ny RM (jereo ny naoty 2.4).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nojereko ilay fahitana, ka indro aho nahita ny tenako tao Sosàna, tanàna mimanda tao amin’ny faritanin’i Helama; ary hitako tamin’ny fahitana koa fa teo amoron’ny renirano Olay aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faritanin’i Helama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', eo avaratry ny helo-dranomasina Persika, dia manana an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sosàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ho renivohiny izay nandalovan’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: renirano Olay.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nampifantoka ny masoko hijery aho ka indro nisy ondrilahy iray nitsangana teo amoron’ilay renirano sady nanana tandroka roa. Lava ireo tandroka ireo, nefa ilay nitsimoka taoriana no lava kokoa noho ny anankiray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireo '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tandroka roa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tamin’ny ondrilahy dia manambara ny fanjakamben’ny Medianina sy ny Persianina, jereo ny and 20 sy ny naoty eo amin’ny 2.40.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hitako ilay ondrilahy fa nanoto niankandrefana sy nianavaratra ary nianatsimo, ka tsy nisy biby nahatohitra azy ary tsy nisy naharombaka izay tao an-tanany; fa nanao araka izay sitrapony izy sady nitombo hery hatrany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Raha mbola nieritreritra ny amin’izany aho, dia indro nisy osilahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: osilahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia manambara ny fanjakana grikan’i Aleksandra Lehibe (=ilay tandroka), jereo and 21.'
    marker-yv: yv-n
  - type: text
    text: ' iray nipoitra avy any andrefana ka nitety ny tany manontolo, nefa tsy nikasi-tany akory; nanana tandroka tokana goavana izy teo anelanelan’ny masony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izy io dia nankeo amin’ilay ondrilahy nanana tandroka roa izay hitako nitsangana teo amoron’ny renirano, ka niantoraka taminy araka ny firongatry ny heriny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hitako izy tafapaka teo akaikin’ilay ondrilahy, dia nisafoaka taminy ary namely azy ka nahamontsana ny tandrony roa; tsy nanan-kery hoenti-manohitra azy intsony ilay ondrilahy ka dia natrosony tamin’ny tany sady nohosihoseny; ary tsy nisy naharombaka ilay ondrilahy teo an-tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary nitombo fatratra ny herin’ilay osilahy; saingy nony efa tena natanjaka izy, dia tapaka ilay tandrobeny, ka nisy tandroka efatra goavana nipoitra nisolo azy nifanandrify tamin’ny vazan-tany efatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rehefa maty tsy nampoizina teo amin’ny faha-33 taonany i Aleksandra Lehibe, dia ny jeneraliny efa-dahy no nifampizara ny fanjakany.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Ary ny anankiray tamin’izy efatra ireo dia nipoiran’ny tandroka kely iray, izay nitatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny tandroka kely... nitatra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tandroka iray vaovao izay kely aloha, nefa nitatra...
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Momba io tandroka vaovao io dia jereo 7.25 sy nta. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ilay tany tsara indrindra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia manondro ny tanin’i Israely.'
    marker-yv: yv-n
  - type: text
    text: ' nianatsimo sy niantsinanana ary hatrany any amin’ilay tany tsara indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nitatra hatreny amin’ny tafiky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: ' aza izy; ka nazerany tamin’ny tany ny ampahan’izany tafika izany mbamin’ny kintana sasany izay nohitsakitsahiny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Apôk 12.4. –Eto ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tafiky ny lanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety ho ny kintana na ny anjely* na ny Jiosy ihany koa indrindra ireo mpivavaka na ireo lohandohany mpitandro ny lalànan’ny Tompo.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nitatra nihantsy hatramin’ilay Filohan’izany tafika izany aza izy, ka nanafoana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanao isan’andro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Filohan’izany tafika izany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ilay Andriamanitr’i Israely vahoakany sady Tompon’izao rehetra izao. –Ny momba io '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sorona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io dia jereo Eks 29.38-42; Nom 28.3-6.'
    marker-yv: yv-n
  - type: text
    text: ' aminy sady nanimbazimba ny fiorenan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasiny
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary natolotra hanamparany halozana izany tafiky ny lanitra izany ary koa ny sorona fanao isan’andro. Dia nazeran’io tandroka io tamin’ny tany kosa ny fahamarinana; ary nahomby izy tamin’izay nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nandre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' iray niteny aho; ary nisy anjely iray hafa nanontany azy hoe: «Mandra-pahoviana no haharetan’izay zavatra nasehon’ny fahitana? Mandra-pahoviana no ho foana ny sorona isan’andro, no hanjaka ny halozana mahatonga fandravana ary ho voahosihosy ny Toeramasina mbamin’ny tafiky ny lanitra?» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia namaly azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika sy siriaka, fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –Ity fomba fiteny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 2 300 maraina sy hariva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety ho 2 300 andro no heviny; nefa ny mety ho izy kokoa dia manondro 1 150 sorona atolotra ny maraina ary 1 150 sorona atolotra amin’ny hariva. Ny 2 300 maraina sy hariva dia 1 150 andro ka io fe-potoana io dia mitovitovy amin’ny telo taona sy volana vitsivitsy naharetan’ny fanenjehan’i Antiôkôsa Epifàna. Ampit 7.24-25 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (telo taona sy tapany)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' ny anjely voalohany hoe: «Mandritra ny 2 300 maraina sy hariva, ary avy eo dia haverina amin’ny laoniny indray ny Toeramasina.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hevitry ny fahitana faharoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Izaho Daniela kosa, raha mbola teo am-pijerena izany fahitana izany ka nitady hahafantatra ny heviny, dia indro nisy tahaka ny endrik’olona anankiray nijoro teo anoloako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny anjely* Gabriela no resahina eto, jereo ny and 16; 9.21; Lk 1.19, 26.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nandre feon’olona teo afovoan’ny renirano Olay aho, dia feo niantso azy nanao hoe: ‹Ry Gabriela, hazavao amin’ity lehilahy ity ny fahitana niseho taminy.› '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nanatona ilay toerana nijoroako i Gabriela; ka rehefa tonga izy, dia natahotra aho ka nikarapoka tamin’ny tany. Fa hoy izy tamiko: ‹Aoka ho fantatrao, ry ilay taranak’olombelona, fa iny fahitana iny dia momba ny fiafaran’ny fotoana.› '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha mbola niteny tamiko izy, dia nihohoka tamin’ny tany ihany aho sady safotra; fa nanohina ahy izy ary nampitsangana ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Avy eo dia hoy i Gabriela tamiko: «Indro hampahafantariko anao izay hiseho amin’ny fotoana voatendry hiafaran’ny fahatezeran’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny ondrilahy izay hitanao nanana tandroka roa dia manondro ny fanjakana medianina sy persianina. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny osilahy lava volo dia manondro ny fanjakana grika; ary ilay tandroka lehibe teo anelanelan’ny masony dia ny mpanjaka voalohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny mpanjaka voalohany '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia i Aleksandra Lehibe izay nanjaka manerana ny faritra Atsinanana akaikin’ny Ranomasina Mediteranea (jereo ny and 5 sy nta).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rehefa tapaka ilay tandroka, dia nisy efatra naniry nandimby azy, izany hoe hisy fanjakana efatra hitsangana avy amin’io fanjakana tokana io saingy tsy hanan-kery toa azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny fahafatesan’i Aleksandra Lehibe tamin’ny 323 tal J.K., jereo ny and 8 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary amin’ny fiafaran’ireo fanjakana ireo, rehefa hihoa-pampana ny otan’ireo mpanota
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo mpanota: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tsy fantatra izay tian’ny mpanoratra holazaina amin’io, angamba mety ho ireo mpanjaka izay mifarana ny fanapahany na ireo Jiosy izay ny fahotany no manazava ny fitsabahan’ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpanjaka mpirehareha,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia i Antiôkôsa Epifàna, (jereo 7.25 sy nta)'
    marker-yv: yv-n
  - type: text
    text: ', dia hitsangana ny mpanjaka iray mpirehareha sady fangoloka. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hitombo hery hatrany izy, kanefa tsy avy amin’ny herin-tenany. Hanao fanimban-javatra mampitolagaga izy ary hahomby amin’ny hataony; haringany ireo mahery sy ireo olona voatokana ho an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Noho ny hafetseny dia hamitaka ny hafa izy, ary noho ny avonavon’ny fony dia handringana olona maro mihevi-tena handry feizay; hitsangana hanohitra ny Tompon’ny Tompo, nefa kosa ho torotoro tsy kasihin-tanana akory
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'handringana olona maro... izy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: filazana an’ohatra momba ireo fanenjehana nampiharina tamin’ny Jiosy. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny Tompon’ny Tompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia Andriamanitra. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: tsy kasihin-tanana akory
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': ampit 2.34,45.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny fivoasana momba ny hitanao ny amin’ny maraina sy hariva dia marina tokoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny and 14.
    marker-yv: yv-n
  - type: text
    text: '; saingy ahorony hiafina aloha izany fahitana izany, satria mbola ho amin’ny andro ela izany. '
  - type: usfm
