  - type: text
    text: Ary izaho Daniela dia reraka sy nandraiki-narary andro vitsivitsy. Avy eo dia nitsangana aho ka nanao ny raharahan’ny mpanjaka. Gaga tamin’izany fahitana izany aho satria tsy no fantatro ny heviny.
