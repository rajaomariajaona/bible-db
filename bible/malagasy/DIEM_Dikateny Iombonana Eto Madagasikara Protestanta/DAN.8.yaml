document_id: DAN.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana faharoa: ilay ondrilahy sy ilay osilahy'
  - type: text
    content: «Tamin’ny taona fahatelo nanjakan’i Belsatsara mpanjaka, izaho Daniela dia nahazo fahitana indray taorian’ilay hitako teo aloha
  - type: note
    content: Manomboka eto amin’ny 8.1 dia amin’ny teny hebreo indray ny RM (jereo ny naoty 2.4).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Nitatra hatreny amin’ny tafiky ny '
  - type: text
    content: lanitra
  - type: text
    content: ' aza izy; ka nazerany tamin’ny tany ny ampahan’izany tafika izany mbamin’ny kintana sasany izay nohitsakitsahiny'
  - type: note
    content: Jereo Apôk 12.4. –Eto ny tafiky ny lanitra dia mety ho ny kintana na ny anjely* na ny Jiosy ihany koa indrindra ireo mpivavaka na ireo lohandohany mpitandro ny lalànan’ny Tompo.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ary nitatra nihantsy hatramin’ilay Filohan’izany tafika izany aza izy, ka nanafoana ny '
  - type: text
    content: sorona
  - type: text
    content: ' fanao isan’andro'
  - type: note
    content: Ilay Filohan’izany tafika izany dia ilay Andriamanitr’i Israely vahoakany sady Tompon’izao rehetra izao. –Ny momba io sorona io dia jereo Eks 29.38-42; Nom 28.3-6.
  - type: text
    content: ' aminy sady nanimbazimba ny fiorenan’ny '
  - type: text
    content: Toeramasiny
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ary natolotra hanamparany halozana izany tafiky ny lanitra izany ary koa ny sorona fanao isan’andro. Dia nazeran’io tandroka io tamin’ny tany kosa ny fahamarinana; ary nahomby izy tamin’izay nataony.
  '13':
  - type: text
    content: 'Dia nandre '
  - type: text
    content: anjely
  - type: text
    content: ' iray niteny aho; ary nisy anjely iray hafa nanontany azy hoe: «Mandra-pahoviana no haharetan’izay zavatra nasehon’ny fahitana? Mandra-pahoviana no ho foana ny sorona isan’andro, no hanjaka ny halozana mahatonga fandravana ary ho voahosihosy ny Toeramasina mbamin’ny tafiky ny lanitra?» '
  '14':
  - type: text
    content: Dia namaly azy
  - type: note
    content: 'azy: araka ny dkt tranainy grika sy siriaka, fa ny RM kosa manao hoe ahy. –Ity fomba fiteny hoe 2 300 maraina sy hariva dia mety ho 2 300 andro no heviny; nefa ny mety ho izy kokoa dia manondro 1 150 sorona atolotra ny maraina ary 1 150 sorona atolotra amin’ny hariva. Ny 2 300 maraina sy hariva dia 1 150 andro ka io fe-potoana io dia mitovitovy amin’ny telo taona sy volana vitsivitsy naharetan’ny fanenjehan’i Antiôkôsa Epifàna. Ampit 7.24-25 (telo taona sy tapany) sy nta.'
  - type: text
    content: ' ny anjely voalohany hoe: «Mandritra ny 2 300 maraina sy hariva, ary avy eo dia haverina amin’ny laoniny indray ny Toeramasina.»'
  - type: heading
    content: Ny hevitry ny fahitana faharoa
  '15':
  - type: text
    content: «Izaho Daniela kosa, raha mbola teo am-pijerena izany fahitana izany ka nitady hahafantatra ny heviny, dia indro nisy tahaka ny endrik’olona anankiray nijoro teo anoloako
  - type: note
    content: Ny anjely* Gabriela no resahina eto, jereo ny and 16; 9.21; Lk 1.19, 26.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary nandre feon’olona teo afovoan’ny renirano Olay aho, dia feo niantso azy nanao hoe: ‹Ry Gabriela, hazavao amin’ity lehilahy ity ny fahitana niseho taminy.› '
  '17':
  - type: text
    content: 'Dia nanatona ilay toerana nijoroako i Gabriela; ka rehefa tonga izy, dia natahotra aho ka nikarapoka tamin’ny tany. Fa hoy izy tamiko: ‹Aoka ho fantatrao, ry ilay taranak’olombelona, fa iny fahitana iny dia momba ny fiafaran’ny fotoana.› '
  '18':
  - type: text
    content: 'Raha mbola niteny tamiko izy, dia nihohoka tamin’ny tany ihany aho sady safotra; fa nanohina ahy izy ary nampitsangana ahy. '
  '19':
  - type: text
    content: 'Avy eo dia hoy i Gabriela tamiko: «Indro hampahafantariko anao izay hiseho amin’ny fotoana voatendry hiafaran’ny fahatezeran’Andriamanitra. '
  '2':
  - type: text
    content: Nojereko ilay fahitana, ka indro aho nahita ny tenako tao Sosàna, tanàna mimanda tao amin’ny faritanin’i Helama; ary hitako tamin’ny fahitana koa fa teo amoron’ny renirano Olay aho
  - type: note
    content: Ny faritanin’i Helama, eo avaratry ny helo-dranomasina Persika, dia manana an’i Sosàna ho renivohiny izay nandalovan’ny renirano Olay.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Ny ondrilahy izay hitanao nanana tandroka roa dia manondro ny fanjakana medianina sy persianina. '
  '21':
  - type: text
    content: Ny osilahy lava volo dia manondro ny fanjakana grika; ary ilay tandroka lehibe teo anelanelan’ny masony dia ny mpanjaka voalohany
  - type: note
    content: Ny mpanjaka voalohany dia i Aleksandra Lehibe izay nanjaka manerana ny faritra Atsinanana akaikin’ny Ranomasina Mediteranea (jereo ny and 5 sy nta).
  - type: text
    content: '. '
  '22':
  - type: text
    content: Rehefa tapaka ilay tandroka, dia nisy efatra naniry nandimby azy, izany hoe hisy fanjakana efatra hitsangana avy amin’io fanjakana tokana io saingy tsy hanan-kery toa azy
  - type: note
    content: Momba ny fahafatesan’i Aleksandra Lehibe tamin’ny 323 tal J.K., jereo ny and 8 sy nta.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Ary amin’ny fiafaran’ireo fanjakana ireo, rehefa hihoa-pampana ny otan’ireo mpanota
  - type: note
    content: 'ireo mpanota: tsy fantatra izay tian’ny mpanoratra holazaina amin’io, angamba mety ho ireo mpanjaka izay mifarana ny fanapahany na ireo Jiosy izay ny fahotany no manazava ny fitsabahan’ilay mpanjaka mpirehareha, dia i Antiôkôsa Epifàna, (jereo 7.25 sy nta)'
  - type: text
    content: ', dia hitsangana ny mpanjaka iray mpirehareha sady fangoloka. '
  '24':
  - type: text
    content: 'Hitombo hery hatrany izy, kanefa tsy avy amin’ny herin-tenany. Hanao fanimban-javatra mampitolagaga izy ary hahomby amin’ny hataony; haringany ireo mahery sy ireo olona voatokana ho an’Andriamanitra. '
  '25':
  - type: text
    content: Noho ny hafetseny dia hamitaka ny hafa izy, ary noho ny avonavon’ny fony dia handringana olona maro mihevi-tena handry feizay; hitsangana hanohitra ny Tompon’ny Tompo, nefa kosa ho torotoro tsy kasihin-tanana akory
  - type: note
    content: 'handringana olona maro... izy: filazana an’ohatra momba ireo fanenjehana nampiharina tamin’ny Jiosy. –ny Tompon’ny Tompo dia Andriamanitra. –tsy kasihin-tanana akory: ampit 2.34,45.'
  - type: text
    content: '. '
  '26':
  - type: text
    content: Ary ny fivoasana momba ny hitanao ny amin’ny maraina sy hariva dia marina tokoa
  - type: note
    content: Jereo ny and 14.
  - type: text
    content: '; saingy ahorony hiafina aloha izany fahitana izany, satria mbola ho amin’ny andro ela izany. '
  '27':
  - type: text
    content: Ary izaho Daniela dia reraka sy nandraiki-narary andro vitsivitsy. Avy eo dia nitsangana aho ka nanao ny raharahan’ny mpanjaka. Gaga tamin’izany fahitana izany aho satria tsy no fantatro ny heviny.
  '3':
  - type: text
    content: Dia nampifantoka ny masoko hijery aho ka indro nisy ondrilahy iray nitsangana teo amoron’ilay renirano sady nanana tandroka roa. Lava ireo tandroka ireo, nefa ilay nitsimoka taoriana no lava kokoa noho ny anankiray
  - type: note
    content: Ireo tandroka roa tamin’ny ondrilahy dia manambara ny fanjakamben’ny Medianina sy ny Persianina, jereo ny and 20 sy ny naoty eo amin’ny 2.40.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Hitako ilay ondrilahy fa nanoto niankandrefana sy nianavaratra ary nianatsimo, ka tsy nisy biby nahatohitra azy ary tsy nisy naharombaka izay tao an-tanany; fa nanao araka izay sitrapony izy sady nitombo hery hatrany.
  '5':
  - type: text
    content: «Raha mbola nieritreritra ny amin’izany aho, dia indro nisy osilahy
  - type: note
    content: Ny osilahy dia manambara ny fanjakana grikan’i Aleksandra Lehibe (=ilay tandroka), jereo and 21.
  - type: text
    content: ' iray nipoitra avy any andrefana ka nitety ny tany manontolo, nefa tsy nikasi-tany akory; nanana tandroka tokana goavana izy teo anelanelan’ny masony. '
  '6':
  - type: text
    content: 'Ary izy io dia nankeo amin’ilay ondrilahy nanana tandroka roa izay hitako nitsangana teo amoron’ny renirano, ka niantoraka taminy araka ny firongatry ny heriny. '
  '7':
  - type: text
    content: 'Ary hitako izy tafapaka teo akaikin’ilay ondrilahy, dia nisafoaka taminy ary namely azy ka nahamontsana ny tandrony roa; tsy nanan-kery hoenti-manohitra azy intsony ilay ondrilahy ka dia natrosony tamin’ny tany sady nohosihoseny; ary tsy nisy naharombaka ilay ondrilahy teo an-tanany. '
  '8':
  - type: text
    content: Ary nitombo fatratra ny herin’ilay osilahy; saingy nony efa tena natanjaka izy, dia tapaka ilay tandrobeny, ka nisy tandroka efatra goavana nipoitra nisolo azy nifanandrify tamin’ny vazan-tany efatra
  - type: note
    content: Rehefa maty tsy nampoizina teo amin’ny faha-33 taonany i Aleksandra Lehibe, dia ny jeneraliny efa-dahy no nifampizara ny fanjakany.
  - type: text
    content: .
  '9':
  - type: text
    content: «Ary ny anankiray tamin’izy efatra ireo dia nipoiran’ny tandroka kely iray, izay nitatra
  - type: note
    content: 'ny tandroka kely... nitatra: dkt hafa ny tandroka iray vaovao izay kely aloha, nefa nitatra... Momba io tandroka vaovao io dia jereo 7.25 sy nta. –ilay tany tsara indrindra dia manondro ny tanin’i Israely.'
  - type: text
    content: ' nianatsimo sy niantsinanana ary hatrany any amin’ilay tany tsara indrindra. '
