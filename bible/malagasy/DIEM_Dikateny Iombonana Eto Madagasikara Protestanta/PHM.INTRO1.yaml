document_id: PHM.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Olona manan-kaja teo amin’ny mpiara-monina i Filemôna. Tonga kristianina izy ary tsy isalasalana fa isan’ny Fiangonana tao Kôlôsy. Sakaizan’i Paoly apôstôly izy (and 1). Izy io dia nanana mpanompo atao hoe Ônesimo, izay nandositra niala teo aminy. Tsy misy fantatra ny amin’izay nahatonga an’i Ônesimo hifandray tamin’i Paoly izay tao am-ponja. Ny hany mazava dia tonga kristianina koa i Ônesimo. Tapa-kevitra i Paoly fa hamerina azy any amin’ny tompony; ka nandefasany taratasy i Filemôna handray azy, tsy toy ny mpanompo intsony (iharan-tsazy mafy ny mpanompo nandositra!), fa toy ny rahalahy iray finoana.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Toy izao àry ny fizotran’ny taratasy. Nony vitan’i Paoly ny fiarahabana an’i Filemôna sy ny mpiray trano aminy (1-3), dia velom-pisaorana an’Andriamanitra izy noho ny finoan’i Filemôna sy ny fahazotoany (4-7). Dia arosony avy eo ny fiangaviany ho an’i Ônesimo, izay efa hody indray any amin’ny tompony (8-22). Ao amin’ny fanaovam-beloma (23-25) izay mamarana ny taratasy dia ahitana anaran’olona maromaro izay voatonona ihany koa ao amin’ny taratasy ho an’ny Kôlôsianina (4.10, 12, 14; azo lazaina koa i Arkipo, izay voatonona anarana ao amin’ny and 2 sy ao amin’ny Kôl 4.17). Mety ho samy nentin’i Ônesimo tany Kôlôsy ny taratasy anankiroa, dia ilay ho an’ny Kôlôsianina sy ilay ho an’i Filemôna.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ho tsikaritra ny fomba hendry sy malina nanoratan’i Paoly ho an’i Filemôna sakaizany: tsy mandidy azy ary tsy maneritery azy mihitsy i Paoly, ary tsy mandà velively ny zo ananan’i Filemôna amin’i Ônesimo. Kanefa ampahatsiaroviny an’i Filemôna sy izay rehetra mamaky ity taratasy ity fa ny fitiavan’i Kristy no manazava amin’ny fomba vaovao sady manova tanteraka ny fifandraisana rehetra misy eo amin’ny samy olombelona.'
