document_id: DEU.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fakana ny fanjakan’i Hôga
  - type: text
    content: 'Dia nihodina niakatra tamin’ny lalana mankany '
  - type: text
    content: Basàna
  - type: text
    content: ' isika; ary niainga hiady amintsika tao Edrehỳ i Hôga mpanjakan’i Basàna, mbamin’ny tafiny manontolo. '
  '10':
  - type: text
    content: 'Nalaintsika ny tanàna rehetra amin’ny lembalemba, nalaintsika i Gilehada sy i '
  - type: text
    content: Basàna
  - type: text
    content: ' manontolo hatrany Salkà sy Edrehỳ izay tanàna nanjakan’i Hôga tany Basàna. '
  '11':
  - type: text
    content: I Hôga mpanjakan’i Basàna manko no hany sisa tavela tamin’ny Refaîta
  - type: note
    content: 'Refaîta: jereo 2.11 sy nta. –ny vatam-paty...ny refy: dkt hafa ny farafarany, dia farafara vy mirefy.'
  - type: text
    content: '. Mbola hita ao Rabà, renivohitry ny Amôrita, ny vatam-paty misy azy, dia vatam-paty natao tamin’ny vato vy voapaika ka efatra metatra sy sasany ny halàvany ary roa metatra ny sakany araka ny refy mahazatra. '
  '12':
  - type: text
    content: Tamin’izany andro izany tokoa no nahazoantsika io tany io.
  - type: text
    content: Ny antsasaky ny tany havoanan’i Gilehada mbamin’ny tanàna eo, manomboka any Harôhera izay eo amoron’ny lohasahan-driaka Arnôna, dia nomeko ny Reobenita sy ny Gadita
  - type: note
    content: Tsy mazava ny RM eto amin’ity and 16 ity.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ny sisa tamin’i Gilehada sy i Basàna manontolo, izay nanjakan’i Hôga, dia nomeko ny antsasa-pokon’i Manase. (Ny faritany Argôba miaraka amin’i Basàna manontolo dia natao koa hoe tanin’ny Refaîta. '
  '14':
  - type: text
    content: 'Ireo terak’i Jaîro zanakalahin’i Manase no nahazo ny faritany Argôba manontolo, mipaka amin’ny sisintanin’ny Gesorita sy Mahekatita; dia nantsoina hoe Havôta-Jaîro izany faritra izany araka ny anarana entiny mandraka androany.) '
  '15':
  - type: text
    content: 'Ny terak’i Makira kosa nomeko faritany Gilehada. '
  '16':
  - type: text
    content: 'Ny Reobenita sy ny Gadita dia nomeko ny ampahan’i Gilehada miafara amin’ny lohasahan-driaka Arnôna (ka tao afovoan’io lohasahan-driaka io no sisintany), sy miafara amin’ny lohasahan-driaka Jabôka izay sisin-tany mampisaraka amin’ny Hamônita; '
  '17':
  - type: text
    content: nomeko azy ireo koa i Harabà, ka ny ony Jôrdàna no sisintany, manomboka ao Kinereta ka miafara amin’ny Ranomasin’i Harabà, dia ny Ranomasina Maty, eo am-bodin’ny tendrombohitra Pisgà izay ao atsinanany.
  '18':
  - type: text
    content: 'Tamin’izany andro izany, dia nomeko baiko ireo ka nataoko hoe: «Efa nomen’ny TOMPO Andriamanitrareo ho fanananareo ity faritany ity; ka ndeha mita eo alohan’ny Israelita hafa havanareo ianareo lehilahy mahery fo rehetra samy efa voaoman-kiady. '
  '19':
  - type: text
    content: 'Fa ny vadinareo sy ny zanakareo madinika ary ny biby fiompinareo, (fantatro fa be biby fiompy ianareo), dia hitoetra ao amin’ireo tanàna izay nomeko anareo. '
  '2':
  - type: text
    content: 'Tamin’izay, dia hoy ny TOMPO tamiko: «Aza matahotra an’i Hôga ianareo, fa efa natolotro eo an-tananareo izy sy ny tafiny manontolo mbamin’ny taniny; ary ny hataonareo amin’i Hôga dia araka izay nataonareo tamin’i Sihôna mpanjaka amôrita, izay nonina tao Hesbôna.» '
  '20':
  - type: text
    content: Ampio ny Israelita hafa mandra-panomen’ny TOMPO azy fitsaharana tahaka ny nataony taminareo, ka hananany ny tany izay omen’ny TOMPO Andriamanitrareo azy any andafin’i Jôrdàna; dia samy hiverina any amin’ny zaratany izay nomeko anareo avy ianareo
  - type: note
    content: 'And 18-20: jereo Jos 1.12-15.'
  - type: text
    content: .»
  '21':
  - type: text
    content: 'Tamin’izany andro izany koa dia nomeko baiko i Josoa ka nilazako hoe: «Efa hitanao maso izay rehetra nataon’ny TOMPO Andriamanitrareo tamin’ireo mpanjaka roa lahy; dia toy izany no hataon’ny TOMPO amin’ny mpanjaka rehetra hatrehinao eny ampita. '
  '22':
  - type: text
    content: Aza matahotra azy ianareo satria ny TOMPO Andriamanitrareo mihitsy no hiady ho anareo.»
  - type: heading
    content: Tsy hiditra any Kanahàna i Mosesy
  '23':
  - type: text
    content: 'Tamin’izany andro izany, dia nitaraina tamin’ny TOMPO aho ka nanao hoe: '
  '24':
  - type: text
    content: «Ry Tompo ANDRIANANAHARY ô, vao nanehoanao ny fahalehibeazanao sy ny fiarovanao mahery aho mpanomponao. Fa, na any an-
  - type: text
    content: danitra
  - type: text
    content: ' na eto an-tany, aiza no misy andriamanitra mahay manao araka ny asanao sy ny zava-dehibe vitanao? '
  '25':
  - type: text
    content: 'Aoka mba hahazo mita aho ka hahita izany tany soa any andafin’i Jôrdàna izany, dia ilay faritra be tendrombohitra tsara sy i Libano.» '
  '26':
  - type: text
    content: 'Fa tezitra tamiko ny TOMPO noho ny aminareo, ka tsy nihaino ahy sady nilaza tamiko hoe: «Aoka izay fa aza teneninao amiko intsony izany zavatra izany. '
  '27':
  - type: text
    content: Miakara eo an-tampon’i Pisgà ianao ary atopazy miankandrefana sy mianavaratra ary mianatsimo sy miantsinanana ny masonao, dia aoka hijery; satria tsy hahazo mita izany Jôrdàna izany ianao
  - type: note
    content: 'And 23-27: jereo Nom 27.12-14; Deot 32.48-52.'
  - type: text
    content: '. '
  '28':
  - type: text
    content: Fa i Josoa no omeo baiko, dia ampaherezo sy hatanjaho, satria izy no hiampita eo alohan’ity vahoaka ity sady hampahazo azy ny tany izay ho hitanao.»
  '29':
  - type: text
    content: Dia nijanona teo an-dohasaha tandrifin’i Bety-Pehôra isika
  - type: note
    content: I Bety-Pehôra dia tanàna eo am-bodin’ny tendrombohitra Pisgà.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia natolotry ny TOMPO Andriamanitsika eo an-tanantsika koa i Hôga, mpanjakan’i Basàna, mbamin’ny tafiny manontolo; noresentsika ireo ka tsy nisy niangana na iray akory aza. '
  '4':
  - type: text
    content: 'Afatsika tamin’izay ny tanànany enimpolo izay nanjakàn’i Hôga manerana ny faritany Argôba manontolo tao Basàna. '
  '5':
  - type: text
    content: 'Tanànamimanda avokoa ireo tanàna ireo ka samy nisy manda avo sy vavahady voahidy mafy; ankoatra ireo, dia nisy tanàna kely maro dia maro. '
  '6':
  - type: text
    content: 'Noravantsika tanteraka ireny tanàna ireny ary naringantsika ny lehilahy mbamin’ny zaza amam-behivavy isan-tanàna, toy ny nataontsika tamin’ny tanànan’i Sihôna mpanjaka tao Hesbôna. '
  '7':
  - type: text
    content: Fa ny biby fiompy rehetra sy ny fananana tamin’ireo tanàna ireo no nobabointsika.
  - type: heading
    content: Fizaràna ny faritany Gilehada
  '8':
  - type: text
    content: 'Koa tamin’izany andro izany, dia nalaintsika tamin’ny mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' anankiroa ny tany izay any an-dafin’i Jôrdàna, manomboka amin’ny lohasahan-driaka Arnôna ka miafara amin’ny tendrombohitra Hermôna'
  - type: note
    content: I Hermôna dia tendrombohitra ao avaratr’i Palestinina, ka ao no ipoiran’ny loharanon’i Jôrdàna.
  - type: text
    content: ', '
  '9':
  - type: text
    content: '(dia i Hermôna izay nataon’ny Tsidônianina hoe Siriôna ary nataon’ny Amôrita kosa hoe Senîra). '
