document_id: DEU.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fakana ny fanjakan’i Hôga
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihodina niakatra tamin’ny lalana mankany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Basàna
    - type: text
      text: ' isika; ary niainga hiady amintsika tao Edrehỳ i Hôga mpanjakan’i Basàna, mbamin’ny tafiny manontolo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalaintsika ny tanàna rehetra amin’ny lembalemba, nalaintsika i Gilehada sy i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Basàna
    - type: text
      text: ' manontolo hatrany Salkà sy Edrehỳ izay tanàna nanjakan’i Hôga tany Basàna. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Hôga mpanjakan’i Basàna manko no hany sisa tavela tamin’ny Refaîta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Refaîta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2.11 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny vatam-paty...ny refy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny farafarany, dia farafara vy mirefy.
      marker-yv: yv-n
    - type: text
      text: '. Mbola hita ao Rabà, renivohitry ny Amôrita, ny vatam-paty misy azy, dia vatam-paty natao tamin’ny vato vy voapaika ka efatra metatra sy sasany ny halàvany ary roa metatra ny sakany araka ny refy mahazatra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany andro izany tokoa no nahazoantsika io tany io.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny antsasaky ny tany havoanan’i Gilehada mbamin’ny tanàna eo, manomboka any Harôhera izay eo amoron’ny lohasahan-driaka Arnôna, dia nomeko ny Reobenita sy ny Gadita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy mazava ny RM eto amin’ity and 16 ity.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sisa tamin’i Gilehada sy i Basàna manontolo, izay nanjakan’i Hôga, dia nomeko ny antsasa-pokon’i Manase. (Ny faritany Argôba miaraka amin’i Basàna manontolo dia natao koa hoe tanin’ny Refaîta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo terak’i Jaîro zanakalahin’i Manase no nahazo ny faritany Argôba manontolo, mipaka amin’ny sisintanin’ny Gesorita sy Mahekatita; dia nantsoina hoe Havôta-Jaîro izany faritra izany araka ny anarana entiny mandraka androany.) '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny terak’i Makira kosa nomeko faritany Gilehada. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Reobenita sy ny Gadita dia nomeko ny ampahan’i Gilehada miafara amin’ny lohasahan-driaka Arnôna (ka tao afovoan’io lohasahan-driaka io no sisintany), sy miafara amin’ny lohasahan-driaka Jabôka izay sisin-tany mampisaraka amin’ny Hamônita; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nomeko azy ireo koa i Harabà, ka ny ony Jôrdàna no sisintany, manomboka ao Kinereta ka miafara amin’ny Ranomasin’i Harabà, dia ny Ranomasina Maty, eo am-bodin’ny tendrombohitra Pisgà izay ao atsinanany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany, dia nomeko baiko ireo ka nataoko hoe: «Efa nomen’ny TOMPO Andriamanitrareo ho fanananareo ity faritany ity; ka ndeha mita eo alohan’ny Israelita hafa havanareo ianareo lehilahy mahery fo rehetra samy efa voaoman-kiady. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny vadinareo sy ny zanakareo madinika ary ny biby fiompinareo, (fantatro fa be biby fiompy ianareo), dia hitoetra ao amin’ireo tanàna izay nomeko anareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay, dia hoy ny TOMPO tamiko: «Aza matahotra an’i Hôga ianareo, fa efa natolotro eo an-tananareo izy sy ny tafiny manontolo mbamin’ny taniny; ary ny hataonareo amin’i Hôga dia araka izay nataonareo tamin’i Sihôna mpanjaka amôrita, izay nonina tao Hesbôna.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ampio ny Israelita hafa mandra-panomen’ny TOMPO azy fitsaharana tahaka ny nataony taminareo, ka hananany ny tany izay omen’ny TOMPO Andriamanitrareo azy any andafin’i Jôrdàna; dia samy hiverina any amin’ny zaratany izay nomeko anareo avy ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 18-20:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jos 1.12-15.
      marker-yv: yv-n
    - type: text
      text: .»
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany koa dia nomeko baiko i Josoa ka nilazako hoe: «Efa hitanao maso izay rehetra nataon’ny TOMPO Andriamanitrareo tamin’ireo mpanjaka roa lahy; dia toy izany no hataon’ny TOMPO amin’ny mpanjaka rehetra hatrehinao eny ampita. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza matahotra azy ianareo satria ny TOMPO Andriamanitrareo mihitsy no hiady ho anareo.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy hiditra any Kanahàna i Mosesy
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany, dia nitaraina tamin’ny TOMPO aho ka nanao hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Ry Tompo ANDRIANANAHARY ô, vao nanehoanao ny fahalehibeazanao sy ny fiarovanao mahery aho mpanomponao. Fa, na any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: ' na eto an-tany, aiza no misy andriamanitra mahay manao araka ny asanao sy ny zava-dehibe vitanao? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka mba hahazo mita aho ka hahita izany tany soa any andafin’i Jôrdàna izany, dia ilay faritra be tendrombohitra tsara sy i Libano.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tezitra tamiko ny TOMPO noho ny aminareo, ka tsy nihaino ahy sady nilaza tamiko hoe: «Aoka izay fa aza teneninao amiko intsony izany zavatra izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miakara eo an-tampon’i Pisgà ianao ary atopazy miankandrefana sy mianavaratra ary mianatsimo sy miantsinanana ny masonao, dia aoka hijery; satria tsy hahazo mita izany Jôrdàna izany ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.27 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 23-27:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 27.12-14; Deot 32.48-52.
      marker-yv: yv-n
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Josoa no omeo baiko, dia ampaherezo sy hatanjaho, satria izy no hiampita eo alohan’ity vahoaka ity sady hampahazo azy ny tany izay ho hitanao.»
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nijanona teo an-dohasaha tandrifin’i Bety-Pehôra isika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bety-Pehôra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tanàna eo am-bodin’ny tendrombohitra Pisgà.'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natolotry ny TOMPO Andriamanitsika eo an-tanantsika koa i Hôga, mpanjakan’i Basàna, mbamin’ny tafiny manontolo; noresentsika ireo ka tsy nisy niangana na iray akory aza. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afatsika tamin’izay ny tanànany enimpolo izay nanjakàn’i Hôga manerana ny faritany Argôba manontolo tao Basàna. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tanànamimanda avokoa ireo tanàna ireo ka samy nisy manda avo sy vavahady voahidy mafy; ankoatra ireo, dia nisy tanàna kely maro dia maro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noravantsika tanteraka ireny tanàna ireny ary naringantsika ny lehilahy mbamin’ny zaza amam-behivavy isan-tanàna, toy ny nataontsika tamin’ny tanànan’i Sihôna mpanjaka tao Hesbôna. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny biby fiompy rehetra sy ny fananana tamin’ireo tanàna ireo no nobabointsika.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fizaràna ny faritany Gilehada
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tamin’izany andro izany, dia nalaintsika tamin’ny mpanjaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: amôrita
    - type: text
      text: ' anankiroa ny tany izay any an-dafin’i Jôrdàna, manomboka amin’ny lohasahan-driaka Arnôna ka miafara amin’ny tendrombohitra Hermôna'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hermôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tendrombohitra ao avaratr’i Palestinina, ka ao no ipoiran’ny loharanon’i Jôrdàna.'
      marker-yv: yv-n
    - type: text
      text: ', '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(dia i Hermôna izay nataon’ny Tsidônianina hoe Siriôna ary nataon’ny Amôrita kosa hoe Senîra). '
