document_id: NUM.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanavahana ny olona tsy madio
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: Azy ny zava-masina aterin’ny olona tsirairay; ary na inona na inona omen’ny olona ny mpisorona dia azy koa.
  - type: heading
    content: Lalàna ny amin’ny vehivavy ahina ho mpanitsakitsa-bady
  '11':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '12':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '–Mety hisy vehivavy nanitsakitsaka ny vadiny; '
  '13':
  - type: text
    content: 'lehilahy hafa no nanao firaisana taminy ka nandoto azy, nefa tsy hitan’ny lahy izy fa niafina sady tsy misy vavolombelona hiampanga azy no tsy tratra am-bodiomby koa. '
  '14':
  - type: text
    content: 'Dia saropiaro ny lahy ka miahiahy ny vadiny sady voaloto tokoa io; na saropiaro izy ka miahiahy ny vadiny saingy tsy voaloto kosa io. '
  '15':
  - type: text
    content: 'Na ahoana na ahoana, dia hitondra ny vadiny eo amin’ny mpisorona ralehilahy ka hanolotra fanatitra noho ny amin-dravehivavy, dia lafarinina ôrza telo kilao. Tsy handrarahany menaka io lafarinina io sady tsy hasiany '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' satria fanatitra noho ny fahasaropiaro, fanati-piampangana natao hanehoana fahadisoana. '
  '16':
  - type: text
    content: 'Ary hoentin’ny mpisorona eo amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ravehivavy mba hiseho eo anatrehan’ny TOMPO. '
  '17':
  - type: text
    content: Dia hisy rano manan-kasina
  - type: note
    content: 'rano manan-kasina: mampisalasala ny hevitry ny fomba fiteny; tsy fantatra raha toa ka rano notahirizina tao amin’ny Toeramasina izany, na koa rano avy tamina loharano manan-kasina.'
  - type: text
    content: 'halain’ny mpisorona amin’ny lovia tany ka hafangarony amin’ny vovoka noraofina teo amin’ny tanin’ny Fonena-masina. '
  '18':
  - type: text
    content: Harakorakon’ny mpisorona ny volon’ilay vehivavy miseho eo anatrehan’ny TOMPO, ary hapetrany eo am-pelatanany ny fanati-piampangana, izany hoe ny fanati-pahasarotam-piaro. Fa ny mpisorona kosa hitana ny rano mangidy
  - type: note
    content: 'harakorako: mety ho mariky ny fivalozana, avy amin’ny fomba fisaonana (ampit Lev 10.6). –rano mangidy: rano manan-kasina mifangaro vovoka.'
  - type: text
    content: ' izay mitondra ozona. '
  '19':
  - type: text
    content: 'Hampianiana an-dravehivavy izy ka hanao aminy hoe: «Raha tsy marina fa nisy lehilahy niray taminao ka nandoto anao tamin’ny fanitsakitsahanao ny vadinao, dia afaka amin’ity rano mangidy mitondra ozona ity ianao. '
  '2':
  - type: text
    content: 'mba handidy ny Israelita hoe:'
  - type: text
    content: '–Aoka havoaka hiala ny toby avokoa izay rehetra '
  - type: text
    content: marary hoditra
  - type: text
    content: ', na voan’ny angatra, na '
  - type: text
    content: maloto
  - type: text
    content: ' nikasi-paty! '
  '20':
  - type: text
    content: 'Fa raha voaloto tamin’ny nanitsakitsahanao ny vadinao kosa ianao, ka niray tamin’olon-kafa ankoatra ny vadinao, '
  '21':
  - type: text
    content: dia hataon’ny TOMPO ohatry ny fanozonana sy fianianana eo amin’ny firenenao anie ianao; hataony momba koa anie ianao ary hampivontosiny ny kibonao
  - type: note
    content: Jereo Is 65.15; Jer 42.18.
  - type: text
    content: '; '
  '22':
  - type: text
    content: 'ity rano mitondra ozona ity anie no hiditra ao an-kibonao ka hampivonto azy sy hahamomba anao!» Dia hamaly ravehivavy hoe: ‹'
  - type: text
    content: Amen
  - type: text
    content: '! Ho tanteraka anie izany!›'
  '23':
  - type: text
    content: '«Horaiketin’ny mpisorona an-tsoratra izany tsitsika izany ka hasitriny ao anatin’ny rano mangidy ny taratasy mba hahavoafafa ny soratra. '
  '24':
  - type: text
    content: 'Hampisotroiny an-dravehivavy ny rano mangidy mitondra ozona; ary io rano io dia hiditra ao an-kibony ka ho tonga mangidy aminy. '
  '25':
  - type: text
    content: 'Alohan’ny hanomezana rano an-dravehivavy, dia halain’ny mpisorona eo an-tanan-dravehivavy ny fanati-pahasaropiaro, dia hahevahevany eo anatrehan’ny Tompo ary hoentiny eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: '. '
  '26':
  - type: text
    content: Hangalan’ny mpisorona eran’ny tanana, ho fampahatsiarovana ny TOMPO izany fanatitra izany
  - type: note
    content: Jereo Lev 2.2 sy nta.
  - type: text
    content: ' ka hodorany hanetona eo amin’ny alitara; izay vao hampisotroiny an-dravehivavy ny rano. '
  '27':
  - type: text
    content: 'Rehefa avy nisotro izy, dia izao no hiseho: raha voaloto izy satria nanitsakitsaka tokoa ny vadiny, dia hiditra ao aminy hanjary mangidy ny rano mitondra ozona ka hampibontsina ny kibony sady hahatonga azy ho momba; ary ho ohatry ny fanozonana eo amin’ny fireneny ravehivavy. '
  '28':
  - type: text
    content: Fa raha tsy voaloto kosa izy fa madio, dia tsy hanan-tsiny ka mbola afaka hiteraka.
  '29':
  - type: text
    content: '«Izany no lalàna momba ny fahasaropiaro, raha misy vehivavy ratsy fitondrantena ka voaloto tamin’ny fanitsakitsahana ny vadiny '
  '3':
  - type: text
    content: Havoakanareo
  - type: note
    content: Jereo Lev 13.46.
  - type: text
    content: ' any ivelan’ny toby ireo na lahy na vavy mba tsy handotoany ny toby izay itoerako eo afovoany.'
  '30':
  - type: text
    content: 'na misy lehilahy azon’ny fahasaropiaro ka miahiahy ny vadiny: hasain’ny lahy miseho eo anatrehan’ny TOMPO ravehivavy hampiharan’ny mpisorona izany fombam-pivavahana rehetra izany. '
  '31':
  - type: text
    content: Tsy hanan-tsiny amin’izay ny lahy; fa ny vavy kosa raha meloka, dia handray ny vokatr’izany.»
  '4':
  - type: text
    content: Nankatoavin’ny Israelita izay nandidian’ny TOMPO an’i Mosesy, ka navokany any ivelan’ny toby avokoa izay rehetra maloto.
  - type: heading
    content: Fanonerana raha misy fahadisoana
  '5':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '6':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '–Raha misy lehilahy na vehivavy diso amin’ny TOMPO satria nanao izay mampalahelo olona, dia meloka tokoa tokoa izy. '
  '7':
  - type: text
    content: 'Tsy maintsy hiaiky ny fahotana nataony izy ka hanonitra amin’ny tompony izay zavatra nalainy, miampy ny ampahadimin’ny vidiny. '
  '8':
  - type: text
    content: 'Raha tàhiny maty ilay tompon-javatra sady tsy manan-kavana akaiky hahazoana manonitra ilay zavatra, dia homena ny TOMPO io, izany hoe ho an’ny mpisorona; manginy fotsiny ny ondrilahy hatao '
  - type: text
    content: sorom-panonerana
  - type: text
    content: ' ka hanaovana fombam-pivavahana famelan-keloka'
  - type: note
    content: 'And 5-8: jereo Lev 5.20-26.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Ny fanatitra isan-karazany ataon’ny Israelita momba ny zava-masina izay arosony eo amin’ny mpisorona dia an’ny mpisorona. '
