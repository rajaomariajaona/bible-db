document_id: NUM.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanavahana ny olona tsy madio
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba handidy ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka havoaka hiala ny toby avokoa izay rehetra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: marary hoditra
  - type: text
    text: ', na voan’ny angatra, na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' nikasi-paty! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Havoakanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 13.46.
    marker-yv: yv-n
  - type: text
    text: ' any ivelan’ny toby ireo na lahy na vavy mba tsy handotoany ny toby izay itoerako eo afovoany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nankatoavin’ny Israelita izay nandidian’ny TOMPO an’i Mosesy, ka navokany any ivelan’ny toby avokoa izay rehetra maloto.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanonerana raha misy fahadisoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha misy lehilahy na vehivavy diso amin’ny TOMPO satria nanao izay mampalahelo olona, dia meloka tokoa tokoa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy maintsy hiaiky ny fahotana nataony izy ka hanonitra amin’ny tompony izay zavatra nalainy, miampy ny ampahadimin’ny vidiny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha tàhiny maty ilay tompon-javatra sady tsy manan-kavana akaiky hahazoana manonitra ilay zavatra, dia homena ny TOMPO io, izany hoe ho an’ny mpisorona; manginy fotsiny ny ondrilahy hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorom-panonerana
  - type: text
    text: ' ka hanaovana fombam-pivavahana famelan-keloka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 5-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 5.20-26.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny fanatitra isan-karazany ataon’ny Israelita momba ny zava-masina izay arosony eo amin’ny mpisorona dia an’ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Azy ny zava-masina aterin’ny olona tsirairay; ary na inona na inona omen’ny olona ny mpisorona dia azy koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna ny amin’ny vehivavy ahina ho mpanitsakitsa-bady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mety hisy vehivavy nanitsakitsaka ny vadiny; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'lehilahy hafa no nanao firaisana taminy ka nandoto azy, nefa tsy hitan’ny lahy izy fa niafina sady tsy misy vavolombelona hiampanga azy no tsy tratra am-bodiomby koa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia saropiaro ny lahy ka miahiahy ny vadiny sady voaloto tokoa io; na saropiaro izy ka miahiahy ny vadiny saingy tsy voaloto kosa io. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Na ahoana na ahoana, dia hitondra ny vadiny eo amin’ny mpisorona ralehilahy ka hanolotra fanatitra noho ny amin-dravehivavy, dia lafarinina ôrza telo kilao. Tsy handrarahany menaka io lafarinina io sady tsy hasiany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' satria fanatitra noho ny fahasaropiaro, fanati-piampangana natao hanehoana fahadisoana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoentin’ny mpisorona eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' ravehivavy mba hiseho eo anatrehan’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia hisy rano manan-kasina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'rano manan-kasina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mampisalasala ny hevitry ny fomba fiteny; tsy fantatra raha toa ka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' notahirizina tao amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Toeramasina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany, na koa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' avy tamina loharano '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manan-kasina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'halain’ny mpisorona amin’ny lovia tany ka hafangarony amin’ny vovoka noraofina teo amin’ny tanin’ny Fonena-masina. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Harakorakon’ny mpisorona ny volon’ilay vehivavy miseho eo anatrehan’ny TOMPO, ary hapetrany eo am-pelatanany ny fanati-piampangana, izany hoe ny fanati-pahasarotam-piaro. Fa ny mpisorona kosa hitana ny rano mangidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'harakorako: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho mariky ny fivalozana, avy amin’ny fomba fisaonana (ampit Lev 10.6). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: rano mangidy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': rano manan-kasina mifangaro vovoka.'
    marker-yv: yv-n
  - type: text
    text: ' izay mitondra ozona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hampianiana an-dravehivavy izy ka hanao aminy hoe: «Raha tsy marina fa nisy lehilahy niray taminao ka nandoto anao tamin’ny fanitsakitsahanao ny vadinao, dia afaka amin’ity rano mangidy mitondra ozona ity ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha voaloto tamin’ny nanitsakitsahanao ny vadinao kosa ianao, ka niray tamin’olon-kafa ankoatra ny vadinao, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: dia hataon’ny TOMPO ohatry ny fanozonana sy fianianana eo amin’ny firenenao anie ianao; hataony momba koa anie ianao ary hampivontosiny ny kibonao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 65.15; Jer 42.18.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ity rano mitondra ozona ity anie no hiditra ao an-kibonao ka hampivonto azy sy hahamomba anao!» Dia hamaly ravehivavy hoe: ‹'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: '! Ho tanteraka anie izany!›'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Horaiketin’ny mpisorona an-tsoratra izany tsitsika izany ka hasitriny ao anatin’ny rano mangidy ny taratasy mba hahavoafafa ny soratra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hampisotroiny an-dravehivavy ny rano mangidy mitondra ozona; ary io rano io dia hiditra ao an-kibony ka ho tonga mangidy aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alohan’ny hanomezana rano an-dravehivavy, dia halain’ny mpisorona eo an-tanan-dravehivavy ny fanati-pahasaropiaro, dia hahevahevany eo anatrehan’ny Tompo ary hoentiny eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hangalan’ny mpisorona eran’ny tanana, ho fampahatsiarovana ny TOMPO izany fanatitra izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 2.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ka hodorany hanetona eo amin’ny alitara; izay vao hampisotroiny an-dravehivavy ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Rehefa avy nisotro izy, dia izao no hiseho: raha voaloto izy satria nanitsakitsaka tokoa ny vadiny, dia hiditra ao aminy hanjary mangidy ny rano mitondra ozona ka hampibontsina ny kibony sady hahatonga azy ho momba; ary ho ohatry ny fanozonana eo amin’ny fireneny ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa raha tsy voaloto kosa izy fa madio, dia tsy hanan-tsiny ka mbola afaka hiteraka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Izany no lalàna momba ny fahasaropiaro, raha misy vehivavy ratsy fitondrantena ka voaloto tamin’ny fanitsakitsahana ny vadiny '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'na misy lehilahy azon’ny fahasaropiaro ka miahiahy ny vadiny: hasain’ny lahy miseho eo anatrehan’ny TOMPO ravehivavy hampiharan’ny mpisorona izany fombam-pivavahana rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tsy hanan-tsiny amin’izay ny lahy; fa ny vavy kosa raha meloka, dia handray ny vokatr’izany.»
