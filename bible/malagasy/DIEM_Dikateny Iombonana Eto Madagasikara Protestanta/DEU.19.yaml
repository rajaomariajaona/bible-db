document_id: DEU.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny tanàna fialofana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rahatrizay haringan’ny TOMPO Andriamanitrareo sady horesenareo ny firenena mpanana ny tany izay homen’ny TOMPO Andriamanitrareo anareo, dia honenanareo ny tanànany sy ny tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Hozarainareo ho faritra telo izany tany omen’ny TOMPO Andriamanitrareo ho fanananareo izany; dia hanokana tanàna telo eo afovoan’ny isam-paritany ianareo ka hamboatra ny lalana mankany mba hahazoan’izay mahafaty olona rehetra mandositra ao amin’ireo tanàna ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ka hamboatra ny lalana mankany mba...: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ka hoheverinareo ny halaviran-dalana manelanelana azy mba... –mandositra ao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit 4.41-43; Nom 35.9-34; Jos 20.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny mahazo mandositra ao ka ho velona aina dia izay olona nahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ohatra ny olona izay miaraka amin’ny namany ho any an’ala mba hikapa hazo; ka nony manainga ny famaky hikapa ny hazo ireo tanany, dia mitsoaka amin’ny zarany ny lela-famaky ary mahavoa sady mahafaty ilay namany: handositra ao amin’ny anankiray amin’ireo tanàna ireo izany olona izany ka ho velona aina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ny mpamaly faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 35.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', raha mbola mirehi-katezerana, mba tsy hanenjika ny nahafaty olona ka hahatratra azy mbola lavitry ny tanàna handosirany sy hamely hahafaty azy; nefa olona tsy tokony ho faty izy, satria tsy nankahala ny namany teo aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa izany no andidiako anareo hoe: «Manokàna tanàna telo ho fialofanareo!». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Raha imasoanareo hotanterahina manontolo izao didy ampitaiko aminareo anio izao ka hotiavinareo ny TOMPO Andriamanitrareo ary hizoranareo mandrakariva ny sori-dàlany, dia hitarin’ny TOMPO Andriamanitrareo ny faritaninareo, araka izay nampanantenainy ombàm-pianianana tamin’ny razambenareo. Ary amin’izay, dia hampianareo tanàna fialofana telo indray iretsy telo iretsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izany no tsy hisian’ny famonoana olona tsy manan-tsiny eo amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo; ka tsy ho meloka amin’ny famonoana olona tsy manan-tsiny ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa mety misy olona mankahala ny namany ka manotrika hamely azy, dia miantoraka aminy sy mamono mahafaty azy, ary avy eo mandositra ho ao amin’ny anankiray amin’ireo tanàna fialofana ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amin’izay kosa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' amin’ny tanàna fiaviany dia haniraka haka azy ao ary hanolotra azy eo an-tanan’ny mpamaly faty mba hovonoiny ho faty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: tsy hangorahanareo izy. Izany no hanesoranareo amin’i Israely ny famonoana olona tsy manan-tsiny ary izany koa no hahitanareo soa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny orim-bato famaritan-tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ao amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo, dia aza mamindra ny orim-bato mamaritra ny tanin’ny namanareo, orim-bato izay efa vitan’ny razana tamin’ny zaratany azonareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 27.17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavolombelona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha vavolombelona iray monja, dia aoka tsy hitsangana hiampanga olona ny amin’izay heloka na ota nataony na inona na inona; fa amin’ny tenin’ny vavolombelona roa na telo no hitombenan’ny raharaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 17.16; Nom 35.30; Mt 18.16; 2 Kôr 13.1; 1Tim 5.19; Heb 10.28.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha misy vavolombelona mijoro hanendrikendrika olona ho nanao ratsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia hankeo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasin
  - type: text
    text: '’ny TOMPO izy roa lahy miady ka hiseho eo anatrehan’ireo mpisorona sy ireo mpitsara tompon’anjara amin’izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hanao famotorana lalina ny mpitsara; ka raha hitany fa vavolombelona mandainga ilay vavolombelona noho izy miampanga lainga ny namany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia araka izay nokasainy hatao amin’io namany io no hataonareo aminy. Izany no hanesoranareo ny fanao ratsy ho fongotra eo anivonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary handre izany ny olona hafa rehetra, dia hatahotra ka tsy hanao ratsy toy izany intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy hangorahanareo akory ilay mpanendrikendrika; fa aina no hataonareo solon’ny aina, maso no solon’ny maso, nify no solon’ny nify, tanana no solon’ny tanana, tongotra no solon’ny tongotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aretin-koditra isan-karazany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia jereo Lev 13–14. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –levita mpisorona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': 17.9 sy nta.'
    marker-yv: yv-n
  - type: text
    text: .
