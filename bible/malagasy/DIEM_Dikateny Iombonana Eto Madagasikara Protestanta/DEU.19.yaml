document_id: DEU.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny tanàna fialofana
  - type: text
    content: 'Rahatrizay haringan’ny TOMPO Andriamanitrareo sady horesenareo ny firenena mpanana ny tany izay homen’ny TOMPO Andriamanitrareo anareo, dia honenanareo ny tanànany sy ny tranony. '
  '10':
  - type: text
    content: Izany no tsy hisian’ny famonoana olona tsy manan-tsiny eo amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo; ka tsy ho meloka amin’ny famonoana olona tsy manan-tsiny ianareo.
  '11':
  - type: text
    content: 'Fa mety misy olona mankahala ny namany ka manotrika hamely azy, dia miantoraka aminy sy mamono mahafaty azy, ary avy eo mandositra ho ao amin’ny anankiray amin’ireo tanàna fialofana ireo. '
  '12':
  - type: text
    content: 'Amin’izay kosa ny '
  - type: text
    content: loholona
  - type: text
    content: ' amin’ny tanàna fiaviany dia haniraka haka azy ao ary hanolotra azy eo an-tanan’ny mpamaly faty mba hovonoiny ho faty; '
  '13':
  - type: text
    content: tsy hangorahanareo izy. Izany no hanesoranareo amin’i Israely ny famonoana olona tsy manan-tsiny ary izany koa no hahitanareo soa.
  - type: heading
    content: Ny orim-bato famaritan-tany
  '14':
  - type: text
    content: Ao amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo, dia aza mamindra ny orim-bato mamaritra ny tanin’ny namanareo, orim-bato izay efa vitan’ny razana tamin’ny zaratany azonareo
  - type: note
    content: Jereo 27.17.
  - type: text
    content: .
  - type: heading
    content: Ny vavolombelona
  '15':
  - type: text
    content: Raha vavolombelona iray monja, dia aoka tsy hitsangana hiampanga olona ny amin’izay heloka na ota nataony na inona na inona; fa amin’ny tenin’ny vavolombelona roa na telo no hitombenan’ny raharaha
  - type: note
    content: Jereo 17.16; Nom 35.30; Mt 18.16; 2 Kôr 13.1; 1Tim 5.19; Heb 10.28.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Raha misy vavolombelona mijoro hanendrikendrika olona ho nanao ratsy, '
  '17':
  - type: text
    content: 'dia hankeo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO izy roa lahy miady ka hiseho eo anatrehan’ireo mpisorona sy ireo mpitsara tompon’anjara amin’izany andro izany. '
  '18':
  - type: text
    content: 'Ary hanao famotorana lalina ny mpitsara; ka raha hitany fa vavolombelona mandainga ilay vavolombelona noho izy miampanga lainga ny namany, '
  '19':
  - type: text
    content: 'dia araka izay nokasainy hatao amin’io namany io no hataonareo aminy. Izany no hanesoranareo ny fanao ratsy ho fongotra eo anivonareo. '
  '2':
  - type: text
    content: Hozarainareo ho faritra telo izany tany omen’ny TOMPO Andriamanitrareo ho fanananareo izany; dia hanokana tanàna telo eo afovoan’ny isam-paritany ianareo ka hamboatra ny lalana mankany mba hahazoan’izay mahafaty olona rehetra mandositra ao amin’ireo tanàna ireo
  - type: note
    content: 'ka hamboatra ny lalana mankany mba...: ka hoheverinareo ny halaviran-dalana manelanelana azy mba... –mandositra ao ampit 4.41-43; Nom 35.9-34; Jos 20.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'Ary handre izany ny olona hafa rehetra, dia hatahotra ka tsy hanao ratsy toy izany intsony. '
  '21':
  - type: text
    content: Tsy hangorahanareo akory ilay mpanendrikendrika; fa aina no hataonareo solon’ny aina, maso no solon’ny maso, nify no solon’ny nify, tanana no solon’ny tanana, tongotra no solon’ny tongotra
  - type: note
    content: 'Ny amin’ny aretin-koditra isan-karazany dia jereo Lev 13–14. –levita mpisorona: 17.9 sy nta.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Ny mahazo mandositra ao ka ho velona aina dia izay olona nahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha. '
  '5':
  - type: text
    content: 'Ohatra ny olona izay miaraka amin’ny namany ho any an’ala mba hikapa hazo; ka nony manainga ny famaky hikapa ny hazo ireo tanany, dia mitsoaka amin’ny zarany ny lela-famaky ary mahavoa sady mahafaty ilay namany: handositra ao amin’ny anankiray amin’ireo tanàna ireo izany olona izany ka ho velona aina. '
  '6':
  - type: text
    content: Aoka ny mpamaly faty
  - type: note
    content: Jereo Nom 35.12 sy nta.
  - type: text
    content: ', raha mbola mirehi-katezerana, mba tsy hanenjika ny nahafaty olona ka hahatratra azy mbola lavitry ny tanàna handosirany sy hamely hahafaty azy; nefa olona tsy tokony ho faty izy, satria tsy nankahala ny namany teo aloha. '
  '7':
  - type: text
    content: 'Koa izany no andidiako anareo hoe: «Manokàna tanàna telo ho fialofanareo!». '
  '8':
  - type: text
    content: 'Raha imasoanareo hotanterahina manontolo izao didy ampitaiko aminareo anio izao ka hotiavinareo ny TOMPO Andriamanitrareo ary hizoranareo mandrakariva ny sori-dàlany, dia hitarin’ny TOMPO Andriamanitrareo ny faritaninareo, araka izay nampanantenainy ombàm-pianianana tamin’ny razambenareo. Ary amin’izay, dia hampianareo tanàna fialofana telo indray iretsy telo iretsy. '
