document_id: RUT.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitsimpona salohim-bary eny an-tanimbarin’i Bôhaza i Rota
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Nahômỳ dia nanana havana, lehilahy manan-karena be avy amin’ny fianakavian’i Elimelèka vadiny; ny anarany atao hoe Bôhaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy i Rota, vehivavy môabita, tamin’i Nahômỳ:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avelao aho handeha ho eny an-tanimbary mba hitsimpona salohim-bary eo aorian’izay olona ho tsara fanahy amiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nanana alalana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hitsimpona ny salohim-bary
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' najanon’ireo mpijinja ny mahantra. Jereo Lev 19.9-10; Deot 24.19-21.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana àry, anaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia lasa i Rota ka nandeha nitsimpona teny an-tanimbary, teo aorian’ny mpijinja; ary sendra tao amin’ny tanimbary izay anjaran’i Bôhaza, fianakavian’i Elimelèka indrindra, no nandehanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Taoriana kely dia indro tonga i Bôhaza avy tany Betlehema, ka niarahaba ny mpijinja hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hiaraka aminareo anie ny TOMPO!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hotahin
  - type: text
    text: ’ny TOMPO anie ianao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanontany ilay mpanompony, sady lehiben’ny mpijinja, i Bôhaza nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba iza io vehivavy tanora io?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia namaly ilay mpanompo, lehiben’ny mpijinja, ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ilay vehivavy môabita io, izay niaraka tamin’i Nahômỳ fony izy niverina tany amin’ny faritr’i Môaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nangata-dalana izy mba hitsimpona sy hanangona salohim-bary eo aorian’ny mpijinja. Dia tonga izy ary naharitra niasa teto; hatramin’ny maraina ka mandraka izao, dia kely foana no nijanonany tetsy an-tranotomboka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tsy mazava loatra ny RM. Dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy niala sasatra izy tany an-trano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: niala sasatra kely fotsiny izy tany an-trano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Bôhaza tamin’i Rota:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mba henoy ny torohevitro. Aza mandeha hitsimpona any an-tanimbary hafa, ary koa aza miala eto; fa mijanòna miaraka amin’ny vehivavy mpiasako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jereo tsara ny tanimbary izay jinjain’ny mpanompoko, dia miaraha amin’ireo vehivavy mpitsimpona salohim-bary. Moa tsy efa nandidy ireo mpanompoko ve aho mba tsy hikasi-tanana anao akory? Ary rehefa mangetaheta ianao, dia mandehana misotro rano amin’ireo siny izay efa nofenoin’ireo mpanompoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niondrika sy niankohoka tamin’ny tany teo anatrehan’i Bôhaza i Rota sady niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana ianao no tsara fanahy amiko sy mitsinjo ahy, kanefa aho vahiny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia namaly i Bôhaza ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa notantaraina tsara tamiko avokoa izay nataonao tamin’ny rafozambavinao taorian’ny nahafatesan’ny vadinao; reko ny nandaozanao ny ray aman-dreninao sy ny tany nahabe anao ka nandehananao ho atỳ amin’ny firenena izay tsy mbola fantatrao akory taloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny TOMPO anie hamaly soa ny nataonao, ka hisy valisoa mitafotafo ho anao avy amin’ny TOMPO Andriamanitr’Israely satria tonga hialoka eo ambany fiarovany ianao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Rota hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ho tsara fanahy amiko hatrany ianao, tompoko, satria efa nampionona ahy ianao ary efa niteny ankamoram-po tamiko na dia tsy tahaka ny anankiray amin’ireo vehivavy mpiasanao aza aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tamin’ny fotoana fisakafoana, dia hoy i Bôhaza tamin’i Rota:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manatona atỳ hisakafo; makà tapa-mofo ary atsobohy ao anatin’ny lasôsy vinaingitra ny tapa-mofonao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nipetraka teo anilan’ny mpijinja i Rota; ary notoloran’i Bôhaza lango izy. Dia nihinana ka voky, sady mbola nisy sisa notehiriziny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa nitsangana hitsimpona salohim-bary izy, dia nandidy ny mpanompony kosa i Bôhaza nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avelao hitsimpona eny anelanelan’ireo amboara koa izy, fa aza tabainareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Raha ny tokony ho izy dia tsy afaka ny hitsimpona ny salohim-bary raha tsy efa vita ny asan’ny mpijinja ary efa nesorina ny amboara.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Anasory mihitsy aza ny salohy sasany avy amin’ny amboara, dia ilaozy mba hotsimponiny, ka aza miteny azy akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia nitsimpona teo an-tanimbarin’i Bôhaza i Rota mandra-paharivan’ny andro, ary noveleziny ny salohy izay voatsimpony ka nisy vary ôrza tokony ho iray kitapo kely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'vary ôrza tokony ho iray kitapo kely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe 30 kilao teo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nentiny izany ka nankany an-tanàna izy; nasehony an-drafozambaviny izay voatsimpony, sady navoakany koa ary nomeny azy ny sisa tsy laniny tamin’ny sakafony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ny rafozambaviny taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Taiza no nitsimponanao androany, ary taiza ho aiza no niasanao? '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hotahin
  - type: text
    text: ’Andriamanitra anie ilay olona nitsinjo anao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia notantarain’i Rota tamin’ny rafozambaviny izay toerana sy olona niasany, ka hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–I Bôhaza no anaran’ilay lehilahy niasako androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy i Nahômỳ tamin’ny vinantovaviny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny TOMPO Izay tsy mitsahatra manao soa amintsika velona sy amin’ny maty anie hitahy azy!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy kosa izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Io lehilahy io dia havana akaiky antsika, ka anisan’ireo mahavotra antsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: I Bôhaza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia fianakavian’i Elimelèka (jereo 2.1). '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny havana akaikin’ny
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' maty dia nanana tombontsoa hividy ny tanin’ilay maty ary miaro azy ao amin’ny fianakaviana. Jereo 4.1,8; Jer 32.7-9. Araka izany dia tokony hanaraka ny lalànan’ny fitondran-doloha. Jereo 1.11 sy ny nta, 3.9 sy 4.5, 14.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy indray i Rota vehivavy môabita:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nomeny ny lalana koa aza aho mba hanohy hitsimpona eny aorian’ny mpanompony mandra-pahavitan’ny fijinjana rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy i Nahômỳ tamin’i Rota vinantovaviny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsara izany anaka, satria hivoaka miaraka amin’ireo vehivavy mpiasan’i Bôhaza ianao, fandrao hisy hikasi-tanana anao raha any amin’ny tanimbary hafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nandeha nitsimpona niaraka tamin’ireo vehivavy mpiasan’i Bôhaza i Rota mandra-pahavitan’ny fijinjana ny vary ôrza sy ny varimbazaha rehetra. Dia niara-nipetraka tamin’ny rafozambaviny hatrany izy.
