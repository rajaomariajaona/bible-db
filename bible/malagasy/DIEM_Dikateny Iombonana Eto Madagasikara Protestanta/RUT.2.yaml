document_id: RUT.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitsimpona salohim-bary eny an-tanimbarin’i Bôhaza i Rota
  - type: text
    content: 'Ary Nahômỳ dia nanana havana, lehilahy manan-karena be avy amin’ny fianakavian’i Elimelèka vadiny; ny anarany atao hoe Bôhaza. '
  '10':
  - type: text
    content: 'Dia niondrika sy niankohoka tamin’ny tany teo anatrehan’i Bôhaza i Rota sady niteny taminy hoe:'
  - type: text
    content: –Ahoana ianao no tsara fanahy amiko sy mitsinjo ahy, kanefa aho vahiny?
  '11':
  - type: text
    content: 'Dia namaly i Bôhaza ka nanao taminy hoe:'
  - type: text
    content: '–Efa notantaraina tsara tamiko avokoa izay nataonao tamin’ny rafozambavinao taorian’ny nahafatesan’ny vadinao; reko ny nandaozanao ny ray aman-dreninao sy ny tany nahabe anao ka nandehananao ho atỳ amin’ny firenena izay tsy mbola fantatrao akory taloha. '
  '12':
  - type: text
    content: Ny TOMPO anie hamaly soa ny nataonao, ka hisy valisoa mitafotafo ho anao avy amin’ny TOMPO Andriamanitr’Israely satria tonga hialoka eo ambany fiarovany ianao!
  '13':
  - type: text
    content: 'Dia hoy i Rota hoe:'
  - type: text
    content: –Aoka ho tsara fanahy amiko hatrany ianao, tompoko, satria efa nampionona ahy ianao ary efa niteny ankamoram-po tamiko na dia tsy tahaka ny anankiray amin’ireo vehivavy mpiasanao aza aho.
  '14':
  - type: text
    content: 'Ary tamin’ny fotoana fisakafoana, dia hoy i Bôhaza tamin’i Rota:'
  - type: text
    content: –Manatona atỳ hisakafo; makà tapa-mofo ary atsobohy ao anatin’ny lasôsy vinaingitra ny tapa-mofonao.
  - type: text
    content: 'Dia nipetraka teo anilan’ny mpijinja i Rota; ary notoloran’i Bôhaza lango izy. Dia nihinana ka voky, sady mbola nisy sisa notehiriziny. '
  '15':
  - type: text
    content: 'Ary rehefa nitsangana hitsimpona salohim-bary izy, dia nandidy ny mpanompony kosa i Bôhaza nanao hoe:'
  - type: text
    content: –Avelao hitsimpona eny anelanelan’ireo amboara koa izy, fa aza tabainareo
  - type: note
    content: Raha ny tokony ho izy dia tsy afaka ny hitsimpona ny salohim-bary raha tsy efa vita ny asan’ny mpijinja ary efa nesorina ny amboara.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Anasory mihitsy aza ny salohy sasany avy amin’ny amboara, dia ilaozy mba hotsimponiny, ka aza miteny azy akory.
  '17':
  - type: text
    content: Dia nitsimpona teo an-tanimbarin’i Bôhaza i Rota mandra-paharivan’ny andro, ary noveleziny ny salohy izay voatsimpony ka nisy vary ôrza tokony ho iray kitapo kely
  - type: note
    content: 'vary ôrza tokony ho iray kitapo kely: izany hoe 30 kilao teo.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Dia nentiny izany ka nankany an-tanàna izy; nasehony an-drafozambaviny izay voatsimpony, sady navoakany koa ary nomeny azy ny sisa tsy laniny tamin’ny sakafony. '
  '19':
  - type: text
    content: 'Dia hoy ny rafozambaviny taminy:'
  - type: text
    content: '–Taiza no nitsimponanao androany, ary taiza ho aiza no niasanao? '
  - type: text
    content: Hotahin
  - type: text
    content: ’Andriamanitra anie ilay olona nitsinjo anao!
  - type: text
    content: 'Dia notantarain’i Rota tamin’ny rafozambaviny izay toerana sy olona niasany, ka hoy izy hoe:'
  - type: text
    content: '–I Bôhaza no anaran’ilay lehilahy niasako androany. '
  '2':
  - type: text
    content: 'Ary hoy i Rota, vehivavy môabita, tamin’i Nahômỳ:'
  - type: text
    content: –Avelao aho handeha ho eny an-tanimbary mba hitsimpona salohim-bary eo aorian’izay olona ho tsara fanahy amiko
  - type: note
    content: Nanana alalana hitsimpona ny salohim-bary najanon’ireo mpijinja ny mahantra. Jereo Lev 19.9-10; Deot 24.19-21.
  - type: text
    content: '!'
  - type: text
    content: 'Dia hoy izy taminy:'
  - type: text
    content: –Mandehana àry, anaka.
  '20':
  - type: text
    content: 'Dia hoy i Nahômỳ tamin’ny vinantovaviny:'
  - type: text
    content: –Ny TOMPO Izay tsy mitsahatra manao soa amintsika velona sy amin’ny maty anie hitahy azy!
  - type: text
    content: 'Hoy kosa izy hoe:'
  - type: text
    content: –Io lehilahy io dia havana akaiky antsika, ka anisan’ireo mahavotra antsika
  - type: note
    content: I Bôhaza dia fianakavian’i Elimelèka (jereo 2.1). Ny havana akaikin’ny maty dia nanana tombontsoa hividy ny tanin’ilay maty ary miaro azy ao amin’ny fianakaviana. Jereo 4.1,8; Jer 32.7-9. Araka izany dia tokony hanaraka ny lalànan’ny fitondran-doloha. Jereo 1.11 sy ny nta, 3.9 sy 4.5, 14.
  - type: text
    content: .
  '21':
  - type: text
    content: 'Dia hoy indray i Rota vehivavy môabita:'
  - type: text
    content: –Nomeny ny lalana koa aza aho mba hanohy hitsimpona eny aorian’ny mpanompony mandra-pahavitan’ny fijinjana rehetra.
  '22':
  - type: text
    content: 'Dia hoy i Nahômỳ tamin’i Rota vinantovaviny:'
  - type: text
    content: –Tsara izany anaka, satria hivoaka miaraka amin’ireo vehivavy mpiasan’i Bôhaza ianao, fandrao hisy hikasi-tanana anao raha any amin’ny tanimbary hafa.
  '23':
  - type: text
    content: Dia nandeha nitsimpona niaraka tamin’ireo vehivavy mpiasan’i Bôhaza i Rota mandra-pahavitan’ny fijinjana ny vary ôrza sy ny varimbazaha rehetra. Dia niara-nipetraka tamin’ny rafozambaviny hatrany izy.
  '3':
  - type: text
    content: Dia lasa i Rota ka nandeha nitsimpona teny an-tanimbary, teo aorian’ny mpijinja; ary sendra tao amin’ny tanimbary izay anjaran’i Bôhaza, fianakavian’i Elimelèka indrindra, no nandehanany.
  '4':
  - type: text
    content: 'Taoriana kely dia indro tonga i Bôhaza avy tany Betlehema, ka niarahaba ny mpijinja hoe:'
  - type: text
    content: –Hiaraka aminareo anie ny TOMPO!
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –
  - type: text
    content: Hotahin
  - type: text
    content: ’ny TOMPO anie ianao!
  '5':
  - type: text
    content: 'Dia nanontany ilay mpanompony, sady lehiben’ny mpijinja, i Bôhaza nanao hoe:'
  - type: text
    content: –Mba iza io vehivavy tanora io?
  '6':
  - type: text
    content: 'Dia namaly ilay mpanompo, lehiben’ny mpijinja, ka nanao hoe:'
  - type: text
    content: '–Ilay vehivavy môabita io, izay niaraka tamin’i Nahômỳ fony izy niverina tany amin’ny faritr’i Môaba. '
  '7':
  - type: text
    content: Nangata-dalana izy mba hitsimpona sy hanangona salohim-bary eo aorian’ny mpijinja. Dia tonga izy ary naharitra niasa teto; hatramin’ny maraina ka mandraka izao, dia kely foana no nijanonany tetsy an-tranotomboka
  - type: note
    content: Tsy mazava loatra ny RM. Dkt hafa tsy niala sasatra izy tany an-trano na niala sasatra kely fotsiny izy tany an-trano.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Dia hoy i Bôhaza tamin’i Rota:'
  - type: text
    content: '–Mba henoy ny torohevitro. Aza mandeha hitsimpona any an-tanimbary hafa, ary koa aza miala eto; fa mijanòna miaraka amin’ny vehivavy mpiasako. '
  '9':
  - type: text
    content: Jereo tsara ny tanimbary izay jinjain’ny mpanompoko, dia miaraha amin’ireo vehivavy mpitsimpona salohim-bary. Moa tsy efa nandidy ireo mpanompoko ve aho mba tsy hikasi-tanana anao akory? Ary rehefa mangetaheta ianao, dia mandehana misotro rano amin’ireo siny izay efa nofenoin’ireo mpanompoko.
