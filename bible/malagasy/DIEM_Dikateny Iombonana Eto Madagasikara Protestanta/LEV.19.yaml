document_id: LEV.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Didy maro samy hafa momba ny fitondrantena
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: Aza otazana koa ny sampaho tavela amin’ny voalobokareo, ary aza tsimponina ny voany latsaka amin’ny tany; fa avelao izany ho an’ny mahantra sy ny vahiny. Izaho no TOMPO Andriamanitrareo
  - type: note
    content: 'And 9-10: jereo 23.22; Deot 24.1-22.'
  - type: text
    content: .
  '11':
  - type: text
    content: «Aza mangalatra, aza mandainga, ary aza mifamitaka ianareo
  - type: note
    content: 'Aza mangalatra: jereo Eks 20.15 sy nta; Deot 5.19. –aza mandainga: jereo 5.21-22.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: Aza mianiana amin’ny anarako mba hamitahana satria manala baràka ny anarako izany
  - type: note
    content: Jereo 5.24; Eks 20.7,16; Jer 5.2; Mt 5.33; Asa 6.13.
  - type: text
    content: . Izaho no TOMPO Andriamanitrareo.
  '13':
  - type: text
    content: «Aza mamoritra ny namanareo hahazoana ny fananany, aza manendaka azy; ary aza tananao miloaka alina ny karaman’ny mpikaramanareo
  - type: note
    content: Jereo 5.21-23; Eks 22.20; Deot 24.14-15; Ezek 22.12.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Aza miteny ratsy ny marenina, ary aza manisy sakana hampianjera eo alohan’ny jamba
  - type: note
    content: Jereo Deot 27.18; Jôb 29.15.
  - type: text
    content: ; izany no hanehoanareo fanajana Ahy Andriamanitrareo. Izaho no TOMPO.
  '15':
  - type: text
    content: '«Aza manao izay tsy marina amin’ny fitsarana: ny mahantra, aza ananana tombom-pitia; ny lehibe, aza ananana hena-maso; fa ara-drariny no aoka hitsaranareo ny mpiray firenena aminareo'
  - type: note
    content: Jereo Eks 23.3, 6-8; Deot 1.17; 16.19.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Aza manely fanendrikendrehana olona eo amin’ny mpiray firenena aminareo. Aza mitsangan-ko vavolombelona mandainga mba hanamelohana ny namanareo ho faty. Izaho no TOMPO.
  '17':
  - type: text
    content: «Aza mankahala ao am-ponareo ny mpiray firenena aminareo fa anaro tsara izy
  - type: note
    content: Jereo Mt 18.15.
  - type: text
    content: ' mba tsy hahazoanareo heloka noho ny aminy. '
  '18':
  - type: text
    content: Aza mamaly ratsy na manao lolom-po amin’ny mpiray firenena aminao fa tiavo ny namanao tahaka ny itiavanao ny tenanao
  - type: note
    content: Jereo 19.34; Mt 5.43; 19.19; 22.39; Mk 12.31; Lk 10.27; Rm 13.9; Gal 5.14; Jak 2.8.
  - type: text
    content: . Izaho no TOMPO.
  '19':
  - type: text
    content: '«Tandremonareo koa ireto didiko ireto:'
  - type: text
    content: «Aza avela hiray amin’ny hafa karazana noho izy ny biby fiompinao; aza fafazana voan-javatra roa karazana mifangaroharo ny tanimbolinao; ary aza mitondra fitafiana voatenona tamina kofehy roa karazana mifamahofaho
  - type: note
    content: Jereo Deot 22.9-11.
  - type: text
    content: .
  '2':
  - type: text
    content: 'mba hamepetra ny Fiangonana israelita tsivakivolo hoe:'
  - type: text
    content: «Aoka ho masina ianareo satria masina Aho, ilay TOMPO Andriamanitrareo
  - type: note
    content: Jereo 11.44-45; 1Pt 1.16.
  - type: text
    content: .
  '20':
  - type: text
    content: «Raha misy lehilahy miray amina vehivavy mpanompo izay voafofon’olon-kafa ho vadiny, nefa mbola tsy voaavotra na voavotsotra ho olona afaka, dia handoa onitra izany lehilahy izany
  - type: note
    content: dia handoa onitra izany lehilahy izany dkt hafa dia hiharan-tsazy izy roroa, na hoe dia hatao famotorana izy roroa.
  - type: text
    content: '; saingy tsy hohelohina ho faty izy roroa satria tsy olona afaka ravehivavy. '
  '21':
  - type: text
    content: 'Hisy koa sorom-panorenana amiko TOMPO hoentin-dralehilahy ho eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', dia ny ondrilahy anankiray fanao sorom-panonerana. '
  '22':
  - type: text
    content: Io ondrilahy io no hanaovan’ny mpisorona ny fombam-pivavahana famelan-keloka ho azy eo anatrehako TOMPO noho ny fahotana nataony; dia havela izany fahotany izany.
  '23':
  - type: text
    content: '«Rehefa tafiditra any amin’ilay tany ianareo ka mamboly hazo fihinam-boa isan-karazany, dia hataonareo ho '
  - type: text
    content: maloto
  - type: text
    content: ' ny voany mandritra ny telo taona voalohany ka tsy hohanina. '
  '24':
  - type: text
    content: 'Amin’ny taona fahefatra, dia hatokana ho Ahy avokoa ny voany mba ho fiderana Ahy TOMPO. '
  '25':
  - type: text
    content: Fa amin’ny taona fahadimy vao hihinana ny voany ianareo. Raha izany no ataonareo, dia hitombo ny fahavokaran’ny hazo ho anareo. Izaho no TOMPO Andriamanitrareo.
  '26':
  - type: text
    content: «Aza eo amin’ny tany andrarahana ny ram-biby no ihinananareo ny henany; aza manao sikidy na fanandroana
  - type: note
    content: 'Aza eo...henany: fampahatsiahivana sakafo fanaon’ny mpanompo sampy izany, sakafo izay mifangaroharo amina fombafomba majika mifanohitra amin’ny finoan’ireo Israelita (ampit 1 Sam 14.32-33). Dkt hafa Aza homana henam-biby tsy natsika ra (ampit Gen 9.4; Lev 17.10-11). –sikidy na fanandroana: jereo Deot 18.10-11-12; 2 Mp 17.17; 21.6; 2 Tan 33.6.'
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Aza hetezana atao vorivory ny sisim-bolon-dohanareo, ary aza haratana ny volon-tavanareo. '
  '28':
  - type: text
    content: Aza ratraratraina ny tenanareo ho fisaonana ny maty
  - type: note
    content: Jereo 21.5; Deot 14.1; Jer 41.5.
  - type: text
    content: ', ary aza asiana tombokavatsa ny hoditrareo. Izaho no TOMPO.'
  '29':
  - type: text
    content: «Aza manala baràka ny zanakavavinareo amin’ny fampijangajangana azy
  - type: note
    content: Jereo Deot 23.18; Jer 2.20 sy nta.
  - type: text
    content: '; fandrao ny mponina eo amin’ny tany no hivarilavo amin’ny fijangajangana ka ho feno haratsiam-pitondrantena. '
  '3':
  - type: text
    content: '«Samia manaja ny ray aman-dreninareo, ary tandremo ny '
  - type: text
    content: sabata
  - type: text
    content: ' nodidiako hitsaharana'
  - type: note
    content: 'Samia...aman-dreninareo: jereo 20.9; Eks 20.12; 21.17; Deot 5.16; Ezek 22.7; Mt 15.4; Ef 6.2. –sabata nodidiako hitsaharana: jereo 19.30; 23.3; 26.2; Eks 20.8-11; Deot 5.12-15; Ezek 22.8; Mt 12.1-2.'
  - type: text
    content: . Izaho no TOMPO Andriamanitrareo.
  '30':
  - type: text
    content: 'Tandremo ny sabata nodidiako hitsaharana ary hajao ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' onenako'
  - type: note
    content: Jereo 19.3 sy nta.
  - type: text
    content: . Izaho no TOMPO.
  '31':
  - type: text
    content: «Aza mivily hanaraka izay mpamoha angatra sy izay olona tsindrian-javatra
  - type: note
    content: Jereo 20.6, 27; Deot 18.10-11; 1 Sam 28.3; 2 Mp 23.2; Is 8.19.
  - type: text
    content: . Aza maka hevitra aminy fandrao voalotony ianareo. Izaho no TOMPO Andriamanitrareo.
  '32':
  - type: text
    content: «Mitsangàna ianao raha manoloana ny olona efa antitra ho fanomezam-boninahitra azy; izany no hanehoanao fanajana Ahy Andriamanitrao. Izaho no TOMPO.
  '33':
  - type: text
    content: '«Rehefa misy vahiny hiorim-ponenana eo amin’ny taninareo, dia aza mampahory azy. '
  '34':
  - type: text
    content: Ataovy tahaka ny anankiray aminareo tompontany ihany no fitondra ny vahiny valovotaka eo aminareo; fa efa mba vahiny tany Ejipta ianareo
  - type: note
    content: 'And 33-34: jereo Eks 22.20; Deot 24.17-18; 27.19.'
  - type: text
    content: . Izaho no TOMPO Andriamanitrareo.
  '35':
  - type: text
    content: '«Aza manao izay tsy marina eo amin’ny lamina voarindra momba ny refy sy lanja ary fatra. '
  '36':
  - type: text
    content: Mizàna marina sy vatomizana marina ary famarana marina no tano
  - type: note
    content: 'And 35-36: jereo Deot 25.13-16; Ohab 11.1; 20.10; Ezek 45.10-12; Ham 8.5; Mi 6.11.'
  - type: text
    content: . Izaho no TOMPO Andriamanitrareo, Izay namoaka anareo hiala tany Ejipta.
  '37':
  - type: text
    content: «Imasoy hotanterahinareo ny lalànako amam-pitsipiko rehetra. Izaho no TOMPO.»
  '4':
  - type: text
    content: «Aza mivily hanaraka ireo andriamani-tsiizy ary aza manao andriamanitra anidina ho anareo
  - type: note
    content: 'andriamani-tsiizy: jereo 26.1; Eks 20.3; 34.14; Sal 81.10; Mt 4.10. –andriamanitra anidina: Eks 20.4-5; 32.1-6; 34.17; Deot 27.15; 1 Mp 12.28-30; ampit Is 44.16-17.'
  - type: text
    content: . Izaho no TOMPO Andriamanitrareo.
  '5':
  - type: text
    content: '«Rehefa manolotra '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' amiko TOMPO ianareo, dia ataovy araka izay hahazoanareo sitraka amiko izany. '
  '6':
  - type: text
    content: 'Ny andro hamonoana ny sorona sy ny ampitson’iny no hihinananareo azy; fa izay sisa tratry ny andro fahatelo kosa dia hodorana. '
  '7':
  - type: text
    content: 'Raha mbola hanina amin’ny andro fahatelo izany, dia tsy hahazoana sitraka amiko satria hena tsy manan-kasina intsony. '
  '8':
  - type: text
    content: Izay mihinana azy amin’izany, dia itambesaran-keloka satria manamavo ny zavatra voatokana ho Ahy TOMPO; ka dia hofongorana tsy ho anisan’ny vahoaka israelita izany olona izany.
  '9':
  - type: text
    content: '«Rehefa mijinja ny vokatry ny tanimbarinareo ianareo, dia aza jinjana ny eny an-tsisiny; ary aza tsimponina ny salohim-bary natao hotsimponin’ny hafa amin’ny vokatrareo. '
