    text: Atsaharo ny mitondra fanatitra fa tsy ilaina akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maharikoriko Ahy ny eton’ny soronareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: atsaharo ny fankalazana ny tsinam-bolana
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' ary ny fetim-piangonana.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy zakako ny fanompoam-pivavahana mifangaro heloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Halako ny fankalazanareo ny tsinam-bolana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fombam-pivavahanareo manetriketrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny enta-mavesatra amiko ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sasatry ny mitondra azy Aho
  - type: usfm
