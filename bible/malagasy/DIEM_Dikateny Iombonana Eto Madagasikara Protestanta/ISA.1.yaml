  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa, ry lanitra, ary mandrenesa, ry tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'satria ny TOMPO no miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Efa nitaiza sy nahalehibe zanaka Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo nikomy tamiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny omby mahalala ny tompony manana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny boriky mahalala ny fihinanam-bilona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay famahanan’ny tompony azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa i Israely tsy te hahalala na inona na inona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny vahoakako tsy mba mahafantatra.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy misy tsy marary ny tanin’i Joda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Loza! firenena mpanota ianao, ry Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vahoaka mivesatra heloka ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: solofon’ny mpanao ratsy, taranaka lomorina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nilaozanareo ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nataonareo tsinontsinona ilay Masin’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa niamboho Azy ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aiza indray àry no tianareo hikapohana anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mbola mikiry amin’ny ditranareo ihany ianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa feno ratra avokoa ny loha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary marary ny fo manontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hatrany am-paladia ka hatrany an-tampon-doha
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia tsy misy tsy marary:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ratra, dian-kapoka, fery vao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mbola nisy nanadio
- type: usfm
  marker: q1
  children:
  - type: text
    text: na namehy na nanisy diloilo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa lao ny taninareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kilan’ny afo ny tanànanareo;
- type: usfm
  marker: q1
  children:
  - type: text
