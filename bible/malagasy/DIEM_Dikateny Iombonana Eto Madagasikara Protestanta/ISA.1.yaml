    text: sy toy ny kitranotrano rantsan-kazo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao anaty tanimbolin-kôkômbra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny tanàna efa atao fahirano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
