- type: usfm
  marker: q1
  children:
  - type: text
    text: avoty izay voan’ny tsindry hazo lena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ento ara-drariny ny kamboty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsarao ny adin’ny mpitondratena.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Raha mbola hikomy ihany ianareo, dia...
  marker-yv: yv-h
- type: usfm
