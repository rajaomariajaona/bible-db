  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: «Avia fa hifandahatra isika, hoy ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia mena midorehitra aza ny fahotanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho fotsy tahaka ny oram-panala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia mangatrakatraka tahaka ny jaky aza ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tahaka ny volon’ondry fotsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Raha manaiky ianareo ka mankatò,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihinana ny vokatra tsara avy amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa raha mandà kosa ianareo ka mikomy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny sabatra no handripaka anareo.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no nambaran’ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanadiovana an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ahoana no nahatonga janga ity tanàna nahatoky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
