  - type: text
    text: «Hataoko inona moa, hoy ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo sorona marobe atolotrareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa mankaleo Ahy mihitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ondrilahy atao sorona dorana manontolo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny saboran-janak’omby nafahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ankasitrahiko intsony na ny ran’ombilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny ran’ny zanak’ondry na ny ran’osilahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ianareo izay tonga hiseho eto anatrehako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moa Izaho ve no nangataka anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanitsakitsaka ny kianjan’ny tempoliko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
