    - type: text
      text: '15'
  - type: text
    text: Raha manandra-tanana hivavaka ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hitampi-maso tsy hijery Aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na manao vavaka maro aza ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hihaino akory Aho,
- type: usfm
  marker: q1
  children:
