document_id: ISA.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: FIZARÀNA VOALOHANY
  - type: text
    content: Fanambaràn’i Isaià, zanakalahin’i Amôtsa, ny amin’i Joda sy i Jerosalema. Nanafaran’ny Tompo azy izany, tamin’ny andron’i Hozià sy i Jôtama ary i Ahaza sy i Hezekià mpanjakan’i Joda
  - type: note
    content: 'Hozià-Hazarià: jereo 2 Mp 15.1-7; 2 Tan 26.1-23. –Jôtama: 2 Mp 15.32-38; 2 Tan 27.1-9. –Ahaza: 2 Mp 16.1-20; 2 Tan 28.1-27. –Hezekià: 2 Mp 18.1–20.21; 2 Tan 29.1–32.33. –Ny nanaovan’i Isaià ny fandraharahany dia teo amin’ny taonjato fahavalo tapany faharoa sy ny fiandohan’ny taonjato fahafito.'
  - type: text
    content: .
  - type: heading
    content: Vahoaka tsy mahalala na inona na inona
  '10':
  - type: text
    content: Mihainoa ny tenin’ny TOMPO,
  - type: text
    content: ry mpitondra lomorina tahaka an’i Sôdôma;
  - type: text
    content: mandrenesa ny lalànan’ilay Andriamanitsika,
  - type: text
    content: ry vahoaka ratsy toetra tahaka an’i Gômôra
  - type: note
    content: Jereo Gen 18.20; 19.4-9.
  - type: text
    content: ':'
  '11':
  - type: text
    content: «Hataoko inona moa, hoy ny TOMPO,
  - type: text
    content: ireo sorona marobe atolotrareo?
  - type: text
    content: Efa mankaleo Ahy mihitsy
  - type: text
    content: ny ondrilahy atao sorona dorana manontolo
  - type: text
    content: sy ny saboran-janak’omby nafahy.
  - type: text
    content: Tsy ankasitrahiko intsony na ny ran’ombilahy
  - type: text
    content: na ny ran’ny zanak’ondry na ny ran’osilahy.
  '12':
  - type: text
    content: Ianareo izay tonga hiseho eto anatrehako,
  - type: text
    content: moa Izaho ve no nangataka anareo
  - type: text
    content: hanitsakitsaka ny kianjan’ny tempoliko?
  '13':
  - type: text
    content: Atsaharo ny mitondra fanatitra fa tsy ilaina akory;
  - type: text
    content: maharikoriko Ahy ny eton’ny soronareo;
  - type: text
    content: atsaharo ny fankalazana ny tsinam-bolana
  - type: text
    content: 'sy ny '
  - type: text
    content: sabata
  - type: text
    content: ' ary ny fetim-piangonana.'
  - type: text
    content: Tsy zakako ny fanompoam-pivavahana mifangaro heloka.
  '14':
  - type: text
    content: Halako ny fankalazanareo ny tsinam-bolana
  - type: text
    content: sy ny fombam-pivavahanareo manetriketrika;
  - type: text
    content: toy ny enta-mavesatra amiko ireny
  - type: text
    content: ka sasatry ny mitondra azy Aho
  - type: note
    content: 'And 11-14: jereo Ham 5.21-22.'
  - type: text
    content: .
  '15':
  - type: text
    content: Raha manandra-tanana hivavaka ianareo
  - type: text
    content: dia hitampi-maso tsy hijery Aho.
  - type: text
    content: Na manao vavaka maro aza ianareo,
  - type: text
    content: dia tsy hihaino akory Aho,
  - type: text
    content: satria feno ra ny tananareo.
  '16':
  - type: text
    content: 'Koa misasà ary '
  - type: text
    content: midiova
  - type: text
    content: ' ianareo;'
  - type: text
    content: esory tsy ho hitako intsony
  - type: text
    content: ny asa ratsy fanaonareo,
  - type: text
    content: atsaharo ny manao ratsy.
  '17':
  - type: text
    content: Mianara hanao ny tsara,
  - type: text
    content: tadiavo ny rariny,
  - type: text
    content: avoty izay voan’ny tsindry hazo lena,
  - type: text
    content: ento ara-drariny ny kamboty,
  - type: text
    content: tsarao ny adin’ny mpitondratena.
  - type: heading
    content: Raha mbola hikomy ihany ianareo, dia...
  '18':
  - type: text
    content: «Avia fa hifandahatra isika, hoy ny TOMPO.
  - type: text
    content: Na dia mena midorehitra aza ny fahotanareo,
  - type: text
    content: dia ho fotsy tahaka ny oram-panala,
  - type: text
    content: na dia mangatrakatraka tahaka ny jaky aza ireny,
  - type: text
    content: dia ho tahaka ny volon’ondry fotsy.
  '19':
  - type: text
    content: Raha manaiky ianareo ka mankatò,
  - type: text
    content: dia hihinana ny vokatra tsara avy amin’ny tany.
  '2':
  - type: text
    content: Mihainoa, ry lanitra, ary mandrenesa, ry tany,
  - type: text
    content: 'satria ny TOMPO no miteny hoe:'
  - type: text
    content: «Efa nitaiza sy nahalehibe zanaka Aho;
  - type: text
    content: kanjo nikomy tamiko izy.
  '20':
  - type: text
    content: Fa raha mandà kosa ianareo ka mikomy,
  - type: text
    content: dia ny sabatra no handripaka anareo.»
  - type: text
    content: Izany no nambaran’ny TOMPO.
  - type: heading
    content: Ny fanadiovana an’i Jerosalema
  '21':
  - type: text
    content: Ahoana no nahatonga janga ity tanàna nahatoky
  - type: note
    content: 'Momba ny fivadihan’ny vahoakan’Andriamanitra oharina amin’ny fijangajangana: jereo Jer 2.20; 3.1; 5.7; 13.27 sns; Hôs 4.13-14.'
  - type: text
    content: '?'
  - type: text
    content: Feno rariny anefa tao taloha
  - type: text
    content: sady nitoeran’ny fahamarinana;
  - type: text
    content: fa ankehitriny kosa mpamono olona no ao.
  '22':
  - type: text
    content: Toa volafotsy nanjary tain-drendrika
  - type: text
    content: ary toa divay voatapo-drano ianao, ry Jerosalema.
  '23':
  - type: text
    content: Mpikomy ireo mpanapaka anao,
  - type: text
    content: sady mpiray tsikombakomba amin’ny mpangalatra.
  - type: text
    content: Samy tia tsolotra izy rehetra,
  - type: text
    content: ary mpandray kolikoly avokoa.
  - type: text
    content: Ny kamboty tsy entiny ara-drariny
  - type: text
    content: ary ny adin’ny mpitondratena tsy tsarainy.
  '24':
  - type: text
    content: Noho izany ny TOMPO Andriamanitr’izao rehetra izao,
  - type: text
    content: 'Ilay Maherin’i Israely, dia manao teny hentitra hoe:'
  - type: text
    content: «Loza! hiala vonkina amin’ny mpanohitra Ahy Aho,
  - type: text
    content: ary hamaly faty amin’ireo fahavaloko!
  '25':
  - type: text
    content: Ry Jerosalema,
  - type: text
    content: 'hahita raharaha amiko ianao:'
  - type: text
    content: hodioviko amin’ny afo ianao
  - type: text
    content: mba hialan’ny tain-drendrikao
  - type: text
    content: ary hoesoriko ny lotom-pirakao rehetra.
  '26':
  - type: text
    content: Haveriko amin’ny laoniny ny mpitsaranao
  - type: text
    content: ho tahaka ny mpitsara taloha,
  - type: text
    content: ary koa ny mpanolotsainao
  - type: text
    content: ho tahaka ny tamin’ny andro fahiny
  - type: note
    content: 'tamin’ny andro fahiny: izany hoe faha-Davida mpanjaka.'
  - type: text
    content: .
  - type: text
    content: Amin’izay ianao dia hantsoina hoe
  - type: text
    content: ‹Renivohi-pahamarinana› sy ‹Tanàna mahatoky.› »
  '27':
  - type: text
    content: Ho voavonjy i Tsiôna
  - type: text
    content: rehefa mitandro ny rariny;
  - type: text
    content: ary ho voavonjy ireo mponiny
  - type: text
    content: niala tamin’ny toe-dratsy
  - type: text
    content: rehefa mampihatra ny fahamarinana.
  '28':
  - type: text
    content: Fa ny mpikomy sy ny mpanota kosa dia hiara-potika,
  - type: text
    content: ary izay mahafoy ny TOMPO dia ho levona.
  '29':
  - type: text
    content: Tena ho diso fanantenana ianareo
  - type: text
    content: ny amin’ireo hazo terebinta izay nolalainareo;
  - type: text
    content: eny, ho menatra ianareo
  - type: text
    content: ny amin’ireo toerana nofidinareo
  - type: text
    content: hanaovana ny fombafomban-tsampy
  - type: note
    content: Ny fombam-pivavahana kanahanita momba ny fahavokarana no tsiahivin’ny mpaminany eto. Ampit Is 17.10; Hôs 4.13.
  - type: text
    content: .
  '3':
  - type: text
    content: Ny omby mahalala ny tompony manana azy,
  - type: text
    content: ary ny boriky mahalala ny fihinanam-bilona
  - type: text
    content: izay famahanan’ny tompony azy;
  - type: text
    content: Fa i Israely tsy te hahalala na inona na inona;
  - type: text
    content: eny, ny vahoakako tsy mba mahafantatra.»
  - type: heading
    content: Tsy misy tsy marary ny tanin’i Joda
  '30':
  - type: text
    content: Fa ho tahaka ireo hazo terebinta
  - type: text
    content: mihintsan-dravina ianareo
  - type: text
    content: sy ho tahaka ireo toerana tsy misy rano.
  '31':
  - type: text
    content: Ho toy ny vohavoha ny lehilahy mahery
  - type: text
    content: ary ho toy ny kilalaon’afo ny asany
  - type: text
    content: hodorana miaraka izy roa tonta
  - type: text
    content: ka tsy misy hamono ny afo.
  '4':
  - type: text
    content: Loza! firenena mpanota ianao, ry Joda;
  - type: text
    content: vahoaka mivesatra heloka ianareo,
  - type: text
    content: solofon’ny mpanao ratsy, taranaka lomorina!
  - type: text
    content: Nilaozanareo ny TOMPO,
  - type: text
    content: nataonareo tsinontsinona ilay Masin’i Israely,
  - type: text
    content: fa niamboho Azy ianareo.
  '5':
  - type: text
    content: Aiza indray àry no tianareo hikapohana anareo
  - type: text
    content: no mbola mikiry amin’ny ditranareo ihany ianareo?
  - type: text
    content: Efa feno ratra avokoa ny loha,
  - type: text
    content: ary marary ny fo manontolo.
  '6':
  - type: text
    content: Hatrany am-paladia ka hatrany an-tampon-doha
  - type: text
    content: 'dia tsy misy tsy marary:'
  - type: text
    content: ratra, dian-kapoka, fery vao,
  - type: text
    content: tsy mbola nisy nanadio
  - type: text
    content: na namehy na nanisy diloilo.
  '7':
  - type: text
    content: Efa lao ny taninareo,
  - type: text
    content: kilan’ny afo ny tanànanareo;
  - type: text
    content: ny tany novolenareo aza
  - type: text
    content: dia ny vahiny no nihinana
  - type: text
    content: ny vokany teo anatrehanareo,
  - type: text
    content: ka efa lao tokoa izany
  - type: text
    content: tahaka ny faharavàn’i Sôdôma
  - type: note
    content: 'Sôdôma: rijan-teny tokony ho izy araka ny Deot 29.22 sy Jer 49.18. –ny faharavàn’i Sôdôma: jereo Gen 19.23-25.'
  - type: text
    content: .
  '8':
  - type: text
    content: I Jerosalema irery sisa no hany tafajoro,
  - type: text
    content: toy ny tranotomboka ao anaty tanimboaloboka,
  - type: text
    content: sy toy ny kitranotrano rantsan-kazo
  - type: text
    content: ao anaty tanimbolin-kôkômbra,
  - type: text
    content: ary toy ny tanàna efa atao fahirano.
  '9':
  - type: text
    content: Raha tsy navelan’ny TOMPOn’izao rehetra izao
  - type: text
    content: hisy olona vitsivitsy velona aina tamintsika,
  - type: text
    content: dia ho efa tonga tahaka an’i Sôdôma
  - type: text
    content: sy ho nitovy tamin’i Gômôra isika
  - type: note
    content: Jereo Rm 9.29.
  - type: text
    content: .
  - type: heading
    content: Fanompoam-pivavahana maharikoriko an’Andriamanitra
