- type: usfm
  marker: q1
  children:
  - type: text
    text: Feno rariny anefa tao taloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nitoeran’ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ankehitriny kosa mpamono olona no ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Toa volafotsy nanjary tain-drendrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toa divay voatapo-drano ianao, ry Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mpikomy ireo mpanapaka anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mpiray tsikombakomba amin’ny mpangalatra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy tia tsolotra izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mpandray kolikoly avokoa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny kamboty tsy entiny ara-drariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny adin’ny mpitondratena tsy tsarainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Noho izany ny TOMPO Andriamanitr’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ilay Maherin’i Israely, dia manao teny hentitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Loza! hiala vonkina amin’ny mpanohitra Ahy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamaly faty amin’ireo fahavaloko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ry Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'hahita raharaha amiko ianao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hodioviko amin’ny afo ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hialan’ny tain-drendrikao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hoesoriko ny lotom-pirakao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Haveriko amin’ny laoniny ny mpitsaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny mpitsara taloha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa ny mpanolotsainao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny tamin’ny andro fahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
