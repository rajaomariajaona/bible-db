- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vokany teo anatrehanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka efa lao tokoa izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny faharavàn’i Sôdôma
