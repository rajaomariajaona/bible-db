document_id: MAT.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitoriteny eo an-tendrombohitra i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nony nahita ny vahoaka i Jesoa, dia niakatra teo an-tendrombohitra; ary rehefa tafapetraka Izy, dia nohatonin’ny mpianany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niteny i Jesoa ka nampianatra azy rehetra hoe:'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hasambarana azo antoka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 6.20-23)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: –Sambatra izay miaiky ao am-po ho mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa azy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sambatra izay mitomany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izy no hampiononin’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra izay malemy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izy no handova ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampanantenain’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sambatra izay maniry mafy hanao ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: nosoritan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izy no homen’Andriamanitra fahafaham-po!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sambatra izay mamindra fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izy no hamindran’Andriamanitra fo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sambatra izay mahitsy fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izy no hahita an’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sambatra izay mpampihavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izy no hantsoin’Andriamanitra hoe zanany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sambatra izay enjehina noho izy manao ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: nosoritan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa azy ny Fanjakàn’ny lanitra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sambatra ianareo raha tevatevain’ny olona sy enjehiny ary ampangaina lainga amin’ny ratsy isan-karazany noho ny maha '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatro
  - type: text
    text: ' anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mifalia sy miravoravoa ianareo fa lehibe ny valisoa miandry anareo any an-danitra, satria toy izany no nanenjehany ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminani
  - type: text
    text: n’Andriamanitra talohanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2 Tan 36.16; Asa 7.52.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sira sy fahazavana ny mpianatr’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 9.50; Lk 14.34-35)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '–Ianareo no sira hanasoa ny tany; fa raha ny sira no tonga matsatso, hatao ahoana indray no fanome hasina azy? Tsy misy antony intsony izy fa dia ariam-potsiny any ivelany hohitsakitsahin’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ianareo no fahazavana ho an’izao tontolo izao; tsy azo afenina ny tanàna miorina eo an-tampon-tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary tsy misy mampirehitra jiro ka hametraka azy ao ambany vata famarana; fa eo ambony fitoeran-jiro no apetrany mba hanazava izay rehetra ao an-trano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tamin’iny faritany atsinanan’ny Ranomasina Mediteranea iny dia vitan’ny efitra tokana ihany ny tranon’ny sarambabembahoaka fahizany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka hamiratra eo imason’ny olona toy izany koa ny fahazavanareo, mba hahitany ny asa soa ataonareo ka hanomezany voninahitra ny Rainareo Izay any an-danitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalànan’i Mosesy mbamin’ny fampianaran’ny mpaminany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '–Aza heverinareo fa hanafoana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy mbamin’ny fampianaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' no nahatongavako. Tsy hanafoana no nahatongavako fa handavorary. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Eny, lazaiko marina aminareo fa mandra-pahalevon’ny tany amana habakabaka dia tsy hisy ho foana akory amin’ny lalàna, na dia ny zavatra antsipiriany sy zavatra faran’izay madinika indrindra aza, fa ho tanteraka avokoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fa ho tanteraka avokoa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mandra-pahatongan’ny faran’izao rehetra izao.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa na iza na iza handika ny anankiray amin’ny didy madinika indrindra sy hampianatra ny olona hanao toy izany, dia ho kely indrindra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: '; fa na iza na iza hanatanteraka ny didy sy hampianatra ny olona hanao toy izany, dia izy no ho lehibe ao amin’ny Fanjakàn’ny lanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eny, lazaiko aminareo fa raha toa tsy tsara kokoa noho ny an’ny mpahay lalàna sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' no anaovanareo ny marina voasoritr’Andriamanitra, dia tsy hiditra any amin’ny Fanjakàn’ny lanitra ianareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Hazavain’i Jesoa ny didy hoe: «Aza mamono olona»'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '–Efa renareo fa voalaza tamin’ny ntaolo hoe: «Aza mamono olona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eks 20.13; Deot 5.17.
    marker-yv: yv-n
  - type: text
    text: '»; ary izay mamono olona dia mendrika hatolotra ny fitsarana! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izaho koa milaza aminareo hoe: izay rehetra tezitra amin’ny namana iray finoana dia mendrika hatolotra ny fitsarana isan-tanàna; izay hanao ny namana iray finoana hoe: misy kely, dia mendrika hatolotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fitsarana ambony
  - type: text
    text: '; izay hanao azy hoe: foka, dia mendrika havarina any amin’ny lohasahan’afo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa raha manolotra ny fanatitrao amin’Andriamanitra eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ianao ary eo no mahatsiaro fa manana alahelo aminao ny namanao iray finoana, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: dia avelao eo anoloan’ny alitara ny fanatitrao, ka mandehana aloha mihavana amin’ilay namanao; izay vao miverina manolotra ny fanatitrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mihavàna faingana amin’izay manana ady aminao dieny samy mbola eny an-dalana ho any amin’ny fitsarana ianareo; fandrao ilay manana ady aminao hanolotra anao amin’ny mpitsara; ny mpitsara kosa hanolotra anao amin’ny miaramila, ka hatao am-ponja ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lazaiko marina aminao fa tsy ho afaka ao mihitsy ianao ambara-panèfanao ny iraimbilanja farany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Hazavain’i Jesoa ny didy hoe: «Aza maka vadin’olona»'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '–Efa renareo fa voalaza hoe: «Aza maka vadin’olona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eks 20.14; Deot 5.18.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izaho kosa milaza aminareo hoe: izay lehilahy mijery vehivavy vadin’olona ka mitsiriritra azy dia efa naka azy sahady tao am-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa raha mitarika anao amin’ny ratsy ny masonao ankavanana, dia esory ka ario lavitra anao; fa aleonao zavatra anankiray monja anisan’ny tenanao no very toy izay ny tenanao manontolo no arian’Andriamanitra any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lohasahan’afo
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary raha mitarika anao amin’ny ratsy ny tananao ankavanana, dia tapaho ka ario lavitra anao; fa aleonao zavatra anankiray monja anisan’ny tenanao no very toy izay ny tenanao manontolo no halefa any amin’ny lohasahan’afo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hamafisin’i Jesoa ny tsy tokony hisaraham-panambadiana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 19.18; Mk 10.11-12; Lk 16.18)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '–Efa voalaza koa hoe: «Izay lehilahy manary ny vadiny dia aoka hanome taratasy fisarahana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deot 24.1.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izaho kosa milaza aminareo hoe: izay lehilahy manary ny vadiny, afa-tsy noho ny fifandraisana mamoafady'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fifandraisana mamoafady: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izany no nandikana ny voambolana grika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: porneia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Maro ny fomba azo ivoaboasana sy anazavana izany araka ny fiangonana isan-tokony, kanefa anisan’ny tafiditra ho fifandraisana mamoafady ny fanambadiana mifotitra sy ny fanambadian’olom-pady toy ny voatanisa ao amin’ny Lev 18.6-18. Jereo koa Mt 19.9; Asa 15.20,29; 1 Kôr 5.1; ampit Mk 10.9.
    marker-yv: yv-n
  - type: text
    text: ', dia mandrisika azy hanitsakitsa-bady; ary izay lehilahy hampakatra vehivavy nariana dia maka vadin’olona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Hazavain’i Jesoa ny hoe: «Aza mianiana tsy to»'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '–Efa renareo koa fa voalaza tamin’ny ntaolo hoe: «Aza mivadika amin’ny teny napetrakao tamin’ny Tompo fa tanteraho ny teny napetrakao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 19.12; Nom 20.3; Deot 23.22-24.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Izaho kosa milaza aminareo hoe: aza mianiana mihitsy! Aza mianiana: na amin’ny lanitra, satria sezafiandrianan’Andriamanitra izany; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'na amin’ny tany, satria fitoeran-tongotr’Andriamanitra izany; na amin’i Jerosalema, satria tanànan’ny mpanjaka lehibe izany; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'na amin’ny lohanao, satria tsy hainao ny mahafotsy na mahamainty singam-bolo iray akory. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa aoka ny teninareo, rehefa eny, dia ho eny; rehefa tsia, dia ho tsia; ny ankoatra izany kosa dia avy amin’*ilay Ratsy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Lavin’i Jesoa ny hoe: «Maso efai-maso»'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
