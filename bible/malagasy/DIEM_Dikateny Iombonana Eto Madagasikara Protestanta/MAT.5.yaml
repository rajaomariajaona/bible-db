document_id: MAT.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitoriteny eo an-tendrombohitra i Jesoa
  - type: text
    content: 'Nony nahita ny vahoaka i Jesoa, dia niakatra teo an-tendrombohitra; ary rehefa tafapetraka Izy, dia nohatonin’ny mpianany. '
  '10':
  - type: text
    content: Sambatra izay enjehina noho izy manao ny marina
  - type: text
    content: nosoritan’Andriamanitra,
  - type: text
    content: fa azy ny Fanjakàn’ny lanitra!
  '11':
  - type: text
    content: 'Sambatra ianareo raha tevatevain’ny olona sy enjehiny ary ampangaina lainga amin’ny ratsy isan-karazany noho ny maha '
  - type: text
    content: mpianatro
  - type: text
    content: ' anareo. '
  '12':
  - type: text
    content: 'Mifalia sy miravoravoa ianareo fa lehibe ny valisoa miandry anareo any an-danitra, satria toy izany no nanenjehany ireo '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra talohanareo
  - type: note
    content: Ampit 2 Tan 36.16; Asa 7.52.
  - type: text
    content: '!'
  - type: heading
    content: Sira sy fahazavana ny mpianatr’i Jesoa
  - type: heading
    content: (Jereo Mk 9.50; Lk 14.34-35)
  '13':
  - type: text
    content: '–Ianareo no sira hanasoa ny tany; fa raha ny sira no tonga matsatso, hatao ahoana indray no fanome hasina azy? Tsy misy antony intsony izy fa dia ariam-potsiny any ivelany hohitsakitsahin’ny olona. '
  '14':
  - type: text
    content: 'Ianareo no fahazavana ho an’izao tontolo izao; tsy azo afenina ny tanàna miorina eo an-tampon-tendrombohitra. '
  '15':
  - type: text
    content: Ary tsy misy mampirehitra jiro ka hametraka azy ao ambany vata famarana; fa eo ambony fitoeran-jiro no apetrany mba hanazava izay rehetra ao an-trano
  - type: note
    content: Tamin’iny faritany atsinanan’ny Ranomasina Mediteranea iny dia vitan’ny efitra tokana ihany ny tranon’ny sarambabembahoaka fahizany.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Aoka hamiratra eo imason’ny olona toy izany koa ny fahazavanareo, mba hahitany ny asa soa ataonareo ka hanomezany voninahitra ny Rainareo Izay any an-danitra.
  - type: heading
    content: Ny lalànan’i Mosesy mbamin’ny fampianaran’ny mpaminany
  '17':
  - type: text
    content: '–Aza heverinareo fa hanafoana ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy mbamin’ny fampianaran’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' no nahatongavako. Tsy hanafoana no nahatongavako fa handavorary. '
  '18':
  - type: text
    content: Eny, lazaiko marina aminareo fa mandra-pahalevon’ny tany amana habakabaka dia tsy hisy ho foana akory amin’ny lalàna, na dia ny zavatra antsipiriany sy zavatra faran’izay madinika indrindra aza, fa ho tanteraka avokoa
  - type: note
    content: 'fa ho tanteraka avokoa: dkt hafa mandra-pahatongan’ny faran’izao rehetra izao.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Koa na iza na iza handika ny anankiray amin’ny didy madinika indrindra sy hampianatra ny olona hanao toy izany, dia ho kely indrindra ao amin’ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: '; fa na iza na iza hanatanteraka ny didy sy hampianatra ny olona hanao toy izany, dia izy no ho lehibe ao amin’ny Fanjakàn’ny lanitra! '
  '2':
  - type: text
    content: 'Dia niteny i Jesoa ka nampianatra azy rehetra hoe:'
  - type: heading
    content: Ny hasambarana azo antoka
  - type: heading
    content: (Jereo Lk 6.20-23)
  '20':
  - type: text
    content: 'Eny, lazaiko aminareo fa raha toa tsy tsara kokoa noho ny an’ny mpahay lalàna sy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' no anaovanareo ny marina voasoritr’Andriamanitra, dia tsy hiditra any amin’ny Fanjakàn’ny lanitra ianareo.'
  - type: heading
    content: 'Hazavain’i Jesoa ny didy hoe: «Aza mamono olona»'
  '21':
  - type: text
    content: '–Efa renareo fa voalaza tamin’ny ntaolo hoe: «Aza mamono olona'
  - type: note
    content: Eks 20.13; Deot 5.17.
  - type: text
    content: '»; ary izay mamono olona dia mendrika hatolotra ny fitsarana! '
  '22':
  - type: text
    content: 'Izaho koa milaza aminareo hoe: izay rehetra tezitra amin’ny namana iray finoana dia mendrika hatolotra ny fitsarana isan-tanàna; izay hanao ny namana iray finoana hoe: misy kely, dia mendrika hatolotra ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: '; izay hanao azy hoe: foka, dia mendrika havarina any amin’ny lohasahan’afo. '
  '23':
  - type: text
    content: 'Koa raha manolotra ny fanatitrao amin’Andriamanitra eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ianao ary eo no mahatsiaro fa manana alahelo aminao ny namanao iray finoana, '
  '24':
  - type: text
    content: dia avelao eo anoloan’ny alitara ny fanatitrao, ka mandehana aloha mihavana amin’ilay namanao; izay vao miverina manolotra ny fanatitrao.
  '25':
  - type: text
    content: 'Mihavàna faingana amin’izay manana ady aminao dieny samy mbola eny an-dalana ho any amin’ny fitsarana ianareo; fandrao ilay manana ady aminao hanolotra anao amin’ny mpitsara; ny mpitsara kosa hanolotra anao amin’ny miaramila, ka hatao am-ponja ianao. '
  '26':
  - type: text
    content: Lazaiko marina aminao fa tsy ho afaka ao mihitsy ianao ambara-panèfanao ny iraimbilanja farany.
  - type: heading
    content: 'Hazavain’i Jesoa ny didy hoe: «Aza maka vadin’olona»'
  '27':
  - type: text
    content: '–Efa renareo fa voalaza hoe: «Aza maka vadin’olona'
  - type: note
    content: Eks 20.14; Deot 5.18.
  - type: text
    content: '!» '
  '28':
  - type: text
    content: 'Izaho kosa milaza aminareo hoe: izay lehilahy mijery vehivavy vadin’olona ka mitsiriritra azy dia efa naka azy sahady tao am-pony. '
  '29':
  - type: text
    content: 'Koa raha mitarika anao amin’ny ratsy ny masonao ankavanana, dia esory ka ario lavitra anao; fa aleonao zavatra anankiray monja anisan’ny tenanao no very toy izay ny tenanao manontolo no arian’Andriamanitra any amin’ny '
  - type: text
    content: lohasahan’afo
  - type: text
    content: '. '
  '3':
  - type: text
    content: –Sambatra izay miaiky ao am-po ho mahantra,
  - type: text
    content: 'fa azy ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: '!'
  '30':
  - type: text
    content: Ary raha mitarika anao amin’ny ratsy ny tananao ankavanana, dia tapaho ka ario lavitra anao; fa aleonao zavatra anankiray monja anisan’ny tenanao no very toy izay ny tenanao manontolo no halefa any amin’ny lohasahan’afo.
  - type: heading
    content: Hamafisin’i Jesoa ny tsy tokony hisaraham-panambadiana
  - type: heading
    content: (Jereo Mt 19.18; Mk 10.11-12; Lk 16.18)
  '31':
  - type: text
    content: '–Efa voalaza koa hoe: «Izay lehilahy manary ny vadiny dia aoka hanome taratasy fisarahana'
  - type: note
    content: Deot 24.1.
  - type: text
    content: '!» '
  '32':
  - type: text
    content: 'Izaho kosa milaza aminareo hoe: izay lehilahy manary ny vadiny, afa-tsy noho ny fifandraisana mamoafady'
  - type: note
    content: 'fifandraisana mamoafady: izany no nandikana ny voambolana grika hoe porneia. Maro ny fomba azo ivoaboasana sy anazavana izany araka ny fiangonana isan-tokony, kanefa anisan’ny tafiditra ho fifandraisana mamoafady ny fanambadiana mifotitra sy ny fanambadian’olom-pady toy ny voatanisa ao amin’ny Lev 18.6-18. Jereo koa Mt 19.9; Asa 15.20,29; 1 Kôr 5.1; ampit Mk 10.9.'
  - type: text
    content: ', dia mandrisika azy hanitsakitsa-bady; ary izay lehilahy hampakatra vehivavy nariana dia maka vadin’olona.'
  - type: heading
    content: 'Hazavain’i Jesoa ny hoe: «Aza mianiana tsy to»'
  '33':
  - type: text
    content: '–Efa renareo koa fa voalaza tamin’ny ntaolo hoe: «Aza mivadika amin’ny teny napetrakao tamin’ny Tompo fa tanteraho ny teny napetrakao'
  - type: note
    content: Jereo Lev 19.12; Nom 20.3; Deot 23.22-24.
  - type: text
    content: '!» '
  '34':
  - type: text
    content: 'Izaho kosa milaza aminareo hoe: aza mianiana mihitsy! Aza mianiana: na amin’ny lanitra, satria sezafiandrianan’Andriamanitra izany; '
  '35':
  - type: text
    content: 'na amin’ny tany, satria fitoeran-tongotr’Andriamanitra izany; na amin’i Jerosalema, satria tanànan’ny mpanjaka lehibe izany; '
  '36':
  - type: text
    content: 'na amin’ny lohanao, satria tsy hainao ny mahafotsy na mahamainty singam-bolo iray akory. '
  '37':
  - type: text
    content: Fa aoka ny teninareo, rehefa eny, dia ho eny; rehefa tsia, dia ho tsia; ny ankoatra izany kosa dia avy amin’*ilay Ratsy.
  - type: heading
    content: 'Lavin’i Jesoa ny hoe: «Maso efai-maso»'
  - type: heading
    content: (Jereo Lk 6.29-30)
  '38':
  - type: text
    content: '–Efa renareo fa voalaza hoe: «Maso efai-maso, nify efai-nify'
  - type: note
    content: Eks 21.24; Lev 24.20; Deot 19.21.
  - type: text
    content: '!» '
  '39':
  - type: text
    content: 'Izaho kosa milaza aminareo hoe: aza mamaly ratsy izay manisy ratsy anao; fa raha misy mamely tehamaina ny takolakao ankavanana, atolory azy koa ny ilany! '
  '4':
  - type: text
    content: Sambatra izay mitomany,
  - type: text
    content: fa izy no hampiononin’Andriamanitra!
  '40':
  - type: text
    content: 'Raha misy mila ady aminao any amin’ny fitsarana mba hahazoany ny akanjonao, avelao ho azy koa ny lambanao. '
  '41':
  - type: text
    content: Raha misy manery anao hitondra entana mandritra ny lalana iray kilaometatra
  - type: note
    content: Azo heverina fa voatsiahy etoana ny asa an-tery vozona ampanaovin’ireo miaramila na mpiasam-panjakana rômanina.
  - type: text
    content: ', miaraha aminy mandritra ny lalana roa kilaometatra. '
  '42':
  - type: text
    content: Omeo izay mangataka aminao ary aza andosirana izay te hisambotra aminao.
  - type: heading
    content: 'Hazavain’i Jesoa ny hoe: «Tiavo ny namanao»'
  - type: heading
    content: (Jereo Lk 6.27-28, 32-36)
  '43':
  - type: text
    content: '–Efa renareo fa voalaza hoe: «Tiavo ny namanao'
  - type: note
    content: Lev 19.18.
  - type: text
    content: '» ary ankahalao ny fahavalonao! '
  '44':
  - type: text
    content: 'Izaho kosa milaza aminareo hoe: tiavo ny fahavalonareo ary mivavaha ho an’izay manenjika anareo, '
  '45':
  - type: text
    content: 'mba ho tonga zanaky ny Rainareo Izay any an-danitra ianareo; fa Izy mampiposaka ny masoandrony amin’ny ratsy fanahy sy ny tsara fanahy ary mandatsaka ny ranonorana amin’ny marina sy ny tsy marina. '
  '46':
  - type: text
    content: Fa raha izay manam-pitiavana anareo ihany no tiavinareo, inona no valisoa
  - type: note
    content: 'valisoa: tsy karama manandrify tahaka ny ao amin’ny Mt 10.41-42; 20.2, fa zavatra omen’Andriamanitra araka ny fahalalahan-tanany sy harem-pahasoavany ka mihoatra lavitra ny asa vitan’ny olona (Mt 5.12,46; 6.1,2,5,16; 20.9).'
  - type: text
    content: ' manokana azonareo andrandraina avy amin’Andriamanitra? Na dia ny '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' aza ve tsy manao toraka izany koa? '
  '47':
  - type: text
    content: 'Ary raha ny namana iray finoana ihany no arahabainareo, inona no tombony amin’ny ataonareo? Na dia ny hafa firenena aza ve tsy manao toraka izany koa? '
  '48':
  - type: text
    content: 'Tanteraka ny Rainareo Izay any an-danitra: noho izany àry, aoka ianareo ho tanteraka tahaka Azy koa'
  - type: note
    content: Ampit Lev 19.2; Deot 18.13.
  - type: text
    content: .
  '5':
  - type: text
    content: Sambatra izay malemy fanahy,
  - type: text
    content: fa izy no handova ny tany
  - type: text
    content: nampanantenain’Andriamanitra!
  '6':
  - type: text
    content: Sambatra izay maniry mafy hanao ny marina
  - type: text
    content: nosoritan’Andriamanitra,
  - type: text
    content: fa izy no homen’Andriamanitra fahafaham-po!
  '7':
  - type: text
    content: Sambatra izay mamindra fo,
  - type: text
    content: fa izy no hamindran’Andriamanitra fo!
  '8':
  - type: text
    content: Sambatra izay mahitsy fo,
  - type: text
    content: fa izy no hahita an’Andriamanitra!
  '9':
  - type: text
    content: Sambatra izay mpampihavana,
  - type: text
    content: fa izy no hantsoin’Andriamanitra hoe zanany!
