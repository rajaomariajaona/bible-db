verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vato 12 natao tsangambato ho fahatsiarovana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Jos 3.10-17; Mik 6.5; Sal 78.2-8)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tafita an’i Jôrdàna avokoa ny firenena manontolo, dia hoy ny TOMPO tamin’i Josoa:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpisorona nitondra ny Vatamasina kosa dia nijoro teo afovoan’i Jôrdàna ambara-pahatanteraky ny teny rehetra izay nodidian’ny TOMPO holazain’i Josoa amin’ny vahoaka, araka izay rehetra efa nandidian’i Mosesy an’i Josoa. Dia nita faingana ny vahoaka; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rehefa tafita avokoa ireo dia nandeha ho eny alohany indray ny mpisorona miaraka amin’ny Vatamasin’ny TOMPO. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo lehilahy mirongo fiadiana, avy amin’ny fokon’i Reobena sy fokon’i Gada ary antsasa-pokon’i Manase, dia nita teo alohan’ny Israelita sisa hafa, araka izay efa nolazain’i Mosesy taminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.12-15.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tokony ho efatra alina ireo miaramila vonon-kiady no nita an’i Jôrdàna teo anatrehan’ny TOMPO ho any amin’ny tany lemak’i Jerikao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany andro izany, dia nohamafisin’ny TOMPO teo imason’ny Israelita rehetra ny fahefàn’i Josoa; koa nohajaina tahaka ny nanajana an’i Mosesy izy nandritra ny andro rehetra niainany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany, dia hoy ny Tompo tamin’i Josoa:'
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Omeo baiko ireo mpisorona mpitondra ny Vatamasina misy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: raki-tsoratry ny fanekempihavanana
    - type: text
      text: ' mba hiakatra avy tao Jôrdàna.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nomen’i Josoa baiko ry zareo mba hiakatra avy tao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra ireo mpisorona nitondra ny Vatamasina; ka raha vao nigadona teo an-tanety ny tongony, dia niverina tamin’ny laoniny indray ny ranon’i Jôrdàna ary nihoatra ny morony rehetra toy ny teo aloha. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny andro fahafolon’ny volana voalohany no nitàn’ny vahoaka israelita an’i Jôrdàna, ary nitobiany tao Gilgala teo atsinanan’i Jerikao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny andro fahafolon’ny volana voalohany '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia andro fiomanana amin’ny Paska araka ny Eks 12.3; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny volana voalohany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', izany hoe ny faramparan’ny Marsa sy voalohandohan’ny Avrily. –I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gilgala
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tsy fantatra mazava ny toerana nisy azy, nefa tokony ho eo akaikin’i Jôrdàna eo avaratra atsinanan’i Jerikao.'
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mifidiana 12 lahy, iray avy isaky ny foko, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasain’i Josoa natsangana tao Gilgala ireo vato 12 nalaina tao Jôrdàna; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy eo dia hoy izy tamin’ny vahoaka israelita:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Any aoriana any, rehefa hanontanian’ny zanakareo ny anton’ireto vato ireto ianareo, '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia izao no hampahafantarinareo azy: «Nandia tany maina isika Israelita fahizany raha nita io Jôrdàna io. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Eny, nataon’ny TOMPO Andriamanitrareo maina ny falehan’ny ranon’i Jôrdàna teo anoloantsika mandra-pitantsika, tahaka izay nataony tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ranomasin’ny Volotara
    - type: text
      text: ' teo anoloan’ny razantsika mandra-pitany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 12.3.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izany no hahafantaran’ny firenena rehetra ambonin’ny tany fa lehibe ny herin’ny TOMPO, ary hanajanareo mandrakizay ny TOMPO Andriamanitrareo!
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ka omeo baiko hoe: «Ndeha ianareo maka vato 12 eo afovoan’i Jôrdàna, eo amin’ny toerana izay nijoroan’ny mpisorona, dia ento miaraka aminareo ny vato ka apetraho eo amin’ny toerana hitobianareo anio alina.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nantsoin’i Josoa izy 12 lahy voafidiny teo amin’ny Israelita '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandalova eo anoloan’ny Vatamasin’ny TOMPO Andriamanitrareo, dia mandehana eo afovoan’i Jôrdàna ka samia manainga vato iray ho eny an-tsorony, araka ny isan’ireo foko israelita. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ireo vato ireo dia ho famantarana eo anivonareo; koa any aoriana any ianareo, rehefa hanontanian’ny zanakareo ny anton’ireo vato, '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia hamaly hoe: «Tapaka ny ranon’i Jôrdàna noho ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
    - type: text
      text: . Eny raha nita an’i Jôrdàna ny Vatamasina; dia tapaka ny rano; ary ireo vato ireo dia hahatsiarovana mandrakizay izany zava-mahagaga izany eo amin’ny Israelita.»
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao araka izay nandidian’i Josoa azy ny olona voatendry ka naka vato 12 teo afovoan’i Jôrdàna, araka izay nolazain’ny TOMPO tamin’i Josoa sy araka ny isan’ny foko israelita. Ireo vato ireo dia nentiny niaraka taminy ho eo amin’ny toerana izay nitobiany tamin’iny alina iny ka napetrany teo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Josoa dia nampanangana vato 12 ihany koa teo afovoan’i Jôrdàna, teo amin’ny toerana izay nijoroan’ny mpisorona nitondra ny Vatamasina mirakitra ny fanekempihavanana; ary mbola ao ihany ireo vato ireo mandraka androany.
