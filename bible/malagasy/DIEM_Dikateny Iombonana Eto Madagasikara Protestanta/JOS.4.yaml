document_id: JOS.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vato 12 natao tsangambato ho fahatsiarovana
  - type: heading
    content: (Jereo Jos 3.10-17; Mik 6.5; Sal 78.2-8)
  - type: text
    content: 'Rehefa tafita an’i Jôrdàna avokoa ny firenena manontolo, dia hoy ny TOMPO tamin’i Josoa:'
  '10':
  - type: text
    content: 'Ny mpisorona nitondra ny Vatamasina kosa dia nijoro teo afovoan’i Jôrdàna ambara-pahatanteraky ny teny rehetra izay nodidian’ny TOMPO holazain’i Josoa amin’ny vahoaka, araka izay rehetra efa nandidian’i Mosesy an’i Josoa. Dia nita faingana ny vahoaka; '
  '11':
  - type: text
    content: 'ary rehefa tafita avokoa ireo dia nandeha ho eny alohany indray ny mpisorona miaraka amin’ny Vatamasin’ny TOMPO. '
  '12':
  - type: text
    content: Ireo lehilahy mirongo fiadiana, avy amin’ny fokon’i Reobena sy fokon’i Gada ary antsasa-pokon’i Manase, dia nita teo alohan’ny Israelita sisa hafa, araka izay efa nolazain’i Mosesy taminy
  - type: note
    content: Jereo 1.12-15.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Tokony ho efatra alina ireo miaramila vonon-kiady no nita an’i Jôrdàna teo anatrehan’ny TOMPO ho any amin’ny tany lemak’i Jerikao. '
  '14':
  - type: text
    content: Tamin’izany andro izany, dia nohamafisin’ny TOMPO teo imason’ny Israelita rehetra ny fahefàn’i Josoa; koa nohajaina tahaka ny nanajana an’i Mosesy izy nandritra ny andro rehetra niainany.
  '15':
  - type: text
    content: 'Taorian’izany, dia hoy ny Tompo tamin’i Josoa:'
  '16':
  - type: text
    content: '–Omeo baiko ireo mpisorona mpitondra ny Vatamasina misy ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: ' mba hiakatra avy tao Jôrdàna.'
  '17':
  - type: text
    content: 'Dia nomen’i Josoa baiko ry zareo mba hiakatra avy tao. '
  '18':
  - type: text
    content: 'Ary niakatra ireo mpisorona nitondra ny Vatamasina; ka raha vao nigadona teo an-tanety ny tongony, dia niverina tamin’ny laoniny indray ny ranon’i Jôrdàna ary nihoatra ny morony rehetra toy ny teo aloha. '
  '19':
  - type: text
    content: Ny andro fahafolon’ny volana voalohany no nitàn’ny vahoaka israelita an’i Jôrdàna, ary nitobiany tao Gilgala teo atsinanan’i Jerikao
  - type: note
    content: ny andro fahafolon’ny volana voalohany dia andro fiomanana amin’ny Paska araka ny Eks 12.3; ny volana voalohany, izany hoe ny faramparan’ny Marsa sy voalohandohan’ny Avrily. –I Gilgala dia tsy fantatra mazava ny toerana nisy azy, nefa tokony ho eo akaikin’i Jôrdàna eo avaratra atsinanan’i Jerikao.
  - type: text
    content: .
  '2':
  - type: text
    content: '–Mifidiana 12 lahy, iray avy isaky ny foko, '
  '20':
  - type: text
    content: 'Dia nasain’i Josoa natsangana tao Gilgala ireo vato 12 nalaina tao Jôrdàna; '
  '21':
  - type: text
    content: 'avy eo dia hoy izy tamin’ny vahoaka israelita:'
  - type: text
    content: '–Any aoriana any, rehefa hanontanian’ny zanakareo ny anton’ireto vato ireto ianareo, '
  '22':
  - type: text
    content: 'dia izao no hampahafantarinareo azy: «Nandia tany maina isika Israelita fahizany raha nita io Jôrdàna io. '
  '23':
  - type: text
    content: 'Eny, nataon’ny TOMPO Andriamanitrareo maina ny falehan’ny ranon’i Jôrdàna teo anoloantsika mandra-pitantsika, tahaka izay nataony tamin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' teo anoloan’ny razantsika mandra-pitany'
  - type: note
    content: Jereo Eks 12.3.
  - type: text
    content: '.» '
  '24':
  - type: text
    content: Izany no hahafantaran’ny firenena rehetra ambonin’ny tany fa lehibe ny herin’ny TOMPO, ary hanajanareo mandrakizay ny TOMPO Andriamanitrareo!
  '3':
  - type: text
    content: 'ka omeo baiko hoe: «Ndeha ianareo maka vato 12 eo afovoan’i Jôrdàna, eo amin’ny toerana izay nijoroan’ny mpisorona, dia ento miaraka aminareo ny vato ka apetraho eo amin’ny toerana hitobianareo anio alina.»'
  '4':
  - type: text
    content: 'Dia nantsoin’i Josoa izy 12 lahy voafidiny teo amin’ny Israelita '
  '5':
  - type: text
    content: 'ka nilazany hoe:'
  - type: text
    content: '–Mandalova eo anoloan’ny Vatamasin’ny TOMPO Andriamanitrareo, dia mandehana eo afovoan’i Jôrdàna ka samia manainga vato iray ho eny an-tsorony, araka ny isan’ireo foko israelita. '
  '6':
  - type: text
    content: 'Ireo vato ireo dia ho famantarana eo anivonareo; koa any aoriana any ianareo, rehefa hanontanian’ny zanakareo ny anton’ireo vato, '
  '7':
  - type: text
    content: 'dia hamaly hoe: «Tapaka ny ranon’i Jôrdàna noho ilay '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: . Eny raha nita an’i Jôrdàna ny Vatamasina; dia tapaka ny rano; ary ireo vato ireo dia hahatsiarovana mandrakizay izany zava-mahagaga izany eo amin’ny Israelita.»
  '8':
  - type: text
    content: 'Dia nanao araka izay nandidian’i Josoa azy ny olona voatendry ka naka vato 12 teo afovoan’i Jôrdàna, araka izay nolazain’ny TOMPO tamin’i Josoa sy araka ny isan’ny foko israelita. Ireo vato ireo dia nentiny niaraka taminy ho eo amin’ny toerana izay nitobiany tamin’iny alina iny ka napetrany teo. '
  '9':
  - type: text
    content: Ary i Josoa dia nampanangana vato 12 ihany koa teo afovoan’i Jôrdàna, teo amin’ny toerana izay nijoroan’ny mpisorona nitondra ny Vatamasina mirakitra ny fanekempihavanana; ary mbola ao ihany ireo vato ireo mandraka androany.
