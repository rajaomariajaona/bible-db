document_id: 2CH.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ady nifanaovan’i Asà sy i Bahasà mpanjakan’i Israely
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 15.16-22)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona faha-36 nanjakàn’i Asà, dia niakatra hanafika ny tanin’i Joda i Bahasà mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' ka nanamafy ny tanànan’i Ramà'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 15.17 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izy mba hisakanan-dalana an’i Asà mpanjakan’i Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia tezitra sy nisafoaka tamin’ilay mpahita i Asà noho izany ka nampiditra azy am-ponja. Ary nisy olona sasany koa nampahorîn’i Asà tamin’izay fotoana izay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiafaràn’ny nanjakàn’i Asà
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 15.23-24)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny tantaran’i Asà, na tamboalohany na tafara, dia voasoratra ao amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bokin’ireo mpanjakan’i Joda sy i
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toa boky hafa amin’ny 1 sy 2 Mpanjaka izany.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tamin’ny taona faha-39 nanjakàn’i Asà, dia narary mafy tamin’ny tongony izy; kanefa, na niharan’aretina aza izy, dia tsy nitady vonjy tamin’ny TOMPO fa tamin’ny mpitsabo ihany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rehefa maty i Asà tamin’ny taona faha-41 nanjakany ka lasa nodimandry any amin’ny razany, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: dia nalevina tao amin’ny fasana izay nolavahany tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tanànan’i Davida
    - type: text
      text: . Nampandrina teo amin’ny fandriana efa nofenoina zava-manitra samy hafa araka ny fanaon’ny mpiangaly an’izany izy, ary mbola nandorana zava-manitra betsaka ho fisaonana azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Koa nangalan’i Asà volafotsy sy volamena ny raki-tsoa tao an-tranon’ny TOMPO sy tao an-dapan’ny mpanjaka; dia nalefany ho an’i Bena-Hadada mpanjakan’i Siria izay nipetraka tany Damasy izany sady nombany hafatra hoe: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '«Aoka hisy fanekena amiko sy aminao, toy izay nisy tamin-draiko sy tamin-drainao. Koa indro mandefa volafotsy sy volamena ho anao aho; fa ndeha tsoahy ny fifanekenao tamin’i Bahasà mpanjakan’i Israely mba hialany amin’ny taniko.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia neken’i Bena-Hadada ny tenin’i Asà mpanjaka; ary nirahiny ireo filohan-tafiny hamely ny tanànan’i Israely, ka dia nahazo an’i Hiôna sy i Dana ary i Abela-Maîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Abela-Maîma '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia toerana mitovy ihany amin’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abela-Bety-Mahekà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' voatenin’ny 1 Mp 15.20.'
      marker-yv: yv-n
    - type: text
      text: ' mbamin’ny tanàna rehetra tany Naftalỳ izay nisy trano fitahirizam-bokatra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nony ren’i Bahasà izany vaovao izany, dia nitsahatra tsy nanamafy ny tanànan’i Ramà intsony izy, fa nampijanona ny asany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Novorin’i Asà mpanjaka ny Jodeanina rehetra; ka ireo no nanaisotra ny vato sy ny hazo tao Ramà, izay vao nohamafisin’i Bahasà. Dia nampiasan’i Asà ireo fitaovana ireo hanamafisana an’i Geba sy i Mitsepà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 15.22 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naiditr’i Asà am-ponja i Hananỳ mpaminany
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tamin’izany fotoana izany dia nankeo amin’i Asà, mpanjakan’i Joda, i Hananỳ '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy ny TOMPO Andriamanitrao no niankinanao fa ny mpanjakan’i Siria; noho izany, dia votsotra tsy ho eo ambany fahefànao ny tafiky ny mpanjakan’i Siria. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsy tafika marobe ve ny Etiôpianina sy ny Libianina ary tsy betsaka ve ny kalesiny ama-mpitaingin-tsoavaliny? Nefa noho ny niankinanao tamin’ny TOMPO, dia natolony teo an-tananao ireo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Misy famohapohazana ny tantara ao amin’ny 14.8-14 eto amin’ity and ity.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa manopy maso ny tany tontolo ny TOMPO mba hanohana izay miraiki-po tanteraka aminy. Adala ianao tamin’io fihetsikao io, ka dia hisy ady hihatra aminao manomboka izao.
