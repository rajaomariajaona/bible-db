document_id: 2CH.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ady nifanaovan’i Asà sy i Bahasà mpanjakan’i Israely
  - type: heading
    content: (Jereo 1 Mp 15.16-22)
  - type: text
    content: 'Tamin’ny taona faha-36 nanjakàn’i Asà, dia niakatra hanafika ny tanin’i Joda i Bahasà mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' ka nanamafy ny tanànan’i Ramà'
  - type: note
    content: Jereo 1 Mp 15.17 sy nta.
  - type: text
    content: ' izy mba hisakanan-dalana an’i Asà mpanjakan’i Joda. '
  '10':
  - type: text
    content: Dia tezitra sy nisafoaka tamin’ilay mpahita i Asà noho izany ka nampiditra azy am-ponja. Ary nisy olona sasany koa nampahorîn’i Asà tamin’izay fotoana izay.
  - type: heading
    content: Fiafaràn’ny nanjakàn’i Asà
  - type: heading
    content: (Jereo 1 Mp 15.23-24)
  '11':
  - type: text
    content: 'Ny tantaran’i Asà, na tamboalohany na tafara, dia voasoratra ao amin’ny '
  - type: text
    content: Bokin’ireo mpanjakan’i Joda sy i
  - type: text
    content: ' '
  - type: text
    content: Israely
  - type: note
    content: Toa boky hafa amin’ny 1 sy 2 Mpanjaka izany.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Tamin’ny taona faha-39 nanjakàn’i Asà, dia narary mafy tamin’ny tongony izy; kanefa, na niharan’aretina aza izy, dia tsy nitady vonjy tamin’ny TOMPO fa tamin’ny mpitsabo ihany. '
  '13':
  - type: text
    content: 'Rehefa maty i Asà tamin’ny taona faha-41 nanjakany ka lasa nodimandry any amin’ny razany, '
  '14':
  - type: text
    content: dia nalevina tao amin’ny fasana izay nolavahany tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: . Nampandrina teo amin’ny fandriana efa nofenoina zava-manitra samy hafa araka ny fanaon’ny mpiangaly an’izany izy, ary mbola nandorana zava-manitra betsaka ho fisaonana azy.
  '2':
  - type: text
    content: 'Koa nangalan’i Asà volafotsy sy volamena ny raki-tsoa tao an-tranon’ny TOMPO sy tao an-dapan’ny mpanjaka; dia nalefany ho an’i Bena-Hadada mpanjakan’i Siria izay nipetraka tany Damasy izany sady nombany hafatra hoe: '
  '3':
  - type: text
    content: '«Aoka hisy fanekena amiko sy aminao, toy izay nisy tamin-draiko sy tamin-drainao. Koa indro mandefa volafotsy sy volamena ho anao aho; fa ndeha tsoahy ny fifanekenao tamin’i Bahasà mpanjakan’i Israely mba hialany amin’ny taniko.» '
  '4':
  - type: text
    content: Dia neken’i Bena-Hadada ny tenin’i Asà mpanjaka; ary nirahiny ireo filohan-tafiny hamely ny tanànan’i Israely, ka dia nahazo an’i Hiôna sy i Dana ary i Abela-Maîma
  - type: note
    content: I Abela-Maîma dia toerana mitovy ihany amin’ny hoe Abela-Bety-Mahekà voatenin’ny 1 Mp 15.20.
  - type: text
    content: ' mbamin’ny tanàna rehetra tany Naftalỳ izay nisy trano fitahirizam-bokatra. '
  '5':
  - type: text
    content: 'Nony ren’i Bahasà izany vaovao izany, dia nitsahatra tsy nanamafy ny tanànan’i Ramà intsony izy, fa nampijanona ny asany. '
  '6':
  - type: text
    content: Novorin’i Asà mpanjaka ny Jodeanina rehetra; ka ireo no nanaisotra ny vato sy ny hazo tao Ramà, izay vao nohamafisin’i Bahasà. Dia nampiasan’i Asà ireo fitaovana ireo hanamafisana an’i Geba sy i Mitsepà
  - type: note
    content: Jereo 1 Mp 15.22 sy nta.
  - type: text
    content: .
  - type: heading
    content: Naiditr’i Asà am-ponja i Hananỳ mpaminany
  '7':
  - type: text
    content: 'Tamin’izany fotoana izany dia nankeo amin’i Asà, mpanjakan’i Joda, i Hananỳ '
  - type: text
    content: mpaminany
  - type: text
    content: ' ka nanao taminy hoe:'
  - type: text
    content: '–Tsy ny TOMPO Andriamanitrao no niankinanao fa ny mpanjakan’i Siria; noho izany, dia votsotra tsy ho eo ambany fahefànao ny tafiky ny mpanjakan’i Siria. '
  '8':
  - type: text
    content: Tsy tafika marobe ve ny Etiôpianina sy ny Libianina ary tsy betsaka ve ny kalesiny ama-mpitaingin-tsoavaliny? Nefa noho ny niankinanao tamin’ny TOMPO, dia natolony teo an-tananao ireo
  - type: note
    content: Misy famohapohazana ny tantara ao amin’ny 14.8-14 eto amin’ity and ity.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Fa manopy maso ny tany tontolo ny TOMPO mba hanohana izay miraiki-po tanteraka aminy. Adala ianao tamin’io fihetsikao io, ka dia hisy ady hihatra aminao manomboka izao.
