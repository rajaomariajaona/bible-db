- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy ny TOMPO hoe: «Hofoanako ny fahoriana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoesoriko ny henatra mitambesatra aminareo.
