    children:
    - type: text
      text: '19'
  - type: text
    text: Indro tonga ny fotoana hamelezako
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra nampahory anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotsaboiko ny maratranareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampodîko ny voasesitany;
- type: usfm
  marker: q1
