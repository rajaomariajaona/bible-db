document_id: ZEP.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy nihaino ny antson’Andriamanitra i Jerosalema
  - type: text
    content: Lozan’i Jerosalema ilay tanàna mpikomy,
  - type: text
    content: feno fahalovana sy fampahoriana!
  '10':
  - type: text
    content: Eny fa hatrany an-dafin’ny onin’i Etiôpia
  - type: text
    content: ireo mpivavaka amiko izay naeliko
  - type: text
    content: no ho avy hitondra fanatitra ho Ahy.»
  - type: heading
    content: Ny sisa amin’i Israely
  '11':
  - type: text
    content: «Amin’izany andro izany, ry vahoakako,
  - type: text
    content: dia tsy ho menatra intsony ianao
  - type: text
    content: tamin’izay ratsy rehetra nataonao
  - type: text
    content: ka nanotanao tamiko.
  - type: text
    content: Hoesoriko tsy ho eo aminao
  - type: text
    content: ny mpirehareha rehetra
  - type: text
    content: ary tsy hiavonavona intsony ianao
  - type: text
    content: eo an-tendrombohitro masina
  - type: note
    content: 'tendrombohitro masina: jereo Ezek 20.40 sy nta.'
  - type: text
    content: .
  '12':
  - type: text
    content: Nefa hisy olona ory sy malahelo
  - type: text
    content: hataoko sisa tavela eo aminao,
  - type: text
    content: dia olona hitady fialofana amiko TOMPO.
  '13':
  - type: text
    content: Ny sisa velona amin’ny vahoaka Israely
  - type: text
    content: dia tsy hanao heloka na hilaza lainga intsony,
  - type: text
    content: ary tsy hanao teny mamitaka intsony.
  - type: text
    content: Fa hihinana sy handry feizay izy
  - type: text
    content: ka tsy hisy hampatahotra azy.»
  - type: heading
    content: Ny fanandratana indray an’i Jerosalema
  '14':
  - type: text
    content: 'Mihobia, ry tanànan’i '
  - type: text
    content: Tsiôna
  - type: text
    content: '!'
  - type: text
    content: Manaova firavoravoana, ry vahoakan’i Israely!
  - type: text
    content: Mifalia sy mibitaha amin’ny fonareo manontolo,
  - type: text
    content: ry mponin’i Jerosalema!
  '15':
  - type: text
    content: Ny TOMPO efa nanaisotra ny fanamelohana
  - type: text
    content: izay nitambesatra taminareo;
  - type: text
    content: Izy efa nampandositra ny fahavalonareo.
  - type: text
    content: Ny TOMPO, mpanjakan’i Israely, no momba anareo
  - type: text
    content: ka tsy hisy loza hatahoranareo intsony.
  '16':
  - type: text
    content: 'Io andro io no hilazana amin’i Jerosalema hoe:'
  - type: text
    content: «Aza matahotra, ry tanànan’i Tsiôna,
  - type: text
    content: aza miraviravy tanana!
  '17':
  - type: text
    content: Ny TOMPO Andriamanitrao no momba anao;
  - type: text
    content: mahery Izy ka hampandresy anao.
  - type: text
    content: Maneho ny hafaliany noho ny aminao Izy;
  - type: text
    content: ny fitiavany no anavaozany anao
  - type: note
    content: 'anavaozany anao: araka ny dkt tranainy grika; ny rijan-teny hebreo kosa manao hoe ho sondriana na hoe hangina.'
  - type: text
    content: ;
  - type: text
    content: noho ny aminao dia mientam-pihobiana Izy
  '18':
  - type: text
    content: toy ny amin’ny andro fety.»
  - type: text
    content: 'Hoy ny TOMPO hoe: «Hofoanako ny fahoriana,'
  - type: text
    content: hoesoriko ny henatra mitambesatra aminareo.
  '19':
  - type: text
    content: Indro tonga ny fotoana hamelezako
  - type: text
    content: izay rehetra nampahory anareo.
  - type: text
    content: Hotsaboiko ny maratranareo,
  - type: text
    content: hampodîko ny voasesitany;
  - type: text
    content: eny, havadiko ho voninahitra sy laza
  - type: text
    content: ny fanaovana tsinontsinona anareo
  - type: text
    content: tany amin’ny tany rehetra.
  '2':
  - type: text
    content: Tsy nohenoiny ny tenin’ny TOMPO
  - type: text
    content: tsy noraisiny ny fampitandremany!
  - type: text
    content: tsy nametra-pitokiana taminy izy;
  - type: text
    content: ilay Andriamaniny tsy nohatoniny.
  '20':
  - type: text
    content: Amin’izany fotoana izany tokoa
  - type: text
    content: no hampodiako sy hamoriako anareo.
  - type: text
    content: Ho hitanareo fa hambiniko indray ianareo;
  - type: text
    content: homeko voninahitra sy laza ianareo
  - type: text
    content: any amin’ny firenena rehetra eto an-tany.»
  '3':
  - type: text
    content: Toy ny liona mierona ireo lehibeny;
  - type: text
    content: toy ny amboadia mihaza hariva ny mpitsarany
  - type: note
    content: Jereo Hab 1.8.
  - type: text
    content: ','
  - type: text
    content: ka tsy mitahiry remby ho tra-maraina.
  '4':
  - type: text
    content: 'Mpieboebo sady mpamitaka ireo '
  - type: text
    content: mpaminaniny
  - type: text
    content: ;
  - type: text
    content: 'zimbazimbain’ireo '
  - type: text
    content: mpisorony
  - type: text
    content: ' kosa'
  - type: text
    content: ny zavatra voatokana ho an’Andriamanitra
  - type: text
    content: ary dikainy ny lalàna.
  '5':
  - type: text
    content: Kanefa ny TOMPO mpandala fahamarinana
  - type: text
    content: no eo afovoan’ny tanàna;
  - type: text
    content: ka tsy manao faharatsiana Izy,
  - type: text
    content: fa isa-maraina tsy diso no amoahany ny fitsarany.
  - type: text
    content: Na izany aza ny ratsy fanahy dia tsy mahalala menatra!
  '6':
  - type: text
    content: 'Teny hentitra avy amin’ny TOMPO izao:'
  - type: text
    content: «Nahafongana firenena maro Aho,
  - type: text
    content: narodako ny tilikambon’ny màndany,
  - type: text
    content: navelako ho foana ny làlany,
  - type: text
    content: ka tsy nisy mpandalo intsony;
  - type: text
    content: noravako ny tanànany
  - type: text
    content: ka tsy nisy mponina intsony.
  '7':
  - type: text
    content: 'Dia hoy Aho anakampoko:'
  - type: text
    content: Raha manaja Ahy i Jerosalema
  - type: text
    content: ary mandray ny fampitandremako,
  - type: text
    content: dia tsy horavako ny fonenany
  - type: text
    content: araka ny fandrahonana nataoko taminy!
  - type: text
    content: Kanefa vao mainka nilomay
  - type: text
    content: hanao ratsy ihany izy iray tanàna.
  '8':
  - type: text
    content: Koa dia andrasonareo ny famaizako
  - type: text
    content: amin’ny andro hiaviako hiampanga anareo.
  - type: text
    content: Tapa-kevitra Aho hanangona ny firenena sy fanjakana
  - type: text
    content: mba hampidinako manontolo ny fahatezerako mirehidrehitra;
  - type: text
    content: ka handevona ny tany manontolo
  - type: text
    content: ny afon’ny fahasaro-piaroko.
  - type: heading
    content: Ny hanovan’Andriamanitra ny firenena isan-tokony
  '9':
  - type: text
    content: «Amin’izany, dia hovako ny firenena isan-tokony
  - type: text
    content: 'ka '
  - type: text
    content: hodioviko
  - type: text
    content: ' ny molony'
  - type: note
    content: 'ny molony: ny molotry ny vahoaka mpanompo sampy dia maloto satria nanonona ny anaran’ireo andriamani-tsiizy.'
  - type: text
    content: ;
  - type: text
    content: dia hivavaka amiko TOMPO izy rehetra
  - type: text
    content: ary hiray hina hanompo Ahy.
