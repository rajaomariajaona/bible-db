    text: Amin’izany fotoana izany tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampodiako sy hamoriako anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho hitanareo fa hambiniko indray ianareo;
- type: usfm
  marker: q1
  children:
