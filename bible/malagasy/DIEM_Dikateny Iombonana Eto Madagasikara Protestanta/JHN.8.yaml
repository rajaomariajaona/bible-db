      children:
      - type: text
        text: '1'
    - type: text
      text: Fa i Jesoa kosa lasa nankeny amin’ny tendrombohitra Analanôliva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 11.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nitraka i Jesoa, ka nilaza tamin-dravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza ry zareo teo, ramatoa? Tsy nisy nanameloka anao angaha?
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy nisy, Tompoko!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho koa tsy manameloka anao! Mandehana, ka aza manota intsony manomboka izao!]
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jesoa no fahazavana ho an’izao tontolo izao
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tamin’izay dia nitenenan’i Jesoa indray ny vahoaka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho no fahazavana ho an’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 49.6; Mt 5.14; Jôh 9.5.
      marker-yv: yv-n
    - type: text
      text: ; izay miaraka amiko tsy mba handeha anatin’ny haizina, fa hanana ny fahazavana vokatry ny aina!
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ka hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Vavolombelona manambara tena Ianao, ka tsy azo antoka ny fijoroanao ho vavolombelona!
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Na dia vavolombelona manambara tena aza Aho, dia azo antoka ny fijoroako ho vavolombelona, satria fantatro izay niaviako sy izay alehako; fa ianareo kosa tsy mahafantatra izay iaviako na izay alehako! '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ianareo dia mitsara araka ny fanaon’olombelona; Izaho kosa tsy mitsara olona na iza na iza. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary raha mitsara Aho, dia mahitsy ny fitsarako; satria tsy irery Aho no mitsara, fa miaraka amiko ny Ray Izay naniraka Ahy. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voasoratra ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànanareo
    - type: text
      text: ' fa azo antoka ny fijoroan’ny olona roa ho vavolombelona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 19.15; ampit Deot 17.6; Nom 35.30.
      marker-yv: yv-n
    - type: text
      text: '; '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Izaho dia vavolombelona manambara ny tenako, ary ny Ray Izay naniraka Ahy dia mijoro ho vavolombelona manambara Ahy koa.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy ny Farisianina taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza ny Rainao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Samy tsy fantatrareo na Izaho na ny Raiko; fa raha nahafantatra Ahy ianareo, dia ho nahafantatra ny Raiko ihany koa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny ampitso maraina be, dia niverina tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' Izy; ary nanatona Azy ny vahoaka rehetra, ka nipetraka Izy nampianatra azy ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ireo teny ireo dia nolazain’i Jesoa teo akaikin’ny fandatsahan-drakitra, fony Izy nampianatra teo an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ; ary tsy nisy olona nisambotra Azy, satria tsy mbola tonga ny fotoanandrony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izay alehako tsy azonareo aleha
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy indray i Jesoa tamin’ny vahoaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Handeha Aho ka hotadiavinareo, saingy ho faty amin’ny fahotanareo ianareo; izay alehako tsy azonareo aleha.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy ny Jiosy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hamono tena angaha Izy no manao hoe: «Izay alehako tsy azonareo aleha»?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianareo dia avy etỳ an-tany; Izaho kosa avy any an-danitra. Ianareo dia avy amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: '; Izaho kosa tsy mba avy amin’izao tontolo izao. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa izany no nilazako taminareo hoe: «Ho faty amin’ny fahotanareo ianareo»; satria raha tsy inoanareo fa «Izaho no Ilay hatrizay ka ho mandrakizay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izaho... mandrakizay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ampit Eks 3.14-15; jereo koa Jôh 8.28, 58; 13.19. Dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Izao no ilay Mesia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Mk 3.16.'
      marker-yv: yv-n
    - type: text
      text: », dia ho faty amin’ny fahotanareo ianareo!
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa Ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ilay lazaiko aminareo indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ilay lazaiko aminareo indrindra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ilay lazaiko aminareo hatrany am-boalohany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '! '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Manana zavatra maro hilazana sy hitsarana ny aminareo Aho; fa azo antoka Ilay naniraka Ahy, ary izay zavatra efa reko taminy no lazaiko amin’izao tontolo izao.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Saingy tsy fantatr’ireo fa ny Ray no voalazany taminy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ka hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Rehefa voasandratrareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 3.14.
      marker-yv: yv-n
    - type: text
      text: ', dia ho fantatrareo fa «Izaho no Ilay hatrizay ka ho mandrakizay»; sady tsy manao na inona na inona avy amin’ny tenako aho, fa izay nampianarin’ny Ray Ahy no lazaiko. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary Ilay naniraka Ahy dia miaraka amiko; fa tsy avelany ho irery Aho, satria manao izay mahafaly Azy lalandava!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nisy kosa vehivavy anankiray, azo nanitsakitsa-bady. Nentin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' ravehivavy, ka narosony teo anoloan’ny olona; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tamin’i Jesoa niteny izany, dia maro no nino Azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny olona afaka sy ny olona andevozina
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia hoy i Jesoa tamin’ireo Jiosy nino Azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha maharitra mitana ny teniko ianareo, dia ho mpianatro tokoa; '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: sady ho fantatrareo ny marina, ary ny marina no hanafaka anareo!
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa novalian’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Taranak’i Abrahama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 3.9; Lk 3.8.
      marker-yv: yv-n
    - type: text
      text: ' izahay ary tsy mba nandevozin’olona na oviana na oviana; ka ahoana no ataonao hoe: Ho afaka ianareo?'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lazaiko marina dia marina aminareo fa izay rehetra manao fahotana dia andevozin’ny fahotana. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Tsy hijanona ao an-trano lalandava ny mpanompo, fa ny zanaka no mijanona ao lalandava. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Koa raha ny Zanaka no manafaka anareo, dia ho afaka tokoa ianareo. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fantatro fa taranak’i Abrahama ianareo, kanefa mitady hamono Ahy satria tsy tafalatsaka ao anatinareo ny teniko. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Izaho izay milaza izay efa hitako teo amin’ny Raiko; ianareo kosa manao izay efa renareo tamin’ny rainareo!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Olona andevozin’ny devoly ianareo
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia niteny tamin’i Jesoa ry zareo nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –I Abrahama no rainay!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha tena zanak’i Abrahama ianareo, dia ho nanao ireo asan’i Abrahama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dia ho nanao ireo asan’i Abrahama: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf maro ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dia manaova ireo asan’i Abrahama.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ireo asan’i Abrahama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit Heb 11.8-19.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: dia hoy ry zareo tamin’i Jesoa;
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mpampianatra ô, azo nanitsakitsa-bady ity vehivavy ity. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Nefa ankehitriny tadiavianareo hovonoina Aho, dia Izaho nilaza taminareo ny marina izay efa reko tamin’Andriamanitra: tsy mba nanao izany i Abrahama! '
  '41':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Fa ianareo kosa dia ny asan’ny rainareo no ataonareo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy zaza sary izahay no nateraka; tokana ihany ny rainay, dia Andriamanitra.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'I Jesoa kosa nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha Andriamanitra no tena Rainareo, dia ho tia Ahy ianareo, satria avy tamin’Andriamanitra no nivoahako sy nankanesako atỳ; tsy avy amin’ny tenako no nahatongavako, fa Izy no naniraka Ahy. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ahoana no tsy ahazoanareo ny fiteniko? Satria tsy mahay mihaino ny teniko ianareo. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ny devoly no ray niavianareo, ka ny filàndratsin’ny rainareo no satrinareo hatao. Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' dia mpamono olona hatrany am-boalohany; ary tsy nitoetra tamin’ny marina izy, satria ny marina tsy ao aminy. Raha mandainga izy, dia miteny araka ny toetrany satria mpandainga izy sady rain’ny mpandainga. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Fa Izaho kosa tsy inoanareo, satria ny marina no lazaiko. '
  '46':
