document_id: JHN.8,396
type_code: plt
verses:
  '1':
  - type: text
    content: Fa i Jesoa kosa lasa nankeny amin’ny tendrombohitra Analanôliva
  - type: note
    content: Jereo Mk 11.1 sy nta.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dia nitraka i Jesoa, ka nilaza tamin-dravehivavy hoe:'
  - type: text
    content: –Aiza ry zareo teo, ramatoa? Tsy nisy nanameloka anao angaha?
  '11':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Tsy nisy, Tompoko!
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Izaho koa tsy manameloka anao! Mandehana, ka aza manota intsony manomboka izao!]
  - type: heading
    content: I Jesoa no fahazavana ho an’izao tontolo izao
  '12':
  - type: text
    content: 'Tamin’izay dia nitenenan’i Jesoa indray ny vahoaka nataony hoe:'
  - type: text
    content: –Izaho no fahazavana ho an’
  - type: text
    content: izao tontolo izao
  - type: note
    content: Ampit Is 49.6; Mt 5.14; Jôh 9.5.
  - type: text
    content: ; izay miaraka amiko tsy mba handeha anatin’ny haizina, fa hanana ny fahazavana vokatry ny aina!
  '13':
  - type: text
    content: 'Ka hoy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' tamin’i Jesoa:'
  - type: text
    content: –Vavolombelona manambara tena Ianao, ka tsy azo antoka ny fijoroanao ho vavolombelona!
  '14':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Na dia vavolombelona manambara tena aza Aho, dia azo antoka ny fijoroako ho vavolombelona, satria fantatro izay niaviako sy izay alehako; fa ianareo kosa tsy mahafantatra izay iaviako na izay alehako! '
  '15':
  - type: text
    content: 'Ianareo dia mitsara araka ny fanaon’olombelona; Izaho kosa tsy mitsara olona na iza na iza. '
  '16':
  - type: text
    content: 'Ary raha mitsara Aho, dia mahitsy ny fitsarako; satria tsy irery Aho no mitsara, fa miaraka amiko ny Ray Izay naniraka Ahy. '
  '17':
  - type: text
    content: 'Voasoratra ao amin’ny '
  - type: text
    content: lalànanareo
  - type: text
    content: ' fa azo antoka ny fijoroan’ny olona roa ho vavolombelona'
  - type: note
    content: Jereo Deot 19.15; ampit Deot 17.6; Nom 35.30.
  - type: text
    content: '; '
  '18':
  - type: text
    content: Izaho dia vavolombelona manambara ny tenako, ary ny Ray Izay naniraka Ahy dia mijoro ho vavolombelona manambara Ahy koa.
  '19':
  - type: text
    content: 'Dia hoy ny Farisianina taminy:'
  - type: text
    content: –Aiza ny Rainao?
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Samy tsy fantatrareo na Izaho na ny Raiko; fa raha nahafantatra Ahy ianareo, dia ho nahafantatra ny Raiko ihany koa.
  '2':
  - type: text
    content: Ny ampitso maraina be, dia niverina tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' Izy; ary nanatona Azy ny vahoaka rehetra, ka nipetraka Izy nampianatra azy ireo. '
  '20':
  - type: text
    content: Ireo teny ireo dia nolazain’i Jesoa teo akaikin’ny fandatsahan-drakitra, fony Izy nampianatra teo an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ; ary tsy nisy olona nisambotra Azy, satria tsy mbola tonga ny fotoanandrony.
  - type: heading
    content: Izay alehako tsy azonareo aleha
  '21':
  - type: text
    content: 'Dia hoy indray i Jesoa tamin’ny vahoaka:'
  - type: text
    content: –Handeha Aho ka hotadiavinareo, saingy ho faty amin’ny fahotanareo ianareo; izay alehako tsy azonareo aleha.
  '22':
  - type: text
    content: 'Dia hoy ny Jiosy:'
  - type: text
    content: '–Hamono tena angaha Izy no manao hoe: «Izay alehako tsy azonareo aleha»?'
  '23':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Ianareo dia avy etỳ an-tany; Izaho kosa avy any an-danitra. Ianareo dia avy amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '; Izaho kosa tsy mba avy amin’izao tontolo izao. '
  '24':
  - type: text
    content: 'Koa izany no nilazako taminareo hoe: «Ho faty amin’ny fahotanareo ianareo»; satria raha tsy inoanareo fa «Izaho no Ilay hatrizay ka ho mandrakizay'
  - type: note
    content: 'Izaho... mandrakizay: ampit Eks 3.14-15; jereo koa Jôh 8.28, 58; 13.19. Dkt hafa Izao no ilay Mesia: jereo Mk 3.16.'
  - type: text
    content: », dia ho faty amin’ny fahotanareo ianareo!
  '25':
  - type: text
    content: 'Dia hoy ireo taminy:'
  - type: text
    content: –Iza moa Ianao?
  - type: text
    content: 'Ka novalian’i Jesoa hoe:'
  - type: text
    content: –Ilay lazaiko aminareo indrindra
  - type: note
    content: 'Ilay lazaiko aminareo indrindra: dkt hafa Ilay lazaiko aminareo hatrany am-boalohany.'
  - type: text
    content: '! '
  '26':
  - type: text
    content: Manana zavatra maro hilazana sy hitsarana ny aminareo Aho; fa azo antoka Ilay naniraka Ahy, ary izay zavatra efa reko taminy no lazaiko amin’izao tontolo izao.
  '27':
  - type: text
    content: 'Saingy tsy fantatr’ireo fa ny Ray no voalazany taminy. '
  '28':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: '–Rehefa voasandratrareo ny '
  - type: text
    content: Zanak’olona
  - type: note
    content: Ampit 3.14.
  - type: text
    content: ', dia ho fantatrareo fa «Izaho no Ilay hatrizay ka ho mandrakizay»; sady tsy manao na inona na inona avy amin’ny tenako aho, fa izay nampianarin’ny Ray Ahy no lazaiko. '
  '29':
  - type: text
    content: Ary Ilay naniraka Ahy dia miaraka amiko; fa tsy avelany ho irery Aho, satria manao izay mahafaly Azy lalandava!
  '3':
  - type: text
    content: 'Nisy kosa vehivavy anankiray, azo nanitsakitsa-bady. Nentin’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' ravehivavy, ka narosony teo anoloan’ny olona; '
  '30':
  - type: text
    content: Tamin’i Jesoa niteny izany, dia maro no nino Azy.
  - type: heading
    content: Ny olona afaka sy ny olona andevozina
  '31':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ireo Jiosy nino Azy:'
  - type: text
    content: '–Raha maharitra mitana ny teniko ianareo, dia ho mpianatro tokoa; '
  '32':
  - type: text
    content: sady ho fantatrareo ny marina, ary ny marina no hanafaka anareo!
  '33':
  - type: text
    content: 'Fa novalian’ireo hoe:'
  - type: text
    content: –Taranak’i Abrahama
  - type: note
    content: Ampit Mt 3.9; Lk 3.8.
  - type: text
    content: ' izahay ary tsy mba nandevozin’olona na oviana na oviana; ka ahoana no ataonao hoe: Ho afaka ianareo?'
  '34':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Lazaiko marina dia marina aminareo fa izay rehetra manao fahotana dia andevozin’ny fahotana. '
  '35':
  - type: text
    content: 'Tsy hijanona ao an-trano lalandava ny mpanompo, fa ny zanaka no mijanona ao lalandava. '
  '36':
  - type: text
    content: 'Koa raha ny Zanaka no manafaka anareo, dia ho afaka tokoa ianareo. '
  '37':
  - type: text
    content: 'Fantatro fa taranak’i Abrahama ianareo, kanefa mitady hamono Ahy satria tsy tafalatsaka ao anatinareo ny teniko. '
  '38':
  - type: text
    content: Izaho izay milaza izay efa hitako teo amin’ny Raiko; ianareo kosa manao izay efa renareo tamin’ny rainareo!
  - type: heading
    content: Olona andevozin’ny devoly ianareo
  '39':
  - type: text
    content: 'Dia niteny tamin’i Jesoa ry zareo nanao hoe:'
  - type: text
    content: –I Abrahama no rainay!
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Raha tena zanak’i Abrahama ianareo, dia ho nanao ireo asan’i Abrahama
  - type: note
    content: 'dia ho nanao ireo asan’i Abrahama: misy stf maro ahitana hoe dia manaova ireo asan’i Abrahama. –ireo asan’i Abrahama: ampit Heb 11.8-19.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: dia hoy ry zareo tamin’i Jesoa;
  - type: text
    content: '–Mpampianatra ô, azo nanitsakitsa-bady ity vehivavy ity. '
  '40':
  - type: text
    content: 'Nefa ankehitriny tadiavianareo hovonoina Aho, dia Izaho nilaza taminareo ny marina izay efa reko tamin’Andriamanitra: tsy mba nanao izany i Abrahama! '
  '41':
  - type: text
    content: Fa ianareo kosa dia ny asan’ny rainareo no ataonareo.
  - type: text
    content: 'Dia hoy ireo taminy:'
  - type: text
    content: –Tsy zaza sary izahay no nateraka; tokana ihany ny rainay, dia Andriamanitra.
  '42':
  - type: text
    content: 'I Jesoa kosa nanao taminy hoe:'
  - type: text
    content: '–Raha Andriamanitra no tena Rainareo, dia ho tia Ahy ianareo, satria avy tamin’Andriamanitra no nivoahako sy nankanesako atỳ; tsy avy amin’ny tenako no nahatongavako, fa Izy no naniraka Ahy. '
  '43':
  - type: text
    content: 'Ahoana no tsy ahazoanareo ny fiteniko? Satria tsy mahay mihaino ny teniko ianareo. '
  '44':
  - type: text
    content: 'Ny devoly no ray niavianareo, ka ny filàndratsin’ny rainareo no satrinareo hatao. Ny '
  - type: text
    content: devoly
  - type: text
    content: ' dia mpamono olona hatrany am-boalohany; ary tsy nitoetra tamin’ny marina izy, satria ny marina tsy ao aminy. Raha mandainga izy, dia miteny araka ny toetrany satria mpandainga izy sady rain’ny mpandainga. '
  '45':
  - type: text
    content: 'Fa Izaho kosa tsy inoanareo, satria ny marina no lazaiko. '
  '46':
  - type: text
    content: 'Iza moa aminareo no afaka hanaporofo fa nanota Aho? Raha ny marina no lazaiko, nahoana ianareo no tsy mino Ahy '
  '47':
  - type: text
    content: Izay avy amin’Andriamanitra no mihaino ny tenin’Andriamanitra; izany no tsy ihainoanareo, satria tsy avy amin’Andriamanitra ianareo!
  - type: heading
    content: I Abrahama sy i Jesoa
  '48':
  - type: text
    content: 'Dia niteny tamin’i Jesoa ny Jiosy nanao hoe:'
  - type: text
    content: '–Tsy marina ve ny filàzanay fa '
  - type: text
    content: Samaritanina
  - type: text
    content: ' Ianao sady ondranondranana?'
  '49':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Izaho tsy ondranondranana fa manome haja ny Raiko; fa ianareo kosa tsy manome haja Ahy. '
  '5':
  - type: text
    content: 'Ary i Mosesy, ao amin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ', dia nandidy anay hitora-bato'
  - type: note
    content: Jereo Lev 20.10; Deot 22.22-24.
  - type: text
    content: ' ny vehivavy toy izany; fa Ianao kosa mba ahoana?'
  '50':
  - type: text
    content: 'Saingy Izaho tsy mitady ny voninahitro, fa ao Ilay mitady izany ho Ahy sady mitsara ara-drariny. '
  '51':
  - type: text
    content: Lazaiko marina dia marina aminareo fa raha misy olona mitandrina ny teniko, dia tsy ho faty na oviana na oviana izy.
  '52':
  - type: text
    content: 'Dia hoy ny Jiosy taminy:'
  - type: text
    content: '–Fantatray ankehitriny fa ondranondranana Ianao! Efa maty i Abrahama sy ireo '
  - type: text
    content: mpaminani
  - type: text
    content: 'n’Andriamanitra, fa Ianao kosa milaza hoe: «Raha misy olona mitandrina ny teniko, dia tsy hanandrana fahafatesana izy na oviana na oviana.» '
  '53':
  - type: text
    content: Angaha Ianao lehibe noho ny rainay, dia i Abrahama izay efa maty? Ny mpaminany koa efa maty, manao Anao ho iza moa Ianao?
  '54':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Raha manome voninahitra ny tenako Aho, dia tsinontsinona ny voninahitro; ny Raiko, Izay lazainareo fa Andriamanitrareo, no manome voninahitra Ahy! '
  '55':
  - type: text
    content: 'Saingy tsy nahafantatra Azy ianareo; fa Izaho no mahalala Azy, ary raha milaza ho mahalala Azy Aho, dia ho mpandainga tahaka anareo. Eny, mahalala Azy Aho sady mitandrina ny teniny. '
  '56':
  - type: text
    content: Heni-karavoana i Abrahama rainareo nanantena hahita ny androko; ary nahita izy ka faly.
  '57':
  - type: text
    content: 'Dia hoy ny Jiosy taminy:'
  - type: text
    content: –Tsy mbola dimampolo taona akory Ianao, ka dia hoe nahita Anao i Abrahama
  - type: note
    content: 'ka dia hoe nahita Anao i Abrahama?: misy stf maro ahitana hoe ka dia ho nahita an’i Abrahama?'
  - type: text
    content: '?'
  '58':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Lazaiko marina dia marina aminareo fa tsy mbola ary i Abrahama, dia «Izaho no Ilay hatrizay ka ho mandrakizay
  - type: note
    content: 'Jereo 1.1-3. –Izaho...mandrakizay: ampit 8.24 sy nta.'
  - type: text
    content: »!
  '59':
  - type: text
    content: 'Tamin’izay dia naka vato hitorahana Azy ny olona; fa i Jesoa kosa niery ka lasa nivoaka ny '
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: .
  '6':
  - type: text
    content: 'Nolazain’ireo izany hamandrihana Azy, mba hisy hiampangany Azy. Fa i Jesoa kosa niondrika, dia nanoratsoratra teo amin’ny tany tamin’ny rantsan-tanany. '
  '7':
  - type: text
    content: 'Ry zareo amin’izany mbola manontany Azy ihany; ka nitraka Izy ary niteny tamin’ireo hoe:'
  - type: text
    content: –Izay tsy manam-pahotana aminareo no aoka hitora-bato azy voalohany!
  '8':
  - type: text
    content: 'Dia niondrika indray i Jesoa, ka nanoratsoratra teo amin’ny tany. '
  '9':
  - type: text
    content: 'Fa ry zareo kosa, nony nandre izany, dia niala teo tsirairay nanomboka hatramin’ny zokinjokiny; ka i Jesoa irery sisa nijanona sy ilay vehivavy teo anoloan’ny olona. '
