  - type: text
    text: no tonga hitady ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy hahita Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa nanalavitra azy ireo Izy.
- type: usfm
  marker: q1
