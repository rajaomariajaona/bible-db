  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho dia mahalala an’i Efraîma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy takona amiko i Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ianao, ry Efraîma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa tonga mpivarotena ankehitriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voaloto noho izany i Israely.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa tsy mamela azy hiverina
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’Andriamaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny asa nataon’ny Israelita.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rivotry ny fivarotan-tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mitsoka ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
