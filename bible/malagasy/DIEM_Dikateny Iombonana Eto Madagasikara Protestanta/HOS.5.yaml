  - type: text
    text: ary atongilano ny sofinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ry fianakavian’ny mpanjaka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihatra aminareo izao ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tonga fandrika tao Mitsepà ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy harato voavelatra tao Tabôra
  - type: usfm
