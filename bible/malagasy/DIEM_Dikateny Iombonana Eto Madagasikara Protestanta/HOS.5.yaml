    marker-yv: yv-n
  - type: text
    text: ' ny akoram-panairana.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandremo ny ao an-damosinao, ry Benjamîna!
- type: usfm
  marker: q1
