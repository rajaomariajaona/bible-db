- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho dia Izaho no handratra ny rembiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handeha hitondra azy
- type: usfm
  marker: q1
  children:
  - type: text
