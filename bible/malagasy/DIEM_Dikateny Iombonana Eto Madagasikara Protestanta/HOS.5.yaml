document_id: HOS.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ny mpisorona sy ny mpanjaka
  - type: text
    content: 'Henoy izao, ry '
  - type: text
    content: mpisorona
  - type: text
    content: sy ianareo mpitondra israelita,
  - type: text
    content: ary atongilano ny sofinareo,
  - type: text
    content: 'ry fianakavian’ny mpanjaka:'
  - type: text
    content: Hihatra aminareo izao ny fitsarana,
  - type: text
    content: fa tonga fandrika tao Mitsepà ianareo
  - type: text
    content: sy harato voavelatra tao Tabôra
  - type: note
    content: 'Mitsepà: toerana maro no mitondra io anarana io. Mety ho tanàna kely 13 km avaratr’i Jerosalema izy eto (Jos 18.26; 1 Sam 7.5-6 sns). Ny fihadian-tany natao tamin’izany faritra izany dia nanambara ny mahazava-dehibe ny fanompoam-pivavahana natao ho an’ny andriamani-bavin’ny fahavokarana, i Hastôreta* tamin’ny andron’i Hôsea. Toeram-panasinan’ny fivavahana kanahanita izany. –ny tendrombohitra Tabôra izay mandòndona eo amin’ny lohasahan’i Jizrehèla, ao avaratr’i Palestinina, dia mbola toeram-panasinan’ny fivavahana kanahanita koa. –ny fandrika harato izay tian’i Hôsea hotsarovana eto dia mety ho ny fivavahana kanahanita (jereo Hos 1.2 sy nta).'
  - type: text
    content: ','
  '10':
  - type: text
    content: Fa tahaka ny mpamindra sisin-tany
  - type: note
    content: 'Jereo Deot 19.14; 27.17: Ireo mpitondra tao Joda dia nanararaotra ny fanindrian’ny Asirianina ny fanjakan’i Israely mba hanisahana ny sisintaniny hianavaratra kokoa.'
  - type: text
    content: ireo mpifehy an’i Joda;
  - type: text
    content: ka hataoko mandriaka aminy
  - type: text
    content: ny fahatezerako.
  '11':
  - type: text
    content: Ampahorîna i Efraîma,
  - type: text
    content: voahitsakitsaka ny zony
  - type: text
    content: satria ninia nanenjika zava-manodoka izy
  - type: note
    content: Teny mety hahatsiarovana ny dina ara-tafika nifanaovan’ny fanjakan’i Israely sy i Siria hanoherana ny Asirianina izay efa mananontanona.
  - type: text
    content: .
  '12':
  - type: text
    content: Ho toy ny fositra Aho amin’i Efraîma
  - type: text
    content: ary ho toy ny olitra amin’ny taranak’i Joda.
  '13':
  - type: text
    content: Hitan’i Efraîma ny aretiny
  - type: text
    content: ary tsapan’i Joda ny feriny;
  - type: text
    content: ka nankany amin’i Asiria i Efraîma
  - type: text
    content: ary nandefa iraka
  - type: text
    content: tany amin’ilay mpanjaka lehibe
  - type: note
    content: Jereo 2 Mp 15.29-30; 17.3.
  - type: text
    content: ;
  - type: text
    content: nefa tsy nahasitrana anareo izy
  - type: text
    content: sady tsy nahafaka ny ferinareo,
  - type: text
    content: ry olon’i Efraîma.
  '14':
  - type: text
    content: Vao mainka aza Izaho TOMPO
  - type: text
    content: ho tahaka ny liona mamely anareo
  - type: text
    content: ary ho toy ny liona tanora
  - type: text
    content: hamely ny taranak’i Joda.
  - type: text
    content: Izaho dia Izaho no handratra ny rembiko,
  - type: text
    content: ka handeha hitondra azy
  - type: text
    content: ary tsy hisy haharombaka azy amiko.
  - type: heading
    content: Fiverenana indray amin’Andriamanitra
  '15':
  - type: text
    content: Handeha hody any amiko Aho, hoy ny TOMPO,
  - type: text
    content: mandra-piaikin’i Efraîma sy i Joda
  - type: text
    content: ho diso ka hitadiavany ny tavako.
  - type: text
    content: Rehefa azom-pahoriana mafy izy,
  - type: text
    content: dia hikatsaka Ahy fatratra.
  '2':
  - type: text
    content: ary lavaka lalina tao Setima
  - type: note
    content: 'Setima: jereo Nom 25; ampit Hos 9.10.'
  - type: text
    content: .
  - type: text
    content: «Fa Izaho kosa, hoy ny TOMPO,
  - type: text
    content: hanome famaizana ho anareo rehetra.
  '3':
  - type: text
    content: Izaho dia mahalala an’i Efraîma,
  - type: text
    content: ary tsy takona amiko i Israely;
  - type: text
    content: satria ianao, ry Efraîma,
  - type: text
    content: efa tonga mpivarotena ankehitriny,
  - type: text
    content: ka voaloto noho izany i Israely.»
  '4':
  - type: text
    content: Fa tsy mamela azy hiverina
  - type: text
    content: amin’Andriamaniny
  - type: text
    content: ny asa nataon’ny Israelita.
  - type: text
    content: Rivotry ny fivarotan-tena
  - type: text
    content: no mitsoka ao aminy
  - type: text
    content: ka tsy mahalala ny TOMPO izy.
  '5':
  - type: text
    content: Vavolombelona manameloka azy
  - type: text
    content: ny avonavon’i Israely.
  - type: text
    content: Solafa-keloka i Israely sy i Efraîma
  - type: text
    content: ka lavo miaraka aminy koa i Joda.
  '6':
  - type: text
    content: 'Mitondra omby aman’ondry hatao '
  - type: text
    content: sorona
  - type: text
    content: ' izy'
  - type: text
    content: no tonga hitady ny TOMPO
  - type: text
    content: nefa tsy hahita Azy;
  - type: text
    content: fa efa nanalavitra azy ireo Izy.
  '7':
  - type: text
    content: Namadika ny TOMPO izy
  - type: text
    content: fa niteraka zazasary.
  - type: text
    content: Ankehitriny, iray volana latsaka
  - type: text
    content: dia ho levona izy mbamin’ny fananany
  - type: note
    content: 'zazasary: ampit 1.2 sy nta. –Tsy dia mazava ny hevitry ny faran’andininy; fa ny dkt tranainy grika dia manao azy ho ny valala handevona ny fananany.'
  - type: text
    content: .
  - type: heading
    content: Ny adin’i Israely sy i Joda
  '8':
  - type: text
    content: Tsofy ao Gibehà ny anjomara
  - type: text
    content: ary tsofy ao Ramà ny trompetra.
  - type: text
    content: Velomy ao Bety-Avena
  - type: note
    content: 'Bety-Avena: jereo 4.15 sy nta Ham 5.5.'
  - type: text
    content: ' ny akoram-panairana.'
  - type: text
    content: Tandremo ny ao an-damosinao, ry Benjamîna!
  '9':
  - type: text
    content: Ho tonga taniefitra i Efraîma
  - type: text
    content: amin’ny andro famaizana;
  - type: text
    content: zavatra tsy maintsy ho to no ambarako
  - type: text
    content: amin’ireo fokon’i Israely.
