    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Fa Izaho kosa, hoy ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanome famaizana ho anareo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
