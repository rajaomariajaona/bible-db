  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Handeha hody any amiko Aho, hoy ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-piaikin’i Efraîma sy i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho diso ka hitadiavany ny tavako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa azom-pahoriana mafy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hikatsaka Ahy fatratra.
