      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mitsepà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toerana maro no mitondra io anarana io. Mety ho tanàna kely 13 km avaratr’i Jerosalema izy eto (Jos 18.26; 1 Sam 7.5-6 sns). Ny fihadian-tany natao tamin’izany faritra izany dia nanambara ny mahazava-dehibe ny fanompoam-pivavahana natao ho an’ny andriamani-bavin’ny fahavokarana, i Hastôreta* tamin’ny andron’i Hôsea. Toeram-panasinan’ny fivavahana kanahanita izany. –ny tendrombohitra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tabôra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay mandòndona eo amin’ny lohasahan’i Jizrehèla, ao avaratr’i Palestinina, dia mbola toeram-panasinan’ny fivavahana kanahanita koa. –ny fandrika '
    - type: usfm
      marker: it
      children:
      - type: text
        text: harato
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay tian’i Hôsea hotsarovana eto dia mety ho ny fivavahana kanahanita (jereo Hos 1.2 sy nta).'
    marker-yv: yv-n
  - type: text
    text: ','
