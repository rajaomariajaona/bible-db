  - type: text
    text: voahitsakitsaka ny zony
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ninia nanenjika zava-manodoka izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Teny mety hahatsiarovana ny dina ara-tafika nifanaovan’ny fanjakan’i Israely sy i Siria hanoherana ny Asirianina izay efa mananontanona.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
