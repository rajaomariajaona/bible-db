    children:
    - type: text
      text: '10'
  - type: text
    text: Fa tahaka ny mpamindra sisin-tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Deot 19.14; 27.17: Ireo mpitondra tao Joda dia nanararaotra ny fanindrian’ny Asirianina ny fanjakan’i Israely mba hanisahana ny sisintaniny hianavaratra kokoa.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mpifehy an’i Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hataoko mandriaka aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahatezerako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ampahorîna i Efraîma,
- type: usfm
  marker: q1
