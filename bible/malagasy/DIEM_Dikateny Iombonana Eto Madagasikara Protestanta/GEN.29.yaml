document_id: GEN.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fihaonan’i Jakôba tamin’i Rahely
  - type: text
    content: 'Ary niainga i Jakôba ka nankany amin’ny tany atsinanana, dia ny tanindrazan-dreniny. '
  '10':
  - type: text
    content: 'Ary rehefa nahita an’i Rahely zanakavavin’i Labàna anadahin-dreniny sy ireo ondry aman’osiny i Jakôba, dia nanatona nanaisotra ny vato teo amin’ny vava fantsakana, ka nampisotro ireo ondry aman’osin’ny anadahin-dreniny. '
  '11':
  - type: text
    content: 'Dia nanoroka an’i Rahely i Jakôba sady nitomany. '
  '12':
  - type: text
    content: 'Notantarain’i Jakôba tamin’i Rahely fa havan-drainy izy ary zanakalahin’i Rebekà. Dia nihazakazaka i Rahely ka nitantara izany tamin-drainy. '
  '13':
  - type: text
    content: 'Rehefa nandre ny amin’i Jakôba zanak’anabaviny kosa i Labàna, dia nihazakazaka nitsena azy, ka namihina sady nanoroka azy ary nitondra azy ho any an-tranony. Notantarain’i Jakôba tamin’i Labàna avokoa ny zava-nitranga, '
  '14':
  - type: text
    content: 'ka hoy i Labàna taminy:'
  - type: text
    content: –Marina tokoa fa havako ianao, ary iray ra amiko.
  - type: text
    content: Dia nipetraka iray volana tao aminy i Jakôba.
  - type: heading
    content: Ny raharaham-panambadian’i Jakôba
  '15':
  - type: text
    content: 'Indray andro dia hoy i Labàna tamin’i Jakôba:'
  - type: text
    content: –Noho ny maha havako anao ve dia hanompo ahy maimaim-poana ianao? Koa lazao amiko, inona no ho karamanao?
  '16':
  - type: text
    content: 'Nanana zanakavavy roa anefa i Labàna; ilay zokiny dia nantsoina hoe Leà ary ilay zandriny natao hoe Rahely. '
  '17':
  - type: text
    content: 'I Leà dia malefa-pijery, fa i Rahely kosa tsara tarehy sady bikàna. '
  '18':
  - type: text
    content: 'Ary tia an’i Rahely i Jakôba ka niteny tamin’i Labàna hoe:'
  - type: text
    content: –Hanompo anao fito taona aho mba hahazoako manambady an’i Rahely faravavinao.
  '19':
  - type: text
    content: 'Dia namaly azy i Labàna hoe:'
  - type: text
    content: –Aleoko homena anao izy toy izay ho an’olon-kafa, fa mitoera eto amiko.
  '2':
  - type: text
    content: 'Indray andro izy, dia nahatazana fantsakana teny an-tsaha, ary indreo nisy ondry aman’osy andiany telo nandry teo anilany, fa io fantsakana io no fampisotroana ny biby fiompy. Misy vato lehibe manarona ny vavan’ny fantsakana. '
  '20':
  - type: text
    content: 'Koa mba hahazoany an’i Rahely, dia nanompo an’i Labàna fito taona i Jakôba; nefa toy ny andro vitsivitsy nandalo izany teo imasony, satria tena tiany razazavavy. '
  '21':
  - type: text
    content: 'Rehefa afaka izany, dia hoy i Jakôba tamin’i Labàna:'
  - type: text
    content: –Aiza amin’izay ny vadiko hampakariko, fa efa tapitra ny fe-potoana.
  '22':
  - type: text
    content: 'Dia nasain’i Labàna ho amin’ny sakafom-panambadiana ny olona rehetra teo an-toerana. '
  '23':
  - type: text
    content: 'Nony hariva dia nalain’i Labàna i Leà zanany vavy ka nentiny tany amin’i Jakôba ary nandry taminy izy. '
  '24':
  - type: text
    content: 'Nomen’i Labàna an’i Leà zanany vavy kosa i Zilpà mba ho mpanompovavy hanampy azy. '
  '25':
  - type: text
    content: 'Nony maraina vao gaga i Jakôba fa hay i Leà no tao aminy, ka hoy izy tamin’i Labàna:'
  - type: text
    content: –Inona izao nataonao tamiko izao? Fa angaha tsy i Rahely no nanompoako anao, koa nahoana ianao no namitaka ahy?
  '26':
  - type: text
    content: 'Dia namaly i Labàna hoe:'
  - type: text
    content: '–Tsy fomban-tany aty aminay ny mampanambady ny zandriny alohan’ny zokiny. '
  '27':
  - type: text
    content: Vitao aloha ny herinandron’ny volantantely amin’ny zokiny, dia homenay anao koa ny zandriny raha manompo ahy fito taona hafa indray ianao.
  '28':
  - type: text
    content: 'Dia nataon’i Jakôba izany, ka novitainy ny herinandron’ny volantantely tamin’i Leà; avy eo dia nomen’i Labàna azy koa i Rahely ho vadiny. '
  '29':
  - type: text
    content: 'Nomen’i Labàna an’i Rahely i Bilehà mba ho mpanompovavy hanampy azy. '
  '3':
  - type: text
    content: 'Rehefa tafangona avokoa ireo andiany rehetra, dia esorina ny vato amin’ny vava fantsakana ary ampisotroina ny andian’ondry aman’osy; aorian’izany, dia averina ho amin’ny toerany eo amin’ny vava fantsakana ilay vato. '
  '30':
  - type: text
    content: Dia nandry tany amin’i Rahely koa i Jakôba ka tiany lavitra noho i Leà izy. Ary nanompo an’i Labàna fito taona hafa koa i Jakôba.
  - type: heading
    content: Ireo zanak’i Jakôba
  '31':
  - type: text
    content: 'Ary rehefa hitan’ny TOMPO fa tsy tiana noho i Rahely i Leà, dia nataony mitoe-jaza izy; fa i Rahely kosa nataony momba. '
  '32':
  - type: text
    content: 'Dia bevohòka i Leà, ka tera-dahy ary ny anarany nataony hoe Reobena, satria hoy izy hoe:'
  - type: text
    content: –Ny TOMPO efa nijery ny fahoriako
  - type: note
    content: Amin’ny fiteny hebreo ny anarana hoe Reobena dia mampahatsiaro matoanteny izay nadika hoe efa nijery fa ny hevitry ny anarana hoe Reobena ara-bakiteny dia nahita zanakalahy izy.
  - type: text
    content: ', ary ankehitriny dia ho tia ahy ny vadiko.'
  '33':
  - type: text
    content: 'Ary bevohòka indray izy ka tera-dahy, dia niteny hoe:'
  - type: text
    content: –Efa ren’ny TOMPO fa tsy tiana aho, ka nomeny an’ity indray koa. Dia nataony hoe Simehôna ny anarany
  - type: note
    content: Amin’ny fiteny hebreo ny anarana hoe Simehôna dia mampahatsiaro ny matoanteny izay nadika hoe Efa ren’ny... eto.
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Mbola bevohòka indray izy ka tera-dahy fanintelony, dia nanao hoe:'
  - type: text
    content: –Ankehitriny dia hifikitra amiko ny vadiko, satria efa niteraka telo lahy ho azy aho.
  - type: text
    content: Noho izany dia nataony hoe Levỳ ny anarany
  - type: note
    content: Amin’ny fiteny hebreo ny anarana hoe Levỳ dia mampahatsiaro ny matoanteny izay nadika hoe hifikitra eto.
  - type: text
    content: .
  '35':
  - type: text
    content: 'Fa mbola bevohòka indray izy, dia niteraka zazalahy fahefatra, ka nanao hoe:'
  - type: text
    content: –Amin’ity kosa dia hidera ny TOMPO aho.
  - type: text
    content: Dia nataony hoe Joda
  - type: note
    content: Amin’ny fiteny hebreo ny anarana hoe Joda dia mampahatsiaro ny matoanteny izay nadika hoe hidera eto.
  - type: text
    content: ' ny anarany.'
  - type: text
    content: Dia nitsahatra tsy niteraka intsony izy.
  '4':
  - type: text
    content: 'Nanontany an’ireo '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry i Jakôba hoe:'
  - type: text
    content: –Ry rahalahy, avy aiza moa ianareo?
  - type: text
    content: 'Ka hoy ireo hoe:'
  - type: text
    content: –Avy any Haràna izahay.
  '5':
  - type: text
    content: 'Dia niteny indray i Jakôba hoe:'
  - type: text
    content: –Fantatrareo ve i Labàna, zafin’i Nahôra?
  - type: text
    content: 'Ka novalian’ireo hoe:'
  - type: text
    content: –Eny, fantatray izy.
  '6':
  - type: text
    content: 'Fa nanontany ihany i Jakôba hoe:'
  - type: text
    content: –Salama ihany ve izy?
  - type: text
    content: 'Dia hoy ireo taminy:'
  - type: text
    content: –Salama izy, ary inty i Rahely zanany vavy fa tonga miaraka amin’ny andian’ondriny.
  '7':
  - type: text
    content: 'Ary hoy Jakôba hoe:'
  - type: text
    content: –Mbola antoandro loatra ny andro, ka tsy mbola fotoana fanangonana ny biby fiompy; fa ampisotroy aloha ireo, dia andraso ihany.
  '8':
  - type: text
    content: 'Fa novalian’ireo hoe:'
  - type: text
    content: –Tsy azonay atao izany, raha tsy efa tafangona avokoa ny andiany rehetra; amin’izay dia hoesorina ny vato eo amin’ny vava fantsakana, ary hampisotro ny ondry aman’osy izahay.
  '9':
  - type: text
    content: 'Raha mbola niresaka tamin’ireo i Jakôba, dia tonga i Rahely niaraka tamin’ny ondrin-drainy, fa mpiandry ondry izy. '
