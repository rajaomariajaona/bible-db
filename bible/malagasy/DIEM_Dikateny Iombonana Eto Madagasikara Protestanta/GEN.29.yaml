document_id: GEN.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fihaonan’i Jakôba tamin’i Rahely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary niainga i Jakôba ka nankany amin’ny tany atsinanana, dia ny tanindrazan-dreniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indray andro izy, dia nahatazana fantsakana teny an-tsaha, ary indreo nisy ondry aman’osy andiany telo nandry teo anilany, fa io fantsakana io no fampisotroana ny biby fiompy. Misy vato lehibe manarona ny vavan’ny fantsakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa tafangona avokoa ireo andiany rehetra, dia esorina ny vato amin’ny vava fantsakana ary ampisotroina ny andian’ondry aman’osy; aorian’izany, dia averina ho amin’ny toerany eo amin’ny vava fantsakana ilay vato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanontany an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ondry i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry rahalahy, avy aiza moa ianareo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avy any Haràna izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niteny indray i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fantatrareo ve i Labàna, zafin’i Nahôra?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, fantatray izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nanontany ihany i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Salama ihany ve izy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ireo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Salama izy, ary inty i Rahely zanany vavy fa tonga miaraka amin’ny andian’ondriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mbola antoandro loatra ny andro, ka tsy mbola fotoana fanangonana ny biby fiompy; fa ampisotroy aloha ireo, dia andraso ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy azonay atao izany, raha tsy efa tafangona avokoa ny andiany rehetra; amin’izay dia hoesorina ny vato eo amin’ny vava fantsakana, ary hampisotro ny ondry aman’osy izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha mbola niresaka tamin’ireo i Jakôba, dia tonga i Rahely niaraka tamin’ny ondrin-drainy, fa mpiandry ondry izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa nahita an’i Rahely zanakavavin’i Labàna anadahin-dreniny sy ireo ondry aman’osiny i Jakôba, dia nanatona nanaisotra ny vato teo amin’ny vava fantsakana, ka nampisotro ireo ondry aman’osin’ny anadahin-dreniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nanoroka an’i Rahely i Jakôba sady nitomany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Notantarain’i Jakôba tamin’i Rahely fa havan-drainy izy ary zanakalahin’i Rebekà. Dia nihazakazaka i Rahely ka nitantara izany tamin-drainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rehefa nandre ny amin’i Jakôba zanak’anabaviny kosa i Labàna, dia nihazakazaka nitsena azy, ka namihina sady nanoroka azy ary nitondra azy ho any an-tranony. Notantarain’i Jakôba tamin’i Labàna avokoa ny zava-nitranga, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka hoy i Labàna taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Marina tokoa fa havako ianao, ary iray ra amiko.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nipetraka iray volana tao aminy i Jakôba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny raharaham-panambadian’i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Indray andro dia hoy i Labàna tamin’i Jakôba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Noho ny maha havako anao ve dia hanompo ahy maimaim-poana ianao? Koa lazao amiko, inona no ho karamanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nanana zanakavavy roa anefa i Labàna; ilay zokiny dia nantsoina hoe Leà ary ilay zandriny natao hoe Rahely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I Leà dia malefa-pijery, fa i Rahely kosa tsara tarehy sady bikàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary tia an’i Rahely i Jakôba ka niteny tamin’i Labàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hanompo anao fito taona aho mba hahazoako manambady an’i Rahely faravavinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia namaly azy i Labàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aleoko homena anao izy toy izay ho an’olon-kafa, fa mitoera eto amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa mba hahazoany an’i Rahely, dia nanompo an’i Labàna fito taona i Jakôba; nefa toy ny andro vitsivitsy nandalo izany teo imasony, satria tena tiany razazavavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa afaka izany, dia hoy i Jakôba tamin’i Labàna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza amin’izay ny vadiko hampakariko, fa efa tapitra ny fe-potoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nasain’i Labàna ho amin’ny sakafom-panambadiana ny olona rehetra teo an-toerana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony hariva dia nalain’i Labàna i Leà zanany vavy ka nentiny tany amin’i Jakôba ary nandry taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nomen’i Labàna an’i Leà zanany vavy kosa i Zilpà mba ho mpanompovavy hanampy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nony maraina vao gaga i Jakôba fa hay i Leà no tao aminy, ka hoy izy tamin’i Labàna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona izao nataonao tamiko izao? Fa angaha tsy i Rahely no nanompoako anao, koa nahoana ianao no namitaka ahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia namaly i Labàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy fomban-tany aty aminay ny mampanambady ny zandriny alohan’ny zokiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vitao aloha ny herinandron’ny volantantely amin’ny zokiny, dia homenay anao koa ny zandriny raha manompo ahy fito taona hafa indray ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nataon’i Jakôba izany, ka novitainy ny herinandron’ny volantantely tamin’i Leà; avy eo dia nomen’i Labàna azy koa i Rahely ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nomen’i Labàna an’i Rahely i Bilehà mba ho mpanompovavy hanampy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia nandry tany amin’i Rahely koa i Jakôba ka tiany lavitra noho i Leà izy. Ary nanompo an’i Labàna fito taona hafa koa i Jakôba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo zanak’i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary rehefa hitan’ny TOMPO fa tsy tiana noho i Rahely i Leà, dia nataony mitoe-jaza izy; fa i Rahely kosa nataony momba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia bevohòka i Leà, ka tera-dahy ary ny anarany nataony hoe Reobena, satria hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny TOMPO efa nijery ny fahoriako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny fiteny hebreo ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Reobena
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mampahatsiaro matoanteny izay nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: efa nijery
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fa ny hevitry ny anarana hoe Reobena ara-bakiteny dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nahita zanakalahy izy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ary ankehitriny dia ho tia ahy ny vadiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary bevohòka indray izy ka tera-dahy, dia niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa ren’ny TOMPO fa tsy tiana aho, ka nomeny an’ity indray koa. Dia nataony hoe Simehôna ny anarany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny fiteny hebreo ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Simehôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mampahatsiaro ny matoanteny izay nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Efa ren’ny...
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mbola bevohòka indray izy ka tera-dahy fanintelony, dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ankehitriny dia hifikitra amiko ny vadiko, satria efa niteraka telo lahy ho azy aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: Noho izany dia nataony hoe Levỳ ny anarany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny fiteny hebreo ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Levỳ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mampahatsiaro ny matoanteny izay nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hifikitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa mbola bevohòka indray izy, dia niteraka zazalahy fahefatra, ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Amin’ity kosa dia hidera ny TOMPO aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nataony hoe Joda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny fiteny hebreo ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mampahatsiaro ny matoanteny izay nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hidera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nitsahatra tsy niteraka intsony izy.
