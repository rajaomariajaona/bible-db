document_id: EZK.45
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faritany voatokana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Rehefa mizara ny tany ho an’ny isam-poko eo amin’ny Israelita ianareo, dia hisy ampahany havahanareo ho an’ny TOMPO: anjara voatokana ho Azy amin’ny tany izany ka hisy 12 km sy sasany ny lavany ary 10 km ny sakany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary 10 km: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary 5 km
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '; voatokana manontolo ho an’ny Tompo izany faritany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'Io faritany io no hamaritana vakim-paritra iray izay mirefy 12 km sy sasany ny lavany ary 5 km ny sakany. Ao anatin’io vakim-paritra io dia hisy tany ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ': tany iray efamira ka samy 250 metatra avy ny lafiny tsirairay sady voahodidina toera-malalaka 25 metatra ny velarany, ka ao no hisy ny tempoly izay toerana manan-kasina fatratra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ho masina io vakim-paritra io eo amin’ny tany fa natokana ho an’ny mpisorona izay manatanteraka ny asa fanompoana ny TOMPO ao an-tempoly. Amin’izay tokoa dia hisy toerana ho an’ny tranon’ireo mpisorona sy toerana voatokana ho an’ny tempoly. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ilay vakim-paritra iray hafa, mirefy 12 km sy sasany ny lavany ary 5 km ny sakany, dia natokana ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' izay manana anjara raharaha ao amin’ny tempoly. Hanana tanàna izay honenany ao koa ireny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tanàna izay honenany ao koa ireny: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: efitrano roapolo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manaraka ny halavan’io faritra izay natokana ho an’ny Tompo io, dia hamaritana vakim-paritra iray hafa koa izay mirefy 12 km sy sasany ny lavany ary 2 km sy sasany ny sakany mba hanorenana tanàna iray ahazoan’ny Israelita tsirairay monina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny printsy filoha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty momba ny 44.3.
    marker-yv: yv-n
  - type: text
    text: ' dia homena tany iray eo anelanelan’ny faritra voatokana ho an’ny Tompo sy ny toerana misy ny tanànan’ny Israelita. Izany tany izany dia hitohy miankandrefana hatrany amin’ny Ranomasina Mediteranea ary miantsinanana hatrany amin’ny sisin-tanin’i Israely any atsinanana. Hitovy halava amin’ny zaratanin’ny foko tsirairay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa ireo printsy dia hanana ny anjara taniny manokana ao Israely ka tsy hampahory ny vahoakan’ny Tompo intsony izy, fa hamela ny faritra sisa amin’ny tany ho an’ireo fokon’i Israely.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zo sy adidin’ilay printsy filoha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Tafahoatra loatra ny nataonareo, ry printsy filohan’i Israely. Koa ialao ny herisetra sy ny fitondrana jadona, manaova ny rariny sy ny hitsiny, atsaharo ny fandrobanareo ny vahoakako. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Aoka samy hampiasa mizàna sy fandrefesana marina. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny efà ho an’ny voa madinika ary ny bata ho an’ny ranon-javatra, hitovy fatra ireo famarana roa ireo ka samy hahalany ampahafolon’ny hômera avy, fa ny hômera no ho fatra fototra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny hômera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'no famarana lehibe ho an’ny voamaina mitovy amin’ny 450 litatra na 300 kilao eo ho eo. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny efà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tokony ho 30 kilao any ho any ary ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia 45 litatra.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny sekela volafotsy dia ho gera roapolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'gera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia milanja mihoatra kely ny 0,55 grama, ary ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tokony ho 680 grama any ho any.'
    marker-yv: yv-n
  - type: text
    text: ', ary ny sekela enimpolo kosa no ho mina iray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Toy izao no ampahany havahanareo amin’ny fanatitra ataonareo: ampahenimpolon’ny vokatra varimbazaha na vary ôrza, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary ampahazaton’ny vokatra diloilo no homenareo. Ny bata iray misy ampahafolon’ny hômera sy ampahafolon’ny kôra no hamaranareo ny diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary farany momba ny biby fiompy eny amin’ny kijànan’i Israely: iray isaky ny ondry na osy roanjato no havahanareo. Ka izay navahanareo dia hatolotrareo ho fanatitra vokatry ny tany na ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo na ho sorom-pihavanana mba hahazoanareo famelan-keloka. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Ny olona rehetra eo amin’ny tany no hanefa izany tolotra izany ho an’ny printsy filohan’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty momba ny 44.3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Io printsy filohan’i Israely io kosa no hiantoka ny sorona dorana manontolo ary ny fanatitra lafarinina sy divay mandritra ny fety, indrindra fa amin’ny voaloham-bolana sy ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' ary ny fotoana hafa rehetra fivorian’ny vahoakan’i Israely. Eny, ny printsy filoha no hiantoka ny sorona fanalana ny ota sy ny fanatitra vokatry ny tany ary ny sorona dorana manontolo sy ny sorom-pihavanana mba hahazoana famelan-keloka ho an’ny vahoakan’i Israely.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izao koa no lazain’ny Tompo ANDRIANANAHARY: «Amin’ny andro voalohan’ny volana voalohany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: volana voalohany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' amin’ny taona israelita dia manandrify ny Marsa-Avrily amin’ny fanisanandrontsika ankehitriny. Volana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nisàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abiba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no fiantso azy.'
    marker-yv: yv-n
  - type: text
    text: ' dia hatao sorona ny ombilahy iray tsy misy kilema mba '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hanadiovana
  - type: text
    text: ' ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hangalan’ny mpisorona ny ran’ilay biby natao sorona ka hatentiny amin’ireo tolam-bavahadin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' sy amin’ireo zoro efatry ny marin-tampon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ary amin’ireo tolam-bavahadin’ny kianja anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tahaka izany koa no hatao amin’ny andro fahafiton’io volana io ho an’izay olona nanota tsy nahy na tsy amim-pahalalana. Toy izany no hanadiovana ny tempoly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Ny andro faha-14 amin’ny volana voalohany no hanombohanareo mankalaza ny fetin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: '. Haharitra fito andro izany, ka mandritra izany no hihinananareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mofo tsy misy leviora
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny andro voalohany amin’ny fety no hanoloran’ny printsy filoha ombilahy iray hatao sorona fanalana ny ota ho an’ny tenany sy ho an’ny vahoakany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ankoatra izany, isan’andro mandritra ny fito andro, dia hanolotra ombilahy fito sy ondrilahy fito tsy misy kilema hatao sorona dorana manontolo amiko TOMPO izy ary koa hanolotra osilahy iray isan’andro hatao sorona fanalana ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary farany dia hanao fanatitra varimbazaha telopolo kilao miampy diloilo enina litatra koa izy, isaky ny ombilahy sy ondrilahy natao sorona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: «Ary ny amin’ilay fety, izay manomboka rehefa andro faha-15 amin’ny volana fahafito
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fety
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' lazaina eto dia ny fetin’ny Tranotomboka (jereo Lev 23.34-36, 39-43). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny volana fahafito
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia manandrify ny Septambra-Oktôbra amin’ny fanisanandrontsika ankehitriny.'
    marker-yv: yv-n
  - type: text
    text: ', dia tahaka ny amin’ny fetin’ny Paska ihany no hataon’ny printsy filoha, isan’andro mandritra ny fito andro: na ny sorona fanalana ny ota izany na ny sorona dorana manontolo na ny fanatitra varimbazaha sy diloilo.»'
