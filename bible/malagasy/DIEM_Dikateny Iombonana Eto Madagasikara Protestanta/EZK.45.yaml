document_id: EZK.45,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faritany voatokana
  - type: text
    content: '«Rehefa mizara ny tany ho an’ny isam-poko eo amin’ny Israelita ianareo, dia hisy ampahany havahanareo ho an’ny TOMPO: anjara voatokana ho Azy amin’ny tany izany ka hisy 12 km sy sasany ny lavany ary 10 km ny sakany'
  - type: note
    content: 'ary 10 km: araka ny dkt tranainy grika izany; fa ny RM kosa manao hoe ary 5 km.'
  - type: text
    content: '; voatokana manontolo ho an’ny Tompo izany faritany izany. '
  '10':
  - type: text
    content: '«Aoka samy hampiasa mizàna sy fandrefesana marina. '
  '11':
  - type: text
    content: Ny efà ho an’ny voa madinika ary ny bata ho an’ny ranon-javatra, hitovy fatra ireo famarana roa ireo ka samy hahalany ampahafolon’ny hômera avy, fa ny hômera no ho fatra fototra
  - type: note
    content: Ny hômera no famarana lehibe ho an’ny voamaina mitovy amin’ny 450 litatra na 300 kilao eo ho eo. Ny efà dia tokony ho 30 kilao any ho any ary ny bata dia 45 litatra.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ny sekela volafotsy dia ho gera roapolo
  - type: note
    content: Ny gera dia milanja mihoatra kely ny 0,55 grama, ary ny mina dia tokony ho 680 grama any ho any.
  - type: text
    content: ', ary ny sekela enimpolo kosa no ho mina iray.'
  '13':
  - type: text
    content: 'Toy izao no ampahany havahanareo amin’ny fanatitra ataonareo: ampahenimpolon’ny vokatra varimbazaha na vary ôrza, '
  '14':
  - type: text
    content: 'ary ampahazaton’ny vokatra diloilo no homenareo. Ny bata iray misy ampahafolon’ny hômera sy ampahafolon’ny kôra no hamaranareo ny diloilo. '
  '15':
  - type: text
    content: 'Ary farany momba ny biby fiompy eny amin’ny kijànan’i Israely: iray isaky ny ondry na osy roanjato no havahanareo. Ka izay navahanareo dia hatolotrareo ho fanatitra vokatry ny tany na ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo na ho sorom-pihavanana mba hahazoanareo famelan-keloka. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
  '16':
  - type: text
    content: «Ny olona rehetra eo amin’ny tany no hanefa izany tolotra izany ho an’ny printsy filohan’i Israely
  - type: note
    content: Jereo ny naoty momba ny 44.3.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Io printsy filohan’i Israely io kosa no hiantoka ny sorona dorana manontolo ary ny fanatitra lafarinina sy divay mandritra ny fety, indrindra fa amin’ny voaloham-bolana sy ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' ary ny fotoana hafa rehetra fivorian’ny vahoakan’i Israely. Eny, ny printsy filoha no hiantoka ny sorona fanalana ny ota sy ny fanatitra vokatry ny tany ary ny sorona dorana manontolo sy ny sorom-pihavanana mba hahazoana famelan-keloka ho an’ny vahoakan’i Israely.»'
  '18':
  - type: text
    content: 'Izao koa no lazain’ny Tompo ANDRIANANAHARY: «Amin’ny andro voalohan’ny volana voalohany'
  - type: note
    content: Ny volana voalohany amin’ny taona israelita dia manandrify ny Marsa-Avrily amin’ny fanisanandrontsika ankehitriny. Volana Nisàna na Abiba no fiantso azy.
  - type: text
    content: ' dia hatao sorona ny ombilahy iray tsy misy kilema mba '
  - type: text
    content: hanadiovana
  - type: text
    content: ' ny '
  - type: text
    content: Toeramasina
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Hangalan’ny mpisorona ny ran’ilay biby natao sorona ka hatentiny amin’ireo tolam-bavahadin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' sy amin’ireo zoro efatry ny marin-tampon’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ary amin’ireo tolam-bavahadin’ny kianja anatiny. '
  '2':
  - type: text
    content: 'Io faritany io no hamaritana vakim-paritra iray izay mirefy 12 km sy sasany ny lavany ary 5 km ny sakany. Ao anatin’io vakim-paritra io dia hisy tany ho an’ny '
  - type: text
    content: tempoly
  - type: text
    content: ': tany iray efamira ka samy 250 metatra avy ny lafiny tsirairay sady voahodidina toera-malalaka 25 metatra ny velarany, ka ao no hisy ny tempoly izay toerana manan-kasina fatratra. '
  '20':
  - type: text
    content: Tahaka izany koa no hatao amin’ny andro fahafiton’io volana io ho an’izay olona nanota tsy nahy na tsy amim-pahalalana. Toy izany no hanadiovana ny tempoly.
  '21':
  - type: text
    content: '«Ny andro faha-14 amin’ny volana voalohany no hanombohanareo mankalaza ny fetin’ny '
  - type: text
    content: Paska
  - type: text
    content: '. Haharitra fito andro izany, ka mandritra izany no hihinananareo '
  - type: text
    content: mofo tsy misy leviora
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ny andro voalohany amin’ny fety no hanoloran’ny printsy filoha ombilahy iray hatao sorona fanalana ny ota ho an’ny tenany sy ho an’ny vahoakany rehetra. '
  '23':
  - type: text
    content: 'Ankoatra izany, isan’andro mandritra ny fito andro, dia hanolotra ombilahy fito sy ondrilahy fito tsy misy kilema hatao sorona dorana manontolo amiko TOMPO izy ary koa hanolotra osilahy iray isan’andro hatao sorona fanalana ny ota. '
  '24':
  - type: text
    content: Ary farany dia hanao fanatitra varimbazaha telopolo kilao miampy diloilo enina litatra koa izy, isaky ny ombilahy sy ondrilahy natao sorona.
  '25':
  - type: text
    content: «Ary ny amin’ilay fety, izay manomboka rehefa andro faha-15 amin’ny volana fahafito
  - type: note
    content: Ny fety lazaina eto dia ny fetin’ny Tranotomboka (jereo Lev 23.34-36, 39-43). –ny volana fahafito dia manandrify ny Septambra-Oktôbra amin’ny fanisanandrontsika ankehitriny.
  - type: text
    content: ', dia tahaka ny amin’ny fetin’ny Paska ihany no hataon’ny printsy filoha, isan’andro mandritra ny fito andro: na ny sorona fanalana ny ota izany na ny sorona dorana manontolo na ny fanatitra varimbazaha sy diloilo.»'
  '4':
  - type: text
    content: 'Ho masina io vakim-paritra io eo amin’ny tany fa natokana ho an’ny mpisorona izay manatanteraka ny asa fanompoana ny TOMPO ao an-tempoly. Amin’izay tokoa dia hisy toerana ho an’ny tranon’ireo mpisorona sy toerana voatokana ho an’ny tempoly. '
  '5':
  - type: text
    content: 'Ilay vakim-paritra iray hafa, mirefy 12 km sy sasany ny lavany ary 5 km ny sakany, dia natokana ho an’ny '
  - type: text
    content: levita
  - type: text
    content: ' izay manana anjara raharaha ao amin’ny tempoly. Hanana tanàna izay honenany ao koa ireny'
  - type: note
    content: 'tanàna izay honenany ao koa ireny: araka ny dkt tranainy grika izany; fa ny RM kosa manao hoe efitrano roapolo.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Manaraka ny halavan’io faritra izay natokana ho an’ny Tompo io, dia hamaritana vakim-paritra iray hafa koa izay mirefy 12 km sy sasany ny lavany ary 2 km sy sasany ny sakany mba hanorenana tanàna iray ahazoan’ny Israelita tsirairay monina. '
  '7':
  - type: text
    content: Ny printsy filoha
  - type: note
    content: Jereo ny naoty momba ny 44.3.
  - type: text
    content: ' dia homena tany iray eo anelanelan’ny faritra voatokana ho an’ny Tompo sy ny toerana misy ny tanànan’ny Israelita. Izany tany izany dia hitohy miankandrefana hatrany amin’ny Ranomasina Mediteranea ary miantsinanana hatrany amin’ny sisin-tanin’i Israely any atsinanana. Hitovy halava amin’ny zaratanin’ny foko tsirairay izy. '
  '8':
  - type: text
    content: Koa ireo printsy dia hanana ny anjara taniny manokana ao Israely ka tsy hampahory ny vahoakan’ny Tompo intsony izy, fa hamela ny faritra sisa amin’ny tany ho an’ireo fokon’i Israely.»
  - type: heading
    content: Ny zo sy adidin’ilay printsy filoha
  '9':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Tafahoatra loatra ny nataonareo, ry printsy filohan’i Israely. Koa ialao ny herisetra sy ny fitondrana jadona, manaova ny rariny sy ny hitsiny, atsaharo ny fandrobanareo ny vahoakako. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
