  - type: text
    content: Elisà izay mpianatr’i Elià sady mpandimby azy.
  - type: text
    content: Ny fizaràna faharoa (toko 18–25) dia momba ireo 130 taona eo ho eo izay niainan’ny fanjakan’i Joda samirery mandra-piavin’i Nebokadnetsara mpanjakan’i Babilôna haka an’i Jerosalema tamin’ny taona 587 tal J.K., sy handrava ny tempoly ary hanao sesitany ireo lohandohan’ny vahoakan’i Joda tany Babilônia (toko 25).
