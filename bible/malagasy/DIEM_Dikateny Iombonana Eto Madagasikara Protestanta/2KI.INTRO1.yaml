  - type: text
    content: Ny fizaràna voalohany (toko 1–17) dia mitondra ny mpamaky hatrany amin’ny faharavan’ny fanjakan’i Israely, izay ratsy tokoa ny fitondran’ireo mpanjaka mpivadika amin’Andriamanitra azy. Nanamafy fo hatrany ireo; ka dia navelan’Andriamanitra ho tonga haka an’i Samaria, renivohitry ny fanjakana israelita avaratra, i Salmanesera mpanjakan’i Asiria, tamin’ny taona 722 tal J.K., sady koa hanao sesitany ny ampahany tamin’ny vahoaka. Ny toko 2–13 amin’ity fizaràna ity dia mampisongadina ny endriky ny
  - type: text
