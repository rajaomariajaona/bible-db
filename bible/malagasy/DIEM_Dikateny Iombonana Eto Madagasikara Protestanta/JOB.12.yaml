document_id: JOB.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba: lozabe tsy azo ifonana Andriamanitra'
  - type: text
    content: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Izy no mitana ny ain’ny voaary rehetra,
  - type: text
    content: mbamin’ny fofonain’ny olombelona tsirairay avy.
  '11':
  - type: text
    content: «Adidin’ny sofina ny mamantatra ny teny,
  - type: text
    content: ary adidin’ny lanilany kosa
  - type: text
    content: ny mahatsapa tsiron-kanina»,
  - type: text
    content: hoy ny filàzan’ny oha-pitenenana.
  '12':
  - type: text
    content: «Izay anti-panahy manam-pahendrena
  - type: text
    content: ary izay ela nihetezana, hono, lava volo.»
  '13':
  - type: text
    content: Saingy Andriamanitra kosa
  - type: text
    content: no tompon’ny fahendrena sy ny fahefana;
  - type: text
    content: Azy koa ny tolo-kevitra sy ny fahalalana.
  - type: heading
    content: '*'
  '14':
  - type: text
    content: Tsy misy mahatsangana izay ravan’Andriamanitra,
  - type: text
    content: ary tsy misy mahafaka izay voagadrany.
  '15':
  - type: text
    content: Raha mitana ny orana Izy,
  - type: text
    content: dia tonga ny hain-tany;
  - type: text
    content: fa raha mandefa ny rano kosa Izy,
  - type: text
    content: dia tondraka ny tany.
  '16':
  - type: text
    content: Ao aminy ny hery sy ny fahakingana;
  - type: text
    content: samy Azy na ny voafitaka na ny mpamitaka.
  '17':
  - type: text
    content: Ampirediredeny ireo mpanolotsaim-panjakana,
  - type: text
    content: ary ataony very saina ny mpitsara.
  '18':
  - type: text
    content: Foanany ny fanamparam-pahefàn’ny mpanjaka,
  - type: text
    content: ka tady mahazaka no solom-pehikibony
  - type: note
    content: 'tady mahazaka: famantarana ny tsy faha-mihetsiketsika izany (jereo Jôh 21.18) na koa ny olona voababo.'
  - type: text
    content: .
  '19':
  - type: text
    content: Ampirediredeny koa ny mpisorona,
  - type: text
    content: ary aongany izay manam-pahefana.
  '2':
  - type: text
    content: Marina fa ianareo no feon’ny vahoaka;
  - type: text
    content: ary dia hiara-maty aminareo ny fahendrena.
  '20':
  - type: text
    content: Ampangininy ny mpikabary mahay
  - type: text
    content: ary esoriny ny fahiratan-tsain’ny anti-panahy.
  '21':
  - type: text
    content: Fatrarany henatra ireo olona ambony
  - type: text
    content: ary ketrahiny ny herin’ny matanjaka.
  '22':
  - type: text
    content: Ahanjahanjany ny zava-miafina tanatin’ny haizina;
  - type: text
    content: ary izay tao amin’ny aloky ny fahafatesana
  - type: text
    content: dia avoakany ho eo amin’ny mazava.
  '23':
  - type: text
    content: Ampitomboiny ny firenena, nefa aringany avy eo;
  - type: text
    content: Avelany hitatra izy, kanjo ataony sesitany indray.
  '24':
  - type: text
    content: Vereziny ny sain’ireo mpifehin’ny tany,
  - type: text
    content: ka ampirenireneny any an-taniefitra tsy misy lalana;
  '25':
  - type: text
    content: any no itsapatsapany anaty haizina mikitroka
  - type: text
    content: sy ampivembenan’Andriamanitra azy tahaka ny mamo.
  '3':
  - type: text
    content: Kanefa mba manan-tsaina toa anareo koa aho
  - type: text
    content: ka tsy manaiky ho ambany noho ianareo.
  - type: text
    content: Fa iza no tsy mahalala izay lazainareo?
  '4':
  - type: text
    content: Tonga fihomehezan’ny sakaizako aho
  - type: text
    content: raha mba miantso an’Andriamanitra hamaly ahy;
  - type: text
    content: eny, ihomehezana ny marina tsy manan-tsiny.
  '5':
  - type: text
    content: «Ny ory tsy mba rangahy,»
  - type: text
    content: hoy ny eson’ireo miadam-pinaritra;
  - type: text
    content: fampihatra amin’ny olona lavo.
  '6':
  - type: text
    content: Miadana ao an-tranony ny jiolahy mpandroba;
  - type: text
    content: tsy manana ahiahy ny mpihaika an’Andriamanitra,
  - type: text
    content: dia izay tsy mahalala andriamanitra afa-tsy ny heriny.
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Mba anontanio ny biby fa hampianatra anao izy,
  - type: text
    content: ary ny voro-manidina fa hananatra anao izy.
  '8':
  - type: text
    content: Mitenena amin’ny tany fa hampahafantatra anao izy,
  - type: text
    content: ary ny trondron-dranomasina fa hampahalala anao koa izy.
  '9':
  - type: text
    content: Iza amin’ireo voaary rehetra ireo no tsy mahalala
  - type: text
    content: fa asan’ny tanan’ny TOMPO avokoa ireny!
