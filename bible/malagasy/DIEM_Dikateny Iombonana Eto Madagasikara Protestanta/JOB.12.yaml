document_id: JOB.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Valintenin’i Jôba: lozabe tsy azo ifonana Andriamanitra'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mitana ny ain’ny voaary rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny fofonain’ny olombelona tsirairay avy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Adidin’ny sofina ny mamantatra ny teny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary adidin’ny lanilany kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mahatsapa tsiron-kanina»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny filàzan’ny oha-pitenenana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izay anti-panahy manam-pahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay ela nihetezana, hono, lava volo.»
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saingy Andriamanitra kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tompon’ny fahendrena sy ny fahefana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azy koa ny tolo-kevitra sy ny fahalalana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy mahatsangana izay ravan’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy mahafaka izay voagadrany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitana ny orana Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga ny hain-tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa raha mandefa ny rano kosa Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tondraka ny tany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao aminy ny hery sy ny fahakingana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy Azy na ny voafitaka na ny mpamitaka.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampirediredeny ireo mpanolotsaim-panjakana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataony very saina ny mpitsara.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foanany ny fanamparam-pahefàn’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tady mahazaka no solom-pehikibony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tady mahazaka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: famantarana ny tsy faha-mihetsiketsika izany (jereo Jôh 21.18) na koa ny olona voababo.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampirediredeny koa ny mpisorona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aongany izay manam-pahefana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina fa ianareo no feon’ny vahoaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia hiara-maty aminareo ny fahendrena.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampangininy ny mpikabary mahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary esoriny ny fahiratan-tsain’ny anti-panahy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fatrarany henatra ireo olona ambony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ketrahiny ny herin’ny matanjaka.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahanjahanjany ny zava-miafina tanatin’ny haizina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay tao amin’ny aloky ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia avoakany ho eo amin’ny mazava.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampitomboiny ny firenena, nefa aringany avy eo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avelany hitatra izy, kanjo ataony sesitany indray.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vereziny ny sain’ireo mpifehin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ampirenireneny any an-taniefitra tsy misy lalana;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any no itsapatsapany anaty haizina mikitroka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ampivembenan’Andriamanitra azy tahaka ny mamo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa mba manan-tsaina toa anareo koa aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy manaiky ho ambany noho ianareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza no tsy mahalala izay lazainareo?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga fihomehezan’ny sakaizako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mba miantso an’Andriamanitra hamaly ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ihomehezana ny marina tsy manan-tsiny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny ory tsy mba rangahy,»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny eson’ireo miadam-pinaritra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fampihatra amin’ny olona lavo.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miadana ao an-tranony ny jiolahy mpandroba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy manana ahiahy ny mpihaika an’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay tsy mahalala andriamanitra afa-tsy ny heriny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba anontanio ny biby fa hampianatra anao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voro-manidina fa hananatra anao izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitenena amin’ny tany fa hampahafantatra anao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny trondron-dranomasina fa hampahalala anao koa izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza amin’ireo voaary rehetra ireo no tsy mahalala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa asan’ny tanan’ny TOMPO avokoa ireny!
