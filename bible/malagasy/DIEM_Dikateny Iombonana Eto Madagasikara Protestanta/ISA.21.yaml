document_id: ISA.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faharavàn’i Babilôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hafatra momba ny taniefitra amoron-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny tadio mamakivaky an’i Negeba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny taniefitra amoron-dranomasina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia toa enti-manondro an’i Babilônia. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Negeba:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' faritra ngazana, efa somary taniefitra, ao atsimon’i Palestinina.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: no fiavin’ny fahavalo avy any an-taniefitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any amin’ny tany anankiray mahatahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Misy fahitana mahatsiravina
- type: usfm
  marker: q1
  children:
  - type: text
    text: naseho tamiko ny amin’izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lasa mpamadika fatra-pamadika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mpandrava fatra-pandrava tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny firenena sakaiza fahiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Miakara hanafika, ry Helamita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy fahirano ny tanàna, ry Medianina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hatsahatro ny fampihorohoroana rehetra nafitsony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Helamita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Medianina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mponina niaina tamin’ny faritr’i Iran ankehitriny. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny fampihorohoroana rehetra nafitsony:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit 13.11; Ezek 7.24.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny Tompo.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izany no nahafeno fanaintainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tehezako manontolo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahatsiaro naharary aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fahararin’ny vehivavy mihetsi-jaza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: taitra mafy aho nony nandre izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raiki-tahotra aho nony nahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Very hevitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nangovitra noho ny tahotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandrasako ny hariva hampangatsiatsiaka ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo nivadika ho fampihorohoroana ahy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Naroso ny sakafo, navelatra ny lambanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nihinana sy nisotro ny olona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Kanjo vetivety teo nisy niantso hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mitsangàna, ry mpitari-tafika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosory menaka ny ampinga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hosory menaka ny ampinga: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 1.21.; hosora-menaka ny ampinga mba hikorisa fotsiny eo ny zana-tsipîka fa tsy hitsatoka hilentika.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao tokoa no nolazain’ny Tompo tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ndeha mametraka mpitily ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aoka io no hanambara izay hitany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha kalesy tarihin-tsoavaly no tazany
- type: usfm
  marker: q1
  children:
  - type: text
    text: na koa boriky na rameva manao andiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tokony ho mailo izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tokony ho mailo tsara.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Teo dia niantso ilay mpitily nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Teo amin’ny toeram-piambenako, tompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nijanonako tontolo andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary teo amin’ny toeram-pitiliako
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nijoroako nandritra ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ka indro erỳ tamy ny lehilahy iray
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitaingin-kalesy tarihin-tsoavaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sady niloa-bava niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Rava, rava i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Torotoro miraraka amin’ny tany avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sarivongan’ny andriamaniny rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Rava i Babilôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Apôk 14.8; 18.2.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ry fireneko, izay voavely
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny vary eo am-pamoloana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no reko tamin’ny TOMPOn’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay Andriamanitr’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ampahafantariko anareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toy inona alina izao?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hafatra momba an’i Domà.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nisy niantso ahy avy ao Sehîra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Domà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana misy rano sy kirihitr’ala na vondron-javamaniry, any Arabia avaratra, eo atsinanan’ny tanin’ny Edômita. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sehîra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: faritra afovoany eo amin’ny tanin’ny Edômita, ka andalovan’ny lalana avy any Jerosalema ho any Domà.
    marker-yv: yv-n
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ry mpiambina ô, toy inona alina moa izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry mpiambina ô, toy inona alina moa izao?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia namaly ny mpiambina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tonga ny maraina nefa mbola alina ihany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mbola te hanontany ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miverena indray.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpandositra avy any Dedàna sy Kedara
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hafatra milohateny hoe «Eo an-tany lavavolo».
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any an-kirihitr’ala, eo an-tany lavavolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no aoka handrianareo amin’ny alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry andian’olona avy any Dedàna!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ianareo mponin’ny faritr’i Temà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Dedàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 13), '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Temà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 14): '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana misy rano sy kirihitr’ala na vondron-javamaniry any Arabia avaratra andrefana. –Ny amin’ireo mponina ao Arabia, dia jereo Jer 49.28-32.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ndeha tsenao ireo mangetaheta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka itondray rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ndeha atreho ireo mpandositra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka omeo hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa nandositra teo anoloan’ny sabatra ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo anoloan’ny sabatra tsy nitsitsitsitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy teo anoloan’ny tsipîka nihenjana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary teo anoloan’ny ady mahery vaika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izao no voalazan’ny Tompo tamiko: «Amin’ny herintaona toy izao anio izao, dia ho levona avokoa ny voninahitr’i Kedara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kedara; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anarana faritra sady foko any Arabia avaratra.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho vitsy kely sisa no tavela amin’ireo mpandefa tsipîka sy ireo miaramila voafantin’i Kedara.» Izany no tenin’ny TOMPO Andriamanitr’i Israely.
