document_id: ISA.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharavàn’i Babilôna
  - type: text
    content: Hafatra momba ny taniefitra amoron-dranomasina.
  - type: text
    content: Tahaka ny tadio mamakivaky an’i Negeba
  - type: note
    content: 'Ny taniefitra amoron-dranomasina dia toa enti-manondro an’i Babilônia. –Negeba: faritra ngazana, efa somary taniefitra, ao atsimon’i Palestinina.'
  - type: text
    content: no fiavin’ny fahavalo avy any an-taniefitra,
  - type: text
    content: avy any amin’ny tany anankiray mahatahotra.
  '10':
  - type: text
    content: Ry fireneko, izay voavely
  - type: text
    content: toy ny vary eo am-pamoloana,
  - type: text
    content: izany no reko tamin’ny TOMPOn’izao rehetra izao,
  - type: text
    content: dia ilay Andriamanitr’i Israely,
  - type: text
    content: ka ampahafantariko anareo.
  - type: heading
    content: Toy inona alina izao?
  '11':
  - type: text
    content: Hafatra momba an’i Domà.
  - type: text
    content: Nisy niantso ahy avy ao Sehîra
  - type: note
    content: 'Domà: toerana misy rano sy kirihitr’ala na vondron-javamaniry, any Arabia avaratra, eo atsinanan’ny tanin’ny Edômita. –Sehîra: faritra afovoany eo amin’ny tanin’ny Edômita, ka andalovan’ny lalana avy any Jerosalema ho any Domà.'
  - type: text
    content: ' hoe:'
  - type: text
    content: «Ry mpiambina ô, toy inona alina moa izao?
  - type: text
    content: Ry mpiambina ô, toy inona alina moa izao?»
  '12':
  - type: text
    content: 'Dia namaly ny mpiambina hoe:'
  - type: text
    content: «Tonga ny maraina nefa mbola alina ihany!
  - type: text
    content: Raha mbola te hanontany ianareo,
  - type: text
    content: dia miverena indray.»
  - type: heading
    content: Ny mpandositra avy any Dedàna sy Kedara
  '13':
  - type: text
    content: Hafatra milohateny hoe «Eo an-tany lavavolo».
  - type: text
    content: Any an-kirihitr’ala, eo an-tany lavavolo,
  - type: text
    content: no aoka handrianareo amin’ny alina,
  - type: text
    content: ry andian’olona avy any Dedàna!
  '14':
  - type: text
    content: Ianareo mponin’ny faritr’i Temà
  - type: note
    content: 'Dedàna (and 13), Temà (and 14): toerana misy rano sy kirihitr’ala na vondron-javamaniry any Arabia avaratra andrefana. –Ny amin’ireo mponina ao Arabia, dia jereo Jer 49.28-32.'
  - type: text
    content: ','
  - type: text
    content: ndeha tsenao ireo mangetaheta
  - type: text
    content: ka itondray rano,
  - type: text
    content: ndeha atreho ireo mpandositra
  - type: text
    content: ka omeo hanina.
  '15':
  - type: text
    content: Fa nandositra teo anoloan’ny sabatra ireny,
  - type: text
    content: teo anoloan’ny sabatra tsy nitsitsitsitsy
  - type: text
    content: sy teo anoloan’ny tsipîka nihenjana
  - type: text
    content: ary teo anoloan’ny ady mahery vaika.
  '16':
  - type: text
    content: 'Fa izao no voalazan’ny Tompo tamiko: «Amin’ny herintaona toy izao anio izao, dia ho levona avokoa ny voninahitr’i Kedara'
  - type: note
    content: Kedara; anarana faritra sady foko any Arabia avaratra.
  - type: text
    content: '. '
  '17':
  - type: text
    content: Ho vitsy kely sisa no tavela amin’ireo mpandefa tsipîka sy ireo miaramila voafantin’i Kedara.» Izany no tenin’ny TOMPO Andriamanitr’i Israely.
  '2':
  - type: text
    content: –Misy fahitana mahatsiravina
  - type: text
    content: naseho tamiko ny amin’izany.
  - type: text
    content: Lasa mpamadika fatra-pamadika
  - type: text
    content: sy mpandrava fatra-pandrava tokoa
  - type: text
    content: ny firenena sakaiza fahiny.
  - type: text
    content: «Miakara hanafika, ry Helamita;
  - type: text
    content: ataovy fahirano ny tanàna, ry Medianina,
  - type: text
    content: fa hatsahatro ny fampihorohoroana rehetra nafitsony
  - type: note
    content: 'Helamita, Medianina: mponina niaina tamin’ny faritr’i Iran ankehitriny. –ny fampihorohoroana rehetra nafitsony: ampit 13.11; Ezek 7.24.'
  - type: text
    content: ','
  - type: text
    content: hoy ny Tompo.»
  '3':
  - type: text
    content: Izany no nahafeno fanaintainana
  - type: text
    content: ny tehezako manontolo.
  - type: text
    content: Nahatsiaro naharary aho
  - type: text
    content: toy ny fahararin’ny vehivavy mihetsi-jaza;
  - type: text
    content: taitra mafy aho nony nandre izany,
  - type: text
    content: raiki-tahotra aho nony nahita.
  '4':
  - type: text
    content: Very hevitra aho
  - type: text
    content: ary nangovitra noho ny tahotra;
  - type: text
    content: nandrasako ny hariva hampangatsiatsiaka ahy,
  - type: text
    content: kanjo nivadika ho fampihorohoroana ahy izany.
  '5':
  - type: text
    content: Naroso ny sakafo, navelatra ny lambanana,
  - type: text
    content: dia nihinana sy nisotro ny olona.
  - type: text
    content: 'Kanjo vetivety teo nisy niantso hoe:'
  - type: text
    content: «Mitsangàna, ry mpitari-tafika,
  - type: text
    content: hosory menaka ny ampinga
  - type: note
    content: 'hosory menaka ny ampinga: jereo 2 Sam 1.21.; hosora-menaka ny ampinga mba hikorisa fotsiny eo ny zana-tsipîka fa tsy hitsatoka hilentika.'
  - type: text
    content: '!»'
  '6':
  - type: text
    content: 'Fa izao tokoa no nolazain’ny Tompo tamiko:'
  - type: text
    content: «Ndeha mametraka mpitily ianao,
  - type: text
    content: ka aoka io no hanambara izay hitany!
  '7':
  - type: text
    content: Raha kalesy tarihin-tsoavaly no tazany
  - type: text
    content: na koa boriky na rameva manao andiany,
  - type: text
    content: dia tokony ho mailo izy,
  - type: text
    content: eny, tokony ho mailo tsara.»
  '8':
  - type: text
    content: 'Teo dia niantso ilay mpitily nanao hoe:'
  - type: text
    content: «Teo amin’ny toeram-piambenako, tompoko,
  - type: text
    content: no nijanonako tontolo andro,
  - type: text
    content: ary teo amin’ny toeram-pitiliako
  - type: text
    content: no nijoroako nandritra ny alina.
  '9':
  - type: text
    content: Ka indro erỳ tamy ny lehilahy iray
  - type: text
    content: mitaingin-kalesy tarihin-tsoavaly
  - type: text
    content: 'sady niloa-bava niteny hoe:'
  - type: text
    content: 'Rava, rava i '
  - type: text
    content: Babilôna
  - type: text
    content: '!'
  - type: text
    content: Torotoro miraraka amin’ny tany avokoa
  - type: text
    content: ny sarivongan’ny andriamaniny rehetra
  - type: note
    content: 'Rava i Babilôna: jereo Apôk 14.8; 18.2.'
  - type: text
    content: '!»'
