document_id: ECC.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nahita zava-dratsy hafa mampahory aho teto ambonin’ny tany, ary mitambesatra amin’ny olombelona izany: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izay rehetra misy dia efa voalaza anarana hatry ny ela ary iaraha-mahalala ny atao hoe olombelona; kanefa tsy azony atao ny mifandahatra amin’izay mahery noho izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa arakaraka ny mahabe ny teny no mahabe ny zava-poana. Koa inona no soa azon’ny olona amin’izany? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mamakivaky ny fiainana toy ny fihelin’ny aloka ny olona. Iza no mahafantatra izay mahasoa ny olona amin’izao fiainana izao mandritra ny fotoana fohy iainany? Tsy misy hahalaza amin’ny olona izay zavatra hitranga eto ambonin’ny tany aorian’ny fahalasanany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia olona omen’Andriamanitra vola aman-karena sy voninahitra ka manana izay rehetra iriny; kanefa tsy avelan’Andriamanitra hihinana amin’ny fananany izy fa olon-kafa no mitavana izany. Zava-poana sy zava-dratsy mampahory koa izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Afaka miteraka zazalahy zato sy miaina an-taona maro ny olona iray. Saingy, na dia miaina an-taona maro aza izy, kanefa tsy mba voky fahasambarana sy tsy mahazo levenana, dia hoy aho hoe: ny zazarano aza sambatra kokoa noho izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa na dia zava-poana aza ny nahatongavan’io zazarano io ka tao anaty haizina no nahalasanany ary tsy hotsarovana intsony izy; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'na tsy hitany na fantany akory aza izay masoandro, dia miadana kokoa noho ilay ela velona teo izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy ilaina akory ny miaina, na dia ho tratra arivo taona indroa aza, raha tsy mahita fahasambarana. Satria fahafatesana no fiafaran’ny fiainana rehetra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Miasa ny olona mba hampitony ny filàny saingy tsy mety afa-po izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa inona no soa azon’ny hendry miohatra amin’ny adala? Inona no soa azon’ny olo-mahantra izay mahay miavo-tena eo amin’ny fiainana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mahay miavo-tena eo amin’ny fiainana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mahay mitondra tena eo imason’ny mpiara-belona.
      marker-yv: yv-n
    - type: text
      text: '? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aleo mifaly amin’izay ananana hitan’ny maso toy izay manaiky harebirebin’ny faniriana, satria zava-poana sy manenji-drivotra koa izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra mba ho hendry
    marker-yv: yv-h
