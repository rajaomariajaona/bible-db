document_id: ECC.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Nahita zava-dratsy hafa mampahory aho teto ambonin’ny tany, ary mitambesatra amin’ny olombelona izany: '
  '10':
  - type: text
    content: 'Izay rehetra misy dia efa voalaza anarana hatry ny ela ary iaraha-mahalala ny atao hoe olombelona; kanefa tsy azony atao ny mifandahatra amin’izay mahery noho izy. '
  '11':
  - type: text
    content: 'Fa arakaraka ny mahabe ny teny no mahabe ny zava-poana. Koa inona no soa azon’ny olona amin’izany? '
  '12':
  - type: text
    content: Mamakivaky ny fiainana toy ny fihelin’ny aloka ny olona. Iza no mahafantatra izay mahasoa ny olona amin’izao fiainana izao mandritra ny fotoana fohy iainany? Tsy misy hahalaza amin’ny olona izay zavatra hitranga eto ambonin’ny tany aorian’ny fahalasanany.
  '2':
  - type: text
    content: 'dia olona omen’Andriamanitra vola aman-karena sy voninahitra ka manana izay rehetra iriny; kanefa tsy avelan’Andriamanitra hihinana amin’ny fananany izy fa olon-kafa no mitavana izany. Zava-poana sy zava-dratsy mampahory koa izany. '
  '3':
  - type: text
    content: 'Afaka miteraka zazalahy zato sy miaina an-taona maro ny olona iray. Saingy, na dia miaina an-taona maro aza izy, kanefa tsy mba voky fahasambarana sy tsy mahazo levenana, dia hoy aho hoe: ny zazarano aza sambatra kokoa noho izy. '
  '4':
  - type: text
    content: 'Fa na dia zava-poana aza ny nahatongavan’io zazarano io ka tao anaty haizina no nahalasanany ary tsy hotsarovana intsony izy; '
  '5':
  - type: text
    content: 'na tsy hitany na fantany akory aza izay masoandro, dia miadana kokoa noho ilay ela velona teo izy. '
  '6':
  - type: text
    content: Tsy ilaina akory ny miaina, na dia ho tratra arivo taona indroa aza, raha tsy mahita fahasambarana. Satria fahafatesana no fiafaran’ny fiainana rehetra.
  '7':
  - type: text
    content: 'Miasa ny olona mba hampitony ny filàny saingy tsy mety afa-po izy. '
  '8':
  - type: text
    content: Fa inona no soa azon’ny hendry miohatra amin’ny adala? Inona no soa azon’ny olo-mahantra izay mahay miavo-tena eo amin’ny fiainana
  - type: note
    content: 'mahay miavo-tena eo amin’ny fiainana: dkt hafa mahay mitondra tena eo imason’ny mpiara-belona.'
  - type: text
    content: '? '
  '9':
  - type: text
    content: Aleo mifaly amin’izay ananana hitan’ny maso toy izay manaiky harebirebin’ny faniriana, satria zava-poana sy manenji-drivotra koa izany.
  - type: heading
    content: Anatra mba ho hendry
