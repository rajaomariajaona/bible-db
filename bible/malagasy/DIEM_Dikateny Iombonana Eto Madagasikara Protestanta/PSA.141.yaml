    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha ny olo-marina hikapoka ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mari-pitiavana izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha hananatra ahy koa izy,
  - type: usfm
    marker: q1
