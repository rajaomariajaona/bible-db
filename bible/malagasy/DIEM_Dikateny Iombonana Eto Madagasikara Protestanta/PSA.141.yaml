document_id: PSA.141,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Tompo ô, ambeno aho tsy ho diso amin’ny teniko
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: 'TOMPO ô, miantso Anao aho: faingàna ho eto amiko.'
  - type: text
    content: Mba henoy ny feoko amin’ny fiantsoako Anao.
  '10':
  - type: text
    content: Enga anie ireo olon-dratsy ireo
  - type: text
    content: no hiara-datsaka anaty haratony,
  - type: text
    content: fa izaho kosa ho afaka amin’izany!
  '2':
  - type: text
    content: Ny fivavahako anie hisandratra eo anoloanao
  - type: text
    content: 'toy ny eton’ny '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: '!'
  - type: text
    content: Ny fanandratako tanana anie
  - type: text
    content: ho toy ny fanatitra hariva
  - type: note
    content: 'Ny vavaka oharina amin’ny emboka manitra: Apôk 5.8. –ny fanandratan-tanana: jereo Sal 28.2. sy nta.'
  - type: text
    content: '!'
  '3':
  - type: text
    content: TOMPO ô, asio mpiambina ny vavako;
  - type: text
    content: arovy ny varavaran’ny molotro.
  '4':
  - type: text
    content: Aza avela hirona amin’ny zava-dratsy ny foko.
  - type: text
    content: Aoka aho tsy hiaraka amin’ny mpanao heloka
  - type: text
    content: na hivarilavo amin’ny fanao tsy mety
  - type: text
    content: na hihinana ny hanim-pin’ireo koa!
  '5':
  - type: text
    content: Raha ny olo-marina hikapoka ahy,
  - type: text
    content: dia mari-pitiavana izany;
  - type: text
    content: raha hananatra ahy koa izy,
  - type: text
    content: dia ilomanitra soa indrindra izany
  - type: note
    content: Ny ilomanitra dia fandraisam-bahiny ka mariky ny fifankatiavana sy fisakaizana. Jereo Sal 23.5 sy nta.
  - type: text
    content: ka enga anie tsy holavin’ny lohako!
  - type: text
    content: Fa ny fivavahako anie hitohy hatrany
  - type: text
    content: hanoherana ny haratsian’ny mpanao heloka!
  '6':
  - type: text
    content: Rehefa havarina amin’ny hantsam-bato ireo filohany,
  - type: text
    content: vao hiaiky ny maha marina ny teniko ny olon-dratsy.
  '7':
  - type: text
    content: Toy ny hazo tapatapahina
  - type: text
    content: sy vakivakîna eny an-tsaha
  - type: text
    content: no nanelezana ny taolam-balony,
  - type: text
    content: rehefa hitelina azy ny toeran’ny maty.
  '8':
  - type: text
    content: Ianao kosa no andrandrain’ny masoko,
  - type: text
    content: ry TOMPO Andriamanitro ô;
  - type: text
    content: Ianao no ialofako,
  - type: text
    content: ka aza avela ho faty aho.
  '9':
  - type: text
    content: Ambeno aho tsy ho voan’ny fandrika mivelatra
  - type: text
    content: sy ny tadivavaran’ny mpanao heloka.
