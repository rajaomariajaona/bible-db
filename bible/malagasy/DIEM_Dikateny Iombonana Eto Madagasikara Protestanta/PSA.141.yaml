    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aza avela hirona amin’ny zava-dratsy ny foko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka aho tsy hiaraka amin’ny mpanao heloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hivarilavo amin’ny fanao tsy mety
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hihinana ny hanim-pin’ireo koa!
  '5':
