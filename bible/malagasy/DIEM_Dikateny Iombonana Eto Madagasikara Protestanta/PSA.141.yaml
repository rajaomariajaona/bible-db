      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka enga anie tsy holavin’ny lohako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fivavahako anie hitohy hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanoherana ny haratsian’ny mpanao heloka!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Rehefa havarina amin’ny hantsam-bato ireo filohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vao hiaiky ny maha marina ny teniko ny olon-dratsy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Toy ny hazo tapatapahina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy vakivakîna eny an-tsaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanelezana ny taolam-balony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa hitelina azy ny toeran’ny maty.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ianao kosa no andrandrain’ny masoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry TOMPO Andriamanitro ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no ialofako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza avela ho faty aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ambeno aho tsy ho voan’ny fandrika mivelatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny tadivavaran’ny mpanao heloka.
