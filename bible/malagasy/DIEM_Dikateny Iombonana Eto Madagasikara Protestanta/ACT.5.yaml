document_id: ACT.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Hananià sy i Safira
  - type: text
    content: 'Nisy kosa lehilahy atao hoe Hananià nivarotra tany rehefa nifanaraka tamin’i Safira vadiny. '
  '10':
  - type: text
    content: 'Niaraka tamin’izay i Safira dia nidaboka ho azy teo anoloan’ny tongotr’i Petera ka niala aina. Vao tafiditra ny tovolahy, dia hitany fa maty ravehivavy, ka nentiny nalevina teo anilan’i Hananià vadiny. '
  '11':
  - type: text
    content: Raiki-tahotra mafy ny Fiangonana manontolo mbamin’izay rehetra nandre izany.
  - type: heading
    content: Famantarana sy asa mahagaga maro
  '12':
  - type: text
    content: ' '
  - type: text
    content: Famantarana
  - type: text
    content: ' sy zava-mahagaga maro no vitan’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' teo amin’ny vahoaka. Niray fo ny mpino rehetra nivory teo amin’ny '
  - type: text
    content: lala-mitafon’i Salômôna
  - type: note
    content: Jereo 3.11 sy nta.
  - type: text
    content: ', '
  '13':
  - type: text
    content: 'ary tsy nisy olon-kafa sahy nikambana taminy, kanefa nataon’ny vahoaka tsara laza izy ireo. '
  '14':
  - type: text
    content: 'Ary vao mainka marobe ny lehilahy amam-behivavy mpino ny Tompo ka nanatevin-daharana an-dry zareo. '
  '15':
  - type: text
    content: 'Nentin’ny olona teny amin’ny arabe aza ny marary ka napetrany teo ambony fandriana na tsihy mba hisy hiantefan’ny tandindon’i Petera ahay, raha sendra nandalo izy. '
  '16':
  - type: text
    content: 'Nisy vahoaka marobe koa, avy amin’ny tanàna manodidina an’i Jerosalema, nirohotra nitondra ny marary sy izay ampahorîn’ny '
  - type: text
    content: fanahy maloto
  - type: text
    content: ', ary dia sitrana avokoa ireo.'
  - type: heading
    content: Enjehina ny apôstôly
  '17':
  - type: text
    content: 'Tonga kosa tamin’izay ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' sy ny mpiandany aminy tsy an-kanavaka, izany hoe ny antoko '
  - type: text
    content: Tsadoseanina
  - type: text
    content: '; nisafoaka fatratra ry zareo '
  '18':
  - type: text
    content: 'ka nisambotra ny apôstôly sy nanao azy am-ponja. '
  '19':
  - type: text
    content: 'Nefa nony alina, dia nisy '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny Tompo namoha ny varavaran’ny fonja ary namoaka ny apôstôly sady nanao taminy hoe:'
  '2':
  - type: text
    content: 'Niray tsikombakomba tamin’ny vadiny ralehilahy ary nitazona ampahany ho azy roa tamin’ny vola vidin’ny tany; fa ny sisa no nentiny hatolotra teo anatrehan’ireo '
  - type: text
    content: apôstôly
  - type: text
    content: '. '
  '20':
  - type: text
    content: –Mandehana mankao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' ary lazalazao amin’ny vahoaka ny teny rehetra momba izao fiainam-baovao izao.'
  '21':
  - type: text
    content: Nanoa izany teny izany ny apôstôly, ka nankany an-kianjan’ny tempoly vao maraina be ary nampianatra.
  - type: text
    content: 'Tamy kosa ny mpisorombe sy ny mpiandany aminy ka namory ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ', izany hoe ny '
  - type: text
    content: loholona
  - type: text
    content: ' rehetra teo amin’ny vahoaka '
  - type: text
    content: israelita
  - type: text
    content: ', ary naniraka mpandraharaha tany am-ponja haka ny apôstôly. '
  '22':
  - type: text
    content: 'Tsy nahita azy ireo tao am-ponja anefa ny mpandraharaha nony tonga tao, ka niverina tany amin’ny Fitsarana ambony nanao izao tatitra '
  '23':
  - type: text
    content: 'izao:'
  - type: text
    content: –Hitanay fa ny fonja dia nihidy tsara, ary ny mpiambina nitsangana teo am-baravarana. Nefa nony voavohanay ny varavarana, dia tsy nahita olona tao izahay.
  '24':
  - type: text
    content: 'Raha nandre izany teny izany ity lehiben’ny mpiambina ny '
  - type: text
    content: tempoly
  - type: text
    content: ' sy ny lohandoha-mpisorona, dia very hevitra ny amin’ireo apôstôly sy ny hiafaran’izao toe-javatra izao. '
  '25':
  - type: text
    content: 'Tamin’izay kosa dia nisy olona anankiray tonga ka nilaza taminy hoe:'
  - type: text
    content: –Ireny lehilahy nataonareo am-ponja ireny, dia indreo ao an-kianjan’ny tempoly ao sady mampianatra ny vahoaka.
  '26':
  - type: text
    content: 'Dia lasa ny lehiben’ny mpiambina ny tempoly mbamin’ireo mpandraharaha naka ny apôstôly, kanefa tsy nanao an-keriny satria natahotra sao torahan’ny vahoaka vato. '
  '27':
  - type: text
    content: 'Nentina ireo apôstôly, naroso teo anatrehan’ny Fitsarana ambony, ary nadinin’ny mpisorombe '
  '28':
  - type: text
    content: 'nataony hoe:'
  - type: text
    content: –Noraranay mafy dia mafy ianareo tsy hampianatra amin’ny anaran’iny Lehilahy iny; kanjo vao mainka nofenoinareo ny fampianaranareo i Jerosalema iray vohitra, ka satrinareo ho tompon’andraikitra amin’ny nahafatesan’iny Lehilahy iny izahay
  - type: note
    content: Ampit Mt 27.25.
  - type: text
    content: .
  '29':
  - type: text
    content: 'Fa novalian’i Petera sy ny apôstôly hoe:'
  - type: text
    content: '–Andriamanitra no tsy maintsy ekena fa tsy ny olombelona. '
  '3':
  - type: text
    content: 'Dia hoy i Petera taminy:'
  - type: text
    content: '–Ry Hananià, nahoana no dia nameno ny fonao i '
  - type: text
    content: Satàna
  - type: note
    content: Ampit Jôh 13.2.
  - type: text
    content: ' ka nampandainga anao tamin’ny Fanahy Masina ary nampitazona ampahany ho anao tamin’ny vola vidin’ny tany? '
  '30':
  - type: text
    content: 'Efa natsangan’ilay Andriamanitry ny razantsika ho velona i Jesoa, Izay nahantonareo teo amin’ny hazofijaliana no namonoanareo azy. '
  '31':
  - type: text
    content: Efa nasandratr’Andriamanitra eo ankavanany
  - type: note
    content: 'Nasandratr’Andriamanitra eo ankavanany: dkt hafa nasandratry ny tanan-kavanan’Andriamanitra (ampit 2.33).'
  - type: text
    content: ' Izy ka tonga Mpitari-dalana sy Mpamonjy mba hahazoan’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' miala amin’ny toe-dratsy sady mandray famelan-keloka. '
  '32':
  - type: text
    content: Vavolombelona manambara izany ny tenanay mbamin’ny Fanahy Masina nomen’Andriamanitra ny olona manaiky Azy.
  '33':
  - type: text
    content: 'Nisafoaka ny tao amin’ny Fitsarana ambony raha nandre izany teny izany ka nikasa hamono ny apôstôly. '
  '34':
  - type: text
    content: 'Kanefa nisy '
  - type: text
    content: Farisianina
  - type: text
    content: ' atao hoe Gamaliela'
  - type: note
    content: I Gamaliela dia isan’izay nalaza indrindra tamin’ny mpampianatra jiosy ary tao amin’ny Fitsarana ambony. Mpianany rahateo i Paoly (Asa 22.3).
  - type: text
    content: ', anisan-dry zareo sady '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' heni-kaja tamin’ny vahoaka rehetra; nitsangana teo afovoan’ny Fitsarana ambony i Gamaliela, dia nasainy navoaka vetivety ireo apôstôly, '
  '35':
  - type: text
    content: 'ary hoy izy tamin’ny mpivory:'
  - type: text
    content: '–Ry lehilahy israelita, tandremo tsara izay hataonareo amin’ireo olona ireo. '
  '36':
  - type: text
    content: 'Vao tsy ela akory no nijoroan’i Teodasy, izay nanao ny tenany ho zavatra; nisy sahabo ho efajato lahy ireo niandany taminy. Novonoina izy, ary nihahaka izay rehetra nanaraka azy, ka tonga tsinontsinona. '
  '37':
  - type: text
    content: 'Taorian’i Teodasy, dia nijoro indray i Jodasy avy any Galilea, tamin’ny andron’ny fanisàm-bahoaka ary nahataona olona maro nanaraka azy. Novonoina koa izy, ary nihahaka izay rehetra nanaraka azy. '
  '38':
  - type: text
    content: 'Koa izao no teniko aminareo ankehitriny: aza raharahaina ireo olona ireo, fa avelao izy handeha, satria handamoka io fikasana io na io asa io raha avy amin’olombelona fotsiny. '
  '39':
  - type: text
    content: Fa raha avy amin’Andriamanitra kosa, dia tsy ho azonareo foanana, sao dia ianareo indray no tonga mpiady amin’Andriamanitra.
  - type: text
    content: 'Dia nanaiky an’i Gamaliela ny Fitsarana ambony. '
  '4':
  - type: text
    content: Anao ange ny tany fony mbola tsy namidy, sady rehefa namidy dia eo am-pelatananao ny vola vidiny! Ka ahoana no dia nampisy tao am-ponao izao zavatra vitanao izao? Tsy olombelona no nandainganao, fa Andriamanitra.
  '40':
  - type: text
    content: 'Nantsoin-dry zareo indray ny apôstôly, nasainy nodarofana kapoka ary norarany tsy hiteny amin’ny anaran’i Jesoa intsony, vao nalefany. '
  '41':
  - type: text
    content: 'Koa tamin-kafaliana no nialan’ny apôstôly teo amin’ny Fitsarana ambony, satria nataon’Andriamanitra mendrika halaim-baràka ho voninahitr’i Jesoa. '
  '42':
  - type: text
    content: 'Ary tsy nitsahatra izy ireo nampianatra isan’andro na teo an-kianjan’ny tempoly na tany an-tranon’olona, ka nitory ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i Jesoa ilay Mesia.'
  '5':
  - type: text
    content: 'Nony nandre izany teny izany i Hananià, dia nidaboka ho azy ka niala aina. Ary raiki-tahotra mafy izay rehetra nandre izany. '
  '6':
  - type: text
    content: Tonga ny tovolahy, dia nofonosiny ny faty ary nentiny nalevina.
  '7':
  - type: text
    content: 'Sahabo ho adiny telo taorian’izany, dia tamy koa ny vavy, saingy tsy fantany izay vao nitranga teo. '
  '8':
  - type: text
    content: 'Ka hoy i Petera taminy:'
  - type: text
    content: '–Lazao ahy kely hoe: izany ihany ve no nivarotanareo ny taninareo?'
  - type: text
    content: 'Dia novalian’i Safira hoe:'
  - type: text
    content: –Eny, izany ihany no nivarotanay azy!
  '9':
  - type: text
    content: 'Ary hoy i Petera taminy:'
  - type: text
    content: –Nahoana no dia niray tetika nizaha toetra ny Fanahin’ny Tompo ianareo? Mby eo an-tokonam-baravarana izao ireo zatovo avy nandevina ny vadinao, ka hoentiny halevina koa ianao.
