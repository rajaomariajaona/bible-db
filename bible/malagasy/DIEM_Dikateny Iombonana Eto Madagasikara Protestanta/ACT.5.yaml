document_id: ACT.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Hananià sy i Safira
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nisy kosa lehilahy atao hoe Hananià nivarotra tany rehefa nifanaraka tamin’i Safira vadiny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Niaraka tamin’izay i Safira dia nidaboka ho azy teo anoloan’ny tongotr’i Petera ka niala aina. Vao tafiditra ny tovolahy, dia hitany fa maty ravehivavy, ka nentiny nalevina teo anilan’i Hananià vadiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Raiki-tahotra mafy ny Fiangonana manontolo mbamin’izay rehetra nandre izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famantarana sy asa mahagaga maro
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Famantarana
    - type: text
      text: ' sy zava-mahagaga maro no vitan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' teo amin’ny vahoaka. Niray fo ny mpino rehetra nivory teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lala-mitafon’i Salômôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary tsy nisy olon-kafa sahy nikambana taminy, kanefa nataon’ny vahoaka tsara laza izy ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary vao mainka marobe ny lehilahy amam-behivavy mpino ny Tompo ka nanatevin-daharana an-dry zareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nentin’ny olona teny amin’ny arabe aza ny marary ka napetrany teo ambony fandriana na tsihy mba hisy hiantefan’ny tandindon’i Petera ahay, raha sendra nandalo izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nisy vahoaka marobe koa, avy amin’ny tanàna manodidina an’i Jerosalema, nirohotra nitondra ny marary sy izay ampahorîn’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanahy maloto
    - type: text
      text: ', ary dia sitrana avokoa ireo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Enjehina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tonga kosa tamin’izay ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorombe
    - type: text
      text: ' sy ny mpiandany aminy tsy an-kanavaka, izany hoe ny antoko '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsadoseanina
    - type: text
      text: '; nisafoaka fatratra ry zareo '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ka nisambotra ny apôstôly sy nanao azy am-ponja. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nefa nony alina, dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeli
    - type: text
      text: 'n’ny Tompo namoha ny varavaran’ny fonja ary namoaka ny apôstôly sady nanao taminy hoe:'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Niray tsikombakomba tamin’ny vadiny ralehilahy ary nitazona ampahany ho azy roa tamin’ny vola vidin’ny tany; fa ny sisa no nentiny hatolotra teo anatrehan’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: –Mandehana mankao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' ary lazalazao amin’ny vahoaka ny teny rehetra momba izao fiainam-baovao izao.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nanoa izany teny izany ny apôstôly, ka nankany an-kianjan’ny tempoly vao maraina be ary nampianatra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamy kosa ny mpisorombe sy ny mpiandany aminy ka namory ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fitsarana ambony
    - type: text
      text: ', izany hoe ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' rehetra teo amin’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: israelita
    - type: text
      text: ', ary naniraka mpandraharaha tany am-ponja haka ny apôstôly. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tsy nahita azy ireo tao am-ponja anefa ny mpandraharaha nony tonga tao, ka niverina tany amin’ny Fitsarana ambony nanao izao tatitra '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'izao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hitanay fa ny fonja dia nihidy tsara, ary ny mpiambina nitsangana teo am-baravarana. Nefa nony voavohanay ny varavarana, dia tsy nahita olona tao izahay.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Raha nandre izany teny izany ity lehiben’ny mpiambina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' sy ny lohandoha-mpisorona, dia very hevitra ny amin’ireo apôstôly sy ny hiafaran’izao toe-javatra izao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tamin’izay kosa dia nisy olona anankiray tonga ka nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ireny lehilahy nataonareo am-ponja ireny, dia indreo ao an-kianjan’ny tempoly ao sady mampianatra ny vahoaka.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia lasa ny lehiben’ny mpiambina ny tempoly mbamin’ireo mpandraharaha naka ny apôstôly, kanefa tsy nanao an-keriny satria natahotra sao torahan’ny vahoaka vato. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nentina ireo apôstôly, naroso teo anatrehan’ny Fitsarana ambony, ary nadinin’ny mpisorombe '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Noraranay mafy dia mafy ianareo tsy hampianatra amin’ny anaran’iny Lehilahy iny; kanjo vao mainka nofenoinareo ny fampianaranareo i Jerosalema iray vohitra, ka satrinareo ho tompon’andraikitra amin’ny nahafatesan’iny Lehilahy iny izahay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 27.25.
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa novalian’i Petera sy ny apôstôly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Andriamanitra no tsy maintsy ekena fa tsy ny olombelona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Hananià, nahoana no dia nameno ny fonao i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 13.2.
      marker-yv: yv-n
    - type: text
      text: ' ka nampandainga anao tamin’ny Fanahy Masina ary nampitazona ampahany ho anao tamin’ny vola vidin’ny tany? '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Efa natsangan’ilay Andriamanitry ny razantsika ho velona i Jesoa, Izay nahantonareo teo amin’ny hazofijaliana no namonoanareo azy. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Efa nasandratr’Andriamanitra eo ankavanany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nasandratr’Andriamanitra eo ankavanany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nasandratry ny tanan-kavanan’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (ampit 2.33).'
      marker-yv: yv-n
    - type: text
      text: ' Izy ka tonga Mpitari-dalana sy Mpamonjy mba hahazoan’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' miala amin’ny toe-dratsy sady mandray famelan-keloka. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Vavolombelona manambara izany ny tenanay mbamin’ny Fanahy Masina nomen’Andriamanitra ny olona manaiky Azy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Nisafoaka ny tao amin’ny Fitsarana ambony raha nandre izany teny izany ka nikasa hamono ny apôstôly. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Kanefa nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' atao hoe Gamaliela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Gamaliela '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia isan’izay nalaza indrindra tamin’ny mpampianatra jiosy ary tao amin’ny Fitsarana ambony. Mpianany rahateo i Paoly (Asa 22.3).
      marker-yv: yv-n
    - type: text
      text: ', anisan-dry zareo sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' heni-kaja tamin’ny vahoaka rehetra; nitsangana teo afovoan’ny Fitsarana ambony i Gamaliela, dia nasainy navoaka vetivety ireo apôstôly, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'ary hoy izy tamin’ny mpivory:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry lehilahy israelita, tandremo tsara izay hataonareo amin’ireo olona ireo. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Vao tsy ela akory no nijoroan’i Teodasy, izay nanao ny tenany ho zavatra; nisy sahabo ho efajato lahy ireo niandany taminy. Novonoina izy, ary nihahaka izay rehetra nanaraka azy, ka tonga tsinontsinona. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Taorian’i Teodasy, dia nijoro indray i Jodasy avy any Galilea, tamin’ny andron’ny fanisàm-bahoaka ary nahataona olona maro nanaraka azy. Novonoina koa izy, ary nihahaka izay rehetra nanaraka azy. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Koa izao no teniko aminareo ankehitriny: aza raharahaina ireo olona ireo, fa avelao izy handeha, satria handamoka io fikasana io na io asa io raha avy amin’olombelona fotsiny. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Fa raha avy amin’Andriamanitra kosa, dia tsy ho azonareo foanana, sao dia ianareo indray no tonga mpiady amin’Andriamanitra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanaiky an’i Gamaliela ny Fitsarana ambony. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Anao ange ny tany fony mbola tsy namidy, sady rehefa namidy dia eo am-pelatananao ny vola vidiny! Ka ahoana no dia nampisy tao am-ponao izao zavatra vitanao izao? Tsy olombelona no nandainganao, fa Andriamanitra.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Nantsoin-dry zareo indray ny apôstôly, nasainy nodarofana kapoka ary norarany tsy hiteny amin’ny anaran’i Jesoa intsony, vao nalefany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Koa tamin-kafaliana no nialan’ny apôstôly teo amin’ny Fitsarana ambony, satria nataon’Andriamanitra mendrika halaim-baràka ho voninahitr’i Jesoa. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ary tsy nitsahatra izy ireo nampianatra isan’andro na teo an-kianjan’ny tempoly na tany an-tranon’olona, ka nitory ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' momba an’i Jesoa ilay Mesia.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nony nandre izany teny izany i Hananià, dia nidaboka ho azy ka niala aina. Ary raiki-tahotra mafy izay rehetra nandre izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tonga ny tovolahy, dia nofonosiny ny faty ary nentiny nalevina.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Sahabo ho adiny telo taorian’izany, dia tamy koa ny vavy, saingy tsy fantany izay vao nitranga teo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ka hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lazao ahy kely hoe: izany ihany ve no nivarotanareo ny taninareo?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Safira hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, izany ihany no nivarotanay azy!
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no dia niray tetika nizaha toetra ny Fanahin’ny Tompo ianareo? Mby eo an-tokonam-baravarana izao ireo zatovo avy nandevina ny vadinao, ka hoentiny halevina koa ianao.
