type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ny taratasy avy amin’i Joda dia tsy ho ana Fiangonana anankiray fa ho an’ny kristianina ankapobeny. Ny hafatra ampitainy dia mitovitovy amin’izay hita ao amin’ny taratasy faharoa avy amin’i Petera (jereo 2 Pt 2): samy toherin’ny taratasy roa tonta ireo olona sady mampiely fampianaran-diso mamoafady no mampiseho fitondrantena ratsy.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vao vita ny sasin-teny (1-2) dia toherin’ny mpanoratra mafy ireo mpampiely fampianaran-diso, indrindra ireo tafasisika ao anatin’ny Fiangonana, ary ambarany rahateo ny fanamelohana hampiharin’Andriamanitra amin’izy rehetra (3-16). Manainga ireo mpino kosa ny mpanoratra mba hiorina mafy amin’ny finoana (17-23); ka ny teny entiny mamarana ny taratasiny dia fiderana «an’ilay Andriamanitra tokana, Mpamonjy antsika amin’ny alalan’i Jesoa Kristy» (24-25).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Potsipotsirin’ity taratasy ity ny mahazava-doza ilay hery ratsy mpandainga sy mpamitaka; kanefa vao mainka marihiny fa isika kristianina dia ampian’Andriamanitra sy omeny fanantenana azo antoka ao amin’i Jesoa Kristy sy amin’ny alalan’ny Fanahy Masina (20-21).
