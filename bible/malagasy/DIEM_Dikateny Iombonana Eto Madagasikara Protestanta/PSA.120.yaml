document_id: PSA.120,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Vavak’olona nampangaina lainga
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hira fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony aho tao an-katerena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nantsoiko ny TOMPO ka namaly.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «TOMPO ô, mba afaho re aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny mpilaza lainga sy fitaka!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona sy inona moa, ry mpilaza fitaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no sazy hampiharin’Andriamanitra aminareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '120.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hita eto ny voambolana mahazatra fampiasa amin’ny fianianana: jereo 1 Sam 3.17; 1 Mp 2.23; 2 Mp s6.31; Rota 1.17.'
      marker-yv: yv-n
    - type: text
      text: '?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo zana-tsipîka maranitra fitondra miady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voarehitra tamin’ny vainafon’anjavidy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '120.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Misy mihevitra ireto teny an’ohatra ireto mbola ho mpamaritra ny hoe; '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpilaza fitaka.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Jereo Jer 9.7; Sal 57.5; Ohab 12.18; 16.27; Jak 3.6.'
      marker-yv: yv-n
    - type: text
      text: '!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dirandoza aho fa vahinin’olon-dia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niantrano tany amin’ny baribarianina!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ela loatra no niarahako niaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’olona tsy tia fiadanana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao itenenako fiadanana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mila ady amiko foana.
