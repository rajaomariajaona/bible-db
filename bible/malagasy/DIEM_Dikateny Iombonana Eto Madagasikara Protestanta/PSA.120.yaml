document_id: PSA.120,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavak’olona nampangaina lainga
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: Fony aho tao an-katerena,
  - type: text
    content: dia nantsoiko ny TOMPO ka namaly.
  '2':
  - type: text
    content: «TOMPO ô, mba afaho re aho
  - type: text
    content: amin’ny mpilaza lainga sy fitaka!»
  '3':
  - type: text
    content: Inona sy inona moa, ry mpilaza fitaka,
  - type: text
    content: no sazy hampiharin’Andriamanitra aminareo
  - type: note
    content: 'Hita eto ny voambolana mahazatra fampiasa amin’ny fianianana: jereo 1 Sam 3.17; 1 Mp 2.23; 2 Mp s6.31; Rota 1.17.'
  - type: text
    content: '?'
  '4':
  - type: text
    content: Ireo zana-tsipîka maranitra fitondra miady,
  - type: text
    content: sady voarehitra tamin’ny vainafon’anjavidy
  - type: note
    content: Misy mihevitra ireto teny an’ohatra ireto mbola ho mpamaritra ny hoe; mpilaza fitaka. Jereo Jer 9.7; Sal 57.5; Ohab 12.18; 16.27; Jak 3.6.
  - type: text
    content: '!'
  '5':
  - type: text
    content: Dirandoza aho fa vahinin’olon-dia,
  - type: text
    content: niantrano tany amin’ny baribarianina!
  '6':
  - type: text
    content: Ela loatra no niarahako niaina
  - type: text
    content: tamin’olona tsy tia fiadanana.
  '7':
  - type: text
    content: Vao itenenako fiadanana izy,
  - type: text
    content: dia mila ady amiko foana.
