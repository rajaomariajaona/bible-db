  - type: text
    text: (Jereo Mt 12.1-8; Mk 2.23-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Indray sabata: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Indray sabata faharoan’ny volana voalohany,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany hoe sabata tena akaikin’ny fotoam-pijinjana (jereo Lev 23.5-14). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dia nihinana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Deot 23.26.'
    marker-yv: yv-n
  - type: text
    text: ', ry i Jesoa dia nandeha namaky tanimbary. Nioty salohim-bary ireto '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ary nikosoka tamin’ny tanany, dia nihinana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy kosa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' sasany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ianareo no manao zavatra tsy fanao amin’ny andro sabata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 34.21.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy novakînareo tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' ve izay nataon’i Davida, raha noana izy mbamin’ireo olona niaraka taminy? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Niditra tao an-tranon’Andriamanitra izy ka ny mofo apetraka eo anatrehan’Andriamanitra no nakany hohanina, ary dia nomeny koa ireo olona niaraka taminy; kanefa izany mofo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ka ny mofo... nakany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 21.2-7. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kanefa izany... ihany:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Lev 24.5-9.'
    marker-yv: yv-n
  - type: text
    text: ' izany, tsy azon’iza na iza hanina afa-tsy ny mpisorona irery ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy koa i Jesoa tamin’ny Farisianina:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ananan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' fahefana ny sabata!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitranin’i Jesoa ilay lehilahy maty tanana anila
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 12.9-14; Mk 3.1-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' hafa koa, dia niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' i Jesoa ka nampianatra. Nisy lehilahy maty tanana ankavanana tao; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary nizaha taratra an’i Jesoa ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' raha hanasitrana amin’ny andro sabata Izy mba hahitany antony hiampangana Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fantatr’i Jesoa anefa ny eritreriny, ka hoy Izy tamin-dralehilahy maty tanana:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitsangàna ka ndeha mijoro etsy afovoan’ny olona.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nitsangana ilay marary ka nijoro. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary niteny tamin’ny mpahay lalàna sy ny Farisianina i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Manontany anareo Aho: inona moa no azo atao amin’ny andro sabata, ny manao soa sa ny manao ratsy? ny mamonjy ain’olona sa ny manala ain’olona?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nanopy maso manodidina nijery azy rehetra i Jesoa ka niteny tamin-dralehilahy hoe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ka niteny... hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ka sady tezitra no niteny tamin-dralehilahy hoe.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Atsory ny tananao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia natsotran’ilay marary ny tanany ka sitrana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa romotry ny hatezerana kosa ireo mpahay lalàna sy Farisianina ka niara-nioko ny amin’izay hanaovany an’i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fidîn’i Jesoa ny apôstôly 12 lahy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 10.1-4; Mk 3.13-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tamin’izany andro izany dia lasa nankany an-tendrombohitra i Jesoa mba hivavaka, ary naharitra nivavaka tamin’Andriamanitra nandritra ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony maraina, nantsoiny ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' ka nifidianany 12 lahy izay nomeny anarana hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia i Simôna, izay nomeny anarana koa hoe Petera, sy i Andrea rahalahiny; i Jakôba sy i Jôhany, i Filipo, i Bartôlômeo, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: i Matio, i Tômà, i Jakôba zanak’i Halfeo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zanak’i Halfeo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rahalahin’i Halfeo.
    marker-yv: yv-n
  - type: text
    text: ', i Simôna atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zelôta
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: i Jodasy zanak’i Jakôba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zanak’i Jakôba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rahalahin’i Jakôba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ary i Jodasy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Iskariôta
  - type: text
    text: ' ilay tonga mpamadika.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampianatra ny vahoaka sy manasitrana ny marary i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 4.23-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niara-nidina tamin’ny 12 lahy i Jesoa ho eny an-tany lemaka. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpianany
  - type: text
    text: ' maro sy vahoaka betsaka avy any Jodea'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tahaka ny ao amin’ny Lk 1.5, ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jodea
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia toa manondro an’i Palestinina manontolo.'
    marker-yv: yv-n
  - type: text
    text: ' lafy valo sy Jerosalema ary ny morontsirak’i Tiro sy i Sidôna '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'no tonga teo mba hihaino Azy sy hositraniny amin’ny aretiny; ka izay nampahorîn’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanahy maloto
  - type: text
    text: ' dia sitrana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary notadiavin’ny vahoaka rehetra hokasihina i Jesoa satria nisy hery niala taminy ka nahasitrana azy rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hasambarana marina sy hasambarana sandoka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 5.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nanopy maso ny mpianany i Jesoa ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Sambatra ianareo mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa anareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sambatra ianareo noana ankehitriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hovokisan’Andriamanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra ianareo mitomany ankehitriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hampifalîn’Andriamanitra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Sambatra ianareo raha halan’ny olona sy roahiny ary tevatevainy sy alàny baràka noho ianareo miandany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aoka hifaly ianareo amin’ny andro hisehoan’izany ary aoka hibita-karavoana, satria valisoa lehibe no miandry anareo any an-danitra. Fa toy izany indrindra no nataon’ny razan-dry zareo tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminani
  - type: text
    text: n’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2 Tan 36.16; Asa 7.52.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: –Mampalahelo kosa ianareo mpanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa efa azonareo ny fahafaham-po!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampalahelo ianareo voky ankehitriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mbola ho noana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mampalahelo ianareo mihomehy ankehitriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mbola higogogogo hitomany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mampalahelo ianareo raha ataon’ny olona tsara laza. Fa toy izany indrindra no nataon’ny razan-dry zareo tamin’ny mpaminany sandoka!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manainga ho tia fahavalo i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 5.38-48; 7.12a)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '–Izao anefa no lazaiko aminareo mpihaino: Tiavo ny fahavalonareo, manasoava ny mpankahala anareo, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'miraria soa ho an’izay manozona anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izay mamely anao amin’ny takolaka iray, tolory koa ny ilany; ary izay maka ny lambanao, avelao koa haka ny akanjonao. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Omeo izay rehetra mangataka aminao ary aza itakiana izay maka ny anao. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Izay tianareo hataon’ny olona aminareo no mba ataovy aminy koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 13.8-10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Raha ny manam-pitiavana anareo ihany no tiavinareo, inona no mba sitraka manokana mendrika anareo? Ny mpanota koa mba tia izay manam-pitiavana azy! '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary raha ny manasoa anareo ihany no soavinareo, inona no mba sitraka manokana mendrika anareo? Ny mpanota koa mba manao toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary raha ny antenain-kamerina ihany no ampisamborinareo, inona no mba sitraka manokana mendrika anareo? Ny mpanota koa mba mifampisambotra hahazoana takalony. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa ianareo kosa, tiavo ny fahavalonareo, manasoava azy ary mampisambora tsy manantena valiny, dia ho lehibe ny valisoa miandry anareo; ary ianareo ho zanaky ny Avo indrindra, dia Ilay mora fo amin’ny tsy mahay mankasitraka sy ny ratsy fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tsara fo ilay Rainareo: noho izany, aoka ianareo ho tsara fo tahaka Azy koa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 34.6; Sal 86.15.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manainga tsy hanameloka olona i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 7.1-5)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '–Aza mitsara olona, dia tsy hotsarain’Andriamanitra ianareo; aza manameloka olona, dia tsy hohelohin’Andriamanitra ianareo; mamelà, dia havelan’Andriamanitra ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: manomeza, dia homen’Andriamanitra ianareo; fatra tsara, mihintsana, mifatratra sy avo loha no haidina amin’ny kitaponareo fa izay fomba hamaranareo ho an’ny olona ihany no mba hamaran’Andriamanitra ho anareo koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mbola nilazan’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' koa ireo mpihaino nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Jamba ve mahatantana jamba? Tsy hifamarina an-kady ve ny jamba mifampitantana? '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mpianatra tsy mihoatra mpampianatra, fa izay mpianatra tonga lafatra no toy ny mpampianatra azy.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '–Nahoana moa ianao no mahita tapak’ahitra eo amin’ny mason-kavana, nefa ny vatan-kazo eo amin’ny masonao tsy tandrinao akory? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ahoana no hahafahanao milaza amin-kavana hoe: «Etsy, rahavako, hoesoriko ny tapak’ahitra amin’ny masonao», nefa ny vatan-kazo amin’ny masonao tsy hitanao akory? Ry mpihatsaravelatsihy, esory aloha ny vatan-kazo amin’ny masonao, izay ianao vao hahiratra tsara ka hanaisotra ny tapak’ahitra amin’ny mason-kavana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hazo sy ny voany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 7.16-20; 12.33-35)
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '–Tsy mba hazo tsara no hamoa voa ratsy, na hazo ratsy indray no hamoa voa tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Eny, ny voany no ahafantarana ny hazo isan-karazany; fa foto-tsilo tsy ahazoana voanaviavy, ary foto-droy tsy iotazana voaloboka. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Koa ny olona tsara fanahy dia mamoaka zavatra tsara avy amin’ny rakitra tsaran’ny fony; ary ny olona ratsy fanahy kosa mamoaka zavatra ratsy avy amin’ny rakitra ratsin’ny fony. Fa izay mameno ny fon’ny olona no aloaky ny vavany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny orin-trano tsy mitovy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 7.24-27)
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '–Ahoana no iantsoanareo Ahy hoe: «Tompo ô! Tompo ô!» nefa tsy tanterahinareo akory izay lazaiko? '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Izay rehetra manatona Ahy ka mihaino ny teniko sady manatanteraka, dia hasehoko anareo ny mety hampitahana azy: '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'tahaka ny olona manorin-trano ka nihady lalina ary nandatsaka ny fototra am-batolampy; nony tondraka ny rano, dia notonafan’ny riaka ilay trano nefa tsy nihontsona noho izy tsara orina. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Fa izay mihaino ihany kosa nefa tsy manatanteraka, dia tahaka ny olona manorin-trano amin’izao tsy misy fototra; raha vao notonafan’ny riaka ilay trano, dia nirodana avy hatrany ka rava tanteraka.
