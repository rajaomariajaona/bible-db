document_id: LUK.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mioty salohim-bary amin’ny andro sabata ny mpianatr’i Jesoa
  - type: heading
    content: (Jereo Mt 12.1-8; Mk 2.23-28)
  - type: text
    content: 'Indray '
  - type: text
    content: sabata
  - type: note
    content: 'Indray sabata: misy stf sasany ahitana hoe Indray sabata faharoan’ny volana voalohany, izany hoe sabata tena akaikin’ny fotoam-pijinjana (jereo Lev 23.5-14). –dia nihinana: jereo Deot 23.26.'
  - type: text
    content: ', ry i Jesoa dia nandeha namaky tanimbary. Nioty salohim-bary ireto '
  - type: text
    content: mpianany
  - type: text
    content: ' ary nikosoka tamin’ny tanany, dia nihinana. '
  '10':
  - type: text
    content: Dia nanopy maso manodidina nijery azy rehetra i Jesoa ka niteny tamin-dralehilahy hoe
  - type: note
    content: 'ka niteny... hoe: misy stf sasany ahitana hoe ka sady tezitra no niteny tamin-dralehilahy hoe.'
  - type: text
    content: ':'
  - type: text
    content: –Atsory ny tananao.
  - type: text
    content: 'Dia natsotran’ilay marary ny tanany ka sitrana. '
  '11':
  - type: text
    content: Fa romotry ny hatezerana kosa ireo mpahay lalàna sy Farisianina ka niara-nioko ny amin’izay hanaovany an’i Jesoa.
  - type: heading
    content: Fidîn’i Jesoa ny apôstôly 12 lahy
  - type: heading
    content: (Jereo Mt 10.1-4; Mk 3.13-19)
  '12':
  - type: text
    content: 'Ary tamin’izany andro izany dia lasa nankany an-tendrombohitra i Jesoa mba hivavaka, ary naharitra nivavaka tamin’Andriamanitra nandritra ny alina. '
  '13':
  - type: text
    content: 'Nony maraina, nantsoiny ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ka nifidianany 12 lahy izay nomeny anarana hoe '
  - type: text
    content: apôstôly
  - type: text
    content: ': '
  '14':
  - type: text
    content: 'dia i Simôna, izay nomeny anarana koa hoe Petera, sy i Andrea rahalahiny; i Jakôba sy i Jôhany, i Filipo, i Bartôlômeo, '
  '15':
  - type: text
    content: i Matio, i Tômà, i Jakôba zanak’i Halfeo
  - type: note
    content: zanak’i Halfeo na rahalahin’i Halfeo.
  - type: text
    content: ', i Simôna atao hoe '
  - type: text
    content: Zelôta
  - type: text
    content: ', '
  '16':
  - type: text
    content: i Jodasy zanak’i Jakôba
  - type: note
    content: zanak’i Jakôba na rahalahin’i Jakôba.
  - type: text
    content: ', ary i Jodasy '
  - type: text
    content: Iskariôta
  - type: text
    content: ' ilay tonga mpamadika.'
  - type: heading
    content: Mampianatra ny vahoaka sy manasitrana ny marary i Jesoa
  - type: heading
    content: (Jereo Mt 4.23-25)
  '17':
  - type: text
    content: 'Dia niara-nidina tamin’ny 12 lahy i Jesoa ho eny an-tany lemaka. '
  - type: text
    content: Mpianany
  - type: text
    content: ' maro sy vahoaka betsaka avy any Jodea'
  - type: note
    content: Tahaka ny ao amin’ny Lk 1.5, ny hoe Jodea eto dia toa manondro an’i Palestinina manontolo.
  - type: text
    content: ' lafy valo sy Jerosalema ary ny morontsirak’i Tiro sy i Sidôna '
  '18':
  - type: text
    content: 'no tonga teo mba hihaino Azy sy hositraniny amin’ny aretiny; ka izay nampahorîn’ny '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' dia sitrana. '
  '19':
  - type: text
    content: Ary notadiavin’ny vahoaka rehetra hokasihina i Jesoa satria nisy hery niala taminy ka nahasitrana azy rehetra.
  - type: heading
    content: Hasambarana marina sy hasambarana sandoka
  - type: heading
    content: (Jereo Mt 5.1-12)
  '2':
  - type: text
    content: 'Fa hoy kosa ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' sasany hoe:'
  - type: text
    content: –Nahoana ianareo no manao zavatra tsy fanao amin’ny andro sabata
  - type: note
    content: Jereo Eks 34.21.
  - type: text
    content: '?'
  '20':
  - type: text
    content: 'Dia nanopy maso ny mpianany i Jesoa ka nanao hoe:'
  - type: text
    content: –Sambatra ianareo mahantra,
  - type: text
    content: 'fa anareo ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '!'
  '21':
  - type: text
    content: Sambatra ianareo noana ankehitriny,
  - type: text
    content: fa hovokisan’Andriamanitra!
  - type: text
    content: Sambatra ianareo mitomany ankehitriny,
  - type: text
    content: fa hampifalîn’Andriamanitra!
  '22':
  - type: text
    content: 'Sambatra ianareo raha halan’ny olona sy roahiny ary tevatevainy sy alàny baràka noho ianareo miandany amin’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Aoka hifaly ianareo amin’ny andro hisehoan’izany ary aoka hibita-karavoana, satria valisoa lehibe no miandry anareo any an-danitra. Fa toy izany indrindra no nataon’ny razan-dry zareo tamin’ny '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra
  - type: note
    content: Ampit 2 Tan 36.16; Asa 7.52.
  - type: text
    content: .
  '24':
  - type: text
    content: –Mampalahelo kosa ianareo mpanana,
  - type: text
    content: fa efa azonareo ny fahafaham-po!
  - type: text
    content: Mampalahelo ianareo voky ankehitriny,
  - type: text
    content: fa mbola ho noana!
  '25':
  - type: text
    content: Mampalahelo ianareo mihomehy ankehitriny,
  - type: text
    content: fa mbola higogogogo hitomany!
  '26':
  - type: text
    content: Mampalahelo ianareo raha ataon’ny olona tsara laza. Fa toy izany indrindra no nataon’ny razan-dry zareo tamin’ny mpaminany sandoka!
  - type: heading
    content: Manainga ho tia fahavalo i Jesoa
  - type: heading
    content: (Jereo Mt 5.38-48; 7.12a)
  '27':
  - type: text
    content: '–Izao anefa no lazaiko aminareo mpihaino: Tiavo ny fahavalonareo, manasoava ny mpankahala anareo, '
  '28':
  - type: text
    content: 'miraria soa ho an’izay manozona anareo. '
  '29':
  - type: text
    content: 'Izay mamely anao amin’ny takolaka iray, tolory koa ny ilany; ary izay maka ny lambanao, avelao koa haka ny akanjonao. '
  '3':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Tsy novakînareo tao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ve izay nataon’i Davida, raha noana izy mbamin’ireo olona niaraka taminy? '
  '30':
  - type: text
    content: 'Omeo izay rehetra mangataka aminao ary aza itakiana izay maka ny anao. '
  '31':
  - type: text
    content: Izay tianareo hataon’ny olona aminareo no mba ataovy aminy koa
  - type: note
    content: Ampit Rm 13.8-10.
  - type: text
    content: .
  '32':
  - type: text
    content: 'Raha ny manam-pitiavana anareo ihany no tiavinareo, inona no mba sitraka manokana mendrika anareo? Ny mpanota koa mba tia izay manam-pitiavana azy! '
  '33':
  - type: text
    content: 'Ary raha ny manasoa anareo ihany no soavinareo, inona no mba sitraka manokana mendrika anareo? Ny mpanota koa mba manao toy izany. '
  '34':
  - type: text
    content: 'Ary raha ny antenain-kamerina ihany no ampisamborinareo, inona no mba sitraka manokana mendrika anareo? Ny mpanota koa mba mifampisambotra hahazoana takalony. '
  '35':
  - type: text
    content: 'Fa ianareo kosa, tiavo ny fahavalonareo, manasoava azy ary mampisambora tsy manantena valiny, dia ho lehibe ny valisoa miandry anareo; ary ianareo ho zanaky ny Avo indrindra, dia Ilay mora fo amin’ny tsy mahay mankasitraka sy ny ratsy fanahy. '
  '36':
  - type: text
    content: 'Tsara fo ilay Rainareo: noho izany, aoka ianareo ho tsara fo tahaka Azy koa'
  - type: note
    content: Ampit Eks 34.6; Sal 86.15.
  - type: text
    content: '!'
  - type: heading
    content: Manainga tsy hanameloka olona i Jesoa
  - type: heading
    content: (Jereo Mt 7.1-5)
  '37':
  - type: text
    content: '–Aza mitsara olona, dia tsy hotsarain’Andriamanitra ianareo; aza manameloka olona, dia tsy hohelohin’Andriamanitra ianareo; mamelà, dia havelan’Andriamanitra ianareo; '
  '38':
  - type: text
    content: manomeza, dia homen’Andriamanitra ianareo; fatra tsara, mihintsana, mifatratra sy avo loha no haidina amin’ny kitaponareo fa izay fomba hamaranareo ho an’ny olona ihany no mba hamaran’Andriamanitra ho anareo koa.
  '39':
  - type: text
    content: 'Mbola nilazan’i Jesoa '
  - type: text
    content: fanoharana
  - type: text
    content: ' koa ireo mpihaino nataony hoe:'
  - type: text
    content: '–Jamba ve mahatantana jamba? Tsy hifamarina an-kady ve ny jamba mifampitantana? '
  '4':
  - type: text
    content: Niditra tao an-tranon’Andriamanitra izy ka ny mofo apetraka eo anatrehan’Andriamanitra no nakany hohanina, ary dia nomeny koa ireo olona niaraka taminy; kanefa izany mofo
  - type: note
    content: 'ka ny mofo... nakany: jereo 1 Sam 21.2-7. –kanefa izany... ihany: jereo Lev 24.5-9.'
  - type: text
    content: ' izany, tsy azon’iza na iza hanina afa-tsy ny mpisorona irery ihany.'
  '40':
  - type: text
    content: Mpianatra tsy mihoatra mpampianatra, fa izay mpianatra tonga lafatra no toy ny mpampianatra azy.
  '41':
  - type: text
    content: '–Nahoana moa ianao no mahita tapak’ahitra eo amin’ny mason-kavana, nefa ny vatan-kazo eo amin’ny masonao tsy tandrinao akory? '
  '42':
  - type: text
    content: 'Ahoana no hahafahanao milaza amin-kavana hoe: «Etsy, rahavako, hoesoriko ny tapak’ahitra amin’ny masonao», nefa ny vatan-kazo amin’ny masonao tsy hitanao akory? Ry mpihatsaravelatsihy, esory aloha ny vatan-kazo amin’ny masonao, izay ianao vao hahiratra tsara ka hanaisotra ny tapak’ahitra amin’ny mason-kavana.'
  - type: heading
    content: Ny hazo sy ny voany
  - type: heading
    content: (Jereo Mt 7.16-20; 12.33-35)
  '43':
  - type: text
    content: '–Tsy mba hazo tsara no hamoa voa ratsy, na hazo ratsy indray no hamoa voa tsara. '
  '44':
  - type: text
    content: 'Eny, ny voany no ahafantarana ny hazo isan-karazany; fa foto-tsilo tsy ahazoana voanaviavy, ary foto-droy tsy iotazana voaloboka. '
  '45':
  - type: text
    content: Koa ny olona tsara fanahy dia mamoaka zavatra tsara avy amin’ny rakitra tsaran’ny fony; ary ny olona ratsy fanahy kosa mamoaka zavatra ratsy avy amin’ny rakitra ratsin’ny fony. Fa izay mameno ny fon’ny olona no aloaky ny vavany.
  - type: heading
    content: Ny orin-trano tsy mitovy
  - type: heading
    content: (Jereo Mt 7.24-27)
  '46':
  - type: text
    content: '–Ahoana no iantsoanareo Ahy hoe: «Tompo ô! Tompo ô!» nefa tsy tanterahinareo akory izay lazaiko? '
  '47':
  - type: text
    content: 'Izay rehetra manatona Ahy ka mihaino ny teniko sady manatanteraka, dia hasehoko anareo ny mety hampitahana azy: '
  '48':
  - type: text
    content: 'tahaka ny olona manorin-trano ka nihady lalina ary nandatsaka ny fototra am-batolampy; nony tondraka ny rano, dia notonafan’ny riaka ilay trano nefa tsy nihontsona noho izy tsara orina. '
  '49':
  - type: text
    content: Fa izay mihaino ihany kosa nefa tsy manatanteraka, dia tahaka ny olona manorin-trano amin’izao tsy misy fototra; raha vao notonafan’ny riaka ilay trano, dia nirodana avy hatrany ka rava tanteraka.
  '5':
  - type: text
    content: 'Ary hoy koa i Jesoa tamin’ny Farisianina:'
  - type: text
    content: '–Ananan’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' fahefana ny sabata!'
  - type: heading
    content: Sitranin’i Jesoa ilay lehilahy maty tanana anila
  - type: heading
    content: (Jereo Mt 12.9-14; Mk 3.1-6)
  '6':
  - type: text
    content: 'Indray '
  - type: text
    content: sabata
  - type: text
    content: ' hafa koa, dia niditra tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Jesoa ka nampianatra. Nisy lehilahy maty tanana ankavanana tao; '
  '7':
  - type: text
    content: 'ary nizaha taratra an’i Jesoa ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy '
  - type: text
    content: Farisianina
  - type: text
    content: ' raha hanasitrana amin’ny andro sabata Izy mba hahitany antony hiampangana Azy. '
  '8':
  - type: text
    content: 'Fantatr’i Jesoa anefa ny eritreriny, ka hoy Izy tamin-dralehilahy maty tanana:'
  - type: text
    content: –Mitsangàna ka ndeha mijoro etsy afovoan’ny olona.
  - type: text
    content: 'Dia nitsangana ilay marary ka nijoro. '
  '9':
  - type: text
    content: 'Ary niteny tamin’ny mpahay lalàna sy ny Farisianina i Jesoa hoe:'
  - type: text
    content: '–Manontany anareo Aho: inona moa no azo atao amin’ny andro sabata, ny manao soa sa ny manao ratsy? ny mamonjy ain’olona sa ny manala ain’olona?'
