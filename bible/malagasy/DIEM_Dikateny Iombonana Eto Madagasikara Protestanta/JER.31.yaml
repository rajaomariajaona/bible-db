document_id: JER.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: '*'
  - type: text
    content: «Rehefa tonga izany fotoana izany, hoy ny teny hentitry ny TOMPO, dia ho Andriamanitry ny foko israelita rehetra Aho, ary izy ho vahoakako.»
  - type: heading
    content: Ny fiverenan’ireo sisa velona amin’i Israely
  '10':
  - type: text
    content: Mihainoa ny tenin’ny TOMPO, ianareo firenen-kafa,
  - type: text
    content: ambarao any amin’ireo nosy lavitra any izany
  - type: text
    content: 'ka lazao hoe: «Nampiely an’i Israely ny Tompo;'
  - type: text
    content: fa izao manangona azy Izy ary miambina azy
  - type: text
    content: 'tahaka ny ataon’ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' amin’ny andian’ondriny.»'
  '11':
  - type: text
    content: Fa efa nanavotra ny olon’i Israely ny TOMPO
  - type: text
    content: ka nanafaka azy tamin’ireo mahery noho izy.
  '12':
  - type: text
    content: Ho avy ireo ka hanao horakora-pifaliana
  - type: text
    content: 'ao amin’ny havoanan’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ;
  - type: text
    content: ho miramirana endrika izy
  - type: text
    content: 'amin’ny zava-tsoa homen’ny TOMPO:'
  - type: text
    content: dia ny vary sy divay vaovao ary diloilo,
  - type: text
    content: mbamin’ny ondry sy osy ary omby.
  - type: text
    content: Ho velombelona toy ny saha vonton-drano izy
  - type: text
    content: ka tsy mba hihamalazo intsony.
  '13':
  - type: text
    content: Dia hitotorebika handihy ny zatovovavy;
  - type: text
    content: toy izany koa ny tovolahy sy ny antitra.
  - type: text
    content: 'Fa hoy ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: Hovako ho fifaliana ny alahelony,
  - type: text
    content: ka hampiononiko sy hampiravoako izy
  - type: text
    content: mba ho afaka amin’ny fahoriany.
  '14':
  - type: text
    content: Hovokisako zava-matavy ny mpisorona
  - type: text
    content: ary hofenoiko zava-tsoa ny vahoakako.
  - type: heading
    content: '*'
  '15':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: Nisy fitarainana heno tao Ramà,
  - type: text
    content: dia fitomaniana sy fidradradradrana mafy.
  - type: text
    content: I Rahely
  - type: note
    content: 'Ramà: tanàna eo amin’ny 10 km any avaratr’i Jerosalema. Tamin’ny vanim-potoana fahiny ela (jereo 1 Sam 10.2) dia efa tao no nisy ny fasan’i Rahely, renin’i Jôsefa sy i Benjamîna (jereo Gen 35.16-19). Noho i Jôsefa razamben’ny foko Efraîma sy i Manase, dia i Rahely eto no enti-manondro ny fanjakan’i Israely manontolo (jereo 30.3 sy nta; 31.6 sy nta). Ity and ity dia tsiahivina ao Mt 2.18.'
  - type: text
    content: ' no mitomany ny zanany;'
  - type: text
    content: ka tsy mety nampiononina izy
  - type: text
    content: satria tsy eo intsony ny zanany.»
  '16':
  - type: text
    content: 'Kanefa izao no lazain’ny TOMPO azy:'
  - type: text
    content: «Atsaharo ny fitarainanao
  - type: text
    content: ary fafao ny ranomasonao
  - type: text
    content: fa hovaliako soa ny fisasaranao,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  - type: text
    content: Satria ireny zanakao ireny
  - type: text
    content: dia hiverina avy any an-tanin’ny fahavalony.
  '17':
  - type: text
    content: Koa misy fanantenana ho an’ny taranakao,
  - type: text
    content: hoy ny teny hentitra ambarako,
  - type: text
    content: hiverina ao an-tanindrazany ny zanakao.
  '18':
  - type: text
    content: Reko tsara mihitsy ny olon’i Efraîma
  - type: text
    content: 'nitaraina hoe: ‹TOMPO ô, nofaizinao izahay'
  - type: text
    content: ary dia manaiky hofaizinao
  - type: text
    content: tahaka ny ombilahy tanora tsy tena folaka.
  - type: text
    content: Nefa ampodio aminao izahay
  - type: text
    content: mba hiverenanay tokoa aminao,
  - type: text
    content: satria Ianao, TOMPO ô, no Andriamanitray.
  '19':
  - type: text
    content: Eny, niodina taminao izahay
  - type: text
    content: nefa anenenanay kosa izany.
  - type: text
    content: Nampahafantarinao anay ny fahadisoanay,
  - type: text
    content: ka mandondon-tratra izahay ankehitriny.
  - type: text
    content: Menatra sady mangaihay ny tenanay;
  - type: text
    content: manala baràka anay ny fahatanoranay
  - type: text
    content: ka hozakainay ny vokany.›
  '2':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Tany an-taniefitra no nanehoako hatsaram-po
  - type: text
    content: ny vahoaka sisa tsy matin’ny fandringanana.
  - type: text
    content: Hizotra milamina amin’izay i Israely.
  '20':
  - type: text
    content: I Efraîma no zanakalahy mamiko,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO,
  - type: text
    content: zanaka malalako indrindra izy.
  - type: text
    content: Isaky ny manameloka azy Aho,
  - type: text
    content: dia mahatsiaro azy hatrany
  - type: text
    content: ka manjary mangoraka azy
  - type: text
    content: ary dia mamindrafo aminy tokoa.
  - type: heading
    content: '*'
  '21':
  - type: text
    content: Manangàna mari-dalana ho anao
  - type: text
    content: ka asio orim-bato eny amoron-dalana
  - type: note
    content: Eo amin’ny and 21.22, ny mpaminany dia miteny amin’ny fanjakan’i Israely toy ny amin’ny vehivavy tanora iray.
  - type: text
    content: ;
  - type: text
    content: hevero ny lalana efa nodiavinao,
  - type: text
    content: dia ny lalana efa narahinao,
  - type: text
    content: ka miverena, ry Israely malala,
  - type: text
    content: miverena amin’ireo tanànanao.
  '22':
  - type: text
    content: Mandra-pahoviana ianao
  - type: text
    content: no mbola hiriorio etsy sy eroa,
  - type: text
    content: ry zanakavavy mpikomy?
  - type: text
    content: Fa ny TOMPO efa namorona
  - type: text
    content: 'zava-baovao eto an-tany:'
  - type: text
    content: ny vehivavy indray no
  - type: text
    content: manenji-dehilahy
  - type: note
    content: Toy ny vehivavy fofombadin’ny Tompo (jereo Is 54.5-6; Hos 1.2) i Israely ka tokony ho voatarika mora foana ho an’ilay Andriamaniny, ary hiverina aminy.
  - type: text
    content: .
  - type: heading
    content: Fanarenana sy fanekempihavanana vaovao
  '23':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Rehefa hanova ny anjaran’ity tanin’i Joda sy ireto tanànany Aho, dia hotononina indray ny fiteny hoe:'
  - type: text
    content: ‹Hitahy anao anie ny TOMPO
  - type: text
    content: 'ry '
  - type: text
    content: Tsiôna
  - type: text
    content: ' tendrombohitra masina,'
  - type: text
    content: fonenan’ny famonjena!›
  '24':
  - type: text
    content: '«Amin’izay ny olona tambanivohitra sy an-tanàn-dehibe ao Joda dia hiara-monina eo amin’ny tany, isan’izany ireo tantsaha sy ireo mpiompy mifindrafindra lasy miaraka amin’ny biby fiompiny. '
  '25':
  - type: text
    content: 'Fa hampahereziko ireo efa reraka, ary homeko izay ilainy ireo rehetra efa trotraka. ( '
  '26':
  - type: text
    content: 'Izany no hilazana hoe: ‹Nony nifoha aho, dia hitako fa nahasoa ahy ny torimasoko'
  - type: note
    content: Mihatra amin’ny mpaminany eto izany fomba fiteny izany, satria mandritra ny torimasony no andraisany hafatra soa avy amin’Andriamanitra.
  - type: text
    content: .›)
  '27':
  - type: text
    content: '«Indro avy ny andro, izay hanapariahako olona sy biby fiompy manerana ny fanjakan’i Israely sy i Joda tahaka ny fanapariahana voa afafy eo an-tanimboly. Teny hentitra avy amiko TOMPO izany. '
  '28':
  - type: text
    content: Mandraka ankehitriny dia nilofo namely azy Aho, mba hanongotra sy hanjera, hanapotika sy handrava, ary hanisy ratsy azy. Fa izao kosa hilofo hanasoa azy Aho mba hanarina sy hampiorina
  - type: note
    content: 'hanongotra, hanjera... hampiorina: jereo 1.10; 24.6; 42.10; 45.4.'
  - type: text
    content: '; teny hentitra avy amiko TOMPO izany. '
  '29':
  - type: text
    content: 'Amin’izay dia tsy hisy hamerina intsony izao ohabolana izao: ‹Ny ray aman-dreny no nihinana voaloboka marikivy, ka ny zanany no madilo nify'
  - type: note
    content: Ampit 18.2.
  - type: text
    content: '.› '
  '3':
  - type: text
    content: 'Hoy izy hoe:'
  - type: text
    content: ‹Avy lavitra ny TOMPO no tonga niseho tamiko.›
  - type: text
    content: 'ka hoy ny navaliko azy:'
  - type: text
    content: ‹Fitiavana mandrakizay no itiavako anao
  - type: text
    content: ka famindrampo no itaomako anao hanatona Ahy.
  '30':
  - type: text
    content: Fa raha misy tokoa ny mihinana voaloboka marikivy, dia izy ihany no hadilo nify; samy ho fatin’ny fahadisoany avy ny olona tsirairay.
  '31':
  - type: text
    content: '«Indro avy ny andro, izay hanaovako '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' vaovao amin’ny vahoakan’i Israely sy ny vahoakan’i Joda'
  - type: note
    content: 'Israely sy Joda: jereo 30.3 sy nta. –fanekempihavanana vaovao, jereo Lk 22.20; 1 Kôr 11.25; 2 Kôr 3.6.'
  - type: text
    content: '. Teny hentitra avy amiko TOMPO izany. '
  '32':
  - type: text
    content: 'Kanefa tsy hitovy amin’ilay fanekempihavanana nataoko tamin’ireo razany fony Aho nandray an-tanana hamoaka azy avy tany Ejipta izany. Fa nivadihan’ireo iny, kanefa Izaho no tompony; teny hentitra avy amiko TOMPO izany. '
  '33':
  - type: text
    content: 'Fa izao no fanekempihavanana hataoko amin’ny vahoakan’i Israely, aorian’izany andro izany: Hapetrako ao an’eritreriny ny lalànako ary hosoratako ao am-pony, ka ho Andriamaniny Aho ary izy ho vahoakako. Teny hentitra avy amiko TOMPO izany. '
  '34':
  - type: text
    content: Tsy mila hanatona ny namany na mpiray tampo aminy intsony izy mba hampianatra ireny hahalala Ahy TOMPO; fa hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra dia samy hahalala Ahy avokoa izy rehetra, hoy ny teny hentitra avy amiko TOMPO. Fa havelako ny fahadisoany ary tsy hotsarovako intsony ny helony
  - type: note
    content: Ny and 31-34 dia tsiahivina ao amin’ny Heb 8.8-12; ny and 31,34 dia tsiahivina am-pahany ihany ao amin’ny Heb 10.16-17.
  - type: text
    content: .»
  - type: heading
    content: '*'
  '35':
  - type: text
    content: Iza no mametraka ny masoandro
  - type: text
    content: ho fanazavana amin’ny antoandro?
  - type: text
    content: Iza no mandidy ny volana aman-kintana
  - type: text
    content: ho fanazavana amin’ny alina?
  - type: text
    content: Iza no manetsika ny ranomasina
  - type: text
    content: mba hampisafoaka ny onjany?
  - type: text
    content: Ny TOMPOn’izao rehetra izao no anarany.
  - type: text
    content: 'Fa izao no lazain’io TOMPO io:'
  '36':
  - type: text
    content: «Raha tàhiny tsy manan-kery intsony
  - type: text
    content: ireo lalàna voajanahary ireo eo anatrehako,
  - type: text
    content: dia hitsahatra tsy ho firenena intsony
  - type: text
    content: ny taranak’i Israely eo anatrehako.
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.
  '37':
  - type: text
    content: Raha misy maharefy ny haavon’ny lanitra, hoy AHO,
  - type: text
    content: na afaka hahafantatra ny halalin’ny tany,
  - type: text
    content: dia holaviko i Israely manontolo
  - type: text
    content: noho ny ratsy rehetra nataony,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.»
  - type: heading
    content: '*'
  '38':
  - type: text
    content: 'Hoy ny teny hentitry ny Tompo hoe: «Indro avy ny andro, izay hananganana indray ny mandan’i Jerosalema ho voninahitro, manomboka amin’ny tilikambon’i Hananela ka hatrany amin’ny vavahady an-jorony'
  - type: note
    content: 'Tilikambon’i Hananela (jereo Neh 3.1): toa terỳ an-tsisiny avaratr’i Jerosalema. –vavahady an-jorony (jereo 2 Mp 14.13): toa terỳ amin’ny ilany andrefan’ny tanàna.'
  - type: text
    content: '. '
  '39':
  - type: text
    content: Hofaritana ny faritra vaovaon’ny tanàna, ka miankandrefana hatreny amin’ny havoanan’i Gareba, avy eo dia mihodina mankany Gôhà
  - type: note
    content: 'havoanan’i Gareba, Gôhà: tsy fantatra mazava ny toerana nisy azy.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: Haoriko indray ianao, ry Israely mamiko,
  - type: text
    content: ka ho voaorina;
  - type: text
    content: hiravahanao indray ny ampongatapakao
  - type: text
    content: hanentananao ireo mpandihy mitotorebika.
  '40':
  - type: text
    content: Dia mihazo ny lohasaham-paty aman-davenona
  - type: note
    content: 'lohasaham-paty aman-davenona: angamba ny lohasahan’i Hinôma izay nanaovana sorona ankizy (jereo Jer 7.31; 19.2-6; 32.25). Ny lavenona voalaza eto dia tsy lavenon-kitay fa lavenon’ireo sorona dorana.'
  - type: text
    content: ' manontolo sy ny faritra midadasika rehetra hatrany amin’ny ranon-driakan’i Kidrôna, ary tafapaka eo amin’ny zoron’ny vavahadin’ny soavaly'
  - type: note
    content: Ny vavahadin’ny soavaly dia ao anatin’ny mandan’i Jerosalema.
  - type: text
    content: ' any atsinanana. Ireo tany rehetra ireo dia hatokana ho Ahy TOMPO ka tsy hisy hanesorana na horavana intsony na oviana na oviana.»'
  '5':
  - type: text
    content: Hambolenao voaloboka indray
  - type: text
    content: eny amin’ny havoanan’i Samaria
  - type: text
    content: ka ireo mpamboly no hioty
  - type: text
    content: ny vokatry ny famboleny.
  '6':
  - type: text
    content: Fa ho avy indray ny andro
  - type: text
    content: izay hiantsoan’ireo mpiambina
  - type: text
    content: eny an-tendrombohitr’i Efraîma
  - type: note
    content: Efraîma, zanakalahin’i Jôsefa (Gen 41.52) ary razan’ny foko lehibe indrindra tamin’ny fanjakan’i Israely avaratra, no enti-manondro ny fitambaran’izany fanjakana izany.
  - type: text
    content: ' hoe:'
  - type: text
    content: Andeha isika hiakatra any Tsiôna
  - type: text
    content: ho eo anilan’ny TOMPO Andriamanitsika!› »
  - type: heading
    content: '*'
  '7':
  - type: text
    content: Manaova horakora-pifaliana ho an’i Israely;
  - type: text
    content: mihobia an’Ilay filohan’ireo firenena,
  - type: text
    content: 'ataovy antso avo ny dera ka lazao hoe:'
  - type: text
    content: «Ny TOMPO mamonjy ny vahoakany,
  - type: text
    content: dia ny sisa velona amin’i Israely!»
  - type: text
    content: 'Satria izao no lazain’ny TOMPO:'
  '8':
  - type: text
    content: «Haveriko avy any an-tany avaratra izy
  - type: text
    content: ary hangoniko avy any am-bazan-tany.
  - type: text
    content: Ao avokoa mbamin’ny jamba sy ny mandringa,
  - type: text
    content: ary ny bevohòka sy ny tera-bao.
  - type: text
    content: Eny, vahoaka be no hiverina.
  '9':
  - type: text
    content: Tonga am-pitomaniana izy
  - type: text
    content: ka narahiko sady nampiononiko.
  - type: text
    content: Any amin’ny lemaka misy rano no hitarihako azy
  - type: text
    content: ary lala-mahitsy no hizorany
  - type: text
    content: ka tsy ho tafintohina izy.
  - type: text
    content: Ho Ray Aho amin’i Israely,
  - type: text
    content: ary ho lahimatoako i Efraîma.»
