  - type: text
    text: 'Hoy ny teny hentitry ny Tompo hoe: «Indro avy ny andro, izay hananganana indray ny mandan’i Jerosalema ho voninahitro, manomboka amin’ny tilikambon’i Hananela ka hatrany amin’ny vavahady an-jorony'
