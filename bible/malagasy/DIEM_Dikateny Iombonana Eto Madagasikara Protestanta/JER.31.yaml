      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 30.3 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: fanekempihavanana vaovao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Lk 22.20; 1 Kôr 11.25; 2 Kôr 3.6.'
    marker-yv: yv-n
  - type: text
    text: '. Teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Kanefa tsy hitovy amin’ilay fanekempihavanana nataoko tamin’ireo razany fony Aho nandray an-tanana hamoaka azy avy tany Ejipta izany. Fa nivadihan’ireo iny, kanefa Izaho no tompony; teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa izao no fanekempihavanana hataoko amin’ny vahoakan’i Israely, aorian’izany andro izany: Hapetrako ao an’eritreriny ny lalànako ary hosoratako ao am-pony, ka ho Andriamaniny Aho ary izy ho vahoakako. Teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tsy mila hanatona ny namany na mpiray tampo aminy intsony izy mba hampianatra ireny hahalala Ahy TOMPO; fa hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra dia samy hahalala Ahy avokoa izy rehetra, hoy ny teny hentitra avy amiko TOMPO. Fa havelako ny fahadisoany ary tsy hotsarovako intsony ny helony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 31-34 dia tsiahivina ao amin’ny Heb 8.8-12; ny and 31,34 dia tsiahivina am-pahany ihany ao amin’ny Heb 10.16-17.
    marker-yv: yv-n
  - type: text
    text: .»
