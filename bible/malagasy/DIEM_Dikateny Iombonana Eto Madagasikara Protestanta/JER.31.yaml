  - type: text
    text: '«Indro avy ny andro, izay hanapariahako olona sy biby fiompy manerana ny fanjakan’i Israely sy i Joda tahaka ny fanapariahana voa afafy eo an-tanimboly. Teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mandraka ankehitriny dia nilofo namely azy Aho, mba hanongotra sy hanjera, hanapotika sy handrava, ary hanisy ratsy azy. Fa izao kosa hilofo hanasoa azy Aho mba hanarina sy hampiorina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hanongotra, hanjera... hampiorina: jereo 1.10; 24.6; 42.10; 45.4.'
    marker-yv: yv-n
  - type: text
    text: '; teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Amin’izay dia tsy hisy hamerina intsony izao ohabolana izao: ‹Ny ray aman-dreny no nihinana voaloboka marikivy, ka ny zanany no madilo nify'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 18.2.
    marker-yv: yv-n
  - type: text
    text: '.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa raha misy tokoa ny mihinana voaloboka marikivy, dia izy ihany no hadilo nify; samy ho fatin’ny fahadisoany avy ny olona tsirairay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Indro avy ny andro, izay hanaovako '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' vaovao amin’ny vahoakan’i Israely sy ny vahoakan’i Joda'
