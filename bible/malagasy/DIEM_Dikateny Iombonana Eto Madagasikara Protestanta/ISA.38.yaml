document_id: ISA.38,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitrana tamin’ny aretina i Hezekià
  - type: heading
    content: (Jereo 2 Mp 20.1-11)
  - type: text
    content: 'Tamin’izany andro izany, dia narary efa ho faty i Hezekià. Tonga nitsidika azy i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ', zanakalahin’i Amôtsa, ary nilaza taminy ny tenin’ny TOMPO hoe: «Ataovy ny fara hafatrao amin’ny ankohonanao, satria efa ho faty ianao fa tsy ho velona.»'
  '10':
  - type: text
    content: 'Hoy aho anakampo hoe:'
  - type: text
    content: Amin’izao andro mbola iadanako izao
  - type: text
    content: no tsy maintsy hahalasanako!
  - type: text
    content: Eo am-baravaran’ny fonenan’ny maty
  - type: text
    content: no hamaranako ny taonako sisa rehetra.
  '11':
  - type: text
    content: 'Hoy koa aho hoe: Tsy hahita ny TOMPO intsony aho'
  - type: text
    content: eto amin’ny tanin’ny velona;
  - type: text
    content: ary any amin’ny fiafaran’ny zavatra rehetra
  - type: text
    content: dia tsy hahita endrik’olona intsony aho.
  '12':
  - type: text
    content: Fa nongotanao ny fonenako
  - type: text
    content: ka nafindranao lavitra ahy
  - type: text
    content: 'toy ny lain’ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry.'
  - type: text
    content: Ahoronao toy ny tenona ny fiainako
  - type: text
    content: ka efa ho tapaka ny haraka.
  - type: text
    content: –Indray andro monja, TOMPO ô
  - type: text
    content: no anaperanao ny aiko;
  '13':
  - type: text
    content: ka alohan’ny maraina,
  - type: text
    content: dia ho vita ny amiko.–
  - type: text
    content: Toy ny liona mihitsy ny TOMPO
  - type: text
    content: nanapatapaka ny taolako rehetra.
  - type: text
    content: –Indray andro monja, TOMPO ô,
  - type: text
    content: no anaperanao ny aiko.–
  '14':
  - type: text
    content: Koa mikiakiaka toa sidintsidina aho
  - type: text
    content: ary mitoloko toa voromahailala.
  - type: text
    content: Tsy mahajery lanitra intsony ny masoko,
  - type: text
    content: –Tompo ô, tena trotraka aho,
  - type: text
    content: ka aoka mba hiantohanao.–
  '15':
  - type: text
    content: Inona àry no holazaiko
  - type: text
    content: sy hoteneniko amin’ny TOMPO?
  - type: text
    content: Eny, Izy no nanao an’izao.
  - type: text
    content: Handeha mijoretra aho
  - type: text
    content: amin’ny taonako sisa rehetra
  - type: text
    content: fa mangidy amiko loatra izao.
  '16':
  - type: text
    content: –TOMPO ô, fantatrao izay nanjo ahy
  - type: text
    content: ka namelona ahy indray Ianao;
  - type: text
    content: naverinao ny heriko
  - type: text
    content: ary notahirizinao ny aiko.
  '17':
  - type: text
    content: Indro niova ho fahasambarana
  - type: text
    content: ilay fahoriako nangidy dia nangidy.
  - type: text
    content: Fatra-pitia ahy Ianao ka tsy namela ahy ho faty;
  - type: text
    content: fa narianao any ivohonao ny heloko rehetra.
  '18':
  - type: text
    content: Any amin’ny fonenan’ny maty tokoa
  - type: text
    content: dia tsy misy afaka midera Anao;
  - type: text
    content: ireo nindaosin’ny fahafatesana
  - type: text
    content: tsy mba afaka mankalaza Anao;
  - type: text
    content: izay tafidina any am-pasana
  - type: text
    content: tsy hanantena ny toetranao mahatoky.
  '19':
  - type: text
    content: Ny velona ihany no afaka hidera Anao,
  - type: text
    content: dia tahaka ahy izao anio izao
  - type: text
    content: sy tahaka ireo ray aman-dreny
  - type: text
    content: izay hampahalala ny zanany
  - type: text
    content: fa tena mahatoky tokoa Ianao.
  '2':
  - type: text
    content: 'Dia nitodika tany amin’ny rindrina i Hezekià ka nivavaka tamin’ny TOMPO, '
  '20':
  - type: text
    content: TOMPO ô, efa namonjy ahy Ianao.
  - type: text
    content: Koa hankalaza Anao izahay
  - type: text
    content: miaraka amin’ny feon-dokanga
  - type: text
    content: ao an-tranonao, TOMPO ô
  - type: note
    content: Jereo ny naoty amin’ny and 6.
  - type: text
    content: ','
  - type: text
    content: amin’ny androm-piainanay rehetra.
  '21':
  - type: text
    content: Ary nampaka ampempan’aviavy i Isaià mba hapetaka eo amin’ny vay ka hahasitrana ny mpanjaka.
  '22':
  - type: text
    content: 'Dia hoy i Hezekià taminy: «Inona no famantarana fa afaka hiakatra ao an-tranon’ny TOMPO aho?»'
  '3':
  - type: text
    content: 'ary nanao hoe: «TOMPO ô, mba tsarovy fa nandeha tamim-pahamarinana sy tamin-kitsimpo teo anatrehanao aho ary nanao izay tsara eo imasonao!» Dia nitomany nanao ranomaso havozona i Hezekià.'
  '4':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamin’i Isaià nandidy '
  '5':
  - type: text
    content: 'handeha hilaza amin’i Hezekià hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Davida razambenao: Reko ny vavakao ary hitako ny ranomasonao, ka hampiako 15 taona ny andro hiainanao. '
  '6':
  - type: text
    content: Ny tenanao sy i Jerosalema dia hafahako eo an-tanan’ny mpanjakan’i Asiria; ary ity tanàna ity dia harovako noho ny amin’ny tenako sy i Davida mpanompoko
  - type: note
    content: Ny and 21-22 dia natsofoka aorian’ity and 6 ity toy izay hita amin’ny andalana mirazotra ao amin’ny 2 Mp 20.1-11.
  - type: text
    content: .»
  '7':
  - type: text
    content: 'Dia novaliany hoe: «Izao no famantarana omen’ny TOMPO anao mba hahalalanao fa hotanterahiny tokoa izay nolazainy. '
  '8':
  - type: text
    content: Ny tohatr’i Ahaza
  - type: note
    content: 'Ahaza: rain’i Hezekià (2 Mp 18.1.).'
  - type: text
    content: ', izay azon’ny masoandro anikeheo, dia efa nidinan’ny aloka; indro fa hampihemorin’ny TOMPO ambaratonga folo izany aloka izany.»'
  - type: text
    content: Dia azon’ny masoandro indray ny ambaratonga folo izay efa nidinan’ny aloka teo.
  - type: heading
    content: Vavaka nataon’i Hezekià taorian’ny fahasitranany
  '9':
  - type: text
    content: 'Ity tononkalo ity dia nosoratan’i Hezekià mpanjakan’i Joda, rehefa avy narary izy ka sitrana tamin’ny aretiny:'
