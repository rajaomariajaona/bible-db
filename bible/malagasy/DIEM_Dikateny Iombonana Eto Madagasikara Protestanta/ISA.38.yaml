document_id: ISA.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitrana tamin’ny aretina i Hezekià
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 20.1-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro izany, dia narary efa ho faty i Hezekià. Tonga nitsidika azy i Isaià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ', zanakalahin’i Amôtsa, ary nilaza taminy ny tenin’ny TOMPO hoe: «Ataovy ny fara hafatrao amin’ny ankohonanao, satria efa ho faty ianao fa tsy ho velona.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitodika tany amin’ny rindrina i Hezekià ka nivavaka tamin’ny TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary nanao hoe: «TOMPO ô, mba tsarovy fa nandeha tamim-pahamarinana sy tamin-kitsimpo teo anatrehanao aho ary nanao izay tsara eo imasonao!» Dia nitomany nanao ranomaso havozona i Hezekià.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamin’i Isaià nandidy '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'handeha hilaza amin’i Hezekià hoe: «Izao no lazain’ny TOMPO Andriamanitr’i Davida razambenao: Reko ny vavakao ary hitako ny ranomasonao, ka hampiako 15 taona ny andro hiainanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tenanao sy i Jerosalema dia hafahako eo an-tanan’ny mpanjakan’i Asiria; ary ity tanàna ity dia harovako noho ny amin’ny tenako sy i Davida mpanompoko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 21-22 dia natsofoka aorian’ity and 6 ity toy izay hita amin’ny andalana mirazotra ao amin’ny 2 Mp 20.1-11.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nampaka ampempan’aviavy i Isaià mba hapetaka eo amin’ny vay ka hahasitrana ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy i Hezekià taminy: «Inona no famantarana fa afaka hiakatra ao an-tranon’ny TOMPO aho?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia novaliany hoe: «Izao no famantarana omen’ny TOMPO anao mba hahalalanao fa hotanterahiny tokoa izay nolazainy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny tohatr’i Ahaza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ahaza: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rain’i Hezekià (2 Mp 18.1.).
    marker-yv: yv-n
  - type: text
    text: ', izay azon’ny masoandro anikeheo, dia efa nidinan’ny aloka; indro fa hampihemorin’ny TOMPO ambaratonga folo izany aloka izany.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia azon’ny masoandro indray ny ambaratonga folo izay efa nidinan’ny aloka teo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka nataon’i Hezekià taorian’ny fahasitranany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ity tononkalo ity dia nosoratan’i Hezekià mpanjakan’i Joda, rehefa avy narary izy ka sitrana tamin’ny aretiny:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy aho anakampo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’izao andro mbola iadanako izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tsy maintsy hahalasanako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo am-baravaran’ny fonenan’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hamaranako ny taonako sisa rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy koa aho hoe: Tsy hahita ny TOMPO intsony aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ny tanin’ny velona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary any amin’ny fiafaran’ny zavatra rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hahita endrik’olona intsony aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa nongotanao ny fonenako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nafindranao lavitra ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'toy ny lain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ondry.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahoronao toy ny tenona ny fiainako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka efa ho tapaka ny haraka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Indray andro monja, TOMPO ô
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anaperanao ny aiko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ka alohan’ny maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho vita ny amiko.–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny liona mihitsy ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanapatapaka ny taolako rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Indray andro monja, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anaperanao ny aiko.–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa mikiakiaka toa sidintsidina aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitoloko toa voromahailala.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahajery lanitra intsony ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Tompo ô, tena trotraka aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aoka mba hiantohanao.–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Inona àry no holazaiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hoteneniko amin’ny TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Izy no nanao an’izao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handeha mijoretra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny taonako sisa rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mangidy amiko loatra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: –TOMPO ô, fantatrao izay nanjo ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namelona ahy indray Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: naverinao ny heriko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary notahirizinao ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indro niova ho fahasambarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay fahoriako nangidy dia nangidy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fatra-pitia ahy Ianao ka tsy namela ahy ho faty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa narianao any ivohonao ny heloko rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Any amin’ny fonenan’ny maty tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy misy afaka midera Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo nindaosin’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mba afaka mankalaza Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tafidina any am-pasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hanantena ny toetranao mahatoky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny velona ihany no afaka hidera Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ahy izao anio izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tahaka ireo ray aman-dreny
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hampahalala ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tena mahatoky tokoa Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: TOMPO ô, efa namonjy ahy Ianao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa hankalaza Anao izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: miaraka amin’ny feon-dokanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-tranonao, TOMPO ô
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty amin’ny and 6.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny androm-piainanay rehetra.
