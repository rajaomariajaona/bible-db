document_id: ISA.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fihemoran’ny fanjakan’i Damasy sy i Israely
  - type: text
    content: Hafatra momba an’i Damasy.
  - type: text
    content: Hitsahatra tsy ho tanàna intsony i Damasy
  - type: note
    content: 'Damasy: renivohitry ny fanjakana aramianina tany Siria. Ny amin’ny Sirianina, dia jereo Jer 49.23-27; Ham 1.3-5; Za 9.1.'
  - type: text
    content: ','
  - type: text
    content: fa ho tonga korontam-bato sisa.
  '10':
  - type: text
    content: Nohadinoinao, ry Israely,
  - type: text
    content: ilay Andriamanitra mpamonjy anao
  - type: text
    content: ary tsy notsarovanao ilay vatolampy fiarovanao;
  - type: text
    content: ka namboly zavatra faingam-paniry ho an’ny sampy ianao
  - type: note
    content: Angamba enti-milaza ny «zaridainan’i Adônisa» (voly voninkazo anaty nongotapaka), fanao nindramina tamin’ny fombam-pivavahana ankalazana ny fahavokarana.
  - type: text
    content: sy namafy masomboly ho an’ny andriamani-tsiizy.
  '11':
  - type: text
    content: Tamin’ny andro nambolenao azy
  - type: text
    content: dia hitanao nitombo ny voly;
  - type: text
    content: ary vao maraina iny ihany,
  - type: text
    content: dia hitanao nitsimoka ny voa.
  - type: text
    content: Kanjo tonga ny andron’ny loza
  - type: text
    content: ka nanjavona ny vokatra
  - type: text
    content: ary tsy ahitam-panafana intsony ny aretina.
  - type: heading
    content: Ny firodorodon’ireo fahavalo
  '12':
  - type: text
    content: Andray izany firodorodon’ny vahoaka marobe
  - type: text
    content: toy ny fikotrokotroky ny ranomasina misafoaka!
  - type: text
    content: Andray izato fitrenan’ireo firenena,
  - type: text
    content: tahaka ny fidoboky ny onja mahery!
  '13':
  - type: text
    content: Ny fitrenan’ireo firenena
  - type: text
    content: dia toy ny fitrenan’ny ranomasimbe.
  - type: text
    content: Nefa rahonan’ny Tompo izy ireny
  - type: text
    content: ka lasa mandositra lavitra,
  - type: text
    content: toy ny akofa paohin’ny rivotra eny an-tendrombohitra
  - type: text
    content: sy tahaka ny vonin-javatra atambolimbolin’ny tadio
  - type: note
    content: Visavisain’ny mpaminany an-tsarisary sy an’ohatra eto ny fanafihan’ny Asirianina sy ny fandosirany niverina ilalana tamin’ny taona 701 tal J.K. (jereo 2 Mp 18.13–19.37).
  - type: text
    content: .
  '14':
  - type: text
    content: Vao takariva dia injao ny horohoro,
  - type: text
    content: tsy maraina akory dia efa foana izany.
  - type: text
    content: Toy izany no hanjo izay nandroba antsika
  - type: text
    content: sy ho anjaran’izay namabo antsika.
  '2':
  - type: text
    content: Ho lao mandrakizay mandrakizay
  - type: text
    content: ireo tanàna manodidina azy,
  - type: text
    content: ka ho tonga fitobian’ny ondry aman’osy
  - type: text
    content: ary handry am-pilaminana ao ireny,
  - type: text
    content: fa tsy hisy mpanelingelina azy.
  '3':
  - type: text
    content: Tsy hisy manda fiarovana intsony any Efraîma
  - type: note
    content: 'Efraîma: jereo 11.13 sy nta.'
  - type: text
    content: ;
  - type: text
    content: tsy hisy fanjakana intsony koa any Damasy,
  - type: text
    content: ary izay sisa tavela amin’ny Sirianina
  - type: text
    content: dia tsy hisy lanjany noho ny Israelita.
  - type: text
    content: Izany no teny hentitry ny TOMPOn’izao rehetra izao.
  '4':
  - type: text
    content: Amin’izany andro izany dia hihena
  - type: text
    content: ny lanjan’ny taranak’i Jakôba
  - type: text
    content: ary ny hatavezany hanjary fahiazana.
  '5':
  - type: text
    content: Ho tahaka ny amoriana ny vary amin’ny fararano
  - type: text
    content: sy anangonana ny salohim-bary eo an-trotroana izany;
  - type: text
    content: eny, ho tahaka ny anangonana salohim-bary
  - type: text
    content: ao amin’ny lohasahan’ny Refaita
  - type: note
    content: Lohasaha eo akaikin’i Jerosalema.
  - type: text
    content: ' izany,'
  '6':
  - type: text
    content: ka tsy hisy amin’ny taranak’i Jakôba
  - type: text
    content: afa-tsy sombintsombiny sisa hotsimponina.
  - type: text
    content: Ary ho tahaka ny fanintsanana voan’ôliva izany,
  - type: text
    content: ka voany roa na telo no sisa eny an-tendrony,
  - type: text
    content: efatra na dimy eny amin’ny rantsany mahavokatra.
  - type: text
    content: Izany no teny hentitry ny TOMPO,
  - type: text
    content: Andriamanitr’i Israely.
  '7':
  - type: text
    content: 'Amin’izany andro izany, dia hitodika amin’Ilay Mpahary azy ny olona ary hanandratra ny masony ho amin’ilay Masin’i Israely. '
  '8':
  - type: text
    content: 'Tsy hitodika any amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' namboariny intsony izy ary tsy hijery ireo sampy nataon’ny tanany, na ny tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: ' na ny fandoroana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: .
  '9':
  - type: text
    content: 'Amin’izany andro izany, dia hilaozana ireo tanàna mimandan’i Israely, tahaka ny nandaozana ny tanànan’ny Hivita sy ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' fahiny tamin’ny nahatongavan’ny Israelita; ka taniefitra mampalahelo no ho hany tavela.'
