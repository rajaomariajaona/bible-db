document_id: ISA.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fihemoran’ny fanjakan’i Damasy sy i Israely
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hafatra momba an’i Damasy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsahatra tsy ho tanàna intsony i Damasy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Damasy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: renivohitry ny fanjakana aramianina tany Siria. Ny amin’ny Sirianina, dia jereo Jer 49.23-27; Ham 1.3-5; Za 9.1.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho tonga korontam-bato sisa.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nohadinoinao, ry Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Andriamanitra mpamonjy anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy notsarovanao ilay vatolampy fiarovanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namboly zavatra faingam-paniry ho an’ny sampy ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Angamba enti-milaza ny «zaridainan’i Adônisa» (voly voninkazo anaty nongotapaka), fanao nindramina tamin’ny fombam-pivavahana ankalazana ny fahavokarana.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy namafy masomboly ho an’ny andriamani-tsiizy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tamin’ny andro nambolenao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitanao nitombo ny voly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vao maraina iny ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitanao nitsimoka ny voa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tonga ny andron’ny loza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanjavona ny vokatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ahitam-panafana intsony ny aretina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny firodorodon’ireo fahavalo
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Andray izany firodorodon’ny vahoaka marobe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fikotrokotroky ny ranomasina misafoaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andray izato fitrenan’ireo firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny fidoboky ny onja mahery!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fitrenan’ireo firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny fitrenan’ny ranomasimbe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa rahonan’ny Tompo izy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka lasa mandositra lavitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny akofa paohin’ny rivotra eny an-tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny vonin-javatra atambolimbolin’ny tadio
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Visavisain’ny mpaminany an-tsarisary sy an’ohatra eto ny fanafihan’ny Asirianina sy ny fandosirany niverina ilalana tamin’ny taona 701 tal J.K. (jereo 2 Mp 18.13–19.37).
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Vao takariva dia injao ny horohoro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy maraina akory dia efa foana izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izany no hanjo izay nandroba antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho anjaran’izay namabo antsika.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ho lao mandrakizay mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo tanàna manodidina azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tonga fitobian’ny ondry aman’osy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handry am-pilaminana ao ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hisy mpanelingelina azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy hisy manda fiarovana intsony any Efraîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efraîma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 11.13 sy nta.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisy fanjakana intsony koa any Damasy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay sisa tavela amin’ny Sirianina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hisy lanjany noho ny Israelita.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no teny hentitry ny TOMPOn’izao rehetra izao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Amin’izany andro izany dia hihena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lanjan’ny taranak’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny hatavezany hanjary fahiazana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ho tahaka ny amoriana ny vary amin’ny fararano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy anangonana ny salohim-bary eo an-trotroana izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho tahaka ny anangonana salohim-bary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny lohasahan’ny Refaita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lohasaha eo akaikin’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ' izany,'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ka tsy hisy amin’ny taranak’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afa-tsy sombintsombiny sisa hotsimponina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho tahaka ny fanintsanana voan’ôliva izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voany roa na telo no sisa eny an-tendrony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efatra na dimy eny amin’ny rantsany mahavokatra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no teny hentitry ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitr’i Israely.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Amin’izany andro izany, dia hitodika amin’Ilay Mpahary azy ny olona ary hanandratra ny masony ho amin’ilay Masin’i Israely. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsy hitodika any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' namboariny intsony izy ary tsy hijery ireo sampy nataon’ny tanany, na ny tsatokazo fanajana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserà
    - type: text
      text: ' na ny fandoroana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Amin’izany andro izany, dia hilaozana ireo tanàna mimandan’i Israely, tahaka ny nandaozana ny tanànan’ny Hivita sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' fahiny tamin’ny nahatongavan’ny Israelita; ka taniefitra mampalahelo no ho hany tavela.'
