document_id: JER.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny aviavy roa sobika
  - type: text
    content: 'Ary ny TOMPO naneho tamiko aviavy roa sobika izay voapetraka teo anoloan’ny tempoliny. Taorian’ny nitondran’i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' an’i Jekônià, zanakalahin’i Jôiakima sady mpanjakan’i Joda, sy ireo mpifehy an’i Joda mbamin’ireo mpahay taozavatra sy mpanefy vy tao Jerosalema ho babo tany Babilôna no nisehoan’izany. '
  '10':
  - type: text
    content: Halefako hamely azy ny ady sy ny mosary ary ny areti-mandringana mandra-pahalany ritra azy tsy ho eo amin’ny tany izay nomeko azy sy ny razany.
  '2':
  - type: text
    content: Ny sobika voalohany dia nisy aviavy tsara dia tsara toy ny aviavy masaka voalohany. Ny sobika faharoa kosa nisy aviavy ratsy loatra ka tsy azo hanina.
  '3':
  - type: text
    content: 'Dia nanontany ahy ny TOMPO hoe:'
  - type: text
    content: –Inona no hitanao, ry Jeremià?
  - type: text
    content: 'Namaly aho hoe:'
  - type: text
    content: '–Aviavy: ka ny sasany tsara dia tsara, fa ny sasany kosa ratsy loatra ka tsy azo hanina.'
  '4':
  - type: text
    content: 'Ary nisy indray hafatry ny TOMPO tamiko nanao hoe:'
  '5':
  - type: text
    content: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: Ho tahaka ireto aviavy tsara ireto no hijereko ny Jodeanina voababo izay noroahiko hiala teto amin’ity toerana ity hankany Babilônia. '
  '6':
  - type: text
    content: 'Fa hojereko am-pitiavana izy ka hampodîko amin’ity tany ity. Haoriko indray izy ka tsy horavako intsony, hamboleko indray ka tsy hongotako intsony. '
  '7':
  - type: text
    content: Homeko azy ny fo miaiky fa Izaho no TOMPO. Hiverina amiko amin’ny fony manontolo ireo; ka ho vahoakako izy, ary Izaho kosa ho Andriamaniny.
  '8':
  - type: text
    content: 'Fa ny amin’i Tsedekià mpanjakan’i Joda sy ny manamboninahiny mbamin’ireo mponina sisa tavela ao Jerosalema ary koa ireo olona tsy niala teo amin’ity tany ity sy ireo lasa nipetraka tany Ejipta, dia izao no lazain’ny TOMPO: Hataoko toy ny aviavy ratsy izay tsy azo hanina noho ny haratsiny izy. '
  '9':
  - type: text
    content: 'Hatolotro ho fampihorohoroana ny fanjakana rehetra eto an-tany izy; ka na aiza na aiza hanapariahako azy, dia ho ohatra fandatsana sy fanarabiana ary fanesoana sy fanozonana izy. '
