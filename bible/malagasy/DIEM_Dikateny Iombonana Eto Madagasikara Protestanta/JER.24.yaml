document_id: JER.24,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny aviavy roa sobika
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny TOMPO naneho tamiko aviavy roa sobika izay voapetraka teo anoloan’ny tempoliny. Taorian’ny nitondran’i Nebokadnetsara mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: text
      text: ' an’i Jekônià, zanakalahin’i Jôiakima sady mpanjakan’i Joda, sy ireo mpifehy an’i Joda mbamin’ireo mpahay taozavatra sy mpanefy vy tao Jerosalema ho babo tany Babilôna no nisehoan’izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Halefako hamely azy ny ady sy ny mosary ary ny areti-mandringana mandra-pahalany ritra azy tsy ho eo amin’ny tany izay nomeko azy sy ny razany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny sobika voalohany dia nisy aviavy tsara dia tsara toy ny aviavy masaka voalohany. Ny sobika faharoa kosa nisy aviavy ratsy loatra ka tsy azo hanina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany ahy ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no hitanao, ry Jeremià?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namaly aho hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aviavy: ka ny sasany tsara dia tsara, fa ny sasany kosa ratsy loatra ka tsy azo hanina.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy indray hafatry ny TOMPO tamiko nanao hoe:'
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: Ho tahaka ireto aviavy tsara ireto no hijereko ny Jodeanina voababo izay noroahiko hiala teto amin’ity toerana ity hankany Babilônia. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa hojereko am-pitiavana izy ka hampodîko amin’ity tany ity. Haoriko indray izy ka tsy horavako intsony, hamboleko indray ka tsy hongotako intsony. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Homeko azy ny fo miaiky fa Izaho no TOMPO. Hiverina amiko amin’ny fony manontolo ireo; ka ho vahoakako izy, ary Izaho kosa ho Andriamaniny.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny amin’i Tsedekià mpanjakan’i Joda sy ny manamboninahiny mbamin’ireo mponina sisa tavela ao Jerosalema ary koa ireo olona tsy niala teo amin’ity tany ity sy ireo lasa nipetraka tany Ejipta, dia izao no lazain’ny TOMPO: Hataoko toy ny aviavy ratsy izay tsy azo hanina noho ny haratsiny izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatolotro ho fampihorohoroana ny fanjakana rehetra eto an-tany izy; ka na aiza na aiza hanapariahako azy, dia ho ohatra fandatsana sy fanarabiana ary fanesoana sy fanozonana izy. '
