document_id: 2KI.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanao fahirano an’i Jerosalema i Nebokadnetsara
  - type: heading
    content: (Jereo Jer 39.1-7; 52.3-11)
  - type: text
    content: Ary nikomy tamin’i Nebokadnetsara mpanjakan’i Babilôna i Tsedekià
  - type: note
    content: 'Ny andro fahafolon’ny volana fahafolo: faramparan’ny desambra taona 589 tal J.K. –Jereo Jer 21.1-10; 34.1-5; Ezek 24.2.'
  - type: text
    content: '. '
  - type: text
    content: 'Koa tonga tao Jerosalema niaraka tamin’ny tafiny manontolo i Nebokadnetsara. Nitoby manoloana ny tanàna ireo miaramilany, ary nanao tovon-tany manodidina an’i Jerosalema. Taona fahasivy nanjakan’i Tsedekià tamin’izay, ary andro fahafolon’ny volana fahafolo. '
  '10':
  - type: text
    content: Ny manda manodidina an’i Jerosalema dia narodan’ny miaramila babilônianina rehetra izay niaraka tamin’ny filohan’ny mpiambina.
  '11':
  - type: text
    content: 'Dia nentin’i Nebozaradàna ho babo ireo mponina sisa tao an-tanàna sy ireo olona nitolo-batana tamin’ny mpanjakan’i Babilôna ary ny sisa tamin’ireo mpahay taozavatra. '
  '12':
  - type: text
    content: Kanefa dia nisy ampahan’ny vahoaka mahantra navelany mba hamboly ny tanimboaloboka sy ny saha.
  '13':
  - type: text
    content: Nopotehin’ny Babilônianina ireo andry halimo tao an-tranon’ny TOMPO mbamin’ireo kalesy ary ilay fitobian-drano halimo goavana teo an-kianja; dia nentiny nankany Babilôna avokoa ny halimo tamin’izany
  - type: note
    content: Momba ireo andry, jereo 1 Mp 7.15-22; momba ireo kalesy, jereo 1 Mp 7.27-37; momba ilay fitobian-drano goavana, jereo 1 Mp 7.23-26.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Nalainy koa ny fanaka halimo rehetra fampiasa amin’ny fanompoam-pivavahana, dia ny vilany fasian-davenona sy ny sotron’afo mbamin’ny antsy sy ny lovia. '
  '15':
  - type: text
    content: Nentin’ny filohan’ny mpiambina koa ny fitaovana volamena sy volafotsy rehetra toy ny fandoroana zava-manitra sy ny tsatokaty famafazana
  - type: note
    content: Momba ireo kojakoja halimo (and 14) sy volafotsy ary volamena fampiasa amin’ny fanompoam-pivavahana, jereo 1 Mp 7.45-51.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Tsy hita lanja ny halimo tamin’ireo fanaka rehetra nataon’i Salômôna ho an’ny tranon’ny TOMPO, dia ireo andry anankiroa sy ilay fitobian-drano goavana ary ireo kalesy. '
  '17':
  - type: text
    content: Ny andry tsirairay dia sivy metatra ny haavony ary misy lohany halimo izay mahatratra iray metatra sy sasany ny haavony sady voaravaka harato sy ampongabendanitra halimo ny manodidina azy. Mitovy ireo andry roa sy ny ravaka natao taminy.
  '18':
  - type: text
    content: 'Dia nosamborin’ny filohan’ny mpiambina i Seraià mpisorombe sy i Tsefanià lefiny ary ireo mpisorona telo lahy mpiandry varavarana. '
  '19':
  - type: text
    content: 'Nosamboriny koa ny mpiasam-panjakana mpiandraikitra ny miaramila sy ny olona dimy lahy mpanolotsainan’ny mpanjaka, sy ny mpitantsoratr’ilay manamboninahitra misahana ny fiantsoana ho miaramila, ary ny teratany jodeanina miisa enimpolo lahy; fa samy hitany tao Jerosalema avokoa ireo. '
  '2':
  - type: text
    content: Naharitra hatramin’ny taona faha-11 nanjakan’i Tsedekià ny fanaovana fahirano
  - type: note
    content: 'taona faha-11 nanjakany: tamin’ny 587 tal J.K..'
  - type: text
    content: .
  '20':
  - type: text
    content: 'Nentin’i Nebozaradàna ho any amin’ny mpanjakan’i Babilôna tao Riblà anatin’ny faritr’i Hamata izy rehetra, '
  '21':
  - type: text
    content: ary nasain’ny mpanjaka hovonoina ho faty tao ihany.
  - type: text
    content: Toy izany no nitondrana ny vahoaka Jodeanina ho babo lavitry ny taniny.
  - type: heading
    content: I Gedalià, governoran’ny tanin’i Joda
  - type: heading
    content: (Jereo Jer 40.7–41.18)
  '22':
  - type: text
    content: 'Namela ampahan’ny vahoaka tao amin’ny tanin’i Joda ihany i Nebokadnetsara mpanjakan’i Babilôna; ka notendreny hifehy ireo olona ireo i Gedalià zanakalahin’i Ahikama sady zafikelin’i Safàna. '
  '23':
  - type: text
    content: 'Rehefa fantatry ny manamboninahitra sy ny miaramila jodeanina izay tsy nitolo-batana tamin’ny Babilônianina izany fanapahan-kevitr’i Nebokadnetsara izany, dia nankany amin’i Gedalià tany Mitsepà izy. Ireo manamboninahitra ireo dia i Jismahela zanakalahin’i Netanià, i Jôhanàna zanakalahin’i Karea, i Seraià zanakalahin’i Tanehometa avy any Netôfà, ary i Jaazanià avy any Mahekà. '
  '24':
  - type: text
    content: 'Dia nanizingizina tamin’ireo sy tamin’ny olom-peheziny i Gedalià nanao hoe:'
  - type: text
    content: –Aza matahotra ho anisan’ny mpanompon’ny Babilônianina ianareo; monena amin’ny tany ary maneke ny mpanjakan’i Babilôna, fa hahasoa anareo izany.
  '25':
  - type: text
    content: 'Kanjo tamin’ny volana fahafiton’io taona io ihany dia tonga tao Mitsepà niaraka tamin’ny olona folo lahy i Jismahela zanakalahin’i Netanià, ka namono nahafaty an’i Gedalià mbamin’ny Jodeanina sy ny Babilônianina izay tao aminy. '
  '26':
  - type: text
    content: Dia niainga nankany Ejipta ny olon-drehetra na kely na lehibe mbamin’ny manamboninahitra noho ireo natahotra ny Babilônianina
  - type: note
    content: Jereo Jer 43.5-7.
  - type: text
    content: .
  - type: heading
    content: Nahazo famotsoran-keloka tamin’ny mpanjakan’i Babilôna i Jôiakina
  - type: heading
    content: (Jereo Jer 52.31-34)
  '27':
  - type: text
    content: Fony 37 taona taorian’ny fanaovana sesitany an’i Jôiakina mpanjakan’i Joda
  - type: note
    content: Ny taona 561 tal J.K. no tonga mpanjakan’i Babilôna i Evila-Merôdaky.
  - type: text
    content: ', dia i Evila-Merôdaky no tonga mpanjakan’i Babilôna; koa tamin’ny volana faha-12, dia nomeny famotsoran-keloka i Jôiakina ka nasainy navoaka ny tranomaizina. '
  '28':
  - type: text
    content: 'Dia nanaovany teny mamy izy ary nomeny toerana ambony kokoa noho ny an’ireo mpanjaka hafa niaraka taminy tany Babilôna. '
  '29':
  - type: text
    content: 'Tsy navela hanao ny fitafian’ny mpigadra intsony izy, ary niara-nisakafo tamin’ny mpanjakan’i Babilôna nandritra ny andro sisa rehetra niainany. '
  '3':
  - type: text
    content: Mafy dia mafy ny mosary tao an-tanàna ka tsy nanan-kohanina ny mponina; ary tamin’ny andro fahasivin’ny volana fahefatra
  - type: note
    content: 'volana fahefatra: nampiana araka ny Jer 52.6. Ny daty dia tokony ho faramparan’ny Jona.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: Izany koa no nahazoan’i Jôiakina tamin’ny mpanjakan’i Babilôna ny zavatra nilainy araka ny sahaza azy isan’andro mandra-pahafatiny.
  '4':
  - type: text
    content: dia nisy noloahan’ireo Babilônianina ny mandan’ny tanàna. Koa nony alina dia nitsoaka nandositra ireo miaramila jodeanina rehetra
  - type: note
    content: 'nandositra... rehetra: araka izay voalazan’ny tohiny (and 5) sy ny tantaran’ny Jer 39.4, dia anisan’ireo nitsoaka nandositra koa i Tsedekià mpanjaka. –ny vavahady tanelanelan’ny manda roa: mety ho ao atsimon’ny tanàna. –Jereo koa Ezek 33.21.'
  - type: text
    content: '. Na dia voahodidin’ny Babilônianina aza ny tanàna, dia niala tao Jerosalema ireo ka nandalo ny vavahady tanelanelan’ny manda roa sady takaikin’ny zaridainan’ny mpanjaka; ary nihazo ny lalana mankany amin’ny lohasahan’i Jôrdàna i Tsedekià mpanjaka. '
  '5':
  - type: text
    content: 'Kanjo nenjehin’ny miaramila babilônianina izy ary tratrany teo amin’ny lemak’i Jerikao; dia nihahaka nandao an’i Tsedekià ny tafiny manontolo. '
  '6':
  - type: text
    content: Rehefa voasambotra ny mpanjaka, dia nentina tany amin’ny mpanjakan’i Babilôna izay tao Riblà
  - type: note
    content: 'Riblà: jereo 23.33 sy nta.'
  - type: text
    content: ', ary namoahana didim-pitsarana. '
  '7':
  - type: text
    content: Novonoina ho faty teo imason-drainy ireo zanakalahin’i Tsedekià. Avy teo dia nasain’i Nebokadnetsara nopotsirina ny mason’i Tsedekià; ary nasainy nafatotra gadra halimo izy ka nentina nankany Babilôna
  - type: note
    content: Jereo Ezek 12.13.
  - type: text
    content: .
  - type: heading
    content: Ny nahazoana an’i Jerosalema; ny fanaovana sesitany faharoa
  - type: heading
    content: (Jereo Jer 39.8-10; 52.12-30; 2 Tan 36.17-21)
  '8':
  - type: text
    content: Tamin’ny taona faha-19 nanjakan’i Nebokadnetsara mpanjakan’i Babilôna, nony andro fahafiton’ny volana fahadimy
  - type: note
    content: Faramparan’ny volana Jolay.
  - type: text
    content: ', dia tafiditra tao Jerosalema i Nebozaradàna filohan’ny mpiambina sady manamboninahitry ny mpanjakan’i Babilôna. '
  '9':
  - type: text
    content: 'Izy no nandoro ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sy ny lapan’ny mpanjaka ary ireo trano tao an-tanàna, indrindra ny an’ny olona ambony rehetra'
  - type: note
    content: Jereo 1 Mp 9.8.
  - type: text
    content: '. '
