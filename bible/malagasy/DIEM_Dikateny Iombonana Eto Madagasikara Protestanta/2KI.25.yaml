document_id: 2KI.25,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanao fahirano an’i Jerosalema i Nebokadnetsara
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Jer 39.1-7; 52.3-11)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nikomy tamin’i Nebokadnetsara mpanjakan’i Babilôna i Tsedekià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'andro fahafolon’ny volana fahafolo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: faramparan’ny desambra taona 589 tal J.K. –Jereo Jer 21.1-10; 34.1-5; Ezek 24.2.
      marker-yv: yv-n
    - type: text
      text: '. '
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa tonga tao Jerosalema niaraka tamin’ny tafiny manontolo i Nebokadnetsara. Nitoby manoloana ny tanàna ireo miaramilany, ary nanao tovon-tany manodidina an’i Jerosalema. Taona fahasivy nanjakan’i Tsedekià tamin’izay, ary andro fahafolon’ny volana fahafolo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny manda manodidina an’i Jerosalema dia narodan’ny miaramila babilônianina rehetra izay niaraka tamin’ny filohan’ny mpiambina.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nentin’i Nebozaradàna ho babo ireo mponina sisa tao an-tanàna sy ireo olona nitolo-batana tamin’ny mpanjakan’i Babilôna ary ny sisa tamin’ireo mpahay taozavatra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Kanefa dia nisy ampahan’ny vahoaka mahantra navelany mba hamboly ny tanimboaloboka sy ny saha.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nopotehin’ny Babilônianina ireo andry halimo tao an-tranon’ny TOMPO mbamin’ireo kalesy ary ilay fitobian-drano halimo goavana teo an-kianja; dia nentiny nankany Babilôna avokoa ny halimo tamin’izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ireo '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: andry
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo 1 Mp 7.15-22; momba ireo '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: kalesy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo 1 Mp 7.27-37; momba ilay '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: fitobian-drano goavana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo 1 Mp 7.23-26.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nalainy koa ny fanaka halimo rehetra fampiasa amin’ny fanompoam-pivavahana, dia ny vilany fasian-davenona sy ny sotron’afo mbamin’ny antsy sy ny lovia. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nentin’ny filohan’ny mpiambina koa ny fitaovana volamena sy volafotsy rehetra toy ny fandoroana zava-manitra sy ny tsatokaty famafazana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ireo kojakoja '
      - type: usfm
        marker: it
        children:
        - type: text
          text: halimo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 14) sy '
      - type: usfm
        marker: it
        children:
        - type: text
          text: volafotsy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ary '
      - type: usfm
        marker: it
        children:
        - type: text
          text: volamena
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' fampiasa amin’ny fanompoam-pivavahana, jereo 1 Mp 7.45-51.'
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tsy hita lanja ny halimo tamin’ireo fanaka rehetra nataon’i Salômôna ho an’ny tranon’ny TOMPO, dia ireo andry anankiroa sy ilay fitobian-drano goavana ary ireo kalesy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny andry tsirairay dia sivy metatra ny haavony ary misy lohany halimo izay mahatratra iray metatra sy sasany ny haavony sady voaravaka harato sy ampongabendanitra halimo ny manodidina azy. Mitovy ireo andry roa sy ny ravaka natao taminy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nosamborin’ny filohan’ny mpiambina i Seraià mpisorombe sy i Tsefanià lefiny ary ireo mpisorona telo lahy mpiandry varavarana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nosamboriny koa ny mpiasam-panjakana mpiandraikitra ny miaramila sy ny olona dimy lahy mpanolotsainan’ny mpanjaka, sy ny mpitantsoratr’ilay manamboninahitra misahana ny fiantsoana ho miaramila, ary ny teratany jodeanina miisa enimpolo lahy; fa samy hitany tao Jerosalema avokoa ireo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Naharitra hatramin’ny taona faha-11 nanjakan’i Tsedekià ny fanaovana fahirano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.2 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'taona faha-11 nanjakany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tamin’ny 587 tal J.K..
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nentin’i Nebozaradàna ho any amin’ny mpanjakan’i Babilôna tao Riblà anatin’ny faritr’i Hamata izy rehetra, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ary nasain’ny mpanjaka hovonoina ho faty tao ihany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no nitondrana ny vahoaka Jodeanina ho babo lavitry ny taniny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Gedalià, governoran’ny tanin’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Jer 40.7–41.18)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Namela ampahan’ny vahoaka tao amin’ny tanin’i Joda ihany i Nebokadnetsara mpanjakan’i Babilôna; ka notendreny hifehy ireo olona ireo i Gedalià zanakalahin’i Ahikama sady zafikelin’i Safàna. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Rehefa fantatry ny manamboninahitra sy ny miaramila jodeanina izay tsy nitolo-batana tamin’ny Babilônianina izany fanapahan-kevitr’i Nebokadnetsara izany, dia nankany amin’i Gedalià tany Mitsepà izy. Ireo manamboninahitra ireo dia i Jismahela zanakalahin’i Netanià, i Jôhanàna zanakalahin’i Karea, i Seraià zanakalahin’i Tanehometa avy any Netôfà, ary i Jaazanià avy any Mahekà. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nanizingizina tamin’ireo sy tamin’ny olom-peheziny i Gedalià nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza matahotra ho anisan’ny mpanompon’ny Babilônianina ianareo; monena amin’ny tany ary maneke ny mpanjakan’i Babilôna, fa hahasoa anareo izany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Kanjo tamin’ny volana fahafiton’io taona io ihany dia tonga tao Mitsepà niaraka tamin’ny olona folo lahy i Jismahela zanakalahin’i Netanià, ka namono nahafaty an’i Gedalià mbamin’ny Jodeanina sy ny Babilônianina izay tao aminy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia niainga nankany Ejipta ny olon-drehetra na kely na lehibe mbamin’ny manamboninahitra noho ireo natahotra ny Babilônianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 43.5-7.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nahazo famotsoran-keloka tamin’ny mpanjakan’i Babilôna i Jôiakina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Jer 52.31-34)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fony 37 taona taorian’ny fanaovana sesitany an’i Jôiakina mpanjakan’i Joda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny taona 561 tal J.K. no tonga mpanjakan’i Babilôna i Evila-Merôdaky.
      marker-yv: yv-n
    - type: text
      text: ', dia i Evila-Merôdaky no tonga mpanjakan’i Babilôna; koa tamin’ny volana faha-12, dia nomeny famotsoran-keloka i Jôiakina ka nasainy navoaka ny tranomaizina. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nanaovany teny mamy izy ary nomeny toerana ambony kokoa noho ny an’ireo mpanjaka hafa niaraka taminy tany Babilôna. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Tsy navela hanao ny fitafian’ny mpigadra intsony izy, ary niara-nisakafo tamin’ny mpanjakan’i Babilôna nandritra ny andro sisa rehetra niainany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mafy dia mafy ny mosary tao an-tanàna ka tsy nanan-kohanina ny mponina; ary tamin’ny andro fahasivin’ny volana fahefatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'volana fahefatra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nampiana araka ny Jer 52.6. Ny daty dia tokony ho faramparan’ny Jona.
      marker-yv: yv-n
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Izany koa no nahazoan’i Jôiakina tamin’ny mpanjakan’i Babilôna ny zavatra nilainy araka ny sahaza azy isan’andro mandra-pahafatiny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: dia nisy noloahan’ireo Babilônianina ny mandan’ny tanàna. Koa nony alina dia nitsoaka nandositra ireo miaramila jodeanina rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nandositra... rehetra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka izay voalazan’ny tohiny (and 5) sy ny tantaran’ny Jer 39.4, dia anisan’ireo nitsoaka nandositra koa i Tsedekià mpanjaka. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny vavahady tanelanelan’ny manda roa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': mety ho ao atsimon’ny tanàna. –Jereo koa Ezek 33.21.'
      marker-yv: yv-n
    - type: text
      text: '. Na dia voahodidin’ny Babilônianina aza ny tanàna, dia niala tao Jerosalema ireo ka nandalo ny vavahady tanelanelan’ny manda roa sady takaikin’ny zaridainan’ny mpanjaka; ary nihazo ny lalana mankany amin’ny lohasahan’i Jôrdàna i Tsedekià mpanjaka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Kanjo nenjehin’ny miaramila babilônianina izy ary tratrany teo amin’ny lemak’i Jerikao; dia nihahaka nandao an’i Tsedekià ny tafiny manontolo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Rehefa voasambotra ny mpanjaka, dia nentina tany amin’ny mpanjakan’i Babilôna izay tao Riblà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Riblà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 23.33 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ary namoahana didim-pitsarana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Novonoina ho faty teo imason-drainy ireo zanakalahin’i Tsedekià. Avy teo dia nasain’i Nebokadnetsara nopotsirina ny mason’i Tsedekià; ary nasainy nafatotra gadra halimo izy ka nentina nankany Babilôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Ezek 12.13.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahazoana an’i Jerosalema; ny fanaovana sesitany faharoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Jer 39.8-10; 52.12-30; 2 Tan 36.17-21)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tamin’ny taona faha-19 nanjakan’i Nebokadnetsara mpanjakan’i Babilôna, nony andro fahafiton’ny volana fahadimy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Faramparan’ny volana Jolay.
      marker-yv: yv-n
    - type: text
      text: ', dia tafiditra tao Jerosalema i Nebozaradàna filohan’ny mpiambina sady manamboninahitry ny mpanjakan’i Babilôna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izy no nandoro ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' sy ny lapan’ny mpanjaka ary ireo trano tao an-tanàna, indrindra ny an’ny olona ambony rehetra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 9.8.
      marker-yv: yv-n
    - type: text
