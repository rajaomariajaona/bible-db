document_id: 1SA.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Kabarin’i Samoela tamin’ny vahoaka Israelita
  - type: text
    content: 'Ary hoy i Samoela tamin’ny vahoaka israelita rehetra:'
  - type: text
    content: '–Indro efa nekeko avokoa izay rehetra nangatahinareo tamiko: nanendry mpanjaka hanjaka eo aminareo aho. '
  '10':
  - type: text
    content: 'Dia nitaraina tamin’ny TOMPO indray ireo razanareo ka nanao hoe: «TOMPO ô, efa nanota izahay satria nahafoy Anao ary nanompo ireo sampy, dia ny andriamani-dahy '
  - type: text
    content: Bahala
  - type: text
    content: ' sy ny andriamani-bavy '
  - type: text
    content: Hastôreta
  - type: note
    content: 'Bahala: jereo Mpits 10.10-15. –Hastôreta: jereo Mpits 2.13 sy nta.'
  - type: text
    content: '. Nefa ankehitriny, vonjeo amin’ny fahavalonay izahay, dia hanompo Anao.» '
  '11':
  - type: text
    content: Ary ny TOMPO naniraka an’i Gidehôna sy i Bedàna sy i Jeftà
  - type: note
    content: 'Gidehôna: jereo Mpits 6–8; Bedàna na hoe Baràka araka ny dkt grika sy siriaka tranainy (jereo Mpits 4.6); Jeftà: jereo Mpits 11.'
  - type: text
    content: ', ary farany ny tenako i Samoela, mba hamonjy anareo amin’ny fahavalo nanodidina anareo; koa dia nonina tsy nanana ahiahy teto amin’ny tany ianareo. '
  '12':
  - type: text
    content: 'Kanjo rehefa hitanareo fa avy hanafika anareo ny Nahasy mpanjakan’ny Hamônita, dia hoy ianareo tamiko: «Mila mpanjaka izahay'
  - type: note
    content: 'Nahasy: jereo toko 11. –Mila mpanjaka izahay: jereo 8.19.'
  - type: text
    content: '!»; toy ny hoe tsy mpanjakanareo ny TOMPO Andriamanitra. '
  '13':
  - type: text
    content: 'Koa indro ny mpanjaka izay nirinareo sy nangatahinareo hanjaka aminareo fa nomen’ny TOMPO anareo. '
  '14':
  - type: text
    content: 'Raha manaja sy manompo ny TOMPO Andriamanitrareo ianareo, raha mankatò ny teniny sy mitandrina ny didiny, dia mbola hanaraka AZY ianareo sy ny mpanjaka izay hifehy anareo. '
  '15':
  - type: text
    content: 'Fa raha tsy mankatò ny tenin’ny TOMPO sy tsy mitandrina ny didiny kosa ianareo, dia haneho ny heriny aminareo ny TOMPO, tahaka izay efa nataony fahiny tamin’ny razanareo. '
  '16':
  - type: text
    content: 'Ary ankehitriny mivonòna ianareo hijery ny zava-mahagaga lehibe izay hataon’ny TOMPO eo imasonareo. '
  '17':
  - type: text
    content: Tsy izao ve no fotoam-pijinjam-barim-bazaha? Hivavaka amin’ny TOMPO aho, dia hampikotroka ny andro sy hampilatsaka ny orana Izy
  - type: note
    content: Ny fotoam-pijinjam-barimbazaha dia eo amin’ny volana mey-jona eo, fotoana izay tena mampahalana ny orana any Palestinina.
  - type: text
    content: ; koa dia ho tsapanareo ny halehiben’ny ratsy vitanareo tamin’ny TOMPO raha nangataka mpanjaka ianareo.
  '18':
  - type: text
    content: 'Ary i Samoela nivavaka tamin’ny TOMPO, izay nampikotroka ny andro ary nampilatsaka ny orana androtriny ihany; ka nohajain’ny vahoaka rehetra tokoa ny Tompo sy i Samoela. '
  '19':
  - type: text
    content: 'Dia hoy ny besinimaro tamin’i Samoela:'
  - type: text
    content: –Ivavaho amin’ny TOMPO Andriamanitrao izahay mba tsy ho faty, fa fahotana maro no efa vitanay ankoatra ny fangatahanay mpanjaka ho anay.
  '2':
  - type: text
    content: 'Ary ankehitriny dia ny mpanjaka no hitarika anareo fa efa antitra sy osa aho, ary indreo ny zanako fa efa lehibe toa anareo. Nitondra anareo efa hatramin’ny fahatanorako aho ka mandraka androany. '
  '20':
  - type: text
    content: 'Hoy kosa i Samoela taminy:'
  - type: text
    content: '–Aza matahotra. Marina fa nanao ireny ratsy isan-karazany ireny tokoa ianareo; kanefa aza miala amin’ny TOMPO intsony, fa manompoa AZY amin’ny fonareo manontolo. '
  '21':
  - type: text
    content: 'Raha miala aminy ianareo, dia tsy maintsy manompo andriamani-tsiizy, izay tsy mahasoa na mahavonjy akory, satria zava-poana ihany. '
  '22':
  - type: text
    content: 'Fa tsy handao anareo ny TOMPO noho ny fitandroany ny voninahiny, satria efa sitrany ny nanao anareo ho vahoakany. '
  '23':
  - type: text
    content: 'Fa ny amiko kosa, dia sanatriaviko ny hanota amin’ny TOMPO ka hijanona tsy hivavaka ho anareo. Ary hatoroko anareo hatrany ny lalana tsara sy mahitsy. '
  '24':
  - type: text
    content: 'Izao ihany no ataoko aminareo: hajao ny TOMPO ka tompoy marina amin’ny fonareo manontolo, ary tsarovy ny zava-dehibe izay nataony ho anareo. '
  '25':
  - type: text
    content: Kanefa raha mbola mikiry manota ianareo, dia hiara-devona amin’ny mpanjakanareo.
  '3':
  - type: text
    content: Inty ny tenako, omeo tsiny eto anatrehan’ny TOMPO sy ny mpanjaka voahosony, raha toa ka nisy ombin’olona na borikiny nangalariko, na koa nisy olona nambakaiko sy nampahoriko, na nisy olona nandraisako tsolotra ho tapi-maso aminy; fa vonona ny hanonitra izany aho.
  '4':
  - type: text
    content: 'Dia hoy ny navalin’ny Israelita:'
  - type: text
    content: –Tsy nanambaka na nampahory anay ianao. Tsy nandray tsolotra na tamin’iza na tamin’iza koa ianao.
  '5':
  - type: text
    content: 'Hoy indray i Samoela tamin’izy ireo:'
  - type: text
    content: –Ny TOMPO sy ny mpanjaka no vavolombelona anio fa tsy nisy zavatra hitanareo tamiko hanomezan-tsiny ny tenako.
  - type: text
    content: 'Dia hoy ny vahoaka teo hoe:'
  - type: text
    content: –Eny, izy ireo no vavolombelona.
  '6':
  - type: text
    content: 'Ary hoy ihany i Samoela tamin’izy ireo:'
  - type: text
    content: –Ny TOMPO no vavolombelona, dia Izy izay nifidy an’i Mosesy sy i Aharôna, ka nampiakatra ny razanareo hiala tany Ejipta
  - type: note
    content: Jereo Eks 6.26.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ary ankehitriny mitsangàna eto anatrehan’ny TOMPO, fa hambarako hitsara anareo ireo soa rehetra nataon’ny TOMPO taminareo sy ny razanareo. '
  '8':
  - type: text
    content: Rehefa tonga tany Ejipta ry Jakôba, dia niantso vonjy tamin’ny TOMPO ny razanareo
  - type: note
    content: Jereo Eks 2.23.
  - type: text
    content: '; koa nandefa an’i Mosesy sy i Aharôna IZY hitondra azy hiala tany Ejipta ary hametraka azy amin’ity tany ity. '
  '9':
  - type: text
    content: Nefa nanadino ny TOMPO Andriamaniny ny razanareo, koa izany no namelany an’i Siserà, jeneralin’ny tafik’i Hatsôra sy namelany ny Filistinina ary ny mpanjakan’i Môaba hiady aminy ka handresy azy
  - type: note
    content: 'Siserà: jereo Mpits 4. –Hatsôra: tanàna tokony ho 15 km any avaratry ny farihin’i Genesareta. –Filistinina: jereo Mpits 13.1. –Môaba: jereo Mpits 3.12-14.'
  - type: text
    content: '. '
