document_id: 1SA.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kabarin’i Samoela tamin’ny vahoaka Israelita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Samoela tamin’ny vahoaka israelita rehetra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indro efa nekeko avokoa izay rehetra nangatahinareo tamiko: nanendry mpanjaka hanjaka eo aminareo aho. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia nitaraina tamin’ny TOMPO indray ireo razanareo ka nanao hoe: «TOMPO ô, efa nanota izahay satria nahafoy Anao ary nanompo ireo sampy, dia ny andriamani-dahy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: ' sy ny andriamani-bavy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hastôreta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bahala: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mpits 10.10-15. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hastôreta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Mpits 2.13 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. Nefa ankehitriny, vonjeo amin’ny fahavalonay izahay, dia hanompo Anao.» '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ny TOMPO naniraka an’i Gidehôna sy i Bedàna sy i Jeftà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gidehôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo Mpits 6–8; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Bedàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Baràka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' araka ny dkt grika sy siriaka tranainy (jereo Mpits 4.6); '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Jeftà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Mpits 11.'
      marker-yv: yv-n
    - type: text
      text: ', ary farany ny tenako i Samoela, mba hamonjy anareo amin’ny fahavalo nanodidina anareo; koa dia nonina tsy nanana ahiahy teto amin’ny tany ianareo. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Kanjo rehefa hitanareo fa avy hanafika anareo ny Nahasy mpanjakan’ny Hamônita, dia hoy ianareo tamiko: «Mila mpanjaka izahay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nahasy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo toko 11. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Mila mpanjaka izahay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 8.19.'
      marker-yv: yv-n
    - type: text
      text: '!»; toy ny hoe tsy mpanjakanareo ny TOMPO Andriamanitra. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa indro ny mpanjaka izay nirinareo sy nangatahinareo hanjaka aminareo fa nomen’ny TOMPO anareo. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha manaja sy manompo ny TOMPO Andriamanitrareo ianareo, raha mankatò ny teniny sy mitandrina ny didiny, dia mbola hanaraka AZY ianareo sy ny mpanjaka izay hifehy anareo. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa raha tsy mankatò ny tenin’ny TOMPO sy tsy mitandrina ny didiny kosa ianareo, dia haneho ny heriny aminareo ny TOMPO, tahaka izay efa nataony fahiny tamin’ny razanareo. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ankehitriny mivonòna ianareo hijery ny zava-mahagaga lehibe izay hataon’ny TOMPO eo imasonareo. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy izao ve no fotoam-pijinjam-barim-bazaha? Hivavaka amin’ny TOMPO aho, dia hampikotroka ny andro sy hampilatsaka ny orana Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fotoam-pijinjam-barimbazaha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia eo amin’ny volana mey-jona eo, fotoana izay tena mampahalana ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: orana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' any Palestinina.'
      marker-yv: yv-n
    - type: text
      text: ; koa dia ho tsapanareo ny halehiben’ny ratsy vitanareo tamin’ny TOMPO raha nangataka mpanjaka ianareo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Samoela nivavaka tamin’ny TOMPO, izay nampikotroka ny andro ary nampilatsaka ny orana androtriny ihany; ka nohajain’ny vahoaka rehetra tokoa ny Tompo sy i Samoela. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny besinimaro tamin’i Samoela:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ivavaho amin’ny TOMPO Andriamanitrao izahay mba tsy ho faty, fa fahotana maro no efa vitanay ankoatra ny fangatahanay mpanjaka ho anay.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ankehitriny dia ny mpanjaka no hitarika anareo fa efa antitra sy osa aho, ary indreo ny zanako fa efa lehibe toa anareo. Nitondra anareo efa hatramin’ny fahatanorako aho ka mandraka androany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Samoela taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza matahotra. Marina fa nanao ireny ratsy isan-karazany ireny tokoa ianareo; kanefa aza miala amin’ny TOMPO intsony, fa manompoa AZY amin’ny fonareo manontolo. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha miala aminy ianareo, dia tsy maintsy manompo andriamani-tsiizy, izay tsy mahasoa na mahavonjy akory, satria zava-poana ihany. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa tsy handao anareo ny TOMPO noho ny fitandroany ny voninahiny, satria efa sitrany ny nanao anareo ho vahoakany. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ny amiko kosa, dia sanatriaviko ny hanota amin’ny TOMPO ka hijanona tsy hivavaka ho anareo. Ary hatoroko anareo hatrany ny lalana tsara sy mahitsy. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izao ihany no ataoko aminareo: hajao ny TOMPO ka tompoy marina amin’ny fonareo manontolo, ary tsarovy ny zava-dehibe izay nataony ho anareo. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Kanefa raha mbola mikiry manota ianareo, dia hiara-devona amin’ny mpanjakanareo.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Inty ny tenako, omeo tsiny eto anatrehan’ny TOMPO sy ny mpanjaka voahosony, raha toa ka nisy ombin’olona na borikiny nangalariko, na koa nisy olona nambakaiko sy nampahoriko, na nisy olona nandraisako tsolotra ho tapi-maso aminy; fa vonona ny hanonitra izany aho.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’ny Israelita:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy nanambaka na nampahory anay ianao. Tsy nandray tsolotra na tamin’iza na tamin’iza koa ianao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray i Samoela tamin’izy ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny TOMPO sy ny mpanjaka no vavolombelona anio fa tsy nisy zavatra hitanareo tamiko hanomezan-tsiny ny tenako.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny vahoaka teo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, izy ireo no vavolombelona.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ihany i Samoela tamin’izy ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny TOMPO no vavolombelona, dia Izy izay nifidy an’i Mosesy sy i Aharôna, ka nampiakatra ny razanareo hiala tany Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 6.26.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ankehitriny mitsangàna eto anatrehan’ny TOMPO, fa hambarako hitsara anareo ireo soa rehetra nataon’ny TOMPO taminareo sy ny razanareo. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Rehefa tonga tany Ejipta ry Jakôba, dia niantso vonjy tamin’ny TOMPO ny razanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 2.23.
      marker-yv: yv-n
    - type: text
      text: '; koa nandefa an’i Mosesy sy i Aharôna IZY hitondra azy hiala tany Ejipta ary hametraka azy amin’ity tany ity. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nefa nanadino ny TOMPO Andriamaniny ny razanareo, koa izany no namelany an’i Siserà, jeneralin’ny tafik’i Hatsôra sy namelany ny Filistinina ary ny mpanjakan’i Môaba hiady aminy ka handresy azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Siserà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mpits 4. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hatsôra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tanàna tokony ho 15 km any avaratry ny farihin’i Genesareta. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Filistinina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Mpits 13.1. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Môaba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Mpits 3.12-14.'
      marker-yv: yv-n
    - type: text
      text: '. '
