document_id: JOS.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahazoana an’i Hay
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Josoa:'
  - type: text
    content: '–Aza matahotra na mivadi-po ianao. Ento miaraka aminao ny tafikao manontolo ka miaingà hamely an’i Hay. Indro fa hatolotro ho eo an-tananao ny mpanjakan’i Hay sy ny vahoaka ary ny tanànany sy ny taniny. '
  '10':
  - type: text
    content: 'Nony ampitso dia nifoha vao maraina be i Josoa ka nisafo ny tafika; avy eo dia nitarika azy hiakatra hamely an’i Hay izy sy ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely. '
  '11':
  - type: text
    content: 'Ny miaramila rehetra izay niaraka tamin’i Josoa dia niakatra ka tonga teo amin’ny tandrifin’ny tanàna; ary nitoby teo avaratr’i Hay ireo ka lohasaha no nanelanelana azy amin’ny tanàna. '
  '12':
  - type: text
    content: Efa nifantina tokony ho dimy arivo lahy
  - type: note
    content: 'dimy arivo lahy: mifanohitra amin’ny isa telo alina voalaza etsy aloha (and 3) izany kanefa toa mba mitombina kokoa.'
  - type: text
    content: ' moa i Josoa ka nametraka azy hamitsaka teo andrefan’ny tanàna, teo anelanelan’i Betela sy i Hay. '
  '13':
  - type: text
    content: 'Ny tafika ankapobeny dia nitoby tao avaratry ny tanàna ary ny andiany sasany kosa tao andrefana, fa i Josoa nandany ny alina tao an-dohasaha. '
  '14':
  - type: text
    content: 'Raha nahita izany ny mpanjakan’i Hay, dia nampamoha vao maraina ny lehilahy tao an-tanàna; ary nivoaka faingana hifanehatra amin’ny Israelita izy mbamin’ny miaramilany rehetra, ka niroso nankany amin’ny toerana efa nifamotoanany teo aloha, any amin’ny lohasahan’i Jôrdàna; nefa tsy fantatry ny mpanjaka fa misy miaramila namitsaka hamely azy tao ivohon’ny tanàna. '
  '15':
  - type: text
    content: Nody resy teo anatrehany kosa i Josoa sy ny Israelita rehetra ka nandositra tamin’ny lalana mankany an-taniefitra
  - type: note
    content: 'lalana mankany an-taniefitra: izany hoe mankany amin’ireo toerana tsy misy mponina manamorona ny lohasahan’i Jôrdàna.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Dia nifampiantso hanenjika azy ny lehilahy rehetra tao an-tanàna, ary nanenjika an-dry i Josoa ka voatarika ho lasa lavitry ny tanàna. '
  '17':
  - type: text
    content: Tsy nisy lehilahy tavela intsony tao Hay
  - type: note
    content: 'tao Hay: araka ny dkt grika tranainy Septoazinta; fa ny TM kosa milaza hoe tao Hay sy Betela.'
  - type: text
    content: 'fa samy nivoaka hanenjika ny Israelita avokoa, ary namela ny tanàna hidanadana teo. '
  '18':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Josoa:'
  - type: text
    content: –Ambano amin’ny lefona eny an-tananao i Hay satria hatolotro eo an-tananao izy.
  - type: text
    content: 'Dia nanambanan’i Josoa ny tanàna ilay lefona teny an-tanany. '
  '19':
  - type: text
    content: Fa raha vao naninji-tanana i Josoa, dia niroatra avy tao amin’ny fiafenany faingana ireo Israelita namitsaka, ary nihazakazaka niditra ny tanàna ka naka azy sady nandoro azy avy hatrany.
  '2':
  - type: text
    content: Tahaka izay nataonao tamin’i Jerikao sy ny mpanjakany no hataonao amin’i Hay sy ny mpanjakany, saingy azonareo baboina avokoa ny fananany sy ny biby fiompiny. Ametraho miaramila mamitsaka hamely ny tanàna avy ao ivoho
  - type: note
    content: Ny ivohon’ny tanàna eto dia ilazana ny lafiny mifanohitra amin’ny vavahady; mazava ho azy fa ny vavahady no ifantohan’ny mason’ireo mpiaro ny tanàna.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Nony nitodika ireo lehilahin’i Hay, dia nahita fa niakatra ho any an-danitra ny setroky ny tanànany. Tsy nisy toerana handosirany intsony na ho aiza na ho aiza, fa ny Israelita izay nandositra ho any an-taniefitra dia nifotitra hamely ny mpanenjika azy. '
  '21':
  - type: text
    content: 'I Josoa sy ny Israelita rehetra manko, rehefa nahita fa azon’ireo miaramila avy tao ivoho ny tanàna ary niakatra ny setroky ny fandoroana azy, dia nifotitra ka namely ny lehilahin’i Hay. '
  '22':
  - type: text
    content: 'Ny Israelita tafiditra tao an-tanàna moa nivoaka hamely azy koa, hany ka latsaka teo afovoan’ny Israelita roa tonta ireo lehilahin’i Hay; nasian’ny Israelita ry zareo ka tsy nisy afa-nandositra, ary tsy nisy niangana velona '
  '23':
  - type: text
    content: 'afa-tsy ny mpanjakan’i Hay izay natao sambo-belona ary natolotra an’i Josoa. '
  '24':
  - type: text
    content: 'Novonoin’ny Israelita teny an-kodahoda avokoa ireo lehilahin’i Hay nanenjika azy. Ary rehefa matin’ny sabatra avokoa ireo, dia niverina tao Hay ny Israelita rehetra namely an-tsabatra ny mponina sisa tao. '
  '25':
  - type: text
    content: 'Maty tamin’izany andro izany avokoa ny mponina rehetra tao Hay, dia lehilahy sy vehivavy miisa 12 000. '
  '26':
  - type: text
    content: 'Tsy nampidinin’i Josoa ny tanany nanambana lefona ambara-paharingan’ny mponina rehetra tao Hay. '
  '27':
  - type: text
    content: 'Araka ny baiko nomen’ny TOMPO an’i Josoa dia ny biby fiompy sy ny fananana izay tao an-tanàna ihany no azon’ny Israelita baboina. '
  '28':
  - type: text
    content: Nodoran’i Josoa i Hay ary nataony antontan-trano rava sy haolo mandrakizay
  - type: note
    content: Ny anarana hoe Hay dia antontam-bato no heviny amin’ny teny Hebreo.
  - type: text
    content: ', ka dia toy izany mandraka androany. '
  '29':
  - type: text
    content: Ny mpanjakan’i Hay kosa nahantona tamin’ny hazo; ka teo ihany mandra-paharivan’ny andro. Nony nilentika ny masoandro, dia nasain’i Josoa naidina ny faty
  - type: note
    content: Ny fatin’ny olona nofaizina dia tsy azo ajanona hihantona eo foana mandritra ny alina (jereo Deot 21.22-23).
  - type: text
    content: ', ka natsipy teo akaikin’ny vavahadin’ny tanàna ary notsindrina antontan-bato miavoavo izay mbola ao mandraka androany.'
  - type: heading
    content: Ny famakiana ny lalàna teo an-tendrombohitra Hebala
  '3':
  - type: text
    content: 'Dia niainga hamely an’i Hay i Josoa sy ny tafiny. Ary i Josoa nifidy lehilahy mahery fo miisa telo alina, dia naniraka azy nony alina '
  '30':
  - type: text
    content: Tamin’izany, teo an-tendrombohitra Hebala
  - type: note
    content: Jereo Deot 11.29 sy nta.
  - type: text
    content: ', dia nanorenan’i Josoa '
  - type: text
    content: alitara
  - type: text
    content: ' ho an’ny TOMPO Andriamanitr’i Israely. '
  '31':
  - type: text
    content: 'Araka ny didy nampitain’i Mosesy mpanompon’ny TOMPO tamin’ny Israelita, eny, araka izany didy voasoratra tao amin’ilay bokin’ny lalànan’i Mosesy izany, no nanaovany azy: dia alitara natao tamin’ny vato tsy namboarina, tsy voapaikam-by'
  - type: note
    content: 'tsy namboarina...by: jereo Eks 20.24-26; Deot 27.5-6.'
  - type: text
    content: '. Teo ambonin’ireo no nanolorana '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana ho an’ny TOMPO. '
  '32':
  - type: text
    content: Teo amin’ny vaton’io alitara io no nanoratan’i Josoa ny kopian’ny lalàna izay nosoratan’i Mosesy
  - type: note
    content: 'teo amin’ny vaton’io alitara io: na hoe tamina vato. –ny lalàna izay nosoratan’i Mosesy: jereo Deot 27.2-3.'
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Ny Israelita rehetra mbamin’ny '
  - type: text
    content: loholony
  - type: text
    content: ' sy lehibeny ama-mpitsarany, ary koa ireo hafa firenena niara-nonina taminy, dia nitsangana teo andaniny sy ankilan’ilay '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ' ka nanatrika ny levita mpisorona izay nitondra azy. Teo akaikin’ny tendrombohitra Gerizima ny antsasak’ireo olona ireo, ary teo akaikin’ny tendrombohitr’i Hebala kosa ny antsasany, araka izay didy efa nomen’i Mosesy mpanompon’ny TOMPO mba '
  - type: text
    content: hitsofan-drano
  - type: text
    content: ' ny vahoaka Israely'
  - type: note
    content: 'Momba ireo Levita mpisorona, jereo Deot 17.9 sy nta. –teo an-tendrombohitra Gerizima: jereo Deot 11.29 sy nta. –araka izay efa nandidian’i Mosesy: jereo Deot 27.11-13.'
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Taorian’izany, dia novakîn’i Josoa avokoa ny teny raketin’ny bokin’ny lalàna mbamin’ny fitahiana sy ozona, araka izay rehetra voasoratra tao. '
  '35':
  - type: text
    content: Tsy nisy teny na dia iray aza tamin’izay rehetra nandidian’i Mosesy ka tsy novakîn’i Josoa teo anatrehan’ny fiangonan’ny Israelita tsivakivolo izay nahafaoka ny zaza amam-behivavy ary koa ny vahiny niara-nonina taminy.
  '4':
  - type: text
    content: 'sady nanome baiko azy hoe:'
  - type: text
    content: '–Mandehana mamitsaka ao ivohon’ny tanàna ianareo ka aza manalavitra azy loatra fa samia vonombonona. '
  '5':
  - type: text
    content: 'Izaho sy ny olona rehetra miaraka amiko kosa hanatona ny tanàna; ary rehefa mivoaka hifanehatra aminay toy ny tamin’ny voalohany ny mponin’i Hay, dia handositra eo anoloany izahay. '
  '6':
  - type: text
    content: 'Hivoaka hanenjika anay ireo ka hotarihinay ho lavitra ny tanàna. Hoheveriny manko fa mandositra eo anoloany toy ny tamin’ny voalohany izahay. '
  '7':
  - type: text
    content: 'Amin’izay ianareo no hipoitra avy ao amin’ny famitsahana ka haka ny tanàna, satria hatolotry ny TOMPO ho eo an-tananareo i Hay. '
  '8':
  - type: text
    content: Ary raha vao azonareo ny tanàna, dia dory amin’ny afo araka ny tenin’ny TOMPO. Izany no baiko omeko anareo.
  '9':
  - type: text
    content: Dia nalefan’i Josoa ireo lehilahy mahery fo ireo ho any amin’ny faritra hamitsahany ka lasa naka toerana teo andrefan’i Hay, teo anelanelan’i Betela sy i Hay; fa i Josoa nijanona teo anivon’ny tafika sisa ihany tamin’io alina io.
