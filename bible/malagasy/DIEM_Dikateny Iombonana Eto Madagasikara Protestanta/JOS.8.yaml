document_id: JOS.8,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahazoana an’i Hay
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Josoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza matahotra na mivadi-po ianao. Ento miaraka aminao ny tafikao manontolo ka miaingà hamely an’i Hay. Indro fa hatolotro ho eo an-tananao ny mpanjakan’i Hay sy ny vahoaka ary ny tanànany sy ny taniny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nony ampitso dia nifoha vao maraina be i Josoa ka nisafo ny tafika; avy eo dia nitarika azy hiakatra hamely an’i Hay izy sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’i Israely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny miaramila rehetra izay niaraka tamin’i Josoa dia niakatra ka tonga teo amin’ny tandrifin’ny tanàna; ary nitoby teo avaratr’i Hay ireo ka lohasaha no nanelanelana azy amin’ny tanàna. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Efa nifantina tokony ho dimy arivo lahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dimy arivo lahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mifanohitra amin’ny isa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: telo alina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' voalaza etsy aloha (and 3) izany kanefa toa mba mitombina kokoa.'
      marker-yv: yv-n
    - type: text
      text: ' moa i Josoa ka nametraka azy hamitsaka teo andrefan’ny tanàna, teo anelanelan’i Betela sy i Hay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny tafika ankapobeny dia nitoby tao avaratry ny tanàna ary ny andiany sasany kosa tao andrefana, fa i Josoa nandany ny alina tao an-dohasaha. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Raha nahita izany ny mpanjakan’i Hay, dia nampamoha vao maraina ny lehilahy tao an-tanàna; ary nivoaka faingana hifanehatra amin’ny Israelita izy mbamin’ny miaramilany rehetra, ka niroso nankany amin’ny toerana efa nifamotoanany teo aloha, any amin’ny lohasahan’i Jôrdàna; nefa tsy fantatry ny mpanjaka fa misy miaramila namitsaka hamely azy tao ivohon’ny tanàna. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nody resy teo anatrehany kosa i Josoa sy ny Israelita rehetra ka nandositra tamin’ny lalana mankany an-taniefitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lalana mankany an-taniefitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe mankany amin’ireo toerana tsy misy mponina manamorona ny lohasahan’i Jôrdàna.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nifampiantso hanenjika azy ny lehilahy rehetra tao an-tanàna, ary nanenjika an-dry i Josoa ka voatarika ho lasa lavitry ny tanàna. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tsy nisy lehilahy tavela intsony tao Hay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tao Hay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika tranainy Septoazinta; fa ny TM kosa milaza hoe tao '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hay sy Betela.
      marker-yv: yv-n
    - type: text
      text: 'fa samy nivoaka hanenjika ny Israelita avokoa, ary namela ny tanàna hidanadana teo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Josoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ambano amin’ny lefona eny an-tananao i Hay satria hatolotro eo an-tananao izy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanambanan’i Josoa ny tanàna ilay lefona teny an-tanany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa raha vao naninji-tanana i Josoa, dia niroatra avy tao amin’ny fiafenany faingana ireo Israelita namitsaka, ary nihazakazaka niditra ny tanàna ka naka azy sady nandoro azy avy hatrany.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tahaka izay nataonao tamin’i Jerikao sy ny mpanjakany no hataonao amin’i Hay sy ny mpanjakany, saingy azonareo baboina avokoa ny fananany sy ny biby fiompiny. Ametraho miaramila mamitsaka hamely ny tanàna avy ao ivoho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ivohon’ny tanàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto dia ilazana ny lafiny mifanohitra amin’ny vavahady; mazava ho azy fa ny vavahady no ifantohan’ny mason’ireo mpiaro ny tanàna.'
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nony nitodika ireo lehilahin’i Hay, dia nahita fa niakatra ho any an-danitra ny setroky ny tanànany. Tsy nisy toerana handosirany intsony na ho aiza na ho aiza, fa ny Israelita izay nandositra ho any an-taniefitra dia nifotitra hamely ny mpanenjika azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I Josoa sy ny Israelita rehetra manko, rehefa nahita fa azon’ireo miaramila avy tao ivoho ny tanàna ary niakatra ny setroky ny fandoroana azy, dia nifotitra ka namely ny lehilahin’i Hay. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny Israelita tafiditra tao an-tanàna moa nivoaka hamely azy koa, hany ka latsaka teo afovoan’ny Israelita roa tonta ireo lehilahin’i Hay; nasian’ny Israelita ry zareo ka tsy nisy afa-nandositra, ary tsy nisy niangana velona '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'afa-tsy ny mpanjakan’i Hay izay natao sambo-belona ary natolotra an’i Josoa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Novonoin’ny Israelita teny an-kodahoda avokoa ireo lehilahin’i Hay nanenjika azy. Ary rehefa matin’ny sabatra avokoa ireo, dia niverina tao Hay ny Israelita rehetra namely an-tsabatra ny mponina sisa tao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Maty tamin’izany andro izany avokoa ny mponina rehetra tao Hay, dia lehilahy sy vehivavy miisa 12 000. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tsy nampidinin’i Josoa ny tanany nanambana lefona ambara-paharingan’ny mponina rehetra tao Hay. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Araka ny baiko nomen’ny TOMPO an’i Josoa dia ny biby fiompy sy ny fananana izay tao an-tanàna ihany no azon’ny Israelita baboina. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Nodoran’i Josoa i Hay ary nataony antontan-trano rava sy haolo mandrakizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia '
      - type: usfm
        marker: it
        children:
        - type: text
          text: antontam-bato
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no heviny amin’ny teny Hebreo.'
      marker-yv: yv-n
    - type: text
      text: ', ka dia toy izany mandraka androany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny mpanjakan’i Hay kosa nahantona tamin’ny hazo; ka teo ihany mandra-paharivan’ny andro. Nony nilentika ny masoandro, dia nasain’i Josoa naidina ny faty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fatin’ny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' olona nofaizina dia tsy azo ajanona hihantona eo foana mandritra ny alina (jereo Deot 21.22-23).'
      marker-yv: yv-n
    - type: text
      text: ', ka natsipy teo akaikin’ny vavahadin’ny tanàna ary notsindrina antontan-bato miavoavo izay mbola ao mandraka androany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famakiana ny lalàna teo an-tendrombohitra Hebala
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia niainga hamely an’i Hay i Josoa sy ny tafiny. Ary i Josoa nifidy lehilahy mahery fo miisa telo alina, dia naniraka azy nony alina '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tamin’izany, teo an-tendrombohitra Hebala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 11.29 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', dia nanorenan’i Josoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' ho an’ny TOMPO Andriamanitr’i Israely. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Araka ny didy nampitain’i Mosesy mpanompon’ny TOMPO tamin’ny Israelita, eny, araka izany didy voasoratra tao amin’ilay bokin’ny lalànan’i Mosesy izany, no nanaovany azy: dia alitara natao tamin’ny vato tsy namboarina, tsy voapaikam-by'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy namboarina...by: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 20.24-26; Deot 27.5-6.
      marker-yv: yv-n
    - type: text
      text: '. Teo ambonin’ireo no nanolorana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorom-pihavanana ho an’ny TOMPO. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Teo amin’ny vaton’io alitara io no nanoratan’i Josoa ny kopian’ny lalàna izay nosoratan’i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'teo amin’ny vaton’io alitara io: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tamina vato
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny lalàna izay nosoratan’i Mosesy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Deot 27.2-3.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ny Israelita rehetra mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholony
    - type: text
      text: ' sy lehibeny ama-mpitsarany, ary koa ireo hafa firenena niara-nonina taminy, dia nitsangana teo andaniny sy ankilan’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
    - type: text
      text: ' ka nanatrika ny levita mpisorona izay nitondra azy. Teo akaikin’ny tendrombohitra Gerizima ny antsasak’ireo olona ireo, ary teo akaikin’ny tendrombohitr’i Hebala kosa ny antsasany, araka izay didy efa nomen’i Mosesy mpanompon’ny TOMPO mba '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitsofan-drano
    - type: text
      text: ' ny vahoaka Israely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Levita mpisorona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo Deot 17.9 sy nta. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –teo an-tendrombohitra Gerizima
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Deot 11.29 sy nta. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –araka izay efa nandidian’i Mosesy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Deot 27.11-13.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Taorian’izany, dia novakîn’i Josoa avokoa ny teny raketin’ny bokin’ny lalàna mbamin’ny fitahiana sy ozona, araka izay rehetra voasoratra tao. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Tsy nisy teny na dia iray aza tamin’izay rehetra nandidian’i Mosesy ka tsy novakîn’i Josoa teo anatrehan’ny fiangonan’ny Israelita tsivakivolo izay nahafaoka ny zaza amam-behivavy ary koa ny vahiny niara-nonina taminy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'sady nanome baiko azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana mamitsaka ao ivohon’ny tanàna ianareo ka aza manalavitra azy loatra fa samia vonombonona. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izaho sy ny olona rehetra miaraka amiko kosa hanatona ny tanàna; ary rehefa mivoaka hifanehatra aminay toy ny tamin’ny voalohany ny mponin’i Hay, dia handositra eo anoloany izahay. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hivoaka hanenjika anay ireo ka hotarihinay ho lavitra ny tanàna. Hoheveriny manko fa mandositra eo anoloany toy ny tamin’ny voalohany izahay. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Amin’izay ianareo no hipoitra avy ao amin’ny famitsahana ka haka ny tanàna, satria hatolotry ny TOMPO ho eo an-tananareo i Hay. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary raha vao azonareo ny tanàna, dia dory amin’ny afo araka ny tenin’ny TOMPO. Izany no baiko omeko anareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia nalefan’i Josoa ireo lehilahy mahery fo ireo ho any amin’ny faritra hamitsahany ka lasa naka toerana teo andrefan’i Hay, teo anelanelan’i Betela sy i Hay; fa i Josoa nijanona teo anivon’ny tafika sisa ihany tamin’io alina io.
