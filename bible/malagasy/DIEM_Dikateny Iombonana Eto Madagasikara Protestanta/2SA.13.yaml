document_id: 2SA.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Amnôna sy i Tamara
  - type: text
    content: 'Izao no nitranga taorian’izany: I Absalôma zanakalahin’i Davida dia nanana anabavy tsara tarehy natao hoe Tamara. Raiki-pitia taminy i Amnôna zanakalahin’i Davida anankiray. '
  '10':
  - type: text
    content: 'Ary hoy izy tamin’i Tamara:'
  - type: text
    content: –Ento atỳ am-parafarako ny sakafo mba hihinanako izay arosonao ahy.
  - type: text
    content: 'Dia nalain’i Tamara ny mofo izay namboariny ka nentiny teo am-parafaran’i Amnôna anadahiny. '
  '11':
  - type: text
    content: 'Nefa raha iny nandroso mofo hohaniny iny razazavavy, dia nohazonin’i Amnôna ka nataony hoe:'
  - type: text
    content: –Avia handry amiko, ranabavy.
  '12':
  - type: text
    content: 'Fa hoy izy taminy:'
  - type: text
    content: '–Tsia, ranadahy, aza manao an-keriny ahy, fa tsy fanao eto Israely izany. Aza manao izany zava-pady izany. '
  '13':
  - type: text
    content: Ny amiko, hoentiko mankaiza moa ny henatro? Fa ianao koa dia ho tahaka ny iray amin’ny adala eto Israely. Mitenena re amin’ny mpanjaka fa tsy handa ny hanambadianao ahy izy.
  '14':
  - type: text
    content: 'Tsy nety nihaino an-drazazavavy anefa i Amnôna fa natanjaka noho izy, ka nanao an-keriny azy ary niray taminy. '
  '15':
  - type: text
    content: 'Nony avy teo dia nankahala azy mafy i Amnôna, ka be lavitra ny fankahalàny azy noho ny fitiavany azy taloha. Hoy i Amnôna taminy:'
  - type: text
    content: –Mitsangàna ka mandehana any.
  '16':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: –Tsia, fa ho heloka ratsy kokoa noho izay efa nataonao tamiko ny fandroahanao ahy.
  - type: text
    content: 'Nefa mbola tsy nety nihaino azy ihany i Amnôna. '
  '17':
  - type: text
    content: 'Dia niantso ny zatovolahiny izy ka nanao taminy hoe:'
  - type: text
    content: –Roahy hiala eto amiko io vehivavy io; dia hidio ny varavarana, rehefa tafavoaka izy.
  '18':
  - type: text
    content: 'Dia navoakan’ilay mpanompo izy; ary nohidiany ny varavarana, rehefa tafavoaka izy. Nanao akanjo lava misoratsoratra i Tamara; fa izany no fentin’ny zanakavavin’ny mpanjaka, raha mbola virijiny izy. '
  '19':
  - type: text
    content: 'Norarahany lavenona ny lohany ary '
  - type: text
    content: notriariny ny akanjo
  - type: text
    content: ' lava teny aminy; dia niloloha tanana izy sady nikiakiaka nitomany teny am-pandehanana. '
  '2':
  - type: text
    content: Niferinaina i Amnôna ary nandraiki-narary noho ny amin’i Tamara anabaviny, satria virijiny
  - type: note
    content: Ny vehivavy izay tonga taona hanambady nefa mbola mpitovo dia tsy afaka miaraka an-kalalahana amin-dehilahy, na dia amin’ny havany aza, fa tsy maintsy mitokan-toerana any amin’ny efitry ny vehivavy izy.
  - type: text
    content: ' izy io ka sarotra tamin’i Amnôna ny haka azy. '
  '20':
  - type: text
    content: 'Ary hoy Absalôma anadahiny taminy: «Nanaovan’i Amnôna anadahinao an-keriny angaha ianao? Mangina aloha, ranabavy, fa anadahinao izy ary aza malahelo amin’izany.» Koa nitoetra irery nalahelo tao an-tranon’i Absalôma anadahiny i Tamara. '
  '21':
  - type: text
    content: Rehefa ren’i Davida mpanjaka izany, dia tezitra mafy izy; kanefa tsy nomeny tsiny i Amnôna satria lahimatoany sady tiany loatra
  - type: note
    content: 'kanefa...: ireo teny ireo izay tsy ao amin’ny rijan-teny hebreo mahazatra, dia naverina araka ny stf hebreo iray sy ny dkt grika sy latinina tranainy.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: Ary tsy nifampiteny intsony tamin’i Amnôna i Absalôma, satria halan’i Absalôma izy noho ny nanaovany an-keriny an’i Tamara anabaviny.
  - type: heading
    content: Ny nahafatesan’i Amnôna sy ny nandosiran’i Absalôma
  '23':
  - type: text
    content: Roa taona taorian’izany, dia nampanety ondry tao Bahàla-Hatsôra akaikin’i Efraîma
  - type: note
    content: 'Bahàla-Hatsôra sy Efraîma: toerana roa tokony ho 25 km avaratr’i Jerosalema.'
  - type: text
    content: '. Nasain’i Absalôma avokoa ny zanakalahin’ny mpanjaka. '
  '24':
  - type: text
    content: 'Nankao amin’ny mpanjaka i Absalôma ka nanao hoe:'
  - type: text
    content: –Indro hampanety ondry aho, ry mpanjaka; koa mba tongava any amiko ny tenanao sy ireo minisitrao.
  '25':
  - type: text
    content: 'Fa hoy ny mpanjaka tamin’i Absalôma:'
  - type: text
    content: –Tsia, anaka, aoka tsy handeha avokoa izahay sao dia hanahirana anao.
  - type: text
    content: 'Nikiry ihany i Absalôma, nefa tsy nety nandeha ny mpanjaka fa '
  - type: text
    content: nitsodrano
  - type: text
    content: ' azy fotsiny. '
  '26':
  - type: text
    content: 'Dia hoy i Absalôma:'
  - type: text
    content: –Raha tsy mety kosa àry ianao, dia aoka i Amnôna rahalahiko no handeha hiaraka aminay.
  - type: text
    content: 'Ary hoy ny mpanjaka taminy:'
  - type: text
    content: –Fa ahoana izy no handeha hiaraka aminao?
  '27':
  - type: text
    content: 'Mbola nikiry hatrany i Absalôma, ka farany navelan’ny mpanjaka handeha hiaraka aminy ihany i Amnôna sy ireo zanakalahiny hafa rehetra. Dia nanomana fanasana tahaka ny fanasà-mpanjaka i Absalôma. '
  '28':
  - type: text
    content: 'Izao kosa no baiko nomeny an’ireo mpanompony:'
  - type: text
    content: '–Jereo tsara, fa rehefa falin-divay ny fon’i Amnôna ka milaza aminareo aho hoe: «Asio i Amnôna!», dia vonoy ho faty izy. Aza matahotra. Moa tsy izaho va no nanome baiko anareo? Koa sahia ary misehoa ho mahery fo!'
  '29':
  - type: text
    content: Dia notanterahin’ny mpanompon’i Absalôma tamin’i Amnôna araka izay baikon’i Absalôma izany. Dia nitsangana avokoa ny zanakalahin’ny mpanjaka hafa ka samy nitaingina ny borikiny ary nandositra.
  '3':
  - type: text
    content: 'Fa i Amnôna kosa nanan-tsakaiza natao hoe Jônadaba sady zanakalahin’i Simehà izay rahalahin’i Davida; ary io Jônadaba io dia tena lalin-tsaina. '
  '30':
  - type: text
    content: 'Fa raha mbola teny an-dalana izy ireo, dia efa ren’i Davida ny vaovao hoe: «Novonoin’i Absalôma ho faty avokoa ny zanakalahinao, ka tsy nisy niangana na dia iray aza.» '
  '31':
  - type: text
    content: 'Dia nitsangana ny mpanjaka ka '
  - type: text
    content: nandriatra ny akanjony
  - type: text
    content: ' ary nandry tamin’ny tany. Nijoro teo koa ny minisitra rehetra, samy rovitra akanjo avokoa. '
  '32':
  - type: text
    content: 'Fa i Jônadaba zanakalahin’i Simehà izay rahalahin’i Davida kosa nandray fitenenana ka nanao hoe:'
  - type: text
    content: '–Aoka ianao, ry andriamanjaka, tsy hihevitra fa maty avokoa ny tovolahy rehetra zanakao. Tsia, i Amnôna ihany no maty; ary izany dia fanapahan-kevitr’i Absalôma hatramin’ny andro nanaovan’i Amnôna an-keriny an’i Tamara anabaviny. '
  '33':
  - type: text
    content: 'Koa aoka ianao, ry andriamanjaka, tsy hieritreritra fa maty avokoa ny zanakalahinao; tsia, i Amnôna ihany no maty, '
  '34':
  - type: text
    content: ary nandositra i Absalôma.
  - type: text
    content: 'Fa raha niandrandra ny mpanompo izay nasaina niambina, dia nahita andian’olona marobe nidina ny tendrombohitra tamin’ny lalan’i Hôrônaima. Dia nankany amin’ny mpanjaka ilehio ka nitantara izay zavatra hitany. '
  '35':
  - type: text
    content: 'Hoy i Jônadaba tamin’ny mpanjaka:'
  - type: text
    content: –Indreo tokoa, araka izay efa voalazako taminao, fa tonga ireo zanakalahinao.
  '36':
  - type: text
    content: Vao tapitra ny teniny, dia indreo tonga ny zanakalahin’ny mpanjaka samy nigogogogo nitomany; ary mba nanao ranomaso havozona koa ny mpanjaka sy ny minisitra rehetra.
  '37':
  - type: text
    content: I Absalôma dia nandositra nankany amin’i Talmay zanakalahin’i Hamihoda sady mpanjakan’i Gesora
  - type: note
    content: 'Gesora: fanjakana kely sirianina entina printsy ao atsinanan’ny farihin’i Genesareta. Araka ny 3.3 dia i Talmay no raiben’i Absalôma avy amin-dreniny.'
  - type: text
    content: ' ka nijanona tany telo taona. Nisaona an-janany hatrany kosa i Davida nandritra izany fotoana izany. '
  '39':
  - type: text
    content: Ary natsahatr’i Davida mpanjaka ny fanenjehany an’i Absalôma fa efa nionona ny alahelony tamin’ny nahafatesan’i Amnôna.
  '4':
  - type: text
    content: 'Ka hoy izy tamin’i Amnôna:'
  - type: text
    content: –Fa nahoana no maloka endrika isan’andro toy izao ianao, ry zanaky ny mpanjaka? Tsy tianao lazaina amiko ve izany?
  - type: text
    content: 'Dia hoy i Amnôna taminy:'
  - type: text
    content: –Tiako i Tamara anabavin’i Absalôma rahalahiko.
  '5':
  - type: text
    content: 'Ary hoy i Jônadaba taminy:'
  - type: text
    content: '–Mandria eo am-parafaranao, ka manaova sari-marary. Rehefa tonga hamangy anao ny rainao, dia lazao hoe: «Mba avelao i Tamara anabaviko no hitondra sakafo ho ahy, aoka ho eto imasoko no hikarakarany izany mba ho hitako ka hihinanako izay arosony.»'
  '6':
  - type: text
    content: 'Dia nandry i Amnôna ka nanao sari-marary. Ary tonga ny mpanjaka hamangy azy ka nilazany hoe:'
  - type: text
    content: –Mba avelao hankatỳ i Tamara anabaviko hanao mofo roa ho ahy eto imasoko hihinanako izay arosony.
  '7':
  - type: text
    content: 'Naniraka olona nankany amin’i Tamara i Davida hilaza aminy hoe:'
  - type: text
    content: –Mankanesa kely any amin’i Amnôna anadahinao ka manamboara sakafo ho azy.
  '8':
  - type: text
    content: 'Dia nankany amin’i Amnôna anadahiny i Tamara ka nahita azy teo am-pandriana. Naka koba razazavavy, dia nofetainy ary novolavolainy sy nendasiny ho mofo teo imasony. '
  '9':
  - type: text
    content: 'Rehefa izany, dia noraisiny ny lapoaly ka narosony azy ny tao anatiny, nefa tsy nety nihinana izy. Ary hoy i Amnôna:'
  - type: text
    content: –Avoahy avokoa ny olona rehetra.
  - type: text
    content: 'Dia nivoaka ny trano avokoa ny olona rehetra. '
