document_id: 2SA.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Amnôna sy i Tamara
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no nitranga taorian’izany: I Absalôma zanakalahin’i Davida dia nanana anabavy tsara tarehy natao hoe Tamara. Raiki-pitia taminy i Amnôna zanakalahin’i Davida anankiray. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy izy tamin’i Tamara:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ento atỳ am-parafarako ny sakafo mba hihinanako izay arosonao ahy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalain’i Tamara ny mofo izay namboariny ka nentiny teo am-parafaran’i Amnôna anadahiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nefa raha iny nandroso mofo hohaniny iny razazavavy, dia nohazonin’i Amnôna ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avia handry amiko, ranabavy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa hoy izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsia, ranadahy, aza manao an-keriny ahy, fa tsy fanao eto Israely izany. Aza manao izany zava-pady izany. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny amiko, hoentiko mankaiza moa ny henatro? Fa ianao koa dia ho tahaka ny iray amin’ny adala eto Israely. Mitenena re amin’ny mpanjaka fa tsy handa ny hanambadianao ahy izy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tsy nety nihaino an-drazazavavy anefa i Amnôna fa natanjaka noho izy, ka nanao an-keriny azy ary niray taminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nony avy teo dia nankahala azy mafy i Amnôna, ka be lavitra ny fankahalàny azy noho ny fitiavany azy taloha. Hoy i Amnôna taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitsangàna ka mandehana any.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, fa ho heloka ratsy kokoa noho izay efa nataonao tamiko ny fandroahanao ahy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa mbola tsy nety nihaino azy ihany i Amnôna. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia niantso ny zatovolahiny izy ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Roahy hiala eto amiko io vehivavy io; dia hidio ny varavarana, rehefa tafavoaka izy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia navoakan’ilay mpanompo izy; ary nohidiany ny varavarana, rehefa tafavoaka izy. Nanao akanjo lava misoratsoratra i Tamara; fa izany no fentin’ny zanakavavin’ny mpanjaka, raha mbola virijiny izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Norarahany lavenona ny lohany ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: notriariny ny akanjo
    - type: text
      text: ' lava teny aminy; dia niloloha tanana izy sady nikiakiaka nitomany teny am-pandehanana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Niferinaina i Amnôna ary nandraiki-narary noho ny amin’i Tamara anabaviny, satria virijiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny vehivavy izay tonga taona hanambady nefa mbola mpitovo dia tsy afaka miaraka an-kalalahana amin-dehilahy, na dia amin’ny havany aza, fa tsy maintsy mitokan-toerana any amin’ny efitry ny vehivavy izy.
      marker-yv: yv-n
    - type: text
      text: ' izy io ka sarotra tamin’i Amnôna ny haka azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy Absalôma anadahiny taminy: «Nanaovan’i Amnôna anadahinao an-keriny angaha ianao? Mangina aloha, ranabavy, fa anadahinao izy ary aza malahelo amin’izany.» Koa nitoetra irery nalahelo tao an-tranon’i Absalôma anadahiny i Tamara. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Rehefa ren’i Davida mpanjaka izany, dia tezitra mafy izy; kanefa tsy nomeny tsiny i Amnôna satria lahimatoany sady tiany loatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'kanefa...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo teny ireo izay tsy ao amin’ny rijan-teny hebreo mahazatra, dia naverina araka ny stf hebreo iray sy ny dkt grika sy latinina tranainy.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary tsy nifampiteny intsony tamin’i Amnôna i Absalôma, satria halan’i Absalôma izy noho ny nanaovany an-keriny an’i Tamara anabaviny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Amnôna sy ny nandosiran’i Absalôma
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Roa taona taorian’izany, dia nampanety ondry tao Bahàla-Hatsôra akaikin’i Efraîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Bahàla-Hatsôra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efraîma:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana roa tokony ho 25 km avaratr’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: '. Nasain’i Absalôma avokoa ny zanakalahin’ny mpanjaka. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nankao amin’ny mpanjaka i Absalôma ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro hampanety ondry aho, ry mpanjaka; koa mba tongava any amiko ny tenanao sy ireo minisitrao.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa hoy ny mpanjaka tamin’i Absalôma:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, anaka, aoka tsy handeha avokoa izahay sao dia hanahirana anao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nikiry ihany i Absalôma, nefa tsy nety nandeha ny mpanjaka fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitsodrano
    - type: text
      text: ' azy fotsiny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia hoy i Absalôma:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha tsy mety kosa àry ianao, dia aoka i Amnôna rahalahiko no handeha hiaraka aminay.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa ahoana izy no handeha hiaraka aminao?
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Mbola nikiry hatrany i Absalôma, ka farany navelan’ny mpanjaka handeha hiaraka aminy ihany i Amnôna sy ireo zanakalahiny hafa rehetra. Dia nanomana fanasana tahaka ny fanasà-mpanjaka i Absalôma. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Izao kosa no baiko nomeny an’ireo mpanompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Jereo tsara, fa rehefa falin-divay ny fon’i Amnôna ka milaza aminareo aho hoe: «Asio i Amnôna!», dia vonoy ho faty izy. Aza matahotra. Moa tsy izaho va no nanome baiko anareo? Koa sahia ary misehoa ho mahery fo!'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia notanterahin’ny mpanompon’i Absalôma tamin’i Amnôna araka izay baikon’i Absalôma izany. Dia nitsangana avokoa ny zanakalahin’ny mpanjaka hafa ka samy nitaingina ny borikiny ary nandositra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa i Amnôna kosa nanan-tsakaiza natao hoe Jônadaba sady zanakalahin’i Simehà izay rahalahin’i Davida; ary io Jônadaba io dia tena lalin-tsaina. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa raha mbola teny an-dalana izy ireo, dia efa ren’i Davida ny vaovao hoe: «Novonoin’i Absalôma ho faty avokoa ny zanakalahinao, ka tsy nisy niangana na dia iray aza.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia nitsangana ny mpanjaka ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra ny akanjony
    - type: text
      text: ' ary nandry tamin’ny tany. Nijoro teo koa ny minisitra rehetra, samy rovitra akanjo avokoa. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa i Jônadaba zanakalahin’i Simehà izay rahalahin’i Davida kosa nandray fitenenana ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka ianao, ry andriamanjaka, tsy hihevitra fa maty avokoa ny tovolahy rehetra zanakao. Tsia, i Amnôna ihany no maty; ary izany dia fanapahan-kevitr’i Absalôma hatramin’ny andro nanaovan’i Amnôna an-keriny an’i Tamara anabaviny. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Koa aoka ianao, ry andriamanjaka, tsy hieritreritra fa maty avokoa ny zanakalahinao; tsia, i Amnôna ihany no maty, '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ary nandositra i Absalôma.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha niandrandra ny mpanompo izay nasaina niambina, dia nahita andian’olona marobe nidina ny tendrombohitra tamin’ny lalan’i Hôrônaima. Dia nankany amin’ny mpanjaka ilehio ka nitantara izay zavatra hitany. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Hoy i Jônadaba tamin’ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indreo tokoa, araka izay efa voalazako taminao, fa tonga ireo zanakalahinao.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Vao tapitra ny teniny, dia indreo tonga ny zanakalahin’ny mpanjaka samy nigogogogo nitomany; ary mba nanao ranomaso havozona koa ny mpanjaka sy ny minisitra rehetra.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 37-38
    - type: text
      text: I Absalôma dia nandositra nankany amin’i Talmay zanakalahin’i Hamihoda sady mpanjakan’i Gesora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gesora: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fanjakana kely sirianina entina printsy ao atsinanan’ny farihin’i Genesareta. Araka ny 3.3 dia '
      - type: usfm
        marker: it
        children:
        - type: text
          text: i Talmay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no raiben’i Absalôma avy amin-dreniny.'
      marker-yv: yv-n
    - type: text
      text: ' ka nijanona tany telo taona. Nisaona an-janany hatrany kosa i Davida nandritra izany fotoana izany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Ary natsahatr’i Davida mpanjaka ny fanenjehany an’i Absalôma fa efa nionona ny alahelony tamin’ny nahafatesan’i Amnôna.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ka hoy izy tamin’i Amnôna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa nahoana no maloka endrika isan’andro toy izao ianao, ry zanaky ny mpanjaka? Tsy tianao lazaina amiko ve izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Amnôna taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tiako i Tamara anabavin’i Absalôma rahalahiko.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy i Jônadaba taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandria eo am-parafaranao, ka manaova sari-marary. Rehefa tonga hamangy anao ny rainao, dia lazao hoe: «Mba avelao i Tamara anabaviko no hitondra sakafo ho ahy, aoka ho eto imasoko no hikarakarany izany mba ho hitako ka hihinanako izay arosony.»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nandry i Amnôna ka nanao sari-marary. Ary tonga ny mpanjaka hamangy azy ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba avelao hankatỳ i Tamara anabaviko hanao mofo roa ho ahy eto imasoko hihinanako izay arosony.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Naniraka olona nankany amin’i Tamara i Davida hilaza aminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mankanesa kely any amin’i Amnôna anadahinao ka manamboara sakafo ho azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nankany amin’i Amnôna anadahiny i Tamara ka nahita azy teo am-pandriana. Naka koba razazavavy, dia nofetainy ary novolavolainy sy nendasiny ho mofo teo imasony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Rehefa izany, dia noraisiny ny lapoaly ka narosony azy ny tao anatiny, nefa tsy nety nihinana izy. Ary hoy i Amnôna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avoahy avokoa ny olona rehetra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka ny trano avokoa ny olona rehetra. '
