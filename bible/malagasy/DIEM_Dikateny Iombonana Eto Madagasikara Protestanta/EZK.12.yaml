document_id: EZK.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manome famantarana mialoha momba ny fahababoana i Ezekiela
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: 'Koa ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Izany hafatra fampitandremana izany dia ho an’izay andriamanjaka eto Jerosalema sy ho an’ny Israelita rehetra izay ao.› '
  '11':
  - type: text
    content: 'Ambarao aminy fa famantarana mialoha ho azy ianao, ka tahaka izay nataonao no hatao aminy; ho lasan-ko babo any an-tsesitany izy rehetra. '
  '12':
  - type: text
    content: 'Izay andriamanjaka eo aminy dia hitondra ny entany an-tsoroka rehefa maizimaizina ny andro ka hivoaka ny tanàna. Hogorobahana eo amin’ny manda mba hamoahana azy, ka hisarona endrika izy mba tsy hahita izay tany halehany. '
  '13':
  - type: text
    content: Izaho Tompo kosa dia hamelatra fandrika harato ka hisambotra azy. Dia hoentiko any amin’ny tanin’ny Babilônianina izy, ary tsy hahita izany kanefa ho faty any
  - type: note
    content: Ao amin’ny and 12 sy 13 dia mety misy filazana an-kolaka an’i Tsedekià mpanjaka, jereo 2 Mp 25.4-7; Jer 39.4-7; 52.7-11.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Haeliko any amin’ny vazan-tany efatra ireo rehetra nanodidina izany andriamanjaka izany, dia ireo mpiambina azy sy ireo antokon-tafiny, ka any no hanenjehako azy amin’ny sabatro. '
  '15':
  - type: text
    content: 'Rehefa voahahako any amin’ny firenen-kafa sy voaparitako ny tany maro ireo, dia hiaiky fa Izaho no TOMPO. '
  '16':
  - type: text
    content: 'Nefa hamelako olona vitsivitsy ihany izy, dia ny sisa tavela tsy ringan’ny ady sy ny mosary ary ny areti-mandringana: ireo no hitantara amin’ny firenen-kafa misy azy ny zavatra rehetra maharikoriko nataony, ka hoeken’ny firenen-kafa koa fa Izaho no TOMPO.»'
  '17':
  - type: text
    content: 'Dia nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  '18':
  - type: text
    content: '«Ry ilay taranak’olombelona, hano amin-kovitra ny mofonao ary sotroy amin-tahotra sy amin’ahiahy ny ranonao. '
  '19':
  - type: text
    content: 'Avy eo dia ambarao amin’ny olon’ity tany ity fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Ny mponin’i Jerosalema izay tafajanona eto amin’ny tanin’i Israely dia hihinana sy hisotro amin’ahiahy sy amin-tahotra; horavana sy hatao fongana manko ny taniny, noho ny herisetran’ny mponina rehetra ao aminy. '
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, monina eo anivon’ny olona tena maditra ianao! Mana-maso hahitana izy fa tsy te hahita, manan-tsofina hihainoana fa tsy te hihaino, satria olona tena maditra
  - type: note
    content: Jereo Is 6.9-10; Jer 5.21; Mk 8.18.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Ho foana ny tanàna onenany ary hanjary lao ny taniny. Amin’izay dia hiaiky ianareo fa Izaho no TOMPO›. »
  - type: heading
    content: Ho tanteraka ny tenin’ny Tompo
  '21':
  - type: text
    content: 'Ary nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  '22':
  - type: text
    content: '«Ry ilay taranak’olombelona, ahoana moa izao oha-pitenenana ataonareo momba ny tanin’i Israely izao hoe: ‹Lasa ihany ny fotoana nefa toa tsy nisy tanteraka akory izay fahitana!› '
  '23':
  - type: text
    content: 'Koa ambarao amin’ny Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hanafoana izany oha-pitenenana izany; tsy hotononina eto Israely intsony izany.› Ambarao aminy kosa fa akaiky ny fotoana izay hahatanterahan’ny fahitana rehetra. '
  '24':
  - type: text
    content: 'Tsy hisy intsony ny fahitana manodoka na fanambaràna mamitaka. '
  '25':
  - type: text
    content: Izaho TOMPO no hiteny; ary ny teny izay lazaiko dia hihatra tsy an-kiandry intsony. Eny, amin’izao andronareo izao, ry Israelita maditra, no hanatanterahako izay zavatra lazaiko. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '26':
  - type: text
    content: 'Avy eo dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '27':
  - type: text
    content: '«Ry ilay taranak’olombelona, lazain’ny Israelita fa ny fahitanao ankehitriny dia tsy ho tanteraka raha tsy afaka elabe, ary izay hafatra ampitainao dia momba ny vanim-potoana mbola lavitra.» '
  '28':
  - type: text
    content: 'Koa lazao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: «Ny teniko rehetra dia hihatra tsy an-kiandry intsony; ny teny izay lazaiko dia ho tanteraka. Teny henitra avy amiko Tompo ANDRIANANAHARY izany.»'
  '3':
  - type: text
    content: 'Noho izany, fehezo ny entana izay ilain’ny babo anankiray ary omany antoandro eo imason’ny besinimaro ny fiainganao ho any am-pahababoana. Ialao ny toerana misy anao, ka mifindrà any an-toeran-kafa, ary eo imason’ny besinimaro no anaovy izany; angamba mba ho tsapany fa tena maditra izy. '
  '4':
  - type: text
    content: 'Amin’ny antoandro sady eo imasony no hamoahanao ny entanao avy ao an-tranonao toy ny entan’ny babo anankiray; ary amin’ny hariva kosa ianao no hiainga tahaka ny olona hankany am-pahababoana. '
  '5':
  - type: text
    content: 'Gorobahy eo imasony ny manda, ka avoahy amin’io loaka io ny entanao. '
  '6':
  - type: text
    content: Ataovy an-tsoroka eo imasony no fitondranao azy, ka ento miainga rehefa maizimaizina ny andro. Saròny ny endrikao mba tsy hahitanao izay tany alehanao, fa ianao dia nataoko ho famantarana mialoha ho an’ireo Israelita.»
  '7':
  - type: text
    content: 'Dia nanao araka izay nandidian’ny Tompo ahy aho, ka ny antoandro no namoahako avy ao an-tranoko ny entako toy ny entan’ny babo; ary ny hariva no nanagorobahako ny manda tamin’ny tanako. Ary nony efa maizimaizina ny andro, dia nentiko niainga ny entako ka teny an-tsoroko no nitondrako azy teo imason’ny besinimaro. '
  '8':
  - type: text
    content: 'Nony ampitso maraina dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '9':
  - type: text
    content: '«Ry ilay taranak’olombelona, tsy maintsy hanontany anao ireo Israelita maditra ireo ny amin’izay nataonao. '
