document_id: EZK.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manome famantarana mialoha momba ny fahababoana i Ezekiela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Ry ilay taranak’olombelona, monina eo anivon’ny olona tena maditra ianao! Mana-maso hahitana izy fa tsy te hahita, manan-tsofina hihainoana fa tsy te hihaino, satria olona tena maditra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 6.9-10; Jer 5.21; Mk 8.18.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Noho izany, fehezo ny entana izay ilain’ny babo anankiray ary omany antoandro eo imason’ny besinimaro ny fiainganao ho any am-pahababoana. Ialao ny toerana misy anao, ka mifindrà any an-toeran-kafa, ary eo imason’ny besinimaro no anaovy izany; angamba mba ho tsapany fa tena maditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Amin’ny antoandro sady eo imasony no hamoahanao ny entanao avy ao an-tranonao toy ny entan’ny babo anankiray; ary amin’ny hariva kosa ianao no hiainga tahaka ny olona hankany am-pahababoana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Gorobahy eo imasony ny manda, ka avoahy amin’io loaka io ny entanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ataovy an-tsoroka eo imasony no fitondranao azy, ka ento miainga rehefa maizimaizina ny andro. Saròny ny endrikao mba tsy hahitanao izay tany alehanao, fa ianao dia nataoko ho famantarana mialoha ho an’ireo Israelita.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nanao araka izay nandidian’ny Tompo ahy aho, ka ny antoandro no namoahako avy ao an-tranoko ny entako toy ny entan’ny babo; ary ny hariva no nanagorobahako ny manda tamin’ny tanako. Ary nony efa maizimaizina ny andro, dia nentiko niainga ny entako ka teny an-tsoroko no nitondrako azy teo imason’ny besinimaro. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nony ampitso maraina dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Ry ilay taranak’olombelona, tsy maintsy hanontany anao ireo Israelita maditra ireo ny amin’izay nataonao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Izany hafatra fampitandremana izany dia ho an’izay andriamanjaka eto Jerosalema sy ho an’ny Israelita rehetra izay ao.› '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ambarao aminy fa famantarana mialoha ho azy ianao, ka tahaka izay nataonao no hatao aminy; ho lasan-ko babo any an-tsesitany izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izay andriamanjaka eo aminy dia hitondra ny entany an-tsoroka rehefa maizimaizina ny andro ka hivoaka ny tanàna. Hogorobahana eo amin’ny manda mba hamoahana azy, ka hisarona endrika izy mba tsy hahita izay tany halehany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho Tompo kosa dia hamelatra fandrika harato ka hisambotra azy. Dia hoentiko any amin’ny tanin’ny Babilônianina izy, ary tsy hahita izany kanefa ho faty any
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ao amin’ny and 12 sy 13 dia mety misy filazana an-kolaka an’i Tsedekià mpanjaka, jereo 2 Mp 25.4-7; Jer 39.4-7; 52.7-11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Haeliko any amin’ny vazan-tany efatra ireo rehetra nanodidina izany andriamanjaka izany, dia ireo mpiambina azy sy ireo antokon-tafiny, ka any no hanenjehako azy amin’ny sabatro. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa voahahako any amin’ny firenen-kafa sy voaparitako ny tany maro ireo, dia hiaiky fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nefa hamelako olona vitsivitsy ihany izy, dia ny sisa tavela tsy ringan’ny ady sy ny mosary ary ny areti-mandringana: ireo no hitantara amin’ny firenen-kafa misy azy ny zavatra rehetra maharikoriko nataony, ka hoeken’ny firenen-kafa koa fa Izaho no TOMPO.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '«Ry ilay taranak’olombelona, hano amin-kovitra ny mofonao ary sotroy amin-tahotra sy amin’ahiahy ny ranonao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Avy eo dia ambarao amin’ny olon’ity tany ity fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Ny mponin’i Jerosalema izay tafajanona eto amin’ny tanin’i Israely dia hihinana sy hisotro amin’ahiahy sy amin-tahotra; horavana sy hatao fongana manko ny taniny, noho ny herisetran’ny mponina rehetra ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho foana ny tanàna onenany ary hanjary lao ny taniny. Amin’izay dia hiaiky ianareo fa Izaho no TOMPO›. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho tanteraka ny tenin’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '«Ry ilay taranak’olombelona, ahoana moa izao oha-pitenenana ataonareo momba ny tanin’i Israely izao hoe: ‹Lasa ihany ny fotoana nefa toa tsy nisy tanteraka akory izay fahitana!› '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa ambarao amin’ny Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hanafoana izany oha-pitenenana izany; tsy hotononina eto Israely intsony izany.› Ambarao aminy kosa fa akaiky ny fotoana izay hahatanterahan’ny fahitana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsy hisy intsony ny fahitana manodoka na fanambaràna mamitaka. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izaho TOMPO no hiteny; ary ny teny izay lazaiko dia hihatra tsy an-kiandry intsony. Eny, amin’izao andronareo izao, ry Israelita maditra, no hanatanterahako izay zavatra lazaiko. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Avy eo dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Ry ilay taranak’olombelona, lazain’ny Israelita fa ny fahitanao ankehitriny dia tsy ho tanteraka raha tsy afaka elabe, ary izay hafatra ampitainao dia momba ny vanim-potoana mbola lavitra.» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa lazao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: «Ny teniko rehetra dia hihatra tsy an-kiandry intsony; ny teny izay lazaiko dia ho tanteraka. Teny henitra avy amiko Tompo ANDRIANANAHARY izany.»'
