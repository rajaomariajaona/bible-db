document_id: EXO.39,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fanamian’ny mpisorona: ny efôda'
  - type: text
    content: Volon’ondry miloko volomparasy sy mena ary jaky no nanaovana ny lamba fandrakofana
  - type: note
    content: 'And 1-32: ampit 28.1-43. –ny lamba fandrakofana ny fanaka: tsy azo antoka ny hevitry ny teny hebreo mifanandrify eto.'
  - type: text
    content: ' ny fanaka fampiasa tao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' sy ny fanamiana voatokana ho an’i Aharôna, araka izay efa nandidian’ny TOMPO an’i Mosesy.'
  '10':
  - type: text
    content: 'ary noravahana laharam-batosoa efatra: ny laharana voalohany dia sardoanina sy tôpaza ary emeralda; '
  '11':
  - type: text
    content: 'ny laharana faharoa dia robisy sy safira ary diamondra; '
  '12':
  - type: text
    content: 'ny laharana fahatelo dia ôpaka sy agata ary ametista; '
  '13':
  - type: text
    content: 'ary ny laharana fahefatra dia krizôlita sy berila ary jaspa. Samy napetaka anaty bokom-bolamena avy ny vato tsirairay. '
  '14':
  - type: text
    content: 'Nosoratana an-tsokitra teo amin’ny vatosoa tsirairay avy ny anaran’ireo zanakalahin’i Jakôba izay miisa 12; natao toy ny fisokitra '
  - type: text
    content: tombokase
  - type: text
    content: ' izany, ka ireo vato ireo no solotenan’ny foko israelita 12.'
  '15':
  - type: text
    content: 'Rojo volamena madinika roa, miolanolana toy ny tady voarandrana, no natao teo amin’ny saron-tratra; '
  '16':
  - type: text
    content: 'nisy bokom-bolamena roa sy haba volamena roa namboarina ka napetaka teo amin’ny zorony roa ambony amin’ny saron-tratra. '
  '17':
  - type: text
    content: 'Nafatotra tsirairay tamin’ireo haba amin’ny saron-tratra ireo ny rojo volamena madinika; '
  '18':
  - type: text
    content: 'ary ny lanin’ny rojo roa kosa dia napetaka tamin’ny bokom-bolamena izay teo ambonin’ny beritelon’ny efôda, mba hahatonga ny saron-tratra ho eo anoloana. '
  '19':
  - type: text
    content: 'Nisy haba volamena roa hafa koa namboarina ka napetaka teo amin’ny zorony roa ambany amin’ny saron-tratra manolotra ny efôda. '
  '2':
  - type: text
    content: 'Kiran-dongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky, no nanaovana ny efôda, sady nasiana peta-kofehy volamena. '
  '20':
  - type: text
    content: 'Mbola nisy haba volamena roa hafa koa namboarina ka napetaka teo ambanin’ny beritelon’ny efôda eo anoloana, teo amin’ny fikambanany; teo ambonin’ny samboadin’ny efôda no nametrahana ireo haba volamena ireo. '
  '21':
  - type: text
    content: Natohy tady volomparasy ny haban’ny saron-tratra sy ny haban’ny efôda mba ho eo ambonin’ny beritelon’ny efôda ilay saron-tratra ka tsy hifindrafindra eo amin’ny efôda, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  - type: heading
    content: Ny fanamiana hafa voatokana
  '22':
  - type: text
    content: 'Ny akanjo lava ivelany izay hitondran’i Aharôna ny efôda dia natao manontolo tamin’ny volon’ondry miloko volomparasy. '
  '23':
  - type: text
    content: 'Nasiana vavany teo afovoany mba hidiran’ny loha, ka notenomina sy nohamafisina ny sisiny manodidina io vavany io mba tsy ho rovitra. '
  '24':
  - type: text
    content: 'Ny moron-tongotr’akanjo manodidina dia noravahana sarin’ampongabendanitra vita tamin’ny volon’ondry miloko volomparasy sy mena ary jaky sy tamin’ny kiran-drongony mafy. '
  '25':
  - type: text
    content: 'Notefena ny lakolosy kely volamena madio ka napetaka teny anelanelan’ny sarin’ampongabendanitra tamin’ny moron-tongotr’akanjo manodidina. '
  '26':
  - type: text
    content: Koa ny sarin’ampongabendanitra dia nifanelanelana tamin’ny lakolosy kely teo ivelan’ny moron-tongotr’akanjo, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '27':
  - type: text
    content: 'Nanenomana akanjo ivelany tamin’ny kiran-drongony koa i Aharôna sy ireo zanany lahy; '
  '28':
  - type: text
    content: 'notenomina toy izany koa ny fehiloha, ny lamba nanaovana ny satroka boribory, ary ny pataloha. '
  '29':
  - type: text
    content: Fa ny fehikibo vita peta-kofehy no natao tamin’ny kiran-drongony mafy nifangaro volon’ondry miloko volomparasy sy mena ary jaky, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '3':
  - type: text
    content: 'Nohetezana tamin’ny takela-bolamena nofisahina ny kofehy volamena madinika, dia nafangaron’ireo mpanao peta-kofehy tamin’ny volon’ondry miloko volomparasy sy mena ary jaky niampy kiran-drongony mafy. '
  '30':
  - type: text
    content: 'Namboarina koa ny famantarana ny maha voatokana, dia firavaka volamena madio miendrika voninkazo ary teo amboniny nasiana soratra voasokitra toy ny amin’ny '
  - type: text
    content: tombokase
  - type: text
    content: ' hoe: «Voatokana ho an’ny TOMPO.» '
  '31':
  - type: text
    content: Dia nafatotra tamin’ny tady volon’ondry miloko volomparasy teo ambonin’ny satroka fehiloha izany, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  - type: heading
    content: Entina any amin’i Mosesy ny asa vita
  '32':
  - type: text
    content: 'Vita ny asa rehetra momba ny fonena-masina na '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: . Araka izay rehetra nandidian’ny TOMPO an’i Mosesy no nanatanterahan’ny Israelita izany.
  '33':
  - type: text
    content: 'Nentin’ny Israelita tany amin’i Mosesy avokoa ny zavatra momba ny fonena-masina, dia:'
  - type: text
    content: –ny tranolay sy ny fitaovana rehetra miaraka aminy toy ny farango, ny hazo fisaka, ny barany, ny andry ary ny faladiany;
  '34':
  - type: text
    content: –ny sarona vita amin’ny hoditr’ondry miloko mena, ny sarona vita amin’ny hoditra mafy sy ny efitra lamba fanasarahana;
  '35':
  - type: text
    content: '–ny Vatamasina misy ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: ', miaraka amin’ny baony sy ny sarony;'
  '36':
  - type: text
    content: –ny latabatra voatokana sy ny baony ary ny fitaovana rehetra miaraka aminy mbamin’ny mofo fanolotra ho an’Andriamanitra;
  '37':
  - type: text
    content: –ny fitoeran-jiro miaraka amin’ireo jirony sy ny fitaovana rehetra miaraka aminy, ary ny solika fandrehitra;
  '38':
  - type: text
    content: '–ny '
  - type: text
    content: alitara
  - type: text
    content: ' volamena, ny ilomasina fanokanana, ny vovo-javamanitra hodorana;'
  - type: text
    content: –ny varavarana lamba eo amin’ny fidirana amin’ny tranolay;
  '39':
  - type: text
    content: –ny alitara halimo sy ny makarakarany halimo, ny baony sy ny fitaovana rehetra miaraka aminy;
  - type: text
    content: –ny kovetabe fidiovana sy ny faladiany;
  '4':
  - type: text
    content: 'Beritelo nozairina tamin’ny sisiny roa no nitondrana ny efôda. '
  '40':
  - type: text
    content: –ny temitry ny kianja miaraka amin’ny andriny sy ny faladiany, ny varavarana lamba eo amin’ny vavahadin’ny kianja, miaraka amin’ny tadiny sy ny tsîmatra;
  - type: text
    content: –ny fitaovana rehetra fampiasa amin’ny raharaha ao amin’ny fonena-masina na hoe Tranolay fihaonana;
  '41':
  - type: text
    content: –ny lamba fandrakofana ny fanaka
  - type: note
    content: Jereo ny naoty eo aloha.
  - type: text
    content: ' ao amin’ny Toeramasina ary ny fanamiana voatokana hiakanjoan’i Aharôna sy ny zanany lahy eo am-panaovana ny raharahany.'
  '42':
  - type: text
    content: 'Notanterahin’ny Israelita ny asa rehetra araka izay efa nandidian’ny TOMPO an’i Mosesy. '
  '43':
  - type: text
    content: 'Koa rehefa hitan’i Mosesy fa vita araka izay nandidian’ny TOMPO avokoa ny zavatra rehetra, dia '
  - type: text
    content: nitsodrano
  - type: text
    content: ' ny Israelita izy.'
  '5':
  - type: text
    content: 'Notenomina ho iray amin’ny efôda sady natao tamin’ny kofehy mitovy amin’ny nanaovana azy ny samboady fitazonana ny efôda, araka izay efa nandidian’ny TOMPO an’i Mosesy. '
  '6':
  - type: text
    content: 'Namboarina ny vato berila dia natao tao anaty bokom-bolamena; nosoratana an-tsokitra teo ny anaran’ireo zanakalahin’i Jakôba, natao toy ny fisokitra '
  - type: text
    content: tombokase
  - type: text
    content: '. '
  '7':
  - type: text
    content: Napetaka teo ambony beritelon’ny efôda ireo vato ireo mba ho mariky ny fanatrehan’ny foko israelita 12, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  - type: heading
    content: Ny saron-tratra
  '8':
  - type: text
    content: 'Mpahay taozavatra no nanao ny saron-tratra tamin’ny kiran-drongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky, sady nasiany peta-kofehy volamena toy ny efôda. '
  '9':
  - type: text
    content: 'Paosy efamira izy io, ka mirefy 25 santimetatra avy ny lafiny tsirairay '
