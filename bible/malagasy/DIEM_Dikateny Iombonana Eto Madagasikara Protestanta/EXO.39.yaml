document_id: EXO.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fanamian’ny mpisorona: ny efôda'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Volon’ondry miloko volomparasy sy mena ary jaky no nanaovana ny lamba fandrakofana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.1 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 1-32:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 28.1-43. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny lamba fandrakofana ny fanaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tsy azo antoka ny hevitry ny teny hebreo mifanandrify eto.'
    marker-yv: yv-n
  - type: text
    text: ' ny fanaka fampiasa tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' sy ny fanamiana voatokana ho an’i Aharôna, araka izay efa nandidian’ny TOMPO an’i Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Kiran-dongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky, no nanaovana ny efôda, sady nasiana peta-kofehy volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nohetezana tamin’ny takela-bolamena nofisahina ny kofehy volamena madinika, dia nafangaron’ireo mpanao peta-kofehy tamin’ny volon’ondry miloko volomparasy sy mena ary jaky niampy kiran-drongony mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Beritelo nozairina tamin’ny sisiny roa no nitondrana ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Notenomina ho iray amin’ny efôda sady natao tamin’ny kofehy mitovy amin’ny nanaovana azy ny samboady fitazonana ny efôda, araka izay efa nandidian’ny TOMPO an’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Namboarina ny vato berila dia natao tao anaty bokom-bolamena; nosoratana an-tsokitra teo ny anaran’ireo zanakalahin’i Jakôba, natao toy ny fisokitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Napetaka teo ambony beritelon’ny efôda ireo vato ireo mba ho mariky ny fanatrehan’ny foko israelita 12, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny saron-tratra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mpahay taozavatra no nanao ny saron-tratra tamin’ny kiran-drongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky, sady nasiany peta-kofehy volamena toy ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Paosy efamira izy io, ka mirefy 25 santimetatra avy ny lafiny tsirairay '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary noravahana laharam-batosoa efatra: ny laharana voalohany dia sardoanina sy tôpaza ary emeralda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny laharana faharoa dia robisy sy safira ary diamondra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny laharana fahatelo dia ôpaka sy agata ary ametista; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary ny laharana fahefatra dia krizôlita sy berila ary jaspa. Samy napetaka anaty bokom-bolamena avy ny vato tsirairay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nosoratana an-tsokitra teo amin’ny vatosoa tsirairay avy ny anaran’ireo zanakalahin’i Jakôba izay miisa 12; natao toy ny fisokitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: ' izany, ka ireo vato ireo no solotenan’ny foko israelita 12.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rojo volamena madinika roa, miolanolana toy ny tady voarandrana, no natao teo amin’ny saron-tratra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'nisy bokom-bolamena roa sy haba volamena roa namboarina ka napetaka teo amin’ny zorony roa ambony amin’ny saron-tratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nafatotra tsirairay tamin’ireo haba amin’ny saron-tratra ireo ny rojo volamena madinika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary ny lanin’ny rojo roa kosa dia napetaka tamin’ny bokom-bolamena izay teo ambonin’ny beritelon’ny efôda, mba hahatonga ny saron-tratra ho eo anoloana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nisy haba volamena roa hafa koa namboarina ka napetaka teo amin’ny zorony roa ambany amin’ny saron-tratra manolotra ny efôda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mbola nisy haba volamena roa hafa koa namboarina ka napetaka teo ambanin’ny beritelon’ny efôda eo anoloana, teo amin’ny fikambanany; teo ambonin’ny samboadin’ny efôda no nametrahana ireo haba volamena ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Natohy tady volomparasy ny haban’ny saron-tratra sy ny haban’ny efôda mba ho eo ambonin’ny beritelon’ny efôda ilay saron-tratra ka tsy hifindrafindra eo amin’ny efôda, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanamiana hafa voatokana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny akanjo lava ivelany izay hitondran’i Aharôna ny efôda dia natao manontolo tamin’ny volon’ondry miloko volomparasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nasiana vavany teo afovoany mba hidiran’ny loha, ka notenomina sy nohamafisina ny sisiny manodidina io vavany io mba tsy ho rovitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny moron-tongotr’akanjo manodidina dia noravahana sarin’ampongabendanitra vita tamin’ny volon’ondry miloko volomparasy sy mena ary jaky sy tamin’ny kiran-drongony mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Notefena ny lakolosy kely volamena madio ka napetaka teny anelanelan’ny sarin’ampongabendanitra tamin’ny moron-tongotr’akanjo manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Koa ny sarin’ampongabendanitra dia nifanelanelana tamin’ny lakolosy kely teo ivelan’ny moron-tongotr’akanjo, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nanenomana akanjo ivelany tamin’ny kiran-drongony koa i Aharôna sy ireo zanany lahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'notenomina toy izany koa ny fehiloha, ny lamba nanaovana ny satroka boribory, ary ny pataloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa ny fehikibo vita peta-kofehy no natao tamin’ny kiran-drongony mafy nifangaro volon’ondry miloko volomparasy sy mena ary jaky, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Namboarina koa ny famantarana ny maha voatokana, dia firavaka volamena madio miendrika voninkazo ary teo amboniny nasiana soratra voasokitra toy ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: ' hoe: «Voatokana ho an’ny TOMPO.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia nafatotra tamin’ny tady volon’ondry miloko volomparasy teo ambonin’ny satroka fehiloha izany, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Entina any amin’i Mosesy ny asa vita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Vita ny asa rehetra momba ny fonena-masina na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: . Araka izay rehetra nandidian’ny TOMPO an’i Mosesy no nanatanterahan’ny Israelita izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nentin’ny Israelita tany amin’i Mosesy avokoa ny zavatra momba ny fonena-masina, dia:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –ny tranolay sy ny fitaovana rehetra miaraka aminy toy ny farango, ny hazo fisaka, ny barany, ny andry ary ny faladiany;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: –ny sarona vita amin’ny hoditr’ondry miloko mena, ny sarona vita amin’ny hoditra mafy sy ny efitra lamba fanasarahana;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '–ny Vatamasina misy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny fanekempihavanana
  - type: text
    text: ', miaraka amin’ny baony sy ny sarony;'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: –ny latabatra voatokana sy ny baony ary ny fitaovana rehetra miaraka aminy mbamin’ny mofo fanolotra ho an’Andriamanitra;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: –ny fitoeran-jiro miaraka amin’ireo jirony sy ny fitaovana rehetra miaraka aminy, ary ny solika fandrehitra;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '–ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' volamena, ny ilomasina fanokanana, ny vovo-javamanitra hodorana;'
- type: usfm
  marker: m
  children:
  - type: text
    text: –ny varavarana lamba eo amin’ny fidirana amin’ny tranolay;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: –ny alitara halimo sy ny makarakarany halimo, ny baony sy ny fitaovana rehetra miaraka aminy;
- type: usfm
  marker: m
  children:
  - type: text
    text: –ny kovetabe fidiovana sy ny faladiany;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: –ny temitry ny kianja miaraka amin’ny andriny sy ny faladiany, ny varavarana lamba eo amin’ny vavahadin’ny kianja, miaraka amin’ny tadiny sy ny tsîmatra;
- type: usfm
  marker: m
  children:
  - type: text
    text: –ny fitaovana rehetra fampiasa amin’ny raharaha ao amin’ny fonena-masina na hoe Tranolay fihaonana;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: –ny lamba fandrakofana ny fanaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty eo aloha.
    marker-yv: yv-n
  - type: text
    text: ' ao amin’ny Toeramasina ary ny fanamiana voatokana hiakanjoan’i Aharôna sy ny zanany lahy eo am-panaovana ny raharahany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Notanterahin’ny Israelita ny asa rehetra araka izay efa nandidian’ny TOMPO an’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Koa rehefa hitan’i Mosesy fa vita araka izay nandidian’ny TOMPO avokoa ny zavatra rehetra, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nitsodrano
  - type: text
    text: ' ny Israelita izy.'
