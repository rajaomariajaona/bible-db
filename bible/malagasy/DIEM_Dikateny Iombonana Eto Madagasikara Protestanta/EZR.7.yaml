document_id: EZR.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Hezrà mpisorona
  - type: text
    content: 'Tatỳ aoriana, tamin’ny andro nanjakàn’i Artakserksesa amperôran’i Persia, no nipoiran’i Hezrà. Io Hezrà io dia zanakalahin’i Seraià sy zafin’i Hazarià sy zafiafin’i Hilkià '
  '10':
  - type: text
    content: I Hezrà manko dia efa niorim-po hianatra ny lalànan’ny TOMPO sy hanatanteraka azy ary hampianatra ny didy amam-pitsipika raketiny.
  - type: heading
    content: Ny andraikitra ankinin’i Artakserksesa amin’i Hezrà
  '11':
  - type: text
    content: 'Izao no kôpian’ilay taratasy nomen’i Artakserksesa an’i Hezrà mpisorona izay mpahay lalàna fatra-pahalala ny antsipirian’ireo didy aman-dalàn’ny TOMPO ho an’i Israely:'
  '12':
  - type: text
    content: «Avy amiko Artakserksesa
  - type: note
    content: Ny rijan-teny fototra momba ny and 12-26 dia amin’ny fiteny aramianina.
  - type: text
    content: ', mpanjakan’ny mpanjaka, ity taratasy ho an’i Hezrà mpisorona izay mpahay lalana fatra-pahalala ny lalànan’Ilay Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: . Mamangy anao aho sns...
  '13':
  - type: text
    content: '«Manao didy aho fa na iza na iza Israelita eto amin’ny fanjakako, na sarambabem-bahoaka na '
  - type: text
    content: mpisorona
  - type: text
    content: ' na '
  - type: text
    content: levita
  - type: text
    content: ', no te hiaraka aminao hankany Jerosalema, dia mahazo mandeha izy. '
  '14':
  - type: text
    content: 'Fa izaho sy izy fito lahy mpanolotsaiko dia maniraka anao any Jerosalema sy any Joda mba handinika raha mifanaraka amin’ilay lalànan’Andriamanitrao izay any an-tananao ny toetran’ny Jiosy. '
  '15':
  - type: text
    content: 'Irahinay koa ianao hitondra ny volafotsy sy volamena izay efa sitrako sy sitrak’ireo mpanolotsaiko nomena ho an’Ilay Andriamanitr’i Israely Izay ao Jerosalema no fonenany; '
  '16':
  - type: text
    content: 'ary dia hoentinao koa ny fanomezana rehetra volafotsy sy volamena izay ho azonao eran’ny faritr’i Babilôna, miaraka amin’ny fanomezana an-tsitrapo aterin’ireo mpiray firenena aminao na mpisorona na sarambabem-bahoaka, mba ho an’ny tranon’Ilay Andriamaniny izay any Jerosalema. '
  '17':
  - type: text
    content: 'Koa himasoanao ny hividy amin’io vola io ny ombilahy sy ondrilahy ary zanakondry mbamin’izay ilaina hatao fanatitra hohanina sy fanatitra araraka; dia haterinao eo ambonin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ao an-tranon’Andriamanitrareo any Jerosalema ireny. '
  '18':
  - type: text
    content: 'Izay heverinao sy ny Israelita mpiara-dia aminao hatao amin’ny volafotsy sy volamena sisa dia ataovy araka ny sitrapon’Andriamanitrareo. '
  '19':
  - type: text
    content: 'Ny fanaka nomena anao ho an’ny fanompoam-pivavahana ao an-tranon’Andriamanitrao dia apetraho eo anatrehan’Andriamanitra any Jerosalema. '
  '2':
  - type: text
    content: 'sy zafin-dohalik’i Saloma sy zafin-kitrokelin’i Tsadôka sy zafim-paladian’i Ahitoba '
  '20':
  - type: text
    content: Ary izay rehetra mbola hilaina ho an’io trano io ka tsy maintsy hiantsorohanao, dia ny tahirim-bolam-panjakana no hampandoavinao azy.
  '21':
  - type: text
    content: '«Izaho, Artakserksesa amperôra, dia manao izao didy izao ho anareo rehetra mpitahiry harem-panjakana any andafy andrefan’ny ony Eofrata; iny i Hezrà mpisorona, izay mpahay lalàna fatra-pahalala ny lalànan’ilay Andriamanitry ny lanitra; na inona na inona ilainy ka takîny aminareo, dia hotanterahina tsy misy tomika izany. '
  '22':
  - type: text
    content: 'Hatolotrareo an’i Hezrà hatramin’ny volafotsy 3 400 kilao sy ny varimbazaha telo alina kilao, ny divay efatra arivo litatra sy ny menaka efatra arivo litatra ary ny sira araka izay tiany. '
  '23':
  - type: text
    content: 'Na inona na inona andidian’ilay Andriamanitry ny lanitra momba izany tranony izany, dia hotanterahina haingana mba tsy hiharan’ny fahatezerany amin’ny fanjakako sy amin’ny tenako ary amin’ny taranako. '
  '24':
  - type: text
    content: Ampahafantarinay anareo mpitahiry harem-panjakana koa fa ny mpisorona sy ny levita, ny mpihira sy mpiandry varavarana, ary ny mpanampy sy mpiasa hafa ao amin’io tranon’Andriamanitra io dia tsy mba hampandoavina hetra na haba na sara.
  '25':
  - type: text
    content: '«Ary ianao, ry Hezrà, araka ny fahendren’ny lalànan’Andriamanitrao izay eny an-tananao, dia manendre mpanapaka sy mpitsara mba hitsara ny olona rehetra mahalala ny lalànan’Andriamanitrao amin’ny mponina any andafy andrefan’ny ony Eofrata; fa izay tsy mbola mahalala izany lalàna izany kosa dia aoka hampianarinareo. '
  '26':
  - type: text
    content: Ary na iza na iza tsy mety mankatò ny lalànan’Andriamanitrao sy ny lalànan’ny amperôra, dia aoka izy hotsaraina araka ny rariny ka hovonoina, na horoahina
  - type: note
    content: horoahina na hoe hesorina tsy ho anisan’ny vahoaka israelita.
  - type: text
    content: ', na hosazîna vola, na hatao am-ponja».'
  - type: heading
    content: Misaotra an’Andriamanitra i Hezrà
  '27':
  - type: text
    content: «Hankalazaina anie ny TOMPO
  - type: note
    content: Manomboka eto amin’ny 7.27 dia amin’ny fiteny hebreo indray ny rijan-teny fototra.
  - type: text
    content: ' Andriamanitry ny razanay, hoy i Hezrà. Fa Izy no nanoro hevitra ny amperôra hanatsara endrika ny '
  - type: text
    content: tranony
  - type: text
    content: ' any Jerosalema; '
  '28':
  - type: text
    content: sady teo anatrehan’ny amperôra sy ireo mpanolotsainy ary ny manampahefana rehetra manodidina azy koa no nanehoany fitiavana ahy. Ary nampaherezin’ny fiarovan’ny TOMPO Andriamanitro aho ka nahangona loholona israelita mba hiara-miverina amiko any an-tanindrazana».
  '3':
  - type: text
    content: 'ary zafin-dorian’i Amarià, dia i Amarià zanakalahin’i Hazarià sy zafin’i Meraiôta '
  '4':
  - type: text
    content: 'sy zafiafin’i Zerahià sy zafin-dohalik’i Hozy sy zafin-kitrokelin’i Boky '
  '5':
  - type: text
    content: 'sy zafim-paladian’i Abisoa ary zafin-dorian’i Pinehasa, dia i Pinehasa zanakalahin’i Elehazara sy zafin’i Aharôna mpisorombe. '
  '6':
  - type: text
    content: Niakatra avy tany Babilôna i Hezrà; mpahay lalàna izy, ka fatra-pahalala tokoa ny lalàna izay nampitain’ny TOMPO Andriamanitr’i Israely tamin’i Mosesy. Nomen’ny amperôra an’i Hezrà avokoa izay rehetra nangatahiny, noho izy nombàn’ny herin’Ilay TOMPO Andriamaniny
  - type: note
    content: I Hezrà mpisorona dia toa mpiasam-panjakana ambony tao an-dapan’ny amperôran’i Persia sady mpahay lalàna jiosy nikoizana ary nijoro tamin-kafanam-po hiaro ny finoana jiosy.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Tamin’ny taona fahafito nanjakàn’i Artakserksesa no nisy Israelita niverina tany Jerosalema, dia '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy '
  - type: text
    content: levita
  - type: text
    content: ' mbamina mpihira sy mpiandry varavarana ary mpanampy ny levita. '
  '8':
  - type: text
    content: Niaraka tamin’ireo i Hezrà ka tonga tany Jerosalema tamin’ny volana fahadimin’io
  - type: note
    content: Tamin’ny taona 458 na 398 tal J.K., volana jolay-aogositra (jereo ny naoty tandrifin’ny 7.1)
  - type: text
    content: ' taona fahafito nanjakàn’i Artakserksesa io. '
  '9':
  - type: text
    content: 'Ny andro voalohan’ny volana voalohany no niaingan’i Hezrà avy tany Babilôna; ary ny andro voalohan’ny volana fahadimy no nahatongavany tao Jerosalema noho ny fiarovana mahery nombàn’Andriamanitra azy. '
