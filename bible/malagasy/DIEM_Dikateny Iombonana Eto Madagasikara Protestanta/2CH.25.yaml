document_id: 2CH.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Amatsià
  - type: heading
    content: (Jereo 2 Mp 14.1-7)
  - type: text
    content: 'Feno 25 taona i Amatsià fony tonga mpanjaka; ary naharitra roapolo taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Jôhadàna, izay avy ao Jerosalema ihany. '
  '10':
  - type: text
    content: Ary navahan’i Amatsià ny miaramila efraimita tonga teo aminy mba halefa hody indray; ka sady lasa nody ireo no nirehi-pahatezerana mafy dia mafy tokoa tamin’ny fanjakàn’i Joda.
  '11':
  - type: text
    content: 'Nanana herimpo i Amatsià, ka nitarika ny tafiny hankao amin’ny Lohasahan-tsira, ary nahafaty antokony folo tamin’ny Edômita taranak’i Sehîra. '
  '12':
  - type: text
    content: Ary ny antokony folo sisa kosa dia nataon’ny Jodeanina sambo-belona, dia nentiny teo antampon’ny hantsam-bato ary navariny teo, ka montsamontsana izy rehetra.
  '13':
  - type: text
    content: Fa ny miaramila efraimita, izay nalefan’i Amatsià hody mba tsy hiara-miantafika aminy, dia niriotra namely ireo tanàna jodeanina nanomboka teo Migrôna ka nipaka hatrany Bety-Hôrôna ary nahafaty olona telo arivo sady nitondra babo betsaka.
  - type: heading
    content: Resin’i Jôasy mpanjakan’i Israely i Amatsià
  - type: heading
    content: (Jereo 2 Mp 14.8-14)
  '14':
  - type: text
    content: 'Nony niverina avy nanafika ny Edômita i Amatsià, dia nitondra ny sarivongan’ny andriamanitr’ireo taranak’i Sehîra ireo ka nanangana azy ho andriamaniny; ary niankohoka teo anatrehany izy hitsaoka azy sady nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' taminy. '
  '15':
  - type: text
    content: 'Dia nirehi-pahatezerana tamin’i Amatsià ny TOMPO, ka naniraka '
  - type: text
    content: mpaminany
  - type: text
    content: ' anankiray ho any aminy hanontany azy hoe:'
  - type: text
    content: –Nahoana ianao no mivavaka amin’ny andriamanitr’ireo hafa firenena, dia andriamanitra izay tsy naharo ny olony tamin’ny tananao akory aza?
  '16':
  - type: text
    content: 'Fa rehefa nitenenan’ity mpaminany izany izy, dia namaly hoe:'
  - type: text
    content: –Moa ve nisy nanendry anao ho mpanolotsaina ny mpanjaka? Aoka itsỳ, fandrao asian’ny olona eo ianao!
  - type: text
    content: 'Dia niato kely ilay mpaminany, vao nanohy hoe:'
  - type: text
    content: –Fantatro fa nanapa-kevitra hahafaty anao Andriamanitra, satria nanao izany ianao ka tsy nihaino ny anatro.
  '17':
  - type: text
    content: 'Hevitra hafa no niandanian’i Amatsià mpanjakan’i Joda; ka tamin’izay izy dia nandefa iraka tamin’i Jôasy, zanakalahin’i Jôahaza sy zafin’i Jehò sady mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' mba hilaza aminy hoe: «Avia hifanandrina an’ady isika!»'
  '18':
  - type: text
    content: 'Fa i Jôasy mpanjakan’i Israely dia nandefa iraka tany amin’i Amatsià mpanjakan’i Joda hamaly azy hoe: «Ny kirihitra tsilo izay tany Libano, hono, dia nandefa iraka tany amin’ny sedera izay tany Libano mba hiangavy azy hoe: ‹Omeo ho vadin’ny zanako lahy ny zanakao vavy.› Kanjo nisy bibidian’i Libano namaky teo ka nanosihosy ny kirihitra tsilo'
  - type: note
    content: Momba izany tantara an’ohatra izany, jereo 2 Mp 14.9 sy nta.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Lazainao, ry Amatsià, fa nandresy ny Edômita ianao, ka dia nasesiky ny fonao hirehareha; mitoera ihany re ao an-tranonao, fa nahoana ianao no hanomboka ady handoza anao sady hahalavo ny tenanao mbamin’ny tafik’i Joda?»
  '2':
  - type: text
    content: Nanao izay mahitsy eo imason’ny TOMPO i Amatsià, kanefa tsy dia tamin-kafanampo tanteraka.
  '20':
  - type: text
    content: 'Kanefa tsy nanaiky i Amatsià; avy tamin’Andriamanitra rahateo izany, satria tiany hatolotra eo an-tanan’ny fahavalo i Amatsià sy ny tafiny noho ireo nivavaka tamin’ny andriamanitry ny Edômita. '
  '21':
  - type: text
    content: 'Dia niakatra hiady i Jôasy mpanjakan’i Israely avaratra; ka ny tafiny sy ny an’i Amatsià mpanjakan’i Joda dia nifanandrina tao Bety-Semesy tanànan’i Joda. '
  '22':
  - type: text
    content: 'Resy teo anoloan’ny tafik’i Israely ny tafik’i Joda; ka samy nandositra ho any an-tranony avy ny miaramila jodeanina. '
  '23':
  - type: text
    content: Tao Bety-Semesy no voasambotr’i Jôasy mpanjakan’i Israely i Amatsià, zanakalahin’i Jôasy sy zafin’i Ahazià sady mpanjakan’i Joda, ka nentiny nankany Jerosalema; ary nandravan’i Jôasy roanjato metatra ny mandan’i Jerosalema hatreo amin’ny vavahadin’i Efraîma ka hatrany amin’ny vavahady anjorony
  - type: note
    content: Jereo 2 Mp 14.13. Izany ampahan’ny manda noravana izany dia toa teo amin’ny faritra avaratra na avaratra atsinanan’ny tanàna.
  - type: text
    content: '. '
  '24':
  - type: text
    content: Dia nalain’i Jôasy avokoa ny volamena sy ny volafotsy ary ny zava-tsarobidy izay hita tao an-tranon’Andriamanitra sady teo ambany fiambenan’i Hôbeda-Edôma na izay hita tao amin’ny raki-tsoan’ny lapan’ny mpanjaka; ary nisy ihany koa olona nalainy hatao takalon’aina. Izay izy vao niverina nankany Samaria.
  - type: heading
    content: Fiafaràn’ny nanjakàn’i Amatsià
  - type: heading
    content: (Jereo 2 Mp 14.15-20)
  '25':
  - type: text
    content: 'Taorian’ny nahafatesan’i Jôasy zanakalahin’i Jôahaza sady mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ', dia mbola naharitra 15 taona i Amatsià zanakalahin’i Jôasy sady mpanjakan’i Joda. '
  '26':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Amatsià, na tamboalohany na tafara, dia voasoratra ao amin’ny '
  - type: text
    content: Bokin’ireo mpanjakan’i Joda sy i Israely
  - type: note
    content: Jereo 16.11 sy nta.
  - type: text
    content: '. '
  '27':
  - type: text
    content: Nanomboka tamin’ny andro nihatahan’i Amatsià tsy hanaraka ny TOMPO, dia nisy olona nikomy tamin’ity mpanjaka tao Jerosalema, ka nahatonga azy nandositra tany Lakisy
  - type: note
    content: Jereo 2 Mp 14.19 sy nta.
  - type: text
    content: '; fa nampanaraka azy ireto mpikomy ka nampamono azy ho faty tany an-toerana. '
  '28':
  - type: text
    content: Dia nampodina an-kalesy tarihin-tsoavaly ny fatiny, ka nalevina tao amin’ny fasam-pianakaviany tao an-drenivohitr’i Joda.
  '3':
  - type: text
    content: Rehefa nohamafisin’i Amatsià ny fahefàm-panjakàny, dia nasainy novonoina ho faty ireo manamboninahitra izay nahafaty an’i Jôasy mpanjaka rainy
  - type: note
    content: Jereo 24.25-26.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Kanefa ny zanakalahin’ireo mpamono an’i Jôasy dia tsy mba novonoin’i Amatsià ho faty, fa nataony araka izay voasoratra ao amin’ny bokin’ny Lalàna, dia ny bokin’i Mosesy; ao manko no nandidian’ny TOMPO hoe: «Ny ray aman-dreny tsy hatao maty amin’ny ataon-janany, ary ny zanaka tsy hatao maty amin’ny ataon-dray aman-dreniny; fa samy ho faty amin’ny fahotany avy ny olona'
  - type: note
    content: Ny Deot 24.16 no voatsiahy eto.
  - type: text
    content: .»
  '5':
  - type: text
    content: Dia novorîn’i Amatsià ny vatan-dehilahy tao amin’ny fanjakany, na Jodeanina na Benjaminita, ka nanendreny mpifehy andia-miaramila sy vondro-miaramila, araka ny tarika nisy azy. Natao fanisana ny vatan-dehilahy feno roapolo taona no ho miakatra ka lehilahy voafantina nisy antokony telonjato no hita fa azo nalefa hiantafika sady kinga fampiasa lefona sy ampinga.
  '6':
  - type: text
    content: 'Teo koa ny lehilahy maherifo '
  - type: text
    content: israelita
  - type: text
    content: ' nisy antokony zato nokaramain’ity mpanjaka volafotsy telo taonina '
  '7':
  - type: text
    content: 'Kanefa nisy lehilahy '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ' tonga tao amin’i Amatsià ka nanao hoe:'
  - type: text
    content: '–Ry andriamanjaka, aza avela hanaraka anao hiantafika ny miaramila israelita, satria tsy miaraka amin’ireo rehetra taranak’i Efraîma ireo ny TOMPO. '
  '8':
  - type: text
    content: Fa raha miara-manainga aminy ihany ianao, na dia hahery mikatroka an’ady toy inona aza
  - type: note
    content: Jereo 2 Mp 14.7 sy nta.
  - type: text
    content: ', dia hataon’Andriamanitra lavo eo anoloan’ny fahavalonao; Andriamanitra manko no hany mahay mampandresy na mampahalavo.'
  '9':
  - type: text
    content: 'Hoy kosa i Amatsià tamin’ilay olon’Andriamanitra:'
  - type: text
    content: –Ka hatao ahoana ny amin’ny volafotsy telo taonina izay nomeko ny miaramila israelita?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Ny TOMPO dia mahay manome anao mihoatra lavitra noho izany.
