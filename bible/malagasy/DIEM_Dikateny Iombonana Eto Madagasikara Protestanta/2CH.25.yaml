document_id: 2CH.25,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakàn’i Amatsià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 14.1-7)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Feno 25 taona i Amatsià fony tonga mpanjaka; ary naharitra roapolo taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Jôhadàna, izay avy ao Jerosalema ihany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary navahan’i Amatsià ny miaramila efraimita tonga teo aminy mba halefa hody indray; ka sady lasa nody ireo no nirehi-pahatezerana mafy dia mafy tokoa tamin’ny fanjakàn’i Joda.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nanana herimpo i Amatsià, ka nitarika ny tafiny hankao amin’ny Lohasahan-tsira, ary nahafaty antokony folo tamin’ny Edômita taranak’i Sehîra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ny antokony folo sisa kosa dia nataon’ny Jodeanina sambo-belona, dia nentiny teo antampon’ny hantsam-bato ary navariny teo, ka montsamontsana izy rehetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa ny miaramila efraimita, izay nalefan’i Amatsià hody mba tsy hiara-miantafika aminy, dia niriotra namely ireo tanàna jodeanina nanomboka teo Migrôna ka nipaka hatrany Bety-Hôrôna ary nahafaty olona telo arivo sady nitondra babo betsaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Resin’i Jôasy mpanjakan’i Israely i Amatsià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 14.8-14)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nony niverina avy nanafika ny Edômita i Amatsià, dia nitondra ny sarivongan’ny andriamanitr’ireo taranak’i Sehîra ireo ka nanangana azy ho andriamaniny; ary niankohoka teo anatrehany izy hitsaoka azy sady nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' taminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nirehi-pahatezerana tamin’i Amatsià ny TOMPO, ka naniraka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' anankiray ho any aminy hanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana ianao no mivavaka amin’ny andriamanitr’ireo hafa firenena, dia andriamanitra izay tsy naharo ny olony tamin’ny tananao akory aza?
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa rehefa nitenenan’ity mpaminany izany izy, dia namaly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa ve nisy nanendry anao ho mpanolotsaina ny mpanjaka? Aoka itsỳ, fandrao asian’ny olona eo ianao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niato kely ilay mpaminany, vao nanohy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatro fa nanapa-kevitra hahafaty anao Andriamanitra, satria nanao izany ianao ka tsy nihaino ny anatro.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hevitra hafa no niandanian’i Amatsià mpanjakan’i Joda; ka tamin’izay izy dia nandefa iraka tamin’i Jôasy, zanakalahin’i Jôahaza sy zafin’i Jehò sady mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' mba hilaza aminy hoe: «Avia hifanandrina an’ady isika!»'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa i Jôasy mpanjakan’i Israely dia nandefa iraka tany amin’i Amatsià mpanjakan’i Joda hamaly azy hoe: «Ny kirihitra tsilo izay tany Libano, hono, dia nandefa iraka tany amin’ny sedera izay tany Libano mba hiangavy azy hoe: ‹Omeo ho vadin’ny zanako lahy ny zanakao vavy.› Kanjo nisy bibidian’i Libano namaky teo ka nanosihosy ny kirihitra tsilo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba izany tantara an’ohatra izany, jereo 2 Mp 14.9 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Lazainao, ry Amatsià, fa nandresy ny Edômita ianao, ka dia nasesiky ny fonao hirehareha; mitoera ihany re ao an-tranonao, fa nahoana ianao no hanomboka ady handoza anao sady hahalavo ny tenanao mbamin’ny tafik’i Joda?»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nanao izay mahitsy eo imason’ny TOMPO i Amatsià, kanefa tsy dia tamin-kafanampo tanteraka.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Kanefa tsy nanaiky i Amatsià; avy tamin’Andriamanitra rahateo izany, satria tiany hatolotra eo an-tanan’ny fahavalo i Amatsià sy ny tafiny noho ireo nivavaka tamin’ny andriamanitry ny Edômita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia niakatra hiady i Jôasy mpanjakan’i Israely avaratra; ka ny tafiny sy ny an’i Amatsià mpanjakan’i Joda dia nifanandrina tao Bety-Semesy tanànan’i Joda. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Resy teo anoloan’ny tafik’i Israely ny tafik’i Joda; ka samy nandositra ho any an-tranony avy ny miaramila jodeanina. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tao Bety-Semesy no voasambotr’i Jôasy mpanjakan’i Israely i Amatsià, zanakalahin’i Jôasy sy zafin’i Ahazià sady mpanjakan’i Joda, ka nentiny nankany Jerosalema; ary nandravan’i Jôasy roanjato metatra ny mandan’i Jerosalema hatreo amin’ny vavahadin’i Efraîma ka hatrany amin’ny vavahady anjorony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 14.13. Izany ampahan’ny manda noravana izany dia toa teo amin’ny faritra avaratra na avaratra atsinanan’ny tanàna.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia nalain’i Jôasy avokoa ny volamena sy ny volafotsy ary ny zava-tsarobidy izay hita tao an-tranon’Andriamanitra sady teo ambany fiambenan’i Hôbeda-Edôma na izay hita tao amin’ny raki-tsoan’ny lapan’ny mpanjaka; ary nisy ihany koa olona nalainy hatao takalon’aina. Izay izy vao niverina nankany Samaria.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiafaràn’ny nanjakàn’i Amatsià
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 14.15-20)
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Taorian’ny nahafatesan’i Jôasy zanakalahin’i Jôahaza sady mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ', dia mbola naharitra 15 taona i Amatsià zanakalahin’i Jôasy sady mpanjakan’i Joda. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Amatsià, na tamboalohany na tafara, dia voasoratra ao amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bokin’ireo mpanjakan’i Joda sy i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Nanomboka tamin’ny andro nihatahan’i Amatsià tsy hanaraka ny TOMPO, dia nisy olona nikomy tamin’ity mpanjaka tao Jerosalema, ka nahatonga azy nandositra tany Lakisy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 14.19 sy nta.
      marker-yv: yv-n
    - type: text
      text: '; fa nampanaraka azy ireto mpikomy ka nampamono azy ho faty tany an-toerana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dia nampodina an-kalesy tarihin-tsoavaly ny fatiny, ka nalevina tao amin’ny fasam-pianakaviany tao an-drenivohitr’i Joda.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Rehefa nohamafisin’i Amatsià ny fahefàm-panjakàny, dia nasainy novonoina ho faty ireo manamboninahitra izay nahafaty an’i Jôasy mpanjaka rainy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 24.25-26.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Kanefa ny zanakalahin’ireo mpamono an’i Jôasy dia tsy mba novonoin’i Amatsià ho faty, fa nataony araka izay voasoratra ao amin’ny bokin’ny Lalàna, dia ny bokin’i Mosesy; ao manko no nandidian’ny TOMPO hoe: «Ny ray aman-dreny tsy hatao maty amin’ny ataon-janany, ary ny zanaka tsy hatao maty amin’ny ataon-dray aman-dreniny; fa samy ho faty amin’ny fahotany avy ny olona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny Deot 24.16 no voatsiahy eto.
      marker-yv: yv-n
    - type: text
      text: .»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia novorîn’i Amatsià ny vatan-dehilahy tao amin’ny fanjakany, na Jodeanina na Benjaminita, ka nanendreny mpifehy andia-miaramila sy vondro-miaramila, araka ny tarika nisy azy. Natao fanisana ny vatan-dehilahy feno roapolo taona no ho miakatra ka lehilahy voafantina nisy antokony telonjato no hita fa azo nalefa hiantafika sady kinga fampiasa lefona sy ampinga.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Teo koa ny lehilahy maherifo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: israelita
    - type: text
      text: ' nisy antokony zato nokaramain’ity mpanjaka volafotsy telo taonina '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Kanefa nisy lehilahy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: olon’Andriamanitra
    - type: text
      text: ' tonga tao amin’i Amatsià ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry andriamanjaka, aza avela hanaraka anao hiantafika ny miaramila israelita, satria tsy miaraka amin’ireo rehetra taranak’i Efraîma ireo ny TOMPO. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa raha miara-manainga aminy ihany ianao, na dia hahery mikatroka an’ady toy inona aza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 14.7 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', dia hataon’Andriamanitra lavo eo anoloan’ny fahavalonao; Andriamanitra manko no hany mahay mampandresy na mampahalavo.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hoy kosa i Amatsià tamin’ilay olon’Andriamanitra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ka hatao ahoana ny amin’ny volafotsy telo taonina izay nomeko ny miaramila israelita?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny TOMPO dia mahay manome anao mihoatra lavitra noho izany.
