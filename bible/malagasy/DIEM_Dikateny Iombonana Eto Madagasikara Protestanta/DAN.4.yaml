      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Izaho Nebokadnetsara dia niadam-pinaritra tato an-dapako. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanonofy zava-nampatahotra ahy aho ka nieritreritra teo am-pandriana; fa izay hitako dia nampitebiteby ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nanome baiko aho mba hoentina eo anatrehako avokoa ny olon-kendrin’i
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'olon-kendry:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny 2.12 sy nta
    marker-yv: yv-n
  - type: text
    text: ' Babilôna rehetra hampahafantatra ahy ny hevitry ny nofy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vao niditra ny mpanao majika aman-tsikidy sy ny mpanandro ary ny ombiasy, dia nambarako teo anatrehany ny nofiko, nefa tsy nisy afaka nampahafantatra ahy ny heviny ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nony farany, tonga teo anatrehako i Daniela izay atao hoe Beltesatsara araka ny anaran’ny andriamanitro sady entanin’ny fanahin’ireo andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andriamanitro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia i Bela, andriamanitra lehibe indrindra ho an’ireo Babilônianina. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ireo andriamanitra masina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay Andriamanitra masina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Mitovy amin’izany ny and 6.
    marker-yv: yv-n
  - type: text
    text: ' masina; dia ny nofiko no nambarako teo anatrehany hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '‹Ry Beltesatsara, filohan’ny mpanao majika, fantatro fa entanin’ny fanahin’ireo andriamanitra masina ianao, ary tsy misy zava-miafina manahirana anao; koa ambarao ahy ny hevitr’izao zavatra hitako tamin’ny nofy izao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa rehefa nandry teo am-parafara aho, dia izao no hitako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro nisy hazo iray teo afovoan’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fatratra tokoa ny haavony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nitombo sy nihanatanjaka io hazo io,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny haavony nahatakatra ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tazana hatrany amin’ny faran’ny tany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsara tarehy ny raviny ary betsaka ny voany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nisy sakafo ho an’ny rehetra teo aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao ambaniny no nialokaloka ny bibidia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tao amin’ny rantsany no nitoetra ny voro-manidina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny miaina rehetra nahazo sakafo avy aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Fa raha mbola nandry teo am-pandriako aho, dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' anankiray fatra-piahy hitako nidina avy tany an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: danitra
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Niantso mafy izy ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kapao io hazo io, dia rantsano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ahintsano ny raviny, ary aparitaho ny voany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny biby handositra lavitra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny voro-manidina hiala amin’ny rantsany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kanefa avelao ao amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anivon’ny ahi-maitso any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fotony sy ny fakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hodidino fehy vy sy halimo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho kotsan’ny ando io foto-kazo io;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka izy hihinana ahitra tahaka ny biby
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tahaka ny biby: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: miaraka amin’ny biby.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aoka ny fisainan’olombelona ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosoloina fironam-biby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka izy hitoetra toy izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandritra ny fito taona!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Didin’ireo anjely fatra-piahy no anaovana izany zavatra izany mba hahafantaran’ny velona fa ilay Andriamanitra Avo Indrindra no manapaka amin’ny fanjakan’ny olombelona ka manome izany ho an’izay tiany; ary mety ny olona farany ambany aza no asandrany eo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Izany no nofy hitako, izaho Nebokadnetsara mpanjaka; ary ianao, ry Beltesatsara, no milazà ny heviny, fa tsy nisy afaka nampahafantatra ahy ny heviny ireo olon-kendry rehetra tao amin’ny fanjakako; fa ianao kosa no afaka manao izany satria entanin’ny fanahin’ireo andriamanitra masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo andriamanitra masina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay Andriamanitra masina.
    marker-yv: yv-n
  - type: text
    text: .› »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nohazavain’i Daniela ny hevitry ny nofin’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia talanjona fotoana fohy i Daniela izay antsoina hoe Beltesatsara, ary nampitebiteby azy mafy ny eritreriny. Ka hoy ny mpanjaka taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Beltesatsara, aoka tsy hampitebiteby anao ny nofy sy ny heviny.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa namaly i Beltesatsara ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry andriamanjaka ô, enga anie ny nofy sy ny heviny ka ho an’ny mpankahala anao mbamin’ny fahavalonao! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nahita hazo iray lehibe sy matanjaka ianao, ka ny haavony nahatakatra ny lanitra; ary tazana hatrany amin’ny tany tontolo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsara tarehy ny raviny, ary betsaka ny voany sady nisy sakafo ho an’ny miaina rehetra teo aminy; tao ambaniny no nialokaloka ny bibidia, ary tao amin’ny rantsany no nitoetra ny voro-manidina. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ianao io hazo io, ry mpanjaka! Fa tonga lehibe sady matanjaka ianao; ny fahalehibeazanao dia nitombo ka nahatakatra ny lanitra, ary ny fanapahanao nipaka hatrany amin’ny faran’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Avy eo ianao, ry mpanjaka, dia nahita anjely fatra-piahy nidina avy tany an-danitra sady nandidy hoe: «Kapao io hazo io ka simbao! Kanefa avelao ao amin’ny tany, eo anivon’ny ahi-maitso any an-tsaha, ny fotony sy ny fakany, ka hodidino fehy vy sy halimo. Ary aoka ho kotsan’ny ando io foto-kazo io ary aoka hiombona anjara amin’ny biby eny an-tsaha izy mandritra ny fito taona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izao no hevitr’izany, ry andriamanjaka, araka ny tendrin’ny Avo Indrindra, izay mihatra aminao: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Horoahina hiala amin’ny olombelona ianao, dia hiara-mipetraka amin’ny biby eny an-tsaha, hihinana ahitra tahaka ny omby ary ho kotsan’ny ando! Fito taona no haharetan’izany aminao, mandra-piekenao fa ny Avo Indrindra no manapaka amin’ny fanjakan’ny olombelona ka manome izany ho an’izay tiany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny baiko hamelana ny foto-kazo sy ny fakany kosa dia midika hoe: Haverina aminao ny fanjakanao rehefa miaiky ianao fa ilay Andriamanitry ny lanitra no manapaka. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Noho izany, aoka ho sitrakao ny torohevitro, ry andriamanjaka: Mba atsaharo ny heloka amam-pahotanao, fa ny fahamarinana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fahamarinana '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fanaovan-tsoa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: amam-piantrana kosa no ataovy; angamba hohalavaina ihany ny fotoan-kiadananao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tanteraka ny nofy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia tanteraka tamin’i Nebokadnetsara mpanjaka avokoa izay rehetra nambaran’ny nofiny. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nony afaka roa ambin’ny folo volana dia nitsangantsangana teo an-tampon-tranon’ny lapany tao Babilôna ny mpanjaka; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary niteny izy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ity moa ilay Babilôna lehibe izay naoriko ho fonenan’andriamanjaka? Porofo izao fa lehibe ny heriko izao ary heni-boninahitra ny fiandrianako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Iny mbola niteny iny ny mpanjaka, dia nisy feo avy tany an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: danitra
  - type: text
    text: ' nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ambara aminao, ry Nebokadnetsara mpanjaka, fa nesorina taminao ny fahefàm-panjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Horoahina hiala amin’ny olombelona ianao, dia hiara-mipetraka amin’ny biby eny an-tsaha, ary hihinana ahitra tahaka ny omby. Fito taona no haharetan’izany aminao, mandra-piekenao fa ny Avo Indrindra no manapaka amin’ny fanjakan’olombelona, ka manome izany ho an’izay tiany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Niaraka tamin’izay dia tanteraka tamin’i Nebokadnetsara izany teny izany: Noroahina niala tamin’ny olombelona izy ka nihinana ahitra toy ny omby, ary kotsan’ny ando ny tenany, hany ka ny volon-dohany dia tonga lava toy ny an’ny voromahery ary ny hohony dia tonga nifaraingo toy ny an’ny vorona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sitrana i Nebokadnetsara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Rehefa tapitra ny fetr’andro, izaho Nebokadnetsara dia niandrandra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: '; ka nody tamiko indray ny saiko. Nisaotra ny Avo Indrindra Izay velona mandrakizay aho, ary nidera sy nankalaza Azy fa ny fanapahany dia maharitra mandrakizay ary ny fanjakany dia mihatra amin’ny taranaka mifandimby. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny mponina rehetra etỳ an-tany dia tsinontsinona ihany eo anoloany; araka izay sitrapony no ataony amin’ny anjely any an-danitra sy amin’ny mponina etỳ an-tany; tsy misy afaka manohitra ny fahefàny na manome tsiny azy amin’izay ataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin’izay fotoana izay dia nody tamiko tokoa ny saiko; ary mba ho voninahitry ny fanjakako, dia naverina tamiko ihany koa ny fiandrianako amam-pamirapiratako. Nitady ahy ireo mpanolotsaiko sy ireo olo-manan-kajako; ary naverina teo amin’ny fahefàm-panjakako aho, ka haja mihoa-pampana no natolotra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Koa ankehitriny, izaho Nebokadnetsara dia midera sy mankalaza ary manome voninahitra ilay Mpanjakan’ny lanitra; fa marina izay ataony rehetra, mahitsy ny asany rehetra. Ary hainy aetry aza izay mitondra tena amim-piavonavonana.
