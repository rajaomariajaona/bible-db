document_id: DAN.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: '«Izaho Nebokadnetsara dia niadam-pinaritra tato an-dapako. '
  '10':
  - type: text
    content: '«Fa raha mbola nandry teo am-pandriako aho, dia nisy '
  - type: text
    content: anjely
  - type: text
    content: ' anankiray fatra-piahy hitako nidina avy tany an-'
  - type: text
    content: danitra
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Niantso mafy izy ka nanao hoe:'
  - type: text
    content: Kapao io hazo io, dia rantsano;
  - type: text
    content: ahintsano ny raviny, ary aparitaho ny voany!
  - type: text
    content: Aoka ny biby handositra lavitra azy
  - type: text
    content: ary ny voro-manidina hiala amin’ny rantsany.
  '12':
  - type: text
    content: Kanefa avelao ao amin’ny tany,
  - type: text
    content: eo anivon’ny ahi-maitso any an-tsaha,
  - type: text
    content: ny fotony sy ny fakany,
  - type: text
    content: ka hodidino fehy vy sy halimo.
  - type: text
    content: Aoka ho kotsan’ny ando io foto-kazo io;
  - type: text
    content: ary aoka izy hihinana ahitra tahaka ny biby
  - type: note
    content: 'tahaka ny biby: dkt hafa miaraka amin’ny biby.'
  - type: text
    content: .
  '13':
  - type: text
    content: Aoka ny fisainan’olombelona ao aminy
  - type: text
    content: hosoloina fironam-biby;
  - type: text
    content: ary aoka izy hitoetra toy izany
  - type: text
    content: mandritra ny fito taona!
  '14':
  - type: text
    content: «Didin’ireo anjely fatra-piahy no anaovana izany zavatra izany mba hahafantaran’ny velona fa ilay Andriamanitra Avo Indrindra no manapaka amin’ny fanjakan’ny olombelona ka manome izany ho an’izay tiany; ary mety ny olona farany ambany aza no asandrany eo.
  '15':
  - type: text
    content: «Izany no nofy hitako, izaho Nebokadnetsara mpanjaka; ary ianao, ry Beltesatsara, no milazà ny heviny, fa tsy nisy afaka nampahafantatra ahy ny heviny ireo olon-kendry rehetra tao amin’ny fanjakako; fa ianao kosa no afaka manao izany satria entanin’ny fanahin’ireo andriamanitra masina
  - type: note
    content: ireo andriamanitra masina na ilay Andriamanitra masina.
  - type: text
    content: .› »
  - type: heading
    content: Nohazavain’i Daniela ny hevitry ny nofin’ny mpanjaka
  '16':
  - type: text
    content: 'Dia talanjona fotoana fohy i Daniela izay antsoina hoe Beltesatsara, ary nampitebiteby azy mafy ny eritreriny. Ka hoy ny mpanjaka taminy:'
  - type: text
    content: –Ry Beltesatsara, aoka tsy hampitebiteby anao ny nofy sy ny heviny.
  - type: text
    content: 'Fa namaly i Beltesatsara ka nanao hoe:'
  - type: text
    content: '–Ry andriamanjaka ô, enga anie ny nofy sy ny heviny ka ho an’ny mpankahala anao mbamin’ny fahavalonao! '
  '17':
  - type: text
    content: 'Nahita hazo iray lehibe sy matanjaka ianao, ka ny haavony nahatakatra ny lanitra; ary tazana hatrany amin’ny tany tontolo izy. '
  '18':
  - type: text
    content: 'Tsara tarehy ny raviny, ary betsaka ny voany sady nisy sakafo ho an’ny miaina rehetra teo aminy; tao ambaniny no nialokaloka ny bibidia, ary tao amin’ny rantsany no nitoetra ny voro-manidina. '
  '19':
  - type: text
    content: 'Ianao io hazo io, ry mpanjaka! Fa tonga lehibe sady matanjaka ianao; ny fahalehibeazanao dia nitombo ka nahatakatra ny lanitra, ary ny fanapahanao nipaka hatrany amin’ny faran’ny tany. '
  '2':
  - type: text
    content: 'Nanonofy zava-nampatahotra ahy aho ka nieritreritra teo am-pandriana; fa izay hitako dia nampitebiteby ahy. '
  '20':
  - type: text
    content: 'Avy eo ianao, ry mpanjaka, dia nahita anjely fatra-piahy nidina avy tany an-danitra sady nandidy hoe: «Kapao io hazo io ka simbao! Kanefa avelao ao amin’ny tany, eo anivon’ny ahi-maitso any an-tsaha, ny fotony sy ny fakany, ka hodidino fehy vy sy halimo. Ary aoka ho kotsan’ny ando io foto-kazo io ary aoka hiombona anjara amin’ny biby eny an-tsaha izy mandritra ny fito taona.'
  '21':
  - type: text
    content: 'Izao no hevitr’izany, ry andriamanjaka, araka ny tendrin’ny Avo Indrindra, izay mihatra aminao: '
  '22':
  - type: text
    content: 'Horoahina hiala amin’ny olombelona ianao, dia hiara-mipetraka amin’ny biby eny an-tsaha, hihinana ahitra tahaka ny omby ary ho kotsan’ny ando! Fito taona no haharetan’izany aminao, mandra-piekenao fa ny Avo Indrindra no manapaka amin’ny fanjakan’ny olombelona ka manome izany ho an’izay tiany. '
  '23':
  - type: text
    content: 'Ary ny baiko hamelana ny foto-kazo sy ny fakany kosa dia midika hoe: Haverina aminao ny fanjakanao rehefa miaiky ianao fa ilay Andriamanitry ny lanitra no manapaka. '
  '24':
  - type: text
    content: 'Noho izany, aoka ho sitrakao ny torohevitro, ry andriamanjaka: Mba atsaharo ny heloka amam-pahotanao, fa ny fahamarinana'
  - type: note
    content: fahamarinana na fanaovan-tsoa.
  - type: text
    content: amam-piantrana kosa no ataovy; angamba hohalavaina ihany ny fotoan-kiadananao.
  - type: heading
    content: Tanteraka ny nofy
  '25':
  - type: text
    content: 'Dia tanteraka tamin’i Nebokadnetsara mpanjaka avokoa izay rehetra nambaran’ny nofiny. '
  '26':
  - type: text
    content: 'Nony afaka roa ambin’ny folo volana dia nitsangantsangana teo an-tampon-tranon’ny lapany tao Babilôna ny mpanjaka; '
  '27':
  - type: text
    content: 'ary niteny izy ka nanao hoe:'
  - type: text
    content: –Tsy ity moa ilay Babilôna lehibe izay naoriko ho fonenan’andriamanjaka? Porofo izao fa lehibe ny heriko izao ary heni-boninahitra ny fiandrianako.
  '28':
  - type: text
    content: Iny mbola niteny iny ny mpanjaka, dia nisy feo avy tany an-
  - type: text
    content: danitra
  - type: text
    content: ' nanao hoe:'
  - type: text
    content: '–Ambara aminao, ry Nebokadnetsara mpanjaka, fa nesorina taminao ny fahefàm-panjakana. '
  '29':
  - type: text
    content: Horoahina hiala amin’ny olombelona ianao, dia hiara-mipetraka amin’ny biby eny an-tsaha, ary hihinana ahitra tahaka ny omby. Fito taona no haharetan’izany aminao, mandra-piekenao fa ny Avo Indrindra no manapaka amin’ny fanjakan’olombelona, ka manome izany ho an’izay tiany.
  '3':
  - type: text
    content: Ary nanome baiko aho mba hoentina eo anatrehako avokoa ny olon-kendrin’i
  - type: note
    content: 'olon-kendry: jereo ny 2.12 sy nta'
  - type: text
    content: ' Babilôna rehetra hampahafantatra ahy ny hevitry ny nofy. '
  '30':
  - type: text
    content: 'Niaraka tamin’izay dia tanteraka tamin’i Nebokadnetsara izany teny izany: Noroahina niala tamin’ny olombelona izy ka nihinana ahitra toy ny omby, ary kotsan’ny ando ny tenany, hany ka ny volon-dohany dia tonga lava toy ny an’ny voromahery ary ny hohony dia tonga nifaraingo toy ny an’ny vorona.'
  - type: heading
    content: Sitrana i Nebokadnetsara
  '31':
  - type: text
    content: 'Rehefa tapitra ny fetr’andro, izaho Nebokadnetsara dia niandrandra ny '
  - type: text
    content: lanitra
  - type: text
    content: '; ka nody tamiko indray ny saiko. Nisaotra ny Avo Indrindra Izay velona mandrakizay aho, ary nidera sy nankalaza Azy fa ny fanapahany dia maharitra mandrakizay ary ny fanjakany dia mihatra amin’ny taranaka mifandimby. '
  '32':
  - type: text
    content: Ny mponina rehetra etỳ an-tany dia tsinontsinona ihany eo anoloany; araka izay sitrapony no ataony amin’ny anjely any an-danitra sy amin’ny mponina etỳ an-tany; tsy misy afaka manohitra ny fahefàny na manome tsiny azy amin’izay ataony.
  '33':
  - type: text
    content: 'Tamin’izay fotoana izay dia nody tamiko tokoa ny saiko; ary mba ho voninahitry ny fanjakako, dia naverina tamiko ihany koa ny fiandrianako amam-pamirapiratako. Nitady ahy ireo mpanolotsaiko sy ireo olo-manan-kajako; ary naverina teo amin’ny fahefàm-panjakako aho, ka haja mihoa-pampana no natolotra ahy. '
  '34':
  - type: text
    content: Koa ankehitriny, izaho Nebokadnetsara dia midera sy mankalaza ary manome voninahitra ilay Mpanjakan’ny lanitra; fa marina izay ataony rehetra, mahitsy ny asany rehetra. Ary hainy aetry aza izay mitondra tena amim-piavonavonana.
  '4':
  - type: text
    content: 'Vao niditra ny mpanao majika aman-tsikidy sy ny mpanandro ary ny ombiasy, dia nambarako teo anatrehany ny nofiko, nefa tsy nisy afaka nampahafantatra ahy ny heviny ireo. '
  '5':
  - type: text
    content: Nony farany, tonga teo anatrehako i Daniela izay atao hoe Beltesatsara araka ny anaran’ny andriamanitro sady entanin’ny fanahin’ireo andriamanitra
  - type: note
    content: 'andriamanitro: dia i Bela, andriamanitra lehibe indrindra ho an’ireo Babilônianina. –ireo andriamanitra masina na ilay Andriamanitra masina. Mitovy amin’izany ny and 6.'
  - type: text
    content: ' masina; dia ny nofiko no nambarako teo anatrehany hoe: '
  '6':
  - type: text
    content: '‹Ry Beltesatsara, filohan’ny mpanao majika, fantatro fa entanin’ny fanahin’ireo andriamanitra masina ianao, ary tsy misy zava-miafina manahirana anao; koa ambarao ahy ny hevitr’izao zavatra hitako tamin’ny nofy izao. '
  '7':
  - type: text
    content: 'Fa rehefa nandry teo am-parafara aho, dia izao no hitako:'
  - type: text
    content: Indro nisy hazo iray teo afovoan’ny tany;
  - type: text
    content: ary fatratra tokoa ny haavony.
  '8':
  - type: text
    content: Nitombo sy nihanatanjaka io hazo io,
  - type: text
    content: ka ny haavony nahatakatra ny lanitra;
  - type: text
    content: ary tazana hatrany amin’ny faran’ny tany izy.
  '9':
  - type: text
    content: Tsara tarehy ny raviny ary betsaka ny voany,
  - type: text
    content: sady nisy sakafo ho an’ny rehetra teo aminy.
  - type: text
    content: Tao ambaniny no nialokaloka ny bibidia,
  - type: text
    content: ary tao amin’ny rantsany no nitoetra ny voro-manidina.
  - type: text
    content: Ary ny miaina rehetra nahazo sakafo avy aminy.
