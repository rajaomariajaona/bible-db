document_id: JOS.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanekempihavanana tamin’ny mponina tao Gibehôna
  - type: text
    content: 'Ary ny vaovao momba ny faharavàn’i Hay dia ren’ireo mpanjaka izay teny amin’ny faritra rehetra andafy andrefan’i Jôrdàna; teny amin’ny havoana sy teny amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ' ary teny amin’tany rehetra amoron’ny Ranomasina Mediteranea ka hatrany hatrany Libano. Koa nifamory ny mpanjaka hetita sy '
  - type: text
    content: amôrita
  - type: text
    content: ' mbamin’ny mpanjaka kanahanita sy perizita ary ny mpanjaka hivita sy jebosita '
  '10':
  - type: text
    content: 'sy izay rehetra nataony tamin’ireo mpanjaka amorîta roa lahy tany ampitan’i Jôrdàna: dia i Sihôna mpanjakan’i Hesbôna, sy i Hôga mpanjakan’i '
  - type: text
    content: Basàna
  - type: text
    content: ' izay nonina tany Hastarôta'
  - type: note
    content: Jereo ny 2.10 sy nta.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Izany no nitenenan’ireo '
  - type: text
    content: loholonay
  - type: text
    content: ' sy ireo olona rehetra mpiray tanindrazana aminay mba hanomana vatsy ho an’ny dia ka handeha hihaona aminareo; nasainy manolo-tena hanompo anareo izahay sy mangataka anareo hanao fanekempihavanana aminay. '
  '12':
  - type: text
    content: 'Jereonareo ange ny mofonay e! Mbola nafàna izy ireo raha nentinay hatao vatsy fony izahay niala tany an-tranonay hankaty aminareo, nefa ankehitriny efa maina sy bobongolo! '
  '13':
  - type: text
    content: Jereonareo ireto siny hoditra e! Mbola vaovao izy ireo raha nofenoinay divay nefa ankehitriny efa triatra! Ireto lambanay sy kapanay koa dia efa tonta noho ny halaviran’ny lalana nalehanay.
  '14':
  - type: text
    content: 'Ary nihinanan’ny Israelita ny vatsin-dry zareo fa tsy nanontaniany akory ny TOMPO ny amin’io. '
  '15':
  - type: text
    content: Dia nanao fanekempihavanana tamin’ny Gibehônita i Josoa ka niantoka fa tsy hamono azy; ary nohamafisin’ireo loholom-piangonana israelita tamin’ny fianianana izany.
  '16':
  - type: text
    content: 'Telo andro taorian’ny nahavitan’ny fanekempihavanana, dia ren’ny Israelita fa mponina mifanakaiky aminy ihany ireo olona ireo. '
  '17':
  - type: text
    content: Dia niainga ny Israelita; ka nony afaka telo andro, dia tonga tany an-tanànan-dry zareo, izany hoe tao Gibehona sy Kefirà ary Beerôta sy Kiriata-Jeharima
  - type: note
    content: Ireo tanàna efatra ireo dia eo amin’ny kilaometatra vitsivitsy any avaratra andrefan’i Jerosalema.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Kanefa tsy namono azy ny Israelita satria ny anaran’ny TOMPO Andriamanitr’i Israely no efa nianianan’ireo loholom-piangonana taminy. Koa nimonomonona tamin’ireo loholona ny Israelita rehetra; '
  '19':
  - type: text
    content: 'saingy novalian’ireo hoe:'
  - type: text
    content: '–Ny anaran’ny TOMPO Andriamanitr’i Israely no efa nianiananay taminy; koa tsy azontsika atao ny mamely azy ankehitriny. '
  '2':
  - type: text
    content: ka niray hina hiady amin’i Josoa sy ny Israelita.
  '20':
  - type: text
    content: 'Tsy maintsy avelantsika ho velona ihany ireo: fa raha tsy izany, dia hiharan’ny fahatezeran’ny Tompo isika noho ny fianianana efa vitanay. Saingy izao no hataontsika azy: '
  '21':
  - type: text
    content: Havelantsika ho velona izy nefa kosa ho tonga mpaka kitay sy mpantsaka rano ho antsika
  - type: note
    content: Ny maka kitay sy mantsaka dia heverina fa raharaha ambany.
  - type: text
    content: .
  - type: text
    content: 'Izany no soso-kevitr’ireo loholom-piangonana israelita. '
  '22':
  - type: text
    content: 'Koa novorîn’i Josoa ny Gibehônita ary nilazany hoe:'
  - type: text
    content: '–Ahoana no namitahanareo anay ka nanambaranareo fa avy lavitra be ianareo, kanjo mponina mifanakaiky aminay ihany? '
  '23':
  - type: text
    content: Ankehitriny dia voaozona ianareo, ka tsy hitsahatra ny hanompo, satria ho mpaka kitay sy mpantsaka rano ho an’ny tranon’Andriamanitro ianareo.
  '24':
  - type: text
    content: 'Dia namaly an’i Josoa ny Gibehônita ka nanao hoe:'
  - type: text
    content: '–Notantaraina tsara taminay, tompoko, izay efa nandidian’ny TOMPO Andriamanitrao an’i Mosesy mpanompony, dia ny hanomezana anareo ity tany manontolo ity ary handringananareo ny mponina rehetra ao aminy arakaraka ny androsoanareo. Natahotra mafy ny ho faty izahay noho ny aminareo, ka izany no nanaovanay izany zavatra izany. '
  '25':
  - type: text
    content: Ankehitriny, indreto izahay eo an-tananao; koa araka izay heverinao ho tsara sy rariny no ataovy aminay.
  '26':
  - type: text
    content: 'Dia izao no nataon’i Josoa tamin’ny Gibehônita: narovany tsy hovonoin’ny Israelita ireo. '
  '27':
  - type: text
    content: 'Tamin’izany andro izany koa no nanolorany azy ho mpaka kitay sy ho mpantsaka rano ho an’ny Israelita sy ho an’ny '
  - type: text
    content: alitaran
  - type: text
    content: ’ny TOMPO eo amin’ny toerana izay hofidin’Izy TOMPO. Ary mbola manohy izany raharaha izany mandraka androany ry zareo.
  '3':
  - type: text
    content: Ny mponina tao Gibehôna
  - type: note
    content: I Gibehôna dia tanàna tokony ho folo kilaometatra ao avaratra andrefan’i Jerosalema.
  - type: text
    content: ' dia isan’ny Hivita; kanefa, nony nandre an’izay nataon’i Josoa tamin’i Jerikao sy i Hay ry zareo, '
  '4':
  - type: text
    content: 'dia nanapa-kevitra hampiasa hafetsena. Nanainga nitondra vatsy izy rehetra ka kitapo tonta sy '
  - type: text
    content: siny hoditra
  - type: text
    content: ' tonta sady misy triatra voatampintampina no nalainy ka natainginy tamin’ny borikiny; '
  '5':
  - type: text
    content: fitafiana tonta nozaijairina no nanaovany; ary mofo efa maina sady efa bobongolo avokoa no nentiny ho vatsy
  - type: note
    content: Ny hafetsen’ny Gibehônita dia ny fomba nataony hampino fa efa nandeha ela tokoa izy ireo ka avy lavitra (and 12-13). Raha fantatry ny Israely fa mponina mifanakaiky aminy ihany ry zareo, dia ho nampihariny taminy ny lalàna mikasika ireo tanàna akaiky (jereo Deot 20.16-18).
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Dia nankany amin’i Josoa sy ny Israelita izay nitoby tao Gilgala ry zareo ka nanao taminy hoe:'
  - type: text
    content: –Avy any an-tany lavitra izahay no tonga hangataka anareo hanao fanekempihavanana aminay izao!
  '7':
  - type: text
    content: 'Fa novalian’ny Israelita hoe:'
  - type: text
    content: –Angamba etỳ akaikinay etỳ ihany ianareo no monina, koa ahoana no hanaovanay fanekempihavanana aminareo
  - type: note
    content: Jereo ny naoty eo amin’ny and 5.
  - type: text
    content: '?'
  '8':
  - type: text
    content: 'Dia hoy ireo tamin’i Josoa:'
  - type: text
    content: –Manolo-tena hanompo anao izahay
  - type: note
    content: Manaiky ho saranga ambany nialoha sahady ny Gibehônita (jereo and 11 sy 23).
  - type: text
    content: '!'
  - type: text
    content: 'I Josoa kosa nanontany azy hoe:'
  - type: text
    content: –Fa iza moa ianareo ary avy aiza?
  '9':
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: '–Avy any an-tany lavitra be izahay, tompoko, no tonga noho ny lazan’ny TOMPO Andriamanitrareo; efa renay manko izay rehetra nataony tany Ejipta '
