          text: Gibehôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tanàna tokony ho folo kilaometatra ao avaratra andrefan’i Jerosalema.'
      marker-yv: yv-n
    - type: text
      text: ' dia isan’ny Hivita; kanefa, nony nandre an’izay nataon’i Josoa tamin’i Jerikao sy i Hay ry zareo, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nanapa-kevitra hampiasa hafetsena. Nanainga nitondra vatsy izy rehetra ka kitapo tonta sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: siny hoditra
    - type: text
      text: ' tonta sady misy triatra voatampintampina no nalainy ka natainginy tamin’ny borikiny; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fitafiana tonta nozaijairina no nanaovany; ary mofo efa maina sady efa bobongolo avokoa no nentiny ho vatsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hafetsen’ny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Gibehônita dia ny fomba nataony hampino fa efa nandeha ela tokoa izy ireo ka avy lavitra (and 12-13). Raha fantatry ny Israely fa mponina mifanakaiky aminy ihany ry zareo, dia ho nampihariny taminy ny lalàna mikasika ireo tanàna akaiky (jereo Deot 20.16-18).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany amin’i Josoa sy ny Israelita izay nitoby tao Gilgala ry zareo ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy any an-tany lavitra izahay no tonga hangataka anareo hanao fanekempihavanana aminay izao!
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’ny Israelita hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Angamba etỳ akaikinay etỳ ihany ianareo no monina, koa ahoana no hanaovanay fanekempihavanana aminareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ny naoty eo amin’ny and 5.
      marker-yv: yv-n
    - type: text
      text: '?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo tamin’i Josoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manolo-tena hanompo anao izahay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manaiky ho saranga ambany nialoha sahady ny Gibehônita (jereo and 11 sy 23).
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Josoa kosa nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa iza moa ianareo ary avy aiza?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Avy any an-tany lavitra be izahay, tompoko, no tonga noho ny lazan’ny TOMPO Andriamanitrareo; efa renay manko izay rehetra nataony tany Ejipta '
