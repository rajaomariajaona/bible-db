document_id: JOS.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanekempihavanana tamin’ny mponina tao Gibehôna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vaovao momba ny faharavàn’i Hay dia ren’ireo mpanjaka izay teny amin’ny faritra rehetra andafy andrefan’i Jôrdàna; teny amin’ny havoana sy teny amin’ny lemak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sefelà
    - type: text
      text: ' ary teny amin’tany rehetra amoron’ny Ranomasina Mediteranea ka hatrany hatrany Libano. Koa nifamory ny mpanjaka hetita sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: amôrita
    - type: text
      text: ' mbamin’ny mpanjaka kanahanita sy perizita ary ny mpanjaka hivita sy jebosita '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'sy izay rehetra nataony tamin’ireo mpanjaka amorîta roa lahy tany ampitan’i Jôrdàna: dia i Sihôna mpanjakan’i Hesbôna, sy i Hôga mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Basàna
    - type: text
      text: ' izay nonina tany Hastarôta'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ny 2.10 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izany no nitenenan’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholonay
    - type: text
      text: ' sy ireo olona rehetra mpiray tanindrazana aminay mba hanomana vatsy ho an’ny dia ka handeha hihaona aminareo; nasainy manolo-tena hanompo anareo izahay sy mangataka anareo hanao fanekempihavanana aminay. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jereonareo ange ny mofonay e! Mbola nafàna izy ireo raha nentinay hatao vatsy fony izahay niala tany an-tranonay hankaty aminareo, nefa ankehitriny efa maina sy bobongolo! '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jereonareo ireto siny hoditra e! Mbola vaovao izy ireo raha nofenoinay divay nefa ankehitriny efa triatra! Ireto lambanay sy kapanay koa dia efa tonta noho ny halaviran’ny lalana nalehanay.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nihinanan’ny Israelita ny vatsin-dry zareo fa tsy nanontaniany akory ny TOMPO ny amin’io. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanao fanekempihavanana tamin’ny Gibehônita i Josoa ka niantoka fa tsy hamono azy; ary nohamafisin’ireo loholom-piangonana israelita tamin’ny fianianana izany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Telo andro taorian’ny nahavitan’ny fanekempihavanana, dia ren’ny Israelita fa mponina mifanakaiky aminy ihany ireo olona ireo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga ny Israelita; ka nony afaka telo andro, dia tonga tany an-tanànan-dry zareo, izany hoe tao Gibehona sy Kefirà ary Beerôta sy Kiriata-Jeharima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tanàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' efatra ireo dia eo amin’ny kilaometatra vitsivitsy any avaratra andrefan’i Jerosalema.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tsy namono azy ny Israelita satria ny anaran’ny TOMPO Andriamanitr’i Israely no efa nianianan’ireo loholom-piangonana taminy. Koa nimonomonona tamin’ireo loholona ny Israelita rehetra; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saingy novalian’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny anaran’ny TOMPO Andriamanitr’i Israely no efa nianiananay taminy; koa tsy azontsika atao ny mamely azy ankehitriny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka niray hina hiady amin’i Josoa sy ny Israelita.
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy maintsy avelantsika ho velona ihany ireo: fa raha tsy izany, dia hiharan’ny fahatezeran’ny Tompo isika noho ny fianianana efa vitanay. Saingy izao no hataontsika azy: '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Havelantsika ho velona izy nefa kosa ho tonga mpaka kitay sy mpantsaka rano ho antsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: maka kitay sy mantsaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia heverina fa raharaha ambany.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no soso-kevitr’ireo loholom-piangonana israelita. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa novorîn’i Josoa ny Gibehônita ary nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ahoana no namitahanareo anay ka nanambaranareo fa avy lavitra be ianareo, kanjo mponina mifanakaiky aminay ihany? '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ankehitriny dia voaozona ianareo, ka tsy hitsahatra ny hanompo, satria ho mpaka kitay sy mpantsaka rano ho an’ny tranon’Andriamanitro ianareo.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Josoa ny Gibehônita ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Notantaraina tsara taminay, tompoko, izay efa nandidian’ny TOMPO Andriamanitrao an’i Mosesy mpanompony, dia ny hanomezana anareo ity tany manontolo ity ary handringananareo ny mponina rehetra ao aminy arakaraka ny androsoanareo. Natahotra mafy ny ho faty izahay noho ny aminareo, ka izany no nanaovanay izany zavatra izany. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ankehitriny, indreto izahay eo an-tananao; koa araka izay heverinao ho tsara sy rariny no ataovy aminay.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia izao no nataon’i Josoa tamin’ny Gibehônita: narovany tsy hovonoin’ny Israelita ireo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany koa no nanolorany azy ho mpaka kitay sy ho mpantsaka rano ho an’ny Israelita sy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitaran
    - type: text
      text: ’ny TOMPO eo amin’ny toerana izay hofidin’Izy TOMPO. Ary mbola manohy izany raharaha izany mandraka androany ry zareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mponina tao Gibehôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
