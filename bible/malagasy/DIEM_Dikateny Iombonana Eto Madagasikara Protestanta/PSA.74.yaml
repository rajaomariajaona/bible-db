  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nanokafanao lalana ny loharano sy ny sakeli-drano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nataonao tankina ny ony tsy mety ritra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Anao ny andro, Anao koa ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no nahary ny masoandro amam-bolana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ianao no nametra ny faritra rehetra amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao koa no nanao ny fahavaratra sy ny ririnina.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'TOMPO ô, izao no mba tsarovy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miteny ratsy Anao ny fahavalo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manamavo Anao io firenena adala io.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aza atolotra an’ireo bibidia ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ain’ilay domohina malalanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza hadinoina na oviana na oviana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fiainan’ireo olo-mahantranao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsarovy ilay vahoakanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa azonao hatramin’ny ela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo foko navotanao ho fanananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tsarovy ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nataonao fonenana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hevero ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' nataonao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria feno olona iharan’ny herisetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo fiafenana rehetra ato amin’ny tany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aza avela hiverina amin-kenatra izay nampahorîna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka kosa ny mahantra sy ny malahelo hidera Anao!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Andriamanitra ô, mirotsaha an-tsehatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiandraikitra ny adinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsarovy fa ireo adala ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miteny ratsy Anao isan’andro.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Aza hadinoina ny tabataban’ireo mpandrafy Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny horakoraka izay ataon’ireo mpanohitra Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mitsahatra miakatra any aminao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Avia Ianao hijery ireo rava hatry ny ela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nosimban’ny fahavalo avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zavatra tanatin’ny toerana masina.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tao amin’ny faritra fihaonana aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nihorakorahan’ireo olona mpandrafy Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nametrahany ny fanevany ho mari-pandresena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny fisehony tao dia toy ny mpikapa hazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manainga famaky hitevy ala mikitroka,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ary nopotehiny tamin’ny famaky sy ny kanonta avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny rafitra na ny sokitra tamin’izay.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
