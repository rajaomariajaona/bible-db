  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy izy ireo anakampony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aoka hampahorîntsika izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hodorantsika avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
