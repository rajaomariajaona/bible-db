document_id: PSA.74,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaka noho ny fahasimbàn’ny Tempolin’i Jerosalema
  - type: text
    content: ' '
  - type: text
    content: Tononkalo fananarana nataon’i Asafa
  - type: text
    content: ' '
  - type: note
    content: 'Tononkalo fananarana: jereo Sal 32.1 sy nta. – Asafa: jereo Sal 50.1 sy nta.'
  - type: text
    content: .
  - type: text
    content: Andriamanitra ô, nahoana izahay
  - type: text
    content: no dia narianao tanteraka?
  - type: text
    content: 'Nahoana izahay andian’ondry '
  - type: text
    content: fiandrinao
  - type: text
    content: no irehetan’ny fahatezeranao?
  '10':
  - type: text
    content: Andriamanitra ô, mandra-pahoviana
  - type: text
    content: no hiteny ratsy Anao ny mpandrafy anay?
  - type: text
    content: Ary moa ny fahavalonay ve
  - type: text
    content: dia tsy hitsahatra hanamavo Anao?
  '11':
  - type: text
    content: Nahoana ny tananao ankavanana no nahemotrao
  - type: text
    content: ary fihininao mafy tsy hamonjy anay?
  '12':
  - type: text
    content: Kanefa Andriamanitra ô,
  - type: text
    content: Mpanjakanay hatrizay hatrizay Ianao,
  - type: text
    content: mpanao famonjena eto anivon’ny tany.
  '13':
  - type: text
    content: Mampisaraka ny ranomasina tamin’ny herinao Ianao,
  - type: text
    content: namakivaky ny lohan’ny dragona teny ambony ranobe,
  '14':
  - type: text
    content: nanapotika ny lohan’izany fanany goavana izany
  - type: note
    content: 'fanany goavana: na leviatana, jereo Is 27.1 sy nta.'
  - type: text
    content: ka nanome ny tenabeny hohanin’ny antsantsa.
  '15':
  - type: text
    content: Nanokafanao lalana ny loharano sy ny sakeli-drano,
  - type: text
    content: ary nataonao tankina ny ony tsy mety ritra.
  '16':
  - type: text
    content: Anao ny andro, Anao koa ny alina
  - type: text
    content: fa Ianao no nahary ny masoandro amam-bolana.
  '17':
  - type: text
    content: Ianao no nametra ny faritra rehetra amin’ny tany,
  - type: text
    content: Ianao koa no nanao ny fahavaratra sy ny ririnina.
  '18':
  - type: text
    content: 'TOMPO ô, izao no mba tsarovy:'
  - type: text
    content: miteny ratsy Anao ny fahavalo,
  - type: text
    content: manamavo Anao io firenena adala io.
  '19':
  - type: text
    content: Aza atolotra an’ireo bibidia ireo
  - type: text
    content: ny ain’ilay domohina malalanao;
  - type: text
    content: aza hadinoina na oviana na oviana
  - type: text
    content: ny fiainan’ireo olo-mahantranao.
  '2':
  - type: text
    content: Tsarovy ilay vahoakanao
  - type: text
    content: izay efa azonao hatramin’ny ela,
  - type: text
    content: dia ireo foko navotanao ho fanananao;
  - type: text
    content: 'tsarovy ny tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: izay nataonao fonenana.
  '20':
  - type: text
    content: 'Hevero ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataonao,'
  - type: text
    content: satria feno olona iharan’ny herisetra
  - type: text
    content: ireo fiafenana rehetra ato amin’ny tany.
  '21':
  - type: text
    content: Aza avela hiverina amin-kenatra izay nampahorîna;
  - type: text
    content: aoka kosa ny mahantra sy ny malahelo hidera Anao!
  '22':
  - type: text
    content: Andriamanitra ô, mirotsaha an-tsehatra
  - type: text
    content: hiandraikitra ny adinao;
  - type: text
    content: tsarovy fa ireo adala ireo
  - type: text
    content: dia miteny ratsy Anao isan’andro.
  '23':
  - type: text
    content: Aza hadinoina ny tabataban’ireo mpandrafy Anao,
  - type: text
    content: dia ny horakoraka izay ataon’ireo mpanohitra Anao
  - type: text
    content: ka tsy mitsahatra miakatra any aminao.
  '3':
  - type: text
    content: Avia Ianao hijery ireo rava hatry ny ela,
  - type: text
    content: fa nosimban’ny fahavalo avokoa
  - type: text
    content: ny zavatra tanatin’ny toerana masina.
  '4':
  - type: text
    content: Tao amin’ny faritra fihaonana aminao
  - type: text
    content: no nihorakorahan’ireo olona mpandrafy Anao
  - type: text
    content: ary nametrahany ny fanevany ho mari-pandresena.
  '5':
  - type: text
    content: Ny fisehony tao dia toy ny mpikapa hazo
  - type: text
    content: manainga famaky hitevy ala mikitroka,
  '6':
  - type: text
    content: ary nopotehiny tamin’ny famaky sy ny kanonta avokoa
  - type: text
    content: na ny rafitra na ny sokitra tamin’izay.
  '7':
  - type: text
    content: 'Nodorany ilay '
  - type: text
    content: Toeramasinao
  - type: text
    content: ;
  - type: text
    content: ary nazerany sy nozimbainy
  - type: text
    content: ilay trano anajanay Anao.
  '8':
  - type: text
    content: 'Hoy izy ireo anakampony hoe:'
  - type: text
    content: «Aoka hampahorîntsika izy rehetra;
  - type: text
    content: ary aoka hodorantsika avokoa
  - type: text
    content: ny toeram-pivavahana eto amin’ny tany!»
  '9':
  - type: text
    content: Tsy hitanay intsony ny mariky ny fanatrehanao,
  - type: text
    content: 'tsy misy '
  - type: text
    content: mpaminany
  - type: text
    content: ' intsony;'
  - type: text
    content: ary tsy misy aminay mba mahalala
  - type: text
    content: izay mbola haharetan’izao toe-javatra izao.
