      children:
      - type: text
        text: '9'
    - type: text
      text: Tsy hitanay intsony ny mariky ny fanatrehanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
