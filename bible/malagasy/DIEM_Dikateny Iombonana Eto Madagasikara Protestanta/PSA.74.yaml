      children:
      - type: text
        text: '11'
    - type: text
      text: Nahoana ny tananao ankavanana no nahemotrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fihininao mafy tsy hamonjy anay?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Kanefa Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjakanay hatrizay hatrizay Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpanao famonjena eto anivon’ny tany.
  '13':
  - type: usfm
