document_id: NEH.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ampitsaharin’i Nehemià ny fampahoriana ireo mahantra
  - type: text
    content: 'Indray andro dia nisy lehilahy sy vehivavy sarambabem-bahoaka nitaraina mafy noho ny ataon’ny Jiosy sasany mpiray firenena aminy. '
  '10':
  - type: text
    content: 'Izaho sy ny havako ary ny mpanompoko dia efa nampisambotra vola sy vary, koa aoka re isika mba samy hamoy izany trosa izany! '
  '11':
  - type: text
    content: Eny, avereno amin’ny mpitrosa, izao anio izao ihany, ny sahany sy ny tanimboalobony mbamin’ny tanin’ôlivany sy ny tranony; ary afoizo ny tombon-tsoa ateraky ny vola mbamin’ny vary sy divay ary menaka izay nampisamborinareo.
  '12':
  - type: text
    content: 'Dia hoy ireo hoe:'
  - type: text
    content: –Eny, hanao araka izay lazainao izahay. Hamerina izay nalainay izahay ary tsy hitaky na inona na inona amin’ny mpitrosa.
  - type: text
    content: 'Dia niantso ny mpisorona aho ka teo anatrehany no nampianianako an’ireo mpampisambotra fa hanao araka izany toky nomena izany. '
  '13':
  - type: text
    content: 'Avy eo aho dia nanakopaka ny lambako sady niteny hoe:'
  - type: text
    content: –Ho tahaka izany anie no hanakopahan’Andriamanitra ny olona rehetra izay tsy hahatanteraka izany toky nomena izany! Eny, ho voakopaka hiala amin’ny tranony sy ny fananany anie izy, ka ho tavela tsy hanana na inona na inona!
  - type: text
    content: Dia ny fivoriam-be no indray namaly hoe «
  - type: text
    content: Amen
  - type: text
    content: » sady nidera ny TOMPO; ary nanao araka izany toky nomena izany tokoa ny olona.
  '14':
  - type: text
    content: Nanomboka tamin’ny andro nanendrena ahy ho governoran’ny faritanin’i Joda, dia ny taona faha-roapolo nanjakàn’i Artakserksesa ka niafara tamin’ny taona faha-32 nitondrany, na izaho na ny havako, nandritra izany 12 taona izany, dia tsy mba nitaky ny anjara-fiveloman’ny governora
  - type: note
    content: Jereo 1.1 sy nta.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Kanefa ireo governora talohako dia nanahirana ny olona ka nampandoa azy hanina sy divay ary sekela volafotsy efapolo; eny, na ny mpanompony aza, dia nisetrasetra tamin’ny olona. Izaho kosa tsy mba nanao izany noho ny fahatahorako an’Andriamanitra. '
  '16':
  - type: text
    content: Ny namboatra io manda io no nilofosako ary vory nifantoka tamin’ny asa teto avokoa ny mpanompoko, ka tsy mba nisy nividy tany izahay
  - type: note
    content: 'Ka tsy mba nisy nividy tany izahay: dkt hafa na dia tsy mba nanan-tany aza izahay (ny mpanan-tany no mahita tombontsoa kokoa noho ny olon-kafa amin’ny filaminan-tany).'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Nisy mpanapaka jiosy 150 nisakafo teo amin’ny latabatro, afa-tsy izay vahiny tonga ao aminay avy tamin’ny firenena nanodidina; '
  '18':
  - type: text
    content: 'ka ny niantohako namboarina isan’andro dia omby iray sy ondry matavy enina ary vorona koa, fa indray mandeha isaky ny folo andro no nanaterana divay betsaka aho. Nefa na izany aza dia tsy mba nitaky ny anjara fiveloman’ny governora aho, satria efa navesatra mafy tamin’ny vahoaka ny asa nataony. '
  '19':
  - type: text
    content: «Mba tsarovy hanasoavana ahy, ry Andriamanitra ô, izay rehetra nataoko ho an’ity firenena ity!»
  '2':
  - type: text
    content: 'Fa nisy nanao hoe: «Maro izahay mbamin’ny zanakay lahy aman-janakay vavy; koa te hahazo vary izahay mba hohaninay sy hivelomanay». '
  '3':
  - type: text
    content: 'Nisy koa nanao hoe: «Ny sahanay sy ny tanimboalobokay ary ny tranonay dia efa nataonay antoka; koa te hahazo vary izahay mandritra ny mosary». '
  '4':
  - type: text
    content: 'Nisy indray nanao hoe: «Efa nisambo-bola izahay handoavanay ny hetran’ny amperôra; ary ny sahanay sy ny tanimboalobokay no nataonay antoka. '
  '5':
  - type: text
    content: Kanefa mba tahaka ireo mpiray firenena aminay ihany ny tenanay, ary tahaka ny zanak’ireo ihany ny zanakay; saingy na izany aza, dia voatery manolotra ny zanakay lahy sy vavy ho mpanompo izahay, ary ny sasany amin’ny zanakay vavy efa mpanompo rahateo. Tsy manan-ko enti-manavotra azy izahay, satria lasan’ny hafa ny sahanay sy ny tanimboalobokay».
  '6':
  - type: text
    content: 'Dia tezitra mafy aho rehefa nahare ny fitarainan’ny olona sy izany teny izany. '
  '7':
  - type: text
    content: Koa nanapa-kevitra anakampoko aho fa ny loholona sy mpanapaka no hanariko noho izy samy nampanàna zavatra tamin’ny mpiray firenena aminy. Dia nampanao fivoriam-be hitsarana azy aho
  - type: note
    content: Ampit Eks 22.24; Lev 25.35-37; Deot 23.20-21.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'sady niteny taminy hoe:'
  - type: text
    content: –Izahay, araka izay tratry ny fanananay, dia efa nanavotra ny mpiray firenena aminay, izany hoe ireo Jiosy namidy tamin’ny hafa firenena; fa ianareo kosa mivarotra ny mpiray firenena aminareo, ka amintsika samy isika ihany no ivarotanareo azy.
  - type: text
    content: 'Dia sina ry zareo fa tsy nahita havaly. '
  '9':
  - type: text
    content: 'Ary hoy koa aho hoe:'
  - type: text
    content: '–Tsy tsara izao ataonareo izao! Moa tsy tokony niaina tamim-pahatahorana an’Andriamanitra ve ianareo mba tsy hiharan’ny fanaratsian’ireo hafa firenena fahavalontsika? '
