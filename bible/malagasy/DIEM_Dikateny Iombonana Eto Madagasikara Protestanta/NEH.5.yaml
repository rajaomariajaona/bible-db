document_id: NEH.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ampitsaharin’i Nehemià ny fampahoriana ireo mahantra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro dia nisy lehilahy sy vehivavy sarambabem-bahoaka nitaraina mafy noho ny ataon’ny Jiosy sasany mpiray firenena aminy. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izaho sy ny havako ary ny mpanompoko dia efa nampisambotra vola sy vary, koa aoka re isika mba samy hamoy izany trosa izany! '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Eny, avereno amin’ny mpitrosa, izao anio izao ihany, ny sahany sy ny tanimboalobony mbamin’ny tanin’ôlivany sy ny tranony; ary afoizo ny tombon-tsoa ateraky ny vola mbamin’ny vary sy divay ary menaka izay nampisamborinareo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, hanao araka izay lazainao izahay. Hamerina izay nalainay izahay ary tsy hitaky na inona na inona amin’ny mpitrosa.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso ny mpisorona aho ka teo anatrehany no nampianianako an’ireo mpampisambotra fa hanao araka izany toky nomena izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo aho dia nanakopaka ny lambako sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho tahaka izany anie no hanakopahan’Andriamanitra ny olona rehetra izay tsy hahatanteraka izany toky nomena izany! Eny, ho voakopaka hiala amin’ny tranony sy ny fananany anie izy, ka ho tavela tsy hanana na inona na inona!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ny fivoriam-be no indray namaly hoe «
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: » sady nidera ny TOMPO; ary nanao araka izany toky nomena izany tokoa ny olona.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanomboka tamin’ny andro nanendrena ahy ho governoran’ny faritanin’i Joda, dia ny taona faha-roapolo nanjakàn’i Artakserksesa ka niafara tamin’ny taona faha-32 nitondrany, na izaho na ny havako, nandritra izany 12 taona izany, dia tsy mba nitaky ny anjara-fiveloman’ny governora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ireo governora talohako dia nanahirana ny olona ka nampandoa azy hanina sy divay ary sekela volafotsy efapolo; eny, na ny mpanompony aza, dia nisetrasetra tamin’ny olona. Izaho kosa tsy mba nanao izany noho ny fahatahorako an’Andriamanitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny namboatra io manda io no nilofosako ary vory nifantoka tamin’ny asa teto avokoa ny mpanompoko, ka tsy mba nisy nividy tany izahay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ka tsy mba nisy nividy tany izahay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dkt hafa na dia tsy mba nanan-tany aza izahay (ny mpanan-tany no mahita tombontsoa kokoa noho ny olon-kafa amin’ny filaminan-tany).
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy mpanapaka jiosy 150 nisakafo teo amin’ny latabatro, afa-tsy izay vahiny tonga ao aminay avy tamin’ny firenena nanodidina; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ny niantohako namboarina isan’andro dia omby iray sy ondry matavy enina ary vorona koa, fa indray mandeha isaky ny folo andro no nanaterana divay betsaka aho. Nefa na izany aza dia tsy mba nitaky ny anjara fiveloman’ny governora aho, satria efa navesatra mafy tamin’ny vahoaka ny asa nataony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Mba tsarovy hanasoavana ahy, ry Andriamanitra ô, izay rehetra nataoko ho an’ity firenena ity!»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy nanao hoe: «Maro izahay mbamin’ny zanakay lahy aman-janakay vavy; koa te hahazo vary izahay mba hohaninay sy hivelomanay». '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy koa nanao hoe: «Ny sahanay sy ny tanimboalobokay ary ny tranonay dia efa nataonay antoka; koa te hahazo vary izahay mandritra ny mosary». '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy indray nanao hoe: «Efa nisambo-bola izahay handoavanay ny hetran’ny amperôra; ary ny sahanay sy ny tanimboalobokay no nataonay antoka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa mba tahaka ireo mpiray firenena aminay ihany ny tenanay, ary tahaka ny zanak’ireo ihany ny zanakay; saingy na izany aza, dia voatery manolotra ny zanakay lahy sy vavy ho mpanompo izahay, ary ny sasany amin’ny zanakay vavy efa mpanompo rahateo. Tsy manan-ko enti-manavotra azy izahay, satria lasan’ny hafa ny sahanay sy ny tanimboalobokay».
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tezitra mafy aho rehefa nahare ny fitarainan’ny olona sy izany teny izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nanapa-kevitra anakampoko aho fa ny loholona sy mpanapaka no hanariko noho izy samy nampanàna zavatra tamin’ny mpiray firenena aminy. Dia nampanao fivoriam-be hitsarana azy aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 22.24; Lev 25.35-37; Deot 23.20-21.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izahay, araka izay tratry ny fanananay, dia efa nanavotra ny mpiray firenena aminay, izany hoe ireo Jiosy namidy tamin’ny hafa firenena; fa ianareo kosa mivarotra ny mpiray firenena aminareo, ka amintsika samy isika ihany no ivarotanareo azy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia sina ry zareo fa tsy nahita havaly. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa aho hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy tsara izao ataonareo izao! Moa tsy tokony niaina tamim-pahatahorana an’Andriamanitra ve ianareo mba tsy hiharan’ny fanaratsian’ireo hafa firenena fahavalontsika? '
