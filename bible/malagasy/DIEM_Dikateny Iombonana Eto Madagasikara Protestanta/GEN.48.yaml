document_id: GEN.48,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nitsodrano ireo zanakalahin’i Jôsefa i Jakôba
  - type: text
    content: 'Taorian’izany zavatra izany, dia nisy nilaza tamin’i Jôsefa fa marary ny rainy. Dia nentin’i Jôsefa niaraka taminy ny zanany roa lahy, dia i Manase sy i Efraîma. '
  '10':
  - type: text
    content: 'Efa pahina ny mason’i Jakôba noho ny fahanterana ka tsy nahita loatra intsony; dia nampanatonin’i Jôsefa azy ireto zanany lahy. Ary namihina ireo i Jakôba sady nanoroka azy. '
  '11':
  - type: text
    content: 'Dia hoy izy tamin’i Jôsefa:'
  - type: text
    content: –Tsy nanantena hahita anao intsony aho, kanjo indro izao fa navelan’Andriamanitra hahita ny zanakao aza aho.
  '12':
  - type: text
    content: 'Nanaisotra azy mirahalahy teo an-dohalik’i Jakôba i Jôsefa, dia niankohoka tamin’ny tany. '
  '13':
  - type: text
    content: 'Noraisiny tamin’ny tanany havanana i Efraîma ka narosony ho eo an-kavian’i Jakôba, ary noraisiny tamin’ny tanany havia kosa i Manase mba ho eo an-kavanan’i Jakôba, dia nampanatoniny an-draibeny indray izy mirahalahy. '
  '14':
  - type: text
    content: Fa nampifamadihin’i Jakôba ny tanany, ka ny tanany havanana no napetrany teo amin’ny lohan’i Efraîma na dia zandriny aza io; fa ny tanany havia kosa no napetrany teo amin’ny lohan’i Manase, kanefa izy io no lahimatoa
  - type: note
    content: Ny zokiny araka ny fanao no tokony hahazo ny tsodrano tsara indrindra izay atolotry ny tanana havanana, satria noheverina fa ny havanana no lafiny manambina indrindra.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Toy izao ny tsodrano nomen’i Jakôba an’i Jôsefa:'
  - type: text
    content: Antsoiko Andriamanitra hitsodrano,
  - type: text
    content: fa teo anatrehany no nizoran’i Abrahama raibeko
  - type: text
    content: sy i Itsehàka raiko;
  - type: text
    content: antsoiko Andriamanitra Izay nanolokolo ahy
  - type: text
    content: hatrizay niainako ka mandraka ankehitriny;
  '16':
  - type: text
    content: 'antsoiko ilay '
  - type: text
    content: Anjely
  - type: text
    content: ' Izay nanavotra ahy'
  - type: text
    content: tamin’ny loza rehetra;
  - type: text
    content: dia hotahîny anie ireto zazalahy ireto!
  - type: text
    content: Ka amin’ny alalan’izy roa lahy
  - type: text
    content: no hahatsiarovana ny anarako
  - type: text
    content: mbamin’ny anaran’i Abrahama raibeko
  - type: text
    content: sy i Itsehàka raiko!
  - type: text
    content: Hitombo maro dia maro eo anivon’ilay tany anie izy!
  '17':
  - type: text
    content: 'Hitan’i Jôsefa fa napetraky ny rainy teo amin’ny lohan’i Efraîma ny tanany havanana ka tsy sitrany izany. Dia noraisiny ny tanan-drainy mba hampiala azy amin’ny lohan’i Efraîma hankeo amin’ny lohan’i Manase; '
  '18':
  - type: text
    content: 'sady hoy i Jôsefa tamin-drainy:'
  - type: text
    content: –Tsy izao no izy, ry dada; fa ity no lahimatoa, koa apetraho eo an-dohany ny tananao havanana.
  '19':
  - type: text
    content: 'Fa nandà i Jakôba ka nanao hoe:'
  - type: text
    content: –Fantatro dia fantatro, anaka, fa ho tonga firenen-dehibe koa i Manase. Kanefa ny zandriny dia ho lehibe noho izy, ary ny taranany dia ho firenena maro.
  '2':
  - type: text
    content: 'Rehefa nampandrenesina i Jakôba fa tonga hamangy azy i Jôsefa zanany, dia niezaka hipetraka teo am-pandriana izy. '
  '20':
  - type: text
    content: 'Tamin’izany andro izany dia nitsodrano azy mirahalahy i Jakôba ka niteny toy izao:'
  - type: text
    content: '–Ny anaranareo no hitsofan’ny Israelita rano ka hilazany hoe: «Tahaka ny nataon’Andriamanitra tamin’i Efraîma sy i Manase anie no hataony aminao'
  - type: note
    content: Jereo Heb 11.21.
  - type: text
    content: '!»'
  - type: text
    content: 'Araka izany, dia napetrak’i Jakôba alohan’i Manase i Efraîma. '
  '21':
  - type: text
    content: 'Ary hoy i Jakôba tamin’i Jôsefa:'
  - type: text
    content: '–Indro ho faty aho, nefa Andriamanitra homba anareo ka hampody anareo ho any an-tanindrazanareo. '
  '22':
  - type: text
    content: Ary izaho manome anao zaratany iray fatratra kokoa noho ny an’ireo rahalahinao, dia ny faritr’i Sekema izay azoko tamin’ny sabatro sy ny tsipîkako
  - type: note
    content: 'Sekema: tanàna fahagola izay lasa ampovoan’ny faritanin’i Efraîma sy i Manase tatỳ aoriana. Ao no hilevina i Jôsefa (Jos 24.32). Ny hevitry ny anarana hoe Sekema dia soroka, ka eto ny RM dia manao karazana tsilalaon-teny, satria ny soro-kena dia noheverina ho tsara indrindra (1 Sam 9.24.) teo amin’ny zara hena.'
  - type: text
    content: ' teo an-tanan’ny Amôrita.'
  '3':
  - type: text
    content: 'Ary hoy i Jakôba tamin’i Jôsefa:'
  - type: text
    content: '–Niseho tamiko tao Lozy tany amin’ny tany Kanahàna ilay Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: ' ka '
  - type: text
    content: nitsodrano
  - type: text
    content: ' ahy '
  '4':
  - type: text
    content: 'sady niteny tamiko hoe: «Indro Aho hahamaro anaka anao sady hampitombo anao, hahatonga anao ho vondrom-pirenena; ka homeko ny taranakao mandimby anao ho lova raikitra'
  - type: note
    content: 'And 3-4: jereo 28.13-14.'
  - type: text
    content: ' ity tany ity.»'
  '5':
  - type: text
    content: 'Hoy izy nanampy izany:'
  - type: text
    content: –Koa ankehitriny, ireo zanakao roa lahy, teraka teto Ejipta talohan’ny nahatongavako taty aminao, dia raisiko ho zanako. Eny, ho zanako mitovy amin’i Reobena sy i Simehôna mihitsy i Manase sy i Efraîma
  - type: note
    content: Natsangan’i Jakôba ho zanany i Efraîma sy i Manase, ka nataony mitovy zo amin’i Reobena sy i Simehôna.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Fa ireo zanakao lahy izay ho teraka aorian’ireo kosa dia ho anao ihany. Ao amin’ny faritanin’ireo zokiny ihany no handraisan’izy roa lahy ny anjara lovany. '
  '7':
  - type: text
    content: Fony aho niverina avy any Mezôpôtamia ambony, talohan’ny hahatongavana tao Efratà, any amin’ny tany Kanahàna, dia maty teo anilako i Rahely ary naleviko teo amoron-dàlana; i Efratà dia antsoina hoe Betlehema ankehitriny
  - type: note
    content: 'Momba ny fahafatesan’i Rahely: jereo Gen 35.19. –Efratà-Betlehema, izay kilaometatra vitsivitsy any avaratr’i Betela sady akaikin’i Rama, dia tsy tokony hafangaro amin’i Betlehema-Efratà ao amin’ny faritanin’i Joda sy eo atsimon’i Jerosalema izay voalaza ao amin’ny 1 Sam 16.4; Mik 5.1 ohatra.'
  - type: text
    content: .
  '8':
  - type: text
    content: 'Tamin’izay dia tazan’i Jakôba ireo zanakalahin’i Jôsefa ka nanontaniany hoe:'
  - type: text
    content: –Iza moa ireto?
  '9':
  - type: text
    content: 'Hoy kosa ny navalin’i Jôsefa azy:'
  - type: text
    content: –Ireo no zanaka lahy izay nomen’Andriamanitra ahy teto Ejipta.
  - type: text
    content: 'Ka hoy i Jakôba hoe:'
  - type: text
    content: –Mba ento eto anilako àry ireo, dia hotsofiko rano.
