document_id: GEN.48,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nitsodrano ireo zanakalahin’i Jôsefa i Jakôba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Taorian’izany zavatra izany, dia nisy nilaza tamin’i Jôsefa fa marary ny rainy. Dia nentin’i Jôsefa niaraka taminy ny zanany roa lahy, dia i Manase sy i Efraîma. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Efa pahina ny mason’i Jakôba noho ny fahanterana ka tsy nahita loatra intsony; dia nampanatonin’i Jôsefa azy ireto zanany lahy. Ary namihina ireo i Jakôba sady nanoroka azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy izy tamin’i Jôsefa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy nanantena hahita anao intsony aho, kanjo indro izao fa navelan’Andriamanitra hahita ny zanakao aza aho.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nanaisotra azy mirahalahy teo an-dohalik’i Jakôba i Jôsefa, dia niankohoka tamin’ny tany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Noraisiny tamin’ny tanany havanana i Efraîma ka narosony ho eo an-kavian’i Jakôba, ary noraisiny tamin’ny tanany havia kosa i Manase mba ho eo an-kavanan’i Jakôba, dia nampanatoniny an-draibeny indray izy mirahalahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa nampifamadihin’i Jakôba ny tanany, ka ny tanany havanana no napetrany teo amin’ny lohan’i Efraîma na dia zandriny aza io; fa ny tanany havia kosa no napetrany teo amin’ny lohan’i Manase, kanefa izy io no lahimatoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny zokiny araka ny fanao no tokony hahazo ny tsodrano tsara indrindra izay atolotry ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tanana havanana,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' satria noheverina fa ny havanana no lafiny manambina indrindra.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Toy izao ny tsodrano nomen’i Jakôba an’i Jôsefa:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Antsoiko Andriamanitra hitsodrano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa teo anatrehany no nizoran’i Abrahama raibeko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy i Itsehàka raiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: antsoiko Andriamanitra Izay nanolokolo ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrizay niainako ka mandraka ankehitriny;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'antsoiko ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anjely
    - type: text
      text: ' Izay nanavotra ahy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny loza rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hotahîny anie ireto zazalahy ireto!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka amin’ny alalan’izy roa lahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hahatsiarovana ny anarako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny anaran’i Abrahama raibeko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy i Itsehàka raiko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitombo maro dia maro eo anivon’ilay tany anie izy!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hitan’i Jôsefa fa napetraky ny rainy teo amin’ny lohan’i Efraîma ny tanany havanana ka tsy sitrany izany. Dia noraisiny ny tanan-drainy mba hampiala azy amin’ny lohan’i Efraîma hankeo amin’ny lohan’i Manase; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'sady hoy i Jôsefa tamin-drainy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy izao no izy, ry dada; fa ity no lahimatoa, koa apetraho eo an-dohany ny tananao havanana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa nandà i Jakôba ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatro dia fantatro, anaka, fa ho tonga firenen-dehibe koa i Manase. Kanefa ny zandriny dia ho lehibe noho izy, ary ny taranany dia ho firenena maro.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rehefa nampandrenesina i Jakôba fa tonga hamangy azy i Jôsefa zanany, dia niezaka hipetraka teo am-pandriana izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tamin’izany andro izany dia nitsodrano azy mirahalahy i Jakôba ka niteny toy izao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny anaranareo no hitsofan’ny Israelita rano ka hilazany hoe: «Tahaka ny nataon’Andriamanitra tamin’i Efraîma sy i Manase anie no hataony aminao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Heb 11.21.
      marker-yv: yv-n
    - type: text
      text: '!»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka izany, dia napetrak’i Jakôba alohan’i Manase i Efraîma. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy i Jakôba tamin’i Jôsefa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indro ho faty aho, nefa Andriamanitra homba anareo ka hampody anareo ho any an-tanindrazanareo. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary izaho manome anao zaratany iray fatratra kokoa noho ny an’ireo rahalahinao, dia ny faritr’i Sekema izay azoko tamin’ny sabatro sy ny tsipîkako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sekema: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tanàna fahagola izay lasa ampovoan’ny faritanin’i Efraîma sy i Manase tatỳ aoriana. Ao no hilevina i Jôsefa (Jos 24.32). Ny hevitry ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sekema
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia '
      - type: usfm
        marker: it
        children:
        - type: text
          text: soroka,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ka eto ny RM dia manao karazana tsilalaon-teny, satria ny soro-kena dia noheverina ho tsara indrindra (1 Sam 9.24.) teo amin’ny zara hena.'
      marker-yv: yv-n
    - type: text
      text: ' teo an-tanan’ny Amôrita.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hoy i Jakôba tamin’i Jôsefa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Niseho tamiko tao Lozy tany amin’ny tany Kanahàna ilay Andriamanitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsitoha
    - type: text
      text: ' ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitsodrano
    - type: text
      text: ' ahy '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'sady niteny tamiko hoe: «Indro Aho hahamaro anaka anao sady hampitombo anao, hahatonga anao ho vondrom-pirenena; ka homeko ny taranakao mandimby anao ho lova raikitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.4 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 3-4:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 28.13-14.
      marker-yv: yv-n
    - type: text
      text: ' ity tany ity.»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hoy izy nanampy izany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Koa ankehitriny, ireo zanakao roa lahy, teraka teto Ejipta talohan’ny nahatongavako taty aminao, dia raisiko ho zanako. Eny, ho zanako mitovy amin’i Reobena sy i Simehôna mihitsy i Manase sy i Efraîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Natsangan’i Jakôba ho zanany i Efraîma sy i Manase, ka nataony mitovy zo amin’i Reobena sy i Simehôna.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa ireo zanakao lahy izay ho teraka aorian’ireo kosa dia ho anao ihany. Ao amin’ny faritanin’ireo zokiny ihany no handraisan’izy roa lahy ny anjara lovany. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fony aho niverina avy any Mezôpôtamia ambony, talohan’ny hahatongavana tao Efratà, any amin’ny tany Kanahàna, dia maty teo anilako i Rahely ary naleviko teo amoron-dàlana; i Efratà dia antsoina hoe Betlehema ankehitriny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ny fahafatesan’i Rahely: jereo Gen 35.19. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –Efratà-Betlehema,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay kilaometatra vitsivitsy any avaratr’i Betela sady akaikin’i Rama, dia tsy tokony hafangaro amin’i Betlehema-Efratà ao amin’ny faritanin’i Joda sy eo atsimon’i Jerosalema izay voalaza ao amin’ny 1 Sam 16.4; Mik 5.1 ohatra.'
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tamin’izay dia tazan’i Jakôba ireo zanakalahin’i Jôsefa ka nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa ireto?
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hoy kosa ny navalin’i Jôsefa azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ireo no zanaka lahy izay nomen’Andriamanitra ahy teto Ejipta.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Jakôba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba ento eto anilako àry ireo, dia hotsofiko rano.
