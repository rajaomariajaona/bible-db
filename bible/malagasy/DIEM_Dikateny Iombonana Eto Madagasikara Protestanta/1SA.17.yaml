document_id: 1SA.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida sy i Gôliata
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Namory ny miaramilany hiatrika ady tao Sôkao any Joda ny Filistinina, ka nitoby tao Efesa-Damima anelanelan’i Sôkao sy Hazekà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sôkao sy Hazekà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna anankiroa tokony ho 30 km ao atsimo andrefan’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ka hoy aho hoe: Efa nihaika anareo miaramila israelita aho androany; ka omeo lehilahy iray aho mba hiady amiko.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha nandre izany tenin’ilay Filistinina izany i Saoly sy ny miaramilany rehetra, dia nivadi-po sy natahotra mafy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Davida dia zanakalahin’i Jisay avy amin’ny terak’i Efratà, izay nonina tany Betleheman’i Joda; nanan-janaka valo mirahalahy i Jisay izay efa tena antitra tamin’ny andron’i Saoly. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanany telolahy zokiny, i Eliaba sy i Abinadaba ary i Samà, dia voaantso miaramila ka niara-niantafika tamin’i Saoly. Fa i Davida kosa, ilay zandriny indrindra, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia lasa nanompo an’i Saoly ary niverina tsindraindray mikarakara ny ondrin-drainy, tany Betlehema.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nandritra ny efapolo andro, dia niseho teo anatrehan’ny tafik’i Israely marain-tsy hariva i Gôliata ilay Filistinina.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro dia hoy i Jisay tamin’i Davida zanany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raiso ity lango folo kilao ity sy ireto mofo folo ireto ho an’ny rahalahinao, ka ento haingana any an-toby ho azy ireo. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ento koa ireto frômazy folo ireto ho an’ny kômandin’ny antokon-tafika. Dia jereo ireo rahalahinao na mba nanao ahoana ihany izay izy ireo any. Ho hitanao raha toa ka salama tsara izy ireo, ary dia hitondranao vaovao tsara momba azy ireo aho. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ny hahitanao azy telo mirahalahy dia miaraka amin’i Saoly sy ny miaramila israelita rehetra, eo amin’ny lohasaha Elà sady miady amin’ny Filistinina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Saoly sy ny miaramilan’i Israely koa dia tafangona ary nitoby tao amin’ny lohasaha Elà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lohasaha Elà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia atsimon’i Sôkao sy i Hazekà.'
      marker-yv: yv-n
    - type: text
      text: ', efa vonona hiatrika ady amin’ny Filistinina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampitso vao maraina dia napetrak’i Davida tamin’ny mpiandry hafa ny ondriny. Noraisiny ny entany, dia lasa izy araka ny tenin’i Jisay, ary tonga tany an-toby. Tamin’izay indrindra ny miaramila no milahatra hivoaka hiady sady velona hiakan’ady. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Israelita sy ny Filistinina samy vory atrika imasoimaso, efa vonon-kiady. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natolotr’i Davida ny mpiambina ireo entana nentiny, ary dia lasa izy nilomay nankeny am-bava ady nanontany izay vaovao momba ireo rahalahiny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mbola niresaka tamin’ny rahalahiny teo i Davida, dia indro i Gôliata, ilay Filistinina avy any Gata, fa nandroso teo anoloan’ny tafiny sady namerina ny fihantsiany mahazatra azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fihantsiany mahazatra azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo and 8-10.
      marker-yv: yv-n
    - type: text
      text: '. Ary ren’i Davida izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao nahita an’i Gôliata anefa ny Israelita rehetra, dia mihemotra satria matahotra mafy izy ireo; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hoy izy samy izy hoe: «Hitanareo ve io lehilahy miakatra io. Hihaika antsika Israelita no anton’ny niakarany. Koa izay maharesy azy io dia hataon’ny mpanjaka tretrika tokoa amin’ny hareny, sady homeny ho vadiny ny zanany vavy ary ny fianakaviany hahazo tombontsoa manokana eo amin’i Israely.»'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida tamin’ny miaramila iray teo akaikiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hatao ahoana tsara hoe izay maharesy io Filistinina io ka mahafaka an’i Israely amin’izao fahafaham-baràkany izao? Fa iza moa io Filistinina mpanompo sampy io no sahy mihantsy ny tafik’ilay Andriamanitra velona?
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naverin’ny olona tamin’i Davida indray fa izany sy izany no hataon’ny mpanjaka amin’izay maharesy an’i Gôliata. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Eliaba zokiny lahimatoa kosa, raha nandre azy tafaresaka tamin’ny miaramila, dia nisafoaka tamin’i Davida ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona moa no ataonao atỳ? Iza no namelanao ireo ondrinao vitsivitsy any an-taniefitra? Fantatro tsara ny fieboeboanao sy ny haratsiam-panahinao, fa hijery ady no nahatongavanao.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa inona izao no nataoko? Moa tsy mahazo manontany ve aho?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samy nitana tendrombohitra nifanao andaniny sy ankilany avy ny Filistinina sy ny Israelita, ka ny lohasaha no nampisaraka azy ireo.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia navelany teo ny zokiny, fa lasa izy nanontany miaramila hafa indray, ary nitovy hatrany ny valin-teny azony.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa ren’ny olona fa voasarik’izany toe-javatra izany i Davida, dia nambarany tamin’i Saoly izay nampiantso azy avy hatrany.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Davida tamin’i Saoly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompokolahy, aoka tsy hisy ho ketraka noho ny io Filistinina io ny olona, fa ny tenako mihitsy no handeha hiady aminy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Saoly tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka itsỳ, anaka, tsy azonao atao ny hiady amin’io Filistinina io. Mbola zaza loatra ianao nefa izy dia efa miaramila hatramin’ny fahatanorany.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navalin’i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tompokolahy, raha miandry ny ondrin-draiko aho, ka nisy liona na bera tonga maka amin’ireo, '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia nanenjika azy aho ka mikapoka azy ary manaisotra ny haza mby am-bavany; ary raha miantsambotra amiko izy, tonga dia raisiko amin’ny vavany, dia vonoiko ho faty. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha izany no nahafatesan’ny mpanomponao ny liona sy ny bera, dia ho tahaka izany koa no hanjo io Filistinina mpanompo sampy io, satria nihantsy ny tafik’ilay Andriamanitra velona izy. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ny TOMPO izay efa niaro ahy tamin’ny hohon’ny liona sy ny bera, dia hanafaka ahy koa amin’ny tanan’io Filistinina io.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Saoly tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana àry, ka homba anao anie ny TOMPO!
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomen’i Saoly hanaovan’i Davida ny fitafiany fentiny miady dia ny satroka varahina aro loha izay napetrany teo an-dohan’i Davida, ary akanjo varahina aro tena. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola nafatotr’i Davida tamin’ny akanjony koa ny sabatr’i Saoly, ary dia nanandrana namindra izy, nefa tsy afaka, satria tsy mbola zatra nitondra ireny, ka dia hoy izy tamin’i Saoly: «Tsy mba afa-mamindra amin’ireto zavatra tsy nahazatra ahy ireto aho.» Ary nesorin’i Davida teny aminy avokoa ireny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisy rapeton’olona nivoaka ny tobin’ny Filistinina mba hihantsy ady amin’ny Israelita; ny anarany dia i Gôliata, ary avy any Gata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 5.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izy. Nirefy tokony ho telo metatra izy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noraisiny ny tehiny, dia lasa izy nifantina vato kilonjy dimy terỳ amoron’ny ranon-driaka, ka nataony tao anaty kitapony fitondra miandry ondry. Nataony an-tanana ny antsamotadiny, dia roso izy hiatrika ilay Filistinina. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Gôliata etsy andaniny, ialohavan’ilay mpitondra ny ampingany, sady manatona tsikelikely an’i Davida. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandinika an’i Davida ilay Filistinina ka naneso azy, satria hitany fa mbola tanora izy no mazava endrika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.12 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ary tsara tarehy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Gôliata tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Alika angaha aho no hatonin’ialahy amin’ny tehina? Ho voaozona anie ialahy amin’ny alalan’ireo andriamanitray! '
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Avia atỳ, fa homeko ny voro-manidina sy ny bibidia ny nofon’ialahy.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’i Davida azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manatona ahy amin’ny sabatra sy ny lefona ary ny lefom-pohy ianao, izaho kosa manatona anao amin’ny anaran’ny TOMPOn’izao rehetra izao, Andriamanitry ny tafik’i Israely, Izay efa nohantsinao. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Anio ihany no hanoloran’ny TOMPO anao ho eo am-pelatanako, hahafaty anao aho ka hanapaka ny lohanao. Anio koa dia homeko hohanin’ny voro-manidina sy ny bibidia ny fatin’ny miaramila filistinina. Ary ho fantatry ny tany tontolo fa manana Andriamanitra tokoa i Israely. '
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia ho fantatry ny Fiangonan’i Israely tsivakivolo koa fa tsy mba mila sabatra na lefona ny TOMPO hanomezam-pandresena. An’ny TOMPO ny ady, koa dia hatolony ho eo an-tananay ianareo.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao nanomboka nihetsika hanatona an’i Davida ilay Filistinina, dia nihazakazaka mafy i Davida hitsena azy. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nandray vato tao anaty kitapony i Davida ary nandefa izany tamin’ny antsamotady ka nahavoa ilay Filistinina teo an-tampon-kandriny. Tafalentika teo ilay vato ka nidaraboka niankohoka tamin’ny tany izy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satroka varahina aro loha sy fonon-dranjo varahina no nanaovany, ary akanjo misy kirana varahina milanja 60 kilao no aro tena teny aminy. Nisamboady lefom-barahina izy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no nandresen’i Davida an’i Gôliata ka namonoany azy tamin’ny antsamotady sy ny vato, fa tsy mba tamin’ny sabatra.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihazakazaka nankeny amin’i Gôliata i Davida ka nanatsoaka ny sabatr’i ilay rapeto tamin’ny tranony ary nanapaka ny lohany. Koa rehefa hitan’ny Filistinina fa maty ilay maherifony, dia nitsoaka nandositra izy ireo. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tafatsangana ny miaramilan’i Israely sy i Joda ka nanao hiakan’ady sady nanenjika ny Filistinina hatrany am-bavahadin’i Gata sy i Hekrôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.52 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gata sy i Hekrôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 5.8, 10 sy nta.
      marker-yv: yv-n
    - type: text
      text: . Ary ny fatin’ny Filistinina niampatrampatra teny an-dalan’i Saharaîma ka hatrany Gata sy i Hekrôna.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia navelan’ny Israelita ny fanenjehana ny Filistinina fa lasa izy ireo namabo ny tobiny. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nalain’i Davida ny lohan’i Gôliata mba hoentiny any Jerosalema, fa ny fiadian’ilay rapeto kosa notahiriziny tao an-dainy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny dinam-pisakaizan’i Jônatàna sy i Davida
    marker-yv: yv-h
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitan’i Saoly ny nandehanan’i Davida nifanandrina tamin’ilay Filistinina, dia nanontany an’i Abinera kômandin’ny tafika izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zanak’iza moa iny tovolahy iny, ry Abinera?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’i Abinera hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny ainao, ry andriamanjaka, fa tena tsy fantatro mihitsy iny tovolahy iny.
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ataovy àry izay mety hahafantaranao ny mombamomba azy.
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa rehefa tafaverina an-toby avy nahafaty an’i Gôliata i Davida, dia nalain’i Abinera izy ary nentiny tany amin’i Saoly. Mbola teny an-tanany amin’izany ny lohan’lay Filistinina.
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Saoly nanontany azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zanak’iza moa ianao, anaka?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zanak’i Jisay mpanomponao avy any Betlehema aho, tompoko.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitondra lefona iray koa izy ka ny zarany dia lehibe toy ny voditenon’ny mpanenona ary ny lelany dia vy mihoatra ny fito kilao. Nisy miaramila iray mpitondra ny ampingany ka mialoha azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijanona i Gôliata ary nitodika tamin’ny miaramila israelita sady niantsoantso hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana ianareo no vory atrika hiady? Filistinina aho, ary ianareo kosa andevon’i Saoly. Mifidiana ianareo lehilahy iray hidina etỳ hiady amiko. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa raha toa resiny aho ka matiny, dia ho andevonareo izahay; fa raha resiko kosa izy ka matiko, dia ianareo kosa no ho andevonay ka hanompo anay. '
