document_id: 1SA.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida sy i Gôliata
  - type: text
    content: Namory ny miaramilany hiatrika ady tao Sôkao any Joda ny Filistinina, ka nitoby tao Efesa-Damima anelanelan’i Sôkao sy Hazekà
  - type: note
    content: 'Sôkao sy Hazekà: tanàna anankiroa tokony ho 30 km ao atsimo andrefan’i Jerosalema.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'ka hoy aho hoe: Efa nihaika anareo miaramila israelita aho androany; ka omeo lehilahy iray aho mba hiady amiko.'
  '11':
  - type: text
    content: Raha nandre izany tenin’ilay Filistinina izany i Saoly sy ny miaramilany rehetra, dia nivadi-po sy natahotra mafy.
  '12':
  - type: text
    content: 'I Davida dia zanakalahin’i Jisay avy amin’ny terak’i Efratà, izay nonina tany Betleheman’i Joda; nanan-janaka valo mirahalahy i Jisay izay efa tena antitra tamin’ny andron’i Saoly. '
  '13':
  - type: text
    content: 'Ny zanany telolahy zokiny, i Eliaba sy i Abinadaba ary i Samà, dia voaantso miaramila ka niara-niantafika tamin’i Saoly. Fa i Davida kosa, ilay zandriny indrindra, '
  '15':
  - type: text
    content: dia lasa nanompo an’i Saoly ary niverina tsindraindray mikarakara ny ondrin-drainy, tany Betlehema.
  '16':
  - type: text
    content: Nandritra ny efapolo andro, dia niseho teo anatrehan’ny tafik’i Israely marain-tsy hariva i Gôliata ilay Filistinina.
  '17':
  - type: text
    content: 'Indray andro dia hoy i Jisay tamin’i Davida zanany:'
  - type: text
    content: '–Raiso ity lango folo kilao ity sy ireto mofo folo ireto ho an’ny rahalahinao, ka ento haingana any an-toby ho azy ireo. '
  '18':
  - type: text
    content: 'Ento koa ireto frômazy folo ireto ho an’ny kômandin’ny antokon-tafika. Dia jereo ireo rahalahinao na mba nanao ahoana ihany izay izy ireo any. Ho hitanao raha toa ka salama tsara izy ireo, ary dia hitondranao vaovao tsara momba azy ireo aho. '
  '19':
  - type: text
    content: Ary ny hahitanao azy telo mirahalahy dia miaraka amin’i Saoly sy ny miaramila israelita rehetra, eo amin’ny lohasaha Elà sady miady amin’ny Filistinina.
  '2':
  - type: text
    content: I Saoly sy ny miaramilan’i Israely koa dia tafangona ary nitoby tao amin’ny lohasaha Elà
  - type: note
    content: Ny lohasaha Elà dia atsimon’i Sôkao sy i Hazekà.
  - type: text
    content: ', efa vonona hiatrika ady amin’ny Filistinina. '
  '20':
  - type: text
    content: 'Ny ampitso vao maraina dia napetrak’i Davida tamin’ny mpiandry hafa ny ondriny. Noraisiny ny entany, dia lasa izy araka ny tenin’i Jisay, ary tonga tany an-toby. Tamin’izay indrindra ny miaramila no milahatra hivoaka hiady sady velona hiakan’ady. '
  '21':
  - type: text
    content: 'Ary ny Israelita sy ny Filistinina samy vory atrika imasoimaso, efa vonon-kiady. '
  '22':
  - type: text
    content: 'Natolotr’i Davida ny mpiambina ireo entana nentiny, ary dia lasa izy nilomay nankeny am-bava ady nanontany izay vaovao momba ireo rahalahiny. '
  '23':
  - type: text
    content: Raha mbola niresaka tamin’ny rahalahiny teo i Davida, dia indro i Gôliata, ilay Filistinina avy any Gata, fa nandroso teo anoloan’ny tafiny sady namerina ny fihantsiany mahazatra azy
  - type: note
    content: 'fihantsiany mahazatra azy: jereo and 8-10.'
  - type: text
    content: '. Ary ren’i Davida izany. '
  '24':
  - type: text
    content: 'Raha vao nahita an’i Gôliata anefa ny Israelita rehetra, dia mihemotra satria matahotra mafy izy ireo; '
  '25':
  - type: text
    content: 'fa hoy izy samy izy hoe: «Hitanareo ve io lehilahy miakatra io. Hihaika antsika Israelita no anton’ny niakarany. Koa izay maharesy azy io dia hataon’ny mpanjaka tretrika tokoa amin’ny hareny, sady homeny ho vadiny ny zanany vavy ary ny fianakaviany hahazo tombontsoa manokana eo amin’i Israely.»'
  '26':
  - type: text
    content: 'Dia hoy i Davida tamin’ny miaramila iray teo akaikiny:'
  - type: text
    content: –Hatao ahoana tsara hoe izay maharesy io Filistinina io ka mahafaka an’i Israely amin’izao fahafaham-baràkany izao? Fa iza moa io Filistinina mpanompo sampy io no sahy mihantsy ny tafik’ilay Andriamanitra velona?
  '27':
  - type: text
    content: 'Dia naverin’ny olona tamin’i Davida indray fa izany sy izany no hataon’ny mpanjaka amin’izay maharesy an’i Gôliata. '
  '28':
  - type: text
    content: 'Fa i Eliaba zokiny lahimatoa kosa, raha nandre azy tafaresaka tamin’ny miaramila, dia nisafoaka tamin’i Davida ka nanao hoe:'
  - type: text
    content: –Inona moa no ataonao atỳ? Iza no namelanao ireo ondrinao vitsivitsy any an-taniefitra? Fantatro tsara ny fieboeboanao sy ny haratsiam-panahinao, fa hijery ady no nahatongavanao.
  '29':
  - type: text
    content: 'Ary hoy i Davida hoe:'
  - type: text
    content: –Fa inona izao no nataoko? Moa tsy mahazo manontany ve aho?
  '3':
  - type: text
    content: Samy nitana tendrombohitra nifanao andaniny sy ankilany avy ny Filistinina sy ny Israelita, ka ny lohasaha no nampisaraka azy ireo.
  '30':
  - type: text
    content: Dia navelany teo ny zokiny, fa lasa izy nanontany miaramila hafa indray, ary nitovy hatrany ny valin-teny azony.
  '31':
  - type: text
    content: Rehefa ren’ny olona fa voasarik’izany toe-javatra izany i Davida, dia nambarany tamin’i Saoly izay nampiantso azy avy hatrany.
  '32':
  - type: text
    content: 'Ka hoy i Davida tamin’i Saoly:'
  - type: text
    content: –Tompokolahy, aoka tsy hisy ho ketraka noho ny io Filistinina io ny olona, fa ny tenako mihitsy no handeha hiady aminy.
  '33':
  - type: text
    content: 'Hoy kosa i Saoly tamin’i Davida:'
  - type: text
    content: –Aoka itsỳ, anaka, tsy azonao atao ny hiady amin’io Filistinina io. Mbola zaza loatra ianao nefa izy dia efa miaramila hatramin’ny fahatanorany.
  '34':
  - type: text
    content: 'Fa hoy ny navalin’i Davida hoe:'
  - type: text
    content: '–Tompokolahy, raha miandry ny ondrin-draiko aho, ka nisy liona na bera tonga maka amin’ireo, '
  '35':
  - type: text
    content: 'dia nanenjika azy aho ka mikapoka azy ary manaisotra ny haza mby am-bavany; ary raha miantsambotra amiko izy, tonga dia raisiko amin’ny vavany, dia vonoiko ho faty. '
  '36':
  - type: text
    content: 'Raha izany no nahafatesan’ny mpanomponao ny liona sy ny bera, dia ho tahaka izany koa no hanjo io Filistinina mpanompo sampy io, satria nihantsy ny tafik’ilay Andriamanitra velona izy. '
  '37':
  - type: text
    content: Ny TOMPO izay efa niaro ahy tamin’ny hohon’ny liona sy ny bera, dia hanafaka ahy koa amin’ny tanan’io Filistinina io.
  - type: text
    content: 'Dia hoy i Saoly tamin’i Davida:'
  - type: text
    content: –Mandehana àry, ka homba anao anie ny TOMPO!
  '38':
  - type: text
    content: 'Nomen’i Saoly hanaovan’i Davida ny fitafiany fentiny miady dia ny satroka varahina aro loha izay napetrany teo an-dohan’i Davida, ary akanjo varahina aro tena. '
  '39':
  - type: text
    content: 'Mbola nafatotr’i Davida tamin’ny akanjony koa ny sabatr’i Saoly, ary dia nanandrana namindra izy, nefa tsy afaka, satria tsy mbola zatra nitondra ireny, ka dia hoy izy tamin’i Saoly: «Tsy mba afa-mamindra amin’ireto zavatra tsy nahazatra ahy ireto aho.» Ary nesorin’i Davida teny aminy avokoa ireny. '
  '4':
  - type: text
    content: Dia nisy rapeton’olona nivoaka ny tobin’ny Filistinina mba hihantsy ady amin’ny Israelita; ny anarany dia i Gôliata, ary avy any Gata
  - type: note
    content: 'Gata: jereo 5.8 sy nta.'
  - type: text
    content: ' izy. Nirefy tokony ho telo metatra izy. '
  '40':
  - type: text
    content: 'Noraisiny ny tehiny, dia lasa izy nifantina vato kilonjy dimy terỳ amoron’ny ranon-driaka, ka nataony tao anaty kitapony fitondra miandry ondry. Nataony an-tanana ny antsamotadiny, dia roso izy hiatrika ilay Filistinina. '
  '41':
  - type: text
    content: 'i Gôliata etsy andaniny, ialohavan’ilay mpitondra ny ampingany, sady manatona tsikelikely an’i Davida. '
  '42':
  - type: text
    content: Dia nandinika an’i Davida ilay Filistinina ka naneso azy, satria hitany fa mbola tanora izy no mazava endrika
  - type: note
    content: Jereo 16.12 sy nta.
  - type: text
    content: ' ary tsara tarehy. '
  '43':
  - type: text
    content: 'Ary hoy i Gôliata tamin’i Davida:'
  - type: text
    content: '–Alika angaha aho no hatonin’ialahy amin’ny tehina? Ho voaozona anie ialahy amin’ny alalan’ireo andriamanitray! '
  '44':
  - type: text
    content: Avia atỳ, fa homeko ny voro-manidina sy ny bibidia ny nofon’ialahy.
  '45':
  - type: text
    content: 'Dia hoy ny navalin’i Davida azy:'
  - type: text
    content: '–Manatona ahy amin’ny sabatra sy ny lefona ary ny lefom-pohy ianao, izaho kosa manatona anao amin’ny anaran’ny TOMPOn’izao rehetra izao, Andriamanitry ny tafik’i Israely, Izay efa nohantsinao. '
  '46':
  - type: text
    content: 'Anio ihany no hanoloran’ny TOMPO anao ho eo am-pelatanako, hahafaty anao aho ka hanapaka ny lohanao. Anio koa dia homeko hohanin’ny voro-manidina sy ny bibidia ny fatin’ny miaramila filistinina. Ary ho fantatry ny tany tontolo fa manana Andriamanitra tokoa i Israely. '
  '47':
  - type: text
    content: Dia ho fantatry ny Fiangonan’i Israely tsivakivolo koa fa tsy mba mila sabatra na lefona ny TOMPO hanomezam-pandresena. An’ny TOMPO ny ady, koa dia hatolony ho eo an-tananay ianareo.
  '48':
  - type: text
    content: 'Raha vao nanomboka nihetsika hanatona an’i Davida ilay Filistinina, dia nihazakazaka mafy i Davida hitsena azy. '
  '49':
  - type: text
    content: Nandray vato tao anaty kitapony i Davida ary nandefa izany tamin’ny antsamotady ka nahavoa ilay Filistinina teo an-tampon-kandriny. Tafalentika teo ilay vato ka nidaraboka niankohoka tamin’ny tany izy.
  '5':
  - type: text
    content: 'satroka varahina aro loha sy fonon-dranjo varahina no nanaovany, ary akanjo misy kirana varahina milanja 60 kilao no aro tena teny aminy. Nisamboady lefom-barahina izy. '
  '50':
  - type: text
    content: Toy izany no nandresen’i Davida an’i Gôliata ka namonoany azy tamin’ny antsamotady sy ny vato, fa tsy mba tamin’ny sabatra.
  '51':
  - type: text
    content: 'Dia nihazakazaka nankeny amin’i Gôliata i Davida ka nanatsoaka ny sabatr’i ilay rapeto tamin’ny tranony ary nanapaka ny lohany. Koa rehefa hitan’ny Filistinina fa maty ilay maherifony, dia nitsoaka nandositra izy ireo. '
  '52':
  - type: text
    content: Tafatsangana ny miaramilan’i Israely sy i Joda ka nanao hiakan’ady sady nanenjika ny Filistinina hatrany am-bavahadin’i Gata sy i Hekrôna
  - type: note
    content: 'Gata sy i Hekrôna: jereo 5.8, 10 sy nta.'
  - type: text
    content: . Ary ny fatin’ny Filistinina niampatrampatra teny an-dalan’i Saharaîma ka hatrany Gata sy i Hekrôna.
  '53':
  - type: text
    content: 'Dia navelan’ny Israelita ny fanenjehana ny Filistinina fa lasa izy ireo namabo ny tobiny. '
  '54':
  - type: text
    content: Nalain’i Davida ny lohan’i Gôliata mba hoentiny any Jerosalema, fa ny fiadian’ilay rapeto kosa notahiriziny tao an-dainy.
  - type: heading
    content: Ny dinam-pisakaizan’i Jônatàna sy i Davida
  '55':
  - type: text
    content: 'Rehefa hitan’i Saoly ny nandehanan’i Davida nifanandrina tamin’ilay Filistinina, dia nanontany an’i Abinera kômandin’ny tafika izy hoe:'
  - type: text
    content: –Zanak’iza moa iny tovolahy iny, ry Abinera?
  - type: text
    content: 'Ka novalian’i Abinera hoe:'
  - type: text
    content: –Velona ny ainao, ry andriamanjaka, fa tena tsy fantatro mihitsy iny tovolahy iny.
  '56':
  - type: text
    content: 'Dia hoy ny mpanjaka taminy:'
  - type: text
    content: –Ataovy àry izay mety hahafantaranao ny mombamomba azy.
  '57':
  - type: text
    content: Koa rehefa tafaverina an-toby avy nahafaty an’i Gôliata i Davida, dia nalain’i Abinera izy ary nentiny tany amin’i Saoly. Mbola teny an-tanany amin’izany ny lohan’lay Filistinina.
  '58':
  - type: text
    content: 'Dia hoy i Saoly nanontany azy:'
  - type: text
    content: –Zanak’iza moa ianao, anaka?
  - type: text
    content: 'Ka novalian’i Davida hoe:'
  - type: text
    content: –Zanak’i Jisay mpanomponao avy any Betlehema aho, tompoko.
  '7':
  - type: text
    content: 'Nitondra lefona iray koa izy ka ny zarany dia lehibe toy ny voditenon’ny mpanenona ary ny lelany dia vy mihoatra ny fito kilao. Nisy miaramila iray mpitondra ny ampingany ka mialoha azy. '
  '8':
  - type: text
    content: 'Dia nijanona i Gôliata ary nitodika tamin’ny miaramila israelita sady niantsoantso hoe:'
  - type: text
    content: '–Nahoana ianareo no vory atrika hiady? Filistinina aho, ary ianareo kosa andevon’i Saoly. Mifidiana ianareo lehilahy iray hidina etỳ hiady amiko. '
  '9':
  - type: text
    content: 'Fa raha toa resiny aho ka matiny, dia ho andevonareo izahay; fa raha resiko kosa izy ka matiko, dia ianareo kosa no ho andevonay ka hanompo anay. '
