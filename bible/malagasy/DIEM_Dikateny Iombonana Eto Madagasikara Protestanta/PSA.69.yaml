        - type: text
          text: Ny and 23-24 dia tsiahivina ao amin’ny Rm 11.9-10.
      marker-yv: yv-n
    - type: text
      text: '!'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fisafoahanao atosahy aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary enga anie hahatratra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny firehitry ny haviniranao!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho rava ny tobiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy mpitoetra ny lainy
    - type: usfm
