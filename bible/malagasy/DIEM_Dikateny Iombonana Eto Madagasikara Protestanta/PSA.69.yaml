      text: ireo taranaky ny mpanompon’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho tonga mpandova izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay tia ny anarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hiorim-ponenana ao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sasatry ny miantso vonjy aho; ka maina ny tendako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vizana ny masoko, eo am-piandrasako Anao Andriamanitro.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo mpankahala ahy tsy amin’antony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '69.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 35,19; tsiahivina ao amin’ny Jôh 15.25 izany andalana izany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maro kokoa noho ny volon-dohako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahery ireo mitady hahafaty ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo mpandrafy ahy tsy an-drariny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zavatra izay tsy nalaiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no indro asainy averiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, fantatrao ny hadalàko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hadisoako tsy mba miafina aminao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Tompo ANDRIAMANITR’izao rehetra izao ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka tsy ho menatra noho ny amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo olona miantehitra aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka tsy hangaihay noho ny amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo mitady Anao, ry Andriamanitr’i Israely!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho Ianao no izakako latsa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mahasafo-kenatra ny tavako,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanjary olon-kafa sy vahiny aho
  - type: usfm
    marker: q1
    children:
