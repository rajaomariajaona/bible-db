      text: kanefa dia andatsana ahy izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fitafiam-pisaonana no nanaovako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga fanarabin’ny olona aho
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fitafan’ny mpitorovoka eo am-bavahady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa fikalon’ny mpidoroka.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa mivavaka aminao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria fotoam-panambinanao izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, be fitiavana Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka valio aho fa azo antoka ny famonjenao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho aho mba tsy ho difotry ny fotaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hindaosin’ny tafio-drivotra sy ny rano lalina;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka aho tsy ho safotry ny riaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa ho voatelin’ny hantsana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho voahidin’ny fasana ao anatiny!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, valio aho fa soa ny fitiavanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: todiho aho fa be fiantrana Ianao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza minia tsy hijery ahy mpanomponao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: azom-pahoriana aho, ka valio faingana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tongava eto akaikiko Ianao hiandraikitra ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afaho amin’ny fahavaloko aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, mba vonjeo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa mby hatenda ny rano;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Latsa, henatra, fahafaham-baràka:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fantatrao fa mihatra amiko avokoa ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy takona Anao ny mpandrafy ahy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Torotoron-datsa ny foko ka reraka aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niandry mpitsetra fa tsy nisy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitady mpampionona fa tsy nahita.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sakafoko nasian’ny sasany poizina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mangetaheta aho, ampisotroiny vinaingitra
    - type: usfm
      marker: f
      children:
      - type: usfm
