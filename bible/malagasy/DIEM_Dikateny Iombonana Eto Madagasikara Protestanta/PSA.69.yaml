    - type: text
      text: Ry mpitady an’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho ela velona anie ianareo!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ny mahantra henoin’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olony voagadra tsy mba ariany.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy, ry tany aman-danitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny ranomasina sy izay velona ao.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa Andriamanitra hamonjy an’i '
    - type: usfm
      marker: w
