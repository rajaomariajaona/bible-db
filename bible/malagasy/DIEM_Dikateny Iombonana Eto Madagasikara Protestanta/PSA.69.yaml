document_id: PSA.69,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Endrey izany fitiavako ny tempolinao!
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hampiarahina amin’ny gitara. Salamo nataon’i Davida.
  '10':
  - type: text
    content: 'Ny fitiavako an’ilay '
  - type: text
    content: tranonao
  - type: text
    content: dia mandoro ahy toy ny afo
  - type: note
    content: Andalany tsiahivina ao amin’ny Jôh 2.17. Jereo koa Sal 119.139.
  - type: text
    content: .
  - type: text
    content: Ny latsa natao hihatra aminao
  - type: text
    content: no mifotitra atỳ amiko
  - type: note
    content: Andalany tsiahivina ao amin’ny Rm 15.3.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Mietry tena sady '
  - type: text
    content: mifady hanina
  - type: text
    content: ' aho,'
  - type: text
    content: kanefa dia andatsana ahy izany.
  '12':
  - type: text
    content: Fitafiam-pisaonana no nanaovako,
  - type: text
    content: dia tonga fanarabin’ny olona aho
  '13':
  - type: text
    content: sy fitafan’ny mpitorovoka eo am-bavahady
  - type: text
    content: ary koa fikalon’ny mpidoroka.
  '14':
  - type: text
    content: Izaho kosa mivavaka aminao, TOMPO ô,
  - type: text
    content: satria fotoam-panambinanao izao;
  - type: text
    content: Andriamanitra ô, be fitiavana Ianao,
  - type: text
    content: ka valio aho fa azo antoka ny famonjenao.
  '15':
  - type: text
    content: Afaho aho mba tsy ho difotry ny fotaka
  - type: text
    content: na hindaosin’ny tafio-drivotra sy ny rano lalina;
  '16':
  - type: text
    content: aoka aho tsy ho safotry ny riaka
  - type: text
    content: na koa ho voatelin’ny hantsana
  - type: text
    content: na ho voahidin’ny fasana ao anatiny!
  '17':
  - type: text
    content: TOMPO ô, valio aho fa soa ny fitiavanao;
  - type: text
    content: todiho aho fa be fiantrana Ianao.
  '18':
  - type: text
    content: Aza minia tsy hijery ahy mpanomponao;
  - type: text
    content: azom-pahoriana aho, ka valio faingana.
  '19':
  - type: text
    content: Tongava eto akaikiko Ianao hiandraikitra ahy,
  - type: text
    content: ka afaho amin’ny fahavaloko aho.
  '2':
  - type: text
    content: Andriamanitra ô, mba vonjeo aho,
  - type: text
    content: fa efa mby hatenda ny rano;
  '20':
  - type: text
    content: 'Latsa, henatra, fahafaham-baràka:'
  - type: text
    content: fantatrao fa mihatra amiko avokoa ireny;
  - type: text
    content: tsy misy takona Anao ny mpandrafy ahy.
  '21':
  - type: text
    content: 'Torotoron-datsa ny foko ka reraka aho:'
  - type: text
    content: niandry mpitsetra fa tsy nisy,
  - type: text
    content: nitady mpampionona fa tsy nahita.
  '22':
  - type: text
    content: Ny sakafoko nasian’ny sasany poizina;
  - type: text
    content: mangetaheta aho, ampisotroiny vinaingitra
  - type: note
    content: Jereo Mt 27.48; Mk 15.36; Jôh 19.28-29.
  - type: text
    content: .
  '23':
  - type: text
    content: Ho fandrika ho an’ny fahavaloko anie ny sakafony
  - type: text
    content: ary ho tonga hahavoa azy ny sorom-pihavanana hohaniny!
  '24':
  - type: text
    content: Hojambena anie ny masony ka tsy hahita,
  - type: text
    content: hanjary manjoko lalandava anie izy
  - type: note
    content: Ny and 23-24 dia tsiahivina ao amin’ny Rm 11.9-10.
  - type: text
    content: '!'
  '25':
  - type: text
    content: Ny fisafoahanao atosahy aminy;
  - type: text
    content: ary enga anie hahatratra azy
  - type: text
    content: ny firehitry ny haviniranao!
  '26':
  - type: text
    content: Aoka ho rava ny tobiny
  - type: text
    content: ary tsy hisy mpitoetra ny lainy
  - type: note
    content: And tsiahivina ao amin’ny Asa 1.20 ary ampiharina amin’i Jodasy mpamadika an’i Jesoa.
  - type: text
    content: ','
  '27':
  - type: text
    content: satria ilay nokapohinao no mbola enjehiny
  - type: text
    content: ary ny ferin’ilay noratrainao no ampiany!
  '28':
  - type: text
    content: Ho voatahiry an-tsoratra avokoa anie
  - type: text
    content: ny heloka vitan’ireo fahavaloko,
  - type: text
    content: ka tsy hisy hoekenao ho marina izy!
  '29':
  - type: text
    content: Koseho ny anarany ao amin’ilay horonamboky
  - type: text
    content: mirakitra ny lisitr’ireo hanana ny fiainana
  - type: note
    content: 'horonamboky... fiainana: jereo Fil 4,3; Apôk 13,8; 17.8; 20.12,15; 21.27; ampit Eks 32.32-33; Dan 12.1; Lk 10.20.'
  - type: text
    content: ;
  - type: text
    content: aoka izy tsy ho voasoratra ho anisan’ny olo-marina!
  '3':
  - type: text
    content: Milentika amin’ny fota-mandrevo aho
  - type: text
    content: sady tsy mahita izay hifaharana;
  - type: text
    content: tonga amin’ny rano lalina aho
  - type: text
    content: ary efa indaosin’ny riaka.
  '30':
  - type: text
    content: Izaho kosa dia ory sy mijaly, Andriamanitra ô,
  - type: text
    content: ka ny famonjenao anie no hampahery ahy;
  '31':
  - type: text
    content: dia hidera ny anaranao amin-kira aho
  - type: text
    content: sy hankalaza Anao amin-tsaotra.
  '32':
  - type: text
    content: Fa izany, TOMPO ô, no sitrakao noho ny ombilahy
  - type: text
    content: na ny vantotr’omby ary tandroka sy kitro
  - type: note
    content: Jereo Sal 50.10-14; 51.18-19.
  - type: text
    content: .
  '33':
  - type: text
    content: Hahita ny famonjena ahy ny ory ka ho faly.
  - type: text
    content: Ry mpitady an’Andriamanitra,
  - type: text
    content: ho ela velona anie ianareo!
  '34':
  - type: text
    content: Satria ny mahantra henoin’ny TOMPO
  - type: text
    content: ary ny olony voagadra tsy mba ariany.
  '35':
  - type: text
    content: Miderà Azy, ry tany aman-danitra
  - type: text
    content: mbamin’ny ranomasina sy izay velona ao.
  '36':
  - type: text
    content: 'Fa Andriamanitra hamonjy an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: sady hanangana ireo tanànan’i Joda,
  - type: text
    content: ka hitoetra ao ny olony
  - type: text
    content: sady ho tompon-toerana;
  '37':
  - type: text
    content: ireo taranaky ny mpanompon’Andriamanitra
  - type: text
    content: no ho tonga mpandova izany;
  - type: text
    content: ary izay tia ny anarany
  - type: text
    content: no hiorim-ponenana ao.
  '4':
  - type: text
    content: Sasatry ny miantso vonjy aho; ka maina ny tendako,
  - type: text
    content: vizana ny masoko, eo am-piandrasako Anao Andriamanitro.
  '5':
  - type: text
    content: Ireo mpankahala ahy tsy amin’antony
  - type: note
    content: Jereo Sal 35,19; tsiahivina ao amin’ny Jôh 15.25 izany andalana izany.
  - type: text
    content: dia maro kokoa noho ny volon-dohako;
  - type: text
    content: mahery ireo mitady hahafaty ahy,
  - type: text
    content: dia ireo mpandrafy ahy tsy an-drariny.
  - type: text
    content: Zavatra izay tsy nalaiko
  - type: text
    content: no indro asainy averiko.
  '6':
  - type: text
    content: Andriamanitra ô, fantatrao ny hadalàko;
  - type: text
    content: ny hadisoako tsy mba miafina aminao.
  '7':
  - type: text
    content: Ry Tompo ANDRIAMANITR’izao rehetra izao ô,
  - type: text
    content: aoka tsy ho menatra noho ny amiko
  - type: text
    content: ireo olona miantehitra aminao;
  - type: text
    content: aoka tsy hangaihay noho ny amiko
  - type: text
    content: ireo mitady Anao, ry Andriamanitr’i Israely!
  '8':
  - type: text
    content: Noho Ianao no izakako latsa
  - type: text
    content: sy mahasafo-kenatra ny tavako,
  '9':
  - type: text
    content: ka nanjary olon-kafa sy vahiny aho
  - type: text
    content: ho an’ireo mpiray tampo amiko.
