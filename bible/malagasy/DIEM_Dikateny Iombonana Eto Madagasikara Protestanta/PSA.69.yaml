  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ferin’ilay noratrainao no ampiany!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voatahiry an-tsoratra avokoa anie
  - type: usfm
    marker: q1
