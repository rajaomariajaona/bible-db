        - type: text
          text: '69.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: And tsiahivina ao amin’ny Asa 1.20 ary ampiharina amin’i Jodasy mpamadika an’i Jesoa.
      marker-yv: yv-n
    - type: text
      text: ','
  '27':
  - type: usfm
    marker: q1
