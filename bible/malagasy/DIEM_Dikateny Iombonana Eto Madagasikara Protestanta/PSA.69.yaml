      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fandrika ho an’ny fahavaloko anie ny sakafony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho tonga hahavoa azy ny sorom-pihavanana hohaniny!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hojambena anie ny masony ka tsy hahita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanjary manjoko lalandava anie izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '69.24 '
      - type: usfm
        marker: ft
