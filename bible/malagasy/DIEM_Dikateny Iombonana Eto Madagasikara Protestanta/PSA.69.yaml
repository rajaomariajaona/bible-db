  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mietry tena sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mifady hanina
    - type: text
      text: ' aho,'
  - type: usfm
