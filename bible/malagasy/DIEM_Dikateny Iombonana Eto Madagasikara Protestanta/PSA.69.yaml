  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa dia ory sy mijaly, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny famonjenao anie no hampahery ahy;
  '31':
  - type: usfm
    marker: q1
