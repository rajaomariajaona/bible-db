document_id: ACT.23,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Nibanjina an’ireo mpitsara i Paoly ka nanao hoe:'
  - type: text
    content: –Ry rahalahy, nitondra tena teo anatrehan’Andriamanitra tamin-kitsimpo tokoa aho mandraka androany.
  '10':
  - type: text
    content: Nihahenjana ny fifandirana ka natahotra ny komandy sao hifandroritan’ny olona i Paoly. Noho izany, dia nomeny baiko ny miaramilany hidina hanaisotra an’i Paoly teo anivon’ny mpivory sy hitondra azy any amin’ny toby.
  '11':
  - type: text
    content: 'Dia niseho tamin’i Paoly ny Tompo ny alin’iny ka nilaza taminy hoe:'
  - type: text
    content: –Mahereza! Vavolombelona nanambara Ahy teto Jerosalema ianao, ary tsy maintsy ho vavolombelona hanambara Ahy toy izany koa any Rôma.
  - type: heading
    content: Fiokoana hamono an’i Paoly
  '12':
  - type: text
    content: 'Ny ampitso maraina, dia nioko ny Jiosy sasantsasany ka nanao velirano fa tsy hihinana na hisotro raha tsy efa nahafaty an’i Paoly. '
  '13':
  - type: text
    content: 'Nihoatra ny efapolo ny isan’ny mpioko. '
  '14':
  - type: text
    content: 'Dia nankany amin’ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' ry zareo ka niteny hoe:'
  - type: text
    content: '–Nanao velirano mihitsy izahay fa tsy hihinana na hisotro raha tsy efa nahafaty an’i Paoly. '
  '15':
  - type: text
    content: 'Ankehitriny àry dia aoka ianareo sy ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ' hangataka amin’ny komandy mba hitondrany an’i Paoly mankatỳ aminareo, mody hoe te hamotopototra mazavazava kokoa ny momba azy. Izahay kosa dia efa vonona ny hamono azy alohan’ny higadonany eto.'
  '16':
  - type: text
    content: Henon’ny zanak’anabavin’i Paoly anefa izany teti-dratsy izany; ka nankany amin’ny toby izy, dia niditra ka nampandre an’i Paoly.
  '17':
  - type: text
    content: 'Dia niantso ny anankiray tamin’ireo kapiteny i Paoly ka nanao taminy hoe:'
  - type: text
    content: –Mba tariho ho any amin’ny komandy ity tovolahy ity fa misy zavatra holazainy aminy.
  '18':
  - type: text
    content: 'Dia nitondra ilay tovolahy nankao amin’ny komandy ilay kapiteny sady niteny hoe:'
  - type: text
    content: –Niantso ahy i Paoly mpifatotra, ka nangataka ahy hitondra ity tovolahy ity atỳ aminao fa misy zavatra holazainy aminao.
  '19':
  - type: text
    content: 'Dia nandray ny tanan’ilay tovolahy ny komandy ka nitondra azy hitokana ary nanontany azy hoe:'
  - type: text
    content: –Inona izato holazainao amiko?
  '2':
  - type: text
    content: Fa i Hananià
  - type: note
    content: I Hananià dia mpisorombe tamin’ny taona 47–59.
  - type: text
    content: ' '
  - type: text
    content: mpisorombe
  - type: text
    content: ' kosa nanome baiko ireo olona teo anilan’i Paoly mba hamely tehamaina ny vavany. '
  '20':
  - type: text
    content: 'Dia hoy izy:'
  - type: text
    content: '–Nifanaiky ny Jiosy fa hangataka ny hitondranao an’i Paoly hankao amin’ny Fitsarana ambony rahampitso, mody hoe te hanadihady mazavazava kokoa ny momba azy. '
  '21':
  - type: text
    content: Nefa aza manaiky azy ireo ianao! Misy Jiosy mihoatra ny efapolo lahy manko miteti-dratsy hamely an’i Paoly. Nanao velirano izy efapolo lahy fa tsy hihinana na hisotro raha tsy efa nahafaty azy. Vonona izao ry zareo, fa ny valin-teninao no andrasany.
  '22':
  - type: text
    content: 'Dia nalefan’ny komandy handeha ilay tovolahy nony avy nofeperany hoe:'
  - type: text
    content: –Aza lazalazaina amin’olona fa efa nambaranao ahy izany.
  - type: heading
    content: Alefa mankany amin’i Feliksa governora i Paoly
  '23':
  - type: text
    content: 'Nantsoin’ny komandy ny roa lahy tamin’ireo kapiteny ka nilazany hoe:'
  - type: text
    content: '–Manomàna miaramila an-tongotra 200 lahy, sy miaramila an-tsoavaly 70 ary mpitan-defona 200 ka samia vonona hiainga anio amin’ny sivy alina hankany Kesaria. '
  '24':
  - type: text
    content: Anomano soavaly koa hitaingenan’i Paoly, hahatonga azy soa aman-tsara any amin’i Feliksa governora
  - type: note
    content: I Feliksa dia governoran’i Jodea tanelanelan’ny taona 52 sy 59 (na 60).
  - type: text
    content: .
  '25':
  - type: text
    content: 'Ary toy izao ny taratasy nosoratan’ny komandy:'
  '26':
  - type: text
    content: '«Izaho Klaody Lisia dia manolotra ny fiarahabana ho anao Andriamatoa hajaina, Feliksa governora. '
  '27':
  - type: text
    content: 'Nosamborin’ny Jiosy ity lehilahy ity ary efa ndeha hovonoiny no fantatro fa mizaka ny zom-pirenena rômanina: dia nitondra miaramila aho ka nanafaka azy. '
  '28':
  - type: text
    content: 'Ary satria te hahalala izay anton’ny niampangan’ny Jiosy azy aho, dia nentiko teo anatrehan’ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ' izy. '
  '29':
  - type: text
    content: 'Hitako fa adihevitra momba ny '
  - type: text
    content: lalàna
  - type: text
    content: 'n-dry zareo no niampangany azy, fa tsy nisy fiampangana tokony hanamelohana azy ho faty na hanaovana azy am-ponja. '
  '3':
  - type: text
    content: 'Tamin’izay dia hoy i Paoly tamin’ny mpisorombe:'
  - type: text
    content: –Andriamanitra kosa hamely anao, ry ilay rindrina milalotra fotsy ivelany ity
  - type: note
    content: Ampit Mt 23.27-28.
  - type: text
    content: '! Mipetraka mba hitsara ahy araka ny '
  - type: text
    content: lalàna
  - type: text
    content: ' ianao, kanefa dia fandikan-dalàna ny fanomezanao baiko hamely tehamaina ahy.'
  '30':
  - type: text
    content: Nony nampahafantarina ahy fa nioko hamono azy ny Jiosy, dia nanapa-kevitra niaraka tamin’izay aho, handefa azy mankatỳ aminao; ary ny mpiampanga azy dia nasaiko hanao ny fitoriany aminao
  - type: note
    content: Misy stf sasany nanampy hoe Veloma!
  - type: text
    content: .»
  '31':
  - type: text
    content: Araka ny baiko azony, dia nalain’ireo miaramila i Paoly ka iny alina iny ihany dia nentiny tany Antipatrida.
  '32':
  - type: text
    content: 'Nony ampitso, dia niverina nody ny miaramila an-tongotra, fa ny miaramila an-tsoavaly no navelany hanohy ny dia miaraka amin’i Paoly. '
  '33':
  - type: text
    content: 'Vao tonga tany Kesaria, dia natolotr’ireo miaramila an-tsoavaly tamin’ny governora ilay taratasy ary narosony teo anoloany koa i Paoly. '
  '34':
  - type: text
    content: 'Rehefa voavakin’ny governora ny taratasy, dia nanontaniany izay faritany fiavian’i Paoly; ka nony fantany fa avy any Silisia i Paoly, '
  '35':
  - type: text
    content: 'dia hoy izy hoe:'
  - type: text
    content: –Hihaino anao aho rehefa tonga ny mpiampanga anao.
  - type: text
    content: 'Dia nasain’ny governora nambenana tao an-dapan’i '
  - type: text
    content: Herôda
  - type: note
    content: Io lapa io dia naorin’i Herôda Lehibe tao Kesaria ka nofidin’ireo governora rômanina ho fonenana.
  - type: text
    content: ' i Paoly.'
  '4':
  - type: text
    content: 'Ry zareo teo anilan’i Paoly kosa nilaza taminy hoe:'
  - type: text
    content: –Maniratsira ny mpisoromben’Andriamanitra ianao!
  '5':
  - type: text
    content: 'Fa novalian’i Paoly hoe:'
  - type: text
    content: '–Tsy fantatro, ry rahalahy, fa izy no mpisorombe. Eny, izao tokoa no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Aza miteny ratsy ny lehibem-pirenenao'
  - type: note
    content: Eks 22.27.
  - type: text
    content: .»
  '6':
  - type: text
    content: 'Fantatr’i Paoly fa ny sasany tamin’ireo anisan’ny Fitsarana ambony dia '
  - type: text
    content: Tsadoseanina
  - type: text
    content: ', ary ny sasany dia '
  - type: text
    content: Farisianina
  - type: text
    content: '; izany no niantsoany teo anoloan’izy rehetra hoe:'
  - type: text
    content: –Ry rahalahy, izaho dia Farisianina, zanaka Farisianina
  - type: note
    content: Jereo 26.5; Fil 3.5.
  - type: text
    content: '. Noho izaho manantena ny '
  - type: text
    content: fitsanganan’ny maty
  - type: text
    content: ' no itsarana ahy.'
  '7':
  - type: text
    content: 'Nony voalazan’i Paoly izany teny izany, dia nifanditra ny Farisianina sy ny Tsadoseanina, ka nizara roa toko ny mpivory. '
  '8':
  - type: text
    content: (Lazain’ny Tsadoseanina mantsy fa tsy misy fitsanganan’ny maty
  - type: note
    content: Jereo Mt 22.23; Mk 12.18; Lk 20.27.
  - type: text
    content: ', ary tsy misy koa na '
  - type: text
    content: anjely
  - type: text
    content: ' na fanahy; nefa izany rehetra izany dia eken’ny Farisianina). '
  '9':
  - type: text
    content: 'Vao mainka nihamafy ny antsoantso; ary ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sasany, anisan’ny antoko Farisianina, dia tafatsangana ka nanohitra mafy nanao hoe:'
  - type: text
    content: –Tsy ahitanay zava-dratsy mihitsy amin’io lehilahy io. Angamba nisy fanahy na anjely niteny taminy.
