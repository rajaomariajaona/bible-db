document_id: ACT.23
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nibanjina an’ireo mpitsara i Paoly ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry rahalahy, nitondra tena teo anatrehan’Andriamanitra tamin-kitsimpo tokoa aho mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa i Hananià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Hananià '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia mpisorombe tamin’ny taona 47–59.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ' kosa nanome baiko ireo olona teo anilan’i Paoly mba hamely tehamaina ny vavany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’izay dia hoy i Paoly tamin’ny mpisorombe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andriamanitra kosa hamely anao, ry ilay rindrina milalotra fotsy ivelany ity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 23.27-28.
    marker-yv: yv-n
  - type: text
    text: '! Mipetraka mba hitsara ahy araka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: ' ianao, kanefa dia fandikan-dalàna ny fanomezanao baiko hamely tehamaina ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ry zareo teo anilan’i Paoly kosa nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Maniratsira ny mpisoromben’Andriamanitra ianao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa novalian’i Paoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy fantatro, ry rahalahy, fa izy no mpisorombe. Eny, izao tokoa no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ': «Aza miteny ratsy ny lehibem-pirenenao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eks 22.27.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fantatr’i Paoly fa ny sasany tamin’ireo anisan’ny Fitsarana ambony dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsadoseanina
  - type: text
    text: ', ary ny sasany dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: '; izany no niantsoany teo anoloan’izy rehetra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry rahalahy, izaho dia Farisianina, zanaka Farisianina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 26.5; Fil 3.5.
    marker-yv: yv-n
  - type: text
    text: '. Noho izaho manantena ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitsanganan’ny maty
  - type: text
    text: ' no itsarana ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony voalazan’i Paoly izany teny izany, dia nifanditra ny Farisianina sy ny Tsadoseanina, ka nizara roa toko ny mpivory. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: (Lazain’ny Tsadoseanina mantsy fa tsy misy fitsanganan’ny maty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 22.23; Mk 12.18; Lk 20.27.
    marker-yv: yv-n
  - type: text
    text: ', ary tsy misy koa na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' na fanahy; nefa izany rehetra izany dia eken’ny Farisianina). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vao mainka nihamafy ny antsoantso; ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' sasany, anisan’ny antoko Farisianina, dia tafatsangana ka nanohitra mafy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ahitanay zava-dratsy mihitsy amin’io lehilahy io. Angamba nisy fanahy na anjely niteny taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nihahenjana ny fifandirana ka natahotra ny komandy sao hifandroritan’ny olona i Paoly. Noho izany, dia nomeny baiko ny miaramilany hidina hanaisotra an’i Paoly teo anivon’ny mpivory sy hitondra azy any amin’ny toby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niseho tamin’i Paoly ny Tompo ny alin’iny ka nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mahereza! Vavolombelona nanambara Ahy teto Jerosalema ianao, ary tsy maintsy ho vavolombelona hanambara Ahy toy izany koa any Rôma.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiokoana hamono an’i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny ampitso maraina, dia nioko ny Jiosy sasantsasany ka nanao velirano fa tsy hihinana na hisotro raha tsy efa nahafaty an’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nihoatra ny efapolo ny isan’ny mpioko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nankany amin’ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' ry zareo ka niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nanao velirano mihitsy izahay fa tsy hihinana na hisotro raha tsy efa nahafaty an’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ankehitriny àry dia aoka ianareo sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fitsarana ambony
  - type: text
    text: ' hangataka amin’ny komandy mba hitondrany an’i Paoly mankatỳ aminareo, mody hoe te hamotopototra mazavazava kokoa ny momba azy. Izahay kosa dia efa vonona ny hamono azy alohan’ny higadonany eto.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Henon’ny zanak’anabavin’i Paoly anefa izany teti-dratsy izany; ka nankany amin’ny toby izy, dia niditra ka nampandre an’i Paoly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niantso ny anankiray tamin’ireo kapiteny i Paoly ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba tariho ho any amin’ny komandy ity tovolahy ity fa misy zavatra holazainy aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nitondra ilay tovolahy nankao amin’ny komandy ilay kapiteny sady niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Niantso ahy i Paoly mpifatotra, ka nangataka ahy hitondra ity tovolahy ity atỳ aminao fa misy zavatra holazainy aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nandray ny tanan’ilay tovolahy ny komandy ka nitondra azy hitokana ary nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona izato holazainao amiko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nifanaiky ny Jiosy fa hangataka ny hitondranao an’i Paoly hankao amin’ny Fitsarana ambony rahampitso, mody hoe te hanadihady mazavazava kokoa ny momba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nefa aza manaiky azy ireo ianao! Misy Jiosy mihoatra ny efapolo lahy manko miteti-dratsy hamely an’i Paoly. Nanao velirano izy efapolo lahy fa tsy hihinana na hisotro raha tsy efa nahafaty azy. Vonona izao ry zareo, fa ny valin-teninao no andrasany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nalefan’ny komandy handeha ilay tovolahy nony avy nofeperany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza lazalazaina amin’olona fa efa nambaranao ahy izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alefa mankany amin’i Feliksa governora i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nantsoin’ny komandy ny roa lahy tamin’ireo kapiteny ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Manomàna miaramila an-tongotra 200 lahy, sy miaramila an-tsoavaly 70 ary mpitan-defona 200 ka samia vonona hiainga anio amin’ny sivy alina hankany Kesaria. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Anomano soavaly koa hitaingenan’i Paoly, hahatonga azy soa aman-tsara any amin’i Feliksa governora
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Feliksa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia governoran’i Jodea tanelanelan’ny taona 52 sy 59 (na 60).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary toy izao ny taratasy nosoratan’ny komandy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '«Izaho Klaody Lisia dia manolotra ny fiarahabana ho anao Andriamatoa hajaina, Feliksa governora. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nosamborin’ny Jiosy ity lehilahy ity ary efa ndeha hovonoiny no fantatro fa mizaka ny zom-pirenena rômanina: dia nitondra miaramila aho ka nanafaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary satria te hahalala izay anton’ny niampangan’ny Jiosy azy aho, dia nentiko teo anatrehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fitsarana ambony
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hitako fa adihevitra momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: 'n-dry zareo no niampangany azy, fa tsy nisy fiampangana tokony hanamelohana azy ho faty na hanaovana azy am-ponja. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nony nampahafantarina ahy fa nioko hamono azy ny Jiosy, dia nanapa-kevitra niaraka tamin’izay aho, handefa azy mankatỳ aminao; ary ny mpiampanga azy dia nasaiko hanao ny fitoriany aminao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany nanampy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Veloma!
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Araka ny baiko azony, dia nalain’ireo miaramila i Paoly ka iny alina iny ihany dia nentiny tany Antipatrida.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nony ampitso, dia niverina nody ny miaramila an-tongotra, fa ny miaramila an-tsoavaly no navelany hanohy ny dia miaraka amin’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Vao tonga tany Kesaria, dia natolotr’ireo miaramila an-tsoavaly tamin’ny governora ilay taratasy ary narosony teo anoloany koa i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Rehefa voavakin’ny governora ny taratasy, dia nanontaniany izay faritany fiavian’i Paoly; ka nony fantany fa avy any Silisia i Paoly, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'dia hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hihaino anao aho rehefa tonga ny mpiampanga anao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nasain’ny governora nambenana tao an-dapan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Io '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: lapa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io dia naorin’i Herôda Lehibe tao Kesaria ka nofidin’ireo governora rômanina ho fonenana.'
    marker-yv: yv-n
  - type: text
    text: ' i Paoly.'
