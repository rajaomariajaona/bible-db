document_id: 2CH.31,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandaminan’i Hezekià ny fanompoam-pivavahana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nony vita izany rehetra izany, dia niainga nankany amin’ireo tanàna jodeanina ny Israelita tsy an-kanavaka izay teo ka nanamontsamontsana ny tsangambaton-tsampy sy nikapa ny tsatokazo fanajana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserà
    - type: text
      text: ' ary nandrava ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: toeram-panasinana
    - type: text
      text: ' sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' fanompoan-tsampy eran’i Joda sy i Benjamîna ary koa tamin’ny foko efraimita sy manasita ambara-paharavany azy rehetra. Taorian’izay dia samy nody ho any amin’ny taniny sy ny tanànany avy izy rehetra.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ka i Hazarià mpisorombe, anisan’ny taranak’i Tsadôka, no namaly azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hatramin’ny niandohan’ny fitondran’ny olona ampaham-bokatra an-tranon’ny TOMPO, dia nanana hanin-kahavoky izahay, sady be koa ny ambiny tavela satria ny TOMPO efa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitahy
    - type: text
      text: ' ny vahoakany. Ireo navelanay mivangongo ireo ny ambiny.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia efitrano fitahirizan-javatra no nasain’i Hezekià namboarina tao an-tranon’ny TOMPO; ka rehefa voavoatra izany, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dia hatrany hatrany no nampidirana ny ampaham-bokatra sy ny fahafolon-karena ary ny zavatra hafa natokana ho an’ny Tompo. Ilay levita atao hoe Kônanià no mpiandraikitra ireny, ary i Simehỳ rahalahiny no mpanampy azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny tonian’ireny kosa dia i Jehiela sy i Hazazià, i Nahata sy i Hasahela, i Jeremôta sy i Jôzabada, i Eliela sy i Jismahià ary i Mahata sy i Benaià; teo ambany fifehezan’i Kônanià sy i Simehỳ mirahalahy izy ireo, araka ny didin’i Hezekià mpanjaka sy i Hazarià mpiandraikitra ny tranon’Andriamanitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ilay levita atao hoe Kôrà, zanakalahin’i Jimnà sady mpiandry ny varavarana atsinanana, no nisahana ny fanati-tsitrapo ho an’Andriamanitra ary nizara ny zavatra navahana ho an’ny TOMPO sy ny zava-masina indrindra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Teo ambany fifehezan’i Korà hatrany hatrany kosa ry i Hedena sy i Miniamîna, i Jesoa sy i Semahià ary i Amarià sy i Sekanià izay tany amin’ireo tanànan’ny mpisorona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tanànan’ny mpisorona '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(antsoina koa hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tanàna levitika
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) jereo Nom 35.1-8; Jos 21.1-42.
      marker-yv: yv-n
    - type: text
      text: '. Ary adidin’izy enin-dahy ny hizara sakafo ho an’ireo mpiombona asa aminy, na ny lehibe na ny kely, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'isaky ny lehilahy voasoratra hatramin’ny zazalahy feno telo taona no ho miakatra; ankoatra ireo, dia mahazo zavatra manokana isan’andro koa izay mpisorona sy levita rehetra miditra ao an-tranon’ny TOMPO mba hanao fanompoana amin’ny anjara raharahany araka ny antokony avy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny fanoratana ny mpisorona moa dia natao araka ny fianakaviany avy; fa ny levita kosa, hatramin’ny roapolo taona no ho miakatra, dia nosoratana araka ny anjara raharahany sy araka ny antokony avy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fisoratana nahafaoka ny ankohonany rehetra izany, dia ny vadiny sy ny zanany lahy na vavy ary ny olona rehetra vory ao aminy, rehefa nanao ny fidiovan-tena hatrany hatrany ny besinimaro. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ho an’ny mpisorona, taranak’i Aharôna, izay teny amin’ny tany manodidina ny tanànany, dia nisy olona voatonona anarana isan-tanàna mba hanome anjara ny lehilahy rehetra ary koa hanome anjara ny levita rehetra izay voasoratra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Najoron’i Hezekià indray ny antokon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: '; ary ankoatra ny fitsinjarana azy araka ny antokony, dia teo koa ny fitsinjarana azy araka ny fanompoany avy. Tao anatin’ireo kianjan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' manko dia nisy mpisorona sy levita nisahana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo, nisy nisahana ny sorom-pihavanana, ary nisy nisahana ny fanompoam-pivavahana isaorana sy iderana ny Tompo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Toy izany no nataon’i Hezekià manerana an’i Joda; ka nanao izay tsara sy mety izy, dia izay hitsiny teo anatrehan’ny TOMPO Andriamaniny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fony nirotsaka tamin’ny asa rehetra momba ny fanompoana ny tranon’Andriamanitra ary momba ny lalànany sy ny didiny izy, dia nitady an’Andriamanitra tamin’ny fony manontolo; ka izany no nahazoany fanambinana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny zavatra hatao sorona dorana manontolo dia nomen’ny mpanjaka avy tamin’ny fananany, na ny fanolotra marain-tsy hariva izany na ny fanolotra isan-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tsabata
    - type: text
      text: ' sy amin’ny voaloham-bolana ary amin’ny fankalazana hafa, araka ny voasoratra ao amin’ny lalànan’ny TOMPO'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sorona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo Nom 28–29; momba ny fandraisana anjara ataon’ny mpanjaka, jereo Ezek 45.22-24.'
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny olona izay nonina tao Jerosalema dia nasain’i Hezekià nanome ny anjaran’ireo mpisorona sy levita mba hifikirany mafy amin’ny fombam-pivavahana naraikitry ny TOMPO. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nony niely izany teny izany, dia nitondra voaloham-bokatra betsaka ny Israelita: dia vary sy divay, menaka sy tantely mbamin’ny vokatry ny tany isan-karazany; ary ny fahafolon-karena tamin’ny zavatra rehetra dia betsaka koa no nentiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.5 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 4-5:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 18.12-13.21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny mponin’ireo tanànan’i Joda, na Israelita tavaratra na Jodeanina, dia nitondra koa ny fahafolon-karena tamin’ny omby sy ondry aman’osy ary ny fahafolon-karena tamin’ny vokatry ny tany isan-karazany; nentiny avokoa ny zavatra voatokana ho an’ny TOMPO ary navosany nitsitokotoko maro ireny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tamin’ny volana fahatelo no nanombohana nanao izany ary tamin’ny volana fahafito no nahavitana azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'volana fahatelo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'may-jona; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: volana fahafito
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': septambra-ôktôbra.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nony tonga hijery ireo zavatra niavosa ireo i Hezekià sy ny manampahefana, dia nisaotra ny TOMPO sy ilay Israely vahoakany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nanontanian’i Hezekià ny mpisorona sy ny levita momba ireo zavatra niavosa ireo. '
