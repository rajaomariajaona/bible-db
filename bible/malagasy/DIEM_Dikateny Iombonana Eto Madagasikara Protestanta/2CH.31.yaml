document_id: 2CH.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandaminan’i Hezekià ny fanompoam-pivavahana
  - type: text
    content: 'Nony vita izany rehetra izany, dia niainga nankany amin’ireo tanàna jodeanina ny Israelita tsy an-kanavaka izay teo ka nanamontsamontsana ny tsangambaton-tsampy sy nikapa ny tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: ' ary nandrava ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' sy '
  - type: text
    content: alitara
  - type: text
    content: ' fanompoan-tsampy eran’i Joda sy i Benjamîna ary koa tamin’ny foko efraimita sy manasita ambara-paharavany azy rehetra. Taorian’izay dia samy nody ho any amin’ny taniny sy ny tanànany avy izy rehetra.'
  '10':
  - type: text
    content: 'Ka i Hazarià mpisorombe, anisan’ny taranak’i Tsadôka, no namaly azy hoe:'
  - type: text
    content: '–Hatramin’ny niandohan’ny fitondran’ny olona ampaham-bokatra an-tranon’ny TOMPO, dia nanana hanin-kahavoky izahay, sady be koa ny ambiny tavela satria ny TOMPO efa '
  - type: text
    content: nitahy
  - type: text
    content: ' ny vahoakany. Ireo navelanay mivangongo ireo ny ambiny.'
  '11':
  - type: text
    content: 'Dia efitrano fitahirizan-javatra no nasain’i Hezekià namboarina tao an-tranon’ny TOMPO; ka rehefa voavoatra izany, '
  '12':
  - type: text
    content: 'dia hatrany hatrany no nampidirana ny ampaham-bokatra sy ny fahafolon-karena ary ny zavatra hafa natokana ho an’ny Tompo. Ilay levita atao hoe Kônanià no mpiandraikitra ireny, ary i Simehỳ rahalahiny no mpanampy azy. '
  '13':
  - type: text
    content: 'Ny tonian’ireny kosa dia i Jehiela sy i Hazazià, i Nahata sy i Hasahela, i Jeremôta sy i Jôzabada, i Eliela sy i Jismahià ary i Mahata sy i Benaià; teo ambany fifehezan’i Kônanià sy i Simehỳ mirahalahy izy ireo, araka ny didin’i Hezekià mpanjaka sy i Hazarià mpiandraikitra ny tranon’Andriamanitra. '
  '14':
  - type: text
    content: 'Ilay levita atao hoe Kôrà, zanakalahin’i Jimnà sady mpiandry ny varavarana atsinanana, no nisahana ny fanati-tsitrapo ho an’Andriamanitra ary nizara ny zavatra navahana ho an’ny TOMPO sy ny zava-masina indrindra. '
  '15':
  - type: text
    content: Teo ambany fifehezan’i Korà hatrany hatrany kosa ry i Hedena sy i Miniamîna, i Jesoa sy i Semahià ary i Amarià sy i Sekanià izay tany amin’ireo tanànan’ny mpisorona
  - type: note
    content: tanànan’ny mpisorona (antsoina koa hoe tanàna levitika) jereo Nom 35.1-8; Jos 21.1-42.
  - type: text
    content: '. Ary adidin’izy enin-dahy ny hizara sakafo ho an’ireo mpiombona asa aminy, na ny lehibe na ny kely, '
  '16':
  - type: text
    content: 'isaky ny lehilahy voasoratra hatramin’ny zazalahy feno telo taona no ho miakatra; ankoatra ireo, dia mahazo zavatra manokana isan’andro koa izay mpisorona sy levita rehetra miditra ao an-tranon’ny TOMPO mba hanao fanompoana amin’ny anjara raharahany araka ny antokony avy. '
  '17':
  - type: text
    content: 'Ny fanoratana ny mpisorona moa dia natao araka ny fianakaviany avy; fa ny levita kosa, hatramin’ny roapolo taona no ho miakatra, dia nosoratana araka ny anjara raharahany sy araka ny antokony avy. '
  '18':
  - type: text
    content: 'Fisoratana nahafaoka ny ankohonany rehetra izany, dia ny vadiny sy ny zanany lahy na vavy ary ny olona rehetra vory ao aminy, rehefa nanao ny fidiovan-tena hatrany hatrany ny besinimaro. '
  '19':
  - type: text
    content: Ho an’ny mpisorona, taranak’i Aharôna, izay teny amin’ny tany manodidina ny tanànany, dia nisy olona voatonona anarana isan-tanàna mba hanome anjara ny lehilahy rehetra ary koa hanome anjara ny levita rehetra izay voasoratra.
  '2':
  - type: text
    content: 'Najoron’i Hezekià indray ny antokon’ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: '; ary ankoatra ny fitsinjarana azy araka ny antokony, dia teo koa ny fitsinjarana azy araka ny fanompoany avy. Tao anatin’ireo kianjan’ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' manko dia nisy mpisorona sy levita nisahana ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo, nisy nisahana ny sorom-pihavanana, ary nisy nisahana ny fanompoam-pivavahana isaorana sy iderana ny Tompo. '
  '20':
  - type: text
    content: 'Toy izany no nataon’i Hezekià manerana an’i Joda; ka nanao izay tsara sy mety izy, dia izay hitsiny teo anatrehan’ny TOMPO Andriamaniny. '
  '21':
  - type: text
    content: Fony nirotsaka tamin’ny asa rehetra momba ny fanompoana ny tranon’Andriamanitra ary momba ny lalànany sy ny didiny izy, dia nitady an’Andriamanitra tamin’ny fony manontolo; ka izany no nahazoany fanambinana.
  '3':
  - type: text
    content: Ny zavatra hatao sorona dorana manontolo dia nomen’ny mpanjaka avy tamin’ny fananany, na ny fanolotra marain-tsy hariva izany na ny fanolotra isan-
  - type: text
    content: tsabata
  - type: text
    content: ' sy amin’ny voaloham-bolana ary amin’ny fankalazana hafa, araka ny voasoratra ao amin’ny lalànan’ny TOMPO'
  - type: note
    content: Momba ny sorona, jereo Nom 28–29; momba ny fandraisana anjara ataon’ny mpanjaka, jereo Ezek 45.22-24.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Ny olona izay nonina tao Jerosalema dia nasain’i Hezekià nanome ny anjaran’ireo mpisorona sy levita mba hifikirany mafy amin’ny fombam-pivavahana naraikitry ny TOMPO. '
  '5':
  - type: text
    content: 'Ary nony niely izany teny izany, dia nitondra voaloham-bokatra betsaka ny Israelita: dia vary sy divay, menaka sy tantely mbamin’ny vokatry ny tany isan-karazany; ary ny fahafolon-karena tamin’ny zavatra rehetra dia betsaka koa no nentiny'
  - type: note
    content: 'And 4-5: jereo Nom 18.12-13.21.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ny mponin’ireo tanànan’i Joda, na Israelita tavaratra na Jodeanina, dia nitondra koa ny fahafolon-karena tamin’ny omby sy ondry aman’osy ary ny fahafolon-karena tamin’ny vokatry ny tany isan-karazany; nentiny avokoa ny zavatra voatokana ho an’ny TOMPO ary navosany nitsitokotoko maro ireny. '
  '7':
  - type: text
    content: Tamin’ny volana fahatelo no nanombohana nanao izany ary tamin’ny volana fahafito no nahavitana azy
  - type: note
    content: 'volana fahatelo: may-jona; volana fahafito: septambra-ôktôbra.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: Nony tonga hijery ireo zavatra niavosa ireo i Hezekià sy ny manampahefana, dia nisaotra ny TOMPO sy ilay Israely vahoakany.
  '9':
  - type: text
    content: 'Dia nanontanian’i Hezekià ny mpisorona sy ny levita momba ireo zavatra niavosa ireo. '
