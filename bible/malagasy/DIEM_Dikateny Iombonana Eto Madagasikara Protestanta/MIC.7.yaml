verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitarainan’ny mpaminany
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indrisy, tahaka ny olona mioty aviavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aorian’ny fiotazam-boankazo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahita aviavy masaka ifotony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay ankafiziko tokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny olona mitsimpona sampaho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aorian’ny fiotazam-boaloboka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahita voaloboka firy hohanina!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hahita izany ny fahavalonay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho rakotry ny henatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ireo niteny taminay hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aiza ihany ny TOMPO Andriamanitrareo?»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho finaritra izahay hahita azy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa amin’izay dia ho tonga fanosy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fotaka eny an-dàlana izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ho avy ny andro hananganana indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny màndan’ny renivohitrao, ry Joda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka amin’izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitarina lavitra kokoa ny faritry ny taninao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Amin’izany andro izany, dia hiverina ho aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpiray tanindrazana rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatreo Asiria ka hatrany Ejipta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatreo Tiro ka hatrany Eofrata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hatreo Tiro ka hatrany Eofrata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt tranainy grika izany; fa ny RM dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hatreo Ejipta ka hatrany Eofrata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatreo amin’ny ranomasina iray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatrany amin’ny ranomasina hafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatreo amin’ny tendrombohitra iray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatrany amin’ny tendrombohitra hafa.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary ho tonga lao ny tany sisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny asa ratsy vitan’ireo mponina ao aminy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'TOMPO ô, ny tehinao no ento '
    - type: usfm
      marker: w
      children:
      - type: text
        text: miandry
    - type: text
      text: ' ny vahoakanao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny andianondry fanananao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitoka-monina eo amin’ny tany be akata
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voahodidina saha mahavokatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'aoka izy handrasana any '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Basàna
    - type: text
      text: ' sy Gilehada'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ao amin’ny and 14-20 ny mpaminany* dia mijoro indray ho mpitondratenin’ny vahoaka, jereo ny and 8-10 sy ny naoty momba ny and 8. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gilehada
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo ny naoty tandrifin’ny Ham 1.3.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny tamin’ny andro taloha.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: «–Toy ny tamin’ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nialan’ny vahoakako tany Ejipta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanao zava-mahagaga ho azy Aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Toy ny... ho azy Aho: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy mamboatra kely ny RM ka mandika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Toy ny tamin’ny andro namoahanao anay avy tany Ejipta, dia anaovy zava-mahagaga izahay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . –Eo amin’ny and 14-20 dia miteny amin’ny anaran’ny vahoaka israelita indray ny mpaminany, jereo ny and 8-10 sy ny naoty tandrifin’ny and 8.
      marker-yv: yv-n
    - type: text
      text: .–»
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hahita izany ny firenen-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho menatra na dia eo aza ny heriny rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho gaga loatra izy ka hitampim-bava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho gina sofina.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hilela-bovoka toy ny menarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ireo biby mikisaka amin’ny tany izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin-kovitra no hialany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy ao amin’ny tranomimanda fiereny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanatonany Anao TOMPO Andriamanitray.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hangorohoro izy ary hanaja Anao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsy misy andriamanitra mitovy aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry TOMPO mpanaisotra ny heloka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mpamela ny fahadisoana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ireo sisa velona aminay vahoaka fanananao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mitahiry fahatezerana mandrakizay Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tia maneho fitiavana aminay.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hamindranao fo indray izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hohitsakitsahinao ny helokay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any ambany ranomasina lalina any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanarianao ny fahotanay rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa foana teo amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olona tena mpivavaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy olo-marina intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny olombelona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy manotrika handatsa-dra avokoa izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary samy mihaza mpiray tampo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fandrika harato ny tsirairay.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hasehonao aminay taranak’i Abrahama sy i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny toetranao mahatoky sy ny fitiavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka izay efa nianiananao tamin’ny razambenay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny andro fahagola.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Vonona hanao ratsy ny tanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpitondra sy ny mpitsara mitaky tsolotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny lehibe milaza izay zavatra iriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miara-miteti-dratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'miara-miteti-dratsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy mazava loatra ny hevitry ny matoanteny hebreo.
      marker-yv: yv-n
    - type: text
      text: ' hahatanteraka azy,'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny tsara indrindra aminy dia toy ny roy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mahitsy indrindra aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ratsy noho ny fefy tsilo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho avy ny andro famaizana anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'araka ny nambaran’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' mpitilinareo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary, ankehitriny aza, dia efa manahy mafy ianareo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aza matoky namana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza miantehitra amin-tsakaiza.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo tsara ny vavanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia eo anatreham-bady aza.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ny zanakalahy maniratsira ny rainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanakavavy manohitra ny reniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vinantovavy manohitra ny rafozam-baviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ankohonan’ny olona ihany no fahavalony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 10.35-36 sy Lk 12.53.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa izaho kosa mitodika amin’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manantena an’Andriamanitra mpamonjy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hihaino ahy ilay Andriamanitro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanantenana sy vavaky ny vahoaka
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aza mihomehy ny aminay ianareo fahavalonay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny mpaminany eto dia miteny amin’ny anaran’ny vahoaka israelita tao Joda (izany no nanovana ny mpisolo anarana ho milaza maro); fa eo amin’ny and 11-13 kosa izy dia miteny amin’ny vahoaka jodeanina. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ianareo fahavalonay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': angamba i Edôma no resahina eto (jereo Hôb 12) na fahavalo amin’ny ankapobeny.'
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa na lavo aza izahay, dia mbola hiarina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na mipetraka ao amin’ny maizina aza izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny TOMPO no fahazavana ho anay.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Satria efa nanota tamin’ny TOMPO izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hozakainay ny fahatezerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-piarony ny adinay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanomezany rariny anay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamoaka anay ho eo amin’ny mazava Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho finaritra izahay hahita ny soa nataony taminay.
