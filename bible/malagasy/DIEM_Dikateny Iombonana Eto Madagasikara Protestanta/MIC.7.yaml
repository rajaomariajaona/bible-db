document_id: MIC.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitarainan’ny mpaminany
  - type: text
    content: Indrisy, tahaka ny olona mioty aviavy
  - type: text
    content: aorian’ny fiotazam-boankazo aho
  - type: text
    content: ka tsy mahita aviavy masaka ifotony
  - type: text
    content: izay ankafiziko tokoa;
  - type: text
    content: ary tahaka ny olona mitsimpona sampaho
  - type: text
    content: aorian’ny fiotazam-boaloboka aho,
  - type: text
    content: ka tsy mahita voaloboka firy hohanina!
  '10':
  - type: text
    content: Hahita izany ny fahavalonay
  - type: text
    content: ka ho rakotry ny henatra,
  - type: text
    content: 'dia ireo niteny taminay hoe:'
  - type: text
    content: «Aiza ihany ny TOMPO Andriamanitrareo?»
  - type: text
    content: Ho finaritra izahay hahita azy ireo,
  - type: text
    content: fa amin’izay dia ho tonga fanosy
  - type: text
    content: toy ny fotaka eny an-dàlana izy.
  '11':
  - type: text
    content: Ho avy ny andro hananganana indray
  - type: text
    content: ny màndan’ny renivohitrao, ry Joda;
  - type: text
    content: ka amin’izany andro izany,
  - type: text
    content: dia hitarina lavitra kokoa ny faritry ny taninao.
  '12':
  - type: text
    content: Amin’izany andro izany, dia hiverina ho aminao
  - type: text
    content: ny mpiray tanindrazana rehetra
  - type: text
    content: hatreo Asiria ka hatrany Ejipta,
  - type: text
    content: hatreo Tiro ka hatrany Eofrata
  - type: note
    content: 'hatreo Tiro ka hatrany Eofrata: araka ny dkt tranainy grika izany; fa ny RM dia manao hoe hatreo Ejipta ka hatrany Eofrata.'
  - type: text
    content: ','
  - type: text
    content: hatreo amin’ny ranomasina iray
  - type: text
    content: ka hatrany amin’ny ranomasina hafa,
  - type: text
    content: hatreo amin’ny tendrombohitra iray
  - type: text
    content: ka hatrany amin’ny tendrombohitra hafa.
  '13':
  - type: text
    content: Ary ho tonga lao ny tany sisa
  - type: text
    content: noho ny asa ratsy vitan’ireo mponina ao aminy.
  '14':
  - type: text
    content: 'TOMPO ô, ny tehinao no ento '
  - type: text
    content: miandry
  - type: text
    content: ' ny vahoakanao,'
  - type: text
    content: dia ny andianondry fanananao,
  - type: text
    content: izay mitoka-monina eo amin’ny tany be akata
  - type: text
    content: voahodidina saha mahavokatra;
  - type: text
    content: 'aoka izy handrasana any '
  - type: text
    content: Basàna
  - type: text
    content: ' sy Gilehada'
  - type: note
    content: 'Ao amin’ny and 14-20 ny mpaminany* dia mijoro indray ho mpitondratenin’ny vahoaka, jereo ny and 8-10 sy ny naoty momba ny and 8. –Gilehada: jereo ny naoty tandrifin’ny Ham 1.3.'
  - type: text
    content: tahaka ny tamin’ny andro taloha.
  '15':
  - type: text
    content: «–Toy ny tamin’ny andro
  - type: text
    content: nialan’ny vahoakako tany Ejipta,
  - type: text
    content: dia hanao zava-mahagaga ho azy Aho
  - type: note
    content: 'Toy ny... ho azy Aho: misy mamboatra kely ny RM ka mandika hoe Toy ny tamin’ny andro namoahanao anay avy tany Ejipta, dia anaovy zava-mahagaga izahay. –Eo amin’ny and 14-20 dia miteny amin’ny anaran’ny vahoaka israelita indray ny mpaminany, jereo ny and 8-10 sy ny naoty tandrifin’ny and 8.'
  - type: text
    content: .–»
  '16':
  - type: text
    content: Hahita izany ny firenen-kafa
  - type: text
    content: ka ho menatra na dia eo aza ny heriny rehetra.
  - type: text
    content: Ho gaga loatra izy ka hitampim-bava
  - type: text
    content: sy ho gina sofina.
  '17':
  - type: text
    content: Hilela-bovoka toy ny menarana
  - type: text
    content: sy ireo biby mikisaka amin’ny tany izy.
  - type: text
    content: Amin-kovitra no hialany
  - type: text
    content: avy ao amin’ny tranomimanda fiereny,
  - type: text
    content: ka hanatonany Anao TOMPO Andriamanitray.
  - type: text
    content: Eny, hangorohoro izy ary hanaja Anao.
  '18':
  - type: text
    content: Tsy misy andriamanitra mitovy aminao,
  - type: text
    content: ry TOMPO mpanaisotra ny heloka.
  - type: text
    content: sy mpamela ny fahadisoana.
  - type: text
    content: Noho ireo sisa velona aminay vahoaka fanananao,
  - type: text
    content: dia tsy mitahiry fahatezerana mandrakizay Ianao
  - type: text
    content: fa tia maneho fitiavana aminay.
  '19':
  - type: text
    content: Hamindranao fo indray izahay,
  - type: text
    content: hohitsakitsahinao ny helokay;
  - type: text
    content: ary any ambany ranomasina lalina any
  - type: text
    content: no hanarianao ny fahotanay rehetra.
  '2':
  - type: text
    content: Fa foana teo amin’ny tany
  - type: text
    content: ny olona tena mpivavaka;
  - type: text
    content: ary tsy misy olo-marina intsony
  - type: text
    content: eo amin’ny olombelona.
  - type: text
    content: Samy manotrika handatsa-dra avokoa izy rehetra;
  - type: text
    content: ary samy mihaza mpiray tampo
  - type: text
    content: amin’ny fandrika harato ny tsirairay.
  '20':
  - type: text
    content: Hasehonao aminay taranak’i Abrahama sy i Jakôba
  - type: text
    content: ny toetranao mahatoky sy ny fitiavanao,
  - type: text
    content: araka izay efa nianiananao tamin’ny razambenay
  - type: text
    content: hatramin’ny andro fahagola.
  '3':
  - type: text
    content: Vonona hanao ratsy ny tanany;
  - type: text
    content: ny mpitondra sy ny mpitsara mitaky tsolotra;
  - type: text
    content: ary ny lehibe milaza izay zavatra iriny,
  - type: text
    content: ka miara-miteti-dratsy
  - type: note
    content: 'miara-miteti-dratsy: tsy mazava loatra ny hevitry ny matoanteny hebreo.'
  - type: text
    content: ' hahatanteraka azy,'
  '4':
  - type: text
    content: Ny tsara indrindra aminy dia toy ny roy,
  - type: text
    content: ary ny mahitsy indrindra aminy
  - type: text
    content: dia ratsy noho ny fefy tsilo.
  - type: text
    content: Ho avy ny andro famaizana anareo
  - type: text
    content: 'araka ny nambaran’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' mpitilinareo;'
  - type: text
    content: ary, ankehitriny aza, dia efa manahy mafy ianareo.
  '5':
  - type: text
    content: Aza matoky namana,
  - type: text
    content: ary aza miantehitra amin-tsakaiza.
  - type: text
    content: Tandremo tsara ny vavanareo
  - type: text
    content: na dia eo anatreham-bady aza.
  '6':
  - type: text
    content: Fa ny zanakalahy maniratsira ny rainy,
  - type: text
    content: ny zanakavavy manohitra ny reniny,
  - type: text
    content: ny vinantovavy manohitra ny rafozam-baviny,
  - type: text
    content: ary ny ankohonan’ny olona ihany no fahavalony
  - type: note
    content: Ampit Mt 10.35-36 sy Lk 12.53.
  - type: text
    content: .
  '7':
  - type: text
    content: Fa izaho kosa mitodika amin’ny TOMPO
  - type: text
    content: ary manantena an’Andriamanitra mpamonjy ahy,
  - type: text
    content: fa hihaino ahy ilay Andriamanitro.
  - type: heading
    content: Fanantenana sy vavaky ny vahoaka
  '8':
  - type: text
    content: Aza mihomehy ny aminay ianareo fahavalonay
  - type: note
    content: 'Ny mpaminany eto dia miteny amin’ny anaran’ny vahoaka israelita tao Joda (izany no nanovana ny mpisolo anarana ho milaza maro); fa eo amin’ny and 11-13 kosa izy dia miteny amin’ny vahoaka jodeanina. –ianareo fahavalonay: angamba i Edôma no resahina eto (jereo Hôb 12) na fahavalo amin’ny ankapobeny.'
  - type: text
    content: '!'
  - type: text
    content: fa na lavo aza izahay, dia mbola hiarina;
  - type: text
    content: ary na mipetraka ao amin’ny maizina aza izahay,
  - type: text
    content: dia ny TOMPO no fahazavana ho anay.
  '9':
  - type: text
    content: Satria efa nanota tamin’ny TOMPO izahay,
  - type: text
    content: dia hozakainay ny fahatezerany,
  - type: text
    content: mandra-piarony ny adinay
  - type: text
    content: ka hanomezany rariny anay.
  - type: text
    content: Hamoaka anay ho eo amin’ny mazava Izy
  - type: text
    content: ka ho finaritra izahay hahita ny soa nataony taminay.
