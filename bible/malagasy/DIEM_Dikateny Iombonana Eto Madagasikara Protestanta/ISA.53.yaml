document_id: ISA.53,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Iza no nino ny fanambaràna natao taminay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no nampisehoana ny herin’ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: And voatsiahy ao amin’ny Jôh 12.38; Rm 10.16.
      marker-yv: yv-n
    - type: text
      text: '?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa sitraky ny TOMPO ny hahatorotoro ilay mpanompony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izany no nampiaretany azy fangirifiriana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa rehefa nanolo-tena ho sorom-panorenana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hahita taranaka sy ho ela velona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny alalan’io mpanompony io rahateo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hahatanteraka ny sitrapon’ny TOMPO.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: «Niaritra fahoriana mafy ny Mpanompoko, hoy ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia hahita ny taranaka sy ho lava andro iainana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fantatry ny olona fa marina io Mpanompoko io;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia Izy no hahatonga ny besinimaro ho marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 3,21-24.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny tenany no mivesatra ny helok’ireo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Noho izany, dia homeko anjara lova
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny sehatry ny besinimaro izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka olona alikisa no hataony babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny Mpanompoko efa nanolo-tena ho faty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanaiky hatao ho isan’ny mpanao ratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Andalana voatsiahy ao amin’ny Mk 15.28; Lk 22.37.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, izy no nitondra ny fahotan’ny besinimaro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanao fanelanelanana ho an’ny olo-meloka.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Naniry toy ny solofon-kazo madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo anatrehan’ny TOMPO ilay Mpanompony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: naniry toy ny fakan-kazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitrebona eo an-tany karakaina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nanana endrika na bika nanintona antsika izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa hatsaran-tarehy haniriantsika azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Notsiratsiraina sy nolavin’ny olona izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lehilahy tototry ny fahoriana sady ilomam-pijaliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka izay tsy tian-kojerena akory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, notsiratsiraina izy ka tsy mba nahoantsika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nitondra ny aretintsika tokoa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nivesatra ny fahoriantsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 8.17.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy isika no nihevitra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho nofaizin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nikapoka sy nampietry azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Kanefa voalefona noho ny helotsika izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady notorotoroina noho ny fahadisoantsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny famaizana antoky ny fiadanantsika no nihatra taminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ratra nahazo azy no nahasitrana antsika.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Isika rehetra dia tahaka ny ondry nania,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa samy efa nandeha tamin’ny lalantsika avy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voatsiahy ao amin’ny 1Pt 2.24-25 ny ampahan’ny and 5-6.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahatran’ny TOMPO tamin’ilay Mpanompony avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vokatry ny fahadisoantsika rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nampahorîna ny Mpanompon’ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nanetry tena ka tsy niloa-bava akory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny zanakondry entina hovonoina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Apôk 5.6.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy tahaka ny ondrivavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’ny manety azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy niloa-bava akory izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nosamborina izy, dia nohelohina mafy ary novonoina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka, tamin’ireo mpiara-belona taminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza moa no mba nieritreritra ny nanjo azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nofongorana teo amin’ny tanin’ny velona izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny heloky ny mpiray firenena aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nikapohana azy ho faty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 7-8 dia voatsiahy ao amin’ny Asa 8.32-33 araka ny dkt tranainy grika.
      marker-yv: yv-n
    - type: text
      text: '?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nokasaina hiray fasana amin’ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany Mpanompon’ny Tompo izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa teo anivon’ny mpanankarena no nandevenana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy nanao ratsy akory izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nisy fitaka teo am-bavany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1Pt 2.22.
      marker-yv: yv-n
    - type: text
      text: .
