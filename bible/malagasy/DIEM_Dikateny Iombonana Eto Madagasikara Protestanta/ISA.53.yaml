document_id: ISA.53,396
type_code: plt
verses:
  '1':
  - type: text
    content: Iza no nino ny fanambaràna natao taminay?
  - type: text
    content: Ary iza no nampisehoana ny herin’ny TOMPO
  - type: note
    content: And voatsiahy ao amin’ny Jôh 12.38; Rm 10.16.
  - type: text
    content: '?'
  '10':
  - type: text
    content: Fa sitraky ny TOMPO ny hahatorotoro ilay mpanompony
  - type: text
    content: ka izany no nampiaretany azy fangirifiriana.
  - type: text
    content: Fa rehefa nanolo-tena ho sorom-panorenana izy,
  - type: text
    content: dia hahita taranaka sy ho ela velona;
  - type: text
    content: ary amin’ny alalan’io mpanompony io rahateo
  - type: text
    content: no hahatanteraka ny sitrapon’ny TOMPO.
  '11':
  - type: text
    content: «Niaritra fahoriana mafy ny Mpanompoko, hoy ny TOMPO,
  - type: text
    content: ka dia hahita ny taranaka sy ho lava andro iainana.
  - type: text
    content: Ho fantatry ny olona fa marina io Mpanompoko io;
  - type: text
    content: ka dia Izy no hahatonga ny besinimaro ho marina
  - type: note
    content: Ampit 3,21-24.
  - type: text
    content: ','
  - type: text
    content: satria ny tenany no mivesatra ny helok’ireo.
  '12':
  - type: text
    content: Noho izany, dia homeko anjara lova
  - type: text
    content: eo amin’ny sehatry ny besinimaro izy
  - type: text
    content: ka olona alikisa no hataony babo,
  - type: text
    content: satria ny Mpanompoko efa nanolo-tena ho faty
  - type: text
    content: sy nanaiky hatao ho isan’ny mpanao ratsy
  - type: note
    content: Andalana voatsiahy ao amin’ny Mk 15.28; Lk 22.37.
  - type: text
    content: ;
  - type: text
    content: eny, izy no nitondra ny fahotan’ny besinimaro
  - type: text
    content: ary nanao fanelanelanana ho an’ny olo-meloka.»
  '2':
  - type: text
    content: Naniry toy ny solofon-kazo madinika
  - type: text
    content: teo anatrehan’ny TOMPO ilay Mpanompony;
  - type: text
    content: naniry toy ny fakan-kazo
  - type: text
    content: mitrebona eo an-tany karakaina.
  - type: text
    content: Tsy nanana endrika na bika nanintona antsika izy,
  - type: text
    content: na koa hatsaran-tarehy haniriantsika azy.
  '3':
  - type: text
    content: Notsiratsiraina sy nolavin’ny olona izy;
  - type: text
    content: lehilahy tototry ny fahoriana sady ilomam-pijaliana
  - type: text
    content: tahaka izay tsy tian-kojerena akory.
  - type: text
    content: Eny, notsiratsiraina izy ka tsy mba nahoantsika.
  '4':
  - type: text
    content: Nitondra ny aretintsika tokoa izy
  - type: text
    content: sady nivesatra ny fahoriantsika
  - type: note
    content: Jereo Mt 8.17.
  - type: text
    content: ;
  - type: text
    content: saingy isika no nihevitra azy
  - type: text
    content: ho nofaizin’Andriamanitra
  - type: text
    content: Izay nikapoka sy nampietry azy.
  '5':
  - type: text
    content: Kanefa voalefona noho ny helotsika izy
  - type: text
    content: sady notorotoroina noho ny fahadisoantsika;
  - type: text
    content: ny famaizana antoky ny fiadanantsika no nihatra taminy,
  - type: text
    content: ary ny ratra nahazo azy no nahasitrana antsika.
  '6':
  - type: text
    content: Isika rehetra dia tahaka ny ondry nania,
  - type: text
    content: fa samy efa nandeha tamin’ny lalantsika avy
  - type: note
    content: Voatsiahy ao amin’ny 1Pt 2.24-25 ny ampahan’ny and 5-6.
  - type: text
    content: ;
  - type: text
    content: ka nahatran’ny TOMPO tamin’ilay Mpanompony avokoa
  - type: text
    content: ny vokatry ny fahadisoantsika rehetra.
  '7':
  - type: text
    content: Nampahorîna ny Mpanompon’ny Tompo,
  - type: text
    content: nefa nanetry tena ka tsy niloa-bava akory,
  - type: text
    content: tahaka ny zanakondry entina hovonoina
  - type: note
    content: Ampit Apôk 5.6.
  - type: text
    content: sy tahaka ny ondrivavy
  - type: text
    content: eo anatrehan’ny manety azy.
  - type: text
    content: Eny, tsy niloa-bava akory izy.
  '8':
  - type: text
    content: Nosamborina izy, dia nohelohina mafy ary novonoina;
  - type: text
    content: ka, tamin’ireo mpiara-belona taminy,
  - type: text
    content: iza moa no mba nieritreritra ny nanjo azy.
  - type: text
    content: Fa nofongorana teo amin’ny tanin’ny velona izy;
  - type: text
    content: ary ny heloky ny mpiray firenena aminy
  - type: text
    content: no nikapohana azy ho faty
  - type: note
    content: Ny and 7-8 dia voatsiahy ao amin’ny Asa 8.32-33 araka ny dkt tranainy grika.
  - type: text
    content: '?'
  '9':
  - type: text
    content: Nokasaina hiray fasana amin’ny olon-dratsy
  - type: text
    content: izany Mpanompon’ny Tompo izany;
  - type: text
    content: kanefa teo anivon’ny mpanankarena no nandevenana azy,
  - type: text
    content: satria tsy nanao ratsy akory izy
  - type: text
    content: ary tsy nisy fitaka teo am-bavany
  - type: note
    content: Ampit 1Pt 2.22.
  - type: text
    content: .
