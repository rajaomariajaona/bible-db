document_id: JDG.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny heloky ny Benjaminita tao Gibehà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany andro mbola tsy nisian’ny mpanjaka tany Israely izany, dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' iray nivahiny tany amin’ny toerana mihataka, an-tsisin’ny faritra be tendrombohitra any Efraîma'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty momba ny 18.2.
    marker-yv: yv-n
  - type: text
    text: '. Naka vadikely iray tao Betlehema any Joda izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tezitra taminy anefa ravehivavy ka nisintaka nody tany amin’ny rainy tany Betlehema ary nijanona tany nandritra ny efa-bolana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa niainga ralehilahy mba hanaraka ny vadikeliny sy hanambitamby azy hiverina hody. Nentiny niaraka taminy ny zatovony iray sy ny boriky roa. Dia nampandrosoin-dravehivavy tao an-tranon-drainy izy; ary ilay rafozan-dahiny koa, raha vao nahita azy, dia nandray azy tamin-kafaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary notanan-drafozany rain-drazazavavy ity vinantolahiny, ka nijanona tao aminy nandritra ny telo andro; dia nihinana sy nisotro ary natory tao ilay levita sy ny zatovony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’ny andro fahefatra dia nifoha maraina izy roa lahy; fa nony efa tena handeha tokoa ilay levita, dia nilazan’ny rain-drazazavavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mihinàna ody am-bavafo kely aloha ianareo vao mandeha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nipetraka niara-nihinana sy nisotro teo izy roa lahy. Fa hoy ity rafozany tamin’ilay levita:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba ekeo re ny handry eto anio alina, ary aoka hifaly ny fonao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa nivonon-kandeha ilay levita; saingy niangavy azy mafy ilay rafozany, koa nijanona ihany izy ary tafandry teo indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’ny andro fahadimy dia nifoha maraina izy mba handeha. Fa hoy ny rafozany taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mihinàna ody am-bavafo aloha, ary ahemory ho amin’ny tolakandro ny dianareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niara-nihinana izy roa lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony efa tena handeha ilay levita sy ny vadikeliny ary ny zatovony, dia hoy ny rafozan-dahiny tamin’ilay vinanto:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro efa tolaka ny andro ary efa ho hariva mihitsy koa mandria aloha anio alina. Indro efa hilentika ny masoandro, ka mandria eto ary aoka hifaly ny fonao! Rahampitso dia hifoha maraina be ianareo ka handeha hody any aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saingy tsy nanaiky hijanona intsony ralehilahy fa niainga ihany; ary nandeha niaraka taminy ny vadikeliny sy ireo boriky roa efa nisy lasely. Dia tonga teo amin’ny tandrifin’i Jebosa na hoe i Jerosalema izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary efa hariva be ny andro no tonga teo akaikin’ny tanàna izy, ka hoy ilay zatovony tamin’ny tompony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha isika hiakatra amin’ity tanànan’ny Jebosita ity ka handry ao anio alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa novalian’ny tompony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, tsy ho any amin’izay tanànan’ny firenen-kafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tanànan’ny firenen-kafa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: i Jerosalema, satria i Davida no haka azy amin’ny Jebosita (jereo 2 Sam 5.6-7). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gibehà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàna eo amin’ny 6 km ao avaratr’i Jerosalema.'
    marker-yv: yv-n
  - type: text
    text: ' tsy misy Israelita isika, fa hanohy ny dia hatrany Gibehà.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy koa izy tamin’ny zatovony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka isika hanatratra an’i Gibehà na Ramà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ramà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo amin’ny 3 km ao avaratr’i Gibehà.
    marker-yv: yv-n
  - type: text
    text: ', ka ny iray amin’ireo toerana ireo no handriantsika anio alina!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nanohy ny diany izy. Ary efa nilentika ny masoandro fony izy tonga teo akaikin’i Gibehà, tao amin’ny faritanin’i Benjamîna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nivily tao Gibehà izy mba handry tao. Niditra ny tanàna izy ka nipetraka teo an-kianja
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kianja, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay anatontosana ny raharaham-bahoaka, dia teo amin’ny fidirana mankao an-tanàna hatrany hatrany, teo anilan’ny vavahady.
    marker-yv: yv-n
  - type: text
    text: ', nefa tsy nisy olona nampiantrano azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsy nisy olona nampiantrano azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: adidy masina ny mampandroso an-trano ny vahiny sendra mandalo.
    marker-yv: yv-n
  - type: text
    text: ' handry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kinanjo intỳ nisy lahiantitra iray tonga avy any an-tsaha niditra ny tanàna, iny hariva iny. Olona avy amin’ny faritra be tendrombohitra any Efraîma izy, saingy nipetraka tao Gibehà tanàna fonenan’ny Benjaminita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nahatsikaritra ity vahiny miandry eo an-kianja ilay lahiantitra ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avy aiza ary ho aiza izato ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia novalian’ilay levita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avy tany Betlehema any Joda izahay ary hamonjy toerana iray mihataka an-tsisin’ny faritra be tendrombohitra any Efraîma, fa any no fiaviako; ka hody any amiko aho, rehefa avy nivahiny tany Betlehema. Ary tsy misy olona mampiantrano ahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: kanefa izahay manana mololo sy vilona ihany ho an’ny borikinay, sady misy mofo sy divay koa ho ahy sy ny vadiko ary ny zatovoko, ka tsy misy zavatra ilainay intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy ilay lahiantitra taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho aminao anie ny fiadanana! Izaho no hikarakara ny zavatra rehetra mety ilainao, fa tsy mahazo mandry eto an-kianja eto ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nampidiriny tao an-tranony izy telo mianaka, ary nomeny vilona ireo borikiny. Dia nisasa tongotra ny vahiny ary nihinana sy nisotro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha mbola nampifaly fo teo am-pihinana izy, dia nisy lehilahy faikan’olona tao an-tanàna nanodidina ny trano sy nandondòna mafy tao am-baravarana ary niteny tamin’ilay lahiantitra tompon-trano hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avoahy iny lehilahy nampiantranoinao ato aminao iny mba hanaovanay firaisana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit amin’ny tantara aroso ao amin’ny Gen 19.1-8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nivoaka nankeo amin’ireo faikan’olona ilay rangahy tompon-trano ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsia, aza manao izany zava-dratsy izany ianareo, ry mpiray tanàna; fa iny lehilahy iny tonga mba hiantrano ato amiko, ka aza anaovanareo izany zavatra mamoafady izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Indro ny zanako vavy virijiny hoentiko eto aminareo, ka azonareo alaina sy anaovanareo izay sitrakareo; fa aza iny lehilahy iny no hanaovanareo izany zavatra mamoafady izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tsy nety nihaino anefa ireo faikan’olona ireo, koa navoakan’ilay levita hankao ivelany ny vadikeliny. Ary ireo dia nanolana an-dravehivavy ka nanaram-po taminy nandritra ny alina manontolo, ary tsy namela azy raha tsy efa nangiran-dratsy ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony efa nadiva ho maraina, dia tonga nitrosina teo am-baravaran’ny tranon’ilay lahiantitra izay nitoeran’ny lahy izy, ary niampatra teo ambara-pahamarain’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nony maraina, dia nitsangana ny lahy ka namoha ny varavarana ary nivoaka ny trano mba hanohy ny diany; kanjo indro ny vavy efa miampatra eo am-baravarana ary mamikitra eo amin’ny tokonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitsangàna, ramatoa, fa handeha isika.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nefa tsy nisy valinteny. Koa nasampin’ilay levita teo ambony borikiny ny fatin’ny vadiny, dia lasa izy nody tany aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa tonga tany an-tranony izy, dia nodidiany tamin’ny antsy sady norasarasainy ho toko 12 ny fatin’ny vadiny, ka nandefasany toko iray avy isam-poko manerana ny tanin’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary izay rehetra nahita izany dia samy loa-bolana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mbola nisy zavatra nitranga na hita toy ity mihitsy hatramin’izay nialan’ny Israelita tany Ejipta ka mandraka androany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Sady nofeperan’ilay levita rahateo moa ireo olona nirahiny mba hiteny amin’ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nisy zavatra nitranga toy ity ve hatramin’izay nialan’ny Israelita tany Ejipta ka mandraka androany? Koa heveronareo izao raharaha izao, ary aoka ianareo hifampidinika sy hanapa-kevitra.
