document_id: JDG.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny heloky ny Benjaminita tao Gibehà
  - type: text
    content: 'Tamin’izany andro mbola tsy nisian’ny mpanjaka tany Israely izany, dia nisy '
  - type: text
    content: levita
  - type: text
    content: ' iray nivahiny tany amin’ny toerana mihataka, an-tsisin’ny faritra be tendrombohitra any Efraîma'
  - type: note
    content: Jereo ny naoty momba ny 18.2.
  - type: text
    content: '. Naka vadikely iray tao Betlehema any Joda izy. '
  '10':
  - type: text
    content: 'Saingy tsy nanaiky hijanona intsony ralehilahy fa niainga ihany; ary nandeha niaraka taminy ny vadikeliny sy ireo boriky roa efa nisy lasely. Dia tonga teo amin’ny tandrifin’i Jebosa na hoe i Jerosalema izy. '
  '11':
  - type: text
    content: 'Ary efa hariva be ny andro no tonga teo akaikin’ny tanàna izy, ka hoy ilay zatovony tamin’ny tompony:'
  - type: text
    content: –Andeha isika hiakatra amin’ity tanànan’ny Jebosita ity ka handry ao anio alina.
  '12':
  - type: text
    content: 'Fa novalian’ny tompony hoe:'
  - type: text
    content: –Tsia, tsy ho any amin’izay tanànan’ny firenen-kafa
  - type: note
    content: 'Tanànan’ny firenen-kafa i Jerosalema, satria i Davida no haka azy amin’ny Jebosita (jereo 2 Sam 5.6-7). –Gibehà: tanàna eo amin’ny 6 km ao avaratr’i Jerosalema.'
  - type: text
    content: ' tsy misy Israelita isika, fa hanohy ny dia hatrany Gibehà.'
  '13':
  - type: text
    content: 'Ary hoy koa izy tamin’ny zatovony:'
  - type: text
    content: –Aoka isika hanatratra an’i Gibehà na Ramà
  - type: note
    content: 'Ramà: tanàna eo amin’ny 3 km ao avaratr’i Gibehà.'
  - type: text
    content: ', ka ny iray amin’ireo toerana ireo no handriantsika anio alina!'
  '14':
  - type: text
    content: 'Dia nanohy ny diany izy. Ary efa nilentika ny masoandro fony izy tonga teo akaikin’i Gibehà, tao amin’ny faritanin’i Benjamîna. '
  '15':
  - type: text
    content: Dia nivily tao Gibehà izy mba handry tao. Niditra ny tanàna izy ka nipetraka teo an-kianja
  - type: note
    content: Ny kianja, izay anatontosana ny raharaham-bahoaka, dia teo amin’ny fidirana mankao an-tanàna hatrany hatrany, teo anilan’ny vavahady.
  - type: text
    content: ', nefa tsy nisy olona nampiantrano azy'
  - type: note
    content: 'tsy nisy olona nampiantrano azy: adidy masina ny mampandroso an-trano ny vahiny sendra mandalo.'
  - type: text
    content: ' handry.'
  '16':
  - type: text
    content: 'Kinanjo intỳ nisy lahiantitra iray tonga avy any an-tsaha niditra ny tanàna, iny hariva iny. Olona avy amin’ny faritra be tendrombohitra any Efraîma izy, saingy nipetraka tao Gibehà tanàna fonenan’ny Benjaminita. '
  '17':
  - type: text
    content: 'Nahatsikaritra ity vahiny miandry eo an-kianja ilay lahiantitra ka nanontany azy hoe:'
  - type: text
    content: –Avy aiza ary ho aiza izato ianao?
  '18':
  - type: text
    content: 'Dia novalian’ilay levita hoe:'
  - type: text
    content: '–Avy tany Betlehema any Joda izahay ary hamonjy toerana iray mihataka an-tsisin’ny faritra be tendrombohitra any Efraîma, fa any no fiaviako; ka hody any amiko aho, rehefa avy nivahiny tany Betlehema. Ary tsy misy olona mampiantrano ahy; '
  '19':
  - type: text
    content: kanefa izahay manana mololo sy vilona ihany ho an’ny borikinay, sady misy mofo sy divay koa ho ahy sy ny vadiko ary ny zatovoko, ka tsy misy zavatra ilainay intsony.
  '2':
  - type: text
    content: 'Tezitra taminy anefa ravehivavy ka nisintaka nody tany amin’ny rainy tany Betlehema ary nijanona tany nandritra ny efa-bolana. '
  '20':
  - type: text
    content: 'Dia hoy ilay lahiantitra taminy:'
  - type: text
    content: –Ho aminao anie ny fiadanana! Izaho no hikarakara ny zavatra rehetra mety ilainao, fa tsy mahazo mandry eto an-kianja eto ianao.
  '21':
  - type: text
    content: Dia nampidiriny tao an-tranony izy telo mianaka, ary nomeny vilona ireo borikiny. Dia nisasa tongotra ny vahiny ary nihinana sy nisotro.
  '22':
  - type: text
    content: 'Fa raha mbola nampifaly fo teo am-pihinana izy, dia nisy lehilahy faikan’olona tao an-tanàna nanodidina ny trano sy nandondòna mafy tao am-baravarana ary niteny tamin’ilay lahiantitra tompon-trano hoe:'
  - type: text
    content: –Avoahy iny lehilahy nampiantranoinao ato aminao iny mba hanaovanay firaisana
  - type: note
    content: Ampit amin’ny tantara aroso ao amin’ny Gen 19.1-8.
  - type: text
    content: .
  '23':
  - type: text
    content: 'Dia nivoaka nankeo amin’ireo faikan’olona ilay rangahy tompon-trano ka nanao taminy hoe:'
  - type: text
    content: '–Tsia, aza manao izany zava-dratsy izany ianareo, ry mpiray tanàna; fa iny lehilahy iny tonga mba hiantrano ato amiko, ka aza anaovanareo izany zavatra mamoafady izany. '
  '24':
  - type: text
    content: Indro ny zanako vavy virijiny hoentiko eto aminareo, ka azonareo alaina sy anaovanareo izay sitrakareo; fa aza iny lehilahy iny no hanaovanareo izany zavatra mamoafady izany.
  '25':
  - type: text
    content: 'Tsy nety nihaino anefa ireo faikan’olona ireo, koa navoakan’ilay levita hankao ivelany ny vadikeliny. Ary ireo dia nanolana an-dravehivavy ka nanaram-po taminy nandritra ny alina manontolo, ary tsy namela azy raha tsy efa nangiran-dratsy ny andro. '
  '26':
  - type: text
    content: 'Ary nony efa nadiva ho maraina, dia tonga nitrosina teo am-baravaran’ny tranon’ilay lahiantitra izay nitoeran’ny lahy izy, ary niampatra teo ambara-pahamarain’ny andro. '
  '27':
  - type: text
    content: 'Ary nony maraina, dia nitsangana ny lahy ka namoha ny varavarana ary nivoaka ny trano mba hanohy ny diany; kanjo indro ny vavy efa miampatra eo am-baravarana ary mamikitra eo amin’ny tokonana. '
  '28':
  - type: text
    content: 'Dia hoy izy taminy:'
  - type: text
    content: –Mitsangàna, ramatoa, fa handeha isika.
  - type: text
    content: 'Nefa tsy nisy valinteny. Koa nasampin’ilay levita teo ambony borikiny ny fatin’ny vadiny, dia lasa izy nody tany aminy. '
  '29':
  - type: text
    content: 'Rehefa tonga tany an-tranony izy, dia nodidiany tamin’ny antsy sady norasarasainy ho toko 12 ny fatin’ny vadiny, ka nandefasany toko iray avy isam-poko manerana ny tanin’i Israely. '
  '3':
  - type: text
    content: 'Koa niainga ralehilahy mba hanaraka ny vadikeliny sy hanambitamby azy hiverina hody. Nentiny niaraka taminy ny zatovony iray sy ny boriky roa. Dia nampandrosoin-dravehivavy tao an-tranon-drainy izy; ary ilay rafozan-dahiny koa, raha vao nahita azy, dia nandray azy tamin-kafaliana. '
  '30':
  - type: text
    content: 'Ary izay rehetra nahita izany dia samy loa-bolana hoe:'
  - type: text
    content: –Tsy mbola nisy zavatra nitranga na hita toy ity mihitsy hatramin’izay nialan’ny Israelita tany Ejipta ka mandraka androany.
  - type: text
    content: 'Sady nofeperan’ilay levita rahateo moa ireo olona nirahiny mba hiteny amin’ny Israelita hoe:'
  - type: text
    content: –Efa nisy zavatra nitranga toy ity ve hatramin’izay nialan’ny Israelita tany Ejipta ka mandraka androany? Koa heveronareo izao raharaha izao, ary aoka ianareo hifampidinika sy hanapa-kevitra.
  '4':
  - type: text
    content: 'Ary notanan-drafozany rain-drazazavavy ity vinantolahiny, ka nijanona tao aminy nandritra ny telo andro; dia nihinana sy nisotro ary natory tao ilay levita sy ny zatovony. '
  '5':
  - type: text
    content: 'Tamin’ny andro fahefatra dia nifoha maraina izy roa lahy; fa nony efa tena handeha tokoa ilay levita, dia nilazan’ny rain-drazazavavy hoe:'
  - type: text
    content: –Mihinàna ody am-bavafo kely aloha ianareo vao mandeha.
  '6':
  - type: text
    content: 'Dia nipetraka niara-nihinana sy nisotro teo izy roa lahy. Fa hoy ity rafozany tamin’ilay levita:'
  - type: text
    content: –Mba ekeo re ny handry eto anio alina, ary aoka hifaly ny fonao!
  '7':
  - type: text
    content: 'Efa nivonon-kandeha ilay levita; saingy niangavy azy mafy ilay rafozany, koa nijanona ihany izy ary tafandry teo indray. '
  '8':
  - type: text
    content: 'Tamin’ny andro fahadimy dia nifoha maraina izy mba handeha. Fa hoy ny rafozany taminy:'
  - type: text
    content: –Mihinàna ody am-bavafo aloha, ary ahemory ho amin’ny tolakandro ny dianareo.
  - type: text
    content: 'Dia niara-nihinana izy roa lahy. '
  '9':
  - type: text
    content: 'Ary nony efa tena handeha ilay levita sy ny vadikeliny ary ny zatovony, dia hoy ny rafozan-dahiny tamin’ilay vinanto:'
  - type: text
    content: –Indro efa tolaka ny andro ary efa ho hariva mihitsy koa mandria aloha anio alina. Indro efa hilentika ny masoandro, ka mandria eto ary aoka hifaly ny fonao! Rahampitso dia hifoha maraina be ianareo ka handeha hody any aminao.
