document_id: PRO.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amboaran’ohabolana momba ny fiainana môraly
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ohabolan’i Salômôna.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanaka hendry mahafaly ny rainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny zanaka adala mampalahelo ny reniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fananana azo tamim-pomba ratsy, dia tsy mitondra soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahamarinana no manafaka amin’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy avelan’ny TOMPO ho noana ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa laviny kosa ny fanirian’ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny tanana tsy miasa no mampahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tanana mazoto kosa mampanan-karena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay manangom-batsy amin’ny fararano dia olo-misaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay matory amin’ny fotoam-pijinjana kosa tebahina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fitahiana no ho amin’ny tenan’ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenin’ny olon-dratsy kosa mifono herisetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hotahîna ny fahatsiarovana ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho hadino hatramin’ny anarany kosa ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny hendry am-po dia mandray torolalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny adala miteniteny foana kosa ho very.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mizotra ho olom-banona no mizotra amim-pitokiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay manan-toetra miolikolika kosa hiharan-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay manafina ny zava-nitranga dia mahatonga alahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mananatra tsy misorona kosa mitondra fiadanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny dkt amin’ny and 10b dia manaraka ny dkt tranainy grika. Ny RM eto dia mamerina ny and 8b.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny tenin’ny olo-marina dia loharanon’aina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 12.28 ary 3.18 sy nta.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tenin’ny olon-dratsy kosa mifono herisetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fankahalana dia manetsika ady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fitiavana manarona ny hadisoana rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jak 5.20; 1Pt 4.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ahitana fahendrena ny tenin’ny manan-tsaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsorakazo kosa no ho an’ny lamosin’ny bado.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Harem-pahalalana no voaangon’ny hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandringanana antomotra kosa no hateraky ny tenin’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny fananan’ny mpanankarena no toy ny manda miaro azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahantran’ny ory kosa no hiteraka fandringanana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny karaman’ny olo-marina dia hivelomany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny vola azon’ny olon-dratsy kosa hahotany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay mitandro fifehezan-tena dia mizotra ho amin’ny fiainana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mandà anatra kosa no haniasia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mpihatsaravelatsihy izay manafina ny fankahalany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa adala izay mampiely endrikendrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny teny maro tsy ilaozam-pahadisoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa olo-misaina kosa ny mahatam-bava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Volafotsy voafantina ny tenin’ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fon’ny olon-dratsy kosa tsisy vidiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mampianatra ny maro ny tenin’ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa matin’ny habadoana kosa ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitahian
  - type: text
    text: ’ny TOMPO no mampanankarena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy manampy inona amin’izany ny ezaky ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny fanaovan-dratsy no lalaon’ny adala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fanehoam-pahendrena kosa no an’ny mahay manavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay ahîn’ny olon-dratsy no ho tonga aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay irîn’ny olo-marina kosa no homena azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rehefa mipaoka ny rivo-maherin’ny fitsapana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia indaosiny tsy ho eo intsony ny olon-dratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahatanty lalandava izany kosa ny olo-marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mampangirifiry nify ny vinaingitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampangirifiry maso ny setroka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izany koa ny olona kamo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mampangirifiry ny mpampiasa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay manaja ny TOMPO ho ela velona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-dratsy kosa malaky maty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 11.31; 13.21; 14.26-27; 19.23 ary ampit Sal 73; Kôh 8.12-13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Miteraka fifaliana ny fanantenàn’ny olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fanampoizan’ny olon-dratsy kosa ho levona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fialofana ho an’ny olom-banona ny lalan’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fandringanana kosa ho an’ny mpanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy hihontsona na oviana na oviana ny olo-marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-dratsy kosa tsy hahajanona amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fahendrena no mikoriana avy eo am-bavan’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lela fandainga kosa tokony hotapahina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny molotry ny olo-marina dia miboiboika halemem-panahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fitaka no mameno ny vavan’ny olon-dratsy.
