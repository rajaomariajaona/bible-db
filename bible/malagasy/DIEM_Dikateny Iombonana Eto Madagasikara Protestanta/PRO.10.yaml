document_id: PRO.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Amboaran’ohabolana momba ny fiainana môraly
  - type: text
    content: Ohabolan’i Salômôna.
  - type: text
    content: Ny zanaka hendry mahafaly ny rainy;
  - type: text
    content: fa ny zanaka adala mampalahelo ny reniny.
  '10':
  - type: text
    content: Izay manafina ny zava-nitranga dia mahatonga alahelo;
  - type: text
    content: fa izay mananatra tsy misorona kosa mitondra fiadanana
  - type: note
    content: Ny dkt amin’ny and 10b dia manaraka ny dkt tranainy grika. Ny RM eto dia mamerina ny and 8b.
  - type: text
    content: .
  '11':
  - type: text
    content: Ny tenin’ny olo-marina dia loharanon’aina
  - type: note
    content: Jereo 12.28 ary 3.18 sy nta.
  - type: text
    content: fa ny tenin’ny olon-dratsy kosa mifono herisetra.
  '12':
  - type: text
    content: Ny fankahalana dia manetsika ady;
  - type: text
    content: fa ny fitiavana manarona ny hadisoana rehetra
  - type: note
    content: Jereo Jak 5.20; 1Pt 4.8.
  - type: text
    content: .
  '13':
  - type: text
    content: Ahitana fahendrena ny tenin’ny manan-tsaina;
  - type: text
    content: fa tsorakazo kosa no ho an’ny lamosin’ny bado.
  '14':
  - type: text
    content: Harem-pahalalana no voaangon’ny hendry;
  - type: text
    content: fandringanana antomotra kosa no hateraky ny tenin’ny adala.
  '15':
  - type: text
    content: Ny fananan’ny mpanankarena no toy ny manda miaro azy;
  - type: text
    content: fa ny fahantran’ny ory kosa no hiteraka fandringanana azy.
  '16':
  - type: text
    content: Ny karaman’ny olo-marina dia hivelomany;
  - type: text
    content: fa ny vola azon’ny olon-dratsy kosa hahotany.
  '17':
  - type: text
    content: Izay mitandro fifehezan-tena dia mizotra ho amin’ny fiainana;
  - type: text
    content: fa izay mandà anatra kosa no haniasia.
  '18':
  - type: text
    content: Mpihatsaravelatsihy izay manafina ny fankahalany;
  - type: text
    content: fa adala izay mampiely endrikendrika.
  '19':
  - type: text
    content: Ny teny maro tsy ilaozam-pahadisoana;
  - type: text
    content: fa olo-misaina kosa ny mahatam-bava.
  '2':
  - type: text
    content: Ny fananana azo tamim-pomba ratsy, dia tsy mitondra soa;
  - type: text
    content: fa ny fahamarinana no manafaka amin’ny fahafatesana.
  '20':
  - type: text
    content: Volafotsy voafantina ny tenin’ny olo-marina;
  - type: text
    content: fa ny fon’ny olon-dratsy kosa tsisy vidiny.
  '21':
  - type: text
    content: Mampianatra ny maro ny tenin’ny olo-marina;
  - type: text
    content: fa matin’ny habadoana kosa ny adala.
  '22':
  - type: text
    content: 'Ny '
  - type: text
    content: fitahian
  - type: text
    content: ’ny TOMPO no mampanankarena;
  - type: text
    content: ary tsy manampy inona amin’izany ny ezaky ny olona.
  '23':
  - type: text
    content: Ny fanaovan-dratsy no lalaon’ny adala;
  - type: text
    content: fanehoam-pahendrena kosa no an’ny mahay manavaka.
  '24':
  - type: text
    content: Izay ahîn’ny olon-dratsy no ho tonga aminy;
  - type: text
    content: fa izay irîn’ny olo-marina kosa no homena azy.
  '25':
  - type: text
    content: Rehefa mipaoka ny rivo-maherin’ny fitsapana,
  - type: text
    content: dia indaosiny tsy ho eo intsony ny olon-dratsy;
  - type: text
    content: fa mahatanty lalandava izany kosa ny olo-marina.
  '26':
  - type: text
    content: Mampangirifiry nify ny vinaingitra,
  - type: text
    content: mampangirifiry maso ny setroka;
  - type: text
    content: toy izany koa ny olona kamo
  - type: text
    content: dia mampangirifiry ny mpampiasa azy.
  '27':
  - type: text
    content: Izay manaja ny TOMPO ho ela velona;
  - type: text
    content: fa ny olon-dratsy kosa malaky maty
  - type: note
    content: Jereo 11.31; 13.21; 14.26-27; 19.23 ary ampit Sal 73; Kôh 8.12-13.
  - type: text
    content: .
  '28':
  - type: text
    content: Miteraka fifaliana ny fanantenàn’ny olo-marina;
  - type: text
    content: fa ny fanampoizan’ny olon-dratsy kosa ho levona.
  '29':
  - type: text
    content: Fialofana ho an’ny olom-banona ny lalan’ny TOMPO,
  - type: text
    content: fa fandringanana kosa ho an’ny mpanao ratsy.
  '3':
  - type: text
    content: Tsy avelan’ny TOMPO ho noana ny marina,
  - type: text
    content: fa laviny kosa ny fanirian’ny olon-dratsy.
  '30':
  - type: text
    content: Tsy hihontsona na oviana na oviana ny olo-marina,
  - type: text
    content: fa ny olon-dratsy kosa tsy hahajanona amin’ny tany.
  '31':
  - type: text
    content: Fahendrena no mikoriana avy eo am-bavan’ny marina;
  - type: text
    content: fa ny lela fandainga kosa tokony hotapahina.
  '32':
  - type: text
    content: Ny molotry ny olo-marina dia miboiboika halemem-panahy,
  - type: text
    content: fa fitaka no mameno ny vavan’ny olon-dratsy.
  '4':
  - type: text
    content: Ny tanana tsy miasa no mampahantra;
  - type: text
    content: fa ny tanana mazoto kosa mampanan-karena.
  '5':
  - type: text
    content: Izay manangom-batsy amin’ny fararano dia olo-misaina;
  - type: text
    content: fa izay matory amin’ny fotoam-pijinjana kosa tebahina.
  '6':
  - type: text
    content: Fitahiana no ho amin’ny tenan’ny olo-marina;
  - type: text
    content: fa ny tenin’ny olon-dratsy kosa mifono herisetra.
  '7':
  - type: text
    content: Hotahîna ny fahatsiarovana ny olo-marina;
  - type: text
    content: fa ho hadino hatramin’ny anarany kosa ny olon-dratsy.
  '8':
  - type: text
    content: Ny hendry am-po dia mandray torolalana;
  - type: text
    content: fa ny adala miteniteny foana kosa ho very.
  '9':
  - type: text
    content: Izay mizotra ho olom-banona no mizotra amim-pitokiana;
  - type: text
    content: fa izay manan-toetra miolikolika kosa hiharan-doza.
