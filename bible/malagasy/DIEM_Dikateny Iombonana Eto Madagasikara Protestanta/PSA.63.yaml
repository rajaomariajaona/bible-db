document_id: PSA.63,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny fitiavanao tsara noho ny aina
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida, fony izy tany an-taniefitr’i Joda
  - type: text
    content: ' '
  - type: note
    content: Jereo 1 Sam 23.14; 24.2.
  - type: text
    content: .
  '10':
  - type: text
    content: Ireo olona mitady hahafaty ahy,
  - type: text
    content: aoka hiharan-doza tsy ampoizina
  - type: text
    content: ka hiditra amin’ny fonenan’ny maty,
  - type: text
    content: any amin’ny fanambanin’ny tany!
  '11':
  - type: text
    content: Ho afaka aina any an’ady anie izy
  - type: text
    content: ka ho anjara sakafon’ny amboadia!
  '12':
  - type: text
    content: Fa ny mpanjaka kosa anie hifaly aminao,
  - type: text
    content: ry ilay Andriamanitra nampandresy azy!
  - type: text
    content: Ireo rehetra nanao fianianana
  - type: text
    content: ka nitonona Anao ho vavolombelona,
  - type: text
    content: aoka hifampiarahaba noho ny aminao
  - type: text
    content: satria voakombonao tsy ho afa-miteny
  - type: text
    content: ny vavan’ny olona mpandainga!
  '2':
  - type: text
    content: Andriamanitra ô, Ianao no Andriamanitro;
  - type: text
    content: mitady fatratra Anao aho sy mangetaheta Anao.
  - type: text
    content: Maniry Anao ny tenako manontolo
  - type: text
    content: toy ny tany maina sy mangentana
  - type: text
    content: toy ny tany haraka mila rano
  - type: note
    content: Ampit Sal 143.6.
  - type: text
    content: .
  '3':
  - type: text
    content: Koa enga anie ho afa-mibanjina Anao
  - type: text
    content: 'ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' aho'
  - type: text
    content: mba hahitako ny hery amam-boninahitrao!
  '4':
  - type: text
    content: Eny, hambarako ny fiderana Anao
  - type: text
    content: satria tsara noho ny aina ny fitiavanao;
  '5':
  - type: text
    content: koa mandritra ny fiainako no hisaorako Anao.
  - type: text
    content: Hanandra-tanana
  - type: note
    content: 'Hanandra-tanana: jereo Sal 28.2 sy nta.'
  - type: text
    content: ' aho rehefa manonona ny anaranao;'
  '6':
  - type: text
    content: dia ho heni-tsoa toy ny voky sakafo tsara aho
  - type: text
    content: ka ho faly handredona hira fiderana Anao.
  '7':
  - type: text
    content: Eo am-pandriana aho mahatsiahy Anao;
  - type: text
    content: tontolo alina, any aminao ny eritreritro
  '8':
  - type: text
    content: satria nombanao fitahiana hatrany aho
  - type: text
    content: ka mibitaka mialoka eo ambany elatrao.
  '9':
  - type: text
    content: Mifikitra aminao ny tenako manontolo,
  - type: text
    content: satria manohana ahy ny herinao.
