  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho afaka aina any an’ady anie izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho anjara sakafon’ny amboadia!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mpanjaka kosa anie hifaly aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry ilay Andriamanitra nampandresy azy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo rehetra nanao fianianana
  - type: usfm
    marker: q1
    children:
