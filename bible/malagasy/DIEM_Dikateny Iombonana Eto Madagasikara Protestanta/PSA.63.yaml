      text: ka nitonona Anao ho vavolombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka hifampiarahaba noho ny aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria voakombonao tsy ho afa-miteny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vavan’ny olona mpandainga!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, Ianao no Andriamanitro;
  - type: usfm
