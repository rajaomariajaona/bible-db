document_id: REV.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Habakabaka vaovao sy tany vaovao
  - type: text
    content: 'Dia nahita habakabaka vaovao sy tany vaovao aho; fa efa lasa ny habakabaka voalohany sy tany voalohany, ary ny ranomasina dia tsy misy intsony. '
  '10':
  - type: text
    content: Dia nahazo tsindrimandry avy amin’ny Fanahy Masina aho ka nentin’ny anjely tany amin’ity tendrombohitra sady lehibe no avo
  - type: note
    content: Ampit Ezek 40.2.
  - type: text
    content: ', ary nasehony ahy ny tanàna masina avy tamin’Andriamanitra, dia i Jerosalema nidina avy any an-danitra '
  '11':
  - type: text
    content: sady heniky ny voninahitr’Andriamanitra. Ny famirapiratan’ilay tanàna masina dia tahaka ny an’ny vato sarobidy tokoa, dia ny vatosoa jaspa
  - type: note
    content: 'jaspa: vatosoa miloko maitso sy fotsy mitsoriadriaka.'
  - type: text
    content: ' miendrika kristaly manganohano. '
  '12':
  - type: text
    content: 'Nanana manda matevina sady avo izy, ary koa nanana vavahady 12; ka tamin’ireo vavahady ireo dia nisy anjely 12 sady nisy anarana voasoratra, dia ny anaran’ny foko 12 amin’ny '
  - type: text
    content: Israelita
  - type: text
    content: ': '
  '13':
  - type: text
    content: vavahady telo eo atsinanana, vavahady telo eo avaratra, vavahady telo eo atsimo, vavahady telo eo andrefana
  - type: note
    content: 'And 12-13: ampit Ezek 48.30-35.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Nisy vatofanorenana 12 ny mandan’ilay tanàna; ka tamin’ireo vatofanorenana ireo dia nisy anarana 12, dia ny anaran’izy 12 lahy '
  - type: text
    content: apôstôli
  - type: text
    content: n’ny Zanakondry.
  '15':
  - type: text
    content: Ilay anjely niteny tamiko dia nanana volotara volamena fandrefesana, mba handrefesana ny tanàna sy ny vavahadiny ary ny màndany
  - type: note
    content: Ampit Ezek 40.3.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Miendrika efamira ny tanàna, ka mitovy refy ny lafiny rehetra. Dia nandrefy ny tanàna tamin’ny volotara ilay anjely, ka samy 12 000 stàdy avy ny lafiny efatra sy ny haavony; '
  '17':
  - type: text
    content: ary norefesiny koa ny màndany, ka 144 hakiho ny hateviny araka ny refy mahazatra ny olona, izay refy nampiasain’ny anjely
  - type: note
    content: 'And 16-17: marihina fa ireo tarehimarika 12 000 sy 144 000 ireo dia samy zanaky ny tarehimarika 12 ka mety mifono hevitra an’ohatra: araka izany, ireo tarehimarika ireo dia natao hilazana fa lavorary sy tonga lafatra tokoa ny tanàna masina; manambara ny vahoaka Israely koa ny isa 12. Ny stàdy anankiray dia refy mahatratra 185 metatra ary ny hakiho anankiray dia antsasa-metatra, kanefa tsy izany loatra no tsindriana eto.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Vatosoa jaspa no nanaovana izany manda izany; ary ny tanàna dia tena volamena madio toy ny fitaratra madio. '
  '19':
  - type: text
    content: 'Ireo vato fanorenana ny mandan’ny tanàna kosa dia voaravaka vatosoa isan-karazany: vato jaspa ny fanorenana voalohany, vato safira ny faharoa, vato kalsedoanina ny fahatelo, vato emeralda ny fahefatra, '
  '2':
  - type: text
    content: 'Ary hitako nidina avy any an-danitra ny tanàna masina avy tamin’Andriamanitra, dia i Jerosalema vaovao, voaomana tahaka ny ampakarina voahaingo hihaona amin’ny vadiny. '
  '20':
  - type: text
    content: 'vato sardôniksa ny fahadimy, vato sardoanina ny fahenina, vato krizôlita ny fahafito, vato berila ny fahavalo, vato tôpaza ny fahasivy, vato krizôpraso ny fahafolo, vato hiasinta ny faha-11, ary vato ametista ny faha-12. '
  '21':
  - type: text
    content: Ny vavahady 12 dia perla 12, fa perla vongana iray ihany no nanaovana ny isam-bavahady; ary ny lalamben’ny tanàna dia tena volamena madio toy ny fitaratra manganohano
  - type: note
    content: 'And 18-21: ampit Is 54.11-12. –Ny and 19-20 dia mitanisa vatosoa 12 karazana.'
  - type: text
    content: .
  '22':
  - type: text
    content: 'Tsy nahita '
  - type: text
    content: tempoly
  - type: text
    content: ' tao amin’ilay tanàna aho, satria ny Tompo Andriamanitra Tsitoha sy ny Zanakondry no tempoliny. '
  '23':
  - type: text
    content: 'Ny tanàna tsy mba mila ny masoandro na ny volana hamirapiratra ao aminy: fa ny voninahitr’Andriamanitra no efa manazava azy, ary ny Zanakondry no jiro manilo azy. '
  '24':
  - type: text
    content: 'Handeha amin’ny fahazavàn’ilay tanàna ny firenena rehetra: ary ny mpanjakan’ny tany dia hitondra ny voninahiny ho ao anatiny. '
  '25':
  - type: text
    content: 'Hisokatra tontolo andro ny vavahadin’ny tanàna, (satria tsy mba hisy alina ao aminy). '
  '26':
  - type: text
    content: 'Ny voninahitra sy ny zava-tsoan’ny firenena rehetra dia hoentina ho ao anatiny; '
  '27':
  - type: text
    content: 'ary tsy mba hiditra ao mihitsy ny zavatra '
  - type: text
    content: maloto
  - type: text
    content: ' na ny olona mpanazimbazimba na ny mpandainga; fa ny hany miditra ao dia ireo olona voasoratra anarana anatin’ilay horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay: io horonamboky io dia teo am-pelatanan’ny Zanakondry'
  - type: note
    content: 'And 23-27: ampit Is 60.19-20; 60.3-5; 60.11; 52.1; Ezek 44.9.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ary nisy feo mahery reko avy teo amin’ilay sezafiandrianana ka nanao hoe: «Indro ny fonenan’Andriamanitra tonga eny amin’ny olona, ary Andriamanitra dia hiara-monina aminy; ka izy ireo ho '
  - type: text
    content: vahoakany
  - type: text
    content: ', ary ilay Andriamanitra miaraka aminy kosa ho Andriamanitr’izy ireo. '
  '4':
  - type: text
    content: Hofafan’Andriamanitra ny ranomaso rehetra amin’ny mason’ireo vahoakany; ary tsy hisy fahafatesana intsony, sady tsy hisy alahelo na fitarainana na fahoriana intsony, fa efa lasa ny zavatra taloha
  - type: note
    content: 'And 1-4: ampit Is 65.17; 66.22; 51.1; 61.10; Ezek 37.27; Lev 26.11-12; Is 25.8; 35.10; 65.19.'
  - type: text
    content: .»
  '5':
  - type: text
    content: 'Dia hoy Ilay mipetraka eo ambony sezafiandrianana hoe: «Indro havaoziko ny zavatra rehetra!» Avy eo Izy no niteny tamiko hoe:'
  - type: text
    content: –Soraty, satria azo antoka sy marim-pototra ireo teny ireo.
  '6':
  - type: text
    content: 'Dia hoy indray Izy tamiko:'
  - type: text
    content: –Tanteraka ny zavatra rehetra! Izaho no Alfa sy Ômega, fiandohana sy fiafarana. Izay mangetaheta dia hampisotroiko maimaimpoana amin’ny loharano miboiboika ranovelona
  - type: note
    content: 'Ampit Is 55.1. –Alfa sy Ômega: jereo 1.8 sy nta.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Izay mandresy no hahazo izany lova izany; ka dia ho Andriamaniny Aho, ary izy ho zanako
  - type: note
    content: Ampit 2 Sam 7.14; Sal 89.27-28.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Fa ny kanosa, ny tsy mpino, ny mpanimbazimba, ny mpamono olona, ny mpijangajanga, ny mpanao ody ratsy, ny mpanompo sampy ary ny mpandainga rehetra, dia hanana ny anjarany any amin’ny farihy mirehitra afo aman-tsolifara: izany no fahafatesana faharoa.'
  - type: heading
    content: Ilay Jerosalema vaovao
  '9':
  - type: text
    content: 'Ary tonga ny anankiray tamin’ireo '
  - type: text
    content: anjely
  - type: text
    content: ' fito izay nitondra lovia fito feno ny loza fito farany, ka nilaza tamiko hoe:'
  - type: text
    content: –Avia, fa hasehoko anao ilay ampakarina, dia ny vadin’ny Zanakondry!
