verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Habakabaka vaovao sy tany vaovao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nahita habakabaka vaovao sy tany vaovao aho; fa efa lasa ny habakabaka voalohany sy tany voalohany, ary ny ranomasina dia tsy misy intsony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia nahazo tsindrimandry avy amin’ny Fanahy Masina aho ka nentin’ny anjely tany amin’ity tendrombohitra sady lehibe no avo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Ezek 40.2.
      marker-yv: yv-n
    - type: text
      text: ', ary nasehony ahy ny tanàna masina avy tamin’Andriamanitra, dia i Jerosalema nidina avy any an-danitra '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: sady heniky ny voninahitr’Andriamanitra. Ny famirapiratan’ilay tanàna masina dia tahaka ny an’ny vato sarobidy tokoa, dia ny vatosoa jaspa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'jaspa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vatosoa miloko maitso sy fotsy mitsoriadriaka.
      marker-yv: yv-n
    - type: text
      text: ' miendrika kristaly manganohano. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nanana manda matevina sady avo izy, ary koa nanana vavahady 12; ka tamin’ireo vavahady ireo dia nisy anjely 12 sady nisy anarana voasoratra, dia ny anaran’ny foko 12 amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israelita
    - type: text
      text: ': '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: vavahady telo eo atsinanana, vavahady telo eo avaratra, vavahady telo eo atsimo, vavahady telo eo andrefana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 12-13:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Ezek 48.30-35.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nisy vatofanorenana 12 ny mandan’ilay tanàna; ka tamin’ireo vatofanorenana ireo dia nisy anarana 12, dia ny anaran’izy 12 lahy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôli
    - type: text
      text: n’ny Zanakondry.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ilay anjely niteny tamiko dia nanana volotara volamena fandrefesana, mba handrefesana ny tanàna sy ny vavahadiny ary ny màndany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Ezek 40.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Miendrika efamira ny tanàna, ka mitovy refy ny lafiny rehetra. Dia nandrefy ny tanàna tamin’ny volotara ilay anjely, ka samy 12 000 stàdy avy ny lafiny efatra sy ny haavony; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ary norefesiny koa ny màndany, ka 144 hakiho ny hateviny araka ny refy mahazatra ny olona, izay refy nampiasain’ny anjely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 16-17:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'marihina fa ireo tarehimarika 12 000 sy 144 000 ireo dia samy zanaky ny tarehimarika 12 ka mety mifono hevitra an’ohatra: araka izany, ireo tarehimarika ireo dia natao hilazana fa lavorary sy tonga lafatra tokoa ny tanàna masina; manambara ny vahoaka Israely koa ny isa 12. Ny '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: stàdy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' anankiray dia refy mahatratra 185 metatra ary ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: hakiho
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' anankiray dia antsasa-metatra, kanefa tsy izany loatra no tsindriana eto.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Vatosoa jaspa no nanaovana izany manda izany; ary ny tanàna dia tena volamena madio toy ny fitaratra madio. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ireo vato fanorenana ny mandan’ny tanàna kosa dia voaravaka vatosoa isan-karazany: vato jaspa ny fanorenana voalohany, vato safira ny faharoa, vato kalsedoanina ny fahatelo, vato emeralda ny fahefatra, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hitako nidina avy any an-danitra ny tanàna masina avy tamin’Andriamanitra, dia i Jerosalema vaovao, voaomana tahaka ny ampakarina voahaingo hihaona amin’ny vadiny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'vato sardôniksa ny fahadimy, vato sardoanina ny fahenina, vato krizôlita ny fahafito, vato berila ny fahavalo, vato tôpaza ny fahasivy, vato krizôpraso ny fahafolo, vato hiasinta ny faha-11, ary vato ametista ny faha-12. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny vavahady 12 dia perla 12, fa perla vongana iray ihany no nanaovana ny isam-bavahady; ary ny lalamben’ny tanàna dia tena volamena madio toy ny fitaratra manganohano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.21 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 18-21:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Is 54.11-12. –Ny and 19-20 dia mitanisa vatosoa 12 karazana.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tsy nahita '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' tao amin’ilay tanàna aho, satria ny Tompo Andriamanitra Tsitoha sy ny Zanakondry no tempoliny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ny tanàna tsy mba mila ny masoandro na ny volana hamirapiratra ao aminy: fa ny voninahitr’Andriamanitra no efa manazava azy, ary ny Zanakondry no jiro manilo azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Handeha amin’ny fahazavàn’ilay tanàna ny firenena rehetra: ary ny mpanjakan’ny tany dia hitondra ny voninahiny ho ao anatiny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hisokatra tontolo andro ny vavahadin’ny tanàna, (satria tsy mba hisy alina ao aminy). '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny voninahitra sy ny zava-tsoan’ny firenena rehetra dia hoentina ho ao anatiny; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'ary tsy mba hiditra ao mihitsy ny zavatra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' na ny olona mpanazimbazimba na ny mpandainga; fa ny hany miditra ao dia ireo olona voasoratra anarana anatin’ilay horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay: io horonamboky io dia teo am-pelatanan’ny Zanakondry'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.27 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 23-27:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Is 60.19-20; 60.3-5; 60.11; 52.1; Ezek 44.9.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nisy feo mahery reko avy teo amin’ilay sezafiandrianana ka nanao hoe: «Indro ny fonenan’Andriamanitra tonga eny amin’ny olona, ary Andriamanitra dia hiara-monina aminy; ka izy ireo ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakany
    - type: text
      text: ', ary ilay Andriamanitra miaraka aminy kosa ho Andriamanitr’izy ireo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hofafan’Andriamanitra ny ranomaso rehetra amin’ny mason’ireo vahoakany; ary tsy hisy fahafatesana intsony, sady tsy hisy alahelo na fitarainana na fahoriana intsony, fa efa lasa ny zavatra taloha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 1-4: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Is 65.17; 66.22; 51.1; 61.10; Ezek 37.27; Lev 26.11-12; Is 25.8; 35.10; 65.19.
      marker-yv: yv-n
    - type: text
      text: .»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy Ilay mipetraka eo ambony sezafiandrianana hoe: «Indro havaoziko ny zavatra rehetra!» Avy eo Izy no niteny tamiko hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Soraty, satria azo antoka sy marim-pototra ireo teny ireo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy indray Izy tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tanteraka ny zavatra rehetra! Izaho no Alfa sy Ômega, fiandohana sy fiafarana. Izay mangetaheta dia hampisotroiko maimaimpoana amin’ny loharano miboiboika ranovelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 55.1. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Alfa sy Ômega:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 1.8 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Izay mandresy no hahazo izany lova izany; ka dia ho Andriamaniny Aho, ary izy ho zanako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2 Sam 7.14; Sal 89.27-28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ny kanosa, ny tsy mpino, ny mpanimbazimba, ny mpamono olona, ny mpijangajanga, ny mpanao ody ratsy, ny mpanompo sampy ary ny mpandainga rehetra, dia hanana ny anjarany any amin’ny farihy mirehitra afo aman-tsolifara: izany no fahafatesana faharoa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay Jerosalema vaovao
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary tonga ny anankiray tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' fito izay nitondra lovia fito feno ny loza fito farany, ka nilaza tamiko hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avia, fa hasehoko anao ilay ampakarina, dia ny vadin’ny Zanakondry!
