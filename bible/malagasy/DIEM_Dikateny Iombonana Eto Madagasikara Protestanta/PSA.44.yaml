document_id: PSA.44,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Kinanjo Ianao nanary anay...
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '; '
  - type: text
    content: tononkalo fananarana nataon’ireo terak’i Kôra
  - type: note
    content: 'terak’i Kôra: jereo Sal 42.1 sy nta.'
  - type: text
    content: .
  '10':
  - type: text
    content: Kinanjo Ianao nanary sy nanafo-kenatra anay,
  - type: text
    content: tsy mandeha miaraka amin’ny tafikay intsony.
  '11':
  - type: text
    content: Izahay ataonao mihemotra
  - type: text
    content: eo anoloan’ny fahavalonay
  - type: text
    content: sy famabon’ny mpankahala anay;
  '12':
  - type: text
    content: atolotrao azy toa ondry hatao sakafo izahay
  - type: text
    content: sy aelinao any amin’ny firenen-kafa.
  '13':
  - type: text
    content: Ny vahoakanao ataonao varo-boba
  - type: text
    content: ka tsy ahazoanao tombony velively.
  '14':
  - type: text
    content: Izahay ataonao fandatsan’ny vahoaka hafa
  - type: text
    content: izay mpifanila aminay,
  - type: text
    content: zary fanakora sy faneso
  - type: text
    content: ho an’ireo firenena manodidina anay;
  '15':
  - type: text
    content: ambentin-dresak’ireo firenen-kafa
  - type: text
    content: sy mampihifikifi-doha an’ireo vahoakany
  - type: note
    content: Jereo Sal 22.8.
  - type: text
    content: .
  '16':
  - type: text
    content: Eo anoloako mandrakariva ny fahafaham-baràkako
  - type: text
    content: ary manarona ahy ny fangaihaizako,
  '17':
  - type: text
    content: vokatry ny fandatsana sy ny fanarabiana
  - type: text
    content: avy amin’ireo fahavalo sy mpisompatra.
  '18':
  - type: text
    content: Mihatra aminay izany rehetra izany,
  - type: text
    content: na dia tsy nohadinoinay aza Ianao
  - type: text
    content: ary na tsy nivadihanay akory aza
  - type: text
    content: 'ilay '
  - type: text
    content: fanekempihavananao
  - type: text
    content: ' taminay.'
  '19':
  - type: text
    content: Tsy nihemotra hianòtra ny fonay,
  - type: text
    content: tsy niala tamin’ny lalanao ny dianay,
  '2':
  - type: text
    content: Andriamanitra ô, ny sofinay no nandre
  - type: text
    content: ny razanay no nitantara taminay
  - type: text
    content: ireo zava-bitanao fahiny
  - type: text
    content: tamin’ny andro fahavelony.
  '20':
  - type: text
    content: nefa izahay asesikao atỳ an-toeram-bibidia
  - type: note
    content: Jereo Jer 9.10; 10.22; 49.33; 51.37.
  - type: text
    content: sady saronanao amin’ny haizina mikitroka.
  '21':
  - type: text
    content: Raha nanadino Anao Andriamanitray izahay
  - type: text
    content: na nananty tanana tamin’andriamani-kafa,
  '22':
  - type: text
    content: tsy ho tsinjonao ve izany, Andriamanitra ô,
  - type: text
    content: Ianao ilay mahalala ny tsiambaratelon’ny fo?
  '23':
  - type: text
    content: Eny, noho ny aminao
  - type: text
    content: no amonoana anay mandrakariva
  - type: text
    content: sy iheverana anay
  - type: text
    content: ho toy ny ondry fanjedaka
  - type: note
    content: And tsiahivina ao amin’ny Rm 8.36.
  - type: text
    content: .
  '24':
  - type: text
    content: Mifohaza, Tompo ô! Nahoana Ianao no matory?
  - type: text
    content: Miarena Ianao fa aza manary mandrakizay.
  '25':
  - type: text
    content: Ahoana Ianao no tsy te hanatrika anay
  - type: text
    content: ary manadino ny fahorianay sy ny famoretana anay,
  '26':
  - type: text
    content: kanefa mihohoka amin’ny tany izahay
  - type: text
    content: sady mifetaka amin’ny tany ny kibonay?
  '27':
  - type: text
    content: Koa midira an-tsehatra hamonjy anay,
  - type: text
    content: avoty izahay noho ny fitiavanao.
  '3':
  - type: text
    content: Norobainao ireo firenen-kafa
  - type: text
    content: mba hamponenana ny firenenay;
  - type: text
    content: nampahorînao ireo vahoakany
  - type: text
    content: mba hanomezan-toerana ny vahoakanao.
  '4':
  - type: text
    content: Ny nahazoan’ny razanay ity tany ity
  - type: text
    content: dia tsy ny sabatra nananany;
  - type: text
    content: ny nahazoany fandresena
  - type: text
    content: dia tsy ny heriny velively,
  - type: text
    content: fa ny herinao nirotsaka an-tsehatra
  - type: text
    content: sy ny fanatrehanao azy amim-pitiavana.
  '5':
  - type: text
    content: Ianao tokoa, ry Andriamanitra Mpanjakako,
  - type: text
    content: no manome fandresena an’i Jakôba vahoakanao.
  '6':
  - type: text
    content: Ianao no anosehanay ny fahavalonay;
  - type: text
    content: ny anaranao no anitsakitsahanay ny mpamely anay
  - type: note
    content: Jereo Sal 18.39 sy nta ny amin’ny fahavalo voahitsakitsaka.
  - type: text
    content: .
  '7':
  - type: text
    content: Tsy ny tsipîkako no itokiako,
  - type: text
    content: tsy ny sabatro no andreseko;
  '8':
  - type: text
    content: fa Ianao no mamonjy anay amin’ny fahavalonay
  - type: text
    content: sy manafo-kenatra ny mpankahala anay.
  '9':
  - type: text
    content: Ianao Andriamanitra no ankalazainay mandrakariva
  - type: text
    content: 'ary ny '
  - type: text
    content: voninahitrao
  - type: text
    content: ' no derainay mandrakizay.'
  - type: text
    content: Fiatoana
