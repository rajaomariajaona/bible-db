document_id: ISA.57
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Levona ny olo-marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy miraharaha izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alaina an-keriny ny olom-banona
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy miraika amin’izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny famelezan’ny mpisompatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no akàna an-keriny ny olo-marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nefa ho tonga ny fandriampahalemana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatory milamina eo am-pandriany avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mizotra amin’ny hitsiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanakianana ny vahoaka manompo sampy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ianareo kosa manatòna eto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry zanaky ny mpamosavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: taranaky ny lehilahy mpanitsakitsa-bady
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny vehivavy janga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Hôs 2.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza moa no esoesoinareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no isanasananareo vava
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy itrangatranganareo lela?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ianareo ve no zanaka mpikomy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy taranaka mpandainga?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Maimay erỳ ianareo teny akaikin’ny hazo terebinta
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny hazo rehetra matevin-dravina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eo amin’ny and 5.8 ny mpaminany dia milaza ny fanompoam-pivavahana momba ny fahavokarana, izay toherina koa ao amin’ny Is 1.29; Jer 2.20; Ezek 6.13 sns.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanao sorona zaza ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: teny amoron’ny lohasahan-driaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy teny an-tsefatsefaky ny harambato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa ny vatokilonjy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'vatokilonjy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: angamba endri-javatra mampahatsiaro ny taovam-pananahana maha lehilahy izany eo amin’ny fanompoam-pivavahana momba ny fahavokarana; jereo ny naoty farany teo.
    marker-yv: yv-n
  - type: text
    text: ' eny amin’ny lohasahan-driaka'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no indreo zavatra ifikiranao, ry Israely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ireny tokoa no zavatra ifikiranao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ireny no andrarahanao fanatitra divay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy anoloranao fanatitra hohanina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia hahatsindry fo ve Izaho Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izany toe-javatra izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Teny an-tendrombohitra avo manerinerina
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nametrahanao ny fandrianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: teny koa no niakaranao hanolotra sorona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tao ambadiky ny tolàm-baravarana no nametrahanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ody fampahatsiarovana anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lavitra Ahy kosa no nitanjahanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy niakaranao hankeo am-pandrianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanalalahanao ny toerana teo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nividy sakaiza maro ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka finaritra matory miaraka aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nobanjininao ilay rantsam-batany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay rantsam-batany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa fomba fiteny ilazana ny taovam-pananahana maha lehilahy izany.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nivezivezy nankany amin’i Môlôka ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nitondra diloilo sy zava-manitra betsaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandefa solotena hatrany lavitra any ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mova tsy hatrany amin’ny fonenan’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nampietrenao ny tenanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sasatra ianao tamin’ny lalan-davitra nalehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'kanefa tsy loa-bolana hoe: «Kivy aho izany!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahazo hery indray aza ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nahatsiaro reraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa iza no nahînao sy natahoranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no dia namadika Ahy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nahatsiaro Ahy intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nandroaka Ahy tao am-ponao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nangina hatrỳ ny ela Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izany angaha no tsy anajanao Ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kanefa hovakiko bantsilana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fihamboanao ho marina sy ny asanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hahasoa anao akory ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rehefa miantso vonjy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka ireo sampinao no hamonjy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo sampy maro voaangonao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa hopaohin’ny rivotra ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsio-drivotra mihelina dia hahalasa azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mialoka amiko kosa no hanana ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handova ny tendrombohitro masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 56.7 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahasitranan’ny vahoakan’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny TOMPO efa niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ataovy mitovy tantana ny lalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy mitovy tantana ny lalana ka sokafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: esory ny sakantsakana amin’ny lalan’ny vahoakako.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa ankehitriny ilay Avo manerinerina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay mandrakizay ny fonenany sady masina ny anarany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia manao izao teny izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Any amin’ny toerana avo sy masina no onenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa koa ao amin’ny torotoro fo sy manetry tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamelombelona ny fanahin’ireo manetry tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hamelombelona ny fon’ireo torotoro fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa tsy hanakiana lava Aho na ho tezitra hatrany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy izany dia ho faty eo anatrehako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fofonaina mbamin’ny mananaina noariko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fahadisoan’ny vahoakako no nahatezitra Ahy vetivety.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho Izaho tezitra no nikapohako azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy netezako hijery azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa nikomy hatrany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanaraka ny ditran’ny fony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary hitako ny fitondrantenany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Saingy izao no lazaiko: Hanasitrana ny vahoakako Aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitari-dalana sy hampahery azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho an’ireo olony misaona kosa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia horakora-pifaliana no hataoko eo amin’ny molony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hoy AHO hoe: Fiadanana ho an’izay lavitra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fiadanana ho an’izay akaiky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ahitana fitenenana ity andalana ity ao amin’ny Ef 2.17.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hanasitrana ny vahoakako Aho.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ny olon-dratsy kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny ranomasina misamboaravoara
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy afaka mitoetra milamina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mamoaka loto sy fotaka ny ranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Tsy misy fiadanana ho an’ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ilay Andriamanitro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 48.22.
    marker-yv: yv-n
  - type: text
    text: .»
