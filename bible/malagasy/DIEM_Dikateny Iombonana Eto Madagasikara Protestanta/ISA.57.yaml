document_id: ISA.57,396
type_code: plt
verses:
  '1':
  - type: text
    content: Levona ny olo-marina
  - type: text
    content: nefa tsy misy miraharaha izany;
  - type: text
    content: alaina an-keriny ny olom-banona
  - type: text
    content: nefa tsy misy miraika amin’izany.
  - type: text
    content: Eny, ny famelezan’ny mpisompatra
  - type: text
    content: no akàna an-keriny ny olo-marina.
  '10':
  - type: text
    content: Sasatra ianao tamin’ny lalan-davitra nalehanao,
  - type: text
    content: 'kanefa tsy loa-bolana hoe: «Kivy aho izany!»'
  - type: text
    content: Nahazo hery indray aza ianao,
  - type: text
    content: ka tsy nahatsiaro reraka.
  '11':
  - type: text
    content: Fa iza no nahînao sy natahoranao
  - type: text
    content: no dia namadika Ahy ianao,
  - type: text
    content: ka tsy nahatsiaro Ahy intsony
  - type: text
    content: sy nandroaka Ahy tao am-ponao?
  - type: text
    content: Efa nangina hatrỳ ny ela Aho,
  - type: text
    content: ka izany angaha no tsy anajanao Ahy?
  '12':
  - type: text
    content: Kanefa hovakiko bantsilana
  - type: text
    content: ny fihamboanao ho marina sy ny asanao;
  - type: text
    content: ka tsy hahasoa anao akory ireny.
  '13':
  - type: text
    content: Rehefa miantso vonjy ianao,
  - type: text
    content: dia aoka ireo sampinao no hamonjy anao,
  - type: text
    content: dia ireo sampy maro voaangonao.
  - type: text
    content: Kanefa hopaohin’ny rivotra ireny;
  - type: text
    content: tsio-drivotra mihelina dia hahalasa azy!
  - type: text
    content: Fa izay mialoka amiko kosa no hanana ny tany
  - type: text
    content: sy handova ny tendrombohitro masina
  - type: note
    content: Jereo 56.7 sy nta.
  - type: text
    content: .
  - type: heading
    content: Ny fahasitranan’ny vahoakan’Andriamanitra.
  '14':
  - type: text
    content: 'Ny TOMPO efa niteny hoe:'
  - type: text
    content: «Ataovy mitovy tantana ny lalana,
  - type: text
    content: ataovy mitovy tantana ny lalana ka sokafy,
  - type: text
    content: esory ny sakantsakana amin’ny lalan’ny vahoakako.»
  '15':
  - type: text
    content: Fa ankehitriny ilay Avo manerinerina,
  - type: text
    content: ilay mandrakizay ny fonenany sady masina ny anarany,
  - type: text
    content: 'dia manao izao teny izao:'
  - type: text
    content: «Any amin’ny toerana avo sy masina no onenako,
  - type: text
    content: nefa koa ao amin’ny torotoro fo sy manetry tena
  - type: text
    content: mba hamelombelona ny fanahin’ireo manetry tena
  - type: text
    content: sy hamelombelona ny fon’ireo torotoro fo.
  '16':
  - type: text
    content: Fa tsy hanakiana lava Aho na ho tezitra hatrany;
  - type: text
    content: raha tsy izany dia ho faty eo anatrehako
  - type: text
    content: ny fofonaina mbamin’ny mananaina noariko.
  '17':
  - type: text
    content: Ny fahadisoan’ny vahoakako no nahatezitra Ahy vetivety.
  - type: text
    content: Noho Izaho tezitra no nikapohako azy
  - type: text
    content: sady tsy netezako hijery azy.
  - type: text
    content: Nefa nikomy hatrany izy
  - type: text
    content: ka nanaraka ny ditran’ny fony,
  '18':
  - type: text
    content: ary hitako ny fitondrantenany.
  - type: text
    content: 'Saingy izao no lazaiko: Hanasitrana ny vahoakako Aho,'
  - type: text
    content: ka hitari-dalana sy hampahery azy.
  - type: text
    content: Ary ho an’ireo olony misaona kosa,
  '19':
  - type: text
    content: dia horakora-pifaliana no hataoko eo amin’ny molony.
  - type: text
    content: 'Ka hoy AHO hoe: Fiadanana ho an’izay lavitra,'
  - type: text
    content: fiadanana ho an’izay akaiky
  - type: note
    content: Ahitana fitenenana ity andalana ity ao amin’ny Ef 2.17.
  - type: text
    content: '!'
  - type: text
    content: Eny, hanasitrana ny vahoakako Aho.»
  '2':
  - type: text
    content: Nefa ho tonga ny fandriampahalemana,
  - type: text
    content: ka hatory milamina eo am-pandriany avy
  - type: text
    content: izay mizotra amin’ny hitsiny.
  - type: heading
    content: Fanakianana ny vahoaka manompo sampy
  '20':
  - type: text
    content: Fa ny olon-dratsy kosa
  - type: text
    content: dia toy ny ranomasina misamboaravoara
  - type: text
    content: sady tsy afaka mitoetra milamina;
  - type: text
    content: fa mamoaka loto sy fotaka ny ranony.
  '21':
  - type: text
    content: «Tsy misy fiadanana ho an’ny olon-dratsy,
  - type: text
    content: hoy ilay Andriamanitro
  - type: note
    content: Jereo 48.22.
  - type: text
    content: .»
  '3':
  - type: text
    content: Fa ianareo kosa manatòna eto,
  - type: text
    content: ry zanaky ny mpamosavy,
  - type: text
    content: taranaky ny lehilahy mpanitsakitsa-bady
  - type: text
    content: sy ny vehivavy janga
  - type: note
    content: Jereo Hôs 2.4 sy nta.
  - type: text
    content: '!'
  '4':
  - type: text
    content: Iza moa no esoesoinareo?
  - type: text
    content: Iza no isanasananareo vava
  - type: text
    content: sy itrangatranganareo lela?
  - type: text
    content: Tsy ianareo ve no zanaka mpikomy
  - type: text
    content: sy taranaka mpandainga?
  '5':
  - type: text
    content: Maimay erỳ ianareo teny akaikin’ny hazo terebinta
  - type: text
    content: sy ny hazo rehetra matevin-dravina
  - type: note
    content: Eo amin’ny and 5.8 ny mpaminany dia milaza ny fanompoam-pivavahana momba ny fahavokarana, izay toherina koa ao amin’ny Is 1.29; Jer 2.20; Ezek 6.13 sns.
  - type: text
    content: .
  - type: text
    content: Nanao sorona zaza ianareo
  - type: text
    content: teny amoron’ny lohasahan-driaka
  - type: text
    content: sy teny an-tsefatsefaky ny harambato.
  '6':
  - type: text
    content: Koa ny vatokilonjy
  - type: note
    content: 'vatokilonjy: angamba endri-javatra mampahatsiaro ny taovam-pananahana maha lehilahy izany eo amin’ny fanompoam-pivavahana momba ny fahavokarana; jereo ny naoty farany teo.'
  - type: text
    content: ' eny amin’ny lohasahan-driaka'
  - type: text
    content: no indreo zavatra ifikiranao, ry Israely;
  - type: text
    content: eny, ireny tokoa no zavatra ifikiranao!
  - type: text
    content: Fa ireny no andrarahanao fanatitra divay
  - type: text
    content: sy anoloranao fanatitra hohanina;
  - type: text
    content: ka dia hahatsindry fo ve Izaho Tompo
  - type: text
    content: amin’izany toe-javatra izany?
  '7':
  - type: text
    content: Teny an-tendrombohitra avo manerinerina
  - type: text
    content: no nametrahanao ny fandrianao;
  - type: text
    content: teny koa no niakaranao hanolotra sorona.
  '8':
  - type: text
    content: Tao ambadiky ny tolàm-baravarana no nametrahanao
  - type: text
    content: ny ody fampahatsiarovana anao.
  - type: text
    content: Fa lavitra Ahy kosa no nitanjahanao
  - type: text
    content: sy niakaranao hankeo am-pandrianao
  - type: text
    content: ary nanalalahanao ny toerana teo.
  - type: text
    content: Dia nividy sakaiza maro ianao,
  - type: text
    content: ka finaritra matory miaraka aminy;
  - type: text
    content: ary nobanjininao ilay rantsam-batany
  - type: note
    content: 'ilay rantsam-batany: toa fomba fiteny ilazana ny taovam-pananahana maha lehilahy izany.'
  - type: text
    content: .
  '9':
  - type: text
    content: Nivezivezy nankany amin’i Môlôka ianao
  - type: text
    content: ka nitondra diloilo sy zava-manitra betsaka;
  - type: text
    content: nandefa solotena hatrany lavitra any ianao,
  - type: text
    content: ka mova tsy hatrany amin’ny fonenan’ny maty
  - type: text
    content: no nampietrenao ny tenanao.
