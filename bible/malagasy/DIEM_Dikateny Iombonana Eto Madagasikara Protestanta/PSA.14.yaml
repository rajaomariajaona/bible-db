document_id: PSA.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny mpino sy ny Andriamaniny eo anivon’ny
  - type: heading
    content: fahalòvan’izao tontolo izao
  - type: heading
    content: (Jereo Sal 53)
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: 'Adala izay miteny anakampo hoe:'
  - type: text
    content: «Tsy misy Andriamanitra
  - type: note
    content: 'Tsy misy Andriamanitra: jereo Sal 10.4,6,11,13; 36.2; 94.7; Jer 5.12.'
  - type: text
    content: '!»'
  - type: text
    content: Maneho toetra lo sy maharikoriko ireo
  - type: text
    content: sady tsy mba misy manao ny tsara.
  '2':
  - type: text
    content: Avy eny an-danitra eny ny TOMPO
  - type: text
    content: no miondrika hijery ny olombelona,
  - type: text
    content: hizaha sao mba misy olon-kendry
  - type: text
    content: izay mitady Azy tokoa.
  '3':
  - type: text
    content: Fa izy rehetra no mania
  - type: text
    content: ka samy tsy valahara avokoa;
  - type: text
    content: tsy mba misy manao ny tsara,
  - type: text
    content: na dia iray akory aza
  - type: note
    content: 'And 1b-3: jereo Rm 3.10-12.'
  - type: text
    content: '!'
  '4':
  - type: text
    content: 'Hoy kosa ny TOMPO hoe:'
  - type: text
    content: «Tena tsy mahalala mihitsy
  - type: text
    content: ny mpanao ratsy rehetra
  - type: text
    content: fa fitsentsefana ny vahoakako
  - type: text
    content: no ataony foto-pivelomana,
  - type: text
    content: sady Izaho tsy antsoiny akory!»
  '5':
  - type: text
    content: Indreo fa matahotra dia matahotra ireny,
  - type: text
    content: satria ny mpivavaka iandanian’Andriamanitra.
  '6':
  - type: text
    content: «Nataonareo tsinontsinona ny fikasan’ny ory,
  - type: text
    content: kanefa ny TOMPO ange no fialofany.»
  '7':
  - type: text
    content: 'Hivoaka avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' anie'
  - type: text
    content: ny famonjena an’i Israely!
  - type: text
    content: Ka hifaly sy hiravo ny taranak’i Jakôba,
  - type: text
    content: dia ny vahoaka Israely tsivakivolo,
  - type: text
    content: rehefa hambinin’ny TOMPO indray izy
  - type: note
    content: Jereo Sal 126.4.
  - type: text
    content: .
