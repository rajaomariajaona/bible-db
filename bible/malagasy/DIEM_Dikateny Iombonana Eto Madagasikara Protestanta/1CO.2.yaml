      text: 'Raha samy olombelona izao, dia ny fanahin’ny olona ao anatiny ao ihany no mahalala izao ao am-pon’ilay olona; ary toy izany koa, ny Fanahin’Andriamanitra ihany no mahafantatra izay ao am-pon’Andriamanitra. '
