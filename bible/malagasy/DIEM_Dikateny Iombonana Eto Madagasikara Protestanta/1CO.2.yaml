document_id: 1CO.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitory an’i Kristy voahombo teo amin’ny hazofijaliana
  - type: text
    content: Ry havako, fony tonga tany aminareo aho mba hitory ny tsiambaratelo momba amin’Andriamanitra
  - type: note
    content: 'ny tsiambaratelo momba amin’Andriamanitra: misy stf sasany ahitana hoe ny fanambarana momba an’Andriamanitra.'
  - type: text
    content: ', dia tsy nampiasa lahateny marevaka na fahendrena mampitolagaga. '
  '10':
  - type: text
    content: Izahay kosa no nanehoan’Andriamanitra izany tsiambaratelo izany tamin’ny alalan’ny Fanahy Masina. Fa ny Fanahy Masina dia afaka mandinika ny zavatra rehetra, na dia izay lalina indrindra ao amin’Andriamanitra aza
  - type: note
    content: 'kosa: misy stf sasany ahitana hoe manko.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Raha samy olombelona izao, dia ny fanahin’ny olona ao anatiny ao ihany no mahalala izao ao am-pon’ilay olona; ary toy izany koa, ny Fanahin’Andriamanitra ihany no mahafantatra izay ao am-pon’Andriamanitra. '
  '12':
  - type: text
    content: 'Raha izahay, dia tsy nandray ny fanahin’izao tontolo izao fa ny Fanahy avy amin’Andriamanitra, mba hahalalanay ny tombon-tsoa rehetra efa nomen’Andriamanitra anay. '
  '13':
  - type: text
    content: Ary tsy teny ampianarin’ny fahendren’olombelona no itenenanay momba izany, fa teny ampianarin’ny Fanahin’Andriamanitra; ka izay manana io Fanahin’Andriamanitra io
  - type: note
    content: 'izay manana io fanahin’Andriamanitra io: dkt hafa teny avy amin’io Fanahin’Andriamanitra io.'
  - type: text
    content: no anazavanay ny zavatra ampitain’ny Fanahin’Andriamanitra.
  '14':
  - type: text
    content: 'Fa ny olona tsy manana ny Fanahin’Andriamanitra dia tsy mahay mandray ny fanomezana ampitain’izany Fanahy izany; fa ataony ho fahadalana izany, sady tsy hainy fantarina velively, satria ny Fanahin’Andriamanitra ihany no ahafantarana izany. '
  '15':
  - type: text
    content: 'Afaka mitsara ny zavatra rehetra ny olona manana ny Fanahin’Andriamanitra kanefa tsy azon’olona tsaraina. '
  '16':
  - type: text
    content: 'Fa hoy ny Soratra Masina hoe:'
  - type: text
    content: «Iza moa no mahafantatra ny fisainan’ny Tompo,
  - type: text
    content: ka ho afaka hanolo-tsaina Azy
  - type: note
    content: Is 40.13, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: ?»
  - type: text
    content: Fa izahay kosa dia manana ny fisainan’i Kristy!
  '2':
  - type: text
    content: 'Teo aminareo aho dia ninia tsy nahafantatra na inona na inona afa-tsy i Jesoa Kristy, indrindra fa Izy voahombo teo amin’ny hazofijaliana. '
  '3':
  - type: text
    content: Izany no nahatonga ahy ho osa sy natahotra ary nangovitra teo anoloanareo
  - type: note
    content: Ampit Asa 18.9.
  - type: text
    content: '; '
  '4':
  - type: text
    content: 'ny fampianarako sy ny toriteniko dia tsy tamin’ny lahateny mampiaiky volana araka ny fahendren’olombelona, fa tamin’ny fandresen-dahatra araka ny herin’ny Fanahy Masina. '
  '5':
  - type: text
    content: Ka dia tsy fahendren’olombelona fa herin’Andriamanitra no iorenan’ny finoanareo.
  - type: heading
    content: Ilay fahendren’Andriamanitra
  '6':
  - type: text
    content: Fahendrena no torînay amin’ny kristianina efa matotra ara-panahy. Saingy tsy ilay fahendren’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' na ny an’ireo mpifehy an’izao tontolo izao, izay olona voalahatra ho ringana. '
  '7':
  - type: text
    content: 'Fa ny torînay kosa dia fahendrena miafina ao amin’Andriamanitra: fahendrena izay takona amin’ny olombelona, kanefa voatendrin’Andriamanitra talohan’ny nisian’izao tontolo izao mba hahazoantsika voninahitra. '
  '8':
  - type: text
    content: 'Tsy nisy nahafantatra izany fahendrena izany ireo mpifehy an’izao tontolo izao; satria raha mba nahafantatra izany izy ireo, dia tsy ho nampanombo ny Tompo be voninahitra teo amin’ny hazofijaliana. '
  '9':
  - type: text
    content: 'Saingy izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Zavatra tsy mbola hitan’olona maso na ren’ny sofiny
  - type: text
    content: na tafiditra tao am-pony akory,
  - type: text
    content: no efa nomanin’Andriamanitra ho an’izay tia Azy
  - type: note
    content: Jereo Is 64.3; 52.15.
  - type: text
    content: .»
