    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Vao miantomboka ity bokin’i
    - type: text
      text: ' Kôheleta '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ity, dia ahitana taratra ny maha olon-kendry an’ilay mpanoratra azy. Nefa hafa noho ireo olon-kendry voalazan’ny bokin’ny Ohabolana izy, satria fahendrena tsy nentim-paharazana no ampitainy amintsika mpamaky. Ireo zavatra maro niainany manko no nahatsapany fa mora simba ny fahasambarana ary zava-poana matetika ny fisasaran’ny olona hahazo izany. Dia manontany tena izy raha toa ka misy dikany izao fiainana izao ary koa raha mendrika ny hiainana izany. Manery ny mpamaky koa ny mpanoratra hametraka izany fanontaniana izany tahaka azy. Tahaka ny ao amin’ny bokin’i Jôba, ireo valim-panontaniana mora loatra dia naverina nohadihadîna saingy ny lafiny asiana tsindrim-peo kosa no misy fahasamihafana. Raha toherin’i Jôba ho olana tsy ahitam-baliny mihitsy ny fahorian’ny olombelona, ilay olon-kendrin’ny bokin’i Kôheleta kosa mampiseho ny fisalasalàny momba ny fahasambaran’ny olombelona.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Toy ny karazam-pikarohana momba ny zava-misy eto an-tany ny bokin’i
    - type: text
      text: ' Kôheleta. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny fanizingizinana fa mandalo sady tsy azo antoka ireo fifaliana sy fiezahan’ny olombelona (fahatanorana, harena, voninahitra, asa, fahendrena, fahamarinana) dia miverimberina matetika ao. Noho ny olona mandry an-driran’antsy satria loza mitatao aminy hatrany ny fahafatesana sy ny tsy fahamarinana manjaka eo amin’ny mpiara-monina, noho izy tsy afaka mamantatra ny fandaharan’Andriamanitra ho an’izao tontolo izao, dia tonga marefo sy saro-pantarina ny hoaviny. Izany tomban-javatra miiba izany no mitarika fisainana maro ny amin’izay fitondrantena azo ampiharina eo amin’ny fiainana.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny rijan-tenin’ny Baiboly, ankoatra ity bokin’i Kôheleta ity, dia manome valiny hafa momba ireo fanontaniana tomorin’ny olon-kendry eto. Tsara anefa ny mahita ao anatin’ireto toko ireto ny akon’ny fahakiviantsika sy ny fisalasalàntsika. Tsara koa raha ampahatsiarovin’ny mpanoratra amintsika fa tsy misy finoana marina an’Andriamanitra raha tsy misy fomba fijery mazava momba ny rafi-piainana maha olombelona.
