document_id: JOS.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Naka an’i Jerikao ny Israelita
  - type: text
    content: 'Tamin’izay ny vavahadin’i Jerikao dia nihidy mafy tokoa teo anoloan’ny Israelita, ka tsy nisy olona afa-nivoaka ny tanàna ary tsy nisy afa-niditra. '
  '10':
  - type: text
    content: 'Ary Josoa efa nandidy ny vahoaka hoe: «Aza manakora na manao izay andrenesam-peo na mamoaka teny akory aza; fa amin’ny andro hilazako aminareo hoe manaova akoran’ady, vao hanao akoran’ady ianareo». '
  '11':
  - type: text
    content: Dia nentina nanodidina ny tanàna indray mandeha ny Vatamasin’ny TOMPO; ary niverina tany an-toby ny Israelita ka nandry tao.
  '12':
  - type: text
    content: 'Nifoha vao maraina be i Josoa ny ampitso ary nolanjain’ny mpisorona indray ny Vatamasin’ny TOMPO. '
  '13':
  - type: text
    content: 'Ny mpisorona fito mpitondra trompetra no nandroso sady nitsoka trompetra teo alohan’ny Vatamasina. Ny andian-tafika mpamaky lay nialoha ireo mpisorona ireo ary ny vodilalana kosa nanaraka ny Vatamasina. Teny am-pandehanana dia notsofina hatrany ny trompetra. '
  '14':
  - type: text
    content: 'Tamin’io andro faharoa io dia nanodidina ny tanàna indray mandeha koa ry zareo, vao niverina tany an-toby. Enina andro no nanaovany toy izany. '
  '15':
  - type: text
    content: 'Fa tamin’ny andro fahafito dia nifoha mbola maizimaizina ny Israelita ka nanodidina ny tanàna toy ny fanaony, saingy impito misesy; tamin’izany andro izany ihany anefa ry zareo no nanodidina ny tanàna impito misesy. '
  '16':
  - type: text
    content: 'Ary tamin’ny fihodinana fahafito, rehefa nampaneno ny trompetra ireo mpisorona, dia hoy i Josoa tamin’ny vahoaka:'
  - type: text
    content: '–Manaova akoran’ady fa efa natolotry ny TOMPO anareo ny tanàna! '
  '17':
  - type: text
    content: 'Ary ny tanàna mbamin’izay rehetra ao aminy dia haringana hafoy ho an’ny TOMPO. Fa i Rahaba mpivaro-tena sy izay rehetra miaraka aminy ao an-tranony ihany no avelao ho velona, satria ravehivavy io no nanafina ireo mpitsikilontsika. '
  '18':
  - type: text
    content: Kanefa mitandrema ianareo fandrao hitsiriritra ireo zavatra haringana hafoy ho an’ny Tompo ka maka amin’ireo, fa hitondra loza sy fandravana ho an’ny tobin’i Israely ianareo
  - type: note
    content: Raha misy Israelita iray naka izay efa voatokana mialoha ho an’ny Tompo, dia mihantsy ny fahatezeran’ny Tompo hamely ny vahoaka manontolo (jereo 7.1-26).
  - type: text
    content: '. '
  '19':
  - type: text
    content: Ny volafotsy sy volamena rehetra ary ny fanaka rehetra halimo sy vy dia hatokana ho Azy TOMPO ka haiditra ao amin’ny firaketan’ny TOMPO.
  '2':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Josoa:'
  - type: text
    content: '–Indro fa atolotro eo an-tananao i Jerikao sy ny mpanjakany ary ny maherifony. '
  '20':
  - type: text
    content: 'Dia nitsoka trompetra ny mpisorona. Ka raha vao nandre ny feon-trompetra ny vahoaka, dia nanezaka mafy nanao akoran’ady; koa nirodana tamin’izay ny manda. Dia niakatra hamely tao an-tanàna samy araka ny tandrifiny avy ny Israelita ka naka ny tanàna. '
  '21':
  - type: text
    content: Ary naringany tamin’ny sabatra avokoa ny mponina rehetra tao na lehilahy na vehivavy na antitra na tanora, mbamin’ny omby sy ny ondry aman’osy ary ny boriky.
  - type: heading
    content: Avelan’i Josoa ho velona i Rahaba
  '22':
  - type: text
    content: 'Ary hoy i Josoa tamin’ireo roa lahy nisafo ny tany:'
  - type: text
    content: –Mankanesa any an-tranon’i Rahaba mpivaro-tena, ka avoahy tao izy sy ny havany rehetra araka izay efa nianiananareo taminy.
  '23':
  - type: text
    content: 'Dia nandeha tany izy roa lahy ka namoaka an’i Rahaba sy ny ray aman-dreniny ary ny mpiray tampo aminy sy ireo havany sisa rehetra; ary toerana azo antoka teo ivelan’ilay tobin’ny Israelita no nametrahany azy. '
  '24':
  - type: text
    content: Vita izay, dia nodorana tamin’ny afo ny tanàna mbamin’izay rehetra tao aminy, afa-tsy ny volafotsy sy volamena ary ny fanaka halimo sy vy izay napetraka ho rakitra tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '. '
  '25':
  - type: text
    content: Fa i Rahaba mpivaro-tena mbamin’ny fianakaviany manontolo kosa dia novelomin’i Josoa noho ny nanafenan-dravehivavy an’ireo mpitsikilo izay nalefany tany Jerikao. Nonina teo anivon’ny Israelita i Rahaba ary mbola ao mandraka androany ny taranany.
  '26':
  - type: text
    content: 'Tamin’izany fotoana izany koa dia nanambara izao fampitandremana momba an’i Jerikao izao i Josoa nanao hoe:'
  - type: text
    content: «Ho voaozona eo anatrehan’ny TOMPO anie
  - type: text
    content: izay olona mitsangana hanamboatra an’ity tanàna ity
  - type: text
    content: ka ny ain’ny lahimatoany no ho sandan’ny hanorenany ny fototra
  - type: text
    content: ary ny ain’ny faralahiny no ho sandan’ny hananganany ny vavahady
  - type: note
    content: Jereo 1 Mp 16.34.
  - type: text
    content: '!»'
  '27':
  - type: text
    content: Ary nombàn’ny TOMPO i Josoa ka niely laza eran’ny tany izany.
  '3':
  - type: text
    content: 'Koa mandehana manodidina ny tanàna indray mandeha isan’andro ianao sy ny mpiantafikao rehetra; mandritra ny enina andro no hanaovanao izany '
  '4':
  - type: text
    content: 'ka mpisorona fito samy mitondra trompetra iray avy no hialoha ny '
  - type: text
    content: Vatamasina
  - type: text
    content: '. Amin’ny andro fahafito dia hodidino impito ny tanàna, ary mandritra izany aoka ny mpisorona hitsoka ny trompetrany. '
  '5':
  - type: text
    content: Rehefa re manao feo lavareny ny trompetra, dia hanakora mafy ny vahoaka rehetra ka hirodana amin’izay ny mandan’ny tanàna; ary hiakatra hamely samy araka ny tandrifiny avy ny Israelita.
  '6':
  - type: text
    content: 'Dia niantso ny mpisorona i Josoa zanakalahin’i Nona ka nanao taminy hoe:'
  - type: text
    content: –Entonareo ilay Vatamasina mirakitra ny fanekempihavanan’ny TOMPO, ary aoka hisy mpisorona fito mitondra trompetra eo alohany.
  '7':
  - type: text
    content: Avy teo dia nanome baiko ny vahoaka i Josoa mba hanodidina ny tanàna, ka ny andian-tafika mpamaky lay no handeha mialoha ireo mpisorona fito mitondra trompetra eo alohan’ilay Vatamasin’ny TOMPO.
  '8':
  - type: text
    content: 'Dia araka izay baiko nomen’i Josoa no fizotran-javatra. Ny mpisorona fito mitondra trompetra no nandroso sady nitsoka trompetra teo alohan’ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO. '
  '9':
  - type: text
    content: 'Ny andian-tafika mpamaky lay no nialoha ireo mpisorona ireo ary ny vodilalana kosa nanaraka ny Vatamasina. Teny am-pandehanana, dia notsofina hatrany ny trompetra. '
