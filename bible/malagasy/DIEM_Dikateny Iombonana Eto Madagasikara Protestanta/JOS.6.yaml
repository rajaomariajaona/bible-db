document_id: JOS.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naka an’i Jerikao ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izay ny vavahadin’i Jerikao dia nihidy mafy tokoa teo anoloan’ny Israelita, ka tsy nisy olona afa-nivoaka ny tanàna ary tsy nisy afa-niditra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Josoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro fa atolotro eo an-tananao i Jerikao sy ny mpanjakany ary ny maherifony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa mandehana manodidina ny tanàna indray mandeha isan’andro ianao sy ny mpiantafikao rehetra; mandritra ny enina andro no hanaovanao izany '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka mpisorona fito samy mitondra trompetra iray avy no hialoha ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: '. Amin’ny andro fahafito dia hodidino impito ny tanàna, ary mandritra izany aoka ny mpisorona hitsoka ny trompetrany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa re manao feo lavareny ny trompetra, dia hanakora mafy ny vahoaka rehetra ka hirodana amin’izay ny mandan’ny tanàna; ary hiakatra hamely samy araka ny tandrifiny avy ny Israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niantso ny mpisorona i Josoa zanakalahin’i Nona ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Entonareo ilay Vatamasina mirakitra ny fanekempihavanan’ny TOMPO, ary aoka hisy mpisorona fito mitondra trompetra eo alohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avy teo dia nanome baiko ny vahoaka i Josoa mba hanodidina ny tanàna, ka ny andian-tafika mpamaky lay no handeha mialoha ireo mpisorona fito mitondra trompetra eo alohan’ilay Vatamasin’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia araka izay baiko nomen’i Josoa no fizotran-javatra. Ny mpisorona fito mitondra trompetra no nandroso sady nitsoka trompetra teo alohan’ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny andian-tafika mpamaky lay no nialoha ireo mpisorona ireo ary ny vodilalana kosa nanaraka ny Vatamasina. Teny am-pandehanana, dia notsofina hatrany ny trompetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Josoa efa nandidy ny vahoaka hoe: «Aza manakora na manao izay andrenesam-peo na mamoaka teny akory aza; fa amin’ny andro hilazako aminareo hoe manaova akoran’ady, vao hanao akoran’ady ianareo». '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nentina nanodidina ny tanàna indray mandeha ny Vatamasin’ny TOMPO; ary niverina tany an-toby ny Israelita ka nandry tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nifoha vao maraina be i Josoa ny ampitso ary nolanjain’ny mpisorona indray ny Vatamasin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny mpisorona fito mpitondra trompetra no nandroso sady nitsoka trompetra teo alohan’ny Vatamasina. Ny andian-tafika mpamaky lay nialoha ireo mpisorona ireo ary ny vodilalana kosa nanaraka ny Vatamasina. Teny am-pandehanana dia notsofina hatrany ny trompetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tamin’io andro faharoa io dia nanodidina ny tanàna indray mandeha koa ry zareo, vao niverina tany an-toby. Enina andro no nanaovany toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa tamin’ny andro fahafito dia nifoha mbola maizimaizina ny Israelita ka nanodidina ny tanàna toy ny fanaony, saingy impito misesy; tamin’izany andro izany ihany anefa ry zareo no nanodidina ny tanàna impito misesy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tamin’ny fihodinana fahafito, rehefa nampaneno ny trompetra ireo mpisorona, dia hoy i Josoa tamin’ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Manaova akoran’ady fa efa natolotry ny TOMPO anareo ny tanàna! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny tanàna mbamin’izay rehetra ao aminy dia haringana hafoy ho an’ny TOMPO. Fa i Rahaba mpivaro-tena sy izay rehetra miaraka aminy ao an-tranony ihany no avelao ho velona, satria ravehivavy io no nanafina ireo mpitsikilontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Kanefa mitandrema ianareo fandrao hitsiriritra ireo zavatra haringana hafoy ho an’ny Tompo ka maka amin’ireo, fa hitondra loza sy fandravana ho an’ny tobin’i Israely ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Raha misy Israelita iray naka izay efa voatokana mialoha ho an’ny Tompo, dia mihantsy ny fahatezeran’ny Tompo hamely ny vahoaka manontolo (jereo 7.1-26).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny volafotsy sy volamena rehetra ary ny fanaka rehetra halimo sy vy dia hatokana ho Azy TOMPO ka haiditra ao amin’ny firaketan’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nitsoka trompetra ny mpisorona. Ka raha vao nandre ny feon-trompetra ny vahoaka, dia nanezaka mafy nanao akoran’ady; koa nirodana tamin’izay ny manda. Dia niakatra hamely tao an-tanàna samy araka ny tandrifiny avy ny Israelita ka naka ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary naringany tamin’ny sabatra avokoa ny mponina rehetra tao na lehilahy na vehivavy na antitra na tanora, mbamin’ny omby sy ny ondry aman’osy ary ny boriky.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avelan’i Josoa ho velona i Rahaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy i Josoa tamin’ireo roa lahy nisafo ny tany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mankanesa any an-tranon’i Rahaba mpivaro-tena, ka avoahy tao izy sy ny havany rehetra araka izay efa nianiananareo taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nandeha tany izy roa lahy ka namoaka an’i Rahaba sy ny ray aman-dreniny ary ny mpiray tampo aminy sy ireo havany sisa rehetra; ary toerana azo antoka teo ivelan’ilay tobin’ny Israelita no nametrahany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Vita izay, dia nodorana tamin’ny afo ny tanàna mbamin’izay rehetra tao aminy, afa-tsy ny volafotsy sy volamena ary ny fanaka halimo sy vy izay napetraka ho rakitra tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa i Rahaba mpivaro-tena mbamin’ny fianakaviany manontolo kosa dia novelomin’i Josoa noho ny nanafenan-dravehivavy an’ireo mpitsikilo izay nalefany tany Jerikao. Nonina teo anivon’ny Israelita i Rahaba ary mbola ao mandraka androany ny taranany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tamin’izany fotoana izany koa dia nanambara izao fampitandremana momba an’i Jerikao izao i Josoa nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ho voaozona eo anatrehan’ny TOMPO anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay olona mitsangana hanamboatra an’ity tanàna ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny ain’ny lahimatoany no ho sandan’ny hanorenany ny fototra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ain’ny faralahiny no ho sandan’ny hananganany ny vavahady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 16.34.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nombàn’ny TOMPO i Josoa ka niely laza eran’ny tany izany.
