document_id: 1CO.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Olana samihafa momba ny fanambadiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny amin’ireo anton-javatra nanoratanareo tamiko dia izao: Tsara ny tsy anambadian’ny lehilahy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsara ny tsy anambadian’ny lehilahy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lazainareo fa tsara ny tsy anambadian’ny lehilahy.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Kanefa, noho ny fijangajangana mananontanona, dia aoka ny lehilahy samy hanana ny vadiny avy ary aoka ny vehivavy samy hanana ny vadiny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka ny lehilahy hanefa ny adidiny amin’ny vadiny, ary toy izany koa ny vehivavy amin’ny vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny vavy tsy manam-pahefana amin’ny tenany, fa an’ny lahy izany; toy izany koa, ny lahy tsy manam-pahefana amin’ny tenany, fa an’ny vavy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aza misara-pandriana ianareo raha tsy amin’ny vanim-potoana ifanarahanareo hatokana ho an’ny fivavahana; avy eo dia miraisa indray, sao tsy mahafehy tena ianareo ka halain’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' fanahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saingy tsy mandidy anareo aho milaza izany fa mamela malalaka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Satriko ho tahaka ahy avokoa ny olona; kanefa moa samy manana ny fanomezam-pahasoavana manokana noraisiny tamin’Andriamanitra, ka ny anankiray toy izao, ary ny anankiray toy izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy aho amin’ny olona tsy manambady sy ny vehivavy mpitondratena: tsara ho anareo ny mitoetra ho tokan-tena tahaka ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanefa raha tsy mahafehy tena ianareo, dia manambadia; fa aleo manambady toy izay maimay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny kristianina manambady kosa, dia izao no andidiako azy (tsy izaho fa ny Tompo): aoka ny vehivavy tsy hisaraka amin’ny vadiny; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fa raha sendra misaraka amin’ny lahy izy, dia aoka tsy hanambady intsony, na aoka hody amin’ny vadiny. Ary ny lehilahy kosa, aoka tsy hanary vady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 10-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 5.32; Mk 10.11-12; Lk 16.18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary amin’ireo sisa dia izao no teniko (izaho fa tsy ny Tompo): raha misy lehilahy kristianina manambady vehivavy tsy mpino, ka te hiara-mitoetra aminy ravehivavy, dia aoka izy tsy hanary an-dravehivavy; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary raha misy vehivavy kristianina manambady lehilahy tsy mpino, ka te hiara-mitoetra aminy ralehilahy, dia aoka izy tsy hanary an-dralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny lahy tsy mpino dia atokan’Andriamanitra ho Azy, noho ny vadiny kristianina; ary ny vavy tsy mpino dia atokan’Andriamanitra ho Azy, noho ny vadiny kristianina. Raha tsy izany, dia ho tsy mpino ny zanak’izy roa, kanefa izao dia voatokana ho an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha ilay tsy mpino kosa no te hisaraka amin’ny vadiny kristianina, dia aoka izy hisaraka. Amin’izany, dia malalaka ny lafiny kristianina, na ny lahy na ny vavy, satria efa nantsoin’Andriamanitra ho velona finaritra isika. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ahoana moa no ahafantaranao, ramatoa, na hahavonjy ny vadinao tsy mpino ianao na tsia? Ary ahoana moa no ahafantaranao, andriamatoa, na hahavonjy ny vadinao tsy mpino ianao na tsia?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitondrà tena araka izay niantsoan’ny Tompo anareo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ankoatra izany, aoka samy hitondra tena araka izay anjara nomen’ny Tompo azy avy, sy araka izay niantsoan’Andriamanitra azy avy. Izany rahateo dia fepetra ataoko ho an’ny Fiangonana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Olona voafora ve no nantsoin’Andriamanitra? Aoka izy tsy hanafoana izany famantarana izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany dia mety ho fampahatsiahivana ny fomban’ireo Jiosy sasany manao izay tsy hahafantaran’olona azy hoe voafora.
    marker-yv: yv-n
  - type: text
    text: '; olona tsy voafora kosa ve no nantsoin’Andriamanitra? Aoka izy tsy hoforana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsinontsinona ny hoe voafora ary tsinontsinona koa ny hoe tsy voafora fa ny fanatanterahana ny didin’Andriamanitra no tena zavatra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aoka samy hipetraka amin’izay toetra nisy azy avy fony nantsoin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mpanompo ve ianao fony nantsoin’Andriamanitra? Aoka tsy hampaninona anao ny maha mpanompo; kanefa raha misy ahafahanao miavotra, aleo hararaotina izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kanefa raha... izany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary na dia misy aza ahafahanao miavotra, aleo hararaotina izany maha mpanompo anao izany!
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny olona mpanompo voaantso ho tafaray amin’ny Tompo dia nafahan’ny Tompo tamin’ny fahotana; ary ny olona tsy mpanompo voaantso ho tafaray amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' dia mpanompon’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Novidin’Andriamanitra lafo ianareo mba ho fananany; noho izany, aza mety handevozin’olona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ry havako, eo anatrehan’Andriamanitra dia aoka samy hipetraka amin’izay toetra nisy azy avy fony nantsoina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny olona tsy manambady sy ny mpitondratena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny amin’ny olona tsy manambady, dia tsy nahazoako didy avy amin’ny Tompo; fa manolotra ny hevitro kosa aho, toy ny olona efa nahazo famindrampo tamin’ny Tompo ka azo itokiana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izao àry no hevitro: noho ny fahasahiranana ankehitriny dia tsara ny tsy manambady; eny, tsara ho an’ny olona ny toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lehilahy efa manambady ve ianao? Aza mitady izay hisarahana. Lehilahy tsy mbola manambady ve ianao? Aza mitady vady. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Kanefa, tsy manota ianao raha manambady. Ary raha manambady tovovavy, dia tsy manota; saingy ny manambady dia tsy ilaozam-pijaliana amin’ny fiainana andavanandro, ka tiako tsy hiharan’izany ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izao no teniko, ry havako: Efa fohy ny andro, ka amin’izao sisa izao, dia aoka ireo manambady ho toy ny tsy manambady; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ireo mitomany dia aoka ho toy ny tsy mitomany; ireo mifaly dia aoka ho toy ny tsy mifaly; ireo mividy zavatra dia aoka ho toy ny tsy manan-javatra; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ireo fatra-pikirakira ny zavatr’izao tontolo izao dia aoka ho toy ny tsy mikirakira izany, fa mihelina ny endrik’izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tiako ho afaka amin’ny fanahiana ianareo. Ny lehilahy tokan-tena dia miahy ny raharahan’ny Tompo, manao izay hahafaly ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa ny lehilahy manambady kosa dia miahy ny raharahan’izao tontolo izao, manao izay hahafaly ny vadiny, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ka dia miroa fo. Ary ny vehivavy tokan-tena sy ny virijiny dia miahy ny raharahan’ny Tompo, hany ka voatokana ho Azy Tompo vatana amam-panahy. Fa ny vehivavy manambady kosa dia miahy ny raharahan’izao tontolo izao, manao izay hahafaly ny vadiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny hahasoa anareo no ilazako izany: tsy hoe hamela-pandrika aminareo, fa hanaovanareo ny mendrika sy hifikiranareo amin’ny Tompo tsy misy manembantsembana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Izao kosa ny amin’ireo efa mpifamofo talohan’ny nahatonga azy ho kristianina. Raha miredareda-paniriana razazalahy, ka mihevitra fa tsy hahafehy tena manoloana ny fofombadiny ary mihevitra fa tokony hotanterahina ny raharaham-panambadiana, dia aoka ilay tovolahy hanao izay irîny fa tsy manota izy amin’izany: aoka hifanambady izy roa! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kanefa raha tapa-kevitra tao am-pony razazalahy fa hanaja ny fofombadiny, ka tsy nisy nanery azy tamin’izany fa tena safidiny malalaka no nahatapa-kevitra azy tao am-pony, dia tsara ny ataony. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Koa tsara ny ataon’ilay tovolahy mampakatra ny fofombadiny; fa tsaratsara kokoa ny ataony tsy mampakatra ny fofombadiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tsy mifanaraka ireo mpanao heviteny amin’ny fanazavana ny and 36-38. Eto amin’ity dkt aroso ity dia zatovo efa mpifamofo talohan’ny nahatonga azy ireo ho kristianina no lazaina. Misy mihevitra kosa fa raim-pianakaviana kristianina sy ny zanany vavy kristianina no lazaina eto: ka mahatonga dkt toy izao: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Raha misy raim-pianakaviana kristianina mihevitra fa mahafa-baràka ny zanany vavy ny mamela azy mihoatra ny taona tokony hanambadiany ka tokony halefany hanambady ny zanany vavy, dia aoka hatao ny fanambadiana! Kanefa raha misy raim-pianakaviana tapa-kevitra tao am-pony fa hitazona ny zanany vavy, ka tsy nisy nanery azy tamin’izany fa tena safidiny malalaka no nahatapa-kevitra azy tao am-pony, dia tsara ny ataony. Koa tsara ny ataon’ilay raim-pianakaviana mampanambady ny zanany vavy; fa tsaratsara kokoa ny ataon’ilay raim-pianakaviana tsy mampanambady ny zanany vavy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo dkt ao amin’ny Baiboly roa tonta, prôtestanta sy katôlika). Ampit 7.8-9.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny vehivavy manambady dia voafehy amin’ny vadiny raha mbola velona ralehilahy; fa raha maty kosa izy, dia mahazo manambady izay tiany ravehivavy, saingy tsy maintsy ho lehilahy kristianina. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Kanefa, araka ny hevitro, sambatra kokoa ravehivavy raha mitoetra amin’izao. Ary ataoko fa manana ny Fanahin’Andriamanitra koa aho.
