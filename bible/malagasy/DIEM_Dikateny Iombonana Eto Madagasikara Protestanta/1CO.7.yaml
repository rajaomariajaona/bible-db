document_id: 1CO.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Olana samihafa momba ny fanambadiana
  - type: text
    content: 'Ary ny amin’ireo anton-javatra nanoratanareo tamiko dia izao: Tsara ny tsy anambadian’ny lehilahy'
  - type: note
    content: 'Tsara ny tsy anambadian’ny lehilahy: dkt hafa Lazainareo fa tsara ny tsy anambadian’ny lehilahy.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ny kristianina manambady kosa, dia izao no andidiako azy (tsy izaho fa ny Tompo): aoka ny vehivavy tsy hisaraka amin’ny vadiny; '
  '11':
  - type: text
    content: fa raha sendra misaraka amin’ny lahy izy, dia aoka tsy hanambady intsony, na aoka hody amin’ny vadiny. Ary ny lehilahy kosa, aoka tsy hanary vady
  - type: note
    content: 'And 10-11: jereo Mt 5.32; Mk 10.11-12; Lk 16.18.'
  - type: text
    content: .
  '12':
  - type: text
    content: 'Ary amin’ireo sisa dia izao no teniko (izaho fa tsy ny Tompo): raha misy lehilahy kristianina manambady vehivavy tsy mpino, ka te hiara-mitoetra aminy ravehivavy, dia aoka izy tsy hanary an-dravehivavy; '
  '13':
  - type: text
    content: 'ary raha misy vehivavy kristianina manambady lehilahy tsy mpino, ka te hiara-mitoetra aminy ralehilahy, dia aoka izy tsy hanary an-dralehilahy. '
  '14':
  - type: text
    content: 'Fa ny lahy tsy mpino dia atokan’Andriamanitra ho Azy, noho ny vadiny kristianina; ary ny vavy tsy mpino dia atokan’Andriamanitra ho Azy, noho ny vadiny kristianina. Raha tsy izany, dia ho tsy mpino ny zanak’izy roa, kanefa izao dia voatokana ho an’Andriamanitra. '
  '15':
  - type: text
    content: 'Fa raha ilay tsy mpino kosa no te hisaraka amin’ny vadiny kristianina, dia aoka izy hisaraka. Amin’izany, dia malalaka ny lafiny kristianina, na ny lahy na ny vavy, satria efa nantsoin’Andriamanitra ho velona finaritra isika. '
  '16':
  - type: text
    content: Ahoana moa no ahafantaranao, ramatoa, na hahavonjy ny vadinao tsy mpino ianao na tsia? Ary ahoana moa no ahafantaranao, andriamatoa, na hahavonjy ny vadinao tsy mpino ianao na tsia?
  - type: heading
    content: Mitondrà tena araka izay niantsoan’ny Tompo anareo
  '17':
  - type: text
    content: 'Ankoatra izany, aoka samy hitondra tena araka izay anjara nomen’ny Tompo azy avy, sy araka izay niantsoan’Andriamanitra azy avy. Izany rahateo dia fepetra ataoko ho an’ny Fiangonana rehetra. '
  '18':
  - type: text
    content: Olona voafora ve no nantsoin’Andriamanitra? Aoka izy tsy hanafoana izany famantarana izany
  - type: note
    content: Izany dia mety ho fampahatsiahivana ny fomban’ireo Jiosy sasany manao izay tsy hahafantaran’olona azy hoe voafora.
  - type: text
    content: '; olona tsy voafora kosa ve no nantsoin’Andriamanitra? Aoka izy tsy hoforana. '
  '19':
  - type: text
    content: 'Tsinontsinona ny hoe voafora ary tsinontsinona koa ny hoe tsy voafora fa ny fanatanterahana ny didin’Andriamanitra no tena zavatra. '
  '2':
  - type: text
    content: 'Kanefa, noho ny fijangajangana mananontanona, dia aoka ny lehilahy samy hanana ny vadiny avy ary aoka ny vehivavy samy hanana ny vadiny avy. '
  '20':
  - type: text
    content: 'Aoka samy hipetraka amin’izay toetra nisy azy avy fony nantsoin’Andriamanitra. '
  '21':
  - type: text
    content: Mpanompo ve ianao fony nantsoin’Andriamanitra? Aoka tsy hampaninona anao ny maha mpanompo; kanefa raha misy ahafahanao miavotra, aleo hararaotina izany
  - type: note
    content: 'kanefa raha... izany: dkt hafa ary na dia misy aza ahafahanao miavotra, aleo hararaotina izany maha mpanompo anao izany!'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Fa ny olona mpanompo voaantso ho tafaray amin’ny Tompo dia nafahan’ny Tompo tamin’ny fahotana; ary ny olona tsy mpanompo voaantso ho tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' dia mpanompon’i Kristy. '
  '23':
  - type: text
    content: 'Novidin’Andriamanitra lafo ianareo mba ho fananany; noho izany, aza mety handevozin’olona. '
  '24':
  - type: text
    content: Ry havako, eo anatrehan’Andriamanitra dia aoka samy hipetraka amin’izay toetra nisy azy avy fony nantsoina.
  - type: heading
    content: Ny olona tsy manambady sy ny mpitondratena
  '25':
  - type: text
    content: Ary ny amin’ny olona tsy manambady, dia tsy nahazoako didy avy amin’ny Tompo; fa manolotra ny hevitro kosa aho, toy ny olona efa nahazo famindrampo tamin’ny Tompo ka azo itokiana.
  '26':
  - type: text
    content: 'Izao àry no hevitro: noho ny fahasahiranana ankehitriny dia tsara ny tsy manambady; eny, tsara ho an’ny olona ny toy izany. '
  '27':
  - type: text
    content: 'Lehilahy efa manambady ve ianao? Aza mitady izay hisarahana. Lehilahy tsy mbola manambady ve ianao? Aza mitady vady. '
  '28':
  - type: text
    content: Kanefa, tsy manota ianao raha manambady. Ary raha manambady tovovavy, dia tsy manota; saingy ny manambady dia tsy ilaozam-pijaliana amin’ny fiainana andavanandro, ka tiako tsy hiharan’izany ianareo.
  '29':
  - type: text
    content: 'Izao no teniko, ry havako: Efa fohy ny andro, ka amin’izao sisa izao, dia aoka ireo manambady ho toy ny tsy manambady; '
  '3':
  - type: text
    content: 'Aoka ny lehilahy hanefa ny adidiny amin’ny vadiny, ary toy izany koa ny vehivavy amin’ny vadiny. '
  '30':
  - type: text
    content: 'ireo mitomany dia aoka ho toy ny tsy mitomany; ireo mifaly dia aoka ho toy ny tsy mifaly; ireo mividy zavatra dia aoka ho toy ny tsy manan-javatra; '
  '31':
  - type: text
    content: ireo fatra-pikirakira ny zavatr’izao tontolo izao dia aoka ho toy ny tsy mikirakira izany, fa mihelina ny endrik’izao tontolo izao.
  '32':
  - type: text
    content: 'Tiako ho afaka amin’ny fanahiana ianareo. Ny lehilahy tokan-tena dia miahy ny raharahan’ny Tompo, manao izay hahafaly ny Tompo. '
  '33':
  - type: text
    content: 'Fa ny lehilahy manambady kosa dia miahy ny raharahan’izao tontolo izao, manao izay hahafaly ny vadiny, '
  '34':
  - type: text
    content: ka dia miroa fo. Ary ny vehivavy tokan-tena sy ny virijiny dia miahy ny raharahan’ny Tompo, hany ka voatokana ho Azy Tompo vatana amam-panahy. Fa ny vehivavy manambady kosa dia miahy ny raharahan’izao tontolo izao, manao izay hahafaly ny vadiny.
  '35':
  - type: text
    content: 'Ny hahasoa anareo no ilazako izany: tsy hoe hamela-pandrika aminareo, fa hanaovanareo ny mendrika sy hifikiranareo amin’ny Tompo tsy misy manembantsembana.'
  '36':
  - type: text
    content: 'Izao kosa ny amin’ireo efa mpifamofo talohan’ny nahatonga azy ho kristianina. Raha miredareda-paniriana razazalahy, ka mihevitra fa tsy hahafehy tena manoloana ny fofombadiny ary mihevitra fa tokony hotanterahina ny raharaham-panambadiana, dia aoka ilay tovolahy hanao izay irîny fa tsy manota izy amin’izany: aoka hifanambady izy roa! '
  '37':
  - type: text
    content: 'Kanefa raha tapa-kevitra tao am-pony razazalahy fa hanaja ny fofombadiny, ka tsy nisy nanery azy tamin’izany fa tena safidiny malalaka no nahatapa-kevitra azy tao am-pony, dia tsara ny ataony. '
  '38':
  - type: text
    content: Koa tsara ny ataon’ilay tovolahy mampakatra ny fofombadiny; fa tsaratsara kokoa ny ataony tsy mampakatra ny fofombadiny
  - type: note
    content: 'Tsy mifanaraka ireo mpanao heviteny amin’ny fanazavana ny and 36-38. Eto amin’ity dkt aroso ity dia zatovo efa mpifamofo talohan’ny nahatonga azy ireo ho kristianina no lazaina. Misy mihevitra kosa fa raim-pianakaviana kristianina sy ny zanany vavy kristianina no lazaina eto: ka mahatonga dkt toy izao: Raha misy raim-pianakaviana kristianina mihevitra fa mahafa-baràka ny zanany vavy ny mamela azy mihoatra ny taona tokony hanambadiany ka tokony halefany hanambady ny zanany vavy, dia aoka hatao ny fanambadiana! Kanefa raha misy raim-pianakaviana tapa-kevitra tao am-pony fa hitazona ny zanany vavy, ka tsy nisy nanery azy tamin’izany fa tena safidiny malalaka no nahatapa-kevitra azy tao am-pony, dia tsara ny ataony. Koa tsara ny ataon’ilay raim-pianakaviana mampanambady ny zanany vavy; fa tsaratsara kokoa ny ataon’ilay raim-pianakaviana tsy mampanambady ny zanany vavy (jereo dkt ao amin’ny Baiboly roa tonta, prôtestanta sy katôlika). Ampit 7.8-9.'
  - type: text
    content: .
  '39':
  - type: text
    content: 'Ny vehivavy manambady dia voafehy amin’ny vadiny raha mbola velona ralehilahy; fa raha maty kosa izy, dia mahazo manambady izay tiany ravehivavy, saingy tsy maintsy ho lehilahy kristianina. '
  '4':
  - type: text
    content: 'Ny vavy tsy manam-pahefana amin’ny tenany, fa an’ny lahy izany; toy izany koa, ny lahy tsy manam-pahefana amin’ny tenany, fa an’ny vavy izany. '
  '40':
  - type: text
    content: Kanefa, araka ny hevitro, sambatra kokoa ravehivavy raha mitoetra amin’izao. Ary ataoko fa manana ny Fanahin’Andriamanitra koa aho.
  '5':
  - type: text
    content: 'Aza misara-pandriana ianareo raha tsy amin’ny vanim-potoana ifanarahanareo hatokana ho an’ny fivavahana; avy eo dia miraisa indray, sao tsy mahafehy tena ianareo ka halain’i '
  - type: text
    content: Satàna
  - type: text
    content: ' fanahy.'
  '6':
  - type: text
    content: 'Saingy tsy mandidy anareo aho milaza izany fa mamela malalaka. '
  '7':
  - type: text
    content: Satriko ho tahaka ahy avokoa ny olona; kanefa moa samy manana ny fanomezam-pahasoavana manokana noraisiny tamin’Andriamanitra, ka ny anankiray toy izao, ary ny anankiray toy izao.
  '8':
  - type: text
    content: 'Fa hoy aho amin’ny olona tsy manambady sy ny vehivavy mpitondratena: tsara ho anareo ny mitoetra ho tokan-tena tahaka ahy. '
  '9':
  - type: text
    content: Kanefa raha tsy mahafehy tena ianareo, dia manambadia; fa aleo manambady toy izay maimay.
