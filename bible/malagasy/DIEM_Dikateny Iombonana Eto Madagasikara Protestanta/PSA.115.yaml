document_id: PSA.115,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO An’Andriamanitra irery ny voninahitra
  - type: text
    content: Aza izahay, ry TOMPO ô, aza izahay
  - type: text
    content: fa Ianao ihany no omem-
  - type: text
    content: boninahitra
  - type: text
    content: ','
  - type: text
    content: noho ny fitiavanao sy ny toetranao mahatoky.
  '10':
  - type: text
    content: 'Ry taranak’i '
  - type: text
    content: Aharôna
  - type: note
    content: I Aharôna sy ny taranany no mpisorona teo amin’i Israely fahiny (jereo Eks 23.1,43).
  - type: text
    content: ' ô, matokia ny TOMPO.'
  - type: text
    content: –Heriny sy ampingany Izy!
  '11':
  - type: text
    content: Ry mpanaja ny TOMPO ô, matokia ny TOMPO.
  - type: text
    content: –Heriny sy ampingany Izy!
  '12':
  - type: text
    content: 'Mahatsiaro antsika ny TOMPO ka mitahy:'
  - type: text
    content: –Hotahîny anie ny fokon’i Israely!
  - type: text
    content: –Hotahîny anie ny taranak’i Aharôna!
  '13':
  - type: text
    content: –Hotahîny anie ny mpanaja AZY!
  - type: text
    content: –Hotahîny anie na ny kely na ny lehibe
  - type: note
    content: Ampit Apôk 19.5.
  - type: text
    content: '!'
  '14':
  - type: text
    content: Hohamaroin’ny TOMPO anie ny ankohonanareo,
  - type: text
    content: dia ny anareo sy ny an’ny zanakareo!
  '15':
  - type: text
    content: Hitahy anareo anie ny TOMPO,
  - type: text
    content: Mpanao ny lanitra sy ny tany!
  '16':
  - type: text
    content: Ny lanitra dia an’ny TOMPO;
  - type: text
    content: ny tany kosa nomeny ny olombelona!
  '17':
  - type: text
    content: Tsy ireo maty no hidera ny TOMPO
  - type: text
    content: na ireo mitsitra any an-toera-mangina;
  '18':
  - type: text
    content: fa isika velona no misaotra ny TOMPO
  - type: text
    content: manomboka izao ka ho mandrakizay.
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'Ahoana no ilazan’ireo hafa firenena hoe:'
  - type: text
    content: Mba aiza ity Andriamanitrareo
  - type: note
    content: Jereo Sal 42.4,11.
  - type: text
    content: '?'
  '3':
  - type: text
    content: Ilay Andriamanitray dia any an-danitra,
  - type: text
    content: ka efany avokoa izay tiany hatao.
  '4':
  - type: text
    content: Ny sampin’ny hafa firenena kosa
  - type: text
    content: dia volafotsy amam-bolamena;
  - type: text
    content: 'zavatra notefen’olombelona ireny:'
  '5':
  - type: text
    content: manam-bava fa tsy miteny;
  - type: text
    content: mana-maso fa tsy mahita;
  '6':
  - type: text
    content: manan-tsofina fa tsy mandre;
  - type: text
    content: manana orona fa tsy manambolo;
  '7':
  - type: text
    content: manan-tanana fa tsy mandray;
  - type: text
    content: manan-tongotra fa tsy mandeha;
  - type: text
    content: ary ny tendany tsy mahaloa-peo.
  '8':
  - type: text
    content: Ho tahaka azy anie izay manao azy
  - type: text
    content: sy izay rehetra mitoky aminy
  - type: note
    content: 'And 4-8: jereo 135.15-18; Apôk 9.20.'
  - type: text
    content: '!'
  '9':
  - type: text
    content: Ry fokon’i Israely ô, matokia ny TOMPO.
  - type: text
    content: –Heriny sy ampingany Izy
  - type: note
    content: Misy antokon’olona anankiroa mifamaly manonona ireto and 9-11 ireto.
  - type: text
    content: '!'
