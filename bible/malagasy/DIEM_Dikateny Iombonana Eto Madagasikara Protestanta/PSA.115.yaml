document_id: PSA.115,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO An’Andriamanitra irery ny voninahitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza izahay, ry TOMPO ô, aza izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao ihany no omem-
    - type: usfm
      marker: w
      children:
      - type: text
        text: boninahitra
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fitiavanao sy ny toetranao mahatoky.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ry taranak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aharôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '115.10 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: I Aharôna sy ny taranany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: no mpisorona teo amin’i Israely fahiny (jereo Eks 23.1,43).
      marker-yv: yv-n
    - type: text
      text: ' ô, matokia ny TOMPO.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Heriny sy ampingany Izy!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mpanaja ny TOMPO ô, matokia ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Heriny sy ampingany Izy!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mahatsiaro antsika ny TOMPO ka mitahy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Hotahîny anie ny fokon’i Israely!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Hotahîny anie ny taranak’i Aharôna!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Hotahîny anie ny mpanaja AZY!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Hotahîny anie na ny kely na ny lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '115.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Apôk 19.5.
      marker-yv: yv-n
    - type: text
      text: '!'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hohamaroin’ny TOMPO anie ny ankohonanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny anareo sy ny an’ny zanakareo!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitahy anareo anie ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanao ny lanitra sy ny tany!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lanitra dia an’ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tany kosa nomeny ny olombelona!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ireo maty no hidera ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ireo mitsitra any an-toera-mangina;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa isika velona no misaotra ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manomboka izao ka ho mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloià
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ahoana no ilazan’ireo hafa firenena hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba aiza ity Andriamanitrareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '115.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 42.4,11.
      marker-yv: yv-n
    - type: text
      text: '?'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay Andriamanitray dia any an-danitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka efany avokoa izay tiany hatao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sampin’ny hafa firenena kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia volafotsy amam-bolamena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'zavatra notefen’olombelona ireny:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manam-bava fa tsy miteny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mana-maso fa tsy mahita;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manan-tsofina fa tsy mandre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manana orona fa tsy manambolo;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manan-tanana fa tsy mandray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manan-tongotra fa tsy mandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tendany tsy mahaloa-peo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tahaka azy anie izay manao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy izay rehetra mitoky aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '115.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 4-8: jereo 135.15-18; Apôk 9.20.'
      marker-yv: yv-n
    - type: text
      text: '!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry fokon’i Israely ô, matokia ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Heriny sy ampingany Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '115.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Misy antokon’olona anankiroa mifamaly manonona ireto and 9-11 ireto.
      marker-yv: yv-n
    - type: text
      text: '!'
