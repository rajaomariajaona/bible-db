document_id: REV.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny namahàna ny tombokase enina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary izao no hitako. Rehefa novahan’ny Zanakondry ny voalohany tamin’ireo tombokase fito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 5.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', dia reko niteny mafy toy ny kotro-baratra ny anankiray tamin’ny zava-miaina efatra, nanao hoe: Avia! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary niantso tamin’ny feo mahery izy rehetra nanao hoe: «Ry Tompo masina sy marina ô, rahoviana no hotsarainao ny mponina eny ambonin’ny tany ka hovalianao ny ranay nalatsany?» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia samy nomena akanjo fotsy lava izy rehetra; ary nasaina mbola niala sasatra fotoana fohy mandra-pahafeno ny isan’ireo mpanompo namany sy ireo havana iray finoana, izay efa hovonoina tahaka azy koa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nijery aho rehefa novahan’ny Zanakondry ny tombokase fahenina, ka nisy horohorontany mahery vaika; tonga mainty tahaka ny akanjo volon’osy ny masoandro; tonga mena tahaka ny ra ny volana manontolo; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary ny kintan’ny habakabaka dia niraraka tamin’ny tany, tahaka ireo voa manta ahintsan’ny aviavy hozongozonin’ny rivo-mahery. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia lasa tsy hita teo tahaka ny boky voahorona ny habakabaka; ary ny tendrombohitra sy ny nosy rehetra dia nafindra niala tamin’ny toerany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 12-14:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Is 13.10-13; 34.3; Ezek 32.7-8; Ham 8.9; Jl 2.10; 3.3-4. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'boky voahorona:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 2 Tim 4.13 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny mpanjakan’ny tany, ireo lehibe sy ireo komandin-tafika, ireo mpanankarena sy ireo lehilahy matanjaka, mbamin’ny olona rehetra na mpanompo na tsy mpanompo, dia lasa niery tany anatin’ny zohy sy tany ambanin’ny vatolampy teny an-tendrombohitra, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ka nilaza tamin’ny tendrombohitra sy ny vatolampy hoe: «Ianjerao izahay ary afeno lavitry ny tavan’Ilay mipetraka eo ambony sezafiandrianana sy lavitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hatezeran
    - type: text
      text: '’ny Zanakondry; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fa tonga ny andro lehibe isehoan’ny hatezeran’Andriamanitra mbamin’ny an’ny Zanakondry, ka iza no mahatanty izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 16:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Hôs 10.8; Lk 23.30. –
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 17:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 2 Tim 4.13 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ?»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia indro hitako nisy soavaly fotsy, ary ilay nitaingina azy dia nanana tsipîka; nomena satroboninahitra izy, ka lasa nandeha toy ny efa naharesy sady mbola haharesy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Rehefa novahan’ny Zanakondry ny tombokase faharoa, dia reko ny zava-miaina faharoa nanao hoe: Avia! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia soavaly mena kosa no nipoitra; ary ilay nitaingina azy dia nomena sabatra lehibe ary navela hanaisotra ny fihavanana hiala amin’ny tany mba hifamonoan’ny olona.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Rehefa novahan’ny Zanakondry ny tombokase fahatelo, dia reko ny zava-miaina fahatelo nanao hoe: Avia! Dia nijery aho, ka indro nisy soavaly mainty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 2-5:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Za 1.8; 6.1-8.
      marker-yv: yv-n
    - type: text
      text: '; ary ilay nitaingina azy dia nitana mizàna teny an-tanany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sady reko toa nisy feo avy tao afovoan’ny zava-miaina efatra nanao hoe: «Ataovy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denàry
    - type: text
      text: ' iray ny varimbazaha iray kilao ary denàry iray ny ôrza telo kilao; saingy aza mbola asondro-bidy ny menaka sy ny divay.»'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa novahan’ny Zanakondry ny tombokase fahefatra, dia reko ny zava-miaina fahefatra nanao hoe: Avia! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia indro hitako nisy soavaly hatsatra; ary ilay nitaingina azy dia natao hoe Rafahafatesana izay niaraka tamin’ny Toeran’ny maty. Nomena fahefana tamin’ny ampahefatry ny tany izy ireo, hamono amin’ny sabatra sy ny mosary ary ny areti-mifindra sy ny bibidia etỳ an-tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Ezek 14.21.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Rehefa novahan’ny Zanakondry ny tombokase fahadimy, dia hitako teo ambanin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' ny fanahin’ireo voavono ho faty satria nitory ny tenin’Andriamanitra sy nitana ny hafatra nijoroan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ho vavolombelona. '
