document_id: REV.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay vehivavy sy ny dràgona
  - type: text
    content: 'Ary nisy '
  - type: text
    content: famantarana
  - type: text
    content: ' lehibe niseho teny amin’ny habakabaka, dia vehivavy anankiray: ny masoandro no toy ny lamba nisalorany, ny volana no teo an-tongony; ary kintana 12 no satroboninahitra teo amin’ny lohany. '
  '10':
  - type: text
    content: 'Dia reko nisy feo mahery tany an-danitra nanao hoe: «Tonga izao ny famonjena sy ny hery ary ny fanjakàn’ilay Andriamanitsika, tonga izao ny fahefàn’ilay '
  - type: text
    content: Mesiany
  - type: text
    content: ; satria nazera ilay mpiampanga an’ireo havantsika, dia ilay mpiampanga azy ireo andro aman’alina teo anatrehan’Andriamanitsika
  - type: note
    content: 'Ampit Jôb 1.9-11; Za 3.1-2. –ilay mpiampanga: izany no hevitry ny hoe Satàna raha araka ny tena fiavian’io teny io.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ireo havantsika kosa dia naharesy ilay mpiampanga, ka ny ra nafoin’ny Zanakondry sy ny tenin’Andriamanitra nijoroan’izy ireo ho vavolombelona no nandreseny azy; ary tsy nankamamy ny ainy intsony ireo na dia ho faty aza. '
  '12':
  - type: text
    content: Noho izany, mifalia, ry lanitra sy ianareo monina ao aminy. Mampalahelo ianareo, ry tany aman-dranomasina, fa nidina any aminareo ny devoly sady misafoaka mafy, satria fantany fa kely sisa ny androny!»
  '13':
  - type: text
    content: 'Rehefa hitan’ilay dràgona fa voazera tamin’ny tany izy, dia ilay vehivavy niteraka ny zazalahy no nenjehiny. '
  '14':
  - type: text
    content: Fa nomena eladroan’ny voromahery lehibe ravehivavy mba hanidinany hankany an-taniefitra, ho any amin’ny toerana izay amelomana azy mandritra ny telo taona sy tapany
  - type: note
    content: Ampit Dan 7.25; 12.7.
  - type: text
    content: ', ka ho voaaro amin’ny famelezan’ilay bibilava. '
  '15':
  - type: text
    content: 'Ny vavan’ilay bibilava kosa namoaka rano toy ny riaka hanaraka an-dravehivavy mba hipaoka azy. '
  '16':
  - type: text
    content: 'Kanjo novonjen’ny tany ravehivavy, fa nitresaka ny tany ka nitelina ny riaka izay nalefan’ny vavan’ilay dràgona. '
  '17':
  - type: text
    content: Dia tezitra tamin-dravehivavy ny dràgona ka lasa nandeha tamin’ny taranany sisa, izay mitandrina ny didin’Andriamanitra sy mitana ny hafatra nijoroan’i Jesoa ho vavolombelona; ary nijanona teo amin’ny fasi-dranomasina ilay dràgona
  - type: note
    content: 'ary nijanona... ilay dràgona: misy stf sasany ahitana hoe ary nijanona teo amin’ny fasi-dranomasina aho, ka mampifandray ity andininy ity amin’ny andininy manaraka.'
  - type: text
    content: .
  '2':
  - type: text
    content: Bevohòka ilay vehivavy sady mihetsi-jaza ka mitaraina, satria marary fatratra efa hiteraka.
  '3':
  - type: text
    content: 'Ary nisy famantarana hafa koa niseho teny amin’ny habakabaka: indro nisy dràgona mena lehibe, manana loha fito sy tandroka folo, ary misy satroboninahitra iray avy isaky ny lohany'
  - type: note
    content: 'Ampit Dan 7.7. –dràgona: biby tsy misy fa foronin-tsaina fotsiny, ka heverina ho miendrika androngo goavana. Antsoina hoe bibilava ihany koa izy ary enti-manondro ny devoly, ao amin’ny Baiboly. –tandroka: jereo 5.6 sy nta.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: Nifaoka ny ampahatelon’ny kintana eny amin’ny habakabaka ny rambon’ilay dràgona, ka nanjera ireny tamin’ny tany. Teo anatrehan’ilay vehivavy efa hiteraka no nijanonan’ity dràgona, mba handrapaka ny zanany, raha vao teraka
  - type: note
    content: Ampit Dan 8.10.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Dia teraka ravehivavy ka nahazo zazalahy, izay hifehy ny firenena rehetra amin’ny tehim-by
  - type: note
    content: Ampit Is 66.7; Sal 2.9.
  - type: text
    content: ' ka nakarina faingana eo anilan’Andriamanitra sy eo anilan’ny sezafiandrianany. '
  '6':
  - type: text
    content: Ravehivavy kosa nandositra nankany an-taniefitra, izay nisy toerana namboarin’Andriamanitra mba hamelomana azy mandritra ny 1 260 andro.
  '7':
  - type: text
    content: 'Dia nisy ady nitranga tany an-danitra: i Mikaela'
  - type: note
    content: 'Mikaela: jereo Jod 9 sy nta.'
  - type: text
    content: ' sy ny '
  - type: text
    content: anjeliny
  - type: text
    content: ' no niady tamin’ilay dràgona; ary niady ilay dràgona mbamin’ny anjeliny'
  - type: note
    content: Ampit Gen 3.1; Lk 10.18.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Kanefa resy ilay dràgona, sady tsy nahazo nitoetra tany an-danitra intsony. '
  '9':
  - type: text
    content: 'Ary nazera ilay dràgona, dia ilay bibilava fahizay, ilay atao hoe '
  - type: text
    content: devoly
  - type: text
    content: ' na hoe '
  - type: text
    content: Satàna
  - type: text
    content: ', izay mamitaka izao tontolo rehetra izao; nazera tamin’ny tany izy ary nazera niaraka taminy koa ireo anjeliny. '
