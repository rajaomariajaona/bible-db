document_id: REV.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay vehivavy sy ny dràgona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' lehibe niseho teny amin’ny habakabaka, dia vehivavy anankiray: ny masoandro no toy ny lamba nisalorany, ny volana no teo an-tongony; ary kintana 12 no satroboninahitra teo amin’ny lohany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia reko nisy feo mahery tany an-danitra nanao hoe: «Tonga izao ny famonjena sy ny hery ary ny fanjakàn’ilay Andriamanitsika, tonga izao ny fahefàn’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesiany
    - type: text
      text: ; satria nazera ilay mpiampanga an’ireo havantsika, dia ilay mpiampanga azy ireo andro aman’alina teo anatrehan’Andriamanitsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôb 1.9-11; Za 3.1-2. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ilay mpiampanga:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izany no hevitry ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Satàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' raha araka ny tena fiavian’io teny io.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ireo havantsika kosa dia naharesy ilay mpiampanga, ka ny ra nafoin’ny Zanakondry sy ny tenin’Andriamanitra nijoroan’izy ireo ho vavolombelona no nandreseny azy; ary tsy nankamamy ny ainy intsony ireo na dia ho faty aza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Noho izany, mifalia, ry lanitra sy ianareo monina ao aminy. Mampalahelo ianareo, ry tany aman-dranomasina, fa nidina any aminareo ny devoly sady misafoaka mafy, satria fantany fa kely sisa ny androny!»
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rehefa hitan’ilay dràgona fa voazera tamin’ny tany izy, dia ilay vehivavy niteraka ny zazalahy no nenjehiny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa nomena eladroan’ny voromahery lehibe ravehivavy mba hanidinany hankany an-taniefitra, ho any amin’ny toerana izay amelomana azy mandritra ny telo taona sy tapany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Dan 7.25; 12.7.
      marker-yv: yv-n
    - type: text
      text: ', ka ho voaaro amin’ny famelezan’ilay bibilava. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny vavan’ilay bibilava kosa namoaka rano toy ny riaka hanaraka an-dravehivavy mba hipaoka azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Kanjo novonjen’ny tany ravehivavy, fa nitresaka ny tany ka nitelina ny riaka izay nalefan’ny vavan’ilay dràgona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia tezitra tamin-dravehivavy ny dràgona ka lasa nandeha tamin’ny taranany sisa, izay mitandrina ny didin’Andriamanitra sy mitana ny hafatra nijoroan’i Jesoa ho vavolombelona; ary nijanona teo amin’ny fasi-dranomasina ilay dràgona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ary nijanona... ilay dràgona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary nijanona teo amin’ny fasi-dranomasina aho,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ka mampifandray ity andininy ity amin’ny andininy manaraka.'
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Bevohòka ilay vehivavy sady mihetsi-jaza ka mitaraina, satria marary fatratra efa hiteraka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nisy famantarana hafa koa niseho teny amin’ny habakabaka: indro nisy dràgona mena lehibe, manana loha fito sy tandroka folo, ary misy satroboninahitra iray avy isaky ny lohany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Dan 7.7. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dràgona:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' biby tsy misy fa foronin-tsaina fotsiny, ka heverina ho miendrika androngo goavana. Antsoina hoe bibilava ihany koa izy ary enti-manondro ny devoly, ao amin’ny Baiboly. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tandroka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 5.6 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nifaoka ny ampahatelon’ny kintana eny amin’ny habakabaka ny rambon’ilay dràgona, ka nanjera ireny tamin’ny tany. Teo anatrehan’ilay vehivavy efa hiteraka no nijanonan’ity dràgona, mba handrapaka ny zanany, raha vao teraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Dan 8.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia teraka ravehivavy ka nahazo zazalahy, izay hifehy ny firenena rehetra amin’ny tehim-by
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 66.7; Sal 2.9.
      marker-yv: yv-n
    - type: text
      text: ' ka nakarina faingana eo anilan’Andriamanitra sy eo anilan’ny sezafiandrianany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ravehivavy kosa nandositra nankany an-taniefitra, izay nisy toerana namboarin’Andriamanitra mba hamelomana azy mandritra ny 1 260 andro.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nisy ady nitranga tany an-danitra: i Mikaela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mikaela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jod 9 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeliny
    - type: text
      text: ' no niady tamin’ilay dràgona; ary niady ilay dràgona mbamin’ny anjeliny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 3.1; Lk 10.18.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Kanefa resy ilay dràgona, sady tsy nahazo nitoetra tany an-danitra intsony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nazera ilay dràgona, dia ilay bibilava fahizay, ilay atao hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' na hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: text
      text: ', izay mamitaka izao tontolo rehetra izao; nazera tamin’ny tany izy ary nazera niaraka taminy koa ireo anjeliny. '
