document_id: GEN.42
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naniraka ireo zanany hankany Ejipta i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fantatr’i Jakôba fa misy vary any Ejipta, ka hoy izy tamin’ireo zanany lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no mifampijery fotsiny eto ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indro, reko fa misy vary any Ejipta. Koa andeha midina any mividy vary ho antsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 7.12.
    marker-yv: yv-n
  - type: text
    text: ', mba ho velona isika fa tsy ho faty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nidina tany Ejipta ireo zokin’i Jôsefa folo lahy mba hividy vary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy nalefan’i Jakôba niaraka tamin’ireo rahalahiny kosa i Benjamîna zandrin’i Jôsefa, fa hoy izy hoe: «Sao misy loza hanjo azy any.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia tonga hividy vary tany Ejipta toy ny hafa ireo zanakalahin’i Jakôba, fa tratry ny mosary koa ny tany Kanahàna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nodian’i Jôsefa tsy fantatra ireo rahalahiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I Jôsefa no mpitondra ny tany Ejipta, ka izy no mpivaro-bary tamin’ireo olon’ny tany hafa rehetra. Koa tonga niankohoka tamin’ny tany teo anatrehan’i Jôsefa ireo rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vao hitan’i Jôsefa ireo rahalahiny, dia fantany; saingy mody niseho ho vahiny taminy kosa i Jôsefa sady nandrahona azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avy aiza moa ianareo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy kosa ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avy any amin’ny tany Kanahàna izahay. Tonga mba hividy sakafo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa fantatr’i Jôsefa ireto rahalahiny, fa izy ireo kosa tsy nahafantatra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsaroan’i Jôsefa ny nofiny momba azy ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 37.5-9.
    marker-yv: yv-n
  - type: text
    text: ', ka hoy indray izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpitsikilo ianareo! Hizaha izay toerana mora hanafihana eto amin’ny tany no nahatongavanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsia, tompoko ô! Tonga mba hividy sakafo fotsiny izahay mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Zanak’olona iray ihany izahay rehetra ireto; olo-marina fa tsy mba mpitsikilo akory izahay mpanomponao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Jôsefa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, fa hizaha izay toerana mora hanafihana eto amin’ny tany no nahatongavanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Namaly kosa ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Misy 12 mirahalahy izahay mpanomponao, zanak’olona iray ihany any amin’ny tany Kanahàna; ary indro ny faralahy aminay aza dia nijanona any amin’ny rainay, fa ny iray kosa efa tsy ao intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy indray i Jôsefa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izany indrindra no efa nilazako anareo hoe mpitsikilo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa izao no fizahan-toetra hatao aminareo: Velona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', ka mianiana aho fa tsy hiala eto mihitsy ianareo raha tsy tonga eto izany zandrinareo faralahy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maniraha anankiray aminareo haka azy, fa ianareo sisa kosa dia hatao an-tranomaizina. Ho hita amin’izany ny fahamarinan’ny teninareo. Fa raha tsy izany kosa, velona ny Farao, ka manizinginzina aho fa mpitsikilo tokoa ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nataon’i Jôsefa an-tranomaizina nandritra ny telo andro izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary tamin’ny andro fahatelo dia hoy i Jôsefa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no ataovy, dia ho velona ianareo, satria izaho koa mba manaja an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha olo-marina tokoa ianareo, dia aoka ny anankiray aminareo hijanona ao an-tranomaizina nitazonana anareo; fa ianareo sisa kosa mandehana mitondra ny vary ho any amin’ny fianakavianareo mosarena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Avy eo dia ento aty amiko ny zandrinareo faralahy, amin’izay dia ho voaporofo fa marina ny teninareo ka tsy ho faty ianareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanaiky izany izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'nefa nifampiresaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tena meloka tokoa isika noho ny amin’ny rahalahintsika izay hitantsika ny fahoriam-panahiny tamin’ny fiangaviany antsika, nefa tsy mba nohenointsika; ary izao dia manody antsika izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niteny i Reobena hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Moa tsy efa nilaza taminareo ve aho hoe: «Aza manao heloka bevava amin’i Jôsefa leiretsy», kanefa tsy nihaino ahy ianareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 37.21-22.
    marker-yv: yv-n
  - type: text
    text: . Koa izao dia manody antsika ny rany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tsy nampoizin’ireo hoe fantatr’i Jôsefa ny teniny, satria mpandika teny no niresahany taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nihodina niala teo anatrehany aloha i Jôsefa mba hitomany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niverina nody any Kanahàna ireo zanakalahin’i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary niverina teo amin’ireto rahalahiny indray i Jôsefa ka nilaza taminy fa i Simehôna no hotazoniny, sady nafatony teo imason’izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avy eo dia nasainy nofenoina vary ny kitapon’izy ireo, ary naverina tao an-kitapony avy koa ny volan’ny isan-dahy sady nomena vatsy hoentiny eny an-dàlana. Dia notanterahina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary nataingin’izy mirahalahy avy teo ambony borikiny ny kitapom-bary, dia lasa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nony mby teo amin’ny toerana handriany hariva izy ireo, dia nosokafan’ny anankiray ny kitapony mba hanomezany sakafo ho an’ny borikiny, nefa indro ny volany hitany teo am-bavan’ny kitapo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niteny tamin’ireo rahalahiny izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Naverina ny volako, fa io anaty kitapoko io!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nivarahontsana izy ireo sady raiki-tahotra ka nifanontany hoe: «Inona izao ataon’Andriamanitra amintsika izao?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nony tonga tany Kanahàna teo amin’i Jakôba rainy izy ireo, dia nitantara taminy ny zava-niseho rehetra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '–Ilay lehilahy tompon’ny tany dia nandrahona anay ka nilaza anay ho mpitsikilo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa hoy izahay taminy: «Olo-marina izahay fa tsy mpitsikilo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Roa ambin’ny folo mirahalahy izahay no zanaky ny rainay, ka ny iray dia efa tsy ao intsony fa ny faralahy kosa dia nijanona any Kanahàna miaraka amin’ny rainay.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Saingy ilay lehilahy tompon’ny tany dia namaly anay fa te hahafantatra raha tena olo-marina tokoa izahay ka nanao hoe: «Aoka ny iray aminareo hijanona eto amiko; fa ianareo sisa kosa mandehana, ento ny vary ho any amin’ny fianakavianareo mosarena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia ento aty amiko ny zandrinareo faralahy. Amin’izay dia ho fantatro fa tsy mpitsikilo ianareo fa olo-marina tokoa; dia haveriko aminareo i Simehôna rahalahinareo, ary hahazo mivezivezy eto amin’ny tany ianareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nony nararak’izy ireo ny tao an-kitapony, dia indro samy am-ponosana tao an-kitapony avy ny volany. Ary rehefa nahita ireo vola voafono toy izany izy mbamin’ny rainy, dia samy raiki-tahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ka hoy i Jakôba rainy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tianareo tsy hanan-janaka ve aho? I Jôsefa efa tsy eo, i Simehôna koa efa tsy eo, ary izao dia halainareo amiko indray i Benjamîna! Izaho no ianjadian’izany rehetra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa hoy i Reobena tamin-drainy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vonoy ny zanako roa lahy raha tsy tongako eto aminao indray i Benjamîna; fa atolory ahy izy, dia izaho no hamerina azy eto aminao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hoy kosa i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, tsy handeha hidina miaraka aminareo ny zanako. Efa maty ny rahalahiny, ary izy irery no sisa. Raha hisy fahavoazana manjo azy eny an-dalana, dia ianareo no hahatonga ity tenako efa antitra ity ho difotr’alahelo hankany amin’ny toeran’ny maty.
