document_id: GEN.42,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Naniraka ireo zanany hankany Ejipta i Jakôba
  - type: text
    content: 'Fantatr’i Jakôba fa misy vary any Ejipta, ka hoy izy tamin’ireo zanany lahy:'
  - type: text
    content: '–Nahoana no mifampijery fotsiny eto ianareo? '
  '10':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: '–Tsia, tompoko ô! Tonga mba hividy sakafo fotsiny izahay mpanomponao. '
  '11':
  - type: text
    content: Zanak’olona iray ihany izahay rehetra ireto; olo-marina fa tsy mba mpitsikilo akory izahay mpanomponao.
  '12':
  - type: text
    content: 'Ary hoy i Jôsefa taminy:'
  - type: text
    content: –Tsia, fa hizaha izay toerana mora hanafihana eto amin’ny tany no nahatongavanareo.
  '13':
  - type: text
    content: 'Namaly kosa ireo hoe:'
  - type: text
    content: –Misy 12 mirahalahy izahay mpanomponao, zanak’olona iray ihany any amin’ny tany Kanahàna; ary indro ny faralahy aminay aza dia nijanona any amin’ny rainay, fa ny iray kosa efa tsy ao intsony.
  '14':
  - type: text
    content: 'Hoy indray i Jôsefa taminy:'
  - type: text
    content: '–Izany indrindra no efa nilazako anareo hoe mpitsikilo ianareo. '
  '15':
  - type: text
    content: 'Koa izao no fizahan-toetra hatao aminareo: Velona ny '
  - type: text
    content: Farao
  - type: text
    content: ', ka mianiana aho fa tsy hiala eto mihitsy ianareo raha tsy tonga eto izany zandrinareo faralahy izany. '
  '16':
  - type: text
    content: Maniraha anankiray aminareo haka azy, fa ianareo sisa kosa dia hatao an-tranomaizina. Ho hita amin’izany ny fahamarinan’ny teninareo. Fa raha tsy izany kosa, velona ny Farao, ka manizinginzina aho fa mpitsikilo tokoa ianareo.
  '17':
  - type: text
    content: 'Nataon’i Jôsefa an-tranomaizina nandritra ny telo andro izy rehetra. '
  '18':
  - type: text
    content: 'Ary tamin’ny andro fahatelo dia hoy i Jôsefa taminy:'
  - type: text
    content: '–Izao no ataovy, dia ho velona ianareo, satria izaho koa mba manaja an’Andriamanitra. '
  '19':
  - type: text
    content: 'Raha olo-marina tokoa ianareo, dia aoka ny anankiray aminareo hijanona ao an-tranomaizina nitazonana anareo; fa ianareo sisa kosa mandehana mitondra ny vary ho any amin’ny fianakavianareo mosarena. '
  '2':
  - type: text
    content: Indro, reko fa misy vary any Ejipta. Koa andeha midina any mividy vary ho antsika
  - type: note
    content: Ampit Asa 7.12.
  - type: text
    content: ', mba ho velona isika fa tsy ho faty.'
  '20':
  - type: text
    content: Avy eo dia ento aty amiko ny zandrinareo faralahy, amin’izay dia ho voaporofo fa marina ny teninareo ka tsy ho faty ianareo.
  - type: text
    content: 'Dia nanaiky izany izy, '
  '21':
  - type: text
    content: 'nefa nifampiresaka hoe:'
  - type: text
    content: –Tena meloka tokoa isika noho ny amin’ny rahalahintsika izay hitantsika ny fahoriam-panahiny tamin’ny fiangaviany antsika, nefa tsy mba nohenointsika; ary izao dia manody antsika izany.
  '22':
  - type: text
    content: 'Dia niteny i Reobena hoe:'
  - type: text
    content: '–Moa tsy efa nilaza taminareo ve aho hoe: «Aza manao heloka bevava amin’i Jôsefa leiretsy», kanefa tsy nihaino ahy ianareo'
  - type: note
    content: Jereo Gen 37.21-22.
  - type: text
    content: . Koa izao dia manody antsika ny rany.
  '23':
  - type: text
    content: 'Tsy nampoizin’ireo hoe fantatr’i Jôsefa ny teniny, satria mpandika teny no niresahany taminy. '
  '24':
  - type: text
    content: Dia nihodina niala teo anatrehany aloha i Jôsefa mba hitomany.
  - type: heading
    content: Niverina nody any Kanahàna ireo zanakalahin’i Jakôba
  - type: text
    content: 'Ary niverina teo amin’ireto rahalahiny indray i Jôsefa ka nilaza taminy fa i Simehôna no hotazoniny, sady nafatony teo imason’izy ireo. '
  '25':
  - type: text
    content: 'Avy eo dia nasainy nofenoina vary ny kitapon’izy ireo, ary naverina tao an-kitapony avy koa ny volan’ny isan-dahy sady nomena vatsy hoentiny eny an-dàlana. Dia notanterahina izany. '
  '26':
  - type: text
    content: Ary nataingin’izy mirahalahy avy teo ambony borikiny ny kitapom-bary, dia lasa izy.
  '27':
  - type: text
    content: 'Ary nony mby teo amin’ny toerana handriany hariva izy ireo, dia nosokafan’ny anankiray ny kitapony mba hanomezany sakafo ho an’ny borikiny, nefa indro ny volany hitany teo am-bavan’ny kitapo. '
  '28':
  - type: text
    content: 'Dia niteny tamin’ireo rahalahiny izy hoe:'
  - type: text
    content: –Naverina ny volako, fa io anaty kitapoko io!
  - type: text
    content: 'Dia nivarahontsana izy ireo sady raiki-tahotra ka nifanontany hoe: «Inona izao ataon’Andriamanitra amintsika izao?»'
  '29':
  - type: text
    content: 'Nony tonga tany Kanahàna teo amin’i Jakôba rainy izy ireo, dia nitantara taminy ny zava-niseho rehetra ka nanao hoe:'
  '3':
  - type: text
    content: 'Dia nidina tany Ejipta ireo zokin’i Jôsefa folo lahy mba hividy vary. '
  '30':
  - type: text
    content: '–Ilay lehilahy tompon’ny tany dia nandrahona anay ka nilaza anay ho mpitsikilo. '
  '31':
  - type: text
    content: 'Fa hoy izahay taminy: «Olo-marina izahay fa tsy mpitsikilo. '
  '32':
  - type: text
    content: 'Roa ambin’ny folo mirahalahy izahay no zanaky ny rainay, ka ny iray dia efa tsy ao intsony fa ny faralahy kosa dia nijanona any Kanahàna miaraka amin’ny rainay.» '
  '33':
  - type: text
    content: 'Saingy ilay lehilahy tompon’ny tany dia namaly anay fa te hahafantatra raha tena olo-marina tokoa izahay ka nanao hoe: «Aoka ny iray aminareo hijanona eto amiko; fa ianareo sisa kosa mandehana, ento ny vary ho any amin’ny fianakavianareo mosarena. '
  '34':
  - type: text
    content: Dia ento aty amiko ny zandrinareo faralahy. Amin’izay dia ho fantatro fa tsy mpitsikilo ianareo fa olo-marina tokoa; dia haveriko aminareo i Simehôna rahalahinareo, ary hahazo mivezivezy eto amin’ny tany ianareo.»
  '35':
  - type: text
    content: 'Ary nony nararak’izy ireo ny tao an-kitapony, dia indro samy am-ponosana tao an-kitapony avy ny volany. Ary rehefa nahita ireo vola voafono toy izany izy mbamin’ny rainy, dia samy raiki-tahotra. '
  '36':
  - type: text
    content: 'Ka hoy i Jakôba rainy taminy:'
  - type: text
    content: –Tianareo tsy hanan-janaka ve aho? I Jôsefa efa tsy eo, i Simehôna koa efa tsy eo, ary izao dia halainareo amiko indray i Benjamîna! Izaho no ianjadian’izany rehetra izany.
  '37':
  - type: text
    content: 'Fa hoy i Reobena tamin-drainy:'
  - type: text
    content: –Vonoy ny zanako roa lahy raha tsy tongako eto aminao indray i Benjamîna; fa atolory ahy izy, dia izaho no hamerina azy eto aminao!
  '38':
  - type: text
    content: 'Hoy kosa i Jakôba hoe:'
  - type: text
    content: –Tsia, tsy handeha hidina miaraka aminareo ny zanako. Efa maty ny rahalahiny, ary izy irery no sisa. Raha hisy fahavoazana manjo azy eny an-dalana, dia ianareo no hahatonga ity tenako efa antitra ity ho difotr’alahelo hankany amin’ny toeran’ny maty.
  '4':
  - type: text
    content: 'Tsy nalefan’i Jakôba niaraka tamin’ireo rahalahiny kosa i Benjamîna zandrin’i Jôsefa, fa hoy izy hoe: «Sao misy loza hanjo azy any.» '
  '5':
  - type: text
    content: Dia tonga hividy vary tany Ejipta toy ny hafa ireo zanakalahin’i Jakôba, fa tratry ny mosary koa ny tany Kanahàna.
  - type: heading
    content: Nodian’i Jôsefa tsy fantatra ireo rahalahiny
  '6':
  - type: text
    content: 'I Jôsefa no mpitondra ny tany Ejipta, ka izy no mpivaro-bary tamin’ireo olon’ny tany hafa rehetra. Koa tonga niankohoka tamin’ny tany teo anatrehan’i Jôsefa ireo rahalahiny. '
  '7':
  - type: text
    content: 'Vao hitan’i Jôsefa ireo rahalahiny, dia fantany; saingy mody niseho ho vahiny taminy kosa i Jôsefa sady nandrahona azy hoe:'
  - type: text
    content: –Avy aiza moa ianareo?
  - type: text
    content: 'Hoy kosa ireo hoe:'
  - type: text
    content: –Avy any amin’ny tany Kanahàna izahay. Tonga mba hividy sakafo.
  '8':
  - type: text
    content: 'Koa fantatr’i Jôsefa ireto rahalahiny, fa izy ireo kosa tsy nahafantatra azy. '
  '9':
  - type: text
    content: Tsaroan’i Jôsefa ny nofiny momba azy ireo
  - type: note
    content: Jereo Gen 37.5-9.
  - type: text
    content: ', ka hoy indray izy hoe:'
  - type: text
    content: –Mpitsikilo ianareo! Hizaha izay toerana mora hanafihana eto amin’ny tany no nahatongavanareo.
