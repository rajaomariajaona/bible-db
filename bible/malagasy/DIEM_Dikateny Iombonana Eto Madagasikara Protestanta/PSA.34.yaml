document_id: PSA.34,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Nafahan’ny Tompo tamin’ny tahotro rehetra aho
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nataon’i Davida, fony izy nody adala teo anatrehan’i Abimeleka
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Sam 21.11-16. –
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Abimeleka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' anarana nentin’ny andriana filistinina maro (Gen 20.2; 21.22; 26.1).'
      marker-yv: yv-n
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia noroahiny ka lasa nandeha.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: ALEFA
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mankatoava ny TOMPO, ianareo vahoakany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy mahory ny mpankatò Azy.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: KAFA
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ireo mpanankarena aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mety tsy ampy hanina ka ho noana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mitady ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba ho orin-java-tsoa.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: LAMEDA
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia hihaino ahy ianareo, rey anaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hampianariko hanaja ny TOMPO.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: MEMA
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misy olona mankamamy fiainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka te ho ela velona sy ho sambatra,
  - type: usfm
    marker: sp
    children:
    - type: text
      text: NONA
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy maintsy mitandrina tsy hiteny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa mitandrina tsy hilaza fitaka,
  - type: usfm
    marker: sp
    children:
    - type: text
      text: SAMEKA
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiala amin’ny ratsy ka hanao ny tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haharitra hikatsaka fiadanana.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: HAINA
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsinjovin’ny TOMPO ireo olo-marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary henoiny hatrany ny antsony.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: PE
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toherin’ny TOMPO kosa ny mpanao ratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voatsiahy ao amin’ny 1Pt 3.10-12 ny and 13-17a.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka fongorany tsy eo amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatsiarovana azy ireny.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: TSADE
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao miantso vonjy ny olo-marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia henoin’ny TOMPO sy afahany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’izay fahoriany rehetra.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: KÔFA
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa akaikin’ny torotoro fo IZY
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamonjy ny rera-tsaina.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: RESA
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisaotra ny TOMPO lalandava aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hitsahatra hidera Azy ny vavako.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: BETA
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na maro fahoriana aza ny olo-marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia afahan’ny TOMPO amin’izany rehetra izany.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: SINA
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arovan’ny Tompo avokoa ny rantsam-batany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy tapaka na taolana iray aza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voatsiahy ao amin’ny Jôh 19.36 ny faran’ny and 21.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: sp
    children:
    - type: text
      text: TAO
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fatin’ny haratsiany kosa ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hohelohina ny mpankahala olo-marina.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjen’ny TOMPO hatrany ny ain’ny mpanompony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy hohelohina izay mialoka aminy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no reharehako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa mifalia, ry mpandefitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa mandre ny fideràko Azy.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: GIMELA
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankalazà ny TOMPO miaraka amiko ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka hiara-manandratra ny voninahiny isika.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: DALETA
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitady ny TOMPO aho, dia novaliany vavaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nafahany avokoa ny tahotro rehetra.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: HE
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijere Azy ianareo, dia aoka ho mirana;
  - type: usfm
    marker: sp
    children:
    - type: text
      text: VAO
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tavanareo tsy ho safo-kenatra intsony.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: ZAINA
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niantso vonjy aho fa olo-mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nohenoin’ny TOMPO sy novonjeny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’izay fahoriako rehetra.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: HETA
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjelin
    - type: text
      text: ’ny TOMPO miambina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manodidina ny mpanaja an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manafaka azy amin’ny loza.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: TETA
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andramo sy jereo fa tsara ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1Pt 2.3.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny olona mialoka aminy!
  - type: usfm
    marker: sp
    children:
    - type: text
      text: JODA
    marker-yv: yv-h
