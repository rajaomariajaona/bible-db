document_id: PSA.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Nafahan’ny Tompo tamin’ny tahotro rehetra aho
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida, fony izy nody adala teo anatrehan’i Abimeleka
  - type: text
    content: ' '
  - type: note
    content: 'Jereo 1 Sam 21.11-16. – Abimeleka: anarana nentin’ny andriana filistinina maro (Gen 20.2; 21.22; 26.1).'
  - type: text
    content: ', '
  - type: text
    content: dia noroahiny ka lasa nandeha.
  - type: heading
    content: ALEFA
  '10':
  - type: text
    content: 'Mankatoava ny TOMPO, ianareo vahoakany:'
  - type: text
    content: fa tsy misy mahory ny mpankatò Azy.
  - type: heading
    content: KAFA
  '11':
  - type: text
    content: Na dia ireo mpanankarena aza,
  - type: text
    content: mety tsy ampy hanina ka ho noana;
  - type: text
    content: fa izay mitady ny TOMPO
  - type: text
    content: tsy mba ho orin-java-tsoa.
  - type: heading
    content: LAMEDA
  '12':
  - type: text
    content: Avia hihaino ahy ianareo, rey anaka,
  - type: text
    content: fa hampianariko hanaja ny TOMPO.
  - type: heading
    content: MEMA
  '13':
  - type: text
    content: Raha misy olona mankamamy fiainana
  - type: text
    content: ka te ho ela velona sy ho sambatra,
  - type: heading
    content: NONA
  '14':
  - type: text
    content: dia tsy maintsy mitandrina tsy hiteny ratsy
  - type: text
    content: ary koa mitandrina tsy hilaza fitaka,
  - type: heading
    content: SAMEKA
  '15':
  - type: text
    content: hiala amin’ny ratsy ka hanao ny tsara
  - type: text
    content: ary haharitra hikatsaka fiadanana.
  - type: heading
    content: HAINA
  '16':
  - type: text
    content: Tsinjovin’ny TOMPO ireo olo-marina
  - type: text
    content: ary henoiny hatrany ny antsony.
  - type: heading
    content: PE
  '17':
  - type: text
    content: Toherin’ny TOMPO kosa ny mpanao ratsy
  - type: note
    content: Voatsiahy ao amin’ny 1Pt 3.10-12 ny and 13-17a.
  - type: text
    content: ','
  - type: text
    content: ka fongorany tsy eo amin’ny tany
  - type: text
    content: ny fahatsiarovana azy ireny.
  - type: heading
    content: TSADE
  '18':
  - type: text
    content: Vao miantso vonjy ny olo-marina,
  - type: text
    content: dia henoin’ny TOMPO sy afahany
  - type: text
    content: tamin’izay fahoriany rehetra.
  - type: heading
    content: KÔFA
  '19':
  - type: text
    content: Fa akaikin’ny torotoro fo IZY
  - type: text
    content: sady mamonjy ny rera-tsaina.
  - type: heading
    content: RESA
  '2':
  - type: text
    content: Hisaotra ny TOMPO lalandava aho
  - type: text
    content: ary tsy hitsahatra hidera Azy ny vavako.
  - type: heading
    content: BETA
  '20':
  - type: text
    content: Na maro fahoriana aza ny olo-marina,
  - type: text
    content: dia afahan’ny TOMPO amin’izany rehetra izany.
  - type: heading
    content: SINA
  '21':
  - type: text
    content: Arovan’ny Tompo avokoa ny rantsam-batany
  - type: text
    content: ka tsy hisy tapaka na taolana iray aza
  - type: note
    content: Voatsiahy ao amin’ny Jôh 19.36 ny faran’ny and 21.
  - type: text
    content: .
  - type: heading
    content: TAO
  '22':
  - type: text
    content: Ho fatin’ny haratsiany kosa ny olon-dratsy
  - type: text
    content: ary hohelohina ny mpankahala olo-marina.
  '23':
  - type: text
    content: Vonjen’ny TOMPO hatrany ny ain’ny mpanompony
  - type: text
    content: ary tsy hisy hohelohina izay mialoka aminy.
  '3':
  - type: text
    content: Ny TOMPO no reharehako;
  - type: text
    content: koa mifalia, ry mpandefitra,
  - type: text
    content: rehefa mandre ny fideràko Azy.
  - type: heading
    content: GIMELA
  '4':
  - type: text
    content: Mankalazà ny TOMPO miaraka amiko ianareo,
  - type: text
    content: ary aoka hiara-manandratra ny voninahiny isika.
  - type: heading
    content: DALETA
  '5':
  - type: text
    content: Nitady ny TOMPO aho, dia novaliany vavaka;
  - type: text
    content: ka nafahany avokoa ny tahotro rehetra.
  - type: heading
    content: HE
  '6':
  - type: text
    content: Mijere Azy ianareo, dia aoka ho mirana;
  - type: heading
    content: VAO
  - type: text
    content: ny tavanareo tsy ho safo-kenatra intsony.
  - type: heading
    content: ZAINA
  '7':
  - type: text
    content: Niantso vonjy aho fa olo-mahantra
  - type: text
    content: ka nohenoin’ny TOMPO sy novonjeny
  - type: text
    content: tamin’izay fahoriako rehetra.
  - type: heading
    content: HETA
  '8':
  - type: text
    content: 'Ny '
  - type: text
    content: anjelin
  - type: text
    content: ’ny TOMPO miambina
  - type: text
    content: manodidina ny mpanaja an’Andriamanitra
  - type: text
    content: ka manafaka azy amin’ny loza.
  - type: heading
    content: TETA
  '9':
  - type: text
    content: Andramo sy jereo fa tsara ny TOMPO
  - type: note
    content: Ampit 1Pt 2.3.
  - type: text
    content: .
  - type: text
    content: Sambatra ny olona mialoka aminy!
  - type: heading
    content: JODA
