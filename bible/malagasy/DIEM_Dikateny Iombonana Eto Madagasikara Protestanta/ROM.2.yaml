document_id: ROM.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitsara ara-drariny Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Noho izany, dia tsy afa-tsiny ianao, ry olona izay manameloka ny hafa, na iza na iza ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 7.1; Lk 6.37.
    marker-yv: yv-n
  - type: text
    text: '. Eo am-panamelohana ny hafa no anamelohanao ny tenanao, satria izay ataon’ireo melohinao, ataon’ny tenanao koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatsika fa araka ny hitsiny tokoa ny didim-pitsarana navoakan’Andriamanitra ho an’ireo izay manao ny asa toy ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sa ianao, ry olona izay manameloka ny manao toy ireny, mihevitra ho afa-mandositra ny didim-pitsarana navoakan’Andriamanitra nefa anie ianao koa mba manao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sa be hamoram-po sy fandeferana ary faharetana Andriamanitra ka tsiratsirainao? Tsy fantatrao angaha fa ny hamoràm-pony dia tokony hitarika anao hiala amin’ny toe-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hiala...ratsy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo FTS amin’ny voambolana hoe FIBEBAHANA.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Maditra ianao ary tsy mety mamerina ny fonao aminy, ka dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: ' no avosanao ho an’ny tenanao. Fa ho avy ny andro hampisehoan’Andriamanitra ny fahatezerany sy hitsarany an-karihary ny olombelona ara-drariny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ka hamaliany ny tsirairay araka ny asany avy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 5:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Sef 1.14-18; 2.2-3. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 6:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Sal 62.13; Ohab 24.12.'
    marker-yv: yv-n
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'homeny fiaina-maharitra mandrakizay ireo mitozo manao ny tsara ka mikatsaka ny voninahitra sy ny laza ary ny tsy fahafatesana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'hiharan’ny fahatezeran’Andriamanitra sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: havinirany
  - type: text
    text: ' kosa ireo mpikomy tsy nanaiky hanao izay hitsiny fa nanaiky hanao ny tsy rariny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eny, fahoriana sy tebiteby no hahazo ny olona rehetra fatra-panao ny ratsy, dia ny Jiosy aloha vao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voninahitra sy laza ary fiadanana kosa no ho anjaran’izay rehetra manao ny tsara, dia ny Jiosy aloha vao ny hafa firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tsy mba mizaha tavan’olona Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 10.17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izay rehetra manota ka tsy manana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy, dia ho very saingy tsy noho io lalàna io; fa izay rehetra manota nefa manana ny lalànan’i Mosesy, dia hohelohina araka io lalàna io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsia, tsy izay mihaino fotsiny ny lalàna no hoeken’Andriamanitra ho marina, fa izay manatanteraka ny lalàna no hoeken’Andriamanitra ho marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Eny, tsy manana ny lalànan’i Mosesy ny hafa firenena; nefa raha misy amin’izy ireo manatanteraka fotsiny amin’izao ny voalazan’ny lalàna, dia izy ireo ihany no lalàna ho an’ny tenany, na dia tsy manana ny lalànan’i Mosesy aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Asehon’izy ireo fa voasoratra ao am-pony tokoa ny asan’ny lalàna; ka vavolombelon’izany ny eritreriny izay indraindray miampanga azy, indraindray miaro azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny eritreriny... miaro azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia ny hevitra izay mbetika ifampiampangan’izy samy izy, mbetika ifampiarovany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Araka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' ambarako, dia izany no ho hita amin’ilay andro hitsaran’Andriamanitra ny toetra miafin’ny olona tsirairay avy, amin’ny alalan’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny Jiosy manoloana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: ’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa ahoana àry ny aminao izay mitonona ho Jiosy? Mitoky amin’ny lalànan’i Mosesy ianao sady fatra-pirehareha noho ny amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nampianariny anao ny lalànan’i Mosesy, hoy ianao, ka fantatrao ny sitrapon’Andriamanitra ary hainao fidîna ny soa indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary dia mihevi-tena ho mpitarika ny jamba sy ho fanilon’izay anaty haizina ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ho mpitaiza ny tsy manam-pahendrena sy ho mpampianatra ny ankizy madinika, satria azonao antoka fa ny lalànan’i Mosesy no tena itarafana ny fahalalana feno sy ny hitsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa ahoana àry ity ianao mampianatra ny sasany, nefa tsy mampianatra ny tenanao? Mitory hoe «aza mangalatra», nefa mangalatra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mandrara hoe «aza maka vadin’olona», nefa maka vadin’olona? Miseho ho marikorikon’ny sampy nefa mandroba izay natao fanatitra ho an’ny sampy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fatra-pirehareha ianao fa hoe manana ny lalànan’i Mosesy, nefa mandika ny lalàna, ka manala baràka an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izany tokoa no ilay voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Noho ianareo Jiosy ihany no anevatevana ny anaran’Andriamanitra any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 52.5, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Eny, mahasoa anao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famorana
  - type: text
    text: ' raha manatanteraka ny lalàna ianao; fa raha mandika ny lalàna kosa ianao, dia toy ny tsy voafora mihitsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha ny tsy voafora no mitandrina ny fepetran’ny lalàna, moa tsy hoheverin’Andriamanitra ho voafora ve izy, na dia tsy voafora aza? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa ilay tsy voafora ara-nofo, nefa manatanteraka ny lalàna, no hanameloka anao izay manana ny lalàna voasoratra sy ny famorana nefa mandika ny lalàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tsia, tsy izay miseho etỳ ivelany no tena maha Jiosy ary tsy izay voafora ara-nofo no tena voafora; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: fa ny ao anaty no tena maha Jiosy, ary izay voafora ao am-po no tena voafora noho ny asan’ny Fanahy Masina fa tsy noho ny asan’ny lalàna voasoratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 30.6.
    marker-yv: yv-n
  - type: text
    text: ': ka tsy mba olona no midera azy, fa Andriamanitra mihitsy.'
