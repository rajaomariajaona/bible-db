document_id: ROM.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitsara ara-drariny Andriamanitra
  - type: text
    content: Noho izany, dia tsy afa-tsiny ianao, ry olona izay manameloka ny hafa, na iza na iza ianao
  - type: note
    content: Ampit Mt 7.1; Lk 6.37.
  - type: text
    content: '. Eo am-panamelohana ny hafa no anamelohanao ny tenanao, satria izay ataon’ireo melohinao, ataon’ny tenanao koa. '
  '10':
  - type: text
    content: 'Voninahitra sy laza ary fiadanana kosa no ho anjaran’izay rehetra manao ny tsara, dia ny Jiosy aloha vao ny hafa firenena. '
  '11':
  - type: text
    content: Fa tsy mba mizaha tavan’olona Andriamanitra
  - type: note
    content: Ampit Deot 10.17.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Izay rehetra manota ka tsy manana ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy, dia ho very saingy tsy noho io lalàna io; fa izay rehetra manota nefa manana ny lalànan’i Mosesy, dia hohelohina araka io lalàna io. '
  '13':
  - type: text
    content: 'Tsia, tsy izay mihaino fotsiny ny lalàna no hoeken’Andriamanitra ho marina, fa izay manatanteraka ny lalàna no hoeken’Andriamanitra ho marina. '
  '14':
  - type: text
    content: 'Eny, tsy manana ny lalànan’i Mosesy ny hafa firenena; nefa raha misy amin’izy ireo manatanteraka fotsiny amin’izao ny voalazan’ny lalàna, dia izy ireo ihany no lalàna ho an’ny tenany, na dia tsy manana ny lalànan’i Mosesy aza. '
  '15':
  - type: text
    content: Asehon’izy ireo fa voasoratra ao am-pony tokoa ny asan’ny lalàna; ka vavolombelon’izany ny eritreriny izay indraindray miampanga azy, indraindray miaro azy
  - type: note
    content: 'ny eritreriny... miaro azy: dkt hafa dia ny hevitra izay mbetika ifampiampangan’izy samy izy, mbetika ifampiarovany.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Araka ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' ambarako, dia izany no ho hita amin’ilay andro hitsaran’Andriamanitra ny toetra miafin’ny olona tsirairay avy, amin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: .
  - type: heading
    content: Ny Jiosy manoloana ny lalànan’i Mosesy
  '17':
  - type: text
    content: 'Koa ahoana àry ny aminao izay mitonona ho Jiosy? Mitoky amin’ny lalànan’i Mosesy ianao sady fatra-pirehareha noho ny amin’Andriamanitra. '
  '18':
  - type: text
    content: 'Nampianariny anao ny lalànan’i Mosesy, hoy ianao, ka fantatrao ny sitrapon’Andriamanitra ary hainao fidîna ny soa indrindra. '
  '19':
  - type: text
    content: 'Ary dia mihevi-tena ho mpitarika ny jamba sy ho fanilon’izay anaty haizina ianao, '
  '2':
  - type: text
    content: 'Fantatsika fa araka ny hitsiny tokoa ny didim-pitsarana navoakan’Andriamanitra ho an’ireo izay manao ny asa toy ireny. '
  '20':
  - type: text
    content: 'ho mpitaiza ny tsy manam-pahendrena sy ho mpampianatra ny ankizy madinika, satria azonao antoka fa ny lalànan’i Mosesy no tena itarafana ny fahalalana feno sy ny hitsiny. '
  '21':
  - type: text
    content: 'Koa ahoana àry ity ianao mampianatra ny sasany, nefa tsy mampianatra ny tenanao? Mitory hoe «aza mangalatra», nefa mangalatra? '
  '22':
  - type: text
    content: 'Mandrara hoe «aza maka vadin’olona», nefa maka vadin’olona? Miseho ho marikorikon’ny sampy nefa mandroba izay natao fanatitra ho an’ny sampy? '
  '23':
  - type: text
    content: 'Fatra-pirehareha ianao fa hoe manana ny lalànan’i Mosesy, nefa mandika ny lalàna, ka manala baràka an’Andriamanitra. '
  '24':
  - type: text
    content: 'Izany tokoa no ilay voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Noho ianareo Jiosy ihany no anevatevana ny anaran’Andriamanitra any amin’ny '
  - type: text
    content: hafa firenena
  - type: note
    content: Is 52.5, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '25':
  - type: text
    content: 'Eny, mahasoa anao ny '
  - type: text
    content: famorana
  - type: text
    content: ' raha manatanteraka ny lalàna ianao; fa raha mandika ny lalàna kosa ianao, dia toy ny tsy voafora mihitsy. '
  '26':
  - type: text
    content: 'Raha ny tsy voafora no mitandrina ny fepetran’ny lalàna, moa tsy hoheverin’Andriamanitra ho voafora ve izy, na dia tsy voafora aza? '
  '27':
  - type: text
    content: 'Koa ilay tsy voafora ara-nofo, nefa manatanteraka ny lalàna, no hanameloka anao izay manana ny lalàna voasoratra sy ny famorana nefa mandika ny lalàna. '
  '28':
  - type: text
    content: 'Tsia, tsy izay miseho etỳ ivelany no tena maha Jiosy ary tsy izay voafora ara-nofo no tena voafora; '
  '29':
  - type: text
    content: fa ny ao anaty no tena maha Jiosy, ary izay voafora ao am-po no tena voafora noho ny asan’ny Fanahy Masina fa tsy noho ny asan’ny lalàna voasoratra
  - type: note
    content: Ampit Deot 30.6.
  - type: text
    content: ': ka tsy mba olona no midera azy, fa Andriamanitra mihitsy.'
  '3':
  - type: text
    content: 'Sa ianao, ry olona izay manameloka ny manao toy ireny, mihevitra ho afa-mandositra ny didim-pitsarana navoakan’Andriamanitra nefa anie ianao koa mba manao? '
  '4':
  - type: text
    content: Sa be hamoram-po sy fandeferana ary faharetana Andriamanitra ka tsiratsirainao? Tsy fantatrao angaha fa ny hamoràm-pony dia tokony hitarika anao hiala amin’ny toe-dratsy
  - type: note
    content: 'hiala...ratsy: jereo FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: '? '
  '5':
  - type: text
    content: 'Maditra ianao ary tsy mety mamerina ny fonao aminy, ka dia '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' no avosanao ho an’ny tenanao. Fa ho avy ny andro hampisehoan’Andriamanitra ny fahatezerany sy hitsarany an-karihary ny olombelona ara-drariny, '
  '6':
  - type: text
    content: ka hamaliany ny tsirairay araka ny asany avy
  - type: note
    content: 'And 5: jereo Sef 1.14-18; 2.2-3. –And 6: ampit Sal 62.13; Ohab 24.12.'
  - type: text
    content: ': '
  '7':
  - type: text
    content: 'homeny fiaina-maharitra mandrakizay ireo mitozo manao ny tsara ka mikatsaka ny voninahitra sy ny laza ary ny tsy fahafatesana; '
  '8':
  - type: text
    content: 'hiharan’ny fahatezeran’Andriamanitra sy '
  - type: text
    content: havinirany
  - type: text
    content: ' kosa ireo mpikomy tsy nanaiky hanao izay hitsiny fa nanaiky hanao ny tsy rariny. '
  '9':
  - type: text
    content: 'Eny, fahoriana sy tebiteby no hahazo ny olona rehetra fatra-panao ny ratsy, dia ny Jiosy aloha vao ny '
  - type: text
    content: hafa firenena
  - type: text
    content: '. '
