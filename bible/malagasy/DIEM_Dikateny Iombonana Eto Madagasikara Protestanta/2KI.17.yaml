document_id: 2KI.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Hôsea mpanjakan’i Israely; ny nahazoana an’i Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona faha-12 nanjakan’i Ahaza tamin’i Joda no tonga mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' tao Samaria i Hôsea zanakalahin’i Elà; ary naharitra sivy taona no nanjakany tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanao izay ratsy eo imason’ny TOMPO izy nefa tsy dia tahaka ny nataon’ireo mpanjakan’i Israely talohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tonga nanafika azy i Salmanesera mpanjakan’i Asiria, koa dia nanaiky handoa hetra ho azy i Hôsea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tato aoriana anefa dia nikomy taminy i Hôsea, satria sady nandefa iraka tany amin’ny mpanjakan’i Ejipta tany Saîsa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tamin’izany fotoana izany, i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saîsa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tao amin’ny faritry ny vinanin’i Neily no renivohitr’i Ejipta.'
    marker-yv: yv-n
  - type: text
    text: ' izy no tsy nety nandoa ny hetrany isan-taona ho an’ny mpanjakan’i Asiria intsony. Koa rehefa hitan’i Salmanesera izany fikomiana izany, dia nasainy nosamborina sy nogadraina i Hôsea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nidirany an-kery ny tany ary nataony fahirano i Samaria nandritra ny telo taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tamin’ny taona fahasivy nanjakan’i Hôsea no nahazoan’ny mpanjakan’i Asiria an’i Samaria; ka dia nataony sesitany tany Asiria ny Israelita tavaratra ary namponeniny tao Halà sy tao Gôzàna teo amoron’ny ony Habôra ary teny amin’ny tanànan’i Media
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tamin’ny 722 na 721 tal J.K, dia i Sargôna II mpanjaka, rahalahin’i Salmanesera V sy mpandimby azy no naka an’i Samaria. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Halà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toerana any Mezôpôtamia avaratra (jereo Gen 10.11); '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gôzàna:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mbola toerana any Mezôpôtamia avaratra; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Habôra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Khabur ankehitriny, sampan’ony havia amin’ny ony Eofrata; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Media:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tany ao atsinanan’i Asiria sy atsimon’ny Ranomasina Kaspienina.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahatonga ny faharavan’ny fanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tonga izany rehetra izany noho ny nanotan’ny Israelita tavaratra tamin’ny TOMPO Andriamaniny Izay nanafaka azy teo ambany fifehezan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' mpanjakan’i Ejipta sy nitondra azy niala tao amin’io tany io. Fa nanompo andriamani-kafa ireo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka nanaraka ny fanaon’ny hafa firenena izay efa noroahin’ny TOMPO tsy ho eo anoloan’ny Israelita ary koa nanaraka ny fomba noforonin’ireo mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Avaho tsara ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israelita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 7) izay ilazana ny foko folo tao Israely fanjakana avaratra sy ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israelita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 8) izay manondro ny foko 12 mitambatra ary ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 8) izay ilazana ny fanjakana avaratra mahafaoka ny foko folo.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Niteny ratsy ny TOMPO Andriamaniny izy ka nanorina toeram-panasinana teny an-tanànany rehetra teny, manomboka amin’ny tilikambom-piambenana ka hatrany amin’ny tanànamimanda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nananganany tsangambaton-tsampy sy tsatokazo fanajana an’i Aserà teny an-tampon-kavoana nisy hazo midoroboka maitso rehetra teny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.10 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 9-10:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 14.23.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia nandoro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' hanetona teny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinana
  - type: text
    text: ' rehetra koa izy tahaka ny nataon’ireo hafa firenena izay noroahin’ny TOMPO tsy ho eo anoloany. Nahavita zava-dratsy tokoa ny Israelita, hany ka nampahatezitra ny TOMPO: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: nanompo sampy izy na dia efa noraran’ny TOMPO tsy hanao izany aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nampitandrina ny vahoakan’i Israely sy i Joda tamin’ny alalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sy mpahita rehetra ny TOMPO nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ialao ny toe-dratsinareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sahabo ho 150 taona tatỳ aoriana dia niteny tahaka izany koa i Jeremià (18.11) sy i Ezekiela (33.11).
    marker-yv: yv-n
  - type: text
    text: ' ka tandremo ny didy sy baiko nataoko araka ny lalàna manontolo izay nandidiako ny razanareo sy nampitondraiko ireo mpaminany mpanompoko ho anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa tsy nihaino izany izy roa tonta fa nanamafy hatoka tahaka ireo razany izay tsy nino ny TOMPO Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nolaviny ny lalànan’Andriamanitra sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' izay nataony tamin’ny razany ary ny fampitandremana nananarany azy. Nanenjika zava-poana izy ka dia tonga zava-poana koa; ary nanaraka ny hafa firenena manodidina azy sady efa nandraran’ny TOMPO azy tsy hotahafina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nafoiny avokoa ny didin’ny TOMPO Andriamaniny, ka nanao sarivongan’ombilahikely anankiroa izy sy nanangana tsatokazo fanajana an’i Aserà ary niankohoka teo anatrehan’ny planeta aman-kintana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 12.28.
    marker-yv: yv-n
  - type: text
    text: ' sady nanompo an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nanolotra ny zanany lahy sy vavy ho sorona dorana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 16.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izy, sady nanao majika sy sikidy, ary nivarilavo nanao izay ratsy eo imason’ny TOMPO, ka nampahatezitra Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia vinitra tamin’ny Israelita ny TOMPO ka nanaisotra azy tsy ho hitan’ny masony. Ny fokon’i Joda ihany no sisa tafajanona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Na dia i Joda koa aza tsy nitandrina ny didin’ny TOMPO Andriamaniny, fa nanaraka ny fomba najoron’ny Israelita tavaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izany no nandavan’ny TOMPO ny taranak’i Israely rehetra ka nampahoriny azy sy nanolorany azy ho eo an-tanan’ny mpandroba ary farany hanesorany azy ho lavitra ny fanatrehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehefa nendahan’ny TOMPO tamin’ny fianakavian’i Davida
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 12.
    marker-yv: yv-n
  - type: text
    text: ' i Israely, dia natsangany ho mpanjaka i Jerôbohama zanakalahin’i Nebata izay nampiala an’i Israely avaratra tamin’ny TOMPO sy nitarika azy tamin’ny fahotana lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nizoran’ny Israelita hatrany fa tsy nialany akory ny fahotana rehetra izay nataon’i Jerôbohama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Farany dia nesorin’ny TOMPO ho lavitra ny fanatrehany mihitsy ireo, araka ny nambarany tamin’ny alalan’ny mpaminany rehetra mpanompony; ka voababo lavitry ny taniny tokoa izy ho any Asiria izay mbola misy azy mandraka ankehitriny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanompoan-tsampy tany Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa nitondra olona avy tany Babilôna sy Kotà na avy tany Havà sy Hamata ary Sefarvaîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Babilôna... Sefarvaîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana izay nalain’ny mpanjakan’i Asiria. –Ireo mpanjakan’i Asiria, tahaka ireo an’i Babilôna, dia matetika nanao sesitany ny mponina resy mba hahatsara antoka ny fanjakazakany.
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjakan’i Asiria mba hapetrany amin’ireo tanànan’i Samaria hisolo ny Israelita izay voasesitany; ireo no nahazo ny faritr’i Samaria ho fananany ka nitoetra tamin’ny tanànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha vao nanomboka nipetraka tamin’ireny toerana ireny izy, dia tsy nanaja ny TOMPO ka nandefasany liona izay nahafaty maro taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nilazana ny mpanjakan’i Asiria hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny olona izay nafindranao sy nampitoerinao teny amin’ny tanànan’i Samaria dia tsy mahalala izay fomba fanao amin’ny Andriamanitry ny tany any ka dia nandefasany liona izay nahafaty maro taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa nanome baiko ny mpanjakan’i Asiria nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Maniraha mpisorona iray amin’ireo nataonareo sesitany mba handeha honina any, ka hampianatra azy ny fomba fanompoana ny Andriamanitry ny tany any.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izany no nahatonga ny mpisorona voasesitany iray avy tany Samaria honina tao Betela ka nampianatra ny mponina ny fomba fanajana ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Kanefa mbola samy nanao sarivongan’ny andriamaniny avy ny isam-pirenena ka nametraka izany tao amin’ireo tranon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinana
  - type: text
    text: ', trano izay namboarin’ny mponina taloha tany Samaria; eny, samy nanao izany avokoa ny isam-pirenena tao amin’ny tanàna nitoerany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ny olona avy any Babilôna dia nanao sarivongan’i Sokôta-Benôta; ny avy any Kota nanao sarivongan’i Nergala; ny avy any Hamata nanao sarivongan’i Asimà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ny Havita nanao sarivongan’i Nibihaza sy i Tartàka; ny olona avy any Sefarvaîma aza nanolotra ny zanany ho sorona dorana tamin’i Adramelèka sy Hanamelèka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ity lisitry ny andriamanitra vahiny ity, dia i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nergala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ihany no fantatra fa andriamanitra nivavahana tany Mezôpôtamia.'
    marker-yv: yv-n
  - type: text
    text: ' andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nanaja ny TOMPO koa izy rehetra ka nanendry olona avy tamin’ny sarambabem-bahoaka ihany ho mpisorona amin’ireny tranon’ny toeram-panasinana ireny ary hitarika ny fombam-pivavahana amin’ny anaran’ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Koa sady nanaja ny TOMPO izy no mbola nanompo ny andriamaniny avy ihany koa araka ny fomba fanaon’ny firenena niaviany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny taranak’ireo vahiny ireo dia mbola manarakaraka izany fomba tranainy izany mandraka androany, fa tsy tena manaja marina ny TOMPO. Samy tsy tena arahiny na ny fomban-drazany, na ny lalàna sy ny didy izay nandidian’ny TOMPO ny taranak’i Jakôba, dia ilay Jakôba nomeny anarana hoe Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 32.29; 35.10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Rehefa nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' taminy manko ny TOMPO, dia nanome azy izao didy izao hoe: Aza manaja ny andriamani-kafa; aza miankohoka aminy ary aza manompo azy na manao sorona aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa ny TOMPO Izay nitondra anao niala tany Ejipta tamin-kery lehibe sy tamim-pahefana tsy hay tohaina no hany hohajainareo sy hiankohofanareo ary hanoloranareo sorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary aoka hotandremanareo isan’andro ny didy sy ny lalàna ary ny didy izay nosoratany ho anareo; aza manaja ny andriamani-kafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Aza hadinoina ny fanekempihavanana nataoko taminareo ary aza manaja ny andriamani-kafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Izaho TOMPO Andriamanitrareo no aoka hohajainareo, fa Izaho ihany no mahavonjy anareo amin’ny fahavalonareo rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.39 '
    - type: usfm
      marker: ft
