document_id: 2KI.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Hôsea mpanjakan’i Israely; ny nahazoana an’i Samaria
  - type: text
    content: 'Tamin’ny taona faha-12 nanjakan’i Ahaza tamin’i Joda no tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' tao Samaria i Hôsea zanakalahin’i Elà; ary naharitra sivy taona no nanjakany tao. '
  '10':
  - type: text
    content: Nananganany tsangambaton-tsampy sy tsatokazo fanajana an’i Aserà teny an-tampon-kavoana nisy hazo midoroboka maitso rehetra teny
  - type: note
    content: 'And 9-10: jereo 1 Mp 14.23.'
  - type: text
    content: '; '
  '11':
  - type: text
    content: 'dia nandoro '
  - type: text
    content: sorona
  - type: text
    content: ' hanetona teny amin’ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' rehetra koa izy tahaka ny nataon’ireo hafa firenena izay noroahin’ny TOMPO tsy ho eo anoloany. Nahavita zava-dratsy tokoa ny Israelita, hany ka nampahatezitra ny TOMPO: '
  '12':
  - type: text
    content: nanompo sampy izy na dia efa noraran’ny TOMPO tsy hanao izany aza.
  '13':
  - type: text
    content: 'Nampitandrina ny vahoakan’i Israely sy i Joda tamin’ny alalan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy mpahita rehetra ny TOMPO nanao hoe:'
  - type: text
    content: –Ialao ny toe-dratsinareo
  - type: note
    content: Sahabo ho 150 taona tatỳ aoriana dia niteny tahaka izany koa i Jeremià (18.11) sy i Ezekiela (33.11).
  - type: text
    content: ' ka tandremo ny didy sy baiko nataoko araka ny lalàna manontolo izay nandidiako ny razanareo sy nampitondraiko ireo mpaminany mpanompoko ho anareo.'
  '14':
  - type: text
    content: 'Nefa tsy nihaino izany izy roa tonta fa nanamafy hatoka tahaka ireo razany izay tsy nino ny TOMPO Andriamaniny. '
  '15':
  - type: text
    content: 'Nolaviny ny lalànan’Andriamanitra sy ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' izay nataony tamin’ny razany ary ny fampitandremana nananarany azy. Nanenjika zava-poana izy ka dia tonga zava-poana koa; ary nanaraka ny hafa firenena manodidina azy sady efa nandraran’ny TOMPO azy tsy hotahafina. '
  '16':
  - type: text
    content: Nafoiny avokoa ny didin’ny TOMPO Andriamaniny, ka nanao sarivongan’ombilahikely anankiroa izy sy nanangana tsatokazo fanajana an’i Aserà ary niankohoka teo anatrehan’ny planeta aman-kintana
  - type: note
    content: Jereo 1 Mp 12.28.
  - type: text
    content: ' sady nanompo an’i '
  - type: text
    content: Bahala
  - type: text
    content: '. '
  '17':
  - type: text
    content: Nanolotra ny zanany lahy sy vavy ho sorona dorana
  - type: note
    content: Jereo 16.3 sy nta.
  - type: text
    content: ' izy, sady nanao majika sy sikidy, ary nivarilavo nanao izay ratsy eo imason’ny TOMPO, ka nampahatezitra Azy. '
  '18':
  - type: text
    content: Dia vinitra tamin’ny Israelita ny TOMPO ka nanaisotra azy tsy ho hitan’ny masony. Ny fokon’i Joda ihany no sisa tafajanona.
  '19':
  - type: text
    content: 'Na dia i Joda koa aza tsy nitandrina ny didin’ny TOMPO Andriamaniny, fa nanaraka ny fomba najoron’ny Israelita tavaratra. '
  '2':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO izy nefa tsy dia tahaka ny nataon’ireo mpanjakan’i Israely talohany. '
  '20':
  - type: text
    content: Izany no nandavan’ny TOMPO ny taranak’i Israely rehetra ka nampahoriny azy sy nanolorany azy ho eo an-tanan’ny mpandroba ary farany hanesorany azy ho lavitra ny fanatrehany.
  '21':
  - type: text
    content: Rehefa nendahan’ny TOMPO tamin’ny fianakavian’i Davida
  - type: note
    content: Jereo 1 Mp 12.
  - type: text
    content: ' i Israely, dia natsangany ho mpanjaka i Jerôbohama zanakalahin’i Nebata izay nampiala an’i Israely avaratra tamin’ny TOMPO sy nitarika azy tamin’ny fahotana lehibe. '
  '22':
  - type: text
    content: 'Ary nizoran’ny Israelita hatrany fa tsy nialany akory ny fahotana rehetra izay nataon’i Jerôbohama. '
  '23':
  - type: text
    content: Farany dia nesorin’ny TOMPO ho lavitra ny fanatrehany mihitsy ireo, araka ny nambarany tamin’ny alalan’ny mpaminany rehetra mpanompony; ka voababo lavitry ny taniny tokoa izy ho any Asiria izay mbola misy azy mandraka ankehitriny.
  - type: heading
    content: Fanompoan-tsampy tany Samaria
  '24':
  - type: text
    content: Fa nitondra olona avy tany Babilôna sy Kotà na avy tany Havà sy Hamata ary Sefarvaîma
  - type: note
    content: 'Babilôna... Sefarvaîma: toerana izay nalain’ny mpanjakan’i Asiria. –Ireo mpanjakan’i Asiria, tahaka ireo an’i Babilôna, dia matetika nanao sesitany ny mponina resy mba hahatsara antoka ny fanjakazakany.'
  - type: text
    content: ' ny mpanjakan’i Asiria mba hapetrany amin’ireo tanànan’i Samaria hisolo ny Israelita izay voasesitany; ireo no nahazo ny faritr’i Samaria ho fananany ka nitoetra tamin’ny tanànany. '
  '25':
  - type: text
    content: 'Raha vao nanomboka nipetraka tamin’ireny toerana ireny izy, dia tsy nanaja ny TOMPO ka nandefasany liona izay nahafaty maro taminy. '
  '26':
  - type: text
    content: 'Dia nilazana ny mpanjakan’i Asiria hoe:'
  - type: text
    content: –Ny olona izay nafindranao sy nampitoerinao teny amin’ny tanànan’i Samaria dia tsy mahalala izay fomba fanao amin’ny Andriamanitry ny tany any ka dia nandefasany liona izay nahafaty maro taminy.
  '27':
  - type: text
    content: 'Koa nanome baiko ny mpanjakan’i Asiria nanao hoe:'
  - type: text
    content: –Maniraha mpisorona iray amin’ireo nataonareo sesitany mba handeha honina any, ka hampianatra azy ny fomba fanompoana ny Andriamanitry ny tany any.
  '28':
  - type: text
    content: Izany no nahatonga ny mpisorona voasesitany iray avy tany Samaria honina tao Betela ka nampianatra ny mponina ny fomba fanajana ny TOMPO.
  '29':
  - type: text
    content: 'Kanefa mbola samy nanao sarivongan’ny andriamaniny avy ny isam-pirenena ka nametraka izany tao amin’ireo tranon’ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ', trano izay namboarin’ny mponina taloha tany Samaria; eny, samy nanao izany avokoa ny isam-pirenena tao amin’ny tanàna nitoerany: '
  '3':
  - type: text
    content: 'Tonga nanafika azy i Salmanesera mpanjakan’i Asiria, koa dia nanaiky handoa hetra ho azy i Hôsea. '
  '30':
  - type: text
    content: 'ny olona avy any Babilôna dia nanao sarivongan’i Sokôta-Benôta; ny avy any Kota nanao sarivongan’i Nergala; ny avy any Hamata nanao sarivongan’i Asimà; '
  '31':
  - type: text
    content: ny Havita nanao sarivongan’i Nibihaza sy i Tartàka; ny olona avy any Sefarvaîma aza nanolotra ny zanany ho sorona dorana tamin’i Adramelèka sy Hanamelèka
  - type: note
    content: Amin’ity lisitry ny andriamanitra vahiny ity, dia i Nergala ihany no fantatra fa andriamanitra nivavahana tany Mezôpôtamia.
  - type: text
    content: ' andriamaniny. '
  '32':
  - type: text
    content: 'Nanaja ny TOMPO koa izy rehetra ka nanendry olona avy tamin’ny sarambabem-bahoaka ihany ho mpisorona amin’ireny tranon’ny toeram-panasinana ireny ary hitarika ny fombam-pivavahana amin’ny anaran’ny vahoaka. '
  '33':
  - type: text
    content: Koa sady nanaja ny TOMPO izy no mbola nanompo ny andriamaniny avy ihany koa araka ny fomba fanaon’ny firenena niaviany avy.
  '34':
  - type: text
    content: Ny taranak’ireo vahiny ireo dia mbola manarakaraka izany fomba tranainy izany mandraka androany, fa tsy tena manaja marina ny TOMPO. Samy tsy tena arahiny na ny fomban-drazany, na ny lalàna sy ny didy izay nandidian’ny TOMPO ny taranak’i Jakôba, dia ilay Jakôba nomeny anarana hoe Israely
  - type: note
    content: Jereo Gen 32.29; 35.10.
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Rehefa nanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' taminy manko ny TOMPO, dia nanome azy izao didy izao hoe: Aza manaja ny andriamani-kafa; aza miankohoka aminy ary aza manompo azy na manao sorona aminy. '
  '36':
  - type: text
    content: 'Fa ny TOMPO Izay nitondra anao niala tany Ejipta tamin-kery lehibe sy tamim-pahefana tsy hay tohaina no hany hohajainareo sy hiankohofanareo ary hanoloranareo sorona. '
  '37':
  - type: text
    content: 'Ary aoka hotandremanareo isan’andro ny didy sy ny lalàna ary ny didy izay nosoratany ho anareo; aza manaja ny andriamani-kafa. '
  '38':
  - type: text
    content: 'Aza hadinoina ny fanekempihavanana nataoko taminareo ary aza manaja ny andriamani-kafa. '
  '39':
  - type: text
    content: Izaho TOMPO Andriamanitrareo no aoka hohajainareo, fa Izaho ihany no mahavonjy anareo amin’ny fahavalonareo rehetra
  - type: note
    content: Ny and 35-39 dia tsy milaza rijan-teny iray akory, fa fomba fiteny fampiasan’ny Deoterônômy matetika kosa.
  - type: text
    content: .
  '4':
  - type: text
    content: Tato aoriana anefa dia nikomy taminy i Hôsea, satria sady nandefa iraka tany amin’ny mpanjakan’i Ejipta tany Saîsa
  - type: note
    content: Tamin’izany fotoana izany, i Saîsa tao amin’ny faritry ny vinanin’i Neily no renivohitr’i Ejipta.
  - type: text
    content: ' izy no tsy nety nandoa ny hetrany isan-taona ho an’ny mpanjakan’i Asiria intsony. Koa rehefa hitan’i Salmanesera izany fikomiana izany, dia nasainy nosamborina sy nogadraina i Hôsea. '
  '40':
  - type: text
    content: 'Nefa ireo olona ireo tsy nety nihaino fa mbola nanohy ny fomba fanao taloha ihany. '
  '41':
  - type: text
    content: Tetsy andaniny dia mba nanaja ny TOMPO ihany izy, fa tetsy ankilany kosa dia nanompo ny sampiny izy hatramin’ny zanaka aman-jafiny mandraka ankehitriny.
  '5':
  - type: text
    content: 'Dia nidirany an-kery ny tany ary nataony fahirano i Samaria nandritra ny telo taona. '
  '6':
  - type: text
    content: Tamin’ny taona fahasivy nanjakan’i Hôsea no nahazoan’ny mpanjakan’i Asiria an’i Samaria; ka dia nataony sesitany tany Asiria ny Israelita tavaratra ary namponeniny tao Halà sy tao Gôzàna teo amoron’ny ony Habôra ary teny amin’ny tanànan’i Media
  - type: note
    content: 'Tamin’ny 722 na 721 tal J.K, dia i Sargôna II mpanjaka, rahalahin’i Salmanesera V sy mpandimby azy no naka an’i Samaria. –Halà: toerana any Mezôpôtamia avaratra (jereo Gen 10.11); Gôzàna: mbola toerana any Mezôpôtamia avaratra; Habôra: Khabur ankehitriny, sampan’ony havia amin’ny ony Eofrata; Media: tany ao atsinanan’i Asiria sy atsimon’ny Ranomasina Kaspienina.'
  - type: text
    content: .
  - type: heading
    content: Ny nahatonga ny faharavan’ny fanjakan’i Israely
  '7':
  - type: text
    content: 'Tonga izany rehetra izany noho ny nanotan’ny Israelita tavaratra tamin’ny TOMPO Andriamaniny Izay nanafaka azy teo ambany fifehezan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta sy nitondra azy niala tao amin’io tany io. Fa nanompo andriamani-kafa ireo '
  '8':
  - type: text
    content: 'ka nanaraka ny fanaon’ny hafa firenena izay efa noroahin’ny TOMPO tsy ho eo anoloan’ny Israelita ary koa nanaraka ny fomba noforonin’ireo mpanjakan’i '
  - type: text
    content: Israely
  - type: note
    content: Avaho tsara ny hoe Israelita (and 7) izay ilazana ny foko folo tao Israely fanjakana avaratra sy ny hoe Israelita (and 8) izay manondro ny foko 12 mitambatra ary ny hoe Israely (and 8) izay ilazana ny fanjakana avaratra mahafaoka ny foko folo.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Niteny ratsy ny TOMPO Andriamaniny izy ka nanorina toeram-panasinana teny an-tanànany rehetra teny, manomboka amin’ny tilikambom-piambenana ka hatrany amin’ny tanànamimanda. '
