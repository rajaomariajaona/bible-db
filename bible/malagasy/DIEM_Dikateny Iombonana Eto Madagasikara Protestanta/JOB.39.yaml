document_id: JOB.39
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fantatrao ve ny fotoana fiterahan’ny osidia?
- type: usfm
  marker: q1
  children:
  - type: text
    text: voadinikao ve ny diera vavy raha miteraka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Firy volana no itondrany vohoka raha voaisanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fantatrao ve ny fotoana fiterahany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mitorovoka izy mandatsaka ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mampisinda ny fanaintainany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Any an-kodahoda any ireo zanany ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mihamatanjaka sy mihalehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka lasa tsy miverina intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza no nandefa ny borikidia hikarenjy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zovy no namaha fatorana azy handeha?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa efa nomeko ho fitoerany ny tany hay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fonenany kosa ny tanin-tsira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy raharahainy ny tabataba ao an-tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba reny na oviana na oviana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitrerotreron’olona mpampiasa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny tendrombohitra fitetiny no fihinanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka rehefa ahi-maitso dia katsahiny avokoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hanaiky hanompo anao ve ny ombimanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handry ao am-pahitrao amin’ny alina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Voafolakao hiasa ny sahanao ve izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hitarika hersa eny an-dohasaha?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hatoky azy noho ny tanjany ve ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamela ny asanao hovitainy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hiantehitra aminy hampiditra ny vokatrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanangona izany am-pamoloana ve ianao?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Faly mikopakopaka elatra ny ôtrisy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tsy mampalemy fanahy azy toy ny vano
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny elany na ny volo malefaka ananany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa raha mandao ny atodiny amin’ny tany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamela azy hokotrehin’ny fasika mafana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia tsy ahiny mety hisy mpanitsaka ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mety ho voahosihosin’ny bibidia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Reny mafy fo amin-janaka ny ôtrisy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ataony hoatra ny tsy azy akory ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia very maina izay nisasarany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mampaninona azy mihitsy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa tsy mba nataoko manam-pahendrena izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba nomeko anjara fahaizana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Kanefa raha vao mitraka sy miainga hihazakazaka izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mahomby azy ny soavaly sy ny mpitaingina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ianao ve no mampahatanjaka ny soavaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: na manafy vombo mihofahofa ny vozony
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: na mampifalihavanja azy toa valala?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampihorohoro ny fihiakany sahisahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mihehy ao an-dohasaha izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mientan-kafaliana asesiky ny heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitroatra hisedra fiadiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy mampiraika azy ny tahotra ka tsy mivadi-po izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ny sabatra no hampihemotra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mikorintsana eo an-damosiny ny tranon-jana-tsipîka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manjelanjelatra kosa ny lefona sy ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mihoalahoalam-pahavinirana izy ka lasa miriotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy tana rehefa maneno ny anjomara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mihiaka izy raha vao mahare ny anjomara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eny lavitra eny no anamboloany ny ady
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny treron’ny manamboninahitra ary ny akoran’ady.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fahaizanao ve no mampanidina ny papango
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mamelatra ny elany hianatsimo izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Baikonao ve no iakaran’ny voromahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy anaovany akany eny an-tendrombohitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny haram-bato no onenany sy itoerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny tendrony maranitra tsy hay anihina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Avy eny no itiliany ny remby
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahatazan-davitra ny masony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mitsentsi-dra aoka izany ireo zanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka na aiza na aiza itoeran’ny faty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ifamotoanan’ny voromahery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 24.28; Lk 17.37.
    marker-yv: yv-n
  - type: text
    text: .
