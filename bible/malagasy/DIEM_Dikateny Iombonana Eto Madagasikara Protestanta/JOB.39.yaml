document_id: JOB.39,396
type_code: plt
verses:
  '1':
  - type: text
    content: Fantatrao ve ny fotoana fiterahan’ny osidia?
  - type: text
    content: voadinikao ve ny diera vavy raha miteraka?
  '10':
  - type: text
    content: Voafolakao hiasa ny sahanao ve izy
  - type: text
    content: sy hitarika hersa eny an-dohasaha?
  '11':
  - type: text
    content: Hatoky azy noho ny tanjany ve ianao
  - type: text
    content: ka hamela ny asanao hovitainy?
  '12':
  - type: text
    content: Hiantehitra aminy hampiditra ny vokatrao
  - type: text
    content: sy hanangona izany am-pamoloana ve ianao?
  - type: heading
    content: '*'
  '13':
  - type: text
    content: Faly mikopakopaka elatra ny ôtrisy;
  - type: text
    content: kanefa tsy mampalemy fanahy azy toy ny vano
  - type: text
    content: na ny elany na ny volo malefaka ananany.
  '14':
  - type: text
    content: Fa raha mandao ny atodiny amin’ny tany izy
  - type: text
    content: ka mamela azy hokotrehin’ny fasika mafana,
  '15':
  - type: text
    content: dia tsy ahiny mety hisy mpanitsaka ireo
  - type: text
    content: na mety ho voahosihosin’ny bibidia.
  '16':
  - type: text
    content: Reny mafy fo amin-janaka ny ôtrisy,
  - type: text
    content: fa ataony hoatra ny tsy azy akory ireo;
  - type: text
    content: na dia very maina izay nisasarany,
  - type: text
    content: dia tsy mampaninona azy mihitsy izany.
  '17':
  - type: text
    content: Fa tsy mba nataoko manam-pahendrena izy
  - type: text
    content: ary tsy mba nomeko anjara fahaizana.
  '18':
  - type: text
    content: Kanefa raha vao mitraka sy miainga hihazakazaka izy,
  - type: text
    content: dia tsy mahomby azy ny soavaly sy ny mpitaingina.
  - type: heading
    content: '*'
  '19':
  - type: text
    content: Ianao ve no mampahatanjaka ny soavaly
  - type: text
    content: na manafy vombo mihofahofa ny vozony
  '2':
  - type: text
    content: Firy volana no itondrany vohoka raha voaisanao,
  - type: text
    content: ary fantatrao ve ny fotoana fiterahany?
  '20':
  - type: text
    content: na mampifalihavanja azy toa valala?
  - type: text
    content: Mampihorohoro ny fihiakany sahisahy!
  '21':
  - type: text
    content: Mihehy ao an-dohasaha izy
  - type: text
    content: ary mientan-kafaliana asesiky ny heriny
  - type: text
    content: ka mitroatra hisedra fiadiana.
  '22':
  - type: text
    content: Tsy mampiraika azy ny tahotra ka tsy mivadi-po izy
  - type: text
    content: ary tsy ny sabatra no hampihemotra azy.
  '23':
  - type: text
    content: Mikorintsana eo an-damosiny ny tranon-jana-tsipîka;
  - type: text
    content: manjelanjelatra kosa ny lefona sy ny sabatra.
  '24':
  - type: text
    content: Mihoalahoalam-pahavinirana izy ka lasa miriotra
  - type: text
    content: sady tsy tana rehefa maneno ny anjomara.
  '25':
  - type: text
    content: Mihiaka izy raha vao mahare ny anjomara,
  - type: text
    content: ary eny lavitra eny no anamboloany ny ady
  - type: text
    content: sy ny treron’ny manamboninahitra ary ny akoran’ady.
  - type: heading
    content: '*'
  '26':
  - type: text
    content: Fahaizanao ve no mampanidina ny papango
  - type: text
    content: rehefa mamelatra ny elany hianatsimo izy?
  '27':
  - type: text
    content: Baikonao ve no iakaran’ny voromahery
  - type: text
    content: sy anaovany akany eny an-tendrombohitra?
  '28':
  - type: text
    content: Ny haram-bato no onenany sy itoerany
  - type: text
    content: dia ny tendrony maranitra tsy hay anihina.
  '29':
  - type: text
    content: Avy eny no itiliany ny remby
  - type: text
    content: fa mahatazan-davitra ny masony.
  '3':
  - type: text
    content: Mitorovoka izy mandatsaka ny zanany
  - type: text
    content: sady mampisinda ny fanaintainany.
  '30':
  - type: text
    content: Mitsentsi-dra aoka izany ireo zanany;
  - type: text
    content: ka na aiza na aiza itoeran’ny faty,
  - type: text
    content: dia ifamotoanan’ny voromahery
  - type: note
    content: Ampit Mt 24.28; Lk 17.37.
  - type: text
    content: .
  '4':
  - type: text
    content: Any an-kodahoda any ireo zanany ireo
  - type: text
    content: no mihamatanjaka sy mihalehibe
  - type: text
    content: ka lasa tsy miverina intsony.
  - type: heading
    content: '*'
  '5':
  - type: text
    content: Iza no nandefa ny borikidia hikarenjy?
  - type: text
    content: Zovy no namaha fatorana azy handeha?
  '6':
  - type: text
    content: Fa efa nomeko ho fitoerany ny tany hay,
  - type: text
    content: ary ho fonenany kosa ny tanin-tsira.
  '7':
  - type: text
    content: Tsy raharahainy ny tabataba ao an-tanàna
  - type: text
    content: ary tsy mba reny na oviana na oviana
  - type: text
    content: ny fitrerotreron’olona mpampiasa.
  '8':
  - type: text
    content: Ny tendrombohitra fitetiny no fihinanany,
  - type: text
    content: ka rehefa ahi-maitso dia katsahiny avokoa.
  - type: heading
    content: '*'
  '9':
  - type: text
    content: Hanaiky hanompo anao ve ny ombimanga
  - type: text
    content: ka handry ao am-pahitrao amin’ny alina?
