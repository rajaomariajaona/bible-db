document_id: ISA.46
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andriamani-tsiizin’i Babilôna mitaha amin’Andriamanitra marina
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nihareraka i Bela, niletsy i Nebao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Napetraka teo ambony biby mpitondra entana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sarivongan’ireo andriamanitr’i Babilôna ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay filanja tamin’ny laharam-pihobiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny enta-mifatratra no fitondra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mavesatra amin’ireto biby efa reraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Niletsy sy nihareraka ireo andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka tsy afa-mamonjy ny sarivongany intsony:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ny tenany aza lasan-ko babo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mihainoa Ahy TOMPO, ry taranak’i Jakôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo rehetra sisa velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny taranak’i Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo izay nokarakaraiko hatrany am-bohoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy notrotroiko raha vao teraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy hiova Aho, na dia mandra-pahantitrareo aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanohana anareo Aho mandra-pahafotsin’ny volonareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no nanao anareo sy nitrotro anareo hatrany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, Izaho no hanohana anareo sy hamonjy anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza moa no ampitovinareo amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanoharanareo Ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hampifandanjanareo amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahitana fifanahafana aminay?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Misy olona mandanilany foana ny volany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandanja volamena sy volafotsy amin’ny mizana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manarama olona mpanefy firavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamboatra ireny ho andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hivavahany sady hiankohofany tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izy ireo ihany no mibata ny andriamaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mitondra azy eny an-tsoroka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mametraka azy eo amin’ny toerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mijanona eo iny fa tsy mahahetsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha iantsoana vonjy izy, dia tsy mamaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mahavonjy amin’ny fahoriana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy lavitra ny fanafahana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry mpikomy, izao no tsarovy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ento manovo hery indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary diniho tsara ao am-ponareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsarovy ny zavatra taloha teo am-piandohanareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Izaho no Andriamanitra ka tsy misy hafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no Andriamanitra; ka zava-poana avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: na inona na inona ampitahaina amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efa hatrany am-piandohana no nilazako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zavatra hitranga atỳ aoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa hatry ny ela be no nilazako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zavatra tsy mbola niseho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy Aho hoe: «Ny fikasàko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho tanteraka hatrany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra sitrako dia hataoko.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Toy ny vorona mpihaza avy any atsinanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any an-tany lavitra any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niantsoako ilay lehilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hanatanteraka ny fikasàko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mbola fitenenana an’i Kirôsa ihany; jereo 41.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fikasàna noteneniko izany sady hotanterahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fikasana novolavolaiko sady hotontosaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihainoa Ahy ianareo, ry olona mafy fo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay mihevi-tena ho lavitra ny fanafahana:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hampanatoniko ny fanafahako
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy ho lavitra intsony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hitaraiky intsony ny famonjena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa Izaho no hanome azy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, zavatra mamirapiratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no homeko an’i Israely.
