document_id: ISA.46,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny andriamani-tsiizin’i Babilôna mitaha amin’Andriamanitra marina
  - type: text
    content: Nihareraka i Bela, niletsy i Nebao.
  - type: text
    content: Napetraka teo ambony biby mpitondra entana
  - type: text
    content: ny sarivongan’ireo andriamanitr’i Babilôna ireo;
  - type: text
    content: izay filanja tamin’ny laharam-pihobiana
  - type: text
    content: dia toy ny enta-mifatratra no fitondra azy,
  - type: text
    content: ka mavesatra amin’ireto biby efa reraka.
  '10':
  - type: text
    content: Efa hatrany am-piandohana no nilazako
  - type: text
    content: ny zavatra hitranga atỳ aoriana;
  - type: text
    content: ary efa hatry ny ela be no nilazako
  - type: text
    content: ny zavatra tsy mbola niseho.
  - type: text
    content: 'Hoy Aho hoe: «Ny fikasàko,'
  - type: text
    content: dia ho tanteraka hatrany;
  - type: text
    content: ary izay rehetra sitrako dia hataoko.»
  '11':
  - type: text
    content: Toy ny vorona mpihaza avy any atsinanana,
  - type: text
    content: avy any an-tany lavitra any,
  - type: text
    content: no niantsoako ilay lehilahy
  - type: text
    content: izay hanatanteraka ny fikasàko
  - type: note
    content: Mbola fitenenana an’i Kirôsa ihany; jereo 41.2 sy nta.
  - type: text
    content: .
  - type: text
    content: Fikasàna noteneniko izany sady hotanterahiko,
  - type: text
    content: fikasana novolavolaiko sady hotontosaiko.
  '12':
  - type: text
    content: Mihainoa Ahy ianareo, ry olona mafy fo
  - type: text
    content: 'izay mihevi-tena ho lavitra ny fanafahana:'
  '13':
  - type: text
    content: Hampanatoniko ny fanafahako
  - type: text
    content: fa tsy ho lavitra intsony.
  - type: text
    content: Tsy hitaraiky intsony ny famonjena,
  - type: text
    content: 'fa Izaho no hanome azy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ;
  - type: text
    content: eny, zavatra mamirapiratra
  - type: text
    content: no homeko an’i Israely.
  '2':
  - type: text
    content: Niletsy sy nihareraka ireo andriamanitra
  - type: text
    content: 'ka tsy afa-mamonjy ny sarivongany intsony:'
  - type: text
    content: na dia ny tenany aza lasan-ko babo.
  '3':
  - type: text
    content: Mihainoa Ahy TOMPO, ry taranak’i Jakôba,
  - type: text
    content: dia ianareo rehetra sisa velona
  - type: text
    content: amin’ny taranak’i Israely,
  - type: text
    content: ianareo izay nokarakaraiko hatrany am-bohoka
  - type: text
    content: sy notrotroiko raha vao teraka.
  '4':
  - type: text
    content: Tsy hiova Aho, na dia mandra-pahantitrareo aza;
  - type: text
    content: hanohana anareo Aho mandra-pahafotsin’ny volonareo.
  - type: text
    content: Izaho no nanao anareo sy nitrotro anareo hatrany;
  - type: text
    content: eny, Izaho no hanohana anareo sy hamonjy anareo.
  '5':
  - type: text
    content: Iza moa no ampitovinareo amiko
  - type: text
    content: ary hanoharanareo Ahy?
  - type: text
    content: Iza no hampifandanjanareo amiko
  - type: text
    content: ka hahitana fifanahafana aminay?
  '6':
  - type: text
    content: Misy olona mandanilany foana ny volany;
  - type: text
    content: mandanja volamena sy volafotsy amin’ny mizana izy,
  - type: text
    content: dia manarama olona mpanefy firavaka
  - type: text
    content: mba hamboatra ireny ho andriamanitra
  - type: text
    content: izay hivavahany sady hiankohofany tokoa.
  '7':
  - type: text
    content: Izy ireo ihany no mibata ny andriamaniny
  - type: text
    content: sy mitondra azy eny an-tsoroka
  - type: text
    content: sady mametraka azy eo amin’ny toerany,
  - type: text
    content: dia mijanona eo iny fa tsy mahahetsika.
  - type: text
    content: Raha iantsoana vonjy izy, dia tsy mamaly
  - type: text
    content: sady tsy mahavonjy amin’ny fahoriana.
  - type: heading
    content: Tsy lavitra ny fanafahana
  '8':
  - type: text
    content: Ry mpikomy, izao no tsarovy
  - type: text
    content: ka ento manovo hery indray
  - type: text
    content: ary diniho tsara ao am-ponareo.
  '9':
  - type: text
    content: 'Tsarovy ny zavatra taloha teo am-piandohanareo:'
  - type: text
    content: Eny, Izaho no Andriamanitra ka tsy misy hafa.
  - type: text
    content: Izaho no Andriamanitra; ka zava-poana avokoa
  - type: text
    content: na inona na inona ampitahaina amiko.
