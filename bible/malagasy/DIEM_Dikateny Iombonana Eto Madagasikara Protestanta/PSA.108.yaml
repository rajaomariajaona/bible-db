  '1':
  - type: heading
    content: SALAMO Tiako hofohazina ny mazavatsinanana
  - type: heading
    content: (108.2-6; jereo Sal 57.8-12; 108.7-14; jereo Sal 60.7-14)
  - type: text
    content: ' '
  - type: text
    content: Tononkira. Salamo nataon’i Davida.
  '10':
  - type: text
    content: I Môaba hampiasaiko toy ny tavy fisasàko;
  - type: text
    content: i Edôma hanipazako kapa ho fananako
  - type: note
    content: Ny fanipazan’olona kapa eo amin’ny faritra iray no fanehoany fa tompony izy na manana anjara ao. Ampit Deot 25.9 sy nta.
  - type: text
    content: ;
  - type: text
    content: i Filistia hanaovako horakora-pandresena.»
  '11':
  - type: text
    content: Iza no hampiditra ahy ho eo anivon’i Edôma?
  - type: text
    content: Zovy no hitondra ahy ho amin’ilay tanàna mafy?
  '12':
  - type: text
    content: Moa tsy Ianao ihany ve, Andriamanitra ô?
  - type: text
    content: Kanefa izahay efa narianao mihitsy
  - type: text
    content: ary ny tafikay tsy iarahanao intsony.
  '13':
  - type: text
    content: Ampio re izahay hiady amin’ilay mpandrafy,
  - type: text
    content: fa tsy mankaiza ny famonjena ataon’ny olona.
  '14':
  - type: text
    content: Andriamanitra no hahazoanay fahombiazana goavana,
  - type: text
    content: satria Izy no hanitsakitsaka ireo mpandrafy anay.
  '2':
  - type: text
    content: Andriamanitra ô, mitombina dia mitombina ny foko;
  - type: text
    content: ka hihira ho Anao aho sy hankalaza Anao amin-tsalamo.
  '3':
  - type: text
    content: Mifohaza, ry fanahiko; mifohaza, ry valiha sy lokanga
  - type: note
    content: Jereo Sal 150.3.
  - type: text
    content: ','
  - type: text
    content: fa tiako hofohazina ny mazavatsinanana.
  '4':
  - type: text
    content: TOMPO ô, vory vahoaka no hiderako Anao;
  - type: text
    content: ary eo anivom-pirenena no hankalazako Anao amin-tsalamo,
  '5':
  - type: text
    content: satria lehibe mihoatra noho ny lanitra ny fitiavanao
  - type: text
    content: ary avo tafapaka amin’ny rahona ny toetranao mahatoky.
  '6':
  - type: text
    content: Andriamanitra ô, misandrata Ianao
  - type: text
    content: ho any an-tampon’ny lanitra;
  - type: text
    content: 'aoka anie ny '
  - type: text
    content: voninahitrao
  - type: text
    content: hamiratra amin’ny tany tontolo!
  '7':
  - type: text
    content: Vonjeo amin’ny herinao aho ary valio vavaka,
  - type: text
    content: dia ho afaka ilay vahoaka malalanao.
  '8':
  - type: text
    content: Tao an-
  - type: text
    content: Toeramasiny
  - type: text
    content: ' no niteny Andriamanitra hoe:'
  - type: text
    content: «Faly tokoa Aho fa hizara an’i Sekema
  - type: text
    content: sy ny lohasahan’i Sokôta ho an’ny vahoakako
  - type: note
    content: Jereo Gen 33.17-18.
  - type: text
    content: ;
  '9':
  - type: text
    content: Ahy i Gilehada, Ahy koa i Manase;
  - type: text
    content: i Efraîma no toy ny satro-by fiarolohako;
  - type: text
    content: i Joda no toy ny tehim-piandrianako.
