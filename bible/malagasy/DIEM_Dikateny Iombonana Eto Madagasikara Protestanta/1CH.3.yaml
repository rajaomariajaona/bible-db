document_id: 1CH.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireto
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'and 1-4:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ampit 2 Sam 3.2-5; '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'and 5-8:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit 2 Sam 5.14-16.'
      marker-yv: yv-n
    - type: text
      text: ' no zanakalahy naterak’i Davida tao Hebrôna: ny lahimatoa dia i Amnôna, zanakalahin’i Ahinôhama avy any Jizrehela; ny faharoa dia i Daniela, zanakalahin’i Abigaîla avy any Karmela; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taranak’i Salômôna: i Rehabohama zanakalahin’i Salômôna, i Abià'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 10-16 dia manome ny lisitry ny mpanjakan’i Joda, araka ny 1 Mp 12–2 Mp 25. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Abià
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': io mpanjaka io dia antsoina hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abiama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ao amin’ny 1 Mp 14.31; 15.1-8.'
      marker-yv: yv-n
    - type: text
      text: ' zanakalahin-dRehabohama, i Asà zanakalahin’i Abià, i Jôsafata zanakalahin’i Asà, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Jôrama zanakalahin’i Jôsafata, i Ahazià zanakalahin’i Jôrama, i Jôasy zanakalahin’i Ahazià, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Amatsià zanakalahin’i Jôasy, i Hazarià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hazarià: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Mp 14.21 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' zanakalahin’i Amatsià, i Jôtama zanakalahin’i Hazarià, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Ahaza zanakalahin’i Jôtama, i Hezekià zanakalahin’i Ahaza, i Manase zanakalahin’i Hezekià, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Amôna zanakalahin’i Manase, ary i Jôsià zanakalahin’i Amôna. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Josià dia i Johanàna no lahimatoa, i Jôiakima no faharoa, i Tsedekià no fahatelo, ary i Saloma no fahefatra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zanakalahin’i Jôiakima dia i Jekônià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Saloma:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jer 22.10-11 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Jekônià
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': antsoina hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jôiakîna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ao 2 Mp 24.6, 8-17.'
      marker-yv: yv-n
    - type: text
      text: ' sy i Tsedekià.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo zanakalahin’i Jekônià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy fantatra izay niavian’ny lisitra aroso eto amin’ny and 17-24.
      marker-yv: yv-n
    - type: text
      text: ', ilay lasan-ko babo tany Babilôna, dia i Sealtiela '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy i Malkirama, i Pedaià sy i Senatsara mbamin’i Jekamià sy i Hôsamà ary i Nedabià. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Pedaià dia i Zerobabela sy i Simehỳ; ny zanak’i Zerobabela dia i Mesolama sy i Hananià mirahalahy, i Selômita anabaviny, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fahatelo dia i Absalôma, zanalahin’i Mahekà izay zanakavavin’i Talmay mpanjakan’i Gesora; ny fahefatra dia i Adônià, zanakalahin’i Hagita; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary dimy lahy hafa koa: dia i Hasobà sy i Ôhela mbamin’i Berekià sy i Hasadià ary i Josaba-Heseda.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Hananià dia i Pelatià sy i Jesahià mbamin’ireo zanakalahin-dry i Refaià sy i Arnàna ary i Hôbadià sy i Sekanià. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Sekanià dia enina: i Semahià'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Eto ny RM dia manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary ny zanakalahin’i Semahià
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay tsy mifanaraka amin’ny konteksta.'
      marker-yv: yv-n
    - type: text
      text: ' sy i Hatosa, i Jigala sy i Barià ary i Neharià sy i Safata. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Neharià dia telo: i Eliôhenay sy i Hezekià ary i Hazrikama. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin’i Eliôhenay dia fito: i Hôdavià sy i Eliasiba, i Pelaià sy i Hakoba mbamin’i Jôhanàna sy i Delaià ary i Hananỳ.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fahadimy dia i Sefatià, zanakalahin’i Abitela; ny fahenina dia i Jitrehama, zanakalahin’i Heglà vadin’i Davida koa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo enina ireo no naterak’i Davida tao Hebrôna izay nanjakany fito taona sy enim-bolana. Avy eo dia nanjaka telo amby telopolo taona tao Jerosalema i Davida
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 29.27; 2 Sam 5.4-5; 1 Mp 2.11.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto kosa no naterany tao Jerosalema: i Simehà sy i Sôbaba ary i Natàna sy i Salômôna, ka ity fahefatra ity no tamin’i Baty-Seba zanakavavin’i Hamiela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Sam 11-12.
      marker-yv: yv-n
    - type: text
      text: '; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary sivy hafa koa, dia i Jibehara sy i Elisoa, i Elpeleta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'i Elisoa, i Elpeleta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny lisitra mifanandrify ao amin’ny 14.5; eto ny RM dia mamerina indroa ny anaran’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Elisamà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Elifelety
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo ny faran’ny lisitra, and 8).'
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy i Nôga, i Nefega sy i Jafia '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mbamin’i Elisamà sy i Eliadà ary i Elifelety. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy rehetra ireo no zanakalahin’i Davida, afa-tsy ny zanaky ny vadikeliny; ary i Tamara no anabavin’ireo.
