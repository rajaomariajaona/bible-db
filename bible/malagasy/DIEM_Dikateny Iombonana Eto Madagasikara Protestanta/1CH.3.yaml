document_id: 1CH.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’i Davida
  - type: text
    content: Ireto
  - type: note
    content: 'and 1-4: ampit 2 Sam 3.2-5; and 5-8: ampit 2 Sam 5.14-16.'
  - type: text
    content: ' no zanakalahy naterak’i Davida tao Hebrôna: ny lahimatoa dia i Amnôna, zanakalahin’i Ahinôhama avy any Jizrehela; ny faharoa dia i Daniela, zanakalahin’i Abigaîla avy any Karmela; '
  '10':
  - type: text
    content: 'Taranak’i Salômôna: i Rehabohama zanakalahin’i Salômôna, i Abià'
  - type: note
    content: 'Ny and 10-16 dia manome ny lisitry ny mpanjakan’i Joda, araka ny 1 Mp 12–2 Mp 25. –Abià: io mpanjaka io dia antsoina hoe Abiama ao amin’ny 1 Mp 14.31; 15.1-8.'
  - type: text
    content: ' zanakalahin-dRehabohama, i Asà zanakalahin’i Abià, i Jôsafata zanakalahin’i Asà, '
  '11':
  - type: text
    content: 'i Jôrama zanakalahin’i Jôsafata, i Ahazià zanakalahin’i Jôrama, i Jôasy zanakalahin’i Ahazià, '
  '12':
  - type: text
    content: i Amatsià zanakalahin’i Jôasy, i Hazarià
  - type: note
    content: 'Hazarià: jereo 2 Mp 14.21 sy nta.'
  - type: text
    content: ' zanakalahin’i Amatsià, i Jôtama zanakalahin’i Hazarià, '
  '13':
  - type: text
    content: 'i Ahaza zanakalahin’i Jôtama, i Hezekià zanakalahin’i Ahaza, i Manase zanakalahin’i Hezekià, '
  '14':
  - type: text
    content: 'i Amôna zanakalahin’i Manase, ary i Jôsià zanakalahin’i Amôna. '
  '15':
  - type: text
    content: 'Ny zanakalahin’i Josià dia i Johanàna no lahimatoa, i Jôiakima no faharoa, i Tsedekià no fahatelo, ary i Saloma no fahefatra. '
  '16':
  - type: text
    content: Ny zanakalahin’i Jôiakima dia i Jekônià
  - type: note
    content: 'Saloma: jereo Jer 22.10-11 sy nta. –Jekônià: antsoina hoe Jôiakîna ao 2 Mp 24.6, 8-17.'
  - type: text
    content: ' sy i Tsedekià.'
  '17':
  - type: text
    content: Ireo zanakalahin’i Jekônià
  - type: note
    content: Tsy fantatra izay niavian’ny lisitra aroso eto amin’ny and 17-24.
  - type: text
    content: ', ilay lasan-ko babo tany Babilôna, dia i Sealtiela '
  '18':
  - type: text
    content: 'sy i Malkirama, i Pedaià sy i Senatsara mbamin’i Jekamià sy i Hôsamà ary i Nedabià. '
  '19':
  - type: text
    content: 'Ny zanakalahin’i Pedaià dia i Zerobabela sy i Simehỳ; ny zanak’i Zerobabela dia i Mesolama sy i Hananià mirahalahy, i Selômita anabaviny, '
  '2':
  - type: text
    content: 'ny fahatelo dia i Absalôma, zanalahin’i Mahekà izay zanakavavin’i Talmay mpanjakan’i Gesora; ny fahefatra dia i Adônià, zanakalahin’i Hagita; '
  '20':
  - type: text
    content: 'ary dimy lahy hafa koa: dia i Hasobà sy i Ôhela mbamin’i Berekià sy i Hasadià ary i Josaba-Heseda.'
  '21':
  - type: text
    content: 'Ny taranak’i Hananià dia i Pelatià sy i Jesahià mbamin’ireo zanakalahin-dry i Refaià sy i Arnàna ary i Hôbadià sy i Sekanià. '
  '22':
  - type: text
    content: 'Ny zanakalahin’i Sekanià dia enina: i Semahià'
  - type: note
    content: Eto ny RM dia manampy hoe ary ny zanakalahin’i Semahià izay tsy mifanaraka amin’ny konteksta.
  - type: text
    content: ' sy i Hatosa, i Jigala sy i Barià ary i Neharià sy i Safata. '
  '23':
  - type: text
    content: 'Ny zanakalahin’i Neharià dia telo: i Eliôhenay sy i Hezekià ary i Hazrikama. '
  '24':
  - type: text
    content: 'Ny zanakalahin’i Eliôhenay dia fito: i Hôdavià sy i Eliasiba, i Pelaià sy i Hakoba mbamin’i Jôhanàna sy i Delaià ary i Hananỳ.'
  '3':
  - type: text
    content: 'ny fahadimy dia i Sefatià, zanakalahin’i Abitela; ny fahenina dia i Jitrehama, zanakalahin’i Heglà vadin’i Davida koa. '
  '4':
  - type: text
    content: Ireo enina ireo no naterak’i Davida tao Hebrôna izay nanjakany fito taona sy enim-bolana. Avy eo dia nanjaka telo amby telopolo taona tao Jerosalema i Davida
  - type: note
    content: Jereo 29.27; 2 Sam 5.4-5; 1 Mp 2.11.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ireto kosa no naterany tao Jerosalema: i Simehà sy i Sôbaba ary i Natàna sy i Salômôna, ka ity fahefatra ity no tamin’i Baty-Seba zanakavavin’i Hamiela'
  - type: note
    content: Jereo 2 Sam 11-12.
  - type: text
    content: '; '
  '6':
  - type: text
    content: ary sivy hafa koa, dia i Jibehara sy i Elisoa, i Elpeleta
  - type: note
    content: 'i Elisoa, i Elpeleta: araka ny lisitra mifanandrify ao amin’ny 14.5; eto ny RM dia mamerina indroa ny anaran’i Elisamà sy Elifelety (jereo ny faran’ny lisitra, and 8).'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'sy i Nôga, i Nefega sy i Jafia '
  '8':
  - type: text
    content: 'mbamin’i Elisamà sy i Eliadà ary i Elifelety. '
  '9':
  - type: text
    content: Izy rehetra ireo no zanakalahin’i Davida, afa-tsy ny zanaky ny vadikeliny; ary i Tamara no anabavin’ireo.
