  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nony efa ho faty i Jakôba, dia finoana no nitsòfany rano tsirairay ny zanakalahin’i Jôsefa; ka niankina tamin’ny lohatehiny i Jakôba no nivavaka tamin’Andriamanitra
  - type: usfm
