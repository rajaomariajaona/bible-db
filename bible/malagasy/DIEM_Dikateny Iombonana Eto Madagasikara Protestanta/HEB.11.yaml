    children:
    - type: text
      text: '12'
  - type: text
    text: Olona efa naman’ny maty ihany i Abrahama, nefa dia avy amin’izany lehilahy anankiray izany no niavian’ny taranaka maro toy ny kintana eny amin’ny habakabaka sy toy ny fasika tsy tambo isaina eny amoron-dranomasina
  - type: usfm
