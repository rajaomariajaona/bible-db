    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa naleony niara-nampahorîna tamin’ny vahoakan’Andriamanitra, toy izay hifaly amim-pahotana mandritra ny fotoana fohifohy. '
  - type: usfm
