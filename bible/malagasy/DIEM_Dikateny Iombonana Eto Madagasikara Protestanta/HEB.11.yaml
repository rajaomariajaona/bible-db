  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo olona miteny toy izany dia mampiharihary fa mitady izay ho tanindrazany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka raha ny tany nialany no nahamanina azy, dia mbola nahita fotoana hiverenana any izy; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: saingy tanindrazana tsara lavitra no irîny, dia ilay tanindrazana any an-danitra. Izany no tsy mahamenatra an’Andriamanitra ny hantsoina hoe «Andriamanitr’izy ireo», satria olona efa nanamboarany tanàna ireo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nanoloran’i Abrahama an’i Itsehàka ho sorona, fony i Abrahama nozahan’Andriamanitra toetra. Kanefa nivonon-kanao sorona ny zanany lahitokana i Abrahama, dia izy nanaovan’Andriamanitra teny fampanantenana '
