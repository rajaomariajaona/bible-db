  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamim-pinoana no nahafatesan’ireo olona rehetra ireo. Tsy azony akory izay nampanantenain’Andriamanitra azy, kanefa notazanin’ireo sy noarahabainy avy lavitra; ary dia niaiky izy rehetra fa vahiny sy mpivahiny teto an-tany
