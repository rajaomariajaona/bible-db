      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Finoana no nandavan’i Mosesy hantsoina hoe zanak’ilay zanakavavin’ny Farao mpanjakan’i Ejipta, nony efa lehibe izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
