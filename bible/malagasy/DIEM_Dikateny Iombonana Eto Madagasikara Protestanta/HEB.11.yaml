  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Noheverin’i Abrahama fa Andriamanitra dia mahay manangana an’i Itsehàka avy any amin’ny maty; ka dia noraisin’i Abrahama indray ny zanany, ary tandindon-javatra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Finoana no nitsòfan’i Itsehàka rano an-dry i Jakôba sy i Hesao, nitsinjovany ny hoavin’izy roa lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
