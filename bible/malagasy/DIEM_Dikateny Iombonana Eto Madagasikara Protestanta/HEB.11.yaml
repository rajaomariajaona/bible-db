  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Finoana no nandaozan’i Mosesy an’i Ejipta ka tsy natahorany izay hatezeran’ny mpanjaka; fa naharitra tamin’ny fanapahan-keviny izy, toy ny nahita maso an’ilay Andriamanitra tsy hita. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Finoana no nanorenan’i Mosesy ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' sy nanomezany baiko hanentenana ra ny varavarana, fandrao mikasika ireo lahimatoa '
  - type: usfm
