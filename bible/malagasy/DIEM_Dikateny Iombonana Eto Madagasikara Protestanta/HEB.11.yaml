      text: '34'
  - type: text
    text: 'namono ny afo midedadeda, tokony ho voan’ny sabatra nefa tsy voa, nalemy nefa tonga natanjaka, nahery an’ady ka nampandositra ny tafiky ny firenen-kafa. '
  - type: usfm
