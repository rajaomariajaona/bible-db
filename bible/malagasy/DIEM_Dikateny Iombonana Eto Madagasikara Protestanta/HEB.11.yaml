document_id: HEB.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny finoana
  - type: text
    content: 'Ny hoe mino dia mahazo antoka tsara ny zavatra antenaina ary matoky ny zavatra tsy hita. '
  '10':
  - type: text
    content: Fa i Abrahama dia niandry ilay tanàna mafy orina
  - type: note
    content: Ampit 11.16; 12.22.
  - type: text
    content: ', ka Andriamanitra no tompo-marika tamin’izany sady nanao azy.'
  '11':
  - type: text
    content: Finoana no nahazoan’i Abrahama hery hanana anaka, na dia efa antidahibe aza izy ary na dia vehivavy momba aza i Sarà vadiny; satria azon’i Abrahama antoka
  - type: note
    content: 'Finoana... aza i Sarà vadiny; satria azon’i Abrahama antoka...: misy stf maro kokoa ahitana hoe Finoana koa no nahazoan’i Sarà hery hanana anaka na dia efa nitsaha-jaza aza izy; satria azon’i Sarà antoka... –Jereo Gen 18.11-14; 21.2.'
  - type: text
    content: ' fa mahatoky Andriamanitra nanao ny fampanantenana. '
  '12':
  - type: text
    content: Olona efa naman’ny maty ihany i Abrahama, nefa dia avy amin’izany lehilahy anankiray izany no niavian’ny taranaka maro toy ny kintana eny amin’ny habakabaka sy toy ny fasika tsy tambo isaina eny amoron-dranomasina
  - type: note
    content: Jereo Gen 22.17.
  - type: text
    content: .
  '13':
  - type: text
    content: Tamim-pinoana no nahafatesan’ireo olona rehetra ireo. Tsy azony akory izay nampanantenain’Andriamanitra azy, kanefa notazanin’ireo sy noarahabainy avy lavitra; ary dia niaiky izy rehetra fa vahiny sy mpivahiny teto an-tany
  - type: note
    content: Ampit Gen 23.4; 1 Tan 29.15; Sal 39.13.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ireo olona miteny toy izany dia mampiharihary fa mitady izay ho tanindrazany. '
  '15':
  - type: text
    content: 'Ka raha ny tany nialany no nahamanina azy, dia mbola nahita fotoana hiverenana any izy; '
  '16':
  - type: text
    content: saingy tanindrazana tsara lavitra no irîny, dia ilay tanindrazana any an-danitra. Izany no tsy mahamenatra an’Andriamanitra ny hantsoina hoe «Andriamanitr’izy ireo», satria olona efa nanamboarany tanàna ireo.
  '17':
  - type: text
    content: 'Finoana no nanoloran’i Abrahama an’i Itsehàka ho sorona, fony i Abrahama nozahan’Andriamanitra toetra. Kanefa nivonon-kanao sorona ny zanany lahitokana i Abrahama, dia izy nanaovan’Andriamanitra teny fampanantenana '
  '18':
  - type: text
    content: 'sy nilazany hoe: «Avy amin’i Itsehàka no hiantsoana taranaka ho anao'
  - type: note
    content: 'And 17: jereo Gen 22.1-14. –And 18: Gen 21.12.'
  - type: text
    content: '.» '
  '19':
  - type: text
    content: Noheverin’i Abrahama fa Andriamanitra dia mahay manangana an’i Itsehàka avy any amin’ny maty; ka dia noraisin’i Abrahama indray ny zanany, ary tandindon-javatra izany.
  '2':
  - type: text
    content: Izany finoana izany manko no vavolombelon’ny mahatsara laza ny ntaolo.
  '20':
  - type: text
    content: Finoana no nitsòfan’i Itsehàka rano an-dry i Jakôba sy i Hesao, nitsinjovany ny hoavin’izy roa lahy.
  '21':
  - type: text
    content: Nony efa ho faty i Jakôba, dia finoana no nitsòfany rano tsirairay ny zanakalahin’i Jôsefa; ka niankina tamin’ny lohatehiny i Jakôba no nivavaka tamin’Andriamanitra
  - type: note
    content: 'And 20: jereo Gen 27.27-29, 39-40. –And 21: jereo Gen 48.1-20; 47.31, araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .
  '22':
  - type: text
    content: 'Finoana no nilazan’i Jôsefa teo amin’ny faramparan’ny fiainany fa hiala tany Ejipta ny '
  - type: text
    content: Israelita
  - type: text
    content: ' ary koa nanafatrafarany momba ny taolambalony'
  - type: note
    content: Jereo Gen 50.24-25; Eks 13.19.
  - type: text
    content: .
  '23':
  - type: text
    content: Finoana no nanafenan’ny ray aman-drenin’i Mosesy azy telo volana, raha vao teraka izy. Hitany manko fa zazakely mahafatifaty i Mosesy, ka tsy natahorany izay baikon’ny mpanjaka.
  '24':
  - type: text
    content: Finoana no nandavan’i Mosesy hantsoina hoe zanak’ilay zanakavavin’ny Farao mpanjakan’i Ejipta, nony efa lehibe izy
  - type: note
    content: 'And 23: jereo Eks 2.2; 1.22. –And 24: jereo Eks 12.21-30. –And 29: jereo Eks 14.21-31.'
  - type: text
    content: '; '
  '25':
  - type: text
    content: 'fa naleony niara-nampahorîna tamin’ny vahoakan’Andriamanitra, toy izay hifaly amim-pahotana mandritra ny fotoana fohifohy. '
  '26':
  - type: text
    content: 'Nataony fa ny miaritra fanaratsiana noho ny amin’ny '
  - type: text
    content: Mesia
  - type: text
    content: ' dia harena be lavitra noho ny zava-tsoan’i Ejipta, fa nibanjina ny valisoa mbola ho avy izy.'
  '27':
  - type: text
    content: 'Finoana no nandaozan’i Mosesy an’i Ejipta ka tsy natahorany izay hatezeran’ny mpanjaka; fa naharitra tamin’ny fanapahan-keviny izy, toy ny nahita maso an’ilay Andriamanitra tsy hita. '
  '28':
  - type: text
    content: 'Finoana no nanorenan’i Mosesy ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ' sy nanomezany baiko hanentenana ra ny varavarana, fandrao mikasika ireo lahimatoa '
  - type: text
    content: israelita
  - type: text
    content: ' ilay '
  - type: text
    content: anjely
  - type: text
    content: ' mpandringana ka mamono azy.'
  '29':
  - type: text
    content: Finoana no nitan’ireo Israelita ny Ranomasina Mena toy ny nandia tany maina; fa nony mba nanandrana nanao toy izany ireo Ejiptianina, dia voatelin’ny rano.
  '3':
  - type: text
    content: 'Finoana no ahafantarantsika fa ny tenin’Andriamanitra no nanaovana '
  - type: text
    content: izao tontolo izao
  - type: text
    content: ; koa izao hita maso izao dia natao avy amin’ny tsy hita maso
  - type: note
    content: 'Ampit Gen 1; Sal 33.6, 9. –koa izao... maso: dkt hafa Koa tsy avy amin’ny hita maso no nanaovana izao hita maso izao.'
  - type: text
    content: .
  '30':
  - type: text
    content: 'Finoana no nampirodana ny mandan’i Jerikao, nony efa nohodidinin’ny Israelita nandritra ny fito andro. '
  '31':
  - type: text
    content: Finoana no tsy nahafaty an’i Rahaba vehivavy janga, tsy nahafaty azy niaraka tamin’ireo tsy nanaiky an’Andriamanitra satria noraisiny tamim-pitiavana ireo mpitsikilo
  - type: note
    content: 'And 30: jereo Jos 6.12-21. –And 31: jereo Jos 6.22-25; 2.1-21.'
  - type: text
    content: .
  '32':
  - type: text
    content: 'Ary inona koa no holazaiko? Tsy hanam-potoana aho raha hilazalaza momba an-dry i Gidehôna sy i Baràka, ry i Samsôna sy i Jeftà, ry i Davida sy i Samoela ary ny '
  - type: text
    content: mpaminany
  - type: note
    content: Jereo Mpits 6–7; 4–5; 13–16; 11–12; 1 Sam 16.1–1 Mp 2.11; 1 Sam 1.1–25.1.
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Noho ny finoana dia nandresy fanjakana maro ireo, sy nampihatra ny rariny ka nahazo izay nampanantenain’Andriamanitra; nanakombona ny vavan’ny liona ireo, '
  '34':
  - type: text
    content: 'namono ny afo midedadeda, tokony ho voan’ny sabatra nefa tsy voa, nalemy nefa tonga natanjaka, nahery an’ady ka nampandositra ny tafiky ny firenen-kafa. '
  '35':
  - type: text
    content: Noho ny finoana no nandraisam-behivavy ny zanany maty voatsangana ho velona indray
  - type: note
    content: 'And 33: jereo Dan 6. –And 34: jereo Dan 3.1-30. –And 35: jereo 1 Mp 17.17-24; 2 Mp 4.18-37.'
  - type: text
    content: .
  - type: text
    content: 'Ny sasany nampijalijalîna ho faty nefa tsy nety nanao izay hahafahany, mba hitsanganany ho velona aina tsara lavitra; '
  '36':
  - type: text
    content: 'ary ny sasany nesoina sy nokapohina mafy, ary nofatorana sy nahiboka am-ponja. '
  '37':
  - type: text
    content: Tao ireo maty notoraham-bato, tapa-droa notsofàna, novonoina tamin-tsabatra; tao ireo nafindrafindra monina nitafy hoditr’ondry na hoditr’osy, ka nahantra sy nampahorîna ary fadiranovana
  - type: note
    content: 'And 36: jereo 1 Mp 22.26-27; 2 Tan 18.25-26; Jer 20.2; 37.15; 38.6. –And 37: jereo 2 Tan 24.24.'
  - type: text
    content: '. '
  '38':
  - type: text
    content: Tsy mendrika hitoerany akory izao tontolo izao, ka nanjenjena tany an-taniefitra sy tany an-tendrombohitra ireo ary nonina tanaty zohy sy tanaty lavaka.
  '39':
  - type: text
    content: 'Ireo olona rehetra ireo dia ny finoany no vavolombelon’ny mahatsara laza azy; kanefa, na dia izany aza, dia tsy mbola azon’ireo ny nampanantenaina azy. '
  '4':
  - type: text
    content: Finoana no nanoloran’i Abela ho an’Andriamanitra sorona tsara noho ny an’i Kaina. Izany finoany izany no vavolombelona niantoka fa marina i Abela, satria nankatoavin’Andriamanitra ny fanatitra nataony; ary noho ny finoany, dia mbola miteny ihany i Abela na dia efa maty aza
  - type: note
    content: Jereo Gen 4.3-10.
  - type: text
    content: .
  '40':
  - type: text
    content: Fa Andriamanitra efa nanamboatra zavatra tsara lavitra ho antsika, mba tsy ho tonga amin’ny tanjona natao hiafarana ireo raha tsy efa mby eo koa isika.
  '5':
  - type: text
    content: Finoana no nahatafafindra an’i Henôka ho eo akaikin’Andriamanitra, ka tsy mba niharan’ny fahafatesana izy; ary tsy nisy olona nahita an’i Henôka intsony, noho izy nafindran’Andriamanitra ho eo akaikiny. Ny Soratra Masina no mijoro ho vavolombelona fa efa sitrak’Andriamanitra i Henôka talohan’ny namindrany azy
  - type: note
    content: Gen 5.24, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Raha tsy misy finoana, dia tsy misy azo atao hahazoana sitraka amin’Andriamanitra; koa izay manatona an’Andriamanitra dia tsy maintsy mino fa misy Andriamanitra sady mamaly soa izay mitady Azy.
  '7':
  - type: text
    content: Finoana no nanoavan’i Noà tamim-panajana, fony izy notoroan’Andriamanitra hevitra ny amin’ny zava-hitranga tsy mbola hita; dia nandrafitra sambofiara i Noà hamonjena ny tenany sy ny ankohonany. Izany no nanamelohan’i Noà an’izao tontolo izao, fa nahatonga azy kosa handray ny fahamarinana avy amin’Andriamanitra noho ny finoany
  - type: note
    content: Gen 6.13-22.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Finoana no naneken’i Abrahama fony izy nantsoin’Andriamanitra hiainga ho any amin’ny tany izay horaisiny ho lova; ka nandao ny tany nahabe izy, nefa tsy fantany izay halehany. '
  '9':
  - type: text
    content: Finoana no nonenany toy ny mpiavy tao amin’ny tany nampanantenain’Andriamanitra ho azy. Tranolay no nitoerany, dia izy mbamin’i Itsehàka sy i Jakôba, izay samy nandray izany fampanantenana izany
  - type: note
    content: 'And 8-9: jereo Gen 12.1-5; 23.4; 35.12, 27.'
  - type: text
    content: '. '
