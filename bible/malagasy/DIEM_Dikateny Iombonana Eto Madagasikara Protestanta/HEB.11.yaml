  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Finoana no nahazoan’i Abrahama hery hanana anaka, na dia efa antidahibe aza izy ary na dia vehivavy momba aza i Sarà vadiny; satria azon’i Abrahama antoka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Finoana... aza i Sarà vadiny; satria azon’i Abrahama antoka...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf maro kokoa ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Finoana koa no nahazoan’i Sarà hery hanana anaka na dia efa nitsaha-jaza aza izy; satria azon’i Sarà antoka...
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –Jereo Gen 18.11-14; 21.2.'
    marker-yv: yv-n
