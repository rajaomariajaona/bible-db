    children:
    - type: text
      text: '4'
  - type: text
    text: Finoana no nanoloran’i Abela ho an’Andriamanitra sorona tsara noho ny an’i Kaina. Izany finoany izany no vavolombelona niantoka fa marina i Abela, satria nankatoavin’Andriamanitra ny fanatitra nataony; ary noho ny finoany, dia mbola miteny ihany i Abela na dia efa maty aza
  - type: usfm
