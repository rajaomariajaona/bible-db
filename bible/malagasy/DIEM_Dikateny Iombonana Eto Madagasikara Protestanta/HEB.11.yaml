      text: '32'
  - type: text
    text: 'Ary inona koa no holazaiko? Tsy hanam-potoana aho raha hilazalaza momba an-dry i Gidehôna sy i Baràka, ry i Samsôna sy i Jeftà, ry i Davida sy i Samoela ary ny '
