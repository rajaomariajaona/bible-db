  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Finoana no nahatafafindra an’i Henôka ho eo akaikin’Andriamanitra, ka tsy mba niharan’ny fahafatesana izy; ary tsy nisy olona nahita an’i Henôka intsony, noho izy nafindran’Andriamanitra ho eo akaikiny. Ny Soratra Masina no mijoro ho vavolombelona fa efa sitrak’Andriamanitra i Henôka talohan’ny namindrany azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
