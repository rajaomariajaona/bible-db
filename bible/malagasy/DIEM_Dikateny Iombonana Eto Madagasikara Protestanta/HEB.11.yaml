    marker: p
    children:
    - type: text
      text: Finoana no nanafenan’ny ray aman-drenin’i Mosesy azy telo volana, raha vao teraka izy. Hitany manko fa zazakely mahafatifaty i Mosesy, ka tsy natahorany izay baikon’ny mpanjaka.
