  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no naneken’i Abrahama fony izy nantsoin’Andriamanitra hiainga ho any amin’ny tany izay horaisiny ho lova; ka nandao ny tany nahabe izy, nefa tsy fantany izay halehany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finoana no nonenany toy ny mpiavy tao amin’ny tany nampanantenain’Andriamanitra ho azy. Tranolay no nitoerany, dia izy mbamin’i Itsehàka sy i Jakôba, izay samy nandray izany fampanantenana izany
