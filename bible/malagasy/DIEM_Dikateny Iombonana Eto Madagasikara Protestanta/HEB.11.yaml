  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny finoana dia nandresy fanjakana maro ireo, sy nampihatra ny rariny ka nahazo izay nampanantenain’Andriamanitra; nanakombona ny vavan’ny liona ireo, '
  '34':
  - type: usfm
    marker: p
