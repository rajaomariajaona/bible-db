    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tao ireo maty notoraham-bato, tapa-droa notsofàna, novonoina tamin-tsabatra; tao ireo nafindrafindra monina nitafy hoditr’ondry na hoditr’osy, ka nahantra sy nampahorîna ary fadiranovana
