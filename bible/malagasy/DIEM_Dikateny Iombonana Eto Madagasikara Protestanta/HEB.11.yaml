      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tsy misy finoana, dia tsy misy azo atao hahazoana sitraka amin’Andriamanitra; koa izay manatona an’Andriamanitra dia tsy maintsy mino fa misy Andriamanitra sady mamaly soa izay mitady Azy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finoana no nanoavan’i Noà tamim-panajana, fony izy notoroan’Andriamanitra hevitra ny amin’ny zava-hitranga tsy mbola hita; dia nandrafitra sambofiara i Noà hamonjena ny tenany sy ny ankohonany. Izany no nanamelohan’i Noà an’izao tontolo izao, fa nahatonga azy kosa handray ny fahamarinana avy amin’Andriamanitra noho ny finoany
    - type: usfm
