document_id: 2SA.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Gibehônita sy ny taranak’i Saoly
  - type: text
    content: 'Nisy mosary naharitra telo taona misesy tamin’ny andron’i Davida. Nanontany ny TOMPO momba izany i Davida ka novaliany hoe:'
  - type: text
    content: –Avy amin’i Saoly sy ny fianakaviany lian-dra izao, satria i Saoly no namono nahafaty ny Gibehônita
  - type: note
    content: Momba an’i Gibehôna dia jereo 2.12 sy nta.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Naka ny lamba gony fisaonana i Ritsepà zanakavavin’i Aià, ka novelariny teo ambony vatolampy; dia nitoetra teo izy nanomboka tamin’ny fiandoham-pijinjana ka mandra-pilatsaky ny orana avy any an-danitra tamin’ireo faty ireo. Tsy navelany hipetrahan’ny voromanidina teo aminy tamin’ny antoandro; ny bibidia kosa no tsy navelany hankeo tamin’ny alina. '
  '11':
  - type: text
    content: 'Nisy nanambara tamin’i Davida izay nataon’i Ritsepà zanakavavin’i Aià sady vaditsindranon’i Saoly. '
  '12':
  - type: text
    content: Koa dia nalain’i Davida ny taolambalon’i Saoly sy i Jônatàna zanany tamin’ny mponin’i Jabesa any Gilehada; ireo manko no nangalatra azy tao an-kianjan’i Bety-Seàna, toerana nanantonan’ny Filistinina azy tamin’ny andro namonoan’ny Filistinina an’i Saoly tao Gilbôa
  - type: note
    content: Momba ny toerana voalaza sy izay zava-nitranga dia jereo 1 Sam 31 sy nta.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Dia nentin’i Davida avy tany ny taolambalon’i Saoly sy i Jônatàna zanany, ary nangoniny koa ny taolan’ireto fito lahy voahantona. '
  '14':
  - type: text
    content: Nalevin’ny olona tany amin’ny tanin’i Benjamîna, tao Tsela, tao amin’ny fasan’i Kisy rain’i Saoly ireo taolambalo rehetra ireo; ary vitany avokoa izay nandidian’ny mpanjaka. Rehefa izany, vao nanambina ny tany Andriamanitra.
  - type: heading
    content: Ady tamin’ny Filistinina
  - type: heading
    content: (Jereo 1 Tan 20.4-8)
  '15':
  - type: text
    content: 'Nipoaka indray ny ady teo amin’ny Filistinina sy ny Israelita. Dia nidina nanafika ny Filistinina i Davida sy ireo miaramila niaraka taminy; ary nahatsiaro reraka i Davida. '
  '16':
  - type: text
    content: Koa nihevitra ny hahafaty an’i Davida i Jisby-Benôba isan’ny taranak’i Harafà
  - type: note
    content: 'Harafà: na Rafà, mety ho ny razamben’ny Refaîta. Jereo Deot 2.11 sy nta.'
  - type: text
    content: ', izay nanana lohan-defona halimo milanja telo kilao mahery sy fiadiana vaovao. '
  '17':
  - type: text
    content: 'Fa tonga nanampy azy i Abisay zanakalahin’i Tseroià ka namely ary nahafaty an’ilay Filistinina. Tamin’izay ireo olon’i Davida dia nianiana taminy hoe: «Tsy hiara-miainga aminay intsony ianao ho amin’ny ady, mba tsy hamonoanao ho faty ny fahazavan’i Israely'
  - type: note
    content: 'fahazavan’i Israely: ny fiandrianam-pitondrana miankina amin’ny mpanjaka hatrany no ambara amin’izany hoe fahazavana izany.'
  - type: text
    content: .»
  '18':
  - type: text
    content: 'Rehefa izany dia mbola nisy ady indray tamin’ny Filistinina tao Gôba; tamin’izay i Sibekay avy any Hosà no namono ho faty an’i Safa isan’ny taranak’i Harafà. '
  '19':
  - type: text
    content: Mbola nisy ady hafa tao Gôba, ary tamin’izay i Elehanàna zanakalahin’i Jahiry-Ôregima sady avy any Betlehema, no namono ho faty an’i Gôliata avy any Gata
  - type: note
    content: 'Gata: jereo 1 Sam 5.8 sy nta.'
  - type: text
    content: ', izay nanana zaran-defona vaventy tahaka ny voditenon’ny mpanenona. '
  '2':
  - type: text
    content: 'Nampiantso ny Gibehônita ny mpanjaka mba hiresahany. Ny Gibehônita moa tsy mba isan’ny Israelita, fa sisa tsy maty tamin’ny '
  - type: text
    content: Amôrita
  - type: text
    content: '. Efa nianiana taminy manko ny Israelita fa tsy haninona azy; nefa i Saoly, noho ny fitiavany an’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy i Joda, dia nitady hamongotra azy'
  - type: note
    content: 'nianiana... tsy haninona azy: jereo Jos 9.3-27.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Dia mbola nisy ady koa tany Gata; ary tao dia nisy olona raindahiny nanana rantsan-tanana enina sy rantsan-tongotra enina, izany hoe efatra amby roapolo no fitambarany. Ilehio koa dia taranak’i Harafà. '
  '21':
  - type: text
    content: Nihaika ny Israelita izy ka matin’i Jônatàna zanakalahin’i Simehà izay rahalahin’i Davida.
  '22':
  - type: text
    content: Ireo miaramila filistinina efa-dahy ireo, izay samy taranak’i Harafà sady tao Gata, dia lavo noho ny famelezan’i Davida sy ny miaramilany azy.
  '3':
  - type: text
    content: 'Ka hoy i Davida tamin’ny Gibehônita:'
  - type: text
    content: '–Inona no hataoko ho anareo! Ahoana no hanonerako ny ratsy izay nihatra taminareo, mba '
  - type: text
    content: hitsofanareo rano
  - type: text
    content: ' ny vahoakan’ny TOMPO?'
  '4':
  - type: text
    content: 'Dia hoy ny Gibehônita taminy:'
  - type: text
    content: –Tsy vitana volafotsy na volamena, na koa fahafatesan’ny Israelita iray ny adinay amin’i Saoly sy ny fianakaviany.
  - type: text
    content: 'Ka hoy i Davida:'
  - type: text
    content: –Koa lazao àry izay tianareo hataoko, fa hotanterahiko.
  '5':
  - type: text
    content: 'Dia hoy ireo tamin’ny mpanjaka:'
  - type: text
    content: '–I Saoly no nikasa handripaka anay sy hamongotra anay tsy hisy tavela eo amin’ny tanin’i Israely manontolo; '
  '6':
  - type: text
    content: ka avelao hisy fito lahy amin’ny taranany hatolotra anay mba hahantonay eo anatrehan’ny TOMPO ao Gibehà
  - type: note
    content: 'Gibehà: jereo 1 Sam 10.5 sy nta.'
  - type: text
    content: ' tanànan’i Saoly ilay mpanjaka voafidin’ny TOMPO.'
  - type: text
    content: 'Ka hoy ny mpanjaka:'
  - type: text
    content: –Hatolotro ireo.
  '7':
  - type: text
    content: Notsimbinin’ny mpanjaka manokana i Mefibôseta, zanakalahin’i Jônatàna sady zafikelin’i Saoly, noho ny fianianana nataon’i Davida sy i Jônatàna tamin’ny anaran’ny TOMPO
  - type: note
    content: 'Mefibôseta: jereo 9.1-13. –fianianana...tamin’ny anaran’ny Tompo: jereo 1 Sam 20.14-16,42.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: Fa nalain’ny mpanjaka i Armônỳ sy i Mefibôseta zanakalahin’i Ritsepà izay zanakavavin’i Aià, ka izy roa lahy ireo dia naterany tamin’i Saoly; ary nalainy koa izy dimy lahy zanak’i Mikàla izay zanakavavin’i Saoly, ka ireo dia naterany tamin’i Adriela zanakalahin’i Barzilay avy any Mehôlà
  - type: note
    content: 'Mikàla: araka ny 1 Sam 18.19 dia i Meraba no nanambady an’i Adriela. Abela-Mehôla: jereo Mpits 7.22 sy nta.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: Natolotr’i Davida teo an-tanan’ny Gibehônita izy fito lahy ka nahanton’ireo teo an-kavoana iray teo anatrehan’ny TOMPO. Niara-maty avokoa izy fito lahy, satria samy novonoina ho faty tamin’ny fiandohan’ny vaninandro fijinjana ôrza
  - type: note
    content: ny fijinjana ôrza amin’ny ankapobeny dia ny volana aprily.
  - type: text
    content: .
