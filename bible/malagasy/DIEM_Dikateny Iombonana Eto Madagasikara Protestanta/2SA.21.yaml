document_id: 2SA.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Gibehônita sy ny taranak’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy mosary naharitra telo taona misesy tamin’ny andron’i Davida. Nanontany ny TOMPO momba izany i Davida ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avy amin’i Saoly sy ny fianakaviany lian-dra izao, satria i Saoly no namono nahafaty ny Gibehônita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gibehôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia jereo 2.12 sy nta.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nampiantso ny Gibehônita ny mpanjaka mba hiresahany. Ny Gibehônita moa tsy mba isan’ny Israelita, fa sisa tsy maty tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: '. Efa nianiana taminy manko ny Israelita fa tsy haninona azy; nefa i Saoly, noho ny fitiavany an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy i Joda, dia nitady hamongotra azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nianiana... tsy haninona azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 9.3-27.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka hoy i Davida tamin’ny Gibehônita:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona no hataoko ho anareo! Ahoana no hanonerako ny ratsy izay nihatra taminareo, mba '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hitsofanareo rano
  - type: text
    text: ' ny vahoakan’ny TOMPO?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny Gibehônita taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy vitana volafotsy na volamena, na koa fahafatesan’ny Israelita iray ny adinay amin’i Saoly sy ny fianakaviany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Koa lazao àry izay tianareo hataoko, fa hotanterahiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ireo tamin’ny mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–I Saoly no nikasa handripaka anay sy hamongotra anay tsy hisy tavela eo amin’ny tanin’i Israely manontolo; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ka avelao hisy fito lahy amin’ny taranany hatolotra anay mba hahantonay eo anatrehan’ny TOMPO ao Gibehà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gibehà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 10.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' tanànan’i Saoly ilay mpanjaka voafidin’ny TOMPO.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hatolotro ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Notsimbinin’ny mpanjaka manokana i Mefibôseta, zanakalahin’i Jônatàna sady zafikelin’i Saoly, noho ny fianianana nataon’i Davida sy i Jônatàna tamin’ny anaran’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mefibôseta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 9.1-13. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fianianana...tamin’ny anaran’ny Tompo:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 1 Sam 20.14-16,42.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa nalain’ny mpanjaka i Armônỳ sy i Mefibôseta zanakalahin’i Ritsepà izay zanakavavin’i Aià, ka izy roa lahy ireo dia naterany tamin’i Saoly; ary nalainy koa izy dimy lahy zanak’i Mikàla izay zanakavavin’i Saoly, ka ireo dia naterany tamin’i Adriela zanakalahin’i Barzilay avy any Mehôlà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mikàla: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny 1 Sam 18.19 dia i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Meraba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no nanambady an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Adriela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Abela-Mehôla:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Mpits 7.22 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Natolotr’i Davida teo an-tanan’ny Gibehônita izy fito lahy ka nahanton’ireo teo an-kavoana iray teo anatrehan’ny TOMPO. Niara-maty avokoa izy fito lahy, satria samy novonoina ho faty tamin’ny fiandohan’ny vaninandro fijinjana ôrza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: ny fijinjana ôrza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’ny ankapobeny dia ny volana aprily.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Naka ny lamba gony fisaonana i Ritsepà zanakavavin’i Aià, ka novelariny teo ambony vatolampy; dia nitoetra teo izy nanomboka tamin’ny fiandoham-pijinjana ka mandra-pilatsaky ny orana avy any an-danitra tamin’ireo faty ireo. Tsy navelany hipetrahan’ny voromanidina teo aminy tamin’ny antoandro; ny bibidia kosa no tsy navelany hankeo tamin’ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nisy nanambara tamin’i Davida izay nataon’i Ritsepà zanakavavin’i Aià sady vaditsindranon’i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa dia nalain’i Davida ny taolambalon’i Saoly sy i Jônatàna zanany tamin’ny mponin’i Jabesa any Gilehada; ireo manko no nangalatra azy tao an-kianjan’i Bety-Seàna, toerana nanantonan’ny Filistinina azy tamin’ny andro namonoan’ny Filistinina an’i Saoly tao Gilbôa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny toerana voalaza sy izay zava-nitranga dia jereo 1 Sam 31 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nentin’i Davida avy tany ny taolambalon’i Saoly sy i Jônatàna zanany, ary nangoniny koa ny taolan’ireto fito lahy voahantona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nalevin’ny olona tany amin’ny tanin’i Benjamîna, tao Tsela, tao amin’ny fasan’i Kisy rain’i Saoly ireo taolambalo rehetra ireo; ary vitany avokoa izay nandidian’ny mpanjaka. Rehefa izany, vao nanambina ny tany Andriamanitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ady tamin’ny Filistinina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 20.4-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nipoaka indray ny ady teo amin’ny Filistinina sy ny Israelita. Dia nidina nanafika ny Filistinina i Davida sy ireo miaramila niaraka taminy; ary nahatsiaro reraka i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa nihevitra ny hahafaty an’i Davida i Jisby-Benôba isan’ny taranak’i Harafà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Harafà:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rafà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho ny razamben’ny Refaîta. Jereo Deot 2.11 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', izay nanana lohan-defona halimo milanja telo kilao mahery sy fiadiana vaovao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa tonga nanampy azy i Abisay zanakalahin’i Tseroià ka namely ary nahafaty an’ilay Filistinina. Tamin’izay ireo olon’i Davida dia nianiana taminy hoe: «Tsy hiara-miainga aminay intsony ianao ho amin’ny ady, mba tsy hamonoanao ho faty ny fahazavan’i Israely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fahazavan’i Israely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny fiandrianam-pitondrana miankina amin’ny mpanjaka hatrany no ambara amin’izany hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahazavana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa izany dia mbola nisy ady indray tamin’ny Filistinina tao Gôba; tamin’izay i Sibekay avy any Hosà no namono ho faty an’i Safa isan’ny taranak’i Harafà. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mbola nisy ady hafa tao Gôba, ary tamin’izay i Elehanàna zanakalahin’i Jahiry-Ôregima sady avy any Betlehema, no namono ho faty an’i Gôliata avy any Gata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gata: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 5.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', izay nanana zaran-defona vaventy tahaka ny voditenon’ny mpanenona. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia mbola nisy ady koa tany Gata; ary tao dia nisy olona raindahiny nanana rantsan-tanana enina sy rantsan-tongotra enina, izany hoe efatra amby roapolo no fitambarany. Ilehio koa dia taranak’i Harafà. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nihaika ny Israelita izy ka matin’i Jônatàna zanakalahin’i Simehà izay rahalahin’i Davida.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ireo miaramila filistinina efa-dahy ireo, izay samy taranak’i Harafà sady tao Gata, dia lavo noho ny famelezan’i Davida sy ny miaramilany azy.
