document_id: NAM.INTRO1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Ny bokin’i Nahoma dia filazana mialoha ny fianjeran’i Ninive, ilay renivohitry ny fanjakana asirianina mpamoritra ny Israelita. Ny boky dia voasoratra teo anelanelan’ny nahazoan’ny Asirianina an’i Tebeta tamin’ny taona 633 Tal. J.K. sy ny nandravan’ny Babilônianina an’i Ninive tamin’ny taona 612 Tal. J.K.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Misy fizaràna telo ao amin’ity boky ity: Ny fizaràna voalohany dia sava lalana ankapobeny milaza ilay herin’Andriamanitra manapaka ny voaary rehetra sy mitsara izao tontolo izao (1.2-8).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny fizaràna faharoa dia filazana mazava ny fomba fisehon’izany herin’Andriamanitra izany teo amin’ny rivotra pôlitika izay nitsoka tamin’ny andron’i Nahoma, dia ny faharavan’ny tanànan’i Ninive ary ny fanafahana ny mponin’i Joda vokatr’izany (1.9–2.3).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny fizaràna fahatelo dia mitantara ny fankalazana ny faharavan’i Ninive sy ny hery asehony (2.4–3.19).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny hafatry ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia tsy mianina fotsiny amin’ny fanambaràna ny faharavan’i Ninive, fa maneho izany tokoa ho vokatry ny fitsarana ataon’Andriamanitra. Tanàna miavonavona sy mpanao heloka ary maharikoriko toetra i Ninive, ka tonga filamatry ny fahefàn’olombelona miorina eo amin’ny fototra izay tsy eken’Andriamanitra.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny bokin’i Nahoma dia milaza amin’ny olona ankehitriny koa fa ny fahefana rehetra tahaka izany dia tsy maintsy hanjavona toy izay nanaovana an’i Ninive.
