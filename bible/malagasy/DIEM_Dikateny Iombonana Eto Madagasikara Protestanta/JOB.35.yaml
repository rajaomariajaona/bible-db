document_id: JOB.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Araka an’i Elihò, dia tsy manan-java-marina holazaina i Jôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nanohy ny teniny i Elihò ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Moa heverinao ho rariny ve ny filàzanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Marina eo anoloan’Andriamanitra aho»,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'na ny fanontanianao hoe: «Mampaninona Anao moa izany?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no tombontsoako raha tsy manota aho?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izaho no hiteny hamaly anareo miaraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny tenanao mbamin’ireto namanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andrandrao ny lanitra ka diniho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: jereo ny rahona fa manerinerina amboninao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha manota ianao, hahakasika azy va izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampaninona azy moa ny fikomianao maro?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha manao ny marina ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitondra inona aminy moa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na inona no horaisiny avy aminao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa na ny tsara vitanao na ny ratsy nataonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny olona toa anao ihany no iharany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 6-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Jôba 22.2-3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Rehefa mafy loatra ny famoretana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitaraina ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miantso vonjy izy hiaro azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny famelezan’ireo mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa tsy mba misy manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aiza Andriamanitra Mpanao ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mampihira fankalazana Azy amin’ny alina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mampihira fankalazana Azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: heverin’ny sasany hilazana ny kotroka (jereo Sal 29) ny voambolana hebreo voadika toy izany.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aiza Andriamanitra Izay mampianatra antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny alalan’ireo biby ambonin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa mampahahendry antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny alalan’ireo voromanidina?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Miantso vonjy ny olona ampahorîna
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mamaly azy Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria mpirehareha sy ratsy toetra ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, ilay Andriamanitra Tsitoha
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mihaino ny fitarainam-poana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy mba miraharaha izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary dia sahinao lazaina aza, ry Jôba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy mahita an’Andriamanitra ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mbola miandry Azy hatrany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa ny raharahanao efa mby eo anoloany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ankehitriny, heverinao fa tsy mihatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahatezeran’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy fantany akory ny fikomian’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa miloa-bava milaza hevi-poana ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandahatra teny maro tsy misy dikany.
