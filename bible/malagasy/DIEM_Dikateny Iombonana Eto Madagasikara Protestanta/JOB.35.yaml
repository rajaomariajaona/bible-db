document_id: JOB.35,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Araka an’i Elihò, dia tsy manan-java-marina holazaina i Jôba
  - type: text
    content: 'Dia nanohy ny teniny i Elihò ka nanao hoe:'
  '10':
  - type: text
    content: 'Nefa tsy mba misy manao hoe:'
  - type: text
    content: «Aiza Andriamanitra Mpanao ahy
  - type: text
    content: sady mampihira fankalazana Azy amin’ny alina
  - type: note
    content: 'mampihira fankalazana Azy: heverin’ny sasany hilazana ny kotroka (jereo Sal 29) ny voambolana hebreo voadika toy izany.'
  - type: text
    content: '?'
  '11':
  - type: text
    content: Aiza Andriamanitra Izay mampianatra antsika
  - type: text
    content: amin’ny alalan’ireo biby ambonin’ny tany
  - type: text
    content: ary koa mampahahendry antsika
  - type: text
    content: amin’ny alalan’ireo voromanidina?»
  '12':
  - type: text
    content: Miantso vonjy ny olona ampahorîna
  - type: text
    content: fa tsy mamaly azy Andriamanitra
  - type: text
    content: satria mpirehareha sy ratsy toetra ireo.
  '13':
  - type: text
    content: Eny, ilay Andriamanitra Tsitoha
  - type: text
    content: dia tsy mihaino ny fitarainam-poana
  - type: text
    content: sady tsy mba miraharaha izany.
  - type: heading
    content: '*'
  '14':
  - type: text
    content: Ary dia sahinao lazaina aza, ry Jôba,
  - type: text
    content: fa tsy mahita an’Andriamanitra ianao
  - type: text
    content: sady mbola miandry Azy hatrany,
  - type: text
    content: kanefa ny raharahanao efa mby eo anoloany;
  '15':
  - type: text
    content: ankehitriny, heverinao fa tsy mihatra
  - type: text
    content: ny fahatezeran’Andriamanitra;
  - type: text
    content: ary tsy fantany akory ny fikomian’ny olona.
  '16':
  - type: text
    content: Koa miloa-bava milaza hevi-poana ianao
  - type: text
    content: ary mandahatra teny maro tsy misy dikany.
  '2':
  - type: text
    content: '–Moa heverinao ho rariny ve ny filàzanao hoe:'
  - type: text
    content: «Marina eo anoloan’Andriamanitra aho»,
  '3':
  - type: text
    content: 'na ny fanontanianao hoe: «Mampaninona Anao moa izany?'
  - type: text
    content: Inona no tombontsoako raha tsy manota aho?»
  '4':
  - type: text
    content: Izaho no hiteny hamaly anareo miaraka,
  - type: text
    content: dia ny tenanao mbamin’ireto namanao.
  '5':
  - type: text
    content: Andrandrao ny lanitra ka diniho;
  - type: text
    content: jereo ny rahona fa manerinerina amboninao!
  '6':
  - type: text
    content: Raha manota ianao, hahakasika azy va izany?
  - type: text
    content: Ary mampaninona azy moa ny fikomianao maro?
  '7':
  - type: text
    content: Raha manao ny marina ianao,
  - type: text
    content: hitondra inona aminy moa izany,
  - type: text
    content: na inona no horaisiny avy aminao?
  '8':
  - type: text
    content: Fa na ny tsara vitanao na ny ratsy nataonao,
  - type: text
    content: dia ny olona toa anao ihany no iharany
  - type: note
    content: 'And 6-8: ampit Jôba 22.2-3.'
  - type: text
    content: .
  - type: heading
    content: '*'
  '9':
  - type: text
    content: Rehefa mafy loatra ny famoretana,
  - type: text
    content: dia mitaraina ny olona;
  - type: text
    content: ka miantso vonjy izy hiaro azy
  - type: text
    content: amin’ny famelezan’ireo mahery.
