document_id: EXO.7,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Jereonao fa omeko fahefàn’Andriamanitra ianao manoloana ny Farao; ary i Aharôna rahalahinao kosa dia mpitondrateninao. '
  '10':
  - type: text
    content: 'Dia nankao amin’ny Farao i Mosesy sy i Aharôna ka nanatanteraka izay nandidian’ny TOMPO azy; natsipin’i Aharôna teo anatrehan’ny Farao sy ny mpanompony ny tehiny ka nanjary fanàny. '
  '11':
  - type: text
    content: 'Nantsoin’ny Farao ihany koa ireo olon-kendry sy mpanao majia tao Ejipta; ary ireo ombiasy ireo dia nanao toy izany koa tamin’ny fitokavany: '
  '12':
  - type: text
    content: 'Samy nanipy ny tehiny tamin’ny tany avy izy ka nanjary fanàny ireny. Saingy ny tehin’i Aharôna dia nitelina ny tehin’ireo. '
  '13':
  - type: text
    content: Kanefa nihamafy fo ny Farao ka tsy nihaino an’i Mosesy sy i Aharôna araka izay efa nolazain’ny TOMPO rahateo.
  - type: heading
    content: 'Ny loza voalohany: ny rano miova ho ra'
  '14':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Mafy fo ny '
  - type: text
    content: Farao
  - type: text
    content: ' ka tsy mety mandefa ny Israelita. '
  '15':
  - type: text
    content: 'Koa mankanesa any aminy ianao rahampitso maraina, rehefa mivoaka hankeo amoron-drano izy. Ento eny an-tananao ilay tehina tonga bibilava, dia andraso eo amoron’i Neily izy. '
  '16':
  - type: text
    content: 'Ka izao no ambarao aminy: «Ny TOMPO, Andriamanitry ny Hebreo, no naniraka ahy hilaza aminao hoe: ‹Alefaso ny vahoakako mba hanao fanompoam-pivavahana amiko any an-taniefitra.› Nefa tsy nihaino ianao mandraka ankehitriny. '
  '17':
  - type: text
    content: Noho izany, dia lazain’ny TOMPO fa hahafantatra ny maha IZY AZY ianao amin’ity indray mandeha ity. Hokapohiko amin’ity tehina eto an-tanako ity manko ny ranon’i Neily, dia hiova ho ra
  - type: note
    content: Jereo Apôk 16.4.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Ho faty ny trondro ka ho maimbo ny ony, dia tsy ho azon’ny Ejiptianina sotroina intsony ny rano ao.»
  '19':
  - type: text
    content: 'Ary hoy koa ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Lazao i Aharôna handray ny tehinao ka haninjitra ny tanany manandrify ny rano rehetra eto Ejipta, izany hoe ny renirano sy ny lakan-drano mbamin’ny farihy rehetra; dia hiova ho ra ny rano amin’ireny. Ary hisy ra manerana ny tany Ejipta manontolo, hatrany an-tsinibe hazo sy vato.
  '2':
  - type: text
    content: 'Ambarao amin’i Aharôna rahalahinao izay rehetra handidiako anao, ary izy kosa no hiteny amin’ny Farao mba handefasany ny Israelita hiala amin’ny taniny. '
  '20':
  - type: text
    content: Dia notanterahin’i Mosesy sy i Aharôna
  - type: note
    content: Aharôna na hoe Mosesy araka ny and 17; ao amin’ny RM dia tsy voatondro ny lazaina.
  - type: text
    content: ' izay nandidian’ny TOMPO azy; ary teo imason’ny Farao sy ny tandapany no nanaingan’i Aharôna ny tehiny ka nikapohany ny ranon’i Neily, dia niova ho ra ny rano rehetra tao amin’ny ony. '
  '21':
  - type: text
    content: Maty ny trondro ka maimbo ny ony, dia tsy azon’ny Ejiptianina nosotroina intsony ny rano, fa nisy ra manerana ny tany Ejipta manontolo.
  '22':
  - type: text
    content: 'Dia mba nanao toy izany tamin’ny fitokavany koa ireo mpimasy ejiptianina; koa nihamafy fo ny Farao ka tsy nihaino akory izay nangatahan’i Mosesy sy i Aharôna, araka izay efa nambaran’ny TOMPO. '
  '23':
  - type: text
    content: 'Lasa nody ny Farao, dia nankao an-tranony fa tsy nahoany akory io raharaha io. '
  '24':
  - type: text
    content: Nihady lava-drano manodidina an’i Neily ny Ejiptianina satria tsy azony nosotroina ny rano tamin’ny ony.
  '25':
  - type: text
    content: Ary fito andro izay no lasa taorian’ny namelezan’ny TOMPO ny ony Neily.
  - type: heading
    content: 'Ny loza faharoa: ny sahona'
  '26':
  - type: text
    content: 'Taorian’izany, dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Mankanesa any amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ', ka lazao aminy hoe: «Asain’ny TOMPO alefanao ny vahoakany hanao fanompoam-pivavahana aminy'
  - type: note
    content: Amin’ny dkt sasany, ny and 7.26–8.28 dia mitondra ny laharana 8.1-32.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Fa raha mandà ianao, dia ho hitanao fa hasiany amin’ny sahona ny faritaninao manontolo: '
  '28':
  - type: text
    content: 'Hitombo ao amin’ny ony ny sahona, dia hiakatra ka hiditra ao an-dapanao sy ao an’efitrano fandrianao ary ao am-parafaranao aza, hiditra any an-tranon’ny mpanomponao sy ny vahoakanao ary koa any amin’ny lafaoro sy ny fanaova-mofonao. '
  '29':
  - type: text
    content: Eny, hananika anao sy ny mpanomponao rehetra ary ny vahoakanao ireo sahona ireo.»
  '3':
  - type: text
    content: Izaho anefa hanamafy fo ny Farao; ka na dia maro aza ireo famantarana sy zava-mahagaga izay hataoko ao amin’ny taniny
  - type: note
    content: Jereo Asa 7.36.
  - type: text
    content: ', '
  '4':
  - type: text
    content: 'dia tsy hihaino anareo izy. Koa hataoko tsapan’ny Ejiptianina ny heriko, ka famaizana lehibe no hamoahako am-pilaminana tsara ny Israelita vahoakako hiala amin’ny tany Ejipta. '
  '5':
  - type: text
    content: Ho fantatry ny Ejiptianina amin’izay fa Izaho no TOMPO, rehefa haninji-tanana hamely azy Aho ka hamoaka ny Israelita hiala eo anivony.
  '6':
  - type: text
    content: 'Dia notanterahin’i Mosesy sy i Aharôna izany, ka araka izay nandidian’ny TOMPO azy no nataony. '
  '7':
  - type: text
    content: Feno valopolo taona i Mosesy ary telo amby valopolo taona i Aharòna fony nandeha niteny tamin’ny Farao izy mirahalahy.
  - type: heading
    content: Tsy mety mihaino an’i Mosesy sy i Aharôna ny Farao
  '8':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Mosesy sy i Aharôna:'
  '9':
  - type: text
    content: '–Raha mangataka anareo hanao zava-mahagaga ny '
  - type: text
    content: Farao
  - type: text
    content: ', dia lazaonao i Aharôna, ry Mosesy, mba handray ny tehinao ka hanipy azy eo anatrehan’ny Farao, dia hanjary fanàny iny.'
