document_id: EXO.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Jereonao fa omeko fahefàn’Andriamanitra ianao manoloana ny Farao; ary i Aharôna rahalahinao kosa dia mpitondrateninao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ambarao amin’i Aharôna rahalahinao izay rehetra handidiako anao, ary izy kosa no hiteny amin’ny Farao mba handefasany ny Israelita hiala amin’ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho anefa hanamafy fo ny Farao; ka na dia maro aza ireo famantarana sy zava-mahagaga izay hataoko ao amin’ny taniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 7.36.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia tsy hihaino anareo izy. Koa hataoko tsapan’ny Ejiptianina ny heriko, ka famaizana lehibe no hamoahako am-pilaminana tsara ny Israelita vahoakako hiala amin’ny tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho fantatry ny Ejiptianina amin’izay fa Izaho no TOMPO, rehefa haninji-tanana hamely azy Aho ka hamoaka ny Israelita hiala eo anivony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia notanterahin’i Mosesy sy i Aharôna izany, ka araka izay nandidian’ny TOMPO azy no nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Feno valopolo taona i Mosesy ary telo amby valopolo taona i Aharòna fony nandeha niteny tamin’ny Farao izy mirahalahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy mety mihaino an’i Mosesy sy i Aharôna ny Farao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ny TOMPO tamin’i Mosesy sy i Aharôna:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '–Raha mangataka anareo hanao zava-mahagaga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', dia lazaonao i Aharôna, ry Mosesy, mba handray ny tehinao ka hanipy azy eo anatrehan’ny Farao, dia hanjary fanàny iny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nankao amin’ny Farao i Mosesy sy i Aharôna ka nanatanteraka izay nandidian’ny TOMPO azy; natsipin’i Aharôna teo anatrehan’ny Farao sy ny mpanompony ny tehiny ka nanjary fanàny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nantsoin’ny Farao ihany koa ireo olon-kendry sy mpanao majia tao Ejipta; ary ireo ombiasy ireo dia nanao toy izany koa tamin’ny fitokavany: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Samy nanipy ny tehiny tamin’ny tany avy izy ka nanjary fanàny ireny. Saingy ny tehin’i Aharôna dia nitelina ny tehin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kanefa nihamafy fo ny Farao ka tsy nihaino an’i Mosesy sy i Aharôna araka izay efa nolazain’ny TOMPO rahateo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza voalohany: ny rano miova ho ra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mafy fo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' ka tsy mety mandefa ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa mankanesa any aminy ianao rahampitso maraina, rehefa mivoaka hankeo amoron-drano izy. Ento eny an-tananao ilay tehina tonga bibilava, dia andraso eo amoron’i Neily izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ka izao no ambarao aminy: «Ny TOMPO, Andriamanitry ny Hebreo, no naniraka ahy hilaza aminao hoe: ‹Alefaso ny vahoakako mba hanao fanompoam-pivavahana amiko any an-taniefitra.› Nefa tsy nihaino ianao mandraka ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noho izany, dia lazain’ny TOMPO fa hahafantatra ny maha IZY AZY ianao amin’ity indray mandeha ity. Hokapohiko amin’ity tehina eto an-tanako ity manko ny ranon’i Neily, dia hiova ho ra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Apôk 16.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ho faty ny trondro ka ho maimbo ny ony, dia tsy ho azon’ny Ejiptianina sotroina intsony ny rano ao.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy koa ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazao i Aharôna handray ny tehinao ka haninjitra ny tanany manandrify ny rano rehetra eto Ejipta, izany hoe ny renirano sy ny lakan-drano mbamin’ny farihy rehetra; dia hiova ho ra ny rano amin’ireny. Ary hisy ra manerana ny tany Ejipta manontolo, hatrany an-tsinibe hazo sy vato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia notanterahin’i Mosesy sy i Aharôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Aharôna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mosesy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' araka ny and 17; ao amin’ny RM dia tsy voatondro ny lazaina.'
    marker-yv: yv-n
  - type: text
    text: ' izay nandidian’ny TOMPO azy; ary teo imason’ny Farao sy ny tandapany no nanaingan’i Aharôna ny tehiny ka nikapohany ny ranon’i Neily, dia niova ho ra ny rano rehetra tao amin’ny ony. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Maty ny trondro ka maimbo ny ony, dia tsy azon’ny Ejiptianina nosotroina intsony ny rano, fa nisy ra manerana ny tany Ejipta manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia mba nanao toy izany tamin’ny fitokavany koa ireo mpimasy ejiptianina; koa nihamafy fo ny Farao ka tsy nihaino akory izay nangatahan’i Mosesy sy i Aharôna, araka izay efa nambaran’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lasa nody ny Farao, dia nankao an-tranony fa tsy nahoany akory io raharaha io. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nihady lava-drano manodidina an’i Neily ny Ejiptianina satria tsy azony nosotroina ny rano tamin’ny ony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary fito andro izay no lasa taorian’ny namelezan’ny TOMPO ny ony Neily.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza faharoa: ny sahona'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Taorian’izany, dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mankanesa any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', ka lazao aminy hoe: «Asain’ny TOMPO alefanao ny vahoakany hanao fanompoam-pivavahana aminy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasany, ny and 7.26–8.28 dia mitondra ny laharana 8.1-32.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa raha mandà ianao, dia ho hitanao fa hasiany amin’ny sahona ny faritaninao manontolo: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hitombo ao amin’ny ony ny sahona, dia hiakatra ka hiditra ao an-dapanao sy ao an’efitrano fandrianao ary ao am-parafaranao aza, hiditra any an-tranon’ny mpanomponao sy ny vahoakanao ary koa any amin’ny lafaoro sy ny fanaova-mofonao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Eny, hananika anao sy ny mpanomponao rehetra ary ny vahoakanao ireo sahona ireo.»
