document_id: PSA.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tompo no mpiandry ahy sy mpampiantrano ahy
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida
  - type: text
    content: 'Ny TOMPO no '
  - type: text
    content: mpiandry
  - type: text
    content: ' ahy'
  - type: text
    content: ka tsy ory na inona na inona aho.
  '2':
  - type: text
    content: Ampandrîny eo amin’ny ahi-maitso aho
  - type: text
    content: ary entiny eo amin’ny rano mahafa-tsasatra
  - type: note
    content: Jereo Apôk 7.17.
  - type: text
    content: ','
  '3':
  - type: text
    content: velombelominy aina indray aho,
  - type: text
    content: ary tarihiny amin’ny lala-marina,
  - type: text
    content: satria mpiandry an’i Israely Izy.
  '4':
  - type: text
    content: Na mandeha mamaky lohasaha maizina
  - type: text
    content: izay tandindomin’ny fahafatesana aza aho,
  - type: text
    content: dia tsy misy loza atahorako
  - type: text
    content: fa Ianao no miaraka amiko.
  - type: text
    content: Tarihinao sy arovanao aho
  - type: text
    content: ka izany no mampatoky ahy.
  '5':
  - type: text
    content: Anomananao fanasana aho
  - type: text
    content: eo anoloan’ireo fahavaloko;
  - type: text
    content: hosoranao ilomanitra ny lohako
  - type: note
    content: Io fomba io no tsiahivin’i Jesoa ao amin’ny Lk 7.46. Ampit Sal 92.11; 133.2; Mpitor 9.8.
  - type: text
    content: sady fenoinao mitafotafo ny kaopiko.
  '6':
  - type: text
    content: Eny tokoa, mandritra ny andro iainako rehetra
  - type: text
    content: dia ny hatsarampo amam-pitiavanao no hiaraka amiko.
  - type: text
    content: TOMPO ô, hitoetra
  - type: note
    content: 'hitoetra: jereo Sal 27.4.'
  - type: text
    content: ' lalandava ao an-tranonao aho.'
