document_id: GEN.50,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fandevenana an’i Jakôba
  - type: text
    content: 'Dia nihohoka teo amin’ny tavan’ny rainy i Jôsefa, ary nitomany sady nanoroka azy. '
  '10':
  - type: text
    content: 'Tonga tao Gôrena-Atàda, any am-pitan’i Jôrdàna izy ireo. Tao no nankalazany tamin’ny fomba manetriketrika sy manohina tokoa ny famoizana an’i Jakôba, fa naharitra fito andro ny fisaonan’i Jôsefa an-drainy. '
  '11':
  - type: text
    content: 'Nony nahita izany fomba fisaonana tao Gôrena-Atàda izany ny Kanahanita nonina tamin’iny faritra iny, dia loa-bolana hoe:'
  - type: text
    content: –Fisaonana mangidy ho an’i Ejipta ity!
  - type: text
    content: Izany no niantsoana io toerana any am-pitan’i Jôrdàna io hoe Abela-Mitsiraima, izany hoe Fisaonan’i Ejipta.
  '12':
  - type: text
    content: 'Avy eo dia notanterahin’ireo zanakalahin’i Jakôba izay nanafaran-drainy azy. '
  '13':
  - type: text
    content: Nentiny nankany amin’ny tany Kanahàna ny fatin-drainy ary naleviny tao amin’ny zohy tao an-tsahan’i Makpelà, teo akaikin’i Mamre. Fa novidîn’i Abrahama tamin’i Hefrôna izay hetita io saha io mba ho tany fandevenana
  - type: note
    content: Ampit Asa 7.16.
  - type: text
    content: .
  '14':
  - type: text
    content: Rehefa avy nandevina ny rainy i Jôsefa, dia niverina tany Ejipta ny tenany sy ireo rahalahiny mbamin’ireo olona rehetra izay niara-niakatra taminy handevina ny rainy.
  - type: heading
    content: Ny niafaran’i Jôsefa
  '15':
  - type: text
    content: 'Rehefa hitan’ireo rahalahin’i Jôsefa fa maty ny rainy, dia nifampiresaka izy hoe: «Mety hankahala antsika i Jôsefa ka hamaly faty ireo ratsy nataontsika taminy.» '
  '16':
  - type: text
    content: 'Noho izany, dia nandefa teny nankany amin’i Jôsefa izy hoe:'
  - type: text
    content: '–Ny rainao, talohan’ny nahafatesany, dia nanafatra hoe: '
  '17':
  - type: text
    content: '«Izao no holazainareo amin’i Jôsefa: Mamindrà fo ka avelao ny heloka amam-pahotàn’ireo rahalahinao fa ratsy no nataony taminao.» Koa ankehitriny mba avelao ny helokay mpanompon’Ilay Andriamanitry ny rainao.'
  - type: text
    content: 'Dia nitomany i Jôsefa noho ny teny nalefan’izy ireo taminy. '
  '18':
  - type: text
    content: 'Tonga tany amin’i Jôsefa rahateo koa ireto rahalahiny ka niankohoka teo anatrehany sady nilaza hoe:'
  - type: text
    content: –Indreto izahay ho mpanomponao.
  '19':
  - type: text
    content: 'Fa hoy i Jôsefa taminy:'
  - type: text
    content: '–Aza matahotra ianareo, fa tsy haka ny toeran’Andriamanitra aho. '
  '2':
  - type: text
    content: 'Ary nomen’i Jôsefa baiko ireo dokotera mpanompony mba hanosotra zava-manitra ny rainy; koa notanterahin’ireo ny fanosorana menaka manitra ny fatin’i Jakôba, '
  '20':
  - type: text
    content: 'Nikendry hanisy ratsy ahy ianareo fa Andriamanitra kosa nanova izany ratsy izany ho soa mba hamonjeny vahoaka marobe araka izao hitanareo ankehitriny izao. '
  '21':
  - type: text
    content: Koa aza matahotra ianareo, fa izaho no hiahy ny sakafo ho anareo sy ny ankohonanareo.
  - type: text
    content: Ary nampahery azy i Jôsefa sady nanao teny nanohina ny fony.
  '22':
  - type: text
    content: 'Nipetraka tany Ejipta i Jôsefa sy ny ankohonan-drainy. Folo amby zato taona no andro niainan’i Jôsefa, '
  '23':
  - type: text
    content: ka nahita ny zafiafin’i Efraîma zanany lahy izy ary nanangana ireo zanak’i Makira izay zafikeliny sady zanakalahin’i Manase.
  '24':
  - type: text
    content: 'Indray andro dia hoy i Jôsefa tamin’ireo rahalahiny:'
  - type: text
    content: '–Ho faty aho, nefa hamangy anareo tokoa Andriamanitra ka hampiala anareo amin’ity tany ity ho any amin’ny tany izay efa nianianany homena an’i Abrahama sy i Itsehàka ary i Jakôba. '
  '25':
  - type: text
    content: Koa mianiàna amiko fa rehefa hamangy anareo tokoa Andriamanitra, dia hoentinareo miakatra avy atỳ ny taolam-baloko
  - type: note
    content: Ampit Eks 13.19; Jos 24.32; Heb 11.12.
  - type: text
    content: .
  '26':
  - type: text
    content: Maty i Jôsefa, rehefa feno 110 taona. Nohosorana zava-manitra ny fatiny; ary tao anaty vata vato no nametrahana azy tany Ejipta.
  '3':
  - type: text
    content: nandritra ny efapolo andro ngarangidina mba hitahirizana azy. Ary nisaona an’i Jakôba nandritra ny fitopolo andro ny Ejiptianina.
  '4':
  - type: text
    content: 'Nony afaka ny andro fisaonana, dia hoy i Jôsefa tamin’ireo olona akaikin’ny '
  - type: text
    content: Farao
  - type: text
    content: ':'
  - type: text
    content: '–Raha mba mahita sitraka aminareo aho, dia mba ampitao amin’ny Farao izao teniko izao: '
  '5':
  - type: text
    content: «Alohan’ny nahafatesan-draiko, dia nampianiana ahy izy mba handevina azy any amin’ny fasana izay efa nomaniny any Kanahàna. Koa ankehitriny aoka aho mba hiakatra handevina ny raiko; rehefa izany dia hiverina indray aho
  - type: note
    content: Ampit 47.29-31.
  - type: text
    content: .»
  '6':
  - type: text
    content: 'Nomen’ny Farao lalana i Jôsefa mba handeha handevina ny rainy araka izay efa nianianany. '
  '7':
  - type: text
    content: 'Dia niainga i Jôsefa handevina ny rainy; niaraka taminy ireo olona ambony tao an-dapan’ny Farao sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' rehetra tao Ejipta, '
  '8':
  - type: text
    content: 'ny ankohonan’i Jôsefa manontolo mbamin’ireo rahalahiny ary ireo olon-kafa rehetra tao amin’ny fianakavian-drainy. Tsy nisy najanona tao amin’ny faritr’i Gôsena, afa-tsy ny ankizy sy ny biby fiompy ihany. '
  '9':
  - type: text
    content: Nisy andian-kalesy sy mpitaingin-tsoavaly koa niara-niakatra taminy, ka nafonja tokoa ny andian’olona mpanotrona.
