document_id: GEN.50
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fandevenana an’i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nihohoka teo amin’ny tavan’ny rainy i Jôsefa, ary nitomany sady nanoroka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nomen’i Jôsefa baiko ireo dokotera mpanompony mba hanosotra zava-manitra ny rainy; koa notanterahin’ireo ny fanosorana menaka manitra ny fatin’i Jakôba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: nandritra ny efapolo andro ngarangidina mba hitahirizana azy. Ary nisaona an’i Jakôba nandritra ny fitopolo andro ny Ejiptianina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony afaka ny andro fisaonana, dia hoy i Jôsefa tamin’ireo olona akaikin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha mba mahita sitraka aminareo aho, dia mba ampitao amin’ny Farao izao teniko izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Alohan’ny nahafatesan-draiko, dia nampianiana ahy izy mba handevina azy any amin’ny fasana izay efa nomaniny any Kanahàna. Koa ankehitriny aoka aho mba hiakatra handevina ny raiko; rehefa izany dia hiverina indray aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 47.29-31.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nomen’ny Farao lalana i Jôsefa mba handeha handevina ny rainy araka izay efa nianianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niainga i Jôsefa handevina ny rainy; niaraka taminy ireo olona ambony tao an-dapan’ny Farao sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' rehetra tao Ejipta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ny ankohonan’i Jôsefa manontolo mbamin’ireo rahalahiny ary ireo olon-kafa rehetra tao amin’ny fianakavian-drainy. Tsy nisy najanona tao amin’ny faritr’i Gôsena, afa-tsy ny ankizy sy ny biby fiompy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nisy andian-kalesy sy mpitaingin-tsoavaly koa niara-niakatra taminy, ka nafonja tokoa ny andian’olona mpanotrona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tonga tao Gôrena-Atàda, any am-pitan’i Jôrdàna izy ireo. Tao no nankalazany tamin’ny fomba manetriketrika sy manohina tokoa ny famoizana an’i Jakôba, fa naharitra fito andro ny fisaonan’i Jôsefa an-drainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony nahita izany fomba fisaonana tao Gôrena-Atàda izany ny Kanahanita nonina tamin’iny faritra iny, dia loa-bolana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fisaonana mangidy ho an’i Ejipta ity!
- type: usfm
  marker: p
  children:
  - type: text
    text: Izany no niantsoana io toerana any am-pitan’i Jôrdàna io hoe Abela-Mitsiraima, izany hoe Fisaonan’i Ejipta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avy eo dia notanterahin’ireo zanakalahin’i Jakôba izay nanafaran-drainy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nentiny nankany amin’ny tany Kanahàna ny fatin-drainy ary naleviny tao amin’ny zohy tao an-tsahan’i Makpelà, teo akaikin’i Mamre. Fa novidîn’i Abrahama tamin’i Hefrôna izay hetita io saha io mba ho tany fandevenana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 7.16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rehefa avy nandevina ny rainy i Jôsefa, dia niverina tany Ejipta ny tenany sy ireo rahalahiny mbamin’ireo olona rehetra izay niara-niakatra taminy handevina ny rainy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niafaran’i Jôsefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa hitan’ireo rahalahin’i Jôsefa fa maty ny rainy, dia nifampiresaka izy hoe: «Mety hankahala antsika i Jôsefa ka hamaly faty ireo ratsy nataontsika taminy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Noho izany, dia nandefa teny nankany amin’i Jôsefa izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny rainao, talohan’ny nahafatesany, dia nanafatra hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Izao no holazainareo amin’i Jôsefa: Mamindrà fo ka avelao ny heloka amam-pahotàn’ireo rahalahinao fa ratsy no nataony taminao.» Koa ankehitriny mba avelao ny helokay mpanompon’Ilay Andriamanitry ny rainao.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nitomany i Jôsefa noho ny teny nalefan’izy ireo taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tonga tany amin’i Jôsefa rahateo koa ireto rahalahiny ka niankohoka teo anatrehany sady nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indreto izahay ho mpanomponao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy i Jôsefa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza matahotra ianareo, fa tsy haka ny toeran’Andriamanitra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nikendry hanisy ratsy ahy ianareo fa Andriamanitra kosa nanova izany ratsy izany ho soa mba hamonjeny vahoaka marobe araka izao hitanareo ankehitriny izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa aza matahotra ianareo, fa izaho no hiahy ny sakafo ho anareo sy ny ankohonanareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nampahery azy i Jôsefa sady nanao teny nanohina ny fony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nipetraka tany Ejipta i Jôsefa sy ny ankohonan-drainy. Folo amby zato taona no andro niainan’i Jôsefa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ka nahita ny zafiafin’i Efraîma zanany lahy izy ary nanangana ireo zanak’i Makira izay zafikeliny sady zanakalahin’i Manase.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Indray andro dia hoy i Jôsefa tamin’ireo rahalahiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ho faty aho, nefa hamangy anareo tokoa Andriamanitra ka hampiala anareo amin’ity tany ity ho any amin’ny tany izay efa nianianany homena an’i Abrahama sy i Itsehàka ary i Jakôba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa mianiàna amiko fa rehefa hamangy anareo tokoa Andriamanitra, dia hoentinareo miakatra avy atỳ ny taolam-baloko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 13.19; Jos 24.32; Heb 11.12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Maty i Jôsefa, rehefa feno 110 taona. Nohosorana zava-manitra ny fatiny; ary tao anaty vata vato no nametrahana azy tany Ejipta.
