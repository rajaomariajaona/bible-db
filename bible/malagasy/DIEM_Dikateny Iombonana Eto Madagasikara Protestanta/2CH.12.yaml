document_id: 2CH.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Notafihin’i Sisàka mpanjakan’i Ejipta i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 14.25-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nampandry ny fanjakany sady nanamafy fahefana i Rehabohama, dia nandao ny lalànan’ny TOMPO na ny tenany na ny Israelita rehetra tatsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tamin’ny taona fahadimy nanjakan’i Rehabohama dia niakatra i Sisàka mpanjakan’i Ejipta mba hamely an’i Jerosalema, satria nivadika tamin’ny TOMPO ireo mponina tao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nitondra kalesy 1 200 sy mpitaingin-tsoavaly 60 000 i Sisàka; ary tsy hita isa ny miaramila nanaraka azy avy any Ejipta, dia ny Libianina sy ny Sokita ary ny Etiôpianina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia azony ny tanànamimanda eran’i Joda, ka tonga hatrany Jerosalema izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Noho ny fiavian’i Sisàka, dia tafavory tao Jerosalema i Rehabohama sy ireo mpifehy ny faritr’i Joda. Nanatona ny mpivory kosa i Semahià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO: «Ianareo efa nandao Ahy; Izaho koa mba mandao anareo ho eo ambany fifehezan’i Sisàka.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niaiky hadisoana ny mpanjaka sy ireo mpifehy ny Israelita tatsimo ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rariny ny an’ny TOMPO!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nony hitan’ny TOMPO izany fiekena hadisoana izany, dia nisy indray tenin’ny TOMPO tamin’i Semahià nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa niaiky hadisoana ireo, ka tsy handringana azy Aho fa tsy ho ela dia hanafaka azy; ary ny fahatezerako tsy hatosako amin’i Jerosalema avy amin’ny famelezan’i Sisàka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanefa hilefitra hanompo an’i Sisàka ihany izy ireo, mba hahafantarany fa tsy mitovy ny manompo Ahy sy ny manompo ireo mpanjakan’ny tany vahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia niakatra i Sisàka mpanjakan’i Ejipta mba hamely an’i Jerosalema ka namabo ny raki-tsoa tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' sy tao an-dapan’ny mpanjaka; nobaboiny avokoa ireo, indrindra ny ampinga volamena rehetra izay nataon’i Salômôna'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.15-16; 1 Mp 10.16-17.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho solon’ireny kosa dia nampanao ampinga halimo i Rehabohama; ka ny lehiben’ny mpiambina, izay niandry ireo varavaran’ny lapan’ny mpanjaka, no nanankinany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary na oviana na oviana nidiran’ny mpanjaka tao an-tranon’ny TOMPO, dia tonga ny mpiambina naka ireo ampinga ireo, ka avy eo namerina azy ho ao an’efitranon’ny mpiambina indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Niaiky hadisoana kosa i Rehabohama, ka niala taminy ny fahatezeran’ny TOMPO mba tsy hahalany ringana azy; sady mbola nisy hatsaram-panahy ihany tao Joda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiafaran’ny nanjakàn’i Rehabohama
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 14.21-24, 29-31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I Rehabohama mpanjaka dia nanamafy ny fahefàny tao Jerosalema, ka dia nanjaka; feno 41 taona izy fony tonga mpanjaka, ary naharitra 17 taona no nanjakany tao Jerosalema, ilay tanàna nofidin’ny TOMPO tamin’ireo fokon’i Israely rehetra mba hampitoerany ny vonihahiny. Ny anaran-drenin’i Rehabohama dia i Nahamà izay Hamônita. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nanao ratsy i Rehabohama, satria tsy nampifantoka ny fony hitady ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny tantaran’i Rehabohama, na tamboalohany na tafara, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’i Semahià
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sy i Hidao mpahita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mpahita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 9.9-11. Very io boky voateny eto io fa tsy ananantsika intsony.
    marker-yv: yv-n
  - type: text
    text: ' sady voavisavisa tsara. Ary niady mandrakariva i Rehabohama sy i Jerôbohama. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany i Rehabohama, dia nalevina tao an-Tanànan’i Davida; ary i Abià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Abià '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia antsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abiama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny rijan-teny mirazotra 1 Mp 15.1-8.'
    marker-yv: yv-n
  - type: text
    text: ' zanany lahy no nanjaka nandimby azy.'
