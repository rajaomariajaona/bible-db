document_id: 2CH.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Notafihin’i Sisàka mpanjakan’i Ejipta i Joda
  - type: heading
    content: (Jereo 1 Mp 14.25-28)
  - type: text
    content: 'Rehefa nampandry ny fanjakany sady nanamafy fahefana i Rehabohama, dia nandao ny lalànan’ny TOMPO na ny tenany na ny Israelita rehetra tatsimo. '
  '10':
  - type: text
    content: 'Ho solon’ireny kosa dia nampanao ampinga halimo i Rehabohama; ka ny lehiben’ny mpiambina, izay niandry ireo varavaran’ny lapan’ny mpanjaka, no nanankinany azy. '
  '11':
  - type: text
    content: Ary na oviana na oviana nidiran’ny mpanjaka tao an-tranon’ny TOMPO, dia tonga ny mpiambina naka ireo ampinga ireo, ka avy eo namerina azy ho ao an’efitranon’ny mpiambina indray.
  '12':
  - type: text
    content: Niaiky hadisoana kosa i Rehabohama, ka niala taminy ny fahatezeran’ny TOMPO mba tsy hahalany ringana azy; sady mbola nisy hatsaram-panahy ihany tao Joda.
  - type: heading
    content: Fiafaran’ny nanjakàn’i Rehabohama
  - type: heading
    content: (Jereo 1 Mp 14.21-24, 29-31)
  '13':
  - type: text
    content: 'I Rehabohama mpanjaka dia nanamafy ny fahefàny tao Jerosalema, ka dia nanjaka; feno 41 taona izy fony tonga mpanjaka, ary naharitra 17 taona no nanjakany tao Jerosalema, ilay tanàna nofidin’ny TOMPO tamin’ireo fokon’i Israely rehetra mba hampitoerany ny vonihahiny. Ny anaran-drenin’i Rehabohama dia i Nahamà izay Hamônita. '
  '14':
  - type: text
    content: Ary nanao ratsy i Rehabohama, satria tsy nampifantoka ny fony hitady ny TOMPO.
  '15':
  - type: text
    content: 'Ny tantaran’i Rehabohama, na tamboalohany na tafara, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’i Semahià
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: ' '
  - type: text
    content: sy i Hidao mpahita
  - type: note
    content: 'mpahita: jereo 1 Sam 9.9-11. Very io boky voateny eto io fa tsy ananantsika intsony.'
  - type: text
    content: ' sady voavisavisa tsara. Ary niady mandrakariva i Rehabohama sy i Jerôbohama. '
  '16':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Rehabohama, dia nalevina tao an-Tanànan’i Davida; ary i Abià
  - type: note
    content: I Abià dia antsoina hoe Abiama ao amin’ny rijan-teny mirazotra 1 Mp 15.1-8.
  - type: text
    content: ' zanany lahy no nanjaka nandimby azy.'
  '2':
  - type: text
    content: 'Ary tamin’ny taona fahadimy nanjakan’i Rehabohama dia niakatra i Sisàka mpanjakan’i Ejipta mba hamely an’i Jerosalema, satria nivadika tamin’ny TOMPO ireo mponina tao. '
  '3':
  - type: text
    content: 'Nitondra kalesy 1 200 sy mpitaingin-tsoavaly 60 000 i Sisàka; ary tsy hita isa ny miaramila nanaraka azy avy any Ejipta, dia ny Libianina sy ny Sokita ary ny Etiôpianina. '
  '4':
  - type: text
    content: Dia azony ny tanànamimanda eran’i Joda, ka tonga hatrany Jerosalema izy.
  '5':
  - type: text
    content: 'Noho ny fiavian’i Sisàka, dia tafavory tao Jerosalema i Rehabohama sy ireo mpifehy ny faritr’i Joda. Nanatona ny mpivory kosa i Semahià '
  - type: text
    content: mpaminany
  - type: text
    content: ' ka nanao taminy hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Ianareo efa nandao Ahy; Izaho koa mba mandao anareo ho eo ambany fifehezan’i Sisàka.»'
  '6':
  - type: text
    content: 'Dia niaiky hadisoana ny mpanjaka sy ireo mpifehy ny Israelita tatsimo ka nanao hoe:'
  - type: text
    content: –Rariny ny an’ny TOMPO!
  '7':
  - type: text
    content: 'Ary nony hitan’ny TOMPO izany fiekena hadisoana izany, dia nisy indray tenin’ny TOMPO tamin’i Semahià nanao hoe:'
  - type: text
    content: '–Efa niaiky hadisoana ireo, ka tsy handringana azy Aho fa tsy ho ela dia hanafaka azy; ary ny fahatezerako tsy hatosako amin’i Jerosalema avy amin’ny famelezan’i Sisàka. '
  '8':
  - type: text
    content: Kanefa hilefitra hanompo an’i Sisàka ihany izy ireo, mba hahafantarany fa tsy mitovy ny manompo Ahy sy ny manompo ireo mpanjakan’ny tany vahiny.
  '9':
  - type: text
    content: Dia niakatra i Sisàka mpanjakan’i Ejipta mba hamely an’i Jerosalema ka namabo ny raki-tsoa tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sy tao an-dapan’ny mpanjaka; nobaboiny avokoa ireo, indrindra ny ampinga volamena rehetra izay nataon’i Salômôna'
  - type: note
    content: Jereo 9.15-16; 1 Mp 10.16-17.
  - type: text
    content: '. '
