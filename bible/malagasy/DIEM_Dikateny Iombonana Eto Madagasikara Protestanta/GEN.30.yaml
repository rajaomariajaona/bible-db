document_id: GEN.30,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary rehefa hitan’i Rahely fa tsy niteraka izy, dia nialonany ny rahavaviny ka hoy izy tamin’i Jakôba hoe:'
  - type: text
    content: –Mba omeo zanaka aho! Fa raha tsy izany, dia aleoko maty!
  '10':
  - type: text
    content: 'Ary i Zilpà niteraka zazalahy tamin’i Jakôba, '
  '11':
  - type: text
    content: 'ka hoy i Leà hoe:'
  - type: text
    content: –Manan-jara aho!
  - type: text
    content: Dia nataony hoe Gada
  - type: note
    content: Ny anarana hoe Gada amin’ny teny hebreo dia mampahatsiaro ny fomba fiteny izay nadika hoe tsara vintana eto.
  - type: text
    content: ' ny anarany. '
  '12':
  - type: text
    content: 'Fa mbola niteraka zazalahy faharoa tamin’i Jakôba i Zilpà, '
  '13':
  - type: text
    content: 'ka hoy i Leà hoe:'
  - type: text
    content: –Hasambarana tsy misy toy izany! Fa ankehitriny dia holazain’ny vehivavy hoe sambatra aho.
  - type: text
    content: Dia nataony hoe Asèra
  - type: note
    content: Ny anarana hoe Asèra amin’ny teny hebreo dia mampahatsiaro ny fomba fiteny izay nadika hoe sambatra eto.
  - type: text
    content: ' no anarany.'
  '14':
  - type: text
    content: Indray andro tamin’ny fotoam-pararano iny, dia nandeha nitsangatsangana tany an-tsaha i Reobena ary nahita mandragôra
  - type: note
    content: Ny mandragôra dia hazo madinika izay heverina fa ny fakany dia mampitoe-jaza ny vehivavy.
  - type: text
    content: '. Nentiny tany amin’i Leà reniny izany, ka hoy i Rahely tamin’i Leà:'
  - type: text
    content: –Mba omeo kely amin’ireo mandragôran’ny zanakao aho, azafady!
  '15':
  - type: text
    content: 'Fa novalian’i Leà hoe:'
  - type: text
    content: –Moa tsy ampy anao ve ny nakanao ny vadiko ka tianao halaina koa ankehitriny ny mandragôran-janako?
  - type: text
    content: 'Dia hoy i Rahely hoe:'
  - type: text
    content: –Aleo àry handry any aminao i Jakôba anio alina ho takalon’ny mandragôran-janakao.
  '16':
  - type: text
    content: 'Rehefa tonga avy tany an-tsaha i Jakôba ny hariva, dia nivoaka hitsena azy i Leà sady nanao taminy hoe:'
  - type: text
    content: –Ato amiko no handrianao anio ho takalon’ny mandragôran-janako.
  - type: text
    content: 'Dia nandry tany aminy i Jakôba iny alina iny. '
  '17':
  - type: text
    content: 'Ary nohenoin’Andriamanitra ny vavak’i Leà, ka bevohòka izy ary niteraka zazalahy fahadimy tamin’i Jakôba. '
  '18':
  - type: text
    content: 'Dia hoy ny filàzan’i Leà hoe:'
  - type: text
    content: –Efa novalian’Andriamanitra soa aho satria efa nomeko hovadîn’ny vadiko ny ankizivaviko.
  - type: text
    content: Koa nataony hoe Jisakara
  - type: note
    content: Ny anarana hoe Jisakara amin’ny teny hebreo dia mampahatsiaro ny teny izay nadika hoe efa novaliana soa eto.
  - type: text
    content: ' ny anarany. '
  '19':
  - type: text
    content: 'Ary mbola bevohòka indray i Leà ka niteraka zazalahy fahenina tamin’i Jakôba. '
  '2':
  - type: text
    content: 'Tezitra taminy i Jakôba ka namaly hoe:'
  - type: text
    content: –Izaho angaha no solon’Andriamanitra Izay nisakana ny kibonao tsy hiteraka?
  '20':
  - type: text
    content: 'Dia nilaza izy hoe:'
  - type: text
    content: –Efa nanome zava-tsoa ahy Andriamanitra; ary amin’ity indray mandeha ity dia hanaja ahy ny vadiko, satria efa niteraka enin-dahy ho azy aho.
  - type: text
    content: Dia nataony hoe Zebolòna
  - type: note
    content: Ny anarana hoe Zebolòna dia mampahatsiaro ny matoanteny izay nadika hoe hanaja.
  - type: text
    content: 'ny anarany. '
  '21':
  - type: text
    content: Taorian’izany dia mbola niteraka zazavavy koa izy, ka nataony hoe Dinà ny anarany.
  '22':
  - type: text
    content: 'Ary Andriamanitra nahatsiaro an’i Rahely ka nihaino ny fangatahany, dia nampitoe-jaza azy. '
  '23':
  - type: text
    content: 'Dia bevohòka i Rahely ary tera-dahy ka loa-bolana hoe:'
  - type: text
    content: –Efa nahafa-tondromaso ahy Andriamanitra.
  '24':
  - type: text
    content: Dia nataony hoe Jôsefa
  - type: note
    content: Ny anarana hoe Jôsefa amin’ny teny hebreo dia mampahatsiaro ny matoanteny izay nadika hoe mbola hanampy eto.
  - type: text
    content: ' ny anarany, sady niteny izy hoe:'
  - type: text
    content: –Enga anie ka mbola hanampy zanakalahy iray hafa ho ahy ny TOMPO!
  - type: heading
    content: Nihananan-karena i Jakôba
  '25':
  - type: text
    content: 'Rehefa avy niteraka an’i Jôsefa i Rahely, dia hoy i Jakôba tamin’i Labàna:'
  - type: text
    content: '–Alefaso hiverina any an-tanindrazako aho. '
  '26':
  - type: text
    content: Avelao hoentiko ireo vady aman-janako, izay antony nanompoako anao. Aoka aho handeha, satria efa fantatrao avokoa ireo asa efa nataoko ho anao!
  '27':
  - type: text
    content: 'Namaly azy i Labàna hoe:'
  - type: text
    content: '–Miangavy aho raha mba mahita famindrampo aminao ihany. Fantatro fa noho ny aminao no '
  - type: text
    content: nitahian
  - type: text
    content: '’ny TOMPO ahy. '
  '28':
  - type: text
    content: Koa lazao izay ho karamanao fa homeko!
  '29':
  - type: text
    content: 'Dia hoy i Jakôba taminy:'
  - type: text
    content: '–Ny tenanao mihitsy no nahalala ny nanompoako anao sy izay nanjarian’ny biby fiompinao noho ny amiko. '
  '3':
  - type: text
    content: 'Fa hoy i Rahely taminy:'
  - type: text
    content: –Io àry i Bilehà mpanompovaviko; ndeha mandry aminy, dia hiteraka zaza hatsangako izy, ary hanan-janaka avy aminy aho.
  '30':
  - type: text
    content: Ny fanananao izay kely talohan’ny niaviako dia nitombo be dia be teo ambany fitantanako, fa notahîn’ny TOMPO ianao. Ary ankehitriny, tsy mba tokony hiasa ho an’ny ankohonako amin’izay ve aho?
  '31':
  - type: text
    content: 'Fa hoy indray i Labàna hoe:'
  - type: text
    content: –Inona no karama haloako aminao?
  - type: text
    content: 'Ka novalian’i Jakôba hoe:'
  - type: text
    content: '–Tsy misy haloanao amiko akory. Fa raha manaiky izao soso-kevitra izao ianao, dia hiverina hiandry sy hitandrina ny ondry aman’osinao aho. '
  '32':
  - type: text
    content: 'Hisafo any amin’ny ondry aman’osinao rehetra aho anio, ka hanavaka ny ondry maramara sy sada na hoe vandambandana rehetra ary ny osy maramara sy sada rehetra: ireo no ho karamako'
  - type: note
    content: Nanova impolo ny karamany (31.7,41) i Jakôba.
  - type: text
    content: '. '
  '33':
  - type: text
    content: Amin’ny andro ho avy, mba hizahanao ny fahamarinako, dia tongava hijery ny karamako, ka izay rehetra tsy misy sada na maramara ao amin’ny osy ary vandambandana ao amin’ny ondry dia biby nangalarina.
  '34':
  - type: text
    content: 'Ary hoy i Labàna hoe:'
  - type: text
    content: –Eny, ekeko ny soso-kevitra.
  '35':
  - type: text
    content: 'Ny androtr’iny ihany anefa dia efa navahan’i Labàna ka natolony ho eo am-pelatanan’ny zanany ireo osilahy sadìka sy sada sy ireo osivavy rehetra maramara sy sada ary ireo ondry vandambandana rehetra; '
  '36':
  - type: text
    content: ary nasiany lalana tokony ho telo andro ny teo anelanelanan’ny zanany lahy sy i Jakôba.
  - type: text
    content: 'I Jakôba kosa dia niandry ny andiany sisa tamin’ny ondry aman’osin’i Labàna. '
  '37':
  - type: text
    content: 'Koa nalainy ny tsora-kazo maromaro tamin’ny hazo beravina sy ny hazo amandy ary ny hazo platàna ka nataony vaofy vandana hisehoan’ny fotsy teo amin’ny tsora-kazo. '
  '38':
  - type: text
    content: 'Napetrany tao amin’ny tavy fisotroan-drano ireny, teo anoloan’ireo biby izay maimay hikambana rehefa tonga hisotro rano. '
  '39':
  - type: text
    content: 'Dia nikambana teo anoloan’ireo tsora-kazo ireo ny ondry aman’osy ka niteraka sadìka sy maramara ary sada. '
  '4':
  - type: text
    content: 'Dia nomeny an’i Jakôba ny mpanompovaviny ho vadîny, ka dia nandry taminy izy. '
  '40':
  - type: text
    content: Ary ireo ondry efa navahan’i Jakôba dia natodiny hijery ny sadika sy maramara rehetra teo amin’ny biby fiompin’i Labàna.
  - type: text
    content: 'Natokan’i Jakôba ny ondry aman’osy ho an’ny tenany fa tsy navelany hifangaro tamin’ny an’i Labàna. '
  '41':
  - type: text
    content: 'Koa isaky ny hikambana ireo biby matanjaka, dia napetrak’i Jakôba tao amin’ny tavy fisotroan-drano ireny tsora-kazo ireny mba hikambanany eo anoloan’ny tsora-kazo. '
  '42':
  - type: text
    content: Fa raha farofy kosa ireo biby, dia tsy mba napetrany teo ireny tsora-kazo ireny; ka dia ireo biby farofy no an’i Labàna fa ireo matanjaka kosa no an’i Jakôba.
  - type: heading
    content: Nandositra avy tao amin’i Labàna i Jakôba
  '43':
  - type: text
    content: Ary nitombo harena fatratra i Jakôba ka nanana andian’ondry aman’osy be sy mpanompo vavy sy lahy maro ary rameva sy boriky betsaka.
  '5':
  - type: text
    content: 'Ary bevohòka i Bilehà ka niteraka zazalahy tamin’i Jakôba. '
  '6':
  - type: text
    content: 'Dia hoy i Rahely hoe:'
  - type: text
    content: –Andriamanitra efa nanome rariny ahy ka nihaino ny fangatahako, ary nanome ahy zanakalahy.
  - type: text
    content: Dia nataony hoe Dana
  - type: note
    content: Dana dia mampahatsiaro ny matoanteny izay nadika hoe efa nitsara eto.
  - type: text
    content: ' ny anarany. '
  '7':
  - type: text
    content: 'Mbola bevohòka indray i Bilehà ka niteraka zazalahy faharoa tamin’i Jakôba, '
  '8':
  - type: text
    content: 'dia hoy i Rahely hoe:'
  - type: text
    content: –Efa niady mafy tamin’ny rahavaviko aho, ka nandresy!
  - type: text
    content: Dia nataony hoe Naftalỳ
  - type: note
    content: Amin’ny fiteny hebreo ny anarana hoe Naftalỳ dia mampahatsiaro ny matoanteny izay nadika hoe efa niady mafy eto.
  - type: text
    content: ' ny anarany.'
  '9':
  - type: text
    content: 'Ary nony hitan’i Leà fa nitsaha-jaza izy, dia nalainy i Zilpà mpanompovaviny ka nomeny hovadîn’i Jakôba. '
