document_id: GEN.30,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary rehefa hitan’i Rahely fa tsy niteraka izy, dia nialonany ny rahavaviny ka hoy izy tamin’i Jakôba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba omeo zanaka aho! Fa raha tsy izany, dia aleoko maty!
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary i Zilpà niteraka zazalahy tamin’i Jakôba, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ka hoy i Leà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manan-jara aho!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataony hoe Gada
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gada
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' amin’ny teny hebreo dia mampahatsiaro ny fomba fiteny izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsara vintana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa mbola niteraka zazalahy faharoa tamin’i Jakôba i Zilpà, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ka hoy i Leà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hasambarana tsy misy toy izany! Fa ankehitriny dia holazain’ny vehivavy hoe sambatra aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataony hoe Asèra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Asèra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' amin’ny teny hebreo dia mampahatsiaro ny fomba fiteny izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sambatra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto.'
      marker-yv: yv-n
    - type: text
      text: ' no anarany.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Indray andro tamin’ny fotoam-pararano iny, dia nandeha nitsangatsangana tany an-tsaha i Reobena ary nahita mandragôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny mandragôra dia hazo madinika izay heverina fa ny fakany dia mampitoe-jaza ny vehivavy.
      marker-yv: yv-n
    - type: text
      text: '. Nentiny tany amin’i Leà reniny izany, ka hoy i Rahely tamin’i Leà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba omeo kely amin’ireo mandragôran’ny zanakao aho, azafady!
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa novalian’i Leà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa tsy ampy anao ve ny nakanao ny vadiko ka tianao halaina koa ankehitriny ny mandragôran-janako?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Rahely hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aleo àry handry any aminao i Jakôba anio alina ho takalon’ny mandragôran-janakao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rehefa tonga avy tany an-tsaha i Jakôba ny hariva, dia nivoaka hitsena azy i Leà sady nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ato amiko no handrianao anio ho takalon’ny mandragôran-janako.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandry tany aminy i Jakôba iny alina iny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nohenoin’Andriamanitra ny vavak’i Leà, ka bevohòka izy ary niteraka zazalahy fahadimy tamin’i Jakôba. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia hoy ny filàzan’i Leà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa novalian’Andriamanitra soa aho satria efa nomeko hovadîn’ny vadiko ny ankizivaviko.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nataony hoe Jisakara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jisakara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' amin’ny teny hebreo dia mampahatsiaro ny teny izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: efa novaliana soa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary mbola bevohòka indray i Leà ka niteraka zazalahy fahenina tamin’i Jakôba. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tezitra taminy i Jakôba ka namaly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho angaha no solon’Andriamanitra Izay nisakana ny kibonao tsy hiteraka?
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nilaza izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa nanome zava-tsoa ahy Andriamanitra; ary amin’ity indray mandeha ity dia hanaja ahy ny vadiko, satria efa niteraka enin-dahy ho azy aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataony hoe Zebolòna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Zebolòna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mampahatsiaro ny matoanteny izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hanaja
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ny anarany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Taorian’izany dia mbola niteraka zazavavy koa izy, ka nataony hoe Dinà ny anarany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary Andriamanitra nahatsiaro an’i Rahely ka nihaino ny fangatahany, dia nampitoe-jaza azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia bevohòka i Rahely ary tera-dahy ka loa-bolana hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa nahafa-tondromaso ahy Andriamanitra.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia nataony hoe Jôsefa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jôsefa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' amin’ny teny hebreo dia mampahatsiaro ny matoanteny izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mbola hanampy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany, sady niteny izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Enga anie ka mbola hanampy zanakalahy iray hafa ho ahy ny TOMPO!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nihananan-karena i Jakôba
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rehefa avy niteraka an’i Jôsefa i Rahely, dia hoy i Jakôba tamin’i Labàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Alefaso hiverina any an-tanindrazako aho. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Avelao hoentiko ireo vady aman-janako, izay antony nanompoako anao. Aoka aho handeha, satria efa fantatrao avokoa ireo asa efa nataoko ho anao!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Namaly azy i Labàna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Miangavy aho raha mba mahita famindrampo aminao ihany. Fantatro fa noho ny aminao no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitahian
    - type: text
      text: '’ny TOMPO ahy. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Koa lazao izay ho karamanao fa homeko!
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia hoy i Jakôba taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny tenanao mihitsy no nahalala ny nanompoako anao sy izay nanjarian’ny biby fiompinao noho ny amiko. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa hoy i Rahely taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Io àry i Bilehà mpanompovaviko; ndeha mandry aminy, dia hiteraka zaza hatsangako izy, ary hanan-janaka avy aminy aho.
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ny fanananao izay kely talohan’ny niaviako dia nitombo be dia be teo ambany fitantanako, fa notahîn’ny TOMPO ianao. Ary ankehitriny, tsy mba tokony hiasa ho an’ny ankohonako amin’izay ve aho?
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa hoy indray i Labàna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no karama haloako aminao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’i Jakôba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy misy haloanao amiko akory. Fa raha manaiky izao soso-kevitra izao ianao, dia hiverina hiandry sy hitandrina ny ondry aman’osinao aho. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Hisafo any amin’ny ondry aman’osinao rehetra aho anio, ka hanavaka ny ondry maramara sy sada na hoe vandambandana rehetra ary ny osy maramara sy sada rehetra: ireo no ho karamako'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.32 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Nanova impolo ny karamany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (31.7,41) i Jakôba.
      marker-yv: yv-n
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Amin’ny andro ho avy, mba hizahanao ny fahamarinako, dia tongava hijery ny karamako, ka izay rehetra tsy misy sada na maramara ao amin’ny osy ary vandambandana ao amin’ny ondry dia biby nangalarina.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary hoy i Labàna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, ekeko ny soso-kevitra.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny androtr’iny ihany anefa dia efa navahan’i Labàna ka natolony ho eo am-pelatanan’ny zanany ireo osilahy sadìka sy sada sy ireo osivavy rehetra maramara sy sada ary ireo ondry vandambandana rehetra; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ary nasiany lalana tokony ho telo andro ny teo anelanelanan’ny zanany lahy sy i Jakôba.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jakôba kosa dia niandry ny andiany sisa tamin’ny ondry aman’osin’i Labàna. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Koa nalainy ny tsora-kazo maromaro tamin’ny hazo beravina sy ny hazo amandy ary ny hazo platàna ka nataony vaofy vandana hisehoan’ny fotsy teo amin’ny tsora-kazo. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Napetrany tao amin’ny tavy fisotroan-drano ireny, teo anoloan’ireo biby izay maimay hikambana rehefa tonga hisotro rano. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia nikambana teo anoloan’ireo tsora-kazo ireo ny ondry aman’osy ka niteraka sadìka sy maramara ary sada. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nomeny an’i Jakôba ny mpanompovaviny ho vadîny, ka dia nandry taminy izy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary ireo ondry efa navahan’i Jakôba dia natodiny hijery ny sadika sy maramara rehetra teo amin’ny biby fiompin’i Labàna.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natokan’i Jakôba ny ondry aman’osy ho an’ny tenany fa tsy navelany hifangaro tamin’ny an’i Labàna. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Koa isaky ny hikambana ireo biby matanjaka, dia napetrak’i Jakôba tao amin’ny tavy fisotroan-drano ireny tsora-kazo ireny mba hikambanany eo anoloan’ny tsora-kazo. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Fa raha farofy kosa ireo biby, dia tsy mba napetrany teo ireny tsora-kazo ireny; ka dia ireo biby farofy no an’i Labàna fa ireo matanjaka kosa no an’i Jakôba.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nandositra avy tao amin’i Labàna i Jakôba
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Ary nitombo harena fatratra i Jakôba ka nanana andian’ondry aman’osy be sy mpanompo vavy sy lahy maro ary rameva sy boriky betsaka.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary bevohòka i Bilehà ka niteraka zazalahy tamin’i Jakôba. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy i Rahely hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andriamanitra efa nanome rariny ahy ka nihaino ny fangatahako, ary nanome ahy zanakalahy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataony hoe Dana
