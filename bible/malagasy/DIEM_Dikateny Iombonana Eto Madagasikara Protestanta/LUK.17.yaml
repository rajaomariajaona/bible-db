document_id: LUK.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mahaiza mananatra sy mamela
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 18.6-7, 21-22; Mk 9.42)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray i Jesoa tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hisy lalandava ny toe-javatra mitarika amin’ny ratsy; nefa mampalahelo izay olona mahatonga izany! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Torak’izany koa ianareo, rehefa vitanareo izay rehetra nasain’Andriamanitra hatao, dia milazà hoe: «Mpanompo tsy mendrika sitraka izahay, fa izay nataonay dia adidinay rahateo!»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ireo marary hoditra folo lahy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nizotra ho any Jerosalema i Jesoa, dia namaky faritany miolotra amin’i Samaria sy i Galilea. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha niditra tao amin’ny tanàna anankiray Izy, dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: marary hoditra
    - type: text
      text: ' folo lahy nitsena Azy. Nijanona lavidavitra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 13.45-46.
      marker-yv: yv-n
    - type: text
      text: ' ihany izy folo lahy '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady niantsoantso hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Jesoa Mpampianatra ô, mamindrà fo aminay!
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahita azy ireo i Jesoa ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha miseho amin’ny mpisorona ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 14.2-3.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola teny an-dalana izy folo lahy, dia sitrana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny anankiray, raha vao nahita fa sitrana, dia niverina ka niantsoantso nanome voninahitra an’Andriamanitra, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'niankohoka teo an-tongotr’i Jesoa sady nisaotsaotra Azy; ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Samaritanina
    - type: text
      text: ' ralehilahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny i Jesoa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy folo lahy ve no sitrana? Ka aiza ny sivy? '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy nisy nahalala niverina nanome voninahitra an’Andriamanitra ve afa-tsy ity olona hafa firenena ity?
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitsangàna ka modia, ny finoanao no nahasitrana anao!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiavian’ny Fanjakàn’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 24.23-28, 37-41)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Aleo izy anantonana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vatobe
    - type: text
      text: ' fikoseham-bary eo amin’ny vozony ka atsipy any an-dranomasina mba tsy hitarika ny anankiray amin’ireny madinika ireny hanao ratsy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' indray kosa no nanontany an’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Rahoviana no ho avy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy talaky maso ny fiavian’ny Fanjakàn’Andriamanitra. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy holazaina hoe: «Intỳ eto izy», na hoe «Irỳ erỳ», satria indro efa eo afovoanareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: eo afovoanareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: eo aminareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toy izay ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ao anatinareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (satria Farisianina no itenenan’i Jesoa).'
      marker-yv: yv-n
    - type: text
      text: ' ny Fanjakàn’Andriamanitra.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ho avy ny fotoana hanirianareo hahita anankiray amin’ny andro hiavian’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ', kanefa tsy hahita ianareo. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hisy hilaza aminareo hoe: «Irỳ erỳ izy!» na hoe «Intỳ eto!», saingy aza mitotototo mankany. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa tahaka ny tselatra manelatra sady mahazava hatramin’ny faravodilanitra iray ka hatreo amin’ny faravodilanitra andaniny, ho toy izany ny Zanak’olona amin’ny androny hiaviany. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Alohan’izany anefa, dia tsy maintsy hijaly mafy Izy ary holavin’ny olona ankehitriny. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Toy izay nitranga tamin’ny andron’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Noà
    - type: text
      text: ' no ho tonga amin’ny andro hiavian’ny Zanak’olona. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nihinana sy nisotro ary nampaka-bady sy nampakarina ny olona tamin’izay, mandra-pigadon’ny andro nidiran’i Noà tanatin’ny sambofiara: tonga ny safodrano ary nandringana azy rehetra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny and 26-27, jereo Gen 6.9–7.24.
      marker-yv: yv-n
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Toy izay nitranga tamin’ny andron’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Lôta
    - type: text
      text: ' ihany koa. Nihinana sy nisotro ny olona tamin’izay, nividy sy nivarotra, ary namboly sy nanorin-trano; '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'nefa tamin’ny andro nialan’i Lôta tao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sôdôma
    - type: text
      text: ', dia nilatsaka toa oram-baratra avy any an-danitra ny afo aman-tsolifara ka nandevona azy rehetra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny and 28-29, jereo Gen 18.20–19.25. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'solifara:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' akoran-javatra vonivony izay sady miteraka hafanana be no mamofona ratsy, raha sendra dorana.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa mitandrema tena ianareo!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha diso ny rahalahinao, dia anaro; ka raha mivalo izy, dia avelao. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Toy izany no ho tonga amin’ny andro hisehoan’ny Zanak’olona.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany, izay eny an-tampon-trano, aoka tsy hidina hamory ny entany ao an-trano; ary toy izany koa izay any an-tsaha, aoka tsy hiverina any an-trano. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsarovy ny vadin’i Lôta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 19.26.
      marker-yv: yv-n
    - type: text
      text: '! '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mitady hitsitsy ny ainy no hahavery azy; fa izay manao vy very ny ainy no hahatahiry azy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo fa amin’izany alina izany, dia hisy roa lahy miara-misakafo: ka ny iray halaina, ny iray havela; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hisy roa vavy miara-mikoso-bary: ka ny iray halaina, ny iray havela; [ '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hisy roa lahy tafaraka eny an-tsaha: ka ny iray halaina, ny iray havela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 24.40.
      marker-yv: yv-n
    - type: text
      text: .]
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontanian’ny mpianany i Jesoa ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza moa, ry Tompo, no hitrangan’izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay misy ny faty no hifamotoanan’ny voromahery!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha diso aminao hatramin’ny impito anatin’ny indray andro aza ny rahalahinao, nefa miverina aminao hatrany manao hoe: «mivalo aho», dia avelao!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny finoana
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' tamin’ny Tompo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba ampitomboy ny finoanay!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha manam-pinoana hoatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voan-tsinapy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 17.20 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ianareo dia ho afa-milaza amin’ity voaroihazo ity hoe: «Miongota, ary aoka haniry any an-dranomasina»; dia hanoa anareo izy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpanompo manefa ny adidiny
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '–Aoka hatao hoe misy aminareo manana mpanompo, mpiasa tany na mpiandry biby fiompy. Raha mody avy any an-tsaha ve ilay mpanompo, dia hilazana hoe: «Avia faingana hisakafo»? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsia, fa izao no hatao aminy: «Anamboary sakafo aho; ary misikîna hampihinana ahy mandritra ny isakafoanako. Aorian’izany vao hisakafo ianao.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankasitrahina ve ilay mpanompo, rehefa vitany izay nasaina hataony? Tsia! '
