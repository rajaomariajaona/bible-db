document_id: LUK.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mahaiza mananatra sy mamela
  - type: heading
    content: (Jereo Mt 18.6-7, 21-22; Mk 9.42)
  - type: text
    content: 'Hoy indray i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: '–Hisy lalandava ny toe-javatra mitarika amin’ny ratsy; nefa mampalahelo izay olona mahatonga izany! '
  '10':
  - type: text
    content: 'Torak’izany koa ianareo, rehefa vitanareo izay rehetra nasain’Andriamanitra hatao, dia milazà hoe: «Mpanompo tsy mendrika sitraka izahay, fa izay nataonay dia adidinay rahateo!»'
  - type: heading
    content: Sitranin’i Jesoa ireo marary hoditra folo lahy
  '11':
  - type: text
    content: 'Raha nizotra ho any Jerosalema i Jesoa, dia namaky faritany miolotra amin’i Samaria sy i Galilea. '
  '12':
  - type: text
    content: 'Raha niditra tao amin’ny tanàna anankiray Izy, dia nisy '
  - type: text
    content: marary hoditra
  - type: text
    content: ' folo lahy nitsena Azy. Nijanona lavidavitra'
  - type: note
    content: Jereo Lev 13.45-46.
  - type: text
    content: ' ihany izy folo lahy '
  '13':
  - type: text
    content: 'sady niantsoantso hoe:'
  - type: text
    content: –Ry Jesoa Mpampianatra ô, mamindrà fo aminay!
  '14':
  - type: text
    content: 'Nahita azy ireo i Jesoa ka nanao taminy hoe:'
  - type: text
    content: –Ndeha miseho amin’ny mpisorona ianareo
  - type: note
    content: Jereo Lev 14.2-3.
  - type: text
    content: '!'
  - type: text
    content: 'Raha mbola teny an-dalana izy folo lahy, dia sitrana. '
  '15':
  - type: text
    content: 'Ny anankiray, raha vao nahita fa sitrana, dia niverina ka niantsoantso nanome voninahitra an’Andriamanitra, '
  '16':
  - type: text
    content: 'niankohoka teo an-tongotr’i Jesoa sady nisaotsaotra Azy; ary '
  - type: text
    content: Samaritanina
  - type: text
    content: ' ralehilahy. '
  '17':
  - type: text
    content: 'Dia niteny i Jesoa nanao hoe:'
  - type: text
    content: '–Tsy folo lahy ve no sitrana? Ka aiza ny sivy? '
  '18':
  - type: text
    content: Tsy nisy nahalala niverina nanome voninahitra an’Andriamanitra ve afa-tsy ity olona hafa firenena ity?
  '19':
  - type: text
    content: 'Ary dia hoy i Jesoa taminy:'
  - type: text
    content: –Mitsangàna ka modia, ny finoanao no nahasitrana anao!
  - type: heading
    content: Ny fiavian’ny Fanjakàn’Andriamanitra
  - type: heading
    content: (Jereo Mt 24.23-28, 37-41)
  '2':
  - type: text
    content: 'Aleo izy anantonana '
  - type: text
    content: vatobe
  - type: text
    content: ' fikoseham-bary eo amin’ny vozony ka atsipy any an-dranomasina mba tsy hitarika ny anankiray amin’ireny madinika ireny hanao ratsy. '
  '20':
  - type: text
    content: 'Ireo '
  - type: text
    content: Farisianina
  - type: text
    content: ' indray kosa no nanontany an’i Jesoa hoe:'
  - type: text
    content: '–Rahoviana no ho avy ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '?'
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: '–Tsy talaky maso ny fiavian’ny Fanjakàn’Andriamanitra. '
  '21':
  - type: text
    content: 'Tsy holazaina hoe: «Intỳ eto izy», na hoe «Irỳ erỳ», satria indro efa eo afovoanareo'
  - type: note
    content: eo afovoanareo na eo aminareo, toy izay ny hoe ao anatinareo (satria Farisianina no itenenan’i Jesoa).
  - type: text
    content: ' ny Fanjakàn’Andriamanitra.'
  '22':
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: '–Ho avy ny fotoana hanirianareo hahita anankiray amin’ny andro hiavian’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', kanefa tsy hahita ianareo. '
  '23':
  - type: text
    content: 'Hisy hilaza aminareo hoe: «Irỳ erỳ izy!» na hoe «Intỳ eto!», saingy aza mitotototo mankany. '
  '24':
  - type: text
    content: 'Fa tahaka ny tselatra manelatra sady mahazava hatramin’ny faravodilanitra iray ka hatreo amin’ny faravodilanitra andaniny, ho toy izany ny Zanak’olona amin’ny androny hiaviany. '
  '25':
  - type: text
    content: 'Alohan’izany anefa, dia tsy maintsy hijaly mafy Izy ary holavin’ny olona ankehitriny. '
  '26':
  - type: text
    content: 'Toy izay nitranga tamin’ny andron’i '
  - type: text
    content: Noà
  - type: text
    content: ' no ho tonga amin’ny andro hiavian’ny Zanak’olona. '
  '27':
  - type: text
    content: 'Nihinana sy nisotro ary nampaka-bady sy nampakarina ny olona tamin’izay, mandra-pigadon’ny andro nidiran’i Noà tanatin’ny sambofiara: tonga ny safodrano ary nandringana azy rehetra'
  - type: note
    content: Momba ny and 26-27, jereo Gen 6.9–7.24.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Toy izay nitranga tamin’ny andron’i '
  - type: text
    content: Lôta
  - type: text
    content: ' ihany koa. Nihinana sy nisotro ny olona tamin’izay, nividy sy nivarotra, ary namboly sy nanorin-trano; '
  '29':
  - type: text
    content: 'nefa tamin’ny andro nialan’i Lôta tao '
  - type: text
    content: Sôdôma
  - type: text
    content: ', dia nilatsaka toa oram-baratra avy any an-danitra ny afo aman-tsolifara ka nandevona azy rehetra'
  - type: note
    content: 'Momba ny and 28-29, jereo Gen 18.20–19.25. –solifara: akoran-javatra vonivony izay sady miteraka hafanana be no mamofona ratsy, raha sendra dorana.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: Koa mitandrema tena ianareo!
  - type: text
    content: 'Raha diso ny rahalahinao, dia anaro; ka raha mivalo izy, dia avelao. '
  '30':
  - type: text
    content: Toy izany no ho tonga amin’ny andro hisehoan’ny Zanak’olona.
  '31':
  - type: text
    content: 'Amin’izany andro izany, izay eny an-tampon-trano, aoka tsy hidina hamory ny entany ao an-trano; ary toy izany koa izay any an-tsaha, aoka tsy hiverina any an-trano. '
  '32':
  - type: text
    content: Tsarovy ny vadin’i Lôta
  - type: note
    content: Jereo Gen 19.26.
  - type: text
    content: '! '
  '33':
  - type: text
    content: 'Izay mitady hitsitsy ny ainy no hahavery azy; fa izay manao vy very ny ainy no hahatahiry azy. '
  '34':
  - type: text
    content: 'Lazaiko aminareo fa amin’izany alina izany, dia hisy roa lahy miara-misakafo: ka ny iray halaina, ny iray havela; '
  '35':
  - type: text
    content: 'hisy roa vavy miara-mikoso-bary: ka ny iray halaina, ny iray havela; [ '
  '36':
  - type: text
    content: 'hisy roa lahy tafaraka eny an-tsaha: ka ny iray halaina, ny iray havela'
  - type: note
    content: Jereo Mt 24.40.
  - type: text
    content: .]
  '37':
  - type: text
    content: 'Dia nanontanian’ny mpianany i Jesoa ka nataony hoe:'
  - type: text
    content: –Aiza moa, ry Tompo, no hitrangan’izany?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Izay misy ny faty no hifamotoanan’ny voromahery!
  '4':
  - type: text
    content: 'Ary raha diso aminao hatramin’ny impito anatin’ny indray andro aza ny rahalahinao, nefa miverina aminao hatrany manao hoe: «mivalo aho», dia avelao!'
  - type: heading
    content: Ny finoana
  '5':
  - type: text
    content: 'Ary hoy ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' tamin’ny Tompo:'
  - type: text
    content: –Mba ampitomboy ny finoanay!
  '6':
  - type: text
    content: 'Ka novalian’ny Tompo hoe:'
  - type: text
    content: '–Raha manam-pinoana hoatra ny '
  - type: text
    content: voan-tsinapy
  - type: note
    content: Jereo Mt 17.20 sy nta.
  - type: text
    content: ' ianareo dia ho afa-milaza amin’ity voaroihazo ity hoe: «Miongota, ary aoka haniry any an-dranomasina»; dia hanoa anareo izy.'
  - type: heading
    content: Ny mpanompo manefa ny adidiny
  '7':
  - type: text
    content: '–Aoka hatao hoe misy aminareo manana mpanompo, mpiasa tany na mpiandry biby fiompy. Raha mody avy any an-tsaha ve ilay mpanompo, dia hilazana hoe: «Avia faingana hisakafo»? '
  '8':
  - type: text
    content: 'Tsia, fa izao no hatao aminy: «Anamboary sakafo aho; ary misikîna hampihinana ahy mandritra ny isakafoanako. Aorian’izany vao hisakafo ianao.» '
  '9':
  - type: text
    content: 'Ary ankasitrahina ve ilay mpanompo, rehefa vitany izay nasaina hataony? Tsia! '
