document_id: GEN.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tapa-kevitra handringana ny olona ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nanomboka nihamaro ny olona teto ambonin’ny tany ka niteraka zazavavy maro, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telo lahy ny naterak’i Noà, dia i Sema sy i Hama ary i Jafeta.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo anatrehan’Andriamanitra dia efa nihalò ny mponin’ny tany sady feno herisetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nijery Izy ka indro feno fahalovana ny tany, satria ny olombelona rehetra tambonin’ny tany no efa nanimba ny fitondrantenany avy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Andriamanitra tamin’i Noà: «Tapa-kevitra aho handringana ny olombelona. Fa noho ny aminy dia feno herisetra ny tany, koa hofongorako eto an-tany izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, manaova fiara ho anao, mitovy amin’ny sambo lehibe vita amin’ny hazo kipreso, dia asio efitrefitra ka hosory dity ao anatiny sy eo ivelany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no hanaovanao azy: 150 metatra ny halavany, 25 metatra ny sakany ary 15 metatra ny haavony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tafoy izy, ka asio elanelany antsasa-metatra eo amin’ny tafo sy ny rindrin-kazo; voleo varavarana amin’ny lafiny iray, ary asio rihana telo ny sambofiara. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro Aho hahatonga safo-drano lehibe mba hamongorana izay rehetra manana aina atỳ ambany lanitra, ka ho levona avokoa izay rehetra eny ambonin’ny tany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hajoroko kosa ny fanekempihavanako aminao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Miantoka Aho fa hanafaka anao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ka hiditra ao amin’ny sambofiara ianao sy ny vadinao mbamin’ireo zanakao lahy sy ny vinantovavinao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Itondray tsiroaroa avy ny zava-mananaina rehetra isan-karazany, dia lahy sy vavy; ka ampidiro ao an-tsambofiara mba hovelomina miaraka aminao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hitan’ireo zanakalahin’andriamanitra fa tsara tarehy ireny zazavavy ireny, ka nifidianany izay ho vadiny.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vorona isan-karazany ary ny biby hafa rehetra isan-karazany eto an-tany, na lehibe na kely, no hankeo aminao tsiroaroa mba hovelomina. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianao kosa, maka amin’ny karazan-tsakafo rehetra mety ho fihinana, ka angony eo aminao mba ho sakafonao sy ho sakafon’izy ireo koa.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia notanterahin’i Noà izany; ka araka izay rehetra efa nandidian’Andriamanitra azy no nataony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ampit Heb 11.7 '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Miantoka Aho fa hanafaka anao.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hoy ny TOMPO hoe: «Tsy hitoetra mandrakariva ao amin’ny olona ny Fanahiko noho ny faniasiavany; amin’ny maha nofo azy dia ho 120 taona ny andro iainany.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany fotoana izany no nisian’ireo rapeton’olona goavambe teto an-tany, ary mbola nisy koa aza tonga taty aoriana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'olona goavambe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 13.33.
      marker-yv: yv-n
    - type: text
      text: ' izay teraka avy tamin’ny fifanambadian’ireo zanakalahin’andriamanitra sy ny zanakavavin’ny olombelona. Izy ireny no olo-mahery sady lehilahy nanan-daza fahagola.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitan’ny TOMPO fa nitombo haratsiana ny olombelona teto an-tany, ka ny faniriana rehetra tao am-pony dia nirona ho amin’ny ratsy ihany mandavanandro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nanenina IZY ary nalahelo ny fony tamin’ny nanaovany ny olombelona teto ambonin’ny tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy IZY hoe: «Hofoanako tsy hisy ambonin’ny tany ny olombelona izay noarîko sy ny biby rehetra na lehibe na kely, hatramin’ny voro-manidina, satria manenina Aho tamin’ny nanaovako ireo.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Noà kosa nahita famindrampo teo imason’ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
