document_id: GEN.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tapa-kevitra handringana ny olona ny Tompo
  - type: text
    content: 'Ary rehefa nanomboka nihamaro ny olona teto ambonin’ny tany ka niteraka zazavavy maro, '
  '10':
  - type: text
    content: Telo lahy ny naterak’i Noà, dia i Sema sy i Hama ary i Jafeta.
  '11':
  - type: text
    content: 'Teo anatrehan’Andriamanitra dia efa nihalò ny mponin’ny tany sady feno herisetra. '
  '12':
  - type: text
    content: 'Nijery Izy ka indro feno fahalovana ny tany, satria ny olombelona rehetra tambonin’ny tany no efa nanimba ny fitondrantenany avy. '
  '13':
  - type: text
    content: 'Dia hoy Andriamanitra tamin’i Noà: «Tapa-kevitra aho handringana ny olombelona. Fa noho ny aminy dia feno herisetra ny tany, koa hofongorako eto an-tany izy. '
  '14':
  - type: text
    content: 'Noho izany, manaova fiara ho anao, mitovy amin’ny sambo lehibe vita amin’ny hazo kipreso, dia asio efitrefitra ka hosory dity ao anatiny sy eo ivelany. '
  '15':
  - type: text
    content: 'Izao no hanaovanao azy: 150 metatra ny halavany, 25 metatra ny sakany ary 15 metatra ny haavony. '
  '16':
  - type: text
    content: 'Tafoy izy, ka asio elanelany antsasa-metatra eo amin’ny tafo sy ny rindrin-kazo; voleo varavarana amin’ny lafiny iray, ary asio rihana telo ny sambofiara. '
  '17':
  - type: text
    content: 'Indro Aho hahatonga safo-drano lehibe mba hamongorana izay rehetra manana aina atỳ ambany lanitra, ka ho levona avokoa izay rehetra eny ambonin’ny tany. '
  '18':
  - type: text
    content: Fa hajoroko kosa ny fanekempihavanako aminao
  - type: note
    content: dkt hafa Miantoka Aho fa hanafaka anao.
  - type: text
    content: ', ka hiditra ao amin’ny sambofiara ianao sy ny vadinao mbamin’ireo zanakao lahy sy ny vinantovavinao. '
  '19':
  - type: text
    content: 'Itondray tsiroaroa avy ny zava-mananaina rehetra isan-karazany, dia lahy sy vavy; ka ampidiro ao an-tsambofiara mba hovelomina miaraka aminao. '
  '2':
  - type: text
    content: dia hitan’ireo zanakalahin’andriamanitra fa tsara tarehy ireny zazavavy ireny, ka nifidianany izay ho vadiny.
  '20':
  - type: text
    content: 'Ny vorona isan-karazany ary ny biby hafa rehetra isan-karazany eto an-tany, na lehibe na kely, no hankeo aminao tsiroaroa mba hovelomina. '
  '21':
  - type: text
    content: 'Ianao kosa, maka amin’ny karazan-tsakafo rehetra mety ho fihinana, ka angony eo aminao mba ho sakafonao sy ho sakafon’izy ireo koa.» '
  '22':
  - type: text
    content: Dia notanterahin’i Noà izany; ka araka izay rehetra efa nandidian’Andriamanitra azy no nataony
  - type: note
    content: Ampit Heb 11.7 Miantoka Aho fa hanafaka anao.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Koa hoy ny TOMPO hoe: «Tsy hitoetra mandrakariva ao amin’ny olona ny Fanahiko noho ny faniasiavany; amin’ny maha nofo azy dia ho 120 taona ny andro iainany.»'
  '4':
  - type: text
    content: Tamin’izany fotoana izany no nisian’ireo rapeton’olona goavambe teto an-tany, ary mbola nisy koa aza tonga taty aoriana
  - type: note
    content: 'olona goavambe: jereo Nom 13.33.'
  - type: text
    content: ' izay teraka avy tamin’ny fifanambadian’ireo zanakalahin’andriamanitra sy ny zanakavavin’ny olombelona. Izy ireny no olo-mahery sady lehilahy nanan-daza fahagola.'
  '5':
  - type: text
    content: 'Ary hitan’ny TOMPO fa nitombo haratsiana ny olombelona teto an-tany, ka ny faniriana rehetra tao am-pony dia nirona ho amin’ny ratsy ihany mandavanandro. '
  '6':
  - type: text
    content: 'Koa nanenina IZY ary nalahelo ny fony tamin’ny nanaovany ny olombelona teto ambonin’ny tany. '
  '7':
  - type: text
    content: 'Dia hoy IZY hoe: «Hofoanako tsy hisy ambonin’ny tany ny olombelona izay noarîko sy ny biby rehetra na lehibe na kely, hatramin’ny voro-manidina, satria manenina Aho tamin’ny nanaovako ireo.» '
  '8':
  - type: text
    content: Fa i Noà kosa nahita famindrampo teo imason’ny TOMPO
  - type: note
    content: 'And 5-8: ampit Mt 24.37; Lk 17.26; 1Pt 3.20.'
  - type: text
    content: .
  - type: heading
    content: Tapa-kevitra hamonjy an’i Noà ny Tompo
  '9':
  - type: text
    content: 'Izao no tantaran’i Noà: i Noà dia lehilahy marina sady tsy nisy tsiny tamin’ireo mpiara-belona taminy, fa niara-nandeha tamin’Andriamanitra'
  - type: note
    content: Jereo 2Pt 2.5.
  - type: text
    content: '. '
