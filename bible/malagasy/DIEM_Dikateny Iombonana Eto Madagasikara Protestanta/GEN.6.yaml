  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no tantaran’i Noà: i Noà dia lehilahy marina sady tsy nisy tsiny tamin’ireo mpiara-belona taminy, fa niara-nandeha tamin’Andriamanitra'
