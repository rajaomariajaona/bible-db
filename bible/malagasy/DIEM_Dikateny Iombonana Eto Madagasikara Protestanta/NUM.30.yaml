document_id: NUM.30
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia nolazain’i Mosesy tamin’ny Israelita izay rehetra nandidian’ny TOMPO azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasany, ny and 30.1 dia atao 29.40, ary ny and 30.2-17 atao 30.1-16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna amin’ny voady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niteny tamin’ireo filohan’ny foko israelita i Mosesy ka nampita izao baikon’ny TOMPO izao:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Raha misy lehilahy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mivoady
  - type: text
    text: ' amin’ny TOMPO na mianiana hifady zavatra, dia tsy hitsoaka amin’ny teniny fa tsy maintsy hanatanteraka izay fampanantenana naloaky ny vavany izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 23.22-24; Mt 5.33.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Ataovy hoe misy tovovavy mbola miara-mipetraka amin-drainy ka maningo-tena mivoady na mianiana amin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha ren-drainy izany voady na fianianana izany, nefa tsy notoheriny, dia manan-kery ny voady amam-pianianana rehetra nataon’ilay tovovavy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa raha mandà kosa ny rainy amin’ny andro andrenesany izany, dia tsy manan-kery ny voady amam-pianianana rehetra nataony. Hamela an’ilay tovovavy ny TOMPO, satria efa nandà izany ny rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Ataovy indray hoe kosa misy tovovavy maningo-tena mivoady na mianiana foana tsy amim-piheverana, kanefa manambady atỳ aoriana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha rem-badiny izany nefa tsy notoheriny, dia manan-kery ny voady amam-pianianana rehetra nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha mandà kosa ny lahy amin’ny andro andrenesany izany, dia foana avokoa ny voady sy ny fianianam-poana nataon’ny vavy; ary hamela azy ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: «Fa ny voadin’ny vehivavy maty vady na nisara-panambadiana kosa dia mitoetra ara-dalàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Kanefa ataovy hoe misy vehivavy mbola ao an-tranom-badiny no maningo-tena mivoady na mianiana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha ren’ny lahy izany nefa tsy notoheriny na norarany, dia mitoetra ara-dalàna ny voady amam-pianianana rehetra nataon-dravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha manafoana kosa ny lahy amin’ny andro andrenesany izany, dia tsy manan-kery ny voady amam-pianianana nataon-dravehivavy. Hamela azy ny TOMPO satria nofoanan’ny vadiny ny voady nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny voady na fianianana rehetra nataon’ny vavy mba hifady hanina dia ny vadiny irery ihany no mampanan-kery na mahafoana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha tsy manohitra an-dravehivavy kosa ny lahy hatramin’ny ampitson’ny andro nandrenesany ny voady amam-pianianany, dia mampanan-kery izany. Ny tsy nanoherany an-dravehivavy tamin’ny andro nandrenesany no mampanan-kery izany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha aorian’ny andro nandrenesany izany kosa ny lahy no hanapa-kevitra hanafoana izany, dia izy no hovesaran’ny heloky ny vadiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Ireo no lalàna izay nandidian’ny TOMPO an’i Mosesy momba ny voady ataon’ny vehivavy manambady na koa ataon’ny tovovavy mbola mipetraka ao an-tranon-drainy.»
