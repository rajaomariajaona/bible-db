document_id: NUM.30,396
type_code: plt
verses:
  '1':
  - type: text
    content: Dia nolazain’i Mosesy tamin’ny Israelita izay rehetra nandidian’ny TOMPO azy
  - type: note
    content: Amin’ny dkt sasany, ny and 30.1 dia atao 29.40, ary ny and 30.2-17 atao 30.1-16.
  - type: text
    content: .
  - type: heading
    content: Lalàna amin’ny voady
  '10':
  - type: text
    content: «Fa ny voadin’ny vehivavy maty vady na nisara-panambadiana kosa dia mitoetra ara-dalàna.
  '11':
  - type: text
    content: '«Kanefa ataovy hoe misy vehivavy mbola ao an-tranom-badiny no maningo-tena mivoady na mianiana. '
  '12':
  - type: text
    content: 'Raha ren’ny lahy izany nefa tsy notoheriny na norarany, dia mitoetra ara-dalàna ny voady amam-pianianana rehetra nataon-dravehivavy. '
  '13':
  - type: text
    content: 'Fa raha manafoana kosa ny lahy amin’ny andro andrenesany izany, dia tsy manan-kery ny voady amam-pianianana nataon-dravehivavy. Hamela azy ny TOMPO satria nofoanan’ny vadiny ny voady nataony. '
  '14':
  - type: text
    content: 'Ny voady na fianianana rehetra nataon’ny vavy mba hifady hanina dia ny vadiny irery ihany no mampanan-kery na mahafoana izany. '
  '15':
  - type: text
    content: 'Fa raha tsy manohitra an-dravehivavy kosa ny lahy hatramin’ny ampitson’ny andro nandrenesany ny voady amam-pianianany, dia mampanan-kery izany. Ny tsy nanoherany an-dravehivavy tamin’ny andro nandrenesany no mampanan-kery izany. '
  '16':
  - type: text
    content: Fa raha aorian’ny andro nandrenesany izany kosa ny lahy no hanapa-kevitra hanafoana izany, dia izy no hovesaran’ny heloky ny vadiny.
  '17':
  - type: text
    content: «Ireo no lalàna izay nandidian’ny TOMPO an’i Mosesy momba ny voady ataon’ny vehivavy manambady na koa ataon’ny tovovavy mbola mipetraka ao an-tranon-drainy.»
  '2':
  - type: text
    content: 'Niteny tamin’ireo filohan’ny foko israelita i Mosesy ka nampita izao baikon’ny TOMPO izao:'
  '3':
  - type: text
    content: '«Raha misy lehilahy '
  - type: text
    content: mivoady
  - type: text
    content: ' amin’ny TOMPO na mianiana hifady zavatra, dia tsy hitsoaka amin’ny teniny fa tsy maintsy hanatanteraka izay fampanantenana naloaky ny vavany izy'
  - type: note
    content: Jereo Deot 23.22-24; Mt 5.33.
  - type: text
    content: .
  '4':
  - type: text
    content: '«Ataovy hoe misy tovovavy mbola miara-mipetraka amin-drainy ka maningo-tena mivoady na mianiana amin’ny TOMPO. '
  '5':
  - type: text
    content: 'Raha ren-drainy izany voady na fianianana izany, nefa tsy notoheriny, dia manan-kery ny voady amam-pianianana rehetra nataon’ilay tovovavy. '
  '6':
  - type: text
    content: Fa raha mandà kosa ny rainy amin’ny andro andrenesany izany, dia tsy manan-kery ny voady amam-pianianana rehetra nataony. Hamela an’ilay tovovavy ny TOMPO, satria efa nandà izany ny rainy.
  '7':
  - type: text
    content: '«Ataovy indray hoe kosa misy tovovavy maningo-tena mivoady na mianiana foana tsy amim-piheverana, kanefa manambady atỳ aoriana. '
  '8':
  - type: text
    content: 'Raha rem-badiny izany nefa tsy notoheriny, dia manan-kery ny voady amam-pianianana rehetra nataony. '
  '9':
  - type: text
    content: Fa raha mandà kosa ny lahy amin’ny andro andrenesany izany, dia foana avokoa ny voady sy ny fianianam-poana nataon’ny vavy; ary hamela azy ny TOMPO.
