      children:
      - type: text
        text: '21'
    - type: text
      text: 'Eny, izany no niantsoan’Andriamanitra anareo; fa i Kristy aza efa nijaly hamonjy anareo, ka namela fianarana ho anareo, mba hanarahanareo ny diany: '
