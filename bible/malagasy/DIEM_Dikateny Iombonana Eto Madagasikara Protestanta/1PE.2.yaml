      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ianareo mpanompo, maneke ny tomponareo amim-panajana tanteraka, tsy ny tsara fanahy sy ny malemy paika ihany fa ny sarotiny koa; '
  '19':
  - type: usfm
