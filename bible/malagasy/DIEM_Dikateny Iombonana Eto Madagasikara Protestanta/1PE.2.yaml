      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa esory ny haratsiam-panahy rehetra sy ny fitaka rehetra mbamin’ny fihatsarambelatsihy sy ny fialonana ary ny fanosoram-potaka isan-karazany. '
