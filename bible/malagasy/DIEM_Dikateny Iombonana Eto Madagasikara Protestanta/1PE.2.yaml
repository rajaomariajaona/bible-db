    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'satria izao no ankasitrahin’Andriamanitra: ny miaritra fampahoriana mihatra tsy an-drariny, noho ny fieritreretanao an’Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tahaka ny zaza vao teraka ianareo ka irio fatratra ilay ronono madio, izany hoe ny tenin’Andriamanitra, mba hitomboanareo amin’izany ka hahazoanareo famonjena, '
  '20':
