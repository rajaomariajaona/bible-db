document_id: 1PE.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa esory ny haratsiam-panahy rehetra sy ny fitaka rehetra mbamin’ny fihatsarambelatsihy sy ny fialonana ary ny fanosoram-potaka isan-karazany. '
  '10':
  - type: text
    content: Tsy vahoakan’Andriamanitra ianareo fahiny, fa ankehitriny kosa efa vahoakany; tsy nahazo ny famindrampon’Andriamanitra ianareo fahiny, fa ankehitriny kosa efa nahazo ny famindrampony
  - type: note
    content: Jereo Hôs 1.6, 9; 2.1, 23, 25.
  - type: text
    content: .
  - type: heading
    content: Miaina araka ny maha mpanompon’Andriamanitra
  '11':
  - type: text
    content: 'Ry hava-malala, amin’ny maha vahiny sy mpivahiny anareo eto an-tany dia mampirisika anareo aho mba hifady ny filàndratsin’ny maha olona mpanota, fa miady manohitra ny fanahinareo ireny. '
  '12':
  - type: text
    content: 'Manàna fitondrantena tsara eo anivon’ny mpanompo sampy; fa na dia endrikendrehiny ho mpanao ratsy aza ianareo, dia ho hitany tokoa ny asa tsara ataonareo, ka hanomezany voninahitra an’Andriamanitra amin’ny andro hiavian’i '
  - type: text
    content: Kristy
  - type: text
    content: .
  '13':
  - type: text
    content: 'Noho ny Tompo dia maneke ny fahefana rehetra misy eo amin’ny olombelona: na ny filoham-pirenena izany, satria mpitondra faratampony izy; '
  '14':
  - type: text
    content: na ireo mpifehy izany, satria nirahin’ny filoham-pirenena izy mba hanasazy ny mpanao asa ratsy ary mba hidera ny mpanao asa soa
  - type: note
    content: 'And 13-14: ampit Rm 13.1-7.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Fa izao no sitrapon’Andriamanitra: ny hanampenanareo vava ny olona adala sy tsy mahalala amin’ny asa soa ataonareo. '
  '16':
  - type: text
    content: 'Maneke araka ny maha olona afaka anareo; nefa aoka ny fahafahanareo tsy hampiasaina hanaovan-dratsy, fa hiainana araka ny maha mpanompon’Andriamanitra. '
  '17':
  - type: text
    content: Hajao ny olona rehetra, tiavo ireo havana iray finoana; matahora an’Andriamanitra, manajà ny filoham-pirenena.
  - type: heading
    content: I Kristy nijaly no fakàn-tahaka
  '18':
  - type: text
    content: 'Ianareo mpanompo, maneke ny tomponareo amim-panajana tanteraka, tsy ny tsara fanahy sy ny malemy paika ihany fa ny sarotiny koa; '
  '19':
  - type: text
    content: 'satria izao no ankasitrahin’Andriamanitra: ny miaritra fampahoriana mihatra tsy an-drariny, noho ny fieritreretanao an’Andriamanitra. '
  '2':
  - type: text
    content: 'Tahaka ny zaza vao teraka ianareo ka irio fatratra ilay ronono madio, izany hoe ny tenin’Andriamanitra, mba hitomboanareo amin’izany ka hahazoanareo famonjena, '
  '20':
  - type: text
    content: 'Inona tokoa moa no lazanareo, raha tàhiny manao hadisoana ianareo no kapohina ka mandefitra? Fa raha tàhiny manao soa ianareo no nampahorîna ka mandefitra, dia izany no ankasitrahin’Andriamanitra. '
  '21':
  - type: text
    content: 'Eny, izany no niantsoan’Andriamanitra anareo; fa i Kristy aza efa nijaly hamonjy anareo, ka namela fianarana ho anareo, mba hanarahanareo ny diany: '
  '22':
  - type: text
    content: i Kristy tsy nanota akory sady tsy mba niloa-bava hilaza fitaka
  - type: note
    content: Ampit Is 53.9.
  - type: text
    content: '; '
  '23':
  - type: text
    content: 'notevatevaina Izy, nefa tsy mba nanevateva; nijaly Izy, nefa tsy mba nandrahona, fa nanankin-tena tamin’Andriamanitra Izay mitsara ara-drariny; '
  '24':
  - type: text
    content: 'ny tenan’i Kristy no nitondra ny fahotantsika teo ambony hazofijaliana, mba hitsaharantsika amin’ny fahotana ka hivelomantsika hanao ny marina; ary ny dian-kapoka taminy no nahasitrana anareo. '
  '25':
  - type: text
    content: Eny, efa toy ny ondry nania ianareo
  - type: note
    content: 'And 24-25a: ampit Is 53.4-6, araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: ', nefa ankehitriny dia tafaverina amin’ilay mpiandry sy mpitandrina ny fanahinareo.'
  '3':
