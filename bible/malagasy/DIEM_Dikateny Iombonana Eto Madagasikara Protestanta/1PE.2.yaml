    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Noho ny Tompo dia maneke ny fahefana rehetra misy eo amin’ny olombelona: na ny filoham-pirenena izany, satria mpitondra faratampony izy; '
  '14':
  - type: usfm
