    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Inona tokoa moa no lazanareo, raha tàhiny manao hadisoana ianareo no kapohina ka mandefitra? Fa raha tàhiny manao soa ianareo no nampahorîna ka mandefitra, dia izany no ankasitrahin’Andriamanitra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
