  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy vahoakan’Andriamanitra ianareo fahiny, fa ankehitriny kosa efa vahoakany; tsy nahazo ny famindrampon’Andriamanitra ianareo fahiny, fa ankehitriny kosa efa nahazo ny famindrampony
