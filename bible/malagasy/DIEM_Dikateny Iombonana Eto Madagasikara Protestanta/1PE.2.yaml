  - type: text
    content: Solafaka tamin’io vato io izy ireo satria tsy manaiky ny tenin’Andriamanitra, sady ny ho solafaka rahateo no nanendrena azy ireo.
  '9':
  - type: text
    content: Fa ianareo kosa dia taranaka voafidy, fanjaka-mpisorona, firenena masina, vahoaka natao ho fananan’Andriamanitra, mba hitory ireo asa lehibe vitan’Andriamanitra Izay niantso anareo hiala tamin’ny haizina ho any amin’ny fahazavana mahagaga
