  - type: heading
    content: Ilay vato fehizoro sy ny vahoakan’Andriamanitra
  '4':
  - type: text
    content: 'Manatòna ny Tompo ianareo, fa Izy no vato velona nolavin’ny olona, kanefa voafidy sady sarobidy eo anatrehan’Andriamanitra. '
  '5':
  - type: text
    content: 'Manatòna ny Tompo ianareo mba ho tahaka ny vato velona voarafitra ho trano onenan’ny Fanahy Masina, ka hiara-manao fisoronana amin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: '. '
