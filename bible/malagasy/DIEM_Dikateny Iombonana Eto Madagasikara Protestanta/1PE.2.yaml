      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa izao no sitrapon’Andriamanitra: ny hanampenanareo vava ny olona adala sy tsy mahalala amin’ny asa soa ataonareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Maneke araka ny maha olona afaka anareo; nefa aoka ny fahafahanareo tsy hampiasaina hanaovan-dratsy, fa hiainana araka ny maha mpanompon’Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hajao ny olona rehetra, tiavo ireo havana iray finoana; matahora an’Andriamanitra, manajà ny filoham-pirenena.
