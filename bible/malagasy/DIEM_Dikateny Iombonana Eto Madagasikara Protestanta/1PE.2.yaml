    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ry hava-malala, amin’ny maha vahiny sy mpivahiny anareo eto an-tany dia mampirisika anareo aho mba hifady ny filàndratsin’ny maha olona mpanota, fa miady manohitra ny fanahinareo ireny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Manàna fitondrantena tsara eo anivon’ny mpanompo sampy; fa na dia endrikendrehiny ho mpanao ratsy aza ianareo, dia ho hitany tokoa ny asa tsara ataonareo, ka hanomezany voninahitra an’Andriamanitra amin’ny andro hiavian’i '
    - type: usfm
      marker: w
      children:
