document_id: COL.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho '
  - type: text
    content: apôstôlin’i Kristy
  - type: text
    content: ' Jesoa noho ny sitrapon’Andriamanitra.'
  - type: text
    content: 'Mamangy anareo atỳ Kôlôsy aho, dia ianareo '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' sady havana mpino tafaray amin’i Kristy. Mamangy anareo koa i Timôty havantsika. '
  '10':
  - type: text
    content: 'Izany no hanananareo fitondrantena mendrika ny Tompo, ka hanaovanareo mandrakariva izay ankasitrahiny; dia hahavokatra amin’ny asa soa isan-karazany ianareo sady hitombo fahalalana tsara an’Andriamanitra, '
  '11':
  - type: text
    content: 'ary hampahatanjahina tanteraka amin’ny heriny be voninahitra mba hanananareo fandeferana sy faharetana amin’ny zavatra rehetra. Fo heni-kafaliana '
  '12':
  - type: text
    content: no isaory an’Andriamanitra
  - type: note
    content: 'faharetana amin’ny zavatra rehetra. Fo heni-kafaliana no isaory an’Andriamanitra...: dkt hafa (raha ovana ny mari-pijanonana ao amin’ny rijan-teny grika fototra) faharetana ombàn-kafaliana amin’ny zavatra rehetra. Misaora an’Andriamanitra...'
  - type: text
    content: 'Ray, Izay nampahamendrika antsika hanana anjara amin’ny lova natokany ho an’ny vahoakany ao amin’ny hazavana; '
  '13':
  - type: text
    content: fa nanala antsika tamin’ny fahefàn’ny haizina
  - type: note
    content: 'fahefàn’ny haizina: ampit Lk 22.53.'
  - type: text
    content: ' Izy, ka namindra antsika ho ao amin’ny '
  - type: text
    content: Fanjakan’ny Zanany
  - type: text
    content: ' malalany, '
  '14':
  - type: text
    content: Ilay ahazoantsika ny fanavotana, dia ny famelana ny helotsika
  - type: note
    content: Ampit Ef 1.7.
  - type: text
    content: .
  - type: heading
    content: I Kristy sy ny asany
  '15':
  - type: text
    content: I Kristy dia endrik’ilay Andriamanitra tsy hita. Izy no Zanaka lahimatoa, ambonin’ny voaary rehetra
  - type: note
    content: Ampit Ohab 8.22-26; Jôh 1.1-3.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Tao aminy no naharian’Andriamanitra ny zavatra rehetra any an-danitra sy eto an-tany, ny hita sy ny tsy hita, na fiandrianana, na fanjakana, na fanapahana, na fahefana
  - type: note
    content: Ity andininy ity dia mitanisa antokon’anjely maromaro izay noheverin’ny Ntaolo fahizany fa nandray anjara tamin’ny fitondrana an’izao tontolo izao. Ampit Gal 4.3 sy nta.
  - type: text
    content: '. Tamin’ny alalany sy ho Azy no naharian’Andriamanitra ny zavatra rehetra. '
  '17':
  - type: text
    content: 'Nisy talohan’ny zavatra rehetra Izy sady ao aminy no aharetan’ny zavatra rehetra. '
  '18':
  - type: text
    content: 'I Kristy no lohan’ny Fiangonana izay tenany; Izy no fiandohan’ny fiainam-baovao, Zanaka lahimatoa, ilay voalohany natsangana ho velona avy tany amin’ny maty, mba ho lohalaharana amin’ny zavatra rehetra. '
  '19':
  - type: text
    content: Fa tao aminy no sitrak’Andriamanitra hitoeran’ny hafenoana tanteraka
  - type: note
    content: 'hitoeran’ny hafenoana tanteraka: dkt hafa ho henika Azy tanteraka.'
  - type: text
    content: '; '
  '2':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika
  - type: note
    content: 'I Kôlôsy dia tanàna kely tany Frijia, 200 km atsinanan’i Efeso, ka ny faritany nisy azy dia ao anatin’i Torkia ankehitriny. –Raintsika: misy stf sasany manampy hoe sy i Jesoa Kristy Tompo.'
  - type: text
    content: '!'
  - type: heading
    content: Vavaka fisaorana
  '20':
  - type: text
    content: ary ny ra nafoiny teo amin’ny hazofijaliana
  - type: note
    content: 'ny ra nafoiny teo amin’ny hazofijaliana: ao amin’ny Baiboly, ny hoe ra dia tsy ra fe ra mikoriana ao amin’ny lalan-dra, fa ny aina mihitsy koa (jereo ohatra Gen 9.4-5). Ka ny hoe «ra nafoiny teo amin’ny hazofijaliana» dia manondro ny nanoloran’i Jesoa ny ainy, manondro ny fahafatesany sy ny sorona nataony teo amin’ny hazofijaliana. Ampit Ef 2.16.'
  - type: text
    content: ' no nanaovan’Andriamanitra fampihavanana, ka dia tamin’ny alalany no sitrak’Andriamanitra hampihavanana amin’Izy Ray ny zavatra rehetra na ny eto an-tany na ny any an-danitra.'
  '21':
  - type: text
    content: 'Ianareo koa dia lavitra an’Andriamanitra fahiny sady fahavalony, noho ny ratsy nosaininareo sy nataonareo. '
  '22':
  - type: text
    content: Fa ankehitriny kosa, noho i Kristy niharan’ny fahafatesana tao amin’ny vatany mety maty, dia namitram-pihavanana taminareo Andriamanitra
  - type: note
    content: 'namitram-pihavanana taminareo Andriamanitra: misy stf sasany ahitana hoe nampihavanina tamin’Andriamanitra indray ianareo.'
  - type: text
    content: 'mba hahatonga anareo ho masina sady tsy hanan-tsiny amam-pondro eo anatrehany. '
  '23':
  - type: text
    content: 'Kanefa tsy maintsy maharitra amin’ny finoana ianareo, ka miorina sy mitombina tsara, ary tsy mety hafindra hiala amin’ny fanantenana vokatry ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' efa renareo. Izaho Paoly dia efa tonga mpanompon’izany Vaovao Mahafaly izany, dia ilay notorîna tamin’ny olona rehetra eto ambanin’ny lanitra.'
  - type: heading
    content: Ny andraikitra sahanin’i Paoly ao amin’ny Fiangonana
  '24':
  - type: text
    content: 'Ankehitriny aho dia mifaly amin’ny fijaliana iaretako noho ny aminareo, satria miferinaina ara-batana aho ka mameno izay tsy ampy tamin’ny fahorian’i '
  - type: text
    content: Kristy
  - type: note
    content: 'fahorian’i Kristy: ny teny grika nadika hoe fahoriana eto dia ilazana ny fitsapana rehetra miara-dalana amin’ny fitoriana ny Vaovao Mahafaly sady manandrify manokana izao andro farany izao. Ampit Mt 24.9; Apôk 7.14.'
  - type: text
    content: ' ho an’ny tenany, izany hoe ho an’ny Fiangonana. '
  '25':
  - type: text
    content: 'Tonga mpanompon’ny Fiangonana aho, araka ny andraikitra nomen’Andriamanitra hotontosaiko aminareo: dia ny manatanteraka ny fitoriana ilay tenin’Andriamanitra, '
  '26':
  - type: text
    content: 'izany hoe ilay tsiambaratelo nafenin’Andriamanitra tamin’ny taranak’olombelona hatramin’ny fahagola, fa ankehitriny kosa efa nasehony tamin’ny '
  - type: text
    content: vahoakany
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Ny vahoakany tokoa no nirin’Andriamanitra hampahafantarina ny maha sarobidy sy maha be voninahitra izany tsiambaratelo anasoavana ny firenena rehetra izany, dia intỳ: ao anatinareo i Kristy, antoky ny voninahitra homena anareo. '
  '28':
  - type: text
    content: 'Koa dia mitory an’i Kristy amin’ny olona rehetra izahay. Samy anarinay sy ampianarinay amim-pahendrena tokoa ny olona, mba hahatonga azy rehetra ho tanteraka noho izy tafaray amin’i Kristy. '
  '29':
  - type: text
    content: Hahatontosako izany andraikitra izany, dia mikely aina sy miezaka mafy aho, araka ny hery tsy hay tohaina omen’i Kristy sady miasa fatratra ato anatiko.
  '3':
  - type: text
    content: 'Velom-pisaorana mandrakariva an’Andriamanitra Rain’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika izahay, rehefa mivavaka ho anareo. '
  '4':
  - type: text
    content: 'Eny, velom-pisaorana an’Andriamanitra izahay satria renay laza ny finoanareo an’i Kristy Jesoa sy ny fitiavanareo ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra. '
  '5':
  - type: text
    content: 'Mby teo aminareo ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', ary ny hafatra marina raketiny no nandrenesanareo ny zavatra antenaina izay voatahiry ho anareo any an-danitra. Ka ny finoanareo sy ny fitiavanareo dia vokatr’izany fanantenana izany'
  - type: note
    content: Ampit 1Kôr 13.13.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ny Vaovao Mahafaly dia mitondra vokatra sy mitombo eran’izao tontolo izao koa, tahaka ny teo aminareo hatramin’ny andro nandrenesanareo sy nahalalanareo tsara ny fahasoavan’Andriamanitra araka ny marina. '
  '7':
  - type: text
    content: I Epafrà, hava-malala mpiray fanompoana aminay, no nampianatra anareo momba izany; mpanompo mahatokin’i Kristy izy ho fanasoavana anareo
  - type: note
    content: 'Epafrà: ampit 4.12. –ho fanasoavana anareo: misy stf sasany ahitana hoe amin’ny anaranay.'
  - type: text
    content: ', '
  '8':
  - type: text
    content: ary dia nampahafantatra anay ny fitiavana izay nomen’ny Fanahy Masina anareo.
  '9':
  - type: text
    content: 'Izany no tsy itsaharanay mivavaka ho anareo, hatramin’ny andro nandrenesanay ny aminareo. Mangataka amin’Andriamanitra izahay mba ho feno fahalalana tsara ny sitrapony ianareo, ka homena ny fahendrena amam-pahazavan-tsaina rehetra avy amin’ny Fanahy Masina. '
