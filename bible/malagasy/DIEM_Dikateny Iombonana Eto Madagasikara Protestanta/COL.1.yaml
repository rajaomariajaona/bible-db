document_id: COL.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy amiko Paoly ity taratasy ity, dia izaho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôlin’i Kristy
  - type: text
    text: ' Jesoa noho ny sitrapon’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mamangy anareo atỳ Kôlôsy aho, dia ianareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' sady havana mpino tafaray amin’i Kristy. Mamangy anareo koa i Timôty havantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: I Kôlôsy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna kely tany Frijia, 200 km atsinanan’i Efeso, ka ny faritany nisy azy dia ao anatin’i Torkia ankehitriny. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Raintsika:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy stf sasany manampy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sy i Jesoa Kristy Tompo.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka fisaorana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Velom-pisaorana mandrakariva an’Andriamanitra Rain’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika izahay, rehefa mivavaka ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eny, velom-pisaorana an’Andriamanitra izahay satria renay laza ny finoanareo an’i Kristy Jesoa sy ny fitiavanareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mby teo aminareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ', ary ny hafatra marina raketiny no nandrenesanareo ny zavatra antenaina izay voatahiry ho anareo any an-danitra. Ka ny finoanareo sy ny fitiavanareo dia vokatr’izany fanantenana izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Kôr 13.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny Vaovao Mahafaly dia mitondra vokatra sy mitombo eran’izao tontolo izao koa, tahaka ny teo aminareo hatramin’ny andro nandrenesanareo sy nahalalanareo tsara ny fahasoavan’Andriamanitra araka ny marina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I Epafrà, hava-malala mpiray fanompoana aminay, no nampianatra anareo momba izany; mpanompo mahatokin’i Kristy izy ho fanasoavana anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Epafrà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 4.12. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ho fanasoavana anareo:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amin’ny anaranay.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary dia nampahafantatra anay ny fitiavana izay nomen’ny Fanahy Masina anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izany no tsy itsaharanay mivavaka ho anareo, hatramin’ny andro nandrenesanay ny aminareo. Mangataka amin’Andriamanitra izahay mba ho feno fahalalana tsara ny sitrapony ianareo, ka homena ny fahendrena amam-pahazavan-tsaina rehetra avy amin’ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izany no hanananareo fitondrantena mendrika ny Tompo, ka hanaovanareo mandrakariva izay ankasitrahiny; dia hahavokatra amin’ny asa soa isan-karazany ianareo sady hitombo fahalalana tsara an’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary hampahatanjahina tanteraka amin’ny heriny be voninahitra mba hanananareo fandeferana sy faharetana amin’ny zavatra rehetra. Fo heni-kafaliana '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: no isaory an’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'faharetana amin’ny zavatra rehetra. Fo heni-kafaliana no isaory an’Andriamanitra...:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa (raha ovana ny mari-pijanonana ao amin’ny rijan-teny grika fototra) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faharetana ombàn-kafaliana amin’ny zavatra rehetra. Misaora an’Andriamanitra...
    marker-yv: yv-n
  - type: text
    text: 'Ray, Izay nampahamendrika antsika hanana anjara amin’ny lova natokany ho an’ny vahoakany ao amin’ny hazavana; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: fa nanala antsika tamin’ny fahefàn’ny haizina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fahefàn’ny haizina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Lk 22.53.
    marker-yv: yv-n
  - type: text
    text: ' Izy, ka namindra antsika ho ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakan’ny Zanany
  - type: text
    text: ' malalany, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ilay ahazoantsika ny fanavotana, dia ny famelana ny helotsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ef 1.7.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' sy ny asany'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I Kristy dia endrik’ilay Andriamanitra tsy hita. Izy no Zanaka lahimatoa, ambonin’ny voaary rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ohab 8.22-26; Jôh 1.1-3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tao aminy no naharian’Andriamanitra ny zavatra rehetra any an-danitra sy eto an-tany, ny hita sy ny tsy hita, na fiandrianana, na fanjakana, na fanapahana, na fahefana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ity andininy ity dia mitanisa antokon’anjely maromaro izay noheverin’ny Ntaolo fahizany fa nandray anjara tamin’ny fitondrana an’izao tontolo izao. Ampit Gal 4.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. Tamin’ny alalany sy ho Azy no naharian’Andriamanitra ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nisy talohan’ny zavatra rehetra Izy sady ao aminy no aharetan’ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I Kristy no lohan’ny Fiangonana izay tenany; Izy no fiandohan’ny fiainam-baovao, Zanaka lahimatoa, ilay voalohany natsangana ho velona avy tany amin’ny maty, mba ho lohalaharana amin’ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa tao aminy no sitrak’Andriamanitra hitoeran’ny hafenoana tanteraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hitoeran’ny hafenoana tanteraka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho henika Azy tanteraka.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ary ny ra nafoiny teo amin’ny hazofijaliana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny ra nafoiny teo amin’ny hazofijaliana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ao amin’ny Baiboly, ny hoe ra dia tsy ra fe ra mikoriana ao amin’ny lalan-dra, fa ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mihitsy koa (jereo ohatra Gen 9.4-5). Ka ny hoe «ra nafoiny teo amin’ny hazofijaliana» dia manondro ny nanoloran’i Jesoa ny ainy, manondro ny fahafatesany sy ny sorona nataony teo amin’ny hazofijaliana. Ampit Ef 2.16.'
    marker-yv: yv-n
  - type: text
    text: ' no nanaovan’Andriamanitra fampihavanana, ka dia tamin’ny alalany no sitrak’Andriamanitra hampihavanana amin’Izy Ray ny zavatra rehetra na ny eto an-tany na ny any an-danitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ianareo koa dia lavitra an’Andriamanitra fahiny sady fahavalony, noho ny ratsy nosaininareo sy nataonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ankehitriny kosa, noho i Kristy niharan’ny fahafatesana tao amin’ny vatany mety maty, dia namitram-pihavanana taminareo Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'namitram-pihavanana taminareo Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nampihavanina tamin’Andriamanitra indray ianareo.
    marker-yv: yv-n
  - type: text
    text: 'mba hahatonga anareo ho masina sady tsy hanan-tsiny amam-pondro eo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa tsy maintsy maharitra amin’ny finoana ianareo, ka miorina sy mitombina tsara, ary tsy mety hafindra hiala amin’ny fanantenana vokatry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' efa renareo. Izaho Paoly dia efa tonga mpanompon’izany Vaovao Mahafaly izany, dia ilay notorîna tamin’ny olona rehetra eto ambanin’ny lanitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andraikitra sahanin’i Paoly ao amin’ny Fiangonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ankehitriny aho dia mifaly amin’ny fijaliana iaretako noho ny aminareo, satria miferinaina ara-batana aho ka mameno izay tsy ampy tamin’ny fahorian’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fahorian’i Kristy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny teny grika nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahoriana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia ilazana ny fitsapana rehetra miara-dalana amin’ny fitoriana ny Vaovao Mahafaly sady manandrify manokana izao andro farany izao. Ampit Mt 24.9; Apôk 7.14.'
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny tenany, izany hoe ho an’ny Fiangonana. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tonga mpanompon’ny Fiangonana aho, araka ny andraikitra nomen’Andriamanitra hotontosaiko aminareo: dia ny manatanteraka ny fitoriana ilay tenin’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'izany hoe ilay tsiambaratelo nafenin’Andriamanitra tamin’ny taranak’olombelona hatramin’ny fahagola, fa ankehitriny kosa efa nasehony tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny vahoakany tokoa no nirin’Andriamanitra hampahafantarina ny maha sarobidy sy maha be voninahitra izany tsiambaratelo anasoavana ny firenena rehetra izany, dia intỳ: ao anatinareo i Kristy, antoky ny voninahitra homena anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa dia mitory an’i Kristy amin’ny olona rehetra izahay. Samy anarinay sy ampianarinay amim-pahendrena tokoa ny olona, mba hahatonga azy rehetra ho tanteraka noho izy tafaray amin’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hahatontosako izany andraikitra izany, dia mikely aina sy miezaka mafy aho, araka ny hery tsy hay tohaina omen’i Kristy sady miasa fatratra ato anatiko.
