document_id: LUK.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ny mpiasan’ilay kapiteny
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 8.5-13; Jôh 4.43-54)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa avy nampandre ny vahoaka izany teniny rehetra izany i Jesoa, dia niverina tany Kafarnahòma. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony tafaverina tany an-tranon’ilay kapiteny ireto iraka, dia nahita ilay mpiasa salama soa aman-tsara.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zanakalahin’ilay mpitondratena tao Naîna
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Taorian’izany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny andro manaraka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny ampitson’iny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Naîna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tanàna ao amin’ny faritany Galilea, ilany atsimo atsinanana.'
      marker-yv: yv-n
    - type: text
      text: ' i Jesoa dia nankany amin’ny tanàna atao hoe Naîna ary notronin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' sy vahoaka maro. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga teo akaikin’ny vavahadin’ny tanàna Izy, dia tojo olona handevina fatin-jazalahy anankiray; ramatoa reniny tsy nanana afa-tsy iny sady efa mpitondratena, koa olona marobe avy ao an-tanàna no niaraka taminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao nahita an-dravehivavy ny Tompo, dia onena azy ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka izay ny ranomasonao, ramatoa!
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona Izy ary nanendry ny tranovorona, ka nijanona ny mpilanja. Ary hoy i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry zatovo, Izaho mandidy anao, mifohaza!
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia indro ny maty fa niarina sy nanomboka niteny ary natolotr’i Jesoa an-dreniny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raiki-tahotra ny olona rehetra sady nanome voninahitra an’Andriamanitra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpaminany
    - type: text
      text: ' lehibe no efa najoron’Andriamanitra eto anivontsika!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary koa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa namangy ny vahoakany Andriamanitra!
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niely eran’i Jodea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 6.17 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' manontolo mbamin’ny faritany manodidina rehetra ny lazan’i Jesoa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jesoa hatonin’ireo irak’i Jôhany Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 11.2-19)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Jôhany Mpanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' nilazan’ny mpianany izany rehetra izany, ka niantso roa lahy tamin’ireo mpianany '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy naniraka azy hankany amin’ny Tompo hanontany hoe: «Ianao ve no Ilay ho avy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 11.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sa olon-kafa no mbola tokony handrasanay?» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy kosa kapitenin-tafika nanana mpiasa narary efa ho faty, mpiasa sarobidy aminy tokoa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga tany amin’i Jesoa izy roa lahy, dia nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I Jôhany Mpanao batisa no naniraka anay hankatỳ aminao hanontany hoe: «Ianao ve no Ilay ho avy sa olon-kafa no mbola tokony handrasanay?»'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany indrindra i Jesoa dia nanasitrana olona maro tamin’ny aretina sy ny rofy ary ny fanahy ratsy, sady nampahiratra ny jamba maro. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy Izy namaly ireto iraka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha ambarao amin’i Jôhany ny zavatra hitanareo sy renareo: mahiratra ny jamba, mandeha tsara ny mandringa, madio ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: marary hoditra
    - type: text
      text: ', mandre ny marenina, atsangana ho velona ny maty, itoriana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' ny mahantra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 35.5-6; 61.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa sambatra izay tsy voasakana hino Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy voasakana hino Ahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tsy misalasala noho ny ataoko.
      marker-yv: yv-n
    - type: text
      text: '!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony lasa ireto iraka, dia niteny momba an’i Jôhany tamin’ny vahoaka i Jesoa nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hizaha inona no nalehanareo tany an-taniefitra? Bararata hetsiketsehin-drivotra ve? Tsia! '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa hizaha inona àry no nalehanareo tany? Olona marevaka fitafiana ve? Izay marevaka fitafiana sy manaram-po amin’ny fiainana, dia any amin’ny lapan’ny mpanjaka! '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa hizaha inona àry no nalehanareo tany? '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpaminany
    - type: text
      text: ' ve? Izany tokoa, hoy Aho aminareo, ary mihoatra noho ny mpaminany aza. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa i Jôhany no ilay voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro alefako hialoha Anao ny irako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanomana ny lalan-kombànao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mal 3.1.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy misy lehibe noho i Jôhany amin’ny tera-behivavy; nefa lazaiko aminareo fa izay kely indrindra ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' dia lehibe noho izy.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka rehetra izay nandre an’i Jôhany, mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpamory hetra
    - type: text
      text: ' aza, dia nanaiky an’Andriamanitra ho marina ka niroso hataon’i Jôhany batisa. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao nahaheno ny amin’i Jesoa ilay kapiteny, dia naniraka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' jiosy hankany aminy hangataka Azy ho avy hanasitrana ilay mpiasa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' kosa nitsipaka ny fikasan’Andriamanitra ka nandà tsy hataon’i Jôhany batisa.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy indray i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Iza no hanoharako ny olona ankehitriny? Zovy no mety hampitahana azy? '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tahaka ny ankizy mipetra-potsiny eny an-kianja ka omen’ny namany tsiny hoe: «Ianareo itsofanay sodina, tsy mandihy; ianareo anaovanay hira fisaonana, tsy mitomany!» '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa tonga i Jôhany Mpanao batisa, tsy mofo haniny tsy divay sotroiny, nefa lazainareo hoe: «Ondranondranana!» '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tonga indray ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' mihinana sy misotro, nefa lazainareo hoe: «Olona tendan-kanina sy mpiboboka divay, sakaizan’ny mpamory hetra sy ny mpanota!» '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Andriamanitra kosa, araka ny fahendreny, dia eken’ireo zanany rehetra ho marina!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avelan’i Jesoa heloka ilay vehivavy mpanota
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' nanasa an’i Jesoa hiara-misakafo aminy, koa nandroso tao aminy Izy ary naka toerana. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy kosa vehivavy anankiray malaza ho mpanota tao an-tanàna. Vao nahalala ravehivavy fa hoe misakafo ao amin’ilay Farisianina i Jesoa, dia naka ilomanitra eran’ny tavoahangy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alabasitra
    - type: text
      text: '; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka indro izy nankeo ivohon’i Jesoa ary nitomany dia nitomany teo an-tongony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Araka ny fomba fahizany, dia mihorirana ambony farafara manodidina ny latabatra fisakafoana ny mpiara-misakafo.
      marker-yv: yv-n
    - type: text
      text: '. Kotsan’ny ranomaso ny tongotr’i Jesoa ka nofaohin-dravehivavy tamin’ny volon-dohany, norokorohany tamim-pitiavana ary nohosorany an’ilay ilomanitra. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nahita izany ilay Farisianina nampiantrano an’i Jesoa, dia nanao anakampo hoe: «Raha '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' tokoa ity, dia ho nahafantatra izay tena toetran’io vehivavy mikasikasika Azy io fa hoe mpanota.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga teo amin’i Jesoa ireto iraka, dia niangavy Azy mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mendrika hanaovana izany io kapiteny io fa tia ny firenentsika, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Jesoa niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Simôna ô, misy zavatra tiako holazaina aminao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Simôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazao àry hoe, ry Mpampianatra!
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nisy, hono, olona roa nitrosa vola tamin’izay mpampisambo-bola izay; ny iray nitrosa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denàry
    - type: text
      text: ' dimanjato, ny iray denàry dimampolo. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Samy tsy nanan-kandoavana anefa izy roa lahy ka dia nafoin’ny mpampisambotra ny trosa rehetra rehetra. Iza amin’izy roa lahy, hoy ianao, no ho tia azy kokoa?
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Simôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ataoko fa ilay namoizany be.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Marina ny hevitrao!
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitodika nijery an-dravehivavy Izy sady nanao tamin’i Simôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hitanao ve ity vehivavy ity? Niditra ny tranonao Aho: ianao tsy nanome rano Ahy hanasako tongotra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isan’ny fomba amam-panaon’iny faritra atsinanan’ny Ranomasina Mediteranea iny izany, rehefa mandray vahiny. Jereo Gen 18.4; 19.2.
      marker-yv: yv-n
    - type: text
      text: '; izy kosa ny ranomasony no nanondrahany ny tongotro ary ny volon-dohany no namaohany azy. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ianao tsy nanoroka Ahy; izy kosa, hatrizay nidirany, tsy nitsahatra nanorokoroka ny tongotro. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ianao tsy nanosotra diloilo ny lohako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 23.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: '; izy kosa nanosotra ilomanitra ny tongotro. '
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa izao no teniko aminao: Voavela ny heloka be nataony, noho izy be fitiavana; fa izay amelana kely no kely fitiavana.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Jesoa tamin-dravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Voavela ny helokao!
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo niara-nisakafo tamin’i Jesoa dia nanao anakampo hoe: «Iza moa ity no mamela heloka?» '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ary izy mihitsy aza no nanorina ny sinagôgantsika.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy indray i Jesoa tamin-dravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny finoanao no nahavonjy anao! Ndeha àry ka veloma finaritra!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niara-nandeha tamin’ireo loholona i Jesoa. Ary rehefa mby akaikin’ny trano Izy, dia nanirahan’ilay kapiteny olona mahatoky indray hilaza aminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza misahirana toy izao re, Tompoko, fa tsy mendrika handrosoanao an-trano aho; '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary izany no anton’ny tsy nisehoako vatana taminao; fa teny fotsiny re atao, dia ho sitrana anie ny mpiasako. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izaho manko, na ambany fahefàn’olona aza, mba mifehy miaramila ihany: ka raha misy ataoko hoe «Mandehana», dia mandeha izy; na misy antsoiko hoe «Avia», dia avy izy; ary raha ny mpiasako no ilazako hoe «Ataovy izao», dia manao izy.'
  '9':
  - type: usfm
    marker: p
    children:
