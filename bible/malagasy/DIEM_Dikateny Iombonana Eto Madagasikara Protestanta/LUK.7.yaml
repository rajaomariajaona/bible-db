document_id: LUK.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitranin’i Jesoa ny mpiasan’ilay kapiteny
  - type: heading
    content: (Jereo Mt 8.5-13; Jôh 4.43-54)
  - type: text
    content: 'Rehefa avy nampandre ny vahoaka izany teniny rehetra izany i Jesoa, dia niverina tany Kafarnahòma. '
  '10':
  - type: text
    content: Nony tafaverina tany an-tranon’ilay kapiteny ireto iraka, dia nahita ilay mpiasa salama soa aman-tsara.
  - type: heading
    content: Ny zanakalahin’ilay mpitondratena tao Naîna
  '11':
  - type: text
    content: Taorian’izany
  - type: note
    content: 'Taorian’izany: misy stf sasany ahitana hoe ny andro manaraka na ny ampitson’iny. I Naîna dia tanàna ao amin’ny faritany Galilea, ilany atsimo atsinanana.'
  - type: text
    content: ' i Jesoa dia nankany amin’ny tanàna atao hoe Naîna ary notronin’ireo '
  - type: text
    content: mpianany
  - type: text
    content: ' sy vahoaka maro. '
  '12':
  - type: text
    content: 'Rehefa tonga teo akaikin’ny vavahadin’ny tanàna Izy, dia tojo olona handevina fatin-jazalahy anankiray; ramatoa reniny tsy nanana afa-tsy iny sady efa mpitondratena, koa olona marobe avy ao an-tanàna no niaraka taminy. '
  '13':
  - type: text
    content: 'Vao nahita an-dravehivavy ny Tompo, dia onena azy ka nanao taminy hoe:'
  - type: text
    content: –Aoka izay ny ranomasonao, ramatoa!
  '14':
  - type: text
    content: 'Dia nanatona Izy ary nanendry ny tranovorona, ka nijanona ny mpilanja. Ary hoy i Jesoa hoe:'
  - type: text
    content: –Ry zatovo, Izaho mandidy anao, mifohaza!
  '15':
  - type: text
    content: 'Dia indro ny maty fa niarina sy nanomboka niteny ary natolotr’i Jesoa an-dreniny. '
  '16':
  - type: text
    content: 'Raiki-tahotra ny olona rehetra sady nanome voninahitra an’Andriamanitra hoe:'
  - type: text
    content: –
  - type: text
    content: Mpaminany
  - type: text
    content: ' lehibe no efa najoron’Andriamanitra eto anivontsika!'
  - type: text
    content: 'Ary koa hoe:'
  - type: text
    content: –Efa namangy ny vahoakany Andriamanitra!
  '17':
  - type: text
    content: Dia niely eran’i Jodea
  - type: note
    content: Jereo 6.17 sy nta.
  - type: text
    content: ' manontolo mbamin’ny faritany manodidina rehetra ny lazan’i Jesoa.'
  - type: heading
    content: I Jesoa hatonin’ireo irak’i Jôhany Mpanao batisa
  - type: heading
    content: (Jereo Mt 11.2-19)
  '18':
  - type: text
    content: 'Ary i Jôhany Mpanao '
  - type: text
    content: batisa
  - type: text
    content: ' nilazan’ny mpianany izany rehetra izany, ka niantso roa lahy tamin’ireo mpianany '
  '19':
  - type: text
    content: 'sy naniraka azy hankany amin’ny Tompo hanontany hoe: «Ianao ve no Ilay ho avy'
  - type: note
    content: Jereo Mt 11.3 sy nta.
  - type: text
    content: ' sa olon-kafa no mbola tokony handrasanay?» '
  '2':
  - type: text
    content: 'Nisy kosa kapitenin-tafika nanana mpiasa narary efa ho faty, mpiasa sarobidy aminy tokoa. '
  '20':
  - type: text
    content: 'Nony tonga tany amin’i Jesoa izy roa lahy, dia nanao hoe:'
  - type: text
    content: '–I Jôhany Mpanao batisa no naniraka anay hankatỳ aminao hanontany hoe: «Ianao ve no Ilay ho avy sa olon-kafa no mbola tokony handrasanay?»'
  '21':
  - type: text
    content: 'Tamin’izany indrindra i Jesoa dia nanasitrana olona maro tamin’ny aretina sy ny rofy ary ny fanahy ratsy, sady nampahiratra ny jamba maro. '
  '22':
  - type: text
    content: 'Ka hoy Izy namaly ireto iraka hoe:'
  - type: text
    content: '–Ndeha ambarao amin’i Jôhany ny zavatra hitanareo sy renareo: mahiratra ny jamba, mandeha tsara ny mandringa, madio ny '
  - type: text
    content: marary hoditra
  - type: text
    content: ', mandre ny marenina, atsangana ho velona ny maty, itoriana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' ny mahantra'
  - type: note
    content: Ampit Is 35.5-6; 61.1.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Koa sambatra izay tsy voasakana hino Ahy
  - type: note
    content: 'tsy voasakana hino Ahy: dkt hafa tsy misalasala noho ny ataoko.'
  - type: text
    content: '!'
  '24':
  - type: text
    content: 'Nony lasa ireto iraka, dia niteny momba an’i Jôhany tamin’ny vahoaka i Jesoa nanao hoe:'
  - type: text
    content: '–Hizaha inona no nalehanareo tany an-taniefitra? Bararata hetsiketsehin-drivotra ve? Tsia! '
  '25':
  - type: text
    content: 'Fa hizaha inona àry no nalehanareo tany? Olona marevaka fitafiana ve? Izay marevaka fitafiana sy manaram-po amin’ny fiainana, dia any amin’ny lapan’ny mpanjaka! '
  '26':
  - type: text
    content: 'Koa hizaha inona àry no nalehanareo tany? '
  - type: text
    content: Mpaminany
  - type: text
    content: ' ve? Izany tokoa, hoy Aho aminareo, ary mihoatra noho ny mpaminany aza. '
  '27':
  - type: text
    content: 'Fa i Jôhany no ilay voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: Indro alefako hialoha Anao ny irako,
  - type: text
    content: hoy Andriamanitra,
  - type: text
    content: mba hanomana ny lalan-kombànao
  - type: note
    content: Mal 3.1.
  - type: text
    content: '!»'
  '28':
  - type: text
    content: 'Tsy misy lehibe noho i Jôhany amin’ny tera-behivavy; nefa lazaiko aminareo fa izay kely indrindra ao amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' dia lehibe noho izy.'
  '29':
  - type: text
    content: 'Ary ny vahoaka rehetra izay nandre an’i Jôhany, mbamin’ny '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' aza, dia nanaiky an’Andriamanitra ho marina ka niroso hataon’i Jôhany batisa. '
  '3':
  - type: text
    content: 'Vao nahaheno ny amin’i Jesoa ilay kapiteny, dia naniraka '
  - type: text
    content: loholona
  - type: text
    content: ' jiosy hankany aminy hangataka Azy ho avy hanasitrana ilay mpiasa. '
  '30':
  - type: text
    content: 'Ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' kosa nitsipaka ny fikasan’Andriamanitra ka nandà tsy hataon’i Jôhany batisa.'
  '31':
  - type: text
    content: 'Dia hoy indray i Jesoa:'
  - type: text
    content: '–Iza no hanoharako ny olona ankehitriny? Zovy no mety hampitahana azy? '
  '32':
  - type: text
    content: 'Tahaka ny ankizy mipetra-potsiny eny an-kianja ka omen’ny namany tsiny hoe: «Ianareo itsofanay sodina, tsy mandihy; ianareo anaovanay hira fisaonana, tsy mitomany!» '
  '33':
  - type: text
    content: 'Fa tonga i Jôhany Mpanao batisa, tsy mofo haniny tsy divay sotroiny, nefa lazainareo hoe: «Ondranondranana!» '
  '34':
  - type: text
    content: 'Tonga indray ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' mihinana sy misotro, nefa lazainareo hoe: «Olona tendan-kanina sy mpiboboka divay, sakaizan’ny mpamory hetra sy ny mpanota!» '
  '35':
  - type: text
    content: Andriamanitra kosa, araka ny fahendreny, dia eken’ireo zanany rehetra ho marina!
  - type: heading
    content: Avelan’i Jesoa heloka ilay vehivavy mpanota
  '36':
  - type: text
    content: 'Nisy '
  - type: text
    content: Farisianina
  - type: text
    content: ' nanasa an’i Jesoa hiara-misakafo aminy, koa nandroso tao aminy Izy ary naka toerana. '
  '37':
  - type: text
    content: 'Nisy kosa vehivavy anankiray malaza ho mpanota tao an-tanàna. Vao nahalala ravehivavy fa hoe misakafo ao amin’ilay Farisianina i Jesoa, dia naka ilomanitra eran’ny tavoahangy '
  - type: text
    content: alabasitra
  - type: text
    content: '; '
  '38':
  - type: text
    content: ka indro izy nankeo ivohon’i Jesoa ary nitomany dia nitomany teo an-tongony
  - type: note
    content: Araka ny fomba fahizany, dia mihorirana ambony farafara manodidina ny latabatra fisakafoana ny mpiara-misakafo.
  - type: text
    content: '. Kotsan’ny ranomaso ny tongotr’i Jesoa ka nofaohin-dravehivavy tamin’ny volon-dohany, norokorohany tamim-pitiavana ary nohosorany an’ilay ilomanitra. '
  '39':
  - type: text
    content: 'Raha nahita izany ilay Farisianina nampiantrano an’i Jesoa, dia nanao anakampo hoe: «Raha '
  - type: text
    content: mpaminany
  - type: text
    content: ' tokoa ity, dia ho nahafantatra izay tena toetran’io vehivavy mikasikasika Azy io fa hoe mpanota.» '
  '4':
  - type: text
    content: 'Rehefa tonga teo amin’i Jesoa ireto iraka, dia niangavy Azy mafy hoe:'
  - type: text
    content: '–Mendrika hanaovana izany io kapiteny io fa tia ny firenentsika, '
  '40':
  - type: text
    content: 'Ary i Jesoa niteny taminy hoe:'
  - type: text
    content: –Simôna ô, misy zavatra tiako holazaina aminao!
  - type: text
    content: 'Dia hoy i Simôna hoe:'
  - type: text
    content: –Lazao àry hoe, ry Mpampianatra!
  '41':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: '–Nisy, hono, olona roa nitrosa vola tamin’izay mpampisambo-bola izay; ny iray nitrosa '
  - type: text
    content: denàry
  - type: text
    content: ' dimanjato, ny iray denàry dimampolo. '
  '42':
  - type: text
    content: Samy tsy nanan-kandoavana anefa izy roa lahy ka dia nafoin’ny mpampisambotra ny trosa rehetra rehetra. Iza amin’izy roa lahy, hoy ianao, no ho tia azy kokoa?
  '43':
  - type: text
    content: 'Dia novalian’i Simôna hoe:'
  - type: text
    content: –Ataoko fa ilay namoizany be.
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: –Marina ny hevitrao!
  '44':
  - type: text
    content: 'Dia nitodika nijery an-dravehivavy Izy sady nanao tamin’i Simôna hoe:'
  - type: text
    content: '–Hitanao ve ity vehivavy ity? Niditra ny tranonao Aho: ianao tsy nanome rano Ahy hanasako tongotra'
  - type: note
    content: Isan’ny fomba amam-panaon’iny faritra atsinanan’ny Ranomasina Mediteranea iny izany, rehefa mandray vahiny. Jereo Gen 18.4; 19.2.
  - type: text
    content: '; izy kosa ny ranomasony no nanondrahany ny tongotro ary ny volon-dohany no namaohany azy. '
  '45':
  - type: text
    content: 'Ianao tsy nanoroka Ahy; izy kosa, hatrizay nidirany, tsy nitsahatra nanorokoroka ny tongotro. '
  '46':
  - type: text
    content: Ianao tsy nanosotra diloilo ny lohako
  - type: note
    content: Jereo Sal 23.5 sy nta.
  - type: text
    content: '; izy kosa nanosotra ilomanitra ny tongotro. '
  '47':
  - type: text
    content: 'Koa izao no teniko aminao: Voavela ny heloka be nataony, noho izy be fitiavana; fa izay amelana kely no kely fitiavana.'
  '48':
  - type: text
    content: 'Hoy kosa i Jesoa tamin-dravehivavy:'
  - type: text
    content: –Voavela ny helokao!
  '49':
  - type: text
    content: 'Ireo niara-nisakafo tamin’i Jesoa dia nanao anakampo hoe: «Iza moa ity no mamela heloka?» '
  '5':
  - type: text
    content: ary izy mihitsy aza no nanorina ny sinagôgantsika.
  '50':
  - type: text
    content: 'Fa hoy indray i Jesoa tamin-dravehivavy:'
  - type: text
    content: –Ny finoanao no nahavonjy anao! Ndeha àry ka veloma finaritra!
  '6':
  - type: text
    content: 'Dia niara-nandeha tamin’ireo loholona i Jesoa. Ary rehefa mby akaikin’ny trano Izy, dia nanirahan’ilay kapiteny olona mahatoky indray hilaza aminy hoe:'
  - type: text
    content: '–Aza misahirana toy izao re, Tompoko, fa tsy mendrika handrosoanao an-trano aho; '
  '7':
  - type: text
    content: 'ary izany no anton’ny tsy nisehoako vatana taminao; fa teny fotsiny re atao, dia ho sitrana anie ny mpiasako. '
  '8':
  - type: text
    content: 'Izaho manko, na ambany fahefàn’olona aza, mba mifehy miaramila ihany: ka raha misy ataoko hoe «Mandehana», dia mandeha izy; na misy antsoiko hoe «Avia», dia avy izy; ary raha ny mpiasako no ilazako hoe «Ataovy izao», dia manao izy.'
  '9':
  - type: text
    content: 'Gaga tamin’ilay kapiteny i Jesoa raha nandre izany, ary dia nitodika tamin’ny vahoaka nanaraka Azy ka nanao hoe:'
  - type: text
    content: '–Lazaiko aminareo fa tsy mbola nahita finoana toy izany Aho, na dia tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' aza!'
