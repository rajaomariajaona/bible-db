  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izay ianareo, ry Israelita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy hotsimponina tsirairay.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Amin’izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanakoako ny feon’ny anjomara lehibe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tonga avokoa ireo very tany Asiria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ireo tafaely tany Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiankohoka eo anatrehan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao an-tendrombohitra masina any Jerosalema.
