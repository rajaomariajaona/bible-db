    - type: text
      text: dia hovelesin’ny TOMPO ireo salohim-bary voajinja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manomboka eo amin’ny ony Eofrata
  - type: usfm
    marker: q1
    children:
