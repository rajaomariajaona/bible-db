      children:
      - type: text
        text: '3'
    - type: text
      text: «Izaho TOMPO no mpiaro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manondraka azy amin’ny fotoana sahaza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambenako izy na andro na alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao misy manimba.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy tezitra aminy intsony Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa aoka tsy hisy tsilo na songosongo ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hongotako sy hodorako avokoa ireny!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa izay mifikitra eo ambany fiarovako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hamitram-pihavanana amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hamitram-pihavanana amiko izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famelana ny helok’i Israely; ilay tanàna nilaozana
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Amin’ny andro ho avy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanan-tsimoka vaovao ny vahoakan’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamony hivelatra indray i Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hameno izao tontolo izao ny voany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nokapohin’ny Tompo ireo nikapoka ny vahoakany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany koa ve no nikapohan’ny Tompo ilay vahoakany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naripaky ny Tompo ireo nandripaka ny vahoakany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany koa ve no nandripahan’ny Tompo ilay vahoakany?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsia, fa nohelohiny hatao sesitany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka halefa any am-pahababoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nopaohiny tamin’ny rivo-mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tamin’ny andron’ny rivotra avy any atsinanana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
