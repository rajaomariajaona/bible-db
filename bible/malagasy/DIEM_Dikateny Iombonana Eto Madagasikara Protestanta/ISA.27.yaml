      text: Fa ankehitriny dia toy izao no hamelàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny heloka vitan’ireo taranak’i Jakôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary izao no ho vokatry ny famelana ny fahotany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hopotehiny toy ny vato sokay voatorotoro
  - type: usfm
    marker: q1
