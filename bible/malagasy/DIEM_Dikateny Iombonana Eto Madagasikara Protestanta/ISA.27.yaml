document_id: ISA.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fandresena an’ilay dragona an-dranomasina
  - type: text
    content: Amin’izany andro izany, dia hirotsaka an-tsehatra ny TOMPO ka handray sabatra mafy sady lehibe no mahery hamelezana ny Leviatana, ilay bibilava mitsoriaka sy mihorongorona; ary hovonoin’ny Tompo izany dragona an-dranomasina izany
  - type: note
    content: Ampit Jôb 7.12; Sal 74.13-14; 104.26.
  - type: text
    content: .
  - type: heading
    content: Ny Tompo sy ny voalobony
  '10':
  - type: text
    content: Tsy hisy olona intsony ao an-tanànamimanda
  - type: text
    content: fa ho foana sy ilaozana toy ny taniefitra izany,
  - type: text
    content: ka ho lasa toeram-piraofan’ny zanak’omby,
  - type: text
    content: handriany sy hihinanany ravin-kazo.
  '11':
  - type: text
    content: Rehefa maina ny rantsan-kazo, dia hotapahina;
  - type: text
    content: ary ho avy ny vehivavy ka handoro azy.
  - type: text
    content: Tsy manam-pahalalana tokoa ity firenena ity
  - type: text
    content: ka tsy hiantran’ilay Mpahary azy,
  - type: text
    content: sady tsy hangorahan’ilay Mpamorona azy.
  - type: heading
    content: Fodiana rodomben’ireo voasesitany
  '12':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: dia hovelesin’ny TOMPO ireo salohim-bary voajinja
  - type: text
    content: manomboka eo amin’ny ony Eofrata
  - type: text
    content: ka hatrany amin’ny ranon-driakan’i Ejipta
  - type: note
    content: Jereo Nom 34.5 sy nta.
  - type: text
    content: .
  - type: text
    content: Amin’izay ianareo, ry Israelita,
  - type: text
    content: dia samy hotsimponina tsirairay.
  '13':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: dia hanakoako ny feon’ny anjomara lehibe;
  - type: text
    content: ka ho tonga avokoa ireo very tany Asiria
  - type: text
    content: na ireo tafaely tany Ejipta
  - type: text
    content: mba hiankohoka eo anatrehan’ny TOMPO
  - type: text
    content: ao an-tendrombohitra masina any Jerosalema.
  '2':
  - type: text
    content: Amin’izany andro izany no andredony hira
  - type: text
    content: momba ny voaloboka manome divay tsara
  - type: note
    content: Jereo 3.14 sy nta.
  - type: text
    content: ' hoe:'
  '3':
  - type: text
    content: «Izaho TOMPO no mpiaro azy
  - type: text
    content: ka manondraka azy amin’ny fotoana sahaza;
  - type: text
    content: ambenako izy na andro na alina
  - type: text
    content: fandrao misy manimba.
  '4':
  - type: text
    content: Tsy tezitra aminy intsony Aho,
  - type: text
    content: kanefa aoka tsy hisy tsilo na songosongo ao;
  - type: text
    content: hongotako sy hodorako avokoa ireny!
  '5':
  - type: text
    content: Fa izay mifikitra eo ambany fiarovako
  - type: text
    content: no hamitram-pihavanana amiko;
  - type: text
    content: eny, hamitram-pihavanana amiko izy.
  - type: heading
    content: Famelana ny helok’i Israely; ilay tanàna nilaozana
  '6':
  - type: text
    content: Amin’ny andro ho avy,
  - type: text
    content: dia hanan-tsimoka vaovao ny vahoakan’i Jakôba
  - type: text
    content: ary hamony hivelatra indray i Israely.
  - type: text
    content: ka hameno izao tontolo izao ny voany.
  '7':
  - type: text
    content: Nokapohin’ny Tompo ireo nikapoka ny vahoakany;
  - type: text
    content: toy izany koa ve no nikapohan’ny Tompo ilay vahoakany?
  - type: text
    content: Naripaky ny Tompo ireo nandripaka ny vahoakany;
  - type: text
    content: toy izany koa ve no nandripahan’ny Tompo ilay vahoakany?
  '8':
  - type: text
    content: Tsia, fa nohelohiny hatao sesitany izy
  - type: text
    content: ka halefa any am-pahababoana,
  - type: text
    content: nopaohiny tamin’ny rivo-mahery,
  - type: text
    content: dia tamin’ny andron’ny rivotra avy any atsinanana.
  '9':
  - type: text
    content: Fa ankehitriny dia toy izao no hamelàna
  - type: text
    content: ny heloka vitan’ireo taranak’i Jakôba,
  - type: text
    content: 'ary izao no ho vokatry ny famelana ny fahotany:'
  - type: text
    content: hopotehiny toy ny vato sokay voatorotoro
  - type: text
    content: 'ny vato rehetra eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ','
  - type: text
    content: ary tsy havelany hitsangana intsony
  - type: text
    content: na ny tsatokazo fanajana an’i Aserà
  - type: text
    content: na ny fandoroana vovo-javamanitra
  - type: note
    content: 'Ampit 17.8. –fandoroana vovo-javamanitra: na hoe tsangambato fanajana ny masoandro.'
  - type: text
    content: .
