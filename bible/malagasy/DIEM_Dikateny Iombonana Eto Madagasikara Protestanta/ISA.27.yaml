  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Tompo sy ny voalobony
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy hisy olona intsony ao an-tanànamimanda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho foana sy ilaozana toy ny taniefitra izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho lasa toeram-piraofan’ny zanak’omby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handriany sy hihinanany ravin-kazo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Rehefa maina ny rantsan-kazo, dia hotapahina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho avy ny vehivavy ka handoro azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manam-pahalalana tokoa ity firenena ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hiantran’ilay Mpahary azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy hangorahan’ilay Mpamorona azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fodiana rodomben’ireo voasesitany
    marker-yv: yv-h
  '12':
