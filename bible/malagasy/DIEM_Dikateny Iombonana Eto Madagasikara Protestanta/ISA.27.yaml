      text: Amin’izany andro izany, dia hirotsaka an-tsehatra ny TOMPO ka handray sabatra mafy sady lehibe no mahery hamelezana ny Leviatana, ilay bibilava mitsoriaka sy mihorongorona; ary hovonoin’ny Tompo izany dragona an-dranomasina izany
    - type: usfm
