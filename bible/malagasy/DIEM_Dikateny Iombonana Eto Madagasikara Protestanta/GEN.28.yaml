document_id: GEN.28,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia niantso an’i Jakôba i Itsehàka, ary nanao veloma azy sady nanafatrafatra hoe:'
  - type: text
    content: '–Aza maka vady amin’ny zanakavavin’ny Kanahanita. '
  '10':
  - type: text
    content: 'Niala tao Beera-Seba i Jakôba ka nankany Haràna. '
  '11':
  - type: text
    content: 'Ary tratry ny masoandro milentika teo amin’ny toerana iray izy ka nandry teo. Dia naka vato tamin’izany toerana izany izy nataony ondana, ka natory teo. '
  '12':
  - type: text
    content: 'Nanonofy izy ka indro nisy tohatra natsangana avy amin’ny tany ary nahatakatra ny lanitra ny tendrony; dia indreo nisy '
  - type: text
    content: anjeli
  - type: text
    content: n’Andriamanitra niakatra sy nidina teo aminy
  - type: note
    content: Ampit Jôh 1.51.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ary niseho teo anoloan’i Jakôba ny TOMPO Andriamanitra ka nanao hoe:'
  - type: text
    content: –Izaho no TOMPO, Andriamanitr’i Abrahama raibenao sy Andriamanitr’i Itsehàka. Ny tany izay andrianao dia homeko anao sy ny taranakao
  - type: note
    content: 'teo anoloan’i Jakôba: dkt hafa teo an-tampon’ilay tohatra. – Ny tany nampanantenaina: jereo Gen 13.14-15.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ho maro tahaka ny vovoky ny tany ny taranakao ka hiely hianatsimo sy hianavaratra ary hiankandrefana sy hiantsinanana. Amin’ny alalanao sy ny taranakao no '
  - type: text
    content: hitahiana
  - type: text
    content: ' ny firenena rehetra eto an-tany'
  - type: note
    content: 'Amin’ny alalanao...: jereo Gen 12.3. sy nta.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Hiaraka aminao Aho ary hiaro anao amin’izay rehetra alehanao ka hitondra anao miverina amin’ity tany ity. Tsy handao anao aho ary hotanterahiko izay rehetra nampanantenaiko anao.
  '16':
  - type: text
    content: 'Taitra tamin’ny torimasony i Jakôba ka nanao hoe:'
  - type: text
    content: –Tena eto amin’ity toerana ity tokoa ny TOMPO, fa izaho no tsy nahalala.
  '17':
  - type: text
    content: 'Ary natahotra izy ka nanao hoe:'
  - type: text
    content: –Tena mahatahotra ity toerana ity, izay tsy hafa fa tranon’Andriamanitra sy vavahadin’ny lanitra.
  '18':
  - type: text
    content: 'Dia nifoha vao maraina i Jakôba, ary nalainy ilay vato nataony ondana ka naoriny ho tsangambato ary nohosorany menaka teo an-tampony. '
  '19':
  - type: text
    content: 'Dia nantsoiny hoe Betela na hoe tranon’Andriamanitra io toerana io, fa Lozy no anaran’izany tanàna izany taloha. '
  '2':
  - type: text
    content: 'Miaingà ka mandehana any Mezôpôtamia ambony, any amin’i Betoela raibenao. Any ianao no makà vady amin’ny zanakavavin’i Labàna anadahin-dreninao. '
  '20':
  - type: text
    content: 'Nanao '
  - type: text
    content: voady
  - type: text
    content: ' teo i Jakôba ka niteny hoe:'
  - type: text
    content: '–Raha miaraka amiko ny Tompo ka miaro ahy amin’izao lalana alehako izao, ary manome ahy izay hohaniko sy hotafîko, '
  '21':
  - type: text
    content: 'ka mahatafaverina ahy soa aman-tsara any an-tranon-draiko, dia ny TOMPO no ho Andriamanitro. '
  '22':
  - type: text
    content: Ary ity vato izay efa naoriko ho tsangambato ity dia hanjary tranon’Andriamanitra, ka ny ampahafolon’izay rehetra homeny ahy dia hatolotro Azy.
  '3':
  - type: text
    content: 'Hitahy anao anie ilay Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: ', ka hanome taranaka maro mba hahatonga anao ho razamben’ny firenena maro '
  '4':
  - type: text
    content: Homeny anao sy ny taranakao anie ny tsodrano nataony tamin’i Abrahama mba hahazoanao ny tany fivahinianao, dia ny tany izay efa nomen’Andriamanitra an’i Abrahama
  - type: note
    content: Jereo Gen 17.4-8.
  - type: text
    content: .
  '5':
  - type: text
    content: Koa nalefan’i Itsehàka ho any Mezôpôtamia ambony i Jakôba, ho any amin’i Labàna, zanakalahin’i Betoela izay aramianina sady anadahin’i Rebekà renin’i Hesao sy i Jakôba.
  '6':
  - type: text
    content: 'Ary hitan’i Hesao fa nanao veloma an’i Jakôba i Itsehàka sady efa nandefa azy haka vady any Mezôpôtamia ambony; ary teo am-panaovam-beloma dia nanafatrafatra azy izy mba tsy hanambady zazavavy kanahanita. '
  '7':
  - type: text
    content: 'Nankatò an-drainy sy reniny tokoa i Jakôba ka lasa nankany Mezôpôtamia ambony. '
  '8':
  - type: text
    content: 'Hitan’i Hesao kosa tamin’izay fa tsy nahafaly an’i Itsehàka rainy ireo zazavavy kanahanita. '
  '9':
  - type: text
    content: Noho izany, dia lasa izy nankany amin’i Jismahela, zanakalahin’i Abrahama, ka naka vady an’i Mahalato zanany vavy sady anabavin’i Nebaiôta, ho fanampin’
  - type: note
    content: Jereo Gen 26.34.
  - type: text
    content: izay efa nananany.
  - type: heading
    content: Ny nofin’i Jakôba
