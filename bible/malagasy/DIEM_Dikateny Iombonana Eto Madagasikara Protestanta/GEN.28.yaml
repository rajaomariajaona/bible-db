document_id: GEN.28
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niantso an’i Jakôba i Itsehàka, ary nanao veloma azy sady nanafatrafatra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza maka vady amin’ny zanakavavin’ny Kanahanita. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Miaingà ka mandehana any Mezôpôtamia ambony, any amin’i Betoela raibenao. Any ianao no makà vady amin’ny zanakavavin’i Labàna anadahin-dreninao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hitahy anao anie ilay Andriamanitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsitoha
  - type: text
    text: ', ka hanome taranaka maro mba hahatonga anao ho razamben’ny firenena maro '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Homeny anao sy ny taranakao anie ny tsodrano nataony tamin’i Abrahama mba hahazoanao ny tany fivahinianao, dia ny tany izay efa nomen’Andriamanitra an’i Abrahama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 17.4-8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa nalefan’i Itsehàka ho any Mezôpôtamia ambony i Jakôba, ho any amin’i Labàna, zanakalahin’i Betoela izay aramianina sady anadahin’i Rebekà renin’i Hesao sy i Jakôba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hitan’i Hesao fa nanao veloma an’i Jakôba i Itsehàka sady efa nandefa azy haka vady any Mezôpôtamia ambony; ary teo am-panaovam-beloma dia nanafatrafatra azy izy mba tsy hanambady zazavavy kanahanita. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nankatò an-drainy sy reniny tokoa i Jakôba ka lasa nankany Mezôpôtamia ambony. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hitan’i Hesao kosa tamin’izay fa tsy nahafaly an’i Itsehàka rainy ireo zazavavy kanahanita. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho izany, dia lasa izy nankany amin’i Jismahela, zanakalahin’i Abrahama, ka naka vady an’i Mahalato zanany vavy sady anabavin’i Nebaiôta, ho fanampin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 26.34.
    marker-yv: yv-n
  - type: text
    text: izay efa nananany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nofin’i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Niala tao Beera-Seba i Jakôba ka nankany Haràna. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tratry ny masoandro milentika teo amin’ny toerana iray izy ka nandry teo. Dia naka vato tamin’izany toerana izany izy nataony ondana, ka natory teo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nanonofy izy ka indro nisy tohatra natsangana avy amin’ny tany ary nahatakatra ny lanitra ny tendrony; dia indreo nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: n’Andriamanitra niakatra sy nidina teo aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôh 1.51.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary niseho teo anoloan’i Jakôba ny TOMPO Andriamanitra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho no TOMPO, Andriamanitr’i Abrahama raibenao sy Andriamanitr’i Itsehàka. Ny tany izay andrianao dia homeko anao sy ny taranakao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'teo anoloan’i Jakôba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teo an-tampon’ilay tohatra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Ny tany nampanantenaina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Gen 13.14-15.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ho maro tahaka ny vovoky ny tany ny taranakao ka hiely hianatsimo sy hianavaratra ary hiankandrefana sy hiantsinanana. Amin’ny alalanao sy ny taranakao no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hitahiana
  - type: text
    text: ' ny firenena rehetra eto an-tany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Amin’ny alalanao...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 12.3. sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hiaraka aminao Aho ary hiaro anao amin’izay rehetra alehanao ka hitondra anao miverina amin’ity tany ity. Tsy handao anao aho ary hotanterahiko izay rehetra nampanantenaiko anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Taitra tamin’ny torimasony i Jakôba ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tena eto amin’ity toerana ity tokoa ny TOMPO, fa izaho no tsy nahalala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary natahotra izy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tena mahatahotra ity toerana ity, izay tsy hafa fa tranon’Andriamanitra sy vavahadin’ny lanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nifoha vao maraina i Jakôba, ary nalainy ilay vato nataony ondana ka naoriny ho tsangambato ary nohosorany menaka teo an-tampony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nantsoiny hoe Betela na hoe tranon’Andriamanitra io toerana io, fa Lozy no anaran’izany tanàna izany taloha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voady
  - type: text
    text: ' teo i Jakôba ka niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha miaraka amiko ny Tompo ka miaro ahy amin’izao lalana alehako izao, ary manome ahy izay hohaniko sy hotafîko, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ka mahatafaverina ahy soa aman-tsara any an-tranon-draiko, dia ny TOMPO no ho Andriamanitro. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ity vato izay efa naoriko ho tsangambato ity dia hanjary tranon’Andriamanitra, ka ny ampahafolon’izay rehetra homeny ahy dia hatolotro Azy.
