document_id: EXO.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny loza fahadimy: ny pesta nahazo ny biby'
  - type: text
    content: Hoy ny TOMPO tamin’i Mosesy.
  - type: text
    content: '–Mankanesa any amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' ka lazao aminy hoe: «Ny TOMPO Andriamanitry ny Hebreo dia mandidy anao mba handefa ny vahoakany hanao fanompoam-pivavahana aminy. '
  '10':
  - type: text
    content: 'Dia nalain’i Mosesy sy Aharôna ny molaly tao an-dafaoro, ka lasa izy mirahalahy niseho teo anatrehan’ny Farao. Natsipin’i Mosesy savoan-danitra ny molaly, ka nisy vay nipoipoitra teny amin’ny olona sy ny biby fiompy. '
  '11':
  - type: text
    content: 'Tsy afaka niseho teo anatrehan’i Mosesy ireo mpimasy noho ny vay, fa rakotry ny vay toy ireo Ejiptianina rehetra izy. '
  '12':
  - type: text
    content: Ary ny TOMPO nanamafy ny fon’ny Farao; koa arak’izay efa nambaran’ny TOMPO tamin’i Mosesy, dia tsy nihaino ny fangatahan’i Mosesy sy i Aharôna izy.
  - type: heading
    content: 'Ny loza fahafito: ny havandra'
  '13':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Mifohaza maraina ianao rahampitso, mandehàna miseho eo anatrehan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' ka lazao aminy hoe: «Izao no lazain’ny TOMPO, Andriamanitry ny Hebreo, aminao: ‹Alefaso handeha ny vahoakako mba hanao fanompoam-pivavahana amiko. '
  '14':
  - type: text
    content: 'Fa amin’ity indray mandeha ity dia halefako hamely anao sy ny mpanomponao ary ny vahoakanao ny loza rehetra mba ho fantatrao fa tsy misy tahaka ahy eto ambonin’ny tany. '
  '15':
  - type: text
    content: 'Ankehitriny, raha naninji-tanana namely anao sy ny vahoakanao tamin’ny areti-mandringana Aho, dia efa levona teto ambonin’ny tany ianareo. '
  '16':
  - type: text
    content: Saingy navelako ho velona ianao mba hahitanao ny heriko sy hitantarana ny lazako any amin’ny tany rehetra
  - type: note
    content: Jereo Rm 9.17.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Na izany aza, dia mbola manao zinona ny vahoakako ihany ianao, ka tsy mety mandefa azy. '
  '18':
  - type: text
    content: 'Noho izany, rahampitso amin’ny ora toy izao aho dia hampilatsaka havandra be dia be izay tsy mbola nisy toa azy hatramin’ny andro niorenan’ny Ejipta ka mandraka androany.› '
  '19':
  - type: text
    content: Koa ankehitriny àry, hoy i Mosesy, maniraha hampanangona ny biby fiompinao sy izay rehetra anao any an-tsaha. Fa ny olona rehetra sy ny biby rehetra izay hita any an-tsaha, fa tsy tafiditra ao an-tranony, dia ho tratry ny havandra ka ho faty.»
  '2':
  - type: text
    content: 'Fa raha mandà tsy handefa azy ianao ka mbola miziriziry ihany, '
  '20':
  - type: text
    content: 'Ny sasany tamin’ireo tandapan’ny Farao dia natahotra ny tenin’ny TOMPO ka nampialoka ny mpiasany sy ny biby fiompiny tany an-trano. '
  '21':
  - type: text
    content: Ny sasany kosa tsy niraharaha ny tenin’ny TOMPO, ka namela ny mpiasany sy ny biby fiompy teny an-tsaha ihany.
  '22':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Atsangano manondro lanitra ny tananao! Aoka ny havandra hirotsaka amin’ny tany Ejipta manontolo, amin’ny olona sy ny biby fiompy ary amin’ny voly rehetra any an-tsaha.
  '23':
  - type: text
    content: 'Natsangan’i Mosesy nanondro lanitra ny tehiny, dia nampisy kotrokorana sy havandra ny TOMPO: nilatsaka ny varatra, ary nampirotsaka havandra tamin’ny tany Ejipta ny TOMPO. '
  '24':
  - type: text
    content: Dia nisy havandra niaraka amin’ny tafiotra sy ny varatra, ka tsy mbola nisy havandra be toy izany manerana Ejipta manontolo hatramin’izay nahafirenena azy
  - type: note
    content: Jereo Apôk 8.7; 16.21.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Nanerana an’i Ejipta manontolo ny havandra ka namely izay rehetra tany an-tsaha na olona na biby; nasiany koa ny voly rehetra ary nopotehiny ny hazo rehetra tany an-tsaha. '
  '26':
  - type: text
    content: Ny faritany Gôsena
  - type: note
    content: 'Gôsena: jereo Gen 45.10 sy nta.'
  - type: text
    content: ' izay nonenan’ny Israelita ihany no tsy nisy havandra. '
  '27':
  - type: text
    content: 'Dia nampiantso an’i Mosesy sy Aharôna ny Farao ka nilaza taminy hoe:'
  - type: text
    content: '–Diso aho tamin’ity indray mandeha ity. Izao sy ny vahoakako no meloka, fa ny TOMPO dia manao ny marina. '
  '28':
  - type: text
    content: Mangataha amin’ny TOMPO mba hitsahatra ny kotro-baratra sy ny havandra, dia halefako ianareo fa tsy hotazoniko intsony.
  '29':
  - type: text
    content: 'Dia namaly azy i Mosesy hoe:'
  - type: text
    content: '–Raha vao mivoaka ny tanàna aho, dia hanandra-tanana amin’ny TOMPO hivavaka. Hitsahatra ny kotroka ary tsy hisy intsony ny havandra, mba hahafantaranao fa an’ny TOMPO ny tany. '
  '3':
  - type: text
    content: 'dia hamely ny biby fiompinao any an-tsaha ny TOMPO: hisy areti-mandringana mahery vaika hamely ny soavaly sy ny boriky, ny rameva sy ny omby, ary ny ondry aman’osy. '
  '30':
  - type: text
    content: Fantatro anefa izao fa ianao sy ny mpanomponao dia tsy mbola tena hatahotra ny TOMPO Andriamanitra ihany.
  '31':
  - type: text
    content: 'Simba avokoa ny rongony sy ny vary ôrza, fa efa niteraka ny ôrza ary efa mamony ny rongony. '
  '32':
  - type: text
    content: Fa ny varim-bazaha sy ny ampemby voly aoriana, dia tsy maninona.
  '33':
  - type: text
    content: Dia niala teo anatrehan’ny Farao i Mosesy ary nivoaka ny tanàna. Nanandra-tanana tamin’ny TOMPO izy ka nivavaka dia nitsahatra ny kotroka sy ny havandra, ary tsy nilatsaka intsony ny orana.
  '34':
  - type: text
    content: 'Nony hitan’ny Farao fa nitsahatra ny orana sy ny havandra ary ny kotroka, dia hadisoana toy ny teo aloha indray no nataony; fa samy nihadonto fo izy sy ireo tandapany. '
  '35':
  - type: text
    content: Ary araka izay nambaran’ny TOMPO tamin’ny alalan’i Mosesy, dia manamafy fo ny Farao ka tsy nandefa ny Israelita.
  '4':
  - type: text
    content: Saingy havahan’ny TOMPO ny biby fiompin’ny Israelita sy ny an’ny Ejiptianina, ka tsy hisy ho faty ny an’ny Israelita!»
  '5':
  - type: text
    content: 'Ary nanondro fotoanandro ny TOMPO ka nanao hoe:'
  - type: text
    content: –Rahampitso no hanatanterahako izany zavatra izany eto Ejipta.
  '6':
  - type: text
    content: 'Nony ampitso dia notanterahin’ny TOMPO izay efa nambarany, ka maty avokoa ny biby fiompin’ny Ejiptianina; fa ny an’ny Israelita kosa dia tsy nisy maty na iray aza. '
  '7':
  - type: text
    content: Dia mamotopototra ny Farao, ka fantany fa tsy nisy maty tao amin’ny biby fiompin’ny Israelita na dia iray aza. Kanefa mbola nanamafy fo ihany ny Farao, ka tsy nandefa ny Israelita.
  - type: heading
    content: 'Ny loza fahenina: ny vay'
  '8':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy sy i Aharôna:'
  - type: text
    content: '–Makà molaly eran’ny tanan-droanareo avy ao an-dafaoro, dia aoka hatsipin’i Mosesy savoan-danitra eo anatrehan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' izany. '
  '9':
  - type: text
    content: Hitora-jofo manerana ny tany Ejipta izany, ka ho tonga vay mipoipoitra eny amin’ny olona sy ny biby fiompy eran’i Ejipta manontolo
  - type: note
    content: Tsy fantatra mazava ny aretin-koditra eto. Nisy koa nandika ny voambolana hebreo hoe dridra sy tandomitra. Ampit Apôk 16.2.
  - type: text
    content: .
