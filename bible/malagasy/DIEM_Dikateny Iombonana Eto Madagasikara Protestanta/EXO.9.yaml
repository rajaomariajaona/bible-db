document_id: EXO.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahadimy: ny pesta nahazo ny biby'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hoy ny TOMPO tamin’i Mosesy.
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mankanesa any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' ka lazao aminy hoe: «Ny TOMPO Andriamanitry ny Hebreo dia mandidy anao mba handefa ny vahoakany hanao fanompoam-pivavahana aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha mandà tsy handefa azy ianao ka mbola miziriziry ihany, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia hamely ny biby fiompinao any an-tsaha ny TOMPO: hisy areti-mandringana mahery vaika hamely ny soavaly sy ny boriky, ny rameva sy ny omby, ary ny ondry aman’osy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Saingy havahan’ny TOMPO ny biby fiompin’ny Israelita sy ny an’ny Ejiptianina, ka tsy hisy ho faty ny an’ny Israelita!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nanondro fotoanandro ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rahampitso no hanatanterahako izany zavatra izany eto Ejipta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nony ampitso dia notanterahin’ny TOMPO izay efa nambarany, ka maty avokoa ny biby fiompin’ny Ejiptianina; fa ny an’ny Israelita kosa dia tsy nisy maty na iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia mamotopototra ny Farao, ka fantany fa tsy nisy maty tao amin’ny biby fiompin’ny Israelita na dia iray aza. Kanefa mbola nanamafy fo ihany ny Farao, ka tsy nandefa ny Israelita.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahenina: ny vay'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy sy i Aharôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Makà molaly eran’ny tanan-droanareo avy ao an-dafaoro, dia aoka hatsipin’i Mosesy savoan-danitra eo anatrehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hitora-jofo manerana ny tany Ejipta izany, ka ho tonga vay mipoipoitra eny amin’ny olona sy ny biby fiompy eran’i Ejipta manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tsy fantatra mazava ny aretin-koditra eto. Nisy koa nandika ny voambolana hebreo hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dridra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tandomitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Ampit Apôk 16.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nalain’i Mosesy sy Aharôna ny molaly tao an-dafaoro, ka lasa izy mirahalahy niseho teo anatrehan’ny Farao. Natsipin’i Mosesy savoan-danitra ny molaly, ka nisy vay nipoipoitra teny amin’ny olona sy ny biby fiompy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy afaka niseho teo anatrehan’i Mosesy ireo mpimasy noho ny vay, fa rakotry ny vay toy ireo Ejiptianina rehetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny TOMPO nanamafy ny fon’ny Farao; koa arak’izay efa nambaran’ny TOMPO tamin’i Mosesy, dia tsy nihaino ny fangatahan’i Mosesy sy i Aharôna izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny loza fahafito: ny havandra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mifohaza maraina ianao rahampitso, mandehàna miseho eo anatrehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' ka lazao aminy hoe: «Izao no lazain’ny TOMPO, Andriamanitry ny Hebreo, aminao: ‹Alefaso handeha ny vahoakako mba hanao fanompoam-pivavahana amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa amin’ity indray mandeha ity dia halefako hamely anao sy ny mpanomponao ary ny vahoakanao ny loza rehetra mba ho fantatrao fa tsy misy tahaka ahy eto ambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ankehitriny, raha naninji-tanana namely anao sy ny vahoakanao tamin’ny areti-mandringana Aho, dia efa levona teto ambonin’ny tany ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Saingy navelako ho velona ianao mba hahitanao ny heriko sy hitantarana ny lazako any amin’ny tany rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 9.17.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Na izany aza, dia mbola manao zinona ny vahoakako ihany ianao, ka tsy mety mandefa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noho izany, rahampitso amin’ny ora toy izao aho dia hampilatsaka havandra be dia be izay tsy mbola nisy toa azy hatramin’ny andro niorenan’ny Ejipta ka mandraka androany.› '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa ankehitriny àry, hoy i Mosesy, maniraha hampanangona ny biby fiompinao sy izay rehetra anao any an-tsaha. Fa ny olona rehetra sy ny biby rehetra izay hita any an-tsaha, fa tsy tafiditra ao an-tranony, dia ho tratry ny havandra ka ho faty.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny sasany tamin’ireo tandapan’ny Farao dia natahotra ny tenin’ny TOMPO ka nampialoka ny mpiasany sy ny biby fiompiny tany an-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny sasany kosa tsy niraharaha ny tenin’ny TOMPO, ka namela ny mpiasany sy ny biby fiompy teny an-tsaha ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Atsangano manondro lanitra ny tananao! Aoka ny havandra hirotsaka amin’ny tany Ejipta manontolo, amin’ny olona sy ny biby fiompy ary amin’ny voly rehetra any an-tsaha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Natsangan’i Mosesy nanondro lanitra ny tehiny, dia nampisy kotrokorana sy havandra ny TOMPO: nilatsaka ny varatra, ary nampirotsaka havandra tamin’ny tany Ejipta ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nisy havandra niaraka amin’ny tafiotra sy ny varatra, ka tsy mbola nisy havandra be toy izany manerana Ejipta manontolo hatramin’izay nahafirenena azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Apôk 8.7; 16.21.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nanerana an’i Ejipta manontolo ny havandra ka namely izay rehetra tany an-tsaha na olona na biby; nasiany koa ny voly rehetra ary nopotehiny ny hazo rehetra tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny faritany Gôsena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gôsena: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 45.10 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izay nonenan’ny Israelita ihany no tsy nisy havandra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nampiantso an’i Mosesy sy Aharôna ny Farao ka nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Diso aho tamin’ity indray mandeha ity. Izao sy ny vahoakako no meloka, fa ny TOMPO dia manao ny marina. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mangataha amin’ny TOMPO mba hitsahatra ny kotro-baratra sy ny havandra, dia halefako ianareo fa tsy hotazoniko intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia namaly azy i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha vao mivoaka ny tanàna aho, dia hanandra-tanana amin’ny TOMPO hivavaka. Hitsahatra ny kotroka ary tsy hisy intsony ny havandra, mba hahafantaranao fa an’ny TOMPO ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fantatro anefa izao fa ianao sy ny mpanomponao dia tsy mbola tena hatahotra ny TOMPO Andriamanitra ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Simba avokoa ny rongony sy ny vary ôrza, fa efa niteraka ny ôrza ary efa mamony ny rongony. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa ny varim-bazaha sy ny ampemby voly aoriana, dia tsy maninona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dia niala teo anatrehan’ny Farao i Mosesy ary nivoaka ny tanàna. Nanandra-tanana tamin’ny TOMPO izy ka nivavaka dia nitsahatra ny kotroka sy ny havandra, ary tsy nilatsaka intsony ny orana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nony hitan’ny Farao fa nitsahatra ny orana sy ny havandra ary ny kotroka, dia hadisoana toy ny teo aloha indray no nataony; fa samy nihadonto fo izy sy ireo tandapany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary araka izay nambaran’ny TOMPO tamin’ny alalan’i Mosesy, dia manamafy fo ny Farao ka tsy nandefa ny Israelita.
