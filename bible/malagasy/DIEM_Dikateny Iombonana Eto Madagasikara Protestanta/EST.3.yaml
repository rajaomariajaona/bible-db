document_id: EST.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tezitra amin’i Môrdôkay i Hamàna
  - type: text
    content: Tatỳ aorian’izany, dia nomen’ny amperôra Kserksesa laharana ambony i Hamàna zanakalahin’i Hamedatà sady taranak’i Agaga
  - type: note
    content: I Agaga mpanjakan’ny Hamalekita, dia fahavalon’i Saoly, jereo 1 Sam 15.
  - type: text
    content: ', ka nasandrany hipetraka eo amin’ny toerana maha praiminisitra. '
  '10':
  - type: text
    content: Dia nesorin’ny amperôra teny an-tanany ny peratra tombokase ka nomeny an’ilay fahavalon’ny Jiosy, dia i Hamàna zanakalahin’i Hamedatà sady taranak’i Agaga
  - type: note
    content: 'Ny peratry ny amperôra dia mari-pahefana; tamin’io peratra io manko ny tombokasen’ny amperôra ka mahatonga izay omena azy hanao zavatra amin’ny anaran’ny amperôra (jereo and 12). –taranak’i Agaga: jereo 3.1 sy nta.'
  - type: text
    content: '; '
  '11':
  - type: text
    content: 'ary hoy izy tamin’i Hamàna:'
  - type: text
    content: –Afoy ho anao ny volafotsy; ary hatolotra anao koa izany firenena izany hanaovanao azy araka izay sitrakao.
  '12':
  - type: text
    content: 'Tamin’ny volana voalohany, andro faha-13, dia nantsoina ireo mpitantsoratry ny amperôra: Araka izay rehetra nandidian’i Hamàna no nanoratany taratasy ho an’ny solotenan’ny amperôra sy ho an’ny governora isam-paritany ary ho an’ny mpitondra isam-pirenena, dia taratasy araka ny fomba fiteny sy fanoratry ny firenena isan-tokony. Tamin’ny anaran’i Kserksesa no nanasoniavana azy ka nasiana tombokase tamin’ny peratry ny amperôra. '
  '13':
  - type: text
    content: 'Nisy iraka nampitondraina ireo taratasy ireo ho any amin’ny faritany rehetra manerana ny fanjakana. Ny baiko raketiny dia ny handringanana sy hamonoana ho ripaka ny Jiosy rehetra, na tanora na antitra, hatramin’ny zaza amam-behivavy aza, ary koa ny handrobana ny fananany. Anatin’ny indray andro monja no hanatanterahana izany fandripahana izany, dia ny andro faha-13 amin’ny volana faha-12 na volana Adara. '
  '14':
  - type: text
    content: 'Ny kopian’io taratasy io dia navoaka ho didy manan-kery amin’ny isam-paritany ary nampahafantarina ny olona rehetra mba hampiomana azy ho amin’izany andro izany. '
  '15':
  - type: text
    content: Noho ny baikon’ny amperôra, dia nandeha faingana ny iraka; ary navoaka tao Sosany renivohitra
  - type: note
    content: Momba an’i Sosany renivohitra dia jereo 1.2 sy nta.
  - type: text
    content: ' koa izany didy manan-kery izany. Dia nipetraka hisotro ny amperôra sy i Hamàna, fa very hevitra kosa i Sosany iray tanàna.'
  '2':
  - type: text
    content: 'Ny mpandraharaha rehetra tao an-dapa dia nandohalika sy niankohoka teo anatrehan’i Hamàna, satria izany no didin’ny amperôra. Fa i Môrdôkay kosa tsy mba nety nanao izany. '
  '3':
  - type: text
    content: 'Ka hoy ny mpandraharaha hafa tamin’i Môrdôkay:'
  - type: text
    content: –Nahoana ianao no mandika ny didin’ny amperôra?
  '4':
  - type: text
    content: 'Na dia naverimberin’ireo tamin’i Môrdôkay isan’andro aza izany fanontaniana izany, dia tsy niraharaha izy fa namaly fotsiny hoe:'
  - type: text
    content: –Jiosy aho!
  - type: text
    content: Dia notaterin’ireo tamin’i Hamàna izy mba hizahany na haharitra amin’ny teniny ihany i Môrdôkay na tsia
  - type: note
    content: 'mba hizahany...na tsia: dkt hafa mba hizahana raha mitombina ihany ny tenin’i Môrdôkay na tsia (jereo Eks 20.5).'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Rehefa hitan’i Hamàna fa tsy mba nety nandohalika sy niankohoka teo anatrehany tokoa i Môrdôkay, dia tezitra mafy izy. '
  '6':
  - type: text
    content: 'Nampahafantarina azy rahateo fa Jiosy i Môrdôkay. Ary nataon’i Hamàna fa tsy ampy ny maninji-tanana hamely an’i Môrdôkay irery ihany, ka dia notadiaviny haringana koa ny Jiosy rehetra manerana ny fanjakan’i Kserksesa, satria mpiray firenena amin’i Môrdôkay ireo. '
  '7':
  - type: text
    content: Tamin’ny taona faha-12 nanjakan’i Kserksesa, volana voalohany na volana Nisàna, no nanaovana ny antsapaka (atao hoe Porîma) teo anatrehan’i Hamàna hahafantarana ny fotoanandro tokony hanatanterahana izany; ka rehefa notetezina ny andro sy ny volana, dia ny volana faha-12 na volana Adara no voatondron’ny antsapaka.
  - type: heading
    content: Omanin’i Hamàna ny fandringanana ny Jiosy
  '8':
  - type: text
    content: 'Ary hoy i Hamàna tamin’ny amperôra Kserksesa:'
  - type: text
    content: '–Ry andriamanjaka, misy firenena iray efa miely eny amin’ny faritany rehetra manerana ny fanjakana; maningana io firenena io ary hafa lalàna noho ny firenena rehetra sady tsy mba mankatò ny lalànanao. Tsy mahasoa anao ny mamela azy fotsiny amin’izao. '
  '9':
  - type: text
    content: Koa raha sitrakao, dia aoka ianao hamoaka didy an-tsoratra mba handringanana azy; volafotsy 340 000 kilao kosa no haloako ho eo an-tanan’ireo mpandraharahanao mba harotsany ao amin’ny tahirim-bolam-panjakana
  - type: note
    content: Io vola io dia toa natao hamenoana ny banga ao amin’ny tahirim-bolam-panjakana (=ny hetra voaangona) noho ny fihenàn’ny fidiran-ketra vokatry ny fandringanana ireo Jiosy.
  - type: text
    content: .
