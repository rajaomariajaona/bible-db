document_id: EST.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tezitra amin’i Môrdôkay i Hamàna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tatỳ aorian’izany, dia nomen’ny amperôra Kserksesa laharana ambony i Hamàna zanakalahin’i Hamedatà sady taranak’i Agaga
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Agaga
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' mpanjakan’ny Hamalekita, dia fahavalon’i Saoly, jereo 1 Sam 15.'
      marker-yv: yv-n
    - type: text
      text: ', ka nasandrany hipetraka eo amin’ny toerana maha praiminisitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia nesorin’ny amperôra teny an-tanany ny peratra tombokase ka nomeny an’ilay fahavalon’ny Jiosy, dia i Hamàna zanakalahin’i Hamedatà sady taranak’i Agaga
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: peratry
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ny amperôra dia mari-pahefana; tamin’io peratra io manko ny tombokasen’ny amperôra ka mahatonga izay omena azy hanao zavatra amin’ny anaran’ny amperôra (jereo and 12). –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: taranak’i Agaga
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 3.1 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ary hoy izy tamin’i Hamàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Afoy ho anao ny volafotsy; ary hatolotra anao koa izany firenena izany hanaovanao azy araka izay sitrakao.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tamin’ny volana voalohany, andro faha-13, dia nantsoina ireo mpitantsoratry ny amperôra: Araka izay rehetra nandidian’i Hamàna no nanoratany taratasy ho an’ny solotenan’ny amperôra sy ho an’ny governora isam-paritany ary ho an’ny mpitondra isam-pirenena, dia taratasy araka ny fomba fiteny sy fanoratry ny firenena isan-tokony. Tamin’ny anaran’i Kserksesa no nanasoniavana azy ka nasiana tombokase tamin’ny peratry ny amperôra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nisy iraka nampitondraina ireo taratasy ireo ho any amin’ny faritany rehetra manerana ny fanjakana. Ny baiko raketiny dia ny handringanana sy hamonoana ho ripaka ny Jiosy rehetra, na tanora na antitra, hatramin’ny zaza amam-behivavy aza, ary koa ny handrobana ny fananany. Anatin’ny indray andro monja no hanatanterahana izany fandripahana izany, dia ny andro faha-13 amin’ny volana faha-12 na volana Adara. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ny kopian’io taratasy io dia navoaka ho didy manan-kery amin’ny isam-paritany ary nampahafantarina ny olona rehetra mba hampiomana azy ho amin’izany andro izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Noho ny baikon’ny amperôra, dia nandeha faingana ny iraka; ary navoaka tao Sosany renivohitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba an’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sosany renivohitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia jereo 1.2 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' koa izany didy manan-kery izany. Dia nipetraka hisotro ny amperôra sy i Hamàna, fa very hevitra kosa i Sosany iray tanàna.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny mpandraharaha rehetra tao an-dapa dia nandohalika sy niankohoka teo anatrehan’i Hamàna, satria izany no didin’ny amperôra. Fa i Môrdôkay kosa tsy mba nety nanao izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ka hoy ny mpandraharaha hafa tamin’i Môrdôkay:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana ianao no mandika ny didin’ny amperôra?
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Na dia naverimberin’ireo tamin’i Môrdôkay isan’andro aza izany fanontaniana izany, dia tsy niraharaha izy fa namaly fotsiny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Jiosy aho!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia notaterin’ireo tamin’i Hamàna izy mba hizahany na haharitra amin’ny teniny ihany i Môrdôkay na tsia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mba hizahany...na tsia: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mba hizahana raha mitombina ihany ny tenin’i Môrdôkay na tsia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo Eks 20.5).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Rehefa hitan’i Hamàna fa tsy mba nety nandohalika sy niankohoka teo anatrehany tokoa i Môrdôkay, dia tezitra mafy izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nampahafantarina azy rahateo fa Jiosy i Môrdôkay. Ary nataon’i Hamàna fa tsy ampy ny maninji-tanana hamely an’i Môrdôkay irery ihany, ka dia notadiaviny haringana koa ny Jiosy rehetra manerana ny fanjakan’i Kserksesa, satria mpiray firenena amin’i Môrdôkay ireo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tamin’ny taona faha-12 nanjakan’i Kserksesa, volana voalohany na volana Nisàna, no nanaovana ny antsapaka (atao hoe Porîma) teo anatrehan’i Hamàna hahafantarana ny fotoanandro tokony hanatanterahana izany; ka rehefa notetezina ny andro sy ny volana, dia ny volana faha-12 na volana Adara no voatondron’ny antsapaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omanin’i Hamàna ny fandringanana ny Jiosy
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy i Hamàna tamin’ny amperôra Kserksesa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry andriamanjaka, misy firenena iray efa miely eny amin’ny faritany rehetra manerana ny fanjakana; maningana io firenena io ary hafa lalàna noho ny firenena rehetra sady tsy mba mankatò ny lalànanao. Tsy mahasoa anao ny mamela azy fotsiny amin’izao. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa raha sitrakao, dia aoka ianao hamoaka didy an-tsoratra mba handringanana azy; volafotsy 340 000 kilao kosa no haloako ho eo an-tanan’ireo mpandraharahanao mba harotsany ao amin’ny tahirim-bolam-panjakana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Io vola io dia toa natao hamenoana ny banga ao amin’ny tahirim-bolam-panjakana (=ny hetra voaangona) noho ny fihenàn’ny fidiran-ketra vokatry ny fandringanana ireo Jiosy.
      marker-yv: yv-n
    - type: text
      text: .
