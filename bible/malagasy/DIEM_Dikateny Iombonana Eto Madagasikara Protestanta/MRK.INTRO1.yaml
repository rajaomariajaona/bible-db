document_id: MRK.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Amin’ireo Vaovao Mahafaly efatra dia ny Vaovao Mahafaly araka an’i Marka no fohy indrindra ary toa izy koa no tranainy indrindra.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hatreo amin’ny andalan-tsoratra voalohany dia ambaran’i Marka fa sady Kristy no Zanak’Andriamanitra i Jesoa (1.1). Hiverimberina matetika izany anarana roa sosona fiantsoana an’i Jesoa izany manerana ny Vaovao Mahafaly araka an’i Marka (1.11; 8.29; 9.7; jereo koa 3.11; 5.7; 14.61), kanefa tsy tian’i Jesoa haely na hampahafantarina fa satriny ho tsiambaratelo (1.25; 3.12; 8.30; jereo koa 1.44; 5.43; 7.36). Inona no antony? Ny antony dia satria tsy mety ho azo tsara izany raha tsy mibanjina an’i Jesoa maty nohomboana teo amin’ny hazofijaliana, tahaka ny nataon’ilay kapiteny rômanina (15.39).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rehefa miseho anefa izany Jesoa irak’Andriamanitra izany, dia tokony horaisin’ny olombelona tsirairay avy amin’ny toetra mendrika. Ny manomana ny vahoakan’Andriamanitra handray Azy no adidin’i Jôhany Mpanao batisa (1.2-8), ary io Jôhany io rahateo no manao batisa an’i Jesoa (1.9-11).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nony avy nalaim-panahy tany an-taniefitra i Jesoa (1.12-13), dia manomboka ny fiainany ampahibemaso amin’izay. Voasoritra matetika ny fahefan’i Jesoa na Izy miantso olona hiaraka aminy na Izy mampianatra ny vahoaka na Izy manasitrana marary (1.14–8.30).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ao amin’ny fizaràna manaraka, ny asehon’i Marka dia i Jesoa mandroso ho any Jerosalema (8.31–10.52) mba hijaly sy ho faty ary hitsangana velona. Intelo miantoana Izy no manambara izany amin’ny mpianany saingy tsy azon’ireo velively. Miteny matetika momba ny tenany koa i Jesoa ary manondro tena ho Zanak’olona. Kanefa iza marina moa i Jesoa? Mbola miafina ny valim-panontaniana.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hobîn’ny vahoaka i Jesoa no miditra ao Jerosalema. Dia mandroaka ny mpivarotra tao an-kianjan’ny tempoly Izy ary mifandona amin’ireo mpitondra fivavahana jiosy. Hararaotin’i Jesoa ny fotoana mba hampianarana faramparany ireo mpanohitra Azy ary ny vahoaka sy ny mpianany (toko 11–13).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny toko 14–15 kosa dia voatokana ho an’ny andro roa farany iainan’i Jesoa alohan’ny hahafatesany. Izao avy no tantaraina indrindra ao: i Jesoa miara-misakafo farany amin’ny mpianany (ka manolotra ny mofo sy divay ho azy); i Jesoa mivavaka samirery tany Getsemane; i Jesoa voasambotra sy melohina ho faty; i Jesoa vonoina eo amin’ny hazofijaliana ary alevina am-pasana. Kanjo ny afakampitson’ny nahafatesany, dia fasana foana tsy misy faty no hitan’ireo vehivavy; ary nampahalalain’ny anjely azy ireo fa efa nitsangana velona i Jesoa (16.1-8). Taitra loatra ireo vehivavy ka nitsoaka nandositra. Toa eo no mifarana ny Vaovao Mahafaly araka an’i Marka. Misy anefa sora-tanana firaketana maromaro izay ahitana fanampiny (Mk 16.9-20), mamintina ireo fisehoan’i Jesoa tafatsangana velona ary milaza ny fiakarany any an-danitra. Voatantara amin’ny antsipiriany kokoa ireo fisehoana ireo any amin’ny Vaovao Mahafaly anankitelo hafa.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Rehefa voavakînao ny Vaovao Mahafaly araka an’i Marka, moa ve ianao mba hankatò fa i Jesoa avy any Nazareta no Mesia (Kristy) araka ny voalazany rahateo (jereo 14.62) ary mba hiaiky tahaka ilay kapiteny rômanina hoe: «Tena Zanak’Andriamanitra tokoa io Lehilahy io» (15.39)?'
