document_id: PSA.140,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavak’olona voaendrikendrika
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: Be rehaka lalandava ireo fahavalo manemitra ahy;
  - type: text
    content: ka ny ratsy notonontononiny anie hanototra azy!
  '11':
  - type: text
    content: Vainafo miredareda anie
  - type: text
    content: no toy ny orana halatsaka aminy;
  - type: text
    content: lavaka lalina tsy hainy hiakarana anie
  - type: text
    content: no hamarinana azy ao anaty afo!
  '12':
  - type: text
    content: Aoka ny olo-mahay vava tsy honina amin’ny tany,
  - type: text
    content: ary ny olon-dozabe hoenjehin’antambo ka tsy hamelany!
  '13':
  - type: text
    content: Fantatro, TOMPO ô, fa hotandrovinao ny zon’ny ory
  - type: text
    content: ary hamoahanao fitsarana ara-drariny ny mahantra.
  '14':
  - type: text
    content: Eny tokoa, ny olo-marina hisaotra Anao
  - type: text
    content: ary ny olo-mahitsy hitoetra eo anoloanao.
  '2':
  - type: text
    content: TOMPO ô, vonjeo ho afaka amin’ny olon-dratsy aho
  - type: text
    content: ary arovy tsy ho azon’ny olon-dozabe
  '3':
  - type: text
    content: izay misaina haratsiana ao am-pony
  - type: text
    content: ka manangana ady isan’andro vaky.
  '4':
  - type: text
    content: Toa mandrani-dela hanindrona tahaka ny bibilava ireo,
  - type: text
    content: toa poizi-menarana ny teny avoakan’ny vavany
  - type: note
    content: Jereo Rm 3.13.
  - type: text
    content: .
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: TOMPO ô, ambeno tsy ho voatanan’ny olon-dratsy aho,
  - type: text
    content: arovy tsy ho azon’ny olon-dozabe
  - type: text
    content: izay nihevitra handronjina sy hamotraka ahy.
  '6':
  - type: text
    content: 'Efa nanafim-pandrika hamelezana ahy ny mpiavonavona:'
  - type: text
    content: eny, nanenjan-tady sy harato teo amoron-dalana ireo
  - type: text
    content: ary nametraka tadivavarana mba hahazoany ahy.
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: 'Hoy kosa aho tamin’ny TOMPO: «Ianao no Andriamanitro.'
  - type: text
    content: TOMPO ô, mba henoy izany feoko mitaraina aminao!
  '8':
  - type: text
    content: Ry TOMPO Andriamanitra Mpamonjy mahery ô,
  - type: text
    content: nosaronanao ny lohako tamin’ny andro niadiana.
  '9':
  - type: text
    content: TOMPO ô, aza tovinao izay irîn’ny olon-dratsy,
  - type: text
    content: aza avela hahomby ny fikasany!»
  - type: text
    content: Fiatoana
