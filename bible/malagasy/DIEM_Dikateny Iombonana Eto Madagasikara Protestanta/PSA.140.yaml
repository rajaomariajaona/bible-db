    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Be rehaka lalandava ireo fahavalo manemitra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny ratsy notonontononiny anie hanototra azy!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Vainafo miredareda anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no toy ny orana halatsaka aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lavaka lalina tsy hainy hiakarana anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hamarinana azy ao anaty afo!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aoka ny olo-mahay vava tsy honina amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olon-dozabe hoenjehin’antambo ka tsy hamelany!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fantatro, TOMPO ô, fa hotandrovinao ny zon’ny ory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamoahanao fitsarana ara-drariny ny mahantra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Eny tokoa, ny olo-marina hisaotra Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny olo-mahitsy hitoetra eo anoloanao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: TOMPO ô, vonjeo ho afaka amin’ny olon-dratsy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary arovy tsy ho azon’ny olon-dozabe
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: izay misaina haratsiana ao am-pony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manangana ady isan’andro vaky.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Toa mandrani-dela hanindrona tahaka ny bibilava ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa poizi-menarana ny teny avoakan’ny vavany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '140.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 3.13.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: TOMPO ô, ambeno tsy ho voatanan’ny olon-dratsy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arovy tsy ho azon’ny olon-dozabe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nihevitra handronjina sy hamotraka ahy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Efa nanafim-pandrika hamelezana ahy ny mpiavonavona:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nanenjan-tady sy harato teo amoron-dalana ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nametraka tadivavarana mba hahazoany ahy.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hoy kosa aho tamin’ny TOMPO: «Ianao no Andriamanitro.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, mba henoy izany feoko mitaraina aminao!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ry TOMPO Andriamanitra Mpamonjy mahery ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nosaronanao ny lohako tamin’ny andro niadiana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: TOMPO ô, aza tovinao izay irîn’ny olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza avela hahomby ny fikasany!»
  - type: usfm
    marker: qr
    children:
    - type: text
      text: Fiatoana
