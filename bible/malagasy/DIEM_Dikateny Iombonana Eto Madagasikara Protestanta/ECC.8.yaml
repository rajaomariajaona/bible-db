segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsy misy olona tena hendry ary tsy misy koa mahafantatra ny tena dikan-javatra. Kanefa ny fahendren’ny olona manazava ny tarehiny ary manalefaka ny endriny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahendrena ny manaiky ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tandremo ny baikon’ny mpanjaka. Efa nianiana taminy teo anatrehan’Andriamanitra ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka aoka tsy halaky hiendaka aminy. Aoka tsy hikiry amin’ny zavatra ratsy ianao, fa azon’ny mpanjaka atao avokoa izay sitrany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy refesi-mandidy ny teniny ary tsy misy olona afaka manontany azy ny anton’ny zavatra ataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay mitandrina ny didin’ny mpanjaka tsy idiran-doza na inona na inona. Nefa fantatry ny hendry fa hisy fotoam-pitsarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny, ny asa rehetra dia hisy fotoam-pitsarana azy, satria lehibe ny faharatsian’ny olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fa mitambesatra aok’izany amin’ny olona ny loza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy fantany akory izay zavatra ho avy. Iza no hampahafantatra azy ny ho fitrangan’izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy misy olona manam-pahefana hitazona ny ainy ary tsy misy olona afaka hampihemotra ny andro hahafatesany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny teny nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety ho '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fofon’aina mahavelona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', na koa ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rivotra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy manam-pahefana hahatan-drivotra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Rehefa tonga ny ady, dia tsy misy hevitra hialana aminy; ary ny ratsy fanahy tsy ho voaavotry ny faharatsiany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fieritreretana momba ny toetran’ny olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Efa voajeriko tsara avokoa izay rehetra miseho eto ambonin’ny tany; misy fotoana izay anjakazakan’ny olona amin’ny namany, ka ampahorìny azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hitako ny nandevenana olon-dratsy. Ireo olona ireo dia mpandeha ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: '; kanefa nohadinoina tao Jerosalema ny fitondrantenany. Zava-poana koa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa tsy tanterahina eo no ho eo akory ny famaliana ny ratsy atao; dia izany no ikirizan’ny olona hanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mety ho mpanao ratsy an-jatony ny mpanota iray, kanefa dia ela velona ihany. Fantatro kosa ny hoe: «Izay manaja an’Andriamanitra ihany no ho sambatra, dia ireo manaja Azy tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny olon-dratsy kosa dia tsy ho sambatra. Hiserana toy ny aloka izy ary ho faty tanora satria tsy nanaja an’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'And 12 sy 13: jereo Oha 10.27 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao koa no zava-poana mitranga eto ambonin’ny tany: misy olo-marina iharan’izay tokony ho mendrika ny ataon’olon-dratsy; ary misy olon-dratsy mahazo izay tokony ho mendrika ny ataon’olo-marina. Ka efa voalazako fa zava-poana koa izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha ny amiko, dia deraiko ny fifaliana, satria ny hany fahasambaran’ny olona eto ambonin’ny tany dia ny mihinana sy misotro ary miravoravo. Izany no tokony hanaraka ny asany mandritra ny andro omen’Andriamanitra hiainany etỳ ambonin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.24.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: Tsy niroa fo aho hahalala ny fomba mampahendry ary hitako ireo asa ataon’ny olona etỳ ambonin’ny tany. Tsapako fa na dia misy tsy matory andro tsy matory alina aza ny olona, dia tsy hahatakatra ny fomba fiasan’Andriamanitra amin’ny alalan’ny zava-mitranga eto ambonin’ny tany. Ho reraka hitady ny olona fa tsy hahatakatra; ary na dia milaza ho mahafantatra aza ny olon-kendry, dia tsy hahatakatra izany akory.
