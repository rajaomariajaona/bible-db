document_id: ECC.8,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tsy misy olona tena hendry ary tsy misy koa mahafantatra ny tena dikan-javatra. Kanefa ny fahendren’ny olona manazava ny tarehiny ary manalefaka ny endriny.
  - type: heading
    content: Fahendrena ny manaiky ny mpanjaka
  '10':
  - type: text
    content: Hitako ny nandevenana olon-dratsy. Ireo olona ireo dia mpandeha ao an-
  - type: text
    content: Toeramasina
  - type: text
    content: '; kanefa nohadinoina tao Jerosalema ny fitondrantenany. Zava-poana koa izany. '
  '11':
  - type: text
    content: 'Fa tsy tanterahina eo no ho eo akory ny famaliana ny ratsy atao; dia izany no ikirizan’ny olona hanao ratsy. '
  '12':
  - type: text
    content: 'Mety ho mpanao ratsy an-jatony ny mpanota iray, kanefa dia ela velona ihany. Fantatro kosa ny hoe: «Izay manaja an’Andriamanitra ihany no ho sambatra, dia ireo manaja Azy tokoa. '
  '13':
  - type: text
    content: Ny olon-dratsy kosa dia tsy ho sambatra. Hiserana toy ny aloka izy ary ho faty tanora satria tsy nanaja an’Andriamanitra
  - type: note
    content: 'And 12 sy 13: jereo Oha 10.27 sy nta.'
  - type: text
    content: '.» '
  '14':
  - type: text
    content: 'Izao koa no zava-poana mitranga eto ambonin’ny tany: misy olo-marina iharan’izay tokony ho mendrika ny ataon’olon-dratsy; ary misy olon-dratsy mahazo izay tokony ho mendrika ny ataon’olo-marina. Ka efa voalazako fa zava-poana koa izany.'
  '15':
  - type: text
    content: Raha ny amiko, dia deraiko ny fifaliana, satria ny hany fahasambaran’ny olona eto ambonin’ny tany dia ny mihinana sy misotro ary miravoravo. Izany no tokony hanaraka ny asany mandritra ny andro omen’Andriamanitra hiainany etỳ ambonin’ny tany
  - type: note
    content: Jereo 2.24.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Tsy niroa fo aho hahalala ny fomba mampahendry ary hitako ireo asa ataon’ny olona etỳ ambonin’ny tany. Tsapako fa na dia misy tsy matory andro tsy matory alina aza ny olona, dia tsy hahatakatra ny fomba fiasan’Andriamanitra amin’ny alalan’ny zava-mitranga eto ambonin’ny tany. Ho reraka hitady ny olona fa tsy hahatakatra; ary na dia milaza ho mahafantatra aza ny olon-kendry, dia tsy hahatakatra izany akory.
  '2':
  - type: text
    content: 'Tandremo ny baikon’ny mpanjaka. Efa nianiana taminy teo anatrehan’Andriamanitra ianao, '
  '3':
  - type: text
    content: 'ka aoka tsy halaky hiendaka aminy. Aoka tsy hikiry amin’ny zavatra ratsy ianao, fa azon’ny mpanjaka atao avokoa izay sitrany. '
  '4':
  - type: text
    content: 'Tsy refesi-mandidy ny teniny ary tsy misy olona afaka manontany azy ny anton’ny zavatra ataony. '
  '5':
  - type: text
    content: 'Izay mitandrina ny didin’ny mpanjaka tsy idiran-doza na inona na inona. Nefa fantatry ny hendry fa hisy fotoam-pitsarana. '
  '6':
  - type: text
    content: Eny, ny asa rehetra dia hisy fotoam-pitsarana azy, satria lehibe ny faharatsian’ny olona
  - type: note
    content: Dkt hafa fa mitambesatra aok’izany amin’ny olona ny loza.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Tsy fantany akory izay zavatra ho avy. Iza no hampahafantatra azy ny ho fitrangan’izany? '
  '8':
  - type: text
    content: Tsy misy olona manam-pahefana hitazona ny ainy ary tsy misy olona afaka hampihemotra ny andro hahafatesany
  - type: note
    content: Ny teny nadika hoe aina dia mety ho fofon’aina mahavelona, na koa ny rivotra; dkt hafa tsy manam-pahefana hahatan-drivotra.
  - type: text
    content: . Rehefa tonga ny ady, dia tsy misy hevitra hialana aminy; ary ny ratsy fanahy tsy ho voaavotry ny faharatsiany.
  - type: heading
    content: Fieritreretana momba ny toetran’ny olona
  '9':
  - type: text
    content: 'Efa voajeriko tsara avokoa izay rehetra miseho eto ambonin’ny tany; misy fotoana izay anjakazakan’ny olona amin’ny namany, ka ampahorìny azy. '
