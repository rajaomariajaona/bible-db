document_id: HOS.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay andro lehiben’i Jizrehèla
  - type: text
    content: Kanefa, indray andro any,
  - type: text
    content: ny isan’ny Israelita
  - type: text
    content: dia ho marobe tsy tambo isaina
  - type: text
    content: toy ny fasika amin’ny ranomasina.
  - type: text
    content: Ary eo amin’ny toerana
  - type: text
    content: 'izay nilazana taminy hoe:'
  - type: text
    content: «Tsy vahoakako ianareo»,
  - type: text
    content: 'no hanambaràna aminy kosa hoe:'
  - type: text
    content: «Zanak’ilay Andriamanitra velona
  - type: note
    content: Amin’ny edisiona sasany ny 2.1 sy 2.2 dia alahatra ho 1.10 sy 1.11; toy izany koa ny 2.3-25 dia lasa 2.1-23. –Ny fiafaran’ny andininy dia voalaza ao amin’ny Rom.9.26.
  - type: text
    content: ».
  '10':
  - type: text
    content: Saingy tsy fantany fa Izaho no nanome azy
  - type: text
    content: vary sy divay ary menaka vao
  - type: text
    content: sady nampanankarena azy
  - type: text
    content: volafotsy sy volamena
  - type: text
    content: 'izay nampiasainy ho an’i '
  - type: text
    content: Bahala
  - type: text
    content: .
  '11':
  - type: text
    content: Koa halaiko aminy indray
  - type: text
    content: ny variko raha fararano,
  - type: text
    content: ary ny divaiko amin’ny fotoam-piotazana.
  - type: text
    content: Hoesoriko aminy ny volon’ondriko
  - type: text
    content: sy ny kiran-drongoniko
  - type: text
    content: izay nanaronany ny fitanjahany.
  '12':
  - type: text
    content: Ankehitriny no hampitanjahako azy
  - type: text
    content: eo imason’ireo lehilahy sakaizany,
  - type: text
    content: ka tsy hisy hahafaka azy
  - type: text
    content: amin’izany famaizako izany.
  '13':
  - type: text
    content: Hatsahatro ny fifaliany rehetra,
  - type: text
    content: dia ireo fety fanaony isan-taona,
  - type: text
    content: 'ireo voaloham-bolany sy ireo '
  - type: text
    content: sabatany
  - type: text
    content: ary ireo fety hafa fankalàzany.
  '14':
  - type: text
    content: Hosimbako ny voalobony sy ny aviaviny
  - type: text
    content: 'izay nataony hoe: «Izany no karama'
  - type: text
    content: nomen’ny lehilahy sakaizako ahy.»
  - type: text
    content: Hovako ho kirihitr’ala ireny
  - type: text
    content: ka hataon’ny bibidia sakafo.
  '15':
  - type: text
    content: Hofaiziko izy noho ireo andro
  - type: text
    content: 'nandoroany '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' mifangaro'
  - type: text
    content: 'ho an’ireo Bahala isan-karazany:'
  - type: text
    content: niravaka peratra sy firavaka izy,
  - type: text
    content: ka nanaraka ireo lehilahy sakaizany;
  - type: text
    content: fa Izaho TOMPO kosa nohadinoiny,
  - type: text
    content: hoy ny teny hentitra ambarako.
  '16':
  - type: text
    content: Koa Izaho no hitaona azy indray
  - type: text
    content: sy hitondra azy ho any an-taniefitra
  - type: text
    content: ary hanao teny manohina ny fony.
  '17':
  - type: text
    content: Avy any no hamerenako aminy
  - type: text
    content: ny tanimboalobony;
  - type: text
    content: ary ho tonga varavaram-panantenana
  - type: text
    content: ny lohasahan’i Hakôra
  - type: note
    content: 'Hakôra (anarana miantso loza): jereo Jos 7.24 sy nta; 15.7.'
  - type: text
    content: .
  - type: text
    content: Any no hamaliany Ahy an-kira
  - type: text
    content: toy ny tamin’ny androm-pahatanorany,
  - type: text
    content: dia tamin’ny andro niakarany
  - type: text
    content: niala avy tany Ejipta.
  - type: heading
    content: Ny andro ifampihavanana
  '18':
  - type: text
    content: Rehefa mby amin’izany andro izany,
  - type: text
    content: hoy ny teny hentitry ny TOMPO,
  - type: text
    content: ilay Israely reninareo
  - type: text
    content: dia hiantso Ahy hoe «vadiko»
  - type: text
    content: fa tsy hoe «
  - type: text
    content: Bahalako
  - type: text
    content: ' na tompoko» intsony.'
  '19':
  - type: text
    content: Tsy havelako hotononiny
  - type: text
    content: ny anaran’ireo Bahala
  - type: text
    content: ka tsy hotsaroana mbamin’ny anarany.
  '2':
  - type: text
    content: Dia hiray hina ny taranak’i Joda
  - type: text
    content: 'sy ny taranak’i '
  - type: text
    content: Israely
  - type: text
    content: ka hifidy filoha tokana
  - type: text
    content: 'ary hanenika ny taniny:'
  - type: text
    content: fa ho lehibe ny andron’i Jizrehèla.
  '20':
  - type: text
    content: Koa amin’izany andro izany,
  - type: text
    content: dia hanao fanekempihavanana
  - type: text
    content: ho an’ny vahoakako Aho,
  - type: text
    content: dia amin’ny biby eny an-tsaha,
  - type: text
    content: amin’ny voromanidina, amin’ny biby mandady;
  - type: text
    content: hofoanako tsy hisy amin’ny tany intsony
  - type: text
    content: ny tsipîka sy ny sabatra ary ny ady,
  - type: text
    content: ka dia hataoko mandry feizay ny mponiny.
  '21':
  - type: text
    content: Hofofoiko ho vadiko mandrakizay ianao, ry Israely;
  - type: text
    content: hofofoiko ho vadiko amin’ny rariny sy ny hitsiny,
  - type: text
    content: ary amin’ny fitiavana sy ny indrafo.
  '22':
  - type: text
    content: Hofofoiko ho vadiko amin’ny fahamarinana ianao
  - type: text
    content: ka hiaiky Ahy ho TOMPO.
  '23':
  - type: text
    content: Rehefa mby amin’izany andro izany,
  - type: text
    content: dia ho TOMPO hamaly izay ilaina Aho,
  - type: text
    content: 'hoy ny teny hentitra ambarako:'
  - type: text
    content: Izaho no hamaly izay ilain’ny lanitra;
  - type: text
    content: ny lanitra hamaly izay ilain’ny tany
  - type: note
    content: Mba handefasana ny orana amin’ny tany, dia mila mandray izany avy amin’Andriamanitra ny lanitra.
  - type: text
    content: ','
  '24':
  - type: text
    content: ny tany hamaly izay ilain’ny vary
  - type: text
    content: aman-divay sy menaka vao;
  - type: text
    content: ary ireo kosa hamaly an’i Jizrehèla.
  '25':
  - type: text
    content: Eo amin’io tany io i Jizrehèla,
  - type: text
    content: no hataoko miorim-ponenana;
  - type: text
    content: ho tiako i Lô-Rohamà
  - type: text
    content: ary i Lô-Hamỳ hitenenako hoe
  - type: note
    content: Jereo koa 1.6-9. –And voalaza ao amin’ny Rom 9.25; ampit 1Pt 2.10.
  - type: text
    content: ':'
  - type: text
    content: «Vahoakako ianao»;
  - type: text
    content: 'ary izy kosa hamaly Ahy hoe:'
  - type: text
    content: «Andriamanitro Ianao».
  '3':
  - type: text
    content: Ny mpiray firenena aminareo
  - type: text
    content: 'raha lehilahy, dia ilazao hoe: «Hamỳ»'
  - type: text
    content: 'ary raha vehivavy, dia ilazao hoe: «Rôhamà'
  - type: note
    content: 'amin’ny mpiray firenena: tsy ny Israelita tavaratra ihany (and 1) fa ny Jodeanina koa (and 2).'
  - type: text
    content: ».
  - type: heading
    content: I Israely, vady tsy mahatoky
  '4':
  - type: text
    content: Miampangà an’i Israely reninareo;
  - type: text
    content: eny, miampangà azy, hoy Izaho TOMPO,
  - type: text
    content: fa izy tsy vadiko intsony
  - type: text
    content: ary Izaho tsy vadiny intsony.
  - type: text
    content: Aoka hoesoriny hiala amin’ny tavany
  - type: text
    content: ny mariky ny fivarotan-tenany
  - type: text
    content: ary hoesoriny tsy ho eo an-tratrany
  - type: text
    content: ny famantaram-panitsakitsaham-bady
  - type: note
    content: Ny fanompoan-tsampin’i Israely dia oharina amin’ny fivarotan-tena ary ny fivadihany amin’ny fanitsakitsaham-bady. Jereo 1.2 sy nta, ary ampit amin’ny Jer 2.20; 3.1; 5.7; 13.27 sns.
  - type: text
    content: '!'
  '5':
  - type: text
    content: Fandrao hampitanjahiko izy
  - type: text
    content: ka hampihanjahanjaiko
  - type: text
    content: toy ny tamin’ny andro nahaterahany.
  - type: text
    content: Hovako toy ny taniefitra
  - type: text
    content: sy toy ny tany karankaina izy,
  - type: text
    content: ary hataoko matin-ketaheta.
  '6':
  - type: text
    content: Tsy ho tia ireo zanany Aho
  - type: text
    content: satria zanaky ny fivarotan-tena ireny
  - type: note
    content: Jereo 1.2 sy nta.
  - type: text
    content: .
  '7':
  - type: text
    content: Eny, efa nivaro-tena ny reniny;
  - type: text
    content: ilay torontoronina azy ireo
  - type: text
    content: 'efa lany henatra rehefa nanao hoe:'
  - type: text
    content: «Hanaraka ireo lehilahy sakaizako aho,
  - type: text
    content: dia ny mpanome mofo sy rano ahy
  - type: text
    content: ary koa volon’ondry sy kiran-drongony
  - type: text
    content: mbamin’ny menaka sy zava-pisotro.»
  '8':
  - type: text
    content: Noho izany, Izaho TOMPO
  - type: text
    content: hamefy tsilo ny lalany
  - type: text
    content: ka hanampina izany;
  - type: text
    content: ary tsy hahita izay halehany izy.
  '9':
  - type: text
    content: Na dia hiezaka hanenjika
  - type: text
    content: ireo lehilahy sakaizany aza izy,
  - type: text
    content: dia tsy hahatratra azy akory;
  - type: text
    content: hitady ireo izy nefa tsy hahita,
  - type: text
    content: 'ka hiteny anakampo hoe:'
  - type: text
    content: «Ndeha hody amin’ny vadiko voalohany aho,
  - type: text
    content: fa niadana kokoa aho tamin’izay
  - type: text
    content: noho ny ankehitriny.»
