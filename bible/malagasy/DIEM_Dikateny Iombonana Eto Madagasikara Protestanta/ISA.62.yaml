document_id: ISA.62,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay Jerosalema vaovao
  - type: text
    content: 'Tsy hangina aho noho ny fitiavako anao, ry '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ô,'
  - type: text
    content: ary tsy hitsaha-miteny aho noho ny fitiavako anao, ry Jerosalema,
  - type: text
    content: mandra-piposaky ny fanafahana anao
  - type: text
    content: ho tahaka ny masoandro mamiratra,
  - type: text
    content: ary mandra-pibaliaky ny famonjena anao
  - type: text
    content: ho tahaka ny fanilo mirehitra.
  '10':
  - type: text
    content: Ry mponin’i Jerosalema, mivoaha tao an-tanàna,
  - type: text
    content: mivoaha amin’ny vavahady,
  - type: text
    content: anokafy lalana ny vahoaka mody,
  - type: text
    content: ataovy mitovy tantana ny arabe
  - type: text
    content: ka esory ny vato eo aminy
  - type: text
    content: ary atsangano ny faneva hanaingana ireo firenena.
  '11':
  - type: text
    content: Injay nisy baiko nampitain’ny TOMPO
  - type: text
    content: hatrany amin’ny faran’ny tany!
  - type: text
    content: 'Koa lazao amin’ny olona ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' hoe:'
  - type: text
    content: «Indro tonga ny Mpamonjinareo,
  - type: text
    content: indro entiny miaraka aminy ny karama azony
  - type: text
    content: ary eo anoloany ny valin-kasasarany
  - type: note
    content: Jereo 40.10 sy nta; ampit Apôk 22.12.
  - type: text
    content: .»
  '12':
  - type: text
    content: Ny besinimaro, na ianareo na iretsy,
  - type: text
    content: dia hantsoina hoe «ilay vahoaka masina»,
  - type: text
    content: «ireo olona navotan’ny TOMPO»;
  - type: text
    content: 'ary ianao, ry Jerosalema, dia hatao hoe:'
  - type: text
    content: «ilay irîna», «ilay tanàna tsy foy.»
  '2':
  - type: text
    content: Ny firenen-kafa hahita ny fanafahan’ny Tompo anao
  - type: text
    content: ary ny mpanjaka rehetra hahita ny voninahitrao;
  - type: text
    content: anarana vaovao
  - type: note
    content: 'anarana vaovao: jereo Is 65.15; Apôk 2.17; 3.12.'
  - type: text
    content: ' no hiantsoana anao,'
  - type: text
    content: dia izay hotononin’ny vavan’ny TOMPO.
  '3':
  - type: text
    content: Eo an-tanan’ny TOMPO Andriamanitra
  - type: text
    content: dia ho tonga satroboninahitra mamirapiratra
  - type: text
    content: sy hanjary diademan’ny mpanjaka ianao.
  '4':
  - type: text
    content: Ianao tsy hatao intsony hoe «ilay tanàna nafoy»
  - type: text
    content: ary ny taninao tsy hatao intsony hoe «ilay tany lao»;
  - type: text
    content: fa ianao dia hantsoina hoe «ilay sitraky ny TOMPO»,
  - type: text
    content: ary ny taninao hatao hoe «ilay vady ampakarina.»
  - type: text
    content: Satria ho sitraky ny Tompo ianao
  - type: text
    content: ary ny taninao hanana vady mpampakatra.
  '5':
  - type: text
    content: Tahaka ny tovolahy mampakatra virijiny ho vady,
  - type: text
    content: dia hampakatra anao toy izany koa
  - type: text
    content: ilay Mpanorina anao, ry Jerosalema;
  - type: text
    content: ary tahaka ny fifalian’ny mpampakatra
  - type: text
    content: amin’ny tovovavy ampakariny
  - type: text
    content: no hifalian’ilay Andriamanitrao aminao.
  '6':
  - type: text
    content: Ry Jerosalema ô, efa nametrahako mpiambina
  - type: text
    content: eny ambonin’ny mandanao eny,
  - type: text
    content: 'ka tsy mahazo mangina ireo na andro na alina:'
  - type: text
    content: «Ianareo izay mampahatsiaro ny TOMPO,
  - type: text
    content: aza mitsaha-manao izany ianareo!
  '7':
  - type: text
    content: Aza avela hitsahatra Izy
  - type: text
    content: mandra-panarenany azy indray
  - type: text
    content: ka hametrahany an’i Jerosalema
  - type: text
    content: ho voninahitra manerana ny tany.»
  '8':
  - type: text
    content: 'Dia nataon’ny TOMPO izao fianianana izao:'
  - type: text
    content: «Araka ny hery amam-pahefana feno ananako,
  - type: text
    content: dia mianiana aminao Aho, ry vahoakako,
  - type: text
    content: fa tsy hamela ny vary novolenao
  - type: text
    content: ho sakafon’ny fahavalonao intsony,
  - type: text
    content: ary tsy hamela ny divay nisasaranao
  - type: text
    content: hosotroin’ny vahiny intsony;
  '9':
  - type: text
    content: fa izay mijinja ny vary ihany
  - type: text
    content: no hihinana azy ka hidera Ahy TOMPO,
  - type: text
    content: ary izay nioty ny voaloboka ihany
  - type: text
    content: 'no hisotro ny divay eo an-kianjan’ny '
  - type: text
    content: tempoliko
  - type: text
    content: .»
