document_id: ISA.62,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay Jerosalema vaovao
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tsy hangina aho noho ny fitiavako anao, ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hitsaha-miteny aho noho ny fitiavako anao, ry Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-piposaky ny fanafahana anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny masoandro mamiratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandra-pibaliaky ny famonjena anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny fanilo mirehitra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ry mponin’i Jerosalema, mivoaha tao an-tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mivoaha amin’ny vavahady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anokafy lalana ny vahoaka mody,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy mitovy tantana ny arabe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka esory ny vato eo aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary atsangano ny faneva hanaingana ireo firenena.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Injay nisy baiko nampitain’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny faran’ny tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa lazao amin’ny olona ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro tonga ny Mpamonjinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro entiny miaraka aminy ny karama azony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eo anoloany ny valin-kasasarany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 40.10 sy nta; ampit Apôk 22.12.
      marker-yv: yv-n
    - type: text
      text: .»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny besinimaro, na ianareo na iretsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hantsoina hoe «ilay vahoaka masina»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «ireo olona navotan’ny TOMPO»;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ianao, ry Jerosalema, dia hatao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «ilay irîna», «ilay tanàna tsy foy.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny firenen-kafa hahita ny fanafahan’ny Tompo anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanjaka rehetra hahita ny voninahitrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anarana vaovao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'anarana vaovao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Is 65.15; Apôk 2.17; 3.12.
      marker-yv: yv-n
    - type: text
      text: ' no hiantsoana anao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay hotononin’ny vavan’ny TOMPO.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eo an-tanan’ny TOMPO Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho tonga satroboninahitra mamirapiratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanjary diademan’ny mpanjaka ianao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ianao tsy hatao intsony hoe «ilay tanàna nafoy»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taninao tsy hatao intsony hoe «ilay tany lao»;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianao dia hantsoina hoe «ilay sitraky ny TOMPO»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taninao hatao hoe «ilay vady ampakarina.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ho sitraky ny Tompo ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taninao hanana vady mpampakatra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tahaka ny tovolahy mampakatra virijiny ho vady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampakatra anao toy izany koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Mpanorina anao, ry Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny fifalian’ny mpampakatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny tovovavy ampakariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hifalian’ilay Andriamanitrao aminao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ry Jerosalema ô, efa nametrahako mpiambina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny ambonin’ny mandanao eny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka tsy mahazo mangina ireo na andro na alina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianareo izay mampahatsiaro ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mitsaha-manao izany ianareo!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aza avela hitsahatra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-panarenany azy indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hametrahany an’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho voninahitra manerana ny tany.»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nataon’ny TOMPO izao fianianana izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Araka ny hery amam-pahefana feno ananako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mianiana aminao Aho, ry vahoakako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hamela ny vary novolenao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho sakafon’ny fahavalonao intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hamela ny divay nisasaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hosotroin’ny vahiny intsony;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: fa izay mijinja ny vary ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hihinana azy ka hidera Ahy TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay nioty ny voaloboka ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no hisotro ny divay eo an-kianjan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoliko
    - type: text
      text: .»
