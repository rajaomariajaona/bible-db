document_id: LEV.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: NY FAHAMASINANA TAKINA AMIN’NY ISRAELITA
  - type: heading
    content: Fepetra momba ny ra
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: '«Na iza na iza, Israelita na vahiny valovotaka eo aminy, mihinana ram-biby, na biby inona na biby inona, dia hohandriniko izany olona izany, ka hofongorako tsy ho anisan’ny vahoaka israelita. '
  '11':
  - type: text
    content: Fa ny ain’ny zavaboaary mana-nofo manko dia ao amin’ny ra; ary navelako hampiasaina eo amin’ny alitara izany mba hahazoana famelan-keloka ho anareo, satria amin’ny maha aina azy no ampiasana ny ra hahazoana famelan-keloka
  - type: note
    content: 'Ny rijan-teny hebreo, eto amin’ity and ity, dia manjavozavo ka tsy azo antoka ny dkt. –hahazoana famelan-keloka: jereo Heb 9.22.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Koa izany no nilazako tamin’ny Israelita hoe: ‹Aza misy mihinan-dra, na ianareo na ny vahiny valovotaka eo aminareo›.'
  '13':
  - type: text
    content: '«Na iza na iza, Israelita na vahiny valovotaka eo aminy, mihaza ka mahazo biby na vorona fihinana, dia hararany amin’ny tany ny rany ka hototofany vovoka. '
  '14':
  - type: text
    content: 'Ny ain’ny zavaboaary rehetra mana-nofo manko dia ny ra izay ao aminy. Koa izany no nilazako tamin’ny Israelita hoe: ‹Aza mihinana ny ran’ny zavaboaary mana-nofo, satria ny rany no ainy; ka izay rehetra mihinana azy dia hofongorana tsy ho anisan’ny vahoaka israelita'
  - type: note
    content: 'And 10-14: jereo 7.26-27; Gen 9.4; Deot 12.16, 23; 15.23.'
  - type: text
    content: ›.
  '15':
  - type: text
    content: '«Na iza na iza, Israelita tompontany na vahiny valovotaka, mihinana biby maty ho azy na voaviravira, dia hanasa fitafiana sy handro sady '
  - type: text
    content: haloto
  - type: text
    content: ' mandra-paharivan’ny andro izy, vao hadio indray. '
  '16':
  - type: text
    content: Fa raha tsy manasa fitafiana sy mandro izy, dia itambesaran-keloka.»
  '2':
  - type: text
    content: 'mba hamepetra an’i Aharôna sy ny zanany ary ny Israelita hoe:'
  - type: text
    content: '«Izao no zavatra nandidian’ny TOMPO: '
  '3':
  - type: text
    content: 'Na iza na iza Israelita mamono omby na ondry na osy, ao anatin’ny toby any ivelan’ny toby, '
  '4':
  - type: text
    content: 'dia tsy maintsy mitondra azy ho eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' mba hanolorana azy ho fanatitra ho an’ny TOMPO eo anoloan’ny fonena-masin’ny TOMPO. Raha tsy izany no ataony, dia ho meloka ny amin’ny ram-biby nalatsany izy, ka hofongorana tsy ho anisan’ny vahoaka israelita. '
  '5':
  - type: text
    content: 'Amin’izay, dia tsy ho eny an-tsaha intsony no hamonoan’ny Israelita ny biby vonoiny; fa an’ny TOMPO ireny biby ireny ka dia hoentin’ny Israelita ho amin’ny mpisorona, eo anoloan’ny varavaran’ny Tranolay fihaonana, mba hatolotra ho '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' amin’ny TOMPO. '
  '6':
  - type: text
    content: 'Ilay mpisorona kosa hamafy ny ran’ilay biby eo amin’ilay '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO, eo anoloan’ny varavaran’ny Tranolay fihaonana, ary handoro ny jaborany hanetona ho hanitra ankasitrahina ho an’ny TOMPO. '
  '7':
  - type: text
    content: Ny sorona fanaon’ny Israelita dia tsy hatolony intsony ho an’ny fanahy ratsy miendrika osilahy, izay nanaovany fanompoan-tsampy. Lalàna raikitra ho azy ireo hatrany hatrany izany.
  '8':
  - type: text
    content: '«Na iza na iza, Israelita na vahiny valovotaka eo aminy, manolotra biby hatao sorona dorana manontolo na sorona hafa, '
  '9':
  - type: text
    content: ka tsy mitondra azy eo anoloan’ny varavaran’ny Tranolay fihaonana mba hatolotra ho an’ny TOMPO, dia hofongorana tsy ho anisan’ny vahoaka israelita izy.
