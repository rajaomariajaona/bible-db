document_id: LEV.17
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: NY FAHAMASINANA TAKINA AMIN’NY ISRAELITA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fepetra momba ny ra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hamepetra an’i Aharôna sy ny zanany ary ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Izao no zavatra nandidian’ny TOMPO: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Na iza na iza Israelita mamono omby na ondry na osy, ao anatin’ny toby any ivelan’ny toby, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia tsy maintsy mitondra azy ho eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' mba hanolorana azy ho fanatitra ho an’ny TOMPO eo anoloan’ny fonena-masin’ny TOMPO. Raha tsy izany no ataony, dia ho meloka ny amin’ny ram-biby nalatsany izy, ka hofongorana tsy ho anisan’ny vahoaka israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Amin’izay, dia tsy ho eny an-tsaha intsony no hamonoan’ny Israelita ny biby vonoiny; fa an’ny TOMPO ireny biby ireny ka dia hoentin’ny Israelita ho amin’ny mpisorona, eo anoloan’ny varavaran’ny Tranolay fihaonana, mba hatolotra ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorom-pihavanana
  - type: text
    text: ' amin’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ilay mpisorona kosa hamafy ny ran’ilay biby eo amin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: 'n’ny TOMPO, eo anoloan’ny varavaran’ny Tranolay fihaonana, ary handoro ny jaborany hanetona ho hanitra ankasitrahina ho an’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny sorona fanaon’ny Israelita dia tsy hatolony intsony ho an’ny fanahy ratsy miendrika osilahy, izay nanaovany fanompoan-tsampy. Lalàna raikitra ho azy ireo hatrany hatrany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Na iza na iza, Israelita na vahiny valovotaka eo aminy, manolotra biby hatao sorona dorana manontolo na sorona hafa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ka tsy mitondra azy eo anoloan’ny varavaran’ny Tranolay fihaonana mba hatolotra ho an’ny TOMPO, dia hofongorana tsy ho anisan’ny vahoaka israelita izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Na iza na iza, Israelita na vahiny valovotaka eo aminy, mihinana ram-biby, na biby inona na biby inona, dia hohandriniko izany olona izany, ka hofongorako tsy ho anisan’ny vahoaka israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny ain’ny zavaboaary mana-nofo manko dia ao amin’ny ra; ary navelako hampiasaina eo amin’ny alitara izany mba hahazoana famelan-keloka ho anareo, satria amin’ny maha aina azy no ampiasana ny ra hahazoana famelan-keloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny rijan-teny hebreo, eto amin’ity and ity, dia manjavozavo ka tsy azo antoka ny dkt. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –hahazoana famelan-keloka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Heb 9.22.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa izany no nilazako tamin’ny Israelita hoe: ‹Aza misy mihinan-dra, na ianareo na ny vahiny valovotaka eo aminareo›.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Na iza na iza, Israelita na vahiny valovotaka eo aminy, mihaza ka mahazo biby na vorona fihinana, dia hararany amin’ny tany ny rany ka hototofany vovoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny ain’ny zavaboaary rehetra mana-nofo manko dia ny ra izay ao aminy. Koa izany no nilazako tamin’ny Israelita hoe: ‹Aza mihinana ny ran’ny zavaboaary mana-nofo, satria ny rany no ainy; ka izay rehetra mihinana azy dia hofongorana tsy ho anisan’ny vahoaka israelita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 10-14:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 7.26-27; Gen 9.4; Deot 12.16, 23; 15.23.'
    marker-yv: yv-n
  - type: text
    text: ›.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Na iza na iza, Israelita tompontany na vahiny valovotaka, mihinana biby maty ho azy na voaviravira, dia hanasa fitafiana sy handro sady '
  - type: usfm
    marker: w
    children:
    - type: text
      text: haloto
  - type: text
    text: ' mandra-paharivan’ny andro izy, vao hadio indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha tsy manasa fitafiana sy mandro izy, dia itambesaran-keloka.»
