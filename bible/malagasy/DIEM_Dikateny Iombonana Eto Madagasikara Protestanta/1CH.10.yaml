document_id: 1CH.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: TANTARAN’I DAVIDA, MPANJAKAN’I ISRAELY
  - type: heading
    content: Ny nahafatesan’i Saoly
  - type: heading
    content: (Jereo 1 Sam 31.1-13)
  - type: text
    content: Ary niady tamin’i Israely ny Filistinina; dia nandositra azy ny Israelita ka faty maro no nitsitsitra teny an-tendrombohitra Gilbôa
  - type: note
    content: 'an-tendrombohitra Gilbôa: jereo 1 Sam 28.4 sy nta.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Avy eo dia napetrany tao an-tempolin’ilay andriamaniny anankiray ny fitaovam-piadian’i Saoly; ary ny karandohany nohomboany tao amin’ny tempolin’i Dagôna.
  '11':
  - type: text
    content: Rehefa ren’ny mponina rehetra tao Jabesy-Gilehada
  - type: note
    content: 'Jabesy any Gilehada: jereo 1 Sam 31.11 sy nta.'
  - type: text
    content: ' avokoa ny nataon’ny Filistinina tamin’i Saoly, '
  '12':
  - type: text
    content: 'dia niainga ny lehilahy maherifo rehetra naka ny fatin’i Saoly sy ny fatin-janany, ka nitondra azy ho any Jabesy. Ny taolambalony dia naleviny teo am-pototr’ilay hazo terebinta tao Jabesy; ary '
  - type: text
    content: nifady hanina
  - type: text
    content: ' nandritra ny fito andro ny olona mba ho fisaonana.'
  '13':
  - type: text
    content: 'Eny, maty i Saoly noho ny fivadihany tamin’ny TOMPO: tsy nitandrina ny tenin’ny TOMPO manko izy, ary koa nanontany ny fanahin’ny maty tamin’ny mpamoha angatra'
  - type: note
    content: 'nanontany... mpamoha angatra: jereo 1 Sam 13.8-14; 15.1-24; 28. Ampit Lev 19.31; 20.6.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: fa tsy nanontany ny TOMPO; ka dia nampamonoiny ho faty izy ary nafindrany tamin’i Davida, zanakalahin’i Jisay, ny fanjakana.
  '2':
  - type: text
    content: 'Nilofo nanenjika an’i Saoly sy ireo zanany lahy ny Filistinina, ka nahafaty an’i Jônatàna sy i Abinadaba ary i Melkisa izay samy zanakalahin’i Saoly. '
  '3':
  - type: text
    content: 'Nanindry an’i Saoly ny fanafihana, ka sendra ny mpandefa tsipîka izy ary dia natahotra azy. '
  '4':
  - type: text
    content: 'Dia hoy i Saoly tamin’ilay mpitondra ny fitaovam-piadiany:'
  - type: text
    content: –Raiso ny sabatrao, ka trobaro aho, fandrao ho avy ireo mpanompo sampy ireo ka hanao ahy ho fihomehezana.
  - type: text
    content: 'Fa tsy nanaiky ilay mpitondra ny fitaovam-piadiany satria natahotra mafy. Koa nalain’i Saoly ny sabatra, dia nianjerany. '
  '5':
  - type: text
    content: Ary rehefa hitan’ilay mpitondra ny fitaovam-piadiany fa maty i Saoly, dia mba nianjerany koa ny sabany ka maty
  - type: note
    content: 'ka maty: ny 1 Sam 31.5 sy ny dkt siriaka dia miampy kely ka manao hoe ka maty niaraka taminy.'
  - type: text
    content: izy.
  '6':
  - type: text
    content: 'Dia maty i Saoly ary niara-maty taminy koa ny zanany telo lahy sy ny ankohonany manontolo. '
  '7':
  - type: text
    content: Rehefa hitan’ny Israelita rehetra izay nonina tao an-dohasaha
  - type: note
    content: 'an-dohasaha: jereo ny 1 Sam 31.7 sy nta.'
  - type: text
    content: ' fa nandositra ny tafik’i Israely sady maty i Saoly sy ny zanany, dia nandao tanàna izy ka nandositra. Tonga kosa ny Filistinina ka nipetraka tao.'
  '8':
  - type: text
    content: 'Ny ampitso, nony tonga ny Filistinina haka ny zavatra teo amin’ny faty, dia nahita an’i Saoly sy ny zanany nitsitra teo an-tendrombohitra Gilbôa. '
  '9':
  - type: text
    content: 'Dia nendahany i Saoly ary nentiny ny lohany sy ny fiadiany, ka nalefany hitety ny tanin’ny Filistinina hanambaràna izany vaovao izany amin’ny sampiny sy amin’ny vahoaka. '
