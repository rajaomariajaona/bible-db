document_id: 1CH.10,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: TANTARAN’I DAVIDA, MPANJAKAN’I ISRAELY
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Saoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Sam 31.1-13)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niady tamin’i Israely ny Filistinina; dia nandositra azy ny Israelita ka faty maro no nitsitsitra teny an-tendrombohitra Gilbôa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'an-tendrombohitra Gilbôa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 28.4 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia napetrany tao an-tempolin’ilay andriamaniny anankiray ny fitaovam-piadian’i Saoly; ary ny karandohany nohomboany tao amin’ny tempolin’i Dagôna.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa ren’ny mponina rehetra tao Jabesy-Gilehada
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Jabesy any Gilehada:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 31.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' avokoa ny nataon’ny Filistinina tamin’i Saoly, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niainga ny lehilahy maherifo rehetra naka ny fatin’i Saoly sy ny fatin-janany, ka nitondra azy ho any Jabesy. Ny taolambalony dia naleviny teo am-pototr’ilay hazo terebinta tao Jabesy; ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nifady hanina
    - type: text
      text: ' nandritra ny fito andro ny olona mba ho fisaonana.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, maty i Saoly noho ny fivadihany tamin’ny TOMPO: tsy nitandrina ny tenin’ny TOMPO manko izy, ary koa nanontany ny fanahin’ny maty tamin’ny mpamoha angatra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nanontany... mpamoha angatra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 13.8-14; 15.1-24; 28. Ampit Lev 19.31; 20.6.
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa tsy nanontany ny TOMPO; ka dia nampamonoiny ho faty izy ary nafindrany tamin’i Davida, zanakalahin’i Jisay, ny fanjakana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nilofo nanenjika an’i Saoly sy ireo zanany lahy ny Filistinina, ka nahafaty an’i Jônatàna sy i Abinadaba ary i Melkisa izay samy zanakalahin’i Saoly. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanindry an’i Saoly ny fanafihana, ka sendra ny mpandefa tsipîka izy ary dia natahotra azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Saoly tamin’ilay mpitondra ny fitaovam-piadiany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiso ny sabatrao, ka trobaro aho, fandrao ho avy ireo mpanompo sampy ireo ka hanao ahy ho fihomehezana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy nanaiky ilay mpitondra ny fitaovam-piadiany satria natahotra mafy. Koa nalain’i Saoly ny sabatra, dia nianjerany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa hitan’ilay mpitondra ny fitaovam-piadiany fa maty i Saoly, dia mba nianjerany koa ny sabany ka maty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ka maty: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny 1 Sam 31.5 sy ny dkt siriaka dia miampy kely ka manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ka maty niaraka taminy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia maty i Saoly ary niara-maty taminy koa ny zanany telo lahy sy ny ankohonany manontolo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa hitan’ny Israelita rehetra izay nonina tao an-dohasaha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'an-dohasaha: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny 1 Sam 31.7 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' fa nandositra ny tafik’i Israely sady maty i Saoly sy ny zanany, dia nandao tanàna izy ka nandositra. Tonga kosa ny Filistinina ka nipetraka tao.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampitso, nony tonga ny Filistinina haka ny zavatra teo amin’ny faty, dia nahita an’i Saoly sy ny zanany nitsitra teo an-tendrombohitra Gilbôa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nendahany i Saoly ary nentiny ny lohany sy ny fiadiany, ka nalefany hitety ny tanin’ny Filistinina hanambaràna izany vaovao izany amin’ny sampiny sy amin’ny vahoaka. '
