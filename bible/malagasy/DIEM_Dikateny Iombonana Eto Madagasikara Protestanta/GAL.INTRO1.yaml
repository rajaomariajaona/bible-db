document_id: GAL.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tamin’ny taonjato fahatelo talohan’i Jesoa Kristy, dia nisy andian’olona avy any Gàlia (i Frantsa ankehitriny) nifindra monina hatrany Azia Minôra (i Torkia, faritra any Azia, ankehitriny) ary dia niorim-ponenana tao. Ny taranak’ireo mpifindra monina ireo no antsoina hoe Galatianina ary ny faritany akaikin’ny tanàna Ankiora fahizany (na Ankarà ankehitriny) no nisy azy. Ny sasany tamin’ireo Galatianina ireo dia voataonan’i Paoly hanaiky ny Vaovao Mahafaly, nandritra ny dia faharoa sy fahatelo nitoriany Vaovao Mahafaly (jereo Asa 16.6 sy 18.23).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Kanefa nisy mpamangy hafa tonga taorian’i Paoly ary nampianatra fa ireo kristianina tsy Jiosy fiaviana dia tsy maintsy manaraka ny lalàna jiosy ary indrindra indrindra atao famorana. Amin’i Paoly, izany zavatra takîn-dry zareo amin’ny kristianina tany Galatia izany dia mifanohitra tanteraka amin’ny tena Vaovao Mahafaly momba an’i Jesoa Kristy: ziogam-panandevozana ara-panahy atambesatra eo an-tsorok’ireo kristianina tany Galatia izany. Tokotokony ho tao Efeso i Paoly tamin’izay; ka vantany vao reny fa somary nanaiky ny fampianaran’ireo mpanohitra azy ny kristianina tany Galatia, dia nanoratany taratasy nirehidrehitra tokoa.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Mba hamerenana ireo mpino havany amin’ilay hany Vaovao Mahafaly, dia tolo-kevitra misy dingana telo no aroson’i Paoly:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Tsiahiviny aloha ireo zavatra efa niainanay: dia ny fiovam-pony; ny fanapahan-kevitra noraisin’ireo tompon’andraikitry ny Fiangonana tao Jerosalema (izany hoe, tsy hampanarahina ny lalàna jiosy ny hafa firenena tonga kristianina); ary ny fifanolanany tamin’i Petera apôstôly momba ny fampiharana izany fanapahan-kevitra izany. Arovan’i Paoly ny fahefana maha apôstôly ny tenany, ary antitranteriny fa izany adidy aman’andraikitra izany dia nankinin’ny Tompo taminy (toko 1–2).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Avy eo dia teny nalainy avy amin’ny Test. T. (na Fanekempihavanana Taloha) no ianteheran’i Paoly, ka anazavany fa tsy izay manaraka ny lalàna jiosy no mahazo famonjena fa izay mino an’i Jesoa Kristy (toko 3–4).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ho famaranana ny taratasiny dia manainga sy mandodona mafy an’ireo kristianina tany Galatia i Paoly mba hiaina ao anatin’ny fahafahana tanteraka eo ambany fitarihan’ny Fanahin’Andriamanitra, satria ny Fanahy Maina no mamokatra ao amin’ny olombelona ireo toe-panahy vaovao isan-karazany, ka loha-laharana amin’ireo ny fitiavana (toko 5–6).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tsy maintsy mihaino izany antso fanaingana izany na ny Fiangonana tsirairay avy na ny kristianina tsirairay avy ary koa mankato izany amin’ny fony tokoa mba ho afaka amin’ny fanandevozana sy ny fatorana rehetra mangeja azy.
