document_id: 2KI.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay famaky very nefa hita indray
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indray andro, dia hoy ny andia-
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' tamin’i Elisà tompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indro efa tena èty ho antsika ny toeram-pivoriana iarahanay aminao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary nandefa miaramila hiambina ny toerana voatondron’ilay olon’Andriamanitra ny mpanjakan’i Israely.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Imbetsaka i Elisà no mampitandrina ny mpanjakan’i Israely, koa dia mailo aoka izany izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nampanahy mafy ny mpanjakan’i Siria izany zavatra izany, ka niantso ny manamboninahiny izy ary nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy ambaranareo amiko ve izay mpamadika amintsika ireto ka miasa ho an’ny mpanjakan’i Israely?
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy navalin’ny manamboninahitra iray azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy misy izany mpamadika izany aminay, ry andriamanjaka! Fa i Elisà '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ao amin’i Israely ihany no manambara amin’ny mpanjakany na dia izay teny lazainao ao an’efitrano fandrianao aza.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy ny mpanjakan’i Siria:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha tadiavo izay toerana misy azy mba hahazoako misambotra azy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa nilazana ny mpanjaka fa ao Dôtàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Dôtàna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana sahabo ho 45 km ao avaratr’i Jerosalema, ary 10 km avaratr’i Samaria.
      marker-yv: yv-n
    - type: text
      text: ' i Elisà, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: dia nandefa antoko-miaramila matanjaka miaraka amin’ny soavaly sy kalesy izy; ka tonga alina ireo miaramila ary nanao fahirano ny tanàna.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny ampitso, raha nifoha maraina ny mpanompon’i Elisà ka nivoaka ny tanàna, dia nahita ireo miaramila mbamin’ny soavaly sy kalesy nanodidina ny tanàna, ary niteny tamin’i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Loza ity, tompoko! Ahoana no hataontsika?
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza matahotra fa be lavitra noho ny mpomba azy ny mpomba antsika.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Avy eo i Elisà dia nivavaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –TOMPO ô, sokafy re ny mason’ity mpanompoko ity mba hahitany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nosokafan’ny TOMPO ny mason’ilay mpanompo ka hitany ny tendrombohitra feno soavaly sy kalesy afo manodidina an’i Elisà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2.11.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa raha nidinan’ny miaramila sirianina i Elisà, dia nivavaka indray ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, mba tampeno ny mason’ireo miaramila rehetra ireo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nohajambain’ny TOMPO araka ny tenin’i Elisà ny masony; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary hoy i Elisà tamin’ny miaramila:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy ity no lalana; ary tsy ity koa ny tanàna; fa manaraha ahy ianareo, dia hoentiko any amin’ny olona tadiavinareo ianareo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nentin’i Elisà nankany Samaria ireo. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Koa mba avelao izahay ho any amoron’i Jôrdàna, samy haka hazo iray avy hanaovanay toeram-pivoriana vaovao any.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana àry.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nony tonga tao Samaria avokoa izy, dia mbola nivavaka i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –TOMPO ô, sokafy re ny mason’ireto mba hahitany ankehitriny.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa rehefa nosokafan’ny TOMPO ny masony, dia hitany fa indreo izy teo afovoan’i Samaria.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nony nahita ireo miaramila rehetra ireo ny mpanjakan’i Israely, dia niteny tamin’i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry ikaky, hasiako ho faty ve ireo?
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hoy kosa ny navalin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia! Aza mamely azy. Fanaonao angaha ny mamono ho faty izay nobaboinao tamin’ny sabatra na tamin’ny tsipîka? Koa rosoy mofo sy rano ireo hohaniny sy hosotroiny; ary avelao izy hiverina any amin’ny tompony.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dia nanaovan’ny mpanjaka fanasam-be izy rehetra, ka rehefa avy nihinana sy nisotro, dia nasainy niverina any amin’ny tompony. Natsahatr’ireo Sirianina mpandroba kosa ny fitsofohana amin’ny tanin’i Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mosary tao Samaria
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Taorian’izany dia novorin’i Bena-Hadada mpanjakan’i Siria ny tafiny manontolo mba handeha hanao fahirano an’i Samaria. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nisy mosary lehibe tao Samaria noho izany, ka dia nahatratra sekela valopolo ny vidin’ny loham-boriky iray ary sekela dimy ny taim-boromahailala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'taim-boromahailala: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misy ny mandray izany ara-bakiteny satria fampiasa handrehetana sy hitaizana afo; misy ny mandray izany ho anaran-tsakafo ankafizina mitovitovy amin’ny atao hoe kakà pigeon... na koa mitovitovy amin’ny voanjobory nahodina halemy.
      marker-yv: yv-n
    - type: text
      text: ' roanjato grama.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Indray andro raha nandehandeha teo ambonin’ny manda ny mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ', dia nisy vehivavy iray niantsoantso nitaraina taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba vonjeo aho, ry andriamanjaka ô!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa hoy ny navalin’ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha tsy mamonjy anao ny TOMPO, ahoana kosa no hamonjeko anao? Fa tsy misy intsony tahirim-bary na tahirin-divay.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Kanefa avy eo ny mpanjaka dia niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no manahirana anao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary novalian-dravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hoy io vehivavy io tamiko: «Aiza ny zanakao hohanintsika amin’ity andro ity, fa rahampitso dia ny ahy indray no hohanintsika.» '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia nahandroinay ny zanako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 28.57; Fit 4.10.
      marker-yv: yv-n
    - type: text
      text: ' ka nohaninay; kanjo nony ampitso, rehefa nilazako kosa izy mba hitondra ny zanany hohaninay, dia nafeniny ny azy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa hoy ny mpaminany iray:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Maninona raha mba miaraka aminay any koa ianao, tompoko?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, fa handeha aho.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Raha nandre ny tenin-dravehivavy ny mpanjaka, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra ny fitafiany
    - type: text
      text: ; ary nandehandeha teny ambonin’ny manda izy mba ho hitan’ny olona fa mitafy akanjo gony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tamin’ny fotoan-tsarotra sasany, ny Israelita tranainy dia nitafy lamba malailay na marokoroko manolo-koditra, ho mari-panetren-tena eo anatrehan’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ' manolo-koditra. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia hoy izy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hampiharin’Andriamanitra amiko anie ny famaizana mafy indrindra, raha tàhiny tsy voatapaka anio ny lohan’i Elisà zanakalahin’i Safata.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nambaran’i Elisà ny fiafaran’ny mosary
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Novorin’i Elisà tao an-tranony tamin’izay ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’ny tanàna, ary naniraka olona hankeo aminy kosa ny mpanjaka. Kanjo raha tsy mbola tonga akory ilay iraka, dia hoy i Elisà tamin’ny loholona:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Jereonareo fa naniraka olona hanapaka ny lohako ilay mpamono olona iny. Koa mitandrema ianareo fa raha avy ilay iraka, dia hidio ny varavarana ary aza avela hiditra izy. Tsy efa renareo koa ve ny famindran’ny tompony izay manara-dia azy?
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Raha mbola niteny i Elisà dia tonga ny mpanjaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mpanjaka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toa izany no mitombina kokoa ary mifanaraka amin’ny 6.32d sy 7.2a; ny RM dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: iraka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', saingy marihina fa mitovitovy tsipelina ny voambolana hebreo anankiroa.'
      marker-yv: yv-n
    - type: text
      text: ' nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny TOMPO no mandefa amintsika izao loza rehetra izao! Ka inona intsony no azoko antenaina aminy?
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ka dia nandeha niaraka tamin’ny andia-mpaminany izy. Ary rehefa mby teo amoron’i Jôrdàna ireo, dia nikapa hazo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa raha mbola nikapa ny hazony kosa ny iray tamin’ireo, dia nipitsika tany anaty rano ny lelam-pamakiny, ka nampiantsoantso azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Loza, tompoko, fa famakin’olona nindramina iny!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy i Elisà taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Taiza no nahalatsahan’ny lelam-pamaky?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia natorony azy ny toerana; ka nanapaka rantsan-kazo iray i Elisà ary natsipiny teo; dia nitsinkafona ilay lelam-pamaky.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary hoy i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Alaovy amin’izao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia natsotrany ny tanany mba hangalany azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elisà misambotra miaramila Sirianina
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fony niady tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' ny mpanjakan’i Siria ka nila hevitra tamin’ny manamboninahiny, dia nilaza izay toerana tiany hitobian’ny tafiny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa i Elisà olon’Andriamanitra kosa naniraka olona nankany amin’ny mpanjakan’i Israely nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tandremo fandrao mandalo amin’izany toerana izany fa any no misy ny tafika sirianina.
