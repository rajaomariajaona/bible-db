document_id: 2KI.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay famaky very nefa hita indray
  - type: text
    content: Indray andro, dia hoy ny andia-
  - type: text
    content: mpaminany
  - type: text
    content: ' tamin’i Elisà tompony:'
  - type: text
    content: '–Indro efa tena èty ho antsika ny toeram-pivoriana iarahanay aminao. '
  '10':
  - type: text
    content: Ary nandefa miaramila hiambina ny toerana voatondron’ilay olon’Andriamanitra ny mpanjakan’i Israely.
  - type: text
    content: 'Imbetsaka i Elisà no mampitandrina ny mpanjakan’i Israely, koa dia mailo aoka izany izy. '
  '11':
  - type: text
    content: 'Nampanahy mafy ny mpanjakan’i Siria izany zavatra izany, ka niantso ny manamboninahiny izy ary nanao taminy hoe:'
  - type: text
    content: –Tsy ambaranareo amiko ve izay mpamadika amintsika ireto ka miasa ho an’ny mpanjakan’i Israely?
  '12':
  - type: text
    content: 'Dia hoy navalin’ny manamboninahitra iray azy:'
  - type: text
    content: '–Tsy misy izany mpamadika izany aminay, ry andriamanjaka! Fa i Elisà '
  - type: text
    content: mpaminany
  - type: text
    content: ' ao amin’i Israely ihany no manambara amin’ny mpanjakany na dia izay teny lazainao ao an’efitrano fandrianao aza.'
  '13':
  - type: text
    content: 'Ary hoy ny mpanjakan’i Siria:'
  - type: text
    content: –Andeha tadiavo izay toerana misy azy mba hahazoako misambotra azy.
  - type: text
    content: Rehefa nilazana ny mpanjaka fa ao Dôtàna
  - type: note
    content: 'Dôtàna: toerana sahabo ho 45 km ao avaratr’i Jerosalema, ary 10 km avaratr’i Samaria.'
  - type: text
    content: ' i Elisà, '
  '14':
  - type: text
    content: dia nandefa antoko-miaramila matanjaka miaraka amin’ny soavaly sy kalesy izy; ka tonga alina ireo miaramila ary nanao fahirano ny tanàna.
  '15':
  - type: text
    content: 'Ny ampitso, raha nifoha maraina ny mpanompon’i Elisà ka nivoaka ny tanàna, dia nahita ireo miaramila mbamin’ny soavaly sy kalesy nanodidina ny tanàna, ary niteny tamin’i Elisà hoe:'
  - type: text
    content: –Loza ity, tompoko! Ahoana no hataontsika?
  '16':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: –Aza matahotra fa be lavitra noho ny mpomba azy ny mpomba antsika.
  '17':
  - type: text
    content: 'Avy eo i Elisà dia nivavaka hoe:'
  - type: text
    content: –TOMPO ô, sokafy re ny mason’ity mpanompoko ity mba hahitany.
  - type: text
    content: Dia nosokafan’ny TOMPO ny mason’ilay mpanompo ka hitany ny tendrombohitra feno soavaly sy kalesy afo manodidina an’i Elisà
  - type: note
    content: Ampit 2.11.
  - type: text
    content: .
  '18':
  - type: text
    content: 'Fa raha nidinan’ny miaramila sirianina i Elisà, dia nivavaka indray ka nanao hoe:'
  - type: text
    content: –Tompo ô, mba tampeno ny mason’ireo miaramila rehetra ireo.
  - type: text
    content: 'Dia nohajambain’ny TOMPO araka ny tenin’i Elisà ny masony; '
  '19':
  - type: text
    content: 'ary hoy i Elisà tamin’ny miaramila:'
  - type: text
    content: –Tsy ity no lalana; ary tsy ity koa ny tanàna; fa manaraha ahy ianareo, dia hoentiko any amin’ny olona tadiavinareo ianareo.
  - type: text
    content: 'Kanjo nentin’i Elisà nankany Samaria ireo. '
  '2':
  - type: text
    content: Koa mba avelao izahay ho any amoron’i Jôrdàna, samy haka hazo iray avy hanaovanay toeram-pivoriana vaovao any.
  - type: text
    content: 'Dia hoy i Elisà:'
  - type: text
    content: –Mandehana àry.
  '20':
  - type: text
    content: 'Ary nony tonga tao Samaria avokoa izy, dia mbola nivavaka i Elisà hoe:'
  - type: text
    content: –TOMPO ô, sokafy re ny mason’ireto mba hahitany ankehitriny.
  - type: text
    content: Koa rehefa nosokafan’ny TOMPO ny masony, dia hitany fa indreo izy teo afovoan’i Samaria.
  '21':
  - type: text
    content: 'Nony nahita ireo miaramila rehetra ireo ny mpanjakan’i Israely, dia niteny tamin’i Elisà hoe:'
  - type: text
    content: –Ry ikaky, hasiako ho faty ve ireo?
  '22':
  - type: text
    content: 'Hoy kosa ny navalin’i Elisà:'
  - type: text
    content: –Tsia! Aza mamely azy. Fanaonao angaha ny mamono ho faty izay nobaboinao tamin’ny sabatra na tamin’ny tsipîka? Koa rosoy mofo sy rano ireo hohaniny sy hosotroiny; ary avelao izy hiverina any amin’ny tompony.
  '23':
  - type: text
    content: Dia nanaovan’ny mpanjaka fanasam-be izy rehetra, ka rehefa avy nihinana sy nisotro, dia nasainy niverina any amin’ny tompony. Natsahatr’ireo Sirianina mpandroba kosa ny fitsofohana amin’ny tanin’i Israely.
  - type: heading
    content: Ny mosary tao Samaria
  '24':
  - type: text
    content: 'Taorian’izany dia novorin’i Bena-Hadada mpanjakan’i Siria ny tafiny manontolo mba handeha hanao fahirano an’i Samaria. '
  '25':
  - type: text
    content: Nisy mosary lehibe tao Samaria noho izany, ka dia nahatratra sekela valopolo ny vidin’ny loham-boriky iray ary sekela dimy ny taim-boromahailala
  - type: note
    content: 'taim-boromahailala: misy ny mandray izany ara-bakiteny satria fampiasa handrehetana sy hitaizana afo; misy ny mandray izany ho anaran-tsakafo ankafizina mitovitovy amin’ny atao hoe kakà pigeon... na koa mitovitovy amin’ny voanjobory nahodina halemy.'
  - type: text
    content: ' roanjato grama.'
  '26':
  - type: text
    content: 'Indray andro raha nandehandeha teo ambonin’ny manda ny mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ', dia nisy vehivavy iray niantsoantso nitaraina taminy hoe:'
  - type: text
    content: –Mba vonjeo aho, ry andriamanjaka ô!
  '27':
  - type: text
    content: 'Fa hoy ny navalin’ny mpanjaka:'
  - type: text
    content: –Raha tsy mamonjy anao ny TOMPO, ahoana kosa no hamonjeko anao? Fa tsy misy intsony tahirim-bary na tahirin-divay.
  '28':
  - type: text
    content: 'Kanefa avy eo ny mpanjaka dia niteny taminy hoe:'
  - type: text
    content: –Inona no manahirana anao?
  - type: text
    content: 'Ary novalian-dravehivavy hoe:'
  - type: text
    content: '–Hoy io vehivavy io tamiko: «Aiza ny zanakao hohanintsika amin’ity andro ity, fa rahampitso dia ny ahy indray no hohanintsika.» '
  '29':
  - type: text
    content: Dia nahandroinay ny zanako
  - type: note
    content: Jereo Deot 28.57; Fit 4.10.
  - type: text
    content: ' ka nohaninay; kanjo nony ampitso, rehefa nilazako kosa izy mba hitondra ny zanany hohaninay, dia nafeniny ny azy.'
  '3':
  - type: text
    content: 'Fa hoy ny mpaminany iray:'
  - type: text
    content: –Maninona raha mba miaraka aminay any koa ianao, tompoko?
  - type: text
    content: 'Dia novalian’i Elisà hoe:'
  - type: text
    content: –Eny, fa handeha aho.
  '30':
  - type: text
    content: 'Raha nandre ny tenin-dravehivavy ny mpanjaka, dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ; ary nandehandeha teny ambonin’ny manda izy mba ho hitan’ny olona fa mitafy akanjo gony
  - type: note
    content: Tamin’ny fotoan-tsarotra sasany, ny Israelita tranainy dia nitafy lamba malailay na marokoroko manolo-koditra, ho mari-panetren-tena eo anatrehan’Andriamanitra.
  - type: text
    content: ' manolo-koditra. '
  '31':
  - type: text
    content: 'Dia hoy izy:'
  - type: text
    content: –Hampiharin’Andriamanitra amiko anie ny famaizana mafy indrindra, raha tàhiny tsy voatapaka anio ny lohan’i Elisà zanakalahin’i Safata.
  - type: heading
    content: Nambaran’i Elisà ny fiafaran’ny mosary
  '32':
  - type: text
    content: 'Novorin’i Elisà tao an-tranony tamin’izay ny '
  - type: text
    content: loholon
  - type: text
    content: '’ny tanàna, ary naniraka olona hankeo aminy kosa ny mpanjaka. Kanjo raha tsy mbola tonga akory ilay iraka, dia hoy i Elisà tamin’ny loholona:'
  - type: text
    content: –Jereonareo fa naniraka olona hanapaka ny lohako ilay mpamono olona iny. Koa mitandrema ianareo fa raha avy ilay iraka, dia hidio ny varavarana ary aza avela hiditra izy. Tsy efa renareo koa ve ny famindran’ny tompony izay manara-dia azy?
  '33':
  - type: text
    content: Raha mbola niteny i Elisà dia tonga ny mpanjaka
  - type: note
    content: 'mpanjaka: toa izany no mitombina kokoa ary mifanaraka amin’ny 6.32d sy 7.2a; ny RM dia manao hoe iraka, saingy marihina fa mitovitovy tsipelina ny voambolana hebreo anankiroa.'
  - type: text
    content: ' nanao hoe:'
  - type: text
    content: –Ny TOMPO no mandefa amintsika izao loza rehetra izao! Ka inona intsony no azoko antenaina aminy?
  '4':
  - type: text
    content: 'Ka dia nandeha niaraka tamin’ny andia-mpaminany izy. Ary rehefa mby teo amoron’i Jôrdàna ireo, dia nikapa hazo. '
  '5':
  - type: text
    content: 'Fa raha mbola nikapa ny hazony kosa ny iray tamin’ireo, dia nipitsika tany anaty rano ny lelam-pamakiny, ka nampiantsoantso azy hoe:'
  - type: text
    content: –Loza, tompoko, fa famakin’olona nindramina iny!
  '6':
  - type: text
    content: 'Dia hoy i Elisà taminy:'
  - type: text
    content: –Taiza no nahalatsahan’ny lelam-pamaky?
  - type: text
    content: Dia natorony azy ny toerana; ka nanapaka rantsan-kazo iray i Elisà ary natsipiny teo; dia nitsinkafona ilay lelam-pamaky.
  '7':
  - type: text
    content: 'Ary hoy i Elisà:'
  - type: text
    content: –Alaovy amin’izao.
  - type: text
    content: Dia natsotrany ny tanany mba hangalany azy.
  - type: heading
    content: I Elisà misambotra miaramila Sirianina
  '8':
  - type: text
    content: 'Fony niady tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' ny mpanjakan’i Siria ka nila hevitra tamin’ny manamboninahiny, dia nilaza izay toerana tiany hitobian’ny tafiny. '
  '9':
  - type: text
    content: 'Fa i Elisà olon’Andriamanitra kosa naniraka olona nankany amin’ny mpanjakan’i Israely nanao hoe:'
  - type: text
    content: –Tandremo fandrao mandalo amin’izany toerana izany fa any no misy ny tafika sirianina.
