document_id: 1KI.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Salômôna manambady ny zanakavavin’ny Farao
  - type: text
    content: 'Tonga vinantolahin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta i Salômôna tamin’ny nanambadiany ny zanany vavy. Nentiny nankany an-'
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ' ny vadiny mandra-pahavita ny lapany sy ny tranon’ny TOMPO ary ny manda manodidina an’i Jerosalema.'
  '10':
  - type: text
    content: 'Sitraky ny Tompo Andriamanitra ny nangatahan’i Salômôna izany zavatra izany; '
  '11':
  - type: text
    content: 'ka dia hoy Izy tamin’ny mpanjaka:'
  - type: text
    content: '–Nangataka izany zavatra izany ianao; tsy ny ho ela velona na ny harena, na koa ny hahafaty ireo fahavalonao no nangatahinao fa kosa fahaiza-manavaka hitondrana ny vahoaka amim-pahamarinana. '
  '12':
  - type: text
    content: 'Koa indro fa araka ny teninao no ataoko: omeko saina hendry sy mahay manavaka ianao, ka tsy hisy tahaka anao na ny olona tany alohanao na ny olona any aorianao. '
  '13':
  - type: text
    content: 'Ary na izay tsy nangatahinao aza dia omeko anao koa, dia ny harena amam-boninahitra, ka tsy hisy mpanjaka hitovy aminao amin’ny andronao rehetra. '
  '14':
  - type: text
    content: Ary raha mizotra amin’ny sori-dalako ianao ka mitandrina ny lalànako sy ny didiko tahaka ny nataon’i Davida rainao, dia hohalavaiko ny andronao.
  '15':
  - type: text
    content: 'Rehefa nifoha i Salômôna, dia nahatsapa fa nitenenan’Andriamanitra tamin’ny nofy. Niverina tany Jerosalema izy, ary nitsangana teo anoloan’ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ' ka nanatitra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana; avy eo izy dia nanao fanasana ho an’ny tandapany rehetra.'
  - type: heading
    content: Fitsaran’i Salômôna
  '16':
  - type: text
    content: 'Indray andro dia nisy vehivavy mpivaro-tena roa tonga niseho teo anatrehan’ny mpanjaka. '
  '17':
  - type: text
    content: 'Dia hoy ilay vehivavy voalohany:'
  - type: text
    content: '–Miray trano izaho sy ity vehivavy ity, ry andriamanjaka, ary teraka tao an-trano aho tamin’ny fotoana nahatao azy koa. '
  '18':
  - type: text
    content: 'Fa telo andro taorian’ny fiterahako, dia mba teraka ny zanany koa io vehivavy io. Izahay roa vavy ihany no tao an-trano fa tsy nisy olon-kafa ankoatra anay. '
  '19':
  - type: text
    content: 'Tamin’io alina io anefa, dia maty ny zanak’ity vehivavy ity fa voatsindriny. '
  '2':
  - type: text
    content: 'Kanefa tamin’izay ny olona dia mbola nanao sorona teny amin’ny toeram-panasinana ihany, satria tsy mbola nisy ny trano voatokana hanajana ny TOMPO. '
  '20':
  - type: text
    content: 'Koa tamin’ny misasakalina dia niarina izy naka ny zanako teo anilako raha ilay mbola natory iny aho, ka nampandriany teo anilany; fa ny azy maty kosa no nataony teo anilako. '
  '21':
  - type: text
    content: Rehefa nifoha hampinono ny zanako aho anikeheo maraina, dia indro fa maty izy. Kanjo rehefa nofantariko nony nazava ny andro, dia hitako fa hay tsy ny zanako naterako akory io.
  '22':
  - type: text
    content: 'Tamin’izay, dia hoy kosa ilay vehivavy faharoa:'
  - type: text
    content: –Tsia! Ny velona no zanako, fa ny maty no anao!
  - type: text
    content: 'Dia hoy ilay voalohany:'
  - type: text
    content: –Tsia! Ny maty no zanakao, fa ny velona no ahy!
  - type: text
    content: 'Nifanditra toy izany teo anatrehan’ny mpanjaka izy roa. '
  '23':
  - type: text
    content: 'Fa hoy kosa ny mpanjaka:'
  - type: text
    content: '–Ny iray manao hoe: «Ny velona no zanako fa ny maty no anao!» Dia mamaly ny iray hoe: «Tsia! Ny maty no zanakao fa ny velona no ahy!» '
  '24':
  - type: text
    content: 'Ka hoy aho hoe: «Itondray sabatra aho».'
  - type: text
    content: 'Rehefa tonga ny sabatra, '
  '25':
  - type: text
    content: 'dia hoy indray ny mpanjaka:'
  - type: text
    content: –Zarao roa ny zaza velona, ka samy omeo ny antsasany avy ireo vehivavy ireo!
  '26':
  - type: text
    content: 'Fa onena mafy an-janany kosa ilay vehivavy renin’ny zaza velona, ka niteny tamin’ny mpanjaka hoe:'
  - type: text
    content: –Ry andriamanjaka ô, aoka re homena azy ihany ny zaza velona, fa aza dia vonoina ho faty!
  - type: text
    content: 'Fa hoy kosa ny iray:'
  - type: text
    content: –Zarao roa mihitsy ny zaza, fa amin’izay dia samy tsy manana.
  '27':
  - type: text
    content: 'Dia namaly ny mpanjaka, ka nanao hoe:'
  - type: text
    content: –Aza vonoina ho faty ny zaza, fa omeo ilay vehivavy voalohany; izy mihitsy no reniny.
  '28':
  - type: text
    content: Ren’ny Israelita rehetra izany fitsarana nataon’ny mpanjaka izany; ka dia nanaja azy ny olona, satria nahatsapa fa misy fahendren’Andriamanitra ao aminy hoentiny mitsara.
  '3':
  - type: text
    content: Notiavin’i Salômôna ny TOMPO ka ny toromarik’i Davida rainy no nizorany; nefa izy koa mbola nanao sorona sy nandoro zava-manitra teny amin’ny toeram-panasinana.
  - type: heading
    content: I Salômôna mangataka fahendrena amin’Andriamanitra
  - type: heading
    content: (Jereo 2 Tan 1.2-13)
  '4':
  - type: text
    content: Indray andro dia nankany Gibehôna
  - type: note
    content: Toerana 10 km avaratra andrefan’i Jerosalema.
  - type: text
    content: ' ny mpanjaka mba hanao sorona, fa tany no '
  - type: text
    content: toeram-pisoronana
  - type: text
    content: ' malaza indrindra. '
  - type: text
    content: Sorona
  - type: text
    content: ' dorana manontolo arivo no naterin’i Salômôna teo amin’izany '
  - type: text
    content: alitara
  - type: text
    content: ' izany. '
  '5':
  - type: text
    content: 'Fa raha mbola tao Gibehôna i Salômôna, dia nisehoan’ny TOMPO Andriamanitra tamin’ny nofy, ka nilazany hoe:'
  - type: text
    content: –Angataho izay tianao homeko anao.
  '6':
  - type: text
    content: 'Dia hoy i Salômôna:'
  - type: text
    content: '–Efa nanehoanao fitia lehibe i Davida raiko sady mpanomponao, araka ny nizorany teo anatrehanao tamin’ny toetra mahatoky sy marina sady mahitsy fo; ary notehirizinao ho azy izany fitia lehibe izany, fa nomenao zanakalahy izay mipetraka eo amin’ny sezafiandrianany izy tahaka izao hita anio izao. '
  '7':
  - type: text
    content: 'Ankehitriny, ry TOMPO Andriamanitro ô, efa nampanjaka ahy mpanomponao handimby an’i Davida raiko Ianao, kanefa izaho dia mbola tanora loatra ka tsy mahay mitondra akory. '
  '8':
  - type: text
    content: 'Izaho mpanomponao no filohan’ny vahoaka izay nofidinao, dia vahoaka betsaka tsy tambo isaina noho ny hamaroany. '
  '9':
  - type: text
    content: Koa omeo ahy mpanomponao ny saina mahiratra hifehezako ny vahoakanao sy hahaizako manavaka ny soa sy ny ratsy; fa, raha tsy eo izany, iza moa no hahay mifehy izao vahoakanao marobe izao?
