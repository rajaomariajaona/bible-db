document_id: 1KI.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Salômôna manambady ny zanakavavin’ny Farao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tonga vinantolahin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' mpanjakan’i Ejipta i Salômôna tamin’ny nanambadiany ny zanany vavy. Nentiny nankany an-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: ' ny vadiny mandra-pahavita ny lapany sy ny tranon’ny TOMPO ary ny manda manodidina an’i Jerosalema.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Sitraky ny Tompo Andriamanitra ny nangatahan’i Salômôna izany zavatra izany; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ka dia hoy Izy tamin’ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nangataka izany zavatra izany ianao; tsy ny ho ela velona na ny harena, na koa ny hahafaty ireo fahavalonao no nangatahinao fa kosa fahaiza-manavaka hitondrana ny vahoaka amim-pahamarinana. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa indro fa araka ny teninao no ataoko: omeko saina hendry sy mahay manavaka ianao, ka tsy hisy tahaka anao na ny olona tany alohanao na ny olona any aorianao. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary na izay tsy nangatahinao aza dia omeko anao koa, dia ny harena amam-boninahitra, ka tsy hisy mpanjaka hitovy aminao amin’ny andronao rehetra. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary raha mizotra amin’ny sori-dalako ianao ka mitandrina ny lalànako sy ny didiko tahaka ny nataon’i Davida rainao, dia hohalavaiko ny andronao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Rehefa nifoha i Salômôna, dia nahatsapa fa nitenenan’Andriamanitra tamin’ny nofy. Niverina tany Jerosalema izy, ary nitsangana teo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
    - type: text
      text: ' ka nanatitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorom-pihavanana; avy eo izy dia nanao fanasana ho an’ny tandapany rehetra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsaran’i Salômôna
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Indray andro dia nisy vehivavy mpivaro-tena roa tonga niseho teo anatrehan’ny mpanjaka. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy ilay vehivavy voalohany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Miray trano izaho sy ity vehivavy ity, ry andriamanjaka, ary teraka tao an-trano aho tamin’ny fotoana nahatao azy koa. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa telo andro taorian’ny fiterahako, dia mba teraka ny zanany koa io vehivavy io. Izahay roa vavy ihany no tao an-trano fa tsy nisy olon-kafa ankoatra anay. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tamin’io alina io anefa, dia maty ny zanak’ity vehivavy ity fa voatsindriny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Kanefa tamin’izay ny olona dia mbola nanao sorona teny amin’ny toeram-panasinana ihany, satria tsy mbola nisy ny trano voatokana hanajana ny TOMPO. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Koa tamin’ny misasakalina dia niarina izy naka ny zanako teo anilako raha ilay mbola natory iny aho, ka nampandriany teo anilany; fa ny azy maty kosa no nataony teo anilako. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Rehefa nifoha hampinono ny zanako aho anikeheo maraina, dia indro fa maty izy. Kanjo rehefa nofantariko nony nazava ny andro, dia hitako fa hay tsy ny zanako naterako akory io.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tamin’izay, dia hoy kosa ilay vehivavy faharoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia! Ny velona no zanako, fa ny maty no anao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ilay voalohany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia! Ny maty no zanakao, fa ny velona no ahy!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nifanditra toy izany teo anatrehan’ny mpanjaka izy roa. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa hoy kosa ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny iray manao hoe: «Ny velona no zanako fa ny maty no anao!» Dia mamaly ny iray hoe: «Tsia! Ny maty no zanakao fa ny velona no ahy!» '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ka hoy aho hoe: «Itondray sabatra aho».'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga ny sabatra, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'dia hoy indray ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zarao roa ny zaza velona, ka samy omeo ny antsasany avy ireo vehivavy ireo!
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa onena mafy an-janany kosa ilay vehivavy renin’ny zaza velona, ka niteny tamin’ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry andriamanjaka ô, aoka re homena azy ihany ny zaza velona, fa aza dia vonoina ho faty!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa ny iray:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zarao roa mihitsy ny zaza, fa amin’izay dia samy tsy manana.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia namaly ny mpanjaka, ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza vonoina ho faty ny zaza, fa omeo ilay vehivavy voalohany; izy mihitsy no reniny.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ren’ny Israelita rehetra izany fitsarana nataon’ny mpanjaka izany; ka dia nanaja azy ny olona, satria nahatsapa fa misy fahendren’Andriamanitra ao aminy hoentiny mitsara.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Notiavin’i Salômôna ny TOMPO ka ny toromarik’i Davida rainy no nizorany; nefa izy koa mbola nanao sorona sy nandoro zava-manitra teny amin’ny toeram-panasinana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Salômôna mangataka fahendrena amin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 1.2-13)
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Indray andro dia nankany Gibehôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toerana 10 km avaratra andrefan’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ' ny mpanjaka mba hanao sorona, fa tany no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: toeram-pisoronana
    - type: text
      text: ' malaza indrindra. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sorona
    - type: text
      text: ' dorana manontolo arivo no naterin’i Salômôna teo amin’izany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa raha mbola tao Gibehôna i Salômôna, dia nisehoan’ny TOMPO Andriamanitra tamin’ny nofy, ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Angataho izay tianao homeko anao.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy i Salômôna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa nanehoanao fitia lehibe i Davida raiko sady mpanomponao, araka ny nizorany teo anatrehanao tamin’ny toetra mahatoky sy marina sady mahitsy fo; ary notehirizinao ho azy izany fitia lehibe izany, fa nomenao zanakalahy izay mipetraka eo amin’ny sezafiandrianany izy tahaka izao hita anio izao. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ankehitriny, ry TOMPO Andriamanitro ô, efa nampanjaka ahy mpanomponao handimby an’i Davida raiko Ianao, kanefa izaho dia mbola tanora loatra ka tsy mahay mitondra akory. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izaho mpanomponao no filohan’ny vahoaka izay nofidinao, dia vahoaka betsaka tsy tambo isaina noho ny hamaroany. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa omeo ahy mpanomponao ny saina mahiratra hifehezako ny vahoakanao sy hahaizako manavaka ny soa sy ny ratsy; fa, raha tsy eo izany, iza moa no hahay mifehy izao vahoakanao marobe izao?
