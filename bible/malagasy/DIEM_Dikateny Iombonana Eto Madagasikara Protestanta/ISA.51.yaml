document_id: ISA.51
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famonjena tsy misy fiafarany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: «Mihainoa Ahy ianareo mikatsa-panafahana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ianareo mitady Ahy, hoy ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jereo ny vatolampy izay nangalana anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny ati-lavaka nisintonana anareo:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hevero i Abrahama rainareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy i Sarà izay niteraka anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola tsy nanan-janaka i Abrahama, fony nantsoiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa notahîko izy sy nohamaroiko!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, ny TOMPO tokoa no nampahery an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: nampahery azy teo anivon’ny faharavàny rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka izany toerana karankaina izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia novan’ny TOMPO ho paradisa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izany tany ngazana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia novany ho zaridaina mahavariana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fientanentanana sy firavoravoana no ho hita ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa hira fiderana sy feon-java-maneno.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Mandrenesa tsara ianareo vahoakako, hoy ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary atongilano amiko ny sofinareo, ry fireneko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria Izaho no hamoaka ny lalàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fitsarana ataoko dia hampitoeriko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fanazavana ny firenen-kafa
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa akaiky ny fanafahako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa hiseho ny famonjeko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahefàko no hitsara ny firenen-kafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa ny mponina any amin’ny nosy any
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanantena Ahy sy hiantehitra amin’ny fahefàko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Atopazo eny an-danitra ny masonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia jereo koa ny tany etỳ ambany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lanitra ho levona toy ny setroka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tany ho rotidrotika toy ny lamba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho faty toy ny lalitra ny mponina eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny famonjeko kosa haharitra mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanafahako tsy mba ho rava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mihainoa Ahy ianareo izay mandala ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo vahoaka mitana am-po ny lalànako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza matahotra izay fanaratsian’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: na milefitra amin’ny fanalam-baràka ataony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: satria ho toy ny lamba lanin’ny kalalao ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho tahaka ny volonondry lanin’ny fositra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fanafahako kosa haharitra mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny famonjeko ho amin’ny taonjato mifandimby.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifohaza ianao Tompo ô
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifohaza ianao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifohaza ka tafio indray ny herinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifohaza tahaka ny tamin’ny andro taloha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tamin’ny taranaka fahiny ela be.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy ianao no namotipotika an-dRahaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Rahaba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ao amin’ny angano babilônianina momba ny fahariana, dia enti-milaza ilay trozona misolo tena ny ranomasina ka resin-Janahary. Asan’ny Tompo kosa izany fandresena izany, hoy ny mpaminany.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanagorobaka ilay dragona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Moa tsy ianao no nahamaina ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny rano ao amin’ny hantsana lalimbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahatonga ny fanambanin’ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho lalana hiampitan’ny voaavotra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eny, hiverina ireo nafahan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiditra ao Tsiôna amin’ny hobim-pandresena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hafaliana mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ho hita taratra eny an-dohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fientanana sy firavoravoana no hanenika azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa handositra ny alahelo sy ny fisentoana!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Inona no atahoranao, ry vahoakako?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izaho, eny, Izaho ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mampahery anao, hoy ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka inona no atahoranao ny olona mety maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny zanak’olombelona izay mihelina toy ny ahitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hadinonao Izaho TOMPO, Ilay nahary anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay namelatra ny lanitra sy nanorina ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy mitsaha-mangovitra isan’andro ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anoloan’ny fahatezeran’ny mpampahory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay toy ny efa mikendry hanimba anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa aiza izao ny fahatezerany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vetivety dia hoafahana ny gadra mitanondrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho faty ho any am-pasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho ory hanina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Satria Izaho Tompo no Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay mamolaka ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mirohondrohona ny onjany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny TOMPOn’izao rehetra izao no anarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hamelatra ny lanitra indray Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanorina indray ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hilaza amin’i Tsiôna hoe: «Vahoakako ianao.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataoko eo am-bavanao ny teniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary arovako eo ambany aloky ny tanako ianao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mifohaza, ry Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mifohaza ianao, ry Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifohaza ka mitsangàna!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampisotroin’ny TOMPO anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tsatokaty feno ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsatokaty misy fisotro mahafanina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay notrohinao hatramin’ny faikany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jer 25.15; Apôk 14.10; 16.19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy nisy nanohana anao na iray aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo zanaka rehetra naterakao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nisy nitantana anao na iray aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ankizy rehetra notezainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tonga namely anao tsiroaroa ny loza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fahasimbana sy faharavana, ary ady sy mosary.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa iza moa no hitsetra anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: iza moa no hampahery anao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eny an-joron-dalambe rehetra eny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mitorevaka sy miampatrampatra ny zanakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny diera voafandrika harato;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rakotry ny fahatezeran’ny TOMPO ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady iharan’ny fandrahonan’ilay Andriamanitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Noho izany, ry ilay Jerosalema ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mivembena tsy mamon-divay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'henoy izao teny ataoko izao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny Tomponao, ilay TOMPO sady Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mandaha-teny hiaro ny vahoakany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka milaza aminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro hoesoriko eny an-tananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay tsatokaty misy fisotro mahafanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsatokaty feno ny fahatezerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisotroanao izany intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Io tsatokaty io dia hatolotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo an-tanan’ny nampahory anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ireo olona nilaza taminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‹Miankohofa amin’ny tany mba hohitsahinay›;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voatery ianao nanolotra ny lamosinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tahaka ny tany eny an-dalambe
- type: usfm
  marker: q1
  children:
  - type: text
    text: natao hohitsahin’ireo mpandalo.»
