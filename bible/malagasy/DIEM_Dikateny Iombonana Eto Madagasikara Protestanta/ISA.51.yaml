document_id: ISA.51,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famonjena tsy misy fiafarany
  - type: text
    content: «Mihainoa Ahy ianareo mikatsa-panafahana,
  - type: text
    content: 'dia ianareo mitady Ahy, hoy ny TOMPO:'
  - type: text
    content: Jereo ny vatolampy izay nangalana anareo
  - type: text
    content: 'sy ny ati-lavaka nisintonana anareo:'
  '10':
  - type: text
    content: Moa tsy ianao no nahamaina ny ranomasina,
  - type: text
    content: dia ny rano ao amin’ny hantsana lalimbe,
  - type: text
    content: ka nahatonga ny fanambanin’ny ranomasina
  - type: text
    content: ho lalana hiampitan’ny voaavotra?
  '11':
  - type: text
    content: Eny, hiverina ireo nafahan’ny TOMPO
  - type: text
    content: ka hiditra ao Tsiôna amin’ny hobim-pandresena;
  - type: text
    content: ary hafaliana mandrakizay
  - type: text
    content: no ho hita taratra eny an-dohany,
  - type: text
    content: fientanana sy firavoravoana no hanenika azy
  - type: text
    content: fa handositra ny alahelo sy ny fisentoana!
  - type: heading
    content: Inona no atahoranao, ry vahoakako?
  '12':
  - type: text
    content: Izaho, eny, Izaho ihany
  - type: text
    content: no mampahery anao, hoy ny TOMPO.
  - type: text
    content: Ka inona no atahoranao ny olona mety maty,
  - type: text
    content: dia ny zanak’olombelona izay mihelina toy ny ahitra?
  '13':
  - type: text
    content: Hadinonao Izaho TOMPO, Ilay nahary anao,
  - type: text
    content: Ilay namelatra ny lanitra sy nanorina ny tany.
  - type: text
    content: Fa tsy mitsaha-mangovitra isan’andro ianao
  - type: text
    content: eo anoloan’ny fahatezeran’ny mpampahory,
  - type: text
    content: izay toy ny efa mikendry hanimba anao.
  - type: text
    content: Kanefa aiza izao ny fahatezerany?
  '14':
  - type: text
    content: Vetivety dia hoafahana ny gadra mitanondrika
  - type: text
    content: ka tsy ho faty ho any am-pasana
  - type: text
    content: ary tsy ho ory hanina intsony.
  '15':
  - type: text
    content: Satria Izaho Tompo no Andriamanitrao,
  - type: text
    content: Ilay mamolaka ny ranomasina
  - type: text
    content: raha mirohondrohona ny onjany;
  - type: text
    content: Ny TOMPOn’izao rehetra izao no anarako.
  '16':
  - type: text
    content: Hamelatra ny lanitra indray Aho
  - type: text
    content: sady hanorina indray ny tany,
  - type: text
    content: 'ka hilaza amin’i Tsiôna hoe: «Vahoakako ianao.'
  - type: text
    content: Ataoko eo am-bavanao ny teniko;
  - type: text
    content: ary arovako eo ambany aloky ny tanako ianao.»
  - type: heading
    content: Mifohaza, ry Jerosalema
  '17':
  - type: text
    content: Mifohaza ianao, ry Jerosalema,
  - type: text
    content: mifohaza ka mitsangàna!
  - type: text
    content: Nampisotroin’ny TOMPO anao
  - type: text
    content: ny tsatokaty feno ny fahatezerany,
  - type: text
    content: dia tsatokaty misy fisotro mahafanina
  - type: text
    content: izay notrohinao hatramin’ny faikany
  - type: note
    content: Ampit Jer 25.15; Apôk 14.10; 16.19.
  - type: text
    content: .
  '18':
  - type: text
    content: Tsy nisy nanohana anao na iray aza
  - type: text
    content: ireo zanaka rehetra naterakao;
  - type: text
    content: ary tsy nisy nitantana anao na iray aza
  - type: text
    content: ny ankizy rehetra notezainao.
  '19':
  - type: text
    content: Tonga namely anao tsiroaroa ny loza;
  - type: text
    content: fahasimbana sy faharavana, ary ady sy mosary.
  - type: text
    content: Kanefa iza moa no hitsetra anao,
  - type: text
    content: iza moa no hampahery anao?
  '2':
  - type: text
    content: Hevero i Abrahama rainareo
  - type: text
    content: sy i Sarà izay niteraka anareo.
  - type: text
    content: Mbola tsy nanan-janaka i Abrahama, fony nantsoiko;
  - type: text
    content: kanefa notahîko izy sy nohamaroiko!»
  '20':
  - type: text
    content: Eny an-joron-dalambe rehetra eny
  - type: text
    content: no mitorevaka sy miampatrampatra ny zanakao
  - type: text
    content: tahaka ny diera voafandrika harato;
  - type: text
    content: fa rakotry ny fahatezeran’ny TOMPO ireo
  - type: text
    content: sady iharan’ny fandrahonan’ilay Andriamanitrao.
  '21':
  - type: text
    content: Noho izany, ry ilay Jerosalema ory
  - type: text
    content: ka mivembena tsy mamon-divay,
  - type: text
    content: 'henoy izao teny ataoko izao:'
  '22':
  - type: text
    content: Ny Tomponao, ilay TOMPO sady Andriamanitrao,
  - type: text
    content: dia mandaha-teny hiaro ny vahoakany
  - type: text
    content: 'ka milaza aminao hoe:'
  - type: text
    content: «Indro hoesoriko eny an-tananao
  - type: text
    content: ilay tsatokaty misy fisotro mahafanina,
  - type: text
    content: dia tsatokaty feno ny fahatezerako,
  - type: text
    content: ka tsy hisotroanao izany intsony.
  '23':
  - type: text
    content: Io tsatokaty io dia hatolotro
  - type: text
    content: eo an-tanan’ny nampahory anao,
  - type: text
    content: 'dia ireo olona nilaza taminao hoe:'
  - type: text
    content: ‹Miankohofa amin’ny tany mba hohitsahinay›;
  - type: text
    content: ka voatery ianao nanolotra ny lamosinao
  - type: text
    content: ho tahaka ny tany eny an-dalambe
  - type: text
    content: natao hohitsahin’ireo mpandalo.»
  '3':
  - type: text
    content: 'Eny, ny TOMPO tokoa no nampahery an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: nampahery azy teo anivon’ny faharavàny rehetra.
  - type: text
    content: Ka izany toerana karankaina izany
  - type: text
    content: dia novan’ny TOMPO ho paradisa;
  - type: text
    content: ary izany tany ngazana izany
  - type: text
    content: dia novany ho zaridaina mahavariana.
  - type: text
    content: Fientanentanana sy firavoravoana no ho hita ao
  - type: text
    content: ary koa hira fiderana sy feon-java-maneno.
  '4':
  - type: text
    content: «Mandrenesa tsara ianareo vahoakako, hoy ny Tompo,
  - type: text
    content: ary atongilano amiko ny sofinareo, ry fireneko.
  - type: text
    content: Satria Izaho no hamoaka ny lalàna;
  - type: text
    content: ary ny fitsarana ataoko dia hampitoeriko
  - type: text
    content: ho fanazavana ny firenen-kafa
  '5':
  - type: text
    content: Efa akaiky ny fanafahako,
  - type: text
    content: efa hiseho ny famonjeko;
  - type: text
    content: ary ny fahefàko no hitsara ny firenen-kafa.
  - type: text
    content: Koa ny mponina any amin’ny nosy any
  - type: text
    content: dia hanantena Ahy sy hiantehitra amin’ny fahefàko.
  '6':
  - type: text
    content: Atopazo eny an-danitra ny masonareo,
  - type: text
    content: 'dia jereo koa ny tany etỳ ambany:'
  - type: text
    content: ny lanitra ho levona toy ny setroka
  - type: text
    content: ary ny tany ho rotidrotika toy ny lamba,
  - type: text
    content: ka ho faty toy ny lalitra ny mponina eo aminy;
  - type: text
    content: fa ny famonjeko kosa haharitra mandrakizay
  - type: text
    content: ary ny fanafahako tsy mba ho rava.
  '7':
  - type: text
    content: Mihainoa Ahy ianareo izay mandala ny rariny,
  - type: text
    content: ianareo vahoaka mitana am-po ny lalànako;
  - type: text
    content: aza matahotra izay fanaratsian’ny olona
  - type: text
    content: na milefitra amin’ny fanalam-baràka ataony,
  '8':
  - type: text
    content: satria ho toy ny lamba lanin’ny kalalao ireny
  - type: text
    content: sy ho tahaka ny volonondry lanin’ny fositra;
  - type: text
    content: fa ny fanafahako kosa haharitra mandrakizay
  - type: text
    content: ary ny famonjeko ho amin’ny taonjato mifandimby.»
  - type: heading
    content: Mifohaza ianao Tompo ô
  '9':
  - type: text
    content: Mifohaza ianao, TOMPO ô,
  - type: text
    content: mifohaza ka tafio indray ny herinao;
  - type: text
    content: mifohaza tahaka ny tamin’ny andro taloha,
  - type: text
    content: dia tamin’ny taranaka fahiny ela be.
  - type: text
    content: Moa tsy ianao no namotipotika an-dRahaba
  - type: note
    content: 'Rahaba: ao amin’ny angano babilônianina momba ny fahariana, dia enti-milaza ilay trozona misolo tena ny ranomasina ka resin-Janahary. Asan’ny Tompo kosa izany fandresena izany, hoy ny mpaminany.'
  - type: text
    content: ','
  - type: text
    content: sy nanagorobaka ilay dragona?
