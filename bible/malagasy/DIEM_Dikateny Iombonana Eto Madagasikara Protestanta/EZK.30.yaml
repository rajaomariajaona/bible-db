document_id: EZK.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haneho ny hatezerany amin’i Ejipta ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Ry ilay taranak’olombelona, ijoroy ny maha-
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anao ka ambarao fa izao no lazain’ny Tompo ANDRIANANAHARY: Midradradradrà ny amin’ny andro ho avy ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa antomotra izy, eny, antomotra ny androm-pamaizan’ny TOMPO. Ho andro vesaran-drahona izany, ary fotoana hifamelezan’ny firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hiditra any Ejipta ny ady, ka hampangorohoro hatrany Etiôpia izany. Hiampatrampatra ny fatin’ny Ejiptianina, ary horobaina ny hareny ka hatao rava mbamin’ny fanorenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny olona avy any Etiôpia sy Pota ary Loda, ny olona avy any Arabia manontolo sy Libia, mbamin’ny teraky ny vahoakako aza, dia hisy ho faty an’ady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Pota
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Loda:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo nta Is 66.19. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Libia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': araka ny dkt tranainy grika izany, fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kobo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay tany tsy dia fantatra loatra. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: mbamin’ny teraky ny vahoakako aza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tamin’izany vanim-potoana izany dia efa nisy andiana Israelita tany Ejipta, jereo Jer 43 sy 44.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain’ny TOMPO: Hatreo Migdôla any avaratra ka hatrany Asoana any atsimo dia ho faty an’ady ireo mpiaro an’i Ejipta, ary ho fefika ny tafiny miavonavona; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ho rava dia ho rava ny taniny, ary ho lao dia ho lao ny tanànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa hodorako amin’ny afo i Ejipta sady haringako ireo rehetra mpiaro azy, dia hoekena amin’izay fa Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’izany andro handravako an’i Ejipta izany, dia hisy iraka avy amiko handeha an-tsambo hampandre ny Etiôpianina; ka izy no hampatahotra sy hampangorohoro ny Etiôpianina izay mitoetra tsy manahy. Eny, indro avy izany andro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Hampiasaiko i Nebokadnetsara mpanjakan’i Babilôna mba handringana ny mponina maro ao Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ho avy handrava io tany io izy mbamin’ny miaramilany, izay loza indrindra raha samy tafi-pirenena. Hanatsoaka sabatra hamely ny Ejiptianina ireny ka hameno faty ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Horitiko ny sakeli-dranon’i Neily ary hatolotro an’ireo olon-dia i Ejipta. Hasaiko simban’ny vahiny izy, ka hofaohiny mbamin’izay rehetra ao aminy. Izaho TOMPO no miteny izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Horavako tanteraka ireo sampy sy andriamani-tsiizy an’i Memfîsa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Memfîsa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe ao atsimon’ny vavaranon’i Neily.
    marker-yv: yv-n
  - type: text
    text: '. Tsy hisy mpitondra intsony any Ejipta ary hataoko manenika io tany io ny tahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hosimbako i Ejipta ambony, hodorako amin’ny afo ny tanànan’i Tsôhàna ary hampihariko ny didim-pitsarako hamelezana ny tanànan’i Nao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsôhàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe any Ejipta avaratra-atsinanana. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Nao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàn-dehibe any Ejipta ambony.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hatosako ao Sina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe any Ejipta avaratra-atsinanana, angamba i Pelozy ankehitriny.
    marker-yv: yv-n
  - type: text
    text: ' izay tanànamimanda miaro an’i Ejipta ny fahatezerako ary hofongorako ny mponina maro ao Nao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hodorako amin’ny afo i Ejipta. Hisavoritaka ny mponina ao Sina; ary hisy vaky ny mandan’i Nao ka ho safotry ny rano ilay tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho faty an’ady ny tovolahin’i Ôna sy i Py-Beseta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ôna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na Heliôpôly sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Py-Beseta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na Bobasta: tanàn-dehibe tao amin’ny faritry ny vavaranon’i Neily.'
    marker-yv: yv-n
  - type: text
    text: ', ary ny mponina sisa dia hoentina ho babo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy hisy andro mihiratra intsony ao Tahapanehesa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tahapanehesa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe an-tsisin-tany eo atsinanan’ny vavaranon’i Neily.
    marker-yv: yv-n
  - type: text
    text: ' rehefa hopotehiko ny herin’i Ejipta ary hatsahatro ny fireharehany. Hisy rahona mainty handrakotra ny tanàna, ary ho lasan-ko babo ny mponina amin’izany faritra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hampihariko ny didim-pitsarako hamelezana an’i Ejipta, ka hoekena amin’izay fa Izaho no TOMPO.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitaovana ampiasain’Andriamanitra ny mpanjakan’i Babilôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tamin’ny taona faha-11 taorian’ny fahababoana, nony andro fahafiton’ny volana voalohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe volana Marsa-Avrily 587 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Ry ilay taranak’olombelona, nopotehiko ny sandrin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ao amin’ny Baiboly ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sandry
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' matetika dia entina milaza ny hery, jereo ohatra Lk 1.51.'
    marker-yv: yv-n
  - type: text
    text: ' mpanjakan’i Ejipta. Tsy nisy nitsabo na nanome fanafody azy, tsy nisy namehy ny feriny mba hampody ny heriny hahatan-tsabatra indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa Izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hirotsaka hamely ny Farao mpanjakan’i Ejipta Aho. Ny sandriny roa mihitsy no hopotehiko, tsy ilay efa potika ihany fa ilay mbola matanjaka koa, ka hataoko latsaka avy eny an-tanany ny sabany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary haeliko any amin’ireo firenena sy haparitako any amin’ny tany samy hafa ny Ejiptianina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Homeko tanjaka ny sandrin’ny mpanjakan’i Babilôna ka ny sabatro mihitsy no hapetrako eo an-tanany. Ary ny Farao, izay efa nopotehiko ny sandriny, dia ho faty mitoloko toy ny voaratra eo anoloan’ny fahavalony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Eny, hiraviravy tsy hanan-kery ny sandrin’ny Farao; fa homeko tanjaka kosa ny sandrin’ny mpanjakan’i Babilôna, ka ny sabatro mihitsy no hapetrako eo an-tanany sy harangarangany hamelezana an’i Ejipta. Amin’izay dia hoekena fa Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Haeliko any amin’ireo firenena sy haparitako any amin’ny tany samy hafa ny Ejiptianina; ka amin’izay dia hoekena fa Izaho no TOMPO›. »
