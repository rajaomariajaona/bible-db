document_id: EZK.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Haneho ny hatezerany amin’i Ejipta ny Tompo
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Hampiasaiko i Nebokadnetsara mpanjakan’i Babilôna mba handringana ny mponina maro ao Ejipta. '
  '11':
  - type: text
    content: 'Ho avy handrava io tany io izy mbamin’ny miaramilany, izay loza indrindra raha samy tafi-pirenena. Hanatsoaka sabatra hamely ny Ejiptianina ireny ka hameno faty ny tany. '
  '12':
  - type: text
    content: Horitiko ny sakeli-dranon’i Neily ary hatolotro an’ireo olon-dia i Ejipta. Hasaiko simban’ny vahiny izy, ka hofaohiny mbamin’izay rehetra ao aminy. Izaho TOMPO no miteny izany.
  '13':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Horavako tanteraka ireo sampy sy andriamani-tsiizy an’i Memfîsa'
  - type: note
    content: 'Memfîsa: tanàn-dehibe ao atsimon’ny vavaranon’i Neily.'
  - type: text
    content: '. Tsy hisy mpitondra intsony any Ejipta ary hataoko manenika io tany io ny tahotra. '
  '14':
  - type: text
    content: Hosimbako i Ejipta ambony, hodorako amin’ny afo ny tanànan’i Tsôhàna ary hampihariko ny didim-pitsarako hamelezana ny tanànan’i Nao
  - type: note
    content: 'Tsôhàna: tanàn-dehibe any Ejipta avaratra-atsinanana. –Nao: tanàn-dehibe any Ejipta ambony.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Hatosako ao Sina
  - type: note
    content: 'Sina: tanàn-dehibe any Ejipta avaratra-atsinanana, angamba i Pelozy ankehitriny.'
  - type: text
    content: ' izay tanànamimanda miaro an’i Ejipta ny fahatezerako ary hofongorako ny mponina maro ao Nao. '
  '16':
  - type: text
    content: 'Hodorako amin’ny afo i Ejipta. Hisavoritaka ny mponina ao Sina; ary hisy vaky ny mandan’i Nao ka ho safotry ny rano ilay tanàna. '
  '17':
  - type: text
    content: Ho faty an’ady ny tovolahin’i Ôna sy i Py-Beseta
  - type: note
    content: 'Ôna na Heliôpôly sy Py-Beseta na Bobasta: tanàn-dehibe tao amin’ny faritry ny vavaranon’i Neily.'
  - type: text
    content: ', ary ny mponina sisa dia hoentina ho babo. '
  '18':
  - type: text
    content: Tsy hisy andro mihiratra intsony ao Tahapanehesa
  - type: note
    content: 'Tahapanehesa: tanàn-dehibe an-tsisin-tany eo atsinanan’ny vavaranon’i Neily.'
  - type: text
    content: ' rehefa hopotehiko ny herin’i Ejipta ary hatsahatro ny fireharehany. Hisy rahona mainty handrakotra ny tanàna, ary ho lasan-ko babo ny mponina amin’izany faritra izany. '
  '19':
  - type: text
    content: Hampihariko ny didim-pitsarako hamelezana an’i Ejipta, ka hoekena amin’izay fa Izaho no TOMPO.»
  - type: heading
    content: Fitaovana ampiasain’Andriamanitra ny mpanjakan’i Babilôna
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, ijoroy ny maha-
  - type: text
    content: mpaminany
  - type: text
    content: ' anao ka ambarao fa izao no lazain’ny Tompo ANDRIANANAHARY: Midradradradrà ny amin’ny andro ho avy ianareo! '
  '20':
  - type: text
    content: Tamin’ny taona faha-11 taorian’ny fahababoana, nony andro fahafiton’ny volana voalohany
  - type: note
    content: Izany hoe volana Marsa-Avrily 587 tal J.K.
  - type: text
    content: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '21':
  - type: text
    content: '«Ry ilay taranak’olombelona, nopotehiko ny sandrin’ny '
  - type: text
    content: Farao
  - type: note
    content: Ao amin’ny Baiboly ny sandry matetika dia entina milaza ny hery, jereo ohatra Lk 1.51.
  - type: text
    content: ' mpanjakan’i Ejipta. Tsy nisy nitsabo na nanome fanafody azy, tsy nisy namehy ny feriny mba hampody ny heriny hahatan-tsabatra indray. '
  '22':
  - type: text
    content: 'Koa Izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hirotsaka hamely ny Farao mpanjakan’i Ejipta Aho. Ny sandriny roa mihitsy no hopotehiko, tsy ilay efa potika ihany fa ilay mbola matanjaka koa, ka hataoko latsaka avy eny an-tanany ny sabany! '
  '23':
  - type: text
    content: 'Ary haeliko any amin’ireo firenena sy haparitako any amin’ny tany samy hafa ny Ejiptianina. '
  '24':
  - type: text
    content: 'Homeko tanjaka ny sandrin’ny mpanjakan’i Babilôna ka ny sabatro mihitsy no hapetrako eo an-tanany. Ary ny Farao, izay efa nopotehiko ny sandriny, dia ho faty mitoloko toy ny voaratra eo anoloan’ny fahavalony. '
  '25':
  - type: text
    content: 'Eny, hiraviravy tsy hanan-kery ny sandrin’ny Farao; fa homeko tanjaka kosa ny sandrin’ny mpanjakan’i Babilôna, ka ny sabatro mihitsy no hapetrako eo an-tanany sy harangarangany hamelezana an’i Ejipta. Amin’izay dia hoekena fa Izaho no TOMPO. '
  '26':
  - type: text
    content: Haeliko any amin’ireo firenena sy haparitako any amin’ny tany samy hafa ny Ejiptianina; ka amin’izay dia hoekena fa Izaho no TOMPO›. »
  '3':
  - type: text
    content: 'Fa antomotra izy, eny, antomotra ny androm-pamaizan’ny TOMPO. Ho andro vesaran-drahona izany, ary fotoana hifamelezan’ny firenena. '
  '4':
  - type: text
    content: 'Hiditra any Ejipta ny ady, ka hampangorohoro hatrany Etiôpia izany. Hiampatrampatra ny fatin’ny Ejiptianina, ary horobaina ny hareny ka hatao rava mbamin’ny fanorenany. '
  '5':
  - type: text
    content: Ny olona avy any Etiôpia sy Pota ary Loda, ny olona avy any Arabia manontolo sy Libia, mbamin’ny teraky ny vahoakako aza, dia hisy ho faty an’ady
  - type: note
    content: 'Pota sy Loda: jereo nta Is 66.19. –Libia: araka ny dkt tranainy grika izany, fa ny RM kosa manao hoe Kobo izay tany tsy dia fantatra loatra. –mbamin’ny teraky ny vahoakako aza: tamin’izany vanim-potoana izany dia efa nisy andiana Israelita tany Ejipta, jereo Jer 43 sy 44.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Izao no lazain’ny TOMPO: Hatreo Migdôla any avaratra ka hatrany Asoana any atsimo dia ho faty an’ady ireo mpiaro an’i Ejipta, ary ho fefika ny tafiny miavonavona; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '7':
  - type: text
    content: 'Ho rava dia ho rava ny taniny, ary ho lao dia ho lao ny tanànany. '
  '8':
  - type: text
    content: 'Ary rehefa hodorako amin’ny afo i Ejipta sady haringako ireo rehetra mpiaro azy, dia hoekena amin’izay fa Izaho no TOMPO. '
  '9':
  - type: text
    content: Amin’izany andro handravako an’i Ejipta izany, dia hisy iraka avy amiko handeha an-tsambo hampandre ny Etiôpianina; ka izy no hampatahotra sy hampangorohoro ny Etiôpianina izay mitoetra tsy manahy. Eny, indro avy izany andro izany.
