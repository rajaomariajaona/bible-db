document_id: 2TH.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay mpanao ratsy
  - type: text
    content: 'Ny amin’ny andro hiavian’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika sy hanangonana antsika ho eo aminy, ry havana, dia izao no angatahinay aminareo'
  - type: note
    content: Ampit 1Tes 4.15-17.
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'sady hampiasa haratsiam-panahy amin’ny endrika samihafa hahavoafitaka ireo ho very. Ho very ireo satria tsy nandray ary tsy nandala ny hafatra marim-pototra tokony ho nahavonjy azy; '
  '11':
  - type: text
    content: 'koa dia ny fahadisoan-kevitra no nalefan’Andriamanitra hiasa mahery tao aminy mba hinoan’ireo ny lainga; '
  '12':
  - type: text
    content: hany ka ho voaheloka avokoa izay rehetra tsy nino ilay hafatra marim-pototra fa finaritra nanao ratsy.
  - type: heading
    content: Nofidina mba ho voavonjy
  '13':
  - type: text
    content: Tsy maintsy velom-pisaorana mandrakariva an’Andriamanitra izahay ny aminareo, ry havana notiavin’ny Tompo. Fa nofidin’Andriamanitra ho toy ny santa-bokatra hatolotra Azy ianareo
  - type: note
    content: 'ho toy ny santa-bokatra hatolotra Azy ianareo: misy stf sasany ahitana hoe hatrany am-piandohana ianareo.'
  - type: text
    content: ', ka hahazo famonjena noho ianareo voatokan’ny Fanahy Masina mba ho an’Andriamanitra ary noho ianareo nino ny hafatra marim-pototra. '
  '14':
  - type: text
    content: 'Izany no niantsoan’Andriamanitra anareo, tamin’ny alalan’ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' notorînay, mba hahazoanareo miombom-boninahitra amin’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika. '
  '15':
  - type: text
    content: Koa mamahara tsara, ry havana, ary tano ny fampianarana natolotray anareo am-bava na an-taratasy.
  '16':
  - type: text
    content: 'Enga anie i Jesoa Kristy Tompontsika sy ilay Andriamanitra Raintsika Izay efa tia antsika ka nanome antsika fampiononana mandrakizay sy fanantenana tsara tamin’ny alalan’ny fahasoavany '
  '17':
  - type: text
    content: hampionona ny fonareo ary hampahery anareo hanao izay tsara rehetra na amin’ny asa na amin’ny teny.
  '2':
  - type: text
    content: 'aza mety hohozongozonin-tsaina na hampitahorina mora foana ianareo, satria misy milaza fa efa tonga sahady ny andro hiavian’ny Tompo. Mety ho fanomezam-pahasoavana hampita hafatra avy amin’Andriamanitra na mety ho toriteny no nilazan’olona izany taminareo, na mety koa ho taratasy hamboina ho avy aminay. '
  '3':
  - type: text
    content: 'Aza mety hofitahin’olona mihitsy ianareo; satria tsy ho tonga izany andro izany raha tsy efa mitranga ny fikomiana farany amin’Andriamanitra ary aseho ilay mpanao ratsy, ilay mirona amin’ny fahaverezana. '
  '4':
  - type: text
    content: 'Hijoroan’ilay mpanao ratsy ho fahavalo sady hotoheriny avokoa izay rehetra ataon’ny olona ho andriamanitra na izay rehetra toloran’ny olona fanompoam-pivavahana; hidirany sy hipetrahany hatramin’ny '
  - type: text
    content: tempolin’Andriamanitra
  - type: text
    content: ' aza, ka ny tenany no hanora-tena ho Andriamanitra'
  - type: note
    content: Ampit Dan 11.36; Ezek 28.2.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Tsy tadidinareo ve fa voalazako anareo izany fony aho mbola tatỳ aminareo? '
  '6':
  - type: text
    content: 'Fantatrareo izao ny zava-misakana ilay mpanao ratsy, mba tsy hisehoany raha tsy amin’ny fotoanandrony. '
  '7':
  - type: text
    content: Eny, efa miasa tokoa ny hery miafin’ny fanaovan-dratsy; saingy tsy hitranga ilay mpanao ratsy raha mbola eo ihany ilay olona misakana azy
  - type: note
    content: Saro-pantarina izay alehan’ny sain’i Paoly momba io «zava-misakana» io (and 6) sy ny amin’ilay «olona misakana» (and 7), izay anton’ny mahela fisehoana an’ilay mpanohitra an’i Kristy (jereo and 8).
  - type: text
    content: '. '
  '8':
  - type: text
    content: Ary rehefa hiseho ilay mpanao ratsy, dia ny fofonaina avy amin’ny vavan’i Jesoa Tompo no hahafaty azy ary ny fiavian’i Jesoa amim-boninahitra no hanafoana azy
  - type: note
    content: Ampit Is 11.4.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Ombàn’ny herin’i '
  - type: text
    content: Satàna
  - type: text
    content: ' no hiavian’ilay mpanao ratsy, ka hahavita karazan’asa mahagaga sy famantarana ary zava-mahatalanjona manodoka olona izy'
  - type: note
    content: Ampit Mt 24.24.
  - type: text
    content: ', '
