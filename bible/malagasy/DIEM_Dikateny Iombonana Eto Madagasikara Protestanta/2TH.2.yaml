document_id: 2TH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay mpanao ratsy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny amin’ny andro hiavian’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika sy hanangonana antsika ho eo aminy, ry havana, dia izao no angatahinay aminareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Tes 4.15-17.
    marker-yv: yv-n
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'aza mety hohozongozonin-tsaina na hampitahorina mora foana ianareo, satria misy milaza fa efa tonga sahady ny andro hiavian’ny Tompo. Mety ho fanomezam-pahasoavana hampita hafatra avy amin’Andriamanitra na mety ho toriteny no nilazan’olona izany taminareo, na mety koa ho taratasy hamboina ho avy aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aza mety hofitahin’olona mihitsy ianareo; satria tsy ho tonga izany andro izany raha tsy efa mitranga ny fikomiana farany amin’Andriamanitra ary aseho ilay mpanao ratsy, ilay mirona amin’ny fahaverezana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hijoroan’ilay mpanao ratsy ho fahavalo sady hotoheriny avokoa izay rehetra ataon’ny olona ho andriamanitra na izay rehetra toloran’ny olona fanompoam-pivavahana; hidirany sy hipetrahany hatramin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempolin’Andriamanitra
  - type: text
    text: ' aza, ka ny tenany no hanora-tena ho Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 11.36; Ezek 28.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy tadidinareo ve fa voalazako anareo izany fony aho mbola tatỳ aminareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fantatrareo izao ny zava-misakana ilay mpanao ratsy, mba tsy hisehoany raha tsy amin’ny fotoanandrony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eny, efa miasa tokoa ny hery miafin’ny fanaovan-dratsy; saingy tsy hitranga ilay mpanao ratsy raha mbola eo ihany ilay olona misakana azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Saro-pantarina izay alehan’ny sain’i Paoly momba io «zava-misakana» io (and 6) sy ny amin’ilay «olona misakana» (and 7), izay anton’ny mahela fisehoana an’ilay mpanohitra an’i Kristy (jereo and 8).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary rehefa hiseho ilay mpanao ratsy, dia ny fofonaina avy amin’ny vavan’i Jesoa Tompo no hahafaty azy ary ny fiavian’i Jesoa amim-boninahitra no hanafoana azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 11.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ombàn’ny herin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' no hiavian’ilay mpanao ratsy, ka hahavita karazan’asa mahagaga sy famantarana ary zava-mahatalanjona manodoka olona izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 24.24.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sady hampiasa haratsiam-panahy amin’ny endrika samihafa hahavoafitaka ireo ho very. Ho very ireo satria tsy nandray ary tsy nandala ny hafatra marim-pototra tokony ho nahavonjy azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'koa dia ny fahadisoan-kevitra no nalefan’Andriamanitra hiasa mahery tao aminy mba hinoan’ireo ny lainga; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: hany ka ho voaheloka avokoa izay rehetra tsy nino ilay hafatra marim-pototra fa finaritra nanao ratsy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nofidina mba ho voavonjy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy maintsy velom-pisaorana mandrakariva an’Andriamanitra izahay ny aminareo, ry havana notiavin’ny Tompo. Fa nofidin’Andriamanitra ho toy ny santa-bokatra hatolotra Azy ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ho toy ny santa-bokatra hatolotra Azy ianareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hatrany am-piandohana ianareo.
    marker-yv: yv-n
  - type: text
    text: ', ka hahazo famonjena noho ianareo voatokan’ny Fanahy Masina mba ho an’Andriamanitra ary noho ianareo nino ny hafatra marim-pototra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany no niantsoan’Andriamanitra anareo, tamin’ny alalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' notorînay, mba hahazoanareo miombom-boninahitra amin’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa mamahara tsara, ry havana, ary tano ny fampianarana natolotray anareo am-bava na an-taratasy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Enga anie i Jesoa Kristy Tompontsika sy ilay Andriamanitra Raintsika Izay efa tia antsika ka nanome antsika fampiononana mandrakizay sy fanantenana tsara tamin’ny alalan’ny fahasoavany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: hampionona ny fonareo ary hampahery anareo hanao izay tsara rehetra na amin’ny asa na amin’ny teny.
