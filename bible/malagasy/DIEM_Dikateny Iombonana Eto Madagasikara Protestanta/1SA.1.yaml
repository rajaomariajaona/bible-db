document_id: 1SA.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elkanà sy ny fianakaviany tao Silao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tao Ramà, tany amin’ny faritra be tendrombohitra any Efraîma, dia nisy lehilahy anankiray anisan’ny taranak’i Tsofo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ramà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 40 km any avaratra andrefan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: '. Io lehilahy io dia natao hoe Elkanà, zanak’i Jerohama, zafikelin’i Elihò, zafiafin’i Tôhò ary zafindohalik’i Tsofo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nanam-bady roa izy, dia i Hanà sy i Peninà. I Peninà dia nanan-janaka, fa i Hanà kosa tsy mba niteraka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Isan-taona i Elkanà dia nandao an’i Ramà tanànany mba hivavaka sy hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' amin’ny TOMPOn’izao rehetra izao tany Silao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Silao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 30 km any avaratr’i Jerosalema (jereo Jos 18.1-10).
    marker-yv: yv-n
  - type: text
    text: '; mpisoron’ny TOMPO tao koa i Hôfnỳ sy i Pinehasa zanakalahin’i Helỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fanaon’i Elkanà rehefa manao sorona ny manome anjara ho an’i Peninà sy ny zanany rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa i Hanà kosa dia notolorany anjara manokana, satria tiany aoka izany izy na dia nataon’ny TOMPO momba aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nitady hatrany izay hanorisorenana an’i Hanà anefa ny rafivaviny, ka nandrabiraby azy noho io nanaovan’ny TOMPO azy momba io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary isan-taona dia izany foana no zava-mitranga rehefa mba tonga ao an-tranon’ny TOMPO i Hanà; nanao izay hampalahelo azy foana i Peninà, ka nitomany sy tsy nety nihinan-kanina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Elkanà vadiny taminy: «Hanà ô, nahoana ange ianao no mitomany sy tsy mety mihinan-kanina? Nahoana koa ianao no malahelo toa izao, moa tsy mihoatra noho ny zanaka folo ve ny tenako aminao?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Indray andro, tao Silao, rehefa tapi-nisakafo ny olona, dia nitsangana i Hanà fa i Helỳ mpisorona kosa nipetraka teo an-tokonam-baravaran’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nalahelo mafy i Hanà, ka sady nigogogogo nitomany no nanao tamin’ny Tompo izao vavaka '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'sy voady izao: «Ry TOMPOn’izao rehetra izao ô, mba jereo tokoa ny alaheloko ka tsarovy fa aza hadinoina; raha mba omenao zanakalahy anankiray aho, dia hatolotro ho ANAO kosa izy amin’ny androny rehetra; ka tsy hokasihin-kareza ny lohany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsy hokasihin-kareza ny lohany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 6.1-21.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha mbola naharitra nivavaka teo anatrehan’ny TOMPO i Hanà, dia nodinihin’i Helỳ ny vavany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'nivavaka am-po izy, ka ny molony ihany no hita mihetsiketsika, fa tsy re akory izay feony. I Helỳ kosa efa nihevitra azy ho mamo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mbola haharitra ve ny fahamamoanao? Ndeha ampisindao aloha izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia novalian’i Hanà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsia, tompoko, tsy mamo aho. Malahelo fotsiny aho fa tsy nisotro divay na zava-pisotro mahamamo hafa akory. Mamboraka ny ato am-poko eto anatrehan’ny TOMPO aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aza heverinao ho toy ny vehivavy ratsy fanahy aho; fa raha nivavaka ela aho, dia satria efa tsy tantiko intsony ny alahelom-poko sy ny fahoriam-panahiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Helỳ hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana amim-piadanana, ary homen’ilay Andriamanitr’i Israely anao anie izay nangatahinao taminy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niteny indray i Hanà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho tsara fo amiko hatrany anie ianao!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia lasa i Hanà ary nihinan-kanina, ka mirana endrika tsy toy ny teo aloha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny ampitso vao maraina, rehefa avy nivavaka tamin’ny TOMPO i Elkanà sy ny fianakaviany, dia nody tany Ramà.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahaterahan’i Samoela sy ny fahazazàny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary i Elkanà niray tamin’i Hanà vadiny, ary nohenoin’ny TOMPO ny vavaka nataon-dravehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia bevohòka i Hanà, ka tera-dahy, sady loa-bava hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny anarany dia hataoko hoe Samoela, satria nangatahiko tamin’ny TOMPO izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny teny hebreo, misy fitovitoviana be eo amin’ny anarana samirery hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samoela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy ny matoanteny midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mangataka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niakatra nankany Silao indray i Elkanà sy ny fianakaviany mba hanao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanao isan-taona amin’ny TOMPO ary hanefa ny voadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tsy niaraka tamin’ny vadiny i Hanà tamin’ity indray maka ity; fa hoy izy taminy: «Aoka aloha hisara-nono ny zaza, vao hoentiko hiseho eo anatrehan’ny TOMPO, ary dia hitoetra eo mandrakizay izy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary namaly azy i Elkanà hoe: «Tsara izany, ataovy izay fantatrao fa mety; mijanòna ihany àry atỳ mandra-pisara-nono ny zaza. Hotanterahin’ny TOMPO anie ny fampanantenainy!»'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nijanona tao Ramà nampinono ny zanany i Hanà mandra-pisara-nono azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary rehefa nisara-nono ny zaza, dia nentiny nankany an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' tao Silao, na dia mbola vao mena vava aza. Ireto no nentin’izy mivady niaraka tamin’ny zaza: vantotr’ombilahy telo taona sy lafarinina iray gony ary divay eran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: siny hoditra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Novonoiny natao sorona ilay vantotr’omby, ary nentiny tany amin’i Helỳ ny zaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy i Hanà tamin’i Helỳ:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Azafady tompoko, tsaroanao ve ilay vehivavy nitsangana teto indray andro tsy lavitra anao akory, ary nivavaka tamin’ny TOMPO? Raha marina fa velona koa ny ainao, dia izaho izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny hananako ity zaza ity no nivavahako; ary dia nomen’ny TOMPO ahy izay nangatahiko taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Koa anjarako kosa ny manolotra azy ho an’ny TOMPO; eny, mandritra ny androny rehetra, dia ho an’ny TOMPO izy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nivavaka tamin’ny TOMPO izy mianakavy.
