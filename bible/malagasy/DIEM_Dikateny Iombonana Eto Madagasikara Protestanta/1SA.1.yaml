document_id: 1SA.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Elkanà sy ny fianakaviany tao Silao
  - type: text
    content: Tao Ramà, tany amin’ny faritra be tendrombohitra any Efraîma, dia nisy lehilahy anankiray anisan’ny taranak’i Tsofo
  - type: note
    content: 'Ramà: tanàna tokony ho 40 km any avaratra andrefan’i Jerosalema.'
  - type: text
    content: '. Io lehilahy io dia natao hoe Elkanà, zanak’i Jerohama, zafikelin’i Elihò, zafiafin’i Tôhò ary zafindohalik’i Tsofo. '
  '10':
  - type: text
    content: 'Nalahelo mafy i Hanà, ka sady nigogogogo nitomany no nanao tamin’ny Tompo izao vavaka '
  '11':
  - type: text
    content: 'sy voady izao: «Ry TOMPOn’izao rehetra izao ô, mba jereo tokoa ny alaheloko ka tsarovy fa aza hadinoina; raha mba omenao zanakalahy anankiray aho, dia hatolotro ho ANAO kosa izy amin’ny androny rehetra; ka tsy hokasihin-kareza ny lohany'
  - type: note
    content: 'Tsy hokasihin-kareza ny lohany: jereo Nom 6.1-21.'
  - type: text
    content: '.» '
  '12':
  - type: text
    content: 'Raha mbola naharitra nivavaka teo anatrehan’ny TOMPO i Hanà, dia nodinihin’i Helỳ ny vavany; '
  '13':
  - type: text
    content: 'nivavaka am-po izy, ka ny molony ihany no hita mihetsiketsika, fa tsy re akory izay feony. I Helỳ kosa efa nihevitra azy ho mamo, '
  '14':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: –Mbola haharitra ve ny fahamamoanao? Ndeha ampisindao aloha izany!
  '15':
  - type: text
    content: 'Dia novalian’i Hanà hoe:'
  - type: text
    content: '–Tsia, tompoko, tsy mamo aho. Malahelo fotsiny aho fa tsy nisotro divay na zava-pisotro mahamamo hafa akory. Mamboraka ny ato am-poko eto anatrehan’ny TOMPO aho. '
  '16':
  - type: text
    content: Aza heverinao ho toy ny vehivavy ratsy fanahy aho; fa raha nivavaka ela aho, dia satria efa tsy tantiko intsony ny alahelom-poko sy ny fahoriam-panahiko.
  '17':
  - type: text
    content: 'Dia hoy i Helỳ hoe:'
  - type: text
    content: –Mandehana amim-piadanana, ary homen’ilay Andriamanitr’i Israely anao anie izay nangatahinao taminy!
  '18':
  - type: text
    content: 'Ary niteny indray i Hanà hoe:'
  - type: text
    content: –Ho tsara fo amiko hatrany anie ianao!
  - type: text
    content: Dia lasa i Hanà ary nihinan-kanina, ka mirana endrika tsy toy ny teo aloha.
  '19':
  - type: text
    content: Ny ampitso vao maraina, rehefa avy nivavaka tamin’ny TOMPO i Elkanà sy ny fianakaviany, dia nody tany Ramà.
  - type: heading
    content: Ny fahaterahan’i Samoela sy ny fahazazàny
  - type: text
    content: 'Ary i Elkanà niray tamin’i Hanà vadiny, ary nohenoin’ny TOMPO ny vavaka nataon-dravehivavy. '
  '2':
  - type: text
    content: Nanam-bady roa izy, dia i Hanà sy i Peninà. I Peninà dia nanan-janaka, fa i Hanà kosa tsy mba niteraka.
  '20':
  - type: text
    content: 'Dia bevohòka i Hanà, ka tera-dahy, sady loa-bava hoe:'
  - type: text
    content: –Ny anarany dia hataoko hoe Samoela, satria nangatahiko tamin’ny TOMPO izy
  - type: note
    content: Amin’ny teny hebreo, misy fitovitoviana be eo amin’ny anarana samirery hoe Samoela sy ny matoanteny midika hoe mangataka.
  - type: text
    content: .
  '21':
  - type: text
    content: 'Dia niakatra nankany Silao indray i Elkanà sy ny fianakaviany mba hanao ny '
  - type: text
    content: sorona
  - type: text
    content: ' fanao isan-taona amin’ny TOMPO ary hanefa ny voadiny. '
  '22':
  - type: text
    content: 'Tsy niaraka tamin’ny vadiny i Hanà tamin’ity indray maka ity; fa hoy izy taminy: «Aoka aloha hisara-nono ny zaza, vao hoentiko hiseho eo anatrehan’ny TOMPO, ary dia hitoetra eo mandrakizay izy.» '
  '23':
  - type: text
    content: 'Ary namaly azy i Elkanà hoe: «Tsara izany, ataovy izay fantatrao fa mety; mijanòna ihany àry atỳ mandra-pisara-nono ny zaza. Hotanterahin’ny TOMPO anie ny fampanantenainy!»'
  - type: text
    content: Dia nijanona tao Ramà nampinono ny zanany i Hanà mandra-pisara-nono azy.
  '24':
  - type: text
    content: Ary rehefa nisara-nono ny zaza, dia nentiny nankany an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' tao Silao, na dia mbola vao mena vava aza. Ireto no nentin’izy mivady niaraka tamin’ny zaza: vantotr’ombilahy telo taona sy lafarinina iray gony ary divay eran’ny '
  - type: text
    content: siny hoditra
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Novonoiny natao sorona ilay vantotr’omby, ary nentiny tany amin’i Helỳ ny zaza. '
  '26':
  - type: text
    content: 'Dia hoy i Hanà tamin’i Helỳ:'
  - type: text
    content: '–Azafady tompoko, tsaroanao ve ilay vehivavy nitsangana teto indray andro tsy lavitra anao akory, ary nivavaka tamin’ny TOMPO? Raha marina fa velona koa ny ainao, dia izaho izy. '
  '27':
  - type: text
    content: 'Ny hananako ity zaza ity no nivavahako; ary dia nomen’ny TOMPO ahy izay nangatahiko taminy. '
  '28':
  - type: text
    content: Koa anjarako kosa ny manolotra azy ho an’ny TOMPO; eny, mandritra ny androny rehetra, dia ho an’ny TOMPO izy.
  - type: text
    content: Dia nivavaka tamin’ny TOMPO izy mianakavy.
  '3':
  - type: text
    content: 'Isan-taona i Elkanà dia nandao an’i Ramà tanànany mba hivavaka sy hanao '
  - type: text
    content: sorona
  - type: text
    content: ' amin’ny TOMPOn’izao rehetra izao tany Silao'
  - type: note
    content: 'Silao: tanàna tokony ho 30 km any avaratr’i Jerosalema (jereo Jos 18.1-10).'
  - type: text
    content: '; mpisoron’ny TOMPO tao koa i Hôfnỳ sy i Pinehasa zanakalahin’i Helỳ. '
  '4':
  - type: text
    content: 'Fanaon’i Elkanà rehefa manao sorona ny manome anjara ho an’i Peninà sy ny zanany rehetra; '
  '5':
  - type: text
    content: 'fa i Hanà kosa dia notolorany anjara manokana, satria tiany aoka izany izy na dia nataon’ny TOMPO momba aza. '
  '6':
  - type: text
    content: 'Nitady hatrany izay hanorisorenana an’i Hanà anefa ny rafivaviny, ka nandrabiraby azy noho io nanaovan’ny TOMPO azy momba io. '
  '7':
  - type: text
    content: 'Ary isan-taona dia izany foana no zava-mitranga rehefa mba tonga ao an-tranon’ny TOMPO i Hanà; nanao izay hampalahelo azy foana i Peninà, ka nitomany sy tsy nety nihinan-kanina izy. '
  '8':
  - type: text
    content: 'Dia hoy i Elkanà vadiny taminy: «Hanà ô, nahoana ange ianao no mitomany sy tsy mety mihinan-kanina? Nahoana koa ianao no malahelo toa izao, moa tsy mihoatra noho ny zanaka folo ve ny tenako aminao?»'
  '9':
  - type: text
    content: 'Indray andro, tao Silao, rehefa tapi-nisakafo ny olona, dia nitsangana i Hanà fa i Helỳ mpisorona kosa nipetraka teo an-tokonam-baravaran’ny TOMPO. '
