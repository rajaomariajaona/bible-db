document_id: 3JN.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: Avy amiko loholona ity taratasy ity. Mamangy anao aho, ry Gaio
  - type: note
    content: 'Gaio: jereo Asa 19.29; Rm 16.23; 1Kôr 1.14.'
  - type: text
    content: ', hava-malala izay tiako marina tokoa.'
  '10':
  - type: text
    content: Noho izany, rehefa tonga aho, dia hotsarovako ny asa ataony, amin’izy mibedibedy foana manaratsy anay; sady tsy afa-pon’izany, fa ny tenany tsy mety mandray ireo havana iray finoana, ary izay te handray ireo koa sakanany sy roahiny hiala amin’ny Fiangonana.
  '11':
  - type: text
    content: Aza maka tahaka ny ratsy, rahavako, fa ny tsara. Izay manao ny tsara no avy amin’Andriamanitra; izay manao ny ratsy kosa tsy mba nahita an’Andriamanitra.
  '12':
  - type: text
    content: Ny amin’i Demètry dia ny olona rehetra sy ny hafatra marim-pototra iainany no vavolombelon’ny mahatsara laza azy. Izahay koa dia vavolombelon’izany, ary fantatrao fa azo antoka ny fijoroanay ho vavolombelona.
  - type: heading
    content: Famaranana
  '13':
  - type: text
    content: 'Manan-javatra maro hosoratana aminao aho, nefa tsy tiako hatao amin’ny ranomainty sy ny penina izany. '
  '14':
  - type: text
    content: Fa manantena hahita anao faingana aho, ka dia hiresaka hifanatrika isika.
  '15':
  - type: text
    content: Ho aminao anie ny fiadanana!
  - type: text
    content: Manao veloma anao ireo sakaiza atỳ. Veloma any amin’ireo sakaiza tsirairay avy.
  '2':
  - type: text
    content: 'Mangataka amin’Andriamanitra aho, rahavako, mba hambinina amin’ny zavatra rehetra ianao ary mba ho salama tsara, tahaka izay anambinana anao ara-panahy. '
  '3':
  - type: text
    content: 'Faly tokoa aho, fony nisy havana iray finoana tonga ka nijoro ho vavolombelona nanambara tamiko fa mifikitra amin’ny hafatra marim-pototra ianao, araka ny efa iainanao an’izany. '
  '4':
  - type: text
    content: Tsy misy mahafaly ahy mihoatra noho ny andrenesako fa miaina ny hafatra marim-pototra ireo zanako.
  - type: heading
    content: Mifikitra amin’ny hafatra marim-pototra tokoa i Gaio
  '5':
  - type: text
    content: 'Asan’olona mahatoky, rahavako, no ataonao na inona na inona tontosainao amin’ny havana iray finoana, na dia vahiny mandalo aza izy. '
  '6':
  - type: text
    content: Ireo no nanambara teo anatrehan’ny Fiangonana
  - type: note
    content: 'Fiangonana: araka ny and 3, dia ny Fiangonana misy ny mpanoratra izany.'
  - type: text
    content: ' izany fitiavanao izany. Dia ho soa no hataonao, raha manatitra sy mamatsy azy ireo amin’ny diany ianao, araka izay fomba mendrika an’Andriamanitra; '
  '7':
  - type: text
    content: 'fa ho voninahitr’i '
  - type: text
    content: Kristy
  - type: text
    content: ' no niaingan’ireo sady tsy anekeny handray na inona na inona avy amin’ny tsy kristianina. '
  '8':
  - type: text
    content: Koa isika no tokony hanohana ny olona toy ireny mba ho mpiara-miasa aminy hampiely ny hafatra marim-pototra.
  - type: heading
    content: I Diôtrèfa sy i Demètry
  '9':
  - type: text
    content: Efa nanoratra tamin’ny Fiangonana ihany aho; saingy i Diôtrèfa, izay te hanjakazaka olona, no tsy nankatò anay
  - type: note
    content: 'Fiangonana: eto kosa dia ny Fiangonana misy an’i Gaio sy i Diôtrèfa, ka tadiavin’ity Diôtrèfa ity hokorontanina. –anay: dia toa manondro ny loholona izay mpanoratra sy ireo loholona namany miombom-pahefana aminy. Jereo koa ny and 10 (anay) sy ny and 12 (izahay, fanambarànay).'
  - type: text
    content: '. '
