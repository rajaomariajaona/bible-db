document_id: 3JN.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy amiko loholona ity taratasy ity. Mamangy anao aho, ry Gaio
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gaio: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Asa 19.29; Rm 16.23; 1Kôr 1.14.
      marker-yv: yv-n
    - type: text
      text: ', hava-malala izay tiako marina tokoa.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany, rehefa tonga aho, dia hotsarovako ny asa ataony, amin’izy mibedibedy foana manaratsy anay; sady tsy afa-pon’izany, fa ny tenany tsy mety mandray ireo havana iray finoana, ary izay te handray ireo koa sakanany sy roahiny hiala amin’ny Fiangonana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza maka tahaka ny ratsy, rahavako, fa ny tsara. Izay manao ny tsara no avy amin’Andriamanitra; izay manao ny ratsy kosa tsy mba nahita an’Andriamanitra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin’i Demètry dia ny olona rehetra sy ny hafatra marim-pototra iainany no vavolombelon’ny mahatsara laza azy. Izahay koa dia vavolombelon’izany, ary fantatrao fa azo antoka ny fijoroanay ho vavolombelona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famaranana
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manan-javatra maro hosoratana aminao aho, nefa tsy tiako hatao amin’ny ranomainty sy ny penina izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa manantena hahita anao faingana aho, ka dia hiresaka hifanatrika isika.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho aminao anie ny fiadanana!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anao ireo sakaiza atỳ. Veloma any amin’ireo sakaiza tsirairay avy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mangataka amin’Andriamanitra aho, rahavako, mba hambinina amin’ny zavatra rehetra ianao ary mba ho salama tsara, tahaka izay anambinana anao ara-panahy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faly tokoa aho, fony nisy havana iray finoana tonga ka nijoro ho vavolombelona nanambara tamiko fa mifikitra amin’ny hafatra marim-pototra ianao, araka ny efa iainanao an’izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy misy mahafaly ahy mihoatra noho ny andrenesako fa miaina ny hafatra marim-pototra ireo zanako.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mifikitra amin’ny hafatra marim-pototra tokoa i Gaio
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asan’olona mahatoky, rahavako, no ataonao na inona na inona tontosainao amin’ny havana iray finoana, na dia vahiny mandalo aza izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no nanambara teo anatrehan’ny Fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Fiangonana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny and 3, dia ny Fiangonana misy ny mpanoratra izany.
      marker-yv: yv-n
    - type: text
      text: ' izany fitiavanao izany. Dia ho soa no hataonao, raha manatitra sy mamatsy azy ireo amin’ny diany ianao, araka izay fomba mendrika an’Andriamanitra; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ho voninahitr’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no niaingan’ireo sady tsy anekeny handray na inona na inona avy amin’ny tsy kristianina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa isika no tokony hanohana ny olona toy ireny mba ho mpiara-miasa aminy hampiely ny hafatra marim-pototra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Diôtrèfa sy i Demètry
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nanoratra tamin’ny Fiangonana ihany aho; saingy i Diôtrèfa, izay te hanjakazaka olona, no tsy nankatò anay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Fiangonana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eto kosa dia ny Fiangonana misy an’i Gaio sy i Diôtrèfa, ka tadiavin’ity Diôtrèfa ity hokorontanina. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'anay:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia toa manondro ny loholona izay mpanoratra sy ireo loholona namany miombom-pahefana aminy. Jereo koa ny and 10 (anay) sy ny and 12 (izahay, fanambarànay).'
      marker-yv: yv-n
    - type: text
      text: '. '
