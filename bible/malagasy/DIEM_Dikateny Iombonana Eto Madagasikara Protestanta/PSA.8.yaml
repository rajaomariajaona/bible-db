  '2':
  - type: text
    content: TOMPO Andriamanitray ô,
  - type: text
    content: endrey ny halehiben’ny voninahitrao
  - type: text
    content: manerana ny tany tontolo!
  - type: text
    content: Nataonao manoatra ny lanitra ny fiandriananao.
  '3':
  - type: text
    content: Kanefa ny feon’ny ankizy madinika
  - type: note
    content: And voatsiahy ao amin’ny Mt 21.16.
  - type: text
    content: ','
  - type: text
    content: eny, ny feon’ireo zaza mbola minono aza
  - type: text
    content: no anoheranao ny mpandrafy Anao;
  - type: text
    content: ary izany dia toy ny manda natsanganao
  - type: text
    content: hampanginanao ireo fahavalonao
  - type: text
    content: sy izay te hamaly ratsy.
  '4':
  - type: text
    content: Raha jereko ny lanitra asan-tananao
  - type: text
    content: sy ny volana aman-kintana napetrakao eny,
  '5':
  - type: text
    content: dia mba inona moa ny olombelona no tsarovanao,
  - type: text
    content: sy izay zanak’olombelona no karakarainao
  - type: note
    content: Ampit Sal 144.3; Jôb 7.17.
  - type: text
    content: '?'
  '6':
  - type: text
    content: 'Fa nataonao latsaka kely noho ny '
  - type: text
    content: anjely
  - type: text
    content: ' izy'
  - type: note
    content: 'latsaka... izy: jereo Sal 29.1 sy nta; 82.1.'
  - type: text
    content: ','
  - type: text
    content: ka nosatrohanao voninahitra sy fiandrianana;
  '7':
  - type: text
    content: 'nampanjakainao amin’ny asan-tananao:'
  - type: text
    content: nataonao ho eo an-tongony ny zava-drehetra
  - type: note
    content: 'And 5-7: Heb 2.6-8. –And 7: 1Kôr 15,27; Ef 1.22.'
  - type: text
    content: ','
  '8':
  - type: text
    content: dia ny omby aman’ondry sy osy
  - type: text
    content: mbamin’ny bibidia any an-tsaha,
  '9':
  - type: text
    content: ny voro-manidina sy ny trondron-dranomasina
  - type: text
    content: izay miriaria manaraka ny onjan-driaka.
