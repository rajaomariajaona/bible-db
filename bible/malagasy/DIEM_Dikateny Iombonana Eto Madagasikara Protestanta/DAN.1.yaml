document_id: DAN.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Daniela sy ireo namany tany Babilôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona fahatelo nanjakan’i Jôiakima mpanjakan’i Joda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tamin’ny... mpanjakan’i Joda: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: io fanamarihana io dia mametraka ny zava-nitranga ho tamin’ny taona 606 tal J.K. (jereo 2 Mp 24.1; 2 Tan 36.5-7) na dia toe-javatra tamin’ny taonjato tal J.K. aza no atrehin’ny mpanoratra.
    marker-yv: yv-n
  - type: text
    text: ' dia tonga tany Jerosalema i Nebokadnetsara mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' ka nanao fahirano azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia natolotry ny Tompo teo an-tanany i Jôiakima mpanjakan’i Joda ary ny ampahan’ireo fanaka tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitra
  - type: text
    text: . Nentin’i Nebokadnetsara ho any Babilônia ireo olona babo; ny fanaka kosa nentiny ho ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoli
  - type: text
    text: n’ireo andriamaniny ary napetrany tao amin’ny efitrano firaketan’io tempoly io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tsy mazava ny RM amin’ny faran’ny and; ka azo atao koa ny mandika azy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Nentin’i Nebokadnetsara ireo fanaka ireo ho any Babilônia, ho ao an-tempolin’ireo andriamaniny, ka napetrany tao amin’ny efitrano firaketana.»
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary i Nebokadnetsara mpanjaka nandidy an’i Aspenaza lehiben’ireo tandapany mba hitondra tovolahy israelita avy amin’ny tarana-mpanjaka sy ny fianakavian’andriana sasany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ireo tovolahy ireo tsy tokony hisy kilema ara-batana fa ho tsara tarehy sady ho feno fahendrena sy manam-pahalalana ary lalim-pahaizana, ka ho afaka hanompo ao an-dapan’ny mpanjaka. Hampianarina ny soratra sy ny fiteny babilônianina izy ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 20.17-18; 24.10-16; 2 Tan 36.10; Is 39.6-7.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nasain’ny mpanjaka hanokanana sakafo sy divay isan’andro avy amin’ny hanina amam-pisotrony izy ireo ary koa hampianarina mandritra ny telo taona. Rehefa izany dia hanompo ny mpanjaka izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Anisan’ireo voafidy tao amin’ny fokon’i Joda i Daniela sy i Hananià ary i Misaela sy i Hazarià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nomen’ny lehiben’ny tandapa anarana vaovao izy ireo, ka i Daniela nantsoiny hoe Beltesatsara, i Hananià nantsoiny hoe Sadràka, i Misaela nantsoiny hoe Mesàka, ary i Hazarià nantsoiny hoe Habeda-Negao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny hevitry ny teny hebreo hoe '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Daniela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia «Andriamanitra no mpitsarako.» Ny anaram-baovao noraisin’ireo zatovo dia mampiseho ny fahefana ananan’ny mpanjaka amin’izy ireo (ampit Fiand 17.5; 32.29 Lk 6.14).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hentitra ny fanapahan-kevitr’i Daniela fa tsy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: handoto
  - type: text
    text: ' tena amin’izay sakafon’ny mpanjaka na ny divay fisotrony izy; koa nangataka tamin’ny lehiben’ny tandapa izy mba tsy hanery azy handoto tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nataon’Andriamanitra nahazo fitia sy indrafo teo anatrehan’ny lehiben’ny tandapa i Daniela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy ity lehiben’ny tandapa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny andriamanjaka no efa nampanokana ny ho sakafonareo sy ho fisotronareo; koa matahotra aho fandrao ianareo hitany mahia endrika mitaha amin’ireo zatovo mitovy taona aminareo, ka dia hotapahiny ny lohako noho ny aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy i Daniela tamin’ny mpiandraiki-draharaha izay voatendrin’ny lehiben’ny tandapa hikarakara azy sy i Hananià ary i Misaela sy i Hazarià:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '–Mba tsapao mandritra ny folo andro aloha izahay mpanomponao, ka anana sy rano ihany omena hohaninay sy hosotroinay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Avy eo dia hojerenao ny endrikay sy ny an’ireo zatovo izay mihinana ny hanina fihinan’ny mpanjaka, ka araka izay ho hitanao no hataonao aminay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nekeny izany soso-kevitra izany, ka notsapainy nandritra ny folo andro izy efa-dahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nony tapitra ny folo andro, dia hita fa tsara endrika sy natavy kokoa izy noho ny zatovo rehetra izay nihinana ny hanina fihinan’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa nesorin’ilay mpiandraiki-draharaha ny anjara hanina sy divain’izy efa-dahy, ka anana no nomeny azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ireo zatovo efa-dahy ireo dia nomen’Andriamanitra fahaizana amam-pahalalana amin’ny sehatra rehetra momba ny soratra sy ny fahendrena; ary i Daniela nahafantatra ny hevitry ny fahitana sy nofy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa tonga ny andro voatendrin’ny mpanjaka hitondrana ireto zatovo rehetra hankeo anatrehany, dia nentin’ilay lehiben’ny tandapa teo anoloan’i Nebokadnetsara ireo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary niresaka tamin’ireo ny mpanjaka, ka tsy nisy hita izay tahaka an’i Daniela sy i Hananià ary i Misaela sy i Habeda-Negao. Koa dia nanompo ny mpanjaka izy efa-dahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fony nanontany azy zavatra isan-karazany momba ny fahendrena sy fahaiza-manavaka kosa ny mpanjaka, dia nahatsapa fa nihoatra impolo heny noho ny mpanao majika aman-tsikidy rehetra tao amin’ny fanjakany manontolo ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary i Daniela dia nahatratra ny taona voalohany nanjakan’i Kirosy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Hez 1.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
