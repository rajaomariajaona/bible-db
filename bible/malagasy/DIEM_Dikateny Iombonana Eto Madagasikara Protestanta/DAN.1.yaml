document_id: DAN.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Daniela sy ireo namany tany Babilôna
  - type: text
    content: Tamin’ny taona fahatelo nanjakan’i Jôiakima mpanjakan’i Joda
  - type: note
    content: 'Tamin’ny... mpanjakan’i Joda: io fanamarihana io dia mametraka ny zava-nitranga ho tamin’ny taona 606 tal J.K. (jereo 2 Mp 24.1; 2 Tan 36.5-7) na dia toe-javatra tamin’ny taonjato tal J.K. aza no atrehin’ny mpanoratra.'
  - type: text
    content: ' dia tonga tany Jerosalema i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' ka nanao fahirano azy. '
  '10':
  - type: text
    content: 'Fa hoy ity lehiben’ny tandapa taminy:'
  - type: text
    content: –Ny andriamanjaka no efa nampanokana ny ho sakafonareo sy ho fisotronareo; koa matahotra aho fandrao ianareo hitany mahia endrika mitaha amin’ireo zatovo mitovy taona aminareo, ka dia hotapahiny ny lohako noho ny aminareo.
  '11':
  - type: text
    content: 'Dia hoy i Daniela tamin’ny mpiandraiki-draharaha izay voatendrin’ny lehiben’ny tandapa hikarakara azy sy i Hananià ary i Misaela sy i Hazarià:'
  '12':
  - type: text
    content: '–Mba tsapao mandritra ny folo andro aloha izahay mpanomponao, ka anana sy rano ihany omena hohaninay sy hosotroinay. '
  '13':
  - type: text
    content: Avy eo dia hojerenao ny endrikay sy ny an’ireo zatovo izay mihinana ny hanina fihinan’ny mpanjaka, ka araka izay ho hitanao no hataonao aminay.
  '14':
  - type: text
    content: 'Dia nekeny izany soso-kevitra izany, ka notsapainy nandritra ny folo andro izy efa-dahy. '
  '15':
  - type: text
    content: 'Ary nony tapitra ny folo andro, dia hita fa tsara endrika sy natavy kokoa izy noho ny zatovo rehetra izay nihinana ny hanina fihinan’ny mpanjaka. '
  '16':
  - type: text
    content: 'Koa nesorin’ilay mpiandraiki-draharaha ny anjara hanina sy divain’izy efa-dahy, ka anana no nomeny azy. '
  '17':
  - type: text
    content: Ireo zatovo efa-dahy ireo dia nomen’Andriamanitra fahaizana amam-pahalalana amin’ny sehatra rehetra momba ny soratra sy ny fahendrena; ary i Daniela nahafantatra ny hevitry ny fahitana sy nofy rehetra.
  '18':
  - type: text
    content: 'Rehefa tonga ny andro voatendrin’ny mpanjaka hitondrana ireto zatovo rehetra hankeo anatrehany, dia nentin’ilay lehiben’ny tandapa teo anoloan’i Nebokadnetsara ireo; '
  '19':
  - type: text
    content: 'ary niresaka tamin’ireo ny mpanjaka, ka tsy nisy hita izay tahaka an’i Daniela sy i Hananià ary i Misaela sy i Habeda-Negao. Koa dia nanompo ny mpanjaka izy efa-dahy. '
  '2':
  - type: text
    content: Dia natolotry ny Tompo teo an-tanany i Jôiakima mpanjakan’i Joda ary ny ampahan’ireo fanaka tao an-
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: . Nentin’i Nebokadnetsara ho any Babilônia ireo olona babo; ny fanaka kosa nentiny ho ao an-
  - type: text
    content: tempoli
  - type: text
    content: n’ireo andriamaniny ary napetrany tao amin’ny efitrano firaketan’io tempoly io
  - type: note
    content: Tsy mazava ny RM amin’ny faran’ny and; ka azo atao koa ny mandika azy hoe «Nentin’i Nebokadnetsara ireo fanaka ireo ho any Babilônia, ho ao an-tempolin’ireo andriamaniny, ka napetrany tao amin’ny efitrano firaketana.»
  - type: text
    content: .
  '20':
  - type: text
    content: Fony nanontany azy zavatra isan-karazany momba ny fahendrena sy fahaiza-manavaka kosa ny mpanjaka, dia nahatsapa fa nihoatra impolo heny noho ny mpanao majika aman-tsikidy rehetra tao amin’ny fanjakany manontolo ireo.
  '21':
  - type: text
    content: Ary i Daniela dia nahatratra ny taona voalohany nanjakan’i Kirosy
  - type: note
    content: Jereo Hez 1.1 sy nta.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ary i Nebokadnetsara mpanjaka nandidy an’i Aspenaza lehiben’ireo tandapany mba hitondra tovolahy israelita avy amin’ny tarana-mpanjaka sy ny fianakavian’andriana sasany; '
  '4':
  - type: text
    content: ireo tovolahy ireo tsy tokony hisy kilema ara-batana fa ho tsara tarehy sady ho feno fahendrena sy manam-pahalalana ary lalim-pahaizana, ka ho afaka hanompo ao an-dapan’ny mpanjaka. Hampianarina ny soratra sy ny fiteny babilônianina izy ireo
  - type: note
    content: Jereo 2 Mp 20.17-18; 24.10-16; 2 Tan 36.10; Is 39.6-7.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Nasain’ny mpanjaka hanokanana sakafo sy divay isan’andro avy amin’ny hanina amam-pisotrony izy ireo ary koa hampianarina mandritra ny telo taona. Rehefa izany dia hanompo ny mpanjaka izy.
  '6':
  - type: text
    content: 'Anisan’ireo voafidy tao amin’ny fokon’i Joda i Daniela sy i Hananià ary i Misaela sy i Hazarià. '
  '7':
  - type: text
    content: Nomen’ny lehiben’ny tandapa anarana vaovao izy ireo, ka i Daniela nantsoiny hoe Beltesatsara, i Hananià nantsoiny hoe Sadràka, i Misaela nantsoiny hoe Mesàka, ary i Hazarià nantsoiny hoe Habeda-Negao
  - type: note
    content: Ny hevitry ny teny hebreo hoe Daniela dia «Andriamanitra no mpitsarako.» Ny anaram-baovao noraisin’ireo zatovo dia mampiseho ny fahefana ananan’ny mpanjaka amin’izy ireo (ampit Fiand 17.5; 32.29 Lk 6.14).
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Hentitra ny fanapahan-kevitr’i Daniela fa tsy '
  - type: text
    content: handoto
  - type: text
    content: ' tena amin’izay sakafon’ny mpanjaka na ny divay fisotrony izy; koa nangataka tamin’ny lehiben’ny tandapa izy mba tsy hanery azy handoto tena. '
  '9':
  - type: text
    content: 'Ary nataon’Andriamanitra nahazo fitia sy indrafo teo anatrehan’ny lehiben’ny tandapa i Daniela. '
