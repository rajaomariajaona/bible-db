document_id: 1CO.11,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Manafahy ahy ianareo, tahaka ny anafahako an’i '
  - type: text
    content: Kristy
  - type: text
    content: '!'
  - type: heading
    content: Tokony hisaron-doha ny vehivavy mandritra ny fanompoam-pivavahana
  '10':
  - type: text
    content: 'Noho ny amin’ny '
  - type: text
    content: anjely
  - type: note
    content: Tsy mifanaraka ireo mpanao heviteny amin’ny fanazavana ny hoe noho ny amin’ny anjely. Misy mitodika any amin’ny Deot 23.15, ka mihevitra fa mitaky fahamaotinana ny fiatrehana an’Andriamanitra; saingy novan’ireo mpitokamonina Efesianina tao Komrano ho «anjely» ny hoe «Andriamanitra» satria tsy te hanonona ny anaran’Andriamanitra izy ireo, ary dia izany no tafita hatratỳ amin’ny fomba fitenin’i Paoly. Misy kosa mihevitra fa ireo anjely dia mpitandro ny rindran-javatra sy lamina nataon’Andriamanitra.
  - type: text
    content: ' àry, dia tokony hanao saron-doha ny vehivavy hahafantarana fa manaiky ny fahefàm-badiny izy. '
  '11':
  - type: text
    content: 'Kanefa moa ho antsika tafaray amin’ny Tompo dia natao hifameno ny vehivavy sy ny lehilahy: '
  '12':
  - type: text
    content: satria toy ny nakàna ny vehivavy avy amin’ny lehilahy no iterahan’ny vehivavy ny lehilahy; fa Andriamanitra kosa no iavian’ny zavatra rehetra.
  '13':
  - type: text
    content: 'Ianareo ihany no aoka hitsara: mety ve raha tsy misaron-doha ny vehivavy no mivavaka amin’Andriamanitra mandritra ny fanompoam-pivavahana? '
  '14':
  - type: text
    content: 'Na dia ny toetra voajanahary izao aza ve tsy mampianatra antsika fa henatra ho an’ny lehilahy ny lava volo, '
  '15':
  - type: text
    content: 'saingy voninahitra ho an’ny vehivavy kosa ny lava volo? Ny volo lava manko dia nomena ny vehivavy mba ho saron-dohany. '
  '16':
  - type: text
    content: Kanefa raha misy olona mbola liana ady hevitra, dia aoka ho fantany fa tsy mba fanaontsika izany na fanaon’ny Fiangonan’Andriamanitra.
  - type: heading
    content: Fanao tsy mendrika amin’ny Fanasan’ny Tompo
  '17':
  - type: text
    content: 'Ary amin’izao fepetra hataoko izao, dia tsy hidera anareo aho tsy akory satria ny fiarahanareo miangona dia tsy mampandroso amin’ny tsara fa vao mainka manimba. '
  '18':
  - type: text
    content: 'Voalohany indrindra dia reko fa rehefa miara-miangona ao am-piangonana ianareo, dia mifanao an-kolafiny, – ary mba inoako kely ihany izany. '
  '19':
  - type: text
    content: '(Tsy maintsy misy moa ny fitsitokotokoana eo aminareo mba hahitana tsara izay mahafatra-po eo aminareo.) '
  '2':
  - type: text
    content: 'Deraiko ianareo, fa tsarovanareo aho amin’ny zavatra rehetra sady tandrovinareo tsara ny fampianarana nampitaiko araka ny nampitako azy taminareo. '
  '20':
  - type: text
    content: 'Rehefa miara-miangona àry ianareo, dia tsy ny hihinana ny Fanasan’ny Tompo velively; '
  '21':
  - type: text
    content: 'satria ny samy hihinana izay sakafony avy aloha no imasoan’ny tsirairay, ka dia ao ny noana ary ao kosa ny mamo. '
  '22':
  - type: text
    content: Tsy manana tokantrano hihinanana sy hisotroana ve ianareo? Sa dia satrinareo hanazimbazimba ny Fiangonan’Andriamanitra sy hanome henatra ny tsy manana? Inona re no holazaiko aminareo? Hidera anareo ve aho? Tsia, tsy hidera anareo amin’izany aho!
  - type: heading
    content: Ny Fanasan’ny Tompo
  - type: heading
    content: (Jereo Mt 26.26-29; Mk 14.22-25; Lk 22.15-20)
  '23':
  - type: text
    content: 'Fa izao no hafatra noraisiko tamin’ny Tompo ary nampitaiko taminareo: I Jesoa Tompo tamin’ilay alina nanolorana Azy, dia nandray mofo; '
  '24':
  - type: text
    content: 'ary nisaorany an’Andriamanitra izany, dia notapatapahiny ka nataony hoe: «Ny tenako ity, izay ho anareo. Izao no ataovy ho fahatsiarovana Ahy.» '
  '25':
  - type: text
    content: 'Taorian’ny sakafo, dia noraisiny toy izany koa ny '
  - type: text
    content: kaopy
  - type: text
    content: ' masina sady nataony hoe: «Ity kaopy ity dia ilay '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' vaovao, aorin’Andriamanitra amin’ny rako. Izao no ataovy ho fahatsiarovana Ahy, isaky ny misotro amin’ny kaopy masina ianareo'
  - type: note
    content: Ampit Eks 24.6-8; Jer 31.31-34.
  - type: text
    content: '.» '
  '26':
  - type: text
    content: Koa mandra-piavin’ny Tompo, dia manambara ny fahafatesany ianareo, isaky ny mihinana izany mofo izany sy misotro izany fisotro izany.
  - type: heading
    content: Rehefa mandray ny Fanasan’ny Tompo
  '27':
  - type: text
    content: 'Noho izany na zovy na zovy mihinana ny mofo na misotro ny fisotro aroson’ny Tompo ka tsy amin-toe-panahy mendrika, dia ho meloka amin’ny tenan’ny Tompo sy ny rany. '
  '28':
  - type: text
    content: 'Aoka ny olona handini-tena vao mihinana amin’izany mofo izany sy misotro amin’izany '
  - type: text
    content: kalisy
  - type: text
    content: ' izany; '
  '29':
  - type: text
    content: 'satria izay mihinana amin’izany mofo izany ary misotro amin’izany kalisy izany nefa sy mamantatra ny tenan’ny Tompo, dia mihinana sy misotro hihantsiana ny sazin’Andriamanitra. '
  '3':
  - type: text
    content: 'Saingy ity misy zavatra tiako ho fantatrareo: I '
  - type: text
    content: Kristy
  - type: text
    content: ' no mpifehy ny lehilahy rehetra; ny lehilahy no mpifehy ny vadiny; ary Andriamanitra no mpifehy an’i Kristy. '
  '30':
  - type: text
    content: 'Izany no mampisy ny marary sy farofy betsaka eo aminareo ary maro aza no maty. '
  '31':
  - type: text
    content: 'Fa raha mba mandini-tena isika, dia tsy hosazîn’Andriamanitra. '
  '32':
  - type: text
    content: Sazîn’ny Tompo sy faiziny kosa isika mba tsy ho voaheloka miaraka amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: .
  '33':
  - type: text
    content: 'Noho izany, ry havako, rehefa miara-miangona handray ny Fanasan’ny Tompo ianareo, dia mba mifampiandrasa; '
  '34':
  - type: text
    content: raha misy noana, aoka izy hihinana any an-tokantranony mba tsy hihantsianareo ny sazin’Andriamanitra amin’ny fiarahanareo miangona. Ary ny zavatra sisa dia halamiko rehefa tonga aho.
  '4':
  - type: text
    content: Raha misy lehilahy misaron-doha
  - type: note
    content: Amin’ny fiteny grika dia voambolana iray no ilazana ny hoe loha sy ny hoe filoha. Ampiasain’i Paoly amin’izany dikany roa sosona izany ho voambolana io eto amin’ity perikôpa (1 Kôr 11.2-16) ity.
  - type: text
    content: ' rehefa mivavaka na rehefa milaza hafatra avy amin’Andriamanitra mandritra ny fanompoam-pivavahana, dia manala baràka an’i Kristy! '
  '5':
  - type: text
    content: 'Fa raha misy vehivavy tsy misaron-doha rehefa mivavaka na rehefa milaza hafatra avy amin’Andriamanitra mandritra ny fanompoam-pivavahana, dia manala baràka ny vadiny; satria toy ny vehivavy noharatana volon-doha izy! '
  '6':
  - type: text
    content: 'Raha tsy misaron-doha ny vehivavy, dia aoka izy hohetezana volon-doha. Fa raha mahamenatra ny vehivavy ny hetezana na haratana volon-doha, dia aoka izy hisaron-doha. '
  '7':
  - type: text
    content: 'Ny lehilahy dia tokony tsy hisaron-doha, satria mitaratra ny endrika amam-boninahitra izy. Ny vehivavy kosa mitaratra ny voninahitry ny lehilahy: '
  '8':
  - type: text
    content: 'satria tsy avy amin’ny vehivavy no nakana ny lehilahy, fa avy amin’ny lehilahy no nakana vehivavy; '
  '9':
  - type: text
    content: ary tsy ny lehilahy no noarîna ho an’ny vehivavy; fa ny vehivavy no noarîna ho an’ny lehilahy
  - type: note
    content: 'And 7: endrika amam-boninahitr’Andriamanitra, jereo Gen 1.26-27. And 8-9: jereo Gen 2.18-23.'
  - type: text
    content: '. '
