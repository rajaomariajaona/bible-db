document_id: 1CO.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Manafahy ahy ianareo, tahaka ny anafahako an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tokony hisaron-doha ny vehivavy mandritra ny fanompoam-pivavahana
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Noho ny amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy mifanaraka ireo mpanao heviteny amin’ny fanazavana ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: noho ny amin’ny anjely.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Misy mitodika any amin’ny Deot 23.15, ka mihevitra fa mitaky fahamaotinana ny fiatrehana an’Andriamanitra; saingy novan’ireo mpitokamonina Efesianina tao Komrano ho «anjely» ny hoe «Andriamanitra» satria tsy te hanonona ny anaran’Andriamanitra izy ireo, ary dia izany no tafita hatratỳ amin’ny fomba fitenin’i Paoly. Misy kosa mihevitra fa ireo anjely dia mpitandro ny rindran-javatra sy lamina nataon’Andriamanitra.'
      marker-yv: yv-n
    - type: text
      text: ' àry, dia tokony hanao saron-doha ny vehivavy hahafantarana fa manaiky ny fahefàm-badiny izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Kanefa moa ho antsika tafaray amin’ny Tompo dia natao hifameno ny vehivavy sy ny lehilahy: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: satria toy ny nakàna ny vehivavy avy amin’ny lehilahy no iterahan’ny vehivavy ny lehilahy; fa Andriamanitra kosa no iavian’ny zavatra rehetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ianareo ihany no aoka hitsara: mety ve raha tsy misaron-doha ny vehivavy no mivavaka amin’Andriamanitra mandritra ny fanompoam-pivavahana? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Na dia ny toetra voajanahary izao aza ve tsy mampianatra antsika fa henatra ho an’ny lehilahy ny lava volo, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'saingy voninahitra ho an’ny vehivavy kosa ny lava volo? Ny volo lava manko dia nomena ny vehivavy mba ho saron-dohany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Kanefa raha misy olona mbola liana ady hevitra, dia aoka ho fantany fa tsy mba fanaontsika izany na fanaon’ny Fiangonan’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanao tsy mendrika amin’ny Fanasan’ny Tompo
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary amin’izao fepetra hataoko izao, dia tsy hidera anareo aho tsy akory satria ny fiarahanareo miangona dia tsy mampandroso amin’ny tsara fa vao mainka manimba. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Voalohany indrindra dia reko fa rehefa miara-miangona ao am-piangonana ianareo, dia mifanao an-kolafiny, – ary mba inoako kely ihany izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '(Tsy maintsy misy moa ny fitsitokotokoana eo aminareo mba hahitana tsara izay mahafatra-po eo aminareo.) '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Deraiko ianareo, fa tsarovanareo aho amin’ny zavatra rehetra sady tandrovinareo tsara ny fampianarana nampitaiko araka ny nampitako azy taminareo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Rehefa miara-miangona àry ianareo, dia tsy ny hihinana ny Fanasan’ny Tompo velively; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'satria ny samy hihinana izay sakafony avy aloha no imasoan’ny tsirairay, ka dia ao ny noana ary ao kosa ny mamo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy manana tokantrano hihinanana sy hisotroana ve ianareo? Sa dia satrinareo hanazimbazimba ny Fiangonan’Andriamanitra sy hanome henatra ny tsy manana? Inona re no holazaiko aminareo? Hidera anareo ve aho? Tsia, tsy hidera anareo amin’izany aho!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Fanasan’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.26-29; Mk 14.22-25; Lk 22.15-20)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa izao no hafatra noraisiko tamin’ny Tompo ary nampitaiko taminareo: I Jesoa Tompo tamin’ilay alina nanolorana Azy, dia nandray mofo; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary nisaorany an’Andriamanitra izany, dia notapatapahiny ka nataony hoe: «Ny tenako ity, izay ho anareo. Izao no ataovy ho fahatsiarovana Ahy.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Taorian’ny sakafo, dia noraisiny toy izany koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kaopy
    - type: text
      text: ' masina sady nataony hoe: «Ity kaopy ity dia ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' vaovao, aorin’Andriamanitra amin’ny rako. Izao no ataovy ho fahatsiarovana Ahy, isaky ny misotro amin’ny kaopy masina ianareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 24.6-8; Jer 31.31-34.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Koa mandra-piavin’ny Tompo, dia manambara ny fahafatesany ianareo, isaky ny mihinana izany mofo izany sy misotro izany fisotro izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehefa mandray ny Fanasan’ny Tompo
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Noho izany na zovy na zovy mihinana ny mofo na misotro ny fisotro aroson’ny Tompo ka tsy amin-toe-panahy mendrika, dia ho meloka amin’ny tenan’ny Tompo sy ny rany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Aoka ny olona handini-tena vao mihinana amin’izany mofo izany sy misotro amin’izany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kalisy
    - type: text
      text: ' izany; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'satria izay mihinana amin’izany mofo izany ary misotro amin’izany kalisy izany nefa sy mamantatra ny tenan’ny Tompo, dia mihinana sy misotro hihantsiana ny sazin’Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Saingy ity misy zavatra tiako ho fantatrareo: I '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no mpifehy ny lehilahy rehetra; ny lehilahy no mpifehy ny vadiny; ary Andriamanitra no mpifehy an’i Kristy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Izany no mampisy ny marary sy farofy betsaka eo aminareo ary maro aza no maty. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa raha mba mandini-tena isika, dia tsy hosazîn’Andriamanitra. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Sazîn’ny Tompo sy faiziny kosa isika mba tsy ho voaheloka miaraka amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: .
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Noho izany, ry havako, rehefa miara-miangona handray ny Fanasan’ny Tompo ianareo, dia mba mifampiandrasa; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: raha misy noana, aoka izy hihinana any an-tokantranony mba tsy hihantsianareo ny sazin’Andriamanitra amin’ny fiarahanareo miangona. Ary ny zavatra sisa dia halamiko rehefa tonga aho.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Raha misy lehilahy misaron-doha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny fiteny grika dia voambolana iray no ilazana ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: loha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: filoha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Ampiasain’i Paoly amin’izany dikany roa sosona izany ho voambolana io eto amin’ity perikôpa (1 Kôr 11.2-16) ity.
      marker-yv: yv-n
    - type: text
      text: ' rehefa mivavaka na rehefa milaza hafatra avy amin’Andriamanitra mandritra ny fanompoam-pivavahana, dia manala baràka an’i Kristy! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa raha misy vehivavy tsy misaron-doha rehefa mivavaka na rehefa milaza hafatra avy amin’Andriamanitra mandritra ny fanompoam-pivavahana, dia manala baràka ny vadiny; satria toy ny vehivavy noharatana volon-doha izy! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Raha tsy misaron-doha ny vehivavy, dia aoka izy hohetezana volon-doha. Fa raha mahamenatra ny vehivavy ny hetezana na haratana volon-doha, dia aoka izy hisaron-doha. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny lehilahy dia tokony tsy hisaron-doha, satria mitaratra ny endrika amam-boninahitra izy. Ny vehivavy kosa mitaratra ny voninahitry ny lehilahy: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'satria tsy avy amin’ny vehivavy no nakana ny lehilahy, fa avy amin’ny lehilahy no nakana vehivavy; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ary tsy ny lehilahy no noarîna ho an’ny vehivavy; fa ny vehivavy no noarîna ho an’ny lehilahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 7: endrika amam-boninahitr’Andriamanitra'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo Gen 1.26-27. '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 8-9:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 2.18-23.'
      marker-yv: yv-n
    - type: text
      text: '. '
