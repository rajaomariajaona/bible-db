- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Toa tany Rôma no voasoratra ny taratasy faharoa ho an’i Timôty (1.17). Tsaroan’i Paoly ho tena mafy ny figadràny (2.9) sady manirery izy (4.10, 16). Efa hifaramparana ny asan’i Paoly (4.6) ka dia hafatrafatra no arosony ho an’ilay mpiara-dia izay feno fitiavana azy (1.2).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny anombohan’i Paoly apôstôly ny taratasy dia fisaorana an’Andriamanitra noho ny fitiavana sy ny finoana nasehon’i Timôty. Tsinjon’i Paoly ny fijaliana sy ny fanoherana mpahazo ireo mpanompon’ny Vaovao Mahafaly, ka dia manafatrafatra an’i Timôty izy mba tsy hihontsina amin’ny fitsapana ary mba hahery fo amin’izay ady atrehina, araka ny maha «miaramila mahatokin’i Jesoa Kristy» (1.3–2.13). Feperan’i Paoly mafy izy mba hitandrina amin’ireo olona liana ady hevitra sy ady teny izay tsy mahasoa velively fa mampihataka amin’ny finoana. Antsoiny koa i Timôty hanaraka izay ohatra nomeny ary asainy mitana tsara ny fampianarana mifanaraka amin’ny Soratra Masina, izay noraisiny hatramin’ny fahatanorany (2.14–4.5). Ho famaranana ny taratasiny dia sady tsahivin’i Paoly apôstôly ny toe-javatra mananosarotra izay mihatra amin’ny tenany no velom-pisaorana ny Tompo Izay nankahery azy hatrany izy (4.6-22).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ady tsara (4.7) hatramin’ny farany tokoa no nataon’i Paoly ho fampahalalana ny Vaovao Mahafaly. Ary na iza na iza mamaky ity taratasy ity eo amin’ny taranaka mifandimby, dia voaentana hiatrika izany ady izany, ka tsy hatahotra ny fahoriana fa hanana finoana sy faharetana ary fitiavana sy fahazotoana hatramin’ny farany.
