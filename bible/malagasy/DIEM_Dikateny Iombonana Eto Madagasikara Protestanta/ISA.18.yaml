document_id: ISA.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ny iraka etiôpianina
  - type: text
    content: Lozanao, ry tany misy ireo lakana manana elatra
  - type: text
    content: izay manara-morona ny onin’i Etiôpia
  - type: note
    content: 'lakana manana elatra: izany hoe lakana nanana lay anankiroa mivelatra. –Ny amin’i Etiôpia, dia jereo Tsef 2.12.'
  - type: text
    content: '!'
  '2':
  - type: text
    content: Irahinao ny masoivoho izay mandeha lakan-jozoro
  - type: text
    content: eny ambonin’ny ranon’i Neily.
  - type: text
    content: –Miverena ianareo, ry iraka faingam-pandeha,
  - type: text
    content: any amin’ireo olona ranjanana sy malandilandy,
  - type: text
    content: any amin’ilay firenena atahorana
  - type: text
    content: hatreto ka hatrany am-paran’ny tany,
  - type: text
    content: any amin’ilay firenena matanjaka
  - type: text
    content: izay manosihosy ny fahavalony.
  - type: text
    content: Miverena any amin’ny taninareo
  - type: text
    content: izay vakivakîn’ny ony maro.
  '3':
  - type: text
    content: Ianareo rehetra mponina amin’izao tontolo izao
  - type: text
    content: ka mipetraka eto ambonin’ny tany,
  - type: text
    content: mijere rehefa atsangana eny an-tendrombohitra
  - type: text
    content: ny faneva famantarana,
  - type: text
    content: mihainoa raha vao maneno ny anjomara.
  '4':
  - type: text
    content: 'Fa izao no nolazain’ny TOMPO tamiko:'
  - type: text
    content: «Avy etỳ amin’ny fonenako ambony etỳ
  - type: text
    content: no andinihako izay miseho,
  - type: text
    content: ka tsy mihontsona mihitsy Aho
  - type: text
    content: toy ny hafanana migaingaina apariakan’ny masoandro
  - type: text
    content: sy toy ny raho-manify
  - type: note
    content: 'raho-manify: rahona madinika mitsitokotoko sady toa tsy mihetsika eny ana habakabaka, araka ny hoe manao torim-boanjo ny lanitra rehefa fararano.'
  - type: text
    content: ' amin’ny fotoam-pijinjana.»'
  '5':
  - type: text
    content: Fa alohan’ny fotoam-pijinjana,
  - type: text
    content: rehefa tapitra namelana avokoa ny voaloboka
  - type: text
    content: ary rehefa tonga voany mihamasaka ny voniny,
  - type: text
    content: dia horantsanana amin’ny hety ny rantsany,
  - type: text
    content: ary hotapahina ny sakeliny sy ny raviny.
  '6':
  - type: text
    content: Izany rehetra izany dia hilaozana
  - type: text
    content: ho an’ny vorona mpihaza eny an-tendrombohitra
  - type: text
    content: sy ny bibidia eny ambonin’ny tany
  - type: note
    content: Ny fanetezam-boaloboka faharoa ka amelàna ny rantsana aman-draviny tapaka ho maina am-pitoerana no anoharan’ny mpaminany etoana ny fatin’ny miaramila etiôpianina avela ho an’ny vorona mpihaza sy ho an’ny bibidia eo amin’ny toeram-piadiana.
  - type: text
    content: ;
  - type: text
    content: ao no handany fahavaratra ny vorona mpihaza
  - type: text
    content: ary handany ririnina ny bibidia rehetra.
  '7':
  - type: text
    content: Amin’izany fotoana izany
  - type: text
    content: dia hanolotra fanomezana
  - type: text
    content: ho an’ny TOMPOn’izao rehetra izao
  - type: text
    content: ireo olona ranjanana sy malandilandy,
  - type: text
    content: dia ilay firenena atahorana
  - type: text
    content: hatreto ka hatrany am-paran’ny tany,
  - type: text
    content: ilay firenena matanjaka
  - type: text
    content: izay manosihosy ny fahavalony
  - type: text
    content: sady vakivakîn’ny ony maro ny taniny.
  - type: text
    content: 'Any an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: izay hitoeran’ny TOMPOn’izao rehetra izao
  - type: text
    content: no hanolorany izany fanomezana izany.
