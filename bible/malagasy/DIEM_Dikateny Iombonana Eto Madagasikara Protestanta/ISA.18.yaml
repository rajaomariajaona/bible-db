document_id: ISA.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ny iraka etiôpianina
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozanao, ry tany misy ireo lakana manana elatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manara-morona ny onin’i Etiôpia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lakana manana elatra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe lakana nanana lay anankiroa mivelatra. –Ny amin’i Etiôpia, dia jereo Tsef 2.12.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Irahinao ny masoivoho izay mandeha lakan-jozoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny ambonin’ny ranon’i Neily.
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Miverena ianareo, ry iraka faingam-pandeha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ireo olona ranjanana sy malandilandy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ilay firenena atahorana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatreto ka hatrany am-paran’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ilay firenena matanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manosihosy ny fahavalony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miverena any amin’ny taninareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay vakivakîn’ny ony maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ianareo rehetra mponina amin’izao tontolo izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mipetraka eto ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mijere rehefa atsangana eny an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny faneva famantarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihainoa raha vao maneno ny anjomara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no nolazain’ny TOMPO tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Avy etỳ amin’ny fonenako ambony etỳ
- type: usfm
  marker: q1
  children:
  - type: text
    text: no andinihako izay miseho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mihontsona mihitsy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny hafanana migaingaina apariakan’ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy toy ny raho-manify
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'raho-manify: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rahona madinika mitsitokotoko sady toa tsy mihetsika eny ana habakabaka, araka ny hoe manao torim-boanjo ny lanitra rehefa fararano.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fotoam-pijinjana.»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa alohan’ny fotoam-pijinjana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tapitra namelana avokoa ny voaloboka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary rehefa tonga voany mihamasaka ny voniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia horantsanana amin’ny hety ny rantsany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotapahina ny sakeliny sy ny raviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany rehetra izany dia hilaozana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny vorona mpihaza eny an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny bibidia eny ambonin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fanetezam-boaloboka faharoa ka amelàna ny rantsana aman-draviny tapaka ho maina am-pitoerana no anoharan’ny mpaminany etoana ny fatin’ny miaramila etiôpianina avela ho an’ny vorona mpihaza sy ho an’ny bibidia eo amin’ny toeram-piadiana.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao no handany fahavaratra ny vorona mpihaza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handany ririnina ny bibidia rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’izany fotoana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanolotra fanomezana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo olona ranjanana sy malandilandy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay firenena atahorana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatreto ka hatrany am-paran’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay firenena matanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manosihosy ny fahavalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady vakivakîn’ny ony maro ny taniny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Any an-tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay hitoeran’ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanolorany izany fanomezana izany.
