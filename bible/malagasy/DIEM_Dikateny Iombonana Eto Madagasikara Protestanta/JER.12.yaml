document_id: JER.12
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO ô, mpandala ny rariny Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy tokony mifandahatra aminao aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ny amin’ireto toe-javatra ireto
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia te hiady hevitra aminao aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no ahitam-pahombiazana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lalana ombàn’ny olon-dratsy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahoana no miadam-pinaritra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo rehetra mpivadika aminao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nambolenao izy dia niorim-paka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nitombo sy namoa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tononin’ny vavany Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ataony lavitry ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ianao kosa, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahalala ahy sady mahita ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nizaha toetra ny foko Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa miandany aminao izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avaho toy ny ondry hovonoina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireny olona ratsy fanahy ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: atokany ho amin’ny andro fandringanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mandra-pahoviana no hisaona ny tany ary ho maina ny ahitra eny an-tsaha rehetra eny? Ringana avokoa ny biby sy ny voromanidina noho ny faharatsian’ny mponina eo amin’ny tany, satria hoy izy hoe: «Tsy mahita izay ataontsika Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ataontsika '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lalantsika
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': araka ny dkt grika sy latinina; hebreo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hoavintsika.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha ny mpihazakazaka an-tongotra aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy arakao, hoy ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ahoana, ry Jeremià, no hifaninananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny mpitaingin-tsoavaly?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha amin’ny tany milamina ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anananao toky
- type: usfm
  marker: q1
  children:
  - type: text
    text: ahoana kosa no hataonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa ao anaty kirihitrala
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amoron’i Jôrdàna?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa na dia ireo mpiray foko aminao aza, eny na dia ireo iray fianakaviana aminao aza, dia mamitaka anao ka miantso olona am-badika hanohitra anao. Aza matoky azy, na dia tsara vava aminao aza izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilaozan’ny Tompo ny tempoliny sy ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ilaozako ny tranoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afoiko ny fananako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atolotro ho eo an-tanan’ny fahavalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay notiaviko tamin’ny foko tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Niova ho masiaka tamiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny liona any an’ala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay anjara fananako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nierona tamiko izy ka halako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moa ve ilay anjara fananako ankehitriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ity vorona anankiray misoratsoratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: iantorahan’ireo vorona mpihaza manodidina azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ndeha vorio ny bibidia rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ento mankao amin’ny fanasana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mpitondra maro no nanimba ny voaloboko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nohosihoseny ny anjara fananako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faritra mahafinaritra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa nataony taniefitra lao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: dia taniefitra lao mahonena ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lao sy rava ny tany manontolo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tsy misy olona mitsetra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny amin’ireo havoana ngazana rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: any an-taniefitra any
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mipoitra ireo mpandroba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatreo amin’ny sisintany an-kilany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatrany amin’ny sisintany an-daniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no andripahan’ilay sabatry ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy olona tsitsîny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vary no nafafinareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsilo no jinjainareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nisahirana mafy ny tenanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy nisy tombontsoa akory izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho menatra ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny vokatra azonareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fahatezeran’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mirehitra mamely anareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitaizana ny firenen-kafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lazain’ny TOMPO ny amin’ireo ratsy fanahy rehetra mpifanila fonenana amin’ny fireneko: «Mikasikasika ny zaratany nomeko an’i Israely vahoakako ireo, ka dia hongotako hiala amin’ny taniny, ary hongotako hiala eo anivony koa ny vahoakan’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nefa rehefa voaongotro izy, dia hamindrako fo indray ka samy haveriko ao amin’ny anjara fananany ao amin’ny taniny avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nampianatra ny vahoakako hianiana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' ireo ratsy fanahy ireo; kanefa raha mianatra tsara ny fanaon’ny vahoakako izy ka hianiana amin’ny anarako hoe: ‹Velona ny TOMPO, ka mianiana aho fa...›, dia hanam-ponenana indray eo anivon’ny vahoakako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa raha misy kosa firenena iray tsy mety mihaino Ahy, dia hongotako tanteraka izy sady haringako. Izany no teny hentitra avy amiko TOMPO.»
