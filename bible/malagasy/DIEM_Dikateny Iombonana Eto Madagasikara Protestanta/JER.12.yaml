document_id: JER.12,396
type_code: plt
verses:
  '1':
  - type: text
    content: TOMPO ô, mpandala ny rariny Ianao
  - type: text
    content: ka tsy tokony mifandahatra aminao aho.
  - type: text
    content: Nefa ny amin’ireto toe-javatra ireto
  - type: text
    content: dia te hiady hevitra aminao aho.
  - type: text
    content: Nahoana no ahitam-pahombiazana
  - type: text
    content: ny lalana ombàn’ny olon-dratsy?
  - type: text
    content: Ary nahoana no miadam-pinaritra
  - type: text
    content: ireo rehetra mpivadika aminao?
  '10':
  - type: text
    content: Mpitondra maro no nanimba ny voaloboko,
  - type: text
    content: nohosihoseny ny anjara fananako.
  - type: text
    content: Faritra mahafinaritra izany,
  - type: text
    content: nefa nataony taniefitra lao,
  '11':
  - type: text
    content: dia taniefitra lao mahonena ahy.
  - type: text
    content: Lao sy rava ny tany manontolo,
  - type: text
    content: kanefa tsy misy olona mitsetra azy.
  '12':
  - type: text
    content: Eny amin’ireo havoana ngazana rehetra
  - type: text
    content: any an-taniefitra any
  - type: text
    content: no mipoitra ireo mpandroba.
  - type: text
    content: Hatreo amin’ny sisintany an-kilany
  - type: text
    content: ka hatrany amin’ny sisintany an-daniny
  - type: text
    content: no andripahan’ilay sabatry ny TOMPO
  - type: text
    content: ka tsy misy olona tsitsîny.
  '13':
  - type: text
    content: Vary no nafafinareo
  - type: text
    content: nefa tsilo no jinjainareo.
  - type: text
    content: Nisahirana mafy ny tenanareo
  - type: text
    content: fa tsy nisy tombontsoa akory izany.
  - type: text
    content: Aoka ho menatra ianareo
  - type: text
    content: amin’ny vokatra azonareo!
  - type: text
    content: Fa ny fahatezeran’ny TOMPO
  - type: text
    content: no mirehitra mamely anareo.
  - type: heading
    content: Ny fitaizana ny firenen-kafa
  '14':
  - type: text
    content: 'Izao no lazain’ny TOMPO ny amin’ireo ratsy fanahy rehetra mpifanila fonenana amin’ny fireneko: «Mikasikasika ny zaratany nomeko an’i Israely vahoakako ireo, ka dia hongotako hiala amin’ny taniny, ary hongotako hiala eo anivony koa ny vahoakan’i Joda. '
  '15':
  - type: text
    content: Nefa rehefa voaongotro izy, dia hamindrako fo indray ka samy haveriko ao amin’ny anjara fananany ao amin’ny taniny avy.
  '16':
  - type: text
    content: 'Nampianatra ny vahoakako hianiana amin’ny '
  - type: text
    content: Bahala
  - type: text
    content: ' ireo ratsy fanahy ireo; kanefa raha mianatra tsara ny fanaon’ny vahoakako izy ka hianiana amin’ny anarako hoe: ‹Velona ny TOMPO, ka mianiana aho fa...›, dia hanam-ponenana indray eo anivon’ny vahoakako. '
  '17':
  - type: text
    content: Fa raha misy kosa firenena iray tsy mety mihaino Ahy, dia hongotako tanteraka izy sady haringako. Izany no teny hentitra avy amiko TOMPO.»
  '2':
  - type: text
    content: Nambolenao izy dia niorim-paka,
  - type: text
    content: ka nitombo sy namoa.
  - type: text
    content: Tononin’ny vavany Ianao,
  - type: text
    content: fa ataony lavitry ny fony.
  '3':
  - type: text
    content: Ianao kosa, TOMPO ô,
  - type: text
    content: mahalala ahy sady mahita ahy;
  - type: text
    content: nizaha toetra ny foko Ianao
  - type: text
    content: fa miandany aminao izy.
  - type: text
    content: Avaho toy ny ondry hovonoina
  - type: text
    content: ireny olona ratsy fanahy ireny,
  - type: text
    content: atokany ho amin’ny andro fandringanana.
  '4':
  - type: text
    content: 'Mandra-pahoviana no hisaona ny tany ary ho maina ny ahitra eny an-tsaha rehetra eny? Ringana avokoa ny biby sy ny voromanidina noho ny faharatsian’ny mponina eo amin’ny tany, satria hoy izy hoe: «Tsy mahita izay ataontsika Andriamanitra'
  - type: note
    content: 'ataontsika na lalantsika: araka ny dkt grika sy latinina; hebreo hoavintsika.'
  - type: text
    content: .»
  '5':
  - type: text
    content: Raha ny mpihazakazaka an-tongotra aza
  - type: text
    content: tsy arakao, hoy ny Tompo,
  - type: text
    content: ahoana, ry Jeremià, no hifaninananao
  - type: text
    content: amin’ny mpitaingin-tsoavaly?
  - type: text
    content: Raha amin’ny tany milamina ihany
  - type: text
    content: no anananao toky
  - type: text
    content: ahoana kosa no hataonao
  - type: text
    content: rehefa ao anaty kirihitrala
  - type: text
    content: eny amoron’i Jôrdàna?
  '6':
  - type: text
    content: Fa na dia ireo mpiray foko aminao aza, eny na dia ireo iray fianakaviana aminao aza, dia mamitaka anao ka miantso olona am-badika hanohitra anao. Aza matoky azy, na dia tsara vava aminao aza izy.
  - type: heading
    content: Ilaozan’ny Tompo ny tempoliny sy ny vahoakany
  '7':
  - type: text
    content: Ilaozako ny tranoko
  - type: text
    content: ary afoiko ny fananako.
  - type: text
    content: Atolotro ho eo an-tanan’ny fahavalony
  - type: text
    content: ilay notiaviko tamin’ny foko tokoa.
  '8':
  - type: text
    content: Niova ho masiaka tamiko
  - type: text
    content: toy ny liona any an’ala
  - type: text
    content: ilay anjara fananako;
  - type: text
    content: nierona tamiko izy ka halako.
  '9':
  - type: text
    content: Moa ve ilay anjara fananako ankehitriny
  - type: text
    content: dia tahaka ity vorona anankiray misoratsoratra
  - type: text
    content: iantorahan’ireo vorona mpihaza manodidina azy?
  - type: text
    content: Ndeha vorio ny bibidia rehetra,
  - type: text
    content: ka ento mankao amin’ny fanasana!
