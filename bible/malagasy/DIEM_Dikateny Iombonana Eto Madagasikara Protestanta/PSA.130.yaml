    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hira fiakarana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anaty hantsam-pahoriana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: no miantso Anao, ry TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mba henoy, Tompo ô, izany feoko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tandrin’ny sofinao anie ny feoko mitaraina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha mitsikilo heloka Ianao, ry TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: iza moa no hahatanty, Tompo ô?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kanefa ao aminao ny famelana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanajan’ny olona Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa manantena mafy ny TOMPO aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady matoky ny teniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miandry ny Tompo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manoatra ny mpiambina miandry ny maraina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manoatra ny mpiambina miandry ny maraina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: no aoka hitokian’ny vahoaka Israely ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny fitiavana no ao amin’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa ny fanavotana tsy hita lany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eny, Izy no hanavotra ny vahoaka Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho afaka amin’ny fahotana rehetra
  - type: usfm
    marker: f
