document_id: PSA.130,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ao aminao ny famelana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hira fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaty hantsam-pahoriana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no miantso Anao, ry TOMPO.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba henoy, Tompo ô, izany feoko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tandrin’ny sofinao anie ny feoko mitaraina!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitsikilo heloka Ianao, ry TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iza moa no hahatanty, Tompo ô?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa ao aminao ny famelana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanajan’ny olona Anao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa manantena mafy ny TOMPO aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady matoky ny teniny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miandry ny Tompo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manoatra ny mpiambina miandry ny maraina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manoatra ny mpiambina miandry ny maraina,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no aoka hitokian’ny vahoaka Israely ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny fitiavana no ao amin’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa ny fanavotana tsy hita lany!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Izy no hanavotra ny vahoaka Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho afaka amin’ny fahotana rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
