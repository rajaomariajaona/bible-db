document_id: PSA.130,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ao aminao ny famelana
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: Anaty hantsam-pahoriana aho
  - type: text
    content: no miantso Anao, ry TOMPO.
  '2':
  - type: text
    content: Mba henoy, Tompo ô, izany feoko!
  - type: text
    content: Ho tandrin’ny sofinao anie ny feoko mitaraina!
  '3':
  - type: text
    content: Raha mitsikilo heloka Ianao, ry TOMPO,
  - type: text
    content: iza moa no hahatanty, Tompo ô?
  '4':
  - type: text
    content: Kanefa ao aminao ny famelana
  - type: text
    content: mba hanajan’ny olona Anao.
  '5':
  - type: text
    content: Koa manantena mafy ny TOMPO aho
  - type: text
    content: sady matoky ny teniny.
  '6':
  - type: text
    content: Miandry ny Tompo aho,
  - type: text
    content: manoatra ny mpiambina miandry ny maraina.
  - type: text
    content: Eny, manoatra ny mpiambina miandry ny maraina,
  '7':
  - type: text
    content: no aoka hitokian’ny vahoaka Israely ny TOMPO,
  - type: text
    content: satria ny fitiavana no ao amin’ny TOMPO
  - type: text
    content: ary koa ny fanavotana tsy hita lany!
  '8':
  - type: text
    content: Eny, Izy no hanavotra ny vahoaka Israely
  - type: text
    content: ho afaka amin’ny fahotana rehetra
  - type: note
    content: Jereo Mt 1.21; Tit 2.14.
  - type: text
    content: .
