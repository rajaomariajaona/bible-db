document_id: ISA.48,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manambara zava-baovao amin’i Israely ny Tompo
  - type: text
    content: Henoy izao, ry firenen’i Jakôba,
  - type: text
    content: dia ianareo izay mitonon-tena ho Israely
  - type: text
    content: sy taranaka nipoitra avy tamin’i Joda,
  - type: text
    content: ianareo izay mianiana amin’ny anaran’ny TOMPO
  - type: text
    content: ka miantso ny anaran’Andriamanitr’i Israely
  - type: text
    content: nefa tsy araka ny fahamarinana sy ny fahitsiana.
  '10':
  - type: text
    content: Indro nosedraiko ianareo, nefa tsy tamin’ny afo
  - type: text
    content: toy ny fanao amin’ny volafotsy;
  - type: text
    content: fa tamin’ny memin’ny fahoriana
  - type: text
    content: no nandiovako anareo.
  '11':
  - type: text
    content: Noho ny amiko no nanaovako izany,
  - type: text
    content: eny, noho ny amiko ihany,
  - type: text
    content: satria tsy zakako velively
  - type: text
    content: ny hanalam-baràka ny anarako;
  - type: text
    content: ary ny voninahitro tsy homeko ny hafa.
  - type: heading
    content: Ilay hanatanteraka ny fikasan’ny Tompo
  '12':
  - type: text
    content: 'Hoy ny TOMPO hoe: «Ry firenen’i Jakôba,'
  - type: text
    content: ry vahoaka Israely izay nantsoiko,
  - type: text
    content: 'henoy Aho: Izaho no Ilay tsy miova,'
  - type: text
    content: Izaho no voalohany, ary Izaho koa no farany
  - type: note
    content: Jereo 44.6 sy nta.
  - type: text
    content: .
  '13':
  - type: text
    content: Eny, ny tanako no nametraka ny fanorenan’ny tany;
  - type: text
    content: ny tanako ankavanana no namelatra ny lanitra.
  - type: text
    content: Raha antsoiko ireo, dia miara-miseho avokoa.
  '14':
  - type: text
    content: 'Mivoria ka mihainoa ianareo rehetra:'
  - type: text
    content: Ilay tiako
  - type: note
    content: Mbola fitenenana an’i Kirôsa indray; jereo 41.2 sy nta.
  - type: text
    content: ' no hanatanteraka'
  - type: text
    content: izay sitrapoko amin’i Babilôna
  - type: text
    content: sy amin’ny taranaky ny Kaldeanina.
  - type: text
    content: Kanefa iza taminareo moa
  - type: text
    content: no nanambara izany? Tsy misy.
  '15':
  - type: text
    content: Izaho, eny, Izaho no niteny;
  - type: text
    content: Izaho mihitsy no niantso azy
  - type: text
    content: ka nanao izay hahatongavany
  - type: text
    content: sy hampahomby izay hataony.
  '16':
  - type: text
    content: 'Manatòna Ahy ianareo ka henoy izao:'
  - type: text
    content: Efa hatrany am-boalohany
  - type: text
    content: no nitenenako an-karihary;
  - type: text
    content: ary teo Aho hatramin’ny vaninandro
  - type: text
    content: izay nisehoan’izany zavatra izany.»
  - type: text
    content: (Ankehitriny dia Ilay Tompo ANDRIANANAHARY mihitsy
  - type: text
    content: no naniraka ahy sy nanome ahy ny Fanahiny
  - type: note
    content: Tsy voalaza mazava eto amin’ny rijan-teny na i Kirôsa mpanjaka no miteny na ny tenan’ny mpaminany. Jereo koa 61.1.
  - type: text
    content: .)
  - type: heading
    content: Raha mba nihaino Ahy manko ianao!
  '17':
  - type: text
    content: Ry firenen’i Jakôba, ny TOMPO mpanavotra anao,
  - type: text
    content: 'Ilay Masin’i Israely dia miteny aminao hoe:'
  - type: text
    content: «Izaho TOMPO Andriamanitrao
  - type: text
    content: no mampianatra anao izay mahasoa anao
  - type: text
    content: sy mitarika anao amin’ny lalana tokony halehanao.
  '18':
  - type: text
    content: Raha mba nihaino tsara ny didiko manko ianao,
  - type: text
    content: dia ho nikoriana toy ny ony ny fiadananao;
  - type: text
    content: ary ho toy ny onjan-dranomasina
  - type: text
    content: no fiavin’ny fanafahana anao!
  '19':
  - type: text
    content: Ny taranaka haloaky ny kibonao ho marobe
  - type: text
    content: toy ny fasika eny amoron-dranomasina;
  - type: text
    content: tsy ho tapaka na ho foana
  - type: text
    content: eo anatrehako ny anarany.»
  - type: heading
    content: Mivoaha avy ao Babilôna
  '2':
  - type: text
    content: Eny, ianareo izay mitonon-tena
  - type: text
    content: ho avy amin’ny tanàna masina
  - type: text
    content: ka miankina amin’Andriamanitr’i Israely
  - type: text
    content: Izay «TOMPOn’izao rehetra izao» no anarany,
  - type: text
    content: 'henoy àry izao teniko izao:'
  '20':
  - type: text
    content: 'Mivoaha avy ao '
  - type: text
    content: Babilôna
  - type: note
    content: Jereo Apôk 18.4.
  - type: text
    content: ', mandosira avy ao Kaldea!'
  - type: text
    content: Amin’ny horakora-pifaliana no anambarao
  - type: text
    content: izao vaovao mahafaly izao,
  - type: text
    content: hatrany amin’ny faran’ny tany;
  - type: text
    content: 'torio ary aelezo izany, ka lazao hoe:'
  - type: text
    content: «Ny TOMPO no nanavotra ny firenen’i Jakôba mpanompony!»
  '21':
  - type: text
    content: Tsy nangetaheta ireo olony
  - type: text
    content: tamin’ny nitondrany azy tany an-taniefitra.
  - type: text
    content: 'Nampiboiboika rano ho azy avy tamin’ny vatolampy Izy:'
  - type: text
    content: eny, novakîny ny vatolampy ka nandriaka ny rano.
  '22':
  - type: text
    content: Tsy misy fiadanana ho an’ny olon-dratsy, hoy ny TOMPO
  - type: note
    content: Jereo 57.21.
  - type: text
    content: .
  '3':
  - type: text
    content: Efa hatry ny ela no nanambarako ny zava-niseho voalohany
  - type: note
    content: Jereo 41.22 sy nta.
  - type: text
    content: ;
  - type: text
    content: Izaho no nampanantena ireny sy nampandre azy anareo.
  - type: text
    content: Tampoka no nihetsehako, dia tonga tokoa ireny.
  '4':
  - type: text
    content: Saingy fantatro fa maditra ianareo;
  - type: text
    content: miridiridy toy ny hoza-by ny hatokareo
  - type: text
    content: ary mafy toy ny varahina ny handrinareo.
  '5':
  - type: text
    content: Koa nambarako anareo hatry ny ela ireny zavatra ireny
  - type: text
    content: ary nampandrenesiko anareo talohan’ny nisehoany,
  - type: text
    content: 'sao lazainareo hoe: «Ny sampinay no nanao ireny;'
  - type: text
    content: ny andriamanitray sarisokitra hazo
  - type: text
    content: na sarivongana varahina no nanome baiko toy izany.»
  '6':
  - type: text
    content: Efa renareo izay nambarako mialoha
  - type: text
    content: ka hitanareo fa tanteraka avokoa;
  - type: text
    content: moa tsy hotantarainareo ve izany?
  - type: text
    content: Manomboka androany àry
  - type: text
    content: dia hampandre anareo zava-baovao Aho,
  - type: text
    content: dia zavatra nafenina mbola tsy fantatrareo.
  '7':
  - type: text
    content: Vao izao ankehitriny izao fa tsy hatry ny ela
  - type: text
    content: no namoronako ireo zava-baovao ireo,
  - type: text
    content: Talohan’ny androany dia tsy mbola renareo izany
  - type: text
    content: 'sao holazainareo hoe: «Efa fantatray izany!»'
  '8':
  - type: text
    content: Ianareo koa moa tsy nihaino sady tsy te hahalala
  - type: text
    content: no tsy nanokatra sofina hatry ny ela;
  - type: text
    content: Fantatro fa mpamadika hatrany ianareo
  - type: text
    content: sady nantsoina hoe mpikomy hatrany am-bohòka.
  '9':
  - type: text
    content: Fa satria Andriamanitra Aho,
  - type: text
    content: dia notoneko ny fahatezerako
  - type: text
    content: ary ho fitandroako ny voninahitro,
  - type: text
    content: dia nandà tsy handringana anareo Aho.
