document_id: ISA.48,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manambara zava-baovao amin’i Israely ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Henoy izao, ry firenen’i Jakôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ianareo izay mitonon-tena ho Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy taranaka nipoitra avy tamin’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo izay mianiana amin’ny anaran’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miantso ny anaran’Andriamanitr’i Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy araka ny fahamarinana sy ny fahitsiana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Indro nosedraiko ianareo, nefa tsy tamin’ny afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fanao amin’ny volafotsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tamin’ny memin’ny fahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nandiovako anareo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Noho ny amiko no nanaovako izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, noho ny amiko ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy zakako velively
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hanalam-baràka ny anarako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny voninahitro tsy homeko ny hafa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay hanatanteraka ny fikasan’ny Tompo
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hoy ny TOMPO hoe: «Ry firenen’i Jakôba,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry vahoaka Israely izay nantsoiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'henoy Aho: Izaho no Ilay tsy miova,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no voalohany, ary Izaho koa no farany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 44.6 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eny, ny tanako no nametraka ny fanorenan’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tanako ankavanana no namelatra ny lanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha antsoiko ireo, dia miara-miseho avokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mivoria ka mihainoa ianareo rehetra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay tiako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mbola fitenenana an’i Kirôsa indray; jereo 41.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' no hanatanteraka'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay sitrapoko amin’i Babilôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny taranaky ny Kaldeanina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa iza taminareo moa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanambara izany? Tsy misy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izaho, eny, Izaho no niteny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho mihitsy no niantso azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanao izay hahatongavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hampahomby izay hataony.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Manatòna Ahy ianareo ka henoy izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa hatrany am-boalohany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nitenenako an-karihary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary teo Aho hatramin’ny vaninandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nisehoan’izany zavatra izany.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Ankehitriny dia Ilay Tompo ANDRIANANAHARY mihitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no naniraka ahy sy nanome ahy ny Fanahiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy voalaza mazava eto amin’ny rijan-teny na i Kirôsa mpanjaka no miteny na ny tenan’ny mpaminany. Jereo koa 61.1.
      marker-yv: yv-n
    - type: text
      text: .)
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Raha mba nihaino Ahy manko ianao!
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ry firenen’i Jakôba, ny TOMPO mpanavotra anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ilay Masin’i Israely dia miteny aminao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izaho TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampianatra anao izay mahasoa anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mitarika anao amin’ny lalana tokony halehanao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha mba nihaino tsara ny didiko manko ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho nikoriana toy ny ony ny fiadananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho toy ny onjan-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no fiavin’ny fanafahana anao!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny taranaka haloaky ny kibonao ho marobe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fasika eny amoron-dranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho tapaka na ho foana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehako ny anarany.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mivoaha avy ao Babilôna
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eny, ianareo izay mitonon-tena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho avy amin’ny tanàna masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miankina amin’Andriamanitr’i Israely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay «TOMPOn’izao rehetra izao» no anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'henoy àry izao teniko izao:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mivoaha avy ao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 18.4.
      marker-yv: yv-n
    - type: text
      text: ', mandosira avy ao Kaldea!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny horakora-pifaliana no anambarao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izao vaovao mahafaly izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny faran’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'torio ary aelezo izany, ka lazao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny TOMPO no nanavotra ny firenen’i Jakôba mpanompony!»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy nangetaheta ireo olony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny nitondrany azy tany an-taniefitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nampiboiboika rano ho azy avy tamin’ny vatolampy Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, novakîny ny vatolampy ka nandriaka ny rano.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy misy fiadanana ho an’ny olon-dratsy, hoy ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 57.21.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Efa hatry ny ela no nanambarako ny zava-niseho voalohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 41.22 sy nta.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no nampanantena ireny sy nampandre azy anareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tampoka no nihetsehako, dia tonga tokoa ireny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Saingy fantatro fa maditra ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miridiridy toy ny hoza-by ny hatokareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mafy toy ny varahina ny handrinareo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Koa nambarako anareo hatry ny ela ireny zavatra ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampandrenesiko anareo talohan’ny nisehoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sao lazainareo hoe: «Ny sampinay no nanao ireny;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny andriamanitray sarisokitra hazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na sarivongana varahina no nanome baiko toy izany.»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Efa renareo izay nambarako mialoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitanareo fa tanteraka avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moa tsy hotantarainareo ve izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manomboka androany àry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampandre anareo zava-baovao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia zavatra nafenina mbola tsy fantatrareo.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Vao izao ankehitriny izao fa tsy hatry ny ela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no namoronako ireo zava-baovao ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Talohan’ny androany dia tsy mbola renareo izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sao holazainareo hoe: «Efa fantatray izany!»'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ianareo koa moa tsy nihaino sady tsy te hahalala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tsy nanokatra sofina hatry ny ela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatro fa mpamadika hatrany ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nantsoina hoe mpikomy hatrany am-bohòka.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa satria Andriamanitra Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia notoneko ny fahatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho fitandroako ny voninahitro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nandà tsy handringana anareo Aho.
