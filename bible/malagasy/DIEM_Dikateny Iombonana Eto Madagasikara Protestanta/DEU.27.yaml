document_id: DEU.27
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: ANKALAZAIN’I ISRAELY NY FANEKEM-PIHAVANANA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo tsangambato teo amin’ny tendrombohitra Hebala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nandidy ny vahoaka i Mosesy sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tandremo avokoa ny didy izay ampitaiko aminareo anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amin’ny andro hitànareo ny ony Jôrdàna ho any amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo, dia vato lehibe no hatsanganareo ka holaloranareo sokay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary hosoratanareo eo amin’ireo vato ireo ny teny rehetra momba ity Lalàna ity, vantany vao tafita ny ony ianareo. Izany no hidiranareo ao amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo, dia tany tondra-dronono sy tantely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', araka izay nampanantenain’ny TOMPO Andriamanitry ny razambenareo taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Any amin’ny tendrombohitra Hebala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tendrombohitra Hebala: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny rijan-teny samaritanina sy ny dkt latinina tranainy anankiray dia ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tendrombohitra Gerizîma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' etoana; jereo 11.29 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' no hatsanganareo sy holaloranareo sokay ireo vato izay ameperako anareo anio ireo, rehefa tafita ny ony Jôrdàna ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eo koa no hanorenanareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ho an’ny TOMPO Andriamanitrareo, dia alitara vato tsy voapai-by. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vato tsy voavoatra no hanorenanareo io alitara io, ary eo amboniny dia hanoloranareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho an’ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hanolotra sorom-pihavanana koa ianareo, ka hihinana eo an-toerana sady hifaly eo anatrehan’ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Amin’ireo vato voatsangana ireo kosa no hanoratanareo ny teny rehetra momba ity Lalàna ity ka hataonareo velona tsara ny soratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 2-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jos 8.30-32.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia niteny tamin’ny Israelita rehetra indray i Mosesy sy ireo Levita mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'levita mpisorona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 17.9 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mangina ka mihainoa, ry Israelita. Izao anio izao ianareo no efa tonga vahoakan’ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa henoy ny feon’ny TOMPO Andriamanitrareo ary tanteraho ny didy aman-dalàny izay ampitaiko aminareo anio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Androtrizay koa dia nandidy ny vahoaka i Mosesy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: –Rehefa tafita ny ony Jôrdàna ianareo, dia ireto foko ireto no ho eo amin’ny tendrombohitra Gerizîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 11.29 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fanononam-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: pitahiana
  - type: text
    text: ' ho an’ny vahoaka: dia i Simehôna, i Levỳ, i Jodà, i Jisakara, i Jôsefa ary i Benjamîna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireto foko ireto kosa no ho eo amin’ny tendrombohitra Hebala amin’ny fanononana ozona: dia i Reobena, i Gada, i Asera, i Zebolòna, i Dana, ary i Naftalỳ.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ozona 12 fanonon’ny Levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hiteny amin’ny Israelita rehetra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ' ka feo mahery no hilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Ho voaozona anie ny olona izay manao sarin-javatra voasokitra ho sampiny na sarin-javatra amin’ny metaly nempoina ka mametraka azy hotsaohina an-takona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 4.15-18; Eks 20.4; Lev 19.4.
    marker-yv: yv-n
  - type: text
    text: ', satria maharikoriko eo imason’ny TOMPO ny asan-tanan’ny mahay taozavatra toy ireny!» Dia hamaly ny vahoaka rehetra ka hanao hoe: «'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: '!»'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Ho voaozona anie izay manao tsinontsinona ny ray aman-dreniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.12.
    marker-yv: yv-n
  - type: text
    text: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Ho voaozona anie izay mamindra ny orimbato faritry ny tanin’ny namany
  - type: usfm
