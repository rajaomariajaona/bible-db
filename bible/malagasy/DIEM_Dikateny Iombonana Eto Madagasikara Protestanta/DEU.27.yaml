  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: «Ho voaozona anie izay manao fitsarana miangatra amin’ny vahiny sy ny kamboty ary ny mpitondratena
  - type: usfm
