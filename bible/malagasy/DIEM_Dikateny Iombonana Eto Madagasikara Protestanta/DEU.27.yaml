    children:
    - type: text
      text: '18'
  - type: text
    text: «Ho voaozona anie izay mamery lalana ny jamba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.18 '
    - type: usfm
