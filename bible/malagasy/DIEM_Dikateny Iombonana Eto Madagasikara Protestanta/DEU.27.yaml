document_id: DEU.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: ANKALAZAIN’I ISRAELY NY FANEKEM-PIHAVANANA
  - type: heading
    content: Ireo tsangambato teo amin’ny tendrombohitra Hebala
  - type: text
    content: 'Dia nandidy ny vahoaka i Mosesy sy ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely ka nanao hoe:'
  - type: text
    content: '–Tandremo avokoa ny didy izay ampitaiko aminareo anio. '
  '10':
  - type: text
    content: Koa henoy ny feon’ny TOMPO Andriamanitrareo ary tanteraho ny didy aman-dalàny izay ampitaiko aminareo anio.
  '11':
  - type: text
    content: 'Androtrizay koa dia nandidy ny vahoaka i Mosesy ka nanao hoe:'
  '12':
  - type: text
    content: –Rehefa tafita ny ony Jôrdàna ianareo, dia ireto foko ireto no ho eo amin’ny tendrombohitra Gerizîma
  - type: note
    content: Jereo 11.29 sy nta.
  - type: text
    content: ' amin’ny fanononam-'
  - type: text
    content: pitahiana
  - type: text
    content: ' ho an’ny vahoaka: dia i Simehôna, i Levỳ, i Jodà, i Jisakara, i Jôsefa ary i Benjamîna. '
  '13':
  - type: text
    content: 'Ireto foko ireto kosa no ho eo amin’ny tendrombohitra Hebala amin’ny fanononana ozona: dia i Reobena, i Gada, i Asera, i Zebolòna, i Dana, ary i Naftalỳ.'
  - type: heading
    content: Ny ozona 12 fanonon’ny Levita
  '14':
  - type: text
    content: 'Dia hiteny amin’ny Israelita rehetra ny '
  - type: text
    content: Levita
  - type: text
    content: ' ka feo mahery no hilazany hoe:'
  '15':
  - type: text
    content: «Ho voaozona anie ny olona izay manao sarin-javatra voasokitra ho sampiny na sarin-javatra amin’ny metaly nempoina ka mametraka azy hotsaohina an-takona
  - type: note
    content: Jereo 4.15-18; Eks 20.4; Lev 19.4.
  - type: text
    content: ', satria maharikoriko eo imason’ny TOMPO ny asan-tanan’ny mahay taozavatra toy ireny!» Dia hamaly ny vahoaka rehetra ka hanao hoe: «'
  - type: text
    content: Amen
  - type: text
    content: '!»'
  '16':
  - type: text
    content: «Ho voaozona anie izay manao tsinontsinona ny ray aman-dreniny
  - type: note
    content: Jereo Eks 20.12.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '17':
  - type: text
    content: «Ho voaozona anie izay mamindra ny orimbato faritry ny tanin’ny namany
  - type: note
    content: Jereo 19.14.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '18':
  - type: text
    content: «Ho voaozona anie izay mamery lalana ny jamba
  - type: note
    content: Jereo Lev 19.14.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '19':
  - type: text
    content: «Ho voaozona anie izay manao fitsarana miangatra amin’ny vahiny sy ny kamboty ary ny mpitondratena
  - type: note
    content: Jereo 24.17-18; Eks 22.21; 23.9; Lev 19.33-34.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '2':
  - type: text
    content: 'Amin’ny andro hitànareo ny ony Jôrdàna ho any amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo, dia vato lehibe no hatsanganareo ka holaloranareo sokay; '
  '20':
  - type: text
    content: «Ho voaozona anie izay miray amin’ny vadin-drainy fa mahavery zo aman-kasina an-drainy izany
  - type: note
    content: Jereo 23.1; Lev 18.8; 20.11.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe; «Amen!»'
  '21':
  - type: text
    content: «Ho voaozona anie izay miray amin’ny biby
  - type: note
    content: Jereo Eks 22.18; Lev 18.23; 20.15-16.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '22':
  - type: text
    content: «Ho voaozona anie izay miray amin’ny anabaviny, na zanakavavin-drainy izany na zanakavavin-dreniny
  - type: note
    content: Jereo Lev 18.9; 20.17.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '23':
  - type: text
    content: «Ho voaozona anie izay miray amin’ny rafozambaviny
  - type: note
    content: Jereo Lev 18.17; 20.14.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '24':
  - type: text
    content: '«Ho voaozona anie izay mahafaty an-takona ny namany!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '25':
  - type: text
    content: '«Ho voaozona anie izay mandray kolikoly hahafaty olona tsy manan-tsiny!» Ary ny vahoaka rehetra hanao hoe: «Amen!»'
  '26':
  - type: text
    content: «Ho voaozona anie izay tsy mankatò ireo teny momba ity Lalàna ity sy tsy manatanteraka azy
  - type: note
    content: Jereo Gal 3.10.
  - type: text
    content: '!» Ary ny vahoaka rehetra hanao hoe: «Amen!».'
  '3':
  - type: text
    content: ary hosoratanareo eo amin’ireo vato ireo ny teny rehetra momba ity Lalàna ity, vantany vao tafita ny ony ianareo. Izany no hidiranareo ao amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo, dia tany tondra-dronono sy tantely
  - type: note
    content: Jereo Eks 3.8 sy nta.
  - type: text
    content: ', araka izay nampanantenain’ny TOMPO Andriamanitry ny razambenareo taminareo. '
  '4':
  - type: text
    content: Any amin’ny tendrombohitra Hebala
  - type: note
    content: 'tendrombohitra Hebala: ny rijan-teny samaritanina sy ny dkt latinina tranainy anankiray dia ahitana hoe tendrombohitra Gerizîma etoana; jereo 11.29 sy nta.'
  - type: text
    content: ' no hatsanganareo sy holaloranareo sokay ireo vato izay ameperako anareo anio ireo, rehefa tafita ny ony Jôrdàna ianareo. '
  '5':
  - type: text
    content: 'Eo koa no hanorenanareo '
  - type: text
    content: alitara
  - type: text
    content: ' ho an’ny TOMPO Andriamanitrareo, dia alitara vato tsy voapai-by. '
  '6':
  - type: text
    content: 'Vato tsy voavoatra no hanorenanareo io alitara io, ary eo amboniny dia hanoloranareo '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho an’ny TOMPO Andriamanitrareo. '
  '7':
  - type: text
    content: 'Hanolotra sorom-pihavanana koa ianareo, ka hihinana eo an-toerana sady hifaly eo anatrehan’ny TOMPO Andriamanitrareo. '
  '8':
  - type: text
    content: Amin’ireo vato voatsangana ireo kosa no hanoratanareo ny teny rehetra momba ity Lalàna ity ka hataonareo velona tsara ny soratra
  - type: note
    content: 'And 2-8: jereo Jos 8.30-32.'
  - type: text
    content: .
  '9':
  - type: text
    content: Dia niteny tamin’ny Israelita rehetra indray i Mosesy sy ireo Levita mpisorona
  - type: note
    content: 'levita mpisorona: jereo 17.9 sy nta.'
  - type: text
    content: ' ka nanao hoe:'
  - type: text
    content: '–Mangina ka mihainoa, ry Israelita. Izao anio izao ianareo no efa tonga vahoakan’ny TOMPO Andriamanitrareo. '
