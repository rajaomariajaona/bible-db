document_id: PRO.28
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mandositra ny olon-dratsy na dia tsy misy manenjika azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olo-marina kosa matoky tena toy ny liona tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rehefa mikorontana ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia maro mpitondra mifanolosolo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa manjaka kosa ny filaminana
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny olona iray manan-tsaina sy mahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tahaka ny oram-batravatra izay mandrava vokatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olon-dozabe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'olon-dozabe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika; ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: olo-mahantra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: izay mampahory ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay mahafoy ny lalàna dia mandoka ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mitandrina izany kosa miady aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny olon-dratsy tsy mahafantatra ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mitady ny TOMPO mahalala ny zava-drehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aleo ny mahantra mizotra tsy misy tsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay ny mpanankarena miolikolika fitondrantena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny zanaka manana fahaiza-manavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitandrina ny lalànan’ny Tompo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay misakaiza amin’ny naman-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manome henatra ny rainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mitombo harena amin’ny zana-bola mihoa-pampana
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manangona ho an’izay miantra ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay manampin-tsofina tsy hihaino ny lalàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny vavaka ataony aza dia maharikoriko ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mitarika ny olo-mahitsy amin’ny lalan-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mamarin-tena amin’ny fandrika nataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hahazo hasambarana kosa ny olona tsy misy tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mihevi-tena ho hendry ny mpanankarena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hamaky bantsilana azy ny mahantra mahay manavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rehefa mandresy ny olo-marina, dia ankalazain’ny besinimaro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rehefa ny olon-dratsy no mahery, dia ieren’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay manafina ny fahotany tsy mba hahita fahombiazana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay miaiky izany ka miala aminy no hahazo indrafo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sambatra ny olona izay manaja ny Tompo mandrakariva,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay manamafy ny fony kosa hidiran-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tahaka ny liona mierona sy orsa noana ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manapaka amin’ny vahoaka mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mampitombo famoretana ny mpanapaka tsy ampy saina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho ela velona kosa izay mankahala fierenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Handositra hatrany am-pasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona izay enjehin’ny eritreriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'noho izy nahafaty olona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy hisy hisakana azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay mizotra tsy misy tsiny no ho voavonjy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay miolikolika fitondrantena no ho lavo tampoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay miasa ny taniny ho voky hanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mamboly hevidravina kosa ho voky fahantrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho ampoky ny fitahiana ny olona mahatoky
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hieren-doza kosa ny maika hanan-karena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy tsara ny mizaha tavan’olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa na dia sombi-mofo ihany aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mety hanotan’ny olona amin’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Maika ny hanan-karena ny mpitsiriritra
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy tsy fantany fa ho avy aminy ny fahantrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay mananatra olona dia hahazo sitraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: bebe kokoa amin’ny farany
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho izay manao teny mandodoka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay mandroba ny rainy sy ny reniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka manao hoe: «Tsy fahotana izany»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia naman’ny jiolahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny olona tia tena loatra no manetsika ady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay matoky ny TOMPO kosa ho tretrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Adala izay mitompo teny fantatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mandeha amim-pahendrena no ho voavonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay manome ny mahantra tsy hanan-java-mahory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izay mikimpy tsy mijery azy kosa ho rakotra ozona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Rehefa mahery ny olon-dratsy, dia ieren’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rehefa ringana kosa ireo, dia ny olo-marina no mitondra.
