document_id: PRO.28,396
type_code: plt
verses:
  '1':
  - type: text
    content: Mandositra ny olon-dratsy na dia tsy misy manenjika azy,
  - type: text
    content: fa ny olo-marina kosa matoky tena toy ny liona tanora.
  '10':
  - type: text
    content: Izay mitarika ny olo-mahitsy amin’ny lalan-dratsy
  - type: text
    content: dia mamarin-tena amin’ny fandrika nataony;
  - type: text
    content: fa hahazo hasambarana kosa ny olona tsy misy tsiny.
  '11':
  - type: text
    content: Mihevi-tena ho hendry ny mpanankarena,
  - type: text
    content: fa hamaky bantsilana azy ny mahantra mahay manavaka.
  '12':
  - type: text
    content: Rehefa mandresy ny olo-marina, dia ankalazain’ny besinimaro;
  - type: text
    content: fa rehefa ny olon-dratsy no mahery, dia ieren’ny olona.
  '13':
  - type: text
    content: Izay manafina ny fahotany tsy mba hahita fahombiazana,
  - type: text
    content: fa izay miaiky izany ka miala aminy no hahazo indrafo.
  '14':
  - type: text
    content: Sambatra ny olona izay manaja ny Tompo mandrakariva,
  - type: text
    content: fa izay manamafy ny fony kosa hidiran-doza.
  '15':
  - type: text
    content: Tahaka ny liona mierona sy orsa noana ny olon-dratsy
  - type: text
    content: izay manapaka amin’ny vahoaka mahantra.
  '16':
  - type: text
    content: Mampitombo famoretana ny mpanapaka tsy ampy saina;
  - type: text
    content: fa ho ela velona kosa izay mankahala fierenana.
  '17':
  - type: text
    content: Handositra hatrany am-pasana
  - type: text
    content: ny olona izay enjehin’ny eritreriny
  - type: text
    content: 'noho izy nahafaty olona:'
  - type: text
    content: aoka tsy hisy hisakana azy!
  '18':
  - type: text
    content: Izay mizotra tsy misy tsiny no ho voavonjy
  - type: text
    content: fa izay miolikolika fitondrantena no ho lavo tampoka.
  '19':
  - type: text
    content: Izay miasa ny taniny ho voky hanina,
  - type: text
    content: fa izay mamboly hevidravina kosa ho voky fahantrana.
  '2':
  - type: text
    content: Rehefa mikorontana ny tany,
  - type: text
    content: dia maro mpitondra mifanolosolo.
  - type: text
    content: Fa manjaka kosa ny filaminana
  - type: text
    content: noho ny olona iray manan-tsaina sy mahay.
  '20':
  - type: text
    content: Ho ampoky ny fitahiana ny olona mahatoky
  - type: text
    content: fa tsy hieren-doza kosa ny maika hanan-karena.
  '21':
  - type: text
    content: Tsy tsara ny mizaha tavan’olona;
  - type: text
    content: kanefa na dia sombi-mofo ihany aza
  - type: text
    content: dia mety hanotan’ny olona amin’izany.
  '22':
  - type: text
    content: Maika ny hanan-karena ny mpitsiriritra
  - type: text
    content: saingy tsy fantany fa ho avy aminy ny fahantrana.
  '23':
  - type: text
    content: Izay mananatra olona dia hahazo sitraka
  - type: text
    content: bebe kokoa amin’ny farany
  - type: text
    content: noho izay manao teny mandodoka azy.
  '24':
  - type: text
    content: Izay mandroba ny rainy sy ny reniny
  - type: text
    content: 'ka manao hoe: «Tsy fahotana izany»,'
  - type: text
    content: dia naman’ny jiolahy.
  '25':
  - type: text
    content: Ny olona tia tena loatra no manetsika ady;
  - type: text
    content: fa izay matoky ny TOMPO kosa ho tretrika.
  '26':
  - type: text
    content: Adala izay mitompo teny fantatra,
  - type: text
    content: fa izay mandeha amim-pahendrena no ho voavonjy.
  '27':
  - type: text
    content: Izay manome ny mahantra tsy hanan-java-mahory,
  - type: text
    content: fa izay mikimpy tsy mijery azy kosa ho rakotra ozona.
  '28':
  - type: text
    content: Rehefa mahery ny olon-dratsy, dia ieren’ny olona;
  - type: text
    content: fa rehefa ringana kosa ireo, dia ny olo-marina no mitondra.
  '3':
  - type: text
    content: Tahaka ny oram-batravatra izay mandrava vokatra
  - type: text
    content: ny olon-dozabe
  - type: note
    content: 'olon-dozabe: araka ny dkt tranainy grika; ny RM kosa manao hoe olo-mahantra.'
  - type: text
    content: izay mampahory ny mahantra.
  '4':
  - type: text
    content: Izay mahafoy ny lalàna dia mandoka ny olon-dratsy,
  - type: text
    content: fa izay mitandrina izany kosa miady aminy.
  '5':
  - type: text
    content: Ny olon-dratsy tsy mahafantatra ny rariny,
  - type: text
    content: fa izay mitady ny TOMPO mahalala ny zava-drehetra.
  '6':
  - type: text
    content: Aleo ny mahantra mizotra tsy misy tsiny,
  - type: text
    content: toy izay ny mpanankarena miolikolika fitondrantena.
  '7':
  - type: text
    content: Ny zanaka manana fahaiza-manavaka
  - type: text
    content: dia mitandrina ny lalànan’ny Tompo;
  - type: text
    content: fa izay misakaiza amin’ny naman-dratsy
  - type: text
    content: dia manome henatra ny rainy.
  '8':
  - type: text
    content: Izay mitombo harena amin’ny zana-bola mihoa-pampana
  - type: text
    content: dia manangona ho an’izay miantra ny mahantra.
  '9':
  - type: text
    content: Izay manampin-tsofina tsy hihaino ny lalàna,
  - type: text
    content: na ny vavaka ataony aza dia maharikoriko ny Tompo.
