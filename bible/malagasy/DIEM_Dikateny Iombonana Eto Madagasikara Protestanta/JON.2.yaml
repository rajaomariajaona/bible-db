document_id: JON.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavak’i Jônà
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nandefa trondro lehibe hitelina an’i Jônà ny TOMPO. Koa nitoetra telo andro sy telo alina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Telo andro sy telo alina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mt 12.40.
      marker-yv: yv-n
    - type: text
      text: ' tao an-kibon’ilay trondro i Jônà. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa izaho kosa amin-kira fiderana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no hanolorako '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' aminao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary hanefako ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voady
    - type: text
      text: ' izay nataoko.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anao, TOMPO ô, ny famonjena!
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary notenenin’ny TOMPO ilay trondro mba hamoaka an’i Jônà, dia naloany ho eny amin’ny tany maina izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tao izy no nanandratra izao vavaka izao tamin’ny TOMPO Andriamaniny '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao an-katerena aho, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no velon-taraina taminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namaly ahy Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tao anatin’ny toeran’ny maty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no niantsoako vonjy taminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihaino ahy Ianao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Natsipinao tao amin’ny lalina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tao an-kibon’ny ranomasina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanafotra ahy ny riaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natosakao tamiko avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny alon-dranonao aman’onjanao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy aho anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro aho voaroaka tsy ho eo imasonao, Tompo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'kanefa mbola manatrika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempolinao
    - type: text
      text: ' masina ihany.»'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Efa mby hatendako ny rano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nanafotra ahy ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ahidrano nisaringotra amin’ny lohako.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tany amin’ny fanambanin’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahatafalatsaka ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihidy tamiko mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vavahadin’ny sehatry ny maty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Ianao, ry TOMPO Andriamanitro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampiakatra ahy velona avy tao an-davaka.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Raha iny efa ho faty iny aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahatsiaro Anao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vavaka nataoko taminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga tao an-tempolinao masina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa izay mivavaka amin’ny andriamani-tsiizy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka hiala amin’ireny sampy ifikirany ireny.
