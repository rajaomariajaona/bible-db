document_id: JON.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vavak’i Jônà
  - type: text
    content: Nandefa trondro lehibe hitelina an’i Jônà ny TOMPO. Koa nitoetra telo andro sy telo alina
  - type: note
    content: 'Telo andro sy telo alina: jereo Mt 12.40.'
  - type: text
    content: ' tao an-kibon’ilay trondro i Jônà. '
  '10':
  - type: text
    content: Fa izaho kosa amin-kira fiderana
  - type: text
    content: 'no hanolorako '
  - type: text
    content: sorona
  - type: text
    content: ' aminao,'
  - type: text
    content: 'ary hanefako ny '
  - type: text
    content: voady
  - type: text
    content: ' izay nataoko.'
  - type: text
    content: Anao, TOMPO ô, ny famonjena!
  '11':
  - type: text
    content: Ary notenenin’ny TOMPO ilay trondro mba hamoaka an’i Jônà, dia naloany ho eny amin’ny tany maina izy.
  '2':
  - type: text
    content: 'Tao izy no nanandratra izao vavaka izao tamin’ny TOMPO Andriamaniny '
  '3':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: Tao an-katerena aho, TOMPO ô,
  - type: text
    content: no velon-taraina taminao,
  - type: text
    content: ka namaly ahy Ianao;
  - type: text
    content: tao anatin’ny toeran’ny maty
  - type: text
    content: no niantsoako vonjy taminao,
  - type: text
    content: ka nihaino ahy Ianao.
  '4':
  - type: text
    content: Natsipinao tao amin’ny lalina aho,
  - type: text
    content: dia tao an-kibon’ny ranomasina.
  - type: text
    content: Nanafotra ahy ny riaka;
  - type: text
    content: natosakao tamiko avokoa
  - type: text
    content: ny alon-dranonao aman’onjanao.
  '5':
  - type: text
    content: 'Dia hoy aho anakampo hoe:'
  - type: text
    content: «Indro aho voaroaka tsy ho eo imasonao, Tompo ô,
  - type: text
    content: 'kanefa mbola manatrika ny '
  - type: text
    content: tempolinao
  - type: text
    content: ' masina ihany.»'
  '6':
  - type: text
    content: Efa mby hatendako ny rano;
  - type: text
    content: nanafotra ahy ny ranomasina,
  - type: text
    content: ary ny ahidrano nisaringotra amin’ny lohako.
  '7':
  - type: text
    content: Tany amin’ny fanambanin’ny tendrombohitra
  - type: text
    content: no nahatafalatsaka ahy,
  - type: text
    content: ka nihidy tamiko mandrakizay
  - type: text
    content: ny vavahadin’ny sehatry ny maty.
  - type: text
    content: Nefa Ianao, ry TOMPO Andriamanitro ô,
  - type: text
    content: nampiakatra ahy velona avy tao an-davaka.
  '8':
  - type: text
    content: Raha iny efa ho faty iny aho,
  - type: text
    content: dia nahatsiaro Anao, TOMPO ô,
  - type: text
    content: ary ny vavaka nataoko taminao
  - type: text
    content: dia tonga tao an-tempolinao masina.
  '9':
  - type: text
    content: Fa izay mivavaka amin’ny andriamani-tsiizy
  - type: text
    content: dia aoka hiala amin’ireny sampy ifikirany ireny.
