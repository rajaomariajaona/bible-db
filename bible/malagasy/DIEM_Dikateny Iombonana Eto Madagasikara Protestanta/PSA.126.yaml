document_id: PSA.126,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fifaliana misolo tomany
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: 'Fony nampody ny babo tamin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny TOMPO'
  - type: note
    content: 'Fony...Tompo: dkt hafa fony nambinin’ny Tompo indray i Tsiôna.'
  - type: text
    content: ','
  - type: text
    content: dia ohatra ny nanonofinofy isika.
  '2':
  - type: text
    content: Tonga feno hehy isika
  - type: text
    content: sady feno fihobiana.
  - type: text
    content: 'Tamin’izany ireo hafa firenena dia loa-bolana hoe:'
  - type: text
    content: «Zava-dehibe no nataon’ny TOMPO taminy!»
  '3':
  - type: text
    content: Eny, zava-dehibe no nataon’ny TOMPO tamintsika
  - type: text
    content: ka faly tokoa isika!
  '4':
  - type: text
    content: Avereno ho firenena matanjaka izahay, TOMPO ô,
  - type: text
    content: toy ny anondrahan’ny ranotrambo an’i Negeba.
  '5':
  - type: text
    content: Izay mamafy amin-dranomaso
  - type: text
    content: no hijinja amim-pihobiana.
  '6':
  - type: text
    content: Eny tokoa, mandroso no tomany
  - type: text
    content: mivesatra ny voa hafafy;
  - type: text
    content: fa nony miverina, feno fihobiana
  - type: text
    content: mivesatra ny amboaram-bokatra
  - type: note
    content: 'ny tomany ovàna ho fifaliana (and 5-6): jereo Sal 30.12; Jer 31.9-13; Jôh 16.20.'
  - type: text
    content: .
