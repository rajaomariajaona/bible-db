document_id: NUM.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ranon’i Meribà
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Eks 17.1-7)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tonga tao amin’ny taniefitr’i Tsina ny fiangonan’i Israely iray manontolo tamin’ny volana voalohany; ary nijanona tao Kadesy ny vahoaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: taniefitr’i Tsina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kadesy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 13.21 sy nta.
      marker-yv: yv-n
    - type: text
      text: . Tao no nahafatesan’i Miriama sady nandevenana azy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorin’izy sy i Aharôna teo anoloan’ny vatolampy ny fiangonana ka noteneniny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Henoinareo, ry mpiodina: Moa afaka hamoaka rano ho anareo avy amin’ity vato ity va izahay?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ningain’i Mosesy ny tanany ka nokapohiny indroa tamin’ny tehiny ny vatolampy; dia niboiboika be ny rano ka samy nisotro avokoa ny olon-drehetra mbamin’ny biby fiompiny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa niteny tamin’i Mosesy sy i Aharôna ny TOMPO ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Satria tsy nino Ahy ianareo ka tsy naneho ny fahamasinako teo anatrehan’ny Israelita, dia tsy hitondra ity fiangonana ity ho any amin’ny tany izay omeko azy ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy niseho miharihary ny fahadisoan’i Mosesy sy i Aharôna; fa izay mety ho nanomezan’Andriamanitra tsiny azy angamba, dia noho izy '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nikapoka ny vatolampy (and 11)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' toy izay '
      - type: usfm
        marker: it
        children:
        - type: text
          text: niteny tamin’ny vatolampy izy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 8).'
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eto no misy ny ranon’i Meribà satria nila ady tamin’ny TOMPO teto ny Israelita ka nanehoany ny fahamasinany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy mamela ny Israelita handeha ny mpanjakan’i Edôma
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naniraka olona avy tao Kadesy hankany amin’ny mpanjakan’i Edôma i Mosesy hilaza aminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny israelita rahalahinao. Fantatrao ny fahoriana rehetra nahazo anay. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nidina tany Ejipta ireo razanay ary nipetraka ela tany izahay, nefa dia nampahory anay sy ny razanay ny Ejiptianina. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nitaraina tamin’ny TOMPO izahay, dia nihaino ny feonay Izy ka naniraka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' hamoaka anay avy tany Ejipta. Ary indreto izahay ankehitriny eto Kadesy, tanàna ao amin’ny faritry ny taninao. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa mba avelao re izahay handeha hamaky eo amin’ny taninao. Tsy hamaky any amin’ny saha na ny tanimboaloboka izahay, ary tsy hisotro amin’ny ranom-pantsakana; fa iny arabe migodana iny ihany no hizoranay ka tsy hivilivily hiankavia na hiankavanana izahay mandra-pahafakay ny faritry ny taninao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpanjakan’i Edôma namaly azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mahazo mandalo ny taniko ianareo; fa raha tsy izany, dia ady no hitsenako anareo.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny Israelita taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny lalambe ihany no hiakaranay; koa raha hisotro amin’ny ranonao izahay sy ny biby fiompinay, dia haloanay aminao ny vidin’izany. Tokana ny zavatra angatahinay, dia ny handalo eo fotsiny ihany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tsy nisy intsony ny rano ho an’ny fiangonana, dia nitangoronany i Mosesy sy i Aharôna '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’ny mpanjakan’i Edôma hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mahazo mandalo eo ianareo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka nitsena azy niaraka tamin’ny vahoaka marobe nirongo fiadiana ny Edômita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no tsy namelan’i Edômita ny Israelita handalo eo amin’ny taniny; koa dia lalan-kafa no nizorany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Aharôna
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala tao Kadesy ny fiangonan’i Israely iray manontolo ka tonga tao amin’ny tendrombohitra Hôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toerana tsy fantatra.
      marker-yv: yv-n
    - type: text
      text: ', '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin’ny sisin-tanin’i Edôma. Tao ny TOMPO no niteny tamin’i Mosesy sy i Aharôna ka nanao hoe:'
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa hampodina any amin’ny razany i Aharôna, fa tsy hiditra any amin’ny tany izay nomeko ny Israelita satria tsy nankatò ny teniko teo amin’ny ranon’i Meribà ianareo. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa ento, ry Mosesy, i Aharôna sy i Elehazara zanany hiakatra eo an-tendrombohitra Hôra. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia esory ny akanjo fisoronan’i Aharôna ka ampanaovy an’i Elehazara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ity fampitana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny akanjo fisoronana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ity, jereo Eks 29.29-30.'
      marker-yv: yv-n
    - type: text
      text: ' zanany. Hody any amin’ny razany i Aharôna ary eo no hahafatesany.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao araka izay nandidian’ny TOMPO azy i Mosesy, ary teo imason’ny fiangonana iray manontolo no niakaran’izy telo mianaka ny tendrombohitra Hôra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nesorin’i Mosesy ny akanjo fisoronana teny amin’i Aharôna ka nampanaovina an’i Elehazara zanany; ary maty teo an-tampon’ny tendrombohitra i Aharôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 33.38-39; Deot 10.6.
      marker-yv: yv-n
    - type: text
      text: '. Avy eo i Mosesy sy i Elehazara dia nidina ny tendrombohitra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tsinjon’ny fiangonana manontolo fa maty i Aharôna, dia nisaona azy nandritra ny telopolo andro ny taranak’i Israely rehetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nilany ady i Mosesy ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha mba maty tamin’ny nahafatesan’ny mpiray firenena aminay teo anatrehan’ny TOMPO manko izahay! '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa nahoana no nentinareo atỳ an-taniefitra izahay fiangonan’ny TOMPO? Mba hahafaty anay sy ny biby fiompinay atỳ ve? '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nahoana no nampialanareo tany Ejipta izahay ka nentinareo atỳ amin’ny tany ratsy atỳ, izay tsy azo amafazana akory sady tsy misy aviavy na voaloboka na ampongabendanitra na rano hosotroina akory?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Navelan’i Mosesy sy i Aharôna teo ny Israelita fa lasa izy roa lahy nankeo am-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' ka niankohoka tamin’ny tany; ary niseho taminy ny voninahitry ny TOMPO. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiso ny tehinao, ka vorionao sy i Aharôna rahalahinao ny Israelita. Eo imason’izy ireo no hitenenanareo amin’ny vatolampy, dia hanome rano izy. Eny, hampiboiboika rano ho azy ireo avy amin’io vato io ianao, ka hampisotro ny Israelita sy ny biby fiompiny!
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalain’i Mosesy tao amin’ny Fonena-masin’ny TOMPO araka ny baiko azony ny tehiny. '
