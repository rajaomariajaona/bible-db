document_id: NUM.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ranon’i Meribà
  - type: heading
    content: (Jereo Eks 17.1-7)
  - type: text
    content: Tonga tao amin’ny taniefitr’i Tsina ny fiangonan’i Israely iray manontolo tamin’ny volana voalohany; ary nijanona tao Kadesy ny vahoaka
  - type: note
    content: 'taniefitr’i Tsina, Kadesy: jereo 13.21 sy nta.'
  - type: text
    content: . Tao no nahafatesan’i Miriama sady nandevenana azy.
  '10':
  - type: text
    content: 'Novorin’izy sy i Aharôna teo anoloan’ny vatolampy ny fiangonana ka noteneniny hoe:'
  - type: text
    content: '–Henoinareo, ry mpiodina: Moa afaka hamoaka rano ho anareo avy amin’ity vato ity va izahay?'
  '11':
  - type: text
    content: 'Ningain’i Mosesy ny tanany ka nokapohiny indroa tamin’ny tehiny ny vatolampy; dia niboiboika be ny rano ka samy nisotro avokoa ny olon-drehetra mbamin’ny biby fiompiny. '
  '12':
  - type: text
    content: 'Fa niteny tamin’i Mosesy sy i Aharôna ny TOMPO ka nanao hoe:'
  - type: text
    content: –Satria tsy nino Ahy ianareo ka tsy naneho ny fahamasinako teo anatrehan’ny Israelita, dia tsy hitondra ity fiangonana ity ho any amin’ny tany izay omeko azy ianareo
  - type: note
    content: Tsy niseho miharihary ny fahadisoan’i Mosesy sy i Aharôna; fa izay mety ho nanomezan’Andriamanitra tsiny azy angamba, dia noho izy nikapoka ny vatolampy (and 11) toy izay niteny tamin’ny vatolampy izy (and 8).
  - type: text
    content: .
  '13':
  - type: text
    content: Eto no misy ny ranon’i Meribà satria nila ady tamin’ny TOMPO teto ny Israelita ka nanehoany ny fahamasinany.
  - type: heading
    content: Tsy mamela ny Israelita handeha ny mpanjakan’i Edôma
  '14':
  - type: text
    content: 'Naniraka olona avy tao Kadesy hankany amin’ny mpanjakan’i Edôma i Mosesy hilaza aminy hoe:'
  - type: text
    content: '–Izao no lazain’ny israelita rahalahinao. Fantatrao ny fahoriana rehetra nahazo anay. '
  '15':
  - type: text
    content: 'Nidina tany Ejipta ireo razanay ary nipetraka ela tany izahay, nefa dia nampahory anay sy ny razanay ny Ejiptianina. '
  '16':
  - type: text
    content: 'Nitaraina tamin’ny TOMPO izahay, dia nihaino ny feonay Izy ka naniraka '
  - type: text
    content: anjely
  - type: text
    content: ' hamoaka anay avy tany Ejipta. Ary indreto izahay ankehitriny eto Kadesy, tanàna ao amin’ny faritry ny taninao. '
  '17':
  - type: text
    content: Koa mba avelao re izahay handeha hamaky eo amin’ny taninao. Tsy hamaky any amin’ny saha na ny tanimboaloboka izahay, ary tsy hisotro amin’ny ranom-pantsakana; fa iny arabe migodana iny ihany no hizoranay ka tsy hivilivily hiankavia na hiankavanana izahay mandra-pahafakay ny faritry ny taninao.
  '18':
  - type: text
    content: 'Fa hoy ny mpanjakan’i Edôma namaly azy:'
  - type: text
    content: –Tsy mahazo mandalo ny taniko ianareo; fa raha tsy izany, dia ady no hitsenako anareo.
  '19':
  - type: text
    content: 'Dia hoy ny Israelita taminy:'
  - type: text
    content: –Ny lalambe ihany no hiakaranay; koa raha hisotro amin’ny ranonao izahay sy ny biby fiompinay, dia haloanay aminao ny vidin’izany. Tokana ny zavatra angatahinay, dia ny handalo eo fotsiny ihany.
  '2':
  - type: text
    content: 'Rehefa tsy nisy intsony ny rano ho an’ny fiangonana, dia nitangoronany i Mosesy sy i Aharôna '
  '20':
  - type: text
    content: 'Fa novalian’ny mpanjakan’i Edôma hoe:'
  - type: text
    content: –Tsy mahazo mandalo eo ianareo.
  - type: text
    content: 'Dia nivoaka nitsena azy niaraka tamin’ny vahoaka marobe nirongo fiadiana ny Edômita. '
  '21':
  - type: text
    content: Toy izany no tsy namelan’i Edômita ny Israelita handalo eo amin’ny taniny; koa dia lalan-kafa no nizorany.
  - type: heading
    content: Ny nahafatesan’i Aharôna
  '22':
  - type: text
    content: Dia niala tao Kadesy ny fiangonan’i Israely iray manontolo ka tonga tao amin’ny tendrombohitra Hôra
  - type: note
    content: Toerana tsy fantatra.
  - type: text
    content: ', '
  '23':
  - type: text
    content: 'amin’ny sisin-tanin’i Edôma. Tao ny TOMPO no niteny tamin’i Mosesy sy i Aharôna ka nanao hoe:'
  '24':
  - type: text
    content: '–Efa hampodina any amin’ny razany i Aharôna, fa tsy hiditra any amin’ny tany izay nomeko ny Israelita satria tsy nankatò ny teniko teo amin’ny ranon’i Meribà ianareo. '
  '25':
  - type: text
    content: 'Koa ento, ry Mosesy, i Aharôna sy i Elehazara zanany hiakatra eo an-tendrombohitra Hôra. '
  '26':
  - type: text
    content: Dia esory ny akanjo fisoronan’i Aharôna ka ampanaovy an’i Elehazara
  - type: note
    content: Momba ity fampitana ny akanjo fisoronana ity, jereo Eks 29.29-30.
  - type: text
    content: ' zanany. Hody any amin’ny razany i Aharôna ary eo no hahafatesany.'
  '27':
  - type: text
    content: 'Dia nanao araka izay nandidian’ny TOMPO azy i Mosesy, ary teo imason’ny fiangonana iray manontolo no niakaran’izy telo mianaka ny tendrombohitra Hôra. '
  '28':
  - type: text
    content: Nesorin’i Mosesy ny akanjo fisoronana teny amin’i Aharôna ka nampanaovina an’i Elehazara zanany; ary maty teo an-tampon’ny tendrombohitra i Aharôna
  - type: note
    content: Jereo 33.38-39; Deot 10.6.
  - type: text
    content: '. Avy eo i Mosesy sy i Elehazara dia nidina ny tendrombohitra. '
  '29':
  - type: text
    content: Rehefa tsinjon’ny fiangonana manontolo fa maty i Aharôna, dia nisaona azy nandritra ny telopolo andro ny taranak’i Israely rehetra.
  '3':
  - type: text
    content: 'ka nilany ady i Mosesy ka nataony hoe:'
  - type: text
    content: '–Raha mba maty tamin’ny nahafatesan’ny mpiray firenena aminay teo anatrehan’ny TOMPO manko izahay! '
  '4':
  - type: text
    content: 'Fa nahoana no nentinareo atỳ an-taniefitra izahay fiangonan’ny TOMPO? Mba hahafaty anay sy ny biby fiompinay atỳ ve? '
  '5':
  - type: text
    content: Nahoana no nampialanareo tany Ejipta izahay ka nentinareo atỳ amin’ny tany ratsy atỳ, izay tsy azo amafazana akory sady tsy misy aviavy na voaloboka na ampongabendanitra na rano hosotroina akory?
  '6':
  - type: text
    content: 'Navelan’i Mosesy sy i Aharôna teo ny Israelita fa lasa izy roa lahy nankeo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ka niankohoka tamin’ny tany; ary niseho taminy ny voninahitry ny TOMPO. '
  '7':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  '8':
  - type: text
    content: –Raiso ny tehinao, ka vorionao sy i Aharôna rahalahinao ny Israelita. Eo imason’izy ireo no hitenenanareo amin’ny vatolampy, dia hanome rano izy. Eny, hampiboiboika rano ho azy ireo avy amin’io vato io ianao, ka hampisotro ny Israelita sy ny biby fiompiny!
  '9':
  - type: text
    content: 'Dia nalain’i Mosesy tao amin’ny Fonena-masin’ny TOMPO araka ny baiko azony ny tehiny. '
