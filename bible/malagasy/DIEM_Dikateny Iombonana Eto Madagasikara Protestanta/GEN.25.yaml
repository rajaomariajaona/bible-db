document_id: GEN.25,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Abrahama sy ny lisitry ny taranany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola naka vady hafa indray i Abrahama, ka i Ketorà no anarany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Novidîn’i Abrahama tamin’ny taranak’i Heta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Novidîn’i...Heta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 23.3-16.
      marker-yv: yv-n
    - type: text
      text: 'io saha io, ary tao no nandevenana an’i Abrahama sy i Sarà vadiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’ny nahafatesan’i Abrahama, dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: notahîn
    - type: text
      text: ’Andriamanitra i Itsehàka zanany, izay nonina tao akaikin’ny fantsakana Lahay-Rôy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 16.14.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lisitry ny taranak’i Jismahela, zanakalahin’i Abrahama, naterak’i Hagara ilay Ejiptianina mpanompovavin’i Sarà. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto avy no anaran’ny zanakalahin’i Jismahela araka ny laharan’ny nahaterahany: i Nebaiôta sy i Kedara, i Adbeèla sy i Mibsàna, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Mismà sy i Domà, i Masà '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy i Hadada, i Temà sy i Jetora ary i Nafisy sy i Kedmà. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no zanak’i Jismahela 12 lahy, samy lehiben-tarika avy. Samy mitondra ny anarany avy ny tanànany sy ny tobiny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahatratra 137 taona i Jismahela vao niala aina, ary maty ka nakambana tamin’ny razany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny nipetrahan’ny taranak’i Jismahela dia ny faritra manomboka eo Havilà ka hatrany Sora; i Sora dia any akaikin’i Ejipta tamin’iny lalana mankany Asora iny. Nihataka tamin’ireo taranak’i Abrahama hafa no nitoerany.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: JAKÔBA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Hesao sy i Jakôba
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no tantaran’i Itsehàka:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Itsehàka dia zanakalahin’i Abrahama. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteraka enin-dahy tamin’i Abrahama izy, dia ireto avy izany: i Zimràna sy i Jôksàna, i Medàna sy i Midiàna ary i Jisbàka sy i Soa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa feno efapolo taona izy dia nanambady an’i Rebekà, anabavin’i Labàna sady zanakavavin’i Betoela izay Aramianina tao Padàna-Arama. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitaraina tamin’ny TOMPO ho an’ny vadiny i Itsehàka satria tsy niteraka izy. Dia nohenoin’ny TOMPO ny fitarainany, koa nitoe-jaza i Rebekà vadiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nifandàka ireo zaza kambana tao an-kibony, ka hoy Rebekà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha toy izany, nahoana re aho no nitoe-jaza?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa nanontany ny TOMPO izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly azy ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Firenena roa no ao an-kibonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vahoaka roa tonta no haterakao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ankilany hahery noho ny andaniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zokiny hanompo ny zandriny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 9.12.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga ny andro hiterahany, dia niteraka zaza kambana tokoa i Rebekà. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ilay teraka voalohany dia menamena, voloina toy ny lamba volom-biby ka natao hoe Hesao ny anarany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hesao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mampahatsiaro ny voambolana izay nadika '
      - type: usfm
        marker: it
        children:
        - type: text
          text: voloina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’izany dia teraka koa ny rahalahiny; nohazoniny ny voditongotr’i Hesao ka natao hoe Jakôba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jakôba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mampahatsiaro ny teny izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: voditongotra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto; jereo ny 27.36 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' ny anarany. Efa enimpolo taona i Itsehàka tamin’ny nahaterahan’izy mirahalahy.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitombo ireo zaza, ka i Hesao dia tonga mpihaza mahay sady mpianefitra; fa i Jakôba kosa dia lehilahy bonaika, mpipetraka an-day. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Itsehàka dia tia an’i Hesao, satria nankafy ny hazany; fa i Rebekà kosa tia an’i Jakôba.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo am-pandrahoana sakafo indrindra i Jakôba indray andro, no tonga avy any an-tsaha i Hesao sady reraka mafy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jôksàna no rain’i Sebà sy i Dedàna; ny Asorita sy ny Letosita ary ny Leomita no taranak’i Dedàna. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nangataka taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba omeo kely amin’io sakafo efa menafify io aho fa reraka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: (Izany no niantsoana azy tamin’ny anaram-bositra hoe Edôma na Ilaimena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Edôma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mampahatsiaro ny teny izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sakafo menafify
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto.'
      marker-yv: yv-n
    - type: text
      text: ).
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly azy i Jakôba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Amidio amiko àry aloha ny fizokianao.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Hesao hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: –Inty hono aho ka ho faty, dia hataoko inona moa izay fizokiana?
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly indray i Jakôba hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: –Mianiàna amiko àry ianao izao anio izao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nianiana taminy izy ka nivarotra tamin’i Jakôba ny fizokiany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nomen’i Jakôba mofo sy voanemba masaka i Hesao ka nihinana sy nisotro. Avy eo izy dia niainga ary lasa nandeha fa tsy niraharaha ny fizokiany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Heb 12.16.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zanakalahin’i Midiàna dia i Hefà sy i Hefera, i Hanôka sy i Abidà ary i Eldahà. Ireo rehetra ireo no taranak’i Ketorà.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomen’i Abrahama an’i Itsehàka avokoa izay rehetra nananany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieny mbola velona kosa i Abrahama no samy notolorany fanomezana ireo zanaky ny vadikeliny ary nampanalaviriny an’i Itsehàka zanany hankany amin’ny tany atsinanana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahatratra dimy amby fitopolo amby zato taona no nahaveloman’i Abrahama, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niala aina izy ka maty tamim-pahanterana rehefa fotsy volo tsara sy voky andro, ary voakambana tamin’ny razany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Itsehàka sy i Jismahela zanany no nandevina azy tao amin’ny lava-baton’i Makpelà, ao amin’ny sahan’i Hefrôna zanakalahin’i Tsôhara izay Hetita, dia ilay saha ao akaikin’i Mamre. '
