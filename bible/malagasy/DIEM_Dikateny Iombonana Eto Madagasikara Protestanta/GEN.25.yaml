document_id: GEN.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Abrahama sy ny lisitry ny taranany
  - type: text
    content: 'Mbola naka vady hafa indray i Abrahama, ka i Ketorà no anarany. '
  '10':
  - type: text
    content: Novidîn’i Abrahama tamin’ny taranak’i Heta
  - type: note
    content: 'Novidîn’i...Heta: jereo Gen 23.3-16.'
  - type: text
    content: 'io saha io, ary tao no nandevenana an’i Abrahama sy i Sarà vadiny. '
  '11':
  - type: text
    content: 'Taorian’ny nahafatesan’i Abrahama, dia '
  - type: text
    content: notahîn
  - type: text
    content: ’Andriamanitra i Itsehàka zanany, izay nonina tao akaikin’ny fantsakana Lahay-Rôy
  - type: note
    content: Jereo Gen 16.14.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Izao no lisitry ny taranak’i Jismahela, zanakalahin’i Abrahama, naterak’i Hagara ilay Ejiptianina mpanompovavin’i Sarà. '
  '13':
  - type: text
    content: 'Ireto avy no anaran’ny zanakalahin’i Jismahela araka ny laharan’ny nahaterahany: i Nebaiôta sy i Kedara, i Adbeèla sy i Mibsàna, '
  '14':
  - type: text
    content: 'i Mismà sy i Domà, i Masà '
  '15':
  - type: text
    content: 'sy i Hadada, i Temà sy i Jetora ary i Nafisy sy i Kedmà. '
  '16':
  - type: text
    content: 'Ireo no zanak’i Jismahela 12 lahy, samy lehiben-tarika avy. Samy mitondra ny anarany avy ny tanànany sy ny tobiny. '
  '17':
  - type: text
    content: 'Nahatratra 137 taona i Jismahela vao niala aina, ary maty ka nakambana tamin’ny razany. '
  '18':
  - type: text
    content: Ny nipetrahan’ny taranak’i Jismahela dia ny faritra manomboka eo Havilà ka hatrany Sora; i Sora dia any akaikin’i Ejipta tamin’iny lalana mankany Asora iny. Nihataka tamin’ireo taranak’i Abrahama hafa no nitoerany.
  - type: heading
    content: JAKÔBA
  - type: heading
    content: I Hesao sy i Jakôba
  '19':
  - type: text
    content: 'Izao no tantaran’i Itsehàka:'
  - type: text
    content: 'I Itsehàka dia zanakalahin’i Abrahama. '
  '2':
  - type: text
    content: 'Niteraka enin-dahy tamin’i Abrahama izy, dia ireto avy izany: i Zimràna sy i Jôksàna, i Medàna sy i Midiàna ary i Jisbàka sy i Soa. '
  '20':
  - type: text
    content: 'Rehefa feno efapolo taona izy dia nanambady an’i Rebekà, anabavin’i Labàna sady zanakavavin’i Betoela izay Aramianina tao Padàna-Arama. '
  '21':
  - type: text
    content: 'Nitaraina tamin’ny TOMPO ho an’ny vadiny i Itsehàka satria tsy niteraka izy. Dia nohenoin’ny TOMPO ny fitarainany, koa nitoe-jaza i Rebekà vadiny. '
  '22':
  - type: text
    content: 'Nifandàka ireo zaza kambana tao an-kibony, ka hoy Rebekà hoe:'
  - type: text
    content: –Raha toy izany, nahoana re aho no nitoe-jaza?
  - type: text
    content: 'Dia lasa nanontany ny TOMPO izy. '
  '23':
  - type: text
    content: 'Fa namaly azy ny TOMPO hoe:'
  - type: text
    content: Firenena roa no ao an-kibonao,
  - type: text
    content: vahoaka roa tonta no haterakao.
  - type: text
    content: Ny ankilany hahery noho ny andaniny,
  - type: text
    content: ny zokiny hanompo ny zandriny
  - type: note
    content: Jereo Rm 9.12.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Nony tonga ny andro hiterahany, dia niteraka zaza kambana tokoa i Rebekà. '
  '25':
  - type: text
    content: Ilay teraka voalohany dia menamena, voloina toy ny lamba volom-biby ka natao hoe Hesao ny anarany
  - type: note
    content: Amin’ny teny hebreo ny anarana hoe Hesao dia mampahatsiaro ny voambolana izay nadika voloina eto.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Taorian’izany dia teraka koa ny rahalahiny; nohazoniny ny voditongotr’i Hesao ka natao hoe Jakôba
  - type: note
    content: Amin’ny teny hebreo ny anarana hoe Jakôba dia mampahatsiaro ny teny izay nadika hoe voditongotra eto; jereo ny 27.36 sy nta.
  - type: text
    content: ' ny anarany. Efa enimpolo taona i Itsehàka tamin’ny nahaterahan’izy mirahalahy.'
  '27':
  - type: text
    content: 'Nitombo ireo zaza, ka i Hesao dia tonga mpihaza mahay sady mpianefitra; fa i Jakôba kosa dia lehilahy bonaika, mpipetraka an-day. '
  '28':
  - type: text
    content: I Itsehàka dia tia an’i Hesao, satria nankafy ny hazany; fa i Rebekà kosa tia an’i Jakôba.
  '29':
  - type: text
    content: 'Teo am-pandrahoana sakafo indrindra i Jakôba indray andro, no tonga avy any an-tsaha i Hesao sady reraka mafy, '
  '3':
  - type: text
    content: 'I Jôksàna no rain’i Sebà sy i Dedàna; ny Asorita sy ny Letosita ary ny Leomita no taranak’i Dedàna. '
  '30':
  - type: text
    content: 'ka nangataka taminy hoe:'
  - type: text
    content: –Mba omeo kely amin’io sakafo efa menafify io aho fa reraka.
  - type: text
    content: (Izany no niantsoana azy tamin’ny anaram-bositra hoe Edôma na Ilaimena
  - type: note
    content: Amin’ny teny hebreo ny anarana hoe Edôma dia mampahatsiaro ny teny izay nadika hoe sakafo menafify eto.
  - type: text
    content: ).
  '31':
  - type: text
    content: 'Dia namaly azy i Jakôba hoe:'
  - type: text
    content: –Amidio amiko àry aloha ny fizokianao.
  '32':
  - type: text
    content: 'Dia hoy i Hesao hoe:'
  - type: text
    content: –Inty hono aho ka ho faty, dia hataoko inona moa izay fizokiana?
  '33':
  - type: text
    content: 'Fa namaly indray i Jakôba hoe:'
  - type: text
    content: –Mianiàna amiko àry ianao izao anio izao.
  - type: text
    content: 'Dia nianiana taminy izy ka nivarotra tamin’i Jakôba ny fizokiany. '
  '34':
  - type: text
    content: Ary nomen’i Jakôba mofo sy voanemba masaka i Hesao ka nihinana sy nisotro. Avy eo izy dia niainga ary lasa nandeha fa tsy niraharaha ny fizokiany
  - type: note
    content: Jereo Heb 12.16.
  - type: text
    content: .
  '4':
  - type: text
    content: Ny zanakalahin’i Midiàna dia i Hefà sy i Hefera, i Hanôka sy i Abidà ary i Eldahà. Ireo rehetra ireo no taranak’i Ketorà.
  '5':
  - type: text
    content: 'Nomen’i Abrahama an’i Itsehàka avokoa izay rehetra nananany. '
  '6':
  - type: text
    content: 'Dieny mbola velona kosa i Abrahama no samy notolorany fanomezana ireo zanaky ny vadikeliny ary nampanalaviriny an’i Itsehàka zanany hankany amin’ny tany atsinanana. '
  '7':
  - type: text
    content: 'Nahatratra dimy amby fitopolo amby zato taona no nahaveloman’i Abrahama, '
  '8':
  - type: text
    content: 'dia niala aina izy ka maty tamim-pahanterana rehefa fotsy volo tsara sy voky andro, ary voakambana tamin’ny razany. '
  '9':
  - type: text
    content: 'I Itsehàka sy i Jismahela zanany no nandevina azy tao amin’ny lava-baton’i Makpelà, ao amin’ny sahan’i Hefrôna zanakalahin’i Tsôhara izay Hetita, dia ilay saha ao akaikin’i Mamre. '
