document_id: GEN.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Abrahama sy ny lisitry ny taranany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mbola naka vady hafa indray i Abrahama, ka i Ketorà no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niteraka enin-dahy tamin’i Abrahama izy, dia ireto avy izany: i Zimràna sy i Jôksàna, i Medàna sy i Midiàna ary i Jisbàka sy i Soa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I Jôksàna no rain’i Sebà sy i Dedàna; ny Asorita sy ny Letosita ary ny Leomita no taranak’i Dedàna. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny zanakalahin’i Midiàna dia i Hefà sy i Hefera, i Hanôka sy i Abidà ary i Eldahà. Ireo rehetra ireo no taranak’i Ketorà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nomen’i Abrahama an’i Itsehàka avokoa izay rehetra nananany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieny mbola velona kosa i Abrahama no samy notolorany fanomezana ireo zanaky ny vadikeliny ary nampanalaviriny an’i Itsehàka zanany hankany amin’ny tany atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nahatratra dimy amby fitopolo amby zato taona no nahaveloman’i Abrahama, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia niala aina izy ka maty tamim-pahanterana rehefa fotsy volo tsara sy voky andro, ary voakambana tamin’ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I Itsehàka sy i Jismahela zanany no nandevina azy tao amin’ny lava-baton’i Makpelà, ao amin’ny sahan’i Hefrôna zanakalahin’i Tsôhara izay Hetita, dia ilay saha ao akaikin’i Mamre. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Novidîn’i Abrahama tamin’ny taranak’i Heta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Novidîn’i...Heta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 23.3-16.
    marker-yv: yv-n
  - type: text
    text: 'io saha io, ary tao no nandevenana an’i Abrahama sy i Sarà vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Taorian’ny nahafatesan’i Abrahama, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: notahîn
  - type: text
    text: ’Andriamanitra i Itsehàka zanany, izay nonina tao akaikin’ny fantsakana Lahay-Rôy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 16.14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lisitry ny taranak’i Jismahela, zanakalahin’i Abrahama, naterak’i Hagara ilay Ejiptianina mpanompovavin’i Sarà. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireto avy no anaran’ny zanakalahin’i Jismahela araka ny laharan’ny nahaterahany: i Nebaiôta sy i Kedara, i Adbeèla sy i Mibsàna, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'i Mismà sy i Domà, i Masà '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'sy i Hadada, i Temà sy i Jetora ary i Nafisy sy i Kedmà. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ireo no zanak’i Jismahela 12 lahy, samy lehiben-tarika avy. Samy mitondra ny anarany avy ny tanànany sy ny tobiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nahatratra 137 taona i Jismahela vao niala aina, ary maty ka nakambana tamin’ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny nipetrahan’ny taranak’i Jismahela dia ny faritra manomboka eo Havilà ka hatrany Sora; i Sora dia any akaikin’i Ejipta tamin’iny lalana mankany Asora iny. Nihataka tamin’ireo taranak’i Abrahama hafa no nitoerany.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: JAKÔBA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Hesao sy i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izao no tantaran’i Itsehàka:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Itsehàka dia zanakalahin’i Abrahama. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehefa feno efapolo taona izy dia nanambady an’i Rebekà, anabavin’i Labàna sady zanakavavin’i Betoela izay Aramianina tao Padàna-Arama. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nitaraina tamin’ny TOMPO ho an’ny vadiny i Itsehàka satria tsy niteraka izy. Dia nohenoin’ny TOMPO ny fitarainany, koa nitoe-jaza i Rebekà vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nifandàka ireo zaza kambana tao an-kibony, ka hoy Rebekà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha toy izany, nahoana re aho no nitoe-jaza?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lasa nanontany ny TOMPO izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa namaly azy ny TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Firenena roa no ao an-kibonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vahoaka roa tonta no haterakao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ankilany hahery noho ny andaniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zokiny hanompo ny zandriny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 9.12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nony tonga ny andro hiterahany, dia niteraka zaza kambana tokoa i Rebekà. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ilay teraka voalohany dia menamena, voloina toy ny lamba volom-biby ka natao hoe Hesao ny anarany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny teny hebreo ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hesao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mampahatsiaro ny voambolana izay nadika '
    - type: usfm
      marker: it
      children:
      - type: text
        text: voloina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Taorian’izany dia teraka koa ny rahalahiny; nohazoniny ny voditongotr’i Hesao ka natao hoe Jakôba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny teny hebreo ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jakôba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mampahatsiaro ny teny izay nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: voditongotra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto; jereo ny 27.36 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' ny anarany. Efa enimpolo taona i Itsehàka tamin’ny nahaterahan’izy mirahalahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nitombo ireo zaza, ka i Hesao dia tonga mpihaza mahay sady mpianefitra; fa i Jakôba kosa dia lehilahy bonaika, mpipetraka an-day. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I Itsehàka dia tia an’i Hesao, satria nankafy ny hazany; fa i Rebekà kosa tia an’i Jakôba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Teo am-pandrahoana sakafo indrindra i Jakôba indray andro, no tonga avy any an-tsaha i Hesao sady reraka mafy, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ka nangataka taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba omeo kely amin’io sakafo efa menafify io aho fa reraka.
- type: usfm
  marker: p
  children:
  - type: text
    text: (Izany no niantsoana azy tamin’ny anaram-bositra hoe Edôma na Ilaimena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny teny hebreo ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Edôma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mampahatsiaro ny teny izay nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sakafo menafify
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto.'
    marker-yv: yv-n
  - type: text
    text: ).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia namaly azy i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Amidio amiko àry aloha ny fizokianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia hoy i Hesao hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: –Inty hono aho ka ho faty, dia hataoko inona moa izay fizokiana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa namaly indray i Jakôba hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: –Mianiàna amiko àry ianao izao anio izao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nianiana taminy izy ka nivarotra tamin’i Jakôba ny fizokiany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nomen’i Jakôba mofo sy voanemba masaka i Hesao ka nihinana sy nisotro. Avy eo izy dia niainga ary lasa nandeha fa tsy niraharaha ny fizokiany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 12.16.
    marker-yv: yv-n
  - type: text
    text: .
