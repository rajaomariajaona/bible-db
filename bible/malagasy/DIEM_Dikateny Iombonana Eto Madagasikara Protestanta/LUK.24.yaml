    - type: text
      text: .
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy eto Izy, fa efa nitsangana velona. Tsarovy ny voalazany taminareo, fony Izy mbola tany Galilea, hoe: '
  '7':
