    - type: text
      text: ', ary nasandrany ny tanany hitso-drano azy rehetra. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mbola nitsodrano Izy, dia nisaraka taminy sy nakarina ho any an-danitra
    - type: usfm
