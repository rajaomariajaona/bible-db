document_id: LUK.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tafatsangana velona i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 28.1-10; Mk 16.1-8; Jôh 20.1-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny andro alahady, vao maraina mangiran-dratsy, dia lasa ireo vehivavy nankany amin’ny fasana nitondra ny zava-manitra efa voaomany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 23.56.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tazany ilay vatobe fa voakodia lavitry ny vavafasana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nefa nony niditra izy ireo, dia tsy nahita ny vatan’i Jesoa Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha mbola very hevitra ny amin’izany teo ireto vehivavy, dia indreo nisy roa lahy nanao fitafiana manelatrelatra niseho taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Natahotra mafy ireto vehivavy ka nitanondrika, fa hoy izy roa lahy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no atỳ amin’ny toeran’ny maty no itadiavanareo ny velona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy eto Izy, fa efa nitsangana velona. Tsarovy ny voalazany taminareo, fony Izy mbola tany Galilea, hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' tsy maintsy hatolotra eo an-tanan’ny mpanota ka hohomboana amin’ny hazofijaliana; nefa hitsangana velona amin’ny andro fahatelo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.22; 17.25; 18.32-33.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izay ireto vehivavy vao nahatsiaro ny tenin’i Jesoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka niverina avy tany amin’ny fasana ary nitantara izany rehetra izany tamin’ny 11 lahy sy ny namany rehetra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ireo vehivavy ireo dia i Maria avy any Magdalà sy i Jôhanina ary koa i Maria renin’i Jakôba; ireo vehivavy niaraka tamin’izy telo vavy dia samy nilaza izany koa tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Saingy noheverin’ny apôstôly ho arirarira foana ny tenin’izy rehetra ka tsy ninoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa nitsangana kosa i Petera, nihazakazaka nankany amin’ny fasana, niondrika nijery ka tsy nahita afa-tsy ny tapa-damba namehezana ny vatan’i Jesoa, ary lasa nody sady sanganehana tokoa tamin’ny zava-nitranga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Misy stf sasany tsy ahitana io andininy io.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isehoan’i Jesoa ny mpianatra roa lahy tany Emaosy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 16.12-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Iny andro alahady iny ihany, dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' roa lahy nankany amin’ny tanàna kely atao hoe Emaosy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy fantatra mazava tsara izay toerana misy an’i Emaosy.
    marker-yv: yv-n
  - type: text
    text: ', tokony ho 11 kilaometatra avy ao Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary teny an-dalana izy roa lahy dia niresaka ireny zava-nitranga rehetra ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha mbola niresaka sy niady hevitra iny izy roa lahy, dia intỳ i Jesoa nanatona niara-dalana taminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'saingy voasakana tsy hahafantatra Azy ny mason’ireto mpianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona izao iadianareo hevitra etỳ an-dalana izao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niato kely izy roa lahy sady maloka endrika erỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary namaly Azy ny anankiray atao hoe Kleôpasy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao irery ve no vahiny mandalo eto Jerosalema tsy mahalala ny zava-nitranga tao, tato ho ato?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Zavatra inona moa izany?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novalian’izy roa lahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny amin’i Jesoa avy any Nazareta, Izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' mahery tamin’ny asany sy tamin’ny teniny teo anatrehan’Andriamanitra sy ny vahoaka manontolo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'kanjo natolotry ny lohandoha-mpisorona sy ny manampahefana eto amintsika mba hohelohina ho faty ary nasainy nohomboana tamin’ny hazofijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nanantena izahay fa Izy no Ilay hanavotra an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ', ary tsy izany ihany fa androany izao no andro fahatelo hatramin’ny nitrangan’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nisy ihany anefa vehivavy sasany namanay nahasanganehana anay fatratra: tany amin’ny fasana vao maraina be ry zareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'saingy tsy nahita ny vatan’i Jesoa, ary niverina nitantara taminay fa nisehoan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' anankiroa, ka ireo anjely, hono, nilaza fa velona Izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 24.1-11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nisy tamin’ny lehilahy namanay mba nankany amin’ny fasana ka nahita araka ny filazan’ireo vehivavy, fa Izy tsy hitany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy i Jesoa tamin’izy roa lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Olona votsa saina ianareo ary ela vao mino izay rehetra voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moa tsy tokony ho niaritra izany ve ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', alohan’ny hidirany any amin’ny voninahiny?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nohazavain’i Jesoa tamin’ireto mpianatra ny momba Azy ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' manontolo, nanomboka tamin’ny bokin’i Mosesy ka nitohy tamin’ny bokin’ny mpaminany rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nony injay izy telo mianaka efa akaiky ny tanàna halehan’ireto mpianatra roa lahy, dia mody nanohy ny diany hatrany i Jesoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'fa notazonin’ireo nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mijanòna re miaraka aminay, fa efa hariva izao ary efa mandrorona ny andro!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niantrano Izy ka niara-nijanona taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha nipetraka hiara-misakafo iny izy telo mianaka, dia nandray ny mofo i Jesoa; ary nisaorany an’Andriamanitra izany ka nozarainy sy nomeny azy roa lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Izay vao nisokatra ny mason’ireto mpianatra, ka nahafantatra Azy; fa i Jesoa kosa nanjary tsy hitany intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nifampilaza izy roa lahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy nirehidrehitra ve ny fontsika tamin’Izy niresaka tamintsika teny an-dalana sy nivaofy ny Soratra Masina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Teo no ho eo ihany, dia niainga niverina nankany Jerosalema izy roa lahy ka nahita ny 11 lahy sy ny namany tafavory '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nitsangana velona tokoa ny Tompo, ary efa niseho tamin’i Simôna!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Izy roa lahy koa mba nitantara ny zava-niseho teny an-dalana sy ny nahafantarany an’i Jesoa fony Izy nizara ny mofo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isehoan’i Jesoa ireo mpianany tao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 28.16-20; Mk 16.14-18; Jôh 20.19-23; Asa 1.6-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Raha mbola miresaka nilaza izany izy roa lahy, dia nijoro teo afovoan’izy rehetra i Jesoa ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho ao aminareo anie ny fiadanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany tsy ahitana ny teny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'ka nanao taminy hoe: Ho ao aminareo anie ny fiadanana!'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Taitra sady natahotra izy rehetra satria noheveriny ho matoatoa no hitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no mitebiteby ianareo ary nahoana no misalasala ao am-ponareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Jereo ny tanako sy ny tongotro fa Izaho mihitsy ity. Kasiho Aho ka jereo, fa ny matoatoa tsy mba manana nofo aman-taolana, tahaka ny ahitanareo Ahy izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Avy niteny izany Izy, dia nasehony azy rehetra ny tanany sy ny tongony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Misy stf sasany tsy ahitana io andininy io.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Mbola tsy nino ihany anefa ireto mpianatra satria faly loatra sady gaga, ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Misy zavatra azo hanina ve eto aminareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia norosoana tapa-trondro natono Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'ka nandray sy nihinana teo anatrehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Avy eo i Jesoa dia nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no efa nambarako taminareo fony Izaho mbola teo aminareo: tsy maintsy tanteraka izay rehetra voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' momba Ahy ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy sy ny bokin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' ary ny salamo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Tamin’izay dia nosokafan’i Jesoa ny sain’ireo mpianatra mba hahafantatra ny Soratra Masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'sady hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no voalazan’ny Soratra Masina: tsy maintsy hijaly ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', nefa tsy maintsy hitsangana velona avy any amin’ny maty, amin’ny andro fahatelo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 53; Hôs 6.2.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ary ny anarany no tsy maintsy hotorîna hatao antso avo amin’ny firenen-drehetra miantomboka eto Jerosalema, mba hanainga ny olona hiala amin’ny toetra ratsiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.47 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hiala amin’ny toetra ratsiny: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
    marker-yv: yv-n
  - type: text
    text: ' sy handray famelan-keloka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ianareo no vavolombelona hanambara izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Indro hirahiko ho eo aminareo Ilay nampanantenain’ny Raiko; ianareo kosa mitoera eto an-tanàna mandra-pahahenika anareo ny hery avy any ambony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 1.4-5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miakatra any an-danitra i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 16.19-20; Asa 1.9-11)
  marker-yv: yv-h
- type: usfm
  marker: p
