      text: '–Nahoana no atỳ amin’ny toeran’ny maty no itadiavanareo ny velona? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentin’i Jesoa ivelan’ny tanàna hatrany akaikin’i Betania
    - type: usfm
