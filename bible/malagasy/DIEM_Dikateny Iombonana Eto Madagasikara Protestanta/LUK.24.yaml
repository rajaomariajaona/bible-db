          text: '24.49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 1.4-5.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
