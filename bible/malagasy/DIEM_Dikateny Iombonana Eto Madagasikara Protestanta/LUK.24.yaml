      marker-yv: yv-n
    - type: text
      text: '. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireto mpianany kosa, rehefa nitsaoka Azy, dia niverina tany Jerosalema tamin-kafaliana lehibe, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary tsy tapaka nankalaza an’Andriamanitra tao an-
    - type: usfm
