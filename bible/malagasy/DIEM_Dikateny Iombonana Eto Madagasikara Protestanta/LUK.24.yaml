document_id: LUK.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tafatsangana velona i Jesoa
  - type: heading
    content: (Jereo Mt 28.1-10; Mk 16.1-8; Jôh 20.1-10)
  - type: text
    content: Ny andro alahady, vao maraina mangiran-dratsy, dia lasa ireo vehivavy nankany amin’ny fasana nitondra ny zava-manitra efa voaomany
  - type: note
    content: Jereo 23.56.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'ireo vehivavy ireo dia i Maria avy any Magdalà sy i Jôhanina ary koa i Maria renin’i Jakôba; ireo vehivavy niaraka tamin’izy telo vavy dia samy nilaza izany koa tamin’ny '
  - type: text
    content: apôstôly
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Saingy noheverin’ny apôstôly ho arirarira foana ny tenin’izy rehetra ka tsy ninoany. '
  '12':
  - type: text
    content: Fa nitsangana kosa i Petera, nihazakazaka nankany amin’ny fasana, niondrika nijery ka tsy nahita afa-tsy ny tapa-damba namehezana ny vatan’i Jesoa, ary lasa nody sady sanganehana tokoa tamin’ny zava-nitranga
  - type: note
    content: Misy stf sasany tsy ahitana io andininy io.
  - type: text
    content: .
  - type: heading
    content: Isehoan’i Jesoa ny mpianatra roa lahy tany Emaosy
  - type: heading
    content: (Jereo Mk 16.12-13)
  '13':
  - type: text
    content: 'Iny andro alahady iny ihany, dia nisy '
  - type: text
    content: mpianatra
  - type: text
    content: ' roa lahy nankany amin’ny tanàna kely atao hoe Emaosy'
  - type: note
    content: Tsy fantatra mazava tsara izay toerana misy an’i Emaosy.
  - type: text
    content: ', tokony ho 11 kilaometatra avy ao Jerosalema. '
  '14':
  - type: text
    content: 'Ary teny an-dalana izy roa lahy dia niresaka ireny zava-nitranga rehetra ireny. '
  '15':
  - type: text
    content: 'Raha mbola niresaka sy niady hevitra iny izy roa lahy, dia intỳ i Jesoa nanatona niara-dalana taminy; '
  '16':
  - type: text
    content: 'saingy voasakana tsy hahafantatra Azy ny mason’ireto mpianatra. '
  '17':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Inona izao iadianareo hevitra etỳ an-dalana izao?
  - type: text
    content: 'Dia niato kely izy roa lahy sady maloka endrika erỳ. '
  '18':
  - type: text
    content: 'Ary namaly Azy ny anankiray atao hoe Kleôpasy ka nanao hoe:'
  - type: text
    content: –Ianao irery ve no vahiny mandalo eto Jerosalema tsy mahalala ny zava-nitranga tao, tato ho ato?
  '19':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Zavatra inona moa izany?
  - type: text
    content: 'Ka novalian’izy roa lahy hoe:'
  - type: text
    content: '–Ny amin’i Jesoa avy any Nazareta, Izay '
  - type: text
    content: mpaminany
  - type: text
    content: ' mahery tamin’ny asany sy tamin’ny teniny teo anatrehan’Andriamanitra sy ny vahoaka manontolo; '
  '2':
  - type: text
    content: 'Tazany ilay vatobe fa voakodia lavitry ny vavafasana; '
  '20':
  - type: text
    content: 'kanjo natolotry ny lohandoha-mpisorona sy ny manampahefana eto amintsika mba hohelohina ho faty ary nasainy nohomboana tamin’ny hazofijaliana. '
  '21':
  - type: text
    content: 'Nanantena izahay fa Izy no Ilay hanavotra an’i '
  - type: text
    content: Israely
  - type: text
    content: ', ary tsy izany ihany fa androany izao no andro fahatelo hatramin’ny nitrangan’izany. '
  '22':
  - type: text
    content: 'Nisy ihany anefa vehivavy sasany namanay nahasanganehana anay fatratra: tany amin’ny fasana vao maraina be ry zareo, '
  '23':
  - type: text
    content: 'saingy tsy nahita ny vatan’i Jesoa, ary niverina nitantara taminay fa nisehoan’ny '
  - type: text
    content: anjely
  - type: text
    content: ' anankiroa, ka ireo anjely, hono, nilaza fa velona Izy'
  - type: note
    content: Jereo 24.1-11.
  - type: text
    content: '. '
  '24':
  - type: text
    content: Dia nisy tamin’ny lehilahy namanay mba nankany amin’ny fasana ka nahita araka ny filazan’ireo vehivavy, fa Izy tsy hitany.
  '25':
  - type: text
    content: 'Dia hoy i Jesoa tamin’izy roa lahy:'
  - type: text
    content: '–Olona votsa saina ianareo ary ela vao mino izay rehetra voalazan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: '! '
  '26':
  - type: text
    content: 'Moa tsy tokony ho niaritra izany ve ny '
  - type: text
    content: Mesia
  - type: text
    content: ', alohan’ny hidirany any amin’ny voninahiny?'
  '27':
  - type: text
    content: 'Dia nohazavain’i Jesoa tamin’ireto mpianatra ny momba Azy ao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' manontolo, nanomboka tamin’ny bokin’i Mosesy ka nitohy tamin’ny bokin’ny mpaminany rehetra.'
  '28':
  - type: text
    content: 'Nony injay izy telo mianaka efa akaiky ny tanàna halehan’ireto mpianatra roa lahy, dia mody nanohy ny diany hatrany i Jesoa, '
  '29':
  - type: text
    content: 'fa notazonin’ireo nataony hoe:'
  - type: text
    content: –Mijanòna re miaraka aminay, fa efa hariva izao ary efa mandrorona ny andro!
  - type: text
    content: 'Dia niantrano Izy ka niara-nijanona taminy. '
  '3':
  - type: text
    content: 'nefa nony niditra izy ireo, dia tsy nahita ny vatan’i Jesoa Tompo. '
  '30':
  - type: text
    content: 'Raha nipetraka hiara-misakafo iny izy telo mianaka, dia nandray ny mofo i Jesoa; ary nisaorany an’Andriamanitra izany ka nozarainy sy nomeny azy roa lahy. '
  '31':
  - type: text
    content: 'Izay vao nisokatra ny mason’ireto mpianatra, ka nahafantatra Azy; fa i Jesoa kosa nanjary tsy hitany intsony. '
  '32':
  - type: text
    content: 'Dia nifampilaza izy roa lahy hoe:'
  - type: text
    content: –Tsy nirehidrehitra ve ny fontsika tamin’Izy niresaka tamintsika teny an-dalana sy nivaofy ny Soratra Masina?
  '33':
  - type: text
    content: 'Teo no ho eo ihany, dia niainga niverina nankany Jerosalema izy roa lahy ka nahita ny 11 lahy sy ny namany tafavory '
  '34':
  - type: text
    content: 'nilaza hoe:'
  - type: text
    content: –Efa nitsangana velona tokoa ny Tompo, ary efa niseho tamin’i Simôna!
  '35':
  - type: text
    content: Izy roa lahy koa mba nitantara ny zava-niseho teny an-dalana sy ny nahafantarany an’i Jesoa fony Izy nizara ny mofo.
  - type: heading
    content: Isehoan’i Jesoa ireo mpianany tao Jerosalema
  - type: heading
    content: (Jereo Mt 28.16-20; Mk 16.14-18; Jôh 20.19-23; Asa 1.6-8)
  '36':
  - type: text
    content: 'Raha mbola miresaka nilaza izany izy roa lahy, dia nijoro teo afovoan’izy rehetra i Jesoa ka nanao taminy hoe:'
  - type: text
    content: –Ho ao aminareo anie ny fiadanana
  - type: note
    content: 'Misy stf sasany tsy ahitana ny teny hoe ka nanao taminy hoe: Ho ao aminareo anie ny fiadanana!'
  - type: text
    content: '!'
  '37':
  - type: text
    content: 'Taitra sady natahotra izy rehetra satria noheveriny ho matoatoa no hitany. '
  '38':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: '–Nahoana no mitebiteby ianareo ary nahoana no misalasala ao am-ponareo? '
  '39':
  - type: text
    content: Jereo ny tanako sy ny tongotro fa Izaho mihitsy ity. Kasiho Aho ka jereo, fa ny matoatoa tsy mba manana nofo aman-taolana, tahaka ny ahitanareo Ahy izao.
  '4':
  - type: text
    content: 'Raha mbola very hevitra ny amin’izany teo ireto vehivavy, dia indreo nisy roa lahy nanao fitafiana manelatrelatra niseho taminy. '
  '40':
  - type: text
    content: Avy niteny izany Izy, dia nasehony azy rehetra ny tanany sy ny tongony
  - type: note
    content: Misy stf sasany tsy ahitana io andininy io.
  - type: text
    content: '. '
  '41':
  - type: text
    content: 'Mbola tsy nino ihany anefa ireto mpianatra satria faly loatra sady gaga, ka hoy i Jesoa taminy:'
  - type: text
    content: –Misy zavatra azo hanina ve eto aminareo?
  '42':
  - type: text
    content: 'Dia norosoana tapa-trondro natono Izy, '
  '43':
  - type: text
    content: 'ka nandray sy nihinana teo anatrehan’ny '
  - type: text
    content: mpianany
  - type: text
    content: '. '
  '44':
  - type: text
    content: 'Avy eo i Jesoa dia nilaza taminy hoe:'
  - type: text
    content: '–Izao no efa nambarako taminareo fony Izaho mbola teo aminareo: tsy maintsy tanteraka izay rehetra voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' momba Ahy ao amin’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy sy ny bokin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' ary ny salamo.'
  '45':
  - type: text
    content: 'Tamin’izay dia nosokafan’i Jesoa ny sain’ireo mpianatra mba hahafantatra ny Soratra Masina, '
  '46':
  - type: text
    content: 'sady hoy Izy taminy:'
  - type: text
    content: '–Izao no voalazan’ny Soratra Masina: tsy maintsy hijaly ny '
  - type: text
    content: Mesia
  - type: text
    content: ', nefa tsy maintsy hitsangana velona avy any amin’ny maty, amin’ny andro fahatelo'
  - type: note
    content: Ampit Is 53; Hôs 6.2.
  - type: text
    content: '; '
  '47':
  - type: text
    content: ary ny anarany no tsy maintsy hotorîna hatao antso avo amin’ny firenen-drehetra miantomboka eto Jerosalema, mba hanainga ny olona hiala amin’ny toetra ratsiny
  - type: note
    content: 'hiala amin’ny toetra ratsiny: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ' sy handray famelan-keloka.'
  '48':
  - type: text
    content: 'Ianareo no vavolombelona hanambara izany! '
  '49':
  - type: text
    content: Indro hirahiko ho eo aminareo Ilay nampanantenain’ny Raiko; ianareo kosa mitoera eto an-tanàna mandra-pahahenika anareo ny hery avy any ambony
  - type: note
    content: Jereo Asa 1.4-5.
  - type: text
    content: .
  - type: heading
    content: Miakatra any an-danitra i Jesoa
  - type: heading
    content: (Jereo Mk 16.19-20; Asa 1.9-11)
  '5':
  - type: text
    content: 'Natahotra mafy ireto vehivavy ka nitanondrika, fa hoy izy roa lahy taminy:'
  - type: text
    content: '–Nahoana no atỳ amin’ny toeran’ny maty no itadiavanareo ny velona? '
  '50':
  - type: text
    content: Dia nentin’i Jesoa ivelan’ny tanàna hatrany akaikin’i Betania
  - type: note
    content: Jereo Mk 11.1 sy nta.
  - type: text
    content: ' ireo '
  - type: text
    content: mpianany
  - type: text
    content: ', ary nasandrany ny tanany hitso-drano azy rehetra. '
  '51':
  - type: text
    content: Raha mbola nitsodrano Izy, dia nisaraka taminy sy nakarina ho any an-danitra
  - type: note
    content: Ampit Asa 1.9.
  - type: text
    content: '. '
  '52':
  - type: text
    content: 'Ireto mpianany kosa, rehefa nitsaoka Azy, dia niverina tany Jerosalema tamin-kafaliana lehibe, '
  '53':
  - type: text
    content: ary tsy tapaka nankalaza an’Andriamanitra tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: .
  '6':
  - type: text
    content: 'Tsy eto Izy, fa efa nitsangana velona. Tsarovy ny voalazany taminareo, fony Izy mbola tany Galilea, hoe: '
  '7':
  - type: text
    content: '«Ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' tsy maintsy hatolotra eo an-tanan’ny mpanota ka hohomboana amin’ny hazofijaliana; nefa hitsangana velona amin’ny andro fahatelo'
  - type: note
    content: Jereo 9.22; 17.25; 18.32-33.
  - type: text
    content: .»
  '8':
  - type: text
    content: 'Izay ireto vehivavy vao nahatsiaro ny tenin’i Jesoa, '
  '9':
  - type: text
    content: 'ka niverina avy tany amin’ny fasana ary nitantara izany rehetra izany tamin’ny 11 lahy sy ny namany rehetra: '
