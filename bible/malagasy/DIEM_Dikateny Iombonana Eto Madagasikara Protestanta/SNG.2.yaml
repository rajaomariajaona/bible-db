  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa lasa ny ririnina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nitsahatra sy dify ny orana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamelana amin’ny tany ny voninkazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga ny fotoam-pikalokaloana
  - type: usfm
    marker: q1
    children:
    - type: text
