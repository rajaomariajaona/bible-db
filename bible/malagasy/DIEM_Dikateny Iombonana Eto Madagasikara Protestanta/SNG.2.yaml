document_id: SNG.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: Izaho kosa dia voninkazo
  - type: text
    content: any amin’ny lemak’i Sarôna
  - type: text
    content: ary lisy eny an-dohasaha.
  - type: heading
    content: (Ralehilahy)
  '10':
  - type: text
    content: Dia niteny ny malalako
  - type: text
    content: 'ka nanao tamiko hoe:'
  - type: text
    content: «Mitsangàna, rahavako;
  - type: text
    content: ry ilay tsaratarehiko,
  - type: text
    content: ndeha hiaraka amiko.
  '11':
  - type: text
    content: Fa efa lasa ny ririnina,
  - type: text
    content: nitsahatra sy dify ny orana.
  '12':
  - type: text
    content: Mamelana amin’ny tany ny voninkazo,
  - type: text
    content: tonga ny fotoam-pikalokaloana
  - type: text
    content: ka re atỳ amin’ny tanintsika
  - type: text
    content: ny feon’ny domohina.
  '13':
  - type: text
    content: Mihamasaka eny amin’ny aviavy
  - type: text
    content: irony voany tanora;
  - type: text
    content: ary mamerovero manitra
  - type: text
    content: ny voaloboka mamony.
  - type: text
    content: Koa mitsangàna, rahavako;
  - type: text
    content: ry ilay tsaratarehiko,
  - type: text
    content: ndeha hiaraka amiko.
  '14':
  - type: text
    content: E ry voromahailalako
  - type: text
    content: mitoetra eny an-tsefatsefa-bato
  - type: text
    content: sy miery eny amin’ny hantsana,
  - type: text
    content: mba asehoy ahy ny endrikao
  - type: text
    content: ary ampandreneso ahy ny feonao,
  - type: text
    content: fa mamy ny feonao
  - type: text
    content: ary soa ny endrikao.»
  - type: heading
    content: (Ny renin-dravehivavy)
  '15':
  - type: text
    content: «Sambory ka omeo anay ny fosa,
  - type: text
    content: dia ireo zanaka fosa
  - type: text
    content: mpanimba ny tanimboalobokay
  - type: text
    content: fa efa mamony izao ny voalobokay.»
  - type: heading
    content: (Ravehivavy)
  '16':
  - type: text
    content: Ahy ny malalako, ary azy aho.
  - type: text
    content: Amin’ny toerana misy lisy
  - type: text
    content: no mirao-bilona izy
  - type: note
    content: 'no mirao-bilona izy: izany sary izany dia mifandraika amin’ny fampitahan’ilay vehivavy ny malalany amin’ny diera tanora na amin’ny gazela (2.9,17). Momba ny hevitr’io fampitahana io dia jereo 2.1; 4.5; 6.2-3. Kanefa misy manao dikanteny hoe no miandry ny ondriny izy; jereo 1.7.'
  - type: text
    content: .
  '17':
  - type: text
    content: Amin’ny takariva mangatsiatsiaka,
  - type: text
    content: rehefa hilentika ny masoandro
  - type: text
    content: ka hihamaizina ny andro,
  - type: text
    content: dia miverena, ry malalako;
  - type: text
    content: ary aoka ianao ho mailamailaka
  - type: text
    content: toy ny gazela na ny diera tanora
  - type: text
    content: no manketỳ Ambohimisaraka
  - type: note
    content: 'Ambohimisaraka na hoe an-tendrombohitra misaraka: toa tsy toerana ara-jeôgrafia loatra izany, fa sarintsary enti-manondro ny nono roa eo amin’ny tratran-dravehivavy (jereo 4.5-6; 8.14).'
  - type: text
    content: .
  '2':
  - type: text
    content: Toy ny lisy eo anivon’ny tsilo,
  - type: text
    content: dia toy izany ity rahavako,
  - type: text
    content: eo anivon’ireo zatovovavy.
  - type: heading
    content: (Ravehivavy)
  '3':
  - type: text
    content: Toy ny hazo paoma anankiray
  - type: text
    content: eo anivon’ireo hazo anaty saha,
  - type: text
    content: dia toy izany ity malalako
  - type: text
    content: eo anivon’ireo zatovolahy.
  - type: text
    content: Ka mahafinaritra ahy ny mipetraka
  - type: text
    content: eo ambany alokalon’io hazo paoma io,
  - type: text
    content: sady mamy ao am-bavako ny voany.
  '4':
  - type: text
    content: Nentiny ho ao amin’ny toerana fisotroan-divay
  - type: note
    content: 'fisotroan-divay: tsy hoe fisotroana ranom-boaloboka misy alikaola izany, fa filazana an-kolaka ny figohana hasambarana ateraky ny mari-pitiavana isan-karazany ifanolorana toy ny oroka aman-tsafosafo sns... izay fy tahaka ny divay na mihoatra noho ny divay aza. Jereo 1.2, 4; 4.10; sns...'
  - type: text
    content: ' aho'
  - type: text
    content: ka «Fitiavana» no teny faneva teo amboniko.
  '5':
  - type: text
    content: «Rosoy ampempam-boaloboka aho
  - type: text
    content: hamelombelona aina ahy
  - type: text
    content: ary hatanjaho amina paoma aho,
  - type: text
    content: fa mararim-pitia.»
  '6':
  - type: text
    content: Manondana ahy ny sandriny ankavia
  - type: text
    content: ary mamihina ahy ny sandriny ankavanana.
  - type: heading
    content: (Ralehilahy)
  '7':
  - type: text
    content: «Ry tovovavin’i Jerosalema ô,
  - type: text
    content: noho ny amin’ny gazela
  - type: text
    content: na ny dieravavy eny an-tsaha
  - type: note
    content: Amin’ny fiteny hebreo ny voambolana nadika hoe gazela dia mitovy fanoratana amin’ny famaritana an’Andriamanitra hoe «Ny Tompon’izao rehetra izao». Koa mba hialana amin’ny fifangaroan-kevitra no toa anampian’ny rijan-teny hebreo hoe na ny dieravavy. Amin’ny sivilizasiônina tranainy tany Atsinanana, ny gazela na ny dieravavy no famantarana ny fitiavana.
  - type: text
    content: ','
  - type: text
    content: 'dia miangavy mafy anareo aho hoe:'
  - type: text
    content: Aza tairina na fohazina ilay tiako
  - type: note
    content: 'ilay tiako (hebreo =’ahubah): dkt hafa ny fitiavana (hebreo =’ahabah).'
  - type: text
    content: ','
  - type: text
    content: raha tsy efa sitrapony!»
  - type: heading
    content: Indro tamy ny malalako
  - type: heading
    content: (Ravehivavy)
  '8':
  - type: text
    content: Injay ny feon’ny malalako!
  - type: text
    content: Indro izy fa tamy
  - type: text
    content: ka mitsambikimbikina eny an-tendrombohitra
  - type: text
    content: ary mifalihavanja eny an-kavoana.
  '9':
  - type: text
    content: Ny malalako dia mailamailaka
  - type: text
    content: toy ny gazela na ny diera tanora;
  - type: text
    content: indro izy fa mijanona ao alatranonay,
  - type: text
    content: ka manarangarana eo am-baravarankely,
  - type: text
    content: zary mitsikilo eo amin’ny makarakara.
