  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny feon’ny domohina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihamasaka eny amin’ny aviavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: irony voany tanora;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamerovero manitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny voaloboka mamony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mitsangàna, rahavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry ilay tsaratarehiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ndeha hiaraka amiko.
  '14':
  - type: usfm
    marker: q1
    children:
