document_id: PRO.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ohabolan’i Salômôna zanakalahin’i Davida sady mpanjakan’i Israely
  - type: note
    content: Momba ny fahendren’i Salômôna dia jereo 1 Mp 5.9-14.
  - type: text
    content: .
  - type: heading
    content: Tanjon’ny boky
  '10':
  - type: text
    content: Anaka, aza manaiky ianao,
  - type: text
    content: raha taomin’ny naman-dratsy
  '11':
  - type: text
    content: 'ka ilazany hoe: «Andao hiaraka aminay;'
  - type: text
    content: aoka isika hanotrika handatsa-dra,
  - type: text
    content: ka hotampohintsika tsy ahoan-tsy ahoana
  - type: text
    content: hatramin’ny olon-tsy manan-tsiny aza.
  '12':
  - type: text
    content: Tahaka ny fitelin’ny toeran’ny maty
  - type: text
    content: no hitelemantsika azy mbola velona
  - type: text
    content: ka hanaovantsika azy telimoka
  - type: text
    content: ho toy ny olona midina any am-pasana.
  '13':
  - type: text
    content: Halaintsika avokoa ireo haren-tsarobidiny;
  - type: text
    content: ka hofenointsika babo ny tranontsika.
  '14':
  - type: text
    content: Dia hiombona anjara aminay ianao
  - type: text
    content: fa hiraisantsika rehetra ny kitapom-bolantsika!»
  '15':
  - type: text
    content: Anaka, aza mba miara-dalana
  - type: text
    content: amin’ny olona tahaka izany;
  - type: text
    content: halaviro ny lalan-kalehany.
  '16':
  - type: text
    content: Fa mihazakazaka ho amin’ny ratsy izy
  - type: text
    content: sady dodona erỳ handatsa-dra.
  '17':
  - type: text
    content: Tsy misy vokany ny famelaram-pandrika,
  - type: text
    content: raha toa ka hitan’ny voromanidina izany.
  '18':
  - type: text
    content: Ireny olon-dratsy ireny kosa dia manotrika
  - type: text
    content: handatsaka ny ran’ny tenany ihany;
  - type: text
    content: ka mamela-pandrika hamelezan-tena.
  '19':
  - type: text
    content: Toy izany no iafaran’izay rehetra fatra-pandroba,
  - type: text
    content: ka ipaohana ny ain’izay fatra-panao azy.
  - type: heading
    content: Antso maika ataon’ny Fahendrena
  '2':
  - type: text
    content: Ireo ohabolana ireo dia hahalalan’ny olona
  - type: text
    content: ny fahendrena amam-panabeazana,
  - type: text
    content: sy hahatakarany teny hahaiza-manavaka,
  '20':
  - type: text
    content: Miantso mafy eny ankalamanjana ny Fahendrena
  - type: note
    content: Eto, tahaka fahita matetika koa any an-kafa dia heverina ho toy ny olona mihitsy ny Fahendrena, jereo manokana 8.1–9.6.
  - type: text
    content: ka manandra-peo eny an-kianja malalaka.
  '21':
  - type: text
    content: Mitory eny amin’ny fihaonan-dalana be olona izy
  - type: text
    content: ka manambara eo am-bavahadin’ny tanàna
  - type: note
    content: Ny vavahadin’ny tanàna no toeram-pitsarana sy handinihina ireo raharaham-bahoaka tamin’izany.
  - type: text
    content: ' hoe:'
  '22':
  - type: text
    content: «Ry kely saina, mandra-pahoviana no hitiavanareo hakelezan-tsaina?
  - type: text
    content: Ry mpaniratsira, mandra-pahoviana no handalanareo faniratsirana?
  - type: text
    content: Ry adala, mandra-pahoviana no hankahalanareo fahalalana?
  '23':
  - type: text
    content: Miverena hihaino ny fananarako ianareo
  - type: text
    content: fa indro haidiko aminareo ny fanahiko
  - type: text
    content: ary hampahafantariko anareo ny teniko.
  '24':
  - type: text
    content: Efa niantso aho fa nolavinareo,
  - type: text
    content: efa nanolo-tanana anareo fa tsy nahoanareo.
  '25':
  - type: text
    content: Nolavinareo ny torohevitro rehetra
  - type: text
    content: ary tsy noraharahainareo ny anatro.
  '26':
  - type: text
    content: Izaho kosa mba hihomehy ny faharavanareo
  - type: text
    content: ary handatsa rehefa ho tonga aminareo ny tahotra.
  '27':
  - type: text
    content: Eny, ho tonga aminareo toy ny tafiodrivotra ny tahotra
  - type: text
    content: hiantonta toy ny rivodoza ny faharavanareo,
  - type: text
    content: ho tonga aminareo ny zava-mampahory sy mampitebiteby;
  '28':
  - type: text
    content: amin’izay no hisy hiantso ahy fa tsy hovaliako
  - type: text
    content: ary koa hisy hitady ahy fa tsy hahita
  - type: note
    content: Jereo manokana Jer 11.11; Mik 3.4; Jôh 7.34.
  - type: text
    content: .
  '29':
  - type: text
    content: Hiharan’izany tokoa ianareo,
  - type: text
    content: satria nankahala ny fahalalana
  - type: text
    content: ary tsy nifidy hanaja ny TOMPO
  '3':
  - type: text
    content: ary hahazoany fanabeazana mahiratra
  - type: text
    content: momba ny fahamarinana sy rariny ary fahitsiana.
  '30':
  - type: text
    content: sady tsy nanaiky ny torohevitro
  - type: text
    content: ary naniratsira ny anatro rehetra.
  '31':
  - type: text
    content: Ny saim-pantatrareo sy ny vokatry ny fitondrantenanareo
  - type: text
    content: no hampizihi-kibo ka hankandoa anareo.
  '32':
  - type: text
    content: Fa ny di-doha no mahafaty ny kely saina
  - type: text
    content: ary ny fahatokian-tena no mahavery ny adala.
  '33':
  - type: text
    content: Izay mihaino Ahy kosa dia hitoetra amin-toky;
  - type: text
    content: eny, handry feizay izy ka tsy hanahy fahoriana.»
  '4':
  - type: text
    content: Anomezam-pahamalinana ho an’ny olon-tsotra ireny
  - type: text
    content: ary fahalalana sy fahaiza-mandinika ho an’ny tanora.
  '5':
  - type: text
    content: Na dia ny hendry aza no mihaino ireny,
  - type: text
    content: dia hitombo traikefa izy,
  - type: text
    content: ary ny lalin-tsaina hahita torolalana
  '6':
  - type: text
    content: hahatakarana ohabolana sy fanoharana
  - type: text
    content: ary ny tenin’olon-kendry sy ny ankamantany.
  '7':
  - type: text
    content: Ny fanajana ny TOMPO no loharanom-pahalalana
  - type: note
    content: Jereo 2.5; 9.10; 15.33; Jôb 28.28; Sal 111.10.
  - type: text
    content: .
  - type: text
    content: Fa ny adala kosa manamavo fahendrena amam-panabeazana.
  - type: heading
    content: Fampirisihana sy fananarana
  '8':
  - type: text
    content: Henoy, anaka, ny fananaran-drainao
  - type: text
    content: ary aza lavina ny fampianaran-dreninao;
  '9':
  - type: text
    content: handravaka ny fiainanao izany
  - type: text
    content: ka toy ny fehiloha kanto eo an-dohanao
  - type: text
    content: ary koa toy ny rado eo am-bozonao.
