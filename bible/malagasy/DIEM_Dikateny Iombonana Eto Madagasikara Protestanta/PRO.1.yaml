    children:
    - type: text
      text: '1'
  - type: text
    text: Ohabolan’i Salômôna zanakalahin’i Davida sady mpanjakan’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny fahendren’i Salômôna dia jereo 1 Mp 5.9-14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tanjon’ny boky
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ireo ohabolana ireo dia hahalalan’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahendrena amam-panabeazana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hahatakarany teny hahaiza-manavaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary hahazoany fanabeazana mahiratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: momba ny fahamarinana sy rariny ary fahitsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Anomezam-pahamalinana ho an’ny olon-tsotra ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary fahalalana sy fahaiza-mandinika ho an’ny tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Na dia ny hendry aza no mihaino ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hitombo traikefa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lalin-tsaina hahita torolalana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: hahatakarana ohabolana sy fanoharana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tenin’olon-kendry sy ny ankamantany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fanajana ny TOMPO no loharanom-pahalalana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.5; 9.10; 15.33; Jôb 28.28; Sal 111.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny adala kosa manamavo fahendrena amam-panabeazana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampirisihana sy fananarana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Henoy, anaka, ny fananaran-drainao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza lavina ny fampianaran-dreninao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: handravaka ny fiainanao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka toy ny fehiloha kanto eo an-dohanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa toy ny rado eo am-bozonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Anaka, aza manaiky ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha taomin’ny naman-dratsy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka ilazany hoe: «Andao hiaraka aminay;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka isika hanotrika handatsa-dra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hotampohintsika tsy ahoan-tsy ahoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny olon-tsy manan-tsiny aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tahaka ny fitelin’ny toeran’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitelemantsika azy mbola velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanaovantsika azy telimoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho toy ny olona midina any am-pasana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Halaintsika avokoa ireo haren-tsarobidiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hofenointsika babo ny tranontsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hiombona anjara aminay ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hiraisantsika rehetra ny kitapom-bolantsika!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Anaka, aza mba miara-dalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny olona tahaka izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: halaviro ny lalan-kalehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa mihazakazaka ho amin’ny ratsy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady dodona erỳ handatsa-dra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy misy vokany ny famelaram-pandrika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha toa ka hitan’ny voromanidina izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ireny olon-dratsy ireny kosa dia manotrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: handatsaka ny ran’ny tenany ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamela-pandrika hamelezan-tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy izany no iafaran’izay rehetra fatra-pandroba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ipaohana ny ain’izay fatra-panao azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antso maika ataon’ny Fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Miantso mafy eny ankalamanjana ny Fahendrena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eto, tahaka fahita matetika koa any an-kafa dia heverina ho toy ny olona mihitsy ny Fahendrena, jereo manokana 8.1–9.6.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manandra-peo eny an-kianja malalaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mitory eny amin’ny fihaonan-dalana be olona izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manambara eo am-bavahadin’ny tanàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny vavahadin’ny tanàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: no toeram-pitsarana sy handinihina ireo raharaham-bahoaka tamin’izany.
    marker-yv: yv-n
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: «Ry kely saina, mandra-pahoviana no hitiavanareo hakelezan-tsaina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry mpaniratsira, mandra-pahoviana no handalanareo faniratsirana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry adala, mandra-pahoviana no hankahalanareo fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Miverena hihaino ny fananarako ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa indro haidiko aminareo ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampahafantariko anareo ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Efa niantso aho fa nolavinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nanolo-tanana anareo fa tsy nahoanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nolavinareo ny torohevitro rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy noraharahainareo ny anatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izaho kosa mba hihomehy ny faharavanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handatsa rehefa ho tonga aminareo ny tahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Eny, ho tonga aminareo toy ny tafiodrivotra ny tahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hiantonta toy ny rivodoza ny faharavanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tonga aminareo ny zava-mampahory sy mampitebiteby;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: amin’izay no hisy hiantso ahy fa tsy hovaliako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa hisy hitady ahy fa tsy hahita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo manokana Jer 11.11; Mik 3.4; Jôh 7.34.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hiharan’izany tokoa ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nankahala ny fahalalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nifidy hanaja ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: sady tsy nanaiky ny torohevitro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary naniratsira ny anatro rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny saim-pantatrareo sy ny vokatry ny fitondrantenanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampizihi-kibo ka hankandoa anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa ny di-doha no mahafaty ny kely saina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fahatokian-tena no mahavery ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izay mihaino Ahy kosa dia hitoetra amin-toky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, handry feizay izy ka tsy hanahy fahoriana.»
