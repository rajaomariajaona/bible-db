document_id: NEH.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Lisitr’ireo mpisorona sy levita
  - type: text
    content: 'Ireto no '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy '
  - type: text
    content: levita
  - type: text
    content: ' izay niverina avy any an-tsesitany niaraka tamin’i Zerobabela zanakalahin’i Sealtiela sy niaraka tamin’i Jesoa:'
  - type: text
    content: 'I Seraià sy i Jeremià ary i Hezrà, '
  '10':
  - type: text
    content: 'I Jesoa no ray niteraka an’i Jôiakima; i Jôiakima no ray niteraka an’i Eliasiba; i Eliasiba no ray niteraka an’i Jôiadà; '
  '11':
  - type: text
    content: i Jôiadà no ray niteraka an’i Jôhanàna; ary i Jôhanàna no ray niteraka an’i Jadoa.
  '12':
  - type: text
    content: 'Tamin’ny andro naha mpisorombe an’i Jôiakima, dia ireto avy ny mpisorona loham-pianakaviana: i Meraià ho an’ny fianakavian’i Seraià; i Hananià ho an’ny fianakavian’i Jeremià; '
  '13':
  - type: text
    content: 'i Mesolama ho an’ny fianakavian’i Hezrà; i Johanàna ho an’ny fianakavian’i Amarià; '
  '14':
  - type: text
    content: 'i Jônatàna ho an’ny fianakavian’i Malòka; i Jôsefa ho an’ny fianakavian’i Sekanià; '
  '15':
  - type: text
    content: 'i Hadnà ho an’ny fianakavian’i Harîma; i Helkay ho an’ny fianakavian’i Meremôta; '
  '16':
  - type: text
    content: i Zakarià ho an’ny fianakavian’i Hidao; i Mesolama ho an’ny fianakavian’i Ginetôna
  - type: note
    content: tsy hita ao amin’ny rijan-teny hebreo ny anaran’ilay mpisorona lohan’ny fianakavian’i Miniamìna.
  - type: text
    content: '; '
  '17':
  - type: text
    content: 'i Zikry ho an’ny fianakavian’i Abià; i... ho an’ny fianakavian’i Miniamina; i Piltahy ho an’ny fianakavian’i Mahadià; '
  '18':
  - type: text
    content: 'i Samoa ho an’ny fianakavian’i Bilgà; i Jônatàna ho an’ny fianakavian’i Semahià; '
  '19':
  - type: text
    content: 'i Matenay ho an’ny fianakavian’i Jôiariba; i Hozy ho an’ny fianakavian’i Jedahià; '
  '2':
  - type: text
    content: 'i Amarià sy i Malòka ary i Hatosy, '
  '20':
  - type: text
    content: 'i Kalay ho an’ny fianakavian’i Salò; i Hebera ho an’ny fianakavian’i Hamôka; '
  '21':
  - type: text
    content: i Hasabià ho an’ny fianakavian’i Hilkià; i Natanaela ho an’ny fianakavian’i Jedahià.
  '22':
  - type: text
    content: Tamin’ny andro naha mpisorombe an’i Eliasiba sy i Jôiadà ary i Jôhanàna sy i Jadoa, dia natao an-tsoratra ny levita izay loham-pianakaviana; ary toy izany koa ny mpisorona, ka nitohy hatramin’ny nanjakàn’i Dariôsa amperôran’i Persia izany.
  '23':
  - type: text
    content: Ny levita loham-pianakaviana dia natao an-tsoratra tanatin’ny boky firaketana ny zava-nitranga lehibe; saingy niafara tamin’ny andron’i Johanàna zafin’i Eliasiba izany.
  '24':
  - type: text
    content: Ny lohandohan’ny levita, izany hoe i Hasabià sy i Serebià ary i Jesoa mbamin’ny Binoy sy i Kadmiela, dia nifanatrika tamin’ireo levita namany mba hidera sy hisaotra an’Andriamanitra, rehefa tonga ny anjara fanompoany. Ny fandaharana nataon’i Davida olon’Andriamanitra no narahiny tamin’izany.
  '25':
  - type: text
    content: 'Ny mpiandry varavarana kosa dia ry i Matanià sy i Bakbokià, i Hôbadià sy i Mesolama, ary i Talmôna sy i Hakoba; andraikiny koa ny fiambenana ireo trano fitobian’entana teo akaikin’ny vavahadin’ny '
  - type: text
    content: tempoly
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Ireo no nisahana izany asa izany tamin’ny andron’i Jôiakima zanakalahin’i Jesoa sy zafin’i Jôtsadàka, ary tamin’ny andron’i Nehemià governora sy i Hezrà mpisorona sady '
  - type: text
    content: mpahay lalàna
  - type: text
    content: .
  - type: heading
    content: Ny fitokanana ny mandan’i Jerosalema
  '27':
  - type: text
    content: 'Rehefa hotokanana ny mandan’i Jerosalema, dia nantsoina avy tamin’ny toeram-ponenany rehetra ny '
  - type: text
    content: levita
  - type: text
    content: '; nasaina ho tonga any Jerosalema ry zareo mba hanao ny fitokanana amim-pifaliana, ombàn’ny hira fiderana arahin’ny kipantsona sy valiha ary lokanga. '
  '28':
  - type: text
    content: 'Dia tafangona ny mpihira avy any ambanivohitr’i Jerosalema sy avy amin’ny tanàna kely akaikin’i Netôfà '
  '29':
  - type: text
    content: 'sy avy any Bety-Gilgala ary avy amin’ny faritr’i Geba sy i Hazmavety; fa efa nanao tanàna kely ho azy manodidina an’i Jerosalema ny mpihira. '
  '3':
  - type: text
    content: 'i Sekanià sy i Harîma ary i Meremota, '
  '30':
  - type: text
    content: 'Samy '
  - type: text
    content: nidio
  - type: text
    content: ' tena ny mpisorona sy ny levita; ary nodioviny koa ny olona sy ny vavahady ary ny manda.'
  '31':
  - type: text
    content: Dia nasaiko niakatra eo ambonin’ny manda ireo mpanapaka an’i Joda; ny mpihira kosa nozaraiko ho antokony roa lehibe mitandahatra tsara. Ny antoko mpihira voalohany dia niroso teny ambonin’ny manda, tamin’ny ilany ankavanana
  - type: note
    content: 'tamin’ny ilany ankavanana: izany hoe mizotra mianatsimo. Ireo antoko mpihira anankiroa dia miainga eo akaikikaikin’ny vavahadin’ny lohasaha (3.13) ary samy mitety ny antsasakin’ny manda eo ho eo manodidina ny tanàna. Momba ny anaran’ireo vavahady sy tilikambo, jereo toko 3.'
  - type: text
    content: ' mankeny amin’ny Vavahadin’ny Fanariam-pako; '
  '32':
  - type: text
    content: 'ka nandeha nanarakaraka azy ry i Hôsahià, ny antsasak’ireo mpanapaka an’i Jodà, '
  '33':
  - type: text
    content: 'i Hazarià sy i Hezrà ary i Mesolama, '
  '34':
  - type: text
    content: i Joda sy i Benjamîna ary i Semahià sy i Jeremià;
  '35':
  - type: text
    content: 'taorian’ireo ny sasany tamin’ny mpisorona mpitondra trompetra; avy eo i Zakarià, zanakalahin’i Jônatàna sy zafin’i Semahià sy zafiafin’i Matanià sy zafin-dohalik’i Mikaià sy zafin-kitrokelin’i Zakora ary zafim-paladian’i Asafa, '
  '36':
  - type: text
    content: 'mbamin’ireo naman’i Zakarià, dia i Semahià sy i Hazarela, i Milalay sy i Gilalay; i Mahay sy i Netaneela, ary i Joda sy i Hananỳ, izay samy nitondra ny zava-maneno namboarin’i Davida olon’Andriamanitra. I Hezrà mpahay lalàna no nialoha ireo mpiray dia ireo. '
  '37':
  - type: text
    content: 'Nony tonga teo amin’ny Vavahadin’ny Loharano ry zareo, dia niatrika ny ambaratongan’ny '
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ; teo amin’ny manda ihany no niakatra izany izy ka nanjary lasa ambonin’ny tranon’i Davida, ary tafapaka hatreny amin’ny Vavahadin-drano eo atsinanana.
  '38':
  - type: text
    content: 'Ny antoko-mpihira faharoa kosa dia nandeha tamin’ny ilany ankavia; ka ny tenako sy ny antsasak’ireo mpanapaka an’i Joda no nanaraka azy teny ambonin’ny manda. Nandalo teo akaikin’ny Tilikambon’ny Fatana izahay, dia nandroso hatreny amin’ny manda malalaka; '
  '39':
  - type: text
    content: avy eo dia nitety ny vavahadin’i Efraîma, sy ny vavahady tranainy ary ny vavahadin’ny Trondro. Nandalo teo akaikin’ny Tilikambo Hananela sy ny tilikambon’ny Zatolahy ary nihoatra ny vavahadin’ny Ondry izahay, vao nitsatoka teo amin’ny Vavahadin’ny fonja
  - type: note
    content: Jereo 3.6 sy nta
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'i Hidao sy i Ginetôna ary i Abià, '
  '40':
  - type: text
    content: Dia samy nijanona tao an-
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ' ny antoko-mpihira roa tonta, mbamin’ny tenako sy ireo mpanapaka tafaraka tamiko '
  '41':
  - type: text
    content: 'ary ny mpisorona trompetra, dia ry i Eliakima sy i Mahaseià, i Miniamîna sy i Mikaià, i Eliôhenay sy i Zakarià ary i Hananià. '
  '42':
  - type: text
    content: Nijanona tao ihany koa ry i Mahaseià sy i Semahià, i Elehazara sy i Hozy, i Jôhanàna sy i Malkià, ary i Helama sy i Hezera. Dia nihira mafy ny mpihira teo ambany fitarihan’i Jizrahià.
  '43':
  - type: text
    content: ' '
  - type: text
    content: Sorona
  - type: text
    content: ' maro no natolotra tamin’izany andro izany ary fifaliana no nanjaka, satria antom-pifaliana lehibe no efa nomen’Andriamanitra ny olona. Tao Jerosalema dia nifaly mbamin’ny zaza amam-behivavy, ka re lavitra ny hobin-kafaliana.'
  - type: heading
    content: Ny fiveloman’ireo mpisorona sy levita
  '44':
  - type: text
    content: 'Tamin’izay koa dia nisy olona notendrena hitandrina ny efitrano fitehirizana ny fanatitra avahana sy ny voaloham-bokatra ary ny fahafolon-karena. Ao no nasaina hangonin’ireo olona ireo ny anjara voadidin’ny lalàna mba ho an’ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: ', avy any amin’ny saha manodidina ny isan-tanàna; nifalian’ny vahoakan’i Joda manko ireo mpisorona sy levita izay samy teo amin’ny anjara toerany avy, '
  '45':
  - type: text
    content: 'sady nisahana ny tokony hotandremany momba an’Andriamaniny sy momba ny '
  - type: text
    content: fidiovana
  - type: text
    content: . Toy izany koa ny mpihira sy ny mpiandry varavarana, izay nanaraka ny fandaharana nataon’i Davida sy i Salômôna zanany
  - type: note
    content: Jereo 1 Tan 25.1-8; 26.1-12
  - type: text
    content: '; '
  '46':
  - type: text
    content: 'Tamin’ny andron’i Davida manko dia i Asafa no lehiben’ny mpihira ary nisy ny mpitarika antoko-mpihira mbamin’ny hira fiderana sy fisaorana ho fankalazana an’Andriamanitra. '
  '47':
  - type: text
    content: Ary tamin’ny andron’i Zerobabela sy i Nehemià, dia nomen’ny Israelita rehetra isan’andro ny anjaran’ny mpihira sy ny mpiandry varavarana; nomeny koa ny fanatitra voatokana ho an’ny levita, ary ny levita kosa indray no nanome ny fanatitra voatokana ho an’ny mpisorona taranak’i Aharôna.
  '5':
  - type: text
    content: 'i Miamîna sy i Mahadià ary i Bilgà, '
  '6':
  - type: text
    content: 'i Semahià sy i Jôiariba ary i Jedahià, '
  '7':
  - type: text
    content: i Salo sy i Hamôka ary i Hilkià sy i Jedahià. Tamin’ny andron’i Jesoa dia ireo no lohandoha-mpisorona sy mpiombom-panompoana aminy.
  '8':
  - type: text
    content: 'Ny levita kosa dia ireto avy: i Jesoa sy i Binoy ary i Kadmiela mbamin’i Serebià sy i Jehodà ary i Matanià. Ity Matanià ity sy ny havany no mpiventy hira fiderana, '
  '9':
  - type: text
    content: izay novalian’i Bakbokià sy i Hony levita namany nipetraka tandrifiny.
