    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tamin’ny andro naha mpisorombe an’i Eliasiba sy i Jôiadà ary i Jôhanàna sy i Jadoa, dia natao an-tsoratra ny levita izay loham-pianakaviana; ary toy izany koa ny mpisorona, ka nitohy hatramin’ny nanjakàn’i Dariôsa amperôran’i Persia izany.
  '23':
