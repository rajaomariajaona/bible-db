document_id: NEH.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lisitr’ireo mpisorona sy levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ireto no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' izay niverina avy any an-tsesitany niaraka tamin’i Zerobabela zanakalahin’i Sealtiela sy niaraka tamin’i Jesoa:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Seraià sy i Jeremià ary i Hezrà, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'i Amarià sy i Malòka ary i Hatosy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'i Sekanià sy i Harîma ary i Meremota, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'i Hidao sy i Ginetôna ary i Abià, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'i Miamîna sy i Mahadià ary i Bilgà, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'i Semahià sy i Jôiariba ary i Jedahià, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: i Salo sy i Hamôka ary i Hilkià sy i Jedahià. Tamin’ny andron’i Jesoa dia ireo no lohandoha-mpisorona sy mpiombom-panompoana aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny levita kosa dia ireto avy: i Jesoa sy i Binoy ary i Kadmiela mbamin’i Serebià sy i Jehodà ary i Matanià. Ity Matanià ity sy ny havany no mpiventy hira fiderana, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: izay novalian’i Bakbokià sy i Hony levita namany nipetraka tandrifiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I Jesoa no ray niteraka an’i Jôiakima; i Jôiakima no ray niteraka an’i Eliasiba; i Eliasiba no ray niteraka an’i Jôiadà; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: i Jôiadà no ray niteraka an’i Jôhanàna; ary i Jôhanàna no ray niteraka an’i Jadoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny andro naha mpisorombe an’i Jôiakima, dia ireto avy ny mpisorona loham-pianakaviana: i Meraià ho an’ny fianakavian’i Seraià; i Hananià ho an’ny fianakavian’i Jeremià; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'i Mesolama ho an’ny fianakavian’i Hezrà; i Johanàna ho an’ny fianakavian’i Amarià; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'i Jônatàna ho an’ny fianakavian’i Malòka; i Jôsefa ho an’ny fianakavian’i Sekanià; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Hadnà ho an’ny fianakavian’i Harîma; i Helkay ho an’ny fianakavian’i Meremôta; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: i Zakarià ho an’ny fianakavian’i Hidao; i Mesolama ho an’ny fianakavian’i Ginetôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy hita ao amin’ny rijan-teny hebreo ny anaran’ilay mpisorona lohan’ny fianakavian’i Miniamìna.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'i Zikry ho an’ny fianakavian’i Abià; i... ho an’ny fianakavian’i Miniamina; i Piltahy ho an’ny fianakavian’i Mahadià; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'i Samoa ho an’ny fianakavian’i Bilgà; i Jônatàna ho an’ny fianakavian’i Semahià; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'i Matenay ho an’ny fianakavian’i Jôiariba; i Hozy ho an’ny fianakavian’i Jedahià; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'i Kalay ho an’ny fianakavian’i Salò; i Hebera ho an’ny fianakavian’i Hamôka; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: i Hasabià ho an’ny fianakavian’i Hilkià; i Natanaela ho an’ny fianakavian’i Jedahià.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tamin’ny andro naha mpisorombe an’i Eliasiba sy i Jôiadà ary i Jôhanàna sy i Jadoa, dia natao an-tsoratra ny levita izay loham-pianakaviana; ary toy izany koa ny mpisorona, ka nitohy hatramin’ny nanjakàn’i Dariôsa amperôran’i Persia izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny levita loham-pianakaviana dia natao an-tsoratra tanatin’ny boky firaketana ny zava-nitranga lehibe; saingy niafara tamin’ny andron’i Johanàna zafin’i Eliasiba izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny lohandohan’ny levita, izany hoe i Hasabià sy i Serebià ary i Jesoa mbamin’ny Binoy sy i Kadmiela, dia nifanatrika tamin’ireo levita namany mba hidera sy hisaotra an’Andriamanitra, rehefa tonga ny anjara fanompoany. Ny fandaharana nataon’i Davida olon’Andriamanitra no narahiny tamin’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny mpiandry varavarana kosa dia ry i Matanià sy i Bakbokià, i Hôbadià sy i Mesolama, ary i Talmôna sy i Hakoba; andraikiny koa ny fiambenana ireo trano fitobian’entana teo akaikin’ny vavahadin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ireo no nisahana izany asa izany tamin’ny andron’i Jôiakima zanakalahin’i Jesoa sy zafin’i Jôtsadàka, ary tamin’ny andron’i Nehemià governora sy i Hezrà mpisorona sady '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitokanana ny mandan’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Rehefa hotokanana ny mandan’i Jerosalema, dia nantsoina avy tamin’ny toeram-ponenany rehetra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '; nasaina ho tonga any Jerosalema ry zareo mba hanao ny fitokanana amim-pifaliana, ombàn’ny hira fiderana arahin’ny kipantsona sy valiha ary lokanga. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia tafangona ny mpihira avy any ambanivohitr’i Jerosalema sy avy amin’ny tanàna kely akaikin’i Netôfà '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'sy avy any Bety-Gilgala ary avy amin’ny faritr’i Geba sy i Hazmavety; fa efa nanao tanàna kely ho azy manodidina an’i Jerosalema ny mpihira. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Samy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nidio
  - type: text
    text: ' tena ny mpisorona sy ny levita; ary nodioviny koa ny olona sy ny vavahady ary ny manda.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia nasaiko niakatra eo ambonin’ny manda ireo mpanapaka an’i Joda; ny mpihira kosa nozaraiko ho antokony roa lehibe mitandahatra tsara. Ny antoko mpihira voalohany dia niroso teny ambonin’ny manda, tamin’ny ilany ankavanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tamin’ny ilany ankavanana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe mizotra mianatsimo. Ireo antoko mpihira anankiroa dia miainga eo akaikikaikin’ny vavahadin’ny lohasaha (3.13) ary samy mitety ny antsasakin’ny manda eo ho eo manodidina ny tanàna. Momba ny anaran’ireo vavahady sy tilikambo, jereo toko 3.
    marker-yv: yv-n
  - type: text
    text: ' mankeny amin’ny Vavahadin’ny Fanariam-pako; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ka nandeha nanarakaraka azy ry i Hôsahià, ny antsasak’ireo mpanapaka an’i Jodà, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'i Hazarià sy i Hezrà ary i Mesolama, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: i Joda sy i Benjamîna ary i Semahià sy i Jeremià;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'taorian’ireo ny sasany tamin’ny mpisorona mpitondra trompetra; avy eo i Zakarià, zanakalahin’i Jônatàna sy zafin’i Semahià sy zafiafin’i Matanià sy zafin-dohalik’i Mikaià sy zafin-kitrokelin’i Zakora ary zafim-paladian’i Asafa, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'mbamin’ireo naman’i Zakarià, dia i Semahià sy i Hazarela, i Milalay sy i Gilalay; i Mahay sy i Netaneela, ary i Joda sy i Hananỳ, izay samy nitondra ny zava-maneno namboarin’i Davida olon’Andriamanitra. I Hezrà mpahay lalàna no nialoha ireo mpiray dia ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nony tonga teo amin’ny Vavahadin’ny Loharano ry zareo, dia niatrika ny ambaratongan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: ; teo amin’ny manda ihany no niakatra izany izy ka nanjary lasa ambonin’ny tranon’i Davida, ary tafapaka hatreny amin’ny Vavahadin-drano eo atsinanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ny antoko-mpihira faharoa kosa dia nandeha tamin’ny ilany ankavia; ka ny tenako sy ny antsasak’ireo mpanapaka an’i Joda no nanaraka azy teny ambonin’ny manda. Nandalo teo akaikin’ny Tilikambon’ny Fatana izahay, dia nandroso hatreny amin’ny manda malalaka; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: avy eo dia nitety ny vavahadin’i Efraîma, sy ny vavahady tranainy ary ny vavahadin’ny Trondro. Nandalo teo akaikin’ny Tilikambo Hananela sy ny tilikambon’ny Zatolahy ary nihoatra ny vavahadin’ny Ondry izahay, vao nitsatoka teo amin’ny Vavahadin’ny fonja
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.6 sy nta
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia samy nijanona tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitra
  - type: text
    text: ' ny antoko-mpihira roa tonta, mbamin’ny tenako sy ireo mpanapaka tafaraka tamiko '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ary ny mpisorona trompetra, dia ry i Eliakima sy i Mahaseià, i Miniamîna sy i Mikaià, i Eliôhenay sy i Zakarià ary i Hananià. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nijanona tao ihany koa ry i Mahaseià sy i Semahià, i Elehazara sy i Hozy, i Jôhanàna sy i Malkià, ary i Helama sy i Hezera. Dia nihira mafy ny mpihira teo ambany fitarihan’i Jizrahià.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sorona
  - type: text
    text: ' maro no natolotra tamin’izany andro izany ary fifaliana no nanjaka, satria antom-pifaliana lehibe no efa nomen’Andriamanitra ny olona. Tao Jerosalema dia nifaly mbamin’ny zaza amam-behivavy, ka re lavitra ny hobin-kafaliana.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiveloman’ireo mpisorona sy levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Tamin’izay koa dia nisy olona notendrena hitandrina ny efitrano fitehirizana ny fanatitra avahana sy ny voaloham-bokatra ary ny fahafolon-karena. Ao no nasaina hangonin’ireo olona ireo ny anjara voadidin’ny lalàna mba ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', avy any amin’ny saha manodidina ny isan-tanàna; nifalian’ny vahoakan’i Joda manko ireo mpisorona sy levita izay samy teo amin’ny anjara toerany avy, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'sady nisahana ny tokony hotandremany momba an’Andriamaniny sy momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fidiovana
  - type: text
    text: . Toy izany koa ny mpihira sy ny mpiandry varavarana, izay nanaraka ny fandaharana nataon’i Davida sy i Salômôna zanany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Tan 25.1-8; 26.1-12
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Tamin’ny andron’i Davida manko dia i Asafa no lehiben’ny mpihira ary nisy ny mpitarika antoko-mpihira mbamin’ny hira fiderana sy fisaorana ho fankalazana an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ary tamin’ny andron’i Zerobabela sy i Nehemià, dia nomen’ny Israelita rehetra isan’andro ny anjaran’ny mpihira sy ny mpiandry varavarana; nomeny koa ny fanatitra voatokana ho an’ny levita, ary ny levita kosa indray no nanome ny fanatitra voatokana ho an’ny mpisorona taranak’i Aharôna.
