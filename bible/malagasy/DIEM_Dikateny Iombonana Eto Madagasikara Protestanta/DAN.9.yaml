document_id: DAN.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vavak’i Daniela
  - type: text
    content: 'Tamin’ny taona voalohany nanjakan’i Dariôsa zanakalahin’i Kserksesa, avy amin’ny taranaky ny Medianina, izany hoe tamin’ny taona voalohany nanjakany tamin’ny fanjakana babilônianina, '
  '10':
  - type: text
    content: 'Tsy nihaino ny feonao Tompo Andriamanitray izahay mba hanaraka ny lalànao izay naroson’ireo mpaminany mpanomponao taminay. '
  '11':
  - type: text
    content: Nandika ny lalànao i Israely manontolo, ary nihodina tsy hihaino ny feonao; ka dia natosakao taminay ny ozona sy ny fianianana voasoratra tao amin’ny lalànan’i Mosesy
  - type: note
    content: Jereo ohatra Lev 26.14-39; Deot 28.15-68.
  - type: text
    content: ' mpanomponao, satria nanota taminao izahay. '
  '12':
  - type: text
    content: 'Ary notanterahinao, Andriamanitra ô, ny teny nambaranao hamelezana anay sy ny mpitondra izay nitondra anay, ka nahatonga taminay tao Jerosalema loza lehibe izay tsy mbola nisy tahaka izany taty ambanin’ny lanitra. '
  '13':
  - type: text
    content: 'Araka izay voasoratra tao amin’ny lalànan’i Mosesy, ireo loza rehetra ireo dia tonga taminay, kanefa tsy nifona teo anatrehanao Tompo Andriamanitray izahay mba hialanay amin’ny helokay sady tsy niraika akory tamin’ny fahamarinanao. '
  '14':
  - type: text
    content: Koa izany, Tompo ô, no nitahirizanao ny loza ka nampiharanao izany taminay; fa marina Ianao Tompo Andriamanitray amin’ny asa rehetra nataonao, saingy izahay no tsy nihaino ny feonao.
  '15':
  - type: text
    content: '«Ary ankehitriny, Tompo Andriamanitray ô, Ianao efa nitondra ny vahoakanao niala tany Ejipta tamim-pahefàna mahery, sady nanao ny anaranao ho malaza tahaka ny amin’izao anio izao; izahay kosa efa nanota sady nanao heloka. '
  '16':
  - type: text
    content: 'Tompo ô, araka ny asa soa rehetra vitanao dia aoka re mba hisinda ny fahatezeranao sy ny fahaviniranao amin’i Jerosalema tanànanao sady tendrombohitrao masina. Noho ny fahotanay sy ny heloky ny razanay, dia miteny ratsy an’i Jerosalema sy ny vahoakanao ireo firenena manodidina rehetra. '
  '17':
  - type: text
    content: 'Ary ankehitriny, ry Andriamanitray ô, henoy ny vavaka amam-pifonako; ka jereo amin-katsarampo ny '
  - type: text
    content: Toeramasinao
  - type: text
    content: ' efa simba, satria Ianao no Tompo. '
  '18':
  - type: text
    content: 'Ry Andriamanitro ô, atongilano ny sofinao ka mihainoa, ary ahirato ny masonao ka jereo ny faharavàn’ity tanànanay, dia ilay tanàna izay niantsoana ny anaranao hitahiana azy; fa tsy noho ny asa soa vitanay no anaovanay fifonana eto anatrehanao fa noho ny halehiben’ny famindramponao. '
  '19':
  - type: text
    content: Tompo ô, mihainoa; Tompo ô, mamelà heloka; Tompo ô, mandrenesa ka miasà; noho ny aminao aza ela Ianao, ry Andriamanitro ô, satria ny tanànanao sy ny vahoakanao dia efa niantsoina ny anaranao hitahianao azy.»
  - type: heading
    content: Ny fanazavan’ny anjely Gabriela momba ny faminanian’i Jeremià
  '2':
  - type: text
    content: 'izaho Daniela dia nandinika tao amin’ireo boky masina ny hevitr’izay efa nambaran’ny Tompo tamin’i Jeremià '
  - type: text
    content: mpaminany
  - type: note
    content: 'Dariôsa: jereo 6.1 sy nta. –fitopolo taona: jereo Jer 25.11-12.'
  - type: text
    content: ', dia momba ny fitopolo taona haharetan’ny faharavàn’i Jerosalema. '
  '20':
  - type: text
    content: «Dia mbola niteny ihany aho ka nivavaka sady niaiky ny fahotako sy ny fahotan’i Israely fireneko, ka nitaraina teo anatrehan’ny Tompo Andriamanitro aho momba ny tendrombohiny masina
  - type: note
    content: 'ny tendrombohiny masina: dia ny tendrombohitr’i Jerosalema ary mahafaoka ny tanàna mihitsy raha itarina ny hevitra.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Ary raha mbola niteny sady nivavaka toy izany aho, dia indro i Gabriela, ilay '
  - type: text
    content: anjely
  - type: text
    content: ' hitako tamin’ny fahitana anikeheo, fa nanidina haingana nanatona ahy tamin’ny fotoanan’ny fanatitra hariva'
  - type: note
    content: 'Gabriela: jereo 8.16; Lk 1.19, 26. –fanatitra hariva: azo adika hoe fanatitra tolakandro satria heverina ho natolotra teo antenatenan’ny folakandro. (Ampit 1 Mp 18.29,36).'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ary nampianatra ahy izy ka niresaka tamiko nanao hoe: ‹Ry Daniela, tonga aho ankehitriny mba hampahazava ny sainao. '
  '23':
  - type: text
    content: 'Fa raha vao nanomboka ny vavakao, dia nisy hafatra navoakan’Andriamanitra ka tonga aho hampita azy aminao, satria fatra-pitia anao Andriamanitra. Koa diniho izany hafatra izany ary fantaro ny hevitr’ilay fahitana. '
  '24':
  - type: text
    content: 'Fito taona impitopolo no voatendry ho an’ny firenenao ary ho an’ilay tanànanao masina; ilaina izany mba hampijanona ny heloka bevava sy hampitsaharana ny ota, mba hamelàna ny fahadisoana sy hisehoan’ny fahamarinana mandrakizay ary mba hahatanterahan’ny fahitana amam-paminaniana sy hanokanana indray ny '
  - type: text
    content: Toeramasina indrindra
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Izao no aoka ho fantatrao sy ho azonao: manomboka amin’ny fotoana nivoahan’ny hafatra mampanamboatra indray an’i Jerosalema, ka hatramin’ny fotoana isehoan’ilay mpitarika voahosotra, dia hisy fito taona impito'
  - type: note
    content: 'ny teny...: ny tenin’i Jeremià, jereo Jer 25.11-12; 29.10. –mpitarika voahosotra: mety ho i Kirôsa io, jereo Is 45.1 sy nta; mety koa ho i Josoa mpisorombe, jereo Hag 1.1; misy kosa mihevitra fa filazana an-kolaka an’i Jesoa Kristy io.'
  - type: text
    content: '. Avy eo, mandritra ny fito taona in-62 dia hamboarina indray ny tanàna sy ny hady, nefa ho androm-pahoriana izany. '
  '26':
  - type: text
    content: Rehefa tapitra ny fito taona in-62, dia hisy lehilahy voahosotra iray hovonoina ho faty
  - type: note
    content: 'lehilahy voahosotra iray: mety ho ny mpisorombe Ônià faha-3 izay maty novonoin’ny sasany tamin’ny taona 171 tal J.K.; jereo 11.22. –mpitarika iray: i Antiôkôsa Epifàna, jereo 7.5 sy nta; na i Titosy izay nandrava an’i Jerosalema tamin’ny taona 70 taor J.K., araka ny fandraisan’ny sasany azy.'
  - type: text
    content: ' nefa tsy hisy hiaro azy'
  - type: note
    content: 'tsy hisy hiaro azy: dkt hafa ka tsy hisy mpanaraka.'
  - type: text
    content: '. Ary tafika entin’ny mpitarika iray no handrava ny tanàna sy ny toera-masina; kanefa hanam-piafarana io mpitarika io fa hitosahan’ny fahatezeran’Andriamanitra; saingy mandra-pahatapitry ny ady dia hisy fandravana araka ny efa voatendry. '
  '27':
  - type: text
    content: Ary amin’ny fito taona farany dia hampihatra fanerena henjana amin’ny olona maro izy, ka afaka telo taona sy tapany monja dia hampitsahatra ny sorona sy ny fanatitra. Fanompoan-tsampy maharikoriko no hanesika izany mpandrava izany mandra-pigadon’ny famongorana izay voatendry hiantonta aminy
  - type: note
    content: 'fanerena henjana: io dia fanerena ny Jiosy mba handà tsy hanao ireo fombam-pivavahana fanaony hatrizay. –hampitsahatra ny sorona sy ny fanatitra: nanomboka tamin’ny taona 167-164 tal J.K. raha i Antiôkôsa Epifàna, ary hatramin’ny taona 70 taor J.K. kosa raha tàhiny i Titosy.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ary nitodika tamin’ny Tompo Andriamanitra aho mba hanao vavaka fitarainana sy fifonana ombàn’ny '
  - type: text
    content: fifadian-kanina
  - type: text
    content: ' sy ny fitafiana lamba fisaonana ary ny fihosoran-davenona'
  - type: note
    content: 'fihosoran-davenona: jereo Ne 9.1 sy nta. Jereo koa ny FTS amin’ny voambolana hoe MANDRIATRA FITAFIANA.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ary nivavaka tamin’ny Tompo Andriamanitro aho sady niaiky heloka hoe:'
  - type: text
    content: '«Indrisy, Tompo ô, Andriamanitra lehibe sy mahatahotra Ianao ka mitandrina ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' sy ny fitiavana amin’izay tia Anao sy mankato ny didinao. '
  '5':
  - type: text
    content: 'Nanota izahay ka diso, nanao ratsy sy nikomy ary niala tamin’ny didy sy ny fitsipikao; '
  '6':
  - type: text
    content: 'tsy nohenoinay ireo mpaminany mpanomponao, izay niteny tamin’ny anaranao tamin’ny mpanjakanay sy ny mpifehy anay sy ny razanay ary ny vahoaka rehetra. '
  '7':
  - type: text
    content: 'Anao ny fahamarinana, Tompo ô, ary anay kosa ny fahamenarana tahaka ny amin’izao anio izao, dia anay olon’i Joda sy mponin’i Jerosalema ary an’ireo Israelita hafa rehetra na ny lavitra na ny akaiky, any amin’ny tany rehetra izay efa nandroahanao azy noho ny fahadisoana vitany taminao. '
  '8':
  - type: text
    content: 'Eny, Tompo ô, anay ny fahamenarana, dia an’ny mpanjakanay sy ny mpifehy anay ary ny razanay, satria efa nanota taminao izahay. '
  '9':
  - type: text
    content: 'Fa Anao Tompo Andriamanitray kosa ny famindrampo sy ny famelan-keloka, satria efa nikomy taminao izahay. '
