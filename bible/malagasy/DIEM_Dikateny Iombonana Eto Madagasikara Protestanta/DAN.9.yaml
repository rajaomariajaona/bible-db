document_id: DAN.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavak’i Daniela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’ny taona voalohany nanjakan’i Dariôsa zanakalahin’i Kserksesa, avy amin’ny taranaky ny Medianina, izany hoe tamin’ny taona voalohany nanjakany tamin’ny fanjakana babilônianina, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tsy nihaino ny feonao Tompo Andriamanitray izahay mba hanaraka ny lalànao izay naroson’ireo mpaminany mpanomponao taminay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nandika ny lalànao i Israely manontolo, ary nihodina tsy hihaino ny feonao; ka dia natosakao taminay ny ozona sy ny fianianana voasoratra tao amin’ny lalànan’i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ohatra Lev 26.14-39; Deot 28.15-68.
      marker-yv: yv-n
    - type: text
      text: ' mpanomponao, satria nanota taminao izahay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary notanterahinao, Andriamanitra ô, ny teny nambaranao hamelezana anay sy ny mpitondra izay nitondra anay, ka nahatonga taminay tao Jerosalema loza lehibe izay tsy mbola nisy tahaka izany taty ambanin’ny lanitra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Araka izay voasoratra tao amin’ny lalànan’i Mosesy, ireo loza rehetra ireo dia tonga taminay, kanefa tsy nifona teo anatrehanao Tompo Andriamanitray izahay mba hialanay amin’ny helokay sady tsy niraika akory tamin’ny fahamarinanao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Koa izany, Tompo ô, no nitahirizanao ny loza ka nampiharanao izany taminay; fa marina Ianao Tompo Andriamanitray amin’ny asa rehetra nataonao, saingy izahay no tsy nihaino ny feonao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '«Ary ankehitriny, Tompo Andriamanitray ô, Ianao efa nitondra ny vahoakanao niala tany Ejipta tamim-pahefàna mahery, sady nanao ny anaranao ho malaza tahaka ny amin’izao anio izao; izahay kosa efa nanota sady nanao heloka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tompo ô, araka ny asa soa rehetra vitanao dia aoka re mba hisinda ny fahatezeranao sy ny fahaviniranao amin’i Jerosalema tanànanao sady tendrombohitrao masina. Noho ny fahotanay sy ny heloky ny razanay, dia miteny ratsy an’i Jerosalema sy ny vahoakanao ireo firenena manodidina rehetra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ankehitriny, ry Andriamanitray ô, henoy ny vavaka amam-pifonako; ka jereo amin-katsarampo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasinao
    - type: text
      text: ' efa simba, satria Ianao no Tompo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ry Andriamanitro ô, atongilano ny sofinao ka mihainoa, ary ahirato ny masonao ka jereo ny faharavàn’ity tanànanay, dia ilay tanàna izay niantsoana ny anaranao hitahiana azy; fa tsy noho ny asa soa vitanay no anaovanay fifonana eto anatrehanao fa noho ny halehiben’ny famindramponao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tompo ô, mihainoa; Tompo ô, mamelà heloka; Tompo ô, mandrenesa ka miasà; noho ny aminao aza ela Ianao, ry Andriamanitro ô, satria ny tanànanao sy ny vahoakanao dia efa niantsoina ny anaranao hitahianao azy.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanazavan’ny anjely Gabriela momba ny faminanian’i Jeremià
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'izaho Daniela dia nandinika tao amin’ireo boky masina ny hevitr’izay efa nambaran’ny Tompo tamin’i Jeremià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Dariôsa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 6.1 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fitopolo taona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Jer 25.11-12.'
      marker-yv: yv-n
    - type: text
      text: ', dia momba ny fitopolo taona haharetan’ny faharavàn’i Jerosalema. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: «Dia mbola niteny ihany aho ka nivavaka sady niaiky ny fahotako sy ny fahotan’i Israely fireneko, ka nitaraina teo anatrehan’ny Tompo Andriamanitro aho momba ny tendrombohiny masina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny tendrombohiny masina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ny tendrombohitr’i Jerosalema ary mahafaoka ny tanàna mihitsy raha itarina ny hevitra.
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary raha mbola niteny sady nivavaka toy izany aho, dia indro i Gabriela, ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' hitako tamin’ny fahitana anikeheo, fa nanidina haingana nanatona ahy tamin’ny fotoanan’ny fanatitra hariva'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gabriela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 8.16; Lk 1.19, 26. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fanatitra hariva
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': azo adika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fanatitra tolakandro
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' satria heverina ho natolotra teo antenatenan’ny folakandro. (Ampit 1 Mp 18.29,36).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary nampianatra ahy izy ka niresaka tamiko nanao hoe: ‹Ry Daniela, tonga aho ankehitriny mba hampahazava ny sainao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa raha vao nanomboka ny vavakao, dia nisy hafatra navoakan’Andriamanitra ka tonga aho hampita azy aminao, satria fatra-pitia anao Andriamanitra. Koa diniho izany hafatra izany ary fantaro ny hevitr’ilay fahitana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fito taona impitopolo no voatendry ho an’ny firenenao ary ho an’ilay tanànanao masina; ilaina izany mba hampijanona ny heloka bevava sy hampitsaharana ny ota, mba hamelàna ny fahadisoana sy hisehoan’ny fahamarinana mandrakizay ary mba hahatanterahan’ny fahitana amam-paminaniana sy hanokanana indray ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina indrindra
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Izao no aoka ho fantatrao sy ho azonao: manomboka amin’ny fotoana nivoahan’ny hafatra mampanamboatra indray an’i Jerosalema, ka hatramin’ny fotoana isehoan’ilay mpitarika voahosotra, dia hisy fito taona impito'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.25 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'ny teny...:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny tenin’i Jeremià, jereo Jer 25.11-12; 29.10. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: mpitarika voahosotra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': mety ho i Kirôsa io, jereo Is 45.1 sy nta; mety koa ho i Josoa mpisorombe, jereo Hag 1.1; misy kosa mihevitra fa filazana an-kolaka an’i Jesoa Kristy io.'
      marker-yv: yv-n
    - type: text
      text: '. Avy eo, mandritra ny fito taona in-62 dia hamboarina indray ny tanàna sy ny hady, nefa ho androm-pahoriana izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Rehefa tapitra ny fito taona in-62, dia hisy lehilahy voahosotra iray hovonoina ho faty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.26a '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lehilahy voahosotra iray: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mety ho ny mpisorombe Ônià faha-3 izay maty novonoin’ny sasany tamin’ny taona 171 tal J.K.; jereo 11.22. –
      - type: usfm
        marker: bd
        children:
        - type: text
          text: mpitarika iray
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': i Antiôkôsa Epifàna, jereo 7.5 sy nta; na i Titosy izay nandrava an’i Jerosalema tamin’ny taona 70 taor J.K., araka ny fandraisan’ny sasany azy.'
      marker-yv: yv-n
    - type: text
      text: ' nefa tsy hisy hiaro azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.26b '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy hisy hiaro azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ka tsy hisy mpanaraka.
      marker-yv: yv-n
    - type: text
      text: '. Ary tafika entin’ny mpitarika iray no handrava ny tanàna sy ny toera-masina; kanefa hanam-piafarana io mpitarika io fa hitosahan’ny fahatezeran’Andriamanitra; saingy mandra-pahatapitry ny ady dia hisy fandravana araka ny efa voatendry. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary amin’ny fito taona farany dia hampihatra fanerena henjana amin’ny olona maro izy, ka afaka telo taona sy tapany monja dia hampitsahatra ny sorona sy ny fanatitra. Fanompoan-tsampy maharikoriko no hanesika izany mpandrava izany mandra-pigadon’ny famongorana izay voatendry hiantonta aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fanerena henjana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: io dia fanerena ny Jiosy mba handà tsy hanao ireo fombam-pivavahana fanaony hatrizay. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: hampitsahatra ny sorona sy ny fanatitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': nanomboka tamin’ny taona 167-164 tal J.K. raha i Antiôkôsa Epifàna, ary hatramin’ny taona 70 taor J.K. kosa raha tàhiny i Titosy.'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nitodika tamin’ny Tompo Andriamanitra aho mba hanao vavaka fitarainana sy fifonana ombàn’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fifadian-kanina
    - type: text
      text: ' sy ny fitafiana lamba fisaonana ary ny fihosoran-davenona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fihosoran-davenona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Ne 9.1 sy nta. Jereo koa ny FTS amin’ny voambolana hoe MANDRIATRA FITAFIANA.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nivavaka tamin’ny Tompo Andriamanitro aho sady niaiky heloka hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Indrisy, Tompo ô, Andriamanitra lehibe sy mahatahotra Ianao ka mitandrina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' sy ny fitiavana amin’izay tia Anao sy mankato ny didinao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nanota izahay ka diso, nanao ratsy sy nikomy ary niala tamin’ny didy sy ny fitsipikao; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'tsy nohenoinay ireo mpaminany mpanomponao, izay niteny tamin’ny anaranao tamin’ny mpanjakanay sy ny mpifehy anay sy ny razanay ary ny vahoaka rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Anao ny fahamarinana, Tompo ô, ary anay kosa ny fahamenarana tahaka ny amin’izao anio izao, dia anay olon’i Joda sy mponin’i Jerosalema ary an’ireo Israelita hafa rehetra na ny lavitra na ny akaiky, any amin’ny tany rehetra izay efa nandroahanao azy noho ny fahadisoana vitany taminao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Eny, Tompo ô, anay ny fahamenarana, dia an’ny mpanjakanay sy ny mpifehy anay ary ny razanay, satria efa nanota taminao izahay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa Anao Tompo Andriamanitray kosa ny famindrampo sy ny famelan-keloka, satria efa nikomy taminao izahay. '
