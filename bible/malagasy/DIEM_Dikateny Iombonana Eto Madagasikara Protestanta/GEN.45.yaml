document_id: GEN.45
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanambara ny tenany i Jôsefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary tsy nahatsindry ny fihetseham-pony teo imason’ny olona rehetra nanodidina azy intsony i Jôsefa; dia nasainy nivoaka ny trano izy rehetra. Koa tsy nisy olon-kafa teo amin’i Jôsefa fony izy nampahafantatra ny tenany tamin’ireo rahalahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 7.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mafy loatra anefa ny tomanin’i Jôsefa ka ren’ny Ejiptianina maro, ary heno hatrany an-dapan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy i Jôsefa tamin’ireo rahalahiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho no Jôsefa; moa mbola velona any ihany ve i dada?
- type: usfm
  marker: p
  children:
  - type: text
    text: Tsy nahavaly azy kosa ireo rahalahiny, fa tora-kovitra teo anatrehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka hoy indray i Jôsefa tamin’ireo rahalahiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia manatòna ahy ianareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanatona ireo. Ary hoy koa i Jôsefa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no Jôsefa rahalahinareo izay namidinareo mba hoentina aty Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ankehitriny, aza malahelo na tezitra tamin’ny nivarotanareo ahy toy izao, fa Andriamanitra no nandefa ahy mialoha taty mba hamonjy aina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Efa roa taona izao no nisian’ny mosary teto amin’ny tany Ejipta, kanefa ato anatin’ny dimy taona dia tsy mbola hisy ny fiasan-tany na fijinjana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Andriamanitra no nandefa ahy nialoha anareo tamin’ity tany ity mba tsy hahalany taranaka anareo ary mba hamelomana ny ainareo; ka famonjena lehibe izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy ianareo no nandefa ahy taty fa Andriamanitra mihitsy, ary mbola Izy ihany no nametraka ahy ho mpandraharaha faratampon’ny Farao sy ho mpanapaka izay rehetra ao an-tranon’ny Farao ary ho mpitondra an’i Ejipta manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa miakara haingana ho any amin’i dada ianareo, ka lazao aminy hoe: «Izao no lazain’i Jôsefa zanakao: Andriamanitra efa nametraka ahy ho tompon’i Ejipta manontolo, koa midina atỳ amiko fa aza mitaredretra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hipetraka ao amin’ny faritr’i Gôsena ianao mbamin’ny zanakao sy ny zafikelinao ary koa ny ondry aman’osinao sy ny ombinao ary ny fanananao rehetra; dia ho etỳ akaikiko ianao amin’izay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny faritr’i Gôsena dia noheverina ho tamin’ny ilany atsinanan’ny vinanin’ny Ony Neily. –Momba ny and 9-11 eto, dia jereo Asa 7.14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izaho no hamatsy sakafo anao atỳ, fa mbola haharitra dimy taona ny mosary fandrao ringana ianao sy ny ankohonanao ary ireo biby fiompinao.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary indro hitan’ny masonareo sy ny mason’i Benjamîna rahalahiko izao fa ny vavako mihitsy no manambara aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa mandehana tantarao avokoa amin’i dada ny voninahitro eto Ejipta mbamin’ny zavatra rehetra efa hitanareo, ary ento faingana midina atỳ i dada.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niantoraka teny am-bozon’i Benjamîna i Jôsefa ka nifamihina izy roa lahy sady nitomany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nanoroka ny rahalahiny hafa rehetra koa i Jôsefa sady nitomany. Taorian’izany vao niresaka tamin’i Jôsefa ireo rahalahiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nasain’ny Farao mankany Ejipta i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ren’ny tao an-dapan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' fa hoe tonga ny rahalahin’i Jôsefa; ary nahafaly ny Farao sy ireo olona mpanotrona azy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa hoy ny Farao tamin’i Jôsefa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazao ireo rahalahinao hampitaingina ny entany hoentin’ny biby sy handeha hody any Kanahàna, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia haka ny rainy sy ny fianakaviany ka hankaty amiko; fa homeko azy ny tany lonaka indrindra eto Ejipta ka hihinana ny vokatra tsara indrindra eto amin’ny tany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lazao koa ireo rahalahinao haka sarety eto mba hitondrany ireo vadiny aman-janany mbamin’ny rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy tokony halahelo izay fanaka ilaozany any izy, satria hipetraka amin’ny faritra lonaka indrindra eto amin’ny tany Ejipta manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia notanterahin’ireo zanakalahin’i Jakôba izay nasaina nataony. Koa nomen’i Jôsefa sarety izy araka ny baikon’ny Farao, sady nomeny vatsin-dalana koa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nomeny akanjo indray misolo avy koa izy rehetra, fa i Benjamîna kosa nomeny sekela volafotsy telonjato sy akanjo dimy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izao koa no nampitondrain’i Jôsefa ho an-drainy: borikilahy folo nivesatra ny zava-tsoa avy tany Ejipta sy borikivavy folo nitondra vary sy mofo ary sakafo hafa ho an’ny dian-drainy mianakavy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Namepetra ireo rahalahiny i Jôsefa mba tsy hifanditra eny an-dalàna ary nalefany handeha ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niala tao Ejipta ireto rahalahin’i Jôsefa ka nihazo an’i Kanahàna ary tonga tany amin’i Jakôba rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Notantarainy azy fa mbola velona any i Jôsefa ary izy mihitsy no mpanapaka eo amin’ny tany Ejipta manontolo; saingy tsy nampiraika an’i Jakôba izany, satria tsy nino ireto zanany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa nambaran’izy ireo taminy ny teny rehetra izay nampitondrain’i Jôsefa azy; ary rehefa nahita ny sarety izay nalefan’i Jôsefa hitondrana azy i Jakôba rainy, dia nahazoazo aina indray '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka izay fa mbola velona any tokoa i Jôsefa zanako! Handeha aho ka hahita azy indray alohan’ny hahafatesako.
