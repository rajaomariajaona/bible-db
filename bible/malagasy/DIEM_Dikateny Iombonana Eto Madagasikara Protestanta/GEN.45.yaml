document_id: GEN.45,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanambara ny tenany i Jôsefa
  - type: text
    content: Ary tsy nahatsindry ny fihetseham-pony teo imason’ny olona rehetra nanodidina azy intsony i Jôsefa; dia nasainy nivoaka ny trano izy rehetra. Koa tsy nisy olon-kafa teo amin’i Jôsefa fony izy nampahafantatra ny tenany tamin’ireo rahalahiny
  - type: note
    content: Ampit Asa 7.13.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Hipetraka ao amin’ny faritr’i Gôsena ianao mbamin’ny zanakao sy ny zafikelinao ary koa ny ondry aman’osinao sy ny ombinao ary ny fanananao rehetra; dia ho etỳ akaikiko ianao amin’izay
  - type: note
    content: Ny faritr’i Gôsena dia noheverina ho tamin’ny ilany atsinanan’ny vinanin’ny Ony Neily. –Momba ny and 9-11 eto, dia jereo Asa 7.14.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Izaho no hamatsy sakafo anao atỳ, fa mbola haharitra dimy taona ny mosary fandrao ringana ianao sy ny ankohonanao ary ireo biby fiompinao.»
  '12':
  - type: text
    content: 'Ary indro hitan’ny masonareo sy ny mason’i Benjamîna rahalahiko izao fa ny vavako mihitsy no manambara aminareo. '
  '13':
  - type: text
    content: Koa mandehana tantarao avokoa amin’i dada ny voninahitro eto Ejipta mbamin’ny zavatra rehetra efa hitanareo, ary ento faingana midina atỳ i dada.
  '14':
  - type: text
    content: 'Dia niantoraka teny am-bozon’i Benjamîna i Jôsefa ka nifamihina izy roa lahy sady nitomany. '
  '15':
  - type: text
    content: Ary nanoroka ny rahalahiny hafa rehetra koa i Jôsefa sady nitomany. Taorian’izany vao niresaka tamin’i Jôsefa ireo rahalahiny.
  - type: heading
    content: Nasain’ny Farao mankany Ejipta i Jakôba
  '16':
  - type: text
    content: 'Ren’ny tao an-dapan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' fa hoe tonga ny rahalahin’i Jôsefa; ary nahafaly ny Farao sy ireo olona mpanotrona azy izany. '
  '17':
  - type: text
    content: 'Koa hoy ny Farao tamin’i Jôsefa:'
  - type: text
    content: '–Lazao ireo rahalahinao hampitaingina ny entany hoentin’ny biby sy handeha hody any Kanahàna, '
  '18':
  - type: text
    content: 'dia haka ny rainy sy ny fianakaviany ka hankaty amiko; fa homeko azy ny tany lonaka indrindra eto Ejipta ka hihinana ny vokatra tsara indrindra eto amin’ny tany izy. '
  '19':
  - type: text
    content: 'Lazao koa ireo rahalahinao haka sarety eto mba hitondrany ireo vadiny aman-janany mbamin’ny rainy. '
  '2':
  - type: text
    content: 'Mafy loatra anefa ny tomanin’i Jôsefa ka ren’ny Ejiptianina maro, ary heno hatrany an-dapan’ny '
  - type: text
    content: Farao
  - type: text
    content: '. '
  '20':
  - type: text
    content: Tsy tokony halahelo izay fanaka ilaozany any izy, satria hipetraka amin’ny faritra lonaka indrindra eto amin’ny tany Ejipta manontolo.
  '21':
  - type: text
    content: 'Dia notanterahin’ireo zanakalahin’i Jakôba izay nasaina nataony. Koa nomen’i Jôsefa sarety izy araka ny baikon’ny Farao, sady nomeny vatsin-dalana koa. '
  '22':
  - type: text
    content: 'Nomeny akanjo indray misolo avy koa izy rehetra, fa i Benjamîna kosa nomeny sekela volafotsy telonjato sy akanjo dimy. '
  '23':
  - type: text
    content: 'Ary izao koa no nampitondrain’i Jôsefa ho an-drainy: borikilahy folo nivesatra ny zava-tsoa avy tany Ejipta sy borikivavy folo nitondra vary sy mofo ary sakafo hafa ho an’ny dian-drainy mianakavy. '
  '24':
  - type: text
    content: Namepetra ireo rahalahiny i Jôsefa mba tsy hifanditra eny an-dalàna ary nalefany handeha ireo.
  '25':
  - type: text
    content: 'Dia niala tao Ejipta ireto rahalahin’i Jôsefa ka nihazo an’i Kanahàna ary tonga tany amin’i Jakôba rainy. '
  '26':
  - type: text
    content: 'Notantarainy azy fa mbola velona any i Jôsefa ary izy mihitsy no mpanapaka eo amin’ny tany Ejipta manontolo; saingy tsy nampiraika an’i Jakôba izany, satria tsy nino ireto zanany izy. '
  '27':
  - type: text
    content: 'Fa nambaran’izy ireo taminy ny teny rehetra izay nampitondrain’i Jôsefa azy; ary rehefa nahita ny sarety izay nalefan’i Jôsefa hitondrana azy i Jakôba rainy, dia nahazoazo aina indray '
  '28':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: –Aoka izay fa mbola velona any tokoa i Jôsefa zanako! Handeha aho ka hahita azy indray alohan’ny hahafatesako.
  '3':
  - type: text
    content: 'Hoy i Jôsefa tamin’ireo rahalahiny:'
  - type: text
    content: –Izaho no Jôsefa; moa mbola velona any ihany ve i dada?
  - type: text
    content: Tsy nahavaly azy kosa ireo rahalahiny, fa tora-kovitra teo anatrehany.
  '4':
  - type: text
    content: 'Ka hoy indray i Jôsefa tamin’ireo rahalahiny:'
  - type: text
    content: –Avia manatòna ahy ianareo.
  - type: text
    content: 'Dia nanatona ireo. Ary hoy koa i Jôsefa hoe:'
  - type: text
    content: '–Izaho no Jôsefa rahalahinareo izay namidinareo mba hoentina aty Ejipta. '
  '5':
  - type: text
    content: 'Ary ankehitriny, aza malahelo na tezitra tamin’ny nivarotanareo ahy toy izao, fa Andriamanitra no nandefa ahy mialoha taty mba hamonjy aina. '
  '6':
  - type: text
    content: 'Efa roa taona izao no nisian’ny mosary teto amin’ny tany Ejipta, kanefa ato anatin’ny dimy taona dia tsy mbola hisy ny fiasan-tany na fijinjana. '
  '7':
  - type: text
    content: 'Andriamanitra no nandefa ahy nialoha anareo tamin’ity tany ity mba tsy hahalany taranaka anareo ary mba hamelomana ny ainareo; ka famonjena lehibe izany. '
  '8':
  - type: text
    content: 'Tsy ianareo no nandefa ahy taty fa Andriamanitra mihitsy, ary mbola Izy ihany no nametraka ahy ho mpandraharaha faratampon’ny Farao sy ho mpanapaka izay rehetra ao an-tranon’ny Farao ary ho mpitondra an’i Ejipta manontolo. '
  '9':
  - type: text
    content: 'Koa miakara haingana ho any amin’i dada ianareo, ka lazao aminy hoe: «Izao no lazain’i Jôsefa zanakao: Andriamanitra efa nametraka ahy ho tompon’i Ejipta manontolo, koa midina atỳ amiko fa aza mitaredretra. '
