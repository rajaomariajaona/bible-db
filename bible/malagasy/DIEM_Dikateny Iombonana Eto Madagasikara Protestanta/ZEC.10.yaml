  - type: text
    text: Mangataka amin’ny Tompo fa tsy amin’ny sampy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mangataha amin’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: handefasany ranonoran-dohataona
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izy no manao ny oram-baratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia homeny oram-be mivatravatra ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy hataony maitso mavana ny sahanareo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa zava-poana no tenenin’ny sampy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary lainga no hany hitan’ny mpisikidy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy dikany ny nofy tantarainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: feno fitaka ny fampiononana entiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no nahavoatery ny vahoaka handeha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka ory tahaka ny andianondry tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo tokim-panafahana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Ireo vahiny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: miandry
  - type: text
    text: ' ny vahoakako'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no irehetan’ny fahatezerako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo osilahy no iantefan’ny famaliako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho Tompon’izao rehetra izao kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa hamangy ny ondriko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny taranak’i Joda izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny soavaly voaravaka hiady izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hoentiko any amin’ny toeram-piadiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Avy ao aminy no hipoiran’ny filoha rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay azo antoka toy ny vatofehizoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: matotra toy ny tsatokan-day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hentitra toy ny tsipîkan’ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho toy ny mpiady mahery ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanitsakitsaka ny mpifanandrina aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fotaka eny an-dàlambe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiady ireo, satria Izaho Tompo no momba azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary dia ho safo-kenatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahavalo mpitaingin-tsoavaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hampahery ny taranak’i Joda Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamonjy ny taranak’i Jôsefa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haveriko amin’ny laoniny indray ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria hanehoako famindrampo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho toy ny tsy nariako na oviana na oviana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamaly vavaka azy koa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izaho no Tompo Andriamaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho toy ny mpiady mahery ireo lehilahin’i Efraîma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho dibo-kafaliana toy ny azon-divay ny fony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahita izany ny zanany, ka ho ravoravo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary noho Izaho Tompo dia hibitaka ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hiantso ny vahoakako Aho ka hanangona azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa navotako izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihamaro toy ny taloha indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tahaka ny fanaparitaka voa famafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanelezako azy tany amin’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa na dia any lavitra any aza ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hahatsiaro Ahy ihany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any izy no hiaina miaraka amin-janany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa avy eo dia hiverina indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hampodiko avy any Ejipta izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hangoniko avy any Asiria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hoentiko any Gilehada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gilehada '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia faritany mivelatra hatrany atsinanan’i Jôrdàna; i Libano kosa dia tendrombohitra mitomandavana eo avaratr’i Palestinina.
    marker-yv: yv-n
  - type: text
    text: ' sy any Libano;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy na dia ireo toerana ireo aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola tsy ho omby azy ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hamakivaky ny ranomasim-pahoriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny ranomasim-pahoriana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny dkt tranainy grika dia manao azy eto hoe ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ranomasin’i Ejipta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; izany dia ny Ranomasin’ny Volotara* ary ny fiantombohan’ity andininy ity dia mampahatsiaro ny fivoahana tany Ejipta, jereo Eks 14.21-22; Is 51.10; Sal 106.9.
    marker-yv: yv-n
  - type: text
    text: ' izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho Tompo kosa hively ny onjan-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hahatankina tanteraka ny onin’ny Neily.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia haetry ny avonavon’i Asiria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho very fahefana i Ejipta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia Izaho Tompo no ho herin’ny vahoakako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny anarako no hifampiarahabany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho Tompo no manao izany teny hentitra izany».
