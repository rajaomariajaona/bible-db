document_id: ZEC.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mangataka amin’ny Tompo fa tsy amin’ny sampy
  - type: text
    content: Mangataha amin’ny Tompo
  - type: text
    content: handefasany ranonoran-dohataona
  - type: text
    content: fa Izy no manao ny oram-baratra;
  - type: text
    content: dia homeny oram-be mivatravatra ianareo
  - type: text
    content: ary samy hataony maitso mavana ny sahanareo
  '10':
  - type: text
    content: Hampodiko avy any Ejipta izy
  - type: text
    content: ary hangoniko avy any Asiria,
  - type: text
    content: ka hoentiko any Gilehada
  - type: note
    content: Gilehada dia faritany mivelatra hatrany atsinanan’i Jôrdàna; i Libano kosa dia tendrombohitra mitomandavana eo avaratr’i Palestinina.
  - type: text
    content: ' sy any Libano;'
  - type: text
    content: saingy na dia ireo toerana ireo aza
  - type: text
    content: dia mbola tsy ho omby azy ihany.
  '11':
  - type: text
    content: Hamakivaky ny ranomasim-pahoriana
  - type: note
    content: 'ny ranomasim-pahoriana: ny dkt tranainy grika dia manao azy eto hoe ny Ranomasin’i Ejipta; izany dia ny Ranomasin’ny Volotara* ary ny fiantombohan’ity andininy ity dia mampahatsiaro ny fivoahana tany Ejipta, jereo Eks 14.21-22; Is 51.10; Sal 106.9.'
  - type: text
    content: ' izy;'
  - type: text
    content: Izaho Tompo kosa hively ny onjan-dranomasina
  - type: text
    content: sy hahatankina tanteraka ny onin’ny Neily.
  - type: text
    content: Dia haetry ny avonavon’i Asiria,
  - type: text
    content: ary ho very fahefana i Ejipta.
  '12':
  - type: text
    content: Dia Izaho Tompo no ho herin’ny vahoakako;
  - type: text
    content: ary amin’ny anarako no hifampiarahabany.
  - type: text
    content: Izaho Tompo no manao izany teny hentitra izany».
  '2':
  - type: text
    content: Fa zava-poana no tenenin’ny sampy.
  - type: text
    content: Ary lainga no hany hitan’ny mpisikidy;
  - type: text
    content: tsy misy dikany ny nofy tantarainy,
  - type: text
    content: feno fitaka ny fampiononana entiny.
  - type: text
    content: Izany no nahavoatery ny vahoaka handeha,
  - type: text
    content: 'ka ory tahaka ny andianondry tsy misy '
  - type: text
    content: mpiandry
  - type: text
    content: .
  - type: heading
    content: Ireo tokim-panafahana
  '3':
  - type: text
    content: '«Ireo vahiny '
  - type: text
    content: miandry
  - type: text
    content: ' ny vahoakako'
  - type: text
    content: no irehetan’ny fahatezerako;
  - type: text
    content: ireo osilahy no iantefan’ny famaliako.
  - type: text
    content: Izaho Tompon’izao rehetra izao kosa
  - type: text
    content: efa hamangy ny ondriko,
  - type: text
    content: dia ny taranak’i Joda izany.
  - type: text
    content: Toy ny soavaly voaravaka hiady izy
  - type: text
    content: no hoentiko any amin’ny toeram-piadiana.
  '4':
  - type: text
    content: Avy ao aminy no hipoiran’ny filoha rehetra
  - type: text
    content: izay azo antoka toy ny vatofehizoro,
  - type: text
    content: matotra toy ny tsatokan-day,
  - type: text
    content: ary hentitra toy ny tsipîkan’ady.
  '5':
  - type: text
    content: Ho toy ny mpiady mahery ireo,
  - type: text
    content: ka hanitsakitsaka ny mpifanandrina aminy
  - type: text
    content: toy ny fotaka eny an-dàlambe.
  - type: text
    content: Hiady ireo, satria Izaho Tompo no momba azy;
  - type: text
    content: ary dia ho safo-kenatra
  - type: text
    content: ny fahavalo mpitaingin-tsoavaly.
  '6':
  - type: text
    content: Hampahery ny taranak’i Joda Aho
  - type: text
    content: ary hamonjy ny taranak’i Jôsefa;
  - type: text
    content: dia haveriko amin’ny laoniny indray ireo,
  - type: text
    content: satria hanehoako famindrampo
  - type: text
    content: ka ho toy ny tsy nariako na oviana na oviana.
  - type: text
    content: Ary hamaly vavaka azy koa Aho,
  - type: text
    content: fa Izaho no Tompo Andriamaniny.
  '7':
  - type: text
    content: Ho toy ny mpiady mahery ireo lehilahin’i Efraîma,
  - type: text
    content: ary ho dibo-kafaliana toy ny azon-divay ny fony.
  - type: text
    content: Hahita izany ny zanany, ka ho ravoravo;
  - type: text
    content: ary noho Izaho Tompo dia hibitaka ny fony.
  '8':
  - type: text
    content: Hiantso ny vahoakako Aho ka hanangona azy,
  - type: text
    content: satria efa navotako izy,
  - type: text
    content: ka hihamaro toy ny taloha indray.
  '9':
  - type: text
    content: Tahaka ny fanaparitaka voa famafy
  - type: text
    content: no nanelezako azy tany amin’ny firenena;
  - type: text
    content: fa na dia any lavitra any aza ireo
  - type: text
    content: dia hahatsiaro Ahy ihany.
  - type: text
    content: Any izy no hiaina miaraka amin-janany,
  - type: text
    content: kanefa avy eo dia hiverina indray.
