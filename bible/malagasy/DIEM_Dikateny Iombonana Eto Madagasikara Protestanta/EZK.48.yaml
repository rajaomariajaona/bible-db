      marker-yv: yv-n
    - type: text
      text: '. Ny anjara taniny kosa dia ho eo an-daniny roa amin’ny faritra voatokana ho Ahy Tompo sy ny zaratany ho an’ilay tanàna. Mifanolotra amin’ireo anjaran’ny sasany izany, ka mirefy 12 km sy sasany manomboka eo amin’ny faritra voatokana ka hatrany amin’ny sisin-tany atsinanana ary manomboka eo amin’ny faritra voatokana ka miankandrefana hatrany amin’ny Ranomasina Mediteranea. Ny faritra voatokana ho Ahy Tompo sy ny '
    - type: usfm
