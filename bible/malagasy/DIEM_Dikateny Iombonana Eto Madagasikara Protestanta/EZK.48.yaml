document_id: EZK.48
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjaran’ireo foko any avaratra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Ireto no anaran’ireo foko mbamin’ny anjarany avy. Ny anjaran’i Dana dia any amin’ny farany avaratra, hiainga eo amin’ny Ranomasina Mediteranea ka hanamorona ny lalana mankany Hetlôna sy Lebô-Hamata ary Hatsara-Henôna, akaikin’ny fanjakan’i Damasy sy i Hamata, dia hihazo ny sisin-tany atsinanana ka ho tafapaka eo amin’ny Ranomasina Mediteranea any andrefana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mifanolotra amin’ny faritanin’i Dana, hatrany atsinanana ka hatrany andrefana, no hisy ny anjaran’i Asera; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mifanolotra amin’ny faritanin’i Asera no hisy ny anjaran’i Naftalỳ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mifanolotra amin’ny faritanin’i Naftalỳ no hisy ny anjaran’i Manase; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mifanolotra amin’ny faritanin’i Manase no hisy ny anjaran’i Efraîma; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mifanolotra amin’ny faritanin’i Efraîma no hisy ny anjaran’i Reobena; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ary mifanolotra amin’ny faritanin’i Reobena no hisy ny anjaran’i Joda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny zaratany nomena ny foko tsirairay dia tany mifanindran-dalana milahatra manaraka ny sakan’ny tany; misy fito any avaratry ny anjara natokana ho an’ny Tompo sy ny faritr’ilay tanàna ary ny an’ny printsy (and 8-22) ary dimy kosa ny any atsimo.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjaran’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Mifanolotra amin’ny faritanin’i Joda, hatreo amin’ny sisin-tany atsinanana ka hatrany amin’ny Ranomasina Mediteranea any andrefana, dia hanavahanareo zaratany iray mitovy halava amin’ny anjaran’ny foko tsirairay fa hirefy 12 km sy sasany ny sakany; ary ao afovoany no hisy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny faritra hatokanareo ho Ahy TOMPO dia hirefy 12 km sy sasany ny lavany ary 10 km ny sakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary 10 km: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 45.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny ampahan’io faritra voatokana io dia homena ny mpisorona, ka hirefy 12 km sy sasany ny lavany avy any atsinanana no miankandrefana, ary 5 km ny sakany avy any avaratra no mianatsimo; ary eo afovoany no hisy ny tempolin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izany faritra izany dia ho an’ny mpisorona voatokana avy amin’ny taranak’i Tsadôka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsadôka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 40.46 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izay nitandrina an-tsakany sy an-davany ny fanompoana Ahy Tompo, fa tsy mba nivily nanaraka ny lalan-dison’ny Israelita tahaka ny nataon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Noho izany, dia ho anjarany ny faritra masina tokoa amin’izay natokana ho an’ny Tompo; ary mifanolotra amin’ny faritanin’ny Levita izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny anjaran’ny Levita dia hitovy amin’ny an’ny mpisorona. Samy hahazo anjara izay mirefy 12 km sy sasany ny lavany ary 5 km ny sakany izy roa tonta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy azo atakalo na amidy na afindra ny tany amin’io faritra izay manan-danja indrindra io, satria voatokana ho an’ny TOMPO.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjaran’ilay tanàna sy ny an’ny printsy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Amin’io faritany voatokana ho an’ny Tompo io dia mbola hisy tany sisa izay hirefy 2 km sy sasany ny sakany ary 12 km sy sasany ny lavany. Ho tany tsy masina io fa avela ho an’ilay tanàna; ny manodidina dia hisy ireo zana-bohitra sy ny kijana fiandrasam-biby, fa eo afovoany no hisy ilay tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ho efamira ny tanàna ka hirefy 2 250 metatra ny lafiny tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Isaky ny lafiny tsirairay amin’ny tanàna dia hisy toera-malalaka izay mirefy 125 metatra ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Manaraka ny halavan’ny faritra voatokana ho Ahy Tompo dia mbola hisy tany iray mirefy 5 km ny lavany eo atsinanan’ny tanàna, ary koa tany iray mitovy refy amin’izany eo andrefany. Ireo tany ireo no hanome sakafo ho an’ny mpiasa ao an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izay mpiasa ao amin’io tanàna io dia ho avy amin’ny foko israelita rehetra; ary izy ihany no hamboly ireo tany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny fitambaran’ny faritra voatokana ho Ahy Tompo dia ho efamira izay mirefy 12 km sy sasany ny lafiny tsirairay avy; ary hakanareo ampahefany izany ho zaratany ho an’ilay tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny sisa dia ho an’ny printsy filoha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty momba ny 44.3.
    marker-yv: yv-n
  - type: text
    text: '. Ny anjara taniny kosa dia ho eo an-daniny roa amin’ny faritra voatokana ho Ahy Tompo sy ny zaratany ho an’ilay tanàna. Mifanolotra amin’ireo anjaran’ny sasany izany, ka mirefy 12 km sy sasany manomboka eo amin’ny faritra voatokana ka hatrany amin’ny sisin-tany atsinanana ary manomboka eo amin’ny faritra voatokana ka miankandrefana hatrany amin’ny Ranomasina Mediteranea. Ny faritra voatokana ho Ahy Tompo sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' amin’izay dia ho ao afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny zaratanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' sy ny zaratany ho an’ilay tanàna no hampisaraka roa ny tanin’ny printsy filoha izay ho tafatsofoka eo anelanelan’ny faritanin’i Joda eo avaratra ary ny faritanin’i Benjamîna eo atsimo.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjaran’ireo foko any atsimo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Ny amin’ireo foko sisa mbamin’ny anjarany dia toy izao manaraka izao: ny anjaran’i Benjamîna dia miainga eo amin’ny sisin-tany atsinanana ka hatrany amin’ny Ranomasina Mediteranea any andrefana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mifanolotra amin’ny faritanin’i Benjamîna, avy any atsinanana ka hatrany andrefana, no misy ny anjaran’i Simehôna; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'mifanolotra amin’ny faritanin’i Simehôna ny anjaran’i Jisakara, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'mifanolotra amin’ny faritanin’i Jisakara ny anjaran’i Zebolòna, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mifanolotra amin’ny faritanin’i Zebolòna ny anjaran’i Gada. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary mifanolotra amin’ny faritanin’i Gada kosa dia ny sisin-tany atsimo, hanomboka ao Tamara any atsinanana, dia hankany amin’ny ranon’i Meribà any Kadesy ary hanaraka ny ranon-driakan’i Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hanaraka ny ranon-driakan’i Ejipta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 34.5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' hatrany amin’ny Ranomasina Mediteranea. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izany no tany izay hozarainareo antsapaka ho fananan’ireo foko israelita, ary izany no ho anjarany avy. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavahady roa ambin’ny folo ao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: '«Ireto no fidirana roa ambin’ny folo hankao amin’ny tanànan’i Jerosalema, fidirana izay samy hitondra ny anaran’ny foko iray avy amin’i Israely. Amin’ny lafiny avaratra izay mirefy 2 250 metatra dia hisy vavahady telo: dia ny an’i Reobena sy ny an’i Joda ary ny an’i Levỳ'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and 30-34, ampit Apôk 21.12-13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Amin’ny lafiny atsinanana izay mirefy 2 250 metatra dia hisy vavahady telo: dia ny an’i Jôsefa sy ny an’i Benjamîna ary ny an’i Dana. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Amin’ny lafiny atsimo izay mirefy 2 250 metatra dia hisy vavahady telo: dia ny an’i Simehôna sy ny an’i Jisakara ary ny an’i Zebolòna. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary amin’ny lafiny andrefana izay mirefy 2 250 metatra dia hisy vavahady telo: dia ny an’i Gada sy ny an’i Asera ary ny an’i Naftalỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ny manodidina ny tanàna dia mirefy sivy arivo metatra.
- type: usfm
  marker: p
  children:
  - type: text
    text: «Manomboka hatreo ny tanàna dia hantsoina hoe ‹Ny TOMPO no ao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ity anarana ity dia azo ampifanatonina amin’ny anarana Himanoela, jereo Is 7.14 sy nta.
    marker-yv: yv-n
  - type: text
    text: ›. »
