document_id: GEN.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanambadian’i Itsehàka sy i Rebekà
  - type: text
    content: 'Ary efa tena antitra be i Abrahama, sady '
  - type: text
    content: notahîn
  - type: text
    content: '’ny TOMPO tamin’ny zavatra rehetra. '
  '10':
  - type: text
    content: Dia naka rameva folo tamin’ny ramevan’ny tompony izy sady nitondra izay zavatra tsara indrindra nananan’ny tompony, dia niainga hankany Mezôpotamia ambony, any amin’ny tanànan’i Nahôra
  - type: note
    content: 'sady nitondra izay...tompony: dkt hafa notantanany avokoa ny fananan’ny tompony. –Nahôra eto dia mety ho anaran’ny tanàna asirianina iray na mety ho ny anaran’ny rahalahin’i Abrahama. (and 15; 11.27). Amin’ity farany, ny tanànan’i Nahôra dia i Haràna (11.31).'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Nony tonga teo akaikin’ny fantsakana teo ivelan’ny tanàna izy, dia nampandohalika ny rameva, fa fotoana hariva fivoahan’ny vehivavy mantsaka tamin’izay. '
  '12':
  - type: text
    content: 'Izao no vavaka nataony:'
  - type: text
    content: '–Ry TOMPO Andriamanitr’i Abrahama tompoko ô, mba ambino aho anio, ka manehoa fahasoavana amin’i Abrahama tompoko. '
  '13':
  - type: text
    content: 'Inty aho eto akaikin’ny fantsakana; ary ireo zatovovavy zanaky ny mponina ao an-tanàna dia hivoaka hantsaka rano eto. '
  '14':
  - type: text
    content: 'Koa izay zatovovavy hangatahako mba hampidina kely ny sininy hisotroako, ka hamaly hoe: «Misotroa ary aoka ny ramevanao hampisotroiko ihany koa!», dia amin’izay no hahafantarako fa izy no voatendrinao ho an’i Itsehàka mpanomponao ary efa naneho fahasoavana tamin’ny tompoko Ianao.'
  '15':
  - type: text
    content: 'Fa raha mbola tsy nifarana akory ny teniny, dia indro tamy i Rebekà milanja siny eny an-tsorony. Io Rebekà io dia zanakavavin’i Betoela zanakalahin’i Milkà izay vadin’i Nahôra rahalahin’i Abrahama. '
  '16':
  - type: text
    content: 'Tsara tarehy tokoa razazavavy sady virijiny fa tsy mbola nisy lehilahy niray taminy. Ary nidina teo am-pantsakana izy ka nameno ny sininy, dia niakatra. '
  '17':
  - type: text
    content: 'Fa nihazakazaka hihaona amin-drazazavavy ilay mpanompon’i Abrahama ka nanao hoe:'
  - type: text
    content: –Mba ampisotroy rano kely avy amin’ny sininao aho azafady!
  '18':
  - type: text
    content: 'Ary hoy razazavavy hoe:'
  - type: text
    content: –Misotroa, tompoko.
  - type: text
    content: 'Nampidininy haingana ny siny ho eo an-tanany, dia nampisotroiny ralehilahy. '
  '19':
  - type: text
    content: 'Ary rehefa vitany izany, dia hoy indray razazavavy hoe:'
  - type: text
    content: –Hantsaka ho an’ny ramevanao koa aho ambara-pisotron’izy rehetra.
  '2':
  - type: text
    content: 'Indray andro dia hoy i Abrahama tamin’ilay mpanompony tranainy indrindra tao an-tranony, izay mpifehy ny fananany rehetra:'
  - type: text
    content: '–Apetraho ato ambany feko ny tananao, '
  '20':
  - type: text
    content: 'Dia naidiny faingana tao anaty tavy fisotroam-biby ny rano tao an-tsiny ary nihazakazaka nantsaka indray izy, ka nantsakany avokoa ireto rameva rehetra. '
  '21':
  - type: text
    content: 'Ary nandinika tsara an-drazazavavy tamim-panginana ilay rangahy mba hahafantarany raha nambinin’ny TOMPO tokoa ny diany na tsia. '
  '22':
  - type: text
    content: 'Rehefa tapitra nisotro ny rameva, dia naka kavin’orona volamena iray tokony ho folo grama sy haba volamena roa tokony ho zato grama avy izy ho an-drazazavavy, '
  '23':
  - type: text
    content: 'sady nanontany azy hoe:'
  - type: text
    content: '–Mba lazao ahy hoe: Zanak’iza moa ianao? Ary misy toerana azonay andriana ve ao an-tranon-drainao?'
  '24':
  - type: text
    content: 'Dia namaly razazavavy hoe:'
  - type: text
    content: –Zanakavavin’i Betoela aho, sady zafikelin’i Milkà sy i Nahôra.
  '25':
  - type: text
    content: 'Ary mbola nampiany hoe:'
  - type: text
    content: –Na ny mololo na ny vilona dia samy betsaka ao aminay sady misy toerana handrianareo koa.
  '26':
  - type: text
    content: 'Niondrika ilay rangahy ary niankohoka nisaotra ny TOMPO '
  '27':
  - type: text
    content: 'nanao hoe:'
  - type: text
    content: –Hisaorana anie Ianao, ry TOMPO Andriamanitr’i Abrahama tompoko, fa tsy namela ny fitiavanao sy ny toetranao mahatoky hiala tamin’ny tompoko Ianao, fa teny an-dalana aho dia nentinao hankaty amin’ny tranon’ireo havan’ny tompoko.
  '28':
  - type: text
    content: 'Dia lasa nihazakazaka nankany an-tranon-dreniny razazavavy hilaza ny vaovao. '
  '29':
  - type: text
    content: 'Ary nanana anadahy atao hoe Labàna anefa i Rebekà; dia nihazakazaka io nankany amin’ilay rangahy tany ivelany, teo am-pantsakana. '
  '3':
  - type: text
    content: 'ka mianiàna amin’ny TOMPO Andriamanitry ny lanitra sy ny tany ianao fa tsy haka vady ho an’ny zanako avy amin’ny zanakavavin’ny Kanahanita izay miara-monina amiko. '
  '30':
  - type: text
    content: 'Tazany manko ny kavin’orona sy ireo haba teny an-tanan’ny anabaviny ary henony koa ny nitantarany izay voalazan’ilay rangahy. Dia tonga teo amin’ilay rangahy i Labàna; ary mbola mijoro eo anilan’ny fantsakana miaraka amin’ny ramevany izy '
  '31':
  - type: text
    content: 'no nitenenany hoe:'
  - type: text
    content: –Mandrosoa ao an-trano, ry ilay notahîn’ny TOMPO. Nahoana ianao no mijanona etỳ ivelany? Izaho anie efa nanomana ny trano sy namboatra toerana ho an’ny rameva e!
  '32':
  - type: text
    content: 'Dia nandroso tao an-trano ilay mpanompon’i Abrahama. Novahana ny rameva, ka nomena mololo sy vilona; ary nitondrana rano hisasan-tongotra koa ilay rangahy sy ireo olona niaraka taminy. '
  '33':
  - type: text
    content: 'Norosoana sakafo izy nefa nilaza hoe:'
  - type: text
    content: –Tsy mbola hihinana aho aloha, raha tsy efa voalazako izay tokony holazaiko.
  - type: text
    content: 'Ka hoy i Labàna hoe:'
  - type: text
    content: –Lazao àry.
  '34':
  - type: text
    content: 'Dia namaly ilay rangahy hoe:'
  - type: text
    content: '–Mpanompon’i Abrahama aho. '
  '35':
  - type: text
    content: 'Efa notahîn’ny TOMPO tokoa ny tompoko ka tonga olo-malaza. Nomen’ny TOMPO azy ny andian’ondry aman’osy sy omby ary koa volafotsy sy volamena, mpanompolahy sy mpanompovavy betsaka, ary rameva sy boriky. '
  '36':
  - type: text
    content: 'Ary i Sarà vadiny, na dia efa antitra aza, dia niteraka zazalahy taminy; ary izy io no namindrany ny fananany rehetra. '
  '37':
  - type: text
    content: 'Nampianiana ahy ny tompoko mba tsy haka vady ho an’ny zanany lahy avy ao amin’ny tanin’ny Kanahanita izay onenany. Ka hoy izy tamiko: '
  '38':
  - type: text
    content: '«Mianiàna amiko fa any amin’ny fianakavian-draiko, any amin’ny foko nipoirako, no halehanao haka vady ho an’ny zanako.» '
  '39':
  - type: text
    content: 'Dia nanontany azy aho hoe: «Ary raha ohatra ka tsy mety hanaraka ahy razazavavy?» '
  '4':
  - type: text
    content: Fa handeha ho any amin’ny tany fiaviako sy amin’ny havako ianao, ka haka vady ho an’i Itsehàka zanako.
  '40':
  - type: text
    content: 'Dia novaliany hoe: «Eo anatrehan’ny TOMPO hatrany no izorako, ka Izy haniraka ny anjeliny hiaraka aminao sy hampahomby ny dianao; ny zanako dia hitondranao vady avy amin’ny foko nipoirako sy ny fianakavian-draiko. '
  '41':
  - type: text
    content: 'Ary rehefa mandeha any amin’ny foko nipoirako ianao, na dia tsy omeny aza, dia afaka amin’ny fampianianako.» '
  '42':
  - type: text
    content: 'Koa raha vao tonga teo akaikin’ny fantsakana aho androany, dia nivavaka hoe: «Ry TOMPO Andriamanitr’i Abrahama tompoko ô, mba ataovy mahomby ny anton-diako. '
  '43':
  - type: text
    content: 'Inty aho mby eto anilan’ny fantsakana, hisy zazavavy hivoaka hantsaka ka hiangaviako mba hampisotro ahy rano kely avy amin’ny sininy. '
  '44':
  - type: text
    content: 'Koa raha mamaly ahy izy hoe: ‹Misotroa ianao, ary ny ramevanao koa hantsakako›, dia izy no vehivavy voatendrinao, ry TOMPO, ho an’ny zanakalahin’ny tompoko.» '
  '45':
  - type: text
    content: 'Raha mbola tsy tapitra akory anefa ny teniko anakampo, dia tamy i Rebekà niantsoroka siny, dia nidina nankeo am-pantsakana ka nantsaka; ary hoy aho taminy: «Mba omeo aho hosotroiko, aza fady!» '
  '46':
  - type: text
    content: 'Dia nampidininy faingana avy teny an-tsorony ny siny ka hoy izy hoe: «Misotroa, ary hampisotroiko koa ny ramevanao.» Dia nisotro aho ary nampisotroiny koa ny rameva. '
  '47':
  - type: text
    content: 'Ary rehefa nanontany azy aho hoe: «Zanak’iza moa ianao?», dia novaliany hoe: «Zanakavavin’i Betoela aho, ary zafikelin’i Nahôra sy i Milkà.» Dia napetrako teo amin’ny oron-drazazavavy ny kavina ary nataoko teny an-tanany ny haba. '
  '48':
  - type: text
    content: 'Nandohalika aho hitsaoka ny TOMPO, Andriamanitr’i Abrahama tompoko, ary nisaotra Azy noho ny nitondrany ahy tamin’ny lalana marina haka ny zanakavavin’ny rahalahin’ny tompoko mba ho an-janany. '
  '49':
  - type: text
    content: Koa ankehitriny lazao ahy raha vonona haneho fitia sy firaiketam-po amin’ny tompoko ianareo. Fa raha tsy izany kosa dia handeha ho any an-kafa aho.
  '5':
  - type: text
    content: 'Dia namaly azy ilay mpanompo hoe:'
  - type: text
    content: –Angamba tsy te hiaraka amiko ho atỳ amin’ity tany ity razazavavy, koa moa tsy maintsy haveriko any amin’ny tany izay efa nilaozanao ve ny zanakao?
  '50':
  - type: text
    content: 'Dia namaly i Labàna sy i Betoela hoe:'
  - type: text
    content: '–Avy amin’ny TOMPO no niavian’izao zavatra izao ka tsy azonay iadian-kevitra. '
  '51':
  - type: text
    content: Indro i Rebekà eo anoloanao, ento miaraka aminao izy ary aoka ho vadin’ny zanakalahin’ny tomponao, araka izay nambaran’ny TOMPO.
  '52':
  - type: text
    content: 'Rehefa nandre izany teny izany ilay mpanompon’i Abrahama, dia niankohoka tamin’ny tany hisaotra ny TOMPO. '
  '53':
  - type: text
    content: 'Avy eo dia namoaka firavaka volafotsy sy volamena ary fitafiana izy ka nomeny an’i Rebekà; nomeny zavatra sarobidy maro koa ny anadahiny sy ny reniny. '
  '54':
  - type: text
    content: Izay vao nihinana sy nisotro ilay mpanompon’i Abrahama sy ireo olona niaraka taminy; avy teo dia lasa natory.
  - type: text
    content: 'Ny ampitso maraina, rehefa nifoha izy ireo, dia hoy ilay mpanompon’i Abrahama hoe:'
  - type: text
    content: –Alefaso àry aho hiverina any amin’ny tompoko.
  '55':
  - type: text
    content: 'Fa namaly kosa ny anadahin-drazazavavy sy ny reniny hoe:'
  - type: text
    content: –Aoka hipetraka hiaraka aminay kelikely tokony ho folo andro aloha razazavavy, vao mandeha.
  '56':
  - type: text
    content: 'Fa namaly azy ireo indray ilay mpanompo hoe:'
  - type: text
    content: –Aza tananareo aho, fa ny TOMPO efa nanambina ny diako; alefaso aho hiverina ho any amin’ny tompoko.
  '57':
  - type: text
    content: 'Hoy kosa ireo hoe:'
  - type: text
    content: –Aoka àry hantsoinay razazavavy, aoka hanontaniana izay heviny!
  '58':
  - type: text
    content: 'Dia nantsoin’ireo i Rebekà ka nanontaniany hoe:'
  - type: text
    content: –Moa handeha hiaraka amin’io lehilahy io ve ianao?
  - type: text
    content: 'Ary hoy i Rebekà hoe:'
  - type: text
    content: –Eny, handeha aho.
  '59':
  - type: text
    content: 'Koa navelan’ireo handeha i Rebekà sy ny mpitaiza azy hiaraka amin’ilay mpanompon’i Abrahama sy ny olony. '
  '6':
  - type: text
    content: 'Dia hoy i Abrahama namaly azy:'
  - type: text
    content: '–Tandremo tsara mba tsy haverinao any ny zanako. '
  '60':
  - type: text
    content: 'Nitsodrano an’i Rebekà ireo ka nanao taminy hoe:'
  - type: text
    content: –Ho tonga renin’ny olona an’alinalina anie ianao, rahavana, ary ny taranakao anie hahazo ny tanànan’izay mankahala azy!
  '61':
  - type: text
    content: Dia niainga i Rebekà sy ireo mpanompovaviny ka nitaingin-drameva, ary lasa nandeha niaraka tamin’ilay mpanompon’i Abrahama.
  '62':
  - type: text
    content: I Itsehàka kosa niala tao amin’ny fantsakan’i Lahay-Roy
  - type: note
    content: 'Ny fantsakana tao Lahay-Rôy: dia jereo Gen 16.13-14.'
  - type: text
    content: ', ka nonina tao amin’ny faritany atsimo. '
  '63':
  - type: text
    content: 'Indray hariva raha nivoaka hitsangantsangana teny an-tsaha izy, dia nanopy maso ka nahita rameva nanatona. '
  '64':
  - type: text
    content: 'Rehefa nahatazana an’i Itsehàka i Rebekà, dia nidina niala tamin’ny rameva, '
  '65':
  - type: text
    content: 'ary nanontany ilay mpanompo hoe:'
  - type: text
    content: –Iza moa io lehilahy mandeha etỳ an-tsaha avy mitsena antsika io?
  - type: text
    content: 'Ka hoy ilay mpanompo hoe:'
  - type: text
    content: –Io no tompoko.
  - type: text
    content: 'Dia noraisin’i Rebekà ny voaly, ka nisaronany tarehy. '
  '66':
  - type: text
    content: 'Notantarain’ilay mpanompo an’i Itsehàka avokoa ny zavatra rehetra izay nataony. '
  '67':
  - type: text
    content: Avy eo dia nampandrosoin’i Itsehàka tao an-dain’i Sarà reniny i Rebekà, ka nalainy ho vady sy notiaviny; dia nampionona an’i Itsehàka izany taorian’ny nahafatesan-dreniny.
  '7':
  - type: text
    content: 'Ny TOMPO, Andriamanitry ny lanitra, no naka ahy tao an-tranon’ny raiko sy tao an-tanindrazako. Niteny tamiko Izy sady nianiana tamiko fa hanome ity tany ity ho an’ny taranako. Izy no haniraka ny '
  - type: text
    content: anjeliny
  - type: text
    content: ' eo alohanao, ka any no hakanao vady ho an’ny zanako. '
  '8':
  - type: text
    content: Raha tsy manaiky hanaraka anao ilay razazavavy, dia afaka amin’izao fianianana izao ianao; fa ny zanako kosa aza entinao miverina any.
  '9':
  - type: text
    content: 'Dia napetrak’ilay mpanompo tao ambany fen’i Abrahama tompony ny tanany, ary nianiana taminy momba io raharaha io izy. '
