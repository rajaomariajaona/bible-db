document_id: GEN.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanambadian’i Itsehàka sy i Rebekà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary efa tena antitra be i Abrahama, sady '
  - type: usfm
    marker: w
    children:
    - type: text
      text: notahîn
  - type: text
    text: '’ny TOMPO tamin’ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indray andro dia hoy i Abrahama tamin’ilay mpanompony tranainy indrindra tao an-tranony, izay mpifehy ny fananany rehetra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Apetraho ato ambany feko ny tananao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka mianiàna amin’ny TOMPO Andriamanitry ny lanitra sy ny tany ianao fa tsy haka vady ho an’ny zanako avy amin’ny zanakavavin’ny Kanahanita izay miara-monina amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa handeha ho any amin’ny tany fiaviako sy amin’ny havako ianao, ka haka vady ho an’i Itsehàka zanako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia namaly azy ilay mpanompo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Angamba tsy te hiaraka amiko ho atỳ amin’ity tany ity razazavavy, koa moa tsy maintsy haveriko any amin’ny tany izay efa nilaozanao ve ny zanakao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy i Abrahama namaly azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tandremo tsara mba tsy haverinao any ny zanako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny TOMPO, Andriamanitry ny lanitra, no naka ahy tao an-tranon’ny raiko sy tao an-tanindrazako. Niteny tamiko Izy sady nianiana tamiko fa hanome ity tany ity ho an’ny taranako. Izy no haniraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeliny
  - type: text
    text: ' eo alohanao, ka any no hakanao vady ho an’ny zanako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha tsy manaiky hanaraka anao ilay razazavavy, dia afaka amin’izao fianianana izao ianao; fa ny zanako kosa aza entinao miverina any.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia napetrak’ilay mpanompo tao ambany fen’i Abrahama tompony ny tanany, ary nianiana taminy momba io raharaha io izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia naka rameva folo tamin’ny ramevan’ny tompony izy sady nitondra izay zavatra tsara indrindra nananan’ny tompony, dia niainga hankany Mezôpotamia ambony, any amin’ny tanànan’i Nahôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sady nitondra izay...tompony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: notantanany avokoa ny fananan’ny tompony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nahôra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'eto dia mety ho anaran’ny tanàna asirianina iray na mety ho ny anaran’ny rahalahin’i Abrahama. (and 15; 11.27). Amin’ity farany, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tanànan’i Nahôra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia i Haràna (11.31).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nony tonga teo akaikin’ny fantsakana teo ivelan’ny tanàna izy, dia nampandohalika ny rameva, fa fotoana hariva fivoahan’ny vehivavy mantsaka tamin’izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no vavaka nataony:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry TOMPO Andriamanitr’i Abrahama tompoko ô, mba ambino aho anio, ka manehoa fahasoavana amin’i Abrahama tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Inty aho eto akaikin’ny fantsakana; ary ireo zatovovavy zanaky ny mponina ao an-tanàna dia hivoaka hantsaka rano eto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa izay zatovovavy hangatahako mba hampidina kely ny sininy hisotroako, ka hamaly hoe: «Misotroa ary aoka ny ramevanao hampisotroiko ihany koa!», dia amin’izay no hahafantarako fa izy no voatendrinao ho an’i Itsehàka mpanomponao ary efa naneho fahasoavana tamin’ny tompoko Ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha mbola tsy nifarana akory ny teniny, dia indro tamy i Rebekà milanja siny eny an-tsorony. Io Rebekà io dia zanakavavin’i Betoela zanakalahin’i Milkà izay vadin’i Nahôra rahalahin’i Abrahama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsara tarehy tokoa razazavavy sady virijiny fa tsy mbola nisy lehilahy niray taminy. Ary nidina teo am-pantsakana izy ka nameno ny sininy, dia niakatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa nihazakazaka hihaona amin-drazazavavy ilay mpanompon’i Abrahama ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba ampisotroy rano kely avy amin’ny sininao aho azafady!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy razazavavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Misotroa, tompoko.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nampidininy haingana ny siny ho eo an-tanany, dia nampisotroiny ralehilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa vitany izany, dia hoy indray razazavavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hantsaka ho an’ny ramevanao koa aho ambara-pisotron’izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia naidiny faingana tao anaty tavy fisotroam-biby ny rano tao an-tsiny ary nihazakazaka nantsaka indray izy, ka nantsakany avokoa ireto rameva rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nandinika tsara an-drazazavavy tamim-panginana ilay rangahy mba hahafantarany raha nambinin’ny TOMPO tokoa ny diany na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa tapitra nisotro ny rameva, dia naka kavin’orona volamena iray tokony ho folo grama sy haba volamena roa tokony ho zato grama avy izy ho an-drazazavavy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'sady nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mba lazao ahy hoe: Zanak’iza moa ianao? Ary misy toerana azonay andriana ve ao an-tranon-drainao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia namaly razazavavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Zanakavavin’i Betoela aho, sady zafikelin’i Milkà sy i Nahôra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary mbola nampiany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Na ny mololo na ny vilona dia samy betsaka ao aminay sady misy toerana handrianareo koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Niondrika ilay rangahy ary niankohoka nisaotra ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hisaorana anie Ianao, ry TOMPO Andriamanitr’i Abrahama tompoko, fa tsy namela ny fitiavanao sy ny toetranao mahatoky hiala tamin’ny tompoko Ianao, fa teny an-dalana aho dia nentinao hankaty amin’ny tranon’ireo havan’ny tompoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia lasa nihazakazaka nankany an-tranon-dreniny razazavavy hilaza ny vaovao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nanana anadahy atao hoe Labàna anefa i Rebekà; dia nihazakazaka io nankany amin’ilay rangahy tany ivelany, teo am-pantsakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tazany manko ny kavin’orona sy ireo haba teny an-tanan’ny anabaviny ary henony koa ny nitantarany izay voalazan’ilay rangahy. Dia tonga teo amin’ilay rangahy i Labàna; ary mbola mijoro eo anilan’ny fantsakana miaraka amin’ny ramevany izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'no nitenenany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandrosoa ao an-trano, ry ilay notahîn’ny TOMPO. Nahoana ianao no mijanona etỳ ivelany? Izaho anie efa nanomana ny trano sy namboatra toerana ho an’ny rameva e!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nandroso tao an-trano ilay mpanompon’i Abrahama. Novahana ny rameva, ka nomena mololo sy vilona; ary nitondrana rano hisasan-tongotra koa ilay rangahy sy ireo olona niaraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Norosoana sakafo izy nefa nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mbola hihinana aho aloha, raha tsy efa voalazako izay tokony holazaiko.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Labàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazao àry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia namaly ilay rangahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mpanompon’i Abrahama aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Efa notahîn’ny TOMPO tokoa ny tompoko ka tonga olo-malaza. Nomen’ny TOMPO azy ny andian’ondry aman’osy sy omby ary koa volafotsy sy volamena, mpanompolahy sy mpanompovavy betsaka, ary rameva sy boriky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary i Sarà vadiny, na dia efa antitra aza, dia niteraka zazalahy taminy; ary izy io no namindrany ny fananany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nampianiana ahy ny tompoko mba tsy haka vady ho an’ny zanany lahy avy ao amin’ny tanin’ny Kanahanita izay onenany. Ka hoy izy tamiko: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '«Mianiàna amiko fa any amin’ny fianakavian-draiko, any amin’ny foko nipoirako, no halehanao haka vady ho an’ny zanako.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nanontany azy aho hoe: «Ary raha ohatra ka tsy mety hanaraka ahy razazavavy?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia novaliany hoe: «Eo anatrehan’ny TOMPO hatrany no izorako, ka Izy haniraka ny anjeliny hiaraka aminao sy hampahomby ny dianao; ny zanako dia hitondranao vady avy amin’ny foko nipoirako sy ny fianakavian-draiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary rehefa mandeha any amin’ny foko nipoirako ianao, na dia tsy omeny aza, dia afaka amin’ny fampianianako.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Koa raha vao tonga teo akaikin’ny fantsakana aho androany, dia nivavaka hoe: «Ry TOMPO Andriamanitr’i Abrahama tompoko ô, mba ataovy mahomby ny anton-diako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Inty aho mby eto anilan’ny fantsakana, hisy zazavavy hivoaka hantsaka ka hiangaviako mba hampisotro ahy rano kely avy amin’ny sininy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Koa raha mamaly ahy izy hoe: ‹Misotroa ianao, ary ny ramevanao koa hantsakako›, dia izy no vehivavy voatendrinao, ry TOMPO, ho an’ny zanakalahin’ny tompoko.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Raha mbola tsy tapitra akory anefa ny teniko anakampo, dia tamy i Rebekà niantsoroka siny, dia nidina nankeo am-pantsakana ka nantsaka; ary hoy aho taminy: «Mba omeo aho hosotroiko, aza fady!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia nampidininy faingana avy teny an-tsorony ny siny ka hoy izy hoe: «Misotroa, ary hampisotroiko koa ny ramevanao.» Dia nisotro aho ary nampisotroiny koa ny rameva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary rehefa nanontany azy aho hoe: «Zanak’iza moa ianao?», dia novaliany hoe: «Zanakavavin’i Betoela aho, ary zafikelin’i Nahôra sy i Milkà.» Dia napetrako teo amin’ny oron-drazazavavy ny kavina ary nataoko teny an-tanany ny haba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Nandohalika aho hitsaoka ny TOMPO, Andriamanitr’i Abrahama tompoko, ary nisaotra Azy noho ny nitondrany ahy tamin’ny lalana marina haka ny zanakavavin’ny rahalahin’ny tompoko mba ho an-janany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Koa ankehitriny lazao ahy raha vonona haneho fitia sy firaiketam-po amin’ny tompoko ianareo. Fa raha tsy izany kosa dia handeha ho any an-kafa aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia namaly i Labàna sy i Betoela hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avy amin’ny TOMPO no niavian’izao zavatra izao ka tsy azonay iadian-kevitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Indro i Rebekà eo anoloanao, ento miaraka aminao izy ary aoka ho vadin’ny zanakalahin’ny tomponao, araka izay nambaran’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Rehefa nandre izany teny izany ilay mpanompon’i Abrahama, dia niankohoka tamin’ny tany hisaotra ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Avy eo dia namoaka firavaka volafotsy sy volamena ary fitafiana izy ka nomeny an’i Rebekà; nomeny zavatra sarobidy maro koa ny anadahiny sy ny reniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Izay vao nihinana sy nisotro ilay mpanompon’i Abrahama sy ireo olona niaraka taminy; avy teo dia lasa natory.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny ampitso maraina, rehefa nifoha izy ireo, dia hoy ilay mpanompon’i Abrahama hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Alefaso àry aho hiverina any amin’ny tompoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Fa namaly kosa ny anadahin-drazazavavy sy ny reniny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hipetraka hiaraka aminay kelikely tokony ho folo andro aloha razazavavy, vao mandeha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Fa namaly azy ireo indray ilay mpanompo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza tananareo aho, fa ny TOMPO efa nanambina ny diako; alefaso aho hiverina ho any amin’ny tompoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Hoy kosa ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka àry hantsoinay razazavavy, aoka hanontaniana izay heviny!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Dia nantsoin’ireo i Rebekà ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa handeha hiaraka amin’io lehilahy io ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy i Rebekà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, handeha aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Koa navelan’ireo handeha i Rebekà sy ny mpitaiza azy hiaraka amin’ilay mpanompon’i Abrahama sy ny olony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Nitsodrano an’i Rebekà ireo ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho tonga renin’ny olona an’alinalina anie ianao, rahavana, ary ny taranakao anie hahazo ny tanànan’izay mankahala azy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Dia niainga i Rebekà sy ireo mpanompovaviny ka nitaingin-drameva, ary lasa nandeha niaraka tamin’ilay mpanompon’i Abrahama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: I Itsehàka kosa niala tao amin’ny fantsakan’i Lahay-Roy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.62 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Ny fantsakana tao Lahay-Rôy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia jereo Gen 16.13-14.
    marker-yv: yv-n
  - type: text
    text: ', ka nonina tao amin’ny faritany atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Indray hariva raha nivoaka hitsangantsangana teny an-tsaha izy, dia nanopy maso ka nahita rameva nanatona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Rehefa nahatazana an’i Itsehàka i Rebekà, dia nidina niala tamin’ny rameva, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'ary nanontany ilay mpanompo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa io lehilahy mandeha etỳ an-tsaha avy mitsena antsika io?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ilay mpanompo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Io no tompoko.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia noraisin’i Rebekà ny voaly, ka nisaronany tarehy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Notantarain’ilay mpanompo an’i Itsehàka avokoa ny zavatra rehetra izay nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Avy eo dia nampandrosoin’i Itsehàka tao an-dain’i Sarà reniny i Rebekà, ka nalainy ho vady sy notiaviny; dia nampionona an’i Itsehàka izany taorian’ny nahafatesan-dreniny.
