    content: SALAMO Olona enjehina mitoky amin’Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hohiraina araka ny feon’ny hoe «Voromahailala gina any an-tany lavitra.» Salamo nataon’i Davida, fony izy voasambotry ny Filistinina tao Gata
  - type: note
    content: Jereo 1 Sam 21.11-16.
  - type: text
    content: .
  '10':
  - type: text
    content: Andriamanitra ô, amin’ny andro iantsoako Anao,
  - type: text
    content: dia hiamboho ireo fahavaloko ka hitsoaka;
  - type: text
    content: satria fantatro tokoa
  - type: text
    content: fa Ianao no momba ahy.
  '11':
  - type: text
    content: Deraiko Andriamanitra noho ny teniny;
  - type: text
    content: eny, deraiko Izy TOMPO noho ny teniny.
  '12':
  - type: text
    content: Izy no itokiako ka afa-tahotra aho.
  - type: text
    content: Inona no ho vitan’izay olona osa amiko?
  '13':
  - type: text
    content: 'Andriamanitra ô, nanao '
  - type: text
    content: voady
  - type: text
    content: ' taminao aho'
  - type: text
    content: 'ka hanefa '
  - type: text
    content: sorom-pisaorana
  - type: text
    content: ' ho Anao,'
  '14':
  - type: text
    content: satria narovanao tsy ho faty aho.
  - type: text
    content: Eny, Andriamanitra ô, nambenanao aho
  - type: text
    content: mba tsy ho solafa-mamindra
  - type: text
    content: ka hizotra eo anoloanao,
  - type: text
    content: anatin’ny hazavana mahavelona.
  '2':
  - type: text
    content: Iantrao aho, Andriamanitra ô, fa enjehina;
  - type: text
    content: tontolo andro aho iadiana sy ampahorîna,
  '3':
  - type: text
    content: tontolo andro enjehin’ny mpandrafy ahy,
  - type: text
    content: fa maro tokoa ireo no mirehareha miady amiko.
  '4':
  - type: text
    content: Kanefa amin’ny andro atahorako,
  - type: text
    content: Ianao, ry ilay Avo, no itokiako.
  '5':
  - type: text
    content: Deraiko Andriamanitra noho ny teniny;
  - type: text
    content: Izy no itokiako ka afa-tahotra aho.
  - type: text
    content: Inona no ho vitan’izay olona osa amiko?
  '6':
  - type: text
    content: Ny hampahory ahy no resahina tontolo andro,
  - type: text
    content: ny hanisy ratsy ahy ihany no heverin’ireo.
  '7':
  - type: text
    content: Mivorivory izy, dia miery mitsongo dia
  - type: text
    content: satria ny hahafaty ahy no kendreny.
  '8':
  - type: text
    content: Valio araka ny haratsiany izy, Andriamanitra ô,
  - type: text
    content: aripaho amin-katezerana ireo olona ireo.
  '9':
  - type: text
    content: Ny nirenireneko efa voasoratrao ho ao anaty bokinao;
  - type: text
    content: 'angony koa ny ranomasoko ho ao anaty '
  - type: text
    content: sinikelinao
