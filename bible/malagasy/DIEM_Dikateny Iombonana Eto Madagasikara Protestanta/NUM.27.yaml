document_id: NUM.27,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zon’ny vehivavy mba handova
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy ireo zanakavavin’i Tselôfehada, zanakalahin’i Hefera sy zafin’i Gilehada, ary zafiafin’i Makira sy zafindohalik’i Manase; ireo vehivavy ireo, izay avy tamin’ny fokon’i Manase zanak’i Jôsefa, dia i Mahalà sy i Nôhà, i Hôglà sy i Milkà ary i Tiritsà. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha tsy manan-drahalahy izy, dia ny rahalahin-drainy no homenareo ny lovany. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary raha tsy manan-drahalahin-dray izy, dia ny havany akaiky azy indrindra ao amin’ny tarika misy azy no homenareo ny zara taniny, ka dia izy no handova izany. Ho fomba fanao hitondrana ny Israelita izany, araka izay nandidian’ny TOMPO an’i Mosesy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voatendry handimby an’i Mosesy i Josoa
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Miakara eo an-tampon’io tendrombohitra Habarima io, ka tazano ny tany izay omeko ny Israelita. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary rehefa hitanao izany, dia ho faty tahaka an’i Aharôna rahalahinao koa ianao. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa tsy nankatò ny didiko ianareo mirahalahy tany an-taniefitr’i Tsina, raha nila ady tamiko ny fiangonana; tsy naneho ny fahamasinako teo anatrehany manko ianareo, fony nitaky rano tamiko izy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin’ny ranon’i Meribà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny ranon’i Meribà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 20.1-13. –
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 12-14:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Deot 3.23-27; 32.48-52.'
      marker-yv: yv-n
    - type: text
      text: ' tany Kadesy, tao an-taniefitr’i Tsina, no lazaina etoana.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’ny TOMPO i Mosesy hoe:'
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–TOMPO Andriamanitra ô, aoka Ianao mpanome aina ny voaary rehetra no hanendry lehilahy anankiray izay afaka hitondra ny fiangonana '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'sy hitarika azy amin’ny toe-javatra rehetra, mba tsy ho toy ny ondry tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ' ny fiangonanao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 22.17; Ezek 34.5; Mt 9.36; Mk 6.34.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO namaly an’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Alao i Josoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 24.13.
      marker-yv: yv-n
    - type: text
      text: ' zanakalahin’i Nona fa lehilahy itoeran’ny Fanahiko. Izy no hametrahanao tanana, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary hoentinao eo anatrehan’i Elehazara mpisorona sy ny fiangonana manontolo ka hotokananao handimby anao eo imason’izy ireo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niseho tamin’i Mosesy sy i Elehazara mpisorona ary ny tompon’andraikitra sy ny fiangonana manontolo teo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' izy ireo, ka nanao hoe:'
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Anomezo anjara azy ny voninahitrao mba hankatoavan’ny Israelita rehetra azy. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izy kosa hiseho eo amin’i Elehazara mpisorona, izay hangataka ho azy eo anatrehako ny tinapaky ny Orima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 28.30 sy nta.
      marker-yv: yv-n
    - type: text
      text: . Avy amin’izany no hitarihany ny Israelita rehetra, dia ny fiangonana manontolo, amin’ny toe-javatra rehetra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataon’i Mosesy araka izay efa nandidian’ny TOMPO azy izany. Dia naka an’i Josoa izy ka nentiny teo anatrehan’i Elehazara mpisorona sy ny fiangonana manontolo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nametra-tanana tamin’i Josoa i Mosesy, dia nanokana azy ho dimbiny, araka ny voalazan’ny TOMPO tamin’ny alalan’i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 34.9.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Maty tany an-taniefitra ny rainay, nefa tsy mba isan’ny tarik’i Kôra izay niara-nioko hiodina tamin’ny TOMPO; fa matin’ny fahotany ihany izy, nefa tsy nanan-janakalahy. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa rariny ve raha ho very anarana eo amin’ny tarika misy azy ny rainay, na dia tsy mba nanan-janakalahy aza? Mba omeo zaratany ho fanananay àry izahay tahaka ny natao ho an’ny ireo rahalahin-drainay!
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nentin’i Mosesy teo amin’ny TOMPO ny fitarainan’izy dimy mirahavavy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Marina ny an’ireo zanakavavin’i Tselôfehada, koa omeo zaratany ho fananany tahaka ireo rahalahin-drainy tokoa izy ka afindrao aminy ny anjaran-drainy. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary hiteny amin’ny Israelita ianao ka hanao hoe: Raha misy lehilahy maty ka tsy nanan-janakalahy, dia ny zanany vavy no hamindranareo ny zara taniny. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa raha tsy manan-janakavavy kosa izy, dia ny rahalahiny no homenareo ny zara taniny. '
