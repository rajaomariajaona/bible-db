document_id: NUM.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zon’ny vehivavy mba handova
  - type: text
    content: 'Nisy ireo zanakavavin’i Tselôfehada, zanakalahin’i Hefera sy zafin’i Gilehada, ary zafiafin’i Makira sy zafindohalik’i Manase; ireo vehivavy ireo, izay avy tamin’ny fokon’i Manase zanak’i Jôsefa, dia i Mahalà sy i Nôhà, i Hôglà sy i Milkà ary i Tiritsà. '
  '10':
  - type: text
    content: 'Raha tsy manan-drahalahy izy, dia ny rahalahin-drainy no homenareo ny lovany. '
  '11':
  - type: text
    content: Ary raha tsy manan-drahalahin-dray izy, dia ny havany akaiky azy indrindra ao amin’ny tarika misy azy no homenareo ny zara taniny, ka dia izy no handova izany. Ho fomba fanao hitondrana ny Israelita izany, araka izay nandidian’ny TOMPO an’i Mosesy.
  - type: heading
    content: Voatendry handimby an’i Mosesy i Josoa
  '12':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Miakara eo an-tampon’io tendrombohitra Habarima io, ka tazano ny tany izay omeko ny Israelita. '
  '13':
  - type: text
    content: 'Ary rehefa hitanao izany, dia ho faty tahaka an’i Aharôna rahalahinao koa ianao. '
  '14':
  - type: text
    content: Fa tsy nankatò ny didiko ianareo mirahalahy tany an-taniefitr’i Tsina, raha nila ady tamiko ny fiangonana; tsy naneho ny fahamasinako teo anatrehany manko ianareo, fony nitaky rano tamiko izy.
  - type: text
    content: Ny amin’ny ranon’i Meribà
  - type: note
    content: 'ny ranon’i Meribà: jereo 20.1-13. –And 12-14: jereo Deot 3.23-27; 32.48-52.'
  - type: text
    content: ' tany Kadesy, tao an-taniefitr’i Tsina, no lazaina etoana.'
  '15':
  - type: text
    content: 'Dia niteny tamin’ny TOMPO i Mosesy hoe:'
  '16':
  - type: text
    content: '–TOMPO Andriamanitra ô, aoka Ianao mpanome aina ny voaary rehetra no hanendry lehilahy anankiray izay afaka hitondra ny fiangonana '
  '17':
  - type: text
    content: 'sy hitarika azy amin’ny toe-javatra rehetra, mba tsy ho toy ny ondry tsy misy '
  - type: text
    content: mpiandry
  - type: text
    content: ' ny fiangonanao'
  - type: note
    content: Jereo 1 Mp 22.17; Ezek 34.5; Mt 9.36; Mk 6.34.
  - type: text
    content: .
  '18':
  - type: text
    content: 'Dia hoy ny TOMPO namaly an’i Mosesy:'
  - type: text
    content: –Alao i Josoa
  - type: note
    content: Jereo Eks 24.13.
  - type: text
    content: ' zanakalahin’i Nona fa lehilahy itoeran’ny Fanahiko. Izy no hametrahanao tanana, '
  '19':
  - type: text
    content: 'ary hoentinao eo anatrehan’i Elehazara mpisorona sy ny fiangonana manontolo ka hotokananao handimby anao eo imason’izy ireo. '
  '2':
  - type: text
    content: 'Niseho tamin’i Mosesy sy i Elehazara mpisorona ary ny tompon’andraikitra sy ny fiangonana manontolo teo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' izy ireo, ka nanao hoe:'
  '20':
  - type: text
    content: 'Anomezo anjara azy ny voninahitrao mba hankatoavan’ny Israelita rehetra azy. '
  '21':
  - type: text
    content: Izy kosa hiseho eo amin’i Elehazara mpisorona, izay hangataka ho azy eo anatrehako ny tinapaky ny Orima
  - type: note
    content: Jereo Eks 28.30 sy nta.
  - type: text
    content: . Avy amin’izany no hitarihany ny Israelita rehetra, dia ny fiangonana manontolo, amin’ny toe-javatra rehetra.
  '22':
  - type: text
    content: 'Nataon’i Mosesy araka izay efa nandidian’ny TOMPO azy izany. Dia naka an’i Josoa izy ka nentiny teo anatrehan’i Elehazara mpisorona sy ny fiangonana manontolo. '
  '23':
  - type: text
    content: Ary rehefa nametra-tanana tamin’i Josoa i Mosesy, dia nanokana azy ho dimbiny, araka ny voalazan’ny TOMPO tamin’ny alalan’i Mosesy
  - type: note
    content: Jereo Deot 34.9.
  - type: text
    content: .
  '3':
  - type: text
    content: '–Maty tany an-taniefitra ny rainay, nefa tsy mba isan’ny tarik’i Kôra izay niara-nioko hiodina tamin’ny TOMPO; fa matin’ny fahotany ihany izy, nefa tsy nanan-janakalahy. '
  '4':
  - type: text
    content: Koa rariny ve raha ho very anarana eo amin’ny tarika misy azy ny rainay, na dia tsy mba nanan-janakalahy aza? Mba omeo zaratany ho fanananay àry izahay tahaka ny natao ho an’ny ireo rahalahin-drainay!
  '5':
  - type: text
    content: 'Nentin’i Mosesy teo amin’ny TOMPO ny fitarainan’izy dimy mirahavavy. '
  '6':
  - type: text
    content: 'Ary niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '7':
  - type: text
    content: '–Marina ny an’ireo zanakavavin’i Tselôfehada, koa omeo zaratany ho fananany tahaka ireo rahalahin-drainy tokoa izy ka afindrao aminy ny anjaran-drainy. '
  '8':
  - type: text
    content: 'Ary hiteny amin’ny Israelita ianao ka hanao hoe: Raha misy lehilahy maty ka tsy nanan-janakalahy, dia ny zanany vavy no hamindranareo ny zara taniny. '
  '9':
  - type: text
    content: 'Fa raha tsy manan-janakavavy kosa izy, dia ny rahalahiny no homenareo ny zara taniny. '
