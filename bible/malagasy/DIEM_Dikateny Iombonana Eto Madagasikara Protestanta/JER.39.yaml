document_id: JER.39
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny volana fahafolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe faran’ny volana Desambra 589 tal J.K. Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
    marker-yv: yv-n
  - type: text
    text: ', taona fahasivy nanjakàn’i Tsedekià mpanjakan’i Joda, dia tonga i Nebokadnetsara mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' sy ny tafiny manontolo ka nanao fahirano ny tanànan’i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nony tamin’ny andro fahasivin’ny volana fahefatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe ny faran’ny volana Jona 587 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ' tamin’ny taona fahiraika ambin’ny folo nanjakàn’i Tsedekià dia nisy voabanga ny mandan’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nisesika niditra tao an-tanàna ireo rehetra manamboninahitry ny mpanjakan’i Babilôna ary naka toerana teo amin’ny vavahady afovoany, dia i Nergala-Saretsera lehiben’ny etamazaoro, i Samgara-Nebo, i Sarisekima lehiben’ireo tandapa, ary koa ireo manamboninahitra sisa rehetran’ny Babilôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 3b dia namboarina araka ny raki-tsoratra babilônianina; jereo koa and 13 etsy ambany.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha vao nahita izany i Tsedekià mpanjaka sy ireo rehetra miaramilany, dia nandositra. Tamin’ny alina no niala tao an-tanàna izy, ka namakivaky ny zaridainan’ny mpanjaka, izay nandalo tamin’ny vavahady eo anelanelan’ny manda roa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.4 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'varavarana teo anelanelan’ny manda roa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eo atsimo atsinanan’ny tanàna.
    marker-yv: yv-n
  - type: text
    text: ', ary nihazo ny lalana mankany amin’ny lohasahan’i Jôrdàna. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Kanjo nanenjika azy ny tafika babilônianina ka nahatratra an’i Tsedekià tao amin’ny lemak’i Jerikao. Dia nisambotra ity mpanjaka izy ary nitondra azy tany amin’i Nebokadnetsara mpanjakan’i Babilôna izay tao Riblà, tanin’i Hamata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Riblà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe any avaratr’i Libano, eo akaikin’ny sisin-tany sirianina ankehitriny. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hamata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dia mbola avy avaratra kokoa, any Siria ankehitriny.'
    marker-yv: yv-n
  - type: text
    text: ', tamin’izany fotoana izany. Tao no namoahan’i Nebokadnetsara didim-pitsarana hamelezana an’i Tsedekià. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tao koa no nampamonoany ho faty ireo zanak’i Tsedekià roa lahy teo imason-drainy sy ireo andrianan’i Joda rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avy eo dia nasainy nopotsirina voamaso i Tsedekià sady norohizany rojovy mba hoentina any Babilôna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ankoatra izany, dia nodoran’ny Babilônianina ny lapan’ny mpanjaka sy ny tranon’ny olona tao Jerosalema sady noravany ny mandan’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ny mponina sisa tao an-tanàna sy ireo olona nitolo-batana ary ny mpahay taozavatra sisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny mpahay taozavatra sisa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny Jer 52.15, na ny mponina sisa; jereo 29.2.
    marker-yv: yv-n
  - type: text
    text: ' dia nalefan’i Nebozaradàna lehiben’ny mpiambina ho sesitany tany Babilôna. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Kanefa nisy ihany ampahany tamin’ny vahoaka mahantra, dia ireo olona tsy manana na inona na inona, no navelany teo amin’ny tany sady notolorany tanimboaloboka sy tanimboly.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nafahana i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary i Nebokadnetsara mpanjakan’i Babilôna nanome baiko an’i Nebozaradàna lehiben’ny mpiambina ny amin’i Jeremià ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Ndeha alaovy izy, ary tandremo tsara mba tsy hisy hanisy ratsy azy, fa ataovy izay angatahany aminao!» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary i Nebozaradàna lehiben’ny mpiambina nifanaraka tamin’i Nebosazbàny izay lehilahy tena mahatoky ny mpanjaka sy i Nergala-Saretsera lehiben’ny etamazaoro sy ny manamboninahitra sisa rehetran’ny mpanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ka nampaniraka haka an’i Jeremià tao an-kianjan’ny trano fiambenana, dia nanolotra azy teo an-tanan’i Gedalià, zanakalahin’i Ahikama sady zafikelin’i Safàna. Ary i Gadalià kosa dia hamela an’i Jeremià hody any aminy. Dia niaina teo anivon’ny vahoaka i Jeremià.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’i Hebeda-Melèka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa fony mbola voatana tao an-kianjan’ny trano fiambenana i Jeremià, dia nisy kosa tenin’ny TOMPO taminy nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Mandehàna lazao amin’i Hebeda-Melèka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba an’i '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hebeda-Melèka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo 38.7-13.'
    marker-yv: yv-n
  - type: text
    text: ' etiôpianina hoe: ‹Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Indro efa nambarako tamin’ny mponin’ity tanàna ity ny loza fa tsy ny soa. Noho izany dia hotanterahiko izay nolazaiko ary ho tsapanao tsy ho ela izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa amin’ny andro izay hahatongavan’izany loza izany, hoy ny teny hentitra avy amiko TOMPO, dia hafahako ianao, ka tsy hatolotro eo an-tanan’ireo olona atahoranao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Havotako tokoa ianao mba tsy ho faty an’ady, ka ho voavonjy ny ainao, satria natoky Ahy ianao. Teny hentitra avy amiko TOMPO izany.› »
