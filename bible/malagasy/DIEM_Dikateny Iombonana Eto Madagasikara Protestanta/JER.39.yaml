document_id: JER.39,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tamin’ny volana fahafolo
  - type: note
    content: Izany hoe faran’ny volana Desambra 589 tal J.K. Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
  - type: text
    content: ', taona fahasivy nanjakàn’i Tsedekià mpanjakan’i Joda, dia tonga i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' sy ny tafiny manontolo ka nanao fahirano ny tanànan’i Jerosalema. '
  '10':
  - type: text
    content: Kanefa nisy ihany ampahany tamin’ny vahoaka mahantra, dia ireo olona tsy manana na inona na inona, no navelany teo amin’ny tany sady notolorany tanimboaloboka sy tanimboly.
  - type: heading
    content: Nafahana i Jeremià
  '11':
  - type: text
    content: 'Ary i Nebokadnetsara mpanjakan’i Babilôna nanome baiko an’i Nebozaradàna lehiben’ny mpiambina ny amin’i Jeremià ka nanao hoe: '
  '12':
  - type: text
    content: '«Ndeha alaovy izy, ary tandremo tsara mba tsy hisy hanisy ratsy azy, fa ataovy izay angatahany aminao!» '
  '13':
  - type: text
    content: 'Ary i Nebozaradàna lehiben’ny mpiambina nifanaraka tamin’i Nebosazbàny izay lehilahy tena mahatoky ny mpanjaka sy i Nergala-Saretsera lehiben’ny etamazaoro sy ny manamboninahitra sisa rehetran’ny mpanjaka, '
  '14':
  - type: text
    content: ka nampaniraka haka an’i Jeremià tao an-kianjan’ny trano fiambenana, dia nanolotra azy teo an-tanan’i Gedalià, zanakalahin’i Ahikama sady zafikelin’i Safàna. Ary i Gadalià kosa dia hamela an’i Jeremià hody any aminy. Dia niaina teo anivon’ny vahoaka i Jeremià.
  - type: heading
    content: Hafatra ho an’i Hebeda-Melèka
  '15':
  - type: text
    content: 'Fa fony mbola voatana tao an-kianjan’ny trano fiambenana i Jeremià, dia nisy kosa tenin’ny TOMPO taminy nanao hoe: '
  '16':
  - type: text
    content: «Mandehàna lazao amin’i Hebeda-Melèka
  - type: note
    content: Momba an’i Hebeda-Melèka, jereo 38.7-13.
  - type: text
    content: ' etiôpianina hoe: ‹Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Indro efa nambarako tamin’ny mponin’ity tanàna ity ny loza fa tsy ny soa. Noho izany dia hotanterahiko izay nolazaiko ary ho tsapanao tsy ho ela izany. '
  '17':
  - type: text
    content: 'Nefa amin’ny andro izay hahatongavan’izany loza izany, hoy ny teny hentitra avy amiko TOMPO, dia hafahako ianao, ka tsy hatolotro eo an-tanan’ireo olona atahoranao. '
  '18':
  - type: text
    content: Havotako tokoa ianao mba tsy ho faty an’ady, ka ho voavonjy ny ainao, satria natoky Ahy ianao. Teny hentitra avy amiko TOMPO izany.› »
  '2':
  - type: text
    content: Nony tamin’ny andro fahasivin’ny volana fahefatra
  - type: note
    content: Izany hoe ny faran’ny volana Jona 587 tal J.K.
  - type: text
    content: ' tamin’ny taona fahiraika ambin’ny folo nanjakàn’i Tsedekià dia nisy voabanga ny mandan’ny tanàna. '
  '3':
  - type: text
    content: Nisesika niditra tao an-tanàna ireo rehetra manamboninahitry ny mpanjakan’i Babilôna ary naka toerana teo amin’ny vavahady afovoany, dia i Nergala-Saretsera lehiben’ny etamazaoro, i Samgara-Nebo, i Sarisekima lehiben’ireo tandapa, ary koa ireo manamboninahitra sisa rehetran’ny Babilôna
  - type: note
    content: Ny and 3b dia namboarina araka ny raki-tsoratra babilônianina; jereo koa and 13 etsy ambany.
  - type: text
    content: .
  '4':
  - type: text
    content: Raha vao nahita izany i Tsedekià mpanjaka sy ireo rehetra miaramilany, dia nandositra. Tamin’ny alina no niala tao an-tanàna izy, ka namakivaky ny zaridainan’ny mpanjaka, izay nandalo tamin’ny vavahady eo anelanelan’ny manda roa
  - type: note
    content: 'varavarana teo anelanelan’ny manda roa: eo atsimo atsinanan’ny tanàna.'
  - type: text
    content: ', ary nihazo ny lalana mankany amin’ny lohasahan’i Jôrdàna. '
  '5':
  - type: text
    content: Kanjo nanenjika azy ny tafika babilônianina ka nahatratra an’i Tsedekià tao amin’ny lemak’i Jerikao. Dia nisambotra ity mpanjaka izy ary nitondra azy tany amin’i Nebokadnetsara mpanjakan’i Babilôna izay tao Riblà, tanin’i Hamata
  - type: note
    content: 'Riblà: tanàn-dehibe any avaratr’i Libano, eo akaikin’ny sisin-tany sirianina ankehitriny. –Hamata, dia mbola avy avaratra kokoa, any Siria ankehitriny.'
  - type: text
    content: ', tamin’izany fotoana izany. Tao no namoahan’i Nebokadnetsara didim-pitsarana hamelezana an’i Tsedekià. '
  '6':
  - type: text
    content: 'Tao koa no nampamonoany ho faty ireo zanak’i Tsedekià roa lahy teo imason-drainy sy ireo andrianan’i Joda rehetra. '
  '7':
  - type: text
    content: Avy eo dia nasainy nopotsirina voamaso i Tsedekià sady norohizany rojovy mba hoentina any Babilôna.
  '8':
  - type: text
    content: 'Ankoatra izany, dia nodoran’ny Babilônianina ny lapan’ny mpanjaka sy ny tranon’ny olona tao Jerosalema sady noravany ny mandan’ny tanàna. '
  '9':
  - type: text
    content: Ary ny mponina sisa tao an-tanàna sy ireo olona nitolo-batana ary ny mpahay taozavatra sisa
  - type: note
    content: 'Ny mpahay taozavatra sisa: araka ny Jer 52.15, na ny mponina sisa; jereo 29.2.'
  - type: text
    content: ' dia nalefan’i Nebozaradàna lehiben’ny mpiambina ho sesitany tany Babilôna. '
