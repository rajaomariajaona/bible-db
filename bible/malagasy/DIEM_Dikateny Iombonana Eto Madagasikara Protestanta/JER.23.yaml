  - type: text
    text: 'Koa izao no lazain’ny TOMPO Andriamanitr’i Israely ny amin’ireo mpiandry ratsy ireo: «Navelanareo hihahaka sy naparitakareo ny ondriko fa tsy nokarakarainareo. Koa indro Aho hirotsaka an-tsehatra hamely anareo noho ny asa ratsinareo! Teny hentitra avy amiko TOMPO izany.'
