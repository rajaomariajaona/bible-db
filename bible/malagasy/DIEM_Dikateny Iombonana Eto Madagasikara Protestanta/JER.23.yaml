document_id: JER.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo mpitondra ratsy sy ny mpanjaka mpamonjy
  - type: text
    content: '«Lozanareo mpitarika ny vahoakako, hoy ny teny hentitry ny TOMPO, fa '
  - type: text
    content: mpiandry
  - type: text
    content: ' ratsy mamela ny andian’ondry ho reraka sy hihahaka ianareo.» '
  '10':
  - type: text
    content: «Feno olona mijangajanga
  - type: note
    content: 'mijangajanga: jereo and 14; 29.23 sy nta 2.20; 3.8.'
  - type: text
    content: ' ny tany.'
  - type: text
    content: Mirohotra amin’ny faharatsiana izy
  - type: text
    content: ary feno fahasahiana hanao tsy rariny.
  - type: text
    content: Noho izany, misaona ny tany
  - type: text
    content: ary tonga maina ny kijàna.
  '11':
  - type: text
    content: Ny mpaminany ama-mpisorona
  - type: text
    content: dia samy fangoloka avokoa.
  - type: text
    content: Na dia hatrany an-tranoko aza
  - type: text
    content: dia ahitako ny faharatsiany,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO izany.
  '12':
  - type: text
    content: Noho izany, dia hanjary malama ny lalany.
  - type: text
    content: Hifandona anaty haizina izy ka hianjera,
  - type: text
    content: fa hataoko tonga aminy ny loza
  - type: text
    content: amin’ny taona hirotsahako hamely azy.
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.»
  - type: heading
    content: Ratsy noho ny mpaminanin’i Samaria
  '13':
  - type: text
    content: '«Tao amin’ny '
  - type: text
    content: mpaminanin
  - type: text
    content: ’i Samaria
  - type: note
    content: Samaria, renivohitry ny fanjakan’i Israely avaratra, fa azon’ny Asirianina tokony ho zato taona talohan’i Jeremià.
  - type: text
    content: 'no nahitako zavatra maharikoriko:'
  - type: text
    content: 'naminany tamin’ny anaran’i '
  - type: text
    content: Bahala
  - type: text
    content: ' izy'
  - type: text
    content: ary nampivaona ny Israelita vahoakako.
  '14':
  - type: text
    content: Fa tao amin’ny mpaminanin’i Jerosalema
  - type: text
    content: 'dia nahitako zavatra mahatsiravina:'
  - type: text
    content: sady mijangajanga izy
  - type: text
    content: no mivelona amin’ny lainga.
  - type: text
    content: Mampirisika ny mpanao ratsy izy
  - type: text
    content: hany ka misakana ny tsirairay
  - type: text
    content: hiala amin’ny faharatsiany.
  - type: text
    content: Izy rehetra amiko dia tonga
  - type: text
    content: tahaka ny olon’i Sôdôma;
  - type: text
    content: ary ny mponin’i Jerosalema
  - type: text
    content: dia sahala amin’ny an’i Gômôra
  - type: note
    content: 'fijangajangana: jereo and 10; 29.23 sy nta momba ny 2.20; 3.8. –I Sôdôma sy i Gômôra: jereo Gen 18.20-21; 19.1-9. Ampit Is 1.10; Ezek 16.49.'
  - type: text
    content: .»
  '15':
  - type: text
    content: Noho izany, ny TOMPOn’izao rehetra izao
  - type: text
    content: 'dia milaza ny amin’ireo mpaminany hoe:'
  - type: text
    content: «Hofahanako zava-mangidy izy
  - type: text
    content: ary hampisotroiko rano voapoizina,
  - type: text
    content: satria ny mpaminanin’i Jerosalema
  - type: text
    content: no ipoiran’ny faharatsiana rehetra
  - type: text
    content: izay mifindra amin’ny tany manontolo.»
  - type: heading
    content: Mpaminany mandainga
  '16':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Aza henoinareo ny teny
  - type: text
    content: 'izay ampitain’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' ireo;'
  - type: text
    content: fa mamitaka anareo fotsiny izy.
  - type: text
    content: Ny fanambaràna izay lazainy aminareo
  - type: text
    content: dia avy amin’ny eritreriny ihany
  - type: text
    content: fa tsy avy amin’ny vavako.
  '17':
  - type: text
    content: Ny olona maniratsira ny teniko
  - type: text
    content: 'dia sahiny ilazana hoe:'
  - type: text
    content: ‹Hisy fiadanana ho anareo›.
  - type: text
    content: Mikiribiby amin’ny ditram-pony
  - type: text
    content: 'dia anambaràny hoe:'
  - type: text
    content: ‹Tsy hahatratra antsika ny loza.›
  '18':
  - type: text
    content: Iza moa no efa nanatrika
  - type: text
    content: tao amin’ny filankevitro, hoy Izaho TOMPO?
  - type: text
    content: Iza no nahita sy nandre izay nolazaiko tao?
  - type: text
    content: Ary iza no naharay sy nahatakatra ny teniko?»
  - type: heading
    content: (Jeremià)
  '19':
  - type: text
    content: Indro tamy ny rambon-danitra,
  - type: text
    content: dia ny fahatezeran’ny TOMPO.
  - type: text
    content: Toy ny rivo-doza mitambolimbolina
  - type: text
    content: no fiantontany eny an-dohan’ny olon-dratsy.
  '2':
  - type: text
    content: 'Koa izao no lazain’ny TOMPO Andriamanitr’i Israely ny amin’ireo mpiandry ratsy ireo: «Navelanareo hihahaka sy naparitakareo ny ondriko fa tsy nokarakarainareo. Koa indro Aho hirotsaka an-tsehatra hamely anareo noho ny asa ratsinareo! Teny hentitra avy amiko TOMPO izany.'
  '20':
  - type: text
    content: Tsy hitsahatra mirehitra
  - type: text
    content: ny fahatezeran’ny TOMPO,
  - type: text
    content: raha tsy efa nahatontosa sy nahatanteraka
  - type: text
    content: izay fandaharan-javatra notapahiny.
  - type: text
    content: Amin’ny andro any aoriana any
  - type: text
    content: vao tena ho takatrareo izany
  - type: note
    content: 'And 19-20: jereo 30.23-24.'
  - type: text
    content: .
  - type: heading
    content: (Ny Tompo)
  '21':
  - type: text
    content: Tsy naniraka ireo mpaminany ireo Aho,
  - type: text
    content: kanefa nidodododo ihany izy, hoy ny Tompo.
  - type: text
    content: Tsy nilaza taminy na inona na inona Aho
  - type: text
    content: kanefa nanao fanambaràna ihany izy.
  '22':
  - type: text
    content: Raha nanatrika ny filankevitro izy,
  - type: text
    content: dia ho afa-nampita ny teniko tamin’ny vahoakako
  - type: text
    content: ka ho nitarika azy hiala amin’ny lalan-dratsiny
  - type: text
    content: sy amin’ny zava-mamohehatra fanaony.
  - type: heading
    content: Manatrika eran’izao rehetra izao ny Tompo
  '23':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: «Moa Andriamanitra tsy mahita
  - type: text
    content: afa-tsy ny akaiky ihany va Aho?
  - type: text
    content: Tsia, fa mahita ny lavitra koa Aho.
  '24':
  - type: text
    content: Raha misy olona miery ao anaty fiafenana,
  - type: text
    content: dia tsy ho hitako ve izy?
  - type: text
    content: Fanontaniana hentitra avy amiko TOMPO izany.
  - type: text
    content: Tsy manerana ny lanitra sy ny tany ve Aho?
  - type: text
    content: Fanontaniana hentitra avy amiko TOMPO izany.
  - type: heading
    content: Aza afangaro ny vary sy ny mololo
  '25':
  - type: text
    content: 'Izaho Tompo efa nandre izay nolazain’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' mihambo miteny amin’ny anarako kanefa milaza lainga manao hoe: «Nanonofy aho, eny, nanonofy aho.» '
  '26':
  - type: text
    content: 'Mandra-pahoviana no ho toy izany? Fa inona no ao an-tsain’ireny mpaminany ireny, rehefa milaza lainga izy na milaza hevi-dravina ihany? '
  '27':
  - type: text
    content: 'Nony mifampitantara nofy izy, dia tsy mikendry afa-tsy ny hanadinoan’ny vahoakako Ahy, tahaka ny nanadinoan’ny razany Ahy ka nanompoany an’i '
  - type: text
    content: Bahala
  - type: text
    content: '. '
  '28':
  - type: text
    content: Raha misy mpaminany manonofy, dia aoka izy hilaza ny nofiny! Fa raha mitondra hafatra avy amiko izy, dia aoka hanambara marina ny teniko!
  - type: text
    content: Aoka tsy hafangaro ny mololo sy ny vary
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  '29':
  - type: text
    content: ny teniko dia toy ny afo mandoro,
  - type: text
    content: ary toy ny kanonta manorotoro vatolampy,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  '3':
  - type: text
    content: '«Koa Izaho ihany no hanangona ireo andian’ondry sisa velona avy any amin’ny tany rehetra izay nanapariahako azy. Haveriko ao amin’ny saha firaofany izy ka hitombo sy hihamaro. '
  '30':
  - type: text
    content: 'Noho izany, hoy ny teny hentitra avy amiko TOMPO, dia indro Aho hamely ireo mpaminany izay mifangalatra ny hafatro ireo. '
  '31':
  - type: text
    content: 'Eny, hoy ny teny hentitra avy amiko TOMPO, indro Aho hamely ny mpaminany izay nampifangaro ny teniny amin’ny teniko. '
  '32':
  - type: text
    content: Indro Aho hamely ny mpaminany mihambo ho mahita fahitana, hoy ny teny hentitra ambarako. Fa rehefa mitantara izany izy, dia mampivily ny vahoakako amin’ny lainga sy habobo ampitainy. Izaho anefa tsy naniraka azy na nanome baiko azy. Tsy mahasoa ny vahoakako akory izy, hoy ny teny hentitra ambarako.
  - type: heading
    content: Moa enta-mavesatra ve ny tenin’ny Tompo?
  '33':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Jeremià:'
  - type: text
    content: '–Raha misy '
  - type: text
    content: mpaminany
  - type: text
    content: ' na '
  - type: text
    content: mpisorona
  - type: text
    content: ' na olona hafa manontany anao hoe: «Inona no hafatry ny TOMPO, inona no enta-mavesatra anereny antsika?», dia hovalianao hoe: «Ianareo no enta-mavesatra; noho izany, dia hariako ianareo, hoy ny teny hentitry ny TOMPO.» '
  '34':
  - type: text
    content: 'Raha misy mpaminany na mpisorona na olon-kafa miresaka ny hoe «enta-mavesatra aneren’ny TOMPO», dia hirotsaka an-tsehatra hamely izany olona izany sy ny ankohonany Aho. '
  '35':
  - type: text
    content: 'Izay tokony hifanontanianareo dia ny hoe: «Inona no navalin’ny TOMPO?» na «Inona no voalazan’ny TOMPO?» '
  '36':
  - type: text
    content: 'Ary ny hoe «enta-mavesatra aneren’ny TOMPO» dia tsy tokony hotononinareo intsony. Fa moa enta-mavesatra ho an’ny olona tokoa ve ny tenin’Andriamanitra? Tsia, fa raha izany dia avadikareo ny tenin’Andriamanitra velona, dia ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely. '
  '37':
  - type: text
    content: 'Eny, izay tokony hanontanianareo ny mpaminany dia ny hoe: «Inona no navalin’ny TOMPO anao, inona no voalazan’ny TOMPO taminao?» '
  '38':
  - type: text
    content: 'Fa raha mbola teneninareo ihany ny hoe «enta-mavesatra aneren’ny TOMPO», na dia efa nandrarako anareo aza, '
  '39':
  - type: text
    content: 'dia hataoko toy ny enta-mavesatra eo an-tsoroko ianareo, ka hariako ny tenanareo sy ity tanàna izay nomeko anareo sy ny razanareo ity. '
  '4':
  - type: text
    content: Hanendry mpiandry mahafatra-po ho azy Aho, ka tsy hanan-tahotra na horohoro intsony izy, ary tsy hisy ho banga amin’ny fiantsoana. Izany no teny hentitra avy amiko TOMPO.»
  '40':
  - type: text
    content: Hatolotro ho amin’ny henatra sy ny fahafaham-baràka tsy hohadinoina mandrakizay ianareo.
  '5':
  - type: text
    content: «Indro avy ny andro izay hanapoirako
  - type: text
    content: taranaka marina ho an’i Davida
  - type: note
    content: Ampit Jer 33.14-16.
  - type: text
    content: .
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.
  - type: text
    content: Mpanjaka hanjaka am-pahendrena izy,
  - type: text
    content: ka dia ny rariny sy ny hitsiny
  - type: text
    content: no hampihariny eo amin’ny tany.
  '6':
  - type: text
    content: Amin’ny andro hanjakany
  - type: text
    content: no hamonjena an’i Joda
  - type: text
    content: sy hiainan’i Israely am-pilaminana.
  - type: text
    content: 'Izao no anarana hiantsoana azy:'
  - type: text
    content: ‹Ny TOMPO no Fahamarinantsika
  - type: note
    content: Ny fiteny ampiasaina eto dia mampahatsiaro ny anaran’ny mpanjaka Tsedekià; fiteny ampiharina amin’i Jerosalema koa izy io ao amin’ny 33.16.
  - type: text
    content: .›
  '7':
  - type: text
    content: '«Eny, hoy ny teny hentitra avy amiko TOMPO, avy ny andro izay tsy hanaovam-pianianana intsony hoe ‹Velona ny TOMPO Izay nampakatra ny Israelita hiala avy any Ejipta, ka mianiana aho...›, '
  '8':
  - type: text
    content: 'fa hatao hoe: ‹Velona ny TOMPO Izay nampakatra ny taranaka israelita avy any amin’ny tany avaratra sy ny faritany rehetra nanapariahany azy mba honina indray eo amin’ny tanindrazany, ka mianiana aho'
  - type: note
    content: 'And 7-8: jereo 16.14-15.'
  - type: text
    content: '...› »'
  - type: heading
    content: Mpaminany tsy mendrika
  '9':
  - type: text
    content: 'Ny amin’ireo '
  - type: text
    content: mpaminany
  - type: note
    content: Ny fiandohan’ny and 9 dia miendrika lohateny ho an’ny 23.9-40, izay antsoina indraindray hoe bokikely momba ny mpaminany.
  - type: text
    content: .
  - type: text
    content: Torotoro ny foko ato anatiko,
  - type: text
    content: mangovitra ny tenako manontolo.
  - type: text
    content: Toy ny olona mamo sy lehilahy leon-divay aho
  - type: text
    content: noho ny TOMPO ary noho ny teny masina
  - type: text
    content: 'izay voalazany tamiko hoe:'
