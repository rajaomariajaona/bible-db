- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy ny teny hentitry ny TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Moa Andriamanitra tsy mahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ny akaiky ihany va Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa mahita ny lavitra koa Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha misy olona miery ao anaty fiafenana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho hitako ve izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanontaniana hentitra avy amiko TOMPO izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manerana ny lanitra sy ny tany ve Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanontaniana hentitra avy amiko TOMPO izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aza afangaro ny vary sy ny mololo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izaho Tompo efa nandre izay nolazain’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' mihambo miteny amin’ny anarako kanefa milaza lainga manao hoe: «Nanonofy aho, eny, nanonofy aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mandra-pahoviana no ho toy izany? Fa inona no ao an-tsain’ireny mpaminany ireny, rehefa milaza lainga izy na milaza hevi-dravina ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nony mifampitantara nofy izy, dia tsy mikendry afa-tsy ny hanadinoan’ny vahoakako Ahy, tahaka ny nanadinoan’ny razany Ahy ka nanompoany an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha misy mpaminany manonofy, dia aoka izy hilaza ny nofiny! Fa raha mitondra hafatra avy amiko izy, dia aoka hanambara marina ny teniko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hafangaro ny mololo sy ny vary
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitra avy amiko TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ny teniko dia toy ny afo mandoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny kanonta manorotoro vatolampy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitra avy amiko TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Noho izany, hoy ny teny hentitra avy amiko TOMPO, dia indro Aho hamely ireo mpaminany izay mifangalatra ny hafatro ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Eny, hoy ny teny hentitra avy amiko TOMPO, indro Aho hamely ny mpaminany izay nampifangaro ny teniny amin’ny teniko. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Indro Aho hamely ny mpaminany mihambo ho mahita fahitana, hoy ny teny hentitra ambarako. Fa rehefa mitantara izany izy, dia mampivily ny vahoakako amin’ny lainga sy habobo ampitainy. Izaho anefa tsy naniraka azy na nanome baiko azy. Tsy mahasoa ny vahoakako akory izy, hoy ny teny hentitra ambarako.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moa enta-mavesatra ve ny tenin’ny Tompo?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary hoy ny TOMPO tamin’i Jeremià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' na olona hafa manontany anao hoe: «Inona no hafatry ny TOMPO, inona no enta-mavesatra anereny antsika?», dia hovalianao hoe: «Ianareo no enta-mavesatra; noho izany, dia hariako ianareo, hoy ny teny hentitry ny TOMPO.» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Raha misy mpaminany na mpisorona na olon-kafa miresaka ny hoe «enta-mavesatra aneren’ny TOMPO», dia hirotsaka an-tsehatra hamely izany olona izany sy ny ankohonany Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izay tokony hifanontanianareo dia ny hoe: «Inona no navalin’ny TOMPO?» na «Inona no voalazan’ny TOMPO?» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny hoe «enta-mavesatra aneren’ny TOMPO» dia tsy tokony hotononinareo intsony. Fa moa enta-mavesatra ho an’ny olona tokoa ve ny tenin’Andriamanitra? Tsia, fa raha izany dia avadikareo ny tenin’Andriamanitra velona, dia ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Eny, izay tokony hanontanianareo ny mpaminany dia ny hoe: «Inona no navalin’ny TOMPO anao, inona no voalazan’ny TOMPO taminao?» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa raha mbola teneninareo ihany ny hoe «enta-mavesatra aneren’ny TOMPO», na dia efa nandrarako anareo aza, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'dia hataoko toy ny enta-mavesatra eo an-tsoroko ianareo, ka hariako ny tenanareo sy ity tanàna izay nomeko anareo sy ny razanareo ity. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Hatolotro ho amin’ny henatra sy ny fahafaham-baràka tsy hohadinoina mandrakizay ianareo.
