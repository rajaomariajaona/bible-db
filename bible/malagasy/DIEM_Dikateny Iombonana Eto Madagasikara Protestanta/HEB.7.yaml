document_id: HEB.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpisorona sady mpanjaka i Melkitsedeka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Io Melkitsedeka io dia mpanjakan’i Salema ary mpisoron’ilay Andriamanitra avo indrindra. Fony i Abrahama niverina avy nandresy mpanjaka maro, dia i Melkitsedeka no nitsena azy sy nitsodrano azy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na dia tsy mbola nateraka akory aza i Levỳ tamin’izay, dia efa tao amin’io razambeny io ihany raha nitsena an’i Abrahama i Melkitsedeka.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Foto-javatra tamin’ny lalàna nomena ny vahoaka Israely ny fisoronan’i Levỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Foto-javatra... fisoronan’i Levỳ: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ny vahoaka Israely dia nomena lalàna momba ny fisoronan’i Levỳ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mifamatotra amin’ny lalàna nomena ny vahoaka Israely ny fisoronan’i Levỳ.
      marker-yv: yv-n
    - type: text
      text: '. Koa raha nahatratra ny fanaperana tokoa ny fisoronan’i Levỳ, dia ho tsy nilaina intsony ny hisehoana Mpisorona anankiray hafa indray, dia Mpisorona araka ny fomban’i Melkitsedeka fa tsy tendrena araka ny fomban’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aharôna
    - type: text
      text: '; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria raha ovàna ny fisoronana, dia tsy maintsy misy koa fiovàn-dalàna. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka ny Tompontsika, Izay iantefan’izany teny izany, dia hafa foko; ary tsy misy avy tamin’ny fokony mba nanao raharaha teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' fisoronana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, fantatra mazava tsara fa avy amin’ny fokon’i Joda no nipoiran’ny Tompontsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 1.1-2; Lk 3.33.
      marker-yv: yv-n
    - type: text
      text: ; ary izany foko izany, rehefa niteny momba ny mpisorona i Mosesy, dia tsy mba voatonony velively.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mpisorona hafa mitovy amin’i Melkitsedeka
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao indray no vao mainka mampazava kokoa izany fiovàn-javatra izany: nisy Mpisorona hafa niseho, izay mitovy amin’i Melkitsedeka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' amam-pitsipika araka ny fomban’olombelona no nahatonga Azy ho Mpisorona, fa herim-piainana tsy manam-pahataperana; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria izy no ijoroana ho vavolombelona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao no Mpisorona mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny fomban’i Melkitsedeka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 110.4.
      marker-yv: yv-n
    - type: text
      text: .»
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izany no nahafoana ny didy taloha, noho izy nalemy sady tsy nahasoa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lalànan’i Mosesy dia tsy nahatafita na inona na inona amin’ny fanaperana; fa naiditra kosa ny fanantenana tsara lavitra, izay ahazoantsika manatona an’Andriamanitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Abrahama kosa nanome an’i Melkitsedeka ny ampahafolon’izay nananany rehetra. Ny hoe Melkitsedeka aloha dia midika ho «mpanjaka tia rariny»; ary izy koa dia mpanjakan’i Salema, izany hoe «Mpanjaka mitondra fiadanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 1-2:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 14.17-20. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Salema:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 14.18 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao rahateo koa ilay fianianana nataon’Andriamanitra. Ireo mpisorona hafa dia tsy nombàm-pianianana no tonga mpisorona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Jesoa nombàm-pianianana no tonga Mpisorona, fony Andriamanitra nilaza taminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Efa nianiana ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka tsy hivadi-bolana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Ianao no Mpisorona mandrakizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 110.4.
      marker-yv: yv-n
    - type: text
      text: .› »
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no mahatonga an’i Jesoa ho antoky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanekempihavanana
    - type: text
      text: ' tsara lavitra.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao koa no fahasamihafana hita: marobe ireo mpisorona hafa, satria tsy navelan’ny fahafatesana haharitra; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa maharitra mandrakizay kosa i Jesoa ka tsy ifandimbiasana ny fisoronany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, dia mahavonjy tanteraka ireo manatona an’Andriamanitra amin’ny alalany Izy, satria velona mandrakizay mba hangataka amin’Andriamanitra ho azy ireo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpisorombe
    - type: text
      text: ' natao ho antsika tokoa i Jesoa: masina, tsy misy faharatsiana na fahotana ao aminy, voasaraka tamin’ny mpanota ka nasandratra avo noho ny lanitra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy mba tahaka ireo mpisorombe hafa Izy, ka tsy mila hanolotra sorona isan’andro ho fanalana ny fahotan’ny tenany aloha, vao ny an’ny vahoaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 5.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. Indray mandeha monja no nanoloran’i Jesoa sorona, dia tamin’ny nanolorany ny tenany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Olona zoim-pahalemena no voatendrin’ny lalànan’i Mosesy ho mpisorombe; fa ny teny ombàm-pianianana, izay notononin’Andriamanitra tatỳ aorian’ny lalàna, no nanendry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanany
    - type: text
      text: ' ho Mpisorombe, dia ilay Zanany efa tonga amin’ny fanaperana mandrakizay.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy misy izay ahafantarana ny rain’i Melkitsedeka, na ny reniny, na izay tantaran-drazany ary tsy voalaza ny andro niandohany na ny fiafaran’ny fiainany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny Gen 14 dia tsy milaza ny amin’ny ray aman-drenin’i Melkitsedeka, na ny fahaterahany, na ny fahafatesany.
      marker-yv: yv-n
    - type: text
      text: '; fa dia mitovy amin’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Andriamanitra
    - type: text
      text: ' izy, ka mitoetra ho mpisorona mandrakizay.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hevero ny fahalehibiazan’i Melkitsedeka! Fa i Abrahama razambentsika dia nanome azy ny ampahafolon-kareny avy amin’ireo zavatra tsara indrindra azony babo tany amin’ny ady. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo mpisorona avy amin’ny taranak’i Levỳ no mahazo didy, araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ', handray ny ampahafolon-karena amin’ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 18.21.
      marker-yv: yv-n
    - type: text
      text: ', izany hoe amin’ny mpiray firenena aminy, izay terak’i Abrahama ihany koa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mba taranak’i Levỳ i Melkitsedeka; nefa nandray ny ampahafolon-karen’i Abrahama izy ary dia nitsodrano an’ilay nahazo ny fampanantenàn’Andriamanitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka tsy azo lavina fa izay mitsodrano dia lehibe noho ilay mandray tsodrano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Levỳ, izay mandray ny ampahafolon-karena, dia olon-ko faty ihany; fa i Melkitsedeka kosa dia ambaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' fa velona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azo lazaina aza fa, fony i Abrahama nandoa ny ampahafolon-kareny, dia anisan’ny nandoa koa i Levỳ izay rain’ny mpandray ampahafolon-karena. '
