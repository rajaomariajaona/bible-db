document_id: HEB.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mpisorona sady mpanjaka i Melkitsedeka
  - type: text
    content: 'Io Melkitsedeka io dia mpanjakan’i Salema ary mpisoron’ilay Andriamanitra avo indrindra. Fony i Abrahama niverina avy nandresy mpanjaka maro, dia i Melkitsedeka no nitsena azy sy nitsodrano azy; '
  '10':
  - type: text
    content: Fa na dia tsy mbola nateraka akory aza i Levỳ tamin’izay, dia efa tao amin’io razambeny io ihany raha nitsena an’i Abrahama i Melkitsedeka.
  '11':
  - type: text
    content: Foto-javatra tamin’ny lalàna nomena ny vahoaka Israely ny fisoronan’i Levỳ
  - type: note
    content: 'Foto-javatra... fisoronan’i Levỳ: dkt hafa Ny vahoaka Israely dia nomena lalàna momba ny fisoronan’i Levỳ na hoe mifamatotra amin’ny lalàna nomena ny vahoaka Israely ny fisoronan’i Levỳ.'
  - type: text
    content: '. Koa raha nahatratra ny fanaperana tokoa ny fisoronan’i Levỳ, dia ho tsy nilaina intsony ny hisehoana Mpisorona anankiray hafa indray, dia Mpisorona araka ny fomban’i Melkitsedeka fa tsy tendrena araka ny fomban’i '
  - type: text
    content: Aharôna
  - type: text
    content: '; '
  '12':
  - type: text
    content: 'satria raha ovàna ny fisoronana, dia tsy maintsy misy koa fiovàn-dalàna. '
  '13':
  - type: text
    content: 'Ka ny Tompontsika, Izay iantefan’izany teny izany, dia hafa foko; ary tsy misy avy tamin’ny fokony mba nanao raharaha teo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana. '
  '14':
  - type: text
    content: Eny, fantatra mazava tsara fa avy amin’ny fokon’i Joda no nipoiran’ny Tompontsika
  - type: note
    content: Jereo Mt 1.1-2; Lk 3.33.
  - type: text
    content: ; ary izany foko izany, rehefa niteny momba ny mpisorona i Mosesy, dia tsy mba voatonony velively.
  - type: heading
    content: Mpisorona hafa mitovy amin’i Melkitsedeka
  '15':
  - type: text
    content: 'Ary izao indray no vao mainka mampazava kokoa izany fiovàn-javatra izany: nisy Mpisorona hafa niseho, izay mitovy amin’i Melkitsedeka. '
  '16':
  - type: text
    content: 'Tsy '
  - type: text
    content: lalàna
  - type: text
    content: ' amam-pitsipika araka ny fomban’olombelona no nahatonga Azy ho Mpisorona, fa herim-piainana tsy manam-pahataperana; '
  '17':
  - type: text
    content: 'satria izy no ijoroana ho vavolombelona hoe:'
  - type: text
    content: «Ianao no Mpisorona mandrakizay
  - type: text
    content: araka ny fomban’i Melkitsedeka
  - type: note
    content: Sal 110.4.
  - type: text
    content: .»
  '18':
  - type: text
    content: 'Koa izany no nahafoana ny didy taloha, noho izy nalemy sady tsy nahasoa. '
  '19':
  - type: text
    content: Ny lalànan’i Mosesy dia tsy nahatafita na inona na inona amin’ny fanaperana; fa naiditra kosa ny fanantenana tsara lavitra, izay ahazoantsika manatona an’Andriamanitra.
  '2':
  - type: text
    content: i Abrahama kosa nanome an’i Melkitsedeka ny ampahafolon’izay nananany rehetra. Ny hoe Melkitsedeka aloha dia midika ho «mpanjaka tia rariny»; ary izy koa dia mpanjakan’i Salema, izany hoe «Mpanjaka mitondra fiadanana
  - type: note
    content: 'And 1-2: jereo Gen 14.17-20. –Salema: jereo Gen 14.18 sy nta.'
  - type: text
    content: '.» '
  '20':
  - type: text
    content: 'Tao rahateo koa ilay fianianana nataon’Andriamanitra. Ireo mpisorona hafa dia tsy nombàm-pianianana no tonga mpisorona. '
  '21':
  - type: text
    content: 'Fa i Jesoa nombàm-pianianana no tonga Mpisorona, fony Andriamanitra nilaza taminy hoe:'
  - type: text
    content: «Efa nianiana ny Tompo
  - type: text
    content: 'ka tsy hivadi-bolana:'
  - type: text
    content: ‹Ianao no Mpisorona mandrakizay
  - type: note
    content: Sal 110.4.
  - type: text
    content: .› »
  '22':
  - type: text
    content: 'Izany no mahatonga an’i Jesoa ho antoky ny '
  - type: text
    content: Fanekempihavanana
  - type: text
    content: ' tsara lavitra.'
  '23':
  - type: text
    content: 'Izao koa no fahasamihafana hita: marobe ireo mpisorona hafa, satria tsy navelan’ny fahafatesana haharitra; '
  '24':
  - type: text
    content: 'fa maharitra mandrakizay kosa i Jesoa ka tsy ifandimbiasana ny fisoronany. '
  '25':
  - type: text
    content: 'Noho izany, dia mahavonjy tanteraka ireo manatona an’Andriamanitra amin’ny alalany Izy, satria velona mandrakizay mba hangataka amin’Andriamanitra ho azy ireo. '
  '26':
  - type: text
    content: 'Eny, '
  - type: text
    content: Mpisorombe
  - type: text
    content: ' natao ho antsika tokoa i Jesoa: masina, tsy misy faharatsiana na fahotana ao aminy, voasaraka tamin’ny mpanota ka nasandratra avo noho ny lanitra. '
  '27':
  - type: text
    content: Tsy mba tahaka ireo mpisorombe hafa Izy, ka tsy mila hanolotra sorona isan’andro ho fanalana ny fahotan’ny tenany aloha, vao ny an’ny vahoaka
  - type: note
    content: Ampit 5.3 sy nta.
  - type: text
    content: '. Indray mandeha monja no nanoloran’i Jesoa sorona, dia tamin’ny nanolorany ny tenany. '
  '28':
  - type: text
    content: 'Olona zoim-pahalemena no voatendrin’ny lalànan’i Mosesy ho mpisorombe; fa ny teny ombàm-pianianana, izay notononin’Andriamanitra tatỳ aorian’ny lalàna, no nanendry ny '
  - type: text
    content: Zanany
  - type: text
    content: ' ho Mpisorombe, dia ilay Zanany efa tonga amin’ny fanaperana mandrakizay.'
  '3':
  - type: text
    content: Tsy misy izay ahafantarana ny rain’i Melkitsedeka, na ny reniny, na izay tantaran-drazany ary tsy voalaza ny andro niandohany na ny fiafaran’ny fiainany
  - type: note
    content: Ny Gen 14 dia tsy milaza ny amin’ny ray aman-drenin’i Melkitsedeka, na ny fahaterahany, na ny fahafatesany.
  - type: text
    content: '; fa dia mitovy amin’ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' izy, ka mitoetra ho mpisorona mandrakizay.'
  '4':
  - type: text
    content: 'Hevero ny fahalehibiazan’i Melkitsedeka! Fa i Abrahama razambentsika dia nanome azy ny ampahafolon-kareny avy amin’ireo zavatra tsara indrindra azony babo tany amin’ny ady. '
  '5':
  - type: text
    content: 'Ireo mpisorona avy amin’ny taranak’i Levỳ no mahazo didy, araka ny '
  - type: text
    content: lalàna
  - type: text
    content: ', handray ny ampahafolon-karena amin’ny vahoaka '
  - type: text
    content: Israely
  - type: note
    content: Jereo Nom 18.21.
  - type: text
    content: ', izany hoe amin’ny mpiray firenena aminy, izay terak’i Abrahama ihany koa. '
  '6':
  - type: text
    content: 'Tsy mba taranak’i Levỳ i Melkitsedeka; nefa nandray ny ampahafolon-karen’i Abrahama izy ary dia nitsodrano an’ilay nahazo ny fampanantenàn’Andriamanitra. '
  '7':
  - type: text
    content: 'Ka tsy azo lavina fa izay mitsodrano dia lehibe noho ilay mandray tsodrano. '
  '8':
  - type: text
    content: 'Ny taranak’i Levỳ, izay mandray ny ampahafolon-karena, dia olon-ko faty ihany; fa i Melkitsedeka kosa dia ambaran’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' fa velona. '
  '9':
  - type: text
    content: 'Azo lazaina aza fa, fony i Abrahama nandoa ny ampahafolon-kareny, dia anisan’ny nandoa koa i Levỳ izay rain’ny mpandray ampahafolon-karena. '
