verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kristianina tsy mba jiosy fiaviana i Tito (Gal 2.1-3). Isan’ireo mpiara-dia tamin’i Paoly izy ary nanefa adidy lehibe tamin’ny fampihavanana ny Kôrintianina tamin’i Paoly apôstôly (2 Kôr 7.6-16). Tany Kreta izy tamin’ny fotoana nandefasana ny taratasy ho azy, nasain’i Paoly nanara-maso ny asa sy fandaminam-piangonana tao amin’io nosy io (1.5).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ny anombohan’i Paoly apôstôly ny taratasy dia famintinana ny hafatra torîny (1.1-4). Ny tohiny sisa amin’ny toko voalohany dia itanisana ireo toetra takîna amin’ny kristianina mpiandraikitra Fiangonana (1.5-16). Ao amin’ny toko 2 no ahazoan’i Tito torohevitra momba ny sokajin’olona samihafa ifampiraharahany ao amin’ny Fiangonana: ny lahiantitra, ny vehivavy zokiolona (izay tokony hampianatra koa ny vehivavy mbola tanora), ny lehilahy tanora, ny mpanompo (2.1-15). Ny toko 3 dia mampahatsiaro ny adidin’ny kristianina, mitaky mafy aminy koa hahay miara-monina araka ny fihavanana sy manalavitra ny fitsitokotokoana (3.1-11), ary dia mifarana amin’ny hafatrafatra manokana sy ny fanaovam-beloma (3.12-15).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ho hitan’ny mpamaky mora foana fa ny hafatra raketin’ity taratasy ity dia tsy natao ho an’i Tito sy ho an’ny asany fotsiny (toy izany koa no azo lazaina momba ireo taratasy anankiroa ho an’i Timôty); satria ireo zava-manahirankirana voatonona ao dia isan’izay mpahazo ny Fiangonana: ohatra, ny fandaminana ny Fiangonana eo amin’ny faritra iray sy ny fitondrantenan’ny mpiandraikitra mbamin’ny kristianina izay ao anatiny.'
