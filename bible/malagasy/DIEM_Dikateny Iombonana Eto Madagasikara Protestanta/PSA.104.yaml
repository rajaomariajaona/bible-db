document_id: PSA.104,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Fiderana an’Andriamanitra mpamorona
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hisaotra ny TOMPO aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO Andriamanitro ô, lehibe indrindra Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fiandrianana sy famirapiratana no itafianao,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampiboika loharano eny an-dohasaha Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampikoriana azy anelanelan-tendrombohitra
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hisotroan’ny bibidia rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hialan’ny borikidia hetaheta.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny hazo eny amoron-drano eny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no manao akany ny voro-manidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mikarantsana anaty ravin-kazo.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any an-danitra fonenanao any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no andefasanao orana amin’ny tendrombohitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia ny ranon’ny lanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampahavokatra ny tany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampaniry ny ahitra ho an’ny biby fiompy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampaniry ny zavatra volen’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary mampamokatra hanina ny tany:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia divay hampifaly ny fon’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy menaka hahamiramirana ny endriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mofo hanome tohan’aina azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voky rano koa ireo hazo vaventy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny sedera voavoly any Libano.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny no manao akany ny voronkely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny ambony kipresy no manao trano ny vano.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra avo dia ho an’ny osidia;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny harambato kosa fierena ho an’ny sokina.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataonao hamantaram-potoana ny volana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny masoandro izay mahalala ny hilentehany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahazavana no lamba ifonosanao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamelatra ny lanitra ho toa tranolay Ianao
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arosonao ny haizina, dia tonga ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hihetsiketsehan’ny biby rehetra ao an’ala.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Manerona ny liona tanora manenjika ny hazany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitaky sakafo aminao Andriamanitra izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nony miposaka ny masoandro, dia midify ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka lasa misitrika any an-davany any.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona kosa mivoaka hanao ny raharahany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hiasa mandra-paharivan’ny andro.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey ity hamaroan’ny asanao, TOMPO ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tamim-pahendrena no nanaovanao azy rehetra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: henika ny zava-boaarinao ny tany!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ranomasina, indro lehibe sy midadasika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao no miriaria tsy tambo isaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny biby madinika na ny vaventy;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao no mivezivezy ny sambo; ao koa i Leviatàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay trozona namboarinao ho tsilalaonao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy rehetra ireny dia miankina aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanome hanina azy ara-potoana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manome Ianao, dia mandray izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha sokafanao ny tananao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia voky zava-tsoa izy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha lavinao ny hijery azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mitebiteby izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha alainao ny ainy, dia maty izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miverina ho vovoka indray.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nametraka rihana hataonao fonenana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any ankoatran’ny rano ambony any.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataonao kalesy ny rahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisosanao amin’ny elatry ny rivotra;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alefanao ny Fanahinao, dia ary indray ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mihavao ny zavatra rehetra eto ambonin’ny tany.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'TOMPO ô, ho mandrakizay anie ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka Ianao hifaly amin’ny asa vitanao!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa jerenao ny tany, dia mihorohoro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tendrenao ny tendrombohitra, dia midona-tsetroka.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO Andriamanitro ô, hohiraiko Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandritra ny fiainako manontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hankalazaiko amin-tsalamo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mbola velona aina koa aho.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, ho sitrakao anie ny tononkaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa noho ny aminao no ifaliako!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fongotra amin’ny tany kosa anie ny mpanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy intsony ny olon-dratsy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, aoka hisaotra ny TOMPO aho!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloià
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nataonao haingam-pandeha toy ny rivotra ny anjelinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nataonao mirehidrehitra toy ny tselatra ny mpanomponao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: And tsiahivin’ny Heb 1.7 araka ny dkt tranainy grika.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanorina ny tany teo ambony fanorenany Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hihetsehany mandrakizay mandrakizay.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ranobe tamin’izay no toa lamba narakotrao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandifotra ny tampon-tendrombohitra aza.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa, noho ny fandrahonanao, dia nandositra ny rano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny feon’ny kotrokoranao, dia nirifatra ireny
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nihoarany ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nidinany ny lohasaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hankanesany any amin’ny toerana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay efa naraikitrao ho azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanisy faritra tsy azony hihoarana Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hiverenany hanarona ny tany intsony.
