document_id: PSA.104,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fiderana an’Andriamanitra mpamorona
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Aoka hisaotra ny TOMPO aho!
  - type: text
    content: TOMPO Andriamanitro ô, lehibe indrindra Ianao;
  - type: text
    content: fiandrianana sy famirapiratana no itafianao,
  '10':
  - type: text
    content: Nampiboika loharano eny an-dohasaha Ianao,
  - type: text
    content: ka nampikoriana azy anelanelan-tendrombohitra
  '11':
  - type: text
    content: mba hisotroan’ny bibidia rehetra
  - type: text
    content: sy hialan’ny borikidia hetaheta.
  '12':
  - type: text
    content: Amin’ny hazo eny amoron-drano eny
  - type: text
    content: no manao akany ny voro-manidina
  - type: text
    content: izay mikarantsana anaty ravin-kazo.
  '13':
  - type: text
    content: Avy any an-danitra fonenanao any
  - type: text
    content: no andefasanao orana amin’ny tendrombohitra;
  - type: text
    content: ka dia ny ranon’ny lanitrao
  - type: text
    content: no mampahavokatra ny tany.
  '14':
  - type: text
    content: Mampaniry ny ahitra ho an’ny biby fiompy Ianao
  - type: text
    content: sy mampaniry ny zavatra volen’ny olona,
  - type: text
    content: 'ary mampamokatra hanina ny tany:'
  '15':
  - type: text
    content: dia divay hampifaly ny fon’ny olona,
  - type: text
    content: sy menaka hahamiramirana ny endriny
  - type: text
    content: ary mofo hanome tohan’aina azy.
  '16':
  - type: text
    content: Voky rano koa ireo hazo vaventy,
  - type: text
    content: dia ny sedera voavoly any Libano.
  '17':
  - type: text
    content: Eny no manao akany ny voronkely;
  - type: text
    content: eny ambony kipresy no manao trano ny vano.
  '18':
  - type: text
    content: Ny tendrombohitra avo dia ho an’ny osidia;
  - type: text
    content: ny harambato kosa fierena ho an’ny sokina.
  '19':
  - type: text
    content: Nataonao hamantaram-potoana ny volana
  - type: text
    content: sy ny masoandro izay mahalala ny hilentehany.
  '2':
  - type: text
    content: fahazavana no lamba ifonosanao.
  - type: text
    content: Mamelatra ny lanitra ho toa tranolay Ianao
  '20':
  - type: text
    content: Arosonao ny haizina, dia tonga ny alina
  - type: text
    content: izay hihetsiketsehan’ny biby rehetra ao an’ala.
  '21':
  - type: text
    content: 'Manerona ny liona tanora manenjika ny hazany:'
  - type: text
    content: mitaky sakafo aminao Andriamanitra izy.
  '22':
  - type: text
    content: Nony miposaka ny masoandro, dia midify ireny
  - type: text
    content: ka lasa misitrika any an-davany any.
  '23':
  - type: text
    content: Ny olona kosa mivoaka hanao ny raharahany
  - type: text
    content: sy hiasa mandra-paharivan’ny andro.
  '24':
  - type: text
    content: Endrey ity hamaroan’ny asanao, TOMPO ô!
  - type: text
    content: 'Tamim-pahendrena no nanaovanao azy rehetra:'
  - type: text
    content: henika ny zava-boaarinao ny tany!
  '25':
  - type: text
    content: Ny ranomasina, indro lehibe sy midadasika;
  - type: text
    content: ao no miriaria tsy tambo isaina
  - type: text
    content: na ny biby madinika na ny vaventy;
  '26':
  - type: text
    content: ao no mivezivezy ny sambo; ao koa i Leviatàna,
  - type: text
    content: ilay trozona namboarinao ho tsilalaonao.
  '27':
  - type: text
    content: Izy rehetra ireny dia miankina aminao,
  - type: text
    content: mba hanome hanina azy ara-potoana.
  '28':
  - type: text
    content: Raha manome Ianao, dia mandray izy;
  - type: text
    content: raha sokafanao ny tananao,
  - type: text
    content: dia voky zava-tsoa izy.
  '29':
  - type: text
    content: Raha lavinao ny hijery azy,
  - type: text
    content: dia mitebiteby izy;
  - type: text
    content: raha alainao ny ainy, dia maty izy
  - type: text
    content: ka miverina ho vovoka indray.
  '3':
  - type: text
    content: ary nametraka rihana hataonao fonenana
  - type: text
    content: any ankoatran’ny rano ambony any.
  - type: text
    content: Nataonao kalesy ny rahona
  - type: text
    content: hisosanao amin’ny elatry ny rivotra;
  '30':
  - type: text
    content: Alefanao ny Fanahinao, dia ary indray ireo
  - type: text
    content: ka mihavao ny zavatra rehetra eto ambonin’ny tany.
  '31':
  - type: text
    content: 'TOMPO ô, ho mandrakizay anie ny '
  - type: text
    content: voninahitrao
  - type: text
    content: ary aoka Ianao hifaly amin’ny asa vitanao!
  '32':
  - type: text
    content: Fa jerenao ny tany, dia mihorohoro;
  - type: text
    content: tendrenao ny tendrombohitra, dia midona-tsetroka.
  '33':
  - type: text
    content: TOMPO Andriamanitro ô, hohiraiko Ianao
  - type: text
    content: mandritra ny fiainako manontolo
  - type: text
    content: ary hankalazaiko amin-tsalamo
  - type: text
    content: raha mbola velona aina koa aho.
  '34':
  - type: text
    content: TOMPO ô, ho sitrakao anie ny tononkaloko
  - type: text
    content: fa noho ny aminao no ifaliako!
  '35':
  - type: text
    content: Ho fongotra amin’ny tany kosa anie ny mpanota,
  - type: text
    content: ary tsy hisy intsony ny olon-dratsy!
  - type: text
    content: Eny, aoka hisaotra ny TOMPO aho!
  - type: text
    content: Haleloià
  - type: text
    content: .
  '4':
  - type: text
    content: nataonao haingam-pandeha toy ny rivotra ny anjelinao,
  - type: text
    content: nataonao mirehidrehitra toy ny tselatra ny mpanomponao
  - type: note
    content: And tsiahivin’ny Heb 1.7 araka ny dkt tranainy grika.
  - type: text
    content: .
  '5':
  - type: text
    content: Nanorina ny tany teo ambony fanorenany Ianao
  - type: text
    content: mba tsy hihetsehany mandrakizay mandrakizay.
  '6':
  - type: text
    content: Ny ranobe tamin’izay no toa lamba narakotrao azy
  - type: text
    content: ka nandifotra ny tampon-tendrombohitra aza.
  '7':
  - type: text
    content: Kanefa, noho ny fandrahonanao, dia nandositra ny rano;
  - type: text
    content: noho ny feon’ny kotrokoranao, dia nirifatra ireny
  '8':
  - type: text
    content: ka nihoarany ny tendrombohitra
  - type: text
    content: ary nidinany ny lohasaha
  - type: text
    content: mba hankanesany any amin’ny toerana
  - type: text
    content: izay efa naraikitrao ho azy.
  '9':
  - type: text
    content: Nanisy faritra tsy azony hihoarana Ianao
  - type: text
    content: mba tsy hiverenany hanarona ny tany intsony.
