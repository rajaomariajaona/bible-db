    - type: text
      text: Hoderaina anie ny TOMPO! Fa niantso Azy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia voavonjy ho afaka amin’ny fahavaloko.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omenao hery hoenti-miady tokoa aho,
  - type: usfm
    marker: q1
