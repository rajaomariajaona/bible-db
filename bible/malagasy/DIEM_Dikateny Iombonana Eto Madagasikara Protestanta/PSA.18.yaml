    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tao amin’ny tahirin-kiran’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: filohan’antoko-mpihira
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hira nataon’i Davida mpanompon’ny TOMPO. Notononiny hanomezam-boninahitra ny TOMPO ireto teny ireto fony izy nafahany tamin’ny fahavalony rehetra, indrindra tamin’i Saoly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: TOMPO ô, tiako Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao no heriko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny TOMPO no harambato
- type: usfm
  marker: q1
  children:
  - type: text
    text: fierena azo antoka ho ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no Andriamanitro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy vatolampy ialofako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampinga fiarovana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mpamonjy mahery ho ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hoderaina anie ny TOMPO! Fa niantso Azy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voavonjy ho afaka amin’ny fahavaloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny fatotra mangeja ahy ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nampitahotra ahy toa riaka mandrava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: toy ny fatotra ahodidina ahy ny fonenan’ny maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toa harato amandrihana ahy ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tao an-katerena aho no velon-taraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy niantso vonjy tamin’ny TOMPO Andriamanitro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tany an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tempoliny
  - type: text
    text: ' Izy no nandre ny feoko'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa nihaino izany antsoantsoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tamin’izay dia nihovitrovitra mafy ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nikorosy ny fanambanin’ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nihozongozona ireny fa tezitra ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nisy setroka nidonaka avy teo an’orony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary afo mandevona avy teo am-bavany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka narahina tselatra mandoro izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nampiondrika ny lanitra ny Tompo ka nidina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rahona matevina no teo ambany tongony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka toy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' nitaingenany izany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanidina sy nisosa Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahevahevan’ireo elatry ny rivotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tao anaty raho-mainty Izy no niafina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voahodidina rahona matevina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ngalingaly toa rano lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manoloana Azy nisy hazavam-be
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa rahona nandalo nifanesy
- type: usfm
  marker: q1
  children:
  - type: text
    text: niteraka havandra sy afo mitselatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tany an-danitra ny TOMPO Avo Indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nampitalakotroka ny varatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nampanakoako izany feony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: nalefany ny tselatra ka nipariaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny zana-tsipîka nifanaretsaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Noho ny fandrahonan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fifofofofon’ny fahatezerany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Noho ny... fahatezerany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 22.16.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia niseho ny fanambanin’ny ranomasimbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: niharihary ny fanorenan’izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Avy eny an-danitra ambony Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no naninji-tanana handray ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nisintona ahy hiala tamin-dranobe;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ka afaka aho tamin’ny fahavaloko matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tamin’ireo mpandrafy mahery noho izaho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tamin’ny androm-pahoriako no nanafika ahy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tonga ny TOMPO ka nanohana ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: navoakany ho eo an-kalalahana aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nafahany satria tena tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Soa no ataon’ny TOMPO amiko satria marina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no avaliny ahy satria madio ny toetrako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: fa voatandriko ny làlan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ivadihako ilay Andriamanitro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ankatoaviko avokoa ny fitsipiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba ialako ireo didiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa tsy manan-tsiny aminy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nitandrin-tena tsy ho diso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Eny, soa tokoa no navalin’ny TOMPO ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria marina aho sy hitany madio toetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tompo ô, mahatoky Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay matoky Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy manan-tsiny koa Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay tsy manan-tsiny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Madio Ianao amin’izay madio,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miolakolaka kosa amin’izay mpiolikolika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ianao mihitsy no mamonjy ny vahoaka ory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mampitanondrika an’ireo mpiavonavona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: TOMPO Andriamanitro ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jiro mirehitra ho ahy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manazava izany haiziko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Noho Ianao Andriamanitro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hady aza itsambikinako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na manda aza ihoarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mpitarika tonga lafatra Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: azo antoka ny torohevitra omen’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny ampinga fiarovana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’izay rehetra mialoka aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa iza moa no Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ny TOMPO ihany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no vatolampy ho anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ilay Andriamanitray?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izy no manome hery ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mampahomby izay ataoko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ataony kinga toy ny gazela aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ajorony amin’ny toerana avo
  - type: usfm
    marker: f
    children:
