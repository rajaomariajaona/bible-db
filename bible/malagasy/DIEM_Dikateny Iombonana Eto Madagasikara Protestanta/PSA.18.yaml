  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Izy no manofana ahy ho havanana amin’ny ady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ahaizako manenjana tsipîka varahina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ny tananao ankavanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no manohana ahy, Tompo ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny ampingako Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miaro sy mamonjy ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamaly ny antsoko Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa manandratra ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
