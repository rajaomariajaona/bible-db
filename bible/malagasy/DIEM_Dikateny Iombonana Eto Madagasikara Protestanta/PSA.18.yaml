- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Omenao hery hoenti-miady tokoa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka adabokao ho ambaniko ny mpamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ataonao mandositra ahy ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aringako ireo mpankahala ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Miantsoantso izy fa tsy misy mamonjy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny TOMPO no antsoiny fa tsy mamaly azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Kosehiko toa vovoka entin-drivotra ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoseko toy ny fotaka eny an-dalam-be
  - type: usfm
    marker: f
    children:
