      text: no naninji-tanana handray ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nisintona ahy hiala tamin-dranobe;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afaka aho tamin’ny fahavaloko matanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tamin’ireo mpandrafy mahery noho izaho.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny androm-pahoriako no nanafika ahy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tonga ny TOMPO ka nanohana ahy;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, tiako Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no heriko!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: navoakany ho eo an-kalalahana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nafahany satria tena tiany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soa no ataon’ny TOMPO amiko satria marina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no avaliny ahy satria madio ny toetrako,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa voatandriko ny làlan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ivadihako ilay Andriamanitro;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ankatoaviko avokoa ny fitsipiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba ialako ireo didiny.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy manan-tsiny aminy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nitandrin-tena tsy ho diso.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, soa tokoa no navalin’ny TOMPO ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria marina aho sy hitany madio toetra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, mahatoky Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay matoky Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy manan-tsiny koa Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay tsy manan-tsiny;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Madio Ianao amin’izay madio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miolakolaka kosa amin’izay mpiolikolika.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao mihitsy no mamonjy ny vahoaka ory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mampitanondrika an’ireo mpiavonavona.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO Andriamanitro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jiro mirehitra ho ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manazava izany haiziko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no harambato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fierena azo antoka ho ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no Andriamanitro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy vatolampy ialofako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampinga fiarovana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mpamonjy mahery ho ahy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho Ianao Andriamanitro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hady aza itsambikinako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na manda aza ihoarako.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpitarika tonga lafatra Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: azo antoka ny torohevitra omen’ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny ampinga fiarovana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izay rehetra mialoka aminy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza moa no Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afa-tsy ny TOMPO ihany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no vatolampy ho anay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afa-tsy ilay Andriamanitray?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no manome hery ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampahomby izay ataoko;
