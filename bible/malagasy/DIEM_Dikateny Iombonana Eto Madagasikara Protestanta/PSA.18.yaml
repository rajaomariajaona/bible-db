  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ataonao faingam-pandeha kokoa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny hato-tongotro tsy hangozohozo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Manenji-pahavalo aho ka mahatratra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy miverina raha tsy efa ringako izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Montsaniko ireo ka tsy tafarina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary dia mitsitra ambany tongotro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.39 '
    - type: usfm
