  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Afahanao amin’ny vahoaka mpikomy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary apetrakao ho filohan’ireo firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka olona tsy fantatro akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: no indreo manjary manompo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Teny kely no ataoko, dia ekeny aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vahiny no tonga mila sitraka amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Mikoy izy ireo ka mangovitra
- type: usfm
  marker: q1
  children:
