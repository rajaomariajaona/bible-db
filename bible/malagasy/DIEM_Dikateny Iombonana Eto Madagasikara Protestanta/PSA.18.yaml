    - type: text
      text: ka olona tsy fantatro akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no indreo manjary manompo ahy.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny kely no ataoko, dia ekeny aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vahiny no tonga mila sitraka amiko.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikoy izy ireo ka mangovitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no miala ny manda fiarovany.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Velona ny TOMPO! Isaorana ny Vatolampiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hasandratra anie Andriamanitra mpamonjiko!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no manao ny famaliana ho ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampanaiky firenena hofeheziko.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, afahanao amin’ny fahavaloko aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ataonao resiko ireo mpamely ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahazo ahy ny mpanao an-keriny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fatotra mangeja ahy ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nampitahotra ahy toa riaka mandrava;
