document_id: 2KI.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Manase mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 33.1-10, 18-20)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Feno 12 taona i Manase fony izy tonga mpanjaka; ary naharitra 55 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Hefitsibà. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa ny TOMPO dia nampiteny an’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' mpanompony hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '«Satria nahavita izao fanompoan-tsampy maharikoriko izao i Manase mpanjakan’i Joda ka nanao ratsy mihoatra noho ny nataon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' teo alohany sady nampanota ny Jodeanina tamin’ny sampiny, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dia izao kosa no lazain’ny TOMPO Andriamanitr’i Israely: Hitondra loza amin’i Jerosalema sy amin’ny Jodeanina Aho ka hampangintsina ny sofin’izay rehetra mandre izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Horavako tahaka ny nandravako an’i Samaria sy ny fianakavian’i Ahaba i Jerosalema. Hodioviko toy ny fanadio lovia izay faohina sy ahohoka i Jerosalema ka tsy hisy mponina intsony ao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hafoiko ny sisa tavela amin’ny vahoakako ka hatolotro amin’ny fahavalony rehetra mba hosamboriny sy hobaboiny, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: satria efa nanao izay ratsy eo imasoko izy ka nampahatezitra Ahy hatramin’ny andro nialan’ny razany tany Ejipta ka mandraka androany.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Marobe ny olona tsy manantsiny nampamonoin’i Manase ho faty ka nanerana an’i Jerosalema manontolo ny rany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ity fiandohan’ny and 16 ity dia angamba mampahatsiahy koa ny sorona olombelona nataon’i Manase (jereo and 6).
      marker-yv: yv-n
    - type: text
      text: ; izany moa dia ankoatra ny fahotana nitarihany an’ireo Jodeanina tamin’ny nanaovany izay ratsy eo imason’ny TOMPO.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Manase ary koa ny zavatra hafa rehetra nataony ary ny fahotana vitany dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Joda.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany i Manase, dia nalevina tao an-jaridainan’ny lapa na koa «Zaridainan’i Hozà»; ary i Amôna zanany lahy no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Amôna mpanjakan’i Joda
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Feno 22 taona i Amôna fony tonga mpanjaka; ary naharitra roa taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Mesolemeta zanakavavin’i Harotsa avy any Jôtvà. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nanao izay ratsy eo imason’ny TOMPO izy fa naka tahaka ny fanompoan-tsampy maharikoriko fanaon’ireo firenena izay noroahin’ny TOMPO teo anoloan’ny Israelita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 15.4.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nanao izay ratsy eo imason’ny TOMPO tahaka an’i Manase rainy i Amôna. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Narahiny avokoa ny toetran-drainy fa nanompo ireo sampy izay notompoin-drainy izy sady niankohoka teo anatrehany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nandao ny TOMPO Andriamanitry ny razany izy fa tsy nanaraka ny sori-dalan’ny TOMPO.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nikomy tamin’i Amôna ireo manamboninahiny ka namono azy ho faty tao an-dapany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fa mba nataon’ny mponin’i Joda maty kosa izay rehetra nikomy tamin’ny mpanjaka; ka dia i Josià zanany lahy no voatendriny ho mpanjaka handimby azy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Amôna ary koa ny zavatra hafa nataony dia voasoratra ao amin’ny Boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Joda.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia nalevina tao amin’ny fasany tao an-jaridainan’i Hozà izy; ary i Jôsià zanany lahy no nanjaka handimby azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Naorin’i Manase indray manko ny toeram-panasinana izay efa noravan’i Hezekià rainy; ka nanangana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' ho an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: ' izy sady nanao tsatokazo fanajana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserà
    - type: text
      text: ' tahaka izay nataon’i Ahaba mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 16.31-33.
      marker-yv: yv-n
    - type: text
      text: '; dia niankohofany sy nanaovany fanompoam-pivavahana koa ireo planeta aman-kintana eny ana habakabaka. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nanorenany alitara hafa aza tao an-tranon’ny TOMPO, dia tao amin’ilay nolazain’ny TOMPO hoe: «I Jerosalema no hampitoerako ny voninahitro». '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tao anatin’ny kianja roa amin’ny tranon’ny TOMPO tokoa no nanorenany alitara hafa ho fanajana ireo planeta aman-kintana eny ana habakabaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary na ny zanany lahy aza dia natolony ho sorony dorana; ankoatra izany dia mbola nanandro sady nisikidy ary naka hevitra tamin’ny olona tsindrian-javatra sy mpanao fitokavana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.3 sy nta; Deot 18.10-11.
      marker-yv: yv-n
    - type: text
      text: ' koa izy. Nahery nanao izay ratsy eo imason’ny TOMPO izy, ka nampahatezitra Azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny sarivongan’ny andriamani-bavy Aserà, izay nampanamboariny, dia napetrany tao amin’ny tempoly izay efa nolazain’ny TOMPO tamin’i Davida sy i Salômôna zanany hoe: «Ato amin’ity tempoly ity sy eto Jerosalema izay tanàna nofidiko tamin’ny foko israelita rehetra ity no hampitoerako mandrakizay ny voninahitro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa tsy hampirenireny ny Israelita hiala amin’ny tany izay nomeko ny razany intsony Aho, raha imasoany hotanterahina ny didiko rehetra sy ny lalàna manontolo izay nandidian’i Mosesy mpanompoko azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 7-8 dia tsy tonon-tsiahy momba ny rijan-teny iray ao amin’ny Testamenta Taloha, fa maka kosa ny vontoatin’ny andalan-teny toy ny 2 Sam 7.8-16 (2 Tan 6.4-11); 1 Mp 2.2-4.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Kanefa tsy nihaino izany ny Jodeanina, fa vao mainka aza notaomin’i Manase hanao ratsy mihoatra noho ny hafa firenena izay naringan’ny TOMPO tsy ho eo anoloan’ny Israelita.
