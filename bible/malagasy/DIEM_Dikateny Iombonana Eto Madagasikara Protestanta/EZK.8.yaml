document_id: EZK.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanompoan-tsampy ao amin’ny tempolin’Andriamanitra
  - type: text
    content: 'Tamin’ny taona fahenina taorian’ny fahababoana, nony andro fahadimin’ny volana fahenina, dia nipetraka tao an-tranoko aho ary nipetraka manoloana ahy ireo '
  - type: text
    content: loholon
  - type: text
    content: ’i Joda
  - type: note
    content: 'Ny taona fahenina: izany hoe ny taona 592-591 tal J.K., jereo 2.1 sy nta. –ny mipetraka manoloana olona no fanao rehefa te haka hevitra aminy. –ireo loholon’i Joda: dia ireo loholona isan’ny tany am-pahababoana avy amin’ny fanjakàn’i Joda.'
  - type: text
    content: '. Teo no voatsindrin’ny herin’ny Tompo ANDRIANANAHARY aho. '
  '10':
  - type: text
    content: 'Dia niditra aho ary izao no hitako: rakotry ny sary mampiseho ireo biby mandady sy biby hafa mahatsiravina rehetra ny rindrina manodidina ahy, ary hita teo avokoa ny sampin’i Israely. '
  '11':
  - type: text
    content: 'Nitsangana teo anoloan’ireo sary ireo ny loholona fitopolo lahy tamin’ny vahoakan’i Israely, ka isan’ireny i Jazanià zanakalahin’i Safàna. Samy nitana lovia fandoroana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' teny an-tanany avy izy ary nidonaka ny setrok’izany'
  - type: note
    content: 'Roa sosona ny fahadisoana nataon’ireo loholon’i Israely: sady niankohoka tamin’ny sary izy (jereo Deot 4.16-18) no nanao ny tsy tokony hataony tamin’ny fandorana zava-manitra mifangaro izay raharahan’ny mpisorona irery ihany (jereo Nom 16).'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Dia nanontany ahy Andriamanitra hoe: «Ry ilay taranak’olombelona, hitanao tsara ve izao izay ataon’ny loholon’i Israely ao amin’ny miafina, fa samy manana toerana voatokana ho an’ny sampiny avy izy? Nefa manamarin-tena izy ka manao hoe: ‹Tsy mahita anay ny TOMPO fa efa nandao ny taninay Izy›. » '
  '13':
  - type: text
    content: 'Ary hoy koa Andriamanitra hoe: «Mbola hahita fomba ratsy hafa maharikoriko fanaony koa ianao.»'
  '14':
  - type: text
    content: Dia nentin’ny TOMPO aho hankeo anoloan’ny vavahadin’ny tranony, izay mitodika mianavaratra. Nisy vehivavy maro nipetraka teo, ary nitomany ny fahafatesan’i Tamoza
  - type: note
    content: 'Tamoza: andriamanitry ny Mezôpôtamianina, izay nankalazaina isan-taona isaky ny fahavaratra ny fahafatesany.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Koa nanontany ahy Andriamanitra hoe: «Hitanao tsara ve izao, ry ilay taranak’olombelona? Mbola hahita fomba maharikoriko goavana kokoa noho izao aza ianao.»'
  '16':
  - type: text
    content: 'Dia nentin’ny TOMPO aho hankao an-kianja anatiny amin’ny tranony. Manoloana ny varavaran’ny Toeramasina, dia nisy tokony ho 25 lahy teo anelanelan’ny Toeramasina sy ny alitara fisoronana. Niamboho ny Toeramasina ireo ary nitodika miantsinanana ka niankohoka mba hivavaka amin’ny masoandro. '
  '17':
  - type: text
    content: 'Dia nanontany ahy indray Andriamanitra hoe: «Hitanao tsara ve izao, ry ilay taranak’olombelona? Nefa tsy afa-po amin’izao fomba maharikoriko ataony izao izy fa mbola fenoiny herisetra koa ny tany, ka manao izay mampahasosotra Ahy lalandava izy. Jereo izy izao fa mampakatra rantsan-kazo eo amin’ny orony. '
  '18':
  - type: text
    content: Ary Izaho kosa dia hamely azy amin’ny fahatezerako; tsy ho antra fijery azy Aho ary tsy hamindrafo aminy. Ka na dia hikiakiaka hiantso vonjy amiko aza izy, dia tsy hohenoiko.»
  '2':
  - type: text
    content: Hitako nisy toa miendrika olona
  - type: note
    content: 'miendrika olona: araka ny dkt grika tranainy izany; ny RM kosa manao hoe toa hoatry ny afo.'
  - type: text
    content: ' no fijery azy. Tahaka ny afo ny tenany hatreo amin’ny tehezany no ho midina, ary mamirapiratra sy manjelanjelatra tahaka ny metaly mangirana kosa ny tapany ambony. '
  '3':
  - type: text
    content: Nisy toa tanana natsotrany tamiko ka noraisiny tamin’ny volon-dohako aho. Tanatin’izany fahitana avy amin’Andriamanitra izany, dia tsaroako ho ningain’ny Fanahin’Andriamanitra ho eny ana habakabaka aho ka nentiny hankany Jerosalema. Mby teo amin’ny vavahadin-tanàna izay mitodika mianavaratra aho, dia teo amin’ny toerana nisy ilay sarivongan-tsampy tsy zakan’Andriamanitra
  - type: note
    content: Tsy fantatra loatra ny andriamani-kafa asehon’io sarivongan-tsampy io, nefa mety ho i Tamoza, jereo and 14.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Ary indro niseho tamiko teo ny voninahitr’ilay Andriamanitr’i Israely, tahaka ny nahitako azy tao an-dohasaha
  - type: note
    content: Jereo 3.22-23.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ary hoy Andriamanitra tamiko: «Atopazo mianavaratra ny masonao, ry ilay taranak’olombelona.» Dia nataoko izany. Indro teo avaratry ny vavahady nisy '
  - type: text
    content: alitara
  - type: text
    content: ' iray; ary ilay sarivongan-tsampy tsy zakan’Andriamanitra dia hitako teo akaikin’ny fidirana. '
  '6':
  - type: text
    content: 'Dia hoy indray ny Andriamanitra hoe: «Ry ilay taranak’olombelona, hitanao tsara ve izay ataon’ny olona eo? Fa ny firenen’i Israely dia manao izay fomba maharikoriko mba hampanalavitra Ahy amin’ity '
  - type: text
    content: toerako masina
  - type: text
    content: ' ity. Nefa mbola hahita fomba hafa maharikoriko toy izany ianao.»'
  '7':
  - type: text
    content: 'Ary nitondra ahy ho eo am-bavahadin’ny kianja ivelan’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' izy, ka hitako fa nisy hirika teo amin’ny rindrina. '
  '8':
  - type: text
    content: 'Dia hoy Andriamanitra tamiko: «Ry ilay taranak’olombelona, gorobahy ny rindrina.» Dia nogorobahiko ny rindrina ka nasiako banga. '
  '9':
  - type: text
    content: 'Ary hoy indray Izy tamiko: «Midira ianao ary jereo ny fomba ratsy maharikoriko ataon’ireo olona ireo eto.»'
