document_id: PSA.80,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaka ho fanarenana ny firenena
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hampiarahina amin’ny gitara. Salamo fahatsiarovana nataon’i Asafa
  - type: note
    content: Jereo Sal 45.1; 60.1 sy nta.
  - type: text
    content: .
  '10':
  - type: text
    content: nodiovinao ny tany teo anoloany,
  - type: text
    content: koa namaka lalina izy ary nameno ny tany.
  '11':
  - type: text
    content: Ny alokalony naharakotra ny tendrombohitra any atsimo
  - type: text
    content: ary ny rantsany nananika ny sedera goavana any Libano;
  '12':
  - type: text
    content: nampisandrahaka ny rantsany
  - type: text
    content: hatrany an-dranomasina any andrefana izy,
  - type: text
    content: ary nampihanaka ny sakeliny
  - type: text
    content: hatrany amin’ny ony any atsinanana.
  '13':
  - type: text
    content: Nahoana àry no dia noravanao
  - type: text
    content: ny fefy manodidina an’ilay voalobokao,
  - type: text
    content: ka mioty azy ny mpandalo rehetra?
  '14':
  - type: text
    content: Manimba azy toa lambo avy any an’ala ireo
  - type: text
    content: ary tonga miraoka azy toa bibidia.
  '15':
  - type: text
    content: Ry Andriamanitr’izao rehetra izao ô, mba miverena;
  - type: text
    content: tsinjovy avy any an-danitra ka jereo
  - type: text
    content: 'ary karakarao ilay voalobokao:'
  '16':
  - type: text
    content: arovy ilay zana-kazo nambolenao,
  - type: text
    content: ilay solofo nohatanjahinao ho Anao.
  '17':
  - type: text
    content: Aoka ho levon’ny fandrahonanao
  - type: text
    content: ireo fahavalo nanjera sy nandoro!
  '18':
  - type: text
    content: Aoka homban’ny fiarovanao ilay vahoaka voafidinao
  - type: note
    content: Jereo Sal 110.1.
  - type: text
    content: ','
  - type: text
    content: dia ilay firenena nohatanjahinao ho Anao!
  '19':
  - type: text
    content: Amin’izay dia tsy handao Anao intsony izahay;
  - type: text
    content: Ianao no hamelona anay indray ary hivavahanay.
  '2':
  - type: text
    content: 'Ry '
  - type: text
    content: Mpiandry
  - type: text
    content: ' an’i Israely ô, mba mihainoa anay,'
  - type: text
    content: Ianao Izay mitarika ny taranak’i Jôsefa toy ny andian’ondry;
  - type: text
    content: 'Ianao Izay mipetraka eo ambony '
  - type: text
    content: kerobima
  - type: note
    content: 'kerobima: sarin-javatra roa manana elatra, izay voalazan’ny Eks 25.22 sy 1 Mp 6.23-28 fa eo ambonin’ilay Vatamasina mirakitra ny fanekempihavanana. Heverina ho sezafiandrianan’Andriamanitra na fitoeran-tongony ny Vatamasina: jereo Sal 99.5 sy nta.'
  - type: text
    content: ', mba misehoa.'
  '20':
  - type: text
    content: Ry TOMPO Andriamanitr’izao rehetra izao ô,
  - type: text
    content: mba avereno ho firenena matanjaka izahay;
  - type: text
    content: aoka hijery anay amin-kamorampo Ianao,
  - type: text
    content: dia ho voavonjy izahay!
  '3':
  - type: text
    content: Eo anatrehan’i Efraîma sy i Benjamîna ary i Manase,
  - type: text
    content: fohazy ny herinao ka tongava hamonjy anay.
  '4':
  - type: text
    content: Ry Andriamanitr’izao rehetra izao ô,
  - type: text
    content: mba avereno ho firenena matanjaka izahay;
  - type: text
    content: aoka hijery anay amin-kamorampo Ianao,
  - type: text
    content: dia ho voavonjy izahay!
  '5':
  - type: text
    content: Ry TOMPO Andriamanitr’izao rehetra izao ô,
  - type: text
    content: mandra-pahoviana no hotezeranao izahay
  - type: text
    content: ho setrin’ny vavakay vahoakanao?
  '6':
  - type: text
    content: Alahelo no zary sakafo afahanao anay,
  - type: text
    content: ranomaso mandriaka no ampisotroinao anay.
  '7':
  - type: text
    content: Ataonao ho fanarabin’ireo firenen-kafa
  - type: text
    content: izay mpifanila aminay izahay
  - type: text
    content: sy ho fihomehezan’ny fahavalonay.
  '8':
  - type: text
    content: Ry Andriamanitr’izao rehetra izao ô,
  - type: text
    content: mba avereno ho firenena matanjaka izahay;
  - type: text
    content: aoka hijery anay amin-kamorampo Ianao,
  - type: text
    content: dia ho voavonjy izahay!
  '9':
  - type: text
    content: Namindra voaloboka
  - type: note
    content: Momba ny voaloboka, sarin’ny vahoakan’Andriamanitra, ampit Is 5.1-7; Ezek 15.1-8; Jôh 15.1-10.
  - type: text
    content: ' iray avy any Ejipta Ianao'
  - type: text
    content: ary nandroaka firenen-kafa mba hambolena azy;
