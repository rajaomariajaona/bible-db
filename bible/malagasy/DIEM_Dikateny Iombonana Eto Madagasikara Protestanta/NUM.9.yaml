document_id: NUM.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andro fankalazana ny Paska
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy tany an-taniefitr’i Sinay ny TOMPO tamin’ny volana voalohan’ny taona faharoa nialan’ny Israelita tany Ejipta ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Aoka ny Israelita hankalaza ny fetin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' amin’ny andro voatondro; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia ny harivan’ny andro faha-14 amin’ity volana ity no hankalazanareo azy, araka ny lalàna sy ny fanao rehetra momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Notenenin’i Mosesy ny Israelita mba hankalaza ny Paska; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia nankalaza ny Paska tany an-taniefitr’i Sinay ireo ny harivan’ny andro faha-14 tamin’ny volana voalohany. Nataon’ny Israelita araka izay nandidian’ny TOMPO an’i Mosesy izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 1-5:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 12.1-13 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tamin’izay andro izay anefa dia nisy olona sasany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voaloto
  - type: text
    text: 'n’ny fatin’olona ka tsy nahazo nankalaza ny Paska. Koa dia nankany amin’i Mosesy sy i Aharôna izy androtr’io ihany '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Voaloton’ny fatin’olona izahay. Koa nahoana no raràna tsy hahazo mitondra ny fanatitray ho an’ny TOMPO amin’ny andro voatondro toy ny Israelita rehetra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy i Mosesy tamin’izy ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andraso aloha mandra-pahafantatro izay andidian’ny TOMPO ny momba anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Raha misy aminareo na amin’ny taranakareo voaloton’ny fatin’olona na lasa nandeha an-tany lavitra, dia mbola hankalaza ny Paska ho fanajana Ahy TOMPO ihany koa izy, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'saingy ny harivan’ny andro faha-14 amin’ny volana faharoa kosa no hankalazany izany. Hihinana ny zanak’ondry miaraka amin’ny mofo tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ' sy ny anana mangidy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy hasiany sisa ho tra-maraina izany, ary tsy hotapahiny ny taolany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 12.46; Jôh 19.36.
    marker-yv: yv-n
  - type: text
    text: '; araka ny lalàna rehetra momba ny Paska no hankalazany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha misy kosa olona tsy voaloto sady tsy nandeha an-tany lavitra nefa tsy mankalaza ny Paska, dia hofongorana tsy ho isan’ny fiangonan’i Israely izy, satria tsy nitondra ny fanatitra ho Ahy TOMPO tamin’ny andro voatondro. Hizaka ny vokatry ny fahotany izany olona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary raha misy vahiny eo aminareo ka te hankalaza ny Paska ho fanajana AHY, dia hanaraka ny fomba fanao amin’ny Paska izy. Mitovy ihany ny lalàna na amin’ny vahiny izany na amin’ny Israelita.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny rahona nandrakotra ny Fonena-masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tamin’ny andro nananganana ny Fonena-masina, dia nisy rahona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'rahona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 13.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' nandrakotra ny Tranolay nitahirizana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny fanekempihavanana
  - type: text
    text: '. Amin’ny hariva izy io dia mazava toy ny afo eo ambonin’ny Tranolay mandra-maraina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia toy izany mandrakariva, fa norakofan-drahona ny Fonena-masina nefa mazava toy ny afo ilay rahona amin’ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Isaky ny miakatra miala amin’ny Tranolay ny rahona, dia miainga ny Israelita, ary eo amin’izay ijanonan’ny rahona no itobiany indray. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Baikon’ny TOMPO izany no iaingan’ny Israelita ary baikon’ny TOMPO koa no itobiany; fa arakaraka ny nijanonan’ny rahona teo ambonin’ny Fonena-masina no nitobiany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha nijanona ela teo ny rahona, dia nankatò ny didin’ny TOMPO ny Israelita ka tsy nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Indraindray dia andro vitsivitsy ihany no nijanonan’ny rahona teo ambonin’ny Fonena-masina, koa baikon’ny TOMPO ihany no itobiany, ary baikon’ny TOMPO ihany no iaingany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Indraindray kosa ny rahona dia tsy mijanona afa-tsy ny hariva ka hatramin’ny maraina ihany; koa rehefa miakatra izy ny maraina, dia miainga ny Israelita. Ary na indray andro sy indray alina aza no ijanonan’ny rahona, rehefa miakatra izy dia miainga ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eny, fa na mijanona maharitra roa andro na iray volana na ela noho izany eo ambonin’ny Fonena-masina aza ny rahona, dia mitoby hatrany ny Israelita fa tsy mandeha; rehefa miakatra ny rahona, vao izay izy no miainga. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Baikon’ny TOMPO no nitobiany, ary baikon’ny TOMPO no niaingany. Nitandrina ny fanompoana ny TOMPO araka ny baiko nomeny tamin’ny alalan’i Mosesy izy ireo.
