document_id: NUM.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny andro fankalazana ny Paska
  - type: text
    content: 'Niteny tamin’i Mosesy tany an-taniefitr’i Sinay ny TOMPO tamin’ny volana voalohan’ny taona faharoa nialan’ny Israelita tany Ejipta ka nanao hoe:'
  '10':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Raha misy aminareo na amin’ny taranakareo voaloton’ny fatin’olona na lasa nandeha an-tany lavitra, dia mbola hankalaza ny Paska ho fanajana Ahy TOMPO ihany koa izy, '
  '11':
  - type: text
    content: 'saingy ny harivan’ny andro faha-14 amin’ny volana faharoa kosa no hankalazany izany. Hihinana ny zanak’ondry miaraka amin’ny mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' sy ny anana mangidy izy. '
  '12':
  - type: text
    content: Tsy hasiany sisa ho tra-maraina izany, ary tsy hotapahiny ny taolany
  - type: note
    content: Jereo Eks 12.46; Jôh 19.36.
  - type: text
    content: '; araka ny lalàna rehetra momba ny Paska no hankalazany izany. '
  '13':
  - type: text
    content: 'Fa raha misy kosa olona tsy voaloto sady tsy nandeha an-tany lavitra nefa tsy mankalaza ny Paska, dia hofongorana tsy ho isan’ny fiangonan’i Israely izy, satria tsy nitondra ny fanatitra ho Ahy TOMPO tamin’ny andro voatondro. Hizaka ny vokatry ny fahotany izany olona izany. '
  '14':
  - type: text
    content: Ary raha misy vahiny eo aminareo ka te hankalaza ny Paska ho fanajana AHY, dia hanaraka ny fomba fanao amin’ny Paska izy. Mitovy ihany ny lalàna na amin’ny vahiny izany na amin’ny Israelita.»
  - type: heading
    content: Ny rahona nandrakotra ny Fonena-masina
  '15':
  - type: text
    content: Tamin’ny andro nananganana ny Fonena-masina, dia nisy rahona
  - type: note
    content: 'rahona: jereo Eks 13.21 sy nta.'
  - type: text
    content: ' nandrakotra ny Tranolay nitahirizana ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: '. Amin’ny hariva izy io dia mazava toy ny afo eo ambonin’ny Tranolay mandra-maraina. '
  '16':
  - type: text
    content: 'Dia toy izany mandrakariva, fa norakofan-drahona ny Fonena-masina nefa mazava toy ny afo ilay rahona amin’ny alina. '
  '17':
  - type: text
    content: 'Isaky ny miakatra miala amin’ny Tranolay ny rahona, dia miainga ny Israelita, ary eo amin’izay ijanonan’ny rahona no itobiany indray. '
  '18':
  - type: text
    content: 'Baikon’ny TOMPO izany no iaingan’ny Israelita ary baikon’ny TOMPO koa no itobiany; fa arakaraka ny nijanonan’ny rahona teo ambonin’ny Fonena-masina no nitobiany. '
  '19':
  - type: text
    content: 'Raha nijanona ela teo ny rahona, dia nankatò ny didin’ny TOMPO ny Israelita ka tsy nandeha. '
  '2':
  - type: text
    content: '–Aoka ny Israelita hankalaza ny fetin’ny '
  - type: text
    content: Paska
  - type: text
    content: ' amin’ny andro voatondro; '
  '20':
  - type: text
    content: 'Indraindray dia andro vitsivitsy ihany no nijanonan’ny rahona teo ambonin’ny Fonena-masina, koa baikon’ny TOMPO ihany no itobiany, ary baikon’ny TOMPO ihany no iaingany. '
  '21':
  - type: text
    content: 'Indraindray kosa ny rahona dia tsy mijanona afa-tsy ny hariva ka hatramin’ny maraina ihany; koa rehefa miakatra izy ny maraina, dia miainga ny Israelita. Ary na indray andro sy indray alina aza no ijanonan’ny rahona, rehefa miakatra izy dia miainga ny Israelita. '
  '22':
  - type: text
    content: 'Eny, fa na mijanona maharitra roa andro na iray volana na ela noho izany eo ambonin’ny Fonena-masina aza ny rahona, dia mitoby hatrany ny Israelita fa tsy mandeha; rehefa miakatra ny rahona, vao izay izy no miainga. '
  '23':
  - type: text
    content: Baikon’ny TOMPO no nitobiany, ary baikon’ny TOMPO no niaingany. Nitandrina ny fanompoana ny TOMPO araka ny baiko nomeny tamin’ny alalan’i Mosesy izy ireo.
  '3':
  - type: text
    content: dia ny harivan’ny andro faha-14 amin’ity volana ity no hankalazanareo azy, araka ny lalàna sy ny fanao rehetra momba azy.
  '4':
  - type: text
    content: 'Notenenin’i Mosesy ny Israelita mba hankalaza ny Paska; '
  '5':
  - type: text
    content: dia nankalaza ny Paska tany an-taniefitr’i Sinay ireo ny harivan’ny andro faha-14 tamin’ny volana voalohany. Nataon’ny Israelita araka izay nandidian’ny TOMPO an’i Mosesy izany
  - type: note
    content: 'And 1-5: jereo Eks 12.1-13 sy nta.'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Tamin’izay andro izay anefa dia nisy olona sasany '
  - type: text
    content: voaloto
  - type: text
    content: 'n’ny fatin’olona ka tsy nahazo nankalaza ny Paska. Koa dia nankany amin’i Mosesy sy i Aharôna izy androtr’io ihany '
  '7':
  - type: text
    content: 'ka niteny taminy hoe:'
  - type: text
    content: –Voaloton’ny fatin’olona izahay. Koa nahoana no raràna tsy hahazo mitondra ny fanatitray ho an’ny TOMPO amin’ny andro voatondro toy ny Israelita rehetra?
  '8':
  - type: text
    content: 'Fa hoy i Mosesy tamin’izy ireo:'
  - type: text
    content: –Andraso aloha mandra-pahafantatro izay andidian’ny TOMPO ny momba anareo.
  '9':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
