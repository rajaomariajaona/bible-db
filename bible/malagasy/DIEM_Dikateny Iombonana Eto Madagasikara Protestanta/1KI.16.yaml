document_id: 1KI.16,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamin’i Jehò mpaminany zanakalahin’i Hananỳ, dia hafatra ny amin’i Bahasà manao hoe:'
  '10':
  - type: text
    content: 'dia niditra i Zimrỳ ka namono nahafaty azy tamin’ny taona faha-27 nanjakàn’i Asà mpanjakan’i Joda; ary izy no nanjaka nandimby an’i Elà. '
  '11':
  - type: text
    content: 'Ary vantany vao nanjaka i Zimrỳ ka nipetraka teo amin’ny sezafiandrianany, dia naringany avokoa ny fianakavian’i Bahasà, ka tsy nasiany niangana rehefa mety ho lehilahy, na tamin’ny havany izany na tamin’ny sakaizany; '
  '12':
  - type: text
    content: 'naringan’i Zimrỳ avokoa ny fianakavian’i Bahasà araka ny teny nolazain’ny TOMPO tamin’ny alalan’i Jehò mpaminany. '
  '13':
  - type: text
    content: Izany no vokatry ny fahotana vitan’i Bahasà sy i Elà zanany, dia izay nataon’izy mianaka sady nampanaoviny an’i Israely ka nampahatezitra ny TOMPO Andriamanitr’i Israely tamin’ny sampiny.
  '14':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Elà ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely
  - type: text
    content: .
  - type: heading
    content: I Zimrỳ mpanjakan’i Israely
  '15':
  - type: text
    content: 'Tamin’ny taona faha-27 nanjakàn’i Asà mpanjakan’i Joda no tonga mpanjakan’i Israely i Zimrỳ ary fito andro ihany no nanjakàny tao Tiritsà. Tamin’izay ny tafik’i Israely dia nanao fahirano an’i Gibetôna izay voatanan’ny Filistinina. '
  '16':
  - type: text
    content: Ren’ny miaramila mpanao fahirano fa nikomy tamin’ny mpanjaka i Zimrỳ sady efa nahafaty azy aza; koa androtriny ihany teo an-tobiny teo ny tafik’i Israely manontolo
  - type: note
    content: Fanapahan-kevitra tsy mifanaraka amin’ny fitsipika misy, ary tokony ho-hamafisina ara-dalàna, jereo 16.21-22.
  - type: text
    content: ' dia nanangana an’i Hômrỳ filohany ho mpanjakan’i Israely. '
  '17':
  - type: text
    content: 'Dia niala tao Gibetôna i Hômrỳ sy ny tafiny manontolo ka nanao fahirano an’i Tiritsà. '
  '18':
  - type: text
    content: Rehefa hitan’i Zimrỳ fa azo ny tanàna, dia lasa izy niditra tao amin’ny tilikambo nisy ny efitranon’ny mpanjaka
  - type: note
    content: Ny teny nadika efitrano dia milaza toerana iray voafaritra tsara ao amin’ny lapa, saingy tsy fantatra be ihany na fierena io na fatoriana.
  - type: text
    content: '; nodorany io efitrano io, ka dia niara-devona taminy tao izy. '
  '19':
  - type: text
    content: Izany no vokatry ny fahotana vitan’i Zimrỳ, fony izy nanao izay ratsy eo imason’ny TOMPO satria nizorany ny fitondrantenan’i Jerôbohama sy ny fahotana izay nataony sady nampanaoviny an’i Israely.
  '2':
  - type: text
    content: '–Nasandratro avy amin’ny vovoka ianao ka nataoko ho filohan’i Israely vahoakako, kanefa dia ny fitondrantenan’i Jerôbohama no nizoranao ary ilay Israely vahoakako nampanotanao ka nampahatezitra Ahy tamin’ny fahotany. '
  '20':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Zimrỳ ary koa ny fikomiana nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely
  - type: text
    content: .
  '21':
  - type: text
    content: 'Taorian’ny nahafatesan’i Zimrỳ, dia nizara roa ny vahoakan’i Israely: ny antsasany nomba an’i Tibnỳ zanakalahin’i Ginata ka te hampanjaka azy, ary ny antsasany kosa nanaraka an’i Hômrỳ. '
  '22':
  - type: text
    content: Farany anefa dia resin’ny mpomba an’i Hômrỳ ny mpomba an’i Tibnỳ zanakalahin’i Ginata. Dia maty i Tibnỳ, ary i Hômrỳ no tonga mpanjaka.
  - type: heading
    content: I Hômrỳ mpanjakan’i Israely
  '23':
  - type: text
    content: 'Tamin’ny taona faha-31 nanjakàn’i Asà mpanjakan’i Joda no tonga mpanjakan’i Israely i Hômrỳ; ary naharitra 12 taona no nanjakàny ka ny enina tamin’izany dia tao Tiritsà. '
  '24':
  - type: text
    content: 'Dia novidiny volafotsy fito kilao tamin’i Semera ny havoanan’i Samaria ka nanorenany tanàna teo an-tampony; ary nataony koa hoe Samaria ny anaran’izany tanàna izany araka ny anaran’i Semera tompon’ilay havoana. '
  '25':
  - type: text
    content: 'Fa nanao izay ratsy eo imason’ny TOMPO i Hômrỳ, eny, nanao ratsy mihoatra noho izay rehetra teo alohany aza; '
  '26':
  - type: text
    content: satria nizorany avokoa ny fitondrantenan’i Jerôbohama zanakalahin’i Nebata sy ny fahotana izay nampanaoviny an’i Israely ka nampahatezitra ny TOMPO Andriamanitr’i Israely tamin’ny sampiny.
  '27':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Hômrỳ ary koa ny zavatra hafa nataony sy ny herimpo nasehony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely
  - type: text
    content: '. '
  '28':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina tao Samaria; ary i Ahaba zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: I Ahaba mpanjakan’i Israely
  '29':
  - type: text
    content: 'Tamin’ny faha-38 taona nanjakàn’i Asà mpanjakan’i Joda no tonga mpanjaka tamin’i Israely i Ahaba zanakalahin’i Hômrỳ; ary naharitra 22 taona no nanjakàny tamin’i Israely tao Samaria. '
  '3':
  - type: text
    content: 'Noho izany, hofongorako ny tenanao sy ny fianakavianao ka hataoko tahaka ny fianakavian’i Jerôbohama zanakalahin’i Nebata. '
  '30':
  - type: text
    content: 'Ary izy io dia nanao izay ratsy eo imason’ny TOMPO mihoatra noho izay rehetra teo alohany. '
  '31':
  - type: text
    content: Tsy vitan’ny hoe nizotra tamin’ny fahotan’i Jerôbohama zanakalahin’i Nebata
  - type: note
    content: Jereo 12.29-30.
  - type: text
    content: ' izy, fa mbola nanambady an’i Jezebela zanakavavin’i Etbahala mpanjakan’ny Tsidônianina sy nanompo an’i Bahala ary niankohoka teo anatrehany. '
  '32':
  - type: text
    content: 'Tany Samaria aza dia manao tempoly ho an’i Bahala izy ka nanangana alitara '
  '33':
  - type: text
    content: sy nametraka tsatokazo fanajana an’i Aserà tao; koa nampahatezitra ny TOMPO Andriamanitr’i Israely izy mihoatra noho ny mpanjakan’i Israely rehetra talohany.
  '34':
  - type: text
    content: Tamin’ny andro nanjakàn’i Ahaba no nanorenan’i Hiela avy any Betela an’i Jerikao; ka ny ain’i Abirama lahimatoany no sandan’ny nametrahany ny fototra, ary ny ain’i Segoba faralahiny no sandan’ny nametrahany ny vavahady, araka ny teny izay nolazain’ny TOMPO tamin’ny alalan’i Josoa zanakalahin’i Nona
  - type: note
    content: Jereo Jos 6.26.
  - type: text
    content: .
  '4':
  - type: text
    content: Koa ny taminganao izay maty ao an-tanàna dia hohanin’ny alika; ary izay maty any an-tsaha kosa dia hohanin’ny voro-manidina.
  '5':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Bahasà ary koa ny zavatra hafa nataony sy ny herimpo nasehony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely
  - type: text
    content: '. '
  '6':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina tao Tiritsà; ary i Elà zanany lahy no nanjaka nandimby azy.
  '7':
  - type: text
    content: 'Ny nitenenan’ny TOMPO an’i Bahasà sy ny fianakaviany, tamin’ny alalan’i Jehò mpaminany zanakalahin’i Hananỳ, dia noho ireto antony roa ireto: voalohany satria nanao izay ratsy eo imason’ny TOMPO i Bahasà sy ny fianakaviany, ka nampahatezitra Azy tamin’ny asan’ny tanany sady tonga tahaka an’i Jerôbohama sy ny fianakaviany; ary faharoa satria naringan’i Bahasà ny taranak’i Jerôbohama.'
  - type: heading
    content: I Elà mpanjakan’i Israely
  '8':
  - type: text
    content: 'Tamin’ny taona faha-26 nanjakàn’i Asà mpanjakan’i Joda no tonga mpanjaka tamin’i Israely i Elà zanakalahin’i Bahasà; ary naharitra roa taona no nanjakàny tao Tiritsà. '
  '9':
  - type: text
    content: 'Fa nioko hamely azy i Zimrỳ manamboninahiny sady komandin’ny antsasaky ny mpitondra kalesy. Koa fony i Elà nisotro sy nimamo tao Tiritsà tao an-tranon’i Aretsà filohan’ny tandapa, '
