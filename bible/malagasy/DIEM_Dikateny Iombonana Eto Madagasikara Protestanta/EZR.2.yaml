  '58':
  - type: text
    content: Ny tontalin’ireo mpanampy ny Levita sy ireo mpanompon’i Salômôna dia nisy lehilahy 392.
  '59':
  - type: text
    content: Ireo lehilahy mpiala sesitany niainga avy tany Tela-Mela sy Tela-Harsà na niainga avy tany Keroba sy Adanà ary Imera
  - type: note
    content: 'Tela-Mela... Imera: tanàna tao amin’ny faritr’i Babilôna saingy tsy fantatra mazava ny toerana misy azy.'
  - type: text
    content: ', saingy tsy nahalaza ny maha Israelita ny fianakaviany sy ny firazanany, '
