    content: ny rameva miisa 435 ary ny boriky miisa 6 720.
  '68':
  - type: text
    content: 'Rehefa tonga tao an-tranon’ny TOMPO tany Jerosalema izy rehetra, dia nanao fanomezana an-tsitrapo ny loham-pianakaviana sasantsasany mba hananganana indray ny tranon’Andriamanitra eo amin’ilay toerany taloha. '
  '69':
  - type: text
    content: 'Nanome araka izay fari-pananany avy izy mba hanampy ny vola voavory hanaovana ny asa: dia volamena 500 kilao, sy volafotsy 2 800 kilao, ary fanamiam-pisoronana zato.'
