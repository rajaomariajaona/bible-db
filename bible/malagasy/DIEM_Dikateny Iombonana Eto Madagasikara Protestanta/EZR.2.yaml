  '61':
  - type: text
    content: 'Nisy tamin’ireo mpisorona koa niharan’izany tarehin-javatra izany, dia ny taranak’i Hôbaià sy i Hakôtsa ary i Barzilay; (nantsoina araka izany anarana izany i Barzilay noho izy nanambady ny zanakavavin’i Barzilay izay avy any Gilehada). '
  '62':
  - type: text
    content: 'Nitady ny taratasy milaza ny firazanany ry zareo saingy tsy nahita; dia noheverina ho tsy '
  - type: text
    content: madio
  - type: text
    content: ' ara-pivavahana izy ka nahantona tsy hanao fisoronana. '
  '63':
  - type: text
    content: Noraran’ny governora tsy hihinana ny zava-masina dia masina izy mandra-pitsangan’izay mpisorona anankiray hanapa-kevitra momba azy amin’ny alalan’ny Orîma sy Tomîma
  - type: note
    content: Jereo Eks 28.30 sy nta.
  - type: text
    content: .
  '64':
  - type: text
    content: 'Nisy olona 42 360 no tontalin’ny Israelita tafangona. '
  '65':
  - type: text
    content: 'Niaraka taminy koa ny mpanompo lahy sy vavy miisa 7 337, ny mpihira lahy sy vavy miisa roanjato; '
  '66':
