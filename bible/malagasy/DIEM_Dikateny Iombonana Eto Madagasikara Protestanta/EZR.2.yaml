      text: '61'
  - type: text
    text: 'Nisy tamin’ireo mpisorona koa niharan’izany tarehin-javatra izany, dia ny taranak’i Hôbaià sy i Hakôtsa ary i Barzilay; (nantsoina araka izany anarana izany i Barzilay noho izy nanambady ny zanakavavin’i Barzilay izay avy any Gilehada). '
