    content: Ny amin’ireo mpanompon’i Salômôna
  - type: note
    content: 'Tsy dia fantatra mazava tsara ny amin’ireto mpanompon’i Salômôna ireto: araka ny and 58, io antokon’olona io dia tokony tsy hiavaka loatra amin’ireo mpanampy ny Levita (and 43).'
  - type: text
