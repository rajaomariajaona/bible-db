document_id: 2PE.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpampiely fampianaran-diso
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Jod 4-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy mpaminany sandoka teo amin’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: '; toy izany koa no hisian’ny mpampianatra sandoka eo aminareo: hampiditra an-tsokosoko fampianaran-diso mahavery izy ireo sady handà ny Tompo Izay nanavotra azy, ka hitarika fahaverezana tampoka ho an’ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maro no hanaraka ny fitondrantena ratsiny, ka ireny no hanevatevana ny lalana voasoritr’ilay hafatra marim-pototra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tia harena loatra ry zareo ka hataony filàm-bola ianareo amin’ny fampiasana teny mamitaka; saingy hatry ny ela dia tsy mitsahatra ny fanamelohana azy ary efa hihatra aminy koa ny fahaverezana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ', fony nanota, dia tsy namindran’Andriamanitra fo, fa noroahiny ho any amin’ny toeran’ny maty ka natolony ho ao an-davaka maizina mangitsokitsoka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ho ao an-davaka maizina mangitsokitsoka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho voagejan’ny haizina mangitsokitsoka.
    marker-yv: yv-n
  - type: text
    text: 'izay itanana azy ho amin’ny fitsarana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Izao tontolo izao
  - type: text
    text: ' koa fahiny dia tsy namindran’Andriamanitra fo, satria henika olona ratsy fanahy, ka nataony tonga teo amin’izao tontolo izao ny safodrano; i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Noà
  - type: text
    text: ' valo mianaka ihany no narovan’Andriamanitra, noho i Noà mpitory ny fahamarinana soritan’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 6.1–7.24.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny tanàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sôdôma
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Gômôra
  - type: text
    text: ' dia nohelohin’Andriamanitra ka noravany nanjary lavenona ary nataony fananarana ho an’ireo tsy miraiki-po aminy momba izay loza mety hihatra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 19.24.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nafahan’Andriamanitra kosa i Lôta, izay tia ny rariny ka ory dia ory noho ny fitondrantena ratsy nasehon’ny olona tsy miraharaha lalàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 19.1-16.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'satria io lehilahy tia ny rariny io, fony izy nitoetra teo anivon’ireo, dia nijaly mafy tokoa tao am-pony raha nahita sy nandre isan’andro vaky ny asa ratsy vitan’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Araka izany, dia hain’ny Tompo ny manala ny mpiraiki-po aminy ho afaka amin’ny fitsapana manjo azy, sy ny mitahiry ny ratsy fanahy mba hosazîna amin’ny andro fitsarana, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'indrindra fa ireo nizotra nanaram-po tamin’ny filàndratsin’ny maha olona mpanota sy nanamavo ny maha Tompo an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Ireo mpampianatra sandoka ireo dia olona sahy zavatra sy mitompo teny fantatra sady tsy matahotra hanevateva ireo atao hoe voninahitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo atao hoe voninahitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manondro anankiray amin’ireo antokon’anjely, izay voateny ho anjely ratsy etoana. Ampit Jod 8 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'kanefa ny anjely, izay mahery kokoa sy ambony fahefana noho ireo mpampianatra sandoka ireo aza, dia tsy mitondra fiampangana hanevateva eo anatrehan’ny Tompo ireo atao hoe voninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ry zareo kosa dia manahaka ny biby tsy manan-tsaina, sady entim-pahazarana no teraka ho fisambotra sy ho famono; manevateva ny zavatra tsy fantany ireo, ka dia hovonoina tahaka ny amonoana ny biby tsy manan-tsaina: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: eny, hiharan’ny ratsy izy ireo ho tambin’ny asa ratsiny. Ny heverin’ireo ho zava-mahafinaritra dia ny manao filibàna antoandrobenanahary izao; feno tsiny amam-pondro ireo fa miliba sady manodoka anareo rehefa miara-mihinana aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sady manodoka anareo rehefa miara-mihinana aminareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amin’ny sakafom-pifankatiavana iarahany aminareo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny haka vadin’olona ary ny tsy hitsaha-manota amin’izany no imasoany; ny mpino tsy miorina tsara, angoleny; ary liana fitiavan-karena loatra ny fony: eny, olona hiharan’ny loza nambaran’Andriamanitra ireo! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Efa niala tamin’ny lala-mahitsy izy ireo ka nivily nanaraka ny lalana efa nizoran’i Balahàma, zanakalahin’i Behôra: i Balahàma dia nankamamy ny tambin’ny asa ratsiny, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'saingy voaanatra noho ny hadisoany; fa niteny hoatra ny olona ny boriky moana, vao nahasakana ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' tsy hikiry amin’ny hadalàny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 15-16:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 22.4-35.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ireo mpampianatra sandoka ireo dia loharano ritra, zavona avoivoin’ny tafio-drivotra, ka ny haizim-pito no voatahiry ho azy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Teny manodoka sy tsy misy heviny no ataony; ka ny filàndratsin’ny maha olona mpanota, dia ny fitondrantena maloto, no entiny mamitaka ny olona izay vao nandao ny fiainana diso lalana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fahafahana no ampanantenain’ireo ny olona voasodokany; kanjo ny tenany aza andevozin’ny fahazaran-dratsy, fa izay resy dia andevozin’izay naharesy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha misy olona efa niala tamin’ny faharatsian’izao tontolo izao, noho ny fahalalana tsara an’i Jesoa Kristy Tompontsika sy Mpamonjy antsika, kanefa voasingotry ny faharatsiana indray ka resy, dia ratsy noho ny voalohany ny toetrany farany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aleo manko tsy nahafantatra ny lala-marina soritan’Andriamanitra izy, toy izay efa nahafantatra vao nihemotra mandao ny didy masina natolotra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Efa mihatra aminy tokoa ilay ohabolana marina hoe: «Ny alika no miverina amin’ny loany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ohab 26.11.
    marker-yv: yv-n
  - type: text
    text: », ary ny hoe «Ny kisoavavy voasasa no mihosim-potaka indray».
