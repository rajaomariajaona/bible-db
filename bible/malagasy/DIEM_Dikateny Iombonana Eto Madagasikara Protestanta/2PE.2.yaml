document_id: 2PE.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo mpampiely fampianaran-diso
  - type: heading
    content: (Jereo Jod 4-13)
  - type: text
    content: 'Nisy mpaminany sandoka teo amin’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: '; toy izany koa no hisian’ny mpampianatra sandoka eo aminareo: hampiditra an-tsokosoko fampianaran-diso mahavery izy ireo sady handà ny Tompo Izay nanavotra azy, ka hitarika fahaverezana tampoka ho an’ny tenany. '
  '10':
  - type: text
    content: 'indrindra fa ireo nizotra nanaram-po tamin’ny filàndratsin’ny maha olona mpanota sy nanamavo ny maha Tompo an’i '
  - type: text
    content: Kristy
  - type: text
    content: .
  - type: text
    content: Ireo mpampianatra sandoka ireo dia olona sahy zavatra sy mitompo teny fantatra sady tsy matahotra hanevateva ireo atao hoe voninahitra
  - type: note
    content: 'ireo atao hoe voninahitra: manondro anankiray amin’ireo antokon’anjely, izay voateny ho anjely ratsy etoana. Ampit Jod 8 sy nta.'
  - type: text
    content: '; '
  '11':
  - type: text
    content: 'kanefa ny anjely, izay mahery kokoa sy ambony fahefana noho ireo mpampianatra sandoka ireo aza, dia tsy mitondra fiampangana hanevateva eo anatrehan’ny Tompo ireo atao hoe voninahitra. '
  '12':
  - type: text
    content: 'Ry zareo kosa dia manahaka ny biby tsy manan-tsaina, sady entim-pahazarana no teraka ho fisambotra sy ho famono; manevateva ny zavatra tsy fantany ireo, ka dia hovonoina tahaka ny amonoana ny biby tsy manan-tsaina: '
  '13':
  - type: text
    content: eny, hiharan’ny ratsy izy ireo ho tambin’ny asa ratsiny. Ny heverin’ireo ho zava-mahafinaritra dia ny manao filibàna antoandrobenanahary izao; feno tsiny amam-pondro ireo fa miliba sady manodoka anareo rehefa miara-mihinana aminareo
  - type: note
    content: 'sady manodoka anareo rehefa miara-mihinana aminareo: misy stf sasany ahitana hoe amin’ny sakafom-pifankatiavana iarahany aminareo.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ny haka vadin’olona ary ny tsy hitsaha-manota amin’izany no imasoany; ny mpino tsy miorina tsara, angoleny; ary liana fitiavan-karena loatra ny fony: eny, olona hiharan’ny loza nambaran’Andriamanitra ireo! '
  '15':
  - type: text
    content: 'Efa niala tamin’ny lala-mahitsy izy ireo ka nivily nanaraka ny lalana efa nizoran’i Balahàma, zanakalahin’i Behôra: i Balahàma dia nankamamy ny tambin’ny asa ratsiny, '
  '16':
  - type: text
    content: 'saingy voaanatra noho ny hadisoany; fa niteny hoatra ny olona ny boriky moana, vao nahasakana ilay '
  - type: text
    content: mpaminany
  - type: text
    content: ' tsy hikiry amin’ny hadalàny'
  - type: note
    content: 'And 15-16: jereo Nom 22.4-35.'
  - type: text
    content: .
  '17':
  - type: text
    content: 'Ireo mpampianatra sandoka ireo dia loharano ritra, zavona avoivoin’ny tafio-drivotra, ka ny haizim-pito no voatahiry ho azy ireo. '
  '18':
  - type: text
    content: 'Teny manodoka sy tsy misy heviny no ataony; ka ny filàndratsin’ny maha olona mpanota, dia ny fitondrantena maloto, no entiny mamitaka ny olona izay vao nandao ny fiainana diso lalana. '
  '19':
  - type: text
    content: 'Fahafahana no ampanantenain’ireo ny olona voasodokany; kanjo ny tenany aza andevozin’ny fahazaran-dratsy, fa izay resy dia andevozin’izay naharesy azy. '
  '2':
  - type: text
    content: 'Maro no hanaraka ny fitondrantena ratsiny, ka ireny no hanevatevana ny lalana voasoritr’ilay hafatra marim-pototra. '
  '20':
  - type: text
    content: 'Ary raha misy olona efa niala tamin’ny faharatsian’izao tontolo izao, noho ny fahalalana tsara an’i Jesoa Kristy Tompontsika sy Mpamonjy antsika, kanefa voasingotry ny faharatsiana indray ka resy, dia ratsy noho ny voalohany ny toetrany farany. '
  '21':
  - type: text
    content: 'Aleo manko tsy nahafantatra ny lala-marina soritan’Andriamanitra izy, toy izay efa nahafantatra vao nihemotra mandao ny didy masina natolotra azy. '
  '22':
  - type: text
    content: 'Efa mihatra aminy tokoa ilay ohabolana marina hoe: «Ny alika no miverina amin’ny loany'
  - type: note
    content: Ohab 26.11.
  - type: text
    content: », ary ny hoe «Ny kisoavavy voasasa no mihosim-potaka indray».
  '3':
  - type: text
    content: Tia harena loatra ry zareo ka hataony filàm-bola ianareo amin’ny fampiasana teny mamitaka; saingy hatry ny ela dia tsy mitsahatra ny fanamelohana azy ary efa hihatra aminy koa ny fahaverezana.
  '4':
  - type: text
    content: 'Ireo '
  - type: text
    content: anjely
  - type: text
    content: ', fony nanota, dia tsy namindran’Andriamanitra fo, fa noroahiny ho any amin’ny toeran’ny maty ka natolony ho ao an-davaka maizina mangitsokitsoka'
  - type: note
    content: 'ho ao an-davaka maizina mangitsokitsoka: misy stf sasany ahitana hoe ho voagejan’ny haizina mangitsokitsoka.'
  - type: text
    content: 'izay itanana azy ho amin’ny fitsarana. '
  '5':
  - type: text
    content: Izao tontolo izao
  - type: text
    content: ' koa fahiny dia tsy namindran’Andriamanitra fo, satria henika olona ratsy fanahy, ka nataony tonga teo amin’izao tontolo izao ny safodrano; i '
  - type: text
    content: Noà
  - type: text
    content: ' valo mianaka ihany no narovan’Andriamanitra, noho i Noà mpitory ny fahamarinana soritan’Andriamanitra'
  - type: note
    content: Jereo Gen 6.1–7.24.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ny tanàna '
  - type: text
    content: Sôdôma
  - type: text
    content: ' sy '
  - type: text
    content: Gômôra
  - type: text
    content: ' dia nohelohin’Andriamanitra ka noravany nanjary lavenona ary nataony fananarana ho an’ireo tsy miraiki-po aminy momba izay loza mety hihatra'
  - type: note
    content: Jereo Gen 19.24.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Nafahan’Andriamanitra kosa i Lôta, izay tia ny rariny ka ory dia ory noho ny fitondrantena ratsy nasehon’ny olona tsy miraharaha lalàna
  - type: note
    content: Jereo Gen 19.1-16.
  - type: text
    content: '; '
  '8':
  - type: text
    content: 'satria io lehilahy tia ny rariny io, fony izy nitoetra teo anivon’ireo, dia nijaly mafy tokoa tao am-pony raha nahita sy nandre isan’andro vaky ny asa ratsy vitan’ireo. '
  '9':
  - type: text
    content: 'Araka izany, dia hain’ny Tompo ny manala ny mpiraiki-po aminy ho afaka amin’ny fitsapana manjo azy, sy ny mitahiry ny ratsy fanahy mba hosazîna amin’ny andro fitsarana, '
