document_id: TIT.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Foto-pampianarana marina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ianao kosa, dia izay mifanaraka amin’ny fampianarana tsy misy tomika no lazao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Anaro ny lehilahy zokiolona mba hahalala onony amin’ny fisotro, ho maotina, hahafehy tena, tsy hisy tomika amin’ny finoana, amin’ny fitiavana, amin’ny faharetana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Anaro toy izany koa ny vehivavy zokiolona mba hanana fitondrantena sahaza ny olona masim-piainana, tsy ho mpanendrikendrika, tsy ho andevozin’ny divay be. Ireo vehivavy zokiolona dia tokony hanome anatra tsara '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka hanoro ny vehivavy tanora ho tia vady aman-janaka, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: hahafehy tena, hadio toetra, hahakojakoja tokantrano, ho tsara fanahy, hanaiky ny vadiny, mba tsy hanevateva ny tenin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Anaro toy izany koa ny lehilahy tanora mba hahafehy tena. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Amin’ny zavatra rehetra dia aoka ny tenanao ho ohatra amin’ny asa tsara; aoka ny fampianaranao ho madio sy maotina: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: teny tsy misy tomika sady tsy azo kianina ampiasaina, mba ho menatra ny mpanohitra anao, noho izy tsy hanan-kitenenan-dratsy antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Anaro koa ny mpanompo mba hanaiky ny tompony, ka hanao izay sitraky ny tompony amin’ny zavatra rehetra: tsy hamalivaly azy, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: tsy hangalatra ny zavany, fa haneho toetra mahatoky tokoa, mba hahazo voninahitra amin’ny zavatra rehetra ny fampianarana momba ilay Andriamanitra Mpamonjy antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Andriamanitra efa naneho ny fahasoavany, izay loharanom-pamonjena ho an’ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izany fahasoavana izany dia mitaiza antsika handà ny toetra tsy miraharaha an’Andriamanitra sy handà ny filàn’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ', fa ho velona mahafehy tena sy mandala ny rariny ary tia vavaka mandritra izao fiainana ankehitriny izao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Toy izany no tokony hiandrasantsika ny hasambarana antenaintsika sy ny andro hisehoan’ny voninahitr’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', ilay Andriamanitra lehibe sady Mpamonjy antsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Jesoa Kristy, ilay Andriamanitra lehibe sady Mpamonjy antsika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay Andriamanitra lehibe sy ny voninahitr’i Jesoa Kristy Mpamonjy antsika.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I Jesoa Kristy dia nanolo-tena ho antsika mba hanavotra antsika ho afaka amin’ny ratsy rehetra ka hahatonga antsika ho vahoaka voadio, natao ho Azy tokoa sy hazoto hanatontosa asa tsara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 130.8; Ezek 37.23; Eks 19.5; Fifan 14.2; 1Pt 2.9; Ef 2.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izany lazaina sy ananarana ary andresena lahatra ombàn’ny fahefana rehetra anananao. Aoka tsy hisy olona hanao tsinontsinona anao.
