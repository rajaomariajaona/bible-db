document_id: TIT.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Foto-pampianarana marina
  - type: text
    content: 'Fa ianao kosa, dia izay mifanaraka amin’ny fampianarana tsy misy tomika no lazao. '
  '10':
  - type: text
    content: tsy hangalatra ny zavany, fa haneho toetra mahatoky tokoa, mba hahazo voninahitra amin’ny zavatra rehetra ny fampianarana momba ilay Andriamanitra Mpamonjy antsika.
  '11':
  - type: text
    content: 'Fa Andriamanitra efa naneho ny fahasoavany, izay loharanom-pamonjena ho an’ny olona rehetra. '
  '12':
  - type: text
    content: Izany fahasoavana izany dia mitaiza antsika handà ny toetra tsy miraharaha an’Andriamanitra sy handà ny filàn’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ', fa ho velona mahafehy tena sy mandala ny rariny ary tia vavaka mandritra izao fiainana ankehitriny izao. '
  '13':
  - type: text
    content: 'Toy izany no tokony hiandrasantsika ny hasambarana antenaintsika sy ny andro hisehoan’ny voninahitr’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ', ilay Andriamanitra lehibe sady Mpamonjy antsika'
  - type: note
    content: 'I Jesoa Kristy, ilay Andriamanitra lehibe sady Mpamonjy antsika: dkt hafa ilay Andriamanitra lehibe sy ny voninahitr’i Jesoa Kristy Mpamonjy antsika.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: I Jesoa Kristy dia nanolo-tena ho antsika mba hanavotra antsika ho afaka amin’ny ratsy rehetra ka hahatonga antsika ho vahoaka voadio, natao ho Azy tokoa sy hazoto hanatontosa asa tsara
  - type: note
    content: Ampit Sal 130.8; Ezek 37.23; Eks 19.5; Fifan 14.2; 1Pt 2.9; Ef 2.10.
  - type: text
    content: .
  '15':
  - type: text
    content: Izany lazaina sy ananarana ary andresena lahatra ombàn’ny fahefana rehetra anananao. Aoka tsy hisy olona hanao tsinontsinona anao.
  '2':
  - type: text
    content: 'Anaro ny lehilahy zokiolona mba hahalala onony amin’ny fisotro, ho maotina, hahafehy tena, tsy hisy tomika amin’ny finoana, amin’ny fitiavana, amin’ny faharetana. '
  '3':
  - type: text
    content: 'Anaro toy izany koa ny vehivavy zokiolona mba hanana fitondrantena sahaza ny olona masim-piainana, tsy ho mpanendrikendrika, tsy ho andevozin’ny divay be. Ireo vehivavy zokiolona dia tokony hanome anatra tsara '
  '4':
  - type: text
    content: 'ka hanoro ny vehivavy tanora ho tia vady aman-janaka, '
  '5':
  - type: text
    content: hahafehy tena, hadio toetra, hahakojakoja tokantrano, ho tsara fanahy, hanaiky ny vadiny, mba tsy hanevateva ny tenin’Andriamanitra.
  '6':
  - type: text
    content: 'Anaro toy izany koa ny lehilahy tanora mba hahafehy tena. '
  '7':
  - type: text
    content: 'Amin’ny zavatra rehetra dia aoka ny tenanao ho ohatra amin’ny asa tsara; aoka ny fampianaranao ho madio sy maotina: '
  '8':
  - type: text
    content: teny tsy misy tomika sady tsy azo kianina ampiasaina, mba ho menatra ny mpanohitra anao, noho izy tsy hanan-kitenenan-dratsy antsika.
  '9':
  - type: text
    content: 'Anaro koa ny mpanompo mba hanaiky ny tompony, ka hanao izay sitraky ny tompony amin’ny zavatra rehetra: tsy hamalivaly azy, '
