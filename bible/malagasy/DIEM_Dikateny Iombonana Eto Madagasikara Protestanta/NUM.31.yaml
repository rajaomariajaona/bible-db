document_id: NUM.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ady masina tamin’ny Midianita
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '10':
  - type: text
    content: 'Nodorany avokoa ny tanàna rehetra nonenany sy nitobiany. '
  '11':
  - type: text
    content: 'Dia nalainy avokoa izay rehetra nobaboiny na olona na biby, '
  '12':
  - type: text
    content: ka nentiny tany amin’i Mosesy sy i Elehazara mpisorona ary ny fiangonana israelita teo an-toby tao amin’ny lemak’i Môaba, amoron’i Jôrdàna tandrifin’i Jerikao.
  '13':
  - type: text
    content: 'Nivoaka nitsena azy teo ivelan’ny toby i Mosesy sy i Elehazara mpisorona ary ny filohan’ny fiangonana rehetra. '
  '14':
  - type: text
    content: 'Tezitra tamin’ireo filohan’antokon-tafika sy filohan’andian-tafika izay avy nanafika i Mosesy, '
  '15':
  - type: text
    content: 'ka niteny taminy hoe:'
  - type: text
    content: '–Nahoana no navelanareo ho velona ny vehivavy rehetra? '
  '16':
  - type: text
    content: Ireo ihany, noho ny torohevitr’i Balahama, no nahatonga ny Israelita hanao fahadisoana lehibe tamin’ny TOMPO, tamin’ilay raharahan’i Pehôra
  - type: note
    content: 'noho ny torohevitr’i Balahama: ny toko faha-25 (ny raharahan’i Pehôra) dia tsy milaza izany andraikitra notanan’i Balahama izany; fa lovan-tantara hafa no tsy maintsy ahitana izany.'
  - type: text
    content: ', ka niavian’ny areti-mandringana teo amin’ny fiangonan’ny TOMPO. '
  '17':
  - type: text
    content: 'Koa ankehitriny vonoy ho faty avokoa ny zaza lahy rehetra ary koa ny vehivavy rehetra efa nanambady. '
  '18':
  - type: text
    content: 'Fa ny zazavavy rehetra mbola virijiny kosa dia velomy ka tano ho anareo. '
  '19':
  - type: text
    content: 'Mitobia any ivelan’ny toby mandritra ny fito andro ianareo, dia ianareo izay nahafaty olona na nikasi-paty, ka samia '
  - type: text
    content: midio
  - type: text
    content: ' amin’ny andro fahatelo sy fahafito, na ny tenanareo na ny zazavavy sambo-belonareo. '
  '2':
  - type: text
    content: –Faizo ny Midianita noho ny ratsy izay nataony tamin’ny Israelita
  - type: note
    content: Jereo toko 25, indrindra ny 25.17-18.
  - type: text
    content: ; aorian’izany, dia ho faty tahaka ireo razanao ianao.
  '20':
  - type: text
    content: Diovy koa ny fitafianareo rehetra mbamin’ny fanaka rehetra vita hoditra na vita volon’osy na vita hazo.
  '21':
  - type: text
    content: 'Dia hoy i Elehazara mpisorona tamin’ny miaramila nandray anjara tamin’ny fanafihana:'
  - type: text
    content: '–Izao no fepetran-dalàna izay nandidian’ny TOMPO an’i Mosesy: '
  '22':
  - type: text
    content: 'Ny volamena, ny volafotsy, ny varahina, ny vy, ny vy fotsy ary ny firaka, '
  '23':
  - type: text
    content: izany hoe ny zavatra rehetra mahatanty afo, dia sedrao amin’ny afo ho afa-doto, vao atsobohy ao amin’ny rano fanadiovana. Ary izay tsy mahatanty afo kosa dia atsobohy fotsiny ao anaty rano fanadiovana
  - type: note
    content: 'rano fanadiovana: jereo 19.9.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: Sasao ny fitafianareo amin’ny andro fahafito, dia hadio ianareo ka hahazo miditra ao an-toby amin’izay.
  - type: heading
    content: Ny fizaràna ny babo
  '25':
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '26':
  - type: text
    content: '–Mandehana ianao sy i Elehazara mpisorona ary ny filoham-pianakaviana amin’ny fiangonana maka ny isan’ny voababo rehetra na olona izany na biby. '
  '27':
  - type: text
    content: 'Zarao izany ka ny antsasany ho an’izay nandray anjara tamin’ny fanafihana ary ny antsasany ho an’ny fiangonana manontolo. '
  '28':
  - type: text
    content: 'Hakanao hetra ho AHY anefa ny anjaran’ireo mpiantafika, dia olona iray isaky ny olona dimanjato ary biby iray isaky ny biby dimanjato raha omby na boriky na ondry na osy izany. '
  '29':
  - type: text
    content: 'Halanao amin’ny anjaran’ny mpiantafika izany fanatitra ho AHY izany ka homenao an’i Elehazara mpisorona. '
  '3':
  - type: text
    content: 'Ka hoy i Mosesy tamin’ny vahoaka:'
  - type: text
    content: '–Aoka hivonon-kiatrika ady ny sasany aminareo ary hanafika ny Midianita hahatanteraka ny famaizan’ny TOMPO azy. '
  '30':
  - type: text
    content: 'Ary ny anjaran’ny Israelita kosa dia hakanao olona iray isaky ny olona dimampolo ary biby iray isaky ny biby dimampolo raha omby na boriky na ondry na osy na koa biby hafa rehetra, ka homenao ny '
  - type: text
    content: Levita
  - type: text
    content: ' izay miandraikitra ny fanompoana ao amin’ny Fonena-masina.'
  '31':
  - type: text
    content: 'Dia nataon’i Mosesy sy i Elehazara mpisorona araka izay nandidian’ny TOMPO an’i Mosesy izany. '
  '32':
  - type: text
    content: 'Ny sisa tavela tamin’ireo babo azon’ny mpanafika dia ondry aman’osy 675 000, '
  '33':
  - type: text
    content: 'omby 72 000, '
  '34':
  - type: text
    content: 'boriky 61 000, '
  '35':
  - type: text
    content: 'ary vehivavy mbola virijiny 32 000. '
  '36':
  - type: text
    content: 'Ny antsasany anjaran’ny mpiantafika dia ondry aman’osy 337 500, '
  '37':
  - type: text
    content: 'ka ny 675 no hetra nalana ho an’ny TOMPO; '
  '38':
  - type: text
    content: 'omby 36 000 ka ny 72 ho an’ny TOMPO; '
  '39':
  - type: text
    content: 'boriky 30 500, ka ny 61 ho an’ny TOMPO; '
  '4':
  - type: text
    content: Mpiady arivo lahy isam-poko no halefanareo hiantafika.
  '40':
  - type: text
    content: 'olona 16 000 ka ny 32 ho an’ny TOMPO. '
  '41':
  - type: text
    content: 'Nomen’i Mosesy an’i Elehazara mpisorona ny hetra natao ho fanatitra ho an’ny TOMPO, araka izay nandidian’ny TOMPO an’i Mosesy. '
  '42':
  - type: text
    content: 'Ny anjara nomena ny fiangonan’i Israely sisa dia mitovy amin’ny an’ny mpiantafika, izany hoe ondry aman’osy 337 500, '
  '44':
  - type: text
    content: 'omby 36 000, '
  '45':
  - type: text
    content: 'boriky 30 500 '
  '46':
  - type: text
    content: 'ary olona 16 000. '
  '47':
  - type: text
    content: Tamin’ny anjara nomena ny Israelita dia nangalan’i Mosesy olona iray isaky ny olona dimampolo, ary biby iray isaky ny biby dimampolo; koa araka izay nandidian’ny TOMPO an’i Mosesy dia nomeny ny Levita izay miandraikitra ny fanompoana momba ny Fonena-masin’ny TOMPO izany.
  - type: heading
    content: Fanatitra an-tsitrapo ho an’Andriamanitra
  '48':
  - type: text
    content: 'Nanatona an’i Mosesy ny filoha miaramila rehetra, dia ny komandin’ny antokon-tafika sy ny andian-tafika '
  '49':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: '–Efa nalainay ny isan’ny mpiantafika izay teo ambany fifehezanay, ka tsy nisy latsaka na dia iray aza. '
  '5':
  - type: text
    content: 'Nisy arivo lahy isam-poko notsongaina tamin’ny foloalindahin’i Israely, dia roa arivo sy iray alina izay vonon-kiatrika ady. '
  '50':
  - type: text
    content: Koa izany no itondranay fanatitra ho an’ny TOMPO mba hanaovana fombam-pivavahana famelan-keloka eo anatrehany ho an’ny tenanay, dia ny firavaka volamena hitan’ny tsirairay avy toy ny rojo, haba, peratra, kavina ary ny haingom-bozona.
  '51':
  - type: text
    content: 'Noraisin’i Mosesy sy i Elehazara mpisorona tamin’ny filoha miaramila ny volamena rehetra izay firavaka voatefy avokoa. '
  '52':
  - type: text
    content: 'Ny lanjan’ny volamena rehetra natolotr’ireo manamboninahitra ireo ho an’ny TOMPO dia nahatratra 170 kilao eo ho eo. '
  '53':
  - type: text
    content: 'Fa ny miaramila tsotra kosa dia samy nitahiry ho an’ny tenany izay zavatra nobaboiny manokana. '
  '54':
  - type: text
    content: 'Dia napetrak’i Mosesy sy i Elehazara mpisorona tao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ny volamena rehetra nomen’ny manamboninahitra miaramila, mba hahatsiarovan’ny TOMPO ireo Israelita.'
  '6':
  - type: text
    content: Dia nalefan’i Mosesy hiantafika izy rehetra ireo niaraka tamin’i Pinehasa mpisorona sady zanakalahin’i Elehazara; i Pinehasa no nitondra ny fitaovana masina ary koa ny trompetra mpanainga hiady
  - type: note
    content: 'fitaovana masina: mety ho ny Orîma sy ny Tomîma (jereo Eks 28.30 sy nta); ny trompetra: jereo 10.9.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia nanafika ny Midianita araka izay efa nandidian’ny TOMPO an’i Mosesy ireo, ka namono nahafaty ny lehilahy rehetra. '
  '8':
  - type: text
    content: 'Matin’ny Israelita koa ny mpanjaka midianita dimy lahy, dia i Evỳ sy i Rekema, i Tsoro sy i Hora ary i Reba. Novonoiny ho faty tamin’ny sabatra ihany koa i Balahama zanakalahin’i Behôra. '
  '9':
  - type: text
    content: 'Nataony sambo-belona ny vehivavy sy ny zaza midianita; nobaboiny avokoa ny biby fiompy rehetra mbamin’ny omby aman’ondriny rehetra ary ny fananany rehetra. '
