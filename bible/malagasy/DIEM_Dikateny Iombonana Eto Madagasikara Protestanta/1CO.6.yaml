document_id: 1CO.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Adin’ny kristianina tsarain’ny tsy mpino
  - type: text
    content: 'Raha misy aminareo manana fifanolanana amin’ny havana kristianina, ahoana no dia ahasahiany mangataka fitsarana amin’ny olona tsy mpino fa tsy amin’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: '? '
  '10':
  - type: text
    content: 'na ny mpangalatra, na ny mpitia harena, na ny mpidoroka, na ny mpanendrikendrika, na ny mpanao an-keriny, dia samy tsy hanana anjara amin’ny Fanjakàn’Andriamanitra. '
  '11':
  - type: text
    content: 'Tahaka izany taloha ny sasany taminareo; saingy efa voasasa ho afaka tamin’ny fahotana ianareo, efa voatokana ho an’Andriamanitra ary efa nekeny ho marina tamin’ny anaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo sy tamin’ny Fanahin’ilay Andriamanitsika.'
  - type: heading
    content: Ampiasao ho voninahitry ny Tompo ny tenanareo
  '12':
  - type: text
    content: '«Azoko atao ny zavatra rehetra», hoy aho, kanefa tsy dia ary mahasoa avokoa. «Azoko atao ny zavatra rehetra», hoy aho, kanefa tsy misy na inona na inona avelako hanandevo ahy. '
  '13':
  - type: text
    content: '«Ny hanina fanao an-kibo ary ny kibo fasian-kanina», hoy ianareo, kanefa samy zavatra horavan’Andriamanitra izy roroa. Ny tenantsika kosa tsy natao ho an’ny fijangajangana fa ho an’ny Tompo; ary ny Tompo ho an’ny tenantsika. '
  '14':
  - type: text
    content: Efa nanangana ny Tompo ho velona Andriamanitra, ary isika koa dia hatsangany ho velona araka ny heriny.
  '15':
  - type: text
    content: 'Tsy fantatrareo ve fa anisan’ny tenan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ny tenanareo? Ka dia hoesoriko ve ny anisan’ny tenan’i Kristy hatao ho anisan’ny tenan’ny vehivavy mpijangajanga? Sanatria! '
  '16':
  - type: text
    content: 'Sa tsy fantatrareo fa ny lehilahy mikambana amin’ny vehivavy mpijangajanga dia iray tena aminy? Hoy manko ny Soratra Masina: «Ho tena iray izy roroa'
  - type: note
    content: Gen 2.24.
  - type: text
    content: '.» '
  '17':
  - type: text
    content: Fa izay mikambana amin’ny Tompo kosa dia fanahy iray aminy.
  '18':
  - type: text
    content: 'Andosiro ny fijangajangana! Ny fahotana hafa rehetra ataon’ny olona dia ivelan’ny tenany avokoa; fa izay mijangajanga kosa dia manao fahotana mihatra amin’ny tenany. '
  '19':
  - type: text
    content: 'Sa tsy fantatrareo fa ny tenanareo dia '
  - type: text
    content: tempoli
  - type: text
    content: n’ny Fanahy Masina, Ilay ao anatinareo sady noraisinareo tamin’Andriamanitra
  - type: note
    content: Ampit 3.16.
  - type: text
    content: '? Tsy anareo ny tenanareo, '
  '2':
  - type: text
    content: 'Sa tsy fantatrareo ve fa ny vahoakan’Andriamanitra no hitsara '
  - type: text
    content: izao tontolo izao
  - type: text
    content: '? Ka raha izao tontolo izao aza hotsarainareo, dia tsy mendrika anareo ve ny fitsarana izay raharaha madinika indrindra. '
  '20':
  - type: text
    content: fa novidîn’Andriamanitra lafo ho fananany ianareo. Noho izany, ampiasao hanomezam-boninahitra an’Andriamanitra ny tenanareo.
  '3':
  - type: text
    content: 'Tsy fantatrareo ve fa hitsara '
  - type: text
    content: anjely
  - type: text
    content: ' aza isika? Mainka fa izay raharaha momba izao fiainana izao! '
  '4':
  - type: text
    content: 'Koa raha zavatra momba izao fiainana izao no ilanareo fitsarana, dia olona ivelan’ny Fiangonana ve no tendrenareo ho mpitsara? '
  '5':
  - type: text
    content: 'Hampahamenatra anareo no itenenako izany. Hay ve tsy misy olon-kendry na dia anankiray aza eo aminareo mba afaka handamina ny fifanolanan’ny samy kristianina? '
  '6':
  - type: text
    content: Sady kristianina ve dia hanana ady amina kristianina ary izay indray tsaraina eo anatrehan’ny tsy mpino?
  '7':
  - type: text
    content: 'Efa tena mikorosy fahana ianareo matoa misy fifanolanana samy ianareo. Tsy aleonareo ve mizaka ny tsy rariny? Tsy aleonareo ve miaritra ny fanambakana? '
  '8':
  - type: text
    content: 'Kanefa dia ianareo indray no manao ny tsy rariny sy manambaka, ary dia ny havanareo iray finoana ihany no anaovanareo izany. '
  '9':
  - type: text
    content: 'Tsy fantatrareo ve fa tsy hanana anjara amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' ny mpanao ratsy. Aza mety hofitahina ianareo! Fa na ny mpijangajanga, na ny mpanompo sampy, na ny mpaka vadin’olona, na ny maloto fihetsika, na ny mpifampila samy lehilahy, '
