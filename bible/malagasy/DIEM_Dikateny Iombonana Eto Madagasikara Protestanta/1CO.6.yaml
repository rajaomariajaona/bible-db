document_id: 1CO.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adin’ny kristianina tsarain’ny tsy mpino
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha misy aminareo manana fifanolanana amin’ny havana kristianina, ahoana no dia ahasahiany mangataka fitsarana amin’ny olona tsy mpino fa tsy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sa tsy fantatrareo ve fa ny vahoakan’Andriamanitra no hitsara '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: '? Ka raha izao tontolo izao aza hotsarainareo, dia tsy mendrika anareo ve ny fitsarana izay raharaha madinika indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy fantatrareo ve fa hitsara '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' aza isika? Mainka fa izay raharaha momba izao fiainana izao! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa raha zavatra momba izao fiainana izao no ilanareo fitsarana, dia olona ivelan’ny Fiangonana ve no tendrenareo ho mpitsara? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hampahamenatra anareo no itenenako izany. Hay ve tsy misy olon-kendry na dia anankiray aza eo aminareo mba afaka handamina ny fifanolanan’ny samy kristianina? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sady kristianina ve dia hanana ady amina kristianina ary izay indray tsaraina eo anatrehan’ny tsy mpino?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa tena mikorosy fahana ianareo matoa misy fifanolanana samy ianareo. Tsy aleonareo ve mizaka ny tsy rariny? Tsy aleonareo ve miaritra ny fanambakana? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa dia ianareo indray no manao ny tsy rariny sy manambaka, ary dia ny havanareo iray finoana ihany no anaovanareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy fantatrareo ve fa tsy hanana anjara amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ' ny mpanao ratsy. Aza mety hofitahina ianareo! Fa na ny mpijangajanga, na ny mpanompo sampy, na ny mpaka vadin’olona, na ny maloto fihetsika, na ny mpifampila samy lehilahy, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'na ny mpangalatra, na ny mpitia harena, na ny mpidoroka, na ny mpanendrikendrika, na ny mpanao an-keriny, dia samy tsy hanana anjara amin’ny Fanjakàn’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tahaka izany taloha ny sasany taminareo; saingy efa voasasa ho afaka tamin’ny fahotana ianareo, efa voatokana ho an’Andriamanitra ary efa nekeny ho marina tamin’ny anaran’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo sy tamin’ny Fanahin’ilay Andriamanitsika.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampiasao ho voninahitry ny Tompo ny tenanareo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Azoko atao ny zavatra rehetra», hoy aho, kanefa tsy dia ary mahasoa avokoa. «Azoko atao ny zavatra rehetra», hoy aho, kanefa tsy misy na inona na inona avelako hanandevo ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Ny hanina fanao an-kibo ary ny kibo fasian-kanina», hoy ianareo, kanefa samy zavatra horavan’Andriamanitra izy roroa. Ny tenantsika kosa tsy natao ho an’ny fijangajangana fa ho an’ny Tompo; ary ny Tompo ho an’ny tenantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa nanangana ny Tompo ho velona Andriamanitra, ary isika koa dia hatsangany ho velona araka ny heriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy fantatrareo ve fa anisan’ny tenan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ny tenanareo? Ka dia hoesoriko ve ny anisan’ny tenan’i Kristy hatao ho anisan’ny tenan’ny vehivavy mpijangajanga? Sanatria! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Sa tsy fantatrareo fa ny lehilahy mikambana amin’ny vehivavy mpijangajanga dia iray tena aminy? Hoy manko ny Soratra Masina: «Ho tena iray izy roroa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 2.24.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa izay mikambana amin’ny Tompo kosa dia fanahy iray aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Andosiro ny fijangajangana! Ny fahotana hafa rehetra ataon’ny olona dia ivelan’ny tenany avokoa; fa izay mijangajanga kosa dia manao fahotana mihatra amin’ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sa tsy fantatrareo fa ny tenanareo dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoli
  - type: text
    text: n’ny Fanahy Masina, Ilay ao anatinareo sady noraisinareo tamin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 3.16.
    marker-yv: yv-n
  - type: text
    text: '? Tsy anareo ny tenanareo, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: fa novidîn’Andriamanitra lafo ho fananany ianareo. Noho izany, ampiasao hanomezam-boninahitra an’Andriamanitra ny tenanareo.
