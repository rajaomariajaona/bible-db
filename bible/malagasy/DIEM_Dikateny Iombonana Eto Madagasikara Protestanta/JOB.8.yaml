document_id: JOB.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Tenin’i Bildada: mivaly ny ratsy atao na ho ela na ho haingana'
  - type: text
    content: 'Dia nandray fitenenana i Bildada avy any Soha ka nanao tamin’i Jôba hoe:'
  '10':
  - type: text
    content: Ry zareo no hanoro sy hampianatra anao;
  - type: text
    content: ary dia hamoaka ny oha-pitenenana
  - type: text
    content: 'izay vokatry ny fieritreretany toy ny hoe:'
  '11':
  - type: text
    content: «Tsy maniry ivelan’ny heniheny ny zozoro,
  - type: text
    content: ary tsy mitombo tsy misy rano ny volotara.
  '12':
  - type: text
    content: Vao mamelana fotsiny izy, ary mbola tsy voatapaka;
  - type: text
    content: saingy rehefa tsy mahazo rano intsony izy,
  - type: text
    content: dia malazo alohan’ny ahitra hafa rehetra.»
  - type: heading
    content: '*'
  '13':
  - type: text
    content: Izay rehetra manadino an’Andriamanitra
  - type: text
    content: dia toy izany no anjara miandry azy;
  - type: text
    content: ho levona ny fanantenan’ny tsy mpivavaka.
  '14':
  - type: text
    content: Fa ho maito ny fahatokian-tenany;
  - type: text
    content: ary ho marefo tahaka ny tranon-kala ny fianteherany.
  '15':
  - type: text
    content: Miankina amin’ny tranony izy,
  - type: text
    content: kanjo mihilangilana izany;
  - type: text
    content: mamikitra mafy hitazonana azy izy,
  - type: text
    content: nefa mirodana tsy voatana izany.
  '16':
  - type: text
    content: Ny tsy mpivavaka dia tahaka ny hazo
  - type: text
    content: izay feno tsiron-tany sady hazavain’ny masoandro.
  - type: text
    content: ka ny rantsany misandrahaka
  - type: text
    content: eo ambonin’ny tanimboly misy azy.
  '17':
  - type: text
    content: Mifanolanolana eny amin’ny korontam-bato ny fàkany
  - type: text
    content: ka tanteraka hatrany an-tsefatsefa-bato any.
  '18':
  - type: text
    content: Rehefa ongotana amin’ny toerany anefa izy,
  - type: text
    content: dia handà ho tsy mbola nahita azy akory io.
  '19':
  - type: text
    content: Jereo fa izany no fifaliana miandry ny tsy mpivavaka;
  - type: text
    content: ary hisy zava-maniry hafa indray
  - type: text
    content: hitrebona avy amin’io tany io.
  '2':
  - type: text
    content: Hafiriana no mbola hitenenanao toy izany?
  - type: text
    content: Ary mandra-pahoviana ny teny aloaky ny vavanao
  - type: text
    content: no hisafotofoto tahaka ny rivo-mahery?
  '20':
  - type: text
    content: Jereo kosa fa Andriamanitra
  - type: text
    content: tsy manary ny tsy manan-tsiny
  - type: text
    content: ary tsy manome tanana ny mpanao ratsy.
  '21':
  - type: text
    content: Mbola hofenoiny hehy ny vavanao
  - type: text
    content: ary horakora-pifaliana ny molotrao, ry Jôba.
  '22':
  - type: text
    content: Fa ho afa-baràka ireo mpankahala anao;
  - type: text
    content: ary hanjavona ny fonenan’ny olon-dratsy.
  '3':
  - type: text
    content: Moa hampandefitra ny rariny ve Andriamanitra?
  - type: text
    content: Moa hamadika ny fahamarinana ilay Tsitoha?
  '4':
  - type: text
    content: Mety ho nanota tamin’Andriamanitra ny zanakao,
  - type: text
    content: dia nampanodiaviny azy ny heloka vitany.
  '5':
  - type: text
    content: Raha ianao kosa no mitady an’Andriamanitra
  - type: text
    content: ka manao fitalahoana amin’ilay Tsitoha,
  '6':
  - type: text
    content: ary raha tsy manan-tsiny sy mahitsy ianao,
  - type: text
    content: dia Izy no hijoro hiahy anao
  - type: text
    content: ka hamerina indray ny fiadanana
  - type: text
    content: amin’ilay fonenam-pahamarinanao.
  '7':
  - type: text
    content: Ary ho bitika ihany izay nosantarinao taloha
  - type: text
    content: raha mitaha amin’ny hoavinao mamirapiratra.
  - type: heading
    content: '*'
  '8':
  - type: text
    content: Fa mba anontanio ange ntaolo e!
  - type: text
    content: Ka ianaro izay traikefan’ireo razany.
  '9':
  - type: text
    content: Tsy misy zava-pantatsika izay vao omaly,
  - type: text
    content: satria aloka mihelina vetivety ihany
  - type: text
    content: ny androm-piainantsika eto an-tany.
