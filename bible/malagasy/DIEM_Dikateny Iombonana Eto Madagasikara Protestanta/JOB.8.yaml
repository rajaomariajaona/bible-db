document_id: JOB.8,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Tenin’i Bildada: mivaly ny ratsy atao na ho ela na ho haingana'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandray fitenenana i Bildada avy any Soha ka nanao tamin’i Jôba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry zareo no hanoro sy hampianatra anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary dia hamoaka ny oha-pitenenana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay vokatry ny fieritreretany toy ny hoe:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy maniry ivelan’ny heniheny ny zozoro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mitombo tsy misy rano ny volotara.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao mamelana fotsiny izy, ary mbola tsy voatapaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy rehefa tsy mahazo rano intsony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia malazo alohan’ny ahitra hafa rehetra.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra manadino an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy izany no anjara miandry azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho levona ny fanantenan’ny tsy mpivavaka.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho maito ny fahatokian-tenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho marefo tahaka ny tranon-kala ny fianteherany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miankina amin’ny tranony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo mihilangilana izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamikitra mafy hitazonana azy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mirodana tsy voatana izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tsy mpivavaka dia tahaka ny hazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay feno tsiron-tany sady hazavain’ny masoandro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny rantsany misandrahaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo ambonin’ny tanimboly misy azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifanolanolana eny amin’ny korontam-bato ny fàkany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tanteraka hatrany an-tsefatsefa-bato any.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa ongotana amin’ny toerany anefa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handà ho tsy mbola nahita azy akory io.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo fa izany no fifaliana miandry ny tsy mpivavaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisy zava-maniry hafa indray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitrebona avy amin’io tany io.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hafiriana no mbola hitenenanao toy izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandra-pahoviana ny teny aloaky ny vavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hisafotofoto tahaka ny rivo-mahery?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo kosa fa Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy manary ny tsy manan-tsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy manome tanana ny mpanao ratsy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hofenoiny hehy ny vavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary horakora-pifaliana ny molotrao, ry Jôba.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho afa-baràka ireo mpankahala anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanjavona ny fonenan’ny olon-dratsy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa hampandefitra ny rariny ve Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa hamadika ny fahamarinana ilay Tsitoha?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mety ho nanota tamin’Andriamanitra ny zanakao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nampanodiaviny azy ny heloka vitany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ianao kosa no mitady an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manao fitalahoana amin’ilay Tsitoha,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary raha tsy manan-tsiny sy mahitsy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Izy no hijoro hiahy anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamerina indray ny fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ilay fonenam-pahamarinanao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho bitika ihany izay nosantarinao taloha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mitaha amin’ny hoavinao mamirapiratra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mba anontanio ange ntaolo e!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ianaro izay traikefan’ireo razany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy zava-pantatsika izay vao omaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria aloka mihelina vetivety ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny androm-piainantsika eto an-tany.
