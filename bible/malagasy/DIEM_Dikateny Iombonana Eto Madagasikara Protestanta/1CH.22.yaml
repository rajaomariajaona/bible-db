document_id: 1CH.22,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ka hoy i Davida hoe: «Eto no tranon’ny TOMPO Andriamanitra ary eto no alitara fanoloran’ny Israelita sorona dorana manontolo.»'
  - type: heading
    content: Omanin’i Davida ny fanorenana ny tempoly
  '10':
  - type: text
    content: 'I Salômôna no hanorina trano ho Ahy: izy ho zanako, Izaho ho rainy, ary hohamafisiko mandrakizay ny sezafiandrianan’ny fanjakany eo amin’i Israely'
  - type: note
    content: 'And 7-10: jereo 17.1-7; 2 Sam 7.1-16.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Koa ankehitriny, anaka, hiaraka aminao anie ny TOMPO ka hanambina anao hanorina trano ho Azy TOMPO Andriamanitrao, araka izay efa voalazany ny aminao. '
  '12':
  - type: text
    content: 'Homen’ny TOMPO saina mahiratra sy mahay anie ianao rehefa hatsangany hifehy an’i Israely, mba hitandremanao ny lalànan’ny TOMPO Andriamanitrao. '
  '13':
  - type: text
    content: Eny, raha tandremanao hotanterahina ny lalàna amam-pitsipika izay nandidian’ny TOMPO an’i Mosesy ho an’ny Israelita, dia hambinina tokoa ianao. Mahereza sy matanjaha, fa aza matahotra na mivadi-po
  - type: note
    content: Ampit Jos 1.6-9.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'He! nanao ezaka mafy aho ka nahavonona ho an’ny tranon’ny TOMPO ireto fitaovana ireto: volamena milanja telo tapitrisa kilao mahery, volafotsy milanja telopolo tapitrisa kilao mahery, halimo sy vy betsaka tsy hita lanja; ary nahavonona hazo sy vato koa aho. Dia hampianao kosa ireo. '
  '15':
  - type: text
    content: 'Mpiasa maro no eto aminao: dia tambato sy mpanao sokitra hazo ary olona mahay ny asa isan-karazany. '
  '16':
  - type: text
    content: Tsy hita isa ny volamena sy ny volafotsy ary ny halimo sy ny vy; koa arosoy ny asa, ary hiaraka aminao anie ny TOMPO!
  '17':
  - type: text
    content: 'Avy eo i Davida nandidy ny lehibe rehetra tamin’i Israely hanampy an’i Salômôna zanany lahy hoe:'
  '18':
  - type: text
    content: '–Tsy miaraka aminareo ve ny TOMPO Andriamanitra? Nomeny fandriampahalemana eo amin’ny manodidina rehetra ianareo, nony natolony ho ambany fifehezako ny mponina taloha tamin’ity tany efa resy teo anoloan’ny TOMPO sy teo anoloan’ny vahoakany ity. '
  '19':
  - type: text
    content: 'Koa ankehitriny, aoka ny fo amam-panahinareo hifantoka hitady ny TOMPO Andriamanitrareo! Irosoy ny asa, aoreno ilay '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO Andriamanitra; ary dia ao amin’ny tempoly haorina ho voninahitry ny TOMPO no hampidiranareo ilay '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ' sy hampidiranareo ny fanaka voatokana hanompoana an’Andriamanitra.'
  '2':
  - type: text
    content: Nasain’i Davida novorina ny olona hafa firenena
  - type: note
    content: Ny tondroin’ny mpanoratra amin’ny hoe olona hafa firenena eto dia ireo taranaky ny olona nonina tao Palestinina talohan’ny fahatongavan’ny Israelita hiorim-ponenana ao (jereo ny FTS amin’ny voambolana hoe AMÔRITA).
  - type: text
    content: ' nonina teo amin’ny tanin’i Israely, ka nanendreny tambato hipai-bato hanaovana ny '
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Novononin’i Davida koa ireto zavatra ireto: vy betsaka hanaovana fantsika ho an’ny lelavaravarana sy hanaovana faraingo; halimo betsaka tsy hita lanja; '
  '4':
  - type: text
    content: ary hazo sedera tsy hita isa, fa nitondran’ny Tsidônianina sy ny Tirianina
  - type: note
    content: Ny Tsidônianina sy ny Tirianina (mponina tao amin’ny faritr’i Tsidôna sy i Tiro) dia havanana tamin’ny asa hazo, dia ny hazo avy tany amin’ny tendrombohitra Libano (jereo 1 Mp 5.20 sy nta).
  - type: text
    content: ' hazo sedera betsaka i Davida. '
  '5':
  - type: text
    content: 'Fa hoy izy anakampony: «I Salômôna zanako mbola kely sady tanora fanahy, ary ny tempoly haorina ho an’ny TOMPO dia tsy maintsy ho lehibe tokoa mba hielezan’ny lazany sy ny voninahiny any amin’ny tany rehetra; koa hovononiko rahateo ny zavatra hoenti-manao azy'
  - type: note
    content: 'hoenti-manao azy: dkt hafa hoenti-manampy an’i Salômôna.'
  - type: text
    content: .» Dia nahavonona betsaka tokoa i Davida fahavelony.
  - type: heading
    content: Hafaran’i Davida i Salômôna mba hanorina ny Tempoly
  '6':
  - type: text
    content: 'Ary niantso an’i Salômôna zanany i Davida ka nandidy azy hanorina '
  - type: text
    content: tempoly
  - type: text
    content: ' ho an’ny TOMPO Andriamanitr’i Israely '
  '7':
  - type: text
    content: 'sady niteny taminy hoe:'
  - type: text
    content: '–Anaka efa mby tato am-poko ny hanorina trano ho an’ny TOMPO Andriamanitro; '
  '8':
  - type: text
    content: 'saingy niantefa tamiko ny tenin’ny TOMPO hoe: «Be ny ra efa nalatsakao tamin’ireo ady lehibe efa nataonao ka tsy ianao no hanorina trano ho Ahy, satria be ny ra efa nalatsakao tamin’ny tany teo imasoko. '
  '9':
  - type: text
    content: 'Fa indro hisy zazalahy haterakao, izay ho olona tia fandriampahalemana sady homeko fandriampahalemana eo anoloan’ny fahavalo rehetra manodidina azy. Ny anarany manko hatao hoe Salômôna –izany hoe ‹tia fiadanana› –ary homeko fiadanana sy fandriampahalemana i Israely amin’ny andro hanjakany. '
