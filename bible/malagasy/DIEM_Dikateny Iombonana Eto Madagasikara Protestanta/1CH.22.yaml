document_id: 1CH.22,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ka hoy i Davida hoe: «Eto no tranon’ny TOMPO Andriamanitra ary eto no alitara fanoloran’ny Israelita sorona dorana manontolo.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omanin’i Davida ny fanorenana ny tempoly
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I Salômôna no hanorina trano ho Ahy: izy ho zanako, Izaho ho rainy, ary hohamafisiko mandrakizay ny sezafiandrianan’ny fanjakany eo amin’i Israely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 7-10:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 17.1-7; 2 Sam 7.1-16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa ankehitriny, anaka, hiaraka aminao anie ny TOMPO ka hanambina anao hanorina trano ho Azy TOMPO Andriamanitrao, araka izay efa voalazany ny aminao. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Homen’ny TOMPO saina mahiratra sy mahay anie ianao rehefa hatsangany hifehy an’i Israely, mba hitandremanao ny lalànan’ny TOMPO Andriamanitrao. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eny, raha tandremanao hotanterahina ny lalàna amam-pitsipika izay nandidian’ny TOMPO an’i Mosesy ho an’ny Israelita, dia hambinina tokoa ianao. Mahereza sy matanjaha, fa aza matahotra na mivadi-po
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jos 1.6-9.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He! nanao ezaka mafy aho ka nahavonona ho an’ny tranon’ny TOMPO ireto fitaovana ireto: volamena milanja telo tapitrisa kilao mahery, volafotsy milanja telopolo tapitrisa kilao mahery, halimo sy vy betsaka tsy hita lanja; ary nahavonona hazo sy vato koa aho. Dia hampianao kosa ireo. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mpiasa maro no eto aminao: dia tambato sy mpanao sokitra hazo ary olona mahay ny asa isan-karazany. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsy hita isa ny volamena sy ny volafotsy ary ny halimo sy ny vy; koa arosoy ny asa, ary hiaraka aminao anie ny TOMPO!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Avy eo i Davida nandidy ny lehibe rehetra tamin’i Israely hanampy an’i Salômôna zanany lahy hoe:'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '–Tsy miaraka aminareo ve ny TOMPO Andriamanitra? Nomeny fandriampahalemana eo amin’ny manodidina rehetra ianareo, nony natolony ho ambany fifehezako ny mponina taloha tamin’ity tany efa resy teo anoloan’ny TOMPO sy teo anoloan’ny vahoakany ity. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa ankehitriny, aoka ny fo amam-panahinareo hifantoka hitady ny TOMPO Andriamanitrareo! Irosoy ny asa, aoreno ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin
    - type: text
      text: '’ny TOMPO Andriamanitra; ary dia ao amin’ny tempoly haorina ho voninahitry ny TOMPO no hampidiranareo ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
    - type: text
      text: ' sy hampidiranareo ny fanaka voatokana hanompoana an’Andriamanitra.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nasain’i Davida novorina ny olona hafa firenena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny tondroin’ny mpanoratra amin’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: olona hafa firenena
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto dia ireo taranaky ny olona nonina tao Palestinina talohan’ny fahatongavan’ny Israelita hiorim-ponenana ao (jereo ny FTS amin’ny voambolana hoe AMÔRITA).'
      marker-yv: yv-n
    - type: text
      text: ' nonina teo amin’ny tanin’i Israely, ka nanendreny tambato hipai-bato hanaovana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’Andriamanitra
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Novononin’i Davida koa ireto zavatra ireto: vy betsaka hanaovana fantsika ho an’ny lelavaravarana sy hanaovana faraingo; halimo betsaka tsy hita lanja; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ary hazo sedera tsy hita isa, fa nitondran’ny Tsidônianina sy ny Tirianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tsidônianina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tirianina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (mponina tao amin’ny faritr’i Tsidôna sy i Tiro) dia havanana tamin’ny asa hazo, dia ny hazo avy tany amin’ny tendrombohitra Libano (jereo 1 Mp 5.20 sy nta).'
      marker-yv: yv-n
    - type: text
      text: ' hazo sedera betsaka i Davida. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa hoy izy anakampony: «I Salômôna zanako mbola kely sady tanora fanahy, ary ny tempoly haorina ho an’ny TOMPO dia tsy maintsy ho lehibe tokoa mba hielezan’ny lazany sy ny voninahiny any amin’ny tany rehetra; koa hovononiko rahateo ny zavatra hoenti-manao azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hoenti-manao azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hoenti-manampy an’i Salômôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .» Dia nahavonona betsaka tokoa i Davida fahavelony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafaran’i Davida i Salômôna mba hanorina ny Tempoly
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary niantso an’i Salômôna zanany i Davida ka nandidy azy hanorina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ho an’ny TOMPO Andriamanitr’i Israely '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'sady niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Anaka efa mby tato am-poko ny hanorina trano ho an’ny TOMPO Andriamanitro; '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'saingy niantefa tamiko ny tenin’ny TOMPO hoe: «Be ny ra efa nalatsakao tamin’ireo ady lehibe efa nataonao ka tsy ianao no hanorina trano ho Ahy, satria be ny ra efa nalatsakao tamin’ny tany teo imasoko. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa indro hisy zazalahy haterakao, izay ho olona tia fandriampahalemana sady homeko fandriampahalemana eo anoloan’ny fahavalo rehetra manodidina azy. Ny anarany manko hatao hoe Salômôna –izany hoe ‹tia fiadanana› –ary homeko fiadanana sy fandriampahalemana i Israely amin’ny andro hanjakany. '
