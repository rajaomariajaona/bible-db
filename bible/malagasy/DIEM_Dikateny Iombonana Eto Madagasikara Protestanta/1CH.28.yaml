          text: mofo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ireo, dia jereo Nom 24.5-9.'
      marker-yv: yv-n
    - type: text
      text: ' atolotra an’Andriamanitra, ny lanjan’ny volafotsy ilaina ho an’ny latabatra volafotsy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny lanjan’ireo fitrebika sy loviabe ary kaopy samy volamena madio, ny lanjan’ny siny volamena sy volafotsy araka ny karazany avy, '
  '18':
