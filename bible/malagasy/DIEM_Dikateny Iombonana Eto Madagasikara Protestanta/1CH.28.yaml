document_id: 1CH.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Atolotr’i Davida ho dimbiny i Salômôna
  - type: text
    content: 'Novorin’i Davida tany Jerosalema ny lehibe rehetra tamin’ny Israely: filohan’ireo foko, lehiben’ny andian-tafika manompo ny mpanjaka, komandin-tafika mpifehy arivo na mpifehy zato, mpiandraikitra ny fananana sy biby fiompy rehetra an’ny mpanjaka sy an-janany, tandapa, lehilahy mahery, izany hoe ny manampahefana rehetra. '
  '10':
  - type: text
    content: 'Indro efa nofidin’ny TOMPO ianao izao mba hanorina '
  - type: text
    content: tempoly
  - type: text
    content: ' ho '
  - type: text
    content: Toeramasiny
  - type: text
    content: ; dia mahereza ka mahefà.»
  - type: heading
    content: Omen’i Davida an’i Salômôna ny sarin-trano momba ny tempoly
  '11':
  - type: text
    content: 'Dia nomen’i Davida an’i Salômôna zanany ny sarin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' sy ny trano fanampiny –efitrano firaketana, efitrano ambony, efitrano anatiny –ary ny trano hisy ilay '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny Tompo
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Nomeny azy koa ny sarin’izay rehetra efa nokasainy hatao momba ireo kianja ao an-tranon’ny TOMPO mbamin’ny efitrano rehetra manodidina ireo kianja: efitrano fitahirizana ny zava-tsarobidin’ny tranon’Andriamanitra sy fitahirizana ny zava-tsarobidy natokana ho an’ny Tompo. '
  '13':
  - type: text
    content: 'Nomeny azy ny amin’ny fitsinjarana ireo '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy '
  - type: text
    content: levita
  - type: text
    content: ' ho antokony, ny amin’ny fanompoana rehetra ho fanao ao an-tranon’ny TOMPO ary ny amin’ny fanaka rehetra ho fampiasa ao. '
  '14':
  - type: text
    content: 'Nomeny azy ny lanjam-bolamena ilaina ho an’ny fanaka volamena rehetra samy hampiasaina, ny lanjam-bolafotsy ilaina ho an’ny fanaka volafotsy rehetra samy hampiasaina, '
  '15':
  - type: text
    content: 'ny lanjan’ny fitoeran-jiro sy fanaovan-jiro volamena araka ny karazany avy, ny lanjan’ny fitoeran-jiro sy fanaovan-jiro volafotsy araka ny karazany avy, '
  '16':
  - type: text
    content: ny lanjan’ny volamena ilaina isaky ny latabatra volamena fametrahana ny mofo
  - type: note
    content: Momba ireo mofo ireo, dia jereo Nom 24.5-9.
  - type: text
    content: ' atolotra an’Andriamanitra, ny lanjan’ny volafotsy ilaina ho an’ny latabatra volafotsy, '
  '17':
  - type: text
    content: 'ny lanjan’ireo fitrebika sy loviabe ary kaopy samy volamena madio, ny lanjan’ny siny volamena sy volafotsy araka ny karazany avy, '
  '18':
  - type: text
    content: 'ary ny lanjan’ny volamena voadio hanaovana ny '
  - type: text
    content: alitara
  - type: text
    content: ' fandoroana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: '. Farany, nomen’i Davida an’i Salômôna ny sarin’ilay kalesy misy ireo '
  - type: text
    content: kerobîma
  - type: text
    content: ' volamena izay samy manana elatra mivelatra manarona ny Vatamasina mirakitra ny fanekempihavanan’ny TOMPO'
  - type: note
    content: 'kalesy: io voambolana io dia tsy hita ao amin’ny tantaran’ny fanorenana ilay tempolin’i Salômôna (1 Mp 6–7). Mampirona saina amin’ilay fiara mahavariana voavisavisan’ny Ezek 1 sy Ezek 10 izany, dia ilay fiara isehoan’ny Tompo voahodidina kerobima.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Dia hoy i Davida hoe:'
  - type: text
    content: –Izany rehetra izany, anaka, dia ao anatina rakitsoratra avy tamin’ny TOMPO, rakitsoratra izay nampahafantatra ahy ny asa rehetra asehon’ny sary.
  '2':
  - type: text
    content: 'Dia nitsangana i Davida mpanjaka, ka nanao hoe:'
  - type: text
    content: '–Henoy aho, ry havako sy mpiray firenena amiko! Raha izaho, dia efa fikasàko ny hanorina '
  - type: text
    content: tempoly
  - type: text
    content: ' hipetrahan’ilay '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ', izany hoe ilay fitoeran-tongotry ny Andriamanitsika; ary efa novononiko izay hoenti-manorina azy. '
  '20':
  - type: text
    content: 'Ary hoy koa i Davida tamin’i Salômôna zanany:'
  - type: text
    content: '–Mahereza sy matanjaha ka mahefà! Aza matahotra na mivadi-po fa ny TOMPO Andriamanitra, ilay Andriamanitro, no miaraka aminao. Tsy handao na hahafoy anao Izy mandra-pahavita ny asa rehetra fanatontosana ny tranon’ny TOMPO. '
  '21':
  - type: text
    content: Indreo ny antoko-mpisorona sy levita, hanao ny fanompoana rehetra ao an-tempolin’Andriamanitra; mba hahavitana ny asa manontolo, dia miaraka aminao koa ireo olona feno risimpo sady kinga amin’ny taozavatra isan-karazany; ary ny lehibe mbamin’ny vahoaka rehetra dia hankatò ny baikonao an-tsakany sy an-davany.
  '3':
  - type: text
    content: 'Fa hoy Andriamanitra tamiko: «Tsy hanorina tempoly hanajana Ahy ianao, satria lehilahy mpiady sy mpandatsa-dra». '
  '4':
  - type: text
    content: 'Nefa kosa ny TOMPO, Andriamanitr’i Israely, efa nifidy ahy teo anivon’ny ankohonan-draiko rehetra mba ho mpanjaka hifehy an’i Israely hatrany. Satria i Joda no voafidiny ho mpanapaka; teo anivon’ny fokon’i Joda, dia ny ankohonan-draiko no voafidiny; ary teo anivon’ny ankohonan-draiko, dia ny tenako no nankasitrahiny hampanjakaina amin’i Israely manontolo. '
  '5':
  - type: text
    content: 'Tamin’ny zanakalahiko rehetra kosa (fa nomen’ny TOMPO zanakalahy maro aho), dia i Salômôna zanako no nofidiny hipetraka eo amin’ilay sezafiandrianana manambara ny fanjakàn’ny TOMPO amin’i Israely. '
  '6':
  - type: text
    content: 'Ary hoy Izy tamiko: «I Salômôna zanakao no hanorina ny tranoko sy hamboatra ireo kianjako; fa efa nifidy azy Aho, ka izy ho zanako ary Izaho ho rainy. '
  '7':
  - type: text
    content: Hataoko mijoro mandrakizay ny fanjakàny, raha maharitra manatanteraka ny didiko sy ny fitsipiko izy tahaka ny amin’izao anio izao
  - type: note
    content: 'And 2-7: jereo 17.1-14; 2 Sam 7.1-16.'
  - type: text
    content: '.» '
  '8':
  - type: text
    content: Koa ankehitriny, ry havako, eto imason’ny vahoaka Israely rehetra izay fiangonan’ny TOMPO ary eto anatrehan’ilay Andriamanitsika Izay mandre antsika, dia tandremo sy diniho ny didy rehetra avy amin’ny TOMPO Andriamanitrareo mba hahatananareo ity tany ity sady hamindranareo azy amin’ny zanaka amam-paranareo ho lova maharitra mandrakizay.
  '9':
  - type: text
    content: '«Ianao kosa, ry Salômôna zanako, fantaro ilay Andriamanitra notompoin’ny rainao, ka manompoa Azy amin’ny fo manontolo sy amin’ny fanahy mazoto; fa ny TOMPO dia mpandinika ny fon’ny olona rehetra ary mpahafantatra ny fieritreretana rehetra. Raha mitady Azy ianao, dia hahita Azy; fa raha mandao Azy kosa ianao, dia hariany mandrakizay. '
