        children:
        - type: text
          text: 'io voambolana io dia tsy hita ao amin’ny tantaran’ny fanorenana ilay tempolin’i Salômôna (1 Mp 6–7). Mampirona saina amin’ilay fiara mahavariana voavisavisan’ny Ezek 1 sy Ezek 10 izany, dia ilay fiara isehoan’ny Tompo voahodidina '
      - type: usfm
