  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izany rehetra izany, anaka, dia ao anatina rakitsoratra avy tamin’ny TOMPO, rakitsoratra izay nampahafantatra ahy ny asa rehetra asehon’ny sary.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana i Davida mpanjaka, ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Henoy aho, ry havako sy mpiray firenena amiko! Raha izaho, dia efa fikasàko ny hanorina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' hipetrahan’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
    - type: text
      text: ', izany hoe ilay fitoeran-tongotry ny Andriamanitsika; ary efa novononiko izay hoenti-manorina azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa i Davida tamin’i Salômôna zanany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mahereza sy matanjaha ka mahefà! Aza matahotra na mivadi-po fa ny TOMPO Andriamanitra, ilay Andriamanitro, no miaraka aminao. Tsy handao na hahafoy anao Izy mandra-pahavita ny asa rehetra fanatontosana ny tranon’ny TOMPO. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Indreo ny antoko-mpisorona sy levita, hanao ny fanompoana rehetra ao an-tempolin’Andriamanitra; mba hahavitana ny asa manontolo, dia miaraka aminao koa ireo olona feno risimpo sady kinga amin’ny taozavatra isan-karazany; ary ny lehibe mbamin’ny vahoaka rehetra dia hankatò ny baikonao an-tsakany sy an-davany.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa hoy Andriamanitra tamiko: «Tsy hanorina tempoly hanajana Ahy ianao, satria lehilahy mpiady sy mpandatsa-dra». '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nefa kosa ny TOMPO, Andriamanitr’i Israely, efa nifidy ahy teo anivon’ny ankohonan-draiko rehetra mba ho mpanjaka hifehy an’i Israely hatrany. Satria i Joda no voafidiny ho mpanapaka; teo anivon’ny fokon’i Joda, dia ny ankohonan-draiko no voafidiny; ary teo anivon’ny ankohonan-draiko, dia ny tenako no nankasitrahiny hampanjakaina amin’i Israely manontolo. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tamin’ny zanakalahiko rehetra kosa (fa nomen’ny TOMPO zanakalahy maro aho), dia i Salômôna zanako no nofidiny hipetraka eo amin’ilay sezafiandrianana manambara ny fanjakàn’ny TOMPO amin’i Israely. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary hoy Izy tamiko: «I Salômôna zanakao no hanorina ny tranoko sy hamboatra ireo kianjako; fa efa nifidy azy Aho, ka izy ho zanako ary Izaho ho rainy. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hataoko mijoro mandrakizay ny fanjakàny, raha maharitra manatanteraka ny didiko sy ny fitsipiko izy tahaka ny amin’izao anio izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.7 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 2-7:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 17.1-14; 2 Sam 7.1-16.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa ankehitriny, ry havako, eto imason’ny vahoaka Israely rehetra izay fiangonan’ny TOMPO ary eto anatrehan’ilay Andriamanitsika Izay mandre antsika, dia tandremo sy diniho ny didy rehetra avy amin’ny TOMPO Andriamanitrareo mba hahatananareo ity tany ity sady hamindranareo azy amin’ny zanaka amam-paranareo ho lova maharitra mandrakizay.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ianao kosa, ry Salômôna zanako, fantaro ilay Andriamanitra notompoin’ny rainao, ka manompoa Azy amin’ny fo manontolo sy amin’ny fanahy mazoto; fa ny TOMPO dia mpandinika ny fon’ny olona rehetra ary mpahafantatra ny fieritreretana rehetra. Raha mitady Azy ianao, dia hahita Azy; fa raha mandao Azy kosa ianao, dia hariany mandrakizay. '
