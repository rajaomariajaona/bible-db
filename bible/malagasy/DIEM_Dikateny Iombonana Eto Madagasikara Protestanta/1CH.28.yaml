    children:
    - type: text
      text: Atolotr’i Davida ho dimbiny i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorin’i Davida tany Jerosalema ny lehibe rehetra tamin’ny Israely: filohan’ireo foko, lehiben’ny andian-tafika manompo ny mpanjaka, komandin-tafika mpifehy arivo na mpifehy zato, mpiandraikitra ny fananana sy biby fiompy rehetra an’ny mpanjaka sy an-janany, tandapa, lehilahy mahery, izany hoe ny manampahefana rehetra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro efa nofidin’ny TOMPO ianao izao mba hanorina '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasiny
    - type: text
      text: ; dia mahereza ka mahefà.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omen’i Davida an’i Salômôna ny sarin-trano momba ny tempoly
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nomen’i Davida an’i Salômôna zanany ny sarin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' sy ny trano fanampiny –efitrano firaketana, efitrano ambony, efitrano anatiny –ary ny trano hisy ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina mirakitra ny fanekempihavanan’ny Tompo
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomeny azy koa ny sarin’izay rehetra efa nokasainy hatao momba ireo kianja ao an-tranon’ny TOMPO mbamin’ny efitrano rehetra manodidina ireo kianja: efitrano fitahirizana ny zava-tsarobidin’ny tranon’Andriamanitra sy fitahirizana ny zava-tsarobidy natokana ho an’ny Tompo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomeny azy ny amin’ny fitsinjarana ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ho antokony, ny amin’ny fanompoana rehetra ho fanao ao an-tranon’ny TOMPO ary ny amin’ny fanaka rehetra ho fampiasa ao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomeny azy ny lanjam-bolamena ilaina ho an’ny fanaka volamena rehetra samy hampiasaina, ny lanjam-bolafotsy ilaina ho an’ny fanaka volafotsy rehetra samy hampiasaina, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny lanjan’ny fitoeran-jiro sy fanaovan-jiro volamena araka ny karazany avy, ny lanjan’ny fitoeran-jiro sy fanaovan-jiro volafotsy araka ny karazany avy, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny lanjan’ny volamena ilaina isaky ny latabatra volamena fametrahana ny mofo
