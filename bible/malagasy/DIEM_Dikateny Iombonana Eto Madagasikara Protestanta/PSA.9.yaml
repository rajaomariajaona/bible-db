  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Any amin’ny fonenan’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: no aoka hiverenan’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo tsy mpivavaka rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mpanadino an’Andriamanitra!
- type: usfm
  marker: sp
  children:
  - type: text
    text: KAFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Andriamanitra kosa tsy hanadino
- type: usfm
  marker: q1
  children:
  - type: text
    text: na oviana na oviana ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ho very mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanantenan’ireo mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mirotsaha an-tsehatra re, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza avela hahery noho Ianao ny olona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ireo hafa firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: hotsaraina eo anatrehanao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'TOMPO ô, ampitahory ireo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka ho fantatry ny hafa firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa olombelona fotsiny ihany anie izy!
