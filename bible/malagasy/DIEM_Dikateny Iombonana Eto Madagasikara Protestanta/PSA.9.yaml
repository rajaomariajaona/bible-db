document_id: PSA.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tompo no mpamonjy ny mahantra sy ny ampahorîna
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hohiraina araka ny feon’ny hoe «Ny fahafatesan-janaka
  - type: note
    content: 'Hohiraina... fahafatesan-janaka: jereo Sal 46.1 sy nta.'
  - type: text
    content: '.» '
  - type: text
    content: Salamo nataon’i Davida.
  - type: heading
    content: ALEFA
  '10':
  - type: text
    content: Ny TOMPO no fialofana ho an’ny ampahorîna,
  - type: text
    content: eny, fialofana amin’ny andro mahory.
  '11':
  - type: text
    content: Aoka hiantehitra aminao
  - type: text
    content: ireo mahalala tsara Anao,
  - type: text
    content: satria Ianao tsy mba mandao
  - type: text
    content: izay mitady Anao, TOMPO ô!
  - type: heading
    content: ZAINA
  '12':
  - type: text
    content: Ankalazao amin’ny zava-maneno
  - type: text
    content: 'ny TOMPO Izay monina ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: ary ambarao amin’ireo firenena
  - type: text
    content: ny zava-mahatalanjona nataony;
  '13':
  - type: text
    content: satria mikaroka ny mpamono olona Izy
  - type: text
    content: sady mahatsiaro ireo voavono ho faty
  - type: text
    content: sy ny fitarainan’ireo mahantra.
  - type: heading
    content: HETA
  '14':
  - type: text
    content: Iantrao aho, TOMPO ô, ka jereo ny fahoriako,
  - type: text
    content: noho ny afitsoky ny mpankahala ahy;
  - type: text
    content: Ianao no misintona ahy ho afaka
  - type: text
    content: amin’ny hasomparan’ny fahafatesana.
  '15':
  - type: text
    content: Amin’izay dia hotanisaiko avokoa
  - type: text
    content: ireo anton-javatra iderako Anao;
  - type: text
    content: ao an-tanànan’i Tsiôna no hiravoako,
  - type: text
    content: satria Mpamonjy ahy tokoa Ianao.
  - type: heading
    content: TETA
  '16':
  - type: text
    content: Ny lavaka izay nohadîny ihany
  - type: text
    content: no nianjeran’ireo hafa firenena;
  - type: text
    content: ny fandrika harato nafeniny ihany
  - type: text
    content: no nahavoasingotra ny tongony
  - type: note
    content: Ampit Sal 7.16-17.
  - type: text
    content: .
  '17':
  - type: text
    content: Nampahafantatra ny tenany ny TOMPO
  - type: text
    content: 'fony Izy namoaka ny didim-pitsarany:'
  - type: text
    content: ny fandrika nataon’ny olon-dratsy
  - type: text
    content: no indro nahavoa azy ireo.
  - type: text
    content: Fiatoana
  - type: heading
    content: JODA
  '18':
  - type: text
    content: Any amin’ny fonenan’ny maty
  - type: text
    content: no aoka hiverenan’ny ratsy fanahy,
  - type: text
    content: dia ireo tsy mpivavaka rehetra
  - type: text
    content: izay mpanadino an’Andriamanitra!
  - type: heading
    content: KAFA
  '19':
  - type: text
    content: Andriamanitra kosa tsy hanadino
  - type: text
    content: na oviana na oviana ny malahelo;
  - type: text
    content: ary tsy ho very mandrakizay
  - type: text
    content: ny fanantenan’ireo mahantra.
  '2':
  - type: text
    content: Hidera Anao amin’ny foko manontolo aho, TOMPO ô,
  - type: text
    content: ka hitantara ny zava-mahagaga rehetra nataonao.
  '20':
  - type: text
    content: Mirotsaha an-tsehatra re, TOMPO ô,
  - type: text
    content: aza avela hahery noho Ianao ny olona.
  - type: text
    content: Enga anie ireo hafa firenena
  - type: text
    content: hotsaraina eo anatrehanao!
  '21':
  - type: text
    content: 'TOMPO ô, ampitahory ireo:'
  - type: text
    content: aoka ho fantatry ny hafa firenena
  - type: text
    content: fa olombelona fotsiny ihany anie izy!
  '3':
  - type: text
    content: Ho faly sy ravo aminao aho, ry Avo Indrindra ô,
  - type: text
    content: ary hankalaza ny anaranao amin’ny zava-maneno.
  - type: heading
    content: BETA
  '4':
  - type: text
    content: Miverina ilalana ireo fahavaloko;
  - type: text
    content: lavo izy ka ringana teo anoloanao.
  '5':
  - type: text
    content: Eo ambonin’ilay sezafiandriananao
  - type: text
    content: no ipetrahanao ho Mpitsara marina;
  - type: text
    content: ka niaro ny zoko Ianao
  - type: text
    content: ary nanome rariny ahy.
  - type: heading
    content: GIMELA
  '6':
  - type: text
    content: Norahonanao ny hafa firenena
  - type: text
    content: ary naringanao ny olon-dratsy;
  - type: text
    content: nokosehinao ny fahatsiarovana azy
  - type: text
    content: mba ho levona mandrakizay.
  '7':
  - type: text
    content: Nifarana hatreo ny amin’ny fahavalonay,
  - type: text
    content: satria rava tanteraka izy;
  - type: text
    content: efa narodanao ireo tanànany,
  - type: text
    content: ka tsy hotsarovana intsony.
  - type: heading
    content: HE
  '8':
  - type: text
    content: 'Injay ny TOMPO Izay maharitra mandrakizay:'
  - type: text
    content: mametraka ny sezafiandrianana hitsarany Izy,
  '9':
  - type: text
    content: ka hitsara izao tontolo izao araka ny rariny
  - type: text
    content: sy hanapaka ny firenena araka ny hitsiny.
  - type: heading
    content: VAO
