  children:
  - type: text
    text: ALEFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hidera Anao amin’ny foko manontolo aho, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitantara ny zava-mahagaga rehetra nataonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho faly sy ravo aminao aho, ry Avo Indrindra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hankalaza ny anaranao amin’ny zava-maneno.
- type: usfm
  marker: sp
  children:
  - type: text
    text: BETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miverina ilalana ireo fahavaloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: lavo izy ka ringana teo anoloanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eo ambonin’ilay sezafiandriananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ipetrahanao ho Mpitsara marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka niaro ny zoko Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanome rariny ahy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: GIMELA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Norahonanao ny hafa firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary naringanao ny olon-dratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nokosehinao ny fahatsiarovana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho levona mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nifarana hatreo ny amin’ny fahavalonay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria rava tanteraka izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa narodanao ireo tanànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hotsarovana intsony.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Injay ny TOMPO Izay maharitra mandrakizay:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mametraka ny sezafiandrianana hitsarany Izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ka hitsara izao tontolo izao araka ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanapaka ny firenena araka ny hitsiny.
- type: usfm
  marker: sp
  children:
  - type: text
    text: VAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny TOMPO no fialofana ho an’ny ampahorîna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fialofana amin’ny andro mahory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka hiantehitra aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mahalala tsara Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Ianao tsy mba mandao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitady Anao, TOMPO ô!
- type: usfm
  marker: sp
  children:
  - type: text
    text: ZAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ankalazao amin’ny zava-maneno
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny TOMPO Izay monina ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ambarao amin’ireo firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zava-mahatalanjona nataony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: satria mikaroka ny mpamono olona Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mahatsiaro ireo voavono ho faty
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fitarainan’ireo mahantra.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Iantrao aho, TOMPO ô, ka jereo ny fahoriako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny afitsoky ny mpankahala ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no misintona ahy ho afaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny hasomparan’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Amin’izay dia hotanisaiko avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo anton-javatra iderako Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-tanànan’i Tsiôna no hiravoako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Mpamonjy ahy tokoa Ianao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TETA
