- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny lavaka izay nohadîny ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nianjeran’ireo hafa firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fandrika harato nafeniny ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nahavoasingotra ny tongony
  - type: usfm
