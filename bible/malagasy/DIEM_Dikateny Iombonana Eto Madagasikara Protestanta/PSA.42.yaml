document_id: PSA.42,396
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHAROA
  - type: heading
    content: (Salamo 42–72)
  - type: heading
    content: SALAMO Tahaka ny diera maniry ny ranovelona aho
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Tononkalo fananarana nataon’ny terak’i Kôra
  - type: note
    content: 'Tononkalo fananarana: jereo Sal 32.1 sy nta. –Ireo terak’i Kôra: jereo 1 Tan 6.22; Nom 16; 26.11.'
  - type: text
    content: .
  '10':
  - type: text
    content: Ka dia izao no teny lazaiko
  - type: text
    content: 'amin’Andriamanitra Vatolampiko:'
  - type: text
    content: «Nahoana moa Ianao no nanadino ahy?
  - type: text
    content: Nahoana aho no nampahorîn’ny fahavaloko
  - type: text
    content: ka manjary miaina mijoretra toy izao?»
  '11':
  - type: text
    content: Ny fandatsalatsàny ahy
  - type: text
    content: dia toa mahatorotoro ny taolako,
  - type: text
    content: 'noho izaho ilazany foana hoe:'
  - type: text
    content: «Aiza ity Andriamanitrao?»
  '12':
  - type: text
    content: Nahoana re aho no mitanondrika
  - type: text
    content: sy mitoloko toy izao ato anatiko?
  - type: text
    content: Aoka Andriamanitra no hitokiako!
  - type: text
    content: Eny, mbola hoderaiko hatrany Izy,
  - type: text
    content: dia ilay Mpamonjiko sady Andriamanitro!
  '2':
  - type: text
    content: Tahaka ny diera maniry ranovelona
  - type: text
    content: no aniriako Anao, Andriamanitra ô.
  '3':
  - type: text
    content: Mangetaheta an’Andriamanitra aho,
  - type: text
    content: dia ilay Andriamanitra velona.
  - type: text
    content: Rahoviana aho no hiditra an-
  - type: text
    content: tempoliny
  - type: text
    content: mba ho afaka hiseho eo anatrehany?
  '4':
  - type: text
    content: Ranomaso no zary sakafoko
  - type: text
    content: na andro izany na alina,
  - type: text
    content: 'noho izaho ilazana foana hoe:'
  - type: text
    content: «Aiza ity Andriamanitrao?»
  '5':
  - type: text
    content: Hontsa tokoa aho mahatsiaro ny fahiny
  - type: text
    content: fony aho niaraka tamin’ny besinimaro
  - type: text
    content: nandroso nankao an-tranon’Andriamanitra,
  - type: text
    content: ombàn’ny feo fihobiana sy fiderana
  - type: text
    content: redonim-bahoaka indray mankalaza.
  '6':
  - type: text
    content: Nahoana re aho no mitanondrika
  - type: text
    content: sy mitoloko toy izao ato anatiko?
  - type: text
    content: Aoka Andriamanitra no hitokiako!
  - type: text
    content: Eny, mbola hoderaiko hatrany Izy,
  - type: text
    content: dia ilay Mpamonjiko sady Andriamanitro!
  '7':
  - type: text
    content: Tsy hitanondrika foana aho, Tompo ô,
  - type: text
    content: fa aleoko mivetsovetso Anao
  - type: text
    content: avy atỳ amin’ny faritra iandohan’i Jôrdàna,
  - type: text
    content: dia ny tendrombohitra Hermôna sy Mitsehara.
  '8':
  - type: text
    content: Mitambolimbolina ny ranobe,
  - type: text
    content: satria mirohondrohona ny riananao;
  - type: text
    content: miantonta toy izany hanafotra ahy avokoa
  - type: text
    content: ny onja aman’alondranom-pahoriana alefanao.
  '9':
  - type: text
    content: Ny TOMPO anie haneho fitia amiko nony andro;
  - type: text
    content: izaho kosa, nony alina, hihira sy hidera
  - type: text
    content: an’ilay Andriamanitra fototry ny aiko.
