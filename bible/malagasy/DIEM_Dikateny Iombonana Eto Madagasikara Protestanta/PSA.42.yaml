  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tahaka ny diera maniry ranovelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no aniriako Anao, Andriamanitra ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mangetaheta an’Andriamanitra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay Andriamanitra velona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana aho no hiditra an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliny
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho afaka hiseho eo anatrehany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ranomaso no zary sakafoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: na andro izany na alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'noho izaho ilazana foana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aiza ity Andriamanitrao?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hontsa tokoa aho mahatsiaro ny fahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fony aho niaraka tamin’ny besinimaro
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandroso nankao an-tranon’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ombàn’ny feo fihobiana sy fiderana
- type: usfm
  marker: q1
  children:
  - type: text
    text: redonim-bahoaka indray mankalaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nahoana re aho no mitanondrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mitoloko toy izao ato anatiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka Andriamanitra no hitokiako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mbola hoderaiko hatrany Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay Mpamonjiko sady Andriamanitro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy hitanondrika foana aho, Tompo ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aleoko mivetsovetso Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy atỳ amin’ny faritra iandohan’i Jôrdàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny tendrombohitra Hermôna sy Mitsehara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitambolimbolina ny ranobe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria mirohondrohona ny riananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miantonta toy izany hanafotra ahy avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny onja aman’alondranom-pahoriana alefanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny TOMPO anie haneho fitia amiko nony andro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izaho kosa, nony alina, hihira sy hidera
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’ilay Andriamanitra fototry ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ka dia izao no teny lazaiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’Andriamanitra Vatolampiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nahoana moa Ianao no nanadino ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana aho no nampahorîn’ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manjary miaina mijoretra toy izao?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fandatsalatsàny ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toa mahatorotoro ny taolako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'noho izaho ilazany foana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aiza ity Andriamanitrao?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahoana re aho no mitanondrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mitoloko toy izao ato anatiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka Andriamanitra no hitokiako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mbola hoderaiko hatrany Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay Mpamonjiko sady Andriamanitro!
