document_id: JOS.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zaratanin’i Simehôna
  - type: text
    content: 'Ny anjara navoakan’ny antsapaka faharoa dia azon’ny foko simehônita ho an’ireo tarika ao anatiny. Ny zarataniny dia tao anivon’ny an’ireo taranak’i Joda. '
  '10':
  - type: text
    content: Ny anjara voatendrin’ny antsapaka fahatelo dia azon’ny Zebolonita ho an’ireo tarika ao anatiny
  - type: note
    content: Ny faritanin’i Zebolòna dia teo afovoan’i Galilea ambany, teo anelanelan’ny fokon’i Naftalỳ (and 32 sy nta) sy ny fokon’i Asera (jereo and 24 sy nta).
  - type: text
    content: '. Ny velaran’ny zarataniny dia mitatra hatrany Sarida. '
  '11':
  - type: text
    content: 'Avy eo ny sisin-taniny dia miankandrefana hatrany Marehala, ka mahazo an’i Dabeseta ary koa ny lohasahan-driaka izay eo atsinanan’i Jôknehama. '
  '12':
  - type: text
    content: 'Raha hatreo Sarida kosa no miantsinanana, ny sisin-tany dia mipaka any amin’ny faritanin’i Kislôta-Jabôra, sy mandroso hatrany Daberata ary miakatra hatrany Jafia. '
  '13':
  - type: text
    content: 'Avy eo miampita miantsinanana any Gata-Hefera sy Heta-Katsîma, dia mandroso hatrany Rimôna ary mipaka any Neha. '
  '14':
  - type: text
    content: 'Any avaratra dia mihodidina an’i Hanatôna ny sisin-tany ka miafara ao amin’ny lohasahan’i Jiftahela. '
  '15':
  - type: text
    content: Ny velaran-tanin’i Zebolòna dia nisy tanàn-dehibe 12 samy miampy ireo tanàna kely miankina aminy; ka anisan’ireo tanàna 12 ireo i Katata, i Nahalala, i Simrôna, i Jidalà, ary i Betlehema
  - type: note
    content: I Betlehema ao amin’ny tanin’i Zebolòna dia hafa noho ilay Betleheman’i Joda voalaza ao amin’ny 1 Sam 17.12 sy Rot 1.1.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Ireo tanàn-dehibe rehetra ireo miampy ny tanàna kely miankina aminy no zaratanin’ny Zebolonita ho an’ireo tarika ao anatiny.
  - type: heading
    content: Ny zaratanin’i Jisakara
  '17':
  - type: text
    content: Ny anjara navoakan’ny antsapaka fahefatra dia azon’ny taranak’i Jisakara ho an’ireo tarika ao anatiny
  - type: note
    content: Ny faritanin’i Jisakara dia tao atsimon’ny farihin’i Genesareta, any andrefan’i Jôrdàna.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Ka ny velaran-taniny dia mahafaoka an’ireto tanàn-dehibe ireto: i Jizrehela'
  - type: note
    content: Ny tanàna Jizrehela no nanome anarana an’ilay lemaka mahavokatra izay mamakivaky an’i Galilea hatreo atsinanana ka hatrany andrefana (jereo 17.16).
  - type: text
    content: ', i Kesolôta, i Sonema, '
  '19':
  - type: text
    content: 'i Hafaraîma, i Siôny, i Anaharata, '
  '2':
  - type: text
    content: 'Anisan’izany i Beera-Seba, i Seba, i Môladà, '
  '20':
  - type: text
    content: 'i Rabita, i Kisiôna, i Ebetsy, '
  '21':
  - type: text
    content: 'i Remeta, i Haîna-Ganima, i Haîna-Hadà, ary i Bety-Patsetsa. '
  '22':
  - type: text
    content: Ny sisin-tany dia mihazo an’i Jabôra sy i Sahatsaîma ary i Bety-Semesa, ka miafara any Jôrdàna
  - type: note
    content: Ny tanàna Tabôra no nanome anarana an’ilay tendrombohitra Tabôra, eo amin’ny sisin-tany mampisaraka an’i Zebolòna sy i Jisakara ary i Naftalỳ. I Bety-Semesa dia hafa noho ireo tanàna mitovy anarana aminy voalaza ao amin’ny 15.10 sy 19.38.
  - type: text
    content: '. Ny velaran-tanin’i Jisakara dia nisy tanàn-dehibe 16 samy miampy ireo tanàna kely miankina aminy. '
  '23':
  - type: text
    content: Ireo tanàn-dehibe rehetra ireo miampy ny tanàna kely miankina aminy no zaratany nolovan’ny foko taranak’i Jisakara ho an’ireo tarika ao anatiny.
  - type: heading
    content: Ny zaratanin’i Asera
  '24':
  - type: text
    content: Ny anjara navoakan’ny antsapaka fahadimy dia azon’ny foko aserita ho an’ireo tarika ao anatiny
  - type: note
    content: Ny fokon’i Asera no mitoetra amin’ny morontsiraka avaratr’i Palestinina.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Ka ny velaran-taniny dia mahafaoka an’ireto tanàn-dehibe ireto: I Helkata, i Halỳ, i Betèna, i Aksafa, '
  '26':
  - type: text
    content: i Alameleka, i Hamehada ary i Misala. Ny sisin-tany, lafy andrefana dia mipaka amin’ny tendrombohitra Karmela
  - type: note
    content: Ny tendrombohitra Karmela dia tandavan-tendrombohitra mandroso any amin’ny Ranomasina Mediteranea ka manjary tanjona.
  - type: text
    content: ' sy amin’ny lohasahan-driaka Sihôra-Libnata. '
  '27':
  - type: text
    content: 'Ny sisin-tany, lafy atsinanana, dia mitodika ho any Bety-Dagôna ka mifandray amin’ny tanin’i Zebolòna sy mihazo ny lohasahan’i Jiftahela ary mianavaratra mankany Bety-Hemeka sy Nohiela. Avy eo mandalo amin’ireto tanàn-dehibe ireto: dia i Kabela, i Misala'
  - type: note
    content: Misala araka ny 21.30; fa Mismôla araka ny TM.
  - type: text
    content: ', '
  '28':
  - type: text
    content: i Habdôna
  - type: note
    content: Habdôna araka ny stf sasany sady mifanaraka amin’ny 21.30 sy 1 Tan 6.39 fa ny TM dia manao hoe Hebrôna.
  - type: text
    content: ', i Rehôba, i Hamôna, ary i Kanà; ka miafara any Tsidôna, tanàna lehibe. '
  '29':
  - type: text
    content: Avy eo ny sisin-tany dia mihodina hatrany Ramà sy hatrany Tiro tanàna mimanda
  - type: note
    content: Ny tanàna mimandan’i Tiro dia ilay nosy voahodidina manda manoloana ny tanànan’i Tiro, izay seranan-tsambo amin’ny morontsiraka fenisianina.
  - type: text
    content: ', dia mihodina ho any Hôsa ary mihatra amin’ny Ranomasina Mediteranea ka mahafaoka an’ireto tanàn-dehibe ireto: i Mehaleba, i Akziba, '
  '3':
  - type: text
    content: 'i Hatsara-Sohala, i Balà, i Hetsema, '
  '30':
  - type: text
    content: 'i Homà, i Afeka ary i Rehôba. Ny velaran-tanin’i Jisakara dia nisy tanàn-dehibe 22 samy miampy ny tanàna kely miankina aminy. '
  '31':
  - type: text
    content: Ireo tanàn-dehibe ireo miampy ny tanàna kely miankina aminy no zaratany nolovan’ny fokon’i Asera ho an’ireo tarika ao anatiny.
  - type: heading
    content: Ny zaratanin’i Naftalỳ
  '32':
  - type: text
    content: Ny anjara navoakan’ny antsapaka fahenina dia azon’ny taranak’i Naftalỳ ho an’ireo tarika ao anatiny
  - type: note
    content: Ny fokon’i Naftalỳ no mitoetra amin’ny faritany ao avaratry ny farihin’i Genesareta.
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Ny sisin-taniny, lafy avaratra, dia miainga hatreo Helefa, hatreo amin’ilay oaka akaikin’i Tsahananima, dia mandalo an’i Adamỳ-Nekeba sy i Jabneela, ka tonga hatrany Lakôma ary miafara eo Jôrdàna. '
  '34':
  - type: text
    content: Eo andrefan’i Helefa kosa dia mihodina mankany Aznôta-Jabôra ilay sisin-tany ary mandroso hatrany Hakôla. Miolotra amin’ny tanin’i Zebolòna kosa ny sisin-tany, lafy atsimo; miolotra amin’ny tanin’i Asera ny sisin-tany, lafy andrefana
  - type: note
    content: 'ary i Jôrdàna... atsinanana: araka ny dkt grika tranainy Septoazinta; fa ny TM kosa manao hoe ary miolotra amin’ny tanin’i Joda amoron’i Jôrdàna ny sisin-tany lafy atsinanana (tsy marina mihitsy raha jerena ny saritany ity fitenenana an’i Joda etoana ity).'
  - type: text
    content: '; ary i Jôrdàna no sisin-tany, lafy atsinanana. '
  '35':
  - type: text
    content: 'Ireo tanàna mimanda kosa dia i Tsidima, i Tsera, i Hamata, i Kinereta, '
  '36':
  - type: text
    content: 'i Adamà, i Ramà, i Hatsôra, '
  '37':
  - type: text
    content: 'i Kedesa, i Edrehỳ, i Haîna-Hatsôra, '
  '38':
  - type: text
    content: 'i Jirôna, i Migdaliela, i Hôrema, i Bety-Hanata ary i Bety-Semesa; izany hoe tanàn-dehibe 19 samy miampy ny tanàna kely miankina aminy. '
  '39':
  - type: text
    content: Ireo tanàn-dehibe ireo miampy ny tanàna kely miankina aminy no zaratany nolovan’ny foko taranak’i Naftalỳ ho an’ireo tarika ao anatiny.
  - type: heading
    content: Ny zaratanin’i Dana
  '4':
  - type: text
    content: 'i Eltôlada, i Betola, i Hôrmà, '
  '40':
  - type: text
    content: Ny anjara navoakan’ny antsapaka fahafito dia azon’ny foko danita ho an’ireo tarika ao anatiny
  - type: note
    content: Ny fokon’i Dana tamin’ny voalohany dia nipetraka nanamorona ny Ranomasina Mediteranea teo andrefan’i Benjamîna, ao amin’ny faritanin’i Jafà.
  - type: text
    content: '. '
  '41':
  - type: text
    content: 'Ny velaran-taniny dia mahafaoka an’ireto tanàna ireto: i Tsôrehà, i Estaôla, i Hira-Semesy, '
  '42':
  - type: text
    content: 'i Sahalabîna, i Aialôna, i Jitlà, '
  '43':
  - type: text
    content: 'i Elôna, i Timnà, i Hekrôna, '
  '44':
  - type: text
    content: 'i Eltekè, i Gibetôna, i Bahalato, '
  '45':
  - type: text
    content: 'i Jehoda, i Bene-Beràka, i Gata-Rimôna, '
  '46':
  - type: text
    content: ary i Rakôna; ao koa ny ranon’i Jarkôna
  - type: note
    content: I Jarkôna no renirano manondraka an’i Jafà.
  - type: text
    content: ' sy ny tany manodidina an’i Jafao. '
  '47':
  - type: text
    content: Nony tsy voatanan’ny Danita io faritany io, dia nianavaratra ireo ka niady tamin’i Lesema. Nalainy ny tanàna ary naringany tamin’ny sabatra ny mponina tao; lasany tanteraka i Lesema ka nipetrahany. Ary i Lesema dia nantsoiny hoe Dana, araka ny anaran’i Dana razambeny
  - type: note
    content: Ny fokon’i Dana dia nandao ny taniny voalohany mba hiorim-ponenana any avaratra manodidina an’i Lesema, eo akaikin’ny loharanon’i Jôrdàna.
  - type: text
    content: '. '
  '48':
  - type: text
    content: Ireo tanàn-dehibe ireo samy miampy ny tanàna kely miankina aminy no zaratany nolovan’ny foko danita ho an’ireo tarika ao anatiny.
  '49':
  - type: text
    content: 'Ary rehefa vitan’ny Israelita ny fizaràna ny tany araka ny sisin-taniny avy, dia nomeny zaratany kosa i Josoa, zanakalahin’i Nona. '
  '5':
  - type: text
    content: 'i Tsiklaga, i Bety-Markabôta, i Hatsara-Sosà, '
  '50':
  - type: text
    content: Araka ny baikon’ny TOMPO, dia nomena an’i Josoa ny tanàna izay nangatahiny, izany hoe i Timnata-Sera ao amin’ny tendrombohitr’i Efraîma. Dia namboarin’i Josoa ilay tanàna ka nonenany.
  '51':
  - type: text
    content: I Elehazara mpisorona
  - type: note
    content: Jereo 14.1 sy nta.
  - type: text
    content: ' sy i Josoa zanakalahin’i Nona ary ny filoham-pianakaviana israelita no nizara ireo tany lova ireo. Tao Silao no nizarany azy antsapaka teo anatrehan’ny TOMPO, dia teo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: . Toy izany no nahavitana ny fizaràna ny tany.
  '6':
  - type: text
    content: 'i Bety-Lebaôta ary i Saroheny: izany hoe tanàn-dehibe 13 samy miampy ireo tanàna kely miankina aminy. '
  '7':
  - type: text
    content: 'Tao koa i Haîna, i Rimôna, i Hetera ary i Hasàna: izany hoe tanàn-dehibe efatra miampy ireo tanàna kely miankina aminy, '
  '8':
  - type: text
    content: 'dia ireo tanàna kely rehetra hatrany Bahalato-Beera sy hatrany Ramata-Negeba. Izany no zaratany nolovan’ny foko simehônita ho an’ireo tarika ao anatiny. '
  '9':
  - type: text
    content: Ny zaratany azon’ny Simehônita dia nalaina tamin’ny anjaran’ireo taranak’i Joda satria nalalaka ho an’ny taranak’i Joda ny zaratany azony. Izany no nahazoan’ny taranak’i Simehôna anjara teo anivon’ny lovan’i Joda.
  - type: heading
    content: Ny zaratanin’i Zebolòna
