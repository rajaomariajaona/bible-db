      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ary i Jôrdàna... atsinanana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika tranainy Septoazinta; fa ny TM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary miolotra amin’ny tanin’i Joda amoron’i Jôrdàna ny sisin-tany lafy atsinanana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (tsy marina mihitsy raha jerena ny saritany ity fitenenana an’i Joda etoana ity).'
      marker-yv: yv-n
    - type: text
      text: '; ary i Jôrdàna no sisin-tany, lafy atsinanana. '
