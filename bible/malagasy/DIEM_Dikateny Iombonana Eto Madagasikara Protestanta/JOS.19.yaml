document_id: JOS.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratanin’i Simehôna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny anjara navoakan’ny antsapaka faharoa dia azon’ny foko simehônita ho an’ireo tarika ao anatiny. Ny zarataniny dia tao anivon’ny an’ireo taranak’i Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny anjara voatendrin’ny antsapaka fahatelo dia azon’ny Zebolonita ho an’ireo tarika ao anatiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: faritanin’i Zebolòna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia teo afovoan’i Galilea ambany, teo anelanelan’ny fokon’i Naftalỳ (and 32 sy nta) sy ny fokon’i Asera (jereo and 24 sy nta).'
      marker-yv: yv-n
    - type: text
      text: '. Ny velaran’ny zarataniny dia mitatra hatrany Sarida. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Avy eo ny sisin-taniny dia miankandrefana hatrany Marehala, ka mahazo an’i Dabeseta ary koa ny lohasahan-driaka izay eo atsinanan’i Jôknehama. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha hatreo Sarida kosa no miantsinanana, ny sisin-tany dia mipaka any amin’ny faritanin’i Kislôta-Jabôra, sy mandroso hatrany Daberata ary miakatra hatrany Jafia. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Avy eo miampita miantsinanana any Gata-Hefera sy Heta-Katsîma, dia mandroso hatrany Rimôna ary mipaka any Neha. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Any avaratra dia mihodidina an’i Hanatôna ny sisin-tany ka miafara ao amin’ny lohasahan’i Jiftahela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny velaran-tanin’i Zebolòna dia nisy tanàn-dehibe 12 samy miampy ireo tanàna kely miankina aminy; ka anisan’ireo tanàna 12 ireo i Katata, i Nahalala, i Simrôna, i Jidalà, ary i Betlehema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Betlehema
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ao amin’ny tanin’i Zebolòna dia hafa noho ilay Betleheman’i Joda voalaza ao amin’ny 1 Sam 17.12 sy Rot 1.1.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ireo tanàn-dehibe rehetra ireo miampy ny tanàna kely miankina aminy no zaratanin’ny Zebolonita ho an’ireo tarika ao anatiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratanin’i Jisakara
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny anjara navoakan’ny antsapaka fahefatra dia azon’ny taranak’i Jisakara ho an’ireo tarika ao anatiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: faritanin’i Jisakara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tao atsimon’ny farihin’i Genesareta, any andrefan’i Jôrdàna.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ka ny velaran-taniny dia mahafaoka an’ireto tanàn-dehibe ireto: i Jizrehela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny tanàna '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jizrehela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no nanome anarana an’ilay lemaka mahavokatra izay mamakivaky an’i Galilea hatreo atsinanana ka hatrany andrefana (jereo 17.16).'
      marker-yv: yv-n
    - type: text
      text: ', i Kesolôta, i Sonema, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'i Hafaraîma, i Siôny, i Anaharata, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Anisan’izany i Beera-Seba, i Seba, i Môladà, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'i Rabita, i Kisiôna, i Ebetsy, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'i Remeta, i Haîna-Ganima, i Haîna-Hadà, ary i Bety-Patsetsa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny sisin-tany dia mihazo an’i Jabôra sy i Sahatsaîma ary i Bety-Semesa, ka miafara any Jôrdàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny tanàna '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tabôra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no nanome anarana an’ilay tendrombohitra Tabôra, eo amin’ny sisin-tany mampisaraka an’i Zebolòna sy i Jisakara ary i Naftalỳ. I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bety-Semesa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia hafa noho ireo tanàna mitovy anarana aminy voalaza ao amin’ny 15.10 sy 19.38.'
      marker-yv: yv-n
    - type: text
      text: '. Ny velaran-tanin’i Jisakara dia nisy tanàn-dehibe 16 samy miampy ireo tanàna kely miankina aminy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ireo tanàn-dehibe rehetra ireo miampy ny tanàna kely miankina aminy no zaratany nolovan’ny foko taranak’i Jisakara ho an’ireo tarika ao anatiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zaratanin’i Asera
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny anjara navoakan’ny antsapaka fahadimy dia azon’ny foko aserita ho an’ireo tarika ao anatiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny fokon’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Asera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no mitoetra amin’ny morontsiraka avaratr’i Palestinina.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ka ny velaran-taniny dia mahafaoka an’ireto tanàn-dehibe ireto: I Helkata, i Halỳ, i Betèna, i Aksafa, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: i Alameleka, i Hamehada ary i Misala. Ny sisin-tany, lafy andrefana dia mipaka amin’ny tendrombohitra Karmela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny tendrombohitra '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Karmela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tandavan-tendrombohitra mandroso any amin’ny Ranomasina Mediteranea ka manjary tanjona.'
      marker-yv: yv-n
    - type: text
      text: ' sy amin’ny lohasahan-driaka Sihôra-Libnata. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ny sisin-tany, lafy atsinanana, dia mitodika ho any Bety-Dagôna ka mifandray amin’ny tanin’i Zebolòna sy mihazo ny lohasahan’i Jiftahela ary mianavaratra mankany Bety-Hemeka sy Nohiela. Avy eo mandalo amin’ireto tanàn-dehibe ireto: dia i Kabela, i Misala'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Misala '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny 21.30; fa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Mismôla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' araka ny TM.'
      marker-yv: yv-n
    - type: text
      text: ', '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: i Habdôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Habdôna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny stf sasany sady mifanaraka amin’ny 21.30 sy 1 Tan 6.39 fa ny TM dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hebrôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', i Rehôba, i Hamôna, ary i Kanà; ka miafara any Tsidôna, tanàna lehibe. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Avy eo ny sisin-tany dia mihodina hatrany Ramà sy hatrany Tiro tanàna mimanda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tanàna mimandan’i Tiro
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia ilay nosy voahodidina manda manoloana ny tanànan’i Tiro, izay seranan-tsambo amin’ny morontsiraka fenisianina.'
      marker-yv: yv-n
    - type: text
      text: ', dia mihodina ho any Hôsa ary mihatra amin’ny Ranomasina Mediteranea ka mahafaoka an’ireto tanàn-dehibe ireto: i Mehaleba, i Akziba, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'i Hatsara-Sohala, i Balà, i Hetsema, '
