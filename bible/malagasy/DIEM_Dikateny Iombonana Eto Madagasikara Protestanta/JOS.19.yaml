  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ny sisin-taniny, lafy avaratra, dia miainga hatreo Helefa, hatreo amin’ilay oaka akaikin’i Tsahananima, dia mandalo an’i Adamỳ-Nekeba sy i Jabneela, ka tonga hatrany Lakôma ary miafara eo Jôrdàna. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Eo andrefan’i Helefa kosa dia mihodina mankany Aznôta-Jabôra ilay sisin-tany ary mandroso hatrany Hakôla. Miolotra amin’ny tanin’i Zebolòna kosa ny sisin-tany, lafy atsimo; miolotra amin’ny tanin’i Asera ny sisin-tany, lafy andrefana
    - type: usfm
