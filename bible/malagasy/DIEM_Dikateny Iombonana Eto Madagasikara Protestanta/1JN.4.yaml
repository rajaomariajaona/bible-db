  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no fitiavana: tsy hoe isika no nitia an’Andriamanitra; fa Izy no nitia antsika, ka naniraka ny Zanany lahitokana ho sorom-panonerana hamelana ny fahotantsika'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry hava-malala, raha toy izany no nitiavan’Andriamanitra antsika, dia mba tokony hifankatia koa isika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy mbola nisy olona nahita an’Andriamanitra na oviana na oviana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 1.18.
      marker-yv: yv-n
    - type: text
      text: ; fa raha mifankatia isika, dia mitoetra ao anatintsika Andriamanitra, ary lavorary ao anatintsika ny fitiavana Azy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ahafantarantsika fa mitoetra ao anatin’Andriamanitra isika ary Izy ao anatintsika, dia ny Fanahiny efa nomeny antsika. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izahay efa nahita ka dia vavolombelona manambara fa naniraka ny Zanany ho Mpamonjy an’izao tontolo izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 3.17; 4.42.
      marker-yv: yv-n
    - type: text
      text: ' ny Ray. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na iza na iza manaiky an’i Jesoa ho Zanak’Andriamanitra, dia mitoetra ao anatiny Andriamanitra ary izy ao anatin’Andriamanitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary isika efa mahalala sy mino ny fitiavan’Andriamanitra antsika.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitra dia fitiavana; koa izay mitoetra ao amin’ny fitiavana no mitoetra ao anatin’Andriamanitra, ary Andriamanitra ao anatiny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no mahalavorary ny fitiavana eo anivontsika: hanan-toky isika amin’ny andro fitsarana, satria tahaka an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' isika eto amin’izao tontolo izao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy mba manan-tahotra ny fitiavana, fa ny fitiavana lavorary mandroaka ny tahotra. Mifantoka amin’ny sazy manko ny tahotra, fa izay matahotra dia mbola tsy lavorary amin’ny fitiavana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tia isika, satria Andriamanitra no efa tia antsika mialoha. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no ahafantaranareo ny Fanahin’Andriamanitra: ny olona rehetra manaiky fa efa tonga olombelona tokoa i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', dia manana ny Fanahy avy amin’Andriamanitra; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy manao hoe: «Manam-pitiavana an’Andriamanitra aho», nefa mankahala ny namana iray finoana, dia mpandainga izy; fa raha ny namana izay hitany aza tsy tiany, hataony ahoana no fitia an’Andriamanitra Izay tsy hitany? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no didy azontsika tamin’i Kristy: izay manam-pitiavana an’Andriamanitra dia tsy maintsy manam-pitiavana ny namana iray finoana koa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 22.36-40; Mk 12.28-31; Lk 10.25-28.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny olona rehetra tsy manaiky an’i Jesoa araka izany, dia tsy manana ny Fanahy avy amin’Andriamanitra: ny fanahy ananany dia ny fanahin’ilay antikristy, izay renareo fa ho avy ary efa eo amin’izao tontolo izao sahady aza ankehitriny.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rey anaka, ianareo dia avy amin’Andriamanitra ary efa naharesy an’ireny mpaminany sandoka ireny; satria lehibe ny Fanahy Masina izay ao anatinareo noho ny fanahy izay ao amin’izao tontolo izao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireny mpaminany sandoka ireny dia anisan’izao tontolo izao, ka izany no itenenany zavatra avy amin’izao tontolo izao sy ihainoan’izao tontolo izao azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izahay kosa dia avy amin’Andriamanitra; ka izay mahalala an’Andriamanitra no mihaino anay, fa izay tsy avy amin’Andriamanitra tsy mba mihaino anay. Izany no ahafantarantsika ny Fanahy fahamarinana sy ny fanahy fahadisoan-kevitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andriamanitra dia fitiavana
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry hava-malala, aoka hifankatia isika, fa avy amin’Andriamanitra ny fitiavana, ary izay rehetra tia no naterak’Andriamanitra sady mahalala an’Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay tsy tia dia tsy mahalala an’Andriamanitra, satria Andriamanitra dia fitiavana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nanehoan’Andriamanitra ny fitiavany antsika: nirahiny ho eo amin’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanany
    - type: text
      text: ' lahitokana mba hahavelona antsika amin’ny alalany'
