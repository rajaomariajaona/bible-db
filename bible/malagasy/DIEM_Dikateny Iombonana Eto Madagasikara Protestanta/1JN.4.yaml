    marker: p
    children:
    - type: text
      text: Ry hava-malala, aza mino izay rehetra milaza hoe manana ny Fanahy Masina, fa zahao toetra ireo hahafantarana raha toa ny Fanahy Masina avy amin’Andriamanitra no manentana azy
