document_id: 1JN.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Fanahy Masina sy ny fanahin’ilay antikristy
  - type: text
    content: Ry hava-malala, aza mino izay rehetra milaza hoe manana ny Fanahy Masina, fa zahao toetra ireo hahafantarana raha toa ny Fanahy Masina avy amin’Andriamanitra no manentana azy
  - type: note
    content: Ampit Gen 13.2-6.
  - type: text
    content: ; satria maro ny mpaminany sandoka eran’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Izao no fitiavana: tsy hoe isika no nitia an’Andriamanitra; fa Izy no nitia antsika, ka naniraka ny Zanany lahitokana ho sorom-panonerana hamelana ny fahotantsika'
  - type: note
    content: Jereo 2.2 sy nta.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ry hava-malala, raha toy izany no nitiavan’Andriamanitra antsika, dia mba tokony hifankatia koa isika. '
  '12':
  - type: text
    content: Tsy mbola nisy olona nahita an’Andriamanitra na oviana na oviana
  - type: note
    content: Ampit Jôh 1.18.
  - type: text
    content: ; fa raha mifankatia isika, dia mitoetra ao anatintsika Andriamanitra, ary lavorary ao anatintsika ny fitiavana Azy.
  '13':
  - type: text
    content: 'Ny ahafantarantsika fa mitoetra ao anatin’Andriamanitra isika ary Izy ao anatintsika, dia ny Fanahiny efa nomeny antsika. '
  '14':
  - type: text
    content: Ary izahay efa nahita ka dia vavolombelona manambara fa naniraka ny Zanany ho Mpamonjy an’izao tontolo izao
  - type: note
    content: Ampit Jôh 3.17; 4.42.
  - type: text
    content: ' ny Ray. '
  '15':
  - type: text
    content: 'Na iza na iza manaiky an’i Jesoa ho Zanak’Andriamanitra, dia mitoetra ao anatiny Andriamanitra ary izy ao anatin’Andriamanitra. '
  '16':
  - type: text
    content: Ary isika efa mahalala sy mino ny fitiavan’Andriamanitra antsika.
  - type: text
    content: 'Andriamanitra dia fitiavana; koa izay mitoetra ao amin’ny fitiavana no mitoetra ao anatin’Andriamanitra, ary Andriamanitra ao anatiny. '
  '17':
  - type: text
    content: 'Izao no mahalavorary ny fitiavana eo anivontsika: hanan-toky isika amin’ny andro fitsarana, satria tahaka an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' isika eto amin’izao tontolo izao. '
  '18':
  - type: text
    content: Tsy mba manan-tahotra ny fitiavana, fa ny fitiavana lavorary mandroaka ny tahotra. Mifantoka amin’ny sazy manko ny tahotra, fa izay matahotra dia mbola tsy lavorary amin’ny fitiavana.
  '19':
  - type: text
    content: 'Tia isika, satria Andriamanitra no efa tia antsika mialoha. '
  '2':
  - type: text
    content: 'Izao no ahafantaranareo ny Fanahin’Andriamanitra: ny olona rehetra manaiky fa efa tonga olombelona tokoa i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ', dia manana ny Fanahy avy amin’Andriamanitra; '
  '20':
  - type: text
    content: 'Raha misy manao hoe: «Manam-pitiavana an’Andriamanitra aho», nefa mankahala ny namana iray finoana, dia mpandainga izy; fa raha ny namana izay hitany aza tsy tiany, hataony ahoana no fitia an’Andriamanitra Izay tsy hitany? '
  '21':
  - type: text
    content: 'Ary izao no didy azontsika tamin’i Kristy: izay manam-pitiavana an’Andriamanitra dia tsy maintsy manam-pitiavana ny namana iray finoana koa'
  - type: note
    content: Ampit Mt 22.36-40; Mk 12.28-31; Lk 10.25-28.
  - type: text
    content: .
  '3':
  - type: text
    content: 'ny olona rehetra tsy manaiky an’i Jesoa araka izany, dia tsy manana ny Fanahy avy amin’Andriamanitra: ny fanahy ananany dia ny fanahin’ilay antikristy, izay renareo fa ho avy ary efa eo amin’izao tontolo izao sahady aza ankehitriny.'
  '4':
  - type: text
    content: 'Rey anaka, ianareo dia avy amin’Andriamanitra ary efa naharesy an’ireny mpaminany sandoka ireny; satria lehibe ny Fanahy Masina izay ao anatinareo noho ny fanahy izay ao amin’izao tontolo izao. '
  '5':
  - type: text
    content: 'Ireny mpaminany sandoka ireny dia anisan’izao tontolo izao, ka izany no itenenany zavatra avy amin’izao tontolo izao sy ihainoan’izao tontolo izao azy. '
  '6':
  - type: text
    content: Fa izahay kosa dia avy amin’Andriamanitra; ka izay mahalala an’Andriamanitra no mihaino anay, fa izay tsy avy amin’Andriamanitra tsy mba mihaino anay. Izany no ahafantarantsika ny Fanahy fahamarinana sy ny fanahy fahadisoan-kevitra.
  - type: heading
    content: Andriamanitra dia fitiavana
  '7':
  - type: text
    content: 'Ry hava-malala, aoka hifankatia isika, fa avy amin’Andriamanitra ny fitiavana, ary izay rehetra tia no naterak’Andriamanitra sady mahalala an’Andriamanitra. '
  '8':
  - type: text
    content: 'Izay tsy tia dia tsy mahalala an’Andriamanitra, satria Andriamanitra dia fitiavana. '
  '9':
  - type: text
    content: 'Izao no nanehoan’Andriamanitra ny fitiavany antsika: nirahiny ho eo amin’'
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' ny '
  - type: text
    content: Zanany
  - type: text
    content: ' lahitokana mba hahavelona antsika amin’ny alalany'
  - type: note
    content: Ampit Jôh 3.16.
  - type: text
    content: '. '
