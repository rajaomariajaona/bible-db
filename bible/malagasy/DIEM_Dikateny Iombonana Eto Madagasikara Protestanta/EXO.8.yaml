document_id: EXO.8,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Asaovy ahinjitr’i Aharôna ny tanany mitana ny tehinao ho eny ambonin’ny renirano sy ny lakan-drano ary ny farihy mba hiakaran’ny sahona ho eny amin’ny tany Ejipta.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nangonina ho an-tokotokony maro ireny, ka nanamaimbo ny tany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nony hitan’ny Farao fa nisy hiainana, dia nanamafy fo izy araka izay efa nolazain’ny TOMPO, ka tsy nihaino ny fangatahan’i Mosesy sy i Aharôna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny loza fahatelo: ny moka'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Asaovy ahinjitr’i Aharôna ny tehiny hikapohany ny vovo-tany dia ho tonga moka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tsy tena fantatra marina ny karazan’ny bibikely eto. Azo adika ho '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bibikely manorisory
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' koa ny voambolana hebreo nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: moka.
      marker-yv: yv-n
    - type: text
      text: ao amin’ny tany Ejipta manontolo izany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia notanterahin’izy mirahalahy izany: nahinjitr’i Aharôna ny tanany ka nokapohiny tamin’ny tehiny ny vovo-tany; dia nisy moka nandrakotra ny olona sy ny biby fiompy. Ny vovo-tany rehetra dia tonga moka manerana ny tany Ejipta manontolo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mba nanao toy izany tamin’ny fitokavany koa ireo mpimasy handroaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Mba handroaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe koa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mba hampisy moka.
      marker-yv: yv-n
    - type: text
      text: 'ny moka, kanefa tsy nahomby, fa mbola nisy moka ihany teny amin’ny olona sy ny biby fiompy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy ireo mpimasy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Herin’Andriamanitra no ao amin’io tehina io
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'herin’Andriamanitra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Herin’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no tian’ny hebreo holazaina amin’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: «Ny rantsan-tanan’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Rantsan-tanan’Andriamanitra»
      - type: usfm
        marker: ft
