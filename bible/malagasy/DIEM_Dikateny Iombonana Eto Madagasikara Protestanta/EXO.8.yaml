        - type: text
          text: ; ampit Lk 11.20.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa ny Farao dia nanamafy ny fony, araka izay efa nolazain’ny TOMPO, ka tsy nihaino ny fangatahan’i Mosesy sy i Aharôna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny loza fahefatra: ny fihitra'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mifohaza maraina ianao rahampitso, mandehana hiseho eo anatrehan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' amin’iny izy midina ho eo amoron-drano iny, ka lazao azy hoe: «Izao no andidian’ny TOMPO anao: Alefaso ny vahoakako hanao fanompoam-pivavahana amiko; '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fa raha tsy avelanao handeha izy, dia handefasako fihitra betsaka eny aminao sy ny mpanomponao sy ny vahoakanao ary any an-dapanao. Ho feno fihitra ny tranon’ny Ejiptianina sy ny tany izay itoerany koa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jereo and 12 sy nta; dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: aloy.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Kanefa, amin’izany andro izany, dia havahako ny faritany Gôsena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gôsena: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 45.10 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izay onenan’ny vahoakako ka tsy hisy fihitra mihitsy any. Amin’izay dia ho fantatrao fa Izaho TOMPO dia eo anivon’ny taninao koa. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Havahako tsy ho voan’ny loza hanjo ny vahoakanao ny vahoakako. Rahampitso no hiseho izany zava-mahagaga izany.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nahinjitr’i Aharôna tambonin’ireo rano tao Ejipta ny tanany; ka niakatra sady nandrakotra an’i Ejipta ny sahona. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nanao araka izay efa nolazainy tokoa ny Tompo, ka nisy fihitra nivangongo niditra tao an-dapan’ny Farao sy tao an-tranon’ireo tandapany ary manerana an’i Ejipta manontolo. Koa simba ny tany noho ny nataon’ny fihitra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nampiantso an’i Mosesy sy i Aharôna ny Farao ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana manatitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' amin’ny Andriamanitrareo, kanefa eto amin’ny tany ihany!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa novalian’i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, tsy afaka hanao izany izahay satria ny sorona haterinay amin’ny TOMPO Andriamanitray dia fady amin’ny Ejiptianina; koa raha mahita anay hanao sorona toy izany izy ireo, dia hitora-bato anay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Heverin’ny Ejiptianina ho toy ny masina ireo karazam-biby maro izay ataon’ny Israelita sorona.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa handeha lalana telo andro any an-taniefitra izahay, ka any izahay no hanao sorona amin’ny TOMPO Andriamanitray araka izay hotondroiny aminay.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa niteny indray ny Farao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny àry, halefako handeha hanao sorona amin’ny TOMPO Andriamanitrareo any an-taniefitra ianareo. Kanefa aza mandeha lavitra loatra ianareo, ary mivavaha ho ahy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha vao miala eto aminao aho, dia hangataka amin’ny TOMPO. Rahampitso ihany dia hoesoriny tsy ho eo aminao sy ny tandapanao ary ny vahoakanao ny fihitra. Fa izao kosa, aoka ianao tsy hamitaka anay intsony ka tsy handefa ny Israelita hanao sorona aminy indray.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Niala avy tao amin’ny Farao i Mosesy ary nangataka tamin’ny TOMPO. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nataon’ny TOMPO izay nangatahin’i Mosesy taminy: nesoriny ny fihitra, ka tsy nisy fihitra tavela intsony na iray aza. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Kanefa tamin’ity indray mandeha ity koa dia nanamafy fo ihany ny Farao ka tsy nandefa ny Israelita.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mba nanao toy izany tamin’ny fankatoavany koa ireo mpimasy: nampiakariny ho amin’ny tany Ejipta koa ny sahona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nampiantso an’i Mosesy sy i Aharôna ny Farao ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mangataha amin’ny TOMPO mba hanesorany ny sahona amiko, dia halefako hanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' aminy ny Israelita.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa hoy i Mosesy tamin’ny Farao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiso ho voninahitrao ny mametra ny fotoana hangatahako amin’ny Tompo ho anao sy ny mpanomponao ary ny vahoakanao mba hanesorana ny sahona aminao sy amin’ny lapanao, ka tsy hisy havela afa-tsy ny ao Neily ihany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia novalian’ny Farao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Rahampitso.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka àry dia ho araka ny teninao mba hahafantaranao fa tsy misy azo ampitahaina amin’ny TOMPO Andriamanitray. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hialan’ny sahona ianao sy ny lapanao mbamin’ny mpanomponao ary ny vahoakanao ka tsy hisy havela afa-tsy ny ao Neily ihany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niala teo anatrehan’ny Farao i Mosesy sy i Aharôna. Ary nitaraina tamin’ny TOMPO i Mosesy momba ireo sahona izay efa namelezany ny Farao; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ka notanterahin’ny TOMPO izay nangatahin’i Mosesy: maty ireo sahona tao an-trano sy teny an-tokotany ary tany an-tsaha. '
