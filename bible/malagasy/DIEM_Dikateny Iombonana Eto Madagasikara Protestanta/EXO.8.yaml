document_id: EXO.8,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Asaovy ahinjitr’i Aharôna ny tanany mitana ny tehinao ho eny ambonin’ny renirano sy ny lakan-drano ary ny farihy mba hiakaran’ny sahona ho eny amin’ny tany Ejipta.
  '10':
  - type: text
    content: Nangonina ho an-tokotokony maro ireny, ka nanamaimbo ny tany.
  '11':
  - type: text
    content: Nony hitan’ny Farao fa nisy hiainana, dia nanamafy fo izy araka izay efa nolazain’ny TOMPO, ka tsy nihaino ny fangatahan’i Mosesy sy i Aharôna.
  - type: heading
    content: 'Ny loza fahatelo: ny moka'
  '12':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Asaovy ahinjitr’i Aharôna ny tehiny hikapohany ny vovo-tany dia ho tonga moka
  - type: note
    content: Tsy tena fantatra marina ny karazan’ny bibikely eto. Azo adika ho bibikely manorisory na hao koa ny voambolana hebreo nadika hoe moka.
  - type: text
    content: ao amin’ny tany Ejipta manontolo izany.
  '13':
  - type: text
    content: 'Dia notanterahin’izy mirahalahy izany: nahinjitr’i Aharôna ny tanany ka nokapohiny tamin’ny tehiny ny vovo-tany; dia nisy moka nandrakotra ny olona sy ny biby fiompy. Ny vovo-tany rehetra dia tonga moka manerana ny tany Ejipta manontolo. '
  '14':
  - type: text
    content: Mba nanao toy izany tamin’ny fitokavany koa ireo mpimasy handroaka
  - type: note
    content: Mba handroaka na hoe koa mba hampisy moka.
  - type: text
    content: 'ny moka, kanefa tsy nahomby, fa mbola nisy moka ihany teny amin’ny olona sy ny biby fiompy. '
  '15':
  - type: text
    content: 'Dia hoy ireo mpimasy tamin’ny '
  - type: text
    content: Farao
  - type: text
    content: ':'
  - type: text
    content: –Herin’Andriamanitra no ao amin’io tehina io
  - type: note
    content: Ny herin’Andriamanitra na hoe Herin’Andriamanitra no tian’ny hebreo holazaina amin’ny hoe «Ny rantsan-tanan’Andriamanitra na Rantsan-tanan’Andriamanitra»; ampit Lk 11.20.
  - type: text
    content: '!'
  - type: text
    content: Kanefa ny Farao dia nanamafy ny fony, araka izay efa nolazain’ny TOMPO, ka tsy nihaino ny fangatahan’i Mosesy sy i Aharôna.
  - type: heading
    content: 'Ny loza fahefatra: ny fihitra'
  '16':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Mifohaza maraina ianao rahampitso, mandehana hiseho eo anatrehan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' amin’iny izy midina ho eo amoron-drano iny, ka lazao azy hoe: «Izao no andidian’ny TOMPO anao: Alefaso ny vahoakako hanao fanompoam-pivavahana amiko; '
  '17':
  - type: text
    content: fa raha tsy avelanao handeha izy, dia handefasako fihitra betsaka eny aminao sy ny mpanomponao sy ny vahoakanao ary any an-dapanao. Ho feno fihitra ny tranon’ny Ejiptianina sy ny tany izay itoerany koa
  - type: note
    content: Jereo and 12 sy nta; dkt hafa aloy.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Kanefa, amin’izany andro izany, dia havahako ny faritany Gôsena
  - type: note
    content: 'Gôsena: jereo Gen 45.10 sy nta.'
  - type: text
    content: ' izay onenan’ny vahoakako ka tsy hisy fihitra mihitsy any. Amin’izay dia ho fantatrao fa Izaho TOMPO dia eo anivon’ny taninao koa. '
  '19':
  - type: text
    content: Havahako tsy ho voan’ny loza hanjo ny vahoakanao ny vahoakako. Rahampitso no hiseho izany zava-mahagaga izany.»
  '2':
  - type: text
    content: 'Dia nahinjitr’i Aharôna tambonin’ireo rano tao Ejipta ny tanany; ka niakatra sady nandrakotra an’i Ejipta ny sahona. '
  '20':
  - type: text
    content: 'Dia nanao araka izay efa nolazainy tokoa ny Tompo, ka nisy fihitra nivangongo niditra tao an-dapan’ny Farao sy tao an-tranon’ireo tandapany ary manerana an’i Ejipta manontolo. Koa simba ny tany noho ny nataon’ny fihitra. '
  '21':
  - type: text
    content: 'Nampiantso an’i Mosesy sy i Aharôna ny Farao ka niteny hoe:'
  - type: text
    content: '–Mandehana manatitra '
  - type: text
    content: sorona
  - type: text
    content: ' amin’ny Andriamanitrareo, kanefa eto amin’ny tany ihany!'
  '22':
  - type: text
    content: 'Fa novalian’i Mosesy hoe:'
  - type: text
    content: –Tsia, tsy afaka hanao izany izahay satria ny sorona haterinay amin’ny TOMPO Andriamanitray dia fady amin’ny Ejiptianina; koa raha mahita anay hanao sorona toy izany izy ireo, dia hitora-bato anay
  - type: note
    content: Heverin’ny Ejiptianina ho toy ny masina ireo karazam-biby maro izay ataon’ny Israelita sorona.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Fa handeha lalana telo andro any an-taniefitra izahay, ka any izahay no hanao sorona amin’ny TOMPO Andriamanitray araka izay hotondroiny aminay.
  '24':
  - type: text
    content: 'Koa niteny indray ny Farao hoe:'
  - type: text
    content: –Eny àry, halefako handeha hanao sorona amin’ny TOMPO Andriamanitrareo any an-taniefitra ianareo. Kanefa aza mandeha lavitra loatra ianareo, ary mivavaha ho ahy.
  '25':
  - type: text
    content: 'Dia hoy i Mosesy hoe:'
  - type: text
    content: –Raha vao miala eto aminao aho, dia hangataka amin’ny TOMPO. Rahampitso ihany dia hoesoriny tsy ho eo aminao sy ny tandapanao ary ny vahoakanao ny fihitra. Fa izao kosa, aoka ianao tsy hamitaka anay intsony ka tsy handefa ny Israelita hanao sorona aminy indray.
  '26':
  - type: text
    content: 'Niala avy tao amin’ny Farao i Mosesy ary nangataka tamin’ny TOMPO. '
  '27':
  - type: text
    content: 'Nataon’ny TOMPO izay nangatahin’i Mosesy taminy: nesoriny ny fihitra, ka tsy nisy fihitra tavela intsony na iray aza. '
  '28':
  - type: text
    content: Kanefa tamin’ity indray mandeha ity koa dia nanamafy fo ihany ny Farao ka tsy nandefa ny Israelita.
  '3':
  - type: text
    content: 'Mba nanao toy izany tamin’ny fankatoavany koa ireo mpimasy: nampiakariny ho amin’ny tany Ejipta koa ny sahona. '
  '4':
  - type: text
    content: 'Dia nampiantso an’i Mosesy sy i Aharôna ny Farao ka nanao taminy hoe:'
  - type: text
    content: '–Mangataha amin’ny TOMPO mba hanesorany ny sahona amiko, dia halefako hanao '
  - type: text
    content: sorona
  - type: text
    content: ' aminy ny Israelita.'
  '5':
  - type: text
    content: 'Fa hoy i Mosesy tamin’ny Farao:'
  - type: text
    content: –Raiso ho voninahitrao ny mametra ny fotoana hangatahako amin’ny Tompo ho anao sy ny mpanomponao ary ny vahoakanao mba hanesorana ny sahona aminao sy amin’ny lapanao, ka tsy hisy havela afa-tsy ny ao Neily ihany.
  '6':
  - type: text
    content: 'Dia novalian’ny Farao hoe:'
  - type: text
    content: –Rahampitso.
  - type: text
    content: 'Hoy kosa i Mosesy hoe:'
  - type: text
    content: '–Aoka àry dia ho araka ny teninao mba hahafantaranao fa tsy misy azo ampitahaina amin’ny TOMPO Andriamanitray. '
  '7':
  - type: text
    content: Hialan’ny sahona ianao sy ny lapanao mbamin’ny mpanomponao ary ny vahoakanao ka tsy hisy havela afa-tsy ny ao Neily ihany.
  '8':
  - type: text
    content: 'Dia niala teo anatrehan’ny Farao i Mosesy sy i Aharôna. Ary nitaraina tamin’ny TOMPO i Mosesy momba ireo sahona izay efa namelezany ny Farao; '
  '9':
  - type: text
    content: 'ka notanterahin’ny TOMPO izay nangatahin’i Mosesy: maty ireo sahona tao an-trano sy teny an-tokotany ary tany an-tsaha. '
