document_id: EST.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tafasandratra ambony tokoa i Môrdôkay
  - type: text
    content: 'Ny amperôra Kserksesa dia nampanao asa an-terivozona ny mponina an’atitany sy amorontsiraka teo amin’ny fanjakany. '
  '2':
  - type: text
    content: 'Izay rehetra nataony araka ny fahefana sy ny herimpo nananany ary koa ny andinindininy momba ny nanondrotany an’i Môrdôkay dia efa voasoratra ao amin’ilay boky milohateny hoe '
  - type: text
    content: Asan’ireo amperôran’i Media sy i Persia
  - type: note
    content: 'ilay boky milohateny hoe: jereo 2.23 sy nta; 6.1. –amperôran’i Media sy i Persia: jereo 1.3 sy nta.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: I Môrdôkay, ilay Jiosy, no olona ambony indrindra nanarakaraka ny amperôra Kserksesa teo amin’ny fanjakana; sady nalaza sy mamy hoditra izy teo amin’ny Jiosy rehetra mpiray firenena aminy, noho izy nitady hahasoa ny fireneny sy nanao didy hiadanan’ny olona rehetra iray firazanana aminy.
