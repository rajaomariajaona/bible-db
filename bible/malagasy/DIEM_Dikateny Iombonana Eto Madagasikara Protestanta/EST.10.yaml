      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny amperôra Kserksesa dia nampanao asa an-terivozona ny mponina an’atitany sy amorontsiraka teo amin’ny fanjakany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izay rehetra nataony araka ny fahefana sy ny herimpo nananany ary koa ny andinindininy momba ny nanondrotany an’i Môrdôkay dia efa voasoratra ao amin’ilay boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo amperôran’i Media sy i Persia
