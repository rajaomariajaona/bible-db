  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I Môrdôkay, ilay Jiosy, no olona ambony indrindra nanarakaraka ny amperôra Kserksesa teo amin’ny fanjakana; sady nalaza sy mamy hoditra izy teo amin’ny Jiosy rehetra mpiray firenena aminy, noho izy nitady hahasoa ny fireneny sy nanao didy hiadanan’ny olona rehetra iray firazanana aminy.
