    marker: p
    children:
    - type: text
      text: 'niala teo Py-Hahirôta, dia namakivaky ny ranomasina mba hihazo ny taniefitra ary nandeha lalana telo andro tany an-taniefitra dia nitoby tao Marà. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niala tao Marà ny Israelita, dia nankany Elimà izay nisy loharano 12 sy foto-drofia fitopolo, ka nitoby tao; '
