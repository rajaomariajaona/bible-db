  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia horoahinareo avokoa ny mponina rehetra eo amin’ny tany, hopotehinareo ny sary vato sy sary metaly rehetra mampiseho ny andriamaniny, ary horaranareo avokoa ny toeram-pivavahany. '
  '53':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Halainareo ny tany ka honenanareo, fa ianareo no nomeko azy ho lovanareo. '
  '54':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Antsapaka no hizarànareo ny tany araka ny tarikareo avy; izay maro an’isa no homenareo zara tany bebe kokoa, ary izay vitsy kosa dia homenareo zara tany kelikely kokoa. Antsapaka ihany no hamaritana ny toerana hisy ny anjaran’ny tarika tsirairay; ary araka ny fokon-drainareo avy no hahazoanareo zara tany
    - type: usfm
