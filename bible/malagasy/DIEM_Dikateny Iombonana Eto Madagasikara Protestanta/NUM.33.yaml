  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Teo amoron’i Jôrdàna, tanelanelan’i Bety-Jesimôta sy Abela-Sitima tao amin’ny lemak’i Môaba, no nitobian’ny Israelita.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fepetra nataon’ny Tompo momba ny fizaràna ny tany Kanahàna
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niala teo Ramsesa ny Israelita, dia nitoby tao Sokôta; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao amin’ny lemak’i Môaba, teo amoron’i Jôrdàna tandrifin’i Jerikao, no nitenenan’ny TOMPO tamin’i Mosesy '
