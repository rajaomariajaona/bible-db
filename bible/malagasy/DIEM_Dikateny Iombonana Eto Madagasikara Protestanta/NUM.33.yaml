document_id: NUM.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalana nalehan’ny Israelita hatramin’ny fialàny tany Ejipta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ireto avy ny lalana nalehan’ny Israelita rehefa niala tany Ejipta teo ambany fitarihan’i Mosesy sy i Aharôna izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nomarihin’i Mosesy tsara ny toerana nasain’ny TOMPO nijanonany sy niaingany indray araka izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny anaran-toerana sasany omena ato amin’ity toko ity dia hita any amin’ny toeran-kafa ao amin’ny Eks sy ny Nom; misy koa hafa izay tsy hita raha tsy eto ihany. Maro koa no sarotra hita.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Niala teo Ramsesa ny Israelita tamin’ny volana voalohany, andro faha-19. Ny ampitson’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' voalohany no niaingan’ny Israelita amin-kalalahana teo imason’ny Ejiptianina rehetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 14.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mbola nandevina ny lahimatoany izay novonoin’ny TOMPO ho faty izy ireo: izany no nampiharan’ny TOMPO tamin’ny andriamaniny ny didy fanamelohana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Niala teo Ramsesa ny Israelita, dia nitoby tao Sokôta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Niala teo Sokôta, dia nitoby tao Etama manamorona ny taniefitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'niala teo Etama, dia niverina tao Py-Hahirôta tandrifin’i Bahala-Tsefôna ka nitoby teo akaikin’i Migdôla; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'niala teo Py-Hahirôta, dia namakivaky ny ranomasina mba hihazo ny taniefitra ary nandeha lalana telo andro tany an-taniefitra dia nitoby tao Marà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Niala tao Marà ny Israelita, dia nankany Elimà izay nisy loharano 12 sy foto-drofia fitopolo, ka nitoby tao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'niala tao Elimà, dia nitoby teo akaikin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ranomasin’ny Volotara
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'niala teo amin’ny Ranomasin’ny Volotara, dia nitoby tao amin’ny taniefitra Sîna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'niala teo an-taniefitr’i Sîna, dia nitoby tao Dôfkà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'niala teo Dôfkà, dia nitoby tao Alosa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: niala teo Alosa, dia nitoby tao Refidima izay tsy nahitan’ny olona rano hosotroina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Niala teo Refidima ny Israelita, dia nankany an-taniefitr’i Sinay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'niala teo an-taniefitr’i Sinay, dia nitoby tao Kibrôta-Hataavà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'niala teo Kibrôta-Hataavà, dia nitoby tao Hatserôta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'niala teo Hatserôta, dia nitoby tao Ritmà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'niala teo Ritmà, dia nitoby tao Rimôna-Peretsa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'niala teo Rimôna-Peretsa, dia nitoby tao Libnà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'niala teo Libnà, dia nitoby tao Risà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'niala teo Risà, dia nitoby tao Kehelatà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'niala teo Kehelatà, dia nitoby tao an-tendrombohitra Sefera; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'niala teo an-tendrombohitra Sefera, dia nitoby tao Harada; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'niala teo Harada, dia nitoby tao Makelôta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'niala teo Makelôta, dia nitoby tao Tahata; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'niala teo Tahata, dia nitoby tao Terà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'niala teo Terà, dia nitoby tao Mitkà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'niala teo Mitkà, dia nitoby tao Hasmôna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'niala teo Hasmôna, dia nitoby tao Môserôta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'niala teo Môserôta, dia nitoby tao Bene-Jahakàna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'niala teo Bene-Jahakàna, dia nitoby tao Hôra-Gidgada; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'niala teo Hôra-Gidgada, dia nitoby tao Jôtbatà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'niala teo Jôtbatà, dia nitoby tao Habrônà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'niala teo Habrônà, dia nitoby tao Hetsiôna-Gebera; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'niala teo Hetsiôna-Gebera, dia nitoby tany an-taniefitr’i Tsina, izany hoe tao Kadesy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ary niala teo Kadesy, dia nitoby tao an-tendrombohitra Hôra, akaikin’ny sisin-tanin’i Edôma.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: text
    text: Araka ny didin’ny TOMPO, dia niakatra teo an-tendrombohitra Hôra i Aharôna mpisorona. Feno 123 taona izy no maty teo, tamin’ny andro voalohan’ny volana fahadimy, efapolo taona taorian’ny nialan’ny Israelita tany Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 20.22-28; Deot 10.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tamin’izany no nandrenesan’ny mpanjakan’i Harada, ilay Kanahanita izay nonina tany atsimon’i Kanahàna, fa tonga ny Israelita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 21.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Niala teo an-tendrombohitra Hôra ny Israelita, dia nankany Tsalmônà; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'niala teo Tsalmônà, dia nitoby tao Ponôna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'niala teo Ponôna; dia nitoby tao Ôbôta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'niala teo Ôbôta, dia nitoby tao Hije-Habarîma tao amin’ny faritanin’i Môaba; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'niala teo Hije-Habarîma, dia nitoby tao Dibôna-Gada; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'niala teo Dibôna-Gada, dia nitoby tao Halmôna-Diblataîma; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'niala teo Halmôna-Diblataîma, dia nitoby tao an-tendrombohitra Habarîma tandrifin’i Nebao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'niala teo an-tendrombohitra Habarîma, dia nitoby tao amin’ny lemak’i Môaba, teo amoron’i Jôrdàna tandrifin’i Jerikao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Teo amoron’i Jôrdàna, tanelanelan’i Bety-Jesimôta sy Abela-Sitima tao amin’ny lemak’i Môaba, no nitobian’ny Israelita.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fepetra nataon’ny Tompo momba ny fizaràna ny tany Kanahàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Tao amin’ny lemak’i Môaba, teo amoron’i Jôrdàna tandrifin’i Jerikao, no nitenenan’ny TOMPO tamin’i Mosesy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Rehefa tafita an’i Jôrdàna ianareo ka tonga any amin’ny tany Kanahàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'dia horoahinareo avokoa ny mponina rehetra eo amin’ny tany, hopotehinareo ny sary vato sy sary metaly rehetra mampiseho ny andriamaniny, ary horaranareo avokoa ny toeram-pivavahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Halainareo ny tany ka honenanareo, fa ianareo no nomeko azy ho lovanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Antsapaka no hizarànareo ny tany araka ny tarikareo avy; izay maro an’isa no homenareo zara tany bebe kokoa, ary izay vitsy kosa dia homenareo zara tany kelikely kokoa. Antsapaka ihany no hamaritana ny toerana hisy ny anjaran’ny tarika tsirairay; ary araka ny fokon-drainareo avy no hahazoanareo zara tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 26.52-56; 34.13; Jos 14.1-2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Fa raha tsy roahinareo ny mponina rehetra amin’ny tany ao, dia ho lay amin’ny masonareo sy ho tsilo amin’ny tehezanareo izay olona sisa tavela ka hampijaly anareo eo amin’ny tany honenanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ary dia hataoko aminareo izay efa nokasaiko hatao aminy.
