    marker: p
    children:
    - type: text
      text: Araka ny didin’ny TOMPO, dia niakatra teo an-tendrombohitra Hôra i Aharôna mpisorona. Feno 123 taona izy no maty teo, tamin’ny andro voalohan’ny volana fahadimy, efapolo taona taorian’ny nialan’ny Israelita tany Ejipta
