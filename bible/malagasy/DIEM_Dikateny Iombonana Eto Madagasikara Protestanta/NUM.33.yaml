  '55':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa raha tsy roahinareo ny mponina rehetra amin’ny tany ao, dia ho lay amin’ny masonareo sy ho tsilo amin’ny tehezanareo izay olona sisa tavela ka hampijaly anareo eo amin’ny tany honenanareo. '
  '56':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary dia hataoko aminareo izay efa nokasaiko hatao aminy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niala teo Sokôta, dia nitoby tao Etama manamorona ny taniefitra; '
