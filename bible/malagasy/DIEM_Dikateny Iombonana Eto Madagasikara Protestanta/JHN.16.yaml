document_id: JHN.16,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ireo zavatra ireo no voalazako taminareo, dia mba tsy hahavery finoana anareo. '
  '10':
  - type: text
    content: 'ny fahamarinako, satria mankany amin’ny Ray Aho ka tsy ho hitanareo intsony; '
  '11':
  - type: text
    content: ary ny fanamelohan’Andriamanitra, satria voaheloka rahateo ilay filohan’izao tontolo izao.
  '12':
  - type: text
    content: 'Mbola manan-javatra betsaka holazaina aminareo Aho, nefa tsy zakanareo ankehitriny. '
  '13':
  - type: text
    content: 'Fa rehefa tonga ny Fanahy fahamarinana, dia Izy no hitari-dalana anareo ho amin’ny marina rehetra: satria tsy hiteny avy amin’ny tenany Izy, fa izay rehetra ho reny no holazainy; ary ny zavatra ho avy aza dia hambarany aminareo. '
  '14':
  - type: text
    content: 'Ny Fanahy fahamarinana no hanome voninahitra Ahy, satria handray avy amin’izay ananako Izy ary hanambara izany aminareo. '
  '15':
  - type: text
    content: 'Izay rehetra ananan’ny Raiko dia Ahy avokoa, ka izany no nilazako hoe: Handray avy amin’izay ananako ny Fanahy fahamarinana, ary hanambara izany aminareo.'
  - type: heading
    content: Hody hafaliana ny alahelonareo
  '16':
  - type: text
    content: –Rehefa afaka kelikely, dia tsy hahita Ahy intsony ianareo; ary rehefa afaka kelikely indray, dia hahita Ahy ianareo.
  '17':
  - type: text
    content: 'Tamin’izay ny sasany tamin’ny '
  - type: text
    content: mpianatr
  - type: text
    content: '’i Jesoa dia nifampiresaka hoe:'
  - type: text
    content: '–Inona izany lazainy amintsika hoe: «Rehefa afaka kelikely, dia tsy hahita Ahy intsony ianareo; ary rehefa afaka kelikely indray, dia hahita Ahy ianareo», sy ny hoe: «Mankany amin’ny Ray»? '
  '18':
  - type: text
    content: 'Inona àry izany lazainy hoe: «Rehefa afaka kelikely»? Tsy azontsika izay lazainy.'
  '19':
  - type: text
    content: 'Fantatr’i Jesoa fa te hanontany Azy ny mpianany, ka hoy Izy taminy:'
  - type: text
    content: '–Mifanontany ve ianareo ny amin’ny teniko hoe: «Rehefa afaka kelikely, dia tsy hahita Ahy intsony ianareo; ary rehefa afaka kelikely indray, dia hahita Ahy ianareo»? '
  '2':
  - type: text
    content: 'Handroaka anareo hiala amin’ny sinagôga ry zareo; eny, ho avy ny andro hiheveran’izay rehetra mamono anareo ho manatitra mari-panajana amin’Andriamanitra. '
  '20':
  - type: text
    content: 'Lazaiko marina dia marina aminareo fa hitomany sy hisaona ianareo, ary '
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' kosa hifaly; halahelo ianareo, fa hody hafaliana ny alahelonareo. '
  '21':
  - type: text
    content: 'Ory ny vehivavy, rehefa hiteraka, satria tonga ny fotoam-panaintainany; saingy rehefa velon-jaza izy, dia tsy tsaroany intsony izay fahoriany, noho izy faly fa hoe misy olona teraka eo amin’izao tontolo izao. '
  '22':
  - type: text
    content: Ianareo koa dia manana alahelo ankehitriny; fa hahita anareo indray Aho ka ho faly ny fonareo, ary tsy hisy olona hanaisotra ny hafalianareo.
  '23':
  - type: text
    content: Amin’izany andro izany, dia tsy hanontany Ahy na inona na inona intsony ianareo. Lazaiko marina dia marina aminareo fa na inona na inona hangatahinareo amin’ny Ray dia homeny anareo noho ny anarako
  - type: note
    content: 'na inona... anarako: misy stf sasany ahitana hoe na inona na inona hangatahinareo amin’ny Ray noho ny anarako, dia homeny anareo izany.'
  - type: text
    content: 'izany. '
  '24':
  - type: text
    content: Mandraka ankehitriny dia tsy mbola nangataka na inona na inona noho ny anarako ianareo; mangataha, dia hahazo ianareo, mba ho feno ny hafalianareo.
  - type: heading
    content: I Jesoa no mpandresy an’izao tontolo izao
  '25':
  - type: text
    content: –
  - type: text
    content: Fanoharana
  - type: text
    content: ' no nilazako izany taminareo; fa ho avy ny vaninandro izay tsy hanaovako fanoharana aminareo intsony fa hambarako tsotra aminareo ny momba ny Ray. '
  '26':
  - type: text
    content: 'Amin’izany andro izany dia hangataka noho ny anarako ianareo; ary Izaho tsy milaza hoe hangataka ho anareo amin’ny Ray, '
  '27':
  - type: text
    content: 'satria fatra-pitia anareo Izy. Eny, fatra-pitia anareo ny Ray, satria ianareo efa tia Ahy ary efa nino fa nivoaka avy any amin’ny Ray Aho. '
  '28':
  - type: text
    content: Nivoaka avy any amin’ny Ray Aho no tonga eto amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ; ary hiala eto amin’izao tontolo izao indray Aho, ka hankany amin’ny Ray.
  '29':
  - type: text
    content: 'Dia hoy ny '
  - type: text
    content: mpianatr
  - type: text
    content: '’i Jesoa taminy:'
  - type: text
    content: '–Indro milaza tsotra Ianao ankehitriny, fa tsy manana fanoharana akory. '
  '3':
  - type: text
    content: 'Ary izany no hataony, dia satria tsy nisy fantany na ny Ray na Izaho. '
  '30':
  - type: text
    content: 'Fantatray izao fa mahalala ny zavatra rehetra Ianao, ka tsy mila hanontanian’olona: izany no inoanay fa nivoaka avy any amin’Andriamanitra Ianao!'
  '31':
  - type: text
    content: 'I Jesoa kosa namaly azy hoe:'
  - type: text
    content: '–Mino ve ianareo ankehitriny? '
  '32':
  - type: text
    content: 'Indro avy ary efa tonga sahady aza ny andro izay hielezanareo samy ho any amin’ny misy anareo avy, ary handaozanareo Ahy ho irery; kanefa tsy irery Aho, fa miaraka amiko ny Ray. '
  '33':
  - type: text
    content: Izany no voalazako taminareo, dia mba hanananareo fiadanana amin’ny firaisana amiko. Eto amin’izao tontolo izao no ahitanareo fahoriana; nefa mahereza, fa Izaho efa naharesy izao tontolo izao!
  '4':
  - type: text
    content: Eny, ireo zavatra ireo no voalazako taminareo, dia mba hahatsiarovanareo, rehefa tonga ilay andro hanaovan-dry zareo izany, fa niteny taminareo Aho.
  - type: heading
    content: Ny asan’ny Fanahy Masina
  - type: text
    content: '–Ireo zavatra ireo dia tsy noteneniko taminareo hatramin’ny voalohany, satria mbola niaraka taminareo Aho; '
  '5':
  - type: text
    content: 'ankehitriny kosa, mankany amin’Ilay naniraka Ahy Aho, ary tsy misy intsony aminareo manontany Ahy hoe: «Hankaiza Ianao?» '
  '6':
  - type: text
    content: 'Saingy noho Izaho nilaza izany taminareo, dia vonton’alahelo ny fonareo! '
  '7':
  - type: text
    content: 'Kanefa ny marina no lazaiko aminareo: mahasoa anareo ny fialàko; fa raha tsy miala Aho, dia tsy ho avy atỳ aminareo ilay Mpanolotsaina anareo; fa raha mandeha Aho, dia haniraka Azy ho atỳ aminareo. '
  '8':
  - type: text
    content: Ary rehefa tonga ilay Mpanolotsaina anareo, dia ny fahotan’izao tontolo izao, sy ny fahamarinako, ary ny fanamelohan’Andriamanitra
  - type: note
    content: 'Mpanolotsaina: jereo ny FTS amin’ny voambolana hoe PARAKLETO. –Ampit Asa 24.25.'
  - type: text
    content: ' no hampiaikeny an’izao tontolo izao: '
  '9':
  - type: text
    content: ny fahotan’izao tontolo izao, satria tsy mino Ahy izao tontolo izao
  - type: note
    content: Jereo 8.21-24; 9.41; 15.22-24.
