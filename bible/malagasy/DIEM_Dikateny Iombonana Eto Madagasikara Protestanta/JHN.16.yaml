document_id: JHN.16
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ireo zavatra ireo no voalazako taminareo, dia mba tsy hahavery finoana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Handroaka anareo hiala amin’ny sinagôga ry zareo; eny, ho avy ny andro hiheveran’izay rehetra mamono anareo ho manatitra mari-panajana amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izany no hataony, dia satria tsy nisy fantany na ny Ray na Izaho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, ireo zavatra ireo no voalazako taminareo, dia mba hahatsiarovanareo, rehefa tonga ilay andro hanaovan-dry zareo izany, fa niteny taminareo Aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny asan’ny Fanahy Masina
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ireo zavatra ireo dia tsy noteneniko taminareo hatramin’ny voalohany, satria mbola niaraka taminareo Aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ankehitriny kosa, mankany amin’Ilay naniraka Ahy Aho, ary tsy misy intsony aminareo manontany Ahy hoe: «Hankaiza Ianao?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saingy noho Izaho nilaza izany taminareo, dia vonton’alahelo ny fonareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanefa ny marina no lazaiko aminareo: mahasoa anareo ny fialàko; fa raha tsy miala Aho, dia tsy ho avy atỳ aminareo ilay Mpanolotsaina anareo; fa raha mandeha Aho, dia haniraka Azy ho atỳ aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary rehefa tonga ilay Mpanolotsaina anareo, dia ny fahotan’izao tontolo izao, sy ny fahamarinako, ary ny fanamelohan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mpanolotsaina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe PARAKLETO. –Ampit Asa 24.25.
    marker-yv: yv-n
  - type: text
    text: ' no hampiaikeny an’izao tontolo izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ny fahotan’izao tontolo izao, satria tsy mino Ahy izao tontolo izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 8.21-24; 9.41; 15.22-24.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny fahamarinako, satria mankany amin’ny Ray Aho ka tsy ho hitanareo intsony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ary ny fanamelohan’Andriamanitra, satria voaheloka rahateo ilay filohan’izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mbola manan-javatra betsaka holazaina aminareo Aho, nefa tsy zakanareo ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa rehefa tonga ny Fanahy fahamarinana, dia Izy no hitari-dalana anareo ho amin’ny marina rehetra: satria tsy hiteny avy amin’ny tenany Izy, fa izay rehetra ho reny no holazainy; ary ny zavatra ho avy aza dia hambarany aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny Fanahy fahamarinana no hanome voninahitra Ahy, satria handray avy amin’izay ananako Izy ary hanambara izany aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay rehetra ananan’ny Raiko dia Ahy avokoa, ka izany no nilazako hoe: Handray avy amin’izay ananako ny Fanahy fahamarinana, ary hanambara izany aminareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hody hafaliana ny alahelonareo
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: –Rehefa afaka kelikely, dia tsy hahita Ahy intsony ianareo; ary rehefa afaka kelikely indray, dia hahita Ahy ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin’izay ny sasany tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatr
  - type: text
    text: '’i Jesoa dia nifampiresaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona izany lazainy amintsika hoe: «Rehefa afaka kelikely, dia tsy hahita Ahy intsony ianareo; ary rehefa afaka kelikely indray, dia hahita Ahy ianareo», sy ny hoe: «Mankany amin’ny Ray»? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Inona àry izany lazainy hoe: «Rehefa afaka kelikely»? Tsy azontsika izay lazainy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fantatr’i Jesoa fa te hanontany Azy ny mpianany, ka hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mifanontany ve ianareo ny amin’ny teniko hoe: «Rehefa afaka kelikely, dia tsy hahita Ahy intsony ianareo; ary rehefa afaka kelikely indray, dia hahita Ahy ianareo»? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lazaiko marina dia marina aminareo fa hitomany sy hisaona ianareo, ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' kosa hifaly; halahelo ianareo, fa hody hafaliana ny alahelonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ory ny vehivavy, rehefa hiteraka, satria tonga ny fotoam-panaintainany; saingy rehefa velon-jaza izy, dia tsy tsaroany intsony izay fahoriany, noho izy faly fa hoe misy olona teraka eo amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ianareo koa dia manana alahelo ankehitriny; fa hahita anareo indray Aho ka ho faly ny fonareo, ary tsy hisy olona hanaisotra ny hafalianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Amin’izany andro izany, dia tsy hanontany Ahy na inona na inona intsony ianareo. Lazaiko marina dia marina aminareo fa na inona na inona hangatahinareo amin’ny Ray dia homeny anareo noho ny anarako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na inona... anarako: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: na inona na inona hangatahinareo amin’ny Ray noho ny anarako, dia homeny anareo izany.
    marker-yv: yv-n
  - type: text
    text: 'izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mandraka ankehitriny dia tsy mbola nangataka na inona na inona noho ny anarako ianareo; mangataha, dia hahazo ianareo, mba ho feno ny hafalianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jesoa no mpandresy an’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanoharana
  - type: text
    text: ' no nilazako izany taminareo; fa ho avy ny vaninandro izay tsy hanaovako fanoharana aminareo intsony fa hambarako tsotra aminareo ny momba ny Ray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amin’izany andro izany dia hangataka noho ny anarako ianareo; ary Izaho tsy milaza hoe hangataka ho anareo amin’ny Ray, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'satria fatra-pitia anareo Izy. Eny, fatra-pitia anareo ny Ray, satria ianareo efa tia Ahy ary efa nino fa nivoaka avy any amin’ny Ray Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nivoaka avy any amin’ny Ray Aho no tonga eto amin’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ; ary hiala eto amin’izao tontolo izao indray Aho, ka hankany amin’ny Ray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatr
  - type: text
    text: '’i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro milaza tsotra Ianao ankehitriny, fa tsy manana fanoharana akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fantatray izao fa mahalala ny zavatra rehetra Ianao, ka tsy mila hanontanian’olona: izany no inoanay fa nivoaka avy any amin’Andriamanitra Ianao!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'I Jesoa kosa namaly azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mino ve ianareo ankehitriny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Indro avy ary efa tonga sahady aza ny andro izay hielezanareo samy ho any amin’ny misy anareo avy, ary handaozanareo Ahy ho irery; kanefa tsy irery Aho, fa miaraka amiko ny Ray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izany no voalazako taminareo, dia mba hanananareo fiadanana amin’ny firaisana amiko. Eto amin’izao tontolo izao no ahitanareo fahoriana; nefa mahereza, fa Izaho efa naharesy izao tontolo izao!
