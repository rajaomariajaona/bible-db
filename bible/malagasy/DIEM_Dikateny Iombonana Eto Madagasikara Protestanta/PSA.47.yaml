  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo mpanapaka ny firenen-kafa dia nikambana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho mpomba an’ilay Andriamanitr’i Abrahama;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voasandratra ambony dia ambony Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho Izy mifehy ireo andriambaventin’ny tany!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry vahoaka rehetra, mitehafa tanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manaova hobim-pifaliana ho an’Andriamanitra;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO no avo indrindra ka mahatahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjaka lehibe amin’ny tany tontolo Izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vahoaka maro no reseny hofehezinay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: firenen-tsamy hafa no ataony manaiky anay.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofidiny ny zaratany holovanay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izany no ireharehanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria izahay taranak’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia vahoaka tiany tokoa.
  - type: usfm
    marker: qr
    children:
