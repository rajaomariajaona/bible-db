  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankalazao Andriamanitra, ankalazao amin-tsalamo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankalazao ny Mpanjakantsika, ankalazao amin-tsalamo!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Mpanjakan’ny tany tontolo Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ankalazao amin-kira faran’izay mirindra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra manjaka amin’ny firenen-drehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mitoetra amin’ny sezafiandrianany manokana.
