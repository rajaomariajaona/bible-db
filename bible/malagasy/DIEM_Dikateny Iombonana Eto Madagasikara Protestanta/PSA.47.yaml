document_id: PSA.47,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Hobio ny Tompo, ilay Mpanjaka lehibe
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’ireo terak’i Kôra
  - type: note
    content: Jereo Sal 42.1 sy nta.
  - type: text
    content: .
  '10':
  - type: text
    content: Ireo mpanapaka ny firenen-kafa dia nikambana
  - type: text
    content: ho mpomba an’ilay Andriamanitr’i Abrahama;
  - type: text
    content: ka voasandratra ambony dia ambony Andriamanitra
  - type: text
    content: noho Izy mifehy ireo andriambaventin’ny tany!
  '2':
  - type: text
    content: Ry vahoaka rehetra, mitehafa tanana
  - type: text
    content: sy manaova hobim-pifaliana ho an’Andriamanitra;
  '3':
  - type: text
    content: fa ny TOMPO no avo indrindra ka mahatahotra,
  - type: text
    content: Mpanjaka lehibe amin’ny tany tontolo Izy.
  '4':
  - type: text
    content: Vahoaka maro no reseny hofehezinay,
  - type: text
    content: firenen-tsamy hafa no ataony manaiky anay.
  '5':
  - type: text
    content: Nofidiny ny zaratany holovanay
  - type: text
    content: ka izany no ireharehanay,
  - type: text
    content: satria izahay taranak’i Jakôba
  - type: text
    content: dia vahoaka tiany tokoa.
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: 'Arahina hoby Andriamanitra no miakatra ao '
  - type: text
    content: Tsiôna
  - type: note
    content: Jereo Sal 24.7-10; 132.8.
  - type: text
    content: .
  - type: text
    content: Ombàn’ny feon’anjomara no tonga ao Izy TOMPO.
  '7':
  - type: text
    content: Ankalazao Andriamanitra, ankalazao amin-tsalamo!
  - type: text
    content: Ankalazao ny Mpanjakantsika, ankalazao amin-tsalamo!
  '8':
  - type: text
    content: Fa Mpanjakan’ny tany tontolo Andriamanitra,
  - type: text
    content: koa ankalazao amin-kira faran’izay mirindra.
  '9':
  - type: text
    content: Andriamanitra manjaka amin’ny firenen-drehetra
  - type: text
    content: sy mitoetra amin’ny sezafiandrianany manokana.
