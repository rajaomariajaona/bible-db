document_id: PRO.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahazoana sy fitanana ny fahendrena
  - type: text
    content: Henoy, rey anaka, ny anatry ny ray
  - type: text
    content: ary milofosa hahalala ny fahaiza-manavaka.
  '10':
  - type: text
    content: Henoy ka raiso, anaka, ny teniko;
  - type: text
    content: dia ho ela velona ianao
  - type: note
    content: Jereo 3.18 sy nta.
  - type: text
    content: .
  '11':
  - type: text
    content: Hampianariko ny làlam-pahendrena ianao
  - type: text
    content: ary hotarihiko amin’ny soritra mahitsy.
  '12':
  - type: text
    content: Tsy ho voasembantsembana ianao raha mandeha,
  - type: text
    content: ary tsy ho tafintohina raha mihazakazaka.
  '13':
  - type: text
    content: Tano mafy izay nanabeazana anao ka aza avela.
  - type: text
    content: Tehirizo izany fa foto-piainanao.
  '14':
  - type: text
    content: Aza mankany amin’ny falehan’ny olon-dratsy
  - type: text
    content: ary aza mizotra amin’ny lalan’ny mpanao ratsy.
  '15':
  - type: text
    content: Halaviro fa aza lalovana akory izany,
  - type: text
    content: ary ialao ka mizora lavidavitra kokoa.
  '16':
  - type: text
    content: Tsy matory ireny raha tsy efa nanao ratsy
  - type: text
    content: ary tsy mahita tory raha tsy efa nanafintohina olona.
  '17':
  - type: text
    content: Fa ny faharatsiana no mofo fihinany isan’andro;
  - type: text
    content: ary ny herisetra no divay fisotrony.
  '18':
  - type: text
    content: Ny fitondrantenan’ny olo-marina
  - type: text
    content: dia toy ny fahazavan’ny maraina
  - type: text
    content: izay mihamazava mandra-pahantoandro ny andro.
  '19':
  - type: text
    content: Fa ny toetran’ny olon-dratsy fanahy kosa toy ny haizim-pito
  - type: text
    content: ka tsy fantany akory izay hanafintohina azy.
  - type: heading
    content: Ny fananana fitondrantena tsy mivadibadika
  '2':
  - type: text
    content: Fa torohevitra mahasoa no omeko anareo;
  - type: text
    content: aza mahafoy ny fampianarako.
  '20':
  - type: text
    content: Anaka, tandremonao ny teniko
  - type: text
    content: ka henoy tsara izay lazaiko.
  '21':
  - type: text
    content: Imasoy hatrany ireo
  - type: text
    content: ary tehirizo ao am-ponao.
  '22':
  - type: text
    content: Fa aina ho an’izay mandray azy tokoa ireo
  - type: text
    content: ary fahasalamana ho an’ny tenany manontolo.
  '23':
  - type: text
    content: Tandremo izay eritreretin’ny fonao
  - type: text
    content: fa izany no iankinan’ny fiainanao.
  '24':
  - type: text
    content: Ambeno tsy hiteny lainga ny vavanao
  - type: text
    content: na hilaza fitaka ny molotrao.
  '25':
  - type: text
    content: Aoka hifantoka amin’ny olona ny masonao
  - type: text
    content: ka hibanjina tsara eo anoloanao.
  '26':
  - type: text
    content: Savao lalana ny tongotrao;
  - type: text
    content: aoka ho azo antoka avokoa ny famindranao
  - type: note
    content: Jereo Heb 12.13.
  - type: text
    content: .
  '27':
  - type: text
    content: Aza mivily miankavanana na miankavia;
  - type: text
    content: halaviro ny tongotrao ny ratsy.
  '3':
  - type: text
    content: Izaho koa mba zanaka mamin-draiko
  - type: text
    content: ary malalan-dreniko toy ny lahitokany.
  '4':
  - type: text
    content: 'Nampianatra ahy i dada ka nanao tamiko hoe:'
  - type: text
    content: «Tano mafy ao am-ponao ny teniko;
  - type: text
    content: tandremo ny didiko, dia ho velona ianao.
  '5':
  - type: text
    content: Mahazoa fahendrena sy fahaiza-manavaka;
  - type: text
    content: ka aza misy hadinoina na ialana
  - type: text
    content: ireo teny aloaky ny vavako.
  '6':
  - type: text
    content: Aza mahafoy ny fahendrena, dia harovany ianao;
  - type: text
    content: tiavo izy, dia hiambina anao.
  '7':
  - type: text
    content: 'Ny voalohan-tanjon’ny fahendrena dia izao:'
  - type: text
    content: mahazoa fahendrena;
  - type: text
    content: koa izay rehetra anananao
  - type: text
    content: no ahazoy fahaiza-manavaka.
  '8':
  - type: text
    content: Fenjao ny fahendrena, dia hanandratra anao;
  - type: text
    content: eny, ho voninahitrao izy raha fihininao.
  '9':
  - type: text
    content: Hasiany diadema soa eo an-dohanao
  - type: text
    content: ary homeny satroboninahitra marevaka ianao.
  - type: heading
    content: Fadio ny lalan’ny olon-dratsy
