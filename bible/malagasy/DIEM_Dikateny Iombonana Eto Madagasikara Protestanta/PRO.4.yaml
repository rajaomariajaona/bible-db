document_id: PRO.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahazoana sy fitanana ny fahendrena
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Henoy, rey anaka, ny anatry ny ray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary milofosa hahalala ny fahaiza-manavaka.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Henoy ka raiso, anaka, ny teniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho ela velona ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.18 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hampianariko ny làlam-pahendrena ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hotarihiko amin’ny soritra mahitsy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy ho voasembantsembana ianao raha mandeha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy ho tafintohina raha mihazakazaka.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tano mafy izay nanabeazana anao ka aza avela.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tehirizo izany fa foto-piainanao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aza mankany amin’ny falehan’ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mizotra amin’ny lalan’ny mpanao ratsy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Halaviro fa aza lalovana akory izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ialao ka mizora lavidavitra kokoa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsy matory ireny raha tsy efa nanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahita tory raha tsy efa nanafintohina olona.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny faharatsiana no mofo fihinany isan’andro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny herisetra no divay fisotrony.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fitondrantenan’ny olo-marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny fahazavan’ny maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mihamazava mandra-pahantoandro ny andro.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa ny toetran’ny olon-dratsy fanahy kosa toy ny haizim-pito
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy fantany akory izay hanafintohina azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fananana fitondrantena tsy mivadibadika
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa torohevitra mahasoa no omeko anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mahafoy ny fampianarako.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Anaka, tandremonao ny teniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka henoy tsara izay lazaiko.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Imasoy hatrany ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tehirizo ao am-ponao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa aina ho an’izay mandray azy tokoa ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fahasalamana ho an’ny tenany manontolo.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tandremo izay eritreretin’ny fonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izany no iankinan’ny fiainanao.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ambeno tsy hiteny lainga ny vavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hilaza fitaka ny molotrao.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Aoka hifantoka amin’ny olona ny masonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hibanjina tsara eo anoloanao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Savao lalana ny tongotrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho azo antoka avokoa ny famindranao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Heb 12.13.
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Aza mivily miankavanana na miankavia;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halaviro ny tongotrao ny ratsy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izaho koa mba zanaka mamin-draiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary malalan-dreniko toy ny lahitokany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nampianatra ahy i dada ka nanao tamiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tano mafy ao am-ponao ny teniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandremo ny didiko, dia ho velona ianao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mahazoa fahendrena sy fahaiza-manavaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza misy hadinoina na ialana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo teny aloaky ny vavako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aza mahafoy ny fahendrena, dia harovany ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tiavo izy, dia hiambina anao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny voalohan-tanjon’ny fahendrena dia izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahazoa fahendrena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa izay rehetra anananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ahazoy fahaiza-manavaka.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fenjao ny fahendrena, dia hanandratra anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ho voninahitrao izy raha fihininao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hasiany diadema soa eo an-dohanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary homeny satroboninahitra marevaka ianao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fadio ny lalan’ny olon-dratsy
    marker-yv: yv-h
