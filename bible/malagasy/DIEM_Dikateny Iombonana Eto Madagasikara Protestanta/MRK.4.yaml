document_id: MRK.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana momba ny mpamafy
  - type: heading
    content: (Jereo Mt 13.1-9; Lk 8.4-8)
  - type: text
    content: 'Dia nampianatra teo moron’ny farihin’i Galilea indray i Jesoa; ary vahoaka be no nitangorona teo akaikiny, ka voatery niondrana an-tsambokely Izy, dia nipetraka teo. Ary ny vahoaka rehetra kosa terỳ an-tanety amoron’ny farihy. '
  '10':
  - type: text
    content: 'Rehefa nitokana lavitra ny vahoaka i Jesoa, dia nanontany Azy ny hevitry ny '
  - type: text
    content: fanoharana
  - type: text
    content: ' ireo mpomba Azy mbamin’ny 12 lahy, '
  '11':
  - type: text
    content: 'ka novaliany hoe:'
  - type: text
    content: '–Ianareo no efa nomena ny tsiambaratelo momba ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '; fa ho an’ireo any ivelany kosa dia manjary ankamantatra saro-pantarina ny zavatra rehetra, '
  '12':
  - type: text
    content: hany ka
  - type: text
    content: «hijery dia hijery izy fa tsy hahita
  - type: text
    content: ary hihaino dia hihaino fa tsy hahafantatra,
  - type: text
    content: afa-tsy raha miverina amin’Andriamanitra izy ka ho voavela heloka
  - type: note
    content: Is 6.9-10, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  - type: heading
    content: Hazavain’i Jesoa ny fanoharana momba ny mpamafy
  - type: heading
    content: (Jereo Mt 13.18-23; Lk 8.11-15)
  '13':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ireo mpomba Azy sy tamin’ny 12 lahy:'
  - type: text
    content: '–Tsy azonareo ve ilay fanoharana teo? Ka hataonareo ahoana no fahazo ny fanoharana hafa rehetra? '
  '14':
  - type: text
    content: 'Ny mpamafy dia mamafy ny tenin’Andriamanitra. '
  '15':
  - type: text
    content: 'Ao ny amafazana ny teny eo amoron-dalana: vao mahaheno izy, dia tonga i '
  - type: text
    content: Satàna
  - type: text
    content: ' manaisotra ny teny voafafy tao aminy. '
  '16':
  - type: text
    content: 'Ao koa ny amafazana an-tany be vato: vao mahaheno ny teny izy, dia mandray azy an-kafaliana, '
  '17':
  - type: text
    content: 'saingy tsy alatsany lalina ao aminy fa vetivety foana no itanany azy; ka raha vao mitranga ny fahoriana na fanenjehana noho ny tenin’Andriamanitra, dia very finoana izy. '
  '18':
  - type: text
    content: 'Ao indray ny amafazana anaty tsilo: mahaheno ny teny izy, '
  '19':
  - type: text
    content: 'saingy ny fiahiana ny fiainana etoana sy ny fanodokan’ny harena ary ny fitsiriritana hafa rehetra, samy miditra ao aminy, ka mangeja ny teny tsy ho afa-mamoa. '
  '2':
  - type: text
    content: Fanoharana
  - type: text
    content: ' no nampianaran’i Jesoa zavatra maro azy; ary nandritra ny fampianarany no nitenenany taminy hoe:'
  '20':
  - type: text
    content: 'Ao koa ny amafazana an-tany lonaka, dia ireo mahaheno ny teny sy mandray azy ka mamokatra: ny iray telopolo heny, ny iray enimpolo heny, ny iray zato heny.'
  - type: heading
    content: Fanoharana momba ny jiro
  - type: heading
    content: (Jereo Lk 8.16-18)
  '21':
  - type: text
    content: 'Hoy koa i Jesoa tamin’ireo mpomba Azy sy tamin’ny 12 lahy:'
  - type: text
    content: –Inona moa no angalana ny jiro, ny hametrahana azy ao ambany vata famarana na ao ambany farafara ve sa ny hametrahana azy eo ambony fitoeran-jiro
  - type: note
    content: Ampit Mt 5.15; Lk 11.33.
  - type: text
    content: '? '
  '22':
  - type: text
    content: 'Satria tsy misy takona izay tsy haseho, na miafina izay tsy haharihary. '
  '23':
  - type: text
    content: Izay manan-tsofina hihainoana, aoka hihaino!
  '24':
  - type: text
    content: 'Ary hoy koa i Jesoa taminy:'
  - type: text
    content: '–Diniho izao teny renareo izao: izay famarana amaranareo ihany no hamaran’Andriamanitra ho anareo koa, ary hasiany fanampiny aza ny anareo'
  - type: note
    content: 'izay famarana... ny anareo: dkt hafa izay mizana itsaranareo ny hafa no hitsaran’Andriamanitra anareo, ary vao mainka ho sarotiny kokoa aza Izy aminareo.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: Satria izay manana no homena; ary izay tsy manana kosa, na izay kely ananany aza dia halana aminy.
  - type: heading
    content: Fanoharana momba ny fanirin’ny voa nafafy
  '26':
  - type: text
    content: 'Hoy koa i Jesoa:'
  - type: text
    content: '–Ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' dia tahaka ny amin’ity olona namafy voa amin’ny tany; '
  '27':
  - type: text
    content: 'fa na matory izy ny alina, na mahatsiaro izy ny antoandro, dia mitsimoka sy mitombo ny voa amin’ny fomba tsy fantany akory. '
  '28':
  - type: text
    content: 'Fa mamokatra fotsiny amin’izao ny tany: tahony aloha, dia salohiny maitso, ary farany dia voany matoy eny amin’ny salohiny. '
  '29':
  - type: text
    content: Ary raha vao azo jinjaina, dia jinjain’ilay olona fa tonga ny fotoana fijinjana
  - type: note
    content: Ampit Jl 4.13.
  - type: text
    content: .
  - type: heading
    content: Fanoharana momba ny voan-tsinapy
  - type: heading
    content: (Jereo Mt 13.31-32; Lk 13.18-19)
  '3':
  - type: text
    content: '–Henoy ange: indro niainga ity mpamafy hamafy voa. '
  '30':
  - type: text
    content: 'Dia hoy koa i Jesoa hoe:'
  - type: text
    content: '–Inona no hampitahantsika ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' sa '
  - type: text
    content: fanoharana
  - type: text
    content: ' inona no hoentintsika manazava azy? '
  '31':
  - type: text
    content: 'Tahaka ny '
  - type: text
    content: voan-tsinapy
  - type: text
    content: ', ka raha ilay afafy amin’ny tany iny, dia madinika indrindra izy amin’ny voa famafy rehetra etỳ ambonin’ny tany; '
  '32':
  - type: text
    content: saingy rehefa voafafy, dia mitombo, ka tonga lehibe noho ny anana rehetra, sady misy rantsana vaventy ahafahan’ny voro-manidina manao akany honenana.
  - type: heading
    content: Ny fanoharana sy ny fampiasàn’i Jesoa azy
  - type: heading
    content: (Jereo Mt 13.34-35)
  '33':
  - type: text
    content: 'Dia '
  - type: text
    content: fanoharana
  - type: text
    content: ' maro tahatahaka izany no nanambaràn’i Jesoa ny tenin’Andriamanitra tamin’ny olona, araka izay mety ho takatry ny sain’ny mpihaino. '
  '34':
  - type: text
    content: Nampiasa fanoharana Izy raha niteny tamin’ny olona; fa rehefa nitokana kosa Izy sy ny mpianany, izay vao nohazavainy tamin’ireo mpianany ny zava-drehetra.
  - type: heading
    content: Ampitsaharin’i Jesoa ny tafio-drivotra
  - type: heading
    content: (Jereo Mt 8.23-27; Lk 8.22-25)
  '35':
  - type: text
    content: 'Ny harivan’iny andro iny ihany dia hoy i Jesoa tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ':'
  - type: text
    content: –Andeha isika hankerỳ ampita!
  '36':
  - type: text
    content: 'Ary rehefa avy nandefa ny vahoaka ny mpianatra, dia nitondra an’i Jesoa tamin’ilay sambokely efa nisy Azy rahateo. Nisy sambokely maro hafa koa tafaraka taminy. '
  '37':
  - type: text
    content: 'Ary indro nisy tafio-drivotra mahery ka tafiditry ny alon-drano hatrany anaty sambokely, ary efa nila ho feno rano ny sambokely. '
  '38':
  - type: text
    content: 'I Jesoa anefa natory teo amin’ny zoron-tsambo terỳ aoriana fa nisy ondana niondanany teo; ary nofohazin’ny mpianany Izy ka nilazany hoe:'
  - type: text
    content: –Mpampianatra ô, tsy mampaninona Anao ve na ho faty aza isika?
  '39':
  - type: text
    content: 'Dia nifoha Izy ka niteny mafy ny rivotra ary nanao tamin’ny farihy hoe:'
  - type: text
    content: –Mangîna! Mitonia!
  - type: text
    content: 'Dia nitsahatra ny rivotra ary nanjary tony dia tony ny andro. '
  '4':
  - type: text
    content: 'Nony namafy izy, ny voa sasany latsaka teny amoron-dalana, ka tonga ny voro-manidina nitsindroka azy rehetra. '
  '40':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: –Nahoana no saro-tahotra ianareo? Tsy mbola manam-pinoana angaha ianareo?
  '41':
  - type: text
    content: 'Ary natahotra dia natahotra tokoa iretsy mpianany, ka nifampilaza hoe:'
  - type: text
    content: –Fa iza àry io no manaiky Azy hatramin’ny rivotra sy ny farihy
  - type: note
    content: Ampit Sal 65.8; 89.10; 107.23-32.
  - type: text
    content: '?'
  '5':
  - type: text
    content: 'Ny voa sasany latsaka tamin’ny toerana be vato sady manify nofon-tany, ka vetivety dia nitsimoka satria tsy lalina ny tany nilentehany; '
  '6':
  - type: text
    content: 'saingy nony nipoaka ny andro, dia nalazon’ny hafanana ireo tsimoka ireo ka maina satria tsy namaka lalina. '
  '7':
  - type: text
    content: 'Ny voa sasany indray latsaka tany anaty tsilo; ary nitombo ny tsilo ka nangeja ny tsimoka, dia tsy namoa izy. '
  '8':
  - type: text
    content: 'Ny voa sasany kosa latsaka tamin’ny tany lonaka, dia naniry sy nitombo ary namoa: ny iray namokatra telopolo heny, ny iray enimpolo heny, ny iray zato heny.'
  '9':
  - type: text
    content: 'Dia nofaranan’i Jesoa hoe:'
  - type: text
    content: –Izay manan-tsofina hihainoana, aoka hihaino!
  - type: heading
    content: Fomba fiantefan’ny fanoharana
  - type: heading
    content: (Jereo Mt 13.10-17; Lk 8.9-10)
