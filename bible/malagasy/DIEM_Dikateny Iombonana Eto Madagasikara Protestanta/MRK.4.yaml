    - type: text
      text: Fanoharana momba ny mpamafy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 13.1-9; Lk 8.4-8)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampianatra teo moron’ny farihin’i Galilea indray i Jesoa; ary vahoaka be no nitangorona teo akaikiny, ka voatery niondrana an-tsambokely Izy, dia nipetraka teo. Ary ny vahoaka rehetra kosa terỳ an-tanety amoron’ny farihy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nitokana lavitra ny vahoaka i Jesoa, dia nanontany Azy ny hevitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' ireo mpomba Azy mbamin’ny 12 lahy, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianareo no efa nomena ny tsiambaratelo momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '; fa ho an’ireo any ivelany kosa dia manjary ankamantatra saro-pantarina ny zavatra rehetra, '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: hany ka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «hijery dia hijery izy fa tsy hahita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hihaino dia hihaino fa tsy hahafantatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afa-tsy raha miverina amin’Andriamanitra izy ka ho voavela heloka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 6.9-10, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hazavain’i Jesoa ny fanoharana momba ny mpamafy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 13.18-23; Lk 8.11-15)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ireo mpomba Azy sy tamin’ny 12 lahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy azonareo ve ilay fanoharana teo? Ka hataonareo ahoana no fahazo ny fanoharana hafa rehetra? '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny mpamafy dia mamafy ny tenin’Andriamanitra. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ao ny amafazana ny teny eo amoron-dalana: vao mahaheno izy, dia tonga i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: text
      text: ' manaisotra ny teny voafafy tao aminy. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ao koa ny amafazana an-tany be vato: vao mahaheno ny teny izy, dia mandray azy an-kafaliana, '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'saingy tsy alatsany lalina ao aminy fa vetivety foana no itanany azy; ka raha vao mitranga ny fahoriana na fanenjehana noho ny tenin’Andriamanitra, dia very finoana izy. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ao indray ny amafazana anaty tsilo: mahaheno ny teny izy, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'saingy ny fiahiana ny fiainana etoana sy ny fanodokan’ny harena ary ny fitsiriritana hafa rehetra, samy miditra ao aminy, ka mangeja ny teny tsy ho afa-mamoa. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanoharana
    - type: text
      text: ' no nampianaran’i Jesoa zavatra maro azy; ary nandritra ny fampianarany no nitenenany taminy hoe:'
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ao koa ny amafazana an-tany lonaka, dia ireo mahaheno ny teny sy mandray azy ka mamokatra: ny iray telopolo heny, ny iray enimpolo heny, ny iray zato heny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ny jiro
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 8.16-18)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa i Jesoa tamin’ireo mpomba Azy sy tamin’ny 12 lahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona moa no angalana ny jiro, ny hametrahana azy ao ambany vata famarana na ao ambany farafara ve sa ny hametrahana azy eo ambony fitoeran-jiro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 5.15; Lk 11.33.
      marker-yv: yv-n
    - type: text
      text: '? '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Satria tsy misy takona izay tsy haseho, na miafina izay tsy haharihary. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izay manan-tsofina hihainoana, aoka hihaino!
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Diniho izao teny renareo izao: izay famarana amaranareo ihany no hamaran’Andriamanitra ho anareo koa, ary hasiany fanampiny aza ny anareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izay famarana... ny anareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: izay mizana itsaranareo ny hafa no hitsaran’Andriamanitra anareo, ary vao mainka ho sarotiny kokoa aza Izy aminareo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Satria izay manana no homena; ary izay tsy manana kosa, na izay kely ananany aza dia halana aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ny fanirin’ny voa nafafy
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' dia tahaka ny amin’ity olona namafy voa amin’ny tany; '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa na matory izy ny alina, na mahatsiaro izy ny antoandro, dia mitsimoka sy mitombo ny voa amin’ny fomba tsy fantany akory. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa mamokatra fotsiny amin’izao ny tany: tahony aloha, dia salohiny maitso, ary farany dia voany matoy eny amin’ny salohiny. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary raha vao azo jinjaina, dia jinjain’ilay olona fa tonga ny fotoana fijinjana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jl 4.13.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ny voan-tsinapy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 13.31-32; Lk 13.18-19)
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Henoy ange: indro niainga ity mpamafy hamafy voa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy koa i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona no hampitahantsika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ' sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' inona no hoentintsika manazava azy? '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voan-tsinapy
    - type: text
      text: ', ka raha ilay afafy amin’ny tany iny, dia madinika indrindra izy amin’ny voa famafy rehetra etỳ ambonin’ny tany; '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: saingy rehefa voafafy, dia mitombo, ka tonga lehibe noho ny anana rehetra, sady misy rantsana vaventy ahafahan’ny voro-manidina manao akany honenana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fanoharana sy ny fampiasàn’i Jesoa azy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 13.34-35)
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' maro tahatahaka izany no nanambaràn’i Jesoa ny tenin’Andriamanitra tamin’ny olona, araka izay mety ho takatry ny sain’ny mpihaino. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nampiasa fanoharana Izy raha niteny tamin’ny olona; fa rehefa nitokana kosa Izy sy ny mpianany, izay vao nohazavainy tamin’ireo mpianany ny zava-drehetra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ampitsaharin’i Jesoa ny tafio-drivotra
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 8.23-27; Lk 8.22-25)
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny harivan’iny andro iny ihany dia hoy i Jesoa tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha isika hankerỳ ampita!
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa avy nandefa ny vahoaka ny mpianatra, dia nitondra an’i Jesoa tamin’ilay sambokely efa nisy Azy rahateo. Nisy sambokely maro hafa koa tafaraka taminy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro nisy tafio-drivotra mahery ka tafiditry ny alon-drano hatrany anaty sambokely, ary efa nila ho feno rano ny sambokely. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jesoa anefa natory teo amin’ny zoron-tsambo terỳ aoriana fa nisy ondana niondanany teo; ary nofohazin’ny mpianany Izy ka nilazany hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: –Mpampianatra ô, tsy mampaninona Anao ve na ho faty aza isika?
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha Izy ka niteny mafy ny rivotra ary nanao tamin’ny farihy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mangîna! Mitonia!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsahatra ny rivotra ary nanjary tony dia tony ny andro. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nony namafy izy, ny voa sasany latsaka teny amoron-dalana, ka tonga ny voro-manidina nitsindroka azy rehetra. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ny mpianany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no saro-tahotra ianareo? Tsy mbola manam-pinoana angaha ianareo?
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary natahotra dia natahotra tokoa iretsy mpianany, ka nifampilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa iza àry io no manaiky Azy hatramin’ny rivotra sy ny farihy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 65.8; 89.10; 107.23-32.
      marker-yv: yv-n
    - type: text
      text: '?'
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny voa sasany latsaka tamin’ny toerana be vato sady manify nofon-tany, ka vetivety dia nitsimoka satria tsy lalina ny tany nilentehany; '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'saingy nony nipoaka ny andro, dia nalazon’ny hafanana ireo tsimoka ireo ka maina satria tsy namaka lalina. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny voa sasany indray latsaka tany anaty tsilo; ary nitombo ny tsilo ka nangeja ny tsimoka, dia tsy namoa izy. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny voa sasany kosa latsaka tamin’ny tany lonaka, dia naniry sy nitombo ary namoa: ny iray namokatra telopolo heny, ny iray enimpolo heny, ny iray zato heny.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nofaranan’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay manan-tsofina hihainoana, aoka hihaino!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fomba fiantefan’ny fanoharana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 13.10-17; Lk 8.9-10)
    marker-yv: yv-h
