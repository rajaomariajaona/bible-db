document_id: PSA.27,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Mandry fahalemana aho ao an-tranon’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no mpanazava sy mpamonjy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka iza no hatahorako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no toy ny manda miaro ny aiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka iza no hangovitako?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nandao ahy ny ray aman-dreniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao kosa, TOMPO ô, no nandray ahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, asehoy ahy ny lalana soritanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny amin’ireo fahavaloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tariho amin’ny lala-mahitsy aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza avela hanaram-po amiko ireo mpandrafy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa vavolombelona mandainga no mitsangan-kamely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mifofofofo erỳ mba hiampanga ahy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona ny amiko raha tsy natoky aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hahita ny hatsarampon’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eto amin’ity tany iainantsika ity?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahandrasa ny TOMPO ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matanjaha ary mahereza fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mahandrasa ny TOMPO!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manatona kosa ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny biby masiaka hamely ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo fahavalo mandrafy ahy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho lavo hitsikasina amin’ny tany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tafika no tonga hanao fahirano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hanan-tahotra akory aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na misy ady mihatra amiko aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handry fahalemana ihany aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zavatra tokana no angatahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady irîko fatratra homen’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny hitoetra ao an-tranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandritra ny androm-piainako rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hianoka amin’ny hatsarampony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hiandry ny torolalany ao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoliny
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa raha tonga ny andro mahory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hafeniny ao an’efitra fialofany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hampiereny tokoa ao an-dainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hasandrany ambony vatolampy aho.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izay aho dia ho voasandrany tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho ambonin’ireo fahavalo manodidina ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom
    - type: text
      text: -pihobiana ao an-dainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hihira salamo hankalazana ny TOMPO.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, mba henoy ny feoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha miantso vonjy aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary iantrao aho ka valio.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ndeha ianao, hoy ny foko amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ndeha ianao mitady ny TOMPO.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany indrindra no itodihako aminao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa aza mihodina amiko Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza mandroaka ahy an-katezerana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no efa namonjy ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza arianao aho ary aza ilaozanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no Andriamanitra mpamonjy ahy.
