document_id: PSA.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mandry fahalemana aho ao an-tranon’ny Tompo
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Ny TOMPO no mpanazava sy mpamonjy ahy,
  - type: text
    content: ka iza no hatahorako?
  - type: text
    content: Ny TOMPO no toy ny manda miaro ny aiko,
  - type: text
    content: ka iza no hangovitako?
  '10':
  - type: text
    content: Raha nandao ahy ny ray aman-dreniko,
  - type: text
    content: Ianao kosa, TOMPO ô, no nandray ahy.
  '11':
  - type: text
    content: TOMPO ô, asehoy ahy ny lalana soritanao;
  - type: text
    content: noho ny amin’ireo fahavaloko,
  - type: text
    content: dia tariho amin’ny lala-mahitsy aho.
  '12':
  - type: text
    content: Aza avela hanaram-po amiko ireo mpandrafy ahy,
  - type: text
    content: fa vavolombelona mandainga no mitsangan-kamely
  - type: text
    content: sy mifofofofo erỳ mba hiampanga ahy.
  '13':
  - type: text
    content: Inona ny amiko raha tsy natoky aho
  - type: text
    content: fa hahita ny hatsarampon’ny TOMPO
  - type: text
    content: eto amin’ity tany iainantsika ity?
  '14':
  - type: text
    content: Mahandrasa ny TOMPO ianao!
  - type: text
    content: Matanjaha ary mahereza fo;
  - type: text
    content: eny, mahandrasa ny TOMPO!
  '2':
  - type: text
    content: Raha manatona kosa ny olon-dratsy
  - type: text
    content: toy ny biby masiaka hamely ahy,
  - type: text
    content: dia ireo fahavalo mandrafy ahy ireo
  - type: text
    content: no ho lavo hitsikasina amin’ny tany.
  '3':
  - type: text
    content: Raha tafika no tonga hanao fahirano,
  - type: text
    content: dia tsy hanan-tahotra akory aho;
  - type: text
    content: ary na misy ady mihatra amiko aza,
  - type: text
    content: dia handry fahalemana ihany aho.
  '4':
  - type: text
    content: Zavatra tokana no angatahiko
  - type: text
    content: 'sady irîko fatratra homen’ny TOMPO:'
  - type: text
    content: dia ny hitoetra ao an-tranony
  - type: text
    content: mandritra ny androm-piainako rehetra,
  - type: text
    content: mba hianoka amin’ny hatsarampony
  - type: text
    content: sy hiandry ny torolalany ao an-
  - type: text
    content: tempoliny
  - type: text
    content: .
  '5':
  - type: text
    content: Koa raha tonga ny andro mahory,
  - type: text
    content: dia hafeniny ao an’efitra fialofany aho
  - type: text
    content: sy hampiereny tokoa ao an-dainy;
  - type: text
    content: eny, hasandrany ambony vatolampy aho.
  '6':
  - type: text
    content: Amin’izay aho dia ho voasandrany tokoa
  - type: text
    content: ho ambonin’ireo fahavalo manodidina ahy;
  - type: text
    content: 'ka hanolotra '
  - type: text
    content: sorom
  - type: text
    content: -pihobiana ao an-dainy
  - type: text
    content: sady hihira salamo hankalazana ny TOMPO.
  '7':
  - type: text
    content: TOMPO ô, mba henoy ny feoko
  - type: text
    content: raha miantso vonjy aminao,
  - type: text
    content: ary iantrao aho ka valio.
  '8':
  - type: text
    content: «Ndeha ianao, hoy ny foko amiko,
  - type: text
    content: ndeha ianao mitady ny TOMPO.»
  - type: text
    content: Izany indrindra no itodihako aminao.
  '9':
  - type: text
    content: Koa aza mihodina amiko Ianao,
  - type: text
    content: aza mandroaka ahy an-katezerana,
  - type: text
    content: fa Ianao no efa namonjy ahy.
  - type: text
    content: Aza arianao aho ary aza ilaozanao,
  - type: text
    content: fa Ianao no Andriamanitra mpamonjy ahy.
