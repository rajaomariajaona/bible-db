document_id: 2SA.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny faharesen’ny tafik’i Absalôma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampilaharin’i Davida ny miaramila izay niaraka taminy ka nanendreny mpifehy arivo sy mpifehy zato hibaiko azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahita azy ny lehilahy iray ka nilaza tamin’i Jôaba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hitako mihantona amin’ny terebinta i Absalôma.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jôaba tamin’ilay mpilaza:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hitanao izy, koa nahoana no tsy nasianao ho faty teo ihany? Ho nomeko sekela volafotsy folo sy fehikibo ianao.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ralehilahy tamin’i Jôaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Na dia homenao sekela volafotsy arivo aza aho, dia tsy haninji-tanana amin’io zanakalahin’ny mpanjaka io, satria ny sofintsika no samy nandre ny nandidian’ny mpanjaka anao sy i Abisay ary i Itàhy hoe: «Aoka mba tsy hisy hikasika an’i Absalôma.» '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa raha nivadika tamin’izany aho ka nahafaty azy, dia tsy misy miafina amin’ny mpanjaka; ary na dia ianao io aza dia hitsangana hiampanga ahy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hoy i Jôaba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy handany andro aminao eto aho!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisiny ny lefona telo ka natrobany ny fon’i Absalôma, raha ilay izy mbola velona ka nihantona tamin’ny terebinta iny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanodidina an’i Absalôma ny tovolahy folo mpitondra ny fiadian’i Jôaba ka nanapitra ny ainy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notsofin’i Jôaba ny anjomara, dia natsahatr’ireo miaramilan’i Davida ny fanenjehana ny Israelita satria efa nanakana azy i Jôaba. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nalaina ny fatin’i Absalôma, ka natsipy tao anaty lavaka lehibe iray tany an’ala dia nasiana antontam-bato lehibe teo amboniny. Ary nandositra nody any an-tranony avokoa ny Israelita rehetra.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fahavelony i Absalôma dia efa nampanao tsangambato ho azy tao an-dohasahan’ny mpanjaka, fa hoy izy anakampo: «Tsy manan-janakalahy hamelo-maso ny anarako aho.» Koa ny anaran’ny tenany ihany no niantsoany an’ilay tsangambato. Izany no mbola anaovana azy mandraka ankehitriny hoe «Tsangambaton’i Absalôma».'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ren’i Davida ny nahafatesan’i Absalôma
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy i Ahimahatsa zanakalahin’i Tsadôka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka hihazakazahako any amin’ny mpanjaka ny fitondrana ity vaovao mahafaly ny amin’ny nanomezan’ny TOMPO azy rariny ity ka nanafahany azy tamin’ny fahavalony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nasain’i Davida hiainga ny tafiny; ka ny ampahatelony nofehezin’i Jôaba, ny ampahatelony hafa nofehezin’i Abisay zanakalahin’i Tseroià sady rahalahin’i Jôaba, ary ny ampahatelo farany nofehezin’i Itàhy izay avy any Gata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 5.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. Dia hoy ny mpanjaka tamin’ireto miaramila: «Izaho koa dia handeha hiaraka aminareo». '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Jôaba taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, tsy ho mpitondra vaovao mahafaly ianao raha anio no mankany, satria maty ny zanakalahin’ny mpanjaka; fa amin’ny andro hafa ianao no hitondra vaovao.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jôaba tamin’ny Kosita iray mpanompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana ka lazao amin’ny mpanjaka izay efa hitanao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niankohoka teo anatrehan’i Jôaba ilay Kosita, dia lasa nihazakazaka. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy indray i Ahimahatsa zanakalahin’i Tsadôka tamin’i Jôaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay alehany any alehany, fa avelao aho hihazakazaka hanaraka ilay Kosita.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Jôaba hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hihazakazaka ahoana, anaka? Tsy hitondra soa ho anao velively ny vaovao toy izany!
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’i Ahimahatsa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mampaninona izany, fa avelao ihany aho handeha.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Jôaba taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana àry!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nihazakazaka nihazo ny lalan’ny lemak’i Jôrdàna i Ahimahatsa ka nisongona ilay Kosita.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay i Davida dia nipetraka teo anelanelan’ny varavaran-droa. Dia niakatra teo amin’ny marin-tampona ambony vavahadin’ny manda ny mpitily; raha niandrandra izy, dia nahatazana lehilahy iray mihazakazaka. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niantso mafy mba hampandre ny mpanjaka ilay mpitily. Dia hoy ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha irery izy, dia vaovao tsara no hambarany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nanatona hatrany ilay lehilahy teo, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nahita olon-kafa nihazakazaka indray ny mpitily. Ka niantso mafy ny mpiandry vavahady izy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iny koa mbola misy lehilahy iray tamy mihazakazaka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ihany ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hitondra vaovao tsara koa izany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpitily hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha ny fomba fihazakazahany, dia fantatro ilay voalohany fa i Ahimahatsa zanakalahin’i Tsadôka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lehilahy tsara fanahy iny, ka vaovao tsara no ahatongavany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niantso mafy i Ahimahatsa ka nanao tamin’ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fiadanana!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niankohoka nitehi-tany izy teo anatrehan’ny mpanjaka sady nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hisaorana anie ny TOMPO Andriamanitrao fa efa natolony anao, ry andriamanjaka, ireo olona nanainga tanana hanohitra anao.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsara ihany ve ny amin’i Absalôma zatovolahy izay?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa i Ahimahatsa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha naniraka ity mpanomponao ity sy ny tenako i Jôaba, dia saritadritaka be no hitako nefa tsy fantatro izay antony.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa ny miaramila hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mahazo mandeha ianao. Satria raha mandositra izahay, dia tsy hisy fahavalo hiraharaha akory; ary na dia maty avokoa aza ny antsasakay, dia tsy hahoany. Fa ianao kosa dia toy ny iray alina eo aminay; koa tsaratsara kokoa raha avy atỳ an-tanàna ianao no mandefa famonjena ho anay.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mihataha kely ianao ka mijanona etsy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihataka kely izy ka nijanona teo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamin’izay ilay Kosita ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manam-baovao tsara ho anao aho, ry andriamanjaka; fa ankehitriny ny TOMPO efa nanome rariny anao ka nanafaka anao tamin’ireo rehetra nitsangana hikomy aminao.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’ilay Kosita:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba tsara ihany ve ny amin’i Absalôma zatovolahy izay?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa ilay Kosîta:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho tahaka an’iny zatovolahy iny anie, ry andriamanjaka, ny fahavalonao sy izay rehetra mitsangana hanisy ratsy anao!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay sitrakareo ihany no hataoko.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana teo am-bavahady ny mpanjaka, raha nivoaka tsizatozato sy tsiarivoarivo ny tafiny manontolo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandidy an’i Jôaba sy Abisay ary Itàhy ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Noho ny amiko, dia aoka ianareo tsy hikasi-tanàna ny zatovolahy Absalôma. Ary ny miaramila rehetra dia samy nandre ny nanomezan’ny mpanjaka didy momba an’i Absalôma.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nivoaka nankeny an-tsaha ny miaramilan’i Davida hifanehatra amin’ny Israelita hafa ka rafitra tao amin’ny alan’i Efraîma ny ady. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nilavo lefona teo anatrehan’ny mpanompon’i Davida ny tafik’i Israely. Navesatra loatra ny faharesena tamin’io andro io fa nahatratra 20 000 ny olona maty. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitatra eran’ny firenena ny ady, ka be ny maty tany an’ala tamin’izay noho ny maty an’ady.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Matin’i Jôaba i Absalôma
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nifanehatra tampoka tamin’ny miaramilan’i Davida i Absalôma raha iny nitaingina boriky iny izy. Nitsofoka tany an-tsefatsefaky ny rantsan’ny hazo terebinta lehibe ilay ampondra, ka voasaringotry ny terebinta ny lohan’i Absalôma; ary lasa nanohy dia ilay boriky, fa izy kosa nihantona teo anelanelan’ny lanitra sy ny tany. '
