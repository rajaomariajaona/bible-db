    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa hatramin’ny fahagola no niandohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatramin’ny andro taloha elabe.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Noho izany, ny Tompo dia hanolotra ny vahoakany
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fahavalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-piavin’ny andro hahatera-dahy ny vehivavy iray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izay sisa velona, amin’ireo rahalahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: voasesi-tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiverina ho any amin’ireo Israelita namany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary hitsangana hitondra ny vahoaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany mpanapaka nampanantenaina izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hombàn’ny hery sy heniky ny famirapiratana
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny TOMPO Andriamaniny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handry feizay ny vahoakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ho lehibe hatrany am-paran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izany mpanapaka izany:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: izy no hitondra fiadanana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Raha tonga hanafika ny tanintsika ny Asirianina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitsofoka hatraty an-dapantsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hanangana mpitari-tafika marobe hamelezana azy isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary handresy amin’ny sabatra sy lefom-pohy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mpitari-tafika ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hifehy an’i Asiria, tanin’i Nimrôda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany mpanapaka izany mihitsy
- type: usfm
  marker: q1
  children:
  - type: text
