document_id: MIC.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Betlehema, tanindrazan’ilay mpanjaka hamonjy
  - type: text
    content: 'Dia hoy ny Tompo hoe:'
  - type: text
    content: «Ianao, ry Betlehema Efratà,
  - type: text
    content: isan’ireo tanàna kely indrindra ao Joda ianao!
  - type: text
    content: Kanefa avy aminao no hamoahako
  - type: text
    content: ilay ho Mpanjaka an’i Israely
  - type: note
    content: Jereo Mt 2.6.
  - type: text
    content: .
  - type: text
    content: Efa hatramin’ny fahagola no niandohany,
  - type: text
    content: dia hatramin’ny andro taloha elabe.»
  '10':
  - type: text
    content: Horavako ny tanàna eo amin’ny taninareo,
  - type: text
    content: ary harodako avokoa ny mandanareo.
  '11':
  - type: text
    content: Hofoanako tsy ho eo an-tanànanareo
  - type: text
    content: ny fanaovana ody ratsy
  - type: text
    content: ary tsy hisy eo aminareo intsony ny mpanandro.
  '12':
  - type: text
    content: Hofoanako tsy ho eo afovoanareo intsony
  - type: text
    content: ny sampinareo sy ny tsangambaton-tsampinareo,
  - type: text
    content: ka tsy hiankohoka amin’ny zavatra
  - type: text
    content: izay nataon’ny tananareo intsony ianareo.
  '13':
  - type: text
    content: Hongotako tsy ho eo afovoanareo
  - type: text
    content: ny tsatokazo ho an’i Aserà
  - type: note
    content: 'tsatokazo ho an’i Aserà: jereo Mpits 3.7 sy nta.'
  - type: text
    content: ary hofongorako ireo sampinareo.
  '14':
  - type: text
    content: Fahatezerana mirehitra mafy
  - type: text
    content: no hanatanterahako valifaty
  - type: text
    content: amin’ny firenena izay tsy nihaino Ahy.»
  '2':
  - type: text
    content: –Noho izany, ny Tompo dia hanolotra ny vahoakany
  - type: text
    content: amin’ny fahavalo
  - type: text
    content: mandra-piavin’ny andro hahatera-dahy ny vehivavy iray;
  - type: text
    content: ka izay sisa velona, amin’ireo rahalahiny
  - type: text
    content: voasesi-tany,
  - type: text
    content: dia hiverina ho any amin’ireo Israelita namany.
  '3':
  - type: text
    content: Ary hitsangana hitondra ny vahoaka
  - type: text
    content: izany mpanapaka nampanantenaina izany,
  - type: text
    content: hombàn’ny hery sy heniky ny famirapiratana
  - type: text
    content: avy amin’ny TOMPO Andriamaniny.
  - type: text
    content: Dia handry feizay ny vahoakany,
  - type: text
    content: satria ho lehibe hatrany am-paran’ny tany
  - type: text
    content: 'izany mpanapaka izany:'
  '4':
  - type: text
    content: izy no hitondra fiadanana!
  - type: text
    content: –Raha tonga hanafika ny tanintsika ny Asirianina
  - type: text
    content: ka hitsofoka hatraty an-dapantsika,
  - type: text
    content: dia hanangana mpitari-tafika marobe hamelezana azy isika.
  '5':
  - type: text
    content: Ary handresy amin’ny sabatra sy lefom-pohy
  - type: text
    content: ireo mpitari-tafika ireo
  - type: text
    content: ka hifehy an’i Asiria, tanin’i Nimrôda.
  - type: text
    content: Izany mpanapaka izany mihitsy
  - type: text
    content: no hanafaka antsika
  - type: note
    content: 'Araka ny Gen 10.8-11 dia i Nimrôda no razamben’ny vahoaka monina any Mezôpôtamia. –Izany mpanapaka izany mihitsy no hanafaka antsika: dkt hafa Ireo no hanafaka antsika (jereo and 2, 3).'
  - type: text
    content: ' amin’ny Asirianina'
  - type: text
    content: izay hihoatra sisitany
  - type: text
    content: ka ho tonga hanafika ny tanintsika.
  - type: heading
    content: Ireo sisa velona amin’i Israely eo anivon’ny firenen-kafa
  '6':
  - type: text
    content: Amin’izay ny sisa velona amin’ny taranak’i Jakôba
  - type: note
    content: 'ny sisa... Jakôba: mahafaoka ny Israelita rehetra am-pielezana izany, na ny avy tamin’ny fanjakana avaratra (Israely) na ny avy amin’ny fanjakana atsimo (Joda).'
  - type: text
    content: ','
  - type: text
    content: eo anivon’ny vahoaka marobe,
  - type: text
    content: dia ho tahaka ny ando avy amin’ny TOMPO
  - type: text
    content: sy ho tahaka ny ranonorana latsaka amin’ny ahitra;
  - type: text
    content: ka tsy olombelona fa Andriamanitra
  - type: text
    content: no antenainy sy iankinany.
  '7':
  - type: text
    content: Amin’izay, ny sisa velona amin’ny taranak’i Jakôba,
  - type: text
    content: eo anivon’ny vahoaka marobe any amin’ny firenen-kafa,
  - type: text
    content: dia ho tahaka ny liona
  - type: text
    content: mihaza amin’ny biby anaty ala
  - type: text
    content: sy ho tahaka ny liona tanora
  - type: text
    content: mihaza amin’ny andian’ondry;
  - type: text
    content: rehefa mandalo ny liona,
  - type: text
    content: dia manosihosy sy mamiravira,
  - type: text
    content: ka tsy misy afaka mamonjy.
  '8':
  - type: text
    content: Dia toy izany koa,
  - type: text
    content: aoka ny tananareo hiainga hamely izay manohitra anareo
  - type: text
    content: ary aoka ho ringana avokoa ny fahavalonareo
  - type: note
    content: Ao amin’ny RM dia tsy voalaza ny mpanao ny asa eo amin’ny matoanteny ka ny sasany mihevitra fa i Israely (aoka ny tananareo... anareo... fahavalonareo), ary ny sasany mihevitra fa Andriamanitra (aoka ny tananao... anao... fahavalonao).
  - type: text
    content: '!'
  - type: heading
    content: Hofoanan’ny Tompo ireo fialofana sandoka rehetra
  '9':
  - type: text
    content: 'Ary hoy ny TOMPO hoe:'
  - type: text
    content: «Izao no ho tonga amin’izany andro izany.
  - type: text
    content: Haringako tsy ho eo afovoanareo ny soavalinareo
  - type: note
    content: Jereo Jos 1.7; Sal 33.17 sy nta.
  - type: text
    content: ','
  - type: text
    content: ary holevoniko ny kalesinareo.
