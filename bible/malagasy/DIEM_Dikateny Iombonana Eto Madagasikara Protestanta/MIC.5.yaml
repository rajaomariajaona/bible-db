  - type: text
    text: 'Dia hoy ny Tompo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ianao, ry Betlehema Efratà,
- type: usfm
  marker: q1
  children:
  - type: text
    text: isan’ireo tanàna kely indrindra ao Joda ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa avy aminao no hamoahako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay ho Mpanjaka an’i Israely
  - type: usfm
    marker: f
