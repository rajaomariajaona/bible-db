document_id: 2CH.36,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakàn’i Jôahaza sy i Jôiakima ary i Jôiakîna
  - type: heading
    content: (Jereo 2 Mp 23.30–24.17)
  - type: text
    content: 'Nalain’ny mponin’i Joda kosa i Jôahaza zanakalahin’i Jôsià ka nataony mpanjaka tao Jerosalema handimby an-drainy. '
  '10':
  - type: text
    content: Nony tonga ny lohataona, dia nandefa iraka i Nebokadnetsara ka nitondra an’i Jôiakîna mbamin’ny fanaka sarobidy tao an-tranon’ny TOMPO ho any Babilôna
  - type: note
    content: 'Jôiakima... any Babilôna: jereo Jer 22.24-30; 24.1-10; 29.1-2; Ezek 17.12.'
  - type: text
    content: ; dia i Tsedekià
  - type: note
    content: 'I Tsedekià dia rahalahin’i Jôiakima, na rahalahin-drain’i Jôiakima: jereo 2 Mp 24.17; jereo koa Jer 37.1; sy Ezek 17.13.'
  - type: text
    content: ' rahalahin-drain’i Jôiakîna no nampanjakain’i Nebokadnetsara tamin’i Joda sy i Jerosalema.'
  - type: heading
    content: Ny nanjakàn’i Tsedekià. Fakana an’i Jerosalema
  - type: heading
    content: (Jereo 2 Mp 24.18–25.21; Jer 39.1-10; 52.1-27)
  '11':
  - type: text
    content: Feno 21 taona i Tsedekià
  - type: note
    content: Jereo Jer 27–28.
  - type: text
    content: ' fony tonga mpanjaka; ary naharitra iraika ambin’ny folo taona no nanjakany tao Jerosalema. '
  '12':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO Andriamaniny izy, ary tsy mba niaiky heloka teo anatrehan’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ', izay nilaza hafatra avy amin’ny TOMPO. '
  '13':
  - type: text
    content: Nikomiany aza i Nebokadnetsara mpanjaka izay efa nampianiana azy tamin’Andriamanitra
  - type: note
    content: Jereo Ezek 17.15.
  - type: text
    content: '. Nanamafy hatoka sy fo izy mba tsy hiverenany amin’ny TOMPO Andriamanitr’i Israely. '
  '14':
  - type: text
    content: 'Ny lohandoha-mpisorona sy ny loholom-bahoaka rehetra koa dia naniratsira an’Andriamanitra araka ny fanompoan-tsampy maharikoriko fanaon’ny hafa firenena, ka nandoto ny '
  - type: text
    content: tempoly
  - type: text
    content: ' izay efa natokan’ny TOMPO ho Azy tao Jerosalema. '
  '15':
  - type: text
    content: 'Kanefa ny TOMPO Andriamanitry ny razany dia nangoraka ilay vahoakany sy ilay fonena-masiny, ka nampitondra teny ireo iraka izay nalefany matetika ho any amin’ny olony. '
  '16':
  - type: text
    content: 'Saingy nihomehezan’ny vahoaka ireo irak’Andriamanitra sady nozimbazimbainy ny teniny; noesoesoiny ny mpaminaniny mandra-pihatry ny fahatezeran’ny TOMPO taminy ka tsy nisy fanafany intsony. '
  '17':
  - type: text
    content: Ny mpanjakan’ny Babilônianina no nentin’ny Tompo namely ny vahoakany
  - type: note
    content: Jereo Jer 21.1-10; 34.1-5.
  - type: text
    content: ' sy namono nahafaty ny miaramilany tamin’ny sabatra hatrany an-tempoliny mihitsy aza, ka tsy nisy olona nangorahan’io mpanjaka io, na tovolahy na tovovavy na ny olon-dehibe na ny antitra; eny, natolotr’Andriamanitra teo an-tanan’i Nebokadnetsara avokoa ny zava-drehetra. '
  '18':
  - type: text
    content: 'Nalain’io mpanjaka io ny fanaka rehetra tao an-tranon’Andriamanitra, na ny vaventy na ny madinika, mbamin’ny zava-tsarobidy tao an-tranon’ny TOMPO ary ny zava-tsarobidin’ny mpanjaka sy ireo manampahefana; ka ireny rehetra ireny dia nentiny nankany Babilôna. '
  '19':
  - type: text
    content: Nodoran’ny Babilônianina koa ny tranon’Andriamanitra, ary noravany ny mandan’i Jerosalema; notselarany afo ny lapa rehetra ary nosimbany ny fanaka sarobidy isan-karazany tao an-tanàna
  - type: note
    content: Jereo 1 Mp 9.8.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Feno 23 taona i Jôahaza fony tonga mpanjaka; ary telo volana ihany no nanjakany tao Jerosalema. '
  '20':
  - type: text
    content: 'Ny olona sisa tsy matin-tsabatra dia nentin’i Nebokadnetsara ho babo tany Babilôna, ka tonga nanompo azy sy ny zanany ireny mandra-piavin’ny fanjakàn’i Persia. '
  '21':
  - type: text
    content: 'Izany no nahatanterahan’ny teny nampilazain’ny TOMPO an’i Jeremià hoe: «Ity tany ity dia hilaozana mandritra ny fitopolo taona, mandra-pahatapitra ny fe-potoana tokony hitsaharany mba ho onitry ny andro fitsaharana rehetra izay tsy voatandrina'
  - type: note
    content: Tao Israely, araka ny Lev 25.1-7, dia tokony navela hiala sasatra iray taona isaky ny fito taona ny tany; kanefa tsy notandroina tsara izany lalàna izany. Ity lazaina fa tenin’i Jeremià ity dia fanambàrana ampahany avy amin’ny Lev 26.34-35 sy ampahany avy amin’ny Jer 25.11.
  - type: text
    content: .»
  - type: heading
    content: Navelan’i Kirôsa haorina indray ny tempoly
  '22':
  - type: text
    content: Tamin’ny taona voalohany
  - type: note
    content: Ny and roa farany eto amin’ny 2 Tan dia hita indray any amin’ny fiantombohan’ny bokin’i Hezrà (1.1-3); jereo ny naoty tandrifin’izany.
  - type: text
    content: ' nanjakàn’i Kirôsa, amperôran’i Persia, no tanteraka ny teny nampilazain’ny TOMPO an’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: '. Nanaitra fanahy an’i Kirôsa manko tamin’izay ny TOMPO, ka nahatonga azy hampiely an-kabary sy an-tsoratra eran’ny fanjakàny manontolo ireto hafatra ireto: '
  '23':
  - type: text
    content: '«Izao no lazain’i Kirôsa amperôran’i Persia: Ny TOMPO Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: ' dia efa nanome ahy ny fanjakana rehetra ambonin’ny tany ary efa nandidy ahy hanorina '
  - type: text
    content: tempoly
  - type: text
    content: ' ho Azy any Jerosalema, izay ao amin’ny tanin’i Joda. Koa aoka ianareo rehetra izay anisan’ny vahoakan’ny TOMPO mba hiakatra any Jerosalema! Hiaraka aminareo anie ilay TOMPO Andriamanitrareo!»'
  '3':
  - type: text
    content: 'Teo koa izy no nesorin’i Nekao, mpanjakan’i Ejipta; ary nampandoavin’io Farao io sazy volafotsy sy volamena samy telo taonina ny fanjakan’i Joda. '
  '4':
  - type: text
    content: Dia i Eliakima rahalahin’i Jôahaza no nataony mpanjaka tamin’i Joda sy i Jerosalema, ary novany anarana hoe Jôiakima; fa i Jôahaza rahalahiny kosa nalain’i Nekao ka nentiny ho any Ejipta
  - type: note
    content: Jereo Jer 22.11-12.
  - type: text
    content: .
  '5':
  - type: text
    content: Feno 25 taona i Jôiakima
  - type: note
    content: Jereo Jer 22.18-19; 26.1-6; 35.1-19.
  - type: text
    content: ' fony tonga mpanjaka; ary naharitra 11 taona no nanjakany tao Jerosalema. Nanao izay ratsy eo imason’ny TOMPO Andriamaniny izy. '
  '6':
  - type: text
    content: Ary i Nebokadnetsara, mpanjakan’i Babilôna, no niakatra namely azy ka namatotra azy tamin’ny gadra varahina mba hitondrany azy ho any Babilôna
  - type: note
    content: Jereo Jer 25.1-38; 36.1-32; 45.1-15; Dan 1.1-2.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Ny fanaka sasany tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' dia nentin’i Nebokadnetsara ho any Babilôna koa ka nataony tao amin’ny lapany tany Babilôna.'
  '8':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôiakima ary koa ny fanompoam-tsampy maharikoriko nataony sy ny zavatra hafa rehetra nanjo azy dia voasoratra ao amin’ny '
  - type: text
    content: Bokin’ireo mpanjakan’i
  - type: text
    content: ' '
  - type: text
    content: Israely
  - type: text
    content: ' '
  - type: text
    content: sy i Joda
  - type: note
    content: Jereo 16.11 sy nta.
  - type: text
    content: . Ary i Jôiakîna zanany lahy no nanjaka nandimby azy.
  '9':
  - type: text
    content: Feno 18 taona
  - type: note
    content: '18 taona: araka ny 2 Mp 24.8 ary koa ny stf sasany ahitana ny dkt tranainy grika momba ity 2 Tan ity. Nandingana voambolana angamba ilay kôpista teo am-pandikana ka nahatonga ny RM hanao hoe valo taona.'
  - type: text
    content: 'i Jôiakîna, fony tonga mpanjaka; ary telo volana sy folo andro ihany no nanjakany tao Jerosalema, sady nanao izay ratsy eo imason’ny TOMPO izy. '
