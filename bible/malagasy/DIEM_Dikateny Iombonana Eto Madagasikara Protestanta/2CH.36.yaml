          text: 'dia rahalahin’i Jôiakima, na rahalahin-drain’i Jôiakima: jereo 2 Mp 24.17; jereo koa Jer 37.1; sy Ezek 17.13.'
      marker-yv: yv-n
    - type: text
      text: ' rahalahin-drain’i Jôiakîna no nampanjakain’i Nebokadnetsara tamin’i Joda sy i Jerosalema.'
