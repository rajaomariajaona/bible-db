    - type: text
      text: Ny nanjakàn’i Jôahaza sy i Jôiakima ary i Jôiakîna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 23.30–24.17)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalain’ny mponin’i Joda kosa i Jôahaza zanakalahin’i Jôsià ka nataony mpanjaka tao Jerosalema handimby an-drainy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony tonga ny lohataona, dia nandefa iraka i Nebokadnetsara ka nitondra an’i Jôiakîna mbamin’ny fanaka sarobidy tao an-tranon’ny TOMPO ho any Babilôna
