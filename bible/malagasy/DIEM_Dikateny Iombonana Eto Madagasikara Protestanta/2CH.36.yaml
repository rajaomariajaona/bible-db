      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ho Azy any Jerosalema, izay ao amin’ny tanin’i Joda. Koa aoka ianareo rehetra izay anisan’ny vahoakan’ny TOMPO mba hiakatra any Jerosalema! Hiaraka aminareo anie ilay TOMPO Andriamanitrareo!»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo koa izy no nesorin’i Nekao, mpanjakan’i Ejipta; ary nampandoavin’io Farao io sazy volafotsy sy volamena samy telo taonina ny fanjakan’i Joda. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia i Eliakima rahalahin’i Jôahaza no nataony mpanjaka tamin’i Joda sy i Jerosalema, ary novany anarana hoe Jôiakima; fa i Jôahaza rahalahiny kosa nalain’i Nekao ka nentiny ho any Ejipta
