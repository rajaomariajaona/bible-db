      children:
      - type: text
        text: mpaminany
    - type: text
      text: '. Nanaitra fanahy an’i Kirôsa manko tamin’izay ny TOMPO, ka nahatonga azy hampiely an-kabary sy an-tsoratra eran’ny fanjakàny manontolo ireto hafatra ireto: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao no lazain’i Kirôsa amperôran’i Persia: Ny TOMPO Andriamanitry ny '
    - type: usfm
