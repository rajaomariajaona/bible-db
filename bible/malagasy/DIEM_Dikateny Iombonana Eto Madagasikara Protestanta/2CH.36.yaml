    - type: text
      text: ' fony tonga mpanjaka; ary naharitra iraika ambin’ny folo taona no nanjakany tao Jerosalema. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao izay ratsy eo imason’ny TOMPO Andriamaniny izy, ary tsy mba niaiky heloka teo anatrehan’i Jeremià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ', izay nilaza hafatra avy amin’ny TOMPO. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nikomiany aza i Nebokadnetsara mpanjaka izay efa nampianiana azy tamin’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Ezek 17.15.
      marker-yv: yv-n
    - type: text
      text: '. Nanamafy hatoka sy fo izy mba tsy hiverenany amin’ny TOMPO Andriamanitr’i Israely. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lohandoha-mpisorona sy ny loholom-bahoaka rehetra koa dia naniratsira an’Andriamanitra araka ny fanompoan-tsampy maharikoriko fanaon’ny hafa firenena, ka nandoto ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' izay efa natokan’ny TOMPO ho Azy tao Jerosalema. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ny TOMPO Andriamanitry ny razany dia nangoraka ilay vahoakany sy ilay fonena-masiny, ka nampitondra teny ireo iraka izay nalefany matetika ho any amin’ny olony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saingy nihomehezan’ny vahoaka ireo irak’Andriamanitra sady nozimbazimbainy ny teniny; noesoesoiny ny mpaminaniny mandra-pihatry ny fahatezeran’ny TOMPO taminy ka tsy nisy fanafany intsony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpanjakan’ny Babilônianina no nentin’ny Tompo namely ny vahoakany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 21.1-10; 34.1-5.
      marker-yv: yv-n
    - type: text
      text: ' sy namono nahafaty ny miaramilany tamin’ny sabatra hatrany an-tempoliny mihitsy aza, ka tsy nisy olona nangorahan’io mpanjaka io, na tovolahy na tovovavy na ny olon-dehibe na ny antitra; eny, natolotr’Andriamanitra teo an-tanan’i Nebokadnetsara avokoa ny zava-drehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalain’io mpanjaka io ny fanaka rehetra tao an-tranon’Andriamanitra, na ny vaventy na ny madinika, mbamin’ny zava-tsarobidy tao an-tranon’ny TOMPO ary ny zava-tsarobidin’ny mpanjaka sy ireo manampahefana; ka ireny rehetra ireny dia nentiny nankany Babilôna. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nodoran’ny Babilônianina koa ny tranon’Andriamanitra, ary noravany ny mandan’i Jerosalema; notselarany afo ny lapa rehetra ary nosimbany ny fanaka sarobidy isan-karazany tao an-tanàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 9.8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Feno 23 taona i Jôahaza fony tonga mpanjaka; ary telo volana ihany no nanjakany tao Jerosalema. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona sisa tsy matin-tsabatra dia nentin’i Nebokadnetsara ho babo tany Babilôna, ka tonga nanompo azy sy ny zanany ireny mandra-piavin’ny fanjakàn’i Persia. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no nahatanterahan’ny teny nampilazain’ny TOMPO an’i Jeremià hoe: «Ity tany ity dia hilaozana mandritra ny fitopolo taona, mandra-pahatapitra ny fe-potoana tokony hitsaharany mba ho onitry ny andro fitsaharana rehetra izay tsy voatandrina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tao Israely, araka ny Lev 25.1-7, dia tokony navela hiala sasatra iray taona isaky ny fito taona ny tany; kanefa tsy notandroina tsara izany lalàna izany. Ity lazaina fa tenin’i Jeremià ity dia fanambàrana ampahany avy amin’ny Lev 26.34-35 sy ampahany avy amin’ny Jer 25.11.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
