document_id: ISA.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiverenan’ireo babo
  - type: text
    content: Fa hamindra fo amin’ny taranak’i Jakôba ny TOMPO; eny, mbola hifidy an’i Israely ihany Izy, ka hampiorina azy indray eo amin’ny taniny. Hikambana amin’ireo ny vahiny mpifindramonina ka hitambatra amin’ny ankohonan’i Jakôba.
  '10':
  - type: text
    content: 'Samy hiteny izy rehetra ka hanao aminao hoe:'
  - type: text
    content: «Ianao koa hay malemy tahaka anay,
  - type: text
    content: efa tonga mitovy aminay!»
  '11':
  - type: text
    content: Atỳ amin’ny fonenan’ny maty atỳ
  - type: text
    content: no navarina ny fireharehànao
  - type: text
    content: niaraka tamin’ny feom-balihanao.
  - type: text
    content: Kankana no ho kidoronao
  - type: text
    content: ary olitra no ho firakotrao.
  '12':
  - type: text
    content: Fa nahoana ianao no latsaka
  - type: text
    content: avy any an-danitra ambony any,
  - type: text
    content: ry ilay kintana mamirapiratra
  - type: text
    content: toy ny kintana fitarikandro
  - type: note
    content: Ampit Apôk 8.10; 9.1.
  - type: text
    content: '!'
  - type: text
    content: Nazera amin’ny tany ianao ity,
  - type: text
    content: ry ilay nandresy firenena maro!
  '13':
  - type: text
    content: 'Fa hoy ianao anakampo hoe:'
  - type: text
    content: «Hiakatra any an-danitra any aho
  - type: text
    content: ka hametraka ny sezafiandrianako
  - type: text
    content: ho avo noho ny kintan’Andriamanitra;
  - type: text
    content: dia eo amin’ilay tendrombohitra fivoriana,
  - type: text
    content: izay any am-parany avaratra, no hipetrahako
  - type: note
    content: 'ilay tendrombohitra... avaratra: toa misy famohapohazana ny mitôlôjia kanahanita izay milaza fa eo amin’ny tendrombohitra iray any an-tendrony avaratra no ivorian’ireo andriamanitra mba hanapa-kevitra ny amin’ny fitantanana izao tontolo izao.'
  - type: text
    content: .
  '14':
  - type: text
    content: Hiakatra eny an-tampon’ny rahona aho
  - type: text
    content: ka hitovy amin’Andriamanitra Avo Indrindra.»
  '15':
  - type: text
    content: Kanjo any amin’ny fonenan’ny maty,
  - type: text
    content: any amin’ny fanambanin’ny lavaka,
  - type: text
    content: no tsy maintsy nidinanao
  - type: note
    content: 'And 13-15: ampit Mt 11.23; Lk 10.15.'
  - type: text
    content: .
  '16':
  - type: text
    content: Izay mahita anao any dia hibanjina anao,
  - type: text
    content: 'sy handinika anao fatratra ka hanao hoe:'
  - type: text
    content: «Ity tokoa ve ilay lehilahy
  - type: text
    content: izay nampihorohoro ny tany
  - type: text
    content: sy nandrodana fanjakana maro,
  '17':
  - type: text
    content: nanova izao tontolo izao ho taniefitra
  - type: text
    content: fa sady nandrava tanàna
  - type: text
    content: no tsy nandefa ireo gadra hody!»
  '18':
  - type: text
    content: Ny mpanjaka rehetra nifehy firenena fahizay
  - type: text
    content: dia samy mandry amim-boninahitra ao am-pasany avy.
  '19':
  - type: text
    content: Ianao kosa dia nariana ivelan’ny fasanao
  - type: note
    content: 'ivelan’ny fasanao: jereo Jer 8.1-2; 22.19; 36.30.'
  - type: text
    content: toy ny zaza rano maharikoriko;
  - type: text
    content: tahaka ny razana voahitsakitsaka ianao,
  - type: text
    content: fa olona voavono ho faty no manindry anao,
  - type: text
    content: dia ireo olona voatrobaky ny sabatra.
  - type: text
    content: Ka naidina eo ambony lampivato ao am-pasana ireny,
  '2':
  - type: text
    content: Ny vahoakan’ny firenen-kafa no handray adidy hampody azy any an-tanindrazany. Ary eo amin’ny tanin’ny TOMPO, dia ho fananan’ny taranak’i Israely ireo hafa firenena, ka hataony ankizilahy sy ankizivavy; ireo namabo azy no hobaboiny, ary ireo nampahory azy no hataony mpanompo.
  - type: heading
    content: Ny fiafaran’ny mpanjakan’i Babilôna
  '20':
  - type: text
    content: nefa tsy mba halevina miaraka aminy ianao
  - type: text
    content: satria nanimba ny taninao
  - type: text
    content: sady namono ny vahoakanao.
  - type: text
    content: Tsy ho voatonona mandrakizay
  - type: text
    content: ny anaran’ny taranakao mpanao ratsy.
  '21':
  - type: text
    content: Miomàna handringana ny zanany ianareo
  - type: text
    content: noho ny heloka bevava nataon’ny rainy,
  - type: text
    content: fandrao hitsangana haka ny tany indray ireny
  - type: text
    content: ka handrakotra tanàna an’izao tontolo izao.
  '22':
  - type: text
    content: '«Hitsangana hamely ny Babilônianina Aho, hoy ny teny hentitry ny TOMPOn’izao rehetra izao; hofoanako ny anaran’i Babilôna sy ny dindony mbamin’ny zanany sy ny taranany rehetra. '
  '23':
  - type: text
    content: Fa hataoko tonga honahona fonenan-tsokina izy, hofafako amin’ny kifafa i Babilôna ka ho levona, hoy ny teny hentitry ny TOMPOn’izao rehetra izao.
  - type: heading
    content: Mifarana ny famoretana rehetra
  '24':
  - type: text
    content: Ny TOMPOn’izao rehetra izao
  - type: text
    content: 'dia efa nanao fianianana hoe:'
  - type: text
    content: «Izay noheveriko no ho tonga,
  - type: text
    content: izay notapahiko no hiseho.
  '25':
  - type: text
    content: Ao amin’ny taniko no hanamontsanako ny Asirianina,
  - type: text
    content: eny an-tendrombohitro no hanosihoseko azy.
  - type: text
    content: Hoesoriko ny zioga nampitondrainy ny vahoakako
  - type: note
    content: Jereo Is 10.5-34 sy ny naoty tandrifin’ny Is 10.5.
  - type: text
    content: ','
  - type: text
    content: hoesoriko eny an-tsorony ny entana namesarany azy.»
  '26':
  - type: text
    content: Fanapahan-kevitry ny TOMPO
  - type: text
    content: ho an’ny tany tontolo izany,
  - type: text
    content: ary hinji-tanana fandrahonana
  - type: note
    content: 'hinji-tanana fandrahonana: jereo and 27; 5.25; 9.11; 16.20; 10.4.'
  - type: text
    content: ataony amin’ny firenena rehetra.
  '27':
  - type: text
    content: Rehefa nanapa-kevitra ny TOMPOn’izao rehetra izao,
  - type: text
    content: iza no hahafoana izany?
  - type: text
    content: Rehefa naninji-tanana handrahona Izy,
  - type: text
    content: iza no hampihemotra izany?
  - type: heading
    content: Fampitandremana ny Filistinina
  '28':
  - type: text
    content: Tamin’ny taona nahafatesan’i Ahaza
  - type: note
    content: 'taona nahafatesan’i Ahaza: jereo 2 Mp 16.20; 2 Tan 28.27. Iadian-kevitra ny daty. Misy mandraikitra izany eo amin’ny taona 716 tal J.K. eo ho eo; amin’izay ny and 29b dia fomba fiteny ilazana fa miharatsy hatrany ny toe-javatra (ampit Ham 5.19). Misy kosa mandraikitra izany eo amin’ny taona 727 eo ho eo; amin’izay ny and 29b dia manondro ireo dimbin’ilay mpanjaka asirianina Tiglato-Pilesera III, maty tamin’izany vaninandro izany.'
  - type: text
    content: ' mpanjaka no nisy izao hafatra izao:'
  '29':
  - type: text
    content: Aza mifaly ambony ihany ianareo,
  - type: text
    content: ry Filistinina
  - type: note
    content: Ny amin’ny Filistinina , dia jereo Jer 47.1-7; Ezek 25.15-17; Jôb 4.4-8; Ham 1.6-8; Tsef 2.4-7; Za 9.5-7.
  - type: text
    content: ' rehetra,'
  - type: text
    content: na dia tapaka aza ny tsorakazo
  - type: text
    content: izay nikapohana anareo,
  - type: text
    content: satria hisy menarana hipoitra
  - type: text
    content: avy amin’ny fatin’ny bibilava
  - type: text
    content: ary hisy dragona manidina hipoitra
  - type: text
    content: avy amin’ny atodin’ny menarana.
  '3':
  - type: text
    content: 'Ary rehefa homen’ny TOMPO fitsaharana ianao, ry Israely, ka afaka amin’ny fijaliana sy ny tebiteby ary ny fanompoana mafy izay nampanaovina anao, '
  '30':
  - type: text
    content: Ireo olona faran’izay fadiranovana
  - type: text
    content: dia ho tahaka ny ondrikely miraotra,
  - type: text
    content: ary ireo mahantra hiadana sy handry feizay;
  - type: text
    content: fa hataon’ny fahavalo matin-kanoanana
  - type: text
    content: hatrany ifotony kosa ianao, ry Filistia,
  - type: text
    content: ary izay sisa ao aminao dia haringana.
  '31':
  - type: text
    content: Midradradradrà, ry tanàna mimanda,
  - type: text
    content: ka manaova antsoantsom-pitarainana.
  - type: text
    content: Ketraka ny Filistinina rehetra,
  - type: text
    content: fa misy setroka miakatra avy any avaratra
  - type: note
    content: 'avy any avaratra: jereo Jer 1.14 sy nta.'
  - type: text
    content: ;
  - type: text
    content: tsy misy mitsoaka an-daharana ny fahavalo.
  '32':
  - type: text
    content: Koa inona no havaly ireo iraky ny Filistinina?
  - type: text
    content: '–Izao ihany: Ny TOMPO no nanorina an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ary ao no hialofan’ireo mahantra amin’ny vahoakany.
  '4':
  - type: text
    content: 'dia horedoninao izao hira fanarabiana ny mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' izao:'
  - type: text
    content: Fa ahoana no niafaran’ilay mpanjakazaka
  - type: text
    content: ary koa niafaran’ny famoretany!
  '5':
  - type: text
    content: Nopotehin’ny TOMPO ny fahefana mandoza,
  - type: text
    content: dia ny tehin’ilay mpanjakazaka,
  '6':
  - type: text
    content: izay nikapoka ny vahoaka tamim-pahavinirana;
  - type: text
    content: nikapoka azy tsy an-kiato izy
  - type: text
    content: ka namolaka azy tamim-pahatezerana
  - type: text
    content: sady nanenjika azy tsy nisy indrafo.
  '7':
  - type: text
    content: Mandry fahalemana ny tany tontolo
  - type: text
    content: ka velon-kiram-pihobiana ny olona.
  '8':
  - type: text
    content: Ny kipreso sy ny sederan’i Libano koa,
  - type: text
    content: noho izao manjo ilay mpanjakazaka izao,
  - type: text
    content: 'dia samy faly ka nanao hoe:'
  - type: text
    content: «Hatrizay nahafatesanao izay,
  - type: text
    content: dia tsy nisy niakatra hanjera anay intsony.»
  '9':
  - type: text
    content: Mihotakotaka noho ny aminao, ry ilay mpanjakazaka,
  - type: text
    content: ny any amin’ny fonenan’ny maty any ambany any.
  - type: text
    content: Fohazina hitsena ny fiavianao ireo ambiroa,
  - type: text
    content: dia ireo lehibe rehetra fony tetỳ an-tany.
  - type: text
    content: Ampitsanganina hiala eo amin’ny sezafiandrianany
  - type: text
    content: ireo mpanjaka rehetra nifehy firenena fahizay.
