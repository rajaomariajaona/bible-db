    marker: p
    children:
    - type: text
      text: Ny vahoakan’ny firenen-kafa no handray adidy hampody azy any an-tanindrazany. Ary eo amin’ny tanin’ny TOMPO, dia ho fananan’ny taranak’i Israely ireo hafa firenena, ka hataony ankizilahy sy ankizivavy; ireo namabo azy no hobaboiny, ary ireo nampahory azy no hataony mpanompo.
  - type: usfm
