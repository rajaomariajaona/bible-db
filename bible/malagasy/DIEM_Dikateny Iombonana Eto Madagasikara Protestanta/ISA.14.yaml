      text: Ny fiverenan’ireo babo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hamindra fo amin’ny taranak’i Jakôba ny TOMPO; eny, mbola hifidy an’i Israely ihany Izy, ka hampiorina azy indray eo amin’ny taniny. Hikambana amin’ireo ny vahiny mpifindramonina ka hitambatra amin’ny ankohonan’i Jakôba.
