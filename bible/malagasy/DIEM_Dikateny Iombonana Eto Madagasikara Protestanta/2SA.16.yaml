document_id: 2SA.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida sy i Tsibà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Raha vao nihoatra ny tampon-tendrombohitra i Davida, dia tonga nitsena azy i Tsibà mpanompon’i Mefibôseta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tsibà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mefibôseta:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo toko 9.
    marker-yv: yv-n
  - type: text
    text: ', mitarika boriky roa voaisy lasely sady novesarana mofo roanjato sy voaloboka maina zato sampaho ary koa voankazo masaka iray harona sy divay eran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: siny hoditra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka hoy ny mpanjaka tamin’i Tsibà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hataonao inona ireo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navalin’i Tsibà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny boriky, ry andriamanjaka, dia hitaingenan’ny ankohonanao; ny mofo sy ny voankazo hohanin’ireo miaramilanao; ny divay kosa hosotroin’izay reraka any an-taniefitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nanontany azy indray ny mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa mba aiza i Mefibôseta, zafin’i Saoly tomponao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navalin’i Tsibà ny mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nijanona any Jerosalema izy, satria noheveriny fa ankehitriny no hampodian’ny Israelita ny fanjakan-draibeny aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’i Tsibà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro fa omeko anao avokoa izay fananan’i Mefibôseta.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia niankohoka ho fanajana ny mpanjaka i Tsibà sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka aho, ry andriamanjaka, mba hahita fitia hatrany eo imasonao!
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida sy i Simehỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa tonga teo akaikin’i Bahorima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bahorima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 3.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Davida mpanjaka, dia nisy lehilahy iray natao hoe Simehỳ zanakalahin’i Gerà sy anisan’ny havan’i Saoly; nivoaka ny tanàna izy sady nanozona an’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nitora-bato an’i Davida mpanjaka sy ny minisitra rehetra koa izy, na dia teo avokoa aza ny vahoaka sy ny miaramila izay tankavanan’ny mpanjaka sy tankaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary toy izao no nolazain’i Simehỳ rehefa nanozona:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandehana any, mandehana any, ry ilay lehilahy mpandatsa-dra sady ratsy fanahy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Havalin’ny TOMPO aminao anie ny namonoanao ho faty ny taranak’i Saoly! Nangalarinao ny fanjakan’i Saoly ka natolotry ny TOMPO ho eo an-tanan’i Absalôma zanakalahinao; ary indro fa idiran-doza izao ianao satria lehilahy mpandatsa-dra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy kosa i Abisay zanakalahin’i Tseroià tamin’i Davida mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana io alika maty io no manozona anao, ry andriamanjaka? Avelao hotapahiko ny lohan’io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa novalian’ny mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no iraharahanao izany, ry zanakalahin’i Tseroià? Matoa manozona ahy izy, dia satria ny TOMPO no nibaiko azy hanozona ahy; koa iza no sahy hanome tsiny azy amin’izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy koa i Davida tamin’i Abisay sy ny minisitra rehetra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha ny zanakalahy naterako aza no mitady ny aiko, ka mainka fa io Benjaminita io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 3.19 sy nta.
    marker-yv: yv-n
  - type: text
    text: '! Aoka izy hanozona ahy, raha ny TOMPO no nibaiko azy hanao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Angamba ho hitan’ny TOMPO ny fahantrako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny fahantrako: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika, latinina ary siriaka; ny hebreo: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny masoko
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny fahotako
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ka hampodiny ho fanambinana ny fanozonany ahy androany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha mbola nanohy ny diany i Davida sy ny olony, dia nandroso tsy lavitra azy ireo tamin’ny tehezan-tendrombohitra kosa i Simehỳ, sady mbola nanozona sy nitora-bato ary namafy vovoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Reraka mafy ny mpanjaka sy ny olona rehetra tafaraka taminy raha tonga teo amoron’i Jôrdàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'amoron’i Jôrdàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt tranainy grika; ireo teny ireo dia tsy hita amin’ny RM.
    marker-yv: yv-n
  - type: text
    text: ', koa dia naka aina teo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manatona an’i Absalôma i Hosay
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tonga tao Jerosalema i Absalôma sy ny vahoaka Israelita isan-karazany; ary tafaraka taminy koa i Ahitôfela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa mby teo amin’i Absalôma i Hosay, ilay Arkita sakaizan’i Davida, dia niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho ela velona anie ny mpanjaka! Ho ela velona anie ny mpanjaka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy i Absalôma tamin’i Hosay:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izao va no fitiavanao an’i Davida sakaizanao? Nahoana ianao no tsy mba nandeha niaraka taminy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy i Hosay tamin’i Absalôma:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy niaraka taminy aho, satria ny tiako hiarahana dia ianao ilay nofidin’ny TOMPO sy nofidin’ireto vahoaka ireto izany hoe ny Israelita isan-karazany; ka ao aminao no hitoerako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Faharoa manaraka izany, iza ianao hotompoiko izao, moa tsy ny zanakalahin’ilay sakaizako ihany va? Tahaka izay efa nanompoako an-drainao no hanompoako anao koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Absalôma sy ireo vadin’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy i Absalôma tamin’i Ahitôfela:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mifampidiniha ianareo ny amin’izay tokony hataontsika:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy kosa i Ahitôfela tamin’i Absalôma:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana mandry amin’ny vadikelin-drainao izay nasainy niandry ny trano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 15.16; 3.7 sy nta.
    marker-yv: yv-n
  - type: text
    text: . Ho fantatry ny Israelita rehetra fa nanao izay nahafa-baràka an-drainao ianao, ka dia hahery ny tanan’izay rehetra mpomba anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nananganan’ny olona lay teo an-tampon-trano i Absalôma, ka nandry tamin’ny vadikelin-drainy tao teo imason’ny Israelita rehetra izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.22 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 21-22:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 12.11-12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tamin’izay ny torohevitr’i Ahitôfela dia natao ho tahaka ny tenin’Andriamanitra; ary toy izany avokoa ny torohevitra nataony na tamin’i Davida na tamin’i Absalôma.
