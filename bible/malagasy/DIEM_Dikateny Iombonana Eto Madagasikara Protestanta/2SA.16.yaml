document_id: 2SA.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida sy i Tsibà
  - type: text
    content: Raha vao nihoatra ny tampon-tendrombohitra i Davida, dia tonga nitsena azy i Tsibà mpanompon’i Mefibôseta
  - type: note
    content: 'Tsibà, Mefibôseta: jereo toko 9.'
  - type: text
    content: ', mitarika boriky roa voaisy lasely sady novesarana mofo roanjato sy voaloboka maina zato sampaho ary koa voankazo masaka iray harona sy divay eran’ny '
  - type: text
    content: siny hoditra
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Fa novalian’ny mpanjaka hoe:'
  - type: text
    content: –Inona no iraharahanao izany, ry zanakalahin’i Tseroià? Matoa manozona ahy izy, dia satria ny TOMPO no nibaiko azy hanozona ahy; koa iza no sahy hanome tsiny azy amin’izany?
  '11':
  - type: text
    content: 'Ary hoy koa i Davida tamin’i Abisay sy ny minisitra rehetra:'
  - type: text
    content: –Raha ny zanakalahy naterako aza no mitady ny aiko, ka mainka fa io Benjaminita io
  - type: note
    content: Ampit 3.19 sy nta.
  - type: text
    content: '! Aoka izy hanozona ahy, raha ny TOMPO no nibaiko azy hanao izany. '
  '12':
  - type: text
    content: Angamba ho hitan’ny TOMPO ny fahantrako
  - type: note
    content: 'ny fahantrako: araka ny dkt tranainy grika, latinina ary siriaka; ny hebreo: ny masoko na ny fahotako.'
  - type: text
    content: ', ka hampodiny ho fanambinana ny fanozonany ahy androany.'
  '13':
  - type: text
    content: 'Fa raha mbola nanohy ny diany i Davida sy ny olony, dia nandroso tsy lavitra azy ireo tamin’ny tehezan-tendrombohitra kosa i Simehỳ, sady mbola nanozona sy nitora-bato ary namafy vovoka. '
  '14':
  - type: text
    content: Reraka mafy ny mpanjaka sy ny olona rehetra tafaraka taminy raha tonga teo amoron’i Jôrdàna
  - type: note
    content: 'amoron’i Jôrdàna: araka ny dkt tranainy grika; ireo teny ireo dia tsy hita amin’ny RM.'
  - type: text
    content: ', koa dia naka aina teo.'
  - type: heading
    content: Manatona an’i Absalôma i Hosay
  '15':
  - type: text
    content: 'Tonga tao Jerosalema i Absalôma sy ny vahoaka Israelita isan-karazany; ary tafaraka taminy koa i Ahitôfela. '
  '16':
  - type: text
    content: 'Rehefa mby teo amin’i Absalôma i Hosay, ilay Arkita sakaizan’i Davida, dia niantsoantso hoe:'
  - type: text
    content: –Ho ela velona anie ny mpanjaka! Ho ela velona anie ny mpanjaka!
  '17':
  - type: text
    content: 'Fa hoy i Absalôma tamin’i Hosay:'
  - type: text
    content: –Izao va no fitiavanao an’i Davida sakaizanao? Nahoana ianao no tsy mba nandeha niaraka taminy?
  '18':
  - type: text
    content: 'Ary hoy i Hosay tamin’i Absalôma:'
  - type: text
    content: '–Tsy niaraka taminy aho, satria ny tiako hiarahana dia ianao ilay nofidin’ny TOMPO sy nofidin’ireto vahoaka ireto izany hoe ny Israelita isan-karazany; ka ao aminao no hitoerako. '
  '19':
  - type: text
    content: Faharoa manaraka izany, iza ianao hotompoiko izao, moa tsy ny zanakalahin’ilay sakaizako ihany va? Tahaka izay efa nanompoako an-drainao no hanompoako anao koa.
  - type: heading
    content: I Absalôma sy ireo vadin’i Davida
  '2':
  - type: text
    content: 'Ka hoy ny mpanjaka tamin’i Tsibà:'
  - type: text
    content: –Hataonao inona ireo?
  - type: text
    content: 'Dia hoy ny navalin’i Tsibà:'
  - type: text
    content: –Ny boriky, ry andriamanjaka, dia hitaingenan’ny ankohonanao; ny mofo sy ny voankazo hohanin’ireo miaramilanao; ny divay kosa hosotroin’izay reraka any an-taniefitra.
  '20':
  - type: text
    content: 'Hoy i Absalôma tamin’i Ahitôfela:'
  - type: text
    content: '–Mifampidiniha ianareo ny amin’izay tokony hataontsika:'
  '21':
  - type: text
    content: 'Dia hoy kosa i Ahitôfela tamin’i Absalôma:'
  - type: text
    content: –Mandehana mandry amin’ny vadikelin-drainao izay nasainy niandry ny trano
  - type: note
    content: Jereo 15.16; 3.7 sy nta.
  - type: text
    content: . Ho fantatry ny Israelita rehetra fa nanao izay nahafa-baràka an-drainao ianao, ka dia hahery ny tanan’izay rehetra mpomba anao.
  '22':
  - type: text
    content: Nananganan’ny olona lay teo an-tampon-trano i Absalôma, ka nandry tamin’ny vadikelin-drainy tao teo imason’ny Israelita rehetra izy
  - type: note
    content: 'And 21-22: jereo 12.11-12.'
  - type: text
    content: .
  '23':
  - type: text
    content: Tamin’izay ny torohevitr’i Ahitôfela dia natao ho tahaka ny tenin’Andriamanitra; ary toy izany avokoa ny torohevitra nataony na tamin’i Davida na tamin’i Absalôma.
  '3':
  - type: text
    content: 'Ary nanontany azy indray ny mpanjaka hoe:'
  - type: text
    content: –Fa mba aiza i Mefibôseta, zafin’i Saoly tomponao?
  - type: text
    content: 'Dia hoy ny navalin’i Tsibà ny mpanjaka:'
  - type: text
    content: –Nijanona any Jerosalema izy, satria noheveriny fa ankehitriny no hampodian’ny Israelita ny fanjakan-draibeny aminy.
  '4':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’i Tsibà:'
  - type: text
    content: –Indro fa omeko anao avokoa izay fananan’i Mefibôseta.
  - type: text
    content: 'Dia niankohoka ho fanajana ny mpanjaka i Tsibà sady nanao hoe:'
  - type: text
    content: –Aoka aho, ry andriamanjaka, mba hahita fitia hatrany eo imasonao!
  - type: heading
    content: I Davida sy i Simehỳ
  '5':
  - type: text
    content: Rehefa tonga teo akaikin’i Bahorima
  - type: note
    content: 'Bahorima: jereo 3.16 sy nta.'
  - type: text
    content: ' i Davida mpanjaka, dia nisy lehilahy iray natao hoe Simehỳ zanakalahin’i Gerà sy anisan’ny havan’i Saoly; nivoaka ny tanàna izy sady nanozona an’i Davida. '
  '6':
  - type: text
    content: 'Nitora-bato an’i Davida mpanjaka sy ny minisitra rehetra koa izy, na dia teo avokoa aza ny vahoaka sy ny miaramila izay tankavanan’ny mpanjaka sy tankaviany. '
  '7':
  - type: text
    content: 'Ary toy izao no nolazain’i Simehỳ rehefa nanozona:'
  - type: text
    content: '–Mandehana any, mandehana any, ry ilay lehilahy mpandatsa-dra sady ratsy fanahy! '
  '8':
  - type: text
    content: Havalin’ny TOMPO aminao anie ny namonoanao ho faty ny taranak’i Saoly! Nangalarinao ny fanjakan’i Saoly ka natolotry ny TOMPO ho eo an-tanan’i Absalôma zanakalahinao; ary indro fa idiran-doza izao ianao satria lehilahy mpandatsa-dra.
  '9':
  - type: text
    content: 'Hoy kosa i Abisay zanakalahin’i Tseroià tamin’i Davida mpanjaka:'
  - type: text
    content: –Ahoana io alika maty io no manozona anao, ry andriamanjaka? Avelao hotapahiko ny lohan’io.
