    - type: text
      text: '’i Jesoa i Jôsefa, saingy an-tsokosoko noho izy natahotra ireo manampahefana jiosy. Neken’i Pilato ny fangatahany, ka dia lasa izy nanaisotra ny vatan’i Jesoa. '
  '39':
