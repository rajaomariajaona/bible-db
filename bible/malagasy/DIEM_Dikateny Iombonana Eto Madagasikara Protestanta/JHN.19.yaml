    children:
    - type: text
      text: –Homboy amin’ny hazofijaliana io! Homboy amin’ny hazofijaliana io!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Pilato taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Entonareo Izy, ka homboy amin’ny hazofijaliana; fa Izaho tsy mahita izay helony.
  '7':
  - type: usfm
