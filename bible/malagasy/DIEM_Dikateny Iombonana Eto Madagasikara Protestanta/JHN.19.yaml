  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rehefa nandre izany teny izany i Pilato, dia vao mainka natahotra. '
  '9':
