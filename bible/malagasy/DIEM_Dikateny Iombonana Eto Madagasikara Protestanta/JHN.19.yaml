document_id: JHN.19,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tamin’izay dia nalain’i Pilato i Jesoa ka nasainy nokapohina. '
  '10':
  - type: text
    content: 'Ka hoy i Pilato taminy:'
  - type: text
    content: –Izaho ve no tsy itenenanao? Tsy fantatrao angaha fa sady manana fahefana handefa Anao aho, no manana fahefana hampanombo Anao amin’ny hazofijaliana koa?
  '11':
  - type: text
    content: 'I Jesoa kosa namaly azy hoe:'
  - type: text
    content: –Tsy hanana fahefana amiko akory ianao, raha tsy nomen’Andriamanitra anao izany; koa izay nanolotra Ahy taminao no manan-keloka bebe kokoa!
  '12':
  - type: text
    content: 'Noho izany, dia nitady handefa Azy i Pilato, saingy nantsoantsoin’ny Jiosy hoe:'
  - type: text
    content: –Raha alefanao ilay io, dia tsy mba sakaizan’ny amperôra rômanina ianao; fa izay rehetra manao ny tenany ho mpanjaka, dia manohitra ny amperôra rômanina.
  '13':
  - type: text
    content: Nony nandre ireo teny ireo i Pilato, dia nitondra an’i Jesoa hankeo alatrano, ka nampipetraka Azy teo amin’ny toerana avoavo, dia ilay toerana atao hoe Lampivato, na hoe Gabatà
  - type: note
    content: 'ka nampipetraka... ilay toerana: dkt hafa ka nipetraka teo amin’ny seza fitsarana, teo amin’ilay toerana. –Gabatà: teny aramianina enti-manondro toerana avoavo.'
  - type: text
    content: ' amin’ny teny hebreo. '
  '14':
  - type: text
    content: Andro fiomanana amin’ny Paska tamin’izay, tokony ho tamin’ny mitataovovonana
  - type: note
    content: Ny tolakandron’io andro io (manomboka hatramin’ny mitataovovonana) no namonoana tao an-tempoly ireo ondry nanaovana ny sakafo Paska.
  - type: text
    content: '. Ary hoy i Pilato tamin’ny Jiosy:'
  - type: text
    content: –Indro ny Mpanjakanareo!
  '15':
  - type: text
    content: 'Fa niantsoantso ireo nanao hoe:'
  - type: text
    content: –Vonoy, vonoy, homboy amin’ny hazofijaliana io!
  - type: text
    content: 'Dia hoy i Pilato taminy:'
  - type: text
    content: –Dia hohomboako amin’ny hazofijaliana ve ny Mpanjakanareo?
  - type: text
    content: 'Ka novalian’ny lohandoha-mpisorona hoe:'
  - type: text
    content: –Tsy manana mpanjaka afa-tsy ny amperôra rômanina izahay.
  '16':
  - type: text
    content: Tamin’izay dia natolotr’i Pilato azy ireo i Jesoa mba hohomboana amin’ny hazofijaliana.
  - type: heading
    content: Homboana amin’ny hazofijaliana i Jesoa
  - type: heading
    content: (Jereo Mt 27.32-44; Mk 15.21-32; Lk 23.26-43)
  - type: text
    content: 'Dia noraisin’ny Jiosy i Jesoa. '
  '17':
  - type: text
    content: Ary ny tenan’i Jesoa no nitondra ny hazofijaliany, ka niainga ho any amin’ny toerana atao hoe Ikarandoha, na hoe Gôlgôtà
  - type: note
    content: 'Gôlgôtà: teny aramianina midika hoe karandoha; miendrika loha sola ilay havoana kely teo akaikin’ny tanàna.'
  - type: text
    content: ' amin’ny teny hebreo. '
  '18':
  - type: text
    content: 'Teo no nanombohan’ny miaramila Azy tamin’ny hazofijaliana; ary nisy roa lahy hafa koa niaraka taminy, dia nohomboana tamina hazofijaliana teo an-daniny roa, fa i Jesoa teo afovoany. '
  '19':
  - type: text
    content: 'Nampanao soratra kosa i Pilato, ary nasainy napetaka teo an-dohan’ny hazofijalian’i Jesoa; ka izao no voasoratra: «I Jesoa avy any Nazareta, ilay Mpanjakan’ny Jiosy.» '
  '2':
  - type: text
    content: Dia nandrandrana fehiloha tsilo ny miaramila ka nasatrony ny lohan’i Jesoa; ary nampitafîny lamba jaky
  - type: note
    content: 'lamba jaky: jereo Mk 15.17 sy nta.'
  - type: text
    content: ' Izy. '
  '20':
  - type: text
    content: 'Izany soratra izany dia novakîn’ny Jiosy maro, fa akaikin’ny tanàna ilay toerana nanomboana an’i Jesoa tamin’ny hazofijaliana; sady natao tamin’ny teny hebreo sy latinina ary grika izany soratra izany. '
  '21':
  - type: text
    content: 'Ka hoy ny lohandoha-mpisorona jiosy tamin’i '
  - type: text
    content: Pilato
  - type: text
    content: ':'
  - type: text
    content: '–Aza soratana hoe «ilay Mpanjakan’ny Jiosy», fa izao: «ilay io no nilaza hoe: Mpanjakan’ny Jiosy Aho.»'
  '22':
  - type: text
    content: 'Fa novalian’i Pilato hoe:'
  - type: text
    content: –Izay voasoratro dia voasoratro!
  '23':
  - type: text
    content: 'Rehefa voahombon’ny miaramila tamin’ny hazofijaliana i Jesoa, dia nalainy ny fitafiany ka nozarainy efatra: samy nanana ny anjarany avy ny miaramila'
  - type: note
    content: Ny zavatra rehetra eny an-koditr’ireo voaheloka ho faty dia neken’ny lalàna rômanina ho lasa fananan’ny miaramila mpamono.
  - type: text
    content: '. Ary nalainy koa ny akanjony rebareba, saingy tsy nisy vitrana ilay akanjony fa tenona iray ihany hatrany ambony ka hatrany ambany; '
  '24':
  - type: text
    content: 'dia nifampiresaka ireo hoe:'
  - type: text
    content: –Aza triarina fa aoka hilokantsika, dia ho lasan’izay hahazo ny loka.
  - type: text
    content: 'Izany dia mba hahatanteraka ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' manao hoe:'
  - type: text
    content: «Nifampizaran’ireo ny fitafiako
  - type: text
    content: ary nilokany ny akanjoko
  - type: note
    content: Sal 22.19.
  - type: text
    content: .»
  - type: text
    content: Dia izany no nataon’ny miaramila.
  - type: heading
    content: Indro ny reninao
  '25':
  - type: text
    content: 'Nijoro teo akaikin’ny hazofijalian’i Jesoa ny reniny sy ny rahavavin-dreniny, dia i Maria vadin’i Klôpà, ary i Maria Magdalena. '
  '26':
  - type: text
    content: 'Nony hitan’i Jesoa ny reniny ary teo anilan’io reniny io ilay '
  - type: text
    content: mpianatra
  - type: text
    content: ' tiany, dia hoy Izy tamin-dreniny:'
  - type: text
    content: –Ravehivavy, indro ny zanakao!
  '27':
  - type: text
    content: 'Avy eo dia hoy Izy tamin’ilay mpianatra:'
  - type: text
    content: –Indro ny reninao!
  - type: text
    content: Ary nanomboka hatramin’io fotoana io i Maria dia noraisin’ilay mpianatra ho any aminy.
  - type: heading
    content: Miala aina i Jesoa
  - type: heading
    content: (Jereo Mt 27.45-56; Mk 15.33-41; Lk 23.44-49)
  '28':
  - type: text
    content: 'Taorian’izany, dia fantatr’i Jesoa fa efa vita ny zavatra rehetra; ka mba hahatanteraka ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ', dia hoy Izy:'
  - type: text
    content: –Mangetaheta Aho
  - type: note
    content: Sal 69.22; ampit Sal 22.16.
  - type: text
    content: .
  '29':
  - type: text
    content: Ary nisy bakoly feno vinaingitra teo; ka spaonjy novontosana vinaingitra sy notohizana tamina zaran-defona no natohoky ny miaramila teo am-bavan’i Jesoa
  - type: note
    content: 'Ampit Sal 69.22. –zaran-defona: misy stf marobe ahitana hoe hisôpa. Ampit Sal 69.22.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Dia nanatona Azy ny miaramila, ka namely tahamaina Azy sady niteny hoe:'
  - type: text
    content: –Arahaba, ry Mpanjakan’ny Jiosy!
  '30':
  - type: text
    content: 'Rehefa nanandrana ny vinaingitra Izy dia nanao hoe:'
  - type: text
    content: –Vita ny zavatra rehetra!
  - type: text
    content: Dia nanondri-doha Izy ka nanolotra ny fanahiny.
  - type: heading
    content: Lefonin’ny miaramila ny fon’i Jesoa
  '31':
  - type: text
    content: 'Ary satria '
  - type: text
    content: fiomanana
  - type: text
    content: ' tamin’izay, dia nangatahin’ny manampahefana jiosy tamin’i '
  - type: text
    content: Pilato
  - type: text
    content: ' ny hanapahana ny ranjon’ireo voahombo'
  - type: note
    content: 'Ny hanapahana ny ranjon’ireo voahombo: ireo voahombo amin’ny hazofijaliana dia mihantona amin’ny tanany ary noho izy ireo tsy mahazo aina dia mahafaty azy tsikelikely izany; tapahina koa ny ranjony mba hanafaingana ny fahafatesan’ireo voahombo.'
  - type: text
    content: ' sy hanesorana ny fatiny mba tsy hisy tavela eo amin’ny hazofijaliana ny andro '
  - type: text
    content: sabata
  - type: text
    content: ', satria andro lehibe izany sabata izany. '
  '32':
  - type: text
    content: 'Dia tonga ny miaramila ka nanapaka ny ranjon’ny voalohany sy ny an’ilay anankiray hafa izay nohomboana tamin’ny hazofijaliana niaraka tamin’i Jesoa. '
  '33':
  - type: text
    content: 'Nony nankeo amin’i Jesoa ny miaramila, dia hitany fa efa maty sahady Izy, ka dia tsy mba notapahiny ny ranjony; '
  '34':
  - type: text
    content: 'fa nisy miaramila anankiray nandefona ny fon’i Jesoa, ary niaraka tamin’izay dia nisy ra sy rano nivoaka. '
  '35':
  - type: text
    content: Ilay nahita no vavolombelona manambara ary azo antoka ny fijoroany ho vavolombelona, sady fantany fa milaza ny marina izy mba hinoanareo koa
  - type: note
    content: 'mba hinoanareo koa: misy stf sasany ahitana hoe mba hinoanareo hatrany koa (ampit 20.31).'
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Eny, tonga izany mba hahatanteraka ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Tsy hisy hotapahina ny taolany'
  - type: note
    content: Jereo Eks 12.46; Nom 9.12; Sal 34.21.
  - type: text
    content: '.» '
  '37':
  - type: text
    content: 'Ary hoy indray koa ny Soratra Masina hoe: «Hijery ilay nolefonina izy ireo'
  - type: note
    content: Za 12.10.
  - type: text
    content: .»
  - type: heading
    content: Alevina i Jesoa
  - type: heading
    content: (Jereo Mt 27.57-61; Mk 15.42-47; Lk 23.50-56)
  '38':
  - type: text
    content: 'Taorian’izany, dia nangataka tamin’i '
  - type: text
    content: Pilato
  - type: text
    content: ' i Jôsefa avy any Harimatia'
  - type: note
    content: 'Harimatia: jereo Mt 27.57 sy nta.'
  - type: text
    content: ', mba hahazo manaisotra ny vatan’i Jesoa. '
  - type: text
    content: Mpianatr
  - type: text
    content: '’i Jesoa i Jôsefa, saingy an-tsokosoko noho izy natahotra ireo manampahefana jiosy. Neken’i Pilato ny fangatahany, ka dia lasa izy nanaisotra ny vatan’i Jesoa. '
  '39':
  - type: text
    content: 'Tonga koa i Nikôdema (ilay nanatona an’i Jesoa andro alina teo aloha) nitondra ny '
  - type: text
    content: miora
  - type: text
    content: ' sy '
  - type: text
    content: aloesy
  - type: text
    content: ' nampifangaroina, tokony ho telopolo kilao'
  - type: note
    content: 'Nikôdema... teo aloha: jereo 3.1-2. –aloesy: zava-manitra (avy amin’ny zavamaniry anankiray) izay nararaky ny Jiosy tamin’ny lamba famonosana ny maty alohan’ny hametrahana azy ao am-pasana.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Dia nivoaka nankeo alatrano indray i Pilato ka nanao tamin’ny vahoaka hoe:'
  - type: text
    content: –Indro Izy entiko eto aminareo, mba hahafantaranareo fa tsy hitako izay helony, na dia iray aza!
  '40':
  - type: text
    content: 'Noraisin’izy roa lahy ny vatan’i Jesoa, ka nofonosina lamba nasiana zava-manitra, araka ny fanaon’ny Jiosy raha mamboatra faty halevina. '
  '41':
  - type: text
    content: 'Nisy saha anankiray kosa teo amin’ilay toerana nanomboana an’i Jesoa; ary nisy fasana vaovao tsy mbola nandevenana olona mihitsy tao anatin’ilay saha. '
  '42':
  - type: text
    content: Koa satria andro fiomanana ho an’ny Jiosy tamin’izay sady akaiky eo ny fasana, dia tao no nandevenan’izy roa lahy an’i Jesoa.
  '5':
  - type: text
    content: 'Tamin’izay dia nivoaka nankeo alatrano i Jesoa, misatroka fehiloha tsilo sy mitafy lamba jaky. Dia hoy i Pilato tamin’ny vahoaka:'
  - type: text
    content: –Indro ny Lehilahy!
  '6':
  - type: text
    content: 'Nony mahita an’i Jesoa ny lohandoha-mpisorona sy ny mpiandry raharaha, dia niantsoantso nanao hoe:'
  - type: text
    content: –Homboy amin’ny hazofijaliana io! Homboy amin’ny hazofijaliana io!
  - type: text
    content: 'Fa hoy i Pilato taminy:'
  - type: text
    content: –Entonareo Izy, ka homboy amin’ny hazofijaliana; fa Izaho tsy mahita izay helony.
  '7':
  - type: text
    content: 'Ny Jiosy kosa namaly azy hoe:'
  - type: text
    content: '–Manana '
  - type: text
    content: lalàna
  - type: text
    content: ' izahay, ary araka izany lalàna izany dia tokony ho faty Izy, satria nanao ny tenany ho '
  - type: text
    content: Zanak’Andriamanitra
  - type: note
    content: Ampit Lev 24.16.
  - type: text
    content: '!'
  '8':
  - type: text
    content: 'Rehefa nandre izany teny izany i Pilato, dia vao mainka natahotra. '
  '9':
  - type: text
    content: 'Ary niditra tao an-trano indray izy ka nanao hoe tamin’i Jesoa hoe:'
  - type: text
    content: –Avy aiza moa Ianao?
  - type: text
    content: 'Fa tsy namaly azy i Jesoa. '
