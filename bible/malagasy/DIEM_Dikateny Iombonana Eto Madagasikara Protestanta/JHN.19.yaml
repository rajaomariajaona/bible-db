  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Noraisin’izy roa lahy ny vatan’i Jesoa, ka nofonosina lamba nasiana zava-manitra, araka ny fanaon’ny Jiosy raha mamboatra faty halevina. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Nisy saha anankiray kosa teo amin’ilay toerana nanomboana an’i Jesoa; ary nisy fasana vaovao tsy mbola nandevenana olona mihitsy tao anatin’ilay saha. '
  '42':
