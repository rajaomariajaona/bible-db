document_id: JHN.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izay dia nalain’i Pilato i Jesoa ka nasainy nokapohina. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ka hoy i Pilato taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho ve no tsy itenenanao? Tsy fantatrao angaha fa sady manana fahefana handefa Anao aho, no manana fahefana hampanombo Anao amin’ny hazofijaliana koa?
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I Jesoa kosa namaly azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy hanana fahefana amiko akory ianao, raha tsy nomen’Andriamanitra anao izany; koa izay nanolotra Ahy taminao no manan-keloka bebe kokoa!
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Noho izany, dia nitady handefa Azy i Pilato, saingy nantsoantsoin’ny Jiosy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha alefanao ilay io, dia tsy mba sakaizan’ny amperôra rômanina ianao; fa izay rehetra manao ny tenany ho mpanjaka, dia manohitra ny amperôra rômanina.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nony nandre ireo teny ireo i Pilato, dia nitondra an’i Jesoa hankeo alatrano, ka nampipetraka Azy teo amin’ny toerana avoavo, dia ilay toerana atao hoe Lampivato, na hoe Gabatà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ka nampipetraka... ilay toerana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ka nipetraka teo amin’ny seza fitsarana, teo amin’ilay toerana.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gabatà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: teny aramianina enti-manondro toerana avoavo.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny teny hebreo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Andro fiomanana amin’ny Paska tamin’izay, tokony ho tamin’ny mitataovovonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny tolakandron’io andro io (manomboka hatramin’ny mitataovovonana) no namonoana tao an-tempoly ireo ondry nanaovana ny sakafo Paska.
      marker-yv: yv-n
    - type: text
      text: '. Ary hoy i Pilato tamin’ny Jiosy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro ny Mpanjakanareo!
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa niantsoantso ireo nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Vonoy, vonoy, homboy amin’ny hazofijaliana io!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Pilato taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Dia hohomboako amin’ny hazofijaliana ve ny Mpanjakanareo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ny lohandoha-mpisorona hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy manana mpanjaka afa-tsy ny amperôra rômanina izahay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tamin’izay dia natolotr’i Pilato azy ireo i Jesoa mba hohomboana amin’ny hazofijaliana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Homboana amin’ny hazofijaliana i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 27.32-44; Mk 15.21-32; Lk 23.26-43)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisin’ny Jiosy i Jesoa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ny tenan’i Jesoa no nitondra ny hazofijaliany, ka niainga ho any amin’ny toerana atao hoe Ikarandoha, na hoe Gôlgôtà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gôlgôtà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'teny aramianina midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: karandoha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; miendrika loha sola ilay havoana kely teo akaikin’ny tanàna.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny teny hebreo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Teo no nanombohan’ny miaramila Azy tamin’ny hazofijaliana; ary nisy roa lahy hafa koa niaraka taminy, dia nohomboana tamina hazofijaliana teo an-daniny roa, fa i Jesoa teo afovoany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nampanao soratra kosa i Pilato, ary nasainy napetaka teo an-dohan’ny hazofijalian’i Jesoa; ka izao no voasoratra: «I Jesoa avy any Nazareta, ilay Mpanjakan’ny Jiosy.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia nandrandrana fehiloha tsilo ny miaramila ka nasatrony ny lohan’i Jesoa; ary nampitafîny lamba jaky
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lamba jaky: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mk 15.17 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' Izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Izany soratra izany dia novakîn’ny Jiosy maro, fa akaikin’ny tanàna ilay toerana nanomboana an’i Jesoa tamin’ny hazofijaliana; sady natao tamin’ny teny hebreo sy latinina ary grika izany soratra izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ka hoy ny lohandoha-mpisorona jiosy tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pilato
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza soratana hoe «ilay Mpanjakan’ny Jiosy», fa izao: «ilay io no nilaza hoe: Mpanjakan’ny Jiosy Aho.»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa novalian’i Pilato hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay voasoratro dia voasoratro!
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Rehefa voahombon’ny miaramila tamin’ny hazofijaliana i Jesoa, dia nalainy ny fitafiany ka nozarainy efatra: samy nanana ny anjarany avy ny miaramila'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny zavatra rehetra eny an-koditr’ireo voaheloka ho faty dia neken’ny lalàna rômanina ho lasa fananan’ny miaramila mpamono.
      marker-yv: yv-n
    - type: text
      text: '. Ary nalainy koa ny akanjony rebareba, saingy tsy nisy vitrana ilay akanjony fa tenona iray ihany hatrany ambony ka hatrany ambany; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'dia nifampiresaka ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza triarina fa aoka hilokantsika, dia ho lasan’izay hahazo ny loka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany dia mba hahatanteraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nifampizaran’ireo ny fitafiako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nilokany ny akanjoko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 22.19.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia izany no nataon’ny miaramila.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Indro ny reninao
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nijoro teo akaikin’ny hazofijalian’i Jesoa ny reniny sy ny rahavavin-dreniny, dia i Maria vadin’i Klôpà, ary i Maria Magdalena. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nony hitan’i Jesoa ny reniny ary teo anilan’io reniny io ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' tiany, dia hoy Izy tamin-dreniny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ravehivavy, indro ny zanakao!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Avy eo dia hoy Izy tamin’ilay mpianatra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro ny reninao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanomboka hatramin’io fotoana io i Maria dia noraisin’ilay mpianatra ho any aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miala aina i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 27.45-56; Mk 15.33-41; Lk 23.44-49)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Taorian’izany, dia fantatr’i Jesoa fa efa vita ny zavatra rehetra; ka mba hahatanteraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ', dia hoy Izy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mangetaheta Aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 69.22; ampit Sal 22.16.
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary nisy bakoly feno vinaingitra teo; ka spaonjy novontosana vinaingitra sy notohizana tamina zaran-defona no natohoky ny miaramila teo am-bavan’i Jesoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 69.22. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: zaran-defona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': misy stf marobe ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hisôpa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Ampit Sal 69.22.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nanatona Azy ny miaramila, ka namely tahamaina Azy sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Arahaba, ry Mpanjakan’ny Jiosy!
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Rehefa nanandrana ny vinaingitra Izy dia nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Vita ny zavatra rehetra!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanondri-doha Izy ka nanolotra ny fanahiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lefonin’ny miaramila ny fon’i Jesoa
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary satria '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fiomanana
    - type: text
      text: ' tamin’izay, dia nangatahin’ny manampahefana jiosy tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pilato
    - type: text
      text: ' ny hanapahana ny ranjon’ireo voahombo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny hanapahana ny ranjon’ireo voahombo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo voahombo amin’ny hazofijaliana dia mihantona amin’ny tanany ary noho izy ireo tsy mahazo aina dia mahafaty azy tsikelikely izany; tapahina koa ny ranjony mba hanafaingana ny fahafatesan’ireo voahombo.
      marker-yv: yv-n
    - type: text
      text: ' sy hanesorana ny fatiny mba tsy hisy tavela eo amin’ny hazofijaliana ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ', satria andro lehibe izany sabata izany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia tonga ny miaramila ka nanapaka ny ranjon’ny voalohany sy ny an’ilay anankiray hafa izay nohomboana tamin’ny hazofijaliana niaraka tamin’i Jesoa. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Nony nankeo amin’i Jesoa ny miaramila, dia hitany fa efa maty sahady Izy, ka dia tsy mba notapahiny ny ranjony; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'fa nisy miaramila anankiray nandefona ny fon’i Jesoa, ary niaraka tamin’izay dia nisy ra sy rano nivoaka. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ilay nahita no vavolombelona manambara ary azo antoka ny fijoroany ho vavolombelona, sady fantany fa milaza ny marina izy mba hinoanareo koa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.35 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mba hinoanareo koa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mba hinoanareo hatrany koa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (ampit 20.31).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Eny, tonga izany mba hahatanteraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hoe: «Tsy hisy hotapahina ny taolany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 12.46; Nom 9.12; Sal 34.21.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary hoy indray koa ny Soratra Masina hoe: «Hijery ilay nolefonina izy ireo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Za 12.10.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Alevina i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
