      text: Koa satria andro fiomanana ho an’ny Jiosy tamin’izay sady akaiky eo ny fasana, dia tao no nandevenan’izy roa lahy an’i Jesoa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tamin’izay dia nivoaka nankeo alatrano i Jesoa, misatroka fehiloha tsilo sy mitafy lamba jaky. Dia hoy i Pilato tamin’ny vahoaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro ny Lehilahy!
  '6':
