document_id: LUK.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ihaonan’i Jesoa i Zakeo
  - type: text
    content: 'Tafiditra tao Jerikao i Jesoa ary namakivaky ny tanàna. '
  '10':
  - type: text
    content: 'Fa ny hitady sy hamonjy izay very no nahatongavan’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '!'
  - type: heading
    content: Fanoharana momba ny denàry zato
  - type: heading
    content: (Jereo Mt 25.14-30)
  '11':
  - type: text
    content: 'Raha mbola nihaino izany teo ny olona, dia nanaovan’i Jesoa '
  - type: text
    content: fanoharana
  - type: text
    content: ' indray. Akaiky an’i Jerosalema manko Izy tamin’izay ka noheverin’ny olona fa efa nadiva hiseho ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Toy izao àry ny tenin’i Jesoa:'
  - type: text
    content: '–Lasa tany an-tany lavitra ity andriandahy anankiray handray ny fahefana hanjaka, dia hiverina. '
  '13':
  - type: text
    content: 'Niantsoany folo lahy ny mpanompony talohan’ny hiaingany, ka samy nomeny '
  - type: text
    content: denàry
  - type: text
    content: ' zato avy sady nataony hoe: «Ampiasao ireny mandra-piveriko.» '
  '14':
  - type: text
    content: 'Hàlan’ny mpiray tanindrazana aminy kosa ilay andriandahy ka nandefasany iraka nanaraka azy hilaza hoe: «Tsy mila iny lehilahy iny ho mpanjaka izahay.»'
  '15':
  - type: text
    content: 'Rehefa nahazo ny fahefana hanjaka izy, dia nody an-tanindrazana ary nampiantso an’ireo nomeny vola mba hahalalany izay tombony azony avy. '
  '16':
  - type: text
    content: 'Niseho ilay voalohany ka nilaza hoe: «Nahazo denàry arivo, tompoko, ny denàry zato nomenao ahy!» '
  '17':
  - type: text
    content: 'Dia hoy ny mpanjaka taminy: «Mahafinaritra izany, ry mpanompo tsara; nahatoky tamin’ny zava-madinika ianao, ka dia tendreko hiandraikitra tanàna folo.» '
  '18':
  - type: text
    content: 'Tonga ny faharoa ka nanao hoe: «Namokatra denàry dimanjato, tompoko, ny denàry zato nomenao ahy!» '
  '19':
  - type: text
    content: 'Dia hoy ny mpanjaka taminy: «Ianao indray dia tendreko hiandraikitra tanàna dimy.» '
  '2':
  - type: text
    content: 'Ary indro nisy lehilahy atao hoe Zakeo, sady lehiben’ny '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' no mpanankarena. '
  '20':
  - type: text
    content: 'Tonga kosa ny anankiray hafa ka nanao hoe: «Intỳ, tompoko, ny denàry zato nomenao ahy, fa nataoko tsara tahiry tanaty mosara. '
  '21':
  - type: text
    content: 'Natahotra anao manko aho, satria lehilahy sarotiny ianao, ka maka izay tsy napetrakao ary mijinja izay tsy nafafinao.» '
  '22':
  - type: text
    content: 'Dia hoy ny mpanjaka taminy: «Mpanompo ratsy fanahy raha ianao! Ny teninao no itsarako anao: fantatrao fa lehilahy sarotiny aho, maka izay tsy napetrako ary mijinja izay tsy nafafiko; '
  '23':
  - type: text
    content: 'koa nahoana àry no tsy napetrakao tany amin’ny banky ny volako, ka ho noraisiko mbamin’ny zana-bola rehefa tafaverina aho?» '
  '24':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’izay nanatrika teo: «Alao ny denàry zato eny aminy ka omeo an’ilay nahazo denàry arivo!» '
  '25':
  - type: text
    content: 'Dia hoy ireo tamin’ny mpanjaka: «Ka efa manana denàry arivo anie izy, tompoko!» '
  '26':
  - type: text
    content: 'Fa novaliany hoe: «Lazaiko aminareo fa izay rehetra manana no homena hatrany; ary izay tsy manana kosa, na izay kely ananany aza dia halana aminy. '
  '27':
  - type: text
    content: Fa iretsy fahavaloko tsy nanaiky hanjakako iretsy, dia ento atỳ ka vonoy eto anatrehako!»
  - type: heading
    content: Miditra ao Jerosalema i Jesoa
  - type: heading
    content: (Jereo Mt 21.1-11; Mk 11.1-11; Jôh 12.12-19)
  '28':
  - type: text
    content: 'Nony avy niteny izany i Jesoa, dia nitarika ny dia hiakatra ho any Jerosalema. '
  '29':
  - type: text
    content: Rehefa nanakaiky an’i Betifage sy i Betania izay eo amin’ny tendrombohitra atao hoe Analanôliva
  - type: note
    content: Jereo Mk 11.1 sy nta.
  - type: text
    content: ' Izy, dia naniraka roa lahy tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Mba nitady hahita izany Jesoa izany izy, saingy fohy ka tsy afa-nanoatra satria nifanety ny vahoaka. '
  '30':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: '–Mankanesa amin’itsy tanàna manoloana itsy. Rehefa tafiditra ny tanàna ianareo, dia hahita zana-boriky mifatotra mbola tsy nitaingenan’olona; vahao izy ka ento atỳ. '
  '31':
  - type: text
    content: 'Ary raha misy olona manontany anareo hoe: «Nahoana io no vahanareo?», dia valio hoe: «Misy ilàn’ny Tompo azy'
  - type: note
    content: 'Ny Tompo: dkt hafa ny Tompony (dia ilay tena tompon’ny zavatra rehetra).'
  - type: text
    content: .»
  '32':
  - type: text
    content: 'Nony lasa ireo nirahina, dia nahita araka izay voalazan’i Jesoa taminy. '
  '33':
  - type: text
    content: 'Raha namaha ny zana-boriky iny izy, dia hoy ny tompom-boriky hoe:'
  - type: text
    content: –Nahoana io no vahanareo?
  '34':
  - type: text
    content: 'Dia novalian’izy roa lahy hoe:'
  - type: text
    content: –Misy ilàn’ny Tompo azy!
  '35':
  - type: text
    content: Nentin’ireto iraka nankeo amin’i Jesoa ilay zana-boriky; ary ny lamban’izy roa lahy no napetrany teo amboniny, vao nasainy nitaingina i Jesoa
  - type: note
    content: Ampit Za 9.9.
  - type: text
    content: '. '
  '36':
  - type: text
    content: Nony nandroso i Jesoa, dia namelaran’ny olona lamba teny amin’ny lalan-kalehany
  - type: note
    content: Ampit 2 Mp 9.12-13.
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'Rehefa nanakaiky an’i Jerosalema Izy ka handray ilay fidinana eo amin’ny tendrombohitra Analanôliva, dia nisy mpianatra marobe indray nientan-kafaliana sady nidera an’Andriamanitra tamin’ny feo mahery, noho ny asa mahagaga rehetra efa hitany; '
  '38':
  - type: text
    content: 'hoy ny antsoantsony hoe:'
  - type: text
    content: «Hombàm-pitahiana amin’ny anaran’ny Tompo anie
  - type: text
    content: ny Mpanjaka izay avy!
  - type: text
    content: Fiadanana anie any an-danitra,
  - type: text
    content: ary voninahitra anie ho an’Andriamanitra
  - type: note
    content: Ampit Sal 118.26; Lk 2.14.
  - type: text
    content: '!»'
  '39':
  - type: text
    content: 'Nisy kosa '
  - type: text
    content: Farisianina
  - type: text
    content: ' avy teo anivon’ny vahoaka niteny tamin’i Jesoa hoe:'
  - type: text
    content: –Mpampianatra ô, mba teneno ny mpianatrao hangina!
  '4':
  - type: text
    content: 'Dia nilomay nialoha izy ka nianika hazo amontana mba hitazana an’i Jesoa, fa akaikin’izany no efa handalovany. '
  '40':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Lazaiko aminareo fa raha mangina ireo, dia ny vato no hiantsoantso!
  - type: heading
    content: Itomanian’i Jesoa i Jerosalema
  '41':
  - type: text
    content: 'Ary nanakaiky an’i Jerosalema hatrany i Jesoa ka nony nahatazana ny tanàna, dia nitomany azy '
  '42':
  - type: text
    content: 'sady nanao hoe:'
  - type: text
    content: '–Raha mba fantatrao amin’ity andro ity manko izay hanananao fiadanana! Nefa indrisy, takona ny masonao izany! '
  '43':
  - type: text
    content: 'Fa ho avy aminao ny andro hananganan’ny fahavalonao tovon-tany manodidina anao, ka hanaovany fahirano anao sy hanereny anao hatraiza hatraiza. '
  '44':
  - type: text
    content: Hofongorana tanteraka ianao sy ny mponina ao anatinao ka tsy havelany hisy vato mifanongoa eo aminao, noho ianao tsy nahalala ny andro notendren’Andriamanitra hamangiana anao!
  - type: heading
    content: Tandrovin’i Jesoa ny hajan’ny tempoly
  - type: heading
    content: (Jereo Mt 21.12-17; Mk 11.15-19; Jôh 2.12-22)
  '45':
  - type: text
    content: Nony tafiditra tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Jesoa, dia nandroaka ireo mpivarotra '
  '46':
  - type: text
    content: 'sady nanao taminy hoe:'
  - type: text
    content: '–izao no voalazan’ny Soratra Masina: «Ny tranoko dia trano fivavahana.» Nefa he itỳ izy ataonareo zohy fieren’ny mpangalatra'
  - type: note
    content: Ampit Is 56.7; Jer 7.11.
  - type: text
    content: '!'
  '47':
  - type: text
    content: 'Ary nampianatra isan’andro teo an-kianjan’ny tempoly i Jesoa; fa ny lohandoha-mpisorona sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' mbamin’ny loholom-bahoaka kosa nitady hahafaty Azy. '
  '48':
  - type: text
    content: Saingy tsy hitan-dry zareo izay hatao satria liana fatratra ny vahoaka rehetra mihaino Azy.
  '5':
  - type: text
    content: 'Nony tonga teo i Jesoa, dia nitraka ary niteny tamin’i Zakeo hoe:'
  - type: text
    content: –Ry Zakeo, midîna faingana fa any aminao Aho anio no tsy maintsy miantrano.
  '6':
  - type: text
    content: 'Nidina faingana i Zakeo ary nandray an’i Jesoa tamin-kafaliana. '
  '7':
  - type: text
    content: 'Nimonomonona ny olona rehetra nanatrika teo ka nanao hoe:'
  - type: text
    content: –Any amin’ny mpanota indray re no amantanany!
  '8':
  - type: text
    content: 'Niato kosa i Zakeo ka niteny tamin’ny Tompo hoe:'
  - type: text
    content: –Indro, Tompoko, ny antsasaky ny fananako afoiko ho an’ny mahantra; ary izay zavatr’olona azoko am-pitaka, dia honerako inefatra heny
  - type: note
    content: Ampit Eks 21.37; 2 Sam 12.6; Ohab 6.31.
  - type: text
    content: '!'
  '9':
  - type: text
    content: Ary hoy i Jesoa taminy
  - type: note
    content: 'Ary hoy i Jesoa taminy: dkt hafa Ary hoy i Jesoa ny aminy.'
  - type: text
    content: ':'
  - type: text
    content: '–Anio ny famonjena dia tafiditra amin’ity trano ity; noho izany ity lehilahy ity koa dia zanak’i Abrahama! '
