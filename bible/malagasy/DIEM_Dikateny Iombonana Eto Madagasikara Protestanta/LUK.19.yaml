document_id: LUK.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ihaonan’i Jesoa i Zakeo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tafiditra tao Jerikao i Jesoa ary namakivaky ny tanàna. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa ny hitady sy hamonjy izay very no nahatongavan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana momba ny denàry zato
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 25.14-30)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Raha mbola nihaino izany teo ny olona, dia nanaovan’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' indray. Akaiky an’i Jerosalema manko Izy tamin’izay ka noheverin’ny olona fa efa nadiva hiseho ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Toy izao àry ny tenin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lasa tany an-tany lavitra ity andriandahy anankiray handray ny fahefana hanjaka, dia hiverina. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Niantsoany folo lahy ny mpanompony talohan’ny hiaingany, ka samy nomeny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: denàry
    - type: text
      text: ' zato avy sady nataony hoe: «Ampiasao ireny mandra-piveriko.» '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hàlan’ny mpiray tanindrazana aminy kosa ilay andriandahy ka nandefasany iraka nanaraka azy hilaza hoe: «Tsy mila iny lehilahy iny ho mpanjaka izahay.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Rehefa nahazo ny fahefana hanjaka izy, dia nody an-tanindrazana ary nampiantso an’ireo nomeny vola mba hahalalany izay tombony azony avy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Niseho ilay voalohany ka nilaza hoe: «Nahazo denàry arivo, tompoko, ny denàry zato nomenao ahy!» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy ny mpanjaka taminy: «Mahafinaritra izany, ry mpanompo tsara; nahatoky tamin’ny zava-madinika ianao, ka dia tendreko hiandraikitra tanàna folo.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tonga ny faharoa ka nanao hoe: «Namokatra denàry dimanjato, tompoko, ny denàry zato nomenao ahy!» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy ny mpanjaka taminy: «Ianao indray dia tendreko hiandraikitra tanàna dimy.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary indro nisy lehilahy atao hoe Zakeo, sady lehiben’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpamory hetra
    - type: text
      text: ' no mpanankarena. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tonga kosa ny anankiray hafa ka nanao hoe: «Intỳ, tompoko, ny denàry zato nomenao ahy, fa nataoko tsara tahiry tanaty mosara. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Natahotra anao manko aho, satria lehilahy sarotiny ianao, ka maka izay tsy napetrakao ary mijinja izay tsy nafafinao.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy ny mpanjaka taminy: «Mpanompo ratsy fanahy raha ianao! Ny teninao no itsarako anao: fantatrao fa lehilahy sarotiny aho, maka izay tsy napetrako ary mijinja izay tsy nafafiko; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'koa nahoana àry no tsy napetrakao tany amin’ny banky ny volako, ka ho noraisiko mbamin’ny zana-bola rehefa tafaverina aho?» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’izay nanatrika teo: «Alao ny denàry zato eny aminy ka omeo an’ilay nahazo denàry arivo!» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy ireo tamin’ny mpanjaka: «Ka efa manana denàry arivo anie izy, tompoko!» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa novaliany hoe: «Lazaiko aminareo fa izay rehetra manana no homena hatrany; ary izay tsy manana kosa, na izay kely ananany aza dia halana aminy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa iretsy fahavaloko tsy nanaiky hanjakako iretsy, dia ento atỳ ka vonoy eto anatrehako!»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miditra ao Jerosalema i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 21.1-11; Mk 11.1-11; Jôh 12.12-19)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nony avy niteny izany i Jesoa, dia nitarika ny dia hiakatra ho any Jerosalema. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Rehefa nanakaiky an’i Betifage sy i Betania izay eo amin’ny tendrombohitra atao hoe Analanôliva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 11.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' Izy, dia naniraka roa lahy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mba nitady hahita izany Jesoa izany izy, saingy fohy ka tsy afa-nanoatra satria nifanety ny vahoaka. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mankanesa amin’itsy tanàna manoloana itsy. Rehefa tafiditra ny tanàna ianareo, dia hahita zana-boriky mifatotra mbola tsy nitaingenan’olona; vahao izy ka ento atỳ. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary raha misy olona manontany anareo hoe: «Nahoana io no vahanareo?», dia valio hoe: «Misy ilàn’ny Tompo azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny Tompo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny Tompony
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (dia ilay tena tompon’ny zavatra rehetra).'
      marker-yv: yv-n
    - type: text
      text: .»
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Nony lasa ireo nirahina, dia nahita araka izay voalazan’i Jesoa taminy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Raha namaha ny zana-boriky iny izy, dia hoy ny tompom-boriky hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana io no vahanareo?
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia novalian’izy roa lahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Misy ilàn’ny Tompo azy!
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Nentin’ireto iraka nankeo amin’i Jesoa ilay zana-boriky; ary ny lamban’izy roa lahy no napetrany teo amboniny, vao nasainy nitaingina i Jesoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Za 9.9.
      marker-yv: yv-n
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Nony nandroso i Jesoa, dia namelaran’ny olona lamba teny amin’ny lalan-kalehany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2 Mp 9.12-13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Rehefa nanakaiky an’i Jerosalema Izy ka handray ilay fidinana eo amin’ny tendrombohitra Analanôliva, dia nisy mpianatra marobe indray nientan-kafaliana sady nidera an’Andriamanitra tamin’ny feo mahery, noho ny asa mahagaga rehetra efa hitany; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'hoy ny antsoantsony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hombàm-pitahiana amin’ny anaran’ny Tompo anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny Mpanjaka izay avy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fiadanana anie any an-danitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary voninahitra anie ho an’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 118.26; Lk 2.14.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nisy kosa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' avy teo anivon’ny vahoaka niteny tamin’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpampianatra ô, mba teneno ny mpianatrao hangina!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nilomay nialoha izy ka nianika hazo amontana mba hitazana an’i Jesoa, fa akaikin’izany no efa handalovany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazaiko aminareo fa raha mangina ireo, dia ny vato no hiantsoantso!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Itomanian’i Jesoa i Jerosalema
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary nanakaiky an’i Jerosalema hatrany i Jesoa ka nony nahatazana ny tanàna, dia nitomany azy '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha mba fantatrao amin’ity andro ity manko izay hanananao fiadanana! Nefa indrisy, takona ny masonao izany! '
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Fa ho avy aminao ny andro hananganan’ny fahavalonao tovon-tany manodidina anao, ka hanaovany fahirano anao sy hanereny anao hatraiza hatraiza. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Hofongorana tanteraka ianao sy ny mponina ao anatinao ka tsy havelany hisy vato mifanongoa eo aminao, noho ianao tsy nahalala ny andro notendren’Andriamanitra hamangiana anao!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tandrovin’i Jesoa ny hajan’ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 21.12-17; Mk 11.15-19; Jôh 2.12-22)
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Nony tafiditra tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' i Jesoa, dia nandroaka ireo mpivarotra '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'sady nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–izao no voalazan’ny Soratra Masina: «Ny tranoko dia trano fivavahana.» Nefa he itỳ izy ataonareo zohy fieren’ny mpangalatra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 56.7; Jer 7.11.
      marker-yv: yv-n
    - type: text
      text: '!'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary nampianatra isan’andro teo an-kianjan’ny tempoly i Jesoa; fa ny lohandoha-mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' mbamin’ny loholom-bahoaka kosa nitady hahafaty Azy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Saingy tsy hitan-dry zareo izay hatao satria liana fatratra ny vahoaka rehetra mihaino Azy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nony tonga teo i Jesoa, dia nitraka ary niteny tamin’i Zakeo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Zakeo, midîna faingana fa any aminao Aho anio no tsy maintsy miantrano.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nidina faingana i Zakeo ary nandray an’i Jesoa tamin-kafaliana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nimonomonona ny olona rehetra nanatrika teo ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Any amin’ny mpanota indray re no amantanany!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Niato kosa i Zakeo ka niteny tamin’ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro, Tompoko, ny antsasaky ny fananako afoiko ho an’ny mahantra; ary izay zavatr’olona azoko am-pitaka, dia honerako inefatra heny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.8 '
