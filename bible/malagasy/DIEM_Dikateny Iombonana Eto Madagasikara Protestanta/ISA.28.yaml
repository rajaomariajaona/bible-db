document_id: ISA.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Rambon-danitra no handrava an’i Samaria
  - type: text
    content: Lozan’i Samaria, tanàna izay satroboninahitra
  - type: text
    content: sady reharehan’ny mpidoroka ao Efraîma
  - type: note
    content: Jereo 11.13 sy nta. –Ny loza mananontanona tsiahivina eto dia tondroina ao amin’ny and 2 izay milazalaza an-tsary ny fanafihan’ny Asirianina (jereo 8.4, 7-8 sns).
  - type: text
    content: '!'
  - type: text
    content: Erỳ an-tendron’ny lohasaha lonaka izy,
  - type: text
    content: ka ny haingony marevaka dia voninkazo mihamalazo
  - type: text
    content: eny an-dohan’ireo lehilahy mamon-divay.
  '10':
  - type: text
    content: 'Fa hoy i Isaià amintsika:'
  - type: text
    content: 'TSA ampiana V: TSAV; TSA ampiana V: TSAV.'
  - type: text
    content: 'KA ampiana V: KAV; KA ampiana V: KAV.'
  - type: text
    content: Indray mandeha ity, indray mandeha irỳ
  - type: note
    content: Ny fehezan-teny hebraika eto dia toa manome lanja kokoa ny fanenon’ny vaninteny fa tsy ny hevitry ny voambolana; ny fianarana abidỳ ho an’ny mpianatra manomboka no toa aseho eto. Raha izany no izy, dia toa maneso an’i Isaià ireo mpisorona sy ireo mpaminany sady manohatra azy amina mpampianatra abidỳ.
  - type: text
    content: .»
  '11':
  - type: text
    content: Eny, amin’ny fiteny tsy fantatra sy fiteny vahiny
  - type: text
    content: no hitenenan’ny Tompo amin’ity firenena ity!
  '12':
  - type: text
    content: 'Marina fa efa nilazan’ny Tompo tokoa ireo hoe:'
  - type: text
    content: «Eto no hahitanareo fialan-tsasatra,
  - type: text
    content: avelao hiala sasatra izay vizana,
  - type: text
    content: fa toerana milamina eto!»
  - type: text
    content: Kanjo tsy nety nihaino ireo
  - type: note
    content: 'And 11-12: jereo 1Kôr 14.21.'
  - type: text
    content: .
  '13':
  - type: text
    content: Koa ny tenin’ny TOMPO ho azy ireo
  - type: text
    content: 'dia tonga tsy misy heviny toy ny hoe:'
  - type: text
    content: '«TSA ampiana V: TSAV; TSA ampiana V: TSAV.'
  - type: text
    content: 'KA ampiana V: KAV; KA ampiana V: KAV.'
  - type: text
    content: Indray mandeha ity, indray mandeha irỳ.
  - type: text
    content: Ka farany ho tafintohina izy raha mandeha,
  - type: text
    content: dia hianjera mitsilany ka hahasimba ny voany,
  - type: text
    content: ary hifaningotra tongotra ka tsy ho afa-miarina.
  - type: heading
    content: Ny vato fehizoro
  '14':
  - type: text
    content: Noho izany, mihainoa ny tenin’ny TOMPO
  - type: text
    content: ianareo mpaniratsira
  - type: text
    content: izay mpitondra ity firenena eto Jerosalema ity
  '15':
  - type: text
    content: 'Ianareo manao hoe:'
  - type: text
    content: «Efa nanao fifanekena tamin’ny fahafatesana izahay
  - type: text
    content: ary efa nifanaraka tamin’ny toeran’ny maty;
  - type: text
    content: koa na ho avy aza ny loza, dia tsy hahatratra anay,
  - type: text
    content: fa ny lainga no ataonay fiarovana
  - type: text
    content: ary ny fitaka no ataonay fierena.»
  '16':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: text
    content: '«Indro Aho hametraka vato iray ao '
  - type: text
    content: Tsiôna
  - type: text
    content: mba hizahan-toetra anareo,
  - type: text
    content: dia vato fehizoro sarobidy
  - type: text
    content: natao ho fanorenana mafy;
  - type: text
    content: ka izay matoky azy tsy hihontsina
  - type: note
    content: 'vato fehizoro: ampit Sal 118.22-23; Rm 9.33; 10.11; 1Pt 2.6.'
  - type: text
    content: .
  '17':
  - type: text
    content: Ny rariny no horaisiko ho hazo mahitsy,
  - type: text
    content: ary ny fahamarinana no hataoko pilao.
  - type: text
    content: Koa hopaohin’ny havandra
  - type: text
    content: ny fiarovan-tsandoka ianteheranareo
  - type: text
    content: ary hindaosin’ny rano ny fierenareo.
  '18':
  - type: text
    content: Hofoanana ny fifanekenareo
  - type: text
    content: tamin’ny fahafatesana
  - type: text
    content: ary tsy hateza ny fifanarahanareo
  - type: text
    content: tamin’ny fonenan’ny maty;
  - type: text
    content: koa raha mandalo ny loza mifofofo fiavy,
  - type: text
    content: dia hanapotika anareo.
  '19':
  - type: text
    content: Na maraina na antoandro na alina
  - type: text
    content: no andalovan’ny loza,
  - type: text
    content: isaky ny mandalo izany, dia hahatratra anareo,
  - type: text
    content: ka horohoro moa izao raha vao re ny akon’izany!
  '2':
  - type: text
    content: Indro misy hery lehibe alefan’ny Tompo
  - type: text
    content: ka toy ny oram-baratra manavandra izany,
  - type: text
    content: toy ny rambon-danitra mpandrava,
  - type: text
    content: 'toy ny oram-be mandriaka mahatondra-drano:'
  - type: text
    content: indray mipaoka monja no androdanan’ny Tompo
  - type: text
    content: ny tanàna manontolo hitrosina amin’ny tany.
  '20':
  - type: text
    content: Eny, hoy ny ohabolana,
  - type: text
    content: fohy loatra ny farafara
  - type: text
    content: ka tsy misy hitsorana,
  - type: text
    content: ary kely loatra ny lamba
  - type: text
    content: ka tsy ampy hirakofana.
  '21':
  - type: text
    content: Fa toy ny teo an-tendrombohitra Peratsima
  - type: text
    content: no hirotsahan’ny TOMPO an-tsehatra,
  - type: text
    content: ary toy ny tao amin’ny lemak’i Gibehôna
  - type: note
    content: 'tendrombohitra Peratsima: toerana nandresen’i Davida ny Filistinina (2 Sam 5.20; 1 Tan 14.11). –Gibehôna: toerana hafa nandresen’i Davida ny Filistinina ihany koa (1 Tan 14.16); Jereo koa Jos 10.1-15.'
  - type: text
    content: no hihetsehany hanao ny asany
  - type: text
    content: sy hanatanteraka ny zavatra ataony.
  - type: text
    content: Kanefa asa hafa kely izany,
  - type: text
    content: zavatra tsy araka ny mahazatra.
  '22':
  - type: text
    content: Koa ankehitriny, aza maniratsira intsony ianareo
  - type: text
    content: fandrao hihamafy kokoa ny tady eny am-bozonareo;
  - type: text
    content: satria ny Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: no nandrenesako fa efa voatendry
  - type: text
    content: ny handravany tanteraka ity tany ity.
  - type: heading
    content: Avy amin’Andriamanitra ny fahendren’ny tantsaha
  '23':
  - type: text
    content: Koa manongilàna sofina hihaino tsara ahy,
  - type: text
    content: 'ary tandremo izay lazaiko aminareo:'
  '24':
  - type: text
    content: Ny tantsaha izay te hanao famafazana
  - type: text
    content: dia tsy revo miasa tany fotsiny
  - type: text
    content: na manoritsoritra sy mandamaka azy.
  '25':
  - type: text
    content: Fa rehefa voaravony ny tany,
  - type: text
    content: dia afafiny ny voan’anana nigela na komîna;
  - type: text
    content: avy eo dia alahany ny varim-bazaha sy ny ôrza
  - type: text
    content: amin’ny toerana voafaritra ho azy
  - type: note
    content: 'nigela, komîna: zava-maniry mamokatra voany fampiasa hanome tsiro ny sakafo.'
  - type: text
    content: ;
  - type: text
    content: ny ampemba kosa voleny amin’ny sisiny.
  '26':
  - type: text
    content: Izany no fomba natoron’Andriamaniny azy;
  - type: text
    content: izany no nampianariny azy.
  '27':
  - type: text
    content: Fa tsy fitaovam-pivelezana misy vy
  - type: text
    content: no anintsanam-boa ny nigela,
  - type: text
    content: ary tsy kodian-tsarety
  - type: text
    content: no anintsanam-boa ny komina
  - type: note
    content: Ny vary no afofoka amina fitaovam-pivelezana tarihin’omby, fa tsy ny anana misy voany toy ny nigela na ny komina.
  - type: text
    content: ;
  - type: text
    content: fa tehina no anintsanam-boa ny nigela,
  - type: text
    content: ary fantàka no anintsanam-boa ny komina.
  '28':
  - type: text
    content: Saingy ny vary fanao mofo kosa
  - type: text
    content: dia tsy tokony homongoina fa hovelesina;
  - type: text
    content: hampanitsahana ny salohim-bary
  - type: text
    content: ny fitaovam-pivelezana tarihin’omby,
  - type: text
    content: kanefa tsy homongoina tsy akory ny vary.
  '29':
  - type: text
    content: Izany koa dia avy amin’ny TOMPOn’izao rehetra izao,
  - type: text
    content: Ilay maneho fikasana mahagaga
  - type: text
    content: sy fahaiza-manao mahatalanjona.
  '3':
  - type: text
    content: Dia ho voahitsakitsaka am-paladia
  - type: text
    content: ilay tanàna miendrika satroboninahitra,
  - type: text
    content: sady reharehan’ny mpidoroka ao Efraîma.
  '4':
  - type: text
    content: Ho voahitsakitsaka am-paladia
  - type: text
    content: ny voninkazo mihamalazo izay haingony marevaka
  - type: text
    content: terỳ an-tendron’ny lohasaha lonaka.
  - type: text
    content: I Samaria dia ho tahaka ny voan’aviavy
  - type: text
    content: masaka alohan’ny fahavaratra,
  - type: text
    content: ka izay mahita azy dia hioty
  - type: text
    content: ary hitelina azy indraim-bava.
  '5':
  - type: text
    content: 'Amin’izany andro izany dia ny TOMPOn’izao rehetra izao mihitsy no hanjary satroboninahitra marevaka, fehiloha sy haingon’ireo sisa velona amin’ny vahoakany. '
  '6':
  - type: text
    content: Izy no hanome fahaiza-mitsara an’izay mipetraka hitsara ary koa hanome herimpo an’ireo mpanosika ny fahavalo manafika eo anoloan’ny vavahady.
  - type: heading
    content: Ireo mpidoroka maniratsira ny mpaminany
  '7':
  - type: text
    content: Ireto koa misy miraingiraingy noho ny divay
  - type: text
    content: 'ary mivembena noho ny toaka:'
  - type: text
    content: 'dia ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: mpaminany
  - type: text
    content: izay miraingiraingy noho ny toaka
  - type: text
    content: sy mivembena azon’ny divay.
  - type: text
    content: Mivembena azon’ny toaka ireo,
  - type: text
    content: miraingiraingy noho ny fahitana,
  - type: text
    content: 'ka misafotofoto mamoaka didim-pitsarana:'
  '8':
  - type: text
    content: Feno loany ny latabatra rehetra misy azy,
  - type: text
    content: ka efa tsy misy toerana madio intsony.
  '9':
  - type: text
    content: 'Dia velom-panontaniana izy hoe:'
  - type: text
    content: «Iza no tian’iny Isaià iny hampianarina
  - type: text
    content: sy hanazavana ny fanambaràna azony?
  - type: text
    content: Ankizy vao notazana ve
  - type: text
    content: sa zazakely vao nisara-nono?
