document_id: 2CH.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny sorona naterina ho an’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 8.62-66)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehefa vitan’i Salômôna izany vavaka izany, dia nisy afo nilatsaka avy tany an-danitra sy nandevona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo mbamin’ny sorom-pihavanana, ka feno ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitry
    - type: text
      text: ' ny TOMPO ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lev 9.23-24.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary nony andro faha-23 tamin’ny volana fahafito dia nalefan’i Salômôna hody any an-tranony avy ny olona; ary faly sy ravoravo ireo noho ny soa nataon’ny TOMPO tamin’i Davida sy tamin’i Salômôna ary tamin’i Israely vahoakany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fisehoan’ny Tompo fanindroany tamin’i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 9.1-9; 2 Tan 1.7-12)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Rehefa vitan’i Salômôna ny tranon’ny TOMPO sy ny lapan’andriamanjaka, sady samy nataony lavorary avokoa izay rehetra nokasainy hotontosaina tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' sy tao an-dapany, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dia nisehon’i TOMPO indray i Salômôna nony alina, ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa reko ny vavakao ary efa voafidiko ho trano fanateran-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tsorona
    - type: text
      text: ' ho Ahy ity toerana ity. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mety hampikatona ny lanitra Aho ka tsy hisy ranonorana latsaka, mety hibaiko ny valala handrava ny tany Aho, na mety handefa areti-mandringana hamely ny vahoakako; '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: kanefa raha amin’izay no avy hanetry tena ny vahoakako izay iantsoana ny anarako, ka hivavaka sy hitady Ahy ary hiala amin’ny toe-dratsy fanaony, dia hihaino avy any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: ' Aho ka hamela ny fahotany ary hahasitrana ny taniny. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ankehitriny no ijeren’ny masoko ary ihainoan’ny sofiko ny vavaka izay atao eto amin’ity toerana ity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Misy akon’ny 6.14-42 voafintina dia voafintina ity 7.12b-15 ity.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Eny, voafidiko sy natokako ity tempoly ity mba hitoeran’ny voninahitro mandrakizay; ka ho ao mandrakariva ny fiahiako anareo sy ny fitiavako anareo. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny aminao kosa, raha mizotra eo anatrehako tahaka ny nizoran’i Davida rainao ianao, ka manao araka izay andidiako anao sy mitandrina ny didiko amam-dalànako, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'dia hampaharitra ny sezafiandrianam-panjakanao Aho, araka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' nataoko tamin’i Davida rainao ka nilazako hoe: «Tsy ho diso taranaka handimby ianao mba hifehy an’i Israely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 2.4.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nefa kosa raha mivily ianareo ka mandao ny lalàna sy ny didy izay napetrako teo anoloanareo, ka mandeha manompo andriamani-kafa sy miankohoka eo anatrehany, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary tsy afa-niditra tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ', satria feno ny voninahitry ny TOMPO izany. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'dia hongotako ianareo tsy amin’ny taniko izay nomeko anareo; ary hariako lavitra Ahy ity tempoly izay natokako hanajana ny anarako ity. Amin’izay ianareo Israelita dia hataoko fandatsa sy fanaraby any amin’ny firenen-kafa rehetra. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Na dia avobe aza ity tempoly ity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 9.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', dia hivarahontsana izay rehetra mandalo azy ka hanontany hoe: «Nahoana no dia nataon’ny TOMPO toy izao ity tany ity sy ity tempoly ity?» '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hisy olona hamaly hoe: «Satria nilaozan’ny Israelita ny Tompo Andriamanitry ny razany, dia Ilay nitondra azy niala tany Ejipta; ary nifikitra tamin’andriamani-kafa ireo sady niankohoka teo anatrehany sy nanompo azy, ka dia nampiharan’ny TOMPO izao loza isan-karazany izao.»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nony hitan’ny Israelita rehetra kosa ny nilatsahan’ny afo sy ny voninahitry ny TOMPO teo amin’ny tempoly, dia niankohoka nitehina ny lampivato izy ka nitsaoka ny TOMPO sy nidera Azy hoe: «Eny, tsara Izy sady maharitra mandrakizay ny fitiavany».'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny mpanjaka sy ny vahoaka rehetra dia nanao sorona teo anatrehan’ny TOMPO. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ka omby 22 000 sy ondry aman’osy 120 000 no nataon’i Salômôna mpanjaka sorona. Toy izany no nitokanan’ny mpanjaka sy ny vahoaka rehetra ny tranon’Andriamanitra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Samy nanao ny anjara raharahany avy ny mpisorona fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' kosa nisahana ny zava-maneno masina izay nampamboarin’i Davida mpanjaka mba hiderana ny TOMPO hoe: «Eny, maharitra mandrakizay ny fitiavany!», araka ny hira fiderana nasain’i Davida nataony. Dia nisy koa mpisorona nitsoka trômpetra tetsy andaniny; ary ny vahoaka israelita rehetra teo dia nitsangana avokoa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tamin’izay no nanokanan’i Salômôna ny afovoan’ny kianja manoloana ny tranon’ny TOMPO, satria teo no nanaterany ny sorona dorana manontolo sy ny saboran’ny sorom-pihavanana. Ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' halimo izay nampanaovin’i Salômôna manko tsy omby ny sorona dorana manontolo sy ny fanatitra vokatry ny tany ary ny sabora.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fito andro no niarahan’i Salômôna nankalaza ny fetin’ny Tranotomboka tamin’ny Israelita rehetra izay tafangona marobe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fetin’ny Tranotomboka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny RM dia milaza fotsiny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fety
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo 5.3; 1 Mp 8.2 sy nta).'
      marker-yv: yv-n
    - type: text
      text: ', tonga avy amin’ny lafy valo hatreo Lebô-Hamata'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lebô-Hamata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 13.21 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ka hatrany amin’ny lohasahan-driakan’i Ejipta'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lohasahan-driakan’i Ejipta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 34.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tamin’ny andro fahavalo no nanaovan’izy mianakavy fivoriana manetriketrika. Fito andro araka izany no nankalazany ny fitokanana ny alitara; ary fito andro hafa koa no nankalazany ny fetin’ny Tranotomboka. '
