document_id: 2CH.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny sorona naterina ho an’ny Tompo
  - type: heading
    content: (Jereo 1 Mp 8.62-66)
  - type: text
    content: 'Rehefa vitan’i Salômôna izany vavaka izany, dia nisy afo nilatsaka avy tany an-danitra sy nandevona ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo mbamin’ny sorom-pihavanana, ka feno ny '
  - type: text
    content: voninahitry
  - type: text
    content: ' ny TOMPO ny '
  - type: text
    content: tempoly
  - type: note
    content: Ampit Lev 9.23-24.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ary nony andro faha-23 tamin’ny volana fahafito dia nalefan’i Salômôna hody any an-tranony avy ny olona; ary faly sy ravoravo ireo noho ny soa nataon’ny TOMPO tamin’i Davida sy tamin’i Salômôna ary tamin’i Israely vahoakany.
  - type: heading
    content: Fisehoan’ny Tompo fanindroany tamin’i Salômôna
  - type: heading
    content: (Jereo 1 Mp 9.1-9; 2 Tan 1.7-12)
  '11':
  - type: text
    content: Rehefa vitan’i Salômôna ny tranon’ny TOMPO sy ny lapan’andriamanjaka, sady samy nataony lavorary avokoa izay rehetra nokasainy hotontosaina tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sy tao an-dapany, '
  '12':
  - type: text
    content: 'dia nisehon’i TOMPO indray i Salômôna nony alina, ka nilazany hoe:'
  - type: text
    content: –Efa reko ny vavakao ary efa voafidiko ho trano fanateran-
  - type: text
    content: tsorona
  - type: text
    content: ' ho Ahy ity toerana ity. '
  '13':
  - type: text
    content: 'Mety hampikatona ny lanitra Aho ka tsy hisy ranonorana latsaka, mety hibaiko ny valala handrava ny tany Aho, na mety handefa areti-mandringana hamely ny vahoakako; '
  '14':
  - type: text
    content: kanefa raha amin’izay no avy hanetry tena ny vahoakako izay iantsoana ny anarako, ka hivavaka sy hitady Ahy ary hiala amin’ny toe-dratsy fanaony, dia hihaino avy any an-
  - type: text
    content: danitra
  - type: text
    content: ' Aho ka hamela ny fahotany ary hahasitrana ny taniny. '
  '15':
  - type: text
    content: Ankehitriny no ijeren’ny masoko ary ihainoan’ny sofiko ny vavaka izay atao eto amin’ity toerana ity
  - type: note
    content: Misy akon’ny 6.14-42 voafintina dia voafintina ity 7.12b-15 ity.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Eny, voafidiko sy natokako ity tempoly ity mba hitoeran’ny voninahitro mandrakizay; ka ho ao mandrakariva ny fiahiako anareo sy ny fitiavako anareo. '
  '17':
  - type: text
    content: 'Ny aminao kosa, raha mizotra eo anatrehako tahaka ny nizoran’i Davida rainao ianao, ka manao araka izay andidiako anao sy mitandrina ny didiko amam-dalànako, '
  '18':
  - type: text
    content: 'dia hampaharitra ny sezafiandrianam-panjakanao Aho, araka ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataoko tamin’i Davida rainao ka nilazako hoe: «Tsy ho diso taranaka handimby ianao mba hifehy an’i Israely'
  - type: note
    content: Jereo 1 Mp 2.4.
  - type: text
    content: '.» '
  '19':
  - type: text
    content: 'Nefa kosa raha mivily ianareo ka mandao ny lalàna sy ny didy izay napetrako teo anoloanareo, ka mandeha manompo andriamani-kafa sy miankohoka eo anatrehany, '
  '2':
  - type: text
    content: Ary tsy afa-niditra tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' ireo '
  - type: text
    content: mpisorona
  - type: text
    content: ', satria feno ny voninahitry ny TOMPO izany. '
  '20':
  - type: text
    content: 'dia hongotako ianareo tsy amin’ny taniko izay nomeko anareo; ary hariako lavitra Ahy ity tempoly izay natokako hanajana ny anarako ity. Amin’izay ianareo Israelita dia hataoko fandatsa sy fanaraby any amin’ny firenen-kafa rehetra. '
  '21':
  - type: text
    content: Na dia avobe aza ity tempoly ity
  - type: note
    content: Jereo 1 Mp 9.8 sy nta.
  - type: text
    content: ', dia hivarahontsana izay rehetra mandalo azy ka hanontany hoe: «Nahoana no dia nataon’ny TOMPO toy izao ity tany ity sy ity tempoly ity?» '
  '22':
  - type: text
    content: 'Ary hisy olona hamaly hoe: «Satria nilaozan’ny Israelita ny Tompo Andriamanitry ny razany, dia Ilay nitondra azy niala tany Ejipta; ary nifikitra tamin’andriamani-kafa ireo sady niankohoka teo anatrehany sy nanompo azy, ka dia nampiharan’ny TOMPO izao loza isan-karazany izao.»'
  '3':
  - type: text
    content: 'Nony hitan’ny Israelita rehetra kosa ny nilatsahan’ny afo sy ny voninahitry ny TOMPO teo amin’ny tempoly, dia niankohoka nitehina ny lampivato izy ka nitsaoka ny TOMPO sy nidera Azy hoe: «Eny, tsara Izy sady maharitra mandrakizay ny fitiavany».'
  '4':
  - type: text
    content: 'Ary ny mpanjaka sy ny vahoaka rehetra dia nanao sorona teo anatrehan’ny TOMPO. '
  '5':
  - type: text
    content: 'Ka omby 22 000 sy ondry aman’osy 120 000 no nataon’i Salômôna mpanjaka sorona. Toy izany no nitokanan’ny mpanjaka sy ny vahoaka rehetra ny tranon’Andriamanitra. '
  '6':
  - type: text
    content: 'Samy nanao ny anjara raharahany avy ny mpisorona fa ny '
  - type: text
    content: levita
  - type: text
    content: ' kosa nisahana ny zava-maneno masina izay nampamboarin’i Davida mpanjaka mba hiderana ny TOMPO hoe: «Eny, maharitra mandrakizay ny fitiavany!», araka ny hira fiderana nasain’i Davida nataony. Dia nisy koa mpisorona nitsoka trômpetra tetsy andaniny; ary ny vahoaka israelita rehetra teo dia nitsangana avokoa. '
  '7':
  - type: text
    content: 'Tamin’izay no nanokanan’i Salômôna ny afovoan’ny kianja manoloana ny tranon’ny TOMPO, satria teo no nanaterany ny sorona dorana manontolo sy ny saboran’ny sorom-pihavanana. Ilay '
  - type: text
    content: alitara
  - type: text
    content: ' halimo izay nampanaovin’i Salômôna manko tsy omby ny sorona dorana manontolo sy ny fanatitra vokatry ny tany ary ny sabora.'
  '8':
  - type: text
    content: Fito andro no niarahan’i Salômôna nankalaza ny fetin’ny Tranotomboka tamin’ny Israelita rehetra izay tafangona marobe
  - type: note
    content: 'fetin’ny Tranotomboka: ny RM dia milaza fotsiny hoe fety (jereo 5.3; 1 Mp 8.2 sy nta).'
  - type: text
    content: ', tonga avy amin’ny lafy valo hatreo Lebô-Hamata'
  - type: note
    content: 'Lebô-Hamata: jereo Nom 13.21 sy nta.'
  - type: text
    content: ' ka hatrany amin’ny lohasahan-driakan’i Ejipta'
  - type: note
    content: 'lohasahan-driakan’i Ejipta: jereo Nom 34.5 sy nta.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Tamin’ny andro fahavalo no nanaovan’izy mianakavy fivoriana manetriketrika. Fito andro araka izany no nankalazany ny fitokanana ny alitara; ary fito andro hafa koa no nankalazany ny fetin’ny Tranotomboka. '
