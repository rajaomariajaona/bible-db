document_id: 2SA.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampanantenana nataon’Andriamanitra tamin’i Davida sy ny taranany
  - type: heading
    content: (Jereo 1 Tan 17.1-15)
  - type: text
    content: 'Rehefa tafapetraka tao an-dapany ny mpanjaka ary nampiadanin’ny TOMPO tamin’ireo fahavalony manodidina azy rehetra, '
  '10':
  - type: text
    content: 'Ary handraiketako toerana iray hampiorenako azy ny Israely vahoakako, ka dia honina tsy hanana ahiahy amin’izany izy. Fa tsy hisy firenen-dozabe hampahory azy intsony taloha, '
  '11':
  - type: text
    content: dia tamin’ny andro nanendreko mpitsara hifehy ny Israely vahoakako; ary hampiadana anao ho afaka amin’ny fahavalonao rehetra Aho. Ambarako aminao koa fa Izaho TOMPO mihitsy no hanome taranaka ho anao
  - type: note
    content: 'Amin’ny and 5-11, ny RM dia manao lalaon-teny amin’ny hevitra roa ananan’ilay voambolana izay mazàna adika hoe «trano». Ara-bakiteny, dia hoy ny Tompo amin’i Davida: Tsy ianao no hanao trano ho Ahy, (tempoly no tian-kambara, and 5), fa Izaho no hanao trano ho anao (taranaka no tian-kambara, and 11).'
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ary rehefa ho tapitra ny andronao ka hodimandry any amin’ireo razanao ianao, dia hatsangako handimby anao ny zanakao izay haterakao, ka haoriko mafy ny fanjakany
  - type: note
    content: Jereo 1 Mp 2.12-46.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Izy no hanao trano ho an’ny anarako
  - type: note
    content: Jereo 1 Mp 6.
  - type: text
    content: '; ary haoriko mafy mandrakizay ny sezafiandrianam-panjakàny. '
  '14':
  - type: text
    content: Izaho ho rainy ary izy ho zanako
  - type: note
    content: Jereo 2Kôr 6.18; Heb 1.5.
  - type: text
    content: '. Raha manao ratsy izy, dia hofaiziko araka ny fomban’ny olona sy amin’ny loza mahavoa ny olombelona. '
  '15':
  - type: text
    content: Kanefa tsy hanesotra aminy na oviana na oviana ny fitiavako Aho, tahaka ny nanesorako
  - type: note
    content: 'And 14-15: ampit Sal 89.31-35. –nanesorako izany: jereo 1 Sam 15.28.'
  - type: text
    content: ' izany tamin’i Saoly izay nasoloako anao. '
  '16':
  - type: text
    content: Ho azo antoka hitohy mandrakizay any aorianao ny taranakao sy ny fanjakanao, ary ny sezafiandriananao tsy ho voahozongozona mandrakizay.› »
  '17':
  - type: text
    content: Nambaran’i Natàna tamin’i Davida avokoa izay rehetra nolazain’Andriamanitra azy nandritra io fahitana io.
  - type: heading
    content: Vavak’i Davida
  - type: heading
    content: (Jereo 1 Tan 17.16-27)
  '18':
  - type: text
    content: 'Ary nankeo anatrehan’ny TOMPO tao an-tranolay i Davida mpanjaka, ka nipetraka sady nivavaka hoe:'
  - type: text
    content: '–Ry Tompo ANDRIANANAHARY ô, mba iza moa aho ary mba inona ny fianakaviako, no tonganao amin’ny toerana misy ahy izao? '
  '19':
  - type: text
    content: 'Kanefa mbola kely izany eo imasonao, ry Tompo ANDRIANANAHARY ô, ka efa nanaovanao fampanantenana koa hatramin’ny taranako mbola any aoriana lavitra any. Araka ny fomban’olombelona ve izany, ry Tompo ANDRIANANAHARY ô? '
  '2':
  - type: text
    content: 'dia hoy izy tamin’i Natàna '
  - type: text
    content: mpaminany
  - type: text
    content: ':'
  - type: text
    content: '–Jereo ange aho fa mipetraka amin’ny lapa vita hazo sedera, kanefa ny '
  - type: text
    content: Vatamasin’Andriamanitra
  - type: text
    content: ' kosa mitoetra ao anaty tranolay'
  - type: note
    content: 'lapa... sedera: jereo 5.11; tranolay: jereo 6.17.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'Koa inona indray no mbola holazaiko aminao? Fa Ianao, ry Tompo ANDRIAMANITRA ô, mahalala ahy mpanomponao. '
  '21':
  - type: text
    content: 'Noho ny fampanantenànao sy araka ny sitraponao no nanaovanao izao asa lehibe manontolo izao hampahalalainao ahy. '
  '22':
  - type: text
    content: 'Lehibe Ianao amin’izany, ry Tompo ANDRIANANAHARY ô: fa tsy misy tahaka Anao ary tsy misy Andriamanitra afa-tsy Ianao, araka izay rehetra ren’ny sofinay. '
  '23':
  - type: text
    content: 'Moa misy eto an-tany firenena tahaka an’i Israely vahoakanao? Dia ilay firenena navotanao ho afaka tamin’ireo Ejiptianina sy ireo andriamaniny mba ho tonga vahoakanao ka nomenao laza tamin’ny nanatanterahanao izao asa lehibe izao ho azy ary zava-mahatahotra ho an’ny taninao. '
  '24':
  - type: text
    content: 'Nampiorina mafy an’i Israely ho vahoakanao mandrakizay Ianao, TOMPO ô, sady efa tonga Andriamaniny. '
  '25':
  - type: text
    content: 'Ankehitriny, ry TOMPO Andriamanitra ô, ny fampanantenana nolazainao momba ahy sy ny taranako dia tano mandrakizay ary ataovy araka izay efa nampanantenainao. '
  '26':
  - type: text
    content: 'Halaza mandrakizay anie ny anaranao ka hatao hoe: «Ny TOMPOn’izao rehetra izao no Andriamanitr’i Israely». Ary ho mafy orina eo anatrehanao ny taranako. '
  '27':
  - type: text
    content: 'Satria Ianao, ry TOMPOn’izao rehetra izao sady Andriamanitr’i Israely, efa nanambara tamiko fa hanome taranaka ho ahy; koa izany no nahasahiako hivavaka aminao izao. '
  '28':
  - type: text
    content: 'Ry Tompo ANDRIANANAHARY ô, ianao mihitsy no Andriamanitra; azo antoka ny teninao, ary izaho mpanomponao no efa nampanantenainao izany zava-tsoa izany. '
  '29':
  - type: text
    content: 'Koa ho sitrakao anie ankehitriny ny '
  - type: text
    content: hitahy
  - type: text
    content: ' ireo taranako mba hitohy mandrakizay eo anatrehanao. Satria Ianao, ry Tompo ANDRIANANAHARY ô, no efa nampanantena, ka ny fitahianao no hitahianao mandrakizay ny taranako, fa mpanomponao aho.'
  '3':
  - type: text
    content: 'Dia hoy i Natàna namaly ny mpanjaka:'
  - type: text
    content: –Andeha tanteraho avokoa izay noeritreretinao hatao; fa momba anao ny TOMPO.
  '4':
  - type: text
    content: 'Tamin’ny alina iny ihany dia tonga tamin’i Natàna ny tenin’ny TOMPO nanao hoe:'
  '5':
  - type: text
    content: '«Ndeha lazao amin’i Davida mpanompoko izao hafatro izao: ‹Tsy ianao no hanao trano hitoerako. '
  '6':
  - type: text
    content: 'Fa tsy mbola nitoetra an-trano Aho hatramin’ny andro nampiarako ny Israelita avy tany Ejipta ka mandraka androany, fa tao anaty lay sy tao anaty fonena-masina Aho no mifindrafindra toerana. '
  '7':
  - type: text
    content: 'Nandritra ny fotoana rehetra nifindrafindrako niaraka tamin’ny Israelita, dia nanendry olona Aho mba ho mpiandry ny vahoakako; kanefa tsy nisy nomeko tsiny ireo voatendriko ireo na dia iray aza ka nilazako hoe: Nahoana Aho no tsy nanaovanareo trano vita hazo sedera?› '
  '8':
  - type: text
    content: 'Koa lazao amin’i Davida mpanompoko fa Izaho TOMPOn’izao rehetra izao no mampita hafatra hoe: ‹Izaho no naka anao teo am-piandrasana ondry tany an-kijàna mba ho filohan’i Israely vahoakako'
  - type: note
    content: 'tany an-kijàna: jereo 1 Sam 16.11; filohan’i Israely: jereo 5.2.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Niaraka taminao Aho teo amin’izay nalehanao rehetra, ka nandripaka ny fahavalonao rehetra teo anoloanao, ary hataoko lehibe ny lazanao tahaka ny an’ireo olona ambony eto an-tany. '
