document_id: 2SA.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampanantenana nataon’Andriamanitra tamin’i Davida sy ny taranany
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 17.1-15)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tafapetraka tao an-dapany ny mpanjaka ary nampiadanin’ny TOMPO tamin’ireo fahavalony manodidina azy rehetra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary handraiketako toerana iray hampiorenako azy ny Israely vahoakako, ka dia honina tsy hanana ahiahy amin’izany izy. Fa tsy hisy firenen-dozabe hampahory azy intsony taloha, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia tamin’ny andro nanendreko mpitsara hifehy ny Israely vahoakako; ary hampiadana anao ho afaka amin’ny fahavalonao rehetra Aho. Ambarako aminao koa fa Izaho TOMPO mihitsy no hanome taranaka ho anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny and 5-11, ny RM dia manao lalaon-teny amin’ny hevitra roa ananan’ilay voambolana izay mazàna adika hoe «trano». Ara-bakiteny, dia hoy ny Tompo amin’i Davida: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tsy ianao no hanao trano ho Ahy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', (tempoly no tian-kambara, and 5), '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fa Izaho no hanao trano ho anao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (taranaka no tian-kambara, and 11).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa ho tapitra ny andronao ka hodimandry any amin’ireo razanao ianao, dia hatsangako handimby anao ny zanakao izay haterakao, ka haoriko mafy ny fanjakany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 2.12-46.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy no hanao trano ho an’ny anarako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 6.
      marker-yv: yv-n
    - type: text
      text: '; ary haoriko mafy mandrakizay ny sezafiandrianam-panjakàny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho ho rainy ary izy ho zanako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2Kôr 6.18; Heb 1.5.
      marker-yv: yv-n
    - type: text
      text: '. Raha manao ratsy izy, dia hofaiziko araka ny fomban’ny olona sy amin’ny loza mahavoa ny olombelona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa tsy hanesotra aminy na oviana na oviana ny fitiavako Aho, tahaka ny nanesorako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 14-15:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Sal 89.31-35. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nanesorako izany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 1 Sam 15.28.'
      marker-yv: yv-n
    - type: text
      text: ' izany tamin’i Saoly izay nasoloako anao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho azo antoka hitohy mandrakizay any aorianao ny taranakao sy ny fanjakanao, ary ny sezafiandriananao tsy ho voahozongozona mandrakizay.› »
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nambaran’i Natàna tamin’i Davida avokoa izay rehetra nolazain’Andriamanitra azy nandritra io fahitana io.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavak’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 17.16-27)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nankeo anatrehan’ny TOMPO tao an-tranolay i Davida mpanjaka, ka nipetraka sady nivavaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Tompo ANDRIANANAHARY ô, mba iza moa aho ary mba inona ny fianakaviako, no tonganao amin’ny toerana misy ahy izao? '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Kanefa mbola kely izany eo imasonao, ry Tompo ANDRIANANAHARY ô, ka efa nanaovanao fampanantenana koa hatramin’ny taranako mbola any aoriana lavitra any. Araka ny fomban’olombelona ve izany, ry Tompo ANDRIANANAHARY ô? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hoy izy tamin’i Natàna '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Jereo ange aho fa mipetraka amin’ny lapa vita hazo sedera, kanefa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasin’Andriamanitra
    - type: text
      text: ' kosa mitoetra ao anaty tranolay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lapa... sedera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 5.11; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tranolay:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 6.17.'
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa inona indray no mbola holazaiko aminao? Fa Ianao, ry Tompo ANDRIAMANITRA ô, mahalala ahy mpanomponao. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Noho ny fampanantenànao sy araka ny sitraponao no nanaovanao izao asa lehibe manontolo izao hampahalalainao ahy. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Lehibe Ianao amin’izany, ry Tompo ANDRIANANAHARY ô: fa tsy misy tahaka Anao ary tsy misy Andriamanitra afa-tsy Ianao, araka izay rehetra ren’ny sofinay. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Moa misy eto an-tany firenena tahaka an’i Israely vahoakanao? Dia ilay firenena navotanao ho afaka tamin’ireo Ejiptianina sy ireo andriamaniny mba ho tonga vahoakanao ka nomenao laza tamin’ny nanatanterahanao izao asa lehibe izao ho azy ary zava-mahatahotra ho an’ny taninao. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nampiorina mafy an’i Israely ho vahoakanao mandrakizay Ianao, TOMPO ô, sady efa tonga Andriamaniny. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ankehitriny, ry TOMPO Andriamanitra ô, ny fampanantenana nolazainao momba ahy sy ny taranako dia tano mandrakizay ary ataovy araka izay efa nampanantenainao. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Halaza mandrakizay anie ny anaranao ka hatao hoe: «Ny TOMPOn’izao rehetra izao no Andriamanitr’i Israely». Ary ho mafy orina eo anatrehanao ny taranako. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Satria Ianao, ry TOMPOn’izao rehetra izao sady Andriamanitr’i Israely, efa nanambara tamiko fa hanome taranaka ho ahy; koa izany no nahasahiako hivavaka aminao izao. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ry Tompo ANDRIANANAHARY ô, ianao mihitsy no Andriamanitra; azo antoka ny teninao, ary izaho mpanomponao no efa nampanantenainao izany zava-tsoa izany. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa ho sitrakao anie ankehitriny ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitahy
    - type: text
      text: ' ireo taranako mba hitohy mandrakizay eo anatrehanao. Satria Ianao, ry Tompo ANDRIANANAHARY ô, no efa nampanantena, ka ny fitahianao no hitahianao mandrakizay ny taranako, fa mpanomponao aho.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Natàna namaly ny mpanjaka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha tanteraho avokoa izay noeritreretinao hatao; fa momba anao ny TOMPO.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny alina iny ihany dia tonga tamin’i Natàna ny tenin’ny TOMPO nanao hoe:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ndeha lazao amin’i Davida mpanompoko izao hafatro izao: ‹Tsy ianao no hanao trano hitoerako. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy mbola nitoetra an-trano Aho hatramin’ny andro nampiarako ny Israelita avy tany Ejipta ka mandraka androany, fa tao anaty lay sy tao anaty fonena-masina Aho no mifindrafindra toerana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandritra ny fotoana rehetra nifindrafindrako niaraka tamin’ny Israelita, dia nanendry olona Aho mba ho mpiandry ny vahoakako; kanefa tsy nisy nomeko tsiny ireo voatendriko ireo na dia iray aza ka nilazako hoe: Nahoana Aho no tsy nanaovanareo trano vita hazo sedera?› '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa lazao amin’i Davida mpanompoko fa Izaho TOMPOn’izao rehetra izao no mampita hafatra hoe: ‹Izaho no naka anao teo am-piandrasana ondry tany an-kijàna mba ho filohan’i Israely vahoakako'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tany an-kijàna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 1 Sam 16.11; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'filohan’i Israely:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 5.2.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niaraka taminao Aho teo amin’izay nalehanao rehetra, ka nandripaka ny fahavalonao rehetra teo anoloanao, ary hataoko lehibe ny lazanao tahaka ny an’ireo olona ambony eto an-tany. '
