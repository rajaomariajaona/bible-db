document_id: PSA.86
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Ianao no antsoiko amin’ny androm-pahoriako
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vavaka nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, mba atongilano ny sofinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka valio aho fa ory sy mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Arovy ny aiko fa mpivavaka aminao aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanomponao aho ka matoky Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vonjeo aho fa Ianao no Andriamanitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tompo ô, mba iantrao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa miantso Anao tontolo andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ampifalio re aho mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Ianao, Tompo ô, no ifantohako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tompo ô, Ianao no tsara fo sady mpamela heloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: be fitia amin’izay rehetra miantso Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mba henoy, TOMPO ô, ny vavaka ataoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tandrinao anie ny fitarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’ny androm-pahoriako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no antsoiko satria mamaly ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tompo ô, tsy misy tahaka Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ireo andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy mahavita ny vitanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ianao no namorona ny firenen-drehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho avy hiankohoka eo anatrehanao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanome voninahitra Anao, Tompo ô
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '86.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: And tsiahivina ao amin’ny Apôk 15.4.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa lehibe Ianao sy manao zava-mahagaga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao ihany no tena Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: TOMPO ô, toroy ny lalanao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba handehanako araka ny fahamarinanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy tokam-po aho mba hankatò Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tompo Andriamanitro ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoderaiko amin’ny foko manontolo Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary homeko voninahitra mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: satria lehibe ny fitiavanao ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho no efa nafahanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho lasa any an-davaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny toeran’ny maty any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Olona mpiavonavona no mitsangan-kamely ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: andian’olon-dozabe no mitady hahafaty ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao, Andriamanitra ô, tsy raharahainy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Kanefa Ianao, Tompo ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Andriamanitra mamindrafo sy miantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mahari-po sady be fitiavana amam-pahamarinana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '86.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 103.8; 145.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mba itodiho aho ka iantrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: omeo ahy mpanomponao ny herinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vonjeo aho fa voatokana ho Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Omeo porofo aho fa tsara fo Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho menatra ireo mpankahala ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mahita fa Ianao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mamonjy sy mampionona ahy.
