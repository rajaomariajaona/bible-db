document_id: PSA.86,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ianao no antsoiko amin’ny androm-pahoriako
  - type: text
    content: ' '
  - type: text
    content: Vavaka nataon’i Davida.
  - type: text
    content: TOMPO ô, mba atongilano ny sofinao
  - type: text
    content: ka valio aho fa ory sy mahantra.
  '10':
  - type: text
    content: fa lehibe Ianao sy manao zava-mahagaga;
  - type: text
    content: Ianao ihany no tena Andriamanitra.
  '11':
  - type: text
    content: TOMPO ô, toroy ny lalanao aho
  - type: text
    content: mba handehanako araka ny fahamarinanao,
  - type: text
    content: ataovy tokam-po aho mba hankatò Anao.
  '12':
  - type: text
    content: Tompo Andriamanitro ô,
  - type: text
    content: hoderaiko amin’ny foko manontolo Ianao
  - type: text
    content: ary homeko voninahitra mandrakizay,
  '13':
  - type: text
    content: satria lehibe ny fitiavanao ahy;
  - type: text
    content: fa izaho no efa nafahanao
  - type: text
    content: tsy ho lasa any an-davaka,
  - type: text
    content: any amin’ny toeran’ny maty any.
  '14':
  - type: text
    content: Olona mpiavonavona no mitsangan-kamely ahy
  - type: text
    content: andian’olon-dozabe no mitady hahafaty ahy;
  - type: text
    content: Ianao, Andriamanitra ô, tsy raharahainy akory.
  '15':
  - type: text
    content: Kanefa Ianao, Tompo ô,
  - type: text
    content: dia Andriamanitra mamindrafo sy miantra,
  - type: text
    content: mahari-po sady be fitiavana amam-pahamarinana
  - type: note
    content: Sal 103.8; 145.8.
  - type: text
    content: .
  '16':
  - type: text
    content: Mba itodiho aho ka iantrao;
  - type: text
    content: omeo ahy mpanomponao ny herinao,
  - type: text
    content: ary vonjeo aho fa voatokana ho Anao.
  '17':
  - type: text
    content: Omeo porofo aho fa tsara fo Ianao;
  - type: text
    content: dia ho menatra ireo mpankahala ahy,
  - type: text
    content: rehefa mahita fa Ianao, TOMPO ô,
  - type: text
    content: no mamonjy sy mampionona ahy.
  '2':
  - type: text
    content: Arovy ny aiko fa mpivavaka aminao aho.
  - type: text
    content: Mpanomponao aho ka matoky Anao,
  - type: text
    content: vonjeo aho fa Ianao no Andriamanitro.
  '3':
  - type: text
    content: Tompo ô, mba iantrao aho
  - type: text
    content: fa miantso Anao tontolo andro.
  '4':
  - type: text
    content: Ampifalio re aho mpanomponao
  - type: text
    content: satria Ianao, Tompo ô, no ifantohako.
  '5':
  - type: text
    content: Tompo ô, Ianao no tsara fo sady mpamela heloka,
  - type: text
    content: be fitia amin’izay rehetra miantso Anao.
  '6':
  - type: text
    content: Mba henoy, TOMPO ô, ny vavaka ataoko;
  - type: text
    content: ka ho tandrinao anie ny fitarainako.
  '7':
  - type: text
    content: Amin’ny androm-pahoriako,
  - type: text
    content: Ianao no antsoiko satria mamaly ahy.
  '8':
  - type: text
    content: Tompo ô, tsy misy tahaka Anao
  - type: text
    content: amin’ireo andriamanitra;
  - type: text
    content: tsy misy mahavita ny vitanao.
  '9':
  - type: text
    content: Ianao no namorona ny firenen-drehetra,
  - type: text
    content: ka ho avy hiankohoka eo anatrehanao izy
  - type: text
    content: ary hanome voninahitra Anao, Tompo ô
  - type: note
    content: And tsiahivina ao amin’ny Apôk 15.4.
  - type: text
    content: ','
