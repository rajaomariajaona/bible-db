document_id: 1SA.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ary i Samoela nampita izany teny izany tamin’ny vahoaka Israely tsivakivolo.
  - type: heading
    content: Eo an-tanan’ny fahavalo ny Vatamasina
  - type: text
    content: Indray andro dia nandeha niady tamin’ny Filistinina ny Israelita ka nitoby teo akaikin’i Ebena-Hezera; ny Filistinina kosa nitoby tao Afeka
  - type: note
    content: 'Ebena-Hezera sy Afeka: toerana anankiroa izay kilaometatra vitsivitsy ihany no elanelany ary tokony ho 40 km any avaratra andrefan’i Jerosalema.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ary niady ny Filistinina, dia resy ny Israelita ka nandositra nody avokoa. Faharesena mavesatra tokoa izany satria miaramila israelita telo alina no maty, '
  '11':
  - type: text
    content: ny Vatamasina lasan’ny Filistinina, ary izy mirahalahy zanak’i Helỳ, dia i Hôfnỳ sy i Pinehasa, samy maty avokoa.
  - type: heading
    content: Ny nahafatesan’i Helỳ mpisorona sy ny an’ilay vinantovaviny
  '12':
  - type: text
    content: 'Androtrio ihany dia nisy lehilahy iray avy tamin’ny fokon’i Benjamîna afa-nitsoaka ny toeram-piadiana ka nilomay hatrany Silao; ho marik’alahelo, dia '
  - type: text
    content: notriariny ny fitafiany
  - type: text
    content: ' ary nohosorany vovoka ny lohany. '
  '13':
  - type: text
    content: 'Tamin’ny fahatongavany dia efa nipetraka tamin’ny sezany teo amoron-dalana i Helỳ niandry sady nanahy mafy ny amin’ilay '
  - type: text
    content: Vatamasin’Andriamanitra
  - type: text
    content: '. Dia tonga nanambara ny vaovao tao an-tanàna ralehilahy, ka nikiakiaka nitomany ny iray tanàna. '
  '14':
  - type: text
    content: 'Nony ren’i Helỳ ny kiakiakan’ny vahoaka, dia nanontany ny antonanton’izany izy; ary nanatona faingana an’i Helỳ ilay lehilahy sady nanambara taminy ny vaovao. '
  '15':
  - type: text
    content: 'Efa valo amby sivifolo taona i Helỳ tamin’izay ary jamba tanteraka. '
  '16':
  - type: text
    content: 'Hoy ilay lehilahy taminy:'
  - type: text
    content: –Avy tany am-bava ady aho ary nitsoaka an-daharana vao androany izao.
  - type: text
    content: 'I Helỳ kosa nanontany azy hoe:'
  - type: text
    content: –Fa inona no nitranga tany, anaka?
  - type: text
    content: 'Dia hoy ny navalin’ilay mpitondra hafatra:'
  '17':
  - type: text
    content: –Vaky nandositra teo anatrehan’ny Filistinina ny Israelita. Fahavoazana lehibe no nianjady tamin’ny tafitsika; ary manampy trotraka izany, ny zanakao mirahalahy, i Hôfnỳ sy i Pinehasa, dia maty koa; ary ny Vatamasin’Andriamanitra lasan’ny Filistinina.
  '18':
  - type: text
    content: 'Vantany vao niteny ny momba ny Vatamasin’Andriamanitra ilay mpitondra hafatra, dia nianjera avy teo amin’ny sezany i Helỳ, ary nitrosina teo anilan’ny varavaran’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ; tapaka ny hatony ary dia maty izy, satria sady efa antitra no mavesatra. Efapolo taona no nitondrany ny vahoakan’i Israely.
  '19':
  - type: text
    content: Ary bevohòka be efa ho teraka ny vinanton’i Helỳ, dia ny vadin’i Pinehasa izany. Rehefa reny fa lasan’ny Filistinina ny Vatamasin’ny Tompo, sady maty ny rafozany sy ny vadiny, dia nitambonkina
  - type: note
    content: 'nitambonkina: izany no toa fomba mahazatra ny vehivavy miteraka tamin’izany vaninandro izany.'
  - type: text
    content: ' ny anao vavy ka teraka tsy satry vokatry ny fanaintainana nahazo azy. '
  '2':
  - type: text
    content: 'Dia nilahatra nanafika ny Israelita ny Filistinina ka nangotraka ny ady. Resy ny Israelita ary nahafatesana miaramila tokony ho efatra arivo tamin’izany ady izany. '
  '20':
  - type: text
    content: 'Ary rehefa akaiky ho faty izy, dia hoy ireo vehivavy izay nanampy azy teo hoe:'
  - type: text
    content: –Aza matahotra fa zazalahy no naterakao.
  - type: text
    content: 'Nefa tsy namaly izy na niraharaha akory izay notenenina taminy. '
  '21':
  - type: text
    content: 'Avy eo dia hoy izy hoe:'
  - type: text
    content: '–Nesorina tamin’i Israely ny '
  - type: text
    content: voninahitr
  - type: text
    content: ’Andriamanitra, ka hataoko hoe Ikabôda no anaran’ny zaza!
  - type: text
    content: 'Io anarana io dia midika hoe «tsy misy voninahitra intsony» ka hahatsiahivana fa lasan-ko babo ny Vatamasin’Andriamanitra sady maty koa ny rafozan-dravehivavy sy ny vadiny. '
  '22':
  - type: text
    content: Nambarany araka izany fa nesorina tamin’i Israely tokoa ny voninahitra satria efa lasan-ko babo ilay Vatamasin’Andriamanitra.
  '3':
  - type: text
    content: 'Rehefa tafaverina tany amin’ny toby ireo sisa velona, dia hoy ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely hoe:'
  - type: text
    content: '–Nahoana no navelan’ny TOMPO ho resin’ny Filistinina isika androany? Andeha halaina any Silao ny '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    content: ; fa rahefa mby eto amintsika izany
  - type: note
    content: 'Silao: jereo 1.3 sy nta.'
  - type: text
    content: ', dia hamonjy antsika amin’ny fahavalontsika.'
  '4':
  - type: text
    content: 'Dia naniraka olona nankany Silao ny vahoaka mba haka ny Vatamasina mirakitra ny fanekempihavanan’ilay TOMPO Andriamanitr’izao rehetra izao, dia ilay TOMPO mipetraka eo ambony '
  - type: text
    content: kerobima
  - type: note
    content: Jereo Eks 25.22.
  - type: text
    content: '. Nanaraka io Vatamasina io ny zanak’i Helỳ roa lahy, dia i Hôfnỳ sy i Pinehasa. '
  '5':
  - type: text
    content: Raha vantany vao tonga tao an-toby ny Vatamasin’ny TOMPO, dia nanao horakoraka mafy ny miaramila israelita rehetra ka nampihozona ny tany.
  '6':
  - type: text
    content: 'Rehefa nandre izany horakora-pifaliana izany ny Filistinina, dia nifanontany hoe:'
  - type: text
    content: –Fa inona no dikan’izao horakoraka be ao an-tobin’ny Hebreo izao?
  - type: text
    content: 'Vao fantatry ny Filistinina fa tonga ao an-tobin’i Israely ny Vatamasin’ny TOMPO, '
  '7':
  - type: text
    content: 'dia natahotra ireo, satria nifampilaza hoe: «Andriamanitra no tonga ao an-tobiny. Tsy mbola tao Izy talohan’izao; koa ankehitriny, hahita loza isika. '
  '8':
  - type: text
    content: Eny, hahita loza isika! Iza no hamonjy antsika tsy ho azon’io Andriamanitra mahery io, Izay namely ny Ejiptianina tamin’ny loza maro samihafa tany an-taniefitra
  - type: note
    content: 'loza maro samihafa: fampahatsiahivana ankapobeny an’ireo loza nihatra tany Ejipta (Eks 7–11) sy an’ilay famongorana ny tafika ejiptianina (Eks 14).'
  - type: text
    content: '? '
  '9':
  - type: text
    content: Mahereza, ry Filistinina, mbà tena lehilahy raha tsy tiantsika ny hoziogain’ny Hebreo tahaka izay nataontsika taminy fahiny; koa misehoa ho tena lehilahy tokoa isika ary miadia.»
