document_id: 1SA.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary i Samoela nampita izany teny izany tamin’ny vahoaka Israely tsivakivolo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eo an-tanan’ny fahavalo ny Vatamasina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: Indray andro dia nandeha niady tamin’ny Filistinina ny Israelita ka nitoby teo akaikin’i Ebena-Hezera; ny Filistinina kosa nitoby tao Afeka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ebena-Hezera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Afeka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toerana anankiroa izay kilaometatra vitsivitsy ihany no elanelany ary tokony ho 40 km any avaratra andrefan’i Jerosalema.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nilahatra nanafika ny Israelita ny Filistinina ka nangotraka ny ady. Resy ny Israelita ary nahafatesana miaramila tokony ho efatra arivo tamin’izany ady izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa tafaverina tany amin’ny toby ireo sisa velona, dia hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no navelan’ny TOMPO ho resin’ny Filistinina isika androany? Andeha halaina any Silao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina mirakitra ny fanekempihavanan’ny TOMPO
  - type: text
    text: ; fa rahefa mby eto amintsika izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Silao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', dia hamonjy antsika amin’ny fahavalontsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia naniraka olona nankany Silao ny vahoaka mba haka ny Vatamasina mirakitra ny fanekempihavanan’ilay TOMPO Andriamanitr’izao rehetra izao, dia ilay TOMPO mipetraka eo ambony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 25.22.
    marker-yv: yv-n
  - type: text
    text: '. Nanaraka io Vatamasina io ny zanak’i Helỳ roa lahy, dia i Hôfnỳ sy i Pinehasa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha vantany vao tonga tao an-toby ny Vatamasin’ny TOMPO, dia nanao horakoraka mafy ny miaramila israelita rehetra ka nampihozona ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa nandre izany horakora-pifaliana izany ny Filistinina, dia nifanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona no dikan’izao horakoraka be ao an-tobin’ny Hebreo izao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Vao fantatry ny Filistinina fa tonga ao an-tobin’i Israely ny Vatamasin’ny TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia natahotra ireo, satria nifampilaza hoe: «Andriamanitra no tonga ao an-tobiny. Tsy mbola tao Izy talohan’izao; koa ankehitriny, hahita loza isika. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eny, hahita loza isika! Iza no hamonjy antsika tsy ho azon’io Andriamanitra mahery io, Izay namely ny Ejiptianina tamin’ny loza maro samihafa tany an-taniefitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'loza maro samihafa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fampahatsiahivana ankapobeny an’ireo loza nihatra tany Ejipta (Eks 7–11) sy an’ilay famongorana ny tafika ejiptianina (Eks 14).
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mahereza, ry Filistinina, mbà tena lehilahy raha tsy tiantsika ny hoziogain’ny Hebreo tahaka izay nataontsika taminy fahiny; koa misehoa ho tena lehilahy tokoa isika ary miadia.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary niady ny Filistinina, dia resy ny Israelita ka nandositra nody avokoa. Faharesena mavesatra tokoa izany satria miaramila israelita telo alina no maty, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ny Vatamasina lasan’ny Filistinina, ary izy mirahalahy zanak’i Helỳ, dia i Hôfnỳ sy i Pinehasa, samy maty avokoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Helỳ mpisorona sy ny an’ilay vinantovaviny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Androtrio ihany dia nisy lehilahy iray avy tamin’ny fokon’i Benjamîna afa-nitsoaka ny toeram-piadiana ka nilomay hatrany Silao; ho marik’alahelo, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: notriariny ny fitafiany
  - type: text
    text: ' ary nohosorany vovoka ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’ny fahatongavany dia efa nipetraka tamin’ny sezany teo amoron-dalana i Helỳ niandry sady nanahy mafy ny amin’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasin’Andriamanitra
  - type: text
    text: '. Dia tonga nanambara ny vaovao tao an-tanàna ralehilahy, ka nikiakiaka nitomany ny iray tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony ren’i Helỳ ny kiakiakan’ny vahoaka, dia nanontany ny antonanton’izany izy; ary nanatona faingana an’i Helỳ ilay lehilahy sady nanambara taminy ny vaovao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Efa valo amby sivifolo taona i Helỳ tamin’izay ary jamba tanteraka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy ilay lehilahy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avy tany am-bava ady aho ary nitsoaka an-daharana vao androany izao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Helỳ kosa nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona no nitranga tany, anaka?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navalin’ilay mpitondra hafatra:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: –Vaky nandositra teo anatrehan’ny Filistinina ny Israelita. Fahavoazana lehibe no nianjady tamin’ny tafitsika; ary manampy trotraka izany, ny zanakao mirahalahy, i Hôfnỳ sy i Pinehasa, dia maty koa; ary ny Vatamasin’Andriamanitra lasan’ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vantany vao niteny ny momba ny Vatamasin’Andriamanitra ilay mpitondra hafatra, dia nianjera avy teo amin’ny sezany i Helỳ, ary nitrosina teo anilan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ; tapaka ny hatony ary dia maty izy, satria sady efa antitra no mavesatra. Efapolo taona no nitondrany ny vahoakan’i Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary bevohòka be efa ho teraka ny vinanton’i Helỳ, dia ny vadin’i Pinehasa izany. Rehefa reny fa lasan’ny Filistinina ny Vatamasin’ny Tompo, sady maty ny rafozany sy ny vadiny, dia nitambonkina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nitambonkina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany no toa fomba mahazatra ny vehivavy miteraka tamin’izany vaninandro izany.
    marker-yv: yv-n
  - type: text
    text: ' ny anao vavy ka teraka tsy satry vokatry ny fanaintainana nahazo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa akaiky ho faty izy, dia hoy ireo vehivavy izay nanampy azy teo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza matahotra fa zazalahy no naterakao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nefa tsy namaly izy na niraharaha akory izay notenenina taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Avy eo dia hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nesorina tamin’i Israely ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voninahitr
  - type: text
    text: ’Andriamanitra, ka hataoko hoe Ikabôda no anaran’ny zaza!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Io anarana io dia midika hoe «tsy misy voninahitra intsony» ka hahatsiahivana fa lasan-ko babo ny Vatamasin’Andriamanitra sady maty koa ny rafozan-dravehivavy sy ny vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nambarany araka izany fa nesorina tamin’i Israely tokoa ny voninahitra satria efa lasan-ko babo ilay Vatamasin’Andriamanitra.
