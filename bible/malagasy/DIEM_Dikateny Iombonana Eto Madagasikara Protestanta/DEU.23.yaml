document_id: DEU.23,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tsy misy olona mahazo miray amin’ny vadin-drainy, fa mahavery zo aman-kasina an-drainy izany
  - type: note
    content: Jereo 27.20; Lev 18.8; 20.11. –Amin’ny dkt sasany, ny 23.1 dia voalahatra ho 22.30; noho izany, ny 23.2-26 dia manjary 23.1-25.
  - type: text
    content: .
  - type: heading
    content: Ny amin’ny olona tsy mahazo mandray anjara amin’ny fiangonan’ny Israelita
  '10':
  - type: text
    content: 'Raha eo am-pitobiana hanafika fahavalo ianareo, dia fadio ny zava-dratsy rehetra. '
  '11':
  - type: text
    content: 'Raha eo aminareo no misy miaramila tsy '
  - type: text
    content: madio
  - type: text
    content: ' satria nanary lahinaina tsy nahy tamin’ny alina, dia hivoaka ny toby izy ary tsy hiditra ao. '
  '12':
  - type: text
    content: Handro izy rehefa harivariva, ary mahazo miverina eo amin’ny toby indray nony tokony ho maty masoandro.
  '13':
  - type: text
    content: 'Aoka hisy tany voafaritrareo any ivelan’ny toby mba ho fivoahanareo. '
  '14':
  - type: text
    content: 'Ary mitondrà fantàka miaraka amin’ny fiadianareo; ka raha hihataka hivoaka ianareo, dia io fantàka io no hihadianareo lavaka hivoahana sy hanotofanareo ny dikinareo. '
  '15':
  - type: text
    content: Mandeha eo afovoan’ny tobinareo ilay TOMPO Andriamanitrareo mba hiaro anareo sy hampanaiky resy ny fahavalonareo; ka dia ho faritra masina ny tobinareo, ary tsy tokony hahita zava-maharikoriko eo aminareo ny Tompo mba tsy hialany aminareo.
  - type: heading
    content: Ny amin’ny mpanompo mandositra
  '16':
  - type: text
    content: 'Aza atolotrareo ny tompony intsony ny andevo izay mandositra mialoka eo aminareo. '
  '17':
  - type: text
    content: Eo aminareo no honenany, dia eo amin’ny toerana izay fidiny ao amin’ny tanànanareo mba hahafinaritra azy; fa aza mampahory azy ianareo.
  - type: heading
    content: Ny fijangajangana ho fanompoan-tsampy
  '18':
  - type: text
    content: Aoka tsy hisy vehivavy na lehilahy israelita hanolo-tena hijangajanga ho fanompoan-tsampy
  - type: note
    content: Jereo Lev 19.29; Jer 2.20 sy nta.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Aza ekena hoentina eo an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' Andriamanitrareo mba hanefana '
  - type: text
    content: voady
  - type: text
    content: ' na ny tangim-behivavy janga na ny karaman’alikalahy: ireo zavatra anankiroa ireo manko dia samy zava-mahatsiravina eo imason’ny TOMPO Andriamanitrareo.'
  - type: heading
    content: Ny mampanàna zavatra
  '2':
  - type: text
    content: Ny lehilahy torotoro vihina na tapaka filahiana dia tsy mahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO.
  '20':
  - type: text
    content: 'Aza mampanàna zavatra amin’ny mpiray firenena ianareo, na vola, na hanina, na zavatra hafa mety hampananàna. '
  '21':
  - type: text
    content: 'Ny olona hafa firenena ihany no azonareo ampananàn-javatra, fa ny mpiray firenena kosa tsy hanaovanareo izany; dia '
  - type: text
    content: hotahîn
  - type: text
    content: ’ny TOMPO Andriamanitrareo ianareo amin’ny zavatra rehetra hataonareo, any amin’ny tany izay efa hidiranareo mba halainareo ho fananana
  - type: note
    content: 'And 20-21: jereo 15.7-11; Eks 22.24; Lev 25.36-37.'
  - type: text
    content: .
  - type: heading
    content: Ny voady
  '22':
  - type: text
    content: Raha mivoady hanao sorona na fanatitra amin’ny TOMPO Andriamanitrareo ianareo, dia aza ela fanefa; raha tsy izany kosa dia hanadinany anareo tokoa ilay voady ka ho fahotana aminareo
  - type: note
    content: Jereo Nom 30.3; Mt 5.33.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Fa raha tsy mivoady ianareo, dia tsy fahotana aminareo izany. '
  '24':
  - type: text
    content: Izay aloaky ny vavanareo dia imasoy hotanterahina, araka ny voady an-tsitrapo notononin’ny vavanareo tamin’ny TOMPO Andriamanitrareo.
  - type: heading
    content: Ny zo hioty voankazo na salohim-bary
  '25':
  - type: text
    content: 'Raha ianareo sendra mandalo ny tanimboaloboky ny namanareo, dia mahazo manaram-po mihinam-boaloboka hahavoky; fa aza mitondra mody. '
  '26':
  - type: text
    content: Raha ianareo sendra mandalo ny tanimbarin’ny namanareo, dia mahazo mioty salohim-bary amin’ny tananareo
  - type: note
    content: Ampit Mt 12.1; Mk 2.23; Lk 6.1.
  - type: text
    content: ; fa aza jinjanareo antsy ny variny.
  '3':
  - type: text
    content: Ny zazasary
  - type: note
    content: Tsy azo antoka ny hevitry ny voambolana hebreo nadika hoe ny zazasary. Kanefa toa mampahatsiahy ny Lev 18.6-20; 20.10-21 izany. Taorian’ny fahababoana tany Babilôna, dia noraisina ho fanambadiana voararan’ny lalàna koa ny fifanambadian’ny lehilahy jiosy sy vehivavy hafa firenena (Zak 9.6; ampit Neh 13.1-2; 23.28).
  - type: text
    content: ' dia tsy mahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO; na ny taranany fahafolo aza, dia tsy hahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO.'
  '4':
  - type: text
    content: Ny Hamônita sy ny Môabita
  - type: note
    content: Jereo Gen 19.37-38.
  - type: text
    content: ' dia tsy mahazo miditra na oviana na oviana ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO; na ny taranany fahafolo aza, dia tsy mahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO. '
  '5':
  - type: text
    content: 'Tsy nitsena sakafo sy rano anareo teny an-dalana manko ny Hamônita sy ny Môabita fony ianareo niala tany Ejipta; sady ry zareo Môabita koa no nampaka an’i Balahàma, zanakalahin’i Behôra, avy tany Petôra any Mezôpôtamia, ary nanamby vola azy mba hanozona anareo. '
  '6':
  - type: text
    content: 'Kanefa ny TOMPO Andriamanitrareo tsy nety nihaino an’i Balahàma, fa nampody ny fanozonana ho '
  - type: text
    content: fitahiana
  - type: text
    content: ' anareo IZY noho ny fitiavany anareo'
  - type: note
    content: 'And 5-6: jereo Nom 23–24.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Aza mitady izay hiadanan’ireo firenena ireo na izay hahasoa azy na oviana na oviana ianareo amin’ny andro rehetra hiainanareo.
  '8':
  - type: text
    content: Aza hamavoinareo ny Edômita, satria taranaky ny mpiray tampo izy mbaminareo
  - type: note
    content: Jereo 2.4.
  - type: text
    content: '. Aza hamavoinareo koa ny Ejiptianina, satria efa mba vahiny tany amin’ny taniny ianareo. '
  '9':
  - type: text
    content: Ny valovotak’ireo firenena roa tonta ireo, manomboka eo amin’ny taranaka fahatelo, dia hahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO.
