document_id: DEU.23
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsy misy olona mahazo miray amin’ny vadin-drainy, fa mahavery zo aman-kasina an-drainy izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 27.20; Lev 18.8; 20.11. –Amin’ny dkt sasany, ny 23.1 dia voalahatra ho 22.30; noho izany, ny 23.2-26 dia manjary 23.1-25.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny olona tsy mahazo mandray anjara amin’ny fiangonan’ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny lehilahy torotoro vihina na tapaka filahiana dia tsy mahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny zazasary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tsy azo antoka ny hevitry ny voambolana hebreo nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny zazasary.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Kanefa toa mampahatsiahy ny Lev 18.6-20; 20.10-21 izany. Taorian’ny fahababoana tany Babilôna, dia noraisina ho fanambadiana voararan’ny lalàna koa ny fifanambadian’ny lehilahy jiosy sy vehivavy hafa firenena (Zak 9.6; ampit Neh 13.1-2; 23.28).'
    marker-yv: yv-n
  - type: text
    text: ' dia tsy mahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO; na ny taranany fahafolo aza, dia tsy hahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny Hamônita sy ny Môabita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 19.37-38.
    marker-yv: yv-n
  - type: text
    text: ' dia tsy mahazo miditra na oviana na oviana ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO; na ny taranany fahafolo aza, dia tsy mahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy nitsena sakafo sy rano anareo teny an-dalana manko ny Hamônita sy ny Môabita fony ianareo niala tany Ejipta; sady ry zareo Môabita koa no nampaka an’i Balahàma, zanakalahin’i Behôra, avy tany Petôra any Mezôpôtamia, ary nanamby vola azy mba hanozona anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanefa ny TOMPO Andriamanitrareo tsy nety nihaino an’i Balahàma, fa nampody ny fanozonana ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitahiana
  - type: text
    text: ' anareo IZY noho ny fitiavany anareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 5-6:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 23–24.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza mitady izay hiadanan’ireo firenena ireo na izay hahasoa azy na oviana na oviana ianareo amin’ny andro rehetra hiainanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza hamavoinareo ny Edômita, satria taranaky ny mpiray tampo izy mbaminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.4.
    marker-yv: yv-n
  - type: text
    text: '. Aza hamavoinareo koa ny Ejiptianina, satria efa mba vahiny tany amin’ny taniny ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny valovotak’ireo firenena roa tonta ireo, manomboka eo amin’ny taranaka fahatelo, dia hahazo miditra ho anisan’ny fiangonan’ireo mpivavaka amin’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha eo am-pitobiana hanafika fahavalo ianareo, dia fadio ny zava-dratsy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha eo aminareo no misy miaramila tsy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: ' satria nanary lahinaina tsy nahy tamin’ny alina, dia hivoaka ny toby izy ary tsy hiditra ao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Handro izy rehefa harivariva, ary mahazo miverina eo amin’ny toby indray nony tokony ho maty masoandro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aoka hisy tany voafaritrareo any ivelan’ny toby mba ho fivoahanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary mitondrà fantàka miaraka amin’ny fiadianareo; ka raha hihataka hivoaka ianareo, dia io fantàka io no hihadianareo lavaka hivoahana sy hanotofanareo ny dikinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mandeha eo afovoan’ny tobinareo ilay TOMPO Andriamanitrareo mba hiaro anareo sy hampanaiky resy ny fahavalonareo; ka dia ho faritra masina ny tobinareo, ary tsy tokony hahita zava-maharikoriko eo aminareo ny Tompo mba tsy hialany aminareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny mpanompo mandositra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza atolotrareo ny tompony intsony ny andevo izay mandositra mialoka eo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eo aminareo no honenany, dia eo amin’ny toerana izay fidiny ao amin’ny tanànanareo mba hahafinaritra azy; fa aza mampahory azy ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fijangajangana ho fanompoan-tsampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka tsy hisy vehivavy na lehilahy israelita hanolo-tena hijangajanga ho fanompoan-tsampy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 19.29; Jer 2.20 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aza ekena hoentina eo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' Andriamanitrareo mba hanefana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voady
  - type: text
    text: ' na ny tangim-behivavy janga na ny karaman’alikalahy: ireo zavatra anankiroa ireo manko dia samy zava-mahatsiravina eo imason’ny TOMPO Andriamanitrareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mampanàna zavatra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aza mampanàna zavatra amin’ny mpiray firenena ianareo, na vola, na hanina, na zavatra hafa mety hampananàna. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny olona hafa firenena ihany no azonareo ampananàn-javatra, fa ny mpiray firenena kosa tsy hanaovanareo izany; dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hotahîn
  - type: text
    text: ’ny TOMPO Andriamanitrareo ianareo amin’ny zavatra rehetra hataonareo, any amin’ny tany izay efa hidiranareo mba halainareo ho fananana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.21 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 20-21:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 15.7-11; Eks 22.24; Lev 25.36-37.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha mivoady hanao sorona na fanatitra amin’ny TOMPO Andriamanitrareo ianareo, dia aza ela fanefa; raha tsy izany kosa dia hanadinany anareo tokoa ilay voady ka ho fahotana aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 30.3; Mt 5.33.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha tsy mivoady ianareo, dia tsy fahotana aminareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay aloaky ny vavanareo dia imasoy hotanterahina, araka ny voady an-tsitrapo notononin’ny vavanareo tamin’ny TOMPO Andriamanitrareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zo hioty voankazo na salohim-bary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha ianareo sendra mandalo ny tanimboaloboky ny namanareo, dia mahazo manaram-po mihinam-boaloboka hahavoky; fa aza mitondra mody. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Raha ianareo sendra mandalo ny tanimbarin’ny namanareo, dia mahazo mioty salohim-bary amin’ny tananareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 12.1; Mk 2.23; Lk 6.1.
    marker-yv: yv-n
  - type: text
    text: ; fa aza jinjanareo antsy ny variny.
