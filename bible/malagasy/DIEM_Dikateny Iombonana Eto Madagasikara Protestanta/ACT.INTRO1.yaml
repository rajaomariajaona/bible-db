type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: Ny boky mirakitra ny
  - type: text
    content: ' Asan’ny Apôstôly '
  - type: text
    content: dia tohin’ny boky
  - type: text
    content: ' Vaovao Mahafaly araka an’i Lioka. '
  - type: text
    content: Ao amin’ny Vaovao Mahafaly dia ny vanim-potoana niainan’i Jesoa teto an-tany no ifantohan’i Lioka. Rehefa niakatra any an-danitra kosa i Jesoa (Asa 1.1-11), dia miova endrika ny fifaneraseran’i Kristy amin’ireo mpianany. Araka izany, dia ny
  - type: text
    content: ' Asan’ny apôstôly '
  - type: text
    content: 'no misantatra ny tantaran’ny Fiangonana: eo amin’ny Fiangonana lalandava i Jesoa, amin’ny alalan’ny Fanahy Masina Izay manentana ny mpianatra.'
  - type: text
    content: Tantara velona sy mampitaintaina no raketin’ny
  - type: text
    content: ' Asan’ny apôstôly. '
  - type: text
    content: Atrehina ao ny nahaterahan’ireo vondrona kristianina teo amin-dry zareo Jiosy (miaraka amin’i Petera apôstôly) toy ny tao Jerosalema, na koa teo amin-dry zareo hafa firenena, toy ny tao Antiôkia sy Kôrinto na Filipy. Arahina ao koa i Paoly tsy sasatry ny mitety tany ary manatontosa dia maromaro mba hitory ny Vaovao Mahafaly. Tsikaritra ao ny olana midona amin’izany Fiangonana vao manomboka izany ary ny fomba nahaizany namaha ny olana noho ny Fanahin’ny Tompo.
  - type: text
    content: Amin’ireo loharano nipoiran’ity boky mirakitra ny
  - type: text
    content: ' Asan’ny apôstôly '
  - type: text
    content: ity dia singanina ilay azo antsoina hoe «Diarin’i Lioka». I Lioka, mpanoratra ny
  - type: text
    content: ' Asan’ny apôstôly, '
  - type: text
    content: dia dokotera mpiara-miasa tamin’i Paoly (Kôl 4.14; Fm 24; 2 Tim 4.11) ary tena mpiara-dia taminy (Asa 16.10-40) ka tafapaka hatrany Jerosalema izay isamborana an’i Paoly (Asa 20.5-21, 18), ary farany hatreo Kesaria ka hatrany Rôma izay itoeran’i Paoly roa taona ngarangidina alohan’ny hitsarana azy (Asa 27–28).
  - type: text
    content: 'Vao manomboka dia ambaran’ny mpanoratra mazava tsara ny soritra harahiny (1.8):'
  - type: text
    content: –Ny fiandohan’ny Fiangonana voalohany tao Jerosalema, taorian’ny fiakaran’i Jesoa any an-danitra (1.1–8.3);
  - type: text
    content: –ny fielezan’ny Vaovao Mahafaly tamin’ireo faritra hafa tao Palestinina, dia tany Jodea sy Samaria (8.4–12.25);
  - type: text
    content: '–ny fielezan’ny Vaovao Mahafaly tamin’ireo tany manamorona ny Ranomasina Mediteranea ka hatrany Rôma, renivohitry ny fanjakana rômanina (13.1–28.31). Soritana ao anatin’izany ireo dia nataon’i Paoly sy ny figadrana nanjo azy:'
  - type: text
    content: a) dia voalohany (13.1–14.28);
  - type: text
    content: b) dia faharoa (15.36–18.22);
  - type: text
    content: d) dia fahatelo (18.23–21.16);
  - type: text
    content: e) figadrana tao Jerosalema sy tany Kesaria ary tany Rôma (21.17–28.31).
  - type: text
    content: Ny hafatra, izay naely tamin’ny faritany rehetra fantatra fahizany, dia voafantina ao amin’ireo toriteny sy lahateny nataon’ny apôstôly. Hita amin’izany fa ilay Jesoa Kristy, notorîna tamin’ny olona rehetra na Jiosy na hafa firenena, dia tsy iza fa ilay Jesoa avy any Nazareta, niaina tao Palestinina. Ny Fanahy Masina no mampitodika lalandava ireo mpianatra amin’ny tenan’i Jesoa ary amin’ny teniny sy ny asany.
  - type: text
    content: Ireo zava-nitranga voatantaran’ny
  - type: text
    content: ' Asan’ny apôstôly '
  - type: text
    content: 'dia ahitana sahady ny soritr’asa tsy maintsy efain’ny Fiangonana amin’ny fotoana rehetra sy amin’ny toerana rehetra: mitory ny Vaovao Mahafaly momba an’i Jesoa Kristy amin’ny olombelona tsy an-kanavaka, hatrany amin’ny faran’ny tany.'
