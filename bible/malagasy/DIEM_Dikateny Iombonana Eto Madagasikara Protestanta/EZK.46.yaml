document_id: EZK.46,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitsipika manokana ho an’ny printsy
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Ny vavahady atsinanana amin’ny kianja anatiny dia ho voahidy mandritra ny enina andro iasana, fa hivoha kosa izy amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' sy amin’ny fetin’ny tsinambolana. '
  '10':
  - type: text
    content: Ny printsy filoha koa dia tokony hiditra ny tempoly rehefa miditra ao ny vahoaka, ary tokony hivoaka ny tempoly rehefa mirava ny vahoaka.»
  - type: heading
    content: Fitsipika ny amin’ny sorona samihafa
  '11':
  - type: text
    content: '«Amin’ny fotoan-dehibe sy ny andro fety dia varimbazaha telopolo kilao no hatao fanatitra isaky ny '
  - type: text
    content: sorona
  - type: text
    content: ' ombilahy iray na ondrilahy iray, ary varimbazaha araka izay heverina ho mety isaky ny zanak’ondry; dia hampiana diloilo enina litatra isaky ny varimbazaha telopolo kilao izany.'
  '12':
  - type: text
    content: '«Raha tàhiny kosa ny printsy filoha no te hanao sorona an-tsitrapo amin’ny TOMPO, na sorona dorana manontolo io na sorom-pihavanana, dia tokony hovohana ho azy ny vavahady atsinanana. Hanolotra ireo sorona tahaka ny fanao amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' izy; ary rehefa tafavoaka izy, dia hohidina ny vavahady.'
  '13':
  - type: text
    content: '«Isan’andro isan’andro dia zanak’ondry iray taona tsy misy kilema no hatao sorona dorana manontolo amin’ny TOMPO, ka isa-maraina no hanolorana azy. '
  '14':
  - type: text
    content: 'Isa-maraina koa no hanolorana amin’ny TOMPO koba lafarinina dimy kilao vontosana diloilo roa litatra; fanatitra vokatry ny tany atao amin’ny Tompo izany, ary lalàna raikitra hatrany hatrany. '
  '15':
  - type: text
    content: Ny zanak’ondry sy ny koba ary ny diloilo dia hatolotra ny Tompo isa-maraina ho sorona dorana manontolo isan’andro.»
  - type: heading
    content: Ny lova ho an’ireo zanaky ny printsy filoha
  '16':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Raha manome ampahan’ny taniny ho an’ny anankiray amin’ny zanany lahy ny printsy filoha, dia ho lovan’io zanany lahy io sady ho lovan’ny taranany koa izany. '
  '17':
  - type: text
    content: Fa raha manome ampahan’ny taniny ho an’ny iray amin’ny mpanompony kosa ny printsy filoha, dia ho an’ilay mpanompo ambara-pahatongan’ny taona fanafahana
  - type: note
    content: 'ny taona fanafahana: isaky ny dimampolo taona ny Israelita dia tsy maintsy manome fahafahana ho an’ireo mpiray firenena aminy lasa andevo noho ny trosa. Tsy maintsy haveriny amin’ny tompony teo aloha na ny mpandova azy koa ny tanin’ny fianakaviana namidy hanefàn-trosa (jereo Lev 25.8-55).'
  - type: text
    content: ' izany, kanefa avy eo dia haveriny aminy ihany. Fa ny ampahan-tany nomen’ny printsy filoha ho an-janany ihany no lasa fananan’ireo. '
  '18':
  - type: text
    content: Tsy mahazo maka izay anjara lovan’ny vahoaka ny printsy filoha ka hanaisotra azy amin’ny zarataniny. Fa izay ho anjaran’ny zanany lahy dia halainy eo amin’ny taniny manokana, mba tsy hisy olona anisan’ny vahoakako ho voaroaka amin’ny zarataniny.»
  - type: heading
    content: Ny toerana fandrahoana ao amin’ny tempoly
  '19':
  - type: text
    content: 'Avy eo dia nentin-dralehilahy niditra tamin’ny fidirana teo akaikin’ny vavahady aho hankao amin’ireo efitrano mitodika mianavaratra izay voatokana ho an’ny mpisorona. Natorony ny toerana iray terỳ amin’ny farany andrefana aho, '
  '2':
  - type: text
    content: Hiditra avy any an-kianja ivelany manko ny printsy filoha
  - type: note
    content: Jereo ny naoty momba ny 44.3.
  - type: text
    content: ' ka hamakivaky ny lalantsaran’ny vavahady. Dia hijoro eo an-tokonam-bavahady izy mandritra ny anoloran’ny mpisorona ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy ny sorom-pihavanana nateriny. Dia hiankohoka eo an-tokonam-bavahady eo ny printsy vao handeha, ary tsy hohidina ny varavarana raha tsy efa hariva. '
  '20':
  - type: text
    content: 'sady nilazany hoe: «Io no toerana fampangotrahan’ny mpisorona ny henan’ireo biby natao '
  - type: text
    content: sorom
  - type: text
    content: -panonerana sy sorona fanalana ny ota, ary eo koa no fandrahoany ireo fanatitra vokatry ny tany. Amin’izay dia tsy hisy zava-masina hoentina any amin’ny kianja ivelany mba tsy hotandindomin-doza ny sarambabem-bahoaka
  - type: note
    content: Jereo ny naoty momba ny 44.19.
  - type: text
    content: .»
  '21':
  - type: text
    content: 'Avy eo dia nentin-dralehilahy hankany amin’ny kianja ivelany aho ary nampandaloviny teo anoloan’ny zorony efatra; ary isaky ny zorony dia nisy tokotany iray avy. '
  '22':
  - type: text
    content: Kely ireo tokotany efatra ireo
  - type: note
    content: 'Kely ireo tokotany ireo: araka ny dkt tranainy grika.'
  - type: text
    content: ' ary efajoro mitovy refy ka roapolo metatra ny lavany ary 15 metatra ny sakany. '
  '23':
  - type: text
    content: 'Samy voafefy rindrim-bato ny tokotany tsirairay avy; ary teo am-pototr’io rindrim-bato io dia nisy fatana maro naorina sady nifanohy manodidina. '
  '24':
  - type: text
    content: 'Ary hoy ralehilahy tamiko: «Ireto no toerana fandrahoana, ka eo ny mpandraharahan’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' no mampangotraka ny henan’ireo biby aterim-bahoaka hatao '
  - type: text
    content: sorona
  - type: text
    content: .»
  '3':
  - type: text
    content: Fa amin’ny andro sabata sy amin’ny fetin’ny tsinambolana dia ho tonga eo anoloan’io vavahady io ny vahoaka mba hiankohoka amiko TOMPO
  - type: note
    content: Izany ihany no hany anton-javatra ahazoan’ny olona sarambabem-bahoaka mankeo amin’ny vavahady atsinanana (ampit 44.1-3; 46.12).
  - type: text
    content: .
  '4':
  - type: text
    content: '«Amin’ny andro sabata dia zanak’ondry enina sy ondrilahy iray samy tsy misy kilema no haterin’ny printsy filoha amiko TOMPO mba hatao sorona dorana manontolo. '
  '5':
  - type: text
    content: 'Ankoatra ireo dia hitondra fanatitra varimbazaha telopolo kilao isaky ny ondrilahy iray izy, ary varimbazaha araka izay heveriny ho mety isaky ny zanak’ondry; dia hampiany diloilo enina litatra isaky ny varimbazaha telopolo kilao izany. '
  '6':
  - type: text
    content: 'Amin’ny andron’ny tsinambolana dia hanolotra ombilahy iray sy zanak’ondry enina ary ondrilahy iray samy tsy misy kilema izy. '
  '7':
  - type: text
    content: 'Hampanarahiny fanatitra varimbazaha telopolo kilao isaky ny ombilahy iray na ondrilahy iray, ary varimbazaha araka izay heveriny ho mety isaky ny zanak’ondry; dia hampiany diloilo enina litatra isaky ny varimbazaha telopolo kilao izany. '
  '8':
  - type: text
    content: 'Lalana iray ihany no hidiran’ny printsy filoha sy hivoahany mamakivaky ny lalantsaran’ny vavahady. '
  '9':
  - type: text
    content: 'Fa rehefa ny vahoaka kosa no tonga hiankohoka amiko TOMPO amin’ny fotoan-dehibe, izay miditra amin’ny vavahady avaratra dia hivoaka amin’ny vavahady atsimo; ary izay miditra amin’ny vavahady atsimo dia hivoaka amin’ny vavahady avaratra. Tsy hisy olona hiverina amin’izay vavahady nidirany fa samy hivoaka amin’ny vavahady an-daniny. '
