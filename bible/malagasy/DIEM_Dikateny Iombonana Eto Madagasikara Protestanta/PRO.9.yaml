document_id: PRO.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanasàn’ny Fahendrena
  - type: text
    content: Nanangana ny tranony ny Fahendrena
  - type: note
    content: Jereo 1.20 sy nta.
  - type: text
    content: ','
  - type: text
    content: rehefa avy nipaika ireo andry fito.
  '10':
  - type: text
    content: Ny fanajana ny TOMPO no loharanom-pahendrena
  - type: note
    content: Jereo 1.7 sy nta.
  - type: text
    content: .
  - type: text
    content: Ny fahalalana Ilay Masina no tena fahaiza-manavaka.
  '11':
  - type: text
    content: Eny, izaho Fahendrena no mahamaro ny andronao
  - type: text
    content: sy mampahalava ny taona hiainanao
  - type: note
    content: Jereo 3.18 sy nta.
  - type: text
    content: .
  '12':
  - type: text
    content: Raha hendry ianao, dia tombontsoa ho anao izany.
  - type: text
    content: Fa raha miavonavona kosa ianao,
  - type: text
    content: dia ianao ihany no hilanja ny vokany.
  - type: heading
    content: Ny fanasàn’ny Fahadalana
  '13':
  - type: text
    content: Ny Fahadalana
  - type: note
    content: Raisina ho toy ny olona eto ny Fahadalana mba hatao mifanipaka amin’ny Fahendrena, jereo 9.1-6.
  - type: text
    content: ' dia toy ny vehivavy mpitabataba,'
  - type: text
    content: kely saina ary tsy manam-pahalalana.
  '14':
  - type: text
    content: Mipetraka amin’ny seza izy
  - type: text
    content: eo am-baravaran’ny tranony,
  - type: text
    content: eny amin’ny toerana avo ao an-tanàna,
  '15':
  - type: text
    content: mba hiantso ny mpandalo
  - type: text
    content: 'izay mizotra amin’ny alehany avy hoe:'
  '16':
  - type: text
    content: «Ianareo kely saina, mankanesa atỳ».
  - type: text
    content: 'Hoy koa izy tamin’ireo bado:'
  '17':
  - type: text
    content: «Mamy ny rano nangalarina
  - type: text
    content: ary matsiro ny mofo hani-miafina».
  '18':
  - type: text
    content: Tsy fantatr’ireo fa ny maty no ao,
  - type: text
    content: ary efa any amin’ny toeran’ny maty
  - type: text
    content: no mihitsoka ireo nasain’ny fahadalana.
  '2':
  - type: text
    content: Novonoiny ireo bibiny,
  - type: text
    content: noharoharoiny ny divainy
  - type: text
    content: ary namboariny ny latabany.
  '3':
  - type: text
    content: Ireo mpanompovaviny no nirahiny
  - type: text
    content: eny amin’ny toerana avo indrindra ao an-tanàna
  - type: text
    content: 'mba hiantsoantso izao fanasana izao:'
  '4':
  - type: text
    content: «Ianareo kely saina, mankanesa atỳ».
  - type: text
    content: 'Ireo bado koa dia nampilazany hoe:'
  '5':
  - type: text
    content: «Avia mihinana amin’ny mofoko
  - type: text
    content: ary misotro amin’ny divay nomaniko.
  '6':
  - type: text
    content: Ialao ny hakelezan-tsaina, dia ho velona ianareo!
  - type: text
    content: ka mizora amin’ny lalan’ny fahaiza-manavaka.»
  - type: heading
    content: Ny hendry sy ny mpiavonavona
  '7':
  - type: text
    content: Izay mananatra ny mpaniratsira dia hahazo fanarabiana;
  - type: text
    content: ary izay manaraka ny olon-dratsy dia ho afa-baràka.
  '8':
  - type: text
    content: Aza mananatra ny mpaniratsira, fandrao hankahalainy ianao;
  - type: text
    content: fa ny hendry no anaro, dia ho tiany ianao.
  '9':
  - type: text
    content: Manomeza ho an’ny hendry, dia hihahendry izy;
  - type: text
    content: ampianaro ny olo-marina, dia hitombo traikefa izy.
