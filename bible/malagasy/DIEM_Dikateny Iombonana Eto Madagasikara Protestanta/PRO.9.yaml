segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanasàn’ny Fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nanangana ny tranony ny Fahendrena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.20 sy nta.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa avy nipaika ireo andry fito.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Novonoiny ireo bibiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noharoharoiny ny divainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary namboariny ny latabany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ireo mpanompovaviny no nirahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny toerana avo indrindra ao an-tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mba hiantsoantso izao fanasana izao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Ianareo kely saina, mankanesa atỳ».
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ireo bado koa dia nampilazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Avia mihinana amin’ny mofoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary misotro amin’ny divay nomaniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ialao ny hakelezan-tsaina, dia ho velona ianareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mizora amin’ny lalan’ny fahaiza-manavaka.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hendry sy ny mpiavonavona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay mananatra ny mpaniratsira dia hahazo fanarabiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay manaraka ny olon-dratsy dia ho afa-baràka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza mananatra ny mpaniratsira, fandrao hankahalainy ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny hendry no anaro, dia ho tiany ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manomeza ho an’ny hendry, dia hihahendry izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampianaro ny olo-marina, dia hitombo traikefa izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fanajana ny TOMPO no loharanom-pahendrena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.7 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahalalana Ilay Masina no tena fahaiza-manavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eny, izaho Fahendrena no mahamaro ny andronao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mampahalava ny taona hiainanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 3.18 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha hendry ianao, dia tombontsoa ho anao izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha miavonavona kosa ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianao ihany no hilanja ny vokany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanasàn’ny Fahadalana
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny Fahadalana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Raisina ho toy ny olona eto '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Fahadalana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' mba hatao mifanipaka amin’ny Fahendrena, jereo 9.1-6.'
    marker-yv: yv-n
  - type: text
    text: ' dia toy ny vehivavy mpitabataba,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: kely saina ary tsy manam-pahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mipetraka amin’ny seza izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo am-baravaran’ny tranony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny toerana avo ao an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: mba hiantso ny mpandalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay mizotra amin’ny alehany avy hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Ianareo kely saina, mankanesa atỳ».
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy koa izy tamin’ireo bado:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Mamy ny rano nangalarina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary matsiro ny mofo hani-miafina».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy fantatr’ireo fa ny maty no ao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa any amin’ny toeran’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mihitsoka ireo nasain’ny fahadalana.
