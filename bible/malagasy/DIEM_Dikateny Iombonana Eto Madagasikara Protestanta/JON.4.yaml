document_id: JON.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fantatr’i Jônà ny anton’ny famindrampon’Andriamanitra tamin’i Ninive
  - type: text
    content: 'Tsy nahafaly an’i Jônà mihitsy izany ka dia nirehitra ny fahatezerany. '
  '10':
  - type: text
    content: 'Dia hoy ihany ny TOMPO hoe:'
  - type: text
    content: '–Malahelo io zavamaniry io ianao kanefa tsy nisasatra taminy kely akory na nanao izay nampaniry azy. Fa indray alina fotsiny no naniriany, dia maty rehefa avy niaina indray alina izy. '
  '11':
  - type: text
    content: Koa Izaho ve tsy mba halahelo an’i Ninive, dia ilay tanàna lehibe misy olona maherin’ny roa alina sy iray hetsy izay tsy mahafantatra akory ny mahasoa
  - type: note
    content: 'roa alina sy iray hetsy: isa an’ohatra milaza hamaroana tsy hita noanoa, ka mitovy lanja amin’ny isa hoe efatra arivo sy efatra alina sy iray hetsy (jereo Apôk 7.4). –izay tsy mahafantatra akory ny mahasoa azy: hebreo izay tsy mahay manavaka ny havanany amin’ny haviany. Amin’ny kolotsaina biblika ny havanana dia maneho an-tsary matetika ny fankasitrahan’Andriamanitra sy ny fahasambarana valin’ny fihetsika amam-pitondrantena marina, ny havia kosa maneho ny mifanohitra amin’izany (jereo ohatra ny naoty amin’ny Sal 16.8 sy 11 ary jereo Mt 25.33).'
  - type: text
    content: ' azy, mbamin’ireo biby fiompy tsy tambo isaina?'
  '2':
  - type: text
    content: 'Nivavaka tamin’ny TOMPO izy ka nanao hoe:'
  - type: text
    content: '–TOMPO ô, izao indrindra no efa nahîko raha mbola tany amin’ny fireneko aho, ka nahatonga ahy handositra hankany Tarsîsy. Fantatro manko fa Ianao dia Andriamanitra miantra sy mamindrafo, tsy mora tezitra sady be fitiavana ary vonon-kiova fanapahan-kevitra ny amin’ny loza. '
  '3':
  - type: text
    content: Ankehitriny, TOMPO ô, avelao aho ho faty, fa aleoko maty toy izay velona.
  '4':
  - type: text
    content: 'Fa hoy ny TOMPO:'
  - type: text
    content: –Rariny ve raha nirehi-pahatezerana ianao?
  '5':
  - type: text
    content: 'Dia nivoaka ny tanàna i Jônà ka nijanona teo atsinanan-tanàna. Dia nanamboatra trano bongo ho azy teo izy ka nipetraka teo ambanin’ny alokalony niandry izay hitranga ao an-tanàna. '
  '6':
  - type: text
    content: 'Tampotampoka teo dia nampaniry tanantanamanga avo mihoatra ny tsanganan’i Jônà ny TOMPO Andriamanitra mba hialokalofany sy hanafaka ny hasosorany; ary nahafaly an’i Jônà tokoa io zavamaniry io. '
  '7':
  - type: text
    content: 'Ny ampitso vao mangiran-dratsy anefa dia nandefa fositra kosa Andriamanitra hikiky ilay zavamaniry ka maina tery io. '
  '8':
  - type: text
    content: Koa rehefa niposaka ny masoandro, dia nandefa rivotra mahamay avy any atsinanana
  - type: note
    content: 'avy any atsinanana: izany hoe avy any an-taniefitra, izay no manazava ny mampahamay ny rivotra.'
  - type: text
    content: ' Andriamanitra. Namely ny lohan’i Jônà ny masoandro ka nila hanafotra azy. Dia naniry ny ho faty izy ka nivavaka hoe: «Aleoko maty toy izay velona.» '
  '9':
  - type: text
    content: 'Fa hoy Andriamanitra taminy:'
  - type: text
    content: –Rariny ve raha mirehi-pahatezerana ny amin’io zavamaniry io ianao?
  - type: text
    content: 'Ary novalian’i Jônà hoe:'
  - type: text
    content: –Eny, rariny raha mirehi-pahatezerana aho ka satriko aza ny ho faty.
