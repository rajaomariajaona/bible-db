document_id: JON.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fantatr’i Jônà ny anton’ny famindrampon’Andriamanitra tamin’i Ninive
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nahafaly an’i Jônà mihitsy izany ka dia nirehitra ny fahatezerany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ihany ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Malahelo io zavamaniry io ianao kanefa tsy nisasatra taminy kely akory na nanao izay nampaniry azy. Fa indray alina fotsiny no naniriany, dia maty rehefa avy niaina indray alina izy. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa Izaho ve tsy mba halahelo an’i Ninive, dia ilay tanàna lehibe misy olona maherin’ny roa alina sy iray hetsy izay tsy mahafantatra akory ny mahasoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'roa alina sy iray hetsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: isa an’ohatra milaza hamaroana tsy hita noanoa, ka mitovy lanja amin’ny isa hoe efatra arivo sy efatra alina sy iray hetsy (jereo Apôk 7.4). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: izay tsy mahafantatra akory ny mahasoa azy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': hebreo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: izay tsy mahay manavaka ny havanany amin’ny haviany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Amin’ny kolotsaina biblika '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny havanana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia maneho an-tsary matetika ny fankasitrahan’Andriamanitra sy ny fahasambarana valin’ny fihetsika amam-pitondrantena marina, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny havia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' kosa maneho ny mifanohitra amin’izany (jereo ohatra ny naoty amin’ny Sal 16.8 sy 11 ary jereo Mt 25.33).'
      marker-yv: yv-n
    - type: text
      text: ' azy, mbamin’ireo biby fiompy tsy tambo isaina?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nivavaka tamin’ny TOMPO izy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–TOMPO ô, izao indrindra no efa nahîko raha mbola tany amin’ny fireneko aho, ka nahatonga ahy handositra hankany Tarsîsy. Fantatro manko fa Ianao dia Andriamanitra miantra sy mamindrafo, tsy mora tezitra sady be fitiavana ary vonon-kiova fanapahan-kevitra ny amin’ny loza. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ankehitriny, TOMPO ô, avelao aho ho faty, fa aleoko maty toy izay velona.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny TOMPO:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Rariny ve raha nirehi-pahatezerana ianao?
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka ny tanàna i Jônà ka nijanona teo atsinanan-tanàna. Dia nanamboatra trano bongo ho azy teo izy ka nipetraka teo ambanin’ny alokalony niandry izay hitranga ao an-tanàna. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tampotampoka teo dia nampaniry tanantanamanga avo mihoatra ny tsanganan’i Jônà ny TOMPO Andriamanitra mba hialokalofany sy hanafaka ny hasosorany; ary nahafaly an’i Jônà tokoa io zavamaniry io. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampitso vao mangiran-dratsy anefa dia nandefa fositra kosa Andriamanitra hikiky ilay zavamaniry ka maina tery io. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa rehefa niposaka ny masoandro, dia nandefa rivotra mahamay avy any atsinanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'avy any atsinanana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe avy any an-taniefitra, izay no manazava ny mampahamay ny rivotra.
      marker-yv: yv-n
    - type: text
      text: ' Andriamanitra. Namely ny lohan’i Jônà ny masoandro ka nila hanafotra azy. Dia naniry ny ho faty izy ka nivavaka hoe: «Aleoko maty toy izay velona.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Andriamanitra taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Rariny ve raha mirehi-pahatezerana ny amin’io zavamaniry io ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary novalian’i Jônà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, rariny raha mirehi-pahatezerana aho ka satriko aza ny ho faty.
